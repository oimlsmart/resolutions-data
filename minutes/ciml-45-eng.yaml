- number: '7.2'
  title: Other BIML issues
  narrative: |2+

    Mr. Johnston introduced the next item, which would be the Selection Committee's presentation of their proposal for the new BIML Director. Prior to that, he wanted to have a closed session for CIML Members and Honorary Members only. He therefore asked all observers and BIML staff to leave the room, and for recording to be turned off.

    Following the closed session, Mr. Johnston welcomed the observers back and asked Mr. Stephen Patoray to make a presentation - Mr. Patoray was the candidate the Selection Committee was recommending for consideration by the Members as BIML Director. Following his presentation, Members should feel free to ask him questions (and indeed in the course of the following few days), and the vote for the positions of Director, Vice-President and President would take place on Friday morning.

    ## Mr. Stephen Patoray

    Good morning,

    Ladies and gentlemen,

    President Johnston,

    CIML Members,

    Distinguished Guests,

    I wish to thank President Johnston and the members of the Selection Committee for recommending me for the post of BIML Director. It is truly a great honor. Those of you in attendance who have worked with me on various projects and have had contact with me in the past know that I am very passionate about my work. I bring over 35 years of experience in the measuring industry. I have spent much of this time in product development, project management, quality management and innovation in automation. In simple terms, I have solved problems. I have supervised technicians in a private testing laboratory and directly managed project engineers, along with multiple projects with multi-million dollar budgets. I have been involved in ISO 17025 laboratory audits both as a technical expert and as lead auditor. I have also been involved with ISO 9001 and am a certified quality auditor. I have directed the National Type Evaluation Program, which is administered by the National Conference on Weights and Measures, which is the certification program in the US for legal or trade devices. Currently I am an investigative agent for a division of the US Department of Agriculture.

    With these various experiences I have learned how to work on complex problems and how to identify and use the correct tools to solve them. I have learned to interface with many different people at all levels of an organization, from diverse backgrounds and cultures, and I understand that input and ideas from many people are valuable in finding the best solutions to a problem. I have also gained significant experience working with teams. I believe I

    understand the various roles of team members, all of whom play a critical role in the successful outcome of a project.

    With these experiences, knowledge and passion, I will begin to direct the BIML. If you have further questions regarding my background, you can review the CV that was sent out to CIML Members via email or you can contact me during the rest of this Meeting.

    Upon my review of many documents from the recent CIML Meetings, it has become clear that there are many significant issues now facing the OIML. Here are a few that will be my initial focus as BIML Director:

    - the first, and possibly the most important is the finances. It is critical that the BIML have policies in place which will make certain OIML is fiscally responsible, financially stable, transparent in all financial matters, and uses best practices in accounting methods. I will work closely with the CIML President, the CIML Members and the staff of the BIML to ensure these needed policies get quickly identified and put into place;

    - next are several major projects which are now before the Organization. A few are the MAA, Conformity to Type and the work involving the Directives for Technical Work. I intend to seek counsel from the CIML Members and other stakeholders in each of these issues. With this information I will seek out the Secretariats of the various committees and assist them in identifying ways in which the BIML might assist in reaching their goals. I will ensure the full support of the BIML, the staff and my personal assistance in helping to find acceptable solutions to these complex issues;

    - there is also the need for the OIML to continue to cultivate and grow existing relationships with organizations such as the BIPM, ILAC, ISO, IEC and others that have a mutual interest in the OIML. We must all work to avoid duplication of effort; we must utilize experts in many areas; and we must all avoid disagreement in the standards we develop. However, it is also important for the OIML to identify and develop new relationships with additional organizations throughout the world. These may also have mutual interest in legal metrology. I will reach out to those organizations with whom the OIML now has liaisons to develop even stronger working relations with them, and I will reach out to other organizations to develop new beneficial relationships. All of these associations will have the goal of making the OIML an even better organization;

    - I will work with Mr. Seiler and President Johnston to become more familiar with the needs of developing countries. With this increased understanding it is my intent to help identify tools and resources which the BIML can provide to meet those needs in an efficient and effective manner;

    - I intend to use my experiences as a certified association executive and an expert in process improvement to develop internal procedures within the BIML which will improve efficiencies and effectiveness, aid in communication and ensure investment in the OIML will be of real value;

    - I also expect to continue on a path which will allow me to become proficient in French language and quickly acclimate and contribute to the local community where I am living.

    As BIML Director I make these promises to you: I will learn as fast as I am able to learn, and I will work as hard as I am able to work. I commit to keep an open mind to all ideas, yet stay focused on the core objectives of the OIML. I intend to concentrate on finding a solution, not dwell on a problem. I know I must continue to work every minute of every day to first gain and then keep the respect and trust of everyone in this Organization. I will admit when I make a mistake, I will learn from it and I will work to correct it. I intend to be consistent in all my actions and in directing the actions of this Organization. I commit to seek guidance from and rely on the expert capabilities of the CIML President, his Council, the CIML Vice-Presidents, the CIML Members and BIML staff. I pledge to build on the excellent work of those who have come before me and I will strive to leave this Organization a better place.

    Finally, I promise to enjoy this very important work every single day. In the near future I will correspond with each of the Members to learn what is important to you and to your country regarding the OIML. As BIML Director I will also work directly with the CIML President, CIML Vice-Presidents, the Presidential Council and all of you to become a trusted and dependable source of counsel, information and direction.

    Thank you for the opportunity to speak before you today. I look forward to serving you as your Director. Thank you.

- number: '8'
  title: Technical activities
  narrative: |2+

    Mr. Kochsiek reminded Members that that a decision (to which he would later return) had been taken two years previously at the Sydney Conference to revise Document D1 Elements for a Law on Metrology. Later on, Mr. Kochsiek had been asked by the President to start this revision.

    Mr. Kochsiek said that from his point of view there were several reasons why a revision was necessary:

    - the first reason was that he had a lot of experience: over the previous five years more than ten countries had asked him to support them in the revision of their law on metrology and they were hesitating to start by themselves because in the present D1 there was a lot of information but there were no guidelines, no proposal for a structure of the law on metrology or what had to be written in decrees or mandatory technical regulations;

    - the second reason was that changes had taken place in the world, globalization of trade and services, technical development, the use of conformity assessment procedures and the supervision of the metrology system on a regional or international basis. In a lot of countries there was also the participation of private manufacturers and users in the field of legal metrology. Many countries, therefore, were revising their law on metrology or verification act and in the last twenty years there had been a lot of newly founded states and developing countries, and they also needed a modern law.

    In 2008, therefore, there had been a Resolution to start the revision. An inquiry had been carried out at the end of 2008, but the results of this had, in his view, been rather poor. A round table discussion had been held in 2009 on the topic of metrological control $ ^{4} $ , and after the Presidential Council Meeting in March 2010 Mr. Kochsiek had presented an idea for

    a new structure of D1. At that time the President, Vice-President, some members of the Presidential Council, and Messrs. Ehrlich, Magaña, Kool and Kochsiek had started to write a new draft. It was now September and they were about to make the first presentation of what had been done. It had been considered that the future structure should be:

    - Foreword: 1 page;

    - Part 1 Introduction - Scope: 1 page;

    - Part 2 Rationale: this was new and Mr. Kochsiek would return to it later;

    - Part 3 Guidelines for setting up structures in metrology and proposed articles for the Law;

    - Part 4 Proposed regulations for the Law on Metrology;

    - Part 5 As usual, references to the main publications of the OIML, the Metre Convention and ILAC.

    Giving more details, Mr. Kochsiek said that in the course of the current CIML Meeting, there had been several references to the need to convince politicians and decision makers in a country. Mr. Ehrlich had therefore taken on the task of summarizing the rationale for metrology, answering the questions: What is metrology? and why is a law on metrology needed? There would be further elaboration of what metrology was good for, what was meant by legal metrology, why a metrological infrastructure was necessary, and the role of the government. At the end, the guide would point out the need for compatibility between national and international metrological requirements.

    Part 3, Mr. Kochsiek explained, would start with some information on what should be included in the Law, in the decrees or by-laws and in mandatory regulations, then the scope of such a law, definitions, some information about national metrology, policy, infrastructure national institutes, and organization of the authorities.

    A new element would be the need for transparency of metrological information; there would be information on legal units of measurement, and then for a lot of countries there was a need to include traceability and uncertainties.

    The main part from the OIML's point of view would then follow, to include legal metrology, application of the Law on different points, then, as usual, some information about enforcement, the duties and responsibilities of the different parties to legal metrology, conformity assessment procedures, and financial provisions.

    In Part 4, Mr. Kochsiek told delegates, there was a proposal to organize a metrological infrastructure by a suitable order of laws, decrees and standards. He said that there would probably be discussion of this draft revision by the Working Group on the Friday of the present Meeting. It was possible that, at the suggestion of Mr. Ehrlich, most of the information just given would be moved to Part 3 of the Document. Part 4 would in that case mainly give approximately 30 articles on proposals for the structure of the Law on Metrology.

    The next step, Mr. Kochsiek continued, would be to have a meeting of the Working Group and to have a discussion with Messrs. Magaña and Kool. If these two would have time in October to send comments on Mr. Kochsiek's section 3, he could send comments on their part 4 in November. In this way it was hoped that the first draft would be ready by the end of 2010 to be presented to TC 3, and then in 2011 he hoped it would be possible to begin discussions with the BIPM and ILAC.

    Mr. Kochsiek thanked delegates for their attention and invited them to approach him or his colleagues in the ad hoc working group with any comments or suggestions, either immediately or in the course of the week. Members should receive the first draft in the course of 2011.

    Mr. O'Brien expressed his appreciation for the work being done on this project. In his work with the Pacific Islands he relied heavily on D1, which was a useful Document, so its revision, elaboration and updating would make it a very useful tool. He would like it to contain the information that for some developing economies, development of traceability on a regional level was quite important. The existing Document was written very much from the perspective that everything would be done nationally, whereas for some smaller developing economies, a regional solution was more applicable.

    Mr. Kochsiek replied that they were already including some information about regional organizations. All members of the European Union had to implement the European Directives in their national law. On the other hand, in some other regions it was more voluntary. He agreed to give some information on these two options.

