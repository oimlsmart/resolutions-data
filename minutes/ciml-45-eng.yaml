    Mr. Issaev commented that on page 30 of the minutes of the 44th CIML Meeting in the representation of the BIPM, when Mr. Pedro Espina had explained the origins of the BIPM he had mentioned that COOMET was an association of East European countries. In fact, it consisted of East European and Asian countries.

    The Bureau confirmed that the minutes would be amended accordingly; the minutes were then unanimously approved.

    ## Draft Resolution no.1

    The Committee approved the Minutes of the 44th CIML Meeting with the following modifications:

    - on page 30, 4th paragraph from 3.1, 3rd line, insert "and Asian" between "European" and "Countries";

    - on page 32, the third paragraph from the bottom, second line, delete "the drafting of". Draft Resolution no.1

- number: '2'
  title: Report of the CIML President
  narrative: |2+

    Beginning his speech, Mr. Johnston said that delegates might have heard of Murphy's Law: he had been in the middle of updating his speech in the light of comments made at the previous day's Presidential Council meeting when he had lost it from his computer. The presentation would therefore be "low-tech"!

    Mr. Johnston was also keen not to appear to be electioneering ahead of the imminent elections for President and Vice-President. For these elections, the three presidential candidates were

    Mr. Mason, Mr. Harvey and himself, any one of whom he considered would be excellent. The two candidates for Vice-President were Mr. Roman Schwartz from Germany and Mr. Philippe Richard from Switzerland, both of whom he had known for a long time and both of whom, in his view, would make an excellent contribution in that role.

    A new BIML Director would also, it was hoped, be elected. Mr. Johnston stated that Mr. Patoray, who would be present for the entire meeting, would participate in the meetings and make himself available to answer Members' questions.

    Subjects of discussion during the last year, Mr. Johnston informed Members, had included the new Directives, Conformity to Type discussion; and the IQ mark. The previous morning's Presidential Council Meeting had probably been the longest ever held, having lasted from 7:30 until 12:30. Discussion had been lively, with different points of view being expressed, but all had agreed that such discussions should continue. During his Presidency, Mr. Johnston had urged the need for feedback from Presidential Council Members, and he was pleased that this had in his view been achieved.

    Another matter which Mr. Johnston considered needed to be discussed in detail was nontraditional areas of legal metrology. Some Members might be involved in these areas, others not. Some were asked to be, and indeed were actively involved in environmental measurements. Another topic was internet usage: in Canada recently, the regulatory responsible for these matters had allowed service providers to charge by the gigabyte, and within a very short time users had contacted Measurement Canada to ask whether this area was covered, as users did not trust the service providers' measurements. Measurement Canada had neither the expertise nor the equipment to carry out such a task, but it would have to be pursued in the future with the regulatory body, which did not so far seem to have given it much thought.

    There had been hopes that a conclusion on the matter of the new Directives might have been closer by the current meeting, but this did not seem to be the case. The advantage of this was that the field was still open to other suggestions, but the disadvantage was that it was unlikely to be ready for voting at the current meeting. Mr. Dunmill would give further details in the course of the meeting.

    On the subject of rapprochement with the BIPM, first broached in 1996 and resurrected a couple of years previously, Mr. Johnston stated that there had been discussions with the BIPM. Mr. Johnston had been prepared to consider the matter, albeit without great enthusiasm. The BIPM had been open to it but then, for reasons of their own, had decided not to pursue discussion of rapprochement. As many would know, a rapprochement was not a merger, but rather a good working relationship with the BIPM; this of course already existed, Mr. Magaña and Mr. Wallard being frequently on the phone to each other. The BIPM was also facing major changes, with a new Director due to take over at the end of the current year, and a new President also shortly coming into office. They also had budget issues to resolve and were preparing for the CGPM the following year, and so were not at present in a position to allocate much time to the matter of rapprochement.

    The OIML pension system would also be discussed. Mr. Johnston wished once again to thank Messrs. Mason and Richard for their work on this matter, which could potentially affect the financial stability of the organization for many years.

    A challenge Mr. Johnston wished to present to Members was how they could help developing countries more. The Presidential Council the previous day, in which Mr. Seiler had

    participated, had discussed how advice and guidance could be offered to them. Mr. Seiler was doing excellent work, with support from the Bureau, but one person could do only so much, and at times he found it difficult to elicit feedback from both developed and developing countries. Mr. Johnston had no solution to offer, but he invited Members to offer their ideas on this subject.

    Mr. Johnston would be attending the joint ILAC/IAF General Assembly in late October; the OIML was re-signing the MoU with ILAC/IAF. The OIML had a number of MoUs with other organizations; these were only signed when they provided real value. The MoU certainly provided real value. Régine Gaucher had met with ILAC regularly and they had developed a work plan, the objectives of which were being achieved. This demonstrated that the OIML remained strong. They saw the need to seek out and work with other organizations when required; what form this cooperation took would vary from one organization to another.

    All in all, the lengthy Presidential Council meeting had been one of the best meetings that Mr. Johnston had ever attended, profound, with differences of opinion, but civil. It had had to finish at 12:30 because of the Regional Legal Metrology Meeting at 14:00, by which time in any case, all the participants' ability for discussion had been exhausted. Among its topics was the IQ mark, which would be further discussed later. He considered that the organization was in a good position for the future. Its strength was demonstrated by the number of candidates for positions within it; Members might recall that when he himself had run for President he was the sole candidate, but this year there were three for President and two for VicePresident. Much had been done in the last five years to raise the profile of the OIML, though there was still scope for more in this direction.

    Mr. Johnston thanked Members for their attention. He was stopping because he did not wish to be seen as electioneering. He looked forward to working with Members in some capacity in the future and welcomed comments on subjects he had raised, or on any other topic, and he looked forward to a good meeting.

    Mr. Richard asked about a point in the written version of the President's report given in Annex A of the Working Document. In Point 1, regarding rapprochement with the BIPM, the annex stated "it has been considered that the issue of rapprochement was thoroughly discussed with the BIPM ...". Yet the President had told Mr. Richard more than once that these discussions had lasted only about 5 minutes. He wished to bring this matter up for discussion under Item 3.1.1 of the Agenda. A second point he wished to make was that in Annex A, Item 3, Financial issues, there was mention of the audit report of the External Auditor and the Director's comments on its findings. Mr. Richard asked Mr. Johnston for further information on these comments.

    Mr. Johnston replied that at a meeting with the BIPM 18 months previously, rapprochement had been the first item on the agenda. He had raised the matter of taking rapprochement further forward, and it had been clear to him that the BIPM did not want to discuss it. He had raised it more than once at that meeting, again with the response that they did not want to pursue it at that time. Their subsequent publications might have implied that Mr. Johnston or the OIML were the ones not in favor, but he could state categorically that they had been open to further discussion.

    On the subject of the Audit report and the comments on it, Mr. Johnston stated that he did not have those with him at present but would return to the subject at a future time.

    Mr. Issaev asked whether in his capacity as President Mr. Johnston was satisfied with the opportunities given by the Presidential Council.

    Mr. Johnston replied he was very pleased with the high standard of discussion and level of interest at Presidential Council meetings and the good level of input from all its members. It was indicative of strength and professionalism that there could be disagreement yet cooperation. He had been a Presidential Council member before being President and he felt that there had been more and better discussion in recent years than previously, though it had always been good.

    Mr. Flandrin agreed with Mr. Richard that the question of rapprochement with the BIPM should be examined in more depth. He was not at all clear as to the detail of the current position of either of the organizations.

    For the BIPM, Mr. Henson stated that, as pointed out in Annex A and Annex B of the Working Document, there was no ideological objection on either side to further rapprochement, but quite simply there was no business case that it would bring either more efficiency or more savings. The CIPM would be happy to go ahead if a practical advantage were to be seen. Ultimately, if a major decision were to be taken, this would have to be done by the Member States and not by the BIPM. Both organizations were happy to move to further cooperation if that were advantageous and the business case for so doing had been looked at, as shown in the Annexes. He was not happy to hear it implied that it was the BIPM which was reluctant to move forward, and had now heard the opposite viewpoint put forward.

    Mr. Magaña said the matter would arise again under agenda Item 3.1.1.

    <table border="1"><tr><td>Draft Resolution no.2</td></tr><tr><td>The Committee took note of the report given by its President.</td></tr></table>

    Mr. Flandrin said that the word of the proposed Resolution was rather vague and general and suggested that the word "oral" be inserted before "report". Mr. Magaña agreed to this, since the written report contained a number of other matters including the conclusions of the Presidential Council Meeting.

