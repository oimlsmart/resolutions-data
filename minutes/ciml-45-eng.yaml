  title: OIML Basic Certificate System
  narrative: |2+

    Mr. Kool pointed out that the information on this was in the Working Document; because of pressure on time, he asked Members not to go into the details unless they had some serious questions to ask. Summarizing, he said that:

    - 50 categories of instruments were now covered;

    - there were 31 Issuing Authorities in 26 countries; and

    - thousands of Certificates had been registered.

- number: 8.3.2
  title: MAA
  narrative: |2+

    Mr. Kool said that the proportion of MAA Certificates in the total was increasing. There had been attempts to have two new DoMCs; one, for R 51, had almost come into being. There had been two Issuing Participants, but there had been only two Utilizing Participants, so the two candidate Issuing Participants had decided that this was too low a number to continue. This was therefore in abeyance. For the other, which had been discussed in the CIML Meeting the previous year, on R 117, for fuel dispensers, the potential Issuing Participants now preferred to await the revision of R 117, and not to have requirements from two different Recommendations. The three existing active DoMCs on Water meters, Load cells and NAWIs remained active.

    An inquiry had been made to participants in the MAA to try to discover what use was being made of MAA Certificates; detailed results could be found in the Working Document. The conclusion had been that it was very difficult to acquire such information, as there had been very few responses; in particular, it had proved almost impossible to obtain information from manufacturers. There was an impression, however, that use of these Certificates was increasing, as was the number of Certificates. It was felt that they were on the right track but it was difficult to quantify this.

    Mr. Magaña commented that the Certificates and the MAA web pages had been improved and it was now possible to search the Certificates by category.

    Mr. Kool added that some information had also been included on the certification of prepackages, projects currently undertaken by TC 6, and also known as the IQ Mark. This, he believed, had begun in 1998 with a proposal from the APLMF to take up this issue. The CIML Meeting had decided that this should be done by TC 6. At that time, the USA had been responsible for TC 6. In 2001, TC 6 had informed the CIML that it had originally been intended that requirements for pre-packages should be annexed to R 87, but a separate Document had subsequently been preferred. In 2004, responsibility had been reallocated from the USA to South Africa and the South African Secretariat had begun this work with a seminar in Cape Town in 2006. There had subsequently been four meetings of TC 6 where working documents and a first and second Committee Draft for a basic OIML Document had been discussed. The current status was that the second CD had been circulated for vote and comment by CIML Members, with a deadline of 31 October 2010. The result of this would no doubt be discussed at the next meeting of TC 6, which would take place in April 2011 in Tokyo.

    Mr. Ehrlich told Members that, as many of them were aware, the USA had opposed this project for some time. They believed that:

    - the system would not protect consumers and competitors from intentional fraud;

    - it did not provide any added benefits for manufacturers, who could already provide evidence of good manufacturing practice and quality control records to legal metrology officials;

    - the e-mark system of the EU, on which this system was based, had not really provided the hoped for benefits; and

    - the cost of establishing the certification system and the bureaucracy necessary to operate it would not be justified.

    The foundation Recommendations, R 87 and R 79 were in the early stages of revision and some problems with the statistical requirements for R 87 needed to be addressed. He would therefore like an elaboration of the anticipated costs to the OIML of setting up such a system, and how it would work.

    Mr. Kool replied that now was not the moment to go into such matters. The project was with TC 6, and it was for this group to come up with either a proposal in the form of a Document, to be submitted to the CIML for approval or rejection, or a proposal to withdraw the project.

    Mr. Harvey said that he understood that the proposal to be put forward by TC 6 was a voluntary proposal, to which countries could opt in or opt out. Other Members also showed interest in expressing comments, however Mr. Kool informed the audience that there was no proposal to vote on or discuss this project on the current occasion.

    Mr. Ehrlich said he understood Mr. Harvey's comment that it was a voluntary program but questioned whether the OIML logo should be on an IQ mark or Certificate which lacked the support of a number of CIML Members. Although the Presidential Council had mandated TC 6, so long as it had CIML approval, to continue with the work, Mr. Ehrlich doubted whether it still had the support of a majority of Members; he would like a poll to be held to discover the level of support for it among Members. He proposed a Resolution to that effect.

    Mr. Kool said that there was no proposal for this in the agenda or the Working Document, and therefore no opportunity for CIML Members to discuss it before voting. Its withdrawal would have to be initiated by TC 6, where the USA was represented. The Bureau was aware of the USA's disapproval, but also of a number of Member States which were strongly in favor of such a system. The proposals had been discussed for many years, and Mr. Kool was hopeful that after the next Meeting there would be a definitive acceptance or rejection by the TC; that would be the moment to consult the CIML as to its future.

    Mr. Ehrlich said that he believed that building on a Document was different from building on a project. If the CIML wanted time to think about it, he could understand that, but he doubted that many Members were now in favor of it. He strongly recommended TC 6 to hold an inquiry to elicit CIML opinion.

    Mr. Schwartz said that he was not directly involved in the TC 6 work, nor was he an expert on the subject, but from information he received he doubted whether there was now majority support for the project even within TC 6, and he urged TC 6 to move towards an inquiry prior to a decision as to its continuance or otherwise.

    Mr. Issaev said that this system had already been set up in Russia, so it would cause a problem there if the project was rejected.

    Mr. Miki said that this was not a technical requirement in Japan, where there was an inclusive system. He agreed with Mr. Ehrlich that its cost was important. If it was voluntary, the OIML should look to the cost to them, financially and in human resources.

    Mr. O'Brien felt that the TC had been set up to look at this matter and its processes should not be corrupted by discussion such as that currently taking place.

    Mr. Birch suggested that delegates should look again at the paper which he had given in Cape Town on the economic importance of global trade in pre-packaged goods, which at that time was about a hundred times as large as the trade in measuring instruments. This gave an idea of the relative importance of ensuring its integrity. He also drew Members' attention to some remarks by the Proctor and Gamble Director of Regulatory affairs in North America, who had stated that there was no means of ensuring that measurement of imported products was compliant. Mr. Birch believed that the value of the IQ Mark could be between one and six billion dollars. More recently, in the paper he had given in Mombasa, he had highlighted the fact that developing countries had to meet multiple systems in the developed world and could use this IQ Mark to give added value to their products.

    Mr. Ehrlich agreed in principle with the last comment and with the objectives expressed, but was concerned about the practicality and the cost of the system and whether it could really work.

    Mr. Kool reiterated that the proper time for discussion would be when TC 6 had submitted a proposal, be it positive or negative.

    Mr. Magaña supported this. There was no OIML mechanism for re-confirming work projects. It was for the TC to make an impact study of all aspects, including costs and acceptability.

    Ms. Van Spronssen suggested that the TC be urged to come up with a proposal for the following year's CIML Meeting, as otherwise the uncertainty would drag on for too long.

    Mr. Kool did not feel that any urging was necessary; so much progress had been made that he was sure that TC 6 would have a proposal ready for the following CIML.

    Mr. Ehrlich agreed with Ms. Van Spronssen that TC 6 should be requested to provide a Document and cost analysis at the 2011 Meeting.

    Mr. Richard supported the call for TC 6 to be asked for a prompt proposal.

    Mr. Carstens said that South Africa had been asked to take on this project, they were taking it seriously and had discussed it intensively. They had come to the conclusion that the costs would not be prohibitive and they were intelligent enough to understand that if the costs were exorbitant the system could not succeed. A process existed, and Committee Members who were not in agreement with the project should not attempt to derail that process. The TC responsible should have the right to produce a Document or to close it down on their own.

    Mr. Kool asked whether the TC might include references to cost when their conclusions were presented to the CIML.

    Mr. Carstens said that that suggestion would be taken to the TC at its April meeting so that it could decide whether it was willing to look into it.

    Mr. Kool asked whether this would be acceptable to the USA, and Mr. Ehrlich replied that it was acceptable.

- number: '8.4'
  title: Revision of the Directives for Technical Work
  narrative: |2+

    Mr. Dunmill told Members that the process of revision had begun as a result of what had been seen as problems with the existing system. The BIML had begun with a brainstorming exercise and a first draft had been presented to all CIML Members in 2002. This had been overtaken by other things that were happening, and in 2003 the CIML had decided to establish an ad hoc working group to conduct the revision work. Email discussion over a couple of years had resulted in the production of a revised working draft, which had been discussed at a meeting of the working group in 2007, and then at a meeting of the Presidential Council in March 2008. Immediately after that, a second working draft had been discussed at a meeting of the working group. The draft had been further modified in the course of that year and then, due to some problems which had arisen because the composition of the working group, and the opinions of people present, had altered slightly, there had been considerable variation in the direction taken by the content of the draft.

    At the Presidential Council Meeting in 2009, therefore, Mr. Harvey had initiated discussion to try to give the Bureau, as its Secretariat, some direction, to stop constant changing. This direction was that the working group should continue with the principle of having a flat, TC only structure for the technical work and that the management of the technical work would not be operated by a technical management committee or council. A small working group meeting had taken place in June 2009 when several of its members had found that they would be in Bern at the same time for other events. This had resulted, in September 2009, in a third working draft being sent to the whole working group, now with the new flat technical structure. Mr. Dunmill had presented the ideas in that working draft at the 44th CIML Meeting in Mombasa, and following discussions after that, in January 2010 he had sent out a draft to all Members, for a brief comment period rather than the full three months period to all CIML Members in the hope of receiving comments and opinions to be offered to the Presidential Council in March. Not many comments had been received, and most of those received had been in general terms.

    As a result of this consultation, Mr. Dunmill had prepared two different versions showing the effects of changing the current voting rules. One draft showed the current CIML approval procedures, which were different for Recommendations, Documents, Vocabularies, Basic Publications, and so on; the second draft had the same technical content in other respects but had a single approval procedure, which was the same as that currently used for Recommendations but applied to all publications, in order to try to make the procedures simpler and easier to understand, because of the frequent need to remind Members of the current rather complex CIML approval rules.

    In March 2010 there had been discussion of the comments on the January draft and Mr. Dunmill had continued with the flat technical structure. Because of reservations expressed at Mombasa in 2009 over the power being given to the CIML President, Mr. Dunmill had reintroduced the idea of the Technical Management Council to show how the technical work would be managed. Also, following the Bern meeting and Presidential Council Meeting, he had removed the present concept of the preliminary ballot for Recommendations. This had resulted in the draft dated May 2010, which all Members had received for comment. In

    September he had sent out the latest version of all the comments, some of which had been received after the deadline. He was now presenting the results of this commenting period.

    The draft had been sent out on 12 May with a deadline for comments of 12 August, the normal three month commenting period. By 16 September he had had responses from only 27 CIML Members, which still represented only 47 % of the membership. 11 of those countries had responded saying that they were happy with the current draft and had no comments to make on it. 30 countries (32 %) had made no response of any kind despite email reminders, not even acknowledgement of receipt of the email; there was no proof that they had even read it.

    Of the comments received, three countries had objected to the use of the flat structure in TCs. The technical management council structure had produced more comments, with objections to it from Brazil, Denmark, Finland, Norway and Poland, asking why it had been reintroduced. Some other countries, which did not object to the principle of including the committee, had proposed changes to its manner of operation. Two countries had provided objections to the single procedure for approving all OIML Publications by the same method, without the use of a preliminary ballot as was currently the case.

    The proposed flat technical structure had been devised as a way of achieving one of the aims of the revision of the Directives, which had been to attempt to make all the technical work more transparent to users and to people outside, to make it easier to understand, and to allow for the individual membership, the P- and O-membership, of every individual project which the OIML was undertaking. It had one publication per Committee, but this did not mean that the different parts of a publication (metrological requirements, test procedures and test reports) would be under different committees. They were clearly part of the same project, so one TC would be responsible for all parts of a given publication.

    In the current proposal, the TCs would be named after the publication they were concerned with; so TC R 76 would deal with the two parts of R 76, for example, and TC D 11 would deal only with D 11, because there was only one part. This was partly in order to help with making it immediately obvious which committee was responsible for what, or which publication fell under which committee. Each committee would continue to consist of a Secretariat, P-members and O-members, as at present, with the same kind of responsibilities, and would have technical liaisons, as was currently the case.

    Some of the concerns, which would no doubt be raised for discussion later, related to the fact that the system did not provide for the grouping of committees under common themes or domains of measurement in the way that the subcommittees at the moment were grouped under their TCs into mass, volume and so on. But Mr. Dunmill felt that the new arrangement would be more flexible, and would provide a different way of achieving coordination, in that each committee could belong to several different groupings according to several different kinds of interests: mass, volume, flow, length and so on, the domains of measurement. This was one way of grouping the TCs. It would also be possible to group them according to the use or application of a given instrument's measurements (trade, utility meters, environmental measurements and so on). Other publications were parts of general structures or systems operated by the OIML, which was another way of classifying TCs.

    As an example of this way of grouping TCs, Mr. Dunmill said that water meters might fall under several different groups - flow measurement devices, utility meters, and instruments included in the MID, MAA, for example. This could allow discussions between TCs working on Recommendations which had a common theme other than simply their metrological

    domain. This was not an exclusive list, but a first idea to show Members how the committees could be grouped. In a similar way, non-automatic weighing instruments are mass measuring instruments, they are used for trade, and also are included in the MAA.

    The different groups could discuss, by email or by using forums established on the OIML web site, or by meetings which could be organized along these themes, giving opportunities for discussion of common interests which were not available under the present arrangement there was no management structure in the current TC/SC structure.

    Mr. Dunmill raised the question of how the transition to the new system, if adopted, would come about. He thought that initially it would be best to transfer all the existing TCs and SCs, their projects and the publications for which they were responsible directly into the proposed new system, leaving the Secretariats and memberships in their existing form for the moment. There could then be a series of inquiries to determine whether people were interested in each of the projects, whether Secretariats wished to give up some of their work by sharing it more equally amongst other countries, and indeed whether the projects, the Recommendations, the Documents and so on were useful. If in the end very few people wished to be P-members, then under the current rules it was necessary to question the validity of that committee at an international level.

    As an example, picked as illustrating many of the aspects mentioned, Mr. Dunmill chose TC 11/SC 3. The Russian Federation currently had the Secretariat and the subcommittee had nine P-members and 12 O-members. It was responsible for three Recommendations and one Document. It currently had two projects, one of which was a revision of one of its existing publications, and the other an entirely new proposal for something which could be a Recommendation or a Document. Under the proposed new system, that would be translated into a TC for each of its Recommendations (so three in total), a TC for its Document and a TC for its new project. This last Committee for the moment could not be called after its Recommendation, because it was not known whether it would be turned into a Recommendation - it might turn into a Document. So it would just be given a sequential number until it produced a final publication accepted by the CIML, at which time it would be renamed as TC R 155 or whatever it might be. The revision of an existing Recommendation, R 18 was not a separate item since maintaining it by 5-year periodic review would be the responsibility of the TC which had developed it.

    Regarding the management of the work, this was something which Mr. Dunmill had reintroduced into the draft which had been circulated in May, following comments received at the 2009 CIML Meeting and the March 2010 Presidential Council. In fact, all the OIML technical work, all the projects undertaken, were reviewed by an informal committee following the Presidential Council meeting in March every year. The new system was designed to formalize the current system, to make it more transparent to CIML Members and to provide more opportunity for Members to participate. Mr. Dunmill was not sure how many people at the moment fully understood how projects were reviewed. This was not a secret there had been a meeting of a small number of Members following the Presidential Council, and these Members quickly went through all the current projects to identify present and potential future problems, and how these problems could be dealt with. That function itself would not change but it would become a more open, clear and formal way of conducting that management. The idea of giving decisions, for example on establishing TCs, to this technical management committee had also been one of the fundamentals of the original proposal to review the Directives; it had been thought that a lot of time at the CIML Meeting was being

    used to approve such things as the establishment of committees, and that this could probably be done if the CIML delegated that decision to a management group such as that proposed. What the technical management committee had done during the year would of course have to be reported to the CIML for approval, but at least a committee could be established during the year and the work undertaken.

    Regarding the approval process, Mr. Dunmill had moved forward with a clearer single approval procedure for all OIML publications since this had been supported during the consultation on the draft circulated in January 2010. The current rules for the approval of Recommendations would be used for all publications. This would result in a stricter approval requirement for Documents and Basic Publications than was currently the case, but the feeling had been that there were benefits to be had from having a simpler system that was easier to understand. Although the requirements were more strict, if a Document was actually a bad Document, it should not be approved, so there was no real harm in applying a stricter rule to it, and the advantages of making it more transparent and comprehensible would outweigh any problems.

    Mr. Dunmill told Members that at the meeting in June 2009 a decision had been made to remove the preliminary ballot in the new revision. The current preliminary ballot gives rise to much confusion, since many Members did not understand why they were apparently being sent the same draft twice in quick succession. Under the rules given in the draft revision of the Directives it was proposed that no technical changes should be possible at the time of a CIML approval. Members were fully entitled to vote against a document if they did not like it, felt it was technically incorrect or for some other reason were unable to accept it. But it should not be possible to make technical changes at that time. This would speed up the work considerably because there would not be the extra three month voting period, or the time afterwards for the Secretariat to review the comments and the BIML to re-distribute the draft.

    The level of comments which Members had submitted indicated that the current draft was not acceptable to a number of Members for various reasons. Mr. Dunmill said that in the current Meeting he would like more discussion and an explanation by Members of why they had problems with some aspects of the current draft. He hoped to identify the problems and find a solution to some of the major issues which would not keep changing every six months or so. He hoped to discover how CIML Members felt about the measures, what level of support there was for the various issues, and in which direction the BIML, the working group or the CIML should proceed to take the project forward towards approval.

    Mr. Dunmill invited comments on the revision of the Technical Directives. He wanted those who were opposed to aspects of the draft to explain their objections to others, in the hope that a revised draft could be prepared which might be approved at the 2011 CIML.

    Mr. Lindlov said that Norway was very much in favor of having a simplified structure. The OIML had problems with moving work forward and with taking decisions - the process of moving from work item to Document or Recommendation was very lengthy. However, he was sorry to see the reappearance of the TMCs. It would not be impossible to live with this, but he would prefer the work to be divided between the TC and the Bureau, thereby reducing bureaucracy. Regarding the voting procedure, Norway was very much in favor of the present proposal for a simplified procedure.

    Mr. Ehrlich wanted first to confirm that there would be no voting on this subject at the present Meeting. Mr. Dunmill confirmed this. Mr. Ehrlich thanked Mr. Dunmill for his efforts, but felt that some of his suggestions regarding groupings went beyond what had been done by the

    Working Group. He wished to focus on the USA's reasons for opposing the flat structure. They felt that despite its apparent advantages, if looked at carefully there were disadvantages; they would prefer to keep the current TC and SC structure, with the SC continuing to have responsibility for multiple projects and Recommendations. Some of the problems of the flat structure were that:

    - different countries might have Secretariat responsibility for closely related Documents;

    - different approaches might be taken;

    - there might be conflicting requirements;

    - lack of coordination could lead to inefficiency and increased costs;

    - despite attempts at mitigation by the Bureau, there could be difficulty in finding times for meetings;

    - it might not be as obvious as at present to identify which Committees were dealing with which subject matter;

    - it was not clear how coordination would be facilitated;

    - with the exception of the IEC, which was moving to a flat structure, the international standardization community used and understood the TC/SC structure, and a move to the flat structure might cause confusion in other bodies, with consequent loss of confidence in the credibility of the OIML. Mr. Ehrlich knew that Mr. Dunmill had talked to people at the highest levels in other organizations but he was more concerned with general perceptions in the international standardization community;

    - the USA did not believe that this change would reduce the workload or make the process more efficient: the workload would just be shifted.

    In general, then, the USA believed that this proposal represented a very drastic change. They did not believe that this was the right time for the OIML to go in this direction. The main objective of speeding up the voting process could be accomplished by some very minor changes to the Directives. Merely changing the meaning of P-membership and O-membership at Subcommittee level in the existing committee structure would go a long way towards improving the speed of voting. In particular, countries which were participating in a particular project could agree that they would be P-members for that project within a Subcommittee, and then they could be O-members for others of its projects. Though it was only a minor change, this would go a long way towards meeting concerns. The OIML was undergoing a lot of change, with a new Director and possibly a new President and Vice-President; it was not a time to alter drastically the method of working. There were also problems with the voting rules, which in his view were ambiguous and needed attention. CIML Members needed time for full consideration of what they would be voting on.

    The USA also wished to keep the preliminary ballot. They understood why some Members might be confused by it, but by the same token they felt that it provided the first opportunity for all CIML Members, if they had not participated in the work at TC level, to see an issue and in particular to get the input from the other CIML Members.

    In conclusion, Mr. Ehrlich said he was pleased that there would not be a vote on the present occasion and looked forward to hearing Members' comments, to help the working group with producing an improved draft.

    Mr. Schwartz said that Germany had provided some comments and were more or less in agreement with Mr. Ehrlich. Having reconsidered their previous position, they had come to the conclusion that the flat structure would probably not bring the advantages they had previously envisaged, but could have more disadvantages than the existing structure. They also wanted the retention of the preliminary ballot, and they felt that the Technical Management Committee would be concentrating on the oversight and control of the work rather than looking into the technical details. Germany was in favor of such a committee, but with clearly defined tasks so that it would help rather than impede the work.

    Mr. Schwartz saw the need to give some advice and direction to the Working Group, as otherwise the position would be constantly changing. He therefore proposed that the current Meeting should be used to vote on the principal directions in which the revision should go on its three basic issues, which were:

    - the form of the technical structures: if the majority was in favor of the flat structure, this was a democracy and Germany would of course support this; but the majority opinion had to be clear so that the Working Group had clear directions as to which way to go;

    - whether to keep or abolish the preliminary ballot;

    - there seemed to be a majority in favor of the Technical Management Committee, though Mr. Schwartz did not see a need for it, but the Working Group must have advice as to how the relation between the Bureau and the TCs could be made efficient.

    Regarding the TMC, Mr. Dunmill wished to repeat that the object of putting this back in after it had been removed from the draft was to make it clear that this was an attempt to formalize what already happened; it was not a change as such. A small, informal ad hoc committee already met every year to discuss and look for problems in the projects which were being undertaken. He had the impression that not many people objected to the existence of such a committee; their preoccupation was with what roles should be assigned to it.

    One of the main objectives of the revision of the Directives from the outset had been to take decisions down to the most appropriate level possible, in order to improve the efficiency, so that it was not necessary to spend time in CIML Meetings discussing technical details with which Members who were present might or might not be involved. This had been the idea behind the proposal; it might or might not have gone too far, but its intention had been to formalize what already existed and to give the committee responsibilities which it could get on with. It would consist of people who were directly involved in the technical work, and then, of course, all the decisions made by that committee would have to be endorsed and approved by the CIML Meeting. Mr. Dunmill agreed that the role and duties of the committee which were listed in the current draft probably needed to be revisited.

    Mr. Dunmill agreed that there would be no change in the workload. This had never been an intention, nor was there any intention in the short term to remove or add any projects to the current list. The same projects and publications as at present would be carried forward, at least in the first instance. What might change in the short term was that where there were several projects under a subcommittee, for example, and that subcommittee did not have the resources to work on them, the intention of the proposed system was that it would be easier for those projects to be begun by someone else who volunteered to do the work. This was the case in some committees at the moment, where individual working groups had been set up with a different Member State being responsible for the work.

    Regarding the timing and the significance of the amount of changes taking place, Mr. Dunmill pointed out that the revision was not going to happen immediately. It was not a radical transposition or an attempt to delete work, but simply a transfer from one administrative system to another. A reasonably long implementation period would be required. It would take another year to sort out detailed proposals and to consult all the TCs and SCs, which had not yet been the case, before there could be an implementation date.

    Mr. Mason thought the present discussion was very useful, due to the papers which had been drawn up in detail and circulated in advance, for which he thanked the Bureau. He also thought it useful that the CIML was able to discuss the principles behind any changes rather than taking specific decisions on a package of measures. He had three comments:

    - he thought it was unfortunate that all the discussions started with the question of the flat structure or not the flat structure. This seemed to him to be the least important facet of the proposed package. He personally found it more attractive, but he did not think it worth spending a lot of time on if a number of colleagues were more attached to the existing structure;

    - he did however think they needed both simplification, wherever possible, and transparency. In terms of the voting systems, again, the very extent to which different voting systems were operated seemed to him to be a barrier to clarity, especially in view of the need to persuade all CIML Members of the need to come quickly to clear decisions. There had been frequent comments on the difficulty of getting Members to vote online, and anything that could be done to make the process simpler and more understandable was desirable. He would want to put this forward as a principle, but on some of the details, such as the preliminary ballot, like others, the UK could see some attractions in keeping that;

    - the other matter was transparency. If direction was being given, as Mr. Mason was aware that it was, it was very important that it should be transparent. There should be clarity about who was taking decisions and in what sort of forum and against what terms of reference. If this meant that there should be a body which was identified as a Technical Management Committee, then he could see attractions in that. What it was called, or its precise shape, was not important: what was important was clarity and transparency.

    Mr. Miki felt that the most important thing at the moment was clarification. He himself was happy with having a flat structure and a TMC. But he asked himself for what reason they should change to this way of working; he would like a clear explanation of what was wrong with the present structure, with a comparison between the two ways of doing things. There should be a session of discussion and comparison before they determined which to choose. Speed was less important than thorough discussion.

    Mr. Flandrin said that France was in agreement with the principles behind the proposal. He had two comments to make. The first concerned the composition of the Technical Management Committee, which he felt should be open to all CIML Members. The second was that all Recommendations and other publications should be available in French before being finally approved.

    Mr. Dunmill said that translation was not a subject for the Directives as such though they should perhaps contain a statement about the translation to be done once a Publication was approved, because at the moment all the technical work was conducted in English. The

    objective was to have translations once they were approved by the CIML and published. Members would know that translation had previously been done by the BIML before the English version was published, which had many advantages, in that it gave an opportunity for more editorial and even technical problems to be spotted in the English versions. Unfortunately, with the resources which the Bureau had even at that time, this had become impossible. French was still the official language of the organization however and Mr. Dunmill thanked Mr. Flandrin, saying that the BIML would look into the resources needed for translation.

    He also reassured Mr. Flandrin about the openness of the TMC. This was one of the reasons for trying to formalize this, to set clear rules for how CIML Members could become part of this Committee, how long they remained in it, to ensure that the CIML approved the composition of the Committee on a regular basis, be that yearly, two yearly or whatever, rather than the present ad hoc arrangement, although the ad hoc arrangement did work efficiently. Mr. Dunmill agreed that, in the interests of transparency and openness of procedures, something more formal needed to be set up. The intention had been to improve CIML participation and not to reduce it.

    Mr. Lindlov wished to clarify his comment on the TMC and why Norway did not feel it was necessary. Looking at the responsibilities of the TMC, as shown in 3.5 of the Working Document, it was not difficult to see that some points should be undertaken by the CIML and the rest was a list of work that should be the task of the Bureau. For instance, for the Committee, approving Technical Work Documents, establishing and disbanding TCs, allocating initial TC Secretariats and establishing terms of reference, were in his opinion for the CIML to decide. The rest was administrative work that should be done by the Bureau. In Norway's view, therefore, it would be wiser not to have a formal procedure, but instead to make it very clear where responsibility for these tasks lay, in the Bureau or in the Committee. They were in favor of reducing bureaucracy. There were already many administrative levels: the President, the Presidential Council, the Bureau, the Committee and the TCs, so they would appreciate less bureaucracy.

    Mr. Dunmill agreed with the desirability of reducing bureaucracy. Mr. Lindlov had, however, omitted one administrative task, which would be the main responsibility of the Technical Management Committee: this was to review all the projects. Whilst he could see that it was a valid use of time in the CIML to establish and dissolve TCs, approve work programs and so on, there was still the question of reviewing every single one of the 160 or so projects and publications which the organization was working on, which it was not practical to do in the open forum of the CIML unless another half to whole day of work were to be allocated to it. The small ad hoc committee at present carrying out this task took at least half a day to complete it. Also it needed to be done from a management point of view, to see whether extra resources were needed, why a project was not advancing, which projects had become more important in the past year, and so on. If there were no Committee, he was concerned as to who would do this. There were things that could be done by the CIML and things that could be done by the Bureau, but there remained this task. His intention had been to make it more formal so that it was transparent how it was being managed.

    Mr. Ehrlich said that in the past the BIML had done the review and kept up to date on the status of the projects, and then it had been a question of finding out where difficulties lay and finding resources. In his view, the role of the TMC would be to look at all these projects and then try to help to identify what resources might be available if a Secretariat was having

    problems with a particular project. The BIML could continue to monitor the status of the projects.

    Regarding the transition period and pace of change, he felt that he had not made himself sufficiently clear about wanting to keep the Subcommittee structure. It had been said that to go to a flat structure would be a simplification but he felt that in the name of simplification a lot of coordination and of corporate memory would be lost. If the Subcommittees were suddenly disbanded, then all the people who had worked on all the projects in that Subcommittee would be dispersed, and that information, once lost, would be hard to regain. He did, however advocate changing the way that Subcommittees worked: a country could say that they wanted to be a P-Member or a voting member for a particular project within the Subcommittee, but not necessarily for another.

    Mr. Dunmill replied that when he had been speaking of the transition period he had been trying to make clear that there would not be any disbanding. There was no loss of memory for those directly involved, because under what he was proposing, everyone who was in a current Subcommittee for a given project would be in the new TC for that project, at least at the outset. What would happen would be that those who were not interested in that particular project would then have the chance to withdraw. But, initially at least, the country responsible for the Secretariat would remain the same, as would the participants. Corporate memory was of course very important for the resources of the organization, but it would not be lost. Whatever the outcome of the revision, its implementation would take a long time; all TCs and SCs would be talked to individually and the necessary databases had to be put into place. The databases would be simpler under the flat structure than when maintaining the TCs, SCs and a third, project level. As far as coordination was concerned, apart from the current possibility of coordination between projects within a Subcommittee, there was no coordination at present between, for example, all SCs involved in mass. TC9, for example, did not have a management function and there was no coordination between its Subcommittees. Mr. Dunmill's earlier suggestion of alternative grouping by themes such as kind of measurement, application of that measurement or more general principles would give more possibility of coordination, but in different ways which reflected a more modern approach to the whole subject of legal metrology. How this would happen was not written into the Directives because until such time as consideration was given to what committees would exist, there was no point in listing ways in which they could be coordinated.

    Mr. Dunmill said that it was important to consider the management system for the technical work. Standardization bodies such as ISO and IEC used a web based system for managing their technical work more than OIML, and this should be further studied. A database of the TCs, in whatever form they were, would be part of that. This also would take a considerable time to set up.

    Mr. Ehrlich thanked Mr. Dunmill for this clarification. He still felt however that although in the short term coordination might stay the same, as time went by and committees worked separately, a certain amount would be lost. He agreed with the need to renew the BIML database. The matter was not trivial, though not necessarily impossible to overcome.

    Mr. Schwartz said that TC 9 had not probably been an ideal example to choose, as it was thought of as two, but actually was divided into six individual TCs with a flat structure. Six Recommendations were now under the responsibility of TC 9/SC 2, and this was an example of how corporate thinking and the coordinated approach might be lost.

    Mr. Dunmill admitted that he had chosen this example at random. There was no reason, with TC 9/SC1 or TC 9/SC2, which was split into even more parts, why the individual projects had to be chaired by different people. The fact that they were separate projects was an administrative matter and not a technical matter. The idea of allocating the projects to different countries was more to overcome the problem of resources not being available and therefore progress not being made on projects which were already in existence. When the list of current OIML projects was examined, a significant number of these had seen no action for many years. There was obviously a problem with these, and resources had to be found to deal with them. One way might be to change the Secretariat, because some of the countries could not do all the work that was allocated to them. This had been one of the reasons for the idea of trying to make it easier to ensure that the work could progress. There was no intention of removing coherence in cases where TCs were coping with multiple projects.

    Mr. Ehrlich pointed out that in the comments provided by the USA, they had asked for consideration of the possibility of keeping the separate TC and SC structure with TCs performing a supervisory role. The USA was willing to play a more active role in this regard, and other Secretariats might do likewise. This was another option for dealing with some of the responsibilities which it was proposed to give to the TMC.

    Mr. Dunmill replied that no management system existed in the present system. This had been removed when the system had changed from the previous Pilot Secretariat and Reporting Secretariat structure in the early 90s, because it was not working. Resources were not available to allocate to it. He appreciated the good intention, but experience suggested that the management function would not be carried out, especially with the reduced resources likely to be available in the future. The flexibility of coordination he was proposing was additional and not a part of the management structure.

    Mr. O'Brien said that discussion to date had focused on how to redistribute efficiently and effectively the current workload. One possible advantage of having a group responsible for a specific Recommendation was that that group might also use their intimate knowledge of the subject in order to add value to it by developing training materials and guidelines to assist implementation of it.

    Mr. Dunmill said that he had had a similar comment from another source, to the effect that Guides should be produced on how to use Recommendations. This did not form a direct part of his work on the Directives, but was a valid point. He asked whether any Member wished to make remarks on other subjects than the structure or technical management.

    Mr. Magaña referred to the creation of databases. This was not a minor issue for the time and workload involved for the Bureau and should be well addressed by the working group, because the database for TCs, though possibly simpler, would be completely new and would have to be set up and the data registered again.

    Mr. Dunmill reminded the Meeting that there was not a proposal for a vote on this matter at the current Meeting, but that the CIML needed to give some guidance to the Bureau or to the working group on how to proceed with it. Mr. Ehrlich had pointed out that he did not feel that CIML Members had given enough thought to alternative structures. Mr. Dunmill would like to distribute an inquiry on specific points, to enable the CIML to make it clear which direction they wanted to go in the three main areas: what the structure was; whether to have the TMC; and the voting procedure. He had already asked all CIML Members about their voting procedure preferences by submitting two alternative drafts to them, one with the existing voting arrangements and the other with the proposed new ones, and he would like to extend

    this by giving a questionnaire to all Members requiring a yes/no answer to a number of questions on the three main topics. He would like to ask the CIML for permission to do this before producing any further draft.

    Mr. Ehrlich endorsed this approach. This would give people time to think about things and lay out all the alternatives. In conjunction with the material Mr. Dunmill had already received, this would lay a good foundation for continuation of the work.

    There being no further comments, Mr. Dunmill said that he would draft a Resolution to this effect for approval, to be taken with the other Resolutions at the end of the Meeting.

- number: '9'
  title: Financial matters
  narrative: "\n"
- number: '9.1'
  title: Comments on the 2008 and 2009 accounts
  narrative: |2+

    Mr. Johnston asked Mr. Magaña to lead discussion on this.

    Mr. Magaña said that there was a summary of these matters in the Working Document and a fuller set of accounts on the web site in both French and English. He would therefore not go into great detail on the present occasion. Comparing actual costs for 2008 and 2009 with budgeted costs:

    - staff costs had been slightly higher than budget in 2008 and slightly lower in 2009, due to some staff being absent for part of that year. Over the whole period, however, staff costs were in conformity with the budget voted;

    - other charges, however, had been significantly above budget in both years, though somewhat less so in 2009. This was mainly because travel and accommodation costs had been underestimated in the budget;

    - meeting costs for the two years had been higher than planned in the budget, but travel costs had been almost double the estimate, a problem which was now being addressed;

    - operational costs of the building and structure had been higher than budget in 2008 but in 2009 had been reduced to approximately budget level.

    Members could see in the report on the Bureau in the Working Document that efforts had been made to reduce costs. The list of travel was shown there. The Bureau had attempted to keep these under control and had reduced them, and in 2010 they should be closer to budget, though still slightly over. For the budget presented to the next Conference, travel charges would have to be reviewed and correctly evaluated.

    Income was simple. Most of it came from Member State contributions, with a smaller amount from Corresponding Member fees. In 2009, expected and actual receipts had been broadly similar. The other source of income was from Certificates and the MAA and a small amount from the Bulletin, which was small but in line with the budget. There had also been quite a large amount of exceptional income due to the fact that up to 2007 the full acquired pension rights had been accounted for in the system, but a change in rules from that year had meant that a different accounting method had been used, resulting in its being calculated in 2008 as exceptional income.

    Mr. Magaña repeated that the full accounts for 2008 and 2009, in French and English, and duly certified by the External Auditor, were downloadable on the web site. Mr. Magaña had

    been asked the previous year to review the accounts examined that year, but in fact it was impossible to change any figures after the external audit.

    Mr. Magaña informed Members that the downloadable accounts contained much more information than the charts he was showing them, and that they could also find on the web site a report on the pension system which showed how the accounts would be if they returned to the IPSAS rules for the pension system. He would be speaking later about the pension system and questions.

    Mr. Klenovský said that he was unable to understand how travel expenses could be 50 % over budget in a time of financial crisis. Such costs were usually the first thing to be cut in difficult times, and he would find it difficult to approve such a budget.

    Mr. Magaña explained that, as he had stated the previous year, travel costs had been greatly underestimated in 2004 for the 2004-2008 budget. This was because the estimate had been made before the new Financial Regulations had come into operation. Under the old regulations, travel expenditure had not been identified as such. Some travel expenses had come under meeting costs, along with accommodation, room hire and reception expenditure. Other travel expenses for people other than Bureau employees had been in another account, and Bureau Staff's travel expenses had included only those for meetings other than the CIML.

    So there had not been accurate enough data to budget accurately for travel within the new accountancy rules. Additionally, the Bureau's activities had increased; there had been more need to represent the OIML in different organizations, since they now made an effort to be present whenever possible at meetings of TCs and SCs, of regional organizations, and of liaison bodies such as ISO, ILAC, etc. Choices had to be made, and, in Mr. Magaña's view, in 2008 and 2009 they had tried to meet all these needs. There had also been internal problems with the accountancy, therefore it had not been possible to monitor correctly either the expenses or the implementation of the budget. An accountant had been recruited in 2009, so expenses could now be monitored in real time. Following the 2009 CIML, Mr. Magaña had tried to plan the 2010 meetings in such a way as to limit them to what was strictly necessary. A table of planned meetings could be found in the Working Document. Thus, travel expenses had been over budget because the budget had been unrealistic and monitoring had not been possible at the time.

    Mr. Magaña added that following the 2009 audit he had revised the Bureau's travel guidelines to align it with French administration rules, meaning that for short and medium range travel economy class instead of business class was used. He would ask Members to approve the accounts in the Resolution and to instruct the President to present them at the 14th Conference. Members might hold him responsible for some of the budget's weaknesses but of course the figures could not now be changed.

    Draft Resolution no.25

    The Committee approved the 2008 and 2009 accounts and instructed its President to present them at the 14th OIML Conference.

- number: '9.2'
  title: Financial and management audit
  narrative: |2+

    Mr. Magaña reminded CIML Members that they had been informed the previous year of the first financial and management audit, which had been carried out in July 2009. The report had been issued at the end of August 2009 and had been presented to Members during the closed

    session of the CIML Meeting in Mombasa. The Bureau had been asked on that occasion to circulate the Audit Report to CIML Members, and this had been done. In September 2009, following the report, Mr. Magaña had taken a number of corrective actions, followed by more after the CIML Meeting, in November; these actions had been implemented immediately.

    The next accounts had been ready by February 2010, and the second management audit had been carried out during that month, only six months after the first. This second Audit Report had been sent by the Auditor to the President and to the BIML Director in March 2010. Mr. Magaña had discussed it with the CIML President in June and the President had asked the Director to draw up an Action Plan which would show the main comments of the Auditor and what actions had been taken or would be taken in response to the Auditor's comments. Mr. Magaña had done this and submitted it to the President, who had asked for more details on some aspects of it. This Action Plan had been sent to CIML Members separately from the CIML Document and showed the actions taken before the second audit, and what additional actions were planned following the second audit, with some deadlines for them. Most of these actions would be in effect by the end of 2010, and the rest would in the main result from them. Of the actions taken before the second audit, an internal check had shown that some were already in effect, and the remainder had since been implemented. Internal accountancy audits now took place several times a year. Mr. Magaña would be happy to give more details of the Action Plan if requested.

    Mr. Richard reminded Mr. Magaña that the 2009 CIML Meeting had requested a copy of the July 2009 Audit Report. For the sake of transparency he would like a copy of the second Audit, of February 2010, also to be sent to CIML Members in addition to the Action Plan. He wished to have this request included in Draft Resolution no.26.

    Mr. Magaña could not see any problem with this. The second Audit Report had been in French and Mr. Magaña had had it translated into English and submitted to the Auditors, so it was now in bilingual form. To accompany it he had written a note to the President detailing his comments. He would like this note to be sent to Members together with the second Audit Report. Each Member could then make up his own mind between the Audit Report and the points of disagreement made by Mr. Magaña.

    Mr. Johnston commented that future Audit Reports should be scheduled with enough time between them to allow the Bureau to respond and implement changes. The Resolution would be amended as requested.

    ## Draft Resolution no.26

    The Committee took note of the report concerning the financial and management audit report, of the actions taken by the Bureau and of the Action plan proposed by the Bureau. The Committee instructed its President to send the Second Audit Report, with the Director's comments to CIML Members and to continue the follow-up of this issue and to report at the next CIML Meeting.

- number: '9.3'
  title: OIML Pension System
  narrative: |2

    Mr. Magaña wished to draw attention to some issues on this subject. First, he had been in disagreement with the External Auditor on a number of legal aspects of the OIML Pension System. When they received the full Audit Report, Members would see that the Financial and Management Auditor had considered that eligibility to the OIML System should be strictly

    limited and that some people should be removed from it. Mr. Magaña had consulted a lawyer who had given him the opposite advice. This lawyer had been recommended to him by other international organizations, so Mr. Magaña tended to think his opinion was to be trusted. The legal aspects were that, when someone had subscribed to the Pension System, this had been done under certain conditions which could not be changed in the course of the contract, which seemed reasonable. He believed that these issues were well addressed in this legal document.

    A second issue was that of accounting the assets and liabilities, the rights and assets, for this pension system in the OIML accounts. Members would remember that the International Public Sector Accounting Standards made it mandatory to show the full rights acquired by the personnel in the accounts of the organization. This meant that all the pensions to be paid in the future to retired staff or to future retired staff should be accounted for. This had not been the case under the previous Financial Regulations, so of course, when it came to the new Financial Regulations, all these rights increased the liabilities of the Organization.

    A couple of years previously, Mr. Magaña had tried to interpret this in a way that at that time had been considered acceptable by the External Accountant, that the OIML could decide to account the pension rights not on the full rights but on medium term liabilities, the next five years, for example, of pensions to pay. This had been considered acceptable at the CIML Meeting, and then the 2008 accounts had been done on this basis. The income for that year thus included the excess liabilities. The Auditor had said that this was not acceptable and that the full rights must be accounted. At the same time this meant that the organization had a large liability, to show provision for all future payments to the pension system. The Members had been worried that they could be held liable for this and could be asked to pay these amounts in case of necessity. Mr. Magaña had pointed out at the time that the OIML building, which was recorded as almost without value in the OIML accounts, could, in case of the dissolution of the organization, be sold to pay the liabilities and no demands would be made of Member States.

    The solution now proposed was that all acquired pension rights should be included in the liabilities and the building should be revalued to show that it more than compensated for the rights acquired, and included in the assets. All this was explained in the report which had been distributed. The building had been valued by a property expert at between 2.3 and 2.4 million euros, which was much more than OIML's liabilities for pensions. The draft report on pensions had been sent to Messrs. Mason and Richard, whose comments had then been included in the next version, upon which they were understood to have agreed.

    The proposal was therefore:

    - to account for the full rights acquired among the liabilities;

    - to account for the OIML building at the reevaluated value among the assets;

    - to re-evaluate the building every four years in time to present to the Conference the updated value of the assets;

    - to show appropriate annual depreciation over the four year period, taking account of any possible necessary maintenance work;

    - no longer to offer the OIML Pension System to future staff. Those who were eligible could join the French retirement system plus a French complementary pension, and to any others equivalent compensation would be offered so that they could subscribe either to a private pension system or to a pension system in their country of origin.

    Mr. Magaña invited Mr. Mason and/or Mr. Richard to comment on the proposal.
