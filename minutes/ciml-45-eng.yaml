- number: 8.2.2
  title: 1 Conformity to type
  narrative: |2+

    A proposal had been made by Australia in March 2010 to launch a new work item on conformity to type and to establish a new TC or SC to deal with this issue. Upon receiving these proposals, the BIML had consulted the Presidential Council in May/June 2010. The results of this consultation were given in Annex E of the Working Document. CIML Members and liaison organizations had then been consulted. Results of all this consultation had been posted on the workgroups web site. Comments had been received from twelve CIML Members and one liaison organization (CECIP), and this issue was hereby submitted to the decision of the Committee. Mr. Kool did not propose to go too much into the details of these comments, but a few general conclusions could be drawn:

    - Conformity to Type was a very important issue for the OIML, and should be addressed by a new work item;

    - more investigation was needed in order to define what kind of system the OIML should develop to address Conformity to Type;

    - if a Conformity to Type system was developed, it should be compatible with the European conformity assessment procedures for measuring instruments;

    - many, though by no means all, felt that work should preferably be allocated to, or at least managed by TC 3/SC 5.

    Without going into too much detail, there were three items to look at in the current Meeting:

    1. the main question was whether or not work should begin on Conformity to Type;

    2. later in the Meeting, a more formal decision could be taken as to whether this work should be integrated into TC 3/SC 5;

    3. the suggestion that the Seminar on the subject proposed to coincide with the 2011 CIML should be taken as a starting point for work on Conformity to Type.

    Mr. Ehrlich considered that Mr. Kool had given an accurate summary of the comments received. He endorsed the holding of a Seminar on Conformity to Type but felt that it might be better to have the Seminar before deciding whether to initiate an OIML project in this regard. The inquiry had highlighted the fact that this was a complex issue, dealt with in different ways around the world; there was no obvious solution and he felt that a lot could be learned from the Seminar. He thought that perhaps a work group could be established for the project within TC 3/SC 5. He believed there was a connection, though it was not clear whether this needed to be the case. Many good points had been made that perhaps in the end it could be lined up with a CTT program that was separate from the type evaluation program and the Certificate System, but this was not clear. The best thing was to start the work within TC 3/SC 5 and then if necessary split off the CTT work later.

    Mr. Lindlov was doubtful as to whether the OIML should go into product certification schemes; thought and discussion were indeed necessary. His second point was that it might also be useful to try to spot what kinds of systems were used around the world. Though not an EU Member, Norway was familiar with the European system, but there were probably other systems in other places. He also felt that ILAC/IAF ought to be more directly consulted, as it appeared that they had not yet commented.

    Ms. Van Spronssen also had doubts as to whether this was the right way to go, and felt that the Seminar was a good idea to find out. She suggested stepping back and looking at the legal implications of manufacturers and bodies other than the OIML who were testing instruments being able to put the OIML mark on the instrument. How could the quality of instruments bearing the OIML mark be guaranteed? Before putting a lot of work into a scheme of this kind, research should be done into the legal aspects.

    Mr. Issaev said that Russia had about 20 years' experience of CTT arrangements. These had nothing to do with certification for something else, because the body for primary type approval of measuring instruments was responsible for this CTT testing for a fixed length of time, for example five years. CTT tests were reported to the same board which dealt with type approval tests. There was no special body or other certification system. And of course it was a very important activity, which would be developed also in COOMET. So Russia strongly

    supported the idea of holding a Seminar, or at least some discussion, on CTT in Prague. In their opinion, the matter should be located within TC 3/SC 5, and not in some newly created subcommittee.

    Mr. O'Brien considered that this was an important new work item. His preference would be to try to set up a working group before the following year's Seminar, so that some preliminary discussion could take place before it. Ideally this TC or working group would be set up at the current meeting so that some preparatory work could take place. He appreciated that it was a complex issue, but it had now been under discussion for some time and work should be started.

    Mr. Kool considered that it was a good idea to set up an ad hoc group to prepare the program for the Seminar and take into account the issues that had been mentioned such as legal issues, what kind of systems existed, what kind of systems were compatible with existing OIML systems, etc., to define programs, not just by the BIML but by an ad hoc working group. Mr. Kool asked for Members who might assist in this.

    Ms. Lagauterie said that if there was to be discussion of Conformity to Type, it must not be limited to the time of manufacture but should also deal with upkeep of it once the instruments were in service. Some of France's comments had already been mentioned in the summary and she drew attention to the others they had sent. If there was to be an ad hoc group, France would like to participate in it.

    For CECIP, Ms. Martens said that she wished to bring another aspect into the discussion. The question that had to be dealt with was, what benefit would there be for a manufacturer in joining this voluntary system? The cost would be high, whatever way it was done. Could fair competition be guaranteed? A manufacturer who put instruments onto the market under the expensive OIML scheme would have competitors who had never heard of the OIML who could produce instruments much more cheaply. It was not enough to have a good CTT system, and if an answer could not be found for this question, she did not see why any manufacturer should follow such a CTT.

    Mr. Issaev said that in Russia Conformity to Type was a legal metrology procedure and not a manufacturing procedure, so there was no special CTT system, but there was a rule which obliged manufacturers to present measuring instruments for five years for CTT testing. It was not a separate system but legal metrology supervision.

    Mr. Kool remarked that it was clear that there were already different systems in place in the world.

    Mr. Harvey said that the CIML had been looking at this matter for many years. In the Seminar in 2002 in St Jean de Luz there had already been papers that mentioned Conformity to Type and recommended that something be done about it. Since then, a working group had been set up, holding its first meeting in 2005. There had been four working group meetings but not much progress had been made because there were some fairly intractable issues, one of which was the funding issue. Initially the idea had been, in 2004, that the OIML was saving manufacturers so much money with its certification scheme and the MAA, for which in various countries they would otherwise have paid so much more, that they could be asked to contribute to the CTT program. But they had not got far. Recently in Australia, there had been some traction in the utility metering area. Particularly the water meter utility companies bought a large number of meters, and each did a little conformity testing. There might be facilities in, say, Sydney, others in Victoria, others in Perth, each doing the same sort of

    conformity testing. The OIML had suggested this testing be centralized and the NMI did the testing and the users of the instruments contributed instead of each paying separately. The authorities had shown interest because this was less expensive than their current way of doing things. Funding remained a problem; what was being proposed was a voluntary scheme which would be an additional expense on top of the OIML Certificate System or the MAA.

    So there were two issues: was work needed on Conformity to Type? Mr. Harvey felt that it certainly was; he fully supported the idea of a Seminar to explore the possibilities. He also took note about what the Netherlands had said about any legal aspects which was always necessary when something was internationalized that was normally handled within one economy.

    The other question was where the work should be carried out. Mr. Harvey had some views about this which could be read in the documents. In his opinion, it was a separate issue from the MAA, which was really nothing to do with type approval, it was to do with the acceptance of test results. There were various systems for accepting test results. Mr. Harvey would be concerned if Conformity to Type was done within the same framework as TC 3/SC 5, since the main purpose of Conformity to Type was to assure the conformity of production instruments with the type. He did not think it should be distorted for the purposes of the MAA, which at the moment was looking at ways of accepting manufacturers' test results. If they had a good third party and effective Conformity to Type system, it might be possible to accept manufacturers' declarations of conformity. All options needed to be explored within the framework of a Seminar.

    Mr. Harvey was in agreement that planning should start at once and either a working group or a TC would be a good place for this to happen.

    Mr. Ehrlich reiterated his earlier comment that he believed there was a consensus for conducting the work within TC 3/SC 5. He thought that Mr. Harvey's concerns about distortion were unfounded, and that, if later it were found to be preferable to do the work in a different subcommittee, that could be done at that point. He endorsed New Zealand's proposal to have a working group to plan the seminar and begin to think about the future of this work. In his position as Secretariat and no longer Co-Secretariat of TC 3/SC 5, Mr. Ehrlich would begin to identify Members who were interested in participating in this working group, namely Mr. Harvey, Mr. O'Brien and some others.

    Mr. Vinet said that this was important work, and clearly linked with the MAA. In planning the seminar, care must be taken that the framework for the CTT work would be sustainable. The MAA was voluntary and growing; if CTT were added, it would be necessary to look at the legal aspects and at any effect it might have on the MAA, because this would be voluntary, and manufacturers must not be deterred from applying for the MAA.

    Mr. Carstens wished to support New Zealand's proposal. Regarding TC 3/SC 5, if the new Directives were adopted there would be no argument as to where the work should go, it would be set up as a new project.

    Mr. Han said that in his opinion legal metrology authorities were responsible not only for type approval but also for instrument conformity. There was a good conformity system in Europe but the OIML needed to set up some sort of worldwide instrument conformity system. He therefore supported the setting up of this new work item, and study of ways to make it operate smoothly.

    Mr. Kool summarized the feeling of the Meeting as being that Conformity to Type was a very important issue and that the OIML should address it; however, at the moment, there was not a consensus that the work should be started immediately. It would therefore be better, in the form of a Seminar, to investigate the issues which had been mentioned, to see whether or in what form the OIML should address the issue of Conformity to Type, whether by a product certification scheme or by another method. The legal, financial and other issues which had been mentioned needed to be taken into account. There also seemed to be agreement that the Seminar, to be organized by the BIML, would be prepared, in its program, speakers, etc., by an ad hoc working group. He asked whether New Zealand would be prepared to convene and chair this working group, which could, if preferred, operate electronically and not necessarily by way of meetings. If this proposal was agreed, there was no need to take an immediate decision as to whether to set up a new work item, or on Australia's two proposals. If there were no objections, he would draft a Resolution for decision on Friday.

    Mr. Schwartz agreed to this and suggested that the working group should be identified in the course of the current Meeting. Germany would be willing to participate.

    Mr. Kool asked Mr. O'Brien whether this working group could be formed during the next two days and a report made on Friday. Regarding dates, he had asked Mr. Klenovsky whether it would be possible to arrange the Seminar in conjunction with the 2011 CIML Meeting. There were, however, a number of events during that period. The CIML Meeting would take place before the GCPM Meeting that year, so it had originally seemed best to hold the seminar during three days of the week before the CIML. However, in that same week there was the Metrology Congress in Paris and, on the Thursday and Friday, the general assembly of ISO/CASCO. In order to attract the best speakers in the field of conformity assessment, product certification, etc., this would not be a good choice of timing. Consideration therefore had to be given to the question of whether it was feasible to run the Seminar in conjunction with the 2011 CIML Meeting or whether a completely different date would be preferable. This point was merely for information.

    Draft Resolution no.19

    The Committee,

    Considering the proposals by its Member for Australia for a new project and a new (Sub)Committee on Conformity to Type (CTT), and

    Considering the comments received during the consultation of the members of the Presidential Council and the subsequent consultation of all CIML Members and relevant liaison organizations,

    Resolves that a decision on the proposals shall be postponed until after the conclusions of a seminar on CTT, mentioned in Resolution no.15, have become available; and

    Instructs the Bureau to facilitate an electronic working group, chaired by the Member for New Zealand, with the objective to prepare the program for that seminar, taking into account the issues raised in the comments received.

