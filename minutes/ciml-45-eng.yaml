- number: '6'
  title: 1 Report of the Facilitator on Developing Country Matters
  narrative: |2+

    Mr. Magaña gave the floor to Messrs. Seiler and Dunmill for this item.

    Mr. Dunmill said that most of the report on developing country activities would be given by Mr. Seiler, but he wished first to mention a couple of points regarding the activities of the BIML. This concerned mainly the establishment of and ongoing work with AFRIMETS, the Intra-Africa Metrology System. This project, as he had reported the previous year, was being carried out in collaboration with the BIPM and UNIDO; UNIDO had a sponsor for a large amount of funds from Norway to help with the development of this project. Mr. Dunmill had attended steering group meetings of AFRIMETS. It had been decided, and planning was now well advanced, that a metrology school, based on the BIPM's metrology summer schools, should take place in Nairobi in February 2011. This would cover both scientific and legal metrology issues, and they hoped that it would be well attended by younger metrologists from the African region.

    Regarding UNIDO, Mr. Dunmill said that under the joint MoU with UNIDO, the BIPM and the OIML, there had been ongoing work. As mentioned earlier by Mr. Henson, Messrs. Henson and Dunmill had taken part in a World Metrology Day seminar held at UNIDO HQ in Vienna. This had been well attended and had gone well, promoting metrology. He also referred to the publication of a book which he had mentioned the previous year, A Handbook of Industrial Metrology, the writing of which had been sponsored by UNIDO. This book was supposed to have been verified by both the BIPM and the BIML and published quickly, as Mr. Dunmill had mentioned the previous year, but in fact there had been delays, which he and Mr. Henson would look into. He hoped it would soon move ahead; it was another sign of the good cooperation between the BIPM and the BIML, with the help of UNIDO, in providing some concrete assistance to Developing Countries.

    Mr. Seiler said that it was a pleasure for him to report on developing legal metrology as part of his work as OIML Facilitator. This task had been assigned to him at the 2008 CIML Meeting in Sydney; he would report on some general results. Besides giving this summary, he wanted to show the influence of OIML Recommendations, to review the input of OIML Documents and Recommendations, and to stimulate discussion and further activities in perhaps developing some new Recommendations, and to get some mandate as to which direction the OIML wanted to take.

    Legislation seemed an appropriate starting point in speaking of legal metrology. The OIML's contribution to this was OIML D1 Elements for a Law on Metrology, the 2004 issue, which was again under revision; its new essential elements were mostly requirements for

    traceability, the OIML Certificate System and the MAA, and the possibility of delegating work to third parties. Of course, there was also D2 Legal units of measurement and the vocabularies on metrology and on legal metrology. This was a good basis for drafting national legislation and national laws. But there were some weak points, as could be seen in such drafts. These concerned wording such as "the legal units are those of the S.I. All measuring instruments used in trade, health, safety and environmental protection must be verified"; or phrases like, "Measuring instruments must be traceable to the national metrology institute". Everybody present would realize that these strong words created problems in practice, as units outside the SI had to be admitted. It was unlikely that all measuring instruments in each of these fields could be supervised and regulated for an area of trade, health, safety and environmental protection. With the possible exception of the NIST, no national institute would be able to provide traceability for all of these measurements. Strong wording created weak points and in spite of clear messages in the OIML publications, it was difficult to persuade the people responsible either to soften this wording or to introduce empowerment for exemptions from it. On the other hand, much detail could also be regulated in subordinate regulations or directives.

    For measuring instruments, the OIML provided more than a hundred Recommendations which could be used. But in reality, developing countries had some problems with these, because performance requirements were mainly for up to date technologies and not easy to apply to the older technologies which were very common in most of the developing countries. Sometimes, Mr. Seiler continued, the interpretation and the application for instruments using old technologies was very difficult, and these Recommendations had to be adapted to local needs, and also supplemented by national regulations concerning verification or reverification periods.

    Besides Recommendations for measuring instruments, there were also international Documents, which were informative in nature and intended to improve the work of the metrology services. There were Documents such as OIML D3 Legal qualification of measuring instruments from 1979, D19 Pattern evaluation and pattern approval from 1989, and D20 Initial and subsequent verification of measuring instruments and processes from 1988. So it could be seen that these Documents were quite old, and perhaps needed updating.

    For measurement standards, there were two Documents, D 8 Measurement standards. Choice, use, recognition, conservation and documentation from 2004, and D 23 Principles for metrological control of equipment used for verification from 1993; so there was some duplication and some small contradictions, which sometimes made it confusingly difficult to know which was the best solution. There were other Documents, such as D 11 General requirements for electronic measuring instruments, a very new one, and D 31 General requirements for software controlled measuring instruments, also addressing advanced technology. There was also a very important Document, D 14, Training and qualification of legal metrology personnel. Another Document which was very important for practical work was D 9 Principles of metrological supervision, setting out the principles of these activities. Even the titles were very close, and D 16 Principles of assurance of metrological control as well needed revision, and perhaps also D 9 should be taken into account for revisions.

    In summary therefore, with regard to OIML Documents, Mr. Seiler stated that these were of course very informative, but they often overlapped, and sometimes, as had been seen, updates were necessary. They were very helpful if you already had an established metrological service, but if you were starting to build up such a service they did not give the complete

    picture; not all major topics were covered. In his experience also, some Documents were still missing. It would be useful to have one on how to develop legal metrology, and perhaps another on the benefits of legal metrology together with the necessary investment, and further details on the operation of legal metrology services.

    With regard to developing countries, legal metrology activities were very limited, as was quite natural in the beginning, and they were mainly concerned with mass and volume for commercial transactions. The enforcement of the regulations could be assured only in part, both geographically and in a regulatory sense. Although regulations existed, it was not always possible to enforce them. Little interest or support came from many of the ministries responsible and there was little or no information about legal metrology for the public. In consequence of this low profile of the legal metrology services there was little awareness or interest from the public.

    The reason for having an OIML Document on developing legal metrology would be, Mr. Seiler said, that reference to such would be very helpful in convincing governments. If the head of legal metrology could show that the OIML recommended this or that for developing legal metrology, it would be harder for the government not to take these arguments into account. Such a Document should also give guidance on how to set criteria and priorities and to estimate the necessary resources and benefits.

    Mr. Seiler showed a sketch demonstrating that it was necessary to set priorities for the introduction and enforcement of legal regulations. It was necessary to define the measurement that was to be regulated and the field of application. Before this was done, there should be investigation into criteria, the availability or otherwise of resources and the significance of the field of application. So it was necessary to fill in a matrix, as shown in the sketch. For instance, if the benefits of a scheme were high, it might be good, but then it might be discovered that a lot of investment was needed, and the availability of these resources would be low, especially if there were no qualified staff. It was necessary to take other criteria into account and to come to a realistic solution, in order to be in a position not only to regulate this field but also to implement it. Such a Document on the benefits of legal metrology would therefore be very helpful. To convince governments, it was necessary to present facts.

    In this regard there was the Birch Report (OIML E 2:2003), in which many examples could be found. But it was not sufficient to take the Report, it was also desirable to select those examples which had parallels in the country and from personal experience and bring these to the attention of the government. Other Documents might also be needed regarding staffing and qualifications. One such Document already existed but this needed to be extended in order to provide job descriptions for the Director, to set some minimum requirements for his qualifications so that candidates would not be selected for their political standing. It might be naive to believe that such a Document could have any impact, but at least it could be of assistance in giving some guidance on professional ethics. A key word was corruption and how to avoid it.

    Another important point was that very often legal metrology inspectors acted as policemen. This was sometimes very necessary but at the same time they should be partners of the community, be it of traders, of other regulatory authorities or enforcement authorities. So some guidelines on professional ethics would be useful.

    There was also an urgent need for verification procedures, documentation of results and statistics to draw conclusions from the results of the work, the handling of infringement, the supervision of third parties, and, last but not least, public relations. Legal metrology officers

    should also carry out some activities in this regard. Partners who should be contacted and informed included ministries and other regulatory authorities, the media, consumer associations, and Chambers of Commerce and Industry.

    Useful public relations activities, in terms of means and possibilities, included preparation of press releases, information leaflets used during verification work to inform the owner of the measuring instrument about his duties, how to maintain the instrument, and so on. Personal contacts could be used, or open days could be created for work to be demonstrated; or the Metrology Days could be used to demonstrate its benefits. The content of public announcements such as this might include certain new activities, special benefits of legal metrology giving very concrete examples, detection of fraud. Results should be given to the media, which was usually keen to publish such information. This would show the community that somebody was looking after the behavior of trade organizations and traders. New activities, new equipment or results of regional and international cooperation could also be made public through the media.

    Mr. Seiler's recommendation was that the OIML should prepare comprehensive and consistent Documents describing all major aspects of legal metrology. This would not be easy; first a decision had to be taken as to what was really necessary, what could be reused, what needed to be rewritten and what required elaboration. He was convinced, however, that this could be helpful not only to developing countries. To underpin this point, he said that although the OIML stressed the importance of legal metrology for health, safety and environmental protection, the majority of its Documents still concentrated on trade and consumer protection. Even this sector was under continuous development, as had already been seen and would be further demonstrated in the course of the current meeting. As an example, Mr. Seiler had checked the results of the inquiry among OIML Member States about the implementation of Recommendations, and quite a number of these were only implemented by four or five Member States. These Recommendations mainly concerned environmental protection; the OIML and especially its Members needed to think about what could be done in legal metrology, for legal metrology and to widen its scope. Mr. Seiler thanked Members for their attention.

    ## Mr. Johnston asked for questions and comments.

    Mr. Klenovsky said that he had been responsible for developing Documents D 9 and D 16 which had been mentioned by Mr. Seiler. He was not absolutely persuaded that it was necessary to produce a new set of Documents, as he believed that their contents simply described all the current arrangements with their pros and cons and covered all the areas, apart from additional standards and regulations of measurements, which would be present in any reasonable metrology law. The two Documents gave a number of examples and justifications and seemed to him to cover the ground satisfactorily.

    Mr. Harvey said that this matter had been raised at the Round Table for Regional Metrology Organizations, on which occasion he had mentioned that within the APLMF a number of guidance documents had been created, the second one of which, under the chairmanship of New Zealand, provided the sort of information which might be useful to developing economies in informing their governments.

    Mr. O'Brien said that he had recently given a copy of this document to Mr. Seiler. The APLMF had decided that it wanted a document which would explain legal metrology to people who were not legal metrologists. The document contained pictures and very simple explanations of some of the complex areas of legal metrology, so that developing economies

    were able to present that to ministers and others within their governments and in the wider community, and in this way to explain some aspects of it. The document was available in PDF form on the APLMF web site, and a number of copies had also been printed off. The people responsible for legal metrology in a particular economy would put their logo on the back page before presenting the document. This had been produced in a small working group within the APLMF, which had allowed representatives of a number of economies to put forward their ideas and explain some of the terms. For example, Mr. O'Brien had thought the term "stakeholders" was well understood but it had transpired that this and similar terms were not well understood within the group. Both developing and developed economies had contributed to producing the document, which was consequently in a form that all of them could use.

    Mr. Birch told Members that his experience in working with developing countries in legal metrology and other areas had taught him that each country had its own specific needs and care had to be taken not to try to transfer a packaged metrology system to countries without taking into account the nature of the economy and of that particular society.

    He had always found that, even in countries without any metrology system, of which he had encountered several, there was always a lot of measurement going on, and a good start was to do an audit of the measurement that was taking place there. To what extent measurement was good or in need of improvement was a good starting point for setting priorities for designing a metrology system for that particular country. So he thought it would be useful to have a brief document showing how to do a measurement audit in a developing country, highlighting all the different types of measurement that took place, because quite often people did not realize that measurement was occurring in their society. The leaflet should also show how to identify the costs and benefits resulting from improving those measurements.

- number: '7'
  title: 1 General report
  narrative: |2+

    Mr. Magaña pointed out that a general report on the activities of the Bureau was included in the working document sent to delegates. He would try to summarize its points briefly:

    - as usual, the Bureau had produced a number of publications. There had not been a great number of these but nevertheless they had been dealt with in a timely manner;

    - there had been changes in the web site, in particular some new pages, about which Members had been regularly informed. Implementation of databases on the web had continued;

    - use of the workgroups pages by TCs and SCs had increased, and more and more TCs and SCs were using this facility to post documents and make them available to their members;

    - thanks to Spanish colleagues in the CEM, the Spanish version of the web site had been updated and completed and was back on line. Mr. Magaña hoped that this might assist in raising awareness of the OIML in Latin American countries;

    - a number of TCs had been active and the Bureau had followed their work closely especially in the case of those TCs which were of strategic importance, for example

    TC 12 on electricity meters. Australia had done a very good job on this and the Bureau had contributed where possible;

    - the Bureau had had two co-secretariats in the past: for TC 5/SC 2 Software, Samuel Just had resigned at the beginning of the year so it had not been possible to continue with this. Regarding TC 3/SC 5, Régine Gaucher had also resigned from the Bureau in September to take up a post in the Ministry of Economy, Finance and Employment; it had been agreed that if possible she should attend the October 2010 meeting of this SC, but the Bureau could not continue its co-secretariat after that, for reasons of human resources and also because, in Mr. Magaña's opinion, it was not the role of the Bureau to write Recommendations. Other than in exceptional circumstances, Recommendations should be developed by Member States, who were, after all, their users and therefore the best qualified to identify what countries required. The Bureau would of course continue to support and contribute to TCs/SCs in whatever ways they could;

    - implementation of the MAA had continued and would be reported on in more detail at a later stage - a new leaflet had also been produced by the Bureau;

    - some work had been done on revising the Directives;

    - liaison activity continued to be regular; a list of work groups and liaisons could be found on the OIML web site. There were many key liaisons and it was of course impossible to be in constant touch with all of them, but the BIML did its best to keep in contact with them;

    - the Bureau had contributed to the revision of D1 Elements for a Law on Metrology; Mr. Kochsiek would give a presentation on this later. It was progressing well and he believed it would address the needs expressed by Mr. Seiler and also the previous day by the Regional Bodies;

    - the Bureau had also organized the Presidential Council and CIML Meeting, preparing agenda, working documents, etc., which was an ongoing annual commitment.

    Draft Resolution no.13

    The Committee noted the report on the activities of the Bureau and requested the Bureau to continue providing web tools for the mutual information of Regional Bodies, in particular concerning Developing Country issues.

    Mr. Magaña asked Members to indicate which items they would like to select as requiring more attention from the Bureau.

    Mr. Ehrlich asked to have it recorded that while the Bureau would not continue to serve the two TC/SCs mentioned by Mr. Magaña in a co-secretariat role, it was very important, especially for TC 3/SC 5, because of the nature of its content, that the Bureau should continue to provide considerable support to the Secretariat for that activity.

    Mr. Magaña confirmed that the Bureau would continue to provide support, for example in the guides for the implementation of accreditation in different fields, guides for the implementation of ISO 9000 for manufacturers and so on, and for certification of products. This was quite important, both for the MAA and also for other projects such as pre-packages or conformity to type. It was necessary to have such guides. The Bureau still had competences to do this. Some Members might have feared that the Bureau was losing all its competences

    on accreditation, but this was not the case. They still had enough to support the work, and not only the Bureau but also some Members also had very strong competences in accreditation, and Mr. Magaña hoped that these Members would have the resources to contribute to this work.

    Mr. Issaev wished for the inclusion of activities contributing to strengthening coordination of Regional Metrological Organizations related with developing countries.

    Mr. Magaña said this was being done but more resources could be given to it. The Bureau also tried to facilitate the exchange of information between regional bodies on different issues; it had collected translations of various publications and created a new page to house them - a number of such translations were now available. A work group on training, presented by Mr. Magaña the previous day, had been put on line, also for the use of regional bodies. Providing tools for the exchange of information between liaisons was one of the duties of the Bureau and should be mentioned.

    Mr. Issaev wanted the developing countries aspect to be emphasized.

    Mr. Magana agreed.

    Mr. Klenovský expressed his regret at the departure of the two Bureau employees, and his gratitude for the contribution they had made to the work of the OIML.

    Mr. Magaña said that these compliments would be passed on.

    Mr. Ehrlich seconded the above sentiment.

    Mr. Magaña said that the Resolution would be drafted during the evening for Members' approval. He also wanted to report on a couple of BIML issues. The first was financial and management issues. There would be discussion later on the financial audit; corrective actions had been necessary following the audit in July of the previous year, not long before the CIML Meeting. A number of these had been taken in September 2009 and others had been implemented just after the CIML and procedures had been elaborated. The next audit had taken place early in 2010 and its results had been sent to the CIML President, who had asked Mr. Magaña to prepare a work plan and an action plan. The plan had been drawn up and discussed with the President and then sent to CIML Members. It had not been posted on the web site nor included in the Working Document, but all CIML Members should have received it.

    Since the last Committee Meeting, the Bureau had been reorganized in an attempt to give it more consistency. The roles of the two Assistant Directors had been carefully defined, and the majority of the other members of staff now reported to them instead of directly to the Director.

    There was to be a revision of the Staff Regulations, but Mr. Magaña explained that there had not yet been time to begin this. The first internal working document would be drawn up very shortly and discussed within the Bureau, to identify the items that needed amendment, and then legal experts would be consulted. There was a similar situation with the revision of the Financial Regulations, which was also due to start shortly. Both revisions should be ready for the 2012 Conference, but were difficult issues.

    Concerning the OIML Pension System, the previous year's CIML had asked Mr. Magaña for a report, to be discussed with Messrs. Mason and Richard. Mr. Magaña had prepared such a report, which had passed several times to and fro between them and finally been agreed. This

    would be discussed more fully under item 9.3, and would, he believed, prove acceptable to all.

    An accountant had been recruited at the BIML the previous year, just before the CIML Meeting and this meant that the Bureau's accounts were now up to date and were processed in real time. All accountancy records would be completed by the beginning of the year.

    Following Samuel Just's resignation from the Bureau in January, Luis Mussio had been recruited, and would begin work at the Bureau on October 1. Mr. Mussio had recently been working with the BIPM as the JCRB Executive Secretary and was competent in scientific metrology; he also had experience of legal metrology in Uruguay and very good experience of accreditation and mutual recognition, although this was in another field.

    As Ms. Gaucher had also resigned there was another vacancy in the Bureau, but Mr. Magaña had decided not to start filling this position before the CIML Meeting, as its outcome might change the Bureau's needs and the profile of the person required.

    There had been a dispute on the non-renewal of a contract. A secretary who had been working at the Bureau had arrived at the end of her contract after having been on sick leave for more than two years. As the BIML had found that they could manage without her, they had phased out this position and had not renewed the contract, but they now found themselves with a dispute which had lasted a long time and in the course of which they learned a lot about a number of legal issues. It was hoped that the issue would shortly be resolved.

    Mr. Magaña reminded Members that the various financial issues would be dealt with in more detail under item 9, and asked if they had any questions or comments.

    Mr. Richard had two questions concerning the composition of the BIML staff. He agreed that the recruitment of Mr. Mussio was good; he would like to hear what experience he had had in legal metrology and what his job description was: was it the same as for Samuel Just?

    Mr. Magaña replied that Mr. Mussio's job description was not the same as Mr. Just's. Mr. Magaña had left Mr. Mussio's CV in his office so could not give exact details of the legal metrology experience he had had in LATU, the Uruguay metrology authority. He had drawn up a number of regulations, he had been responsible for approvals of technical laboratories, both scientific metrology and testing laboratories. LATU was responsible for metrological evaluations in Uruguay.

    Regarding Mr. Mussio's job description, it had been considered that his extensive experience of accreditation was very important. He was currently working with ILAC in his job at the BIPM. Mr. Magaña had considered that Mr. Mussio would be of help in supporting TC 3/SC 5 in the implementation of the MAA accreditation. They had not yet prepared a very detailed job description as the job would be discussed with Mr. Mussio and defined more precisely after the CIML, when he arrived in the Bureau. There were several different things that he was qualified to do, and also the work in the Bureau would have to be reorganized according to the decisions of the Committee in the current Meeting.

    Mr. Issaev asked whether it was the case that Mr. Mussio had a doctor's degree.

    Mr. Magana confirmed this.

    Mr. Henson said that he was not sure whether it was appropriate for him to comment, but, having worked alongside Mr. Mussio since he had arrived at the BIPM in April, he could assure OIML that they had recruited an absolutely excellent candidate.

    In concluding this item, Mr. Kool reiterated that some advances in the OIML web site had been mentioned the previous day, one of them being that there was once again a Spanish language version of most of the pages. He wished to give recognition to the assistance received from the Spanish Institute of Metrology and thanked them warmly for doing the work.

