- number: '5.1'
  title: New Member States and Corresponding Members and perspectives
  narrative: |2+

    Mr. Magaña explained that in 2009, Colombia had been in the process of ratifying the OIML and the BIPM Treaties. He had met the Colombian Ministry of Trade and the rapporteur in the Colombian Senate in June 2009 and the individuals in charge of this issue in the Colombian Ministry of Trade had changed twice since that period; however, the Bureau was endeavoring to obtain an update on this issue (jointly with the BIPM).

    Venezuela had informed the Bureau in 2008 of its intention to join the OIML but here again there had been staff changes and Mr. Magaña reported that the Bureau had not yet been able to re-establish the contacts.

    Azerbaijan was considering becoming an Associate of the CGPM and an OIML Corresponding Member.

    Some other countries were also considering joining the OIML, but Mr. Magaña noted that contacts were still at a very preliminary stage so it was too early to give information at the present time.

- number: '5.2'
  title: Outstanding arrears of Member States and Corresponding Members
  narrative: |2+

    Mr. Magaña explained that the situation of Member States' and Corresponding Members' arrears was shown in the financial report.

    He informed delegates that no Member State had arrears of more than two years. Globally, arrears were decreasing and contributions had been more and more punctually received.

    Concerning Corresponding Members, at the beginning of 2010 six of these had had more than three years of arrears for their Corresponding Member fees. Mr. Magaña had sent them a letter asking them to improve their situation as soon as possible and in any case before the end of August. Three of them had done so, but three others had not replied. Mr. Magaña had sent these a letter striking them off the list of Corresponding Members (Comoros, Nicaragua and Tajikistan) so there were now three fewer Corresponding Members than previously.

    Members might remember that Zambia had been struck off the list of Member States because its arrears were too high. Although Zambia was no longer a Member State, it was continuing to reimburse its debt, which was a gesture that was worthy of mention.

- number: 5.2.1
  title: Request of Guinea for re-admission
  narrative: |2+

    Guinea had been struck off the list of OIML Member States in 1990 because its arrears exceeding the maximum allowed. It had not been a Member since that time and its debt had remained in the OIML accounts - indeed Guinea still had that debt. It had sent a letter to explain its economic difficulties, and making two requests: first, to be readmitted, but as a Corresponding Member; Guinea said that it had made arrangements for payment of the Corresponding Member's fee. This issue might be submitted to the CIML Meeting. The second request concerned the possibility of reducing or writing off its debt; this was an issue for the Conference and not for the CIML and therefore not on the present agenda. The question was, should Guinea be readmitted as a Corresponding Member or not, in view of the fact that it had a debt?

    General opinion at the Presidential Council had been that it should not be readmitted too easily as a Corresponding Member without imposing any conditions, because this would set a precedent. Zambia, for example, might consider it to be unfair.

    Mr. Magaña proposed that Guinea be readmitted as a Corresponding Member, provided of course that it paid the Corresponding Member's fee, plus some payment towards its arrears, which the Director could be allowed to negotiate with this country. The matter of whether to cancel its arrears or not would be discussed at the next Conference. Mr. Magaña warned that the following Draft Resolution had been written before the Presidential Council meeting and was therefore not really in accord with his present proposal on the matter:

    Draft Resolution no.12 (original version)

    The Committee, considering the request made by Guinea, decided that:

    - Pending a decision of the Conference (in 2012) concerning the debt of Guinea,

    - Guinea is allowed to be re-admitted as an OIML Corresponding Member, providing that Guinea pays its Corresponding Member fee, and, by arrangement with the Director, makes some payment towards its outstanding debts.

    - The payment of arrears is suspended until the Conference has made a decision concerning the debt of Guinea.

    - The Committee recommends to the Conference to take account of the past situation of Guinea and to consider its debt).

    Mr. Magaña said that this was a difficult issue and asked for Members' comments. They had seen Guinea's letter. He added that the same issue, for Guinea and for Lebanon, had been raised a few years previously at the Conference, and that general opinion had then been that they should not too easily accept such an application.

    Mr. Schwartz said that although he personally understood the difficult situation Guinea was in, he doubted whether he could convince his ministry that it should follow the OIML Resolution; the OIML must insist on full reimbursement as all countries must be treated equally.

    Mr. Harvey concurred. Similar discussions had taken place previously with regard to Zambia and Cameroon and it had always been said that countries must pay their debts. He considered that re-admitting them for two years and then rescinding this when the Conference decided they must pay the arrears was not a good thing to do. He did not therefore support the Resolution.

    Mr. Mason considered that not enough weight was being given to the fact that Guinea had been excluded from the OIML for 20 years. It was being equated with Zambia, which had been suspended only two years previously. He thought that for a country which had been excluded for such a long time, a case could be made for treating it differently on the grounds that it had suffered the consequences for long enough. He asked to be reminded of how long other countries had been excluded for. Cameroon had been mentioned; had it been excluded for as long?

    Mr. Magaña replied that Cameroon had been excluded one year previously. The only two countries which had been excluded twenty years ago were Guinea and Lebanon. Now they wanted to come back as Corresponding Members; the question was whether they should be permitted to do so or not, and if yes, under what conditions.

    Ms. Hockert understood Mr. Mason's comment. She felt that "exclude" was a very strong word, and, in the interest of attracting a broad membership, she thought that the proposal to begin paying back arrears as a condition for considering Corresponding Membership could be considered, although her support went rather to the comments of the German Member, which were based more closely on Article 30 of the OIML Convention, which stated: "A Member State officially regarded as having resigned may be readmitted at its own request on condition that it settle its unpaid subscriptions due at the time it was struck off". This would be the arrears, which, she believed, in this case amounted to 36 000 euros. The Convention

    continued, "Such retrospective contribution shall be calculated on the basis of the subscriptions for the years prior to its re-admission. It shall thereafter be considered a new Member State, but the entry fee shall be calculated taking its previous subscriptions into account, in proportions to be fixed by the Conference". It seemed to her therefore that the Convention was clear on that point, and unless the OIML was prepared to amend the Convention, some payment of arrears was necessary in order for this to be a consideration.

    Mr. Magaña agreed. In fact, the Convention referred only to Member States. The position of Corresponding Members was not very clear. Countries were accepted as Corresponding Members when they agreed to pay the annual fee, which was about 10% of the base contributory share, and there were not many conditions, but in the case where a Member State resigned or was struck off, it should not be allowed to re-enter by the back door by too easily being allowed to become a Corresponding Member. It might be possible to accept Guinea as a Corresponding Member if it began repayments, but the risk was that if it stopped reimbursing its debt after one year, it would have to be struck off again, so it was uncertain that the situation would remain stable.

    Mr. Harvey said that experience up to the present showed that every time the OIML had allowed Members to re-enter on condition they repaid their debts, it had not worked. Payments had not been forthcoming and three years later they had had to be struck off the roll. Why should the OIML go through this again?

    Mr. Miki said that Japan considered that the rule should be adhered to as strictly as possible. Countries seeking re-entry should at the very least offer clear plans of how they intended to repay.

    Mr. Magaia stated that there seemed to be a consensus that Guinea should not be accepted as a Corresponding Member in the present situation because it was not in accord with the rules and in all likelihood would not be very sustainable. He proposed an amended Resolution saying:

    Draft Resolution no.12 (amended)

    The Committee rejects the request of Guinea and recommends Guinea to reimburse its arrears as a condition of being readmitted.

    Mr. Schwartz suggested encouraging Guinea to repay a certain amount to show good will, prior to the decision of Conference. This way the Conference need not wait for its good will to be shown; if, for example, 1/5 of the arrears had been paid, the Conference could take this into account in its decision.

    Mr. Magaña said that something of the sort would be inserted in the wording, while avoiding any appearance of pre-empting the decision of the Conference. They could say something along the lines of:

    Draft Resolution no.12 (re-amended)

    The request of Guinea is rejected but Guinea is encouraged to consider reimbursement of some significant part of its arrears before sending a request to the Conference.

