- number: 8.1.5
  title: Training of TC/SC Secretariats
  narrative: |2+

    The Bureau undertook to provide training for TCs/SCs on a biennial basis. Two such training sessions had already taken place, the last in the spring of 2009, so the next one should be held in April/May 2011. However, it might be necessary to postpone this training for several reasons. One reason was the current revision of the Directives for Technical Work, which would be discussed later in the day. These Directives of course formed the basis of the training. The other reason was the resignation of two BIML engineers, in particular Ms. Gaucher, who had been very active in organizing the previous events. In the meantime, the Bureau had sent out an inquiry to compile a list of the names of people who should attend such training. Very few applications had been received so far.

    Ms. Van Spronssen said that it would be better to ascertain whether there would be enough participants for a training course rather than arranging them on the basis of one every two years. Possibly it would not be necessary to offer training so often.

    Mr. Kool replied that although they had been asked to arrange training on a biennial basis obviously if there were not enough participants it would not make sense to offer it.

    Mr. Miki considered that although the training was intended for the Secretariats, many other individuals might be interested in it. He hoped that applications of this sort might be accepted.

    Mr. Kool answered that this had been discussed in the past and that the training was primarily intended for people who were actually responsible for a Secretariat. Consideration had been given to the possibility of also offering training for people who attended meetings as an expert, because such people sometimes had little knowledge of the procedures used in the OIML. But the training currently under discussion was specifically for those responsible for Secretariats.

    Mr. Issaev said he and his colleagues had run a training session for five experts and had been very pleased with the results, as these people had then worked in various TCs and SCs. He hoped that when the revision of the Directives was finished, the Bureau would turn its attention to the training of experts.

- number: 8.1.6
  title: OIML participation in the JCGM
  narrative: |2+

    Mr. Kool explained that the OIML was one of the eight Member Organizations of the Joint Committee for Guides in Metrology (JCGM). The Committee was chaired by the BIPM Director, Andrew Wallard. So far it had two working groups: WG1 on the evaluation of measurement uncertainty, and was responsible for the Document known as the GUM (the Guide for Uncertainty in Measurement) and a number of associated publications, and WG 2 was about terminology, and was responsible for the Document known as the VIM.

    These Documents were prepared by the JCGM Working Groups and were distributed to the member organizations of the JCGM, who could then publish them as their own publications.

    So far three of the eight organizations, the BIPM, the OIML and ISO, had published their own versions, which were available on the OIML and BIPM web sites, where they could be downloaded free of charge. ISO also made them available, both electronically and in printed versions, but these were not free of charge. Other organizations simply referred to, for instance "the publication by the BIPM", and did not have their own versions. By "their own versions", Mr. Kool meant that the Documents were printed without alterations but that the organizations might add further elements of their own, for example their own cover page, their own foreword, a table of correspondences to their own publications, etc., but the core of the Document should be identical to the JCGM version.

    Mr. Ehrlich and Mr. Kool represented the OIML in the JCGM Committee and in both working groups. In addition, Mr. Jerzy Borzyminski (Poland) who was responsible for the Secretariat of OIML TC1 Terminology, was a member of JCGM/WG2, representing the OIML.

    Mr. Issaev informed Members that translations by COOMET of ISO Guide 99 (VIM3) and the BIPM version of the VIM3 into Russian were now available.

    Mr. Kochsiek said that the Working Group on OIML D1 had discussed including some new terms and definitions, especially for metrological control. He wanted this to be discussed in the JCGM, especially for the VIM and the VIML.

    Mr. Kool thanked Mr. Kochsiek for his comment. He said that these terms, which were specific to legal metrology, would be discussed first and foremost in the OIML TC 1 meeting which would take place the following week in Warsaw. After that it would be seen whether it made sense to include one or more of these terms in the VIM itself. But, being specific to legal metrology, they should first be in the VIML.

    Mr. Leitner proposed that the Documents which were common to all the organizations should be published jointly, rather than separately, by ISO, the BIPM and the OIML, thus saving some resources.

    Mr. Kool replied that not much would be saved in this way because the core of the document was identical, and each organization simply took the PDF file and put it on its web site, adding only a cover page. It then became an "OIML publication", free of charge.

    Mr. Leitner said that ISO wished to make money out of their publications.

    Mr. Kool replied that both the OIML and the BIPM made their publications available free of charge; there might be some advantage in these two organizations publishing the document jointly. He would look into the implications of this.

    In conclusion, Mr. Kool told Members that in the October edition of the OIML Bulletin they would find an article on the JCGM, along with the names and photographs of the experts who served on the two working groups.

