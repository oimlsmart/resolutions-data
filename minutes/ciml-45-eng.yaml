- number: 8.2.1
  title: 1 R106-1
  narrative: |2+

    A vote had to be taken on the draft revision of R 106-1. Mr. Kool asked Mr. Dunmill to give Members additional information on this.

    Mr. Dunmill said that he wanted to go through the background to this draft revision. Following the preliminary ballot period, the final draft revision of R 106 had been put on the OIML web site in January 2010 for direct CIML online approval. The BIML had tried to follow closely the responses of Members but the response was very poor and only 29 CIML Members had responded by the deadline. At that point, Mr. Dunmill had therefore sent out individual reminders to those CIML Members who had not voted, and the draft was left available for voting beyond the deadline. By mid-June, responses had been received from 37 Member States, including one "no" vote. A further reminder had then been sent to all CIML Members, thanking those who had voted and asking for any final votes to be cast. There was no response to this message and the draft revision had been removed from the voting part of the web site. The conditions of approval, as explained by Mr. Kool, had thus not been fulfilled, although all CIML Members had clearly been consulted. Only 65 % of them had voted, and this was less than the two thirds required for online approval. Since one Member had voted against, the draft could not be approved by the online voting procedure, based on part of the Convention, which had originally been devised for taking decisions by postal vote outside of CIML Meetings. That draft had therefore had to come to the present CIML Meeting for approval.

    However, the "no" vote, which had come from the Netherlands, as well as some of the other comments, had indicated that a number of technical changes had been made to the draft after its preliminary ballot period, which was something that should not happen. The comments had been sent to the Secretariat of TC 9/SC 2, which had provided some responses as well as a revised draft. Mr. Dunmill had not, however, been able to submit that draft to Members, even though it might be more acceptable, because they would not have had the required three month period in which to consult people in their countries and be in a position to vote on it at the current meeting.

    The CIML had now to decide either to vote on the current draft, which had too many technical changes, or to submit a revised version to direct online approval again during the coming year. Mr. Dunmill had now discussed the matter with the Secretariat of TC 9/SC 2 and with the Dutch delegation, and it was felt to be better not to offer the revision for approval at the present time. The Secretariat would provide Mr. Dunmill with a revised draft, which would revert the technical content to that which had existed in the draft approved by TC 9/SC 2 members. There would be another three month voting period on this revised draft.

    This of course meant that final publication would be delayed, but this was felt to be the better technical solution, but of course it did rely on CIML Members voting again on this second draft. Mr. Dunmill would maintain pressure to encourage CIML Members to vote, in the hope of achieving the necessary figures this time. He asked CIML Members to approve this course of action.

    Mr. Schwartz said that Germany supported this proposal for direct online approval. Had the reverse decision been taken, they would have voted "no".

    Mr. Awosola said that as the Secretariat for TC 9/SC 2, he fully supported the proposal to submit the draft for online voting. His priority was to have a good publication with which all TC 9/SC 2 and CIML Members were happy, and he did not think that the draft which was currently on offer achieved that objective. They would hope to submit work within the next few weeks, and if all CIML Members voted online it might be possible to get it published by the middle of the following year.

    Mr. Teunisse said that the Netherlands was in full support.

    Mr. Kool asked whether anyone was not in support. Nobody voiced an opinion against the proposal, which would be drafted as a Resolution and decided on Friday.

