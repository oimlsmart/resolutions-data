- number: 3.2.1
  title: BIPM
  narrative: |2+

    Mr. Henson thanked OIML Members for inviting him. He apologized for the absence of the BIPM Director, but there was a direct clash of dates with the Regional Metrology Organization Meeting in Egypt. Mr. Henson also pointed out that he was a relative newcomer to the BIPM, having started there only in April 2010, and acknowledged that possibly some other people in the room knew more about certain issues than he did!

    Beginning with the current status of the CIPM MRA, Mr. Henson said that membership, at least associate membership, continued to expand. There were three new Members in the present year, with two other AFRIMETS Members on the point of joining, also as Associates. Also, Kenya had transferred from Associate to Full Membership. This expansion was promising.

    The CIPM MRA was open both to Members and to Associates, and was indeed the principal reason for new members joining. Although membership of the MRA was smaller than that of the OIML, it was growing. There was, however, concern that coverage in Africa and the Middle East was too low. A lot of effort was going into changing that situation and this was one of the areas of good cooperation with the BIML.

    Mr. Henson explained that there had been a change in the CIPM (he reminded those present that the CIPM comprised 18 individuals from different countries, who oversaw the activities of the BIPM, though they could not pass resolutions - only the Member States could do this every four years in the General Conference, which would be held in 2011). Andrew Wallard would be retiring at the end of 2010 and Michael Kühne would take over as Director. BIPM Regulations required that the Director of the BIPM and the President of the CIPM should not be from the same Member State, so on that basis Professor Gobel would stand down and Barry Inglis would take over as President from January 2011. Bob Kaarls would continue as Secretary of the CIPM.

    The BIPM had been assessing criteria for the establishment of a new regional body. This was the first time they had needed to think about it, but there was a movement in the Gulf Region now to set up GULFMET, a regional collaboration, and the BIPM had realized that they did not have any procedural method for this. This had now been done, and a policy for traceability had been established with the CIPM. Now that this policy had been published, there had been representation from private industry asking them to look again at it; this would be an interesting debate at the CIPM. The problem pivoted on cases where countries with modest capability took traceability from established regional equipment manufacturers.

    The BIPM continued to put significant resources into work with ILAC on a large number of documents. Perhaps one of the reasons why rapprochement with the OIML was not at the top of the BIPM agenda was that they were very focused on scientific work related to their unit redefinition. The kilogram was now the only measurement unit to have an artifact as a primary standard.

    The other current major international project involved counting atoms and still needed a combination of technologies and considerable improvement. A decision as to whether to propose redefinition was to be taken at the CIPM the following month. The decision itself would be taken by the General Conference the following year. He thought, however, that such a proposal was unlikely to be made so soon. The alternative technique was the Watt Balance, upon which a number of organizations were also working hard. The BIPM was seeking to establish its own Watt Balance, which was now operational, and first results had been produced, but there were still large uncertainties, with more work remaining to be done. This would have a consequence, namely that the kilogram would acquire an uncertainty instead of being the absolute definition itself as a mass artifact, so this was of interest to those present.

    Work on the Kelvin was also progressing well. Three techniques were shown on a slide, but others were also involved, all of which were advancing well. It could be seen that considerable progress had taken place between 2006 and 2010. This would have consequences, but not a very large impact on the international scale as disseminated; it would improve capability at higher temperatures.

    Recent activities had included the Directors' meeting already mentioned, at which rapprochement had been raised. Other matters discussed had included celebration of ten years of the CIPM MRA; a number of workshops on physiological units, on nanoscale activities and, crucially, on a joint BIPM/WMO Workshop in Geneva. They had, as already mentioned, had both quadripartite and bilateral meetings with OIML.

    Mr. Henson said that his present and future bosses were at present occupied at the JCRB Meeting in Egypt. The CIPM Meeting would take place very shortly, and then, in 2011, the General Conference, preparatory work for which was taking precedence at the moment over thoughts of rapprochement with the OIML. Reports were available on the BIPM web site on both the nanoscale workshop and the physiological units, giving an idea of where the future lay in scientific metrology.

    One of the year's most important events had been the meeting in Geneva between the World Meteorological Organization and the BIPM. The report on this had not yet been published, but it had been a very major workshop, out of which many ongoing activities would result. Measurement in climate change was far from simple and the meeting had demonstrated some significant uncertainties, so that it was not surprising that metrology was closely and increasingly involved.

    As examples of the work the two bodies were doing together Mr. Henson showed a joint OIML/BIPM press release on World Metrology Day and some photographs of himself and Mr. Dunmill at a joint training seminar given in Vienna to UNIDO technical assistance staff so that they understood when they help Developing Countries to put in their MASQ (Metrology - Accreditation - Standardization - Quality), that (a) metrology mattered, and (b) how to link scientific and legal metrology together. These were examples of how well practical work was being carried out between the two organizations which was in fact the caption on the UNIDO press release.

    Finally, Mr. Henson passed on Andrew Wallard's good wishes and thanks, prior to his retirement on 31 December, and relocation to the Provence area of France. Mr. Wallard would have liked to be present and to give one last presentation to the OIML but this had not been possible because of the clash in dates. He told Members that he had written a more detailed paper which would be circulated.

- number: 3.2.2
  title: ILAC/IAF
  narrative: |2+

    Mr. Dougherty thanked Members for their invitation. He said that ILAC and the IAF valued their relationship with the OIML very highly. The organizations shared the common goal of achieving confidence in conformity assessment results.

    ILAC members accredited testing and calibration laboratories according to ISO/IEC 17025. They also accredited proficiency testing providers, reference material producers and inspection bodies. A separate written report had been provided by ILAC to the OIML.

    ILAC had 66 Full Members representing 55 economies. These were accreditation bodies that had been peer evaluated and were signatories to the ILAC MRA. They also had 22 Associates, including accreditation bodies that had not yet been peer evaluated, but that were working towards this goal.

    IAF Member accreditation bodies accredited management systems certification bodies, product certification bodies and certifiers of persons. There were 62 accreditation body members, 46 of which had signed the IAF MLA. The 10th Joint General Assembly would be held in Shanghai from 20 to 29 October 2010, where the 12th anniversary of the IAF MLA and the 10th anniversary of the ILAC MRA would be commemorated. Mr. Johnston would be attending that meeting, as he himself had already told Members, and the tripartite OIML/ILAC/IAF MoU would be re-signed.

    Peer evaluations for the ILAC MRA and the IAF MLA were mainly carried out by the regional groups. The regions were evaluated at the international level and were first qualified for specific MLAs or MRAs. Each recognized region then conducted peer evaluations themselves. A few accreditation bodies were not members of the regions, in which case ILAC or the IAF conducted the peer evaluations separately. But the regional bodies' work was what really underpinned the international MLAs and MRAs. These groups were:

    - IAAC: the Inter-Americas Accreditation Cooperation, representing North, South and Central America. This body covered both ILAC and IAF accreditation, without separation of these activities;

    - EA: European Cooperation for Accreditation, representing European organizations and covering both ILAC and IAF needs;

    - SADCA, an association of organizations in Southern Africa, a developing region, which had not yet been through peer evaluations, but which planned to do so in the future, and were working towards recognition. A regional accreditation body was also in the process of being developed, called SADCAS, which would encompass most of the members of SADCA;

    - PAC and APLAC: both sides of the Pacific Ocean in the Asia Pacific region were covered; PAC was mainly concerned with IAF activities and APLAC with ILAC

    activities, but they were beginning to meet among themselves, and might come together in the future.

    ILAC and IAF had been discussing merger for about ten years, and the subject had been beginning to dominate executive committee time in both organizations. One of the biggest events at the previous year's Joint ILAC/IAF Assembly in Vancouver had been to call the question - should they merge or not? If they were going to merge, all the energies of both executive committees had been directed into making that happen. However, if the vote went against merger it would be possible for each of them to devote their energies to their real purpose of assuring the credibility of accredited conformity assessment. The results of the vote had shown that a majority of both groups were in favor of merger, but a 66% majority was required in IAF and 75% in ILAC, and the required majority was not achieved in either group. It was therefore decided that merger talks should be discontinued and each executive committee should focus their efforts upon their own group's mission.

    They were also continuing to work very closely together, and it seemed to Mr. Dougherty that, in the long term, the two organizations would merge, but by a natural progression as they learned to work better together. The Joint Committee on Closer Cooperation had been dissolved because as they worked more closely together there had been a number of joint initiatives where those groups were reporting through the JCCC, but this body had no decision making authority; indeed a cumbersome organizational structure had been created.

    Joint meetings of the two executives now took place three times a year. With both executives present, the body now had complete decision making authority, which had streamlined processes. So they continued, and would continue, to work more closely together. Each of these meetings took three days: the IAF or ILAC Committee met on one day, the joint committee always on the second and the other committee on the remaining day. Two such meetings had been held since the Vancouver Conference, one in Paris in March and the other in Mexico City in June, and it had been found that more and more items were being moved off the separate meetings and into the joint one. More common issues than separate ones were thus being addressed.

    As had previously been mentioned, an update to the agreement with the OIML would be signed in Shanghai. Mr. Dougherty believed this was the third revision. The most important joint aims were to obtain a list of technical experts who had been recognized by the OIML, and to find a way to get these people involved in the accreditation activities of the accreditation bodies.

    The July issue of the OIML Bulletin contained two excellent articles about the cooperation which was taking place between ILAC and the OIML. It was obvious that at present cooperation between the OIML and the IAF was even closer, but, as President of IAF, he was hoping that within the next year or so it could be even more dramatically improved.

    All three organizations were among the ten organizations working together in the network on Metrology, Accreditation and Standardization for Developing Countries. Under the secretariat of François Rauser of the IEC, much had been achieved in the last year. A good and informative web site had been established and development had emerged from the DCMAS Network.

    Within the IAF and ILAC there was a common liaison representative who worked for COFRAC, the French accreditation body. Mr. Dougherty provided a list of ILAC and IAF

    contacts which could be found on their web site. He thanked the OIML for their invitation to the meeting.

    Ms. Van Spronssen commented that there was some concern in the Netherlands about metrological experts: not the fact that they were being trained but how they were going to be involved in the accreditation process. Would they be approached as private individuals, or would an approach be made through the company they were working for to seek an expert for accreditation?

    Mr. Dougherty replied that accreditation bodies were required to have appropriately competent individuals to do the accreditation assessments, but recognizing the specialized expertise which sometimes became involved in this area was part of the reason why they valued their partnership with the OIML. They would like to develop more effective processes for getting OIML experts involved with accreditation assessments. When things did not work, it was normally because appropriate processes had not been developed. Accreditation body personnel needed to know exactly how to make the appropriate contacts to give access to those experts and vice versa. This was the area that needed work so that systems might operate effectively.

    Mr. Johnston asked whether, given the ILAC/IAF rapprochement experience, Mr. Dougherty might like to volunteer for the OIML small working group mentioned earlier in the session.

- number: 3.2.3
  title: IEC
  narrative: |2+

    For the IEC, Mr. Rotti said that he was from the IEC Central Office, speaking in place of Jonathan Buck, their Director of Communications and Marketing, whom some of those present might know.

    The IEC had been founded in London in June 1906, by the developed nations of the time. It was one of the world's first such organizations, founded by a market need to find common terminology for electro-technology. The IEC had observer status with the United Nations and a lot of government input, but fundamentally were still most influenced, as in 1906, by industry and market players. The IEC was a one country one vote organization, whose participants worked through fully representative national committees. In the 110 years of their history, the Commission had evolved into the global provider for international electro-technical standards and the provider for globally recognized conformity assessment systems for the global market.

    The IEC had within the last ten years begun to set up regional centers. There was currently a regional center in North America just outside Boston, a regional center in Singapore, and there was now a regional center in Sao Paolo, Brazil. The IEC covered electrotechnology from the power plant to the factory to the home; they covered everything from household appliances, power tools, to overhead electrical conductors to overhead transmission lines. The organization was continually growing, and there were currently 162 members - 81 member countries and 81 affiliate countries, i.e. countries which were not yet full members of the IEC but which the IEC hoped would become so.

    Some of the more recent technologies covered included electric vehicles, smart grids, which seemed to be a major area at the moment, and renewables.

    Some of the primary concerns covered by the IEC were safety, the environment, energy efficiency, and interoperability. Mr. Rotti showed a slide of the IEC/OIML technical liaisons in the 13 IEC technical and Subcommittees.

    The IEC had in the previous week published a white paper on smart electrification, setting out energy challenges in office solutions over the next 20 years. This had been launched at the World Energy Conference in Montreal. It was available on the IEC web site. Its principal message was that the demand for energy was growing fast, and for electricity even faster. The IEC believed that smart electrification, intelligent and economical use of electricity as a major energy source, would be one of the most significant factors in addressing the energy challenge. Its second principal message was the systems approach: when the system was considered as a whole, techniques presented themselves which reduced overall need for energy, and which were not available if only individual components were considered. The smart grid could deliver and was a major player in what the IEC was doing at present. They believed that standards would play a key role. This systems approach was critical in meeting future needs, and the IEC standardization management board was now working to provide guidance on implementation of the white paper recommendations.

    The IEC and the OIML had a long and successful history of cooperation. There were new challenges and opportunities on the immediate and long term horizon and those present were asked to remember that the IEC was with them as a partner, and they would like Members to review the white paper and provide any feedback if possible.

    Mr. Rotti thanked Members for their attention.

    Mr. Magaña commented that the IEC had an international conformity assessment procedure. The OIML kept in close liaison with the IEC to learn from their experience on conformity assessment, and would invite them to all discussions in which they might give their experience on this issue.

- number: 3.2.4
  title: CECIP
  narrative: |2+

    Ms. Martens explained that she was representing CECIP, which was the European federation of manufacturers of weighing instruments. She was grateful for the opportunity to speak of matters of interest to this group. She would explain what CECIP was, then speak of the economic situation of the weighing industry, followed by a summary of the items of major interest for CECIP in Europe, and then those they had in common with the OIML. She would restrict her talk to the most important matters, though of course they were interested in many more.

    CECIP represented about 700 manufacturers, with a total workforce of about 50 000 and a turnover, in 2008, of about three billion euros. They also represented small, micro-companies of one to three people, who usually bought components from the bigger manufacturers, then put them together to create tailor made systems for their users. CECIP represented national organizations. This meant that individual manufacturers could not be direct members, but only national federations. Membership was not restricted to EU countries, but all of Europe from Ireland in the west to Russia in the east.

    As everybody knew, the economic situation was similar all over the world, with a decrease in imports and exports. All member countries had reported a significant decrease in economic output in 2009, and in addition difficulties were expected for 2010, though there was some

    improvement. Total turnover for the industry had decreased by about 14 % compared with 2008, with exports going down by about 20 % and imports by about 17 %. This was not of course specific to the weighing industry, but common to industry in general.

    Regarding activities in Europe of special interest to CECIP, Ms. Martens said she intended to refer to the two projects running at the moment with the European Commission. One was the so-called New Legislative Framework, of which the several directives currently under discussion were of great interest to CECIP. For example, the Non-automatic Weighing Instruments Directive and the Measuring Instruments Directive. These Directives would in future provide detailed information on the requirements to several economic operators. As a result of these CECIP would have additional responsibilities and more administrative requirements to the economic operators and especially to the manufacturers. There would be detailed regulations for conformity assessment; there were already some modules, but the new requirements for putting instruments onto the market and under legal control would be much more detailed. Ms. Martens was not referring to the market use of instruments, which did not fall under this legal control - Europe had a two tier market. Under this New Legislative Framework (NLF) there would be strong requirements for market surveillance and these market surveillance activities had to be carried out by the EU Member States. The reason for this was to protect users and, also of great interest to CECIP, to achieve fair competition. This was a very important issue of the new legislation. No change of technical requirements was under discussion in this Directive.

    Another current project under discussion in Europe was the revision of the Measuring Instruments Directive. There was discussion of additional instruments to be integrated in new annexes, and of course of some changes to existing parts of the annexes.

    Regarding the OIML Ms. Martens told Members that OIML Recommendations played a large role in Europe, because such Recommendations, under the MID, were considered normative documents, meaning that they could be referred to in checking whether essential requirements had been fulfilled. This was what made the work of the OIML so important for CECIP. One of these Recommendations, for example, was R 51 Automatic catchweighing instruments, which was used in this way, as also were R 61 Automatic gravimetric filling instruments and several others.

    An OIML project of major interest to CECIP was the revision of R 60 Load cells, work on which had already begun. This was important to them because in Europe a manufacturer who put a weighing machine onto the market had to declare conformity with all the requirements which had to be fulfilled for that instrument. If the manufacturer bought a load cell from the market, either in Europe or elsewhere, he had to be sure that it fulfilled the requirements under, for example, R 76 Non-automatic weighing instruments or R 51. Therefore they had to harmonize R 60 with the requirements of such Recommendations.

    Another OIML activity of strong interest for CECIP was discussion of the MAA and recognition of manufacturers' test laboratories under the MAA. If this was done, it was possible to find partners in industry with the same goals. This was very important for achieving in the future a higher level of conformity in markets all over the world, and would give manufacturers not only burdens but also perspective. Other laboratories would follow those that were first in the field, and in this way an incentive was being offered to manufacturers to qualify instead of merely having increasing costs.

    The problem all over the world was that additional regulations meant increasing costs for manufacturers. There had to be some way of getting a return on investment. Ms. Martens

    considered that fair trade and fair competition were very important all over the world. If people knew a manufacturer was under the issuer's authority, anywhere in the world, and that qualified OIML auditors had inspected their laboratories, then they could rely on their products better than was the case at the moment. For these reasons, she considered that manufacturers' test laboratories (MTL) should be recognized under the MAA. It was known that requirements had been drafted and would be under discussion in the following month. CECIP felt that impartiality and independence was a very important issue, which they felt could be solved. She added that the MTLs also felt that it was very important to be impartial and independent. They all had the same goal.

    Ms. Martens referred finally to the document on uncertainty in measurement, now under discussion within OIML TC3/SC 5. CECIP considered that this was a very important document, since it was essential for rules to be set up and for requirements in legal metrology to be harmonized. These harmonized requirements could then be taken into account in individual Recommendations, but in addition in the testing of instruments during production and, later, under legal control. At the moment, that was not the case and currently the requirements were different in all of these cases. This was an important issue for the future, with strong consequences and it was essential for it to be discussed, together with its consequences for some well established Recommendations, and everybody must be aware that the changes had to be solved before harmonization was possible. But nevertheless this was very important and if it was not made the starting point it would not be possible to go into the future.

    Ms. Martens thanked Members for their attention.

    Mr. Awosola asked Ms. Martens what new instruments were the subject of the MID revision, and how soon the revision would be completed.

    Ms. Martens replied that many instruments were involved, many of them not concerned with weighing. A questionnaire from the European Commission included descriptions of many of them and would be the best source of information. Some European OIML delegates such as Ms. Lagauterie might also have information on the subject. She herself would also give what help she could.

    Mr. Magaña asked Ms. Lagauterie whether she could shed any light on the subject. He also thought there might be a questionnaire available online on the European Commission's web site.

    Ms. Lagauterie confirmed that there was a public consultation on the European Commission's web site, which was due to close at the end of October. The working party reporting on the application of the Directive had published some proposals for modification of the Directive. No decisions had yet been taken and it was not known whether the proposals for changes to the Directive would be accepted. A strong distinction must be made between the new regulatory framework, which had already been accepted and would be integrated into the Directive, and on the other hand, that part which was at present simply a report and some proposals, upon which decisions would not be published until 2011, because this report had to go to parliament.

    Following these discussions, Mr. Magaña proposed the following wording for Draft Resolution no. 9:

    ## Draft Resolution no.9

    The Committee thanked the liaison organizations for their presentations and instructed the Bureau to take due account of the expectations expressed by these organizations in the coordination of the work of the OIML Technical Committees and Subcommittees.

- number: '3.3'
  title: Report on the Round Table with Regional Bodies
  narrative: |2+

    Mr. Magaña reminded Members that this Round Table had been held the previous day. There had been good attendance: AFRIMETS, APLMF (in the chair); COOMET, GULFMET, EAMET, SADCMEL, SIM, and WELMEC. There had been 30 participants, and the attendance list could be found on the Regional Organizations web page (http://workgroups.oiml.org/rlmos-forum/rlmos/2010-round-table). The presentations given by these Regional Bodies were also available on the same pages and could be downloaded for examination.

    During the meeting, the conclusions of the previous year's Round Table had been approved with small amendments. SADCMEL had accidentally been omitted from the list of participants of the previous year. The revised terms of reference for the Round Table had also been approved, the amendments being quite minor.

    There had been discussion on the inquiry on national regulations. A number of Regional Bodies had carried out inquiries on national regulations, or were planning to do so. The OIML inquiry on national regulations was available and could be used by the regions. All members of the Regional Bodies were entitled to respond to it, and the format was being restructured to make it more user friendly. The revision would allow all members of the Regional Bodies to obtain a login and a password and complete the inquiry. The queries on this database would also make it possible to draw up a presentation and statistics for each region - which countries regulated which categories of instrument, and so on. Some Regional Organizations had also mentioned that on their own web sites they had more detailed information about national regulations.

    Another issue which had been discussed had been how to motivate other departments in a country to participate actively in OIML work. This was not, properly speaking, a regional issue, but there had been an exchange of views upon it. Attendees were of course reminded of the existence of the Treaty, which made the OIML Recommendations more or less mandatory for Member States, which were morally obliged to follow them. The TBT agreement also obliged them to follow international standards and OIML Recommendations. This was not, however, always the best way to raise awareness and to entice other departments to cooperate. Good relations and diplomatic skills were also needed on the part of the CIML Members, in order to motivate other ministries to cooperate. CIML Members were reminded that their role was not only to represent their countries in the OIML but also to represent the OIML in their countries.

    There had also been discussions on training, which was more of a regional issue. An OIML work group on training had been set up, so Mr. Magaña had presented this and explained that it could also be found on the web site. Training Bodies could upload information about their activities and who they were, and also information on planned training courses. All the

    Regional Bodies had been invited to upload information about training that was planned in their regions, so that the regions could know what the current training program was.

    The possibility of exchanging training material and videos had also been discussed, but this was a more complex matter which would need further study, because it was not easy simply to circulate training material without taking certain precautions.

    Access to funding had been discussed: in order to access funding from donor bodies, it was necessary to emphasize the importance of metrology, accreditation and standardization in development. There was no problem with UNIDO; however, UNIDO had very few programs on their own funding, except for the least developed countries, and most of their other programs were based on voluntary contributions for one country. So their resources were rather limited. It was still necessary to raise the awareness of other donor and funding organizations about the importance of $ \mathrm{MSTQ}^{3} $ as a tool for development; much remained to be done on this issue. There was the additional difficulty that a country or region could not simply go to a donor organization, present a program and ask for funding, because generally these donor organizations had their own strategy and their own program. They defined their goals and what they would do. So thought would have to be given to how to make progress on this.

    In conclusion, discussion and exchange of views and information at the Round table had been very lively. Training, which was a major issue for Regional Organizations and especially for developing countries, had been highlighted, and work on this should be actively continued both by the Bureau and by Regional Bodies, and Regional Bodies must provide a contribution for the exchange of information.

    Mr. Magaña asked whether there were any comments.

    Mr. O'Brien asked about the training videos which had been mentioned. He pointed out that a number of economies, for example the UK and Australia, had some quite useful resources, and he wondered whether the OIML could see any way of making those resources available so that others could be aware of them and not duplicate what already existed.

    Mr. Magaña said that the Bureau could ask each region what training materials they had used, and the name of the person who should be contacted to make them available. It would not be possible to have this material downloadable on the web site, and in any case, videos should be provided to trainers and not directly to the public.

    ## Draft Resolution no.10:

    The Committee took note of the conclusions of the Regional Bodies Round Table and invited the Regional Bodies to post information on the various workgroups web sites that are at their disposal.

- number: '4'
  title: CIML Presidency
  narrative: "\n"
- number: '4.1'
  title: Presentation of the candidates to the CIML Presidency
  narrative: |2+

    Mr. Magaña explained to Members that the candidates for President would now make their presentations, and that the vote would be taken on Friday 24 September.

    ## Mr. Alan Johnston

    Good afternoon Ladies and Gentlemen.

    I would like to take a few minutes of your time today to seek your support for my re-election as President of the CIML. The next seven years present many opportunities and challenges for both the CIML and the OIML. For example, recent world economic events have demonstrated how closely connected our countries' economies are and how difficult it can be if we do not cooperate with each other. Never before has there been such a strong incentive for the harmonization and standardization of the rules and requirements governing the millions of measurement based transactions which occur on a daily basis around the world.

    Today, citizens in our various countries want to enjoy the advantages of a global economy, but they still expect their government to provide them with protection in terms of health, safety and environmental issues. Our discussion this morning on rapprochement is another example of a challenge that is going to be facing the OIML and CIML Members in the future.

    I believe my experience in leadership would be an asset in working with you to position the OIML to assist legal metrology organizations to meet the challenges and opportunities they face today, and will face in the future.

    Take for example the MAA. In my presidency real progress has been made, although at a slower pace than I had anticipated. A good foundation has been established, and as President I would work with you to ensure the continued success of the MAA. I believe that over time we will have to accept manufacturers' test results under controlled conditions. What those controlled conditions are, at this point I am not sure. The challenges to address the issues faced by utilizing countries, for example, to develop confidence in a manufacturer's test results in a country located halfway around the world, or having to explain to their own political masters and domestic manufacturers that test results from a manufacturer in a foreign country may be acceptable but theirs are not. It is a complex issue, requiring more than development of procedures and criteria. However, without a solution or a compromise, I believe the MAA cannot achieve its full potential.

    During my time as President I have worked with you to develop a closer working relationship with other standard-setting organizations. A number of MoUs have been signed with UNIDO, ILAC/IAF and the BIPM. If re-elected, I would work to further strengthen relationships between these organizations, and in particular between the OIML and the BIPM.

    Today the field of legal metrology is changing and expanding. In order to meet the challenges faced by many member countries, we need to have a discussion on the emerging areas of legal metrology and what role the OIML will play in these emerging areas.

    More support for developing countries is another important issue which needs to be discussed. I believe my experience as President would be an asset in providing guidance and leadership during these discussions, which will shape the future direction of the Organization.

    An effective CIML and OIML requires strong corporate governance and capable staff. Accountability for the expenditure of financial resources and the management of human

    resources in international organizations is extremely important, given the pressure that CIML Members themselves are under to justify their budgets, as well as membership costs in international organizations.

    During my term as President, with the CIML's approval, I requested that a management audit of the BIML be carried out and I took steps to address the problems identified as a result of the audit. But we have to continue to do this work. If re-elected, I would look closely with the new BIML Director to clearly articulate the expectations of the CIML and the OIML with regard to the corporate governance expected from the Secretariat, and to ensure that systems and guidelines for appropriate administration of funds are established and followed. I would also work with the new Vice-President.

    Speaking in French, Mr. Johnston went on to say that to be effective, the CIML and the BIML needed to respect the needs and points of view of its Member States. As President, he had encouraged the Members to take part in the examination of questions on the meeting agenda. He had allowed plenty of time for agreement in the taking of decisions affecting the Members and the management of the OIML. If elected, he would continue to encourage the Members to participate more and to define ways to facilitate their reactions. Mr. Johnston then returned to English, saying:

    I believe the next six years represent a period of great opportunity for the organization. I think we need a CIML President with strong management skills. I would also like to say that I think the other two candidates possess those as well. I think you need a person who can dedicate the necessary amount of time to ensure a sound corporate governance structure is in place and to provide appropriate guidance to the important work we have to undertake. Now, during my last five years, I must admit I found it challenging at times to devote enough time to my responsibilities as President of the CIML. Living in Canada, it was not a simple two-hour train ride - it took a week!

    I am presently eligible to retire and my plan would be if re-elected to retire at some point in the future, which would allow me to devote more of my time to the OIML.

    Again speaking French, Mr. Johnston told Members that five years previously he had had a good knowledge of French, but that unfortunately, at the moment, he was too inhibited in speaking French and also he lacked the necessary vocabulary to have a good conversation or discussion in French. But he said that in the future ... (return to English).

    I plan to devote more time to bringing my French back up to where it was five years ago; indeed I think it is a personal issue for myself, having had the advantage of being quite fluent in French and then keeping that up during my course as President.

    Again, just to reiterate, in closing, I believe the experience I have gleaned over the last five years as current President of the CIML, as well as my experience of managing corporate governance structures, position me well to provide the necessary leadership for us to complete the important work we have started. I look to your support. Thank you for your attention.

    ## Mr. Grahame Harvey

    Good afternoon, colleagues and friends.

    I would like to begin this presentation by paying tribute to our current President, Alan Johnston. He is coming to the end of the six-year term. As you know, Alan is an administrator

    with a background in accountancy. He has confessed to me on a number of occasions that he likes nothing more than to look over a series of financial figures. Alan has served as President at a time when the OIML was under considerable pressure about rapprochement with the BIPM, and I think he did an excellent job in responding to this challenge and warding off what could have been an unfortunate marriage between the two organizations - I think it would be more in the nature of a shotgun wedding - and in keeping the discussion in terms of the dictionary definition of rapprochement, in other words, closer involvement. At the end of his term, Alan will have served as President for six years. This is a long term, and I believe that an organization such as ours needs new ideas and constant renewal in order to bring it forward and remain relevant. Next year, we will have had six years with an administrator as President, and while that is no reflection on Alan, I believe it is time for change.

    In terms of my background, I am an entirely different person. My background is in physics. Then I saw the light and became a legal metrologist. I have now have over 25 years' experience working as a legal metrologist, working in areas such as policy development, legislative amendments, metrication, pattern approval, helping through the introduction of a national system of trade measurement. In the platform that I prepared for this meeting, I mentioned some of my achievements while CIML Member for Australia, and as Second VicePresident. If you are as busy as I am in the day job, then you might not have had time to read those comments in the CIML papers. I will just list my achievements here as dot points and urge you to read about them when you get time:

    - Firstly, I helped to resolve the MAA fee structure, at the 2004 CIML;

    - I initiated the proposal for the 2006 packaging seminar in South Africa;

    - I have taken a leading role in promoting the work on the Directives;

    - I established a TC on agricultural quality measurements;

    - I provided the Secretariat for TC 12 on electricity meters;

    - I provided strategic issues on the Presidential Council agenda: on this occasion discussion of key liaisons, the future of the MAA, the OIML mark, the Directives, and conformity to type. Accordingly, the Presidential Council meeting began a little early yesterday but we did not have time for discussion of conformity to type;

    - I am passionate about the importance of legal metrology. I believe it is where the measurement system gains traction with the community - it's where the rubber hits the road! It is also where the money is, through the value of transactions;

    - In addition to my contribution to the OIML, I have made a strong input to the Asia-Pacific Legal Metrology Forum. I instigated the reorganization of the working groups, and the formation of a new working group on metrological control systems, including the proposal to prepare some guidance documents for the region. I am a member of the APLMF Executive Committee;

    - I also strongly believe that we need to develop programs to assist developing economies. For that reason, this topic has been included on the agenda of the Round Table of RLMOs since its inception;

    - And finally I support the bilingual nature of the organization, in which French is the official language and English the working language. Accordingly, Australia has always supported the OIML translation service and will continue to do so.

    Concerning provisions for the future of the OIML, in my application circulated to Members I mentioned that we have developed a strategic plan without a vision statement. True, it has a mission statement, which tries to straddle the ground between a mission statement and a vision statement. As you know, these terms derive from the military, where the mission is what you are doing today, and the vision is where you want to be in the future. Of course, without a clear vision of where you want to be it is not possible to have a coherent set of strategies to get there. I believe the Presidential Council, in consultation with the CIML, should develop the OIML's vision for the next 20 years. But it won't be my vision: it will be your vision. In developing this vision, some of the questions we should be asking ourselves are: what should be the scope of our activities? In principle, any measurement made for regulation or for trade is under the scope of legal metrology. We already work in a large number of emerging areas such as medical measurements, pollution measuring devices, and quality measurements of agricultural products.

    However, not all CIML Members are regulators for the same areas of legal metrology. Some of us are not regulators at all. We need to provide guidance to Members on how to engage with other regulators in their economies, particularly in emerging areas such as food safety. In Australia we are establishing a liaison committee with other regulators to discuss the contribution that legal metrology can make to their areas of responsibility. It is worth noting that the APLMF has already held some seminars on food safety. Remember that to the extent we leave the field of legal metrology vacant, some other organization will fill the vacancy and the OIML will become less relevant.

    Another question is, what sort of documents should we be writing? Should they be consensus documents on which we can all agree because they are based on what we are already doing? Or should they be aspirational documents that represent where we are heading, documents that provide guidance for Members when they are revising their legislation? I have heard this referred to as the light on the hill. So the question is, do we want lowest common denominator documents or do we want aspirational documents?

    Another question is, what are we going to do about the IQ mark? There are obvious difficulties in trying to introduce such a mark, but the benefits if we are successful, apart from facilitating trade, would be exceptional visibility for the OIML. Also, it is exceptionally important for developing economies. But just imagine what some other organizations would do if they had the opportunity to place a mark on most packages traded internationally, that identified them. It would be seen as a golden marketing opportunity, and, as we say in Australia, they would rush in with their ears back! And here we are, dithering.

    I have made some undertakings if elected. Firstly, in terms of financial issues, we are having a vote for the position of Director on this occasion because of concerns about the management and financial shortcomings within the Bureau. If elected, I would establish an ad hoc committee, chaired by a CIML Member with accounting qualifications. Members of the Committee could be selected from within or outside the Presidential Council. Together with the incoming Director, the committee would oversee the preparation of an annual budget. We would also overhaul and maintain the OIML financial regulations and provide an internal audit function. In terms of management issues, there are many that need to be addressed. If elected, I would establish another ad hoc committee, chaired by a member of the Presidential Council, together with the Director and Assistant Directors, and it would review and maintain the staff regulations and institute and maintain processes for staff performance, planning and review.

    In that respect we talk a lot about finance. But just as important, and perhaps more important, are the staff outputs; advancement and bonuses, travel policy including the extended OIML representation in other fora, and other workplace relations issues.

    In terms of technical issues, the draft Directives to be considered later in this meeting include the concept of the Technical Management Committee, TMC. What some CIML Members may not realize is that we already have an ad hoc committee that reviews the progress of technical work at every March Presidential Council Meeting. If elected, I would like to formalize this Committee by nominating a Chair from the Presidential Council. Members of the Committee may be selected from within or outside the Presidential Council.

    And once again, in terms of available time, one of the difficulties for all CIML Members is that we have day jobs. We attend OIML meetings and come away with the very best of intentions to contribute to the OIML; however, when we return home, we are constantly distracted by our daily employment imperatives. Accordingly, I have agreed with the CEO of NMI Australia that, if elected as President, I would move to part time employment and focus all my attention on OIML matters. This would allow me to spend time at the Bureau as necessary and pursue liaisons with other organizations as appropriate.

    And finally, communications. With the revision of our web site, communication with Members has improved markedly in recent times. Nevertheless I feel it could be further improved. If elected I would introduce a system whereby CIML Members were alerted prior to any new initiatives or liaisons with other international organizations so that they would be fully prepared for any questions arising from other portfolio areas in their government, for example areas such as food safety or health. And we have an example of just that in one of our Resolutions today.

    So, in summary, let me ask the question: is business as usual an option for the OIML? I suppose it is if you do not mind the OIML staying and becoming irrelevant. However, if you believe it is time for renewal, if you want a process to develop a vision to grow the OIML, if you want good management and administration processes introduced in the Bureau, and if you believe it is time for a legal metrologist to take the reins of the CIML then I would welcome your support in Friday's vote. Remember, it is time. Thank you for your attention.

    ## Mr. Peter Mason

    Good afternoon, fellow members of the Committee. I do not intend today to make a long presentation. You already have my written statement and my resume. However, they were written before the other candidates were announced, so I would like to concentrate my remarks today on the choice which is available.

    The OIML is very fortunate to have three strong candidates for the office of President, and I do not think the choice will be an easy one. However, I have found it helpful in preparing my remarks to consider what, if I were choosing a candidate, I would be looking for in making that decision. My conclusion is that I would be looking in three areas: the strategy and vision for the OIML, the experience and skills of the candidate, and the time and resources which the candidate was able to make available.

    On strategy, I have made clear in my written statement that I believe the OIML is going in the right direction. Let me summarize what I think that direction is.

    Firstly, it is promoting the harmonization of legal metrology as a way of protecting consumers, health and the environment, promoting international trade and supporting innovation and fair competition. I found it very easy to write that phrase, because it is the phrase from my own mission statement for my own organization.

    Secondly, it is about increasing the speed and efficiency of the OIML in producing modern relevant documents.

    Thirdly, it is about closer collaboration with other international bodies in producing standards especially in metrology.

    Fourthly, it is about extending the OIML's activities beyond our traditional area of weights and measures, so that we can contribute more to addressing issues such as the protection of the environment, protection of health and safety.

    And finally, it is about developing the worldwide capability of legal metrology, especially in countries without an established infrastructure.

    I do not believe it is the role of the President to pursue particular policy proposals, except where they represent a consensus of Member States. But I do think the President has a role in turning the strategy into a vision which raises the profile of our work. So do I have a distinctive vision? I think I do because for me legal metrology, and indeed scientific metrology for that matter, has to be seen as part of the world standardization network. At the practical level, that means closer work with bodies such as ISO, BIPM, ILAC, IAF, etc. But it also means producing a story based on the language of standards, which we can take back to our own administrations. Yesterday, at the Round Table, I made the point that I found it easier to raise the profile of metrology, particularly legal metrology, within my own country because I emphasized the link between our activities and the rest of the standards world, the relationship between written standards and physical standards.

    The second area I identified is skills and experience. I recently described myself as half an economist, almost an accountant, who had spent most of his life working with lawyers and politicians. But in my heart I am a policy maker and, even more importantly, most of my career has been spent in regulation. Regulation is in my blood; I think like a regulator. And since I started my working life the year after the United Kingdom joined the European Community, that actually means I think like a European regulator. International cooperation, and in particular European cooperation has been a major feature of my career. Although I have only been a member of CIML for three years, I have been involved with legal metrology off and on for almost 15 years, and with standards work for nearly 20. I run the agency in the UK which is responsible for both scientific metrology and legal metrology. I believe I have succeeded in raising the profile of metrology within the UK government, and with that background I feel that I am in a good position to provide oversight and support to the Bureau and to raise the OIML's profile internationally.

    Finally let me come to the question of time commitment and resource. In Britain we have a saying, "If you want a job done, give it to a busy man". I have a demanding and full time job, but that job is itself made easier if the OIML is operating as an efficient and effective organization. Moreover, with modern communications, Paris is now little more than two hours away from London; and, finally, I have an excellent team in my agency, who are looking for more responsibility. So I believe I have the resources to support me in my role with the OIML. I am certain, therefore, that I am ready to take on new challenges. With your support, I hope that that will be to act as your President. Thank you for your attention. I will

    be happy to answer any questions you may wish to put to me in the next three days. Thank you very much.

- number: '4.2'
  title: Presentation of the candidates to the CIML Vice-Presidency
  narrative: "\n"
- number: 4.2.1
  title: Preliminary item
  narrative: |2+

    Mr. Magaña said that the meeting would now move on to the presentations of the two candidates for the Vice-Presidency. First, however, Article XV of the Convention had to be discussed. This stated that in the case of a vacancy for President, the first Vice-President took over. It did not say what should happen if the first Vice-President resigned. In the present situation, which had existed for a couple of months, the first Vice-President had resigned but there had been no decision about the Vice-Presidency. It was being suggested that Article XV should be interpreted as indicating that if the first Vice-President resigned, then the second Vice-President automatically became first Vice-President, so that the Convention could still be applied in case of need. This suggestion had been sent out to Members for comment, and had met with a generally positive response.

    Mr. Magaña proceeded to read Draft Resolution no.11, which was a point of interpretation of the Convention, and which it was hoped would be endorsed by the Conference in 2012.

    He explained that, as Mr. Stuart Carstens had resigned from the post of first Vice-President in April, Mr. Grahame Harvey became first Vice-President and the Vice-President that Members would elect would be second Vice-President. Mr. Magaña invited comments on this proposal.

    Mr. Klenovský said there was a problem with this because the first case was a temporary measure until a new President was voted in, whereas the second case was a permanent solution.

    Mr. Magaña replied that a decision had to be made immediately, because if no President was elected, as had happened a few years previously, there had to be a first Vice-President to be Acting President. So the first thing was to make a decision for the immediate future. The second decision was whether to propose to the Conference to make this a permanent rule.

    Ms. Van Spronssen wanted to make the same comment as Mr. Klenovsky. There were different rules for elections of first and second Vice-Presidents, and they had different responsibilities. The consequence of the proposed Resolution would be that the second Vice-President could always take the place of the first Vice-President, and therefore of the President. Ms. Van Spronssen considered that the consequences of this should be considered more thoroughly. The problem could be solved by the second Vice-President being put forward to the Committee as first Vice-President, so the CIML Meeting could elect him as such. That would fill the gap equally well. If an immediate solution was needed, Mr. Magaña's suggestion could be put in place as a temporary measure, but should not be made permanent.

    Japan agreed that the first and second Vice-Presidents had different roles. At election time, the appropriate person was chosen for each role. If there were no first Vice-President, then perhaps the second Vice-President might stand in as President. On the present occasion, Mr. Harvey was second Vice-President, but he was standing for President; could this please be explained?

    Mr. Magaña responded that at the moment, before any other decision was taken, Mr. Harvey was second Vice-President. The first Vice-President had been Mr. Carstens, who had resigned in April. So there was a President and a second Vice-President, which meant that at the moment there was no possibility of having an Acting President in case of need. So the idea had been that the first Vice-President meant merely the one who had served the longest. No difference in role was defined in the Convention, apart from that of becoming Acting President in case of need.

    Japan asked for confirmation that the role would jump to the second Vice-President.

    Mr. Issaev saw the situation as a very difficult one for Members. He understood the practical reasons for the proposed Resolution, but felt that it was necessary to look through the juridical possibilities and consequences. For example, in his country, only the body which had passed legislation could amend it, for example only Parliament could amend laws made by the government. So if this was a matter of the Convention, it was complicated. But in any case some letters would have to be prepared, with explanations to the governments of all countries which had taken part in the Convention. So discussion must begin. But if this was some matter decided by the Conference, then that made it easier, since the Conference could make the decision without any problem. But life had to go on, and an immediate interim decision had to be taken so that the situation could be resolved, while at the same time work was begun on finding a long term solution. Mr. Issaev proposed that there should be more thorough discussion of the matter.

    Mr. Magaña replied that there was no legal problem at present, though there could have been one a couple of months previously. There was a President and a second Vice-President and officially no first Vice-President. The second Vice-President had been elected some years previously by the Committee, which could therefore now decide to make him first Vice-President. This was one possibility. The second issue was for the future. If there then was a President and a second Vice-President and no first Vice-President, then Article XV of the Convention could not be implemented at all, because in the case of the President resigning or ceasing to fulfill his role for any reason, then if there was no first Vice-President it would not be possible to have an Acting President. Something should be decided for the future by the Conference. For the present, the Committee could decide before electing its President and Vice-Presidents whether Mr. Harvey should become first Vice-President, or not. Following the result of the vote on Friday it might come about that there was either no President at all, or no first Vice-President. This had happened in the past. If that happened, they would not know what to do. If they again had a President and a second Vice-President and no first Vice-President, the situation would be complicated. But the CIML could do as it wished.

    Mr. Issaev said that the Committee was in a position to decide which Vice-President would be the first and which the second, but there was no procedure for deciding that one Vice-President should automatically become something else. For example, it was in the rules that a President could be made from a first Vice-President, but not automatically - this needed a vote.

    Mr. Mason commented that the Convention seemed to be looking at a situation where there was a first Vice-President and a second Vice-President, but gave no procedure for deciding which was which. There were three possibilities. One was that the successor to the first Vice-President was always the first Vice-President, which seemed slightly odd. The second was that it should be a matter of automatic seniority, which was what this Resolution proposed. But the third was that the Committee itself could decide between themselves which of the

    Vice-Presidents, if there was more than one, should be first and which should be second. Bearing in mind that it was not known what the composition of the Vice-Presidents would be, Mr. Mason suggested that it would be appropriate to vote on who should be first or second on Friday morning, when it was known who they were.

    Mr. Johnston said that this could be considered.

    Asking for confirmation, Mr. Magaña said that a Vice-President would be elected, and afterwards it would be decided who was first and who second.

    Mr. Mason pointed out that there was also a possibility that at that point there would be only one Vice-President.

    Mr. Kool commented that Mr. Mason's solution had the drawback that there could still be a situation where there was no first Vice-President, and the President became incapable of performing his duties. The Convention stated clearly that the first Vice-President should assume the duties of President if the latter became incapable. However, it did not say anything about which of the two Vice-Presidents was considered first or second. The Committee was free to decide, for endorsement by the Conference, upon the principle of seniority, for example saying that the Vice-President who had been longer in office should be considered to be the first Vice-President.

    Mr. Johnston made the point that if they found themselves without a President or first Vice President at a time when there was not a Meeting, it would be extremely difficult to resolve the matter by postal ballot. There definitely needed to be a first Vice-President at all times. Ideally there would be both, but without a first Vice-President it could happen that a long time passed before a replacement President could be appointed.

    Mr. Magaña added that if the Presidency and Vice-Presidency were filled during the current meeting, there would be no need to implement Article XV of the Convention in the next two years. So if the immediate problem could be solved for the time being, the ongoing problem could be solved by the Conference in two years time.

    Mr. Issaev liked Mr. Mason's suggestion that the problem be resolved on the coming Friday. Otherwise, it would be necessary to choose the first Vice-President without any discussion.

    Ms. Van Spronssen also supported the same proposal but suggested that in the case of there being no Vice-President and no President, the second Vice-President could automatically assume the duties of the first on a temporary basis until the next CIML Meeting.

    Mr. Johnston concluded that Mr. Mason's proposal would be followed and a vote held on the Friday. In support of this they would also look at Ms. Van Spronssen's suggestion.

    Mr. Magaña then read the following modified Draft Resolution no.11:

    ## Draft Resolution no.11:

    The Committee, Considering that Article XV of the Convention calls for the election of a President and a first and second Vice-President and that, in case the President is absent or incapable, the first Vice-President shall temporarily assume the duties of the President, and Considering that Article XV does not deal with the case that the first Vice-President resigns or his mandate otherwise ceases before that of the second Vice-President, decides that after the election of the Vice-President during the current meeting, the CIML will decide which of the two Vice-Presidents will be first Vice-President; and instructs the CIML President to prepare a proposal to be submitted to the 14th Conference in 2012 on the interpretation of Article XV in the event that the position of first Vice-President becomes vacant and the President is incapable of performing his duties.

- number: 4.2.2
  title: Candidacies for CIML Vice-President
  narrative: |2+

    ## Mr. Philippe Richard

    Mr. Richard said that he had prepared a short presentation which he would give in French, out of respect for the French speaking Members present, and also because in 2010 Switzerland was host to the French Speakers' Summit Meeting.

    Addressing his colleagues, he said that his presentation would be very short and would present some elements of his candidature which would support the activities of the Presidency and those of the Organization.

    Mr. Richard said that French was his first language but that he also spoke English and German. His French would be an asset to the Presidency and to the Presidential Council.

    He also lived very close to Paris, which would make it practical to go there frequently just for a day, to support the Director or the Presidency as required.

    Mr. Richard was currently Vice-Director of the Federal Metrology Office and the Swiss National Institute of Metrology. He had experience of management, being in charge, within that office, of the scientific, industrial and legal metrology divisions. He had a total of 14 years experience in that domain. He was also at management level in METAS, responsible for international relations and human resources.

    Mr. Richard said that he was an active member both of the OIML and of the BIPM; he wanted colleagues to understand, however, that a rapprochement between the two organizations was not foremost in his ambitions, but like the BIPM representative had said that morning, he was equally involved in the new definition of the International System of Units and also headed a working group on the practical use of the new definition of the kilogram. This was of major interest for the OIML because of its close relation to Recommendation R 111 on weights, and was a priority matter for the OIML because it would have a key direct influence on their work, as they would have to produce regulations regarding the increased uncertainties resulting from the redefinition.

    Mr. Richard informed Members that he was at the moment studying for an MBA in Finance and Management, which could be useful for the task if he was elected.

    Finally, Mr. Richard explained, Switzerland was relatively independent, in that it was not a member of the European Community. Finishing his short presentation, he said that it was a pleasure to him to offer his multiple skills and experience to the OIML. He would be available for the rest of the week to answer any questions Members might like to put to him.

    Mr. Magaña thanked Mr. Richard, and asked Mr. Roman Schwartz, Germany, to give his presentation.

    ## Mr. Roman Schwartz

    Mr. President, distinguished delegates and guests: Thank you for the opportunity to briefly introduce myself and to explain my background and my motivations for applying for the post of Vice-President.

    First I would like to offer a brief CV. I am aged 55, my academic qualifications are a diploma in Physics and a PhD in Electrical Engineering. I am currently employed, since 2006, as the Head of the Mechanics and Acoustics Division of the PTB. This division has about 150 staff members working in seven departments, ranging from mass measurement, force, torque and weighing instruments, through gas meters and water meters, up to acoustic measurement devices. My previous employment has been, from 2001 to 2006, head of the department "Solid Mechanics", which comprised mass, force, torque and weighing instruments. Before that I was first a scientist and then the head of the weighing instruments laboratory of the PTB, and before that I worked in the PTB mass laboratory as a scientist; prior to that (a long time ago!) I used to work as a scientist at the Technical University.

    Let me summarize my appointments and experience:

    - since 2007 I have been a member of the Presidential Council;

    - since 2006 I have been CIML Member for Germany, and also a member of the CIPM Consultative Committee "Mass and related quantities";

    - since 2005 I have been involved in the OIML MAA as a member both of the CPR for R 76 and R 60, and representative for Germany in OIML TC 3/SC 5;

    - since 2001, and still now, I have the co-secretariat, with France, of OIML TC 9/SC 1 responsible for non-automatic weighing instruments, and, together with France, we were responsible for the revision of R 76 in 2006;

    - from 1996 to 2006 I chaired WELMEC Working Group 7, working on software for instruments under legal control - we developed the WELMEC document on software, which has been taken in TC 5/SC 2 as a kind of "standard" for the OIML requirements in the OIML Document on software;

    - until 2006, I was a member of WELMEC WG 2 for automatic weighing instruments and non-automatic weighing instruments.

    What is my motivation for the application for the position of Vice-President? I think I can contribute my long experience and broad knowledge and all my experience of metrology: scientific, industrial and legal. I think I have a good measure of personal and business contacts in legal metrology worldwide. I can say that I know legal metrology "from scratch". I know type testing of weighing instruments, I have done it by myself and starting at the weighing instrument level; I have myself issued test reports, evaluation reports, report certificates, I have done peer assessment of laboratories, and I have been involved in the

    development of standards, technical documents, and am also very much involved in bilateral Memorandums of Understanding and bilateral arrangements.

    Another motivation, and the main motivation, is that I consider the OIML to be an important player in the field of metrology and I consider the OIML also as an important international standards organization that is worthy of support.

    The last point is that I want to have a share in the OIML. I like to be well prepared for future challenges. We have cooperation with international bodies already but I think we can of course further improve this collaboration.

    My final point is my commitments. As the Vice-President I would be supporting the CIML of course, and the CIML President with my experience and knowledge; that is the basic task of a Vice-President. I would of course be committed to promoting and improving the OIML MAA to make it even more successful than it is today. I think it is one of the biggest issues in the global market and the global world to have this MAA and to make it really successful.

    I would be committed to supporting work on new OIML Technical Directives that are adequate for an international standards organization. I would be committed to even more supporting efforts towards further improving the uniformity, quality and acceptance of OIML publications. When I speak to colleagues I sometimes hear the argument that OIML Recommendations are not always of the highest quality; they are not uniform - we have so many Recommendations written differently, without a clear structure. So I think we can further improve our work even more because this is an advertisement for OIML. And I would intensify contacts and cooperation with other international standardization and conformity assessment organizations, as I mentioned in the morning already, especially with ISO/IEC. We have to enjoy even closer cooperation which will in turn enable us to learn from each other.

    Thank you for your attention and I hope for your support. Thank you.

