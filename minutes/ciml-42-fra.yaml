    Le Comité a pris note d'un rapport donné par le Directeur du BIML sur les Activités en liaison avec d'autres Organisations et a chargé le Président du CIML de signer la reconduction du MoU existant entre l'ILAC et l'OIML afin d'inclure également l'IAF.

