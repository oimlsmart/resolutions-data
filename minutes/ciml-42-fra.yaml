- number: '6.3'
  title: Rapport concernant la Table Ronde des RLMO et le Groupe de Travail sur la
    Conformité au Type
  narrative: |2+

    Le Comité a pris note d'un rapport présenté par le Directeur du BIML concernant la Table Ronde des organisations régionales de métrologie légale (RLMO), a noté que les exposés effectués par les RLMO ont été mis en ligne sur le site web de l'OIML et a accepté de mettre en place un groupe de travail sur les ressources de financement, présidé par M. Carstens.

    ## Le Comité a chargé le Bureau de :

    - rédiger un projet de MoU entre I'OIML et les RLMO ;

    - mettre en place un forum sur Internet pour faciliter l'échange d'informations entre les RLMO.

    Le Comité a pris note d'un rapport présenté par le Directeur du BIML concernant le Groupe de Travail sur la Conformité au Type et a chargé le BIML de rédiger un projet de termes de référence pour une étude sur la conformité au type.

    Ces termes de référence seront soumis au Président du CIML pour l'approbation.

- number: '6.4'
  title: Tableaux de la MID (directive européenne sur les instruments de mesure)
  narrative: |2+

    Le Comité a pris note d'un exposé du Directeur du BIML et a chargé le Bureau de continuer sa coopération avec WELMEC concernant ce point. Le Comité a également demandé aux participants européens des TC/SC concernés de rédiger les premiers projets de tableaux de correspondance avec les exigences de la MID dès qu'une Recommandation reçoit le statut de DR (Draft Recommendation).

