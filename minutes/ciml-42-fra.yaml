    ## Le Comité a approuvé les Publications suivantes :

    - DR 1 Révision combinée des R 4, R 29, R 45 et R 96 Récipients pour transactions commerciales ;

    - DR 2 Révision combinée des R 117, R 105 et R 86 Ensembles de mesurage dynamique de liquides autres que l'eau ;

    - DR 3 Nouveau Projet de Recommandation OIML Ensembles de mesurage de gaz compressé pour véhicules ;

    - DR 4 Nouveau Projet de Recommandation OIML Systèmes de mesurage de gaz ;

    - DR 5 Révision R 21 Taximètres ;

    - DR 6 Révision R 107-1 Instruments de pesage totalisateurs discontinus à fonctionnement automatique (peseuses totalisatrices à trémie). Partie 1: Exigences métrologiques et techniques – Essais ;

    - DR 7 Révision R 35 Mesures matérialisées de longueur pour usages généraux. Partie 1 : Exigences métrologiques et techniques ;

    - DR 8 Révision R 107-2 Instruments de pesage totalisateurs discontinus à fonctionnement automatique (peseuses totalisatrices à trémie). Partie 2 : Format du rapport d'essai ;

    - AM 1 Amendement 2 au D 2 Unités de mesure légales.

- number: '8.2'
  title: Proposition concernant le travail des TC/SC
  narrative: |2+

    Le Comité a approuvé :

    - la proposition de fusion entre le TC 8/SC 7 Mesurage du gaz et le TC 8/SC 8 Compteurs de gaz (remarque du BIML : Secrétariat les Pays Bas – le SC qui en résultera sera le TC 8/SC 7 et conservera le même titre) ;

    - la proposition de Révision de la R 79 Exigences pour l'étiquetage des produits préemballés ;

    - la proposition de réattribuer la responsabilité de Bouteilles récipients-mesures du TC 8 au TC 6 ;

    - la proposition de révision de la R 81 Dispositifs et systèmes de mesure dynamique des liquides cryogéniques ;

    - la proposition visant à dispenser d'appliquer la section 3.4 la B 6-1 (Directives relatives aux travaux techniques de l'OIML) lors de la révision de la R 99 ;

    - la proposition visant à soumettre la DR de la révision de la R 71 à un vote direct du CIML en ligne ;

    - la proposition visant à soumettre les DR des révisions des R 85-1, R 85-2 et R 85-3 à un vote direct du CIML en ligne ;

    - la proposition visant à soumettre la DR de la révision de la R 80-1 à un vote direct du CIML en ligne ;

    - la proposition visant à soumettre la DR de la nouvelle Recommandation relative aux Instruments thermographiques à un vote direct du CIML en ligne ;

    - la proposition visant à soumettre la DR de la nouvelle Recommandation relative aux Réfractomètres automatisés à un vote direct du CIML en ligne ;

    - la proposition visant à retirer le D 4 Conditions d'installation et de stockage des compteurs d'eau froide ;

    - la proposition visant à approuver la révision de la R 66 Instruments mesureurs de longueurs comme nouveau projet de travail ;

    - la proposition visant à reconfirmer la R 24 Mètre étalon rigide pour agents de vérification ;

    - la proposition visant à soumettre le Projet d'Amendement à la DR 1, Révision Combinée des R 4, R 29, R 45 et R 96 Récipients pour transactions commerciales à un vote direct du CIML en ligne ;

    - la proposition de révision du Nouveau Projet de Recommandation OIML DR 3 Ensembles de mesurage de gaz compressé pour véhicules visant à en faire un nouveau projet de travail du (nouveau) TC 8/SC 7.

