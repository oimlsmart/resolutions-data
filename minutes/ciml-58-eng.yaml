    The first secret ballot had been for the position of CIML Second Vice-President; Mr Loizides had been elected with 52 votes (see item 6).

- number: '17'
  title: 1 OIML Medals
  narrative: |2+

    The first Agenda item would be the OIML medals, and he asked Dr Schwartz to announce the award.

    Dr Schwartz said it was his great pleasure and honour to announce the first award of the day, which was an OIML medal for a long standing CIML Member, Mrs Mairead Buckley.

    Before giving Mrs Buckley her award, Dr Schwartz read the following laudation.

    "Mairead Buckley has been a highly respected expert in the field of legal metrology for many years. With her competence and many years of experience, she has not only rendered outstanding contributions and services to European legal metrology bodies, such as the respective committees of the European Commission and WELMEC, but also in the OIML. She has been very active as CIML Member for Ireland since 2012, a member of the Presidential Council since 2017, and was also significantly involved in the first internal financial audit of the OIML financial procedures. This OIML medal acknowledges her many years of active participation in, and valued contributions to, the work of the OIML. The OIML wishes Mrs Buckley all the best in her new role as Head of Corporate Services at the National Standards Authority in Ireland, the NSAI."

    Dr Schwartz congratulated Mrs Buckley on her medal, which he judged was very much deserved, and which he hoped was a surprise. He thanked her for all the work she had done for the OIML.

    Delegates gave a round of applause.

    Mrs Buckley replied she was really surprised.

    Dr Mathew informed delegates that Mrs Buckley was a member of the Presidential Council, and when it had reviewed the agenda for the 2023 CIML meeting, it had been announced there would be no medals awarded in 2023. Thus her award had been kept a secret from her until now.

    Mrs Buckley confirmed this was "absolutely a surprise", and that she had not been expecting it at all. She was honoured and privileged to have received the medal from the OIML, because she believed the Organisation served such an important function. She added that in the time she had been involved in legal metrology, she had contributed what she could, and she appreciated that what she had been able to contribute had been acknowledged. Everyone brought something different to the table, and she supposed that, coming from quite a small economy which had emerged, as many others had, coming into the modern era, for her, this was really important. At the time she had started in metrology, she had been working with legislation dating from 1904, so she had seen quite a change in her own country, with European legislation, which had always been informed by the work of the OIML. This was why

    she thought that all the work that went on in the Organisation was so important, and everybody's contribution could be acknowledged by the Organisation, as her small contribution had been, so she thanked everybody very much. She particularly wanted to thank the former President, Dr Schwartz, who had "really had faith in her" and had asked her to serve on his Presidential Council, which had also been an honour. During that time, she had also worked closely with Dr Mathew as CIML Second VicePresident, and she knew that their enthusiasm for legal metrology, as well as for the Organisation, was the energy that had brought all delegates to the current meeting. She thanked everyone very much.

    ## Delegates gave a round of applause.

    Dr Mathew explained that although it had been announced at the Presidential Council that no medals were to be awarded this year, there were in fact two, and he asked Dr Schwartz to return to the podium. It had been decided amongst the Presidency, without the President's knowledge, that he deserved a medal. Dr Mathew stated that he had organised this in a slightly different way than usual. He would not be giving the laudation personally, but some delegates might have noticed there had been talk about the different generations of Presidents, so he would start by asking for the laudation given by a person who was not at the meeting, but who had been a great mentor to Dr Schwartz during his career, and who many delegates would know, as he had been Acting CIML President for two years, Prof. Dr Manfred Kochsiek. Dr Mathew reported that Dr Kochsiek had been delighted to write the laudation, and he would now read this, but added that this was just the first in a "small parade" of laudations. Dr Mathew read:

    "As ninth CIML President, Roman Schwartz has a special place in the OIML's almost 70-year success story. In my opinion, the greatest challenge posed by COVID, the current war in Eastern Europe, the transition to the digital world, inflation, as well as many other international restrictions on cooperation, fell during his term of office. I, Manfred Kochsiek have been involved in OIML work for 50 years, and can appreciate how difficult this period was, and is, and how brilliantly Roman Schwartz has led the OIML through this period. What should not go unmentioned is his human warmth and sensitivity towards all his fellow colleagues in the OIML, which always led to solutions to problems that arose. We all wish him a pleasant transition into his well-deserved retirement."

    ## Manfred Kochsiek

    Dr Mathew reiterated this had been the first laudation from a former President, but added there were two others, who were at the current meeting, and who would like to say something.

    ## Mr Johnston greeted delegates and gave the following laudation.

    "I would like to say a few words about my relationship with Roman. When Bobjoseph asked me to speak, I immediately started writing down my thoughts, so I wouldn't stand up here and "bumble along", but then a few hours later, Bobjoseph described Roman as being patient, hardworking, and able to deal with all situations in a very calm manner, and there went the three things I had written down as well, so I decided this morning to concentrate on the human side of Roman. I think this has contributed to him in a big way, in terms of his success within this Organisation, and in his personal life as well. For example, whenever Roman meets with my wife and myself, he always asks us about our grandkids. Well, as proud grandparents do, we tend to update him on every little detail of our grandkids, while Roman stands there patiently smiling and asking questions. I know he has much more important things that he needs to do, but he doesn't demonstrate it when he is talking to me, or to my wife Carol, who is unfortunately not able to be here. Another human side of Roman is that you see him outside of the working environment, and I go back to the meeting in Hamburg in 2018, where he had organised a river cruise, and the entertainment was a Beatles tribute band - well there was Roman rocking along with songs like a "A Hard Day's Night", and "She Loves You", and enjoying himself thoroughly with his wife Annette. The reason I mention this is that it encourages other participants, who are generally shy, and who sit back, to get up and dance as well, and by the end of the evening, I think the whole boat was rocking. I did notice last night that the new President has carried on this tradition - I was particularly impressed with your hand movements

    last night Bobjoseph! I would like to say to Roman that it has been a pleasure working with you, and knowing you personally, and I know that you and Annette love to travel, so I am extending an invitation for you to come to Canada, to Ottawa, if you ever have the opportunity, but a little piece of advice, don't come during our winter months, unless you like to ski! Again Roman, all the best."

    Delegates gave a round of applause.

    Dr Mathew asked Mr Mason to give his laudation, joking that he had said that "generations" of Presidents would speak.

    Before commencing his laudation, Mr Mason commented that laudations were being given from several generations, and also several perspectives. He hadn't been quite sure what Mr Johnston and Dr Mathew would be saying, but he had thought that what the Committee would probably benefit from was a reminder of some of the concrete achievements which should be attributed to the immediate past President. He continued with his laudation as follows.

    "There are four achievements I would like to identify:

    The first is actually the drive and determination, which Roman showed in developing the OIML-CS, as we now see it, as described to us earlier in the meeting. A long list of people were mentioned as having contributed, to what I think we all agree, is a very successful initiative. But to my mind, we also ought to remind ourselves that it was the personal drive and determination of the then Vice-President to see all of the structures for the OIML Certification System put in place, and I think this is something which, when we celebrate Roman's contributions, we should definitely make sure we do not forget.

    The second achievement was actually his dedication to the CEEMS agenda. I personally will always be grateful for the support he provided when Mr Pu Changcheng and myself were developing the ideas which then turned into the CEEMS Advisory Group, and its own extensive agenda, which we heard about yesterday. And indeed he carried that determination into his own Presidency, and I think we can genuinely say that the CEEMS programme would not be what it is today without his important contribution, and the important contribution which he provided, not just personally, but also by bringing in so many of his PTB colleagues.

    The third achievement I would like to mention is the vision and foresight which he brought in identifying the challenges and opportunities of the digital revolution. I well remember that the first time it really struck me as being a significant development was in the Hamburg Conference, and I think that again we need to acknowledge the contribution which Dr Schwartz has made, not just in identifying the issues, but also in pushing forward suggestions and initiatives, for making sure that the OIML is in the best possible position to meet the challenges and the opportunities of digitalisation. He has shown great imagination in setting the OIML on a course which should allow us to start to meet those challenges.

    But the final tribute I would like to make goes back to some of the personal qualities that Alan and others have identified. What I would like to remind you is that seven years ago in Strasbourg, there wasn't exactly a long list of people queuing up to take over from me as President! I don't think it is a very well-kept secret that Roman required quite a lot of persuasion to eventually put his name forward. Actually, I referred to it at the time as a certain amount of "arm-twisting", but I am extremely glad that he did put himself forward for the post of President. As Manfred has pointed out, he was President during an extremely difficult period, and again I don't think we should underestimate just how difficult it has been to keep the Organisation functioning during this period while we have been unable to meet together inperson. So, I would again like to pay tribute to the personal dedication, the selfless dedication actually, which he has shown in carrying out his duties, and for that both I personally, and I hope the whole of the Committee, will feel an enormous debt of gratitude. I am sure there is very much more that I could say, but there are probably others who would also like to make their own comments, so I shall leave it at that. Thank you.

    Delegates gave a round of applause.

    Dr Schwartz said he had just been asked if his wife Annette would like to be with him on the stage, so he asked her to come up if she would like, adding that he would be happy if she came up.

    Dr Ehrlich said that while Annette Schwartz made her way onto the stage, he would also like to add a few words of thanks in gratitude to Dr Schwartz.

    "I was thinking back to when I first met Roman, and I realised that it was in 2004, at the CIML Meeting and Conference in Berlin, so it has been quite a while. I have always remembered that I met Roman at the drink table during a coffee break, and we started talking, and I remember thinking, "boy, I really hope this guy gets involved in OIML!" He already was actually at the time, and I guess I hadn't realised, but he wasn't on the list of delegates. I went back to check, but it wasn't long after that he was, so Roman it has been a wonderful time together in many different ways, and on the Presidential Council, and I just want to add my great thanks and appreciation to everything that everyone has said. Thank you."

    Delegates gave a round of applause.

    Dr Mathew commented that the reason for Annette being on stage was that Dr Schwartz was a strong man, but behind every strong man is usually an even stronger woman.

    Dr Schwartz said that this had been a second surprise, that he had not expected it either and he was really grateful, honoured and overwhelmed. He thought he had just been doing what was necessary, and what he had promised, so for him it had been nothing out of the ordinary. On the other hand, he was very much aware that without the support of his many colleagues nothing would have been achieved, so it was not just him, but always a team. He would therefore like to thank many people, especially of course, the Bureau staff. It had always been a pleasure to work with them in a very cooperative way, to guide the Organisation through all these "difficult waters", in difficult times. There had always been a close and good cooperation with the Bureau staff, and thanked them very much for their support and for the good communication between them. Dr Schwartz thought this deserved some applause.

    He also thanked the Presidential Council and the Presidential Board for their cooperation. The Presidential Council was something which a President really needed, and he was so grateful for all the excellent support which he had received throughout his time as President. Dr Ehrlich had mentioned the good cooperation between them, which had been evident for many years, and it had been a pleasure to work with him, in the Technical Committees, then in the Presidential Council, and then with Dr Ehrlich as CIML Vice-President and he thanked him very much.

    Finally, he wanted thank his wife, who had always supported the work he had been doing for international legal metrology, and he also thanked delegates for having trusted him. He said he had good memories of Colombia, where he had been elected President six years ago, after a long time of thinking about it. He acknowledged that Mr Mason had been right - it had taken him a while to really find the right commitment. If he said "yes", he wanted to be able to do what he had promised, which had always been his intention, and he thanked all delegates for having supported him, and having had confidence in him. He said he was looking forward to staying in contact with them, and as the OIML was such an important organisation, he thought there would be a lot of things to do in the future. There would be big challenges, but by sticking together in a sense of cooperation, in a sense of finding compromises, in a sense of speaking to each other, and taking up difficult topics, and really working hard, he thought the Organisation had a very good future. He was so happy that the Organisation had a new President, who would take the Organisation "far and beyond", as the new Second Vice-President had said the day before, and so with this he was relieved, he was grateful, and he thought the Organisation would be moving forward in the right direction, and he wished all the best and much success to his successor. He thanked delegates very much.

    Delegates gave a round of applause.

    Dr Mathew thanked Dr Schwartz for his mentorship and leadership, and as Dr Schwartz could see, the community very much appreciated this, which was why Dr Schwartz would also be awarded the title of Member of Honour, and he hoped delegates would join him in approving this by acclamation.

    Delegates again gave a round of applause.

    Dr Schwartz thanked delegates. He said that he had retired three years ago from his post as Vice President of the PTB in Germany, at the start of the COVID pandemic, and the nice farewell party he had organised there had been stopped ten days before it had been due to take place, so he had not had a party at all. It therefore gave him a good feeling that he was finally able to have a farewell party within the context of the OIML, and he was grateful. He felt very honoured, thanked delegates for having made him a Member of Honour, and said he would stay in touch with the Organisation for sure.

