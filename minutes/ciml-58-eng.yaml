- number: '11.1'
  title: 1 Revision of OIML D 31:2019 (as amended in 2020) General requirements for
    software-controlled measuring instruments
  narrative: |2+

    Mr Dunmill noted that D 31 had been published in 2019 and amended again in 2020. The Project Group had then continued to revise this Document, which covered a critical and fast-changing area, and it had been submitted for a CIML preliminary online ballot with a deadline of 13 April 2023, to which 35 of the 62 CIML Members had responded. One Member State had abstained, and the rest had voted in favour, which meant that the Draft Document had passed the preliminary ballot, so the Final Draft revision of this Document was being put to this CIML meeting for approval. The draft resolution would note any comments made at the present time, otherwise that line would be deleted from the resolution. The draft resolution also thanked Project Group members for their work. It was worth noting at this

    point that delegates would hear about this Document again later in the meeting, as the Project Group was proposing to continue with a new revision because software was a fast-moving area of work. Mr Dunmill asked if there were any comments about the proposal to approve this.

    Dr Ehrlich stressed that delegates would have hopefully read the Addendum on this item, and asked again if there were any comments.

    Mr Dunmill noted that as there were no comments, the line "Noting any comments" would be removed from the final resolution delegates would receive:

    ## Draft Resolution no. CIML/2023/14

    Agenda item 11.1.1

    The Committee,

    Noting comments from its Members,

    Approves the Final Draft revision of D 31:2019 (as amended in 2020) General requirements for software-controlled measuring instruments, and

    Thanks the Project Group convener and members for their work in completing this project.

- number: '11.2'
  title: 1 Revision of OIML D 31:2023
  narrative: |2+

    ## General requirements for software-controlled measuring instruments

    Mr Dunmill said that as he had already mentioned, the first project proposal was the ongoing revision of OIML D 31. The convener of the current Project Group, for which delegates had just been presented the Final Draft revision of D 31, had initially hoped that this would be the final stage of the revision of this Document for some time, but in the later stages of the revision, a number of comments had been held over as significant issues which could not be included in the Final Draft, so it had been proposed to continue with a further revision of this Document. As delegates would notice, it was described as a revision of D 31:2023, which would be the date applied to the one that the Committee had just considered for approval. He enquired whether Germany, as the proposer of this project, wished to make any comments. The project would be under the convenership of Germany, with Marko Esche from the PTB being the Project Group convener.

    Dr Schwartz stated that there were no comments from Germany. He thought that everyone was aware that this had been a very productive and efficient Project Group, and added that the work it had carried out was very much appreciated, as it would be in the future. There was nothing further to add at this moment in time.

    Mr Dunmill displayed the draft resolution which was put forward for approval, remarking that the details of what would be included in the project were available in Addendum 11.2.1, which delegates had already received:

    ## Draft Resolution no. CIML/2023/18

    Agenda item 11.2.1

    The Committee,

    Approves as a new project, under the responsibility of TC 5/SC 2, the Revision of OIML D 31:2023 General requirements for software-controlled measuring instruments, to be conducted as specified in the project proposal provided in Addendum 11.2.1 to the Working Document for this meeting.

    Dr Ehrlich asked if there were any comments or questions. There were none.

- number: '12'
  title: 1 Report by the OIML-CS Management Committee (MC) Chairperson
  narrative: |2+

    Dr Mathew asked Mr Panesar to take the floor and give his presentation.

    Mr Panesar greeted CIML Members, the Presidential Council, and distinguished guests, and introduced himself. He said that he was sure delegates had read his report in Addendum 12.1, but if this was not the case, his presentation would be focusing on a few of its key topics from his point of view. He added that he may have missed out a few things, but these would be in the Addendum. He also wanted to welcome all new CIML Members, and said that if any of them had any questions about the OIML-CS he would be happy to answer these in the breaks during the remainder of the meeting. This year had been the first time the OIML-CS Management Committee (MC) had met in-person for nearly four years, as the last time had been in March 2019. The meeting had been held at METAS in Bern, Switzerland on 16-17 March, and the MC wanted to thank the CIML President Dr Mathew, and his team at METAS for having provided such a wonderful venue.

    Mr Panesar put up a slide showing the MC in action, together with the facilities provided at the meeting. This also showed the excellent participation, and he commented that it had been good to see everyone

    in-person after such a long time. The day before the MC meeting, since everyone was enthusiastic about being able to travel and see each other, there had been the opportunity to hold four informal meetings, which had been the Review Committee, the Maintenance Group, the Assessments Requirements Working Group, and the Promotion and Awareness Raising Working Group. He was describing these as informal, because normally the Working Groups and particularly the Review Committee were restricted to only those participants registered for those particular Working Groups or Committees. He remarked that delegates should not be alarmed, as all the routine meetings had been held earlier in the year, but it had been a good opportunity to get together and have informal meetings and some very good fresh views had been gathered. There had been many productive and engaged discussions, and he remarked that it had all been very positive.

    Mr Panesar showed delegates a slide indicating the key topics of the entire week and he read through them with some minor additions:

    1 Appointing a Management Committee Deputy Chairperson;

    2 Discussion on high priority publications and periodic reviews which delegates had seen in a previous presentation;

    3 Review of COVID contingencies measures;

    4 Discussion and establishment of a new Working Group for modular approvals;

    5 Discussion and a Working Group established on the use of the OIML-CS logo on test reports;

    6 Work and improved collaboration between the OIML-CS and the DTG;

    7 Updates from the Maintenance Group and the Review Committee; and

    8 Discussions on the activities of the Promotion and Awareness Raising Group.

    He highlighted that most of the COVID contingencies had been retained, which allowed for remote assessment etc., and there had been some clarifications around that. He also stressed that the new Modular Approvals Working Group had been very well supported, and in fact a large number of the MC members had put themselves forward for it, which had been good, and also the new Working Group on the use of the logo, had also been well supported.

    In the following slides Mr Panesar said he would be showing delegates how the performance of the OIML-CS was currently measured. He declared that he often found himself reflecting whether this was the right way, or whether better ways could be found, and he encouraged delegates to put forward any ideas.

    His first graph was rather detailed, and showed the number of certificates issued since the launch of the OIML-CS. Delegates could see the effects of the COVID pandemic, but in general, the trend lines were going the right way, and again it was reassuring that the OIML-CS was proving to be healthy. The next graph (total certificates per year including revisions) was a version of the previous graph, presented differently. He knew that trend lines could mask problems, but again it did indicate that currently the system seemed to be healthy. He joked that as delegates might have guessed, he quite liked charts, as he thought them more interesting to look at than too much text, so his next chart showed the 12 Issuing Authorities and the number of certificates they had issued, which was a simple graph. He stressed that this was where he had some exciting news, suggesting that it was not often that this was said in legal metrology, but he thought this was exciting. He was very proud to announce that India had successfully become the newest OIML Issuing Authority, and asked Mr Agarwal to stand up.

    Delegates responded with a round of applause.

    Mr Panesar said he thought Mr Agarwal deserved the round of applause. He stated that Mr Agarwal was the new Indian CIML Member, and he congratulated him and his team on their successful application to become the newest OIML Issuing Authority. It was a truly great achievement, given how many years the number of OIML Issuing Authorities had remained static, so he congratulated India. Also, on the graph delegates could see, he had created a forecast, which he acknowledged to be his own personal forecast, so if it proved to be wrong, it would be his fault and no one else's, but he strongly

    believed that by the end of 2024, there would be three new OIML Issuing Authorities. If this proved to be the case, and he was not there then, he requested delegates also gave them a round of applause, as he considered it was a true achievement. He commented that this indicated the OIML-CS was growing and developing well.

    One of the reasons for this development and growth was due to the work of the MC, and he wanted to thank his good colleague Katharina Gierschke (Germany) for her contribution. Delegates could see her at work on his current slide. The MC had held a breakout session at its last meeting, and as delegates could see, Katharina had been one of the more engaged participants at the MC. The slide showed her summarising the outcomes, thoughts, and contributions from the MC. This has been based around a question about what the MC meant by "growth". Did it mean purely the number of certificates issued, did it mean where those certificates could be used internationally, and how well they were accepted, did it mean the number of experts, the number of test laboratories, or the number of Utilizers? At the current time it was simply being measured on the number of certificates, so that was what he was focusing on, but there were other ways, so this "strategic development and growth" breakout session had provided some really good insights. All of these had been collected, and would be used to help the MC to continue to build and strengthen the OIML-CS in the future.

    Mr Panesar reported there were several other news items, but these were not new to delegates due to previous presentations, and he read from his next slide:

    - OIML R 111 would be entering the OIML-CS;

    - a Recommendation was being developed from the Guide on electric vehicle supply equipment;

    - the Recommendation on speed meters was being revised; and

    - as had already been reported on numerous times already, there a had been a GULFMET workshop on the OIML-CS.

    Continuing his current theme, Mr Panesar reported that there was yet more news, but before going through the next slide, he wanted to ask the current OIML-CS Board of Appeal chairperson, Dr Schwartz whether the OIML-CS Board of Appeal had had to do any work, because he believed it had not. His conjecture was confirmed as being correct, and he said that he thought this spoke volumes of the OIML-CS as it had been working since 2018 and not one appeal had gone to the OIML-CS Board of Appeal, which he remarked was great. He mentioned that the new CIML President, Dr Mathew would be taking over the role.

    Mr Panesar went on to say that the Ninth OIML-CS MC meeting would be held in India around March 2024, and he thanked Mr Agarwal, the CIML Member for India, saying that everyone was looking forward to this.

    Before finishing his presentation, Mr Panesar wished to thank the MC, the members of which he said all worked incredibly hard. The outcome and robustness of the OIML-CS was thanks to the MC, as well as the other Committees and their groups, of which one of the busiest Committees was the Review Committee. The Review Committee reviewed all the applicants, all the test labs, the extensions to scopes, the experts, and it did a wonderful job, so he wanted to thank Mr Stolz and his team in the Review Committee. Mr Panesar also thanked Mr Alex Winchester and his excellent team, and the Maintenance Group chaired by Mr Loizides, and he also thanked Mr Loizides for his many years of support as Deputy Chairperson. Lastly, he thanked Mr Dixon for his excellent secretariat support, which he commented underplayed the work carried out by Mr Dixon, adding that he did a lot more besides the secretariat work, and he asked delegates to give these people a round of applause.

    Delegates responded with a round of applause.

    Lastly, Mr Panesar said that this was the first CIML meeting at which he had made his presentation inperson as the OIML-CS Chairperson, and unfortunately it would be his last time as well. He said he had thoroughly enjoyed working with the OIML-CS Management Committee, and it has been an honour chairing and working on such a prestigious system. He wished the future Chairperson all the best, and hoped he would continue to grow the system.

    Delegates showed their appreciation with a round of applause.

    Dr Mathew thanked Mr Panesar, saying that he was sad about him stepping down from this position, as this would be a big loss for the Organisation. He said that Mr Panesar had managed the OIML-CS MC very well over the past years, and he thought it would not be easy to replace him. He sincerely hoped that his expertise would nevertheless still be accessible, and that he would still participate in the community's meetings.

    Mr Panesar thanked Dr Mathew and asked if there were any questions.

    Mr Nkobeni said the OIML-CS was of the most beneficial programmes for his country, and had been a game-changer for them. It had really helped them, and institutions and manufacturers were using the OIML-CS on a daily basis, but he wondered whether there was a way of measuring its use, so the Committee could also see the uptake. As Utilizers they had noticed one or two gaps in the system, or an area where support was needed, and he had not been aware that there was Review Committee, which he thought was a very good platform, but he also wondered whether there was some way to give feedback as users of certain certificates.

    Mr Panesar wished to respond to the first question, relating to how the utilisation of the OIML-CS could be understood - who was using it, and how many times. This had been a key topic during the strategic breakout session, and although it sounded like a contradiction, there were a number of what he had called "secret Utilizers", where it was known that certificates were being used, because some manufacturers may tell them, but members were not formally participating in the OIML-CS. It did not actually make any difference to the certificate, but it did make it difficult for the MC to understand how best to develop the OIML-CS if it was not known where it was being used, and how often. There were Utilizers in the system, which was great, but there was a need to better understand why the "secret Utilizers" were still keeping themselves a secret.

    He asked Mr Dixon to respond to the second the question about how feedback could be made.

    Mr Dixon thanked Zambia for their support for the OIML-CS. He knew they made good use of the system, and certainly in the past when in-person events had been held, Zambia had contributed to those events as a case study for the benefit of the OIML-CS. An opportunity for them to participate further would be to become a member of the MC, and then Zambia could provide input at MC meetings. Mr Dixon said he would speak to Mr Nkobeni after the discussion had finished later in the day, and give him some more information on this.

    Mr Panesar thanked Mr Dixon and asked if there were any other questions.

    Mr Agarwal wanted to thank Mr Panesar for his wonderful presentation, and told him that under his leadership as Chairperson of the OIML-CS MC, and with the help of Mr Dixon acting as a mentor, India had reached unexpected heights. He wanted to request, on behalf of the Committee, that Mr Panesar continued in his role as OIML-CS MC Chairperson. Mr Agarwal said this would make him very happy, as he had worked very well with Mr Panesar, and he hoped India would reach the next level very soon. This was his personal request. Secondly, India would be organising a forum the following year, and he would like to use the upcoming MC meeting to invite as many OIML members as possible to attend this event, as it would be good for India and its new project.

    Mr Panesar thanked Mr Agarwal, stating that his availability for the next meeting would be decided by his leadership team, and he was not sure, despite how powerful the Presidential Council was, that the people who paid his wages and set his directions would allow this, and he had to listen to them, but he thanked Mr Agarwal for his support. On the second point, he invited Mr Dixon to comment.

    Mr Dixon stated that in terms of the rules of the MC, observers were permitted to attend with the agreement of the MC Chairperson, so this was something that would be discussed when the arrangements were being made for the meeting in March 2024.

    Mr Panesar thanked everyone, and handed back to Dr Mathew, who thanked Mr Panesar again.

- number: '13'
  title: 1 Report by the CEEMS AG Chairperson
  narrative: |2+

    ## and

- number: '15'
  title: 1 Report by the RLMO Round Table Chairperson
  narrative: |2+

    Dr Ehrlich said that he was pleased to report that the RLMO Round Table continued to be very active, having held two interim meetings in the past year, in addition to the annual meeting. All these meetings had been held online, and Dr Ehrlich thanked Mr Mussio and the BIML for having hosted these meetings on Zoom. The interim meetings were held primarily for the exchange of information and ideas, which each of the RLMOs could take back to their regions where appropriate. Short update presentations from each RLMO, on matters of particular urgency or interest were also permitted at these interim meetings, but were not required. The interim meetings were also used for presentations on topics of interest, but these were not provided at every meeting. As he had indicated during the seminar the previous day, these interim meetings had proved to be a great opportunity for representatives from the RLMOs to hear what each other were doing, and to interact with one another, and for everyone participating to receive updates on OIML-related matters. He encouraged any delegates who were interested in participating to let him know, and he would add them to the invitation list for the meetings.

    In 2023, the main speciality presentation had been about the OIML's work on EVSEs, which had been provided by Dr Matthijs van der Wiel, convener of the TC 12 Project Group on this subject. The annual Round Table meeting, which had been held on 26 September 2023, enabled each RLMO to provide a lengthier report on activities and developments in their region over the past year. It was also used to plan the following year's Round Table meetings and activities. Dr Ehrlich said he would elaborate on this later in his presentation.

    Dr Ehrlich reminded delegates about the RLMO Round Table webpage on the OIML website, and thanked Mr Pulham for keeping it up to date. By clicking on the logo of each of the six RLMOs, users would be taken to the home page of that RLMO's website. He also reminded delegates of the PG Workspace for the Round Table which had been set up on the OIML website, and he thanked Mr Mussio and the BIML for having kept this up to date, and for having produced an easier to use version during the past year.

    On his next slide, Dr Ehrlich indicated how the presentations could be accessed, in addition to the other public Round Table documents for the annual meetings held over the previous four years. For delegates who were not familiar with the Round Table, Dr Ehrlich reminded them that the Round Table had been meeting annually since 2007, adding that it had met online for the past four years due to the COVID situation. He stated that the meeting would continue to be held online, as this maximised the number of people who could participate.

    Dr Ehrlich's next slide showed the first five items of the agenda of the most recent Round Table Meeting, and he thanked all the RLMO presenters shown in agenda item 4 for their excellent presentations. Dr Tsuyoshi Matsumoto had provided the APLMF presentation instead of Dr Osman Zakaria, who had been unwell, and he wished Dr Zakaria a speedy recovery. He said he would report briefly on the highlights from each of these RLMO presentations later in this presentation. As he had just mentioned, the presentations by the RLMOs had been posted on the Round Table website, and he encouraged all delegates to visit the website and take a look at the full presentations, to see for themselves the many interesting activities and events happening in the regions, as he would not have time to elaborate on these in this presentation.

    During the past year there had been a lot of interest in the digitalisation efforts within the OIML and elsewhere, as delegates who had attended the seminar the previous day would have seen. He thanked

    Dr Eichstadt for having kept RLMO Round Table members informed about the work of the DTG, adding that his input to the meetings had been very useful. The open forum discussion topics during 2023 had been on EVSEs and digitalisation activities in the regions, as shown under agenda item 6. The Round Table was still discussing what to do with regard to measurements and law enforcement, and a speaker who could give a presentation on this subject at a future interim meeting was being sought.

    A new item on the agenda at the meeting in 2023 had been item 6b on the project proposal for DC electricity metering, which had been presented by Dr Katya Delak of the US, as mentioned by Mr Richter earlier in the CIML meeting. Since it was a topic of interest to many people, Dr Ehrlich reported that they had kept EVSEs on the Round Table agenda, but there had not been a presentation on this subject at the annual Round Table meeting in 2023, other than in connection with the DC metering proposal, and he thanked Dr Matthijs van der Wiel for his presentation. In Agenda item 7a, Dr Tsuyoshi Matsumoto had elaborated on his presentation from earlier in 2023, about issues surrounding the sharing of e-Learning resources among the RLMOs, including proprietary aspects. This topic remained for further discussion and consideration, both in the Round Table, and also in the OIML. In agenda item 7b, Mr Dunmill had provided an update on the OIML e-Learning platform.

    Dr Ehrlich's next slide showed the remainder of the agenda from the Round Table Annual meeting. He did not intend to report on the CEEMS Advisory Group work, as delegates would be hearing about it from Mr Marneweck the following day. He stressed that the update reports were very valuable, and much appreciated by the representatives from the regions, and provided a great opportunity for the regions to ask questions, and obtain useful information, especially to help facilitate further participation in the OIML-CS in the regions. From his current slide, Dr Ehrlich said that delegates could see that a lot of useful information was provided during the Round Table meetings, so he again invited anyone interested in taking part to let himself or Mr Mussio know. Dr Ehrlich emphasised that the Round Table was a useful forum to stay abreast of what was happening, as information was updated every four months.

    Dr Ehrlich next wanted to elaborate on agenda item 8a on CEEMS. He reported that discussions during the Round Table meeting, as well as at the CEEMS Advisory Group meeting a few days later, had been about how to make CEEMS more engaged, and he said this would be a focus in the following year, which Mr Marneweck and himself had already discussed. If delegates had any thoughts on this subject, Dr Ehrlich asked them to let Mr Marneweck or himself know, and he thanked them in advance for their participation.

    Dr Ehrlich stated that he would now provide highlights from the individual presentations made by RLMO representatives at the annual Round Table meeting. As in the Round Table meetings, he would provide these in reverse alphabetical order starting with WELMEC.

    ## WELMEC

    Dr Klenovsky, WELMEC Chairman, had provided this report, and Dr Ehrlich encouraged him to add anything he may have left out. Dr Ehrlich continued that WELMEC was pursuing a targeted amendment of the European MID, to establish a set of essential requirements for electric vehicle charging stations, and for hydrogen refilling stations, as well as deciding whether and how requirements on electric energy meters and smart meters might be modified. Other targeted amendments that were also under consideration were on gas meters, thermal energy meters, and a few others. An ad-hoc working group had been established on the legal aspects of the electric vehicle charging infrastructure in Europe, and the terms of reference had been approved for a new working group on digital transformation in WELMEC. WELMEC was also actively looking at issues surrounding downloading software updates, and was collaborating more strongly with EURAMET.

    Dr Klenovský said that he had nothing to add.

    ## SIM

    The next presentation from SIM had been given by Sandra Rodriguez Zuñiga from Costa Rica, but she was not at this current meeting. She had announced that she had taken over as Chair of the SIM Legal Metrology Working Group from Mr Pedro Pérez Vargas, and as delegates had heard from Mr Dunmill, Mr Perez had now become the new Colombian CIML Member. Besides the change in the Chair, the SIM Legal Metrology Working Group had conducted training sessions in 2023 on OIML D31 on software, and on energy meters (which had taken place in Brazil). Then 12 SIM countries had sent trainees to NIST, for training on the fundamentals of metrology. The training had been provided by the Republic of Korea for these SIM legal metrology technicians. Costa Rica had activities in the areas of fuel dispensers, NAWIs, electricity meters and regulation. SIM had also contributed significantly to the April 2023 Bulletin, and Mr Pulham had already mentioned this. SIM had been working with AFRIMETS on the development of a new TC6 publication on OIML R87, a template for the metrological control of prepackaged products, and the SIM Legal Metrology Working Group was pursuing stronger participation by more SIM countries in their group. Digitalisation activities were also being heavily pursued in the SIM region, not just in the Legal Metrology Working Group, but in other areas as well. There were several pilot projects on digital calibration certificates, low cost temperature humidity bias systems with digital criteria, and the evaluation of the possibility of remote calibrations.

    ## GULFMET

    The GULFMET report had been given by its Chair, Amina AlBastaki. Iraq had become a new associate member. GULFMET had attended the OIML-CS MC meeting in Bern in 2023. It had held three training courses on NAWIS, OIML D1, and the OIML-CS. GULFMET TC Legal had reviewed and approved guidelines on prepackaged products, metrological supervision, authorising verification in inspection bodies, and type approval. GULFMET had presented an extensive plan for training for the remainder of 2023 and into 2024, but Dr Ehrlich did not have time to report on all of this, and suggested delegates who were interested should take look at the presentation on the OIML website. GULFMET had reported that it was expanding its relationship with IMEKO, and that it had formed two new technical committees, one on acoustics, ultrasound and vibration, and another on time and frequency. The Second GULFMET Metrology Symposium would be held on 22-23 April 2024 in Dubai, and those who were interested were invited to participate. Again, delegates could find more information on the respective website.

    ## COOMET

    The COOMET presentation had been provided by Mr Marat Yunusov. A COOMET extraordinary meeting had been held in September 2023, as the secretariat had now transitioned from Belarus to Kazakhstan. The UNIDO/OIML brochure on Certification of measuring instruments had been translated into Russian. The next meeting of the COOMET technical committee on legal metrology would be held on 2 November 2023 in Tashkent, Uzbekistan. Dr Ehrlich asked the COOMET representative to verify that this was a satisfactory representation of the information given, and this was confirmed.

    ## APLMF

    The APLMF report had been given by Dr Tsuyoshi Matsumoto. The APLMF would be meeting in-person in the Philippines in November 2023. The APLMF was very active, with eight working groups, and since Dr Ehrlich did not have time to talk about them all, he stated that delegates would find these details in Dr Matsumoto's presentation which had been posted on the OIML website. However, he specifically mentioned the new subgroup that had been formed on digitalisation in metrology, stressing that this was a recurring theme amongst practically all the RLMOs. The APLMF had conducted extensive training courses, mostly online, and these could also be found in Dr Matsumoto's presentation. Dr Matsumoto had reported that the APLMF was experiencing difficulties in maintaining skilled experts and trainers, mainly due to retirement, and they were looking into how to deal with this. Courses scheduled for later in 2023 included metrology for health (to be held jointly with the APMP), EVSEs, prepackaged goods, and then there was a long list of training planned

    for 2024. There were also many e-Learning materials under development in the APLMF, so this was another enticement for delegates to take a look at Dr Matsumoto's presentation. The MEDEA 3 project at PTB was ongoing, focusing on sustainable development goals of health, water, economy, and industry, and Dr Ehrlich commented that this was a large project in the APLMF. The latest APLMF five-year strategic plan was available on the APLMF website. Dr Ehrlich checked whether anyone from APLMF had anything to add but there were no additions.

    ## AFRIMETS

    No AFRIMETS report had been made available during the meeting, but Dr Ehrlich stated that there was one under development. There was therefore no link on the website at the moment, but hopefully one would be made available very soon.

    Dr Ehrlich reiterated that this had been a brief overview of the Round Table discussions and presentations, and he again encouraged delegates to go to the Round Table webpage on the OIML website for more details on all six individual RLMO presentations.

    This also concluded his presentation, and thanking delegates for their attention, he asked whether there were any questions. There were none, and delegates showed their appreciation with a round of applause.

    Dr Ehrlich reminded delegates that the next Round Table interim meeting would be in January 2024, and any delegates wishing to participate should contact him.

    Dr Mathew thanked Dr Ehrlich and asked Mr Dunmill to read the Resolution:

    ## Draft Resolution no. CIML/2023/30

    Agenda item 15.1

    The Committee,

    Notes the report of the RLMO Round Table Chairperson.

    There were no comments.

- number: '16'
  title: 1 Election of the CIML Second Vice-President (2023-2029)
