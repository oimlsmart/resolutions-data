- number: '10'
  title: 1 Approval of the 2022 accounts
  narrative: |2+

    Mr Donnellan thanked Dr Mathew for his introduction.

    He said that in summary, 2022 had been another good year for the Organisation, in which its financial position had been consolidated and stable, whilst operating in a somewhat unstable economic environment. The expenditure had been lower than the allocated budget, despite significant inflationary pressures operating in France, as well as in many other economies around the world. Of course, the Organisation's financial arrangements included debt management, and he was pleased to report that in 2022, significant efforts had been made to recoup some of the Organisation's outstanding debts, which had been successful. Mr Donnellan drew delegates' attention to the Addendum which had been made available in June on this matter.

    Mr Donnellan's next two slides showed, in English and French, the summary report on the accounts given by the Organisation's external auditors.

    Looking at the accounts in more detail for the year 2022, on his next slide Mr Donnellan indicated that income had been slightly higher than the budgeted amount which had been set by the 16th OIML Conference in 2021.This had predominately been due to new Members joining and also the reintegration of certain Member States. The actual figure for OIML-CS certificate income had also been slightly higher than budgeted, which had resulted in the overall income for 2022 being higher than budgeted.

    Moving on to expenditure, the table displayed on Mr Donnellan's next slide showed expenditure broken down by cost for the year 2022. As delegates could see, the overall actual expenditure had been lower than budgeted, and had been significantly less than budgeted in several areas. The main reasons for the overall expenditure being lower than budgeted had been due to having held the CIML meeting online the previous year. Mr Donnellan noted that despite this, the expenditure associated with that meeting had still been in the order of €18 690. There had also been reduced travel expenditure, and as he had mentioned at the beginning of his presentation, Mr Donnellan stated that income had been higher than budgeted due to the recovery of debts, and also expenditure had been lower due to the deferment of some capital expenditure.

    The next slide showed the same expenditure, this time broken down by the core activities, which included technical work, the OIML-CS, communication, liaison activities, training, etc. Mr Donnellan reported that this was the expenditure on each of these activities apportioned according to the time spent on them, and as delegates would note, across the board it had been lower than budgeted. This lower than budgeted expenditure was also represented on Mr Donnellan's next slide, which showed a graph of expenditure against budget. He explained that the orange line on the graph represented the actual expenditure, and the blue line the budget. As delegates could see, through to the end of 2022, the expenditure was well below budget for the reasons that he had already mentioned, specifically the CIML meeting and travel.

    Mr Donnellan's next slide showed the result for 2022. He reminded delegates that the accounts presented at the CIML meeting were always for the previous year. He indicated that the outcome had been a surplus against a deficit budget. He commented that there had been quite a strong surplus result

    for 2022, for the reasons previously mentioned. This placed the Organisation in a good position to resist external pressures, such as inflation, as well as rising costs for the provision of services. It also presented opportunities, through the budget saving, to potentially implement some initiatives to advance legal metrology.

    The correlation between the budget surplus and the cash balance of the Organisation was reflected in Mr Donnellan's next graph, which showed the cash balance available to the Organisation as of 31 December 2022. This cash balance reflected the reduced debt owed by a number of Member States. He stressed that there was a direct correlation between repayment and the budget situation, and added that during his Director's update he had highlighted that the OIML Operating Reserve had not needed to be accessed during this period. This closed his presentation on item 10.1.

    Dr Mathew thanked Mr Donnellan for his clear presentation, and agreed that the financial position was now under control again. This had not been easy given the situation and the challenging economic outlook. Dr Mathew asked if there were any questions. There were none.

    Mr Dunmill displayed the resolution for this item on the screen. He explained that, following each item on this financial report, delegates would be shown a draft resolution before the meeting moved on to the next item. Delegates would be sent the draft resolutions from the current day's sessions that evening so they could then look at the wording in their own time before the voting took place in the final session:

    ## Draft Resolution no. CIML/2023/10

    Agenda item 10.1

    The Committee,

    Noting the accounts for 2022, the OIML budget summary, and the BIML Director's comments,

    Considering the external auditor's report on the 2022 accounts,

    Approves the 2022 accounts, and

    Instructs its President to present them to the 17th OIML Conference.

