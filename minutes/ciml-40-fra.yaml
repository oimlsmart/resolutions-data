  title: 1 Rapport relatif aux activités du Conseil de la Présidence
  narrative: |2+

    Le Comité a pris note d'un rapport de son Président concernant les activités du Conseil de la Présidence depuis la 39ème Réunion du CIML.

- number: '5'
  title: 1 Rapport relatif aux activités du PWGDC
  narrative: |2+

    Le Comité a pris note d'un rapport remis par le Docteur Seiler concernant les activités du Groupe de Travail Permanent sur les Pays en Développement et a exprimé ses remerciements au Docteur Seiler pour l'efficacité de sa présidence.

    Le Comité a exprimé ses remerciements aux Membres du Groupe de Travail Permanent pour leur implication dans ce travail et pour les responsabilités qu'ils ont endossées.

