- number: '2'
  title: 1 Situation de certains Membres
  narrative: |2+

    Le CIML a pris note de l'engagement de la République démocratique populaire de Corée et de la Zambie à payer leurs arriérés conformément à un calendrier convenu.

    Le CIML a approuvé la règle suivante pour la réduction des classes de contribution de certains États Membres en fonction de leur Revenu National Brut par habitant :

    En fonction de son Revenu National Brut par habitant, un pays peut être déclassé :

    - d'une classe pour les pays à revenu intermédiaire de la tranche inférieure dont le Revenu National Brut est deux fois plus élevé que celui des pays à faible revenu ;

    - de deux classes pour les pays à revenu intermédiaire de la tranche inférieure dont le Revenu National Brut est deux fois moins élevé que celui des pays à faible revenu ;

    - de trois classes pour les pays à faible revenu.

    <div align="center">

    Le CIML a pris note d'un rapport fourni par le Directeur du BIML relatif aux classes de contribution de six États Membres qui seraient reclassés comme suit conformément aux règles ci-dessus :

