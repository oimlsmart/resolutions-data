- number: '8.2'
  title: Examen de la situation de certains TC/SC
  narrative: |2+

    Le Comité a décidé :

    - de dissoudre et abandonner le travail du TC 10/SC 6 Jauges de contraintes ;

    - de fusionner le TC 8/SC 1 Mesurage statique de volume avec le TC 8/SC 2 Mesurage statique de masse sous le Co-secrétariat de l'Autriche et de l'Allemagne sous le nom TC 8/SC 1 Mesurage statique de masse et de volume, et de dissoudre le TC 8/SC 2 ;

    - d'attribuer le Secrétariat du TC 10/SC 3 Baromètres à la Chine ;

    - de retirer les projets de travail suivants :

    - TC 7/SC 1 : p 1 révision R 30 Mesures de longueur à bouts plans (cales à bouts plans ou cales-étalons),

    - TC 10/SC 4 : p 2 Exigences relatives aux instruments de mesure de force destinés à la vérification des machines d'essai de matériaux en faveur de l'utilisation de la norme ISO 376,

    - TC 17/SC 6 : p 1 Procédure d'étalonnage pour méthanomètres de mines et p 2 Procédure d'étalonnage d'alertes de gaz ou vapeurs combustibles.

    Le Comité a approuvé la proposition du TC 3/SC 5 visant, d'une part, à utiliser les Guides en application de la norme ISO 17025 et du Guide 65 rédigé par le CPR, relatif aux R 60 et R 76 en tant que premier Projet de Travail et, d'autre part, à poursuivre en suivant les Directives relatives au Travail Technique.

    Le Comité a autorisé le Bureau, en partenariat avec le Secrétariat du TC 4 (Slovaquie), à décider avec l'ILAC de la meilleure façon de publier la publication commune de la révision du D 10.

    Le Comité a chargé le Bureau d'organiser une réunion avec les Secrétariats des TC 8/SC 7 et TC 8/SC 8 afin de redéfinir la portée des projets de ces Sous-Comités de manière à éviter tout chevauchement inutile, éliminer toute redondance, divergence et duplication des tâches.

