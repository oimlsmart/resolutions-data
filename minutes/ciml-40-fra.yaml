- number: '11'
  title: 1 Awards and Letters of Appreciation
  narrative: |2+

    Mr. Johnston wished to say a few words on the subject of OIML Awards, of which there were three types:

    - The Honorary Member Award: this was the OIML's highest Award, and rarely given, although there was one today;

    - Medals were given to recognize the outstanding contribution of individuals to the development of legal metrology; and

    - Letters of Appreciation demonstrated excellent work on a specific project relating to legal metrology.

    Mr. Johnston also wished to make a proposal for comment: to develop a call letter for nomination for these Awards in future. By this he meant the development of a template which would lay out the criteria for each of the Awards, so that there would be some understanding as to how to nominate a person for one or other of them. This call letter would go out well in advance of the meeting; nominations would then be received and discussed at the Presidential Council and the President would make a final decision based on the nominations presented. Mr. Johnston hoped that in doing this two things would happen: firstly, that it would encourage more nominations sometimes people were reluctant to nominate their colleagues because they did not understand the criteria; and secondly he wanted to ensure that everybody felt that the process was open for many people whose contribution might not have been recognized simply because the criteria had not been in place. After the meeting, therefore, Mr. Johnston would start to develop criteria; these would be sent out for Members' comments so that they could participate more fully in the process. He hoped Members would agree to this, and looked forward to their input in the future.

    Mr. Johnston then asked Mr. Kochsiek to make the first presentation: Members would understand why when they knew who would be receiving the Award.

    Mr. Kochsiek told colleagues that in 1994 Gerard Faber had been elected President of the CIML and in fact he had been the second CIML President from the Netherlands. In this position, he had rendered outstanding services to the Organization by raising awareness of the significance of legal metrology among a growing number of OIML Members, and by continuous efforts to adapt the structure of the Organization to modern requirements. Under his chairmanship, in 1994, preliminary discussions about a possible merging of the BIML and the BIPM had been started. In 1995 and 1996 the role of the President and the two Vice-Presidents had been redefined with new competences. A symposium, Metrological Activities in Developing Countries, had been held and a seminar, Weighing Towards the Year 2000, had been organized. Also of importance was a round table discussion on Confidence and Type Approvals for Bilateral MoUs and the MAA.

    In 1997, the so-called OIML Certificate System for Measuring Instruments was prospering, with more than 200 issued Certificates. The Birkeland Study had given the OIML a new impulse for its long term policy. Preliminary contacts with ILAC and the WTO had been formed and deepened, and the OIML was by then collaborating in the Joint Committee for Guides in Metrology.

    In June 1998, and in cooperation with other organizations, the OIML had organized the seminar The Role of Metrology in Economic and Social Development, which had taken place in Braunschweig, Germany. RLMOs had been developed for many regions in legal metrology and the OIML was actively cooperating with them.

    In the years 2000 and 2001, the admission of the OIML as an observer on the WTO TBT Committee could be seen as an acknowledgement of the OIML's contribution to global input. The activities of the TCs had needed to be evaluated and new priorities were assigned.

    The discussions for the OIML Mutual Acceptance Arrangement, held in 2002 and 2003, had concluded in 2003. In the meantime the implementation of the MAA had got off to a flying start -17 States had been registered for participation in the system, either as Utilizing Participants or Issuing Participants. Cooperation with the Metre Convention and ILAC had been fruitful: for instance, Elements for a Law on Metrology had been born, and had now been published. Policy papers on horizontal documents and strategy papers were currently in progress. The Birch study, The Benefit of Legal Metrology for the Economy and Society, was a brilliant achievement that met with the approval of all.

    Addressing Gerard Faber, Mr. Kochsiek said that he had outlined the success story of the OIML under his Presidency from 1994 to 2003. He asked him to accept his words as sincere thanks for the important and successful work which he had done. Everyone hoped that Mr. Faber would continue his efforts in further contributing to OIML issues.

    Mr. Faber thanked Mr. Kochsiek for his kind words. He felt that Mr. Kochsiek's description of the achievements of his nine years in the Presidency had been good; but he should not have given the impression that this was Mr. Faber's work. It had been done with a wonderful team, including two Directors and a committed staff at the Bureau, very committed Vice-Presidents and a lot of fine colleagues. So Mr. Faber's role had been not only leading the Organization but also cooperating in it; he had always had the feeling, which he had expressed on many occasions, that they were a sort of metrology family. Again, following this nomination, he was very proud to be a member of the family and, as he had said to Members the previous year, he hoped to attend meetings as long as he was able to do so, and to see further developments in projects started some time before. He took the opportunity to thank Mr. Kochsiek for his work as Acting President after Mr. Faber's own nine years and also to wish every success to the new President.

    Mr. Johnston thanked Mr. Faber and said that he now had the honor of making a number of other presentations. The first was to Mr. Tanaka of Japan. Members already knew that Mr. Tanaka had recently been promoted to being Director of his institute, as a result of which he felt that his work load was now too great to permit his continuing as CIML Member for Japan.

    Mr. Tanaka had also been a member of the Presidential Council since 2003. Mr. Johnston had particularly enjoyed Mr. Tanaka's counsel and his advice as a member of the Council and also his insight into legal metrology world wide and how it affected everybody. It had been Mr. Johnston's own decision to nominate Mr. Tanaka for an Award, and although he had a long list of his accomplishments, he was not going to read them to Members on the present occasion, but simply to say that he was going to miss him and he wished him well in his new job and in all his future endeavors. He asked Mr. Miki to come up and accept the award on behalf of Mr. Tanaka.

    Mr. Miki promised to convey Mr. Johnston's kind words to Mr. Tanaka, who, he was sure, would be delighted.

    Mr. Johnston handed over a medal to Mr. Miki, together with a letter.

    The second medal was awarded to Ken Butcher from the United States. Again, Mr. Johnston would give only a short summary of Mr. Butcher's achievements. He had joined the Office of Weights and Measures at NIST in 1991. Due to their mutual involvement in the National Conference of Weights and Measurements and NIST, Mr. Johnston had known Mr. Butcher for a number of years. Mr. Butcher had been very instrumental in formalizing the involvement of the United States in OIML activities. He had assumed responsibilities as the secretary of TC 6; he had

    worked in preparing the latest editions of OIML R 79 and R 87; he had also held the Secretariat for TC 9 and TC 9/SC 3, during which he had worked with the PTB and the BIPM to prepare the latest editions of OIML R 52, R 33 (now D 28) and R 111; he had worked very hard for the OIML.

    As Mr. Johnston knew Mr. Butcher personally, he was able to confirm that he was very passionate about his work and believed in what he was doing. Mr. Butcher was not shy about letting his colleagues know whether or not he agreed with them, which was another good point. Mr. Johnston asked Mr. Ehrlich to come forward and accept the Award on Mr. Butcher's behalf.

    Mr. Ehrlich thanked Members and said that he was sure Mr. Butcher would be very happy to receive this Award. As a colleague of Mr. Butcher's, he agreed with Mr. Johnston that it was very well deserved.

    The third medal was for Mr. Li from China. When Mr. Li had become the OIML representative for China, China had been in the background. Since Mr. Li had become their representative, the Chinese had taken on a very active role within the OIML. They had taken over a number of TCs, they had provided training, they had hosted a CIML Meeting in 1995, and Mr. Li had encouraged the building of metrology within his country and the countries in the Asia Pacific region. China had also made substantive progress in adopting OIML Recommendations and had been a very active member of the OIML. Mr. Johnston considered that much of this was due to Mr. Li's contribution. He therefore had pleasure in presenting Mr. Li with an OIML Award.

    Accepting the medal, Mr. Li said (through his interpreter) that he regretted his inability to speak good English; he felt it a special honor to receive this Award, which, he felt, was given, not to him as an individual, but rather to the whole government and to the legal metrology authorities in China. He had been appointed as CIML Member for China in 1994, and later a member of the Presidential Council, and of course in these capacities he had done some work; but this work had not been done by himself alone but with the support of all his colleagues and from his Government.

    Receiving this Award was a very important occasion for him. Legal metrology was playing a very important role in China at present; the Chinese Government gave great support to their work. Legal metrology was seen as the core in China, and scientific and industrial metrology as the foundation, with the support also of the calibration and verification services, all of which made for an excellent national system of legal metrology, supported by their Government with funding and in other ways. He felt it a special honor to be working with his colleagues under such good circumstances.

    He received the honor therefore not only for his own contribution to legal metrology activities in China but also on behalf of his organization and the Central Government. The Award would be of great significance to legal metrology work in China and also in promoting legal metrology activities in the Asia Pacific Region and internationally. Due to changes in Mr. Li's responsibilities, he would no longer be directly involved in legal metrology activities in China, but in any case he was still working for the Government, which was responsible for certification, accreditation, metrology and quality inspection. But he felt the Award to be an honor and he would in the immediate future give his personal advice and assistance to support the OIML activities in China, especially in long term policies and the future Action Plan and in promoting trade facilitation and economic development in the countries of the Asia Pacific region and in the Developing Countries.

    Mr. Johnston announced that the last medal of the day would be awarded to Aart Kooiman. Sadly, Mr. Kooiman had died on 20 October 2004. Legal metrology would miss him, as would all of his friends. He had been influential in the development of R 117 and R 118; the drafting of R 117 had been initiated in 1987, mainly by Germany and France, and Mr. Kooiman had become involved in this work somewhat later, but he had had a major influence on the first version of R 117, and had had main responsibility for R 118. He had been the chairman of WELMEC Working Group 10, OIML TC 8/SC 1 Working Group 2, and, of course, he had carried the load for the revision of R 117, along with Ralph Richter from the United States. He had additionally begun work on a

    revision of R 71 and R 85, and it was unfortunate that he could not be present to receive the Award. Mr. Johnston asked Mr. van Mullem to come forward and accept it on his behalf.

    Mr. van Mullem said that it was a special moment for him, to receive the Award for Mr. Kooiman. He had been not only a colleague but also a friend, missed daily by his colleagues. His wife, who was another colleague, was struggling to rebuild her life without him. The medal would be a help and comfort to her and Mr. van Mullem would hand it to her.

    Mr. Johnston explained that one further medal would be presented, to Bernard Athané, who was unfortunately unable to attend.

    Two Letters of Appreciation were presented: the first went to Mr. Michael Glaser of the PTB. Mr. Glaser had played a decisive role in the work of OIML TC 9/SC 3, and had successfully finalized two important projects in 2004: the revisions of R 111 and R 33 (which would be published as a new Document D 28, Conventional value of the result of weighing in air). The revision of R 111 had been a high priority project for the OIML, since it was considered to be one of the most basic and important sets of requirements that Member States could adopt as the foundation for their laws in metrology. To a great extent, it was certainly the merit of Mr. Glaser and his long experience in the field of mass metrology that this important Recommendation could now be published with significant improvements compared to the previous edition. Mr. Johnston asked Mr. Kochsiek to come up and receive the letter on his behalf.

    Mr. Kochsiek thanked the President on behalf of Mr. Glaser. As former Acting President, he was in a position to say that Mr. Glaser had made a really good contribution to all the work Mr. Johnston had mentioned.

    Mr. Johnston told members that the other Letter of Appreciation went to Mr. Richard Davis from the BIPM. Mr. Davis had worked since 1990 with the BIPM and currently headed the Mass section; he was a fellow of the American Physical society, who had also brought an outstanding contribution to the revisions of OIML R 111 and R 33 (D 28). It was his pleasure to make this presentation, and he asked Mr. Rainer Kohler to come up from the BIPM to accept on behalf of Mr. Davis, as Mr. Davis was unfortunately unable to be present.

    Mr. Köhler wished to thank the President and the OIML for the Award in the name of Richard Davis and it would be a pleasure to hand it over to him upon resuming work in the laboratory.

    ## 12 Closure

    Mr. Johnston closed the 40th CIML Meeting and thanked all delegates for attending, wishing them a pleasant stay in France. He also expressed his thanks to the organizers of the International Metrology Congress, who had taken care of many administrative arrangements including for the CIML Meeting, and finally thanked the BIML Director and Staff for their role in making the event a success.

    With a final few words on administrative matters from Mr. Magaña, the 40th CIML was declared closed.

