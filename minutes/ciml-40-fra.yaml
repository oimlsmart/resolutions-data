    ## Opening addresses

    The Committee took note of the opening address delivered by its Acting President Manfred Kochsiek, who then handed over the CIML Presidency to Alan Johnston (Canada), who also gave an opening address.

    ## Roll Call - Quorum

    52 Member States out of 60 were present or represented at the opening of the 40th CIML Meeting. The quorum (45 member States) was therefore reached. Note: During the various sessions, the number of Member States present or represented varied between 52 and 53. Details of the votes will be mentioned in the 40th CIML Minutes.

    The Committee also noted the participation of a number of Corresponding Members, Observer Countries, Liaison Institutions and Regional Legal Metrology Organizations, as well as the CIML Immediate Past President, two CIML Honorary Members and members of BIML Staff.

    ## Approval of the Agenda

    The draft agenda (Version 3 dated 2005.04.19) was approved without modification.

    ## 1 Approval of the Minutes of the 39th CIML Meeting

    The Minutes of the 39th CIML Meeting were approved without modification.

    2 Member States and Corresponding Members

    2. 1 Situation of certain Members

    The CIML noted the commitment of the DPR Korea and Zambia to pay their arrears according to an agreed schedule.

    The CIML approved the following rule for the reduction of the contributory classes of certain Member States according to their Gross National Income per capita:

    According to its Gross National Income per capita, a country may be declassified:

    - by one class for lower middle income countries whose Gross National Income per capita is greater than twice that of low income countries;

    - by two classes for lower middle income countries whose Gross National Income per capita is lower than twice that of low income countries;

    - by three classes for low income countries.

    <div align="center">

    The CIML took note of a report given by the BIML Director concerning the contributory classes of six Member States, which would be reclassified as follows according to the above rules:

    </div>

