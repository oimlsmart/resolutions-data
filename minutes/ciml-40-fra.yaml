- number: '2.1'
  title: Situation de certains Membres
  narrative: |2+

    Le CIML a pris note de l'engagement de la République démocratique populaire de Corée et de la Zambie à payer leurs arriérés conformément à un calendrier convenu.

    Le CIML a approuvé la règle suivante pour la réduction des classes de contribution de certains États Membres en fonction de leur Revenu National Brut par habitant :

    En fonction de son Revenu National Brut par habitant, un pays peut être déclassé :

    - d'une classe pour les pays à revenu intermédiaire de la tranche inférieure dont le Revenu National Brut est deux fois plus élevé que celui des pays à faible revenu ;

    - de deux classes pour les pays à revenu intermédiaire de la tranche inférieure dont le Revenu National Brut est deux fois moins élevé que celui des pays à faible revenu ;

    - de trois classes pour les pays à faible revenu.

    <div align="center">

    Le CIML a pris note d'un rapport fourni par le Directeur du BIML relatif aux classes de contribution de six États Membres qui seraient reclassés comme suit conformément aux règles ci-dessus :

    </div>

    <table border="1"><tr><td>État Membre</td><td>Classe actuelle</td><td>Application de la règle</td><td>Remarque (données de 2003 de la Banque Mondiale)</td></tr><tr><td>Brésil</td><td>2</td><td>3</td><td>RNB par habitant=2710 USD</td></tr><tr><td>Indonésie</td><td>1</td><td>2</td><td>RNB par habitant=810 USD</td></tr><tr><td>République de Corée</td><td>2</td><td>3</td><td>47,9 millions d&#x27;habitants</td></tr><tr><td>Pologne</td><td>1</td><td>2</td><td>RNB par habitant=5270 USD</td></tr><tr><td>Arabie saoudite</td><td>1</td><td>2</td><td>22,5 millions d&#x27;habitants</td></tr><tr><td>Espagne</td><td>2</td><td>3</td><td>41,1 millions d&#x27;habitants</td></tr></table>

    Les Membres doivent envoyer leurs remarques concernant ces reclassements envisagés au Président du CIML avant la fin du mois de juillet 2005. Une fois ces commentaires reçus et analysés, le Président du CIML doit soumettre une décision au CIML pour un vote par correspondance.

    Le CIML a accepté de classer la Turquie, qui vient de devenir État Membre de l'OIML, en Classe 2 et non en Classe 3. Le classement de ce pays doit être revu chaque année en fonction des décisions et résolutions de la 39ème Réunion du CIML.

