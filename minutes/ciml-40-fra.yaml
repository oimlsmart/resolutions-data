    Members shall send their comments on these envisaged reclassifications to the CIML President before end of July 2005. Once these comments have been received and analyzed, the CIML President shall submit a decision to the CIML for postal approval.

    The CIML accepted to classify Turkey, which had just become an OIML Member State, in Class 2 instead of Class 3. This country's classification shall be reviewed annually in line with the decisions and resolutions of the 39th CIML Meeting.

