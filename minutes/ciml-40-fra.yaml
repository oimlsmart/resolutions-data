- number: '7'
  title: 1 Organisation du Bureau
  narrative: |2+

    Le Comité a pris note d'un exposé du Directeur du BIML concernant l'organisation et les activités du Bureau. Il a été noté qu'un Membre du Personnel du BIML a pris la décision de quitter le BIML d'ici la fin de l'année 2004 ; un candidat approprié sera promptement recruté.

- number: '8'
  title: 1 Approbation de Documents et Recommandations Internationaux
  narrative: |2+

    Étant donné que le nombre de voix reçues pour les deux projets actuels soumis à un vote (révision des R 51 et R 134-1) était trop faible et que le nombre de remarques et de voix négatives reçues pour la R 134-1 ne permettaient pas de prendre une décision, le Comité a chargé le Secrétariat du TC 9/SC 2 de rédiger les Projets de Recommandations finales, en tenant compte des remarques reçues et a chargé le Bureau de procéder à un vote par correspondance du CIML sur ces deux projets.

    Le Comité a décidé que la même procédure de vote par correspondance du CIML s'appliquera à la DR de la révision de la R 39, publiée sur le site Internet juste avant la Réunion du CIML pour un vote en ligne.

- number: '9'
  title: 1 Élection du Premier Vice-Président du CIML
  narrative: |2+

    Le Comité a élu Premier Vice-Président M. Stuart Carstens, d'Afrique du Sud. Il entrera en fonction immédiatement. Le Comité a également décidé que le Professeur Kochsiek demeurera Vice-Président jusqu'à la 41ème Réunion du CIML en 2006.

    Le Comité a chargé le Président du CIML de rédiger un projet de procédure pour l'élection des Président et Vice-Président du CIML. Cette procédure doit être soumise à un vote par correspondance du CIML afin d'être applicable lors de la 41ème Réunion du CIML.

- number: '10'
  title: 1 41 $ ^{\mathrm{e m e}} $ Réunion du CIML (2006)
  narrative: |2+

    Le Comité a pris note d'un exposé effectué par l'Afrique du Sud concernant l'organisation de la 41ème Réunion du CIML au Cap en octobre 2006 et a remercié le gouvernement sud-africain et le Membre sud-africain du CIML pour leur invitation, dont l'acceptation a été confirmée par le Comité.

