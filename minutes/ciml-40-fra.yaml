    ## Opening addresses

    The Committee took note of the opening address delivered by its Acting President Manfred Kochsiek, who then handed over the CIML Presidency to Alan Johnston (Canada), who also gave an opening address.

    ## Roll Call - Quorum

    52 Member States out of 60 were present or represented at the opening of the 40th CIML Meeting. The quorum (45 member States) was therefore reached. Note: During the various sessions, the number of Member States present or represented varied between 52 and 53. Details of the votes will be mentioned in the 40th CIML Minutes.

    The Committee also noted the participation of a number of Corresponding Members, Observer Countries, Liaison Institutions and Regional Legal Metrology Organizations, as well as the CIML Immediate Past President, two CIML Honorary Members and members of BIML Staff.

    ## Approval of the Agenda

    The draft agenda (Version 3 dated 2005.04.19) was approved without modification.

