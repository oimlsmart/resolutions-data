- number: '6.1'
  title: Presentation by the Bureau on liaison activities
  narrative: |2+

    Mr. Magaña informed Members that the Bureau had had a period of intensive activity with a number of liaisons. He wished to highlight especially the World Trade Organization; BIML staff had attended all the TBT Committee meetings of this organization, in addition to several workshops organized by the TBT Committee every year. More information on TBT activities would be put on the web site, in information letters, etc., as time on the present occasion was limited. The OIML was well recognized by the TBT Committee and cooperation was good.

    Much work was done in common with standardization organizations, and most Technical Committees and Subcommittees had tight liaisons with ISO, the IEC and so on.

    There were also very privileged liaisons and good relationships with the BIPM and ILAC; information about the annual tripartite meetings between these organizations had been sent to Members. The Bureau had frequent meetings with colleagues from the BIPM for informal discussions on a number of issues including administrative matters, ideas for joint activities, etc. Members had received information about the joint work with the BIPM in connection with Developing Countries.

    A talk would be given the following day by the new ILAC contact person Mr. Patrick Reposeur Assistant Director of COFRAC, the French accreditation body; since he was based in Paris it was

    easy to arrange meetings with him. This was a very active and efficient liaison and there had already been a couple of meetings with him concerning the MAA.

    The annual meetings of all the Regional Legal Metrology Organizations had been attended by an OIML representative, either the President or one of the Vice-Presidents of the CIML, the BIML Director or one of the BIML Assistant Directors. In this way they could inform CIML Members of recent developments, give advice and listen to their needs and expectations.

