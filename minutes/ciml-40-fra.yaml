- number: 3.1.1
  title: Report on the new Pension System
  narrative: |2+

    Mr. Magaña informed Members that a review of the OIML Pension Fund had been requested. The pension arrangements formed part of the Staff Regulations, which set out the rights of certain

    BIML employees and the financing of the Pension Fund. The costs of this system had been evaluated by an expert. The OIML Convention stated that if the Organization were dissolved, its funds would be divided among the Member States after deduction of pension payments owed to BIML staff, both serving and retired. Thus, contributors to and beneficiaries of the system acquired rights; these rights needed to be evaluated and shown in the accounts. A summary of the expert's report had been circulated to CIML Members in April; it showed considerable differences from the previous state of affairs. Some of the points made by the expert concerned the following facts:

    - 2.5 % per annum was allowed for inflation;

    - There was no significant turnover of staff;

    - Average retirement age was 63.6.

    - The expert's report had included the recommendation that:

    - A discount rate of 4 % should be adopted; this measures the degree of equivalence of future expenses compared with immediate expenses (for example 104 $ \epsilon $ to be paid next year is equivalent to 100 $ \epsilon $ to be paid this year); it was based on a combination of estimated inflation rates and the interest that could be earned by investing the money;

    - Life expectancy calculations should be based on tables used by insurance companies; and

    - The Pension Fund at present affected 3 members of staff currently working at the Bureau, three receiving pensions, and the widow of a former employee.

    - The expert had calculated the total sum of money needed in future to cover current requirements. Payments to employees already retired had to continue, and some of the payments that would be made to the three staff members presently working were already due. His conclusions were that:

    - The rights which had been acquired by December 2004 amounted to 1 300 000 €. If the OIML were to be dissolved today, this sum would be owed to those people. For this reason, this sum should always appear in the accounts among the Organization's liabilities. This was very different from current practice in the OIML's balance sheet, where the Pension Fund was approximately 250 000 € and was balanced only on a short term, year by year basis. The Organization's commitments in this respect were therefore much larger than had previously been shown in the OIML balance sheet;

    - The OIML's responsibilities in this regard should be reevaluated annually because each year certain payments were made, thus lessening the debt; but on the other hand staff still in employment acquired more rights. The increase in this obligation would become an annual cost for the Organization. The annual increase had been roughly estimated by the expert at 100 000 €. Currently the Pension Fund cost approximately 55 000 € per annum, which represented a very considerable increase. Mr. Magaña had not known about this issue when he had prepared the budget which Conference had approved, but it was unavoidable. He would come back later to what was to be done about this, since obviously it was not possible to plan for a much larger deficit than the Conference had approved.

    This matter would have considerable repercussions on the OIML balance sheet. Other questions regarding the Pension Fund remained to be considered, for example, what alterations ought possibly to be made to the system in the future? Should the retirement age be changed? Should a dedicated sum of money be invested to cover the needs of the system? Questions such as these were being discussed in many countries at the present time and the OIML also should consider them.

    Work on pensions was ongoing, with the President, and this was simply an interim report; it must definitely be completed before the next OIML Conference.

    Mr. Yoo-Tae Jun asked whether the OIML Pension Fund had been compared with those of other international organizations such as ILAC or the Metre Convention.

    Mr. Magaña responded that the OIML system was indeed very comparable with that of the Metre Convention, though of course the latter employed many more staff. He had also compared notes

    with other smaller organizations based in France, and found that their pension schemes varied considerably. Such comparisons were ongoing.

    Mr. Tony Lee (New Zealand) asked, as a newcomer to the Organization, about the loans to BIML staff.

    Mr. Magaña said this question was frequently raised. It had been practice for a long time for the Bureau to grant loans to its staff; in fact this was quite common practice in many commercial businesses too. Instead of money being in the bank it was out on loan to an individual. He explained that the conditions for granting such loans had been clarified: the first was that the interest should be at least equivalent to the highest rate payable by banks on money deposited, so that the Organization lost nothing. Secondly, all loans had to be repaid before the expiry of the borrower's employment contract; thus repayment was guaranteed (and in any event repayments were guaranteed against salaries due by the BIML to staff). Thirdly, all loans were rigorously recorded and submitted, with the interest payable, to the auditor. Under the new accounting system, these loans would be shown as an investment - the employee paid interest to OIML just as a bank would.

    Mr. Johnston added that this matter had been discussed in previous CIML Meetings and would be one of the aspects he had undertaken to review in the coming year.

    Mr. Ian Dunmill (BIML) commented that because of the particular status of the Organization, staff could have problems in obtaining a loan from a bank. He himself had been refused a loan to buy a house by two banks on the grounds of the status of the Organization.

    Mr. Johnston concluded this item by informing Members that the questions of pensions and loans were ongoing and there would be a further report the following year.

