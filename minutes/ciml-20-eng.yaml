      On the proposal of Mr BIRKELAND, the Committee decides to hold its 21st meeting in the spring of 1986, in Paris.

      ## CLOSURE OF THE 20th COMMITTEE MEETING

      Mr. BIRKELAND informs his colleagues of the imminent retirement of Mr PERLSTAIN, who is unanimously nominated as Honorary Member.

      Mr PERLSTAIN recalls with pleasure that he has worked with OIML since 1957. He underlines the pragmatic and rational character of the Organization, right at the start, which allowed it to achieve a lot with rather restricted resources.

      He is disturbed by the burocratic tendencies which became evident during the last few years but is confident that the Committee will be able to keep the OIML activities within reasonable limits, so that the International Recommendations will always be clear and concise, and ready for direct use in national regulations. He thanks all his colleagues in the Committee and hopes that he will meet them from time to time as Honorary Member.

      Mr BIRKELAND closes the meeting thanking once again all the participants, the interpreters and especially Mrs LAHTEENMÄKI for the most remarkable organization which she herself and her collaborators have accomplished, thus ensuring the sucess of the Committee meeting and of the Conference.

      ## RESOLUTIONS and DECISIONS

      ## DECISION CIML 1984 POINT 1

      The Committee adopted the report on its 19th meeting with the following modification:

      in point 6.4., last paragraph, read :

      Mr Knapp points out that he has already obtained the collaboration of the Translation Bureau of the Department of Secretary of State of Canada ].

      ## DECISION CIML 1984 POINT 2

      The Committee adopted the accountant report for 1983 and instructed its President and the Director of the Bureau to submit it to the Seventh Conference.

      ## RESOLUTION CIML 1984 POINT 3

      The International Committee of Legal Metrology

      ADOPTS the detailed rules of the OIML retirement plan

      INSTRUCTS its President and the Director of the Bureau to present at the appropriate time a report on the implementation of these rules with the aim of possible modifications or improvements.

      ## RESOLUTION CIML 1984 POINT 4

      The International Committee of Legal Metrology

      ACCEPTS the report concerning long-term planning presented by the OIML Presidential Council,

      REQUESTS the Pilot and Reporting Secretariats to implement the conclusions of this report,

      INSTRUCTS the Presidential Council to monitor the implementation,

      INSTRUCTS its President to report on the implementation during the next meeting of the Committee and requests him to inform the 7th Conference about the decisions taken on this subject.

      The Committee accepted the proposals of its President and the Finnish Delegation for the chairmanship of the Conference; the Committee also examined and accepted the draft agenda and the arrangements for the organization of the Conference.

      ## DECISIONS CIML 1984 POINT 6

      The Committee examined the decisions of the Conference and took the necessary measures to implement them.

      ## DECISION CIML 1984 POINT 7.1

      The Committee divided the Pilot Secretariat SP5 as follows:

      SP5S—Static measurement of volume of liquids France

      Sr 1 Terminology (liquids and gases) United-Kingdom

      Sr 2 Hierarchy schemes for volume standards United-Kingdom

      Sr 3 Laboratory volume measures United-Kingdom

      Sr 4 Medical syringes Austria

      Sr 5 Bottles considered as measuring containers France

      Sr 6 Drinking glassware Switzerland

      Sr 7 Casks and barrels Austria

      Sr 8 Storage tanks Rumania

      Sr 9 Road and rail tanks France and Rumania

      Sr 10 Barge and ship tanks Rumania

      Sr11 Devices for gauging the level or liquids in tanks Netherlands

      SP 5 D—Dynamic measurement of volume of liquids Fed. Rep. of Germany

      Sr1 Meters and measuring systems for liquids other than water with measuring chambers or with turbines Fed. Rep. of Germany

      Sr2 Meters and measuring systems for cryogenic U.S.A. liquids

      Sr3 Water meters

      Sr4 Drum meters for alcohol and their complementary devices Fed. Rep. of Germany

      Sr 5 Data for the calculation of quantities of liquids U.S.A.

      Sr6 Electronic devices applied to the measurement France of volume of liquids

      Sr7 Methods and devices for verification of measuring instruments for liquids Japan

      ## DECISION CIML 1984 POINT 7.2

      The Committee took note of the BIML report on the measurement of electrical and magnetic quantities and requested the States concerned to consider the present situation of SP13 and to present appropriate proposals within the framework of the long-term planning.

      ## DECISION CIML 1984 POINT 7.3

      The Committee requested the BIML to continue its investigation on the opportunity for OIML to work in the field of photometry and radiometry.

      ## DECISION CIML 1984 POINT 7.4

      The Committee took note of the fact that SP17-Sr3 would remain inactive until a country volunteers to assume responsibility.

      ## RESOLUTION CIML 1984 POINT 7.5

      The International Committee of Legal Metrology

      HAVING TAKEN NOTE of the report of the SP 2-Sr 4 meeting in March 1984,

      CONSIDERS that the actions undertaken or planned by SP2-Sr4 conform with the work program of this Secretariat,

      ENCOURAGES SP2-Sr4 to actively continue its work,

      CONFIRMS that, in the long run, the ultimate aim of the SP2-Sr4 work is the creation of an OIML certification system,

      CONSIDERING that the success of the SP2-Sr4 work and, in the long run, the creation of an OIML certification system depend largely on the activities of the other OIML Secretariats,

      REMINDS the Pilot and Reporting Secretariats that they must elaborate harmonized test methods for the instruments for which they are responsible,

      ENCOURAGES the Pilot Secretariat SP22 to actively continue the work concerning, in particular, the principles of pattern evaluation and of verification of instruments.

      ## DECISION CIML 1984 POINT 7.6

      The Committee suppressed the following Reporting Secretariats :

      SP 9-Sr4 Surface tension of liquids used for calibration of hydrometers

      SP13-Sr1 International compatibility of national primary standards used for the verification of instruments

      SP19-Sr1 International force comparison

      ## The International Committee of Legal Metrology

      CONSIDERING that almost all measuring instruments are being equipped with electronic devices,

      CONSIDERING the importance of a common OIML International Document being available as a catalogue for Reporting Secretariats in order to choose the appropriate environmental and other tests to be included in the relevant International Recommendations,

      CONGRATULATES the SP2-Sr6 and SP7-Sr2 Secretariats on the progress achieved in the drafting of requirements for electronic measuring instruments in general and in the application of these requirements to electronic weighing instruments,

      REQUESTS the SP2-Sr6 and SP7-Sr2 Secretariats to do their utmost in order to finish the drafting of the respective texts during their next meetings in 1985.

      ## DECISION CIML 1984 POINT 7.8

      The Committee took note of the BIML report and requested Czechoslovakia, responsible for SP 23, to study the advisability of creating a new Reporting Secretariat on recalibration intervals of standards, and to submit a proposal to the Committee at its next meeting.

      ## DECISION CIML 1984 POINT 8

      The Committee took note of the report on BIML activity, submitted in writing.

      ## DECISION CIML 1984 POINT 9

      ## Point 9.1. ARSO-OIML collaboration

      The Committee approved the draft agreement on collaboration between ARSO and OIML.

      ## DECISION CIML 1984 POINT 10

      The Committee judged appropriate to hold its 21st Meeting in the spring of 1986, in Paris.

      ## DECISION CIML 1984 — CLOSURE

      On the proposal of its President, the International Committee of Legal Metrology nominated Mr A. PERLSTAIN, Switzerland, as Honorary Member.
