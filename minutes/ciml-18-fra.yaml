      A la suite des discussions qui ont eu lieu, l'assemblée adopte à l'unanimité la résolution ci-après :

      ## Le Comité International de Métrologie Légale

      CONSIDERANT la Résolution C.6-1980 point 8.4. adoptée par la 6e Conférence, le chargeant d'examiner en détail le programme et le budget de l'OIML pour la période 1981-1984 et, si nécessaire, de proposer la convocation d'une session extraordinaire de la Conférence Internationale de Métrologie Légale,

      AYANT EXAMINE les estimations budgétaires pour 1982 présentées par le Bureau International de Métrologie Légale,

      ESTIME qu'il n'y a pas lieu, dans l'état actuel des choses, de convoquer une session extraordinaire de la Conférence,

      DECIDE néanmoins de réexaminer la situation lors de sa prochaine session,

      MANDATE son Président pour, en cas de nécessité absolue, faire appel aux Etats Membres, conformément à l'article XXIV de la Convention.

      ## Point supplémentaire : déclaration de la Délégation Italienne et discussion

      ## M. AMODEO présente la déclaration suivante :

      « Le représentant de l'Italie confirme sa déclaration relative au budget exposée au cours de la Sixième Conférence Internationale de Métrologie Légale et figurant dans le compte rendu de cette Conférence à la page 75.

      La position italienne doit être complétée et expliquée par les considérations suivantes :

      1) la rédaction des budgets doit permettre une comparaison directe entre les dépenses autorisées et les dépenses effectuées,

      2) les prévisions budgétaires doivent être subdivisées en chapitres, énoncés de façon à permettre une information exacte sur l'utilisation des contributions des Etats Membres,

      3) on doit examiner à nouveau le critère de prévision de l'accroissement d'un budget actuellement indexé sur le taux présumé de l'inflation française.

      L'Italie saurait gré aux Membres du Comité de bien vouloir exprimer leur avis à ce sujet. En même temps, elle croit pouvoir présenter au cours de la prochaine réunion du Comité des propositions concrètes, à l'égard surtout de la répartition des contributions entre les Etats Membres de l'Organisation ».

      M. HOLTVEG soutient particulièrement la considération 1, et demande que, dans les documents financiers établis par le Bureau, il y ait systématiquement deux co-

      lonnes, l'une donnant, chapitre par chapitre, le montant des dépenses autorisées par la Conférence lors du vote du budget quadriennal, l'autre donnant, pour ces mêmes chapitres, les dépenses réelles. Les différences éventuelles devront faire l'objet de justifications.

      Le Bureau indique qu'il introduira cette nouvelle présentation dès les prochains documents financiers.

      En ce qui concerne la considération 2, le Bureau espère que la double présentation, par chapitres budgétaires et par programmes de travail, pourrait satisfaire le Gouvernement Italien, sinon il est demandé des propositions concrètes.

      Pour la considération 3, le Bureau ne pense pas qu'il soit possible de modifier les méthodes actuellement suivies.

