      Le Bureau fait état des relations fréquentes et cordiale avec la direction du BIPM. Les sujets d'intérêt commun aux deux Organisations augmentent en nombre et une collaboration fructueuse existe.

      Ensuite M. PERLSTAIN expose les raisons qui l'ont poussé à présenter un projet de Résolution visant à reconnaître que le mot « poids » en langue française (et les mots équivalents dans certaines autres langues) peut avoir aussi le sens de « résultat d'une pesée », c'est-à-dire pratiquement être synonyme du mot « masse ». Cette résolution chargerait également le Bureau d'entreprendre, si nécessaire, la révision de la Recommandation n° 33.

      M. ROTTER souligne tout d'abord que ce n'est pas au Comité, mais à la Conférence, de sanctionner la révision d'une Recommandation. Il indique également les décisions qui ont été prises quant au vocabulaire à utiliser dans les textes réglementaires autrichiens, et donne les raisons scientifiques de ces décisions.

      M. MUHE, pour des raisons proches de celles exprimées par M. ROTTER, souhaite que la Résolution, si elle était adoptée, comporte le paragraphe suivant :

      Le Comité International de Métrologie Légale,

      ...

      NE PREJUGE PAS de décisions différentes en ce qui concerne les mots équivalents dans d'autres langues.

      ...

      M. PETRY estime que la décision la plus importante qui résulterait de cette Résolution serait de charger le Bureau d'examiner la nécessité d'une révision rédactionnelle de la RI 33, et que, à cet effet, le Bureau peut s'enquérir par correspondance des points de vue des Membres du Comité.

      Suivant les propositions de nombreux participants, le PRESIDENT décide de reporter l'étude de cette question et charge le Bureau de poursuivre son étude.

