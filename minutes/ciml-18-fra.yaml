      Le Président rappelle que des propositions visant à étudier l'opportunité de créer quatre commissions spécialisées ont été présentées au Comité. On trouvera aux points 6.1. et 8. respectivement les discussions relatives aux Commissions chargées de la planification et coordination des travaux d'une part, du système de certification OIML d'autre part.

