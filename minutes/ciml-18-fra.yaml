- number: '6.1'
  title:
  - spelling: eng
    value: a) Mode de Travail des Secrétariats - Caractère spécifique des Recommandations
      et Documents
  narrative:
  - spelling: eng
    value: |2+

      Il est rappelé que le Bureau, pour mettre en application certaines décisions récentes de la Conférence et du Comité et pour tenir compte de l'expérience acquise au cours des cinq ou six dernières années dans le fonctionement des

      Secrétariats Pilotes et Rapporteurs, a reformulé le document « Mode de Travail des Secrétariats de l'OIML ». Sont résumées, ci-après, les décisions du Comité en ce qui concerne des modifications supplémentaires touchant des aspects fondamentaux du Mode de Travail ; les références : §... sont relatives aux paragraphes du document en question :

      — §1. Le Comité est d'accord avec la formulation des caractères spécifiques des Recommandations Internationales et Documents Internationaux, ainsi que pour l'introduction d'un nouveau paragraphe rappelant la nécessité d'eliminer les duplications de travail avec les autres Secrétariats de l'OIML et les groupes de travail d'autres Institutions Internationales (voir aussi §5).

      §2. Le Comité est d'accord avec la formulation de la composition des différents types de groupe de travail, et avec celle du rôle respectif des Collaborateurs Participants et Observateurs. A la demande de M. ISSAEV, le Bureau étudiera la possibilité d'alléger la rédaction de l'ensemble du document (par exemple par l'utilisation des lettres P et O à la place des expressions complètes).

      - §3. Pas de discussion.

      — §4. Les problèmes de planification et coordination sont discutés au point 6.1.b. ci-après.

      — §5. Le Comité est en principe d'accord avec la nouvelle rédaction de ce paragraphe complété par une annexe (y compris le processus d'adoption simplifié au §5.9.) mais formule les observations suivantes :

      à la demande de la Pologne : indiquer l'intérêt qu'il y a à prendre comme base de départ, si possible, une Norme Internationale ou autre Publication déjà adoptée par une autre Institution Internationale ;

      - à la demande des Pays-Bas : reformuler les §5.4. et 5.6. relatifs à l'adoption des projets (majorité requise). (Voir aussi discussion sur §6) ;

      - à la demande de la France et de l'URSS : revoir la rédaction d'ensemble et l'ordre de certains paragraphes ;

      à la demande des USA et de la Norvège : préciser que le Secrétariat Pilote ne doit pas introduire de modifications techniques dans un projet déjà adopté au niveau d'un Secrétariat Rapporteur.

      §6. Le Comité discute en détail le problème de la majorité requise, lors d'une réunion, pour considérer comme définitive les décisions prises par les Etats présents à la réunion. Diverses solutions sont proposées : ne considérer que la majorité des présents (USA), permettre les délégations de voix (Australie), inciter les pays qui ne peuvent assister à la réunion à devenir Collaborateurs-Observateurs (Norvège).

      Certains participants par contre (Autriche, Rép. Féd. d'Allemagne) voient quelques dangers dans ces solutions. M. MÜHE, par ailleurs, rappelle la nécessité de rester pragmatique et de ne pas enfermer les Secrétariats dans des règles trop contraignantes.

      Le Bureau est chargé, sur la base des discussions, de rédiger à nouveau le paragraphe 6 du « Mode de Travail  ».

      — §7. Le Comité est d'accord avec les nouveaux délais dans l'élaboration d'une Recommandation ou d'un Document. A la demande de la Hongrie, il doit être précisé que le tableau des délais s'applique aussi bien aux Recommandations qu'aux Documents (sauf le processus d'adoption finale). M. ROTTER suggère que l'on envisage la possibilité d'utiliser des symboles pour désigner les différentes étapes d'élaboration d'un projet.

      Le Comité, suivant les propositions des USA et de l'URSS, décide de supprimer le §7.4. qui était relatif à la possibilité d'adopter, de manière provisoire et expéditive, un projet comme Document International puis de le transformer en Recommandation.

      En conclusion des discussions sur le §7, le Président rappelle qu'il est de la responsabilité des Membres du Comité de veiller à ce que les Secrétariats assumés par leurs pays respectifs suivent correctement les délais fixés.

      §8. Le Comité est d'accord avec la nouvelle rédaction proposée par le Bureau. M. THULIN rappelle la nécessité pour le Bureau de recevoir, le plus tôt possible, les rapports annuels qui résument l'activité pour l'année passée et présentent les prévisions pour l'année à venir. Ainsi le Bureau pourrait-il donner une vue synthétique de l'activité passée et à venir de chaque Secrétariat. Il est indiqué de plus que ce sujet pourra être revu en fonction des discussions sur la planification et coordination des travaux.

      — § 9, 10, 11, 12 et 13 : pas de discussion.

      - Autres discussions (*).

      A la demande de M. THULIN, le Comité est d'accord pour préciser que les sigles utilisés devraient être les mêmes en français et en anglais : OIML SP, Sr, RI, DI...

      Par ailleurs, à la demande de M. MUHE, il est rappelé que le document « Politique de Travail de l'OIML » n'avait été adopté par la 4e Conférence que dans ses principes et que les documents d'application qui en découlent (en particulier le « Mode de Travail des Secrétariats de l'OIML ») sont les seuls à devoir être utilisés dans la pratique.

- number: '6.2'
  title:
  - spelling: eng
    value: Création de nouveaux Secrétariats
  narrative:
  - spelling: eng
    value: |2+

      ## a) Mesurage de la pollution sonore

      La création d'un tel Secrétariat Rapporteur avait été envisagée, dans le cadre soit du Secrétariat Pilote 17 (Mesurage des pollutions) soit du Secrétariat Pilote 14 (Acoustique et vibration). Suivant les conclusions de la réunion du SP 14 en février 1982, le Comité décide qu'un tel Secrétariat Rapporteur n'a pas besoin d'être créé, les instruments en question faisant l'objet des travaux des Secrétariats Rapporteurs existant dans le cadre du SP 14, une étroite liaison avec la CEI devant être assurée. Cette décision conduit donc à supprimer le SP 17-Sr 5 de la liste des Secrétariats Rapporteurs.

      ## b) Dispositifs électroniques

      Le Comité jusqu'à présent n'avait pas jugé opportun de créer un Secrétariat s'occupant d'un point de vue général des dispositifs électroniques, préférant laisser les divers Secrétariats Rapporteurs s'occuper le cas échéant des dispositifs électroniques pouvant entrer dans les instruments placés sous leur responsabilité.

      Cependant, les réflexions conduites au sein de l'OIML et d'autres Institutions (en particulier CEI et Marché Commun) ont montré qu'il était peut-être utile maintenant de créer un tel Secrétariat.

      Sur les bases d'une proposition détaillée présentée par M. BIJLOO, ce Secrétariat Rapporteur est institué par le Comité sous le titre SP 2-Sr 6 « Dispositifs électroniques », et placé sous la responsabilité des Pays-Bas, près de vingt Etats annoncant leur intention d'y collaborer. Une liaison particulière étroite avec la CEI et le Marché Commun doit être établie.

      Le Comité a également recommandé que ce Secrétariat commence ses travaux le plus vite possible, et ne retarde pas les travaux en cours dans le cadre du SP 7- Sr 2 (Electronique dans les instruments de pesage).

      ## c) Métrologie des systèmes de mesurage

      L'URSS, responsable du Secrétariat Pilote SP 21 et des cinq Secrétariats Rapporteurs déjà existants, a proposé la création d'un sixième Secrétariat Rapporteur, devant s'occuper de la « Détermination expérimentale des caractéristiques métrologiques des systèmes de mesurage » (*).

      Cinq états annoncent leur inscription comme Collaborateurs Participants, et deux autres comme Collaborateurs Observateurs.

      Le Comité donne son accord pour la mise sur pied de ce nouveau Secrétariat Rapporteur mais, à la demande de certains participants, les points importants suivants devront être clairement élucidés : définition d'un système de mesurage (M. PERLSTAIN); liaison avec le nouveau Secrétariat sur l'électronique, car de

      nombreux systèmes de mesurage comportent des dispositifs électroniques (M. SOUCH); liaison avec l'IMEKO qui travaille sur des sujets voisins (M. MÜHE); liaison avec le SP 21-Sr 4 (normalisation des caractéristiques métrologiques des systèmes de mesurage) (M. THULIN); problèmes d'interface (M. MÜHE).

      ## d) Contrôle de la compétence des laboratoires médicaux

      Il est rappelé que ce sujet figurait initialement dans la liste des Secrétariats Rapporteurs rattachés au SP 26, mais qu'il avait été placé comme « sujet à traiter ultérieurement » par manque d'Etat volontaire pour en assumer la responsabilité, et parce qu'il n'avait pas été jugé comme de première priorité. A la suite des discussions tenues au cours des deux dernières années, et bien que, lors de la réunion du Secrétariat Pilote SP 26, en octobre 1979, il n'ait pas été estimé que ce sujet entrait bien dans le cadre des travaux de l'OIML, les USA ont offert leur candidature pour en assumer la responsabilité, et présentent en séance un projet de programme de travail.

      Beaucoup de participants indiquent que, n'ayant pas eu la possibilité de prendre contact avec les autorités médicales de leur pays, il leur est impossible d'indiquer, même à titre purement informatif, s'ils comptent s'inscrire comme collaborateurs de ce Secrétariat, s'il était créé. Cependant, cinq Etats estiment être en mesure de collaborer à ce Secrétariat.

      ## M. THULIN mentionne les travaux de l'IFCC dans ce domaine.

      M. HOLTVEG indique que, ayant été quelque peu au courant de la proposition des USA avant sa soumission au Comité, il a pu prendre contact avec le Président de l'IFCC. L'IFCC a suggéré que l'OIML examine très soigneusement s'il est vraiment utile qu'elle s'attaque à ces problèmes qui font déjà l'objet d'études d'autres Institutions Internationales.

      M. PERLSTAIN fait état de l'expérience qu'il a pour ce qui est de la participation des Services de métrologie au travail des laboratoires médicaux et il craint que cette collaboration ne se heure à des difficultés. Il ajoute que le domaine de travail de ce Secrétariat concerne non les instruments eux-mêmes, mais le fonctionnement d'un laboratoire, et sa compétence, et que cela dépasse sans doute le cadre de responsabilité de l'OIML.

      Mme HENRION, tout en indiquant son intention de participer à ce Secrétariat, fait part de son peu d'optimisme quant au succès du travail, compte tenu de certaines difficultés de collaboration avec les instances médicales.

      M. MUHE rappelle à ses collègues que l'OIML n'est pas une organisation regroupant les Services nationaux de métrologie, c'est une organisation d'Etats, et elle s'occupe donc de tous les problèmes de métrologie légale; il appartient aux Membres du Comité d'assurer la représentation de l'ensemble des organes de leur pays, et non de leur seul Service national de métrologie légale. En ce qui concerne le sujet spécifique du contrôle de la compétence des laboratoires médicaux, M. MUHE ajoute que, dans son pays, il y a deux possibilités : soit vérifier directement l'instrumentation utilisée, soit la contrôler indirectement par le biais d'essais circulaires.

      La délégation Hongroise exprime son intérêt pour les études proposées et indique qu'un accord avec le Ministère Hongrois de la Santé va permettre à l'Office National des Mesures d'exercer un contrôle légal sur les mesurages effectués par les laboratoires médicaux.

      MM. PETRY, HOLTVEG et OHLON insistent pour qu'un délai soit donné aux Membres du Comité pour prendre les contacts nécessaires avec leurs Ministères de tutelle ainsi qu'avec les Ministères de la santé et, éventuellement, les organes nationaux chargés du contrôle des laboratoires, et que la question soit reportée à la prochaine session du Comité.

      M. EDGERLY ne voit pas d'objection à ce que la décision sur la création de ce Secrétariat soit reportée à la prochaine session : cela permettra d'une part à l'association américaine concernée (College of American Pathologists) de préparer un programme de travail détaillé et d'autre part à tous les Membres du Comité de prendre les contacts nécessaires au niveau national.

      M. O'TOOLE attire l'attention des participants sur le fait qu'il s'agira là d'un premier pas de l'OIML vers le contrôle de la compétence des laboratoires et que, si ce premier pas est franchi, il sera sans doute suivi de beaucoup d'autres.

      Le PRESIDENT décide le report de cette discussion à la prochaine réunion. Il juge utile par ailleurs de manifester son assentiment vis-à-vis des interventions de MM. MÜHE et O'TOOLE, et demande aux Membres du Comité de bien réfléchir à ces problèmes.

      6. 3. Examen de la situation de certains Secrétariats. Eventuelle suppression

      a) Avec l'accord des Etats responsables, le Comité supprime les Secrétariats suivants :

      SP 3 Documentation (travail assumé par le BIML)

      SP 11 - Sr 6 Jauges de contrainte utilisées pour le mesurage de la pression (sujet trop spécifique, déjà traité d'une manière générale par le SP 19 - Sr 5)

      SP 12 - Sr 4 Thermomètres électriques à thermistance (sujet couvert par le SP 12- Sr 7)

      SP 17 - Sr 5 Pollution sonore (sujet traité par d'autres Secrétariats)

      SP 24 Equipement de bureaux de métrologie légale et les quatre Secrétariats Rapporteurs rattachés (sujet traité par d'autres Secrétariats et par le Bureau)

      SP 25 Pays en développement et les cinq Secrétariats Rapporteurs rattachés (sujet à la charge du Conseil de Développement, ou d'autres Secrétariats). Cependant les Secrétariats Rapporteurs 2 (Structure et fonctionnement d'un Service national de métrologie légale) et 3 (Matériel nécessaire pour le fonctionnement d'un Service national de métrologie légale) subsisteront jusqu'à achèvement de leurs travaux en cours. En ce qui concerne l'enseignement de la métrologie, ce sujet sera sous la responsabilité du SP 31, mais le travail déjà fait par le SP 25 - Sr 5 sera pris en considération.

      SP 30 - Sr 8 Mesurage des concentrations de vapeur de liquide dans l'air et le gaz (sujet traité par SP 30 - Sr 10).

      SP 30 - Sr 11 Mesurage de la composition et des propriétés du pétrole et des produits pétroliers (sujet complètement traité par l'ISO).

      b) Aucun Etat n'étant candidat pour en assumer la responsabilité, le Comité classe comme thèmes ultérieurs de travail les sujets suivants :

      SP9 - Sr8 Densimètres en continu pour liquides et gaz

      SP 17 - Sr 2 Mesurage des pollutions dans l'eau

      SP 17 - Sr 4 Mesurage des pesticides et substances toxiques

      SP 18 - Sr 9 Appareils utilisés pour le mesurage de la teneur en matière grasse des produits alimentaires

      SP31 - Sr3 Perfectionnement des qualifications des métrologues de divers niveaux.

      c) Le Comité transfère du SP 30 au SP 6 le Secrétaire Rapporteur « Calorimétrie des gaz ».

      d) Le Comité attribue aux Etats-Unis d'Amérique la responsabilité du Secrétariat Rapporteur SP 20 - Sr 1 « Contenu informatif de l'étiquetage », le nombre requis d'Etats (cinq y compris les USA) s'inscrivant comme Collaborateurs Participants, et une dizaine comme Collaborateurs Observateurs. M. OHLON rappelle

      la nécessité d'une collaboration avec le Codex Alimentarius. Par ailleurs, la répartition du travail entre le Sr1 et le Sr2 n'apparaît pas très claire à certains participants, ceci devant être clarifié lors de la prochaine réunion du Secrétariat Pilote.

      A ce sujet, M. PERLSTAIN demande que l'on précise les différences entre le SP2 - Sr 5 « Contrôle par échantillonnage » et le SP20 - Sr 2 « Garantie métrologique des déclarations de quantités contenues dans les préemballages » qui sont deux sous la responsabilité de la Suisse et formés des mêmes Colaaborateurs.

      Le Bureau répond que le SP20 - Sr2 est axé uniquement sur le contrôle des produits préemballés alors que le SP2 - Sr5 s'occupe de tous les problèmes d'échantillonnage en métrologie légale, y compris par exemple la vérification primitive par sondage d'instruments fabriqués en grande série.

      Il est décidé que le travail qui avait été fait jusqu'à présent par le SP 2 - Sr 5, au sujet du contrôle des produits préemballés, serait repris par le SP 20 - Sr 2.

      ## e) Autres questions

      A la demande de M. MUHE, le Bureau est chargé d'introduire, dans la « Liste des Secrétariats de l'OIML », les renvois nécessaires pour montrer que tel sujet, traité dans le cadre de tel Secrétariat Pilote, concerne également tel autre Secrétariat Pilote (par exemple, certains travaux du SP 30 « Mesures physico-chimiques » concernant le SP 17 « Mesurage des pollutions »).

