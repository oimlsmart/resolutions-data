    Le Comité a également demandé à ses Membres d'examiner la participation de leur pays en tant que Membre-P ou O des TC et SC, en particulier pour ceux dont le nombre de Membres-P est actuellement insuffisant, et de tenter d'identifier les organismes nationaux susceptibles d'avoir un intérêt à participer aux activités techniques de l'OIML au nom des services nationaux de métrologie légale.

