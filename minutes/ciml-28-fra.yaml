    Le Comité adopte les résolutions et les décisions prises en fonction des différents points de l'ordre du jour. Les décisions et résolutions sont reproduites à la fin de ce compte rendu.

    ## CLOTURE

    A la demande du nouveau Président elu, M. Faber, le Comité désigne M. Birkeland comme Membre d'Honneur du Comité International de Métrologie Légale. M. Faber exprime ensuite son appréciation pour le travail accompli par M. Birkeland pendant ses quatorze années de Présidence de l'OIML; il fait part également de son espoir de recevoir un soutien total de la part des Vice-Présidents et du Directeur du BIML.

    Le Vice-Président Chappell rappelle aux participants que M. Birkeland avait été elu lors des réunions du CIML et de la Conférence de Washington en 1980 et lui remet un diplôme signé par Dr Prabaker, Directeur du NIST.

    M. Issaev explique aux participants que l'Académie de Métrologie de Russie a élu M. Birkeland comme Membre Etranger; il lit également un message de félicitation pour l'activité de M. Birkeland aux noms des trois Vice-Présidents du Gosstandart de Russie.

    M. Birkeland remercie tous ses amis et collègues; il déclare qu'il a toujours fait de son mieux pour servir les intérêts de l'OIML et qu'il a eu de temps en temps la satisfaction de voir que des progrès avaient été faits. Cela a toujours été un plaisir et un privilège pour lui de présider une organisation active. Il a également beaucoup apprécié le soutien total des Membres du CIML et exprime non seulement ses espoirs mais aussi sa certitude que, sous la Présidence de Gérard Faber, l'OIML continuera à progresser et sera capable de relever avec succès les défis auxquels la métrologie légale sera confrontée au niveau international. Il ajoute ensuite quelques mots sur l'excellente collaboration qu'il a eue avec le Directeur et le personnel du BIML.

    En conclusion, M. Birkeland exprime sa satisfaction pour le travail accompli par le CIML pendant la réunion et remercie tous les participants, les interprètes et le Bureau.

    M. Faber déclare alors la réunion close.

