    ## DÉCISIONS et RÉSOLUTIONS

    ## CIML 1993-POINT1

    Adoption du compte rendu de la vingt-septième réunion du Comité

    Le Comité a approuvé le compte rendu de sa vingt-septième réunion sans modification.

    ## CIML 1993 - POINT 2

    ## Etats Membres et Membres Correspondants

    Le Comité a pris note de l'adhésion en 1993 de la Slovénie comme nouvel Etat Membre de l'OIML.

    Le Comité a par ailleurs pris note des perspectives d'adhésions et de l'éventuelle réadhésion du Liban à l'OIML.

    Le Comité a enfin adopté une Résolution relative à l'un des Etats Membres (voir point 3).

    ## CIML 1993 - POINT 3

    ## Questions financières

    Le Comité a approuvé le rapport comptable pour 1992 et a chargé le Président du CIML et le Directeur du BIML de soumettre ce rapport à la Dixième Conférence.

    Le Comité a également pris note d'informations du BIML sur la situation financière de l'Organisation.

    Le Comité a enfin adopté la Résolution suivante:

    Le Comité International de Métrologie Légale

    1) CONSIDÉRANT le dernier alinéa de la Résolution C9 - 1992 point 8.4 par lequel la Conférence charge le CIML de prendre les mesures nécessaires dans le cas où l'augmentation annuelle de l'indice OCDE représentatif de l'inflation en France différerait de manière significative de la valeur de 4 % prise comme base pour la fixation du budget 1993-1996;

    CONSIDÉRANT que, en 1992, cet indice a augmenté d'environ 3 %;

    DÉCIDE de diminuer le budget de 50 000 francs-or pour chacune des années 1994, 1995 et 1996.

    2) CONSIDÉRANT que la Conférence a reconnu qu'un montant optimal du fonds de réserve est l'équivalent de la somme nécessaire à six mois de fonctionnement du Bureau;

    CONSIDÉRANT que le fonds de réserve a presque atteint ce montant;

    DÉCIDE de diminuer les crédits à placer en réserve de 50 000 francs-or pour chacune des années 1994, 1995 et 1996.

    3) CONSIDÉRANT la demande présentée par le Membre du CIML pour la Fédération de Russie de diminuer provisoirement la contribution financière de la Russie à l'OIML;

    CONSIDÉRANT la situation économique actuelle de ce pays et les décisions déjà prises au sein de diverses organisations internationales de diminuer provisoirement la contribution financière de la Russie à ces organisations;

    DÉCIDE d'accepter la demande de la Russie et de placer provisoirement cet État Membre en classe de cotisation trois à compter de janvier 1994;

    DEMANDE aux autorités russes d'informer le Bureau de toute amélioration dans la situation économique de leur pays afin de réintégrer automatiquement la classe de cotisation quatre lorsque la situation le permettra.

