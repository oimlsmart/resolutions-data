  narrative: |2+

    M. ATHANÉ indique que le travail et les responsabilités de l'Administrateur du Bureau se sont fortement accrus au cours des dix dernières années avec l'augmentation du nombre des États Membres et Correspondants et des agents du Bureau, des fonds à gérer, des ventes de publications. Les responsabilités de l'Administrateur sont maintenant plus proches de celles d'un agent technique que de celles d'un agent de secrétariat ou de documentation comme c'était le cas dans le passé; il est donc normal de revoir la grille de salaire de l'Administrateur, étant entendu que l'Administrateur sera placé, dans sa nouvelle grille, à l'échelon immédiatement supérieur à celui qu'il a actuellement; cette décision n'aura donc pas de conséquences immédiates sensibles sur les dépenses de l'Organisation.

