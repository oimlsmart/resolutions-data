    Delegates were asked to approve these. Mr. Magaña apologized for the rather late dispatch of the French translation of the Minutes, but pointed out that all Delegates had received the English version in a timely manner. Mr. Magaña asked for comments on the Minutes. There being no comments or remarks, the Minutes were approved.

- number: '2'
  title: Member States and Corresponding Members
