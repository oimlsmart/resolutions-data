- number: '12'
  title: Future meetings
  narrative: "\n"
- number: '12.1'
  title: 40th CIML Meeting in 2005
  narrative: |2+

    Mr. Kochsiek reminded Delegates that the date and location for this Meeting had already been agreed. Mr. Lagauterie was asked to take the floor to give some information about it.

    Mr. Lagauterie said that he took pleasure in informing Members that they would be the guests of the French Government in Lyon in June 2005, under the patronage of the French President. Mr. Lagauterie invited Members to understand from this gesture the high level of support of the French Government for OIML activities and legal metrology. He hoped to see all present in Lyon the following year.

    Mr. Magaña added some details about the forthcoming occasion. The Meeting would be held in the large International Congress Centre in Lyon. He showed a slide of the building, which could be seen to be adjacent to an attractive park. The Meeting would be held in conjunction with the International Metrology Congress, about which Members had seen information through links on the OIML web site. Lyon was pleasingly situated between two rivers and was one of the oldest French industrial cities. Industrial automation for textile making had been invented there; it was an ancient city, the capital of old Gaul; it was the capital of French gastronomy and of Beaujolais wine; in short, Mr. Magaña was sure that Members would enjoy it.

    The Metrology Congress would take place just after the CIML Meeting, which would end on Monday at the end of the morning session. That same afternoon, there would be a preliminary OIML session of the Congress, with some presentations which had been received. It would be largely focused on rather specialized issues of legal metrology but would be of interest to Members. That evening there would be an OIML reception and the OIML Anniversary celebrations and opening of the Congress, all combined.

    On the Tuesday morning, the main Congress would begin, with another legal metrology session, this time on subjects of more general interest. Congress was normally attended by about 500 people from many countries as well as from industry and laboratories, which might be known to some Members and which was somewhat similar to NCSLI; and on this occasion it was proposed to invite manufacturers who held OIML Certificates to participate in the exhibition, because this would be a good opportunity for manufacturers to show their products to the large number of CIML Members who would be present. Mr. Magaña recommended Members to speak to manufacturers in their countries and tell them that it would be in their interest to exhibit at this event, which would gather people from about a hundred countries.

    The Bureau had decided, if Members approved, to pay the registration fee for the Congress for one person from each Member State and Corresponding Member, while up to two other representatives of Member States would pay a discounted rate of 400 Euros instead of 700. The Congress would last three days; the program had been finalized in the last few days and more information would soon be available. Members wishing to take advantage of the discounted rate should do so through the Bureau. There would be a number of very interesting presentations, not only in the legal metrology session but also with legal metrology implications in other sessions.

    Mr. Kochsiek thanked Mr. Lagauterie and Mr. Magaña for the invitation and for their additional remarks, and invited questions from the floor.

    Mr. Vaucher asked for deadline dates for submitting papers to this event.

    Mr. Magaña thought that this had been in the previous June, but that other drafts and proposals for papers had been received up to the end of August. There were now a large number of these, and Mr. Magaña, who was a member of the Organizing Committee for the Congress, had asked for the planned one legal metrology session to be expanded to two, but unfortunately time would not allow for this. Members who wished to discuss the possibility of additional presentations might contact Mr. Magaña, but it would probably be difficult to fit in any more.

    Mr. Kochsiek said that he had with him fifteen summaries of proposed Poster Sessions and Plenary Sessions dealing with legal metrology which interested members might consult; they might also approach him with ideas for future presentations.

