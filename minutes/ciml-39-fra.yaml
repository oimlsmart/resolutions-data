- number: '2.1'
  title: Situation of certains Members
  narrative: |2+

    The Conference would be obliged to examine the cases of three Members, and on that occasion there would be a longer report on their situation. The Member Countries in question were:

    - The Democratic People's Republic of Korea, to whom delays over their arrears had been granted by the last Conference, in London. The DPR Korea had paid all its current contributions to the OIML, and the debt had decreased, but only very slightly. The Conference would have to make a decision about these arrears.

    - Zambia had also owed some arrears at the time of the London Conference, and unfortunately their situation appeared to be worsening. It had been decided at the CIML Meeting in Kyoto that if this situation did not improve they should be struck off the list. This had been put into effect; however, Zambia had sent a letter to the Conference explaining its problem, and the Conference would have to discuss what conditions might be set for Zambia re-joining OIML, either as a Corresponding Member or as a Full Member State.

    - The third problem regarded Spain; here there was an old issue, dating back to 1992; a cheque had been lost in the post in France, and had never been found. This would also be discussed and a proposal would be made to the Conference for the issue to be closed. A way would be found to regularize this situation.

    - One or two other countries were a year or two in arrears, but there were no other major problems. There were no problems regarding Corresponding Members.

