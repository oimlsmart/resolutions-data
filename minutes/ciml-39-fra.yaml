- number: '13.1'
  title: Draft procedure for the selection of the BIML Director and Assistant Directors
  narrative: |2+

    Mr. Kochsiek asked Mr. Magaña to present to Members the draft procedure he had been drawing up.

    Mr. Magaña explained that his contract would end at the end of 2005 and that of Assistant Director Mr. Szilvassy in 2007. Mr. Magaña proposed that the procedure used for his own selection should be used again. This consisted of:

    - Call for candidates;

    Selection Committee appointed by CIML meets and makes a proposal;

    President puts proposal to CIML.

    Mr. Magaña proposed that the above method of selection be used in the future for the appointment of Directors and Assistant Directors. This procedure had not previously existed in writing, which was the reason for presenting the present draft document to the Meeting for adoption.

    At Mr. Kochsiek's request for comments, Mr. Lagauterie asked whether it was possible under this procedure for several candidates to be proposed to the Meeting.

    Mr. Magaña replied that, as under the provisions made for the selection in 2000, the more normal situation was for a sole candidate to be chosen by the President and Selection Committee, but there was the possibility in exceptional circumstances of offering two candidates; however, it was felt in principle that the Selection Committee, who had heard the candidates' presentations and conducted interviews with them, were in a better position to make the choice.

    There being no further comments, Mr. Kochsiek proposed the adoption of this draft procedure along with the other decisions at the end of the CIML Meeting.

    In the absence of Bureau staff, the CIML Meeting held a short session on the subject of forthcoming appointments and reappointments of senior Bureau staff.

