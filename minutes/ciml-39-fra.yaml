- number: '6.3'
  title: Implementation of the MAA
  narrative: |2+

    Mr. Magaña informed the meeting that an informal workshop on the MAA had been held; this involved no decisions, but presentations and discussions on the subject of the MAA and its implementation for those who might not know very much about it. It had been decided at the previous CIML Meeting that the MAA should be adopted and implemented as soon as possible for two OIML Recommendations; R 60 Load Cells and R 76 Nonautomatic Weighing Instruments. A Working Group had met in January to look into the implementation of the MAA and its financial implications, and in March the Presidential Council had looked into the proposals of this Working Group. A number of decisions relative to its implementation now had to be taken by the Committee, regarding the level of fees and who should pay them, and other aspects. There had been discussion of the issues in the Workshop chaired by Mr. Ehrlich, which was an informal advisory body. Mr. Magaña called upon Mr. Ehrlich to make a presentation of the outcome of the Workshop.

    Mr. Ehrlich thanked Mr. Magaña for his clear overview of the subject. He explained that in the Workshop there had first been a presentation of the current document, B 10-1, published in the current year, and then answer any concerns and requests for clarification. Topics covered included who could participate, how they could participate, relationships between the MAA and other international agreements, such as the BIPM's MRA, possible roles for Regional Legal Metrology Organizations, how manufacturers' testing laboratories might be incorporated, and overall advantages and disadvantages of participation.

    However, as indicated by Mr. Magaña, the major topics discussed were the costs and the impact on the current OIML Certificate System, and it had been agreed that that the voting items at the CIML should remain limited to those two areas and that the other issues raised should be taken into account during a revision of the MAA Document which was expected to take place within the coming year. This time frame would allow for the MAA to be implemented for a time and for operating issues to be discovered. The detailed clarifications which had been asked for could be provided at that time.

    Mr. Magaña reminded the Committee that some decisions now had to be taken. He drew Delegates' attention to certain effects of MAA:

    Once a Declaration of Mutual Confidence was operational, after a certain time, OIML Certificates issued by participating Issuing Authorities for this category would be issued under the rules of the Declaration of Mutual Confidence and not outside them;

    - When a Declaration of Mutual Confidence had been signed and come into force, which would be on the date when it was signed, there should be a transition period, after which all OIML Certificates for this category should also be issued under the conditions of the Declaration of Mutual Confidence;

    - If an Issuing Authority did not participate in the Declaration of Mutual Confidence, it could issue Certificates up to the end of the transition period, and, for those who participated, as soon as it came into force, all their Certificates for this category should be issued only under the conditions of the Declaration of Mutual Confidence;

    - The transition period would have to be decided by the Committee. Its length might vary from case to case - an all-encompassing decision could not be taken at this point. What would happen would be that, once a Declaration of Mutual Confidence was signed, the Committee on Participation Review for that Declaration would propose a date for the end of the transition period and this proposal would be put to the CIML for discussion and voting;

    - Another issue was the fees due by participating Issuing Authorities. Delegates already knew that a great deal of work had been done by the Bureau and Issuing Authorities would need to pay fees. These fees could be based either on the number of Certificates, at so much per Certificate; or, alternatively, on the amount of participation, with each participation of each Issuing Authority giving rise to one fee. If fees were based entirely on Certificates, the cost would be 300 Euros per Certificate. On the other hand if they were based on the number of Participations, the fee would be 2400 Euros per participation and per year. There had been much discussion in the Working Group, and the matter had also been discussed in the Workshop; the problem was not easily resolved, but the proposal finally arrived at was to split the fee into two parts: half the cost would be based on the number of Certificates issued, and the other half on the number of participations. Thus the annual fee for each participation by one Issuing Authority would be 1200 Euros, plus 150 Euros per Certificate. This was a proposal of the Bureau, which had reached consensus in the Working Group. The Workshop had considered further variations, such as a two thirds/one third or three quarters/one quarter split one way or the other; it had been difficult to reach a decision;

    It had already been decided that another Staff Member would be recruited. This had already been done, and letters had been circulated concerning the method and process of her appointment; the Staff Member was Mrs. Gaucher, who was present and who would be available to meet Delegates at breaks and lunch time. The budget for implementation of the MAA was an additional budget, identified in the main budget as a special issue, showing the MAA's own implementation costs and revenues. The process was expected to begin on 1 January

    2005 and the aim was to have the first Declaration of Mutual Confidence signed by June 2005. This was a tight schedule but every effort would be made to keep to it;

    - A certain number of amendments had to be made to Document B 3; this would be done later on so that an amended version could be presented in the light of decisions taken. Matters to be dealt with included the transition period between the OIML Certificate System and the System enhanced by the MAA.

    Mr. Magaña concluded by saying that he had now summed up the main points; the draft decisions document produced by the MAA Workshop made the same points in more detail. Relations between Declarations of Mutual Confidence and the OIML Certificate System meant that the transition period would be planned and agreed on by the Committee, which would adopt the dates of transition case by case. There were also plans to have a logo on the Certificates covered by the Declarations of Mutual Confidence. Certificates previously issued would of course still be found in the database on the OIML web site and remained valid. The new MAA Certificates would be recorded and appear separately in the OIML database and web site. Financial provisions were as already presented: the Conference had to approve it in the Budget but the Committee could give a resolution on the subject. Fees would be due by Issuing Authorities and not by Manufacturers to the Bureau. The proposal was that fees should be 1200 Euros per year per Issuing Authority plus 150 Euros per Certificate. Mr. Magaña hoped that the Committee would find itself able to present these decisions to the Conference. He asked for comments and questions.

    Mr. Harvey referred to the Workshop on Sunday, at which a proposal had been made that three quarters of the fees should be levied on Certificates. He himself wished to propose that they lean yet further in that direction and charge 100 % of fees on Certificates. This was for two reasons: it would speed up the provision of Certificates to manufacturers; and the MAA would greatly reduce the cost to manufacturers, saving thousands of dollars of the cost of testing, though there would still be additional national charges for the issue of Certificates. But in general they would save tens of thousands of dollars for having a Certificate issued over several economies. In view of the scale of these savings, it would be quite reasonable to levy a charge of a few hundred Euros per Certificate. In fact Mr. Harvey himself would be in favor of increasing the charge still further.

    On the other side of the equation, Mr. Harvey also supported the views put forward by John Barker, regarding the impact of the MAA on Issuing Authorities and smaller economies. One of the impacts of the MAA would be the additional costs for the Issuing Authorities, due to the need to comply with the MAA procedures. If they attempted to recover these costs over a smaller number of approvals, this would put them at a disadvantage vis-à-vis larger Issuing Authorities. The MAA would in any case reduce the viability of the smaller Issuing Authorities, and this would reduce their capability to detect non complying instruments, which was really what should be being done. He would therefore be reluctant to load any additional costs onto these Issuing Authorities. For these two reasons, therefore, it was Mr. Harvey's view that the full amount of the costs should be based upon the Certificate.

    Mr. Harvey further reminded Delegates of the point made by Mr. Tanaka on Sunday, which was that not all Certificates were equal. Certainly, in Australia, there were full Certificates of approval, and there were variants. The full Certificates had much higher associated costs than the variants. In his view, the costing structure should be looked at in more detail; rather than charge a flat 300 Euros per Certificate they should take into account whether a full Certificate or a simple variant Certificate was involved.

    In summary, therefore, Mr. Harvey considered that 100 % of the charges should be put onto the Certificate and paid by the manufacturers; and that the fee structure should be given further consideration. About 1000 Euros per full Certificate and 100 Euros per variant would seem to him to be a good starting point for discussion. If this arrangement should lead to a surplus, then any such surplus could be directed to a Patent Reliance Program.

    Mr. Kochsiek thanked Mr. Harvey but pointed out that there was not time to discuss all proposals in the current session. A number of Delegates had approached him since the Workshop with different proposals regarding financing. He therefore proposed that the Financial Committee and Technical Committee should discuss these matters in depth the following day.

    Mr. Kildal also expressed support for the views expressed and voiced some skepticism about the financial arrangements, and also about additional technical requirements. In his view, additional technical requirements would constitute barriers to trade, and as such, should not be supported by the Organization.

    Mr. Magaña pointed out that the wording and text of the MAA had been adopted the previous year and could not now be altered. It was clear that the additional requirements might be acceptable in some cases, for example climatic conditions for Nordic countries, and in tropical countries, both of which could differ from those in other places; in other cases additional requirements were not acceptable. But this text could not be amended here; any amendment would have to be made in the Committee on Participation Review, which could look at additional requirements and try to reach consensus as to whether or not they were acceptable.

    Mr. Kildal stated that in his view, if the OIML Recommendations were not perfect, which was what was being implied, these Recommendations should be reviewed and got right, so that there would not be the need for exceptions, as these made for confusion.

    On the subject of the fee structure, Mr. Johansen would be in favor of the structure proposed by Australia; but his comment referred to the situation that would arise if the fee structure were not changed. In his view, if the structure remained unaltered, very few Issuing Authorities would participate, because it would not be profitable for smaller ones to do so. This would mean that, for example, in Europe, where there was a tradition of referring to Certificates, there would be a need, either for another system, or for the continuance of the old one. Mr. Johansen himself would prefer the fee structure to be changed so that this situation did not arise. Otherwise they would either have to retain the old system alongside the new one, or else realize that some regions would set up their own systems; this had definitely not been the intention in creating the MAA.

    Mr. Kochsiek asked Mr. Magaña to make a summary of all the comments for full discussion in the Technical Committee.

    Mr. Robles asked whether calculations had been made for the cost of carrying out Peer Review which would be necessary for verifying exactly the technical competence of Issuing Bodies.

    Mr. Magaña said that Issuing Authorities being peer assessed would bear the traveling and accommodation costs for the experts to affirm their competence, but it was not expected that these experts would receive fees for peer assessment. He could not give an exact figure for the cost of a Peer Review.

    The suggestions concerning the repartition of the fees to be charged would need to be discussed and accepted, by a qualified majority, in the Conference, because it would form part of the structure of the budget. He had noted the various comments on this subject and would seek a way of reaching a satisfactory solution.

    Mr. Kochsiek added that Mr. Robles's point had also been discussed in the Workshop. In his own opinion, the system should be kept as un-bureaucratic and inexpensive as possible, otherwise smaller Issuing Authorities would have no chance of participating. There had been proposals at the Workshop. It was essential to make and discuss a proposal the following day.

    Mr. Lagauterie expressed his pleasure that the comments he had made at the Workshop about the distribution of the costs had found supporters. He expressed support for Mr. Harvey's view that the cost of a Certificate was not high enough in relation to what a manufacturer would be gaining. It had already been seen that the developing countries had needs, particularly for a metrology infrastructure; for many years the Organization had sought ways of aiding developing countries. The OIML was good at intellectual support but less good at giving infrastructure support. He

    offered for general consideration the idea that, if the MAA system should result in a surplus, this should be used for the assistance of developing countries.

    Mr. Magaña replied that, as far as the cost of Certificates was concerned, some colleagues, such as Mr. Lagauterie and himself, thought they were too cheap and others thought they were too expensive. In any case, there was no intention to make any profit out of the system, merely to cover costs. The plan was that in approximately four years' time there should be perhaps five Declarations of Mutual Confidence with about five Issuing Authorities in each, making twenty-five participations. They should expect that altogether there would be 200 Certificates per year. With these dates and these costs he could balance the costs of half an agent in the Bureau, which should be enough to deal with this amount of take-up. If there should be more take-up, there would be more money but more work, but these were the projections upon which his financial calculations had been based.

    It had also been decided that, in the long term, OIML Certificates should not be financed by Members' contributions, nor should Manufacturers be expected to finance normal actions of the OIML. If support to developing countries was considered to be a normal activity of the OIML, then resources should be found for this without taxing manufacturers.

    Mr. Freistetter said he was commenting from the point of view of the WELMEC (European Corporation in Legal Metrology) rather than that of Austria; he wanted to point out that there were now almost 30 countries in Europe which should be accepting each others' Certificates by now; so he wanted to appeal for costs to be kept low for the sake of developing countries. More than half the OIML Members were in some financial need.

- number: '6.4'
  title: Other decisions related to the OIML Certificate System
  narrative: |2+

    The Committee decided that from 1 January 2005 OIML Issuing Authorities shall establish OIML Certificates in electronic format as defined by the BIML, so that these Certificates may be published on the OIML web site.

- number: '6.5'
  title: Miscellaneous
  narrative: |2+

    The Committee wished it to be noted that substantial interpretations of Recommendations and Documents are the responsibility of OIML Technical Committees and Subcommittees.

- number: '7'
  title: Developing Countries
  narrative: |2+

    Mr. Magaña reminded delegates that since the week began there had already been two or three events on this subject. The Permanent Working Group on Developing Countries had met and discussed a number of items for the benefit of developing countries; there had been the successful Forum, which was one of the outcomes of the Working Group; and there had been a meeting of the Development Council. Mr. Magaña reminded delegates that as a result of CIML decisions the previous year its President had set up the Permanent Working group to accelerate and increase the efficiency of work on developing countries. The intention was to transfer the activities of the Development Council to this Working Group, taking into account that a small Working Group could be more effective than a large Council which met only once a year. The Permanent Working Group had confirmed that they were ready to take over the work for developing countries. This proposal was put to the Development Council, which had come to the following decision:

    "The Development Council, considering that the organization of the OIML's work on developing countries can be more effectively handled by the Permanent Working Group, proposes to the CIML that the tasks allocated to the Development Council by a decision of the 6th International Conference of Legal Metrology in 1980 should be henceforth transferred to the Permanent Working Group, and decides that the existing Development Council should therefore cease to exist."

    The Committee now had to make a decision upon these conclusions of the Development Council; this would subsequently be submitted by the CIML as its proposal to the Conference.

    Mr. Magaña wished to underline to Delegates that the fact that the Development Council was ceasing to exist by no means meant a cessation of the OIML's work for developing countries. Information would circulate even better to developing countries under the new system, and forums like the recent one, and seminars, would be organized whenever need arose, either internationally at Committee Meetings, or regionally. Activity was therefore expected to increase rather than decrease.

    Mr. Dunmill added that, in the decision Mr. Magaña had outlined, taken by the Development Council for proposition to the CIML, the only details which needed to be clarified in the decisions of this Committee were that the Terms of Reference of the Permanent Working Group had yet to be established by the CIML. It was hoped that the Committee would vote that these Terms of Reference would be established by a Committee-level vote. It was also important to say that the tasks previously undertaken by the Development Council were merely being carried over to the Permanent Working Group, a move which was designed only to make the work for developing countries more efficient. The Permanent Working Group would act as an advisory body to the CIML, which would take all decisions.

    Mr. Kochsiek reiterated that the intention was to increase the work with developing countries; there would be another meeting of the Permanent Working Group in the course of the current week, when, following the Forum, the exhibition of posters from donor Organizations and from developing countries, and the Committee Meeting and Conference, the Permanent Working Group would begin its first real actions. Some such actions were already envisaged, but the Group was awaiting the outcome of the gatherings in progress.

    Mr. Harvey suggested that one thing that could be done for developing countries was to help them to avoid becoming "dumping grounds" for sub-standard instruments. There was evidence in Australia that this was happening in a number of areas, and this evidence could be made available if required.

    John Birch expressed support for the motion before the Committee, as he was sure it would ensure more effective action by the CIML in support of developing countries. He took Mr. Dunmill's point that the Terms of Reference of the PWGDC were still to be established, and suggested that an important aspect of those Terms of Reference was the access of developing countries to that Group. He thought this was of sufficient importance that the CIML should ensure that the Terms of Reference to be established should include the establishment of structures to ensure appropriate access for developing countries to the Permanent Working Group.

    There being no further comments, this motion was approved by the Committee for presentation to the Conference.

- number: '8'
  title: Coordination with RLMOs
  narrative: "\n"
- number: '8.1'
  title: Draft paper on the coordination with RLMOs
  narrative: |2+

    Mr. Magaña informed Members that he had begun some time before to work out a draft paper on coordination with Regional Legal Metrology Organizations. For the moment, the BIML had no mandate to give any directives or guidance to the Regional Organizations, so that what was loosely being described as coordination in fact consisted only of increasing contacts and exchange of information. The paper had not been presented to Members more formally or in more detail because its contact was limited to the informal exchange of information.

    Mr. Birch told Members that although he appreciated the point being made by Mr. Magaña, he considered that there was an important issue in terms of improving the effectiveness of the work of both RLMOs and the OIML. The document made a contribution to this objective. It had been discussed in San Diego recently and the general opinion had been that this was a useful draft which should be developed; he suggested that a meeting should be held in 2005 between the RLMOs and the new Permanent Working Group on Developing Countries to consider the effectiveness and activities of those organizations.

    Mr. Kochsiek asked for clarification as to whether this represented an additional proposal or merely a remark.

    Mr. Magaña replied that an important activity planned by the Permanent Working Group on Developing Countries was to collect as much information as possible from Regional Organizations on the subject of their training activities and materials, etc., and to circulate this information among other regions. In the light of this activity on the part of the Permanent Working Group, Mr. Magaña needed to review and perhaps re-draft his paper on what the OIML could do to improve the flow of information between the different Organizations. He accepted Mr. Birch's proposal that work should continue to be done on regional training and development along these lines.

- number: '9'
  title: Twelfth International Conference of Legal Metrology agenda and program
  narrative: |2+

    Mr. Kochsiek asked for comments on the Conference agenda and program, which Delegates had already received.

    Mr. Magaña told Delegates that the agenda was quite lengthy, and traditional, with opening, roll call and a number of the usual items, the establishment of Working Commissions and so on. Then there were Member States and Corresponding Members, new Members and the situation of certain Members. There would be a report on the implementation of the Long Term Policy since the previous Conference; all reports would relate to the whole period since the previous Conference. There would be reports from Liaisons, both International and Regional; the agenda also included technical issues, the Certificate System and MAA, developing countries, which the Committee had just been discussing, administrative and financial matters, plus any other business. The technical issues would be prepared in the Technical Commission and then voted by Conference, and financial matters, similarly, would be examined in the Financial Commission and the outcome also voted by the Conference.

- number: '10'
  title: Election of the CIML President and First Vice-President
  narrative: "\n"
- number: '10.1'
  title: Presentations given by candidates to the CIML Presidency and First Vice-Presidency
  narrative: |2+

    Mr. Magaña first introduced Alan Johnston, the only candidate for CIML President and asked him to make his short speech about his proposals for the future.

    Mr. Johnston began by thanking Mr. Kochsiek for hosting the 2004 CIML and 12th International Conference; having hosted a similar occasion in Vancouver in 1996, he had some appreciation of the logistics and work involved.

    He also thanked Delegates for giving him the opportunity to speak to them about his views. He assumed that everyone had received a copy of the paper he had prepared on his views, and he now intended to address very briefly some of the issues referred to therein.

    Regarding the environment, this was a period of constant change for legal metrology organizations. He had originally meant to refer to a period of great change, but now he thought it was constant change. No sooner had some changes been successfully negotiated than many more presented themselves. He would refer later to the MAA as an example of this. There were companies now that were becoming global. They were merging and becoming multinational

    corporations, and these same companies were demanding access to all the markets in the world without having to seek individual approval in each country. Indeed, Members' own governments were asking them to eliminate trade barriers, and consumers were now approaching them as well, to say, "We've seen this technology, why can't we have access to it?" Mr. Johnston considered that this was putting a lot of pressure on legal metrology organizations in the world today, particularly at a time when all, or at least most of them, were facing reduced resources available to legal metrology organizations. He therefore felt it was extremely important that OIML should step up, as it had done, the continuous leadership in ensuring that the concerns of countries and of legal metrology organizations were expressed and were known to everybody in order to seek common solutions. Basically, he was saying, "Let's keep up the good work, set priorities, look forward and find solutions to the problems ahead".

    Governments were also looking for more private sector involvement in legal metrology, for partner arrangements, and at the same time they were expecting the OIML to provide strong support This could cause concern within countries, many of which had excellent relationships with their private sectors, others of whom had not yet gone down that path and had not experienced the pros and cons of that type of work. It was important, however, to look at various ways of making sure the work could be carried on and completed, and partnerships with the private sector had to be looked at in order to achieve that. When there were fewer resources, it was necessary to look around and see what resources were available, in order to move forward on the agenda.

    Mr. Johnston asked where that left the OIML in terms of specific current issues. The first issue he would refer to would be the Mutual Acceptance Arrangement, and he wished to thank Mr. Ehrlich for his continued leadership, perseverance and patience on this project. Mr. Johnston was departing from his prepared script to say that after what he had heard in the current session, he presumed that there would be lengthy and intense discussion on issues raised at the Workshop and referred to in the CIML. If elected President, he could guarantee that he would listen carefully to all of Members' comments and concerns in relation to indirect costs, the distribution of the costs and the complexity of the MAA, with a view to trying to find solutions to them.

    Mr. Johnston then moved on to touch briefly on the Technical Committees. There had been discussion the previous year about expediting the work of the Technical Committees, and Delegates would have read the report sent out by the BIML. Some success had been achieved in that area, but it was necessary to go still further in that direction. There had been discussion at the Presidential Council on the need to continue that work. Mr. Johnston considered the Technical Committees to be the heart and raison d'être of the OIML, but at the same time, there was again pressure from companies to approve devices faster. These companies wanted access to the global market place, and processes needed to be in place to ensure that the devices being put on the market met the requirements, and, as Mr. Harvey had said, that production met requirements after they were on the market. There was therefore a need for discussion on this matter, and if elected as President he would be reviewing this in order to determine whether there were any other solutions or streamlining processes that could be put into place, to try and find a way of helping these Committees achieve their objectives. Mr. Johnston reiterated that he was not being critical of the Committees, they were doing excellent work and improvements had been made, but he was just drawing attention to the need for the Organization continually to seek further improvement.

    Mr. Johnston also felt that the work of establishing liaisons with other standard-setting bodies must continue. Again, in an area of scarce resources it was extremely important to avoid duplication of effort, to find out what other Organizations were doing and learn to adapt and adopt as required. This did not of course mean that the OIML would give up any of its mandate or authority, just do what he would call "working smarter", and he would continue to support the BIML in that work as he had done in the past.

    The OIML also had an excellent long term strategic plan. This had been discussed the previous year and an Action Plan set up. This must be examined on a regular basis. In Canada there was an expression "taking it off the shelf", meaning that it was not enough just to develop a plan, put it on the shelf and hope that everything would work out fine, it must be continually reviewed, and changes made as required, in order to ensure that everyone was heading in the same direction.

    On the subject of the Presidency of the CIML, Mr. Johnston was a little concerned that in 2004 and 2005, there had only been one candidate for president. If elected, Mr. Johnston would want to discuss with a number of the Members the reasons for this phenomenon, to try to determine whether measures could be put into place to encourage more people to come forward in future. He was pleased that there were two candidates for First Vice-President: this was a step in the right direction. He had some ideas as to why this situation had arisen, which he would like to validate with Members at some point in the future.

    Mr. Johnston asked why Members should vote for him as President of the CIML, and answered himself saying that, apart from the obvious reason that he was the only candidate, he had represented Canada as its CIML Member for the last ten years; he had been a member of the Presidential Council since 2001; as President of Measurement Canada, he was responsible for the legal metrology organization of Canada; and he was also a member of the Advisory Council for the Institute of National Measurement Standards of the National Research Council of Canada. The National Research Council in Canada, he explained, was the National Metrology Institute for Canada. He had thus gained some insight into other metrology issues. Mr. Johnston informed members that he had thought very carefully about whether or not to run; the previous year there had only been one candidate, and he was extremely concerned about the time involvement of the post. He had discussed it with various people, but it was difficult to assess in advance. He had approached his boss and spoken to his colleagues in Measurement Canada, and all these people had been very supportive of his candidacy, and his Vice-President had agreed to assume more responsibility in order to enable him to allocate time for the Presidency. He had also discussed his candidacy with his wife, who had been very supportive. All this underlined the fact that he had not entered lightly into the decision to run; he took his candidacy seriously, and, if elected, he would take his responsibilities seriously. He also informed Members that he had a paper from the Canadian Federal Government affirming that he was bilingual, though in fact he was more confident in English; the ability to speak French could be an advantage at times, a disadvantage at others.

    Finally, Mr. Johnston had sought the advice of Past President Gerard Faber in terms of areas where he could improve.

    The two candidates for First Vice-President then made their presentations in alphabetical order: first Mr. Ehrlich and then Mrs. Todorova.

    Mr. Kochsiek then referred to his earlier announcement of the bad news of Past President Knut Birkeland's death. Now he had good news for delegates. The OIML comprised about 109, and in future 110,111,112 Member Countries. But they were one big family. In a family, from time to time, thanks were due to Members who were very engaged on behalf of the family. A couple of years ago, the OIML had decided to honor persons who had worked very hard and were very engaged for the OIML. He now had the pleasure, therefore, together with Vice-President Mr. Issaev to present four OIML medals and three Letters of Appreciation; Mr. Kochsiek personally had the honor to present the medals and Mr. Issaev the Letters of Appreciation.

    The first recipient of the awards was the Immediate Past President, Mr. Faber. The previous year, during the 38th CIML Meeting in Kyoto, Mr. Faber was honored by a farewell speech. Mr. Kochsiek was not going to repeat that speech, which he would shorten, but he felt it was necessary to report on his merits on behalf of the Organization.

    Mr. Faber had been elected President of the CIML in 1994. He was in fact the second CIML President to come from the Netherlands. In this position he rendered outstanding services to the

    Organization by spreading awareness of the significance of legal metrology to a growing number of OIML Members - of which, at present, there were 109. By continuous efforts he had succeeded in adapting the structure of the Organization to modern requirements. Under his Chairmanship, in 1994, preliminary discussions were begun for a possible merger between the OIML and the Metre Convention. Later, the roles of the President and the two Vice-Presidents had been redefined. A symposium Metrology Activities in Developing Countries had been held, and a seminar Weighing Towards the Year 2000 organized. Also important was a Round Table discussion on the subject of confidence in type approvals for bilateral recognition and the MAA. The idea of the MAA had thus been initiated eight years previously and was now coming to fruition. The OIML Certificate System was prospering with, at that time, 300 issued Certificates; now there were about 1400. The Birkeland Study had provided new impulse for the long term policy of the Organization and contacts with ILAC and the WTO were also formed and deepened at that time. The OIML was now also collaborating in the JCDCMAS.

    During the last four years, the OIML's accession to the WTO as Observer could be seen as an acknowledgement of the Organization's contribution to global input. The activities of the ten Technical Committees had needed to be evaluated, and new priorities assigned. Discussions for the MAA had turned out to be somewhat difficult, as had been seen in the last few hours also; but there was hope that the system could now be finalized. There had been full cooperation with the Metre Convention and ILAC; for instance, the work on the Law on Metrology was now finished. Policy papers, horizontal documents and strategy papers were in the process of preparation. The Birch study "Benefit of Legal Metrology for the Economy and Society" had been presented the previous year, and met with OIML approval.

    Mr. Kochsiek invited Mr. Faber to the front of the room, saying that he had shown the success story that was OIML under his Presidency. He asked him to accept his words and sincere thanks for the important and successful work he had done. Mr. Faber was presented with a Medal and a personal gift.

    Mr. Faber thanked Members. He said that the burden of making speeches would henceforth fall upon Alan Johnston and not upon himself. Nevertheless, he thanked Members for the medal and gift, saying that he looked back on his OIML career with much pleasure and gratitude. As his friends in the Organization already knew, it was not the last time he would be present, because the OIML was an essential part of his life, which meant that he would follow all its activities, from a certain distance but very carefully, which meant that he hoped to continue to keep in touch for many years to come.

    Mr. Kochsiek said that he now had the pleasure of rewarding three other colleagues. The first of these, taken in alphabetical order, was Mr. Anthony.

    After graduating as a Weights and Measures Inspector in the UK, Mr. Anthony had begun work in 1971 in the Weights and Measures Office in the City of Birmingham, and later as an officer in West Midlands. In 2002 he had gone on to become a Fellow of the Institute of Trading Standards and Administration. During his career, in which he gained strong experience in legal metrology, and especially in the very important aspects of the use of measuring instruments, in 1978 Mr. Anthony had joined one of the most important manufacturers of weighing instruments, where he continued to work on the quality of measurements. His responsibilities in this international company were numerous, and included, to name but a few: Metrology Supervisor; Quality Assurance Manager; and International Approval and Compliance Manager.

    Mr. Anthony's involvement in international work in legal metrology had been quite important as well as effective and positive, and he had always played a prominent role in representing the Weighing Instrument Federations, both National and European, in all international work, with the European Commission, with WELMEC and with the OIML.

    Mr. Kochsiek invited Mr. Anthony to come up. He informed delegates that Mr. Anthony had been the Chairman of the Legal Metrology Group of CECIP, the European Confederation of Weighing Instrument Manufacturers for more than ten years, and also secretary of the CECIP Business and

    Trade Group. In these positions he had always contrived to reach the best possible consensus; he had also made many positive contributions to OIML work.

    Accepting the Medal, Mr. Anthony told Delegates that he felt as though he had won an Oscar in Hollywood! To be honored in such a way by such an august body as the OIML was indeed something he had never expected. He was not sure he deserved to be ranked at the same level, or, at any rate, to receive the same medal as Mr. Faber. It had been a pleasure to work with the OIML and would a pleasure to continue to do so.

    Mr. Kochsiek then turned his attention to Mr. Brinkmann, saying that he had been born in 1937, and had received his University degree in Physics in 1963 and his PhD in 1966 on the generation of high intensity ultrasonic waves and phonometers in non linear acoustics. Acoustics was the key word to bear in mind. Mr. Brinkman had worked for forty years at the PTB, Germany's National Metrology Institute, initially in a laboratory for acoustics, finally as head of a division with a diverse scientific and technical cross section of tasks. His main activities and interests always lay in acoustics and especially in acoustics standardization. He was still active in this field, as Chairman of ISO TC 43 Acoustics. He had also chaired various Technical Committees in a number of international organizations. In the OIML, for example, he had chaired the Secretariat of TC 13, Measuring instruments for acoustics and vibration, and in IEC, the Technical Committee Electroacoustics.

    Mr. Brinkmann's first contact with OIML technical work had been in 1976, and in 1978 he had begun work with audiometers in the former SP14. Having insight into the work of different Committees and Organizations, he had been the first to realize the need for harmonization of OIML Recommendations and IEC Standards, and actively to pursue cooperation between the OIML and the IEC in the field of acoustics standardization.

    Mr. Kochsiek then called upon Mr. Brinkmann to go up to receive his Medal.

    Accepting the award, Mr. Brinkmann told the President and Delegates that he felt greatly honored by it, but that, on the other hand, his work with this Organization over more than twenty years had given him great pleasure. Especially during his Chairmanship, or Secretary's work in TC 13, it had been his main goal to organize the work as effectively as possible. His idea had therefore been to bring as close together as possible the two International Organizations which had been active at that time in the field of specifications of electro-acoustics instruments, which were the IEC and the OIML. Both Organizations had accepted this intention very well and both had greatly benefited from the cooperation. OIML could simply refer all the technical work to the IEC, and the IEC took much more notice of metrology aspects than previously. This willingness to cooperate had given Mr. Brinkmann much pleasure and led to his being able, in the field of acoustics, to issue Recommendations with a double logo, IEC and OIML. He would like to suggest that this route might be followed by other TCs.

    Mr. Kochsiek then introduced the fourth person to be awarded a Medal. Mr. Onoda, from Japan, had joined the manufacturer Kimmon in 1958 and become Technical Director in 1961, just as Japan joined the OIML. He had had contacts with the OIML since 1962, which was more than forty years, when he had visited the BIML in Paris for the first time. Mr. Onoda had had a brilliant career, in the course of which he had received many honors from Japan. To give a full description would take too long; Mr. Kochsiek would mention only one or two outstanding elements: in 1976, Mr. Onoda had become President of the Japan Gas Meter Association and Vice-President of the Japan Water Meter Industry Association, a post which he still held. In 1984 he had been appointed President of the Japanese Weights and Measures Association. In 1990 he had been appointed a member of the Board of Directors of the Japanese Institute of Invention and Innovation, which post he still held. Mr. Onoda had been an active and successful promoter of the SI system in Japan, and, among the numerous honors which had already been awarded to him, Mr. Kochsiek would mention but one: a letter of thanks from the Prime Minister for distinguished services to the Weights and Measures industry ten years previously. To make a list of all the OIML work in which Mr. Onoda had participated would take too long; but mention should be made of his active participation in work on water meters since 1977; on weighing instruments and electronic

    instruments since 1983; and on gas and water meters since 1986. The OIML was grateful to Mr. Onoda for his eminent contribution to the Organization.

    In the absence of Mr. Onoda, Mr. Kochsiek asked Mr. Tanaka to receive the medal.

    On behalf of Mr. Onoda, Mr. Tanaka told delegates that he was sure his colleague was sincerely grateful for the award; and his Japanese colleagues were very pleased by this acknowledgement of their contribution to OIML work; they were also happy to see how much Mr. Onoda enjoyed this type of activities as a delegate of Japanese Societies. He was very sure that the Japanese would find this award most encouraging in their contribution to OIML activities. He thanked the President and Members.

    Mr. Kochsiek next invited the Vice-President Mr. Issaev to present the Letters of Appreciation.

    Before moving on to this stage of proceedings, Mr. Issaev wished to add a couple of words to the tribute to Mr. Onoda: anyone who had been in Kyoto in 2003, he said, would remember his passion for photography; he was a professional Master of Photography. The award to him was therefore very pleasing, and Mr. Issaev added his best wishes.

    Concerning the Letters of Appreciation, Mr. Issaev informed Delegates that it had been decided that three persons' contribution should be marked in this way, by receiving letters signed by Mr. Kochsiek. In alphabetical order, the first person to receive this mark of appreciation was Mr. Gupta, from India.

    Having studied Physics and Mathematics at University, Mr. Gupta had joined the National Physical Laboratory in New Delhi in the 1950's and been placed in the division of Weights and Measures. For almost four decades he had been associated with the areas of mass, volume, density and viscosity measurements. In the late 70s, as Director of Weights and Measures for the Ministry of Civil Supply and Cooperation in the Government of India, he had undertaken projects as an expert and adviser to the Commonwealth Fund for Technical Cooperation and UNIDO. He had produced a large number of metrology related publications and articles, including an Expert Report for the OIML Verification of commercial weights, OIML E 3.

    Mr. Issaev added that it gave him great pleasure to congratulate Mr. Gupta and to thank him for his contribution to international legal metrology. He knew that nobody from India was present, so the only way of getting the Letter of Appreciation to Mr. Gupta would be for the Bureau to send it by mail.

    The second Letter of Appreciation marked the achievements of Mrs. Vytolskaya, from Russia. Mrs.Vytolskaya had graduated from the Moscow Institute of Economics and Statistics and since 1956 she had been working in the Metrology Department of Mr. Issaev's own Institute, the VNIIMS, the Russian Metrology Service. Speaking fluent English and French, she had worked since 1967 as the main expert on issues relating to International Cooperation and had supervised OIML activities in the USSR and later in Russia, during which time she had participated in the preparation and organization of a large number of meetings of OIML Technical Bodies. In 2001, as some Members might remember, she had been the head of the Russian Technical Secretariat of the 36th CIML Meeting in Moscow. During her career she had been given the Merit in Standardization award, and had also received numerous official Diplomas and expressions of gratitude. She was very active in offering assistance and consultation to all Russian Metrology Institutes, of which there were ten, which carried out Secretariat duties of OIML TCs and SCs in which Russia was involved.

    It was also, therefore, Mr. Issaev's great pleasure to congratulate Mrs.Vytolskaya on her achievements and to thank her for her contribution to international legal metrology.

    Mr. Issaev asked Mrs.Vytolskaya to come forward.

    Mrs.Vytolskaya, expressing her gratitude for the Letter of Appreciation, said that she was very happy to have worked virtually all her professional life in the exciting and excellent world of metrology.

    Mr. Issaev then informed the Meeting that the third and final recipient of a Letter of Appreciation was Mr. Wunsche. Mr. Wunsche had already retired in May of the previous year after thirty eight years of highly successful work in the field of testing and certification of automatic weighing instruments at the PTB. He had certainly been one of the most experienced and universally respected experts in the manifold field of automatic weighing technology. He had promoted important developments over the last two decades, such as mobile weighing with shovel dozers and refuse vehicles or in motion weighing with road vehicle instruments. Due to his extensive practical experience, theoretical competence, sense of duty and remarkable farsightedness as regards international development, he had been intensively involved in the development of the six existing OIML Recommendations, R 50, 51, 61, 106, 107 and 134. These six Recommendations formed the basis for fifteen per cent of OIML Certificates. Mr. Wunsche's input had been very important, and Mr. Issaev had great pleasure in congratulating him and thanking him for his contributions to international legal metrology. He knew that Mr. Wunsche was absent but asked his Chief, Mr. Schwartz, to accept the Letter of Appreciation on his colleague's behalf. (Applause)

    Mr. Schwartz accepted the Letter of Appreciation on behalf of Mr. Wunsche, saying that they had worked together for a long time and it would give him great pleasure to pass it on to his former colleague. Mr. Wunsche's contribution to OIML Recommendations for automatic weighing instruments had indeed been great and Mr. Schwartz was pleased to have been given this agreeable task.

- number: '10.2'
  title: Election of the CIML President and First Vice-President
  narrative: |2+

    Mr. Kochsiek asked Mr. Magaña to explain the situation which had prevailed since the $ 38^{\mathrm{th}} $ CIML Meeting in Kyoto.

    Mr. Magaña reminded Members of the procedure for the election. Following the previous year's meeting the President had decided that a call should be made for candidates to the Presidency of the CIML. The Bureau had sent a letter on behalf of the President to all CIML Members, asking for candidates and setting a deadline. There had initially been two candidates for President, but one had been obliged to withdraw, leaving a single candidate. There were two candidates for the Vice Presidency. Members had received a letter during the summer reminding them of the procedure and naming and giving information on the candidates for both elections. The candidates had already given their presentations.

    Mr. Kochsiek appointed Honorary Member Mr. Birch and Past President Mr. Faber to count the votes, which Bureau staff collected from Delegates. Mr. Kochsiek announced the result: 49 "yes" votes, 1 "no" and 4 abstentions. He congratulated Mr. Johnston on this good result and declared him President Elect.

    Mr. Johnston, in accepting the post, said that he had not been aware that he was nervous until Chris Pulham passed by without handing him a ballot paper! At that point he had realized that it was important to him to win the position; he thanked Members for their vote of confidence in him. It was an honor for him to have received so many votes and he felt honored to accept the post. He reminded Members that Mr. Kochsiek had agreed to remain as acting President until the CIML Meeting in Lyon in June 2005, and he looked forward to working with him over the intervening months in order to ensure a seamless transition to his new responsibilities. He had already explained his priorities to Members and would only mention three of these at the present time; these were:

    To develop the OIML Long Term Plan and Action Plan;

    - To ensure that the MAA received the care and attention that it deserved in order to assure its success; and

    - To try to slow down when speaking in public, as this was something he found difficult!

    In conclusion, Mr. Johnston thanked Members for electing him, Mr. Faber for his support, and Mr. Kochsiek and the PTB and the BIML for organizing the meeting, which he was much enjoying. He asked delegates to applaud the organizers.

    Mr. Kochsiek next asked Mr. Magaña to clarify the situation regarding the election for First Vice President.

    Mr. Magaña explained that two countries had departed but had left proxy votes. There were two candidates, Mr. Ehrlich, USA and Mrs. Todorova, Bulgaria, who had already given their presentations. As the outcome of the votes did not allow a decision to be made according to to the rules of the Convention, Mr. Johnston asked Mr. Kochsiek to remain as First Vice-President until the Meeting in Lyon, at which time another election would be held.

    In view of the emergency situation, Mr. Kochsiek agreed to do so. He added that it was the convention for the office holder to continue in this way, and it was to be hoped that there would be a successful election the following year. The same arrangement had been made the previous year in Kyoto. He asked for alternative solutions, but none was offered.

