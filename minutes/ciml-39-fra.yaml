    Opening address

    The Committee took note of the opening address delivered by its Acting President.

    ## Roll-call - Quorum

    The roll of Delegates was called. It was found that 54 Member States out of 59 were present or represented and that the statutory quorum of three quarters of the total number of CIML Members was therefore reached. The Committee also noted the participation of a number of Corresponding Members, Observer Countries, Liaison Institutions and Regional Legal Metrology Organizations, as well as the CIML Immediate Past President, one CIML Honorary Member and members of BIML Staff.

    ## Approval of the agenda

    The Committee approved the draft agenda without modification.

