- number: '3.1'
  title: Adoption of the Auditor's reports for 2002 and 2003
  narrative: |2+

    Mr. Magaña reminded Delegates that the accountant had made an error in the 2002 accounts and that at the previous year's CIML Meeting it had been decided that these should be reassessed with

    the 2003 accounts. A new External accountant had now prepared these accounts; this accountant had been very helpful on many issues and there was reason to be pleased with the choice. Delegates had therefore received this auditor's reports for 2002 and 2003, which now had to be adopted by the CIML and then the whole set of reports for the last financial period would be examined by the Financial Commission and by the Conference, together with estimates for the future. These estimates had come out at slightly more than the amount which had been voted, and the costs had been slightly higher than anticipated. This was due to some exceptional expenses in 2002, especially for the St. Jean de Luz Seminar and for some work done in the Bureau. $ ^{(1)} $

    In 2003 there had also been some structural improvements in the Bureau; and 2004 would be almost balanced. Overall the accounts came very close to balancing, and the exceptional expenditure in 2002 and 2003 should not give rise to anxiety over the state of finances in the future. The subject would be discussed in greater depth at the Conference.

    As there were no comments, it was taken to be the wish of the Committee that these accounts should be presented to Conference.

- number: '3.2'
  title: Draft Revision of the OIML Financial Regulations
  narrative: |2+

    Mr. Kochsiek asked Mr. Magaña to inform the Meeting on this topic.

    Mr. Magaña said that some revision of the Financial Regulations had been discussed in the Presidential Council the previous year. Year after year he had noticed that Members were not very happy with the way the accounting was shown, because this gave rise to some difficulties in understanding the financial affairs of the OIML, and indeed he himself, when he had first taken up his post, had not understood at once how the accountancy worked. It had therefore been decided that the Financial Regulations should be revised to permit the use of new, modern accountancy schemes and to modernize the financial issues of the OIML. The Convention stated that the CIML should prepare the Financial Regulations, which were then voted on by the Conference. Mr. Magaña had prepared them; they had to be looked at in the present Meeting by the Committee, which would give its opinion, and then they would be presented to the Conference during the next few days. There could be further discussion in the Conference, but the Committee should come to some positive decision.

    The draft Regulations had been sent to Delegates some months previously, with a view to their discussion and adoption during the current week. Mr. Magaña had prepared transparencies to illustrate his comments, which were as follows:

    - Article 2 stated that the obsolete "gold franc" should no longer be used. Since the French Franc had disappeared, all accountancy would henceforth be in Euros. A similar decision had been made in the CGPM, the General Conference on Weights and Measures.

    - Article 3 stated that the accountancy would be based on the internationally accepted IPSAS standards (International Public Sector Accounting Standards). These were issued by the International Federation of Accountants for public sector organizations, and were now well established and widely accepted, and the European Union was keen that all public bodies should use them.

    - Another change was from cash accounting to accrual accounting: whereas in the past they had just entered the money they received and the money they paid out, and debts, for example, had not been clearly registered. Money received in one year, such as payments in advance, could not be credited to another year, even if that was where they rightly belonged. Nor had it been it possible to spread depreciation of any purchased item over several years. For example, the photocopiers bought the previous year had had to be entered as an expense of that year, whereas they should have been depreciated over the five years they were expected to remain in use.

    - Debts of Corresponding Members could not previously be put among the assets, but could be recorded under the new system. All assets would have to be re-assessed for inclusion.

    - It had also been impossible under the old system to record liabilities. The Reserve Fund had had to appear as an asset, which was inappropriate. The term Reserve Fund was not used in the usual sense of the term; this fund was for use in the case of a shortfall between assets and liabilities.

    - The OIML policy of not using loans for its financing would continue unaltered under the new system.

    In regard to the financial management of the Bureau, there would continue to be cash flow planning and management alongside the new accrual accountancy.

    Analytical accountancy would also be introduced, so that the exact cost of the different missions of the Bureau and of the OIML could be identified: for example, the full cost of CIML Meetings, or of promotion of metrology by the Bureau, or of actions for Developing Countries.

    There would also be a facility for managing the budget. The President or Director could at any moment look at the situation regarding implementation of the budget and the forecast for the year. This could be done on an accurate, day to day basis.

    - The Financial Regulations would also lay down what should be voted by the Conference. In the past, the Conference had merely voted the expenses, which was not very clear; Conference would from now on vote on the elements of the revenue, which of course mainly came from contributions; they would set the contributions and the Corresponding Members' fees, prices for the Bulletin, fees for implementation of the MAA, and, in general, the cost of running the Bureau.

    Preparations had already begun for the introduction of the new accountancy system on 1 January 2005; the new accountancy software, which was a standard package from Sage, probably already known to many of those present, had already been ordered and would be installed within a few weeks, in readiness for the shift to the new system on 1 January.

    Mr. Magaña and Mr. Kochsiek then invited comments, reminding Delegates that they had had the papers and explanatory notes about the new system for some time.

    Mr. Johnston complimented Mr. Magaña on his presentation of the new financial information, which was much clearer and easier to follow, and expressed support for his efforts to provide more information in the future.

    Mr. Lagauterie commented that France also supported the new system, which was much clearer, but the Foreign Ministry had asked him to make a comment to the effect that, in point 18.2 the wording at present stated that "exceptional expenditure and charges above 15 000 euros not covered in Article 16, have to be accepted by the President". This would imply that the President was obliged to accept such charges. He proposed the following alternative wording: "must be submitted in advance for the agreement of the President of the Committee".

    Mr. Magaña agreed that this wording clarified the text and expressed his intentions in drawing up the Regulations and agreed that it should be substituted for the original phrase.

    Mr. Vaucher expressed his gratitude for the work done by the Bureau and its Director to revise the old fashioned Regulations and fully supported this major step forward for the Organization.

    Mr. Kildal also congratulated Mr. Magaña and the Bureau on the pleasing transparency of the new system. He pointed out one missing item under Assets: Investments which had not depreciated should also be included under this heading. Also, "loans" should surely read "loans to personnel".

    Mr. Magaña replied that it had been the practice for some time to grant loans to employees, but that he believed some Members wished to discuss this matter at the Conference. In the past, however, loans to employees had appeared as an expense, and reimbursement had appeared as "special revenue". In fact, this was an investment, and an alternative to banking the money: loans given to employees were repaid with interest which was no lower than the best rates obtained from the bank. Loans would therefore now appear under Assets, because the money had not disappeared from the Organization but was only locked in a loan. The principle of granting loans

    to employees would be discussed later, but this was a problem of Staff Regulations and not of Financial Regulations. But loans should be correctly recorded.

    On the subject of depreciation, Mr. Kildal pointed out that where part of a purchase had been depreciated, the remainder should be shown as an asset.

    Mr. Magaña replied that equipment would have a normal period of depreciation of five years; building work which added value would be depreciated progressively; work which did not add value to the building was an expense and not an asset. All these rules would be detailed and put in Procedures which would be elaborated very shortly. As in any other organization, once equipment had been fully depreciated it would still exist in the Inventory of the OIML but its value in the accounts was given for its raw value and depreciation but its net value would be zero. If fully depreciated equipment was sold, the price obtained was exceptional revenue for the OIML, as would be the case in any other organization.

    Mr. Ehrlich added the compliments of the United States, and also asked for clarification of the wording proposed by Mr. Lagauterie.

    Mr. Magaña said that the French wording of the Financial Regulations had been drafted by the new accountant to the OIML, who had experience of international accountancy, and the document had been translated into English by a specialized accountancy translator appointed by the accountant. Any clarifications of wording would be referred to these experts. He explained that the change proposed by Mr. Lagauterie made it clear that any unforeseen expenditure over a certain sum had to be submitted to the President for approval: the previous wording had seemed to imply that the President was obliged to agree to such expenditure.

    It was noted that the Committee agreed that the new Financial Regulations should be submitted to Conference.

- number: '4'
  title: Presidential Council Activities
  narrative: |2+

    Mr. Kochsiek reminded CIML Members, especially those recently appointed, that the Presidential Council was not a formal part of the Organization, since it was not provided for in the OIML Convention. However, it was a very useful and effective body for preparing discussions at CIML level. It was understood that the Presidential Council in itself did not have any decision making powers, but was an advisory board to the CIML and to the President.

    Since the Kyoto CIML Meeting, the Presidential Council had held three meetings, one very short one at the end of the Kyoto Meeting; the second, its principal meeting, in March; and the third immediately before the present occasion, this last meeting being in order to prepare motions for discussion at the 39th CIML Meeting and 12th Conference.

    Membership of the Presidential Council consisted of the CIML President and the two CIML Vice Presidents; current membership consisted of:

    Mr. Kochsiek himself;

    - Vice President Mr. Issaev,

    Chairperson of the Development Council Mrs. Annabi;

    and a limited number of representatives of different regions of the world, at present comprising:

    Mr. Stuart Carstens (South Africa);

    Mr. Ehrlich (United States)

    Mr. Johnston (Canada);

    Mr. Tanaka (Japan); and

    Mr. Wang Qinping (China).

    Mr. Faber and Mrs. Bennett had been Members of the Presidential Council up to Sunday evening but after the nomination of new CIML Members and after the election of the new President and Vice-President it would be the task of the latter to select a new Presidential Council. Mr. Kochsiek did not wish to go into detail at the present moment about these meetings, as he would have the opportunity to report in more depth at the Conference. He merely reiterated that the function of the Presidential Council was to prepare decisions but not to take these decisions.

    Mr. Kochsiek next asked Mr. Magaña to sum up the year's activities in the Bureau.

- number: '5'
  title: BIML activities
  narrative: |2+

    Mr. Magaña gave a summary of the year's work, which was brief because Members had already received a written account of these; his talk was supported by slides. The activities had been as follows:

    - The first priority had been, as ever, to support Members and Corresponding Members of the OIML, and countries generally. A number of meetings, seminars and conferences had been held, attended by BIML staff, which had been mainly on the subject of awareness and similar topics. Mr. Magaña himself had attended a Seminar in China, for example; but there was not enough time to go into detail about all such occasions. Staff had also attended a number of technical seminars and congresses, such as the NCSLI Congress;

    - Staff had continued to supply general information on legal metrology to external bodies with which the OIML liaised, such as the WTO and standardization organizations. The BIML also published Guides and Expert Reports, each of which, he reminded Delegates, was published under the responsibility of the expert who had written it, and not of the Bureau. A paper on statistical principles of pre-packaging had been published, in French, upon which there had been some comment: the Bureau would discuss amendments with the expert who had written it. Publishing and translating OIML Publications made up a large part of the staff's task. The Information Letter mentioned earlier was a new enterprise of the Bureau, and the Members' Page on the web site had also been developed to disseminate more information; Members could now view various databases which had been developed. Mr. Magaña regretted that time did not allow for demonstrating these to the present audience. The Bulletin was a further important source of information, and Mr. Magaña was glad to have the opportunity to encourage Members to submit articles for this publication;

    - Support for developing countries was another important activity of the Bureau;

    - Much support was also given to the Technical Committees. Bureau staff attended some, though not of course all, Technical Committee and Subcommittee Meetings, selecting those where they considered that their participation could add value. There was systematic editorial support to Technical Committees and Subcommittees, because the Secretariats of these bodies were not always of English mother tongue, so help of this kind was often essential. The Bureau carefully examined and edited all documents issued by the Technical Committees and Subcommittees to ensure their consistency with those of other Recommendations before presenting them for the vote of CIML Members;

    - Another vital task was conducting the numerous postal ballots, ensuring that responses were received from all Members;

    - The final task, when a document was about to be published, was to translate it into French, the official language of the Organization; this was an onerous task, but indispensable. Such tasks as this were not necessarily very visible, but represented a considerable task for staff;

    - Concerning mutual confidence, the Bureau already had to supervise the OIML Certificate System, which occasionally involved approaching the Issuing Authorities when an error occurred. Preparation for the implementation of the MAA had already begun in 2003, when the

    Working Group on the subject had been set up. The Bureau had assisted the Technical Subcommittee in organizing the recent Workshop on this topic;

    There had been an attempt to modernize the management of the Bureau. To this end, draft Financial Regulations had been prepared, which had been a major task, compounded by the need to translate this document into English: Mr. Magaña thanked Mr. Dunmill for his assistance in their preparation. The new accountancy system had also been drawn up in readiness for the new accountancy regime to be introduced at the end of the current year. Internal information technology applications had also been developed for the databases in the Bureau. When the efficacy of these applications had been tested they would be put on the web site, but the first objective was to ensure their smooth running locally.

    Mr. Kochsiek thanked Mr. Magaña for his report and asked for questions.

    Mr. Harvey asked whether, since communication was generally agreed to be so important, it might be possible for a report on issues discussed at the Presidential Council meetings to appear of the web site, or even just a list of topics discussed. This would provide Members with an indication of which way things were moving. He further proposed an electronic "suggestion box" for Members to contribute their ideas.

    Mr. Kochsiek replied that the Presidential Council was not an official Council of the Organization; nevertheless, when introducing the Information Letter he intended to report, though without detail, what had been discussed at its meetings.

    Mr. Magaña added that among the Bureau's projects for improving communication and the web site, the database on information from Technical Committees had already been finalized; the database on Certificates was nearing completion and would shortly be searchable; and the next project, to be undertaken as soon as possible, was to add some interactive pages to the web site which could be used as forums for Technical Committees and Members. For example, the Secretariat of a Technical Committee could put its working documents in these forums and the participants in the Committee could add their comments. Once these forums had been set up, all Members could use the general ones for suggestions, and selective ones could be offered for example to each TC and SC.

    Mr. Issaev pointed out that the BIML now had good relations with the BIPM. He would like to know the main topics on which there had been collaboration between the two organizations.

    Mr. Magaña said that present contacts involved working principally on draft common presentations on international metrology, developing countries, and sundry day to day topics; additionally, information was regularly exchanged, mainly by telephone, on various issues; for example there had been recent exchanges on the subject of the Staff Regulations and Financial Regulations. Informal telephone calls were exchanged every week and informal discussion took place by this means.

    Mr. Issaev asked whether this implied that the two Organizations were more or less joined.

    Mr. Magaña said they behaved as though they were situated in the same premises, with frequent communication, the telephone taking the place of what would otherwise be informal meetings.

    Mr. Kochsiek pointed out that these relationships were between the BIPM and the Bureau, as opposed to the OIML, whose activities were quite distinct from those of the BIPM.

- number: '6'
  title: Technical activities
  narrative: |2+

    6. 1 Approval of International Documents

    6. 2 Examination of the situation of certain TCs/SCs

    Mr. Kochsiek invited Mr. Szilvassy to present these items.

    Mr. Szilvassy explained that over the last two months, ongoing postal votes on various Documents had ended very well, so that only one Document (Revision of D1) remained for approval on the present occasion. On 20 October the votes on the revision of D 6 and D 8 had stood at 34 "yes" votes with no negative votes; for the revision of D 14 there had been 32 "yes votes and again no "no" votes. A minimum of 30 "yes" votes were needed for a Document to be approved by the Committee; where "no" votes were due to a basic reason, a Document might be referred back to the Technical Committee in question. As the Conference had withdrawn R 33, and the replacement Document had received 40 "yes" votes, it also had been adopted and approved by the Committee.

    Delegates could see from the slide that the position on 20 October was that the outstanding D1 Revision had received 28 "yes" votes, falling short of the necessary consensus by two or three votes; he hoped that there would be no problem in obtaining the necessary number of approvals at the current Meeting.

    On the subject of the situation of certain TCs and SCs, several aspects were mentioned. One of these was the transfer of Secretariats. On the basis of the agreement between the US and South Africa earlier in the current year, the Presidential Council had agreed to the transfer of the TC 6 Secretariat. Since the new Secretariat had been established in South Africa, work had begun again on various projects; it was now up to the CIML to approve this transfer.

    The US had now finished the major project of revising R 111 on Weights and also the revision of R 52; Germany was now ready to take over the Secretariat of TC 9/SC 3 and Members were asked to approve this change.

    Mr. Szilvassy then turned to the question of the TC 8/SC 2 Secretariat which had been vacant for a long time, but Russia had taken on responsibility for the Test Report Format for R 125 and this would soon be circulated among CIML Members for approval. The Secretariat of TC 10/SC 3 Barometers had been relinquished about a year previously and a new country was now being sought to take over responsibility for it.

    As previously announced by Mr. Kochsiek, Germany would relinquish the Secretariat of TC 12 Instruments for measuring electrical quantities; this meant that for two Subcommittees and one Technical Committee there was a need for volunteers to take over the Secretariats.

    Finally, two new projects had been proposed by two Subcommittees:

    - The very important joint publication OIML R 99/ISO 3930 between OIML TC 16/SC 1 and ISO TC 22/SC 5. Both these Organizations having voted for the joint publication, there was a need for CIML endorsement so that work could begin on revision of this very important Recommendation;

    - As proposed by TC 18/SC 2 Clinical Thermometers, the Subcommittee had met in June in Croatia, upon which occasion two thirds of Committee Members had accepted the proposal to start a new project on infrared ear thermometers instead of revising R 7.

    It was proposed that both projects be approved.

    Mr. Kochsiek asked if any Member wished to comment on D1 before decisions were made.

    For South Africa, Mr. Carstens stated that although they were going to vote "yes" to D1, they had difficulty with the concept of introducing traceability; there was an international definition but this did not explain how it was to be applied. Traceability within the legal metrology field needed to be made clear. South Africa had sent a written proposal to the OIML to remedy this problem.

    Mr. Magaña said that all comments would be reviewed before publication and corrections made if necessary.

    Mr. Issaev wanted to know how many votes had been received.

    Mr. Magaña replied that by 20 October there had been 28 "yes" votes and no "no" votes. Only two more positive votes were needed for the motion to be accepted.

    Mr. Kochsiek asked whether anyone in the audience had problems with D1. Seeing no hands raised, he expressed the hope that it would be approved.

    Mr. Kochsiek reminded delegates that at the moment there were vacancies for TC 12 and two other Subcommittees. He asked for volunteers from the audience to take over one of these three, adding that if there was nobody in the present audience willing to undertake TC 12 it could continue up to June 2005, but hopefully by the 2005 CIML Meeting a country would have been found.

    Mr. Harvey said that Australia would be interested in TC 12 but that it was known that Sweden was still doing some work in that area and might also wish to take it on.

    Mr. Kochsiek asked Sweden for their comments on this point, stating that he himself had had the impression during recent months that Sweden was not directly interested. Mr. Kochsiek said that Sweden could be approached after the CIML Meeting was over, to ascertain their feeling on the subject. He wished to verify that if Sweden did not wish to undertake this project, Australia was willing to do so. This was agreed.

    For the Czech Republic, Mr. Klenovský said that he had been in communication with Mr. Svenson of the Swedish Metrology Institute, he knew that work was under way on a draft of a new Recommendation on Electricity meters; it would therefore seem logical to approach them in the first instance.

    He also wished to enquire about progress on the long overdue document on uncertainty in legal metrology.

    Mr. Kochsiek replied to the first question that this was indeed his intention; and he invited Mr. Ehrlich to respond to the second question, hopefully with some good news.

    Mr. Ehrlich said that the uncertainty document was one of TC 3/SC 5's high priority projects, and agreed that it was now long overdue. He had been meeting Dr. Sommer and some others with a view to developing a draft. Without making excuses for the delay, it had been due to work and consultation on related subjects which was going on in the JCGM (Joint Committee on Guides in Metrology), which was working on developing a supplement to the GUM (Guide to the Expression of Uncertainty in Measurement) on the subject of the incorporation of uncertainty in assessment. Unfortunately that work had not progressed as quickly as might have been hoped. He and Mr. Sommer had therefore decided to go ahead with developing a first draft without waiting. The advantage of waiting would have been the possibility of a common terminology on incorporating uncertainty in the assessment of legal metrology for tolerance testing for many types of applications, to be used throughout the world. The plan was to have the draft ready by summer 2005.

    There being no further comments, Mr. Kochsiek thanked Mr. Szilvassy.

