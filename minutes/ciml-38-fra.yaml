      The Committee took note of a presentation given by the CIML President on activities of the Task Group on Developing Countries which had been set up at the last Committee Meeting. The Committee approved the following two proposals made by the CIML President:

      - Les Membres du CIML et le BIML de poursuivre d'autres actions générales visant à promouvoir le Système aux niveaux national, international et régional, et à maintenir informées les organisations internationales et régionales en liaison avec l'OIML des avantages du Système, en particulier en ce qui concerne ses nouvelles caractéristiques.

      Le Comité a chargé le BIML d'effectuer des enquêtes auprès des Membres OIML et des fabricants et demandeurs qui détiennent déjà des Certificats OIML, sur leur expérience au niveau de l'acceptation volontaire et l'utilisation des Certificats OIML pour les approbations de type nationales ou régionales, ainsi que leurs opinions sur le fonctionnement du Système en considérant de près les nouvelles dispositions du P 1.

      Les résultats de ces enquêtes doivent être inclus dans le rapport sur le Système pour être soumis à la 12ème Conférence l'année prochaine.

