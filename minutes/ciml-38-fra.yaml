      The Committee took note of the presentation, given by the BIML Director, of a preliminary proposal for the 2005- 2008 budget. The Committee approved the guidelines set out in this document and instructed the BIML Director to prepare a proposal for the 2004 Conference, highlighting the distinction between:

      - The normal budget, financed by Member State Contributions, and other usual income of the Organization; and

