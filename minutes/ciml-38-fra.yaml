    Pr. Kochsiek n'avait pas préparé de discours particulier pour la clôture, car jusqu'à hier après midi, il n'avait pas prévu de se retrouver dans la situation où cette prérogative lui incomberait. Il a toutefois constaté que beaucoup de travail avait été fait pendant la semaine, et que de nombreuses décisions avaient été rendues. L'approbation de tous les projets de publications était particulièrement importante. Il restait beaucoup à faire pour la préparation de la 12ème Conférence et de la 39ème Réunion du CIML à Berlin.

    Finalement, Pr. Kochsiek a remercié Dr. Ehrlich pour son engagement en faveur du développement du MAA. Cette question avait été suggérée puis examinée pendant plus de sept ans, et Pr. Kochsiek était très heureux qu'elle ait finalement abouti.

    Il a également remercié M. Faber pour son travail exceptionnel pour l'Organisation durant ses neuf années en tant que Président. Le résultat positif de la présente réunion était aussi dû pour une large part à ses efforts.

    Pr. Kochsiek a ensuite remercié les hôtes japonais qui en plus d'organiser une réunion couronnée de succès avaient permis aux Délégués de profiter d'un temps estival rendant superflu les vêtements d'hiver! Il avait entendu que le temps était maintenant en train de devenir un peu plus froid. Il les remerciait aussi, et en particulier Dr. Tanaka, pour leur hospitalité durant la 38ème Réunion du CIML à Kyoto, pour l'excellente préparation et pour la grande réussite de l'événement.

    Pr. Kochsiek a adressé ses remerciements au NMIJ International Metrology Cooperation Office, dont le personnel avait organisé et coordonné la réunion, et a souhaité offrir à Dr. Okaji, son Directeur, un petit cadeau personnel comme témoignage de son engagement pour la réussite de l'événement.

    Pr. Kochsiek a aussi remercié le personnel du BIML pour son excellente préparation de la réunion et pour tout le travail préliminaire et en cours de réunion. Il le remerciait en félicitant M. Magaña pour ce travail sérieux.

    Il a enfin remercié les Membres du CIML, les Membres Correspondants et les personnes invitées à la réunion, non seulement pour leur participation mais aussi pour les discussions fructueuses. Il était convaincu que le travail de l'Organisation avait bien avancé à cette occasion, et que les bonnes décisions avaient été prises. Il souhaitait pour finir à chacun un bon voyage de retour, et se réjouissait de tous les rencontrer à nouveau en octobre prochain à Berlin.
