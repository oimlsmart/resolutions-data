      The Committee accepted the proposal from the BIML to organize the $ 40^{\mathrm{th}} $ Committee Meeting in Lyon, France, at the end of June 2005, in conjunction with the International Metrology Congress organized by the Collège Français de Métrologie, on the occasion of the $ 50^{\mathrm{th}} $ anniversary of the OIML.

      The Committee asked the BIML and the various TCs/SCs to avoid these dates when planning their own meetings.

