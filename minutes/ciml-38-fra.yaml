- number: '1'
  title: Approbation du compte rendu de la 37ème Réunion du CIML
  narrative: |2+

    En l'absence de commentaires, le compte rendu de la 37ème Réunion du CIML (Saint-Jean-de-Luz, 2002) a été approuvé sans modification.

- number: '2'
  title: Mise en application des Décisions et Résolutions de la 37ème Réunion du CIML
  narrative: |2+

    Le Président du CIML et le Directeur du BIML ont précisé que toutes les Décisions et Résolutions étaient couvertes par les divers points de l'ordre du jour et qu'il n'était donc pas nécessaire de les examiner séparément à ce stade de la réunion. Il n'y a eu ni commentaires ni questions.

- number: '3'
  title: États Membres et Membres Correspondants
  narrative: "\n"
- number: '3.1'
  title: Nouveaux Membres - Perspectives d'adhésions
  narrative: |2+

    M. Faber a de nouveau souhaité la bienvenue (voir allocution d'ouverture) à la Nouvelle-Zélande et au Vietnam dont les délégués ont tenu à s'exprimer devant l'assemblée.

    M. Barker a exprimé sa satisfaction au nom de la Nouvelle-Zélande pour son adhésion à l'OIML en tant qu'Etat Membre après avoir été Membre Correspondant depuis 1955. Leur adhésion a confirmé l'importance qu'ils accordaient au système mondial de mesure et au rôle joué par la métrologie légale. Ils se sont consacrés à l'harmonisation basée sur l'acceptation des normes internationales, et en métrologie légale, comme chacun sait, les Recommandations Internationales de l'OIML sont la référence. La décision de ratifier la Convention de l'OIML a été approuvée dans le cadre du processus parlementaire néo-zélandais, son pays ayant reconnu l'intérêt de faire partie de cette Organisation mondiale. La Nouvelle-Zélande souhaitait contribuer à l'élaboration des Recommandations de l'OIML, dans l'intérêt des consommateurs, des fabricants et pour améliorer l'infrastructure de leur pays dans le domaine des mesurages. M. Barker espérait que cela leur permettrait de continuer à sengager dans le cadre de l'accord TBT de l'OMC. Il soutenait ainsi sans réserve l'objectif de l'OIML visant à harmoniser les réglementations nationales sur la métrologie légale. Bien que leur pays ne compte que quatre millions d'habitants, et figurait le plus souvent parmi les régions reculées du monde, ils comptaient jouer un rôle constructif au sein de l'OIML. Pour finir, il souhaitait adresser ses remerciements personnels à trois personnes qui avaient soutenu et encouragé l'accession de la Nouvelle-Zélande au statut d'Etat Membre: M. John Birch, Membre Honoraire du CIML; M. Jean-François Magaña, Directeur du BIML ainsi que son prédécesseur, M. Bernard Athané.

    M. Faber a exprimé sa satisfaction pour l'adhésion de la Nouvelle-Zélande en tant que Membre à part entière et a félicité la Nouvelle-Zélande pour toute l'attention accordée maintenant à la métrologie légale dans ce pays. Il était convaincu que les autorités ne regretteraient pas cette décision et souhaitait que le temps consacré à l'Organisation par la Nouvelle-Zélande soit fécond.

    Dr. Thien indiqué que le Vietnam était passé après dix années avec le statut de Membre Correspondant de l'OIML, à une adhésion à part entière. Ils étaient très heureux de leur nouveau statut et étaient persuadés que leur décision était à la fois judicieuse et indispensable. En tant qu'Etat Membre, le Vietnam croyait fermement qu'il lui serait possible de mieux contribuer au développement de l'OIML et de mieux profiter des avantages proposés par l'OIML., Il voulait donc exprimer au nom de la délégation du Vietnam, sa gratitude à la communauté de l'OIML pour son soutien et sa compréhension jusqu'à aujourd'hui. Il adressait également ses sincères remerciements à M. Faber, Président de l'OIML, et à M. Magaña, Directeur du Bureau pour leur soutien permanent et leur encouragement. Il espérait que le Vietnam continuerait de recevoir la même aide à l'avenir.

    M. Faber a remercié Dr. Thien et la délégation Vietnamienne pour ces paroles. Comme il a été dit dans l'allocution d'ouverture, on peut constater un intérêt grandissant pour la métrologie légale. Preuve en est si besoin lorsque l'on regarde les développements au Vietnam. Il rappelait au Comité que, lorsque le Groupe de Travail avait été créé pour étudier les structures d'aide aux pays en développement, le Vietnam, bien que n'étant pas Membre à part entière à ce moment, était l'un des premiers pays à demander de les laisser devenir membres de ce Groupe. Cela démontrait bien leur motivation. Il souhaitait au nom du CIML une participation fructueuse, au Vietnam et à sa Délégation au sein de l'Organisation, et il était convaincu que leurs contributions aux discussions seraient appréciées. Il a enfin demandé à l'assemblée d'applaudir les deux nouveaux pays.

- number: '3.2'
  title: Situation de certains Membres
  narrative: |2+

    M. Magaña a rappelé à l'assemblée qu'il avait été demandé aux Membres l'année précédente de voter par correspondance concernant la classe de contribution du Vietnam, pour le cas où ce pays deviendrait Etat Membre. Le Vietnam avait demandé d'être placé dans la classe de plus faible contribution comme cela est rendu possible selon les termes de la Convention, mais cette décision appartenant au Comité, un vote par correspondance avait été organisé. Il n'y avait eu que des réponses favorables mais malheureusement pas en nombre suffisant pour valider une décision. M. Magaña a donc proposé qu'un vote soit tenu pendant la réunion, soit immédiatement, soit au moment des résolutions en fin de réunion. Il a informé les Membres que le Bureau proposait que le Vietnam soit placé dans la classe de plus faible contribution et a sollicité des commentaires de l'auditoire. En l'absence d'objections, la question serait ajoutée à la liste des Décisions de la réunion, pour vote le dernier jour.

    Concernant la situation de certains Membres, M. Magaña a précisé que la situation de la plupart des Membres était excellente: tous les arriérés de paiement avaient été réglés, de sorte qu'il n'y avait pas grand chose à signaler. Deux points restaient à considérer, l'un étant plus critique que l'autre: la Conférence avait accordé des délais pour certains pays, et devrait prendre une décision à ce propos l'année suivante. La République Populaire Démocratique de Corée avait réglé toutes ses contributions des exercices en cours. Les arriérés indiqués en jaune dans le tableau correspondaient aux arriérés pour lesquels la Conférence avait accordé des délais, et la Conférence aurait à se prononcer sur ce point l'année suivante. Le cas plus préoccupant de la Zambie devait être examiné; la Conférence avait accordé des délais à la Zambie en 2000 mais la contribution de l'exercice en cours et quelques arriérés étaient toujours à recouvrer. Leur situation devait être discutée et résolue. Suite à la Réunion du Conseil de la Présidence de la veille, M. Faber avait quelques propositions à faire. Il a confirmé à l'assemblée que la situation de la Zambie était très préoccupante et a précisé qu'il ne trouvait pas cela acceptable pour le Comité. Il sollicitait les commentaires de l'auditoire, car le problème s'étalait déjà sur un certain nombre d'années et était financièrement important.

    En l'absence de commentaires de la part des Membres, M. Faber a indiqué que conformément à la Convention, il n'y avait dans de tels cas d'autre alternative que de radier le pays de la liste des Membres. La politique de l'OIML était telle qu'il était très rare d'en arriver à une telle extrémité, dans la mesure où une solution était cherchée chaque fois que possible. Il avait été tenu compte

    du fait que très souvent difficultés de paiement étaient liées à des problèmes d'ordre économique ou autre dans le pays en question. La pratique normale, par conséquent, consistait à rencontrer les pays pour en discuter et parvenir à un arrangement. Nombre de contacts ont déjà été pris avec la Zambie. Le Bureau avait conclu une sorte d'accord selon lequel la Zambie promettait de régler un certain montant chaque mois. Malheureusement, cela n'a pas été vraiment concluant, et M. Faber a considéré que la situation devenait inacceptable. Il a donc proposé que pour le principe, le Comité donne mandat au Président et au Bureau de radier le pays en question. Toutefois, ils devront négocier pendant trois mois encore dans une ultime tentative pour améliorer la situation. Ce qui signifie non pas que les arriérés doivent nécessairement être réglés immédiatement, mais qu'un accord acceptable pour l'OIML devait être conclu et se traduire dans les faits par des versements plus conséquents que l'année précédente. M. Magaña a demandé si les personnes présentes avaient des commentaires; aucun commentaire n'ayant été émis, la décision serait ajoutée aux points soumis au vote à la fin de la réunion.

- number: '4'
  title: Rapport sur les activités du Conseil de la Présidence
  narrative: |2+

    M. Faber a expliqué que comme d'habitude, il n'y avait pas grand chose à dire car généralement, tous les points discutés au Conseil de la Présidence étaient traités dans l'ordre du jour de la réunion du CIML. Pour les nouveaux Membres, il a expliqué brièvement la nature du Conseil de la Présidence, car cet organisme n'était pas mentionné dans la Convention mais créé par la Conférence il y a longtemps. Il s'agissait d'un groupe de neuf personnes, plus le Bureau. La composition était bien connue des délégués et était à chaque fois publiée sur le site Web de l'OIML. Il remplissait le rôle de comité consultatif auprès du Président et était normalement réuni deux fois par an. Une réunion était tenue en février ou mars afin d'examiner toutes les activités en cours et de préparer les points et décisions à inclure à l'ordre du jour de la Réunion du Comité. Pour le Président de l'Organisation, ce Conseil était très important car il tenait lieu de forum permettant de mieux préparer les réunions du Comité. Les membres étaient nommés par le Président, en principe pour un mandat de trois ans, mais en pratique, lorsqu'il y avait un changement de Présidence, le nouveau Président pouvait désigner d'autres membres. Il a aussi été précisé que les membres de ce Conseil ne siégeaient pas en tant que représentants des Etats Membres, mais étaient choisis pour leurs qualités individuelles.

    Le Conseil s'était réuni les 24 et 25 février 2003, à Paris, et avait examiné tous les points de l'ordre du jour de la Réunion. Deux points ont reçu une attention particulière:

    - L'avancement du MAA. Dr. Ehrlich fera un rapport détaillé à ce propos pendant la réunion et une décision sera prise, mais beaucoup de préparation a été nécessaire à ce stade; et

    - La situation financière, plus particulièrement le budget pour la période 2005-2008, qui sera aussi examinée en détail dans les jours à venir. L'une des conséquences pour l'Organisation d'être fondée sur un traité était que les préparatifs du budget 2005-2008 devaient commencer début 2003 et le Directeur et le Président ont anticipé cette situation..

    Le Conseil de la Présidence avait tenu une autre réunion plus courte la veille, le 4 novembre 2003, où l'un des points les plus importants à savoir la structure relative au travail d'aide aux pays en développement a été abordé. Ce point sera aussi soulevé à nouveau au cours de cette réunion. M. Faber a invité les délégués à présenter toutes questions ou observations. Personne ne s'est manifesté.

- number: '5'
  title: Présentation des candidats à la Présidence du CIML
  narrative: |2+

    M. Faber a expliqué que le vote aurait lieu le vendredi après-midi et que la majorité requise était de 80 %. Si celle-ci n'était pas atteinte, le premier Vice-président, Pr. Kochsiek, serait désigné pour succéder à la Présidence. Il y avait un candidat, M. Charles Ehrlich, lequel a présenté sa vision de l'avenir pour l'OIML.

- number: '6'
  title: Questions financières
  narrative: "\n"
- number: '6.1'
  title: Adoption du Rapport Comptable pour 2002
  narrative: |2+

    Le Président a invité M. Magaña à fournir quelques explications sur ce point.

    M. Magaña a rappelé aux délégués qu'ils avaient reçu le Rapport Comptable quelques semaines auparavant. Ce rapport devait être approuvé et adopté tous les ans. Cette année, la situation était légèrement différente, car avec le Rapport Comptable, il avait envoyé une brève note relative à certains problèmes identifiés dans le Rapport.

    Dans le Rapport diffusé, l'expert comptable avait fait deux petites erreurs. Une lettre lui avait été envoyée faisant remarquer ces erreurs; il avait retourné une seconde version mais sans corriger les deux erreurs en question. Finalement, l'expert comptable avait demandé lui-même à démissionner de son poste et de cesser de contrôler les comptes de l'OIML car il désirait prendre sa retraite.

    Le document diffusé avec le rapport avait attiré l'attention sur les deux erreurs qui étaient d'importance mineure. Un solde de 148 Euros environ n'avait pas été comptabilisé dans le poste adéquat dans son rapport, de même qu'un crédit produit par un paiement anticipé de la Libye. Cela n'avait pas beaucoup d'incidence sur les comptes. Le résultat était très similaire, mais par principe, les comptes reçus de cet expert comptable n'étant pas exacts, il restait quelques petites modifications à faire. M. Magaña proposait qu'il soit pris note du Rapport Comptable, mais que celui ne soit pas adopté en raison de ces erreurs, que le Président du CIML soit chargé de désigner un nouvel expert comptable, et qu'il soit demandé à celui-ci de certifier à nouveau les comptes de l'Organisation pour l'année 2002, en même temps que ceux de l'année 2003. Les deux comptabilités seraient présentées à nouveau en 2004, celle de 2002 étant ensuite dans sa version finale. M. Magaña s'excusait pour ce rapport comptable imparfait, mais il n'avait pas été possible de faire autrement car l'expert comptable était âgé et ne désirait plus que prendre sa retraite. La note d'erratum n'engageait que M. Magaña qui suggérait que le Comité demande simplement une nouvelle expertise de ces comptes.

    M. Faber convenait qu'il fallait recourir à un nouvel expert comptable dès que possible. Il serait nécessaire de procéder l'année suivante à la nomination de l'expert comptable ainsi qu'à l'approbation des comptabilités de 2002 et de 2003-c'était une décision du Comité et non du Président. Il a ensuite sollicité les commentaires de l'assemblée.

    M. Farragher a demande s'il y avait un délai maximal pour faire expertiser les comptes.

    M. Magaña a répondu que conformément au Règlement Financier, les comptes annuels étaient vérifiés par un expert comptable indépendant, et présentés au Comité qui chargeait le Président de les présenter à la Conférence. Il n'y avait pas de consigne concernant des obligations annuelles. Les comptes du Bureau devaient être présentés au CIML et le CIML devait donner ordre qu'ils soient présentés à la Conférence, car l'approbation des comptes incombait finalement et en définitive à la Conférence.

- number: '6.2'
  title: Réalisation du budget 2002 et estimations pour 2003
  narrative: |2+

    M. Faber a demandé à M. Magaña de commenter ce point.

    M. Magaña a présenté quelques nouveaux graphiques sur le budget 2002, qui illustraient le budget voté par la Conférence, les estimations faites début 2002, et les derniers chiffres. Comparés aux chiffres votés par la Conférence, les charges salariales étaient légèrement inférieures, les frais indirects (y compris ceux liés à l'immeuble) légèrement supérieurs, et les frais directs (voyages, etc.) quasiment les mêmes. Les revenus provenant principalement des contributions des Membres, étaient légèrement en hausse, du fait de l'adhésion de l'Albanie comme nouvel Etat Membre. Les droits d'entrée pour les Membres Correspondants étaient très légèrement supérieurs à ceux prévus par la Conférence. Les recettes issues des ventes de publications avaient presque doublé, mais cela ne constituit pas une source de revenus très importante. Le rembour-

    sement des taxes par l'administration française qui était une autre source de revenus, était aussi légèrement supérieur à ce qui était prévu par la Conférence. Mais le résultat global était conforme à celui prévu par la Conférence.

    La situation pour 2003 était très similaire, mais les coûts salariaux étaient légèrement supérieurs à ceux votés par la Conférence. Les frais indirects étaient comparables à ceux votés par la Conférence, et les frais directs également. Toutes les dépenses étaient par conséquent conformes aux prévisions.

    Pour ce qui est des revenus, les contributions des Membres avaient été légèrement supérieures à celles prévues par la Conférence, mais pas de façon significative. Les droits d'entrée des Membres Correspondants et les recettes issues des ventes avaient été conformes aux prévisions, comme pour les autres revenus.

    Il a été constaté en comparant les revenus et les charges, que le budget 2002 voté avait été respecté; il y avait eu un petit excédent en 2002, du fait de revenus légèrement supérieurs, et des charges qui étaient restées constantes. Mais pour l'année 2003, les estimations et les chiffres montraient un petit déficit. Les dépenses étaient légèrement supérieures aux revenus, mais de façon modérée. Les charges salariales représentaient la part la plus significative (environ 60 %), avec 20-22 % de frais indirects, et autant de frais directs.

    M. Faber a remercié M. Magaña, ajoutant que l'usage de graphiques avait permis une compréhension rapide et précise de la situation. Les Délégués n'ayant pas formulé de remarques ou de questions comme ils y étaient invités, M. Faber en a déduit que cela semblait être signe de la satisfaction générale pour la gestion financière de M. Magaña, et l'a félicité.

- number: '6.3'
  title: Proposition préliminaire pour le budget 2005-2008
  narrative: |2+

    M. Faber rappelé aux délégués qu'il avait déjà mentionné qu'il était important pour les discussions sur le budget 2005-2008 de commencer tout de suite de façon que les décisions de la Conférence puissent se poursuivre l'année suivante. Il a demandé à M. Magaña de faire une introduction à ce sujet.

    M. Magaña a indiqué qu'il était de coutume pour le Directeur de présenter à la réunion, l'année avant la Conférence, un résumé du budget prévisionnel de quatre ans, pour permettre au Comité d'en discuter; leurs commentaires et conseils aideraient le Directeur à la préparation de propositions finales pour la Conférence, en ligne avec les souhaits du Comité. Les propositions étaient seulement préliminaires et en tant que telles, il n'était pas utile de procéder à leur adoption; ce qui était nécessaire était d'aboutir à quelques résolutions guidant le Directeur dans la conduite et la préparation du budget quadriennal selon les positions indiquées.

    Pour les quatre années 2005-2008, un événement majeur était attendu: il s'agissait de l'application de l'Arrangement d'Acceptation Mutuelle (MAA), qui constituerait une tâche supplémentaire pour le Bureau. Il était proposé de présenter le budget en deux parties: le budget normal ne comprenant pas la mise en application du MAA, ex ante; et un document additionnel ou quelques options pour tenir compte des besoins supplémentaires pour la mise en application du MAA. Les hypothèses pour cette période de quatre années étaient basées sur les éléments suivants. Un taux d'inflation d'environ 2 % était prévu; basés dessus, les salaires augmenteraient proportionnellement à l'inflation, plus une petite progression, par le fait que des membres du personnel changeraient d'échelon. Ce qui se traduirait par une augmentation d'environ 4 % de la masse salariale, car si dans une grande structure, il y a plus de renouvellement de personnel, les jeunes recrues étant rétribuées en bas de l'échelle; il en va différemment au sein d'une petite entité de dix personnes comme le BIML, où à court terme l'avancement du personnel est continu. Il était prévu que toutes les autres charges augmentent proportionnellement au taux d'inflation. D'autres dépenses exceptionnelles étaient aussi prévues: il fallait réserver certains fonds pour l'organisation des séminaires, comme ceux pour le suivi du Séminaire de Braunschweig et d'autres. Certains fonds spéciaux seraient nécessaires pour la célébration du 50ème anniversaire de l'OIML; il était aussi nécessaire de remplacer les équipements obsolètes du Bureau.

    Concernant les revenus pour le budget, M. Magaña a poursuivi en disant que son intention était de proposer une augmentation des contributions des Membres à hauteur du taux d'inflation de 2 % prévu. On pouvait s'attendre à une petite augmentation du montant global des contributions

    - deux nouveaux Membres avaient déjà rejoint l'Organisation cette année et les perspectives d'adhésion de un ou deux membres supplémentaires étaient favorables. L'inflation à 2 % avait été considérée comme raisonnable et acceptée pour le budget du BIPM à la Conférence Générale des Poids et Mesures le mois précédent. Concernant les contributions des Membres Correspondants, suite aux discussions il y a quelques années, il a été considéré que leur abonnement se monterait à environ 10 % de la part de contribution de base des Membres à part entière. L'abonnement actuel était légèrement inférieur et devrait progressivement être augmenté pour atteindre ce montant de 10 % de la part de contribution de base. M. Magaña ne croyait pas que le nombre de Membres Correspondants augmenterait car il arrivait souvent que les nouveaux Etats Membres aient été auparavant Membres Correspondants, de sorte que même si de nouveaux pays devenaient Membres Correspondants, un nombre équivalent prendrait le statut de membre à part entière. Le nombre de Membres Correspondants resterait ainsi constant. C'était donc l'hypothèse retenue pour les charges et les revenus du budget 2004 et pour les estimations pour 2005-2008 ou 2009. Certaines années, il y avait un petit déficit, d'autres années un petit surplus - cela dépendait des dépenses exceptionnelles. Des dépenses spéciales pouvaient être prévues sur une année: par exemple, en 2008 certains équipements du Bureau devaient être remplacés, produisant un petit déficit. Mais il y avait un équilibre global sain.

    De plus, pour la mise en application du MAA, un poste supplémentaire serait nécessaire au sein du Bureau. Il avait été jugé inapproprié de financer ce poste supplémentaire sur les contributions des Etats Membres, car ces contributions devaient être utilisées dans le cadre du fonctionnement normal de l'OIML pour tous les pays et non pas pour les quelques pays qui participaient au MAA. Une option qui devait être ajoutée au budget concernait l'application du MAA: des frais supplémentaires devaient être comptés pour le poste en question, qui seraient compensés par les cotisations des bénéficiaires du MAA (soit les autorités de délivrance participantes, soit les fabricants). Ce point serait discuté plus tard avec celui sur le MAA.

    Si cette option du budget était acceptée, il se trouverait que les revenus engendrés par le MAA ne seraient pas suffisants dans l'immédiat pour couvrir les frais. Il était prévu que l'application du MAA s'intensifierait et que seulement au bout de quatre années, le nombre de participants et de fabricants concernés serait enfin suffisant pour équilibrer les frais. On pouvait donc s'attendre (dans ce cas) à un déficit du fait de frais plus élevés en 2005 induits par le poste supplémentaire et de revenus limités. De 2005 à 2008 et 2009, ce déficit s'amenuiserait progressivement, et en 2009 un budget équilibré pourrait être atteint. Ces déficits étaient le prix à payer pour la mise en application du MAA mais l'argent pouvait être pris sur le fonds de réserve puisqu'il s'agissait d'un investissement pour l'avenir. On pouvait considérer comme très importante cette transition pour la mise en application du MAA; après quatre années, il ne serait plus nécessaire de puiser dans le fonds de réserve et le budget serait équilibré. Il serait possible de déclassifier certaines resources de l'OIML, basées sur le fait que les dépenses relatives aux tâches principales devraient être assurées par les contributions des Etats Membres et que d'autres services, comme celui de l'application du MAA devraient être financés par les bénéficiaires.

    Il était également projeté de rendre toutes les Publications OIML disponibles gratuitement sur le site Web et de ne plus les imprimer sur papier. De cette façon, les revenus issus des ventes de publications disparaîtraient tandis que dans le même temps des économies seraient réalisées sur les coûts d'impression.

    M. Magaña conclu sur le fait que les fonds de réserve était généralement considéré comme étant trop élevé; il représentait 15 ou 16 mois de fonctionnement du Bureau alors qu'un budget de six mois était en général jugé approprié. L'option d'utiliser le fonds de réserve abaisserait ce fonds à un niveau acceptable mais ne compromettrait pas l'avenir, puisque l'on arrêtait de puiser dans le fonds de réserve au bout de quatre ans. Au terme de ces quatre années, le fonds serait à un niveau équivalent approximativement à 50 % des dépenses annuelles du Bureau. M. Magaña terminait son propos en invitant les délégués à faire part de leurs commentaires et conseils.

    M. Faber a remercié M. Magaña. Il a précisé qu'il était habituel dans nombre d'organisations de disposer d'une réserve à hauteur de 50 % environ des dépenses annuelles comme mentionné par M. Magaña. Elle avait été bien supérieure assez longtemps, mais cela ne posait pas de problème pourvu qu'elle ne descende pas en dessous des 50 % susmentionnés. Une fois encore, la présentation électronique avait été utile pour expliquer la situation financière.

    Les décisions finales ne seraient pas prises à ce stade mais toutes les remarques des délégués seraient prises en compte et indispensables pour présenter une proposition finale l'année prochaine.

    M. Lagauterie a indiqué à l'assemblée qu'il était d'accord dans le principe avec cette proposition, en particulier avec le fait que le fabricant devrait payer pour l'application du MAA, mais il avait une question concernant les publications de l'Organisation. N'était-il pas possible de mettre en place le téléchargement des publications contre paiement?

    M. Magaña a répondu qu'un tel système était effectivement possible. L'idée était que l'impression était coûteuse et que les documents électroniques étaient plus faciles à distribuer et l'on pouvait réaliser des économies de cette façon. En même temps, un certain nombre de Membres considéraient qu'il serait bon pour la promotion de la métrologie de rendre toutes ces publications disponibles gratuitement. Il lui avait été demandé d'étudier la possibilité d'utiliser l'argent économisé en frais d'impression pour diffuser gratuitement les documents par voie électronique. Cela produirait une faible perte dans l'ensemble, mais avec l'application du MAA, il serait possible de parvenir à un équilibre. Il était important de promouvoir les publications OIML. Quelques publications ne seraient pas délivrées gratuitement: il s'agissait des publications élaborées en commun avec d'autres organisations, telles que le GUM, le VIM, et quelques publications OIML-ISO ou OIML-CEI. Par exemple, dans le cas de la R 99, qui était une publication OIML-ISO, l'OIML achetait des exemplaires de la publication à l'ISO pour répondre aux commandes; cela ne pouvait évidemment être fait à titre gratuit car cela ne serait pas acceptable vis-à-vis de l'ISO. Mises à part ces peu nombreuses publications, les autres publications OIML pourraient être gratuites et cela serait aussi utile pour les pays en développement.

    Dr. Kildal remerciait le Directeur pour sa présentation très approfondie du budget. Il avait une question, toutefois, concernant le MAA: dans le budget pour le MAA, il y avait une ligne au niveau des recettes mais pas au niveau des charges. Etant donné que le MAA serait examiné en dehors du budget habituel de l'OIML, il voudrait voir un budget complet du MAA, comportant à la fois les charges et les recettes en tant que lignes séparées.

    M. Magaña convenait qu'il n'avait pas inclus les chiffres détaillés qui avaient été calculés. Il pouvait envoyer ou montrer un document plus détaillé, mais examiner des chiffres dans une réunion comme celle-ci ne serait pas très commode. De plus amples détails étaient contenus dans les documents envoyés par courrier et courriel. Pour l'application du MAA, le document MAA montrait que le Bureau aurait beaucoup à faire pour examiner chaque Déclaration de Confiance Mutuelle (DoMC) dans chaque groupe, étudier la façon dont les choses se passeraient, résoudre les conflits, surveiller l'interprétation, etc., de sorte que le Bureau aurait une tâche plutôt importante. Potentiellement, il y avait 35 ou 36 catégories dans le Système de Certificats. Même pour suivre 20 DoMCs, il faudrait un poste supplémentaire pour effectuer le travail. Il faudrait financer les dépenses de salaire et de voyages pour le nouveau poste, car il ou elle devrait se rendre dans différents pays pour résoudre les problèmes dans le cadre du MAA, ainsi que cela avait été prévu. Les recettes seraient discutées plus tard. Il y avait deux solutions: demander aux autorités de délivrance de régler les frais, ou s'adresser pour cela aux fabricants. Il avait été considéré que le MAA était destiné aux fabricants pour les aider à obtenir des approbations dans d'autres pays. Cela bénéficiait donc aux fabricants et au final ne devait pas être financé par les contributions des Etats Membres.

    Dr. Kildal a précisé qu'il n'était pas préoccupé par l'exactitude des calculs, mais qu'il désirait simplement voir le MAA assorti de son budget en tant que projet, de façon qu'à la fois les frais (regroupés) et les recettes puissent être considérés.

    M. Faber indiqué à Dr. Kildal qu'il y aurait une petite discussion sur les principes de financement du MAA à ce moment, mais que immédiatement après la réunion, il proposerait un Groupe de Travail, établi par le Président, pour préparer un plan financier détaillé pour le MAA dans un délai de deux ou trois mois, car il ne fallait pas laisser la place à de mauvaises surprises et la transparence était vitale. Ce plan serait présenté à la prochaine Réunion du Comité pour approbation. Il y aurait aussi d'autres discussions sur le financement lorsque le point sur le MAA dans l'ordre du jour serait abordé. Il avait cependant été pris note des inquiétudes du Dr. Kildal.

    M. Magaña a ajouté que bien que les informations exigées n'étaient pas immédiatement disponibles sur l'écran d'affichage, elles pouvaient être trouvées dans les documents qui avaient été en-

    voyés pour cette réunion. Elles comprenaient un budget et également un autre tableau indiquant les charges et revenus prévus pour le MAA. Il aurait peut-être l'occasion de les montrer plus tard, ou de les clarifier pour le budget final.

    Dr. Llewellyn avait un doute sur un point de détail dans le budget: dans l'Annexe 1 du document diffusé le 24 juin, sur la ligne des dépenses exceptionnelles, pour 2005 figuraient 83 000 Euros, et pour 2008, 88 600 Euros. C'était bien supérieur à tous les autres chiffres pour cette ligne. Il se demandait si ces dépenses exceptionnelles concernaient comme il le supposait la célébration du 50ème anniversaire de l'OIML et la Conférence en 2005. Si cela n'était pas le cas, il serait reconnaissant au Directeur de bien vouloir en expliquer la raison. Le résultat final pour 2005 atteindrait le point mort et il y aurait un petit déficit en 2008.

    L'autre inquiétude de Dr. Llewellyn portait sur le fait que les revenus prévus pour le MAA étaient incertains s'ils reposaient uniquement sur les recettes perçues des fabricants ou bénéficiaires, car si elles n'étaient pas réalisées, il s'ensuivrait un déficit très important. Dr. Llewellyn a indiqué qu'il en reparlerait lorsque le point sur le MAA sera discuté ultérieurement, mais qu'étant donné ce risque, il préférait une source de revenus plus sûre, basée au moins en partie sur les contributions des Etats Membres. Cependant, il présumait que le comité Ad Hoc étudierait ce point.

    M. Faber a dit que la seconde remarque du Dr. Llewellyn serait prise en compte au moment de la discussion du MAA, et a demandé au Directeur de fournir les explications demandées.

    M. Magaña a indiqué que le budget de base se trouvait parmi les documents envoyés en juin; dans un tableau, 83 000 Euros de dépenses exceptionnelles étaient prévues pour 2005, et à peu près le même montant en 2008. Pour les autres années, le montant estimé de ces dépenses était approximativement de 13 000 Euros. Ces dépenses exceptionnelles en 2005 portaient sur quelques travaux nécessaires pour l'aménagement du Bureau et aussi pour l'anniversaire de l'OIML. Cette occasion très spéciale donnerait lieu à des dépenses exceptionnelles. En 2008, un certain nombre d'équipements assez coûteux devraient être remplacés. Autrefois, l'équipement de photocopieuses était loué; cette année, le Bureau venait d'opter pour leur achat, réalisant ainsi des économies sur 4 ans, et un renouvellement devait être prévu pour la cinquième année; la méthode de comptabilité utilisée ne permettait pas de constituer des provisions d'avance – l'affectation comptable du paiement de l'équipement devait être réalisée sur l'année d'acquisition. Si évidemment, l'équipement pouvait durer plus longtemps, il serait conservé, mais des frais de remplacement devaient être prévus.

    Concernant le financement du MAA, M. Magaña souhaitait ajouter qu'un poste supplémentaire serait nécessaire pour traiter les déclarations de confiance mutuelle sûrement nombreuses. Le personnel du Bureau était actuellement surchargé et n'était ainsi pas en mesure d'étendre ses attributions. Les règles habituelles de l'OIML stipulaient que les nouveaux membres du personnel seraient recrutés sur la base d'un contrat à durée limitée. Cette durée était normalement fixée à 5 ans, mais pouvait être de 3 ans, et il n'y avait pas d'obligation de renouvellement au terme du contrat. Il valait mieux être optimiste et considérer le MAA comme voué au succès, et un poste pouvait être créé pour effectuer le travail en rapport. Si les frais ne pouvaient être équilibrés, le contrat de cette personne ne serait alors pas renouvelé, et il serait nécessaire de dire aux Membres que le Bureau n'était pas en mesure d'accomplir tout ce qui avait été prévu, et de leur demander de prendre part au travail d'application du MAA. Il voulait croire, cependant, au succès du MAA et donc au fait que les dispositions prévues pourraient être maintenues. S'il en était autrement, les dépenses pourraient être arrêtées pour limiter les pertes et d'autres moyens pourraient être trouvés pour l'application du MAA.

    M. Faber pour terminer la discussion à ce sujet, fit remarquer que le MAA serait ultérieurement discuté en détail en un autre point de l'ordre du jour. Le principe essentiel à se rappeler était que le MAA ne serait pas finance à partir du système normal de contribution, et que cela constituerait le principe de base à la fois pour les discussions futures et pour le Groupe de Travail. Il avait l'impression que le budget était très modéré, ce qui montrait que la situation de l'OIML était bonne.

    M. Klenovský a demandé pourquoi le BIML proposait d'entreprendre les deux options de budget en même temps, si l'on tenait compte des risques mentionnés par Dr. Llewellyn. A un moment si critique, il pourrait être préférable d'être un peu plus réservé.

    M. Magaña avait calculé que dans un délai de quatre ou cinq ans peut-être, la moitié des certificats actuels serait concernée par les DoMCs. Il considérait donc que son hypothèse était plutôt prudente. Il y avait aujourd'hui 1100 certificats. Si 600 certificats étaient visés par les DoMCs, cela équilibrerait les charges pour un poste supplémentaire d'ingénieur. Il considérait également qu'après quelques années, les recettes prévues pourraient aussi apporter un petit surplus au Bureau, lequel pourrait être utilisé pour équilibrer les frais de diffusion des publications à titre gratuit - un bénéfice supplémentaire du MAA. C'est la raison pour laquelle, pour faire simple, il avait combiné ces deux options – application du MAA et diffusion gratuite des publications. Les options pouvaient être séparées si les Membres le souhaitaient. M. Magaña aurait préféré remettre cette discussion à plus tard au sein du groupe restreint mais se rangerait à l' avis de l'assemblée.

    La délégation néerlandaise (Mrs. van Spronssen) ne souhaitait pas prolonger la discussion mais partageait les inquiétudes de Dr. Llewellyn. Dans la préparation du budget, le Groupe de Travail devrait s'assurer que les fabricants et les autorités de délivrance étaient volontaires pour financer le système.

    M. Magaña a répondu que c'était exactement le genre de remarque qu'il avait l'habitude de faire lorsqu'il était Membre du CIML pour la France! Une preuve du bénéfice que cela apporterait aux fabricants viendrait de leur diligence à financer le système. Si elle ne se manifestait pas, cela pourrait signifier que ce qui se préparait ne servait à rien, ou que le service proposé par l'OIML n'était pas efficace et qu'il pouvait être arrêté.

    M. Faber a conclu la discussion en disant que les points évoqués seraient pris en compte et que les questions budgétaires seraient discutées ultérieurement au moment d'aborder le point sur le MAA.

- number: '6.4'
  title: Progrès concernant la révision du Règlement Financier de l'OIML
  narrative: |2+

    En demandant à M. Magaña de présenter ce point, M. Faber voulait rappeler à l'assemblée qu'au cours des dernières années, le désir d'appliquer des principes modernes de comptabilité au niveau de la gestion financière de l'OIML s'était fait fortement ressentir. Cela constituait le point de départ du rapport présenté par M. Magaña.

    M. Magaña a commencé par expliquer qu'il n'avait pas préparé de présentation, ni envoyé de documents à ce sujet dans la mesure où il ne s'agissait que d'informations générales. Les Statuts du Personnel étaient en train d'être mis à jour mais il était aussi nécessaire d'actualiser le Règlement Financier. Celui-ci avait été révisé la dernière fois en 1980 et la comptabilité qui n'était pas adaptée à la gestion moderne d'une organisation internationale, n'était pas suffisamment claire. Lorsqu'il avait examiné la comptabilité du Bureau à l'époque où il était Membre du CIML, celle-ci lui semblait difficilement compréhensible. Il avait par conséquent prévu d'avoir recours au plan de comptabilité standard en usage en France pour la comptabilité du Bureau, mais harmonisée avec les usages dans d'autres pays. Sans rentrer dans les détails, cela permettrait de clarifier un certain nombre d'aspects. Une fois le système comptable révisé, il serait possible de constituer des provisions pour les tâches futures, ce qui signifiait que des plans financiers pourraient être établis de façon plus transparente pour les dépenses à venir et, autre avantage et non des moindres, un logiciel standard pourrait être utilisé; le logiciel sur-mesure actuel n'était pas adapté aux besoins de l'OIML.

    Un certain nombre de problèmes relatifs à la gestion du Bureau, devaient aussi être clarifiés afin de rendre le système plus acceptable vis-à-vis des Membres. Il était difficile de comprendre certains problèmes de budget; le nouveau système apporterait plus de clarté. Par exemple, le Règlement Financier stipulait actuellement que l'expert comptable soit choisi par le Directeur. Cela n'était pas normal – il convenait bien sûr que celui-ci soit désigné par le Comité ou par le Président mais pas par le Directeur. M. Magaña avait rédigé un premier projet de révision du Règlement Financier, qu'il avait envoyé aux Membres du Conseil de la Présidence. Le Conseil n'avait pas encore eu le temps d'en discuter, ce qui serait probablement fait en février, mais certains Membres du Conseil de la Présidence avaient déjà dit à M. Magaña qu'ils le trouvaient bien meilleur que le Règlement Financier actuel. L'objectif était de finaliser le Règlement Financier et de l'envoyer aux Membres en 2004 de façon à laisser suffisamment de temps pour son examen avant de procéder au vote lors du CIML ou de la Conférence en 2004. En principe, selon la Convention, ce vote concernait le CIML, mais il était possible de décider de le présenter à la Conférence.

    M. Faber a remercié M. Magaña et a invité les délégués à faire part de leurs questions et observations.

    M. Vaucher a suggéré que le nouveau logiciel de comptabilité pourrait être assez coûteux. Cela était-il prévu dans le budget discuté précédemment?

    M. Magaña a répondu qu'un logiciel tout à fait standard serait mis en place et que son acquisition ne constituerait qu'un modeste investissement. Il serait nécessaire de faire suivre une formation à l'administrateur du BIML mais les frais engagés pour celle-ci seraient aussi modérés. L'ancien Directeur avait fait élaborer par un développement un logiciel spécial pour l'OIML et cela avait coûte beaucoup plus cher. Les modifications du logiciel pour opérer le passage du Franc à l'Euro avaient également coûte assez cher. En définitive, il n'était pas nécessaire de faire une mention spéciale dans le budget à ce sujet.

    M. Faber a considéré que les progrès sur ce point avaient été bien plus rapides que prévu, et que les conclusions sur le budget avaient été tirées très rapidement.

- number: '7'
  title: Situation au BIML
  narrative: "\n"
- number: '7.1'
  title: Projet de Révision des Statuts du Personnel
  narrative: |2+

    M. Faber a expliqué que les Statuts du Personnel du BIML étaient quelque peu dépassés et avaient grand besoin d'être révisés et cela faisait assez longtemps que ce travail avait commencé. Il avait eu des discussions avec le Directeur et bien sûr avec son personnel. Les Membres avaient le résultat devant eux et il demandait à M. Magaña de clarifier davantage le document.

    M. Magaña a rappelé aux Membres qu'ils avaient dû recevoir le projet de révision des Statuts du Personnel fin juin ou début juillet. Comme cela était expliqué dans le document d'accompagnement, cette révision était nécessaire dans un but d'actualisation et de clarification d'un certain nombre de problèmes - par exemple pour rendre les grilles de salaires plus logiques. Les Statuts du Personnel devaient être adoptés par le Comité. M. Magaña n'avait pas l'intention d'examiner le document en détail, mais inviterait les délégués à faire part de leurs commentaires et à déclarer ensuite leurs intentions de vote.

    M. Klenovský félicitait le BIML pour ce travail de révision et exprimait son soutien général sur les facteurs de motivation dans le travail du BIML. Il se disait cependant un peu préoccupé concernant l'impact financier que le système de bonus pourrait avoir sur les finances du BIML, si l'on tenait compte des discussions de la veille sur le budget déjà tendu.

    M. Magaña convenait que quelques explications de cet aspect étaient nécessaires. Les échelles de salaire des nouveaux Statuts du Personnel étaient sensiblement similaires à celles actuelles. Il n'y avait pas d'augmentation importante, bien que dans certains cas, il était possible d'atteindre un échelon plus élevé dans une échelle qu'actuellement. En général, toutefois, ces salaires étaient très raisonnables comparés aux autres organismes ou autres organisations internationales. Il souhaitait ajouter que, concernant l'impact financier, chaque membre du personnel serait en fait placé au même niveau où il se trouvait actuellement dans l'échelle de salaire. Il n'y aurait par conséquent pas d'augmentation des coûts salariaux au moment de procéder au passage aux nouvelles grilles de salaires. Il y aurait ainsi continuité, chaque personne restant à son salaire actuel.

    M. Faber a ajouté que les implications financières étaient complètement intégrées au budget qui avait été discuté la veille.

- number: '7.2'
  title: Personnel du BIML
  narrative: |2+

    M. Faber a dit aux Membres que, étant en contact étroit avec le Bureau, il pouvait affirmer que la situation générale quant au personnel du BIML était très bonne. Il avait pu constater chaque année que l'efficacité du Bureau s'améliorait. Cela tenait en partie à la qualité de la direction,

    aux effets de la mise en place de nouveaux systèmes de gestion financière (examinés en ce moment), ainsi qu'au fait que le Directeur avait mis en place une gestion des ressources humaines plus moderne incluant un système d'évaluation annuelle du personnel. Il mentionnait de plus que l'équipe actuelle travaillait extrêmement bien à l'unisson et de façon professionnelle vers un but commun, et que la qualité du personnel lui-même était excellente. Le Directeur lui-même était évalué par le Président chaque année, de sorte qu'une attention constante était portée à la qualité et aux performances du Bureau et de son personnel. Son jugement sur le résultat était positif. Il était reconnu que le Directeur travaillait sans ménager sa peine pour apporter d'autres améliorations sur les questions de gestion financière et de formation du personnel. M. Faber pensait que le BIML était sur la bonne voie et demandait à M. Magaña s'il désirait fournir d'autres informations.

    M. Magaña a expliqué que chaque membre du personnel serait à partir de maintenant soumis à une évaluation annuelle donnant lieu à la définition d'objectifs pour l'année suivante. En fait, ils n'avaient pas attendu les nouveaux Statuts du Personnel pour mettre en place ces évaluations, car ce système d'évaluation et de fixation d'objectifs était déjà en vigueur cette année. Il considérait que le fait d'avoir des objectifs clairs constituait un bon moyen de motiver les personnes, et le personnel du Bureau y était en général favorable.

    M. Faber a demandé s'il y avait des commentaires. Il a ensuite dit qu'étant donné que le renouvellement du contrat de Ian Dunmill devait être discuté, le personnel du Bureau, à l'exception du Directeur, devait quitter la salle (l'enregistrement sur bande était suspendu pour ce point).

    Le Président a ensuite informé M. Dunmill que le Comité avait unanimement approuvé le renouvellement de son contrat pour une nouvelle période de cinq ans.

- number: '7.3'
  title: Activités du BIML
  narrative: |2+

    Le Président a demandé à M. Magaña de commenter le point sur les activités du BIML.

    M. Magaña a indiqué que la pratique habituelle était de distribuer une liste des réunions et autres activités qui avaient lieu dans l'année, mais à son avis, ce document n'illustrait pas réellement la finalité des activités du Bureau et il avait donc essayé de faire une présentation légèrement différente de ces activités. Les objectifs du Bureau consistaient à:

    - Soutenir les Etats Membres et les Régions dans le développement de la métrologie légale;

    - Diffuser les informations parmi les Membres;

    - Soutenir les Comités Techniques de l'OIML;

    - Mieux sensibiliser de façon générale à la métrologie légale; et

    - Aider au développement de la confiance mutuelle entre les Membres.

    Concernant le soutien aux Régions, le Bureau avait participé aux réunions de APLMF, COOMET, SADCMEL, et WELMEC au cours desquelles ils avaient pris note des besoins des Régions et également fourni certaines informations. Ils avaient participé à d'autres séminaires et ateliers organisés par les Membres ou par les Régions. Un certain nombre d'entre eux étaient mentionnés:

    EASC;

    - Un séminaire FASIT sur les logiciels à Llubljana;

    INICO;

    Le séminaire "Milestones in Metrology" a Maastricht;

    - Un séminaire à Moscou sur la MID et les Directives européennes;

    - Le Congrès NCSL;

    - Le Congrès de Métrologie, congrès international de métrologie;

    - Un séminaire en Afrique du Sud sur la Métrologie des Echanges; et

    - Le séminaire APLMF sur la traçabilité.

    Comme on pouvait le constater, ils essayaient d'apporter leur contribution dans tous ces séminaires afin de mieux sensibiliser l'opinion au développement de la métrologie légale et pour discuter des nouveaux problèmes. M. Magaña estimait cela crucial. Ils avaient aussi participé et organisé des séminaires et des réunions sur les pays en développement. Un séminaire avait eu lieu au NWML (Royaume-Uni); ils avaient participé à un séminaire du PTB organisé pour les pays du Maghreb, et au Comité Mixte pour l'Aide aux Pays en Développement qui avait tenu plusieurs réunions à cette occasion. Des rapports seraient communiqués sur ces réunions. Il y avait eu aussi la réunion ISO-DEVCO, et des membres du personnel du BIML avaient été présents à un certain nombre d'autres séminaires et réunions concernant les pays en développement.

    Un soutien avait aussi été donné, bien sûr, aux Etats Membres et aux Régions par le biais des publications produites par le Bureau. Il y avait un certain nombre de nouvelles publications: cinq Recommandations ainsi que la publication P 1 révisée; les Rapports du séminaire "Que sera la métrologie légale en 2020" de l'année dernière avaient aussi été publiés; de même, bien sûr, que le compte rendu de la Réunion du CIML, qui s'est avéré être une tâche plutôt ardue dans la mesure où il était important que ces réunions soient fidèlement rapportées. La distribution et la vente des publications avait aussi donné de bons résultats: en 2003, 281 commandes portant sur 528 publications avaient été traitées (30,5 k en facturation) non comprises celles distribuées aux Etats Membres et aux Membres Correspondants.

    Concernant l'échange des informations, un travail important était en cours. De nouvelles bases de données en ligne avaient été mises en place sur le site Web; les listes de Membres étaient maintenant directement mises à jour par les Membres eux-mêmes. La liste des publications avait aussi été compilée dans une base de données: pour l'instant, il ne s'agissait encore que de simples pages sous forme de liste, mais bientôt, des fonctionnalités de recherche selon différents critères seraient disponibles. Les Certificats OIML étaient aussi intégrés dans une base de données en ligne et il serait bientôt possible d'y effectuer des recherches par fabricant, par catégorie d'instrument ou par autorité de délivrance. Le travail avait commencé en vue de l'établissement d'une base de données en ligne et de forums pour les TC/SC, afin de faciliter les échanges d'informations. Le site était mis à jour au moins une fois par semaine et s'était étoffé en taille et en contenu; en fait, son volume avait doublé en l'espace d'un an et demi; il contenait maintenant 230 mégabits d'informations contre 100 dix-huit mois plus tôt. Il y avait eu un très grand nombre de visites sur le site, avec largement plus d'un million de connexions; les Membres ont pu consulter les statistiques suite à la projection sur écran d'une présentation électronique.

    Le Bulletin avait toujours un rôle important pour la diffusion des informations. Nombre d'articles avaient été publiés: dix issus du Séminaire "Que sera la métrologie légale en 2020" et sept articles techniques. M. Magaña tenait d'ailleurs à informer les Membres que le Bureau était intéressé à recevoir plus d'articles – ils se faisaient un peu rares actuellement. Le tirage du Bulletin était d'environ 1300 exemplaires et tous les articles du Bulletin étaient également téléchargeables gratuitement depuis le site web.

    Le Bureau avait aussi un rôle de soutien envers les Comités Techniques et de supervision de la progression de leur travail. Trois réunions de Comités Techniques et sept réunions de Sous-comités avaient eu lieu l'année passée et le Bureau suivait en continu le travail de tous les Comités que ce soit par correspondance ou en assistant aux réunions. Il y avait eu dix-neuf nouveaux projets de Comité, neuf projets de Recommandations et deux projets de Documents. Bien qu'il ne s'agissait pas de faire maintenant un rapport sur les activités techniques, on pouvait rappeler qu'une des tâches du Bureau consistait à examiner soigneusement chacun des projets et tout particulièrement les projets de Recommandations et de Documents, car il fallait les éditer et les traduire en français si, comme c'était le cas le plus souvent, le texte original était en anglais; et cela représentait une lourde charge de travail pour le personnel du Bureau. Il fallait aussi toujours vérifier que les projets de Comité étaient cohérents avec les publications précédentes (et avec les autres); ce qui représentait également une quantité non négligeable de travail pour le Bureau.

    Concernant l'effort de sensibilisation à la métrologie, un certain nombre de réunions avaient aussi eu lieu avec des contacts de l'OIML, y compris en assistant aux réunions de ISO-CASCO, ISO-DEVCO, et de ILAC; ils avaient assisté à toutes les réunions du Comité TBT de l'OMC, sauf une qui se tenait cette semaine, ainsi qu'à celles du Comité Mixte pour la coordination de l'aide aux pays en développement dans le domaine de la métrologie, de l'accréditation et de la normalisation (JCDCMAS). Il y avait eu de nombreuses réunions avec le BIPM à différentes occasions, et le Président avait également assisté à la Conférence Générale des Poids et Mesures. M. Magaña avait assisté à une réunion appelée le "Séminaire REGMET", tenue au BIPM, où un groupe d'ex-

    perts européens avaient fait un rapport sur le travail effectué en Europe en vue de mieux sensibiliser les organismes de contrôle aux questions de métrologie pour s'assurer qu'ils prennent ce sujet en compte au moment d'étabir leurs réglementations.

    Toujours au sujet de la sensibilisation au domaine de la métrologie, l'OMC avait organisé deux séminaires régionaux avec la participation de l'OIML et de la CEI. Tenus à Lima, Pérou et à Maputo, Mozambique, ces séminaires avaient porté sur les façons de favoriser la participation des pays en développement aux travaux de l'OIML et de la CEI. Ces séminaires n'étaient pas destinés aux métrologistes mais aux décideurs.

    Le Bureau avait aussi publié un rapport produit par John Birch, que les délégués avaient déjà reçu et qui ferait l'objet d'une présentation plus tard en cours de réunion.

    En vue de l'établissement de la confiance mutuelle, le Bureau participait aussi aux travaux relatifs au Système de Certificats; le rôle du Bureau se limitait à enregistrer les Certificats et à les examiner, non pas au niveau de la validité des instruments mais pour vérifier que les Certificats ne comportaient pas d'erreurs d'ordre administratif – il y en avait parfois. Ils avaient aussi révisé le document P 1, qui était assez important pour le Système de Certificats. Le BIML avait aussi contribué dans une large mesure à la préparation du MAA, et en avait discuté lors de réunions bilatérales avec le Secrétariat du TC 3/SC 5. M. Magaña conclut en disant qu'il avait préféré donné les grandes lignes des activités annuelles menées par le Bureau plutôt que des statistiques des heures passées sur chaque projet.

    M. Faber a remercié M. Magaña et a invité les délégués à faire part de leurs questions et commentaires.

    Dr. Tanaka a demandé combien de gouvernements avaient assisté aux séminaires de sensibilisation à la métrologie en Amérique du Sud et en Afrique et quel impact ils avaient eu.

    M. Magaña a répondu qu'il avait assisté au séminaire au Pérou avec M. Jonathan Buck de la CEI et que des présentations avaient été faites par Cesar Luiz L.M. da Silva (INMETRO, Brésil). Environ 25 personnes de quelques douze pays y participaient, à raison de deux personnes par pays en moyenne, liées généralement pour l'une au Ministère du Commerce et pour l'autre au point de contact pour les questions des Barrières Techniques au Commerce (TBT) et issue très souvent de l'organisation de normalisation. Les métrologistes avaient évidemment été invités, mais le séminaire s'adressait principalement aux personnes chargées des affaires commerciales dans leur pays.

    M. Dunmill a ajouté qu'il avait assisté au séminaire au Mozambique, à nouveau avec M. Buck de la CEI, et que la composition avait probablement été à peu près la même, mais avec un nombre plus élevé de participants - environ 40-50 personnes.

    Dr. Tanaka a demandé s'il existait des programmes pour élargir ces excellentes initiatives à d'autres domaines.

    M. Magaña pensait que de tels séminaires pouvaient aussi être organisés dans d'autres régions. L'OMC avait couvert les frais de voyage et de logement pour les personnes assistant au séminaire, et l'OIML et la CEI avaient juste fait appel aux conférenciers. L'OMC souhaitait tenir d'autres séminaires de ce type, par exemple dans la région des Caraïbes, et il serait possible d'en organiser dans d'autres régions si le besoin s'en faisait sentir. Cela pourrait bien sûr être discuté avec Mme Liu, la Secrétaire du Comité TBT de l'OMC.

    Dr. Kildal a demandé s'il existait une diapositive indiquant la répartition par pays des Certificats OIML; M. Faber a répondu que cela serait traité au point 11.

    Le Président s'est dit convaincu qu'étant donné le grand nombre de sujets que couvraient les activités du Bureau, tout le personnel était largement occupé; et il pouvait assurer aux délégués que l'ensemble du personnel du Bureau était entièrement dévoué à sa tâche. Se rendant fréquemment au BIML, il avait pu réaliser tout ce qui était mis en oeuvre dans le cadre des nobreuses activités de l'OIML.

- number: '7.4'
  title: Progrès dans l'utilisation d'Internet et du courrier électronique
  narrative: |2+

    M. Magaña n'avait pas préparé de diapositives à ce sujet car l'assemblée connaissait déjà très bien le site Web de l'OIML. Ils avaient sans doute constaté les fonctionnalités de mise à jour en ligne des adresses et contacts des Etats Membres. Bientôt seraient mises en place d'autres fonc-

    tionnalités de recherche pour la base de données sur les Certificats OIML, pour les informations sur les TC/SC et leurs projets rassemblés dans une base de données, le tout avec une interface conviviale. Ces modules étaient tous en cours d'élaboration et il était prévu de mettre en place des forums pour différentes questions: par exemple, les TC/SC de l'OIML entreraient les projets, et les membres des TC/SC concernés seraient en mesure de soumettre directement leurs commentaires en ligne. Ce procédé servirait à faciliter le travail technique et la diffusion des informations aux Etats Membres, qui pourraient ainsi poser leurs questions aux communautés d'autres pays et recevoir les réponses en temps réel. Ce travail avançait à bon rythme et serait bientôt achevé.

    Mme Bennett a félicité le Bureau pour cette évolution visant à favoriser les communications électroniques et pour le fait d'avoir épargné aux délégués de transporter plusieurs kilos de documents à la réunion.

    M. Faber approuvait la remarque de Mme Bennett, ajoutant que bien que n'étant pas un spécialiste d'Internet, il considérait le site OIML comme l'un des meilleurs et des plus professionnels qu'il avait connus. Ceux qui y avaient travaillé au sein du Bureau méritaient des compliments.

    M. Pulham fit remarquer que pour les nouvelles bases de données mises en oeuvre pour le Système de Certificats OIML et pour les Autorités de délivrance, il y avait eu un léger contretemps par rapport à la date prévue indiquée à la Réunion du CIML précédente, lors de la démonstration en direct aux délégués des nouvelles bases de données. Cela était dû au fait que toutes les bases de données avaient été entièrement reconstituées par l'ingénieur système du Bureau de façon qu'elles puissent être adaptées exactement aux besoins spécifiques de l'OIML en utilisant une interface dynamique. Des progrès seraient visibles au travers des divers modules dans les semaines à venir.

    Faisant allusion à la documentation basée résolument sur le support électronique, M. Pulham évoquait l'existence d'une certaine appréhension à la perspective de ne pas apporter de documents papier à Kyoto, mais il constatait pour la première fois, qu'un certain nombre de personnes travaillaient en réunion avec des ordinateurs portables, ce qui était plutôt encourageant. Il remerciait Mme Bennett pour ses remarques enthousiastes.

    Concernant la diffusion des documents depuis le Bureau, M. Pulham demandait de le contacter personnellement si quelqu'un désirait maintenant apporter des modifications à la liste des adresses d'expédition, changer une adresse courriel, ajouter ou supprimer un destinataire.

    L'objectif actuel était d'expédier le courrier à tous les Etats Membres et Membres Correspondants à peu près une à trois fois par semaine. Dans la mesure du possible, la quantité était limitée et les mises à jour du site Web étaient regroupées de façon à ne pas submerger les boîtes courriel. La page "Événements" du site Web reflétait l'actualité des événements à venir. Il se tenait prêt à prendre note de toutes informations relatives à des événements au niveau national ou international que les Membres pourraient mettre en place ou accueillir, afin de les inclure dans la page en question. De même, pour les TC/SC de l'OIML, il convenait de lui signaler toutes les réunions techniques et en particulier les changements de dates pour les reporter dans la page "Réunions" du site.

    À propos de communication, la Brochure Bleue serait aussi révisée et actualisée afin de prendre en compte les changements se produisant dans le domaine de la métrologie légale; ce projet avait été légèrement différé en raison de la charge de travail actuel. Les commentaires ou suggestions sur son contenu, que souhaiteraient faire les Membres avant que ne commence le travail de production, seraient toujours bienvenus.

    Le dernier projet, qui serait essentiel, était celui des forums pour les TC/SC. Les demandes et suggestions spécifiques à ce propos seraient également bienvenues.

- number: '8'
  title: Application et révision du Plan d'Action de l'OIML
  narrative: |2+

    Le Président a rappelé aux délégués que le travail avait commencé en 1999 sur ce Plan d'Action, basé en grande partie sur l'Etude Birkeland, sur les résultats du Séminaire de Braunschweig, et sur d'autres idées; il était normal de procéder de temps en temps à sa réactualisation, au moins annuellement. Il a invité le Directeur à fournir quelques informations sur la situation actuelle.

    M. Magaña reconnu ne pas avoir respecté les dates limites requises pour que le Plan d'Action soit approuvé lors de cette Réunion. Il avait fait un projet de révision, prenant en compte parmi d'autres points les propositions du Groupe de Travail pour les pays en développement et l'avait envoyé en premier lieu aux Membres du Conseil de la Présidence. Il n'avait donc pas été possible de le diffuser auprès des Membres avant juin, ce qui aurait été nécessaire afin qu'ils puissent le réexaminer à temps pour cette réunion. Tout ce qu'il pouvait dire pour le moment était qu'il proposait de le distribuer dans les prochaines semaines afin de le soumettre au vote par correspondance en vue de son adoption. Cela devrait être fait aussitôt que possible, peut-être avant la fin de cette année, car il était prévu qu'un certain nombre de nouvelles actions commencent dès 2004. Les actions pourraient bien sûr commencer avant même que le Plan ne soit approuvé, mais il préférerait obtenir l'approbation avant fin décembre, ou fin janvier au plus tard.

    Dr. Tanaka n'était pas sûr que ses remarques ne soient pas hors de propos ici, mais a rapporté que lors d'une discussion tenue la semaine précédente au sujet de la traçabilité en métrologie légale, il avait été dit qu'il existait certaines tables OIML qui n'était pas raccordables au SI. C'était le cas, par exemple, des tables alcoométriques, où la question de traçabilité n'était absolument pas abordée, et qui consistaient juste en des tables indépendantes, alors que des équations analytiques seraient préférables. Il n'était pas sûr qu'une nouvelle expérimentation fût nécessaire pour établir les données. Cette évolution vers l'établissement de la traçabilité des données sur des questions aussi importantes devrait être incluse dans le Plan d'Action, ou quelque point déjà présent dans le Plan d'Action pourrait sans doute être interprété de façon à intégrer ce type de proposition, à moins que des Membres ne proposent encore une autre alternative.

    M. Faber convenait que cette question était importante et invitait les délégués à proposer des alternatives.

    M. Magaña convenait avec Dr. Tanaka que les Recommandations sur les tables alcoométriques internationales étaient plutôt obsolètes. Le Bureau se demandait parfois s'il fallait les réimprimer, au regard de leur âge et du fait qu'elles n'était pas disponibles en version électronique. Il se demandait si le TC concerné (TC 9/SC 4) serait en mesure de retrouver les données à partir desquelles les calculs de ces tables avaient été basés, et de les utiliser afin de calculer et évaluer les incertitudes résultantes. Il n'était pas sur qu'elles puissent être retrouvées. Une autre possibilité consisterait à essayer, avec des collègues du BIPM, de commencer un travail commun afin d'établir de nouvelles tables alcoométriques dans les laboratoires de métrologie. Cela dépassait le cadre d'une révision de document et devenait un projet de travail technique mené conjointement avec les laboratoires. Il s'agissait là d'un nouveau type de fonctionnement technique qui serait très intéressant car il fournirait un bon exemple de coopération technique entre les communautés de métrologie légale et de métrologie scientifique. Il examinerait la question, bien qu'il ne fût pas encore certain de la meilleure façon de s'y prendre.

    M. Faber suggérait que cette question méritait d'y consacrer quelque temps et qu'une proposition ultérieure soit faite en vue d'une discussion, peut-être lors du Conseil de la Présidence d'ici deux ou trois mois, afin d'élaborer une proposition avant le Comité l'année prochaine. La réunion annuelle avec le BIPM et ILAC début mars 2004 constituerait un autre forum de qualité pour soulever le problème et chercher à mener une action commune à ce propos.

- number: '9'
  title: Activités techniques
  narrative: |2+

    M. Faber a rappelé aux Membres que l'un des Vice-Présidents de l'OIML, Dr. Issaev, portait un intérêt particulier aux activités techniques de l'OIML. Il était invité avec M. Szilvássy à la table de la présidence.

    Dr. Issaev désirait aborder brièvement quelques points importants d'informations. Dix réunions avaient eu lieu depuis St. Jean de Luz: trois réunions de TC et sept de SC; ce qui était encouragant comparé au total de seulement trois réunions l'année précédente et semblait dessiner une tendance prometteuse. Une des difficultés était toutefois qu'en dépit des promesses d'un niveau d'activité en hausse pour l'année en question émanant de divers TC et SC, aucun progrès visible n'a été signalé au Bureau en l'occurrence pour quelques 30 projets.

    Un autre point important et même sensiblement alarmant concernait la procédure de vote: certains pays ne prenaient pas part au vote, et cela provoquait des difficultés. Le Bureau disposait de statistiques à ce sujet, et M. Szilvássy en ferait sans doute état dans son rapport. Pour quelques Recommandations pour l'instant, trois, cinq, voire huit votes manqueraient. En conséquence, le délai devrait être prolongé à moins de procéder à un vote lors de cette réunion. Il considérait que cela dénotait un manque de discipline de la part des Membres. Il serait peut-être nécessaire de prêter attention aux procédures de vote, car quelques pays n'y prenaient presque jamais part. C'était l'aspect négatif, mais dans l'ensemble, on comptait sur l'année plus de points positifs que de points négatifs dans le cadre des activités techniques. Il laissait la parole à M. Szilvássy pour le rapport détaillé.

- number: '9.1'
  title: Programme de travail des TC/SC
  narrative: "\n"
- number: 9.1.1
  title: Résumé général
  narrative: |2+

    M. Szilvássy a indiqué que son rapport complet était disponible sur le site Web de l'OIML. Il commençait son rapport par la situation actuelle de certains TC et SC.

    Parmi les signes positifs, il pouvait être mentionné que:

    - Lors de l'année écoulée, 10 réunions techniques avaient eu lieu, une évolution positive si on compare cette situation aux 3 réunions de l'année précédente. Avec un peu de chance, l'année suivante, un nombre élevé de Recommandations ou Documents, nouveaux ou révisés, seraient prêts pour approbation;

    - Signe du progrès dans l'avancement des travaux de cette année, 7 Recommandations révisées et 3 nouvelles Recommandations allaient être présentées à l'approbation du CIML;

    - OIML D 1 et D 11 étaient aussi à un stade bien avancé;

    - Un grand nombre de documents avaient été soumis au vote par correspondance et/ou à l'approbation du CIML; et

    - Quelques Secrétariats "en sommeil" avaient redémarré leurs activités en 2003.

    On pouvait donc constater sur les 12 mois passés une réelle augmentation en termes d'activité et de résultats.

    Cependant, parmi les aspects négatifs, il fallait préciser que :

    - Environ 1/3 des projets approuvés n'avaient pas été élaborés pendant la dernière période de 12 mois. Il y avait plusieurs raisons à cela - projets reportés, projets attendant la finalisation ou la révision en cours par l'ISO, la CEI et d'autres organisations internationales ou régionales de normalisation;

    - Les révisions qui arrivaient à échéance étaient reportées ou en retard sur le programme défini par les Directives Techniques; cela serait traité plus en détail par la suite; et

    - En dépit du fait qu'un bon nombre de TC et de SC avaient envisagé ou promis une augmentation des activités pour 2003 dans leurs Rapports annuels, seulement la moitié d'entre eux environ avaient été disponibles. Des améliorations étaient nécessaires sur ce point et seraient discutées au point 9.3.

- number: 9.1.2
  title: État d'avancement actuel des projets de haute priorité et des projets prioritaires
  narrative: |2+

    Comparée à celle de l'année précédente, on constatait un très net progrès de la situation concernant les Projets de haute priorité et ceux prioritaires. M. Szilvássy a montré sur écran des statistiques pour appuyer son propos.

- number: 9.1.3
  title: Nouveau projet de travail proposé par le TC 18
  narrative: |2+

    Le Secrétariat du TC 18 avait proposé un nouveau projet Instruments ophtalmiques - Tonomètres à empreinte et à applanation.

    Il avait été proposé que le CIML approuve le nouveau projet, car c'était un sujet d'importance pour la protection de la santé, et cette proposition de projet avait déjà été approuvée par 8 Membres-P (sur 9) du TC 18 (avec seulement un vote manquant). Le Secrétariat avait aussi reçu le soutien de 6 Membres du Comité Technique.

- number: '9.2'
  title: Examen de la situation de certains TC/SC
  narrative: "\n"
- number: 9.2.1
  title: Sous-comité(s) vacant(s)
  narrative: |2+

    Le Secrétariat du TC 8/SC 2 avait été vacant pendant trois ans, mais la situation n'était pas trop mauvaise car la Russie avait assumé la responsabilité pour l'élaboration du Format de Rapport d'Essai de OIML R 125 et le travail avait avancé; ainsi, avec un peu de chance, il pourrait être finalisé et approuvé d'ici l'année suivante. Il serait, par la suite, applicable dans le cadre du Système de Certificats OIML.

    Concernant le TC 10/SC 3 Baromètres, le Bureau a été informé que le Royaume-Uni abandonnerait le Secrétariat de ce Sous-comité. Dans le rapport annuel du Secrétariat, seraient mis en parallèle la proposition et le résultat des enquêtes pour la révision de la R 97.

- number: 9.2.2
  title: Proposition pour la création d'un nouvel organe technique de l'OIML (et proposition
    d'un nouveau projet)
  narrative: |2+

    M. Lagauterie avait proposé la création d'un nouveau SC (éventuellement au sein du TC 3) ou d'un nouveau TC sur les questions d'accréditation en métrologie légale.

    Cette proposition avait été brièvement discutée lors du conseil de la Présidence et plusieurs fois par les deux Co-Secrétariats du TC 3/SC 5 et avec M. Lagauterie. Sur la base de ces discussions, il avait été décidé qu'étant donné qu'un projet similaire, proposé par la France, était déjà dans le programme du TC 3/SC 5, il était seulement nécessaire d'examiner le contenu du futur document. Pour les trois autres nouveaux projets proposés, le BIML, le Secrétariat du TC 3 et M. Lagauterie prépareraient une proposition en vue de l'approbation par le CIML, pour que les deux projets existants soient élaborés par un petit groupe de travail composé de la France et du BIML.

- number: 9.2.3
  title: Situation actuelle concernant l'élaboration (et le vote par correspondance
    auprès du CIML) de certains projets
  narrative: |2+

    Depuis la Réunion du CIML l'année dernière, plusieurs Recommandations importantes avaient été envoyées pour approbation directe par correspondance, notamment la Partie 2 de la Recommandation sur les "Compteurs d'eau", avec la Partie 3: Format du Rapport d'Essai (R 49-2 et R 49-3). Actuellement, il n'y avait pas suffisamment de votes reçus pour que ces Recommandations puissent être approuvées.

    Pour les trois autres projets (DR du Format de Rapport d'Essai avec les révisions de R 61-2 et R 134, et le DR de l'Amendement à OIML R 99/ISO 3930), il avait fallu deux ans à l'ISO pour s'occuper de cet amendement pourtant mineur et réduit. Il a toutefois enfin été envoyé aux Membres du CIML en début d'année pour approbation par correspondance, avec des dates limites comprises entre juin et fin septembre.

    En tout cette année, environ 20 Projets avaient été envoyés pour vote ou approbation directe par correspondance. Après étude des résultats, il avait été constaté qu'environ 1/3 des Membres du CIML n'avaient au plus voté que deux fois: ce qui représentait une très faible participation. Malgré une lettre du BIML attirant l'attention sur la situation des votes par correspondance (incluant un rappel pour exprimer leur vote) envoyée à tous les Membres du CIML le 12 septembre 2003, et la réception de quelques autres votes, il n'y avait toujours pas suffisamment de votes exprimés pour procéder à l'approbation des documents en question.

    Afin que tous les Membres OIML restent informés de la situation de chaque vote, une nouvelle page d'information serait créée à partir de janvier dans l'espace réservé aux Membres sur le site Web de l'OIML indiquant la situation des votes en cours de tous les Membres du CIML; cela inclurait un tableau de résumé signalant pour quels pays le Bureau n'avait pas reçu de votes. Il peut arriver que des Membres oublient de voter, ou que pour quelque autre raison, leurs votes ne parviennent pas au BIML. Il était espéré qu'ainsi, la situation actuelle néfaste s'améliorerait.

    ## M. Faber a proposé de faire une pause en vue de solliciter les réactions de l'assemblée.

    M. Klenovský a demandé s'il y avait une stratégie de l'OIML sur la question des logiciels en métrologie légale. Un projet important était en cours en Europe mais il se rappelait que lorsqu'il avait travaillé sur l'une de ces Recommandations, il avait cité un projet européen et avait reçu des commentaires indiquant que cela n'était pas applicable aux autres régions. Il aimerait que sur cette question, la position de l'OIML soit clairement exposée.

    M. Faber a indiqué que cela était lié au sujet du point suivant de l'ordre du jour et serait traité à l'occasion de celui-ci, mais il préconisait de faire un exposé clair de la stratégie relative aux documents horizontaux.

    M. Szilvássy a répondu que ce type de document horizontal avait été considéré comme étant de haute priorité. Quelques progrès avaient déjà été réalisés. La prochaine réunion du Groupe de Travail, constitué du Co-secrétariat et de quelques experts, aurait lieu en décembre à Paris. À l'issue de cette réunion, le premier Projet de Comité (1 CD) de ce très important document pourrait voir le jour l'année suivante. Comme le Professeur Issaev l'avait fait remarquer, ce document était réellement nécessaire pour l'ensemble des TC, du fait même que la publication révisée P 1 Système de Certificats OIML comportait de nouvelles dispositions pour la certification des familles d'instruments de mesure, de modules d'instruments de mesure et de familles de modules. Pour tout cela, la vérification, le contrôle ou l'examen des logiciels était un sujet très important et urgent.

    Au sujet du Point 9.1.3, Pr. Kochsiek soulevait une question sur la proposition de projet par le TC 18. Il y avait seulement 9 Membres-P sur un total de 60 Etats Membres, et il se demandait s'il était raisonnable de créer un nouveau projet alors que moins de 20 % des Etats Membres étaient intéressés au travail effectif. Pr. Kochsiek estimait que cette question devrait être discutée, car sinon, ils se trouveraient dans la même situation que celle déjà évoquée, à savoir qu'ils ne parviendraient pas à obtenir une majorité à l'issue du vote par correspondance. Il se demandait comment pouvait être améliorée la participation des Etats Membres.

    ## M. Szilvassy envisageait deux possibilités:

    - L'une étant que le Secrétariat du TC 18 prépare une circulaire à l'intention de tous les Membres-P et Membres-O (environ 20-25). Le fait qu'il n'y ait que 9 Membres-P dans ce Comité Technique et de nombreux Membres-O constituit une situation étrange, car l'application de la métrologie légale dans le secteur médical était pour le contrôle de la santé un élément très important; et

    - L'autre étant de faire réexaminer la situation de ce TC par le Secrétariat du TC 18 avec le concours du BIML, afin d'obtenir une plus grande participation et donc plus de contributions aux documents en cours d'élaboration.

    Dr. Kildal a demandé s'il existait un travail en cours sur l'analyse de risque en ce qui concerne la métrologie légale; par exemple, selon quelle fréquence la vérification devait-elle être effectuée pour des instruments spécifiques? Il se demandait s'il existait des statistiques à partir desquelles cette analyse de risque pourrait être basée, ou si un travail était en cours dans ce domaine, éventuellement un document horizontal.

    M. Magaña a répondu que pour l'instant, à la connaissance du Bureau, il n'existait pas de travail en cours de façon directe ou indirecte pour ce type de projet. Conformément aux Directives pour les Travaux Techniques, tout Membre du CIML pouvait toutefois proposer un projet de travail selon la procédure prévue, et la proposition serait diffusée auprès des membres, en vue de la désignation d'un pays volontaire pour prendre la responsabilité de ce travail. Ce processus établirait aussi quel TC ou SC se chargerait du projet et finalement le CIML pourrait approuver le projet.

    Dr. Sommer signalait qu'un travail avait été démarré il y a deux ou trois ans sur l'incertitude en métrologie légale, y compris l'analyse de risque. Malheureusement, ce travail était plutôt tombé en désuétude au cours des dernières années, mais il pensait qu'il devrait être relancé. Dr. Ehrlich, qui était responsable du sous-groupe, pourrait peut-être dire quelques mots à ce propos.

    Dr. Issaev convenait que cette question était importante, rappelant aux Membres que Dr. Tanaka avait déjà évoqué la nécessité de faire mention de l'incertitude, par exemple pour les tables alcoométriques. Le travail devrait certainement être repris sur cette question, laquelle devrait être discutée au sein du Groupe de Travail traitant des incertitudes. L'ISO et la CEI intégraient systématiquement la notion d'incertitude.

    Dr. Ehrlich confirmait que le travail sur le document traitant des incertitudes avait été différé, en attendant que le Comité Mixte sur les Guides de Métrologie (JCGM WG1) achève un travail sur un document général concernant l'incorporation de l'incertitude dans les décisions d'évaluation de conformité. Ce travail venait juste d'être terminé et serait discuté à la réunion du Comité Mixte WG1 d'ici deux ou trois semaines. En même temps que le travail qui avait été mené dans le Séminaire sur la Traçabilité, et l'expérience acquise pendant ces quelques dernières années, il croyait qu'il était temps de reprendre ce travail qui serait rapidement relancé et pourrait intégrer les aspects de l'analyse de risque, ceux-ci y étant en effet discutés de façon détaillée.

    M. Birdseye fit remarquer que l'analyse de risque ne concernait pas seulement l'incertitude au sens traditionnel mais, comme le disait Dr. Kildal, pouvait être liée aux périodes de vérification et ainsi de suite. Il notait qu'un nouveau projet était proposé pour la révision du D 19 et du D 20 sur la vérification et l'approbation, ces deux sujets étant entrepris ensemble de façon à ce que d'éventuelles autres procédures générales puissent être prises en compte. Il suggérait que, la prise en compte de l'analyse de risque dans ce groupe valait vraiment la peine, particulièrement la question de savoir comment évaluer les échelons de vérification et ainsi de suite. Cela était vital pour le contrôle des instruments de mesure du service public tels que les compteurs d'électricité et de gaz, pour lesquels le parc d'instruments implanté était considérable. La question de la collecte des données quant au fonctionnement des instruments et à la façon dont les échelons de vérification seraient peut-être étendus, était déjà à l'étude. M. Birdseye suggérait que cette question soit traitée au sein de l'OIML, et peut-être du TC ou SC responsable pour le D 19 et le D 20.

    Dr. Issaev a indiqué que des sujets étroitement liés à celui-ci, avaient été discutés récemment lors d'un forum et que ces idées seraient prises en compte dans l'avenir.

    M. Lagauterie a demandé si Dr. Ehrlich pouvait préciser si un projet du Document sur les incertitudes serait bientôt distribué.

    Dr. Ehrlich n'était pas en mesure de donner une date exacte mais espérait reprendre le travail en décembre ou en janvier. Il tiendrait M. Lagauterie informé et serait heureux de compter avec sa participation, comme par le passé, mais dans l'immédiat, il ne pouvait en dire plus quant à savoir dans quel délai un projet serait prêt. Beaucoup d'enseignements avaient été tirés au cours des deux ou trois dernières années et il espérait parvenir à un projet solide d'ici un an, mais il ne pouvait pas arrêter une date définitive.

    Dr. Bennett a évoqué le travail du TC 12 sur les compteurs d'électricité. Celui-ci avait été accepté comme un domaine de haute priorité et des inquiétudes avaient été exprimées à propos du report de la dernière réunion programmée, et les retards évidents du programme de travail. Il y avait une prise de conscience du conflit d'intérêt entre fabricants et organismes de contrôle, ce qui a rendu ce travail difficile. Elle avait compris que des discussions sur ce point avaient lieu entre le Bureau et la CEI et demandait si M. Magaña pouvait donner plus de détails à ce propos, et sur la façon dont la situation pourrait être résolue.

    M. Magaña a indiqué que les discussions n'avaient pas commencé entre le Bureau et la CEI à ce propos mais, manifestement, il existait une approche différente dans le cas des compteurs d'électricité, entre la communauté de métrologie légale et les spécialistes de l'équipement électrique. Il ne s'agissait pas d'un conflit, mais simplement d'une différence d'approche, et une approche commune serait certainement trouvée. En métrologie légale, la question était abordée du point de vue de la performance constatée par l'utilisateur, et les fabricants se focalisaient sur la manière de maximiser la performance des composants pour la fabrication des compteurs. Cela n'était pas facile, et une révision en profondeur des deux normes CEI concernées était nécessaire. Même les deux normes existantes n'était pas compatibles entre elles. Mais par contre, il ne servirait à rien d'avoir une Recommandation OIML qui ne serait pas compatible avec les normes CEI.

    M. Johansen désirait faire quelques commentaires concernant la transparence du travail technique en cours au sein des TC et SC. Le problème du manque d'engagement de quelques Etats Membres a été évoqué lors de la présente réunion. Il se demandait si cela pouvait provenir de difficultés au niveau du suivi du travail, provoquées par le fait que les groupes ou sous-groupes de travail étaient beaucoup utilisés. Il se pourrait que même les Membres des TC ou SC ne soient plus en mesure de suivre les subtilités de ce qui se passait réellement. Il ne dénonçait pas l'utilisation de ces groupes, mais estimait qu'il appartenait aux TC/SC de maintenir informés les autres Membres du CIML du processus tout entier. Par moments, il arrivait qu'un projet plus ou moins complet apparaisse sans que les Membres aient pu réaliser les étapes du processus. Il préconisait une communication plus transparente, en particulier concernant l'utilisation de groupes de travail.

    ## M. Szilvássy faisait remarquer que:

    Concernant le TC 12 sur la Révision de R 46 Compteurs d'électricité, l'Allemagne était chargée du Secrétariat et la Suède avait spontanément fourni un co-Secrétariat pour le grand Groupe de Travail du TC. Il y avait plusieurs Membres du Groupe de Travail qui répartissaient les tâches entre eux car il n'était pas facile de réunir tout le travail en un seul document. La Suède avait ainsi créé un site Web pour le TC 12 et chaque Membre du CIML pouvait y accéder pour suivre le déroulement du travail. Il y avait plusieurs raisons au retard de la réunion, dont le fait que le travail de quelques sous-groupes n'avait pas été prêt à temps. Les résultats seraient sûrement plus conséquents d'ici la réunion reprogrammée en février que ce qui était initialement prévu en octobre; et

    - Pour ce qui est de la transparence, le Bureau y travaillait en préparant un forum sur le site Web de l'OIML à l'intention de chaque TC/SC, de façon que l'avancement de leur travail puisse être suivi plus facilement. Il faudrait bien sûr procéder étape par étape et tous ces forums ne pouvaient pas être prêts immédiatement. Parfois, le BIML ne recevait pas les projets, si ce n'était l'information elle-même! Il rappelait aux TC/SC que chaque création et tout nouveau projet devaient être notifiés au Bureau, et que les Membres de l'OIML devaient en être avisés par l'intermédiaire des rapports annuels, ce qui pour l'instant faisait souvent défaut.

    Pr. Kochsiek se prononçait en faveur d'un complément d'information, par exemple un programme de travail défini, etc., sur le nouvel Organe Technique de l'OIML qui devait être créé comme indiqué au point 9.2.2, et à propos duquel, d'après les informations fournies, le BIML adresserait un rapport au CIML. Si le MAA était, avec un peu de chance, approuvé, le travail du Comité Technique en question serait très important, et il n'était ainsi pas souhaitable d'attendre une, deux ou trois années pour le premier résultat.

    M. Szilvássy a montré sur écran la proposition commune, initiée par la France, suite à la discussion avec le Secrétariat du TC 3 et le BIML. Il s'agissait d'une voie de compromis pour poursuivre le développement des thèmes proposés. La France avait inclus cinq thèmes différents dans leur proposition initiale pour l'élaboration des documents OIML, comme les documents d'application des normes ISO/CEI existantes ou les Guides ISO/CEI. Les projets de travail actuels du TC 3/SC 5 contenaient deux projets, le p4 et le p5, qui étaient des documents d'interprétation pour l'application de la norme ISO/CEI 17025 qui servait de base aux laboratoires d'accréditation; et le prochain était l'application du Guide 65 ISO/CEI pour les organismes de certification. Comme pour les autres sujets proposés par la France, il était prévu qu'une proposition commune pour chaque projet soit élaborée par le Groupe de Travail proposé et soumise pour approbation au CIML. Mais maintenant, de par l'application du MAA, ces documents seraient nécessaires car derrière le MAA, il fallait disposer de laboratoires accrédités par des organismes d'accréditation nationaux et régionaux. Il y avait une seconde possibilité qui consistait à effectuer l'évaluation des laboratoires par des pairs. Dans les deux cas, il fallait pouvoir recourir à un document intégrant les aspects de métrologie légale nécessaires à l'accréditation. La première étape serait de pouvoir compter dans l'équipe d'accréditation au moins un expert dans le domaine de la métrologie légale. Si une certaine catégorie d'instruments était concernée, il y aurait besoin d'un expert en accréditation avec une compétence dans ce domaine. Ces documents, initialement des documents de travail préparés deux ou trois ans auparavant, étaient ainsi maintainant devenus nécessaires. La France avait préparé ses propres documents nationaux et ceux-ci avaient constitué une bonne base pour l'élaboration relativement rapide des deux documents de travail en question et la préparation des propositions pour les trois autres.

- number: '9.3'
  title: Accélération des activités techniques
  narrative: |2+

    La nécessité d'accélérer les projets, a précisé M. Szilvássy aux Membres, remontait à plusieurs années déjà. L'année dernière, une initiative du Président pour tenter de trouver des méthodes visant à accélérer les activités techniques de l'OIML avait été lancée. Des problèmes existaient concernant les projets approuvés et ceux en cours, ainsi qu'avec les derniers examens et les nouvelles révisions des Recommandations et Documents OIML. Il y avait eu deux brèves réunions au BIML l'année dernière et un projet de document avait été préparé. Un document succinct avait été distribué l'année dernière pendant la 37ème réunion du CIML et le Bureau tentait maintenant de mettre à jour ce document. Certains signes d'activité en hausse avaient été observés dans l'année en cours. Un plus grand nombre de Documents et de Recommandations avaient été présentés pour approbation.

    Le BIML avait tenté de trouver une approche étape par étape et de faire des propositions sur ce qui devait être fait par le Bureau, les Membres de la Présidence et le personnel du BIML pour accroître l'activité. Tous ceux impliqués dans les activités techniques, ceux qui ne l'étaient pas encore mais susceptibles de l'être dans l'avenir, disposant peut-être des ressources et des experts requis dans le domaine, étaient invités à participer à la recherche de moyens permettant de résoudre ce problème.

    Un autre sujet d'inquiétude venait du fait que les USA et la Russie détenaient presque la moitié de tous les secrétariats des TC/SC, et on constatait que leur travail total ajouté à celui réalisé par le Royaume-Uni et l'Allemagne, comptait pour 70 % de l'activité globale. Quatorze pays seulement sur

    un total de 60 avaient en charge l'ensemble des TC/SC – un quart des Membres – ce qui constituait une répartition très inégale. Seulement la moitié environ du travail proposé était vraiment en cours. Pour résumer la situation, il y avait 122 Recommandations OIML et 27 Documents Internationaux. En ce qui concerne les travaux techniques, il était stipulé que tous les 5 ans au maximum, l'OIML devait réexaminer chacun et chacune des Documents et Recommandations. Ce qui signifiait qu'environ 28-30 réexamens devaient être faits chaque année. Seule une petite partie de ce travail était en cours. En supposant que tous les 10 ans, la moitié des réexamens reconduisent d'anciens Documents qui auraient ainsi leur vie "prolongée", et l'autre moitié déclenche le processus de révision, on pouvait estimer que, chaque année, 15 Recommandations et Documents révisés environ devraient être présentés au CIML pour approbation. Seule une petite partie de ce travail était effectivement réalisée – le travail était dans son ensemble en retard sur le programme.

    Les raisons de ce manque d'activité avaient été discutées plusieurs fois par le Conseil de la Présidence et s'expliquaient par:

    - la tendance à la déréglementation dans certains pays faisant qu'il y avait moins d'instruments de mesure soumis au contrôle;

    - le fait que de nombreux domaines étaient contrôlés par d'autres organismes dans les différents pays et se situaient en dehors du secteur des structures métrologiques existantes;

    - l'insuffisance d'autorité des Membres du CIML pour influencer les autres organismes ou autorités, ou simplement, par le fait que les autres organismes ne se portaient pas volontaires pour le travail; et

    - l'existence d'autres organismes concurrents et le manque de moyens et/ou de temps constituent aussi des facteurs aggravants.

    Une liste serait établie, pour tous les projets, sur les causes possibles de retard et leurs solutions. Une liste complète de propositions et de dates d'échéance serait ajoutée sur la Page des Membres du site Web de l'OIML et une page serait créée pour chaque projet afin que tous les Membres du CIML puissent se rendre compte de la situation réelle à tout moment. Le BIML procèderait très prochainement à la mise en place de ces facilités et fournirait dans ce but toute l'aide nécessaire aux Comités. Le Bureau propose traditionnellement ses services, lorsqu'un pays n'est pas en mesure d'organiser une réunion sur son propre territoire, pour que celle-ci se déroule de préférence à Paris et il continuera d'en être ainsi.

    Par la suite, des pages seraient aussi réservées aux cours de formation, aux vidéos didactiques, etc., mais tout cela prendrait du temps. Il faudrait également établir les critères permettant d'évaluer l'efficacité d'une activité. Ils souhaiteraient pour cela faire appel aux collaborateurs retraités de l'OIML si ceux-ci acceptaient d'y consacrer une partie de leur temps, en vue de bénéficier de leurs compétences, et la distinction honorifique de l'OIML pouvait peut-être constituer un encouragement à cet égard.

    Les Membres du Conseil de la Présidence et les cadres supérieurs du BIML profiteraient de leurs déplacements professionnels dans les autres pays pour encourager la dispersion de l'activité technique. Ils avaient pour mission de découvrir quelles ressources existaient et les problèmes latents, et d'encourager d'autres pays à engager leur responsabilité, sinon pour un projet en son entier, tout au moins pour un Groupe de Travail ou un projet sur. Cela avait été probant au niveau du TC 8/SC 1, où la Russie avait entrepris l'élaboration du Format de Rapport d'Essai pour la R 125.

    Le Conseil de la Présidence avait proposé un réexamen de tous leurs engagements afin d'identifier l'origine des problèmes, de savoir s'il convenait d'agrandir le Secrétariat au cas où un volontaire pouvait être trouvé, et s'il était nécessaire de recourir à des experts supplémentaires venus d'ailleurs pour prendre la responsabilité de Groupes de Travail. Il y avait donc plusieurs suggestions visant à motiver encore plus de pays aux travaux de l'OIML.

    Résumant ce qui avait été dit, M. Szilvássy a demandé à tous les Etats Membres de commencer sans plus attendre à identifier dans leurs pays le potentiel mobilisable pour ce travail et de faire part au Bureau de ce qu'ils pouvaient entreprendre. Il y avait déjà eu une proposition de l'Afrique du Sud pour contribuer à l'activité du TC 6 Produits préemballés, et les détails à ce propos pourraient être discutés ultérieurement. Il a repété que les hauts fonctionnaires de l'Organisation devraient à l'occasion de leurs voyages à l'étranger et des discussions avec les autorités des pays visités s'efforcer de promouvoir le développement des travaux. Il y avait eu une amélioration l'année dernière et il espérait que cela continuait afin que l'Organisation puisse rattraper le travail en retard. Dr. Issaev soutenait M. Szilvássy dans ses propos, et soulignait leur importance.

    Dr. Ehrlich ajoutait que les USA étaient ouverts à toutes les suggestions des Membres pour prendre la responsabilité de chaque TC ou SC; que la proposition de l'Afrique du Sud concernant le Secrétariat du TC 6 était une bonne nouvelle qui serait discutée ultérieurement; et qu'ils souhaitaient encourager ce type de démarche.

    M. Lagauterie a indiqué qu'il avait lu une note qui laissait entendre que les Membres de l'Union Européenne ne tenaient pas à participer aux travaux de l'OIML.

    M. Szilvássy est intervenu pour expliquer qu'on ne pouvait pas dire que les Membres Européens n'étaient pas intéressés. En réalité, il avait été dit que les Membres Européens étaient surchargés de travail par l'application de la Directive sur les Instruments de Mesure et qu'il leur était difficile de contribuer aussi de manière significative aux travaux de l'OIML.

    M. Faber conclu la discussion sur ce point en réitérant la demande faite aux Membres de vérifier les moyens dont ils peuvent disposer dans leur pays ou organisation, en vue de contribuer plus significativement aux travaux de base. Les travaux techniques restaient et devraient toujours rester une question clé pour l'Organisation. Ce travail incombait non pas au Présidium ou au Conseil ou encore au Bureau, mais aux Pays Membres. C'était le vrai problème de l'Organisation. Lorsque M. Faber était en voyage et expliquait la situation aux gens, les résultats étaient presque toujours positifs. Une fois qu'un pays avait indiqué sa volonté de prendre part aux travaux, il devait contacter le Bureau pour avoir la marche à suivre. Personne ne devait dédaigner les aides proposées et il appartenait au Bureau d'y veiller.

    M. Klenovský a indiqué que la République tchèque, en tant que Membre Européen et, à partir de l'année prochaine, Membre de l'Union Européenne, était très intéressée aux travaux de l'OIML. De son expérience comme président de Sous-Comité, il apprécierait beaucoup que les attributions des TC/SC soient plus clairement définies, car parfois il recevait des commentaires pour dire que toutes les exigences nationales dans un domaine donné devaient être prises en compte. Il était très difficile de terminer un travail sur cette base.

    Dr. Tanaka soutenait la déclaration de M. Faber et les délégués japonais étaient prêts à présenter une liste de tous les TC et SC auxquels ils pouvaient participer, que leur Secrétariat soit vacant ou non.

    M. Lagauterie espérait que la note mettant en cause les pays de l'UE serait supprimée. Il ne tenait pas à ce qu'elle circule. La France n'était pas concernée par cette note et contribuerait de son mieux aux travaux de l'OIML. Les Membres de l'UE en général ne méritaient pas une telle accusation, car ils avaient contribué de façon importante à l'élaboration de la MID, à tel point que la MID serait pratiquement compatible à 100 % avec les Recommandations OIML.

    M. Szilvássy a indiqué que la note pouvait être supprimée mais désirait attirer l'attention de l'assemblée sur le fait que plusieurs pays non seulement ne contribuaient pas aux travaux techniques, mais également ne votaient pas. Cinq ou six (ou peut-être plus) pays de l'UE relâchaient leurs efforts.

    Dr. Freistetter a rappelé à l'assemblée que d'ici le 1er mai 2004, sur les 16 pays figurant dans la liste des Etats Membres qui contribuaient aux travaux, 12 seraient dans l'UE. Il demandait aux autres pays de prendre leur part de responsabilités.

    Dr. Issaev a remercié M. Szilvassy pour son analyse d'une situation plutot délicate.

    La note a été dûment supprimée.

- number: '9.4'
  title: Résultats non concluants des votes par correspondance
  narrative: |2+

    Appelé à commenter ce point par le Président, M. Magaña a indiqué que, comme expliqué dans le Rapport des Activités Techniques, un certain nombre de votes d'approbation par correspondance avaient eu lieu en cours d'année. Un grand nombre d'entre eux n'avaient pas abouti. Pour l'approbation des Documents et des Recommandations, un minimum de 30 votes positifs était requis pour leur adoption (car une abstention ne comptait pas comme un vote), et il ne devait pas y avoir de votes négatifs. Pour les cinq publications en question, il n'y avait pas eu dans la

    plupart des cas suffisamment de votes reçus, et dans deux cas, deux votes négatifs avaient empêché l'approbation. La révision de la R 61-2 et le Format du Rapport d'Essai pour la R 134 ne pouvaient en aucun cas être adoptés par correspondance, et pour l'autre Recommandation, aucune décision ne pouvait être prise pour l'instant.

    Pour les cinq Projets de Recommandations mentionnés en 9.2.2, pour lesquels les votes reçus par le BIML au 31 octobre ne donnaient pas de résultats concluants permettant d'obtenir l'approbation du CIML, il était proposé que le CIML décide au cas par cas s'il convenait:

    de reporter la date limite de vote (par exemple au 15 décembre) et de demander aux Membres du CIML qui n'avaient pas exprimé leur vote de le faire (en soumettant leurs commentaires) avant la nouvelle date limite; ou

    de procéder à l'approbation de ces DR en réunion (si les Membres du CIML y étaient disposés).

    Le Bureau s'inquiétait de cette situation, car il arrivait très fréquemment qu'il n'y ait pas assez de votes exprimés reçus. Or, il n'était pas souhaitable d'attendre une autre année juste pour adopter les documents si l'on voulait accélérer le travail technique. L'approbation de l'assemblée était donc nécessaire pour voter les cinq documents en suspens, en même temps que les autres documents à voter en fin de réunion.

    M. Faber a demandé s'il n'y avait pas d'objection à cette proposition. Aucune objection, ni commentaire n'ont été formulés.

- number: '9.5'
  title: Approbation des projets de Recommandations et de Documents
  narrative: |2+

    M. Magaña a indiqué qu'il était d'usage au cours de ces réunions de demander à l'avance aux délégués leurs intentions de vote pour anticiper le vote formel, et il souhaitait examiner ainsi les documents.

    Les projets de cinq Recommandations nouvelles ou révisées étaient présentés au CIML pour approbation. Pour chacun, M. Magaña demanderait qui prévoyait de s'abstenir et qui prévoyait de voter "non", pour savoir à quoi s'en tenir:

    DR 1 Révision de R 48 Lampes à ruban de tungstène pour l'etalonnage des pyromètres optiques: une abstention, pas de votes négatifs;

    - DR 2 Révision de R 52 Poids hexagonaux de classe de précision ordinaire, de 100 g à 50 kg: une abstention, pas de votes négatifs;

    - DR 3 Révision de R 61-1 Doseuses pondérales à fonctionnement automatique. Partie 1: Exigences métrologiques et techniques - Essais: pas d'abstentions, pas de votes négatifs;

    DR 4 Révision de R 87 Contenu net des préemballages: une abstention, pas de votes négatifs; et

    DR 5 Nouvelle Recommandation Spectrophotomètres pour les laboratoires médicaux (R 135): trois abstentions, pas de votes négatifs.

    Projets ultérieurs présentés à l'approbation du CIML comme décidé au point 9.4:

    - Amendement R 49-2 Compteurs d'eau destinés au mesurage de l'eau potable froide. Partie 2: Méthodes d'Essai: pas d'abstentions, pas de votes négatifs;

    - Projet R 49-3 Compteurs d'eau destinés au mesurage de l'eau potable froide. Partie 3: Format du Rapport d'Essai: pas d'abstentions, pas de votes négatifs;

    - Projet de révision R 61-2 Doseuses pondérales à fonctionnement automatique. Format du Rapport d'Essai: pas d'abstentions, pas de votes négatifs;

    - R 134: Instruments à fonctionnement automatique pour le pesage des véhicules routiers en mouvement. Pesage total du véhicule. Format du Rapport d'Essai: une abstention, un vote négatif (US); et

    - Amendement à R 99/ISO3930: Instruments de mesure des gaz d'échappement des véhicules: pas d'abstentions, pas de votes négatifs.

    En principe donc, toutes les publications ci-dessus devraient être acceptées et le quorum ne devrait pas poser de problème; M. Faber exprimait sa satisfaction pour ce résultat positif.

    Au nom des Fabricants Européens de balances de pesée, Pr. Kochsiek a souhaité faire un commentaire sur la révision de la R 61. Ils s'étaient plaints, à lui et au Bureau que leurs remarques n'avaient pas été considérées par le Comité Technique et Pr. Kochsiek voulait que l'OIML évite cette situation à l'avenir en s'assurant que les TC soient obligés de tenir compte de tous les commentaires faits par les Etats Membres mais aussi par les observateurs et les associations de fabricants.

    M. Magaña avait aussi reçu une lettre de l'association de fabricants CECIP à ce sujet, quelques jours avant son départ pour le Japon. Il n'avait pas encore eu le temps d'y répondre, mais sa réponse aurait consisté à transmettre la réclamation au Secrétariat pour qu'il réagisse et de façon à remédier à cette situation. Lorsqu'il répondrait, il dirait aux fabricants que leur réclamation aurait dû être faite plus tôt, car une réponse ne pouvait être donnée dans l'immédiat, mais la question serait examinée avec le Secrétariat du Sous-comité.

    M. Birdseye avait discuté avec M. Awosola, qui était en charge du Secrétariat en question, afin de tenter d'établir quels commentaires n'avaient pas été pris en compte. Cela s'avérait être impossible, car de nombreux commentaires avaient été émis par le CECIP à ce sujet dès les premiers jours du projet et il s'avérait possible de les incorporer pour la majeure partie d'entre eux. Le CECIP avait fourni une contribution utile lors des réunions techniques sur ces projets. Si certains commentaires n'avaient pas été pris en compte, cela pouvait décevoir. Mais il était convaincu que tous les commentaires reçus avaient été considérés.

    M. Faber était convaincu qu'il serait possible d'éviter ce genre de difficultés à l'avenir.

- number: '10'
  title: Arrangement d'Acceptation Mutuelle (MAA) et Listes de Contrôle
  narrative: |2+

    Le Président a invité Dr. Ehrlich à présenter ce point.

    Dr. Ehrlich a proposé d'examiner ce qui s'était passé avec le MAA depuis la discussion à St. Jean de Luz l'année dernière, et de donner les résultats des deux votes ayant eu lieu. Les Membres se rappelaient peut-être que le $ 9^{\mathrm{m e}} $ projet de comité du MAA avait été discuté à ce moment, et qu'une décision avait été prise pour tenter de résoudre les problèmes en suspens. Elle consistait à organiser un vote préliminaire au lieu d'un vote formel afin de voir quels commentaires le projet pouvait inspirer et après le vote, à tenir éventuellement un atelier pour discuter des commentaires. Le résultat du vote préliminaire était visible dans la présentation assistée par ordinateur : 26 votes positifs, 4 votes négatifs et 2 abstentions. Par suite des commentaires reçus, M. Magaña et Dr. Ehrlich avaient préparé un projet qui avait été envoyé à tous les Membres, et un atelier avait été tenu en juin à Paris pour examiner les résultats du vote et pour aborder les problèmes en suspens. Plusieurs Membres avaient participé à cette réunion qui avait donné lieu à des discussions fécondes, et de nombreux problèmes avaient été résolus. Quelques difficultés de compréhension au niveau de la formulation dans le texte du MAA avaient été discutées et un rapport sur cet atelier avait été communiqué aux Membres et était paru dans l'édition d'octobre du Bulletin. L'intention était de ne rentrer dans les détails que lorsque cela s'avérait nécessaire. L'intention du Dr. Ehrlich était d'abord d'évoquer les problèmes qui demeuraient encore après le deuxième projet de document expédié pour votes et commentaires.

    Le deuxième projet de document contenait des modifications pour incorporer la discussion de la réunion de juin. Dans ce vote, on comptait 22 votes positifs, 4 votes négatifs et 5 commentaires, et de même avec les Listes de Contrôle. Cela faisait donc à peu près 80 % de votes favorables, mais comme cela a pu être constaté, environ la moitié seulement des Membres du CIML avaient voté. Il s'ensuivait une interrogation quant à la suite des événements. Il aimerait donc discuter des commentaires restants qui avaient été reçus, et dire aux Membres quels problèmes demeuraient non résolus. Comme évoqué lors de la discussion à son début, il y avait beaucoup de problèmes relatifs au coût de fonctionnement du MAA, et ceux-ci seraient bien sûr discutés.

    Le premier problème était celui des coûts: les coûts administratifs de fonctionnement du programme, et ceux supportés par les Autorités de Délivrance et les laboratoires d'essais pour faire réaliser sur place l'évaluation par les pairs ou l'accréditation.

    Les autres commentaires étaient les suivants:

    - Au moins deux personnes avaient suggéré que les experts de l'équipe d'accréditation soient issus de la même liste mise à jour d'experts chargés des audits d'examen par les pairs;

    - Des suggestions pertinentes avaient été faites pour que les représentants des Comités Techniques et Sous-comités compétents pour une Déclaration de Confiance Mutuelle particulière soient inclus et jouent un rôle actif dans l'examen de la participation, afin d'être informés des problèmes et de comprendre ce qui se passait lors de ce Comité. Cela ne figurait pas dans les versions précédentes du MAA, mais en faisait maintenant partie;

    - Il y avait pas mal de confusion concernant le fait que les Autorités de Délivrance soient évaluées par rapport à ISO/CEI 17025;

    Une discussion approfondie avait eu lieu lors de l'atelier en juin sur le fait que dans les différents pays, les Autorités de Délivrance assumaient des fonctions différentes. Parfois, un organisme qui était assimilé à une Autorité de Délivrance dans un pays s'occupait peut-être en fait de certains types d'essais ou d'examens. Si c'était le cas, l'idée était que cette partie de leur activité serait examinée dans le cadre du MAA et selon les critères de ISO/CEI 17025 ou de la Liste de Contrôle correspondante. Un pays qui avait exprimé son inquiétude à ce sujet, avait été rassuré par cette explication. La formulation devrait être clarifiée – il était nécessaire de mieux expliquer dans le MAA les raisons de procéder ainsi. Dr. Ehrlich avait discuté avec des personnes travaillant dans le secteur de l'accréditation dans son propre pays, et il n'y avait à son avis aucun problème – il était tout à fait acceptable d'avoir un tel arrangement dans certains pays;

    Un pays souhaitait que la référence à ISO/CEI 17040, relative à l'évaluation par les pairs des organismes d'évaluation de conformité, soit supprimée pour deux raisons: premièrement, elle en était encore au stade de projet; deuxièmement, et sans doute la raison la plus importante, elle ne constituait pas un document approprié. Cela avait été ajouté après coup pendant la réunion, et si elle ne constituait pas un document approprié, elle devait alors être effectivement retirée. Dr. Ehrlich n'y voyait aucune objection;

    - Quelques autres pays avaient suggéré que les Comités pour l'Examen de la Participation pouvaient être grands et lourds; cette inquiétude était fondée, et cela dépendait de la Recommandation faisant l'objet de la Déclaration de Confiance Mutuelle: pour les instruments de pesage à fonctionnement non automatique, ou pour les cellules de pesée, il pouvait effectivement y avoir de très nombreux participants pour un Comité d'Examen de Participation. Cela pouvait rendre le fonctionnement du Comité très difficile. La discussion sur ce point semblait indiquer quant à la façon de procéder, que la situation la plus favorable serait de commencer avec une Recommandation pour laquelle il y aurait probablement moins de participants au comité. Le comité pour la première Déclaration de Confiance Mutuelle devrait être maintenu à une taille raisonnable.

    Il s'agissait des problèmes clés. Un pays s'était déclaré comme n'était pas du tout convaincu de l'aspect pratique du MAA, mais leurs commentaires n'étaient basés que sur le seul argument selon lequel le Système de Certificats OIML suffisait largement à leurs besoins en Europe. Cela avait également été discuté lors de la réunion en juin et il avait été reconnu que pour certains le Système de Certificats fonctionnait très bien actuellement, mais qu'il n'en était pas de même pour les autres. Le BIML se chargerait d'une étude pour mieux évaluer l'efficacité du Système de Certificats dans les différentes situations.

    Globalement, une bonne majorité était pour commencer l'application du MAA et prête à voter favorablement en conséquence, malgré les quelques difficultés auxquelles il faudrait indubitablement faire face. De toute évidence aussi, d'autres discussions auraient lieu concernant le problème du coût. La situation actuelle pouvait ainsi être résumée, et Dr. Ehrlich remerciait toutes les personnes qui avaient émis des commentaires, donné leur soutien et/ou participé à la réunion de juin et pris part aux discussions qui avaient été franches et productives.

    M. Faber a remercié Dr. Ehrlich pour son introduction claire, et a indiqué que cette session s'achèverait avec un vote informel afin d'évaluer la situation actuelle, mais entre-temps la parole était donnée à l'assemblée pour poursuivre la discussion et entendre les commentaires.

    M. Lagauterie souhaitait faire un commentaire à propos de la première résolution: "L'Autorité de Délivrance ne doit pas être évaluée par rapport à ISO/CEI 17025". Il avait compris que pour certains pays, il pourrait y avoir un arrangement. Il dirait bien : "Pourquoi pas?" Mais les obligations pour cette norme n'étaient pas équivalentes à celles du Guide 65. Il était donc peut-être

    possible d'utiliser cette norme comme base mais avec des exigences additionnelles qui conduiraient au même résultat.

    Dr. Ehrlich a indiqué que c'était le premier commentaire qu'il évoquait dans son exposé. Il était dit en fait que les Autorités de Délivrance pouvaient être évaluées par rapport à ISO/IEC 17025. Il avait oublié de faire passer sa dernière diapositive concernant les Listes de Contrôle, qui abordait le point soulevé par M. Lagauterie, à savoir qu'une discussion avait aussi eu lieu lors de la réunion en juin sur les Listes de Contrôle. Ce point n'avait pas été discuté depuis car le MAA avait focalisé l'attention, mais quelques pays estimaient que les Listes de Contrôle étaient peut-être vraiment plus compliquées que nécessaire, et apportaient peu de chose à ce qui existait déjà dans ISO/CEI 17025 et dans le Guide 65. Il avait été convenu que le document sur les Listes de Contrôle devait servir de modèle, mais que pour chaque Déclaration de Confiance Mutuelle (DoMC) particulière, le Comité pour l'Examen de la Participation devrait consulter la Liste de Contrôle et la modifier en conséquence. Dans certains cas, elle pouvait être totalement inappropriée, et dans d'autres parfaitement adéquate. Ceux qui étaient vraiment intéressés à cette activité auraient certainement beaucoup de choses à ajouter et pouvaient modifier la Liste de Contrôle en conséquence. La discussion que M. Lagauterie proposait débuterait sous la responsabilité du TC 3/SC 5 et les Listes de Contrôle pourraient certainement être étendues. Il était convaincu que les Listes de Contrôle seraient votées. La plupart avaient voté favorablement mais il était entendu que les Listes de Contrôle constituaient un modèle et ne devaient pas être considérées comme le résultat final devant être utilisé.

    Pr. Kochsiek a indiqué que l'Allemagne avait été l'un des pays ayant voté contre, mais il constait que leurs trois inquiétudes principales avaient maintainant été prises en considération. Et si le texte était amélioré en conséquence, son pays voterait favorablement.

    Dr. Kildal souhaitait mettre en doute l'affirmation selon laquelle le Système de Certificats OIML fonctionnait mal. L'accusation était grave, car le BIML et les Membres y avaient consacré beaucoup de travail, et, il fallait d'urgence vérifier si le Système fonctionnait correctement. Le travail réalisé n'avait-il aucune valeur? Où en était cette enquête et quand serait-elle terminée?

    M. Faber estimait que l'expression "fonctionnait mal" était un peu trop raide, car le fait qu'il y ait plus de 1100 Certificats OIML prouvait que beaucoup d'industries étaient vraiment très intéressées, et également que le Système était au moins en partie une réussite, même s'il fallait admettre qu'il n'y avait pas autant de pays acceptant les Certificats qu'il serait possible – il y avait sans aucun doute possibilité de progresser.

    M. Magaña a indiqué que le Système de Certificats fonctionnait ou pas selon le point de vue. C'était une réussite dans la mesure où les fabricants voulait se procurer des Certificats, et cela fournissait une base commune pour les évaluations de type, ainsi que pour les reconnaissances mutuelles bilatérales ou les reconnaissances régionales. L'accord mutuel de type WELMEC était basé sur le Système de Certificats OIML, ce qui prouvait que le Système avait quelque valeur. Il ne fonctionnait cependant pas aussi bien qu'il le pourrait. C'était la raison pour laquelle le MAA avait été élaboré – car la reconnaissance des Certificats n'était pas unanime dans le monde entier. L'OIML aimerait parvenir à une situation où les Certificats seraient reconnus dans la plupart des pays, non pas seulement dans le cadre d'arrangements bilatéaux ou d'arrangements régionaux mais également au niveau international. Le MAA servirait donc en plus à rendre le Système de Certificats OIML plus efficace. Il n'existait pas de statistiques quant à savoir combien de Certificats étaient ou n'était pas acceptés dans un autre pays, les accords bilatéaux et régionaux rendant la situation complexe. Un accord international sur les activités mutuelles était sans doute nécessaire. Le MAA constituit un premier pas utile; D'autres questions relatives à la conformité et ainsi de suite viendraient sans doute encore se poser à un stade ultérieur.

    Dr. Llewellyn souhaitait revenir à la question des coûts et du financement, évoqué l'autre jour. Il faisait référence au paragraphe 6.2 du MAA et au paragraphe sur les Questions relatives aux coûts et au Financement à la Page 3 du résumé de l'Atelier organisé à Paris. Deux véritables questions se posaient, la première étant une question de principe et la seconde se rapportant à l'aspect pratique:

    - L'administration du MAA devrait être autofinancée par les droits perçus des bénéficiaires. Le problème était que la personne supplémentaire employée au Bureau serait chargée d'autres tâches en plus de l'administration du MAA. Ce serait un précédent délicat et peut-être dangereux pour les activités du Bureau d'être financé directement par l'industrie. L'OIML était une Organisation intergouvernementale et il appartenait aux gouvernements de financer les activi-

    tés à travers les contributions des Etats Membres. Il se rendait bien compte qu'il était légitime dans une certaine mesure de demander une contribution aux bénéficiaires; il préférerait que les contributions des Etats Membres soient augmentées de façon modérée pour financer le poste supplémentaire du Bureau, mais qu'un droit unique exceptionnel soit acquitté par les bénéficiaires, à savoir les industriels, pour leurs Certificats. En résumé, attendre de l'industrie qu'elle finance une activité de l'OIML serait une erreur;

    - Le problème pratique, particulièrement net pour le Royaume-Uni, apparaissait du fait qu'ils avaient déjà reçu quelques commentaires négatifs émis par leur industrie concernant la perspective de payer un droit annuel pour les Certificats. Les fabricants du Royaume-Uni n'y étaient pas du tout favorables. Une proposition plus convenable serait de faire payer pour un Certificat un droit valable plusieurs années.

    M. Faber a indiqué qu'il aimerait que l'aspect financier soit discuté en premier, et attendait les autres commentaires à ce sujet.

    M. Vaucher a dit que la Suisse était d'accord avec le projet dans le principe, mais avait quelques inquiétudes à propos des coûts résultants. Le problème financier était la question principale. Tous les coûts résultants avaient déjà été mentionnés et il était clair que quelqu'un devait les prendre à sa charge. Les Autorités de Délivrance devraient faire payer le fabricant, le fabricant devrait facturer ses clients, et les utilisateurs de l'instrument, les consommateurs. Ainsi les dépenses devraient coïncider avec les bénéfices, et dans le cas où il coûterait moins cher de répéter les essais, alors la mise en place du MAA aurait été une erreur comme M. Magaña l'avait dit, il y a deux jours. Il serait donc crucial de savoir comment la question serait traitée, afin de garantir un moyen simple et efficace d'appliquer le MAA en limitant les coûts et la bureaucratie au minimum. Il y avait plusieurs façons de procéder. Il se contentait d'en mentionner trois:

    Ne pas aller au-delà de ce qui est nécessaire dans la réalisation des évaluations et des appréciations, en tenant compte de l'appréciation précédente et de la validation des moyens de mesure. Par exemple, il ne serait pas constructif d'évaluer à nouveau pour les essais des cellules de pesée, un laboratoire dont les moyens de mesure ont déjà été évalués dans le cadre d'un Arrangement de Reconnaissance Mutuelle (MRA) de la Convention du Mètre, et dont les Moyens d'Etalonnage et de Mesurage (CMC) ont été validés par une participation réussie à une comparaison clé. Les essais supplémentaires pour l'approbation de type consistaient principalement en des mesurages à différentes températures, et si le laboratoire était capable de procéder au mesurage à 20 $ ^{\circ} \mathrm{C}$, il devait aussi être capable de le faire à 50 $ ^{\circ} \mathrm{C}$ et il serait possible de se fier à sa déclaration selon laquelle il disposait de l'équipement nécessaire;

    - La compétence locale des Organisations Régionales de Métrologie pourrait être utilisée là où celles-ci étaient installées. Ces organisations étaient sur place, et avaient la maîtrise du langage des laboratoires, ce qui serait un facteur essentiel pour les appréciations; et

    - Se fier à l'évaluation, au jugement et à la surveillance effectués par les Autorités de Délivrance lorsqu'elles gèrent et contrôlent directement les laboratoires d'essais. S'il y avait le moindre doute, quelques laboratoires pouvaient être visités afin de rehausser l'acceptation de l'Autorité de Délivrance. Mais dans ce cas, seuls les points importants devraient être examinés.

    Dr. Kildal pensait que le principe de faire supporter les coûts par les bénéficiaires était bon. Il y avait d'autres cas de projets de type similaire: par exemple, la CEI mettait en place plusieurs Plans d'Évaluation de Performance, chacun étant autofinance et indépendant. Il suggérait que si les Membres de l'OIML étaient inquiets concernant les questions financières, les Plans de la CEI devraient être examinés. Si le programme devait être subventionné, il se demanderait si l'on en avait réellement besoin.

    M. Björkqvist était du même avis que la Norvège, pour dire que les coûts dans une entreprise comme celle-ci devraient être supportés par les organismes participants plutôt que par les Etats qui finançaient l'OIML.

    M. Valkeapää partageait également l'opinion exprimée par la Norvège et la Suède. Par contre, il avait déjà été mentionné que le Fonds de Réserve serait utilisé dans une large mesure pour couvrir le coût initial de ce système. Son pays ne pouvait malheureusement considérer cela comme acceptable.

    Concernant les coûts du MAA, M. Magaña souhaitait expliquer que le Bureau devrait supporter des coûts considérables et aurait besoin de recruter un autre agent. Le suivi des activités des TC/SC correspondait actuellement à l'emploi à plein temps de deux personnes à peu près: une grande partie du travail des deux Adjoints au Directeur, une partie du temps du Directeur et aus-

    si des ingénieurs du Bureau. Dans le cadre du MAA, il pourrait y avoir au moins 20 Déclarations de Confiance Mutuelle d'ici plusieurs années, et cela impliquerait, ne serait-ce que pour en assurer le suivi, de recruter un agent supplémentaire. Il y avait seulement deux solutions possibles: soit le Bureau avait la responsabilité du suivi de ces Déclarations de Confiance Mutuelle et de garantir la cohérence au niveau de leur travail; soit cette responsabilité était simplement laissée aux pays concernés, le Bureau s'en occupant très peu. Il y aurait toujours bien sûr des tâches qui incomberaient au Bureau, mais en l'absence d'un agent supplémentaire, cela ne pouvait que rester très limité. La question de savoir comment financer ce système se posait donc. Dr. Llewellyn avait dit qu'il devrait être financé par l'Organisation et d'autres Membres par les bénéficiaires. Une question de principe était inhérente: une organisation comme l'OIML devrait-elle avoir d'autres revenus que ceux provenant des contributions des Etats Membres? Etait-il approprié pour l'OIML d'entreprendre une activité commerciale de ce genre? À son avis, il ne faudrait pas demander aux pays qui n'étaient pas intéressés par le MAA de participer à son financement. C'était cette raison qui justifiait l'intention de faire supporter les coûts par les pays participants.

    Une autre question était de savoir comment facturer ces frais: il serait possible de facturer soit les Autorités de Délivrance, soit directement les fabricants. Cette question devait aussi être soumise à la discussion, et il était probable que l'on ne pourrait parvenir à aucune décision cette fois-ci.

    Dr. Ehrlich était d'accord avec M. Magaña mais souhaitait ajouter deux points:

    - Il pensait qu'il fallait qu'un agent du BIML prenne part au début au Comité d'Examen de la Participation, afin de pouvoir maintenir une position neutre et coordonner toutes les activités. Au moins au début, une présence forte du BIML serait importante, et ensuite peut-être, comme M. Magaña l'avait dit, les pays pourraient reprendre le projet et à ce stade, une fois tout en place, les coûts diminueraient peut-être; et

    - Il convenait avec M. Vaucher que s'il pouvait être tiré profit du travail qui avait déjà été réalisé dans le cadre des arrangements bilatéraux, de l'inter comparaison, des audits et de l'accréditation déjà mis en place, beaucoup de dépenses pourraient sans doute être épargnées. Des fonds ne seraient nécessaires que pour des domaines soulevant certaines questions particulières; les frais supplémentaires d'audits pourraient avec un peu de chance être maintenus au strict minimum.

    M. Faber voulait revenir sur le commentaire de la délégation finlandaise qui précisait que par le passé le Fonds de Réserve n'avait jamais servi à des dépenses structurelles. Cela n'avait pas été fait par le passé et ne serait jamais fait à l'avenir non plus, mais il ne considérait pas que le démarrage d'une nouvelle activité fût de nature structurelle. Ils définiraient une période durant laquelle le Fonds de Réserve serait utilisé, et le montant exact des sommes en jeu, et l'utilisation du Fonds de Réserve s'arrêterait après cette période de démarrage. Le Comité pouvait être assuré d'avoir le contrôle du Fonds de Réserve; que celui-ci ne serait jamais utilisé à des fins structurelles, et qu'il y aurait toujours un Fonds de Réserve minimal requis qui ne devrait jamais descendre en dessous de niveaux acceptables.

    Comme il l'avait déjà fait remarquer, il semblait que la politique financière soutenant le système devrait être définie beaucoup plus précisément. Il avait déjà annoncé qu'un Groupe de Travail temporaire serait mis en place afin d'étudier tous les détails. Il fallait se dépêcher, car la mise en place et l'étude de l'aspect financier, tenant compte de toutes les remarques qui avaient été faites ce jour, devraient être réalisées dans les mois à venir. Il ne fallait sous aucun prétexte retarder l'application de la première Déclaration de Confiance Mutuelle (DoMC), lorsque le MAA aura été approuvé. Ce Groupe de Travail, de taille réduite propice à l'efficacité, devrait présenter un rapport ou au moins un premier projet avant la réunion du Conseil de la Présidence début mars lors de laquelle cette question serait discutée. Après cela, par correspondance peut-être, il serait possible d'envoyer les résultats aux Membres, et la décision finale serait ensuite prise, suite à un vote par correspondance ou lors de la prochaine réunion du Comité. Mais le Groupe de Travail temporaire devrait travailler suffisamment vite afin que les préparatifs permettant de poser la première DoMC puissent démarrer immédiatement. Un choix devait être fait maintenant, et M. Faber informait les Membres que l'objectif était, comme discuté précédemment, de désigner un groupe de taille très réduite incluant:

    - De toute évidence, les USA car ils étaient les instigateurs du système;

    - M. Magaña bien sûr, en tant que Directeur du Bureau;

    - M. Faber avait demandé que les Pays-Bas fassent partie du groupe car ils avaient une grande expérience au niveau du travail avec les diverses industries dans le cadre du Système de Certificats; et

    - L'Australie et l'Afrique du Sud, afin de garantir la représentation des différentes régions.

    M. Faber espérait que cette approche serait acceptée, mais il serait possible pour un ou deux autres pays de se joindre au Groupe, s'ils le souhaitaient. En principe, il était préférable que le Groupe demeure de taille réduite car il travaillerait ainsi plus efficacement. Les Membres du Groupe recevraient du Bureau le premier projet d'ici deux ou trois semaines et devraient ensuite travailler par courriel afin d'avoir leur premier projet prêt d'ici fin février. Toutes les idées et observations entendues seraient prises en compte; le problème devait être réglé et M. Faber espérait que l'élaboration plus approfondie qui s'avérait nécessaire n'empêcherait pas les Délégations qui avaient souhaité voter en faveur du MAA de confirmer leur intention, car tout cela n'avait d'importance que pendant la mise en oeuvre de la DoMC et jusqu'à ce qu'elle fonctionne effectivement, ce qui serait impossible si le système n'était pas approuvé. Il espérait que cette étude minutieuse encouragerait également certains pays, qui avaient peut-être envisagé de voter contre, à changer leur vote. Le caractère critique de la question financière était parfaitement perçu et tout était mis en oeuvre pour le résoudre. Les actions du Groupe de Travail seraient menées de façon transparente pour tous, et il appartiendrait ensuite au Comité, de prendre en temps utile, les décisions finales. Il ne pouvait bien sûr déterminer comment les Membres voteraient, mais il considérait comme irresponsable d'invoquer la difficulté à trouver une solution de financement comme une raison pour suspendre l'entreprise: une bonne solution serait sans aucun doute bientôt trouvée mais il fallait y consacrer un peu plus de temps.

    Dr. Ehrlich a exprimé son accord avec cette approche, et M. Faber a demandé si l'assemblée la jugeait acceptable.

    M. Lagauterie indiquait qu'il trouvait cette approche globalement acceptable, mais tenait à faire remarquer que la France s'était portée volontaire pour faire partie du Groupe de Travail. La France avait contribué à l'amélioration du MAA par le passé, et il était responsable, conjointement avec le Bureau, de l'élaboration d'un document sur l'Accréditation en Métrologie Légale, ce sujet étant lié au premier.

    Le Président a remercié M. Lagauterie pour cela et indiquait qu'il en prenait note et s'en rappellerait au moment de désigner le Groupe après la réunion. Il proposa ensuite de procéder à un vote informel.

    Dr. Kildal a dit qu'il ne comprenait pas bien sur quoi devait réellement porter le vote: il serait procédé à un vote final ultérieurement lorsque serait connue la façon de financer le programme. Sur quoi donc portait le vote maintenant?

    M. Faber a indiqué que le vote final sur le MAA et la Liste de Contrôle, aurait lieu le lendemain. Dr. Kildal a répondu que la Norvège ne pourrait voter le MAA que lorsque son financement aurait été clarifié, et que sinon, ils seraient obligés de voter contre la proposition.

    M. Faber avait espéré que cela ne se produirait pas, car la première application ne pouvait pas démarrer tant que l'aspect financier n'avait pas été approuvé. Il n'y avait rien à craindre en approuvant le MAA car le règlement final des aspects financiers serait nécessaire pour la première application d'une DoMC. Sans accord, le travail ne pouvait pas démarrer, mais cela ne devait pas pour autant empêcher de mettre la structure en place. Or, sans la structure, tout serait gelé. Peut-être, n'avait-il pas été suffisamment clair – mais il voulait simplement faire procéder au vote d'approbation du principe des arrangements (non pas les DoMC elles-mêmes, mais juste la structure de base du système) afin de poursuivre le règlement final en instance des dispositions financières. Il prenait toutefois en compte la position de la Norvège.

    M. Magaña a suggéré que la proposition soumise au vote soit formulée comme suit: "Il est proposé que le Président désigne un Groupe de Travail afin de préparer les documents relatifs au règlement financier et à l'application du MAA". Pour ne pas perdre de temps, ces documents pourraient ensuite être adoptés par correspondance. Il pourrait aussi être ajouté que les DoMCs ne pourraient entrer en vigueur que lorsque ce document financier aurait été approuvé. Cela n'empêcherait pas le travail d'avancer pour préparer la première DoMC en parallèle avec les délibérations sur le financement car ce travail prendrait un certain temps. A condition que le travail continue simultanément sur ces deux plans, la première application du MAA par une DoMC pourrait se produire relativement tôt. Le MAA devait aboutir à des résultats concrets.

    M. Björkqvist a demandé au Président de clarifier un point qui lui paraissait confus: si une évolution se produisait au niveau du système de base, et s'il y avait ensuite un Groupe de Travail qui était censé réfléchir aux aspects économiques et les examiner, qu'adviendrait-il de la structure si le Groupe de Travail ne parvenait pas à trouver un règlement satisfaisant du problème de financement?

    M. Faber a répondu que le travail se poursuivrait jusqu'à ce qu'une solution de financement soit trouvée. Il était en mesure de promettre qu'aussi longtemps qu'il était Président, et certainement aussi sous la présidence de son successeur, l'application de la première DoMC ne serait pas déclenchée tant que la question financière ne serait pas réglée. Mais il était urgent d'entreprendre maintenant les discussions et les travaux relatifs à la mise en application car la première application soulèverait inévitablement plus de questions que toute autre. Cela se passait toujours ainsi en de pareils cas. Si la discussion sur le financement ne pouvait aboutir à un résultat satisfaissant, alors l'application devrait être suspendue. Mais le fait de différer la préparation portant sur le MAA n'avait pas de justification. Ce serait très décevant pour de nombreux pays ayant demandé que la mise en application démarre le plus tôt possible, car l'existence de ce système était très importante pour ces pays. Ce serait également très décevant pour l'industrie qui ne comprendrait pas pourquoi le système final permettant d'éviter la duplication des essais, ne pouvait être mis en place. L'industrie comptait bien évidemment qu'une organisation mondiale comme l'OIML serait en mesure d'atteindre cet objectif. Il n'y avait aucun risque à accepter le MAA, à commencer les discussions sur l'application de la première DoMC, et à travailler sur le document final sur le financement; car tant que ce document n'était pas prêt et approuvé par le Comité, l'application de la première DoMC ne pouvait être achevée. Sans approbation de la structure, même le démarrage de l'application de la DoMC était impossible. Il était convaincu que c'était la meilleure façon de procéder, et que cela ne risquait pas de créer un gouffre financier, car l'application ne prendrait pas effet avant qu'un accord soit obtenu pour le financement.

    Dr. Leitner a indiqué qu'il était très important pour lui qu'il soit procédé à un vote sur le MAA ainsi qu'à un vote portant sur le Paragraphe 6.2 qui stipulait que le programme du MAA devait être supporté par des droits d'entrée administratifs et non en utilisant les contributions des Membres. C'était pour lui la condition pour pouvoir se prononcer en faveur du MAA, et les droits d'entrée administratifs devaient être approuvés par le CIML. À moins que cela ne soit fait, rien ne pouvait commencer dans le cadre du MAA. C'était ainsi qu'il comprenait le Paragraphe 6.2, et s'il n'y avait pas méprise, il était en mesure d'approuver le MAA et de voter pour.

    M. Johansen partageait les inquiétudes de ses collègues norvégiens en ce qui concerne le financement du projet. Il était essentiel que les dépenses du Bureau soient couvertes par des droits d'entrée, qu'ils soient acquittés par les fabricants ou par les Autorités de Délivrance. Mais les problèmes qui avaient été soulevés lui semblaient relever de l'histoire de l'œuf et de la poule. À son avis, si l'on décidait de créer un Groupe de Travail sur les questions de financement, et si on disait ensuite que le programme ne pouvait être lancé tant que le financement n'était pas décidé, alors le texte ne devait pas non plus être approuvé, car les deux devaient entrer en vigueur en même temps. Ainsi, l'approbation du texte du MAA pouvait en fait être reportée jusqu'aux conclusions des discussions sur le financement. Il jugeait très probable, qu'en examinant le financement, il s'avérerait possible de modifier des parties du texte. Il avait quelques doutes sur le document, principalement en raison de sa grande complexité. Comme il l'avait déjà dit lors de l'atelier de juin, sa complexité venait du fait que la délivrance des résultats d'essais était liée aux Autorités de Délivrance et aux Certificats OIML. Cela compliquait vraiment les choses. Il était possible de simplifier et aussi de réduire le coût si le document traitait uniquement de la discussion relative aux résultats d'essai, sans référence aux Autorités de Délivrance. Cela pouvait aussi avoir un impact sur le financement, ce qui conduirait à introduire des changements dans le texte du MAA. Il recommandait par conséquent de reporter l'approbation du texte du MAA jusqu'à ce que le financement du projet soit plus clair.

    M. Faber était sensible aux propos de M. Johansen mais n'était pas du même avis lorsqu'il faisait le parallèle avec l'histoire de l'oeuf et de la poule. Il estimait que lors de l'établissement de la première DoMC, il faudrait pouvoir s'appuyer sur un accord approuvé. Si cela n'était pas le cas, chaque ligne de l'accord pourrait être longuement re-discutée. Il serait pénible de commencer le travail en sachant que chaque point du système était discutable dans la mesure où il n'avait pas été approuvé par le Comité. Dans ce cadre uniquement, les discussions sur la mise en application pouvaient à son avis déjà commencer. Faire les deux en même temps serait très difficile.

    M. van Breugel pouvait comprendre le commentaire du Délégué danois mais estimait qu'il était très important de prendre garde qu'une autre année ne soit perdue. Il fallait se mettre d'accord sur un texte, et cela était très difficile, mais il serait préférable de traiter à part le problème du financement et de convenir maintenant de la structure, de façon que le texte soit déjà connu de tous. L'éta-

    blissement d'un accord sur une seule Recommandation prendrait au moins une année. La vitesse s'imposait; autrement le temps passerait et il y aurait de plus en plus d'accords bilatéraux et de solutions partielles: la structure elle-même constituait la solution. Il soutenait par conséquent la démarche consistant à séparer les discussions sur le financement de celles relatives à la structure.

    M. Barker estimait que le fait de se mettre d'accord sur la structure était une bonne idée. Il était légèrement inquiet sur le fait que l'acceptation de l'ensemble de la structure, et en particulier du Paragraphe 6.2, entraverait le Groupe de Travail dans sa tâche. Ce paragraphe n'évoquait pas la possibilité de financement par les contributions annuelles et il serait peut-être bon que le Groupe de Travail propose une combinaison des suggestions, ce qui ne semblait pas possible d'après le paragraphe 6.2.

    Le Président a fait remarquer que le Comité ayant autorité pour approuver le MAA, avait aussi le pouvoir d'y apporter des changements mineurs au moment de traiter les propositions du Groupe de Travail pour le financement. S'il était nécessaire de changer une ou deux phrases, cela serait inclus dans le Rapport et il reviendrait au Comité d'adapter le texte si nécessaire. M. Barker avait raison de dire que, étant donné l'ordre dans lequel le travail serait fait, le Groupe de Travail sur le financement ne serait pas tenu par certaines phrases actuellement en vigueur.

    Le Délégué du Royaume-Uni soutenait la proposition du Président d'un groupe séparé pour examiner le financement, en tant que suggestion très pragmatique. Il espérait contribuer utilement à la discussion en exprimant l' avis que le problème semblait résider dans la dernière phrase du paragraphe 6.2. Il s'agissait du même point soulevé par le délégué de la Nouvelle Zélande. À savoir que les dépenses de fonctionnement destinées à administrer le programme du MAA devaient pour être totalement couvertes par les droits d'entrée administratifs, être "anticipées". Cela n'était qu'un voeu ou une anticipation; ce n'était pas un exposé sur la façon dont le MAA luimême fonctionnerait réellement. Il s'agissait d'un détail administratif. On pouvait ainsi justifier qu'il était inapproprié de laisser cette phrase dans le texte du MAA, car c'était un point de détail d'ordre administratif. Les revenus seraient ou ne seraient peut-être pas suffisants pour que le programme soit autofinancé. La fixation du montant du droit d'entrée initial constituerait une tâche essentielle pour le Groupe de Travail temporaire sur le financement, car cela dépendrait des prévisions concernant les revenus et les dépenses. Il y avait donc plusieurs incertitudes sur le plan financier, qu'il était préférable à son avis de ne pas mentionner dans le document lui-même. Sa proposition consistait simplement à supprimer cette dernière phrase du paragraphe 6.2 dans le texte du MAA et de le considérer comme un mécanisme administratif à décider par le Groupe de Travail. Cela enlèverait toute ambiguité du texte du MAA.

    M. Magaña était d'accord avec la proposition de supprimer la dernière phrase et invitait le Secrétariat à donner son opinion à ce propos. Il ajoutait qu'il devrait peut-être être dit également, soit dans la résolution du CIML, soit dans ce document, qu'un document séparé traiterait des aspects financiers de la mise en application du MAA, et que le document séparé serait approuvé par le Comité.

    M. Faber a indiqué qu'il verrait ce qui pourrait être fait. Normalement, il refusait de modifier les documents pendant les Réunions du Comité, car de nombreux pays avaient étudié le document tel quel et des changements produiraient des difficultés. Mais dans ce cas particulier, il estimait qu'il pouvait faire une exception du fait de l'assentiment général sur la nécessité de traiter séparément les problèmes. Quelle que soit la façon de procéder, il serait noté dans le compte rendu que les aspects étaient complètement séparés et que le Groupe de Travail sur le financement était libre dans ses discussions, sans tenir compte de la phrase contestée du document. Il ne voyait pas d'autre façon de faire.

    M. Johansen s'inquiétait de cette suggestion, car pour lui et d'autres personnes présentes, il était crucial que toutes les dépenses soient couvertes par les droits d'entrée. Si la phrase était supprimée, le principe qu'elle exprimait serait sans doute perdu. Si la phrase était remplacée par une résolution, cette résolution devrait contenir la déclaration que le financement serait supporté par les participants, d'une façon ou d'une autre, et non en augmentant les contributions des Membres.

    M. Magaña a répondu que dans le budget qui serait présenté à la Conférence de 2004, l'activité normale du Bureau serait clairement séparée des coûts et revenus en rapport avec la mise en application du MAA. Chaque pays pourrait constater que les contributions des Etats Membres n'étaient pas utilisées pour le financement de la mise en application du MAA.

    Dr. Kildal a demandé à M. Magaña de confirmer que le principe d'autofinancement serait maintenu. Auquel cas, il serait alors en mesure de voter en faveur du système.

    M. Magaña a confirmé qu'après une période de transition, cela serait effectivement le cas à long terme.

    M. Safarik-Pstrosz a fait une proposition légèrement modifiée qui expliquait la position de la République tchèque: ils ne pensaient pas que les aspects financiers étaient les seuls à ne pas être totalement clairs, pour l'application du MAA. Leur proposition consistait à approuver le document sous sa forme actuelle et de créer un Groupe de Travail pour l'application.

    M. Faber a remercié M. Safarik-Pstrosz, ajoutant que c'était bien l'intention initiale. L'un des points à discuter, peut-être après l'adoption du MAA, portait sur la façon de procéder à la première application. Ce premier Comité, ou Groupe de Travail, se focalisait non seulement sur la catégorie observée, mais également sur les problèmes d'ordre général survenant pendant la phase de la première application, de sorte que ce Groupe de Travail serait différent des Groupes de Travail ultérieurs venant après accumulation de l'expérience relative à la mise en application. Il n'était pas en mesure actuellement, de dire exactement comment les choses se passeraient. À son avis, il était nécessaire de terminer d'abord les discussions concernant la structure, mais le BIML partageait l'opinion sur la participation des USA qui en tant qu'initiateurs du programme, devraient jouer un rôle important pour son application. Pour la première application, indépendamment de la catégorie qui serait choisie, le Bureau devrait être très actif, car il devrait recueillir toutes sortes d'informations qui pourraient être utilisées pour d'autres DoMCs. Il n'est pas question de recommencer les mêmes discussions pour les DoMCs suivantes – il faut profiter pleinement de l'expérience acquise lors de la première. Toutes les idées des Membres du Groupe seraient prises en compte pour le démarrage de la première DoMC. M. Faber demandait de procéder à un vote informel, en rappelant aux Membres que les deux votes formels séparés – sur le MAA lui-même et sur la Liste de Contrôle – auraient lieu le lendemain.

    Pr. Kochsiek s'interrogeait à propos de la situation du paragraphe 4.6 Évaluations des Autorités de Délivrance et des laboratoires d'essais dans le vote qui allait avoir lieu maintenant. Pour la structure, Dr. Ehrlich avait montré des commentaires de quelques pays, concernant en particulier le paragraphe 4.6, afin de clarifier le texte. Le second point consistait à supprimer la référence du Projet de Comité à ISO/CEI DIS 17040. Sur la base de quel document, les Délégués allaient maintenant voter?

    Dr. Ehrlich a proposé d'incorporer les changements évoqués par Pr. Kochsiek. Étant donné qu'il ne pouvait pas trouver de formulation alternative spécifique à l'instant même, il pensait qu'il serait franc de clarifier la question à propos de ISO/CEI 17025 par rapport aux Autorités de Délivrance et il proposait que le vote soit basé sur un document d'ou serait supprimé la dernière phrase, comportant la référence à ISO/CEI DIS 17040.

    M. Lagauterie a expliqué que le fait de voter maintenant lui posait un problème car la France avait voté favorablement pour le MAA estimant qu'il était globalement acceptable actuellement, mais s'était prononcé contre la Liste de Contrôle. Ainsi, tant qu'il ne saurait pas à quoi s'en tenir sur le rôle de la Liste de Contrôle dans le MAA, il lui semblait difficile de voter en faveur de l'ensemble du contenu. Personnellement, il voyait un risque à être obligé d'associer le vote sur le MAA et celui sur la Liste de Contrôle.

    M. Magaña a répondu qu'il y avait deux documents séparés: le MAA qui décrivait la structure pour l'application et auquel il fallait se référer de façon très stricte pour les applications, et deuxièmement, les Listes de Contrôle qui, comme l'avait indiqué Dr. Ehrlich, faisaient plus office de conseils. Quelques Comités pour l'Examen de Participation ne suivraient peut-être pas ces Listes de Contrôle ou les adapteraient aux besoins spécifiques de leurs DoMCs. Les deux documents n'impliquaient pas le même niveau d'engagement pour les participants. Il considérait qu'ils devraient encore être votés séparément. Il avait été constaté que les résultats des votes par correspondance pour les deux documents étaient plutôt similaires. Mais il existait deux documents différents qui pouvaient être amendés différemment et qui devraient donc faire l'objet de votes séparés.

    M. Lagauterie acceptait cette proposition, mais a déclaré que sa décision finale dépendrait de la formulation définitive portée dans les documents.

    Dr. Ehrlich a proposé qu'afin de répondre à l'inquiétude exprimée par M. Lagauterie, le projet devrait clarifier la situation par rapport à la Liste de Contrôle de façon à spécifier qu'elle n'était donnée qu'à titre d'information.

    M. Faber indiqué que la Délégation des Etats-Unis était prête à engager des discussions bilatérales avec les délégations pour lesquelles des doutes subsisteraient sur les propositions. Il était normal au sein d'organisations internationales de devoir travailler jusqu'à la dernière minute pour obtenir un bon résultat.

    Il a demandé aux Membres d'indiquer leurs intentions de vote.

    Concernant le MAA, il y a eu trois abstentions et cinq votes "non".

    Concernant les Listes de Contrôle, il y a eu cinq abstentions et cinq votes“non".

    Cela mettait un terme pour cette Réunion aux discussions sur ce point très important.

- number: '11'
  title: Système de Certificats OIML pour les Instruments de Mesure
  narrative: "\n"
- number: '11.1'
  title: Informations générales
  narrative: |2+

    M. Faber a abordé le Point 11 en donnant la parole au Premier Vice-Président, Pr. Kochsiek.

    Pr. Kochsiek a exposé que le Système de Certificats avait bien progressé ces dernières années, et en particulier l'année dernière.

    Le Système avait été lancé le 1er janvier 1991; de nombreux fabricants et Autorités de Délivrance travaillaient dans le cadre du Système. Il y avait un nombre croissant de Recommandations applicables au Système et de Certificats délivrés; comme mentionné précédemment, le nombre était maintenant de 1145. Actuellement, on comptait 38 Recommandations OIML applicables au Système, et 306 demandeurs et fabricants avaient déjà obtenu des Certificats OIML. Il y avait 26 Autorités de Délivrance parmi les 24 Etats Membres participant au Système, et de son point de vue, le Système de Certificats OIML fonctionnait très bien sur une base volontaire. Pr. Kochsiek demanda ensuite à M. Szilvássy de donner quelques informations sur trois points différents.

- number: 11.1.1
  title: Création et évolution du Système (bref historique)
  narrative: |2+

    M. Szilvássy a d'abord fait un bref historique du développement du Système. Avec la publication de la version révisée du P 1 Système de Certificats OIML pour les Instruments de Mesure, une étape avait été franchise vers la seconde phase du Système. Cette publication avait conduit à la certification des familles d'instruments, des modules, et des familles de modules d'instruments de mesure. Cela avait pris beaucoup de temps et donné beaucoup de travail aux TC et SC à l'occasion de l'élaboration et de la révision des Recommandations.

- number: 11.1.2
  title: Développements entre novembre 2002 et octobre 2003
  narrative: |2+

    Les développements importants à signaler par rapport aux discussions sur le MAA qui ont eu lieu au point précédent, étaient les suivants:

    - Le document révisé P 1 pouvait être téléchargé librement depuis le site Web OIML, de sorte que dans le monde entier, toutes les parties intéressées puissent prendre connaissance des règles de fonctionnement du Système. Il était essentiel de restructurer et d'améliorer régulièrement les informations relatives au Système sur le site web. Le site Web comprenait une base de données permettant de faire des requêtes par pays, fabricant, et catégorie d'instruments, pour rechercher un Certificat;

    - Comme cela avait déjà été mentionné, il y avait 38 Recommandations applicables au Système; ce nombre serait bientôt dépassé. Le seul problème pour l'instant était que l'application de ces Recommandations était quelque peu restreinte; elle concernait 13 catégories seulement, et sur ce point, il n'y avait eu aucun changement depuis la dernière Réunion du CIML;

    - Il y avait une bonne nouvelle: très bientôt, de nouvelles Recommandations (ou Recommandations révisées) sur les compteurs du service public seraient disponibles et applicables au Système. Le Comité venait juste de décider d'approuver la R 49-2 et la R 49-3 sur les compteurs d'eau;

    La R 75 Compteurs d'énergie thermique était très bien avancée, et le premier Projet de Comité (CD 1) du Format de Rapport d'Essai était pratiquement prêt à être envoyé par le Secrétariat;

    - La révision de la R 117 sur les compteurs pour les liquides autres que l'eau, était bien partie, et si tout se passait selon le programme, elle serait prête pour approbation avant la prochaine Réunion du CIML.

    - Deux importants changements avaient eu lieu au cours de l'année passée:

    - La Slovénie avait établi sa première Autorité de Délivrance qui devenait la 26ème Autorité de Délivrance de l'OIML;

    FR1, la première Autorité de Délivrance pour la France, dépendant de la Sous direction de la Métrologie, avait transféré son activité à FR2, la deuxième Autorité de Délivrance; cela signifiait que tous les Certificats délivrés précédemment par FR1 seraient traités par FR2, et M. Szilvássy attirait l'attention des Délégués sur le fait que, conformément aux dispositions du document révisé P 1, toutes les Autorités de Délivrance devraient à partir du 1er janvier 2004 adjoindre les numéros 1, 2, etc. au code ISO d'identification du pays concerné. Si une Autorité de Délivrance cessait son activité, ce numéro ne serait pas réattribué à une autre Autorité de Délivrance.

- number: '11.2'
  title: Nouvelles Recommandations applicables dans le cadre du Système
  narrative: |2+

    Deux des cinq Projets de Recommandations présentés au CIML pour approbation pendant sa 38ème Réunion sous le Point 9.5 seraient applicables dans le cadre du Système de Certificats (si approuvés, ce qui ne semblait pas faire de doute d'après les intentions de vote indiquées précédemment au cours de la réunion) dès leur publication:

    - DR 1 Révision de R 48 Lampes à ruban de tungstène pour l'etalonnage des thermomètres à radiation; et

    DR 5 (Nouvelle Recommandation R 135) Spectrophotomètres pour laboratoires médicaux;

    Comme décidé par le CIML lors de sa 37ème Réunion, d'autres Recommandations seraient bien-tôt applicables au Système:

    - Le Format de Rapport d'Essai pour R 49 Compteurs d'eau destinés au mesurage de l'eau potable froide (R 49-2 et 49-3); et

    - Le Format de Rapport d'Essai pour R 134 Instruments à fonctionnement automatique pour le pesage des vehicules routiers en mouvement. Partie A - Pesage total de vehicule était sur le point d'être présenté pour approbation du CIML par correspondance;

    - La version révisée de R 111 Poids des classes $ E_{1}, E_{2}, F_{1}, F_{2}, M_{1}, M_{2}, M_{3} $ serait distribuée pour approbation par correspondance auprès du CIML dès que le Projet de Recommandation (DR) final serait lui-même disponible. Le vote par correspondance du DR avait été retardé en raison du grand nombre de commentaires reçus.

    M. Szilvássy a souhaité en particulier attirer l'attention des Délégués sur le fait que la R 61-1 et la R 61-2 révisées avaient été approuvées par le CIML (sous le Point 9.5). Il serait nécessaire que le TC 9/SC 2 (avec le concours du BIML) rédige un Supplément à R 61 sur les exigences pour la transformation des Certificats (comme cela avait été fait pour l'édition 2000 de la R 60), et une proposition devait être faite pour fixer la date limite de délivrance de Certificats basés sur l'édition 1996 de R 61. Une fois la date fixée, seuls les Certificats basés sur la nouvelle édition seraient délivrés.

- number: '11.3'
  title: Suivi de la révision du P1 Système de Certificats OIML pour les Instruments
    de Mesure
  narrative: |2+

    Plusieurs actions étaient déjà inclus dans le Plan d'Action: cette publication révisée donnait le rôle central auparavant tenu par les Membres du CIML, aux Autorités de Délivrance. Cela signifiait que les Autorités de Délivrance devaient adapter leur activité en conséquence.

    Lors de la révision des Recommandations ou de l'élaboration de nouvelles Recommandations, les TC/SC concernés devaient prendre en considération les nouvelles règles du P 1, rendant possible la certification des modules et des familles de modules en incluant les exigences métrologiques, les méthodes d'essai et les formats de rapport d'essai. Comme mentionné la veille dans le

    Rapport sur les Activités Techniques, il était très important pour atteindre cet objectif de disposer de ce que l'on appelait le document horizontal, car l'application de la publication révisée P 1 en dépendait.

    M. Szilvassy s'est ensuite proposé répondre aux questions posées plus tôt au sujet de la future application du MAA et de la situation de l'application du Système de Certificats OIML. Conformément à la politique à long terme de l'OIML, le Bureau devait réaliser une enquête et préparer un rapport pour la Conférence. Au début de l'année prochaine, donc, il était envisagé que le Bureau préparerait et distribuerait des questionnaires aux Membres de l'OIML, aux Autorités de Délivrance et à tous les demandeurs et fabricants enregistrés dans la base de données. Le sujet de ce questionnaire porterait sur leur expérience de l'acceptation volontaire des Certificats OIML. Il leur serait demandé conseil sur ce qu'il convenait de faire à l'avenir, avec une attention particulière pour la future possibilité de certification des familles et modules.

    L'action relative à la certification individuelle des instruments de mesure ou des modules formulée dans A.2 (d) du Plan d'Action avait été retardée, pour faire face à d'autres priorités, mais le BIML préparerait, avec le co-Secrétariat du TC 3/SC 5, une enquête sur les propositions pour la certification individuelle des instruments.

    Par rapport à ces aspects nouveaux, d'autres actions générales menées par les Membres du CIML et le BIML étaient nécessaires pour:

    - Promouvoir le Système aux niveaux national, international et régional; et

    - Maintenir informées les organisations internationales et régionales en liaison avec l'OIML, des développement du Système de Certificats et de ses avantages.

    Pr. Kochsiek a remercié M. Szilvássy et a invité les participants de la réunion à faire part de leurs questions ou remarques.

    Dr. Ehrlich a souhaité indiquer le stade d'avancement de la R 111 sur les Poids. Cette Recommandation venait d'être achevée et envoyée au BIML. Il s'agissait d'un document très approfondi sur l'état de l'art et ses auteurs se réjouissaient qu'il soit distribué.

    Il n'y a pas eu d'autres questions ou commentaires.

- number: '12'
  title: Évolutions - Procédures générales de l'OIML
  narrative: "\n"
- number: '12.1'
  title: Révision des Directives pour les Travaux Techniques
  narrative: |2+

    M. Magaña a informé l'assemblée qu'en cours d'année, un projet de révision des Directives pour les Travaux Techniques avait été élaboré, car quelques mises à jour étaient nécessaires et un certain nombre de problèmes imposaient d'effectuer la révision. Ce projet de révision avait été envoyé aux Membres pour recueillir leurs commentaires et pour procéder au premier vote par correspondance. Un certain nombre de commentaires sur la révision avait été reçus.

    Dans le même temps, il avait été découvert que deux éléments n'avaient pas pu être pris en compte pendant la révision:

    - Au moment d'effectuer la révision, peu de progrès avait été encore réalisé au niveau de l'utilisation d'Internet pour le travail technique. Le projet de révision des Directives ne tenait ainsi pas réellement compte des possibilités offertes par ce support. Le Bureau avait maintenant encore fait des progrès sur ce plan et serait bientôt prêt à mettre en place sur le site Web de l'OIML certaines fonctionnalités destinées aux Comités Techniques; et

    - Dans le Comité OMC sur les Barrières Techniques au Commerce (TBT), un autre problème avait été découvert. Le Comité TBT avait vivement conseillé à toutes les organisations internationales de normalisation (dont l'OIML) d'étudier très soigneusement un document important du Comité TBT, à savoir le troisième Rapport Triennal de l'Accord TBT, dans lequel de nombreux pays avaient exprimé leurs inquiétudes au sujet de la normalisation internationale. Il apparaissait que l'OIML devrait tenir compte de ce troisième Rapport Triennal.

    Ainsi, de l' avis de M. Magaña, le projet de révision des Directives devrait être retravaillé, en tenant compte des commentaires reçus, des développements pour l'utilisation d'Internet, et des demandes adressées par le Comité TBT. Il souhaitait également que les Directives soient simplifiées car elles lui apparaissaient encore assez complexes. Il ne semblait donc pas approprié de les soumettre au vote à l'occasion de la présente réunion, car il y aurait encore une autre révision l'année prochaine. Il proposait que le CIML demande au Président et au Bureau de désigner un petit Groupe de Travail pour rédiger un projet de révision final visant à simplifier les procédures et tenant compte des divers et nouveaux éléments rapportés. Cela modifiait l'ordre du jour. En attendant, les Directives pour les Travaux Techniques actuelles resteraient en vigueur. M. Magaña demanda quels commentaires suscitait cette proposition.

    Aucune objection n'ayant été formulée, M. Faber a conclu que cette proposition serait incluse dans le Compte rendu de la réunion.

- number: '12.2'
  title: Traduction et diffusion des Publications OIML
  narrative: |2+

    M. Magaña a indiqué qu'un document avait été envoyé en vue de répondre à un certain nombre de questions émises par les Membres à différentes occasions. Les publications de l'OIML étaient éditées en versions française et anglaise et le Bureau prenait en charge l'impression de ces deux versions, mais un certain nombre de pays avaient demandé s'ils étaient autorisés à réaliser des traductions vers leur propre langue nationale et à procéder à leur diffusion et vente. Un projet de document avait été préparé à ce sujet, intitulé Traduction et Diffusion des Publications OIML. Il avait été examiné par le Conseil de la Présidence et envoyé aux Membres en vue de son approbation. M. Magaña a demandé quels commentaires suscitait ce document.

    La Délégation du Royaume-Uni avait un commentaire à faire sur le texte fixant les règles relatives à la reproduction des Publications OIML. Ce commentaire découlait de la façon dont les Poids et Mesures étaient organisés au Royaume-Uni: les autorités d'application ne faisaient pas partie de l'organisme national mais étaient malgré tout responsables de l'application des réglementations de métrologie basées sur les Certificats OIML, et faisaient occasionnellement des demandes pour y accéder. Dans le cadre d'un accord avec le Bureau, donc, et selon une procédure contrôlée par les Membres de l'OIML, au moyen de mots de passe, etc., ils pouvaient accéder à certains documents. Sans entrer maintenant dans les détails, il demandait la permission d'apporter quelques amendements mineurs à un ou deux paragraphes du document pour couvrir ces cas particuliers.

    M. Magaña ne voyait aucun problème à ce que les Bureaux des Poids et Mesures aient un accès gratuit aux Publications OIML. Le paragraphe stipulant que l'accès était autorisé au niveau des réseaux locaux ou internes pouvait aussi être interprété comme incluant les réseaux entre l'Autorité et les Autorités locales. Il s'efforcerait de trouver la formulation correcte pour modifier le paragraphe approprié avant le vote final prévu le lendemain.

    M. Faber a ajouté que la modification devrait être faite de façon que chacun au sein du Comité sache exactement ce qui allait être voté.

- number: '12.3'
  title: Projet de Guide sur le statut des Documents et Publications OIML
  narrative: |2+

    M. Magaña a indiqué qu'il ne s'agissait là que d'une simple information – il n'existait pas encore de document à présenter lors de cette réunion. Les Délégués se rappelaient qu'il avait été demandé au Bureau de travailler sur ce qui avait été appelé les "documents horizontaux". En étudiant cette question, il était apparu à M. Magaña, et cela avait été discuté lors du Conseil de la Présidence, que l'expression "documents horizontaux" n'était pas très claire, et qu'il était justement nécessaire d'avoir une description claire des types de documents et publications que l'OIML possédait et pouvait publier, ainsi que du processus de leur adoption. Actuellement, seulement deux types de documents étaient définis: les Recommandations et les Documents, mais une distinction pouvait peut-être être faite entre ces deux types quant à la façon dont ils devaient être adoptés et au type d'engagement que ces publications impliquaient pour les Etats Membres. Certaines publications constituaient un engagement pour les Etats Membres, d'autres étaient plutôt destinées à servir d'aide et de conseil ou avaient un caractère informatif; il était nécessaire de préciser

    quel engagement elles impliquaient pour le Bureau ou pour les TC. En plus, certains TC étaient tenus de suivre certaines consignes. Le document en cours d'élaboration donnerait une description des différents types de documents, de la façon dont ils devraient être adoptés, l'engagement qui existait pour les différentes structures de l'OIML et pour les Etats Membres. Ce document serait envoyé aux Membres pour approbation, probablement après le prochain Conseil de la Présidence, en mars ou avril, et pourrait être voté lors de la prochaine Réunion du CIML.

- number: '13'
  title: Étude sur Les Bénéfices apportés par la Métrologie Légale dans l'Économie
    et la Société
  narrative: |2+

    Le Président a invité M. Birch à présenter son Étude.

    M. Birch a indiqué qu'il avait commencé cette étude au début de l'année dernière, et qu'il était initialement prévu qu'elle se termine au bout de sept semaines. Sa réalisation avait été retardée pour d'excellentes raisons de son point de vue: il avait jugé important de laisser aux Membres du CIML et aux autres personnes intéressées la possibilité d'apporter leur contribution, en particulier au début, au moment de recueillir d'autres études déjà menées sur le sujet. Après la présentation du Rapport provisoire au Comité l'année dernière et répondant à l'invitation à faire part de leurs commentaires, de nombreux Membres avaient fait des suggestions et des encouragements. Il avait essayé de tenir compte de ces commentaires dans le projet final du Rapport et estimait avoir ainsi pu l'améliorer.

    Le Rapport provisoire présenté l'année dernière fournissait une description qualitative des bénéfices apportés par la métrologie au niveau du commerce et de la réglementation. Cette deuxième partie traitait essentiellement de la qualification de ces bénéfices. La qualification des bénéfices était importante pour plusieurs raisons, dont deux particulièrement:

    - Pour que les Autorités soient en mesure de définir des priorités dans le cadre de leurs programmes sur la base de l'impact économique; et

    - Sur le plan des discussions avec les gouvernements au sujet de l'importance de la métrologie commerciale et de contrôle afin de souligner les bénéfices induits par l'existence d'un Système de surveillance métrologique.

    Une autre raison du retard dans l'achèvement du Rapport était qu'en même temps que son étude, plusieurs autres études avaient aussi été lancées, et les jugeant particulièrement utiles à la sienne, il avait ainsi reporté la finalisation du Rapport pour les y incorporer. Il faisait référence en particulier aux études faites par KPMG pour le CIPM sur leur Accord de Reconnaissance Mutuelle (MRA), et pour KPMG sur les bénéfices économiques produits par le maintien des étalons primaires au Canada, et à plusieurs études réalisées dans le cadre du Projet Européen sur les Mesurages et concernant l'importance économique du mesurage en Europe.

    M. Birch a souhaité parler brièvement de la qualification des bénéfices apportés par la métrologie. Rappelant à son auditoire le contexte de son Étude, il disait qu'entre 1965 et environ 1980, plusieurs études avaient été menées au sein de l'ancien "National Bureau of Standards" des Etats-Unis, devenu le NIST, sur le Système national de mesures, et au terme de ces études, plusieurs qualifications furent trouvées. En particulier, il avait été estimé que 6 % du produit national brut (PNB) était dépensé pour les activités liées au mesurage dans l'économie des Etats-Unis. Les principaux utilisateurs de mesurages étaient des organismes de contrôle gouvernementaux, le commerce de détail, les industries du service public et les télécommunications, tous étant très fortement impliqués dans les domaines de la métrologie légale et de la métrologie commerciale. Les études suivies au début des années 80 permettaient d'étabir que la distribution par secteur des dépenses pour les activités liées au mesurage pouvait varier entre 20 % des dépenses totales d'une industrie et moins de 1 %. Cette variation au niveau de l'importance donnée au mesurage dans les secteurs de l'industrie était essentielle.

    En utilisant ces chiffres, Don de Vito, dans une étude publiée pour NBS et citée dans le monde entier depuis, était parvenu au chiffre de 3,5 % de valeur ajoutée au système de mesurage par les

    activités liées au mesurage chaque année. Cela était basé sur les chiffres des dépenses salariales dans les divers secteurs, appliqués à la valeur ajoutée dans chacun de ces secteurs. Cela était critiqué par d'autres personnes qui considéraient qu'il n'était pas approprié de déterminer la valeur ajoutée en se basant sur les facteurs de production.

    "Measurement Canada" avait aussi réalisé quelques études à peu près au même moment sur la métrologie commerciale, sujet qui était traité par peu d'études, la plupart d'entre elles portant sur la métrologie générale ou physique. Ces études avaient examiné la valeur des marchandises mesurée par l'intermédiaire des instruments de mesure du commerce au Canada, et avaient abouti au chiffre pour la valeur de ces marchandises d'environ 32 % du PNB du Canada. Cela n'incluait pas les mesurages assurés par le service public et les marchandises préemballées.

    Les estimations réalisées ultérieurement en Australie et aux Etats-Unis donnaient des chiffres évaluant la valeur des marchandises mesurée au travers du système de mesurage du commerce à environ 50 % du PNB.

    D'autres études avaient été menées au Royaume-Uni pendant plusieurs années (M. Birch s'y intéressait depuis les années 70), et le DTI avait développé un Système de cartographie des mesurages, s'écartant du système américain. Plus récemment, ils avaient étudié le rôle des mesurages dans la croissance économique, en utilisant en particulier des modèles de mesure de cette croissance économique et pour déterminer l'impact du mesurage.

    Une proposition similaire avait été utilisée par le Projet Européen sur les Mesurages pour déterminer l'impact du mesurage en Europe en utilisant des modèles comme critères. Sans entrer dans les détails, M. Birch ne jugeait pas vraiment crédible ce type de méthodologie.

    L'étude du KPMG présentait un intérêt bien sûr, car elle portait sur le MRA du CIPM, et M. Birch avait repensé à l'occasion de la discussion du CIML de ce matin, qu'il aurait été de bon augure de disposer d'une étude sur l'impact économique que pourrait avoir le MAA de l'OIML au niveau du marché mondial pour les instruments de mesure. Il souhaitait que cette étude soit réalisée à un moment par l'OIML.

    Sur le plan de la quantification des bénéfices, ce qui était examiné du point de vue d'un système métrologique commercial visait essentiellement à établir la cohérence du mesurage, à la fois au niveau national et au niveau mondial. La cohérence du mesurage était principalement garantie par le système de contrôle métrologique, et une mesure du degré de manque de qualité suivie se faisait par la mesure de l'incertitude, ou en métrologie commerciale, de l'erreur maximale tolérée (EMT).

    L'une des suggestions que M. Birch avait faites dans son étude portait sur la possibilité d'examiner certains bénéfices économiques du système métrologique commercial en vérifiant dans quelle mesure le système commercial de contrôle métrologique actuellement en vigueur avait réduit les EMT effectives en ayant une inspection en place effectuant des approbations de modèles et des vérifications et écartant ainsi le danger de fraude. Si ce changement dans l'incertitude de mesurage (ou les EMT) devait être appliqué à la valeur des marchandises, par le mesurage à l'aide des instruments de mesure du commerce, il était alors possible de parvenir à une sorte de chiffre de référence qui pourrait évidemment être amélioré par des analyses plus fines.

    Il s'agissait de simple arithmétique: si la valeur des marchandises mesurée à l'aide d'instruments de mesure du commerce était de 50 % du PNB, et si le système de contrôle métrologique commercial améliorait les EMT effectives de 0,1 %, alors l'amélioration obtenue pour faciliter le commerce représenterait 0,05 % du PNB. C'était bien plus que ce que le gouvernement dépensait pour maintenir le système de contrôle métrologique commercial.

    M. Birch avait aussi inclus quelques commentaires concernant les pays en développement, qui pensait-il étaient un cas particulier. Ils se trouvaient dans une situation particulière par rapport à l'économie et au niveau des priorités de la situation, et il croyait qu'il fallait élargir ce travail. Il avait aussi inclus quelques conclusions et suggestions simples pour un travail qui pourrait être entrepris par les systèmes nationaux et par l'OIML. Ce pourrait être comme il l'avait déjà mentionné, une étude sur l'impact économique du MAA, pour lequel il serait préférable de mieux évaluer le marché mondial des instruments de métrologie légale et commerciale; il avait également fait d'autres suggestions tout au long du texte.

    Le Rapport, de 80 pages, n'était pas très digeste: il s'était alourdi au fur et à mesure des divers processus, et M. Birch se proposait de rédiger un article pour le Bulletin OIML sur les méthodes visant à quantifier les bénéfices économiques et sociaux de la métrologie légale, ceci en vue de résumer les idées avancées dans l'étude et de les rendre plus accessibles et ainsi plus utiles aux Membres lors de leurs discussions avec leurs différents décideurs et autorités gouvernementales.

    M. Birch a conclu en disant qu'il espérait recevoir de nouveaux commentaires sur le Rapport, ou toute information relative à d'autres études. Si nécessaire, il pouvait placer le rapport sur le site Web et serait également toujours disponible pour aider les Membres à clarifier certains aspects de l'étude. Il espérait qu'elle constituerait un document de référence utile sur le plan de la documentation analysée et des quelques idées présentées, et il souhaitait remercier le Bureau et le Président de l'opportunité qui lui avait été donnée de traiter un sujet qu'il avait étudié tout au long des 30 ou 40 dernières années. Cela lui avait donné l'occasion d'y consacrer plus de temps que jamais auparavant.

    M. Faber a remercié M. Birch pour sa présentation. Personne n'ayant fait de commentaire, le Président l'a remercié pour ce travail réalisé avec beaucoup d'implication et servi par toute son expérience et sa connaissance de la métrologie et en particulier de ses aspects économiques. L'Australie avait toujours été un exemple pour les autres en ce qui concerne les aspects stratégiques de la métrologie légale. Il était convaincu que le Comité serait très reconnaissant à M. Birch de cette étude. Celle-ci serait finalisée avec M. Birch puis publiée. Sa proposition d'article pour le Bulletin serait acceptée avec reconnaissance, et il attendrait avec impatience de le lire. Il espérait que les personnes à qui la lecture de l'article inspirerait des commentaires ou des questions, prendraient contact avec M. Birch.

    M. Faber a ajouté que lorsque des experts en métrologie légale travaillaient sur des projets de loi, ils avaient parfois l'impression qu'il n'y avait pas beaucoup de documentation pour étayer leurs travaux. Ils ne devraient toutefois pas être trop pessimistes car lorsque des pays travaillaient individuellement sur des projets de loi, ou avaient des discussions avec leurs Ministres et les décideurs, il y avait maintenant au moins quatre documents comprenant de nombreuses informations fondamentales. L'un d'entre eux était le rapport du Séminaire de Braunschweig qui avait eu lieu il y a quelques années et qui contenait de nombreuses informations. Le deuxième était le rapport du Séminaire sur la métrologie en 2020 qui avait eu lieu l'année dernière en France. Il y avait ensuite ce rapport qui serait appelé l'Étude Birch. Et enfin, il y avait le Rapport Birkeland. Ces documents associés fournissaient de nombreuses informations pouvant être utilisées pour effectuer des commentaires sur toutes sortes de propositions de projets de loi.

- number: '14'
  title: Rapport sur le Conseil de Développement
  narrative: |2+

    M. Faber a invité Mme Annabi à rejoindre la chaire présidentielle et à engager les discussions.

    Mme Annabi a indiqué que deux points seraient soumis à la discussion: les activités du Groupe de Travail sur les pays en développement, et les autres travaux du Conseil de Développement effectués pendant l'année précédente. Des rapports sur plusieurs séminaires seraient présentés, et elle laissa la parole à M. Faber pour la présentation du rapport sur le Groupe de Travail pour les pays en développement. Le Groupe de Travail s'était réuni après le Conseil de la Présidence de 2003.

- number: '14.1'
  title: Groupe de travail sur les Pays en Développement
  narrative: |2+

    M. Faber a commencé son rapport en rappelant au Comité qu'ils avaient autorisé la création de ce Groupe de Travail afin d'examiner les structures du travail d'aide aux pays en développement. Il y avait eu de nombreux commentaires concernant son efficacité et les effets de la bureaucratie et il avait été demandé au Groupe de Travail de faire le point, non pas en vue de réduire l'aide proposée aux pays en développement, mais afin d'améliorer son efficacité sur les plans quantita-

    tif et qualitatif. Le Groupe de Travail avait terminé ses tâches lors d'une réunion tenue cette semaine à Kyoto. M. Faber avait reçu ses conclusions et était ainsi en mesure de décider de mettre un terme au travail du Groupe de Travail et d'exposer ses recommandations.

    Le Groupe de Travail qui était constitué, comme on pouvait le constater sur le site Web OIML, de Membres provenant aussi bien de pays industrialisés que de pays en développement, était dirigé par Mme Annabi avec un soutien très actif du Bureau. Les conclusions de ce Groupe de Travail avaient été discutées au sein du Conseil de la Présidence, et la veille lors de la réunion du Conseil de Développement. Il demandait à l'un des représentants du Bureau de fournir quelques informations complémentaires sur ces discussions, au risque, comme il le faisait remarquer, de répéter certaines choses déjà entendues par les Membres présents à la Réunion du Conseil de Développement. M. Dunmill a présenté ci-après les décisions de cette Réunion:

    - Le Conseil de Développement était d'accord avec la proposition du Président du CIML en ce qui concerne le résultat des activités et du travail du Groupe de Travail, et plusieurs activités du Groupe de Travail avaient été intégrées au Plan d'Action de l'OIML, qui avait déjà été présenté aux Membres;

    - Le Conseil de Développement avait convenu que le travail de ses trois groupes de travail existants sur l'Equipement, l'Information et la Formation devraient être suspendu pour l'instant, et que le travail de ces groupes serait poursuivi sous une forme différente au travers de diverses activités qui impliqueraient le recours à des experts pour des projets spécifiques, ainsi que par un accroissement du travail effectué avec les autres organismes en liaison, et par l'utilisation accrue d'Internet; et

    - Le Conseil de Développement continuerait d'exister sous sa forme actuelle jusqu'à la Conférence de 2004, mais il avait été décidé que sa Réunion de l'année prochaine prendrait la forme d'une Table Ronde, ce qui présenterait un intérêt plus direct pour les pays en développement et favoriserait une plus grande participation à cette réunion.

- number: '14.2'
  title: Autres activités relatives aux pays en développement
  narrative: |2+

    M. Dunmill a poursuivi en indiquant, comme déjà mentionné par Mme Annabi, que les activités concernant les pays en développement qui s'étaient déroulées durant l'année passée, comprenaient:

    - La participation à divers séminaires dans différentes parties du monde conjointement avec l'OMC: comme mentionné précédemment, il y avait eu deux séminaires régionaux auxquels l'OIML avait pris part en commun avec la CEI. Ces deux séminaires avaient pour objectif de mieux sensibiliser les décideurs les plus hauts placés en Amérique du Sud et en Afrique. D'autres engagements avaient empêché l'OIML de prendre part à une troisième réunion tenue au Liban;

    - L'OIML avait assisté aux réunions ISO-DEVCO en septembre 2003 en vue de maintenir des liaisons étroites dans le cadre des activités de l'ISO;

    - Il fallait aussi mentionner la participation à un séminaire régional du PTB dans des pays francophones d'Afrique du nord; et

    - L'élaboration de documents spécifiques aux pays en développement avait commencé cette année. Ces documents qui ne constituaient pas des Recommandations ou Documents OIML officiels, étaient destinés à fournir des informations aux pays en développement pour la création de leurs systèmes de métrologie légale. Il était prévu de publier ces documents uniquement sous format électronique, ce qui signifiait qu'ils pourraient être produits et diffusés rapidement. Le travail était en cours pour le premier d'entre eux, lequel portait sur les poids commerciaux de vérification et avait été élaboré par Dr. Gupta d'Inde; il serait disponible sous peu après cette réunion, une fois réglés les derniers détails éditoriaux.

- number: '14.3'
  title: JCDCMAS
  narrative: |2+

    Les activités de l'OIML en liaison avec d'autres organismes s'étaient intensifiées. Tout au long de l'année dernière, l'OIML avait été actif au sein du Comité Mixte pour la Coordination de l'Aide aux Pays en Développement dans les domaines de la Métrologie, de l'Accréditation et de la Normalisation (JCDCMAS).

    Ce Comité Mixte, expliquait M. Dunmill, avait été formé en 2002 et avait jusqu'ici tenu trois réunions, la première en septembre 2002 conjointement avec l'Assemblée Générale de lISO et les Réunions DEVCO, à Stockholm; et deux réunions en 2003, à l'UNIDO à Vienne en mars, et au BIPM à Sèvres en juillet. La prochaine réunion était prévue en mars 2004. Les membres de ce Comité représentaient les organisations internationales ayant des activités dans les domaines de la métrologie scientifique pour le BIPM, et de la métrologie légale pour l'OIML, ainsi que les organisations internationales de normalisation et d'accréditation. L'idée qui guidait le Comité consistait à tenter d'harmoniser les démarches auprès des pays en développement et de coordonnner le travail de façon qu'il n'y ait pas de gaspillage des ressources par chevauchement des activités. Les actions actuellement entreprises par le Comité, incluaient:

    - L'achèvement d'une base de données OMC sur l'aide technique proposée aux pays en développement; elle était en cours de développement et faisait suite à l'analyse d'un questionnaire sur les besoins en métrologie diffusé par l'OMC;

    - Le développement d'un projet d'enseignement par Internet sur la métrologie, l'accréditation et la normalisation, conjointement avec l'ISO et UNIDO;

    - L'élaboration de modules d'information pour faire en sorte que des ensembles d'informations soient mis à la disposition des pays qui tentaient actuellement de mettre en place des systèmes de métrologie, d'accréditation et de normalisation; ces ensembles d'informations pouvaient être transmis aux gouvernements afin de montrer la valeur de ces activités;

    - Des programmes pour développer un grand nombre d'informations consultables sur Internet, toujours en vue d'une plus grande sensibilisation aux trois activités précitées;

    - Des programmes pour toucher un public différent de celui habituellement visé par les activités des organisations impliquées. Dans cette optique, le Comité participerait à l'activité associée à la Conférence Générale de l'UNIDO plus tard dans l'année en cours. Cela permettrait avec un peu de chance d'accroître autant que possible la sensibilisation aux domaines de la métrologie, de l'accréditation et de la normalisation auprès des personnes qui prenaient vraiment les décisions au sein des gouvernements, plutôt que de limiter les contacts aux personnes déjà impliquées dans ces domaines;

    - Il était prévu d'inviter la Banque Mondiale à la Réunion de l'année prochaine. M. Dunmill en avait discuté avec un représentant de la Banque Mondiale, qui s'était montré très intéressé par les activités du Comité et pour assister à la prochaine réunion; et

    - Une discussion avait eu lieu à propos des Termes de Référence du Comité; ceux-ci seraient distribués aux Membres très prochainement pour examen. Mais brièvement, il s'agissait de définir: - les types d'organisations concernées; d'autres organisations internationales compétentes dans des domaines proches pouvaient aussi se déclarer ultérieurement;

    - le but de cette initiative qui était de mettre en commun l'expertise déjà acquise par les diverses organisations, afin de mieux sensibiliser celles-ci, et de tenter de soutenir un développement durable, car beaucoup de travail avait déjà été réalisé, y compris par ces organisations, sans résultat durable. Elle visait donc à mieux valoriser les activités déjà en place;

    - l'élaboration de modules d'information produits par ses Membres, qui permettrait de disposer principalement par Internet d'un ensemble d'informations sur l'infrastructure combinée.

    Ces Termes de Référence étaient distribués aux Membres pour examen, car ils avaient été présentés à la Conférence Générale et aux Comités et autres instances des diverses organisations concernées, pour que celles-ci approuvent la participation de leur organisation au JCDCMAS.

    M. Faber a demandé si un vote par correspondance à ce sujet était souhaité.

    M. Magaña a fait remarquer que les Termes de Référence avaient été approuvés par la Conférence Générale des Poids et Mesures deux semaines auparavant, et qu'ils seraient soutenus ou approuvés également par le CIML, afin de rendre officielle la participation de l'OIML au sein du JCDCMAS. Il s'agissait d'un document d'une page; il espérait que les Membres pourraient l'examiner et faire état de leur approbation le lendemain. Les Termes de Référence étaient un document récent et il n'avait pas été possible de le distribuer plus tôt. Ce document ne pouvait pas être modifié par l'OIML, car il avait été conçu conjointement par plusieurs organisations: il fal-

    lait dire oui ou non. Mais l'approbation des Membres était nécessaire pour que le projet soit présenté à la Conférence l'année prochaine, car la structure du Conseil de Développement avait été créée par la Conférence il y a déjà plusieurs années, et seule la Conférence pouvait ainsi changer cette structure. Presque toutes les personnes présentes ayant entendu les propositions faites à ce propos la veille, M. Magaña les récapitulait brièvement:

    - Suspendre les activités du Conseil de Développement, qui souvent dupliquait le travail du Comité qui de toute façon était seul habilité à prendre les décisions, et le remplacer par:

    - des ateliers et séminaires pendant lesquels se produisait un véritable échange d'informations au lieu de formalités seulement;

    - un Groupe de Travail permanent pour les pays en développement, qui aurait pour mission de préparer des séminaires et des ateliers et de proposer des programmes d'action;

    - Faire en sorte que ce Groupe de Travail ne comprenne pas trop de membres et reste professionnel;

    - L'un des Vice-Présidents dirigerait le Groupe de Travail;

    - Un représentant des pays en développement ferait partie des membres;

    - Le Bureau serait représenté au sein du Groupe de Travail; et

    - Il était fondamental qu'il y ait deux spécialistes professionnels de l'aide aux pays en développement, non seulement dans le domaine de la métrologie et au niveau de l'expérience des besoins des pays mais également pour leur aptitude à trouver des financements: ces spécialistes pouvaient être recrutés au sein de l'OIML plutôt qu'à l'extérieur.

    Tout cela permettrait que le travail actuellement effectué par le Conseil de Développement soit réalisé de façon plus efficace et plus professionnelle; M. Magaña demandait donc aux Délégués s'ils autorisaient le Président à présenter ce projet à la Conférence l'année prochaine.

    Le Délégué du Cameroun a exprimé l'avis que le fait de remplacer le Conseil de Développement par un petit Groupe de Travail dont les membres étaient désignés par le Président du CIML constituait un changement fondamental pour la mission du Conseil de Développement, et, que comme de nombreux pays en développement n'était pas encore prêts à faire face à cette situation, il était nécessaire de disposer de plus de temps pour proposer une structure qui satisferait réellement les besoins des pays en développement. Il proposait donc que la décision soit reportée jusqu'à la prochaine Conférence, donnant ainsi aux pays en développement le temps de faire des propositions pour une meilleure structure.

    M. Faber a répondu en disant que, mesurant pleinement le propos tenu, il n'était toutefois nullement question de prendre maintenant la décision de créer une nouvelle structure car celle-ci nécessitait l'approbation de la Conférence. Il avait pris note des remarques, et la seule chose qu'il demandait pour l'instant était la permission de poursuivre le travail préparatoire. Une proposition serait soumise à la Conférence l'année prochaine, et ce serait seulement le moment pour toutes les Délégations de voter.

- number: '15'
  title: Liaisons avec les institutions internationales et régionales
  narrative: |2+

    M. Faber a indiqué que plusieurs rapports seraient présentés sous ce Point.

- number: '15.1'
  title: Convention du Mètre, ILAC, ISO, OMC, etc.
  narrative: |2+

    ## Convention du Mètre / OIML / ILAC

    M. Faber a indiqué que la dernière réunion de ces organisations avait eu lieu le 26 février 2003 au BIML. Quatorze personnes dont les Présidents et Vice-Présidents des organisations, ainsi que les Directeurs y avaient assisté. Suivant l'usage, les trois organisations avaient échangé des informations de façon que chacune puisse prendre connaissance des activités mutuelles et des discussions avaient eu lieu sur plusieurs actions communes possibles. Parmi ces discussions, il fallait noter celle très importante concernant les actions d'aide aux pays en développement dont les

    Termes de Référence du JCDCMAS discutés par le CIML précédemment, constituaient l'un des thèmes. Ces ToR seraient envoyés sous peu aux Membres. Cela constituait un progrès très important visant à combiner les activités d'aide aux pays en développement.

    Le second point important avait été la discussion relative à un nouveau séminaire sur le rôle de la métrologie dans le développement économique et social, pour faire suite au séminaire organisé en 1989 à Braunschweig. Celui-ci serait organisé en commun par le PTB, l'OIML, le BIPM et IMEKO. Les discussions avaient abordé la question du public visé et il avait été conclu que des tentatives seraient faites pour obtenir la participation des décideurs, des fonctionnaires haut placés des gouvernements, des organismes donateurs et, bien sûr, des représentants des organismes nationaux et régionaux de métrologie. Un Comité d'organisation avait été créé. Il était prévu de tenir le séminaire en juin 2004, mais les détails n'étaient pas encore connus.

    Une discussion avait également eu lieu sur l'avancement du D 1 Loi de Métrologie préparé conjointement avec le BIPM. De nombreux éléments de ce document présentaient aussi un grand intérêt pour les gens de la Convention du Mètre.

    M. Faber était en mesure d'ajouter que la coopération était en progrès et que l'ambiance était bonne. Il pensait qu'au cours du temps et des changements, il serait de plus en plus possible d'entreprendre des actions communes utiles, et le résultat serait plus probant qu'actuellement. Il était important pour les organisations de parler ensemble afin d'éviter la duplication du travail et d'oeuvrer dans le cadre de la coopération chaque fois que possible.

    ## Convention du Mètre

    Dr. Leitner a souhaité mentionner qu'il avait assisté au Comité Consultatif sur les Unités (CCU) de la Convention du Mètre au nom de l'OIML, et que le résultat pouvait se résumer au fait qu'il y aurait quelques changements dans la nouvelle édition de la brochure du SI, en cours de préparation. Bien sûr, cela n'affecterait pas la définition des unités de base, et il n'y aurait pas non plus de nouveau nom pour une unité du SI. Mais elle clarifierait la signification des unités du SI, qui pour l'instant avaient différentes significations selon l'édition en vigueur; il y aurait clarification et un développement des idées de base du SI et du style éditorial du document. Il y aurait de plus simplification de toutes les pages contenant les unités non-SI. Il était prévu que la prochaine édition soit prête d'ici la fin 2004.

    ## ILAC

    M. Magaña a fait remarquer qu'il y avait un Groupe de Travail mixte OIML / BIPM / ILAC sur la révision du D 1 Loi de Métrologie, en parallèle avec OIML TC 3 car toutes ces organisations se sentaient concernées par le D 1.

    Dr. Seta a donné une brève présentation sur les activités d'ILAC.

    La coopération entre l'OIML et ILAC était très importante et l'accréditation de laboratoire donnait le moyen de déterminer la compétence des laboratoires pour la réalisation de types particuliers d'essais de mesurage et d'etalonnage. On pouvait donc espérer que l'accréditation puisse être utilisée pour faciliter la tâche des gouvernements. Il existait six Comités sous le contrôle de l'Assemblée Générale et du Conseil Exécutif de ILAC: le Comité pour la politique d'entente, le Comité pour les questions techniques d'accréditation, le Comité pour les affaires publiques, le Comité de laboratoire, le Comité mixte de soutien au développement, et le Comité de financement et d'audit. Trois d'entre eux avaient récemment changé de nom.

    Les principales nouvelles étaient que ILAC avait déposé ses statuts en juin de cette année aux Pays-Bas. Ils avaient pris cette mesure pour des raisons fiscales, et il avait aussi été nécessaire de fixer leur statut légal pour étendre leurs activités.

    Les Membres comptaient maintenant 44 signataires du MRA de ILAC (représentant 35 économies nationales). Il y avait en plus 15 Membres Associés, c'est-à-dire d'éventuels Membres à part entière, des organismes d'accréditation, et 90 Membres adhérents. Il y avait aussi plusieurs organismes régionaux de coopération: APLAC, IAAC, SADC, EA, CEI, un organisme national allemand, et dix-neuf décideurs.

    Au cours des douze derniers mois, ILAC s'était efforcé d'éveiller une compréhension de plus grande portée des bénéfices de l'accréditation au sein de la communauté internationale, en particulier des gouvernements et des organismes de contrôle, ce qui à son avis incluait les autorités de métrologie légale.

    Lors de la dernière Assemblée Générale en septembre, le sigle ILAC pour le Certificat d'Accréditation des laboratoires avait été discuté et presque confirmé. ILAC utilisait maintenant un nouveau sigle pour leur MRA et ce sigle était aussi utilisé d'habitude par chaque organisme d'accréditation membre ou membre à part entière.

    Il existait deux organismes internationaux dans le domaine de l'accréditation: ILAC et IAF (Forum International d'Accréditation). La différence entre ces organismes tenait au fait que ILAC était basé sur l'accréditation des laboratoires d'essais et d'etalonnage, et IAF sur la certification des systèmes de management, etc. Si ceux-ci avaient été unifiés en Europe, il n'en était pas de même dans la région Asie-Pacifique et ailleurs. Un travail était ainsi fait pour aligner l'accréditation entre ILAC et IAF et des Comités mixtes allaient être mis en place. M. Seta signalait qu'un forum destiné aux organismes de contrôle se tiendrait en avril prochain aux USA car ILAC était actuellement en train de faire de la publicité pour ses services dans le secteur du contrôle, en particulier en Allemagne, au Japon et aux USA. De même, pour être accepté dans le secteur du contrôle, un amendement serait nécessaire pour le MRA de ILAC. Il a précisé que ILAC souhaitait développer la coopération entre les domaines de l'accréditation et de la métrologie légale.

    ## OMC

    Il y avait des contacts réguliers avec le Comité TBT de l'OMC, l'OIML étant invité à chacune de ses réunions et s'efforçant toujours d'y assister. Les autres organisations comme le BIPM avaient aussi fait une demande d'adhésion en tant qu'observateurs, mais aucune décision n'avait encore été prise. Les relations avec le Secrétariat de ce Comité étaient bonnes. L'OMC avait commencé une réflexion un an et demi auparavant au sujet des infrastructures de bâtiment pour les pays en développement, impliquant tous les observateurs des organisations produisant des normes. Le BIML suivait ces activités de près et, comme mentionné précédemment, avait co-organisé plusieurs séminaires communs avec l'OMC. L'OMC avait assisté au Comité l'année dernière, mais n'était pas en mesure d'assister à la session actuelle.

    ## ISO

    Il y avait plusieurs liaisons avec l'ISO, fonctionnant conjointement aussi avec DEVCO et CASCO. La liaison avec les Secrétaires Généraux de l'ISO et de la CEI n'avait pas été réactivée vraiment officiellement, car la politique de l'OIML concernant ces liaisons était à définir.

    ## CEE-NU

    En ce qui concerne le Point 15.1 de l'ordre du jour, la Délégation tchèque souhaitait demander s'il était possible d'avoir quelques informations sur l'état de la coopération et de la liaison avec la Commission Economique pour l'Europe des Nations Unies, principalement sur le Groupe de Travail 6 pour les politiques d'harmonisation technique et de normalisation, où la métrologie apparaissait comme un point permanent de l'ordre du jour. Pour autant qu'il sache, une coopération était en place, et il convenait d'en faire état à l'occasion de cette réunion.

    M. Szilvássy a répondu que la CEE-NU était une organisation en liaison pour l'OIML, et que l'OIML était régulièrement représentée lors des réunions de son Groupe de Travail 6. Malheureusement, cette année la réunion avait lieu en même temps que la Réunion du CIML cette même semaine, et l'OIML était donc dans l'impossibilité d'y assister. Des rapports étaient reçus régulièrement; il n'avait pas été possible de présenter un rapport cette fois-ci mais il pensait que l'année prochaine ce point serait inscrit à l'ordre du jour de la Réunion du CIML pour donner les informations appropriées nécessaires.

- number: '15.2'
  title: Projet de Document de politique générale sur les liaisons avec les autres
    organisations
  narrative: |2+

    M. Magaña a expliqué que l'année dernière plusieurs Membres avaient réclamé le document qu'il s'apprêtait à présenter. Il avait donc préparé un projet de document de politique générale sur les

    liaisons OIML avec d'autres organismes. Cela avait été discuté lors du Conseil de la Présidence et au mois de mai la version finale du document de politique générale avait été envoyée aux Membres en vue de son adoption à cette Réunion. Sans entrer dans les détails, ce document de six pages en résumé faisait la distinction entre, d'une part, les relations avec les organismes intergouvernementaux et les organisations de développement et d'autre part, celles avec les RLMO et les RMO. Cependant, cette dernière partie n'était pas encore complètement développée.

    Il y avait aussi les relations avec les organisations internationales produisant des normes et les organisations internationales d'accréditation, telles que l'ISO, la CEI, ILAC et IAF. Il y avait des organisations régionales et nationales produisant des normes, telles que CEN, CENELEC et d'autres. Et il était possible également d'avoir des liaisons avec des fédérations industrielles. Ce document décrivait comment les liaisons pouvaient être établies et ce que leur contenu devrait être. M. Magaña était prêt à répondre aux questions de l'auditoire à propos de ce document.

    Constatant que personne n'avait de questions, le Président a demandé si une délégation avait l'intention de voter contre ce document le lendemain. Il notait que les informations qu'il contenait devraient être mises à jour de temps en temps.

    Dr. Ehrlich a indiqué que les Etats-Unis avaient voté en faveur du document et n'avaient pas d'objection, mais tenait à faire remarquer qu'ils avaient soumis plusieurs commentaires importants qu'ils souhaiteraient voir être pris en compte. Ceux-ci comprenaient le fait d'examiner soigneusement l'idée de groupes de travail communs pour déterminer s'ils étaient appropriés ou non. Il estimait important de noter que le travail du JCDCMAS avait un impact sur la politique générale, et devrait d'une manière ou d'une autre être incorporé dans un document ultérieur; il aimerait en discuter avec M. Magaña, plus tard.

    Le Président a indiqué qu'il serait pris note des commentaires de Dr. Ehrlich et qu'il serait probablement nécessaire de produire une version révisée du document dans très peu de temps.

    M. Magaña en a convenu, ajoutant que la question des groupes de travail communs pouvait aussi être abordée au sein du Groupe de Travail qui s'occuperait de la révision des Directives.

    En l'absence d'autres commentaires, le Président a indiqué que le document serait également soumis au vote des Membres le lendemain.

- number: '15.3'
  title: Rapports des Organisations Régionales de Métrologie Légale (RLMO)
  narrative: |2+

    Le Président a indiqué que plusieurs organisations étaient actuellement en mesure de présenter un rapport sur leurs activités.

    ## APLMF

    Dr. Ooiwa présentait le rapport sur les activités annuelles. Les Membres étant déjà au courant des activités de APLMF, son rapport serait bref.

    L'APLMF avait travaillé étroitement avec APEC SCSC (Sous-Comité des normes et de la conformité "http://www.apec.org/content/apec/apec_groups/committees/committee_on_trade/sub-committee_on_standards.html"), l'OIML évidemment, et d'autres RLMO. L'APLMF avait développé des structures pour l'harmonisation internationale du mesurage commercial et légal. Il désirait aborder quelques aspects du rapport.

    Le point 1 concernait le Président et le Secrétariat: L'exercice des fonctions de Président était de deux ans. Des enquêtes de candidature pour la fonction de Président avaient été faites auprès des économies des membres à part entière dans l'année et il n'y avait pas eu de candidat à l'élection du nouveau Président de sorte qu'à la dixième réunion tenue juste avant ce CIML, il avait été réélu et maintenu dans ses fonctions pour un mandat de plus. Le grand changement résidait dans le fait qu'au mois de mai, l'ancien Secrétaire Exécutif, M. Naylor, avait démissionné et Dr. Matsumoto lui avait succédé.

    Le nombre des membres n'avait pas beaucoup changé l'année dernière.

    L'une des principales activités de APLMF avait consisté à essayer d'organiser et de promouvoir des cours de formation et un cours de formation sur les pompes à essence avait eu lieu à Hanoi, Vietnam en août 2003. Il y avait eu plus de vingt participants et ce cours était soutenu par le NSC (Australie). La documentation technique et les professeurs venaient de NSC et le financement était assuré par APLMF. D'autres cours de formation avaient également eu lieu auparavant.

    Le défi de APLMF était un projet AP pour les cours de formation en métrologie légale, pour lequel un soutien avait été proposé par le Fonds APEC TILF (infrastructure technique pour la libéralisation et la facilitation des échanges et de l'investissement). Cette proposition était destinée à promouvoir les cours de formation pour les techniques d'application de l'instrumentation de mesure et en métrologie légale auprès des pays en développement dans la région APEC. Le Secrétaire et le Président seraient chargés de l'organisation de ces cours de formation au niveau:

    du contenu de la formation;

    de l'équipe de formateurs;

    - du pays ou économie hôte; et

    des participants.

    L'APLMF se chargeait de ces aspects avec l'aide du Fonds APEC TILF, qui se montait à environ 40 000 USD. Dr. Ooiwa estimait qu'un cours de formation ne devait pas seulement apporter des compétences légales ou techniques mais également des informations. De plus, il faudrait laisser la possibilité de discuter de sujets techniques. Les cours programmés portaient sur:

    - Les marchandises préemballées: il y aurait un séminaire sur les exigences légales et leur application, qui se tiendrait fin 2004 en Malaisie avec des formateurs de Nouvelle-Zélande et d'autres;

    - Les instruments de pesage et leur approbation et vérification: prévu en septembre 2004 en Chine, avec des formateurs d'Australie;

    - Les compteurs du service public: un atelier sur les exigences pour les compteurs d'électricité, prévu au second semestre 2004 au Vietnam avec des formateurs du Canada et issus d'autres pays membres; et

    - Un atelier sur les exigences techniques pour les sphygmomanomètres en septembre et octobre 2004 à Chinese Taipei, avec des formateurs de Chinese Taipei et autres.

    D'autres formations à l'étude pour la future planification, étaient prévues pour 2005 ou un peu plus tard sur les pompes à essence et les mesurages d'humidité du riz. Ces décisions préliminaires résultaient de la réunion APLMF tenue en début de semaine.

    Le Point 6 se rapportait à un projet APLMF, un symposium sur la traçabilité en métrologie légale, finance aussi par APEC TILF.

    Le Président a remercié Dr. Ooiwa pour sa présentation.

    ## Projets en Afrique de l'Ouest

    M. Faber a donné ensuite la parole à M. Yankine du Burkina Faso, pour parler des développements en Afrique de l'Ouest.

    M. Yankine a indiqué que le PTB avait un projet intitulé "Le soutien à la Métrologie en Afrique de l'Ouest". Dix pays étaient concernés, dont huit faisaient partie de l'Union Economique et Monétaire d'Afrique de l'Ouest (UEMOA). Ce projet avait commencé en 2000. Le PTB avait visité tous ces pays et établi un inventaire afin d'évaluer leurs besoins. Des ateliers de planification régionaux avaient eu lieu au Burkina Faso, en Côte d'Ivoire et au Sénégal pour étabir les différentes priorités, et les sessions de formation sur les mesurages de poids et de volume au Burkina Faso, au Bénin et en Guinée. Il y aurait un autre séminaire sur l'ISO/CEI 17025. Il y avait actuellement trois Groupes de Travail sur les mesurages de poids, de volume, et un autre dont le titre n'était pas encore défini, sur les textes de réglementation et de projets de loi. Il existait un forum Internet sur les mesurages de poids, de volume et sur l'accréditation. Le travail concernant l'équipement était en cours. Ce projet avançait bien et M. Yankine remerciait le PTB et l'OIML de leur soutien.

    ## Coopération Europe-Asie des Institutions Nationales de Métrologie / COOMET

    Dr. Issaev avait des informations concernant les activités de la Coopération Europe-Asie des Institutions Nationales de Métrologie, qui comptait 14 Membres et pour lesquelles la coopération existait depuis 1990. Jusqu'en 2000, aucune activité particulière en métrologie légale n'avait été organisée, mais ils avaient discuté de ce problème il y a quelques années avec M. Athané et en 2000, il avait été décidé de créer un nouveau Comité Technique consacré à la métrologie légale, et il y avait maintenant quatre Sous-Comités avec les attributions suivantes:

    1. Liaisons avec les Organisations Régionales et les Institutions Nationales de Métrologie;

    2. Essais des logiciels;

    3. Harmonisation des réglementations et normes de métrologie; et

    4. Évaluation des compétences techniques des laboratoires de vérification.

    Un programme avait déjà été établi, adapté de la 13ème réunion tenue à Yalta en Ukraine, et incluait plusieurs thèmes et projets. L'activité était régie selon des orientations particulières dans le domaine du programme mentionné précédemment. Ce programme de deux ans qui portait sur 2003-2004, avait trois objectifs principaux:

    - L'harmonisation des normes et règlements métrologiques, en particulier ceux concernant l'application de ISO/CEI 17025. Les résultats du groupe de travail conduit par M. Lagauterie sur l'élaboration d'un document pour l'amendement de ISO/CEI 17025 afin de couvrir les objectifs de la métrologie légale, seraient très utiles pour leur travail sur ce point;

    - L'élaboration de critères et procédures agréés pour l'évaluation de la compétence technique des laboratoires de vérification; et

    - L'élaboration de procédures d'essais pour l'évaluation des logiciels d'instruments de mesure.

    Un séminaire international très intéressant organisé par COOMET et le PTB et portant sur la Directive sur les Instruments de Mesure (MID) avait eu lieu en mai à Moscou.

    Dr. Issaev espérait que l'application de ce document en Europe aurait des répercussions intéressantes. Il était prévu que ce document soit appliqué dans tous les pays de l'Union Européenne en 2006, et la décision avait été prise d'élaborer une version russe de ce document. La production d'un document de ce type applicable à la Communauté des Etats Indépendants (CIS) était aussi envisagée. Le séminaire portait sur les idées nouvelles et les conséquences qui pourraient résulter de l'introduction de la Directive qui aurait probablement un certain impact sur les activités des autres pays et régions.

    ## EMLMF

    M. Lagauterie a expliqué que EMLMF était ouvert aux pays Européens ainsi qu'aux pays mediterranéens, mais que les autres étaient les bienvenus.

    Le Forum avait once Membres actuellement mais d'autres pays étaient prêts à s'y joindre. Son premier objectif concret était de contribuer à l'amélioration des activités de métrologie légale pour les Membres des pays en développement. Comme le savait le Comité, ce Forum était très récent et il s'ensuivait que les méthodes de travail n'était pas encore éprouvées. Il n'y avait de plus aucun financement, de sorte qu'il n'y avait pas eu de réelle activité dans l'année en cours. Mais malgré tout, M. Lagauterie notait qu'avec l'aide du BIML, auquel il était très reconnaissant, il avait été possible d'organiser une petite réunion le mercredi, et il apparaissait maintenant possible d'organiser une réunion en mai 2004, conjointement avec un séminaire organisé par le PTB. Celui-ci se tiendrait à Malte qui faisait partie des membres.

    M. Faber a souhaité à M. Lagauterie que réussisse le développement de EMLMF.

    ## SADC

    Dr. Carstens a fait des remarques sur les activités de SADC. L'actuel Président était M. Zulu de Zambie. Une réunion avait été tenue en Zambie en avril 2003, au cours de laquelle trois documents avaient été finalisés:

    - Étiquetage des marchandises;

    Balance a fléau; et

    Balance à contrepoids.

    Ces documents avaient par la suite été remis à l'organisme de normalisation de la région SADC pour publication comme normes régionales, lesquelles pouvaient ensuite être adoptées par les états membres en tant que réglementations techniques. Une réunion était prévue pour la dernière semaine de novembre à Malawi, où débuteraient les discussions pour un projet de document sur les tolérances. Il était prévu d'identifier quelques nouveaux projets qui pourraient démarrer dans les années à venir. Un autre cours de formation financé par le PTB sur les marchandises préemballées serait également organisé, et le travail de l'organisation se poursuivrait à l'occasion d'une réunion programmée en avril 2004 sur l'île Maurice sur le thème des structures SADC.

    ## WELMEC

    M. Freistetter a souhaité mettre les Membres au courant des activités de la Coopération Européenne en Métrologie Légale et de certaines informations concernant la MID.

    Il y avait eu 18 Etats Membres depuis 1990, tous de l'Union Européenne et de EFTA, et récemment la participation avait considérablement augmenté, du fait qu'il y avait aussi 12 Membres Associés qui étaient les pays demandant à se joindre à l'Union Européenne. Surtout, dix de ces 12 Membres Associés seraient Membres à part entière de l'Union Européenne au 1<sup>er</sup> mai 2004.

    M. Freistetter a montré à l'assemblée une carte de la situation actuelle de WELMEC avec ses 18 Membres et 12 Membres Associés, Malte et Chypre ayant été acceptés en 2003. L'important dans cette carte était qu'elle représentait une structure légale commune (indiquée sur la carte par un cadre) et un marché unique avec ses règles particulières propres. Ce qui était si particulier avec une structure commune de métrologie légale était que tous ces pays devaient avoir une approche commune de la métrologie légale, une application commune, une interprétation commune; et des sanctions communes pouvant être exercées contre les fabricants d'instruments de mesure partout en Europe s'ils ne distribuaient et ne fabriquaient pas les instruments de mesure conformément aux exigences. Il y avait des problèmes à résoudre au niveau régional, et il était nécessaire que les essais soient reconnus dans un cadre légal. Il y avait ainsi une structure légale commune très forte et cela devait être pris en compte dans la réflexion sur la Coopération Européenne en Métrologie Légale.

    Mais cette structure n'était pas nouvelle, et M. Freistetter estimait qu'il était temps de passer aux dernières informations. Les Guides WELMEC servaient à l'application des Directives de la Communauté Européenne, et s'adressaient aux fabricants des instruments de mesure. Il se réjouissait de constater que parmi les Membres qui le contactaient, ces Guides n'étaient pas seulement téléchargés par les Membres Européens, mais également par d'autres du monde entier. Un grand nombre de Guides avaient été publiés et pouvaient être trouvés sur le site Web WELMEC.

    Certaines décisions avaient été prises en 2003; le rapport complet sur celles-ci pouvait être lu dans l'édition d'octobre 2003 du Bulletin OIML. Mais il y avait aussi eu d'autres étapes importantes:

    - Un document de stratégie avait été approuvé;

    - Un nouveau tableau organisationnel avait été approuvé;

    - Quelques directives avaient été fixées;

    - Deux Groupes de Travail avaient été créés, pour:

    1. Les compteurs du service public; et

    2. L'échange d'informations essentielles concernant les approbations de type, la surveillance du marché et ainsi de suite;

    Chypre et Malte avaient rejoint WELMEC comme Membres Associés; et

    D'autres directives techniques étaient en préparation.

    M. Freistetter a fait remarquer que l'Accord WELMEC d'Approbation de Type était basé sur les Recommandations OIML, et on pouvait ainsi mesurer la détermination de l'Europe à utiliser les publications de l'OIML.

    Le futur travail de WELMEC se résumait à:

    - L'application de la Directive sur les Instruments de Mesure (MID), pour assurer l'harmonisation des exigences pour les instruments de mesure;

    - Les activités de surveillance du marché et l'échange d'informations;

    - Plus de coopération dans les approches techniques, la formation et les activités de conseil, afin d'assurer une démarche commune partout en Europe. La majorité des 30 Membres de WEL-MEC étaient aussi Membres de l'OIML, ce qui facilitait les choses.

    M. Freistetter a ensuite parlé de la mise à jour de la MID qu'il avait préparée pour les délégués. Tous ceux présents ici savaient que les fabricants, les consommateurs, les utilisateurs, les autorités de contrôle des mesures, les organismes notifiés, avaient tous des exigences différentes, et que différents systèmes étaient utilisés au sein des Etats Membres; tout cela était traité par la Directive. Il était important de préciser à propos des fabricants qu'il n'était pas uniquement question du marché européen mais aussi du marché mondial, car de nombreux fabricants partout dans le monde exportaient des instruments de mesure en Europe.

    Pour les types d'instruments de mesure concernés par la MID, il y avait maintenant dix catégories d'instruments de mesure harmonisées dans toute l'Europe. M. Freistetter en a montré une liste aux Membres. Il a ensuite montré où l'on pouvait obtenir les informations officielles sur la MID: ce service était assuré par le Conseil Européen, via ce qu'on appelait la base de données PRELEX, et toutes les informations, statut et texte actuel des Directives Européennes pouvaient y être trouvées.

    Il a également expliqué les exigences essentielles pour tous les instruments ainsi que les exigences spécifiques aux instruments, et il fut ensuite question de savoir si toutes ces exigences étaient conformes aux Recommandations OIML. Il y avait eu beaucoup à faire en Europe pour garantir que ces exigences étaient cohérentes avec celles de l'OIML, en particulier au sein du WG8 de WELMEC, conduit par M. Lagauterie.

    Un autre point très important pour les délégués était qu'en général, les Directives Européennes ne mentionnaient que les normes européennes harmonisées pour garantir la présomption de conformité. Il avait aussi été très difficile de convaincre la Commission Européenne et le Conseil qu'il devrait aussi être possible d'utiliser les Recommandations OIML à cette fin. Cela avait été ajouté récemment et figurerait maintenant dans la Directive actualisée. Cela était unique car il ne serait pas facile de trouver une Directive avec une nouvelle approche si une autre organisation internationale était mentionnée. C'était un très bon signe pour l'Europe et pour le travail de l'OIML.

    Il a poursuivi en indiquant qu'il y avait eu une réunion du Conseil en mai, au cours de laquelle il avait été décidé de soumettre tout le contenu de la Directive au Parlement Européen, la décision du Parlement étant attendue d'ici la fin de l'année. Après cela, la mise en application au niveau national devrait prendre deux ans et demi. Il était ainsi possible que tout soit en place mi 2006. Dr. Freistetter a encore ajouté que les instruments de pesage à fonctionnement non automatique ne figureraient pas dans la liste, car une Directive datant de dix ans couvrait ce domaine.

    M. Faber a remercié Dr. Freistetter, en le félicitant d'avoir anticipé la question, et le point suivant fut abordé.

- number: '15.4'
  title: Projet de document de politique générale sur la coordination avec les Organisations
    Régionales de Métrologie Légale (RLMO)
  narrative: |2+

    M. Magaña a expliqué qu'en plus du document sur les liaisons avec les autres organisations, il avait aussi été demandé d'élaborer un document plus complet sur les relations avec les Organisations Régionales de Métrologie Légale. Le Bureau avait élaboré un projet de document qui avait

    été discuté lors du Conseil de Développement de l'OIML, et ensuite envoyé à chaque RLMO pour commentaires. Lorsque tous ces commentaires arriveraient, M. Magaña serait en mesure de faire un projet final et de le soumettre début mars au prochain Conseil de la Présidence pour discussion. Celui-ci pouvait peut-être être présenté pour approbation lors de la prochaine Réunion du Comité. Le principe de cette initiative était de créer un groupe permanent pour l'échange d'informations et la coordination de l'OIML avec les RMLO. M. Magaña n'était pas en mesure de fournir plus d'informations pour l'instant, en attendant que les RMLO lui fassent parvenir leurs commentaires.

    Le Président a remercié M. Magaña et a demandé s'il y avait des questions (aucune remarque n'a été formulée).

- number: '16'
  title: Élection du Président du CIML
  narrative: |2+

    M. Magaña a expliqué, et montré au travers d'une présentation, quelques passages utiles de la Convention de l'OIML. L'Article XV stipule que le Comité devait choisir parmi ses Membres un Président, un Premier Vice-Président et un Second Vice-Président, qui devaient être élus pour une durée de six ans, et être eligibles pour re-election par la suite. Tout mandat qui expirait entre les sessions devait être prolongé jusqu'à la prochaine session. Un Président devait maintenant être élu. L'Article XVII stipulait que les trois quarts au moins du Comité devaient voter et que quatre cinquièmes des votes exprimés devaient être acquis, les abstentions, les votes blancs et nuls n'étant pas comptés comme votes exprimés. 50 Etats Membres étaient présents ou représentés, ce qui faisait plus que les 45 requis pour atteindre le quorum. Sur la base de cette participation, au moins 40 votes devaient donc être exprimés, dont 32 devaient être obtenus. L'Article XV stipulait aussi que s'il n'était pas possible d'élire un Président, les responsabilités en seraient provisoirement assumées par le Premier Vice-Président.

    Le Président a ajouté que cette procédure était la même pour les élections comme pour n'importe quel autre vote. Il a rappelé aux Membres que la discussion sur ce processus avait commencé deux ou trois ans auparavant, et la date limite pour les candidatures agréées par le Comité était février 2003.

    Deux lettres avaient été reçues avant cette date. M. Faber était ensuite allé vers les candidats et leur avait décrit le poste tel qu'il le voyait. Il n'y avait pas dans la Convention de description de ce poste, simplement quelques lignes et puis l'obligation de suivre le Comité, de travailler avec le BIML, etc. L'un des candidats avait eu des doutes à ce stade et se rétracta après. Il n'y avait donc qu'un seul candidat, Dr. Ehrlich des Etats-Unis. Aucune forme d'entretien ou de présélection n'avait eu lieu. Le candidat s'était cependant présenté à l'assemblée en première session.

    M. Faber a indiqué qu'il n'y aurait qu'un tour de vote. Soit le candidat était accepté, soit le Premier Vice-Président, Pr. Kochsiek prendrait la suite.

    Pr. Kochsiek a dit qu'il avait eu quelques conversations avec le Second Vice-Président, Dr. Issaev, sur leurs réactions si cette situation se produisait. La recommandation des deux Vice-Présidents était que si un nouveau Président n'était pas élu, il serait demandé à M. Faber de continuer ses fonctions pour un ou deux ans supplémentaires.

    Mais dans ce cas, il faudrait procéder à nouveau à une élection en un seul tour et par bulletin secret. Si M. Faber n'obtenait pas une majorité, Pr. Kochsiek représenterait l'OIML pendant un an; dans cette éventualité, l'une de ses premières tâches serait de rechercher des candidats au poste de Président pour l'année suivante. Il devrait alors prendre des contacts en espérant qu'il serait en mesure de présenter plus d'un candidat aux Membres lors de la réunion de 2004 à Berlin, et que l'un d'eux serait élu avec la majorité requise.

    Le Directeur a vérifié la participation: 50 pays étaient présents ou représentés, ce qui permettait d'atteindre le quorum et de procéder au vote.

    Dr. Tanaka a présenté le résultat. Les votes exprimés en faveur de Dr. Ehrlich n'étaient pas en nombre suffisant; ce candidat n'avait donc pas été élu.

    M. Faber dit à Dr. Ehrlich qu'il n'y avait pas d'autre solution que de s'en remettre à la décision des Membres. M. Faber regrettait personnellement le résultat et a assuré Dr. Ehrlich de sa sympathie; il savait avec quel sérieux il avait préparé sa candidature, combien il était dévoué à l'organisation, combien il avait travaillé avec acharnement pour le MAA et de nombreux autres documents, et avec quel soin il avait préparé sa présentation. D'un point de vue personnel donc, il était désolé pour Dr. Ehrlich. Mais la conclusion du vote était sans appel. Il passa ensuite la direction de la réunion au Premier Vice-Président.

    Pr. Kochsiek commença par remercier M. Faber pour son travail. Il allait abandonner maintenant ses fonctions de Président. Suivant la Convention de l'Organisation, il incombait maintenant à Pr. Kochsiek de faire une proposition. Comme annoncé auparavant, les deux Vice-Présidents avaient décidé, si cette situation se produisait, de demander à M. Faber de poursuivre ses fonctions de Président pour un autre mandat de deux ans et qu'il soit procédé pour cela à un vote à bulletins secrets.

    M. Magaña a indiqué que des bulletins de vote en attente avaient été préparés pour divers imprévus. Il était donc possible de procéder tout de suite au second vote.

    Pr. Kochsiek a demandé aux délégués s'ils avaient des questions concernant la procédure.

    Dr. Kildal a souhaité que soit confirmé le fait que l'élection qui allait avoir lieu portait sur un mandat de deux ans.

    Le Président a confirmé que c'était le cas. Il avait aussi dit à l'assemblée ce qui se passerait si une fois de plus les quatre cinquièmes requis des votes n'étaient pas atteints.

    Une fois le quorum de nouveau vérifié, et les bulletins de vote distribués, les votes ont été comptabilisés et le résultat annoncé.

    L'élection de M. Faber n'a pu être validée en raison du trop grand nombre d'abstentions.

    À défaut d'un résultat concluant de l'élection et en application de l'Article XV de la Convention, le Premier Vice-Président du CIML, Pr. Kochsiek, était chargé d'assumer les devoirs de Président pendant un an. Il indiqua à l'assemblée qu'il poursuivrait la politique et la stratégie définies plus tôt en journée par M. Faber. Il avait été confirmé lors du Conseil de la Présidence que l'OIML souhaitait restructurer plusieurs domaines de travail: la coopération et le soutien apporté aux pays en développement, les activités des RLMO, et plusieurs procédures de l'OIML. D'autre part, Pr. Kochsiek suivrait aussi les avis exprimés par Dr. Ehrlich; la mise en application efficace du MAA, si un vote favorable était obtenu le lendemain matin; l'évaluation du Rapport Birch et le résultat du Séminaire de Saint-Jean-de-Luz; et il n'oublierait pas de rechercher des candidats voulant se présenter à l'élection du Président lors de la Réunion à Berlin en 2004.

    Le CIML a exprimé sa profonde gratitude à M. Faber pour ses réussites et sa direction pendant son mandat.

    Pr. Kochsiek a remercié Dr. Ehrlich d'avoir proposé sa candidature à la Présidence. Il était très apprécié à la fois comme ami, collège et expert. Il avait fait du bon travail, pas seulement en tant que Membre du CIML mais aussi pour la préparation de la Réunion actuelle du CIML à Kyoto. Il a demandé à l'assemblée d'applaudir Dr. Ehrlich, ce qu'elle s'empressa de faire.

    Pr. Kochsiek a ensuite demandé à M. Faber de continuer à présider cette Réunion du CIML jusqu'à la fin de la session.

- number: '17'
  title: Prochaines réunions
  narrative: "\n"
- number: '17.1'
  title: 39ème Réunion du CIML et 12ème Conférence Internationale de Métrologie Légale
    (Berlin, 2004)
  narrative: |2+

    Ces deux événements seraient très imbriqués et se tiendraient à Berlin comme décidé précédemment. Sa seule question à Pr. Kochsiek était de savoir s'il y avait des annonces particulières concernant cette Réunion.

    Pr. Kochsiek a indiqué qu'il avait déjà été décidé de tenir la 12ème Conférence Internationale de Métrologie Légale et la 39ème Réunion du CIML à Berlin. Il invitait les délégués aux deux réunions qui auraient lieu du 25 au 29 octobre 2004. Il a montré un plan de Berlin: il y avait plusieurs possibilités pour venir à Berlin: par avion, dans trois aéroports, mais la plupart des Membres arriveraient probablement à celui de Berlin Tägel. Les collègues d'Europe viendraient peut-être par la route ou le train.

    Berlin comptait approximativement 3,2 millions d'habitants. Sur le plan culturel, il y avait entre autres quelques théâtres et musées importants. Il existait plusieurs universités et Berlin était aussi un pôle de recherche. Il évoquerait plus tard la possibilité de visiter certains Instituts.

    Le PTB avait été fondé en 1887 à Berlin, et c'est une des raisons pour lesquelles Berlin avait naturellement été choisie pour accueillir la Réunion de l'OIML. La métrologie légale avait été intégrée en 1923 dans l'ancienne PTR. Après la deuxième guerre mondiale, au cours de laquelle tous les laboratoires avaient été endommagés, les Instituts de Berlin avaient été reconstruits il y a maintenant 50 ans, en 1953. En 1990, le PTB avait repris les responsabilités de ASMW (de l'ancienne République Démocratique d'Allemagne), qui avait été fermé en 2001. Il y avait maintenant deux sites, le siège à Braunschweig et le second site à Berlin. Pour la 12ème Conférence, le lieu serait le Centre de Conférence du Ministère Fédéral de l'Economie et du Travail, qui avait été choisi du fait que le PTB était un Institut National de Science et de Technologie placé sous les auspices de ce Ministère. Il a montré aux Membres une photographie du Centre.

    Le Président sortant du CIML, le Directeur et Pr. Kochsiek avaient décidé de commencer la réunion le dimanche 24 octobre avec la Réunion du Conseil de la Présidence. Il fallait trouver le temps de tenir la 39ème Réunion du CIML, la 12ème Conférence Internationale, une réunion de la Commission Financière, une réunion de la Commission Technique, une réunion du Conseil de Développement, une Table Ronde et un Atelier. Il était prévu de terminer le vendredi 29 octobre, de sorte que toute la semaine serait consacrée aux réunions. Des visites techniques dans les laboratoires de Berlin et au « Federal Institute of Materials, Research and Testing » seraient proposées, en particulier dans le domaine de la chimie. Pr. Kochsiek considérait que la métrologie dans le secteur de la chimie faisait partie des tâches très importantes pour l'avenir, et une visite à un bureau de vérification pouvait être proposé aux Membres. Le programme de divertissement prévu incluait, à ce jour, une réception de Gala sur le navire Mark Bradenburg et une visite guidée du Reichstag qui était un bâtiment très imposant et pour lequel il était nécessaire de réserver la visite plus de six mois à l'avance, ce qui avait déjà été fait. Le programme s'achèverait le vendredi 29 octobre avec une seconde Réunion du Conseil de la Présidence.

    Des informations détaillées sur le programme seraient disponibles sur les sites Web de l'OIML et du PTB à partir de mars 2004, juste après la Réunion du Conseil de la Présidence. Il se réjouissait à l'avance d'accueillir les Délégués à Berlin.

    M. Faber a remercié Pr. Kochsiek.

- number: '17.2'
  title: 40ème Réunion du CIML et 50ème Anniversaire de l'OIML (France, 2005)
  narrative: |2+

    La 40ème Réunion du CIML en France en 2005 serait très particulière, car le 50ème Anniversaire de l'OIML serait célébré cette année-là. Il y avait quelques propositions particulières pour son organisation.

    M. Magaña a regretté de ne pas avoir de vues de la ville de Lyon à montrer, mais il avait l'intention d'organiser un événement particulier. Comme le savaient les Membres, un Congrès International de Métrologie était organisé en France tous les deux ans. Cette année, il avait eu lieu à Toulon, conjointement avec IPQ, Portugal. Il était toujours organisé avec un Institut Européen. Le Congrès réunissait environ 500 personnes venant de quelques 30 pays. On comptait parmi les participants une large présence de l'industrie, et les laboratoires d'étalonnage et d'essais. Il était très similaire, par exemple, au Congrès NCSL qui était organisé aux Etats-Unis. L'intention de M. Magaña était d'organiser le CIML en même temps et conjointement avec ce Congrès International de Métrologie. Les organisateurs du Congrès étaient très intéressés par le fait de l'ouvrir à la métrologie légale, et incluraient une session de métrologie légale dans leur programme.

    Un problème posé par le programme venait du fait que ce Congrès se tiendrait du 20 au 23 juin 2005. Cela était exceptionnellement tôt pour une Réunion du CIML, car celles-ci étaient tenues

    habituellement en octobre, mais pour cette occasion, il pensait qu'il était possible de retenir la date de juin. Le Congrès n'aurait pas lieu à Paris mais à Lyon, la deuxième ville de France, qui était une ville très agréable et dynamique sur de nombreux plans y compris industriel et artistique. Les fabricants d'instruments de mesure seraient peut-être aussi invités à participer à l'exposition en liaison avec la réunion. On pouvait prévoir une grande réception pour promouvoir la métrologie légale auprès des participants à la Conférence, et bien sûr, il ferait en sorte que tous les Membres du CIML puissent assister au Congrès en étant dispensés des frais d'inscription. Il a demandé l'avis des Membres sur ce projet.

    Le Président a remarqué que lors du Conseil de la Présidence, il avait été considéré que les avantages l'emportaient sur les inconvenients. Il a demandé s'il y avait des remarques, des questions ou recommandations. En particulier, il voulait savoir si la date avancée pouvait causer des problèmes pour certaines Délégations. Par exemple, la date avancée pouvait perturber le rythme des travaux de quelques Comités Techniques, mais d'un autre côté, il y avait assez de temps pour tout préparer. Il revenait au Comité de décider du lieu et du moment de la réunion. Il a demandé si une décision finale favorable à cet arrangement pouvait être prise tout de suite.

    M. Magaña a ajouté que les salles pour le Comité avaient déjà été réservées pour la Conférence Internationale à Lyon et que son organisation était bien en cours, et par conséquent une décision rapide des Membres lui permettrait de les contacter et de commencer les préparatifs dès son retour en France. Cette décision serait rajoutée à la liste des décisions soumises au vote le lendemain.

- number: '17.3'
  title: Autres réunions
  narrative: |2+

    Le Président a annoncé qu'une proposition avait été faite concernant la réunion de 2006. Il a invité Dr. Carstens d'Afrique du Sud à prendre la parole.

    Dr. Carstens a dit aux Membres qu'il souhaitait faire une proposition préliminaire pour que la Réunion du CIML de 2006 soit accueillie par l'Afrique du Sud. Si tout le monde était d'accord, il tenterait à son retour de trouver les fonds nécessaires. Le lieu n'était pas encore fixé.

    M. Faber a remercié Dr. Carstens pour sa proposition. Il était trop tôt pour prendre une décision finale, mais il a suggéré au Comité qu'une décision devrait être prise d'accepter en principe l'invitation de tenir la Réunion de 2006 en Afrique du Sud, et qu'une décision finale serait prise lors de la Réunion du CIML en 2004.

    M. Lagauterie a dit qu'il était tenu moralement de s'assurer qu'il y aurait une traduction simultanée en français.

    M. Faber a répondu que cela serait certainement le cas à la Conférence de Berlin: cela était obligatoire pour la Conférence. Il supposait qu'il serait aussi possible de trouver sans difficulté des interprètes de français -anglais en Afrique du Sud. Il pouvait exister des difficultés lorsque les réunions avaient lieu dans des pays où ni le français, ni l'anglais n'étaient la langue nationale, mais il pensait que cela ne poserait pas de problème en Afrique du Sud.

- number: '18'
  title: Autres questions
  narrative: |2+

    ## Distinctions honorifiques de l'OIML

    M. Faber était heureux de soumettre aux Membres un point qui ne figurait pas dans l'ordre du jour et qui surprendrait peut-être certains d'entre eux.

    ## Knut Birkeland

    M. Faber a commencé par évoquer la carrière du précédent Président, M. Knut Birkeland. Il avait été un collège très apprécié pendant une longue période, dont 14 ans en tant que Prési-

    dent, rôle dans lequel il avait été remarquable, et s'était montré un excellent diplomate et stratège. Le document portant son nom était toujours utilisé et constituait la base d'une grande partie du Plan d'Action de l'OIML. Il avait toujours énergiquement mis en avant la métrologie légale. Il agissait également comme conseiller personnel de nombreuses personnes et en particulier du Président, et en signe de reconnaissance M. Faber a remis à M. Birkeland un diplôme pour sa contribution exceptionnelle à la métrologie légale ainsi qu'une version spéciale plaquée or de la nouvelle médaille OIML décernée pour la première fois cette année.

    En recevant la médaille, M. Birkeland a dit que c'était un grand honneur pour lui à son âge avancé et à un moment où sa participation au sein de l'OIML était seulement bénévole.

    ## Ian Hoerlein

    M. Faber a expliqué pourquoi l'OIML désirait décerner une distinction honorifique à M. Hoerlein qui était connu pour l'étendue de ses connaissances en métrologie légale. Contrairement à la majorité des experts en métrologie légale, il n'était pas spécialisé dans un domaine de métrologie: sa compétence couvrait tout l'ensemble des équipements de pesage et de mesure de débit. Ayant rejoint la "National Standards Commission" en 1966 en tant qu'ingénieur, son premier travail concernait la création du Laboratoire d'Approbation de Modèle d'Australie et le développement de l'équipement et des procédures d'essai, ainsi que des spécifications de conception des instruments de mesure, en particulier les cellules de pesée, le pesage en série dans les systèmes en mouvement, les peseuses avec transporteur à bande, et les débitmètres de gaz liquéfié. Cette expérience inestimable lui permettait d'entretenir d'excellentes relations professionnelles avec l'OIML.

    Depuis 1977, il conduisait la participation de l'Australie au sein des Comités Techniques de l'OIML, d'abord par correspondance et par la suite en participant aux réunions, où il contribuait de façon importante à l'élaboration des Recommandations Internationales dans de nombreux domaines. Il avait également publié plusieurs articles dans le Bulletin OIML.

    En outre, il coordonnait la contribution de l'Australie aux inter-comparaisons OIML des cellules de pesée.

    M. Faber poursuivit en disant que sa contribution à l'OIML n'était qu'une facette de son travail. Durant ses 34 années à la "National Standards Commission", il avait aussi contribué aux travaux de l'Organisation Internationale de Normalisation pour l'élaboration des normes, et de APLMF dont il assurait la coordination entre autres projets majeurs.

    M. Faber estimait qu'il avait fait un travail magnifique, et était très heureux de lui décerner un diplôme disant, "L'Organisation Internationale de Métrologie Légale exprime sa gratitude à M. Ian Hoerlein pour sa contribution exceptionnelle au développement de la Métrologie Légale au niveau international".

    En l'absence de M. Hoerlein, le diplôme et la médaille OIML furent remis à Mme Bennett.

    Mme Bennett a remercié l'assemblée et a ajouté que M. Hoerlein avait pris sa retraite il y avait environ trois ans et n'était sans doute pas au courant de cette distinction honorifique, mais elle était sûre qu'il serait enchanté.

    ## Jim Williamson

    La distinction suivante a été décernée à M. Jim Williamson, Royaume-Uni. M. Faber a expliqué que M. Williamson avait eu une longue vie professionnelle dont l'épisode le plus important avait été son travail au sein du "National Engineering Laboratory" à East Kilbride. Dans le Groupe des Projets Spéciaux, il était responsable des essais de rendement et d'endurance des pompes et moteurs hydrostatiques, des essais de performance des valves et essieux de camions, et de la normalisation des procédures d'essai. Il avait ensuite travaillé pour le "National Engineering Laboratory Flow Centre".

    M. Faber a présenté M. Williamson comme un expert très enthousiaste et dévoué, contribuant lui aussi de façon formidable au travail de l'OIML. C'était un plaisir de lui décerner, par l'intermédiaire du Délégué du Royaume-Uni, le diplôme et la médaille OIML.

    Dr. Llewellyn a accepté cette distinction au nom de M. Williamson et a remercié le Président. Il a expliqué que M. Williamson avait pris sa retraite il y a quelques mois mais qu'il ferait spécialement le voyage de Londres à Glasgow pour lui remettre cette distinction en mains propres.

    ## Gep Engler

    La dernière personne à qui M. Faber a décerné une distinction était son propre collègue des Pays-Bas, M. Gep Engler.

    M. Faber a expliqué que M. Engler était un ingénieur en électro-technique, qui était diplôme de la "Technical High School". Il avait tenu de nombreux rôles au cours de sa carrière comme Chef d'Equipe pour l'Organisation d'Etalonnage des Pays-Bas, Ingénieur en chef pour les approbations de modèle des instruments de pesage, membre de la section NMi pour l'adoption des lois de métrologie, mais aussi comme personne de contact pour l'OIML au sein du NMi.

    M. Faber poursuivit en disant que M. Engler était chargé de nombreux sujets différents en tant que spécialiste des questions relatives à l'OIML. Son rôle de président du TC 5/SC 1 et l'organisation de la récente réunion sur la révision du D 11 sur les dispositifs électroniques illustraient bien son travail et ses responsabilités.

    Le BIML a aussi fait remarquer que M. Engler mainenait des contacts réguliers avec le Bureau, faisant souvent des remarques pertinentes sur des sujets techniques et sur le site Web de l'OIML. M. Engler se montrait toujours très enthousiaste et chaleureux lors des réunions internationales.

    En recevant le diplôme et la médaille, M. Engler a exprimé sa surprise, car il était encore à quatre ans de sa fin de carrière, mais il était flatté et heureux de cette marque de reconnaissance.

    ## Questions générales

    Pr. Kochsiek a remercié le Président sortant, M. Faber, et M. Magaña, Directeur du BIML, pour la Réception de la soirée précédente et a demandé à l'auditoire de les applaudir.

    Il a indiqué au Comité qu'il lui avait été demandé si la Réunion de Berlin pouvait être organisée différemment, car certain délégués lui avaient dit que dans l'organisation actuelle de la réunion, il leur fallait s'absenter loin de leur bureau durant tout une semaine. Il aimerait donc organiser la réunion de la façon suivante:

    - Le premier jour: les groupes temporaires, à savoir le Comité pour le Budget, le Comité pour les Travaux Techniques, et les groupes de travail temporaires nouvellement créés;

    - Le deuxième jour, peut-être une discussion organisée en Table Ronde, à l'intention en particulier des pays en développement, et un Atelier sur un thème spécial, lequel ferait l'objet de discussions lors du prochain Conseil de la Présidence; et

    - Trois journées pour la 12ème Conférence et la 39ème Réunion du CIML.

    Il espérait que l'assemblée pouvait se contenter de cette idée approximative pour l'organisation des réunions à Berlin. Les Délégués qui souhaitaient abréger leur séjour auraient la possibilité de ne venir que pour les trois journées officielles. Il n'y eut aucune objection.

    Une réunion du Groupe de Travail sur le financement du MAA fut organisée à la demande de ses Membres. Pr. Kochsiek a demandé à M. Magaña de présider cette réunion et de donner la liste des membres. M. Faber avait fait quelques suggestions au Conseil de la Présidence concernant les pays d'origine des participants qu'il convenait d'avoir pour membres.

    M. Magaña a donné la liste suivante des participants du Groupe de Travail:

    Le BIML;

    Les Pays-Bas;

    L'Afrique du Sud;

    L'Australie;

    Les Etats-Unis;

    La France; et

    Le Royaume-Uni

    La réunion proposée serait brève, et le travail à venir du Comité serait effectué par correspondance.

    S'adressant principalement aux Membres des pays d'Europe, Pr. Kochsiek a annoncé qu'il y avait eu cette semaine une mini audition par le Parlement Européen à propos du MID, et son collègue, Dr. Schulz, avait été l'un des experts consultés lors de cette mini audition. Il avait téléphoné au Pr. Kochsiek la veille pour l'informer que la MID était débattue au Parlement Européen. Elle n'avait pas été rejetée par le groupe d'audition, et ainsi la prochaine étape aurait lieu le 18 novembre, après que les Etats Membres aient envoyé quelques autres commentaires sur la MID. Il était prévu que l'approbation soit votée en décembre. C'était une bonne nouvelle. Un autre point intéressant pour l'OIML était que Dr. Putzeys avait dit à Dr. Schulz qu'il y avait une décision pré-liminaire considérant que les normes harmonisées de CEN/CENELEC ou les Recommandations OIML étaient en accord avec les exigences de la MID. Les fabricants pouvaient ainsi choisir de travailler soit avec les Recommandations OIML, soit avec les normes harmonisées de CEN/CENELEC.

    Pr. Kochsiek a demandé s'il y avait d'autres questions à aborder au Point 18.

    Dr. Ehrlich a souhaité que soit mentionné dans le Compte Rendu le fait que la R 111 était maintenant terminée. Il désirait que les contributions de Dr. Glaeser (PTB) et Dr. Richard Davis (BIPM) et aussi de Kenneth Butcher soient reconnues et citées dans le Compte Rendu.

    Pr. Kochsiek pensait que cette décision avait déjà été prise lors du Conseil de la Présidence et il remerciait Dr. Ehrlich de le lui rappeler. Avec M. Magaña, il leur enverrait également une lettre de remerciements.

- number: '19'
  title: Adoption des décisions
  narrative: |2+

    Pr. Kochsiek a indiqué que ce point était le plus important de la réunion et il a demandé à M. Magaña de fournir quelques informations avant de procéder officiellement aux votes.

    M. Magaña a indiqué qu'il y aurait trois étapes:

    - Les amendements aux deux documents du MAA et un amendement au document sur les traductions des publications OIML. Ces amendements seraient montrés aux Membres en vue d'éventuels commentaires;

    Votes sur les publications; et

    Votes sur les résolutions.

    Dr. Ehrlich a suggéré de formuler les amendements au MAA, comme suit:

    1. 1, concernant l'Objet: ajouter à la fin les mots "of special note: OIML Issuing Authorities that also perform testing or examination within their organization are subject to the same evaluation of competence as testing laboratories for these activities". Cela traitait le problème soulevé entre autres par l'Allemagne visant à faire une distinction entre l'occasion et la raison permettant de procéder à l'évaluation des Autorités de Délivrance, conformément à ISO/CEI 17025;

    - Dans 4.6, ce problème apparaissait en deux endroits dans l'article "Assessments of Issuing Authorities and Testing Laboratories", dans la seconde puce, il proposait d'ajouter aux mots "Prior to establishing a Declaration of Mutual Confidence for a specific category of instruments, the Issuing Authorities as described in 4.4(a)", le texte suivant: "also perform testing or examination within their organizations", puis "shall be assessed either by accreditation or peer assessment".

    - Il y aurait peut-être quelques autres modifications pour tenter d'éclaircir ce problème, mais c'était le type de formulation qu'il proposait. Sa suggestion était de traiter ce problème sur les listes de contrôle pour indiquer clairement que les listes de contrôle avaient valeur de modèles et n'étaient pas normatives. Les autres modifications étaient les suivantes:

    - Dans 4.6.3, Dr. Ehrlich avait proposé de changer la formulation afin de lire: "model assessment requirements" au lieu de "the assessment requirements", se rapportant ainsi au Guide 65, et ensuite de rajouter "checklists that may be used for such internal audits", pour enlever le caractère obligatoire et montrer que les listes de contrôle peuvent être utilisées sans obligation stricte;

    - La dernière phrase: "pertaining to ISO/CEI DIS 17040" serait effacée;

    - Dans 4.9.1, le problème des listes de contrôle revenait encore. Il y avait deux alinéas à puces là où Dr. Ehrlich proposait d'ajouter la même formulation, disant "for an Issuing Authority that intends to review and transmit Test Reports in a Declaration of Mutual Confidence, the applicant shall submit for information the report of the results of the most recent internal audit according to requirements prepared by the Committe on Participation Review, using as a model the checklists";

    - Dans la troisième puce, qui concernait les laboratoires d'essai, il fallait indiquer à nouveau que les listes de contrôle devaient être utilisées comme modèles seulement mais que chaque Comité pour l'Examen de Participation préparerait sa propre formulation définitive de liste de contrôle;

    Dr. Ehrlich avait parlé avec M. Lagauterie la veille, et il était bien sûr aussi ouvert à sa suggestion visant à ce que les listes de contrôle incluent plus d'exigences techniques, plutôt que des exigences qualitatives, et ainsi les Comités pour l'Examen de Participation pouvaient être chargés de structurer les listes de contrôle en conséquence afin d'inclure toutes les exigences techniques lorsque approprié pour une Déclaration de Confiance Mutuelle particulière;

    Dans 4.10.1, à nouveau, il y avait une autre référence aux listes de contrôle et donc, pour une Autorité de Délivrance comme décrit en 4.4(a), elle concerne la participation à une Déclaration de Confiance Mutuelle: "Le Comité doit effectuer les tâches suivantes", et l'une d'elles consiste à "décider, en se basant sur le Rapport Interne ...", et ensuite Dr. Ehrlich avait ajouté: "définir de façon appropriée une liste de contrôle" pour qu'il soit clair qu'il ne s'agissait pas de la liste de contrôle telle que définie actuellement.

    La question du financement avait fait l'objet d'une autre discussion très importante la veille au Point 6.2 de l'Ordre du Jour. Dr. Ehrlich avait la proposition suivante à faire, à partir de la discussion:

    - Pour que dans la dernière phrase en 6.2, il soit dit: "les dépenses de fonctionnement pour l'administration du programme du MAA sont considérées dans un document séparé", avec le numéro de référence du document, et en effaçant le reste de cette phrase.

    Finalement, pour revenir au problème de la liste de contrôle, deux autres cas:

    En 8.2, il y avait deux références aux listes de contrôle, où à nouveau il proposait d'ajouter les mots: "listes de contrôle définies de façon appropriée" pour intégrer tous les commentaires qui avaient été reçus; et de façon similaire

    - En B.1.2, où il était fait référence aux listes de contrôle, il était proposé d'ajouter les mots "modèles pouvant être utilisés pour des applications spécifiques selon les listes de contrôle".

    Dr. Ehrlich indiqué que c'était ce qu'il avait trouvé de mieux pour répondre aux amendements proposés, en parcourant rapidement le texte hier soir. Il avait peut-être omis quelque chose et il y avait peut-être d'autres suggestions mais c'était ce qu'il proposait.

    Le Président a remercié Dr. Ehrlich et a ajouté que de son point de vue, il avait fait du très bon travail pendant la nuit, mais la discussion était ouverte pour entendre les questions ou remarques.

    M. Lagauterie a souhaité faire deux commentaires:

    - Dans sa forme actuelle, il était dit que "des droits pouvaient être exigés". À son avis, cela devrait changé pour "devaient être exigés"; et

    - On avait l'impression que les droits pourraient seulement couvrir les frais supportés par le BIML. Il considérait qu'ils devraient être plus importants que cela, de manière à ne pas s'enlever la possibilité d'augmenter les fonds consacrés à cette activité.

    M. Magaña pensait que la formulation pouvait être laissée telle quelle et ainsi l'implémentation incomberait aux compilateurs du prochain document financier qui fixerait ces droits. Le document financier qui serait conçu, donnerait la réponse finale disant en quoi consisteraient ces droits.

    Concernant le second point évoqué par M. Lagauterie, cela ne constituait pas un problème: les droits qui étaient recueillis par le Bureau seraient utilisés pour les frais du Bureau. Indirectement, si le Bureau devait réserver une salle de réunion pour une DoMC, cela entrerait toujours dans les frais du Bureau. Il ne voyait aucune difficulté à cela.

    M. Magaña a aussi fait remarquer que la discussion de la matinée devait être ecourtée, de façon que si la formulation pouvait être acceptée pour l'instant, le document financier qui devait être conçu puisse contenir plus de détails.

    M. Pham Ngoc Tran a indiqué que le BIPM avait lancé une initiative désignée "MRA" tandis que celle de l'OIML s'appelait "MAA". Il ne voyait pas la différence.

    M. Magaña a dit qu'il y avait eu de longues discussions sur la façon de désigner ce document. Celle du BIPM était "Accord de Reconnaissance Mutuelle", lequel consistait à reconnaître le degré d'équivalence des normes nationales: non pas l'équivalence des normes mais leur degré d'équivalence. L'OIML avait opté pour "Arrangement d'Acceptation Mutuelle"; il ne s'agissait pas d'une reconnaissance légale obligatoire systématique: le participant déclarait qu'il avait l'intention d'accepter et d'utiliser les résultats d'essais, car la reconnaissance soulevait quelques problèmes légaux dans certains pays, et il était donc question "d'accepter et d'utiliser". Il s'agissait d'un arrangement, et non d'un accord, car en effet un accord signifierait qu'il existait une sorte d'engagement légal alors qu'il ne s'agissait pas d'un accord entre gouvernements mais d'un arrangement constituant un cadre pour les Déclarations de Confiance Mutuelle. Finalement, le TC 3/SC 5 avait accepté la désignation "Arrangement d'Acceptation Mutuelle".

    Un autre document modifié a été montré aux Délégués concernant la traduction des publications OIML. Plusieurs pays avaient suggéré des modifications mineures:

    - Dans la reproduction des publications OIML, comme discuté la veille, "Les Publications peuvent être diffusées non seulement au sein de l'entreprise ou de l'organisation mais également, par exemple, au sein des Autorités locales du Royaume-Uni". Il convenait donc d'ajouter: "des réseaux réservés à ou contrôlés par l'entreprise, l'organisation ou l'institut acquéreurs"; et

    Un autre ajout au même document consistait en un nouveau paragraphe sur l'utilisation des publications OIML dans la législation, donnant: "Les Etats Membres restent libres d'incorporer le texte des publications OIML appropriées à leurs législations nationales et notes explicatives. Lorsque les publications OIML sont utilisées comme partie de la législation nationale, une traduction peut alors être obtenue facilement".

    Pr. Kochsiek a remercié M. Magaña et a demandé aux Délégués si le texte modifié était conforme à leurs exigences.

    M. Safarik-Pstrosz avait une proposition à faire concernant la seconde phrase: il faudrait peut-être ajouter entre "législation nationale" et "notes explicatives", quelque chose comme "documents informatifs", car ce type de document était très fréquemment utilisé dans les documents informatifs, lesquels, à l'inverse des textes de loi, n'avaient pas force d'engagement.

    M. Magaña a confirmé et repété la formulation proposée: "législation nationale, documents informatifs et notes explicatives".

    M. Valkeapää a dit qu'il souhaitait que soit fait un petit ajout au second paragraphe: dans le cas où les publications OIML sont utilisées comme référence dans la partie informative des textes de loi, celle-ci n'ayant pas force d'engagement, alors on pourrait peut-être en déduire qu'on ne pouvait dans ce cas obtenir facilement leur traduction.

    Pr. Kochsiek a suggéré la formulation: "Lorsque les publications OIML sont utilisées comme partie de règlements ou guides nationaux, une traduction peut alors être obtenue facilement".

    Cette formulation a reçu l'approbation générale.

    Dr. Pákay a indiqué qu'un peu plus loin dans le paragraphe, il y avait une phrase disant: "conversion of OIML publications into standards of standardization". Il y avait une erreur de langage due à une étourderie mais M. Magaña a assuré que cela serait rectifié.

    En l'absence d'autres remarques, Pr. Kochsiek a alors indiqué qu'il était temps de passer aux Décisions et Résolutions. L'appel des Délégués a d'abord été fait pour vérifier que le quorum était atteint. 49 Etats Membres étaient présents ou représentés. Le quorum de 45 était donc dépassé.

    Toutes les publications ont été adoptées par le Comité. Pr. Kochsiek a exprimé sa satisfaction pour cette situation.

    Il a été demandé à M. Szilvassy s'il pouvait indiquer quelles publications parmi celles récemment approuvées seraient applicables dans le cadre du Système de Certificats.

    M. Szilvássy a répondu que trois Recommandations seraient applicables si le Comité en décidait ainsi:

    - La révision de la R 48 Lampes à ruban de tungstène pour l'etalonnage des thermomètres à radiation;

    La nouvelle Recommandation R 135 Spectrophotomètres pour laboratoires médicaux;

    La R 49 Compteurs d'eau destinés au mesurage de l'eau potable froide.

    ## Également,

    - La R 61 était déjà applicable dans le cadre du Système, et il était nécessaire de rédiger le supplément relatif aux dispositions de transformation des Certificats, comme mentionné dans le Rapport Technique.

    M. Birdseye a indiqué qu'il lui avait semblé qu'il existait maintenant un Format de Rapport d'Essai pour la R 134 Partie A, et il pensait donc qu'elle pouvait peut-être aussi être appliquée au Système de Certificats.

    M. Szilvássy a répondu que la 37ème Réunion du CIML en avait déjà décidé ainsi, car il avait été accepté que le Format de Rapport d'Essai serait approuvé par consultation postale du CIML. Comme il n'y avait pas eu suffisamment de votes, il avait été nécessaire de le présenter devant la 38ème Réunion du CIML, mais la décision de rendre la R 61 applicable au système avait déjà été prise.

    Pr. Kochsiek a demandé à M. Magaña de lire toutes les Décisions et Résolutions pour procéder à leur approbation. Elles ont été lues comme suit:

    ## Allocutions d'ouverture

    Le Comité a pris note des allocutions d'ouverture prononcées par M. Hiroshi Ogawa, Directeur Général de Industrial Science & Technology Policy & Environment Bureau, METI, par Dr. Akira Ono, Directeur du NMIJ, et par M. Gerard Faber, Président du CIML.

    ## Appel des délégués - Quorum

    Il a été constaté après avoir procédé à l'appel des Délégués que 49 Membres du CIML (sur 60) étaient présents ou représentés et que le quorum statutaire des trois-quarts était ainsi atteint.

    ## Approbation de l'ordre du jour

    Le Projet d'Ordre du Jour Définitif (Version 2 datée 21 octobre, amendée le 28 octobre) a été approuvé.

