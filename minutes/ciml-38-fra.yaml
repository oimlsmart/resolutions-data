- number: '6.4'
  title:
  - spelling: eng
    value: Progress on the revision of the Financial Regulations of the OIML
  narrative:
  - spelling: eng
    value: |2+

      The Committee took note of information given by the BIML Director concerning the revision of the OIML Financial Regulations. The Committee instructed the Bureau to complete this Draft Revision and to submit it to Member States in time for its approval at the $ 39^{\mathrm{th}} $ CIML Meeting and $ 12^{\mathrm{th}} $ OIML Conference in 2004.

      Le Directeur du BIML a fait un rapport sur la situation des arriérés dus par certains États Membres. Le Comité a approuvé les décisions suivantes:

      - Considérant que la République Populaire Démocratique de Corée a réglé toutes ses contributions actuelles, la situation de ses arriérés restants pour lesquels des délais avaient été accordés par la $11^{\mathrm{ème}}$ Conférence, devra être réexaminée par la $12^{\mathrm{ème}}$ Conférence en 2004;

      - Considérant que les arriérés de la Zambie ont augmenté en dépit des délais accordés par la 11ème Conférence, le Comité a chargé le Président du CIML d'examiner la situation avec les représentants de la Zambie et de radier la Zambie de la liste des États Membres de l'OIML si cette situation ne s'améliorait pas significativement d'ici fin février 2004.

      Le Comité a décidé que le Vietnam sera placé dans la Classe I pour sa contribution financière à l'Organisation.

