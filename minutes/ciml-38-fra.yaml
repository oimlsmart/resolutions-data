- number: '3'
  title: 2 Situation of certain Members
  narrative: |2+

    Mr. Magaña reminded the meeting that Members had been asked the previous year to vote by correspondence on the contributory class of Vietnam, in the event of that country becoming a Member State. Vietnam had asked to be placed in the lowest class according to the possibility laid out in the Convention, but this was a decision for the Committee and so a postal ballot had been held. There had been only positive answers but, unfortunately, there had not been enough answers to reach a conclusion. He therefore proposed that a vote should be taken in the meeting, either immediately or in the resolutions at the end. He informed Members that the Bureau was proposing that Vietnam be placed in the lowest contribution class and called for comments from the floor. Since there were no objections, the matter would be added to the list of Decisions of the meeting, to be voted on the final day.

    Concerning the situation of certain Members, Mr. Magaana stated that the situation of most Members was very good: any due arrears had been paid, so there was not much to report. Two cases remained for consideration, one being more critical than the other: the Conference had granted delays in the case of certain countries, and would have to reach a decision on the matter the following year. The Democratic People's Republic of Korea had paid all their current contributions. The arrears shown in yellow on the table were arrears for which the Conference had granted delays, so the Conference would have to decide this matter the following year. The more serious case of Zambia should be examined; the Conference had granted delays to Zambia in 2000 but the current contribution and some arrears were still outstanding. Their situation must be discussed and decided. Following the previous day's Presidential Council Meeting, Mr. Faber had some proposals to make. He informed the meeting that the situation of Zambia was very serious and did not believe that this was acceptable to the Committee. He asked for comments from the floor, since the problem encompassed many years and a lot of money.

    There being no comments from Members, Mr. Faber said that in conformity with the Convention, in cases of this sort, there was no alternative other than to de-list a country. The OIML's policy was such that this step was very rarely taken, because a solution was sought whenever possible. It had to be recognized that very often arrears or difficulties were caused by economic or

    other problems in the country concerned. The normal practice, therefore, was to sit down with the countries with problems and arrive at an arrangement. There had already been a considerable amount of contact with Zambia. The Bureau had made a kind of agreement whereby Zambia promised to pay back a certain amount of money each month. Unfortunately, this was not really working, and Mr. Faber believed that the situation was unacceptable. He therefore proposed that in principle the Committee give a mandate to the President and the Bureau to de-list the country. First, however, they should negotiate for three more months in a last attempt to improve the situation. This did not mean that all the money necessarily had to be paid immediately, but that there should be an agreement acceptable to the OIML, not only on paper but resulting in the OIML actually receiving more contributions than in the previous year. Mr. Magaña asked for approval or comments from those present; there being no such comments, the decision would be added to the items to be voted on at the end of the meeting.

    ## 4 Report on Presidential Council activities

    Mr. Faber explained that as usual there was not very much to say because, as a rule, all the items discussed in the Presidential Council would be dealt with on the agenda of the CIML. For new Members, he briefly explained the nature of the Presidential Council, because this organism was not mentioned in the Convention but created by the Conference a long time ago. It was a group of nine persons, plus the Bureau. The composition was well known to delegates and in any case it was published on the OIML web site. This was an advisory committee to the President which normally met twice a year. One meeting was held in February or March for the task of going through all current activities and preparing the items and decisions to be included on the Committee Meeting agenda. For the President of the Organization, this Council was very important as it was the forum to better prepare the meetings of the Committee. The members were appointed by the President, in principle for a term of three years, but in practice, when there was a change in the Presidency the new President had the power to appoint other members. It should also be said that in this Council it was not Member States which were represented, but persons, chosen for their personal qualities.

    The Council had met on 24 and 25 February 2003, in Paris, and had gone through all the items on the Agenda. Two items received special attention:

    - Progress with the MAA. Dr. Ehrlich would report extensively about this during this meeting and a decision would be taken, but much preparation had been needed at that time; and

    The financial situation, more particularly the budget for the years 2005-2008, which would also be extensively discussed over the coming days. One of the consequences of being a Treaty Organization was that preparations for the 2005-2008 budget had to begin early in 2003. The Director and President had started even earlier than that.

    The Presidential Council had held another, shorter, meeting the previous day, 4 November 2003 where one of the most important items had been the structure for the work of assistance to developing countries. This also would be raised again in this meeting. Mr. Faber called for questions or observations from delegates. There were none.

    ## 5 Presentation of the candidates for the CIML Presidency

    Mr. Faber explained that the vote would take place on the Friday afternoon and that the required majority was 80 %. If this required majority were not reached, the first Vice-president, Pr. Kochsiek, would have to take over. There was one candidate, Mr. Charles Ehrlich, who gave an oral presentation on his views on the future of OIML.

