- number: '6'
  title: 1 Adoption of the Auditor's Report for 2002
  narrative: |2+

    The Committee took note of information given by the BIML Director concerning errors that needed to be corrected in the Auditor's Report. The Committee:

    - Instructed the CIML President to appoint a new Auditor;

    - Instructed the Bureau to have the 2002 accounts re-audited by this new Auditor; and

    - Instructed the Bureau to present these 2002 accounts at the $ 39^{\mathrm{th}} $ CIML Meeting, together with the 2003 accounts, certified by the new Auditor.

- number: '7'
  title: 1 Draft Revision of the Staff Regulations
  narrative: |2+

    The Committee took note that the draft revision of the BIML Staff Regulations would be implemented without resulting in an increase in salary costs. The Committee approved the revision of the BIML Staff Regulations, which will come into force on 2004.01.01.

- number: '9'
  title: 1 Work program of TCs/SCs
  narrative: |2+

    The Committee took note of information delivered by Vice-President Mr. Issaev and by the Bureau concerning OIML technical activities and, while expressing its satisfaction with the increased volume of work accomplished during the last 12 months (compared with the previous one-year period), requested OIML TCs and SCs to accelerate their work, especially in the fields listed as high priority and priority projects, taking into consideration proposals to accelerate OIML technical work as discussed under Item 9.3.

    The Committee approved the project as proposed by TC 18 on Ophthalmic instruments - Impression and applanation tonometer.

- number: '11'
  title: 1 General information
  narrative: |2+

    The Committee took note of information delivered by Vice-President Mr. Kochsiek and by the BIML and expressed its satisfaction with the situation, with a special view to the recent publication of P1.

- number: '12'
  title: 1 Revision of the Directives for Technical Work
  narrative: |2+

    The Committee took note of information given by the BIML on the draft Revision of the Directives and instructed the BIML to set up an ad-hoc Committee to continue the Revision of these Directives with a view to simplifying the procedures, accelerating the development and revision of Recommendations and Documents, and taking account of the requirements of the WTO-TBT Committee on international standard-setting activities. This Revision will be submitted to the CIML for approval as soon as possible.

- number: '14'
  title: 1 Task Group on Developing Countries
  narrative: |2+

    The Committee took note of a presentation given by the CIML President on activities of the Task Group on Developing Countries which had been set up at the last Committee Meeting. The Committee approved the following two proposals made by the CIML President:

    - Les Membres du CIML et le BIML de poursuivre d'autres actions générales visant à promouvoir le Système aux niveaux national, international et régional, et à maintenir informées les organisations internationales et régionales en liaison avec l'OIML des avantages du Système, en particulier en ce qui concerne ses nouvelles caractéristiques.

    Le Comité a chargé le BIML d'effectuer des enquêtes auprès des Membres OIML et des fabricants et demandeurs qui détiennent déjà des Certificats OIML, sur leur expérience au niveau de l'acceptation volontaire et l'utilisation des Certificats OIML pour les approbations de type nationales ou régionales, ainsi que leurs opinions sur le fonctionnement du Système en considérant de près les nouvelles dispositions du P 1.

    Les résultats de ces enquêtes doivent être inclus dans le rapport sur le Système pour être soumis à la 12ème Conférence l'année prochaine.

    ## 12 Évolutions - Procédures générales de l'OIML

- number: '15'
  title: 1 Metre Convention, ILAC, ISO, WTO, etc.
  narrative: |2+

    The Committee took note of a report, presented by the CIML President, on cooperation with the Metre Convention (BIPM/CIPM) and with ILAC.

    The Committee took note of a report given by ILAC and expressed its appreciation of the good cooperation between the OIML and this Organization.

- number: '17'
  title: 1 $ 3 9^{th} $ CIML Meeting and $ 1 2^{th} $ International Conference on
    Legal Metrology (Berlin, 2004)
  narrative: |2+

    The Committee took note of a presentation given by Mr. Kochsiek, on the organization of the $ 39^{\mathrm{th}} $ Committee Meeting and $ 12^{\mathrm{th}} $ OIML Conference to be held in Berlin from 25-29 October 2004, as approved at the $ 37^{\mathrm{th}} $ Committee Meeting in 2002. The Committee expressed its warmest thanks to Germany for their invitation.

