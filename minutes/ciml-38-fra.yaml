    The Secretariat of TC 8/SC 2 had been vacant for three years, but the situation was not too bad because Russia had assumed responsibility for developing the Test Report Format for R 125 and progress had been made, so hopefully this would be finalized and approved by the following year. It would thereafter be applicable within the OIML Certificate System.

    Regarding TC 10/SC 3 Barometers, an indication that the UK would relinquish the Secretariat of this Subcommittee been received. In the annual report from the Secretariat, it would be seen what the proposal was and what the result of inquiries had been for the revision of R 97.

