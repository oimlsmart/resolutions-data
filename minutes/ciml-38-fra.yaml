      The Committee took note of information delivered by the BIML on the present situation of CIML postal approval of the various drafts and decided to proceed under Item 9.5 with the approval of the following drafts, for which an insufficient number of votes have been received:

      - Amended version of R 49-2 (as amended and approved by TC 8/SC 5 based on the amended Annex A of R 49-1) together with the DR of R 49-3;

      - Three drafts (DR of the Test Report Format to the revisions of R 61-2 and R 134, and the DR of the Amendment to OIML R 99/ISO 3930).

- number: '9.5'
  title:
  - spelling: eng
    value: Approval of draft Recommendations and Documents
  narrative:
  - spelling: eng
    value: |2+

      The Committee approved the following draft Recommendations and Documents:

      - DR1 Revision of R48 Tungsten ribbon lamps for calibration of radiation thermometers;

      - DR2 Revision of R 52 Hexagonal weights, ordinary accuracy class from 100 g to 50 kg;

      - DR3 Revision of R 61-1 Automatic gravimetric filling instruments, Part 1: Metrological and technical requirements - Tests;

      - DR4 Revision of R 87 Quantity of products in prepackages;

      DR 5 New Recommendation (R 135) Spectrophotometers for medical laboratories;

      Amended version of R 49-2 Water meters intended for metering cold potable water. Part 2: Test methods;

      - Draft Recommendation R 49-3 Water meters intended for metering cold potable water. Part 3: Test report format;

      - Draft Revision of R 61-2 Automatic gravimetric filling instruments. Part 2: Test report format;

      - Draft Recommendation R 134 Automatic instruments for weighing road vehicles in motion - Test Report Format;

      - Draft amendment to OIML R 99/ISO 3930 Instruments for measuring vehicle exhaust emissions.

      et le BIML afin d'élaborer les deux projets en question et d'étudier trois nouveaux projets proposés par la France nécessaires pour l'accréditation des organismes de métrologie légale.

      Le Comité a pris note des informations données par le BIML sur la situation généralement non satisfaisante du vote par correspondance des Membres du CIML en 2003, et a demandé à ses Membres (en particulier ceux qui sont en retard dans les votes) d'être plus réguliers dans l'exercice de leurs obligations, contribuant ainsi à ce que l'approbation des projets présentés soit réalisée en temps voulu.

