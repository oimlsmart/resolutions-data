- number: '9.1'
  title: 1 General summary
  narrative: |2+

    Among the positive signs it could be mentioned that:

    During the past year, 10 technical meetings had been held, a positive development when compared with 3 in the previous year. Hopefully, during the following year, a high number of revised and new Recommendations and Documents would be ready for approval;

    - As a result of the current year's progress, 7 revised Recommendations and 3 new Recommendations were being presented for CIML approval;

    - OIML D1 and D11 were also at a well advanced stage;

    - A large number of documents had been circulated for CIML postal ballot and/or approval; and

    Some "dormant" Secretariats had restarted their activities in 2003.

    It could therefore be stated that over the past 12 months there had been a real increase in both activity and results.

    However, among the negative aspects it was necessary to mention that:

    - About 1/3 of approved projects had not been developed during the last 12 month period. There were several reasons for this - delayed projects, projects awaiting finalization or ongoing revision by ISO, IEC and other international or regional standardization organizations;

    - Revisions which were due were delayed or lagging behind the schedule set by the Technical Directives; this would be dealt with more fully later; and

    Despite the fact that quite a few TCs and SCs had envisaged or promised an increase in activities for 2003 in their Annual Reports, only about half of them had been forthcoming. Improvement was needed on this point and would be discussed under 9.3.

