  narrative: |2+

    M. Magana informe le Comité de son intention d'organiser un séminaire sur les logiciels conjointement avec le BIML, qui se tiendrait en France à l'automne 1999. Il avisera les Membres de l'ordre du jour aussitôt que possible. Cette idée est accueillie avec beaucoup d'enthousiasme.

- number: '12'
  title: FUTURES RÉUNIONS
  narrative: "\n"
- number: '12.1'
  title: 34ème Réunion du CIML (1999)
  narrative: |2+

    Une proposition est reçue de la Tunisie pour accueillir la réunion de 1999; Mme Annabi fait une présentation de son pays et invite chaleureusement le CIML à se réunir à Tunis. Elle indique que ce sera la première fois que le CIML se réunira dans un pays méditerranéen, et les autres pays en développement verront sans doute cela comme une opportunité de travailler ensemble pour servir les objectifs de la métrologie légale. Le Département de la Métrologie Légale et le Gouvernement Tunisien prendront toutes les mesures nécessaires pour assurer le succès de la réunion qui sera la dernière avant le changement de siècle.

    La Tunisie, poursuit Mme Annabi, qui est le plus petit pays du Maghreb (population de 9 millions), se situe au niveau du Détroit de Sicile. La Tunisie s'ouvre au marché mondial et est très consciente des changements socio-economiques qui s'opèrent à l'échelle mondiale. La Tunisie est membre de l'OMC depuis 1994.

    M. Faber remercie Mme Annabi pour sa cordiale invitation et sa présentation bien illustrée, et confirme que le Comité accepte unanimement sa proposition. Pour ce qui est du calendrier, M. Athané propose que cette réunion du CIML soit organisée à des dates s'accordant avec la Conférence Générale des Poids et Mesures (Paris), la réunion ILAC (Rio), Métrologie 99 (France) et la réunion APLMF. Il avisera les Membres des dates proposées dès que possible.

- number: '12.2'
  title: 35ème Réunion du CIML et Onzième Conférence de l'OIML (2000)
  narrative: |2+

    M. Bennett rappelle aux participants qu'il avait été provisoirement décidé à la Dixième Conférence que la Onzième Conférence se tiendrait à Paris, à moins qu'un État Membre se propose de l'accueillir. Il indique que le Royaume-Uni espère être en mesure d'accueillir cet évènement à Londres sans pouvoir toutefois lancer une invitation définitive; la confirmation ne sera possible que d'ici six mois si le Comité accepte sa proposition.

    M. Faber remercie M. Bennett pour sa proposition provisoire, et attend avec impatience d'en recevoir la confirmation en temps utile.

- number: '12.3'
  title: 36ème Réunion du CIML (2001)
  narrative: |2+

    M. Issaev invite le CIML à Moscou pour sa réunion en 2001, sous réserve de l'approbation officielle des autorités russes. M. Birch tente également d'obtenir l'autorisation des autorités australiennes pour tenir la réunion de 2001, bien qu'il croie que M. Issaev qui a déjà fait part de ses intentions quelques mois auparavant, sera en mesure d'organiser cet événement à temps car les discussions en Russie sont déjà bien avancées. M. Birch indique que cela ne lui posera pas de problème si le choix du Comité se porte sur la Russie pour sa réunion en 2001.

    M. Faber remercie MM. Issaev et Birch, et le Comité le mandate pour prendre en temps utile la décision finale concernant ces invitations.

- number: '13'
