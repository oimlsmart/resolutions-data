    M. Athané procède d'abord aux votes sur les cinq Projets de Recommandations; les résultats de ces votes sont donnés en point 8.2 des Décisions ci-dessous.

    Il procède ensuite à la lecture des Décisions qui ont été rédigées pendant la réunion par lui-même et le personnel du BIML, et qui sont approuvées à l'unanimité.

