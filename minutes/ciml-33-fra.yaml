- number: '1'
  title: APPROBATION DU COMPTE RENDU DE LA 32$^{\text{EME}}$ RÉUNION DU CIML
  narrative: |2+

    Le compte rendu de la Trente-Deuxième Réunion du Comité International de Métrologie Légale a été approuvé sans modification.

- number: '2'
  title: ÉTATS MEMBRES ET MEMBRES CORRESPONDANTS
  narrative: "\n"
- number: '2.1'
  title: Nouveaux membres - Adhésions attendues
  narrative: |2+

    M. Athané rappelle aux Délégués que comme annoncé par le Président Faber dans son allocution d'ouverture, la République d'Afrique du Sud a récemment rejoint l'OIML en tant qu'État Membre de plein droit. Il fait part également de l'adhésion en tant que Membres Correspondants du Guatemala et de Madagascar. Concernant les adhésions attendues, M. Athané indique que la Croatie a engagé les démarches en vue de devenir un État Membre; cette adhésion devrait devenir effective en 1999.

    M. Beard exprime son plaisir de se trouver présent en tant que représentant d'un nouvel État Membre de l'OIML et fait part de la volonté de son pays de participer activement aux activités de l'OIML.

- number: '2.2'
  title: Situation de certains Membres
  narrative: |2+

    M. Athané rappelle aux participants que trois Membres Correspondants (le Bénin, le Burkina Faso et le Ghana) ont été radiés pour n'avoir pas payé leur contribution annuelle durant plus de trois ans en dépit des lettres de rappel envoyées par le Bureau. Concernant les États Membres, M. Athané indique que trois pays sont très en retard dans le paiement de leur contribution. Le Bureau leur enverra bientôt un avis pour leur signaler qu'à défaut d'un paiement rapide (c'est-à-dire, au début de 1999), ils seront, en application de la Convention, considérés comme démissionnaires.

- number: '2.3'
  title: Propositions visant à accroître la participation des Membres Correspondants
    à certaines activités de l'OIML
  narrative: |2+

    M. Faber rappelle aux participants qu'à plusieurs occasions des discussions ont eu lieu au sein du Comité et du Conseil de Présidence concernant l'opportunité d'augmenter la participation des Membres Correspondants aux activités de l'OIML, en plus des possibilités actuelles d'assister aux Conférences OIML comme observateurs et de participer aux réunions du Conseil de Développement de l'OIML et aux séminaires techniques.

    Suite à ces discussions, il a été jugé approprié de limiter cette participation accrue en donnant la possibilité (i) d'assister aux réunions du CIML en tant qu'observateurs et (ii) de s'enregistrer comme Membre-O des comités techniques et sous-comités OIML sous réserve d'acquitter un droit de participation (1000 Francs Français par TC ou SC).

    M. Faber ajoute qu'une enquête a été faite par le BIML afin d'identifier les souhaits des Membres Correspondants et d'évaluer les effets de leur éventuelle participation accrue; il revient au Bureau de présenter les résultats de cette enquête.

    M. Athané indique que l'enquête a donné des résultats très raisonnables montrant (i) que trois Membres Correspondants assisteraient aux réunions du CIML systé-

    matiquement et dix de temps à autre, et (ii) que cinq Membres Correspondants s'enregistreraient comme Membre-O d'un petit nombre de TC ou SC (environ 5 ou 6 pour chaque Membre Correspondant). M. Athané conclut que le CIML pourrait donc rendre un avis positif concernant leur participation accrue et charger le Bureau de mettre en œuvre cette décision sous le contrôle du Conseil de Présidence.

    M. Athané ajoute que la décision du CIML et sa mise en œuvre devraient être réexaminées après trois ou quatre années d'expérience. Concernant la participation aux TC/SC, il suggère qu'elle soit gérée par le BIML afin de ne pas créer un fardeau supplémentaire pour les secrétariats des TC/SC concernés; en conséquence, le droit de participation serait payé au BIML.

    M. Faber note que ces propositions reçoivent l'accord général des Membres du CIML avec, cependant, les commentaires suivants:

    - M. Kochsiek dit que le paiement de 1000 FRF devrait être fait pour les TC/SC actifs uniquement;

    - M. Magana rappelle aux participants qu'à plusieurs occasions, le Comité a discuté de la proportion entre Membres-P et -O pour chaque TC ou SC et qu'il a été admis que le nombre de Membres-O ne devait pas dépasser celui des Membres-P. Il convientrait que cette règle ne soit pas remise en cause par l'acceptation des Membres Correspondants comme Membres-O.

    M. Faber conclut en demandant au Bureau de préparer des règles pratiques préliminaires et de les soumettre au Conseil de la Présidence.

- number: '3'
  title: QUESTIONS FINANCIÈRES
  narrative: "\n"
- number: '3.1'
  title: Adoption du rapport comptable pour 1997
  narrative: |2+

    Le rapport comptable pour 1997 a été approuvé sans commentaire et le Comité a demandé à son Président et au Directeur du Bureau de le présenter à la Onzième Conférence.

- number: '3.2'
  title: Examen de la situation financiere pour 1998
  narrative: |2+

    M. Athané rapporte que cette situation est bonne pour les raisons suivantes:

    - seulement trois pays sont très en retard dans le paiement de leurs contributions;

    - les dépenses ne devraient pas trop s'écarter des estimations faites en décembre 1997;

    - les recettes devraient dépasser les estimations essentiellement à cause du paiement d'un droit d'entrée par le nouvel État Membre, contrebalancant ainsi l'éventuel petit déficit résultant de dépenses exceptionnelles de consultation.

- number: '3.3'
  title: Examen des budgets pour 1999 et 2000
  narrative: |2+

    M. Athané indique que le budget 1999 sera tel que voté par la Dixième Conférence, avec le total des contributions des États Membres en augmentation de 2,8 % comparé à 1998. Cependant, puisqu'il y a un État Membre de plus, les cotisations individuelles de chaque État Membre ne devraient augmenter que de 0,7 %. M. Athané souligne que pendant les trois dernières années, les contributions des États Membres ont augmenté en moyenne de seulement 0,3 % par an.

    Concernant les dépenses pour 1999, M. Athané précise qu'il existe une certaine incertitude résultant du fait qu'un nouvel Adjoint au Directeur doit rejoindre le Bureau pour remplacer Mlle Dupuis-Désormeaux qui a récemment démissionné. Cependant, il n'est pas possible de prédire quand ce nouveau membre du personnel rentrera en poste.

    M. Kildal souligne qu'il est nécessaire pour les États Membres de recevoir l'appel de leurs cotisations annuelles le plus tôt possible. M. Athané répond que cela sera fait au tout début de novembre comme d'habitude; il fait remarquer que, pour beaucoup de raisons, il est difficile d'envoyer les appels plus tôt.

    M. Bennett demande quand l'Euro sera utilisé. M. Athané répond que l'Euro ne sera pas utilisé en 1999; cependant, les valeurs en Francs Or, en Francs Français et en Euros pourraient être indiquées à partir de 2000 avant d'abandonner le Franc Français en 2002.

    M. Bennett indique aussi qu'il a entendu que le Gouvernement Français s'opposerait à la poursuite de l'utilisation du Franc Or par le BIPM; M. Athané répond qu'il n'a aucune information à ce sujet. Cependant, il ne voit pas pourquoi le Gouvernement Français ferait opposition à l'application de Conventions dont il est le dépositaire, après avoir autant contribué à leur développement. Ce qui peut s'avérer vrai, c'est que le Gouvernement Français n'accepte pas d'appels de cotisations établis en Francs Or uniquement, mais rien n'empêche l'OIML de tenir ses comptes en Francs Or (en tant qu'unité arbitraire de comptabilité) et d'établir ses appels de cotisations en Francs Français (ou en Euros à l'avenir).

    M. Magana dit qu'il essaiera d'examiner la situation avec le Gouvernement Français. M. Faber demande aussi au Bureau de contact le BIPM à ce propos.

    Pour l'année 2000, M. Athané signale que la charge de travail du Bureau va augmenter et que les conséquences du rapport Birkeland créeront sans aucun doute encore plus de travail, ce qui pourrait amener à accroître les effectifs du personnel du Bureau (cette question devant être soumise à la Conférence de 2000). Dans le même temps, de par les conditions économiques générales de la plupart des pays dans le monde, il serait difficile de trop augmenter les contributions des États Membres. En outre, il faut noter que le taux annuel d'inflation en France est plus faible que celui sur la base duquel le budget 1997-2000 a été établi. Par conséquent, M. Athané pense qu'il serait peut-être possible d'augmenter les contributions de l'an 2000 d'un montant moindre que celui décidé à la Conférence de 1996. Des informations sur cette possibilité seront communiquées en mai ou juin 1999.

- number: '4'
  title: POLITIQUE À LONG TERME DE L'OIML
  narrative: "\n"
- number: '4.1'
  title: Informations sur le Séminaire International le Rôle de la Métrologie dans
    le Développement Économique et Social (Braunschweig, juin 1998) et son éventuel
    impact sur la politique à long terme de l'OIML
  narrative: |2+

    M. Kochsiek rapporte que plus de deux cent experts de quelques quatre-vingts pays et dix-sept organisations internationales et régionales se sont réunis à Braunschweig en juin 1998 pour discuter du Rôle de la Métrologie dans le Développement Économique et Social. Le Séminaire était organisé par la PTB en coopération avec le BIPM, l'OIML et IMEKO. Le centre principal d'intérêt consistait à évaluer les enjeux particuliers issus de la globalisation grandissante des activités économiques. Ce n'est pas quelque chose de nouveau pour la communauté de métrologie qui a déjà créé les bases métrologiques du

    commerce mondial avec la Convention du Mètre et le SI. Néanmoins, les problèmes complexes de protection de l'environnement et du climat, de l'utilisation sécurisée de la technologie, de l'assurance de la qualité des produits, etc., nécessitent maintenant de nouveaux efforts afin d'assurer des mesurages corrects et fiables à travers le monde et de contribuer au développement économique et social. Les participants ont discuté de la façon d'atteindre cet objectif, et les sujets du Séminaire ont ainsi été très diversifiés.

    Le Séminaire a été complété par des présentations affichées de divers sujets, incluant les activités d'organisations internationales, régionales et nationales, la promotion de programmes d'organisations donatrices, une exposition sur les instruments de mesure, et des visites des laboratoires du PTB, de bureaux de vérification et d'entreprises industrielles autour de Braunschweig.

    Considérant le nombre de participants et l'entrain des discussions, les objectifs informatifs du Séminaire ont été réellement atteints, comme confirmé par les résultats de l'enquête faite pour évaluer le Séminaire. L'évaluation des réponses reçues montre que les attentes de plus de 95 % des participants ont été dépassées et que tous les participants ont trouvé le Séminaire utile - et pour beaucoup d'entre eux extrêmement utile - pour leur travail futur. Les sujets généraux des sections 1 (Besoins à satisfaire par la métrologie au regard des enjeux globaux) et 2 (Programmes de travail des organisations internationales pour la métrologie et les activités connexes) ont présenté un intérêt particulier pour la majorité des participants mais tous les autres sujets ont trouvé une audience presque aussi large. En outre, le Séminaire a clairement montré que la coopération régionale sera de plus en plus importante; diverses idées ont également circulé sur les façons de mettre en place des systèmes de métrologie nationaux.

    Des arguments et exemples concrets concernant l'importance économique et sociale de la métrologie ont été développés. L'importance de la petite et moyenne industrie pour le développement économique et social a été soulignée. Les programmes pour le soutien de ce public particulier au niveau des problèmes de métrologie et pour l'etalonnage et l'entretien des instruments de mesure ont ainsi suscité un grand intérêt. Les rapports sur le progrès réalisé dans le secteur de la santé du fait du développement des techniques de mesure et de la contribution positive d'un système efficace de vérification ont trouvé un large écho.

    M. Kochsiek conclut sa présentation en disant que le compte rendu complet du Séminaire sera disponible vers la fin de 1998 mais que des rapports ont déjà été publiés dans les journaux de la PTB et de l'OIML. Etant donné la grande satisfaction exprimée par la plupart des participants, il a déjà été convenu que ce type de réunion devrait être répété après une période appropriée. Cependant, l'action la plus importante maintenant consiste à mettre en application les conclusions du Séminaire; les organisations internationales ont un rôle tout particulier à jouer pour cela.

    M. Faber félicite M. Kochsiek et ses collègues pour leur organisation très réussie du Séminaire.

- number: '4.2'
  title: Le Rapport Birkeland
  narrative: |2+

    Une transcription intégrale des discussions à ce sujet est publiée séparément.

- number: '5'
  title: PAYS EN DEVELOPEMENT
  narrative: "\n"
- number: '5.1'
  title: Informations sur les résultats du Séminaire International de Braunschweig
    et sur la réunion du Conseil de Développement de l'OIML tenue le 28 octobre 1998,
    et
  narrative: "\n"
- number: '5.2'
  title: Examen de propositions du Conseil de Développement
  narrative: |2+

    M. Faber demande à M. Kochsiek de présenter un rapport sur ce point, étant donné qu'il a tenu le rôle de Président du Conseil de Développement de l'OIML jusqu'à la réunion du 28 octobre 1998.

    Concernant les résultats du Séminaire de Braunschweig, M. Kochsiek dit qu'il n'a rien à ajouter au rapport qu'il a présenté au Comité sous le point 4.1.

    Concernant la réunion du Conseil de Développement tenue à Séoul, M. Kochsiek informe le Comité de la nomination de Mme Annabi, Membre du CIML pour la Tunisie, comme nouveau Président du Conseil de Développement de l'OIML et suggère qu'un rapport soit présenté par elle.

    Mme Annabi signale que le Conseil de Développement a tout d'abord exprimé sa forte appréciation à M. Kochsiek pour le rôle qu'il a joué comme Président intérimaire et pour accepter de continuer à faire profiter le Conseil de son expérience. Concernant les activités futures pour la période 1999-2000, le Conseil a demandé à son Président et au Bureau de se servir des résultats du Séminaire de Braunschweig pour élaborer son programme de travail.

    Le Conseil a aussi pris note de deux articles compilés par le Bureau résumant l'activité passée et offrant des suggestions pour l'activité future. Il a été demandé au Président et au Bureau d'élaborer un programme de travail en rapport avec ces suggestions et selon les commentaires présentés pendant la réunion par plusieurs participants. Le Conseil a demandé à ses Membres d'envoyer au Bureau toutes propositions supplémentaires qu'ils souhaitent avancer concernant l'activité future. Ces propositions seront soumises aux Membres du Conseil de Développement pour approbation et ensuite au CIML. Le Conseil a pris note et apprécié le rapport donné par Dr. Wallerus, Animateur du groupe de travail sur la formation, et lui a demandé de poursuivre cette activité qui est d'une grande importance pour les pays en développement. Le Conseil a aussi pris note d'informations livrées par des représentants d'APLMF, SADCMEL, SIM et WELMEC sur des activités concernant les pays en développement. Enfin, le Conseil a exprimé son appréciation au KNITQ pour l'organisation parfaite de la réunion.

    M. Birch demande quelques clarifications concernant le programme 1999-2000 et demande s'il faut demander au Comité de l'adopter immédiatement.

    M. Kochsiek fait remarquer que l'évaluation du Séminaire de Braunschweig et les décisions issues du rapport Birkeland ne sont pas encore complètement finalisées et qu'il convient de laisser un certain temps au Conseil de Développement (ainsi qu'à son Président et au Bureau) pour finaliser son propre programme de travail. Le programme 1999-2000 a été discuté et approuvé globalement par le Conseil; cependant, il convient de réexaminer soigneusement certains points, mais cela pourrait être fait par correspondance dans les deux ou trois prochains mois.

    M. Faber conclut ce point en exprimant les félicitations du Comité à Mme Annabi pour sa nomination.

- number: '6'
  title: LIAISONS AVEC LES INSTITUTIONS INTERNATIONALES ET REGIONALES
  narrative: "\n"
- number: '6.1'
  title: BIPM et ILAC
  narrative: |2+

    M. Faber indique que les relations avec le BIPM sont bonnes, bien que les discussions concernant un éventuel rapprochement soient maintenant définitivement abandonnées. Cependant, la coopération se développe avec, par exemple, la participation conjointe dans la planification du Séminaire de Braunschweig. Il est à noter également que les réunions annuelles entre le BIPM et l'OIML impliquent maintenant ILAC. En février 1998, l'OIML a suggéré au BIPM et à ILAC d'adopter une "approche ciblée" comme définie dans le rapport Birkeland: les trois Organisations se rencontreraient pour discuter d'une question d'intérêt commun avec la participation d'experts de l'industrie et d'utilisateurs, afin d'identifier ce qu'ils pourraient attendre des trois Organisations; cependant, le BIPM ne manifeste pas d'intérêt particulier pour ce type d'action commune.

    M. Chappell ajoute qu'il existe deux domaines de coopération possibles entre le BIPM et l'OIML:

    - celui de la dureté, pour lequel un groupe ad hoc a été créé au sein du CIPM; ce groupe de travail s'est réuni en juillet au NIST, avec la participation de OIML TC 10 dont sont responsables les USA; des discussions préliminaires ont considéré l'opportunité de travailler sur une échelle de dureté, et une prochaine réunion est prévue pour fin 1998 ou début 1999 avec la participation de l'ISO;

    - celui de l'acoustique, pour lequel un groupe ad hoc (ou un comité consultatif) pourrait être mis en place par le CIPM; la coopération avec OIML TC 13 devrait alors se développer.

    M. Athané indique que le rapport du CIPM (appelé rapport Blevin) sur les Besoins nationaux et internationaux liés à la métrologie et le rôle du BIPM a été publié par le BIPM qui a accepté de fournir au BIML le nombre de copies nécessaire pour envoi à tous les États Membres et Membres Correspondants de l'OIML. Il en est de même pour l'édition 1998 de la brochure sur le Système International d'Unités (SI) qui a également été récemment publié par le BIPM.

    M. Magana remarque que le rapport Blevin contient des sujets relatifs à ceux également soulevés dans le rapport Birkeland, bien qu'avec une approche différente. Il demande s'il appartient au CIML de commenter le rapport Blevin, ou s'il convient que les Membres du CIML contactent les représentants de la Convention du Mètre de leurs pays pour discuter de ces questions.

    M. Faber répond qu'il n'est pas de la responsabilité du CIML de faire des commentaires sur un rapport publié de façon définitive.

    Concernant ILAC, M. Chappell rappelle qu'il a représenté l'OIML à la récente Assemblée Générale de ILAC, avec M. Athané. Il a communiqué un bref rapport sur les activités de l'OIML susceptibles d'intéresser ILAC.

    M. Issaev demande des informations concernant la coexistence de ILAC et de IAF. M. Chappell répond qu'aucune décision n'a encore été prise concernant une éventuelle fusion, bien que des discussions soient en cours.

    M. Kildal, qui a assisté à l'Assemblée Générale de ILAC, mentionne la possibilité pour ILAC d'avoir son secrétariat permanent situé au BIPM.

    M. Athané indique que ILAC a accepté la proposition de l'OIML concernant la révision de OIML D 10 sur les intervalles de ré-étalonnage. Il précise aussi que des contacts préliminaires ont eu lieu entre l'OIML et IAF.

- number: '6.2'
  title: JCGM
  narrative: |2+

    M. Athané rappelle aux participants que le JCGM a été créé il y a environ trois ans pour succéder à ISO/TAG 4. Le rôle de ce comité commun est strictement limité à l'élaboration de guides sur la métrologie présentant un intérêt pour les organisations membres - au nombre de huit maintenant (BIPM, CEI, IFCC, ISO, IUPAC, IUPAP, OIML et très récemment ILAC). Le Président du JCGM est Dr. Quinn, Directeur du BIPM, et le secrétariat est sous la responsabilité conjointe du BIPM et du BIML. La dernière réunion a eu lieu en novembre 1997 au BIML. Les activités principales actuelles sont:

    - d'examiner le VIM et d'initier une révision si approprié;

    - de contrôler la mise en application du GUM et l'élaboration de guides secondaires sur l'incertitude.

    M. Szilvássy ajoute que le groupe de travail sur la terminologie (JCGM/WG 2) s'est réuni deux fois en 1998 pour discuter d'une proposition faite par un groupe de travail CEI/ISO concernant les grandeurs. Cependant, aucune décision finale n'a été prise concernant une éventuelle révision du VIM.

    M. Gaba demande des informations concernant la participation des États Membres de l'OIML à la révision du VIM.

    M. Athané répond que pour l'instant, le VIM n'est pas en révision; il y a seulement des discussions concernant la nécessité de le réviser. Si la décision de réviser le VIM est prise, les États Membres de l'OIML en seraient alors informés et il faudrait étabir la participation de l'OIML à cette révision (selon toute probabilité par la mise en place d'un petit groupe de travail incluant des experts du TC 1 et un représentant du BIML).

    M. Gaba demande qu'au cas où une révision serait décidée, les États Membres de l'OIML soient invités à présenter leurs propositions concernant cette révision. M. Faber répond que cette requête est tout à fait acceptable.

    M. Chappell informe les participants que, suivant la dissolution de ISO/TAG 4, un nouveau groupe technique consultatif commun ISO/CEI sur la métrologie a été créé, afin de coordonner les activités métrologiques des comités techniques et sous-comités ISO/CEI. Certains Membres du CIML, tels que M. Birch et lui-même, ont été nommés comme représentants nationaux dans le nouveau TAG qui doit se réunir pour la première fois en novembre 1998. Un point à discuter concerne la représentation de ISO/CEI dans le JCGM.

    M. Birch demande des informations concernant la coopération entre l'OIML et ce nouveau TAG. M. Athané répond que pour l'instant, il n'a reçu aucune information concernant la possibilité pour l'OIML d'être admise comme observateur de ce TAG. Par conséquent, l'OIML ne sera pas officiellement représentée lors de la réunion de novembre bien que certains participants (comme Dr. Chappell) puisse assurer une liaison entre l'OIML et le TAG.

    M. Birch fait remarquer l'hésitation de certains TC de l'ISO à mettre en application le GUM et mentionne l'existence d'un document du TC 69 de l'ISO sur le rapport entre la Publication ISO 5725 et le GUM. M. Athané répond que, suite à une lettre de M. Birch, il a contacté la personne au NIST qui a élaboré ce rapport afin d'en recevoir une copie, mais aucune réponse n'a été reçue à ce jour. M. Birch indique qu'il a reçu une copie et qu'il l'enverra au BIML.

    M. Birch mentionne aussi l'importance du VIM pour le développement des législations nationales. Concernant le concept de "grandeur", certains points doivent être clarifiés. En métrologie légale et dans les activités de l'OIML, il faudrait éviter un emploi irrationnel des grandeurs physiques conduisant, par exemple, au mesurage en termes de volume et à la vente en termes de masse.

    M. Imai demande si le JCGM pourrait développer un guide sur l'utilisation de systèmes de qualité dans les laboratoires de métrologie. M. Athané répond que cette proposition pourrait être soumise au JCGM et suggère à M. Imai d'écrire au BIML à cette fin.

- number: '6.3'
  title: OMC
  narrative: |2+

    M. Athané confirme que l'OIML s'est vu accorder le statut d'Observateur par le Comité chargé des barrières techniques au commerce (Comité TBT) de l'OMC et était maintenant systématiquement invité à assister aux réunions du comité TBT.

    M. Szilvássy, qui a assisté à la dernière réunion du Comité TBT, indique primo que l'Annexe 1 du rapport Birkeland décrit très bien la situation de l'Accord TBT de l'OMC. Concernant le Guide de bonne pratique pour l'élaboration, l'adoption et l'application de normes, celui-ci était initialement destiné aux organismes de normalisation nationaux et régionaux mais il est maintenant demandé aux organismes de normalisation internationaux de le suivre, et cela s'applique à l'OIML. À la dernière réunion du Comité TBT, il a été décidé que dix organismes internationaux de normalisation (FAO, CEI, ISO, OCDE, OIE, OIML, UN-ECE, OMS, OMS-FAO-Commission CODEX Alimentarius, et UIT) seraient invités à une session spéciale en novembre 1999 afin de présenter un rapport sur leurs activités. Les informations à donner incluent: la transparence, la participation, l'ouverture, les procédures pour la prise de décision, la mise en application des normes, les pays en développement, et la coopération et la coordination avec les autres organismes de normalisation.

    M. Athané suggère que les Membres du CIML contactent leurs représentants nationaux au Comité TBT afin de doubler au niveau national les contacts qui existent entre l'OIML et l'OMC.

- number: '6.4'
  title: Autres
  narrative: |2+

    Dr. Imai donne une information concernant le prochain Congrès Mondial IMEKO prévu à Osaka en juin 1999 et invite les Membres du CIML à assister au Congrès et aux nombreuses réunions de TC et discussions de table ronde. Une session spéciale sur les systèmes de qualité et mesurages était aussi planifiée et des conférences plenières couvrront les aspects les plus avancés de la métrologie.

    M. Athané indique que l'OIML sera officiellement représentée au Congrès Mondial d'IMEKO. Cependant, il n'y aurait aucune présentation de l'OIML à cette occasion étant donné qu'il en avait déjà fait une il y a moins de deux ans à la réunion IMEKO à Tampere.

    Pour répondre à M. Birch, M. Athané résume la relation entre la Commission Européenne et l'OIML. La question la plus importante concernant la coopération est bien sur l'élaboration de la Directive Européenne sur les instruments de mesure (MID) avec la nécessité de s'assurer que les instruments satisfaisant aux exigences de l'OIML seront aussi conformes aux exigences essentielles et spécifiques contenues dans la MID et ses annexes. En cela, il a été fortement soutenu et aidé par WELMEC et par les Membres du CIML des pays membres de l'Union Européenne et de l'EFTA. Bien que la MID ne soit pas encore finalisée, on peut considérer que l'action a été concluante puisque la Commission a accepté de se référer à l'OIML dans la MID, mais de façon non encore totalement définie.

    M. Bennett confirme qu'un point essentiel sera de déterminer comment étabir et maintenir à jour la liste des publications OIML donnant une présomption de conformité aux exigences de la MID. Actuellement, il n'y a eu que des réflexions préliminaires à ce sujet; cependant, il est clair que la liste devra être une liste "dynamique" mise à jour chaque fois que de nouvelles publications OIML appropriées sont publiées. En outre, s'il est assez normal que la Commission donne des mandats aux Organismes de normalisation Européens (CEN et CENELEC) en vue d'élaborer des Normes Européennes complétant la MID, ce type de mandat ne serait peut-être pas approprié dans le cas de l'OIML. Par conséquent, de nouvelles procédures devront être développées dans le cadre de la relation Union Européenne-OIML.

    M. Gaba demande des informations concernant la compatibilité des trois textes (Directive Européenne, Norme Européenne, et Recommandation OIML R 76-1) suite à la publication de OIML R 76-2. Plus généralement, le danger existe que les organismes européens ne suivent pas rapidement les changements décidés par l'OIML, provoquant ainsi des divergences.

    M. Athané précise que dans le cas de la R 76, la situation n'est pas si mauvaise puisque la Norme Européenne consiste pratiquement en une copie de OIML R 76-1 (l'amendement à la R 76-1 publié ultérieurement n'est pas si important et on peut espérer que les organismes européens de métrologie légale mettront cet amendement en application au moment de procéder à des évaluations de modèle européennes). Concernant la R 76-2, elle n'a aucune influence sur les exigences contenues dans la R 76-1 et dans la Norme Européenne puisqu'il s'agit juste d'un format normalisé pour donner les résultats d'essai.

    M. Gaba fait aussi remarquer que les certificats européens d'approbation de modèle et les certificats OIML ne sont pas identiques. Il suggère que ce point soit considéré par le TAG $ _{cert} $ de l'OIML.

- number: '7'
  title: ACTIVITÉS LIÉES À LA RECONNAISSANCE MUTUELLE DES RÉSULTATS D'ESSAI, À L'ACCRÉDITATION,
    etc.
  narrative: |2+

    M. Chappell donne une présentation détaillée et commence en notant que lors des discussions sur le Rapport Birkeland, nombre de références ont été faites à l'accréditation, sur la façon dont elle est liée au travail de l'OIML et de quelle manière la confiance mutuelle peut mieux être établie. L'un des objectifs est d'étabrir la confiance envers le Système de Certificats OIML pour les Instruments de Mesure, de mettre en place une sorte de mécanisme pour la reconnaissance mutuelle ou multilatérale et l'utilisation des certificats OIML, et d'étabrir la confiance dans le fait que les instruments individuels sont conformes aux modèles.

    Un certain nombre de Comités Techniques de l'OIML sont actifs dans ce domaine, par exemple le TC 1 Vocabulaire de métrologie légale, car il est vital que les termes de métrologie légale soient biens définis et compris, et le travail d'élaboration du Vocabulaire est en cours. Le TC 3 Contrôle métrologique a aussi produit un certain nombre de documents pertinents, de même que le TC 4 Étalons de mesure et dispositifs d'etalonnage et de vérification. Le TAG $ ^{cert} $ a élaboré un document important couvrant le Système qui est en révision pour clarification, et lors de la réunion du Conseil de Présidence de 1997, le Président a créé un Groupe de réflexion sur l'accréditation.

    Dans les applications de l'accréditation, l'activité spécifique de l'OIML pour l'évaluation de modèle est concernée, comme le sont les vérifications primitive et ultérieure ou périodiques, et la déclaration de conformité d'instruments individuels à un modèle, faite par les fabricants, ou les exigences pour la vérification primitive, pour l'inspection de produits préemballés, pour l'échantillonnage et pour l'entretien et la réparation des instruments.

    M. Chappell fait des commentaires sur les projets de l'OIML concernés par les problèmes d'accréditation, incluant la préparation de documents sur l'application de l'accréditation à la métrologie légale, la révision du D 13 Conseils pour les arrangements bi- ou multilatéraux de reconnaissance des: résultats d'essai - approbations de modèle - vérifications, l'établissement par le BIML de la liste des États Membres acceptant les certificats OIML, les accords bilatéraux et multilatéraux pour de telles acceptations, et les conditions afférentes.

    Depuis la première réunion du Groupe de réflexion sur l'accréditation en mai 1997 (NWML, Royaume-Uni), un certain nombre de réunions de suivi ont été tenues, dont une réunion du groupe de travail ad hoc au NIST en avril 1998. Un certain nombre de documents sont en cours d'élaboration: l'un sur le fonctionnement et l'évaluation des laboratoires d'essai de métrologie légale, établi par M. Bennett. La réunion de 1998 au NIST a abouti au projet de document Accord mutuel sur l'évaluation OIML de modèle et de type, établi par M. Chappell, Président. Le Guide sur la supervision par pairs est aussi en cours, élaboré par M. Bennett et M. Magana.

    La réunion du NIST s'est déroulée à l'initiative de la Conférence Nationale sur les Poids et Mesures des USA. Au début des années 90, un effort fut fait pour étabir l'acceptation mutuelle des certificats d'approbation de modèle entre les USA et le Canada. Depuis, la Conférence Nationale a eu des discussions avec le NMi (Pays-Bas) et avec des laboratoires du Royaume-Uni sur la question d'étabir des accords bilatéraux similaires. Il est apparu que si les USA commençaient à étabir des accords bilatéraux, cela prendrait un certain temps pour étabir une confiance mutuelle et pour mettre en place de tels accords; il est par conséquent plus sensé d'agir sur une base multilatérale. La Présidence de la Conférence Nationale a demandé à M. Chappell d'engager les discussions entre les États Membres de l'OIML intéressés au Système de Certificats OIML (le document de référence étant le Système de Certificats OIML pour les Instruments de Mesure), comme base pour de tels accords mutuels ou multilatéraux, en vue de transformer cet accord bilatéral en un effort multilatéral.

    L'objectif de la réunion a été d'établir des conditions pour l'acceptation volontaire des certificats OIML par ses États Membres, nombre d'entre eux disposant de la maîtrise pour les essais d'approbation de modèle pour diverses exigences (comme défini dans les Recommandations OIML) et pour établir des certificats OIML. Comment atteindre un accord entre de telles autorités de délivrance ou laboratoires d'essai pour l'utilisation des rapports d'essai OIML d'évaluation de modèle validés par les certificats OIML pour délivrer des certificats nationaux d'approbation de modèle dans leur pays? Cela ne constituerait pas un accord légalement obligatoire car il ne s'agit pas d'un accord multilatéral entre nations, mais plutôt d'un accord entre laboratoires d'essais au sein de divers pays et bien que ce soit un domaine global, une grande somme de connaissances existe dans cette petite communauté d'experts et de laboratoires familiers entre eux. Par exemple, nombre de fabricants des États-Unis ont obtenu des certificats OIML dans des laboratoires européens.

    Que faut-il donc pour établir la confiance mutuelle entre les divers laboratoires? Le moyen de base serait l'accréditation des laboratoires d'essais. Cependant, il y a beaucoup de discussions qui peut-être indiquent que la supervision par pairs est nécessaire. Mais soit l'accréditation, soit la supervision par pairs devrait être le type même d'approche fondamentale pour établir la confiance, bien que d'autres actions soient aussi nécessaires, par exemple les échanges d'informations en ce qui concerne les possibilités nationales, peut-être avant même de considérer l'accréditation ou la supervision par pairs. La formation du personnel des laboratoires d'essais, l'échange de données d'essai et les intercomparaisons (un effort à long terme) constitueraient des activités continues.

    M. Chappell donne ensuite une définition quant à la signification réelle du terme "accréditation": procédure par laquelle un organisme ayant autorité donne la reconnais-

    sance formelle qu'un organisme est compétent pour effectuer des essais spécifiques. Mais les laboratoires de métrologie légale, par définition, sont reconnus comme compétents par les gouvernements, et accréditer ainsi ces laboratoires peut provoquer un conflit.

    Les exigences OIML pour l'accréditation (personnel suffisant et compétent, procédures de documentation, instrumentation et équipement d'essai et étalons raccordables aux étalons de mesure nationaux et internationaux) sont fondamentalement contenues dans le Guide 25 ISO, aussi l'OIML n'a pas l'intention d'utiliser ou d'élaborer d'autres critères spécifiques, sauf pour des applications spécifiques aux besoins de l'OIML. L'OIML n'établira pas d'organisme d'accréditation dans le cadre de la métrologie légale, mais autant que possible devra utiliser les organismes d'accréditation nationaux existants. L'idée de supervision par pairs est que l'OIML ne devrait peut-être pas utiliser les organismes d'accréditation mais nommer des experts au sein de notre propre communauté en tant que pairs superviseurs des activités. M. Chappell ajoute que cela n'a pas encore été examiné complètement.

    Pour établir la confiance mutuelle, la compétence et l'uniformité dans les évaluations doivent être réalisées et entretenues, comme doivent l'être les capacités et la compétence des laboratoires collaborants, lesquels doivent accepter et utiliser mutuellement les rapports OIML d'essai de modèle et transmettre les informations concernant toutes les évaluations disponibles aux autres participants, et en conservant en même temps toute la confidentialité sur la propriété des fabricants impliqués.

    Dans le document Accord mutuel sur l'évaluation OIML de modèle et de type, l'Annexe A traite des conditions et identifie les États Membres qui accepteraient les Recommandations OIML sous des conditions minimales au sens qu'ils seraient juste enclins à accepter les certificats OIML; l'Annexe B précise la déclaration de confiance mutuelle, identifie les autorités de délivrance pour le Système de Certificats OIML et les Recommandations OIML concernées, les instruments de mesure ou dispositifs spécifiques ainsi que toute évaluation supplémentaire ou différente applicable.

    Bien que l'OIML s'efforce d'obtenir plus d'harmonisation, certains États Membres (les USA en particulier) ne sont pas encore rangés aux exigences de l'OIML. Mais si des évaluations supplémentaires ou différentes pouvant s'appliquer étaient identifiées, il existerait un consensus permettant à un laboratoire participant d'effectuer non seulement les essais OIML mais également tout essai supplémentaire nécessaire pour préparer le certificat, lequel serait alors reconnu par le pays concerné.

    L'un des rôles du BIML est identifié dans cette activité: tenir à jour une liste de tous les accords (et des exigences incluses) et les conditions de participation, une liste des catégories d'instruments couvertes, une liste des certificats avec publication bi-annuelle du nombre des certificats délivrés dans le cadre de ces accords. Ceci correspond aux archives actuellement définies sur le Système.

    Des documents appropriés, annonce M. Chappell, seront distribués au CIML en août 1999, et lors de la réunion du CIML en octobre 1999 un rapport sera fait aux Membres et une discussion engagée sur le statut du travail.

    Faisant suite au rapport de M. Chappell, M. Faber donne la parole aux participants pour discussion. M. Nyström demande dans quelle mesure M. Chappell a synthétisé le travail fait dans d'autres forums (par exemple ISO/CASCO), car ce genre de questions à propos de la reconnaissance mutuelle est discuté de façon universelle aujourd'hui.

    M. Nyström estime première qu'il est nécessaire de définir dans un tel document les exigences sur les organismes à qui il serait permis de rejoindre le "club", ou de détailler le système de façon claire et transparente: par exemple, il devrait être précisé que les exigences du Guide 25 ISO/CEI (et autres exigences supplémentaires) devraient être remplies pour pouvoir participer. Lors de l'évaluation d'accréditation, l'expertise ne

    peut pas être disponible sur place, et peut être prise d'autres laboratoires; la supervision par pairs et l'accréditation peuvent ainsi être combinées.

    Deuxièmement, il demande une clarification à propos du concept d"acceptation volontaire": est-ce que cela implique la mutualité, et alors cela signifie-t-il que si un rapport d'essai de son laboratoire est accepté par d'autres, il doit accepter ceux des autres? Et troisièmement, il s'interroge sur les questions de responsabilité concernant les accords de reconnaissance mutuelle; il pense qu'aux USA, c'est peut-être plus problématique qu'en Europe car l'Europe a une législation plus complexe concernant la responsabilité sur les produits. Par exemple, les questions relatives à l'assurance sont souvent soulevées dans ces circonstances: quelle sorte d'assurance devraient avoir les laboratoires participants?

    M. Chappell répond pour la première question qu'il a pris en considération le Guide 25 ISO/CEI (et la norme qui lui succède) autant que possible, en le complétant par des conditions spécifiques de l'activité de métrologie légale. Il répète qu'il est difficile de prendre en considération toute la documentation disponible sur ce vaste sujet, mais qu'il n'est pas dans son intention d'essayer d'inventer ou d'élaborer quelques nouveaux principes relatifs à l'accréditation. M. Chappell est conscient que beaucoup d'organismes régionaux (par exemple, l'Organisme Européen d'Accréditation EA) ont des documents traitant très bien du sujet; ceux-ci n'ont pas été considérés dans le détail mais seront examinés pour s'assurer que tous les principes existants (non contradictoires) sont inclus.

    En réponse à la deuxième question de M. Nyström, M. Chappell estime qu'il y a une différence entre l'accréditation et la supervision par pairs. Par exemple, un laboratoire pourrait examiner la documentation et les critères requis pour l'accréditation et déclarer "nous satisfaisons à ces critères, et donc satisfaisons aussi aux exigences pour être accrédités". Mais pour convaincre les autres de cela, des pairs pourraient évaluer l'autodéclaration, ce qui différerait quelque peu par rapport au fait d'être accrédité par un organisme national reconnu.

    L'accord proposé, continue M. Chappell, est volontaire et non pas obligatoire sur le plan légal; il y aura cependant une obligation autant que possible d'accepter les certificats délivrés parmi ceux participant au groupe.

    Concernant la troisième question, M. Chappell invite tous les experts en assurance présents à la réunion à fournir les informations appropriées, car cela n'entre pas dans son domaine de spécialisation.

    M. Apel soulève une question sur les essais par les tierces personnes. Par exemple, quand les essais de CEM sont requis, le personnel des autorités de délivrance, est-il habilité à effectuer lui-même cet essai? Deuxièmement, il fait part à nouveau de sa préoccupation concernant la surveillance et le contrôle des logiciels, qui deviennent de plus en plus vitaux pour l'approbation de modèle; est-ce que ce problème sera pris en considération par le groupe de travail de M. Chappell? M. Apel fait enfin remarquer que selon son expérience dans la Communauté Européenne, certains mécanismes sont établis pour le suivi d'approbation de modèle (comme l'accord d'approbation de modèle WELMEC) car le progrès technique poursuit constamment sa course et conduit à de nouvelles exigences, provoquant des changements de situation. Il estime qu'un mécanisme spécial (soit un groupe de travail soit un instrument) devrait être établi pour assurer que le système fonctionne réellement correctement. En supposant que cet accord fonctionne bien, un travail devrait néanmoins être assuré concernant les mesures et actions correctrices à prendre afin de tenir compte et de suivre le défi du progrès technique.

    Concernant le premier commentaire de M. Apel sur les essais par une tierce personne, M. Chappell estime que ce sujet pourrait entrer dans la même catégorie que ceux dits "de sous-traitance", c'est-à-dire un laboratoire autre que le laboratoire primaire; la politique au sein des États Membres pourrait être différente cependant. Dans

    certains cas, tant qu'il s'agit de laboratoires reconnus au niveau national, le fait que tous les essais ne soient pas effectués dans un laboratoire particulier n'a pas d'importance car un individu dans l'organisation des essais doit prendre la responsabilité du rapport d'essai; en parallèle se situerait l'autorité de délivrance d'un certificat. Le laboratoire a la responsabilité d'examiner de façon indépendante les résultats d'essai pour déterminer si l'instrument est accepté ou non ou satisfait aux exigences de la Recommandation.

    M. Chappell note que le problème de la surveillance et du contrôle des logiciels a été abordé plusieurs fois pendant la présente réunion du CIML, et a aussi été considéré par plusieurs groupes d'étude différents, en particulier à la Conférence Nationale des Poids et Mesures des USA. Un groupe de réflexion a examiné ultérieurement ce problème, prenant en compte un certain nombre de discussions, mais sans aboutir.

    À ce propos, M. Truex explique que malencontreusement le rapport ne reflétait pas la réalité sur ce sujet. Le groupe de réflexion a vraiment essayé de tracer une ligne quant à savoir quels logiciels devraient être d'un modèle évalué et lesquels pourraient être traités sur place, et il fut décidé que cette ligne serait la première indication de la grandeur finale. Chaque chose jusqu'à ce point doit passer par un processus d'évaluation de modèle et chaque chose après ce point en est dispensée. Mais certaines de ces lignes restent encore grises. Ce que le groupe de travail sur les logiciels a recommandé (et ce que la Conférence a adopté) est de définir une politique consistant non pas à évaluer le logiciel séparément - cela signifie en effet que cette activité d'évaluation de modèle aux USA implique de poursuivre l'évaluation des logiciels, mais à ne pas mentionner le terme "logiciel" sur le certificat. Il conclut que cela ne peut aider la discussion actuelle.

    En réponse au troisième point de M. Apel, M. Chappell confirme que pour l'approbation de modèle, il existe un point important concernant la vérification et la vérification ultérieure nous ramenant aux autorités d'approbation sur des problèmes pouvant survenir sur le terrain, et que les instruments individuels soient conformes ou non au modèle ou qu'il y ait un problème quelconque pour évaluer l'instrument, cela mérite d'être examiné plus attentivement. Pour rester dans le cadre d'un tel accord mutuel, des réunions sont périodiquement tenues entre les experts ou fonctionnaires effectuant les essais, pour échanger des informations et entretenir la sensibilisation quant aux problèmes pouvant survenir. Cela produit une rétroaction en améliorant et en faisant les changements nécessaires aux Recommandations OIML concernées, par exemple en fournissant un retour d'informations aux Secrétariats des TC/SC.

    Dans l'ensemble, cette activité - si réalisée - aidera à étabrir la confiance dans les mesures plus largement que maintenant et accroîtra aussi l'harmonisation, de la même façon que le Système de Certificats lui-même contribue à l'harmonisation au sein des États Membres par l'acceptation et l'adoption des pratiques de l'OIML.

    M. Bennett ne cache pas une certaine déception devant le fait que deux années après la Table Ronde sur l'Accréditation à Vancouver, aucun document en tant que tel ne soit encore présenté à la discussion, tout en avouant sa part de responsabilité en ayant tardé à élaborer ces projets. L'accréditation doit être le point final à atteindre; les autres options ne sont pas à considérer, à long terme, comme allant vers la transparence et réalisables à l'échelle mondiale. Les jours sont révolus (s'ils ont jamais existé) où l'on peut croire qu'il suffit aux gouvernements de décider qu'ils sont compétents pour telle chose et que tout le monde va acquiescer, et une certaine forme d'accréditation sera la voie pour l'établissement d'une confiance sans zone d'ombre.

    L'un des documents présentés par M. Chappell est "Fonctionnement et évaluation des laboratoires d'essai de métrologie légale". M. Bennett pense que ce titre est plutôt obscur et ne décrit pas réellement le contenu du document. En fait, il s'agit d'une discussion sur la façon dont les laboratoires d'essai de métrologie légale pourraient être évalués et

    accrédités, et en particulier quels aspects de la gestion et de la performance de ce type de laboratoire devraient être examinés pour s'assurer de leur compétence au regard des objectifs de la métrologie légale. Cela est basé sur les développements du Guide 25 par lesquels le nouveau Guide 25 prévoit dans une de ses annexes des exigences supplémentaires pour des domaines spécifiques d'essai et de certification. L'annexe au document à laquelle M. Chappell se réfère est destinée à fournir ces exigences supplémentaires qu'un organisme d'accréditation utilisait avec le Guide 25 afin d'étabir la compétence d'un laboratoire d'essai en métrologie légale. Armé de ces deux documents, l'OIML contribuera à satisfaire à toutes les exigences pour un système transparent.

    M. Bennett commente ensuite l'accord d'approbation de modèle WELMEC, qui n'est pas un accord de reconnaissance mutuelle. Il comprend deux annexes: une liste des autorités de délivrance, et une liste des signataires qui accepteront les rapports d'essai de chacun des laboratoires de la première annexe. Deuxièmement, son contexte est particulier à la situation légale en Europe - M. Bennett ne pense pas que l'Accord WELMEC soit transposable hors Europe, car d'évidence il commence juste à fonctionner en Europe.

    M. Bennett croit que l'existence d'un Registre OIML aiderait l'acceptation des certificats OIML car la combinaison d'un certificat OIML émis par un laboratoire figurant sur le Registre OIML, fournirait une plus grande confiance à un autre laboratoire pour accepter ce certificat, même sans accord de reconnaissance mutuelle. Il suggère que le CIML considère que premièrement le groupe de travail ad hoc devrait acquérir un statut plus permanent, et deuxièmement qu'un Registre des laboratoires accrédités soit établi.

    Concernant un futur Registre OIML d'accréditation, M. Apel désire savoir qui sera (ou est) considéré comme organisme d'accréditation qui va accréditer ces autorités de délivrance d'approbations de modèle. Car finalement, la confiance dans l'accréditation repose également sur le type d'organisme qui subit cette accréditation.

    M. Chappell soutient la recommandation de M. Bennett concernant le changement du statut du groupe de travail vers celui de comité permanent au sein de la structure OIML. Il existe deux possibilités: premièrement, il pourrait devenir un groupe technique consultatif autonome peut-être sous l'autorité du Conseil de la Présidence, ou un sous-comité par exemple du TC 3 Contrôle métrologique. Il approuve aussi la proposition d'établiir un Registre.

    M. Bennett clarifie le fait qu'il ne suggère pas de faire dépendre le Registre de quelque organisme particulier d'accréditation, mais au contraire d'en faire un outil de transparence: tout laboratoire ayant une accréditation de quelque organisme d'accréditation que ce soit entrerait cette information dans le Registre et il serait simple pour tous de constater que ce laboratoire est accrédité par un organisme d'accréditation défini. Il n'est pas question d'établir un nouvel organisme ou d'en désigner un en particulier, tous les organismes d'accréditation pouvant être mentionnés. M. Athané trouve acceptable la proposition d'établir un Registre, à l'instar de M. Magana, qui a souligné le fait que le Registre doive être très précis, car un organisme peut être accrédité en tant que laboratoire d'essais pour délivrer des rapports d'essai, mais il peut aussi être accrédité en tant qu'autorité de délivrance, et dans ce cas l'accréditation couvrira l'approbation de modèle ou la délivrance de certificats OIML. Ces deux accréditations sont différentes, d'ou le besoin d'être très précis concernant ce qui entre dans ce Registre.

    M. Vaucher estime que ce rapport est tout à fait en ligne avec le Rapport Birkeland et apprécie surtout deux points: premièrement, la notion de volontariat qui conduira à des résultats plus rapides que de rechercher un accord entre États. Il aurait préféré un accord de reconnaissance mutuelle dans ce cas. Deuxièmement, il conseille de ne pas limiter le projet à une solution unique mais de le laisser ouvert à l'accréditation ou à l'évaluation par des pairs. Même si l'accréditation est une solution logique, il y a des cas

    ou une auto-déclaration suivie d'une évaluation par des pairs peut aussi être adéquate. Il attend avec impatience de recevoir les documents.

    M. Kildal reprend le problème de l'établissement d'une base de données sur les laboratoires d'essai accrédités: le CIML ne doit pas ignorer que les organismes d'accréditation le font déjà, et en fait, en Norvège il a mis en place une page Internet répertoriant tous les laboratoires accrédités, de façon que chacun puisse savoir quels laboratoires en Norvège ont été accrédités. Il croit que cela va s'étendre à toute l'Europe et, même, au monde entier. Le CIML devrait s'assurer que le même travail n'est pas fait plusieurs fois.

    M. Bennett croit approprié de clarifier ce qui est entendu par Registre d'accréditation. Bien que n'ayant pas encore eu le temps de penser à tous les détails évoqués ici, il accepte le point de M. Magana sur la nécessité de savoir à quelle fin un laboratoire a été accrédité, c'est-à-dire si c'est pour effectuer des essais suivant le Guide 25 ou pour la certification selon d'autres Normes Européennes ou autre Guide. L'objectif est la transparence; le plus possible d'informations doivent être incluses de façon que les autorités de métrologie légale n'importe où dans le monde puissent directement confirmer par l'intermédiaire du BIML si un laboratoire est enregistré, sans avoir à chercher dans les bases de données nationales. L'enregistrement ne confère aucune nouvelle autorité sur le laboratoire, et n'implique non plus aucune reconnaissance mutuelle - il constitue simplement une trace du fait qu'un laboratoire existe et déclare avoir été accrédité par l'organisme d'accréditation X pour réaliser certains essais en conformité avec certaines normes. M. Bennett conclut en suggérant que le groupe ad hoc ou son successeur pourrait être chargé de déterminer quels domaines devraient entrer dans le cadre de cette base de données, et quelles informations sont requises.

    M. Lee soutient ces vues, à savoir que l'OIML devrait donner la possibilité d'une évaluation par des pairs en plus de l'accréditation. Il désire savoir combien d'autorités de délivrance peuvent être accréditées dans les économies en développement, ce qui amène à la question du gain produit par la mise en place d'un système d'accréditation pour la métrologie légale.

    M. Birch répond que dans son expérience, l'accréditation n'est pas plus développée que ne l'est l'évaluation de modèle. Très peu de pays en développement font des essais d'approbation de modèle et très peu sont accrédités. Le deuxième point est que les essais et la certification constituent deux activités séparées et font l'objet de deux Guides séparés (Guide 58 pour la certification), mais sa compréhension de cet accord est qu'il n'a rien à voir avec la certification, il concerne l'acceptation des rapports d'essai. Et donc, seule l'accréditation des installations d'essais nous intéresse vraiment.

    M. Engler mentionne le côté pratique des évaluations par des pairs: le document EA résultat de près de quinze années d'expérience et il souhaite attirer l'attention du CIML essentiellement sur les Annexes 1 et 2 où les évaluations par des pairs sont décrites en détail. Il pense que ces deux Annexes pourraient être entièrement (ou presque entièrement) copiées à l'identique.

    M. Faber revient sur les deux points avancés par M. Bennett: première la dernière suggestion de créer un groupe permanent au lieu d'un groupe provisoire. La façon de procéder sera discutée ultérieurement, mais il admet avec M. Bennett que ce point est assez important pour justifier une plus ample considération. Deuxièmement, M. Chappell a présenté un calendrier, et M. Faber espère qu'il sera respecté, même s'il est prévisible qu'un certain nombre de problèmes restent à résoudre. Il demande à M. Chappell de tenter de terminer le travail dans les années à venir de façon à pouvoir présenter ses documents au Comité en se conformant au calendrier prévu.

    M. Kochsiek s'inquiète aussi du calendrier plutôt long proposé par M. Chappell dans sa présentation. On peut discuter du système pendant un an. Mais combien d'années cela prendra-t-il pour rendre ce système réellement opérationnel? Concernant sa propre proposition faite il y a environ deux mois, M. Kochsiek désire savoir si le travail

    pratique peut maintenant commencer. Par exemple, une autorité de délivrance dans le domaine des machines de pesage à fonctionnement non automatique a besoin d'une accréditation, par exemple, pour les interférences électromagnétiques, les essais de logiciels, plus l'accréditation normale pour l'instrument; rendre tout cela opérationnel prend du temps et il craint que cela demande des années et des années. Et le problème principal pour le Système de Certificats est la confiance dans le Système, en même temps que la reconnaissance mutuelle des certificats d'essai. M. Kochsiek conclut en réitérant que si l'intention est de rendre le système toujours plus opérationnel, il faudrait que le travail de M. Chappell progresse significativement, mais qu'il craint que cela prenne un temps considérable.

    M. Chappell répond qu'il n'est pas pessimiste concernant l'application de cet accord, car un certain nombre de laboratoires ont réalisé leurs essais conformément à diverses Recommandations OIML depuis plusieurs d'années maintainant - beaucoup d'expérience et une certaine confiance ont ainsi été gagnées. Il y a eu de façon informelle des échanges entre experts parmi ces laboratoires, et des fabricants dans divers États Membres ont obtenu des évaluations de type ou de modèle conformes aux Recommandations OIML.

    Un certain nombre d'États Membres de l'OIML reconnaissent déjà les certificats OIML et participent à l'élaboration des Recommandations; celles-ci gagnent en crédibilité globalement, surtout dans certains pays en développement qui n'ont pas la possibilité d'effectuer de tels essais. M. Chappell croit qu'il s'agit réellement de seulement s'entendre sur la définition claire des détails précisant ce que l'accord est avant tout, et qu'un grand progrès a été fait en peu de temps. Il reste optimiste concernant le respect du calendrier et se fera lui-même un devoir de s'y tenir.

    M. Athané soulève une question à propos du Registre proposé: devrait-il être limité aux laboratoires d'essais qui effectuent des essais en vue de délivrer des certificats OIML, ou devrait-il couvrir tous les laboratoires d'essai effectuant des essais dans le domaine de la métrologie légale au sein de tous les États Membres de l'OIML? Deuxièmement, le Registre devrait-il être limité aux laboratoires d'essais, ou devrait-il inclure aussi les autorités de délivrance?

    En réponse, M. Chappell dit qu'il serait préférable que ce groupe de travail fasse plusieurs choses: l'une serait de faire une proposition sur le statut permanent et toutes les éventualités. La seconde serait de faire une proposition spécifique concernant ce Registre d'organismes accrédités et ce qui devrait y être inclus - ces informations seraient diffusées au moins au sein du groupe de travail lui-même et un consensus pourrait ainsi être obtenu. Plutôt que de prendre une décision à cette réunion concernant les mesures que nous savons pertinemment devoir prendre, M. Chappell pense qu'il serait préférable de faire une proposition pour mise en circulation et accord - cette proposition pourrait être prête pour la réunion du Conseil de la Présidence en février 1999.

    Commentant l'éventuel contenu du Registre, M. Bennett est d'accord avec M. Chappell que les détails devraient être traités au sein du groupe de travail; cependant, ce qu'il aimerait voir inclus autant que possible (car l'un des objectifs de ce Registre est justement de recueillir l'information) serait un premier pas effectif pour créer la confiance et une éventuelle reconnaissance mutuelle.

    M. Birch n'est pas en complet accord avec le dernier commentaire de M. Bennett; il est bien sur globalement du même avis, mais personnellement, il considère cet accord particulier comme limité aux Recommandations applicables au Système de Certificats OIML, autrement dit celles incluant des procédures d'essai et des formats de rapports d'essai. Il estime que le Registre doit être limité à l'accréditation pour ces Recommandations particulières. S'il est bon de disposer d'informations, trop d'informations peuvent aussi porter à confusion.

    M. Apel exprime l'avis qu'un tel Registre n'a pas de raison d'être s'il ne concerne que l'accréditation dans le domaine de la métrologie légale, et demande de préciser l'idée de

    valeur ajoutée pour tous les laboratoires accrédités qu'ils soient enregistrés par EA ou par un organisme national. Il approuve le commentaire de M. Birch disant que trop d'informations (ou trop de détails) ne serait pas seulement source de perte de temps mais aussi pas très rentable.

    M. Issaev est d'accord avec la proposition de M. Chappell disant qu'il est nécessaire de discuter ce problème dans un groupe de travail car il est très difficile de tirer des conclusions et de parvenir à une décision finale pendant cette discussion. Mais il admet qu'un Registre répertoriant les laboratoires d'essais impliqués dans les essais d'approbation de modèle est une bonne idée car, par exemple, dans la Fédération Russe, seulement 24 laboratoires sont accrédités en tant que laboratoires d'essais pour les approbations de modèles. Il serait donc intéressant de savoir combien de laboratoires existent à travers le monde, mais il reconnaît qu'il convient aussi de discuter davantage de cette question.

- number: '8'
  title: ACTIVITÉS TECHNIQUES
  narrative: "\n"
- number: '8.1'
  title: Examen de la situation de certains TC/SC
  narrative: |2+

    M. Chappell aborde ce point en mentionnant qu'il suit cette activité en étroite collaboration avec M. Szilvássy du Bureau. Un rapport écrit ayant été distribué à tous les participants, il se contentera dans son rapport d'identifier les points clés de l'activité technique de certains TC/SC de l'OIML.

    Il rappelle tout d'abord aux participants que les secrétariats des TC/SC doivent fournir au Bureau des rapports annuels pour soumission au Conseil de la Présidence et distribution à tous les Membres du CIML, et synthèse dans le Bulletin OIML.

    Sur la base des rapports annuels de 1997, il apparaît que deux sous-comités sont vacants: le TC 3/SC 4 Application des méthodes statistiques et le TC 7/SC 3 Mesurage des surfaces. M. Chappell suggère que les pays volontaires pour prendre la responsabilité de ces secrétariats se désignent d'urgence.

    M. Kochsiek annonce que l'Allemagne est volontaire pour prendre la responsabilité du TC 3/SC 4 et cela est accepté par le Comité.

    Concernant le TC 7/SC 3, M. Bennett et M. Birch indiquent, sous réserve de confirmation, que leur pays envisagent de prendre la responsabilité du secrétariat. Le Comité décide que si l'Australie ou le Royaume-Uni confirment leur intention, la responsabilité du secrétariat sera automatiquement attribuée à l'un ou à l'autre. Si les deux pays maintiennent leur proposition, ils devront parvenir ensemble à un arrangement.

    M. Chappell fait ensuite remarquer que deux sous-comités du TC 16 souffrent encore d'une très faible participation. Les USA prendront contact avec certains États Membres pour les encourager à participer plus activement.

    M. Chappell fait aussi remarquer que certains nouveaux thèmes de travail devraient être acceptés par le Comité et que l'éventuelle reconfirmation (ou révision, ou annulation) de certaines publications publiées il y a plus de cinq ans devrait être examinée par les secrétariats concernés.

    Concernant le TC 15, M. Chappell indique que bien que le secrétariat soit à la charge de la Fédération de Russie, il a été convenu qu'une partie du travail serait élaborée par les USA.

    M. Chappell mentionne qu'au cours des deux années passées, il y a eu une réduction de la quantité globale du travail technique de l'OIML qui est en fait sous la responsabi-

    lité d'un très petit nombre de pays. Il convient d'examiner attentivement ce point afin d'assurer une meilleure répartition des responsabilités techniques. De la même façon, il convient que les Membres-P participent réellement au travail et, comme approprié, acceptent de prendre certaines responsabilités. Les Membres du CIML pourraient pour cela identifier les experts nationaux en mesure de participer activement aux travaux.

    Concernant les Directives pour les travaux techniques, M. Chappell demande au Bureau de les réviser principalement en vue d'identifier les éventuelles divergences avec le Guide de bonne pratique pour l'élaboration, l'adoption et l'application des normes de l'OMC.

    M. Szilvássy ajoute que l'on peut espérer que la situation technique s'améliore bientôt de par le nombre de nouveaux projets de comité soumis. Il confirme aussi la nécessité pour l'OIML de mieux s'accorder aux dispositions de l'OMC, comme demandé par M. Chappell et comme mentionné dans le Rapport Birkeland.

    M. Gaba mentionne un problème rencontré par un sous-comité sous la responsabilité de son pays: le TC 3/SC 2 a commencé la révision du Document OIML D 9 mais les réactions des Membres-P ont été très limitées et seulement deux tiers ont répondu; cela est sans doute dû au fait que l'OIML D 1 et le VML doivent être révisés avant le D 9.

    M. Issaev indique qu'il est plus ou moins satisfait de l'activité des TC/SC (et de la participation à ceux-ci) placés sous la responsabilité de son pays. Cependant, il doit demander au Comité d'annuler trois projets de travail: deux sur la conductométrie et un sur la viscosimétrie. Le Comité accepte cette proposition. M. Issaev propose aussi de nouveaux thèmes de travail dans les domaines de la pyrométrie et des méthanomètres utilisés dans les mines et pour les gaz combustibles. Le Comité demande au Bureau de procéder aux enquêtes nécessaires parmi les Membres-P des TC/SC concernés. M. Issaev confirme aussi l'accord passé avec les USA concernant le partage des tâches au sein du TC 15 et suggère de créer deux sous-comités, l'un pour les applications médicales et l'autre pour les processus industriels. Le Comité demande au Bureau d'effectuer les consultations appropriées à cette fin. Concernant le TC 17/SC 2 sur la saccharimétrie, M. Issaev exprime son embarras quant aux décisions à prendre: ni la France, ni l'Allemagne qui ont été très actifs par le passé n'ont d'idées précises à ce sujet. Par conséquent, il suggère au Conseil de la Présidence de donner un avis.

    M. Birch indique que les développements au niveau régional augmenteront probablement la charge de travail technique de l'OIML et qu'il reviendra là-dessus au point 11.4. Il indique aussi que bien que les réunions du CIML soient maintenant réellement internationalisées, il faudrait faire de même pour les réunions techniques qui dans la plupart des cas ont lieu en Europe, sans coordination des dates et des lieux, ce qui rend la participation des experts non européens parfois très difficile si ce n'est impossible. Le fait que ces réunions ne traitent pas toujours de problèmes techniques liés ne devrait pas être un motif pour ne pas les coordonner. M. Athané dit qu'il comprend très bien les arguments de M. Birch et que le Bureau fait de son mieux pour assurer la coordination des réunions mais que cela n'est pas toujours possible.

    M. Gaba fait part des difficultés rencontrées au sein du TC 10/SC 1 dont la Bulgarie et la République Tchèque ont la responsabilité conjointe. Ce double secrétariat ne rentre pas dans les règles des Directives OIML pour les travaux techniques et en fait ne fonctionne pas correctement. Il confirme que la République Tchèque souhaite en assumer seule la responsabilité. Le Comité demande au Bureau de contacter le Membre du CIML pour la Bulgarie et de lui demander de céder la responsabilité du secrétariat. A propos des doubles responsabilités de secrétariats, il est rappelé que la coopération entre la Belgique et la France pour le TC 8/SC 7, et entre la France et l'Allemagne pour le TC 9/SC 2 fonctionne très bien et qu'il convient que l'application des règles des Directives ne soit pas trop stricte.

    M. Magana suggère que l'OIML traite du sujet des logiciels associés aux instruments de mesure, pour attester de leur fonctionnement correct et du fait qu'ils ne facilitent pas la fraude. Des travaux sont en cours au sein de l'ISO et pourraient servir de base à ceux de l'OIML. Il est sans doute prématuré de créer un sous-comité pour cela mais un séminaire pourrait être organisé en 1999. Le Comité accepte cette proposition et charge M. Magana d'organiser ce séminaire en étroite coopération avec le Bureau.

    M. Kildal demande des informations concernant la révision de la Recommandation OIML R 46 sur les compteurs électriques. M. Kochsiek explique que l'Allemagne a du mal à s'acquitter de sa responsabilité sans la participation active d'un nombre suffisant de Membres-P. Cependant, la situation devrait être clarifiée dans les mois à venir.

    M. Voorhof demande si la proposition pour un nouveau projet de travail sur les GNC au sein du TC 8/SC 7 est immédiatement acceptable et le Comité exprime son accord puisque la proposition a déjà été approuvée par une majorité de Membres-P de ce souscomité. De la même façon, le Comité prend note de la proposition de M. Chappell de commencer la révision de la R 105.

- number: '8.2'
  title: Approbation de Recommandations Internationales
  narrative: |2+

    M. Faber mentionne les six projets soumis pour approbation du CIML et indique qu'il y a sans doute un problème pour l'un d'eux: le PR 4, la révision de la R 65 Exigences pour les machines d'essai des matériaux en traction et en compression pour lequel un travail parallèle est fait au sein de l'ISO avec des risques de conflit. Cela est confirmé par M. Kochsiek qui indique que son pays voterait contre ce projet. M. Athané indique qu'il s'agit d'une question de principe: l'OIML devrait s'en tenir aux règles de coopération acceptées par l'ISO, la CEI et l'OIML; en particulier, tout devrait être fait pour éliminer tout risque de divergence entre les Recommandations OIML et les Normes ISO et CEI. M. Chappell indique qu'il n'a pas reçu de réponse spécifique de l'ISO concernant d'éventuelles différences entre les projets de l'OIML et de l'ISO et que le projet a été fortement soutenu par presque tous les Membres-P. Après discussion et examen de deux possibilités (soit reporter l'approbation, soit approuver le texte mais en différant sa publication jusqu'à obtention d'un accord avec l'ISO), le Comité retient la première possibilité mais se range à l'avis de M. Chappell selon lequel l'ISO à la demande de l'OIML doit fournir rapidement les commentaires relatifs à d'éventuelles divergences entre les documents ISO et OIML et, à défaut de réponse de l'ISO avant une date limite, alors l'OIML pourrait en toute conscience approuver et publier le projet en son état actuel. M. Chappell et le Bureau sont chargés de contacter l'ISO à ce sujet.

    M. Issaev indique que l'OIML devrait tenter d'éviter le problème rencontré avec OIML R 54 sur l'échelle de pH.

    M. Kildal dit qu'à l'avenir, ce type de problème devrait être considéré et résolu avant les réunions du Comité.

    Les cinq autres projets sont approuvés avec les résultats suivants:

    - PR 1: Addenda (procédures d'essai et format du rapport d'essai) à R 101 Manomètres, vacuomètres et manovacuomètres indicateurs et enregistreurs à élément récepteur elastique (instruments usuels) (Abstentions: Brésil et Canada);

    - PR 2: Addenda (procédures d'essai et format du rapport d'essai) à R 109 Manomètres et vacuomètres à élément récepteur elastique (instruments étalons) (Abstentions: Brésil, Canada et République Tchèque);

    - PR 3: Systèmes de dosimétrie par film radiochromique pour le traitement par rayonnement ionisant de matériaux et de produits (Abstentions: Danemark, Finlande, Norvège et Royaume-Uni);

    - PR 5: Révision de R 93 Frontofocomètres (Abstentions: Allemagne, Autriche, Brésil, Canada et Royaume-Uni);

    - PR 6: Ergomètres à pedalier (Abstentions: Brésil, Canada, Japon, République Tchèque et Royaume-Uni).

    Considérant le nombre d'abstentions dans ces votes, M. Chappell indique que cela est peut-être dû au fait que dans certains pays, les services de métrologie légale ne disposent pas de l'expertise nécessaire leur permettant d'établir des commentaires et d'émettre un vote sur des sujets en dehors des domaines classiques de la métrologie légale mais qui sont néanmoins très importants; il demande donc instamment aux Membres CIML de ces pays de ne pas s'abstenir car trop d'abstentions pourrait aboutir au rejet des projets. M. Faber approuve entièrement ces propos et indique que les abstentions doivent être motivées par des raisons techniques.

- number: '8.3'
  title: Disponibilité des Publications OIML sur papier, sur support électronique
    et via Internet
  narrative: |2+

    M. Athané explique que l'OIML publie actuellement les Publications OIML sur papier (avec un tirage de 500-700), sur disquette et, pour les Publications récentes, sur Internet. Certains documents doivent être réimprimés après deux ou trois ans pour reconstituer les stocks, mais les frais marginaux de réimpression sont élevés et les frais totaux d'impression pour 1998 s'élèvent à environ 400000 FRF. Certains pays demandent jusqu'à 40 copies de chaque document, que le BIML envoie à titre gratuit. Les recettes provenant des ventes aux destinataires payants (c'est-à-dire les organismes privés) se montent approximativement à 200000 FRF pour la même période, ce qui donne un déficit global d'environ 200000 FRF. Mais en fait, cette situation n'est pas aussi alarmante qu'il paraît puisque l'allocation pour ces frais est faite dans les contributions annuelles des Membres.

    Le BIML rend maintenant les Recommandations disponibles sur disquette au format Adobe Acrobat plutôt qu'en Wordperfect 5.1, toujours à titre gratuit, pour les Membres. Sur Internet, les mêmes fichiers Acrobat sont disponibles en téléchargement (sous réserve pour les Membres de valider leur mot de passe) dans le même format que la version imprimée; cela est maintenant techniquement possible par le fait que le BIML édite toutes ses Publications sur place, et que la conversion des fichiers prend très peu de temps. Progressivement, toutes les Recommandations seront rendues disponibles sous le format Acrobat.

    Il pourrait être envisagé par la suite que des organismes privés puissent aussi à l'avenir télécharger les Publications OIML via Internet, bien que cela ne soit réalisable qu'après la mise en place d'un système de paiement par carte de crédit. Mais une autre possibilité devrait être considérée: celle de rendre toutes les Publications OIML gratuites pour tous, ce qui au vu des chiffres annoncés à l'instant, conduirait à un gain net (ou une perte évitée) d'environ 200000 FRF par an si dans le même temps, l'impression sur papier était abandonnée complètement. Le Bureau, ayant récemment renouvelé ses équipements pour photocopie et impression, est toutefois dès maintenant en mesure de produire sur place des photocopies numériques de haute qualité dans le même format de brochure pliée agrafée que les documents sortant d'imprimerie. En même temps, cette politique assurerait la circulation universelle des Recommandations (pour un coût réduit), ce qui est l'objectif déclaré de l'Organisation.

    M. Athané rassure les participants sur le fait que l'impression sur papier ne sera pas stoppée immédiatement car un certain nombre de pays n'ont pas d'accès fiable ou régulier au Web, mais encourage les délégués à réfléchir sérieusement aux aspects positifs et négatifs d'une telle décision de politique, laquelle pourrait être faite peut-être l'année prochaine. Les Membres doivent garder à l'esprit le fait que, même dans le cas

    ou ils n'ont pas accès à Internet, les disquettes peuvent toujours leur être envoyées comme maintenant, ainsi qu'une photocopie de bonne qualité.

    M. Pulham suggère qu'il serait peut-être approprié, avant de prendre une quelconque décision de stratégie, de mener une enquête parmi les Membres du CIML pour savoir combien d'entre eux ont accès à Internet et combien seraient en faveur du fait que le BIML ne proposerait plus les Publications que sur disquettes ou sur le Web. M. Faber est d'accord que ce serait un premier pas intéressant et demande à M. Pulham de mener cette enquête dès que possible.

    M. Athané soulève aussi la question des droits d'auteur sur les Publications OIML; celles-ci n'étant pas protégées par copyright, quelques États Membres incorporent tout ou partie des Recommandations dans leurs réglementations ou normes nationales. Cela signifie que les fabricants ou laboratoires locaux peuvent acheter ces documents directement auprès de leur autorité nationale au lieu de s'adresser au BIML qui voit ainsi ses recettes s'amenuiser.

    Il y a aussi la question des points de vente nationaux (PVN), poursuit M. Athané: pour le moment, le seul PVN est le Royaume-Uni. Ce système fonctionne bien, et M. Athané encourage les autres États Membres à devenir des PVN, bien qu'il ne souhaite pas voir chaque État Membre devenir un PVN juste pour le plaisir; il peut ne pas y avoir un nombre suffisant de fabricants dans certains pays pour justifier un tel dispositif, aussi ne devrait-il y avoir de PVN que dans les pays ayant un nombre suffisant d'acheteurs potentiels.

    M. Birch demande pourquoi l'OIML ne protège pas ses Publications comme le font l'ISO et le BIPM.

    M. Athané répond que depuis le début, les Recommandations OIML ont été utilisées comme base pour les réglementations nationales; il revient aux pays de les utiliser ainsi, avec les transformations appropriées. Il ne peut donc, par définition, y avoir de copyright.

    M. Birch cherche une façon de protéger l'intégrité des documents, et d'assurer que des modifications érronées ne peuvent y être apportées. Des modifications ont été apportées par le passé pour s'aligner avec la législation nationale, bien qu'idéalement un seul document doive exister dans le monde entier. M. Birch se demande si le problème des droits d'auteur ne devrait pas être réexaminé par rapport à cette tendance.

    M. Faber admet que cela peut s'avérer utile, et a en fait déjà discuté de cette question avec des juristes néeerlandais. Il présentera un rapport au Comité si des faits nouveaux apparaissent.

- number: '9'
  title: SYSTÈME DE CERTIFICATS OIML
  narrative: "\n"
- number: '9.1'
  title: Informations sur le fonctionnement du Système
  narrative: "\n"
- number: '9.2'
  title: Développements du Système
  narrative: "\n"
- number: '9.3'
  title: Nouvelles Recommandations applicables au Système
  narrative: |2+

    M. Kochsiek distribue un rapport sur le Système de Certificats OIML incluant des informations à caractère général concernant son fonctionnement, son développement et les résultats en bref des deux enquêtes du BIML sur son application et sa promotion.

    Le Système a été créé il y a sept ans et est entré en vigueur en 1992 sur une base volontaire. Actuellement, 26 Recommandations sont applicables dans le cadre du Système, et la reconnaissance mutuelle (déjà discutée au point 7) constitue un concept d'importance. M. Kochsiek espère que d'ici deux ou trois ans, l'OIML obtiendra la reconnaissance mutuelle pour ses certificats, pour le plus grand bénéfice des fabricants et des autorités de délivrance. Il encourage les Membres à insister sur les bénéfices du Système de façon que le nombre de certificats (401 actuellement) continue à augmenter.

    M. Szilvássy présente quelques transparents préparés par le BIML pour retracer l'historique du Système; le Système est une façon rapide d'obtenir à moindres frais des approbations de modèle, et peut également profiter aux pays qui n'ont pas de réglementations. M. Szilvássy montre d'abord la progression annuelle de la délivrance de certificats (environ 100 pour 1998), puis la progression cumulée et enfin un graphique en forme de camembert indiquant la répartition des certificats délivrés et enregistrés: les deux "champions" sont la R 76 (186) et la R 60 (162). M. Szilvássy attire l'attention des délégués sur l'Annexe 2 résumant le Système complet: 19 pays ont maintenant des autorités de délivrance, dont l'Australie récemment, et les demandes de certificats ont émané de 24 pays.

    L'Annexe 1 résume les résultats des deux enquêtes: 67 réponses ont été reçues de 39 États Membres et 28 Membres Correspondants (soit 1/3 de tous les Membres OIML). Plus de 200 certificats ont été pris en compte ou acceptés, pour faciliter le processus d'approbation de modèle nationale. Quelques pays de l'Union Européenne ont indiqué qu'ils acceptent déjà les certificats OIML.

    La question sur l'Accord Mutuel OIML sur l'Evaluation de Modèle a été discutée lors de la réunion du Conseil de la Présidence en février 1998 et sera développée ultérieurement.

    M. Szilvássy poursuit en indiquant que cinq Recommandations ont été soumises pour approbation à cette réunion du CIML, et que dix projets sont en cours d'élaboration (dont cinq déjà reçus par le Bureau) - tous devant être applicables au Système.

    M. Szilvássy rapporte qu'il a été proposé que la publication P 1 Système de Certificats OIML pour les Instruments de Mesure (1991) soit révisée et que parallèlement aux développements des activités du groupe de travail (présentés par M. Chappell), le document OIML D 13 soit aussi révisé. L'activité du TAG devrait être relancée, mais des contributions du TC 3 et du TC 4 sont nécessaires pour cela.

    M. Szilvássy attire l'attention des délégués sur les problèmes techniques: la priorité devrait être donnée à la révision des Recommandations et à l'élaboration de formats de rapports d'essai pour les compteurs d'eau, de gaz et d'électricité.

    Les organisations internationales en liaison doivent être tenues informées des travaux techniques de l'OIML; à cette fin, il donnera au Comité TBT de l'OMC des informations sur le Système de Certificats OIML lors de sa réunion en novembre 1998. M. Szilvássy ajoute que le BIML prévoit de mettre à jour la brochure d'information sur le Système - il est temps aussi de mener une enquête auprès des fabricants d'instruments de mesure pour s'assurer de leurs intentions et avis concernant l'application du Système.

    M. Szilvássy informe les participants que le jeu complet de transparents faisant partie de sa présentation sera disponible après mise à jour en novembre 1998 sur le site Internet de l'OIML (www.oiml.org).

    En conclusion du rapport de M. Szilvassy, M. Kochsiek rappelle aux Délégués qu'il y a eu cette année quatre nouvelles Recommandations et que l'on peut s'attendre à cinq l'année prochaine, portant ainsi le total à plus de 30 Recommandations applicables au Système pour 1999.

    M. Birch demande quelques clarifications au sujet de la réunion TAG de février 1996: cette réunion a été positive au regard d'un projet de révision du Système de Certificats OIML. En particulier, des discussions ont eu lieu à propos des familles d'instruments, de la certification de modules, de l'application aux instruments individuels et des incertitudes de mesures. M. Birch ignore si la révision du document est achevée, et en particulier si la définition des "familles d'instruments" a été finalisée, bien que ces définitions soient inclues dans des Recommandations Internationales (par exemple, la R 60 Cellules de pesée).

    M. Athané répond que, comme il l'a dit à Rio, la révision du document sur les règles de fonctionnement du Système a été stoppée pour deux raisons: premièrement, la charge de travail du Bureau n'a pas permis la finalisation, des priorités devant être définies. À son avis, la révision de ce document n'est pas si urgente par le fait que le Système fonctionne correctement, et qu'il faut collecter plus d'informations sur son fonctionnement et son utilité pour parvenir à une révision significative. Deuxièmement, beaucoup de changements ont lieu actuellement dans le domaine de l'accréditation et un certain nombre de points dans le document devront être révisés, par exemple les caractéristiques des autorités de délivrance et des laboratoires d'essai. M. Athané pense qu'une révision n'est pas encore possible car d'autres travaux OIML en cours (comme celui des MRA, de l'accréditation, etc.) ne sont pas terminés et une révision superficielle ne suffit pas.

    Il aurait été possible dans une révision superficielle, poursuit M. Athané, d'introduire le concept de "familles d'instruments", et d'expliquer comment il est possible d'essayer une famille sans essayer les instruments individuels membres de la famille, mais cela est déjà pratiqué par les autorités de délivrance et des certificats couvrant des familles existent déjà. Il aurait aussi été utile d'autoriser officiellement la certification des modules; M. Athané croit que dans certains cas, il aurait été possible d'élaborer rapidement des exigences et des formats de rapport d'essai pour un certain nombre de modules, par exemple ceux associés aux pompes à essence (indicateur, compteur) ou à certains instruments de pesage (par exemple, l'indicateur de pesée, puisque les cellules de pesée sont déjà couvertes). Malheureusement, le travail réalisé par de petits groupes de travail quoique progressant, n'est pas terminé; en tout cas, les exigences et les formats de rapport d'essai n'existent pas encore pour ces modules. M. Athané conclut en répétant que la charge de travail du Bureau ne permet pas d'effectuer toutes ces tâches, et qu'en conséquence, il n'a pas attribué de grande priorité à la révision du document. M. Athané propose en outre que, si un État Membre souhaite prendre la responsabilité du secrétariat pour le TAG $ ^{cert} $ incombant actuellement au Bureau, il en fasse la demande.

    M. Birch remercie M. Athané pour cette clarification; la définition d'une "famille d'instruments" n'est pas un problème pour lui car l'Australie a déjà cette définition. Il s'inquiète cependant lorsque des TC l'incluent dans des documents: ne peut-il pas se produire que différents TC aient des idées différentes sur ce qu'est une famille? Il se demande aussi, si depuis la réunion de Rio et à la lumière des problèmes discutés avant, la révision est peut-être en réalité plus importante maintainant du point de vue de la garantie de l'existence d'un accord général et de la transparence du Système. Le document devrait peut-être être finalisé dès que le MRA le sera.

    M. Kochsiek approuve le fait que les incertitudes et autres sujets connexes doivent être pris en considération, mais rejoint M. Athané pour dire que tout cela ne peut pas être fait simultanément; à son avis, la tâche la plus importante est celle sur la reconnaissance mutuelle, qui doit être considérée avec les incertitudes et la traçabilité.

    M. Gaba indique que la République Tchèque ne participe pas encore au Système de Certificats OIML et cela pour deux raisons, bien qu'elle dispose des installations d'essai appropriées pour la délivrance de certificats: premièrement, aucun fabricant tchèque

    n'a fait de demande de certificat à l'Institut Tchèque, et deuxièmement aucun importateur d'instruments de mesure n'a fait de demande soutenue par un certificat OIML pour obtenir une approbation de modèle nationale. Concernant les résultats des enquêtes du BIML, M. Gaba note qu'environ une dizaine seulement d'États Membres de l'OIML ont délivré des certificats, parmi lesquels des pays qui ne sont pas si actifs au sein de l'OIML. D'un autre côté, parmi les 16 pays ayant déclaré qu'ils acceptent les certificats OIML, quelques pays très actifs et très importants (comme les USA) ne figurent pas. M. Gaba trouve cela étrange et suggère d'examiner attentivement ces résultats.

    M. Chappell répond que des essais sur la base des R 76 et R 60 ont commencé aux USA, bien qu'aucun certificat n'ait encore été délivré.

    M. Gögge précise qu'il n'a aucun problème avec le Système de Certificats OIML, mais que le manque de certification OIML pour les préemballages est gênant. Beaucoup de produits sont importés et doivent être testés puisque le contenu détaillé des emballages peut ne pas être identifié. Un marquage sur l'emballage indiquant qu'une inspection a eu lieu dans le pays d'origine serait utile.

    M. Kochsiek répond que le Système de Certificats OIML est un système d'application volontaire et que l'on ne peut pas exercer de pressions sur les pays pour la réalisation d'actions spécifiques.

    M. Athané indique qu'au point 11.4, M. Birch presentera des propositions à ce sujet, l'une se rapportant aux remarques de M. Gögge.

    M. Athané ajoute que concernant les nouvelles Recommandations applicables dans le cadre du Système, les suivantes pourraient être acceptées par le Comité:

    - R 101 Manomètres, vacuomètres et manovacuomètres indicateurs et enregistreurs à élément récepteur elastique (instruments usuels), et R 109 Manomètres et vacuomètres à élément récepteur elastique (instruments étalons) deviendront applicables dans le cadre du Système lorsque les addenda nouvellement approuvés ou les textes en intégralité seront publiés;

    - R 93 Frontofocomètres (version révisée) et R 127 Systèmes de dosimétrie par film radiochromique pour le traitement par rayonnement ionisant de matériaux et de produits deviendront applicables aussitôt que publiées; et

    - R 128 Ergomètres à pedalier deviendront applicables après approbation par correspondance du format de rapport d'essai et publication du texte intégral.

    Le Comité accepte cette proposition.

- number: '10'
  title: RAPPORT SUR LES ACTIVITÉS DU BIML
  narrative: |2+

    Un rapport donnant les détails des activités du BIML depuis la réunion du CIML à Rio est distribué aux Délégués; M. Faber demande qu'il soit publié dans le Bulletin OIML de janvier 1999.

- number: '11'
  title: AUTRES QUESTIONS
  narrative: "\n"
- number: '11.1'
  title: Vice-Président du CIML
  narrative: |2+

    Le Comité a réélu à l'unanimité M. Kochsiek en tant que Vice-Président pour un nouveau mandat expirant fin 2003.

- number: '11.2'
  title: Directeur du BIML
  narrative: |2+

    M. Faber informe le Comité que le Conseil de Présidence examinera la situation du Directeur du BIML en temps utile, après examen approfondi de la future politique d'orientation de l'Organisation.

- number: '11.3'
  title: Adjoint au Directeur du BIML
  narrative: |2+

    M. Faber explique aux délégués qu'il est urgent d'attribuer ce poste (voir haut de page 15), en raison de l'énorme charge de travail du Bureau. Après discussion avec M. Athané et les deux Vice-Présidents, M. Faber a contacté M. Bennett, le profil du candidat 1997 Ian Dunmill convenant bien au poste.

    M. Bennett informe le Comité qu'il a reçu un fax le matin même de M. Dunmill exprimant son désir d'accepter le poste s'il était élu; dans ce fax, M. Dunmill a aussi exprimé ses remerciements à M. Athané et au BIML pour leur aide lors de sa récente visite au Bureau pour l'explication du futur rôle qu'il pourrait jouer. Le Comité nomme M. Dunmill en tant qu'Adjoint au Directeur du BIML.

- number: '11.4'
  title: Demandes de l'APLMF
  narrative: |2+

    M. Birch demande au CIML de considérer les points suivants:

    - Elargissement de la R 87 Contenu net des préemballages afin d'inclure le contrôle métrologique des installations de conditionnement y compris les systèmes de qualité, l'accréditation des installations d'essai, l'échantillonnage statistique en sortie et la certification par les autorités de métrologie légale.

    M. Birch a discuté ce point avec M. Chappell qui est responsable pour cette Recommandation, et qui est d'accord pour que, sous réserve du soutien du CIML, un thème de travail soit préparé concernant cet élargissement (qui survient suite à une demande de l'Europe, reçue par l'Australie, pour la certification des étiquetages sur les produits préemballés). Un certain nombre d'options ont été mises en avant, l'option pratique se rapportant essentiellement à la nécessité pour les mesurages d'être certifiés par les autorités chargées des mesurages pour le commerce, en prenant en compte ce type d'activités. Une demande similaire a aussi été reçue du Japon, de sorte que M. Birch croit approprié de décider si de telles exigences supplémentaires devraient être incorporées dans OIML R 87 (ou annexées au document).

    M. Chappell accorde qu'il s'agit d'un problème important, mais suggère de considérer la proposition en deux parties: d'abord une révision de la R 87, et ensuite le fait que le contrôle métrologique des installations de conditionnement soit un nouveau projet. En fait, poursuit M. Chappell, une nouvelle révision de la R 87 pourrait être rapidement distribuée aux Membres-P du TC 6 pour examen et commentaires. Le contrôle métrologique est aussi important mais prendrait plus de temps, faisant que la révision de la R 87 serait ralentie.

    Suite à ces commentaires, M. Birch révise sa proposition, qu'il demande au CIML d'adopter en tant que décision, comme suit:

    - Un nouveau thème de travail concernant le contrôle métrologique des installations de conditionnement y compris les systèmes de qualité, l'accréditation des installations d'essai, l'échantillonnage statistique en sortie et la certification des autorités de métrologie légale, est approuvé.

    M. Gaba espère que cette proposition inclut aussi le contrôle métrologique du résultat de préemballage, car cela constitue une part importante du contrôle métrologique.

    L'Australie prévoit-elle seulement d'étendre le contrôle du préemballage aux installations de conditionnement, ou le préemballage ne serait-il plus contrôle du tout?

    M. Birch admet que l'intérêt principal réside dans l'étiquetage final du produit préemballé; le contrôle des installations est un moyen de parvenir à cette fin et il faut faire en sorte que les résultats soient conformes aux exigences de l'OIML sur l'étiquetage des produits préemballés, et pas seulement les installations.

    M. Gaba est d'accord pour que les exigences sur l'étiquetage des produits préemballés et sur les installations soient inclues.

    M. Bennett explique que les cinq propositions de M. Birch, émanant de la réunion APLMF en début de semaine, ne sont pas des domaines dont il est directement responsable au Royaume-Uni; il lui est donc difficile de dire si elles auront l'assentiment du Royaume-Uni dans la mesure où elles ont été présentées très tard dans les débats.

    M. Athané ne croit pas qu'il est approprié de prendre immédiatement des décisions sur ces points sans tout d'abord consulter les experts compétents. Il faut peut-être d'abord créer de nouveaux TC et SC, aussi suggère-t-il que les propositions soient transmises aux organismes appropriés et au Conseil de la Présidence afin de prendre des décisions plus tard.

    Concernant sa seconde suggestion:

    - l'OIML doit prendre en considération le développement d'un système international de marquage pour le mesurage avec étiquetage des produits préemballés afin de faciliter le commerce international,

    M. Birch explique que, comme M. Gögge l'a déjà mentionné, l'OIML a un Système de Certificats pour les Instruments de Mesure mais les produits préemballés traversent les frontières pour une valeur marchande dépassant de loin celle des instruments de mesure. Il pense que le domaine de la métrologie légale en son entier doit être pris en compte, en particulier la métrologie pour le commerce.

    M. Athané trouve la proposition intéressante, mais avant de commencer à travailler dessus, les possibilités juridiques devraient être analysées - par exemple, M. Putzeys (CE) l'a informé que le marquage des instruments de mesure peut être exclusif de tout autre marquage, ce qui signifie qu'au sein de l'Union Européenne, la marque "e" ne peut pas être complétée par quelque autre marquage. Est-il possible pour l'OIML de créer un marquage international? Il n'existe pas actuellement de marquage sur les instruments accompagnés de certificats OIML, ainsi avant de prendre toute décision, les aspects légaux de la proposition devraient être étudiés.

    M. Birch convient que ces problèmes doivent être considérés; si un tel système doit être adopté, alors une certaine forme de schéma de reconnaissance mutuelle doit aussi être adoptée pour assurer la reconnaissance de ce marquage entre pays.

    M. Faber précise qu'un tel système serait très bénéfique, et assurerait un haut niveau de performance par l'OIML. Il faudrait chercher conseil auprès de juristes d'Europe et hors Europe.

    M. Birch précise que sa troisième proposition:

    - l'OIML doit faire une priorité de l'élaboration d'une Recommandation sur les compteurs électriques, qui permettrait leur intégration dans le Système de Certificats OIML

    est maintenant superflue étant donné la décision de l'Allemagne de reprendre cette responsabilité.

    La quatrième proposition:

    - l'OIML doit élaborer des plans d'échantillonnage statistique pour la vérification des compteurs d'eau, de gaz et d'électricité.

    devient aussi en partie superflue, indique M. Birch, étant donné la décision de l'Allemagne de reprendre cette responsabilité. Il ajoute que la dernière réunion OIML à ce sujet s'est tenue en 1987 en Suisse et qu'à cette occasion avait circulé une documentation méritant l'attention. Il y avait à l'époque une attitude mitigée quant aux façons dont l'échantillonnage statistique est appliqué aux produits préemballés et aux instruments de mesure. M. Birch indique qu'il serait approprié d'examiner ces deux points et il espère que ses collègues allemands les prendront en compte dans le cadre du TC.

    M. Birch évoque ensuite sa proposition finale:

    - l'OIML doit faire une priorité de l'élaboration d'une Recommandation sur les taximètres électroniques, qui permettrait leur intégration dans le Système de Certificats OIML.

    Il précise à ce sujet qu'un projet de document a été transmis il y a quelques années par l'Allemagne. Son développement a été par la suite retardé, mais il pense qu'il est nécessaire d'aboutir à une Recommandation OIML afin d'intégrer les taximètres dans le Système de Certificats.

    M. Magana reconnaît que le problème de la fraude sur les taximètres est international, mais il croit qu'il serait difficile de parvenir à un document OIML général car la fixation des tarifs varie beaucoup d'un pays à l'autre. Mais des travaux devraient néanmoins être entrepris dans ce domaine.

- number: '11.5'
