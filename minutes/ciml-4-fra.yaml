  title: QUESTIONS DIVERSES
  narrative: "\n"
- number: '12.1'
  title: Bulletin de l'OIML
  narrative: |2+

    M. ATHANÉ indique que le Comité International des Poids et Mesures n'a pas accepté l'idée de créer un journal international de métrologie scientifique et pratique, publié sous l'égide commune des deux Comités Internationaux. Cette idée

    avait été développée lors d'entretiens entre les Présidents des deux Comités, les Directeurs des deux Bureaux et d'autres personalités des deux organisations. Si cette idée avait vu le jour, cela aurait conduit l'OIML à arrêter la publication du Bulletin de l'OIML, du moins sous sa forme actuelle. Très récemment cependant, le CIPM a préféré opter pour un journal qui serait directement publié par le BIPM, avec une participation de l'OIML si celle-ci le souhaitait, mais sans que les deux organisations soient sur un pied d'égalité. Cette alternative ne présente plus aucun intérêt pour l'OIML et celle-ci doit continuer de produire son propre Bulletin.

    M. BIRKELAND ajoute que la mise sur pied du système OIML de certificats va sans doute réorienter certains aspects du Bulletin, qui pourra traiter de problèmes liés à la certification, à l'accréditation des laboratoires, etc. et donner des informations sur les certificats délivrés dans le cadre du système.

    M. PETERSEN exprime un certain désappointement car il voyait dans le journal commun aux deux organisations la possibilité de renforcer les liens, au niveau international autant que national, entre les différents aspects de la métrologie. Il espère que, dans le futur, l'idée pourra être à nouveau reprise. M. BIRKELAND partage le même avis et les mêmes espoirs, et se déclare prêt à reprendre les discussions si le CIPM le souhaite, étant bien entendu que la gestion d'un journal commun devra être partagée sur un pied d'égalité entre les deux organisations.

- number: '12.2'
  title: Autres questions
  narrative: |2+

    a) M. REVUELTA FORMOSO transmet au Comité une invitation de Cuba de tenir la Dixième Conférence dans ce pays. M. BIRKELAND le remercie et indique que le Comité prend note de cette invitation, la décision revenant bien sûr à la Neuvième Conférence.

    b) M. REVUELTA FORMOSO invite tous les Etats Membres à participer à un séminaire international sur l'assurance métrologique de la construction des machines et des industries mécaniques et électroniques, qui se tiendra en février 1990 à Cuba, suivi d'une réunion des experts en normalisation, métrologie et contrôle de qualité du Groupe des pays non alignés et autres pays en développement.

    c) A la demande de M. KOCHSIEK, M. ATHANÉ donne des informations sur le système de traitement de texte utilisé au Bureau et sur les possibilités d'échanger par disquettes, entre les Secrétariats et le Bureau, les textes des projets. Il suggère que les personnes intéressées par de tels échanges prennent d'abord contact avec le Bureau.

- number: '13'
  title: DATE ET LIEU DE LA PROCHAINE REUNION
  narrative: |2

    M. CRUZ confirme l'invitation de tenir la prochaine réunion du Comité à Lisbonne, en septembre ou octobre 1990.

    M. BIRKELAND, constatant que ILAC se réunira dans la semaine du 8 au 12 octobre et le CIPM dans le courant de la dernière semaine de septembre, indique que les seules dates possibles sont dans la première semaine d'octobre, préférablement les mercredi 3, jeudi 4 et vendredi 5.

    Le Comité donne son accord et M. CRUZ indique que les informations détaillées seront envoyées très prochainement. Il insiste sur la nécessité de s'occuper des réservations d'hôtel le plus vite possible.

    M. CRUZ indique enfin que, prochainement, s'ouvrira à Lisbonne une exposition sur l'histoire des poids et mesures au Portugal; il est malheureusement peu probable que cette exposition pourra être maintenue ouverte jusqu'en octobre 1990; les gens se rendant à Lisbonne dans les prochains mois sont invités à visiter cette exposition.

    ## CLOTURE

    M. BIRKELAND demande à M. ATHANÉ de procéder à la lecture des projets de décisions et résolutions préparés par écrit par le Bureau. Ces décisions et résolutions sont adoptées, avec pour certaines, quelques améliorations rédactionnelles. M. BIRKELAND constate alors que toutes les questions inscrites à l'ordre du jour ont été discutées. Il exprime ses remerciements à tous ses Collègues du Comité et aux autres Délégués pour leur participation active. Il remercie également le Bureau et les interprètes.

    M. LEWISCH indique qu'il prendra prochainement sa retraite et ne participera plus aux réunions du Comité. Ce dernier, par ses applaudissements, exprime à M. LEWISCH son appréciation pour son actif soutien à l'OIML.

    M. BIRKELAND clôt alors la 24e réunion du Comité.

    ## DÉCISIONS et RÉSOLUTIONS

    Le Comité a adopté le compte rendu de sa vingt-troisième réunion sans modification.

    ## CIML 1989 POINT 2

    Le Comité a pris connaissance du rapport sur l'adhésion, comme Membres Correspondants, des Seychelles, de la Malaisie, du Mexique et du Sénégal; il a également pris connaissance du rapport sur l'exclusion de la Guinée ainsi que sur la situation de certains Etats Membres très en retard dans le paiement de leurs contributions.

    ## CIML 1989 POINT 3.1

    Le Comité a adopté le rapport comptable pour 1988 et a chargé son Président et le Directeur du Bureau de le soumettre à la Neuvième Conférence.

    ## CIML 1989 POINT 4.1

    Le Comité a renouvelé pour une période de cinq ans, à compter du 1er janvier 1991, le contrat du Directeur du Bureau.

    Le Comité a pris note du rapport sur les changements qui se produiront dans la composition du personnel du Bureau au cours des trois prochaines années.

    ## RESOLUTION CIML 1989 POINT 4.2

    Le Comité International de Métrologie Légale,

    AYANT PRIS CONNAISSANCE du rapport sur les échelles de salaire des agents du BIML,

    CONSIDERANT les pratiques en usage dans d'autres Organisations Internationales,

    DECIDE d'étendre les échelles de salaire par la création, pour chaque grade, de deux échelons exceptionnels supplémentaires selon le tableau annexé,

    DECIDE que l'avancement du dernier échelon normal au premier échelon exceptionnel, puis du premier au deuxième échelon exceptionnel ne sera accessible qu'aux agents dont les qualités professionnelles les mettent au-dessus de la moyenne,

    DECIDE que ces avancements seront laissés à la décision du Directeur en ce qui concerne ses collaborateurs et du Président du Comité en ce qui concerne le Directeur.

    ## CIML 1989 POINT 5

    Le Comité a pris note d'un rapport sur la mise en application des décisions de la Huitième Conférence.

    Le Comité International de Métrologie Légale,

    CONSIDERANT la Résolution C8-1988, point 7, par laquelle la Conférence l'a chargé d'établir les règles détaillées de fonctionnement d'un Système volontaire de Certificats OIML,

    AYANT PRIS NOTE du rapport de son Président à ce sujet,

    AYANT PRIS CONNAISSANCE du troisième avant-projet "Système de Certificats OIML",

    CHARGE un groupe ad hoc composé d'experts nommés par les Membres du CIML de la République Fédérale d'Allemagne, des Etats-Unis d'Amérique et de la France, de préparer, en étroite coopération avec le Bureau, un quatrième avant-projet basé sur les deuxième et troisième avant-projets et tenant compte dans toute la mesure du possible des commentaires exprimés par écrit sur le deuxième avant-projet, des commentaires exprimés oralement en séance et de tous commentaires additionnels que des Membres du CIML pourraient envoyer très prochainement au BIML,

    RAPPELLE au groupe ad hoc que ce quatrième avant-projet doit respecter les principes suivants:

    - être basé sur les documents ISO, CEI, ILAC appropriés, relatifs aux essais et à la certification,

    — être basé sur, et en même temps contribuer à créer, un haut degré de confiance réciproque en ce qui concerne les essais effectués et les certificats délivrés par les différents Etats Membres de l'OIML,

    — être d'un caractère volontaire,

    — fonctionner sur une base décentralisée,

    s'appliquer à des instruments complètement couverts par des Recommandations Internationales qui fixent non seulement les caractéristiques métrologiques mais aussi les méthodes et moyens d'essai, et la présentation du rapport d'essai,

    - tenir compte du fait que le rapport d'essai reste la propriété du demandeur et que le certificat peut être utilisé à des fins publicitaires,

    - tenir compte du fait que dans certains pays la délivrance des certificats sera effectuée par une Autorité de Délivrance et non par le Membre du CIML,

    - tenir compte du fait que la notion de durée de validité des certificats n'a pas à être prise en considération,

    CHARGE le groupe ad hoc et le Bureau de présenter ce quatrième avant projet à la considération du Conseil de la Présidence à sa prochaine réunion, avant soumission à tous les Membres du CIML.

    ## CIML 1989 POINT 6.2

    a) Le Comité a chargé le Bureau d'examiner les Recommandations Internationales pour vérifier si, par leur contenu, elles peuvent être utilisées dans le cadre du Système de Certificats OIML (exigences métrologiques, essais, rapport d'essai, compréhension uniforme des prescriptions, identification des instruments).

    Pour les Recommandations qui ne satisferaient pas à cela, le Bureau établira une liste de priorité en tenant compte de l'importance économique ou autre des instruments et transmettra ces informations au Conseil de la Présidence qui chargera les Secrétariats Pilotes et Rapporteurs concernés de réviser, compléter ou établir les Recommandations en question.

    Le Comité a insisté sur la nécessité de revoir le "Mode de travail des Secrétariats de l'OIML" afin en particulier qu'un modèle normalisé de Recommandation soit donné comme guide aux Secrétariats.

    Le Bureau devra également s'assurer de la compatibilité mutuelle des Recommandations covrant des sujets connexes et l'attention des Secrétariats devra être attirée sur les risques de contradiction.

    L'attention des Secrétariats doit également être attirée sur la nécessité de clairement différencier, dans les Recommandations, les exigences obligatoires des spécifications conseillées.

    b) Le Comité a conseillé à ses Membres de commencer à informer les constructeurs d'instruments de mesure du prochain établissement du Système de Certificats OIML, en faisant ressortir les avantages que ces constructeurs pourraient retirer d'un fonctionnement harmonieux de ce Système.

    Le Comité a également conseillé à ses Membres de s'efforcer de prendre en considération, pour les approbations de modèle nationales, les essais effectués dans d'autres pays dans la mesure où ceux-ci sont conformes aux exigences de l'OIML.

    ## CIML 1989 - POINT 7.1

    Le Comité a pris note de l'état d'avancement des travaux des Secrétariats de l'OIML.

    ## CIML 1989 POINT 7.2

    ## Le Comité a créé les quatre Secrétariats Rapporteurs suivants:

    SP 16-Sr 4 Méthodes dosimétriques pour l'utilisation industrielle des rayonnements ionisants — Etat responsable: Royaume-Uni.

    SP 16-Sr 5 Dosimétrie de protection — Etat responsable: R.F. d'Allemagne.

    SP 26-Sr 6 Ergomètres — Etat responsable: R.F. d'Allemagne.

    SP 26-Sr 7 Instruments de mesure pour laboratoires médicaux — Etat responsable: R.F. d'Allemagne.

    Le Comité a chargé le Bureau d'établir les listes définitives des membres-P et membres-O de ces Secrétariats et d'informer les institutions internationales éventuellement intéressées en vue de leur participation aux travaux.

    ## CIML 1989 - POINT 7.3.a

    Le Comité a chargé le Bureau d'entreprendre, sous la direction du Conseil de la Présidence, une révision radicale du "Mode de travail des Secrétariats de l'OIML", en tenant compte des propositions présentées en séance et en l'alignant, lorsque cela est pratique et conforme aux buts de l'Organisation, sur les Directives communes de l'ISO et de la CEI, édition 1989.

    Le Comité a demandé au Bureau que le projet de révision soit distribué aux Membres du CIML en vue de sa discussion à la prochaine réunion.

    ## CIML 1989 - POINT 7.3.b

    Le Comité constatant que, pour certains Secrétariats, le déroulement du travail est géné par le fait que certains membres-P ne participent pas activement aux travaux, a recommandé à tous les Etats Membres de revoir soigneusement leur statut de participation aux différents groupes de travail et à ne pas hésiter à abandonner leur statut de membre-P chaque fois qu'ils ne sont pas certains de pouvoir remplir leurs devoirs.

    Le Comité a approuvé les trois Recommandations Internationales suivantes:

    Bateaux-citernes — Prescriptions générales

    Bouteilles récipients-mesures

    Baromètres

    en vue de leur publication définitive immédiate.

    Le Comité a rappelé au Bureau que ces Recommandations devaient néanmoins être présentées à la Neuvième Conférence pour sanction.

    ## RESOLUTION CIML 1989 — POINT 8.a)

    ## Le Comité International de Métrologie Légale

    CONSIDERANT les développements internationaux et régionaux de la normalisation et l'organisation des essais, des étalonnages et de la certification,

    CONSIDERANT certaines tendances à limiter le rôle des autorités d'état dans les essais et la certification,

    CONSIDERANT les tendances à développer des approches "globales" ou uniformes de l'essai et la certification de tous les produits et processus,

    AYANT PRIS NOTE de l'importance de ces tendances et développement pour la politique à long terme de l'OIML,

    CHARGE le Bureau d'étudier les caractères de la métrologie légale qui confèrent au sujet un statut spécial dans le cadre des essais et de la certification et réclament des méthodes de contrôle particulières à l'intérieur de ces développements globaux, et de soumettre les résultats de cette étude au Conseil de la Présidence pour examen,

    DEMANDE aux Membres du Comité de faire connaître au Bureau leur point de vue sur ce sujet aussi rapidement que possible.

    ## CIML 1989 - POINT 8.b)

    Le Comité a chargé le Bureau d'étudier soigneusement les diverses propositions et déclarations présentées en séance (en particulier sur les intercomparaisons et essais probatoires, sur les accords bi- ou multilatéraux de reconnaissance de résultats d'essais et sur les conditions de création d'un climat de confiance propre à faciliter ces reconnaissances mutuelles) et de transmettre ces informations au Conseil de la Présidence pour examen.

    Le Comité a également encouragé ses Membres, en particulier ceux responsables de Secrétariats Rapporteurs traitant d'instruments qui pourraient entrer dans le champ d'application du Système de Certificats OIML, à s'assurer, au moyen d'intercomparaisons et d'essais probatoires, que les essais décrits dans les Recommandations internationales concernées sont valables et peuvent être appliqués uniformément.

    ## CIML 1989 POINT 9

    Le Comité a pris note du rapport sur la réunion du Conseil de Développement et le séminaire sur la planification et l'équipement de laboratoires de métrologie et d'essais.

    Le Comité a donné son accord pour que le budget prévu par la Conférence pour la réunion du Conseil de Développement de 1991 soit utilisé pour faciliter la participation d'Agents de Services de métrologie légale de pays en développement à un cours de formation, d'une durée d'environ deux semaines, qui pourrait être organisé par un Etat Membre en 1991.

    Le Comité a chargé le Bureau d'examiner immédiatement les possibilités d'organiser ce cours.

