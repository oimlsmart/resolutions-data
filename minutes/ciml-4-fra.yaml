- number: '7.3'
  title: Mode de travail des Secrétariats de l'OIML
  narrative: |2+

    ## a) Informations sur la révision du Mode de travail

    M. BIRKELAND rappelle que le Bureau avait été chargé de revoir le Mode de travail surtout pour améliorer certains points de détail et pour examiner comment on pourrait s'assurer de sa complète mise en application par les Secrétariats; il demande au Bureau où en est cette étude.

    M. EMERSON indique que le travail a été retardé pour différentes raisons:

    - la charge de travail présentée pour le Bureau par la préparation de la Conférence et la mise en application de ses décisions,

    — le fait que le Bureau a estimé que des changements plus radicaux seraient sans doute appropriés,

    - la publication récente, en commun par l'ISO et la CEI, de leurs nouvelles directives de travail dont l'OIML pourrait, dans bien des cas, s'inspirer, en particulier pour l'établissement d'une présentation normalisée pour les Recommandations.

    M. EMERSON ajoute que, cependant, un travail préparatoire a déjà été effectué et propose que le Bureau établisse, pour examen par le Conseil de la Présidence puis soumission aux Membres du Comité avant la prochaine réunion, une révision plus radicale du Mode de travail, en s'inspirant chaque fois que cela est approprié des directives ISO/CEI, mais en conservant bien sûr les spécificités de l'OIML et de ses Recommandations.

    M. OHLON approuve cette proposition, en particulier en ce qui concerne une présentation normalisée pour les Recommandations, ainsi que pour les Documents de l'OIML.

    M. PETERSEN est également d'accord, mais constate que les Recommandations de l'OIML ont leur caractère propre, qui les différencie des normes: elles sont destinées à servir de base à des réglementations; on doit donc faire attention à ces spécificités et ne pas exagérer l'alignement sur les directives ISO/CEI.

    M. EMERSON reconnaît que la présentation des Recommandations OIML devrait être adaptée à la métrologie légale mais ne pense pas qu'il faille exagérer ce problème: en fait, pour les appliquer au niveau national, chaque pays doit d'abord adapter les Recommandations aux caractéristiques de sa propre réglementation. Il suffit que les Recommandations soient présentées d'une manière suffisamment uniforme pour que leur lecture et leur compréhension soient faciles.

    M. CHAPPELL souligne l'urgence de la révision proposée et de l'établissement d'une présentation et d'un style normalisés et de conseils directement applicables par les Secrétariats tant pour la réalisation des Recommandation nouvelles que pour la révision des Recommandations existantes. Cela est d'autant plus important et urgent dans l'optique du système de certificats. Par ailleurs, il estime que les Recommandations doivent être des textes complets par eux-mêmes. Bien sûr, il faut prendre en considération les travaux d'autres institutions, en particulier les normes de l'ISO et de la CEI, et y faire référence. Mais il faut faire attention à ne pas rendre les Recommandations difficilement applicables par elles-mêmes en obligeant à consulter d'autres documents, avec le risque que ces autres documents laissent place à des interprétations divergentes.

    M. BRINKMANN rappelle que, selon le mémorandum de M. KOCHSIEK, la forme du rapport d'essai devrait être fixée par chaque Recommandation et demande que cela apparaisse dans le Mode de travail.

    M. BIRKELAND constate que le Comité approuve la proposition présentée par le Bureau et charge ce dernier d'entreprendre, en tenant compte des discussions en séance, les travaux nécessaires à cet effet.

    b) Composition des Secrétariats: problème des membres-P qui ne participent pas réellement aux travaux

    M. BIRKELAND indique que plusieurs Membres du Comité ont attiré l'attention du Bureau sur la gène provoquée par un manque d'assiduité, dans leur participation aux travaux des Secrétariats Rapporteurs, de certains membres-P: il devient impossible de prendre des décisions définitives lors des réunions et les enquêtes par correspondance rendues ainsi nécessaires ralentissent les travaux; il est très gênant par ailleurs d'attendre pendant des mois une réponse ou un vote qui ne vient pas.

    M. BIRKELAND recommande à ses collègues de soigneusement revoir leur participation aux différents Secrétariats et de ne pas hésiter à passer de membres-P à membres-O chaque fois qu'ils ne sont pas certains de pouvoir remplir complètement leurs devoirs de membres-P.

    M. CHAPPELL suggère que cela soit périodiquement rappelé à tous les Membres du Comité; il ajoute que les changements de participation peuvent se faire dans les deux sens: un Etat peut très bien décider de participer à des travaux déjà entamés s'il apparaît qu'il a des idées ou des documents nationaux qui séront utiles aux travaux. Par ailleurs, M. CHAPPELL demande aux Secrétariats de veiller à faciliter la participation des Etats géographiquement éloignés en regroupant dans le temps et l'espace les réunions de Secrétariats traitant de sujets connexes.

- number: '7.4'
  title: Adoption de Recommandations Internationales
  narrative: |2+

    M. BIRKELAND rappelle que, pour la première fois, le Comité va adopter, au nom de la Conférence, des Recommandations qui seront définitivement publiées, la Conférence se contentant de confirmer cette adoption par une sanction a posteriori. Cela va permettre de publier et de mettre en application des Recommandations dans les plus brefs délais après leur mise au point par les Secrétariats responsables; cette accélération est nécessaire aussi bien dans l'optique du système de certificats OIML que compte tenu de l'accélération des progrès de la technique.

    Avant de passer aux votes, M. ATHANÉ rappelle que les conditions d'adoption de Recommandations par le Comité sont les mêmes que par la Conférence, à l'exception de la condition relative au quorum, qui est plus sévère pour le Comité que pour la Conférence. Cela signifie qu'une Recommandation adoptée par le Comité a toutes les chances d'être ensuite sanctionnée sans problème par la Conférence.

    Avant de procéder aux votes, il est procédé à un appel des délégués pour vérifier le quorum. La délégation d'Egypte était absente au moment des votes et donc 37 Membres du Comité, présents ou représentés, ont pris part aux votes.

