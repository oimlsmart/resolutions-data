  narrative: |2+

    M. ATHANÉ rappelle que quatre Etats ont adhéré comme Membres Correspondants depuis la dernière réunion du Comité: la Malaisie, le Mexique, le Sénégal et les Seychelles. Il est probable que d'autres adhésions de Correspondants auront lieu dans le proche futur. En ce qui concerne les prévisions d'adhésions comme Etats Membres, rien de définitif ne peut être mentionné mais des pays comme l'Arabie Saoudite et le Mexique sont intéressés par une adhésion à l'OIML.

