    M. THULIN informe le Comité de la préparation d'un séminaire technique sur le pesage, qui aura lieu à la PTB, à Braunschweig, en mai 1990.

    M. KOCHSIEK indique que ce séminaire portera plus spécifiquement sur la mise en application de la Recommandation R76, en particulier la vérification des instruments électroniques, mais d'autres sujets seront abordés, comme la vérification des cellules de pesée.

