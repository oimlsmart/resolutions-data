- number: '3.1'
  title: Adoption du rapport comptable pour 1988
  narrative: |2+

    Ce rapport est adopté et le Comité charge son Président et le Directeur du Bureau de le présenter à la Neuvième Conférence.

- number: '3.2'
  title: Examen de la situation financière pour 1989 et 1990
  narrative: |2+

    M. ATHANÉ rappelle qu'il a proposé au Comité, fin 1988, de ne pas suivre exactement les décisions de la Conférence en ce qui concerne les crédits exceptionnels nécessaires à la rénovation du siège de l'Organisation, mais de faire le maximum de ces travaux en 1989, le paiement se faisant en partie par prélèvement sur le fond de réserve. Aucune objection n'ayant été émise, les travaux de transformation du deuxième étage (création de 2 bureaux indépendants et d'une salle de conférence bien aménagée, ainsi que d'un accès permanent au grenier) ont été engagés et sont en voie d'achèvement.

    M. BIRKELAND indique qu'il a visité le Bureau récemment et s'estime très satisfait de la rénovation.

    Sur une question de M. PETERSEN, M. ATHANÉ indique que le Bureau est maintenant presque complètement équipé en matériel de traitement de texte et d'informatique et que les autres travaux d'aménagement seront surtout des travaux de nettoyage et de peinture; par conséquent, les dépenses exceptionnelles seront, en 1990 et années suivantes, vraisemblablement très inférieures à celles de 1989. Il est également rappelé que le matériel informatique volé au Bureau en juin 1988 a pu être remplacé grâce à l'indemnité versée par la compagnie d'assurance.

    En ce que concerne la situation financière pour 1989, M. ATHANÉ indique qu'elle est très semblable à celle des années précédentes: au moment de la réunion du Comité, environ 22 parts contributives pour 1989 n'avaient pas encore été versées (soit 25 % des contributions, ou près de 1 200 000 FRF). Par ailleurs, les arriérés de contributions pour 1988 et années antérieures restent élevés: environ 800 000 FRF. C'est donc au total environ 2 000 000 FRF qui manquent dans les caisses de l'Organisation. M. ATHANÉ indique que si le Bureau disposait de cette

    somme, les ressources supplémentaires provenant des intérêts produits s'élèveraient à environ 170 000 FRF sur un an, soit l'équivalent de trois parts contributives. Par ailleurs, c'est en raison de ce retard dans le paiement des contributions pour 1989 et du déficit qui résulta des dépenses de réaménagement que l'agent additionnel, dont la Conférence avait autorisé le recrutement, n'a pas encore été nommé, ceci devant en principe se faire à la fin de 1989 ou au début de 1990, dès que la situation le permettra.

