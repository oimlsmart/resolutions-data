- number: '8'
  title: POLITIQUE A LONG TERME DE L'ORGANISATION
  narrative: |2+

    M. BIRKELAND rappelle que les discussions antérieures sur le système de certificats, point essentiel de la politique à long terme de l'OIML, ont à plusieurs reprises montré que le succès de ce système sous-entendait l'existence d'un haut degré de confiance dans les essais réalisés par les différents Etats Membres. Par ailleurs, les méthodes pour traiter des approbations de modèle au niveau national changent et cela doit se traduire d'une part dans les Recommandations qui traitent des divers instruments, mais aussi dans les Documents Internationaux qui décrivent les différentes méthodes de contrôle.

    Une des manières d'assurer la confiance mutuelle est de s'assurer, par des essais probatoires et des intercomparaisons, de la validité et de l'application uniforme des essais de modèle. M. BIRKELAND donne à ce sujet la parole à M. OHLON qui présente les résultats d'une intercomparaison de ce genre.

    M. OHLON indique que les services de métrologie des pays de l'AELE et d'un pays de la CEE ont effectué une intercomparaison portant sur deux types d'instruments de pesage à fonctionnement non automatique, de classes II et III respectivement. Dans chaque pays, les essais devaient être conduits selon la Recommandation OIML R76; il ressort de cette intercomparaison (dont les résultats pourraient être publiés dans le Bulletin de l'OIML) d'une part que certains services n'ont pas été en mesure de réaliser tous les essais décrits par R76, d'autre part que, pour certains essais, les résultats n'ont pas été complètement homogènes, cela étant vraisemblablement dû au fait que ces essais pouvaient être interprétés, et donc conduits, de différentes façons. M. OHLON ajoute que cette intercomparaison a été conduite en respectant les directives générales sur la création d'un climat de confiance dans les résultats d'essai et les reconnaissances de ces résultats, telles que fixées dans le document ILAC, partiellement repris comme Norme Européenne, dont il a parlé à l'occasion des discussions sur le système de certificats.

    M. BIRKELAND remercie M. OHLON pour son rapport et les conclusions et conseils qu'il en a tirés, en particulier en ce qui concerne les dangers qui naissent de la possibilité d'interpréter de différentes manières les exigences des Recommandations, si la rédaction de celles-ci n'a pas été soigneusement préparée en vue d'eliminer toute ambiguité.

    M. BERTRAN, en tant que co-secrétariat responsable de l'élaboration de la R 76, souhaite recevoir les informations détaillées sur cette intercomparaison pour apporter à la Recommandation les compléments ou explications nécessaires à sa compréhension univoque.

    M. PETERSEN estime qu'il pourrait être judicieux de répéter ce type d'exercice à d'autres catégories d'instruments. Cependant, ce type d'exercice coûte très cher et il serait sans doute impossible de l'étendre à tous les instruments et à toutes les méthodes d'essai. Peut-être serait-il possible de se limiter à quelques cas spécifiques et judicieusement choisis et qui permettraient, par extrapolation, de créer la confiance dans tous les autres cas; de plus, une intercomparaison faite au départ par quelques pays, pourrait être progressivement étendue à d'autres pays. Il faut également ne pas se limiter aux intercomparaisons de caractère purement technique: à côté des essais de laboratoire, les approbations de modèles comprennent aussi un travail administratif qui doit également être harmonisé.

    M. BIRKELAND répond que, d'une part, une intercomparaison portant sur des pompes à essence est en cours et que d'autre part, en ce qui concerne le coût des intercomparaisons, il peut être partiellement couvert par les constructeurs qui voient là une possibilité d'obtenir plus rapidement une approbation de modèle dans plusieurs pays à la fois.

    M. BRINKMANN recommande que l'OIML examine comment d'autres institutions, par exemple le WECC, essaient de résoudre ce problème de confiance mutuelle.

    M. OHLON pense cependant que les domaines de travail de l'OIML et de WECC sont quelque peu différents et que les solutions trouvées par WECC ne s'appliqueront peut-être pas à l'OIML. Par ailleurs, le Cqmité a discuté de la création d'un système de certificats; sans doute l'étape suivante pourrait être la création d'un système de certification; pour créer un tel système, il y a déjà une expérience internationale, celle de la CEI, qui concerne aussi bien l'essai des produits que la fabrication des produits. L'OIML pourrait dans le futur bénéficier de cette expérience, pour laquelle il faut noter que l'uniformité de l'application des normes n'est pas obtenue par des intercomparaisons, mais par des réunions de travail visant à clarifier les spécifications. Au niveau européen, il y a également l'expérience du CENELEC qui peut être utile.

    M. CHAPPELL est d'accord pour reconnaître l'intérêt des intercomparaisons; cependant des problèmes se posent: par exemple, en cas de discordance, il peut être difficile de savoir si cela vient de la spécification, de son interprétation, du matériel utilisé par les différents laboratoires, etc. Des précautions s'imposent dans la conduite des intercomparaisons.

    M. FABER se demande si l'organisation d'essais probatoires et d'intercomparaisons est prioritaire pour l'OIML par rapport à d'autres activités, comme la préparation ou la révision de Recommandations dans les domaines importants. Par ailleurs, n'est-ce pas plutôt le rôle d'organisations à caractère plus contraignant que l'OIML, comme par exemple la CEE, d'organiser ces intercomparaisons et de créer ce climat de confiance dont elles ont absolument besoin, puisque les approbations prononcées par un pays doivent être reconnues par les autres pays? Ces autres organisations ont d'ailleurs plus de possibilité que l'OIML pour organiser ces essais et intercomparaisons.

    M. BIRKELAND estime qu'effectivement le rôle de l'OIML n'est pas forcément de conduire un programme d'essais et d'intercomparaisons destinés à créer le climat de confiance, mais plutot d'indiquer comment conduire de tels programmes, d'inciter des groupes de pays à les mettre en œuvre et de tirer parti des résultats obtenus.

    M. CLAPHAM pense que, si on demandait à WECC ou ILAC quel est le premier et le plus important paramètre pour la création d'un climat de confiance. la réponse serait "Assurez-vous que les laboratoires d'essai et organes de certification suivent exactement les recommandations de l'ISO et, préférablement, assurez-vous qu'il y a eu une vérification, par un organisme indépendant, du fait que ces recommandations sont suivies, c'est-à-dire une accréditation indépendante de ces laboratoires et organes de certification". En ce qui concerne la métrologie légale, pouvons-nous être sûrs que les services nationaux acceptent de suivre les recommandations de l'ISO et de se faire accréditer? Sans doute très peu d'entre eux l'acceptent. Pourquoi? La métrologie légale est-elle quelque chose de spécial, différent de l'essai des produits couvert par ISO/CEI/ILAC? Ou au contraire l'OIML doit-elle conseiller à ses Etats Membres de suivre ces directives générales applicables à tous les produits?

    M. KOCH, comme représentant d'un pays ayant participé à l'intercomparaison décrite par M. OHLON, s'estime très satisfait des résultats et est prêt à participer à d'autres exercices de ce genre. Par ailleurs, les remarques de M. CLAPHAM lui font réaliser que les divergences de vues sur le rôle de la métrologie légale sont dues au fait que les Membres du Comité viennent d'horizons différents: services de "Poids et Mesures" classiques, services de normalisation ou de certification, secteur privé, etc. Il faut également remarquer que les évolutions ont souvent un mouvement pendulaire et il est possible que les idées actuelles d'attribution à l'industrie de la conduite des contrôles ou de privatisation des services connaissent plus tard un mouvement vers l'arrière, par exemple pour réaccentuer la protection du consommateur. M. KOCH estime en conséquence qu'il ne faudrait pas abandonner certaines activités propres aux services de métrologie, par exemple celles de laboratoire.

    M. PUTERA indique que dans son pays, les activités de métrologie sont assumées par trois organismes: la métrologie légale par un service gouvernemental, les étalonnages et autres activités de métrologie scientifique ou industrielle qui sont effectués par des laboratoires coordonnés par un système national d'étalonnage et enfin les contrôles de qualité effectués par des laboratoires coordonnés par un système national de contrôle de qualité. Cette troisième catégorie de laboratoires voudrait aussi se voir confier le contrôle des instruments de mesure et cela ne va pas sans créer de problèmes. Il serait utile d'avoir des règles pour pouvoir dire qui est responsable de quoi.

    M. BIRKELAND constate que la situation en Indonésie existe aussi dans beaucoup d'autres pays. C'est pour cela qu'il est bien sûr essentiel que les règles générales appliquées par les trois catégories d'organes mentionnés par M. PUTERA soient entièrement compatibles.

    M. CLAPHAM suggère que l'on réfléchisse à ce qui pourrait rendre la métrologie légale "spéciale", si tel est le cas et, pour reprendre l'image du pendule de M. KOCH, ce qui constitue ses caractéristiques permanentes sur lesquelles les changements, privatisation, retour à l'administration, etc., n'ont pas d'influence. Il y a beaucoup de gens qui pensent que la métrologie légale n'est qu'une forme de certification et d'essai, et n'a rien de spécial. Il est exact que les instruments doivent conserver leurs qualités pendant une longue durée d'utilisation: mais cela est vrai pour les appareils à pression, pour les jouets en ce qui concerne leur sécurité d'utilisation, etc. On pourrait dire aussi que les instruments de mesure sont souvent utilisés comme arbitres indépendants entre deux parties. Peut-être il y a-t'il d'autres arguments que les spécialistes de métrologie légale pourraient opposer à juste titre à ceux qui veulent englober cette discipline dans le moule général des essais et de la certification. M. CLAPHAM conclut en proposant que le Comité charge le Conseil de la Présidence, sur la base d'une préparation par le Bureau, de réfléchir à ce qui constitue les spécificités de la métrologie légale et justifie un traitement particulier de cette discipline.

    M. KNAPP indique que cette question a fait l'objet d'une étude de la part du Gouvernement canadien qui envisageait de privatiser le contrôle des instruments de mesure; les réponses des constructeurs et autres parties intéressées étaient à peu près partagées en nombre mais les arguments en faveur du maintien du contrôle gouvernemental étaient beaucoup plus forts et convaincants et il a été décidé de ne pas poursuivre cette idée mais au contraire de renforcer les moyens du Département de métrologie légale et de réaffirmer la responsabilité du Gouvernement dans ce domaine. M. KNAPP trouve excellente la proposition de M. CLAPHAM et pense qu'il convient de mettre en évidence le rôle de tierce partie impartiale que doivent continuer à jouer les services de métrologie légale sous leur forme d'organes gouvernementaux.

    A la demande de M. BIRKELAND, M. KNAPP indique que les conclusions de l'enquête ont été rendues publiques et qu'elles seront envoyées au Bureau pour l'information des autres Membres du Comité.

    Revenant aux intercomparaisons, M. LEWISCH indique que, pour le succès de tels exercices, il est nécessaire d'avoir à l'avance un excellent programme qui décrit pas à pas l'opération. Les règles d'approbation de modèle doivent donc être exactement spécifiées dans les Recommandations de l'OIML. Cela est d'autant plus nécessaire que le développement en matière d'instruments est très rapide. Par ailleurs, la création d'un climat de confiance est la seule possibilité dans l'optique des changements de 1992. Si un pays n'a pas les ressources pour effectuer un type d'essai, il pourra très bien le demander à un pays voisin. Enfin, pour effectuer des essais de façon correcte, il n'est pas nécessaire de disposer des moyens de mesure les plus sophistiqués et même les petits pays peuvent faire un travailigne de confiance.

    Mme VELITCHKOVA pense que le Bureau devrait étudier la manière dont les pays du CAEM ont abordé le problème de reconnaissance mutuelle des résultats d'essais, principalement par le biais d'accords bilatéraux. Le Bureau devrait également étudier les programmes d'intercomparaisons développés au sein du CAEM.

    M. LOWE, revenant sur la proposition de M. CLAPHAM, pense que l'argument de protection du consommateur doit être souligné. Par contre, la position d'arbitre dans certaines transactions n'a peut-être pas le même poids.

    A l'issue de ces discussions, M. BIRKELAND essaie de résumer les idées émises et d'examiner comment l'OIML pourrait les mettre à profit. Sur sa proposition, le Comité accepte de charger le Bureau et le Conseil de la Présidence de certaines actions et études; le Comité encourage également ses Membres à mener certaines études et à effectuer des intercomparaisons et autres essais qui contribueront à créer le climat de confiance nécessaire. (Les détails de ces décisions sont donnés à la fin de ce compte rendu).

    M. CHAPPELL donne des informations sur l'activité du Secrétariat Pilote SP 22 sur les modalités des contrôles métrologiques. La possibilité d'utiliser les systèmes de contrôle de qualité des constructeurs est actuellement à l'étude et un avant-projet devrait être distribué d'ici quelques mois.

    Enfin, pour poursuivre la proposition de M. CLAPHAM, le Comité adopte la Résolution suivante:

    Le Comité International de Métrologie Légale

    CONSIDERANT les développements internationaux et régionaux de la normalisation et l'organisation des essais, des étalonnages et de la certification,

    CONSIDERANT certaines tendances à limiter le rôle des autorités d'état dans les essais et la certification,

    CONSIDERANT les tendances à développer des approches "globales" ou uniformes de l'essai et la certification de tous les produits et processus,

    AYANT PRIS NOTE de l'importance de ces tendances et développements pour la politique à long terme de l'OIML,

    CHARGE le Bureau d'étudier les caractères de la métrologie légale qui confèrent au sujet un statut spécial dans le cadre des essais et de la certification et réclament des méthodes de contrôle particulières à l'intérieur de ces développements globaux, et de soumettre les résultats de cette étude au Conseil de la Présidence pour examen,

    DEMANDE aux Membres du Comité de faire connaître au Bureau leur point de vue sur ce sujet aussi rapidement que possible.

- number: '9'
  title: PAYS EN DEVELOPEMENT
  narrative: |2+

    M. BENKIRANE, Président du Conseil de Développement, donne un résumé des rapports présentés et des discussions tenues lors de la réunion du Conseil, le mardi 26 septembre, réunion précédée d'un séminaire sur la planification et l'équipement des laboratoires de métrologie et d'essai.

    Les deux réunions ont suscité un grand intérêt et de nombreux pays, en développement et industrialisés, y ont assité. Egalement, plusieurs institutions internationales, mondiales et régionales, avaient envoyé des observateurs. En particulier, le Représentant de l'ONUDI a indiqué l'importance que cette organisation attache à la métrologie légale dans l'optique d'une approche intégrée des questions de qualité des produits.

    Les exposés présentés au séminaire seront publiés dans le Bulletin. Le Bureau, quant à lui, avait préparé des brochures sur divers sujets techniques.

    Lors de la réunion du Conseil de Développement, plusieurs pays ont fait état des possibilités d'assistance dans le cadre d'accords bilatéraux, en particulier pour la formation.

    Le Conseil de Développement a également été d'accord pour demander au Comité et au Bureau d'essayer d'organiser, en 1991, un cours de formation pour

    agents de vérification ou techniciens de la métrologie, d'une durée d'environ deux semaines, dans un Etat Membre volontaire pour accueillir ce cours et participer à sa réalisation. Ce cours ne devrait pas être limité à la métrologie légale classique: des notions de métrologie industrielle, contrôle de qualité, etc. devraient être inclus. Il est demandé au Comité d'accepter que le budget qui était prévu pour couvrir la participation de quatre pays en développement à la prochaine réunion du Conseil de Développement soit utilisé pour faciliter la venue de stagiaires à ce cours.

    Le Conseil a enfin demandé aux pays industrialisés d'essayer de mettre à la disposition des pays en développement leur matériel de vérification usagé mais encore en état de fonctionnement.

    M. THULIN ajoute que la réalisation de ce cours ne sera possible que si la participation est suffisante, et dépasse les quatre ou cinq stagiaires dont l'OIML assurera les dépenses. Il faut donc que des pays envoient des stagiaires à leurs frais ou que des pays industrialisés acceptent d'apporter leur aide, par exemple dans le cadre d'un accord bilatéral d'aide à des pays en développement. M. THULIN précise que le Bureau va négocier avec des pays ayant des écoles de métrologie ou autres facilités de ce genre pour trouver un lieu adéquat, des professeurs et, si possible, des moyens bon marché pour l'hébergement des stagiaires. Il dit également qu'il devra être clair que ce cours est placé sous l'égide de l'OIML.

    M. BERTRAN suggère que le programme du cours soit fixé après une consultation des pays concernés, pour que ceux-ci définissent eux-mêmes et exactement leurs besoins et que le cours, s'il est réalisé, satisfasse ces besoins.

    M. REVUELTA FORMOSO exprime le soutien de son pays aux actions du Conseil de Développement et de l'OIML. Il donne également des informations sur un cours de métrologie organisé par Cuba, cours ouvert aux pays en développement membres de l'OIML sous réserve qu'ils prennent à leur charge les frais de participation de leurs stagiaires.

    A l'issue de ces discussions, le Comité exprime son accord de principe aux propositions du Conseil de Développement et demande au Bureau d'entreprendre immédiatement les études préliminaires en vue de leur réalisation. Le Comité souhaite qu'un rapport sur la préparation du cours lui soit présenté à sa prochaine réunion.

