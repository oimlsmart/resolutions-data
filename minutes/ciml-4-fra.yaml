    A l'issue d'une discussion tenue à huis clos et sans enregistrement, le Comité décide de renouveler, pour une période de cinq ans à compter du 1er janvier 1991, le contrat du Directeur du Bureau.

    Le Comité prend par ailleurs connaissance d'informations sur les prévisions de modifications en ce qui concerne certains agents du Bureau, en particulier les deux Adjointes au Directeur, qui prendront leur retraite en 1991 et 1992.

- number: '4.2'
  title: Autres questions.
  narrative: |2+

    M. BIRKELAND présente un rapport sur les salaires des agents du Bureau et sur une proposition de créer, à l'exemple de ce qui est pratiqué en particulier au BIPM, des échelons supplémentaires ayant un caractère "exceptionnel". A l'issue de discussions qui se sont tenues à huis clos et sans enregistrement, le Comité adopte la Résolution suivante:

    Le Comité International de Métrologie Légale

    AYANT PRIS CONNAISSANCE du rapport sur les échelles de salaire des agents du BIML,

    CONSIDERANT les pratiques en usage dans d'autres Organisations Internationales,

    DECIDE d'étendre les échelles de salaire par la création, pour chaque grade, de deux échelons exceptionnels supplémentaires selon le tableau annexé,

    DECIDE que l'avancement du dernier échelon normal au premier échelon exceptionnel, puis du premier au deuxième échelon exceptionnel ne sera accessible qu'aux agents dont les qualités professionnelles les mettent au-dessus de la moyenne,

    DECIDE que ces avancements seront laissés à la décision du Directeur en ce qui concerne ses collaborateurs et du Président du Comité en ce qui concerne le Directeur.

    Le tableau des échelles de salaires est reproduit en fin de ce compte rendu.

- number: '5'
  title: MISE EN APPLICATION DES DECISIONS DE LA HUITIEME CONFERENCE
  narrative: |2+

    M. ATHANÉ rappelle les différentes décisions de la Huitième Conférence et mentionne soit les actions déjà entreprises pour leur mise en application, soit ce qui va être fait, dans un futur proche, à cet effet. Ces actions concernent en particulier les sujets suivants:

    — certification et politique à long terme de l'OIML, qui seront examinées sous points 6 et 8 de l'ordre du jour du Comité,

    — adoption des Recommandations Internationales par le Comité au nom de la Conférence, procédure qui entre en application à l'occasion de la présente réunion,

    - action de l'OIML vis-à-vis des pays en développement, qui fera l'objet de rapports sous point 9.

    Au sujet de la coopération entre l'OIML et différentes institutions internationales, M. BRINKMANN s'inquiète des problèmes qui existent entre OIML SP 17-Sr 1 et ISO/TC22/SC5 en ce qui concerne les instruments de mesure du CO et $ \mathrm{CO_{2}} $ dans les gaz d'échappement des véhicules, et entre OIML SP 30-Sr 13 et CENELEC en ce qui concerne les explosimètres. M. BERTRAN, au nom du SP 30-Sr 13, M. CHAPPELL, au nom du SP 17, et M. ATHANÉ au nom du Bureau, donnent des informations sur les actions entreprises ou à entreprendre en vue de régler ces problèmes.

    M. BIRKELAND rappelle qu'il est de la responsabilité permanente des Secrétariats de l'OIML et du Bureau de veiller à la bonne coopération avec les nobreuses institutions internationales et régionales qui poursuivent des buts connexes à ceux de l'OIML.

    M. PETERSEN, mentionnant les différences qui doivent exister par leurs natures spécifiques entre les Recommandations de l'OIML et les normes des institutions de normalisation, et rappelant la possibilité pour l'OIML de faire référence à ces normes, propose que le Mode de travail des Secrétariats de l'OIML soit révisé pour que ces principes soient clairement indiqués. M. BIRKELAND exprime son accord sur cette proposition et indique que la révision du Mode de travail sera examinée sous point 7 de l'ordre du jour.

- number: '6'
  title: CERTIFICATION
  narrative: |2+

    6. 1. Examen des résultats du vote sur le 2e avant-projet Règles générales... Système OIML de certificats...

    M. BIRKELAND introduit la question en soulignant l'intérêt, vital pour l'OIML, de mettre sur pied aussi vite que possible un système de certification internationale des instruments de mesure, sur la base des Recommandations de l'OIML. Il pense qu'il n'est pas besoin de rappeler les arguments en faveur d'un tel système, arguments qu'il a exposés dans son allocution d'ouverture et qui, par ailleurs, avaient servi de base à une décision de la Huitième Conférence à ce sujet.

    M. BIRKELAND rappelle qu'en effet la Huitième Conférence avait chargé le Comité d'établir les règles détaillées d'un système de certificats attestant la conformité aux exigences des Recommandations de l'OIML des modèles d'instruments de mesure couverts par les dites Recommandations. La Conférence avait par ailleurs décidé que ce système aurait un caractère purement volontaire tant en ce qui concerne la délivrance de certificats que leur éventuelle utilisation pour accélérer et faciliter les approbations de modèles nationales.

    Le Comité avait ensuite chargé le Secrétariat Rapporteur SP 2-Sr 4, dont le Bureau est responsable, de préparer ces règles détaillées, sous le contrôle du Conseil de la Présidence. Un 1er avant-projet a ainsi été établi, suivi d'un 2e avant-projet soumis aux commentaires et votes des Membres du Comité.

    Le deuxième avant-projet était basé sur un certain nombre de principes, outre le caractère volontaire du système déjà décidé par la Conférence:

    — le système ne s'applique qu'à des catégories d'instruments complètement couvertes par des Recommandations,

    — le système, du moins au début, fonctionnera de façon decentralisée,

    — le certificat et le rapport d'essai sont la propriété du demandeur,

    — le demandeur peut utiliser ce certificat et le rapport d'essai, non seulement pour faciliter la délivrance d'approbations de modèle, mais aussi à des fins publici-taires.

    M. BIRKELAND souligne que, lors de l'enquête sur le 2e avant-projet, ces principes ont reçu l'accord de la grande majorité, parfois l'unanimité, des Membres du Comité et qu'ils ne devraient donc plus être remis en question.

    M. BIRKELAND indique, de plus, que l'enquête par correspondance sur le 2e avant-projet a donné des résultats très encourageants puisque, sur 32 votes, on

    compte 4 votes négatifs et 4 abstentions mais que les critiques exprimées concernent davantage les détails de fonctionnement du système que les principes qui sont à sa base.

    M. BIRKELAND indique par ailleurs que, sur la base du 2e avant-projet et de certains des commentaires qu'il a suscités, un 3e avant-projet a été établi. Ce 3e avant-projet comprend deux principes additionnels:

    — dans un Etat Membre, en fonction des règles administratives applicables, la délivrance des certificats peut être faite soit par le Membre du Comité, soit par une "Autorité de délivrance" officiellement désignée à cet effet; dans ce dernier cas, le Membre du Comité doit néanmoins jouer un rôle, au moins de liaison entre l'Autorité de délivrance et l'OIML,

    — un certificat est une constatation de conformité d'un ou de plusieurs échantillons représentatifs du modèle aux exigences de l'OIML, exprimées par une certaine édition de la (ou des) Recommandation(s) applicable(s); en conséquence, la notion de limitation de la validité du certificat n'a pas de sens; cependant, la notion de révocation peut être éventuellement conservée, soit comme mesure de rétorsion vis-à-vis d'un possesseur de certificats qui ne remplirait pas ses obligations, soit dans le cas où il apparaît après coup qu'un certificat a été délivré à tort.

    M. BIRKELAND conclut cette introduction en affirmant que, bien évidemment, le 3e avant-projet n'est pas un point final et que beaucoup de travail reste à faire, en particulier pour prendre en considération, dans la mesure du possible, la totalité des nombreux commentaires relatifs au 2e avant-projet; il exprime aussi le souhait que le Comité prenne les décisions qui permettront de franchir très rapidement les ultimes étapes qui séparent l'OIML de la mise sur pied du système.

    M. ATHANÉ ajoute quelques informations sur la manière dont le 3e avant-projet a été établi à partir du 2e, en essayant de tenir compte des commentaires qui ont semblé particulièrement importants, mais sans pouvoir, faute de temps, analyser et essayer de tenir compte de tous les commentaires; les discussions du Comité peuvent donc porter aussi bien sur le 3e que sur le 2e avant-projet.

    M. PETERSEN, tout en reconnaissant que le 3e avant-projet est un pas en avant vers une solution acceptable, estime que beaucoup de questions importantes doivent encore être résolues; il faut en particulier mieux définir quelle est cette Autorité de délivrance introduite dans le 3e avant-projet; mais il faut surtout clarifier la question de révocation, qui risque d'obliger les Membres du Comité ou les Autorités de délivrance à effectuer un véritable suivi, parfois sur de nombreuses années, des instruments fabriqués selon les modèles ayant fait l'objet de délivrance de certificats OIML.

    A la demande de M. BIRKELAND, M. ATHANÉ confirme que la notion de durée de validité d'un certificat ne doit plus être envisagée dans le cadre du système actuellement à l'étude; de même, l'idée de pouvoir révoquer un certificat pour non conformité d'instruments individuels ne doit plus être retenue; par contre, comme déjà mentionné, il peut être envisageable de conserver une possibilité de révocation des certificats dans deux cas particuliers:

    — si le demandeur ne s'est pas acquitté de ses obligations, soit financières (paiements des frais d'essai ou de la redevance d'enregistrement), soit en ce qui concerne l'utilisation du certificat,

    — s'il apparaît après coup que les essais n'ont pas été conduits conformément aux règles de l'OIML ou que des erreurs de mesurage ont été commises lors des essais, le certificat ayant alors été délivré à tort.

    M. ATHANÉ estime que ces possibilités de révocation ne constituent pas un principe fondamental du système et qu'elles peuvent être réexaminées.

    M. KOCH estime que le problème de révocation doit être lié aux possibilités de choix laissées aux demandeurs pour décider à quel Membre du Comité ils vont s'adresser pour obtenir un certificat. Si en particulier un certificat a été délivré par un pays X mais que les instruments ensuite ne sont pas commercialisés dans

    ce pays X mais dans des pays Y ou Z, cela peut poser des problèmes et empêcher toute possibilité de révocation; c'est pour cette raison que la Suisse avait demandé que le demandeur ne puisse s'adresser qu'au Membre du Comité d'un pays dans lequel les instruments seront effectivement commercialisés.

    M. ATHANÉ confirme que la question de révocation doit être réexaminée; par contre l'obligation de s'adresser à un Membre du Comité d'un pays où les instruments seront effectivement commercialisés risque de créer des difficultés d'application; néanmoins, la remarque de M. KOCH sera réexaminée lors de la préparation du prochain avant-projet.

    M. VEGLIA se réfère à la Convention instituant l'OIML pour définir les responsabilités des Membres du Comité qui représentent leur pays plutôt que leur administration; en particulier, ils ne sont pas forcément l'autorité nationale en matière de métrologie légale; la délivrance des certificats OIML ne devrait donc pas être laissée à la seule autorité des Membres du Comité; le 3e avant-projet est donc sur ce point préférable aux précédents; cependant, au moins dans sa formulation, il semble continuer de conférer aux Membres du Comité une certaine part de responsabilité et on peut relever des contradictions internes dans le 3e avant-projet, par exemple dans la supervision de la délivrance des certificats. M. VEGLIA constate également que la notion de responsabilité, qui existait dans les avant-projets précédents, a complètement disparue et cela crée un vide juridique qui pourrait être préjudiciable au fonctionnement du système.

    M. ATHANÉ indique que la disparition de la notion de responsabilité résult de nombreux commentaires à ce sujet; compte tenu du caractère volontaire du système, on peut espérer que les problèmes juridiques évoqués par le délégué de Monaco ne se poseront pas; en ce qui concerne le rôle des Membres du CIML, la position de M. VEGLIA est tout à fait correcte et, dans le cas de certains pays, le Membre du Comité ne sera qu'une liaison, mais en fait la seule et unique liaison, entre son pays et l'OIML; dans de tels pays, le système de certificats OIML sera mis en œuvre par une Autorité de délivrance, dont les caractéristiques et le mode de désignation devront être mieux précisés, et le Membre du CIML pourra voir son rôle limité à recevoir les demandes de certificats et à les orienter vers l'Autorité de délivrance, puis à informer le BIML des certificats délivrés par cette Autorité de délivrance. Le fait de savoir si le Membre du CIML doit ou non contresigner les certificats délivrés par l'Autorité de délivrance peut être considéré comme une question de détail.

    Sur une question de M. PETERSEN, M. ATHANÉ indique que les frais à payer par le demandeur pourraient être de deux sortes:

    — pour couvrir les frais d'essais nécessaires à la délivrance (ou au refus) du certificat: ce montant doit être fixé par chaque pays individuellement, en fonction des règles nationales en la matière, et instrument par instrument, en fonction de la complexité, de l'encombrement, etc., du modèle étudié, et bien sûr du fait que des essais antérieurs peuvent ou non être pris en considération;

    — pour couvrir les frais d'enregistrement, d'information des autres Etats Membres, de tenue d'une base de données, etc., par le Bureau; si le Comité accepte le principe de cette redevance d'enregistrement, celle-ci devra être la même quel que soit le type d'instrument, par exemple 100 ou 200 FRF par certificat, et payée directement au Bureau.

    M. PETERSEN demande que cela soit plus clairement explicité dans le document et s'inquiète des risques de bureaucratie qui pourraient résulter du maintien de la redevance d'enregistrement.

    M. CLAPHAM estime que deux principes additionnels et fondamentaux devraient être clairement reconnus dans la rédaction du document:

    — le système OIML, quelle que soit sa forme, ne devrait en aucun cas donner l'impression d'être en compétition avec l'activité d'autres institutions internationales; en particulier, l'OIML ne doit en aucun cas essayer d'établir des règles générales sur la certification, car ISO, CEI et ILAC sont responsables pour cela;

    au contraire, l'OIML doit reconnaître les lignes directrices fixées par ces institutions et bâtir son système sur ces lignes, en les appliquant au cas particulier de la métrologie légale; M. CLAPHAM pense que tout le monde accepte ce principe et regrette que l'introduction du 2e avant-projet, qui lui paraissait claire à ce sujet, ait été supprimée dans le 3e avant-projet; il demande donc instamment la réintroduction de ce principe;

    — un système de certificats OIML doit être basé sur un haut degré de confiance en l'intégrité des essais réalisés et des certificats délivrés dans son cadre; M. CLAPHAM est d'accord avec M. BIRKELAND sur l'importance cruciale pour l'OIML du succès du travail entrepris; il est donc impératif de ne pas se trouver dans une situation où l'on encouragerait la délivrance de certificats sans qu'un très haut degré de confiance ne puisse être accordé aux organes d'essai; M. CLAPHAM reconnaît que ce point est évoqué dans le 3e avant-projet, mais il estime qu'une beaucoup plus grande importance doit lui être accordée dès l'introduction du document.

    Enfin, M. CLAPHAM demande que davantage d'attention soit portée au Document International OIML D13, sur les principes d'arrangements bi- ou multi-latéraux de reconnaissance des résultats d'essai, dans la préparation du prochain avant-projet sur le système de certificats (par exemple, la référence aux lois nationales dans l'établissement des arrangements devrait être reprise en ce qui concerne les certificats OIML).

    M. BIRKELAND exprime son accord avec les idées émises par M. CLAPHAM et demande au Bureau d'en tenir compte, ainsi que des autres commentaires présentés en séance, pour les travaux futurs.

    M. CIBAK indique son soutien général à la création du système; il estime qu'un certain nombre de questions importantes sont mieux traitées dans le 3e avant-projet que dans le 2e; il apporte son soutien aux idées développées par M. KOCHSIEK dans son mérorandum; il propose aussi une liste d'instruments qui devraient entrer de manière prioritaire dans le système: instruments de pesage (y compris électroniques), compteurs de liquides, de gaz, d'eau froide et chaude, instruments utilisés en médecine, pour les diagnostics, pour la protection de l'environnement; il pense également que les Secrétariats OIML devraient recevoir des directives pour l'établissement ou la révision des Recommandations en vue de leur application au système de certificats; il indique enfin qu'en Tchécoslovaquie, les producteurs d'instruments de mesure ont déjà été informés des développements des travaux de l'OIML en ce qui concerne les certificats, ainsi bien sur que des progrès réalisés au sein du CAEM pour la reconnaissance réciproque des résultats d'essai et approbations de modèle.

    M. CHAPPELL exprime son accord avec les principes du système, y compris ceux présentés par M. CLAPHAM; les USA ont présenté un très grande nombre de commentaires sur le 2e avant-projet et ont encore de nombreuses réserves en ce qui concerne le 3e; l'objectif de ces commentaires est de rendre le texte définitif aussi clair que possible pour ceux qui participeront au système, et de rendre l'interprétation et la mise en application de ce programme également claires; il faut également rendre ce programme aussi attractif que possible pour l'autre partie également intéressée, c'est-à-dire les constructeurs; si l'obtention d'un certificat OIML leur permet de commercialiser plus facilement leurs instruments dans les autres pays, alors ils demanderont la délivrance de certificats; par ailleurs, il faut se rappeler le caractère volontaire du système et donc ne pas trop concentrer son attention sur les obligations nationales que l'on pourrait ainsi créer; les questions d'enregistrement et de révocation sont importantes et doivent être examinées en détail; les listes de certificats que diffusera le Bureau pourront être utilisées au niveau national pour alléger le travail; il est évident, enfin, qu'une mise en application systématique des Recommandations par les Etats Membres sera une condition nécessaire au succès du système de certificats.

    M. CHAPPELL souhaite de plus qu'un processus d'appel soit offert aux constructeurs pour leur permettre de présenter leur point de vue dans le cas où ils estimeraient que le refus de délivrance d'un certificat, ou sa révocation, ont été

    décidés à tort. Pour cela, la responsabilité des Membres du Comité et celle du Bureau devraient être clairement définies, afin de donner au programme toutes ses chances de succès.

    M. KNAPP, tout en réaffirmant son soutien aux principes qui sont à la base du système, insiste sur la nécessité de résoudre tous les problèmes de détail qui, au total, sont aussi importants que les questions de principe; il demande par ailleurs dans quelles circonstances le Bureau estime applicables la clause qui oblige un Membre du Comité à refuser une demande s'il n'a pas accès à un laboratoire approprié, et celle qui permet à un Membre du Comité d'effectuer des essais, exceptionnellement, dans un laboratoire d'un autre pays: comment le Membre du Comité d'un pays A peut-il attester l'intégrité d'un laboratoire d'un pays B?

    M. ATHANÉ indique que, aux yeux du Bureau, la première clause est évidente: un constructeur ne doit pas être tenté de s'adresser à un pays qui ne dispose pas des moyens nécessaires aux essais; sinon, c'est le Membre du Comité d'un tel pays qui doit immédiatement refuser la demande, tout en ayant la possibilité d'orienter le demandeur vers un autre pays. En ce qui concerne la possibilité pour un pays de faire faire certains essais dans un autre pays, cela résultat de l'apparition récente d'accords bilatéraux entre pays: un pays A décide d'arrêter de faire tel type d'essai, mais de reconnaître les essais de ce type faits par un pays B, alors que le pays B décide d'arrêter de faire un autre type d'essai, mais de reconnaître les essais de ce type faits par le pays A.

    M. OHLON, tout en reconnaissant les progrès présentés par le 3e avant-projet, estime que le succès final du programme dépendra beaucoup de la confiance réci-proque qui existera entre laboratoires d'essai, comme l'a souligné M. CLAPHAM. Il demande également que référence soit faite à un document préparé par le groupe de travail F de ILAC, et qui est partiellement repris comme projet de norme européenne EN 45019. Il pense enfin que, dans certains pays, il y aura plusieurs "Autorités de délivrance" et qu'il faut modifier le texte pour admettre cela.

    M. HATTORI pense que la Convention limite le rôle des Membres du Comité: leur permet-elle de signer des certificats?

    M. ATHANÉ répond que, s'il est exact que la Convention ne mentionne pas la possibilité de créer un système de certificats dans lequel les Membres du Comité auraient des responsabilités, rien ne l'interdit. La Convention donne aux Membres du Comité le rôle de liens entre les Etats Membres et l'Organisation; on pourrait dire que les Membres du Comité sont, au minimum, la "boîte aux lettres" de l'OIML dans chaque pays; le système de certificats fonctionnera, dans chaque Etat Membre, selon les règles nationales applicables; le rôle des Membres du Comité sera, au minimum, d'informer les autres Etats Membres, via le Bureau, des certificats délivrés dans son pays et, en retour, d'informer les autorités nationales concernées des certificats délivrés dans les autres Etats Membres.

    M. EMERSON, constatant les difficultés qui peuvent naître de l'obligation, pour un Membre du Comité, de contresigner un certificat établi par une autorité qui est en dehors de son contrôle, propose que la forme du certificat soit modifiée pour permettre au Membre du Comité, dans ce cas, de seulement attester que l'autorité qui a délivré le certificat est bien une autorité officiellement reconnue sur le plan national. Il est néanmoins essentiel que le nom du Membre du Comité apparaisse sur le certificat d'une manière ou d'une autre, car c'est la seule chose qui distingue un certificat OIML d'un certificat attestant la même conformité aux exigences OIML que n'importe qui d'autre pourrait délivrer.

    M. BIRCH exprime son accord avec les idées déjà exprimées sur la nécessité de créer un climat de confiance réciproque pour favoriser le succès du système; il pense par ailleurs qu'une meilleure connaissance réciproque de ce qui est fait dans chaque pays est le premier pas vers cela. Il ajoute que le caractère volontaire du système ne doit pas être regardé comme une faiblesse: c'est une caractéristique obligatoire compte tenu du fait que les activités de métrologie légale sont gouvernementales. Il est bien évident cependant que l'on ne doit pas arguer du caractère volontaire du système pour porter atteinte à l'intégrité des essais

    et des conclusions qui en découlent. En ce qui concerne la proposition de M. CLAPHAM de baser le système OIML sur les lignes directrices de l'ISO, la CEI et ILAC, M. BIRCH exprime son accord de principe tout en estimant que ces lignes directrices sont actuellement insuffisantes: l'OIML aura sans doute à établir quelques principes par elle-même. Il partage aussi les réserves de M. KNAPP en ce qui concerne la possibilité de faire des essais exceptionnellement dans un autre pays. Enfin, il demande que l'on envisage le cas où un certificat ayant été délivré par un pays, un autre pays estime que les instruments ne satisfont pas aux exigences de l'OIML; il faut savoir comment résoudre de tels litiges si l'on ne veut pas risquer de porter atteinte à la crédibilité du système.

    M. KNAPP présente trois propositions à la considération du Bureau pour établir le texte suivant:

    — dans l'utilisation publicitaire d'un certificat, le détenteur devrait être obligé de mentionner l'autorité qui a délivré ledit certificat,

    - la note en bas du modèle de certificat (indiquant ce sur quoi le certificat ne porte pas) est inutile,

    — dans la version en langue anglaise, "system" ou mieux "programme" serait meilleur que "scheme".

    M. LEWISCH pense que les Membres du Comité ne peuvent en aucun cas collecter les redevances d'enregistrement puis les verser au Bureau; il doit donc être clair que le demandeur doit payer cette redevance directement et par lui-même au Bureau. Il n'estime pas nécessaire, par ailleurs, que le rapport d'essai soit remis au demandeur. De plus, le problème d'identification du modèle auquel le certificat a été attribué n'est pas réglé de manière satisfaisante. Enfin, il est convaincu des bénéfices que l'on retirera du système et demande que tous les efforts soient faits pour aboutir rapidement.

    M. FABER reconnaît les progrès réalisés dans le 3e avant-projet et suggère une approche pragmatique, pas à pas, pour régler les problèmes les uns après les autres tout en permettant un démarrage rapide du système. Outre le problème d'identification déjà mentionné, il faudra également régler celui de la forme du rapport d'essai.

    M. PUTERA apporte son soutien de principe au système mais fait remarquer son intérêt limité pour les pays en développement, dans lesquels les constructeurs ont le plus souvent une production limitée au plan national et ne verront aucun bénéfice au système. Par ailleurs, l'intérêt du système sera d'autant plus grand que les réglementations nationales sont exactement alignées sur les Recommandations OIML. Si dans un pays, la réglementation nationale s'écarte des Reccommandations, les certificats ne pourront être utilisés que partiellement pour accélérer et faciliter les approbations de modèles nationales.

    M. BAI exprime également son accord général pour le 3e avant-projet qui présente à ses yeux des progrès par rapport aux textes précédents; il pense néanmoins qu'il faut prévoir les risques de litiges, par exemple si un pays n'est pas d'accord avec les conclusions d'un certificat émis par un autre pays, et savoir comment résoudre les problèmes qui en résulteront. Par ailleurs, il préféerait que l'on conserve les clauses du 2e avant-projet qui autorisent l'emploi d'une autre langue, en plus du français et/ou de l'anglais; on peut par exemple présenter les certificats avec des lignes blanches en dessous des informations en français ou en anglais pour permettre l'adjonction des mêmes informations dans une autre langue.

    A l'issue de ces discussions, M. BIRKELAND, constatant le soutien général aux principes de base du système mais conscient de la nécessité d'établir un nouvel avant-projet, propose de charger un groupe ad hoc d'aider le Bureau dans cette tâche; il suggère que ce groupe ad hoc soit formé d'experts désignés par les Membres du Comité de la R.F. d'Allemagne, des USA et de la France. Le nouvel avant-projet devrait être présenté au Conseil de la Présidence à sa réunion de début février 1990 avant soumission aux Membres du Comité.

    M. PETERSEN demande que possibilité soit donnée aux Membres du Comité qui le souhaitent de faire connaître par écrit leur point de vue complet sur le 3e avant-projet, en plus des commentaires présentés oralement en séance.

    En conclusion, le Comité adopte la Résolution suivante:

    Le Comité International de Métrologie Légale

    CONSIDERANT la Résolution C8-1988, point 7, par laquelle la Conférence l'a chargé d'établir les règles détaillées de fonctionnement d'un Système volontaire de Certificats OIML,

    AYANT PRIS NOTE du rapport de son Président à ce sujet,

    AYANT PRIS CONNAISSANCE du troisième avant-projet "Système de Certificats OIML",

    CHARGE un groupe ad hoc composé d'experts nommés par les Membres du CIML de la République Fédérale d'Allemagne, des Etats-Unis d'Amérique et de la France, de préparer, en étroite coopération avec le Bureau, un quatrième avant-projet basé sur les deuxième et troisième avant-projets et tenant compte dans toute la mesure du possible des commentaires exprimés par écrit sur le deuxième avant-projet, des commentaires exprimés oralement en séance et éventuellement de commentaires additionnels que certains Membres du CIML pourraient envoyer très prochainement au BIML,

    RAPPELLE au groupe ad hoc que ce quatrième avant-projet doit respecter les principes suivants :

    - être basé sur les documents ISO, CEI, ILAC appropriés relatifs aux essais et à la certification,

    — être basé sur, et en même temps contribuer à créer, un haut degré de confiance réciproque en ce qui concerne les essais effectués et les certificats délivrés par les différents Etats Membres de l'OIML,

    — être d'un caractère volontaire,

    - fonctionner sur une base décentralisée,

    - — s'appliquer à des instruments complètement couverts par des Reccommandations Internationales qui fixent non seulement les caractéristiques métrologiques mais aussi les méthodes et moyens d'essai et la présentation du rapport d'essai,

    - tenir compte du fait que le rapport d'essai reste la propriété du demandeur et que le certificat peut être utilisé à des fins publicitaires,

    - tenir compte du fait que dans certains pays la délivrance des certificats sera effectuée par une Autorité de Délivrance et non par le Membre du CIML,

    - tenir compte du fait que la notion de durée de validité des certificats n'a pas à être prise en considération,

    CHARGE le groupe ad hoc et le Bureau de présenter ce quatrième avant projet à la considération du Conseil de la Présidence, à sa prochaine réunion, avant soumission à tous les Membres du CIML.

- number: '6.2'
  title: Actions nécessaires au bon fonctionnement du système
  narrative: |2+

    M. BIRKELAND propose que les discussions sur ce sujet prennent comme point de départ le mémorandum établi par M. KOCHSIEK.

    Il faut tout d'abord s'assurer que les Recommandations OIML relatives aux instruments que l'on souhaite voir entrer dans le système soient complètes et permettent effectivement d'effectuer des essais de manière uniforme. M. BIRKELAND

    estime que le Bureau est le mieux placé pour faire cet examen des Recommandations en vue de leur application au système de certificats, puis pour faire rapport des résultats de cet examen au Conseil de la Présidence.

    Pour les Recommandations qui ne répondraient pas à ces exigences, le Conseil demanderait aux Secrétariats concernés d'effectuer les travaux complémentaires nécessaires, selon un calendrier qui découlerait de la priorité que l'on attribue à l'entrée des instruments concernés dans le système ; le cas échéant, les Secrétariats auraient à revoir leurs programmes de travail pour satisfaire aux nouvelles priorités.

    M. OHLON est d'accord pour que le Bureau fasse un examen général des Recommandations; cependant, la question d'interprétation des exigences des Recommandations devrait être laissée aux Secrétariats concernés. Le Bureau devrait donc se contenter d'attirer l'attention des Secrétariats sur les risques d'interprétations divergentes des exigences, mais laisser les Secrétariats travailler, si nécessaire, à l'amélioration de la rédaction de ces exigences.

    M. CLAPHAM demande que le Bureau et les Secrétariats s'assurent également de la compatibilité mutuelle des Recommandations traitant de sujets connexes (par exemple, la R76 sur les instruments de pesage et la R60 sur les cellules de pesée utilisées comme capteurs dans ces instruments ne sont pas compatibles à 100 %).

    M. KOCHSIEK pense que les Secrétariats ont besoin de lignes directrices pour savoir comment développer des Recommandations complètes dans l'optique du système; le Bureau devrait entreprendre l'établissement de ces lignes directrices.

    M. ATHANÉ exprime son plein accord et indique que cette question doit être traitée de manière plus générale sous point 7.3 de l'ordre du jour.

    M. BIRKELAND poursuit en soulignant une autre proposition de M. KOCHSIEK, visant à encourager les constructeurs à demander la délivrance de certificats OIML par exemple lorsqu'ils présentent des instruments à une approbation de modèle nationale; cela bien sûr ne pourra se faire que lorsque le système OIML sera en vigueur mais on peut dès maintenant informer les constructeurs de la création future de ce système et des avantages qu'ils pourront en retirer. Par ailleurs, rien n'empêche les services nationaux de mentionner, dans les décisions d'approbations de modèles ou dans des documents annexes, que les instruments approuvés selon les réglementations nationales sont également conformes aux exigences de l'OIML, si tel est le cas.

    Une autre proposition incite les services nationaux à prendre en considération les certificats OIML et le cas échéant à alléger les essais, quand est demandée l'approbation de modèle d'un instrument ayant fait l'objet d'une délivrance de certificat OIML. Cela également ne peut s'appliquer que lorsque le système sera en vigueur mais, dès maintenant, les services peuvent chercher à savoir, lorsqu'une approbation de modèle leur est demandée, si l'instrument en question a fait l'objet d'une approbation dans un autre pays dont la réglementation serait conforme aux exigences de l'OIML.

    M. BIRKELAND constate que certains pays pratiquent déjà cela et estime qu'il faut encourager les autres pays à faire de même.

    La délégation des PAYS-BAS rappelle qu'elle a demandé que, à côté des exigences, des méthodes d'essai et de la forme des rapports d'essai, on examine soigneusement la question d'identification des instruments.

    M. EMERSON pense qu'il serait nécessaire de bien dissocier, dans les Recommandations, les exigences à caractère obligatoire des spécifications conseillées.

    A l'issue de ces discussions, M. BIRKELAND constate que les propositions n'ont pas soulevé de réactions négatives de la part du Comité et demande au Bureau d'entreprendre les actions nécessaires à leur mise en application.

