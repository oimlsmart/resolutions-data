- number: '2'
  title: 1 Nouveaux Membres - Perspectives d'adhésions
  narrative: |2+

    M. Athané rappelle au Comité l'adhésion comme État Membre du Kazakhstan; d'autre part, trois pays ont adhéré comme Membres correspondants: le Mozambique, la Thaïlande et l'Uruguay. Il ajoute que divers contacts ont été établis: avec le South Africa Bureau of Standards, signe d'une possible prochaine adhésion à l'OIML de l'Afrique du Sud; avec le Mexique (pour un éventuel changement de son statut de Membre Correspondant à État Membre) et avec quelques autres pays qui pourraient devenir États Membres ou Membres Correspondants.

- number: '3'
  title: 1 Adoption du rapport comptable pour 1994
  narrative: |2+

    Le rapport comptable pour 1994 est approuvé sans commentaire. Le Comité charge son Président et le Directeur du Bureau de présenter ce rapport à la Dixième Conférence.

- number: '4'
  title: 1 Contrat de M. Athané, Directeur
  narrative: |2+

    Le Comité renouvelle le contrat du Directeur du Bureau pour une période de cinq ans à compter du 1er janvier 1996.

- number: '5'
  title: 1 Examen de la situation de certains TC/SC
  narrative: |2+

    M. Chappell, responsable du suivi des activités techniques pour le compte du Conseil de Présidence, présente un rapport d'activité des comités techniques et souscomités. Il fait remarquer que le passage de l'ancienne structure (Secrétariats Pilotes et Rapporteurs) à celle actuelle s'est opéré avec succès et n'a pas ralenti significativement le déroulement du travail, et ajoute que les nouvelles procédures ont apporté une amélioration appréciable en permettant de se préoccuper des priorités et d'eliminer des thèmes de travail qui n'étaient pas, ou plus, d'intérêt pour la majorité des États Membres. Le BIML a été en mesure de participer à presque toutes les réunions inaugurales des nouveaux TC/SC et cela a permis une application correcte immédiate des Directives pour les travaux techniques. Concernant ces Directives, M. Chappell indique qu'elles ont généralement amélioré les conditions d'exercice des responsabilités des secrétariats des TC/SC. Il convient également de noter que les travaux qui n'ont pas été achevés avant la mise en place de la nouvelle structure, ont été poursuivis de manière adéquate. Le volume global de travail est satisfaisant, comme le montre le nombre de projets approuvés par le CIML en 1994. Cela s'est d'ailleurs traduit par une sérieuse surcharge de travail pour le BIML qui poursuit encore le travail de publication de tous ces nouveaux textes.

    M. Chappell donne des informations concernant les liaisons externes des TC/SC, lesquelles semblent moins développées que celles de l'ancienne structure, et conclut en soulignant que des efforts doivent être faits par le BIML et les TC/SC afin de développer ces liaisons en informant les organismes internationaux et régionaux appropriés des activités de l'OIML. Une autre tâche consisterait à identifier toute activité menée par d'autres organismes internationaux (en particulier, l'ISO et la CEI) pouvant servir aux TC/SC de l'OIML de base pour leurs travaux, ou pour s'assurer que le travail de l'OIML n'entre pas en contradiction avec des travaux en cours d'achèvement menés par ces organismes internationaux.

    M. Chappell indique aussi que le BIML a mené une enquête relative aux programmes de travail des TC/SC, dont les résultats devront être examinés par le Conseil de Présidence.

    Certains TC/SC se sont trouvés confrontés à un problème avec nombre de membres-P ne participant pas activement aux travaux; les secrétariats sont invités à contacter le BIML à ce sujet afin d'appliquer les Directives qui prévoient la possibilité de déclasser les pays en cause de la position de membre-P vers celle de membre-O. Un autre problème rencontré par quelques sous-comités est que le nombre de membres-P n'atteint pas le minimum requis par les Directives. Pour ces SC, une solution reste à trouver, soit en encourageant les pays à s'inscrire comme membres-P, soit en supprimant ces SC et en attribuant leurs tâches aux TC parents (à condition que les travaux restent d'intérêt pour la majorité des États Membres).

    M. Klenovský s'enquiert de l'état des liaisons avec l'ISO, ILAC et EAL après la réunion du TC 3/SC 4 à Paris. M. Athané indique que des contacts ont été établis pour permettre à l'OIML de participer à la révision du Guide ISO 25, et d'obtenir des informations concernant les procédures d'accréditation.

    M. Birch soutient les vues de M. Chappell concernant la pertinence des nouvelles structures. Cependant, il attire l'attention sur les difficultés rencontrées par des pays comme l'Australie pour participer au travail par des réunions qui trop souvent sont tenues en Europe. Les réunions du CIML en Chine, puis de la Conférence au Canada, vont marquer l'internationalisation de l'OIML, mais concernant les travaux des TC/SC, il faudrait parvenir à une meilleure coordination pour permettre l'organisation de réunions successives et éviter les réunions simultanées.

    M. Chappell convient de la nécessité d'annoncer en temps adéquat les réunions techniques, avec la possibilité de réorganiser le calendrier pour faciliter la participation. M. Chappell rappelle au Comité le rôle du Conseil de Présidence dans la surveillance des travaux des TC/SC, par l'intermédiaire des rapports annuels qui non seulement décrivent les progrès effectués dans l'année écoulée, mais fournissent aussi des informations sur les activités prévues pour l'année à venir, dont les réunions.

    M. Kochsiek met en avant le cas du TC 12, sur les compteurs d'énergie électrique, pour lequel l'Allemagne n'a toujours pas reçu de soutien suffisant des autres États Membres, en dépit de son intérêt évident pour la métrologie légale. M. Klenovský remarque que cela est dû au fait que nombre de pays sont déjà actifs dans ce domaine au sein de la CEI. M. Kochsiek répond qu'il n'y a pas pour autant d'empêchement à disposer d'une Recommandation OIML basée sur la Norme CEI correspondante, et intégrant les dispositions spécifiques de métrologie légale.

    M. Klenovský suggère que les activités des TC/SC soient reconsidérées en fonction des tendances à la déréglementation qui peuvent être observées dans nombre de pays et de régions, ceci constituant un éventuel sujet d'examen lors de la prochaine Conférence de l'OIML. M. Athané indique que, comme d'habitude, un rapport sur les activités techniques globales de l'OIML sera présenté à la Conférence.

- number: '6'
  title: 1 Situation actuelle du Système de Certificats OIML
  narrative: |2+

    M. Vichenkov résume la situation actuelle des activités OIML sur la certification, qui couvre plusieurs catégories d'instruments, bien que jusqu'à présent les 40 certificats délivrés s'appliquent uniquement à des instruments de pesage à fonctionnement non automatique et à des cellules de pesée. Des autorités de délivrance ont été établies dans un certain nombre de pays; cependant, les demandeurs de certificats OIML sont originaires d'un plus grand nombre de pays. Suivant un questionnaire distribué par le BIML, il apparaît que plusieurs pays sont prêts à accepter des certificats afin de faciliter l'obtention d'approbations de modèle nationales. Il apparaît également que certains pays seulement acceptent qu'un certificat unique couvre plusieurs types d'instruments; il convient que ceci soit discuté et clarifié plus tard.

    M. Vichenkov ajoute qu'une base de données pour les certificats OIML a été créée par le BIML.

    Pour conclure sa présentation, M. Vichenkov indique que le BIML étudie soigneusement l'activité des autres organes internationaux et régionaux dans le domaine de la certification et des activités connexes comme l'évaluation de la conformité et l'accréditation des laboratoires d'essai, et qu'une information appropriée a été distribuée à tous les Membres du CIML.

    M. Birkeland demande une information complémentaire concernant la future base de données: celle-ci sera-t-elle mise à la disposition des Membres de l'OIML ou d'autres personnes intéressées (par exemple via des modems)? M. Athané confirme que c'est l'intention du BIML.

    M. Tuinder demande si oui ou non l'industrie et les demandeurs de certificats OIML ont été consultés lors de cette enquête mentionnée par le BIML. M. Vichenkov indique que certaines réponses de la part des Membres du CIML incluaient les opinions présentées par des fabricants nationaux; de plus, l'information obtenue à d'autres occasions montre qu'il existe des contacts étroits entre les services nationaux de métrologie légale et les fabricants nationaux; cependant, l'enquête du BIML n'a pas été adressée aux fabricants. M. Birkeland demande au Bureau de réaliser une telle enquête afin de connaître les points de vue des fabricants au sujet de la certification OIML.

    M. Riccioni exprime l'intérêt de l'Italie pour la certification OIML et explique que malheureusement, pour l'instant, seuls des instruments avec une approbation de modèle nationale ou européenne pourraient être acceptés.

    En conclusion, le Comité adopte la Résolution suivante:

    Le Comité International de Métrologie Légale

    AYANT PRIS NOTE d'un rapport présenté par le BIML, des résultats d'un questionnaire sur la certification OIML, et d'informations et propositions de certains Membres

    concernant la mise en application et le développement du Système de Certificats OIML aux niveaux national et international,

    EXPRIME sa satisfaction pour les diverses actions menées en faveur du Système de Certificats OIML, en particulier pour les efforts soutenus réalisés par les comités techniques et sous-comités OIML, le Conseil de la Présidence, et le BIML, en ce qui concerne l'application et le développement du Système,

    DEMANDE au Bureau d'effectuer périodiquement des enquêtes auprès des fabricants d'instruments de mesure susceptibles d'être intéressés par le Système de Certificats OIML afin d'avoir leurs avis sur cette activité de certification.

- number: '7'
  title: 1 Rapport sur le TAG $ _{cert} $
  narrative: |2+

    M. Kochsiek indique que la création de ce groupe technique consultatif (TAG) a abouti rapidement et qu'une première réunion est prévue début 1996. L'activité devrait se concentrer sur les thèmes suivants:

    - application des certificats aux familles de modèles,

    - certification de modules

    - application de procédures d'accréditation aux autorités de délivrance, laboratoires d'essai et fabricants,

    - établissement de règles pour les accords de reconnaissance des certificats et résultats d'essai,

    - examens périodiques de l'opinion concernant la certification OIML,

    - révision du document sur le Système de Certificats OIML pour les Instruments de mesure.

    avec possibilité de créer des groupes de travail au sein du $ \mathrm{TAG}_{\mathrm{cert}} $ afin d'aider le BIML dans ses tâches de secrétariat du $ \mathrm{TAG}_{\mathrm{cert}} $ .

    M. Klenovský exprime son inquiétude du fait que la certification OIML pourrait être considérée comme un moyen de promotion, par l'intermédiaire des autorités nationales de délivrance, des fabricants de leur pays, et aussi du fait que les pays ayant mis en place des autorités de délivrance ne semblent pas prêts à accepter les certificats émis par d'autres pays.

    M. Kochsiek explique qu'au sein de l'Union Européenne, chaque fois qu'existe une Directive harmonisée, les pays sont seulement autorisés à accepter les approbations CE. M. Athané fait remarquer qu'un pays européen peut délivrer une approbation CE basée sur le rapport d'essai associé à un certificat OIML. Il ajoute que la promotion de fabricants nationaux, par le biais de la certification OIML, est un phénomène normal qui devrait être accepté par les États Membres de l'OIML.

    En conclusion des discussions, le Comité adopte la Résolution suivante:

    ## Le Comité International de Métrologie Légale

    AYANT PRIS NOTE d'un rapport sur la situation du Système de Certificats OIML, la composition du TAG $ _{cert} $ les résultats d'un questionnaire sur les sujets de travail du TAG $ _{cert} $ et ceux de deux autres questionnaires envoyés aux autorités de délivrance et aux constructeurs d'instruments de mesure, ainsi que d'informations et de commentaires fournis par certains Membres,

    EXPRIME son appréciation pour les diverses activités menées en faveur du Système de Certificats OIML;

    DEMANDE aux Membres du TAG $ _{cert} $ d'accepter les sujets de travail proposés sur la base des questionnaires mentionnés ci-dessus et de nommer pour chaque sujet un Rapporteur comme indiqué dans le rapport du BIML;

    DEMANDE au BIML d'étudier la possibilité d'organiser une réunion du TAG $ _{cert} $ en 1996 et d'informer tous les Membres concernés au sujet de cette réunion;

    DEMANDE à tous ses Membres de fournir au BIML et au TAG $ _{cert} $ des informations et publications relatives à la certification, à l'examen de conformité, à l'accréditation et autres sujets liés, et

    DEMANDE au BIML de faire rapport sur les activités du TAG $ _{cert} $ à la prochaine réunion du CIML.

- number: '8'
  title: 1 Rapport de publication
  narrative: |2+

    M. Athané donne des informations concernant la publication et la diffusion de ces documents, et rappelle au Comité qu'un rapport financier a déjà été envoyé à tous les Membres du CIML. Il ajoute qu'un petit prospectus donnant des informations de base sur l'OIML sera préparé en 1996.

- number: '9'
  title: 2 Activités futures
  narrative: |2+

    M. Benkirane, Président du Conseil de Développement de l'OIML, précise qu'il souhaite limiter son rapport aux décisions essentielles de la réunion, étant donné que le BIML sera chargé de préparer un rapport écrit. Des discussions portent tout d'abord sur la question de ce que sont les besoins actuels des pays en développement. M. Benkirane fait remarquer que ces besoins ont changé récemment et qu'il sera nécessaire de

    reconsidérer cette question, en association avec tous les pays concernés; en particulier, les réponses dependent des possibilités d'assistance de la part des pays industrialisés ou des institutions internationales spécialisées.

    M. Benkirane indique que le symposium sur la métrologie dans les pays en développement a été discuté et qu'il a été accepté que celui-ci ne traite pas de matières techniques mais des sujets politiques et économiques connexes à la métrologie. Le but serait de montrer que la métrologie constitue une des bases nécessaires au développement économique, y compris pour les échanges internes et externes. Des actions de promotion du symposium devraient être entreprises par le Conseil avec l'aide matérielle du BIML.

    La coopération entre l'OIML et les institutions régionales a été discutée et il a été suggéré que le CIML demande au BIML de la renforcer.

    Concernant le document sur la politique de l'OIML, M. Benkirane explique que le Conseil a noté avec satisfaction que l'assistance au développement a été considérée d'une manière appropriée.

    Deux groupes de travail rattachés au Conseil de Développement ont déjà été créés dans le domaine de la formation et de l'équipement et devraient commencer à travailler prochainement; l'établissement de deux autres groupes pour la documentation/information et pour l'organisation des services de métrologie (y compris l'étalonnage et les essais) devraient être soumis à l'approbation du CIML. Ces groupes ont pour but de permettre une réflexion sur les besoins des pays en développement. Le BIML devrait participer activement à l'initialisation du travail de ces groupes.

    Il a été aussi envisagé d'instituer des officiers régionaux de l'OIML et ceci devrait être discuté plus en détail dans un avenir proche.

    Enfin, M. Benkirane explique que plusieurs délégations ont donné une information relative aux possibilités financières pour faciliter de telles activités.

    En conclusion, M. Benkirane indique que, avec l'aide de certains membres du Conseil de Développement et du Bureau, un projet de décision a été développé à l'intention des Membres du CIML; ce projet est discuté et, finalement, le Comité adopte le texte suivant:

    Le Comité a pris note d'un rapport présenté par Mr M. Benkirane, Président du Conseil de Développement de l'OIML, sur la réunion du Conseil qui s'est tenue les 10-11 octobre 1994 à Paris, et comprenant les sujets tels que les cours de formation et l'aide technique fournie par certains Membres de l'OIML, un questionnaire sur la situation de la métrologie légale dans les pays en développement, et la coopération régionale.

    Le Comité a accepté l'invitation de la République Populaire de Chine de tenir un symposium sur les activités métrologiques dans les pays en développement, conjointement à la prochaine réunion du Conseil de Développement et à la 30ème réunion du CIML prévues pour les 23-27 octobre 1995 à Pékin. Le Comité a approuvé le fait que le symposium porte sur des sujets à caractère politique, y compris l'importance économique de la métrologie légale. Le Comité a demandé au BIML de faire tous les efforts possibles pour impliquer les organismes économiques internationaux tels que la Banque Mondiale, l'Organisation Mondiale du Commerce, le PNUD, et l'ONUDI dans le symposium.

    Le Comité a noté qu'un soutien financier (dans les limites des décisions de la 9ème Conférence) sera apporté pour aider certains pays membres à participer au symposium et à la réunion du Conseil de Développement. Le Comité a également demandé au BIML de poursuivre sa recherche de financement du symposium auprès des autres organisations internationales, régionales et nationales concernées.

    Le Comité a noté les changements qui se sont produits dans le domaine de la métrologie légale tels qu'identifiés dans le projet de document sur la politique à long terme de l'OIML. La plupart de ces changements, en particulier ceux relatifs aux structures institutionnelles, au rôle des gouvernements, et au champ d'application de la métrologie légale sont de toute première importance pour les pays qui mettent en place leurs services de métrologie légale.

    Le Comité a noté que la présidence des groupes de travail du Conseil de Développement était assumée comme suit:

    - Groupe de travail sur l'enseignement de la métrologie - Allemagne, Dr Wallerus (DAM)

    - Groupe de travail sur la planification et l'équipement des laboratoires de métrologie - Russie (président à nommer en temps utile).

    et a donné son accord pour la création de deux groupes de travail supplémentaires: documentation et information et organisation des services métrologiques (y compris étalonnage et essais). Les États Membres ont été invités à présenter leur candidature à la présidence de ces groupes de travail ou à s'inscrire comme membres.

    M. Birch suggère que le CIML réfléchisse sur ces matières de régionalisation, non seulement dans le cadre des activités OIML pour les pays en développement, mais aussi d'un point de vue plus général. A ce sujet il fait remarquer que la coopération internationale ne peut résoudre tous les problèmes qui pourraient être soumis avec plus de succès à des forums régionaux. Il regrette également le fait qu'un certain nombre de sujets mentionnés pendant la réunion du Conseil de Développement n'apparaissent pas de manière appropriée dans la décision ci-dessus. M. Chappell soutient les points de vue de M. Birch concernant l'importance de mettre en évidence le rapport entre les coopérations internationale et régionale. M. Athané répond qu'il est difficile pour le CIML de prendre des décisions sur des sujets qui n'ont pas encore été à l'heure actuelle discutés par le Comité, que ce soit par correspondance ou lors d'une réunion; par exemple la possibilité d'engager des officiers régionaux devrait être d'abord discutée en profondeur (lors d'une réunion ou par correspondance) par les membres du Conseil de Développement avant que ce point soit repris dans l'ordre du jour d'une réunion du CIML.

    En ce qui concerne les relations entre l'OIML et les institutions régionales, M. Birkeland soutient que ce sujet présente un intérêt général pour l'OIML et que le Conseil de Présidence devra d'abord y réfléchir (y compris en ce qui concerne les aspects spécifiques pour les pays en développement) et ensuite faire un rapport au CIML afin de décider de la politique de l'OIML dans ce domaine.

    ## 10 COMMUNICATIONS OIML

- number: '10'
  title: 1 Rapport sur le Symposium Activités métrologiques dans les pays en développement,
    23-24 octobre 1995
  narrative: |2+

    M. Kochsiek, responsable du suivi des activités de développement au nom du Conseil de Présidence, donne un rapport sur le premier Symposium OIML sur les activités métrologiques dans les pays en développement, organisé par le SBTS et le BIML, auquel ont participé plus de 100 personnes en provenance de 34 pays. Vingt-trois conférences ont été dispensées sur quatre thèmes: (i) sujets de politique générale; (ii) services métrologiques nationaux; (iii) coopération en métrologie aux niveaux national, régional, et international; et (iv) sujets de métrologie légale (formation, traçabilité, etc.).

    D'après M. Kochsiek, les conférenciers ont donné une bonne analyse de l'état actuel de la métrologie légale et de ses tendances dans différentes régions. Les résultats du symposium semblent donc positifs, et il convientrait d'organiser d'autres symposiums pour échange d'expériences et pour promouvoir certaines conceptions dans le domaine de la métrologie. Cependant, ils devraient soit être organisés sur deux ou trois jours (au lieu d'une journée et demie pour celui-ci), soit comprendre moins de conférences, de façon à laisser plus de temps pour les discussions.

    M. Kochsiek évoque certains thèmes pouvant être traités lors des symposiums à venir, dont l'impact économique, la coopération internationale et régionale, les questions générales de la métrologie légale et appliquée, ou la métrologie dans le cadre de la protection de l'environnement.

