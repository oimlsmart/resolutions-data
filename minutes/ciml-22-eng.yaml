- number: '8.3'
  title:
  - spelling: eng
    value: Preliminary budgetary proposals for the financial period 1989 to 1992
  narrative:
  - spelling: eng
    value: |2+

      Mr ATHANE submitted a preliminary draft agenda for the Conference which the Committee found generally acceptable.

      Mr BIRKELAND introduced the Bureau's proposal in the hope that Committee Members were conscious of the amount of work with which the Bureau was burdened. He hoped that they were aware that it was the Committee's responsibility then to help the Bureau in formulating sound arguments in support of a budgetary request that was as convincing as possible and which the Member States could accept at the Conference.

      Mr BIRKELAND added that it was also the responsibility of Committee Members to contact their authorities and to make every effort to convince them of the need to accept the proposed budget.

      Mr EDGERLY expressed his general support for the budgetary proposal. He thought, nevertheless, that it would be wise to bring out the fact that the Member States' subscriptions, and therefore the increases requested, were really very low in absolute value if they were compared, for example, with other organizations' budgets. It would be better, then, to present the requested increases as an absolute value and not as a percentage.

      Mr EDGERLY added, however, that while he totally approved of the increase requested in order to recruit an extra person for the Bureau, he found the sum envisaged for the rearrangement of the building to accommodate this increase in personnel much less justified.

      Mr BIRKELAND thought that the budgetary proposal would be easier to read if the sums were rounded to thousands of francs and expressed in kilofrancs.

      Mr BERTRAN said that the French authorities seemed to understand the need to increase the number of people working at BIML. On the other hand they asked that the building expenses be both reduced and spread over as long a period as possible.

      Mr PETERSEN suggested that it be explained that the budget for the operation of the Bureau represented only a part of the total expense committed by the Member States of OIML.

      Mr BIRKELAND thought that that argument could work well with some financial administrations or in some countries, but not in every case. He asked his colleagues to use that argument if they thought it appropriate but he preferred that it should not appear in the paper which the Bureau would prepare for the Conference.

      Mr FABER observed that OIML had developed greatly in fifteen years without the benefit of any increase in the Bureau's staff complement. He thought, therefore, that the Bureau could be congratulated on its work and efficiency. He supported the budgetary request submitted by the Bureau, but he thought that it would be as well to insist more on the fact that the work programme for 1989 to 1992 was going to be very finely screened and that the increase in the activities of OIML was a necessary increase brought on by the reality of the situation and not an artificial or bureaucratic growth.

      Mr ISSAEV feared that the increase which was sought for 1989 might be too big for some Member States. He thought, moreover, that it would be wise to make it plain that the increase requested for the rearrangement of the building was a temporary increase which would not be repeated in the following financial period.

      Mr HASCHE was strong in his support for the idea that permanent expenses, recurring in several budgetary periods, should be clearly distinguished from occasionnal expenses, which occurred only once.

      Mr FANNING said that in Ireland, as in many other countries, it was practically impossible for an administration to obtain an increase in personnel because of the current financial situation. Consequently the Bureau's request must be thoroughly justified, and therefore some inconsistencies which appeared in the Bureau's proposal should be removed. It said, for example, on one page that the Bureau had been able up to now to keep pace with the increase in the work load; on another page it said that the programme for 1989 to 1992 represented an amount of work almost equivalent to that of the previous programme. The need to recruit an extra member of staff was far from evident!

      Mr OHLON thought the document should bring out more forcefully the impact of OIML's activities and the resulting benefits enjoyed by Member States. For example, OIML's work allowed other institutions such as CAEM, EEC, EFTA... to develop the standards and directives they needed more rapidly and at less cost.

      Mr BIRKELAND wound up the discussion by thanking his colleagues for all the positive opinions and counsels that they had given of the Bureau, and he asked the latter to prepare the final draft of the budgetary proposal for submission to the Conference.

