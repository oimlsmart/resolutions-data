      ## DECISION CIML 1987 POINT 2

      The Committee took note of the report on the accessions of Portugal as Member Country and of Barbados as Corresponding Member, on the prospects of new accessions and on the situation of Venezuela.

      ## DECISION CIML 1987 POINT 3.1

      The Committee approved the auditor's reports for 1985 and 1986 and instructed its President and the Director of the Bureau to submit them to the Eighth Conference.

      ## DECISION CIML 1987 POINT 3.2

      The Committee took note of the report on the financial situation of the Organization for 1987 and of the estimates for 1988.

      ## DECISIONS CIML 1987 — POINT 4

      The Committee :

      - renewed the contract of Mr THULIN, Assistant Director, from the date of expiry of the current contract (September 1988) and up to the age limit fixed by BIML staff regulations,

      - annulled its Decision CIML 1986 - Point 4.1, relating to the extension of the contract of Mr PETIK, Assistant Director, for 2 years, and replaced it by a 5-year renewal from the date of expiry of the first contract (June 1986).

      The Committee took note of the report on the planning exercise for the period 1985 to 1988.

      ## RESOLUTION CIML 1987 POINT 5.2

      ## The International Committee of Legal Metrology

      HAVING TAKEN NOTE of the comments, submitted by certain Member States, on the preparations for the planning period 1989 to 1992,

      HAVING TAKEN NOTE of the proposals of the Bureau,

      HAVING HEARD the oral comments of Committee Members,

      NOTING that planning criteria are required so that the plan for 1989 to 1992 may be prepared in time,

      INVITES Committee Members to inform the Bureau of their views on planning criteria and priorities and on the criteria for the inclusion of a subject in the work programme,

      INSTRUCTS the Bureau to compile the information and views of Committee Members on this subject and to bring them to the attention of the Presidential Council,

      CHARGES the Presidential Council with considering and weighing the views expressed and with making a recommendation to the 23rd meeting of the Committee,

      INSTRUCTS the Bureau to proceed with the other aspects of the planning exercise for the period 1989 to 1992 in accordance with the proposals of BIML presented at the meeting.

      ## DECISION CIML 1987 POINT 6.1

      The Committee took note of the state of progress of the work of OIML Secretariats.

      ## DECISIONS CIML 1987 POINT 6.2

      ## The Committee

      - assigned to the German Democratic Republic responsibility for the Reporting Secretariats SP 11-Sr2 « Hierarchy scheme for pressure measuring instruments » and SP 14-Sr3 « Mechanical vibration and shock 」

      - assigned to the People's Republic of China responsibility for the Reporting Secretariat SP14-Sr1 « Sound level meters »

      - postponed to a later date the creation of the Reporting Secretariat SP23-Sr6 "Principles of horizontal intercomparisons (measuring standards of the same level) while awaiting the candidature of a State willing to undertake responsibility for it

      - created and assigned to Czechoslovakia the Reporting Secretariat SP23-Sr7 《 Recalibration intervals of measurement standards and devices used for calibration and verification 》 (international working group and liaison with other international institutions to be set up by BIML)

      - created and assigned to the United States of America the Reporting Secretariat SP 5D-Sr 10 « Direct mass flow measurement of quantities of liquids » (international working group and liaison with other international institutions to be set up by BIML)

      - created and assigned to Australia the Reporting Secretariat SP 5S-Sr 12 « Static direct mass measurement of quantities of liquids » (international working group and liaison with other international institutions to be set up by BIML)

      - discontinued the Reporting Secretariats

      SP 2-Sr 3 « Legal qualification of measuring instruments »

      SP27-Sr6《Prescriptions concerning the contents of reference material certificates》

      SP 27-Sr 8 « Information concerning reference materials »

      - took note of the new descriptive titles of SP22-Sr4 and SP23

      - took note of France's request that responsibility for SP 5S « Static measurement of quantities of liquids » be assumed by another Member State as soon as possible.

      ## RESOLUTION CIML 1987 POINT 6.3

      ## The International Committee of Legal Metrology

      HAVING TAKEN NOTE of the comments on the " Working Method of OIML Secretariats " submitted by certain Member States,

      HAVING TAKEN NOTE of the Bureau's proposals,

      HAVING HEARD the oral comments of Committee Members,

      RECOGNISING that the provisions contained in the « Working Method of OIML Secretariats » are in general entirely appropriate,

      CONSIDERING nevertheless that some points of detail could be completed or improved,

      CONSIDERING that the problems that arise are almost always due to incorrect implementation of these provisions, mainly due to their being poorly known,

      INSTRUCTS the Bureau to proceed to the necessary improvements and additions, under the supervision of the Presidential Council,

      INSTRUCTS the Bureau to prepare summaries of these provisions, in particular for the information of participants in Secretariats' meetings,

      REMINDS the Members of the Committee that it is their duty to ensure that the Secretariats for which their countries are responsible or in which their countries participate adhere strictly to these provisions.

      ## DECISIONS CIML 1987 POINT 7

      - The Committee noted the report of the Bureau and the information given by Members of the Committee on the application of Resolutions CIML 1986 —

      POINTS 13.1 (information on bi-lateral and multi-lateral agreements), 13.2 (exchange of information on the results of pattern approval tests) and 13.3 (declarations of conformity of an instrument or of a batch of instruments appropriately identified).

      - The Committee instructed the Bureau to develop, using a model already presented and taking into account comments made during the meeting, a draft declaration of conformity of a pattern ; to take advice from states having already considered issuing certificates of this kind ; and to place this draft before the Presidential Council, accompanied by whatever comment is necessary, for transmission to the Committee at its next meeting.

      ## RESOLUTION CIML 1987 POINT 7

      ## The International Committee of Legal Metrology

      HAVING HEARD the oral comments made by some of its Members, on the appropriateness of establishing an OIML certification system or an OIML mark,

      RECALLING the studies already completed on this subject by an ad hoc group in the years 1975 to 1982,

      CONCLUDES that the time has come to restart work on this subject,

      INSTRUCTS the Bureau to make the analyses, compilations and enquiries it deems appropriate,

      CHARGES the Presidential Council with the supervision of this work and the submission of a progress report at the next meeting of the Committee.

      ## DECISION CIML 1987 POINT 8.1

      The Committee took note of reports submitted by the Committee Member for Australia and by the Bureau on preparations for the Eighth Conference.

      ## DECISION CIML 1987 POINT 8.2

      The Committee took note of a draft agenda for the Eighth Conference.

      ## DECISION CIML 1987 POINT 8.3

      The Committee took note of a draft budgetary proposal for 1989 to 1992, and it suggested to the Bureau how some of the arguments developed in the draft might be improved.

      ## DECISION CIML 1987 POINT 9

      The Committee took note of the reports presented by the President of the Development Council and by the Bureau, expressed its appreciation of the actions

      taken, particularly of the organisation of a meeting in Cuba of the Development Council, together with a meeting of SP31 and a seminar.

      ## DECISION CIML 1987 — POINT 10

      The Committee took note of the proposals relating to various categories of publications and instructed the Bureau to modify the « Working method of OIML Secretariats » accordingly.

      ## DECISION CIML 1987 — POINT 11

      The Committee took note of the report on technical seminars and expressed its appreciation of this activity of the Bureau; it encouraged the Federal Republic of Germany and the Bureau to organise a seminar on non-automatic weighing instruments in 1989; it also took note of a suggestion that regional seminars on laboratories for calibration and testing, and on problems of calibration and verification, of special interest to developing countries, be organised.

      ## DECISION CIML 1987 - POINT 12

      The Committee took note of the report on the activities of the BIML during the period April 1986 - August 1987 and expressed its appreciation.

      ## DECISION CIML 1987 POINT 13

      The Committee noted reports on liaison between OIML and certain International Institutions and encouraged the Bureau and the working groups of OIML to continue their cooperative efforts.

      ## DECISION CIML 1987 POINT 14

      The Committee noted a report on the terminological work of OIML, expressed its agreement with the proposals submitted and instructed SP1 and the Bureau to report back on this subject at an appropriate time.

      ## DECISION CIML 1987 — CLOSURE

      The Committee took note of the fact that Mr David E. EDGERLY was obliged by the application of Article XIII of the Convention to relinquish his responsibilities as Member for the United States of America and Vice-President of the International Committee of Legal Metrology.

      It expressed its keen appreciation of all that Mr David E. EDGERLY had done since 1972.
