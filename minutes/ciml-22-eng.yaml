      Mr BIRCH detailed fully the preparations for the Eighth Conference, which had been invited by the Australian government to meet at Sydney in October 1988, a year which would also see the celebration of the Bicentenary of the European Settlement on the continent. Mr ATHANE added some administrative details.

      On behalf of the Committee Mr BIRKELAND thanked Mr BIRCH for all these preparations to ensure the success of the Conference.

