      The International Committee of Legal Metrology

      HAVING EXAMINED the candidatures to the post of BIML Assistant Director presented by some Members of the Committee,

      BEING PLEASED with the great number of candidatures so presented and with the great ability of some of them,

      CONSIDERING the information given by the Director of the Bureau concerning the tasks for which the new Assistant might be responsible,

      DECIDES to appoint Mr PETIK as new Assistant Director,

      FEELS that it is advisable that the new Assistant assumes his new office shortly before the departure of the present titular in order to ensure a continuity in the Bureau activities.

      The International Committee of Legal Metrology

      CONSIDERING the candidatures presented for the post of Engineer,

      TAKING COGNIZANCE of a report of the Director of BIML concerning the orientation he would like to give to the various posts at BIML, aiming in particular at broadening the profile of the post of Engineer,

      DECIDES not to appoint an Engineer,

      ENTRUSTS the Director of the Bureau to present urgently to Members of the International Committee of Legal Metrology a description of the new characteristics of the post of Engineer and to ask at the same time for candidatures,

      MANDATES the President of the International Committee of Legal Metrology to proceed with the appointment of the future Engineer.

      AUTHORIZES the Director of the Bureau to keep on the staff list the present titular of the post of Engineer beyond the end of his contract but not beyond 31 December 1980 in order to enable the person concerned to restore his administration of origin or to look for a new job.

      ## DECISION CIML 1980 - POINT 9.2.

      The Committee has adopted for your guidance the Code hereafter relating to allocation of OIML financial aid for the participation in the meetings of the Development Council.

      ## The International Committee of Legal Metrology,

      by virtue of resolution C.6-1980, Item 7.2., taken by the 6th Conference, concerning the creation, terms of reference and principles of operation of the Development Council, with particular reference to points 2.2.3. and 2.4.2. of same,

      sets down the conditions and procedures for allocation of OIML financial aid, for the participation of full Member States in the meetings of said Council, as follows:

      1. On the occasion of each meeting, the OIML will, within the limits of the budget provided by the Conference for this purpose, bear travel and residential costs for a certain number of delegates from Developing Countries.

      2. This number will be fixed according, among other parameters, to the amount of provision made for the operating period concerned, and the number of meetings planned during said period.

      3. This aid may not be allocated to more than one delegate from the same country, for the same meeting.

      4. Countries invited to present candidates for aid on the occasion of a meeting, will be selected in rotation from a list kept permanently by the BIML, and established on the basis of the chronological order of applications, formulated beforehand by interested countries.

      5. Countries invited to take advantage of this aid on the occasion of a meeting, and which are unable to do so, will be replaced where possible by the next country on the list. The replaced countries will nevertheless have priority for the next meeting.

      6. In allocating this aid, the OIML cannot be held responsible for any possible accidents or other damage which may be incurred by invited delegates. The latter should take out such insurance cover as they see fit, for their trip.

      ## DECISION CIML 1980 - POINT 10

      The Committee agreed that the Bureau continues its efforts in view of organizing, if possible in 1981, a first technical seminary, on one of the subjects to which all Member States have given priority.

      ## DECISION CIML 1980 - POINT 16

      The Committee has elected, for a six years period, as President and first and second Vice-presidents :

      Mr K. BIRKELAND, Norway

      Mr L.K. ISSAEV, U.S.S.R.

      Mr A.O. McCOUBREY, U.S.A.
