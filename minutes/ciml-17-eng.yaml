    value: PRESIDENCY OF THE INTERNATIONAL COMMITTEE OF LEGAL METROLOGY
  narrative:
  - spelling: eng
    value: |2

      The meeting unanimously elected :

      ## Mr K. BIRKELAND (Norway) as President, and

      Mr L.K. ISSAEV (USSR) and Mr A.O. McCOUBREY (USA) as first and second Vice Presidents respectively. These gentlemen thank their colleagues for the confidence placed in them and declared their readiness to assume their responsibilities for the greatest good of the OIML.

      <div align="center">

      # Mr K. BIRKELAND

      </div>

      Mr President,

      Ladies and Gentlemen,

      Dear Colleagues,

      It is with great joy and much emotion that I accept the honour which you do me, as also the heavy responsibility with which you charge me, on my election to the Presidency of the International Committee of Legal Metrology.

      I am extremely touched by your confidence, and fully aware of the importance of the role which I will have to play.

      Firstly, Mr van MALE, rest assured that I shall use my best endeavours to continue to guide the Committee in a manner at once both flexible and human, but also with the same tenacity as you have applied over the last 12 years.

      Your example will indeed be of great value to me, as likewise the prospect for the future of which you spoke in your report. Then, we must not forget that the President is not isolated, but has two Vice-Presidents at his side. All three of us have been elected today. Thus, lacking in experience but full of good intentions, we shall assist each other in guiding the progress of our organization.

      There is also the Presidential Council, which I shall be convening in due time, and whose extremely valuable opinions will be considered with the closest attention.

      Finally, there is the BIML, on whose aid I know I can count. The sharing of tasks between the Director of the BIML and myself, will be conducted in full accord with the rules of our organization.

      Mr President, Ladies and Gentlemen, Colleagues, please accept my renewed thanks, and be assured that I shall devote myself wholehartedly to the prosecution of my new international functions.

      On termination of the discussions, Mr van MALE called on Messrs BIRKELAND, ISSAEV and McCOUBREY to take their places at the Presidential table.

      Mr van MALE again thanked the Committee for the harmonious and friendly collaboration which he had always encountered. He wished the Committee every success for the future, and expressed his confidence in the new President and Vice-Presidents of the CIML, in whose hands he placed the future of the Organization.

      Mr van MALE also thanked the personnel of the BIML, from whom he had always been able to obtain assistance when he had need of same.

      Mr BIRKELAND again thanked Mr van MALE, on behalf of all those who had worked on the Committee over the last 12 years.

      Following a proposal from the Polish delegation, he expressed the unanimous agreement of the meeting to nominate Mr van MALE Honorary Member of the International Committee of Legal Metrology.

      Finally, Mr RIVAS, speaking as the senior Member of the Committee, recalled the progress which the OIML had known under the Presidency of Mr van MALE, and called on future generations to bear in mind what had been achieved.

      On conclusion of these addresses, Mr BIRKELAND declared the 17th meeting of the International Committee of Legal Metrology closed.

