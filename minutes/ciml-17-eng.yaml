- number: '6.2'
  title:
  - spelling: eng
    value: SP 17 - Measurement of pollutants
  narrative:
  - spelling: eng
    value: |2+

      Mr A.O. McCOUBREY reported on the steps which had been taken at national level in the USA, for the formation of a working group which, alongside the "Environmental Protection Agency", which will take over responsibility for this Secretariat, which embraces the following five Reporting Secretariats :

      SP 17-Sr 1 - Measurement of air pollution

      SP 17-Sr 2 - Measurement of water pollution

      SP 17-Sr 3 - Measurement of radionuclide radiation

      $$
      \mathrm {S P} 1 7 - \mathrm {S r} 4 - \mathrm {M e a s u r e m e n t o f p e s i c i d e s a n d t o x i c s u b s t a n c e s}
      $$

      $$
      \mathrm {S P} 1 7 - \mathrm {S r} 5 - \mathrm {M e a s u r e m e n t o f n o i s e p o l l u t i o n}
      $$

      Mr A.O. McCOUBREY considered that the International Working Group of SP 17 should meet as soon as possible, to define priorities and establish a detailed work plan.

      Mr W. MUHE underlined certain risks of duplication, between the proposed activities of the Reporting Secretariats and the activities of other OIML Pilot Secretariats, in particular SP 14 "Acoustics and Vibrations". For this reason, he hoped that the responsibility for the Reporting Secretariats of SP 17 would be assigned as rapidly as possible to the candidate States, so that the allocation of tasks would be studied, and that technical recommendations would be prepared in the shortest possible time, in those fields of most immediate interest.

      If this were not so, he feared that regulations would be established individually by the States, thus creating new barriers. He declared that the Federal Republic of Germany was ready to take on the responsibility for Reporting Secretariat N°1, automatically ensuring good coordination with ISO Technical Committee TC 146 : "Quality of Air", for which the Standardization Committee of his country is responsible. He also gave a brief summary of his views concerning the sharing of responsibilities between the ISO and OIML, with the possibility of creating joint ISO/OIML Working Groups in certain cases.

      Mr PERLSTAIN described the state of progress with the work of SP 14-Sr 1 "Sound and noise", which is due to revise an IEC publication in the near future. He could agree for his country to work with SP 17-Sr 5 "Measurement of noise pollution", provided this activity was limited to sonometers.

      Mr SOUCH indicated his intention to propose his country as a candidate to take on the responsibility for Secretariat SP 17-Sr 3 "Measurement of radionuclide radiation", particularly since the United Kingdom is already responsible for SP 1 "Ionising radiation". However, this candidature would be subject to subsequent official confirmation.

      The Committee expressed its agreement in principle concerning the creation of the five proposed Reporting Secretariats. It agreed that responsibility for Sr 1 and Sr 3 should be taken over by the Federal Republic of Germany and United Kingdom (subject to confirmation), respectively. It charged the U.S.A. with organizing the first meeting of this Pilot Secretariat in 1981, to settle all problems of detail and ensure rapid commencement of the work.

