      8. 1. Examination of posts for which the contracts expire in the near future.

      The Committee set up a Commission for the purpose of examining the following candidatures, for the posts of Assistant Director and Engineer :

      1° The post of Assistant Director :

      Presented by Mr P. AUBERT, CIML Member (France) Mr ESTIVAL Mr MILLET

      Presented by Mr G. SOUCH, CIML Member (Great Britain) Mr DINNING Mr ROBINSON Mr SPINKS

      Presented by Mr M. GACSI, CIML Member (Hungary) Mr PETIK

      Presented by Mr T. PODGORSKI, CIML Member (Poland) Mr PESTRAKIEWICZ

      Presented by Mr T. HILL, CIML Member (Czechoslovakia) Mr SKAKALA

      Presented by Mr L.K. ISSAEV, CIML Member (USSR) Mr KOZLOV

      Presented by India Mr MAHESH CHANDER

      Mr CHANDRASEKHARAN

      Mr MRINAL KANTI GHOSH

      Mr ISHWAR DATT

      Other candidate Mr AFEICHE (BIML)

      2° For the post of Engineer :

      Current holder of the post : Mr AFEICHE

      Presented by Mr G. SOUCH, CIML Member (Great Britain) Mr DINNING

      Presented by India Mr MRINAL KANTI GHOSH

      The Committee then adopted the following two draft resolutions presented by the Commission, by secret vote. The first draft was adopted by 29 votes in favour and 2 blank votes, and the second by 27 votes in favour, 1 vote against and 2 abstentions.

      The International Committee of Legal Metrology

      HAVING EXAMINED the candidatures to the post of BIML Assistant Director presented by some Members of the Committee,

      BEING PLEASED with the great number of candidatures so presented and with the great ability of some of them,

      CONSIDERING the information given by the Director of the Bureau concerning the tasks for which the new Assistant might be responsible,

      DECIDES the appoint Mr PETIK as new Assistant Director,

      FEELS that it is advisable that the new Assistant assumes his new office shortly before the departure of the present titular in order to ensure a continuity in the Bureau activities.

      ## The International Committee of Legal Metrology

      CONSIDERING the candidatures presented for the post of Engineer,

      TAKING COGNIZANCE of a report of the Director of BIML concerning the orientation he would like to give to the various posts at BIML, aiming in particular at broadening the profile of the post of Engineer,

      ## DECIDES not to appoint an Engineer,

      ENTRUSTS the Director of the Bureau to present urgently to Members of the International Committee of Legal Metrology a description of the new characteristics of the post of Engineer and to ask at the same time for candidatures,

      MANDATES the President of the International Committee of Legal Metrology to proceed with the appointment of the future Engineer,

      AUTHORIZES the Director of the Bureau to keep on the staff list the present titular of the post of Engineer beyond the end of his contract but not beyond 31 December 1980 in order to enable the person concerned the restore his administration of origin or to look for a new job.

