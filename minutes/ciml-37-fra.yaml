      a) Le Comité a décidé de décerner des distinctions honorifiques à trois experts éminents qui ont beaucoup contribué au travail de l'OIML:

      Dr. Dieter Buer (Allemagne);

      Dr. Detlev Mencke (Allemagne); et

      Dr. Ambler Thompson (USA).

      b) M. Ehrlich a annoncé un forum sur l'étiquetage métrique des préemballages, qui aurait lieu aux USA le 7 novembre 2002; tous les pays étaient invités à participer et de plus amples informations seraient disponibles sur le site Internet de l'OIML.

      c) M. Kochsiek a demandé que le Bureau inclut les actions à prendre résultant des décisions prises à la présente réunion dans le Plan d'Action mis à jour; M. Faber a répondu que cela serait fait.

