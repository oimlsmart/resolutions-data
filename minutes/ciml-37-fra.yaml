  title:
  - spelling: eng
    value: Adoption du rapport de l'expert comptable pour 2001
  narrative:
  - spelling: eng
    value: |2+

      M. Faber a introduit ce point en rappelant aux Participants que le rapport financier et d'autres documents ont été distribués en mars 2002 et qu'aucun commentaire n'a été reçu par le Bureau.

      Les Délégués n'ont fait aucun commentaire, et le rapport de l'expert comptable pour 2001 a été adopté.

- number: '5.2'
  title:
  - spelling: eng
    value: Examen de la situation financiere pour 2002 et 2003
  narrative:
  - spelling: eng
    value: |2+

      Des estimations financières ont été distribuées en janvier 2002. M. Magaña a indiqué que l'Organisation progressait globalement comme prévu par le budget et que la réalisation des objectifs était en cours pour être achevée à la fin de la période indiquée. Les prévisions pour 2003 ont aussi été programmées par rapport au budget, en dépit de la nécessité de changer le matériel de reprographie du BIML. Il a fait remarquer que le taux d'inflation en France était aussi raisonnablement bas, et stable.

      M. Faber a confirmé que le budget était conforme aux instructions de la Conférence.

- number: '5.3'
  title:
  - spelling: eng
    value: Analyse des coûts de fonctionnement du BIML
  narrative:
  - spelling: eng
    value: |2+

      M. Magaña a commencé sa présentation en informant les Délégués qu'un nouveau modèle de comptabilité était actuellement en cours de définition et d'évaluation en vue de son application pour les comptes du BIML à l'avenir. Il a expliqué que le système de comptabilité actuellement employé était essentiellement basé sur un principe "recettes - dépenses", mais n'était pas basé sur une méthode standardisée. Cependant, la Conférence devrait décider sur ce point et il ferait une proposition détaillée qui serait examinée en 2004. Avant d'être soumise à la Conférence, le nouveau plan devrait recevoir l'approbation dun cabinet indépendant de comptables et également du Conseil de la Présidence.

      M. Magaña a poursuivi en donnant des exemples détaillés spécifiques sur la façon dont certains coûts seraient traités par le nouveau système, principalement concernant le moment auquel une dépense serait comptabilisée - indépendamment du fait qu'un paiement concret ait réellement été fait ou non.

      M. Magaña avait préparé une simulation de la situation comptable pour 2000 et 2001, et a distribué des représentations illustrées des résultats.

      II a fait remarquer que les recettes principales de l'Organisation étaient bien sûr les cotisations des Membres, suivies par les ventes de publications et les souscriptions au Bulletin. Les principales dépenses résidaient dans les salaires du Personnel du Bureau, suivies par les réunions et les dépenses de voyages.

      Il a aussi fait un résumé de la répartition du temps du Personnel du BIML au niveau de l'accomplissement des diverses activités et a conclu que ce temps était essentiellement consacré aux tâches suivantes:

      - Réunions du Comité et de la Conférence, y compris leur préparation, et la rédaction des Comptes Rendus et autres documents connexes;

      - Préparation technique y compris les traductions;

      - Activités de soutien des TC/SC;

      - Participation aux réunions des RLMO et autres organisations en liaison;

      Bulletin; et

      Taches administratives.

      M. Faber a admis que c'était un exposé très important qui permettrait d'y voir plus clair lorsqu'il serait nécessaire de prendre des décisions financières à l'avenir.

      M. Vaucher a demandé s'il était possible de calculer le coût horaire de chaque tâche, ce à quoi

      M. Magaña a répondu que là n'était pas l'objectif; le but était de déterminer quel pourcentage des ressources de l'OIML était utilisé pour tel ou tel projet. En tous cas, les coûts du Personnel étaient déjà connus.

      Aucun autre commentaire n'a été formulé.

- number: '6'
  title:
  - spelling: eng
    value: Activités du Conseil de la Présidence
  narrative:
  - spelling: eng
    value: |2+

      M. Faber a fait un rapport sur les activités du Conseil de la Présidence pendant l'année passée, mais a insisté sur le fait que les points débattus par le Conseil figuraient sur l'ordre du jour de la présente Réunion du CIML. Il a souhaité la bienvenue au nouveau membre du Conseil, Mme Judith Bennett (Australie) et a poursuivi en rappelant aux Participants que le seul but du Conseil de la Présidence était de conseiller le Président en émettant des recommandations; seul le Comité pouvait vraiment décider.

      Une réunion a eu lieu à Moscou en septembre 2001 et une seconde en février 2002, pendant lesquelles il a été discuté des finances de l'OIML, de la structure du Conseil de Développement et du document MAA.

- number: '7'
  title:
