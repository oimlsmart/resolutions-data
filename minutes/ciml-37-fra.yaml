- number: '7.1'
  title:
  - spelling: eng
    value: Modification des Statuts du Personnel
  narrative:
  - spelling: eng
    value: |2+

      M. Faber a expliqué qu'il était nécessaire de temps en temps de mettre à jour et de moderniser les Statuts du Personnel du BIML. M. Magaña avait discuté de ce document avec les membres du Personnel et rédigé des projets de propositions pour modifier certaines parties du texte; il avait ensuite présenté ces projets au Président et au Conseil de la Présidence avant de les soumettre au CIML.

      M. Magaña a présenté les détails suivants:

      - Le document était devenu obsolète et avait besoin d'être modernisé en raison de changements de méthodes de travail;

      - Les Annexes n'avaient pas encore été réévaluées;

      - Seul un nombre limité de commentaires avaient été reçus de la part des Membres du CIML pendant le vote par correspondance; ceux-ci seraient pris en compte et une révision finale serait soumise au vote des Membres en mars ou avril 2003 afin que les Statuts révisés soient formellement adoptés lors de la 38ème Réunion du CIML;

      Les échelles de salaires n'avaient pas encore été révisées. M. Magaña a expliqué que les échelles étaient actuellement exprimées en Francs Or indexés; il était envisagé de réfléchir à l'intérêt de maintenir à la fois ce système et aussi les classifications d'échelles lors de la réunion du Conseil de la Présidence en février 2003, dans la mesure où certaines échelles étaient devenues redondantes et d'autres manquaient du fait de changements dans la structure du personnel du BIML. M. Magaña était en possession de quelques échelles de salaires d'autres organisations et était en train d'essayer d'harmoniser la classification du BIML avec celles d'autres organisations similaires. Il a fait remarquer que cela ne résultait pas en une augmentation du budget.

      Les Délégués n'ont fait aucun commentaire.

- number: '7.2'
  title:
  - spelling: eng
    value: Personnel du BIML
  narrative:
  - spelling: eng
    value: |2+

      M. Faber a demandé à M. Magaña de présenter ce sujet. Le Directeur du BIML a informé les Délégués qu'il y avait eu deux changements au niveau du Personnel du Bureau depuis la dernière Réunion du Comité:

      Un Ingénieur Système, M. Jean-Christophe Esmiol, a été recruté en novembre 2001 pour assurer le contrôle et le développement de l'équipement informatique du BIML, le réseau interne et le domaine de la programmation technique du site Internet de l'OIML. Un Documentaliste qui était parti à la retraite en 2000 n'avait pas été remplacé, laissant un poste vacant que M. Esmiol a repris, ce qui reflète le changement dans les exigences au niveau des ressources humaines qui elles-mêmes s'alignent sur le changement de technologies; et

      Mme Patricia Saint-Germain a été recrutée au début de septembre 2002 en tant qu'Assistante de Direction, chargée de l'ensemble des fonctions administratives du BIML y compris la responsabilité des deux employés administratifs (une Secrétaire et un Archiviste). M. Magaña a expliqué que Mme Saint-Germain avait, lors de ses trois semaines de présence au BIML, déjà maîtrisé un certain nombre de tâches et avait particulièrement contribué à faciliter l'organisation des préparatifs de dernière minute des réunions de Saint-Jean-de-Luz. Une deuxième Secrétaire avait quitté le BIML en avril 2002 et il avait été décidé à cette époque qu 'il serait plus approprié de recruter une Assistante de Direction qu'une autre Secrétaire, ce qui permettrait d'alléger la charge de travail du Directeur et des Agents Techniques.

      Pour conclure ce point, M. Magaña a expliqué qu'en dépit de ces deux changements, le nombre total des membres du Personnel du BIML était au même niveau qu'il était deux ans auparavant.

      Aucun commentaire n'a été fait par les Délégués.

- number: '7.3'
  title:
  - spelling: eng
    value: Activités du BIML
  narrative:
  - spelling: eng
    value: |2+

      M. Magaña a informé les Participants qu'un rapport écrit avait été distribué concernant les activités entreprises par le BIML depuis la dernière Réunion du Comité. Il a commenté certaines de ces activités:

      - L'organisation des réunions de Saint-Jean avait été plus complexe que d'ordinaire dans la mesure où le BIML avait organisé l'événement dans sa totalité. Le fait que ce lieu n'était pas une ville d'importance internationale avait aussi posé quantité de problèmes de logistique et d'organisation, bien qu'ils aient été surmontés avec succès. M. Magaña a particulièrement remercié M. Bernard Athané pour son rôle très actif dans l'organisation du Séminaire La Métrologie Légale en 2020;

      - Le Bureau avait consacré beaucoup de temps à la rédaction d'un certain nombre de documents destinés au Conseil de la Présidence;

      - Le BIML avait également participé de façon importante aux activités du Conseil de Développement, notamment à la mise en place du nouveau "Task Group";

      - La mise en place d'une stratégie concernant la meilleure manière de mettre en application la demande du CIML d'accélérer l'activité technique de l'OIML avait aussi pris un certain temps;

      - Le développement du site Internet avait nécessité beaucoup de temps, d'ou le recrutement d'un Ingénieur Système. Ce travail de développement est maintenant permanent et plusieurs membres du personnel du BIML sont activement impliqués dans ce domaine en plus de leur travail quotidien;

      - Le BIML a participé activement aux réunions régionales de métrologie légale depuis l'année dernière, ainsi qu'aux réunions d'organisations internationales;

      Pour conclure sa présentation du Point 7.3, M. Magaña a fait remarquer qu'un certain nombre d'autres activités de routine telles que la comptabilité, le travail de secrétariat, etc. étaient (comme chaque année) entreprises par le Bureau, même si elles n'étaient pas indiquées dans le rapport qui a été distribué.

- number: '7.4'
  title:
  - spelling: eng
    value: Progrès dans l'utilisation d'Internet et du courrier électronique
  narrative:
  - spelling: eng
    value: |2+

      ## M. Faber a demandé à M. Magaña d'introduire ce point.

      Le Directeur du BIML a commencé par expliquer que le Bureau avait récemment beaucoup travaillé à la mise à jour et à l'harmonisation des diverses bases de données utilisées jusqu'à présent, et en particulier à les rendre compatibles avec le site Internet restructuré. Ce travail avait déjà servi à simplifier la manipulation des données concernant les Institutions des Membres, les publications, les Autorités de Délivrance et les activités techniques et à s'assurer que ces informations étaient régulièrement mises à jour sur le site Internet. Ce travail était actuellement en cours.

      M. Magaña et M. Pulham ont ensuite donné une démonstration en direct du site Internet amélioré de l'OIML, y compris de nouveaux modules ajoutés très récemment tels que des interfaces dynamiques permettant aux Membres de bénéficier d'un site interactif, et notamment leur donnant la possibilité de mettre à jour les données concernant leurs Institutions (et également celle de choisir la façon dont ils préfèrent recevoir les publications et les circulaires OIML) en utilisant des mots de passe individuels. Tout changement effectué sur une donnée est immédiatement mis à jour en temps réel sur le site.

      Le menu du site avait également été réorganisé et restructuré et les informations, directement accessibles par Internet à partir de la base de données du BIML en ligne, étaient maintenant présentées dans un format plus convivial.

      Concernant la disponibilité des publications OIML en format électronique, le BIML avait engagé une employée de bureau temporaire pour numériser toutes les Recommandations et les Documents qui n'existaient pas auparavant en format électronique, et pour effectuer une opération de

      reconnaissance de texte sur les documents ainsi obtenus afin de les convertir ensuite en fichiers Acrobat PDF. Depuis le rapport qui a été fait sur ce sujet lors de la 36ème Réunion du CIML à Moscou, cette opération a été pratiquement achevée et seul un petit nombre de publications restent encore à traiter. Pour plus de facilité, toutes les publications OIML actuellement disponibles ont été gravées sur un CD ROM dont une copie a été distribuée à chaque Délégation.

      Les futurs développements du site Internet devraient être consacrés aux modules relatifs aux certificats et aux TC/SC pour être harmonisés avec ceux des bases de données pour les publications, les Autorités de Délivrance et les Membres. À long terme, des forums individuels pourront être mis en place pour chaque TC/SC OIML afin de faciliter l'échange d'informations, bien que ce développement soit encore à longue échéance. Un tel système ferait certainement gagner du temps et des efforts dans la mesure où, par exemple, les rapports de situation basés sur les données individuelles fournies dans de tels forums, pourraient être générés automatiquement pour l'ensemble des TC/SC.

      M. Vaucher a félicité le Bureau pour les progrès effectués dans ce domaine et s'est enquis de la possibilité d'utiliser des vidéo-conférences pour des réunions techniques. M. Magaña a répondu qu'il était techniquement possible d'incorporer ce système sur le site, et de fait le BIML avait envisagé l'idée à un moment donné, mais d'un point de vue pratique il n'est pas possible pour tous les Participants à une réunion technique d'être présents, pour les uns à 9 heures du matin, et pour d'autres à 3 heures du matin. Une autre considération portait sur le débit de la connexion Internet car la transmission et la réception vidéo via Internet sont difficiles avec une liaison à bas débit.

      M. Boudissa a posé une question concernant l'usage des langues sur le site; M. Magaña a répondu que le site était actuellement trilingue anglais-français-espagnol mais que seules des pages "statiques" étaient disponibles dans les trois langues, l'anglais étant la langue utilisée pour les pages qui sont mises à jour plus régulièrement. La possibilité pour certains États Membres de mettre à jour des pages dans des langues autres que l'anglais pourrait être examinée, bien que le BIML ne puisse pas s'engager à le faire lui-même - ni assumer la responsabilité d'erreurs de traduction.

      M. Johansen a demandé s'il était possible d'inclure soi-même des certificats OIML sur l'espace réservé au Membres sur le site Internet plutôt que d'indiquer seulement la notification qu'un certificat a été enregistré. M. Magaña a répondu que pour l'instant, il n'avait été trouvé aucune méthode satisfaisante pour numériser les copies papier des certificats OIML reçus et pour les convertir en fichiers Acrobat PDF sans que le fichier obtenu soit trop grand (jusqu'à 1 Mb). Environ 1000 certificats avaient été enregistrés à ce jour, et convertir un si grand nombre de fichiers prendrait énormément de temps, créerait d'immenses fichiers, occuperait trop d'espace sur le serveur et prendrait beaucoup trop de temps à être télécharge par les Membres. A l'avenir, il pourrait être demandé aux Autorités de Délivrance de délivrer des certificats sous forme de fichiers PDF, bien que ceci ne résoudrait pas le problème des certificats délivrés dans le passé. M. Johansen a suggéré que pour économiser l'espace de stockage d'un disque, les Autorités de Délivrance elles-mêmes pouvaient charger sur un site les certificats et l'OIML pourrait simplement fournir un lien pour y accéder. M. Magaña a confirmé que le BIML avait déjà envisagé cette solution, et pourrait intégrer un moteur de recherche pour lire rapidement les bases de données des Autorités de Délivrance afin de présenter une liste précise et à jour des certificats délivrés.

      M. Teklehaimanot a demandé si l'OIML avait prévu d'inclure une section spéciale sur le site Internet OIML concernant les Pays en Développement. M. Magaña a répondu qu'un "sous-site" dédié au Conseil de Développement existait déjà, bien qu'il soit nécessaire de le mettre à jour notamment concernant les listes d'Experts et les Cours de Formation. Il a confirmé que le BIML réviserait cette partie du site et considérait cette tâche comme prioritaire.

      En réponse à une question de M. Carstens, le Directeur du BIML a confirmé que des liens existaient pour toutes les Organisations Régionales de Métrologie Légale, ainsi que pour de nombreuses organisations Internationales avec lesquelles l'OIML travaillait en étroite coopération.

      M. Faber a félicité le BIML pour les progrès entrepris dans ce domaine et pour la démonstration en direct du site Internet, et a confirmé que cela représentait assurément un grand pas en avant dans l'amélioration de la circulation d'informations entre l'Organisation et ses Membres.

- number: '8'
  title:
