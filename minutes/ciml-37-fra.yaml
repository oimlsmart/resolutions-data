- number: '11.1'
  title:
  - spelling: eng
    value: Présentation des programmes de la Banque Mondiale
  narrative:
  - spelling: eng
    value: |2+

      M. Magaña a rapporté que malencontreusement M. Wilson de la Banque Mondiale, qui avait l'intention de venir à cette réunion, avait dû annuler à la dernière minute. Il a dit que le BIML poursuivrait ses contacts avec la Banque Mondiale et s'assurerait que toute information pouvant être d'intérêt pour les Membres du CIML concernant les activités de la Banque Mondiale seraient diffusées, peut-être par le Bulletin OIML et/ou le site Internet.

      Mme. Annabi a demandé s'il serait possible d'organiser une visite à la Banque Mondiale, comme cela avait été envisagé auparavant, puisque la Banque Mondiale n'avait pas pu être représentée à cette réunion. Cela permettrait à l'OIML et à son Conseil de Développement d'être présentés, ainsi que les possibilités pour des développements futurs. M. Magaña a répondu qu'il avait l'intention de discuter de cela au point 12 de l'ordre du jour. La tenue d'un séminaire de sensibilisation avait été proposé à la Banque Mondiale, mais il avait été décidé entre-temps de tenir ce séminaire conjointement avec d'autres organisations internationales travaillant dans des domaines connexes à celui de l'OIML (comme le BIPM, ILAC, ISO, CEI). Cela permettrait de donner un plus grand impact à cette action.

- number: '11.2'
  title:
  - spelling: eng
    value: Activités du Conseil de Développement, plan d'action et évolutions possibles
      de ses structures
  narrative:
  - spelling: eng
    value: |2+

      M. Faber a rapporté que suite à la dernière Réunion du Conseil de Développement à Moscou, il avait décidé de créer un petit "Groupe de Travail" pour les questions liées aux pays en développement, avec une mission double: accélérer le travail et le rendre plus transparent, et deuxième examiner la structure du Conseil de Développement et faire des propositions pour le restructurer lors de la Conférence en 2004. Il a ensuite demandé à Mme. Annabi de présenter un rapport sur la Réunion du Conseil de Développement qui avait eu lieu le 1er Octobre 2002.

      Elle a rapporté que les membres du Groupe de Travail mentionné par M. Faber avait été choisis pour leur expérience en matière d'aide aux pays en développement ainsi que d'après leur répartition géographique. Elle a également fait état du travail difficile incombant aux groupes de travail actuels du Conseil de Développement, qui continueraient opérer en étroite coopération avec le Groupe de Travail.

      M. Dunmill a ensuite rapporté que les recommandations résultant de la première réunion du Groupe de Travail avaient été approuvées par le Conseil de Développement, qui à son tour demandait au CIML d'approuver ces recommandations:

      - Le BIML doit élaborer les propositions du Groupe de Travail dans le cadre d'un plan d'action contenant des actions concrètes dans certains délais, pour l'année prochaine;

      - Le BIML devra faire des propositions pour des changements à la structure actuelle du Conseil de Développement. Ceux-ci seraient considérés à la prochaine réunion du Groupe de Travail, et toute décision concernant la structure pourrait alors être prise à la prochaine Conference en 2004; et

      - Afin de traiter efficacement ces propositions, le Groupe de Travail propose de se réunir à nouveau dans un délai d'environ six mois.

      M. Johnston a indiqué qu'il comprenait la nécessité des décisions concernant les changements de la structure du Conseil de Développement à faire par la Conférence en 2004, mais il estimait que c'était un délai plutôt long, et a demandé s'il y avait d'autres moyens pour engager des actions beaucoup plus rapidement. M. Magaña a répondu qu'il n'y avait pas besoin d'attendre jusqu'à la Conférence pour procéder à des actions réelles. Le Groupe de Travail avait commencé à discuter des actions qui pouvaient être mises en place, et il était prévu qu'il propose des éléments pour la mise à jour du Plan d'Action de l'OIML à la réunion du Conseil de la Présidence en février 2003. Il y aurait donc des points à discuter et faisant l'objet de rapports à la prochaine Réunion du CIML en novembre 2003.

      M. Boudissa a remercié le Président pour son invitation à devenir membre de ce Groupe de Travail, à la réunion duquel il n'avait malencontreusement pas été en mesure d'assister à cette occasion en raison d'autres engagements. Il a confirmé sa volonté de s'impliquer dans le travail du Groupe et promis qu'il contribuerait activement à l'avenir.

      M. Ngatia, tout en reconnaissant que l'OIML entreprenait actuellement un certain travail en ayant en vue les intérêts des pays en développement, a exprimé son souci sur la longue période proposée pour les actions par le Groupe de Travail. M. Dunmill a répondu qu'il était peut-être trompeur de se référer à la date de la Conférence de 2004. Il a précisé que bien que toute décision finale concernant la structure du Conseil de développement pourrait seulement être prise par la Conférence en 2004, cela ne voulait pas dire qu'il n'y aurait pas d'actions entreprises par le Groupe de Travail avant. Autant d'actions que possible seraient incluses dans le Plan d'Action de l'OIML pour l'année prochaine. Il a expliqué qu'il avait été demandé aux représentants assistant à la réunion du Groupe de Travail d'apporter des propositions pour des actions à court terme. Celles-ci avaient été discutées et il était prévu, par exemple, de tenir des séminaires dans certaines parties du monde en 2003. M. Faber a confirmé cela, disant qu'aussi loin qu'il était concerné, l'établissement et la mise en œuvre du Plan d'Action étaient plus importants que la structure du Conseil de Développement et il s'assurerait que le travail progressait aussi vite que possible.

      Mme. Annabi a rappelé que bien que le Groupe de Travail soit de taille réduite afin de travailler plus efficacement, il était toujours ouvert aux propositions de tout pays pour des actions.

      M. Yankine a demandé si des contacts avec des organisations ou des Etats individuels étaient planifiés, afin d'augmenter la sensibilisation à la métrologie et d'aider à déterminer les besoins des pays en développement. M. Magaña a répondu que le Groupe de Travail avait identifié l'importance pour les pays en développement de la présentation de la métrologie à diverses organisations d'aide au développement et la nécessité pour l'OIML de travailler en étroite coopération avec les RLMO. Ces idées seraient prises en compte dans le Plan d'Action. Il a rappelé aux délégués que ce n'était pas le Groupe de Travail lui-même qui établirait ces contacts, puisqu'il avait seulement pour tâche de considérer et de recommander des actions. Les contacts seraient donc pris par les personnes ayant un statut officiel au sein de l'OIML (le BIML, le Président du Conseil de Développement, le Président de l'OIML ou les Vice-présidents). Le Groupe de Travail pourrait, bien sûr, inviter n'importe laquelle de ces organisations à ses réunions, si cela était jugé approprié.

      M. Pulham a dit qu'il y a quelque temps, le BIML avait établi une liste d'experts qui pouvait être utilisée dans le cadre des projets de développement, et qu'il était peut-être bon de mettre à jour cette liste. M. Magaña a ajouté que cette liste d'experts recommandée par les Membres du CIML était disponible sur les pages du Conseil de Développement du site Internet de l'OIML, où il y avait aussi une liste des cours de formation disponibles. Il convenait que ces listes n'étaient plus à jour, mais a indiqué que les développements du site Internet de l'OIML permettraient aux Membres du CIML dans un avenir pas trop lointain de mettre directement à jour les informations qu'ils avaient fournies et d'ajouter de nouveaux cours de formation et experts.

      M. Magaña conclu ce point de l'ordre du jour en rapportant que Mme. Annabi avait été réelue comme Présidente du Conseil de Développement pour la période 2002-2004. M. Faber a félicité Mme. Annabi pour sa réélection, en disant qu'il constatait, d'après les rapports qui venaient d'être faits, que le CIML avait des exigences élevées pour l'efficacité du Conseil de Développement, ce qui soulignait l'importance du rôle de la Présidente du Conseil.

