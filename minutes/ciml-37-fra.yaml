      M. Dunmill a expliqué que l'idée de diviser ce projet en deux parties à un stade peu avancé de son élaboration était due au fait que des sociétés originaires de plusieurs pays avaient exprimé un besoin urgent d'une Recommandation sur le pesage total et il avait été décidé par conséquent d'avancer rapidement avec cette partie.

