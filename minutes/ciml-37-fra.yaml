      Les décisions telles que reproduites ci-après ont été approuvées par le Comité. Elles ont ultérieurement été publiées en tant que document séparé et distribuées aux Membres du CIML et aux Membres Correspondants courant novembre 2002.

      ## Allocution d'ouverture

      Le Comité a pris note de l'allocution d'ouverture de M. Faber, Président du CIML.

      Appel des Délégués - Quorum

      L'appel des Délégués a été effectué. II a été constaté que 54 Membres du CIML (sur 58) étaient présents ou représentés et que le quorum statutaire des trois-quarts était ainsi atteint.

      ## Approbation de l'Ordre du Jour

      Le Projet d'Ordre du Jour Définitif a été approuvé avec l'ajout d'un point: Élection du Président du CIML en 2003.

