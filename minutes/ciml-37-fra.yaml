      M. Faber a rappelé aux Participants que 2005 était le cinquantième anniversaire de l'OIML, et a proposé de tenir cette réunion spéciale à Paris.

      Aucun commentaire n'a été fait; Paris serait donc retenue comme la première option pour 2005 et des pourparlers seraient ouverts avec le Gouvernement Français.

