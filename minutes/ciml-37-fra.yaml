- number: '14.2'
  title: "$ 3 9^{\\mathrm{th}} $ CIML Meeting and $ 1 2^{\\mathrm{th}} $ Conference
    (2004)"
  narrative: |2+

    Mr. Faber explained that two options were open for 2004: Israel and Germany. He informed the Committee that Israel maintained their option open, but without specifying a specific year in view of the current events which might lead to the required quorum not being met. He was grateful to the Israeli Delegation for their understanding and again thanked them for maintaining their invitation open. He concluded that the remaining possibility was therefore Germany; Mr. Kochsiek noted that Germany required a definite commitment in order to obtain the necessary budget and begin making preparations. He had consulted with the Israeli Delegation, which had assured him that no sentiment of "competition" existed and that Germany should feel free to host the 2004 event.

    The Committee unanimously accepted the German invitation and thanked Mr. Kochsiek for the invitation.

