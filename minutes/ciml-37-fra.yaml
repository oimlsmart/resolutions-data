sections:
- number: '1'
  title: Approval of the minutes of the $ 3 6^{th} $ CIML Meeting
  narrative: |2+

    The minutes of the 36th CIML Meeting (distributed in February 2002) were approved without modification. No comments had been received by the BIML.

- number: '2'
  title: Implementation of the Decisions and Resolutions of the $ 1 1^{th} $ Conference
    and $ 3 6^{th} $ CIML Meeting
  narrative: |2+

    Mr. Faber commented that most of the items in these documents were on the agenda for the current CIML Meeting and would be covered over the four days. In addition, Mr. Magaña had drawn up a table summarizing these decisions together with the item number under which each point would be covered. He therefore did not feel it was necessary to review each decision one by one. No further comments were voiced.

- number: '3'
  title: 1999-2002+2003-2004 Action Plan implementation and final extension up to
    the end of 2004
  narrative: |2+

    Mr. Magaña reminded Participants that a revised version of the Action Plan had been distributed about one year ago with a view to its approval by the CIML. He explained that a number of key actions had already been completed, and then highlighted the main points of the Plan:

    The first draft of the revision of the Directives for OIML Technical Work. Part 1 had been sent out to Members and the BIML had received a number of comments back, which would be taken into account in the $ 2^{\mathrm{nd}} $ draft. Once the Directives have been approved, the BIML Director explained that a short manual would also be published which would serve as a memory jogger and as a practical guide for the application of the rules contained in the Directives. This point related to A.1.1 in the Action Plan.

    The OIML technical work program was constantly being reviewed by the Bureau together with the Presidential Council; this point would be covered later in the CIML Meeting.

    Activities to increase Member State participation in technical work were also ongoing, with the result that some previously vacant TCs or SCs have now been filled.

    - Activities on Software (Action Plan A.1.5) were not progressing as fast as could be hoped, though some output was to be expected over the coming year.

    Concerning the OIML Certificate System for Measuring Instruments (Action Plan A.2), the draft of the revision of the document setting out the rules of operation was also distributed to and approved by CIML Members and would be published soon.

    - Detailed discussions would be held later in the week on the OIML Mutual Recognition Arrangement.

    On point B.2 of the Action Plan To favor the accreditation of legal metrology laboratories with a view to achieving acceptance of test results, this subject was linked to work on the MAA and there were also proposals from within TC 3/SC 5 on the specific theme of accreditation. Work was advancing as fast as possible despite certain difficulties.

    Concerning the promotion of international trade of prepacked products according to OIML requirements (Action Plan point B.4) Mr. Magaña informed Delegates that the revision of R 87 Net content in packages had started and was progressing well, and the subject of the OIML mark for prepackages would be further developed once this Recommendation was finished.

    - On the subject of Action Plan section C Promotion and development of legal metrology in OIML Member States, the BIML Director noted that Mr. Birch's Study was progressing well and that Mr. Birch would be giving a more detailed report during this meeting. Documents of a more general nature could then be drafted and published to explain the importance of legal metrology to a wider audience.

    Under point D of the Action Plan Structural improvements, the BIML Director explained that whilst most of the actions concerned were listed as being "Completed", in fact many if not most of them were ongoing processes and ways were constantly being sought to improve efficiency. Cooperation with the RLMOs (Action Plan point D.4) was also an ongoing matter and more details would be given during the week.

    Work was also progressing on Action Plan point D.7 Training and D.8 Public relations and promotion and the OIML web site is playing an increasing role in both of these areas.

    No comments were received from Delegates and Mr. Faber voiced the opinion that the Organization was working at a fast pace, covering much new ground and following the Action Plan as stipulated.

- number: '4'
  title: Member States and Corresponding Members
  narrative: "\n"
- number: '4.1'
  title: New Members - Expected accessions
  narrative: |2+

    Mr. Magaña informed Participants of the following developments in the OIML Membership:

    Albania had recently become a Member State, having previously been a Corresponding Member. This brought the total number of Member States to 58. Mr. Faber warmly welcomed this new member, and in reply the Albanian Delegation expressed its satisfaction at having become a full Member and spoke of its commitment to fulfill its obligations as such, including making every effort possible to adapt its national laws to take OIML requirements into account.

    Mr. Magaña announced that New Zealand and Vietnam were both considering becoming Member States, presently also Corresponding Members. The Vietnamese Delegation spoke of its commitment to becoming a full Member, and its satisfaction at having been invited to take part in the newly formed Task Group. Vietnam had become an OIML Corresponding Member in 1994 and is currently a member of nineteen national and international organizations. Mr. Faber replied that the OIML door was wide open and ready to welcome this country as a full Member when they were ready.

    The Philippines had recently requested to be delisted as a Corresponding Member due to financial constraints.

    Mr. Grkov outlined recent developments in the field of legal metrology in Macedonia and affirmed that his country was continuing to modernize its legal infrastructure in order to best take into account metrological requirements in the context of the OIML.

- number: '4.2'
  title: Situation of certain Members
  narrative: |2+

    The BIML Director reminded Participants that at the 36th CIML Meeting in Moscow, the Committee had examined the situation of a certain number of countries that were not up to date in the payment of their contributions.

    In London the Eleventh Conference had granted special payment extensions to two countries namely the D.P.R. of Korea and Zambia, with the condition that subsequent years' contributions were paid on time.

    In 2001 the Committee had also examined the financial situation of a number of countries, and Mr. Magaña was pleased to report that certain of these had since settled all (or the most part) of the amount outstanding: this was the case for Italy (now up to date), Cuba (now up to date), Iran (now up to date), Kenya (now up to date) and Sri Lanka (now almost up to date).

    However, the situation of three countries now needed to be examined.

    1) It was noted in Moscow that Kazakhstan had outstanding arrears dating back a number of years (specifically 1997-2000). Mr. Magaña reported that a major part of these arrears had since been paid: all of the arrears for 1997, 1998 and a major part of 1999 had been settled. In view of this, Mr. Magaña recommended that the Committee accept this situation, whilst requesting Kazakhstan to continue its efforts to pay the amount still remaining due. This proposal was accepted by the CIML.

    2) Concerning the D.P.R. of Korea, this country had been granted a payment extension by the Eleventh Conference and the BIML Director was pleased to announce that as at 30 June 2002, the major part of their arrears had been repaid. This country's contributions for 2000 and 2001 were now up to date and the remaining arrears had been reduced by 7 % since 2001. He considered that a significant effort had been made by Kazakhstan, and indeed the Presidential Council considered that their situation should also be viewed by the CIML as now being acceptable. This proposal was accepted by the CIML.

    3) For Zambia, extensions had also been granted by the Eleventh Conference for 1996-1999, on the condition that this country continue its efforts to pay the amount still remaining due. However, Zambia had not yet been in a position to pay its 2000-2001 contributions, so as a result the total amount outstanding was increasing. In fact, Zambia had so far only been in a position to repay part of its 1996 contribution and part of its 2000 contribution. The Zambian CIML Member explained that the Zambian Government did allocate funds to cover a partial

    payment, though actual release of the funds was currently delayed. He would resume discussions with the authorities concerned on his return. Mr. Faber thanked the Representative for this update, and recommended to the Committee that any decision concerning Zambia be postponed until further information was available. Mr. Faber requested that he contact the BIML Director to urgently review the actual situation.

    Lastly, the Macedonian Delegation noted that the BIML had not acknowledged receipt of its payment made in December 2001 and requested that such confirmation be sent out as soon as possible. Later during the meeting the BIML Staff contacted the Bureau and were able to confirm to Mr. Grkov that payment had been received; written confirmation would be sent out on the Staff's return to Paris.

- number: '5'
  title: Financial matters
  narrative: "\n"
- number: '5.1'
  title: Adoption of the Auditor's report for 2001
  narrative: |2+

    Mr. Faber introduced this item by reminding Participants that the financial report and other papers had been distributed in March 2002 and that no comments had been received by the Bureau.

    There were no further comments from Delegates, so the Auditor's report for 2001 was adopted.

- number: '5.2'
  title: Examination of the financial situation for 2002 and 2003
  narrative: |2+

    Financial estimates had been distributed in January 2002. Mr. Magaña gave information that the Organization was globally on schedule with the budget and that objectives were being met - and would be met at the end of the period. The forecasts for 2003 were also scheduled to be in line with the budget, despite the obligation of changing the BIML photocopying equipment. He noted that the rate of inflation in France was also reasonably low, and steady.

    Mr. Faber confirmed that the budget was being followed in line with the Conference's instructions.

- number: '5.3'
  title: Analysis of the operating costs of the BIML
  narrative: |2+

    Mr. Magaña began his presentation by informing Delegates that a new model of accountancy system was currently being defined and evaluated with a view to its application for the BIML accounts in the future. He explained that the accounting system currently employed was essentially based on a "receipts - expenditures" principle, but was not based on any standardized method. However, it was for the Conference to decide on such a decision and he would make a detailed proposal for consideration in 2004. Prior to its being submitted to the Conference, the new plan would receive approval from an independent firm of accountants, and also the Presidential Council.

    He went on to give some specific detailed examples of how certain costs would be accounted for under the new system, mainly concerning the moment at which expenditure would be entered into the accounts - regardless of whether a physical payment had actually been made or not.

    Mr. Magaña had prepared a simulation of the accounting situation for 2000 and 2001, and distributed some pictorial illustrations of the results.

    He noted that the Organization's principal receipts were of course Members' contributions, followed by sales of publications and Bulletin subscriptions. The main expenses were in Bureau Staff salaries, followed by meeting and travel expenses.

    He had also made a summary of the allocation of the BIML Staff's time in carrying out various activities and concluded that the major portion of this time was spent on:

    Committee and Conference meetings, including preparation, and the drawing up of the Minutes and other related documents;

    - Technical editing including translation;

    TC/SC support activities;

    RLMO and other liaison organizations meeting attendance;

    Bulletin; and

    Administrative tasks.

    Mr. Faber agreed that this was a very important development and would clarify matters when making financial decisions in the future.

    Mr. Vaucher asked whether it was possible to calculate the hourly cost of specific tasks, though Mr. Magaña replied that this was not the objective; the purpose was to ascertain what percentage of OIML resources was utilized on which projects. In any event, the Staff costs were already known.

    No other comments were received.

- number: '6'
  title: Presidential Council activities
  narrative: |2+

    Mr. Faber gave a report on Presidential Council activities over the last year, but stressed that no item was discussed in the Council that was not on the agenda of the present CIML Meeting. He welcomed the newest member of the Council, Mrs. Judith Bennett (Australia) and went on to remind Participants that the purpose of the Presidential Council was solely to advise the President by making recommendations; only the Committee could actually make decisions.

    One meeting had been held in Moscow in September 2001 and a second in February 2002, during which the OIML's finances, the Development Council structure and the MAA document were discussed.

- number: '7'
  title: The situation at the BIML
  narrative: "\n"
- number: '7.1'
  title: Amendments to the BIML Staff regulations
  narrative: |2+

    Mr. Faber explained that from time to time it was necessary to update and modernize the BIML Staff Regulations. Mr. Magaña had discussed this document with members of Staff and drawn up draft proposals to modify certain parts of the text; he had then presented these to the President and Presidential Council before final submission to the CIML.

    Mr. Magaña gave the following details:

    The document had become outdated and was in need of modernization in view of the changing work patterns;

    The Annexes had not yet been re-evaluated;

    Only a limited number of comments had been received from CIML Members during the postal consultation; these would be taken into consideration and a final revision submitted to Members in March or April 2003 for postal approval with a view to the revised Regulations being formally adopted at the $ 38^{\mathrm{th}} $ CIML Meeting;

    The salary scales had not yet been revised. Mr. Magaña explained that the scales were currently expressed in indexed Gold Francs; it was planned to consider the appropriateness of both this system and also the scale classifications on the occasion of the February 2003 Presidential Council meeting, since some scales had become redundant and others were lacking due to changes in the structure of the BIML Staff. Mr. Magaña was in possession of several other organizations' salary scales and was in the process of trying to harmonize the BIML classification with those of similar other organizations. He pointed out that this would not result in a budget increase.

    There were no comments from Delegates.

- number: '7.2'
  title: BIML Staff
  narrative: |2+

    Mr. Faber asked Mr. Magaña to introduce this subject. The BIML Director informed Delegates that there had been two staff changes since the last Committee Meeting:

    - A Systems Engineer, Mr. Jean-Christophe Esmiol, had been recruited in November 2001 to take over the management and development of the BIML computing equipment, internal network and the technical programming side of the OIML web site. A Documentalist who had retired in 2000 had not been replaced, leaving a position vacant which Mr. Esmiol filled, reflecting the change in staff requirements in line with changing technologies; and

    Ms. Patricia Saint-Germain had been recruited at the beginning of September 2002 as Office Manager, in charge of the general administrative functions of the BIML including responsibility for the two administrative employees (one Secretary and one Archivist). Mr. Magaña commented that Ms. Saint-Germain had, over the three weeks since she joined the BIML, already mastered a number of tasks and had especially contributed to the smooth organization of the last-minute preparations for the Saint-Jean-de-Luz meetings. A second Secretary had left the BIML in April 2002 and it was decided at that time that it was more appropriate to recruit an Office Manager than another Secretary, thus freeing up more of the Director's and Technical Agents' time.

    In concluding this item, Mr. Magaña explained that despite these two changes, the total number of BIML Staff was still at the same level as it was two years ago.

    There were no comments from Delegates.

- number: '7.3'
  title: BIML Activities
  narrative: |2+

    Mr. Magaña informed Participants that a written report had been distributed concerning the activities undertaken by the BIML since the last Committee Meeting. He commented on several of these activities:

    The organization of the Saint-Jean meetings had been more complex than usual since the BIML had masterminded the whole event. The fact that this venue was not a major international city had also posed a large number of logistic and organizational problems, though these had all been overcome successfully. Mr. Magaña especially thanked Mr. Bernard Athané for his very active role in organizing the Seminar Legal Metrology in 2020;

    The Bureau had allocated a certain amount of time to drawing up a number of documents for the Presidential Council;

    The BIML had also participated significantly in Development Council activities, notably in the setting up of the new Task Group;

    Time was also allocated to forming a strategy concerning the best way to implement the CIML's request to speed up OIML technical activity;

    The web site had taken a significant time to develop, hence the recruitment of a Systems Engineer. This development is now permanently ongoing and several BIML Staff Members are actively involved in this area in addition to their regular workload;

    The BIML actively participated in regional legal metrology meetings over the past year, as well as in meetings of international organizations;

    In concluding his presentation on Item 7.3, Mr. Magaña pointed out that a number of other routine activities such as accountancy, secretarial work, etc. were (as each year) carried out by the Bureau, even though they were not listed on the report distributed.

- number: '7.4'
  title: Progress in the use of Internet and E-mail
  narrative: |2+

    Mr. Faber asked Mr. Magaña to introduce this item.

    The BIML Director began by explaining that much work had recently been carried out by the Bureau to update and harmonize the various databases hitherto in use, and notably to render them compatible with the restructured web site. This had already served to simplify the handling of data concerning Members' Institutions, publications, Issuing Authorities and technical activities and to ensure that such information was regularly updated on the web site. This work was ongoing.

    Together with Chris Pulham, Mr. Magaña then gave a live demonstration of the improved OIML web site, including new modules added very recently such as the possibility for Members to interact directly with the site, and notably the facility for them to update data concerning their Institutions (and also the way in which they prefer to receive OIML publications and circulars) themselves via individual password access. Any change made to data is instantly updated in real time on the site.

    The site menu had also been reorganized and restructured and the information, directly accessed via the Internet from the online BIML database, was now displayed in a more readable format.

    Concerning the availability of OIML publications in electronic format, the BIML had hired a temporary clerical assistant to scan all the Recommendations and Documents for which no electronic file previously existed, and to perform a text recognition operation on the resulting scans

    then to convert them into Acrobat PDF files. Since the report given on this subject at the 36th CIML Meeting in Moscow, this operation has virtually been completed and only a small number of publications still remain to be processed. For convenience, all the OIML publications currently available have been engraved onto a CD ROM, a copy of which was distributed to each Delegation.

    Future developments to the web site would be for the certificates and TC/SC modules to be brought into line with the publications, Issuing Authorities and Members databases. In the longer term, individual forums may be set up for each OIML TC/SC to facilitate the exchange of information, though this development was still some way ahead. Such a system would certainly save time and effort as - for example - status reports could be automatically generated for the totality of the TCs/SCs based on individual data supplied on such forums.

    Mr. Vaucher congratulated the Bureau on the progress made in this field and inquired about the possibility of using video-conferencing for technical meetings. Mr. Magaña replied that it was technically possible to incorporate this feature on the site, and indeed the BIML had been considering the idea for some time, but that from a practical point of view it may not be possible for all participants in a technical meeting (for example) to be present at the same time, since 9 a.m. for some might be 3 a.m. for others. A second consideration was the Internet connection speed since transmitting and receiving video via the Internet is difficult with a standard modem access.

    Mr. Boudissa inquired as to language usage on the site; Mr. Magaña replied that the site was at present trilingual English-French-Spanish but that only the "static" pages were available in all three languages, English being the language used for those pages that are updated more regularly. The possibility of various Member States updating pages in languages other than English could be considered, though the BIML could not commit to doing so itself - nor could it assume responsibility for translation errors.

    Mr. Johansen asked whether it was possible to include OIML certificates themselves on the Members' page of the web site rather than just the notification that a certificate has been registered. Mr. Magaña replied that for the time being, no satisfactory way had been found to scan the paper copies of OIML certificates received and convert them into Acrobat PDF files without the resulting file being too large (up to 1 Mb). Approximately 1000 certificates had been registered to date and converting such a large number of files would take an extremely long time, create huge files, take up too much server space and result in very long download times for Members. In the future, Issuing Authorities could be requested to submit certificates as PDF files, though this would not solve the problem of certificates issued in the past. Mr. Johansen suggested that to save server disk storage space, the Issuing Authorities themselves could upload certificates and the OIML could simply provide a link to these. Mr. Magaña confirmed that the BIML had already envisaged this solution, and could integrate a search engine to scan Issuing Authorities' databases in order to display an accurate and up to date list of certificates issued.

    Mr. Teklehaimanot asked what plans the OIML had to include a special section on the OIML web site concerning Developing Countries. Mr. Magaña replied that a Development Council sub-site already existed, though it did require updating notably concerning the lists of Experts and Training Courses. He confirmed that the BIML would be reviewing this part of the site and considered it as a priority.

    In reply to a question from Mr. Carstens, the BIML Director confirmed that links were available to all the Regional Legal Metrology Organizations, as well as to various International ones with which the OIML worked in close cooperation.

    Mr. Faber congratulated the BIML for the progress made in this field and for the live demonstration of the web site, and confirmed that this was definitely a major step forward in improving the flow of information between the Organization and its Members.

- number: '8'
  title: Technical activities
  narrative: |2+

    A written report drawn up by the BIML was distributed to Participants and commented by Mr. Issaev, responsible for following OIML technical activities as CIML Vice-President.

    8. 1 Work programs of OIML TCs and SCs

    8. 2 Examination of the situation of certain TCs/SCs

    Mr. Issaev began by giving some statistics concerning OIML TCs and SCs and drew special attention to the fact that the responsibility for the 67 technical bodies was shared by only 15 Member States; he mentioned that this particular problem would be addressed later on.

    He stated that the actual implementation of OIML Recommendations and Documents by OIML Members was of great importance, in addition to developing and revising them. In the most recent version of the document on the degree of implementation which had been drawn up just prior to the 11th Conference, information was missing for a number of Member States: nothing had been received from ten Member States and an additional six had not updated their data. In addition, it would have been interesting to have information on the implementation of Recommendations by Corresponding Members.

    Mr. Issaev then evoked the situation of the two technical bodies that had been vacant for at least two years and said that TC 8/SC 2 Static mass measurement was not an urgent necessity since Russia had assumed responsibility for its sole work project, i.e. the development of the Annex to R 125: Test report format for the evaluation of mass measuring systems for liquids in tanks. As for TC 5 Electronic instruments and software, he announced the good news that Slovenia had recently volunteered to take on its Secretariat.

    He continued by mentioning that during this year new work projects had been proposed by some TCs and SCs and that there had been a proposal from Australia to establish a new OIML Subcommittee Instruments for quality analysis of agricultural products within TC 17 together with a work project Measuring instruments used for protein determination in grain. The proposal was supported by nine TC 17 P-members (out of 12) and Australia volunteered to assume responsibility for the new TC 17/SC 8.

    Mr. Issaev concluded his presentation by saying that Mr. Szilvassy would give more detailed information that would facilitate identifying the appropriate decisions to be made by the Committee and gave the floor to Mr. Skubić.

    Mr. Skubić commented on the proposal from Slovenia based on the consideration that there was a need for further activities in this important field and that the Slovenian Metrology Institute had the necessary experts and international experience. Over the last five year period the laboratory for Information Technology in Metrology had been active in the development of a guidance

    document on legal control of gambling machines, software for laboratory automation, laboratory software validation, and software testing of measuring instruments for type approval; they had been participating in the Steering Committee of one of the EU primary projects for software harmonization and leading the work on future aspects of the MID. Requesting CIML support for his country's proposal, Mr. Skubič assured the Committee of Slovenia's firm intention to allocate the necessary resources and to contribute to the OIML in these activities in order to meet the needs of Member States and also to be involved in the activities of both Subcommittees of TC 5.

    Mr. Issaev thanked Mr. Skubić and wished him every success in this new task, then asked Mr. Szilvassy to give additional information on technical activities.

    Mr. Szilvassy said that the annual reports received from 15 TCs and 45 SCs had been sent to all CIML Members in one volume early this year. A summary of OIML technical activities in 2001 and forecasts for 2002 had been published in the April 2002 OIML Bulletin. In 2002 there were 117 approved projects for 10 TCs and 43 SCs, of which 72 were ongoing (nine projects were at final DR or DD status, 28 at CD status and 35 at WD status). Unfortunately there were 44 projects of which 26 had not yet been commenced, the others having been postponed or delayed. In addition 8 TCs and 6 SCs had, for the time being, no approved projects (three TCs out of eight were not responsible for any OIML publications). Since the $ 36^{\mathrm{th}} $ CIML Meeting only TC 12 and two SCs (TC 8/SC 5 and TC 9/SC 2) had held International Working Group meetings. A number of WG meetings had also taken place and the meeting of TC 5/SC 1 had already been confirmed for this year.

    On a positive note he was pleased to announce that the Secretariat of TC 13 Measuring instruments for acoustics and vibration was no longer vacant. Germany had again taken on responsibility for this Secretariat and had already organized an informal meeting in June with the participation of seven P-members and the IEC in order to study the situation and to announce the re-launch of activities.

    As a result of the technical activity since the 36th CIML Meeting, 17 Committee Drafts had been produced and circulated by two TCs and ten SCs and two drafts (revisions of D 18 and of the document on the OIML Certificate System for Measuring Instruments) approved by postal vote by the CIML. In addition, two Draft Recommendations were presented for CIML approval under Item 8.3 and a further DR, the Test Report Format to the new Recommendation on Total vehicle weighing would be presented for CIML approval by postal ballot after this CIML Meeting.

    He went on to explain that the final draft revision of OIML R 111 Weights of classes $ E_{1}, E_{2}, F_{1}, F_{2}, $ $ M_{1}, M_{1-2}, M_{2}, M_{2-3} $ and $ M_{3} $ had been delayed owing to a number of comments having been received from CIML Members (only Yes votes had been received from a total of 39 CIML Members that had voted) and then requested the Committee to endorse the proposed procedure to approve the draft by CIML postal ballot as soon as it was available from the US Secretariat.

    Based on progress made this year (and of course expected progress during the next year) at least four DRs (revisions of R 84, R 61 and R 52 and a new Recommendation on Light absorption spectrophotometers for medical laboratories) were very likely to be presented for approval at the $ 38^{\mathrm{th}} $ CIML Meeting. In addition to the draft of R 49-3 (Test report format for water meters), two drafts of International Documents (D 6/D 8 plus D 9) appeared to be at a well-advanced stage and it was therefore very likely that they would be presented for CIML postal approval in 2003. Other drafts were being developed which could reach the status of DR or DD (e.g. two drafts from TC 8/SC 7 and the revision of R 51) by early next year if efforts were made by the Secretariats and P-members of the TCs and SCs concerned, especially in the case of priority projects.

    In summary, and despite the fact that in their Annual Reports quite a few TCs and SCs had envisaged an increase in their activities for 2002 it was stated that there had in fact been a slight decrease in the overall activity of OIML technical bodies during the past one-year period compared with the positive tendencies in previous years and taking into consideration the relatively high proportion of approved projects (about 40 %) that had not yet been started. It was also mentioned that although several questionnaires and inquiries had been circulated by TCs and SCs in connection with the scheduled reviews aimed at revising OIML Recommendations and Documents, the number of OIML publications now due for review was increasing.

    Looking at the present state of progress of the high priority and priority projects, the list of which containing a total of 39 projects was endorsed by the CIML in 2001, Mr. Szilvassy remarked that although six of them had already been approved, four of them had reached DR status and 16 projects were at advanced CD status, there were however 13 projects that were only at WD status or had yet to be started. This situation needed to be improved and the TCs and SCs concerned had to start working on these projects. Since it was of vital importance for the OIML to accelerate technical work on horizontal types of projects (e.g. revisions of D1 and D11, the development of documents on uncertainty, software and statistical methods, etc.) and on other priority and approved projects, as well as on due reviews, the CIML Presidency had initiated further actions to be taken to improve the situation. Oral information would be given under Item 8.4.

    Concerning the new work projects (information on which was included in a BIML letter circulated before the CIML Meeting) proposed during this year by two SCs and supported by the majority of P-members of the Subcommittees concerned it was proposed to the Committee to approve the projects on:

    - Procedure for the control of the main parameters and characteristics of thermovision instruments as proposed by TC 11/SC 3, and

    Automatic refractometers. Method and means for verification as proposed by TC 17/SC 2.

    The revision of R 126 Evidential breath analyzers (the review of which was due in 2003 following a US proposal to amend it) was also put forward. The US offered assistance to the French Secretariat in its revision.

    As for the new work project Verification and inspection intervals of legally controlled measuring instruments proposed by TC 4, a further consultation at the TC/SC level was recommended since the final result of the TC 4 vote was not yet available and the US had suggested that this topic should rather fall within the scope of TC 3/SC 1 (this was supported by at least four other P-members of TC 4).

    Concerning the situation of certain TCs/SCs Mr. Szilvassy said that apart from TC 8/SC 2 being vacant (as already mentioned by Mr. Issaev) volunteers would also soon be needed to assume responsibility for TC 10/SC 3 Barometers since the UK had indicated its intention to resign as Secretariat.

    As for the Australian proposal to establish a new Subcommittee Instruments for quality analysis of agricultural products within TC 17 together with a work project Measuring instruments used for protein determination in grain it was recommended to the Committee to i) approve this proposal since it was supported by nine TC 17 P-members (out of 12) and ii) allocate the Secretariat of the new TC 17/SC 8 to Australia.

    Concluding his report on technical activities, Mr. Szilvassy said that the BIML had proceeded with the amendment of R 49-1 and R 49-2 as accepted by the CIML. The file of the amended

    Annex A of R 49-1, as prepared and approved by TC 8/SC 5, had been placed on the OIML web site in April 2002 for provisional consultation by CIML Members together with the amended file of R 49-2 (drafted based on the amended Annex A of R 49-1 and subsequently approved by TC 8/SC 5). Since that time no CIML Member had objected either to the procedure, to the amended Annex A of R 49-1 or to the amended version of R 49-2. The amended R 49-1 would be republished by the BIML at the same time as the amended R 49-2. The development of the Test Report Format (R 49-3) was advancing well and the final Committee Draft was expected soon; it would be circulated to CIML Members for postal approval.

    Mr. Kochsiek gave brief information on the results of a joint meeting of the TC 8/SC 3 and SC 4 WGs which had taken place in Braunschweig in mid September. The main outcomes of the meeting were the recommendations to merge R 105 and R 86 into R 117 and to extend the scope of R 117 to ultrasonic and vortex meters. It was envisaged to hold the TC 8/SC 3 and SC 4 joint committee meeting (organized by the BIML) in October 2003 in Paris.

    Following a short introduction on the recent TC 12 Workshop and Committee Meeting, Mr. Kochsiek requested that CIML Members check their countries' participation in TC 12 since this was very important for the revision of R 46. He then requested Mr. Valkeapää to give information on the results of the TC 12 Workshop and on the WG meeting held in Borås.

    Mr. Valkeapää first reminded Delegates that the work on the revision of R 46 had been started at a TC 12 meeting held in Braunschweig in October 2000. Based on the results of the questionnaire circulated among TC 12 members after this meeting it had been realized that the work on the revision of R 46 needed to be speeded up. In order for members to become better informed concerning the field of electricity measurement from different parts of the world and to harmonize the various views, it had been decided that SP Sweden would organize a workshop in conjunction with the TC 12 committee meeting. The Workshop on "Measurements of Electrical Energy" in Borås had been attended by some 60 participants from OIML Members as well as from manufacturers, utility companies and other authorities (e.g. from the Swedish consumer protection authority). The outcome of the Seminar was that different standards and different technologies existed in the world, and there was a need for harmonization (the report of the Workshop is available from the SP web site (www.sp.se). The Committee meeting, which was attended by 35 participants from all over the world representing 20 Member States and liaison organizations, agreed on the scope of the revision of R 46, prioritized the tasks and split up the work into smaller sections in order to create a series of documents. The development of such a series of documents under the revision of R 46 was considered necessary since in the electricity market there were many more (and different) measurements than in the traditional method of dealing with electrical energy metering. The first document in this series would very likely cover the existing regulations including electronic meters. It was decided that this work would be carried out using e-mail and the restricted access web site created by SP. The next TC 12 meeting would be held in Maastricht on 27-28 March 2003.

    Mr. Lagauterie explained the urgent need to immediately start revising R126, taking into account the US proposal for an amendment, the numerous comments and suggestions collected from members during 2002 and the needs of a number of Member States which had declared their intention to implement this Recommendation once it had been revised.

    As to the scope of the proposed new TC 17/SC 8, he questioned the necessity of creating a new body since there were already OIML Recommendations on quality measurement of agricultural products (e.g. R 59 Moisture meters for cereal grains and oilseeds and R 108 and R 124 on sugar content measurement of fruit juices and grape musts) developed by other existing technical

    bodies. He asked whether it would not be more appropriate to integrate the proposed new project on protein determination in grains into the work program of one of the existing SCs of TC17, otherwise very close cooperation and coordination would be necessary between the Subcommittees concerned since for example for the determination of the moisture content (as well as for the protein content) of grains, the same infrared measurement technique was being used.

    In his answer Mr. Szilvassy explained that the scope of the proposed new Subcommittee fitted in with the general scope of TC 17 and according to the Directives for OIML technical work, OIML technical bodies working on related subjects should establish and maintain liaisons with one another, so this would apply to the new SC to be established. He further explained that it was not the title of the new SC but rather its scope of activity that was essential, and this should be more precisely determined by the Subcommittee with the assistance of TC 17 and subsequently approved by the CIML. It would be the first task of the Australian Secretariat of TC 17/SC 8 to ask for participation in the Subcommittee and to circulate a questionnaire among the P- and O-members of TC 17 as to both its scope of activity and also the scope and content of its new work project.

    Mr. Al-Gossair asked about the difference between the work of ISO/IEC and the OIML when issuing standards for the same subject, e.g. for water meters.

    Mr. Szilvassy answered that according to the Directives for OIML technical work it was the obligation of OIML technical bodies to establish and maintain liaisons with external organizations in coordination with the Bureau - such as ISO and the IEC - so as to ensure that the existing (or drafted) OIML Recommendations and the existing (or drafted) international standards were, as far as possible, compatible with each other. As examples of the compatibility ensured in this way he mentioned the first joint publication, OIML R 99/ISO 3930 and R 93 and R 122 (together with its Annex C) that had been developed on the basis of existing ISO standards. In the case of R 49 on water meters, this publication had been drawn up in parallel and in close cooperation with ISO TC 29.

    Mrs. Bennett, supporting the proposal on establishing a new Subcommittee, said that besides the traditional quantity measurement of products there was a growing need for quality measurement of agricultural products. During previous consultations with other TC 17 members the options mentioned by Mr. Lagauterie had also been considered, but in the end it was felt that there was a real need for a separate SC focused on the quality aspects of agricultural products.

    In reply to an earlier question, Mr. Magaia stated that the revision of D1 Law on metrology was a high priority project and had been requested by Development Council members too. The production of the 1 CD of the revision of D1 had been undertaken by the US Secretariat and himself after the 36th CIML Meeting. Since two liaison organizations, namely the CIPM/BIPM (as far as scientific metrology was concerned) and ILAC (as far as ensuring traceability for accredited laboratories was concerned) were very interested in participating in the development of the new revised document and it was recognized that this kind of document could not be developed without their contribution. A new Joint Working Group had been established during the last annual CIPM-ILAC-CIML meeting in February 2002 and the 1 CD circulated among TC 3 members then transmitted to the BIPM and ILAC for comments. He requested CIML Members to send their comments as soon as possible in order for the Secretariat and the Bureau to be able to prepare the 2 CD for circulation and discussion by the Joint Working Group at the next annual meeting of the three organizations to be held in February 2003 at the BIML. In addition he mentioned that the approach followed in the revision would be different to that of the present D1, which was a kind of model law on metrology which it was recommended to follow or copy into nation-

    al legislation. The revised Document would contain a series of considerations proposed to those countries intending to create or revise their national legislation on metrology; it would be a kind of guidance rather than a "turnkey" law document.

    Mr. Ehrlich added that the deadline for comments had been set at mid-November 2002 and it was envisaged to organize and hold a TC 3 Committee meeting in 2003 with the participation of the liaison organizations concerned. He also noted that the preparation of the final version of the revised R 111, which had been delayed owing to the numerous comments received from CIML Members, was advancing well and the Secretariat had already finished the first part and was working on the Test Report Format. He assured the Committee that the revised publication would be a very good and usable "state-of-the-art" document and mentioned the vast contributions by Dr. Glaser (PTB) and Dr. Davis (BIPM) in its development.

    Mr. Magaña added that the BIML had proposed that the draft of the revised R 111 be approved by CIML postal ballot as provided for by the Convention, since this was an important and urgent document. The BIML would circulate the DR as soon as it was available from the US Secretariat.

    Mr. Kochsiek gave further information on the state of the project on Light absorption spectrometers for medical laboratories developed by TC 18/SC 5 which had reached the state of final committee draft. The final version would soon be sent to the BIML in order to circulate it as a DR with a view to its subsequent approval by the CIML at its $ 38^{th} $ Meeting.

    To conclude these two items the Committee approved the establishment of the new Subcommittee TC 17/SC 8 under Australia's responsibility, allocated the Secretariat of TC 5 to Slovenia and approved the three new work projects as proposed.

- number: '8.2'
  title: Examination of the situation of certain TCs/SCs
  narrative: |2+

    The Committee took note of information delivered by Vice-President Mr. Issaev and by the Bureau concerning OIML technical activities and, while expressing its satisfaction for the work accomplished, requested the OIML TCs and SCs to accelerate their work especially in the fields listed as high priority and priority projects.

    The Committee approved the following projects as proposed by:

    - TC 11/SC 3

    - on Procedure for the control of the main parameters and characteristics of thermovision instruments;

    - TC 17/SC 2

    on Automatic refractometers. Method and means for verification; and

    - TC 17/SC 7

    to start the revision of R 126 Evidential breath testers.

    The Committee requested TC4 and TC 3/SC1 to provide for a common inquiry to define which of them will undertake the new work project on Verification and inspection intervals of legally controlled measuring instruments proposed by TC4.

    The Committee allocated the Secretariat of TC 5 (until now vacant) to Slovenia, which had volunteered to assume responsibility for this Technical Committee.

    The Committee established a new Subcommittee TC 17/SC 8 Instruments for quality analysis of agricultural products, allocated the Secretariat to Australia, and approved its first work project on Measuring instruments used for protein determination in grain.

    The Committee instructed the Bureau and TC 3 to accelerate the work on the revision of OIMLD 1 Law on metrology.

- number: '8.3'
  title: Acceleration of technical work
  narrative: |2+

    In his introduction, Mr. Faber said that he (together with Members of the Presidential Council) were worried about the speed at which OIML technical work was advancing since this was, after all, the core activity of the Organization. It was not only about the slowness of developing new OIML documents but also about lagging behind in regular reviews and revisions of existing Recommendations and Documents. If the OIML failed to do its job, other organizations would do it since they cannot (and will not) wait until the OIML does so. The Presidency had looked into the distribution of TCs/SCs and the tasks allocated and had found that the US and the Russian Federation held half of the Secretariats; four Member States were developing about 75 % of ongoing projects. In order to arrive at a more balanced distribution of tasks among Member States and to find more individuals who could contribute to OIML technical activities he preferred to employ a positive approach since there was no reason to blame any specific country or person. That meant that several means of assistance to technical bodies would be put forward: informal contacts and visits would be proposed in order to i) identify those problems within TCs and SCs that needed to be attended to, ii) help identify potential sources of assistance by various other Member States and iii) attempt to persuade them to take on certain responsibilities. He said that in the coming years the CIML President, the Vice-Presidents and the BIML Director would be in contact with those countries to discuss possibilities in a positive but informal way, draw up a program of visits and then report back to the CIML and discuss what can be done to improve the situation. To conclude, Mr. Faber affirmed that he was well aware of the difficulties facing most metrology services: shortage of time, resources and staff, and agreed that each situation had to be studied case by case in close cooperation with the bodies concerned.

    Mr. Magaña said that the technical activity was very important for the Organization and gave additional information by indicating that there were currently about 150 OIML publications; this meant that on average 30 were due for review. If one assumed that revisions were due on average every fifteen years, this would mean around ten publications had to be revised per year. All this meant that the OIML had a real problem in revising publications. He further mentioned that the Bureau had held meetings with the CIML President and Vice-President to examine the present situation, the possibilities of offering assistance to TCS and SCs, and how to achieve a more balanced distribution of the technical bodies (and therefore the resulting tasks) among Member States with a view to encouraging a certain number of countries to assume responsibility for certain Secretariats or even accept more tasks. As for the several proposals to increase and accelerate technical activities, among others he mentioned that the BIML would be charged with following these more closely and with contacting (in an informal way) those Secretariats that seemed to be in trouble in order to examine their problems and establish actions for helping them. In certain cases the BIML could give financial assistance to experts for their time spent on OIML activities and for their participation at meetings. The ongoing development of the OIML web site and its increasing utilization would be an effective tool to facilitate the exchange of information and speed up the advancement of projects, but of course it would not replace meetings of experts which would still remain necessary. CIML Members also had the possibility to contact and ask other services and institutions in their countries (e.g. the agency charged with environmental affairs) to help the Secretariats and perform work for the OIML.

    In addition he mentioned that the revision of the Directives for OIML Technical work. Part 1 was advancing well and these Directives were also intended to facilitate technical activities. Mr. Dunnill explained that this revision was based on the recently revised ISO/IEC Directives and the intention was to produce a simplified document that was well adapted to OIML needs and procedures. He reported that 15 replies (eight with comments) had been received on the 1 CD and based on these, there would be no substantial changes in the (very likely) final CD being developed.

    Mr. Faber considered that this action to further the acceleration of technical work was accepted by the Committee since there were no objections or additional proposals; he concluded this item by saying that the Committee would be kept regularly informed on developments in this field.

- number: '8.4'
  title: Approval of draft Recommendations
  narrative: |2+

    The Committee approved two draft Recommendations with the voting results as indicated below:

    Automatic instruments for weighing road vehicles in motion (R 134)

    Part A: Total vehicle weighing

