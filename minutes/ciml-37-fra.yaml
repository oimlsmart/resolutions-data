- number: '14.1'
  title:
  - spelling: eng
    value: 38 $ ^{\mathrm{e m e}} $ Réunion du CIML (2003)
  narrative:
  - spelling: eng
    value: |2+

      M. Faber a rappelé aux Délégués qu'une décision provisoire avait été prise à Moscou pour tenir la 38ème Réunion du CIML à Kyoto, Japon. M. Tanaka a alors fait une présentation illustrée sur les programmes initiaux qui avaient déjà été faits par le Ministry of Economy, of Trade and Industry (METI) et le National Metrology Institute of Japan (NMIJ) pour accueillir cette Réunion et aussi une réunion APLMF, et a confirmé formellement l'invitation par son pays. Il était particulièrement heureux d'accueillir l'OIML au Japon car 2003 serait le centenaire du NMIJ, et a poursuivi par un bref historique de l'Institut et de la ville de Kyoto, ancienne capitale du Japon située à près de 300 km de Tokyo.

      Les dates prévues initialement pour la réunion APLMF étaient les 2-4 Novembre 2003 et la Réunion du CIML se déroulerait les 4-8 Novembre. Le lieu serait le KICH: Kyoto International Conference Hall, situé dans le cadre agréable d'un jardin japonais typique.

      Le Comité a unanimement accepté l'invitation du Japon et a chaleureusement remercié M. Tanaka pour sa présentation.

- number: '14.2'
  title:
  - spelling: eng
    value: 39 $ ^{\mathrm{e m e}} $ Réunion du CIML et 12 $ ^{\mathrm{e m e}} $ Conférence
      (2004)
  narrative:
  - spelling: eng
    value: |2+

      M. Faber expliqué que deux options étaient ouvertes pour 2004: Israël et l'Allemagne. Il a informé le Comité que Israël maintainait son option ouverte, mais sans indiquer une année précise étant donné les actualités qui pourraient avoir pour conséquence d'empêcher d'atteindre le quorum requis. Il était reconnaissant envers la Délégation d'Israël pour sa compréhension et la remerciait encore d'accepter de reporter son invitation. Il a conclu que le choix de l'Allemagne restait donc le seul possible; M. Kochsiek a indiqué que l'Allemagne avait besoin d'un engagement définitif afin d'obtenir le budget nécessaire et de commencer les préparatifs. Il s'était entretenu avec la Délégation Israélienne qui lui a assuré qu'aucun sentiment de "compétition" n'existait et que l'organisation des événements de 2004 par l'Allemagne devait être sereine.

      Le Comité a unanimement accepté l'invitation allemande et a remercié M. Kochsiek pour l'invitation.

- number: '14.3'
