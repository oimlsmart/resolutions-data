- number: '9'
  title: OIML Certificate System for Measuring Instruments
  narrative: |2+

    A written report prepared by the BIML was distributed to Participants and presented by Mr. Kochsiek who was responsible for following activities related to the OIML Certificate System as CIML Vice-President.

- number: '9.1'
  title: General information
  narrative: |2+

    In his introductory remarks Mr. Kochsiek said that the OIML Certificate System for Measuring Instruments ("the System") had made good progress over the last decade and the revised document OIML Certificate System for Measuring Instruments provided for its further development. He mentioned that the number of registered OIML certificates would very likely exceed 1000 by the end of 2002, and three more Member States (Japan, Finland and the Republic of Korea) had recently established their respective Issuing Authorities. There were now 26 Issuing Authorities established in 23 Member States. The number of applicants and manufacturers of measuring instruments in 34 countries (25 OIML Member States and 9 Corresponding Members) that had been granted OIML certificates was over 260.

    Among the shortcomings of the System, he mentioned that OIML certificates had only been issued and registered for 13 categories of measuring instruments out of the 36 that were applicable within the System and these certificates had been issued only by 16 Issuing Authorities in 14 Member States out of a total of 26 established to date.

    As far as the plans for future developments were concerned Mr. Kochsiek pointed out that among the numerous concrete actions that were to be carried out in the near future as defined in the OIML Long-term Policy: 1999-2002 Action Plan, the development and accomplishment of the MAA was a very important one which was to be discussed later under item 10.

    Mr. Szilvassy gave an outline of the developments over the last one-year period and said that 20 OIML technical bodies had 24 ongoing projects (among which four were high priority and six were priority projects) with the aim of developing, revising or completing Recommendations for use in the System, but unfortunately progress had only been made on 12 projects by nine technical bodies during this period.

    He further mentioned that the revised document OIML Certificate System for Measuring Instruments had been approved in a vote by a total of 37 CIML Members (35 "yes", one "no" and one abstention) and the document was being edited for publication. Of these 37, he pointed out that

    22 had voted out of the 23 that had established 26 Issuing Authorities (20 "yes", one "no" and one abstention). This was very important for the general acceptance of the revised document since the central role had been shifted from the CIML Members to the Issuing Authorities. He commented that the Certificate System page of the OIML web site was regularly updated, and that the file of the updated document on Issuing Authorities and Recommendations applicable within the System (and soon the file of the revised document on the System) could be downloaded from the web site. It was further envisaged to place the PDF files of all registered certificates on the OIML web site, though for the moment this posed a technical file size problem.

    Among the present characteristics of the System he mentioned the steady increase in the number of registered certificates over the last three years and in the number of Recommendations applicable within the System, which would doubtless reach 39 by the end of 2002.

- number: '9.2'
  title: New Recommendations applicable within the System
  narrative: |2+

    Following a proposal by the Bureau, the Committee decided that one of the newly approved Recommendations, namely the revision of R 84 Platinum, copper and nickel resistance thermometers (for industrial use) would become applicable within the System as soon as it was published.

    The Committee also decided that two Recommendations, namely R 134 Automatic instruments for weighing road vehicles in motion. Part A: Total vehicle weighing and R 49 Water meters for cold potable water would become applicable within the System as soon as their Test Report Formats were approved by CIML postal vote and published.

    As for the revised R 111 containing the Test Report Format annex, the question of its applicability within the System would be decided by the CIML at the same time as its postal approval.

- number: '9.3'
  title: Plans for future developments
  narrative: |2+

    Mr. Szilvassy reminded Delegates that a number of concrete actions to be carried out in the near future for the development of the System had already been included in the OIML Long-term Policy: 1999-2002 Action Plan.

    In addition he pointed out that the revised OIML Certificate System for Measuring Instruments document shifted the central role from the CIML Member to the Issuing Authority and extended the scope of the System in two directions: certification of modules and certification of families of types and modules of measuring instruments. It also included new provisions (e.g. the requirement to list specified manufacturers' documentation, including references to software programs) necessary for the identification of the type (to be) certified, and implicitly included requirements as to what had to be specified in the relevant Recommendations (e.g. definition of families, identification of modules and/or families together with their prescribed metrological requirements, test methods and test report formats, etc). Provisions for how to do this would be included in Part 2 of the Directives, currently being revised. The implementation of all these changes in the scope of the System would require concrete additional actions by the TCs and SCs concerned when developing new Recommendations or revising existing ones intended for application within the System.

    The next action, already formulated in the Action Plan and relating to the individual certification of measuring instruments or modules, was due to be started soon. Since no concrete recent pro-

    posals on this matter were available (the proposals in the BIML's possession dated back to the mid 1990's) it was envisaged to draw up and circulate a questionnaire by the TC 3/SC 5 Co-Secretariats as to the scope, content, requirements and rules of individual certification under the System.

    Mr. Szilvassy concluded that there were two directions to follow: one was the development of the System itself and the other was the development of the MAA (this situation was to be discussed under Item 10), and added that general actions by CIML Members and the BIML were necessary to further promote the System at national, international and regional levels, especially among Corresponding Members, and to keep international and regional liaison organizations informed of the advantages of the System. Further developments in connection with the MAA (e.g. accreditation or peer evaluation of Issuing Authorities) would also contribute to the development of the System.

    Mr. Lagauterie explained France's "no" vote on the revised OIML Certificate System for Measuring Instruments document: he commented that although the content of the document was satisfactory in itself, it was incoherent and in contradiction both with the VIML and with the draft of the MAA as far as the tests and examinations were concerned, since (in his opinion) both the tests and the examinations had to be included in separate reports and formulated by separate bodies. This would cause a problem in the context of the future MAA where the object of the acceptance had to be clearly determined.

    Mr. Magaña said that he understood the problem (which could have been solved many years ago) and shared the opinion that it was necessary to be clear concerning terminology, but considering the nearly 1000 certificates issued and the almost 40 Recommendations that included Test Report Formats (including tests and examinations) it was not possible to change all these now. In addition it was often not simple to distinguish the borderline between examinations and evaluations, and also differentiate between the bodies by whom these had to be executed.

    Mr. Lagauterie admitted that sometimes it was difficult to establish the borderline, but it was always possible to find a solution by deciding whether the criteria of an examination were clear or not and whether or not the testing body had the possibility to interpret the results, which was the task of the certification body. He added that being aware of the situation did not prevent the CIML from deciding to implement a new system from now on without necessarily altering what had been done up to now.

    Mr. Johansen said that is was very interesting to see how the System was developing, and especially to see the new developments in the direction of both individual certification and the MAA. He had some concerns about the bureaucracy and the economics behind all these developments and suggested that these questions had to be examined in the context of future developments. It was clear that the manufacturers and users benefited from the System and it was also evident that they had to pay for the necessary activities of the Bureau to deal with it, but looking at the MAA and the increasing future tasks of the Bureau it was absolutely necessary that the users pay more in the future.

    Mr. Kochsiek explained his personal view that the bureaucracy with the Certificate System had actually been very low in comparison with the MRA of the Meter Convention, and agreed with the opinion that the administrative workload of the future implementation of the MAA should be kept as low as possible.

    Mr. Magaña added that until now the administrative workload of the Bureau in connection with the registration of OIML certificates was limited to registration, circulation among OIML Members and placing the reference on the web site; applicants' fees practically covered these costs. Since the MAA would give rise to many additional tasks within the BIML, including for example a more extensive follow up to registered certificates, the fee scale would definitely have to be revised.

    Mr. Boudissa raised a question that he felt was of importance for developing countries in connection with the future MAA. There was a need for these countries to have an infrastructure and legislation in place in order for them to be able to issue certificates that would be recognized by others at the same time as they recognized the results of others. He wondered whether that level of capacity and competence existed and whether they could be recognized, because there was a risk of developing countries not being accepted which would negatively effect the development of these countries' metrology systems.

    He requested that the Bureau consider this problem together with developing countries, with a view to ensuring that "mutual recognition" was really mutual and not just one-sided.

    Mr. Magaña said that the subject raised by Mr. Boudissa led to a transition from this discussion item to that on the MAA and put forward two points of view: the first related to the fact that quite a few industrialized OIML Member States had not yet established Issuing Authorities due to a lack of laboratory infrastructure and/or competence to issue OIML certificates; nevertheless numerous examples of unilateral voluntary recognition among them already existed. His second view was that the main goal of the MAA was to go beyond this and to facilitate acceptance and recognition among OIML Members.

    Mrs. Bennett made an observation based on Australia's experience that there were considerable differences in the technical content of certificates issued by different Issuing Authorities and she deemed that in connection with the MAA there would be a need for further harmonization and some guidelines as to the required technical information that had to be considered.

    Mr. Kochsiek concluded the discussion by saying that one of the directions of future developments of the Certificate System was the OIML MAA and some comments already put forward could be discussed under the next item.

- number: '10'
  title: Evolutions
  narrative: "\n"
- number: '10.1'
  title: Mutual Acceptance Arrangement (MAA)
  narrative: |2+

    Mr. Faber introduced item 10.1 on the Mutual Acceptance Arrangement, explaining that this was one of the most important items on the Agenda, and that he strongly believed that finalizing this document was essential for the future of the OIML. Mr. Faber asked Mr. Ehrlich to present the status of the work on this issue.

    Mr. Ehrlich recalled the presentation that he had given at the 36th CIML Meeting in Moscow. Since this presentation was available on the OIML web site, he felt it was not necessary to repeat it. He went on to give a brief history of the project, which had been instigated in 1998 by Mr. Chappell, with a meeting of TC 3/SC 5 in Gaithersburg. Following the Moscow meeting, a 9th Committee Draft was circulated among TC 3/SC 5 members for comments and vote. Among the 23 P-Members of this Subcommittee, 15 "yes" votes, 7 "no" votes and one abstention were received.

    Some comments received were probably due to a misunderstanding of what was being said in the document; clarifications could be made to solve this problem. The most important comments received from the TC 3/SC 5 Members could be broken down into four categories of concerns:

    - One category of comments had to do with the question of whether the arrangement should be decided among Issuing Authorities or among testing laboratories; in fact the opinions

    were shared between these two possibilities, probably due to the obligations of notified bodies and testing laboratories in the European Union (all the negative voters were European countries);

    The second issue related to the cost of the procedures for establishing confidence, and to the problem in deciding whether accreditation or peer review (maybe less expensive) was required;

    The third area of concern related to the equivalence of the level of confidence resulting from accreditation and from peer review; some compromise could be achieved in this matter; and

    The fourth key issue that was raised by Germany was whether or not to accept that "supplementary requirements" be taken into account in the Declarations of Mutual Confidence.

    Since this vote, one P-Member had changed his vote from abstention to a "yes" vote. According to the Technical Directives, this Committee Draft could now pass the Subcommittee level and become a Draft International Document, to be submitted to the CIML.

    Dr. Llewellyn regarded the MAA as crucial for the OIML. The UK's concern when abstaining was about the possible lack of clarity in the Committee Draft as to who the active participants in the Declarations of Mutual Confidence (DoMC) were. Discussions with the Secretariat clarified this point and enabled the UK to change its vote into a positive one.

    Mr. Ehrlich added that another key issue raised by France was related to the need for clarification as to the scope of the MAA, since it was an arrangement that concerned test results and not certificates.

    Mr. Faber added that the Draft Document was a major decision for the CIML and therefore would need a four-fifths majority CIML vote, as stated in the Convention. This principle should be decided on at the present CIML Meeting. Therefore the fact that the Draft passed the TC 3/SC 5 level vote with a two-thirds majority did not guarantee that it would be approved at CIML level. The Secretariat would have to take this into account when preparing the Draft for CIML consultation and vote.

    Mr. Johansen agreed that this project was of utmost importance; this was why a significant number of "no" votes gave cause for concern; he felt that the consensus should be larger. The OIML Certificate System was successful and growing, but if the MAA was adopted without the required consensus then it would affect the success of the Certificate System. He was of the opinion that too many discussions had been held by correspondence and not in meetings, and recommended organizing another meeting before finalizing this Draft.

    Mr. Ehrlich appreciated the concerns expressed by Mr. Johansen, but considered that at this point it would be more useful to obtain the opinion and comments of all the CIML Members, and not only those of the TC 3/SC 5 Members.

    Mr. Kochsiek pointed out that Germany had voted "no" in order to limit the MAA to those participants who had implemented OIML Recommendations in their countries. This was the main responsibility of the OIML. National requirements were only acceptable if they were equivalent to OIML Recommendations, and the MAA should support the objective of harmonization, which meant that additional testing should be avoided.

    Mr. Ehrlich responded that the main concern was that it was not possible to require that every country simply adopted the OIML requirements in order to participate in the MAA, because this was unlikely to happen, due for example to technological evolutions. However, he did agree that this issue on supplementary requirements had to be reworded in order to avoid requirements substantially deviating from those included in the relevant OIML Recommendations.

    Mr. Tanaka agreed with Germany that the MAA should preserve the coherence of the national regulations of the participating countries with OIML Recommendations. However, the current tables annexed to the Draft did not fit in with the Japanese national law. Mr. Tanaka recommended carrying out another investigation among CIML Members as to whether there were any plans to attend to this issue, or concerning the use of self declaration.

    Mr. Lagauterie explained the reasons behind France's negative vote. The first reason was that countries that did not implement OIML Recommendations should not be accepted. On the other hand it may be acceptable to take into account national specificities (for example climatic conditions). The second reason was the ambiguity of the scope of the MAA: it seemed to be applicable only to test results (covered by ISO 17025), but a number of items in this Draft made reference to certificate Issuing Authorities and to ISO Guide 65, which was dedicated to certification bodies.

    Mr. Ehrlich answered that the MAA should allow some flexibility: the OIML test reports were made available by Issuing Authorities and may emanate from several test laboratories under the authority/supervision of the Issuing Authority.

    Mr. Vaucher gave the reasons for Switzerland's negative vote. Firstly, the scope caused some misunderstandings. This MAA should be a step forward to promote the OIML Certificate System, but Switzerland would not be satisfied if the scope of mutual acceptance was too strictly limited. There was also a risk of growing bureaucracy by requesting accreditation or peer assessment for each category of instruments. The Issuing Authority had the responsibility to assess the competence of the testing laboratories or to have them assessed by accreditation bodies. So it made sense to set down requirements as to the Issuing Authorities' competence in their fields of responsibilities. The second point was the way in which confidence should be established. It was necessary to define peer assessment more precisely, as apart from accreditation, other ways of building confidence were not described anymore. But the cost of establishing confidence had to remain affordable so as not to limit participation to large organizations.

    Mr. Faber noted the above interventions, and made two proposals. The first was to decide that as this MAA was meant to have far-reaching consequences for the life of the OIML and on legal metrology activities in the various countries, it could not be considered as a plain informative International Document and hence needed to be adopted by a Committee decision with a fourfifths majority. The second proposal was that the TC 3/SC 5 Secretariat, taking into account the comments received previously and the discussion held during the present CIML Meeting, might develop a further version, including any necessary clarification, and organize a workshop with any interested CIML Members to discuss this improved version, in order to obtain the best possible consensus on the MAA. Bilateral discussions with some Member States should also be envisaged to progress towards better acceptance of the MAA. The version submitted to the CIML at its 38th Meeting would be developed on the basis of this workshop and of these bilateral discussions.

    Mr. Chappell added that for this particular voluntary program, the opinion of all Members should be sought. If the program was successful, it would be hoped that Member States would realize its benefits. The proposal of a workshop would be welcome if after CIML consultation, no possible approval of this program was evident.

    Mr. Farragher supported the proposal to consult all CIML Members on the Draft, but without being too rigid.

    In conclusion, Mr. Ehrlich and the BIML were asked by the President to make progress on the principles explained above, with a view to the possible adoption of the MAA in 2003.

- number: '10.2'
  title: Horizontal Documents
  narrative: |2+

    Mr. Magaña recalled that at the last CIML Meeting it had been decided to develop a policy paper on horizontal documents. A first draft had been drawn up and discussed at the Presidential Council. This paper considered and tried to distinguish several kinds of documents. Some OIML publications, such as D11, were not merely informative but also served as a basis for most of the OIML International Recommendations. This would also be the case of the documents on software. A number of comments were expressed by Presidential Council Members on this first paper, which would be reconsidered by the Bureau with a view to its being presented to the Presidential Council at its meeting in February 2003, in the form of a better draft which could then be submitted to CIML Members with a view to its adoption at the next CIML Meeting. This paper would redefine the different kinds of OIML publications in order to clarify their use and their mode of adoption.

- number: '10.3'
  title: Report on the study The Benefits of Legal Metrology for the Economy and Society
  narrative: |2+

    Mr. Birch gave a detailed report on his Study The Benefits of Legal Metrology for the Economy and Society which had been requested by the Presidential Council. His work had consisted in looking at previous studies carried out over the last years, and in reviewing them with the aim of extracting the lessons learned from work already accomplished, and on this basis to come up with a number of social and economic criteria which could be used in determining resource allocation, to provide a rudimentary cost-benefits analysis for metrology.

    Mr. Birch had started by contacting OIML Members and asking them to provide existing studies and reports on this subject and seeking any comments they had, though unfortunately very few contributions had been received to date. Mr. Birch had then gone through available literature on this topic and compiled a bibliography of studies that had been carried out on the economics of metrology and standardization. This bibliography comprised about 138 items representing some 10 000 pages of text. Most of the studies essentially dealt with general metrology rather than legal metrology, but were still of particular relevance.

    In terms of the benefits of legal metrology to the economy, some obvious benefits must be recalled: consumer protection, effective stock control, fraud control, reducing disputes in transaction costs, full national benefit for commodity exports, full collection of government taxes and excise, and support of global trade in measuring instruments.

    Regulatory metrology had some quite distinct benefits:

    - Increased compliance with regulations (legislation should provide a sound evidential basis for measurements); and

    - Enhanced cost-benefits ratio (legal metrology solutions may be far superior to alternative solutions in a policy context).

    The benefits of legal metrology to society were the support of a civil society (reduction of disputes), reduction in deaths and injuries, and an improved natural environment.

    Further steps should be taken to quantify these benefits. Seven groups of studies had been carried out on the economic impacts of measurements. Studies carried out by the NBS (USA) between 1965 and 1985 evaluated measurement-related activities to be 3.5 % of the GNP of modern

    industrial societies. The Poulson study (1977) had concluded that a true cost-benefit analysis of the total measurement system was just not possible. In terms of added value, Don Vito's study (1985), which came up with the figure of 3.5 %, was criticized by some experts.

    The studies carried out by Measurement Canada in the mid-eighties were interesting from a legal metrology point of view: the value of goods traded using legally controlled instruments was first calculated, and then the effect of short- and over-measure in those instruments was established at the time of reverification. By taking the difference between these two values into account for all the instruments checked, it appeared that each inspector could prevent something like $2 million of out-of-tolerance measurements from occurring. This cost saving covered the cost of verification by a ratio of 11:1. 65 % of the out-of-tolerance measurements were shortmeasure, 35 % were over-measure and the total value of measurements made by these instruments was 40 % of Canada's GNP.

    NIST had looked into sectoral studies such as measurement needs in a deregulated utility market.

    Mr. Birch said that three recent studies should also be mentioned:

    The KPMG study on the Institute for National Measurement Standards in Canada: based on the evaluation of needs arising from the application of ISO 9000 certification and from laboratory accreditation activities, although its methodology is probably not applicable to legal metrology.

    - KPMG also conducted a study for the CIPM on the Mutual Recognition Arrangement, and the savings that could be expected. Members were asked about the costs of maintaining bilateral agreements with other countries compared to the probable costs of maintaining a multilateral agreement. The conclusion was an estimated average saving of $2 million per country, though this evaluation was probably overestimated. Another approach had been to consider the total trade between the countries of the Metre Convention, which was $4 trillion. If the MRA was to have an impact on only 0.1 % of this trade, that would be a saving of $4 billion per year.

    A series of studies was carried out for the European Measurement Project. These studies evaluated the impact of metrology through the number of patents dealing with metrology or measurements, though this criterion did not seem appropriate.

    Mr. Birch expressed his need for feedback from OIML Member States and Corresponding Members on this interim report, notably concerning which particular questions should be answered, which type of economic analysis they believed was necessary to explain the stakes of legal metrology to their Governments, and which areas particularly needed to be supported.

    The progress report submitted to the BIML listed the bibliography and a summary of the papers, highlighting the key elements in those particular papers. This progress report will be made available to all Member States and Corresponding Members.

    Mr. Faber emphasized the importance of this work for each Member as well as for the OIML itself and mentioned that this report would be one of the basic documents on which the Organization would conduct its reflection for the future.

- number: '10.4'
  title: Preliminary examination of the output of the Seminar Legal Metrology in 2020
  narrative: |2+

    Mr. Faber expressed the sentiment that this Seminar had been a successful "experiment", and had been very positive. A large number of different ideas had been put forward covering many

    aspects of legal metrology. The possibility should be considered of holding such a Seminar not necessarily every year, but once every three to five years, to see how the various themes evolved.

    At the end of the two days Bernard Athané had drawn a number of conclusions, however it had not been possible to draw all the conclusions at the time of the event, since to do a good job required adequate time for analysis; to this end it was decided that the Bureau would compile a short summary of the outcomes, then the proceedings would be published and distributed - this would allow deeper reflection as to all the possible conclusions.

    Mr. Ehrlich considered that it was a very successful Seminar in which many ideas had been put forward, and it was very interesting to see that most of the presentations went in the same direction. The OIML could now draw on those to shape the future.

    Mr. Carstens proposed to send out an evaluation form to all the attendees, in order to obtain some feedback.

    Mr. Vaucher supported the idea of repeating such a Seminar in due course, but focusing on specific issues and inviting some keynote speakers to introduce specific items.

- number: '11'
  title: Report on the Development Council - Please see separate minutes
  narrative: "\n"
- number: '11.1'
  title: Presentation of World Bank programs
  narrative: |2+

    Mr. Magaña reported that unfortunately Mr. Wilson of the World Bank, who had intended to come to this meeting, had been unable to attend at the last minute. He said that the BIML would continue its contacts with the World Bank and would ensure that all information which may be of interest to CIML Members concerning World Bank activities would be circulated, perhaps via the OIML Bulletin and/or web site.

    Mrs. Annabi asked whether it would be possible to arrange a visit to the World Bank, as had been previously envisaged, since the World Bank had been unable to come to this meeting. This would enable the OIML and its Development Council to be presented, as well as the possibilities for future developments. Mr. Magaña said that he had intended to discuss this under item 12 of the agenda. It had been proposed to hold an awareness seminar at the World Bank, but it had now been decided to hold this in conjunction with other international organizations working in fields related to that of the OIML (such as BIPM, ILAC, ISO, IEC). This would ensure that this action had a greater impact.

- number: '11.2'
  title: Activities of the Development Council, action plan and possible evolutions
    of its structures
  narrative: |2+

    Mr. Faber reported that following the last Development Council meeting in Moscow, he had decided to establish a small "Task Group" for developing country matters, with a double mission: to speed up the work and to make it more transparent, and secondly to examine the structure of the Development Council and to make proposals for restructuring it to the Conference in 2004. He then asked Mrs. Annabi to give a report on the Development Council meeting which had taken place on 1 October 2002.

    She reported that the members of the Task Group referred to by Mr. Faber had been selected for their experience in assistance to developing countries as well as their geographical distribution. She also recognized the hard work on the part of the current Development Council working groups, which would continue to operate in close cooperation with the Task Group.

    Mr. Dunmill then reported that the recommendations resulting from the first meeting of the Task Group had been approved by the Development Council, which in turn requested the CIML to approve these recommendations:

    The BIML shall develop the Task Group's proposals into an action plan containing concrete, timed actions for the coming year;

    The BIML shall make proposals for changes to the existing structure of the Development Council. These would be considered at the next meeting of the Task Group, and any decisions concerning the structure could then be taken at the next Conference in 2004; and

    In order to deal efficiently with these proposals, the Task Group proposes to meet again in around six months' time.

    Mr. Johnston commented that he understood the need for decisions concerning changes to the structure of the Development Council to be made by the Conference in 2004, but he felt that this was rather a long time away, and asked if there were any other means by which actions could be started much more quickly. Mr. Magaña replied that there was no intention of waiting until the Conference to begin positive actions. The Task Group had begun to discuss actions which could be put in place, and it was intended that it should propose elements for the updated OIML Action Plan to the Presidential Council meeting in February 2003. There would therefore be items to discuss and report on at the next CIML Meeting in November 2003.

    Mr. Boudissa thanked the President for his invitation to be a member of this Task Group, whose meeting he had unfortunately not been able to attend on this occasion due to other commitments. He confirmed that he was still dedicated to involvement in the work of the Group and would contribute actively in the future.

    Mr. Ngatia, whilst recognizing that the OIML currently undertook work in the interests of developing countries, expressed his concern at the long timescale being proposed for actions by the Task Group. Mr. Dunmill replied that it was perhaps misleading to refer to the date of the Conference in 2004. He clarified that although any final decision concerning the structure of the Development Council could only be taken by the Conference in 2004, this was not to say that there would be no actions undertaken by the Task Group before then. As many actions as possible would be included in the OIML Action Plan for the coming year. He explained that representatives attending the Task Group meeting had been asked to bring with them proposals for short term actions. These had been discussed and it was intended, for example to hold seminars in some parts of the world in 2003. Mr. Faber confirmed this, saying that as far as he was concerned, establishing and implementing the Action Plan was more important than the structure and he would ensure progress was made with the work as soon as possible.

    Mrs. Annabi reminded the meeting that although the Task Group had been kept small in order to work more efficiently, it was always open to proposals for actions from any country.

    Mr. Yankine asked whether contacts with individual states or organizations were planned, in order to raise the awareness of metrology and to assist in determining the needs of developing countries. Mr. Magaña replied that the Task Group had identified the importance to developing countries of the presentation of metrology to various development aid organizations and the need for the OIML to work in close cooperation with RLMOs. These concepts would be taken into account in the Action Plan. He reminded delegates that it was not the Task Group itself that would make these contacts, since it was only intended to consider and recommend actions. Contacts would therefore be made by those having an official status within the OIML (the BIML, the Development Council Chairperson, the OIML President or Vice-Presidents). The Task Group could, of course, invite anyone from these organizations to its meetings, if this was considered appropriate.

    Mr. Pulham said that some while ago the BIML had established a list of experts who may be available to assist in development projects, and that it would perhaps be a good idea if this list was updated. Mr. Magaña added that this list of experts recommended by CIML Members was available through the Development Council pages of the OIML web site, where there was also a list of available training courses. He agreed that these lists were now out of date, but indicated that developments in the OIML web site technology would in the not too distant future enable CIML Members to directly update the information they had provided and to add new experts and training courses.

    Mr. Magaña concluded this item of the agenda by reporting that Mrs. Annabi had been re-elected as the Chairperson of the Development Council for the period 2002-2004. Mr. Faber congratulated Mrs. Annabi on her re-appointment, saying that he believed, following the reports which had just been made, that the CIML had high expectations for the efficiency and effectiveness of the Development Council, reflecting the importance of her job as Chairperson.

- number: '12'
  title: Liaisons with International and Regional Institutions
  narrative: "\n"
- number: '12.1'
  title: Regional Legal Metrology Organizations (RLMOs)
  narrative: |2+

    Mr. Magaña presented the status of work on relations with the RLMOs. At the last Committee Meeting, the Bureau had been asked to come up with a policy paper on this subject and had drawn up a first draft which was examined by the Presidential Council. A number of comments and amendments had to be taken into account and a second draft would be presented to the Presidential Council at its meeting in February 2003, with a view to distributing it to CIML Members for adoption at the 38th CIML Meeting in 2003. The RLMOs would also be formally consulted on this policy paper.

- number: '12.2'
  title: Other institutions (Metre Convention, ILAC, ISO, WTO, etc.)
  narrative: |2+

    Mr. Faber informed the CIML of ongoing cooperation with the Metre Convention and ILAC. The annual meeting with these two organizations had been held on 27 February 2002 at the BIPM and the OIML delegation was composed of Mr. Faber, Mr. Kochsiek, Mr. Issaev, Mr. Ehrlich and Mr. Magaña. Representing ILAC were Mr. Peet and Mr. Squirrel, and from the Metre Convention Mr. Kovalevsky, Mr. Moscati, Mr. Van Koughnett, Mr. Kaarls, Mr. Quinn and Mr. Wallard.

    Mr. Faber presented the report of this meeting, which is reproduced as an Annex to the present Minutes. He emphasized the fact that participating in joint working groups was essential, but that doing so must not result in unacceptable delays in the OIML's work programs.

    Concerning relations with the WTO, Mr. Magaña reported that the Bureau had Observer Status in the TBT Committee, and was hence in frequent contact with this Organization. As Mrs. Liu explained in her presentation, the WTO intended to help the OIML in its actions towards developing countries, and in particular two Regional seminars on enhancing the participation of developing countries in the OIML's work could be organized in 2003.

    Mr. Dunmill reported on ISO DEVCO. For the last two years it had not been possible to be directly represented at ISO DEVCO meetings, because the dates had coincided with the CIML Meetings. The Bureau had had a number of contacts with ISO DEVCO, and it appeared that the latter had a similar problem to the OIML in that they were currently reexamining the way in which they conduct developing country work.

    Mr. Magaña reported that in line with the decisions of the 36th CIML Meeting in Moscow the Bureau had drawn up a first draft policy paper on the OIML's relations with other organizations. This first draft had been examined by the Presidential Council in February 2002 and a number of modifications made - resulting in a second draft policy paper, which would be submitted to the Presidential Council in February 2003 with a view to its adoption by the CIML at its 38th Meeting in 2003.

    Mr. Kildal asked whether the minutes of the OIML/BIPM/ILAC meeting were available, to which Mr. Magaña replied that they would be distributed (see the Annex to the present Minutes).

- number: '12.3'
  title: Information on legal metrology developments in the Regions
  narrative: |2+

    Mr. Singyangwe presented activities in Botswana. There had been a workshop under the auspices of the German Technical Cooperation, attended by representatives from SADC SQAM structures. This workshop reviewed PTB support to SADC SQAM structures. The representatives of SADCSTAN, SADCMET, SADCA and SADCMEL requested new additional resource funding for the next four years, and the SADC Secretariat would meet with the German Ministry of Technical Cooperation to consider this request.

    ## WELMEC

    Mr. Freistetter, WELMEC Chairman, reported on WELMEC activities. Up to 2001, WELMEC developed Guides for the implementation of the European Directive on Nonautomatic Weighing Instruments, and had set up a database of European type approval certificates of NAWIs. A WELMEC type approval agreement had been signed for categories of instruments which were not yet harmonized by a European Directive. This type approval agreement was based on the OIML Certificate System: when both an OIML certificate and a national type approval were issued, other WELMEC members should issue a national type approval without repeating the tests and examinations included in the OIML test report.

    During the last year, WELMEC WG 8, chaired by Gérard Lagauterie, had carried out a lot of work related to the Measuring Instruments Directive (MID) under preparation in order to develop technical requirements in line with OIML Recommendations. Guides were amended, especially for software in metrology, weighing instruments and prepackages. WELMEC was also considering strategic issues, organizational changes, future objectives and tasks. More information is available in the October 2002 OIML Bulletin and on the WELMEC web site (www.welmec.org).

    He explained that the MID was a very complex document consisting of over 100 pages of regulations. The basic ideas were the following. The document officially available was a draft Directive, already two years old and which had since evolved. A decision should be taken in 2003, and after a transition period of two years the MID could come into force by 2005 or 2006. Ten different categories were mentioned in the MID: water meters, gas meters, electricity meters, heat meters, measuring systems for liquids other than water, automatic weighing instruments, taximeters, material measures, length measuring instruments and exhaust gas analyzers; other categories were not covered by the MID.

    The scope of the MID was to harmonize the placing on the market and implementation of these instruments. After the latter, national laws were applicable. The MID was optional: each Member State could decide whether each category would be submitted to legal control or not. If it was

    decided to submit a category to legal control, this control (up to the putting into use), had to conform to the Directive. The requirements were divided into two types: essential requirements applicable to all categories of instruments covered by the Directive, and instrument-specific requirements for each category.

    Conformity assessment procedures were also described in the Directive, he continued, and it was possible for manufacturers to show conformity in two different ways: either by reference to harmonized standards developed by European standardization bodies on a mandate of the European Commission, or by reference to OIML Recommendations whose appropriateness was to be decided on by a Measuring Instruments Committee set up in application of the Directive. The OIML had no specific tasks in this project, but its Recommendations were recognized so long as they satisfied the requirements. The two main issues for the legal metrology systems which resulted from the MID were quality at the level of the manufacturers, and market surveillance in the Member States. This resulted in a shift from verification to surveillance.

    Mr. Vinet asked for clarification concerning the decision about the way of deciding acceptability of CEN/CENELEC standards versus OIML Recommendations. Mr. Freistetter explained that it was foreseen that the Measuring Instruments Committee, installed by the Directive and composed of EU Member State experts, would have to evaluate both kinds of documents to ascertain their conformity to the essential requirements of the Directive.

    The Vietnamese Delegate asked for information about the European Directives on prepackages. Were they new approach Directives?

    Mr. Freistetter replied that there was a program called "SLIM", a part of which the European regulation on prepackages was being replaced by a new Directive. Information may be requested to the convenor of WELMEC WG 6, whose address was available on the WELMEC web site.

    Mr. Issaev asked for clarification as to what was meant by "the change from verification to surveillance". Mr. Freistetter explained that the new approach Directives were fundamentally based on the declaration of conformity by the manufacturer and on the manufacturer's responsibility. The systematic verification of instruments by legal authorities gave way to an a posteriori control exerted by the surveillance of manufacturers' obligations, surveillance of the notified bodies and "market surveillance" of the products.

    Answering a question from Mr. Pakay about the MID, Mr. Freistetter gave the example of water meters. He explained that this category of instruments was subject to legal control in some European countries but not in all of them. And the decision to submit water meters to legal control in a country depended on the priorities that were adopted in that country. Therefore the MID did not intend to force all countries to submit water meters to legal control, and this decision remained a national one. But when a country did decide to submit them, the requirements must be those of the MID.

    Mr. Tanaka asked if the MID might not result in differing interpretations of the technical requirements among EU countries. Mr. Freistetter answered that one of the essential tasks of WELMEC had been to solve interpretation differences and to come to a better common understanding of the essential requirements and procedures.

    Mrs. Bennett asked if the Measuring Instruments Committee would be looking at OIML test reports from notified bodies within the EU or within WELMEC, or whether it would be considering test reports from third countries. Mr. Freistetter replied that the Committee would not look at test reports, but only at OIML Recommendations, in order to decide which Recommendations contained requirements that may be considered as giving a presumption of conformity to a part of or all of the requirements that the MID assigned to a category of instruments.

    ## APLMF

    Mr. Ooiwa, APLMF President, reported on the APLMF's activities. He commented that the APLMF had 26 Members including 19 full Members and 7 corresponding Members, all under the APEC framework. Recent developments included those itemized below.

    Eight meetings of APLMF working groups had been organized in November 2001 in Auckland, New Zealand, with a total of 76 delegates and observers from 19 APLMF economies. The Secretariat had been taken over by Japan, together with the new Presidency.

    The APLMF was in particular developing an important project on rice moisture meters. The first and second phases of this project were funded by APEC. The first phase was carried out in October 2001 in Japan with the participation of seven economies and the second from 19 to 30 August 2002 in Thailand, with 26 participants from 9 economies. The next phase would be the results of a survey and training, and would lead to a proposal to revise the OIML Recommendation on water content in grain so as to introduce an article covering rice moisture meters.

    In particular, the activities on training had included a train-the-trainer course on NAWIs in Hanoi, Vietnam in April 2002, with 22 participants from four APLMF economies. This was funded by the Australian Government.

    Another APLMF project was a symposium on traceability in legal metrology. A proposal for funding this project had been submitted to APEC and accepted at the latter's budget management committee. This symposium would be held in October 2003 in Kyoto in conjunction with the next APLMF meeting. Further information was available on the APLMF web site (www.aplmf.org).

    ## SADCMEL

    Mr. Carstens reported on SADCMEL activities from October 2001 to October 2002. SADCMEL was currently chaired by Mr. Zulu (Zambia) and South Africa handled the Secretariat. The following technical committees were established:

    TC1 Sale of goods, chaired by South Africa,

    TC2 Instruments, chaired by Zambia,

    TC3 Rules of procedures, chaired by Zambia, and

    TC4 Training, chaired by Botswana.

    The following meetings were held, together with TC meetings:

    Pretoria, South Africa, November 2001, and

    Mahé, Seychelles, April 2002.

    TC1: A SADCMEL document dealing with harmonized requirements for prepackages was distributed to industry for comments. These comments would be discussed at the next meeting in November.

    TC2: The Committee would discuss the document on the requirements of beam scales. This document would be distributed to industry for comments.

    TC4: A document on the training requirements in legal metrology for the Region was being completed. Once adopted by Members, a train-the-trainer course would be developed.

    A workshop on the organization of legal metrology legislation was presented by Mr. Birch in Pretoria, attended by all Member Countries.

    He explained that SADCMEL was participating in the development of a technical regulation framework for the Region, within the SQAM structure.

    ## EMLMF

    Mr. Lagauterie informed the CIML of developments within the EMLMF, saying that a meeting had been held on Saturday 28 September at which the EMLMF's status had changed from being simply a project to an official RMLO, the Memorandum of Understanding having been signed by ten countries. During this meeting Mr. Lagauterie had been elected as chairman for one year.

    The first outcome of the EMLMF's work concerned training proposals. Proposals had been received from the PTB and from four other bodies: DAM (Germany), METAS (Switzerland), LNE (France) and AFNOR (France). Financing had to be found for these four proposals, though this matter would probably be facilitated by the establishment of the formal MoU.

- number: '13'
  title: Election of the CIML President, 2003
  narrative: |2+

    Mr. Faber gave information concerning the election of the CIML President which would take place in Kyoto in November 2003. He was eager to provide information as early as possible as this was a key event in the life of the Organization, together with the fact that a number of new CIML Members were present and the procedure should be clear and transparent for everybody.

    The last election took place in London in 2000; Mr. Faber was re-elected for a second term of office, but at that time he expressed his wish to limit his term to three years. Hence, in 2003 a new election would take place.

    Initially, the deadline for the submission of candidacies was set at the end of August 2002. Currently, only one candidate had made known his intention to be considered: Mr. Charles Ehrlich (USA).

    Mr. Faber went on to say that it was essential that the future CIML President be a well-known, experienced figure who had already been a CIML Member for some time. And the new President should be prepared to carry out his duties for a full six-year term. He felt confident that Mr. Ehrlich met all these criteria.

    On the other hand, and contrary to the election of a new BIML Director, he felt it was more appropriate that there be more than one candidate for President; this way the CIML Members had a choice and would first be able to listen to each candidate's presentation immediately prior to the actual election in order to get a feel for proposed future strategy for the Organization.

    After discussing the matter with the Presidential Council, Mr. Faber had concluded that it was not clear to all Members that 31 August 2002 was the deadline for candidacies. He therefore proposed that the deadline be extended to 31 January 2003, and reminded Delegates that the ballot would be secret - even if there was still only one candidate. Additionally, and as for all decisions made by the Committee, the 4/5 (80 %) majority of votes rule would apply as specifically stipulated in the Convention (the only exception to this 4/5 rule being the approval and adoption of International Documents, for which a simple majority was required as this type of publication was really only a transfer of information).

    Mr. Faber went on to explain that the two Vice-Presidents Mr. Kochsiek and Mr. Issaev were both close to retirement and did therefore not intend to stand for Presidency. As far as Mr. Faber himself was concerned, the reason why he had stipulated that he was only prepared to continue as CIML President for three years was that he felt that a number of projects were ongoing in the OIML and he wanted to see them through; he now felt that this had been accomplished and confirmed that the time was right to move on and that the CIML should proceed with the selection of a new President. He would only continue in an absolute "emergency" situation.

    No questions were posed on this item and the new deadline of 31 January 2003 was approved by the Committee.

- number: '14'
  title: Future meetings
  narrative: "\n"
- number: '14.1'
  title: 38th CIML Meeting (2003)
  narrative: |2+

    Mr. Faber reminded Delegates that a provisional decision had been taken in Moscow to hold the 38th CIML Meeting in Kyoto, Japan. Mr. Tanaka then gave an illustrated presentation on initial plans that had already been made by the Ministry of Economy, Trade and Industry (METI) and the National Metrology Institute of Japan (NMIJ) to host this meeting and also a meeting of the APLMF, and formally confirmed his country's invitation. He was particularly pleased to welcome the OIML to Japan as 2003 would be the centenary anniversary of the NMIJ, and went on to outline a brief history of the Institute and of Kyoto itself, the former capital of Japan situated about 300 km from Tokyo.

    The dates provisionally booked for the APLMF meeting were 2-4 November 2003 and the CIML would meet from 4-8 November. The venue would be the KICH: Kyoto International Conference Hall, set in the attractive surroundings of a typical Japanese garden.

