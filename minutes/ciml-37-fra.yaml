- number: '4'
  title: 1 Nouveaux Membres - Adhésions attendues
  narrative: |2+

    M. Magaña a informé les Participants des développements suivants au niveau de l'appartenance à l'OIML:

    - L'Albanie a récemment accédé au statut d'État Membre, après avoir été auparavant Membre Correspondant. Ceci a amené le nombre total d'États Membres à 58. M. Faber a accueilli chaleureusement ce nouveau membre, et en retour la Délégation albanaise a exprimé sa satisfaction d'être devenue un Membre à part entière et s'est engagée à remplir ses obligations à ce titre, y compris le fait de s'efforcer d'adapter ses lois nationales aux exigences de l'OIML.

    M. Magaña a annoncé que la Nouvelle Zélande et le Vietnam envisageaient de devenir des États Membres, alors qu'ils étaient eux aussi Membres Correspondants. La Délégation vietnamienne a parlé de son engagement à devenir un État Membre, et de sa satisfaction d'avoir été invité à participer au "Task Group" récemment constitué. Le Vietnam était devenu Membre Correspondant en 1994 et est actuellement membre de 19 organisations nationales et internationales. M. Faber a répondu que les portes de l'OIML étaient grandes ouvertes et que celle-ci était prête à accueillir ce pays en tant qu'État Membre quand celui-ci serait prêt.

    - Les Philippines ont récemment demandé à être radié de la liste des Membres Correspondants, étant donné certaines difficultés financières.

    M. Grkov a soulinné des développements récents dans le domaine de la métrologie légale en Macédoine et a affirmé que son pays continuait à moderniser son infrastructure légale afin de mieux prendre en compte les exigences métrologiques de l'OIML.

- number: '5'
  title: 1 Adoption du rapport de l'expert comptable pour 2001
  narrative: |2+

    M. Faber a introduit ce point en rappelant aux Participants que le rapport financier et d'autres documents ont été distribués en mars 2002 et qu'aucun commentaire n'a été reçu par le Bureau.

    Les Délégués n'ont fait aucun commentaire, et le rapport de l'expert comptable pour 2001 a été adopté.

- number: '7'
  title: 1 Modification des Statuts du Personnel
  narrative: |2+

    M. Faber a expliqué qu'il était nécessaire de temps en temps de mettre à jour et de moderniser les Statuts du Personnel du BIML. M. Magaña avait discuté de ce document avec les membres du Personnel et rédigé des projets de propositions pour modifier certaines parties du texte; il avait ensuite présenté ces projets au Président et au Conseil de la Présidence avant de les soumettre au CIML.

    M. Magaña a présenté les détails suivants:

    - Le document était devenu obsolète et avait besoin d'être modernisé en raison de changements de méthodes de travail;

    - Les Annexes n'avaient pas encore été réévaluées;

    - Seul un nombre limité de commentaires avaient été reçus de la part des Membres du CIML pendant le vote par correspondance; ceux-ci seraient pris en compte et une révision finale serait soumise au vote des Membres en mars ou avril 2003 afin que les Statuts révisés soient formellement adoptés lors de la 38ème Réunion du CIML;

    Les échelles de salaires n'avaient pas encore été révisées. M. Magaña a expliqué que les échelles étaient actuellement exprimées en Francs Or indexés; il était envisagé de réfléchir à l'intérêt de maintenir à la fois ce système et aussi les classifications d'échelles lors de la réunion du Conseil de la Présidence en février 2003, dans la mesure où certaines échelles étaient devenues redondantes et d'autres manquaient du fait de changements dans la structure du personnel du BIML. M. Magaña était en possession de quelques échelles de salaires d'autres organisations et était en train d'essayer d'harmoniser la classification du BIML avec celles d'autres organisations similaires. Il a fait remarquer que cela ne résultait pas en une augmentation du budget.

    Les Délégués n'ont fait aucun commentaire.

