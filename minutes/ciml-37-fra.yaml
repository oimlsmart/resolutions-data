      M. Magaña a présenté l'état du travail sur les relations avec les RLMO. A la dernière Réunion du Comité, il avait été demandé au Bureau de mettre au point un document de politique générale sur ce sujet et il en était résulté un premier projet qui avait été examiné par le Conseil de la Présidence. Plusieurs commentaires et amendements avaient été pris en compte et un second projet serait présenté au Conseil de la Présidence à sa réunion en février 2003, en vue de le distribuer aux Membres du CIML pour approbation à la 38ème Réunion du CIML en 2003. Les RLMO seraient aussi formellement consultées sur ce document de politique générale.

- number: '12.2'
  title:
  - spelling: eng
    value: Autres institutions (Convention du Mètre, ILAC, ISO, OMC, etc.)
  narrative:
  - spelling: eng
    value: |2+

      M. Faber informé le CIML de la coopération en cours avec la Convention du Mètre et ILAC. La réunion annuelle avec ces deux organisations avait été tenue le 27 février 2002 au BIPM et la délegation de l'OIML était composée de M. Faber, M. Kochsiek, M. Issaev, M. Ehrlich et M. Magaña. Les Représentants d'ILAC étaient M. Peet et M. Squirrel, et ceux de la Convention du Mètre, M. Kovalevsky, M. Moscati, M. Van Koughnett, M. Kaarls, M. Quinn et M. Wallard.

      M. Faber a présenté le rapport de cette réunion, qui est reproduit en Annexe au présent compte rendu. Il a soulinné le fait que la participation dans les groupes de travail communs était essentielle, mais que ce faisant, cela ne devait pas aboutir à des retards inacceptables dans les programmes de travail de l'OIML.

      Concernant les relations avec l'OMC, M. Magaña a rapporté que le Bureau avait le statut d'observateur dans le Comité TBT, et avait donc de fréquents contacts avec cette Organisation. Comme Mme. Liu I'a expliqué dans sa présentation, l'OMC prévoyait d'aider l'OIML dans ses actions en faveur des pays en développement, et en particulier deux séminaires Régionaux sur l'accroissement de la participation des pays en développement dans le travail de l'OIML pourraient être organisés en 2003.

      M. Dunmill a fait un rapport sur ISO DEVCO. Pour les deux dernières années, il n'avait pas été possible d'être représenté directement aux réunions de ISO DEVCO, car les dates coïncidaient avec les Réunions du CIML. Le Bureau avait eu plusieurs contacts avec ISO DEVCO, et il apparaissait que ce dernier avait un problème similaire à celui de l'OIML dans la mesure où ils étaient actuellement en train de réexaminer la façon dont ils menaient le travail lié aux pays en développement.

      M. Magaña a rapporté que conformément aux décisions de la 36ème Réunion du CIML à Moscou, le Bureau avait établi un premier projet de document de politique générale sur les relations de l'OIML avec d'autres organisations. Ce premier projet avait été examiné par le Conseil de la Présidence en février 2002 et un certain nombre de modifications faites ont abouti à un second projet de document de politique générale, qui serait soumis au Conseil de la Présidence en février 2003 en vue de son approbation par le CIML à sa 38ème Réunion en 2003.

      M. Kildal a demandé si le compte-rendu de la réunion OIML/BIPM/ILAC était disponible, ce à quoi M. Magaña a répondu qu'il serait distribué (voir annexe au compte-rendu actuel).

- number: '12.3'
  title:
  - spelling: eng
    value: Information sur les développements en métrologie légale dans les Régions
  narrative:
  - spelling: eng
    value: |2+

      M. Singyangwe a présenté les activités au Botswana. Il y avait eu un atelier sous les auspices de la Coopération Technique Allemande, auquel avaient assisté des représentants des structures de SADC SQAM. Cet atelier révisait le soutien du PTB aux structures SADC SQAM. Les représentants de SADCSTAN, SADCMET, SADCA et SADCMEL ont demandé de nouvelles ressources supplémentaires de financement pour les quatre prochaines années, et le Secrétariat du SADC aura une entrevue avec le Ministère Allemand de la Coopération Technique pour l'examen de cette requête.

      ## WELMEC

      M. Freistetter, Président de WELMEC, a fait un rapport sur les activités de WELMEC. Jusqu'à 2001, WELMEC développait des Guides de mise en oeuvre de la Directive Européenne sur les instruments de pesage à fonctionnement non automatique, et avait établi une base de données des certificats Européens d'approbation de type de NAWI. Un accord WELMEC d'approbation de type avait été signé pour des catégories d'instruments qui n'étaient pas encore harmonisées par une Directive Européenne. Cet accord d'approbation de type était basé sur le Système de Certificats OIML: quand un certificat OIML et une approbation de type nationale étaient émis pour un instrument, les autres membres WELMEC devaient délivrer une approbation de type nationale sans répéter les essais et examens inclus dans le rapport d'essai OIML.

      Pendant l'année passée, WELMEC WG 8, présidé par Gérard Lagauterie, avait effectué beaucoup de travail lié à la Directive sur les Instruments de Mesure (MID) en préparation afin de développer des exigences techniques en ligne avec les Recommandations OIML. Les guides ont été amendés, surtout pour les logiciels en métrologie, les instruments de pesage et les préemballages. WELMEC abordait aussi des problèmes stratégiques, des changements organisationnels, des tâches et objectifs futurs. De plus amples informations sont disponibles dans l'édition d'octobre 2002 du Bulletin OIML et sur le site Internet de WELMEC (www.welmec.org).

      Il a expliqué que la MID était un document très complexe comportant plus de 100 pages de réglementations. Les idées principales étaient les suivantes. Le document officiellement disponible était un projet de Directive, vieux de deux ans déjà et qui avait depuis évolué. Une décision devrait être prise en 2003, et après une période de transition de deux ans, la MID pourrait entrer en vigueur d'ici 2005 ou 2006. Dix catégories différentes étaient mentionnées dans la MID: les compteurs d'eau, les compteurs à gaz, les compteurs d'électricité, les compteurs thermiques, les systèmes de mesurage pour liquides autres que l'eau, les instruments de pesage à fonctionnement automatique, les taximètres, les mesures matériallisées, les instruments de mesure de la longueur et les analyseurs de gaz d'échappement; les autres catégories n'étaient pas couvertes par la MID.

      L'objectif de la MID est d'harmoniser le placement sur le marché et la mise en oeuvre de ces instruments. Après l'entrée en vigueur de la MID, viendra l'application des lois nationales. La MID était optionnelle: chaque Etat Membre pourrait décider si chaque catégorie serait soumise ou non au contrôle légal. S'il était décidé de soumettre une catégorie au contrôle légal, ce contrôle

      (jusqu'à la mise en service) devrait être conforme à la Directive. Les exigences étaient réparties en deux types: les exigences essentielles applicables à toutes les catégories d'instruments couvertes par la Directive, et les exigences spécifiques à l'instrument pour chaque catégorie.

      Les procédures d'évaluation de conformité étaient aussi décrites dans la Directive, et il était possible pour des fabricants de prouver la conformité de deux manières différentes: soit par référence aux normes harmonisées élaborées par des organismes de normalisation Européens sur mandat de la Commission Européenne, soit par référence aux Recommandations OIML, la décision revenant à un Comité des Instruments de Mesure créé en application de la Directive. L'OIML n'avait pas de tâches spécifiques dans le cadre de ce projet, mais ses Recommandations étaient reconnues tant qu'elles remplissaient les critères. Les deux problèmes majeurs pour les systèmes de métrologie légale, qui résultaient de la MID, étaient la qualité au niveau des fabricants, et la surveillance du marché dans les Etats Membres. Cela aboutissait à un glissement de la vérification vers la surveillance.

      M. Vinet a demandé une clarification concernant la façon dont serait prise la décision relative au choix entre les normes CEN/CENELEC et les Recommandations OIML comme références. M. Freistetter a expliqué qu'il était prévu que le Comité des Instruments de Mesure créé en application de la Directive et composé d'experts des Etats Membres de l'Union Européenne, devrait évaluer les deux sortes de documents pour s'assurer de leur conformité avec les exigences essentielles de la Directive.

      Le Délégué du Vietnam a demandé des informations à propos des Directives Européennes sur les préemballages. Existait-il des Directives avec une nouvelle approche?

      M. Freistetter a répondu qu'il y avait un programme appelé "SLIM", dont fait partie la réglementation Européenne sur les préemballages qui a été remplacée par une nouvelle Directive. Les informations pouvaient être demandées au président de WELMEC WG 6, dont l'adresse est disponible sur le site Internet de WELMEC.

      M. Issaev a demandé une clarification sur ce que signifiait "le glissement de la vérification vers la surveillance". M. Freistetter a expliqué que les Directives à nouvelle approche étaient fondamentalement basées sur la déclaration de conformité par le fabricant et sur la responsabilité du fabricant. La vérification systématique des instruments par les autorités légales ouvrait la voie à un contrôle à posteriori exercé par la surveillance des obligations du fabricant, la surveillance des organismes notifiés et la "surveillance de marché" des produits.

      Répondant à une question de M. Pakay sur la MID, M. Freistetter a donné l'exemple des compteurs d'eau. Il a expliqué que cette catégorie d'instruments était soumise au contrôle légal dans certains pays européens mais pas dans tous. Et la décision de soumettre les compteurs d'eau au contrôle légal dans un pays dépendait des priorités qui étaient adoptées dans ce pays. Par conséquent, la MID n'était pas destinée à forcer tous les pays à soumettre les compteurs d'eau au contrôle légal, et cette décision était d'ordre national. Mais quand un pays décidait de les y soumettre, les exigences devaient être celles de la MID.

      M. Tanaka a demandé si la MID ne pourrait pas donner lieu à différentes interprétations des exigences techniques parmi les pays de l'Union Européenne. M. Freistetter a répondu qu'une des tâches essentielles de WELMEC avait été de résoudre les problèmes d'interprétation et de parvenir à une meilleure compréhension commune des exigences et procédures essentielles.

      Mme. Bennett a demandé si le Comité des Instruments de Mesure examinerait les rapports d'essai OIML des organismes notifiés dans I'Union Européenne ou dans WELMEC, ou s'il considérait les rapports d'essai des pays tiers. M. Freistetter a répondu que le Comité ne s'occuperait pas des rapports d'essai, mais seulement des Recommandations OIML afin de décider quelles Recommandations contenaient des exigences pouvant être considérées comme donnant une présomption de conformité à tout ou partie des exigences que la MID assignait à une catégorie d'instruments.

      ## APLMF

      M. Ooiwa, Président de APLMF, a fait un rapport sur les activités de APLMF. II a indiqué que I'APLMF comptait 26 Membres dont 19 Membres actifs et 7 Membres correspondants, tous dans la structure de I'APEC. Les développements récents sont détaillés ci-après.

      Huit réunions des groupes de travail de APLMF avaient été organisées en novembre 2001 à Auckland, Nouvelle-Zélande, avec un total de 76 délégués et observateurs issus de 19 entités économiques de APLMF. Le Secrétariat avait été repris par le Japon, ainsi que la nouvelle Présidence.

      L'APLMF était en particulier en train de développer un projet important sur des compteurs d'humidité du riz. Les première et seconde phases de ce projet étaient financées par l'APEC. La première phase avait eu lieu en octobre 2001 au Japon avec la participation de sept entités économiques et la seconde du 19 au 30 août 2002 en Thaïlande, avec 26 participants de 9 entités économiques. La prochaine phase sera concrétisée par les résultats d'un sondage et d'une formation, et conduira à une proposition de révision de la Recommandation OIML sur la teneur en eau dans le grain, de façon à insérer un article réglementaire couvrant les compteurs d'humidité dans le riz.

      En particulier, les activités sur la formation avaient inclus un cours destiné aux formateurs sur NAWI à Hanoi, Vietnam en avril 2002, avec 22 participants de quatre entités économiques de APLMF. Cela avait été financé par le Gouvernement australien.

      Le symposium sur la traçabilité en métrologie légale était un autre projet APLMF. Une proposition pour le financement de ce projet avait été présentée à l'APEC et acceptée lors de son dernier comité de gestion de budget. Ce symposium serait tenu en octobre 2003 à Kyoto conjointement avec la prochaine Réunion APLMF. De plus amples informations sont disponibles sur le site Internet d'APLMF (www.aplmf.org).

      ## SADCMEL

      M. Carstens a fait un rapport sur les activités de SADCMEL d'octobre 2001 à octobre 2002. SADCMEL était actuellement présidé par M. Zulu (Zambie) et le Secrétariat était tenu par l'Afrique du Sud. Les comités techniques suivants ont été créés:

      TC1 Vente de marchandises, présidé par l'Afrique du Sud,

      TC2 Instruments, présidé par la Zambie,

      TC3 Règles de procédures, présidé par la Zambie, et

      TC4 Formation, présidé par le Botswana.

      Les réunions suivantes ont été tenues, avec les réunions de TC:

      Pretoria, Afrique du Sud, en novembre 2001, et

      Mahé, Seychelles, en avril 2002.

      TC1: Un document SADCMEL traitant des exigences harmonisées pour les préemballages avait été distribué à l'industrie pour commentaires. Ces commentaires seraient discutés à la prochaine réunion en novembre.

      TC2: Le Comité discuterait le document sur les exigences des balances à fléau. Ce document serait distribué à l'industrie pour commentaires.

      TC4: Un document sur les exigences de formation en métrologie légale pour la Région serait bientôt terminé. Une fois approuvé par les Membres, un cours destiné aux formateurs se-

      rait élaboré. Un atelier sur l'organisation de la législation en métrologie légale avait été présenté par M. Birch à Pretoria, et avait réuni tous les Pays Membres.

      II a expliqué que SADCMEL participait au développement d'une structure technique de réglementation pour la Région, au sein de SQAM.

      ## EMLMF

      M. Lagauterie a informé le CIML sur les développements au sein de EMLMF, en disant qu'une réunion avait été tenue le samedi 28 septembre au cours de laquelle le statut de EMLMF avait changé pour devenir officiellement une RMLO au lieu d'un simple projet, le protocole d'Entente ayant été signé par dix pays. Pendant cette réunion M. Lagauterie a été élu comme président pour une année.

      Le premier résultat du travail de EMLMF concernait les propositions de formation. Des propositions avaient été reçues du PTB et de quatre autres organismes: DAM (Allemagne), METAS (Suisse), LNE (France) et AFNOR (France). Le financement devait encore être trouvé pour ces quatre propositions, mais le traitement de cette question serait probablement facilité par la création du MoU officiel.

- number: '13'
  title:
  - spelling: eng
    value: Election du Président du CIML, 2003
  narrative:
  - spelling: eng
    value: |2+

      M. Faber a donné une information concernant l'élection du Président du CIML qui aurait lieu à Kyoto en novembre 2003. Il était désireux de fournir cette information le plus tôt possible car c'était un événement clé dans la vie de l'Organisation, et aussi par le fait que plusieurs nouveaux Membres du CIML étaient présents et que la procédure serait ainsi claire et transparente pour tout le monde.

      La dernière élection avait eu lieu à Londres en 2000; M. Faber avait été réélu pour un deuxième mandat, mais il avait alors exprimé son souhait de limiter son mandat à trois années. Par conséquent, une nouvelle élection aurait lieu en 2003.

      Initialement, le délai pour la soumission des candidatures était fixé à la fin août 2002. Actuellement, seulement un candidat s'était manifesté: M. Charles Ehrlich (USA).

      M. Faber a poursuivi en disant qu'il était essentiel que le futur Président du CIML soit une personnalité expérimentée, connue et qui ait déjà été Membre du CIML un certain temps. Le nouveau Président devrait aussi être préparé à remplir ses devoirs pour un mandat complet de six ans. M. Ehrlich semblait satisfaire à tous ces critères.

      Mais contrairement à l'élection d'un nouveau Directeur du BIML, il estimait qu'il était plus approprié que plusieurs candidats à la fonction de Président participent à l'élection de façon que les Membres du CIML aient la possibilité d'écouter la présentation de chaque candidat immédiatement avant l'élection afin d'obtenir un aperçu de la future stratégie proposée pour l'Organisation.

      Après avoir discuté cette question avec le Conseil de la Présidence, M. Faber a conclu qu'il n'était pas clair pour tous les Membres que le 31 août 2002 constituait la date limite pour déposer les candidatures. Il a donc proposé que le délai soit prolongé au 31 janvier 2003, et a rappelé aux Délégués que le scrutin soit à bulletins secrets - même s'il n'y avait encore pour l'instant qu'un candidat. En outre, et comme pour toutes les décisions rendues par le Comité, la règle de la majorité des 4/5 (80 %) des votes s'appliquerait comme stipulé explicitement dans la Convention (la seule exception à cette règle des 4/5 étant l'approbation et l'adoption de Documents Internationaux, pour lesquels une majorité simple était nécessaire car ce type de publication consistait effectivement en un simple transfert d'information).

      M. Faber a poursuivi en expliquant que les deux Vice-présidents M. Kochsiek et M. Issaev étaient tous deux proches de la retraite et n'avaient donc pas l'intention de postuler pour la Présidence. Pour autant que M. Faber lui-même était concerné, la raison pour laquelle il avait précisé qu'il était seulement prêt à continuer comme Président du CIML pendant trois ans jusqu'à aujourd'hui donc, était qu'il avait voulu voir plus clair dans plusieurs projets en cours au sein de I'OIML; c'était maintenant chose faite et il était temps pour lui de partir pour que le CIML procède à la nomination d'un nouveau Président. Il continuerait seulement dans une situation d“urgence” absolue.

      Aucune question n'a été posée sur ce point et la nouvelle date limite du 31 janvier 2003 a été approuvée par le Comité.

