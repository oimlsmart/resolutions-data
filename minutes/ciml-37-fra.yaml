- number: '1'
  title:
  - spelling: eng
    value: Approbation du compte rendu de la 36ème Réunion du CIML
  narrative:
  - spelling: eng
    value: |2+

      Le compte rendu de la 36ème Réunion du CIML (distribué en février 2002) a été approuvé sans modifications. Aucun commentaire n'a été reçu par le BIML.

- number: '2'
  title:
  - spelling: eng
    value: Mise en oeuvre des Décisions et Résolutions de la 11ème Conférence et de
      la 36ème Réunion du CIML
  narrative:
  - spelling: eng
    value: |2+

      M. Faber a expliqué que la plupart des points de ces documents faisaient partie de l'ordre du jour de la présente Réunion du CIML et seraient couverts durant ces quatre jours. De plus, M. Magaña avait dressé un tableau résumant ces décisions avec le numéro sous lequel chaque point serait examiné. Il a donc estimé qu'il n'était pas nécessaire de passer en revue les décisions une par une. Aucun commentaire supplémentaire n'a été émis.

- number: '3'
  title:
  - spelling: eng
    value: Mise en oeuvre du Plan d'Action 1999-2002 + 2003-2004 et derniere extension
      jusqu'à la fin de 2004
  narrative:
  - spelling: eng
    value: |2+

      M. Magaña a rappelé aux Participants qu'une version révisée du Plan d'Action avait été distribuée à peu près une année auparavant en vue de son approbation par le CIML. Il a expliqué qu'un certain nombre d'actions clés avait déjà été menées à terme, et a ensuite souligné les principaux points du Plan:

      Le premier projet de révision des Directives pour les Travaux Techniques de l'OIML. Partie 1 avait été envoyé aux Membres et le BIML avait reçu en retour un certain nombre de commentaires, ce qui serait pris en compte dans le 2ème projet. Une fois les Directives approuvées, le Directeur du BIML a expliqué qu'un petit manuel serait aussi publié et qu'il servirait d'aide mémoire et de guide pratique pour l'application des règles contenues dans les Directives. Ce thème était traité au point A.1.1 du Plan d'Action.

      - Le programme de travail technique de l'OIML était constamment révisé par le Bureau ainsi que par le Conseil de la Présidence; ce point serait examiné plus tard au cours de la Réunion du CIML.

      - Les activités visant à augmenter la participation des États Membres au travail technique étaient également en cours, avec pour résultat que certains TC ou SC précédemment vacants étaient maintenant en activité.

      - Les activités sur les Logiciels (Plan d'Action A.1.5) ne progressaient pas aussi rapidement qu'on l'avait espéré, bien que quelques résultats étaient attendus pour l'année suivante.

      - Concernant le Système de Certificats OIML pour les Instruments de Mesure (Plan d'Action A.2), le projet de révision du document établissant les règles de fonctionnement du Système avait aussi été distribué aux Membres du CIML qui l'avaient approuvé et le document devrait bien-tôt être publié.

      - Des discussions détaillées auraient lieu plus tard dans la semaine sur l'Arrangement de Reconnaissance Mutuelle de l'OIML.

      - Au point B.2 du Plan d'Action, intitulé Favoriser l'accréditation des laboratoires de métrologie légale en vue d'obtenir l'acceptation des résultats d'essais, ce sujet était lié au travail sur le MAA et des propositions avaient aussi été faites au sein du TC 3/SC 5 sur le thème spécifique de l'accréditation. Le travail avançait aussi vite que possible en dépit de certaines difficultés.

      - Au sujet de la promotion du commerce international des produits préemballés selon les exigences de l'OIML (point B.4 du Plan d'Action) M. Magaña a informé les Délégués que la révision de la R 87 Contenu net des préemballages avait débuté et progressait rapidement, et le sujet de la marque OIML pour les préemballages serait traité une fois que cette Recommandation serait terminée.

      - Au sujet du Plan d'Action section C Promotion et développement de la métrologie légale dans les États Membres de l'OIML, le Directeur du BIML a fait remarquer que l'étude de M. Birch progressait et que M. Birch en donnerait un rapport plus détaillé durant cette réunion. Des documents d'une nature plus générale pourraient ensuite être rédigés et publiés pour expliquer l'importance de la métrologie légale à une audience plus large.

      - Au point D du Plan d'Action Améliorations structureles, le Directeur du BIML a expliqué que bien que la plupart des actions concernées étaient indiquées comme "Terminées", en fait beaucoup sinon la plupart d'entre elles étaient en cours d'achèvement et des solutions étaient constamment recherchées pour améliorer leur efficacité. La coopération avec les RLMO (Plan d'Action point D.4) était également un sujet en cours et il serait donné plus de détails durant la semaine.

      - Le travail avançait aussi concernant le point D.7 du Plan d'Action Formation et D.8 Relations publiques et promotion et le site Internet de l'OIML joue un rôle croissant dans ces deux domaines.

      Aucun commentaire n'a été reçu de la part des Délégués et M. Faber a annoncé que l'Organisation avançait à grands pas, en élargissant son domaine et dans le cadre du Plan d'Action comme précisé.

- number: '4'
  title:
  - spelling: eng
    value: États Membres et Membres Correspondants
  narrative:
  - spelling: eng
    value: "\n"
- number: '4.1'
  title:
  - spelling: eng
    value: Nouveaux Membres - Adhésions attendues
  narrative:
  - spelling: eng
    value: |2+

      M. Magaña a informé les Participants des développements suivants au niveau de l'appartenance à l'OIML:

      - L'Albanie a récemment accédé au statut d'État Membre, après avoir été auparavant Membre Correspondant. Ceci a amené le nombre total d'États Membres à 58. M. Faber a accueilli chaleureusement ce nouveau membre, et en retour la Délégation albanaise a exprimé sa satisfaction d'être devenue un Membre à part entière et s'est engagée à remplir ses obligations à ce titre, y compris le fait de s'efforcer d'adapter ses lois nationales aux exigences de l'OIML.

      M. Magaña a annoncé que la Nouvelle Zélande et le Vietnam envisageaient de devenir des États Membres, alors qu'ils étaient eux aussi Membres Correspondants. La Délégation vietnamienne a parlé de son engagement à devenir un État Membre, et de sa satisfaction d'avoir été invité à participer au "Task Group" récemment constitué. Le Vietnam était devenu Membre Correspondant en 1994 et est actuellement membre de 19 organisations nationales et internationales. M. Faber a répondu que les portes de l'OIML étaient grandes ouvertes et que celle-ci était prête à accueillir ce pays en tant qu'État Membre quand celui-ci serait prêt.

      - Les Philippines ont récemment demandé à être radié de la liste des Membres Correspondants, étant donné certaines difficultés financières.

      M. Grkov a soulinné des développements récents dans le domaine de la métrologie légale en Macédoine et a affirmé que son pays continuait à moderniser son infrastructure légale afin de mieux prendre en compte les exigences métrologiques de l'OIML.

- number: '4.2'
  title:
  - spelling: eng
    value: Situation de certains Membres
  narrative:
  - spelling: eng
    value: |2+

      Le Directeur du BIML a rappelé aux Participants que lors de la 36ème Réunion du CIML à Moscou, le Comité a examiné la situation d'un certain nombre de pays qui n'étaient pas à jour dans le paiement de leurs cotisations.

      À Londres la Onzième Conférence avait accordé des délais spéciaux de paiement à deux pays, à savoir la R.P.D. de Corée et la Zambie, à condition que les contributions des années ultérieures soient payées en temps voulu.

      En 2001, le Comité avait également examiné la situation financière d'un certain nombre de pays, et M. Magaña était heureux d'annoncer que certains de ces pays avaient réglé tout (ou la plus grande partie) du montant impayé; c'était le cas pour l'Italie (maintenant à jour), Cuba (maintenant à jour), l'Iran (maintenant à jour), le Kenya (maintenant à jour) et le Sri Lanka (maintenant presque à jour).

      Cependant, la situation de trois pays devait maintenant être examinée.

      1) Il a été noté à Moscou que le Kazakhstan avait des arriérés impayés datant d'un certain nombre d'années (précisement 1997-2000). M. Magaña a rapporté qu'une grande partie de ces arriérés avait été payée depuis; tous les arriérés pour 1997, 1998 et la majeure partie de 1999 avait été réglée. En considération de ces faits, M. Magaña a demandé que le Comité prenne en compte cette situation, tout en demandant au Kazakhstan de poursuivre ses efforts pour payer la somme encore due. Cette proposition a été acceptée par le CIML.

      2) Concernant la R.P.D. de Corée, ce pays s'était vu accorder un délai de paiement par la Onzième Conférence et le Directeur du BIML avait le plaisir d'annoncer qu'à la date du 30 juin 2002, la majeure partie de ses arriérés avait été remboursée. Les cotisations de ce pays pour 2000 et 2001 étaient maintenant à jour et les arriérés dus avaient été réduits de 7 % depuis 2001. Il a considéré qu'un effort significatif avait été fait par le Kazakhstan, et de fait le Conseil de la Présidence a considéré que la situation de ce pays devrait être jugée par le CIML comme maintenant acceptable. Cette proposition a été acceptée par le CIML.

      3) Quant à la Zambie, des délais avaient également été accordés par la Onzième Conférence pour 1996-1999, à condition que ce pays poursuive ses efforts pour payer la somme encore due. Cependant, la Zambie n'avait pas encore été en position de payer ses cotisations pour 2000-2001, et par conséquent la somme totale impayée était en augmentation. En fait, la Zambie avait jusqu'alors été en mesure de rembourser une partie de sa cotisation de 1996 et une partie de sa cotisation de 2000. Le Membre du CIML pour la Zambie a expliqué que le Gouvernement zambien avait effectivement accordé des fonds pour couvrir un paiement partiel, mais que le déblocage actuel des fonds était actuellement retardé. Les discussions

      avec les autorités concernées reprendraient à son retour. M. Faber a remercié le Représentant pour cette mise à jour, et a recommandé au Comité que toute décision concernant la Zambie soit reportée jusqu'à ce que de plus amples informations soient disponibles. M. Faber a demandé au Représentant de contacter le Directeur du BIML pour que soit examinée d'urgence la situation exacte.

      Enfin, la Délégation Macédonienne a noté que le BIML n'avait pas accusé réception de son paiement de décembre 2001 et a demandé que cette confirmation lui soit envoyée dès que possible. Plus tard au cours de la réunion, le Personnel du BIML a contacté le Bureau et a été en mesure de confirmer à M. Grkov que le paiement avait été reçu; une confirmation écrite lui serait envoyée dès le retour du Personnel du Bureau à Paris.

