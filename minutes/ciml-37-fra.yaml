      Un rapport rédigé par le BIML a été distribué aux Participants et commenté par M. Issaev, responsable des activités techniques de l'OIML en tant que Vice-Président du CIML.

- number: '8.1'
  title:
  - spelling: eng
    value: Programme de travail des TC/SC
  narrative:
  - spelling: eng
    value: "\n"
- number: '8.2'
  title:
  - spelling: eng
    value: Examen de la situation de certains TC/SC
  narrative:
  - spelling: eng
    value: |2+

      M. Issaev a commencé par donner des statistiques concernant les TC et SC de l'OIML et a attiré l'attention de l'assemblée sur le fait que la responsabilité des 67 organismes techniques était répartie entre seulement 15 États Membres; il a mentionné que ce problème particulier serait traité plus tard.

      Il a constaté que la mise en application actuelle des Recommandations et Documents OIML par les Membres de l'OIML était d'une grande importance, en plus de leur élaboration et de leur révision. Dans la version la plus récente du document sur le degré de mise en oeuvre, qui avait été rédigée juste avant la 11ème Conférence, il manquait des informations concernant un certain nombre d'États Membres: dix États Membres n'avaient donné aucune information et six autres États Membres n'avaient pas mis à jour leurs données. De plus, il aurait été intéressant d'avoir des informations sur la mise en application des Recommandations par les Membres Correspondants.

      M. Issaev a ensuite évoqué la situation des deux organismes techniques qui avaient été vacants pendant au moins deux ans et a dit que celle du TC 8/SC 2 Mesurage statique massique n'était pas d'une urgence absolue puisque la Russie avait assumé la responsabilité de ce seul projet de travail, à savoir le développement de l'Annexe à la R 125: Format du rapport d'essai pour l'évaluation des systèmes de mesure de la masse des liquides dans les réservoirs. Quant au TC 5 Instruments électroniques, il a annoncé que la Slovénie s'était récemment proposée pour assumer son Secrétariat.

      Il a continué en mentionnant que pendant cette année, de nouveaux projets de travail avaient été proposés par certains TC et SC et qu'il y avait eu une proposition de la part de l'Australie d'établir au sein du TC 17 un nouveau Sous-comité OIML Instruments pour l'analyse de la qualité des produits de l'agriculture ainsi qu'un projet de travail Instruments de mesure utilisés pour la détermination des protéines dans le grain. Cette proposition a été soutenue par neuf membres-P du TC 17 (sur 12 membres-P) et l'Australie a proposé de prendre la responsabilité du nouveau TC 17/SC 8.

      M. Issaev a conclu sa présentation en disant que M. Szilvássy donnerait plus d'informations détaillées qui permettraient d'identifier les décisions appropriées prises par le Comité, puis a donné la parole à M. Skubić.

      M. Skubić a commenté la proposition de la République de Slovénie basée sur le fait qu'il existe un besoin d'activités supplémentaires dans ce domaine important et que l'Institut de Métrologie Slovène possède les experts et l'expérience internationale requis. Pendant les cinq dernières années, le laboratoire pour la Technologie des Informations en Métrologie avait été actif dans l'élaboration d'un document qui serve de guide pour le contrôle légal des machines à sous, des logiciels pour l'automatisation des laboratoires, pour la validation des logiciels de laboratoires, et pour

      l'essai des logiciels des instruments de mesure pour l'approbation de types; ils avaient participé au Comité de Direction de l'un des premiers projets de l'Union Européenne pour l'harmonisation des logiciels et la direction du travail sur les aspects futurs de la MID. M. Skubic, en demandant le soutien du CIML pour la proposition de son pays, a assuré la ferme intention du Comité de la Slovénie d'allouer les ressources nécessaires et de contribuer au travail de l'OIML afin de satisfaire aux besoins des États Membres et également de s'impliquer dans les activités des deux Sous-comités du TC 5.

      M. Issaev a remercié M. Skubić et lui a souhaité un succès complet dans cette nouvelle tâche, puis a demandé à M. Szilvássy de donner des informations supplémentaires sur les activités techniques.

      M. Szilvássy a expliqué que les rapports annuels reçus des 15 TC et des 45 SC avaient été envoyés à tous les Membres du CIML en un seul volume au début de l'année. Un résumé des activités techniques de l'OIML en 2001 et des prédictions pour 2002 avaient été publiés dans le Bulletin OIML d'avril 2002. En 2002 il y a eu 117 projets approuvés pour 10 TC et 43 SC, dont 72 étaient en cours (neuf projets avaient atteint le stade final de Projet de Recommandation ou Projet de Document, 28 en étaient au stade de CD et 35 à celui de WD). Malheureusement, il y avait 44 projets dont 26 n'avaient pas encore commencé, les autres ayant été reportés ou retardés. De plus, 8 TC et 6 SC n'avaient pas, pour le moment, de projets approuvés (trois TC sur huit n'étaient responsables d'aucune publication OIML). Depuis la 36ème Réunion du CIML, seuls le TC 12 et deux SC (TC 8/SC 5 et TC 9/SC 2) avaient organisé des réunions de Groupes de Travail Internationaux. Un certain nombre de réunions de Groupes de Travail avaient également eu lieu et la tenue de la réunion du TC 5/SC 1 avait déjà été confirmée pour cette année.

      Pour terminer sur une note positive, il avait le plaisir d'annoncer que le Secrétariat du TC 13 Instruments de mesure pour l'acoustique et les vibrations n'était plus vacant. L'Allemagne avait encore pris la responsabilité de ce Secrétariat et avait déjà organisé une réunion informelle en juin avec la participation de sept membres-P et de la CEI afin d'étudier la situation et d'annoncer le relancement des activités.

      Comme résultat de l'activité technique entreprise depuis la 36ème Réunion du CIML, 17 Projets de Comités avaient été élaborés et distribués par deux TC et dix SC, et deux projets (révisions du D 18 et du document sur le Système de Certificats OIML pour les Instruments de Mesure) avaient été approuvés au vote par correspondance du CIML. De plus, deux Projets de Recommandations avaient été présentés pour approbation par le CIML au Point 8.3 et un autre Projet de Recommandation, le Rapport de Format d'Essai de la nouvelle Recommandation sur le Poids total des véhicules serait présenté pour approbation par le CIML par vote par correspondance après la présente Réunion du CIML.

      II a poursuivi en expliquant que le projet de révision final de OIML R 111 Poids des classes $ E_{1}, $ $ E_{2}, F_{1}, F_{2}, M_{1}, M_{1-2}, M_{2}, M_{2-3} $ et $ M_{3} $ avait été retardé du fait d'un certain nombre de commentaires envoyés par les Membres du CIML (seuls des votes Oui avaient été reçus sur l'ensemble des 39 Membres du CIML ayant voté) et demandait ensuite au Comité de donner son aval à la procédure proposée pour l'approbation du projet par un vote par correspondance du CIML dès que ce projet serait rendu disponible par le Secrétariat des États-Unis.

      Sur la base des progrès effectués cette année (et bien sûr des progrès attendus pour l'année suivante) au moins quatre Projets de Recommandations (révisions des R 84, R 61 et R 52 et une nouvelle Recommandation sur les Spectrophotomètres pour laboratoires médicaux) seraient vraisemblablement présentés à l'approbation de la 38ème Réunion du CIML. En plus du projet de la R 49-3 (Format du rapport d'essai pour les compteurs d'eau), deux projets de Documents Internationaux (D 6/D 8 plus D 9) semblaient être à un stade bien avancé et il était donc très vraisemblable qu'ils soient soumis au vote par correspondance du CIML en 2003. D'autres projets étaient en cours d'élaboration au point d'atteindre le stade de Projet de Recommandation ou de Projet de Document (par exemple deux projets du TC 8/SC 7 et la révision de la R 51) au début de l'année suivante si des efforts étaient faits par les Secrétariats et les membres-P des TC et SC concernés, en particulier dans le cas des projets prioritaires.

      En résumé, et en dépit du fait que dans leurs Rapports Annuels, peu de TC et SC avaient envisagé d'augmenter leurs activités pour 2002, on avait constaté qu'il y avait eu en fait une légère diminution dans l'activité globale des organismes techniques de l'OIML durant l'année qui venait de s'écouler comparativement aux tendances positives des années précédentes et si l'on tenait compte de la quantité relativement élevée de projets approuvés (environ 40 %) qui n'avaient pas encore commencé. Il fallait aussi mentionner que bien que quelques questionnaires et enquêtes avaient été distribués par les TC et SC en connexion avec les réexamens programmés pour la révision des Recommandations et Documents OIML, le nombre de publications OIML devant être réexaminés était en augmentation.

      En regardant le stade actuel des projets de haute priorité et de priorité, dont la liste contenant un total de 39 projets était approuvée par le CIML en 2001, M. Szilvássy a fait remarquer que bien que six d'entre eux avait déjà été approuvés, quatre d'entre eux avait atteint le stade de Projet de Recommandation et 16 projets étaient au stade avancé de Projet de Comité, 13 projets étaient seulement au stade de Projet de Travail ou devaient encore être commencés. Cette situation devait être améliorée et les TC et SC concernés devaient commencer à travailler sur ces projets. Puisqu'il était d'une importance vitale pour l'OIML d'accélérer le travail technique sur les types horizontaux de projets (par exemple les révisions des D1 et D11, le développement de documents sur l'incertitude, les logiciels et les méthodes statistiques, etc.) et sur d'autres projets prioritaires et approuvés, ainsi que sur des réexamens devant être effectués, la Présidence du CIML avait pris l'initiative d'actions à prendre pour améliorer la situation. Des informations orales seraient données au Point 8.4.

      Concernant les nouveaux projets de travail (sur lesquels des informations étaient inclus dans une lettre BIML distribuée avant la Réunion du CIML) proposés pendant l'année par deux SC et soutenus par la majorité des membres-P des Sous-comités concernés, il était proposé au Comité d'approuver les projets sur:

      - La procédure pour le contrôle des principaux paramètres et caractéristiques d'instruments de thermovision proposé par le TC 11/SC 3, et

      - Réfractomètres automatiques. Méthode et moyens pour la vérification proposé par le TC 17/SC 2

      La révision de la R 126 Éthylomètres (dont le réexamen était prévu en 2003 suite à une proposition des États-Unis de l'amender) a aussi été proposée. Les États-Unis ont proposé leur aide au Secrétariat français pour cette révision.

      Quant au nouveau projet de travail Intervalles de vérification et d'inspection d'instruments de mesure contrôlés légalement proposé par le TC 4, il a été conseillé d'organiser une consultation supplémentaire au niveau des TC/SC, dans la mesure où le résultat final du vote du TC 4 n'était pas encore disponible et les États-Unis avaient suggéré que ce point soit plutôt repris par le TC 3/SC 1 (cette proposition était soutenue par au moins quatre autres membres P du TC 4).

      Concernant la situation de certains TC/SC M. Szilvássy a expliqué qu'à part le TC 8/SC 2 qui reste vacant (comme déjà mentionné par M. Issaev) on aurait aussi bientôt besoin de volontaires pour assumer la responsabilité du TC 10/SC 3 Baromètres car le Royaume-Uni avait indiqué son intention d'abandonner le Secrétariat de ce comité.

      Quant à la proposition de l'Australie d'établiir un nouveau Sous-comité Instruments pour l'analyse de la qualité des produits de l'agriculture au sein du TC 17 en même temps qu'un projet de travail Instruments de mesure utilisés pour la détermination des protéines dans les céréales, il a été recommandé au Comité i) d'approuver cette proposition puisqu'elle était soutenue par neuf membres-P du TC 17 (sur un total de 12) et ii) de confier le Secrétariat du nouveau TC 17/SC 8 à l'Australie.

      En concluant son rapport sur les activités techniques, M. Szilvássy a expliqué que le BIML avait procédé aux amendements des R 49-1 et R 49-2 tels qu'ils étaient acceptés par le CIML. Le fi-

      chier de l'Annexe A de la R 49-1, tel qu'il était préparé et approuvé par le TC 8/SC 5, avait été placé sur le site Internet de l'OIML en avril 2002 pour consultation provisoire par les Membres du CIML en même temps que le fichier amendé de la R 49-2 (projet basé sur l'Annexe A amendée de la R 49-1 et approuvé plus tard par le TC 8/SC 5). Depuis lors aucun Membre du CIML n'avait fait d'objection soit à la procédure, soit à l'Annexe A de la R 49-1 amendée, soit à la version amendée de la R 49-2. La R 49-1 amendée serait republiée par le BIML en même temps que la R 49-2 amendée. L'élaboration du Format de rapport d'essai (R 49-3) avançait bien et le Projet de Comité final était attendu pour bientôt; il serait distribué aux Membres du CIML pour vote par correspondance.

      M. Kochsiek a donné de brèves informations sur les résultats d'une réunion commune des Groupes de Travail des TC 8/SC 3 et SC 4 qui s'étaient tenus à Braunschweig à la mi-septembre. Les principaux résultats de la réunion ont été les propositions de fusionner les R 105 et R 86 dans la R 117 et d'étendre le domaine de la R 117 aux compteurs ultrasoniques et vortex. Il a été envisagé de tenir la réunion commune des comités TC 8/SC 3 et SC 4 (organisées par le BIML) en octobre 2003 à Paris.

      Suite à une courte introduction sur la réunion récente de l'Atelier et du Comité du TC 12, M. Kochsiek demanda que les Membres du CIML vérifient la participation de leurs pays au TC 12 car c'était très important pour la révision de la R 46. Il demanda à M. Valkeapää de donner des informations sur les résultats de l'Atelier du TC 12 et sur la réunion du Groupe de Travail qui s'est tenue à Borås.

      M. Valkeapää a d'abord rappelé aux Délégués que le travail sur la révision de la R 46 avait commencé lors d'une réunion du TC 12 tenue à Braunschweig en octobre 2000. Sur la base des résultats du questionnaire distribué aux membres du TC 12 après cette réunion, il a été réalisé que le travail sur la révision de la R 46 devait aller plus vite. Afin que les membres soient tenus mieux informés en ce qui concerne la mesure de l'électricité dans différentes parties du monde et pour harmoniser les différentes opinions, il avait été décidé que le SP de Suède organiserait un atelier conjointement avec la réunion du TC 12. Environ 60 participants soit Membres de l'OIML soit issus de l'industrie, de sociétés de services ou d'autres autorités (par exemple originaires des autorités de protection du consommateur de Suède) avaient participé à l'Atelier sur "Les mesures de l'énergie électrique" à Borås. Les résultats du Séminaire étaient qu'il existait différents étalons et différentes technologies dans le monde, et qu'ils devaient être harmonisés (le rapport de l'Atelier est disponible sur le site Internet du SP (www.sp.se). La réunion du comité à laquelle avaient participé 35 personnes provenant du monde entier et représentant 20 États Membres et organisations en liaison parmi lesquels s'était établi un consensus sur l'étendue de la révision de la R 46, avait déterminé les priorités des tâches et réparti le travail en plus petites sections afin de créer une série de documents. L'élaboration de cette série de documents dans le cadre de la révision de la R 46 était considérée comme nécessaire dans la mesure où il y avait, dans le marché de l'électricité, beaucoup plus de mesurages (et beaucoup plus de mesurages différents) que dans la manière traditionnelle de traiter le comptage de l'énergie électrique. Le premier document de cette série couvrirait vraisemblablement la réglementation existante y compris les compteurs électroniques. Il a été décidé que ce travail serait entrepris en utilisant la messagerie électronique et l'accès restreint au site Internet créé par le SP. La prochaine réunion du TC 12 se tiendrait à Maastricht les 27 et 28 mars 2003.

      M. Lagauterie a expliqué le besoin urgent de commencer à réviser la R 126, en prenant en compte la proposition des États-Unis pour un amendement, les nombreux commentaires et suggestions recueillis parmi les Membres en 2002 et les besoins d'un certain nombre d'États Membres qui avaient annoncé leur intention de mettre en application cette Recommandation une fois qu'elle aurait été révisée.

      Quant au domaine d'intervention du nouveau TC 17/SC 8 que l'on proposait de créer, il s'interrogeait sur la nécessité de créer un nouvel organisme puisqu'il existait déjà des Recommandations OIML sur la mesure de la qualité des produits de l'agriculture (par exemple la R 59 sur la mesure de l'humidité des céréales et les R 108 et R 124 sur la mesure du sucre contenu dans les fruits et

      le raisin) élaborés par d'autres organismes techniques existants. Il demanda s'il ne serait pas plus approprié d'intégrer le nouveau projet proposé sur la détermination des protéines dans les céréales au programme de travail de l'un des SC faisant partie du TC 17, sans quoi une coopération et une coordination très étroites seraient nécessaires entre les Sous-comités concernés, puisque par exemple pour la détermination du contenu de l'humidité (ainsi que pour le contenu des protéines) dans les céréales, la même technique de mesure par infra-rouges était utilisée.

      Dans sa réponse, M. Szilvássy a expliqué que le champ d'action du Sous-comité que l'on proposait de créer s'adaptait bien avec le thème de travail du TC 17 et selon les Directives pour les travaux techniques de l'OIML, les organismes techniques de l'OIML travaillant sur des sujets communs devraient établir et maintenir des liaisons les uns avec les autres, ce qui s'appliquerait au nouveau SC à établir. Il a également expliqué que le titre du nouveau SC n'était pas le plus important, mais bien son domaine d'activité, et ceci serait déterminé précisément par le Sous-comité avec l'aide du TC 17 et par la suite approuvé par le CIML. La première tâche du Secrétariat australien du TC 17/SC 8 serait de trouver des participants au Sous-comité et de distribuer un questionnaire au membres-P et -O du TC 17 au sujet de son domaine d'activité et aussi au sujet et au contenu de son nouveau projet de travail.

      M. Al-Gossair a posé une question concernant la différence entre le travail d'ISO/CEI et de l'OIML quand ces organisations publient des normes sur le même sujet, par exemple les compteurs d'eau.

      M. Szilvássy a répondu que conformément aux Directives pour les travaux techniques de l'OIML, les organismes techniques de l'OIML avaient pour obligation d'étabir et de maintenir des liaisons avec des organisations externes en coordination avec le Bureau, telles que l'ISO et la CEI, afin de s'assurer que les Recommandations OIML existantes (ou à l'état de projet) et les normes internationales existantes (ou à l'état de projet) soient, autant que possible, compatibles entre elles. Comme exemples de la compatibilité garantie de cette manière, il a mentionné la première publication commune OIML R 99/ISO 3930, ainsi que R 93 et R 122 (y compris l'Annexe C) qui avaient été élaborées sur la base des normes ISO existantes. Dans le cas de la R 49 sur les compteurs d'eau, cette publication avait été rédigée en parallèle et en étroite coopération avec ISO TC 29.

      Mme Bennett, soutenant la proposition sur la mise en place d'un nouveau Sous-comité, a expliqué qu'outre la mesure de quantité traditionnelle des produits, il existait un besoin croissant de mesure de la qualité des produits de l'agriculture. Durant les précédentes consultations avec d'autres membres du TC 17, les options mentionnées par M. Lagauterie avaient aussi été prises en compte, mais finalement on sentait qu'il existait un réel besoin d'un SC séparé centré sur les aspects de la qualité des produits de l'agriculture.

      En réponse à une question précédente, M. Magaña a déclaré que la révision du D 1 Loi de métrologie était un projet de haute priorité et avait été demandée également par les membres du Conseil de Développement. La production du 1er Projet de Comité de la révision du D 1 avait été entreprise par le Secrétariat américain et lui-même après la 36ème Réunion du CIML. Depuis, deux organisations en liaison, en l'occurrence CIPM/BIPM (pour autant que la métrologie scientifique était concernée) et ILAC (du moins en ce qui concernait la garantie de la traçabilité pour les laboratoires) étaient très intéressés par la participation au développement du nouveau document révisé et il était évident que ce genre de document ne pouvait être élaboré sans leur contribution. Un nouveau Groupe de Travail Commun avait été établi pendant la dernière réunion annuelle CIPM-ILAC-CIML en février 2002 et le premier Projet de Comité avait été distribué aux membres du TC 3 puis transmis au BIPM et à ILAC pour être commenté. Il a demandé aux Membres du CIML d'envoyer leurs commentaires dès que possible afin que le Secrétariat et le Bureau soient en mesure de préparer le 2ème Projet de Comité pour distribution et discussion par le Groupe de Travail Commun lors de la prochaine réunion annuelle des trois organisations devant se tenir en février 2003 au BIML. De plus il fit remarquer que l'approche suivie dans la révision serait différente de celle de l'actuel D 1, qui était une sorte de loi de métrologie modèle qu'il était conseillé de suivre ou de copier dans le cadre d'une législation nationale. Le Document révisé

      contiendrait une série de considérations proposées aux pays qui avaient l'intention de créer ou de réviser leur législation nationale dans le domaine de la métrologie; ce serait une sorte de guide plutot qu'un document à caractère légal "clés en main".

      M. Ehrlich a ajouté que la date limite pour les commentaires avait été fixée à la mi-novembre 2002 et qu'il était envisagé d'organiser et de tenir une réunion du Comité TC 3 en 2003 avec la participation des organisations en liaison concernées. Il a aussi fait remarquer que la préparation de la version finale de la R 111 révisée, qui avait été retardée du fait de nombreux commentaires envoyés par les Membres du CIML, avançait bien et que le Secrétariat avait déjà fini la première partie et travaillait sur le Format de Rapport d'Essai. Il a assuré a au Comité que la publication révisée serait un document de pointe, de très bonne qualité et très pratique et a mentionné l'importante contribution de Dr. Gläser (PTB) et Dr. Davis (BIPM) à son élaboration.

      M. Magaña a ajouté que le BIML avait proposé que le projet de révision de la R 111 soit approuvé par le vote par correspondance du CIML comme prévu par la Convention, car c'était un document dont on avait un besoin important et urgent. Le BIML distribuerait le Projet de Recommandation dès qu'il serait disponible auprès du Secrétariat américain.

      M. Kochsiek a donné des informations supplémentaires sur l'état du projet sur les Spectromètres à absorption de lumière pour les laboratoires médicaux élaboré par le TC 18/SC 5 qui avait atteint le stade de projet final de comité. La version finale serait bientôt envoyée au BIML afin de la distribuer en tant que DR en vue de son approbation ultérieure par le CIML lors de sa 38ème Réunion.

      Pour conclure ces deux points le Comité a approuvé la mise en place du nouveau Sous-comité TC 17/SC 8 sous la responsabilité de l'Australie, confié le Secrétariat du TC 5 à la Slovénie et approuvé les trois nouveaux projets de travail comme proposé.

- number: '8.3'
  title:
  - spelling: eng
    value: Accélération du travail technique
  narrative:
  - spelling: eng
    value: |2+

      Dans son introduction, M. Faber a dit qu'il était préoccupé (ainsi que les autres Membres du Conseil de la Présidence) par la lenteur avec laquelle les travaux techniques de l'OIML avançaient, dans la mesure où c'était, après tout, l'activité centrale de l'Organisation. Il n'était pas seulement soucieux de la lenteur de l'élaboration des nouveaux documents de l'OIML mais aussi du retard pris entre les réexamens réguliers et les révisions des Recommandations et des Documents existants. Si l'OIML échouait dans cette tâche, d'autres organisations l'accompliraient à sa place car elles ne pouvaient attendre (et n'attendraient pas) indéfiniment que l'OIML s'acquitte de ce travail. La Présidence avait examiné la distribution des TC/SC et les tâches attribuées et avait trouvé que les États-Unis et la Fédération de Russie dirigeaient la moitié des Secrétariats; quatre États Membres assumaient environ 75 % des projets en cours. Dans le but d'arriver à une distribution plus équilibrée des tâches parmi les États Membres et pour trouver plus de personnes qui puissent contribuer aux activités techniques de l'OIML, il préférait employer une approche positive dans la mesure où il n'y avait aucune raison de blâmer tel pays ou telle personne. Ceci voulait dire que plusieurs moyens d'aider les organismes techniques seraient proposés: contacts et visites informels seraient proposés afin de i) identifier les problèmes des TC et SC qui avaient besoin d'être résolus, ii) aider à identifier des sources potentielles d'aide par divers autres États Membres et iii) tenter de persuader ceux-ci de prendre certaines responsabilités. Il expliquait que dans les années à venir le Président du CIML, les Vice-Présidents et le Directeur du BIML seraient en contact avec ces pays pour discuter des possibilités d'une façon positive mais informelle, établir un programme de visites puis en faire le rapport au CIML et discuter de ce qui pouvait être fait pour améliorer la situation. En guise de conclusion, M. Faber a affirmé qu'il était très conscient des difficultés que rencontraient nombre de services de métrologie: diminution du temps, des ressources et du personnel, et convenait que chaque situation devait être étudiée au cas par cas en étroite coopération avec les organismes concernés.

      M. Magaña a expliqué que l'activité technique était très importante pour l'Organisation et a donné des informations supplémentaires en indiquant qu'il y avait actuellement environ 150 publications OIML; ceci voulait dire qu'en moyenne 30 avaient besoin d'être révisées. Si l'on suppose que les révisions étaient nécessaires environ tous les quinze ans, ceci voudrait dire qu'environ dix publications par an devaient être révisées. Tout cela montrait que l'OIML avait un problème réel au niveau de la révision des publications. Il a poursuivi en disant que le Bureau avaient tenu des réunions avec le Président et les Vice-Présidents du CIML pour examiner la situation actuelle, les possibilités d'offrir de l'aide aux TC et SC, et comment parvenir à une répartition plus équilibrée des organismes techniques (et par conséquent les tâches en résultant) parmi les États Membres en vue d'encourager un certain nombre de pays à assumer la responsabilité de certains Secrétariats ou même d'accepter plus de tâches. Quant à plusieurs propositions d'augmenter et d'accélérer les activités techniques, il mentionna entre autres que le BIML serait chargé de les suivre plus étroitement et de contacter (d'une façon informelle) les Secrétariats qui semblaient en difficulté afin d'examiner leurs problèmes et de prendre des mesures pour les aider. Dans certains cas, le BIML pourrait donner une aide financière à des experts pour le temps qu'ils auraient passé dans des activités de l'OIML et pour leur participation à des réunions. Le développement en cours du site Internet de l'OIML et son utilisation croissante serait un outil efficace pour faciliter l'échange d'informations et l'accélération de l'avancement des projets, mais bien entendu cela ne remplacerait pas les réunions d'experts qui resteraient toujours nécessaires. Les Membres du CIML avaient aussi la possibilité de contacter d'autres services et les institutions de leurs pays (par exemple l'agence chargée des questions d'environnement) et de leur demander d'aider les Secrétariats et d'accomplir du travail pour l'OIML.

      De plus M. Magaña a fait remarquer que la révision des Directives pour le travail technique de l'OIML. 1ère partie avançait bien et ces Directives avaient aussi pour but de faciliter les activités techniques. M. Dunmill a expliqué que cette révision était basée sur les Directives ISO/CEI récemment révisées et que le but était de produire un document simplifié qui serait bien adapté aux besoins et aux procédures de l'OIML. Il a rapporté que 15 réponses (huit avec commentaires) avaient été reçues au sujet du 1er CD et, sur la base de ceux-ci, il n'y aurait pas de changements substantiels sur le CD (très probablement) final en cours d'élaboration.

      M. Faber a considéré que l'idée d'accélérer le travail technique était acceptée par le Comité puisqu'il n'y avait aucune objection ni proposition supplémentaire; il conclut ce point en disant que le Comité serait tenu régulièrement informé sur les développements dans ce domaine.

- number: '8.4'
