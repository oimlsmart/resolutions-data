- number: '9'
  title:
  - spelling: eng
    value: Système de Certificats OIML pour les Instruments de Mesure
  narrative:
  - spelling: eng
    value: |2+

      Un rapport écrit préparé par le BIML était distribué aux Participants et présenté par M. Kochsiek qui était responsable des activités suivantes liées au Système de Certificat OIML en tant que Vice-Président du CIML.

- number: '9.1'
  title:
  - spelling: eng
    value: Informations générales
  narrative:
  - spelling: eng
    value: |2+

      Pour introduire le sujet M. Kochsiek a fait remarquer que le Système de Certificats OIML pour les Instruments de Mesure ("le Système") avait bien progressé ces dix derniere années et que le document révisé Système de Certificats OIML pour les Instruments de Mesure permettait au Système de se développer encore plus. Il a annoncé que le nombre de certificats OIML enregistrés dépasserait très probablement les 1000 à la fin de 2002, et que trois États Membres de plus (le Japon, la Finlande et la République de Corée) avaient récemment établi leurs propres Autorités de Délivrance. Il y avait maintenant 26 Autorités de Délivrances établies dans 23 États Membres. Le nombre de demandeurs et de fabricants d'instruments de mesure dans 34 pays (25 États Membres OIML et 9 Membres Correspondants) qui avaient reçu des certificats OIML dépassait le chiffre de 260.

      Parmi les inconvenients du Système, M. Kochsiek a mentionné que les certificats OIML avaient été délivrés et enregistrés pour seulement 13 catégories d'instruments de mesure sur les 36 qui étaient applicables dans le Système et ces certificats avaient été délivrés par seulement 16 Autorités de Délivrance dans 14 États Membres sur un total de 26 établies à ce jour.

      Quant aux projets pour les développements futurs, M. Kochsiek a fait remarquer que parmi les nombreuses actions concrètes qui devraient être entreprises dans un futur proche comme définies dans le document Politique à long terme de l'OIML: Plan d'Action pour 1999-2002, le développement et la mise en application du MAA était très important et devait être discuté plus loin sous point 10.

      M. Szilvássy a donné un aperçu des développements depuis l'année dernière et a expliqué que 20 organismes techniques de l'OIML avaient 24 projets en cours (parmi lesquels quatre étaient de haute priorité et six étaient des projets prioritaires) visant à développer, réviser ou compléter des Recommandations applicables dans le Système, mais malheureusement des progrès avaient seulement été faits sur 12 projets par neuf organismes techniques durant cette période.

      Il a fait remarquer également que le document révisé Système de Certificats OIML pour les Instruments de Mesure avait été approuvé par le vote total de 37 Membres du CIML (35 "oui", un "non" et une abstention) et le document était en cours de rédaction pour publication ultérieure. Sur ces 37, il nota que 22 avaient voté sur les 23 qui avaient établi 26 Autorités de Délivrances (20 "oui", un "non" et une abstention). Ceci était très important pour l'acceptation générale du document

      révisé puisque le rôle central avait été déplacé des Membres du CIML vers les Autorités de Délivrance. Il expliqua que la page du Système de Certificats du site Internet de l'OIML était régulièrement mis à jour, et que le fichier du document mis à jour sur les Autorités de Délivrance et les Recommandations applicables dans le Système (et bientôt le fichier du document révisé sur le Système) pourraient être téléchargés du site Internet. Il était de plus envisagé de placer les fichiers PDF de tous les certificats enregistrés sur le site Internet de l'OIML, bien que pour le moment ceci posait un problème technique de taille de fichier.

      Parmi les caractéristiques actuelles du Système, il a mentionné la croissance régulière du nombre de certificats enregistrés depuis les trois dernières années et dans le nombre de Recommandations applicables dans le Système, qui, sans aucun doute, atteindraient le nombre de 39 à la fin de 2002.

- number: '9.2'
  title:
  - spelling: eng
    value: Nouvelles Recommandations applicables dans le Système
  narrative:
  - spelling: eng
    value: |2+

      Suite à une proposition faite par le Bureau, le Comité a décidé que l'une des Recommandations approuvées récemment, à savoir la révision de la R 84 Thermomètres à résistance de platine, cuivre ou nickel (à usage industriel) deviendrait applicable dans le Système dès qu'elle serait publiée.

      Le Comité a décidé également que deux Recommandations, nommément la R 134 Instruments automatiques de pesage des véhicules routiers en mouvement. Partie A: Pesage total des véhicules et la R 49 Compteurs d'eau pour l'eau potable froide deviendraient applicables dans le Système dès que leurs Formats de Rapport d'Essai seraient approuvés par le vote par correspondance du CIML et seraient publiés.

      Quant à la R 111 révisée contenant l'annexe Format du Rapport d'Essai, la question de son applicabilité dans le Système serait décidée par le CIML en même temps que son approbation par vote par correspondance.

- number: '9.3'
  title:
  - spelling: eng
    value: Plans pour les développements futurs
  narrative:
  - spelling: eng
    value: |2+

      M. Szilvássy a rappelé aux Délégués que plusieurs actions concrètes à mener dans un futur proche pour le développement du Système, ont déjà été inclus dans le document de Politique à long terme de l'OIML: Plan d'Action 1999-2002.

      Il a, d'autre part, fait remarquer que le document révisé du Système de Certificats OIML pour les Instruments de Mesure donne le rôle central qui incombait initialement au Membre du CIML, à l'Autorité de Délivrance et étend la portée du Système dans deux directions: la certification des modules et la certification des familles de type et de modules d'instruments de mesure. Il a précisé que le document contenait aussi de nouvelles dispositions (par exemple, l'obligation de classer la documentation spécifiée du fabricant, y compris les références aux programmes informatiques) nécessaires à l'identification du type (à certifier) certifié, et comprend implicitement les exigences relatives aux spécifications des Recommandations concernées (par exemple, la définition des familles, l'identification des modules et/ou des familles ainsi que leurs critères métrologiques, méthodes d'essai et formats de rapport d'essai prescrits, etc.). Les consignes d'application devraient être incorporées à la Partie 2 des Directives, actuellement en cours de révision. La mise en œuvre de tous ces changements au niveau de la portée du Système nécessiterait d'autres actions concrètes de la part des TC et des SC concernés lors de l'élaboration de nouvelles Recommandations ou de la révision de celles existantes en vue de leur application au Système.

      La prochaine action, déjà formulée dans le Plan d'Action et relative à la certification individuelle des instruments de mesure ou des modules, devrait bientôt commencer. Étant donné qu'on ne

      disposait d'aucune proposition concrète récente à ce sujet (les propositions communiquées au BIML dataient du milieu des années 90), il avait été envisagé d'établir et de diffuser un questionnaire par les Co-Secrétariats du TC 3/SC 5 traitant du domaine, du contenu, des exigences et des règles de la certification individuelle dans le cadre du Système.

      Mr. Szilvássy a conclu qu'il y avait deux directions à suivre: celle du développement du Système lui-même et celle du développement du MAA (cette situation devait être discutée au Point 10), et a ajouté que des actions générales par les Membres du CIML et par le BIML étaient nécessaires pour davantage promouvoir le Système aux niveaux national, international et régional, en particulier parmi les Membres Correspondants, et pour tenir les organisations internationales et régionales en liaison informées des avantages du Système. D'autres développements au sujet du MAA (par exemple, l'accréditation ou l'évaluation par des pairs, des Autorités de Délivrance) contribueraient également au développement du Système.

      M. Lagauterie a expliqué le vote négatif de la France sur le document de révision du Système de Certificats OIML pour les Instruments de Mesure: il a dit que bien que le contenu du document était satisfaisant en lui-même, il était incohérent et en contradiction à la fois avec le VIML et avec le projet du MAA quant aux essais et examens, puisque (à son avis) les essais et les examens devaient être inclus dans des rapports séparés et formulés par des organismes séparés. Cela causerait un problème dans le contexte du futur MAA où l'objet de l'acceptation devait être déterminé clairement.

      M. Magaña a dit qu'il comprenait le problème (qui aurait pu être résolu plusieurs années auparavant) et était d'accord avec le fait qu'il était nécessaire d'être clair concernant la terminologie, mais en considérant les quelques 1000 certificats délivrés et les 40 Recommandations environ qui incluaient les Formats de Rapport d'Essai (incluant les essais et les examens) il n'était pas possible de changer tout cela maintenant. En outre il n'était pas souvent simple de distinguer la limite entre les examens et les évaluations, et également de différencier les organismes par les-quels ceux-ci devaient être exécutés.

      M. Lagauterie a admis qu'il était difficile parfois d'établir la limite, mais il était toujours possible de trouver une solution en décidant si les critères d'un examen étaient clairs ou non et si l'organisme d'essai avait ou non la possibilité d'interpréter les résultats, ce qui était la tâche de l'organisme de certification. Il a ajouté que le fait d'être conscient de la situation n'empêchait pas le CIML de décider de réaliser un nouveau système à partir de maintainant sans modifier nécessairement ce qui avait été fait jusqu'à maintenant.

      M. Johansen a dit qu'il était très intéressant de voir comment le Système se développement, et de voir surtout les nouveaux développements concernant à la fois la certification individuelle et le MAA. Il s'inquiétait de la bureaucratie et des aspects économiques derrière tous ces développements et suggérait que ces questions soient examinées dans le contexte de développement futurs. Il était clair que les fabricants et les utilisateurs bénéficiaient du Système et il était aussi évident qu'ils devaient payer les activités nécessaires inherentes entreprises par le Bureau, mais concernant le MAA et les tâches futures croissantes du Bureau, il était absolument nécessaire que les frais acquittés par les utilisateurs soient augmentés à l'avenir.

      M. Kochsiek a dit, que de son point de vue, la bureaucratie liée au Système de certificats avait réellement été très faible en comparaison de celle liée au MRA de la Convention du Mètre, et il était aussi d'avis que la charge de travail administratif lié à la future mise en œuvre du MAA devrait être gardée aussi faible que possible.

      M. Magaña a ajouté que jusqu'à maintenant le travail administratif du Bureau concernant l'enregistrement des certificats OIML était limité à l'enregistrement, la diffusion parmi les Membres de l'OIML et à l'entrée de leur référence sur le site Internet; les frais supportés par les demandeurs couvaient pratiquement ces coûts. Etant donné que le MAA ferait surgir beaucoup de tâches supplémentaires au sein du BIML, incluant par exemple un suivi plus étendu des certificats enregistrés, il conviendrait manifestement de réviser l'échelle des frais d'enregistrement.

      M. Boudissa a soulevé une question, qu'il considère être d'importance pour les pays en développement, en rapport avec le futur MAA. Il est nécessaire pour ces pays d'avoir une infrastructure et une législation en place afin pour eux d'être capable de délivrer des certificats qui seraient reconnus par d'autres de la même façon qu'ils reconnaîtraient les résultats des autres. Il demandait si ce niveau de capacité et de compétence existait et s'ils pourraient être reconnus, car il y avait un risque que des pays en développement ne soient pas acceptés, ce qui affecterait négativement le développement des systèmes métrologiques de ces pays.

      II a demandé que le Bureau considère ce problème avec les pays en développement, afin de s'assurer que la "reconnaissance mutuelle" était réellement mutuelle et qu'il ne s'agissait pas seulement d'une reconnaissance unilatérale.

      M. Magaña a dit que le sujet soulevé par M. Boudissa conduisait à une transition de ce point de discussion à celui sur le MAA et suggérait deux points de vue: le premier était lié au fait qu'un bon nombre de pays industrialisés Etats Membres de l'OIML n'avaient pas encore établi d'Autorités de Délivrance en raison d'un manque d'infrastructure de laboratoires et/ou de compétence pour délivrer des certificats OIML; néanmoins, de nombreux exemples de reconnaissance volontaire unilatérale entre eux existaient déjà. Son second point de vue était que le but principal du MAA était de dépasser cela et de faciliter l'acceptation et la reconnaissance entre les Membres de l'OIML.

      Mme. Bennett a fait une observation basée sur l'expérience de l'Australie selon laquelle il y avait des différences considérables dans le contenu technique des certificats délivrés par les différentes Autorités de Délivrance et elle estimait qu'en relation avec le MAA, il y aurait besoin de davantage d'harmonisation et de certains principes quant à l'information technique nécessaire qui devait être considérée.

      M. Kochsiek a conclu la discussion en disant qu'une des directions pour les développement futurs du Système de Certificats était le MAA OIML et certains commentaires déjà avancés pourraient être discutés au prochain point de l'ordre du jour.

- number: '10'
  title:
  - spelling: eng
    value: Evolutions
  narrative:
  - spelling: eng
    value: "\n"
- number: '10.1'
  title:
  - spelling: eng
    value: Arrangement d'Acceptation Mutuelle (MAA)
  narrative:
  - spelling: eng
    value: |2+

      M. Faber a introduit le point 10.1 sur l'Arrangement d'Acceptation Mutuelle, en expliquant que c'était un des points les plus importants de l'ordre du jour, et qu'il croyait fermement que la finalisation de ce document était essentielle pour l'avenir de l'OIML. M. Faber a demandé à M. Ehrlich de présenter l'état actuel du travail sur cette question.

      M. Ehrlich a rappelé la présentation qu'il avait donnée à la 36ème Réunion du CIML à Moscou. Puisque cette présentation était disponible sur le site Internet de I'OIML, il estimait qu'il n'était pas nécessaire de la répéter. Il allait donner un bref historique du projet, qui avait été commencé en 1998 par M. Chappell, avec une réunion du TC 3/SC 5 à Gaithersburg. Suite à la réunion à Moscou, un 9ème Projet de Comité a été mis en circulation parmi les membres du TC 3/SC 5 pour commentaires et vote. Parmi les 23 Membres-P de ce Sous-comité, 15 votes "oui", 7 votes "non" et une abstention furent reçus.

      Certains commentaires reçus étaient probablement dus à un malentendu sur le contenu du document; des clarifications pourraient être faites pour résoudre ce problème. Les commentaires plus importants reçus des Membres du TC 3/SC 5 pourraient être classées en quatre catégories de préoccupations:

      - Une catégorie de commentaires revenait au fait de savoir si l'arrangement devrait être décidé parmi les Autorités de Délivrance ou parmi les laboratoires d'essai; en fait, les opinions

      étaient partagées entre ces deux possibilités, probablement en raison des obligations des organismes notifiés et des laboratoires d'essai dans l'Union Européenne (tous les votes négatifs émanaient des pays européens);

      - Le deuxième problème était lié au coût des procédures d'établissement de la confiance, et au fait de décider si l'accréditation ou l'examen par des pairs (peut-être moins coûteux) était nécessaire;

      - Le troisième type de préoccupation concernait l'équivalence du niveau de confiance résultant de l'accréditation et de l'examen par des pairs; un certain compromis pourrait être atteint sur ce point; et

      La quatrième question clé qui a été soulevée par l'Allemagne était de savoir s'il fallait accepter ou non que des "exigences supplémentaires" soient prises en compte dans les Déclarations de Confiance Mutuelle.

      Depuis ce vote, un Membre P avait changé son vote d'abstention pour un vote "oui". Conformément aux Directives Techniques, ce Projet de Comité pourrait maintenant passer le stade du Sous-comité et devenir un Projet de Document International pour être soumis au CIML.

      Dr. Llewellyn considérait le MAA comme crucial pour l'OIML. La préoccupation du Royaume-Uni qui s'est abstenu, portait sur le manque possible de clarté dans le Projet de Comité quant à savoir qui sont les participants actifs dans les Déclarations de Confiance Mutuelle (DoMC). Les discussions avec le Secrétariat ont clarifié ce point et permis que le Royaume-Uni change son vote en "oui".

      M. Ehrlich a ajouté qu'un autre problème clé soulevé par la France concernait le besoin de clarification sur la portée du MAA, puisqu'il constituait un arrangement sur les résultats d'essai et non sur les certificats.

      M. Faber a ajouté que le Projet de Document était une décision majeure pour le CIML et avait donc besoin d'une majorité de quatre-cinquième au vote du CIML, comme spécifié dans la Convention. Ce principe devrait être décidé à la présente Réunion du CIML. Ainsi, le fait que le Projet ait été approuvé par vote au niveau du TC 3/SC 5 avec une majorité de deux tiers ne garantissait pas qu'il serait approuvé au niveau du CIML. Le Secrétariat devrait prendre cela en compte lors de la préparation du Projet pour consultation et vote par le CIML.

      M. Johansen a convenu que ce projet était d'une importance extrême; c'était pourquoi un nombre significatif de votes "non" était inquiétant; il estimait que le consensus devrait être plus large. Le Système de Certificats OIML était efficace et en expansion, mais si le MAA était adopté sans le consensus nécessaire alors il grèverait le succès du Système de Certificats. Il était d'avis que trop de discussions avaient été tenues par correspondance et pas assez au cours de réunions, et a recommandé d'organiser une autre réunion avant de conclure ce Projet.

      M. Ehrlich a pris note des inquiétudes formulées par M. Johansen, mais a considéré qu'à ce point, il serait plus utile d'obtenir l'opinion et les commentaires de tous les Membres du CIML, et pas seulement ceux des Membres du TC 3 /SC 5.

      M. Kochsiek a fait remarquer que l'Allemagne avait voté "non" afin de limiter le MAA aux participants qui avaient appliqué les Recommandations OIML dans leurs pays. C'était la responsabilité principale de l'OIML. Les exigences nationales étaient seulement acceptables dans ce cadre si elles étaient équivalentes aux Recommandations OIML, et le MAA devrait soutenir l'objectif d'harmonisation, ce qui signifiait que les essais supplémentaires devraient être évités.

      M. Ehrlich a répondu que le problème principal venait du fait qu'il n'était pas possible d'exiger que chaque pays adopte simplement les exigences OIML en vue de participer au MAA, car il était improbable que cela se produise en raison, par exemple, des évolutions technologiques. Cependant, il convenait que ce problème sur les exigences supplémentaires soit reformulé afin d'éviter des exigences déviant substantiellement de celles incluses dans les Recommandations OIML concernées.

      M. Tanaka a dit qu'il était d'accord avec l'Allemagne sur le fait que le MAA devrait préserver la cohérence des réglementations nationales des pays participants, avec les Recommandations OIML. Cependant, les tables actuelles annexées au Projet n'étaient pas adaptées à la loi nationale japonise. M. Tanaka a recommandé d'effectuer une autre enquête parmi les Membres du CIML pour savoir s'il y avait d'autres projets pour s'occuper de ce problème, ou concernant l'emploi d'auto déclarations.

      M. Lagauterie a expliqué les raisons du vote négatif de la France. La première raison était que les pays qui n'appliquaient pas les Recommandations OIML ne devraient pas être acceptés. Par contre, il pourrait être acceptable de tenir compte de spécificités nationales (par exemple, conditions climatiques). La deuxième raison était l'ambiguité de l'étendue du MAA: il semblait être applicable aux résultats d'essai uniquement (couvert par ISO 17025), mais beaucoup d'articles dans ce Projet faisaient référence aux Autorités de Délivrance des certificats et au Guide ISO 65, lequel était destiné aux organismes de certification.

      M. Ehrlich a répondu que le MAA devrait permettre une certaine flexibilité: les rapports d'essai de l'OIML étaient rendus disponibles par les Autorités de Délivrance et pouvaient émaner de plusieurs laboratoires d'essai placés sous l'autorité/la surveillance de l'Autorité de Délivrance.

      M. Vaucher a donné les raisons du vote négatif de la Suisse. Premièrement, l'étendue d'application causait certains malentendus. Ce MAA devrait être un pas en avant pour promouvoir le Système de Certificats OIML, mais la Suisse ne serait pas satisfaite si le domaine de l'acceptation mutuelle était trop strictement limité. Il y avait aussi un risque de créer plus de bureaucratie en demandant l'accréditation ou l'évaluation par les pairs pour chaque catégorie d'instruments. L'autorité de délivrance avait la responsabilité d'évaluer la compétence des laboratoires d'essai ou de les faire évaluer par des organismes d'accréditation. Il serait donc sensé de limiter les exigences pour ce qui est de la compétence des Autorités de Délivrance à leurs domaines de responsabilités. Le deuxième point concernait la façon dont la confiance devrait être établie. Il était nécessaire de définir l'évaluation par les pairs plus précisément, car à part l'accréditation, les autres manières d'établier la confiance n'étaient pas décrites. Mais le coût pour l'établissement de la confiance devait rester raisonnable afin de ne pas limiter la participation à celle des grandes organisations.

      M. Faber a noté les interventions ci-dessus, et a fait deux propositions. La première était de décider que comme ce MAA était appelé à avoir des conséquences de grande portée pour la vie de l'OIML et sur les activités de métrologie légale dans les divers pays, il ne pourrait pas être considéré comme un Document International informatif quelconque et qu'il était donc nécessaire de l'adopter par une décision du Comité avec une majorité de quatre-cinquième. La deuxième proposition était que le Secrétariat du TC 3/SC 5, en considérant les commentaires reçus auparavant et la discussion tenue pendant la présente Réunion du CIML, pourrait développer une version de plus, incluant toute clarification nécessaire, et organise un atelier avec chacun des Membres du CIML intéressés pour discuter de cette version améliorée en vue d'obtenir le meilleur consensus possible sur le MAA. Des discussions bilatérales avec certains Etats Membres devraient aussi être envisagées pour progresser vers une meilleure acceptation du MAA. La version soumise au CIML à sa 38ème Réunion serait élaborée sur la base de cet atelier et de ces discussions bilatérales.

      M. Chappell a ajouté que pour ce programme volontaire particulier, l'opinion de tous les Membres devrait être recherchée. Si le programme était efficace, on pourrait s'attendre à ce que les Etats Membres en tirent les bénéfices. La proposition d'un atelier serait bienvenue si après consultation du CIML, aucune approbation possible de ce programme n'apparaissait.

      M. Farragher a soutenu la proposition de consulter tous les Membres du CIML sur le Projet, mais sans être trop rigide.

      En conclusion, M. Ehrlich et le BIML ont été chargés par le Président de faire avancer ce dossier suivant les principes arrêtés ci-dessus, en vue de l'adoption possible du MAA en 2003.

- number: '10.2'
  title:
  - spelling: eng
    value: Documents Horizontaux
  narrative:
  - spelling: eng
    value: |2+

      M. Magaña a rappelé qu'à la dernière Réunion du CIML, il avait été décidé d'élaborer un document de politique générale sur les documents horizontaux. Un premier projet avait été établi et discuté au Conseil de la Présidence. Ce document considérait et essayait de distinguer plusieurs sortes de documents. Certaines publications OIML, telles que le D 11, n'étaient pas simplement à caractère informatif mais servaient aussi de base pour la plupart des Recommandations Internationales OIML. Cela serait aussi le cas des documents sur les logiciels. Un certain nombre de commentaires qui ont été exprimés par les Membres du Conseil de la Présidence sur ce premier document, seraient reconsidérés par le Bureau en vue de leur présentation au Conseil de la Présidence à sa réunion en février 2003, sous forme d'un projet amélioré qui pourrait ensuite être soumis aux Membres du CIML en vue de son approbation à la prochaine Réunion du CIML. Ce document redéfinirait les différents types de publications OIML afin de clarifier leur emploi et leur mode d'approbation.

- number: '10.3'
  title:
  - spelling: eng
    value: Rapport sur l'étude Les Bénéfices apportés par la Métrologie Légale dans
      l'Economie et la Société
  narrative:
  - spelling: eng
    value: |2+

      M. Birch a donné un rapport détaillé sur son Etude Les Bénéfices apportés par la Métrologie Légale dans l'Economie et la Société qui avait été demandée par le Conseil de la Présidence. Son travail avait consisté à répertorier les études précédentes effectuées les années passées, et à les examiner avec l'objectif de tirer les leçons des travaux déjà accomplis, et sur cette base de trouver de nombreux critères économiques et sociaux qui pourraient être utilisés dans la détermination de l'affectation des ressources, pour fournir une analyse rudimentaire des coûts et bénéfices pour la métrologie.

      M. Birch avait commencé en contactant les Membres de l'OIML et en leur demandant de fournir les études et les rapports existant sur ce sujet et en donnant tous les commentaires qu'ils avaient à faire, bien que malencontreusement très peu de contributions aient été reçues en temps utile. M. Birch avait ensuite été chercher dans la littérature disponible sur ce sujet et compilé une bibliographie des études économiques faites dans le domaine de la métrologie et de la normalisation. Cette bibliographie comprenait près de 138 articles représentant quelques 10 000 pages de texte. La plupart des études traitaient essentiellement de la métrologie générale plutôt que de la métrologie légale, mais n'en n'étaient pas moins très pertinentes.

      En termes de bénéfices apportés par la métrologie légale dans l'économie, certains bénéfices évidents devaient être rappelés: la protection du consommateur, le contrôle efficace des stocks, le contrôle de la fraude, la résolution des litiges dans les prix des transactions, le bénéfice national total pour les exportations de matière première, la recouvrement complet des taxes et impôts gouvernementaux, et le soutien du commerce mondial des instruments de mesure.

      La métrologie de contrôle comportait certains bénéfices bien distincts:

      - Conformité accrue avec les réglementations (la législation devrait fournir une base solide évidente pour les mesurages); et

      Le rapport amélioré coûts-bénéfices (les solutions de la métrologie légale peuvent être de loin supérieures aux solutions alternatives dans un contexte politique).

      Les bénéfices de la métrologie légale pour la société consistaient en un soutien de la société civile (réduction des litiges), réduction des morts et blessures, et un environnement naturel préservé.

      Davantage de démarches devraient être entreprises pour évaluer ces bénéfices. Sept groupes d'études avaient été effectuées sur les impacts économiques des mesurages. Des études effectuées par le NBS (USA) entre 1965 et 1985 évaluaient les activités liées aux mesurages à 3,5 % du PNB

      des sociétés industrielles modernes. L'étude Poulson (1977) avait conclu qu'une véritable analyse des coûts et des bénéfices du système global des mesurages n'était simplement pas possible. En termes de valeur ajoutée, l'étude de Don Vito (1985), qui trouvait le chiffre de 3,5 %, était critiquée par certains experts.

      Les études effectuées par Mesures Canada dans les années 80 étaient intéressantes du point de vue de la métrologie légale: la valeur des biens échangés en utilisant des instruments légalement contrôlés était d'abord calculée, puis l'effet de mesures insuffisantes et d'autres excessives avec ces instruments était établi lors de la revérification. En prenant la différence entre ces deux valeurs relevées pour tous les instruments vérifiés, il apparaissait que chaque contrôleur pourrait éviter une perte d'environ $2 millions due à des mesurages hors normes. Cette économie couvrait le coût de vérification dans une proportion de 11 à 1. 65 % des mesurages hors normes étaient des mesurages insuffisants, 35 % étaient des mesurages excessifs et la valeur totale des mesurages réalisés à l'aide de ces instruments était de 40 % du PNB du Canada.

      Le NIST avait examiné des études sectorielles telle que les besoins en mesurages dans un marché public déréglemente.

      M. Birch a dit que trois études récentes devraient aussi être mentionnées:

      - L'étude du KPMG sur le "Institute for National Measurement Standards au Canada" basée sur l'évaluation des besoins provenant de l'application de la certification ISO 9000 et d'activités d'accréditation de laboratoires, bien que sa méthodologie ne soit probablement pas applicable à la métrologie légale.

      Le KPMG a aussi conduit une étude pour le CIPM sur l'Arrangement de Reconnaissance Mutuelle, et les économies qui pourraient en être attendues. Il fut demandé aux Membres de comparer les coûts de maintien des accords bilatéraux avec d'autres pays à ceux probables du maintien d'un accord multilatéral. La conclusion était une moyenne estimée d'une économie de $2 millions par pays, bien que cette évaluation était probablement surestimée. Une autre approche avait été de considérer le marché global entre les pays de la Convention du Mètre, qui était de $4 000 milliards. Si le MRA devait avoir un impact de seulement 0,1 % de ce marché, cela représenterait une économie de $4 milliards par an.

      Une série d'études ont été effectuées pour le Projet Européen de Mesurage. Ces études évaluaient l'impact de la métrologie à travers le nombre de brevets traitant de métrologie ou de mesurage, bien que ce critère ne semblait pas approprié.

      M. Birch a indiqué qu'il attendait les remarques des États Membres et Membres Correspondants de l'OIML sur ce rapport provisoire, notamment pour savoir à quelles questions particulières il faudrait répondre, quel type d'analyse économique ils croyaient nécessaire de suivre pour expliquer les enjeux de la métrologie légale à leur gouvernement, et quels domaines avaient particulièrement besoin d'être soutenus.

      Le rapport sur le progrès réalisé soumis au BIML comportait la bibliographie et un résumé des documents, soulignant les éléments clé de ces documents particuliers. Ce rapport sur le progrès réalisé sera rendu disponible à tous les États Membres et Membres Correspondants.

      M. Faber a insisté sur l'importance de ce travail pour chaque Membre ainsi que pour l'OIML lui-même et a mentionné que ce rapport serait l'un des documents fondamentaux à partir desquels l'Organisation conduirait sa réflexion pour l'avenir.

- number: '10.4'
  title:
  - spelling: eng
    value: Examen préliminaire sur les résultats du Seminaire Que Sera la Métrologie
      Légale en 2020 ?
  narrative:
  - spelling: eng
    value: |2+

      M. Faber a exprimé son impression que ce Séminaire avait été une "expérience" couronnée de succès, et avait été très positive. Un grand nombre d'idées différentes avaient été avancées couvrant beaucoup d'aspects de la métrologie légale. Il faudrait considérer la possibilité de tenir un

      tel Séminaire non pas nécessairement tous les ans, mais une fois tous les trois ou cinq ans, pour voir comment les divers thèmes évoluaient.

      Au bout des deux jours, Bernard Athané avait tiré un certain nombre de conclusions, mais il n'avait pas été possible d'aller plus loin lors de l'événement, car un bon travail exigeait le temps adéquat pour l'analyse; pour cela, il a été décidé que le Bureau compilerait un bref résumé des résultats, puis les compte-rendus seraient publiés et distribués - cela permettrait une plus grande réflexion pour en tirer toutes les conclusions possibles.

      M. Ehrlich a considéré que ce Séminaire avait été très efficace, beaucoup d'idées ayant été avancées à cette occasion, et il était très intéressant de voir que la plupart des présentations allaient dans le même sens. L'OIML pourrait maintenant s'appuyer dessus pour façonner l'avenir.

      M. Carstens a proposé d'envoyer un formulaire d'évaluation à tous les participants, afin d'obtenir quelques réactions.

      M. Vaucher a soutenu l'idée de répéter un tel Séminaire en temps utile, mais en se concentrant sur des problèmes spécifiques et en invitant quelques orateurs chargés du discours-programme pour introduire des points spécifiques.

