- number: '11.1'
  title: 1 Revision of the Directives
  narrative: |2+

    Mr. Dunmill told the CIML that he wished to explain in greater detail than had been possible the previous year what was happening about the revision of the Directives. This important project had now been underway for some time, with a Working Group, some of whose members were present.

    The background was that in 2006 the BIML had prepared a first working draft, including some proposals they had produced during some brainstorming sessions on what was wrong with the current working methods of the OIML for its technical work. A Working Group had met in June 2007, discussed the matter and come up with some more ideas, which had been put before the Presidential Council in 2008. The BIML had continued to work on this and had produced a second working draft. These proposals had been discussed at another Working Group meeting, which had quite significantly changed a number of the points in the draft. In March 2009, the Presidential Council had again discussed the Directives and had set some principles for the way in which the Directives should go forward. The Working Group had met again in June. Following this meeting, Mr. Dunmill had prepared a third working draft, which had been sent to the Working Group members in September 2009. This working draft was the basis of what Mr. Dunmill was now about to explain.

    Before talking about the Directives themselves, Mr. Dunmill explained that the present TC/SC structure had been set up in the early 1990s to replace the Pilot Secretariat and Reporting Secretariat format which had existed before that. Once again it was felt that the structure needed some revision, because it was becoming increasingly difficult to allocate certain measuring instruments to the existing TCs or SCs, some of which had a lot of work while others had no projects at all. One of the major problems (about which a number of Member States had complained) was the working method whereby one Committee might have a number of projects, meaning that a Member State had to become a P-Member of that Committee and, unless they changed their status every few months, they had to participate and to vote even though they might not be interested in some or even most of the projects being undertaken by that Committee, but possibly only in one of them.

    The present two tier structure, with TCs responsible for a wide range of topics, and SCs underneath them, had been taken over from the previous structure, in which the higher level Committee had had a management function over the lower ones. The current TCs did not exercise management functions over the SCs. This function had been abolished in order to speed the work up, so that drafts did not have to pass from the SC to the TC and then to the CIML. So it had been proposed that a new system would be needed in order to distribute the work more evenly and to encourage Member States to participate actively, but in such a way that they only needed to participate actively where they had an interest in the subject.

    The proposal of the Working Group was that there would still be TCs which would be responsible for producing and developing OIML publications. Mr. Dunmill explained that he was using publications as an umbrella term - the Committees could be producing Recommendations, Documents, Vocabularies or Basic Publications (such as, for example, that on the MAA or the Certificate System). The proposal was for a flat structure, i.e. not a two tier system of TCs with SCs under them, but simply a series of TCs. Members could still choose to be a P- or O-Member in the activities of that Committee, but each Committee would only be responsible for one publication. So instead of a Committee being responsible for a subject area, for example automatic weighing instruments, in which there were six different publications, that would now become six separate Committees. They might have entirely the same membership, or they might not. That would depend upon where the Member States' interests lay. Each Committee would be fully responsible for one publication, even if it had several parts - the metrological requirements, the testing procedures, test report format, all formed part of the same publication and would come under the aegis of one TC.

    In order to make it easier to know which Committee was responsible for any particular publication, a matter which had been extensively discussed in the Working Group meeting in

    June of the current year, it had been proposed that the TCs should each be named after the publication for which they were responsible. It was often a problem at the moment that people did not know where to look, or which Committee was responsible for a particular Recommendation, particularly in the case of those which were less frequently used. Under the proposed system, there was no arbitrary numbering system and it was immediately evident.

    It was proposed that on the OIML web site a number of different classifications could be used to help in identifying which Committees were involved in a particular domain of metrology, for example all the mass Secretariats would have a tag to say that they were related to mass measurement, and the same for volume measurement, flow measurement and so on. It would also be possible to allocate to the Committees a whole series of other labels, for example whether they were related to measurements for utilities, for protection of the environment, for medical matters, for road safety and so on, or also some structural or administrative type of allocation, for example, whether they were related to verification methods or certification, even those which fell under the scope of the MID. So the web site could be searched for any of these subject areas and each Committee could be allocated to as many of these as necessary. This was just a method of searching the web site to find all the relevant Committees for what was being sought. As an example, R 49 on water meters could fall into the categories of flow measurement, of utility measuring instruments and of instruments covered by the MID.

    The only remaining problem was what should be done with completely new publications which were under development. The proposal there had been that the TCs should be given the letter "n", for "new", in the numbering, so TC n1, TC n2, etc., until the publication was approved, at which point that Committee would receive its final publication number. Consideration had been given to allotting the Recommendation number at the beginning, but that would lead to some holes in the numbering system if a publication never reached the end of its development, and also, the finalized publications would not be in a logical, chronological order.

    As an example Mr. Dunmill showed a slide of the existing structure of TC 16/SC 4, which was responsible for two Recommendations, one Document and three projects. Its Secretariat was currently in the USA, and had 6 P-Members and 16 O-Members. In the new structure, there would still be the three existing publications, but they would be in separate Committees. Nominally, on changing the system over, the same countries which were running the Secretariats would be allocated to the new ones. This need not be the case, but for the sake of simplicity they could be transferred over in this way initially and then adjusted later if necessary. Similarly, initially the list of P-Members and O-Members could be taken from the old system into the new one and then adjusted according to countries' interest in the particular projects. Mr. Dunmill pointed out that in the illustration there were two TC n Committees instead of the previous three. This was because the third project in TC 16/SC 4 at the moment was the revision of an existing Document which would be covered by the TC covering D 22.

    Mr. Dunmill then moved on to the Directives themselves. The aim of having new Directives was that they should be rather better adapted to the size of the OIML as an organization and the kind of work done by it. The existing Directives were basically a copy of those used by ISO for producing their standards, but ISO was a much larger and more complex organization covering a lot more standards, and in many cases they had a heavier approach than was necessary in the more modestly sized OIML.

    The Working Group had also looked at how work could be speeded up. There were always complaints that Recommendations and other publications took too long to reach completion, so they had also looked at the procedures from this point of view. The Directives should also be simpler and easier to follow, which should encourage people to follow them more closely than was the case at the moment. In a number of cases Secretariats were not following them, and States were not following them in commenting on draft Recommendations. The current draft of the new Directives was fairly similar to the existing ones - there was no intention to change the structure. It talked of the scope of the Directives, the kinds of publications it covered, the structures of the OIML (meaning the Conference, the CIML, the TCs, the President and the BIML) and what they did in relation to the technical work. It then explained how the TCs should operate, what the procedure was for developing a publication, how progress was reported so that the CIML was aware of what was going on, and, finally, the process for appealing against any decisions which people were not happy with. There was currently an appeals procedure in the Directives, though Mr. Dunmill was not aware of any case in which it had been used, but it was an important part of the necessary feedback. There were also a number of flow charts to show in graphic form how the work would proceed.

    Regarding the operation of the TCs, Mr. Dunmill would not go into all the relevant points but the TCs would be set up in a similar way to what happened at present, beginning with a call for interest in a particular subject for which a TC was about to be set up. They would still have a Secretariat, P-Members, O-Members and liaisons; the proposal was that there would need to be at least six Member States interested in being P-Members, and those six countries should come from different regions, in order to prevent the OIML from developing publications of only regional interest.

    The terms of reference for each TC would be discussed by that Committee and then be approved by the CIML President and, as at the moment, P-Members would be obliged to vote. However, slightly stricter procedures would be put into place to ensure that those who did not actively participate would have their status changed to that of O-Member for at least 12 months. This was to try and speed up the progress by ensuring that people did participate when called upon to do so, and did not hold up the advancement of the publication by not voting. Also, the Secretariat would be allocated for an initial three-year period and then the TC itself would vote on the renewal of that mandate as Secretariat every three years.

    Regarding timing, the Directives would say that the Committee draft should be produced within six months of the Committee starting work on the subject. The time allowed for commenting on Committee drafts would remain at three months. The possibility of reducing this time, in order to accelerate the work, had been much discussed, but a number of people had felt that, given the need in many cases to translate drafts, to distribute them to industry within each country and to get comments back from them, collate the comments and retranslate them, three months had to be allowed. It was proposed that the time between Committee drafts should be no more than eight months, and the final draft should be sent to the BIML within three years of starting the project. It was hoped that this would prevent projects from rolling on for many years without reaching a conclusion.

    Similar rules were envisaged for decisions taken by TCs, whether those decisions were taken during or outside a meeting. These rules were basically the same as the ones operating at the moment, the main idea being that when decisions were taken outside a meeting, all members of the Committee were consulted. It was not always possible for everyone to attend a meeting and decisions taken in meetings could cause problems later if not enough members had been present. Again, P-Members who abstained or voted no on a draft would have to make

    explanatory comments. Comments could be given with a yes vote; but the Working Group wanted to try to encourage people to vote no where appropriate. At the moment, a lot of people voted yes but then added very substantial technical comments. The Working Group wanted to create a situation where voting yes meant the person was happy for their comments not to be taken into account. It would no longer be acceptable to vote yes but make it a condition that a long list of technical comments be taken into account. A person who had a long list of comments was in effect not happy with the draft, and should vote no. It was hoped that this point would be reinforced in the Directives.

    Regarding management of the technical work, many issues were currently divided between the CIML President and the BIML. Most of the management decision functions would rest with the CIML President, who would normally appoint a small committee of CIML Members to assist him. This was similar to what happened at present, it was merely being formalized. This would make the President formally responsible for all the long term programming of work, approving projects, approving the establishment of a TC once the procedures had gone through to seek interest in a new TC and to see if there was a Secretariat that would be willing to take on the work. The President would be responsible for allocating the initial Secretariat; the TC was responsible for re-electing it, but it had to be appointed in the first place and allocated to one of the interested countries. He would also be responsible for approving the initial terms of reference and then for trying to identify alternative resources if progress made by a TC was not very good. In some Committees, there came a point where work tended to stagnate, and it might be possible to find some other means of achieving some progress, possibly by employing a consultant or using experts in another country.

    The President would also confirm the CIML voting results since when a vote was held, somebody had to declare whether it had passed or failed. He would also be responsible for the resolution of disputes between TCs or within TCs. There would probably be a small committee of CIML Members to help with these tasks. The BIML would then take care of a number of the administrative and procedural matters which would arise from the Directives.

    The procedure for developing a Recommendation or publication of any kind was basically the same as at present; there would be an initial project proposal, it would then go through a number of working drafts and committee drafts to a final draft, following which there was the existing approval and sanction by the CIML and the Conference, followed by publication. There would be the same five-year review period as under the present system.

    The one area where there would be a slight difference would be at the level of the final draft, where, once the committee draft had been approved by a TC, the final comments from TC members would be added by the Secretariat. The Working Group also wished to encourage the Secretariats to set up a small editing committee to ensure that the draft which they sent to the BIML was as good as it could be - at present, drafts sometimes arrived in which the language was very much in need of editing. The BIML would then undertake the final editing, layout, etc. of this final draft, and that would then be made publicly available as a final draft Recommendation, much as ISO standards appeared as Final Draft International Standards. It would normally be expected that no technical changes would be made to that draft. This should mean that at the stage when it went for CIML approval, the answer would be either yes or no. There might be some small editorial changes but there would be no technical input because the countries that were interested in that project should have been involved in it during its development and should not be bringing technical comments to the Recommendation at that late stage.

    It was also proposed to abolish the current preliminary online ballot. This dated from the time when all voting had been done by post and was used to gauge support for a Recommendation before it was brought before a CIML Meeting. In the current arrangements it had no function other than to confuse people, who had the impression that they were voting twice on the same publication. Doing away with this now superfluous duplication would save a considerable amount of time.

    Finally, Mr. Dunmill explained, the approval procedure which was used would depend upon the type of publication in the same way as at present. For example, Recommendations had a different procedure from that used for Documents. Details could be found in the full Directives. The Conference would then sanction a report produced by the BIML on all those Recommendations approved since the last Conference.

    CIML approval would normally take place during a Meeting, with the possibility of using online approval between Meetings, as was currently the case, but of course, if this happened, it was absolutely essential for Members to vote. At present there was a significant problem with Members who did not vote in the online voting process. If the necessary majority was not reached, the project had to be presented to the next year's CIML Meeting.

    While writing the last draft it had occurred to Mr. Dunmill that it might be possible to apply the same rules to the approval of everything. It complicated the Directives to have a series of different voting procedures, and people had to remember which procedure was being used at any one time. The procedure for Recommendations in the Directives was the only OIML decision procedure which was given in the Convention at all; those used for approving Documents, by a lesser majority, had been agreed on at a later date. Mr. Dunmill was of the view that this should be considered, as it would make the Directives so much easier to follow. After the final draft stage, all publications would be openly available, so seeking a higher majority would not cause any delay. The Conference would then simply have a list of all the publications which had been approved since the last Meeting and would vote on that report.

    Concerning publication, if there was a final draft which could not have technical changes made to it, this meant that the formal and final publication of a publication was possible immediately after it had been approved by the CIML, since there was no extra work for the BIML to do at that stage - it had been done at an earlier stage. As was currently the case, it was proposed that no more than two amendments could be made for technical or editorial reasons - the publication would have to be republished after that - and that a five-year review period be used, as was the case at present.

    Mr. Dunmill said that the purpose of explaining all this to Members at the current Meeting was to make them more aware of some of the details of what was involved. The document he was explaining was the culmination of work done by the BIML and by the Working Group over several meetings. It would be sent out to all CIML Members for detailed consideration and comment but he had believed it important to give them the chance to hear about it at this point so that any initial reactions or questions could be discussed while everybody was present.

    Mr. Johnston opened the floor to questions.

    Mr. Miki asked how the so called flat structure consisting of perhaps more than a hundred committees would be managed, and what would be the exact position of the working committee assisting the President.

    Mr. Dunmill replied that there were at present between 60 and 70 SCs. There would be about 160 TCs under the proposed new system. The review and management was currently done by the President, Vice-Presidents, Bureau staff and sometimes one or two other people, and involved going through every project on the books to see what progress there had been, just to see what was or was not happening. Under the proposed new system, there would be a similar management review but more formalized and with more powers.

    Mr. Miki asked for confirmation that the roles of the BIML and the President and Vice Presidents would remain the same under the proposed system.

    Mr. Johnston said that this was not necessarily the case; there might be a small working group made up of other Members. The practice had been to take advantage of the Presidential Council Meeting in March to perform the review, but this was not a hard and fast rule, and if others were interested in participating in the work, that could be looked at.

    China commented that at present some TCs had no work for several years, which was a waste of resources. Under the new system, a TC might be working on a project for three or four years and then have no work in hand, possibly for several years. How would this be addressed?

    Mr. Dunmill agreed that a TC for a particular Recommendation might not have much to do. They might have work to do in answering inquiries and so on because they would still remain responsible for that publication, so any enquiries received by the Bureau during the five-year review period would be passed to that Committee. As far as not having any work to do, it could still be that the same people were responsible for a number of the new TCs. As in the example of TC 16/SC 4, a Committee might be responsible for several different kinds of publications. Initially at least, each of the same people would be responsible for each of the new TCs. The same people would be working on the same projects as at present but within what were nominally separate Committees. Having separate Committees was a way of ensuring that only countries really interested in each project were participating in it. There was nothing to stop anyone being responsible for the same publications as at present.

    Mr. Lindlov thought the proposed structure was a good one which, in a small organization like the OIML, would enable Members to concentrate on the items which really interested them rather than work in several sectors. However, in some areas, such as the example of automatic weighing instruments mentioned by Mr. Dunmill, where there were several Recommendations, they might end up with six or seven Secretariats responsible for the topic. He anticipated that in most cases the same experts would like to participate in these activities, in which case such a person would have six different meeting schedules. He wondered whether the BIML had thought of any kind of practical cross cooperation in this sort of situation.

    Mr. Dunmill agreed that this was one of the administrative and procedural matters for which the Bureau would be responsible. In practice, he did not think the problem would arise, because when projects were handed over the Secretariats would probably remain the same for a while, but it would be necessary to ensure that there was good cooperation between Secretariats working on related projects. If, for example several publications on automatic weighing instruments were being revised at the same time, and they were under different Committees, then there would be not only the problem of scheduling meetings and so on, but also of ensuring that the Recommendations did not diverge from each other. That problem already occurred in the existing structure, because some requirements were common between Recommendations and the BIML tried to ensure that these were harmonized. The Bureau

    would be responsible for handling meeting schedules. He did not think the number of meetings and amount of work in progress was such as to lead to a major problem, but if there were any, the BIML would be responsible for managing them.

    Mrs. Lagauterie expressed appreciation for the efforts being made to improve the work and its results. She thought the ideas were on the right lines. She had two questions. The first concerned the reference, under the heading of "President's responsibilities" to appointing small committees: she would like reassurance that the leaders of the TCs, and in particular representatives of any conflicting groups within TCs, would not be excluded from these small committees. If the small committees excluded members of the TCs, for example consisting mainly of Bureau staff, this could be removing responsibility from the TC Secretariats to the President.

    The President replied that the intention had not been to have the committee made up just of Bureau staff. This was a review done each year just to ensure that progress was being made, and to bring any issues to the attention of the TC. He had no hard and fast idea of the composition of the committee, merely that it should be kept at a manageable small size. Practice in the past had been to meet after the March Presidential Council and go through the output of each TC and SC, asking the Bureau to contact any Secretariats where there were issues.

    Mrs. Lagauterie's second question concerned the adoption of Guides. She had read in the working document that Guides might be drawn up by the BIML and approved directly by the President, apparently without CIML Members even being informed that such work was in progress. This made her wonder whether the President and Bureau were extending their powers at the expense of CIML Members.

    Mr. Kool said there were references in Guide G 16 to two kinds of Guides. Those prepared by TCs or SCs went through the normal processes and were approved by the CIML for final publication. There were also Guides which were not developed by the OIML but were published by the OIML, for instance those from the Joint Committee for Guides in Metrology, which was responsible for the Guide on Uncertainty and the VIM. These were prepared within the JCGM, and in their preparatory stage they were distributed to the OIML for comments, and once finalized they were published by the OIML as OIML Guides, which required the approval of the President.

    Mr. Magaña added that there were some Guides which were just compilations, like the Guide for CIML Members, which was just a compilation of other documents, with nothing to vote on.

    Mrs. Van Spronssen asked whether there was some shift of responsibility from the CIML to the President.

    Mr. Dunmill replied that some responsibilities would shift to the President under the new system, including approving projects. Currently the CIML approved new projects, but this caused problems because it could only be done once a year, at a CIML Meeting. The question was whether, having identified a need, approved the setting up of a TC to undertake a project, expressed their willingness or otherwise to participate, and supervised the setting up of a Secretariat, it was absolutely necessary for the CIML also to re-approve the project. Responsibility had thus shifted to a minor extent, but it was a question of how the CIML's time was most profitably spent - the project had by this time already passed through a set of rules approved by the CIML. The Directives would contain rules to set out how many

    countries were required, the procedures to be applied, and how many countries were required to set up a new project and therefore a new TC. The CIML would approve these Directives at some point. If the required number of countries were interested, the question was whether it was necessary for the CIML to re-approve the setting up of the Committee. The task was now one of confirming that the rules approved by the CIML had been properly followed in the setting up of the Committee, and the Working Group had felt that it was sufficient for this to be done by the President.

    Mrs. Van Spronssen thanked Mr. Dunmill for his explanation and asked him to elaborate also on the setting up of the TC: CIML Members surely should have an opportunity to comment on the membership of the TC.

    Mr. Dunmill pointed out that there was a CIML approval stage, but explained that the Working Group was hoping to avoid too many technical comments being made at this stage, which would cause changes in the draft already seen and perhaps lead to other Members to be unhappy with it. They wanted Member States who were interested in the work to participate in the TC and not to allow those who had not been prepared to involve themselves in the TC's work to introduce technical comments at the CIML approval stage. They could vote no if they were not happy with the Recommendation, and should be encouraged to do so, but should not have the chance to demand that their comments be included. Recommendations would of course go to all CIML Members for a three-month comment period. There might be editorial problems at that stage, but there should not be technical problems.

    Mr. Issaev had problems with the item "final draft and CIML approval with no preliminary on-line ballot". He felt that it would be better to use the wording "as a rule no on-line ballot", because, as discussed before, sometimes it was necessary to consult different countries before it came to the stage of final ballot.

    Mr. Valkeapää said that he was opposed to the Russian proposal: with the new system it was possible to go straight to the final vote, and then if it was not passed it would have to be elaborated further. It general he warmly welcomed the clarification of decision making. This would harmonize OIML practice with other international organizations such as ISO and the IEC where voting no was not negative, it merely indicated that a Member had something to say. Then when it came to the stage of final draft, when only editorial and no technical changes could be made, Mr. Dunmill had referred to no more than two amendments being made. He wanted to know whether these amendments would be made after publication, or would be related to the editorial changes referred to.

    Mr. Dunmill said that, as he believed was the case with ISO standards, the amendments referred to were after publication. When there were small changes to be made for some technical reason, as with Recommendations at present, two amendments could be made to a publication but after that there had to be re-approval of the whole text.

    Mr. Issaev said that in making his proposal he had had in mind another item, concerning TC decisions. The last sentence of this was "the yes vote means that they are happy that the TC draft may be accepted as it is. There is no guarantee that comments will be accepted".

    Mr. Dunmill said that he had forgotten to mention one matter which had a bearing on the Resolution about to be shown. This was that the current Directives consisted of two parts, the procedural part, which was what had just been discussed, and a second part, on the presentation of Recommendations - how they appeared on the page, what the rules were for presenting the information and so on. As well as approval of the first part, the Resolution was

    to include the setting up of a small Working Group to manage the presentational aspects. CIML approval was necessary for the procedural section, because this affected how all its work was done, but the presentation of Recommendations did not need such approval.

    Mr. Ehrlich thanked Mr. Dunmill for his clarification. He said that on first reading the wording of Draft Resolution No.13 he had not been sure what it referred to, and he proposed that the second part, relating to the presentation of the work, be modified to say explicitly "Directives Part 2".

    Mr. Dunmill said that he had not done this because it had not been clear whether the final version of the Directives would have two parts or three. This was because of the Model Recommendation which had been used for the training of TC/SC Secretariats. If this became a third part of the Directives, it would be in the same position as the presentational section; for this reason, the Resolution read "part(s) of the Directives", and refrained from giving a number to the presentational part. This could be changed if preferred.

    Mr. Ehrlich said that he would prefer the wording "Part 2 and possibly a new Part 3", as the original wording remained confusing for those who had not heard the explanation of it.

    Mr. Valkeapää considered that the Directives for technical work were of the highest importance and should be approved by the CIML, including the presentational part, since it would be binding. He was not sure what was gained by making approval so complicated.

    Mr. Johnston agreed to take this point into consideration.

    Mr. Miki said that he saw no particular reason to include the words "as soon as possible" in the Resolution.

    Mr. Johnston agreed to remove these words, though he still hoped that the proposal could go out to Members and be put in place with the least possible delay.

    Mr. Kool explained that in response to the comment made by Finland he had changed the wording of the draft Resolution. This now read that approval of parts 2 and 3 would follow the procedure for Guides, which only required the approval of the CIML President. Finland had commented that these parts should be considered mandatory and therefore should be decided by the CIML. The BIML felt, however, that the amendments to the presentation of publications might be ongoing, with the possible addition of templates, changes in international standards, etc. It had to be realized that this part contained general principles for the drafting and presentation of Recommendations. It did not touch on their content. It was a sort of style book - it said "this is how you shall write units", "this is how you shall write symbols of units", "this is the structure of a Recommendation", and things like that. The suggestion was that wording should be found for the Resolution which said that the issues or subjects which would be in the style book would be part of the decisions of the CIML but the BIML would then develop the necessary presentational guidelines. That way the BIML would be free to change presentation when necessary.

    Mr. Valkeapää mentioned that his comment had been made on behalf not only of Finland but also of the two other countries he was representing.

- number: '12'
  title: 1 Term of the mandate of the CIML President
  narrative: |2+

    Mr. Johnston explained to Members that his term as President would expire just before the 2011 CIML Meeting. Soon after the current Meeting a call would be sent out for candidates to run for President. Candidates would be considered and voted on at the Orlando CIML

    Meeting in September 2010, and the individual selected would begin his or her duties at the beginning of the 2011 CIML Meeting.

    Mr. Kool read the relevant draft Resolution No.21.

- number: '13'
  title: 1 45th CIML Meeting, 2010
  narrative: |2+

    Mr. Johnston asked Mr. Chuck Ehrlich to speak.

    Mr. Ehrlich said that it was his privilege to re-confirm the invitation of the United States to host the 45th CIML Meeting in Orlando, Florida. The dates were September 20th to 24th 2010, a Monday to Friday, at the Doubletree Hotel at the entrance to Universal Studios. This was in the South West part of Orlando, in the direction of the Disney Complex.

    In general, Orlando had good international flight access, which had been one of the reasons for choosing this venue, so Mr. Ehrlich hoped that delegates would be able to get there without problems. The hotel was a 15 to 20 minute drive from the airport. Holding the Meeting in Orlando would be less expensive than doing it in Washington DC or other major USA cities. The hotel rate was $99+ tax per night, which was a good rate for that area.

    Orlando was generally known as a tourist destination, as was Mombasa. While Mombasa was right on the ocean, Orlando was located about one hour's drive from the beaches, in the center of Florida, which was in the East of the USA. The weather was likely to be warm to hot. Besides the beaches there were many other tourist destinations in the vicinity of the hotel, and the hotel had a tourist desk which could assist delegates in making arrangements. Mr. Ehrlich had brought some tourist brochures, which delegates were welcome to look at.

    The Kennedy Space Center was also in the Orlando area, and Mr. Ehrlich hoped to arrange a visit to it. He also hoped that a speaker from the NASA centre would come to the Meeting and give a talk on metrology at NASA. A space shuttle launch was scheduled for that week, but could not be guaranteed as there were often delays in space programs.

    Mr. Ehrlich looked forward to welcoming delegates and hoped that the USA would be able to keep up the high standard of hospitality they had received in Mombasa.

