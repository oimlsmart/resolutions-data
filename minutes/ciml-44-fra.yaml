- number: '12.1'
  title: Term of the mandate of the CIML President
  narrative: |2+

    Mr. Johnston explained to Members that his term as President would expire just before the 2011 CIML Meeting. Soon after the current Meeting a call would be sent out for candidates to run for President. Candidates would be considered and voted on at the Orlando CIML

    Meeting in September 2010, and the individual selected would begin his or her duties at the beginning of the 2011 CIML Meeting.

    Mr. Kool read the relevant draft Resolution No.21.

- number: '12.2'
  title: Term of the contract of the BIML Director
  narrative: |2+

    All guests, BIML staff and observers were asked to leave the room; only CIML Members were allowed to stay. Mr. Johnston proceeded to give Members information concerning the report drawn up and submitted to the President by the external auditor who had audited the 2008 BIML accounts and also the management of the BIML during that same period. As a conclusion, the CIML voted to advertise the position of BIML Director in 2010 with the aim of either appointing a new Director or reappointing the present Director.

- number: '13'
  title: Future meetings
  narrative: "\n"
- number: '13.1'
  title: 45th CIML Meeting, 2010
  narrative: |2+

    Mr. Johnston asked Mr. Chuck Ehrlich to speak.

    Mr. Ehrlich said that it was his privilege to re-confirm the invitation of the United States to host the 45th CIML Meeting in Orlando, Florida. The dates were September 20th to 24th 2010, a Monday to Friday, at the Doubletree Hotel at the entrance to Universal Studios. This was in the South West part of Orlando, in the direction of the Disney Complex.

    In general, Orlando had good international flight access, which had been one of the reasons for choosing this venue, so Mr. Ehrlich hoped that delegates would be able to get there without problems. The hotel was a 15 to 20 minute drive from the airport. Holding the Meeting in Orlando would be less expensive than doing it in Washington DC or other major USA cities. The hotel rate was $99+ tax per night, which was a good rate for that area.

    Orlando was generally known as a tourist destination, as was Mombasa. While Mombasa was right on the ocean, Orlando was located about one hour's drive from the beaches, in the center of Florida, which was in the East of the USA. The weather was likely to be warm to hot. Besides the beaches there were many other tourist destinations in the vicinity of the hotel, and the hotel had a tourist desk which could assist delegates in making arrangements. Mr. Ehrlich had brought some tourist brochures, which delegates were welcome to look at.

    The Kennedy Space Center was also in the Orlando area, and Mr. Ehrlich hoped to arrange a visit to it. He also hoped that a speaker from the NASA centre would come to the Meeting and give a talk on metrology at NASA. A space shuttle launch was scheduled for that week, but could not be guaranteed as there were often delays in space programs.

    Mr. Ehrlich looked forward to welcoming delegates and hoped that the USA would be able to keep up the high standard of hospitality they had received in Mombasa.

- number: '13.2'
  title: 46th CIML Meeting, 2011
  narrative: |2+

    Mr. Johnston said that an informal invitation had been received for 2011: Mr. Klenovský was pleased to announce that the Czech Republic was prepared to hold the 46th CIML Meeting in Prague in 2011. The dates should probably be adjusted in view of the fact that from

    October 17 to 21 there would be a CGPM Conference in Paris, and some delegates might wish to attend both events. The preliminary intention was therefore to organize the CIML the week before the CGP.

- number: '14'
  title: Other matters
  narrative: |2+

    Mr. Birch, at the President's invitation, told Members that the additional Draft Resolution 25 summarized many of the points he had made in his presentation to the Seminar and which had also been fully discussed in the Regional Organizations' Meeting the following day. It had the main purpose of facilitating global trade for developing countries, particularly in the area of prepacked goods, where these could add value to the exports of high value products. Developing countries encountered the difficulty of having to meet a multiplicity of requirements. The World Wine Trade Group was proposing to make changes to labeling requirements for wine which were not in conformity with OIML requirements and which, Mr. Birch believed, would not facilitate global trade. The proposed Resolution attempted to address those issues by pointing out the increasing importance of prepackaged foods and beverages, the problems that developing countries had in meeting model requirements, the review of the long-standing OIML R 79, arising from the World Wine Trade Group labeling agreement and the 2006 OIML Seminar on prepackaging. It was recommended that the OIML Recommendations on prepackaged goods be universally adopted to facilitate global trade and to provide a level playing field for developed and developing countries, and that OIML Members bring this Resolution to the attention of their national WTO/TBT Enquiry Point.

    Mr. Richard stated that he did not understand what "universally adopted" meant for OIML Recommendations.

    Mr. Birch replied that he meant that these Recommendations should be adopted without amendment and by all Member States.

    Mr. Mason said that he found himself in some difficulty here; the Resolution was one which he would wish to support, but he had experts within his own agency that he would want to consult before agreeing to such a Resolution. If he had had 24 hours' notice he would have been able to conduct such a consultation, but, not having had this opportunity, and not knowing whether giving support might give rise to difficulties for his country with their obligations within the European Union, he could not do other than abstain.

    Mr. Richard said that Switzerland and Germany would also abstain for the same reason; Mr. Miki said that Japan would have the same problem. Mr. O'Brien pointed out that TC 6 was already reviewing R 87 and R 79, so it seemed to him premature universally to adopt Recommendations which were not fixed at the moment. Mr. Ehrlich also supported the UK's view.

    Mr. Valkeapää said the three countries he was representing had the same problem, not having had time to consult experts.

    Mrs. Lagauterie said France was in the same position, though of course supported the principle involved.

    Mr. Johnston told the Meeting that, based on the comments that had just been heard, he recommended that the Resolution should be withdrawn. He invited comments on his proposal it could be withdrawn at once or formally voted on later in the Meeting. Based on the reaction of those present, he took the option of withdrawing the Resolution.

