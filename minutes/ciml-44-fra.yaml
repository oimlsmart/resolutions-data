    ## Resolution No.13

    Mr. Ehrlich appreciated that this draft Resolution had been modified in response to his comments, but felt that the modification should go a little further. He found the second sentence confusing and wished to add, after the word "presented", the words "in Part 2 of the current Directives". This was to make it clear that this was the part being referred to.

    Mr. Dunmill said that the reason for not putting "Part 2" was that it was not certain whether there would only be two parts in the future; they had wanted to cover both eventualities so as to avoid having to come back to the Resolution later. There was doubt over the status of the template which had been used for TC/SC training so far, which was a model of how a Recommendation should be written and what it should include; it was possible that it might eventually form a third part of the Directives, in which the words Mr. Ehrlich was referring to might belong. Currently Part Two was the only part which dealt with how Recommendations should be written, but it was possible that a future third part might go further with this.

    Mr. Valkeapää thanked the Bureau for partially taking into account the comments made the previous day. However, he thought more things should be altered. For example, in the first paragraph, the wording no longer reflected the fact that in the past this project had several times been seen as a priority. He would like to see in the first paragraph a demand that this revision should be completed in time to be presented to the 2010 CIML. He also still found it artificial that one part would be approved by the President and another by the Committee. He wanted to propose that the Directives be in one part only, any other parts to be labeled "guidance documents", with links to the Directives, in which case it was acceptable for them to be approved solely by the President. But any part which was mandatory should require approval by the Committee.

    Mr. Miki was also concerned about the method of approval. He felt that the first check of the whole document should be done by the CIML. He found it confusing which part would be checked by whom.

    Mr. Kool suggested that in the second paragraph, instead of the word "parts", a term such as "guidance documents" should be substituted. The words "second part" would be deleted, and in the third paragraph the words "the contents of these guidance documents will be defined in the Directives".

    Mr. Dunmill did not think it was important whether the guidance section was or was not considered to be part of the Directives. It was only there because it had arrived in that form from the ISO Directives upon which this document had been based. But there should be no doubt that the sections dealing with presentation and format were intended to be mandatory for all Secretariats.

    Mr. Kool read the amended Resolution.

    Mr. Valkeapää asked for the word "supplementary" to be added to the second paragraph; also he would still prefer mention to be added of the necessity of presenting the finished Directives to the CIML for approval at its 2010 meeting.

    Mr. Kool asked whether this would be acceptable.

    Mr. Ehrlich asked whether it was the case that the guidance documents would supplant the Directives Part 2.

    Mr. Dunmill agreed that that seemed to be what was proposed. He was concerned that something called "guidance documents" should be mandatory. The only reason for these sections not being approved by the CIML was to make their progress faster - for example, if there were a decision to change the style of presentation, that would not have to go back to the CIML for approval. The idea was indeed that they should replace the existing Part 2 and possible Part 3, so that the current Part 2 would be called a guidance document and if there were a new template, instead of being called Part 3 it would also be a sort of guidance document. But if they were compulsory he was not sure the term "guidance documents" should be used.

    Mr. Ehrlich felt that matters were proceeding in a dangerous direction. These were fundamental documents, they needed CIML approval, and this should not be sacrificed in the interests of saving time. In his view the Committee should say that they wanted to see the work on the Directives Part 1 proceed and that the Directives Part 2, and Part 3 if there were one, should be prepared by the BIML and subjected to CIML approval.

    Mr. Kool commented that Part 2 of the present Directives would not be replaced solely by the guidance documents - there would also be, within the Directives, a list of issues to be described in the guidance documents, and this fact would make the use of the guidance documents mandatory for TC Secretariats in certain situations. The situation was similar to that used in WELMEC, where there were guidance documents which became mandatory in certain actions, such as a notified body doing a type approval. As he saw it, there were two options, either to follow what was on the screen or to forget the idea of different ways of approval and have the full Directives approved by the CIML.

    Mr. Dunmill said that he considered the second of the above options to be clearer and preferable.

    Mr. Kochsiek thought the proposal needed more consideration. He suggested retaining only the first sentence and deleting the others.

    Mr. Ehrlich said he had been on the point of making an identical proposal.

    Mr. Dunmill asked for clarification as to whether, in that case, only Part 1 of the Directives was at issue; further parts were not yet prepared as they had been waiting for completion of the first part. He did not want to guarantee that Part 2 would be ready in time for the 2010 CIML.

    Mr. Valkeapää said he would be happy with the use of the first paragraph alone, but in view of Mr. Dunmill's statement about possible delays to the preparation of further parts, he wondered whether it would be possible to use Part 1 before the remainder was ready. Thought should be given to the practical matter of structures.

    Mr. Kool saw no problem with this and Mr. Dunmill agreed. The amended Resolution 13 was read and passed without any 'no' votes or abstentions:

