- number: '3'
  title: 1 BIPM
  narrative: |2+

    For the BIPM, Mr. Pedro Espina thanked the CIML for inviting him and emphasized the importance of maintaining links between the two Organizations. He also thanked the Kenyan Ministry of Trade for hosting the Meeting in their beautiful country. He apologized for not being in a position to speak of any rapprochement between his Organization and the OIML, though he would be happy to listen to comments on that matter.

    Mr. Espina told delegates that he would speak on the membership of the BIPM, comment on a couple of items of news which he thought would be of interest to them, summarize some current common activities between the BIPM and the OIML and give notice of some future events which might be of interest.

    The BIPM currently had 53 Members, 47 of which had signed the CIPM MRA. Croatia and Kazakhstan had both become Members in December 2008, and Kenya would become a Member from January 2010. Associates of the General Conference included new Members Peru, Paraguay and Ghana, all of whom had been welcomed in the current year.

    BIPM countries were organized in 5 regional Metrology Organizations: SIM in the Americas, AFRIMETS (shared with the OIML) in Africa, EUROMET in Europe, COOMET for Eastern European and Asian Countries and APMP in the Asian Pacific region. There were currently no Members or Associates in the Gulf States but work was in progress with colleagues in the Gulf States to change that.

    The CIPM had met in October at the BIPM. A number of items had been considered; two of special interest to the OIML were:

    - Professor Michael Kühne from Germany had been appointed Deputy Director and Director Designate from December 2009, with the result that Professor Ernst Gobel from the PTB would have to resign as President, since the Metre Convention did not allow the President and Director to be of the same nationality. Dr. Barry Inglis from Australia had been elected President in his stead.

    - Regarding the definitions of the SI, the redefinition of four of the base units was currently being considered. These were the kelvin, the ampere, the mole and the kilogram. The CIPM had noted that: "the consensus on the redefinition of the kilogram in the near future would be based on the Planck constant. Some of those present might know that there had been a dispute between results from the Planck constant experiment, the Watt balance, and those from the Avogadro experiment, the silicone sphere. The CIPM had felt that it was more appropriate to do the three definitions based on the Planck constant".

    Previous possible rival units had now been rejected. Future SI definitions would be expressed in terms of explicit constant definitions as opposed to their present status as explicit unit definitions. The difference was subtle but important. Definitions would no longer be talking about units of measurement but about universal constants - the electron charge, the Boltzmann constant, the Avogardo number, the Planck constant. Four definitions would thus be changed.

    - The CIPM had decided that they will allow, for the purposes of participation in this CIPM MRA, two paths for the definition of traceability of calibration and measurement capabilities:

    1) a primary realization of the unit of measurement in the applicant's own laboratory, or

    2) traceability from someone else who had a primary realization of the unit of measurement.

    Mr. Espina then invited Members to read more of the details in their own time. Caveats were listed in the notes and he said that Members could raise points with him later in the week if they wished.

    - World Metrology Day, shared by the OIML and the BIPM over the last number of years, was 20 May, the date upon which the Metre Convention was signed in 1875. The 2009 campaign had been on the subject of Measurement in Commerce, with the slogan Metrology Underpinning Economic Development. 50 posters, in 25 languages, had been produced for 50 different countries, as well as a web site and leaflets. There would be partnership again for the 2010 campaign, which was to be on the topic Measurement in Science and Technology, with the slogan Metrology, a Bridge to Innovation. Members might like to note the date so that they could prepare national events to coincide with the international ones. It had been decided that there would be just one poster, available in English and French, not posters for individual countries. Graphics and software would be made available for countries wishing to make their own posters.

    - The OIML and the BIPM had a joint program with UNIDO and AFRIMETS for the strengthening of metrology, both legal and scientific/industrial, in Africa. This project, known as the AFRIMETS UNIDO project, was bringing in almost a million US dollars to try to support the infrastructure of AFRIMETS, specifically to set up the comparisons that were needed in Africa to prove the equivalency of measurement between the various countries and to develop the committee structure of AFRIMETS. A two week long metrology school was being planned for 2011, to be held in Kenya for the benefit of metrologists from all countries in Africa, who would be invited to learn about various topics in metrology. Some Members might have seen a survey the previous week about their measurement and training needs, upon the results of which the curriculum would be based. The OIML and the BIPM had co-written the appeal sent by AFRIMETS to UNIDO which had secured funding for the project.

    - Members might recall that the joint OIML-BIPM Action Plan called for the creation of promotional documents in four areas of metrology. These were: applications of metrology to the environment, to trade, to safety and to health. They were grateful to the South African NMI for lending them Sara Prins, their deputy director for science and technology, who would be in Paris until early December working on the development of these four leaflets with the BIML and himself. These would be A4 sheets folded into four sides, in language tailored for talking to government officials about the importance of metrology in those four areas, so it was not documentation for those present, who all knew metrology very well, but for those who empowered metrologists' work at government level.

    - Future events of possible interest to those present included:

    0 In November, at the BIPM, a workshop on physiological quantities and the SI units, with the purpose of coming to grips within the metrology community with how to develop the SI in the future to accommodate physiological quantities. At present, the

    only physiological quantity that existed among the base units was the candela, which was tailored to a response of the human eye; but metrology was of importance in many other aspects of the human body, and this would be discussed during that workshop.

    0 In February, at the BIPM, there would be a workshop on metrology for nanoscale; this was a hot topic in many countries and the BIPM wanted to understand the metrological needs that would empower the development of the industry in nanotechnologies of the future.

    o In March each year they hosted joint meetings at the BIPM, attended by the OIML and ILAC; in 2010 for the first time, ISO would also be invited.

    o Soon thereafter, excitingly, there would be a joint conference with the WMO, so finally metrology and meteorology would come together with a common purpose. They would be talking about the metrology that was needed to enable future investigations on climate change. If policy makers were going to be taking steps at national, regional or global level, they needed to be reassured that the data they were using to come to those decisions was sound and that it had sound metrological practices at its heart - how could traceability and uncertainty concepts be brought into measurements taken to monitor climate change at the global level.

    Mr. Espina explained that at the meeting for physiological quantities the topics would be optical radiation, radio waves and microwaves, ionizing radiation, sound and ultrasound, magnetic fields, and the World Health Organization standards for these physiological quantities.

    In the nanotechnology workshop topics would include, among others, toxicology, nanomaterials, nanobiotechnologies and aerosols, which were also very important for climate change.

    In the conference with the WMO on climate change, discussion would mainly be on satellite based measuring platforms, earth surface platforms, and albedo studies of the salinity of the oceans.

    Mr. Espina said he would be glad to answer questions, either immediately or in the course of the coming week.

    Mr. Richard asked about the CIPM redefinition of units referred to by Mr. Espina. This was important to the OIML, for example for OIML R 111 on weights - did Mr. Espina know what the CIPM meant by "in the near future"?

    Mr. Espina replied that they were fairly certain at the moment that a redefinition would not be ready in time for the General Conference in 2011. This would delay their decision until 2015, which had the advantage that results of the Watt balance experiments in Canada, recently taken over from the UK, and in the USA might be available by that time, as well as those from the BIPM experiments. Mr. Espina did not know the situation regarding experiments being carried out in China and in France. There would thus be many more points of data by 2015, which would make the transition a more comfortable one.

    Mrs. Villière thanked Mr. Espina for his presentation. She informed the Meeting that 20 May 2010 would be a significant date for Australia. On 1 July 2010 they were launching the national trade measurement system; this had formerly been managed by the states and territories and was becoming a national system. For the six weeks prior to launching, i.e. from 20 May, they had decided to start involving the community, in terms of what trade

    measurement meant in the country. Her Director had attended the BIPM Meeting where the topic for 20 May had been announced. She asked how the topic was decided on and had the OIML been involved in the decision?

    Mr. Espina replied that the concept typically first appeared on the blackboard of his office, where ideas were exchanged. They had considered metrology in chemistry as the current year's topic, but as 2010 would be the International Year of Chemistry, they had decided to postpone that topic for a year. Mr. Espina tried to talk to Ian Dunmill, his counterpart in the OIML, about every other week, and ideas were exchanged between them. He added that in the past a number of countries had been invited to be partners in this effort, and if Australia would like to be involved in this year which was significant to them, they should speak to Mr. Dunmill or Mr. Espina, who would be glad to incorporate their ideas and input in the project.

    Mrs. Villière mentioned that other countries, notably France, would be invited to participate in their project. They would be speaking to the French Ambassador about it. She invited any other interested countries to discuss participation with their ambassadors to Australia, who would shortly be contacted on the subject.

    Mr. Birch expressed interest in the effect that redefinition of the units would have upon definition of the standards.

    Mr. Espina ascertained that by this Mr. Birch meant the mise en pratique, and said that this matter had been discussed at length at Consultative Committees of the CIPM in the past year. They were clear that now that they were moving more towards definitions that were constant definitions as opposed to explicit unit definitions, the mise en pratique would have a much deeper meaning for the metrology community in the future. The definition of the units would be a more academic issue but the mise en pratique would be the practicality of it. Each of the Consultative Committees was currently wrestling with the question of what it meant for the particular unit that they dealt with. So the answer regarding mass would be completely different from the answer on electricity, chemistry or temperature.

    Mr. Birch commented that one of the areas of interest was the ability to write the redefinitions into legislation. He wondered whether this had been taken into account in the work of the BIPM.

    Mr. Espina replied that Member States of the BIPM were sovereign nations and the BIPM did not interfere in any way in their legislative processes, even with suggestions. NMIs would be the ones to take their knowledge back to their countries and advise their governments on legislation.

    Mr. Issaev added that acceptance of the redefinition of units was related not only to legislation but also to new technologies and to the new challenges of science, for example nanotechnology. Another problem was the necessity to be closer to fundamental physics. Part of the problem was the need to eradicate contradictions in electricity, because it was known that the situation in this area was slightly strange.

    Mr. Espina added that if the General Conference on Weights and Measures in 2011 would like to make a recommendation to all Member States, they could do that. This would not, however come from the BIPM but from the Member States to themselves.

    Mrs. Van Spronssen asked for clarification of what the redefinition of units meant. Did it mean that the world was moving towards using the same SI units? Or would redefinition lead to a situation where different units were used?

    Mr. Espina used an example to answer this enquiry. The kilogram was the last unit to be based on an artifact. When the kilogram was cast in 1889 it was cast at the same time as six other kilograms, and a random one was selected to be the international prototype. All seven resided in a vault. They had been compared three times in 1889, in 1946 at the end of the second world war, and in 1989, 100 years after they were cast. It had been found that over the years the seven artifacts had deviated in weight from each other. It was not possible to know which had gained or lost weight. So the kilogram might be changing weight as a function of time, in which case all the mass standards in the world could be fluctuating as a function of time. This was not a comfortable situation for anybody. It was therefore planned to redefine the kilogram based on the Planck constant on one day in the near future. From that day on, the value of the Planck constant would be held as a universal constant and then if the mass of the international prototype fluctuated in comparison with the Planck constant it would not matter. They were therefore applying new science that came into their hands to try to provide more stable definitions of the base units for all science and technology in the future. This had been their purpose since 1889, when the metre and the kilogram had both been cast.

    Mr. Birch expressed interest in the mole and in particular in the difficulty of maintaining national standards for it. He wondered what effect the definition might have on that particular problem.

    Mr. Espina said that he was not a chemist, and would therefore tread very carefully in answering this question! The mole would have to be redefined, because, as his listeners might know, the seven units were base units; they were not basic units and were not independent of each other. So as soon as one of them was redefined, some of the others were also affected. For example, if the second was redefined, the speed of light being a constant of the universe, every redefinition of the second caused a redefining of the metre. Similarly, redefinition of the kilogram would also have an effect on the definition of the mole. He did not wish to go into more detail.

    Mr. Birch said he had been interested to hear of the BIPM-WMO Conference. Mr. Inglis had reported on the decisions of the CGPM in 1999 and 2007 at the OIML Conference in Sydney in 2008, and there had been interest in the planned WMO Meeting. One of the concerns that had been expressed in various circles was the fitness for purpose of the measurements used for determining the global temperature, whereas the focus of the Conference seemed to be more on satellite observations.

    Mr. Espina said that putting together the Conference with the WMO was one of the most exciting periods he had had in his 5 years at the BIPM. The observation systems that existed in the world today had been designed for measuring the weather, not for measuring climate. The difference in definition between what was weather and what was climate was the time of observation of the measurement. Weather was a matter of daily or weekly events; climate referred to anything over a month. The problem was that the uncertainty of the measurements on the platforms that were in use at present for measuring climate and weather was of the order of magnitude of the signal in the climate change that was being observed. So it was impossible to assert with absolute certainty that what was being observed was a change, because it was within the uncertainty margins of the equipment being used to observe it.

    It had turned out that satellite systems were built with a lead time of between 7 and 8 years before they were launched. So if the design process of the new satellite systems which would be launched was to be affected, it would be in satellites which would be put into service in a decade's time. It was time, therefore, for the meteorology community and the metrology

    community to begin talking to each other, so that the future systems that would be used for monitoring climate could actually meet the specifications that were needed. Among their requirements, they would need to have on board calibration systems, because it was not possible to bring them back to Earth to recertify their calibration.

    There being no further questions or comments, Mr. Johnston thanked Mr. Espina, and Mr. Magaña read out the proposed wording for Resolution No.3, and the President agreed that there would be further discussion of some points in the course of the week, leading to possible minor alteration, as suggested by Mr. Flandrin.

- number: '4'
  title: 1 New Member States and perspectives
  narrative: |2+

    Mr. Magaña told Members that there had not been any new Member States in the past year. Last year he had reported that two or three countries were interested in becoming Member States; of these, the Colombian Parliament was in the process of ratifying the OIML Treaty, which had already passed its second reading, and the process was expected to be completed by April 2010. It had taken longer than expected because a small amendment to their constitution had been needed. Mr. Magaña had visited Colombia to assist the process and had met representatives of both the House of Delegates and the Senate, who were very keen to join both the OIML and the BIPM.

    Mr. Magaña would make another attempt to contact the other country which had expressed interest in membership but changes in personnel there had meant that his contact with them had been lost.

- number: '5'
  title: 1 Report of the CIML President
  narrative: |2+

    Mr. Johnston explained for the benefit of new Members the role of the Presidential Council. It was first and foremost an advisory council to the President. It was made up of the President, two Vice-Presidents and Members appointed by the President for a term specified by him. He commented that this represented a lot of power for the President. Also in attendance were the Director and the two Assistant Directors, to provide support and advice to the Presidential Council.

    The Council met twice a year, once in conjunction with the CIML and the other, primary and more lengthy, meeting in March; this time was chosen so that they could have liaison meetings with other organizations such as the BIPM and ILAC. The purpose of the Council was to try and provide advice to the President, and to try and determine what options might be

    available on any issue that arose. These options would then be brought to the CIML and presented to the membership with a view to obtaining their feedback and eventual decision.

    An example of one such issue was the suggested rapprochement with the BIPM. Members would remember that at the previous Meeting they had been asked for comments on the potential rapprochement. A number of comments had been received from various Member States, which the Presidential Council had reviewed at the March 2009 Meeting. Mr. Johnston had invited Mr. Richard from Switzerland to attend that portion of the Council meeting with a view to obtaining as much input as possible from Member States. There had then been a meeting with the BIPM. The outcome of these discussions was in the working document distributed to Members; however, time had been set aside the following afternoon for further discussions on the subject, on which occasion Members' comments would be welcomed.

    Time was also set aside at these March meetings of the Presidential Council for a review of the work of the Technical Committees. They looked for issues that needed to be resolved, or any problems, for example any Committees that might be falling behind. Basically, it was an annual review to know where things stood and to offer help if any TCs needed it. He personally found it very useful to familiarize himself with the work of the TCs in this way.

    The Award for Developing Countries had been brought to the Council the previous year. The Presidential Council had put together a procedure and reviewed it, and the Award would be given for the first time during the current week.

    One of the issues which had been under discussion for some time was conformity to type, and another discussion on the same subject had been held in the current week. Mr. Magaña had given a presentation, which he would repeat during the coming CIML Round Table discussion. Depending on comments heard then, the work would then be allocated to the appropriate TC/SC to begin. Mr. Johnston expressed appreciation for Mr. Harvey's leadership on this issue over a number of years.

    In March the Presidential Council had met the BIPM. There was a very good working relationship between the two organizations, with open discussion in which they could agree or disagree without acrimony, while continuing to work closely together. Mr. Espina had mentioned that the OIML and the BIPM had worked closely together for International Metrology Day in 2009, and they would also be involved in similar projects in 2010 and subsequent years. The Directors of the two organizations had presented the roles of the two organizations at a metrology day in Dubai, Mr. Magaña had made a presentation at the CIPM/MRA event, which Mr. Dunmill had also attended.

    The MoU signed with ILAC and the IAF had been quite constructive, as they all now seemed to understand each other better. A work plan was developed into an action plan, which had been examined in the March meeting to make sure some progress was being made. Mr. Johnston tried when possible to attend the ILAC and IAF General Assemblies, and at the current year's Vancouver Meeting he had given a presentation on some of the issues the OIML was facing and a general update. At this meeting he had met the new Secretary General of ISO, whose presentation had demonstrated a different attitude from that of his predecessor.

    Members would also recall that a new Auditor had been appointed to audit the accounts of the BIML. This lady, Madame Cordier, had presented her perspective on the financial statements to the Presidential Council. Mr. Johnston had then decided that he would ask her to perform a management audit in addition to the normal financial audit, in order to ascertain whether

    Members' money was spent well and wisely as opposed to whether the figures were correct. This audit had been carried out in July 2009.

    The audit report had highlighted a relatively large number of issues which needed to be corrected by the BIML Director. Mr. Magaña had seen the report and had given Mr. Johnston a list of corrective actions that he was undertaking or about to undertake. The Auditor had reviewed these comments also and had felt that they did respond to the questions she had raised during the audit; Mr. Johnston was now in the process of reviewing the action plan resulting from this process, with the purpose of being able to respond to another management audit which he was planning for the following year. This process had been very productive and seemed to him to be a good thing for an organization such as the OIML to undertake, and he might well make it an annual process. The audit had brought to Mr. Johnston's attention various issues, one of which was the need for stronger administrative procedures.

    Mr. Johnston stressed again that the Presidential Council was advisory, helping the President to bring matters for decision by the CIML or Conference. It might at times take a position on something, which occasionally might not be in line with the opinions of a majority of Members. He himself found it very useful to be able to send out a message to the Presidential Council asking for opinions and advice on matters which might arise. It was on his initiative that the two Assistant Directors had been added to the group - he had felt that otherwise it would frequently be necessary to find one of them in order to ascertain necessary information, as the Assistant Directors worked both with certain TCs and with certain other international organizations.

    Mr. Richard thanked Mr. Johnston for inviting him to the March meeting and for the idea of the management audit. He asked whether the report from this could be made available to CIML Members.

    Mr. Johnston explained that there were some privacy issues in the report, including one or two names which could not be released. However, he had asked Mr. Magaña to provide a summary of the audit observations and the recommendations on dealing with it; this would be made be available as quickly as possible.

    Mr. Mason pointed out that Mr. Johnston's report had indicated a wide range of topics discussed at the Presidential Council Meeting; he wondered whether it might be possible for minutes of it to be made available. Obviously it would be difficult to do this for the meeting which took place at the same time as the CIML but there might be benefit in having the sort of minutes that were produced for the CIML, which would help Members in their preparation for the CIML Meeting.

    Mr. Johnston agreed that this might be possible, obviously excluding any item that might be confidential, though it was rare for there to be any such item.

    Moving on, he reminded Members that he had promised to allocate them time to express their opinions on the subject of a possible rapprochement with the BIPM.

    This matter had been under discussion for a long time and the possibilities ranged from closer cooperation to a full merger. A number of comments had been received, as requested, from various countries after the discussion at the Sydney CIML Meeting. After obtaining permission from the writers of the comments, these had been sent to the BIPM, following which the Presidential Council had discussed the matter in March, Mr. Richard having also attended that portion of the meeting.

    After the Sydney Meeting, the conclusion had been reached that certainly closer cooperation would be an excellent idea and the two Organizations should work towards that. There did not seem to be an appetite for a full merger - indeed the Presidential Council discussions in March had reached the same conclusions. The following day the meeting with the BIPM had taken place, and on that occasion rapprochement had been the first topic on the agenda.

    Mr. Johnston reminded Members that it had been the BIPM that had initially broached the idea of a rapprochement, so everything had evolved from there. At the meeting, Mr. Johnston had opened the discussion with the information he had earlier provided to the BIPM, plus the conclusions from the Presidential Council Meeting. It then transpired that the position of the BIPM had changed by $ 1 8 0^{\circ} $ , in that while everybody agreed that closer cooperation was a good thing, they no longer wished to discuss merger or even formally to discuss any operations that might be combined. The discussion was very short. Mr. Johnston had tried to raise the matter again later in the meeting, and was again informed that the BIPM was not interested in it at that time. Naturally, discussions between Directors and Assistant Directors continued as before whenever time allowed.

    So the present position was one of endorsement of the present close contacts, such as the Directors' joint presentation in Dubai, and when one Organization was attending a meeting and the other was not, if a joint presentation was a possibility they tried to arrange that. But no discussions on further rapprochement were currently in progress.

    Mr. Johnston was not against the idea of rapprochement; long term objectives would need to be set out, together with the means of achieving them, but in any partnership both sides needed to be working towards the objective, and that was not the present situation.

    Mr. Klenovský said that he was also chairman of an NMI, and had had a very similar experience at a recent meeting with the BIPM, which seemed to have completely lost interest in any negotiations with the OIML; the BIPM had in fact stated that it had put forward some proposals but that the OIML had not responded.

    There had then been discussion of a linear accelerator, expensive equipment for purposes of achieving traceability of medical measurements used for treating tumors, replacing Cobalt 60, and there was a question of whether this was a matter of legal metrology or not, and what would be the procedure for verifying those instruments. This case clearly demonstrated that there was a close connection between traceability matters, which were the responsibility of the BIPM and regulation, which was that of the OIML, so this showed that "in-between areas certainly existed. For those who represented their country in both Organizations, it was very difficult to know what they should say to their government about negotiations.

    Mr. Johnston said that he was not aware of any outstanding proposal from the BIPM which had not been responded to; Mr. Klenovský responded that other directors of NMIs would bear him out, but Mr. Johnston reiterated that if he had received any such proposal he would certainly have replied to it.

    Mr. Leitner said that he too, as an NMI Director, had received the impression that it was for the OIML to respond to a BIPM proposal.

    Mr. Johnston replied that at the March meeting, attended by several OIML personnel, there had been neither discussion nor proposal. He himself had been pressing for further discussion, to carry out the wishes of the CIML, but had achieved nothing thereby. He assured Members that it was not the OIML which had shut the door.

    Mrs. Vukovič, speaking on behalf of WELMEC rather than Slovenia, said that she had read the comment that that rather than a top-down approach they would prefer a bottom-up approach, meaning that at a regional level organizations such as WELMEC and EUROMET should cooperate more on scientific and technical work between their working groups. She felt that at European level, not enough was made of these potential resources for the benefit of international metrology. She and others were already at work on improving such cooperation, and were discussing the draft memorandum together. The problem had been identified at European level.

    Mr. Mason said that he also had attended the meeting in Paris and could confirm Mr. Johnston's account of what was being said at an official level. However, he had had a number of bilateral discussions, during which he had received the impression that the BIPM was interested in working together, but that their position was better understood if it was realized that to date what they had been thinking of was a merger of the institutions.

    Mr. Richard thought that to speak of merger of the two Organizations was a mistake which had been made in the past and should not be repeated. It was also their responsibility to think about the needs of legal or scientific metrology for the future, but from a very strategic point of view.

    Mr. Richard returned to the discussions of rapprochement in the Presidential Council meeting reported in Annex A2 of the working document. He first expressed thanks for publishing the Members' comments in Annex A1. This gave all Members a good opportunity to see what others had said.

    On the subject of Draft Resolution No. 3, Mr. Richard said that during his careful reading of Annex A2 he had noted, and would quote, seven elements of special interest in the report on the Presidential Council Meeting, as follows:

    - It was necessary to identify future needs for both legal metrology and scientific metrology (A2.1).

    - Lines between the two had moved a lot in the last 50 years (A2.1).

    - The ongoing evolution of metrology and of the two Organizations would bring their work closer together (A2.1).

    - The issue of rapprochement should be considered after consultation with the stakeholders (A2.5).

    - The issues of rapprochement are mainly strategic in nature (A2.6). This point was very important and had not been the case in the report seen the previous year.

    - The President would discuss with the BIPM how to develop a practical, global consistent image of international metrology (A2, conclusion).

    - As a conclusion, Mr. Magaña had been asked to prepare a draft report on the rapprochement in order to inform Members of the two Organizations about this issue. This report would be discussed with Andrew Wallard, the BIPM Director, and then sent to Members by the two Directors (A2, final paragraph).

    Mr. Richard found these elements very interesting and promising. He thanked the Presidential Council for its excellent work in analyzing these issues, for its good contacts with the BIPM and for its desire to anticipate the evolution of metrology and especially legal metrology, as

    already partly discussed during the Seminar earlier in the week in response to Peter Mason's presentation.

    It was time to take a decision that the possibilities must be analyzed in great detail, not with a view to immediate merger but thinking of the strategic future. If after very deep and strategic analysis the Committee or the Conference came to the decision that a merger was not the right solution for the future of the OIML's needs, that was not the problem. But the discussion had to start at once in order to strengthen the position of the OIML.

    In this regard, Mr. Richard would like these elements to be included in Draft Resolution No. 3, and suggested that the first part be worded in the following way, which was similar to the wording of Resolution No. 10 of the previous year's CIML, for the first part:

    "The Committee expressed its appreciation for the excellent cooperation between the Presidential Council and the Bureau of the CIPM as well as between the BIML and the BIPM".

    For the second part, Mr. Richard proposed considering the comments from the report of the Presidential Council in the following way:

    "The Committee asked the Bureau to prepare a draft report on the rapprochement in order to inform the Member States of the two Organizations about this issue and encourage further discussions during the 45th CIML Meeting. This report is to be mainly strategic in nature and to consider the point of view of stakeholders of both Organizations as well as the comments received from CIML Members. This report will be discussed with Michael Kühne, the future BIPM Director, and then sent to all Member States by the two Directors".

    Mr. Mason expressed strong support for Mr. Richard's proposal. He added that after the Paris Meeting he had had the impression that many organizations, not just the BIPM but also ILAC, IAF and ISO wished to move more closely together in the way that they tackled some of the common problems, and to develop a common approach to the needs of the global economy. In his view, there was a real danger that the OIML could be left behind if they were not seen to be taking the initiative. He agreed that it was right to talk about a strategic approach but they also had to enter into detailed proposals about exactly where and in what way they were going to work together.

    Mr. Flandrin said that he supported the views of his Swiss and British colleagues. He was appreciative of having received, among the documents given to all the Members, all the comments received from Members and the résumé of Presidential Council discussions. These formed a concrete and useful basis upon which to proceed with discussion and make proposals. He agreed with both previous speakers on the need to move in the direction of rapprochement. The French delegates from both the BIPM and the CIML were very much in favor of this. He also agreed with Mr. Richard that it was important to identify specific areas for cooperation before moving closer to the BIPM, but he considered that this could be done without difficulty.

    His final remark concerned the personnel in the two Organizations concerned in this matter. It was quite clear that the President, at the behest of the CIML, was in charge of the OIML's side of any negotiations, but it was less obvious who was leading them on the BIPM side. It did not seem to be the CIPM, since as a Member of that he had not been consulted, yet it was vital that the Member States should be involved in such a process.

    Mr. Magaña said that discussions in March had been held with the Bureau of the CIPM. This had a somewhat similar function to the OIML's Presidential Council, and was composed of

    the CIPM President, Vice President and Secretary, the Director and Deputy Director of the BIPM and perhaps one or two additional experts. The CIPM Bureau did not officially represent Member States. The CIPM was a group of appropriate experts who were appointed by the General Conference on Weights and Measures, and was composed of 19 people appointed as experts and not as representatives of their country. They were a small team which worked with the CIPM President to advise the President and the BIPM Director on various issues. These people represented themselves, and not the Member States, who were represented by the General Conference, which took place every four years. The next time this met would be 2011, so unless other processes were used to consult Member States, that would be the next occasion on which they might be informed.

    Mr. Johnston proposed that, rather than try to put Mr. Richard's rather lengthy proposal on the screen at once, it should be transmitted to Mr. Kool for preparation in time for Members to study it before the review of the Resolutions in the last session of the CIML.

    ## 6 Round Table on Metrological Control

    Since the majority of delegates had attended the Round Table, and in view of the lack of time available during the CIML Meeting, it was not deemed necessary to review or comment on the Round Table discussions. The CIML President informed Members that a summary would be published (see Annex), and so unless there were any specific questions he proposed to move onto Item 7.

    ## 7 Report on the Seminar "Stakes and priorities of legal metrology for trade"

    Mr. Magaña said that most Members had themselves attended the Seminar and that there had not yet been time to make a summary of it. He merely wished to say that all the presentations were already online on the OIML web site or would shortly be there, and that they could be downloaded from there; he had taken some notes, from which he would also make a summary of the discussions in the Seminar. It had also been recorded, and its full proceedings would be published as soon as possible (see OIML S 5:2010).

    ## 8 Activities of the Bureau

