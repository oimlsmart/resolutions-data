    Mr. Magaña informed Members that all the publications that had been approved had been published and were available in English online. The French versions were not yet all available. R 85 and R 138 had been translated into French and were also available on the web site, and three other publications (D 31, R 76 and R 117) were being translated either by the Bureau or contracted out to experts. These would be available as soon as possible. As often happened in the course of translation, some questions had arisen, especially on R 117, which had to be checked with the TC Secretariat in case an erratum or amendment was needed.

- number: '9'
  title: 1 Pension system
  narrative: |2+

    Mr. Magaña said that he had given an explanation of the pension system the previous year at the Conference. It had been noted that the international standards on accountancy made it mandatory in principle to record the rights acquired by the personnel for ever, without any time limit. As a result, the provision for pensions, previously rather limited, had become very high and absorbed most of the reserves. Also the annual contribution to endow this provision was very large, due to the fact that all the rights acquired, and all the pensions that would be paid over the course of 40 years, had to be accounted for, none of which had previously been the case.

    Mr. Magaña had therefore suggested to the Conference that they should step back and consider making pension provisions which would cover the medium term but not the very long term. The Conference had instructed the President and Director to examine the issue with an appropriate expert and take provisional measures until a decision could be taken by the 2012 Conference.

    The provisional rules on pensions stated that:

    - provision for paying a certain number of years' pensions should be covered. Mr. Magaña had chosen a period of five years, so that each year provision was made to cover the next five years' pensions. This was for the medium term and more than covered the four-year period between Conferences;

    - the totality of rights acquired by the personnel, without any limit of time, would still be evaluated by an actuary and presented to the Conference as an informative annex to the accounts. This annex would therefore state what pension rights would be due to the personnel in the case of the OIML being dissolved. This was also done in other organizations similar to the OIML;

    - the Member States were liable for these acquired rights but the OIML had some resources, in the form of its very valuable building, the purchase of which was now almost fully depreciated. The value of the building would also be evaluated and presented to the Conference so that Member States could see that the totality of rights acquired by the personnel was covered by the value of the building. This also was done in a number of other organizations, and meant that the total pension rights acquired by

    the staff need not feature in the annual accounts, since they were fully covered by the OIML's assets. The only event in which the totality of rights would have to be paid was the dissolution of the OIML. Otherwise the pensions to be paid every year could be balanced by the five year provision.

    This plan was not strictly in conformity with the International Standards on Public Accountancy (IPSAS), but it had been discussed with the external auditor, who was from the Cour des Comptes, the body in charge of auditing French public bodies and a member of the board of IPSAS, so she was very knowledgeable about these issues. She was also external auditor to two other Paris based international organizations, the OIE and CIHEAM, which were about the same size as the OIML. She had informed Mr. Magaña in discussion that although the international accountancy rule had been adopted, a number of countries were rather reluctant and already saying that they would apply it in the way which Mr. Magaña had just explained. She considered his proposed rule acceptable. This rule of course needed to be inserted in the revision of the Financial Regulations and submitted to the Conference but in the meanwhile it would be reasonable to work on that basis.

    The new rule had therefore been applied in the 2008 Accounts. The previous year, provision for long term pension rights had had to be included in the accounts, but for 2008 provision only needed to be made for five years, with the result that about 1 million euros could be returned to the reserves. Pension provision covered more than the four-year financial period and would be updated every year, and the situation could be discussed at every Conference with a decision being made as to whether to continue on the same system. The finances of the OIML were in no danger. A full revision of the Financial and the Staff Regulations of the OIML would have to begin at once, to substitute the new arrangements for the old ones. The new regulations would be presented to Conference in 2012 but interim reports would be given to the 2010 and 2011 CIML Meetings.

    Mr. Johnston informed Members that Peter Mason had graciously agreed to assist with the work of revising the Financial Regulations, particularly where it related to pensions. Mr. Johnston had felt guilty asking for this since Mr. Mason had told him that his workload had doubled but his salary had not, but Mr. Mason had agreed to offer his expertise, for which Mr. Johnston was very appreciative.

    Mr. Issaev asked how many people the fund covered. He knew that the former Director, Mr. Athané, was not among them.

    Mr. Magaña said there were $ 4 \frac{1}{2} $ people on pensions, or four plus the widow of one, and two people actively contributing to the pension system. It had been necessary to ask an actuary to calculate the rights acquired, and the actuary had made very complex calculations based on statistics and life-expectancy, upon which the evaluation would be based, although calculations based on four persons were not statistically reliable.

    Mr. Richard said that although this Resolution would be submitted to the next Conference, he had had a firm mandate from his ministry and the Swiss Ministry of Finance to refuse this Resolution, for two reasons: they did not agree with Mr. Magaña's interpretation of Article XXXI of the Treaty; and if an obligation existed for the States they wanted this to be explicitly stated in the Resolution.

    Mr. Magaña replied that his interpretation might have gone beyond what was written. The exact words of the Convention were: "In case of dissolution of the OIML, the assets and the product of the sale of the assets is distributed to Member States after having taken out the rights acquired by personnel". So, if the assets could not cover the pensions, there would be a

    problem. But in fact the assets covered all the pensions to be paid and all the rights acquired. Member States would receive what was left after taking out the rights acquired by staff. It did not explicitly state that States were liable for these rights, but they would only get back the money that was left after the rights had been satisfied.

    Mr. Mason said he was looking forward to examining this issue in more detail. The question that occurred to him, if the Member States did have this liability, was whether Member States themselves should recognize that liability. If there was a 40 year liability for pensions and they were only providing for five years of that in the OIML accounts, then the question raised for all Member States was whether they should recognize the balance of that liability. He would want to address this question and discuss it with his Finance Ministry. The reason for having international financial standards being introduced was so that all countries could have a common understanding of how their liabilities were calculated. The matter would have to be looked into further, but hopefully they had three years until the next Conference for this to be done.

    Mrs. Van Spronssen agreed with the proposition that Members' liability for pension rights be made explicit in the Convention. She also raised the point that if the decision had not been taken yet to put the reserve from the pension fund into the general reserve, she would like to see if it was possible to put it in a reserve specially for pensions until the Conference, so if the Conference made a different decision, the money would still be there and would not have been used for something else.

    Mr. Magaña replied that what was written in the old Staff Regulations was that a fund had been set up for the payment of pensions. This fund was accounted as an asset. On moving to the international standard, two things had to be considered: first, what rights should be recorded all rights for ever, or the charges due in the medium term; and second, whether there should be a dedicated asset for this. If the IPSAS rule, which was the same as the rule for the private sector, the IAS, was applied strictly, all the rights acquired should be shown in their accounts, and there should also be an asset which was dedicated for the payment of this charge and which could not be sold. They had come to the decision that in the event of their having to pay all these rights, which would occur only on the dissolution of the OIML, the liability of Member States had to be clarified. On the other hand, the building was an asset which was recorded for almost nothing, because it had virtually been reduced to nothing through depreciation, but which in fact was capable of covering the cost of the pensions. It was the interpretation of this fact which had led to the proposal being framed in the words used. He had considered having the building re-valued, but if that was done it would have to be shown in the accounts as depreciating over 50 years, thereby automatically making a charge on the accounts which was not a real charge, and not producing any advantage.

    Mr. Magaña read the proposed Resolution.

    Mrs. Blasco told delegates that she considered that both rights and assets should be accurately recorded. If the building had a higher value, this too should be shown in the accounts.

    Mr. Magaña replied that about 70 000 € per annum were paid out as pensions. If they were to record all rights acquired for ever, it would be necessary to make provision for some 400 000 €, to plan for expenses which would occur only in the very long term. This would create an apparent deficit of more than 300 000 € for the OIML for expenses which were not due in the medium term. It did not seem reasonable to him to have to show this charge in the annual accounts. If this had to be done, other issues would have to be considered in the OIML accounts so that these could balance. He wanted to avoid having to request that drastic

    measures be taken such as a decrease in the number of Bureau staff, because the number of staff seemed reasonable to him. The operating costs were correct; the only way of meeting the costs of the pension scheme if long term liabilities had to be shown, would be to raise Members' contributions, and this was not the right time to take such action.

    Mrs. Blasco said that the deficit had to be taken into account, because it did exist, whether it were shown in the figures or not.

    Mr. Magaña commented that the pension scheme had started at a time when in France and in many other countries all pensions were based on the principle of repartition. There had never been any valuation of all the rights acquired. This situation had only arisen on transfer to the new accountancy. The new rules had drastically changed the OIML's economy, and, although there were arguments to the contrary, many countries, such as France, were taking the view that because the State was liable for them, it was not necessary to account for all the rights acquired. Mr. Magaña felt that the OIML was in a position to take a similar path. The Convention was not very clear on the question of liability.

    Mr. Mason asked whether the opinion of the external auditor had been obtained on the question of revaluing the building. It seemed to him that the normal way to apply accounting rules would be to show the actual value of this asset. This whole issue concerned the liability of Member States to meet obligations over a period of time; they were looking for a way to understand what their commitments might be in future years, and the current value of the building, together with its future depreciation costs, seemed to him to be a vital part of that understanding.

    Mr. Magaña said that the question of revaluing the building had not been discussed formally with the auditor; he himself would put its value at about three million euros. The two possibilities were either to revalue the building, put it in the assets and depreciate it all over again over 50 years, or to revalue it annually. Depreciation of such a building had little meaning since in practice it did not lose its value. He thought this question should perhaps be examined with the external auditor.

    Mr. Mason pointed out that as well as this there were other uncertainties which had been identified, including the meaning of Article 31. There might also perhaps be other possible ways of showing Member States' liability, perhaps as the equivalent of uncalled capital. In view of the existence of other unexplored possible approaches to the problem, he considered that it was premature for the current Committee to agree on the provisional rule to be used until the next Conference.

    Mrs. Van Spronssen said she had been thinking along the same lines. There was no doubt that Member States were liable for pensions. The employees had earned them and must have the security that they would be paid. The decision to be made was in what manner this obligation was to be fulfilled. If the Member States decided not to put aside the full reserve to pay the pensions, then there must be an asset to set against the cost of them. The Member States would either have to accept their liability or else put the full cost in the accounts. She agreed that this Draft Resolution was premature because there were still a number of avenues to be explored.

    Mr. Magaña had two questions: should the building be revalued and put in the assets to show that this was the fund that would cover liability for the pensions; and should all the rights acquired into the distant future be recorded among the liabilities, which would mean adding about 350 000 euros to the Bureau's deficit.

    Mrs. Van Spronssen said Mr. Magaña had asked what should be done. She thought that nobody could answer those questions at the moment. She suggested that the draft Resolution should be altered to apply Mr. Magaña's rule for one year only, and in the course of that year more detailed research should be done into alternative ways of dealing with the problem, and its results brought to the flowing year's CIML.

    Mr. Magaña said that this had been the President's advice also. Perhaps a decision could be postponed, and a complement of study set up consisting of experts and some interested Members, and the 2008 accounts revised in the light of the discussions and brought back in 2010 for approval. These 2008 accounts had been drawn up according to this rule, which had been approved by the external auditor. If the rule was changed, the accounts had to be changed. A couple of years previously approval of the accounts had been postponed for a year because it had been discovered that they had contained an error.

    Mr. Johnston asked whether Members were in favor of postponing the review of the financial statement until after this review had been completed.

    This Resolution was passed without objections.

