    Mr. Johnston thanked the hosts, the Kenyan government and all the people involved with the Kenyan Standards Organization. The warmth and hospitality of the people was obvious, and the meeting had been a success. Mr. Johnston regretted that the demands of duty had prevented him from joining the visit to the villages.

