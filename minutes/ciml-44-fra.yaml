    For the BIPM, Mr. Pedro Espina thanked the CIML for inviting him and emphasized the importance of maintaining links between the two Organizations. He also thanked the Kenyan Ministry of Trade for hosting the Meeting in their beautiful country. He apologized for not being in a position to speak of any rapprochement between his Organization and the OIML, though he would be happy to listen to comments on that matter.

    Mr. Espina told delegates that he would speak on the membership of the BIPM, comment on a couple of items of news which he thought would be of interest to them, summarize some current common activities between the BIPM and the OIML and give notice of some future events which might be of interest.

    The BIPM currently had 53 Members, 47 of which had signed the CIPM MRA. Croatia and Kazakhstan had both become Members in December 2008, and Kenya would become a Member from January 2010. Associates of the General Conference included new Members Peru, Paraguay and Ghana, all of whom had been welcomed in the current year.

    BIPM countries were organized in 5 regional Metrology Organizations: SIM in the Americas, AFRIMETS (shared with the OIML) in Africa, EUROMET in Europe, COOMET for Eastern European and Asian Countries and APMP in the Asian Pacific region. There were currently no Members or Associates in the Gulf States but work was in progress with colleagues in the Gulf States to change that.

    The CIPM had met in October at the BIPM. A number of items had been considered; two of special interest to the OIML were:

    - Professor Michael Kühne from Germany had been appointed Deputy Director and Director Designate from December 2009, with the result that Professor Ernst Gobel from the PTB would have to resign as President, since the Metre Convention did not allow the President and Director to be of the same nationality. Dr. Barry Inglis from Australia had been elected President in his stead.

    - Regarding the definitions of the SI, the redefinition of four of the base units was currently being considered. These were the kelvin, the ampere, the mole and the kilogram. The CIPM had noted that: "the consensus on the redefinition of the kilogram in the near future would be based on the Planck constant. Some of those present might know that there had been a dispute between results from the Planck constant experiment, the Watt balance, and those from the Avogadro experiment, the silicone sphere. The CIPM had felt that it was more appropriate to do the three definitions based on the Planck constant".

    Previous possible rival units had now been rejected. Future SI definitions would be expressed in terms of explicit constant definitions as opposed to their present status as explicit unit definitions. The difference was subtle but important. Definitions would no longer be talking about units of measurement but about universal constants - the electron charge, the Boltzmann constant, the Avogardo number, the Planck constant. Four definitions would thus be changed.

    - The CIPM had decided that they will allow, for the purposes of participation in this CIPM MRA, two paths for the definition of traceability of calibration and measurement capabilities:

    1) a primary realization of the unit of measurement in the applicant's own laboratory, or

    2) traceability from someone else who had a primary realization of the unit of measurement.

    Mr. Espina then invited Members to read more of the details in their own time. Caveats were listed in the notes and he said that Members could raise points with him later in the week if they wished.

    - World Metrology Day, shared by the OIML and the BIPM over the last number of years, was 20 May, the date upon which the Metre Convention was signed in 1875. The 2009 campaign had been on the subject of Measurement in Commerce, with the slogan Metrology Underpinning Economic Development. 50 posters, in 25 languages, had been produced for 50 different countries, as well as a web site and leaflets. There would be partnership again for the 2010 campaign, which was to be on the topic Measurement in Science and Technology, with the slogan Metrology, a Bridge to Innovation. Members might like to note the date so that they could prepare national events to coincide with the international ones. It had been decided that there would be just one poster, available in English and French, not posters for individual countries. Graphics and software would be made available for countries wishing to make their own posters.

    - The OIML and the BIPM had a joint program with UNIDO and AFRIMETS for the strengthening of metrology, both legal and scientific/industrial, in Africa. This project, known as the AFRIMETS UNIDO project, was bringing in almost a million US dollars to try to support the infrastructure of AFRIMETS, specifically to set up the comparisons that were needed in Africa to prove the equivalency of measurement between the various countries and to develop the committee structure of AFRIMETS. A two week long metrology school was being planned for 2011, to be held in Kenya for the benefit of metrologists from all countries in Africa, who would be invited to learn about various topics in metrology. Some Members might have seen a survey the previous week about their measurement and training needs, upon the results of which the curriculum would be based. The OIML and the BIPM had co-written the appeal sent by AFRIMETS to UNIDO which had secured funding for the project.

    - Members might recall that the joint OIML-BIPM Action Plan called for the creation of promotional documents in four areas of metrology. These were: applications of metrology to the environment, to trade, to safety and to health. They were grateful to the South African NMI for lending them Sara Prins, their deputy director for science and technology, who would be in Paris until early December working on the development of these four leaflets with the BIML and himself. These would be A4 sheets folded into four sides, in language tailored for talking to government officials about the importance of metrology in those four areas, so it was not documentation for those present, who all knew metrology very well, but for those who empowered metrologists' work at government level.

    - Future events of possible interest to those present included:

    0 In November, at the BIPM, a workshop on physiological quantities and the SI units, with the purpose of coming to grips within the metrology community with how to develop the SI in the future to accommodate physiological quantities. At present, the

    only physiological quantity that existed among the base units was the candela, which was tailored to a response of the human eye; but metrology was of importance in many other aspects of the human body, and this would be discussed during that workshop.

    0 In February, at the BIPM, there would be a workshop on metrology for nanoscale; this was a hot topic in many countries and the BIPM wanted to understand the metrological needs that would empower the development of the industry in nanotechnologies of the future.

    o In March each year they hosted joint meetings at the BIPM, attended by the OIML and ILAC; in 2010 for the first time, ISO would also be invited.

    o Soon thereafter, excitingly, there would be a joint conference with the WMO, so finally metrology and meteorology would come together with a common purpose. They would be talking about the metrology that was needed to enable future investigations on climate change. If policy makers were going to be taking steps at national, regional or global level, they needed to be reassured that the data they were using to come to those decisions was sound and that it had sound metrological practices at its heart - how could traceability and uncertainty concepts be brought into measurements taken to monitor climate change at the global level.

    Mr. Espina explained that at the meeting for physiological quantities the topics would be optical radiation, radio waves and microwaves, ionizing radiation, sound and ultrasound, magnetic fields, and the World Health Organization standards for these physiological quantities.

    In the nanotechnology workshop topics would include, among others, toxicology, nanomaterials, nanobiotechnologies and aerosols, which were also very important for climate change.

    In the conference with the WMO on climate change, discussion would mainly be on satellite based measuring platforms, earth surface platforms, and albedo studies of the salinity of the oceans.

    Mr. Espina said he would be glad to answer questions, either immediately or in the course of the coming week.

    Mr. Richard asked about the CIPM redefinition of units referred to by Mr. Espina. This was important to the OIML, for example for OIML R 111 on weights - did Mr. Espina know what the CIPM meant by "in the near future"?

    Mr. Espina replied that they were fairly certain at the moment that a redefinition would not be ready in time for the General Conference in 2011. This would delay their decision until 2015, which had the advantage that results of the Watt balance experiments in Canada, recently taken over from the UK, and in the USA might be available by that time, as well as those from the BIPM experiments. Mr. Espina did not know the situation regarding experiments being carried out in China and in France. There would thus be many more points of data by 2015, which would make the transition a more comfortable one.

    Mrs. Villière thanked Mr. Espina for his presentation. She informed the Meeting that 20 May 2010 would be a significant date for Australia. On 1 July 2010 they were launching the national trade measurement system; this had formerly been managed by the states and territories and was becoming a national system. For the six weeks prior to launching, i.e. from 20 May, they had decided to start involving the community, in terms of what trade

    measurement meant in the country. Her Director had attended the BIPM Meeting where the topic for 20 May had been announced. She asked how the topic was decided on and had the OIML been involved in the decision?

    Mr. Espina replied that the concept typically first appeared on the blackboard of his office, where ideas were exchanged. They had considered metrology in chemistry as the current year's topic, but as 2010 would be the International Year of Chemistry, they had decided to postpone that topic for a year. Mr. Espina tried to talk to Ian Dunmill, his counterpart in the OIML, about every other week, and ideas were exchanged between them. He added that in the past a number of countries had been invited to be partners in this effort, and if Australia would like to be involved in this year which was significant to them, they should speak to Mr. Dunmill or Mr. Espina, who would be glad to incorporate their ideas and input in the project.

    Mrs. Villière mentioned that other countries, notably France, would be invited to participate in their project. They would be speaking to the French Ambassador about it. She invited any other interested countries to discuss participation with their ambassadors to Australia, who would shortly be contacted on the subject.

    Mr. Birch expressed interest in the effect that redefinition of the units would have upon definition of the standards.

    Mr. Espina ascertained that by this Mr. Birch meant the mise en pratique, and said that this matter had been discussed at length at Consultative Committees of the CIPM in the past year. They were clear that now that they were moving more towards definitions that were constant definitions as opposed to explicit unit definitions, the mise en pratique would have a much deeper meaning for the metrology community in the future. The definition of the units would be a more academic issue but the mise en pratique would be the practicality of it. Each of the Consultative Committees was currently wrestling with the question of what it meant for the particular unit that they dealt with. So the answer regarding mass would be completely different from the answer on electricity, chemistry or temperature.

    Mr. Birch commented that one of the areas of interest was the ability to write the redefinitions into legislation. He wondered whether this had been taken into account in the work of the BIPM.

    Mr. Espina replied that Member States of the BIPM were sovereign nations and the BIPM did not interfere in any way in their legislative processes, even with suggestions. NMIs would be the ones to take their knowledge back to their countries and advise their governments on legislation.

    Mr. Issaev added that acceptance of the redefinition of units was related not only to legislation but also to new technologies and to the new challenges of science, for example nanotechnology. Another problem was the necessity to be closer to fundamental physics. Part of the problem was the need to eradicate contradictions in electricity, because it was known that the situation in this area was slightly strange.

    Mr. Espina added that if the General Conference on Weights and Measures in 2011 would like to make a recommendation to all Member States, they could do that. This would not, however come from the BIPM but from the Member States to themselves.

    Mrs. Van Spronssen asked for clarification of what the redefinition of units meant. Did it mean that the world was moving towards using the same SI units? Or would redefinition lead to a situation where different units were used?

    Mr. Espina used an example to answer this enquiry. The kilogram was the last unit to be based on an artifact. When the kilogram was cast in 1889 it was cast at the same time as six other kilograms, and a random one was selected to be the international prototype. All seven resided in a vault. They had been compared three times in 1889, in 1946 at the end of the second world war, and in 1989, 100 years after they were cast. It had been found that over the years the seven artifacts had deviated in weight from each other. It was not possible to know which had gained or lost weight. So the kilogram might be changing weight as a function of time, in which case all the mass standards in the world could be fluctuating as a function of time. This was not a comfortable situation for anybody. It was therefore planned to redefine the kilogram based on the Planck constant on one day in the near future. From that day on, the value of the Planck constant would be held as a universal constant and then if the mass of the international prototype fluctuated in comparison with the Planck constant it would not matter. They were therefore applying new science that came into their hands to try to provide more stable definitions of the base units for all science and technology in the future. This had been their purpose since 1889, when the metre and the kilogram had both been cast.

    Mr. Birch expressed interest in the mole and in particular in the difficulty of maintaining national standards for it. He wondered what effect the definition might have on that particular problem.

    Mr. Espina said that he was not a chemist, and would therefore tread very carefully in answering this question! The mole would have to be redefined, because, as his listeners might know, the seven units were base units; they were not basic units and were not independent of each other. So as soon as one of them was redefined, some of the others were also affected. For example, if the second was redefined, the speed of light being a constant of the universe, every redefinition of the second caused a redefining of the metre. Similarly, redefinition of the kilogram would also have an effect on the definition of the mole. He did not wish to go into more detail.

    Mr. Birch said he had been interested to hear of the BIPM-WMO Conference. Mr. Inglis had reported on the decisions of the CGPM in 1999 and 2007 at the OIML Conference in Sydney in 2008, and there had been interest in the planned WMO Meeting. One of the concerns that had been expressed in various circles was the fitness for purpose of the measurements used for determining the global temperature, whereas the focus of the Conference seemed to be more on satellite observations.

    Mr. Espina said that putting together the Conference with the WMO was one of the most exciting periods he had had in his 5 years at the BIPM. The observation systems that existed in the world today had been designed for measuring the weather, not for measuring climate. The difference in definition between what was weather and what was climate was the time of observation of the measurement. Weather was a matter of daily or weekly events; climate referred to anything over a month. The problem was that the uncertainty of the measurements on the platforms that were in use at present for measuring climate and weather was of the order of magnitude of the signal in the climate change that was being observed. So it was impossible to assert with absolute certainty that what was being observed was a change, because it was within the uncertainty margins of the equipment being used to observe it.

    It had turned out that satellite systems were built with a lead time of between 7 and 8 years before they were launched. So if the design process of the new satellite systems which would be launched was to be affected, it would be in satellites which would be put into service in a decade's time. It was time, therefore, for the meteorology community and the metrology

    community to begin talking to each other, so that the future systems that would be used for monitoring climate could actually meet the specifications that were needed. Among their requirements, they would need to have on board calibration systems, because it was not possible to bring them back to Earth to recertify their calibration.

    There being no further questions or comments, Mr. Johnston thanked Mr. Espina, and Mr. Magaña read out the proposed wording for Resolution No.3, and the President agreed that there would be further discussion of some points in the course of the week, leading to possible minor alteration, as suggested by Mr. Flandrin.

- number: '3.2'
  title: ILAC/IAF
  narrative: |2+

    Mr. Chesolokile of ILAC informed Members that he worked for SANAS, the accreditation body in South Africa. He had been asked to give a brief update on ILAC and IAF activities between September 2008 and October 2009.

    He said that in June 2009, progress had been made during meetings held in London towards establishing the ILAC/IAF MLMRA for inspection. Subsequently, ILAC and IAF had invited the current recognized regional cooperation bodies to apply for evaluation to join the IAF and ILAC inspection MLMRA. ILAC also continued to focus on enhancing a more widespread understanding of the socio-economic benefits of the Arrangement among the international community. Mr. Chesolokile felt that this decision would help a lot because there had been some confusion as to exactly where inspection bodies fell.

    Like any other organization, ILAC liked to acknowledge the growth in its membership. Currently there were 65 full members from 50 economies, 25 associates from 24 economies and 20 affiliates from 18 economies, and obviously the four regional cooperation bodies, one regional coordination body and 25 stakeholders. ILAC membership, as of 18 September 2009, now totaled 140 bodies from 88 economies, and approximately 53 000 laboratories and over 6 000 inspection bodies via the 90 ILAC full members and associates.

    IAF also continued to enjoy steady growth and now had 83 members, made up of 57 accreditation body members, 15 associate members, as well as the four regional groups, for special recognition the EA, the IAC, the APLAC and of course SADCA, and one member and six observers.

    The current status of the ILAC MRA stood at 61 full members, representing 47 economies, which were signatories to the ILAC Arrangement. Currently the MRAs of three of the four regional cooperation body members of ILAC were recognized by ILAC, EA, APLAC and the IAC, so obviously SADCA still had some work to do, and it was hoped that in the future tremendous progress would be seen in that regard.

    Recognition of a region was achieved after successful peer evaluation by ILAC; each recognized region underwent re-evaluation every four years. So those three regional bodies would be evaluated every four years. The MRA sought to recognize regions underpinning the ILAC Arrangement. Signatories to EA, APLAC and IAC MRAs that were also members of ILAC were also entitled to become signatories and full members to the ILAC Arrangement.

    In line with the IAF strategic plan, strategic objective number one committed the IAF to improving its outcomes. This had resulted in the establishment of the User Advisory Committee, which had been formed under the chairmanship of Guenther Beer, Head of Regulation and Conformity Assessment for Siemens, and IAF Director for Industry.

    At a meeting in Stockholm in October 2008, the IAF objectives, strategy, motivation and goals had been discussed; a subsequent meeting had been held in London and had consisted of a presentation by Mr. Doherty, the IAF Technical Committee Chairman, covering global confidence in certification, which had been developed by the Head of Communications and Marketing to help those not directly involved with accreditation and certification.

    Feedback would be appreciated on cooperation between ILAC, IAF and the OIML, which would probably interest those present. Two such matters were the nomination of lead assessors in the field of legal metrology and also the inquiry on the number of accredited legal metrology laboratories. The OIML MAA would also provide guidance as to how this would be achieved. This MAA basically used two mechanisms: ISO/IEC 17025 and OIML D 30 as a guide for the application for the assessment of testing laboratories involved in legal metrology. This was obviously used to look at the competence of these laboratories, which had to be demonstrated by either accreditation or peer evaluations. The MoU originally signed in 2006 had been renewed to include the IAF in October 2007, to establish close ties between the three organizations.

    Nomination of lead assessors in the field of legal metrology was in the MoU and its associated joint ILAC/OIML working program for 2008 and 2009. ILAC had been invited to draw up a list of lead assessors who would be ready to participate in OIML peer assessments. That list had already been compiled and would be used as a basis for future cooperation between the OIML and ILAC, together with the corresponding list of OIML technical assessors when conducting assessments of legal metrology laboratories. Obviously, these assessors would require to be trained and the BIML had put together a training program which would be given to these people, and they would also need to familiarize themselves with OIML D 30 plus the requirements of ISO/IEC 17025.

    The training program had been reviewed at the OIML/ILAC/IAF meeting in March. Training would be free, and if a request was made for a lead assessor to carry out a peer assessment, the OIML would carry the cost and pay a daily rate.

    Regarding the OIML's and ILAC's wish to know the number of accredited legal metrology laboratories, this had now been established. A questionnaire to that effect had been sent out, replies being required by the end of April 2009. The OIML would make results available to CIML Members and Corresponding Members.

    Regarding the implementation of cooperation between ILAC and the OIML through the MAA, Mr. Chesolokile assessed progress as follows:

    1) lead assessors qualified by accreditation body ILAC full members - this was in place;

    2) technical and metrological experts qualified by the OIML; this was in process;

    3) improvement of communication between the national accreditation bodies and national legal metrology bodies;

    4) training for lead assessors from accreditation bodies, ILAC full members, as indicated earlier, this would be done in 2010;

    5) procedures for assessment in the field of legal metrology: some of the Documents drafted by the OIML had been noted and would be used in the process of training technical assessors and lead assessors;

    6) the guide for ILAC full members was one of the Documents to be drafted by the OIML in conjunction with ILAC. This would be prepared by the BIML;

    7) the survey of CIML Members and cross body members was on-going. Mr. Chesolokile mentioned a deadline of January 2010;

    8) the survey among accreditation bodies of ILAC full members would be circulated among ILAC full members. This had been planned for June 2009 but there had been a delay; an OIML liaison officer with the ILAC accreditation committee was supposed to have been registered as a member of that committee.

    Future development plans included the agreement at the Joint General Assembly in 2008 in Stockholm to establish a task force whose role would be to examine a number of issues highlighted by members as requiring further investigation before deciding to follow a particular direction. Composition of the Task Force included the chairs and vice chairs of IAF and ILAC, the chair of the nominated representatives from each of the four regions, stakeholder representatives from three areas, namely the IAF industrial representative, the IAF conformity assessment bodies and the ILAC laboratory committee; and a representative from the OIML. Their terms of reference had been developed and sent off to all IAF and ILAC members in mid-January 2009.

    Their second meeting had been held in May 2009, when documents had been produced under the titles of Tasks and objectives of the international infrastructure; Compiled comments and options; Cost considerations; Future of ILAC and IAF; Summary of responses to questions. These had been done at the request of the Task Force meeting held in Paris. At the meeting of the Joint Committee on closer cooperation in June, it had also been agreed that the JGA in Vancouver would be asked to consider the following three possible options, with a view to going ahead with one of them. These options were:

    1) the current situation;

    2) two legal entities, with partial integration;

    3) a single entity.

    Last but not least, Mr. Chesolokile would talk about Accreditation Day. The first International Accreditation Day had been held the previous year, on 20 June, with great success, to celebrate the achievements of both ILAC and IAF. This year, there was the very interesting theme of competence, something upon which much emphasis was placed in accreditation. Invitations had already been issued for the following year. Members had received a list of possible themes and were asked to express their preferences. Further information could be obtained from the Secretariats of ILAC and IAF. His role was that of messenger.

    Mr. Johnston thanked Mr. Chesolokile.

    Mr. Magaña pointed out that the talk, and the accompanying written presentation (available in the Working Document), contained an answer to a question raised earlier on the qualification of assessors in legal metrology; Members could see that this mutual training program to make lead assessors in accreditation and in legal metrology more aware of each others' specificities was already under way. It would also be possible to see all the presentations on line.

    Draft Resolution No.4 was drawn up and read.

    Mr. Richard pointed out that for Switzerland and Germany the difference between accreditation and peer assessment was very important. He said he would like to add to the Resolution, after the words "CIML Members are invited," the words "within the applicable national legal framework and regarding the responsibility of the relevant national bodies," and then continue the existing text. After the words "promote the use of accreditation", he would

    like to add, "or peer assessment using appropriate technological and metrological experts and lead assessors".

    Mr. Valkepaa referred to the table on use of accreditation given in the working papers. On behalf of Denmark he wished to point out that they had not received the questionnaire so had not been able to answer it. They further wished to add that all notified bodies' test laboratories within legal metrology in Denmark had been accredited, and they would like this to be noted. Also, he wished for discussion later on another point concerning the MAA. There were concerns about the ILAC/OIML list of experts in OIML Recommendations, the application of this list and what other possible experts might be used - in other words, he wanted some flexibility on the use of this list. These comments came from the three Scandinavian countries.

    Mr. Magaña suggested adding to the Resolution the fact that some countries had not been able to complete the questionnaire. Mr. Valkepää thought this would be a good idea. Mr. Magaña read a draft of an amended Resolution.

- number: '3.3'
  title: Standardization bodies
  narrative: |2+

    Mr. Magaña then summarized some points on liaisons with other organizations:

    - With ISO, the MoU had been revised and signed. Information on this MoU could be found on the web site. At ISO's request its full text had not been published, but its main points were on the OIML web site. Tables of correspondence had been drawn up with ISO between the TCs and SCs of ISO and the OIML. OIML SCs were registered in ISO as Type A liaisons so that ISO and OIML members (via the BIML contact persons) could have access to each others' draft publications. As far as he knew, this was working correctly. Any Secretariats which had problems with ISO should contact the Bureau, where the problem could easily be solved. Things were going well between the two organizations; Mr. Magaña had met the new ISO Secretary General informally at a BIPM reception, and he was keen to cooperate with the OIML: he wanted to meet the CIML President, and this was scheduled for March. There was also a good relationship with ISO CASCO, for conformity assessment issues, where ISO wished to experiment with working with regulators, and they believed legal metrology was the right place to start on this. Relations were good also with ISO DEVCO for Developing Countries issues. The OIML attended ISO meetings and General Assembly. The relationship with DEVCO might well be mentioned in the report on Developing Countries.

    - Work had not yet begun on a similar MoU with the IEC,but they also seemed willing to have a good and fruitful cooperation with the OIML,so work would soon begin upon this.

    Mr. Magaña read a draft of Resolution No. 5.

    Mr. Ehrlich raised several questions about the meeting documents pertaining to ISO:

    - He wanted reassurance that all OIML publications developed jointly with ISO were still available free on the OIML web site;

    - the text of the document stated that the next stage in the implementation of the MoU was to undertake a review of those OIML publications that had been withdrawn, to ascertain whether or not it might be appropriate to publish them as ISO Standards. This seemed

    curious, and he would like some information as to why withdrawn OIML Recommendations would be published by ISO; and

    - the text referred to a table in Annex C which discussed the relation between OIML Recommendations and ISO Standards; Mr. Ehrlich would like to suggest that this table be circulated to the OIML TC and SC Secretariats for confirmation, because he believed that some of the liaisons shown in it might need some modification.

    Mr. Magaña replied that there had been discussions with ISO, especially about OIMLR 99/ISO 3930 on exhaust gas analyzers. Previously this had been a joint publication with the two numberings. There was now an agreement with ISO that in the future the two references would not be put on the cover page: a joint Recommendation would be agreed but then it would be approved separately by both bodies independently, and then published with each using only its own reference number.

    R 99 had therefore been published free of charge on the OIML web site, with a statement on its introductory page that it was identical to the corresponding ISO Standard. ISO would publish ISO 3930 with a similar statement that it was identical to OIML R 99. But the ISO Standard might contain other sections which were not relevant to legal metrology and therefore not contained in the OIML publication.

    Mr. Magaña agreed the tables Mr. Ehrlich had referred to should be sent to TC and SC Secretariats for confirmation. A resolution to this effect would probably be added.

    For the moment no withdrawn OIML publications were being used by ISO but in a meeting ISO had been told that the OIML might occasionally withdraw a publication because it was no longer considered to belong in the field of legal metrology; in such a case, if ISO did not already have a Standard, the OIML would have no problem in allowing ISO to take it over as a draft or working document to speed up their own work.

    Mr. Richard asked for more precision in the words "along the same lines" in the present Draft Resolution 5.

    Mr. Magaña explained that this meant that the new Memorandum with ISO should be proposed to the IEC for discussion, with "IEC" substituted for "ISO".

    Mr. Dunmill added that apart from the actual words used in the MoU, the BIML had worked closely with ISO in setting up the table of correspondences between TCs and SCs. A similar process of improved cooperation would take place when the current old and rather general MoU with IEC was renewed. The process might not be mentioned in the wording of the MoU but would be going on in the background.

    Mr. Ehrlich reiterated his point about joint publications, which was that such joint publications did not really work and the suggested language on the subject should not be included in the MoU. The basic problem lay with keeping the review cycles together, so although he believed in working closely together with ISO and other organizations on the development of Recommendations and standards, he felt that the MoUs should not encourage the use of joint publications.

    Mr. Magaña answered that he agreed with Mr. Ehrlich, and that it was not his intention in practice to have many joint publications, because it was probably to some extent a duplication of work. For the moment there was one publication, R 99, jointly developed with ISO, and only one with the IEC, which was sound level meters. There were no plans to produce more joint work, but, when it seemed that a category of instrument was clearly within the scope of

    legal metrology and when there was an IEC standard, then the OIML should try to be consistent with the IEC. In principle, however, a publication from just one of the two organizations should in most cases be sufficient for both.

- number: '3.4'
  title: UNIDO
  narrative: |2+

    Mr. Dunmill told Members that an MoU also existed between the OIML, the BIPM and UNIDO, the United Nations Industrial Development Organization. Signed in December 2008, its aim was to promote closer cooperation between UNIDO, the BIPM and the OIML and to provide a good technical input to UNIDO's work in developing countries where metrology was concerned, normally as part of a larger quality infrastructure project.

    Some early activities of this cooperation had included:

    - a publication on industrial metrology laboratories, which should be completed at the beginning of 2010; although this largely concerned how to set up industrial laboratories, it contained several references to OIML publications. It was quite a thick book, and was currently at the stage of verification by the OIML and the BIPM. It had been written by a UNIDO consultant a couple of years previously but never published, so it was now being verified that the information was still up to date and relevant;

    - another booklet, for which it had been necessary to engage a consultant to produce the initial text, on the importance of legal metrology to Developing Countries. It was intended that this could be published bearing the logos of all three organizations; it could be used nationally for awareness raising activities among politicians, industry and consumers. More case studies needed to be included in order to show politicians and consumers why they needed to have a good metrology system;

    - as mentioned by Mr. Espina, there was also the AFRIMETS program to strengthen metrology throughout Africa, and the OIML was working on this also, along with the BIPM and UNIDO. Legal metrology was a significant part of the road map which was being established, and the latest news from UNIDO in the current week was that funding for the project to go ahead would begin to become available in November of the current year. Initially, they were making a detailed assessment of the needs of different African countries, which had significantly different capabilities;

    - there was also a proposal that the OIML should hold a regional workshop in West Africa with UNIDO, dealing with metrological supervision. The exact scope of this seminar would depend on the funding which UNIDO managed to allocate to it, and whether the donor of that funding tied any conditions to it, but it would be something related to metrological supervision and it had been decided to hold this first workshop in West Africa; if the format worked well, it was hoped to repeat it in other regions of the world.

- number: '3.5'
  title: Codex Alimentarius
  narrative: |2+

    Mr. Kool reminded Members that information on liaisons with Codex was in the working document. The OIML's main interest in the work of Codex had to do with the issues current in TC 6 for prepackaged products. The Codex Alimentarius Committee was responsible for international standards for food safety, but among their objectives they also had the term "ensuring fair practices in trade", which meant they were also concerned with food labeling

    and the quantity of product in prepackages. This was where there was an overlap between the OIML Recommendations, particularly R 87 and R 79, on the quantity of product in prepackages and the labeling of prepackages respectively, and the Codex standard on food labeling.

    Besides the Commission itself, which was the main body, Codex contained four committees of particular interest:

    - food labeling;

    - food import and export inspection and certification systems;

    - general principles; and

    - methods of analysis and sampling.

    In the past two years, BIML staff had attended Codex meetings and tried to establish general liaisons. Issues currently identified included interpretation of definitions, as there seemed to sometimes be differences of interpretation. The definitions which the OIML used, particularly in R 87, and the definitions in the Codex Standard on Food Labeling were not quite the same, and they had in the past led to differences in interpretation; one of the purposes of the liaison was to try and resolve these discrepancies.

- number: '3.6'
  title: WTO
  narrative: |2+

    Mr. Dunmill informed the Meeting that most of his information was contained in the paper which Members had received. The OIML had participated in a workshop held in March 2009 in association with the regular TBT Committee meeting, which had looked at the role of international standards in economic development. A report on that could be found on the WTO web site. They also attended TBT committee meetings regularly as an observer.

    His additional point was that the BIML wanted to look at the possibilities for making a more proactive approach to their relationship with the WTO during the coming year. The OIML had previously participated in a number of their capacity building activities, which took place in different parts of the world. About three of these took place each year, but their content was member-led, meaning the members said what they wanted on the program. In the past few years, it appeared, these WTO members had had no desire to see metrology as part of the program, either because they already knew everything about metrology or because they were unaware of their own areas of lack of knowledge. The OIML was therefore looking at ways of encouraging them to include metrology more. He asked Members to try to ensure that they had a good relationship with the WTO Enquiry Point in their country, because one of the major problems was the lack of communication, in both directions, between metrology departments in Member States and the WTO Enquiry Points, which were not necessarily under the same ministries and might not even know that the other existed. So he asked Members to contact their WTO/TBT Enquiry Point when they got home and at least make them aware that they existed. The BIML would also be trying to follow that up from the other direction, to get WTO offices to contact OIML Members.

    Mr. Magaña added that, on the WTO's TBT web site, there was a search engine enabling a search among notifications sent by countries. Members were aware that when a new regulation or a revision of an existing regulation was prepared, it had to be notified to the TBT Committee, and there was a process of consultation whereby other countries might send comments. The database was open to all. Metrology was a key word to search for and

    Members could see there all draft regulations notified to the WTO over a period of time, and could send comments to their national TBT Enquiry Point for forwarding to the TBT Committee. The name and address of the person in each country to whom comments should be addressed were to be found on the same web site. This information would also be put on the OIML web site so that Members could see what was going on in the rest of the world.

    Mr. Ehrlich referred to the last sentence in the working document, which stated that there was a change in focus of the WTO regional workshops in the current year; could Mr. Dunmill expand on that statement?

    Mr. Dunmill explained that until a couple of years previously, subjects listed on the WTO web site for their capacity building activities had always included contributions from the standards bodies. ISO, the IEC and the OIML in particular had all contributed at the same events. During the last year, Codex had been involved in most of the activities, and the IEC in one, but there seemed to have been a shift away from standardization activities. The OIML (which was regarded by the WTO as a standard-setting body because it published Recommendations) had not been invited.

    Mr. Dunmill also made the point that all notifications placed by WTO members on their web site should have used an international standard for the basis of their regulations, providing that such a standard existed, because in the terms of the TBT Agreement, members should use relevant international standards when developing their own national regulations. He asked OIML Members to keep an eye on this and make comments if it was not done, because in any of the fields covered by OIML Recommendations, the latter should be used as the basis for national legislation.

- number: '3.7'
  title: Other organizations
  narrative: |2+

    Mr. Magaña referred first to a mention in the working document of an informal group of other organizations based in Paris, and with which the OIML had some coordination on administrative issues, such as relations with the French Government. This was a useful forum for informal discussion of problems. One of these organizations had the previous year organized a very interesting seminar on the application of international accountancy standards.

    Two other organizations were of particular interest: NCSLI had proposed a Letter of Intent with the OIML, to promote closer relations between the two. This would shortly be discussed, but it seemed to Mr. Magaña to offer a good opportunity to promote the OIML and legal metrology worldwide. The organization was American but also international and their Congress was widely attended.

    The second organization was the FIVS, or International Federation of Wine and Spirits, who were very much concerned with many issues pertaining to legal metrology, because in each country many categories of instruments and many measurements were covered by legal metrology, so of course there were issues of quality of wine, promotion of wine, regulation of alcohol and so on, but also there was activity in weighing, in measurement of alcohol and of sugar content, etc. They were very interested in having relations with the OIML and they kept in touch. They had not been able to attend this CIML, but it was an interesting contact.

    Mr. Magaña concluded by telling delegates that, as they probably already knew, reports from the various liaison organizations had been posted on the Workgroups web site, in the folder

    "CIML 2009", in which might be found presentations from liaisons and regional organizations and also from the seminar, some of which were already on line.

    Mrs. Lagauterie wished to return to a question concerning the liaison with Codex, particularly the discussion paper proposed by the BIML. Members would know that the question of prepackages in Europe was dealt with in the European Directives which all Member countries had to adhere to. Those who failed to do so could be taken to court. Any re-examination of this matter must be undertaken with great care, because Europeans were not allowed to diverge from these Directives. She wondered whether the TC dealing with prepackages had received this discussion paper prepared by the BIML and whether it could be made available to other CIML Members.

    Mr. Magaña responded that this problem arose from the fact that there were some arrangements regarding labeling which seemed contradictory between what some Codex colleagues were doing and the OIML's R 79. This situation where two international organizations had contradictory regulations had to be resolved, so the OIML would approach Codex for discussions to settle the matter. This was the purpose of the discussion paper.

    Mr. Kool added that the paper as such had not been circulated. Its purpose had been to open discussions with the Codex committee on food labeling. The committee had looked at the paper and made comments, some of which related to whether the differences were really of terminology or just of interpretation. Mr. Kool had agreed with the committee on food labeling that a revised discussion paper would be prepared; this one would be discussed beforehand with at least the members of TC 6. The fact that R 87 was going to be revised was also closely linked with the discussion paper.

- number: '4'
  title: Member States and Corresponding Members
  narrative: "\n"
- number: '4.1'
  title: New Member States and perspectives
  narrative: |2+

    Mr. Magaña told Members that there had not been any new Member States in the past year. Last year he had reported that two or three countries were interested in becoming Member States; of these, the Colombian Parliament was in the process of ratifying the OIML Treaty, which had already passed its second reading, and the process was expected to be completed by April 2010. It had taken longer than expected because a small amendment to their constitution had been needed. Mr. Magaña had visited Colombia to assist the process and had met representatives of both the House of Delegates and the Senate, who were very keen to join both the OIML and the BIPM.

    Mr. Magaña would make another attempt to contact the other country which had expressed interest in membership but changes in personnel there had meant that his contact with them had been lost.

- number: '4.2'
  title: New Corresponding Members
  narrative: |2+

    The Dominican Republic was now a Corresponding Member. This was a very special case because the Dominican Republic had been one of the signatories at the origin of the Treaty, and thus among the countries which had founded the OIML, but at that time they had not ratified the Treaty, and so had never become a Member State. They had asked for

    Corresponding Member status because of the cost of full membership for a small country. The OIML was very happy to welcome them.

    The other new Corresponding Member was also an unusual case: it was the UEMOA (Union Economique et Monétaire Ouest Africaine or Economic and Monetary Union of West Africa), a group of French speaking countries in West Africa, which had asked to become a Corresponding Member as a group. Mr. Dunmill had been in contact with them in connection with the UNIDO program. They were setting up regional regulations and a regional Legal Metrology infrastructure.

- number: '4.3'
  title: Member State contributions and arrears
  narrative: |2+

    Every year, following the decision taken in 2005, the CIML looked at the economic data of countries and reviewed the contributory class of Members. In the current year, due to the economic crisis, it had been decided that no contributions should be increased. There had not been any significant arrears; no state was more than two years in arrears and where this had happened it was often due to administrative delay. However, the situation continued to be monitored carefully, as the Committee had decided that when a country had three years of arrears it would automatically be struck off and the debt would not be allowed to increase beyond that point. There was no such problem at the moment.

    Two countries had arrears:

    - The Democratic People's Republic of Korea had asked to step down to the status of Corresponding Member. They had done their best to pay their arrears as Member State and in addition to their Corresponding Member lump sum subscription they had also paid part of their arrears.

    - Zambia had been struck off the list because of arrears; unfortunately this country was therefore now neither a Member State nor a Corresponding Member. It had made no reimbursement, though the BIML would continue to ask for this.

    Mr. Magaña added that it was not easy for a country such as Zambia to repay, but that a Resolution had to be made to ensure the utmost was done to recoup the payments.

- number: '5'
  title: Presidential Council activities
  narrative: "\n"
- number: '5.1'
  title: Report of the CIML President
  narrative: |2+

    Mr. Johnston explained for the benefit of new Members the role of the Presidential Council. It was first and foremost an advisory council to the President. It was made up of the President, two Vice-Presidents and Members appointed by the President for a term specified by him. He commented that this represented a lot of power for the President. Also in attendance were the Director and the two Assistant Directors, to provide support and advice to the Presidential Council.

    The Council met twice a year, once in conjunction with the CIML and the other, primary and more lengthy, meeting in March; this time was chosen so that they could have liaison meetings with other organizations such as the BIPM and ILAC. The purpose of the Council was to try and provide advice to the President, and to try and determine what options might be

    available on any issue that arose. These options would then be brought to the CIML and presented to the membership with a view to obtaining their feedback and eventual decision.

    An example of one such issue was the suggested rapprochement with the BIPM. Members would remember that at the previous Meeting they had been asked for comments on the potential rapprochement. A number of comments had been received from various Member States, which the Presidential Council had reviewed at the March 2009 Meeting. Mr. Johnston had invited Mr. Richard from Switzerland to attend that portion of the Council meeting with a view to obtaining as much input as possible from Member States. There had then been a meeting with the BIPM. The outcome of these discussions was in the working document distributed to Members; however, time had been set aside the following afternoon for further discussions on the subject, on which occasion Members' comments would be welcomed.

    Time was also set aside at these March meetings of the Presidential Council for a review of the work of the Technical Committees. They looked for issues that needed to be resolved, or any problems, for example any Committees that might be falling behind. Basically, it was an annual review to know where things stood and to offer help if any TCs needed it. He personally found it very useful to familiarize himself with the work of the TCs in this way.

    The Award for Developing Countries had been brought to the Council the previous year. The Presidential Council had put together a procedure and reviewed it, and the Award would be given for the first time during the current week.

    One of the issues which had been under discussion for some time was conformity to type, and another discussion on the same subject had been held in the current week. Mr. Magaña had given a presentation, which he would repeat during the coming CIML Round Table discussion. Depending on comments heard then, the work would then be allocated to the appropriate TC/SC to begin. Mr. Johnston expressed appreciation for Mr. Harvey's leadership on this issue over a number of years.

    In March the Presidential Council had met the BIPM. There was a very good working relationship between the two organizations, with open discussion in which they could agree or disagree without acrimony, while continuing to work closely together. Mr. Espina had mentioned that the OIML and the BIPM had worked closely together for International Metrology Day in 2009, and they would also be involved in similar projects in 2010 and subsequent years. The Directors of the two organizations had presented the roles of the two organizations at a metrology day in Dubai, Mr. Magaña had made a presentation at the CIPM/MRA event, which Mr. Dunmill had also attended.

    The MoU signed with ILAC and the IAF had been quite constructive, as they all now seemed to understand each other better. A work plan was developed into an action plan, which had been examined in the March meeting to make sure some progress was being made. Mr. Johnston tried when possible to attend the ILAC and IAF General Assemblies, and at the current year's Vancouver Meeting he had given a presentation on some of the issues the OIML was facing and a general update. At this meeting he had met the new Secretary General of ISO, whose presentation had demonstrated a different attitude from that of his predecessor.

    Members would also recall that a new Auditor had been appointed to audit the accounts of the BIML. This lady, Madame Cordier, had presented her perspective on the financial statements to the Presidential Council. Mr. Johnston had then decided that he would ask her to perform a management audit in addition to the normal financial audit, in order to ascertain whether

    Members' money was spent well and wisely as opposed to whether the figures were correct. This audit had been carried out in July 2009.

    The audit report had highlighted a relatively large number of issues which needed to be corrected by the BIML Director. Mr. Magaña had seen the report and had given Mr. Johnston a list of corrective actions that he was undertaking or about to undertake. The Auditor had reviewed these comments also and had felt that they did respond to the questions she had raised during the audit; Mr. Johnston was now in the process of reviewing the action plan resulting from this process, with the purpose of being able to respond to another management audit which he was planning for the following year. This process had been very productive and seemed to him to be a good thing for an organization such as the OIML to undertake, and he might well make it an annual process. The audit had brought to Mr. Johnston's attention various issues, one of which was the need for stronger administrative procedures.

    Mr. Johnston stressed again that the Presidential Council was advisory, helping the President to bring matters for decision by the CIML or Conference. It might at times take a position on something, which occasionally might not be in line with the opinions of a majority of Members. He himself found it very useful to be able to send out a message to the Presidential Council asking for opinions and advice on matters which might arise. It was on his initiative that the two Assistant Directors had been added to the group - he had felt that otherwise it would frequently be necessary to find one of them in order to ascertain necessary information, as the Assistant Directors worked both with certain TCs and with certain other international organizations.

    Mr. Richard thanked Mr. Johnston for inviting him to the March meeting and for the idea of the management audit. He asked whether the report from this could be made available to CIML Members.

    Mr. Johnston explained that there were some privacy issues in the report, including one or two names which could not be released. However, he had asked Mr. Magaña to provide a summary of the audit observations and the recommendations on dealing with it; this would be made be available as quickly as possible.

    Mr. Mason pointed out that Mr. Johnston's report had indicated a wide range of topics discussed at the Presidential Council Meeting; he wondered whether it might be possible for minutes of it to be made available. Obviously it would be difficult to do this for the meeting which took place at the same time as the CIML but there might be benefit in having the sort of minutes that were produced for the CIML, which would help Members in their preparation for the CIML Meeting.

    Mr. Johnston agreed that this might be possible, obviously excluding any item that might be confidential, though it was rare for there to be any such item.

    Moving on, he reminded Members that he had promised to allocate them time to express their opinions on the subject of a possible rapprochement with the BIPM.

    This matter had been under discussion for a long time and the possibilities ranged from closer cooperation to a full merger. A number of comments had been received, as requested, from various countries after the discussion at the Sydney CIML Meeting. After obtaining permission from the writers of the comments, these had been sent to the BIPM, following which the Presidential Council had discussed the matter in March, Mr. Richard having also attended that portion of the meeting.

    After the Sydney Meeting, the conclusion had been reached that certainly closer cooperation would be an excellent idea and the two Organizations should work towards that. There did not seem to be an appetite for a full merger - indeed the Presidential Council discussions in March had reached the same conclusions. The following day the meeting with the BIPM had taken place, and on that occasion rapprochement had been the first topic on the agenda.

    Mr. Johnston reminded Members that it had been the BIPM that had initially broached the idea of a rapprochement, so everything had evolved from there. At the meeting, Mr. Johnston had opened the discussion with the information he had earlier provided to the BIPM, plus the conclusions from the Presidential Council Meeting. It then transpired that the position of the BIPM had changed by $ 1 8 0^{\circ} $ , in that while everybody agreed that closer cooperation was a good thing, they no longer wished to discuss merger or even formally to discuss any operations that might be combined. The discussion was very short. Mr. Johnston had tried to raise the matter again later in the meeting, and was again informed that the BIPM was not interested in it at that time. Naturally, discussions between Directors and Assistant Directors continued as before whenever time allowed.

    So the present position was one of endorsement of the present close contacts, such as the Directors' joint presentation in Dubai, and when one Organization was attending a meeting and the other was not, if a joint presentation was a possibility they tried to arrange that. But no discussions on further rapprochement were currently in progress.

    Mr. Johnston was not against the idea of rapprochement; long term objectives would need to be set out, together with the means of achieving them, but in any partnership both sides needed to be working towards the objective, and that was not the present situation.

    Mr. Klenovský said that he was also chairman of an NMI, and had had a very similar experience at a recent meeting with the BIPM, which seemed to have completely lost interest in any negotiations with the OIML; the BIPM had in fact stated that it had put forward some proposals but that the OIML had not responded.

    There had then been discussion of a linear accelerator, expensive equipment for purposes of achieving traceability of medical measurements used for treating tumors, replacing Cobalt 60, and there was a question of whether this was a matter of legal metrology or not, and what would be the procedure for verifying those instruments. This case clearly demonstrated that there was a close connection between traceability matters, which were the responsibility of the BIPM and regulation, which was that of the OIML, so this showed that "in-between areas certainly existed. For those who represented their country in both Organizations, it was very difficult to know what they should say to their government about negotiations.

    Mr. Johnston said that he was not aware of any outstanding proposal from the BIPM which had not been responded to; Mr. Klenovský responded that other directors of NMIs would bear him out, but Mr. Johnston reiterated that if he had received any such proposal he would certainly have replied to it.

    Mr. Leitner said that he too, as an NMI Director, had received the impression that it was for the OIML to respond to a BIPM proposal.

    Mr. Johnston replied that at the March meeting, attended by several OIML personnel, there had been neither discussion nor proposal. He himself had been pressing for further discussion, to carry out the wishes of the CIML, but had achieved nothing thereby. He assured Members that it was not the OIML which had shut the door.

    Mrs. Vukovič, speaking on behalf of WELMEC rather than Slovenia, said that she had read the comment that that rather than a top-down approach they would prefer a bottom-up approach, meaning that at a regional level organizations such as WELMEC and EUROMET should cooperate more on scientific and technical work between their working groups. She felt that at European level, not enough was made of these potential resources for the benefit of international metrology. She and others were already at work on improving such cooperation, and were discussing the draft memorandum together. The problem had been identified at European level.

    Mr. Mason said that he also had attended the meeting in Paris and could confirm Mr. Johnston's account of what was being said at an official level. However, he had had a number of bilateral discussions, during which he had received the impression that the BIPM was interested in working together, but that their position was better understood if it was realized that to date what they had been thinking of was a merger of the institutions.

    Mr. Richard thought that to speak of merger of the two Organizations was a mistake which had been made in the past and should not be repeated. It was also their responsibility to think about the needs of legal or scientific metrology for the future, but from a very strategic point of view.

    Mr. Richard returned to the discussions of rapprochement in the Presidential Council meeting reported in Annex A2 of the working document. He first expressed thanks for publishing the Members' comments in Annex A1. This gave all Members a good opportunity to see what others had said.

    On the subject of Draft Resolution No. 3, Mr. Richard said that during his careful reading of Annex A2 he had noted, and would quote, seven elements of special interest in the report on the Presidential Council Meeting, as follows:

    - It was necessary to identify future needs for both legal metrology and scientific metrology (A2.1).

    - Lines between the two had moved a lot in the last 50 years (A2.1).

    - The ongoing evolution of metrology and of the two Organizations would bring their work closer together (A2.1).

    - The issue of rapprochement should be considered after consultation with the stakeholders (A2.5).

    - The issues of rapprochement are mainly strategic in nature (A2.6). This point was very important and had not been the case in the report seen the previous year.

    - The President would discuss with the BIPM how to develop a practical, global consistent image of international metrology (A2, conclusion).

    - As a conclusion, Mr. Magaña had been asked to prepare a draft report on the rapprochement in order to inform Members of the two Organizations about this issue. This report would be discussed with Andrew Wallard, the BIPM Director, and then sent to Members by the two Directors (A2, final paragraph).

    Mr. Richard found these elements very interesting and promising. He thanked the Presidential Council for its excellent work in analyzing these issues, for its good contacts with the BIPM and for its desire to anticipate the evolution of metrology and especially legal metrology, as

    already partly discussed during the Seminar earlier in the week in response to Peter Mason's presentation.

    It was time to take a decision that the possibilities must be analyzed in great detail, not with a view to immediate merger but thinking of the strategic future. If after very deep and strategic analysis the Committee or the Conference came to the decision that a merger was not the right solution for the future of the OIML's needs, that was not the problem. But the discussion had to start at once in order to strengthen the position of the OIML.

    In this regard, Mr. Richard would like these elements to be included in Draft Resolution No. 3, and suggested that the first part be worded in the following way, which was similar to the wording of Resolution No. 10 of the previous year's CIML, for the first part:

    "The Committee expressed its appreciation for the excellent cooperation between the Presidential Council and the Bureau of the CIPM as well as between the BIML and the BIPM".

    For the second part, Mr. Richard proposed considering the comments from the report of the Presidential Council in the following way:

    "The Committee asked the Bureau to prepare a draft report on the rapprochement in order to inform the Member States of the two Organizations about this issue and encourage further discussions during the 45th CIML Meeting. This report is to be mainly strategic in nature and to consider the point of view of stakeholders of both Organizations as well as the comments received from CIML Members. This report will be discussed with Michael Kühne, the future BIPM Director, and then sent to all Member States by the two Directors".

    Mr. Mason expressed strong support for Mr. Richard's proposal. He added that after the Paris Meeting he had had the impression that many organizations, not just the BIPM but also ILAC, IAF and ISO wished to move more closely together in the way that they tackled some of the common problems, and to develop a common approach to the needs of the global economy. In his view, there was a real danger that the OIML could be left behind if they were not seen to be taking the initiative. He agreed that it was right to talk about a strategic approach but they also had to enter into detailed proposals about exactly where and in what way they were going to work together.

    Mr. Flandrin said that he supported the views of his Swiss and British colleagues. He was appreciative of having received, among the documents given to all the Members, all the comments received from Members and the résumé of Presidential Council discussions. These formed a concrete and useful basis upon which to proceed with discussion and make proposals. He agreed with both previous speakers on the need to move in the direction of rapprochement. The French delegates from both the BIPM and the CIML were very much in favor of this. He also agreed with Mr. Richard that it was important to identify specific areas for cooperation before moving closer to the BIPM, but he considered that this could be done without difficulty.

    His final remark concerned the personnel in the two Organizations concerned in this matter. It was quite clear that the President, at the behest of the CIML, was in charge of the OIML's side of any negotiations, but it was less obvious who was leading them on the BIPM side. It did not seem to be the CIPM, since as a Member of that he had not been consulted, yet it was vital that the Member States should be involved in such a process.

    Mr. Magaña said that discussions in March had been held with the Bureau of the CIPM. This had a somewhat similar function to the OIML's Presidential Council, and was composed of

    the CIPM President, Vice President and Secretary, the Director and Deputy Director of the BIPM and perhaps one or two additional experts. The CIPM Bureau did not officially represent Member States. The CIPM was a group of appropriate experts who were appointed by the General Conference on Weights and Measures, and was composed of 19 people appointed as experts and not as representatives of their country. They were a small team which worked with the CIPM President to advise the President and the BIPM Director on various issues. These people represented themselves, and not the Member States, who were represented by the General Conference, which took place every four years. The next time this met would be 2011, so unless other processes were used to consult Member States, that would be the next occasion on which they might be informed.

    Mr. Johnston proposed that, rather than try to put Mr. Richard's rather lengthy proposal on the screen at once, it should be transmitted to Mr. Kool for preparation in time for Members to study it before the review of the Resolutions in the last session of the CIML.

- number: '6'
  title: Round Table on Metrological Control
  narrative: |2+

    Since the majority of delegates had attended the Round Table, and in view of the lack of time available during the CIML Meeting, it was not deemed necessary to review or comment on the Round Table discussions. The CIML President informed Members that a summary would be published (see Annex), and so unless there were any specific questions he proposed to move onto Item 7.

- number: '7'
  title: Report on the Seminar "Stakes and priorities of legal metrology for trade"
  narrative: |2+

    Mr. Magaña said that most Members had themselves attended the Seminar and that there had not yet been time to make a summary of it. He merely wished to say that all the presentations were already online on the OIML web site or would shortly be there, and that they could be downloaded from there; he had taken some notes, from which he would also make a summary of the discussions in the Seminar. It had also been recorded, and its full proceedings would be published as soon as possible (see OIML S 5:2010).

- number: '8'
  title: Activities of the Bureau
  narrative: "\n"
- number: '8.1'
  title: Publications
  narrative: |2+

    Mr. Magaña informed Members that all the publications that had been approved had been published and were available in English online. The French versions were not yet all available. R 85 and R 138 had been translated into French and were also available on the web site, and three other publications (D 31, R 76 and R 117) were being translated either by the Bureau or contracted out to experts. These would be available as soon as possible. As often happened in the course of translation, some questions had arisen, especially on R 117, which had to be checked with the TC Secretariat in case an erratum or amendment was needed.

- number: '8.2'
  title: Technical activities
  narrative: |2+

    The following status report was given to Members:

    - This year again there had been a training course for Secretariats of OIML Technical Committees. As with the first one the previous year, it had been held in Douai, in France, and had worked extremely well. There was a report on this in the working document. All the participants had been very satisfied.

    - There had been a Smart Meters Seminar, upon which delegates would hear a presentation later in the Meeting.

    - The Bureau had continued with its normal work of following up the work of the TCs and SCs, which were currently developing a number of important issues.

    - The Bureau had given help to TCs in writing down requirements in software, based on D31. In a number of cases the Bureau had provided proposals for consideration and inclusion by the TCs.

    - Concerning the MAA, there had been meetings of the Committees on Participation Review; this had been a joint meeting for the three Declarations of Mutual Confidence and had been held in Berne. There would be further information later both on the MAA and on the CPR meetings.

- number: '8.3'
  title: Support to Regional bodies
  narrative: |2+

    The Bureau had attended the General Assemblies of all the regional bodies and also a number of their working groups which the Bureau had considered to be of considerable strategic importance.

- number: '8.4'
  title: Liaisons
  narrative: |2+

    The Bureau had attended the main meetings of the WTO/TBT Committee, Codex Alimentarius, ISO CASCO, ISO DEVCO and had also been represented at the ISO General Assembly. They had also had some contacts with the Smart Meters Coordination Group, a European group of standardizers and industries which was addressing issues affecting smart meters. They had had a joint work program with ILAC and IAF, which had been implemented and then reviewed at a joint meeting with ILAC in March. Liaison with the BIPM, as previously stated, had been very fruitful and constructive; there had been joint representation of international metrology in various regions and countries.

- number: '8.5'
  title: Promotion of the OIML
  narrative: |2+

    The OIML had participated in a number of workshops, one in Amman, in Jordan, one in Dubai in conjunction with the BIPM; they had participated in an Asian seminar on mutual recognitions in Indonesia, where they had given a presentation on the OIML MAA; they had attended the Milestones seminar in the Netherlands; and they had participated in the International Congress of Metrology in Paris, which took place every two years.

- number: '8.6'
  title: General
  narrative: |2+

    The Bureau had reviewed its databases with a view to making a number of changes following decisions taken at the previous year's CIML regarding how categories and publications in the Certificate System should be registered. It had carried out the online survey on the implementation of Recommendations, which had already been presented in the Seminar. This was a very important step. The survey would shortly be improved to make it more user friendly, but had already led to good progress. Preparation for the CIML Meeting of course always occupied much time, and financial issues had been time consuming in the past year, because of the audit already mentioned. For the new type of audit, the auditor had gone deeper into the operation of the Bureau and the Director had been obliged to furnish a large number of answers and explanations and take a number of immediate corrective actions.

    ## Mr. Magaña invited comments on the Draft Resolution

    Mr. Vinet suggested that a PDF version of the inquiry concerning the implementation of Recommendations should be made available to everyone and put on the web site. Very often, to receive responses the inquiry had to be sent to many people. At present there was restricted access via a special password, and he felt that a PDF version would make things much simpler for Members.

    Mr. Magaña replied there would be no problem in this. At the moment the survey was sorted by publication; to answer for gas meters it was necessary to answer for R 31 and then R 137, which was in another place. To make it more user friendly he would group questions by category of instruments so that at least gas metering would be found in one place and other categories in another. Another issue that had been mentioned was that when a new category appeared, Member States had to go through the whole questionnaire to find it. He would address these changes and would also provide a PDF as requested by Mr. Vinet.

    Mr. Issaev thanked the Bureau for the second training session, which he had found very interesting and very important. Russia now had five trained TC Secretariat leaders. He wondered whether there were plans for other training sessions; for example they had some difficulties with the MAA. He wondered whether it might be possible for some seminar or similar training on that subject to be made available.

    Mr. Magaña replied that no training for TC Secretariats was planned for 2010 but in the future there would be updates of training and training for new Secretariats. Concerning other issues, this could be considered. He was not sure whether there was a need at present to train for the MAA; the experts who worked for the CPRs for the peer assessment had received sufficient training and information for their task, and they were working with ILAC to make ILAC lead assessors aware of legal metrology. No formal training sessions were currently envisaged but if a need arose, it could be considered. The idea of summer schools had been raised at the Seminar. He would discuss the matter with the BIPM because they found that preparation of a summer school required enormous work, taking a heavy toll on resources. It would be necessary to find high level lecturers; those attending would have to pay for all this, which might raise budgetary problems for them.

    Mr. Espina said that the BIPM had run two summer schools, in 2003 and 2008, and that their preparation indeed had entailed tremendous work. The average cost of participation was about 5000 $ \epsilon $ per student, on top of which visiting lecturers had to stay in Paris for about two weeks. The whole process was so onerous that it prevented the BIPM from doing anything else for a couple of months.

    Regarding the summer school idea, Mr. Richard wondered if it might be possible to have a legal metrology session at the BIPM Summer School. He also asked whether it was the case that some Recommendations withdrawn the previous year still figured in the questionnaire.

    Mr. Magaña confirmed that some withdrawn Recommendations had been kept in the list because some countries had legislation which was still based on these. Electricity meters were in the inquiry so that people answering could state that they regulated electricity meters. Other countries stated that the old Recommendation was not appropriate for them.

    Mr. Richard suggested that in that case the inquiry should show which of the Recommendations mentioned were active and which were withdrawn, and the withdrawn ones should not be counted in the statistics.

    Mr. Magaña said this could be done. The figures were a rough estimate and not a scientific calculation, but Mr. Richard's suggestion would be looked at.

- number: '9'
  title: Financial matters
  narrative: "\n"
- number: '9.1'
  title: Pension system
  narrative: |2+

    Mr. Magaña said that he had given an explanation of the pension system the previous year at the Conference. It had been noted that the international standards on accountancy made it mandatory in principle to record the rights acquired by the personnel for ever, without any time limit. As a result, the provision for pensions, previously rather limited, had become very high and absorbed most of the reserves. Also the annual contribution to endow this provision was very large, due to the fact that all the rights acquired, and all the pensions that would be paid over the course of 40 years, had to be accounted for, none of which had previously been the case.

    Mr. Magaña had therefore suggested to the Conference that they should step back and consider making pension provisions which would cover the medium term but not the very long term. The Conference had instructed the President and Director to examine the issue with an appropriate expert and take provisional measures until a decision could be taken by the 2012 Conference.

    The provisional rules on pensions stated that:

    - provision for paying a certain number of years' pensions should be covered. Mr. Magaña had chosen a period of five years, so that each year provision was made to cover the next five years' pensions. This was for the medium term and more than covered the four-year period between Conferences;

    - the totality of rights acquired by the personnel, without any limit of time, would still be evaluated by an actuary and presented to the Conference as an informative annex to the accounts. This annex would therefore state what pension rights would be due to the personnel in the case of the OIML being dissolved. This was also done in other organizations similar to the OIML;

    - the Member States were liable for these acquired rights but the OIML had some resources, in the form of its very valuable building, the purchase of which was now almost fully depreciated. The value of the building would also be evaluated and presented to the Conference so that Member States could see that the totality of rights acquired by the personnel was covered by the value of the building. This also was done in a number of other organizations, and meant that the total pension rights acquired by

    the staff need not feature in the annual accounts, since they were fully covered by the OIML's assets. The only event in which the totality of rights would have to be paid was the dissolution of the OIML. Otherwise the pensions to be paid every year could be balanced by the five year provision.

    This plan was not strictly in conformity with the International Standards on Public Accountancy (IPSAS), but it had been discussed with the external auditor, who was from the Cour des Comptes, the body in charge of auditing French public bodies and a member of the board of IPSAS, so she was very knowledgeable about these issues. She was also external auditor to two other Paris based international organizations, the OIE and CIHEAM, which were about the same size as the OIML. She had informed Mr. Magaña in discussion that although the international accountancy rule had been adopted, a number of countries were rather reluctant and already saying that they would apply it in the way which Mr. Magaña had just explained. She considered his proposed rule acceptable. This rule of course needed to be inserted in the revision of the Financial Regulations and submitted to the Conference but in the meanwhile it would be reasonable to work on that basis.

    The new rule had therefore been applied in the 2008 Accounts. The previous year, provision for long term pension rights had had to be included in the accounts, but for 2008 provision only needed to be made for five years, with the result that about 1 million euros could be returned to the reserves. Pension provision covered more than the four-year financial period and would be updated every year, and the situation could be discussed at every Conference with a decision being made as to whether to continue on the same system. The finances of the OIML were in no danger. A full revision of the Financial and the Staff Regulations of the OIML would have to begin at once, to substitute the new arrangements for the old ones. The new regulations would be presented to Conference in 2012 but interim reports would be given to the 2010 and 2011 CIML Meetings.

    Mr. Johnston informed Members that Peter Mason had graciously agreed to assist with the work of revising the Financial Regulations, particularly where it related to pensions. Mr. Johnston had felt guilty asking for this since Mr. Mason had told him that his workload had doubled but his salary had not, but Mr. Mason had agreed to offer his expertise, for which Mr. Johnston was very appreciative.

    Mr. Issaev asked how many people the fund covered. He knew that the former Director, Mr. Athané, was not among them.

    Mr. Magaña said there were $ 4 \frac{1}{2} $ people on pensions, or four plus the widow of one, and two people actively contributing to the pension system. It had been necessary to ask an actuary to calculate the rights acquired, and the actuary had made very complex calculations based on statistics and life-expectancy, upon which the evaluation would be based, although calculations based on four persons were not statistically reliable.

    Mr. Richard said that although this Resolution would be submitted to the next Conference, he had had a firm mandate from his ministry and the Swiss Ministry of Finance to refuse this Resolution, for two reasons: they did not agree with Mr. Magaña's interpretation of Article XXXI of the Treaty; and if an obligation existed for the States they wanted this to be explicitly stated in the Resolution.

    Mr. Magaña replied that his interpretation might have gone beyond what was written. The exact words of the Convention were: "In case of dissolution of the OIML, the assets and the product of the sale of the assets is distributed to Member States after having taken out the rights acquired by personnel". So, if the assets could not cover the pensions, there would be a

    problem. But in fact the assets covered all the pensions to be paid and all the rights acquired. Member States would receive what was left after taking out the rights acquired by staff. It did not explicitly state that States were liable for these rights, but they would only get back the money that was left after the rights had been satisfied.

    Mr. Mason said he was looking forward to examining this issue in more detail. The question that occurred to him, if the Member States did have this liability, was whether Member States themselves should recognize that liability. If there was a 40 year liability for pensions and they were only providing for five years of that in the OIML accounts, then the question raised for all Member States was whether they should recognize the balance of that liability. He would want to address this question and discuss it with his Finance Ministry. The reason for having international financial standards being introduced was so that all countries could have a common understanding of how their liabilities were calculated. The matter would have to be looked into further, but hopefully they had three years until the next Conference for this to be done.

    Mrs. Van Spronssen agreed with the proposition that Members' liability for pension rights be made explicit in the Convention. She also raised the point that if the decision had not been taken yet to put the reserve from the pension fund into the general reserve, she would like to see if it was possible to put it in a reserve specially for pensions until the Conference, so if the Conference made a different decision, the money would still be there and would not have been used for something else.

    Mr. Magaña replied that what was written in the old Staff Regulations was that a fund had been set up for the payment of pensions. This fund was accounted as an asset. On moving to the international standard, two things had to be considered: first, what rights should be recorded all rights for ever, or the charges due in the medium term; and second, whether there should be a dedicated asset for this. If the IPSAS rule, which was the same as the rule for the private sector, the IAS, was applied strictly, all the rights acquired should be shown in their accounts, and there should also be an asset which was dedicated for the payment of this charge and which could not be sold. They had come to the decision that in the event of their having to pay all these rights, which would occur only on the dissolution of the OIML, the liability of Member States had to be clarified. On the other hand, the building was an asset which was recorded for almost nothing, because it had virtually been reduced to nothing through depreciation, but which in fact was capable of covering the cost of the pensions. It was the interpretation of this fact which had led to the proposal being framed in the words used. He had considered having the building re-valued, but if that was done it would have to be shown in the accounts as depreciating over 50 years, thereby automatically making a charge on the accounts which was not a real charge, and not producing any advantage.

    Mr. Magaña read the proposed Resolution.

    Mrs. Blasco told delegates that she considered that both rights and assets should be accurately recorded. If the building had a higher value, this too should be shown in the accounts.

    Mr. Magaña replied that about 70 000 € per annum were paid out as pensions. If they were to record all rights acquired for ever, it would be necessary to make provision for some 400 000 €, to plan for expenses which would occur only in the very long term. This would create an apparent deficit of more than 300 000 € for the OIML for expenses which were not due in the medium term. It did not seem reasonable to him to have to show this charge in the annual accounts. If this had to be done, other issues would have to be considered in the OIML accounts so that these could balance. He wanted to avoid having to request that drastic

    measures be taken such as a decrease in the number of Bureau staff, because the number of staff seemed reasonable to him. The operating costs were correct; the only way of meeting the costs of the pension scheme if long term liabilities had to be shown, would be to raise Members' contributions, and this was not the right time to take such action.

    Mrs. Blasco said that the deficit had to be taken into account, because it did exist, whether it were shown in the figures or not.

    Mr. Magaña commented that the pension scheme had started at a time when in France and in many other countries all pensions were based on the principle of repartition. There had never been any valuation of all the rights acquired. This situation had only arisen on transfer to the new accountancy. The new rules had drastically changed the OIML's economy, and, although there were arguments to the contrary, many countries, such as France, were taking the view that because the State was liable for them, it was not necessary to account for all the rights acquired. Mr. Magaña felt that the OIML was in a position to take a similar path. The Convention was not very clear on the question of liability.

    Mr. Mason asked whether the opinion of the external auditor had been obtained on the question of revaluing the building. It seemed to him that the normal way to apply accounting rules would be to show the actual value of this asset. This whole issue concerned the liability of Member States to meet obligations over a period of time; they were looking for a way to understand what their commitments might be in future years, and the current value of the building, together with its future depreciation costs, seemed to him to be a vital part of that understanding.

    Mr. Magaña said that the question of revaluing the building had not been discussed formally with the auditor; he himself would put its value at about three million euros. The two possibilities were either to revalue the building, put it in the assets and depreciate it all over again over 50 years, or to revalue it annually. Depreciation of such a building had little meaning since in practice it did not lose its value. He thought this question should perhaps be examined with the external auditor.

    Mr. Mason pointed out that as well as this there were other uncertainties which had been identified, including the meaning of Article 31. There might also perhaps be other possible ways of showing Member States' liability, perhaps as the equivalent of uncalled capital. In view of the existence of other unexplored possible approaches to the problem, he considered that it was premature for the current Committee to agree on the provisional rule to be used until the next Conference.

    Mrs. Van Spronssen said she had been thinking along the same lines. There was no doubt that Member States were liable for pensions. The employees had earned them and must have the security that they would be paid. The decision to be made was in what manner this obligation was to be fulfilled. If the Member States decided not to put aside the full reserve to pay the pensions, then there must be an asset to set against the cost of them. The Member States would either have to accept their liability or else put the full cost in the accounts. She agreed that this Draft Resolution was premature because there were still a number of avenues to be explored.

    Mr. Magaña had two questions: should the building be revalued and put in the assets to show that this was the fund that would cover liability for the pensions; and should all the rights acquired into the distant future be recorded among the liabilities, which would mean adding about 350 000 euros to the Bureau's deficit.

    Mrs. Van Spronssen said Mr. Magaña had asked what should be done. She thought that nobody could answer those questions at the moment. She suggested that the draft Resolution should be altered to apply Mr. Magaña's rule for one year only, and in the course of that year more detailed research should be done into alternative ways of dealing with the problem, and its results brought to the flowing year's CIML.

    Mr. Magaña said that this had been the President's advice also. Perhaps a decision could be postponed, and a complement of study set up consisting of experts and some interested Members, and the 2008 accounts revised in the light of the discussions and brought back in 2010 for approval. These 2008 accounts had been drawn up according to this rule, which had been approved by the external auditor. If the rule was changed, the accounts had to be changed. A couple of years previously approval of the accounts had been postponed for a year because it had been discovered that they had contained an error.

    Mr. Johnston asked whether Members were in favor of postponing the review of the financial statement until after this review had been completed.

    This Resolution was passed without objections.

- number: '9.2'
  title: 2008 Accounts
  narrative: |2+

    Mr. Magaña pointed out that although approval of the accounts had been postponed, everything contained within them was correct. Operating income and charges were valid. He could still answer any question that might be asked. Of course, in the accounts, the charges were now not correct as they included the reduced endowment to pensions. He asked whether Members nevertheless wished to go through other elements of the accounts.

    Mr. Mason suggested that the accounts might be discussed and provisionally approved, since it was important for the Bureau to know what its financial position was, and it should be possible to hold a discussion on this, provided that it was remembered that the presentation of the accounts might change when they were submitted to the Conference.

    Mr. Magaña pointed out that part of the accounts would not be changed, but if they returned to showing all the rights acquired, the assets and liabilities would change because most of the reserve would go back into pensions and the endowment would dramatically increase the liabilities and the deficit. It was possible to discuss staff costs and some operating costs but the final result was not now valid.

    Mr. Johnston asked whether Members would like to do this. The result was positive.

    Mr. Magaña said that Members' contributions had increased substantially between 2007 and 2008. This was due to the fact that the procedure for revising the contributory class of Member States, which had been adopted in Berlin, had taken effect in 2008. A number of increases according to the rules had been notified in 2006 and collected for the first time in 2008. Provision for doubtful debt had been made in the case of two nations. Certificates, fees etc. brought in a negligible amount compared with this; the main part of the operating income came from Member States' contributions. As mentioned earlier, these had not been increased for the current year.

    Staff costs had slightly decreased, for two reasons. Normally they increased because of inflation and progression up the salary scale, but in 2007 the new Assistant Director had started seven months before the departure of the previous one so there had been duplication

    which had not of course recurred in 2008. Secondly, one person had been on long term sick leave and 40 % of her salary had been reimbursed by the French Social Security.

    Mr. Magaña pointed out that in the 2007 accounts, where all acquired pension rights had been shown, the endowment for this had been 433 000 euros, plus 70 000 euros of payments of pensions. On the now postponed 2008 accounts, only five years, or 30 000 euros, had been shown as pension endowment, plus again the 70 000 euros for actual pensions, which meant that more than 1 million euros returned to the reserves.

    Travel costs had increased by about 40 000 euros, or 30 %, in 2008. It was difficult to refuse invitations to events in distant countries. For 2010, planned travel was being looked at with a view to reducing travel costs; staff would perhaps not attend all the meetings which might be interesting, and visits to TCs and Regional Working Groups might also have to be cut down. The issue of travel costs would have to be considered at the next CIML Meeting and possibly the 2012 Conference. The need to travel was increasing in line with the activity of the OIML. As an international Organization they had to keep in touch with their Members, regional organizations and stakeholders, so travel was a necessity. The need for travel had possibly been underestimated in the budget for 2008 and would need to be reviewed for the 2012 budget.

    Mrs. Van Spronssen asked Mr. Magaña to explain what was charged under the heading of meetings. The cost of travel had gone up but in Annex E it could be seen that the cost of meetings had gone down, so the total of the two had changed very little and was very similar to the budget voted for.

    Mr. Magaña said the costs for meetings were the costs of organizing the CIML, TC meetings and so on. The amount had been higher in 2008 than 2007 but still well below budget. He pointed out that when the budget had been approved in 2004 they did not have the new accountancy rules and standards. Meeting costs were budgeted on the basis of the old accountancy, under which the meeting costs included travel of the staff to CIML Meetings. In the new accountancy system, travel was under a separate heading. This duality of accounting systems had been a difficulty in all the accounts between 2004 and 2008. But the budget voted in 2008 (for 2009-2012) was in line with the new accounting rules and software.

    Mrs. Van Spronssen pointed out that travel costs were higher than budget, and meeting costs were lower and that the two should be seen together.

    Mr. Magaña felt that the difference in meeting costs was not significant.

    Mr. Johnston agreed with Mrs. Van Spronssen's point but felt that it was important to plan travel annually, deciding where priorities should lie. That way, if they went over budget they could explain exactly how and why.

    Mr. Klenovský asked whether there were any plans to change the class of travel permitted.

    Mr. Johnston replied that he had asked Mr. Magaña to draft a Travel Regulations policy which would specify when business class might and might not be used. He had seen the first draft already.

    Mr. Magaña said that this was one of the comments made by the external accountant. Members might remember that the previous year he had proposed a couple of small modifications to the Staff Regulations to say that travel expenses would be paid on the basis of an internal note to be elaborated by the Director and approved by the President. This would be based on practice in other organizations. But the Committee had preferred a revision of the whole Staff Regulations and not only one or two sentences. The auditor had told him that the

    Staff Regulations stipulated that rules should be based on practice in the French Administration, which had not previously been the case. This realignment meant that economy class should be used for short and medium range flights and business class for journeys of over seven hours. This was now being implemented and a couple of other issues in the travel regulations were now also being aligned on French Administration rules. The relevant paragraphs in the amended draft Regulations were almost ready and would shortly be sent to the President for approval.

    Mr. Flandrin wished to return to the subject of the Resolution shown to Members. The working document circulated before the Meeting had referred to a résumé of the Auditor's report. This report had not been received so the Resolution could not be accepted as it stood.

    Mr. Magaña replied that the Resolution was rather loosely worded, as the report in question had been written by the Auditor for the President and had not been designed for wider distribution.

    Mr. Johnston had indicated to Members that he would look at the issue of privacy. He would do this in the light of comments received. He was not trying to conceal anything but needed first to consult an international lawyer.

    Mr. Magaña said that he was able to tell Members what corrective actions had been decided on as a result of the report. These included the following:

    - as they had been late in preparing the accounts, they had had to recruit an accountant for the purpose. The following year the accounts would be finalized on time;

    - a note on travel expenses had been drawn up and was being implemented, as already mentioned; and

    - there were matters regarding reimbursements or loans by one or two staff members: the auditor had advised that any repayments must be directly deducted from salary; this gave full security.

    Mr. Magaña had made a draft synthesis of the Auditor's report, noting comments and corrective actions taken; he believed that this version might be suitable for general distribution.

    Mr. Johnston said he would look at the privacy issues in this with a lawyer when he had the opportunity.

    Mr. Johnston wished it to be put in the Minutes that he would communicate with Members by 15 December 2009 with reference to distribution of a version of the Auditor's report.

    Moving onto another topic, Mr. Johnston said that a number of Members had raised the issue of an association of countries, as opposed to an individual country, having jointly become a Corresponding Member. Some concerns had been raised as to what principle had been applied here and what the impact might be if this were to become common. Members had wanted to know what would happen if a group of countries applied to become a Member State. He invited comments from the floor.

    Mr. Mason said he thought it was a very positive development to have opened up participation to the Economic and Monetary Union of West Africa (UEMOA); his remarks should not be regarded as in any way critical of that very good development. But he wished to raise three points:

    - how confident were they that the present Convention allowed for Corresponding Members to take this form? However, he imagined that the Bureau had already looked at this;

    - he considered that the OIML should be looking forward to a time when associations of this type could become fully participating Member States, for which reason he would like some thought to be given to what changes might be made in preparation for the possibility that this or any other group might come forward with a case to become a Member State;

    - if Membership of unions of countries was being allowed, was there a clear position on the questions of other economic and monetary unions, such as those which were to be seen in Europe. For example, it would surely not be acceptable for unions of countries which contained states which were already OIML Members to achieve double membership in this way.

    Mr. Magaña said there was nothing very detailed in the Convention as to who might become a Corresponding Member.

    Mr. Dunmill pointed out that in Article 5 of the Convention there was a reference to "States who are Members of the Organization", and it then said, "Apart from Members, the following may take part in the Conference as Corresponding Members: (1) states or territories which cannot or do not yet wish to become parties to the Convention; (2) international unions pursuing an activity connected with that of the Organization". It had been felt that Economic and Monetary Union of West Africa, as an international union that was currently establishing regional legislation and regional structures in metrology, fitted this second category. The question of what fee was appropriate was for the Committee to discuss, but their admissibility seemed to be covered by the Article he had just read.

    Mr. Magaña said that there was a need to discuss the meaning of the expression "international union". He thought no great problem was raised by Corresponding Membership, for which the fees were not high, there were no voting powers, and it offered encouragement. This was a union of countries which had a common policy and a common interest in metrology. They were setting up common regulation, with a common Institute of Legal Metrology, so this seemed to him to be a good example of the type of group referred to in the Article. He did not, however, see any way in which the group could become a Member State. These had to be countries which were able to sign the Treaty, which could not be the case for a group of countries. It was stated in the EU Constitution that the EU could sign Treaties; of course, the EU would not be applying to join the OIML, but if another group did so, lawyers from the French Ministry of Foreign Affairs would have to be consulted, because the application would have to go through diplomatic channels and there was no provision for anything other than recognized countries to become Member States.

    Mr. Johnston considered that there would have to be close study of the implications before any group such as the present one could be allowed to move to being a Member State. He would ask Mr. Magaña to look more closely into the matter and report back to the Committee at the next Meeting, where more informed discussion could take place.

- number: '10'
  title: Developing Country activities
  narrative: |2+

    Mr. Seiler introduced himself as OIML Facilitator on Developing Country Matters, a nonsalaried position created at the Sydney Meeting the previous year. This report on the previous year's activities was his first.

    He began by explaining his mode of operation. As a private person with virtually no support from any institution or organization, he worked from his home base, using mainly his computer and the internet. On starting the work, he had addressed representatives of developing countries and other interested persons, asking them whether they would be prepared to participate in this type of work and whether they would like to receive e-mails from time to time. The response to this had given Mr. Seiler a list of about 60 addresses. One of the activities was that he sent regular e-mails, about once a month, informing recipients about recent developments, raising questions and problems, and so on.

    He received requests for answers to some technical questions and also regarding the state of development of International Recommendations, and these he usually passed on the Bureau for answers. He also tried to stimulate contributions for the OIML Bulletin, especially reports on developing country issues and on special subjects. He had had some success in this direction, and hoped that the results had been of interest to the whole legal metrology community.

    Another of Mr. Seiler's activities had been preparation of a proposal for a Workshop, to be organized in conjunction with UNIDO. He had sent this proposal in April to the BIML and UNIDO, which had shown some interest but the project had been postponed several times. He had heard the previous day that it would most likely take place in, and for, West African countries at the beginning of 2010.

    Recently, Mr. Seiler had prepared some documentation on a special measurement standard for checking the pressure indication of blood pressure instruments; this had been done at the suggestion of a former colleague of his at the PTB who was a specialist in blood pressure instruments, and the idea was to use a water column instead of a mercury column as the reference. The advantage of this was that water was available everywhere and was not toxic, and the equipment needed cost less than 10 euros to build. The idea had been that this might be a possibility for checking this kind of blood pressure instruments, which nowadays mainly used pressure gauges that were sensitive to mechanical shocks and so on, to check their behavior. These required special arrangements, and, especially in remote areas, doctors had no access to regular metrological services. Mr. Seiler had set up apparatus which showed the simplicity of the procedure and he would be happy to demonstrate it to any interested Members. There was also documentation in the Developing Countries section of the OIML web site, and a special folder named $ \mathrm{H}_{2} \mathrm{O} $ manometers.

    Mr. Seiler had also spent some of the year working on the OIML Award. Criteria had now been agreed and, fortunately, three applications had been received. This was quite a good response in view of the fact that the Award had been announced only one year before.

    Prior to the present Meeting, Mr. Seiler had sent his colleagues an e-mail proposing a special form to be used for phrasing reports, which would enable them more easily to formulate their problem, giving some information about the conditions they were working in, what they wanted to achieve and so on. He was interested in holding discussions with anyone who wanted to set up a project or obtain some support, which he might be able to facilitate, and he invited colleagues to contact him at any time. Some people had already contacted him to ask for financial support. For African countries, Mr. Seiler had learned the previous day about an

    AFRIMETS project, in cooperation with UNIDO. He himself had no direct connection with this, but he advised those wanting financial help to contact the BIML or Metre Convention representative Mr. Espina, or Mr. Carstens the South African representative, or to address the secretariat of AFRIMETS or to go through their own government. Mr. Seiler was not very familiar with the correct procedure, but it did seem to offer an opportunity for African countries to express their needs and try to take part in this project.

    Mr. Seiler would continue to do similar work in the future. He had also had the honor to be invited to take part in Presidential Council discussions, and would use this opportunity to raise his concerns about the impact of OIML work on the developing countries and their interests and their expectations from the work of the Organization. At the end of an extensive discussion he had undertaken to elaborate some written guidelines or strategy as to how the activities of the OIML, and specifically OIML cooperation with other international organizations such as UNIDO, BIPM, ILAC and others, could be used to further the interests of developing countries. He would present these guidelines to Presidential Council in March 2010 to see what future strategy could be agreed on.

    Part of this strategy must certainly be ways of creating awareness, particularly on the part of governments, and Mr. Seiler took the present opportunity to congratulate colleagues from Kenya, who had given the impression that they had been very successful in gaining the support of their government. The presence of the Minister, and the number of officials present at the Ministry reception the previous day, were clear signs of their success, and perhaps others could learn from this how to involve these very important people.

    Of course, as had been learned during previous meetings, it was always necessary to put forward arguments as to why legal metrology contributed to many aspects of daily life, to the facilitation of trade, thereby increasing the income and raising the wealth of the people. There had been some very good examples which could be used in this regard, and, in addition, the ideas of those present would be appreciated. All were invited to send their suggestions and comments to Mr. Seiler's e-mail address, and, if they would like to add their names to his mailing list, to contact him.

    Mr. Dunmill wished to add a couple of points. Regarding the UNIDO/AFRIMETS cooperation, it was vital for African countries to benefit from this important initiative. His understanding was that the road map for it was still being established and there was still some fluidity in the program, which could be used, so African countries which were OIML Members should try to ensure that their needs, especially in legal metrology, were taken into account. This was an overall, and not only legal, metrology project and it was essential to ensure that legal metrology was promoted within it.

    The other project, to hold a UNIDO/OIML Seminar in West Africa, had been delayed, largely, he understood, due to UNIDO having trouble agreeing the program with the donor organization which would be funding it. If this Seminar was a success it was hoped that others, held in other regions, might follow it.

    JCDCMAS had not yet been mentioned. This was a committee which coordinated projects of the various standard setting organizations. It was finding little to coordinate at the moment. There was an annual meeting at which it had been concluded that its name was not quite right and that its terms of reference needed to be looked at again. It provided a useful opportunity for the international organizations to discuss matters of common concern, but in fact it was not really coordinating much developing country activity through that committee. The

    Secretariat of it was currently with the BIPM, and would pass the following year, probably, to one of the standard setting organizations, ISO or IEC.

    Mr. Espina wanted to add to the foregoing that he had just received an e-mail from UNIDO to the effect that the funding for the AFRIMETS project would be available in November, so it should be possible to start in a few weeks time.

    In regard to JCDCMAS, the plan was to pass the Secretariat to both ISO and the IEC, who would for the first time co-share it from November. He also said that the original charter for JCDCMAS had indeed been for joint activities, but experience had shown that coordinated activities were very difficult to organize without a coordinating body, and since there was no such body, the terms of reference were being changed to sharing objectives.

    Mr. Temba added that on the UNIDO/AFRIMETS project, African Members should work through their sub-regional bodies to acquire more information, because each sub-region had a representative in AFRIMETS.

    Mr. Klenovsky said that much of the support for the AFRIMETS project was in kind. It was largely run by the Director of the South African National Metrology Institute and a majority of the finance came from the Norwegian Development Agency and that it was not strictly accurate to call it a UNIDO project. The Czech Republic had also been approached by some African countries for assistance with the project.

    Mr. Birch wondered to what extent the JCDCMAS Committee had taken up the concept of technical infrastructure as an overarching concept for their organization. As a result of changes in the economy in the last year, however, many countries had now decided that they had underinvested in infrastructure and needed to spend more. Technical infrastructure was very important, both in itself and in supporting the development of capital infrastructure.

    Mr. Espina said that the term "technical infrastructure" was not in current use in JCDCMAS. What they talked about was the development of coherent quality infrastructure. Above everything else the Committee hoped to achieve was that they had been playing a role in the general assemblies of those organizations trying to bring to light the other aspects of quality infrastructure. Typically, in ISO and ILAC meetings, either the OIML or the BIPM would be representing metrology, and the same happened in the meetings hosted by them.

    Concluding this item, Mr. Magaña mentioned that all the presentations from the Round Table could now be found on the web site and would also be published.

    ## Presentation of the Developing Countries Award: First OIML Award for Excellent Achievements in Legal Metrology

    CIML President Mr. Alan Johnston announced the winner of the first OIML Award for Excellent Achievements in Legal Metrology in Developing Countries.

    The President handed over a special certificate to the winner, Eng. Osama Melhem, Director of the Metrology Department of the Jordanian Institution for Standardization and Metrology, for his outstanding contributions to the organization of metrology in Jordan and the development of legal metrology in particular.

    As part of the Award ceremony Mr. Seiler, OIML Facilitator for Developing Country Matters, explained the facts on which this decision was based. The examples he mentioned clearly showed the benefits for consumers and the contributions to fair trade in Jordan. Some of the

    methods are most certainly of interest to other legal metrology services, which could in turn benefit from the Jordanian experience.

    The Facilitator referred to the April 2009 issue of the OIML Bulletin in which an illustrated description was published of the current situation of metrology in Jordan.

    An additional project of special interest to Arabic-speaking countries (and indeed regional cooperation in general) was his translation of various OIML Publications into Arabic, including the International Vocabulary of Legal Metrology and the brochure on the International System of Units, printed by the Jordanian Institution. The BIML has made these translations freely available on its Developing Countries web site.

    In his words of thanks Mr. Melhem stressed the fact that the progress his country had made in legal metrology over recent years would not have been possible without the extraordinary commitment of his collaborators, who therefore also had their share in this Award.

    Besides the special certificate, the Award also includes participation in an international metrology event, chosen by the winner and financed by the OIML as a mark of appreciation.

    The President presented a Letter of Appreciation for Mr. N.K. Singhania of Shanker Wire Products Industries, to the CIML Member for India. Mr. Singhania is a producer of weights, and among other activities with regard to legal metrology he regularly informs the metrology community in India about new achievements in the OIML, specifically with regard to weights and weighing instruments by producing and distributing a special news letter.

    At the end of the Award ceremony the Facilitator lauded the high standard set by the first winner. He expressed his expectation that the Award will encourage others to strengthen their activities in legal metrology and called for applications for the 2010 Award.

    ## Summary of the Round Table on Regional Legal Metrology Organizations

    Mr. Magaña told Members that 12 bodies had been represented at the Regional Legal Metrology Organizations Round Table. The terms of reference of this group were discussed first; these could be seen on the web site. Each body would now be asked to appoint an official representative to this group so that its composition would be clearer, and these representatives would be invited to its meetings. If observers wished to attend, they would have to ask for an invitation.

    Concerning the activities of the Round Table, a number of issues had been noted for consideration by the group. These included:

    - the development of legal metrology in other new regions where there was not yet any formal legal metrology organization;

    - investigation of the special needs of each region;

    - improvement of the relationship with donor bodies.

    A number of regional bodies had made presentations, all of which were available on the OIML Workgroups web site.

    The conclusions were:

    - multiplicity of national requirements in legal metrology in these countries was a burden for developing countries; the OIML had an important and beneficial role in harmonizing these regulations;

    - the question of a formal Memorandum of Understanding was discussed but it had been decided that this would be too formal, and was not needed;

    - it was agreed that the Bureau and the regional bodies would be asked to provide information about their sources of funding for metrology development projects; Mr. Magaña would try to gather this information and make it available;

    - the Bureau would collect and make available a list of training courses organized by the regions. They had some information already and would summarize this and publish it in a clearer way;

    - it was also noted that the Worldwide Wine Trade Group, which had an interest in legal metrology and was of interest for many regions, would be contacted to identify the barriers to trade that they came up against;

    - Mr. Magaña had briefly presented the inquiry on the implementation of OIML Recommendations. Some regional bodies were planning inquiries along similar lines. The Bureau would provide a summary of the inquiry results sorted by regions and also the inquiry would be made available for regional purposes. For the moment, the inquiry was open to Member States and Corresponding Members, but in the regions it might be extended to other countries beyond these limitations;

    - developing countries had prepared or should be preparing some national development strategies arising from the millennium development goal strategy, so members of this group had been asked to report on whether metrology had been identified in their countries' national development strategy, and the Bureau would report on these replies as soon as possible.

    Mr. Leitner referred to the mention in Mr. Magaña's report of improving relations with donor bodies. Mr. Leitner felt that this should be done in close cooperation with the BIPM, or, in the case of regions, through their national organizations. It did not make sense, especially in developing countries, to approach donor bodies for one aspect of metrology without the other. When a laboratory was established, it did not matter whether instruments were being calibrated or verified, the technical requirements were the same.

    Mr. Magaña agreed. The regional bodies' recommendations had been addressed to the Bureau, but of course the work would be done in conjunction with the BIPM. He would bring out this point when drafting the Resolution.

