    ## Resolution No.25

    It had earlier been decided that Resolution No.25 should be withdrawn. However, the Kenyan delegation had asked for the first part of the Resolution to be maintained, the second part still being deleted. There would therefore be no recommendation, but simply a Resolution to note as outcome of the Seminar on Stakes and priorities of legal metrology for trade, the issues of international standards.

    Mr. O'Brien said that he certainly could not agree with the first recommendation but he considered the second one to be a good one and worthy of consideration. It would be quite valuable for CIML Members to bring to the attention of the WTO/TBT Enquiry Points in their economies the fact that there were OIML Recommendations on prepackaged goods and they should be aware of them and be looking out for where regulation was not consistent with them.

    Mr. Kool summarized this as meaning reinstatement of the second recommendation.

    Mr. Mason said that as one of the first to express reservations about the original Resolution, he felt that the UK could support it in this form, for the reasons given by the New Zealand delegate.

    Mr. Kool read out the amended second part of the Resolution. Mr. Miki did not know what was meant by WTO/TBT Enquiry Point. Mr. Dunmill explained that it was a contact point for notification in all WTO States, often part of a Ministry of Trade or Commerce. Addresses could be found on the WTO web site.

    Germany and Switzerland abstained. There were no votes against the Resolution:

    In the seminar on "Priorities for Legal Metrology for Trade", the issue of international standards to facilitate trade was raised.

    The Committee noted that:

    - the increasing importance of prepackaged foods and beverages in

    - global trade now accounts for over 75 % of agri-foods exports;

    - developing country exports are particularly disadvantaged by having to conform to a multiplicity of international requirements; and

    - the review of the longstanding OIML R 79 arising from the World Wine Trade Group Labeling Agreement and the 2006 OIML seminar on prepackaging have not resulted in an exemption for wine labeling.

    The Committee recommended that CIML Members bring this resolution to the attention of their national WTO-TBT enquiry point.

