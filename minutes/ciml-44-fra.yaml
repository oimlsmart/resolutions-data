    Mr. Magaña explained that, as set out in the Convention, proceedings at CIML Meetings were translated between French and English or not, depending on the country in which the Meeting was held. For example, there had been translation in Sydney but not in China. Largely it depended on how easily local interpreters could be found. French-English translation was provided for the current Meeting, so French-speaking colleagues who wished to continue to be able to speak in French, which was their prerogative, would be able to do so. In 2010 also, in the USA, it was expected that there would be French-English simultaneous translation. But thought must be given to having a clear policy on the matter since French was the official language of the OIML and English was considered the working language, especially in the TCs. What had to be decided was whether the CIML was an official or a working function. As this was a matter of interpretation of the Treaty, it was the role of the next Conference to resolve the question. A Resolution to this effect was proposed.

