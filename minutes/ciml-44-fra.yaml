    <div align="center">

    # Round Table on Metrological Control

    </div>

    ![](page=96,bbox=[815, 1354, 1169, 1653])

    Annex to the Minutes of the 44th CIML Meeting

    Mombasa, Kenya Wednesday 28 October 2009

    ## Round Table on Metrological Control

    Chairing the Round Table, Mr. Kochsiek began by mentioning that he had spent many years as CIML Member for Germany. Almost 40 years previously, he had begun to learn what metrology was. At that time, metrological control had been a national task, but, as was well known, at present and in the future it would be a regional and a world wide challenge, and this was why the OIML had to deal with these developments.

    Another reason was that a number of OIML publications were being revised. Among these were:

    - D1 Elements for a law on metrology;

    - D 16 Principles of assurance of metrological control;

    - D 19 Pattern evaluation and pattern approval; and

    - D 20 Initial and subsequent verification of measuring instruments and processes.

    All these Documents dealt directly or indirectly with metrological control.

    Mr. Magaña had written down some reasons why it was necessary to discuss metrological control at the Round Table. These were:

    - total systems approach to metrological control: should measurements be regulated rather than measuring instruments? This had already been discussed at the Seminar - what was important, the result of the measurement or the measuring instrument?

    - metrological control in the future: moving the center of gravity from pre-market to post-market control, and whether the different operations could be carried out independently, for example, type evaluation and production evaluation;

    - the delegation of certain operations to private bodies versus keeping them in state or state run bodies; discussion of current systems of in-service metrological control; possibilities of accepting first part conformity evaluations, test results and all declarations of conformity by manufacturers, repairers or others; it was very important to discuss this question;

    - how to maintain a satisfactory level of knowledge and control over the actual overall quality of instruments and service;

    - the meaning of the maximum permissible errors at different stages of the life of an instrument, from the design stage, production stage, before and after the first installation, at inspection, in service, after repair, and use of the uncertainty evaluation in these cases.

    Mr. Kochsiek's proposal for the organization of the Round Table was to start with five presentations, each of 10 to 15 minutes:

    1. Conformity assessment: a new approach (Mr. Magaña);

    2. Metrological control in developing economies within Africa (Mr. Carstens);

    3. Metrological control today and in the future (Mr. Klenovsky);

    4. The European approach, the expected role of manufacturers, notified bodies and Member States (Mrs. Lagauterie); and

    5. The evolution of legal metrology (Mr. Magaña).

    After the five presentations, there would be an opportunity for questions and discussion, and then Mr. Magaña would make a conclusion. Later Mr. Kochsiek would write an article for the Bulletin, all the presentations would be put on line and there would also be a summary.

