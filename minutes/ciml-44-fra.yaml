    Mr. Teunisse expressed puzzlement about the words "contacting National Accreditation Bodies" and "to promote to them". In his view, it was the national authorities, and not the national accreditation bodies, which should be contacted by the OIML.

    Mr. Kool replied that it had been the view, when the Resolution was drawn up, that the Member was not only the representative of his country in the OIML but also the representative of the OIML in his country. Usually the Member was part of the administration of that country, and in that quality he should be able to address the national accreditation body and to promote the use of qualified lead assessors in the OIML systems.

