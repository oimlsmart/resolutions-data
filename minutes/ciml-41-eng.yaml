- number: '8.1'
  title: Approval of International Recommendations and Documents
  narrative: |2+

    The Committee approved the following Recommendations:

    DR 1: R 49-1 Water meters intended for the metering of cold potable water and hot water.

    Part 1: Metrological and technical requirements;

    DR 2: R 49-2 Water meters intended for the metering of cold potable water and hot water.

    DR 3:R 137-1 Gas Meters.

    Part 1: Requirements (new Recommendation);

    DR 4: R 116 Inductively coupled plasma atomic emission spectrometers for the measurement of metal pollutants in water;

    DR 5: R 82 Gas chromatographic systems for the measuring pollution from pesticides and other toxic substances;

    DR 6: R 83 Gas chromatograph/mass spectrometer systems for the analysis of organic pollutants in water;

    DR 7:R 76-1 Non-automatic weighing instruments.

    Part 1: Metrological and technical requirements - Tests;

    DR 8: R 65 Force measuring system of uniaxial material testing machines;

    DR 9: R 39 Rockwell hardness machines;

    DR 10: R 51-1 Automatic catchweighing instruments.

    Part 1: Metrological and technical requirements - Tests; and

    DR 11: R 134-1 Automatic instruments for weighing road vehicles in motion and axle-load measuring. Part 1: Metrological and technical requirements - Tests. The CIML noted that account would be taken of US comments concerning terminology and the overall scope of the Recommendation.

    and also approved the following Amendments:

    AM 1: Amendment to B 3 OIML Certificate System for Measuring Instruments; and

    AM2: Amendment to B 10-1 Framework for a Mutual Acceptance Arrangement on OIML Type Evaluations (MAA).

    Considering the importance and highly advanced status of some projects at TC/SC level, the Committee instructed the Bureau to proceed with online CIML approval of the following revised and new Recommendations (once they become available):

    - Project of OIML TC 8: Vessels used for retail sale to the public;

    - Common project of TC 8/SC 3 and SC 4: R 117-1 Measuring systems for liquids other than water. Part 1: Requirements;

    - Project of OIML TC 8/SC 7: Measuring systems for gaseous fuel;

    - Project of OIML TC 8/SC 7: Compressed gaseous fuels measuring systems for vehicles; and

    - Project of OIML TC 17/SC 4: R 56 Standard solutions reproducing the electrical conductivity.

    ## The Committee:

    - Approved the withdrawal of R 74 Electronic weighing instruments; and

    - Delegated the decisions on the future of R 24 Standard one meter bar for verification officers and R 66 Length measuring instruments to its President (in accordance with Article of XV of the Convention). These decisions would be taken after the BIML had conducted a more extensive inquiry among CIML Members following the 41st CIML Meeting.

- number: '8.2'
  title: Examination of the situation of certain TCs/SCs
  narrative: |2+

    The Committee noted that the Secretariats of TC 8/SC 7 Gas metering and TC 8/SC 8 Gas meters, together with the BIML, would prepare and submit for approval to the CIML at its 42nd meeting the formal proposal to merge these two Subcommittees.

    The Committee requested CIML Members to volunteer to assume responsibility for the vacant Secretariat of TC 18/SC 1 Blood pressure instruments.

    The Committee requested CIML Members to ensure that any CDs which are circulated by those TC/SCs in which their country is a P-member are commented and/or voted on in order to ensure the timely development of projects.

    The Committee decided:

    - To merge TC 8/SC 3 Dynamic volume measurement (liquids other than water) and TC 8/SC 4 Dynamic mass measurement (liquids other than water) under the Co-Secretariat of Germany and the USA under the title TC 8/SC 3 Dynamic volume and mass measurement (liquids other than water), and to disband TC 8/SC 4;

    - To allocate the Co-Secretariat of TC 5/SC 2 Software - hitherto held by France - to the BIML;

    - To approve the following work projects:

    - New projects of TC 3/SC 5:

    - Revision of B 3 OIML Certificate System for Measuring Instruments;

    - Revision of B 10-1 Framework for a Mutual Acceptance Arrangement on OIML Type Evaluations (MAA);

    - Revision of B 10-2 Checklists for Issuing Authorities and Testing Laboratories carrying out OIML Type Evaluations;

    - New projects to be allocated by the CIML President to the appropriate TC or SC, based on BIML proposals:

    - Guide for the application of ISO/IEC Guide 62 to the assessment of quality system certification bodies in the field of legal metrology;

    - Guide for the application of ISO 9001 to legal metrology controls.

    ## New project of TC 16/SC 1

    - Revision of ISO 3930/OIML R 99 Instruments for measuring vehicle exhaust emissions.

    - To withdraw the following work projects:

    - Project p6 of TC 3/SC 5: OIML procedure for the review of laboratories to enable mutual acceptance of test results and OIML Certificates of Conformity;

    - Project p2 of TC 17/SC 1 Revision of R 92 Wood-moisture meters - Verification methods and equipment: general provisions.

- number: '8.3'
  title: MAA
  narrative: |2+

    The Committee took note of a presentation given by Mrs. Gaucher on the implementation of the MAA, and expressed its appreciation for the work carried out and on the signature of the two first Declarations of Mutual Confidence (DoMCs).

    The Committee approved the following Resolutions:

    ## MAA Resolution 2006-1:

    The BIML shall initially bear the costs of peer assessments and subsequently invoice the peer assessed bodies with a lump sum equal to 1500 $ \in $ per assessor-day.

    ## MAA Resolution 2006-2:

    The end of the transitory period during which an OIML Issuing Authority which participates in the R 60 DoMC and/or the R 76 DoMC as a Utilizing Participant or which did not sign the R 60 DoMC and/or the R 76 DoMC will still be authorized to issue OIML Certificates of Conformity according to OIML B 3 outside the scope of the MAA, is provisionally fixed at 31 December 2008.

    This deadline will be reviewed by the CIML at its 43rd Meeting based on a BIML report on operation, experience and feedback from industry.

    ## MAA Resolution 2006-3:

    The CIML endorsed the decision of its President to launch the R 49 DoMC despite the fact that for the moment there was only one potential Issuing Participant.

    In addition to these Resolutions, the Committee took note that Issuing Participants in the R 60 and R 76 DoMCs are able to issue basic OIML Certificates related to applications for OIML type evaluations received before the publication of the DoMC.

    The CIML instructed TC 3/SC 5 to consider the rules for appointing new Issuing Authorities after the transition period mentioned in the MAA Resolution 2006-2 above, and to propose an appropriate solution for approval by the Committee

