    The Committee took note of a report from its President concerning the activities of the Presidential Council since the 40th CIML Meeting.

- number: '5'
  title: 1 Report on PWGDC activities
  narrative: |2+

    The Committee took note of a report given by Messrs. Seiler and Dunmill on the activities of the Permanent Working Group on Developing Countries (PWGDC) and expressed its appreciation to Mr. Seiler for his efficient chairmanship.

    The Committee decided that Mr. Seiler's proposals should be given due consideration and requested that developing country activities be included in the OIML Strategy Paper and also in the Action Plan.

- number: '6'
  title: 1 Presentation by the Bureau on liaison activities
  narrative: |2+

    The Committee took note of a presentation given by the BIML Director concerning liaison activities.

    ## BIPM/Metre Convention

    The Committee expressed its appreciation of the draft OIML/Metre Convention joint Action Plan and instructed its President and the BIML Director to continue this cooperation, and to report back at the 42nd CIML Meeting.

    It also appreciated the tangible efforts made by the two Organizations during the past year, notably concerning the new joint information publication describing their respective domains of activity, steps to set up a common web portal and the work engaged on joint thematic leaflets resulting from a series of meetings held between Staff of the two Bureaux.

    ## ILAC

    The Committee expressed its appreciation of the OIML/ILAC draft Memorandum of Understanding and instructed its President to take account of the comments expressed with a view to signing it as soon as possible.

    ## JCGM

    The Committee instructed the Bureau to summarize CIML Members' comments on the Draft revision of the International Vocabulary of Metrology (VIM) and on the Supplements to the GUM, and to present them to the Joint Committee on Guides on Metrology (JCGM). The Committee empowered the BIML Director to endorse the final revision of the VIM and the Supplements to the GUM at the JCGM Meeting.

- number: '7'
  title: 2 Communication, web site
  narrative: |2+

    The Committee took note of a presentation given by Mr. Pulham concerning developments in this area and expressed its appreciation to the Bureau.

    Noting the significant advances made by the BIML in the use of e-communication during the past year, the Committee urged all CIML Members to use the online facilities provided on the OIML web site, and in particular to:

    - Post their votes and comments on draft publications within the specified deadlines;

    - Encourage the Secretariats of OIML TCs/SCs to regularly check the information published on their respective web pages on the Technical Committees' database; and

    - Communicate any information updates to the Bureau as and when available.

    The Committee expressed its appreciation that interactive Workgroups for technical work were being made available on the OIML web site and encouraged the Secretariats, P-Members, O-Members and Liaisons of all TCs/SCs to make use of them as soon as available.

    It approved the Bureau's proposal that all Committee Drafts be made publicly available on the OIML web site from now on.

    ## 8 Technical activities

    The Committee took note of a presentation given by Mr. Szilvassy concerning the progress of technical work.

- number: '8'
  title: 1 Approval of International Recommendations and Documents
  narrative: |2+

    The Committee approved the following Recommendations:

    DR 1: R 49-1 Water meters intended for the metering of cold potable water and hot water.

    Part 1: Metrological and technical requirements;

    DR 2: R 49-2 Water meters intended for the metering of cold potable water and hot water.

    DR 3:R 137-1 Gas Meters.

    Part 1: Requirements (new Recommendation);

    DR 4: R 116 Inductively coupled plasma atomic emission spectrometers for the measurement of metal pollutants in water;

    DR 5: R 82 Gas chromatographic systems for the measuring pollution from pesticides and other toxic substances;

    DR 6: R 83 Gas chromatograph/mass spectrometer systems for the analysis of organic pollutants in water;

    DR 7:R 76-1 Non-automatic weighing instruments.

    Part 1: Metrological and technical requirements - Tests;

    DR 8: R 65 Force measuring system of uniaxial material testing machines;

    DR 9: R 39 Rockwell hardness machines;

    DR 10: R 51-1 Automatic catchweighing instruments.

    Part 1: Metrological and technical requirements - Tests; and

    DR 11: R 134-1 Automatic instruments for weighing road vehicles in motion and axle-load measuring. Part 1: Metrological and technical requirements - Tests. The CIML noted that account would be taken of US comments concerning terminology and the overall scope of the Recommendation.

    and also approved the following Amendments:

    AM 1: Amendment to B 3 OIML Certificate System for Measuring Instruments; and

    AM2: Amendment to B 10-1 Framework for a Mutual Acceptance Arrangement on OIML Type Evaluations (MAA).

    Considering the importance and highly advanced status of some projects at TC/SC level, the Committee instructed the Bureau to proceed with online CIML approval of the following revised and new Recommendations (once they become available):

    - Project of OIML TC 8: Vessels used for retail sale to the public;

    - Common project of TC 8/SC 3 and SC 4: R 117-1 Measuring systems for liquids other than water. Part 1: Requirements;

    - Project of OIML TC 8/SC 7: Measuring systems for gaseous fuel;

    - Project of OIML TC 8/SC 7: Compressed gaseous fuels measuring systems for vehicles; and

    - Project of OIML TC 17/SC 4: R 56 Standard solutions reproducing the electrical conductivity.

    ## The Committee:

    - Approved the withdrawal of R 74 Electronic weighing instruments; and

    - Delegated the decisions on the future of R 24 Standard one meter bar for verification officers and R 66 Length measuring instruments to its President (in accordance with Article of XV of the Convention). These decisions would be taken after the BIML had conducted a more extensive inquiry among CIML Members following the 41st CIML Meeting.

- number: '9'
  title: 1 Approval of the procedure for the election of the CIML President and Vice-Presidents
  narrative: |2+

    The Committee approved the procedure for the election of the CIML President and Vice-Presidents and decided that this procedure shall be applicable for the election of the Second Vice-President under Item 9.2 of the Agenda (see below). It instructed the Bureau to publish it on the OIML web site.

