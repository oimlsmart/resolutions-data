  title: 1 Situation of certain Members
  narrative: |2+

    The CIML noted the situation of the Democratic People's Republic of Korea and Zambia concerning the payment of their arrears. These two countries had changed their status to become Corresponding Members since the 40th CIML Meeting.

    The CIML also noted the report given by the BIML Director on the implementation of the 40th CIML Meeting's decision to review Member States' contributory shares.

