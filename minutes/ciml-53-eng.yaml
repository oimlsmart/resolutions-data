- number: '11'
  title: OIML Certification System (OIML-CS)
  narrative: |2+

    Dr Schwartz asked delegates to consider item 11, adding that there might not be sufficient time during the current session to complete all of this item since they needed to finish the present day's meeting no later than 17:30 in order that delegates could prepare for the evening. He invited Mr Oosterman, the Chair of the OIML-CS Management Committee, to give his presentation.

- number: '11.1'
  title: Report by the OIML-CS Management Committee (MC) Chairperson
  narrative: |2+

    Mr Oosterman thanked all the people that had made it possible for this system to start on 1 January 2018. He especially wanted to thank Mr Stolz from the PTB, and the members of the Review Committee (RC), who had carried out all the work to review the applications. He described the pile of paperwork that each of the new applicants had submitted, and re-iterated that everything had had to be reviewed, acknowledging that this had been quite a lot of work which it was satisfying to have managed to complete. He said his report would consist of two items. Although the system could operate almost by itself, some items still needed approval, for example B18 Framework for the OIML Certification System (OIML-CS) as well as some other documents. For that reason, he intended to start with an update of the system as it was at the moment, but there were also some resolutions, which he wanted to bring to delegates' attention, because they needed approval by the CIML. This would be in the second part, which would be presented by Mr Dixon.

    Mr Oosterman started by describing various OIML-CS meetings. He said there had been a meeting of the Management Committee (MC) on 21-22 March 2018, in Sydney, Australia. NMI Australia had hosted the meeting, and there had been 41 participants, so it had been quite a large group. All 21 of the voting members had been represented during the meeting. He said that representatives from ILAC/IAF, IEC, CECIP, and CECOD had been present, and there had also been an observer from SIM. This particular participant had been considered very important, since SIM's participation could help to increase awareness of the OIML-CS, and how it could be of interest to the Americas. There had also been a representative of WELMEC.

    Under the Management Committee, there was the RC. The RC had the task of reviewing applications from prospective OIML Issuing Authorities to see whether they complied with all the requirements needed to become an OIML Issuing Authority. He repeated that this had been quite a lot of work for

    Mr Stolz, its Chairperson, especially as at the start of the system when all the OIML Issuing Authorities were new. Now the system was running, they would continue to have new applicants, but not all at once! An RC meeting had been held immediately before the MC meeting, and eight of the eleven RC members had been represented. There was also the Maintenance Group (MG), which maintained the documentation pertaining to the OIML-CS. As he had mentioned at the previous year's CIML meeting in Colombia, this was like climbing a mountain. When you wanted to climb a mountain, Mr Oosterman said you needed a map, and you needed your tools. This had been the first time they had climbed the mountain, so they had not known if all the materials would be appropriate. During the operation they had noticed that there were some conflicts in the documents, and some conflicts in the approach, and they had therefore they had needed to adjust the documents.

    Mr Oosterman said that the RC had reviewed all the materials, but when reviews had started, there had been some questions, so first they had needed to see how to perform the reviews, how the documents could be assessed, and how decisions could be made. This had been a very difficult task for Mr Stolz at the beginning of the process. The whole operation of the RC had been discussed amongst its members, and assessments had been performed. A number of proposals had been given to the MC, which had met after the RC had started work, so that new applicants could start from 1 January 2018. This had been helped by the very useful online work carried out by the RC. One of the most important proposals that had been made to the Management Committee had been the approval of experts for participation in the system, because some of the stringent requirements could not be fulfilled by the experts, so the Management Committee had needed this feedback from the RC.

    The Maintenance Group had been obliged to revise the appropriate conditions for the approval of experts in the documentation. Delegates would also note later on from one of the resolutions that the transition periods to move from scheme B to scheme A had also been reviewed because they had had a limited number of experts. This meant that it had not been possible to directly switch all the Recommendations from scheme B to scheme A. One of the major considerations in the Maintenance Group had been the revision of PD-07, because this document had needed a lot of revisions concerning the use of "old" data, and Mr Oosterman said he would return to this subject later in his presentation. The application of ISO/IEC 17065 had also come under discussion, because this was a new requirement for the OIML Issuing Authorities, and there had been a discussion on whether it was really necessary to use this standard, or whether it was too stringent for the OIML Issuing Authorities.

    One of the issues still under discussion was the modular approach. Mr Oosterman said that delegates would know that under R 76 there was a possibility to approve modules, and they had discussed how this might be incorporated in the OIML-CS. Lastly they had discussed the review of Recommendations from the RC Meeting.

    The main OIML-CS meeting had been the Management Committee meeting. One of the first items discussed had been the requirements for experts. Most of the experts working in metrology came from metrology institutes, so they were not directly related to an accreditation body. This meant that they did not always have accreditation skills and experience, which was one of the requirements to become an expert. The problem was that if experts in certain disciplines were not available, they would not be able to perform reviews of OIML Issuing Authorities, so no OIML Issuing Authorities would exist for that category of instrument. This obstacle had to be overcome, so they had concluded during the meeting that they should withdraw this requirement, and now when experts were reviewed, they looked at whether they had experience of ISO/IEC 17025 or ISO/IEC 17065.

    Due to the fact that experts had not been available to carry out assessments, they had also needed to review whether some Recommendations could change from Scheme B to Scheme A. When a Recommendation was switched to scheme A, the OIML Issuing Authorities had to prove that they were competent to undertake work on the Recommendation. If experts were not available, an assessment could not be made on whether to allow the OIML Issuing Authorities to work in scheme A. If they switched a Recommendation from Scheme B to Scheme A with no OIML Issuing Authorities, certificates could not be issued. Mr Oosterman stated that they had had to consider a compromise, and find a way of deciding when Recommendations should move to Scheme A.

    One other item which had been discussed was that currently the OIML Issuing Authorities needed to comply with ISO/IEC 17065, which covered conformity assessment systems. This meant that conformity to type was also covered, although this was not covered by the OIML-CS. Compliance with this standard would be costly, and they had questioned the need for some of its requirements in the context of OIML Issuing Authorities, and whether it was too rigorous for their needs. They had established a working group which would consider this issue. One of the resolutions that delegates would be considering was whether they could extend the transition period for self-declaration, because it may be that these requirements were too strict for the OIML Issuing Authorities, and might be too costly for OIML Issuing Authorities who issued a limited number of certificates. They therefore wanted to explore whether there were any alternatives which would be acceptable to OIML Issuing Authorities. Furthermore, they had discussed a number of improvements to the system's documents, and Mr Oosterman said he would return to this subject later as well.

    They had also looked at additional categories of measuring instrument. It had appeared that there were some Recommendations which had the required three parts, and so could be part of the OIML-CS, and he said he would show delegates these candidate Recommendations. One obstacle they had met when they had started issuing certificates was that in a number of Recommendations, part three was called a "test report", some had called them a "type evaluation report", and others had used both terms. This created a difficulty in deciding who was issuing the evaluation report, and who was issuing the test report, especially considering the distinction between an OIML Issuing Authority and a Test Laboratory.

    Another concern had been what to do when Recommendations were revised. As an example, Mr Oosterman mentioned R 60, for which a revision had just been published, which meant that OIML Issuing Authorities would have to re-apply to be able to issue certificates for the new edition of the Recommendation. Although it would have the same number, it could contain new requirements which could have an influence on the tests. OIML Issuing Authorities would have to demonstrate that they still complied with the requirements.

    They had established a working group on R 60 under the OIML-CS, which would look at the difference between the current and the old editions of R 60. This would be especially important for the RC, because if an OIML Issuing Authority applied to issue certificates for the new edition, the RC would need guidance on the new requirements under this new edition. If they did not have this, it may lead to an unfair approach being taken by different OIML Issuing Authorities, for example, if one declared it did not have to make any changes, while another decided it had to do some additional testing.

    Regarding the documentation changes, Mr Oosterman said that one of the important points for delegates to note was that they needed to make some changes to B18. As delegates had seen in the IEC's presentation, the OIML-CS had been based on the IEC Systems. They had looked at these to see how they carried out conformity assessment and how their procedures could be carried over to the OIML CS. This meant they would have to make reference to the IEC, acknowledging the use of their intellectual property. Furthermore, they had set requirements for who could participate in the Management Committee, but had also considered that if people or regions who were interested in participating in the Management Committee wanted to find out how it was being run, there had been no way to allow observers. So they had changed B18 to allow observers in MC meetings. They had also needed to improve on the wording related to revised editions of Recommendations. For example, they had mentioned that documentation should always be updated to cover the latest revision of a Recommendation. However, this was not always possible, because in some countries the legislation might refer to an earlier edition of the Recommendation, so if a certificate had to refer to the new edition of the Recommendation it would not comply with the national requirements. This meant that there was still a need for OIML Issuing Authorities to be able to issue certificates based on the previous edition(s) of Recommendations.

    There had also been a need for clarification on the situation that an OIML Issuing Authority might be willing to issue certificates, for example for breath analysers, but that OIML Issuing Authority was in a country where breath analysers were not regulated. In this situation, the OIML Issuing Authority wanted to become an OIML Issuing Authority for that Recommendation, but the country could not be

    a Utilizer because that instrument was not regulated in the country, so they had needed to distinguish this in the documentation.

    They had also needed to make some changes in the Operational Documents. Mr Oosterman said he had already mentioned they had to align with B18 for the observers and the voting regulations. There was also a clarification that that RC Members could contribute to a recommendation on their own country application. He said they had already mentioned that, if necessary, people from the Management Committee could also participate in the Review Committee, but there was also the question of whether they would be allowed to review an OIML Issuing Authority in their own country. This was not seen to be a problem unless the person who performed the review was the same person who had performed the assessment, because they would then be assessing their own work. This situation had needed to be changed in the Operational Documents. It had been considered that the Maintenance Group, chaired by Mr Loizides, should become a permanent working group of the Management Committee, because the documents would need to be revised from time to time. It had also been necessary to include the concept of proxies, because they were not originally allowed in RC meetings. In addition, as he had mentioned earlier, Mr Oosterman said they had removed the requirement that legal metrology experts required assessment experience. Within the Procedural Documents, there had been editorial changes and a need to update it to align with B18, especially in PD-02, where the requirements on legal metrology experts had been set. They had changed the restrictions, which meant that an expert that did not have any audit experience could still participate in an audit, as long as there was an audit team with a lead assessor. Mr Oosterman said that this situation had not been foreseen in the original document.

    There had also been some duplicated requirements for Utilizers and Associates. Furthermore, PD-04 had needed to be updated to cover the new version of ISO/IEC 17025. However, the biggest change had been in PD-07. He reminded delegates that, during the meeting in Colombia, there had been questions on how data which had been obtained under the Basic Certificate System or the MAA could be used in the OIML-CS. They had discussed this item quite extensively during the Management Committee meeting, and had come to the conclusion that they could accept old data under certain conditions. One of the major conditions would be that there would need to be proof that the body had been competent to do the particular test at that time. This could be, for example, proof of accreditation, but other forms of proof could also be used.

    Mr Oosterman said he now wanted to talk about the categories of measuring instruments. He said he had already mentioned that it had been very ambitious to have all Recommendations in the scheme by 2020, and added that if delegates had seen the previous OIML Bulletin, they would have seen a diagram in which he had described when a Recommendation would change from Scheme B to Scheme A, and when no further Scheme B certificates could be issued. This had been a very ambitious plan, because the necessary experts were not available, and he invited delegates to recommend experts that could perform the assessments. At the time he had created his diagram, there had not been enough experts for R49, R51, or R117, so if these Recommendations had switched on 1 January from Scheme B to Scheme A, OIML Issuing Authorities would not be able to demonstrate that they were competent, so the switching of these Recommendations needed to be delayed. Mr Dixon had also discovered that there were some other Recommendations which complied with the criteria for inclusion in the OIML-CS, in that they had the necessary three parts. Mr Oosterman said he had checked the OIML website, and no certificates had been issued for these newly identified Recommendations, except for R136 Instruments for measuring the areas of leathers where one certificate had been issued, so these were not Recommendations for which there was a demand for certificates, but on the other hand they complied with the criteria, so they could be included in the system.

    Looking at his diagram again, he indicated that at the top there was Scheme A, and at the bottom there was Scheme B. Those categories which had been included in the MAA could directly go into Scheme A because they had already fulfilled all the requirements. These included R 46, R 49, R 51, R 117 and R 137, which were on the list to be implemented by 1 January. For R 49 this was acceptable, as they already knew from the MAA that R 49 could be moved to scheme A. However, for R 51 and R 117, there needed to be more time, as experts needed to be included in the assessment team. R 46 and R 137 would be transferred on 1 January 2020. For the other Recommendations which would move to Scheme A, they needed to delay this change until 1 January 2021. He added that this was still being

    ambitious, because they really needed more experts in the system to perform these assessments. For instance, in the case of R134, they only had one expert, so if an OIML Issuing Authority wanted to issue certificates for this Recommendation and this was their own expert, nobody else could do the assessment, so he emphasised they really needed more experts.

    Finally he mentioned the list of Recommendations that Mr Dixon had discovered already complied with the criteria, and these Recommendations would move into the system on 1 January 2019 and move to Scheme A by 2021.

    With regard to the current operation of the system, Mr Oosterman stated that they had approved 12 OIML Issuing Authorities, and 25 Test laboratories, including Manufacturers' Test Laboratories. No applications had been rejected, although not everybody had been approved at the same speed, since additional materials had been needed in some cases, and there had been questions from the RC. There had also been no rejections of experts, no OIML Issuing Authorities had been suspended, and there had also been no appeals. The first certificates had been issued on 2 January.

    Moving on to the certificates, Mr Oosterman showed delegates a graph and commented that unsurprisingly, the most certificates had been issued for R 76, followed by R 60, then by R 137 and R 51. This indicated that weighing still constituted the major part of the OIML-CS, but this was perhaps a call to improve the Recommendations for other categories of measuring instruments. Also unsurprisingly, the number of certificates issued by the Netherlands was the greatest, and this was not so different from what they had seen before. This meant that the system was still operating as it had been before it came into effect. Mr Oosterman showed delegates a slide he said they would find in the report in their documentation, showing an overview of the OIML Issuing Authorities, including which OIML Issuing Authority was approved for which Recommendation. He showed them a similar table for Utilizers, and from this they would note which countries accepted which kinds of certificates. He added that delegates would note that this table was quite full, which indicated that Utilizers accepted quite a large number of the Recommendations, which was a good development in itself. From this table, delegates would also be able to see which countries accepted Scheme A and MAA, or Scheme B for their national approvals. He re-iterated that they had had to review the participating experts, of which there were over 60, a number which was stable at the moment, but which they still wanted to increase.

    He also highlighted the cooperation between ILAC/IAF and the OIML, because if an assessment was carried out with an expert from the OIML list, then accreditation bodies should accept that expert. They had already noticed that sometimes an OIML Issuing Authority had suggested the OIML experts list, but the accreditation bodies had insisted on using their own experts. The OIML therefore needed to work jointly with ILAC/IAF to ensure that these experts were approved as being part of an assessment team.

    Regarding the promotional activities, a number of seminars had been carried out, starting in P.R. China, where the event had been attended by many people from laboratories, but also by manufacturers. Here Mr Oosterman commented that Chinese manufacturers were the biggest users of the OIML-CS, so there had been about 400 people in the room, and the seminar had been very productive. They had also held a seminar in Colombia, and one at an AFRIMETS training event in Kenya. They had also introduced the OIML-CS at a WELMEC meeting in January, as well as in conjunction with the Management Committee meeting in Sydney, where manufacturers and other organisations had been invited to an event to learn more about the system. This had continued in P.R. China, where the OIML Issuing Authority had needed more support on how to improve their laboratories. He remarked that P.R. China now had four Testing Laboratories under the OIML Issuing Authority, which was more than they had had under the previous system. Thanks to Mr Ulbig, they had held an awareness training in Moscow, which had been attended by people from Kazakhstan, Uzbekistan and other Central Asian countries, as well as Cuba, Slovakia and elsewhere. They had also held training with CECIP, to explain to manufacturers how the system worked, and as a result of the first training with AFRIMETS, they had also held a second event in association with the AFRIMETS General Assembly. Finally, they had held a meeting with the notified bodies in Europe, where they had also described their participation in the system.

    Mr Oosterman explained that a large amount of work had been done on the OIML-CS part of the OIML website, which was very up to date, and delegates would be able to find all the information about the OIML Issuing Authorities, such as for which Recommendations they were approved, as well as a lot of information on the Utilizers. Anyone who wanted to become an OIML Issuing Authority or a Utilizer could find very extensive documentation on the website. He remarked that he had just learned the day before that in P.R. China, everything had already been translated into Chinese, and since many manufacturers came from P.R. China, they would try to make a link to the Chinese website.

    Finances had been discussed earlier, but they had also been carrying out other activities, and he emphasised the liaison work with ILAC/IAF on the development of Joint Assessment Procedures, in which Mr Dixon was involved. They were also considering OIML D 29, which was the guidance on ISO Guide 65, the predecessor of ISO/IEC 17065. There was also the D 30 guidance on test laboratories, and the proposed D xx, which was the new guide on ISO/IEC 17065. There was also a proposal that these Documents should become the responsibility of the OIML-CS Management Committee because they were Documents which would be needed by OIML Issuing Authorities and Utilizers.

    With regard to the structure of OIML Recommendations, Mr Oosterman showed delegates a slide which he said would be familiar to them. He said an OIML Issuing Authority could obtain several test reports, combine them into an evaluation report, and this evaluation report would result in an OIML Certificate. However, many Recommendations, and he showed delegates the example of R21, mentioned a "summary of type approval" report, and these included the terms "passed" and "failed", meaning that they were "evaluation reports" rather than "test reports". Evaluation reports should be drafted by the OIML Issuing Authorities, and test reports should be drafted by the test laboratories. In the cases he had mentioned, these two types of report were combined, which meant there was a conflict as to who should issue the report. One of the most important resolutions Mr Dixon would be talking about was that they needed to revise Recommendations so that they had a separate test report and type evaluation report.

    In conclusion, Mr Oosterman stated the OIML-CS had been in operation since 1 January 2018, and was functioning. They had OIML Issuing Authorities and Utilizers, and certificates had been issued. This had been a huge success, and there had been no gap between stopping the MAA and Basic Certificate systems, and starting the OIML-CS. Experts were available to perform the audits to move from Scheme B to Scheme A, and it was good that they could use "old" data in the new system. However, he commented that he had some concerns.

    One of his biggest concerns was the Recommendations. The OIML had more than 100 Recommendations, and not all of them were included in the OIML-CS, but one of the biggest worries was that a number of them were outdated. As had been pointed out by the delegate from Zambia, certificates on breath analysers and on speed meters were needed, and he emphasised that especially countries with emerging economies did not have the capabilities to test these kinds of instruments. The Recommendation on speed meters dated from 1990, which meant it only covered old radar equipment which was no longer on the market. Some Recommendations also still needed a test report format to be produced, otherwise they could not be included in the system. He also urged delegates to participate, and showed them his last slide. This indicated (in blue) the OIML Issuing Authorities, and he added that unsurprisingly, these were from the Member States that had already been in the previous systems.

    He said they had new Utilizers, for example Zambia and Colombia. Mr Oosterman quoted Mr Malaver (Colombia) as having said that they "made use of quality infrastructure from other countries to improve their own quality infrastructure" and accepted certificates to issue national type approvals. Mr Oosterman went on to say about 20 % of Member States were OIML Issuing Authorities and 34 % were Utilizers. However, amongst Corresponding Members, only Namibia and Latvia were Associates. He observed that the majority of Corresponding Members were emerging economies which did not have the required test facilities, and these countries could benefit from the OIML-CS by simply accepting OIML Certificates and issuing national type approval certificates based on them. He therefore issued a final plea to use the OIML-CS. Last of all he requested updates to OIML Recommendations, and stressed that any delegates who had questions about becoming an OIML Issuing Authority or a Utilizer should contact him or Mr Dixon.

    Dr Schwartz thanked Mr Oosterman for his comprehensive report and he asked if there were any questions or comments.

    Mr Dixit asked about Recommendations in Scheme A and Scheme B. He asked why the applicable scheme could not be decided depending upon how long a Recommendation had been in force, subject to a review by the Project Group involved, and a CIML decision. He had also understood from Mr Oosterman's presentation that experts were not coming forward, and people were not attracted to the OIML-CS, so he suggested that the MC meetings were held every six months in different OIML Issuing Authorities. In this way, the MC members who attended could visit different laboratories and OIML Issuing Authorities and people would gain confidence in the Management Committee.

    Mr Oosterman said this was an important point. This was the same as the IEC system, in that the OIML Management Committee did not produce Recommendations. These were produced by the experts from Member States, and he referred to what Mr Patoray had said earlier when he had expressed the opinion that the process for approving a Recommendation was quite long. If delegates looked at the existing Recommendations, many had no part three, so there were no test reports available, which meant a certificate could not be issued. So again, he emphasised that the Recommendations needed to be revised to include a part three if they were to be included in the OIML-CS.

    Mrs Cheelo said that Zambia had recently become a Utilizer, as had been mentioned, but she added that in their application they had submitted a long "wish-list" under Additional National Requirements. She reported that Mr Dixon had followed this up, stating that these were not covered under the current OIML-CS. She appreciated that Mr Oosterman had explained everything very well, but from where Zambia was sitting now, it left her wondering what they were going to do going forward. For example, they had a regulatory authority in charge of road and traffic safety which had installed speed enforcement cameras, and there had been an outcry about whether they were type approved and by whom, which was the Zambia Weights and Measures Authority. So they had looked at the OIML-CS, and speed cameras were not included in the system, so in light of this fact, they had been asked about how long it took to get Recommendations put forward for CIML approval. She wondered how this kind of question could be dealt with in a practical way.

    Dr Schwartz thought this question touched on exactly the work which was foreseen for the Task Group 2023 which he had mentioned earlier in his report, and which would be looking at how to speed up the technical work, and how to make it more effective. He thought they would have to consider implementing elements of project management. They were taking this very seriously, but unfortunately, at the moment they still did not have the answers.

    Mr Oosterman added that what had happened with R 117 was that in the case of fuel dispensers they could make use of the test report format in R 118, but for fuel installations this was not possible because there was no test report format. So in the case of fuel dispensers, test reports had been issued, so at least there was evidence that tests had been performed, but they had not been completed with a certificate. He stated that it was not what they wanted, but that it was at least an option.

    Dr Schwartz asked the Committee to consider the respective draft resolution, which was displayed on the screen.

    Mr Dunmill read the resolution. He asked if there were any comments on the wording of the resolution.

    Mr Loizides wanted to add that members of the Review Committee and the Maintenance Group, who were not necessarily members of the Management Committee, also be thanked for their outstanding contribution to the success to date.

    Dr Schwartz thanked Mr Loizides for this proposal, which they would be glad to add. He asked if there were any comments on the wording of the resolution as amended. There were no comments. There were no abstentions. There were no negative votes. The resolution was passed unanimously.

    Dr Schwartz closed the session.

- number: '11.2'
  title: Items for approval by the CIML (concerning the OIML-CS)
  narrative: |2+

    Dr Schwartz noted that during the previous session, delegates had heard a report from the OIML-CS Management Committee Chairperson, Mr Oosterman, and during the current session they would consider Items for approval by the CIML concerning the OIML-CS. This would be presented by Mr Dixon, the OIML-CS Executive Secretary.

    Mr Dixon greeted the delegates. He referred them to the Working Document, in which the OIML-CS Management Committee had put forward a number of Recommendations, and stated that he would talk delegates through each one, although he was not sure whether they would be voting on each one as he presented them, or whether they would be considered together at the end of his presentation.

    Dr Schwartz suggested that since a roll call would be needed before taking a vote, it would be better to consider them together as a package, after Mr Dixon's presentation.

- number: 11.2.1
  title: Approval of the revision of B 18 Framework for the OIML Certification (OIML-CS)
  narrative: |2+

    Mr Dixon stated that the first recommendation concerned the revision of B18. As Mr Oosterman had reported during his presentation, there is a Maintenance Group which supports the work of the Management Committee, and they had identified a number of improvements that could be made to B18 now that the system had been launched and the documents were being used. He showed delegates a summary of these proposed improvements. They included:

    - an acknowledgement, based on the updated MoU that the OIML had signed the day before with the IEC, of the fact that the IEC allowed the OIML to use their intellectual property in support of development of the OIML-CS;

    - clarification of the representation on the Management Committee, which would now include an identification of the MC Member from each country who is eligible to vote, and the inclusion of observers from countries that had expressed a clear intention to participate in the OIML-CS, but that were not yet in a position to make an application to participate. Mr Dixon added here that they would like these countries to be able to see how the system worked, and to view the workings of the Management Committee, which would hopefully encourage them to participate in the system;

    - improvements to the wording regarding the inclusion of the revised editions of Recommendations in the OIML-CS; and

    - clarification had also been included that where there was an OIML Issuing Authority under Scheme A, the Member State did not need to designate a Utilizer when that particular category of measuring instrument was not regulated in their country.

    Mr Dixon added that there were also a few other editorial and minor changes, but these were the four key changes that had been included. He said that the Final Draft had been distributed when the Working Document had been issued in July, and stated that delegates would therefore have had plenty of opportunity to review it. The Final Draft had included a clean version, a marked-up version, and the results of the voting within the Management Committee. He asked if there were any questions on the revision of B18. There were no questions or comments.

- number: 11.2.2
  title: Approval of the OIML-CS scope and transition periods
  narrative: |2+

    Mr Dixon asked delegates to consider the next recommendation from the Management Committee concerning the scope of the OIML-CS and the transition periods. He specified that an Addendum had been issued which contained all the detailed information regarding this proposal, but he would now summarise this.

    The first aspect looked at maintaining previous editions of Recommendations in the system, once a revision had been issued. There had been a revision of R 60, which had been approved the previous year, and also a revision of R 61. He indicated that if delegates looked at B18, 15.5, it stated that previous editions should be maintained in the system on the recommendation of the Management

    Committee. Mr Dixon reported there had been a discussion on this topic at the meeting in March, which had prompted a discussion about a comparison table, or gap analysis, to support OIML Issuing Authorities and test laboratories in demonstrating their competence for the new edition, and he related that this was something they would talk about under item 11.2.4.

    The first aspect of the recommendation from the Management Committee was that the previous editions of R 60 and R 61 be maintained in the OIML-CS. The second aspect of the recommendation looked at extending the transition periods for some of the original categories of instruments that were in the system. A number were in Scheme B, and it had been stated that they would transition after a certain period of time into Scheme A. Mr Dixon referred to Mr Oosterman's presentation the previous day, in which he had stated that although they had a number of experts, they were still looking to approve more of them to participate in accreditation and peer assessments, to enable these organisations to go from Scheme B to Scheme A. He added that even when the accreditation assessment had been carried out, there was still quite a process that the OIML Issuing Authority and Test Laboratory would need to go through. A judgement had been made that the time scales that had originally been proposed, and which had been approved by the CIML the previous year, were in most instances a bit too short. Therefore, there was a recommendation to extend most of the transition periods by between six and twelve months to allow for the OIML Issuing Authorities and Test Laboratories to complete the application process.

    Mr Dixon pointed out that in the Addendum that delegates had received, the original proposal had been for R 117 to transition from Scheme B to Scheme A on 1 July 2019, but feedback from the convener of the Project Group that was currently revising R 117 indicated that in order to avoid any confusion between the publication of the next edition and the proposed transition date, the transition of R 117 should be deferred for a further period of six months. This meant a change from the documentation which delegates had received, which contained a proposal for R 117 to transition on 1 January the following year, and not on 1 July.

    The final aspect of this recommendation was that when the Provisional Management Committee had been identifying the instrument categories to include in the OIML-CS, a review of the number of Basic Certificates, the number of MAA Certificates and the number of Issuing Authorities had been conducted, and this had identified the 19 instrument categories that were currently in the OIML-CS. However, as had been mentioned the previous day, looking at the other Recommendations, there were 17 which actually fulfilled the requirements for automatic inclusion in the system. He drew delegates' attention to the documentation, where he said they would find a list of the 17 Recommendations to be included, with the proposal that they came into the OIML-CS in Scheme B on 1 January 2019, and that they would then transition after 2 years into Scheme A on 1 January 2021. Since the analysis that had been carried out by the Management Committee, it had been identified that the new 2016 edition of R 59 Moisture meters for cereal grains and oil seeds also fulfilled the requirements for inclusion in the OIML-CS, i.e. it had the required three parts - metrological and technical requirements, test procedures, and test report format, and so there was also a proposal to include this additional Recommendation in the system on 1 January 2019.

    This concluded the information on this proposal. Mr Dixon asked if there were any questions or comments regarding the recommendation and the proposal that had been submitted.

    Mr Awosola asked why the Management Committee had decided not to include the latest editions of R 60 and R 61.

    Mr Dixon replied that according to B 18, when a Recommendation was revised, the new edition was automatically included, and the Management Committee then only had to decide whether the previous edition should be kept in the system. So the previous editions of R 60 and R 61 would be maintained, but the new editions which had been approved the previous year would automatically be included in the system. The revision of B 18 improved this procedure and the Management Committee was making this particular recommendation to maintain the previous edition, not to request the CIML's approval of including the new edition.

    Mrs Lagauterie thanked Mr Dixon for his presentation. She wanted to know whether industry had been informed about the situation concerning R 117, and whether or not it created a problem for them.

    Mr Dixon confirmed that they had not yet been informed, as this had been a very last-minute proposal, which had been put forward by the convener of the Project Group revising R 117. If a six-month deferral was approved at this CIML meeting, then obviously this information would be communicated.

    There were no more questions or comments.

- number: 11.2.3
  title: Responsibility for D 29, D 30 and D xx Guide for the application of ISO/IEC
    17065 to assessment of certification bodies in legal metrology
  narrative: |2+

    Mr Dixon stated that the next recommendation looked at the responsibility for a number of OIML Documents: D 29 Guide for the application of ISO/IEC Guide 65 to the assessment of Certification Bodies, D 30 Guide for the application of ISO/IEC 17025 to the assessment of test laboratories involved in legal metrology, and the new D xx. He stated that at the moment there was an active project under TC 3/SC 5/p 12 which was revising D 30 to align it with the 2017 edition of ISO/IEC 17025 which had been published towards the end of the previous year. There was also a current project, again under TC 3/SC 5, which was developing a new Document D xx Guide for the application of ISO/IEC 17065. Mr Dixon explained that this project had progressed well, and the Final Draft Document had been put forward for approval under agenda item 12.1.1, so delegates would be voting on this later on that day. He noted that if the new Document was approved, it would replace D 29, because ISO Guide 65 no longer existed, and certification bodies were now working to the standard ISO/IEC 17065. Mr Dixon commented that at the moment, D 29 and D 30 were referenced in the Certification System, where they were used to support the assessment of the competency of OIML Issuing Authorities and Test Laboratories respectively. He specified that originally the Provisional Management Committee, which had been established to get everything ready for the OIML-CS so that it could launch at the beginning of this year, had made a proposal to move responsibility for these documents and the new project from TC 3/SC 5 to the Management Committee. However, in February of the previous year, the Presidential Council had considered that they should remain under TC 3/SC 5, because they were OIML Documents. At the previous year’s CIML meeting, delegates had approved a decision to revise D 1 under the responsibility of the CEEMS Advisory Group, i.e. not within a Technical Committee or Subcommittee. Mr Dixon continued that with this precedent having been set, the Management Committee had again made this proposal. The move was supported by the TC 3/SC 5 secretariat. Mr Dixon reported that he had also received a supporting statement from the Management Committee Chairperson. At its meeting in March of this year, the Presidential Council had reconsidered the proposal, and supported it, but requested that the Project Groups concerned be consulted. This consultation had resulted in support for the move. In the documents for this meeting, Mr Dixon had indicated that a negative response had been received from one member of TC 3/SC 5/p 12, but when he had asked the reason for this response, no reason had been provided, and the negative response had subsequently been changed to a positive response. The Project Groups were therefore in favour, although there had also been a comment that if these projects were moved to the Management Committee, there should be a mechanism for members of TC 3/SC 5 to be included in the Project Groups established under the Management Committee, so that the existing members of TC 3/SC 5/p 12 could participate in the project. This proposal had been discussed and supported at the Management Committee meeting held in March. The plan was therefore that D xx would hopefully be approved under agenda item 12.1.1, so that project would be completed. Responsibility for D xx and D 30 should then be moved to the OIML-CS Management Committee, and the project TC 3/SC 5/p 12 for the revision of D 30 should also be moved to the Management Committee. A working group or Project Group should be established under the Management Committee for the revision of D 30, with the OIML-CS Executive Secretary (Mr Dixon himself) as convener. Mr Dixon remarked that this would be convenient since he was already the convener of TC 3/SC 5/p 12. He reported that there would then be a call for participation in the Project Group, which would include the current members of TC 3/SC 5, and the revision of D 30 would then follow the procedures in B 6. Mr Dixon said that a roadmap had been developed, which he showed delegates. The intention was to have a Final Draft available for approval at the CIML meeting in 2020. He asked if anyone had any questions on this proposal.

    Mr Edelmaier (Austria) asked about the reason behind moving only the responsibility for D29 and D30, and wondered about all the other Recommendations which were related to the Certification System.

    Mr Dixon said that the key was that these two Documents were really aimed at test laboratories and certification bodies, and were the two key documents within the OIML-CS. It was therefore felt that the Management Committee had the expertise and knowledge on how these Documents could be applied to participation in the OIML-CS. They had also asked that existing members of TC 3/SC 5 and its Project Groups could participate in the new Project Group. Mr Dixon emphasised that they did not wish to exclude people who were already involved in the existing projects, but rather wanted to actively encourage them to participate. However, it had been felt that the importance of these Documents to the operation of the OIML-CS meant that the Management Committee was the best place to look at their content and applicability, and at any improvements that needed to be made to these Documents in the future. There were no further questions.

- number: 11.2.4
  title: Changes to the structure of OIML Recommendations
  narrative: |2+

    Moving on to the final recommendation, Mr Dixon stated that delegates would have received Addendum 11.2.4 which gave a detailed background to the proposal, but he summarised that this recommendation proposed changes to the structure of OIML Recommendations. Two aspects were considered. The first was the comparison table, or gap analysis, that had already been mentioned. The requirements of B18, 15.6 stated that when a new edition of a Recommendation was included in the Certification System, OIML Issuing Authorities and Test Laboratories had to demonstrate their competence to enable them to include this new edition in their scope. One way in which OIML Issuing Authorities and Test Laboratories could do this was to do a "gap analysis" between the previous edition of the Recommendation and the new edition, to demonstrate that they had identified any differences and additional testing that might be required as well as any requirements that were now different. The Management Committee had discussed how this could be carried out, because a consistent approach was required, so that each OIML Issuing Authority and Test Laboratory provided the same kind of evidence to the Review Committee in order for it to make a positive recommendation on their inclusion into the system for the new edition of a Recommendation.

    The Management Committee had discussed a proposal that Project Groups revising Recommendations should include a comparison table in the revised Recommendation, for example as an informative annex. The purpose of the comparison table would be to identify corresponding clauses in the previous and revised editions. This would make it possible to identify where there were differences in the requirements between the two editions, and to identify where the revised edition contained new requirements. It had been considered that Project Groups were best placed to develop such comparison tables, because they could more easily identify the changes and document them as they went through the process of revising a Recommendation.

    The second part of the proposal covered the structure of the Recommendations. Currently there were three parts: metrological and technical requirements, test procedures, and test report format, but within the OIML-CS, the OIML Issuing Authority issued a "type evaluation report" and the Test Laboratories issued "test reports". Mr Dixon said that when Mr Oosterman had made his presentation the previous day, he had shown a diagram of how the system worked, with test reports being used to establish the type evaluation report, which in turn was the basis for issuing the Certificate. However, having looked at the Recommendations which were in the system and which would be coming into the system, some used the term "type evaluation report" for part three, some used the term "test report", and some of them used a combination of both terms. This indicated that there was some confusion and lack of clarity over what the part three of a Recommendation was, and which sections of this part the OIML Issuing Authorities and Test Laboratories were responsible for completing. There was also a potential conflict with accreditation, in that if a test laboratory assessed pass and fail criteria within a test report, accreditation bodies would say that this was an evaluation activity and should be completed by the OIML Issuing Authority. The recommendation being put forward now was that Recommendations should have four parts: parts one and two as before, but part three would be the type evaluation report format issued by the Issuing Authority, and a new part four, which would be a test report issued by the

    Test Laboratory. Splitting the type evaluation report and test report into two different parts would clearly separate the activities of the OIML Issuing Authority and the Test Laboratory, and would also then avoid the potential conflict with accreditation and which document should bear which accreditation logo and so on.

    Mr Dixon also remarked that the current project for the revision of R 76 included a proposal to include an extra new "part" to cover verification procedures, so if this became a requirement for future Recommendations, it would become "part five".

    Mr Dixon drew delegates' attention to the project proposal to revise B 6 in the Addendum, and added that although the previous day it had been said that B 6 would not be revised, this Addendum proposed that B 6 be updated to reflect this proposal. Formats for the comparison table would be developed by the Project Group, which would show Project Group conveners what format this comparison table should have and what kind of information it should include. There would also be examples of type evaluation and test report formats for Project Group conveners to use. Mr Dixon explained that the previous week he had taken the existing Recommendation R 50 and had split the part three into a new part three and a new part four. This work had not taken too long. He added that he was aware that some conveners might be concerned that they were being asked to do their technical work a lot quicker but at the same time were now being asked to produce additional comparison tables as well as parts three and four. He was sure that the examples of the report formats would support conveners in doing their jobs. Mr Dixon stated that the aim was to have a Final Draft revision of B 6 ready for approval for the 2019 CIML meeting.

    Mr Mateus thought that making improvements to publications was very important. Regarding the gap analysis, he wanted to know what happened with certificates that had already been issued when a Recommendation was withdrawn. He asked whether they continued to be valid, whether they needed to be updated for the new version even though it had been withdrawn, and whether there was a certain "validity" period during which the certificates could be used. He suggested that a transition period would be needed, combined with the gap analysis, to give instrument manufacturers time to update their technologies.

    Mr Dixon replied that certificates would remain valid, so an R 60:2000 certificate would remain valid even though there was a new edition of R 60. It would be up to the manufacturer to decide whether they wanted to get approval for the new edition of R 60. He emphasised that although he had previously said that the comparison table would help OIML Issuing Authorities and Test Laboratories in demonstrating their competence for inclusion in the system, the development of the comparison tables would also support manufacturers, because they would be able to easily see what new requirements there were in the new edition of a Recommendation and therefore more easily decide whether they wanted to obtain an OIML certificate to this new edition, and if so, they would know what requirements their instrument now had to fulfil.

    Mr Mateus commented further that they had identified some difficulties in approving some instruments. For example they always tried to use the most up-to-date versions of Recommendations in their regulations, but sometimes the instruments could not meet the new requirements, so they had found some difficulties when approving instruments. The update for the new version of the Recommendation with an index of the tests to achieve compliance would be useful, and he suggested that perhaps a transition period for the withdrawal of these Recommendations would be a good idea.

    Mr Dixon replied that it was an interesting comment, and it was certainly why the Management Committee looked at the previous edition of a Recommendation when there was a new edition. It was also why, under one of the earlier proposals, they were proposing to retain the previous editions of R 60 and R 61 in the OIML-CS. It could be that in five years' time the Management Committee decided that they should no longer be in the OIML-CS, so it was one of the roles of the Management Committee to review the scope of the OIML-CS and to make recommendations to the CIML on the withdrawal of certain editions of Recommendation from the OIML-CS.

    Mrs Lagauterie wished to return to the question of R 117. She considered they had a basic problem because industry had expected that it would be put into place on 1 January 2019. There had then been

    a postponement of six months, which was already a delay for them, and now a new postponement of one year was being proposed. The method being used did not take into account the impact this would have, and did not consider industry's opinion. If she remembered correctly, even when the revision of R117 had started, which had been a long time ago, industry had not been very pleased because these instruments had not been included, even under the previous Certificate System. At the moment, they were waiting to include them in the OIML-CS, and now they would be made to wait a further year. Mrs Lagauterie was questioning the need for this delay, as she did not believe they had consulted with the other members of the working group, nor with CIML Members, and they had not had the time to consider another delay of six months. She said that she had a serious problem with the procedures that were being used, and did not agree with them. Regarding the delay, she suggested there needed to be a study on its impact, that the proposition should be supported by the views of several persons, and at least the opinion of industry should be considered. If this problem had concerned the weighing industry, CECIP was present at this meeting and could give their opinion, but she pointed out that CECOD was not present, and she did not believe their opinion had been sought.

    Mr Dixon thanked Mrs Lagauterie for her comments and said he would note them; he mentioned that this proposal had come up during the discussions with the convener of the Project Group revising R 117. He added that the convener expected to have the revision completed in the near future, and there was a concern that if the new revision were to be published the following year, then this would coincide with the transition of R 117 from Scheme B to Scheme A. There were concerns that this could cause problems for OIML Issuing Authorities and Test Laboratories, as well as for manufacturers. From a Management Committee perspective he said that he fully understood the comments and concerns that had been raised, and if the Committee felt that the change to the transition date for R 117 was not appropriate, it should revert to the original proposal. He noted that the MC Chairperson was nodding in agreement.

    Dr Schwartz considered that they should treat the item regarding R 117 separately.

    Mr Richter (United States) said that Mrs Lagauterie's comments concerned him as convener of the Project Group revising R117. Currently, Scheme B Certificates could be obtained for this Recommendation, and it had not made any sense to him to transition to Scheme A if the revised Recommendation were to be approved at the 2019 CIML meeting. Scheme A certificates would then be available for just a couple of months according to the old edition, and then the Scheme A would be available for the new edition. In his opinion, this would cause confusion in the marketplace. He also had several other comments but he said he would leave those until this issue had been resolved.

    Dr Schwartz noted they were running out of time, and that they should reconsider this item on R 117. He suggested delegates thought about it during the coffee break, proposing that they now conclude this item. Prior to voting on the respective draft resolutions, a roll call would be needed but before doing this he said they appreciated that the Management Committee Chairperson, Mr Oosterman, had taken the time to come to this CIML meeting. He was not sure how long Mr Oosterman would be able to stay at the meeting, so he wanted to congratulate the Management Committee Chairperson, the Executive Secretary, and all the Members of the Management Committee for all the work they had completed, and for the progress that had been made. He described the OIML-CS as being still in its infancy, adding that they needed more Certificates for more categories of instrument and more Utilizers. They faced some problems, which he was sure would be resolved progressively so he wanted to congratulate everybody that had been involved in the launch which had been only nine months prior to this meeting.

    Mrs Lagauterie also wanted to congratulate the group for its work, and for the development of the OIML-CS. She suggested that when all the changes had been adopted, the group prepared a summary document showing all the modifications, because she thought it was particularly important to bring them to the attention of those countries which had declared themselves as Utilizers since the beginning of the OIML-CS, on the basis of the old arrangements.

    Mr Dixon agreed completely, and the Management Committee would acknowledge this comment and produce a summary.

    Mr Lambregts (Netherlands) remarked that he was happy with the progress, but asked Mr Dixon to clarify BIML guidance with respect to the templates and formats.

    Mr Dixon referred back to his presentation, indicating that there were the existing Recommendations. He re-iterated that the previous week he had taken the example of R 50, for which he had developed initial proposals for templates for the proposed parts three and four, which had been a relatively quick process. He reflected that it might not always be so simple, and he had had to look at the requirements for the type evaluation report in the OIML-CS and the kind of information and content that needed to be included, but it was certainly something that the Project Group would be looking at developing to support those PG conveners who were revising Recommendations. He said they would be made available as part of the revision project.

    Dr Schwartz understood that there was a full support from the BIML for the Executive Secretary to provide templates with all the respective and related information that was necessary.

    Mr Dixon clarified that these would actually be provided by the Project Group.

    Dr Schwartz corrected himself, and stated that his experience was that this was not an enormous task to separate these two parts of the report, and it would be a big advantage if there was a clear distinction between the type evaluation report and the test report. He maintained that there had been a lot of confusion in the past, and he really appreciated that this would be clarified in the future. He added it would take some time to for this to be adopted, but considered that it was a very important and valid step. He asked if there were any more questions.

    Mr Awosola asked what would happen to the existing Recommendations once B 6 had been updated to require four parts in OIML Recommendations. He asked if the new part four was going to require a new revision or a new project to revise existing Recommendations.

    Mr Dixon explained that he expected that when a Recommendation was revised, the current part three would be separated into two parts. He did not anticipate that all Recommendations would suddenly have to be revised to separate out these parts, but would be picked up as part of new project proposals.

    Dr Schwartz added that once they had prioritised the Recommendations, they would be speeding up and not waiting for five years to have the part fours which were needed. He hoped they would be much quicker, at least with the most important Recommendations which would be identified.

    Mr Dixit said he had three questions. Firstly, since Recommendations changed from time to time, he wanted to know whether they intended to fix the validity of certificates. Secondly, he wanted to know whether they were allowing revisions to be made to certificates which were issued under each category, and thirdly, he asked for views on what would happen if OIML Issuing Authorities did not obtain peer assessment or accreditation during the necessary time period.

    Mr Dixon replied they had already explained that any OIML certificates that had been issued would remain valid. There would be no expiry date for certificates. Revisions to existing certificates could then be made while the edition of the Recommendation was still in the system and certificates issued under Scheme B would remain valid. If an instrument type then transitioned to Scheme A, there were provisions in the documentation on how a Scheme B certificate could be converted into a Scheme A certificate.

    Mr Dixit was not satisfied with Mr Dixon's reply. He said that the same point had been made by Mr Oosterman. There were a lot of certificates that had been issued under the Basic Certificate System, and these had been converted to Scheme B certificates, but some Recommendations were under revision and had not been completed. The NMIs and organisations had issued those certificates on their own. He suggested that they should consider that the consumers were the utilisers, and they should not be sent in the wrong direction.

    Mr Dixon replied that when a Utilizer applied to participate in the OIML-CS, they had to indicate which certificates they were willing to accept, and when new editions of Recommendations came into the OIML-CS, Utilizers could specify whether they would now only accept certificates for the new edition, or whether they would continue accepting certificates from the previous edition.

    Dr Schwartz intervened saying that they would have to stop the discussion now. He asked delegates to take time during the break to bilaterally clarify any further questions. He said that the problems were understood, and they recognised the struggles and the proposals that had been made to further improve the OIML-CS. They knew that there were still some problems, but these would not be solved during the CIML meeting, noting that this was what the Management Committee was for. He asked delegates to become utilisers and take part in the Management Committee meetings to raise their questions. He requested that this item be closed, but informed delegates that before this could be done, they would need to carry out a roll call to be sure that they had a quorum to approve the draft resolutions. He thanked Mr Dixon.

