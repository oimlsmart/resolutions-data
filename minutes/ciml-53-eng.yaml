    Mr Patoray greeted delegates and wished to thank Dr Schwartz for the previous evening's reception, in particular the magicians who had performed during the evening and who had been amazing. He said he had not been able to see through any of the illusions and it had been quite an experience. He also very much appreciated the gifts that he had received, and even though they were all very special, he said Dr Schwartz knew that the special characteristics of the shiny ball which he had received, which was a representation of the silicon sphere for the mol, was particularly special for him. He remarked that they had talked about the work of the PTB and the shiny ball for a number of years now, and so to actually have one was very special.

