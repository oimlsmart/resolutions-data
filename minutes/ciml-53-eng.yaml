- number: '8'
  title: Report by the BIML Director on financial matters
  narrative: "\n"
- number: '8.1'
  title: Approval by the CIML of the 2017 accounts
  narrative: |2+

    Mr Patoray said this report would be a little more involved, with a little more detail. He commented that some delegates had experienced his reviews of the accounts in previous years, and these always followed a similar format, with his presentation adding details to the figures. He wanted to mention that in some of the presentation he would be making during the course of the morning, the numbers and text on the presentation may be a little too small for some delegates, and indicated that delegates could find PDFs of his slides amongst the Additional Meeting Documents on the OIML website. He added that at the end of the meeting, all presentations would be made available as usual. Despite this, he had taken the time to ask the staff to add these slides to the Additional Meeting Documents because of the setup in the room.

    He showed delegates a statement from the independent auditor indicating that the OIML met all the requirements of the IPSAS standards. He said there was an English translation for all those who were not proficient in French, but basically it said that the final accounts for 2017 provided an accurate picture of the financial situation of the OIML, and were in conformity with the IPSAS standards and also with the resolutions that had been passed by the organisation itself. He specified that the statement was signed by the chartered accountant.

    Mr Patoray said his first graph showed the total charges. The graph showed the budget going through to 2020 in blue, and the actual expenses in red. The orange lines indicated the budget years, so delegates could see where the budget periods fell, and the green line indicated his time at the Bureau. The actual expenses were slightly lower than the budget, and he felt they were doing reasonably well.

    The second graph showed the total amount spent on meetings, travel and accommodation. In this case, the expenditure had been slightly above the budget. This was partly due to the amount he had travelled in 2017, which he said he had already mentioned. It was also due to the amount of travel that had been carried out promoting the OIML-CS.

    The next slide showed the total net assets, and he indicated that these had increased substantially since he had arrived in 2011. They were now stabilising, because the work on the building had been completed and he would therefore expect that the net assets would now remain the same, or drop slightly, as the cash in the reserves was reduced.

    The next slide showed the year-end cash. He emphasised that this included all the cash. This was not just the reserves, but included all the cash in the bank. It included all the funds that had come in to the Bureau during the last quarter and had not yet been spent, and any surplus from the previous years that

    had built up in the cash accounts, in addition to the reserves. He specified that the reserves were currently set at about €1.2 million, a sum that had been set at the last Conference. This was relevant to the discussion to be held under item 8.5.1 on the budget surplus and the reserves. He said the cash had been increasing since 2008, even though the intention had actually been to reduce it during this period. He explained that this had been the time at which the MAA had been under development, and the funds to pay for the extra people involved in the MAA had come out of the cash.

    The next slide showed the full accounts from 2017 and he admitted that this was a slide that delegates might find difficult to read, and for which they may like to refer to the copy provided as an Additional Meeting Document. He said he would now go through each section separately. Regarding the results, he said that for delegates who were interested in the bottom line, he had again not spent all of the funds in the budget for 2017. He said that this was not just due to his natural cautiousness, but also due to the fact that they had had a little more cash income than they expected. For those delegates who were not familiar with the budget which had been passed by the Conference in 2016, he drew attention to the fact that there was an intentional negative number. This was the sum of $ \epsilon $ 100 000 allocated in the current year to pay for the training of conveners and secretariats. The amount of $ \epsilon $ -92 700 included the amount of $ \epsilon $ -100 000, so in summary, the budget for 2017 was supposed to be $ \epsilon $ -92 700, but in fact the result had been only $ \epsilon $ -44 488.

    Looking at the results in more detail, Mr Patoray first detailed the income. With regard to Member States, and with the change to accrual accounting, the amount expected to be received is the same as the value of the invoices sent out, and since there had been no change in the number of Member States, it would be expected that there would be no change in the income. The number of Corresponding Members had increased by one, so there had a been a slight increase in the income from this additional fee. He drew delegates' attention to the fact that the large increase in income was due to certification, since the fees that had come in 2017 had been substantially higher than expected. In his opinion this was because the Basic Certificate System and the MAA had been shutting down. Manufacturers had known this, and had tried to push as many certificates through in 2017 as they could. The laboratories had done a tremendous job pushing that many certificates through which had resulted in an increased income of €30100. The total income had therefore been €27311 more than expected.

    Mr Mathew (Switzerland) intervened. He said he did not understand what the line labelled "total coefficient" referred to.

    Mr Patoray replied that this referred to the way in which Member States were classified to decide what their contribution should be. The Convention specified four classes according to population. Each class then pays a different number of "base contributory shares" of the overall budget: countries in class 1 pay one share, those in class 2 pay two shares, those in class 3 pay four shares, and those in class 4 pay eight shares. The "total coefficient" figure indicated the total number of base contributory shares for each year, which varied depending upon the number of Member States and their classifications.

    Mr Patoray continued by specifying the charges. He reported that in 2017 they had still had a contracted person instead of a permanent Assistant Director, so the fees for this position had not been as high as he had anticipated in planning the budget. They had therefore not quite spent the total amount allocated for the active staff. Also, with regard to the pension system, one of the members receiving the pension had died, so they were no longer receiving a pension. He said he had also planned for inflation to impact the pension amount, and in France inflation had been very low, so it had not had the impact he had anticipated. The total staff costs had been $ \epsilon $ 48034 less than anticipated.

    In the area of running costs, they had spent a little more than anticipated. These costs included those to keep the building operating such as water, electricity, and expenses of that nature. He indicated that although the renovation of the building had been completed, there was still some maintenance being carried out and these charges had been higher than anticipated. With regard to the administrative costs, these had been reasonably in line with the budget. He specified that these costs included supplies, maintenance related to administration, documentation, phones and other fees. He indicated that there were sub-accounts under each of these headings, some of which had their own sub-accounts. They therefore had a detailed account of what was being spent on each of these items. The expenditure on

    communications had also been close to the budget. He specified that there had been a substantial increase in the amount spent on the website because of the increasing use and capability of the website.

    With regard to the amount of money spent on meetings, it had been very close to the budget. The meeting in Cartagena had been the first one where the OIML had paid for the entire meeting, and this had included a seminar to present the then new OIML-CS. He re-iterated that the costs of travel and accommodation had been greater than budgeted. He repeated that this had been due to his own travel, as well as the work that Mr Mason had been finishing. It had also been due to the travel deemed necessary in order to promote the OIML-CS. The miscellaneous costs had been a little higher than anticipated. As miscellaneous costs rose, he said they tried to identify what they were and where they should be located, because he did not think there should be this amount under this heading. He hoped that by next year the amount to report under the miscellaneous heading would be much less.

    In the search for the new Assistant Director, they had not spent anywhere near what had been anticipated. In particular, the anticipated travel costs had not been as high as expected. In the special funds, they had been able to spend a little bit more than had been anticipated in the budget for that year. This had been the first time that the CEEMS budget had been overspent since the time it had been set up five years ago. He highlighted that the main expense had been a regional OIML Training Course (OTC) Mr Dunmill had organised in Kenya at the end of the previous year. The OIML had also received very significant support from the PTB. This was the way when the organisation was dealing with what would have been called developing countries in the past, countries that did not have a lot of money, that the OIML was able to provide some funding as well as the PTB which had provided a substantial amount of funding to able to set up this event, and get the experts there.

    In the case of the training for technical work, €100 000 had been budgeted and only €63 882 had been spent. The cost of Mr Vinet's work as a contractor was included in this expense. During the training they had found that it had been much easier and more economical for two people to travel to a region and gather people in a region than it had been to bring people to Paris. In this way, the participants had few costs as they did not have to travel. In many cases, even when they had come to Paris, participants had not charged the OIML anyway. They had insisted it was easier to claim their travel expenses from their own organisations instead of having the OIML reimburse them. This had been one of the major reasons they had spent less than anticipated. He underlined that this would be accommodated in the forecast.

    With regard to depreciation, Mr Patoray said they were "running a bit high". There had been the cost of the protection of the OIML logo which had been put under capital expenditure when he had expected it to be classed as an expense. In addition, they had not lost any Members, so all the uncollected fees were also included under the heading of depreciation.

    He understood that some delegates were interested in the costs related to the OIML-CS. He repeated that the revenue had been greater than anticipated because more certificates had been registered. He added that the costs of the OIML-CS in the current year had also been much higher, mainly because of all the promotional and travel expenses, as well as BIML staff members' time at the start of the OIML CS, such as for setting up the website. He underlined that these costs would not continue to be so high, and it had been useful that additional revenue had been generated by certificates.

    To summarise, Mr Patoray said that the staff costs had been greater than anticipated, but overall the costs had been relatively in line with the budget, with the exception of the travel and accommodation, mostly due to the promotional activities of the OIML-CS. In total, a little more had been spent than had been anticipated. In all about 50 000 less than had been anticipated in total for 2017.

    This concluded Mr Patoray's presentation, and he asked if there were any questions. There were no questions. Mr Patoray joked that this was either really good or really bad. He hoped that it was a really good sign. He said he had tried to provide a little more detail with extra drop downs, and on the PDF this would be one sheet. He said he had tried to provide more detail on this occasion so that delegates could understand the reason for the over- or under-spending.

    Dr Schwartz considered that everyone was happy with the detailed, comprehensive, and clear report that Mr Patoray had given. He re-iterated the remark he had made during his report: Members had the

    impression that the global financial health of the Organisation was good. He thanked Mr Patoray for his achievements in bringing the finances back to a good situation.

    Mr Dunmill stated that there had to be an approval of the 2017 accounts, and read:

    The Committee,

    Noting the accounts for 2017 and the BIML Director's comments,

    Considering the external auditor's approval of the 2017 accounts,

    Approves the 2017 accounts, and

    Instructs its President to present them to the 16th OIML Conference in 2020.

    Mr Dunmill asked if there were any comments on the wording of the resolution. There were no comments. There were no abstentions. There were no negative votes. The resolution was adopted unanimously and the accounts for 2017 were approved.

- number: '8.2'
  title: Discussion by the CIML regarding the appointment of the financial auditor
  narrative: |2+

    Mr Patoray said this item had been included on the agenda without a lot of detail in the Working Document. This was being considered in line with the OIML's financial regulations, B 8 OIML Financial Regulations and Article XXI of the Convention, which indicated that the financial statements of the Organisation, prepared by the Director, should be audited by an independent chartered accountant. He explained this was a designation for individuals who had special credentials and who were authorised to both audit and sign the audit. The Article stated that the chartered accountant should be selected from a list prepared by the regional professional association of chartered accountants.

    He observed that in 1955 this had been a physical list on paper which was held by the regional professional organisation, whereas today they were available on the internet. Article XXI also said that the independent chartered accountant should be appointed by the CIML upon a recommendation made by the BIML Director, and that the appointment was renewable for a term of four years. Mr Patoray indicated the appropriate website and said that delegates could find the list of chartered accountants there if they wished.

    He stated that the current expert accountant, Mr Frederic Fischer, had started in 2011, when Mr Patoray himself had started at the Bureau, but that he had been hired by the previous director during the time of transition from cash to accrual accounting. Mr Patoray stated that Mr Fischer had the credentials required by the Convention, and he found him to be a very efficient and proficient auditor. He had skills with Sage, the accounting package used by the Bureau, and he had also developed some tools specific to the Bureau.

    In the first four years of working with Mr Fischer, a lot of adjustments had had to be made, and it had been very beneficial for him to be auditing the accounts with his expertise in Sage together with the ability to understand the changes that had to be made in order to move from cash to accrual accounting. Mr Patoray said this had been complicated by the changes in the pension arrangements and the reevaluation of the building. The past four years had been much more stable, and Mr Fischer had been able to dig deeper into the accounts.

    Mr Patoray said there were differing opinions on appointing an auditor. One was that you should change an auditor fairly regularly, so that there were new eyes, a fresh look, and a different approach to the accounts. The other opinion was that once you had found a good auditor, they could dig down into your accounts and the system, and understand it better, so they could provide better guidance to you and suggest improvements to make your system better. Mr Patoray said that as an auditor himself in the past, he had enjoyed repeat audits because he had been able to understand the system and been able to dig down and find those issues that might not be visible on the surface.

    Mr Patoray felt that Mr Fischer had provided an excellent service over the years and he had complete confidence in him. He said he therefore strongly favoured maintaining Mr Fischer as auditor, because his team would be able to do a more thorough job and provide suggestions for improvements.

    In the case of the special accounts for training, for example, they now had a special account with China for the secondment position, which needed to be accounted for. Mr Fischer and his firm had the ability to understand those changes. He would not expect a new accountant to be able to understand all of this for at least two years. Mr Patoray stated that the OIML was also in the process of appointing a new BIML Director and it might not be the right time to have a new accountant as well. Mr Patoray therefore recommended that Mr Fischer be reappointed for the term of four years according to B 8 OIML Financial Regulations. He asked if there were any questions, but there were none. Mr Patoray added that there would be a resolution approving this, which would be included in the group of resolutions to be approved after his various presentations.

    Dr Schwartz thanked Mr Patoray for his presentation. He noted that they had received a clear recommendation, which he fully supported considering also the appointment of a new BIML Director, as he thought it was important to use the experience of the current accountant.

    Mr Dunmill read:

    The Committee,

    Having regard to article 21.4 of OIML B 8:2012 OIML Financial Regulations,

    Following the recommendation of the BIML Director,

    Appoints "LG Audits & Conseils" as the independent chartered accountant of the Organization for a four-year term from 1 January 2019.

    Mr Dunmill asked if there were any comments on the wording of the resolution. There were no comments. There were no abstentions. There were no negative votes. The resolution was adopted unanimously.

- number: '8.3'
  title: Overview of the arrears of Member States and Corresponding Members
  narrative: |2+

    Dr Schwartz asked delegates to consider item 8.3 and asked Mr Patoray to give an overview of the arrears of Member States and Corresponding Members.

    Mr Patoray observed that those delegates who had participated in CIML meetings in previous years knew of his passion for the Convention, and Article XXVI, which indicated very clearly that contributions should be paid at the beginning of the year. To be very blunt, he said that was not happening.

    As of September 2018, just before the CIML meeting, Member States still owed €724020 to the Organisation, and Corresponding Members owed €58913. This made a total of 782933 still owed to the OIML as they entered the final three months of the year.

    He noted that as metrologists, delegates liked numbers, and although percentages were not always the best way of presenting something, he stated that 35% of Member States' membership contributions had still not been paid by the last three months of the year. Currently 19 Member States still owed their contributions for 2018, which represented 31 %. Four Members still owed membership contributions from before 2018. He said he had sent personal letters to those that owed money the previous year on two separate occasions, in addition to other reminders sent by the Bureau. As a result, the total sum owed had decreased, but the total owed by the four Member States which had not paid by the end of the previous year was $ \varepsilon $ 80320. He added that unfortunately, one Member State would be de-listed if no payment was received by the end of 2018.

    At least two Member States had contacted the Bureau about slow payments, so they could anticipate that they would not be receiving funds from these countries in the immediate future, but at least the Bureau knew they were working to readjust their budgets. There was a similar, but even less attractive

    picture with regard to Corresponding Members. 65 % of Corresponding Members' fees were still owed in the last three months of the current year. Out of a total of 65 Corresponding Members, 24 still owed their fees, which corresponded to 37 %. Thirteen Corresponding Members still owed more than their fees for 2018, and five would be de-listed at the end of the current year due to this lack of payment.

    He drew delegates' attention to the fact that three Corresponding Members had been de-listed the previous year. From a payment standpoint this was not at all encouraging. He remarked that participation in this meeting was very good, great new systems were being put in place, and there was a lot of enthusiasm, but the OIML was struggling to recover contributions throughout the year. He said he understood that many delegates had budgets which did not run from January to January, so some delays in payment were understandable. Some delegates had a budget that started in October, so they may not be able to pay until the final quarter of the year, and if the BIML knew this, it could be anticipated in the OIML's budgeting. When they did not know, it was difficult to know when they were going to receive the payment.

    At this point, Mr Patoray said he could only repeat that €782933 was still owed, and he emphasised that the past quarter had featured the lowest level of payments received that he had known in the entire time he had been Director, although he confessed he did not understand why. He would like to understand what the problems were, and stated there were provisions in the Convention to allow for Members who had problems. This was one of the reasons for the reserves, so that the Organisation could accommodate any problems. He asked delegates if they had any questions.

    Mr Dixit commented that the previous day it had been reported that in the last five years, five new Member States, and approximately five Corresponding Members had joined the OIML. However, he observed that if regular payments were not being received, and Members were being de-listed, in the three years overall, there was no actual achievement.

    Mr Patoray said he understood Mr Dixit's statement. He said they had not actually de-listed a Member State while he had been Director. He repeated that there was currently one Member State which could be de-listed at the end of the current year if payment was not received, and the Bureau was trying to work with them to understand what the problems were, and to see if the situation could be resolved, but unfortunately this Member was not participating in this meeting.

    He acknowledged that Mr Dixit was correct. If they reported they were adding Members, but the fees were not being collected, it was not really a benefit. In the end, most Members had paid their contributions the previous year, and most of the Corresponding Members had paid their fees in the previous years, although not all. He confirmed that eventually, most Members paid, but they did not pay on time even though each Member State government normally received its budget at the start of the year. The money was there for delegates' organisations to spend throughout the year, and they tried to spend the money evenly throughout the year. However, in the case of the Bureau, Mr Patoray noted that they theoretically had all the money coming in at the beginning of the year since this was stated in the Convention, but in reality, the fees came in slowly throughout, and in the current year it had been very slow. He wanted delegates to be aware of this, and he wanted to draw attention to the relevance of this problem to item 8.5, the issue of the surplus and the reserves. He added that he expected all Member States and Corresponding Members to pay by the end of the year, and stressed that right now there was a big shortfall and what he called "slow pay".

    Dr Schwartz asked if there were any further comments and remarked that they had a similar discussion at the previous CIML meeting in Colombia, and they had taken resolution 2017/8, which reminded Member States of their obligation under Article XXVI of the Convention which stated that, inter alia, contributions should be "paid at the beginning of the year to the Director of the Bureau".

    He said he was not sure what to do about this, but suggested that delegates should remind the responsible persons in their ministries of this problem, and try their best as CIML Members to take care that their obligations as Member States were taken seriously.

    Mr Dixit commented that there was a need for some promotional events. He said the Organisation participated in a lot of events throughout the world during the year, but when these events were being held they were not reminding those responsible for the finances of Member States. This would be one

    way to get in touch with these countries which did not make the regular payments. He said that he felt this may be a way to address those Member States which were not paying their contributions.

    Mr Patoray agreed. He said Mr Dixit had made a very good point. His idea was that he was raising awareness at this particular meeting, but that at individual meetings during the year, he always asked the individual Members that owed money to pay. He said he had been to the relevant embassies in Paris to make sure that they understood their country's obligations and request payment. He confirmed that others who travelled to various meetings also make requests for payment. He added that he had also sent personal letters with specific invoices to both CIML Members and embassy staff at the end of the year for those countries had not yet paid. He added that there had been a strong push to get Members to meet their obligations but it was just a struggle, and he felt they could be doing better things with their time if they were not having to chase people to meet their obligations.

    Dr Schwartz felt this item was concluded. Mr Dunmill read:

    The Committee,

    Notes the report given by the BIML Director,

    Encourages the BIML to continue its efforts to recover outstanding arrears of its Member States and Corresponding Members, and

    Requests those Members with arrears to bring their situation up to date as soon as possible.

    Mr Dunmill asked if there were any comments on the wording of the resolution. There were no comments. There were no abstentions. There were no negative votes. The resolution was adopted unanimously.

- number: '8.4'
  title: Report by the BIML Director on the 2018 budget forecast
  narrative: |2+

    Dr Schwartz asked delegates to consider item 8.4, which was about the budget forecast for 2018.

    Mr Patoray started his presentation by drawing delegates' attention to the "REV 3" written in red on his first slide. He said this was because he had amended this information several times trying to keep up with the data coming in from the accounting as well as the quarterly audits that were run at the Bureau to see how they were progressing. This represented the most up-to-date information he had.

    He said it obviously did not include all of the costs, and was only a forecast, which was an estimate of what might happen between the present time and the end of the year. He added that those who had sat through his forecast before would probably find him very pessimistic in this forecast. He reminded delegates that generally he overspent in his forecast, but sometimes costs were lower than predicted. He reported that he was not trying to make light of this, and reassured delegates that he was being serious in his attempt to predict the budget accurately, but in the previous year, he had underspent the budget by €50000.

    He added that whilst this indicated that the Organisation was being wise about what it was spending the money on, the money was there, and they should be fulfilling their obligations with the money which had been allocated by the CIML. He stated that in the current year, it would appear that he was going to overspend by nearly $ \epsilon $ 90 000 euros [BIML note: the actual figure is $ \epsilon $ 89 630]. Since the budget period was four years, the surplus that had been left from the previous year, of nearly $ \epsilon $ 50 000 [BIML note: the actual figure is $ \epsilon $ 44 489] was still available to spend this year. The Organisation had not spent it all the previous year, and as an example he mentioned that they had not spent as much on training as they had intended to, but he wanted to highlight the fact that the next BIML Director may well be reporting final figures that were over what had been anticipated. With regard to the question of how this had happened, he explained that the biggest change in the income had been that they were now well below the target number of registration fees for OIML certificates in 2018. He judged that manufacturers had pushed to get their instruments type approved before the end of the MAA and the Basic Certificate System. It took time to create instruments that manufacturers could have confidence in sending to a laboratory where they would have to spend a lot of money, and of course they would

    like to them to pass the testing. He considered that there was going to be a gap in certificate income, and said that this was what they had seen in the first six to nine months of this year. He reported that they had noticed a slight increase in certificate income during the previous month, and hopefully this would carry on until the end of the year. However, this left them about €14516 below the amount they had anticipated.

    He called delegates' attention to the fact that the previous year the income had been substantially higher than anticipated. He reported that there had been no change in the number of Member States. One Corresponding Member had also paid their debt in order to re-join, which was where the $ \epsilon $ 6300 had come from.

    Mr Patoray showed delegates a slide of the charges forecast for 2018. He said he had not broken this down into so much detail as he had for the income. However, he particularly highlighted the staff costs and the costs of the active staff. He explained that they had hired the new Assistant Director, and this had had an impact. He added that they would also have a new Director, who would be taking up his post as Director Designate in November, and this had been something he should have anticipated in the budget, but which he had forgotten.

    These two items made up most of the indicated 39540 overspend. He remarked that although the secondment was not a charge which would be repeated, in bringing Guo Su into the Bureau there had been associated charges. P.R. China had taken on the majority of the charges for the two-year period, but the OIML had paid charges involved with Guo Su's moving, finding places for his children in schools, and preparing for living in Paris for two years. Mr Patoray said he believed the OIML had an obligation to support secondments. He stated that since this was not a regular expense, delegates would not see this charge in 2019, and he anticipated that the costs would be less. In summary, Mr Patoray said there was an over-expenditure of 61466 in staff costs, so over the year there was a little less income and a little more staff cost.

    With regard to the other numbers, Mr Patoray said that some were under, and some that were over the budget, but all were fairly small, and all reasonably close to the budget. Mr Patoray stated that the depreciation was always a bit higher than the sum he anticipated, saying that he was not very good at this projection, but he indicated that the depreciation would be decreasing during the next few years because there would not be the large costs involved in the renovation of the building.

    The total charges resulted in a positive €5917. He said that he was pleased about the amount which would have been spent on training, having anticipated €70000 euros this year, but hopefully actually spending €90000 so that they would make up a little bit of what had not been spent during the previous year. The end result, because there was less income than expected, and higher charges than expected (in particular with regard to the active staff) would be €89630 this year, of which €50000 had not been spent the previous year. Overall it looked as though he was going to achieve a milestone in his last year as Director in controlling the OIML's budget and they may spend more money than they had anticipated. He indicated that he was not proud of this, but it was just the way things had worked out taking last year's expenditure and combining it with this year's.

    With regard to the OIML-CS, Mr Patoray said that the income from certificates would be less than anticipated. The costs would be higher than expected because of promoting the system, and the travel involved in its promotion. He did not therefore expect there would be net zero outcome for the current year 2018. He asked delegates if they had any questions on the forecast, but there were none.

    Dr Schwartz remarked that it had been a very clear report and everybody had understood the figures.

    Mr Dixit asked about the plan for the following year with regards to the savings Mr Patoray had made during the present year.

    Mr Patoray replied that he did not have a plan for the following year, and suggested that Mr Dixit should ask the next Director this question.

    Mr Dixit replied that Mr Patoray was the current representative of the various nations, and therefore questioned whether he might have made some plans on how the Organisation could be run in a better way, which he could give his successor in terms of a better picture of the Organisation. They should be

    considering what difficulties they were facing, so that these difficulties did not get in the way. Mr Dixit said if they had surplus money, this should be spent to boost the moral and the technical knowledge of Member countries where metrology was not well developed.

    Mr Patoray said he now understood what Mr Dixit meant. He confirmed this information would be provided under item 8.5.1.

    Dr Schwartz responded that Mr Dixit's question made an excellent transition to the next item, where they would be looking at how the surplus could be best spent.

    Mr Khedir thanked Dr Schwartz. He said he had a comment about the report. It had stated that the ratio between the salaries and the total annual charges was about 67 % for 2019 against 65 % in 2018. This ratio had increased, so he wondered whether there were procedures in place to reduce this sum, which appeared to him to be rather high.

    Mr Patoray replied that the short answer was "no" because there was a set number of staff, and that would not change. They would not be able to do the work without the current number of staff. Two things would be different in 2018. Firstly, he repeated that he had made a mistake in not having included the two months of salary for the Director Designate, and secondly, there had been the very pleasant surprise that the request for a secondment had been fulfilled. The figure of $ \epsilon $ 40000 in the staff costs was where he had put this expense in the forecast, although in the final accounts it might be put elsewhere. The $ \epsilon $ 40000 would not be there in the future, so the ratio would be reduced, but Mr Patoray said it would not change substantially.

    As the administrative arm of the OIML, the Bureau had two main costs: the staff and its related expenditure including salaries and benefits, and travel and meetings. The staff level was currently at a minimum, and he considered there was no way of reducing these costs. With regard to the travel, it was possible to examine this in more detail, but he stated they had anticipated the need for more promotion work, such as promoting the OIML-CS, the QI toolkit and CEEMS. In many cases, travel was predetermined, since there was an expectation that a member of the Bureau would be present at OIML technical meetings and at RLMO meetings. If they had a real problem with the budget, these could be re-examined and reduced, but he did not think the staff itself could be reduced. In his opinion, certain core functions were necessary in the Bureau, which he would not recommend contracting out. For an organisation such as the OIML, he judged they needed an in-house core group of people that were flexible and capable of meeting Members' needs on an instant basis. When things were contracted out, he pointed out that a central organisation handled things, and as a client, the OIML would always seem to be waiting in line for something to get done. He submitted that the Bureau was able to react quickly, but Members paid for this benefit in the staff costs.

    Dr Schwartz thanked Mr Patoray and suggested they moved onto the next item, 8.5.1, which was the budget surplus, and which was related to the results.

    Mr Dunmill read:

    The Committee,

    Notes the report on the budget forecast for 2018 given by the BIML Director.

    Mr Dunmill asked if there were any comments on the wording of the resolution. There were no comments. There were no abstentions. There were no negative votes. The resolution was adopted unanimously.

- number: '8.5'
  title: Initial discussions on budget surplus and status of Corresponding Members
  narrative: "\n"
- number: 8.5.1
  title: Discussion on future budget surpluses and level of reserves
  narrative: |2+

    Mr Patoray commenced his presentation by stressing that the main word on his first slide was "initial" which was written in blue and bold. He confirmed that he was not expecting a decision to be made at present. He explained that he would present his thoughts on this topic, but acknowledged there would

    be many other opinions, mainly because it had to do with money. All budgets were tight, and in most countries, governments were trying to reduce costs, and specifically trying to reduce costs in relation to international treaty organisations such as the OIML. He recognised that national governments always questioned whether there was merit in the way they were spending their money, and whether it was worth their time and effort, or whether it would benefit their own people more if it were spent in another way. He stressed that discussing what to do with money was always a sensitive topic.

    This presentation would consider his experience with the accounts at the Bureau, his experiences with Members, and the ability of the organisation to take the next step. He emphasised that it was only an initial discussion, was only the opinion of one individual, and acknowledged that Members had important opinions on this topic. He said they could be expressed before the Conference in 2020. His presentation would include some "numbers", and he added that he particularly liked accounting and considered it was part of his obligations to maintain the financial condition of the organisation in a solid fashion.

    He explained that at the 15th Conference in Strasbourg in 2016, a resolution had been passed giving the Committee a policy for the reserve funds and the purpose for which they should be used. Although this was a simple resolution, it would require a complicated answer. He listed some of the things the organisation should consider. These included the fixed four-year budget and associated subscription fees, which the Convention clearly stated could not be changed during that period. He said that new Members might always join the OIML, so additional funds might become available during a given budget period, and added that the Convention did not address this at all. It did not say that fees from other Members should be reduced as a consequence of a new Member joining, it just said the Organisation had additional funds, which would then be "surplus" during that budget period.

    However he said that, as they had already discussed, one or more Member States could just decide to leave the OIML, or just stop paying for a year or two, or they might not be able to pay for other reasons. The years 2008 and 2009 had been disastrous for most countries around the world, but there were also countries with problems right now, due to political or environmental issues which they faced every day meaning that they did not have the funds to pay this Organisation. He stressed that they needed to be able to accommodate this, whilst being sensitive to the issues. Mr Patoray said they knew that Members did not all pay at the beginning of the year, which he referred to as "slow pay", but which is in fact termed "arrears".

    He also drew Members' attention to the ongoing expenses of the OIML, which included salaries maintenance of the building and the other costs to keep the Organisation running. He stated that most of these costs were fixed and planned in advance. Items such as salaries were obviously included in this, but so were the costs of the meetings, and here he pointed out that the Bureau was already having to put down deposits for the 2020 meeting.

    To keep the websites and servers running the fibre into the building had to be maintained and the servers had to be kept running.

    He recognised that when it came to travel there could be more flexibility.

    Mr Patoray remarked that there was no penalty for Members that did not pay. He declared that if your electricity bill was not paid on time, usually there was a fee or a penalty to pay as a consequence, or maybe the electricity would be shut off, but in the case of the OIML, after three years of non-payment, a Member State or Corresponding Member would be de-listed. There was no possibility of making up non-payments from other Members. He stated that there were some organisations in which, if one of its Members did not pay in a given year, their subscription fee was re-allocated in the next year to all of the other Members to make up for the loss. If the Member failed to pay the following year, then again the fees were re-assessed to adjust for this. This made for a complicated system, but the reality was that this Organisation did not do this, based on its Convention. Mr Patoray went on to underline that there was no other source of funds. He added that they were not a division of some larger organisation as was the case for certain specialised agencies of the UN, where money could be taken from one place and put it in another if required. Lastly, the Convention stated that the OIML could not borrow money.

    Mr Patoray went on to discuss the reserves. He stated that it was up to the Conference to decide for a particular financial period. The overall credit was the subscription fees paid by Members, based on the €14000 that had been decided as the "base contributory share". There was then an annual amount to be placed in reserve to meet essential emergency expenses, which covered what he called the "slow pay". He highlighted that this quarter, if the Bureau did not receive the outstanding $ \epsilon 5 6 0 \, 0 0 0 $ , the Bureau would be faced with not being able to pay its costs, so the money would have to come from the reserves. In addition, the reserves covered the situation of the income proving insufficient, for example if a large Member State failed to pay.

    Article XXV of the Convention stated that the Director was authorised to undertake and make payments on his own authority in respect of the Organisation's operating expenditure, but he could not pay extraordinary expenses, and he said that Peter Mason and himself had had long conversations about the expenses on the building, but also he was not authorised to draw money from the reserve in case of "slow pay" without obtaining consent from the President. So the Organisation always had oversight of the reserves, based on consent from its President. If this happened during the year before the CIML Meeting, then the President had the responsibility to authorise that type of payment.

    In 2017, they had not spent 50 000 of what they had expected in the budget. This was a surplus for this budget period, and would remain available, which was why he could roll it into the current year, and spend it in the current year. However, at the end of the financial period, the Conference had to decide what to do with any surplus. The amount of the surplus might permit corresponding reductions in the fees (here he reminded Members that there had been no increase in the fees in the past eight years), or might be placed in the reserve fund. Mr Patoray said this is what had happened in 2016, when 276 000 had been placed in the reserves, but there had also been an authorisation to spend 250 000 on training.

    He went on to state that the reserve was for insufficient receipts resulting from the situation of a Member being de-listed for not paying, in which case, the Organisation could draw from the reserve funds. Mr Patoray continued that the Convention mentioned the reserves quite a bit. He said he had previously mentioned that the OIML had around €1.8 million in the bank. At the beginning of October 2018, it was not quite this much because of the "slow pay" during the past quarter, but it was reasonably close to this number. In previous discussions, Mr Patoray said he had indicated that according to his training, a reserve of 50% of the total expenses budget is standard in organisations such as the OIML. He recognised that they had heard suggestions that it could be as little as 10% , and admitted that some organisations could operate that way had if they had little risk, and the ability to acquire funds from other places. He said there were also examples where there were up to three years of expenses in reserve. He reported that there was an accounting rule that said you could not have more than three years.

    There was no single answer to this, as each organisation had to address their own issues, risks and capabilities. Mr Patoray said he appreciated the input of Mr Johnston, who had helped and guided him, and who had many years of accounting experience with the OIML to draw on.

    Looking at the budget period from 2017 to 2020, the average total yearly charges (expenses) were €2276640. As of December 2017, there were $ \epsilon $1775165 of liquid assets. This meant there was 78% of current cash verses expenses. This was a bit higher than the Organisation had had in the past. Mr Patoray showed delegates a slide indicating the quarterly payments by Member State. He explained that the horizontal blue line indicated the average quarterly expenses. He suggested this showed that in the first quarter of each year, the organisation received enough to cover the expenses, and sometimes more. In the second quarter, they did not receive as much as in the first quarter, but could use the funds received during the first quarter. However, taking last year as an example, $ \epsilon $80000 had not been paid. He added that by the end of the year, they received most of the money, but the problem was when was it received, and where would the Organisation get the funds from if the payments were not received, or if a Member State decided not to pay.

    The next slide showed the payments by quarter. The green horizontal line at the top of this graph indicated the total expenses for the year. If all the Members paid in January, then $ \epsilon $ 2.2 million would be received in the first quarter, and he suggested that if this happened in reality, they would not be having this conversation.

    The next slide showed the quarterly payments by Member State, which Mr Patoray referred to as the "worst case of the worst case". He indicated that the current quarterly payments of €238000 had been the worst for receiving funds in his experience, and pointed out that the worst case expense during any quarter had been €680460. He admitted that this had probably been at the time when they had been carrying out the Bureau renovations, but that was also the "worst case of the worst case" as far as expenses were concerned. He wanted to point out that if those two "worst case" scenarios ever coincided, they would need at least €442460 in the bank to cover that quarter. The next slide indicated what had happened in 2017. In June of 2017, there had been $ \epsilon $1828172 in the bank, but by September of that year, there was only $ \epsilon $1496517. There had been a total change in cash of $ \epsilon $331655 during that quarter. Mr Patoray submitted that this would give delegates some ideas about the magnitude of the numbers. It was not as much as 50 %, which would be close to a million euros, and they did not have that much fluctuation, but it was greater than 10 %. He thought that this could provide the basis for a discussion about how much there should be in reserve to meet essential emergency expenditure and to ensure the execution of the budget in the event of the income proving insufficient. He said there was not a right answer to this problem, and that each Member would have different opinions, based on their own government's policies within their own countries, but there must be enough reserves for the Organisation to deal with insufficient funds and emergencies.

    Mr Patoray said it was his belief that they could put the Organisation's funds to better work. He said that the previous year they had made the decision to put the budget surplus into the reserve, but then the reserve funds had been made available for training purposes. He considered that this should be a guide for Members for the future. This had been a way of investing the Organisation's excess funds in the future, and he suggested this answered the question Mr Dixit had asked.

    He commented that they could continue the convener training, which in his opinion had proven beneficial with regard to blood pressure meters. Many Members had been waiting for the revision of the Recommendation on blood pressure meters for some time. He added that CDs had just been posted that week. The convener training they had held two months prior to the current meeting had helped provide assistance for technical work in the area of project management, which Mr Patoray said delegates had heard Dr Schwartz mention during his presentation. He also questioned whether more support could be provided to CEEMS. He also suggested various online training modules and e-learning opportunities may also be created, but added that this would take a lot of money and follow up. He said these were very exciting times for the OIML, and observed that he was sad he would not be a part of it. He considered that investing in the future with the available funds would be one of the best things the Organisation could do, but qualified his statement by reminding delegates that they could not reduce the reserves to zero, as they needed the ability to meet the problem of insufficient funds coming in throughout the year.

    Dr Schwartz thanked Mr Patoray for his introduction. He recognised that they now understood much better what the Convention said and the framework within which they could take a decision. He said Mr Patoray's presentation had been very helpful, adding that it was actually quite a comfortable situation that the Organisation found itself in, in as much as they would be able to explore the various options for spending the money. Often he said, it was the opposite way round, where they might have to consider the problems of not having enough money. He added that they should be considering how best to invest this surplus in the future of the Organisation. He said his recommendation would not be to think about an appropriate percentage level, be it 40% , 50% or 60% , but suggested rather that they first thought about how to best invest the 78% they had at the moment. He acknowledged that Mr Patoray had made some proposals at the end of his presentation, with which they could start the discussion.

    Dr Schwartz wondered whether delegates had any short questions they wished to ask. He reminded them that during his presentation, he had mentioned the Task Group 2023, which may be put together at the Presidential Council meeting in March 2019, and the options available to the Organisation would be a subject which this Group could certainly consider in detail.

    Dr Ehrlich wanted to express his appreciation for this presentation, and the effort put into it by Mr Patoray and Dr Schwartz. Dr Schwartz asked the said they looked forward to the continued discussion.

    Dr Schwartz noted that there were no further questions.

- number: 8.5.2
  title: Discussion on contributory classes for Corresponding Members
  narrative: |2+

    Mr Patoray said that item 8.5.2 was also a subject in the initial stages of discussion. It had been based on a comment made by Dr Schwartz in his presentation about establishing four distinct classes for Corresponding Members. He started his presentation by stating that some Members may not recall what the OIML meant in referring to a "class". He explained that Article XXVI of the Convention stated that there were four classes of Member State contributions, based on population. Member States then paid subscription fees of 1,2,4, and 8 times the base contributory share according to their class. The Organisation also could lower a Member State by up to three classes if they were suffering poor economic conditions. The only mention of Corresponding Members in the Convention was in Article V.

    Mr Patoray then showed delegates a slide indicating what the Convention recognised as a Corresponding Member, and how they could, or could not, participate during a Conference. The 13th Conference in 2008 had set the annual Corresponding Member fee at 10% of the base contributory share for Member States. This had been introduced in steps, and had finally been achieved in 2012. Mr Patoray stated that at present, there was only one class for all Corresponding Members, and added that for the current budget period of 2017-2020, all Corresponding Members would therefore pay the same amount of $ \epsilon1400. $

    Mr Patoray then showed delegates a slide which indicated what Corresponding Members could do. He specified that they could access all parts of the website, could download all publications freely, and could receive all relevant circulars and announcements. They could also participate in the Conference and CIML meetings as observers, and could also participate in OIML TCs/SCs/PGs as O-members, and thus make comments. They could also participate in the OIML-CS as Associates, and lastly, they could also participate in the OIML-CS Management Committee as observers, and make comments.

    He then showed delegates a slide indicating what Corresponding Members could not do, which put simply meant they could not vote, they could not hold an office within the OIML, could not issue OIML Certificates, and could not host a CIML meeting.

    The current question which was being raised was whether the OIML should have different classes for Corresponding Members. He repeated that the classes for Member States were based on population. Mr Patoray showed delegates a slide indicating the population and GNI/capita figures from the World Bank. In more detail, he stated that there were 65 Corresponding Members, and from this chart, delegates should note that 53 of them would still be in class 1, and thus be at the lowest contribution rate. This would leave nine Corresponding Members in class 2 having to pay twice the base fee, two Corresponding Members in class 3 having to pay four times the base fee, and only one Corresponding Member would pay eight times the base fee.

    Dr Schwartz thanked Mr Patoray for his introduction. He added that in the past they had had good reasons for treating all Corresponding Members the same and charging them all the fee of 10% of the Member State base contributory share, but he thought that now was the time to look at the question of whether this was still appropriate, or whether it was now more appropriate to introduce four distinct classes for Corresponding Members as they had for Member States. He added that if they did decide to introduce four classes, they would then have to discuss the fees as a separate issue. He asked if there were any questions or comments.

    Mr Mateus (Brazil) said that when he had studied the documents before the meeting, he had noted that there was a small list of countries on which he realised there were some numbers in red. He asked what these red numbers meant.

    Mr Patoray replied that this was how he kept track of what he was trying to accomplish in his analysis. He said it was internal analysis rather than anything significant. He said he had used different colours for countries that were in different classes; in this way, he could go back and find the information he was looking for.

    Dr Schwartz enquired whether Mr Mateus was referring to the World Bank gross or net income figures.

    Mr Mateus questioned whether there were any conclusions or remarks regarding the numbers.

    Mr Patoray repeated his earlier conclusions that there were 53 Corresponding Members that would end up in class 1, nine that would be in class 2, two that would be in class 4, and one that would be in class 8. He said the colours were all that he used to trigger his own thinking when he was going through the analysis.

    Dr Schwartz said that looking at these figures, a large majority (53 out of 65) of Corresponding Members would end up with a coefficient of 1, and only twelve would be treated differently. This was the final result of the first analysis that had been carried out by the Director. The question was then whether it was worth looking at those 12 Corresponding Members at the moment. Would it be worth differentiating between them, and applying different coefficients to the different Corresponding Members for so little to change. Dr Schwartz said he did not see any further questions from delegates, so he suggested this was discussed during the coffee break, and concluded the session by thanking Mr Patoray again for his comprehensive reports and for the excellent overview he had given together with the details.

    Mr Dunmill said they had left the possibility for a resolution to be taken on this item, but it had been decided that no resolution was necessary at this stage. The draft would not be completed now and there would not be a resolution on this item.

    On the possibilities for consideration in the future, they had also left the possibility of a resolution but again there would not be a resolution on this item.

