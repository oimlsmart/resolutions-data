- number: '9.3'
  title: Updates by organisations in liaison
  narrative: |2+

    Dr Schwartz said they there were three high level representatives from IEC, ILAC and IAF who he would like to make their presentations before lunch under this item. Firstly he invited Mr Frans Vreeswijk, the General Secretary and CEO of IEC to make his presentation on the highlights of the IEC's current work.

    ## IEC

    Mr Vreeswijk greeted the President and delegates. He said it was a great pleasure and honour to be at the CIML meeting and to explain the work of the IEC to them, and he looked forward to future collaboration between the two organisations, because that was really what they were aiming for.

    As he was sure all delegates would know, "IEC" stood for International Electrotechnical Commission, but what not all of them may know so well was that the IEC had two main activities. Since 1906, when they were founded, they had been developing International Standards, but since 1974, the IEC had been operating global certification services, starting with electronic components. The IEC was an international organisation, with a central office as well as regional offices, which were now spread across six continents.

    The IEC's work covered billions of electrical and electronic components, devices and systems that were used in homes, offices, industry, health facilities, public spaces, power networks, cities, transportation, information technology, agriculture, manufacturing, and many in more situations. The IEC always looked at safety, interoperability, electromagnetic interference, responsible use of hazardous substances, waste management, and the environment.

    At present, economic growth directly depended on the ability of industry to successfully sell within a country, and increasingly beyond a country. Manufacturers and suppliers must not only satisfy consumer needs and regulatory requirements, but also the requirements of other manufacturers and suppliers in business-to-business transactions. To create confidence and acceptance, all of this entailed testing and verification, which the IEC systems enabled. Without standards and verification, it would be impossible to ensure quality, safety, and overall risk management.

    The IEC's sister international organisation was ISO, and both developed international standards using similar procedures. Whilst the IEC mainly developed international standards in the electrotechnical domain, and ISO mainly developed international standards for quality management systems, they also sometimes worked together, such as for the ISO/IEC17000 series of international standards on conformity assessment. The IEC did more than this though. Unlike ISO, the IEC had two pillars. It developed international standards, and it operated global conformity assessment services. The IEC recognised the value of standards, but it also recognised that in most cases, using standards equated to doing conformity assessment. When a manufacturer, an end user, or an independent third party used a standard to check a product or service, they were performing conformity assessment. In this way, standards and conformity assessment were like two sides of a coin, neither having value without the other. Only together did standards and conformity assessment create the greatest the value.

    The IEC helped industry to get access to foreign markets. It did this by operating international certification schemes, and products were tested and services were assessed by commercial conformity assessment bodies anywhere in the world, and the results were recognised anywhere in the world. An IEC conformity assessment (CA) system certificate was like a passport to the world. Mr Vreeswijk explained that the IEC had four global conformity assessment systems, which were IECEE, IECEx, IECQ, and IECRE.

    The most recent one was the IECRE system, where "RE" stood for "renewable energy". This covered the wind, marine and solar PV markets. The market driver for the existence of this CA system, was the trillions of dollars that were being invested in renewable energy. The investors and insurers wanted to manage their financial risk by ensuring that the world's best practices were being used. They considered that the IEC CA systems' operation model was the world's best practice at this time.

    The oldest of the IEC's four systems was the IECEE, for electrotechnical goods. The main scheme was the CB scheme, and the main market driver was facilitating access to the market for manufacturers and suppliers. Its main activity was type testing, and issuing certificates based on test reports.

    IECQ, where "Q" stood for "quality" was a global conformity assessment service for supply chain qualification in the electronics sector. IECQ helped industry, including for example the LED lighting industry, the automotive industry and the avionics industry, to efficiently manage their electronic

    component supply chains. Mr Vreeswijk said that delegates all travelled around the world in aircraft that were made safer because of IECQ.

    Lastly, but certainly not least, was IECEx. This was the system for equipment used in explosive environments. It ran four schemes, which Mr Vreeswijk indicated on a slide. These four certification schemes included not only testing, but also facility inspection, quality management, process assessment, personal confidence certification, and more. Mr Vreeswijk said that in 2011, the United Nations Economic Committee for Europe (UNECE), had published its Common Regulatory Objectives. This had been a model for the Ex sector, and had endorsed IECEx as the world's best practice. This clear message from the UNECE had placed a formal recommendation on Member States that were considering new or revised regulations in the field of equipment or services for explosive atmospheres to use the IEC as well as ISO international standards, supported by IECEx certification. This had resulted in some regulators amending their regulations, including the United States Coast Guard, who require foreign-flagged vessels entering US waters to have IECEx certified equipment, as an alternative to their US national approvals; the UAE, who had made amendments to their domestic regulations to accept IECEx; and Australia which had made an amendment to formally accept the IECEx in areas including underground coal mining and the petrochemical industry.

    These were all examples where the UNECE Common Regulatory Objective publication had been put into practice. Mr Vreeswijk said it was the operational model of the IEC global CA systems which was considered to be the world's best practice. This created a framework, into which professional certification bodies, testing labs, inspection bodies, auditing bodies and so on, from around the world, would be able to work together in a team structure.

    The IEC itself did not do the testing, nor the certification, professional bodies did that. This was very similar to the way in which standards were developed by ISO. Neither organisation itself wrote the standards, which were developed by volunteer technical experts. The subject matter experts, who participated in the writing of the standards, also carried out the testing. The fundamental value of the IEC global CA systems they created was consistent and comparable to conformity assessment resources anywhere in the world. This was achieved through two activities. Firstly, all participants came together to determine a common understanding and interpretation of the standards, which they then documented, as well as common rules and methodologies for testing and assessment. Secondly, they conducted peer assessments, to ensure that the common interpretation was correctly understood, and more importantly that the common rules and methodologies were being applied. Thirdly, full transparency of operation procedures was there. In some areas, such as IECEx, certificates were available online, which helped in identifying counterfeit certificates. These all led to the achievement of a consistent, comparable CA result worldwide.

    Mr Vreeswijk stated that the OIML and the IEC were similar. They both replied to societal needs. Legal metrology was an essential activity which helped to ensure fair trade, and which facilitated commerce. The IEC's CA activities were also essential in the facilitation of world trade. Both organisations had extensive experience in establishing, operating and creating value, using global conformity assessment schemes. The two organisations were also very complementary. For this reason, the updated MoU, which was going to be signed at the current meeting, sought to open opportunities for possible collaboration between the two organisations in the area of conformity assessment activities, where synergies could be achieved. As a tangible step towards this goal, Dr Schwartz and Mr Dixon had both attended the IECEx management meetings held in Cannes in September, at which the IECEx had agreed to propose to the OIML the establishment of a joint ad hoc working group, to pursue joint discussions on practical conformity assessment methods in the field of Ex, noting that there were measuring instruments that fell under the scope of both the IECEx scheme and the OIML-CS scheme, for instance petrol dispensers, flow meters, etc.

    Mr Vreeswijk said that the IEC was very encouraged by the fact that the international Ex community had agreed to propose this initiative to the OIML, and he hoped the CIML would also support this. They anticipated the achievement of a win-win cooperation, which would create value for their respective stakeholders, and he said they foresaw a long and productive collaboration together. He thanked delegates for their attention.

    Dr Schwartz thanked Mr Vreeswijk for his comprehensive and interesting report on the IEC's outlook on improved and closer cooperation. He asked if here were any questions or comments.

    Dr Klenovsky asked whether closer cooperation on measuring instruments, such as DC electricity meters, and charges for electromobility, could be assumed between the OIML and the IEC.

    Mr Vreeswijk replied that this could definitely be the case. He suggested that they started small, looking at the first pilot project, to ensure that collaboration is possible, but he was sure there were many more areas where it would fit, and certainly they could work others out, and develop them, assuming that things went well in the future.

    Dr Schwartz suggested that the probable order of events would be the signing of the MoU and the agreement on a joint working group, and then they would identify possible subjects which were suitable for a pilot project, and he considered that the DC electricity meters were certainly a good example to start this collaboration as a pilot project.

    Since this concluded Mr Vreeswijk's report, Dr Schwartz thanked him again, stating that he was looking forward to the signing ceremony. He added that delegates had received more detailed information about the cooperation with the IEC, not only in the report that had been provided by Mr Dunmill in Additional Meeting Document 15, but also in Additional Meeting Document 16, which had been prepared by Mr Dixon. This report also contained a draft resolution, which Dr Schwartz said he wanted to show to delegates now. This touched on the proposal to establish a joint working group. He wanted to read this resolution in order that it could be approved later:

    "The Committee,

    Noting the proposal from the IECEx management committee,

    Decides to establish a joint working group with the IECEx, to explore synergies and opportunities for cooperation,

    Requests one or two representatives of the OIML to serve on the joint working group,

    Requests the OIML representative to report to the CIML on the activities,”，and so forth...

    A proposal had been discussed when he and Mr Dixon had attended the IECEx Management Committee meeting in Cannes two weeks prior to the current CIML meeting which had suggested that the two representatives could be Mr Dixon, in his function as OIML-CS Executive Secretary, and for the time being, in order to start the discussions, himself as the convener. He also wanted to mention that the revised MoU had been circulated to delegates as Additional Meeting Document 2. He stated that this was the document that would be signed later, before lunch. He concluded that this was all the information he wished to convey regarding the cooperation with the IEC. He verified that there were no more comments.

    Dr Schwartz suggested delegates now listened to the update from ILAC. The ILAC chairperson, Ms Merih Malmqvist Nilsson, was going to make this presentation.

    ## ILAC

    Ms. Malmqvist Nilsson introduced herself. She said she was attending this meeting in her role as the ILAC chair, but added that she had a parallel life, in which she worked for the Swedish accreditation body, which was also the regulating authority for legal metrology. She stated that her first encounter with legal metrology had been in 1985, when she had been a young engineer, aged 32, and she had been supposed to speak to a group of businessmen from all over Asia, about new SI units. It had been at a time when the British had said they were "becoming metric inch by inch", which meant that it had been a long time ago!

    What she had not realised was that there was a concept called "legal metrology", because one of the gentlemen had asked how much of this was regulated, and she said she had replied "Regulated? We don't regulate how the industry works, they calibrate to their needs." The response to this had been negative, and thus she had realised there was the concept of legal metrology, where things were

    regulated, and she remarked that this was something which should be brought into the training of engineers in universities, so they learned about the BIPM, the OIML, metrology, traceability, and legal metrology.

    Unfortunately, she considered there was still a long way to go in this direction. In 1993, SWEDAC had become the regulating authority in this field. Ms. Malmqvist Nilsson continued that ILAC was an organisation which organises all the accreditation bodies in the fields of laboratory tests, calibrations, inspection bodies, but also proficiency testing, as well as reference material producers. She said ILAC's product was a Mutual Recognition Arrangement (MRA), and their vision was that accreditation in one country would have acceptance all over the world. She added that ILAC's members proudly stated said that they accept each other's accreditations, reports, and certificates issued by accredited bodies, if they were signatories of the same multilateral agreement.

    However, at the end of the day it was the market that did the acceptance. Whether they accepted each other was irrelevant for the market, so what they had to do was to make sure that they did their best by preparing for the mutual recognition of certificates and reports in the market by users, and this was the end goal, the vision they were working towards.

    She showed delegates a map of the coverage of the ILAC MRA, and commented that the dark blue parts indicated places where there were accreditation bodies which were signatories of the MRA. This meant they would have gone through a peer evaluation process by their regional bodies, and then the regional body itself had gone through a peer evaluation, an evaluation process through ILAC, and IAF. Ms. Malmqvist Nilsson said that before she had come to this meeting, she had compared this map from 2018 with the one from 2014, and there were some new countries that had changed their status and become signatories to the MRA, which had made ILAC very happy. This coverage now meant that they had 99 ILAC MRA signatories, representing 102 economies. At the present time there were almost 68000 accredited laboratories, and 9500 inspection bodies covering testing, calibration, and inspection, and the signatories represent 95% of global GDP. All in all, they were a network of members including 155 accreditation bodies from 126 economies, and of these, 99 were full members, which meant they were MRA signatories, 14 were associates, 12 were affiliates, 24 were stakeholders, and there were 6 regional cooperations.

    Ms. Malmqvist Nilsson said that she knew delegates had received a more detailed report about the latest developments so she was not going to repeat this, but for the purposes of this presentation, she would keep to a more abstract level. She indicated to delegates the logos of ILAC's regional organisations, those that were recognised by both ILAC and IAF, as well as those that were recognised only by ILAC, or only by IAF. This was historical since some of them worked only within the remit of certification and accreditation, and others worked in all areas of conformity assessment, so this was why there was some overlap between the two global organisations that harmonise accreditation activities. The hard work of peer evaluation was carried out by the regional organisations, and she indicated these to delegates on a slide, but she said ILAC evaluated the regions for the purposes of global recognition.

    Ms. Malmqvist Nilsson said that ILAC, like many organisations, had a world accreditation day, which was held on 9 June every year. She pointed out that there was a mistake on her slide, which should have referred to World Accreditation Day 2017 on the theme of Delivering confidence in construction. In 2018 the theme was Delivering a safer world. Ms. Malmqvist Nilsson said they tried to encourage all members to celebrate this day, as it gave an opportunity for the economy to become acquainted with the concept of accreditation as a way of achieving acceptable results in testing, calibration, and inspection. The global accreditation system was being used by many organisations, and Ms. Malmqvist Nilsson added that ILAC, IAF, ISO, IEC, INetQI and IIOC had decided to cooperate in making accreditation visible to those who were not acquainted with how it could be used. Examples of usage, both on the regulatory side, and on the business side, could be found on the two links that were indicated on her slide, and which delegates could look up later.

    Ms. Malmqvist Nilsson said that ILAC also had a number of MoU partners, and some of them were very high profile organisations, such as the OIML itself, and the World Anti-Doping Agency, the clinical chemists, as well as IEC, ISO and so on.

    At this stage, Ms. Malmqvist Nilsson said she wanted to return to the subject of cooperation with the OIML. She stated that the two organisations had had an MoU for a number of years, and added that they were going to sign a revised version of it later during the current meeting. She said that the goal of the MoU was firstly "to mutually acknowledge our roles in the global quality infrastructure". The second goal of the MoU was to make sure that they "encourage and promote the use of competent conformity assessment bodies in legal metrology services". Finally, they also wanted to "emphasise the importance of the OIML Certification System and of the ILAC Mutual Recognition Arrangement". In this way they could serve the businesses of today around the world.

    Ms. Malmqvist Nilsson said that ILAC also had a joint working program with the OIML, the main goal of which was to make sure that they decreased or eliminated unnecessary burdens on economic actors. To this end, they had a joint assessment procedure in the field of legal metrology, and here she highlighted the recent developments. She said this had been revised in January 2018 to take account of the new OIML Certification System. The revised procedure had been published in February, and ILAC would now be asking their MRA signatories for nominations for team leaders and technical experts that wished to participate in the OIML peer assessment procedure.

    ILAC representatives had also attended the first meeting of the OIML-CS Management Committee which had taken place in March 2018, and there was a scheduled review in progress of OIML D 10 / ILAC G24.

    Finally, Ms. Malmqvist Nilsson discussed the joint declarations with the BIPM and the OIML. These promoted the use of the three existing multi-lateral or mutual recognition arrangements, as well as the declaration on metrological traceability. She specified that the latter was built on the 2006 tripartite statement, and presented the principles that should be used when demonstrating metrological traceability for international acceptance. This document had been revised during 2018 and would be published in the near future. Ms. Malmqvist Nilsson said that she had known some of the people at this meeting for a long time, for example she had met Dr Schwartz over 20 years ago when he had been chairing a WELMEC working group. She commented that at the time she had not known much about legal metrology, but had done a lot of learning since then! What she had realised, having listened to the discussions which had taken place during the day, was that global organisations had the same problems, such as what to do about unpaid dues, and complaints about the organisation spending too much, or too little. In summary, she said organisations appeared to be "damned if you do and damned if you don't", and noted that the OIML and ILAC were struggling with similar problems. She also added that the complaints about the costs of administration, and of secretariats, were also common to international organisations, but reminded delegates that the secretariats of global organisations were their institutional memories. She remarked that Presidents and chairs came and went, and joked that even Directors came and went, but the secretariats remain, and without them there would not be an institutional memory, and they would not receive the service they were used to getting on an everyday basis. This was the continuity that the organisation had.

    She thanked delegates for their attention and for the invitation to make a presentation. She added that it had been a pleasure to be present and reiterated her thanks, specifically to her friends, colleagues and the management of the CIML, BIML and OIML.

    Dr Schwartz thanked Ms. Malmqvist Nilsson for her report, which he noted had been submitted before the meeting so they had been able to supply it to delegates as Additional Meeting Document 9. He asked if delegates had any questions.

    Mr Khedir thanked Ms. Malmqvist Nilsson for her presentation, which he had found very interesting. He said he had two points that he wanted her to clarify if possible. The first concerned the ISO/IEC 17025 standard and its impact on OIML Recommendations as well as the work and output of organisations involved in legal metrology. He asked if there was a common program between the OIML and ILAC. He pointed out that if there were similar common points, could this be connected with his proposition that Tunisia could hold a seminar on this subject. The second point concerned scientific metrology and the BIPM and was a question which had been raised in AFRIMETS. He said that if a laboratory, for example in Tunisia, wanted to submit CMCs to the BIPM for inclusion in their KCDB, it must be audited by auditors designated by an NMI and not by auditors designated by the accreditation

    body. In Tunisia, their laboratory was accredited by TUNAC, the national accreditation council. This laboratory had been audited by an auditor from a laboratory which was not an NMI. AFRIMETS had therefore recommended to carry out a peer review. He said he did not understand this approach - on one hand they were recognised, and on the other hand they had been obliged to repeat the audit using an auditor from an NMI.

    Ms. Malmqvist Nilsson thanked Mr Khedir for his question and verified that it would be acceptable to him if she answered in English. With regard to his first point, Ms. Malmqvist Nilsson said that as soon as there was a new version of a standard, they planned to re-issue any declaration they had which referred to the old version of the standard. This was ongoing with ISO, and she was sure it would be ongoing with the OIML and the BIPM and all those involved in the traceability arena. In particular with ISO because they had a declaration relating to ISO 9001, and the extent to which ISO/IEC 17025 adhered to the principles of ISO 9001 would be reviewed. However, she stressed that this type of work took time, so there was no new version available at the moment. With regard to Mr Khedir's point regarding training, she said that usually ILAC did not arrange training programmes for its members at that level. The training programmes were usually arranged by the regional organisations, and local accreditation bodies, so if there was a need for a training on ISO/IEC 17025:2017, this would be undertaken by the local accreditation body or by the regional bodies, but not necessarily by ILAC. Having said that, Ms. Malmqvist Nilsson said she wanted to add that they had a joint committee between ILAC and IAF for developing countries, and during its meetings this committee sometimes organised short reviews of the differences between the old and new versions of standards. She added that she did not think there was anything stopping ILAC, together with the OIML, having a training programme if that was requested by members in general.

    With regard to Mr Khedir's final point regarding the BIPM, Ms. Malmqvist Nilsson stated that these were two parallel systems, and national metrology institutes were not globally recognised unless their CMC's had been through the evaluation process of the BIPM. Otherwise, they could still be an actor in the market, competing with all other accredited calibration laboratories, and apply for accreditation. Their traceability might not be to the BIPM, but it had to be acknowledged globally, so they had to find some way of obtaining that, and being an accredited calibration laboratory did not mean that they were recognised as a national metrology institute by the BIPM.

    Dr Schwartz considered that these answers had been very comprehensive, and since they were running out of time, he just wanted to make a comment on Mr Khedir's first question which had been about the impact of the change, and the revision of ISO/IEC 17025 on OIML Recommendations, which of course was very important for the OIML-CS. He pointed out that D 30 is currently being revised to align with ISO/IEC 17025:2017. He again thanked Ms. Malmqvist Nilsson, adding that it had been a pleasure to have her at the meeting and saying that he was looking forward to the signature of the MoU.

    ## IAF

    Dr Schwartz invited the chairperson of the IAF, Xiao Jianhua, to give his report.

    Mr Xiao Jianhua noticed that his was the final report before the signing ceremony and lunch. He said he was pleased to have been invited to attend this CIML meeting, adding that it was not the first time he had attended an OIML meeting. He said that the previous year he had attended the OIML-CS seminar in Shanghai, which had been helpful to his understanding of the new OIML-CS. Actually this was the main area in which the IAF supported the activities of the OIML. He continued that IAF and ILAC were sister organisations for accreditation, with different scopes. He said there were a lot of similarities between IAF and ILAC and said that Ms. Malmqvist Nilsson had already described a lot of the joint activities between them, so he would not repeat this, which demonstrated the co-operation between the two organisations.

    The IAF was concerned mainly with accreditation in the field of certification, validation and verification. The main objective of the IAF was to operate a worldwide mutual recognition arrangement among accreditation bodies, for the global acceptance of certification, validation and verification so as to facilitate trade, support regulators, protect consumers and the environment, and also to facilitate

    sustainable development. Also, as Ms. Malmqvist Nilsson had already said, accreditation bodies of the IAF family were deemed competent through a peer evaluation process based on relevant ISO/IEC conformity assessment standards and also on IAF/ILAC requirements. The signatories of the IAF family must also recognise certificates and test results issued by conformity assessment bodies accredited by other IAF family signatories as equally reliable. In the same way as ILAC, the IAF family was structured as a global network to build on existing and developing regional mutual recognition arrangements.

    Currently there were six regional groups, which he said Ms. Malmqvist Nilsson had also mentioned, as there was a lot of overlap in membership. The IAF family recognised five of these six regional accreditation groups, based on peer evaluations. Currently IAF had 107 members, of which 68 were MRA signatories, which had accredited more than 7400 certifications of verification bodies. Regarding the coverage of the IAF family Mr Xiao said that it currently it covered the four main scopes with nine subscopes. They had two levels. For the main scopes there was one for management system certification, product certification, certification of persons, and also greenhouse gas validation and verification. At the next level the subscopes were for specific certification or verification schemes. Currently the subscopes covered management systems certification based on ISO standards for quality, the environment, food safety, information security, energy, and the quality of medical devices, as well as for those private international schemes for feed safety, agricultural products, and also management system auditors. There would be more subscopes, specific certification schemes, added in the near future.

    Currently IAF was in the process of establishing IAF CertSearch, which was a global database for accreditation management system certification. It would provide a single source for all accreditation certifications issued by certain bodies accredited by IAF accreditation body members. It was expected that this database would be operational around the end of 2018.

    In co-operation with ILAC,ISO,IEC and also relevant international certification body associations,the IAF had established two specialised websites to showcase the value of relevant standards, accreditation, and conformity assessment. He added that Ms. Malmqvist Nilsson had also already mentioned these two websites,but wanted to emphasise this was one of the examples of collaboration between the relevant global actors in quality infrastructure,to jointly promote the development of the interrelated components of quality infrastructure which served the needs of globalisation and sustainable development. He added that cooperation with other relevant international organisations was very important, and said he had always attached great importance to this cooperation and they were very pleased to maintain a long-term partnership with the OIML in the field of legal metrology.

    IAF alone, or jointly with ILAC, had actively engaged with other international organisations including in the fields of standardisation, trade, economic cooperation, and in industrial development, as well as those organisations operating international certification or verification schemes. He remarked that these included the electrical and electronics industry, information and telecommunications industry, automotive industry, aerospace industry, food and agriculture and feed industry and also forest industry so a lot of international organisations having their own international certification schemes. The IAF family had contributed to the worldwide operation of these conformity assessment schemes. Regarding cooperation with the OIML, Mr Xiao Jianhua commented that this was very important for the IAF. He said they would shortly be signing the updated MoU, and he reflected that the first MoU between IAF/ILAC and the OIML had been signed in 2010, then updated again in 2014, in Vancouver. He added that the IAF and ILAC had a similar MoU with IEC, which also supported the IEC conformity assessment systems, so he commented that this demonstrated they were all inter-related actors in the global quality infrastructure that cooperated with each other to collectively maximise the value of quality infrastructure as a whole.

    In order to support the new OIML-CS, the OIML and IAF were working together to develop a joint IAF/OIML assessment procedure in the sphere of legal metrology. In this regard Mr Dixon had made a great effort, and he added that Mr Dixon had attended several meetings of relevant IAF working groups as well as a committee, so as to push forward the development of this joint procedure.

    Last, but not least, he wanted to thank Dr Schwartz again for the support and cooperation between the OIML and the IAF. He said that the IAF/ILAC joint assembly would be held on 29 October the

    following year in Frankfurt, Germany, and he invited Dr Schwartz to attend this. He thanked delegates for their attention.

    Dr Schwartz thanked Mr Xiao Jianhua for his report and asked if there were any comments or questions, but there were none.

    ## BIPM

    Dr Schwartz welcomed the Director of the International Liaison Communication Department at the BIPM, Mr Henson.

    Mr Henson thanked Dr Schwartz, and thanked the CIML for the opportunity to speak to them. He added that of course, the liaison with the OIML, their sister organisation for metrology, was one the most important liaisons that the BIPM had, and it was always a pleasure to come and see so many faces that he knew well, as well as new ones. He thought they were familiar enough with the BIPM that he did not really need to describe their mission in any detail. He highlighted that he had found the CIML discussions very interesting, because the OIML was currently having a debate on the role of capacity building, and the BIPM had also gone through this process. The way the BIPM considered this was that their mission was underpinned by their capacity building activities. This meant that these activities were not an objective in their own right, but rather underpinned the other elements of their mission. For the BIPM, Mr Henson reported that membership was going well, and they now had 60 Member States as well as 42 Associates. Even looking at the current year alone, Ethiopia, Kuwait, Uzbekistan and Tanzania had joined them as an Associates; Montenegro and Ukraine, previously Associate States, had acceded and become Member States. He reported that it was very pleasing to see Associates becoming Member States. However, he commented that it had not all been successful, as they had had to exclude one state at the beginning of the year for persistent non-payment of its subscriptions as an Associate, and he said it was quite likely that they would lose a Member State in November, at the General Conference, for the same reason.

    Mr Henson considered that delegates were all aware of the CIPM MRA, and added it was probably one of their most important outreach initiatives, which was linked very strongly with ILAC, who then enabled metrological traceability to be ensured down to the "workface". He added that delegates would be aware that the CIPM had been reviewing the operation of the MRA, and that this review was now broadly complete, adding that they had implemented many of the changes. Some elements were still being implemented, such as the new database which should come online in late 2019. He stated that overall things were very well advanced, and they were pleased with the results, especially since it had led to a reduction in the workload. He said there had been a lot of redundancy in the reviews, which they were trying to remove, as well as planning more strategically what they did in terms of the comparisons.

    The big focus for the BIPM, and he commented that it felt like "day and night focus" right now, was the 26th General Conference on Weights and Measures, which would take place in the middle of November. It would be in the same location as it had been the previous time, in the Palais des Congrès in Versailles. He said they had five draft resolutions, which had been circulated to the Member States back in February, but the one that was catching all the headlines was of course the revision of the SI, the International System of Units, including redefinition of four of the base units, which was now being proposed after many years of scientific work. He considered that there was now scientific agreement on this revision, and it now only required the diplomatic decision at the CGPM in order to actually adopt the changes. At the General Conference, their key partners would be speaking, notably the OIML, represented by Dr Schwartz, ILAC represented by Ms. Merih Malmquist Nilsson, and ISO represented by Mr Sergio Mujica their Secretary General, amongst other notable speakers. He also noted that, whilst the General Conference was a closed diplomatic event, the Friday morning, when the decision on the revision of the SI would be made, would be open and delegates could apply for a ticket to be there, although availability would depend on how many people wanted to attend. He also pointed out that they would be streaming the event live on YouTube, so metrologists (or anyone else who was interested) anywhere in the world would be able to watch the couple of hours of keynote speeches, including Nobel prize winners, as well as the actual decision process. He joked that he was not sure it was going to be

    that riveting for the outside world, but added that there had been a lot of interest from the press, including television stations. He said he did not intend to spend a lot of time on the revision of the SI because he and others had covered the salient points many times, and many OIML people were intimately involved, but it was easily the biggest and most significant change since the inception of the SI back in 1960, and it was very pleasing that the very hard work had reached a conclusion. Mr Henson said there was information explaining the proposed changes on the BIPM website, and for most people it was hard to explain that on the one hand nothing much changes, and on the other everything changes. He said he tended to describe it as being a bit like a relay race. When you hand the baton over, the runners have to be at the same velocity at that moment, but the new baton holder has fresh new legs to run off into the future. Mr Henson noted that although the decision would be taken in November 2018, the adoption would only come into force on 20 May 2019, primarily because of small changes in the values of the electrical units. This really only had an impact at the SI level, and for one or two top level manufacturers, so it did not have a wide impact. Mr Henson said he was often asked why it was necessary to define the SI units at all, and why they had been revised now. He said he wanted to show delegates two diagrams, which he thought indicated something quite interesting. The first diagram showed the actual mass CMCs declared by two of the leading NMIs. Delegates would see that the lowest uncertainty was, not surprisingly, where they defined the unit of one kilogram. So when NMIs claimed how good they were at mass, what they really meant was that they were good at mass at one kilogram.

    Mr Henson continued that when measurements were needed at values other than one kilogram, as people in this community would well understand, multiples and submultiples were needed, and these would add to the uncertainty each time, so very quickly the uncertainty increased. On the upper end of the scale, this was not really a problem because they had the precision they needed, but there was enormous interest now in reducing these uncertainties at the micro-, and even at the sub micro-level. The new definitions allow for the possibility to develop technology to do this, since values other than a kilogram could be defined. They could start to look at using Watt balances, or even some other technology, at microgram level or at whatever level the technology could work at. This was opening up possibilities for significant improvements in uncertainty in the future.

    Mr Henson said that the second diagram was the logarithmic improvement, over about 100 years or so, in the traditional temperature scale, and this had improved by a factor of about ten. He pointed out that the bluish dots, which were not joined up, showed the reduction in the uncertainty of the Boltzmann constant. This showed a massive improvement, to the point where they were now able to do much better with the Boltzmann constant than they were with traditional temperature scales. In summary this indicated that they now had better ways of doing things than the traditional ways. So these were two good explanations of why they wanted to revise the SI at all, and why now was a good time to make the change.

    Mr Henson said he also particularly wanted to mention World Metrology Day, which was a joint project with the OIML, and the staff of the BIML worked very closely with him on this, notably Mr Pulham. This annual event had increased in importance over the years, and was particularly of interest to those countries in the early stages of establishing their metrology systems because they could use World Metrology Day as an event to raise awareness. Mr Henson noted that he had visited the laboratories of some of those present on, or around World Metrology Day, and had attended events with ministers, press, TV interviews and so on. He said he would encourage those delegates that had not so far organised anything for WMD to do so, because it was a really good opportunity, and they should think about it in the future. Mr Henson reported that each year, a different Regional Metrology Body was their partner, on a rotational basis, and for 2019, the Asia Pacific region, represented by Hong Kong (China) was the partner. They had developed a draft poster, and had nearly finalised the strapline for it, which meant that he hoped this project would be quite advanced by the end of the year.

    Mr Henson stated that capacity building had been a major theme for the BIPM, as it had been for the OIML, and he said he had already given a more detailed presentation about this during the CEEMS Advisory Group meeting, so he said he was now going to be quite brief. He added that the BIPM faced many of the same challenges as the OIML. They had too few of their Member States carrying too much of the burden, which was equivalent to the OIML struggling to find conveners, and for the BIPM this

    applied to chairs, and leaders of comparisons, so they needed to broaden the pool of people who were prepared to do these things. Doing capacity building helped to do that, and they also needed the new arrivals to engage effectively in the system. Mr Henson explained that at the moment the BIPM had no funding at all for capacity building. Everything they had done had been on a sponsorship basis, but he did not consider this was sustainable in the long run. The BIPM considered that its core activities, the things which were necessary to make the CIPM MRA operate effectively, should fall inside the funded envelope, and for that reason they were asking for a small increase in the dotation in November, to help them to implement this. They had been very fortunate that NIST (USA) had given the BIPM a very significant grant to enable activities to get under way, but they could not be expected to do this for every cycle. Many other NMIs had also provided support. Mr Henson added that he thought that in the same way as training OIML Project Group conveners was core to the OIML activities, training technical committee chairs and so on was core to the BIPM's activities. He said that if they received the additional money, the BIPM would be able to carry out all the core activities in a funded way, although they would continue with the sponsor-based activities addressing specific topics of interest. He added that he would be happy to answer any questions from those CIML delegates who would be in the delegations at the General Conference on Weights and Measures in November.

    He said there was a long list of things on which the BIPM and OIML collaborated, and he commented that his slide on this subject was probably not even complete. He said they had a really good working relationship, and he specifically mentioned the many projects he carried out in conjunction with Mr Dunmill. He specifically mentioned the work they had carried out in Nigeria with senior representatives from that country, but also the work with the WTO, as well as general information exchanges, adding that they helped each other out quite a lot. He said he had not included a picture of it in his presentation, but said they had produced a joint brochure on The role of metrology in support of the Sustainable Development Goals, which had been published by UNIDO, but which had been written by largely by the BIPM with input from the BIML, and which delegates could download from the UNIDO website, saying that it had been used quite widely. He said for the BIPM, this close relationship was very effective, and indeed in their draft work program, where they talked about the liaison department, which was his department, they had written that they considered this to be an increasingly close relationship in recent years, recognising that although the missions of the two Organisations were complementary, they were not the same mission.

    However, cooperation meant that they were able to present a much more integrated view to the outside world, particularly in the context of Quality Infrastructure. With regard to some questions that had been asked earlier at this meeting, he wanted to make it clear that the BIPM and the BIML/OIML had played a very significant role in getting this joint definition of Quality Infrastructure agreed, and whilst the wording was not necessarily exactly as they would have written it, it was pretty close, and they now had a way to describe quality infrastructure without different approaches being taken by ten international organisations, which included intergovernmental organisations, and the World Bank, and he thought that was a really big step forward.

    Mr Henson said that wanted to float an idea which was currently still work in progress to delegates because of a discussion he had had with Dr Schwartz. Mr Henson said that at times he considered that the two Organisations really needed to speak separately about scientific metrology, industrial metrology, and legal metrology as this was the most appropriate approach. However, this was not always the best way of doing things, and there were also occasions when they needed to realize that it was all metrology, even though it had different applications which were dealt with in different ways by the two Organisations. Mr Henson drew delegates' attention to a new slide he had created, which he said he could have presented in various ways. He said it was not quite right yet, but he had included it here to float the ideas it expressed. When the Organisations were talking at high political levels, it was not helpful to fragment the subject of metrology into its scientific, industrial and legal components. Politicians needed to understand that metrology was important for a whole variety of reasons, so sometimes they needed a more combined message about the importance of metrology. Finally he highlighted that he had submitted a written report to the BIML, which of course went into more details, as well as giving some facts and figures. He concluded that he was happy to answer any questions as best as he could.

    Dr Schwartz thanked Mr Henson for his interesting report, which had pointed out the many fields where there was already good cooperation between the OIML and the BIPM, and where there could be even closer cooperation in the future. He commented that it was interesting to see the new slide which encouraged people not to think so much about the separate fields of metrology, but to consider the importance of taking a holistic approach, and looking at matters jointly. He went on to say that Mr Henson had mentioned his written report, and he informed delegates that since Mr Henson had provided this before the CIML meeting it had been submitted as Additional Meeting Document 10. He also wanted to thank Mr Henson for already addressing the subject of the new SI, and said that although they would come back to this under item 12.4, they did not have much to say under that particular item. He stressed that it was also important that Mr Henson had discussed, at least in his written report, the CCU definition of the term "unit". He said that a questionnaire had been circulated asking the OIML about its opinion concerning the definition of "unit", which had been a hot discussion topic at the CCU. He informed the Committee that the OIML had abstained because there had been different opinions from different Member States.

    Mr Henson summed this up this subject by saying that an alternative proposal had appeared in the draft ninth edition of the SI Brochure. There had been some discussions about this, and after canvassing the views of the membership of the CCU, the decision had been made to remain with the existing definition of "unit" from the current eighth edition of the SI Brochure. They would not be seeing a change at this time but the matter would continue to be discussed.

    Mr Dixit asked Mr Henson to explain the BIPM's capacity building programme, and asked how often they arranged capacity building training programs. He also asked how people could participate, and whether it was paid or voluntary.

    Mr Henson replied that as he had said, the BIPM currently had no funding to allocate to its capacity building activities, so it relied on finding a sponsor. The different courses were therefore held on a different basis, depending on the agreements they had been able to make with the sponsors, which varied. In some cases they had been able to pay all costs for the participants, whereas in other cases the sponsors had supported only some of the participants' costs. He said that he hoped that in the future, a small part of those courses relating to the CIPM MRA would be able to be funded from the BIPM dotation, but this was dependant on how the discussions on the BIPM dotations went in November.

    Mr Dixit asked whether there were any grants for the development of laboratories. He asked whether a proposal could be made that officers could be trained at the BIPM for mass and length metrology, and for the dissemination of time. He said they were prepared to pay for this.

    Mr Henson replied that the BIPM was not fundamentally a training organisation, but if Mr Dixit, or more broadly any of delegates, had an idea, they should it to send the BIPM, and they would give it the best consideration, bearing in mind that the BIPM had many ongoing projects.

    Dr Schwartz noted there were no more questions or comments so he again thanked Mr Henson and concluded this item.

    ## CECIP

    Dr Schwartz asked delegates to listen to the final report presented by Mr Nater from the European Weighing Instruments Manufacturers Association (CECIP). He added that Mr Nater was the President of the International Cooperation Group (ICG) of CECIP and that he was looking forward to his report.

    Mr Nater greeted delegates and thanked them for the opportunity to present CECIP. He was sure that most delegates knew about CECIP and what they did, so he did not want to go into great detail about everything, but would make a short summary.

    CECIP had about 14 members, and 11 of these were full members, by which he meant countries which had national associations. They also had organisations and companies which did not have an association in their country, but who could join as individual companies, and he gave the examples of companies in Spain and Sweden. He said they were also in negotiation with Turkey to see if they were going to join as an association or as individual companies. He said the mission of CECIP was to reduce barriers

    to trade and to promote fair trade. They promoted high quality harmonised standards, and he stressed that high quality was very important, even when there was a lot of discussion about the standards. They also cooperated with each other with the aim of having one voice at the OIML/CIML. This was a big issue because in the past CECIP's views had been primarily European, since it had been a European federation, but European manufacturers were just a few of the weighing instrument manufacturers that existed in the world, so he joked that they had created a "baby", which he had learnt you could do in metrology from the workshop he had participated in on Monday!

    He continued the analogy saying their "baby" was two years old, and it was called the International Cooperation Group (ICG). It did not cover the whole world, but worked closely with not only Europe through CECIP, but also with the Americas, through the SMA, with China through the CWIA, and with Japan through the JMIF. He said that they met frequently, although of course since they were competitors they did not discuss prices. They followed a code of conduct, and when someone in the group did not feel comfortable, they were able to bring the conversation to a close. He emphasised how frequently they came together, and stated that they had met in Japan two weeks prior to this meeting where they had met with the Chinese and Japanese associations. They had exchanged mostly information about what regulations were being implemented in their various countries, what was new and what trends were developing. In the ICG and in CECIP they had discussed about twenty five topics, amongst which were risk assessment, the cloud, digitalisation and industry 4.0. However, he said he was going to talk about one small example: NAWIs. In Europe, there were 27 countries with 27 regulations that were not necessarily the same. For example, they could consider Germany, which had 16 federal states, and although there was only one regulation, there were 16 interpretations of it. He continued by stressing this was the reality and asked delegates to imagine how difficult it was for a manufacturer to handle all these interpretations, so that was why they focused on one issue.

    He showed delegates a map of Europe which indicated the different periodic reverification requirements, and stated that this also created difficulties. In those countries coloured in red, reverification was carried out by the authorities which he remarked was about half of the countries. In those countries coloured in green, reverification was carried out by private companies, so companies or service providers could do reverification work. In countries coloured in orange, which included the UK and the Netherlands, there was no requirement for periodic reverification. He added that they did not have enough information from Iceland and other countries, so the diagram was not complete but it gave delegates an overview of what they were struggling with as manufacturers. Regarding the situation in China, he said there were 31 provinces and everything was done by the authorities, so for manufacturers it was much easier to handle. In Japan there were 47 prefectures which had very good regulations, and again everything was done by the authorities, so for manufacturers it was very clear. With regard to the US, he said he had obtained his information from his colleagues in the SMA, and they had 50 independent states, in some of which NTEP certificates were required, which were a kind of type approval, whereas in other states there was no need for this. He showed delegates a map of the US, and added that companies in those states that were coloured in green had to complete a registration, then obtain an authorisation, following which they could offer the service. In the other states there was not this option, and either the government carried out these functions, or nobody did.

    Mr Nater re-iterated that the ICG concentrated on harmonisation because it was very complicated for manufacturers to be compliant in a non-harmonised system, and he repeated that their biggest target was to be fully compliant in the market. The mission of the ICG, which was the umbrella organisation of the weighing manufacturers, was firstly to reduce barriers to trade. Secondly that there should be one authorisation valid for the whole region or country such as China, Japan, or the US, over which the same requirements apply. He welcomed the proposal in the revision of OIML R 76 to develop a new part describing verification and reverification procedures since this would improve harmonisation.

    As some delegates knew, he had recently retired after 37 years in metrology, but his wish was for more harmonisation. This would include harmonisation of the verification systems, firstly in Europe, but also worldwide, and he suggested that this was not only his wish, but those of the manufacturers. He said that the OIML-CS was a very good example in this area, which was why, for them, it was time for an OIML verification system. He joked that he knew it was just a wish, but it was OK to share his wishes

    with them. It would mean that they would have the same requirements everywhere and he knew that this was an enormous target.

    He re-iterated that he had worked in metrology for 37 years, and ten years ago he had moved to legal metrology from scientific metrology. He concluded his presentation by joking that he could now do without metrology by moving to meteorology and showed a slide of himself and a colleague from New Zealand on a sailing boat competing in the Americas Cup whilst they were competing against Switzerland.

    Dr Schwartz thanked Mr Nater for his report and observed that as Mr Nater had mentioned the key word "retirement", he wondered whether this would be his last report as President of the ICG at CECIP. Dr Schwartz congratulated him on his plans for retirement and added that he appreciated the views of stakeholders and said they appreciated the efforts CECIP had taken towards closer international cooperation in the field of weighing, because he said the OIML really needed input from their stakeholders, and it was even better if CECIP reached out to other partners, as in this way the OIML would get an even broader view from its stakeholders.

    Mrs Lagauterie wanted to make a comment. She said that regarding the USA, Mr Nater had indicated the wide use of NTEP, but if he wanted to be fair to Europe, it should also have been coloured in a single colour for the subjects of type examination and putting instruments into service, because this had been totally harmonised since 1990, and it was only the periodic verification which was not harmonised.

    Mr Nater thanked Mrs Lagauterie, saying that she was absolutely correct. He added that for manufacturers, harmonisation was a big advantage. He said that in the past, manufacturers had had to go from one country to another country for all the type approvals, and this had sometimes taken months or even years, so by the time they received the type approvals they had already superseded the product, and when considering smaller countries, it had not been worth obtaining approvals. The harmonisation of type approval had made a big difference, and he thanked Mrs Lagauterie for her comment.

    Dr Schwartz noted that there were no further questions or comments and again thanked CECIP, and Mr Nater personally, for the many valuable contributions they had made to the CIML over the last ten years. He observed that he remembered the first CIML meeting that Mr Nater had attended, which had been in Sydney in 2008, and he said they had discussed the topic of the acceptance of results from manufacturers' test laboratories. Dr Schwartz added that Mr Nater had also participated in the revision of the MAA from the beginning and had made many valuable comments. He commented that they would return to this later under item 16.

    Dr Schwartz stated that this concluded the reports from liaison organisations. He thanked all the people who had given reports and confirmed that the OIML very much appreciated having their partners present at the CIML meeting so that they could keep up with current developments.

    The meeting then moved on to the relevant resolutions. Concerning the updates from the organisations in liaison, the first presentation had been from the IEC. Mr Dunmill read:

    The Committee,

    Noting the proposal from the IECEx Management Committee,

    Decides to establish a Joint Working Group with the IECEx to explore synergies and opportunities for cooperation,

    Requests Dr Roman Schwartz and Mr Paul Dixon to represent the OIML on the Joint Working Group, and

    Requests the OIML representatives to report to the CIML on the activities of the Joint Working Group at the 54th CIML Meeting in 2019.

    Mr Dunmill asked if there were any comments on the wording of the resolution. There were no comments. There were no abstentions. There were no negative votes. The resolution was adopted unanimously.

    The next presentations had been from ILAC and IAF and the signing of the MoU. Dr Schwartz read:

    The Committee,

    Notes the reports made by organizations in liaison, and

    Thanks their representatives for providing this information to the Committee.

    Dr Schwartz asked if there were any comments on the wording of the resolution. There were no comments. There were no abstentions. There were no negative votes. The resolution was adopted unanimously.

- number: '9.4'
  title: Signature of Memoranda of Understanding
