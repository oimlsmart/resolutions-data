- number: '6'
  title: Report by the BIML Director on BIML activities
  narrative: |2+

    Dr Schwartz reconvened the meeting and asked delegates to consider Item 6 Report by the BIML Director on BIML activities. He noted that the meeting was slightly behind schedule and hoped that this item could be considered reasonably quickly, as there were other important issues that needed to be discussed the following day. He asked Mr Patoray to make his report.

    Mr Patoray greeted the President, Dr Schwartz, and all his colleagues. He expected to be emotional during his report because this would be his last CIML meeting. He hoped that overall, the Bureau had done a good job for Members, and that he was leaving the Organisation in a little better condition than it had been eight years ago. Accepting that there was a limited amount of time, he agreed to make his presentation short. He indicated that it may not be the BIML Director's report delegates were expecting, and mentioned that he would be leaving with a plea for help in one area, but also feeling good about some of the accomplishments he and the BIML team had made. He asked delegates to "go on a journey" with him.

    Addressing Dr Schwartz, he paid tribute to the excellent job he and his team had done in the organisation of this meeting, in particular he joked, regarding the weather, which he said had been wonderful, and much warmer than they had expected. He continued that the organisation of this meeting had been a little more complex than for some previous meetings, due to the organisation of the various workshops and tours. He thanked Dr Schwartz for the work they had completed together during the past year. It had been "quite a journey" and they had been through "quite a bit". He recognised that they did not always agree, but pointed out that they both respected each other very much.

    He stated that the staff of the BIML were all in attendance at the meeting, with the exception of Florence Martinie, who was currently on medical leave. He knew that delegates had been in contact with some of the staff already, but encouraged them to approach the staff with any questions, and in particular the website.

    He specified that Patricia could help with any membership questions. He reported that the Bureau currently had both a secondee and a contractor working with the current members of staff. He said that Guo Su had joined them several months ago as a secondee, and observed that his enthusiasm was contagious! He was an excellent person, with no fear, who had moved to France with as "little help as he had ever seen". He thanked the People's Republic of China for their support in this secondment, as he said that getting a secondment started had been something he had wanted to do. He also wanted to acknowledge the BIPM's assistance in this matter. He said that they had a lot of experience in secondments and they had taught the BIML how to go about it. He also wanted to thank the French government, as they had been involved in the secondment at all levels, from the local level, up to the

    Foreign Ministry. He said the BIML had learned a great deal about the process, so that next time they would be able to do it a little bit better.

    Mr Patoray indicated he would now take a quick look back over the past eight years. He said at the time of his appointment, at the 45th CIML Meeting in Orlando, there had been some problems and a period of transition. He explained that at the time the BIML had been moving from cash to accrual accounting. A management audit had also been ongoing, which Mr Johnston had initiated. The staff pensions for certain categories of BIML staff were also under debate, and he reminded delegates that the first few accounts he had reported on were somewhat confusing, with estimations being made for the changes in the pension arrangements, and the change to accrual accounting changing the way figures were presented. He also recalled that under his directorship there had also been a significant focus on teamwork at the BIML. He stated that this was all in the past, and he believed they had made great accomplishments in these areas. He drew delegates' attention to three other significant changes, reminding them of the major renovations which had been a large feature in the accounts for three or four years, the upgrading of the information technology systems, and also the complete overhaul of the website and the database. He re-iterated that a significant amount of investment, capital and time had gone into these items, which now laid the foundation for the growth of the organisation.

    However, he remarked that overall the most important work had been the work on CEEMS. He considered that when he arrived there had been some confusion about what to do with developing countries. He said the situation had been described as "you come to me with a silver platter with nothing on it". Now, with the focus on CEEMS, they had the ability to set up "training centres", and reported they had helped support two courses in the past year. He pointed out that these were improving as they went along and were growing. He emphasised that the enthusiasm in the CEEMS Advisory Group was contagious as well, and added they expected great things from CEEMS in the future.

    He continued that there had been a revision of B 6, which had produced a very good final version after several drafts, and input from a number of participants. He reminded delegates that they would be hearing more about convener training for which the CIML had allocated funding during the current budget period. As well as the complicated revision of B 6, there had also been a complete revision of the OIML Certification System, resulting in a much better system, which could be promoted to countries around the world that needed it in their own metrology systems.

    He confessed that he was a little disappointed that during the last eight years they had only added five Member States but nevertheless it was an achievement.

    Mr Patoray went onto to say that in 2013, the subscription fee had been reduced by 3% which he emphasised, although it did not sound like a large number overall, was nevertheless a reduction. This reduction, combined with the fact that during the last eight years there had been no increase in subscription fees, was significant. Since inflation over the last eight years had amounted to around 10% in reality, the subscription fees had reduced in real terms by 10%. He added that the total net assets had increased by 60% a lot of which was related to the infrastructure investment made in the building, but also because of the cash coming as a result of the five new Member States. So the cash at the end of the year, including the reserves and the surplus had increased by 570 000 by the end of the year.

    He reported that the OIML logo had been submitted for registration as an international trademark, which had taken some investment. The World Intellectual Property Organisation (WIPO), to which many of delegates' countries were signatories, had 97 members at present, 53 of which had granted the OIML logo as a trademark. Some 35 had not responded so far. He said they had only had four refusals, and part of the reason for this was that they had had to learn how to submit such a request. The next step would be to submit the OIML-CS logo to the same process, which he hoped would be smoother this time.

    Mr Patoray confirmed that more recently they had published and implemented B 6, and he asked delegates to recall the significant changes that had been made to B 6 the previous year. He reminded delegates that they had delivered training to the secretariats and conveners, and said delegates would hear more about this later in the meeting. He emphasised that they had supported the technical work. He reported that they now had a standard format for comments on publications under consultation, and

    could automatically collate all the comments that were returned. The OIML-CS had been launched that year. He added that they had also continued to support CEEMS and that its section of the OIML website had also been greatly improved and developed. In addition there had also been various meetings on CEEMS and the OIML-CS, both of which delegates would hear more about later in the meeting. Lastly, the BIML had tried to support the President as much as possible.

    Mr Patoray considered that the organisation was in a good financial condition, which again delegates would hear more about the following day.

    With regard specifically to the website, Mr Patoray hoped that most of delegates had seen the changes to the home page, and in particular the section labelled "My Access". He commented that this allowed delegates to get where they wanted to go a little bit quicker. He knew that the BIML team would continue to improve Members' access to the information on the website. He said they had implemented the requirements of B6, which included enabling the current state of voting to be displayed during a vote, even though most votes are cast within the last two days before the deadline. He emphasised that delegates could now change their votes right up to the deadline if they wished, although he added that no one had yet done so. He remarked that the improvements to the CEEMS section had been highlighted earlier in the meeting and more information on this would be given during the CEEMS presentation.

    The OIML-CS had been launched, and again he noted that there would be a report on this later in the meeting. He mentioned that they were also continuing to translate website pages into French as well as making some additional progress in translating the Recommendations and Documents. He added that the backlog had been reduced since he had arrived. He showed delegates a slide indicating the complete list of what had been done to the website. He said they would all have access to this information at the end of the meeting, but also highlighted that in particular for the meeting the following day, he had asked that his presentation be uploaded to the "Additional Meeting Documents" page, so that if delegates could not see the screen very well, they would be able look at the PDFs of these Additional Meeting Documents. He said he also wanted delegates to focus on the second item in blue - the clone which was a secondary website which allowed anyone from the Bureau to simulate what any other registered user of the website would see when they were logged in. This facility was also used during the convener training sessions. He explained that what each member saw when they logged in to the website was personalised according to their role and what technical work they were involved in.

    The BIML had also continued their work with liaison organisations, and in particular with the BIPM on World Metrology Day. He commented that he had sat in with the CCU, and the last discussion they had had regarding the recommendation to the CIPM on the revision of the SI. He said that the OIML had also been the chair of the DCMAS Network, which would be changing its name to INetQI by the end of the year. He re-iterated that Dr Schwartz had mentioned the quadripartite meeting and the MoUs with ILAC/IAF and the IEC. The BIML had also continued its cooperation with UNIDO, and this would be mentioned again under item 9.2.

    Mr Patoray concluded that these had been some of the more important achievements over the past eight years. He continued that he did not wish to criticise or offend anyone, but this is where he wanted to make a plea for help as Director before leaving. He said what followed were his thoughts but they had been inspired by Mr Gilles Vinet, the contractor he had mentioned earlier in the presentation. He thought that sometimes when you move forward you have to go back, and suggested that delegates looked at the Convention and what it gave as the core values of the organisation. Article I listed eight items:

    1 To set up documentation and information systems, which he considered was the primary purpose of the Organisation. He said that the OIML had a large amount of publications: Recommendations, Documents, Basic Publications, Expert Reports, etc., all of which were available, but which were sometimes not up-to-date, which was particularly important in the case of Recommendations. Mr Patoray then reminded delegates that the Convention had been written in 1955, and said that it had to be interpreted in the present, with regard to modern technology. He said the Convention made reference to concerns with inspection, checking of measuring instruments, and being subject to regulation. This was all related to the "postmarket" area that the Organisation did not really become involved in. Each individual country was of course involved in inspections, but he maintained that the Convention stated that the

    OIML should also be involved in it internationally, possibly helping the individual countries. In the revision of R 76 they had decided to explore the addition of another section to cover verification and inspection.

    3&4 With regard to "determining the general principles of legal metrology, the problems of legal metrology and solutions of international interest", Mr Patoray said that he thought this could refer to measuring instruments other than those used in trade, where the OIML was most commonly involved. He maintained that the Organisation was not sufficiently involved in medical or environmental measuring instruments. However, Mr Patoray felt that these were current problems facing the world today and that they were definitely metrology-related, so he questioned how the OIML could contribute based on this 1955 document.

    5 This point was about establishing "model draft laws", which he said covered the work on developing Recommendations. He said he thought this was the sort of work the OIML was supposed to be doing.

    6 Concerning the point about "a model service for inspection and checking measuring instruments"" he compared this with the OIML's work on conformity to type (CTT). He suggested it was up to delegates to interpret what it said.

    7 The next point mentioned the "necessary and adequate characteristics and standards to which measuring instruments must conform in order for them to be approved by Member States", and this he argued could be seen as the OIML-CS. He said when the Convention had been written such a system had not been thought of, but it was interesting to see that there was a provision covering what had now been created.

    Lastly the Convention also said to "promote closer relationships between departments of Weights and Measures and other departments". Again Mr Patoray argued that this included medical and environmental weighing instruments. He insisted that most countries have different departments for these items. A lot of metrology was involved in petrol pumps, and retail scales, but the Organisation should be considering more than this, and he suggested this was where the OIML needed to be encouraging more cooperation between government departments at the national level. He said they should be invited to the meetings and that they should be more involved in what the Organisation was doing, and the QI in particular was a way of doing that.

    Mr Patoray continued that he now wanted to get a little bit more personal about what the Organisation was doing. He noted that the OIML had 148 different publications. They had recently cancelled 15 projects, so there were currently 40 active projects revising or developing new publications. Of the total number of publications, only about 45 % had been revised during the last ten years.

    Mr Patoray asked delegates to think about technology ten years ago, and he gave the example of the iPhone, which he said was just coming out then, and cited it as an example of how technology had changed in the last ten years. Whilst he acknowledged that they would reach a situation where all of the publications had been reviewed in the last five years, and he gave the example of B1, the OIML Convention, which he said was unlikely to be revised, he submitted that the percentage of documents being revised should be much higher. He emphasised that B6 stated the Organisation was supposed to review publications every five years. It also indicated a time frame which was supposed to be followed. This stated that within six months of starting a project, a Working Document or Committee Draft was supposed to have been produced. It also stated that the Project Group should send their final CD to the BIML within three years of the Project's start. This was just the CD, after which it would still have to go through the CIML Preliminary Ballot, and CIML approval stages to be finished. However, he stressed that the average time that PGs had been working on their projects was six and half years, confirming that this statistic included the projects that had been approved the previous year. He acknowledged that the graph describing this looked quite good, but asked delegates to remember that they had just cancelled 15 projects. He underlined that there was a net gain of one project on the list he was showing delegates, of PGs which had not issued any documents within the last three years, making a total of 12 out of 40 Project Groups which had not produced any documents in the last three years.

    This was a cry for help. He pointed out that 77 % of the Organisation's projects exceeded the three year expectation by 200 %, which he judged meant the work was "not getting done".

    Mr Patoray said Dr Schwartz had mentioned project management. Mr Patoray explained that he had been a project manager for 15 years, and remarked that it took special people to manage projects. He said they were not always technical people, as technical people could do technical work, but could not necessarily manage projects. He felt that the Organisation needed help with this. They needed more ability, which is what he said Dr Schwartz had been talking about in his vision for 2023. He judged that training was not enough. He indicated that the project to add hydrogen dispensers to R139 had just completed its work in two years and said he would talk about this more later. He said they had managed this because they had had a clearly defined term of reference, they had a clearly defined roadmap, and they had had a dedicated small group of conveners that had been really able to "get their work done". He confirmed that they had also been trained. He mentioned that George Teunisse from the Netherlands had been one of the conveners and that conveners had also needed the support of the BIML. A standard template for comments had been created, which also helped in collating the comments received, which was otherwise a long process. However, he explained that the BIML had a limited amount of resources and there were also aspects of project development that were out of their control. He knew that conveners had other jobs, and that budgets and priorities changed. People sometimes become unexpectedly unavailable, so that you could not always predict what would happen to the project. However, he emphasised that the BIML should know about this, and the Project Groups' members should be communicating with the BIML. Mr Patoray went on to suggest that in some cases, conveners may not be effective - they may be the wrong people to be a convener. They may be very technically capable but not able to run the project. Mr Patoray said Mr Vinet had inspired the Organisation with a systematic approach. Co-convenerships had also proved to be a very good thing. When there were two people working together, he considered that two heads were better than one. He encouraged delegates to look for help so that they could work in a more systematic way, because he considered it would make the project work easier.

    Mr Patoray was also of the opinion that changing the convener might sometimes be a useful approach, since in some cases the current convener was just not inspired to get the work done. In general, the Organisation needed more countries to get involved. At present, only 16 out of 62 Member States held secretariats or convenerships, which he considered was not a very good percentage. He stated that if there were more people involved, they would have more ability to get things done. Above all, he confirmed that everyone must be treated with respect and fairness. They had to have a fair approach one that was consistent overall, and with regard to all of the processes. He believed that better data was now available than when he had arrived, and the Presidential Council could now monitor this data. He highlighted that a systematic approach was necessary, and they had one example: a red flag criterion for those Project Groups which had not issued any document within twelve months of the Project Group's formation. He specified that 8 out of the 40 Project Groups had not issued any document within twelve months, and reminded delegates again that B 6 stated that this should happen within six months.

    Mr Patoray continued by saying that Dr Schwartz had mentioned priority projects, and he emphasised that out of the eight projects he had just cited, two of them were considered priority projects. Within the last 18 months, no CDs had been issued at all for these projects. Out of the priority projects, three of these had issued documents. He said that several CDs had been issued but nothing had been approved for more than six years. There were three projects like this at the current time, fortunately none of which were a priority. He stated that the Organisation needed to make improvements in this area, which was why he was making this plea for help, and he said it was an area he thought Members needed to focus on because although he would no longer be part of the OIML, the Members would.

    Changing the topic entirely and looking back, Mr Patoray said some of them had met in Orlando, and he showed delegates a photograph of himself with some of them that had been taken at that time. He thanked them for the confidence they had expressed in him eight years ago when they had appointed him as BIML Director. He said that together they had come a very long way and achieved a great deal. He confirmed that he had not done this on his own. His staff had been absolutely fantastic and he also pointed out that they had had excellent leadership in the past from the Members of Honour. He said he was totally confident that this Organisation would be fully capable of meeting all of the challenges that

    were "out there", mentioning specifically the new QI toolkit, and the developments in e-learning. They also now had a secondment at the BIML to focus on the CEEMS environment. In general there were many things going on, and he was very proud of what had taken place in the last few years. He reiterated that this was his last CIML meeting, following which he was planning to return to North Carolina with his wife Sonja, to be with his daughter, five grandchildren and two great grandchildren. He stated that he had spent 45 years in metrology, in industry, in federal government, in the regulatory field, and in auditing. A lot of it had been spent in recent years on standards, but he said the last eight years had been the most rewarding of his career. He acknowledged the support he had had from his wife Sonja. He said there was always somebody behind him to "push him along" and said she was very dedicated to what the OIML did, having helped him all along the way. He concluded by thanking delegates again for the opportunity they had offered him, and finally finished his presentation with the phrase he said he often used when talking to delegates "may all their measurements be accurate".

    Dr Schwartz acknowledged the delegates' applause. He thanked Mr Patoray for his comprehensive report, which he said had been in part provoking, and which had indicated where Mr Patoray thought the weak points were. This was necessary if improvements were to be made, and at the end of Mr Patoray's report, he considered that he had finished on an optimistic note. He congratulated Mr Patoray and his team on the achievements over the past eight years. He said it was good to know that there was enough room and space to further improve on the weak points which Mr Patoray had identified and which he said he had also already touched on in his own report. That way they would know what to do in the future and that with regard to the problems, they would all support each other and remain motivated. They had a good team they could rely on, and said it would be a pleasure for him to consider the points Mr Patoray had mentioned.

    He asked if delegates had any questions. He realised it had been a long day with many discussions and delegates were probably looking forward to the evening, but he wanted to give them time to comment if they wished.

    Dr Schwartz thanked Mr Patoray for keeping his report as short as possible, and for keeping to time. He drew delegates' attention to the draft resolution on the screen:

    The Committee,

    Notes the report given by the BIML Director on the activities of the Bureau, and

    Expresses its appreciation for the work undertaken by the BIML Director during his time in office.

    Mr Dunmill asked if there were any comments on the wording of the resolution. There were no comments. There were no abstentions. There were no negative votes. The resolution was adopted unanimously.

