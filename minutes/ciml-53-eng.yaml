- number: '2'
  title: General report by the CIML President
  narrative: |2+

    Dr Schwartz moved on to this item by alerting delegates to the fact that they had received two Additional Meeting Documents on this point: AMD04 (English) and AMD11 (French). Dr Schwartz began in French:

    Chers collègues, j'aurais aimé être en mesure de vous présenter ce rapport en français, mais il va me falloir quelque temps pour améliorer mon français. Mais au moins il existe une traduction française de mon rapport, le document complémentaire numéro 11. J'espère que nos collègues francophones seront reconnaissants de cet effort et accepteront que je repasse en anglais dès à présent. Merci.

    Dear Colleagues,

    ## Introduction

    This is my first report as your CIML President. I thank all CIML Members once more for your confidence and very encouraging support; it is highly motivating for me to serve our Organisation and its Members as best as I can for the upcoming years.

    ## Handover

    In Colombia there was a very smooth handover of the CIML Presidency after six very successful years of Presidency by Peter Mason, who was made CIML Member of Honour in recognition of his service to the Organisation. CIML Past President Alan Johnston was also made Member of Honour, and this became effective in April 2018 on his retirement from Measurement Canada.

    Again, the past year has been very busy and I have a lot to report.

    ## Membership

    Concerning the changes in membership of our Committee, I am pleased to welcome the following new CIML Members:

    Ms Diane Allan ...Canada

    Mr QIN Yizhi ...China

    Mr Jairo Enrique Malaver Barbosa ...Colombia

    Eng. Abdallah Moantasser...Egypt

    Dott. Giuseppe Capuano...Italy

    Ms. Merita Mustafai...Macedonia

    Dr Bobjoseph Mathew...Switzerland

    Dr Ludovic Manege...Tanzania

    Mr Boonyarit Kalayanamit...Thailand

    Mr Richard Sanders...United Kingdom

    I am also pleased to welcome the Republic of Kiribati as a new Corresponding Member.

    As President Mason stated in Colombia last year, we can again confirm that interest in the work of the OIML across the globe has never been greater and we can all be proud of this fact. We will certainly not rest on our laurels, but take this as an incentive and motivation to work hard in order to keep this high level of interest and remain relevant in a rapidly changing world.

    ## Presidential Council

    As CIML President, I have reviewed and slightly modified the composition of the Presidential Council (PC). I appreciate that Charles Ehrlich, Sergey Golubev, Yukinobu Miki and Corinne Lagauterie continue to be members of the Council, and I have also invited Bill Loizides, Mairead Buckley, Himba Cheelo, and Bobjoseph Mathew to join as new members. Their support and advice is precious to me as President and I value their contributions.

    At our February-March 2018 PC meeting we discussed many points. We also thoroughly reviewed the 2017 CIML resolutions and the minutes of the 2017 PC meetings and drew up a list of actions to use as a working basis. Let me summarise the key elements below, starting with the review of technical activities.

    ## Review of projects

    At the February-March 2018 PC meeting the status of all 55 ongoing projects was reviewed. Of these,15 projects were identified as having been inactive for a long time and they were therefore submitted to the CIML to decide whether they should be cancelled or not. There was a clear decision to cancel all of them, leaving 40 active projects. I am also pleased to report that some previously dormant projects have now started to make progress. There is a strong indication that the recent training sessions coupled with the fact that some new conveners have come on board for several projects have helped in this respect.

    ## Convener training and support

    You will be given detailed information on convener training under agenda item 12.3. Training has been held in a number of locations over the last year and further courses are planned for the near future. There was excellent interaction with participants, many of whom confirmed that they found the course to be enjoyable, informative and professional.

    I understand that the situation of Project Group conveners is often difficult. I have great respect for the conveners and for the work they carry out, which is often in addition to their work in their national institute, however one of the concerns I have is that globally, the project management needs to be analysed and improved. I personally attended a convener training session at the BIML to provide my thoughts on how good project management would help the delivery of Draft Recommendations and Documents. This was based on my personal experience with the revision of R 76. It is my intention that information on project management be incorporated into future training courses.

    At our CIML meeting in 2017 I said that I consider it crucial for our Organisation that we keep the relevant publications up to date. As we have limited resources, these must be allocated to carrying out key tasks. I have therefore asked the BIML to produce a list of all the Recommendations so that priorities for publication reviews can be identified.

    I also asked if the BIML would be able to offer even more support, at least for high priority projects, so that the conveners can focus on the technical aspects of their projects. This is certainly something I will discuss further with the new BIML Director and the PC.

    ## Translations into French

    As French is the official language of the Organisation, it is important that we make as many key publications and parts of the website as possible available in French. Firstly, I am pleased to report that full introductions to both the OIML-CS and the CEEMS sections of the website are now available in French. Secondly, a priority list of publications that require translation has been drawn up, and work has started to translate R 59 and R 60. OIML B18 has already been translated, as have R 87 and R 147. R 61 is the next Recommendation on the list of priorities. The BIML is using the support from two professional external translators in order to accomplish the translation work, and the minutes of the 15th Conference are also being translated by a third translator. All this translation work is being carried out in close cooperation with Mrs. Lagauterie.

    ## BIML staff

    I would now like to report to you on the BIML staff, especially the situation concerning the three senior members.

    As you know, Stephen Patoray will retire at the end of 2018 after eight years as BIML Director. At last year's meeting in Colombia, Resolution no. 2017/3 was approved with the aim of appointing a new BIML Director at the 2018 CIML meeting. Based on that Resolution and on B13:2004 Procedure for the appointment of the BIML Director and Assistant Directors, a Selection Committee was established, composed of six members of the Presidential Council. I have informed CIML Members about the selection process and its outcome by letter, and I will be giving a report under agenda item 4.1.

    I am pleased that the Selection Committee was very successful in finding the right candidate to be proposed for appointment as the new BIML Director. There will be a presentation by the candidate under agenda item 4.2 and you will have the opportunity to discuss his candidacy during the meeting.

    Still on the subject of the Bureau Staff, in January 2018 we were pleased to welcome Paul Dixon into his role as BIML Assistant Director, having been appointed by the CIML in Colombia.

    Finally, also during our meeting in Hamburg the CIML will be discussing and voting on the renewal of the contract of Ian Dunmill. You will recall that in Colombia, the CIML voted to not appoint a Selection Committee for the renewal of his contract.

    ## Financial status

    Under item 8, the BIML Director will give a detailed report on the financial situation of the Organisation. The global financial health of the Organisation is good. I would like to emphasise, however, that in addition to this overall financial situation, it is necessary to keep a close watch on the cash position, and in particular the cash flow, if the Organisation is to continue to function smoothly. Our dependence on subscriptions from Member States as the principal source of income means that we rely on timely payments coming in from our Members, in particular the larger ones.

    At the 15th International Conference in Strasbourg, we discussed the surplus which built up in the accounting period 2012-2016, and decided that this surplus should primarily be used for PG training, in order to improve the efficiency of our technical work.

    Related to that discussion, at the last CIML meeting we started to think about the appropriate level of reserves that the Organisation should hold. Under agenda item 8.5 of this meeting we will resume the discussion on the surplus and reserves with the aim of submitting a proposal for consideration by the 16th Conference in 2020. It is my firm belief and strong recommendation that we focus the discussion on investment in the future of our Organisation in order to ensure that the OIML remains viable and be well prepared for the future. I will come back to this at the end of my report when I will speak about my vision and goals for the Organisation.

    ## Corresponding Members

    Corresponding Members now benefit much more than in the past from their membership thanks mainly to the interactivity of the OIML website. They can now also participate actively in our technical work, though of course they do not have voting rights.

    After discussion at the PC meeting in 2018 it was agreed that a proposal should be developed to ask CIML Members about the possibility of introducing four distinct classes for Corresponding Members. So under agenda item 8.5 I propose that we have an initial discussion with a view to presenting a proposal that could be put to the 16th Conference in 2020.

    ## The revised SI and cooperation with the BIPM

    As I said last year in Colombia, I consider the good and fruitful cooperation with other International Organisations as very important.

    Let me begin with our sister organisation dealing with scientific metrology, the BIPM. They are preparing for the 26th General Conference on Weights and Measures (CGPM) to take place from 13-16 November 2018 in Versailles near Paris. This is a most exciting event, at least for metrologists, because it is expected that the CGPM will follow the CIPM recommendation to revise the current International System of Units, the SI, so that it will be based on seven fundamental constants, to come into force on World Metrology Day in May 2019. This will be a real cornerstone for metrology, although the impact on practical measurements will be minimal or unnoticeable for nearly all users.

    As an official member of the CCU, the OIML has closely monitored the development of the revised SI from the beginning, and we are looking forward to hearing more about the current developments and decisions in the report of the BIPM under agenda item 9.3 and under agenda item 12.4.

    We will certainly need to consider the impact on OIML publications, e.g. D 2, for which a Project Group has been set up. The BIPM as a liaison organisation will be following the work closely with us. There is also a need to identify other OIML publications that will possibly be affected by the revision of the SI, such as R 111 for weights of different accuracy classes. To this end the BIML is about to put out a call to all Secretariats to review their respective publications to see if there are any changes required.

    In my new role as CIML President I have not yet had very many opportunities to meet with representatives of the BIPM. A good opportunity was the quadripartite meeting in March 2018, which I attended together with Charles Ehrlich and Stephen Patoray, where we discussed among many other things - the update of the Joint "BIPM, OIML, ILAC and ISO declaration on metrological traceability". I would also like to mention the excellent cooperation between the BIPM and the OIML on World Metrology Day, which was again this year a resounding success. As I mentioned, next year's World Metrology Day will be a really exciting event.

    Finally, I would like to mention that I am invited to attend the 26th CGPM and to give a presentation entitled Developing a common vision for scientific and legal metrology: the OIML perspective. I am sure that a common vision and a common concept to promote metrology as an important element of the quality infrastructure of a country makes perfect sense in an interconnected world.

    ## OIML-IEC and OIML-ILAC/IAF cooperation

    I am pleased to report that the liaisons with the IEC and ILAC/IAF also remain a very significant part of the OIML's work. We are going to renew our MoUs with both the IEC and ILAC/IAF at our meeting in Hamburg and I very much look forward to the signing ceremony under agenda item 9.4. I am pleased that Mr Frans Vreeswijk, IEC General Secretary and CEO, Ms. Merih Malmqvist Nilsson, ILAC Chair, and Mr Xiao Jianhua, IAF Chair, will personally attend the CIML meeting in Hamburg to represent their organisations.

    One of the key reasons for updating our MoUs is to address the new OIML Certification System (OIML-CS) which came into force on 1 January 2018.

    Concerning the cooperation with IEC, Paul Dixon and myself met several times with representatives of the IEC (Chris Agius, Executive Secretary of IECEx; Mark Amos, IECEx secretariat; Dr Thorsten Arnhold, IECEx Management Committee Chair) to discuss the renewal of our MoU and possibilities to strengthen our cooperation in the future. Paul Dixon and I were also invited to attend the IECEx Management Committee meeting in Cannes, France, on 20-21 September 2018, where we gave a report primarily about the current status of the OIML-CS.

    Please refer to CIML agenda items 9.3 and 9.4 for more information.

    ## RLMOs

    I am pleased to report that as in previous years, over the past year BIML staff have attended meetings of a number of regional legal metrology organisations. I personally hope to be able to accept invitations to RLMO meetings in the future.

    I am also pleased to point out that all the RLMOs have been invited to participate in the OIML-CS Management Committee as observers. Dr Miki will be giving a comprehensive oral report during our meeting.

    ## Other organisations

    I would like to mention four other organisations with which we maintain regular contacts: the International Organization for Standardization (ISO), the World Health Organization (WHO) concerning medical devices, CODEX Alimentarius concerning food packaging labelling, and UNECE WP.6 regarding regulatory cooperation.

    ## CEEMS Advisory Group (AG) and CEEMS activities

    Concerning CEEMS, the Advisory Group is now established and B 19 Terms of Reference for the Advisory Group on matters concerning Countries and Economies with Emerging Metrology Systems (CEEMS) has been published. A joint project of the CEEMS AG with the BIPM is the revision of D1 Considerations for a Law on Metrology, and in the future we envisage even closer cooperation with the BIPM, especially in capacity building and Quality Infrastructure (QI) activities.

    Improvements have been made to the webpages for CEEMS activities (including translation into French) and some further upgrading is ongoing to address the training centres.

    A survey of the needs of CEEMS was sent out to OIML Members in June 2018 to assess what support they require. The outcome will be analysed and more information will be given under agenda item 10.

    An Expert database is currently being compiled and work is being carried out on the required legal disclaimer before it can be made live.

    There have been three successful Pilot Training Centre events in Kenya, P.R. China and Cuba. Detailed information will be provided on this under agenda item 12.3. In this context, at the last PC meeting we also discussed the need to review the Arcachon resolution on CEEMS and develop a consistent curriculum for the OIML Training Centres (OTCs).

    ## OIML-CS

    On 1 January 2018, the new OIML Certification System (OIML-CS) came into force and replaced the former Basic Certificate System and the Mutual Acceptance Arrangement (MAA). The first OIML-CS Management Committee (MC) meeting was held in Sydney, Australia on 21-22 March 2018, in conjunction with a meeting of the Review Committee, which is a subcommittee of the MC, and a lab-tour and symposium organised by the host, NMI Australia. As the Chairman of the provisional Management Committee (prMC) I attended all the meetings, which were very successful with almost 50 participants from 18 countries. At the time of compiling this report there are 12 OIML Issuing Authorities, 20 Utilisers, two Associates and 19 categories of measuring instruments. The objective for 2020 is 36 categories.

    I would again like to stress the importance of awareness raising and identifying potential opportunities. 'Standard' presentations will be made available which can then be used when talking about or promoting the OIML-CS. It is important, for instance, to get the message across that a Member State does benefit from the OIML-CS not only as an OIML Issuing Authority, but also as a Utilizer, with full voting rights in the MC. In addition, Corresponding Members can also benefit as Associates.

    Together, we can all help promote the OIML-CS and ensure it is successful. It is also important to ensure that the OIML-CS is included on the agenda of RLMO meetings.

    We will be given detailed reports during our meeting from the MC Chairperson, Cock Oosterman and from the Executive Secretary, Paul Dixon under agenda item 11.

    ## Vision and goals

    I spoke of my vision and goals a year ago in Colombia. I believe that our Organisation is in very good shape, but that we still face some challenges to ensure that we are well prepared for the future.

    ## At our CIML meeting in 2017 I summarised my vision as follows:

    1. Technical work - there is a need to improve the effectiveness of our technical work with the aim of keeping the relevant Recommendations and Documents up to date. It is therefore important that we identify the priority for reviewing and updating publications. We must use all available resources to carry out key tasks and identify possibilities to further support conveners.

    2. OIML-CS - to make it a success we need to continue to promote it to manufacturers and to potential Utilisers and Associates. To support this, further promotional activities will be undertaken and additional promotional materials made available.

    3. CEEMS - greater cooperation is required with the BIPM and the RLMOs to "sell" metrology as a package that is part of the QI for a country. We will work on this together.

    4. Closer cooperation is required with other international organisations, especially the BIPM. A small task group should look at this within the current framework. A suggestion is for the Directors and Presidents to meet, which would result in a win-win situation if done in the right way.

    My proposal is that after the PC meeting in March 2019, a respective "Task Group 2023" be formed, including the President, the two Vice-Presidents, the new BIML Director, the two Assistant Directors, and one or two PC members, with a view to elaborating proposals to be put forward to the CIML in 2019 or the 16th Conference in 2020. Leading on from this, it is crucial that the OIML adapts to address the key challenges of the 21st century such as digitisation analysis of big data, better market surveillance and remote verification.

    There is also the issue of Conformity to Type (CTT) and how to best assist Member States to overcome the "golden sample" issue, which some of our Members claim to have resolved by certain regulations and programs, but others possibly still consider as a key challenge. I recall saying during the seminar held in Utrecht in 2011 that the OIML should concentrate on premarket activities, because post-market activities are up to countries and are concerned by national legislation. I hope that the new OIML Document on CTT that is being developed will be finalised very soon.

    ## Thank you for your support!

    In concluding my report, after my first year as your President I would like to extend my deepest appreciation for the support I have received from Acting First Vice-President Dr Miki, all the members of the PC, the BIML Director and all his staff, and also our Immediate Past President Mr Peter Mason. Your support and guidance has meant that over the past year we have accomplished a great deal and we are shaping the way for our future.

    I very much hope that the vacancy of the position of the CIML First Vice-President can be filled at the CIML meeting in Hamburg. There will be a presentation by the candidate and a vote on his election.

    Looking forward, I am confident that our Organisation is well prepared to meet the needs of our Members and the challenges we will certainly be facing. I hope you share my optimism and look forward to heading into 2019 and the following years.

    Dr Schwartz invited any comments or questions. There being none, he asked delegates to consider the resolution.

    The Committee,

    Notes the report given by its President.

    There were no comments, negative votes or abstentions, so the resolution was unanimously adopted.

- number: '3'
  title: Presentation by the candidate for CIML First Vice-President
  narrative: |2+

    Moving on to this item, Dr Schwartz reminded Members that they had already received the respective presentation, CV and the motivation statement from Dr Charles Ehrlich, who he invited to make his statement.

    Dr Ehrlich began by thanking Dr Schwartz and his fellow CIML Members.

    It's an honour to be here and to be considered for the position of First Vice-President of the CIML. As I wrote in the motivation document you have received, my primary motivations for running for CIML First Vice-President are to provide assistance to the President in carrying out the difficult and sometimes laborious tasks of the Presidency, and to assist him in carrying out his, and your, vision for the future of the OIML.

    I now have about 20 years of experience in the OIML, most of them as CIML Member and as a member of the Presidential Council, and I believe this experience would be beneficial as VicePresident. During those years I have been involved in many OIML activities at all levels, from serving on Technical Committees, Subcommittees and Project Groups, to overseeing the work and serving as chairman, secretariat and convener of several of those bodies. For example I've worked directly on several technical Recommendations as well as on the model law on metrology (D1) and the technical directives (B6). In addition I have represented the OIML for many years on the Joint Committee for Guides in Metrology (JCGM) and its two Working Groups, and have served for ten years as Chairman of Working Group 2 (International Vocabulary of Metrology). I have also provided both formal and informal training to OIML Secretariats on incorporating measurement uncertainty into legal metrology considerations, and led the effort to develop the OIML Guide on Uncertainty (G19).

    Throughout my career in industry, scientific metrology, and legal metrology I have always sought to stand up for fairness and a level playing field in whatever I was doing. I value independent thinking and will always approach the work from that perspective. While performing research and development in the semiconductor capital equipment industry I gained a keen awareness of the difficulties that industry faces in dealing with the regulatory world. As Group Leader of the NIST Pressure Group I was responsible for both research activities and the NIST Pressure Calibration Service, which provided calibrations to a broad array of customers. I served as a technical assessor for pressure for the National Voluntary Laboratory Accreditation Program (NVLAP) at NIST, learning the nuances of accreditation which has helped me in serving on the Management Committee and the maintenance group of the new OIML Certification System. I served for three years on the Executive Standards Council of the American National Standards Institute (ANSI), which is the US representative to ISO and IEC. This provided me with experience and appreciation of both the domestic and international standardisation communities. I saw the importance of the products and tools that the OIML has to offer. In all of these activities I've learned that maintaining a balanced perspective and listening to all stakeholders, while striving for consensus is key to achieving successful outcomes, and so I will bring that philosophy to serving as CIML First Vice-President.

    One of my most rewarding experiences in the OIML has been continuing the work of my predecessor, Dr Samuel Chappell, in shepherding the OIML Mutual Acceptance Arrangement (MAA) into existence through our roles as secretariat of TC 3/SC 5 on conformity assessment. For many years, as Chairman of the APLMF Working Group on Mutual Recognition

    Arrangements, I promoted the MAA in the Asia-Pacific region (including in the US), and I continue this effort, now as a designated subject matter expert, in promoting and supporting the development of the new OIML Certification System. I have also served in the past as Co-Chair of the SIM Legal Metrology Working Group. I have joined the CEEMS Advisory Group to help find ways to make the OIML more relevant and accessible to the CEEMS community, and I will continue that pursuit.

    As we have heard, one of the key issues that the OIML has faced over the years is how to accomplish a number of high-priority projects with just a handful of secretariats and conveners that are able to devote a large part of their work and time to these projects. I would like to thank and acknowledge here these dedicated, hard-working individuals, several of whom are in this room: Morayo Awosola, George Teunisse, Ralph Richter - thank you, without whom the core work of the OIML would not have progressed to where it has. My vision here is to explore alternative methods, models and mechanisms for bringing additional resources to bear on this work.

    Let me conclude by saying that if you elect me as CIML First Vice-President I will work with the President, the Second Vice-President and the Presidential Council to support the strategy, vision, objectives and mission of the OIML by utilising my experience in the international metrology and standardisation communities (such as BIPM and ISO), and by interacting with as many of you as possible, to listen to your perspectives and learn about your concerns and implement your ideas. I appreciate your support, and look forward to working with all of you. Thank you.

    ## Dr Schwartz thanked Dr Ehrlich for his speech, and invited questions from delegates.

    Ms. Natasa Vukovic (Slovenia) congratulated Dr Ehrlich for his achievements, but pointed out that the role of CIML Members is to promote OIML publications, so she asked how he would evaluate the implementation of OIML publications in the country he represents, and what would be his vision in this regards as possible future Vice-President of the CIML. Dr Ehrlich thanked Ms. Vukovic for her very legitimate question and said that he met at least once, and usually twice each year with the US National Conference on Weights and Measures, which develops Handbook 44 and other NCWM documents pertaining to type evaluation. He explained that he gave a report to that conference, which is attended by regulators and industry all the stakeholders in the US system. He said that he reported on what was happening within the OIML, on the status of projects under US responsibility. He added that in the past he had worked hard to try to harmonise the US NTEP and NCWM recommendations with the OIML Recommendations. They had been very successful with this for R 60, and as she would be aware, they were now a Utilizer in the Certification System and had been in the MAA. Their requirements for load cells were almost identical to those of R 60, having only one additional national requirement. He also talked to the board of directors regularly and did what he could to make them aware of OIML Recommendations, which was a slow but steady process. He hoped that there would also be some success with other documents which were coming along. This being a standardisation process, sometimes it moved slower than one would like.

    Mr Dixit (India) thanked Dr Ehrlich for his presentation and remarked that the US was very different even though Dr Ehrlich had been in the CIML. There would be a great change in the SI system and CIML procedures, and Mr Dixit wanted to know how Dr Ehrlich would support countries which do not accept the OIML and CIML system. Dr Ehrlich asked for some clarification about "acceptance" and Mr Dixit replied that he was talking about uniformity of legal metrology laws, pointing out that they had found different versions of the law in Europe and similarly at the international level there are many countries where the law has not been implemented and consumers are looking for higher quality products, and some countries where the quality infrastructure has not been implemented. He wondered how Dr Ehrlich would promote these things from his different background. Dr Ehrlich replied that he had been a member of the CEEMS Advisory Group for a while, and that he saw the CEEMS effort as helping those countries in a variety of ways, including providing information through OIML D1 on

    how to develop a metrology law and infrastructure in a country. He stated that he would certainly work to promote this, and agreed that in the US they would not be using D1, since they had a unique system. He indicated that he felt it was the role of the OIML, through its guidance documents, to provide leadership to countries and economies, even though they had their own ways of conducting legal metrology. Although he came from a country with a well-developed system, Dr Ehrlich said that he was well aware that it was very different from the system in most countries, so he was very open to looking at other systems. As he had previously mentioned, he was very keen on open thinking and was certainly not of the opinion that one system was better than another.

    Mr Khedir (Tunisia) said that he was sure that Dr Ehrlich would manage the role of Vice-President, but he had an idea or reflection to make. To allow for competition in the new OIML Certification System there was an offer from the countries producing certificates, and there was the demand from the Utilizers and other countries. He felt that this was a point to be developed. The OIML-CS had started with type approval, but of course there was also initial and periodic verification to consider. He wondered whether Dr Ehrlich had considered a project in this area. Dr Ehrlich agreed that the Certification System was orientated towards type evaluation, and considered that the impact of the OIML-CS on everyone (including manufacturers) should be examined.

    Mr Madzivhe (South Africa) asked Dr Ehrlich what percentage of OIML Recommendations were currently accepted and used in the US, and secondly, he asked for Dr Ehrlich's views on the use of OIML funds for CEEMS. Dr Ehrlich thanked Mr Madzivhe for his questions. He said that the first question was easier to answer. He replied that the US had its own programme, the National Conference on Weights and Measures, which developed its own publications. These were harmonised as far as possible with OIML Recommendations, but Recommendations were never adopted outright. He pointed out that the requirements in R 60 were essentially identical to the US requirements, and that the US requirements for NAWIs were very close to those in R 76, except that there was an additional accuracy class. The requirements for prepackaged products were also very close to those in R 87, and he felt that as time went on, the requirements for metering would become more harmonised. He added that they did not have a system in which compliance with an OIML Recommendation gave presumption of conformity to the US requirements. He hoped that Mr Madzivhe did not see this as an impediment to his serving as CIML Vice-President. He understood that many countries used OIML Recommendations, and that they were used in some ways in others, and not in some other countries. From a personal point of view, Dr Ehrlich said that he would like to see as much harmonisation as possible, and he always worked towards this goal. Turning to the question of funds to support CEEMS, he pointed out that this was a question of national policy, and mentioned that the US has a substantial programme which provides support through USAID to many countries and for a variety of reasons. This of course included CEEMS, although this was not the terms used by USAID. It was US policy to support development in other countries through aid. He was not sure how this might pertain to his Vice-Presidency, but indicated that he supported the CEEMS activities and the funding of these seemed perfectly reasonable to him.

    Mr Rifan Ardianto (Indonesia) thanked Dr Ehrlich for his presentation. He pointed out that public awareness of legal metrology was poor, and asked him how he thought this situation could be improved through the establishment of a framework to educate society of its value. Dr Ehrlich replied that the Office of Weights and Measures, in which he worked, promotes awareness of legal metrology, and he had given presentations on this. He felt that the OIML Bulletin was a good tool for awareness, as was the e-learning platform. He thought that more could be done in working with Members in individual countries to identify who needed awareness-raising activities. There was also the possibility of helping Members to set up their own awareness-raising events. Particular needs should be identified to the Presidium for possible action.

    Dr Schwartz thanked delegates for their questions and Dr Ehrlich for his presentation and for having answered all the questions.

- number: '4'
  title: Recruitment of the new BIML Director
  narrative: |2+

    Introducing the next item on the agenda, Dr Schwartz made reference to the important decisions to be taken during the current meeting, one of which was the recruitment of the new BIML Director.

    He explained that the call for candidates for this post had been circulated on 3 November 2017, in circular BIML 17/217. The applications received had been considered by the selection committee which had been established at the previous CIML meeting under resolution 2017/3. He had personally circulated a private note on the outcome of the selection process to each CIML Member prior to this meeting, and he would now report in more detail on this process, and on the recommendation of the selection committee. He emphasised that he had notified Members separately because he considered that it was very important to maintain confidentiality for the proposed candidate.

    Dr Schwartz read out resolution 2017/3. He also read out what was written in B 13 about the procedure for the appointment of the new Director, as he acknowledged that it was very seldom used, the last time having been some eight or nine years ago. It read:

    "At the CIML Meeting preceding the Meeting at which the Director is to be appointed, the CIML shall appoint a selection committee, which will be composed of the President of the CIML, who will chair the selection committee, and at least four CIML Members who should be Presidential Council members".

- number: '4.1'
  title: Report by the Selection Committee Chairperson
  narrative: |2+

    Dr Schwartz explained that the members of the selection committee had been himself, acting First Vice President Dr Yukinobu Miki (Japan), Mr Bill Loizides (Australia), Dr Chuck Ehrlich (USA), Mrs Corinne Lagauterie (France), and Ms. Himba Cheelo (Zambia). Regarding the selection process itself, B13 stated "the selection committee will examine the candidacies in the following manner. The chair of the selection committee, after consultation with the other members of the selection committee, shall pre-select one or several candidates to be interviewed". He called this a pre-selection process and then continued "the selection committee will then meet with the pre-selected candidates to evaluate them", and finally "the Selection Committee shall propose to the next CIML meeting the person to be appointed, following this evaluation". He emphasised that B13 clearly stated "the person to be appointed" and so re-iterated that it was clear from these words that the selection committee should propose just one candidate. He judged that B13 had been closely observed. The call for candidates for the post had been circulated on 3 November 2017, three weeks after the CIML meeting in Cartagena. Candidates had been encouraged to familiarise themselves with the contents of the OIML website, and they were also reminded that submissions must include a detailed CV, a certified diploma, certified transcripts, two references, and a personalised letter of motivation. Dr Schwartz noted they had received 13 applications by the deadline of 1 February 2018.

    He then presented the results of the pre-selection process. Based on the criteria mentioned in the call for candidates, a detailed review sheet had been developed for the selection committee to pre-select the appropriate candidates for interview. This sheet contained ten criteria which had been mentioned in the call for candidates, and each member of the selection committee had been asked to rate each candidate against these criteria. Four possible ratings for each of the criteria had been used:

    - the candidate met the criteria convincingly and additional information had been provided as requested;

    - the candidate met the criteria convincingly but some questions remained;

    - the candidate did not meet the criteria convincingly but showed some promise; or

    - the candidate did not meet the criteria at all.

    The ratings had been collated in a table, and the selection committee met on 2 March 2018 to discuss the ratings and the implications, as well as to select the highest-ranked applicants for interview. Following this pre-selection process, six candidates had been invited for interview.

    The interviews had taken place on 13 and 14 June 2018 at the BIML in Paris. As chair, Dr Schwartz said that he had developed an interview guide which addressed all the criteria from the call for candidates to make sure they were all being considered, and so that there was a sound basis for the decision. He reported that, in his experience, this also provided the necessary confirmation that each candidate has been treated equally. Each interview had consisted of four parts:

    1. there had been a twenty-minute presentation by each candidate, during which they had been asked to demonstrate their experience, their motivation in applying for the post, and their vision as director if selected. Although twenty minutes was not long, this enabled the selection committee to assess the candidates' abilities in making succinct presentations;

    2. there had then been a sixty-minute interview, based on the interview guide;

    3. this was followed by a ten-minute clarification of various issues;

    4. following this, finally each candidate had met the BIML staff members for thirty minutes. He observed that from his experience with the interview process at the PTB, it was important that candidates should be able to see the work place and meet the people they would be working with, and also to obtain feedback from staff members. Although there had been some initial hesitancy concerning this concept amongst the BIML staff, he had helped them to prepare for this, and confirmed that they had finally been convinced about the process.

    Four candidates had been invited back for a second interview the following day for twenty minutes to clarify remaining questions arising from the discussions after the interview, or from the feedback provided by the BIML team.

    The selection process had taken three whole days. On the last day, the ratings had been reviewed again, together with the information they had received from the interviews and the feedback from the BIML staff, and the selection committee had taken a unanimous decision. The selection committee therefore proposed Mr Anthony Donnellan from Australia as the candidate for appointment as the new BIML Director. Mr Donnellan's current position was as Senior Manager in the legal metrology branch of the National Metrology Institute of Australia. He would be available as Director Designate from 1 November 2018, and as Director of the BIML from early January 2019. Dr Schwartz suggested that Members first listen to Mr Donnellan's presentation, then discuss his candidacy with him, and if necessary, move to a closed session to discuss this and the selection committee's report in preparation for their decision under agenda item 14 the next day. He said he would strongly recommend that they followed the proposal of the selection committee and appoint Mr Donnellan as the new Director of the BIML. He asked Mr Donnellan to make his presentation, and recommended that the Committee should then take the opportunity to ask Mr Donnellan and himself any questions.

- number: '4.2'
  title: Presentation by the selected candidate
  narrative: |2+

    ## Mr Donnellan made the following speech.

    Good afternoon, bonjour, Dr Schwartz, Mr Patoray, distinguished guests, members of honour and delegates, including liaison organisations, CIML Members, Corresponding Members and friends of legal metrology. It is my pleasure and honour to stand here before you today to present my credentials as the candidate selected for the BIML Director position. If you will indulge me for a moment, in respect and honour of the two official languages of the OIML, and with French taking the lead role, I have prepared an opening statement in French:

    Merci pour cette occasion de me présenter à la 53ème Réunion du CIML dans la belle ville de Hambourg, en Allemagne. C'est un immense honneur et un privilège d'être considéré pour le poste de Directeur du BIML. Mon français est basique mais grandit. J'étudie actuellement le français et je l'apprécie beaucoup. Encore une fois, merci de me donner l'occasion de me présenter à un public aussi distingué.

    In respect for our German hosts, I will attempt to honour them with hopefully a coherent introduction in German:

    Ich fühle mich sehr privilegiert und freue mich, in Hamburg zu sein. Mein Deutsch ist noch begrenzter als mein Französisch! Ich möchte jedoch unseren deutschen Gastgebern Respekt zollen und dafür danken, dass dieses Treffen in Ihrem wunderbaren Land stattfinden kann.

    I will stop there and revert to my mother tongue. I have prepared this presentation for you to familiarise the Members in this room with myself, my intentions and my credentials, and I will go through that systematically. I am very enthusiastic about this position. It is one that has driven me for a number of years, to look at the benefits of metrology in facilitating a fair and equitable society.

    I am currently, as was mentioned by Dr Schwartz, living in Sydney, Australia. I have undergraduate qualifications in economics and also in investigations, and postgraduate qualifications in management, public policy and international business. I have undertaken part of a PhD earlier in my life, on international water policy and law. I feel this presents unique opportunities to build on that expertise in the BIML Director role, should I be selected and endorsed. I have also spent some time overseas, representing the Australian government. For approximately four years, I was posted to the Australian consulate general in Dubai, United Arab Emirates. That was a very exciting and rewarding experience. I have held various leadership roles, representing the Australian Government in ministerial meetings and in bilateral cooperation. At the moment I am leading Australia's review of its measurement laws to modernise them and to ensure they are fit-for-purpose, which is something we have already heard about today. This is being done to facilitate increased economic productivity and growth, which is again a dominant theme of what the last two days have been about. On the formal side, I am an appointed Trade Measurement Inspector under Australia's national measurement law, and I have carried out various duties in this role.

    So a little bit more about me and my credentials. I have held leadership roles in NMIA for close to a decade. I have also worked for our parent department, the Department of Industry, Innovation and Science for close to twenty years. I have nearly two decades of experience, both in a policy role, but also in a metrology role. I have managed teams of metrologists, trade measurement inspectors, compliance and enforcement officers, metrology specialists and others, such as laboratory and calibration experts. I have a wide level of experience, and these teams have ranged from 5 to 120 staff in various capacities. I have a background in international affairs and experience in working with international organisations, a number of which we have talked about in the last couple of days and are present in this room including the World Bank, IFC, and ISO. I have also represented Australia at the APLMF for a year. I have strong experience in budget management and preparation, and in setting, monitoring and reporting from a management and financial accounting perspective. These budgets have ranged from around 3-17 million Australian dollars, which is the equivalent of about 2-14 million US dollars, including fee-for-service revenues.

    My experience in legal metrology ranges from operational to strategic. In the operational sense, I have led teams managing trade management inspections, laboratory, administrative, postmarket surveillance, compliance, and enforcement functions. On the strategic side, as I mentioned previously, my current role is to review Australia's measurement law and framework, which was a process we went through in great detail. I also have experience in testing and certification. I have contributed to Australia's input to the new OIML Certification System (OIML-CS) through the CSPG a number of years ago, and have also worked on developing Australia's National Instrument Test Procedures (NITP) which are the post-market verification activities we undertake. In terms of committee work, a number of my staff have participated in numerous TCs and SCs of the OIML, and also Australia has led two secretariats for which my team has been responsible. These are TC 12 on electricity meters and TC 7/SC 5 on multi-dimensional measuring instruments.

    Dr Schwartz gave a detailed overview of the process of appointment, but my motivation for applying for the position was that I see it as a unique opportunity - one that doesn't come up very often - to lead an inter-governmental organisation at the forefront of standards development. This includes the strategic agenda of the OIML through the CIML, the CIML President, Vice-Presidents and Member States. I would like to cultivate new and augment existing relationships and partnerships, and to foster a culture of inquiry, collaboration and cooperation - especially among organisations in liaison and new Member States. I want to lift the profile of the OIML as an integral body in the international rule-based system, and ultimately, through this, to drive membership and increase the reach and strategic value of the OIML to the international community.

    In terms of the environment in which we are operating at the moment, I am acutely aware that the OIML has an increasingly important role to play in demonstrating its impact and worth to the international community and economy, bringing metrology thinking to more people, both in the community and in the standards-setting environment. The OIML has a critical role to play in elevating discussion, enhancing productivity and economic growth and through this, contributing to a better quality of life and access to opportunities. We must encourage trust, promote fairness and confidence to allow the market to do what it does best, and not to unnecessarily create barriers at a global level that hamper harmonised trade, but rather remove them. As has been touched on in a number of presentations, the constant evolution of metrology is an important issue, especially when looking at the drivers of industry 4.0, and looking at how metrology, and in particular legal metrology can add value.

    If I am appointed as the BIML Director, the way I will operate is to positively lead the BIML and support its staff, continuing to build upon the excellent legacy of the existing BIML Director, Stephen Patoray. I must take this moment to reflect on and to respect the work that Stephen has done in driving the organisation and making a real substantial, effective, and meaningful change over his time. He certainly will be missed. I would like to be an active and forward-thinking ambassador for the OIML. I want to continue to build upon and advance relationships with organisations in liaison, especially the BIPM, IEC, ISO, and ILAC/IAF. I want to continue to raise awareness of CEEMS and the OIML Pilot Training Centres (OPTCs) and to work to promote their benefits and achievements with the international community, and that goes beyond the legal metrology community. I also want to promote the OIML-CS and its uptake among Member States, and importantly, with industry. A core focus will be to grow the number of OIML Member States and to articulate the value and importance of being a full member of the OIML. Maintaining the visibility of the OIML worldwide is an important role for the BIML Director. I would achieve this through communicating with key stakeholders, including RLMOs.

    In leading the BIML, I will establish, document and communicate priorities, work plans and key deliverables with all staff in the Bureau in line with the priorities set by the CIML. I want to utilise the expertise and experience of the Bureau staff, and the level of depth, knowledge, and forethought that members of the BIML staff bring to each and every event and interaction never ceases to amaze and surprise me in a lot of ways. I like to operate using team strategy, priority, and operational meetings, assessing performance on an ongoing basis against key metrics. I would like to foster a culture of creative thinking and deriving solutions - where can the Bureau add value to OIML operations. As part of this, looking at a project management methodology for all Bureau projects, and possibly working with the CIML to agree to a similar framework for the operation of TCs and SCs, and I think this aligns very closely with Dr Schwartz's vision for the organisation, and the vision towards 2023.

    So my priorities would be to engage and consult with OIML Member States, RLMOs, and other stakeholders, to do it early, to do it transparently, and to do it collaboratively. To provide support for the most efficient and effective development and delivery of technical documentary standards. Having evaluation programmes upfront and at the end to look at the TC/SC/PG development process, so that we ensure that we take lessons from each and every standard we develop, and each and every project, and apply these to make the work more efficient. Working

    to elevate the profile of metrology and legal metrology through the redefinition of the SI and working closely with BIPM. And again, as we have heard over the last couple of days, to explore the development of the OIML quality assurance and infrastructure initiatives along the metrology continuum. Some of that is looking at the post-market surveillance activities and verification, which are clear components of what we all do, and looking at the best ways of having integrated and harmonised ways of doing that. I will work with the CIML to determine the feasibility of redrafting the OIML Strategy, B15, which is the strategy document for the OIML which again ties in with the 2023 strategy. Obviously this would include working closely with the CEEMS AG on the revision of OIML D1. A key component of my task, if I am selected, and that of the BIML Director more generally, is to support the CIML, the President and Member States to implement the OIML vision.

    I have broken this down into five key areas. These are leadership, trust, fairness, confidence and communication.

    On leadership, to re-iterate some earlier points: to engage Member States and BIML staff on all key matters. In an organisation as small as the BIML, each team member plays a leadership role. To grow the OIML membership. Strategy development: bottom-up and top-down. I would like to empower staff to explore new concepts to derive efficiencies in what they do and efficiencies for the entire organisation.

    Moving onto trust, my role, if I am successful, will be to provide support to Member States, CIML Members, the CIML President and Vice-Presidents. Ensure the best-practice management of an inter-governmental organisation is employed at all times, and again, to utilise the expertise of the Bureau staff, CIML Members and metrology experts. Adhering to processes and policies is also a key component of this.

    Moving onto fairness, ensuring impartiality, transparency and probity is upheld at all times and to ensure that all activities align with the Convention and policy documents to ensure that the authorising environment is there for what we do and that we don't step outside of that.

    Confidence is needed to drive the implementation of the strategic vision for the OIML as set by the President, and responding to the needs of Member States, including very importantly at the Conference. Consistently conveying the vision, objectives, purpose and defining the role of the BIML, ensuring alignment with these objectives and establishing through this a culture of risk assessment and risk management. Maintaining the reputation of the OIML is paramount to me, and to the organisation, and managing risk but working within policy and procedure documents helps maintain that reputation.

    Lastly communication. Listening to the needs of Member States, CIML Members, President, Vice-Presidents, CEEMS, OIML training centres, and basically anyone we talk to, that will reflect in communicating the vision, articulating the roadmap and providing guidance to practically realise the vision.

    In summary I have a genuine desire to develop and grow the organisation. I believe I have a good match of both technical and non-technical skills, gained, as I have said, through approximately ten years with NMIA, and about twenty years within our parent department. I am flexible and open to change, but adherence to policy and procedure is important to me. I have a commitment to the role of metrology. I think I have advanced diplomatic, international and representational experience, and I feel that I am adaptable, agile and resilient.

    Moving on to my family, if the selection committee's report is endorsed by the CIML, we look forward to the next phase of our life in Paris. We have a strong desire and interest in advancing our French language skills and proficiency. We have already shortlisted some schools for our children which will meet their educational and language needs, although we have not yet made any commitments.

    Lastly, progress to date. Time periods as outlined by the President have been arranged. Some hand-over arrangements are in place with the current Director and the staff, and I will

    participate at the CGPM meeting regarding the re-definition of the SI. I have been undertaking French language study at an Australian university since earlier this year, and I am already at level A1.3, This will continue, to enable bilingual communication with the BIML team and others. If the selection committee's report is endorsed by the CIML, I am able to assume the role of Director Designate from 1 November 2018, in order to overlap with the current BIML Director until the end of December 2018, and will be ready to officially take over as Director at the beginning of January 2019.

    I thank you for the opportunity to be with you today, and I thank you for your patience and attention in listening to what I have to say.

    Dr Schwartz thanked Mr Donnellan for his presentation and asked the Committee if there were any questions before the closed session at which both his report and Mr Donnellan's presentation would be discussed. He pointed out that nominating a candidate for a new post was always a sensitive issue. He said that during the coffee break he had already been asked why Mr Donnellan's CV had not been circulated. He explained that in his experience at the PTB, circulating CVs and more detailed personal information was always a very sensitive issue, and he had been reluctant to circulate, even on a restricted basis, more than the letter he had sent to them prior to the meeting because they had to consider the possible adverse effects on the candidate. He hoped that delegates understood why they had not received more information, but that they nevertheless had trust in the process he had described, and again he asked delegates if they had any questions for the candidate.

    Dr Klenovský (Czech Republic) asked if he had understood correctly that Mr Donnellan had a degree in economics.

    Mr Donnellan confirmed that this was correct. He added that he had an undergraduate degree in economics and a master's in public policy and post graduate qualification in management communication.

    Mr Awosola (United Kingdom) said he had noticed that Mr Donnellan had mentioned his plans to grow OIML membership. He wondered if he could expand on this by giving more details of how he intended to achieve this. He asked if he was implying that he would try to target Corresponding Members, to get them more involved in the technical work of the organisation, or was he simply saying that he intended to increase the membership.

    Mr Donnellan replied that his initial response would be that there were, he believed, multiple strategies to try and increase the membership, which he considered for an international organisation had a very strong global reach and penetration which he wanted to emphasise at the outset. He acknowledged the existence of this element, and stressed that it was always the intention of the OIML and other organisations to convert Corresponding Members to Member States. He believed that this would be to the benefit of, and in the interest of, both Member States and Corresponding Members to participate more through that process. He also thought that another strategy would be to demonstrate to those economies that were neither Corresponding Members nor Member States the value of being part of the OIML, and that work was multi-stranded in terms of helping to harmonise international trade, opening up markets through quality infrastructure programmes of which legal metrology was a key component, and also ensuring that their voice was heard on a global scale. He believed there was some work that could be done to articulate this value proposition, and another strategy was to work with Corresponding Members, to listen to what their needs were, and to ensure that the organisation met those. There were multiple ways of doing this and demonstrating that the work that TCs, SCs and Project Groups did was of value to those economies now and into the future.

