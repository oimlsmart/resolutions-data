- number: 12.1.1
  title: Approval of Final Draft Recommendations and Documents
  narrative: |2+

    The first item was the approval of the Final Draft Recommendations and Documents that had been put before the Committee. Mr Dunmill reminded delegates that the voting rules for the approval of Recommendations required that at least 75 % of CIML Members be present or represented for the vote. He indicated that as they would have seen from the figures announced by Mr Patoray after the roll call,

    this requirement was satisfied. On each item, a vote must be cast by at least 80 % of those Members present or represented (abstentions not counting as votes cast). Finally, 80 % of the votes cast had to be in favour. They would be carrying out the voting in a similar fashion to how they had proceeded previously, in other words, he would be asking if there were any comments, abstentions, or negative votes. Finally the votes would be counted to see whether the approval had been given or not.

    ## R 139 Compressed gaseous fuel measuring systems for vehicles

    The first item was the revision of R 139 Compressed gaseous fuel measuring systems for vehicles which had been submitted to a Preliminary CIML Online Ballot with a deadline of 14 June 2019. 35 responses had been received from a total of 62 CIML Members. Two abstentions had been given, there were no negative votes, and 33 yes votes. He asked whether there were any further comments on this revision. There were none. There were no abstentions to the approval of this revision. There were no negative votes. The revision of R 139 was approved unanimously.

    ## New Document: Guide for the application of ISO/IEC17065 to the assessment of certification bodies in legal metrology

    The second item was a new Document Guide for the application of ISO/IEC17065 to the assessment of certification bodies in legal metrology. There had been a Preliminary CIML Online Ballot with a deadline of 18 July 2018. 42 responses had been received out of the 62 CIML Members and there had been no abstentions and no negative votes received during that ballot, with 42 yes votes.

    Dr Schwartz wanted to explain the situation regarding this Document so that the right decision could be taken. This Final Draft Document had been uploaded ten days after the three-month period that was normally given to CIML Members, so strictly speaking it was late. He wanted to clarify whether Members were happy with this situation, or whether they objected to voting on this Final Draft Document because of the delay, and although he hoped that nobody would object because this would delay the publication further, he had wanted to address this situation and make them aware of it. There were no objections to the vote being held at the current time despite the small delay.

    Mr Dunmill noted that there were no further comments. There were no abstentions. There were no negative votes. The Document was approved unanimously.

    Mr Dunmill added that for both of the Documents which had just been approved, one recurring problem that he wanted to mention once again was the low level of response for online CIML voting. As he had indicated, there had only been 35 responses for the first Final Draft Document, and 42 responses for the second. This gave the Bureau a lot of trouble in gauging the level of support for Recommendations, so he wanted to once again request that Members vote within the deadlines when a Draft was put to them for Preliminary Online Ballot or for CIML online approval (as stipulated in OIML B 6).

    Mr Dunmill stated there was one resolution, as he had already mentioned. He read the resolution; there were no objections. There were no negative votes and the resolution passed unanimously.

