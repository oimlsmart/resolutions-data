- number: '10'
  title: Countries and Economies with Emerging Metrology Systems (CEEMS)
  narrative: |2+

    Dr Schwartz opened the session by commenting that he now wanted to concentrate on two very important items: CEEMS matters and the OIML Certification System. He said that he hoped they would be able to finish both during this session, and invited the Chair of the CEEMS Advisory Group, Mr Mason to give his report.

- number: '10.1'
  title: Report by the CEEMS Advisory Group Chairperson
  narrative: |2+

    Mr Mason greeted delegates, and joked how wonderful it was not to be chairing a CIML meeting! He stated that the CEEMS Advisory Group (AG) had been functioning for several years, and he thought this was probably the third time that there had been a meeting of the AG immediately before the CIML meeting. However, he thought it was fair to say that the meeting, which had been held the previous day had been rather different from those which had preceded it. They had considered a lot of papers, they had made a lot of decisions, and there had been a lot on their agenda. As a result, they had done a lot of work in preparing a written report of the AG's activities, which had already been circulated to delegates as Additional Meeting Document 12 a couple of weeks prior to the CIML meeting. Hopefully they would have been informed that there was also a final report, which had been made available that morning. He stated that it was essentially this final report which he would be speaking about during his verbal report. He stated that they had a little under an hour for CEEMS matters, and he was sure they would be able to fill it.

    Re-iterating that the 2018 AG meeting had been held the previous day, he said that when the AG had been set up, under the new B19, they had intended to meet once a year, with most of the work being done electronically. He commented that they had an email circulation list which allowed this, and increasingly they were mastering the use of the OIML website for these purposes as well, although he added that this was still a work in progress. He observed that it was his own lack of competence as much as anything else that was holding this back!

    Once again, he reported that there had been very good attendance at the AG meeting, with 21 of the 24 current AG Members present, and those who were not present providing proxies. He added that they had not needed to vote on anything, as they had been in agreement on everything. They had welcomed the CIML Members from Cuba and Kenya, who had volunteered on serve on the AG. He reminded other CIML Members that any of them could volunteer to join this group, observing that it did mean a bit of work since everyone's views were important in decision-making to ensure the quorum was achieved. This meant they did have to read the papers, but he thought that those who had chosen to join as individual members had found the experience useful, so he stressed that new Members were always welcome. He added that new representatives from WELMEC and GULFMET had attended, as had several observers. He emphasised that this was a decision-making meeting, and therefore was not generally open, but occasional observers were allowed, when they wanted to find out what the AG was doing.

    The meeting had lasted 90 minutes, and they had got through the agenda which he displayed to delegates. He remarked that this agenda had been quite challenging, but gave an indication of the amount of work that had been done in the name of the AG. The first item that the AG had discussed, as mentioned in the written report, concerned the updating of the CEEMS web pages. He said that many delegates would already be familiar with these, and stated that there were now clearly identified sections explaining the history and background of the CEEMS work. There was a page dedicated to the AG itself, showing its composition and structure. There was also a list of the OIML Training Centres which had been held so far, and this would be completed and updated as events took place. There was a section on seminars and workshops, and he pointed out that there had been a number of these since the original one in Chengdu, and they took quite a wide view of what was included in this category. He considered that the workshop which had been held the previous Monday was part of this series, and expected that the outcome of that meeting would later be found on the website. He reported that there was also a page which would give details of the experts, the so-called experts database, and he said that he would explain more about this later in his presentation. He specified there were also details of the CEEMS awards, which he added would be presented later in the week. He said that crucially, they now had a repository for the actual material distributed and presented during the various training centres. This was part of a vision that the CEEMS section of the OIML website should contain a lot of material that delegates might find useful. In addition to this, the AG had agreed earlier that week that they would be signposting more clearly the e-learning material which they had discussed in previous years, a link to which could currently be found on the home page of the OIML website.

    The next item on which there had been substantial discussion at the AG meeting was about what he would loosely call the CEEMS logo. On looking through the website, it had become apparent that there might potentially be some advantage in highlighting the CEEMS-related sections of the website, in order to make it easier to locate them. He mentioned that delegates had seen some of the benefits of this approach, in the way that the OIML Certification System had been using its logo, and for CEEMS this might be good not just for the website, but for promotional materials, including training centres and so forth. On the other hand, it was important that such logos did not proliferate in a way that created confusion in the minds of the OIML's stakeholders, because this might undermine the promotion of the OIML's work to the wider public. The AG meeting had been able to consider some excellent designs provided by their colleagues from the PTB. Having done so, they had recognised that it was something for which there was not an urgent need, so the AG had decided to take more time to consider this. They had therefore decided that this work would be taken forward by a new ad-hoc group, which again he would be mentioning later and which would also be looking at a wider range of training centre issues.

    Mr Mason moved onto the topic of the experts database. Following the request for nominations from CIML Members, he reported they now had a database of 21 excellent experts from 10 economies, and their details would be made available on the website as soon as they had decided on the right wording for a disclaimer describing the experts' relationship with the OIML. He stressed that such a legal disclaimer was an important issue, because it needed to be made clear that these experts would typically be working on their own behalf rather than on behalf of the OIML. The OIML could not take responsibility for them, which had to be made clear. Mr Mason said that once this issue had been resolved, the database, which he recognised they had been discussing for many years, would finally be

    able to go live. Mr Mason thought that in reality some of the people on the list of experts were already being approached as their willingness to do such work became more widely known.

    Mr Mason stated that next he wanted to cover the various OIML training activities, adding that this was covered in the annual report made available to delegates, and he wanted to hand over to Mr Guo Su, who had been part of the AG secretariat for a number of years, but was now, as delegates would have heard, a secondee working at the Bureau. He said this arrangement was working extremely well and asked Mr Guo to make his presentation.

    Mr Guo thanked Mr Mason. Firstly he wanted to take the opportunity to thank delegates, and said it was thanks to the BIML and China's cooperation that he could be on secondment to the BIML to work on CEEMS issues. He wanted to thank the BIML staff, who had given him tremendous support in settling in Paris. He added that the item detailing the training course in Kenya and the review of OPTC training would be handled by the BIML Assistant Director, Mr Dunmill.

    Mr Guo said he would be providing information on the training course in China on prepackaged goods, which had been the first joint activity between the OIML and the APLMF. He specified that 70 participants from 29 economies had joined this activity, and the trainers had come from New Zealand. He highlighted that they were lucky to have Mr Phil Sorrell at this CIML meeting, who had been one of the trainers at this event, together with Mr Hans Peter Vaterlaus from Switzerland. Mr Guo reported that the training materials were now available on the OIML and APLMF websites. He showed delegates a video of this event, indicating the opening address and a class being taken by one of the trainers from New Zealand. He added that there had also been some practical sessions. He skipped through some of the video as time was short, and lastly showed a visit to the institute of metrology.

    Mr Guo then talked about the training course on prepackaged goods in Havana, Cuba, which had been attended by 27 participants from 17 economies, mainly from the Caribbean area. The trainers had been from the BIML, the PTB and Switzerland, and the training material was also now available on the OIML website.

    Mr Guo said that this year he had issued a survey, comprising six sections, on needs of CEEMS. However, because the final results had only been received two weeks prior to this meeting, there had not been time to carry out a comprehensive analysis, although he could highlight some of the needs that had commonly been identified. He summarised that 16 Member States had replied, and said he had discovered that some Members had not replied due to technical problems, which meant they had missed his email, so he would continue to collect further data. The survey had asked each Member to what extent their type approval and verification requirements were harmonised with OIML requirements, and Mr Guo showed some charts of the results which indicated that for verification, there was 73% harmonisation, and for type approval there was 67% harmonisation. Mr Guo went on to show another chart giving the results of the needs survey, which had indicated that there was a particular need for training on R 49 Water meters for cold potable water and hot water, R 76 Non-automatic weighing instruments and R 117 Dynamic measuring systems for liquids other than water. Moving on to the needs related to the OIML-CS, Mr Guo reported that almost 100 % of those who had replied had said that they were willing to participate in the system, although around two-thirds did not yet fully understand the system, or needed to clarify its benefits to them. The respondents had indicated that they would prefer to obtain this information through OIML seminars, or online. Showing another chart on how laboratory equipment was obtained, Mr Guo highlighted the fact that the survey had found that three countries were willing to share surplus equipment, and three were willing to donate it, and he asked delegates to talk to him during the breaks if they wanted more information on this. He reported that the survey had also expressed a need for training on D 31 General Requirements for software controlled measuring instruments.

    Mr Guo reported that during the year they had also developed a draft framework for OIML Training Centres, which had only been completed one week before this meeting, so AG members had not yet had time to review it fully. The draft had been developed by the BIML and P.R. China, and it made use of the experience gained during previous OPTCs in China. The document had ten sections over about 14 pages, but they knew that more training models need to be included, so an ad-hoc group, chaired by

    Mr Peter Ulbig, would study this question and hopefully finalise the document in 2019. Mr Guo said that this completed his part of the presentation and handed back to Mr Mason.

    Mr Mason said the next item in the annual report referred to the projects for which the AG had taken responsibility. The previous year they had decided that there should be a revision of D1 Considerations for a Law on Metrology, which should be carried out by a small Project Group consisting of AG members, but he thought it was right that they report to the CIML on this, since it was not within the normal Technical Committee structure. The first Working Draft had been circulated in June, and a number of comments had been received, the most important one of which was that there was a wish to make clearer the position that metrology, and in particular legal metrology, had in the wider context of a National Quality Infrastructure. This had been another theme that had emerged from the workshop the previous Monday. Mr Mason said that this reinforced messages which had been coming to him as a convener that they should actually be undertaking a more substantial rewrite of D1 that used metrology in quality infrastructure as its starting point. From this point of view, he considered that the workshop this week, as well as some other work that he would be doing in South East Asia over the next few weeks, would be extremely helpful in developing the next stage of the work, and he expected them to be able to circulate a Committee Draft fairly soon after his return from Indonesia. He continued that this would mean that this more fundamental restructuring of D1 would mean that it would not be possible to meet the original timetable for the project which had been approved by the CIML the previous year. Initially they had thought that they might manage to finish it by the following year, but actually he did not think it would be possible to complete the project until at least 2020, and indeed it may take longer, depending on just how many stakeholders became involved.

    On the question of projects for which the AG had taken responsibility, Mr Mason said that delegates would be aware, from other papers submitted to them, that there were proposals that the AG should take responsibility for the revision of two other OIML Documents. The Committee would be asked to approve these proposals the following day. They were for the revision of D14 Training of legal metrology personnel and D19 Pattern evaluation and pattern approval. He was mentioning these proposals at this point because he considered it may be a more convenient time to take comments and questions about the procedure relating to those two Documents now, rather than when they came up for consideration the following day. Mr Mason added that they had been fortunate that they had been able to find conveners for both of these projects. Germany had undertaken to provide a convener for the D14 work, and Mr Mason himself had agreed to act as convener for the D19 project.

    In summary, these were the headlines of the changes they had introduced in the workplan. This had been presented to delegates the previous year, following the 2017 AG meeting, and continued to be their core document. The papers that had been circulated during the morning involved what he thought was version 6 of the workplan. He described it as being a "living document" for the AG, and clarified that they amended it as they progressed with the work. The main items were displayed on the next two pages. The AG would continue to see work on the web pages as a priority. The work analysing the survey that Mr Guo had just described was part of the workplan, and clearly the database had to be finalised. They had also included the new work on the logo and branding, which had been added to the workplan as a result of the decisions taken at the previous day's meeting, and the D1 project continued to be part of the workplan. Mr Mason reflected that the strategy for the OIML Training Centres would be an important part of the workplan, but the significant change as a result of the discussions the previous day was that this would now be done by an ad-hoc group. He said they had originally asked themselves whether this should have been a Basic Publication, and thus that the CIML should have been asked to agree to the start of such a project, but said that they had not been convinced that it needed to be one at this stage. However, if they later concluded that it should be, he stated that obviously the CIML would have to approve this. He described these issues as being so important that they were likely to be put into an eventual strategy document and presented to the CIML anyway. Whilst they were developing the strategy, they still thought there was a need for further OTCs. Mr Guo had mentioned that a number of ideas had come out of the survey, and Mr Mason drew delegates' attention to the number of offers they had already heard during this meeting about hosting OTCs, which had included offers from Brazil and Tunisia, and he said they would continue to explore these possibilities. He also thought it likely that there would be at least one more in P.R. China as well.

    Regarding the rest of the workplan, Mr Mason said they would continue to produce their annual report, and he hoped delegates had found this format of reporting through a formal document and annexes endorsed by the AG helpful. The AG had added a suggestion to the workplan that they should be thinking about how they could deploy the World Bank QI toolkit, which they had heard about on the Monday prior to this meeting.

    Finally, just to show that their thinking continued to evolve, a suggestion had been made by Australia that they might start to carry out a "pilot CTT audit programme". He asked if there were any questions on what he had said so far regarding the activities to date, and what was in their workplan, adding that they would then move on to talk about the proposal from the AG that the CIML should work on a new resolution on CEEMS work to replace the one that had been adopted in Arcachon. He repeated his willingness to answer any questions on what he had already said.

    Mr O'Brien thanked Mr Mason for the overview of the AG meeting held the previous day and for his leadership of it, stressing that it was really important work. Regarding the expert database, he appreciated that they would be adding some legal wording about liability, and thought that this would be very useful, but he asked whether the database would include the CVs of the experts. He felt that people may need this information to be able to make a decision on whether they wanted to take on a particular expert. Mr Mason confirmed this. He conveyed that it was one of the reasons why there was a need for something that was quite technically complicated. He specified that it would have CVs, and he thought that these would be standardised as far as possible, so people could get used to looking through them and identifying potential experts that fitted their needs. Mr O'Brien's question had also made him think about something that he would address later when he spoke about the CTT document.

    Mr Mateus referred to the beginning of Mr Mason's presentation regarding CEEMS activities. Mr Mason had stated that it was possible to propose new AG members, and he asked that they consider Brazil as a new participant in the AG. He also wanted to propose that Brazil hosted a Training Centre. He clarified that they had had a special interest in the revision of D1 because they had a huge team working in this field, but had had some difficulties in participating in the discussions in Germany. He suggested that Brazil would be open generally to work with the OIML to provide training that was considered important, and was prepared to discuss this further.

    Mr Mason thanked Mr Mateus for this further confirmation of his interest in participating in the AG, which he added was very welcome.

    Mr Khedir said that to his way of thinking, the workplan was ambitious and the work necessary for its success demanded a participatory approach with the RLMOs. He gave the example of the revision of D1, where it would be better to include the RLMOs and even the SRLMOs, who could give their opinions. Concerning what had been described in the presentation on the survey, he observed that in 65% of the countries, legislation was not harmonised, and he wondered whether this would be an obstacle to the application and adoption of the OIML-CS. Regarding the strategy for CEEMS, he felt that they should be seeking the opinion of "southern countries" such as those from Africa and members of MAGMET. He thought they were very much interested and affected by this matter. Lastly, he wanted to repeat his proposition from 2016 that Tunisia be supported in setting up a training centre on metrology for francophone countries.

    Mr Mason thanked Mr Khedir for his questions. Taking Mr Khedir's last point, he added that these were ideas that they wanted to follow up. He recognised that funding and organisation were crucial, and they needed to make sure that for each of the initiatives, they could put together the right package, and he confirmed that the AG would be looking into whether this was possible. Regarding the revision of D1, Mr Mason agreed that the regional organisations had a key part to play, and in fact he said that the APLMF representative on the AG was part of the Project Group revising D1. They knew from the APLMF/APMP Guide 1 that this region had a lot of experience in producing documents which met the needs of the whole metrology community, and he added that they wanted to draw on this experience.

    There were no more questions, so Mr Mason referred to resolution 2015/10, the so-called "Arcachon resolution". He said they had regarded this as the measure of the activities concerning CEEMS for the last three years. This year, as in previous years, they had compiled an analysis which could be found in

    Annex C of the annual report, about what they had accomplished in the last 12 months relating to each of the items in the resolution. Unlike in previous years, he did not intend to go through it line by line because he considered they had found better ways of identifying the key issues. One thing he wanted to mention, however, was that there had been specific mention in the Arcachon resolution of the desire to finalise some projects which were particularly important to the CEEMS community. One of these had been the guide on prepackaging, which had been finalised the previous year, and the other had been the Conformity to Type publication. He was pleased to say that this was very close to being ready for the CIML Preliminary Online Ballot stage. He stated that the previous Committee Draft had passed the vote, but there had been some very valuable additional suggestions, which they had felt it had been worth taking into account, and since they were clear that work on OIML Documents had to follow B 6, they had felt that there should be another Committee Draft. They were confident that this Committee Draft would pass the Project Group vote, and that they would be able to proceed immediately to a CIML Preliminary Online Ballot. If it passed this, as he was sure it would, he thought they would try to do an online approval of the Final Draft Document, and he wanted to alert all CIML Members to this on this occasion. They recognised that this process would not be easy, as one single negative vote from a CIML Member could stop a final online approval, and also it was vital that they obtained "yes" votes from 50 % of CIML Members to proceed, so he pleaded with delegates to look favourably on this when it arose since it would be nice to have the Document finalised before they met next year.

    Mr Mason stated that the final recommendation from the AG was that they updated the resolution that had been passed in Arcachon. He indicated that a number of the items on it had already been addressed, there had been a number of changes, and the AG would therefore like to put before delegates an outline for a resolution, which he asked delegates to consider. He informed delegates that he would quickly describe the key elements of this proposal. He felt that a lot of it would be familiar, because a lot of what had been said three years ago in Arcachon was still valid. However, they had restructured the original resolution, so there was a more logical flow, and they had also dropped a few items. What they had not been able to identify were significant additions, so perhaps they had got it completely right in 2015, and there was nothing more to add, but the discussion on this point in this CIML meeting would be an opportunity to identify whether new things needed to be included.

    Mr Mason went through the wording of the proposed resolution. He said they would obviously expect to recall what they had done previously, and he submitted that there had been significant progress on this, and of course they now had the AG to give the CIML advice. They proposed that they should continue to instruct the Bureau, in a similar language to that used previously, to participate in capacity building activities, through the OIML Training Centres and regional activities, as well as other initiatives. He referred delegates to the significant programme of BIML activities they had already heard about.

    Secondly, the AG proposed to instruct the Bureau to continue their engagement with what had previously been known as DCMAS, and was now to be renamed as the International Network on Quality Infrastructure (INetQI), as well as identifying new initiatives to which the OIML could make an important contribution. They proposed that the resolution should instruct the Bureau to continue developing the website. He was sure that this work would be carried out even without this instruction, but this would give a clear indication of what the AG was expecting from the website. Rather than the previous resolution's explicit references to B 6, which he commented had now been "put to bed" for a couple of years, they were suggesting that the instruction now should be that further development of the systems for OIML technical work should take account of the need to involve CEEMS. The AG was proposing that there was an instruction to continue, and if possible expand, the use of the OIML Bulletin and the website to facilitate the exchange of new ideas, and new approaches to legal metrology. He expected that that they could see something about the QI toolkit, certainly on the website, and quite possibly in the Bulletin in the near future, and this was the kind of thing they were referring to. Noting the fact that research continued to be an important part of the OIML's work, the AG was suggesting that the Director should take this into account when considering projects which could be supported by the CEEMS fund, and it was fair to say that the Director had so far been very imaginative in the use that he had made of that fund.

    They also had requested those who could collectively be called the "office holders" to continue their high level engagement on the importance of metrology, particularly in CEEMS countries. This list of office holders was longer than it had been, as they now had not only the President and Vice-Presidents, and the Director and Assistant Directors, they also had the Chair and the Vice-Chair of the CEEMS AG, and there was also the Chair of the OIML-CS Management Committee. He proposed that there was a role for all of them in carrying this work forward. They were repeating their request to all Technical Committees, Subcommittees and Project Groups to take note of the demands of CEEMS, so as to ensure that the Recommendations took more account of the needs of CEEMS.

    There was a new request, specifically to the OIML-CS Management Committee, to ensure that the needs of the CEEMS were addressed in further developments of the OIML-CS. They urged Member States to consider what support they could give to future OIML Training Centres and other initiatives aimed at assisting CEEMS. At this point, he added that it was really important not just to acknowledge the substantial contribution that both Germany and P.R. China had made to the initiative, but also to acknowledge a number of other Member States that had stepped forward and contributed as hosts, and others who had made contributions by providing trainers. Again he urged all delegates to consider what they could do to help maintain the momentum. They continued to need Project Group conveners to produce publications of interest to CEEMS, and this included a wider range of countries, and hopefully more from the CEEMS community.

    Finally he drew attention to the secondment to the Bureau, and he knew it had taken a great deal of effort to arrange this, but he remarked that delegates had seen how well it was working, although it was for a finite period, and they would like to see other Member States proposing involvement in a similar arrangement, which would be of benefit both to themselves as Member States, as well as to the OIML. This summarised the resolution he wanted to propose, and he asked if there were any questions or comments.

    Dr Schwartz said that the only comment he would have was that this draft resolution had been provided in Annex D of Additional Meeting Document 12, and he verified with Mr Mason that the current wording did not differ from that in Annex D.

    Mr Mason confirmed that the wording had not changed at all. He said that one or two delegates had told him they might have some comments to make, but so far he had received none. He considered that a long resolution like this might be better considered on Friday, rather than trying to finalise it now.

    Dr Schwartz agreed, as it had only been submitted three weeks prior to the CIML meeting, and therefore the basic question was whether the Committee was ready to have an online vote. He added that they could make a decision to vote on it at the current meeting if they wished, but Mr Mason's proposal was to have an online ballot on this draft resolution.

    Mr Mason corrected Dr Schwartz, saying that the comment about the online ballot had referred to the CTT document. As far as this resolution was concerned, he would say that the Committee had the right to expect significant notice before they were asked to make decisions of this kind. However, he reminded the Committee that the 2015 Arcachon resolution had been presented the day after the AG meeting. There had been absolutely no notice of the text of that until the day on which it had been discussed. This situation was not ideal, but he thought they had the flexibility in the procedures to consider such a resolution, if they were happy to do so. He reflected on whether there was necessarily any urgency, and added that the resolution that had been adopted in 2015 could still form the basis of the next year's activities, so the OIML would not lose anything if they did not modernise it, but he said they did have this opportunity to refresh the resolution, which was the core statement of what they were trying to achieve.

    Dr Schwartz suggested it may help to summarise the proposal on the next steps once more.

    Mr Mason said the next step would be to ask the Committee whether it was prepared to vote on such a resolution, noting that there was a precedent in what they had done three years previously. If they were prepared to vote at the current meeting, delegates would have the opportunity to further amend the resolution and vote on it amongst the final batch of resolutions.

    Dr Schwartz thanked Mr Mason for his clarification. He asked if any delegates had objections to this proposal. There were no objections, so he suggested that they should discuss any necessary amendments so that they could vote on it on Friday.

    Mr Mason stated that this concluded the report of the AG, and said that both he and the AG Chair, Mr Pu Changcheng, who had been involved in much of this work through the input of his colleagues in P.R. China, and who had given valuable advice on a number of these issues, thought they had a structure which was working extremely well, and which was capable of accomplishing a lot of important work, and he hoped he had been able to share this view with delegates during his presentation.

    Dr Schwartz thanked Mr Mason for his comprehensive report on the CEEMS activities, as well as the BIML secondee Mr Guo.

    Dr Schwartz asked delegates to consider the resolution, noting the oral report, but not including the new resolution that Mr Mason had just described.

    Mr Dunmill said this was just a resolution noting the report that Mr Mason and Mr Guo had just made and he read the draft resolution. He asked if there were any comments on the wording of the resolution, and there were none. There were no abstentions. There were no negative votes. The resolution was passed unanimously. The full resolution would then be considered on Friday.

- number: '10.2'
  title: Report by the BIML on activities in connection with CEEMS matters
  narrative: |2+

    Dr Schwartz said they had one minute left for the two other CEEMS items, so he joked that Mr Dunmill should please speed up. They also had the report on the OIML Certification System to consider during this session, which was also a very important item, and he hoped that delegates would not be too tired after the long day they had had.

    Mr Dunmill agreed to be as quick as possible. He wanted to report specifically on the activities of the BIML regarding CEEMS. Mr Dunmill started by mentioning the e-learning platform which, as Mr Mason had said, was accessible through a link on the OIML website home page. They would be modifying the way this worked to make it clearer what it was about, and why people might use it.

    The e-learning platform had been established in 2017, with the help of the ACP EU TBT Programme. This programme had helped to put the platform into place at the end of their funding period. The content was something they could change themselves, with appropriate support from outside the Bureau, because they did not have the expertise in Moodle, the language used by the platform. It had been widely used, especially in the Caribbean region (the "ACP" standing for Africa, Caribbean, and Pacific, which were the regions it had originally been created for), but anyone could use it. For the moment it existed only in English, but at the very end of the ACP EU TBT Programme's activities, they had completed a translation into French, which had not yet been implemented. One of the reasons for this was that the BIML had started a Spanish translation of the content, and this translation process had shown up a number of errors in the English version, so rather than having a French version that was wrong as well, they would be correcting the errors in all languages so that finally there would be three language versions of this platform. They also had the possibility of expanding the range of courses, as well as the range of languages used, and as Mr Mason had said, there had been a discussion at the AG meeting and at the RLMO Round Table about other ongoing e-learning activities, especially in the APLMF region. They would be looking at the possibility of expanding this platform as an important resource for CEEMS.

    Mr Dunmill said he wanted to give delegates a quick summary of the Training Centre events. Mr Guo had already mentioned the initial events in P.R. China in 2016, which had been a course on nonautomatic weighing instruments, with 50 participants from 20 economies, and he drew delegates' attention to the slide he was displaying. This course had been followed, also in 2016, by a course on legal metrology management systems, where there had been 100 participants from 16 economies. At the end of 2017 they had followed a slightly different model, in that the OIML, together with the PTB and AFRIMETS, had organised the first OIML training event outside P.R. China, which had been held

    in Nairobi, Kenya, and had been attended by more than 75 participants from 26 economies. This had been followed by a prepackaging event in P.R. China, with more than 70 participants from 29 economies. Mr Dunmill drew delegates' attention to the fact that these training events attracted a large number of participants, from many regions. The last course that had been held so far had been in Cuba, in June 2018, and had been attended by 23 participants from 14 economies. He highlighted that if delegates took a closer look at the list of the economies which had participated in the Cuban and African events, there were many countries that the OIML did not come in contact with much, so it was a good way of spreading the word about the OIML and metrology issues to a wider audience. In total they had had more than 320 participants on the training courses so far, from 71 different economies. He showed delegates a map of this total represented on a slide, which indicated they were reaching people across the world.

    The last item Mr Dunmill wanted to mention was the CEEMS website, which again Mr Mason had already mentioned. He stressed that they now had a number of new pages, covering details of a number of CEEMS activities as well as making available the training materials from these courses. Of course the content of this part of the OIML website would continue to evolve and follow developments within the CEEMS activities of the Bureau, CEEMS AG, or the OIML as a whole. He stated that this was all he had to say, and hoped his presentation had been short enough.

    Dr Schwartz agreed it had been short and thanked Mr Dunmill. He commented that overall there was good momentum in all these activities, and a lot of enthusiasm. He thought this was very encouraging, and that it was very important that the momentum was maintained. He asked if there were any questions.

    Mrs Cheelo noted that through Mr Dunmill's and Mr Mason's presentations, it was gratifying to learn about how much training had been going on and how many economies had been reached, but what she wanted to know was whether they had carried out an analysis of the impact of this training. She added that it was all very well to count the numbers, but she wondered what tangible results had been achieved. She asked whether the prepackaged goods training, for example, had enabled people to go out and do what they needed to do having received their training.

    Mr Dunmill agreed with Mrs Cheelo's concerns. At the moment they only had the numbers, as the follow-up to these training courses was something they were planning to do later. He said that following the last event on prepackaging in particular they should be able to see tangible results. They had not carried out assessments immediately, such as a sheet filled in by participants while they were still at the course, precisely because they needed to go back to their countries, they needed to put something into place, and they needed to see whether the training had provided them with the tools required to improve the way the work was conducted.

    Dr Schwartz thanked Mrs Cheelo for her valid point. He agreed that they needed to consider the implications and impact of the training, and should consider assessments to check whether what they were doing was sustainable, did have an impact, and was worth spending the OIML's resources on. He added that it would certainly be taken up by the CEEMS AG. He asked if there were any other comments.

    Mr Khedir thought that the preoccupation of the OIML seemed to be to increase the number of members, which he thought was an objective that left him reflecting about certain possibilities. He proposed that the e-learning platform could be opened up by translating it into Arabic, which may increase the number of OIML members.

    Mr Dunmill said that at the moment some OIML publications were available in Arabic, and had been translated by some of the Arabic-speaking countries, he thought by Syria and Jordan. Otherwise, the official policy of the Organisation was that it had one official language, which was French, and English was the working language, which was why those two languages were used for all publications. Regarding the content of training materials, he added that in the past they had been reluctant to use languages which they could not at least have some way of checking within the Bureau. They could consider other languages in the future, but he thought it would depend on a wider policy decision.

    Dr Schwartz asked if there were any further comments.

    Mr Dixit was thankful for the work carried out with CEEMS, and the support of the OIML in providing training to different economies. He requested that the training should be rotated to, and held in other economies, so that people could understand each other's economies, and the knowledge would be transferred faster.

    Dr Schwartz affirmed his comment would be noted. There were no further comments, so he asked the Committee to consider the respective draft resolution.

    Mr Dunmill read the resolution and asked if there were any comments on its wording. There were no comments. There were no abstentions. There were no negative votes. The resolution was passed unanimously.

