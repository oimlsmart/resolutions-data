    Dr Schwartz established that they had a quorum, so they could now look at the first draft resolution under item 11.1. Mr Dunmill read:

    The Committee,

    Notes the report of the OIML Certification System (OIML-CS) Management Committee (MC) Chairperson, and

    Thanks the members of the Management Committee, the Review Committee and the Maintenance Group for their work.

    There were no comments. There were no abstentions. There were no negative votes. Resolution 2018/17 was approved unanimously.

    The next item was under 11.2.1. Mr Dunmill read:

    The Committee,

    Noting the recommendation of the OIML-CS Management Committee,

    Approves the Final Draft revision of B18 Framework for the OIML Certification System (OIML-CS).

    There were no comments. There were no abstentions. There were no negative votes. Resolution 2018/18 was approved unanimously.

    The next item was under 11.2.2. Mr Dunmill read:

    The Committee,

    Noting the recommendation of the OIML-CS Management Committee,

    Having regard to subclause 15.5 of B 18:2017 Framework for the OIML Certification System (OIML-CS),

    Decides to maintain R 60:2000 and R 61:2004 in the OIML Certification System,

    Having regard to subclause 15.3 of B 18:2017 Framework for the OIML Certification System (OIML-CS),

    Decides that the category of measuring instrument covered by R 49 will transition from Scheme B to Scheme A on 1 January 2019,

    Decides that the categories of measuring instruments covered by R 51 and R 117 will transition from Scheme B to Scheme A on 1 July 2019,

    Decides that the categories of measuring instruments covered by R 46 and R 137 will transition from Scheme B to Scheme A on 1 January 2020,

    Decides that the categories of measuring instruments covered by R 61, R 85 and R 129 will transition from Scheme B to Scheme A on 1 July 2020,

    Decides that the categories of measuring instruments covered by R 21, R 50, R 75, R 99, R 106, R 107, R 126, R 134 and R 139 will transition from Scheme B to Scheme A on 1 January 2021 and

    Decides that on 1 January 2019 the categories of measuring instruments covered by R 16, R 35, R 58, R 81, R 88, R 93, R 102, R 104, R 110, R 122, R 128, R 133, R 136, R 143, R 144, R 145 and R 146 enter the OIML-CS in Scheme B and will transition to Scheme A on 1 January 2021.

    Mr Dunmill added that Mr Dixon had just informed him that R 59 should have been included in the list in the final point of this draft resolution.

    Dr Schwartz added that concerning the discussion on R 117, he suggested that they take this out of the current resolution so there would be time to discuss this before they came back with a separate resolution on R 117 the following day.

    Mr Dunmill made the necessary editorial changes accordingly.

    Mr Mateus had just realised that R 91 on speed meters would not be entering this Scheme, and asked whether there was a specific proposal on this.

    Mr Dixon replied that R 91 did not fulfil the requirements to be included in the system. He reminded delegates about the comments made by Ms. Cheelo the previous day, in which she had expressed the very real desire to include this in the system. They would need the revision of R 91 which would have the required number of parts, and met the requirements of the OIML-CS to make a proposal for it to be included.

    Dr Schwartz stated this was exactly why he had proposed to prioritise the Recommendations and to speed up the work on certain Recommendations which were considered very important, and which needed to be made fit for the Certification System. He summarised the changes made to the amended resolution, confirming that R 59 had been added and R 117 deleted.

    Mr Dunmill asked if there were any further comments. There were none. There were no abstentions. There were no negative votes. Resolution 2018/19 was unanimously approved.

    Mr Dunmill asked delegates to consider resolution under item 11.2.3. He read:

    The Committee,

    Noting the recommendation of the OIML-CS Management Committee,

    Decides that responsibility for D 29, D 30 and D xx Guide for the application of ISO/IEC 17065 to assessment of certification bodies in legal metrology shall move from TC 3/SC 5 to the OIML-CS Management Committee (MC),

    Decides that project TC 3/SC 5/p 5 (development of D xx Guide for the application of ISO/IEC 17065 to the assessment of certification bodies in legal metrology) will be completed under TC 3/SC 5 before responsibility for the Document is moved to the OIML-CS MC,

    Decides that project TC 3/SC 5/p 12 (revision of D 30 Guide for the application of ISO/IEC 17025 to the assessment of Testing Laboratories involved in legal metrology) shall move to the OIML-CS MC,

    Instructs the OIML-CS Executive Secretary to establish a Project Group under the control of the OIML-CS MC to revise D 30 Guide for the application of ISO/IEC 17025 to the assessment of Testing Laboratories involved in legal metrology, and

    Instructs the OIML-CS Executive Secretary to request that members of TC 3/SC 5 and members of the MC confirm their participation as P- or O-members in the Project Group and, where applicable, to nominate main contacts and contacts.

    Mr Dunmill asked if there were any comments.

    Mrs Lagauterie said she did not have any objections, but sought reassurance that when the OIML-CS took charge of this project, it would function in the same way as all the other Project Groups, and would adhere to the rules laid out in B 6.

    Mr Dixon confirmed that they would be following the rules that were specified in B6 for the development of this revision, as well as for any other similar projects in the future.

    Mr Dunmill noted that there were no other comments. There were no abstentions. There were no negative votes. Resolution 2018/20 was approved unanimously.

    Moving on to item 11.2.4, Mr Dunmill read the draft resolution:

    The Committee,

    Noting the recommendation of the OIML-CS Management Committee,

    Decides that when an OIML Recommendation that is included in the OIML-CS is revised, the relevant Project Group shall develop a comparison table ("gap analysis")

    Decides that new and revised OIML Recommendations that are to be included in the OIML CS shall include separate type evaluation report and test report formats, and

    Approves as a new project under the responsibility of the BIML, the revision of B 6 Directives for OIML technical work, to be conducted as specified in the project proposal provided in Addendum 11.2.4 to the working document for this meeting.

    Mr Dunmill asked if there were any comments on the wording of the resolution.

    Mrs Lagauterie asked after what date this resolution would be applied, because if there was a Recommendation which was currently under revision, or just about to be approved, this would be extra work which would have to be carried out immediately. This might slow down the approval of a Recommendation, and she added that obviously she was particularly thinking of R 117.

    Mr Dixon said that the project would start immediately, and although he understood that the question related to existing projects revising Recommendations, he was not sure he was the correct person to answer this.

    Dr Schwartz added that he was not in the position to answer this question at present, but said that he would reconsider it. He said he could not see all the implications at the moment and asked if anybody else had any advice.

    Mr Richter stated that he had earlier been going to ask a similar question to the one that Mrs Lagauterie had just asked, but that the comments period had been shut down abruptly. He thanked Mr Dixon for acknowledging that what was being asked here was extra work for conveners and for Project Groups. It was not a small amount of work, especially when dealing with a very large document. He would very much like to know whether this was going to be expected immediately for all projects. He said there were several projects which had been underway for several years, so comparing earlier editions to the revision was not just a case of looking at two different drafts, it could be looking at many different drafts where extensive changes had been made. As far as the separation of type evaluation reports and test report formats was concerned, he also agreed that this was a good idea, but in many cases it was not going to be a small amount of work, so in addition to the French CIML Member's question on whether this was going to apply only to new projects or whether it would apply to existing projects, yet another nuance would be that some of the Recommendations had multiple editions which were still being used in the Certification System. For example, in the case of R 117, certificates were still being issued to the 1995 and 2007 editions, and would soon also be available to the 2019 edition. He questioned whether a gap analysis would be necessary which compared all three editions. These were all questions that he considered needed to be addressed.

    Dr Schwartz said that following a quick discussion, he would say that this just concerned new projects and would not affect current projects. He would recommend that each and every project that was currently running should be completed as soon as possible according to the rules in the existing B 6. Conveners should not wait, and delay the technical work, just to wait for a revised version of B 6. If this meant that the revised R 117 had only three parts and lacked a gap analysis for the time being, this could always be added as an addendum or amendment. He said that he would recommend not to delay any projects by waiting for a new revision of B 6, which he considered would probably be revised several times, and he hoped that this helped to clarify the situation.

    Dr Schwartz asked if delegates were now ready to vote on the resolution on item 11.2.4.

    Mr Dunmill noted that there were no abstentions. There were no negative votes. Resolution 2018/21 was approved unanimously.

    Dr Schwartz thanked everyone for all the work that had been successfully accomplished, for the progress that had been achieved, and thanked the Management Committee.

    Mr Dixon thanked delegates for their support.

