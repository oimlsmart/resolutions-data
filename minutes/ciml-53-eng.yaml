- number: '4'
  title: 1 Report by the Selection Committee Chairperson
  narrative: |2+

    Dr Schwartz explained that the members of the selection committee had been himself, acting First Vice President Dr Yukinobu Miki (Japan), Mr Bill Loizides (Australia), Dr Chuck Ehrlich (USA), Mrs Corinne Lagauterie (France), and Ms. Himba Cheelo (Zambia). Regarding the selection process itself, B13 stated "the selection committee will examine the candidacies in the following manner. The chair of the selection committee, after consultation with the other members of the selection committee, shall pre-select one or several candidates to be interviewed". He called this a pre-selection process and then continued "the selection committee will then meet with the pre-selected candidates to evaluate them", and finally "the Selection Committee shall propose to the next CIML meeting the person to be appointed, following this evaluation". He emphasised that B13 clearly stated "the person to be appointed" and so re-iterated that it was clear from these words that the selection committee should propose just one candidate. He judged that B13 had been closely observed. The call for candidates for the post had been circulated on 3 November 2017, three weeks after the CIML meeting in Cartagena. Candidates had been encouraged to familiarise themselves with the contents of the OIML website, and they were also reminded that submissions must include a detailed CV, a certified diploma, certified transcripts, two references, and a personalised letter of motivation. Dr Schwartz noted they had received 13 applications by the deadline of 1 February 2018.

    He then presented the results of the pre-selection process. Based on the criteria mentioned in the call for candidates, a detailed review sheet had been developed for the selection committee to pre-select the appropriate candidates for interview. This sheet contained ten criteria which had been mentioned in the call for candidates, and each member of the selection committee had been asked to rate each candidate against these criteria. Four possible ratings for each of the criteria had been used:

    - the candidate met the criteria convincingly and additional information had been provided as requested;

    - the candidate met the criteria convincingly but some questions remained;

    - the candidate did not meet the criteria convincingly but showed some promise; or

    - the candidate did not meet the criteria at all.

    The ratings had been collated in a table, and the selection committee met on 2 March 2018 to discuss the ratings and the implications, as well as to select the highest-ranked applicants for interview. Following this pre-selection process, six candidates had been invited for interview.

    The interviews had taken place on 13 and 14 June 2018 at the BIML in Paris. As chair, Dr Schwartz said that he had developed an interview guide which addressed all the criteria from the call for candidates to make sure they were all being considered, and so that there was a sound basis for the decision. He reported that, in his experience, this also provided the necessary confirmation that each candidate has been treated equally. Each interview had consisted of four parts:

    1. there had been a twenty-minute presentation by each candidate, during which they had been asked to demonstrate their experience, their motivation in applying for the post, and their vision as director if selected. Although twenty minutes was not long, this enabled the selection committee to assess the candidates' abilities in making succinct presentations;

    2. there had then been a sixty-minute interview, based on the interview guide;

    3. this was followed by a ten-minute clarification of various issues;

    4. following this, finally each candidate had met the BIML staff members for thirty minutes. He observed that from his experience with the interview process at the PTB, it was important that candidates should be able to see the work place and meet the people they would be working with, and also to obtain feedback from staff members. Although there had been some initial hesitancy concerning this concept amongst the BIML staff, he had helped them to prepare for this, and confirmed that they had finally been convinced about the process.

    Four candidates had been invited back for a second interview the following day for twenty minutes to clarify remaining questions arising from the discussions after the interview, or from the feedback provided by the BIML team.

    The selection process had taken three whole days. On the last day, the ratings had been reviewed again, together with the information they had received from the interviews and the feedback from the BIML staff, and the selection committee had taken a unanimous decision. The selection committee therefore proposed Mr Anthony Donnellan from Australia as the candidate for appointment as the new BIML Director. Mr Donnellan's current position was as Senior Manager in the legal metrology branch of the National Metrology Institute of Australia. He would be available as Director Designate from 1 November 2018, and as Director of the BIML from early January 2019. Dr Schwartz suggested that Members first listen to Mr Donnellan's presentation, then discuss his candidacy with him, and if necessary, move to a closed session to discuss this and the selection committee's report in preparation for their decision under agenda item 14 the next day. He said he would strongly recommend that they followed the proposal of the selection committee and appoint Mr Donnellan as the new Director of the BIML. He asked Mr Donnellan to make his presentation, and recommended that the Committee should then take the opportunity to ask Mr Donnellan and himself any questions.

- number: '8'
  title: 1 Approval by the CIML of the 2017 accounts
  narrative: |2+

    Mr Patoray said this report would be a little more involved, with a little more detail. He commented that some delegates had experienced his reviews of the accounts in previous years, and these always followed a similar format, with his presentation adding details to the figures. He wanted to mention that in some of the presentation he would be making during the course of the morning, the numbers and text on the presentation may be a little too small for some delegates, and indicated that delegates could find PDFs of his slides amongst the Additional Meeting Documents on the OIML website. He added that at the end of the meeting, all presentations would be made available as usual. Despite this, he had taken the time to ask the staff to add these slides to the Additional Meeting Documents because of the setup in the room.

    He showed delegates a statement from the independent auditor indicating that the OIML met all the requirements of the IPSAS standards. He said there was an English translation for all those who were not proficient in French, but basically it said that the final accounts for 2017 provided an accurate picture of the financial situation of the OIML, and were in conformity with the IPSAS standards and also with the resolutions that had been passed by the organisation itself. He specified that the statement was signed by the chartered accountant.

    Mr Patoray said his first graph showed the total charges. The graph showed the budget going through to 2020 in blue, and the actual expenses in red. The orange lines indicated the budget years, so delegates could see where the budget periods fell, and the green line indicated his time at the Bureau. The actual expenses were slightly lower than the budget, and he felt they were doing reasonably well.

    The second graph showed the total amount spent on meetings, travel and accommodation. In this case, the expenditure had been slightly above the budget. This was partly due to the amount he had travelled in 2017, which he said he had already mentioned. It was also due to the amount of travel that had been carried out promoting the OIML-CS.

    The next slide showed the total net assets, and he indicated that these had increased substantially since he had arrived in 2011. They were now stabilising, because the work on the building had been completed and he would therefore expect that the net assets would now remain the same, or drop slightly, as the cash in the reserves was reduced.

    The next slide showed the year-end cash. He emphasised that this included all the cash. This was not just the reserves, but included all the cash in the bank. It included all the funds that had come in to the Bureau during the last quarter and had not yet been spent, and any surplus from the previous years that

    had built up in the cash accounts, in addition to the reserves. He specified that the reserves were currently set at about €1.2 million, a sum that had been set at the last Conference. This was relevant to the discussion to be held under item 8.5.1 on the budget surplus and the reserves. He said the cash had been increasing since 2008, even though the intention had actually been to reduce it during this period. He explained that this had been the time at which the MAA had been under development, and the funds to pay for the extra people involved in the MAA had come out of the cash.

    The next slide showed the full accounts from 2017 and he admitted that this was a slide that delegates might find difficult to read, and for which they may like to refer to the copy provided as an Additional Meeting Document. He said he would now go through each section separately. Regarding the results, he said that for delegates who were interested in the bottom line, he had again not spent all of the funds in the budget for 2017. He said that this was not just due to his natural cautiousness, but also due to the fact that they had had a little more cash income than they expected. For those delegates who were not familiar with the budget which had been passed by the Conference in 2016, he drew attention to the fact that there was an intentional negative number. This was the sum of $ \epsilon $ 100 000 allocated in the current year to pay for the training of conveners and secretariats. The amount of $ \epsilon $ -92 700 included the amount of $ \epsilon $ -100 000, so in summary, the budget for 2017 was supposed to be $ \epsilon $ -92 700, but in fact the result had been only $ \epsilon $ -44 488.

    Looking at the results in more detail, Mr Patoray first detailed the income. With regard to Member States, and with the change to accrual accounting, the amount expected to be received is the same as the value of the invoices sent out, and since there had been no change in the number of Member States, it would be expected that there would be no change in the income. The number of Corresponding Members had increased by one, so there had a been a slight increase in the income from this additional fee. He drew delegates' attention to the fact that the large increase in income was due to certification, since the fees that had come in 2017 had been substantially higher than expected. In his opinion this was because the Basic Certificate System and the MAA had been shutting down. Manufacturers had known this, and had tried to push as many certificates through in 2017 as they could. The laboratories had done a tremendous job pushing that many certificates through which had resulted in an increased income of €30100. The total income had therefore been €27311 more than expected.

    Mr Mathew (Switzerland) intervened. He said he did not understand what the line labelled "total coefficient" referred to.

    Mr Patoray replied that this referred to the way in which Member States were classified to decide what their contribution should be. The Convention specified four classes according to population. Each class then pays a different number of "base contributory shares" of the overall budget: countries in class 1 pay one share, those in class 2 pay two shares, those in class 3 pay four shares, and those in class 4 pay eight shares. The "total coefficient" figure indicated the total number of base contributory shares for each year, which varied depending upon the number of Member States and their classifications.

    Mr Patoray continued by specifying the charges. He reported that in 2017 they had still had a contracted person instead of a permanent Assistant Director, so the fees for this position had not been as high as he had anticipated in planning the budget. They had therefore not quite spent the total amount allocated for the active staff. Also, with regard to the pension system, one of the members receiving the pension had died, so they were no longer receiving a pension. He said he had also planned for inflation to impact the pension amount, and in France inflation had been very low, so it had not had the impact he had anticipated. The total staff costs had been $ \epsilon $ 48034 less than anticipated.

    In the area of running costs, they had spent a little more than anticipated. These costs included those to keep the building operating such as water, electricity, and expenses of that nature. He indicated that although the renovation of the building had been completed, there was still some maintenance being carried out and these charges had been higher than anticipated. With regard to the administrative costs, these had been reasonably in line with the budget. He specified that these costs included supplies, maintenance related to administration, documentation, phones and other fees. He indicated that there were sub-accounts under each of these headings, some of which had their own sub-accounts. They therefore had a detailed account of what was being spent on each of these items. The expenditure on

    communications had also been close to the budget. He specified that there had been a substantial increase in the amount spent on the website because of the increasing use and capability of the website.

    With regard to the amount of money spent on meetings, it had been very close to the budget. The meeting in Cartagena had been the first one where the OIML had paid for the entire meeting, and this had included a seminar to present the then new OIML-CS. He re-iterated that the costs of travel and accommodation had been greater than budgeted. He repeated that this had been due to his own travel, as well as the work that Mr Mason had been finishing. It had also been due to the travel deemed necessary in order to promote the OIML-CS. The miscellaneous costs had been a little higher than anticipated. As miscellaneous costs rose, he said they tried to identify what they were and where they should be located, because he did not think there should be this amount under this heading. He hoped that by next year the amount to report under the miscellaneous heading would be much less.

    In the search for the new Assistant Director, they had not spent anywhere near what had been anticipated. In particular, the anticipated travel costs had not been as high as expected. In the special funds, they had been able to spend a little bit more than had been anticipated in the budget for that year. This had been the first time that the CEEMS budget had been overspent since the time it had been set up five years ago. He highlighted that the main expense had been a regional OIML Training Course (OTC) Mr Dunmill had organised in Kenya at the end of the previous year. The OIML had also received very significant support from the PTB. This was the way when the organisation was dealing with what would have been called developing countries in the past, countries that did not have a lot of money, that the OIML was able to provide some funding as well as the PTB which had provided a substantial amount of funding to able to set up this event, and get the experts there.

    In the case of the training for technical work, €100 000 had been budgeted and only €63 882 had been spent. The cost of Mr Vinet's work as a contractor was included in this expense. During the training they had found that it had been much easier and more economical for two people to travel to a region and gather people in a region than it had been to bring people to Paris. In this way, the participants had few costs as they did not have to travel. In many cases, even when they had come to Paris, participants had not charged the OIML anyway. They had insisted it was easier to claim their travel expenses from their own organisations instead of having the OIML reimburse them. This had been one of the major reasons they had spent less than anticipated. He underlined that this would be accommodated in the forecast.

    With regard to depreciation, Mr Patoray said they were "running a bit high". There had been the cost of the protection of the OIML logo which had been put under capital expenditure when he had expected it to be classed as an expense. In addition, they had not lost any Members, so all the uncollected fees were also included under the heading of depreciation.

    He understood that some delegates were interested in the costs related to the OIML-CS. He repeated that the revenue had been greater than anticipated because more certificates had been registered. He added that the costs of the OIML-CS in the current year had also been much higher, mainly because of all the promotional and travel expenses, as well as BIML staff members' time at the start of the OIML CS, such as for setting up the website. He underlined that these costs would not continue to be so high, and it had been useful that additional revenue had been generated by certificates.

    To summarise, Mr Patoray said that the staff costs had been greater than anticipated, but overall the costs had been relatively in line with the budget, with the exception of the travel and accommodation, mostly due to the promotional activities of the OIML-CS. In total, a little more had been spent than had been anticipated. In all about 50 000 less than had been anticipated in total for 2017.

    This concluded Mr Patoray's presentation, and he asked if there were any questions. There were no questions. Mr Patoray joked that this was either really good or really bad. He hoped that it was a really good sign. He said he had tried to provide a little more detail with extra drop downs, and on the PDF this would be one sheet. He said he had tried to provide more detail on this occasion so that delegates could understand the reason for the over- or under-spending.

    Dr Schwartz considered that everyone was happy with the detailed, comprehensive, and clear report that Mr Patoray had given. He re-iterated the remark he had made during his report: Members had the

    impression that the global financial health of the Organisation was good. He thanked Mr Patoray for his achievements in bringing the finances back to a good situation.

    Mr Dunmill stated that there had to be an approval of the 2017 accounts, and read:

    The Committee,

    Noting the accounts for 2017 and the BIML Director's comments,

    Considering the external auditor's approval of the 2017 accounts,

    Approves the 2017 accounts, and

    Instructs its President to present them to the 16th OIML Conference in 2020.

    Mr Dunmill asked if there were any comments on the wording of the resolution. There were no comments. There were no abstentions. There were no negative votes. The resolution was adopted unanimously and the accounts for 2017 were approved.

- number: '8.5'
  title: 1 Discussion on future budget surpluses and level of reserves
  narrative: |2+

    Mr Patoray commenced his presentation by stressing that the main word on his first slide was "initial" which was written in blue and bold. He confirmed that he was not expecting a decision to be made at present. He explained that he would present his thoughts on this topic, but acknowledged there would

    be many other opinions, mainly because it had to do with money. All budgets were tight, and in most countries, governments were trying to reduce costs, and specifically trying to reduce costs in relation to international treaty organisations such as the OIML. He recognised that national governments always questioned whether there was merit in the way they were spending their money, and whether it was worth their time and effort, or whether it would benefit their own people more if it were spent in another way. He stressed that discussing what to do with money was always a sensitive topic.

    This presentation would consider his experience with the accounts at the Bureau, his experiences with Members, and the ability of the organisation to take the next step. He emphasised that it was only an initial discussion, was only the opinion of one individual, and acknowledged that Members had important opinions on this topic. He said they could be expressed before the Conference in 2020. His presentation would include some "numbers", and he added that he particularly liked accounting and considered it was part of his obligations to maintain the financial condition of the organisation in a solid fashion.

    He explained that at the 15th Conference in Strasbourg in 2016, a resolution had been passed giving the Committee a policy for the reserve funds and the purpose for which they should be used. Although this was a simple resolution, it would require a complicated answer. He listed some of the things the organisation should consider. These included the fixed four-year budget and associated subscription fees, which the Convention clearly stated could not be changed during that period. He said that new Members might always join the OIML, so additional funds might become available during a given budget period, and added that the Convention did not address this at all. It did not say that fees from other Members should be reduced as a consequence of a new Member joining, it just said the Organisation had additional funds, which would then be "surplus" during that budget period.

    However he said that, as they had already discussed, one or more Member States could just decide to leave the OIML, or just stop paying for a year or two, or they might not be able to pay for other reasons. The years 2008 and 2009 had been disastrous for most countries around the world, but there were also countries with problems right now, due to political or environmental issues which they faced every day meaning that they did not have the funds to pay this Organisation. He stressed that they needed to be able to accommodate this, whilst being sensitive to the issues. Mr Patoray said they knew that Members did not all pay at the beginning of the year, which he referred to as "slow pay", but which is in fact termed "arrears".

    He also drew Members' attention to the ongoing expenses of the OIML, which included salaries maintenance of the building and the other costs to keep the Organisation running. He stated that most of these costs were fixed and planned in advance. Items such as salaries were obviously included in this, but so were the costs of the meetings, and here he pointed out that the Bureau was already having to put down deposits for the 2020 meeting.

    To keep the websites and servers running the fibre into the building had to be maintained and the servers had to be kept running.

    He recognised that when it came to travel there could be more flexibility.

    Mr Patoray remarked that there was no penalty for Members that did not pay. He declared that if your electricity bill was not paid on time, usually there was a fee or a penalty to pay as a consequence, or maybe the electricity would be shut off, but in the case of the OIML, after three years of non-payment, a Member State or Corresponding Member would be de-listed. There was no possibility of making up non-payments from other Members. He stated that there were some organisations in which, if one of its Members did not pay in a given year, their subscription fee was re-allocated in the next year to all of the other Members to make up for the loss. If the Member failed to pay the following year, then again the fees were re-assessed to adjust for this. This made for a complicated system, but the reality was that this Organisation did not do this, based on its Convention. Mr Patoray went on to underline that there was no other source of funds. He added that they were not a division of some larger organisation as was the case for certain specialised agencies of the UN, where money could be taken from one place and put it in another if required. Lastly, the Convention stated that the OIML could not borrow money.

    Mr Patoray went on to discuss the reserves. He stated that it was up to the Conference to decide for a particular financial period. The overall credit was the subscription fees paid by Members, based on the €14000 that had been decided as the "base contributory share". There was then an annual amount to be placed in reserve to meet essential emergency expenses, which covered what he called the "slow pay". He highlighted that this quarter, if the Bureau did not receive the outstanding $ \epsilon 5 6 0 \, 0 0 0 $ , the Bureau would be faced with not being able to pay its costs, so the money would have to come from the reserves. In addition, the reserves covered the situation of the income proving insufficient, for example if a large Member State failed to pay.

    Article XXV of the Convention stated that the Director was authorised to undertake and make payments on his own authority in respect of the Organisation's operating expenditure, but he could not pay extraordinary expenses, and he said that Peter Mason and himself had had long conversations about the expenses on the building, but also he was not authorised to draw money from the reserve in case of "slow pay" without obtaining consent from the President. So the Organisation always had oversight of the reserves, based on consent from its President. If this happened during the year before the CIML Meeting, then the President had the responsibility to authorise that type of payment.

    In 2017, they had not spent 50 000 of what they had expected in the budget. This was a surplus for this budget period, and would remain available, which was why he could roll it into the current year, and spend it in the current year. However, at the end of the financial period, the Conference had to decide what to do with any surplus. The amount of the surplus might permit corresponding reductions in the fees (here he reminded Members that there had been no increase in the fees in the past eight years), or might be placed in the reserve fund. Mr Patoray said this is what had happened in 2016, when 276 000 had been placed in the reserves, but there had also been an authorisation to spend 250 000 on training.

    He went on to state that the reserve was for insufficient receipts resulting from the situation of a Member being de-listed for not paying, in which case, the Organisation could draw from the reserve funds. Mr Patoray continued that the Convention mentioned the reserves quite a bit. He said he had previously mentioned that the OIML had around €1.8 million in the bank. At the beginning of October 2018, it was not quite this much because of the "slow pay" during the past quarter, but it was reasonably close to this number. In previous discussions, Mr Patoray said he had indicated that according to his training, a reserve of 50% of the total expenses budget is standard in organisations such as the OIML. He recognised that they had heard suggestions that it could be as little as 10% , and admitted that some organisations could operate that way had if they had little risk, and the ability to acquire funds from other places. He said there were also examples where there were up to three years of expenses in reserve. He reported that there was an accounting rule that said you could not have more than three years.

    There was no single answer to this, as each organisation had to address their own issues, risks and capabilities. Mr Patoray said he appreciated the input of Mr Johnston, who had helped and guided him, and who had many years of accounting experience with the OIML to draw on.

    Looking at the budget period from 2017 to 2020, the average total yearly charges (expenses) were €2276640. As of December 2017, there were $ \epsilon $1775165 of liquid assets. This meant there was 78% of current cash verses expenses. This was a bit higher than the Organisation had had in the past. Mr Patoray showed delegates a slide indicating the quarterly payments by Member State. He explained that the horizontal blue line indicated the average quarterly expenses. He suggested this showed that in the first quarter of each year, the organisation received enough to cover the expenses, and sometimes more. In the second quarter, they did not receive as much as in the first quarter, but could use the funds received during the first quarter. However, taking last year as an example, $ \epsilon $80000 had not been paid. He added that by the end of the year, they received most of the money, but the problem was when was it received, and where would the Organisation get the funds from if the payments were not received, or if a Member State decided not to pay.

    The next slide showed the payments by quarter. The green horizontal line at the top of this graph indicated the total expenses for the year. If all the Members paid in January, then $ \epsilon $ 2.2 million would be received in the first quarter, and he suggested that if this happened in reality, they would not be having this conversation.

    The next slide showed the quarterly payments by Member State, which Mr Patoray referred to as the "worst case of the worst case". He indicated that the current quarterly payments of €238000 had been the worst for receiving funds in his experience, and pointed out that the worst case expense during any quarter had been €680460. He admitted that this had probably been at the time when they had been carrying out the Bureau renovations, but that was also the "worst case of the worst case" as far as expenses were concerned. He wanted to point out that if those two "worst case" scenarios ever coincided, they would need at least €442460 in the bank to cover that quarter. The next slide indicated what had happened in 2017. In June of 2017, there had been $ \epsilon $1828172 in the bank, but by September of that year, there was only $ \epsilon $1496517. There had been a total change in cash of $ \epsilon $331655 during that quarter. Mr Patoray submitted that this would give delegates some ideas about the magnitude of the numbers. It was not as much as 50 %, which would be close to a million euros, and they did not have that much fluctuation, but it was greater than 10 %. He thought that this could provide the basis for a discussion about how much there should be in reserve to meet essential emergency expenditure and to ensure the execution of the budget in the event of the income proving insufficient. He said there was not a right answer to this problem, and that each Member would have different opinions, based on their own government's policies within their own countries, but there must be enough reserves for the Organisation to deal with insufficient funds and emergencies.

    Mr Patoray said it was his belief that they could put the Organisation's funds to better work. He said that the previous year they had made the decision to put the budget surplus into the reserve, but then the reserve funds had been made available for training purposes. He considered that this should be a guide for Members for the future. This had been a way of investing the Organisation's excess funds in the future, and he suggested this answered the question Mr Dixit had asked.

    He commented that they could continue the convener training, which in his opinion had proven beneficial with regard to blood pressure meters. Many Members had been waiting for the revision of the Recommendation on blood pressure meters for some time. He added that CDs had just been posted that week. The convener training they had held two months prior to the current meeting had helped provide assistance for technical work in the area of project management, which Mr Patoray said delegates had heard Dr Schwartz mention during his presentation. He also questioned whether more support could be provided to CEEMS. He also suggested various online training modules and e-learning opportunities may also be created, but added that this would take a lot of money and follow up. He said these were very exciting times for the OIML, and observed that he was sad he would not be a part of it. He considered that investing in the future with the available funds would be one of the best things the Organisation could do, but qualified his statement by reminding delegates that they could not reduce the reserves to zero, as they needed the ability to meet the problem of insufficient funds coming in throughout the year.

    Dr Schwartz thanked Mr Patoray for his introduction. He recognised that they now understood much better what the Convention said and the framework within which they could take a decision. He said Mr Patoray's presentation had been very helpful, adding that it was actually quite a comfortable situation that the Organisation found itself in, in as much as they would be able to explore the various options for spending the money. Often he said, it was the opposite way round, where they might have to consider the problems of not having enough money. He added that they should be considering how best to invest this surplus in the future of the Organisation. He said his recommendation would not be to think about an appropriate percentage level, be it 40% , 50% or 60% , but suggested rather that they first thought about how to best invest the 78% they had at the moment. He acknowledged that Mr Patoray had made some proposals at the end of his presentation, with which they could start the discussion.

    Dr Schwartz wondered whether delegates had any short questions they wished to ask. He reminded them that during his presentation, he had mentioned the Task Group 2023, which may be put together at the Presidential Council meeting in March 2019, and the options available to the Organisation would be a subject which this Group could certainly consider in detail.

    Dr Ehrlich wanted to express his appreciation for this presentation, and the effort put into it by Mr Patoray and Dr Schwartz. Dr Schwartz asked the said they looked forward to the continued discussion.

    Dr Schwartz noted that there were no further questions.

- number: '9'
  title: 1 Report by the RLMO Round Table Chairperson
  narrative: |2+

    Dr Miki reported that there had been 40 participants in the RLMO Round Table meeting, which had taken place on the morning of Tuesday 9 October. Six RLMOs had been represented:

    - AFRIMETS (Intra-Africa Metrology System);

    - APLMF (Asia-Pacific Legal Metrology Forum);

    - COOMET (Euro-Asia Cooperation of National Metrological Institutions);

    - GULFMET (Gulf Association for Metrology);

    - SIM (Inter-American Metrology System); and

    - WELMEC (European Cooperation in Legal Metrology).

    He showed delegates the agenda, which had included updates from RLMOs and how the OIML Certification System (OIML-CS) concerned RLMOs, as well as administrative matters.

    Reports on activities which had taken place during the year by each RLMO were made by the following representatives:

    - AFRIMETS by Ms Himba Cheelo (Zambia);

    - APLMF by Mr Stephen O'Brien (New Zealand);

    - COOMET by Dr Peter Ulbig (Germany);

    - GULFMET by Mr Omar Kanakrieh (Saudi Arabia);

    - SIM by Dr Juan Carlos Mateus Sanchez (Brazil); and

    - WELMEC by Mrs Corinne Lagauterie (France).

    The topics covered in these presentations had included the following items:

    - training courses and e-learning modules supported by the MEDEA project (APLMF);

    - joint APMP-APLMF metrology web portal http://metrologyasiapacific.com (APLMF);

    - e-Learning modules which can be shared with other RLMOs: possibility to be hosted in the context of the e-learning system on the OIML website (APLMF);

    - a seminar under the umbrella of an OIML pilot training centre had been held from 27 November -1 December 2017 in Nairobi, Kenya (AFRIMETS);

    - need for support on human resource development, utilization of equipment, and raising awareness (AFRIMETS);

    - several projects: Harmonization of regulations and norms in legal metrology, technologies of measuring devices and systems in legal metrology, and legal metrology control (COOMET);

    - how to deal with the topic of digitalization such as Industry 4.0 (COOMET);

    - several technical committees established, including a new committee for legal metrology (GULFMET);

    - GSO/GULFMET certification scheme being revised to be consistent with the new OIML-CS (GULFMET);

    - INMETRO launched two ship units on the Amazon river to perform legal metrology inspections (SIM);

    - many training courses had been held. INMETRO is willing to host an OIML Training Centre (SIM);

    - main products are more than 60 guidance documents, some of which are referred to by the MID (WELMEC); and

    - the WELMEC website included information and downloadable documents (WELMEC).

    Concerning the OIML-CS, a presentation had been made by Dr Schwartz which had covered the topics of:

    - awareness-raising;

    - identifying technical experts to assess potential OIML Issuing Authorities;

    - encouragement and support for Utilizers and Associates;

    - observers on the OIML-CS MC; and

    - intercomparisons or proficiency testing.

    A presentation by Mr Cock Oosterman also mentioned the many awareness-raising events which had taken place in 2017 and 2018. He had also highlighted that almost half of the OIML Member States were OIML Issuing Authorities or Utilizers, but only a few OIML Corresponding Members were Associates.

    The discussion which had followed these presentations had highlighted the need for more awareness raising activities, which should include an explanation of the benefits of becoming a Utilizer or Associate. It was also felt that there was a need for assistance and practical examples of the process of becoming a Utilizer or Associate.

    Dr Miki explained that the other items discussed by the Round Table had included the possibility of sharing e-Learning materials developed by the APLMF on the OIML e-Learning platform. He concluded his report on the Round Table with information on the OIML-RT website which he operated (https://www.rlmo-rt.org/RT), including details of how to log in.

    Dr Schwartz thanked Dr Miki for his excellent report, and for keeping to time, and asked if there were any questions.

    Mr Khedir thanked the President. He said that his comments comprised three parts. The first part concerned the Vice-President's presentation on RLMOs, and he would like to suggest the inclusion of an evaluation of the proposals made at previous RLMO Round Table meetings. He thought it would be useful to know what they had been able to accomplish, and what had they not, as well as the reasons why. Secondly, in his opinion, they should add an item on the relationships between RLMOs, for example between AFRIMETS and WELMEC. He also wanted to know more about the relationships

    within RLMOs, for example within AFRIMETS or within MAGMET. He wondered how these relationships were being developed, and whether there were any concrete proposals for making improvements in this area. Thirdly, he remarked that there had been training centre activities in China and elsewhere, but since 2016 Tunisia had been proposing the creation of an African training centre, for francophone and Arab countries. He wanted to suggest that Tunisia be the site for this training centre for CEEMS and for the OIML-CS.

    Dr Miki thanked Mr Khedir. Regarding his first question, and what actions had been undertaken as a result of the proposals, he said he could make this clearer, but that it had been difficult due to the time constraints of his presentation. However, he stressed that the Round Table was only used for sharing information and discussion. It also promoted loosely connected relationships, so participants were not there to make rigid decisions, but just to gather and share information. However, he said it would be possible to clarify their proposals and any follow-up, specifically on how they had or had not been realised. He saw the Round Table proposals as provisional, but they could be circulated, at least amongst the Members, so he could of course send the proposals to Mr Khedir.

    With regard to the relationship between the RLMOs, he re-iterated that the Round Table meetings just gathered and shared information, and it was really up to each RLMO to decide what kind of relationships they had with others and within their own organisation. With regard to training centres, there was a very close relationship, and some overlap, between them and the CEEMS activities, and he pointed Mr Khedir in the direction of the CEEMS secretariat, observing that they would probably be very happy to discuss this with him.

    Mrs Lagauterie underlined that during the report on the OIML-CS, they had heard that there were not enough Utilizers. She therefore suggested that each RLMO circulated the information that they had been given during the meeting within their region in order to try to improve the situation.

    Dr Miki said he was not sure he fully understood from the translation.

    Dr Schwartz summarised, saying that Mrs Lagauterie was proposing that the RLMOs themselves should be responsible for disseminating the feedback from the RLMO Round Table meetings to their members. He thought this was a valid proposal.

    There were no further questions. He thanked Dr Miki again and added that he had personally found the Round Table meeting very interesting, with excellent presentations, and he thought it was very worthwhile for the RLMOs to meet to share information without the need to take any decisions, or to make any recommendations. He said that 40 people had attended the RLMO Round Table meeting, and he was grateful that they had been able to offer the RLMOs this opportunity to share their information, and for each to see what the others were doing.

    Mr Dunmill read:

    The Committee,

    Notes the report on the RLMO Round Table meeting given by its Chairperson.

    Mr Dunmill asked if there were any comments on the wording of the resolution. There were no comments. There were no abstentions. There were no negative votes. The resolution was adopted unanimously.

- number: '10'
  title: 1 Report by the CEEMS Advisory Group Chairperson
  narrative: |2+

    Mr Mason greeted delegates, and joked how wonderful it was not to be chairing a CIML meeting! He stated that the CEEMS Advisory Group (AG) had been functioning for several years, and he thought this was probably the third time that there had been a meeting of the AG immediately before the CIML meeting. However, he thought it was fair to say that the meeting, which had been held the previous day had been rather different from those which had preceded it. They had considered a lot of papers, they had made a lot of decisions, and there had been a lot on their agenda. As a result, they had done a lot of work in preparing a written report of the AG's activities, which had already been circulated to delegates as Additional Meeting Document 12 a couple of weeks prior to the CIML meeting. Hopefully they would have been informed that there was also a final report, which had been made available that morning. He stated that it was essentially this final report which he would be speaking about during his verbal report. He stated that they had a little under an hour for CEEMS matters, and he was sure they would be able to fill it.

    Re-iterating that the 2018 AG meeting had been held the previous day, he said that when the AG had been set up, under the new B19, they had intended to meet once a year, with most of the work being done electronically. He commented that they had an email circulation list which allowed this, and increasingly they were mastering the use of the OIML website for these purposes as well, although he added that this was still a work in progress. He observed that it was his own lack of competence as much as anything else that was holding this back!

    Once again, he reported that there had been very good attendance at the AG meeting, with 21 of the 24 current AG Members present, and those who were not present providing proxies. He added that they had not needed to vote on anything, as they had been in agreement on everything. They had welcomed the CIML Members from Cuba and Kenya, who had volunteered on serve on the AG. He reminded other CIML Members that any of them could volunteer to join this group, observing that it did mean a bit of work since everyone's views were important in decision-making to ensure the quorum was achieved. This meant they did have to read the papers, but he thought that those who had chosen to join as individual members had found the experience useful, so he stressed that new Members were always welcome. He added that new representatives from WELMEC and GULFMET had attended, as had several observers. He emphasised that this was a decision-making meeting, and therefore was not generally open, but occasional observers were allowed, when they wanted to find out what the AG was doing.

    The meeting had lasted 90 minutes, and they had got through the agenda which he displayed to delegates. He remarked that this agenda had been quite challenging, but gave an indication of the amount of work that had been done in the name of the AG. The first item that the AG had discussed, as mentioned in the written report, concerned the updating of the CEEMS web pages. He said that many delegates would already be familiar with these, and stated that there were now clearly identified sections explaining the history and background of the CEEMS work. There was a page dedicated to the AG itself, showing its composition and structure. There was also a list of the OIML Training Centres which had been held so far, and this would be completed and updated as events took place. There was a section on seminars and workshops, and he pointed out that there had been a number of these since the original one in Chengdu, and they took quite a wide view of what was included in this category. He considered that the workshop which had been held the previous Monday was part of this series, and expected that the outcome of that meeting would later be found on the website. He reported that there was also a page which would give details of the experts, the so-called experts database, and he said that he would explain more about this later in his presentation. He specified there were also details of the CEEMS awards, which he added would be presented later in the week. He said that crucially, they now had a repository for the actual material distributed and presented during the various training centres. This was part of a vision that the CEEMS section of the OIML website should contain a lot of material that delegates might find useful. In addition to this, the AG had agreed earlier that week that they would be signposting more clearly the e-learning material which they had discussed in previous years, a link to which could currently be found on the home page of the OIML website.

    The next item on which there had been substantial discussion at the AG meeting was about what he would loosely call the CEEMS logo. On looking through the website, it had become apparent that there might potentially be some advantage in highlighting the CEEMS-related sections of the website, in order to make it easier to locate them. He mentioned that delegates had seen some of the benefits of this approach, in the way that the OIML Certification System had been using its logo, and for CEEMS this might be good not just for the website, but for promotional materials, including training centres and so forth. On the other hand, it was important that such logos did not proliferate in a way that created confusion in the minds of the OIML's stakeholders, because this might undermine the promotion of the OIML's work to the wider public. The AG meeting had been able to consider some excellent designs provided by their colleagues from the PTB. Having done so, they had recognised that it was something for which there was not an urgent need, so the AG had decided to take more time to consider this. They had therefore decided that this work would be taken forward by a new ad-hoc group, which again he would be mentioning later and which would also be looking at a wider range of training centre issues.

    Mr Mason moved onto the topic of the experts database. Following the request for nominations from CIML Members, he reported they now had a database of 21 excellent experts from 10 economies, and their details would be made available on the website as soon as they had decided on the right wording for a disclaimer describing the experts' relationship with the OIML. He stressed that such a legal disclaimer was an important issue, because it needed to be made clear that these experts would typically be working on their own behalf rather than on behalf of the OIML. The OIML could not take responsibility for them, which had to be made clear. Mr Mason said that once this issue had been resolved, the database, which he recognised they had been discussing for many years, would finally be

    able to go live. Mr Mason thought that in reality some of the people on the list of experts were already being approached as their willingness to do such work became more widely known.

    Mr Mason stated that next he wanted to cover the various OIML training activities, adding that this was covered in the annual report made available to delegates, and he wanted to hand over to Mr Guo Su, who had been part of the AG secretariat for a number of years, but was now, as delegates would have heard, a secondee working at the Bureau. He said this arrangement was working extremely well and asked Mr Guo to make his presentation.

    Mr Guo thanked Mr Mason. Firstly he wanted to take the opportunity to thank delegates, and said it was thanks to the BIML and China's cooperation that he could be on secondment to the BIML to work on CEEMS issues. He wanted to thank the BIML staff, who had given him tremendous support in settling in Paris. He added that the item detailing the training course in Kenya and the review of OPTC training would be handled by the BIML Assistant Director, Mr Dunmill.

    Mr Guo said he would be providing information on the training course in China on prepackaged goods, which had been the first joint activity between the OIML and the APLMF. He specified that 70 participants from 29 economies had joined this activity, and the trainers had come from New Zealand. He highlighted that they were lucky to have Mr Phil Sorrell at this CIML meeting, who had been one of the trainers at this event, together with Mr Hans Peter Vaterlaus from Switzerland. Mr Guo reported that the training materials were now available on the OIML and APLMF websites. He showed delegates a video of this event, indicating the opening address and a class being taken by one of the trainers from New Zealand. He added that there had also been some practical sessions. He skipped through some of the video as time was short, and lastly showed a visit to the institute of metrology.

    Mr Guo then talked about the training course on prepackaged goods in Havana, Cuba, which had been attended by 27 participants from 17 economies, mainly from the Caribbean area. The trainers had been from the BIML, the PTB and Switzerland, and the training material was also now available on the OIML website.

    Mr Guo said that this year he had issued a survey, comprising six sections, on needs of CEEMS. However, because the final results had only been received two weeks prior to this meeting, there had not been time to carry out a comprehensive analysis, although he could highlight some of the needs that had commonly been identified. He summarised that 16 Member States had replied, and said he had discovered that some Members had not replied due to technical problems, which meant they had missed his email, so he would continue to collect further data. The survey had asked each Member to what extent their type approval and verification requirements were harmonised with OIML requirements, and Mr Guo showed some charts of the results which indicated that for verification, there was 73% harmonisation, and for type approval there was 67% harmonisation. Mr Guo went on to show another chart giving the results of the needs survey, which had indicated that there was a particular need for training on R 49 Water meters for cold potable water and hot water, R 76 Non-automatic weighing instruments and R 117 Dynamic measuring systems for liquids other than water. Moving on to the needs related to the OIML-CS, Mr Guo reported that almost 100 % of those who had replied had said that they were willing to participate in the system, although around two-thirds did not yet fully understand the system, or needed to clarify its benefits to them. The respondents had indicated that they would prefer to obtain this information through OIML seminars, or online. Showing another chart on how laboratory equipment was obtained, Mr Guo highlighted the fact that the survey had found that three countries were willing to share surplus equipment, and three were willing to donate it, and he asked delegates to talk to him during the breaks if they wanted more information on this. He reported that the survey had also expressed a need for training on D 31 General Requirements for software controlled measuring instruments.

    Mr Guo reported that during the year they had also developed a draft framework for OIML Training Centres, which had only been completed one week before this meeting, so AG members had not yet had time to review it fully. The draft had been developed by the BIML and P.R. China, and it made use of the experience gained during previous OPTCs in China. The document had ten sections over about 14 pages, but they knew that more training models need to be included, so an ad-hoc group, chaired by

    Mr Peter Ulbig, would study this question and hopefully finalise the document in 2019. Mr Guo said that this completed his part of the presentation and handed back to Mr Mason.

    Mr Mason said the next item in the annual report referred to the projects for which the AG had taken responsibility. The previous year they had decided that there should be a revision of D1 Considerations for a Law on Metrology, which should be carried out by a small Project Group consisting of AG members, but he thought it was right that they report to the CIML on this, since it was not within the normal Technical Committee structure. The first Working Draft had been circulated in June, and a number of comments had been received, the most important one of which was that there was a wish to make clearer the position that metrology, and in particular legal metrology, had in the wider context of a National Quality Infrastructure. This had been another theme that had emerged from the workshop the previous Monday. Mr Mason said that this reinforced messages which had been coming to him as a convener that they should actually be undertaking a more substantial rewrite of D1 that used metrology in quality infrastructure as its starting point. From this point of view, he considered that the workshop this week, as well as some other work that he would be doing in South East Asia over the next few weeks, would be extremely helpful in developing the next stage of the work, and he expected them to be able to circulate a Committee Draft fairly soon after his return from Indonesia. He continued that this would mean that this more fundamental restructuring of D1 would mean that it would not be possible to meet the original timetable for the project which had been approved by the CIML the previous year. Initially they had thought that they might manage to finish it by the following year, but actually he did not think it would be possible to complete the project until at least 2020, and indeed it may take longer, depending on just how many stakeholders became involved.

    On the question of projects for which the AG had taken responsibility, Mr Mason said that delegates would be aware, from other papers submitted to them, that there were proposals that the AG should take responsibility for the revision of two other OIML Documents. The Committee would be asked to approve these proposals the following day. They were for the revision of D14 Training of legal metrology personnel and D19 Pattern evaluation and pattern approval. He was mentioning these proposals at this point because he considered it may be a more convenient time to take comments and questions about the procedure relating to those two Documents now, rather than when they came up for consideration the following day. Mr Mason added that they had been fortunate that they had been able to find conveners for both of these projects. Germany had undertaken to provide a convener for the D14 work, and Mr Mason himself had agreed to act as convener for the D19 project.

    In summary, these were the headlines of the changes they had introduced in the workplan. This had been presented to delegates the previous year, following the 2017 AG meeting, and continued to be their core document. The papers that had been circulated during the morning involved what he thought was version 6 of the workplan. He described it as being a "living document" for the AG, and clarified that they amended it as they progressed with the work. The main items were displayed on the next two pages. The AG would continue to see work on the web pages as a priority. The work analysing the survey that Mr Guo had just described was part of the workplan, and clearly the database had to be finalised. They had also included the new work on the logo and branding, which had been added to the workplan as a result of the decisions taken at the previous day's meeting, and the D1 project continued to be part of the workplan. Mr Mason reflected that the strategy for the OIML Training Centres would be an important part of the workplan, but the significant change as a result of the discussions the previous day was that this would now be done by an ad-hoc group. He said they had originally asked themselves whether this should have been a Basic Publication, and thus that the CIML should have been asked to agree to the start of such a project, but said that they had not been convinced that it needed to be one at this stage. However, if they later concluded that it should be, he stated that obviously the CIML would have to approve this. He described these issues as being so important that they were likely to be put into an eventual strategy document and presented to the CIML anyway. Whilst they were developing the strategy, they still thought there was a need for further OTCs. Mr Guo had mentioned that a number of ideas had come out of the survey, and Mr Mason drew delegates' attention to the number of offers they had already heard during this meeting about hosting OTCs, which had included offers from Brazil and Tunisia, and he said they would continue to explore these possibilities. He also thought it likely that there would be at least one more in P.R. China as well.

    Regarding the rest of the workplan, Mr Mason said they would continue to produce their annual report, and he hoped delegates had found this format of reporting through a formal document and annexes endorsed by the AG helpful. The AG had added a suggestion to the workplan that they should be thinking about how they could deploy the World Bank QI toolkit, which they had heard about on the Monday prior to this meeting.

    Finally, just to show that their thinking continued to evolve, a suggestion had been made by Australia that they might start to carry out a "pilot CTT audit programme". He asked if there were any questions on what he had said so far regarding the activities to date, and what was in their workplan, adding that they would then move on to talk about the proposal from the AG that the CIML should work on a new resolution on CEEMS work to replace the one that had been adopted in Arcachon. He repeated his willingness to answer any questions on what he had already said.

    Mr O'Brien thanked Mr Mason for the overview of the AG meeting held the previous day and for his leadership of it, stressing that it was really important work. Regarding the expert database, he appreciated that they would be adding some legal wording about liability, and thought that this would be very useful, but he asked whether the database would include the CVs of the experts. He felt that people may need this information to be able to make a decision on whether they wanted to take on a particular expert. Mr Mason confirmed this. He conveyed that it was one of the reasons why there was a need for something that was quite technically complicated. He specified that it would have CVs, and he thought that these would be standardised as far as possible, so people could get used to looking through them and identifying potential experts that fitted their needs. Mr O'Brien's question had also made him think about something that he would address later when he spoke about the CTT document.

    Mr Mateus referred to the beginning of Mr Mason's presentation regarding CEEMS activities. Mr Mason had stated that it was possible to propose new AG members, and he asked that they consider Brazil as a new participant in the AG. He also wanted to propose that Brazil hosted a Training Centre. He clarified that they had had a special interest in the revision of D1 because they had a huge team working in this field, but had had some difficulties in participating in the discussions in Germany. He suggested that Brazil would be open generally to work with the OIML to provide training that was considered important, and was prepared to discuss this further.

    Mr Mason thanked Mr Mateus for this further confirmation of his interest in participating in the AG, which he added was very welcome.

    Mr Khedir said that to his way of thinking, the workplan was ambitious and the work necessary for its success demanded a participatory approach with the RLMOs. He gave the example of the revision of D1, where it would be better to include the RLMOs and even the SRLMOs, who could give their opinions. Concerning what had been described in the presentation on the survey, he observed that in 65% of the countries, legislation was not harmonised, and he wondered whether this would be an obstacle to the application and adoption of the OIML-CS. Regarding the strategy for CEEMS, he felt that they should be seeking the opinion of "southern countries" such as those from Africa and members of MAGMET. He thought they were very much interested and affected by this matter. Lastly, he wanted to repeat his proposition from 2016 that Tunisia be supported in setting up a training centre on metrology for francophone countries.

    Mr Mason thanked Mr Khedir for his questions. Taking Mr Khedir's last point, he added that these were ideas that they wanted to follow up. He recognised that funding and organisation were crucial, and they needed to make sure that for each of the initiatives, they could put together the right package, and he confirmed that the AG would be looking into whether this was possible. Regarding the revision of D1, Mr Mason agreed that the regional organisations had a key part to play, and in fact he said that the APLMF representative on the AG was part of the Project Group revising D1. They knew from the APLMF/APMP Guide 1 that this region had a lot of experience in producing documents which met the needs of the whole metrology community, and he added that they wanted to draw on this experience.

    There were no more questions, so Mr Mason referred to resolution 2015/10, the so-called "Arcachon resolution". He said they had regarded this as the measure of the activities concerning CEEMS for the last three years. This year, as in previous years, they had compiled an analysis which could be found in

    Annex C of the annual report, about what they had accomplished in the last 12 months relating to each of the items in the resolution. Unlike in previous years, he did not intend to go through it line by line because he considered they had found better ways of identifying the key issues. One thing he wanted to mention, however, was that there had been specific mention in the Arcachon resolution of the desire to finalise some projects which were particularly important to the CEEMS community. One of these had been the guide on prepackaging, which had been finalised the previous year, and the other had been the Conformity to Type publication. He was pleased to say that this was very close to being ready for the CIML Preliminary Online Ballot stage. He stated that the previous Committee Draft had passed the vote, but there had been some very valuable additional suggestions, which they had felt it had been worth taking into account, and since they were clear that work on OIML Documents had to follow B 6, they had felt that there should be another Committee Draft. They were confident that this Committee Draft would pass the Project Group vote, and that they would be able to proceed immediately to a CIML Preliminary Online Ballot. If it passed this, as he was sure it would, he thought they would try to do an online approval of the Final Draft Document, and he wanted to alert all CIML Members to this on this occasion. They recognised that this process would not be easy, as one single negative vote from a CIML Member could stop a final online approval, and also it was vital that they obtained "yes" votes from 50 % of CIML Members to proceed, so he pleaded with delegates to look favourably on this when it arose since it would be nice to have the Document finalised before they met next year.

    Mr Mason stated that the final recommendation from the AG was that they updated the resolution that had been passed in Arcachon. He indicated that a number of the items on it had already been addressed, there had been a number of changes, and the AG would therefore like to put before delegates an outline for a resolution, which he asked delegates to consider. He informed delegates that he would quickly describe the key elements of this proposal. He felt that a lot of it would be familiar, because a lot of what had been said three years ago in Arcachon was still valid. However, they had restructured the original resolution, so there was a more logical flow, and they had also dropped a few items. What they had not been able to identify were significant additions, so perhaps they had got it completely right in 2015, and there was nothing more to add, but the discussion on this point in this CIML meeting would be an opportunity to identify whether new things needed to be included.

    Mr Mason went through the wording of the proposed resolution. He said they would obviously expect to recall what they had done previously, and he submitted that there had been significant progress on this, and of course they now had the AG to give the CIML advice. They proposed that they should continue to instruct the Bureau, in a similar language to that used previously, to participate in capacity building activities, through the OIML Training Centres and regional activities, as well as other initiatives. He referred delegates to the significant programme of BIML activities they had already heard about.

    Secondly, the AG proposed to instruct the Bureau to continue their engagement with what had previously been known as DCMAS, and was now to be renamed as the International Network on Quality Infrastructure (INetQI), as well as identifying new initiatives to which the OIML could make an important contribution. They proposed that the resolution should instruct the Bureau to continue developing the website. He was sure that this work would be carried out even without this instruction, but this would give a clear indication of what the AG was expecting from the website. Rather than the previous resolution's explicit references to B 6, which he commented had now been "put to bed" for a couple of years, they were suggesting that the instruction now should be that further development of the systems for OIML technical work should take account of the need to involve CEEMS. The AG was proposing that there was an instruction to continue, and if possible expand, the use of the OIML Bulletin and the website to facilitate the exchange of new ideas, and new approaches to legal metrology. He expected that that they could see something about the QI toolkit, certainly on the website, and quite possibly in the Bulletin in the near future, and this was the kind of thing they were referring to. Noting the fact that research continued to be an important part of the OIML's work, the AG was suggesting that the Director should take this into account when considering projects which could be supported by the CEEMS fund, and it was fair to say that the Director had so far been very imaginative in the use that he had made of that fund.

    They also had requested those who could collectively be called the "office holders" to continue their high level engagement on the importance of metrology, particularly in CEEMS countries. This list of office holders was longer than it had been, as they now had not only the President and Vice-Presidents, and the Director and Assistant Directors, they also had the Chair and the Vice-Chair of the CEEMS AG, and there was also the Chair of the OIML-CS Management Committee. He proposed that there was a role for all of them in carrying this work forward. They were repeating their request to all Technical Committees, Subcommittees and Project Groups to take note of the demands of CEEMS, so as to ensure that the Recommendations took more account of the needs of CEEMS.

    There was a new request, specifically to the OIML-CS Management Committee, to ensure that the needs of the CEEMS were addressed in further developments of the OIML-CS. They urged Member States to consider what support they could give to future OIML Training Centres and other initiatives aimed at assisting CEEMS. At this point, he added that it was really important not just to acknowledge the substantial contribution that both Germany and P.R. China had made to the initiative, but also to acknowledge a number of other Member States that had stepped forward and contributed as hosts, and others who had made contributions by providing trainers. Again he urged all delegates to consider what they could do to help maintain the momentum. They continued to need Project Group conveners to produce publications of interest to CEEMS, and this included a wider range of countries, and hopefully more from the CEEMS community.

    Finally he drew attention to the secondment to the Bureau, and he knew it had taken a great deal of effort to arrange this, but he remarked that delegates had seen how well it was working, although it was for a finite period, and they would like to see other Member States proposing involvement in a similar arrangement, which would be of benefit both to themselves as Member States, as well as to the OIML. This summarised the resolution he wanted to propose, and he asked if there were any questions or comments.

    Dr Schwartz said that the only comment he would have was that this draft resolution had been provided in Annex D of Additional Meeting Document 12, and he verified with Mr Mason that the current wording did not differ from that in Annex D.

    Mr Mason confirmed that the wording had not changed at all. He said that one or two delegates had told him they might have some comments to make, but so far he had received none. He considered that a long resolution like this might be better considered on Friday, rather than trying to finalise it now.

    Dr Schwartz agreed, as it had only been submitted three weeks prior to the CIML meeting, and therefore the basic question was whether the Committee was ready to have an online vote. He added that they could make a decision to vote on it at the current meeting if they wished, but Mr Mason's proposal was to have an online ballot on this draft resolution.

    Mr Mason corrected Dr Schwartz, saying that the comment about the online ballot had referred to the CTT document. As far as this resolution was concerned, he would say that the Committee had the right to expect significant notice before they were asked to make decisions of this kind. However, he reminded the Committee that the 2015 Arcachon resolution had been presented the day after the AG meeting. There had been absolutely no notice of the text of that until the day on which it had been discussed. This situation was not ideal, but he thought they had the flexibility in the procedures to consider such a resolution, if they were happy to do so. He reflected on whether there was necessarily any urgency, and added that the resolution that had been adopted in 2015 could still form the basis of the next year's activities, so the OIML would not lose anything if they did not modernise it, but he said they did have this opportunity to refresh the resolution, which was the core statement of what they were trying to achieve.

    Dr Schwartz suggested it may help to summarise the proposal on the next steps once more.

    Mr Mason said the next step would be to ask the Committee whether it was prepared to vote on such a resolution, noting that there was a precedent in what they had done three years previously. If they were prepared to vote at the current meeting, delegates would have the opportunity to further amend the resolution and vote on it amongst the final batch of resolutions.

    Dr Schwartz thanked Mr Mason for his clarification. He asked if any delegates had objections to this proposal. There were no objections, so he suggested that they should discuss any necessary amendments so that they could vote on it on Friday.

    Mr Mason stated that this concluded the report of the AG, and said that both he and the AG Chair, Mr Pu Changcheng, who had been involved in much of this work through the input of his colleagues in P.R. China, and who had given valuable advice on a number of these issues, thought they had a structure which was working extremely well, and which was capable of accomplishing a lot of important work, and he hoped he had been able to share this view with delegates during his presentation.

    Dr Schwartz thanked Mr Mason for his comprehensive report on the CEEMS activities, as well as the BIML secondee Mr Guo.

    Dr Schwartz asked delegates to consider the resolution, noting the oral report, but not including the new resolution that Mr Mason had just described.

    Mr Dunmill said this was just a resolution noting the report that Mr Mason and Mr Guo had just made and he read the draft resolution. He asked if there were any comments on the wording of the resolution, and there were none. There were no abstentions. There were no negative votes. The resolution was passed unanimously. The full resolution would then be considered on Friday.

- number: '11'
  title: 1 Report by the OIML-CS Management Committee (MC) Chairperson
  narrative: |2+

    Mr Oosterman thanked all the people that had made it possible for this system to start on 1 January 2018. He especially wanted to thank Mr Stolz from the PTB, and the members of the Review Committee (RC), who had carried out all the work to review the applications. He described the pile of paperwork that each of the new applicants had submitted, and re-iterated that everything had had to be reviewed, acknowledging that this had been quite a lot of work which it was satisfying to have managed to complete. He said his report would consist of two items. Although the system could operate almost by itself, some items still needed approval, for example B18 Framework for the OIML Certification System (OIML-CS) as well as some other documents. For that reason, he intended to start with an update of the system as it was at the moment, but there were also some resolutions, which he wanted to bring to delegates' attention, because they needed approval by the CIML. This would be in the second part, which would be presented by Mr Dixon.

    Mr Oosterman started by describing various OIML-CS meetings. He said there had been a meeting of the Management Committee (MC) on 21-22 March 2018, in Sydney, Australia. NMI Australia had hosted the meeting, and there had been 41 participants, so it had been quite a large group. All 21 of the voting members had been represented during the meeting. He said that representatives from ILAC/IAF, IEC, CECIP, and CECOD had been present, and there had also been an observer from SIM. This particular participant had been considered very important, since SIM's participation could help to increase awareness of the OIML-CS, and how it could be of interest to the Americas. There had also been a representative of WELMEC.

    Under the Management Committee, there was the RC. The RC had the task of reviewing applications from prospective OIML Issuing Authorities to see whether they complied with all the requirements needed to become an OIML Issuing Authority. He repeated that this had been quite a lot of work for

    Mr Stolz, its Chairperson, especially as at the start of the system when all the OIML Issuing Authorities were new. Now the system was running, they would continue to have new applicants, but not all at once! An RC meeting had been held immediately before the MC meeting, and eight of the eleven RC members had been represented. There was also the Maintenance Group (MG), which maintained the documentation pertaining to the OIML-CS. As he had mentioned at the previous year's CIML meeting in Colombia, this was like climbing a mountain. When you wanted to climb a mountain, Mr Oosterman said you needed a map, and you needed your tools. This had been the first time they had climbed the mountain, so they had not known if all the materials would be appropriate. During the operation they had noticed that there were some conflicts in the documents, and some conflicts in the approach, and they had therefore they had needed to adjust the documents.

    Mr Oosterman said that the RC had reviewed all the materials, but when reviews had started, there had been some questions, so first they had needed to see how to perform the reviews, how the documents could be assessed, and how decisions could be made. This had been a very difficult task for Mr Stolz at the beginning of the process. The whole operation of the RC had been discussed amongst its members, and assessments had been performed. A number of proposals had been given to the MC, which had met after the RC had started work, so that new applicants could start from 1 January 2018. This had been helped by the very useful online work carried out by the RC. One of the most important proposals that had been made to the Management Committee had been the approval of experts for participation in the system, because some of the stringent requirements could not be fulfilled by the experts, so the Management Committee had needed this feedback from the RC.

    The Maintenance Group had been obliged to revise the appropriate conditions for the approval of experts in the documentation. Delegates would also note later on from one of the resolutions that the transition periods to move from scheme B to scheme A had also been reviewed because they had had a limited number of experts. This meant that it had not been possible to directly switch all the Recommendations from scheme B to scheme A. One of the major considerations in the Maintenance Group had been the revision of PD-07, because this document had needed a lot of revisions concerning the use of "old" data, and Mr Oosterman said he would return to this subject later in his presentation. The application of ISO/IEC 17065 had also come under discussion, because this was a new requirement for the OIML Issuing Authorities, and there had been a discussion on whether it was really necessary to use this standard, or whether it was too stringent for the OIML Issuing Authorities.

    One of the issues still under discussion was the modular approach. Mr Oosterman said that delegates would know that under R 76 there was a possibility to approve modules, and they had discussed how this might be incorporated in the OIML-CS. Lastly they had discussed the review of Recommendations from the RC Meeting.

    The main OIML-CS meeting had been the Management Committee meeting. One of the first items discussed had been the requirements for experts. Most of the experts working in metrology came from metrology institutes, so they were not directly related to an accreditation body. This meant that they did not always have accreditation skills and experience, which was one of the requirements to become an expert. The problem was that if experts in certain disciplines were not available, they would not be able to perform reviews of OIML Issuing Authorities, so no OIML Issuing Authorities would exist for that category of instrument. This obstacle had to be overcome, so they had concluded during the meeting that they should withdraw this requirement, and now when experts were reviewed, they looked at whether they had experience of ISO/IEC 17025 or ISO/IEC 17065.

    Due to the fact that experts had not been available to carry out assessments, they had also needed to review whether some Recommendations could change from Scheme B to Scheme A. When a Recommendation was switched to scheme A, the OIML Issuing Authorities had to prove that they were competent to undertake work on the Recommendation. If experts were not available, an assessment could not be made on whether to allow the OIML Issuing Authorities to work in scheme A. If they switched a Recommendation from Scheme B to Scheme A with no OIML Issuing Authorities, certificates could not be issued. Mr Oosterman stated that they had had to consider a compromise, and find a way of deciding when Recommendations should move to Scheme A.

    One other item which had been discussed was that currently the OIML Issuing Authorities needed to comply with ISO/IEC 17065, which covered conformity assessment systems. This meant that conformity to type was also covered, although this was not covered by the OIML-CS. Compliance with this standard would be costly, and they had questioned the need for some of its requirements in the context of OIML Issuing Authorities, and whether it was too rigorous for their needs. They had established a working group which would consider this issue. One of the resolutions that delegates would be considering was whether they could extend the transition period for self-declaration, because it may be that these requirements were too strict for the OIML Issuing Authorities, and might be too costly for OIML Issuing Authorities who issued a limited number of certificates. They therefore wanted to explore whether there were any alternatives which would be acceptable to OIML Issuing Authorities. Furthermore, they had discussed a number of improvements to the system's documents, and Mr Oosterman said he would return to this subject later as well.

    They had also looked at additional categories of measuring instrument. It had appeared that there were some Recommendations which had the required three parts, and so could be part of the OIML-CS, and he said he would show delegates these candidate Recommendations. One obstacle they had met when they had started issuing certificates was that in a number of Recommendations, part three was called a "test report", some had called them a "type evaluation report", and others had used both terms. This created a difficulty in deciding who was issuing the evaluation report, and who was issuing the test report, especially considering the distinction between an OIML Issuing Authority and a Test Laboratory.

    Another concern had been what to do when Recommendations were revised. As an example, Mr Oosterman mentioned R 60, for which a revision had just been published, which meant that OIML Issuing Authorities would have to re-apply to be able to issue certificates for the new edition of the Recommendation. Although it would have the same number, it could contain new requirements which could have an influence on the tests. OIML Issuing Authorities would have to demonstrate that they still complied with the requirements.

    They had established a working group on R 60 under the OIML-CS, which would look at the difference between the current and the old editions of R 60. This would be especially important for the RC, because if an OIML Issuing Authority applied to issue certificates for the new edition, the RC would need guidance on the new requirements under this new edition. If they did not have this, it may lead to an unfair approach being taken by different OIML Issuing Authorities, for example, if one declared it did not have to make any changes, while another decided it had to do some additional testing.

    Regarding the documentation changes, Mr Oosterman said that one of the important points for delegates to note was that they needed to make some changes to B18. As delegates had seen in the IEC's presentation, the OIML-CS had been based on the IEC Systems. They had looked at these to see how they carried out conformity assessment and how their procedures could be carried over to the OIML CS. This meant they would have to make reference to the IEC, acknowledging the use of their intellectual property. Furthermore, they had set requirements for who could participate in the Management Committee, but had also considered that if people or regions who were interested in participating in the Management Committee wanted to find out how it was being run, there had been no way to allow observers. So they had changed B18 to allow observers in MC meetings. They had also needed to improve on the wording related to revised editions of Recommendations. For example, they had mentioned that documentation should always be updated to cover the latest revision of a Recommendation. However, this was not always possible, because in some countries the legislation might refer to an earlier edition of the Recommendation, so if a certificate had to refer to the new edition of the Recommendation it would not comply with the national requirements. This meant that there was still a need for OIML Issuing Authorities to be able to issue certificates based on the previous edition(s) of Recommendations.

    There had also been a need for clarification on the situation that an OIML Issuing Authority might be willing to issue certificates, for example for breath analysers, but that OIML Issuing Authority was in a country where breath analysers were not regulated. In this situation, the OIML Issuing Authority wanted to become an OIML Issuing Authority for that Recommendation, but the country could not be

    a Utilizer because that instrument was not regulated in the country, so they had needed to distinguish this in the documentation.

    They had also needed to make some changes in the Operational Documents. Mr Oosterman said he had already mentioned they had to align with B18 for the observers and the voting regulations. There was also a clarification that that RC Members could contribute to a recommendation on their own country application. He said they had already mentioned that, if necessary, people from the Management Committee could also participate in the Review Committee, but there was also the question of whether they would be allowed to review an OIML Issuing Authority in their own country. This was not seen to be a problem unless the person who performed the review was the same person who had performed the assessment, because they would then be assessing their own work. This situation had needed to be changed in the Operational Documents. It had been considered that the Maintenance Group, chaired by Mr Loizides, should become a permanent working group of the Management Committee, because the documents would need to be revised from time to time. It had also been necessary to include the concept of proxies, because they were not originally allowed in RC meetings. In addition, as he had mentioned earlier, Mr Oosterman said they had removed the requirement that legal metrology experts required assessment experience. Within the Procedural Documents, there had been editorial changes and a need to update it to align with B18, especially in PD-02, where the requirements on legal metrology experts had been set. They had changed the restrictions, which meant that an expert that did not have any audit experience could still participate in an audit, as long as there was an audit team with a lead assessor. Mr Oosterman said that this situation had not been foreseen in the original document.

    There had also been some duplicated requirements for Utilizers and Associates. Furthermore, PD-04 had needed to be updated to cover the new version of ISO/IEC 17025. However, the biggest change had been in PD-07. He reminded delegates that, during the meeting in Colombia, there had been questions on how data which had been obtained under the Basic Certificate System or the MAA could be used in the OIML-CS. They had discussed this item quite extensively during the Management Committee meeting, and had come to the conclusion that they could accept old data under certain conditions. One of the major conditions would be that there would need to be proof that the body had been competent to do the particular test at that time. This could be, for example, proof of accreditation, but other forms of proof could also be used.

    Mr Oosterman said he now wanted to talk about the categories of measuring instruments. He said he had already mentioned that it had been very ambitious to have all Recommendations in the scheme by 2020, and added that if delegates had seen the previous OIML Bulletin, they would have seen a diagram in which he had described when a Recommendation would change from Scheme B to Scheme A, and when no further Scheme B certificates could be issued. This had been a very ambitious plan, because the necessary experts were not available, and he invited delegates to recommend experts that could perform the assessments. At the time he had created his diagram, there had not been enough experts for R49, R51, or R117, so if these Recommendations had switched on 1 January from Scheme B to Scheme A, OIML Issuing Authorities would not be able to demonstrate that they were competent, so the switching of these Recommendations needed to be delayed. Mr Dixon had also discovered that there were some other Recommendations which complied with the criteria for inclusion in the OIML-CS, in that they had the necessary three parts. Mr Oosterman said he had checked the OIML website, and no certificates had been issued for these newly identified Recommendations, except for R136 Instruments for measuring the areas of leathers where one certificate had been issued, so these were not Recommendations for which there was a demand for certificates, but on the other hand they complied with the criteria, so they could be included in the system.

    Looking at his diagram again, he indicated that at the top there was Scheme A, and at the bottom there was Scheme B. Those categories which had been included in the MAA could directly go into Scheme A because they had already fulfilled all the requirements. These included R 46, R 49, R 51, R 117 and R 137, which were on the list to be implemented by 1 January. For R 49 this was acceptable, as they already knew from the MAA that R 49 could be moved to scheme A. However, for R 51 and R 117, there needed to be more time, as experts needed to be included in the assessment team. R 46 and R 137 would be transferred on 1 January 2020. For the other Recommendations which would move to Scheme A, they needed to delay this change until 1 January 2021. He added that this was still being

    ambitious, because they really needed more experts in the system to perform these assessments. For instance, in the case of R134, they only had one expert, so if an OIML Issuing Authority wanted to issue certificates for this Recommendation and this was their own expert, nobody else could do the assessment, so he emphasised they really needed more experts.

    Finally he mentioned the list of Recommendations that Mr Dixon had discovered already complied with the criteria, and these Recommendations would move into the system on 1 January 2019 and move to Scheme A by 2021.

    With regard to the current operation of the system, Mr Oosterman stated that they had approved 12 OIML Issuing Authorities, and 25 Test laboratories, including Manufacturers' Test Laboratories. No applications had been rejected, although not everybody had been approved at the same speed, since additional materials had been needed in some cases, and there had been questions from the RC. There had also been no rejections of experts, no OIML Issuing Authorities had been suspended, and there had also been no appeals. The first certificates had been issued on 2 January.

    Moving on to the certificates, Mr Oosterman showed delegates a graph and commented that unsurprisingly, the most certificates had been issued for R 76, followed by R 60, then by R 137 and R 51. This indicated that weighing still constituted the major part of the OIML-CS, but this was perhaps a call to improve the Recommendations for other categories of measuring instruments. Also unsurprisingly, the number of certificates issued by the Netherlands was the greatest, and this was not so different from what they had seen before. This meant that the system was still operating as it had been before it came into effect. Mr Oosterman showed delegates a slide he said they would find in the report in their documentation, showing an overview of the OIML Issuing Authorities, including which OIML Issuing Authority was approved for which Recommendation. He showed them a similar table for Utilizers, and from this they would note which countries accepted which kinds of certificates. He added that delegates would note that this table was quite full, which indicated that Utilizers accepted quite a large number of the Recommendations, which was a good development in itself. From this table, delegates would also be able to see which countries accepted Scheme A and MAA, or Scheme B for their national approvals. He re-iterated that they had had to review the participating experts, of which there were over 60, a number which was stable at the moment, but which they still wanted to increase.

    He also highlighted the cooperation between ILAC/IAF and the OIML, because if an assessment was carried out with an expert from the OIML list, then accreditation bodies should accept that expert. They had already noticed that sometimes an OIML Issuing Authority had suggested the OIML experts list, but the accreditation bodies had insisted on using their own experts. The OIML therefore needed to work jointly with ILAC/IAF to ensure that these experts were approved as being part of an assessment team.

    Regarding the promotional activities, a number of seminars had been carried out, starting in P.R. China, where the event had been attended by many people from laboratories, but also by manufacturers. Here Mr Oosterman commented that Chinese manufacturers were the biggest users of the OIML-CS, so there had been about 400 people in the room, and the seminar had been very productive. They had also held a seminar in Colombia, and one at an AFRIMETS training event in Kenya. They had also introduced the OIML-CS at a WELMEC meeting in January, as well as in conjunction with the Management Committee meeting in Sydney, where manufacturers and other organisations had been invited to an event to learn more about the system. This had continued in P.R. China, where the OIML Issuing Authority had needed more support on how to improve their laboratories. He remarked that P.R. China now had four Testing Laboratories under the OIML Issuing Authority, which was more than they had had under the previous system. Thanks to Mr Ulbig, they had held an awareness training in Moscow, which had been attended by people from Kazakhstan, Uzbekistan and other Central Asian countries, as well as Cuba, Slovakia and elsewhere. They had also held training with CECIP, to explain to manufacturers how the system worked, and as a result of the first training with AFRIMETS, they had also held a second event in association with the AFRIMETS General Assembly. Finally, they had held a meeting with the notified bodies in Europe, where they had also described their participation in the system.

    Mr Oosterman explained that a large amount of work had been done on the OIML-CS part of the OIML website, which was very up to date, and delegates would be able to find all the information about the OIML Issuing Authorities, such as for which Recommendations they were approved, as well as a lot of information on the Utilizers. Anyone who wanted to become an OIML Issuing Authority or a Utilizer could find very extensive documentation on the website. He remarked that he had just learned the day before that in P.R. China, everything had already been translated into Chinese, and since many manufacturers came from P.R. China, they would try to make a link to the Chinese website.

    Finances had been discussed earlier, but they had also been carrying out other activities, and he emphasised the liaison work with ILAC/IAF on the development of Joint Assessment Procedures, in which Mr Dixon was involved. They were also considering OIML D 29, which was the guidance on ISO Guide 65, the predecessor of ISO/IEC 17065. There was also the D 30 guidance on test laboratories, and the proposed D xx, which was the new guide on ISO/IEC 17065. There was also a proposal that these Documents should become the responsibility of the OIML-CS Management Committee because they were Documents which would be needed by OIML Issuing Authorities and Utilizers.

    With regard to the structure of OIML Recommendations, Mr Oosterman showed delegates a slide which he said would be familiar to them. He said an OIML Issuing Authority could obtain several test reports, combine them into an evaluation report, and this evaluation report would result in an OIML Certificate. However, many Recommendations, and he showed delegates the example of R21, mentioned a "summary of type approval" report, and these included the terms "passed" and "failed", meaning that they were "evaluation reports" rather than "test reports". Evaluation reports should be drafted by the OIML Issuing Authorities, and test reports should be drafted by the test laboratories. In the cases he had mentioned, these two types of report were combined, which meant there was a conflict as to who should issue the report. One of the most important resolutions Mr Dixon would be talking about was that they needed to revise Recommendations so that they had a separate test report and type evaluation report.

    In conclusion, Mr Oosterman stated the OIML-CS had been in operation since 1 January 2018, and was functioning. They had OIML Issuing Authorities and Utilizers, and certificates had been issued. This had been a huge success, and there had been no gap between stopping the MAA and Basic Certificate systems, and starting the OIML-CS. Experts were available to perform the audits to move from Scheme B to Scheme A, and it was good that they could use "old" data in the new system. However, he commented that he had some concerns.

    One of his biggest concerns was the Recommendations. The OIML had more than 100 Recommendations, and not all of them were included in the OIML-CS, but one of the biggest worries was that a number of them were outdated. As had been pointed out by the delegate from Zambia, certificates on breath analysers and on speed meters were needed, and he emphasised that especially countries with emerging economies did not have the capabilities to test these kinds of instruments. The Recommendation on speed meters dated from 1990, which meant it only covered old radar equipment which was no longer on the market. Some Recommendations also still needed a test report format to be produced, otherwise they could not be included in the system. He also urged delegates to participate, and showed them his last slide. This indicated (in blue) the OIML Issuing Authorities, and he added that unsurprisingly, these were from the Member States that had already been in the previous systems.

    He said they had new Utilizers, for example Zambia and Colombia. Mr Oosterman quoted Mr Malaver (Colombia) as having said that they "made use of quality infrastructure from other countries to improve their own quality infrastructure" and accepted certificates to issue national type approvals. Mr Oosterman went on to say about 20 % of Member States were OIML Issuing Authorities and 34 % were Utilizers. However, amongst Corresponding Members, only Namibia and Latvia were Associates. He observed that the majority of Corresponding Members were emerging economies which did not have the required test facilities, and these countries could benefit from the OIML-CS by simply accepting OIML Certificates and issuing national type approval certificates based on them. He therefore issued a final plea to use the OIML-CS. Last of all he requested updates to OIML Recommendations, and stressed that any delegates who had questions about becoming an OIML Issuing Authority or a Utilizer should contact him or Mr Dixon.

    Dr Schwartz thanked Mr Oosterman for his comprehensive report and he asked if there were any questions or comments.

    Mr Dixit asked about Recommendations in Scheme A and Scheme B. He asked why the applicable scheme could not be decided depending upon how long a Recommendation had been in force, subject to a review by the Project Group involved, and a CIML decision. He had also understood from Mr Oosterman's presentation that experts were not coming forward, and people were not attracted to the OIML-CS, so he suggested that the MC meetings were held every six months in different OIML Issuing Authorities. In this way, the MC members who attended could visit different laboratories and OIML Issuing Authorities and people would gain confidence in the Management Committee.

    Mr Oosterman said this was an important point. This was the same as the IEC system, in that the OIML Management Committee did not produce Recommendations. These were produced by the experts from Member States, and he referred to what Mr Patoray had said earlier when he had expressed the opinion that the process for approving a Recommendation was quite long. If delegates looked at the existing Recommendations, many had no part three, so there were no test reports available, which meant a certificate could not be issued. So again, he emphasised that the Recommendations needed to be revised to include a part three if they were to be included in the OIML-CS.

    Mrs Cheelo said that Zambia had recently become a Utilizer, as had been mentioned, but she added that in their application they had submitted a long "wish-list" under Additional National Requirements. She reported that Mr Dixon had followed this up, stating that these were not covered under the current OIML-CS. She appreciated that Mr Oosterman had explained everything very well, but from where Zambia was sitting now, it left her wondering what they were going to do going forward. For example, they had a regulatory authority in charge of road and traffic safety which had installed speed enforcement cameras, and there had been an outcry about whether they were type approved and by whom, which was the Zambia Weights and Measures Authority. So they had looked at the OIML-CS, and speed cameras were not included in the system, so in light of this fact, they had been asked about how long it took to get Recommendations put forward for CIML approval. She wondered how this kind of question could be dealt with in a practical way.

    Dr Schwartz thought this question touched on exactly the work which was foreseen for the Task Group 2023 which he had mentioned earlier in his report, and which would be looking at how to speed up the technical work, and how to make it more effective. He thought they would have to consider implementing elements of project management. They were taking this very seriously, but unfortunately, at the moment they still did not have the answers.

    Mr Oosterman added that what had happened with R 117 was that in the case of fuel dispensers they could make use of the test report format in R 118, but for fuel installations this was not possible because there was no test report format. So in the case of fuel dispensers, test reports had been issued, so at least there was evidence that tests had been performed, but they had not been completed with a certificate. He stated that it was not what they wanted, but that it was at least an option.

    Dr Schwartz asked the Committee to consider the respective draft resolution, which was displayed on the screen.

    Mr Dunmill read the resolution. He asked if there were any comments on the wording of the resolution.

    Mr Loizides wanted to add that members of the Review Committee and the Maintenance Group, who were not necessarily members of the Management Committee, also be thanked for their outstanding contribution to the success to date.

    Dr Schwartz thanked Mr Loizides for this proposal, which they would be glad to add. He asked if there were any comments on the wording of the resolution as amended. There were no comments. There were no abstentions. There were no negative votes. The resolution was passed unanimously.

    Dr Schwartz closed the session.

- number: '11.2'
  title: 1 Approval of the revision of B 18 Framework for the OIML Certification (OIML-CS)
  narrative: |2+

    Mr Dixon stated that the first recommendation concerned the revision of B18. As Mr Oosterman had reported during his presentation, there is a Maintenance Group which supports the work of the Management Committee, and they had identified a number of improvements that could be made to B18 now that the system had been launched and the documents were being used. He showed delegates a summary of these proposed improvements. They included:

    - an acknowledgement, based on the updated MoU that the OIML had signed the day before with the IEC, of the fact that the IEC allowed the OIML to use their intellectual property in support of development of the OIML-CS;

    - clarification of the representation on the Management Committee, which would now include an identification of the MC Member from each country who is eligible to vote, and the inclusion of observers from countries that had expressed a clear intention to participate in the OIML-CS, but that were not yet in a position to make an application to participate. Mr Dixon added here that they would like these countries to be able to see how the system worked, and to view the workings of the Management Committee, which would hopefully encourage them to participate in the system;

    - improvements to the wording regarding the inclusion of the revised editions of Recommendations in the OIML-CS; and

    - clarification had also been included that where there was an OIML Issuing Authority under Scheme A, the Member State did not need to designate a Utilizer when that particular category of measuring instrument was not regulated in their country.

    Mr Dixon added that there were also a few other editorial and minor changes, but these were the four key changes that had been included. He said that the Final Draft had been distributed when the Working Document had been issued in July, and stated that delegates would therefore have had plenty of opportunity to review it. The Final Draft had included a clean version, a marked-up version, and the results of the voting within the Management Committee. He asked if there were any questions on the revision of B18. There were no questions or comments.

- number: '12'
  title: 1 Technical items for approval by the CIML
  narrative: |2+

    Mr Dunmill stated that the first item they had under technical activities covered the items which needed approval by the CIML. He indicated that they could continue with this as they had just taken a roll call.

- number: '12.1'
  title: 1 Approval of Final Draft Recommendations and Documents
  narrative: |2+

    The first item was the approval of the Final Draft Recommendations and Documents that had been put before the Committee. Mr Dunmill reminded delegates that the voting rules for the approval of Recommendations required that at least 75 % of CIML Members be present or represented for the vote. He indicated that as they would have seen from the figures announced by Mr Patoray after the roll call,

    this requirement was satisfied. On each item, a vote must be cast by at least 80 % of those Members present or represented (abstentions not counting as votes cast). Finally, 80 % of the votes cast had to be in favour. They would be carrying out the voting in a similar fashion to how they had proceeded previously, in other words, he would be asking if there were any comments, abstentions, or negative votes. Finally the votes would be counted to see whether the approval had been given or not.

    ## R 139 Compressed gaseous fuel measuring systems for vehicles

    The first item was the revision of R 139 Compressed gaseous fuel measuring systems for vehicles which had been submitted to a Preliminary CIML Online Ballot with a deadline of 14 June 2019. 35 responses had been received from a total of 62 CIML Members. Two abstentions had been given, there were no negative votes, and 33 yes votes. He asked whether there were any further comments on this revision. There were none. There were no abstentions to the approval of this revision. There were no negative votes. The revision of R 139 was approved unanimously.

    ## New Document: Guide for the application of ISO/IEC17065 to the assessment of certification bodies in legal metrology

    The second item was a new Document Guide for the application of ISO/IEC17065 to the assessment of certification bodies in legal metrology. There had been a Preliminary CIML Online Ballot with a deadline of 18 July 2018. 42 responses had been received out of the 62 CIML Members and there had been no abstentions and no negative votes received during that ballot, with 42 yes votes.

    Dr Schwartz wanted to explain the situation regarding this Document so that the right decision could be taken. This Final Draft Document had been uploaded ten days after the three-month period that was normally given to CIML Members, so strictly speaking it was late. He wanted to clarify whether Members were happy with this situation, or whether they objected to voting on this Final Draft Document because of the delay, and although he hoped that nobody would object because this would delay the publication further, he had wanted to address this situation and make them aware of it. There were no objections to the vote being held at the current time despite the small delay.

    Mr Dunmill noted that there were no further comments. There were no abstentions. There were no negative votes. The Document was approved unanimously.

    Mr Dunmill added that for both of the Documents which had just been approved, one recurring problem that he wanted to mention once again was the low level of response for online CIML voting. As he had indicated, there had only been 35 responses for the first Final Draft Document, and 42 responses for the second. This gave the Bureau a lot of trouble in gauging the level of support for Recommendations, so he wanted to once again request that Members vote within the deadlines when a Draft was put to them for Preliminary Online Ballot or for CIML online approval (as stipulated in OIML B 6).

    Mr Dunmill stated there was one resolution, as he had already mentioned. He read the resolution; there were no objections. There were no negative votes and the resolution passed unanimously.

- number: 12.1.2
  title: 1 Revision of R 51 Automatic catchweighing instruments
  narrative: |2+

    Mr Dunmill stated that they would now consider the new project proposals.

    Firstly there was a proposal for a new project on the revision of R 51 Automatic catchweighing instruments. He stated that the details had been provided to delegates in Addendum 12.1.2.1 and asked if anyone had any comments. He read the relevant resolution; again he asked for comments on the proposal or the resolution. There were no comments. There were no abstentions. There were no negative votes. Resolution 2018/23 was passed unanimously.

