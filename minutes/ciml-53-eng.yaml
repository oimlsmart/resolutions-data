    Dr Schwartz noted that item 10.3 had already been dealt with, as it had been included in the report given by Mr Patoray under item 8.1. He hoped that delegates remembered this, and did not think they needed to consider this subject again. If delegates were in agreement, he suggested that they now passed a separate resolution on this, and then move on to the next item. There were no objections to this proposal.

