- number: '9.1'
  title: Report by the RLMO Round Table Chairperson
  narrative: |2+

    Dr Miki reported that there had been 40 participants in the RLMO Round Table meeting, which had taken place on the morning of Tuesday 9 October. Six RLMOs had been represented:

    - AFRIMETS (Intra-Africa Metrology System);

    - APLMF (Asia-Pacific Legal Metrology Forum);

    - COOMET (Euro-Asia Cooperation of National Metrological Institutions);

    - GULFMET (Gulf Association for Metrology);

    - SIM (Inter-American Metrology System); and

    - WELMEC (European Cooperation in Legal Metrology).

    He showed delegates the agenda, which had included updates from RLMOs and how the OIML Certification System (OIML-CS) concerned RLMOs, as well as administrative matters.

    Reports on activities which had taken place during the year by each RLMO were made by the following representatives:

    - AFRIMETS by Ms Himba Cheelo (Zambia);

    - APLMF by Mr Stephen O'Brien (New Zealand);

    - COOMET by Dr Peter Ulbig (Germany);

    - GULFMET by Mr Omar Kanakrieh (Saudi Arabia);

    - SIM by Dr Juan Carlos Mateus Sanchez (Brazil); and

    - WELMEC by Mrs Corinne Lagauterie (France).

    The topics covered in these presentations had included the following items:

    - training courses and e-learning modules supported by the MEDEA project (APLMF);

    - joint APMP-APLMF metrology web portal http://metrologyasiapacific.com (APLMF);

    - e-Learning modules which can be shared with other RLMOs: possibility to be hosted in the context of the e-learning system on the OIML website (APLMF);

    - a seminar under the umbrella of an OIML pilot training centre had been held from 27 November -1 December 2017 in Nairobi, Kenya (AFRIMETS);

    - need for support on human resource development, utilization of equipment, and raising awareness (AFRIMETS);

    - several projects: Harmonization of regulations and norms in legal metrology, technologies of measuring devices and systems in legal metrology, and legal metrology control (COOMET);

    - how to deal with the topic of digitalization such as Industry 4.0 (COOMET);

    - several technical committees established, including a new committee for legal metrology (GULFMET);

    - GSO/GULFMET certification scheme being revised to be consistent with the new OIML-CS (GULFMET);

    - INMETRO launched two ship units on the Amazon river to perform legal metrology inspections (SIM);

    - many training courses had been held. INMETRO is willing to host an OIML Training Centre (SIM);

    - main products are more than 60 guidance documents, some of which are referred to by the MID (WELMEC); and

    - the WELMEC website included information and downloadable documents (WELMEC).

    Concerning the OIML-CS, a presentation had been made by Dr Schwartz which had covered the topics of:

    - awareness-raising;

    - identifying technical experts to assess potential OIML Issuing Authorities;

    - encouragement and support for Utilizers and Associates;

    - observers on the OIML-CS MC; and

    - intercomparisons or proficiency testing.

    A presentation by Mr Cock Oosterman also mentioned the many awareness-raising events which had taken place in 2017 and 2018. He had also highlighted that almost half of the OIML Member States were OIML Issuing Authorities or Utilizers, but only a few OIML Corresponding Members were Associates.

    The discussion which had followed these presentations had highlighted the need for more awareness raising activities, which should include an explanation of the benefits of becoming a Utilizer or Associate. It was also felt that there was a need for assistance and practical examples of the process of becoming a Utilizer or Associate.

    Dr Miki explained that the other items discussed by the Round Table had included the possibility of sharing e-Learning materials developed by the APLMF on the OIML e-Learning platform. He concluded his report on the Round Table with information on the OIML-RT website which he operated (https://www.rlmo-rt.org/RT), including details of how to log in.

    Dr Schwartz thanked Dr Miki for his excellent report, and for keeping to time, and asked if there were any questions.

    Mr Khedir thanked the President. He said that his comments comprised three parts. The first part concerned the Vice-President's presentation on RLMOs, and he would like to suggest the inclusion of an evaluation of the proposals made at previous RLMO Round Table meetings. He thought it would be useful to know what they had been able to accomplish, and what had they not, as well as the reasons why. Secondly, in his opinion, they should add an item on the relationships between RLMOs, for example between AFRIMETS and WELMEC. He also wanted to know more about the relationships

    within RLMOs, for example within AFRIMETS or within MAGMET. He wondered how these relationships were being developed, and whether there were any concrete proposals for making improvements in this area. Thirdly, he remarked that there had been training centre activities in China and elsewhere, but since 2016 Tunisia had been proposing the creation of an African training centre, for francophone and Arab countries. He wanted to suggest that Tunisia be the site for this training centre for CEEMS and for the OIML-CS.

    Dr Miki thanked Mr Khedir. Regarding his first question, and what actions had been undertaken as a result of the proposals, he said he could make this clearer, but that it had been difficult due to the time constraints of his presentation. However, he stressed that the Round Table was only used for sharing information and discussion. It also promoted loosely connected relationships, so participants were not there to make rigid decisions, but just to gather and share information. However, he said it would be possible to clarify their proposals and any follow-up, specifically on how they had or had not been realised. He saw the Round Table proposals as provisional, but they could be circulated, at least amongst the Members, so he could of course send the proposals to Mr Khedir.

    With regard to the relationship between the RLMOs, he re-iterated that the Round Table meetings just gathered and shared information, and it was really up to each RLMO to decide what kind of relationships they had with others and within their own organisation. With regard to training centres, there was a very close relationship, and some overlap, between them and the CEEMS activities, and he pointed Mr Khedir in the direction of the CEEMS secretariat, observing that they would probably be very happy to discuss this with him.

    Mrs Lagauterie underlined that during the report on the OIML-CS, they had heard that there were not enough Utilizers. She therefore suggested that each RLMO circulated the information that they had been given during the meeting within their region in order to try to improve the situation.

    Dr Miki said he was not sure he fully understood from the translation.

    Dr Schwartz summarised, saying that Mrs Lagauterie was proposing that the RLMOs themselves should be responsible for disseminating the feedback from the RLMO Round Table meetings to their members. He thought this was a valid proposal.

    There were no further questions. He thanked Dr Miki again and added that he had personally found the Round Table meeting very interesting, with excellent presentations, and he thought it was very worthwhile for the RLMOs to meet to share information without the need to take any decisions, or to make any recommendations. He said that 40 people had attended the RLMO Round Table meeting, and he was grateful that they had been able to offer the RLMOs this opportunity to share their information, and for each to see what the others were doing.

    Mr Dunmill read:

    The Committee,

    Notes the report on the RLMO Round Table meeting given by its Chairperson.

    Mr Dunmill asked if there were any comments on the wording of the resolution. There were no comments. There were no abstentions. There were no negative votes. The resolution was adopted unanimously.

- number: '9.2'
  title: Report by the BIML on activities with organisations in liaison
  narrative: |2+

    Dr Schwartz said that delegates had received Additional Meeting Document 15 on the liaison activities, and so he did not expect the presentation to cover all the details in this document. He asked Mr Dunmill to present a short report.

    Mr Dunmill also drew delegates' attention to the information in the Additional Meeting Document. He wanted to highlight a few points, and to focus on one particular last-minute item of information. The AMD was split into reports on those international organisations with which the Bureau had a liaison

    activity, and the regional organisations, and here he was not referring to RLMOs, as they were dealt with elsewhere.

    Firstly he referred to the work with the BIPM. As stated in the report, the BIML held regular multilateral and bilateral meetings with the BIPM in March each year, and there was a close cooperation between the directors and between several members of staff of each organisation. This year had been special because of the revision of the SI, which had resulted in various discussions, but he also stated that he worked very closely with Mr Andy Henson on a number of activities, especially to do with the CEEMS work, and promotion of the OIML and BIPM at different events. He added that during the current year both of them had taken part in a well organised UNIDO event publicising World Metrology Day in Nigeria. On the same occasion, they had also participated in a television program about metrology, and the importance of metrology in quality infrastructure, and had given interviews which had been broadcast on the Nigerian evening news. It had been a good opportunity to publicise metrology as a whole. In the future, the BIPM would be closely involved in the revision of OIML D1, which would be discussed when they talked about the projects later.

    Secondly, with regard to the DCMAS Network of international organisations working in the field of metrology, accreditation and standardisation, Mr Dunmill reported that the OIML had chaired this group during the period 2016-2018, and would be handing over to ILAC and ISO/CASCO who would hold the chair for the next period. One of the most important things which had come out of the time the OIML had chaired this group had been the discussions (again in part due to a UNIDO-led initiative) to agree on a common definition of "quality infrastructure", because this term was used by many different organisations with slightly different meanings, so it had been good to come together and agree upon a common definition. He acknowledged that there was always room for improvement in definitions, but at least there was now a common definition between the organisations working in the field. Following on from this discussion, the DCMAS Network (where the DC had originally stood for Developing Countries and second part, MAS, for Metrology, Accreditation, and Standardisation) had decided to widen its remit, and was now proposing to change its name to the "International Network on Quality Infrastructure", or INetQI, which indicated that the "developing countries" part is being dropped from the name, but that the remit was being widened to included conformity assessment activities in particular, in which some of the organisations were heavily involved, especially the IEC. Unfortunately, due to conflicting timetables, the Network's meeting this year would be taking place in November. However, in view of this wider remit, they had had a lot of interest from the World Bank and the WTO, and both of these organisations now intended to join this network. As those delegates who had been present since the beginning of the week for the seminar would know, the World Bank had been working on a document on quality infrastructure accompanied by a toolkit for its evaluation.

    As far as ISO was concerned, Mr Dunmill wanted to highlight the fact that last year they had held their General Assembly in Berlin with the theme of "open minded, open for change" and at this meeting there had been a lot of discussion on how technical work within ISO should be conducted in the future. Following on from this, during the next two years they were now starting a pilot study of a virtual standards development platform to look at ways of using technology to carry out online collaboration during the development of standards. Mr Dunmill said that he considered this was something the OIML would follow closely to see how some of the aspects in ISO's work could feed into improving the OIML's own technical work. At the September 2018 ISO General Assembly, they had been complaining about the time of two years it took ISO technical committees to produce a standard, and Mr Dunmill said the idea was to improve on this by the use of online collaboration. He added that he thought this was definitely something that was worth taking note of.

    With regard to UNIDO, he said that he had mentioned before that he had taken part in an event with them for World Metrology Day in May, and the cooperation would continue this year with an OIML-CS seminar which they also wanted to organise in Nigeria.

    The World Trade Organisation would, as he had already said, be joining the INetQI in November, and they were increasingly interested in quality infrastructure matters. Mr Dunmill reported that both he, and Mr Henson or one of his team from the BIPM, attended the WTO Technical Barriers to Trade Committee meetings, at which the interest in metrology fluctuated, but they had noticed a generally

    increasing interest in quality infrastructure matters, and an appreciation that metrology was at the root of this.

    Finally, the last-minute piece of information was about the liaison they had had with the World Health Organisation. In the past this liaison had not been very active - the OIML sent them information, but had never received any in return. He had made several attempts to contact the WHO to forge a closer relationship, and just the previous Sunday, Mr Dunmill had managed to make successful contact with someone who was responsible for their medical devices division in Geneva, and he should be able to meet with them in November or December this year to discuss possible future collaboration between the two organisations. Their interest really was on the regulation of essential medical devices to ensure that all countries had access to safe, accurate measuring instruments, at least for the basic kinds of instrument, so it could well be a sound basis for cooperation with the OIML's technical work on medical instruments.

    Dr Schwartz thanked Mr Dunmill for his comprehensive report. He said that before inviting questions he wanted to add three points. With regard to the BIPM, he said they had just added the Joint Declaration on Metrological Traceability to the Additional Meeting Documents. This was going to be signed by the BIPM, the OIML, ILAC and ISO. He said delegates had received the draft declaration as an annex to Additional Meeting Document 6. Secondly, he wanted to mention the European Commission and WELMEC Working Group 8, which were mentioned in the written report. He thought they needed a mechanism for detecting that the normative documents identified by the European Commission, and published in their Official Journal, were out of date. The example of water meters (R49) had been mentioned, and he said they needed a mechanism to trigger an update of the information published in the Official Journal. The European Commission itself did not know if a Recommendation was out of date, and he thought there should be a process that could be followed, he suggested through WELMEC. He was not sure of the solution, but considered that it was in the interests of the OIML that those Recommendations that were mentioned in the Official Journal were up to date. He wondered whether Mrs Lagauterie had a proposal or comment on this point.

    Mrs Lagauterie explained that within WELMEC, when OIML Recommendations were revised, they continuously identified changes which might be necessary to the appropriate "corresponding tables" published by WELMEC, and the table for R 49 Water meters, was currently under revision and should be adopted and published in the Official Journal before the end of the year.

    Dr Schwartz thanked Mrs Lagauterie for this good news. He said that he had not been aware of this, and thought that Members would be interested to know that this would be properly taken into account. He added that the last point he wanted to mention was the representation of the OIML on the Joint Committee for Guides in Metrology (JCMG). He said there were two Working Groups, JCGM-WG1, which dealt with the Guide on Uncertainty in Measurement (GUM), and JCGM-WG2, which dealt with the International Vocabulary of Metrology (VIM). He informed delegates that he had sent a letter to CIML Members asking for nominations for more representatives for both working groups, because the OIML could nominate three people to each committee. Currently, Dr Ehrlich and Mr Mussio represented the OIML on JCGM-WG1 and Dr Jerzy Borzyminski (Poland) and Dr Ehrlich represented the OIML on JCGM-WG2, with Dr Ehrlich acting as this group's convener. He reported that he had received four nominations for WG1, from Germany, Russia, India, and Japan. He had received three nominations for WG2 from Germany, Russia, and India. He continued that they had discussed this at the Presidential Council meeting which had been held on the Sunday before the CIML meeting. He considered that each of the nominees had sufficient expertise, and said that they had considered the letters of motivation, and letters of support from the respective CIML Members. They had come to the conclusion that the most appropriate candidates would be, for WG 1, Dr Tanaka from Japan, and for WG2 they had accepted the Russian proposal of Dr Anna Chunovkina. He added that Dr Chunovkina had a good background in metrology, vocabulary, and politics. He wanted to thank all the countries that had nominated representatives, especially Japan. He suggested that delegates take a resolution later in the meeting to confirm these nominations. He added that as this was related to the OIML's liaison activities, he had wanted to put forward these proposals under this item. He asked if there were any questions either about the report from Mr Dunmill, or the proposals and additional remarks he had made.

    Mr Dixit stated that one term that had been used was "quality infrastructure" and he considered that various organisations defined this word in different ways. He hoped that for legal metrology, the OIML along with the BIPM, were ensuring that was defined in a way that was relevant and valuable in the field of legal metrology.

    Mr Dunmill replied that this had been precisely why the DCMAS Network, as it had still been called at the time, which consisted of ten international organisations working in the field of metrology, accreditation, standardisation and conformity assessment, had got together with UNIDO and the World Bank to discuss this, and had come up with a common definition, so that there was not a divergence between the different organisations in their use of the term.

    Dr Schwartz asked if there were any other comments. There were no more questions so he asked Mr Dixit if he wanted to make a final comment.

    Mr Dixit said they were developing a vocabulary of legal metrology and the term quality infrastructure should also be defined, and he considered this should be carried out by OIML and the BIPM together, rather than with any other organisations. He considered it should be enough to include these two organisations, together with perhaps ISO in order to produce a definition that was workable.

    Mr Dunmill reassured Mr Dixit that both the OIML and BIPM had been part of the discussions, as had been ISO, IEC, ILAC, the World Bank and UNIDO.

    Dr Schwartz intervened. He said they were running a little behind time, and reassured Mr Dixit that his comment would be taken back to the INetQI. He had just been reminded that there was also a definition in the VIM. He did not think there was any need to go into this in further detail at present. He added that time was limited, and considered that they should conclude this item.

