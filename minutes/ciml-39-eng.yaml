- number: '6.2'
  title: Examination of the situation of certain TCs/SCs
  narrative: |2+

    The Committee took note of a report from the BIML describing the situation of certain Technical Committees and Subcommittees.

    The Committee approved the proposal to allocate the Secretariat of TC 6 to South Africa and TC 9/SC 3 to Germany.

    The Committee noted firstly that the Secretariats of TC 8/SC 2 and TC 10/SC 3 were still vacant, and secondly that Germany wished to relinquish the Secretariat of TC 12. It asked Members to consider taking on responsibility for the Secretariats of these technical bodies.

    The Committee approved two new working projects:

    - Revision of R 99/ISO 3930 Instruments for measuring vehicle exhaust emissions as jointly proposed by TC 16/SC 1 and ISO TC 22/SC 5;

    - New Recommendation on Clinical infrared ear thermometers as proposed by TC 18/SC 2.

    The Committee set the deadline for issuing Certificates according to the 1996 edition of R 61 to 31 December 2005 and requested Issuing Authorities to notify the BIML about their readiness to issue Certificates according to the requirements of the revised R 61 (2004), since R 61-1 had already been published and the publication of R 61-2 (2004) was imminent.

    Note: The transformation requirements for Certificates issued against the 1996 edition (Supplement to OIMLR 61 Automatic gravimetric filling instruments) have been drawn up by TC 9/SC 2 according to the decision of the 38th CIML Meeting and will be applicable as soon as approved and published.

- number: '6.3'
  title: Implementation of the MAA
  narrative: |2+

    The Committee took note of a report on the Workshop held on Sunday 24 October, and approved the proposed decisions annexed to these decisions.

    The Committee instructed TC 3/SC 5 and the Bureau to start a revision of B 3 and B 10 after some experience of the MAA had been gained.

    The Committee took note of the draft schedule for the implementation of the MAA.

- number: '6.4'
  title: Other decisions related to the OIML Certificate System
  narrative: |2+

    The Committee decided that from 1 January 2005 OIML Issuing Authorities shall establish OIML Certificates in electronic format as defined by the BIML, so that these Certificates may be published on the OIML web site.

- number: '6.5'
  title: Miscellaneous
  narrative: |2+

    The Committee wished it to be noted that substantial interpretations of Recommendations and Documents are the responsibility of OIML Technical Committees and Subcommittees.

- number: '7'
  title: Developing Countries
  narrative: |2+

    The Committee took note of a report given by Dr Seiler concerning the Forum Metrology-Trade Facilitator held on Monday 25 October and instructed the Bureau to organize the following-up of this Forum.

    The Committee took note of a report given by Mr. Magaña on the activities and future of the OIML Development Council and expressed its utmost appreciation for the contributions of its Chairperson, Mrs. Annabi.

    The Committee noted that OIML work on Developing Country matters could be more efficiently managed by the Permanent Working Group on Developing Countries as established by the 38th CIML Meeting; the PWGDC should replace the Development Council.

- number: '8'
  title: Coordination with the RLMOs
