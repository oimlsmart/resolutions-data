    <div align="center">

    # ANNEX Rules applicable to the implementation of the OIML MAA

    </div>

    ## 1 Relation between the DoMCs and the former OIML Certificate System

    1. 1 When an Issuing Authority signs a Declaration of Mutual Confidence (DoMC) in the framework of the MAA, all OIML Certificates and associated test reports issued by this Issuing Authority for the considered category of instruments will then be issued under the particular conditions resulting from its participation in the DoMC. This Issuing Authority will not be allowed to continue to issue Certificates under the sole conditions of the OIML Certificate System.

    1. 2 OIML Certificates and associated test reports issued under the conditions of a DoMC will bear a specific OIML logo (to be defined by the BIML), affixed by the Issuing Authority and under its own responsibility. This logo will be the property of the OIML and its use will be authorized by the Bureau to these Issuing Authorities.

    1. 3 After a DoMC has been signed, the Bureau will propose at the next CIML Meeting to decide that for this category the OIML Certificate System will be applicable only by signatories of this DoMC and under the conditions of this DoMC. This should come into force on a date defined by the CIML.

    1. 4 OIML Certificates that have been issued prior to the establishment of the DoMC or during this transition period according to the previous rules, will continue to appear in the OIML databases published on the OIML web site.

    1. 5 OIML Certificates issued under the conditions of a DoMC will be recorded separately and will appear separately in the OIML databases published on the OIML web site.

    ## 2 Final provisions

    These decisions will be applied for the implementation of the MAA and for the operation of the OIML Certificate System as of 1 January 2005.

    TC 3/SC 5 will revise Publication B 3 (ex. P1) OIML Certificate System for Measuring Instruments according to these decisions and will develop, if necessary, detailed regulations for the implementation of the MAA in order to submit them for CIML approval.
