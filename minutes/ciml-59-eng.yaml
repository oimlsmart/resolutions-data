      Agenda item 14.1

      The Committee,

      Notes the report of the OIML Digitalisation Task Group (DTG) Chairperson,

      Thanks Dr Sascha Eichstadt for serving as DTG Chairperson, and Dr Yang Ping for serving as Deputy Chairperson,

