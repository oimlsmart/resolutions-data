      Mr ATHANE said that the financial estimates sent out at the end of 1989 remained current, with the following modifications:

      - the renovation of the Organization's headquarters, intended for 1989 and 1990, had been delayed, which had led to a partial transfer of the expenditure from 1989 to 1990, and then from 1990 to 1991,

      - certain receipts (rebate of tax by the French government) which were to have been received in 1989, had been carried forward to 1990,

      - the accession of Saudi Arabia entailed an increase in receipts of about 110 000 French francs for 1990 (entry fee and annual contribution).

      Mr ATHANE also said that the increase in the rate of inflation caused by the Gulf crisis would have practically no effect in 1990, but would make its full impact in 1991.

      In reply to a question from Mr REFEROWSKI, Mr ATHANÉ confirmed that the financial situation had allowed the recruitment at the beginning of 1990 of a tenth officer in the Bureau, Mr Édouard Weber, whose main task was the editing of OIML documents written in French; he was giving every satisfaction and took a lively interest in his work.

      The predictions of income and expenditure for 1991 should be sent out at the end of November or the beginning of December 1990. Those predictions would take the following facts into account:

      - an increase in inflation for which it was then impossible to give a figure; the Organization's reserves should be sufficient to withstand a rate of inflation of 5% or 6% (compared with a figure of 3.5 % used by the Eighth Conference in deciding the budget for 1989 to 1992) and for the time being the Committee was not being asked for an increase in the budget; the situation would have to be considered carefully at the Committee's next meeting,

      - the accession of Saudi Arabia (a gain of one contributory share) and the reunification of Germany (a loss of two contributory shares) led to a loss of one share; the individual contributions of the Member States for 1991 would show a rise therefore of about 1%.

