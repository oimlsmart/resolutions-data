      The BUREAU announced the following:

      - the titles of the Reporting Secretariats of SP 14, "Acoustics and vibration", would be changed in accordance with the results of the enquiries made by the Bureau at the request of SP 14,

      - the United Kingdom was no longer in a position to assume responsibility for Reporting Secretariat SP 16-Sr 4, "Dosimetric methods of measurement in the industrial use of ionizing radiations", and had indicated that the USA would no doubt agree to take it over.

      Mr CHAPPELL confirmed his country's willingness to take on the responsibility and said that a work programme would soon be ready. The new programme might differ little from the initial programme proposed by the UK.

      Mr BENNETT spoke of his disappointment at having had to give notice that, because of the unavailability of appropriate members of staff, the NPL had to abandon that responsibility; he gave his assurance that his country would continue to take part in the work.

- number: '7.3'
  title:
  - spelling: eng
    value: Approval of International Recommendations
  narrative:
  - spelling: eng
    value: |2+

      By a vote of which the results are given in Annex 1, the Committee approved the following International Recommendations for immediate publication and formal submission to the Ninth Conference:

      - Metrological regulation of load cells,

      - High-precision line measures of length,

      - Indicating pressure gauges, vacuum gauges and pressure-vacuum gauges,

      - Recording pressure gauges, vacuum gauges and pressure-vacuum gauges,

      - Instruments for measuring vehicle-exhaust emissions,

      - Atomic absoption spectrometers for measuring metal pollutants in water.

      It was stated that the two Recommendations on pressure gauges would be printed in the form of a compilation in which the Recommendation R 94, sanctioned by the Eighth Conference, would also be included.

      7. 4. A method by which the Committee might approve certain revised International Recommendations (R 74 and R 76) at its 26th meeting in 1991

      Mr BIRKELAND said that two Recommendations, R 74 and R 76 on weighing instruments, were being revised and that it was extremely important, not only for OIML but also for the regional organizations that used its work, that the drafts be approved by the Committee at its next meeting.

      With account taken of the state of progress of the revisions, that would be possible only if the Committee accepted that an accelerated procedure be adopted, in particular the shortening of the usual six-month period of study and postal comment by all the Members of the Committee.

      The facts that both of those Recommendations were well known, and that all the Member States directly concerned in the work were participating in the working groups concerned, were conductive to the Committee's agreement.

