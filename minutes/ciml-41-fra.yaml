sections:
- number: '2'
  title: 1 Situation de certains Membres
  narrative: |2+

    Le CIML a pris note de la situation de la République Démocratique Populaire de Corée et de la Zambie concernant le paiement de leurs arriérés. Ces pays avaient changé leur statut pour devenir des Membres Correspondants depuis la 40ème Réunion du CIML.

    Le CIML a également pris note du rapport du Directeur du BIML sur la mise en oeuvre de la décision de la 40ème Réunion du CIML relative à la révision des contributions des Etats Membres.

    ## 3 Affaires financières

- number: '3'
  title: 1 Adoption du Rapport d'Audit pour 2005
  narrative: |2+

    Le Comité a approuvé le Rapport d'Audit pour 2005 et requis de son Président, et du Directeur du BIML, de le soumettre à la 13ème Conférence, en 2008

- number: '4'
  title: 1 Rapport sur les activités du Conseil de la Présidence
  narrative: |2+

    Le Comité a pris note du rapport de son Président concernant les activités du Conseil de la Présidence depuis la 40ème Réunion du CIML.

- number: '5'
  title: 1 Rapport sur les activités du PWGDC
  narrative: |2+

    Le Comité a pris note du rapport établi par MM. Seiler et Dunmill quant aux activités du Groupe Permanent de Travail sur les Pays en Développement (PWGDC), et a exprimé à Mr. Seiler sa gratitude pour l'efficacité de sa présidence.

    Le Comité a décidé qu'il devait être donné aux propositions de Mr. Seiler toute la considération qui leur est due, et a requis que les activités des Pays en Développement soient incluses dans le document portant sur la Stratégie de l'OIML, de même que dans le Plan d'Action.

- number: '6'
  title: 1 Présentation par le Bureau des activités de liaison
  narrative: |2+

    Le Comité a pris note de la présentation des activités de liaison donnée par le Directeur du BIML.

    ## BIPM/Convention du Mètre

    Le Comité a exprimé son appréciation sur l'ébauche de Plan d'Action commune OIML/Convention du Mètre et a requis de son Président et du Directeur du BIML de continuer cette coopération, et d'en faire le rapport lors de la 42ème Réunion du CIML.

    Il a également apprécié les efforts tangibles faits par les deux Organisations durant l'année passée, notamment la nouvelle publication commune d'informations décrivant leurs domaines d'activités respectifs, les avancées dans la création d'un portail web commun ainsi que le travail engagé sur les brochures thématiques communes résultant de réunions tenues entre le Personnel des deux Bureaux.

    ## ILAC

    Le Comité a exprimé sa satisfaction quant au projet de Mémorandum d'Entente OIML/ILAC et a requis de son Président de la prise en compte des commentaires exprimés, en vue d'une signature le plus rapidement possible.

    ## JCGM

    Le Comité a requis du Bureau qu'il résume les commentaires des Membres du CIML portant sur le Projet de Révision du Vocabulaire International de Métrologie (VIM) et sur les Suppléments au GUM, et de les présenter au Comité commun pour les guides en métrologie (JCGM). Le Comité a donné pouvoir au Directeur du BIML pour avaler la révision finale du VIM ainsi que les Suppléments au GUM lors de la Réunion du JCGM.

- number: '7'
  title: 2 Communication,site web
  narrative: |2+

    Le Comité a pris note de la présentation faite par Mr. Pulham concernant les développements en ce domaine, et a exprimé sa gratitude au Bureau.

    Notant les avancées significatives faites par le BIML en matière de communication électronique durant l'année passée, le Comité a fermement demandé à tous les Membres du CIML d'utiliser les outils en ligne fournies par le site web OIML, en particulier pour:

    - Déposer leurs votes et commentaires sur les projets, dans les délais impartis;

    - Encourager les Secrétariats des TC/SC de l'OIML à contrôler régulièrement les informations publiées sur leurs pages web respective issues de la base de données des Comités Techniques, et

    - Communiquer au Bureau toute mise à jour d'informations dès que celle-ci est disponible.

    Le Comité a apprécié que des Groupes de Travail interactifs pour le travail technique aient été rendus disponibles sur le site web OIML, et a encouragé les Secrétariats, les Membres-P, les Membres-O et les Liaisons de tous les TC/SC à en faire usage dès que disponibles.

    Le Comité a approuvé la proposition du Bureau de rendre dès à présent public sur le site OIML tous les Projets de Comité.

    ## 8 Activités techniques

    Le Comité a pris note d'une présentation de Mr. Szilvassy relative à la progression du travail technique.

- number: '8'
  title: 1 Approbation de Recommandations Internationales et Documents Internationaux
  narrative: |2+

    Le Comité a approuvé les Recommandations suivantes:

    DR 1: R 49-1 Compteurs d'eau destinés au mesurage d'eau potable froide et d'eau chaude. Partie 1: Exigences métrologiques et techniques;

    DR 2: R 49-2 Compteurs d'eau destinés au mesurage d'eau potable froide et d'eau chaude. Partie 2: Méthodes d'essai;

    DR 3: R 137-1 Compteurs de Gaz. Partie 1: Exigences (Nouvelle Recommandation);

    DR 4: R 116 Spectromètres à émission atomique de plasma couple inductivement pour le mesurage des polluants metalliques dans l'eau;

    DR 5: R 82 Chromatographes en phase gazeuse pour la mesure des pollutions par pesticides et autres substances toxiques;

    DR 6: R 83 Chromatographe en phase gazeuse/ spectromètre de masse pour l'analyse des polluants organiques dans l'eau;

    DR 7: R 76-1 Instruments de pesage à fonctionnement non automatique. Partie 1: Exigences métrologiques et techniques - Essais;

    DR 8: R 65 Système de mesure de force des machines uniaxiales d'essai des matériaux;

    DR 9: R 39 Machines de dureté Rockwell;

    DR 10: R 51-1 Instruments de pesage trieurs-étiqueteurs à fonctionnement automatique. Partie 1: Exigences métrologiques et techniques - Essais;

    DR 11: R 134-1 Instruments à fonctionnement automatique pour le pesage des véhicules routiers en mouvement et le mesurage de la charge à l'essieu. Partie 1: Exigences métrologiques et techniques - Essais. Les remarques des Etats Unis relatives à la terminologie et au champ général d'application de la Recommandation seront prises en compte.

    Et également approuvé les Amendements suivants:

    AM 1: Amendement au B 3 Système de Certificats OIML pour les Instruments de Mesure;

    AM 2: Amendement au B 10-1 Cadre pour un Arrangement d'Acceptation Mutuelle sur les Évaluations de Type de l'OIML (MAA).

    Considérant l'importance et l'état d'avancement élevé de quelques projets au niveau des TC/SC, le Comité a requis du Bureau de procéder à l'approbation en ligne par le CIML des nouvelles Recommandations et Recommandations révisées suivantes:

    - Projet OIML TC 8: Récipients utilisés pour la vente au détail au public;

    - Projet commun OIML TC 8/SC 3 et TC 8/SC 4: R 117-1 Ensemble de mesurage de liquides autres que l'eau. Partie 1: Exigences;

    - Projet OIML TC 8/SC 7: Ensemble de mesurage de gaz;

    - Projet OIML TC 8/SC 7: Ensemble de mesurage de gaz compressé pour véhicule;

    - Projet OIML TC 17/SC 4: R 56 Solutions étalons reproduisant la conductivité des electrolytes.

    ## Le Comité:

    - A approuvé le retrait de la R 74 Instruments de pesage électroniques; et

    - Délégué les décisions sur le futur de la R 24 Mètre étalon rigide pour agents de vérification et de la R 66 Instruments mesureurs de longueurs à son Président (en accord avec l'Article XV de la Convention). Ces décisions devraient être prises après que le BIML ait conduit une plus large enquête auprès de ses Membres, à la suite de la 41ème Réunion du CIML.

- number: '9'
  title: 1 Approbation de la procédure pour l'élection du Président et des Vice-Présidents
    du CIML
  narrative: |2+

    Le Comité a approuvé la procédure pour l'élection du Président et des Vice-Présidents du CIML, et a décidé que cette procédure serait applicable pour l'élection du second Vice-Président, au Point 9.2 de l'Ordre du Jour (voir ci-dessous). Le Comité a requis du Bureau de la publier sur le site web de l'OIML.

- number: '10'
  title: 1 42ème Réunion du CIML (2007)
  narrative: |2+

    Le Comité a pris note de la présentation faite par la République Populaire de Chine en rapport avec l'organisation de la 42ème Réunion du CIML à Shanghai, en octobre 2007, et a remercié le Gouvernement chinois et le Membre chinois du CIML pour leur invitation, laquelle a été définitivement acceptée par le Comité.

