    Mr. Faber said that there was not too much to report after the extensive reports and discussions which took place in Beijing in 1995 and in Vancouver in 1996, since the situation had practically not evolved over the last twelve months. In application of the Resolution adopted by the Tenth Conference, he had led an OIML delegation which had attended a joint Convention du Mette/OIML meeting at the BIPM. In addition to the representatives of the two organizations, Messrs. Gilmour and Karls had attended the last part of the meeting as ILAC representatives. The discussions on cooperation had mainly focused on the matter of developing countries, which will be discussed in more depth under Item 10 of the agenda. Mr. Faber had also taken this opportunity to introduce the Birkeland study and try to establish some preliminary links with the Blevin study which was being conducted within the CIPM. He said that the reactions

    from the representatives of the Convention du Mette had not been fully favorable to the OIML decision to initiate the Birkeland study, which had obliged him to affirm the need for the OIML to develop papers concerning its strategy and long-term policy.

    Concerning the second part of the meeting with ILAC participation Mr. Faber said that both the Convention du Mette and the OIML representatives had affirmed their interest in cooperating with ILAC. Concerning the OIML, "rapprochement" should not be limited to the BIPM, but should include other metrology or metrology-related organizations, especially ILAC.

