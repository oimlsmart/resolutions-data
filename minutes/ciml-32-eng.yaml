  title: 1 $ 3 3^{\mathrm{r d}} $ and $ 3 4^{\mathrm{t h}} $ meetings of the CIML
  narrative: |2+

    The Delegation of the Republic of Korea confirmed that the $ 33^{\mathrm{rd}} $ CIML meeting will be held in Seoul during the last week of October 1998 (i.e. the week following the ILAC meeting in Sydney), organized by KNITQ. This CIML meeting will be held in con-

    junction with a meeting of the OIML Development Council and a meeting of the APLMF. The preparations for these meetings are now well advanced and the major issues have already been solved. KNITQ will maintain close cooperation with the BIML to set up the final schedule. The Delegation of the Republic of Korea expressed its pleasure at being honored to welcome OIML Members on this occasion.

    On behalf of the CIML, Mr. Faber expressed his deep appreciation for the arrangements made by KNITQ to ensure the success of the $ 3 3 ^{r d} $ CIML meeting.

    Mr. Issaev suggested that at this next CIML meeting the establishment of a World Metrology Day be discussed and he proposed to adopt the $ 2 0^{\mathrm{th}} $ of May, which is the anniversary of the signing of the Convention du Mette.

    Concerning the $ 34^{\mathrm{th}} $ CIML meeting, Mr. Athané said that nothing had been decided up to now since it had been envisaged to hold a joint conference with the Convention du Mentre in 1999. Now that a merger with the BIPM was no longer foreseeable, the $ 34^{\mathrm{th}} $ CIML meeting should normally take place in 1999 and would be organized by the BIML in Paris unless a Member State is willing to host the meeting. A final decision should be made in October 1998 in Seoul.

