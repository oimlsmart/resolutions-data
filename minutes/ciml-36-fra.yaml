    Mr. Faber reminded the participants that on the occasion of the $ 35^{\mathrm{th}} $ CIML Meeting an invitation had been received from Israel. However, because of the current situation, a number of countries had indicated that they might not be able to attend a meeting in Israel in 2002. Mr. Faber indicated that the Israeli authorities had accepted to postpone their invitation to 2004. Since there was no invitation for 2002, the Committee decided that its $ 37^{\mathrm{th}} $ Meeting would be held in France around late September or early October 2002, organized by the BIML under the supervision of the CIML President and his Council.

