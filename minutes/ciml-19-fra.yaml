- number: '6.1'
  title: Examen de l'état d'avancement des travaux
  narrative: |2+

    Une édition, à jour au 1er avril 1983, du document « Etat d'avancement des travaux des Secrétariats de l'OIML » est distribuée aux participants ; elle contient de plus une liste des projets de Recommandations et Documents Internationaux susceptibles d'être adoptés et publiés d'ici fin 1984.

    Il est rappelé par ailleurs que l'activité des Secrétariats fait maintenant l'objet d'un rapport annuel dans le Bulletin.

- number: '6.2'
  title: Adoption, à titre provisoire, de projets de Recommandations Internationales
  narrative: |2+

    Deux projets, relatifs aux « Sonomètres » et aux « Humidimètres pour grains de céréales et graines oléagineuses » sont présentés pour adoption à titre provisoire par le Comité, et publication, avant leur sanction définitive par la 7ème Conférence.

    Ils sont adoptés avec les résultats suivants :

