- number: '3.1'
  title: Adoption des rapports comptables pour 1981 et 1982
  narrative: |2+

    M. DIXON, au nom de M. SOUCH, demande si, considérant le nombre non négligeable d'Etats Membres en retard dans leur paiement, il ne serait pas judicieux

    de différer (par exemple jusqu'à 1984) l'adoption de ces rapports pour marquer la désapprobation du Comité vis-à-vis de ces retards et inciter les Etats retardataires à remplir au plus vite leurs obligations.

    M. PETRY estime que les rapports ont principalement pour but de montrer comment les fonds sont versés et comment ils sont dépensés; le fait de différer l'adoption des rapports ne pourrait en aucun cas changer les rapports eux-mêmes.

    Les participants se rangent à cet avis et le Comité adopte les deux rapports et charge son Président et le Directeur du Bureau de les soumettre à la 7ème Conférence.

- number: '3.2'
  title: Examen des estimations financières pour 1983
  narrative: |2+

    M. ATHANE rappelle que ces estimations ont été présentées aux Membres du Comité vers la fin de 1982, et complétées par des explications faisant suite à des questions de M. PETRY. Ces estimations étaient accompagnées d'un rappel des prévisions de recettes et autorisations de dépenses faites par la Conférence de 1980. Il apparaît que les estimations pour 1983 sont raisonnablement compatibles avec les décisions de la Conférence, l'augmentation des dépenses étant compensée par une augmentation des recettes.

    Deux lignes budgétaires sont cependant en sensible augmentation :

    - déplacements, en raison de l'accroissement du nombre et du coût des voyages que font les agents du Bureau,

    - dépenses exceptionnelles, en raison d'un programme de rénovation du Siège de l'Organisation.

    M. DAMM indique que la République Démocratique Allemande accepte ces estimations mais demande que les écarts entre dépenses réelles et dépenses autorisées par la Conférence soient limités le plus possible; il demande par ailleurs que le Bureau présente à la 7ème Conférence un programme d'économies financières permettant de limiter l'augmentation continue des contributions.

    M. PETRY estime justifiée l'augmentation sensible des dépenses en ce qui concerne les deux lignes budgétaires en question; en effet, le Bureau doit participer dans toute la mesure du possible aux travaux des Secrétariats pour leur apporter son aide mais également pour représenter indirectement les intérêts de pays qui, comme l'Australie, ne peuvent souvent participer à ces réunions; par ailleurs l'immeuble de la rue Turgot est la « façade » de l'Organisation et sa rénovation apparaît tout à fait nécessaire. Enfin M. PETRY s'associe à une remarque de M. EDGERLY, qui mentionne que les contributions des Etats Membres à l'OIML sont, en valeur absolue, très faibles par rapport à celles d'autres Organisations.

    Pour ce qui est de la préparation du budget 1985-1988 qui sera fixé par la 7ème Conférence, le Comité accepte les propositions du Directeur du Bureau de soumettre à ses Membres, par correspondance, deux propositions préalables (croissance zéro et croissance modérée) pour discussion avant présentation de la (ou des) proposition(s) définitive(s) à la Conférence.

    Le calendrier suivant est adopté :

    Juin 1983 : envoi des propositions préalables

    Octobre 1983 : examen des réponses par le Conseil de la Présidence et information des Membres du Comité

    Février 1984 : mise au point des propositions définitives par le Conseil de la Présidence et le Bureau

    Mai 1984 : envoi des documents de la Conférence

- number: '3.3'
  title: Note sur le Franc-Or
  narrative: |2+

    Le Comité prend note des informations données par le Directeur du Bureau à ce sujet.

- number: '3.4'
  title: Note sur le Fonds de Réserve de l'OIML
  narrative: |2+

    M. ATHANE rappelle que le Fonds de Réserve, tel qu'il apparaît dans les rapports comptables, comprend d'une part les contributions non payées, d'autre part les disponibilités liquides de l'Organisation; celles-ci représentent environ deux mois de fonctionnement, et devraient être portées à quatre mois pour assurer une certaine sécurité de fonctionnement du Bureau.

    MM. EDGERLY et VATRICAN estiment qu'il serait plus raisonnable de chercher à augmenter le fonds de réserve à environ six mois de fonctionnement; par ailleurs M. VATRICAN insiste pour que les propositions qui seront faites à ce sujet à la Conférence, ainsi que toutes autres propositions financières, soient basées sur les résultats financiers les plus récents. M. MÜHE fait état d'observations qui ont été formulées par les autorités financières de son pays, et qui sont peut-être dues au fait que le Fonds de Réserve englobe à la fois des dettes d'Etats Membres en retard dans leurs paiements, et les disponibilités réelles.

    A la suite de cette intervention, M. BIRKELAND demande au Bureau d'examiner la possibilité de séparer, dans les rapports comptables, les dettes des Etats Membres et les disponibilités.

    A la demande de MM. FAHY et OHLON, le Bureau est chargé d'effectuer une étude de l'etalement dans le temps, mois après mois, des rentrées de recettes et des dépenses afin de mettre en évidence, lorsque cela a été le cas, la nécessité d'utiliser le Fonds de Réserve (en particulier en début et en fin d'année).

    Sur une question de M. HOLTVEG, M. ATHANE indique que l'octroi de prêts bancaires, crédits de caisse ou autres facilités de paiement serait en principe difficile à obtenir, vu le statut de l'OIML.

    A l'issue des discussions, le Comité (avec réserve de l'Italie) adopte la Résolution suivante :

    Le Comité International de Métrologie Légale,

    CONSIDERANT que le montant total du Fonds de Réserve comprend pour une large part des contributions impayées et que le montant réel des disponibilités représente au maximum 2 mois de fonctionnement du Bureau,

    DEMANDE aux Etats Membres en retard de s'acquitter de leurs arriérés aussi rapidement que possible,

    RAPPELLE à tous les Etats Membres que les contributions doivent être payées en début d'année,

    ESTIME approprié d'examiner, lors de la prochaine Conférence la possibilité de porter les disponibilités du Fonds de Réserve à un niveau équivalent à environ 4 mois de fonctionnement du Bureau.

