- number: '7.1'
  title: Examen de la situation de certains Secrétariats
  narrative: |2+

    ## a) SP 5 « Mesure des volumes de liquides »

    M. MÜHE indique que les trois Etats co-responsables, République Fédérale d'Allemagne, Etats-Unis d'Amérique et France, sont d'accord pour maintenir le statuquo jusqu'à la Conférence d'Helsinki : les trois Etats se chargeront de faire avancer les travaux des divers Secrétariats Rapporteurs et d'animer les Secrétariats les moins actifs, la République Fédérale d'Allemagne continuant d'assumer la responsabilité du Secrétariat commun jusqu'à Octobre 1984. A cette date, une nouvelle solution devra avoir été trouvée, par exemple couper le Pilote en deux, la France se chargeant des mesurages statiques et un autre pays des mesurages dynamiques. M. MÜHE fait le bilan des travaux récents, qui montre que ce Secrétariat a été fort actif.

    M. IIZUKA mentionne que la réunion conjointe de plusieurs Secrétariats Rapporteurs, à Tokyo, a été un succès.

    M. ATHANE indique enfin que les relations avec l'ISO au sujet du mesurage des liquides sont maintenant aussi bonnes que possible et que la collaboration est très fructueuse.

    M. BIRKELAND exprime en conclusion la satisfaction du Comité pour cet état de chose et attend des propositions concrètes pour octobre 1984.

    ## b) Dispositifs électroniques

    La question proposée à la discussion du Comité est de savoir si, dans le cadre d'un Secrétariat Pilote, il faut créer un Secrétariat Rapporteur spécialisé dans l'électronique, ou si au contraire chaque Secrétariat Rapporteur, s'occupant d'un instrument donné, s'occupe aussi des dispositifs électroniques associés à cet instrument.

    M. LE BOUCH constate que de plus en plus tous les instruments associent l'électronique et considère qu'il est impossible de mettre d'un côté l'instrument, de l'autre l'électronique; chaque Secrétariat doit s'occuper de l'instrument dans son ensemble, y compris les parties électroniques.

    M. EDGERLY, tout en exprimant son accord de principe avec ce qui vient d'être dit, pense qu'il est néanmoins indispensable qu'il y ait une coordination générale, pour laquelle le SP 2-Sr 6 a été créé, et que les Secrétariats Rapporteurs individuels doivent obligatoirement suivre les lignes générales ainsi fixées.

    Mme HENRION approuve ce qu'a dit M. LE BOUCH, mais souligne les risques qu'il y aurait à confier l'électronique à des spécialistes de cette technique, qui n'auraient pas de connaissances métrologiques suffisantes.

    M. BIJLOO rappelle qu'effectivement le SP 2-Sr 6 a été créé pour établir un ensemble très général d'exigences relatives à l'électronique. En effet, de plus en plus, ce sont des dispositifs électroniques très similaires qui peuvent être associés à des instruments très divers (pesage, volumes de liquides...). Il ne faudrait donc pas que les Secrétariats traitant de ces instruments établissent pour l'électronique

    des exigences différentes les unes des autres. Dans le futur document du SP 2-Sr 6, chaque Secrétariat pourra choisir ce qui convient aux instruments électroniques dont il s'occupe. Pour éviter tout conflit, la méthodologie recommandée serait la suivante : les Secrétariats Rapporteurs discutent de leurs problèmes d'électronique avec leur Pilote, pour assurer déjà une unité de vue entre les différents Rapporteurs travaillant dans le cadre d'un même Pilote ; puis, le Pilote peut entrer en contact avec le SP 2-Sr 6, ou préférablement établir une liaison entre le SP 2-Sr 6 et les différents Rapporteurs concernés ; une autre solution, qui semble aux Pays-Bas excellente, serait que chaque Pilote crée un Rapporteur spécialisé en électronique, pour assurer la liaison avec le SP 2-Sr 6.

    M. BIRKELAND estime qu'il est difficile d'adopter une solution unique, applicable à tous les Pilotes : il demande en conclusion à chaque Pilote d'examiner la question et de choisir la solution qui semble la mieux adaptée.

    c) Situation d'autres Secrétariats

    Voir point 7.2.

    d) Meilleure répartition des responsabilités

    Il apparaît que pratiquement tous les Secrétariats de l'OIML (au nombre d'environ 180) sont sous la responsabilité de 11 Etats Membres (sur 48) et que 4 Etats Membres assurent 60 % de cette charge.

    M. BIRKELAND ne pense pas que les Membres du Comité soient immédiatement préparés à accepter une modification de la répartition de cette charge, mais il demande à ses Collègues de réfléchir à ce problème.

    M. LA BOUCH souligne, que pour la France, la charge de 5 Pilotes est trop lourde et qu'il souhaiterait voir réduire ce nombre à 4.

    M. EDGERLY expose les problèmes que rencontre les USA pour faire fonctionner le SP 13 (Electricité). Par ailleurs les USA souhaiteraient proposer la suppression du SP 13-Sr 1 (Compatibilité des étalons) (voir aussi point 7.2).

    M. BIRKELAND conclut les discussions en rappelant l'activité de planification dont le Conseil de la Présidence a été chargé : la question de répartition des responsabilités pourra entrer dans le cadre de cette étude.

- number: '7.2'
  title: Suppression de certains Secrétariats
  narrative: |2+

    En janvier 1983, le Bureau a écrit à un certain nombre d'Etats responsables de Secrétariats Rapporteurs dont l'activité était, semble-t-il, assez réduite; le but de cette enquête était de savoir si des difficultés particulières empêchaient le déroulement des travaux, ou encore si une suppression des Secrétariats n'était pas envisageable, en raison par exemple du manque d'intérêt que présentent les sujets en question.

    Avec l'accord des Etats responsables, le Comité supprime les deux Secrétariats Rapporteurs :

    SP 9-Sr7 « Mesure de la masse volumique des solides » (France)

    SP 18-Sr 5 《 Saccharimètres pour différents usages commerciaux ou industriels 》 (Royaume-Uni)

    La situation des wattmètres et des dosimètres est évoquée : aucune décision n'est prise à leur sujet ; en ce qui concerne le mesurage des grandeurs électriques (SP13), le Comité exprime son accord pour que le Bureau, en liaison avec les Etats concernés et en tenant compte des travaux de la CEI, étudie soigneusement le problème ; en ce qui concerne les dosimètres dont la Suisse voudrait abandonner la responsabilité, M. ZSDANSZKY pense qu'une référence à la Norme CEI pourrait être faite, comme pour les sonomètres.

    M. OHLON recommande que, lors des contacts avec la CEI, on discute également d'autres sujets d'intérêt commun, comme les instruments bio-électriques.

- number: '7.3'
  title: Mise en activité de nouveaux Secrétariats
  narrative: |2+

    a) Il est rappelé au Comité qu'un Secrétariat sur le mesurage de la surface des peaux (SP 4-Sr 6) a été mis en activité sous la responsabilité de la Hongrie; par ailleurs la Belgique assume maintenant seule la responsabilité du SP 4-Sr 2 (mesures matérialisées de longueur).

    ## b) Pollution

    M. EDGERLY indique qu'il a récemment distribué à tous les Membres du Comité une proposition concernant le programme de travail de deux nouveaux Secrétariats Rapporteurs, SP 17-Sr 2 « Mesure des pollutions de l'eau » et SP 17-Sr 4 « Mesure des pesticides et des substances toxiques », pour la responsabilité desquels les USA sont candidats. Il confirme qu'un groupe de travail national a été constitué et il en donne la composition; il indique qu'il souhaite organiser une réunion du SP 17 et des différents Secrétariats Rapporteurs au printemps 1984. Il propose que, en raison du peu de temps qui a été donné aux Membres du Comité pour étudier ces propositions, le Comité se contente d'attribuer la responsabilité de ces Secrétariats aux USA, les plans de travail détaillés devant être fixés au cours de la réunion du SP 17.

    M. EDGERLY évoque les contacts qui ont été pris avec l'OCDE, l'ISO, la CEI, l'OMS pour faire connaître les projets de travail de l'OIML, s'assurer que les duplications de travail seront évitées au maximum et rechercher la collaboration des experts de ces Institutions. Il indique enfin que, en ce qui concerne la pollution de l'eau, le premier travail sera une enquête pour connaître les besoins des Etats Membres de l'OIML.

    M. HOLTVEG remarque que les travaux prévus pourraient porter sur des instruments analytiques utilisés pour bien d'autres mesurages que ceux de la pollution.

    M. EDGERLY répond que les dits instruments feraient l'objet de travaux de l'OIML dans la mesure où ils peuvent être utilisés pour mesurer les pollutions plutôt que d'un point de vue général.

    M. HOLTVEG suggère qu'il serait néanmoins utile d'essayer d'envisager les instruments d'abord d'un point de vue général, puis dans l'optique spécifique du mesurage des pollutions.

    M. MUHE demande que l'on évite les conflits entre Secrétariats de l'OIML ; par exemple la mesure du pH (SP 30-Sr 1) est très utilisée dans le mesurage des pollutions de l'eau. Il préconise également que les travaux soient vraiment axés sur les instruments et leur étalonnage.

    M. PERLSTAIN approuve M. MUHE et mentionne deux types d'instruments, les spectromètres de masse et les chromatographes, pour lesquels se posent des problèmes d'etalonnage.

    M. ISSAEV soutient fortement la proposition de M. EDGERLY, et propose que les discussions détaillées soient reportées à la prochaine réunion du SP 17.

    MM. KNAPP, ISSAEV, MUHE, ZSDANSZKY et PERLSTAIN indiquent dès maintenant leur intention de participer aux travaux.

    M. BIRKELAND, constatant que la participation est déjà substantielle, considère que le Comité est d'accord pour attribuer officiellement la responsabilité des deux nouveaux Secrétariats aux USA, le Bureau étant chargé de dresser, par correspondance, la liste des Collaborateurs.

    ## c) Photométrie et radiométrie

    M. THULIN indique que le Bureau a reçu une lettre de la Yougoslavie suggérant que soit étudiée la possibilité de s'occuper de ces questions; en effet, celles-ci peuvent présenter un caractère légal (sécurité du travail par exemple), il y a le problème de fixation de niveaux d'éclairage à respecter, celui de l'etalonnage des instruments, etc. En conclusion, il paraîtrait logique de créer un Secrétariat à cet effet.

    M. ROTTER rappelle que le sujet est déjà traité par un Comité Consultatif de la Convention du Mètre et par la CIE; il ne pense pas qu'il y ait des travaux supplémentaires dont l'OIML devrait se charger.

    M. VATRICAN demande que l'on précise clairement si la proposition concerne la photométrie, ou également la radiométrie.

    M. THULIN répond que, en radiométrie également, il y a des aspects légaux.

    M. BIRKELAND conclut en demandant au Bureau d'effectuer une étude de la question et d'en soumettre les résultats à la prochaine réunion du Comité.

    d) Laboratoires cliniques

    M. EDGERLY indique que l'enquête sur l'éventuelle création d'un Secrétariat Rapporteur SP 26-Sr 6 « Contrôle de la compétence des laboratoires cliniques » n'a pas obtenu de résultats probants. Il se réserve la possibilité de redemander l'examen de cette question, ultérieurement.

- number: '8'
  title: SYSTEME DE CERTIFICATION OIML
  narrative: |2+

    M. PETIK résume la situation actuelle : le groupe ad hoc a établi un projet relatif aux principes d'un système de certification OIML, et l'a présenté au Comité, lors de sa 18ème session. Le Comité a estimé que le groupe ad hoc devrait se réunir à nouveau pour poursuivre son étude. La réunion a eu lieu en octobre 1982, et les discussions ont montré des divergences importantes en ce qui concerne la forme d'un tel système. Trois possibilités sont apparues :

    — créer un système, de caractère informatif (sans obligation de reconnaissance mutuelle) ;

    — créer un système contraignant (avec obligation de reconnaissance mutuelle) en le limitant aux Etats Membres volontaires pour y participer ;

    — ne pas mettre en place de système, pour le moment.

    Dans une annexe aux documents présentés, le Bureau a essayé de faire une analyse comparative des différents systèmes possibles.

    M. EDGERLY explique les réticences ressenties aux USA vis-à-vis du projet initial, et qui justifient la contre-proposition présentée par son pays. Il demande au Comité d'indiquer clairement que les projets visant à instaurer un système de certification fonctionnant grâce à une commission spécialisée sont interrompus et que les efforts iront vers un programme de reconnaissance mutuelle des contrôles nationaux, basé sur des documents de référence OIML devant être établis par les Secrétariats Pilotes et Rapporteurs, et fonctionnant sur des principes devant être définis par le SP 2-Sr 4. Il réaffirme l'importance qu'il attache à l'établissement, dans le futur, d'un tel programme de reconnaissance mutuelle des approbations de modèles et des vérifications.

    M. PETRY déclare que, bien que l'Australie n'ait pas participé au groupe ad hoc, son intérêt pour la question est très grand. Il pense que l'on a visé trop haut et trop vite. Il peut s'écouler des années avant que le Comité puisse établir une marque de certification. Déjà on a travaillé pendant cinq ans sans obtenir de résultat, et cependant, il est sans doute possible de faire quelque chose dès maintenant. L'Australie fait partie des pays qui importent la plupart des instruments; le système national d'approbation de modèle est très coûteux et fait double emploi avec ce qui est fait dans le pays producteur. M. PETRY estime possible de prendre contact avec ses homologues en Europe, aux USA, au Japon, pour établir des accords bilatéraux entre les autorités gouvernementales. Dans ce sens, il soutient à la fois les points de vue de la Tchécoslovaquie (système informatif) et des Etats-Unis (système contraignant) car tous deux pourraient satisfaire l'Australie. Il explique enfin les étapes qui ont déjà permis des accords bilatéraux avec certains pays pour certains types d'instruments.

    M. ISSAEV constate que la base métrologique nécessaire à l'établissement d'un système de certification ne pose pas de problème de principe, car c'est la responsabilité de notre Organisation. Les problèmes viendront des Gouvernements des Etats Membres, car il faudra résoudre les questions financières et économiques liées au système. Or ces questions ne sont pas du ressort des Membres du Comité. Il faudrait donc préparer des documents destinés aux Gouvernements des Etats Membres, ou tout au moins à ceux qui décideront de participer volontairement au système. Il se réfère à un accord de ce genre signé récemment dans le cadre du CMEA et suggère que le Bureau étudie ce qui a été fait ou ce qui est étudié par d'autres Organisations (CMEA, CEI, ...).

    M. HOLTVEG souligne qu'un système de reconnaissance mutuelle des essais ne pourra exister tant que l'on ne se sera pas mis d'accord sur des méthodes d'essais uniformes : c'est par là qu'il faut commencer.

    M. EDGERLY partage complètement l'avis de M. HOLTVEG et rappelle que le Comité a déjà décidé que les Recommandations de l'OIML doivent comporter une description des méthodes d'essais permettant de vérifier la conformité des instruments aux prescriptions des dites Recommandations. Il demande que le Comité vérifie que les Secrétariats suivent réellement cette décision.

    M. BIRKELAND indique que cette question sera explicitement traitée au point 8.3.

    Revenant sur la déclaration de M. ISSAEV, M. PETIK souligne que le groupe ad hoc a effectivement reconnu que les problèmes financiers, juridiques et administratifs devraient faire l'objet d'une étude séparée; il indique également que les travaux de l'ISO-CERTICO ont été analysés par le Bureau qui a résumé cette étude dans un document distribué aux participants.

    M. MUHE rappelle qu'il a introduit, dans son pays, la possibilité de mentionner, dans les documents d'approbation de modèle, la conformité avec telle Recommandation de l'OIML. Il pense que cela est un pas vers le but recherché et propose que les autres pays fassent de même.

    Mme HENRION propose que l'on commence par étudier et développer ce qui existe déjà : le Bureau pourrait étudier les accords bilatéraux ou multilatéraux existants, essayer d'établir des modèles d'accord et ainsi encourager de tels accords.

    M. PETRY approuve l'idée de Mme HENRION ; il est prêt à fournir au Bureau des informations sur les accords entre lui-même et environ six membres du Comité. Il explique comment pratiquement fonctionnent ces accords et pense que ces systèmes pourraient servir d'exemple au Bureau.

    M. OHLON appuie les idées développées par Mme HENRION et par MM. MUHE et PETRY.

    M. ROTTER explique les raisons administratives et législatives qui, en Autriche, rendront difficile l'introduction d'une reconnaissance systématique et complète des contrôles faits par d'autres pays.

    M. ZSDANSZKI indique que, en Hongrie, il est possible aux autorités d'approbation de reconnaître les essais faits dans un autre pays; un certificat de conformité aux Recommandations de l'OIML pourrait être accepté, évitant ainsi de refaire des essais.

    M. PERLSTAIN s'inquiète du caractère politique que pourrait avoir un système de certification OIML, en raison de l'aspect intergouvernemental de l'OIML ; il recommande donc que l'on se limite à ce qu'a proposé Mme HENRION.

    M. DAMM estime nécessaire de continuer le travail et pense que l'OIML a de bonnes chances d'arriver à des résultats positifs. Cependant les conditions d'approbation de modèle et de vérification, qui doivent être harmonisées par les Recommandations de l'OIML, sont encore trop différentes de pays à pays. En conséquence, seul un système informatif, ou basé sur des accords bilatéraux, pourrait être établi dans un premier temps ; on pourrait l'élargir par la suite.

    M. LANGE donne des explications sur un document établi par les pays scandinaves, fixant l'ensemble des essais auxquels peuvent être soumis les instruments de pesage à fonctionnement non-automatique, d'une portée d'au plus 30 kg. Le but de cette action est tout d'abord de faire en sorte que les essais soient effectués de la même manière et que les rapports d'essais, présentés de manière normalisée, soient immédiatement compréhensibles et utilisables par des tiers. Cela permettra, sur une base purement volontaire, à un pays de ne pas recommencer certains essais déjà faits par un autre pays, s'il ne l'estime pas nécessaire. M. LANGE indique également que ce document sera prochainement présenté au SP 7-Sr 4 comme projet d'annexe aux RI n° 3 et 28.

    M. FAHY rappelle qu'il a récemment écrit au Bureau pour demander que soit étudiée la possibilité de diffuser des informations sur les essais réalisés, lors des approbations de modèle, par les Services de Métrologie des Etats Membres de telle manière que, lorsqu'un autre Service doit faire une approbation, il ait à sa disposition des informations utiles qui lui permettront, le cas échéant, de ne pas recommencer tous les essais. Il estime que les discussions qui ont eu lieu vont exactement dans le sens de sa proposition.

    M. EDGERLY indique qu'aux USA un programme national d'essais de modele est en cours d'instauration, ce qui permettra une coopération plus étroite avec les Etats qui ont déjà un système d'approbation de modele, et rendra possible les accords bi ou multi-latéraux de reconnaissance mutuelle des essais.

    M. BIRKELAND conclut les discussions en constatant que, manifestement, le Comité veut que les travaux se poursuivent dans une voie plus informative et moins contraignante que celles qui avaient été envisagées par le groupe ad hoc. Il estime que le groupe ad hoc a travaillé exactement selon le mandat qui lui avait été fixé, mais que ses travaux ont clairement montré que la voie choisie ne pourrait, dans l'état actuel des choses, aboutir à la création d'un système de certification.

    D'autres voies sont apparemment possibles, ainsi que semblent l'avoir montré les discussions, et le Secrétariat Rapporteur SP 2-Sr 4, sous la responsabilité du Bureau, est sans doute l'organe approprié pour travailler dans ces nouvelles directions.

    M. BIRKELAND propose que les discussions soient concrétisées par la Résolution suivante, que le Comité adopte :

    Le Comité International de Métrologie Légale,

    CONSTATANT que les travaux sur le système de certification OIML ne peuvent, dans la situation présente, aboutir à la création d'un tel système,

    REMERCIE le groupe ad hoc pour le travail accompli,

    DISSOUT le groupe ad hoc,

    CHARGE le Secrétariat Rapporteur SP 2-Sr 4 « Reconnaissance internationale des contrôles et des marques de vérification », sous la responsabilité du BIML, de poursuivre, conformément aux discussions tenues lors de la réunion du Comité, des travaux axés en particulier sur les sujets suivants :

    - étude des accords bilatéraux ou multilatéraux de reconnaissance mutuelle des résultats d'essai,

    - examen des méthodes visant à faciliter la conclusion de tels accords bilatéraux ou multilatéraux,

    examen des possibilités visant à promouvoir des accords de coopération entre Etats-Membres en vue de faciliter l'octroi des approbations de modèle nationales,

    examen des possibilités visant à faciliter le développement de méthodes d'essai harmonisées, comme base pour l'approbation des équipements de mesure,

    examen des méthodes visant à faire en sorte que les exigences et essais d'approbation soient basés sur les prescriptions établies par l'OIML,

    - étude des systèmes de reconnaissance mutuelle des résultats d'essai et/ou de certification, envisagés ou déjà créés par d'autres institutions internationales,

    DEMANDE aux Membres du Comité de collaborer étroitement avec le Secrétariat Rapporteur SP 2-Sr 4,

    DEMANDE au BIML de faire rapport sur cette question à la prochaine réunion du Comité.

- number: '9'
  title: RELATIONS AVEC D'AUTRES INSTITUTIONS INTERNATIONALES
  narrative: |2+

    Il est tout d'abord rappelé qu'un rapport complet sera présenté à la 7e Conférence en octobre 1984, et que seuls quelques points particuliers relatifs à ce sujet sont soumis aux présentes discussions.

    a) Vocabulaire International de Métrologie (en collaboration avec BIPM, CEI et ISO).

    M. TURSKI fait le point sur la préparation du Vocabulaire International de Métrologie (VIM) qui est actuellement soumis à plus de 50 experts de 22 pays différents, dont 20 sont membres de l'OIML.

    M. EDGERLY explique les préoccupations des experts des USA à ce sujet et souhaite que le projet de VIM soit soumis à un sérieux examen avant publication.

    M. ATHANE indique que l'enquête dont a parlé M. TURSKI a justement pour but de procéder à un tel examen; il a été demandé aux experts en liaison avec l'OIML de transmettre au Bureau copie de leurs éventuels commentaires; ainsi le Bureau pourra-t-il se faire une opinion sur la qualité du travail et, en conséquence, soit s'associer pleinement à la publication du VIM, soit demander que les travaux soient poursuivis.

    M. ISSAEV demande que l'on veille à ce que le VIM s'éloigne le moins possible du Vocabulaire de Métrologie Légale de l'OIML.

    ## b) GATT

    Il est rappelé que les « Recommandations Internationales » de l'OIML sont des « normes internationales » dans l'esprit du « Code des normes » du GATT. Des contacts d'information réciproque existent à ce sujet entre le GATT et le BIML. Dans ce contexte, une lettre a été récemment envoyée au GATT pour expliquer le caractère purement informatif des « Documents Internationaux » de l'OIML, et donc demander que les obligations découlant du « Code des normes » du GATT ne s'appliquent pas systématiquement à eux.

    ## c) IMEKO

    Le Bureau fait part de ses préoccupations en ce qui concerne l'activité de IMEKO TC 8, et en particulier « l'école d'été » que ce comité envisage d'organiser en 1984 ; des positions très similaires ont été prises par le BIPM et le BIML qui ont fait part de leurs réticences au Président du TC 8.

    M. IIZUKA informe les participants de deux réunions des TC 3 et 14 de l'IMEKO au Japon en 1984 ; il est prévu que le BIML y participera.

    M. THULIN donne des informations sur « Weightech », exposition et symposium organisés plus ou moins régulièrement au Royaume-Uni avec la participation de IMEKO TC 3.

    ## d) ILAC

    Sur une demande de M. PERLSTAIN, M. HILL donne des informations sur la réunion de ILAC, à Prague en novembre 1983.

- number: '10'
  title: PAYS EN DEVELOPEMENT
  narrative: |2+

    M. THULIN indique que l'activité de l'OIML dans ce domaine est limitée par le manque de moyens financiers; en effet, les Agences spécialisées des Nations Unies n'ont que de très faibles possibilités; la coopération bilatérale est plus importante mais elle se fait, bien sûr, pratiquement sans participation de l'OIML, le Bureau se contentant de disséminer les informations dont il dispose.

    Des Organisations comme l'ISO, le Commonwealth Science Council (CSC), l'ASMO (pays arabes), l'ORAN (Afrique) organisent des séminaires auxquels l'OIML participe, soit par le Bureau, soit par un Etat Membre, quand la métrologie est concernée.

    L'UNESCO organise une réunion d'experts en enseignement de la métrologie (septembre 1983) à laquelle l'OIML sera représentée par l'URSS, responsable du SP 31, et par le Bureau.

    Le Conseil de Développement de l'OIML se réunira en avril 1984, après la réunion du SP 31; trois ou quatre Etats en développement seront invités à ces deux réunions, les frais de voyage et de séjour étant pris en charge par l'OIML.

    Enfin M. THULIN indique qu'il travaille à l'élaboration de guides pour les pays en développement, en particulier en ce qui concerne une réglementation simplifée.

    M. ROTTER indique que, pour des raisons politiques, la situation concernant l'institution en Autriche d'une Ecole de Métrologie est actuellement bloquée.

- number: '11'
  title: SEMINAIRES OIML
  narrative: |2+

    M. THULIN indique que, après le succès du séminaire sur l'électronique, un séminaire sur le contrôle des produits préemballés aura lieu à Berne, en juin 1983, sur invitation de M. PERLSTAIN. Ce séminaire sera suivi d'une réunion du SP 20. Pour le futur, il faut connaître l'opinion du Comité sur l'utilité de tels séminaires, et choisir un sujet intéressant pour la majorité des Etats Membres; il y a en particulier le mesurage, par masse ou par volume, des grosses quantités de produits.

    M. EDGERLY estime très utiles ces séminaires et attend beaucoup du séminaire de Berne ; il pense que le choix des sujets fait partie du processus de programmation des travaux, pour lequel le Conseil de la Présidence est responsable.

    M. ZSDANSZKI demande que des rapports écrites des séminaires soient établis à l'intention de ceux qui n'ont pas pu y participer.

    M. THULIN indique que cela peut se heurter à des difficultés matérielles de reproduction ; néanmoins, au minimum, une sélection des exposés est publiée dans le Bulletin ; par ailleurs il est prévu que les exposés présentés sous forme écrite pourront être rassemblés et que des copies pourront être envoyées aux demandeurs.

- number: '12'
  title: RAPPORT D'ACTIVITE DU BIML
  narrative: |2+

    Un rapport, couvrant la période mars 1982 - avril 1983, est distribué aux participants.

- number: '13'
  title: PREPARATION DE LA 7ème CONFERENCE INTERNATIONALE DE METROLOGIE LEGALE
  narrative: |2+

    Mme LAHTEENMAKI donne les informations détaillées sur la préparation de la 7ème Conférence conjointement à laquelle aura lieu la 20ème réunion du Comité. Le programme général a été établi et est distribué aux participants, avec des fiches de participation en vue des réservations d'hôtel.

    Un programme de visites techniques est envisagé, ainsi qu'une exposition d'instruments de fabrication finlandaise.

    Mme LAHTEENMAKI donne également des informations sur les structures de la métrologie en Finlande, récemment réorganisées. Elle conclut en disant aux participants combien elle-même et le Comité Finlandais sont heureux d'accueillir la 7ème Conférence de l'OIML et qu'ils feront de leur mieux pour assurer le succès de cette réunion.

    M. BIRKELAND remercie Mme LAHTEENMAKI et demande au Bureau de veiller à ce que les fiches de participation soient retournées à Helsinki en temps utile ; il confirme que la 20ème réunion du Comité aura lieu les 1er et 5 octobre 1984, encadrant la 7ème Conférence.

- number: '14'
  title: QUESTIONS DIVERSES
  narrative: |2+

    M. THULIN indique qu'il finit de réaliser deux documents qui seront prochainement diffusés : une brochure descriptive des structures de la métrologie dans les Etats Membres et Correspondants de l'OIML (ou tout au moins ceux qui ont répondu au questionnaire) et un Index des articles publiés dans les 100 premiers numéros du Bulletin. En ce qui concerne ce dernier, il rappelle que c'est le rôle des Membres du Comité de fournir le Bureau en articles, et qu'en particulier les articles en langue française font défaut.

    M. PETRY informe ses collègues que son Gouvernement serait très honoré d'organiser une réunion de l'OIML, et en particulier la Conférence de 1988 ; il suggère aux Membres du Comité d'étudier dès à présent les possibilités financières et matérielles d'un tel voyage afin que, si possible, une invitation ferme puisse être présentée en temps utile.

- number: '15'
  title: ELECTION DU DEUXIEME VICE-PRESIDENT DU COMITE
  narrative: |2+

    Sur proposition de M. BIRKELAND, et à la suite de suggestions présentées par de nombreux Membres du CIML, le Comité International de Métrologie Légale désigne comme Deuxième Vice-Président, à l'unanimité, le Professeur Dr. Ing. W. MÜHE, représentant de la République Fédérale d'Allemagne.

    M. MUHE exprime ses remerciements et assure le Comité qu'il fera tous ses efforts pour contribuer au développement de l'OIML, aux travaux de laquelle il participe depuis sa première Conférence, en 1956.

- number: '16'
  title: CLOTURE
  narrative: |2

    M. BIRKELAND exprime sa satisfaction du travail accompli pendant ces trois jours; il remercie tous ceux qui ont contribué à l'organisation de la réunion, et en particulier M. REPSTORFF HOLTVEG. Il donne rendez-vous à ses collègues à Helsinki, en octobre 1984.

    M. REPSTORFF HOLTVEG, au nom des Membres du Comité, remercie M. le Président pour la conduite des discussions.

    ## RÉSOLUTIONS et DÉCISIONS

    Le Comité a adopté le compte rendu de la 18ème réunion du CIML avec les modifications rédactionnelles mentionnées ci-avant.

    ## RESOLUTION CIML 1983 - POINT 2.2

    Le Comité International de Métrologie Légale,

    CONSIDERANT que la République Unie de Tanzanie a adhéré à l'OIML en 1979,

    CONSIDERANT que depuis son adhésion cet Etat n'a pas été en mesure de s'acquitter de ses contributions,

    CONSIDERANT que, conformément à la Convention instituant l'OIML, cet Etat devrait être considéré d'office comme démissionnaire,

    CONSIDERANT néanmoins les graves difficultés économiques que rencontre cet Etat,

    CONSIDERANT de plus l'intérêt que manifestent les responsables du Service de Métrologie de cet Etat à l'égard des travaux de l'OIML,

    CHARGE le Directeur du Bureau de prendre à nouveau contact avec les Autorités de Tanzanie pour essayer d'obtenir le paiement des contributions,

    DEMANDE à son Président et au Directeur du Bureau de faire rapport à la Septième Conférence sur ce sujet.

    ## DECISION CIML 1983 - POINT 3.1

    Le Comité a adopté les rapports comptables pour 1981 et 1982 et a chargé son Président et le Directeur du Bureau de les présenter à la Septième Conférence.

    ## DECISION CIML 1983 - POINTS 3.2 ET 3.3

    Le Comité a pris note des informations du Bureau sur les estimations financières, le problème du franc-or, etc. et a donné des instructions au Directeur du Bureau en ce qui concerne la présentation des projets de budget à la Septième Conférence.

    ## RESOLUTION CIML 1983 - POINT 3.4

    ## Le Comité International de Métrologie Légale,

    CONSIDERANT que le montant total du Fonds de Réserve comprend pour une large part des contributions impayées et que le montant réel des disponibilités représente au maximum 2 mois de fonctionnement du Bureau,

    DEMANDE aux Etats Membres en retard de s'acquitter de leurs arriérés aussi rapidement que possible,

    RAPPELLE à tous les Etats Membres que les contributions doivent être payées en début d'année,

    ESTIME approprié d'examiner, lors de la prochaine Conférence la possibilité de porter les disponibilités du Fonds de Réserve à un niveau équivalent à environ 4 mois de fonctionnement du Bureau.

    a) Le Comité a renouvelé, pour une période de 5 années à compter de l'expiration de son présent contrat, le contrat de M. THULIN, Adjoint au Directeur.

    b) Le Comité, annulant les 2 derniers alinéas de la Résolution CIML 1982 - POINT 4, a prolongé pour une période de 5 années, à compter du 31 décembre 1985, le contrat de M. ATHANE, Directeur du Bureau.

    ## RESOLUTION CIML 1983 - POINT 4.2

    ## Le Comité International de Métrologie Légale,

    CONSIDERANT la Résolution C.6 1980 - Point 8.2, par laquelle la Sixième Conférence a adopté le principe de la création d'un système de retraite pour certains agents du Bureau,

    CHARGE par la Conférence de fixer dans ses détails les règles de fonctionnement de ce système de retraite,

    AYANT PRIS CONNAISSANCE d'une expertise comptable sur ce système de retraite, expertise établie par le Bureau et vérifiée par l'Expert Comptable agréé qui examine annuellement l'état des finances de l'Organisation,

    CONSTATANT que cette expertise confirme les estimations qui avaient été présentées à la 6ème Conférence,

    ACCEPTE cette expertise et charge son Président et le Directeur du Bureau de la transmettre à la Conférence pour information et prise en compte lors de l'établissement des prochains budgets,

    CHARGE le Directeur du Bureau d'étabir le règlement détaillé du fonctionnement du système de retraite, en vue de son adoption par le Comité, soit par correspondance, soit lors de la 20ème réunion en octobre 1984,

    DEMANDE à son Président et le Directeur du Bureau de présenter un rapport sur cette question à la Septième Conférence.

    ## RESOLUTION CIML 1983 - POINT 5

    ## Le Comité International de Métrologie Légale,

    CONSIDERANT le rapport du Conseil de la Présidence sur la « Politique à long terme de l'Organisation et la planification des travaux »,

    RAPPELANT la décision du Comité International en 1982 de charger le Conseil de la Présidence de la responsabilité de la planification à long terme,

    DEMANDE au Conseil de la Présidence de continuer son examen des activités de l'OIML en vue d'identifier les besoins, objectifs et priorités de l'Organisation, de fixer le calendrier des travaux et de présenter ses recommandations à ce sujet au Comité International, suffisamment en avance avant la prochaine réunion,

    DEMANDE aux Membres du Comité d'étudier le rapport du Conseil de la Présidence, CIML 1983 - Point 5, et d'envoyer leurs commentaires au Bureau avant la fin de juillet 1983.

    ## DISCUSSIONS SUR POINT 6

    Le Comité a pris note d'informations, documents et propositions concernant divers aspects des travaux des Secrétariats de l'OIML ; les instructions appropriées ont été données au Bureau.

    Le Comité a adopté, à titre provisoire, les deux projets de Recommandations Internationales suivants :

    « Sonomètres »

    « Humidimètres pour grains de céréales et graines oléagineuses »

    et a chargé le Bureau de les présenter à la Septième Conférence pour sanction définitive.

    ## DECISIONS CIML 1983 - POINT 7

    — Le Comité a accepté la proposition de la R. F. d'Allemagne, des USA et de la France au sujet de la présidence du SP 5 (nouvelles propositions à présenter à la prochaine réunion du Comité).

    — Le Comité a supprimé les Secrétariats Rapporteurs :

    SP 9-Sr 7 « Mesure de la masse volumique des solides » et

    SP 18-Sr 5 « Saccharimètres pour différents usages commerciaux ou industriels ».

    - Le Comité a attribué aux USA la responsabilité des Secrétariats Rapporteurs :

    SP 17-Sr 2 « Mesurage des pollutions dans l'eau »,

    SP 17-Sr 4 « Mesurage des pesticides et des substances toxiques »,

    chargeant le Bureau d'effectuer l'enquête permettant de fixer la liste des Etats et Institutions collaborateurs.

    Le Comité a chargé le Bureau d'examiner quelle pourrait être l'activité de l'OIML en ce qui concerne les grandeurs électriques d'une part, les grandeurs photométriques et radiométriques d'autre part.

    — Le Comité a examiné, sans prendre de décision définitive, certains problèmes liés à l'électronique.

    ## RESOLUTION CIML 1983 - POINT 8

    ## Le Comité International de Métrologie Légale,

    CONSTATANT que les travaux sur le système de certification OIML ne peuvent, dans la situation présente, aboutir à la création d'un tel système,

    REMERCIE le groupe ad hoc pour le travail accompli,

    DISSOUT le groupe ad hoc,

    CHARGE le Secrétariat Rapporteur SP 2-Sr 4 « Reconnaissance internationale des contrôles et des marques de vérification », sous la responsabilité du BIML, de poursuivre, conformément aux discussions tenues lors de la réunion du Comité, des travaux axés en particulier sur les sujets suivants :

    — étude des accords bilatéraux ou multilatéraux de reconnaissance mutuelle des résultats d'essai,

    - examen des méthodes visant à faciliter la conclusion de tels accords bilatéraux ou multilatéraux,

    examen des possibilités visant à promouvoir des accords de coopération entre Etats-Membres en vue de faciliter l'octroi des approbations de modèle nationales,

    examen des possibilités visant à faciliter le développement de méthodes d'essai harmonisées, comme base pour l'approbation des équipements de mesure,

    examen des méthodes visant à faire en sorte que les exigences et essais d'approbation soient basés sur les prescriptions établies par l'OIML,

    - étude des systèmes de reconnaissance mutuelle des résultats d'essai et/ou de certification, envisagés ou déjà créés par d'autres institutions internationales,

    DEMANDE aux Membres du Comité de collaborer étroitement avec le Secrétariat Rapporteur SP 2-Sr 4,

    DEMANDE au BIML de faire rapport sur cette question à la prochaine réunion du Comité.

    ## DECISION CIML 1983 - POINT 15

    Le Comité a élu comme second Vice-Président, le Prof. Dr. Ing. W. MUHE, Membre du CIML, République Fédérale d'Allemagne.
