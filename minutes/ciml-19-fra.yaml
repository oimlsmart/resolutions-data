    Leur adoption avait été précédée des discussions suivantes :

    ## a) Sonomètres

    M. PERLSTAIN rappelle qu'il s'agit là de la première Recommandation de l'OIML qui fasse directement référence à une Norme d'une autre Institution Internationale (dans ce cas, la CEI) en la complétant par des prescriptions légales. Il estime qu'il s'agit d'une bonne méthode de travail, qui évite toute duplication.

    M. PETRY est en principe d'accord avec M. PERLSTAIN mais il explique que, ayant consacré beaucoup de temps à contacter les experts de son pays, il a ensuite constaté que les commentaires formulés n'étaient absolument pas pris en compte ; à quoi sert alors de demander des commentaires ?

    M. ATHANE indique que le système de référence aux Normes interdit en fait de prendre en considération des commentaires qui porteraient sur les Normes elles-mêmes; ce n'est que dans le cas où un certain nombre d'Etats Membres de l'OIML critiqueraient simultanément la même Norme que le Bureau pourrait être amené à suggérer à l'Institution Internationale auteur de procéder à une révision de la Norme, pour la rendre acceptable par l'OIML (ou sinon l'OIML se sentirait autorisée à produire son propre document complet sur le sujet).

    M. MUHE, au nom du Secrétariat-Pilote concerné, demande que l'on réfléchisse pour savoir si la solution adoptée dans le cas des Sonoinètre doit être un cas un peu exceptionnel, ou au contraire sera utilisée pour d'autres Recommandations futures.

    M. PERLSTAIN estime que cette solution peut s'appliquer généralement, chaque fois qu'il existe sur le sujet en question une Norme déjà publiée. Il serait cependant préférable que l'OIML ait participé à l'élaboration de la Norme, de telle sorte que les prescriptions techniques soient a priori acceptables par l'OIML. Il reste ensuite à élaborer les prescriptions de métrologie légale, ce qui est du ressort du Secrétariat OIML concerné.

    ## b) Humidimètres pour grains de céréales et grains oléagineuses

    M. LE BOUCH rappelle que ce projet a été élaboré au cours de deux réunions tenues à Paris, au terme desquelles le groupe de travail a fini par obtenir un consensus assez large. Ce projet fait référence aux Normes de l'ISO en ce qui concerne les méthodes de référence, et a reçu l'accord complet de l'ICC, qui est l'Institution Internationale compétente en matière de céréales. Enfin, certains des commentaires formulés par correspondance ont pu être pris en considération, mais certains autres ont dû être refusés car ou bien ils avaient déjà été rejetés par le groupe de travail international lors des réunions, ou bien ils remettaient en cause l'ensemble du projet.

