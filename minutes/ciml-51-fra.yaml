    value: |2+

      Mr. Patoray presented the accounts in accordance with Article 21 of OIML B 8:2012. He said he would be summarizing a statement from the auditor's report and informed delegates that there was a copy of this statement in the working document. He reported that the total balance at 31 December 2015 was $ \epsilon5 $ 204 656 and the result for the exercise was $ \epsilon51 $ 277, the detail of which would be explained later.

      However before doing this he wanted to draw delegates' attention to the note at the end of the audit, relating to the provision for the former OIML pension system. He wanted to explain this note in more detail, as he had received some questions about it. Prior to his joining the OIML in 2009 or 2010, an actuarial study had been commissioned, and the total provision considered necessary to cover pension liabilities had been estimated at €2 300 000. In 2015, after the pension scheme had been closed, and after one more person had started receiving their pension, the study had been repeated. This study had indicated the provision should be €2 728 000. He explained that the figure in the actuarial study was an estimation of the potential liabilities of the organization over the life-time of any recipient of the pension. The BIML building in Paris has been appraised as being worth $ \epsilon3 $ 200 000, which covered the entire amount estimated in the study. Therefore, in the unlikely event that the OIML was to cease to exist, Member States would have no pension liability, as the money raised from selling the building would cover the pension liabilities. He continued that whereas previously $ \epsilon4 $ 000 had been accounted

      for each year as provision against the pension rights, the study had concluded that this was no longer necessary and a zero was now recorded against this item.

      Mr. Patoray then showed the delegates a copy of the statement from the auditor's report he had previously mentioned and said he would now expand on each section using a number of graphs.

      Looking at the total charges, he said the actual charges (in which were contained the expenses) were exactly as had been predicted in the previous budget. This in itself was very positive but more specifically, he wanted to draw delegates' attention to the fact that since 2011, the charges for meetings, travel and accommodation had remained below budget, and this continued to be the case.

      With regard to the total assets, Mr. Patoray expressed the opinion that these indicated the health of the organization. He reported that these had continued to climb, in part due to the reinvestments that had been made in the BIML building, but also due to other capital investments such as in the IT system and other infrastructure used in the functioning of the OIML. However, he emphasized that it was possible that the organization could be asset-rich and still have financial difficulties due to being cashpoor. He therefore wanted to reiterate what Mr. Mason had talked about with regard to the cash flow and stressed that in order to cover the organization's expenses it was important to receive subscriptions on time.

      Mr. Patoray underlined his concerns about the cash by drawing delegates' attention to the fact that the year-end cash had decreased in the last year. This was curious given that the results had been positive. He indicated that this decrease was due to several factors:

      - the arrears of Member States and Corresponding Members had increased by €67 k since 2014;

      - €41 k less advance payments had been made by Member States since 2014;

      - due to changes in practice demanded by suppliers (requiring the move from monthly to quarterly payments) €36 k more advanced payments had been made by the OIML;

      - in addition, the OIML was also awaiting the reimbursement of $ \epsilon 2 0 $ k of income tax paid by a staff member which had not been received by 31 December 2015.

      With the addition of a number of other minor factors, a total of $ \epsilon164 $ k less cash was accounted for. If the result of $ \epsilon51 $ k was added to this, and the sum compared to the $ \epsilon130 $ k decrease in year-end cash between 2014 and 2015, then the two amounts are reasonably close. Mr. Patoray remarked that this helped to explain the financial position at the end of 2015 and why the cash had reduced.

      Mr. Patoray asked delegates to consider the bottom line of the auditor's report. He reiterated that the result for 2015 was $ \epsilon 51 $ 277, which when compared to the figure of $ \epsilon 24 $ 385 estimated in the budget meant that at the end of 2015 the organization was $ \epsilon 26 $ 892 better off than had been predicted.

      He continued by asking delegates to compare the result over the last three years, from 2013-2015, to the predicted budget for the same period. Adding the results for the last three years gave €198194 which exceeded the figure of €140022 predicted to be achieved over the four-year period from 2013 2016. Mr. Patoray suggested that the main reason for this was that the total income was more than had been expected in the budget. Looking at the income in more detail, two Member States had rejoined the OIML, many more Corresponding Member had joined, and there had also been more certificates than had been planned, all of which had led to there being more income than had been allowed for in the budget. On the other hand, the Translation Center had been closed down, so there was no further income from this source, and less income than had been predicted was being generated from the interest on money in the bank. This was because the money had to be invested safely and thus earned low interest despite the fact that care had been taken to invest it in accounts that maximized the interest.

      Regarding the costs, Mr. Patoray referred back to the fact that the total charges had been very close to those predicted in the budget, only differing from them by €8 548. Again looking in more detail at the figures, he explained that the increase in the staff costs could be accounted for by the changes in the new pension arrangements. Whereas in the past the participants in the pension system had had to pay employees' contributions to the BIML, the organization was now having to pay some staff members the equivalent of what it would have paid into the French social security system. He noted that the

      total of all the other charges had been less than predicted in the budget. However before concluding on the costs, Mr. Patoray wanted to highlight the item marked "Provision for retirement", saying that this was the item he had explained in more detail at the beginning of his presentation.

      Mr. Patoray concluded his presentation by reminding delegates of where he had begun with the bottom line and the result of €51277. He judged this was a very positive result, hoped the Committee agreed, and submitted his report for approval. Finally he asked whether there were any questions on the 2015 budget.

      Mr. Dixit enquired why the expenses for the staff at the BIML were more than had been foreseen.

      Mr. Patoray verified that Mr. Dixit was referring to the "Total staff costs" and went on to explain in more detail that these costs were to do with the closure of the OIML pension system. The budget had been put together when one person was paying into the pension system. The staff regulations had been revised in 2013, and the pension system had been stopped once the participant's contract had to come to an end.

      Mr. Dixit asked for clarification of why there was a €5 000 difference between the voted and realized amounts in the "Pension system" line.

      Mr. Patoray replied that this line represented the payments made to pensioners, which were lower than budgeted due to a lower than expected inflation rate in France.

      Mr. Dixit asked why, if these payments had been less than expected, the total staff costs were higher than expected.

      Mr. Mason intervened to clarify that the basic question related to the salary costs, the details of which were covered in note 14 to the accounts. He explained that the reason why the staff costs were higher than voted was that, even allowing for the correct number of staff, their forecast salary progressions, and inflation, it was difficult to estimate the costs accurately. He felt that there were two important questions related to this point. Why were the figures different? They were different for the reasons previously stated: it was difficult to be precise three years in advance. Was this a serious deviation? Mr. Mason said that this was the most important question for financial control purposes, and in his opinion, a $ \epsilon 45 $ k deviation over a three-year period did not suggest poor financial control.

      Mr. Dixit asked whether this should not have been taken into account and increases in membership fees requested.

      Mr. Mason replied that he did not agree with this point, and it would later be seen that no increases in Member State contributions were being proposed in the budget for the next financial period.

      Mr. Mason then asked that the resolution be taken at this point.

      Mr. Dunmill clarified that no Member States had left the room since the roll call had been taken, and asked for comments, of which there were none. There were no abstentions or negative votes, so resolution no. 2016/6 was passed unanimously.

      Resolution no. 2016/6

      The Committee,

      Noting the accounts for 2015 and the BIML Director's comments,

      Considering the external auditor's approval of the 2015 accounts,

      Approves the 2015 accounts, and

      Instructs its President to present them to the 15th OIML Conference.

- number: '6.2'
  title:
  - spelling: eng
    value: Closure of the Translation Center
  narrative:
  - spelling: eng
    value: |2+

      Mr. Patoray stated that at the 2015 CIML meeting it had been decided that the BIML Translation Center would be closed. He reminded delegates that this had been a special fund, raised through voluntary donations from fifteen Member States, which had been set up initially to translate OIML

      documents from French into English, and subsequently from English into French. The fifteen countries that had contributed to the fund were Albania, Australia, Austria, Canada, Denmark, Finland, Germany, Hungary, Japan, Norway, Netherlands, Poland, Romania, Switzerland and the United States. Over the years they had contributed a total of $ \epsilon163 $ k, and on behalf of the OIML, Mr. Patoray wanted to thank them for enabling such important work to be carried out. Mr. Patoray repeated that following the decision to close the Translation Center it had been decided to consult the contributors on what they wished to happen to the $ \epsilon38,988 $ remaining in the fund. Three options had been proposed to them:

      - ten contributors indicated that the BIML could use the remaining funds for translations needed in the future- $ \epsilon12 $ 419 of the remaining funds had been allocated to this first option;

      - another two countries had opted to receive a refund. The percentage of the remaining funds that would be refunded to them would be equivalent to the percentage they had contributed to the fund over the years $ - \epsilon1284 $ had been allocated to this second option;

      - the other three contributors had requested a credit to their subscription fee. This last option ensured that the refund is returned to the specific part of the government contributing to the OIML rather than being refunded to central government- $ \epsilon $ 25283 had been allocated to this last option.

      He reported that all the allocated money had been transferred by the end of December 2015. The Translation Center balance was now zero and it would no longer be considered in the accounts. Before passing the resolution to close the Translation Center, Mr. Patoray asked if there were any questions.

      Mr. Dunmill read out resolution no. 2016/7 as the wording was long. He asked if there were any comments, of which there were none. There were no abstentions or negative votes, so resolution no. 2016/7 was passed unanimously.

      Resolution no. 2016/7

      The Committee,

      Recalling that the Translation Center fund had been set up at the 14th CIML Meeting by Resolution 1975-IXc,

      Considering its previous discussions in 2011 and 2015 on the future of the Translation Center,

      Noting the financial information on the Translation Center provided by the BIML,

      Resolves that the Translation Center should be closed, and

      Requests the BIML to take any necessary steps for this closure.

- number: '6.3'
  title:
  - spelling: eng
    value: Arrears of Member States and Corresponding Members
  narrative:
  - spelling: eng
    value: |2+

      Before starting his presentation, Mr. Patoray pointed out that the figures he would present under this item had been compiled on 12 October 2016 and may not reflect precisely the position on the date of this presentation on 17 October 2016. He highlighted the significance of this item by drawing delegates' attention to Article XXVI of the OIML Convention (OIML B1) which stated that "Contributions shall be paid at the beginning of the year to the Director of the Bureau." He said that as he would go on to show, in some cases this was not being adhered to.

      He indicated that, with regard to Member States, the total amount of outstanding contributions was €518376, and emphasized that this could lead to considerable problems with cash flow. €467320 of this total was the amount of contributions that had not been paid in 2016 and he indicated that this represented 24 % of the total Member State contributions. He told delegates that, at the time of preparing the reports for the meeting, this figure had in fact been 37 %, which was why Mr. Mason had highlighted concerns over cash flow.

      Mr. Patoray continued that with regard to Corresponding Members' contributions, a total of €42916 was outstanding for 2016. This represented 35 % of the total Corresponding Member contributions, and again, at the time of preparing the report, over 50 %. of their contributions had been outstanding (the amount was smaller for Corresponding Members as although there were more of them than

      Member States, their contributions only made up 10 % of the total contributions). He asserted that the CIML had a right to know which Member States and Corresponding Members had not paid their contributions, and had prepared the necessary information. However, if the Committee felt it did not need any more details, he would stop his presentation at this point. He asked the Committee to express a preference.

      Mr. Johnston (Canada) said that he did not need more details even though he considered finances important.

      Mr. Patoray added that he had sent a personal reminder to each Member State and Corresponding Member that owed money, which he felt was the reason why fewer contributions were now outstanding than at the time the reports had been prepared. However, he reminded delegates that it was late in the year and if contributions were not paid this year, it would be even more difficult for two contributions to be paid the following year, and therefore further arrears would build up, leading eventually to being delisted. He emphasized that where possible he wanted to avoid this, and whilst he appreciated that contributions were often made in line with each state's own budget cycle, the BIML would continue to send out quarterly reminders. He made a final appeal to Members to pay their contributions promptly and repeated that if they failed to do so this could lead to severe cash flow problems for the OIML. He asked the Committee if they had any questions.

      Mr. Mason had two remarks:

      - firstly, he shared Mr. Johnston's view that while it was not yet appropriate to apply what some delegates might call the "naming and shaming" technique, it might well become appropriate in the future;

      - secondly, delegates were currently meeting as the Committee but when they later met as the Conference, the delegations representing their Member States may have a different attitude, because those that are paying are carrying a burden that others are not.

      In the light of the information received, and in line with past meetings he suggested that the Committee adopt a resolution of encouragement and request.

      Mr. Dunmill asked whether there were any abstentions or negative votes. There were none. Resolution no. 2016/8 was passed unanimously.

      Resolution no. 2016/8

      The Committee,

      Notes the report given by the BIML Director,

      Encourages the BIML to continue its efforts to recover outstanding arrears of its Member States and Corresponding Members,

      Requests those Members with arrears to bring their situation up to date as soon as possible.

- number: '6.4'
  title:
  - spelling: eng
    value: Forecast budget realization for 2016
  narrative:
  - spelling: eng
    value: |2+

      Mr. Patoray indicated that the following presentation was a budget forecast for the end of 2016. He showed delegates a summary sheet and indicated he would go on to talk about each section in more detail.

      With regard to the income, Mr. Patoray stated that these projections were based on the budget for 2016 as well as estimations made by the accountant, as a result of his quarterly audit of the accounts. He reported that the accountant was projecting that the income from Member States would be considerably more than had been voted. A large proportion of this was due to the fact that Thailand had joined the OIML and had paid their subscription fee for 2016. With regard to Corresponding Members, he pointed out that the projected figure was again larger than the budget as although three Corresponding Members had been delisted, more than this had joined. The certificate fees were forecast to be slightly above expectations. As discussed previously the Translation Center would no longer appear in the accounts. Lastly, with regard to the income from interest, this was projected to be

      less than anticipated in the budget. Mr. Patoray concluded that the total income was predicted to be €72 700 higher than voted.

      Looking at the charges, Mr. Patoray remarked that the staff costs, and more precisely the active staff costs, were anticipated to be less than had been predicted in the budget. There had been a three-month period following the loss of Willem Kool and before Paul Dixon had started work at the BIML when one less salary had been paid, leading to an estimation that the costs would be reduced by €14312. The pension system costs were predicted to be lower than the budget since the pension payments rise in line with French inflation and this had been lower than anticipated.

      Continuing with the other charges, Mr. Patoray expected that the running costs would be greater than had been anticipated by the end of 2016, although the administrative costs were anticipated to be slightly less. The item anticipated to differ most from its projected level was that labelled "Meeting cost - CIML". Whereas in years when only a CIML meeting was held only three and a half days needed to be paid for, this year included a Conference as well and so five days were required. In addition, since this week's meetings were not being hosted by a Member State, the full cost of the five days, estimated to be €135000, was being paid by the OIML. He observed that this cost included VAT tax paid in France, some of which could be claimed back, but he repeated that the anticipated costs for meetings would still be much higher than had been allowed for in the budget. Despite this, he reported that the total charges were not projected to be very different from those in the budget. He felt that looking at total charges was more important than looking at the individual lines, as this allowed for more flexibility on a day-to-day basis.

      Concluding his presentation, Mr. Patoray observed that whereas the budget had assumed a result of minus €14266, the result forecast for this year was $ \epsilon 5 4 \ 6 0 0 $ . He judged this was a positive result. Taking this forecast into account when considering a four-year budget period, he submitted that the projected surplus in the budget had been $ \epsilon 1 4 0 \ 0 2 2 $ , but was now forecast to be $ \epsilon 2 5 2 \ 7 9 4 $ . He confirmed that there would be an opportunity to discuss what to do with the surplus money during the Conference, and finally asked if there were any questions.

      Mr. Mason verified that Mr. Patoray had no plans to discuss the surplus before the Conference. This being the case, Mr. Mason felt it was important to check that the Committee was happy with this course of action. In practice, since most of the people that were on the Committee were the same as those that attended the Conference, it might be that the delegates would find it perfectly satisfactory for there to be a single discussion about the surplus during the Conference. On the other hand, taking a more theoretical approach, the Conference might well expect the CIML to have made a recommendation as to what to do with the surplus. He considered that if any delegates wanted to take that procedural position, then time should be allowed for the Committee to have the necessary discussion, although he sensed that most delegates were happy to discuss the surplus in the Conference. There were no objections to the surplus only being discussed during the Conference.

      Mr. Dunmill asked whether there were any comments on the wording of the resolution noting the report.

      Ms. Mikanadze (Georgia) asked whether the resolution should just note the report, or in fact in light of the above discussion, the resolution should say that the report would be submitted to the Conference.

      Mr. Patoray replied that there was an item on the surplus on the Conference agenda but he agreed that the resolution should be changed, thus committing the report to being submitted to the Conference.

      Mr. Mason confirmed that if it was regarded as an important point then the delegates could add wording to the resolution which would say that the Committee not only noted the forecast but also the fact that it should be made available to the Conference.

      Following a brief discussion between the BIML staff and the President regarding their previous experience where the wording of resolutions had needed to be changed in a similar fashion in the past, it was suggested by Mr. Dunmill that the resolution could read "the report of the director is noted and the President is instructed to present this information to the 15th OIML Conference."

      Mr. Mason agreed to this.

      Mr. Dunmill verified that Ms. Mikanadze considered this a satisfactory response. There were no abstentions and no negative votes. Resolution no. 2016/9 was passed unanimously.

      Resolution no. 2016/9

      The Committee,

      Notes the report on the forecast budget realization for 2016 given by the BIML Director,

      Instructs its President to present it to the 15th OIML Conference.

- number: '6.5'
  title:
  - spelling: eng
    value: Examination of the proposed budget for the 2017-2020 financial period
  narrative:
  - spelling: eng
