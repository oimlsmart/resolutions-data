      Mr. Mason reported that, as recorded in the working document, no CIML Member had put themselves forward for election for the presidency, which would become vacant in a year's time. In addition, there had only been one nomination for the position of First Vice-President - Dr. Roman Schwartz, who was the current First Vice-President. He emphasized that even though there was only one candidate, the election decisions require specific votes and that it was important that Members should be given the opportunity of a secret ballot, at an appropriate time, in order to say whether they support this candidacy. In order to help the process it had been arranged that Dr. Schwartz should give a short address which would form the basis of his request for re-election. Mr. Mason invited Dr. Schwartz to come forward and make the presentation.

      ## Presentation by Dr. Roman Schwartz

      "Dear colleagues, you have certainly seen and read my letter of candidacy for CIML First Vice President which is included in the package of documents you have received for this meeting as Addendum 3.1. It is my pleasure to present a short summary of my CV and application now. Thank you for giving me the opportunity.

      I would like to start with the most important question for some of you, which is 'How old is he'? I am aged 61, and my academic qualifications are Diploma in Physics (1981), PhD in Electrical engineering (1993). My current employment since 2014 is Vice-President of PTB, and I am also ex-officio head of the conformity assessment body at the PTB. The list of my previous employment is that from 2006- 2014 I was head of the division of mechanics and acoustics at the PTB, and before that I was the head of the Department of Solid Mechanics which comprises the weighing instruments laboratory, the mass laboratory, the force and torque laboratory - all the important mechanical quantities. From 1994 to 2001 I was the head of the weighing instruments laboratory at the PTB and before that a scientist in the mass laboratory, so I am happy to have a scientific background as well as legal metrology experience. Before that I studied at the Technical University of Braunschweig.

      As for my appointments and experience, in 2010 I started as the Second CIML Vice-President, and then later became the First CIML Vice-President. Since 2007 I have been a member of the Presidential Council. Since 2006 I was nominated as the CIML for Germany, following my colleague Prof. Manfred Kochsiek. From 2006-2015 I was a member of the CIPM Consultative Committee 'Mass and related quantities'. Since 2005 I have been involved in OIML MAA activities, first as chairman of the ad hoc working group on the revision of the MAA and as a member of the CPRs on non-automatic weighing instruments and load cells, and now the Project Group convener for the Certification System.

      A very interesting experience was the revision of R76, which is one of the most important Recommendations we have in the OIML, because of its worldwide acceptance and transformation into national legislation. Together with Corinne Lagauterie from France I was responsible for the co-secretariat of TC 9/SC 1. In parallel with this, I was chairman of WELMEC Working Group 7 on software, and during that time we developed WELMEC's software guide 7.2, which we discussed at the RLMO meeting in the morning, and which I am now pleased to hear will be translated into Russian. From 1995-2006 I was a member of WELMEC Working Group 2 on weighing instruments.

      Why do I put my name forward for a second period as CIML First Vice-President? What is my motivation? Well, I think that the OIML is a very important player in the field of international metrology and standardization and deserves to be supported. I can bring a long experience and broad knowledge of scientific, industrial and legal metrology and I think I have a good international network of personal and business contacts in the field of metrology. I know legal metrology 'from scratch'; when I started in the weighing instruments laboratory in 1994, I was pleased to receive a special training course undertaking all the type approval tests which are necessary when following R 76, so I really know it by heart. I have done all the tests myself, including the EMC tests.

      Finally, I would like to contribute to shaping the OIML so that it is well prepared for the challenges in the global market. In my first period as CIML First Vice-President I have contributed to the revision of the MAA framework documents B3 and B10 and also the amendment to B10 dealing with the acceptance of test results from manufacturers' test laboratories. These are now allowed to be taken into account as long as the laboratories are supervised by an OIML Issuing Authority in a certain way and under certain conditions. Although the acceptance of these test results is still voluntary, I think we made an important step in the right direction, as we can see from partner organizations such as the IEC, which also already has in place some rules on how to take into consideration manufacturers' test results under certain defined conditions.

      I think that another important contribution was the OIML statement on the possible impact of the redefinition of the SI units which we expect in two years' time in 2018, especially of the kilogram, on legal metrology. There was a survey, and it was very interesting to collect all the results and provide a statement to the BIPM, where we cautioned them not to be too quick with the redefinition since there could be some impact, especially on the calibration of $ \mathrm{E}_{1} $ weights. We now have excellent results from

      both the Watt balances and the Avogadro cooperation and there is no longer any need to have any doubt about this being the right time to redefine the kilogram and other basic constants of the SI.

      There was a comprehensive revision of the OIML Basic publication B 6 Directives for OIML technical work, which should always be under consideration since we are always learning and gaining experience and I think we now have a very good starting point with B 6 as it is right now.

      Finally I would like to mention the development of the framework for a new OIML Certification System which will hopefully supersede both the Basic and MAA systems. We will report on this later on.

      My commitment, if elected as CIML First Vice-President will be to continue to support the CIML and the CIML Presidency with my experience and knowledge. If elected as chair of the CS management committee I will certainly promote the new Certification System and do my best to make it a successful, widely accepted, respected and effective international certification system.

      Last of all, I would certainly support efforts to further improve the efficiency of the technical work.

      Also important for me is to improve the topicality, quality and uniformity of OIML publications, and I think that, as we heard earlier, COOMET has taken a very good approach in reviewing some OIML publications to see whether they are still topical or whether they should be revised. I think it is important to improve the worldwide acceptance of OIML Recommendations and Documents by means of very close cooperation with ISO and IEC, on the basis of the existing Memoranda of Understanding, under which we should always identify joint work items on the work program, and I think we can only learn by good cooperation with these and other organizations. We should intensify our contacts and cooperation with other organizations, especially the BIPM, as already mentioned by CIML President Peter Mason.

      So I started by giving you my age, and I should also say that 2020 will be my retirement year, but I have thought about this and discussed it with my bosses and I can say that I will most likely be able to serve the OIML for another full six-year period if this is what the CIML wishes and considers this useful."

      Dr. Schwartz thanked delegates for their attention and support, and stated he was ready to answer any questions.

      Mr. Dixit asked Dr. Schwartz which committee would be working on the OIML MAA certification. He considered that Dr. Schwartz had opted for a single type of integrated system, and wondered how fast the work would progress if Dr. Schwartz left this work and took on more administration.

      Dr. Schwartz replied that if Mr. Dixit was referring to the report on the existing Certificate System, this would be discussed later under item 8.2.1.

      Mr. Dixit stated that he was actually concerned about the progress of the project Dr. Schwartz had been involved in over the last four years, especially if he was to take on more administration.

      Dr. Schwartz replied that he could continue to serve the OIML, especially on the Management Committee, and thus if the proposed OIML Certification System was approved, as he hoped it would be, he would be able to support the new system during the next six years. This could be achieved through the formation of new structures; with the aid of motivated and competent people and lots of hard work, he felt the project could be set off to a flying start, and achieve similar successes to those achieved by the IEC.

      Mr. Mason added what he thought may be at the heart of this question. Was it possible for the same person, as well as playing an important role in their own administration, to be the First Vice-President and president of the Management Committee, considering that each was so important and involved so much responsibility. He thought the answer to this would only become apparent when the position of Management Committee chair had been developed and it could be seen how it was operated. From the

      point of view of the expectations when the position was looked at, he saw no reason why the two jobs could not be combined. He saw no conflict of interest between the two roles and thought that the amount of work and responsibility for both jobs could be undertaken by one person if that person was elected to both positions.

      Dr. Schwartz emphasized that the executive secretary was more important to the proposed OIML Certification System than the chair.

      Mr. Dixit's concerns remained as to how Dr. Schwartz would balance the roles of administration and technical co-operation.

      Mr. Mason concluded the discussion by observing that Mr. Dixit had made a valuable observation but that it was not appropriate for there to be discussions of the candidates in an open CIML meeting and that each Member should now reflect on the questions and answers raised during the discussion before voting in the secret ballot on Friday.

      Mr. Dunmill intervened to reminded delegates to introduce themselves before speaking to make writing the minutes easier.

      Mr. Mason returned to the subject of the presidency. He was conscious he had skipped over the consequences of there being no candidate for the presidency this year. He stated that his term of office explicitly lasted only until the opening of the 52nd CIML Meeting when, under normal circumstances, if there had been an election, he would hand over to the President-Elect. If instead there was to be an election in 2017 for someone to take up the responsibilities of President immediately on election, what would that mean for the running of the 52nd CIML Meeting in 2017? The President-Elect would not have been involved in the preparation of the meeting and moreover, as delegates had seen, the normal procedure was for candidates to make presentations at the beginning of the meeting but the vote and decision to be made at the end. This presented Members with a problem to which he considered there were three potential solutions:

      - Firstly, that Members move immediately to an election at the beginning of the 52nd CIML Meeting. This was likely to be very difficult. It would not give time for a proper consideration of the candidate(s), and would make it extremely difficult for the person who was elected to take over the running of the meeting without having been involved in its preparation.

      - Secondly, to allow for a situation in which the post of President was left vacant. In this case the responsibilities of the President would move to the First Vice-President. In this second alternative the First Vice-President would therefore be expected to run the meeting. This solution may present a problem in itself. Should the First Vice-President be Dr. Schwartz, and should he be elected chair of the Management Committee, he would already have a lot of responsibilities without having to prepare to chair the 52nd CIML Meeting.

      - The third possibility was that exceptionally his term was extended until the end of the 52nd CIML Meeting. He was still not expecting to be a candidate for the presidency again as he would need approval from his government and was now retired.

      He reported that when the presidency had been discussed in the Presidential Council, the third solution was considered the most convenient. Mr. Mason then invited Members of the Committee to share their views, particularly if they would prefer something other than for him to chair the 52nd CIML Meeting. A new resolution would need to be prepared and voted on if the Committee wished him to chair the 52nd CIML Meeting.

      Mr. Dixit commented that the Committee had been happy to have the benefit of Mr. Mason's guidance and his long experience of legal metrology administration. Not only was the Committee grateful to Mr. Mason for his work as President but it would also be grateful if he would remain as President and chair the 52nd CIML Meeting. This would give the Committee time to decide on who would be the best person to be the next President.

      Mr. Mason thanked Mr. Dixit for his support. No other views were expressed. A resolution extending his term would be prepared to be voted on at the end the meeting.

