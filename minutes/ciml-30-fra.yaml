    - du Brésil, pour tenir une réunion du CIML en 1997 à Rio de Janeiro,

    - de la Rép. de Corée, pour tenir une réunion du CIML en 1998 à Séoul.

    MM. Bueno et Kim, chefs respectifs des délégations du Brésil et de la Rép. de Corée, font part de l'intérêt que leur pays voue aux activités de l'OIML, et des avantages à tenir des réunions du CIML dans ces pays, en particulier, en ce qui concerne la coopération régionale.

    M. Faber exprime son appréciation pour ces invitations que le Comité accepte.

    Quant aux réunions ultérieures, M. Faber fait remarquer qu'il sera sans doute nécessaire que la réunion du CIML de 1999 ait lieu à Paris, avec éventuellement la tenue d'une réunion de la Conférence OIML conjointement à la prochaine Conférence Générale des Poids et Mesures, pour discuter du rapprochement.

