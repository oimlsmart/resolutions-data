- number: '12'
  title: RAPPORT CONCERNANT LE SÉMINAIRE OIML, LE PESAGE A L'APPROCHE DE L'AN 2000,
    13-15 septembre 1995
  narrative: |2+

    M. Bennett, Président du séminaire rapporte que 153 participants se sont réunis à cette occasion, dont la moitié de représentants des services de métrologie légale et l'autre de représentants de fabricants. Vingt-six conférences ont été présentées, couvrant un large éventail de sujets relatifs au pesage, de ceux à caractère informatif jusqu'à ceux destinés à interpeller les auditeurs, et ont généré une foison de discussions. M. Bennett conclut en faisant remarquer que le séminaire avait été financièrement equilibré de par la perception des droits demandés aux représentants des fabricants.

    A la demande de M. Athané, le Comité ne formule aucune objection au fait qu'il conviendrait que l'industrie soit conviée et qu'un équilibre financier correct soit recherché pour les futurs séminaires.

