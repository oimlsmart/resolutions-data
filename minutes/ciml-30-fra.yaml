    ## APPROBATION DE RECOMMANDATIONS INTERNATIONALES ET D'ANNEXES A CERTAINES RECOMMANDATIONS

    Le Comité a approuvé les projets suivants:

    PR 3 Instruments trieurs-étiqueteurs à fonctionnement automatique (révision de R 51)

    PR 4 Doseuses pondérales à fonctionnement automatique (révision de R 61)

    PR 5 Annexes (procédures d'essai et format du rapport d'essai) à la R 106, ponts-bascules ferroviaires à fonctionnement automatique

    PR 6 Spectromètres à fluorescence de rayons X portatifs et déplaçables pour la mesure sur le terrain d'éléments polluants dangereux.

    En ce qui concerne les deux projets:

    PR1 Sonomètres (révision de R58) et

    PR2 Sonomètres intégrateurs-moyenneurs (révision de R 88)

    le Comité a décidé que, en dépit du soutien que ces projets avaient reçu d'une large majorité de Membres de l'OIML lors de la consultation par correspondance, leur approbation devait être retardée d'un an afin de permettre à OIML TC 13 de résoudre des questions importantes soulevées en particulier par les délégations du Royaume-Uni et des Etats-Unis d'Amérique.

