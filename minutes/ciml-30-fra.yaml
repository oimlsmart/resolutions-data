sections:
- number: '2'
  title: ÉTATS MEMBRES ET MEMBRES CORRESPONDANTS
  narrative: "\n"
- number: '2.1'
  title: Nouveaux Membres - Perspectives d'adhésions
  narrative: |2+

    M. Athané rappelle au Comité l'adhésion comme État Membre du Kazakhstan; d'autre part, trois pays ont adhéré comme Membres correspondants: le Mozambique, la Thaïlande et l'Uruguay. Il ajoute que divers contacts ont été établis: avec le South Africa Bureau of Standards, signe d'une possible prochaine adhésion à l'OIML de l'Afrique du Sud; avec le Mexique (pour un éventuel changement de son statut de Membre Correspondant à État Membre) et avec quelques autres pays qui pourraient devenir États Membres ou Membres Correspondants.

- number: '2.2'
  title: Situation de certains membres
  narrative: |2+

    M. Athané indique qu'il n'y a rien à signaler concernant les États Membres; par contre, certains Membres Correspondants devront être rayés de la liste s'ils ne s'acquittent pas rapidement de leurs arriérés.

    M. Bueno fait remarquer que certains pays sont en retard pour le paiement de leurs contributions et que cela est évidemment préjudiciable au bon fonctionnement de l'OIML, mais cela constitue-t-il une raison pour les démissionner automatiquement? Il suggère une plus grande flexibilité et que des négociations soient ouvertes avec ces pays, afin de leur permettre de rester au sein de la communauté de OIML, puisque le rôle de l'OIML consiste à rassembler les pays, non de les séparer. M. Athané répond que c'est l'approche qui est appliquée pour de tels cas, et que la solution extrême de rayer un pays de la liste est uniquement appliquée lorsqu'aucune autre solution ne peut être trouvée. Il ajoute qu'un pays démissionné peut toujours renouveler son adhésion en payant ses arriérés de contributions.

- number: '2.3'
  title: Situation de l'Iran
  narrative: |2+

    M. Athané rappelle que l'Iran a décidé de quitter l'OIML en 1979 sans s'être acquitté de ses contributions de 1978 et de 1979. Maintenant, l'Iran envisage de rétablir sa participation mais en souhaitant être exempté du règlement de ces arriérés et de tous droits supplémentaires, en dehors de sa contribution normale à partir du moment où il serait admis à nouveau comme État Membre de l'OIML. M. Athané ajoute qu'il a mené une enquête parmi les Membres du CIML et que les réponses montrent que tout en étant favorables à la réadmission de l'Iran comme État Membre, un certain nombre de Membres sont d'avis que la Convention doit être strictement appliquée, c'est-à-dire, que l'Iran devrait payer ses arriérés pour 1978-1979, plus un droit d'entrée. Concernant la classe de contribution de l'Iran, l'avis général est que ce pays pourrait être placé pro-

    visoirement en classe 2 (au lieu de la classe 3 conformément aux règles de la Convention de l'OIML) jusqu'à ce que sa situation économique lui permette de payer sa contribution normale. M. Klenovský demande s'il est possible de fixer immédiatement cette période intermédiaire; ce à quoi M. Athané répond que des enquêtes spéciales concernant les classes de contribution sont effectuées à l'occasion des réunions de la Conférence et que, par conséquent, il n'est pas approprié de fixer immédiatement cette période.

    Après discussion, le Comité considère que la proposition est appropriée et charge le Directeur du Bureau d'informer les autorités iraniennes sur les conditions de réadmission.

- number: '3'
  title: QUESTIONS FINANCIÈRES
  narrative: "\n"
- number: '3.1'
  title: Adoption du rapport comptable pour 1994
  narrative: |2+

    Le rapport comptable pour 1994 est approuvé sans commentaire. Le Comité charge son Président et le Directeur du Bureau de présenter ce rapport à la Dixième Conférence.

- number: '3.2'
  title: Examen de la situation financiere pour 1995
  narrative: |2+

    M. Athané rappelle que les estimations financières pour 1995 ont été envoyées aux Membres du CIML à la fin de 1994 et indique que, pour l'instant, il n'y a rien à ajouter à ces estimations, mis à part le fait que certaines dépenses (par exemple, la publication du document de politique à long terme et de la brochure générale d'information), qui n'avaient pas été estimées précisément à la fin de 1995, ont été effectuées en cours d'année; le Président du CIML et son Conseil ont été cependant tenus informés de ces dépenses avant leur engagement; il est aussi fait remarquer que ces dépenses sont compensées par des recettes supplémentaires (par exemple, les contributions des nouveaux États Membres).

    M. Athané ajoute que les pays en retard dans le paiement de leurs contributions devraient être enjoints de régulariser leur situation le plus tôt possible.

- number: '4'
  title: PERSONNEL DU BUREAU
  narrative: "\n"
- number: '4.1'
  title: Contrat de M. Athané, Directeur
  narrative: |2+

    Le Comité renouvelle le contrat du Directeur du Bureau pour une période de cinq ans à compter du 1er janvier 1996.

- number: '4.2'
  title: Contrat de M. Vichenkov, Adjoint au Directeur
  narrative: |2+

    Le Comité prolonge le contrat de M. Vichenkov, Adjoint au Directeur, pour une période de dix-huit mois, c'est-à-dire jusqu'au 30 novembre 1997, et note qu'un nouvel Adjoint au Directeur devra être élu lors de la 31e réunion du CIML.

- number: '4.3'
  title: Indexation des salaires sur l'inflation
  narrative: |2+

    M. Athané rappelle au Comité la situation résultant du fait que l'OCDE n'est plus en mesure de fournir gratuitement aux organisations intergouvernementales ayant leur siège en France un indice représentatif du coût de la vie en France, cette organisation

    n'utilisant plus elle-même cet indice pour son propre personnel. Il est donc proposé d'utiliser l'indice français officiel de prix (indice INSEE) qui a été comparé à l'ancien indice OCDE sur une période d'un an sans que soient relevées des différences significatives.

    Le Comité accepte cette proposition comme mesure provisoire et, suivant une proposition de M. Chappell, demande au Directeur du Bureau de s'enquérir de l'existence d'autres indices, afin d'examiner les solutions adoptées par d'autres institutions internationales, et d'en faire rapport lors d'une prochaine réunion.

- number: '5'
  title: COMITÉS TECHNIQUES ET SOUS-COMITÉS
  narrative: "\n"
- number: '5.1'
  title: Examen de la situation de certains TC/SC
  narrative: |2+

    M. Chappell, responsable du suivi des activités techniques pour le compte du Conseil de Présidence, présente un rapport d'activité des comités techniques et souscomités. Il fait remarquer que le passage de l'ancienne structure (Secrétariats Pilotes et Rapporteurs) à celle actuelle s'est opéré avec succès et n'a pas ralenti significativement le déroulement du travail, et ajoute que les nouvelles procédures ont apporté une amélioration appréciable en permettant de se préoccuper des priorités et d'eliminer des thèmes de travail qui n'étaient pas, ou plus, d'intérêt pour la majorité des États Membres. Le BIML a été en mesure de participer à presque toutes les réunions inaugurales des nouveaux TC/SC et cela a permis une application correcte immédiate des Directives pour les travaux techniques. Concernant ces Directives, M. Chappell indique qu'elles ont généralement amélioré les conditions d'exercice des responsabilités des secrétariats des TC/SC. Il convient également de noter que les travaux qui n'ont pas été achevés avant la mise en place de la nouvelle structure, ont été poursuivis de manière adéquate. Le volume global de travail est satisfaisant, comme le montre le nombre de projets approuvés par le CIML en 1994. Cela s'est d'ailleurs traduit par une sérieuse surcharge de travail pour le BIML qui poursuit encore le travail de publication de tous ces nouveaux textes.

    M. Chappell donne des informations concernant les liaisons externes des TC/SC, lesquelles semblent moins développées que celles de l'ancienne structure, et conclut en soulignant que des efforts doivent être faits par le BIML et les TC/SC afin de développer ces liaisons en informant les organismes internationaux et régionaux appropriés des activités de l'OIML. Une autre tâche consisterait à identifier toute activité menée par d'autres organismes internationaux (en particulier, l'ISO et la CEI) pouvant servir aux TC/SC de l'OIML de base pour leurs travaux, ou pour s'assurer que le travail de l'OIML n'entre pas en contradiction avec des travaux en cours d'achèvement menés par ces organismes internationaux.

    M. Chappell indique aussi que le BIML a mené une enquête relative aux programmes de travail des TC/SC, dont les résultats devront être examinés par le Conseil de Présidence.

    Certains TC/SC se sont trouvés confrontés à un problème avec nombre de membres-P ne participant pas activement aux travaux; les secrétariats sont invités à contacter le BIML à ce sujet afin d'appliquer les Directives qui prévoient la possibilité de déclasser les pays en cause de la position de membre-P vers celle de membre-O. Un autre problème rencontré par quelques sous-comités est que le nombre de membres-P n'atteint pas le minimum requis par les Directives. Pour ces SC, une solution reste à trouver, soit en encourageant les pays à s'inscrire comme membres-P, soit en supprimant ces SC et en attribuant leurs tâches aux TC parents (à condition que les travaux restent d'intérêt pour la majorité des États Membres).

    M. Klenovský s'enquiert de l'état des liaisons avec l'ISO, ILAC et EAL après la réunion du TC 3/SC 4 à Paris. M. Athané indique que des contacts ont été établis pour permettre à l'OIML de participer à la révision du Guide ISO 25, et d'obtenir des informations concernant les procédures d'accréditation.

    M. Birch soutient les vues de M. Chappell concernant la pertinence des nouvelles structures. Cependant, il attire l'attention sur les difficultés rencontrées par des pays comme l'Australie pour participer au travail par des réunions qui trop souvent sont tenues en Europe. Les réunions du CIML en Chine, puis de la Conférence au Canada, vont marquer l'internationalisation de l'OIML, mais concernant les travaux des TC/SC, il faudrait parvenir à une meilleure coordination pour permettre l'organisation de réunions successives et éviter les réunions simultanées.

    M. Chappell convient de la nécessité d'annoncer en temps adéquat les réunions techniques, avec la possibilité de réorganiser le calendrier pour faciliter la participation. M. Chappell rappelle au Comité le rôle du Conseil de Présidence dans la surveillance des travaux des TC/SC, par l'intermédiaire des rapports annuels qui non seulement décrivent les progrès effectués dans l'année écoulée, mais fournissent aussi des informations sur les activités prévues pour l'année à venir, dont les réunions.

    M. Kochsiek met en avant le cas du TC 12, sur les compteurs d'énergie électrique, pour lequel l'Allemagne n'a toujours pas reçu de soutien suffisant des autres États Membres, en dépit de son intérêt évident pour la métrologie légale. M. Klenovský remarque que cela est dû au fait que nombre de pays sont déjà actifs dans ce domaine au sein de la CEI. M. Kochsiek répond qu'il n'y a pas pour autant d'empêchement à disposer d'une Recommandation OIML basée sur la Norme CEI correspondante, et intégrant les dispositions spécifiques de métrologie légale.

    M. Klenovský suggère que les activités des TC/SC soient reconsidérées en fonction des tendances à la déréglementation qui peuvent être observées dans nombre de pays et de régions, ceci constituant un éventuel sujet d'examen lors de la prochaine Conférence de l'OIML. M. Athané indique que, comme d'habitude, un rapport sur les activités techniques globales de l'OIML sera présenté à la Conférence.

- number: '5.2'
  title: Amendement aux Directives pour les travaux techniques
  narrative: |2+

    M. Chappell indique qu'un amendement mineur aux Directives est soumis à l'approbation du CIML par le Conseil de Présidence. Cet amendement qui consiste à confier au BIML plutot qu'aux secrétariats des TC/SC la responsabilité de la distribution des rapports annuels à tous les pays et institutions concernés, est accepté par le CIML.

- number: '6'
  title: APPROBATION DE RECOMMANDATIONS INTERNATIONALES ET D'ANNEXES A CERTAINES RECOMMANDATIONS
  narrative: |2+

    M. Athané indique que six projets sont soumis à l'approbation du CIML :

    PR1 Sonomètres (révision de R 58)

    PR2 Sonomètres intégrateurs-moyenneurs (révision de R 88)

    PR 3 Instruments de pesage trieurs-étiqueteurs à fonctionnement automatique (révision de R 51)

    PR 4 Doseuses pondérales à fonctionnement automatique (révision de R 61)

    PR 5 Annexes (Procédures d'essai et format du rapport d'essai) à R 106, Ponts-bascules ferroviaires à fonctionnement automatique

    PR 6 Spectromètres à fluorescence de rayons X portatifs et déplaçables pour la mesure sur le terrain d'éléments polluants dangereux.

    Ces projets, y compris les résultats des votes par correspondance et les commentaires sont successivement examinés par le CIML.

    Concernant les projets PR 1 et PR 2, MM. Bennett et Chappell confirment leur opposition, pour des raisons fondamentales et de principe; le Comité envisage d'abord d'approuver ces projets (fermement soutenus par une majorité de Membres du CIML) sans toutefois les rendre immédiatement applicables dans le cadre du Système de Certificats OIML, de façon à donner au secrétariat du TC 13 le temps d'en réviser les textes. Après discussion, certains Membres du CIML déclarent que, si cette proposition est adoptée, ils ne soutiendront plus les projets en question. Il est donc finalement décidé de soumettre à nouveau les textes au TC 13 pour réexamen lors de la prochaine réunion, afin de tenir compte des commentaires du Royaume-Uni et des États-Unis d'Amérique, et de représenter ces projets à la Conférence en novembre 1996.

    Les quatre autres projets sont approuvés(*) par le CIML en vue de leur publication, mais auparavant, les textes, en particulier ceux sur les instruments de pesage à fonctionnement automatique, devront être soigneusement vérifiés par les secrétariats concernés et par le Bureau, afin d'eliminer certaines inconsistances internes signalées par M. Tuinder.

    Concernant le PR 6, M. Galle explique l'abstention de son pays par le fait que son service n'avait aucune activité dans ce domaine; M. Vaucher ajoute que ce type d'instrument devrait plutot selon lui être soumis à des étalonnages fréquents. M. Chappell fait remarquer que, dans la plupart des pays, il existe des organismes nationaux responsables des mesurages des polluants, n'ayant souvent pas de relations avec les services nationaux de métrologie légale; il incombe donc aux Membres du CIML d'identifier de tels organismes et de convaincre leurs experts de participer aux travaux de l'OIML.

- number: '7'
  title: CERTIFICATION
  narrative: |2+

    M. Kochsiek, en tant que responsable du suivi de l'activité de certification au nom du Conseil de Présidence, donne quelques informations générales concernant les développements du Système créé en 1991. Le premier certificat a été délivré en 1992 et 130 certificats ont été délivrés jusqu'à octobre 1995 dans les domaines des instruments de pesage à fonctionnement non automatique et des cellules de pesée.

    M. Kochsiek, mentionant les enquêtes réalisées par le BIML auprès des autorités de délivrance et des constructeurs, ajoute qu'il faut convaincre les fabricants de la valeur des certificats OIML et suggère que pour cela, la meilleure manière serait que les services nationaux de métrologie légale acceptent les certificats et les rapports d'essai associés, pour délivrer des approbations de modèle nationales ou régionales sans avoir à répéter les essais déjà réalisés pour la délivrance des certificats OIML.

- number: '7.1'
  title: Rapport sur le TAG $ _{cert} $
  narrative: |2+

    M. Kochsiek indique que la création de ce groupe technique consultatif (TAG) a abouti rapidement et qu'une première réunion est prévue début 1996. L'activité devrait se concentrer sur les thèmes suivants:

    - application des certificats aux familles de modèles,

    - certification de modules

    - application de procédures d'accréditation aux autorités de délivrance, laboratoires d'essai et fabricants,

    - établissement de règles pour les accords de reconnaissance des certificats et résultats d'essai,

    - examens périodiques de l'opinion concernant la certification OIML,

    - révision du document sur le Système de Certificats OIML pour les Instruments de mesure.

    avec possibilité de créer des groupes de travail au sein du $ \mathrm{TAG}_{\mathrm{cert}} $ afin d'aider le BIML dans ses tâches de secrétariat du $ \mathrm{TAG}_{\mathrm{cert}} $ .

    M. Klenovský exprime son inquiétude du fait que la certification OIML pourrait être considérée comme un moyen de promotion, par l'intermédiaire des autorités nationales de délivrance, des fabricants de leur pays, et aussi du fait que les pays ayant mis en place des autorités de délivrance ne semblent pas prêts à accepter les certificats émis par d'autres pays.

    M. Kochsiek explique qu'au sein de l'Union Européenne, chaque fois qu'existe une Directive harmonisée, les pays sont seulement autorisés à accepter les approbations CE. M. Athané fait remarquer qu'un pays européen peut délivrer une approbation CE basée sur le rapport d'essai associé à un certificat OIML. Il ajoute que la promotion de fabricants nationaux, par le biais de la certification OIML, est un phénomène normal qui devrait être accepté par les États Membres de l'OIML.

    En conclusion des discussions, le Comité adopte la Résolution suivante:

    ## Le Comité International de Métrologie Légale

    AYANT PRIS NOTE d'un rapport sur la situation du Système de Certificats OIML, la composition du TAG $ _{cert} $ les résultats d'un questionnaire sur les sujets de travail du TAG $ _{cert} $ et ceux de deux autres questionnaires envoyés aux autorités de délivrance et aux constructeurs d'instruments de mesure, ainsi que d'informations et de commentaires fournis par certains Membres,

    EXPRIME son appréciation pour les diverses activités menées en faveur du Système de Certificats OIML;

    DEMANDE aux Membres du TAG $ _{cert} $ d'accepter les sujets de travail proposés sur la base des questionnaires mentionnés ci-dessus et de nommer pour chaque sujet un Rapporteur comme indiqué dans le rapport du BIML;

    DEMANDE au BIML d'étudier la possibilité d'organiser une réunion du TAG $ _{cert} $ en 1996 et d'informer tous les Membres concernés au sujet de cette réunion;

    DEMANDE à tous ses Membres de fournir au BIML et au TAG $ _{cert} $ des informations et publications relatives à la certification, à l'examen de conformité, à l'accréditation et autres sujets liés, et

    DEMANDE au BIML de faire rapport sur les activités du TAG $ _{cert} $ à la prochaine réunion du CIML.

- number: '7.2'
  title: Nouvelles Recommandations pouvant être appliquées dans le cadre du Système
    de Certificats OIML
  narrative: |2+

    Suite aux décisions prises sous point 6 de l'ordre du jour, le Comité adopte la Résolution suivante:

    Le Comité International de Métrologie Légale

    DECIDE de compléter la liste des Recommandations applicables dans le cadre du Système de Certificats OIML comme suit:

    les Recommandations sur les

    - instruments trieurs-étiqueteurs à fonctionnement automatique (R 51),

    - doseuses pondérales à fonctionnement automatique (R 61), et

    - spectromètres à fluorescence de rayons X portatifs et déplaçables pour la mesure sur le terrain d'éléments polluants dangereux,

    deviendront applicables au Système aussitôt publiées;

    la Recommandation sur les ponts-bascules ferroviaires à fonctionnement automatique (R 106) deviendra applicable au Système dès que les Annexes sur les procédures d'essai et le format du rapport d'essai auront été publiées;

    la Recommandation sur les audiomètres à son pur (R 104) deviendra applicable au Système dès que l'Annexe sur le format du rapport d'essai sera publiée, sous réserve d'un résultat positif de la procédure d'approbation par correspondance;

    DEMANDE aux comités techniques et sous-comités OIML concernés de procéder à l'élaboration et à la révision des Recommandations OIML en vue de leur application au Système de Certificats OIML; et

    DEMANDE au Conseil de Présidence et au Bureau de suivre l'élaboration et le développement de ces Recommandations et de faire rapport à ce sujet à la prochaine réunion du CIML.

- number: '8'
  title: DOCUMENT DE POLITIQUE A LONG TERME ET BROCHURE D'INFORMATION GÉNÉRALE
  narrative: "\n"
- number: '8.1'
  title: Rapport de publication
  narrative: |2+

    M. Athané donne des informations concernant la publication et la diffusion de ces documents, et rappelle au Comité qu'un rapport financier a déjà été envoyé à tous les Membres du CIML. Il ajoute qu'un petit prospectus donnant des informations de base sur l'OIML sera préparé en 1996.

- number: '8.2'
  title: Commentaires
  narrative: |2+

    Le Comité exprime sa satisfaction pour le travail réalisé par le Bureau. Plusieurs Membres du CIML indiquent que des traductions dans leurs langues nationales du document de politique à long terme étaient disponibles ou en cours de préparation.

- number: '9'
  title: LIAISONS AVEC D'AUTRES ORGANISATIONS AUX NIVEAUX INTERNATIONAL ET RÉGIONAL
  narrative: |2+

    M. Athané indique que la seule information dont il dispose se rapporte à ISO/TAG 4 qui se réunira bientôt à Genève. La création d'un nouveau forum, indépendant de l'ISO, est censée permettre aux sept institutions internationales déjà membres du TAG 4 (ainsi qu'aux autres institutions éventuellement intéressées) de poursuivre leur coopération sans interférer avec la coordination des activités métrologiques internes à l'ISO. L'ISO pourrait accepter la responsabilité du secrétariat de ce nouveau forum; sinon, un secrétariat commun BIPM/BIML pourrait être envisagé.

    M. Issaev indique que son pays a l'intention de participer à la prochaine réunion du TAG 4 et apporte son soutien à la création d'un nouveau forum de métrologie, ouvert à tous les autres organismes internationaux et régionaux.

    M. Magana exprime l'avis que la ligne de séparation entre les activités de l'OIML et celles de normalisation développées dans le domaine de la métrologie, doit être clairement définie.

    M. Chappell, en tant que membre du TAG 4, convient qu'une coopération entre le BIPM et le BIML serait judicieuse pour un bon développement de la coopération métrologique et permettrait aux métrologistes d'influencer les activités de normalisation; mais cette coopération n'impose pas à son avis d'assurer le secrétariat du forum de coopération; quant à la participation à ce forum, il juge qu'elle devrait être étendue mais aussi que la participation d'organismes régionaux augmenterait excessivement sur le plan pratique le nombre de participants au forum.

    M. Birch s'inquiète du fait que ILAC n'ait pas été mentionné dans cette discussion, et suggère que le Conseil de Présidence examine les liens entre l'OIML et ILAC. Il suggère aussi que les relations entre l'OIML et les organismes régionaux soient examinées avec attention et qu'une politique soit définie (à ce sujet, M. Birch précise qu'il n'est pas en faveur de la désignation de bureaux ou officiers régionaux représentant l'OIML).

    M. Faber fait part de son intention de prendre contact avec le Président et le Secrétaire d'ILAC. Concernant les organismes régionaux, il convient qu'il est nécessaire d'en discuter au prochain Conseil de Présidence. D'autre part, ce point devra figurer à l'ordre du jour de la prochaine réunion du CIML.

- number: '10'
  title: PAYS EN DÉVELOPEMENT
  narrative: "\n"
- number: '10.1'
  title: Rapport sur le Symposium Activités métrologiques dans les pays en développement,
    23-24 octobre 1995
  narrative: |2+

    M. Kochsiek, responsable du suivi des activités de développement au nom du Conseil de Présidence, donne un rapport sur le premier Symposium OIML sur les activités métrologiques dans les pays en développement, organisé par le SBTS et le BIML, auquel ont participé plus de 100 personnes en provenance de 34 pays. Vingt-trois conférences ont été dispensées sur quatre thèmes: (i) sujets de politique générale; (ii) services métrologiques nationaux; (iii) coopération en métrologie aux niveaux national, régional, et international; et (iv) sujets de métrologie légale (formation, traçabilité, etc.).

    D'après M. Kochsiek, les conférenciers ont donné une bonne analyse de l'état actuel de la métrologie légale et de ses tendances dans différentes régions. Les résultats du symposium semblent donc positifs, et il convientrait d'organiser d'autres symposiums pour échange d'expériences et pour promouvoir certaines conceptions dans le domaine de la métrologie. Cependant, ils devraient soit être organisés sur deux ou trois jours (au lieu d'une journée et demie pour celui-ci), soit comprendre moins de conférences, de façon à laisser plus de temps pour les discussions.

    M. Kochsiek évoque certains thèmes pouvant être traités lors des symposiums à venir, dont l'impact économique, la coopération internationale et régionale, les questions générales de la métrologie légale et appliquée, ou la métrologie dans le cadre de la protection de l'environnement.

- number: '10.2'
  title: Rapport sur la réunion du Conseil de Développement du 25 octobre
  narrative: |2+

    M. Benkirane, Président du Conseil de Développement de l'OIML, fait le rapport de cette réunion tenue la demie-journée suivant le Symposium. En conclusion de cette réunion, un bilan détaillé a été soumis au Comité, qui l'a approuvé.

    M. Benkirane présente son successeur en tant que Président du Conseil de Développement, M. Putera, d'Indonésie.

    M. Putera, après avoir exprimé sa satisfaction d'avoir été elu Président du Conseil de Développement, indique quelles directions il compte suivre dans l'exercice de ses responsabilités:

    - poursuite et achèvement du programme actuel, en exploitant les idées développées lors du Symposium, de la réunion du Conseil de Développement, ainsi que lors de la réunion du Forum Asie-Pacifique de Métrologie Légale qui a précédé les réunions OIML;

    - création d'un programme supplémentaire limité, concentré sur (i) la formation; (ii) la planification et l'équipement des laboratoires de métrologie; (iii) la documentation et l'information; et (iv) l'organisation des services métrologiques;

    - développement des efforts concernant l'aide budgétaire aux pays en développement pour leur participation aux activités internationales et régionales d'intérêt significatif pour eux;

    - intensification des contacts avec les organisations régionales;

    - contacts avec les pays industrialisés pouvant fournir des aides financières et/ou techniques;

    - promotion des activités OIML (Recommandations, certification) et de celles d'autres institutions internationales (ISO) au sein des pays en développement; et

    - attirer l'attention des gouvernements sur le rôle de la métrologie pour le développement économique et technique des pays.

    M. Faber a fait part de son appréciation personnelle pour l'élection de M. Putera, ainsi que pour le programme esquissé. M. Faber a ensuite évoqué la participation assidue de M. Benkirane dans les activités de l'OIML, en tant que Membre du CIML, et comme Président du Conseil de Développement; pour M. Faber, il n'y a aucun doute que le travail déjà réalisé sous la présidence de M. Benkirane participera au succès du programme à venir. M. Faber souhaite à M. Benkirane une longue et heureuse retraite.

- number: '10.3'
  title: Discussions et décisions
  narrative: |2+

    Suite à ces rapports, le Comité adopte les décisions suivantes:

    Le Comité prend note de rapports présentés par MM. Kochsiek et Benkirane sur le SYMPOSIUM OIML SUR LES ACTIVITÉS MÉTROLOGIQUES DANS LES PAYS EN DÉVELOPEMENT et sur la réunion du CONSEIL DE DÉVELOPEMENT tenus du 23 au 25 octobre 1995 à Pékin.

    Le Comité exprime son appréciation pour les activités effectuées par le BIML et par le Bureau d'État de Supervision Technique de Chine pour l'organisation du Symposium qui s'est focalisé sur les questions politiques et stratégiques liées à la métrologie légale, ses aspects économiques, la coopération internationale et l'aide aux pays dans l'établissement et le développement de services nationaux de métrologie.

    Le Comité exprime ses remerciements à tous les Membres de l'OIML et institutions en liaison qui ont apporté leur contribution au Symposium.

    Considérant le rôle de l'OIML dans la dissémination d'informations et de connaissances en métrologie légale et domaines liés, le Comité demande au BIML d'étudier la possibilité de continuer à organiser de tels symposiums sur les activités métrologiques dans les pays en développement. Considérant que l'OIML devrait agir en tant que conseiller technique

    en matière de métrologie légale auprès des organisations internationales spécialisées dans les questions de développement, le Comité invite le BIML à étudier la possibilité d'organiser des séminaires d'informations pour ces organisations.

    Le Comité prend également note des actions diverses menées en 1995 en faveur des pays en développement, y compris un atelier de formation DÉTERMINATION DU VOLUME DES RÉSERVOIRS DE STOCKAGE FIXES organisé par l'Allemagne avec la participation du BIML, le séminaire de formation LA MÉTROLOGIE AU SERVICE DU DÉVELOPPEMENT ÉCONOMIQUE co-organisé par la France, la CEE/ONU, la Commission de l'Union Européenne et l'OIML, un cours de formation en métrologie légale tenu à Cuba, et autres actions de soutien au programme du Conseil de Développement de l'OIML.

    Le Comité demande au BIML et au Conseil de Développement de poursuivre leurs activités en matière de métrologie légale, en particulier en encourageant l'organisation de cours et de séminaires de formation, en organisant la disponibilité de manuels, brochures et autres moyens de formation, en distribuant des informations sur les soutiens techniques et financiers auxquels peuvent recourir les pays en développement, et en maintenant des contacts avec les institutions internationales et régionales concernées. L'utilisation de nouveaux moyens d'information et de formation, par exemple, les bases de données à accès direct ou les CD-ROM et CD-ROM interactifs, devraient être pris en considération et le BIML est invité à étudier, en liaison avec les TC/SC appropriés et le Conseil de Développement, la possibilité d'utiliser ces moyens afin d'accroître la disponibilité de matériaux d'information et de formation pour tous les pays.

    Le Comité exprime son appréciation pour les activités effectuées sous le leadership de M. Benkirane, Maroc, Président du Conseil de Développement de 1988 à 1995.

    Le Comité prend note de l'élection de M. Putera, Membre du CIML pour l'Indonésie, en tant que Président du Conseil de Développement pour la période 1995-1997.

    Enfin, le Comité prend note du fait que la prochaine réunion du Conseil de Développement se tiendra en 1996 à Vancouver, en liaison avec la Dixième Conférence et la 31e réunion du CIML.

