- number: '17'
  title: DÉCISIONS ET RÉSOLUTIONS
  narrative: |2

    Le Comité adopte des résolutions et prend des décisions sur les différents points de l'ordre du jour. Ces décisions et résolutions sont reproduites à la fin de ce compte rendu.

    ## B - Point spécial: DISCUSSION CONCERNANT UN RAPPROCHEMENT OU UNE FUSION AVEC LE BUREAU INTERNATIONAL DES POIDS ET MESURES

    Ce point a été traité pendant une session spéciale le 26 octobre, dans l'après-midi; un résumé détaillé des discussions a été publié séparément par le BIML.

    Suite à cette session spéciale et sur proposition de M. Faber, le Comité a adopté la Résolution suivante:

    ## Le Comité International de Métrologie Légale

    CONSIDÉRANT la proposition faite par le Gouvernement français d'un rapprochement entre les organisations créées par la Convention de l'OIML et par la Convention du Mètre, en vue d'une fusion éventuelle des deux organisations;

    CONSIDÉRANT l'accord de nombreux Membres du CIML reconnaissant que les discussions communes suggérées dans la proposition française sont souhaitables;

    CONSIDÉRANT les vues exprimées par les Membres du CIML pendant la 30e réunion du CIML,

    CONSIDÉRANT qu'il convient que ces discussions prennent en particulière considération les récents et rapides changements de la métrologie ainsi que ses besoins prévisibles dans les décennies à venir,

    DEMANDE à son Président, conjointement avec le Président du Comité International des Poids et Mesures, de désigner un groupe de travail commun pour étudier cette question;

    DEMANDE à son Président de faire rapport au CIML sur le progrès des discussions, en vue de décisions sur les futures actions; et

    INVITE la Dixième Conférence Internationale de Métrologie Légale à soutenir la présente Résolution.

    ## C - Table ronde: CONFIANCE DANS LES APPROBATIONS DE MODÈLE

    Cette table ronde s'est déroulée le 26 octobre en matinée, et une transcription complète des discussions a été publiée séparément par le BIML.

    Suite au rapport rendu par M. Bennett, qui a présidé la table ronde, le Comité exprime son appréciation et adopte la Résolution suivante:

    Le Comité International de Métrologie Légale

    AYANT PRIS NOTE du contenu des discussions de la table ronde sur la CONFIANCE DANS LES APPROBATIONS DE MODÈLE tenue dans la matinée du jeudi 26 octobre,

    RECONNAÎT l'importance de ce sujet pour les États Membres de l'OIML;

    DEMANDE au BIML de distribuer, aussitôt que possible, une retranscription complète des discussions à tous les États Membres;

    DEMANDE à tous les États Membres de prendre en considération les points soulevés au cours des discussions et de faire tout ce qui est possible pour développer la confiance dans les approbations de modèle;

    DEMANDE au Conseil de Présidence d'examiner la possibilité pour l'OIML de développer des actions qui rendraient possible cette confiance; et

    EXPRIME le souhait que des tables rondes du même genre relatives à des sujets importants soient organisées en liaison avec les futures réunions de l'OIML.

    ## CLOTURE

    M. Faber exprime sa profonde appréciation pour la parfaite organisation de la 30e réunion du CIML par le SBTS de la Rép. de Chine. Il remercie tous les délégués pour leur participation active aux discussions, laquelle a permis au Comité de prendre les décisions qui s'imposent. Il remercie également le Bureau pour les préparatifs techniques de la réunion.

    Il souligne que la communauté internationale de métrologie légale est entrée dans une période très stimulante et intéressante par cette possibilité d'un rapprochement ou d'une fusion avec le BIPM. Il remarque avec satisfaction que tous les délégués ont participé aux discussions dans un esprit ouvert et constructif, se concentrant sur les besoins pour la métrologie de demain, et ne se limitant pas à des considérations financières ou matérielles, ce qui est très prometeur pour l'avenir de la métrologie légale et pour d'autres aspects de la coopération internationale en métrologie.

    Pour terminer, M. Faber souhaite que tous les Membres du CIML puissent se rendre à la réunion à Vancouver en novembre 1996.

