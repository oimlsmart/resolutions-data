      ## Renewal of the OIML/ILAC/IAF Memorandum of Understanding

      Mr. Kool informed Members that much information on this was to be found in the Working Document and Addendum 7.1. The MoU had been renewed in October 2010 and the latest versions of the joint work programs with ILAC and the IAF had been made available to Members.

      ## OIML/ILAC and OIML/IAF joint work programs

      The OIML and ILAC were currently working on a joint assessment procedure, particularly for the assessments which were made in the peer evaluation process in the context of the MAA, but more general. This should be used by accreditation bodies when they accredited legal metrology organizations. This was still in draft form and would be discussed in the coming year between the OIML and ILAC. It was hoped to have a more final version to show to Members at the 2012 CIML Meeting.

      ## ILAC Accreditation Issues Committee (ILAC/AIC)

      Information about publications of interest to the OIML which were the responsibility of this committee could be found in the Working Document. This was the committee with which discussion of joint assessment procedures took place.

