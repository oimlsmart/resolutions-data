      The first added item was a presentation by Mr. Carstens on the costing aspects of a certification system for quantity declaration in pre-packages, currently being discussed in TC 6.

      Mr. Carstens said that this presentation had resulted from a discussion at the last CIML Meeting, when the USA had requested that they present something about the costing. They had gone back and looked at it and found it very difficult; he thought this was the same situation as when they had considered the MAA. What he had tried to do was to look section by section at the document they had and indicate where they saw a possible cost or income.

      Mr. Carstens said as an introduction that this was clearly a voluntary certification scheme. Originally they had thought of an MAA, but after one or two meetings it had been decided that they wanted to consider a less stringent document as a start. So this document would establish the rules and procedures for fostering confidence in labeling and quantity declaration

      of pre-packages. It would promote efficiency in the control of pre-packages and it would promote global organization, uniform interpretation and implementation of legal metrology requirements, which would facilitate market access.

      In the document there was the international level, which was the management committee, which comprised the OIML Members who would be part of the scheme or appointed delegates, and the BIML as its secretariat, at the current stage. Below that was the national level, which consisted of Designating Authorities; that would be the CIML Member or the Corresponding Member, as the case might be. Then there would be designated bodies within the country, who would then have packers.

      Taking this level by level: the costs at the top or international level would be generated by the committee at the top, which would be the same as the MAA CPR, i.e. the tenancy of Management Committees by Member Countries, with the venue being provided by the host country. The only other cost they could see was the BIML, acting as secretariat as was the case for the MAA, including attending the meeting, setting up the web page and maintaining links to the designated bodies. So they did not anticipate at this point that there would be very much work for the BIML. The updating of the web page could be done by the Designated Bodies themselves, which would reduce the work of the BIML. If there was any charging to be done, they would then invoice the relevant parties and would then do the handling of complaints in the fields and the interpretation of the document, and arrange for and administer peer assessments if they were necessary. Regarding income, at the same level the BIML could levy a designation fee to cover any costs, and recover the peer evaluation costs. If it began like the current MAA, with only a few companies and countries involved, it would start off slowly and possibly escalate, and the costs that would need to be levied would not be substantial.

      For the Designating Authorities at national level, costs would consist of administration, evaluation of any applicants, recommendations to the Management Committee, members of the assessment team to assess the applicants and the cost of enacting those assessments.

      The income would be for each Designated Body to decide, but there would probably be some sort of fee to cover those costs.

      At the third level, which was the registration of the designated bodies, it was estimated that costs would once again be similar to those of an MAA Issuing Authority, so there would be an application fee to the Management Committee, if so decided, accreditation or peer evaluation costs and Designation Authority administration. The income would be generated from the registering of those packers in the country, and once again it was generally recognized that the number of pre-packers, in relation to the number of manufacturers of measuring instruments, was substantially greater.

      Going down to packers, Mr. Carstens asked what their costs would be. It would be, he answered, a registration fee to the Designated Body, and the implementation and maintaining of a quality system if they did not have one in place. Most manufacturers had at least an ISO 9000 System in place, and would only have to make some minor adjustments in procedures, etc., which would then not substantially change their accreditation fee or certification fee in any way.

      The possible benefits in monetary value to the packers would possibly be increased market access, reduced inspection, because if you were working with a certification body or an accreditation system, inspections were arranged in advance and companies could do away with ordinary spot inspection, which was expensive. There would also be access to all production records, so it would be possible to return to the date of the previous inspection to

      ensure that the system was in control. They could have fewer disputation costs and the fact that they would not be taken to possible court action.

      Carrying the mark would improve sales because the companies with the mark could then sell themselves through reputation, and create consumer and retailer confidence by putting the mark on their product.

      Mr. Carstens asked what the potential benefits of the system would be. He was of the opinion that this was a more efficient and cost effective way of regulating. Currently, particularly smaller economies or developing economies did not have many resources and would like to regulate better, and one of the ways of doing this was to check the product at the manufacturing plant and not run from supermarket to supermarket looking for products which did not comply. If there was confidence in the accuracy of the quantity of pre-packages, it would ease access to export markets, where currently goods being exported might be stopped. Hopefully with the new system the product would go straight through without further inspection. It would allow manufacturers to exercise good governance within a good production system, and give visibility in marketing for the OIML themselves.

      In conclusion, Mr. Carstens said once again that the scheme was voluntary, it had no unmanageable financial implications for the OIML or to national Designated Authorities or packers, it allowed for more efficient and cost effective regulating and it ensured easier market access.

      Mr. Farragher said that Mr. Carstens had referred to the scheme as voluntary but he asked whether he envisaged that Member States wishing to adopt it would embed the scheme in a legislative structure.

      Mr. Carstens replied that the TC had made the allowance that if companies in one country wished to be designated and it was not possible in that country, they could be designated in another country which was part of the scheme. But if a company moved into the scheme and made the decision that it was part of the scheme, then it had to comply with the requirements of the scheme.

      Mrs. Hockert thanked Mr. Carstens for his presentation and asked whether a majority of TC 6 members supported moving forward on this project.

      Mr. Carstens replied that there had not been a quorum at their last meeting, so it had not been possible to take a vote. There was resistance from some members of the TC. However, he personally thought that in relation to the OIML's strategy of looking at this sort of thing and improving, it would be rather short sighted to abandon the project at TC level.

      Mr. Ardianto asked whether the registration fee for packers would be the same in all countries, what the effect would be on the existing regional quality marking scheme where there was one, and whether Corresponding Members could use the proposed scheme or only Member States.

      Mr. Carstens replied that he did not think the fee would be the same in each country, but that each would decide what, if anything, they needed to charge for registration. The only regional scheme he knew of was the e-mark in Europe, and he was not sure whether anybody else had implemented anything. Finally, he stated that the scheme was open to all Members.

      Mr. Richard wished to return to Mrs. Hockert's question. He had a report on his computer about the last meeting of TC6 in which it was clear that even in the absence of a quorum there had been a strong majority against continuing with the work. He further wished to ask about the real numbers in the costs listed by Mr. Carstens, and whether the work would

      continue. He was convinced that if, according to what Mr. Carstens had said, the BIML were to administer the peer assessment, this would have significant implications for the BIML.

      Mr. Carstens replied that to estimate the exact cost, with different countries and regions establishing different prices, would not be possible. This had equally been the case when the MAA had been set up; nobody had known the definitive cost. A price had been decided on and they had progressed from there.

      Mr. Richard commented that a recent CPR Meeting had decided that the BIML would no longer administer peer assessment for the MAA. So the idea of expecting the BIML to administer peer assessment for pre-package certification could lead to significant complications.

      Mr. Carstens said that peer assessment might not need to be used as the scheme could be based on already existing checking systems within countries. Consideration could be given to looking at alternative ways of managing the system without using the BIML. TC 6 had assumed that BIML would provide the secretariat, as for the MAA at that time, but other ways could be found.

      Mr. Kool added that it was true that there had been no discussion at the CPR of how peer assessment and collection of money from peer assessed laboratories to be given to peer assessors would be done now that the BIML no longer undertook the task. The assumption was that the laboratories would do it themselves. There had not been a quorum in the CPR so this could not be spoken of as a formal decision, but there were ongoing discussions on changing the procedure described in the MAA procedures.

      Mr. Mason said that this was an item for information. The question always arose as to what should be done with such information. It seemed clear in this case that it was a matter to be dealt with by the TC, preferably when they could get a quorum. He did not think it was appropriate for the CIML to attempt to influence a TC which had not yet arrived at a decision.

      Mr. Harvey wanted to make a few comments in favor of the proposed OIML mark. The first was that it would be hard to buy the sort of marketing that would be obtained by having an OIML mark on packages that were traded internationally. This would be very good exposure for the OIML and a very great benefit for them in getting visibility internationally. There were also financial benefits for the OIML because, as Mr. Carstens had said, there were very many packers in the world, far more than the manufacturers of instruments. They would be levying a fee on each of these packers if they wished to use the OIML mark. The charge might only be five or ten dollars a year, but on a million or so packers this would bring in a significant amount of income to the OIML, which could then be used for some of the programs they were trying to establish for developing economies. There would be immediate benefit to developing economies because they usually did not trade instruments but they certainly traded packages. He asked Mr. Seiler if he would like to comment on this aspect.

      The advantage Mr. Seiler saw in such a system was that developing economies would be to some extent relieved of their work in checking packages, so there might be a presumption that the relevant Recommendation and standards were respected. Of course, for it to be effective there must be some checks and controls on a statistical basis, to ensure that everything that had been declared was correct, and not a mere assumption that everything met standards. Within Europe there was already a similar system with a quality mark, so an extra one might be superfluous. But for developing economies he could see advantages. He was of course giving his own opinion and was not of course authorized to speak in any official capacity.

      Mrs. Martens said that she understood that this was a voluntary system. The OIML's customers were the packers. She wondered whether these customers had been involved in the development of the plans; not doing this could mean failure for even a good system.

      Mr. Carstens replied that members of the TC had all been instructed to talk to industrialists in each country about the plans. In South Africa there was already a voluntary scheme of inspection and the packers saw a benefit in it and were interested in the plan. He was not sure what had been done in other countries. Some of them did not even do pre-packaging. He was no longer directly involved in this TC but had made the presentation on behalf of its secretariat.

      Mr. Mason said that it would be noted that this item of information had been given and that work was still continuing within TC 6. He thanked Mr. Carstens.

- number: 10.1.5
  title:
  - spelling: eng
    value: Information on the status of the revision of OIML D1 Law on Metrology
  narrative:
  - spelling: eng
    value: |2+

      Mr. Kochsiek, convener of the ad hoc drafting group formed within TC 3, told Members that he would be reporting on the progress made since the 45th CIML Meeting in Orlando, where he had shown them the proposed structure and the items and they had been in favor of the drafting group starting work immediately. The Working Document had been distributed to members of the TC, with a deadline of the end of April 2011. Comments had been received from nine Member States, three International Organizations and one Regional Organization. At a meeting in Paris on 17 May, all these comments had been discussed. Mr. Henson of the BIPM had also attended the meeting. They had drawn up a response consisting of their comments, which had been sent out to Members, together with the first CD, on 14 June, with a deadline of 8 October, i.e. the previous Saturday. Up to the previous day, replies with comments had been received from Canada, the Netherlands, Norway and South Africa. The UK had asked for a prolongation until 15 October, but had in fact delivered their comments on 12 October.

      For the future, Mr. Kochsiek proposed to work on the comments, and if possible and/or necessary would hold a meeting at the end of November or beginning of December, by which time it was hoped that Mr. Ehrlich would have recovered and hopefully be able to fulfill his intention of being in Paris, where further discussion could take place.

      One problem remained, concerning the terms and definitions of supervision and surveillance. In the graph, definitions from a draft of TC1 had been used, and they were waiting for TC1 to make a final decision. By January 2012 at latest, they would circulate it simultaneously for the vote of TC Members and for preliminary online ballot for CIML Members. Mr. Kochsiek's plan was therefore to prepare a final version to be voted on at the 47th CIML Meeting in 2012. Mr. Kochsiek informed Members that he had already used the draft in several countries and he had mainly been able to convince the decision makers and ministries with the arguments to be found in chapters two and three.

