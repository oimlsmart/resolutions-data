- number: '10.3'
  title: 1 Information on the operation of the OIML Certificate System and the MAA
  narrative: |2+

    Mr. Mussio told Members that the number of Basic Certificates was decreasing, but that this was compensated for by the increase in the number of MAA Certificates. This meant that the MAA was a success, in the sense that people were using it.

    Mr. Mussio then stated that among all the certificates, R 76 and R 60 were still the "stars of the show". This was why the MAA was based on the DoMCs for R 76 and R 60.

    The first full review process of MAA Participants had now been reached, for which purpose a meeting had been held two weeks previously. This had been an excellent meeting, and he thanked the host, the PTB. The meeting had included a visit to the Sartorius factory, as an example of one of the potential MTLs that might participate. The agenda had covered, basically, the review process of the three DoMCs; unfortunately there had not been a quorum, so it had not been possible to reach a final decision. But there had been no major issues on the part of any of the participants, so he expected them all to take part in voting. Because there had not been a quorum, all they had been able to do was put forward proposals, and one of these proposals had been that, for the next full review period, all the Issuing Participants should make a presentation of the status in the meeting. They should attend the meeting so that the other participants could ask questions and elicit more explanations of the material submitted.

    The second part was what had happened in TC 3/SC 5. There the major issue had been discussion on whether the BIML should go on acting as an Accreditation Body, meaning a body which organized the peer reviews, paid the experts and did all the work, or whether it should have a supervisory function only, with the reviews being organized by the labs themselves. This was not an easy task, because there had been many different suggestions, so it would be some time before a consistent proposal could be offered to the CIML as to how to make the step from organizer to supervisor.

    The third point concerned the scope of the DoMCs. The question was whether participants had to wait two years or three years for a review period. If only small changes were to be made, they might be able to be done quickly and so create a fast track process.

    There were some problems with the review process. The main one was that not all participants had submitted their material in the same format, which made it difficult for participants to review decisions taken by others. Mr. Mussio considered it was very important to have a standard report format so that all participants would deliver their comments in the same way.

    Everybody at the meeting had agreed that experts should have special training on the issues of legal metrology, so a workshop would have to be organized for the following year.

    The final issue, Mr. Mussio said, was some potential non-conformities in some Certificates. This had been very openly discussed during the meeting; this had been very fruitful, and had helped to create trust between the participants.

- number: '12'
  title: 1 CIML interpretation of the OIML Convention (OIML B1)-Article XVII - use
    of the term "colleague"
  narrative: |2

    Mr. Kool told Members that information on this topic could be found in the Working Document and in the Addendum. The issue was that when the OIML had been established,

    the Convention had spoken about a Committee of Members that were designated by the Conference. At that time, that construction had been copied from the way the BIPM had worked then, and in fact still worked at present. The CIPM was a fixed number group of 18 designated experts. The OIML had started with a Committee of 20 Members, designated by the Conference.

    During the 1960s, that had been changed and from that moment on, every Member State of the OIML had had one representative in the Committee. It could increasingly be seen that while formally the CIML was a Meeting of Committee Members, in practice, like meetings of many other international organizations where decisions were taken on standards, delegations from Member States were present rather than a single Committee Member. The key word in the Convention here was "colleague". The Convention said that a CIML Member, if he could not attend the Meeting, could vote by giving a proxy to another "colleague".

    When the CIML was established, this word would almost certainly have been interpreted as meaning another CIML Member. With the changes in the Organization, which was more and more becoming a standard-setting body, CIML Members would prefer to designate a colleague from their own administration to represent them in the Meeting rather than a CIML Member from another country. In this way a Member State's view could be expressed, rather than a Committee Member's view. An interpretation of the word "colleague" was therefore being sought which would better reflect the way the CIML now operated. For this reason the Resolution in the Working Document had been drafted.

    Interpretation of the Convention was an issue exclusively for Conference; in preparation for this, Members were asked to endorse the Resolution with its interpretation of the Convention so that it could be submitted as a CIML Resolution for the Conference to take a decision on whether this was a correct interpretation of the Convention.

    Mr. Mason added that it seemed to him that this was the basis on which the Committee had already been operating for a number of years, and that indeed, until a view could be obtained from the Conference, the Committee itself should set its own rules and operate them unless they were overturned by Conference. Mr. Mason felt it was important to be clear in how these rules were interpreted as it affected the way voting took place. The Bureau was asking the Conference to confirm what the rules should be. If the Conference was to take a different view it would be necessary to change either current practice or the Convention. The matter would of course be discussed again the following year at the Conference.

    Mrs. Van Spronssen said that she supported the clarification but would like clarification of what was meant by the word "administration".

    Mr. Mason said that this would be regarded as a broad interpretation of the Government authorities which themselves nominated the CIML Member. It was known that as many countries had experimented with different Government structures, sometimes people who acted in an official capacity in legal metrology might not regard themselves as Government, so the word "administration" had seemed to be a broader term.

    Mrs. Van Spronssen said that it seemed that the words "government" and "administration" were sometimes used interchangeably. She asked for the wording of the Resolution to be adjusted so that there could be no possible misinterpretation between the two terms.

    Mr. Mason agreed to this.
