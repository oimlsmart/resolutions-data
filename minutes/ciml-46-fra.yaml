  narrative:
  - spelling: eng
    value: |2+

      Mr. Patoray informed the Meeting that the overall finances of the OIML were sound. Some slides would support that finding, as would the Auditor's approval of the 2010 accounts. He reminded Members that his appointment had begun on 1 January 2011, but he would do his best to inform them fully of the events of 2010.

      Resolution 27 of the 45th CIML Meeting had been implemented and the information required by IPSAS had been put into the accounts; this included pension requirements and also appraisal of the building. This might make the 2010 accounts look different from those of previous years. He hoped the detail would explain the content. There was further explanation in Addendum 4.1 of the Working Document.

      The first slide showed the logo and the signature of Mr. Fischer, who had audited these accounts and expressed his approval. Mr. Fischer was aware of the IPSAS requirements and would ensure that they were included in future. Regarding a question on aspects of the Working Document, when the actuary had done the analysis of the pension arrangements he

      had done it with the IAS Standard 19 and not the IPSAS Standard 27. Future analysis would be based on IPSAS Standard 27, but this involved only minor differences and would not affect the outcome.

      Mr. Patoray then showed the balance sheet. The cash level had increased between the end of 2009 and the end of 2010, which was good. The land, the building and the fittings had been included at full value as assets, as required by IPSAS, and amounted to slightly over €2 million; this was considered to be rather a low valuation, given current prices in the Paris area, which had risen between 15 % and 20 % in the past year. There would be a reappraisal before the budget for the Conference in 2012. When pension provision of $ \epsilon $1.7 million was taken into account, as full liability for this was now included, the results for the year were relatively negative, but the value of assets was increasing.

      On the income statement it could be seen that income had increased by about 90 000. Staff expenses, though higher than for 2009, were below budget. Operating expenses had decreased. If pension provision had not been taken into account there would have been a positive outcome. This situation would work itself out over the following two years, and figures for 2011 were already looking healthier. Mr. Patoray hoped that Members would trust the accountants and auditors and not be alarmed by the large negative number, which was a theoretical accounting calculation for the liabilities in the contingency of the OIML ceasing to exist. As discussed at the previous year's Meeting, the building more than covered the liability, and there was therefore no liability to Members.

      The budget voted for 2010 for staff costs had been €1302000; the actual number had been €1250000. The difference was a positive €43000.

      The premises section included gas, electricity, post, various contracts on copiers, printers and other machines. This was slightly over budget.

      There had been over-expenditure on meetings, despite the fact that there had not been any extraordinary meetings in that year. Travel and accommodation had been lower than in previous years, though it was still significantly over budget. Miscellaneous spending was also up and Mr. Patoray was seeking details of this. A graphic, requested in the audit, showed that staff costs were relatively high, as was depreciation and pension provision. As a service organization, the OIML provided a service; it did not possess heavy machinery or the like. 73% of its costs were staff, which was typical in service organizations. The remaining costs, mainly under miscellaneous, were for running the Organization. For example, there had been an advertisement for Mr. Patoray's position, payment to a lawyer working on the case brought by a previous employee, payment to the Auditor, and moving expenses for Mr. Patoray, which was a one-off cost. Another one-off cost in 2010 was for a car bought by the previous Director, which had been put through the books but had now been removed. Members looked surprised, but it was not unusual for an organization such as this one to own an automobile. Some items, such as the Auditor, would be repeated in the future but others would not. Mr. Patoray intended by the 2012 accounts to break these costs down rather than combining them under "€90000 for miscellaneous".

      Cash reserves in the OIML's bank accounts had increased between 2009 and 2010 by approximately 300 000. The other accounts were the working accounts, moneys moved around by the Administrator to cover the costs of the CIML and other events in the course of the year. There was still not, in the cash reserves, the 50% balance in the accounts of the expenses which it would be normal for an organization of this type to have. The expenses of the Organization amounted to about 1.8 million and the reserves were 645000. They were, however, moving in a positive direction. Mr. Patoray invited questions but reminded Members that the 2010 accounts had already been complete when he had arrived at the

      Bureau. Some interim information on the 2011 accounts would be included in the item on the management audit.

- number: '4.2'
  title:
  - spelling: eng
    value: Director's comments on the management audit
  narrative:
  - spelling: eng
    value: |2+

      Mr. Patoray pointed out to Members that some information which they might find more directly relevant was to be found in the Addendum to the Working Document. Response to the comments in the Management Audit had been made as follows:

      The BIML was now working with Mr. Frederick Fischer, who came in quarterly and sat down with the BIML Accountant, Administrator and Director to review the accounts. Some might find it unusual for an auditor to do this, but Mr. Patoray felt that it was important for him to understand how the accounting was done. Eventually, once the situation was stable, it would be managed by the Administrator and Accountant alone.

      Another task done by the Auditor was to extrapolate from each trimester what it would look like if it continued for the entire year. Three trimesters having now passed, they had quite a clear idea of what the year would look like, though they did not yet have all the final numbers. However, it looked at the moment as though staff costs would be about $ \epsilon $ 80000 less than the budget. Costs for the premises were somewhat more, and he was trying to break these costs down to understand the reasons. Recently the BIML had partially cancelled the contract with the postal service whereby it paid $ \epsilon $ 4000 a year for mail to be picked up. In the past many more books, documents, etc. had been sent out, but this was no longer the case and the cost was not justified. They had also cancelled the contract of a gardener who was supposed to look after the small courtyard but had done little to justify his payments. He might or might not be replaced at a later date. More energy-efficient light bulbs would be used and there might be ways of reducing heating costs.

      The BIML was spending well under the €25000 allotted for the Bulletin, through closely managing the number of pages and monitoring the number of copies shipped across the world.

      The sum allotted for travel was €96000. The Bureau had been searching the internet for best flight prices and optimum days to travel; in some cases money could be saved by traveling a day earlier, and all Bureau staff worked while they traveled so no time was lost by this.

      Things were looking good for 2011, though some aspects of the current Meeting had yet to be paid for, and there had been an extra meeting for the CTT seminar in Utrecht, not in the budget, which had cost about 6000-7000. The reserve fund had now reached 951000 approximately 50 % of budget, which was pleasing.

      Mr. Patoray would be asking for an allocation for repairing and maintaining the building in good condition; some of this might come from the savings being made within the existing budget, while still maintaining current staff levels, before the next budget was presented at the 2012 Conference. Things looked positive but there was still the fourth quarter to work through.

      The monthly review of the salary calculations had been an issue identified in the Management Audit. In response to this, each month Mr. Patoray sat down with the Administrator and Accountant and went through payments to present and retired staff, checking that there were no errors or unwarranted changes. Two errors had been found in the system during the current year. One related to quarterly pension payments; these were adjusted according to the inflation rate, and the system had used the wrong quarter for this calculation. The other error was similar but related to an employee's salary. They were looking for a better system for pay since the present one was not performing well enough. Another error found by the Auditor

      was the practice of granting certain salary increases sooner than scheduled; this was being discontinued. Unless in circumstances of altered position or responsibility, salary reviews would take place every two years.

      Additional insurance for matters not covered by the French social security system would continue to be paid to staff. Papers had also been signed for a "Health at Work" policy, which was an international as well as a French requirement. This was similar to systems in other countries: an organization would come in and assess the workplace for health, safety, lighting, tools and ergonomic characteristics; for instance, was there a danger of employees getting hurt at work, and might there be better tools they could use? These organizations also had physicians on their staff, to whom people might talk about their job. No heavy lifting was required, but sitting in front of a computer screen and manipulating a mouse could over many years do some damage.

      As previously mentioned, all staff now traveled economy class. All expenses were reported promptly and examined carefully. A report was produced at the end of every trip, relating the benefit of the trip to the OIML (as opposed to the other parties involved). Mr. Patoray himself had in the current year traveled more than he anticipated doing in the future, as he had visited a number of regions and meetings, in order to meet people and observe events in order to learn how best to serve the Membership. He hoped that travel expenses would nevertheless come out on or near budget.

      The policy of granting loans to staff had been terminated. Existing loans were being paid off by regular deductions from staff salaries; most would be paid off by the end of 2012, the longest by the end of 2013. It might, however, be desirable to offer a guarantee to employees who were renting an apartment or buying a house, affirming that they were gainfully employed and regularly remunerated by the OIML and had a 5-year contract; but no money would be handed over. This policy would be incorporated in the Staff Regulations.

      Only one active staff member remained in the OIML pension system. The President and Director would review this policy to determine what its future would be. They would seek a policy that did not negatively impact either the staff member who remained in the system or the six others already receiving or shortly about to receive pensions.

      Continuing down the list of concerns raised in the Management Audit, IPSAS had been fully implemented.

      The Translation Center would be presented in another agenda item.

      It was necessary in today's environment for staff members to have credit cards issued by the BIML's bank. These expenses were regularly reviewed and not taken lightly, and spending limits were imposed. Staff needed to have an alternative, either a personal card or a business card. Traveling abroad with large sums in cash was unacceptable. Rules for use of the cards would be incorporated in the Staff Regulations. Mr. Patoray invited questions.

      Mr. Botsile Kebapetse thanked Mr. Patoray and said the future looked very hopeful. From personal experience he advised that only confirmation of employment should be given to employees and not any form of guarantee which could render the OIML liable for failure to pay on the part of employees. He also asked why loans had been made to staff.

      Mr. Patoray replied that he fully agreed that the BIML should offer staff only confirmation of their status, not guarantees. He explained that loans were no longer being offered to staff and old loans were being collected by deduction from salary and included interest at the current government rate of interest on deposits. He himself did not like the system of loans to staff,

      but things were different in different parts of the world. His prime objective was to look after Members' money.

      Mr. Henson commented that the terminology used by the BIPM in its equivalent document was "attestation", which meant a statement of fact deemed to be accurate and true at the time.

      Mr. Patoray said that that was what he had received when he had rented his apartment. Employees coming from a foreign country had difficulty in acquiring accommodation without some documentation of this type.

      Mr. Mason said the relevant Resolution would recognize the management improvement that had been made, but recognize also that more remained to be done, and would note that the same auditor would carry out a new audit in early 2012.

      Mr. Patoray added that he had himself worked as an auditor and that he enjoyed both making and receiving audits and the ensuing discussion. This was a way he could learn and improve. Later they might have a peer review from other international organizations similar to the OIML.

