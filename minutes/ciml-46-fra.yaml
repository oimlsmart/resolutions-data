      Mr. Mason asked whether the existence of an ISO organization devoted to developing countries had anything which might assist the OIML in their dealings with these.

      Mr. Dunmill replied that the OIML had been unable to participate in the DEVCO meeting in the current year due to other pressures on time, and did not have much contact during the year because DEVCO was more concerned with assistance to its developing country members on the development of standards. It operated a number of schemes such as twinning of secretariats, where developing countries worked with an industrialized country in operating

      the Secretariat of an ISO Technical Committee. They had an e-learning process for the use, development and implementation of standards and so on, so there were a number of things that the OIML might be able to learn from them. On the twinning side, they had a large number of technical committees which worked at a different rate from the OIML TCs, so he was not sure whether it was directly applicable and something that could be made use of in the OIML, but the possibility could be examined. Otherwise, discussion with them was more on a networking basis with them and other standard-setting organizations.

      Mr. Mason felt that it was important to learn from other organizations with similar issues about how the standards in the developed world could be applied to developing countries.

- number: 7.1.4
  title:
  - spelling: eng
    value: ISO/CASCO
  narrative:
  - spelling: eng
    value: |2+

      Mr. Kool said that the OIML actively participated in some of the working groups of this organization, on issues relating to the MAA and possibly future systems which the OIML might want to develop.

- number: 7.1.5
  title:
  - spelling: eng
    value: ISO/COPOLCO
  narrative:
  - spelling: eng
    value: |2+

      Mr. Kool explained that this was a new liaison with ISO's Consumer Policy Committee. The liaison was not yet fully formal; contact had initially been made with the Chair and Secretariat earlier in the year and the BIML had made a presentation to their Plenary Session in London in May about the work of the OIML and their interest in the work of COPOLCO. The issue was that the OIML had a number of Recommendations for instruments which were used, not by consumers, but in the presence of consumers or for the benefit of consumers, but there was virtually no input from consumer organizations in the technical work of the OIML. It was considered that a liaison with this ISO policy committee could help the OIML through exchange of information and by asking COPOLCO for comments on certain OIML technical publications. At the Plenary Meeting, COPOLCO Members had expressed considerable support for formal liaison with the OIML, and for establishing a joint work program. COPOLCO would take a formal decision on this liaison later in the current month.

      Mr. Sanders commented that he understood that COPOLCO also had an interest in market surveillance, which could be an additional reason for the OIML to cooperate with them, since they were about to consider the important subject of Conformity to Type, which had some connection to market surveillance.

      Mr. Schwartz agreed that the OIML should establish some possible cooperation or liaison with COPOLCO, but that it was necessary to bear in mind the OIML's limited resources and to set priorities. They should proceed with caution. The proposed Resolution should perhaps be toned down to omit over-enthusiastic references to encouraging liaison activities, until a later date when it was known what was involved.

      Mr. Mason replied that he had interpreted this liaison more as a resource that would help the OIML's work than as a further burden on them. COPOLCO potentially was a network which produced the consumer viewpoint, which could be injected into the OIML's work.

      Mr. Kool agreed that this possibility of knowledge of the consumer angle would help the TCs in their work.

      Mr. Schwartz felt that they should work out what the benefits were to the OIML and to COPOLCO. The OIML had limited manpower and a mere exchange of information would not be enough.

      Mr. Mason said that what the OIML was looking for by this liaison was a stronger consumer input into its work in relevant areas. COPOLCO already organized consumer input into ISO technical work. Mr. Mason did not see this as requiring additional OIML manpower, but as giving the OIML access to a consumer viewpoint which would be valuable to its work but did not require a great deal more to be done.

      Mr. Kool referred to the proposed draft Resolution.

