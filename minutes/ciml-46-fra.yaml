- number: '3'
  title: 1 General report
  narrative: |2+

    Beginning in French, Mr. Patoray told the Meeting that his first year as Director of the BIML had been very interesting both for himself and for the BIML staff. He hoped that, with the help and support of Members, the four following years would be as enriching. He confessed that his French was still a little rough, but he had been taking regular lessons and had been able to survive in Paris up to this point! He was continuing his studies and had made the commitment to his staff that he would speak French with them daily in the office so as to do much better than in the opening words of his speech.

    During this time, many things had been going on. It had been a year of transition, marked by his own appointment as Director, taking office on 1 January, and also the change in President. He hoped that Members would understand that in this time of change there had been many priorities to deal with, some of which would not have arisen in a normal year. He hoped to demonstrate that a great deal of work had been done. This included his transition from his previous employment as Federal Agent in the state of Colorado, USA. His wife and he had now settled in and were enjoying Paris very much.

    At the Bureau, there had been a number of interesting meetings, including for the CTT Seminar, strategy planning and the incoming President's arrival. This had enabled him to work with two Presidents, one with the experience of six years in the post and the other with a newcomer's enthusiasm.

    There were now weekly staff meetings attended by all staff present in the Bureau, where there was discussion of a rolling agenda consisting of the previous week's activities, plans for the current week and any future events. Staff also had time to discuss their ongoing projects so that they had more understanding of what colleagues were doing and how their work

    interacted. In this way they could ask for help when needed, and have guidance provided. There was a major focus on team building and team work.

    Members might have read Mr. Patoray's recent editorial on the Directives, in which he had recounted his past experience in manufacturing and quality management, and also improving processes, including team management and teamwork. This formed a large part of what he did. Staff work schedules had been established. There was a flexi-time schedule, with people arriving and leaving at different times so it was necessary to understand when they would be in the office and available; all this was documented for consultation. A holiday schedule and policy had also been established - it had previously been unclear how this was executed. There was also a travel policy. All staff now flew economy class, with economy plus on flights of more than seven hours. An open access time-tracking system had been implemented which can be consulted by all, and also allowed end of year summaries.

    A second draft of the BIML Staff Regulations had been drawn up in a small meeting that morning. Progress was being made and there would be at least a good draft by the Presidential Council meeting in March 2012. The Staff Regulations would be legally reviewed to ensure that they conformed to all employment legislation. The current Regulations required not so much alteration, but rather considerable clarification.

    Work on the Financial Regulations had not yet begun officially. Mr. Patoray had reviewed these and did not anticipate significant changes, but they had to incorporate all the recent alterations that had been made in compliance with IPSAS, and must be in accordance with today's accounting methods. Results of this would be available for the March 2012 Presidential Council meeting and, he hoped, for the following year's CIML.

    Mr. Patoray explained that the management audit would be presented as a separate item. He continued by reminding Members that at the time of his appointment in Orlando the previous year he had made several promises; he hoped Members would agree that these promises had been kept. Work still remained to be done on several of them but, with help from many, he was still learning as quickly as he could. Though occasionally hindered, in accordance with his engineering background he was trying to keep an open mind. He had admitted quickly to his mistakes and tried to adjust to the varied and changing environments he found himself in, and he was trying to be consistent towards both staff and Members. His promise to leave the OIML and the BIML in a better state than he found them had not yet been fulfilled; his promise to enjoy every single day had not quite been kept, as he had had a few less enjoyable days; however, looking around his job and the city of Paris made him feel better. He was not finding French easy but understood more than before and would continue to study, especially the art of making the sounds required. He thanked Members and invited questions and comments.

    There being none, Mr. Mason suggested using the prepared Resolution (see Working Document).

- number: '4'
  title: 1 Director's comments on the 2010 accounts
  narrative: |2+

    Mr. Patoray informed the Meeting that the overall finances of the OIML were sound. Some slides would support that finding, as would the Auditor's approval of the 2010 accounts. He reminded Members that his appointment had begun on 1 January 2011, but he would do his best to inform them fully of the events of 2010.

    Resolution 27 of the 45th CIML Meeting had been implemented and the information required by IPSAS had been put into the accounts; this included pension requirements and also appraisal of the building. This might make the 2010 accounts look different from those of previous years. He hoped the detail would explain the content. There was further explanation in Addendum 4.1 of the Working Document.

    The first slide showed the logo and the signature of Mr. Fischer, who had audited these accounts and expressed his approval. Mr. Fischer was aware of the IPSAS requirements and would ensure that they were included in future. Regarding a question on aspects of the Working Document, when the actuary had done the analysis of the pension arrangements he

    had done it with the IAS Standard 19 and not the IPSAS Standard 27. Future analysis would be based on IPSAS Standard 27, but this involved only minor differences and would not affect the outcome.

    Mr. Patoray then showed the balance sheet. The cash level had increased between the end of 2009 and the end of 2010, which was good. The land, the building and the fittings had been included at full value as assets, as required by IPSAS, and amounted to slightly over €2 million; this was considered to be rather a low valuation, given current prices in the Paris area, which had risen between 15 % and 20 % in the past year. There would be a reappraisal before the budget for the Conference in 2012. When pension provision of $ \epsilon $1.7 million was taken into account, as full liability for this was now included, the results for the year were relatively negative, but the value of assets was increasing.

    On the income statement it could be seen that income had increased by about 90 000. Staff expenses, though higher than for 2009, were below budget. Operating expenses had decreased. If pension provision had not been taken into account there would have been a positive outcome. This situation would work itself out over the following two years, and figures for 2011 were already looking healthier. Mr. Patoray hoped that Members would trust the accountants and auditors and not be alarmed by the large negative number, which was a theoretical accounting calculation for the liabilities in the contingency of the OIML ceasing to exist. As discussed at the previous year's Meeting, the building more than covered the liability, and there was therefore no liability to Members.

    The budget voted for 2010 for staff costs had been €1302000; the actual number had been €1250000. The difference was a positive €43000.

    The premises section included gas, electricity, post, various contracts on copiers, printers and other machines. This was slightly over budget.

    There had been over-expenditure on meetings, despite the fact that there had not been any extraordinary meetings in that year. Travel and accommodation had been lower than in previous years, though it was still significantly over budget. Miscellaneous spending was also up and Mr. Patoray was seeking details of this. A graphic, requested in the audit, showed that staff costs were relatively high, as was depreciation and pension provision. As a service organization, the OIML provided a service; it did not possess heavy machinery or the like. 73% of its costs were staff, which was typical in service organizations. The remaining costs, mainly under miscellaneous, were for running the Organization. For example, there had been an advertisement for Mr. Patoray's position, payment to a lawyer working on the case brought by a previous employee, payment to the Auditor, and moving expenses for Mr. Patoray, which was a one-off cost. Another one-off cost in 2010 was for a car bought by the previous Director, which had been put through the books but had now been removed. Members looked surprised, but it was not unusual for an organization such as this one to own an automobile. Some items, such as the Auditor, would be repeated in the future but others would not. Mr. Patoray intended by the 2012 accounts to break these costs down rather than combining them under "€90000 for miscellaneous".

    Cash reserves in the OIML's bank accounts had increased between 2009 and 2010 by approximately 300 000. The other accounts were the working accounts, moneys moved around by the Administrator to cover the costs of the CIML and other events in the course of the year. There was still not, in the cash reserves, the 50% balance in the accounts of the expenses which it would be normal for an organization of this type to have. The expenses of the Organization amounted to about 1.8 million and the reserves were 645000. They were, however, moving in a positive direction. Mr. Patoray invited questions but reminded Members that the 2010 accounts had already been complete when he had arrived at the

    Bureau. Some interim information on the 2011 accounts would be included in the item on the management audit.

