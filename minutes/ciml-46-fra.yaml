      Mr. Patoray pointed out that additional information, including documentation from 1975 when the Translation Center had first been put into place, was to be found in the Working Document. In the early days translation was only from French to English. At that time, all the TCs had worked in French. As other countries had become involved in the TCs it had become necessary to translate those documents from French to English. A small group of people wanted this to happen and funded a Translation Center. Funds were kept separate and could be used only for the purpose of translating French into English.

      Around 2005, the fund had begun to grow, as the same amount of money was received but none was spent; something needed to be done as these increasing moneys now represented a problem. Mr. Patoray emphasized that dealing with this issue was not intended to address Resolution no.1 from the 2009 CIML Meeting on the use of French and English in the Organization ("The Committee instructed the CIML President and the BIML Director to prepare a detailed note on the use of French and English, to be submitted for approval at the 14th Conference in 2012") which was another matter for further discussion at the 2012 Conference.

      Mr. Patoray explained a draft Resolution which the Bureau had drawn up to deal with this problem, pointing out that there was now more need for translation from English into French than the reverse. He was proposing that the funds in this special account, known as the Translation Center, might be used for:

      - the translation of documents French to English, English to French and occasionally other languages. This did not mean the fund would be used for translating into languages other than English and French, but occasionally documents were received in the language of other Member States, and these needed to be translated into English, French or both;

      - the second use requested for the fund was for interpretation between English and French, required at many major and minor meetings. For example, interpretation at the current Meeting was costing approximately 10 000;

      - the third requested use of the fund was for transcribing. The CIML was recorded and the minutes needed to be transcribed afterwards and also translated into English and French;

      - another need was that important documents such as the Bulletin, minutes of past meetings, etc. had to be turned into searchable electronic format;

      - Item B of the Resolution was to decrease the base contribution from $ \epsilon $ 300 to $ \epsilon $ 200. This base rate was multiplied by 1, 2, 4 or 8, depending on classification as a Member State. A level based on circumstances could be determined for any Corresponding Member who might wish to contribute. The reduction was in order to reduce the amount of money in the fund, currently about $ \epsilon $ 100 000.

      - The Resolution also instructed the Bureau to continue to manage this fund and also to make the translated, transcribed and converted documents available to Members and to report annually to the CIML on the status of the account. Mr. Patoray had brought with him a record of all the countries which had contributed to this fund in the last ten years. All these countries had been consulted and none had objected in principle to the proposal. Being able to use this fund would free up other moneys for other purposes and might also speed the desired translation of R 111 (and others) into French.

      ## Mr. Patoray asked for questions.

      Mrs. Van Spronssen did not think money from this fund should be used to cover the running cost of normal meetings, because the money would soon be used up in this way and then Members would have to be asked for more contributions. She suggested however that part of the funds be used for a couple of years for interpretation at the Meetings in Spanish and possibly other languages of countries where neither English nor French was widely spoken. This might allow more people to contribute to Meetings.

      Mr. Johansen asked whether the intention was to allow translation both to and from other languages or simply from them. There was a discrepancy between the draft Resolution and Mr. Patoray's words.

      Mr. Miki was worried about some countries having difficulty in securing contributions to the fund from their governments and thought it might be better to carry out the proposed activities within the ordinary budget. Care also needed to be taken to limit the activities for which the fund could be used.

      Mr. Patoray alluded to the €100 000 at present in the special account. Part of the Resolution was to attempt to use some of this money. Mr. Miki's comment alluded to the request for

      continuing, though lower, contributions. Did Mr. Miki mean that the existing money should be used but no more should be requested?

      Mr. Miki agreed that this was the case.

      Mr. Patoray told Members that it cost from 3000 to 8000 to translate a single Recommendation. Even if not used for interpretation, as suggested, the money would only last for a few years. He pointed out that contributions would remain voluntary; Members were not obliged to contribute to it. He would like Members to spend time thinking about it, but he wanted to be given permission to spend the existing, still growing, fund in some useful way. He took the point about clarifying the language of the Resolution. The Bureau did not intend to launch into translating into other languages, but they had received some Bulletin articles and technical articles which needed translating from the native language and he would like to use this money to do that.

      Mr. Mason referred to the specific proposal to allow the money to be used for translation into languages other than French and English, namely Spanish. He asked for Members' comments on this.

      Mrs. Lagauterie agreed that the money should not be used for the normal French and English interpretation services at Meetings and Conferences, as this was a normal cost of running such functions. She was pleased with the proposal to allow translation from English to French and believed that priority should be given to translating Recommendations into French.

      Mr. Mason again asked for views on using the money for translation into other languages. Clearly if the proposal not to use it for interpretation services was adopted, the amount would last longer.

      Mrs. Van Spronssen explained that her proposal had in fact been to have interpretation into Spanish at the CIML and Conference for an experimental couple of years, to see whether it would be useful. She also thought it was a good idea to spend extra time on putting existing documents on the web site. In these ways they would be using the available money to do something extra.

      Mr. Mason said that the proposals under discussion were for one-off or time limited expenditure, which would meet the point that it should not be used for day to day expenditure.

      Mr. Johnston said that Canada had contributed to this fund for many years but he would have difficulty in continuing to recommend this unless he were able to explain what it was being used for.

      Mr. Mason said the feeling of the Meeting seemed to be that they should take action to reduce this sum, perhaps by identifying translation related projects, perhaps by a specific program of translation, perhaps by experimenting with a wider range of languages, perhaps by experimenting with a third simultaneous interpretation. If this was the feeling of the Meeting, the draft Resolution would need to be amended, but this could be done in time for it to be voted on. It seemed to him that Members would like the accumulated sum to be used for exceptional and one-off purposes.

      Mr. Patoray summarized that as he understood it, interpretation between English and French at the CIML and Conference should be taken out of the Resolution, to be replaced by the cost of experimental interpretation into Spanish, and/or possibly other languages being paid for with the fund.

      Mrs. Lagauterie said that in her view the first priority should be to increase the number of Recommendations available in French; secondary to that, she would be happy to see an

      experiment with interpretation into Spanish. The usual English-French interpretation should not be funded with this money.

      Mr. Mason said this would mean taking out the 2nd, 3rd and possibly 4th bullet points of the Resolution.

      Mrs. Van Spronssen considered, however, that the 4th proposal, regarding converting material into electronic format was a one-off activity for which the fund could sensibly be used.

      Mr. Mason agreed that the 4th point should remain, that the word "occasionally" should be removed from the first point and that the suggestion for experimentation with interpretation into Spanish and/or other languages be inserted.

      Mr. Patoray added that the priority to be given to translating existing publications into French, starting with Recommendations, should also be inserted.

      Mr. Mason said that the Resolution would be amended along these agreed lines.

