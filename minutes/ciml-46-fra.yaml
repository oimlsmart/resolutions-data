      Beginning in French, Mr. Patoray told the Meeting that his first year as Director of the BIML had been very interesting both for himself and for the BIML staff. He hoped that, with the help and support of Members, the four following years would be as enriching. He confessed that his French was still a little rough, but he had been taking regular lessons and had been able to survive in Paris up to this point! He was continuing his studies and had made the commitment to his staff that he would speak French with them daily in the office so as to do much better than in the opening words of his speech.

      During this time, many things had been going on. It had been a year of transition, marked by his own appointment as Director, taking office on 1 January, and also the change in President. He hoped that Members would understand that in this time of change there had been many priorities to deal with, some of which would not have arisen in a normal year. He hoped to demonstrate that a great deal of work had been done. This included his transition from his previous employment as Federal Agent in the state of Colorado, USA. His wife and he had now settled in and were enjoying Paris very much.

      At the Bureau, there had been a number of interesting meetings, including for the CTT Seminar, strategy planning and the incoming President's arrival. This had enabled him to work with two Presidents, one with the experience of six years in the post and the other with a newcomer's enthusiasm.

      There were now weekly staff meetings attended by all staff present in the Bureau, where there was discussion of a rolling agenda consisting of the previous week's activities, plans for the current week and any future events. Staff also had time to discuss their ongoing projects so that they had more understanding of what colleagues were doing and how their work

      interacted. In this way they could ask for help when needed, and have guidance provided. There was a major focus on team building and team work.

      Members might have read Mr. Patoray's recent editorial on the Directives, in which he had recounted his past experience in manufacturing and quality management, and also improving processes, including team management and teamwork. This formed a large part of what he did. Staff work schedules had been established. There was a flexi-time schedule, with people arriving and leaving at different times so it was necessary to understand when they would be in the office and available; all this was documented for consultation. A holiday schedule and policy had also been established - it had previously been unclear how this was executed. There was also a travel policy. All staff now flew economy class, with economy plus on flights of more than seven hours. An open access time-tracking system had been implemented which can be consulted by all, and also allowed end of year summaries.

      A second draft of the BIML Staff Regulations had been drawn up in a small meeting that morning. Progress was being made and there would be at least a good draft by the Presidential Council meeting in March 2012. The Staff Regulations would be legally reviewed to ensure that they conformed to all employment legislation. The current Regulations required not so much alteration, but rather considerable clarification.

      Work on the Financial Regulations had not yet begun officially. Mr. Patoray had reviewed these and did not anticipate significant changes, but they had to incorporate all the recent alterations that had been made in compliance with IPSAS, and must be in accordance with today's accounting methods. Results of this would be available for the March 2012 Presidential Council meeting and, he hoped, for the following year's CIML.

      Mr. Patoray explained that the management audit would be presented as a separate item. He continued by reminding Members that at the time of his appointment in Orlando the previous year he had made several promises; he hoped Members would agree that these promises had been kept. Work still remained to be done on several of them but, with help from many, he was still learning as quickly as he could. Though occasionally hindered, in accordance with his engineering background he was trying to keep an open mind. He had admitted quickly to his mistakes and tried to adjust to the varied and changing environments he found himself in, and he was trying to be consistent towards both staff and Members. His promise to leave the OIML and the BIML in a better state than he found them had not yet been fulfilled; his promise to enjoy every single day had not quite been kept, as he had had a few less enjoyable days; however, looking around his job and the city of Paris made him feel better. He was not finding French easy but understood more than before and would continue to study, especially the art of making the sounds required. He thanked Members and invited questions and comments.

      There being none, Mr. Mason suggested using the prepared Resolution (see Working Document).

- number: '3.2'
  title:
  - spelling: eng
    value: Director's report on BIML Staff matters
  narrative:
  - spelling: eng
    value: |2+

      Mr. Patoray mentioned that six members of the Bureau's staff were present in Prague, including himself. Of these, Members probably knew best the two assistant Directors, Ian Dunmill and Willem Kool. Mr. Kool had taken responsibility for the documents for the CIML, which Mr. Patoray had much appreciated; Mr. Dunmill had been occupied with the Directives, some of which he would present later in the Meeting. Luis Mussio was taking care of the sound recording and would give a presentation on the MAA, which he was also covering. Chris Pulham was taking photographs for the Bulletin and in the course of the week

      he would be asking Members for contributions to that publication. Patricia Saint-Germain had spent many hours working on the organization of the Meeting, with the aid of Klará Vidimová and other Czech Republic persons, whom he thanked. All the Bureau staff were willing to give help and answer questions. Jean-Christophe Esmiol, IT systems, Philippe Leclercq, Administrator, and Florence Martinie, the Accountant, were busy back in the Bureau.

      Mr. Patoray informed Members that among the Bureau's small and large projects, one had been a better, wall-mounted projector screen for the Conference Room. Led by Chris Pulham, staff had also cleared out over five tonnes of materials from the attic, and Jacques Bourgeois (who had recently retired) had archived the remaining items. They now had an organized attic, more space and a safer building. A problem still outstanding was to find a craftsman to fix the front door.

      Another problem had been the need for an APE code (Note: the APE code is a French business activity sector coding number) to identify what activity the Bureau was actually involved in. They had a SIRET number, but had until recently been mis-classified as a software manufacturing organization. Following a project led by Jean-Christophe Esmiol, the BIML was now officially classified as a not for profit international organization, which qualified it to receive substantial discounts on software.

      Work would also soon start to update the brochure for prospective new Members, including information on how to become an OIML Member.

      The building had been neglected for a number of years and was in need of extensive repairs. This would need to be allowed for in the new budget by a specific dedicated sum; the building would also be revalued to ensure that the return from the improvements was noted. Problems included a leaking roof, plumbing defects, moisture and external decay. The building belonged to the OIML and must be cared for in a way appropriate to its historical status.

      Teamwork would be referred to again later, but had included World Metrology Day, where the 2011 theme poster (Metrology in chemistry) had been translated into fifteen languages and downloaded over 3500 times, with over 8500 unique visits to the site. 27 known events had taken place. The WMD web site had previously been hosted on the BIPM web server, but this year it had been transferred to the BIML. The PTB had also played a part, as had many BIML (Luis Mussio, Jean-Christophe Esmiol and Chris Pulham) and BIPM (Andy Henson, Laurent Le Mee) staff members.

      Led by Jean-Christophe Esmiol, work was planned for the BIML IT system. The current system was over 10 years old, which was ancient in computer terms. Updating would take place step by step and it was hoped that some costs and also much inconvenience might be eliminated in the process. The end result should be better service for Members, with a better and more user friendly web site, with better communication facilities for technical committees.

      On the subject of the OIML Bulletin, Members would have noticed some changes in recent editions, with some cost saving, based on a cost analysis carried out by Willem Kool and Chris Pulham, partly before Mr. Patoray's arrival. The cover was heavier, as was the paper, it was put together with staples instead of glue and they now knew the optimum number of pages to produce. There was a new printing company and a new shipping company. Any Member having difficulty in receiving the Bulletin was invited to report this, but it was hoped that routing difficulties were now a thing of the past.

      On staff updates, Archivist Jacques Bourgeois had retired at the end of June 2011. He had begun working for the Bureau in 1978, so had given 33 years of service.

      Luis Mussio had joined the BIML in October 2010. He had had experience at the BIPM as the JCRB Executive Secretary and had previously been Chief of the Metrology Department of LATU (the Uruguayan NMI) and as SIM Technical Committee Chair, giving him experience in legal metrology, accreditation and mutual recognition.

      Staff contracts due for renewal included those of Chris Pulham (renewed in July), Jean- Christophe Esmiol, whose contract would be renewed upon the return to Paris, and there was a recommendation for the CIML to renew the contract of Willem Kool.

      Florence Martinie, the Accountant, had joined the BIML in 2009, but had recently taken on many more responsibilities previously undertaken by the former Director. She was also working closely with the Financial Auditor, of whom more would be heard later. She was now in control of a very good accounting system.

      Philippe Leclercq, the Administrator, would retire at the end of 2012 following over 47 years with the Bureau. He had given Mr. Patoray excellent help in the transition and would train his successor who would be appointed as soon as possible. Mr. Leclercq's knowledge was mainly in his head and would need to be documented.

      A database person was being sought. Mr. Patoray explained that there were several databases which needed to be put in good condition, since everything needed to be linked together so that BIML staff, Members and TCs could access them easily. The three databases which currently existed did not currently "talk" to each other.

      Mr. Patoray said a seconded staff member would shortly be sought for several specific projects. The BIPM used secondment successfully and had given advice. Projects for this person included developing a quality manual for the BIML, partly to address the management audit issues, so that there was a good manual of processes and procedures which could be consulted. Another task would be a review of the policy on Member fees, Members in arrears and a classification of Members.

      Items in the Convention and in past Resolutions needed to be assembled into one consistent policy. The seconded employee would research decisions taken in the past, so that future decisions could be made on a consistent basis and not based on immediate needs. Support for TCs and SCs would also be a task for this person. These were projects which would come to an end, allowing the person to return to where they had come from after accomplishing the projects.

      Mr. Patoray undertook to keep Members informed on all these matters, thanked them and invited questions.

      Mr. Richard asked whether the BIPM did not already possess the ability to adapt the BIML databases and whether the present IT collaboration between the two Organizations might not be extended to cover this task.

      Mr. Patoray replied that he believed that the BIPM had hired an outside agency to establish the bulk of their database; he hoped to have discussions with the BIPM during the Meeting and possibly use the same organization to set up the database. On the other hand, however, the database was absolutely fundamental to the business and he was also looking into taking on a permanent member of staff who could initially set up the database and later fit into the BIML and give backup and support in other areas. Philippe Leclercq's retirement would leave the office with only eight employees and they were authorized to have eleven. A special sort of person was required. He knew that such people existed but had not yet found one in Paris. If such a person could not be found, he would look to an agency.

      Mr. Klenovský asked whether an analysis had been made of how many people were needed to run the Bureau. It was important not to hire staff just to make up the numbers.

      Mr. Patoray replied that he had not yet done a thorough analysis of hours or numbers. However, staff requirements had been extensively discussed in the Bureau and it was not at present clear what tasks would be assigned to a new engineer. This was why a secondment or temporary post was being considered. If, hypothetically, new systems were being created and new projects coming in, more posts might be created. There was, however, a need for a person to create a database. Hiring someone was, in his opinion, the most important task he would ever undertake and he would certainly not do it lightly or take on anyone who was not needed.

      Mr. Van Mullem commented that a year seemed a long overlap for Philippe's successor to learn his job. He asked whether this time could in some way be combined with other jobs.

      Mr. Patoray replied that the year had to include the time to hire the person. The problem was that Mr. Leclercq's knowledge was in his head only. It was not written down and nobody else knew it, so a longer than usual overlap period was an essential precaution to take, so that his successor could go through as much of a full year's cycle as possible. Discussions were taking place on how at the same time to give the newcomer additional work which would justify the payment of two salaries. Members would be kept informed, and hopefully there would be more news by 1 December and in the January Bulletin.

      Mr. Richard referred to Addendum 3.1, in which there was an item on translation into French of publications. The translation of R 111:2004 had been postponed. He asked why this had been the case, and whether the Bureau had a strategy for translation.

      Mr. Patoray replied that the delay in translation was an embarrassment. The format of that particular Recommendation was complex, and its length and technical nature made it difficult to work on, but the task would be addressed as soon as possible.

      Mr. Dunmill added that it had been envisaged to do some work on this translation outside the Bureau on a sub-contract basis, but it was not possible to verify it inside the Bureau because there were no longer any French native speakers in the Bureau with the necessary technical knowledge.

      Mr. Richard commented that the need for a French speaking engineer should be taken into account in the imminent hiring of a new staff member.

      Mr. Patoray agreed.

      Mrs. Lagauterie informed the Meeting that the French Bureau de la Métrologie was able to offer full translation support to the BIML.

      Mr. Patoray said that Mrs. Lagauterie, Mr. Lagauterie, and the Bureau de la Métrologie had given tremendous support. Nevertheless, now that the Bureau and TCs worked in English, it was essential to have internal or external French translation and verification, especially as the Convention laid down that French was their official language. In previous times the technical work had been conducted in French and translation into English had been necessary.

- number: '3.3'
  title:
  - spelling: eng
    value: CIML vote on the renewal of the contract of Willem Kool, BIML Assistant
      Director
  narrative:
  - spelling: eng
    value: |2+

      Mr. Mason asked Mr. Kool to leave the room for this item. He explained that according to the Convention the position of Assistant Director as well as Director was a question for the Committee. In this case, it was a re-appointment of someone known to Members and

      recommended by the Director. He asked the Director to give a short statement about the reasons for his recommendation, after which the Committee would be asked whether they wanted to ballot.

      Mr. Patoray asked for Members' support for the reelection of Mr. Kool. He stated that Mr. Kool had demonstrated his dedication to the OIML and shown great insight into this Organization as well as others. As many of his listeners knew, Mr. Kool could be very direct; Mr. Patoray said that he himself shared this trait, which had led to some interesting conversations.

      Mr. Patoray added that Mr. Kool had spent much time preparing the current Meeting and had indeed done the major part of the slides and other work. Mr. Patoray considered him to be a very significant asset for his own work and ability to continue. This had not been his opinion upon his arrival. Before beginning in his role he had discussed Mr. Kool with several people and heard a mixture of comments, and he had had to develop his own opinions of him rather quickly, but he had been able to appreciate Mr. Kool's very directness, and believed him to be an asset to the Organization. He therefore asked for Members' support in the renewal so that the good work could continue.

      Mr. Mason added that both he and Mr. Johnston had made it clear to Mr. Patoray soon after his arrival that they wanted his advice on this decision, and that if the advice had gone the other way they would have been using the last few months to identify an alternative. The decision had been thoroughly considered. He asked for questions.

      Mr. Van Mullem said that because it concerned a person, the Netherlands would be in favor of a secret ballot.

      Mr. Mason confirmed that any one Member was entitled to ask for a ballot.

      Mr. Schwartz supported the Netherlands and requested a ballot.

      Mr. Mason agreed that this should take place. It was decided to take another roll call but at the same time to distribute the ballot papers.

      The roll call and ballot duly took place and the Resolution to re-appoint Mr. Kool was approved.

