      Mr. Mason asked for comments.

      Mr. Kool pointed out that a small number of corrections were to be found in the Working Document. As there were no further comments, Mr. Kool told delegates that a draft Resolution (see Working Document) had been prepared, for final approval on the Friday, when discussion of the exact text would take place before voting.

- number: '2'
  title:
  - spelling: eng
    value: Report by the CIML President
  narrative:
  - spelling: eng
    value: |2+

      Mr. Mason pointed out that much of the content of the report had been prepared by Mr. Johnston, but stated that they had collaborated on its production and that he would deliver it. His full written report was to be found in the Working Document and he did not intend to add much to this. Members would, however, have an opportunity to ask questions about the matters in the report.

      Summarizing, Mr. Mason pointed out that there had been a number of staff changes and reorganizations within the Bureau, on which the Director would speak further. Important liaison activities had continued, with the signing of the renewed MoU with ILAC/IAF. A new MoU with the IEC would, he hoped, be signed during the current Meeting. There had been encouraging developments in the working relationship with the BIPM, details of which would be given later in the Meeting. One of the main activities in which Mr. Mason had been involved was the drafting of a new strategy for the Organization, which also would be

      considered later in the week. A significant topic at the March Presidential Council meeting had been the way in which work concerning developing countries should be approached, and a number of items had arisen from that, including the shape of the new strategy, which would be discussed, and the good progress being made on the revision of D1, on which delegates would also be informed later.

      Other major topics featuring in the agenda were the new B3 and B10, and the results of the further consideration on Conformity to Type which had taken place in the previous day's seminar. Also of note were the implications for legal metrology of the proposal to redefine a number of SI units. Since the March Presidential Council meeting, much work had gone into the revision of OIML working procedures and the proposals now embodied in B6, which would also be discussed later in the Meeting.

      Mr. Johnston had already begun to improve the transparency with which the OIML worked, and work would continue on this. In connection with this the Terms of Reference for the Presidential Council had been revised and would be published shortly in the form of OIML B16. This also had implications for the proposals for new work directives in B 6.

      Mr. Mason believed the Organization was in a good position financially; the Director would speak further on this. Finally, he reported that work had already begun on the next stage of modernizing the Organization, with important developments in the new Staff Regulations and Financial Regulations, which would be put before the 2012 Committee and Conference. Mr. Mason asked for questions, but there were none, so the report would go straight for approval by the draft Resolution (see Working Document).

