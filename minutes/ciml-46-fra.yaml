- number: '7.2'
  title: 1 Presentation by the BIPM (See Annex 1)
  narrative: |2+

    Mr. Henson (BIPM) thanked the OIML for the invitation to speak in Prague. He was standing in for his Director, Michael Kühne, who was attending the CIPM Meeting that week in Sèvres.

    Mr. Henson said that he would not describe what the BIPM was, as those present would know that already. Anyone who wanted to know about the role of the BIPM could ask him outside the presentation. His focus would be on topical issues.

    A key moment for the BIPM had been the change of BIPM Director at the beginning of 2011. Andrew Wallard had retired after some eight years at the BIPM and six years as Director and Michael Kühne had become Director. Mr. Kühne was previously the Deputy Director and Director Designate at the BIPM, prior to which he had been on the presidential staff and a career metrologist at the PTB, and also Chair of EUROMET. Luis Mussio, the JCRB Secretary, had also left the BIPM (where he had been on secondment from LATU, Uruguay) and had been spirited across Paris to his present position at the BIML. The post of JCRB Secretary has once again been filled by a secondee, Omer Altan from UME in Turkey.

    Secondment was used a lot in the BIPM, particularly in the scientific positions. Dr. Takashi Usuda (NMIJ) was at present doing some work on impact analysis which would be completed later in the current year.

    Many of those present might know Richard Davis, who had led the BIPM's Mass Section for some years; he had taken retirement from the BIPM and Alain Picard had become Director of the Mass Department. Mr. Davis continued to work part time for the BIPM as a consultant.

    The Metre Convention requires that the President of the CIPM and the Director of the BIPM be of different nationality. Professor Gobel had therefore stepped down as President of the CIPM in October 2011, though he remained in the CIPM, and Barry Inglis from Australia had taken over the Presidency. Some routine changes could be seen on the CIPM.

    Membership was going well, with 55 Member States and 34 Associates. In 2010 there had been five new Associates and also one Associate, Kenya, had become a Member State. In 2011 there had been another two Associates and another new Member State, Saudi Arabia. The situation was quite dynamic with much interest being generated, and Mr. Henson spent much of his time helping countries to understand the benefits and the process and facilitating the engagement. He and Mr. Dunmill exchanged information on how things were going and sometimes looked after each other's interests also, and indeed Mr. Henson always ensured that States understood the importance of engaging with the OIML.

    All the BIPM's active Member States, with the single exception of Venezuela, had signed the CIPM MRA. There are also four countries which were inactive (and did not even pay their contributions) which were not participating in the CIPM MRA. The status of Associate of the CGPM had been created to enable States who were not yet ready to join the Metre Convention to participation in the CIPM MRA. Thus as would be expected all of the Associates except Montenegro were participants, and Montenegro was expected to sign the CIPM MRA the following week during the General Conference in Sèvres. This again was a dynamic situation with good progress being made.

    CIPM MRA participation was going well, though much more slowly on the African continent and even there things were beginning to move forward. The previous year there had been virtually no participation in Africa but this situation was now improving with now three Member States and seven Associates (including the Seychelles and Mauritius who are both Members of AFRIMETS).

    The topical project for the BIPM at the moment was the possibility of a new regional body for the one remaining area which did not have one, which was the Gulf/Middle East region. This was a challenge, as the lack of capacity in the area meant that there were few people with the necessary technical expertise. Sufficient critical mass of expertise is needed to operate a viable RMO within the meaning of the CIPM MRA, for example to participate in and lead technical committees, to review CMCs, etc., but progress was being made. The situation was sensitive with different grouping wishing to lead such a body, with the BIPM being careful to ensure they were fairly treated with respect and diplomacy. But without doubt the principal problem was the shortage of expertise. Mr. Henson expected that there would be further discussion on this at the JCRB meeting in March. Like the OIML, they were constantly talking to a number of countries, at various levels of engagement. These discussions indicated that a number of Gulf/Middle East countries were organizing themselves following Saudi Arabia's accession and were considering either becoming a Member or an Associate in the coming year or two. There were also promising discussions with a number of countries in other regions.

    While Mr. Henson always said that in his view every country should join in the activities of the OIML, it was not necessarily the case that developing countries with only the most basic weights and measures capability would get general benefit from participating in BIPM activities. Mr. Henson and Mr. Dunmill were both on the steering committee of the AFRIMETS road map, where it was expected that a small number of countries would participate in BIPM activities in the next years, but it was not realistic to suppose that every country in Africa would make sufficient progress to effectively participate in the Metre Convention in the foreseeable future.

    Operating the CIPM's MRA involved not just signing but a considerable amount of technical activity, information from which was entered in the key comparison database operated by the BIPM. Part of that activity required the NMIs to have a review of their quality management system. Interestingly, the BIPM was not a signatory of the CIPM MRA, which was an MRA between national metrology institutes. However the BIPM followed a quasi equivalent system, in which each of their science sections was subjected to external peer review by experts from the leading NMIs round the world (so somebody would come in and review their electricity section, their radiation section, and so on). Periodically, however they also asked for a global system review, which looked at the management system per se rather than the science sections. Mrs. Ajchara Charoensook (NIMT, Thailand) had just completed a global audit of the BIPM. Mrs. Charoensook, who had headed the quality technical committee in APMP for a number of years, is a fully qualified auditor as well as head of a science section at

    NMIT. Mr. Henson was delighted to say that while she had made a couple of observations she had found no non-conformities.

    The BIPM was finding it a challenge to gain agreement for even simple updates to the CIPM MRA such as the outdated references (e.g. to ISO Guide 25). This update was out with the signatories but remembering there could be no "no" votes among more than 80 signatories there was always a risk that one or two countries would not support the change for one reason or another.

    The BIPM's main event during this reporting period was the General Conference on Weights and Measures (CGPM), typically held once every four years, which would take place the following week. As well as looking at the BIPM program of work and their budget, there were a number of draft resolutions, to be discussed and voted. There was a heavy agenda. Three of the key draft Resolutions were:

    - Possible redefinition of the SI. Most people probably knew about this already. It was important to note that this was not the actual redefinition, but a note as to how it might be redefined at a future time. It could not be changed at the moment because there was not adequate convergence of the scientific results. If all went well, the actual redefinition might perhaps be voted in at the next General Conference and come into force the year after. However, all this depended on how the science panned out. Mr. Henson understood that there would be an article on this subject by Richard Davis in the October 2011 OIML Bulletin, showing the implications for the OIML community.

    - The CIPM was planning to change the way in which it dealt with their Associates to better reflect the benefits and real division of cost between Members and Associates. This would have two effects: it would raise the lower threshold for Associates, and it would state that after a period of time and when an Associate was fully engaged in the CIPM MRA, it should start paying its true cost and rather than the subsidized rate. The increase would be in steps over a five-year period. This was also a mechanism to encourage Associates who had the capability and were fully engaged to become Full Members. The original assumption had been that Associate status would be transitional only, and that States would voluntarily make the transition to Member States when their capability warranted the change, but this had frequently not come about.

    - A key discussion point and draft Resolution reflecting the general view of the CIPM, the BIPM and the Member States was that it is time to look at a longer term strategy for the BIPM and also time to review the governance processes for the BIPM..

    Mr. Henson explained that the BIPM was engaged to a greater or lesser extent with almost 40 organizations, which he would not list due to time constraints. The OIML was perhaps the most important of these liaisons, which was revealed by the fact that he was present at the CIML in the week of the CIPM meetings, and the week prior to the General Conference. He confirmed that the staff of the two Organizations worked extremely well together, on a more or less daily basis. Those things that the BIML had been called on to do at the previous year's CIML were most certainly being done. World Metrology Day had been an example of a very integrated effort, with able support also from the PTB, and with excellent results. The theme for 2012 would be Metrology for Safety, allowing countries to feature the sub-themes which interested them most.

    Mr. Henson said that he hoped that his whistle stop tour had given OIML Members a flavor of the BIPM's year and had reassured them that the BIML and the BIPM were working together effectively and efficiently. He would be happy to answer any questions they might have.

    Mr. Mason thanked Mr. Henson for his full and clear presentation and referred to the item on cooperation between the two Organizations which would take place later that day.

    Mr. Richard made two remarks: the first was that there would be further discussion on the subject of redefinition of the SI; the second was that the position of Director of the BIPM was currently open. He was pointing this out because he felt there might be potential candidates in the room. Mr. Henson confirmed that this was the case, that the information was on the BIPM web site, and that the closing date for applications was December 1.

    Mr. Henson agreed that there would be a wide variety of views at the CGPM not only on the redefinition of the SI but also on the other topics he had mentioned. He reminded the audience that he had been discussing draft Resolutions which might or might not be amended, and would be subject to voting which would determine their adoption. He confirmed that the post of next Director had been advertised; this was a very long process as Mr. Kühne was due to retire in March 2014 and already his successor was being sought. The post was advertised on the BIPM web site with a closing date of 1 December, for appointment in early 2013. All those interested were invited to apply. Normally the successor was appointed a year or so before the retirement of the outgoing Director and served the intervening time as Director Designate and Deputy Director to allow the candidate to learn the process before taking office.

    Mr. Patoray confirmed that the advertisement for the post had been received at the BIML.

    Mr. Birch referred to recommendations adopted by the CGPM in 1999 and 2007 on climate change, and the BIPM had had a major meeting with the World Meteorological Organization about a year previously. He asked whether Mr. Henson could make any comment on the position of metrology and climate change.

    Mr. Henson replied that the BIPM had indeed held a very large joint workshop with the WMO in the spring of 2010. This had led to a series of recommendations to improve the quality of measurements in climate change. In July 2011, with the direct support of the BIPM Director and the Secretary General of the WMO, a Joint Liaison Group had been established, with responsibility to go through those recommendations and try to facilitate activity to address the specifications therein. This Joint Liaison Group had met once and it had become clear that many of the recommendations were rather generic. The WMO had gone away to try to specify more precisely what needed to be done. They were expected to complete this task shortly, and a meeting had been provisionally scheduled for February 2012 to follow up that action. Mr. Henson had Secretariat responsibility for the BIPM end of the Liaison Group, overseeing those recommendations to try and make sure that action was taken. In some areas this was being accomplished very well, and the links were good; in other areas the community was not so well engaged and it would be necessary to help the process along.

    Mr. Birch said that he had heard that some temperature measuring equipment and procedures were not up to par. He wondered to what extent Mr. Henson could see the OIML having any involvement in that area, due to its own Recommendations on such equipment.

    Mr. Henson replied that he would need time to reflect on this question as he had not thought of the problem in terms of the OIML.

    Mr. Algossair thanked Mr. Henson for his talk. He believed that cooperation between the BIPM and the BIML should continue to be extended; he was also grateful that the meetings of the CIML and CIPM followed immediately one after the other, and hoped that a similar arrangement might prove possible in future years, so that delegates who had traveled to one could also attend the other. He also asked for details of the relations between the IEC and the BIPM.

    Mr. Henson replied that the IEC and a few other liaisons had only been omitted from his list for the sake of brevity.

    Mr. Algossair considered that the IEC was very important and should always be mentioned in conjunction with ISO.

    Mr. Henson agreed, adding that the BIPM's Electricity Section also engaged with the IEC at the technical level.

    Mr. Algossair commented that Saudi Arabia had become a Full Member of the BIPM and had also arranged to liaise with seven of their neighboring Gulf countries to form GULFMET, and also ARABMET would be coordinated within the next few years.

    Mr. Harvey said he had been interested to see that early in his presentation Mr. Henson had made reference to an economic impact study in metrology being carried out by Dr. Takashi Usuda; he presumed that this would take into account a similar study carried out by NIST. Mr. Henson replied that Dr. Usuda had been in touch with NIST and others with similar interests, and intended to publish a paper about the end of 2011.

    Mr. Mason thanked Mr. Henson for his presentation and was very pleased at the good communication between the two Organizations.

