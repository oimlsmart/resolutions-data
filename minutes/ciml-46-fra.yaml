    value: |2+

      Mr. Mussio told Members that the number of Basic Certificates was decreasing, but that this was compensated for by the increase in the number of MAA Certificates. This meant that the MAA was a success, in the sense that people were using it.

      Mr. Mussio then stated that among all the certificates, R 76 and R 60 were still the "stars of the show". This was why the MAA was based on the DoMCs for R 76 and R 60.

      The first full review process of MAA Participants had now been reached, for which purpose a meeting had been held two weeks previously. This had been an excellent meeting, and he thanked the host, the PTB. The meeting had included a visit to the Sartorius factory, as an example of one of the potential MTLs that might participate. The agenda had covered, basically, the review process of the three DoMCs; unfortunately there had not been a quorum, so it had not been possible to reach a final decision. But there had been no major issues on the part of any of the participants, so he expected them all to take part in voting. Because there had not been a quorum, all they had been able to do was put forward proposals, and one of these proposals had been that, for the next full review period, all the Issuing Participants should make a presentation of the status in the meeting. They should attend the meeting so that the other participants could ask questions and elicit more explanations of the material submitted.

      The second part was what had happened in TC 3/SC 5. There the major issue had been discussion on whether the BIML should go on acting as an Accreditation Body, meaning a body which organized the peer reviews, paid the experts and did all the work, or whether it should have a supervisory function only, with the reviews being organized by the labs themselves. This was not an easy task, because there had been many different suggestions, so it would be some time before a consistent proposal could be offered to the CIML as to how to make the step from organizer to supervisor.

      The third point concerned the scope of the DoMCs. The question was whether participants had to wait two years or three years for a review period. If only small changes were to be made, they might be able to be done quickly and so create a fast track process.

      There were some problems with the review process. The main one was that not all participants had submitted their material in the same format, which made it difficult for participants to review decisions taken by others. Mr. Mussio considered it was very important to have a standard report format so that all participants would deliver their comments in the same way.

      Everybody at the meeting had agreed that experts should have special training on the issues of legal metrology, so a workshop would have to be organized for the following year.

      The final issue, Mr. Mussio said, was some potential non-conformities in some Certificates. This had been very openly discussed during the meeting; this had been very fruitful, and had helped to create trust between the participants.

- number: 10.3.2
  title:
  - spelling: eng
    value: Approval of the revision of OIML B 3 and OIML B 10
  narrative:
  - spelling: eng
    value: |2+

      Mr. Kool said that there was to have been a presentation by Mr. Ehrlich, but he had been unable to attend. The presentation would be made on his behalf by Luis Mussio, since the BIML had the co-secretariat of TC 3/SC 5.

      Mr. Mussio told Members that OIML B 3:2003 OIML Basic Certificate System for OIML Type Evaluation of Measuring Instruments and OIML B 10:2004 Framework for a Mutual Acceptance Arrangement on OIML Type Evaluations for the MAA had been updated to bring them into conformity with actual practice in the Basic Certificate System and MAA. B 10 had been prepared when the MAA had started, and lessons had been learned in administering the process.

      B3 had passed the preliminary online CIML ballot (33 votes in favor, none against, 3 abstentions) and was now submitted to the CIML for approval.

      B 10 had been submitted in two versions, one including MTLs and one not including MTLs. TC 3/SC 5 had voted to approve the version without MTLs and not to approve the version with MTLs. The version without MTLs was now submitted to the CIML for approval. The revision of both parts (B 10-1 and B 10-2) would be published as one Basic Publication, B 10. They now needed to be reviewed because there might be some inconsistencies; Mr. Mussio wished to propose this as a new work item.

      The relevant Draft Resolution was shown to Members and Mr. Mason said that the proposal on the revision of B10 would be discussed at a later point. He asked for comments on the Resolution concerning B3 and B10 - there were none.

- number: 10.3.3
  title:
  - spelling: eng
    value: OIML TC 3/SC 5 proposal for a CIML Resolution on the acceptance of manufacturers'
      test results within the MAA
  narrative:
  - spelling: eng
    value: |2+

      Mr. Schwartz told delegates that Mr. Ehrlich and the secretariat of TC 3/SC 5 had asked him to give a presentation on an important topic which had also been discussed at CPR level and within TC 3/SC 5: the last six years of activities. He referred to the Working Document Item 10.3.3 which was a TC 3/SC 5 proposal for a CIML Resolution on the acceptance of manufacturers' test results within the MAA.

      Secondly, Mr. Schwartz referred to Item 10.3 of the Working Document, Addendum 2, the TC 3/SC 5 report to the CIML, dated 22 March 2011, headed "taking into account test results from Manufacturers' Testing Laboratories (MTLs) under controlled supervision by Issuing Participants and DoMCs".

      Mr. Schwartz reminded Members that the background to this was that at the 43rd CIML Meeting in October 2008, in Sydney, Resolution no. 20 had stated ...For the time being, Issuing Participants shall not issue OIML MAA Certificates in the event that results of tests outside the scope of the DoMCs are taken into account (e.g. test results from manufacturers) in the Evaluation Reports. In this case an OIML Basic Certificate may still be issued as long as the MAA does not provide this possibility. The Committee supports the intention of TC 3/SC 5 to further discuss the acceptance of manufacturers' test results, with the aim of ultimately including them in the scope of the MAA if consensus can be reached on the conditions to be applicable to manufacturers ISO/IEC 17025 test laboratories.

      This had therefore been a work item for TC 3/SC 5. Mr. Schwartz would update Members on what had happened since then. In April 2009 there had been two voluntary complete peer assessments of the manufacturers' testing laboratories (MTLs) of two well known European weighing instrument manufacturers that were performed in full accordance with the OIML MAA rules. These voluntary peer assessments had been organized by the PTB. The assessment team had comprised two assessors, the lead assessor being Brian Beard from South Africa, with Michael Denzel from Germany as technical expert. Both had been chosen from the official OIML/ILAC/IAF list of experts. Three observers, a CPR Member from South Africa and two others from Germany, had completed the assessment team. The assessment had taken one week - one day for preparation of the assessment team and two

      days for each MTL. The assessment reports had been drawn up according to the rules of the MAA and supplied in full to CPR and TC 3/SC 5 members including four non-conformities that had been found.

      Mr. Schwartz wished to inform Members about the conclusions of the assessors of both MTLs. The assessors had said that the quality system of the two manufacturers' test laboratories had been found to be suitable and effective for the activities of the laboratory and adequately entrenched and maintained. Four non-conformities had been found, and these had related to the length of policies and procedures regarding the formal registering of the application for type approvals with the Issuing Authority.

      Once these non-conformities had been addressed, it had been concluded that the laboratory would be suitable as a test laboratory for providing test results according to OIML R 76 to the Issuing Authority for evaluation of conformity under the DoMC for R 76.

      The task had therefore been to resolve these four non-conformities. To achieve this, in June 2009 at the combined R 49/R 60/R 76 CPR meeting in Bern, they had presented and discussed the two reports and their conclusions. They had discussed proposals and made a subsequent CPR inquiry and they had agreed on an MTL proposal to be put forward to the TC 3/SC 5 meeting in Paris in October 2010. At this meeting there had been discussion of a new MTL concept, developed on the basis of the CPR proposals and the two peer assessment reports. The conclusion had been that they would like to consider MTLs under controlled supervision by the Issuing Participants and the DoMC.

      A proposal had also been made at the previous meeting to add: "for the time being, an option for Issuing Participants in a DoMC to accept MAA reports with MTL test data on a voluntary basis".

      There had been a subsequent inquiry among TC 3/SC 5 members, because there had not been a quorum at the Paris meeting, from which there had been agreement on the MTL report and the draft CIML Resolution which would be presented a little later.

      As Mr. Mussio had already said, in September 2011 they had held the 5th CPR meeting in Braunschweig, at which the new concept had been presented and discussed as well as the draft Resolution.

      Before continuing with the draft Resolutions for the CIML, Mr. Schwartz wished to explain the new MTL concept. As he was hoping it would be implemented in B10, he wanted everyone to understand fully what was meant by "under controlled supervision by an Issuing Participant". If it was assumed that the DoMC was to Issuing Participants having their own test laboratories, and one or more Utilizing Participants without their own test laboratories, and assumed also that the first Issuing Participant wanted to request the registration of an MTL, in the DoMC, this was only possible if the Issuing Participant took full responsibility for one MTL. This included full inter-comparison exercises. The aim was that Issuing Participants should request registration of their MTL in addition to its own test laboratory in the DoMC. The procedure would be that the Issuing Participant would request this registration at the CPR. The CPR would determine an assessment team that would then make a full peer assessment of the MTL in accordance with the MAA assessment procedure based on ISO/IEC 17025. This would all be laid down in B10, which would therefore be the basis. In addition, and this had been the subject of the discussion within TC 3/SC 5, there would be three safeguards concerning the MTLs. These would be treated completely the same as any other testing laboratory except for three safeguards, as follows:

      - controlled supervision by the Issuing Participant; this meant that there would be full control including, for example, the test results of the MTL would be passed

      to the Issuing Participant for spot checks and re-tests insofar as the Issuing Participant considered this necessary;

      - the independence and impartiality of the MTL, which was guaranteed by certain quality measures; and

      - a full inter-comparison exercise between the Issuing Participants' own test laboratories and the MTL.

      All this would be dealt with, Mr. Schwartz said, in a new revision or an amendment to B10:2011. In the case of a positive result, the assessment team would come back to the CPR with a report, and when this had been agreed by the CPR Members, this MTL would be registered officially in the DoMC as an additional test laboratory to that of the Issuing Participant. The Issuing Participant was therefore in a position to issue MAA Certificates and MAA Type Evaluation Reports, and these MAA Certificates might, for the time being, be accepted or not accepted by other Issuing and Utilizing Participants. For the time being, the risk would be taken that MAA Certificates and MAA Type Evaluation Reports might not be accepted, without reasons given, but there was also the opportunity to gain experience.

      There had been discussion of the possibility of fast track for the inclusion of these additional safeguards in the version of B10 currently being presented to the CIML, but this had fallen three votes short of majority approval.

      Mr. Schwartz then showed the two draft Resolutions. The original version from TC 3/SC 5 had said Further to Resolution No 20 at the 43rd CIML Meeting, Issuing Participants may request the registration of Manufacturers' Testing Laboratories (MTLs) under a DoMC, provided that the conditions agreed by TC 3/SC 5 and laid down in a respective amendment to OIML B10 are met. OIML MAA Type Evaluation Reports that contain test results from MTLs may be accepted by Participants on a voluntary basis. This had been the original proposal. At the CPR Meeting it had been noticed that this wording could give rise to some ambiguity. This had then been slightly changed, so that the present version, to be found in the Working Document 10.3 now read:

      Further to Resolution No. 20 at the 43rd CIML Meeting, Issuing Participants may request the registration of Manufacturers' Testing Laboratories (MTLs) under a DoMC, provided that the conditions agreed by TC 3/SC 5 and laid down in a respective amendment to OIML B 10 are met. OIML MAA Type Evaluation Reports that contain test results from MTLs may be accepted by Participants on a voluntary basis.

      The second Resolution, Mr. Schwartz said, should also be amended: in case of a positive CIML vote on the above Resolution, the CIML is asked to vote on another Resolution, as shown in the Working Document; TC 3/SC 5 wished to propose a slightly amended version. The wording of this should be the same as in Resolution 1, Amendment 2, for revision of OIML B 10 so that both versions were consistent.

      In conclusion, Mr. Schwartz told the Meeting that after six years of discussions and three years of hard work, TC 3/SC 5 considered that the concept of MTLs under controlled supervision by Issuing Participants of DoMCs could be considered secure enough to provide appropriate and effective safeguards to justify MTLs being included in the scope of the MAA as soon as possible.

      Nevertheless, in the case of a positive CIML vote on the two MTL Resolutions, TC 3/SC 5 would have to re-discuss details in order properly to implement the concept of B10 on the basis of the MTL report dated 22 March 2011.

      The third point of TC 3/SC 5's conclusion was the scope of the MAA. This would certainly raise the number of MAA Certificates, because Issuing Participants would no longer be obliged to issue OIML Basic Certificates when they made use of test certificates from MTLs. On the other hand, opponents, or reluctant DoMC participants would have the option to accept MAA Certificates and related reports on a voluntary basis until sufficient experience had been gained with a new concept which was similar to MTL concepts in other international certification schemes such as the IEC CB Scheme.

      Finally, Mr. Schwartz said, the CIML vote on the two MTL Resolutions would be a very important decision with far reaching consequences for Issuing Participants, for manufacturers and also for the future of the MAA.

      Mr. Kool said that he wished to give Members some information about discussions on this subject which had been held in the BIML and in consultation with the President on the issue of some of the amendments to the draft Resolutions which had been proposed in the last two presentations.

      Mr. Mussio had suggested that parts of documents MAA 01 and MAA 02 should be included. These were internal procedural documents not normally approved by the CIML or indeed published. Discussion was still ongoing about which parts of those types of documents should end up in a publication such as B10, which was supposed to set out the requirements for the system, and then there could be procedural documents within the system which did not necessarily have to be approved by the CIML because they were saying how to do things rather than what to do.

      The other proposed changes to the draft Resolutions would probably not give rise to many problems because the current draft Resolutions set out an amendment of B10 and a proposal to change the draft Resolutions so as to include the words "revision" or "amendment" or something similar. The TCs/SCs could always in any case include things that they considered needed changing. The BIML considered that the first issue, the inclusion of parts of procedural documents as they currently existed, should not be accepted; also, as far as they were aware, this proposal was not based on any formal decision, either by TC 3/SC 5 or by the CPR Meeting at which it had been discussed.

      Mr. Schwartz said that the CPR was aware that there had not been a quorum to make an official proposal to the CIML but had nevertheless thought it worthwhile making the proposal immediately on the subject of the CPR procedures, which they had found not to be fully consistent. Despite the lack of a quorum he suggested that there be a Resolution to the effect that B10 would have to be revised. He also felt that TC 3/SC 5 should recognize that a review of procedures was necessary and bring a good proposal to the CPR as to what these procedures should be, implemented in B10 or elsewhere but action was certainly necessary.

      Secondly, Mr. Schwartz wished to say that they should never again mix up a Resolution on MTLs with another Resolution on a revision of B10, because this had been the cause of some problems. If there were two issues there should be two separate Resolutions, probably also with priority given to them.

      Mr. Johansen thanked Messrs Schwartz and Kool for trying to clarify the situation. He asked that the Resolution to be voted on the next day should be given to Members in written form so that they were absolutely clear as to what they were voting on.

      He then commented that the discussion on whether or not to include Manufacturers' Testing Laboratories in the MAA had been going on for a very long time. He personally was in favor of including them, but was not much in favor of the present form, the effect of which was that there were currently three different kinds of Certificates instead of two. He did not think this

      was of benefit to the outside world or to manufacturers who made use of it. It was too complicated for receivers of Certificates. He felt that MTLs should be fully accepted and not in some sort of intermediate stage.

      Replying to the first part of Mr. Johansen's remark, Mr. Kool said that the Bureau would that afternoon draw up the final draft Resolutions and make them available in print before the next morning's meeting session began.

      Mr. Schwartz felt that the only way to proceed with the MTL issue was not to introduce a third kind of Certificate, which they did not want: it was an MAA Certificate; but for the time being to allow voluntary acceptance of the MTLs, which of course was not the best solution but one which opened the door for those countries which were still reluctant to accept MTLs, and not to put any pressure on them to explain why they did not accept MAA Certificates. So it opened the door to the gaining of experience; to do otherwise would prevent progress ever being made.

      Mr. Klenovský had expressed his reservations on the proposal at length in correspondence to the Committee and did not wish to repeat himself. He thought it a pity that Issuing Authorities should be divided into those who did and those who did not accept MTLs. As a matter of principle he himself did not agree that legal metrology should be administered in this way.

      Mr. Harvey felt no reluctance at expressing his opposition to the proposal. He had in fact been responsible for the compromise Resolution which had arisen out of the TC 3/SC 5 meeting in Paris. He had done this because the issue had been debated for a long time and he had thought that to have a compromise might lead to some progress being made. It seemed however that the opponents of MTLs would not be satisfied until they had been fully rejected. Given this, he did not think it was possible to accept even the compromise proposal. The reasons for this were clear; they had nothing to do with confidence in manufacturers' laboratories - many would probably accept the test results. The real problem was conflict of interest. When a laboratory was in a position of a conflict of interest, and money was involved, it was impossible to be certain what might result. This was the first point. The second was that although there were laboratories whose results could happily be accepted, there were others where this was not the case. There would be complaints of discrimination against certain countries, letters from ministers that would have to be answered, in short an enormous amount of administrative burden and OIML would be sticking its neck into a noose. These were the reasons against accepting manufacturers' test results.

      Mrs. Lagauterie said that experience in Europe had been very different. They had been using manufacturers' laboratory reports, under the control of notified bodies, for some time and so had considerable experience of the system. There had never been any problems. No examples of faulty weighing machines had been found even by market surveillance. France was in favor of the solution proposed by TC 3/SC 5.

      Mr. O'Brien explained that New Zealand's objection to the acceptance of manufacturers' test results was based on the lack of impartiality and independence of such laboratories. He asked for more detail on the quality measures envisaged to combat this problem.

      Mr. Schwartz replied that he had not wanted to enter into too much detail. It had been discussed both in the CPR and more intensively in TC 3/SC 5. One of the safeguards was that control supervision included for any test at an MTL, an identical test sample which would be submitted to the Issuing Participant who could completely re-test or make spot checks. There was no opportunity for cheating. He added that, before the tests were started, it was agreed with the MTL which test sample was to be identified as the representative one of the family of items being tested. This decision would be taken by the Issuing Participant and not by the

      MTL. Then when tests started at the MTL, the Issuing Participant was informed so that he could at any time go there and make a visit, including unannounced visits if he felt these would be advisable. All this was included in the TC 3/SC 5 proposals and he could not understand why he still kept hearing comments on conflict of interests and doubts about impartiality. In his opinion the level of safeguards was so high that there was no opportunity to cheat.

      At the TC 3/SC 5 Paris meeting, the Executive Secretary of the IECEE, Pierre de Ruvo, had made a presentation in which he had explained that the IEC MTL scheme had different types of MTL, first party MTLs, under controlled supervision, and third party MTLs - they had no trouble with the third party MTLs because these were ones that had been identified; if they did something wrong or against the procedure they would be struck off the DoMC approved list. If an MTL was initially on the DoMC list and then did not appear on it, this would create a bad impression. Such MTLs were quite different from those which were under controlled supervision. He would like everyone to think again about approving them.

      Mr. Sanders said that the UK would strongly like to support the Resolutions put forward by Mr. Schwartz, and considered that it was essential to move forward with this issue. At the end of the day, Utilizing Participants would have the ability to refuse to accept results, as it was going to be a voluntary position, but it struck him that if this was accepted, it might be helpful in their concerns about Conformity to Type. It had certainly been Mr. Sanders's experience as a previous manager of a type approval facility that those manufacturers with their own testing facility did more internal checks and that the instruments they produced did generally speaking conform to type, as compared to those made by manufacturers who did not have their own testing or screening facilities. He therefore believed that to adopt the proposals would bring an additional benefit.

      Mr. Richard commented that he had the impression that some of the opponents of the compromise proposal still strongly believed in the accreditation process and the accreditation system, in which impartiality and independence were two very important issues. This was the case for all accredited laboratories. He was strongly in favor of the compromise on offer, and considered this to be a unique chance for the MAA to move forward. If this change was not made, he was very afraid that the MAA would slowly die.

      The Netherlands supported the proposal. They had had the same experience as that described by Mrs. Lagauterie, i.e. no complaints about results from manufacturers. Mr. Van Mullem asked for the wording which Mr. Schwartz had suggested for the Resolution to be put on the screen.

      Mr. Kool showed the amendment to B10, which had not changed.

      Mr. Klenovsky said that his experience with the EUROMET system confirmed that of France and Switzerland, i.e. that impartiality was not an issue with MTLs.

      Ms. Hockert said that the USA was able to support the compromise as long as it remained voluntary.

      Mr. Kool confirmed that the draft Resolution in the Working Document would be maintained, with the addition that where it said "Amendment", it would be amended in the sense suggested by Mr. Schwartz.

      Mr. Mason clarified that two sets of amendments were being circulated. One was purely for clarification and involved restructuring and introducing the concept of "amendment or revision," and that was purely a drafting improvement which it was hoped would be helpful to the secretariat of TC 3/SC 5. He had understood from the presentation by Mr. Schwartz that

      there might be some more extensive changes to the Resolution, but he did not detect that there was support for that. He believed that the proposal they had at the moment was that they should accept the principle of a revised, clarified Resolution to vote on the following day in the light of the comments of all participants in the debate.

      Mr. Patoray agreed with Mr. Kool that this was an editorial clarification but added that after the discussion at the meeting it also contained an extra phrase "and that after this amendment ...", in order very clearly to state that this could only happen after the amendment and not at any other time. The original Resolution, consisting of two bullet points, had lacked clarity in exactly what it meant, so this very well clarified the intent of what was there but did not change the intended meaning.

      Mr. Mason summed up the discussion by saying that a Resolution would be proposed in the amended form suggested by Mr. Schwartz and a vote on it would be taken in the light of the views which had been expressed.

- number: '10.4'
  title:
  - spelling: eng
    value: Conformity to Type (CTT)
  narrative:
  - spelling: eng
    value: |2+

      Mr. O'Brien introduced himself to Members and said that he would be giving them a brief overview of the issues on conformity to type and introducing two draft Resolutions for their consideration.

      Issues and concerns regarding how to ensure the conformity to type of production instruments subject to OIML Certification had been considered at a number of OIML fora for some time, Mr. O'Brien told Members. Globally, Regulators needed assurance that production instruments entering their economies were consistent with the OIML certified type. This was an issue of particular importance to economies outside the jurisdiction of existing regional and national conformity to type systems, and also for economies without strong national conformity to type compliance or testing programs.

      In response to a request from the CIML made at the 45th CIML Meeting, two seminars on conformity to type had been organized by the BIML, the first in Utrecht on 29-30 June and the second in Prague on 10 October. These seminars had provided an opportunity to focus on conformity to type, discuss the views, issues and perspectives of participants and to identify a potential way forward for the CIML to consider at the current Meeting.

      Mr. O'Brien had been involved in the seminars in a small way through leading a Working Group which identified speakers and reported on the initial seminar. He wished to take the present opportunity to thank the seminar organizers, speakers and participants for their support and the significant contributions they had made to the success of these seminars.

      The Utrecht seminar had been attended by 43 delegates, representing a cross section of legal metrology regulators, issuing authorities and industry associations. Representatives from the Asia-Pacific and European regions had attended. On the first day the seminar speakers had presented experiences and perspectives of international conformity assessment bodies, EU and US manufacturers and of regulators from the US, EU, Australia and New Zealand. The second day had taken the form of a panel discussion, analyzing critical issues relating to conformity to type and the perspectives of the participants.

      Key points raised had included:

      Regarding conformity to type from a global perspective, complexities had been identified around:

      - finding an appropriate funding model,

      - working out how to exchange information,

      - dealing with global supply chains,

      - responding to national non-compliance, and

      - avoiding duplication of existing systems in the EU, US and other national conformity to type schemes.

      In spite of these complexities, however, conformity to type had been seen as important to maintain ongoing confidence in the OIML Certification Systems, both MAA and Basic Certificates, to maintain a level playing field for instrument manufacturers and to incentivize compliance by introducing potential for the detection of non-compliance. It had also been considered important to prevent instrument dumping in developing economies and economies without strong regional or national conformity to type systems.

      A copy of the full report on the Utrecht seminar was available, Mr. O'Brien said, on the OIML web site.

      The seminar held in the current week had taken into account the outcomes of the Utrecht event. Approximately 70 participants had attended. It had been recorded and would be transcribed to make the useful and constructive comments of participants available as reference material to guide future work in this area.

      The speakers in the subsequent workshop seminar discussions had:

      - reviewed and considered the report of the Utrecht seminar,

      - given an informative overview of the IEC Conformity System and the EU and UNECE international model operation as an example of what could be done in the conformity to type area;

      - identified how the content and quality of OIML Certificates and the related documentation could potentially be improved in relation to conformity to type;

      - discussed a draft definition of OIML conformity to type, which had been refined into a potential scope for OIML conformity to type activity. This scope had been incorporated into a draft Resolution which would be presented to Members later that day.

      As a result of both seminars, the following way forward had been identified for consideration of the present Meeting: a CIML Resolution should be drafted formally to assign responsibility for conformity to type to the work program of an OIML TC. Consideration and a clear direction needed to be given to exactly where this work was assigned.

      The second resolution of the seminar was that a CIML Resolution should be drafted formally to request this TC to devise a guidance document on conformity to type. This document was intended to reference current programs in the US and EU, to identify international best practice, and to inform the future global development of work in this area.

      It remained for the CIML to consider where this work should be assigned and completed. Due to the fact that conformity to type had over-arching implications for all instrument categories, and for both the MAA and Basic Certificate Systems, CIML consideration needed to be given

      to where this work was completed. The US and Australian representatives had recently indicated to the CIML a willingness to take on responsibility as secretariat to complete this work.

      The Prague conformity to type seminar had identified and discussed the following two possibilities for assignment of CTT. The first was to assign it to an existing TC and the second was to create a new TC for the purpose.

      Under the first option the following TCs had been considered: TC 3/SC 1 Pattern approval and verification, or TC 3/SC 5 Conformity assessment. If a new TC were set up it could become TC 3/SC 6 Conformity to type.

      Discussions at the Prague seminar had been unable to make a unanimous decision for a proposal as to which TC should undertake the conformity to type assignment; this was for the CIML to consider. It had to be remembered that the seminar participants were not necessarily a representative sample of the whole of the CIML. Seminar participants had been asked for an informal appreciation of their preference for either setting up a new TC or placing the work in an existing one. The response had been 20 to 9 in favor of placing it in an existing one. They had then been asked which existing TC they would prefer, and there had been a vote of 11 to 9 in favor of TC 3/SC 1, rather than TC 3/SC 5. The decision was of course for the CIML to make.

      ## The draft Resolution was shown to Members.

      Mr. Mason said that, along with many other colleagues, he had attended the second seminar and had been very impressed with the progress which had been made. Mr. O'Brien in particular was to be congratulated on the way he had taken the matter forward by clarifying the issue. Previously a long time had been spent discussing conformity to type, without it being clear exactly what was being discussed. Much progress had now been made. He hoped that the discussion about to take place could concentrate on two key issues:

      - whether the CIML was happy that the work which had gone forward so far was at a state where it was possible to proceed to the sort of document which was being discussed in the Resolution, and

      - which TC should address this.

      Mr. Mason asked Members to limit their comments initially to what Mr. O'Brien had said and to the Resolution in front of them.

      Mr. Harvey congratulated Mr. O'Brien for the work he had done in this area; despite being busy, he had worked hard and brought a lot of clarification to a difficult issue. Ms. Hockert also commended Mr. O'Brien, saying that she fully supported the scope for the development of a guidance document.

      On the question of which TC should undertake the work, Mr. Mason pointed out that two things were being discussed here:

      - they should be considering whether an existing TC had the right collection of participants, be they P-members or O-members, and

      - the capacity of the secretariat to take the work forward.

      He added that the offer of using the Bureau's resources to carry out this work applied not just to doing that with a new TC but also, if desired, as a resource to do the drafting. He was concerned that TC 3/SC 5, in particular, was already undertaking a huge amount of work. Even after the SC had been chosen, there should be discussion of whether it was worth asking the Bureau to undertake that part of the work. This might be done formally through the

      Bureau acting as convener, or otherwise, if B 6 were not adopted in its current form, this help could be given informally.

      Mr. O'Brien said that for the document to be effective and to work, it was going to need to represent the views of developing economies, of economies outside Europe, of economies inside Europe and the US. Clear thinking and an open mind would be essential and he found it difficult to see how this could be done in an existing SC which already had a significant workload. He was therefore in favor of looking at this as a separate piece of work and setting up a TC specifically for the task.

      Ms. Hockert said that the US would support this work being done in TC 3/SC 5, and would welcome the idea of the workload being shared by the Bureau and by others.

      Mr. Miki asked whether BIML help could be given only to a new SC and not to an existing one.

      Mr. Kool replied that the Bureau would be able to take the work forward either in an existing or in a new committee, if this was the wish of the CIML.

      Mr. Sanders told Members that he had attended the seminar and had been very interested to see the alternative systems, e.g. in the IEC and UNECE, and felt that it was important to come to this work with a completely open mind and not to be limited to reproducing current OIML ways of working.

      Mr. Johnston said that Canada supported the work being done by TC 3/SC 5.

      Mr. Klenovský believed that the project was so large and so important that a new TC/SC should be set up to deal with it.

      Mr. Algossair said he had attended the seminar and supported the work being done either by TC 3/SC 1 or by TC 3/SC 5.

      Mr. Harvey said that Australia supported the formation of a new SC. They did not believe it was appropriate to put it under TC 3/SC 5 for several reasons, one of which was the capacity, even if the Bureau was helping, and the other was that many new members would be needed to reflect the broad spectrum of views that would be required. A further point was that that committee was inappropriately named as "conformity assessment", whereas in fact it dealt with mutual recognition systems, B3 and B10. The current matter was certainly a new conformity assessment issue and deserved a separate TC.

      Mr. Jianping said that CTT was a major task for the OIML. A Member State needed to push the project forward. China could lend experience when Member States set up such systems in their countries. He thought the task should be assigned to a TC, but his concern was that he knew there were different opinions on the CTT scope, so if the task was assigned to a particular TC, it might have a different agenda. He thought the exact desired scope of the CTT should be defined first, before it was decided which TC should undertake the task.

      Mr. Mason reassured Members that if experience showed it to be necessary or appropriate, the work could always be moved to another TC. The formal structure now being decided need not be fixed for ever.

      Mr. Farragher supported the creation of a new SC because the workload of the existing ones was already so large.

      Mr. Mason asked for a show of hands from those in favor of setting up a new SC, TC 3/SC 6. There was a strong majority in favor of this, which would be reflected in the new draft Resolution to be voted on the next day. In the meanwhile thought would be given to the recruiting of volunteers for secretariat of that SC.

- number: '10.5'
  title:
  - spelling: eng
    value: Revision of the Directives for Technical Work
  narrative:
  - spelling: eng
    value: |2+

      Mr. Mason referred to the substantially revised B 6, informing Members that overnight there had been substantial discussions about one particular issue, which had cropped up in several comments about the revised draft. This was the way in which the phrase "Working Group" had been redefined. The original intention in doing this had been because it had been felt that it was confusing to use what would probably have been the preferred phrase, which was "Project Group", because of the association that that had with the original proposals for a flat structure. Following conversations with a number of colleagues the previous evening, however, Mr. Mason had been persuaded that this was less important than the potential confusion which came from using "Working Group" when this expression already had a different meaning according to OIML procedures. If the proposal was accepted, all references to "Working Group" would be changed back to "Project Group". The presentation which Mr. Dunmill was about to give should be understood in that light.

      Mr. Patoray told the CIML that he wanted to bring to Members' attention Resolution 24 which had come out of the previous year's Meeting, to the effect that the Bureau should consult CIML Members with an inquiry. Members would see that this had been accomplished; the Resolution had gone on to say that the Bureau should come back with a new draft revision, to be considered for adoption by the 46th CIML Meeting. Mr. Patoray considered that the document presented to Members in mid-July accomplished the goals set out in that Resolution. Some had commented that it should have been done earlier, as there had not been enough time for reviewing the document; Mr. Patoray could see that there was legitimacy in this comment on the timing, but he wished Members to remember the 2010 Meeting and the changes that had taken place at that time. Mr. Patoray's arrival at the BIML had been on 1 January. There had then been other pressing issues to deal with, which has meant that the priority of this inquiry had been delayed. Distributing and processing the inquiry and producing the resulting B 6 had been done as fast as had been possible.

      The two items on which there had been a split vote had been dropped and all other opinions expressed had been taken very seriously. The major thing that this work did was to address the nagging issue of voting and whether a Member was participating or an observer in the Project Groups, as they were now to be called. This had been Mr. Patoray's main goal. He believed that this document would allow them to move on towards a better process; just a few minor matters remained to be clarified. He had used the term "living document"; this did not mean that it would change all the time. A "locked document", such as the Convention, could not be changed, and Recommendations, which would become law, needed to be thoroughly discussed and could only be altered if they contained an erratum. But in the case of the document under discussion, which was an internal OIML process, it should be used in such a way that experience was gained and improved, not often or unnecessarily but when this became necessary. This was his explanation of what he called a "living document".

      Mr. Dunmill said that he would not repeat Mr. Patoray's introduction or the past history of B 6 but merely update Members on what had happened since the previous CIML.

      As Mr. Patoray had said, an inquiry had been sent out to Members with some very specific questions on the outstanding issues and concerns of Members. The inquiry had had a one month deadline, but by that time there had only been 15 responses, so Mr. Dunmill had sent out two reminders and eventually achieved a 65% response, i.e. replies from 37 Member States. 15 CIML Members had made no response of any kind to all the e-mails.

      Of the principles in the draft, the TC/SC structure was to remain in its present form, with all the existing committees retaining the status quo, unless any of them wanted to change. These were "permanent" committees; they could of course be created and disbanded by the CIML as required for the technical work which the Organization needed to undertake, but they stayed in place when a project was completed. This meant that the expertise accumulated during the development of a project remained with that technical committee because, although this happened less frequently than before, there were still sometimes questions as to what a paragraph meant or how something should be implemented, and the committee had expertise which the Bureau did not have, and continued to serve as a point of contact.

      The concept in the new draft, Mr. Dunmill explained, was that each individual project to revise or create a Recommendation or Document would be conducted by a Project Group which operated under the technical committee or sub-committee. These Project Groups would be temporary, in the sense that one was created to undertake a project and then disbanded once the project had been completed. In order to avoid confusion with the technical committees, instead of secretariats, the persons running the Project Groups would be called conveners. P-members of the technical committee or sub-committee which the Project Group was under would also have the choice of being a P- or O-member of each of the Project Groups. At the moment, a P-member of a technical committee had to participate in all the projects of that technical committee; this draft gave the option of participating only in the projects which interested a particular Member, and which would be implemented in that Member's legislation. By default, the secretariat of each technical committee would become the convener for all its projects. This document however allowed the secretariat, if they could not take on that work, to hand it over to someone else. Similarly, by default, all existing P-members and O-members of a technical committee would become P-and O-members of each of the Project Groups, but again P-members had the choice of not being a P-member on a particular Project Group.

      Another point from the inquiry had concerned the Technical Management Committee - how was the technical work managed? To be clear, there was no Technical Management Committee in this draft. There had not been a clear demand for this and so the idea had been dropped. The draft did, however, clarify the role of the Presidential Council in the management and oversight of the work. This was in an advisory capacity, and clarified the fact that the CIML was responsible for all decision making concerning the strategy, the establishment of technical committees, new work projects and the approval of most publications. It was clear in the draft that all Recommendations, Documents, Vocabularies and to some extent the Basic Publications (though these were not covered by the Directives) were the responsibility of the CIML. All the approval capacity remained at CIML level. The BIML would continue to organize the preliminary ballots as at present and, a new point, once a Recommendation had passed a preliminary ballot, it would become a final draft publication for the final stage of CIML approval, and at that stage the Document would become public in the same way that ISO and IAC used "Final Draft Stage", and there would still be a possibility for editorial correction but not for technical change as it was now past the voting point. Again the Bureau would continue to organize the CIML approval process.

      A concept which had been in the draft for a long time was that all decision making should be according to the OIML Convention, so as not to have a number of different decision making processes. According to the draft, therefore, decisions of TCs and Project Groups would now have slightly different procedures according to whether a decision was taken within a meeting or outside a meeting. This was the same idea as in the OIML Convention, whereby two thirds of the votes cast by P-members were required for a technical committee decision to be valid. This was counting votes cast, which do not include abstentions or failures to reply. This did

      mean that there was a possibility of things being passed by a small number of P-members, but the idea was to stop the current situation where work could be blocked from progressing because a secretariat could not get enough people to reply to a vote.

      The CIML preliminary ballot was the same as in the existing Directives. The previous CIML and the inquiry responses had indicated that this was considered a valuable concept to keep in the draft, and the rules would be as at present.

      For the approval of a Recommendation, there would be two procedures. The procedure at a CIML Meeting would be identical to the present system, as laid out in the OIML Convention. A second rule, also taken from the OIML Convention, applied to decisions between CIML Meetings. Of course this would originally have meant mailing questions and responses round the world, but now it meant the online approval process, which CIML Members were familiar with.

      The BIML would be responsible for basically similar things to the present: consulting CIML Members, organizing and following up on ballot votes, and so on, once a Recommendation reached CIML stage. They would also, following the draft, be responsible for asking at which level CIML Members wished to participate in the technical work and helping the technical committees, sub-committees and Project Group secretariats and conveners in maintaining the membership lists. This was very unclear at the moment, with some secretariats better at maintaining participation lists than others, and this draft gave some responsibility to the BIML to make it more consistent.

      There was also a responsibility for the BIML to initiate the periodic review of publications. Members were aware that all the publications had a five-year review period, but, looking down the list of publications, a large number were well over five years old and not in revision. It was hoped that this might improve the up to date status and relevance of publications.

      Mr. Dunmill considered that Part 2 of the draft had been largely neglected in comments and discussions. It had been sent out with the 2nd edition of the Working Document for the CIML Meeting. This part of the Directives covered drafting and production of final edited versions of all OIML Publications. The only updates of this which had taken place had been to take account of ISO/IEC 80000, which was the standard on units, symbols, etc. This standard was used by the OIML when doing the final editing of publications, to make sure that the format of formulae was correct. It also took account of the way now recommended by ISO for showing wording of definitions, and the latest definitions produced by the Bureau had used this format. Mr. Dunmill had also tried to improve the readability of B 6-2, which previously had been quite difficult to understand in some places. The changes had merely updated the latest standards and covered what was already current practice in the Bureau for finalizing publications.

      Another point which had been mentioned the previous year was a template for OIML Recommendations. Some Members might be more familiar with this than others, but a lot of work had been done by the Netherlands, mainly to do with the TC secretariat training courses which the Bureau had run. Mr. Dunmill showed a model of a Recommendation, to make sure that secretariats, when producing a Recommendation, took account of the right sections in the right places and did not deviate from the way in which Recommendations were laid out. This was still under development but might become a third part of these Directives in the future.

      Returning to the first part of the Directives, which was the one of most obvious interest, Mr. Dunmill showed some of the concepts graphically, hoping this would clarify the matter. There would continue to be the technical committee, as at present, without alteration to numbers or structure. Some would still not have sub-committees though others would, as at present.

      Technical committees or sub-committees could be responsible for OIML publications and for the projects used to develop them. He showed a diagram of a hypothetical TC20, with a number of P-members and a number of O-members. The CIML would approve tasks for that committee to undertake, whether to develop new Recommendations or to revise old ones. Considering just one of those projects, then a Project Group would need to be established. Normally, the convener of that would come from the secretariat of the TC which was above it, and all the P-members and O-members, by default, would be the same as those in the TC.

      Mr. Dunmill then asked Members to consider a second project, where Country F, which held the TC secretariat, was not really interested in the subject, although it fell within the technical remit of their TC. One of the other P-members could volunteer to take on the convenership of that particular Project Group. Similarly, Country F became an O-member; they were not interested in the work but still followed it because it was within their technical remit. In the same way, some of the other P-members of the TC who were not intending to legislate for the project or who were not particularly interested in it, would become O-members of the Project Group. They liked to follow the work because it fell within their technical remit. This TC therefore had a Project Group which would continue to work just as at present, through development of Working Drafts and Committee Drafts until one of those Committee Drafts was approved by that Project Group. At that point, in the same way as currently, the approved Committee Draft would be sent to the BIML, which would edit it a little and make it into a Draft Publication, to be sent to the CIML for preliminary ballot. After the same three-month voting period as currently used, the results of the preliminary ballot would come back to the BIML and, assuming there was nothing needing to be re-done by the Project Group, a Final Draft Publication would be produced, which, under the draft B 6-1 being discussed, would be a public document, and would be sent to the CIML for approval, as was currently done. Assuming the Final Draft was approved by the CIML, it would be published, at which point the Project Group which had developed it would be disbanded because its work had been completed, and the publication would become the responsibility of the TC. Over time, as other projects were completed, there would be several other publications for which that TC was also responsible. When such a project came up for its 5-yearly revision, a project proposal would be made to the CIML, as at present, the CIML would normally approve a project to revise the publication and this would lead to the creation of a Project Group and repetition of the cycle.

      Concerning implementation of the draft and its contents, Mr. Dunmill said that if the CIML approved the draft in October 2011, between that date and the end of the year the Bureau would hold discussions with the existing TC and SC secretariats on how the work they were currently doing would be translated into the new system and would of course also be responsible for publication of the revised Directives. This would mean that from the beginning of 2012 work could be operated under the new Directives, though in fact in day to day operations there would be no change to the way the work was currently being done.

      Mr. Dunmill believed also that a training course for TC and SC sub-conveners should be organized for 2012. The last course for TC/SC secretariats had been held in 2009, at which time it had been said that when the new Directives were approved they would need to begin another such series of training courses.

      Basically then, Mr. Dunmill informed Members, this would mean that, having gained experience of operating the Directives during the year, a report could be made to the 2012 CIML Meeting on the experience of the operation, and consideration could be given to any polishing that was needed. He felt, as did Mr. Patoray, that what was now needed was experience of how the alterations would operate in practice, in order that B 6 could receive its final polishing.

      Mr. Mason concurred that even if B 6 was approved there were areas which needed attention; one of these was clarifying the position of proxies. He did not think it sensible to try to redraft it in the present Meeting; the present need was to approve the principle of the document, with or without minor revision or else to send it back to the Bureau for rewriting. He added that if it was approved with the recognition that it still needed some revision, an ad hoc Working Group of interested parties, especially countries with major secretariats, would be set up under the leadership of Mr. Schwartz, to undertake this task.

      Mr. Carstens asked firstly whether those joining Project Groups could change their status, for instance from O-member to P-member for that particular project, and secondly whether nonmembers of that particular committee might nevertheless be permitted to participate in a specific project in which they had an interest.

      Mr. Dunmill replied that changing between P- and O-membership would be possible at any time, as under the present system. In order to join a Project Group it would be necessary to be a member of the TC, because membership would continue after the project was complete. Another project in the draft was periodically to require re-confirmation of the TC secretariat and the Project Group conveners. This had been felt to be a good idea, in order to ensure that progress was being made and that the participants in a group were happy with the way it was being run. Secretariats and conveners would have to be re-elected every three years. In this way, if progress was not being made on a project, and it had not been possible to resolve this by other means, then the secretariat which was not making progress could be changed. It would of course be hoped that if one country did not have the resources to carry through a project they would simply ask another to take it over, but the draft provided an alternative mechanism which could be used if the problem was not solved in this straightforward way. There was also a mechanism for downgrading to O-members any P-members who had not voted at least twice. This would deal with any situation where it was not possible to obtain enough votes on a particular issue.

      Mr. Johansen welcomed the proposal and hoped it would solve the problems of delays which had been experienced in recent years. He disliked, however, the idea that Guides could be approved by the President. In an extreme case, a Guide could be developed by the Bureau and approved by the President without ever being seen by any of the other Members. He proposed that such Guides should be submitted for CIML approval.

      Mr. Dunmill replied that there was an explanation of different kinds of OIML publications at the beginning of the draft. The Directives would apply to Recommendations, Documents and Vocabularies. There was a problem with the classification of Guides, some of which were internally developed by the Bureau for CIML Members, summarizing information which was available elsewhere and therefore did not need CIML approval. What was needed was to examine how they were categorized. Basic publications were already not included in the scope of the Directives, whereas Basic publications on the Directives and on the MAA could be changed by the CIML. These categories had been set up by the Bureau in groups simply to make it possible to give a number to the publication so that it could appear on the web site in a logical way. It was not fixed in stone and in the next year it would be possible to learn where there was a need for some reclassification for this reason. In particular, some of the Guides and Basic publications might not quite be in the right group or the groups might not be correct.

      Mr. Mason added that the revision of B 6 so far had been based on current practice so far as this could be established and that one of the advantages of modernizing the language was that there was now the opportunity, particularly over the next year, to question whether this description of current practice represented what they actually wanted to do with the

      documents known as Guides. Mr. Mason would welcome comments sent to Mr. Schwartz's group.

      Mr. Miki expressed appreciation to the BIML for their redrafting, but was concerned that the flat structure and Technical Management Committees had been rejected. He needed more time to see how the Project Groups arrangement would work out and whether this was not a question of flat structure and TMC by another route. He was also worried about the transition to the new system and felt there should be some sort of rule or written procedure for the transformation.

      Mr. Mason denied that the new structure was anything more than what was currently happening. Even if the new B6 was not adopted, the Presidential Council would still exercise a form of oversight through the advisory role described in it. It would also be the case that in certain instances where there was a need for what B6 called a convener, separate from the secretariat, this was also already current practice. For instance, in the TC dealing with traffic related instruments, the secretariat had been moved from the UK to another Member State, but the UK still retained an interest in the taximeter project and the other country took the lead on developing the Recommendation on these instruments. So this was already happening and this had been the case for some time. The purpose of B6 was to describe clearly how the technical work should be operating on a consistent basis.

      Mr. Valkepaää said that he was willing to take a step forward and accept the compromise proposal. It had been on the table for a very long time, but he wished to remind his colleagues that there was a risk in the attempt to accelerate the work. If they were not taking the responsibility of voting, it was possible that important decisions would be taken based on a very small number of votes, and that the quality of the work would be put at risk. There were not many P-members and if they failed to vote and were downgraded, decisions could be based on the votes of very few people.

      Mr. Schwartz told Members that several more comments had to be taken into account before the revision of B6 was complete. He agreed that it was important to move forward because there was consensus on the main points, but a few matters concerning the proxies needed clarifying, as did the relationships between the Project Groups, the TCs and the BIML, and the idea of sending the completed drafts direct from Project Groups to the BIML without involving the TC. All these points, which were not too basic or too critical, nevertheless needed work and reconsideration, and this would be one of the Working Group's main tasks in the coming period.

      Mr. Dunmill added that it was true in the present draft that a few votes could wield excessive influence, but there was the counterbalancing possibility of downgrading P-members who did not vote. Experience would tell how this operated in practice, but it represented an attempt to make progress on the problem of non-participation.

      Ms. Stokstad thought the document was good but commented that the illustrations in the annex did not always make it clear which stage of the process was being described and at which point it would affect Members.

      Mr. Han Jianping commented that China had several TCs responsible for OIML projects; on being shown the draft, he had had some concerns about the transition from the old system to the new. Perhaps more detail was needed to guide the TCs in order to give them more confidence.

      Mr. Dunmill said in response that there would be no change to the existing composition of any group that was working on a project at the moment, other than that it would be renamed to include the Project Group number. There would be a separate Project Group for each

      project the committee had been working on, but the membership would be the same as at present. If afterwards, people wanted to change, that was a different issue, but at the moment of transition everything would remain the same. There would be an urgent need for training and one of the urgent things the Bureau would do would be to organize a new secretariat and convener training course to explain the new Directives, possibly in mid-2012. The course would be similar to those which had been attended in the past by many, though not all, secretariats. The existing format would be updated with new explanations of the new system, but they would want to retrain as many secretariats and conveners as possible, and as soon as possible.

      Ms. Hockert said that the US supported the President's statement of the principles of the document and the appointment of Mr. Schwartz as the leader of a Working Group; however, because of many of the concerns which had already been raised, and the fact that people were not familiar and comfortable with the document, and the ambiguities that currently remained in it, they would prefer the Working Group to finish its work before B 6 was put to vote.

      Mr. Van Mullem said that the Netherlands supported this new version of B 6. They accepted that the version was not perfect; some aspects should be clarified in the new draft and they would volunteer to participate in the Working Group led by Mr. Schwartz.

      Mrs. Van Spronssen said that, looked at more from a Government point of view, Mr. Dunmill's presentation had given a clear picture of the responsibilities of CIML Members. However, in the draft there was a mixture of responsibilities of P-members and Member States, which she would like cleared up in the next version. One thing she believed not to be correct was point 4.5, where it was said that the CIML Member was the representative of his country. This was not the case according to the Treaty, where the Member was described as an expert nominated by the Government to take part in the Meeting, and could not bind his Government to anything. This was textual rather than fundamental but needed clarification.

      Mr. Dunmill replied that both the points mentioned could be covered in editorial corrections to the existing draft before it was published. He undertook to rectify it, and did not believe there was any doubt as to what the spirit of B6 meant. Secretariats were given to a country and not to a person, and the term "Member State" had been used rather loosely; he would look again at how the wording was used, and at the definition of a CIML Member.

      Mrs. Van Spronssen thanked Mr. Dunmill and said that the Netherlands now felt able to accept the revised B 6.

      Mr. Harvey said that Australia also supported acceptance of the draft and working on it over the period of a year and also volunteered to be part of the Working Group led by Mr. Schwartz.

      Mrs. Lagauterie said that France also supported it, with the same comments as the Netherlands concerning section 4. She also considered that the role of the Conference seemed to have been omitted and needed attention.

      Mr. Dunmill pointed out that section 4.1 concerned the role of the Conference, though indeed not at great length. He would check whether he had left out any part of its role included in the Convention.

      Reflecting on some of the comments already made, Mr. Farragher said that this project had been going on for some considerable time and it was appropriate now to accept the proposal and get on with the job.

      Mr. Schwartz suggested that the discretionary period and time line should in some way be covered in the Resolution, giving the secretariat some idea of what was expected of them and in what time.

      Mr. Mason was grateful for this suggestion and said that this would be looked at, along with the possibility of editorial changes and other comments which had been made.

      Mr. Algossair thanked Mr. Dunmill for his very clear presentation of the process. Saudi Arabia fully supported the new draft, accepting that it was not perfect but needed some modification.

      Mr. Sanders said that the UK also supported this new revision, firstly because it would definitely help the UK with their secretariat of TC 9/SC 2, secondly because it seemed very neatly to match Objective no. 6 of the Draft Strategy, which was to identify areas for the OIML to improve the effectiveness and efficiency of its work and lastly because it gave CIML Members the opportunity to match the new competence and direction shown by the new President and Director.

      Mr. Tek referred to the voting majority needed for approval and was concerned about the fact that abstentions were not included in the new draft; he felt that abstentions should be included in the voting majority, since this would encourage Member States to take an interest in the content of the publication they were requested to approve.

      Mr. Mason said that he thought that was effectively what the document said.

      Mr. Dunmill explained that the document had tried to align the voting procedures as closely as possible with the rules given in the OIML Convention for CIML decisions, and in those decisions outside the Meeting, abstentions and people who did not reply were not counted. If this needed to be looked at again in the light of the experience of the Working Group, then that should be done. An earlier draft had contained the statement that there were too many different voting procedures for different things, so, although there might need to be adjustments to the majority necessary in different cases, the same basic procedures should be maintained. This was why there was mention of not counting abstentions, but this might be looked at and confirmed or otherwise by the Working Group. A process could only be improved in the light of experience and so they were looking to gain experience of the operation of the system so that it could be polished and perfected.

      Mr. Mason added that what was not being amended at all was the responsibility of the CIML to take a view on the documents which were submitted to it. They were trying to speed up the process by which an acceptable document could be put to the CIML, but there would always be the safeguard that if the document had not been produced in a way that made it acceptable to the CIML then it would not be passed.

      Mr. Carstens said that in the spirit of the Working Group wanting to speed up the processes in the CIML, South Africa supported this proposal.

      Mr. Mason said that he took it to be the sense of the Meeting that there was support for taking this forward but recognizing that there were important reservations by many CIML Members. The vote to be taken the following day would be on the 80/80 basis. The text of the Resolution would also be amended to pick up the points identified on editorial changes, on the task force and the other points which had been noted.

