- number: '5.2'
  title:
  - spelling: eng
    value: Outstanding arrears of Member States and Corresponding Members
  narrative:
  - spelling: eng
    value: |2+

      Mr. Patoray informed the Meeting that there had been some background information in the Working Document. In Article XXIX of the Convention it was clearly stated that if Member States had not paid their subscriptions for three consecutive years they shall be officially regarded as having resigned. So that would give them a particular status at the end of that three year period of not paying any subscriptions.

      Mr. Patoray's research had revealed that occasionally a Member State made a partial payment of the amount due for that year, so that State remained a Member, was invoiced the following year for the full contribution, and thereby carried on despite being in arrears. This system was not consistent over time.

      Some of the minutes of past CIML Meetings showed that decisions had been made on an adhoc basis. Mr. Patoray was not saying that these decisions were inconsistent with the policy, but rather that they were not consistent among themselves. Each individual decision might be different. Mr. Patoray asked the CIML to allow him to open up the question and research the background and history of this item relating to Members in arrears.

      Some Members might have been charged more than three years of contributions so the amount that they owed was unclear, because it could be considered that they had more contributions due beyond the three year limit of when they should have been removed. Some of these Members had requested to rejoin the OIML, and it was difficult to identify the exact amount that they must pay in arrears before they could rejoin the Organization. Before he could make a clear decision, Mr. Patoray needed to understand the whole process that had taken place. He would use both the Convention and past decisions in order to make a consistent and comprehensive proposal in order for the CIML to arrive at a good interpretation of what was stated in the Convention. The BIML would then, as stated in the relevant Resolution, come to the Conference with a proposal for clarifying the situation. He would also ascertain which current Members were in arrears. He knew that at least one of

      these Members had been charged beyond the three year limit, so the amount of money shown on an earlier slide as owed in arrears was probably not correct, based on the existing policy.

      Mr. Patoray assured Members that he would keep them informed of the process in the meantime. This was one of the items which would form part of the secondment project. The items could thereby be reviewed separately and independently and not as part of the normal work of the Bureau.

      Mr. Mason said that he saw here two issues for the Committee. One was the opportunity perhaps of clearing the way for some past Members to rejoin, which would be good. It was also necessary to be clear that a review of this nature could have an impact on individual Members of the Committee, and therefore it was right to take this opportunity to confirm that the Committee wished this work to proceed.

