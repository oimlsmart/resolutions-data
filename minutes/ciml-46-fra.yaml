      Mr. Kool told those present that they would find information about the VIM, International Vocabulary of Metrology, in the Working Document under item 10.6. and in addendum 10.6. The BIML was asking Members to pass a Resolution on the use of the VIM and the VIML the International Vocabulary of Legal Metrology, which was currently being revised in TC1, in order to ensure that secretariats of OIML Technical Committees applied these two publications for their terminology in documents they prepared. The Resolution also gave the BIML the task of monitoring the correct use of these publications. Secretariats should do this anyway, but the Resolution was intended to place some emphasis on it.

      Mr. Klenovský said that this topic had also been discussed at the CIPM Meeting with the BIPM, where Mr. Klenovský had asked the BIPM to be more careful in drawing up the VIM, because the definitions were simply more and more complicated and not understandable for practical metrologists. In some countries various working groups were trying to interpret various definitions and so on. These definitions should be simpler in future.

      Mr. Kool proposed the Resolution.

- number: '10.7'
  title:
  - spelling: eng
    value: The new SI and the impact on legal metrology
  narrative:
  - spelling: eng
    value: |2+

      Mr. Richard said that Mr. Leitner had been intended to co-present this item with him but unfortunately was not present. The presentation would be in two parts. The first part would be an introduction on the revision of the International System of Units, which had been prepared by Mr. Leitner, and the second would be on the possible consequences for practical metrology. He would be omitting some of Mr. Leitner's slides to save time but Members could look at them later as they would be published on the OIML web site.

      Mr. Richard said that he would begin by explaining why the International System of Units needed to be changed. He would speak mainly of the kilogram because this was the main concern for the legal metrology community. This was the unit which was still defined in terms of a material artifact, which was probably not stable. This was also linked to other units of the SI. The General Conference on Weights and Measures had recommended back in 1999 that experiments be carried out for the purpose of redefining the kilogram. The CIPM would finally, the following week, consider a draft Resolution which would present a new definition of the SI. Mr. Richard showed a slide of national representations of the kilogram, to illustrate how these national copies of the International Prototype were drifting.

      This draft Resolution had been mentioned in an earlier presentation by Mr. Henson. Another important document was the draft revision of chapter 2 of the SI Brochure, prepared by the Consultative Committee for Units (CCU).

      Mr. Richard explained why this change was necessary and what changes were proposed. It was the intention of the BIPM to express the definition of all seven base units of the SI in a uniform manner, using explicit constant formulation in which the unit was defined indirectly by specifying explicitly an exact value of a well recognized fundamental constant. With this view, the kilogram would be defined in one of two ways. One was the so called watt balance experiment, where an attempt was made to link electrical power to mechanical power, and an expression of the mass was arrived at based on the Planck constant. The second experiment was the Avogadro project, in which atoms were counted in a perfect silicone sphere in order to get the Avogadro constant which was related to the Planck constant also through this equation. Slides were shown of these experiments.

      So finally the set of fundamental constants was arrived at: the Planck constant to redefine the kilogram, the elementary charge to redefine the ampere, the Boltzmann constant for the kelvin, and the Avogadro constant for the mole. The other constants remained unchanged.

      Mr. Richard showed the preamble in words to the new Resolution. It was stated that each constant was fixed to an exact value, which had still to be defined according to the latest experiments. Mr. Richard showed the kilogram with its current definition and the new one which was a little more complicated. This was the explicit constant definition, related to the Planck constant.

      Mr. Richard did not believe it was necessary to show all the other definitions on the present occasion. Interested Members could see them on the OIML web site version of his presentation or on the BIPM web site. The candela was mainly unchanged but reformulated.

      Moving on to the CCM (Consultative Committee for Mass and Related Quantities), Mr. Richard said that the redefinition of the kilogram was a very important issue and the CCM had laid down some conditions before redefinition, which was the reason why the redefinition was not ready for the current year. The major conditions from the mass community were:

      - at least three different experiments with small enough uncertainties,

      - sufficient consistency between experiments; these were the experiments mentioned above,

      - target uncertainty of $ 2 \times1 0^{-8} $ , and

      - a mise en pratique (to which Mr. Richard would return).

      The present status was that there were two results which were a little smaller than $ 5 \times1 0^{-8} $ This was a mise en pratique experiment on the Avogadro experiment. A recent value for this had been published by Switzerland and also a very recent value was about to be published by Canada and presented in the current week.

      It would still be some time before all the conditions were met.

      A mise en pratique, which was very important for the definition of the kilogram, was a set of instructions which allowed the definition of a unit to be recognized in practice at the highest level. A special pool of artifacts of mass standards, developed by the BIPM, might be needed for this. In fact similar pools would also be available at National Metrology Institutes using watt balances, because these were also needed.

      The new definition had to be considered, together with the mise en pratique, and the mise en pratique of the kilogram was about to be drafted. Mr. Richard was leading a Working Group at the CCM level for this.

      This finished the first part of the presentation.

      The second part of the presentation, Mr. Richard said, would deal with the possible consequences of the redefined SI for practical and legal metrology. Members had heard before, and could also read in the Working Document that the OIML had established a small ad hoc Working Group on the new definitions, consisting of Mr. Ehrlich, Mr. Miki, Mr. Schwartz and himself. The group had later invited Mr. Kühne, the Director of the BIPM, and Mr. Leitner to join, Mr. Leitner being the OIML delegate to the Consultative Committee for Units. The Group's terms of reference were as follows:

      - to inform the OIML about current discussions and proposals concerning the new SI; the first half of the presentation had done this;

      - to initiate an official statement of the OIML community response to Draft Resolution A of the CGPM; the second part of the presentation, now beginning, was to do this.

      The first plenary meeting of the Working Group had been held at the end of May in Switzerland, its objectives being to establish first official contact on this issue with the BIPM, to initiate work to collect information and literature and to decide how to inform the CIML. The BIPM specially welcomed this initiative and the OIML official statement on the possible revision of the SI.

      Mr. Richard showed the Meeting a page of information, already shown by Mr. Henson, which was available on the web site. This contained very interesting information, reference literature and so on. Additional information on Draft Resolution A itself could be found on the BIPM web site, as could the draft for Chapter 2 of the new SI Brochure. All this had already been said and presented. Richard Davis of the BIPM had written a paper on the "Proposed change to the definition of the kilogram, Consequences for legal metrology", which would be published in the October 2011 OIML Bulletin.

      Regarding the consequences for practical legal metrology, firstly, the following week, the CIML President would mention the OIML explicitly in the CGPM because the OIML had to be consulted. Secondly, the Members of the Committee were invited to consult all stakeholders in their countries that represented legal and practical metrology in order to receive the broadest possible feedback on the ideas presented in this draft Resolution A of the CGPM. As this was not the final version, the OIML had enough time to present its comments.

      The Working Group would invite all the TCs and SCs to send comments about possible consequences of the new SI in their domains. This concerned especially TC 2/SC 9, TC 9/SC 3 and TC 11, but all Committees were invited to comment.

      Finally, there would be a Resolution of the current Meeting on the issue.

      Regarding the time schedule, Mr. Richard said, all comments were expected before the end of February 2012 so that they could be reviewed at the next Presidential Council Meeting in March. A detailed review would be made by the Working Group in April and the OIML statement would be submitted in June for the 2012 Conference and Committee Meeting. Preparation of a second article for the OIML Bulletin on the official OIML official position would be made just after June.

      Finally, there was the CIPM, and also the Consultative Committee for Units in October, where Mr. Richard would be able to present the official OIML position. He concluded by saying that there did not need to be a single statement, but it would be very useful to have as many opinions as possible from TCs and from Members, from their different fields, to report to the CIPM.

      Mr. Miki asked whether the new SI would have any effect on OIML activities. If so, they should be very careful.

      Mr. Richard replied that he did not want to answer in place of the TC, but that if the recommendation of the Consultative Committee for Mass and Related Quantities was appropriate he did not expect any effect on the metrology community, especially in the mass field, because if the constant was defined with sufficient accuracy he expected the mass scale to be very stable and very continuous and they did not expect there to be changes which would affect OIML. In fact, this was also the objective of the CCM Working Group, to send a strong enough Recommendation before the change.

      Mr. Mason thanked Mr. Richard for his helpful and informative presentation.

      Mr. Kool pointed out an error in the Draft Resolution in the Working Document, where what had been written as "TC 12" should in fact have read "TC 2".

