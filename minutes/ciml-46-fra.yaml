- number: 7.2.1
  title:
  - spelling: eng
    value: Presentation by the BIPM (See Annex 1)
  narrative:
  - spelling: eng
    value: |2+

      Mr. Henson (BIPM) thanked the OIML for the invitation to speak in Prague. He was standing in for his Director, Michael Kühne, who was attending the CIPM Meeting that week in Sèvres.

      Mr. Henson said that he would not describe what the BIPM was, as those present would know that already. Anyone who wanted to know about the role of the BIPM could ask him outside the presentation. His focus would be on topical issues.

      A key moment for the BIPM had been the change of BIPM Director at the beginning of 2011. Andrew Wallard had retired after some eight years at the BIPM and six years as Director and Michael Kühne had become Director. Mr. Kühne was previously the Deputy Director and Director Designate at the BIPM, prior to which he had been on the presidential staff and a career metrologist at the PTB, and also Chair of EUROMET. Luis Mussio, the JCRB Secretary, had also left the BIPM (where he had been on secondment from LATU, Uruguay) and had been spirited across Paris to his present position at the BIML. The post of JCRB Secretary has once again been filled by a secondee, Omer Altan from UME in Turkey.

      Secondment was used a lot in the BIPM, particularly in the scientific positions. Dr. Takashi Usuda (NMIJ) was at present doing some work on impact analysis which would be completed later in the current year.

      Many of those present might know Richard Davis, who had led the BIPM's Mass Section for some years; he had taken retirement from the BIPM and Alain Picard had become Director of the Mass Department. Mr. Davis continued to work part time for the BIPM as a consultant.

      The Metre Convention requires that the President of the CIPM and the Director of the BIPM be of different nationality. Professor Gobel had therefore stepped down as President of the CIPM in October 2011, though he remained in the CIPM, and Barry Inglis from Australia had taken over the Presidency. Some routine changes could be seen on the CIPM.

      Membership was going well, with 55 Member States and 34 Associates. In 2010 there had been five new Associates and also one Associate, Kenya, had become a Member State. In 2011 there had been another two Associates and another new Member State, Saudi Arabia. The situation was quite dynamic with much interest being generated, and Mr. Henson spent much of his time helping countries to understand the benefits and the process and facilitating the engagement. He and Mr. Dunmill exchanged information on how things were going and sometimes looked after each other's interests also, and indeed Mr. Henson always ensured that States understood the importance of engaging with the OIML.

      All the BIPM's active Member States, with the single exception of Venezuela, had signed the CIPM MRA. There are also four countries which were inactive (and did not even pay their contributions) which were not participating in the CIPM MRA. The status of Associate of the CGPM had been created to enable States who were not yet ready to join the Metre Convention to participation in the CIPM MRA. Thus as would be expected all of the Associates except Montenegro were participants, and Montenegro was expected to sign the CIPM MRA the following week during the General Conference in Sèvres. This again was a dynamic situation with good progress being made.

      CIPM MRA participation was going well, though much more slowly on the African continent and even there things were beginning to move forward. The previous year there had been virtually no participation in Africa but this situation was now improving with now three Member States and seven Associates (including the Seychelles and Mauritius who are both Members of AFRIMETS).

      The topical project for the BIPM at the moment was the possibility of a new regional body for the one remaining area which did not have one, which was the Gulf/Middle East region. This was a challenge, as the lack of capacity in the area meant that there were few people with the necessary technical expertise. Sufficient critical mass of expertise is needed to operate a viable RMO within the meaning of the CIPM MRA, for example to participate in and lead technical committees, to review CMCs, etc., but progress was being made. The situation was sensitive with different grouping wishing to lead such a body, with the BIPM being careful to ensure they were fairly treated with respect and diplomacy. But without doubt the principal problem was the shortage of expertise. Mr. Henson expected that there would be further discussion on this at the JCRB meeting in March. Like the OIML, they were constantly talking to a number of countries, at various levels of engagement. These discussions indicated that a number of Gulf/Middle East countries were organizing themselves following Saudi Arabia's accession and were considering either becoming a Member or an Associate in the coming year or two. There were also promising discussions with a number of countries in other regions.

      While Mr. Henson always said that in his view every country should join in the activities of the OIML, it was not necessarily the case that developing countries with only the most basic weights and measures capability would get general benefit from participating in BIPM activities. Mr. Henson and Mr. Dunmill were both on the steering committee of the AFRIMETS road map, where it was expected that a small number of countries would participate in BIPM activities in the next years, but it was not realistic to suppose that every country in Africa would make sufficient progress to effectively participate in the Metre Convention in the foreseeable future.

      Operating the CIPM's MRA involved not just signing but a considerable amount of technical activity, information from which was entered in the key comparison database operated by the BIPM. Part of that activity required the NMIs to have a review of their quality management system. Interestingly, the BIPM was not a signatory of the CIPM MRA, which was an MRA between national metrology institutes. However the BIPM followed a quasi equivalent system, in which each of their science sections was subjected to external peer review by experts from the leading NMIs round the world (so somebody would come in and review their electricity section, their radiation section, and so on). Periodically, however they also asked for a global system review, which looked at the management system per se rather than the science sections. Mrs. Ajchara Charoensook (NIMT, Thailand) had just completed a global audit of the BIPM. Mrs. Charoensook, who had headed the quality technical committee in APMP for a number of years, is a fully qualified auditor as well as head of a science section at

      NMIT. Mr. Henson was delighted to say that while she had made a couple of observations she had found no non-conformities.

      The BIPM was finding it a challenge to gain agreement for even simple updates to the CIPM MRA such as the outdated references (e.g. to ISO Guide 25). This update was out with the signatories but remembering there could be no "no" votes among more than 80 signatories there was always a risk that one or two countries would not support the change for one reason or another.

      The BIPM's main event during this reporting period was the General Conference on Weights and Measures (CGPM), typically held once every four years, which would take place the following week. As well as looking at the BIPM program of work and their budget, there were a number of draft resolutions, to be discussed and voted. There was a heavy agenda. Three of the key draft Resolutions were:

      - Possible redefinition of the SI. Most people probably knew about this already. It was important to note that this was not the actual redefinition, but a note as to how it might be redefined at a future time. It could not be changed at the moment because there was not adequate convergence of the scientific results. If all went well, the actual redefinition might perhaps be voted in at the next General Conference and come into force the year after. However, all this depended on how the science panned out. Mr. Henson understood that there would be an article on this subject by Richard Davis in the October 2011 OIML Bulletin, showing the implications for the OIML community.

      - The CIPM was planning to change the way in which it dealt with their Associates to better reflect the benefits and real division of cost between Members and Associates. This would have two effects: it would raise the lower threshold for Associates, and it would state that after a period of time and when an Associate was fully engaged in the CIPM MRA, it should start paying its true cost and rather than the subsidized rate. The increase would be in steps over a five-year period. This was also a mechanism to encourage Associates who had the capability and were fully engaged to become Full Members. The original assumption had been that Associate status would be transitional only, and that States would voluntarily make the transition to Member States when their capability warranted the change, but this had frequently not come about.

      - A key discussion point and draft Resolution reflecting the general view of the CIPM, the BIPM and the Member States was that it is time to look at a longer term strategy for the BIPM and also time to review the governance processes for the BIPM..

      Mr. Henson explained that the BIPM was engaged to a greater or lesser extent with almost 40 organizations, which he would not list due to time constraints. The OIML was perhaps the most important of these liaisons, which was revealed by the fact that he was present at the CIML in the week of the CIPM meetings, and the week prior to the General Conference. He confirmed that the staff of the two Organizations worked extremely well together, on a more or less daily basis. Those things that the BIML had been called on to do at the previous year's CIML were most certainly being done. World Metrology Day had been an example of a very integrated effort, with able support also from the PTB, and with excellent results. The theme for 2012 would be Metrology for Safety, allowing countries to feature the sub-themes which interested them most.

      Mr. Henson said that he hoped that his whistle stop tour had given OIML Members a flavor of the BIPM's year and had reassured them that the BIML and the BIPM were working together effectively and efficiently. He would be happy to answer any questions they might have.

      Mr. Mason thanked Mr. Henson for his full and clear presentation and referred to the item on cooperation between the two Organizations which would take place later that day.

      Mr. Richard made two remarks: the first was that there would be further discussion on the subject of redefinition of the SI; the second was that the position of Director of the BIPM was currently open. He was pointing this out because he felt there might be potential candidates in the room. Mr. Henson confirmed that this was the case, that the information was on the BIPM web site, and that the closing date for applications was December 1.

      Mr. Henson agreed that there would be a wide variety of views at the CGPM not only on the redefinition of the SI but also on the other topics he had mentioned. He reminded the audience that he had been discussing draft Resolutions which might or might not be amended, and would be subject to voting which would determine their adoption. He confirmed that the post of next Director had been advertised; this was a very long process as Mr. Kühne was due to retire in March 2014 and already his successor was being sought. The post was advertised on the BIPM web site with a closing date of 1 December, for appointment in early 2013. All those interested were invited to apply. Normally the successor was appointed a year or so before the retirement of the outgoing Director and served the intervening time as Director Designate and Deputy Director to allow the candidate to learn the process before taking office.

      Mr. Patoray confirmed that the advertisement for the post had been received at the BIML.

      Mr. Birch referred to recommendations adopted by the CGPM in 1999 and 2007 on climate change, and the BIPM had had a major meeting with the World Meteorological Organization about a year previously. He asked whether Mr. Henson could make any comment on the position of metrology and climate change.

      Mr. Henson replied that the BIPM had indeed held a very large joint workshop with the WMO in the spring of 2010. This had led to a series of recommendations to improve the quality of measurements in climate change. In July 2011, with the direct support of the BIPM Director and the Secretary General of the WMO, a Joint Liaison Group had been established, with responsibility to go through those recommendations and try to facilitate activity to address the specifications therein. This Joint Liaison Group had met once and it had become clear that many of the recommendations were rather generic. The WMO had gone away to try to specify more precisely what needed to be done. They were expected to complete this task shortly, and a meeting had been provisionally scheduled for February 2012 to follow up that action. Mr. Henson had Secretariat responsibility for the BIPM end of the Liaison Group, overseeing those recommendations to try and make sure that action was taken. In some areas this was being accomplished very well, and the links were good; in other areas the community was not so well engaged and it would be necessary to help the process along.

      Mr. Birch said that he had heard that some temperature measuring equipment and procedures were not up to par. He wondered to what extent Mr. Henson could see the OIML having any involvement in that area, due to its own Recommendations on such equipment.

      Mr. Henson replied that he would need time to reflect on this question as he had not thought of the problem in terms of the OIML.

      Mr. Algossair thanked Mr. Henson for his talk. He believed that cooperation between the BIPM and the BIML should continue to be extended; he was also grateful that the meetings of the CIML and CIPM followed immediately one after the other, and hoped that a similar arrangement might prove possible in future years, so that delegates who had traveled to one could also attend the other. He also asked for details of the relations between the IEC and the BIPM.

      Mr. Henson replied that the IEC and a few other liaisons had only been omitted from his list for the sake of brevity.

      Mr. Algossair considered that the IEC was very important and should always be mentioned in conjunction with ISO.

      Mr. Henson agreed, adding that the BIPM's Electricity Section also engaged with the IEC at the technical level.

      Mr. Algossair commented that Saudi Arabia had become a Full Member of the BIPM and had also arranged to liaise with seven of their neighboring Gulf countries to form GULFMET, and also ARABMET would be coordinated within the next few years.

      Mr. Harvey said he had been interested to see that early in his presentation Mr. Henson had made reference to an economic impact study in metrology being carried out by Dr. Takashi Usuda; he presumed that this would take into account a similar study carried out by NIST. Mr. Henson replied that Dr. Usuda had been in touch with NIST and others with similar interests, and intended to publish a paper about the end of 2011.

      Mr. Mason thanked Mr. Henson for his presentation and was very pleased at the good communication between the two Organizations.

- number: 7.2.2
  title:
  - spelling: eng
    value: ILAC/IAF presentation (See Annex 2)
  narrative:
  - spelling: eng
    value: |2+

      Ms. Merih Malmqvist Nilsson, on behalf of ILAC and the IAF, began by explaining her names: she was normally known as Mary but her first name was in fact the Turkish one Merih. She had been born and brought up in Turkey and her two surnames, which most people also found difficult to pronounce, were Swedish, and acquired through marriage.

      Ms. Malmqvist Nilsson said that she was going to update Members on developments within ILAC and the IAF. She would do this in her role as ILAC Vice-Chair. She also had other roles, her everyday one being her work with SWEDAC, the Swedish Board for Accreditation and Conformity Assessment, where she was Director of the International Secretariat.

      Ms. Malmqvist Nilsson assured members that these organizations had a global vision. This could be summarized as "Tested, inspected or certified once and accepted everywhere". She knew that many people made jokes on this, but it was their vision. Sometimes there had to be a far off aspiration towards which one was striving.

      As of 30 August 2011, ILAC had 72 Full Members, i.e. those who had signed the ILAC Mutual Recognition Arrangement. These represented 59 economies. They also had Associate Member categories, Affiliates, and Regional Cooperation bodies which organized their members, and 26 Stakeholder Members. Their signatories represented countries which covered 95 % of the global GDP, and the membership covered 40 000 Accredited Laboratories and 6 700 accredited inspection bodies. 77 % of regulators accepted results from their accredited organizations and they were looking forward to launching their Inspection Arrangement in 2012.

      Associate Members were those bodies which were ready to apply to be peer evaluated whereas Affiliates had just started their activities; they did not yet meet all the requirements but were working towards that.

      Regarding the status of the IAF MLA, they had 49 MLA signatories representing 47 Economies. Here also, Members were organized into regional co-operations. 47 accreditation bodies were active in the field of QMS certification accreditation, 41 in the EMS area, and then two further areas were being developed: the food sector and the ISO 27000 series of

      standards (on ISMS, Information Security Management Systems). Thirty-eight Accreditation Bodies were active in the product sector and were part of the MLA, and a Person Certification MLA was under development.

      The Regional Cooperation Bodies were shown on a slide; these were:

      - EA for the European continent,

      - PAC for Pacific cooperation on the certification side,

      - APLAC for Asian Pacific cooperation on the laboratory and inspection side,

      - IAAC which organized accreditation bodies in both American continents, and

      - SADCA, the Southern African Development Community Accreditation.

      Since April 2011 there were two more bodies which were not shown on the slide: AFRAC, which organized the African region, covering the whole of that continent, and ARAC, which organized the Arabic speaking countries. The President of both of these was the Head of the Egyptian Accreditation Council, Mr. Hassan Shaarawi and their Secretariats were in Egypt.

      On the subject of the basis of the recognition arrangements, Ms. Malmqvist Nilsson pointed out that all those present were part of a system which worked together. If one of the parts was taken away, the system no longer worked. The Recognition Arrangements of ILAC and the IAF were based on international standards by ISO and the IEC against which the competence of the assessment bodies needed itself to be assessed and against which they had to be verified. The top level standard applicable to the accreditation bodies was ISO/IEC 17011, which was the basis of the Arrangement. Then there were Harmonized Implementation Documents, which was where the fairness of the system came in; all must work together to implement the rules in the same manner. There was a peer evaluation system with trained evaluators, which was how it was decided whether or not a body was entitled to sign the MLA, and finally there was an independent decision making process, where the people who had been involved in the actual evaluation and assessments were not involved.

      There were of course benefits in this for regulators, for business and for consumers. The benefits might differ but they were all there. They gave a tool to the actors of the market by which they could feel assured that the conformity assessment processes had the quality required of them and that technical barriers to trade were not created by devising different rules in different countries.

      ILAC and the OIML had a Memorandum of Understanding because they realized that they had a lot in common. There was added value for users in the fact that they cooperated in areas in which they both worked. They had a Joint Work Program; they were working on a Joint Assessment Procedure; and they were planning to have training activities together for their Assessors. They were also planning to have a common communication to the market so that they were understood in the same manner, and they were reviewing common documents such as the one on calibration intervals, which had, as explained earlier, been developed together but published with two different names but the same content. ILAC documents could be downloaded free of charge from their web site.

      Cooperation between the IAF and the OIML had started later. There was now an MoU and members would be kept informed as the Joint Work Program developed.

      Common denominators or shared views on certain issues between ILAC, the IAF and the OIML included the fact that all were working towards a level playing field with fair conditions for all parties, including producers, conformity assessment bodies but also consumers. They all wanted to promote free trade, and eliminate technical barriers to trade; they were all active in the arena of conformity assessment; they were all interested in

      traceability of measurements. Listening to the BIPM had been like listening to a higher power, because that was where it all came from. They all wanted to minimize costs and workload for the actors on the market and they wanted to achieve market confidence.

      Accreditation was regarded in many countries and some regions as being the top level of the pyramid of the conformity assessment chain. This was why accreditation was used by many actors in the area who did not want to have their own auditing system but wanted to rely on third party assessment of conformity assessment bodies. This was where accreditation came in, and to ensure that it was done properly the peer evaluation process existed. Beneath that there were the conformity assessment bodies which they accredited and which worked to international standards. And then at the base of the pyramid came the providers of products and services. These could work to standards, to regulatory requirements or they could have their own private sector schemes.

      Aside from this pyramid, there remained governments, consumers and purchasers, by which Ms. Malmqvist Nilsson meant businesses trading with each other. The role of the accreditation community to which those present belonged was to build trust and assurance at that level. That was what all the elements of the pyramid should be building towards.

      Recognition was important at all levels of the chain. The persons on the end of the purchasing chain had the prerogative to recognize or not certificates from different parts of the world. It was the job of accreditors to make sure that this happened.

      All this sounded very nice but there had to be a catch. The catch was that all these agreements were voluntary. Except in one specific region, there were no rules that forced their acceptance. Users of reports and certificates did not have to accept the results of the MRA/MLA and therefore the results of the accredited camps. There were many dishonest players on the market and as the accreditation bodies were not police forces there was not much they could do about that. Even when misuse was detected, it was sometimes difficult to take legal action. Some countries were changing their legal framework in order to be able to take legal action if the system was misused. In other words, they were not supposed to relax.

      Having listened to the morning's speakers, Ms. Malmqvist Nilsson said that she wanted to add a developing countries' perspective. She led the SWEDAC work on aid to developing countries and was a supporter of them. In the systems created by accreditation bodies, some needed to be talked about in this context. One was that developing countries had a heavy workload, with limited trained personnel; they were being exposed to too many systems with different requirements and there were many aid projects going on in the same area at the same time. There were difficulties in meeting the import requirements of industrialized countries, many different systems were being imposed and these countries really did need a level playing field.

      Her final appeal to Members would be that all of them, ILAC, IAF, OIML, BIPM, all those who were involved in the conformity assessment arena, should consolidate their vision and processes and use the available systems, the ones that were already in function and working properly, as much as possible, because that would decrease the workload of developing countries.

      Ms. Malmqvist Nilsson thanked the OIML for inviting ILAC and IAF and Members for listening to her.

      Mr. Mason thanked Ms. Malmqvist Nilsson for her interesting and relevant presentation.

      Mr. Algossair asked what had become of the project for merger between ILAC and the IAF.

      Ms. Malmqvist Nilsson replied that it had not come to fruition. Each organization had sought some unattainable features from the other and the final vote in 2009 had been against merger. They were, however, working more and more together in order to decrease the workload, and perhaps one day the merger would take place by symbiosis without anyone even noticing it. Forcing had not worked, so softer methods were being used. For example there were joint executive meetings, joint General Assemblies, a Joint Marketing and Communications Committee, and a joint MLA decision making body, so they were moving towards each other step by step.

      Mr. Mason commented that he felt there were lessons to be learned from this.

- number: 7.2.3
  title:
  - spelling: eng
    value: CECIP presentation (See Annex 3)
  narrative:
  - spelling: eng
    value: |2+

      Ms. Veronika Martens told Members she was pleased to be able to give them some information about CECIP and the items it was currently interested in, both what was happening in Europe and what was under discussion at the OIML.

      CECIP, Ms. Martens explained, was the European Organization for the Weighing Industry. Members of the Organization could not be manufacturers directly but could only be federations from countries, each country being allowed a single federation. Up to the present, there were 15 member national federations, covering about 700 manufacturers of weighing instruments and, of course, load cells and weights. These were altogether responsible for about 3 billion, according to figures from 2008, and about 50 000 employees. They also spoke for an estimated 4 000 to 5 000 micro companies with about 10 000 employees. Their market, which was global and not merely European, covered more than 50 % of the total volume of world-wide trade.

      The objectives of CECIP included:

      - promotion of a high quality standard in the manufacture of weighing instruments;

      - cooperation with the metrological services in the establishment and in the amendment of the regulatory environment;

      - reduction of the technical and administrative regulations relevant to weighing instruments, to those requirements which were necessary for the prevention of harm to users;

      - harmonization of national regulations and the use of established international standards in order to eliminate barriers to cross border trading of weighing systems;

      - ensuring that national and international requirements did not prevent the development of new weighing technologies;

      - liaison with national and international organizations concerning all aspects of legal metrology including consistent interpretation of requirements;

      - promotion of a good understanding of modern weighing technology, especially in developing countries; and

      - ensuring fair trade practices by all weighing instrument manufacturers in the world.

      As a result, CECIP was very active in Europe and in its relationship with the OIML. Adoption of the new European legislative framework was still ongoing for the Measurement Instruments Directive (MID); as she had explained in more detail the previous year, there were different additional requirements for all stakeholders.

      Another topic of major interest in Europe, not only for CECIP but also for anybody importing measuring instruments into Europe, was revision of the MID. This had now moved a step further, with many changed items and annexes under discussion, only a few of which seemed likely to be included in the revision in the next few years.

      A standardization project of interest was revision of the harmonized European standard for the Directive relating to non-automatic weighing instruments. The aim with this was to reach conformity with OIML R 76:2006. It was not yet clear at what date this would come into force, possibly late in 2013 or in 2014. The important thing was that the European Commission planned already to have one requirement in anticipation, namely the EMC immunity requirement for radiated interference, for which the test level was due to be increased from 3 V/m to 10 V/m, as in the current OIML R 76. It was planned to bring in this requirement very shortly or immediately for EC type approval certificates, but the length of the transition period was still under discussion. It needed to be made clear how long people could put into the market instruments with the old type approval certificates; manufacturers who exported to Europe needed to be informed of this, as it applied to imported instruments as well as those manufactured in Europe, because the transition period might be short, possibly only a year.

      The above applied to what was happening in Europe. On OIML activities, Ms. Martens said she would make only three points, out of the many which were of interest to her Members:

      - revision of OIML R 60, concerning load cells: at the last CIML Meeting, CECIP had asked the TC concerned to ensure that the revised requirements in this Recommendation were in conformity with R 76 and R 51. There were several requirements concerning EMC, stability and others. Manufacturers considered this to be very important because, whether in their country they worked with a modular system, as in Europe, or tested complete instruments, if a load cell was bought from a load cell manufacturer and given to an Issuing Authority for testing, it was undesirable to then discover that this load cell did not meet requirements. R 60 Certificates were very important but if they were to retain this importance they must stay in conformity with regulations wherever in the world they were bought. If requirements under R 60 were not at the same level as those for R 76 and R 51, these Recommendations would not retain their high reputation;

      - voluntary quality management under OIML supervision, OIML CTT, was another subject of interest to CECIP, Ms. Martens continued. Among CECIP objectives were quality and fair competition. CECIP, therefore, supported conformity to legal requirements in general and on a high level. If it was not possible for these to be followed, then why, she asked, did such requirements exist? On the other hand, several questions had to be answered before it was possible to judge whether a voluntary system, with an OIML voluntary CTT was acceptable or not. One was whether, since the OIML had no legal rights in countries, in the case of voluntary conformity, it was possible to achieve legal conformity if there was non-compliance. Asking for an OIML CTT supervision implied costs, for the quality system, audits, etc., but competitors who had never heard of the OIML did not have these costs. Their national rules for type approval certificates might be more lax and they could produce a much cheaper product. Where then was the added value for users of the CTT? If the OIML found a workable system which was equal for all and which met the highest standards, CECIP would support it, but a manufacturer had to be able to see what added value he was getting for his additional costs. Fair competition was most important;

      CECIP was also interested in whether manufacturers' test laboratories under the MAA were better recognized. This meant testing done in manufacturers' own laboratories under supervision from an Issuing Authority and under OIML requirements. Up to the present, they had followed six years of discussion, including CIML Resolutions, of drafting requirements and additional requirements. It had always been clear that such a laboratory had to follow all the requirements applying to all test laboratories, but also additional requirements, making it in some cases even more demanding than for metrology laboratories. Members might know that two years previously two positive audits from OIML MAA auditors on manufacturers' test laboratories had shown very positive results. These manufacturers had been checked and had had to follow every item on the checklist of those laboratories that were already recognized under the MAA. It was clear that some CECIP manufacturers were interested in having such recognized laboratories. There was, however, another point of view, and it seemed to CECIP that it was important for the OIML to understand this. It was not possible to ensure that all the things they were asked to do would be carried out and supervised all the time. It was the same with manufacturers. The OIML should take the opportunity to educate manufacturers in the detailed requirements that such instruments had to meet and qualify them in legal metrology instead of just putting in a checking system. This would give the manufacturers the incentive of qualification, rather than just increasing costs. CECIP thought this might be an opportunity for the CTT idea because it was the only way of making manufacturers able to supervise their own production. This was a big problem because many manufacturers did not have laboratories capable of operating the whole range of checks carried out by metrology institutes. But a manufacturer of approved instruments needed to be able to know the entire range of requirements and check them out itself, at the beginning of production, during production or at any time. The important thing was for a system to be built up under MTLs to be recognized under the supervision of an Issuing Authority. They would learn from the OIML, which would always know what they were doing and be able to supervise them at any moment. They would have much more information than by having one or two symbols. This was the only way the OIML could improve manufacturers' quality. This would give chances for the manufacturers' own economy because again people who were able to verify could produce quality. Why did CECIP support this? One reason was that CECIP was interested in quality and in verification and wanted a return on investment, but also Europeans had been learning for many years that, even under CECIP and with shared goals, they were competitors. Industry usually knew what their competitors all over the world were doing and whether their goods were up to standard or not, and they realized that they could have much more confidence in the products of competitors who knew all the requirements and who had established such laboratories, of which there were several in Europe and elsewhere. This seemed to CECIP to be the only scheme which offered a chance of global fair competition, with the chances of success being much greater than the risks. The OIML now needed to decide what to do with this key to the future, and whether it would throw it away or use it. Results should only be accepted from laboratories which were supervised by an OIML audited Issuing Authority. She urged Members to vote for this in the Resolution on item 10.3.3 so that there was a hope of implementing requirements for MTLs in B 10, and possibly voted by the CIML in 2012.

      Mr. Mason confirmed that the issues of Conformity to Type and Manufacturers' Test Laboratories would be discussed the following day. He thanked Ms. Martens for her useful input and asked for questions to CECIP to be limited to the first part of her presentation, with discussion on MTLs and CTTs being saved for later.

      Mr. Klenovský asked Ms. Martens what transition period she thought would be appropriate for the revised NAWI requirements.

      Ms. Martens replied that CECIP considered that one year was too short and the minimum for manufacturers all over the world should be three years. Several things remained to be done. Some instruments which had already been manufactured fulfilled the requirements but had not yet been tested and only had type approval under the old system. The other thing was that manufacturers, especially small ones, had the problem that they needed to do research and change their instruments. The other reason for needing a transition period of more than a year was that many manufacturers would apply for new certificates in the last month or two of that time, and the Notified Bodies would not be able to process them fast enough.

      Mr. Mason commented that this insight had been useful and was a subject for more intensive discussion in the framework of the European Commission. He thanked Ms. Martens and hoped she would be staying for the debates of the following day.

- number: '7.3'
  title:
  - spelling: eng
    value: Report on the Round Table with Regional Bodies
  narrative:
  - spelling: eng
    value: |2+

      Mr. Pavel Neyezhmakov, Head of the Secretariat of COOMET and this year's Round Table chairman, first thanked the Czech hosts for the excellent meeting arrangements. He told Members that the Regional Organizations present had been AFRIMETS, APLMF, COOMET (Chair of the Round Table), GULFMET, EAMET, MAGMET, SADCMEL, SIM and WELMEC.

      22 people had participated; the attendance list would be made available on the OIML Workgroups web site, as would the presentations given by the Regional Organizations on their new initiatives and activities since the previous meeting, together with the report he was currently giving.

      The participants at the Round Table had agreed:

      - to develop their common and complementary activities more actively;

      - to reflect regional needs in the annual reports of the RMLOs, supported by the OIML or by other Regional Organizations, addressing specific problems in legal metrology such as documentation, training programs, regional surveys, methodology, consultations, etc.;

      - to request the OIML to carry out actions which were considered important at the request of Regional Legal Metrology Organizations and to contribute actively to these identified actions;

      The Round Table had recommended that the Regional Legal Metrology Organizations use the Round Table web page and the OIML web site more actively as a forum for discussion on joint actions, to provide information, and to use the pages for the exchange of ideas.

      The Round Table had asked COOMET, in cooperation with WELMEC, to prepare a questionnaire to ascertain the needs of the Regional Organizations in providing support, training and workshops for developing economies.

      The Regional Organizations would designate responsible representatives to prepare the answers to this questionnaire and COOMET, with WELMEC and the BIML, to propose items for the BIML work program, based on the result of the enquiry. They asked the BIML to prepare a report on these items for discussion at the next Round Table meeting the following year.

      The Round Table had called for continued exchange of information and coordination of joint action and the Regional Organizations recommended participants at the following year's Round Table to make changes in the terms of reference concerning the duration and authority of the Chair of the Round Table.

      In conclusion, Mr. Neyezhmakov said that it had been a pleasure for him to chair the current year's Round Table. He hoped that the discussion and proposals would be a great success. He thanked all delegates for their attention and participation.

      Mr. Mason thanked Mr. Neyezhmakov for his excellent summary of what for him had been a very interesting and productive discussion. He felt that there had been recognition that the Round Table format needed to go beyond just taking reports about what each of its constituents had been doing, and that it should look at ways of continuing to contribute to the development of ideas. He considered that a number of the ideas coming forward were very relevant to assisting developing countries, and that the thinking behind the proposal for a questionnaire had been to gather up these ideas so that they could feed into the OIML's planned response to some of the questions raised earlier in the day by Dr. Seiler.

      Mr. Mason confirmed that Mr. Neyezhmakov was prepared to continue to coordinate this work for the coming year, and was doing so voluntarily. He added that it was envisaged to change the terms of reference so that the next Chair of the Round Table would be obliged to continue to act as coordinator for the year after he had chaired the meeting. This was the significance of the change in terms of reference.

      On the point about the need to maintain momentum, he hoped that it would be clear in the relevant Draft Resolution that these ideas were seen by the OIML as things which needed to be captured and fed into the work program between the present moment and the following year. There should be a lot to report by the following year because, hopefully, by then a lot would have been done. He read out in broad terms what he planned to add to the existing draft Resolution, which was: "The Committee accepts the recommendations of the Round Table, addressed to the CIML, instructs the Bureau to pursue those Recommendations and report on its progress at the 47th Meeting and invites the RMLOs to take up the recommendations addressed to them". This, or something like it, was the text which would be discussed on the coming Friday.

      Mr. Mason thanked Mr. Neyezmakov both for the work he had already done and for that which he would be undertaking in the coming year.

- number: '8'
  title:
  - spelling: eng
    value: Report on cooperation between the BIML and the BIPM
  narrative:
  - spelling: eng
    value: |2+

      Mr. Patoray expressed his appreciation to Michael Kühne for his input on the presentation he was about to deliver. Many of the slides he would use belonged to Mr. Kühne and much of the information came from a previous presentation by Mr. Kühne on the same subject.

      Mr. Patoray said there had been many changes in personnel, with new Presidents and Directors on both sides. There was also a new International Liaison Officer, Mr. Henson, and Luis Mussio had transferred from the BIPM to the BIML. With new people, many fresh and exciting ideas were coming forward. It would have become clear already that much communication and dynamic was taking place. The Directors met quarterly on or off site, and staff also traveled between the two offices to ask or offer help on particular topics. Areas being dealt with included:

      - World Metrology Day had given rise to much activity and all the information on it had been transferred from the BIPM to the BIML; Mr. Mussio had been influential in this

      process because he had previously had responsibility for the project at the BIPM. Information had been downloaded seamlessly and coordinated messages had been published;

      - the BIPM had offered support to the BIML as it worked on its new IT system;

      - the BIPM had helped the BIML to acquire the correct APE code;

      - the BIML had consulted the BIPM Staff Regulations and used them to help with drafting the revision of its own Staff Regulations. The BIPM document had been a good (but not exclusive) source of ideas;

      - the BIML and the BIPM had worked together on thematic information for the dual web site portal Metrology Info (www.metrologyinfo.org), reflecting both the legal and the scientific sides of metrology. Members who visited that site would see that it was different in kind from the BIPM and OIML web sites and allowed for more editorial freedom;

      - Mr. Dunmill and Mr. Henson had worked together on an integrated seminar;

      - there had been joint working with AFRIMETS;

      - the BIPM had also provided assistance on input to the revision of OIML D1 Law on metrology;

      - the consequences of the new definition of the SI had been discussed and there would be an article on this in the October 2011 Bulletin;

      - discussions had begun on grain moisture, the measurement of which was very important in the trading and storage of grain, but for which there was no physical standard for the devices used to measure it;

      - there was input on the VIM and the GUM,utilizing it better in OIML publications;

      - regarding possible co-location, which, because of the short time he had worked at the BIML, was the only matter he would speak of in detail, Mr. Patoray had provided the BIPM with a basic list of requirements for space, meeting rooms, facilities, power, IT infrastructure, access to food and other services in the BIPM's isolated situation and everything else that would be required by BIML staff, so that the BIPM could assess its ability to provide the required facilities. Mr. Kuhne had indicated that they would begin work on this project shortly after their Conference the following week. Until the BIPM described a space Mr. Patoray could not estimate what the cost of moving into it might be. It could be a simple question of putting up a few partitions or it could be a total disruption and rebuilding. As far as the benefits of co-location were concerned, Mr. Patoray said there could be intangible advantages to a joint location, such as being able to contact the other organization on a regular basis instead of traveling to and fro, but he did not feel co-location was in any way mandatory in order for joint working to be successful, as it had already been shown that working more closely together could be (and indeed was being) done. If and when it had been determined that a move was possible, work could begin on analyzing the costs and determining the true benefits. As Members had heard earlier, ILAC and IAF had gone through a similar process of determining how they could work together or merge and they had come to the conclusion that working closely together was the best option for the moment. Mr. Patoray said that he had taken a particular interest in this item because he had had similar discussions with the BIPM. He expected to have more information on this subject the following year.

      To sum up, the two Organizations were working together on a regular basis. Mr. Patoray said that he would be pleased to answer any questions.

      Mr. Mason added that much of what Mr. Patoray had said had been drawn from a presentation given by Mr. Kühne to the BIPM Member States, at which meeting Mr. Mason had been present.

      Mr. Johnston reminded Members that at the 44th and 45th CIML Meetings there had been the same Resolution, for the BIML to present to Members a draft report relating to a possible rapprochement between the two Organizations. The recommendation had requested the formation of a Working Group. This had indeed been set up, its members being Roman Schwartz, Yukinobu Miki, Philippe Richard and himself. A report had been produced and sent out to Members for information and comment. It had contained the recommendations that:

      - staff at the two Organizations should work together on a daily basis;

      - co-location should be considered;

      - a joint presentation on possible forms of rapprochement should be prepared for the 2012 Conference.

      Mr. Johnston believed that a number of things had changed since this discussion had begun. He had read Mr. Kuhne's presentation and had discussions with Mr. Henson and others. He also believed that the current world economic situation had changed many people's thinking, and it was not impossible that the change of officials had also had an effect. The matter of how to move forward would be discussed in more detail the following year. He believed they were headed in the right direction, and hoped that Members agreed with the Working Group's unanimous recommendations. It had seemed premature to try to put too much detail into these. Members needed to review the discussion on the new OIML Strategy and to keep that in mind when considering the proposed rapprochement.

      Mr. Mason read the Working Group's recommendations, which were that the BIML should be directed to pursue further discussion, concentrating on three areas, as follows:

      - increased cooperation in daily activities with a view to formalizing means and creating a culture committed to decreasing duplication of effort, improving exchanges of information and taking advantage of opportunities for collaboration for both technical and administrative functions;

      - examination of the advantages, disadvantages, legal considerations, costs and benefits associated with co-location with the BIPM;

      - development of the consideration and approval of Member States of a proposed role mission and strategy for the OIML, taking account of OIML B15, in order to strengthen the OIML's role in the global marketplace and to serve as a benchmark in evaluating the benefits and disadvantages of full integration, with particular consideration for emerging regulatory needs.

      On the last point, Mr. Mason said that when he had started talking to the BIPM there had seemed to be a suspicion in their minds that the OIML was unsure about its future and that it was reaching out to the BIPM in order to give itself more confidence. Mr. Mason had very quickly made it clear that this was not part of his thinking or that of anyone in the OIML. As they had heard in the last day and a half, the OIML was a vigorous and confident organization and, if there was discussion with the BIPM about coming together, they were looking for mutual benefit from a position of strength and confidence.

      Mr. Richard suggested adding a Resolution to the present Meeting, to acknowledge the new cooperation era of the BIPM and the BIML and to take note of the interim report which had been presented.

      Mr. Mason agreed that this should be done.

- number: '9'
  title:
  - spelling: eng
    value: Discussion of the future strategic direction of the OIML
  narrative:
  - spelling: eng
    value: |2+

      Mr. Mason began by commenting that there had been no day since Orlando when he had regretted putting himself forward for election as President. If there was one day above all when he had been absolutely convinced that he had done the right thing, and that this was going to be an exciting six years, it had been at the end of the Presidential Council, when there had been discussion of this issue, because at the Presidential Council in March they had identified, partly because of the discussions with the BIPM, whether they could articulate what the OIML was about as an Organization, so that they knew they had the confidence to say, "This is what we want to do. What is it that they want to do, and do they fit together?" This was when they had realized that a new strategic position was needed.

      Additionally, the previous B15 was showing its age and also mixed elements of a strategy with elements of a work program. Mr. Mason had wanted something more fit for purpose. The Presidential Council had absolutely understood and agreed to this and, on the basis of a very short paper which Mr. Mason had written, immediately arranged for a two-day discussion on the subject in Utrecht. This turned out to be one of the most productive strategic discussions they had ever had, and following on from that they had been able to put together a document which they had agreed by e-mail in a matter of weeks. He was proud of the way his colleagues, often from different standpoints, had been able to come together and produce the document in front of Members.

      The Mission Statement had in fact changed very little, Mr. Mason told Members. They had taken as their starting point the old B15 and the work program and what they had done was to try to establish what they had been doing for several years and make an explanation of this in a more logical fashion so that they could bring together the headings. Arising from that, they had not really changed the Organization's Mission Statement very much; Members would recognize much of the wording from the old B15 document. This seemed right - the mission of an Organization such as the OIML should not change much, and indeed a lot of it was set out in the Convention.

      What they had then done, however, was to look for a more ordered explanation of the OIML's different objectives. The reason they had done that was that, in accordance with best practice, it was important to have objectives which would then form a framework for the work program, consisting of the actual individual work items it was decided to work on over a year or so, so that it was clear just why each of those work items was being done.

      Objective 1 was to develop, in cooperation with OIML stakeholders, standards and related documents for use by Legal Metrology Authorities and industry, which, when implemented, would achieve the OIML mission. This wording was intended to capture all of the work of the Technical Committees and the OIML's role as a standard-setting Organization. This remained their key function and therefore objective number 1. Much of the old work program would be seen to fall under that objective.

      Objective 2 was to cover the moments when they decided it was necessary to move beyond just being a standard-setting body. They had already taken that step with the Basic Certificate System and the MAA. They were discussing the possibility of extending this through their

      Conformity to Type discussions. Some people would like to see them also move into the packaged goods area with an OIML Quality Mark. This was not a matter which had reached consensus yet, but if they asked themselves whether it was legitimate for them to do so, they could answer that it was legitimate for the OIML to provide mutual recognition systems which reduced barriers to trade and costs; it was then a matter for discussion what form those systems should take.

      Objective 3 marked recognition that when liaising with other Organizations, the OIML was often influencing them. They were influencing what ILAC and the IAF did in terms of developing their tools in a way the OIML could use. They looked to influence the BIPM in the way it conducted its business, so that the framework of scientific and industrial metrology was fit for OIML purpose; this was the reason why they were going to be discussing the new SI units. Also, with the other standard-setting bodies, particularly the IEC and ISO, part of the OIML's role was to be quite sure that their standards developed in a way which was useful to the OIML.

      Objective 4 referred directly to developing countries. They did not have a developing countries objective in this structure. Mr. Mason explained that this was because the issue of developing countries was so important for the OIML that it ran through all of the objectives. But if there was one that was more important than any other it was that they should promote and facilitate the exchange of knowledge and competencies within the legal metrology community world-wide. They absolutely had to recognize that their colleagues in the legal metrology communities and administrations of the developing countries were the OIML's colleagues. It was the OIML's obligation to find ways in which they could help them. This said, there were limits to the ways in which a small Organization based in Paris could do that themselves. It was necessary to work through and with others, and in particular the RLMOs. For this reason, Mr. Mason had been pleased that the Round Table held the day before had developed an excellent presentation which Mr. Neyezhmakov had presented, in order to point the OIML in the right direction for fulfilling this mission.

      Objective 5 marked the need to recognize that, in particular in developing countries, one of the problems was that colleagues in the legal metrology world did not necessarily enjoy a proper understanding of their role within their governments and societies. The OIML had an opportunity to assist them in that; for Mr. Mason, this was the second key element in policies towards making the OIML relevant to colleagues in the developing world. Mr. Mason admitted that this had been the most controversial of the Presidential Council formulations, but he saw it as fundamental and legitimate for the OIML to make efforts to raise awareness of the contribution which a sound legal metrology infrastructure could make to a modern economy. This meant being able to address member governments, and one of Mr. Seiler's excellent suggestions the previous day had been that it was not enough just to award excellent individuals in the developing countries; the OIML ought to be telling their governments about these awards and raising their importance within their own administrations.

      Objective 6 was a reminder that an important task given to the Director was to make OIML more efficient. This was also an important task for the CIML, as the official governing body of the OIML, to consider whether everything possible was being done in order to make the Organization as effective and efficient as possible. Mr. Mason therefore expected that in each of their working programs many work items would look at the efficiency with which the Organization operated. This did not mean just within the Bureau; the following day they would be discussing the Technical Directives in B6, but this seemed to Mr. Mason to be another area in which they could make progress under the objective in question.

      At the end of the statement, Members would notice a section headed Working with Others. Again this had been slightly controversial; some of Mr. Mason's colleagues would have preferred a more technical heading for this section, but in his opinion, it was again valuable for Members to remember that if they were going to make impact they could only do this by influencing others, by reaching out and by drawing in on their expertise. Among the others who needed to be influenced were members of their own governments who possibly did not report directly to the OIML. If legal metrology was to extend beyond its traditional area of weights and measures, there was a challenge for Members to work better with their colleagues in their own governments and administrations. There had been similar wording in the previous document, which had been imported and updated, but which should also be seen as part of the OIML's strategic vision. The text before Members had been drafted quickly but with input from the many experts on the Presidential Council. Mr. Mason very much hoped therefore that it would command Members' support. If the OIML adopted this strategy, they would have produced in less than six months a new explanation of what they did. This would send a very clear signal that the OIML could move very quickly when it needed to.

      Mr. Johansen commented that basically he agreed with most of what was in the document, but he had some problems with Objective 2. If read as by an outsider, it seemed like an ILAC/IAF document as it was exactly what they were doing, and he did not think it was what the OIML was doing, because what they were doing was in cooperation with ILAC/IAF and in accordance with their MoU, which made the wording of this objective seem a little provocative. He would like the wording to make it clear that this work was in cooperation with and not duplicating the ILAC/IAF work.

      Mr. Mason said that this was exactly what the document was intended to convey. The principles underlying the requirement that the OIML behave efficiently and effectively, not just for themselves but for others, involved making use of the tools that were available elsewhere, among which those produced by ILAC, the IAF and indeed also ISO. He had discussed the matter earlier with Ms. Malmqvist-Nilsson, who had raised no objection. It was certainly not his intention for the wording to be provocative. He suggested consulting the representatives of the organizations mentioned. The aim was, as simply as possible, to describe what was already being done, and he would prefer this consultation to an attempt to redraft at this stage.

      Mr. Michael Nyamwamu Onyancha expressed his thanks to Mr. Mason and said the Kenyans were pleased with the document, which had come at just the right time, because it addressed some of the issues affecting developing economies. They needed to educate and inform their political leaders so that they could appreciate the importance of legal metrology, in order for them to be able to cope with world-wide competition. Goods from developing countries were sometimes rejected because their manufacturers did not have sufficient assistance to enable them to comply with regulations. They supported the new strategy and looked forward to seeing its beneficial results in the coming months.

      Mr. Algossair referred to Objective 2. He said that the IEC had a good system whose aim was to avoid technical barriers to trade. These systems could be adopted by the OIML, with slight modifications, to achieve this aim.

      Mr. Mason said that an IEC representative would be present the following day for the signing of the MoU, and he would definitely ask this person's opinion about the wording used in Objective 2. He thought it was absolutely clear that the OIML should not be introducing competing systems; anything it introduced would be in response to a clear need for something distinctive, administered by the OIML and not being developed elsewhere. In discussions on both Conformity to Type and a mark for pre-packaged goods, an important part of the debate

      was whether or not there was something else which was distinctive that the OIML should do which was not being developed elsewhere.

      Commenting on Objective 4, Mr. Mason explained that within the OIML there was, in particular within the Technical Committees, expertise which could be made available to others, in particular colleagues in the Regional Metrology Organizations, but that what they did not have was facilities for offering direct support to every legal metrology administration which was a Member of the OIML. This was very important, because in the old B15, they had promised that they would offer technical advice to everybody. Part of the frustration voiced that morning by Dr. Seiler was due to the fact that this had never in reality been possible. Mr. Mason was very keen that promises made in the Strategy and more particularly in the work program were realistic and would be kept. The Organization would make its expertise available within its resources, and the best way of doing this was through other organizations, but they should not promise what they could not deliver in terms of direct assistance to individual countries.

      Mr. Faber congratulated the President on being able to start his term of office with a document of intent. It was a pleasure for Members to be able to see what he was going to do. He asked for clarification on whether Mr. Mason saw this as rewording the terms of the old B15 or as a new strategy. He also commented that in Objective 6, where improvements in effectiveness and efficiency were requested, this was not strategy but merely what any managerial staff were expected to do on an ongoing basis. These actions were important but perhaps should belong in another document.

      Mr. Mason replied that he did not believe there was a fundamental change in direction. Mr. Faber would recall that when Mr. Mason had stood for election he had specifically said that his view of the strategic direction of the Organization was very much a continuation of the vision which had been set out previously, in particular by his predecessor, Alan Johnston. Many of the things that had been possible, not just in drafting this strategy but a number of the things reported on by Mr. Patoray, had been made possible because of changes introduced by Mr. Johnston over the previous six years. In reality he did not believe it was different in substance. It was different in the way it described what was done. This brought Mr. Mason to Mr. Faber's third question. This was a constant philosophical question. He had been involved in generating a number of strategies and the question of whether internal activities did or did not form part of the strategy always raised its head. He believed that it was now seen as better practice in most strategic documents to include it, for the reason that this allowed it to be used as a framework for a work program. This enabled reports on work program items which addressed the need constantly to improve their operation as well as the need to make more external impact.

      Mr. Valkeapää said he was happy in general with this concise document and that he would like especially to emphasize Objective 3, which he considered to be very important. It expressed positive new thinking in an understandable way. He wished to make one minor comment about an element of the Mission Statement which had been changed. At the end it used the words "... harmonize the level of consumer protection world wide". Mr. Valkeapää wondered why the statement did not rather say "... promote ... consumer protection ...", as the OIML might be thought to be harmonizing in the wrong way.

      Mr. Mason thought that many people could be made nervous by the concept of continually raising the level of consumer protection. When he had been a more conventional type of consumer protection regulator, he had said that he was very concerned to make sure that he did not over-regulate. This was not because of any particular affection for manufacturers, but he recognized that if the level of consumer protection was raised too high this might very well

      also raise costs. As a regulator, costs were being raised in such a way that the consumer had no choice but to pay them. It was a heavy responsibility but it involved balancing the level of consumer protection with its cost, which the consumer ultimately paid. He would therefore have concerns about using the word "promote", while the concept of harmonizing and ensuring consistency in world trade was well accepted.

      Mr. Birch commented that this was a time of great financial turmoil in the world, in which it was important to have a strategic plan which would keep them on course. He wanted to make a couple of points. In Objective 1, the words "legal metrology authorities and industry" were used. He thought it would be clearer to alter this to "legal metrology authorities, regulators and industry". A lot of governments used legal metrology recommendations but would not see themselves as legal metrology authorities. It would be better to refer to them as regulators. Also, the text supporting this was primarily about trade facilitation. He totally agreed with the importance of trust and confidence and facilitating trade; in fact trust and confidence were more important than ensuring compliance with regulations. He felt that there was a need to pick up the regulatory aspect in the text, particularly the importance in trade of the trust and confidence given by compliance with regulatory authorities.

      Mr. Birch also commented on Objective 5, where reference was made to raising the awareness of governments to metrology in economic and social development, and helping developing countries to support and maintain legal metrology systems. That applied not just to developing countries but to all Member Countries. They all had continual battles with government about pointing out the economic and social benefits of what the OIML was doing. The expression "developing countries" could be replaced by "Member Countries". The specific aspect of developing countries could be picked up in the next sentence, where they were already referred to.

      More generally, Mr. Birch also commented that there were a number of significant challenges facing the OIML at present, which had not been picked up in the report and plan. He particularly referred to the global metrology system. This was more than the totality of nationally harmonized systems. One of the OIML's issues was measurements which moved globally, i.e. control of measurements used in international trade. In most cases there was little control over this. The proposal of a mark for pre-packages was one way of dealing with this problem. The OIML should look at this major challenge.

      Another issue was the expanding scope of metrology, which had been discussed many times, and the real problem of the coordination of the legal metrology authorities being able to coordinate with government authorities in implementing Recommendations.

      His third topic of interest was the role of legal metrology in public policy. Reflecting on the economic and social benefits, Mr. Birch had decided that this was not enough. There was an increasing need to be able to identify how one's activities could support government policy. He had already given the examples of road safety and climate change, where legal metrology could play an important role. He wondered whether some of these points might be picked up at the end of the Strategy document, perhaps in a paragraph about some current challenges.

      Mr. Mason said all the points that Mr. Birch had identified were legitimate items which the OIML should be doing, though it might be necessary to debate whether the objectives should be sufficiently wide to capture and authorize any work item that was undertaken. The existing wording was enough to give that sort of cover to each of the initiatives Mr. Birch had described, in terms of the world measurement system and to him that was what Objective 3 was about, the forum associated with metrology, standardization and so on. Mr. Mason had no problem with work items which came under that heading.

      Similarly, on public policy making, effectively the OIML was raising awareness of what it could do and that meant a sound legal metrology structure related to road safety, etc., in a modern economy.

      Mr. Mason said that Mr. Birch was absolutely right in the second point he had made. The word "developing" should not have been included in the second line of Objective 5. He had missed it despite repeated proof reading and it would be removed.

      On Mr. Birch's first point, Mr. Mason said that some the OIML administrators, including himself, found it hard to own up to being regulators. The concept of legal metrology administrators was wide enough to embrace regulators and he would prefer to stay with that text.

      Mr. Ardianto asked why the OIML would not clearly state as an objective that it would support developing countries in establishing their legal metrology systems.

      Mr. Mason replied that this was for the reasons mentioned before, in reply to the Kenyan delegate, that there was a developing countries element to every point in the Strategy. It seemed to him more powerful for the OIML to have objectives any one of which could authorize some work items which were of particular interest to developing countries. There was a problem, in that they were moving step by step. A lot of the detail would only come when they had the work program that showed the different projects that the Bureau would be pursuing. He still believed that the better way was to ask for input into work items which might sit under any one of the five objectives which were of interest and significance to developing countries.

      Mr. Kebapetse concurred with his colleagues that this Strategy document had come at the right time. He liked the strategy but felt it dealt more with explaining the mission of the Organization. Mr. Mason had said the previous year on his appointment that he was not necessarily going to take a new direction. He was still on the same path, which was acceptable to Botswana, but although the mission did not need to be changed, the strategy, in the sense of how these objectives were to be achieved, did need to be changed. For example, if one read the papers which had come before this strategy, governments had been failing to adopt OIML Recommendations. What was missing was the part of the strategy that explained how this was to be done. They needed some guide documents, or working documents, so that Members could appreciate how the OIML was going to achieve these ends. The intentions were good and he supported them, but the OIML needed to say how it was going to make governments appreciate and adopt OIML publications. It was important to go on from this point to talk about the "how" part of the strategy.

      Mr. Mason agreed. The "how" was what he had called the work program. If B15 was adopted, then the drawing up of that work program would begin the following week. In fact, to a certain extent it had already started, in that a lot of the items on the 2011 work program would move into the new, differently structured one. He had wondered whether it would be helpful to produce the outline of a work program as well as the Strategy, but in the end he had felt that this would not be helpful because he thought it was better to concentrate on the brief document and to make sure that they were correctly describing what they wanted to achieve. Mr. Mason felt that he and the recent speaker were possibly using the word "strategy" differently. For him it was where they wanted to get to; the question of "how" would be added and would be changed. He hoped that this document would last for several years, whereas the work items would change at least every year and sometimes within the year.

      Mr. Mason added that what could be achieved was inevitably limited by resources. They had already heard about the financial position of the Organization. It was in a favorable financial

      position but it was still a small Organization, and so it was necessary to be realistic about how much could be achieved. However, as head of a small organization, he knew from experience that if the resources of a small organization were well managed it was possible to "punch above your weight", in other words make more impact even though you are small. This was how he saw his expectations for the OIML.

      Mr. Seiler felt that the mission statement concentrated too much on facilitation of trade and consumer protection. What about other areas such as health services and road safety? Did these areas fall under the mission statement or not?

      Mr. Mason was not sure. This was the wording that had been taken from the previous one. If the mission statement was adopted he would not exclude activities not specifically mentioned within it. He asked for time to reflect upon Mr. Seiler's question.

      Having consulted colleagues over coffee, Mr. Mason assured Members that the wording of the Strategic Statement was broad enough to include the areas referred to above by Mr. Seiler.

      Mr. Lindlov thought it would be possible to broaden the Mission Statement to include these possibilities more clearly so that it did not appear to be limited to trade and consumer protection. He suggested stopping the sentence after "internationally recognized".

      Mr. Mason was grateful for the suggestion but feared that it might cause nervousness to remove any reference to what their hopes were, other than that infrastructures should be compatible and recognized. They were trying to capture ambitions somewhat higher than that.

      Mr. Schwartz said another version discussed was not to stop after "internationally recognized" but to add after these words, "for all the areas for which the state takes responsibility, for example, to facilitate trade, establish mutual confidence... and so on". This would be a more general statement and also in the direction intended.

      Mr. Mason said that he saw attractions in this suggestion. He would prefer the word "governments" rather than "state" but considered that this wording usefully indicated that these were examples.

- number: '10'
  title:
  - spelling: eng
    value: Technical activities
  narrative:
  - spelling: eng
    value: |2+

      Before moving to item 10.1 Mr. Mason said that he wished to say a few words about the proposal to revise B 6, the Technical Directives. There would be a full presentation by Mr. Dunmill of the reasoning behind the text and Mr. Mason was sure there would be a very full discussion of it. But he felt it would be helpful to say a few words immediately in case some Members had not appreciated its full significance. The document had been amongst those circulated two months previously, and indeed earlier versions of preparatory drafts had been circulated before that. However, they were long and complex and Mr. Mason felt that it might be helpful if he explained the history of this and the reasons for circulating them in the way it had been done, and to ask the Committee to take a decision on that. These were documents which fell to the Committee to approve and they would have the opportunity to vote on them.

      The subject of the Technical Directives, Mr. Mason was aware, had been ongoing for several years. It had been something on which, when he had presented himself for election the previous year, he had said that he knew there were substantial differences of view. He had indicated at that time that he would seek to operate on a basis of consensus. At that Committee Meeting the decision had been made to initiate an inquiry among Members on what were the main elements of the proposal. When this had been done, the two elements of the proposal of which Mr. Mason was most conscious had been:

      - the proposal to introduce a flat structure into OIML Technical Committees; and

      - the proposal to establish a Technical Management Committee which would substitute for the work currently being done by the Presidential Council.

      When these inquiries had been introduced, the sentiments of CIML Members who had commented had been exactly evenly divided, so that it was clear that this was still a subject on which very mixed opinions were held. Mr. Mason and Mr. Patoray had agreed that since the subject would be discussed at the current Meeting, it was for them to discuss what to do. It had become clear to Mr. Mason that if there was a 50-50 split on an important question, you did not change. To that extent, Mr. Mason was clear that the result of the inquiry was that the proposals for a flat structure did not command acceptance. They had therefore been abandoned. The Technical Management Committee proposal had also not commanded the necessary support and was also therefore dead.

      Under the circumstances, therefore the current practice should broadly continue. This was the structures of TCs and SCs, pursuing specific work items and projects, with oversight which was in practice exercised by the Presidential Council. This in itself was not clearly documented in the existing B 6 because it was eighteen years old and was a document which, in a number of respects, no longer reflected the practices being followed. Mr. Mason did not believe that this was acceptable. He believed that it was important that when guidance was given to the TCs on the procedures they should follow, this should actually be the procedures they were expected to follow.

      This said, it had also been clear that there was a strong feeling on some of the other items, where there had been a clear majority opinion in favor of change, in particular the need to change the voting arrangements so that it was easier to proceed if the only problem was a failure to get the necessary level of support from countries who were identifying themselves as Participant Members and then not participating, i.e. not voting. There was also a majority in favor of taking the opportunity to use the work on modernization which had gone into the production of texts, even though these texts had also contained the controversial issue of the Technical Management Committee and the flat structure. The decision had therefore been taken, largely by Mr. Mason, to proceed with a revised B 6.

      The reasons for proceeding with revision of B6 were, firstly that the documents had been circulated and discussed for several years and Mr. Mason had been keen to see that if the substance of the procedures was not being changed, it should be possible to close that debate and move on. The following year, at the 2012 Conference, many important discussions would take place, not least the revision of the Staff Regulations and Financial Regulations and the decisions on the 2013-2016 Budget.

      It was also important to make progress with internal procedures in order to be able to focus more attention on the things they wanted to do which had an impact outside, namely the work items which would go into the work program, which had been discussed earlier in the day.

      These were the reasons for taking that decision. They had adopted the slightly unusual practice of circulating to the Committee successive drafts but with the clear understanding that the Committee would have two months to consider the final document. This had seemed to Mr. Mason to be appropriate for a Basic Publication. Basic Publications were not Recommendations. They were not documents which were widely used outside the Organization, so it had seemed reasonable to expect CIML Members themselves, in consultation with their immediate advisers who participated in Committees, to take a decision on whether they approved the revised B 6 or not. If it was approved it could be the basis for

      instructions to the TCs on how they should now operate. If it did not command the support of the Committee, then it would be known that there was more work to do.

      Mr. Mason added that, in the two months since it had been circulated, as he had always anticipated, there had been some suggestions for improvements and for removing identified ambiguities. He had always had in mind that if the basic principles were approved, with a decision also to modernize the language even if the way of operating was not changed, B 6 would still have to be revised at some stage, indeed at the next possible stage, which would be the next CIML Meeting,

      Mr. Mason felt that from what he had seen of the comments, they had covered about 95% of the ground towards modernizing B6, but that there were still some improvements to be made to the remaining 5%. It was still his preference to try to get to a situation where there was a B6 which commanded the support of the Committee and could be adopted and applied for a year and then returned to the Committee with amendments which would address the specific comments received after circulation and those arising from attempting to operate it in practice. He had heard this described as the "living document" approach, but he found this slightly misleading. He did not think they wanted to amend B6 every year; he wanted it approved on the understanding that a Task Force would be formed of people whose job it would be to identify the remaining changes that were required for B6 and that a revised B6 with those changes would come back to the Committee the following year. In Mr. Mason's opinion, this would be best as it would ensure that issues of principle would be debated in the current year and issues of drafting in the following year. However, he accepted that some Committee Members might hold a different opinion.

      Mr. Mason also wished to make clear at this point that, strictly speaking, he had been advised that for a Basic Publication to be approved, it only required an absolute majority of votes in the Committee. However, on something of this potentially divisive nature, he also noted that the procedures allowed the President to specify or to suggest an alternative voting system, so he proposed that as and when voting took place on B6, the voting principles for Recommendations should be adopted, which would be the 80%/80% rule.

      Mr. Mason did not wish to say any more at the present time, or to start on the discussion which would take place the following morning, but he urged Members who wished to take part in the debate to think about the issues, read the revised B 6 and form their own judgment on whether the way forward which Mr. Mason had described was an appropriate one. He knew that the next day's debate would be lively, but he hoped it would also be constructive.

