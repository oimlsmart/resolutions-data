      ## OIML Medals

      OIML Gold Medal: Prof. Dr. Lev Issaev

      Mr. Mason announced the presentation of an Award to a colleague well known to those present: Prof. Dr. Lev Issaev.

      Mr. Issaev had begun his activities in legal metrology in 1960, after graduating from one of his country's most prestigious institutions. He had begun his career as a senior engineer at a factory central laboratory, being responsible for metrological control of measuring instruments. He was therefore firmly grounded in practical metrology.

      He had gone on to work in one of his country's major institutions for technical regulation and standardization, as Deputy Chief, then Chief of the Metrology Department, Vice President and, from 1997 to 1998, Acting President. In these capacities he had been responsible for all aspects of metrology, including legal metrology. In particular, he had been one of the authors of the Law on the Assurance of Measurement Uniformity, published in 1993.

      Since 1992 he had been Vice President of his country's Metrological Academy and member of the editorial board of several journals in the field of metrology. Since 1993 he had been Professor in Legal Metrology in the Legal Metrology Chair of the Academy for Training in Standardization, Metrology and Conformity Assessment. He had been active in the OIML for more than 30 years, starting in 1977, with responsibility for the activities of OIML Pilot Secretariat 27 in reference materials. In that capacity he had represented the OIML in ISO REMCO.

      In 1980 at the 17th CIML Meeting, held in Washington in conjunction with the 6th OIML Conference, he had been elected Vice-President of the CIML, and in 1986 he had been reelected for a second time. In 2000 at the 35th CIML Meeting, he had again been elected as a CIML Vice-President. He had been a member of the Presidential Council since 1992. His special contributions to OIML activities had included work on issues of reference materials, bio-mechanical measurement, bio-medical measurements, measuring systems, physical and chemical measurements, personnel training, development of terminology, accreditation work and much else. More generally, ever since he had been active in the OIML, he had devoted much attention to securing the implementation of the OIML Recommendations and Documents in his country, and, on a more personal note, he had offered Mr. Mason excellent advice and support during his year as President-elect.

      Mr. Mason asked Mr. Issaev to come forward to accept the OIML's Gold Medal, together with a special Certificate and a personal gift from members of the Presidential Council.

      Accepting the Award, Mr. Issaev said that this was a good day for him, sad on the one side, but pleasant on the other. He had been with the OIML for almost 35 years, and to recount all his experiences could take many hours. Later, he would maybe write about it. He had started when the President was Mr. Van Male from the Netherlands. The first Presidential Council meeting he had attended had been conducted exclusively in French. He had had a French- English interpreter. It had been very interesting but it had then been decided that English must be accepted as the working language.

      At the following year's Conference in 1980, held in Washington's impressive State Department Building, Mr. Knut Birkeland of Norway had been elected CIML President, Mr. Issaev as First Vice-President and Dr. Mc Coubrey of the USA Second Vice-President. None

      of these people spoke French, so it had been automatically decided that English must be the working language at the next Presidential Council!

      Mr. Issaev also recounted that at the first meeting of Pilot Secretariat 27, held in Vilnius, Lithuania in 1977, the Bureau had been represented by Mr. Bassam Afeiche who had told those present that if they would not speak French he would close the meeting! So some words had been translated from French to English, from English to Russian, from Russian to English, from English to French. Mr. Issaev had been Chair and had been furious, because by the time this had been done, the answers did not match the questions! It had been interesting but very difficult and after three days it had not been possible to achieve anything, so they had made the decision that everything was excellent and there was no problem.

      People working in the field of legal metrology, Mr. Issaev said, were very special people with a wide range of experience in their various countries. There was no need for them to arrange rapprochement with other organizations - he was sure the OIML would live forever. He thanked Members for their assistance, help and attention.

      After receiving the presentation, Mr. Issaev thanked his colleagues on the Presidential Council, the President and the Director.

      Mr. Mason announced to the Committee that there would be a Resolution to vote to make Mr. Issaev a Member of Honor of the Committee, then went on to announce that a number of other individuals were also going to be honored.

      ## OIML Bronze Medal: Mr. Jacques Bourgeois

      Mr. Patoray wanted to take a moment to mention to Members Jacques Bourgeois, who had been a member of the Bureau staff since 1978. He had retired in June 2011 and, based on his short time with him at the Bureau, Mr. Patoray had recommended that Mr. Bourgeois should receive a bronze medal from the OIML for his 33 years' service. The President had agreed that this should be done. Mr. Bourgeois was not present, having retired to the North of France, but he occasionally made a trip into Paris and on these occasions he always visited the Bureau. So the next time he was there they would present him with his medal and Certificate of Appreciation for his 33 years of service. Mr. Patoray hoped that this arrangement was acceptable to the Members and that they understood the dedicated work that Mr. Bourgeois had done for the Organization over those years.

      ## OIML Award for Excellent Achievements in Legal Metrology in Developing Countries

      This Award was a relatively recent innovation. Mr. Mason said that he had been in Mombasa when the decision to make this award had first been announced, and he believed that as a result of waiting two years to present it, they would be able also to hear more about how it had been achieved. He had pleasure in asking Mr. Osama Melhem to come forward and accept his Award and to make a presentation.

      ## 2009: Mr. Osama Melhem

      Mr. Melhem said that 2009 had been his lucky year. In May 2009 he had had the honor of being awarded the Award for Leadership Excellence, which was the highest prestigious award in Jordan for governmental employees. In the same year he had received the OIML Award; if he was asked what this Award meant to him, he could say that it was like an OIML Type Approval Certificate, which did not necessarily mean that your measuring instrument was the best in the world but did mean that it at least complied with the OIML Recommendation. On

      the one hand this gave the customer more confidence in your product, and on the other hand it enabled you to penetrate a new market. This was exactly what had happened to Mr. Melhem. Right after the Mombasa CIML Meeting, a representative of the United Arab Emirates had written to the Director General of the Emirates Standards and Metrology Authority (ESMA) about Mr. Melhem's achievement, and, after a few months, he had received an offer from ESMA.

      This opportunity had also enabled Mr. Melhem to transfer his knowledge to other Arab countries and to help them build and establish a good metrology system within a very short time. Some months after the Award, the Jordanian Institute for Standards and Metrology had received a letter from the CEO of Weights and Measures, Tanzania, asking that Ms. Magdalena Chuwa of Tanzania (who he noticed was present at the Meeting) be allowed to make a study visit to Jordan to learn more about their metrology system. Her visit to the Jordanian Institute for Standards and Metrology, to the Jordan National Institute and to some Jordanian Verification offices was duly arranged. She had also visited Petra and the Dead Sea.

      This visit had inspired Ms. Chuwa to establish a new Legal Metrology Center in Tanzania, and in July 2011, with the aid and support of the PTB, Mr. Melhem had visited the Weights and Measures Authority of Tanzania for ten working days, to help them draw up the first sketch of the new legal metrology system, similar to the Jordanian one. During this visit they had also been able to conduct a one-day workshop on the verification of volume capacity meters and review their metrology law.

      One of the most interesting things Mr. Melhem had noticed during a visit to a Tanzanian port where imported fuels were measured, was that the temperature of the compensation device fitted to a flow meter was shifted by about 5 $ ^{\circ} \mathrm{C} $ . He remarked that if that was converted proportionately to the economy of the whole of Tanzania then that 5 $ ^{\circ} \mathrm{C} $ was equal to one million dollars a year for just one product at one port alone.

      Members might know that the OIML Award also had a tangible part, in that it offered free attendance at an event covered by the OIML. However, at that time Mr. Melhem had felt called to transfer his knowledge rather than to attend training courses. So he had contacted the Palestinian Standards Institute (PSI) and asked them if they needed any help to strengthen their metrology system. The PSI had welcomed this idea but informed him that unfortunately they were unable to cover the cost of his mission. He had therefore contacted the CIML President, asking him to allow him to use the Award to cover the cost of the mission. This had been agreed, and Mr. Melhem thanked the OIML for its support. In fact the visit to Palestine had turned out to be a great blessing in Mr. Melhem's life because it had finally given him the opportunity to visit the land of his parents and grandparents and finally to see relatives whom he had never previously seen.

      The Palestinian pharmaceutical industry, food industry, construction industry, and testing laboratories were not able to procure relatively high level measuring instruments to calibrate their instruments. These industries of course suffered a lot from this, as it prevented them from reaching higher standards. Better measurement meant better life and a stronger economy. During his ten days working in Palestine Mr. Melhem had been able to conduct many training courses and workshops, and people had been thirsty for knowledge.

      Mr. Melhem concluded by saying that if he were asked what his success meant and what was the secret of that success, he would respond that there was no secret of success. Success had a price and the price was hard work, and hard work meant putting all one's resources into one direction. This was very important. And his last advice, for himself and for others was: first, try to document all your experience and then disseminate as much as you can of your knowledge to others, and try to become an expert and conduct a training course in that topic.

      He said that if two people each had one apple and they exchanged them, they would each have one apple afterwards; but if two people each had one idea and they exchanged them, each one would then have two ideas. So a little sharing profited the future of their work.

      ## 2010: Mr. Sakchai Hasamin

      Mr. Mason then announced a second Award for Excellent Achievement in Developing Countries: this was the award which had been won in 2010. They again had the advantage that the recipient, who had not been present when the award had been made, was now among them and could accept the Award and the Certificate and also give an explanation of the work which lay behind the Award. It was his pleasure to invite Mr. Sakchai Hasamin to come forward to accept the Award.

      Mr. Hasamin thanked Members. He wished to speak on behalf of the Central Bureau of Weights and Measures of Thailand, which expressed its sincere thanks to the OIML and to Mr. Johnston and to Mr. Seiler for presenting the OIML Award to the Central Bureau.

      They were honored and very proud to be presented with the Award. Members might know that they had been selected for the Award because of their efforts to develop legal metrology activities in their country for the last twenty years. After receiving the Award they would put even more effort into developing their activity, and would also participate in regional and international activity especially OIML activity. Thailand would apply to become an OIML Member State in the near future: the Thailand Bureau was currently preparing its application with cabinet support and was getting some support from the Ministry. The Award would make this very easy for them and they hoped it would happen soon. He thanked Members again.

      ## 2011: Mr. Juan Carlos Castillo and Mr. José Antonio Dajes

      As Members had heard earlier, the 2011 Award for Excellent Achievement in Legal Metrology in Developing Countries had been won by Juan Carlos Castillo and Jose Antonio Dajes. Awards, similar to the ones that Members had just seen, would be presented to them in about a month's time at a Conference in Buenos Aires. In their absence he invited Members to express their appreciation. Members would also be interested to learn that an article co-written by the two 2011 Award Winners would be published in the January 2012 OIML Bulletin.

      ## Letters of Appreciation

      Mr. Mason also recorded that Letters of Appreciation for an excellent contribution from a developing country to legal metrology would be awarded to Dr. Mariela Saavedra of the Argentine Institute of Industrial Technology and also to Mr. Morteza Pouyan of the Towzin Electrical Company in Iran. The letters would be dispatched to them after the Meeting.

