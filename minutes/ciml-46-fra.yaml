- number: 7.1.2
  title:
  - spelling: eng
    value: ISO and IEC
  narrative:
  - spelling: eng
    value: |2+

      The most important point here was the signing of an MoU with the IEC. This had been extensively discussed in the Presidential Council earlier in the year, the result of which could be found in the addendum to the Working Document.

      Mr. Miki reminded the CIML that with the MoU with ISO there had been problems over joint publications and also over the fact that ISO charged for its publications whereas the OIML's were free. He asked whether there were any problems of this kind with the IEC.

      Mr. Kool did not believe there were any such problems. Under the MoU with ISO, if the OIML developed any documents jointly with them, they would be prohibited by ISO copyright rules from publishing them free of charge, as was normally done by the OIML. This point had been clarified in the text of the MoU with the IEC: there was a difference between "joint publications", meaning one and the same document published by both Organizations, and "jointly developed" which meant that both worked together to agree about the content of the document and then each Organization published those documents using their own rules and copyright. The end result was two publications by two different Organizations but with substantially the same content. There would be a joint work program.

      The Memorandum of Understanding between the OIML and the IEC was then signed, and Mr. Pierre de Ruvo addressed Members on behalf of the Secretary General and CEO of the IEC:

      Good Morning. Mr. President Mr. Peter Mason, Mr. Past President Mr. Alan Johnston, and Vice-Presidents, Presidential Council Members, country delegation Members, Ladies and Gentlemen: This is eventually the first Memorandum of Understanding that is signed between the Organizations, if we consider that there is another document that was signed in 1968 by the two Organizations called an Agreement of Collaboration, signed in Paris on 30 August 1968. We have had effective collaboration in the field of standardization in the past; the highlights are in TC 25, in quantities and units, in TC 29, in electro-acoustics and many other fields of the IEC and the OIML, where our technical experts have been collaborating.

      The IEC, as you know, was established more than one hundred years ago, actually in 1906. Your Organization I believe was established in 1955, when I was two years old, so the two Organizations are senior, or more than senior, Organizations that operate in the field of standardization and conformity assessment. As you know, the IEC has two branches, the standardization side and the conformity assessment side. Conformity assessment is one activity that today represents, in the electro-technical sector, the benchmark. IEC's system, with the CB scheme and the full certification scheme, is operating conformity assessment all over the world and represents 22% of global trade. So this is to say that conformity assessment is a very important activity beside standardization.

      The first President of the IEC was Lord Kelvin, and Lord Kelvin used to say that "if you cannot measure it you cannot improve it", whereas modern economists say "if you cannot measure it you cannot manage it". We prefer to stay with Lord Kelvin, whereby "if you cannot measure it you cannot improve it".

      Our collaboration, as I see it, will be effective. There is a strong will from the IEC side to participate and collaborate in the work that is associated with the activity of the OIML, and I am sure that your experts will be attending the meetings of those IEC technical committees that are related to your activity. We consider this an historical day, and we will be reporting in the electronic media of the IEC Bulletin information about this Memorandum of Understanding. All I wish is that we can achieve the key elements that are part of the MoU.

      Finally, if we have been able to achieve this important moment with the MoU, I would like to thank three people who together with me started to draft it. The idea started two years ago, but the MoU was drafted last year. Willem Kool and Ian Dunmill were part of this important initial work, but also Professor Roman Schwartz was one of the persons who had a strong belief that the MoU could be beneficial for both parties. So thank you very much. I hope you have a successful meeting and I am looking forward to furthering our collaboration in the future. Thank you.

- number: 7.1.3
