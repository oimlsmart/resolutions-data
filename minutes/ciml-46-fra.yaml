      Mr. Patoray said that all IPSAS requirements in this respect had been incorporated. The actuary had worked out the OIML's liabilities into the future and the work relating to the pension system and Resolution 27 of the 45th CIML Meeting had been completed. It was still necessary to establish the future policy in such a way as to limit OIML liabilities while at the same time safeguarding the situation of the one staff member still participating in the pension system. He applauded all the work done by others before his arrival. He would try to establish a good policy and would appreciate input from those who had already worked on it.

