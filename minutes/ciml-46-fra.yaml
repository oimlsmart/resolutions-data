- number: '6'
  title: 1 Report by the Facilitator on Developing Country matters
  narrative: |2+

    Mr. Mason asked Mr. Seiler, Facilitator on Developing Countries, to make a presentation.

    Mr. Seiler began by saying this was his final report in the position of Facilitator on Developing Country matters. He called it final because requests for facilitation had been very few, in fact close to zero. He could just say goodbye, but he felt that Members should have some more information. When he had been appointed as Facilitator by the International Conference in 2008, he had written an article on his mode of work in the OIML Bulletin and also sent e-mails to the approximately 80 addresses of those who had declared their interest in being informed about his work. His intention had been to work mainly through e-mails and to use the OIML web forums and the website for exchanging information and experiences. Initially he had been afraid he might not be able to handle all the requests he was expecting, but it turned out that the workload had not been too high. He had answered requests concerning legislation, verification methods and equipment and so on.

    Then Mr. Seiler had thought that he should stimulate the exchange of experiences, and that pre-packages would be an interesting subject. Two different countries had sent reports about results, and these had been put on the OIML web site. This subject was an important one for developing countries and he had therefore requested more reports from other countries, but this had not been successful; he had received no more information.

    Later Mr. Seiler had come across a notice of the World Health Organization, which contained a warning about blood pressure measuring instruments using mercury as the reference. They recommended electronic blood pressure instruments and at the same time they recommended regular verifications because the sensing elements could be very sensitive to shocks and rough handling. Based on an idea of a former PTB colleague of his, Stephan Mieke, who had worked actively on the OIML Recommendation on requirements for blood pressure instruments, Mr. Seiler had developed a small, simple and very cheap device for checking the indication of electronic blood pressure instruments. He had put this information on the OIML web site and had also done a demonstration in Mombasa. He had even given out parts for assembling the simple device, in the hope that it would be tried in developing countries because it was mainly meant for verifying instruments in hospitals and clinics which had no regular access to verification services. At the same time he had thought that it would be a good opportunity for legal metrology services to show that they not only concentrate on commercial transactions and that they could add benefit to measurements through such a

    service even without legal requirements or a legal basis. Again however, Mr. Seiler had received no feedback. He still wondered what might be done.

    Some of those present might remember that at the Orlando CIML Meeting he had recommended in his presentation that guidance documents should be developed, for example for the establishment of a legal metrology service, including its operation, staff requirements and so on. He had also sent this proposal to the Secretariats of the Regional Legal Metrology Organizations, asking whether or not they considered that such guidance documents were necessary. He had listed five topics and asked which they thought was of the highest importance. The response had shown that there was no objection to this being done, but neither was there a vote in favor of it. There had been no reaction at all. He had been forced to the conclusion that it was very hard to identify areas where he could be active.

    Mr. Seiler had then remembered a discussion he had had with a Member from a developing country at an OIML event. Mr. Seiler had asked this person what his impressions were of the event he was attending, and what benefits it had brought him. His answer had been, "they showed us a silver plate, but nothing on it to eat". Mr. Seiler asked whether this was the perception of OIML work that was held in developing countries. He asked Members to think about this.

    On the other hand, Mr. Seiler said, there was also some good news. One of his ideas had turned out to be sustainable in practice. This was the OIML Award. In the current year's competition there were three candidates:

    - Dr. Mariela Saavedra from the Argentine Institute of Industrial Technology, the INTI, was the administrative coordinator of the Program for Metrology and Measurement Quality of INTI. She had investigated and published her findings on the economic impact of the verification of high capacity weighing instruments at petrol stations in Argentina.

    - Mr. Morteza Pouyan was the founder of the Towzin Electric Company in Iran. As chairman of the Board of the Iran Weighing and Measurement Systems Trade Association he had considered that he was concerned with matters of legal metrology and contributed to the new standard for weighbridges, and he had invested more than USD 2 million for the development and manufacturing of a fleet of test weight carts for the calibration of weighbridges with about 30 % of their maximum load, which was much more than the 3 to 5 t used in former times.

    - Mr. Jose Antonio Dajes from INDECOPI Peru, Head of their National Metrology Service, and Juan Carlos Castillo, from IBMETRO in Bolivia, Director of Industrial and Scientific Metrology. Both had worked together for the development of the measuring capabilities of their countries to determine the volume and energy content of natural gas, which was of high economic importance.

    Mr. Seiler's recommendation was that Letters of Appreciation be granted to Ms. Mariela Saavedra and Mr. Morteza Pouyan for their work. They would also be asked to send a report on their work for publication in the OIML Bulletin.

    The receivers of the current year's Award were Jose Antonio Dajes and Juan Carlos Castillo for development of the measurement capabilities to determine the volume and energy content of natural gas. Mr. Seiler considered that the subject was of the highest economic importance for both their countries. The measurements ensured fair trade across borders, and in the countries themselves, and the initiative of two National Institutes and their close cooperation for the benefit of both countries was something rarely seen in developing countries. In addition, they had used their expertise in this region to help countries such as Brazil and

    Mexico with their knowledge. They had also convinced donors at the American Development Bank to give some money and the PTB offered assistance by organizing some workshops and seminars. In his opinion this was another good example of the work which was being done in developing countries, and was very remarkable but largely unknown to the OIML. The Award offered an opportunity to bring such activities to the attention of Members and in offering the Award, to give some publicity to the organizations.

    Mr. Seiler recommended that this Award should be continued. He could not, however, see any reason for his continuing to work as Facilitator. He thanked Members for their cooperation and their attention.

    Mr. Mason commented that this was a somber assessment of OIML activities. He added, however that in recent conversations a number of ideas had been offered as to how things might be done differently and the issues taken forward. He believed that there was still a very clear understanding among virtually everyone he had spoken to that making sure the OIML was relevant to developing countries was still a matter of very high priority. This matter would arise again in the course of several items on the Agenda, including in the report on the previous day's Round Table of the Regional Legal Metrology Organizations, which had included discussion of the new OIML Strategy and how it would be used to develop a program which would form a clearer basis for various work items. He was very keen that Mr. Seiler should continue to contribute to that, and he hoped he would still contribute to OIML debates.

    He therefore suggested that at this stage they take the opportunity to ask Mr. Seiler any questions arising from his presentation, but that for the rest Members should think very hard about what he had said and draw on those comments when they had their further debates later in the week.

    Mr. Issoufou said that the most important thing for him was to know how developing countries could participate in OIML activities. Much had been said, yet little that indicated how this could come about. As had been said, trade was international, yet in some parts of the world metrology was an integral part of day to day activities, but in others it was practically unknown. A strategy was needed to improve this situation. While they felt a need to move towards the OIML, developing countries were asking what the OIML could do for them in the way of offering practical and concrete strategies. African and other developing countries had a need for trade guarantees. He wanted to know what the OIML had to offer to such countries, and asked that the Organization and the Bureau should have a clear policy which would help the developing countries to participate fully in world trading activities. He had heard little on this subject in the Director's Report. The OIML needed to produce a clear program for the establishment of metrological practice in order to bring in the maximum possible number of countries. These needed support and companionship in developing their metrology programs and taking a real part in legal metrology.

    Mr. Mason thanked Mr. Issoufou for his powerful statement and pointed out that the Director's Report was only one of the complete set of papers and proposals for discussion at the Meeting, and he hoped that by the end of the Meeting, Mr. Issoufou would feel that the OIML had proposals to make and ideas to bring forward on the matters he had raised.

    Mr. Birch commended Mr. Seiler for the efforts he had made over the last few years to try to improve the OIML's involvement with developing countries. His methodology had primarily been a bottom up activity of going to developing countries and asking them to identify their needs. This could be difficult for two reasons, the first being that many of their organizations were quite underdeveloped and had little capacity for policy, and secondly that many of the

    issues relating to metrology in developing countries were quite often not covered by the organizations represented at the CIML.

    In terms of trade facilitation, one of the major issues which faced developing countries at present was global trade in pre-packaged goods. This had been discussed in Mombasa and also in Cape Town, where he had given papers on it. There were massive opportunities for developing countries in free trade in pre-packaged goods but there were still considerable technical barriers. One of the contributions which the OIML could make to help to remove these barriers was to introduce an "I" mark on pre-packaged goods, which would facilitate global trade and be of great assistance to developing countries. What he was now talking about was a top down approach rather than a bottom up approach.

    The other issue he had mentioned a number of times since 1998 was the issue of legal metrology in road safety. This was now seen by the World Bank and the WHO as one of the major issues facing developing countries and had a significant legal metrology component. But it was not recognized by those organizations. The World Bank had a road safety facility. Their web page said: "the facility is to raise the efforts of lower and middle income countries to build their scientific, technological and managerial capacities, to prepare and implement cost effective road safety programs". The World Bank was spending many millions of dollars on that, but in fact legal metrology was not recognized in that program as having involvement. In a strategic plan to talk about the role the OIML could play in assisting and facilitating access of developing countries to funding organizations and raising awareness of them, the OIML should take the top down approach by going to organizations such as the World Bank and the WHO and raising their awareness of the role that legal metrology could play in assisting developing countries.

    The other point he had made the previous day was the Millennium Development Goals. Again, at present legal metrology was not given any recognition for making any contribution to those goals. Mr. Birch felt that it could make quite a significant contribution to the sustainability and the health and safety aspects of Millennium Development Goals, but, again, that argument had not been sold to the organizations.

    In summary he believed that, while Mr. Seiler's bottom up approach had met with limited success, there was a need to try a complementary, top down approach by the OIML itself to raise the awareness of funding and development organizations about how legal metrology was an important element in assisting developing countries.

    Mr. Mason thanked Mr. Birch for some valuable points to which they would doubtless return at a later stage of the Meeting.

    Mr. Melhem felt that it was very sad that Mr. Seiler had felt the need to stop the work he had been doing. He had inspired a lot of developing countries. He might think no reports on his work had appeared, but wherever Mr. Melhem went, he heard his name, and he had seen his reports in many countries. He must not feel that his work had been a failure. Mr. Seiler or someone like him was needed. The seeds he had sown were growing, and Mr. Melhem urged the CIML President not to accept Mr. Seiler's resignation because they needed Mr. Seiler until a worthy successor could be found for him.

    Mr. Mason thanked Mr. Melhem for his comment. He added that he had in fact had further conversations with Mr. Seiler and thought he could say that while he might be standing down from the post of Facilitator, which was perhaps an old way of approaching this issue, and not as successful as had been hoped, he was very ready to continue working with the OIML, both in continuing to develop their ideas and then in implementing them, hopefully no longer alone but as part of a wider team when more support could be given to that team.

    In response to Mr. Birch's remarks about a top down approach, Mr. Seiler said that this would need to come from the OIML itself and not from a Facilitator, because the OIML was more visible. He added that he knew that in many developing countries there was equipment and there were trained people, so these should be applied in legal metrology, especially in the checking of pre-packages. He had seen equipment resting idle on the shelf and not used. This was a pity, and before requests were made for new equipment or new training courses they should see the result of the support already given. It should be used, full benefit should be drawn from it, and the results should be presented to ministers, saying that this work being done was very essential and could add to the perception of legal metrology. In many countries, legal metrology seemed to offer an image of policemen, and of persons creating difficulties for trade. They could not see the benefit of this work.

    On the subject of the hot issue of road safety, Mr. Seiler felt that legal metrology should be applied to measurement verification and that road safety was the responsibility of some other organization.

    For future work, Mr. Seiler recommended a thorough revision of the topics which the OIML should address. They should see whether they had the resources and whether these were the topics which developing countries most appreciated.

    Mr. Seiler thanked Mr. Melhem for his kind words, but said that another reason for his stepping down was that the new President and the new Director should be free to decide which way they wanted to go. There was also a new draft strategy which he thought would be adopted, so he preferred to wait and see what the outcome of the strategy discussion would be and whether activities could be identified which fitted into the strategy and helped to reach its goals. Mr. Seiler was prepared to contribute to this kind of work, but it still had to be decided in what way he could do this.

    Mr. Ben Hassine thanked Mr. Seiler both for his remarks and for the work he had done over several years. He had not followed the detail of these activities but he knew Mr. Seiler had done much that was of benefit to developing countries. Regarding his decision to step down, Mr. Ben Hassine wanted to comment on the approach taken by the OIML over some years to try to support these countries. It was simple to see that many of the activities in recent years had helped developing countries. Instead of stopping these activities, the OIML should reconsider them, taking advantage for example of the experience gained by a number of African countries. Following his seven years with AFRIMETS, in July he had taken on the presidency of that organization and they were now working on a "road map" for that organization, and, keeping in mind what had been done for the several developing countries in Africa, it was obvious that among developing countries there were several levels or classifications. Not all of them were at the same level, notably as regards legal metrology. It was necessary therefore to put in place a strategy with a number of levels. This was a possible way of approach.

    Continuing, Mr. Ben Hassine said that another problem of developing countries was the lack of support for these measures from governments. One of the main objectives of seminars which had been held, some of them organized or co-organized by the OIML, was to make governments aware of metrology needs. This did not always succeed, however, due to the fact that various quality requirements, the different types of metrology, together with accreditation and standardization all merged into each other. Mr. Ben Hassine had read within the last year or so a suggestion that in Asia there was a regrouping of the various quality associations, with the decisions being made at regional level, and that this should be extended to other regions of the world. A seminar was being held in the USA on this idea, which might well make it easier to make governments aware of quality needs and the importance of metrology.

    Mr. Mason thanked Mr. Ben Hassine for his valuable comments, to which they would no doubt return in due course.

    Mr. Mason thanked Mr. Seiler once again for his presentation and urged him to continue to play an active part in the debates which would follow the reports on the Round Table and the strategy later in the day.

