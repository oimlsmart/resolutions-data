    M. Athané rappelle l'adhésion comme État Membre de la République de Bélarus; il mentionne également les très récentes adhésions de l'Ex-République Yougoslave de Macédoine comme État Membre, et de Singapour et du Vietnam comme Membres Correspondants. Il ajoute que des pays comme le Kazakhstan, le Luxembourg, le Mexique, l'Afrique du Sud et l'Ukraine sont susceptibles d'adhérer à l'OIML comme États Membres dans un ou deux ans, et que beaucoup de petits pays ou pays en développement pourraient devenir Membres Correspondants.

