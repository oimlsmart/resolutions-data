- number: 8.3.2
  title: 'Approval of a new project in TC 8/SC 3: Dynamic volume and mass measurement
    (liquids other than water)'
  narrative: |2+

    Note: See the Terms of Reference for this project in Annex 1.

    Mr. Kool reminded delegates that the project proposal was in Addendum 8.3.2 to the working document. Because this was a new project, the procedure for approval was by simple majority.

    Mr. Van Mullem commented that the terms of reference in the proposal were too short. He suggested moving item 5 of the project proposal and placing it under the terms of reference, so that it was clearer what the terms of reference for this project group were.

    At Mr. Mason's request, the terms of reference were shown on the screen. Mr. Mason clarified that the normal assumption was that when a project was approved, Members had an understanding of the scope of the projects being undertaken. Mr. Mason pointed out that the word "including" meant that the list was not a comprehensive or finite one.

    Mr. Richter offered to explain the project, if this would be useful.

    Mr. Mason accepted the offer, saying that the matter of what needed to be amended in R 117 was of interest to many delegates.

    Mr. Richter said that he was speaking on behalf of himself and Dr. Michael Rinker from the PTB. They had delayed starting the full revision of R 117-1 until -2 and -3 had been approved, but now that this had happened they were ready to begin an immediate revision of all three parts. While creating Part 2, they had found several things in Part 1 which would need to be revised to ensure full harmonization with all three parts. They also had several annexes in Part 2 that were going to be added, but which had been delayed in order to have that part approved in its current status. These were measuring systems which were going to be part of the whole R 117 family. A couple of these did

    not yet have the requirements in Part 1 and did not have test procedures in Part 2. He had therefore included in this list four of the significant items:

    - measuring systems for unloading ships' tanks and rail and road tankers, using an intermediate tank;

    - measuring systems for liquefied gases under pressure, other than LPG dispensers, because LPG dispensers were already in R 117;

    - measuring systems for bunker fuel, which had become a very important project because billions of dollars' worth of bunker fuel were exchanged annually and there was not really a good set of requirements or set of test procedures for it. It was now being done dynamically, whereas it had previously been done statically; and

    - measuring systems for LNG, for which the same was true, i.e. previously they had mostly been measured statically, and there had been a huge call to develop requirements and test procedures to measure them dynamically.

    Mr. Richter also pointed out, which had not yet been mentioned, was that as R117-2 and -3 had just been approved, so now all three parts were available. He would like to propose that at some point when Parts 2 and 3 had been published, R 105 Measuring systems of mass flow measurement, and R 118 Test procedures for fuel dispensers, should be withdrawn Mr. Richter invited questions on the scope of the project, which would include all three parts. Several of the annexes had already been started, including those for bunker fuel and for LNG, which they had been told not to include in the current version of Part 2, but rather to wait until they had an improved Recommendation.

    Returning to the subject of how tightly defined the scope of this project was, Mr. Mason said that the phrase "the main areas" had been used, as though to suggest that there might possibly be others. He thought it would be useful if the Bureau could comment on the scope that existed for going beyond the specific items that were mentioned in a project proposal when it was approved by the CIML, if indeed there was any such scope.

    Mr. Kool replied that it would be expected that the project proposal would describe the scope. Minor details could always be added and then it was finally up to the CIML to accept them or not when they approved the resulting publication, but in general he thought that they were now going into a process where the scope should be defined as clearly as possible, and the documents should not go beyond the scope in the terms of reference.

    Mr. Mason expressed a wish to clarify that the co-conveners of this project were happy with that formulation.

    Mr. Richter said that if he understood correctly, he was being asked to make a statement that number 5 was all that would be added.

    Mr. Mason replied that this was in principle the case, but that his request had been slightly different from that. It had been recognized that four new areas had been identified, but there was still scope for minor modification without coming back to the CIML. The understanding that taking a decision on the basis of this document was that it would not be appropriate for items 5 and 6 to be added to the project without consulting the CIML again. He felt that it was important to have clarity on this, especially bearing in mind that, in the past, the question of the scope of a revision of R 117 had been a matter which had given rise to a lot of discussion.

    Mr. Richter said that he understood completely and was willing to say that five items were what it was planned to do.

    Mr. Mason added that there were items four and five, and that other shortcomings in item four had also been mentioned. This now seemed clear enough to him; he asked whether it was clear enough for other Members. There being no further questions he said that the project could proceed to a vote.

    There were no abstentions or "no" votes so the project was approved. Mr. Kool said that the BIML would now put out a call for membership of this new project to establish the new project group, and, since the functionality was now available for CIML Members, it was possible for Members to indicate online whether they wanted to be a P-member or an O-member. Corresponding Members were also invited to use this online facility to indicate whether they wanted to contribute as O-members to this project. He was not sure, however, how the declaration of the secretariat would function, except that in the proposal Mr. Richter was proposing to be the convener.

    Mr. Richter said that his proposal would be to go ahead and move forward with the existing project group, rather than go through the formality and effort of disbanding it and forming a new one which would essentially have the same composition.

    Mr. Patoray said that he did not wish to detract or deter the group from continuing with its work; however, the policies in B 6 were very clear, that when a project was approved the project group was disbanded. When a new project was proposed and approved, a new project was created. So this had to be tracked through the system, the project had to be created and B 6 had to be followed, despite its admitted inflexibility. In order to ensure the proper participation, the call had to go out. The same group could not simply continue, other Members might be interested, after all that had been going on with R117, and want to participate. There had also been several new Members since this project had been created many years previously, so from this perspective the project definitely needed to be set up as a new project with a call going out. He would certainly not delay the group's work. It was known that most of the people involved, most of the experts, were not going to change, but there might be some additional people to call upon. So the procedures needed to be followed.

    Mr. Dunmill commented that the reality would be a compromise; the procedure in B 6 would be followed, but the default situation in the procedure was that anyone who was currently registered as a P-member on TC 8/SC 3 would automatically become a P-member on this project, unless they said otherwise. B 6 required the BIML to send out details of the project including the convenership, etc., and the terms of reference, to everyone, and would ask P-members of the TC or SC whether they wished to remain a P-member of this particular project group or whether they wanted to be recorded as an O-member, and to confirm the details of the expert who would be responsible for this project, rather than the expert for TC 8/SC 3. In fact the group would probably consist of those currently registered, as most P-members of that sub-committee had been involved in the previous project.

    Mr. Mason recalled that there had been a co-secretariat and a co-convener for the previous project and asked whether it was intended that there should be a co-convenership for the new project.

    Mr. Richter confirmed that this was the intention. Dr. Rinker had helped with the proposal and Mr. Richter assumed that he wanted to stay on as co-secretariat, but he had not asked him that specific question.

    Mr. Mason said that, although nobody was expected to commit at the moment, he felt that it would be helpful for Members to know what sort of convenership there would be.

    Mr. Richter said that there had been a good co-convenership and there was no reason to believe that this would not continue. B 6 clearly said that the convener of the subcommittee was also, as a default position, the convener of the project group; he supposed that this would also be true in the case of a co-convenership.

    Mr. Awosola asked whether this project was going to start immediately or wait for completion of the consultation for new members.

    Mr. Richter replied that, based on what the BIML Director had said, it would start immediately.

    Mr. Patoray confirmed that there was no reason why the group should not continue the work they had been doing, but the opportunity had to be given for others to know of a new project and have it announced, and the BIML had to be able to set up the project correctly in the website so that there was the correct numbering and the convener was set up by the BIML and could then be designated as such by the TC/SC. Any additional members might be extremely helpful, or at least catch up quickly with what had been going on.

