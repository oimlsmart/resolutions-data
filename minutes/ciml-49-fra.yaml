- number: '2'
  title: General report by the CIML President
  narrative: |2+

    Mr. Mason delivered his formal report on the past year's activities:

    "My general report has already been circulated, and indeed made available also in French, but I will crave your indulgence by reading it into the records of the meeting, in particular as there are one or two things which I want to add since the text was distributed.

    It certainly remains the case that I am very much looking forward to this meeting and that there is a lot to report on progress on the matters which preoccupied us at last year's meeting. I think it is also important that we recognize that this is our opportunity to consider how we should build on that progress in the years to come.

    Initially, I would like to welcome a number of new Members to the Committee:

    Firstly, we now have 60 Member States, following the re-admission of the Republic of Cameroon. As we have noted, the representative of Cameroon, its CIML Member, Mr. David Tsegui has not been able to join us today, but I will nevertheless extend to him a warm welcome in his absence.

    Over the course of the year, we have welcomed a further 11 new Members to the CIML, and in particular I would welcome, as they are present:

    - Mr. Bozidar Ljubic, of Croatia, and

    - Engineer Ahmed Yousef Hussein Abo Taleb, of Egypt.

    We will extend in their absence a welcome to the other CIML Members who have not been able to join us.

    I would also like to report that we have a new Corresponding Member, Azerbaijan, and thus that brings our total of Corresponding Members to 68.

    I am also aware of least one Corresponding Member that has begun the process of acceding to the Treaty and therefore I hope to be able to report a further increase in membership next year.

    The BIML Director will be providing detailed information on the current financial position of the Organization later today. However, once again in general terms it is possible to report that the continued investment in the renovation of the Bureau's premises in Paris and in the more modern OIML website, which we saw demonstrated yesterday, have both been achieved without damaging the healthy financial position of our Organization.

    I can also report that all members of the Bureau staff have moved to the new terms and conditions set out in the new Staff regulations which we adopted last year. This is very good news as it would have placed a considerable administrative burden on a small organization like ours if we had been obliged to operate two sets of terms and conditions at the same time.

    The repair and modernization of the Bureau's offices in Paris is also now effectively complete. Perhaps inevitably, for anyone who has experience of working with builders, additional problems were found which have involved extra expense and prolonged the disruption caused by such extensive building work. But these problems I think simply demonstrate how important it was for us to undertake this work if we were to maintain the Organization's principal asset, and that after all was our primary purpose. It is, however, a bonus that we have greatly improved the working facilities of the Bureau's offices, and in particular the new conference center is proving very popular with all who make use of it. And as I pointed out last year, we also now have the opportunity to make savings, as we no longer have to pay for external meeting facilities in Paris.

    The past year has also seen considerable progress in building our new, interactive website which was demonstrated in Ho Chi Minh City last year. Upon completion, we think we can look forward to having a sophisticated tool which will be able to support new and much more efficient ways of working. I was therefore pleased to see so many of you present at the seminar yesterday, at which we were given a demonstration of what the new website can do, and I must say that I found an enthusiastic reception for that work from everyone that I have spoken to since that seminar. It remains, however, important that all of us use the new functionality of the website if we are to make the most of its potential for improving the way that we conduct our technical work. I continue to urge all CIML Members to take a close interest in this, as there are a number of things, not least the registering of electronic votes, which can only be done by a CIML Member or a specifically designated representative - the persons that we are now calling Assignees.

    On the subject of our technical work, I expressed my concerns last year about the amount of observable progress we can show in some of our technical work. This is most clearly seen in the reduction in the number of meetings and committee drafts over the last few years. In what was a very constructive meeting, in March the Presidential Council began the process of reviewing the portfolio of projects to identify those in need of most attention. At the time of that meeting, we had already identified as one area of priority the need to make more progress on R 117 Dynamic measuring systems for liquids other than water, where it was becoming clear that the need to have Parts 2

    and 3 available was becoming urgent. The efforts that were made by all members of the TC 8/SC 3 project groups, and in particular the co-conveners, made it possible to accelerate that work to the extent that both parts are being submitted to you for approval at our meeting, and I would like to acknowledge the extremely large amount of hard work that went into that process. I believe the ability to make such progress was made possible by three things:

    - firstly, the new Directives for OIML technical work, OIML B 6, do give us the opportunity to operate more flexibly, in particular through the appropriate use of proxies, and we were able to see what was possible as a result of that;

    - second, I think we were able to identify that where there is a readiness of conveners and secretariats to work closely with Bureau staff it is possible to make better use of the resources that all of us have available to us; and

    - finally, and in my view most importantly, we can see in this case the advantages of CIML Members themselves taking a close personal interest in the way work is being approached in our important project groups.

    Still on the subject of our technical work, in September I had the great pleasure of attending the TC 6 meeting in the Republic of Korea. I can report that excellent progress is being made on all three TC 6 projects, and personally I was very encouraged to see the level of engagement in an area which, as you will recall, has generated some controversy in the past. I hope we will continue to see progress being made in this very important area.

    The achievements in both the areas of technical work I have mentioned will hopefully be reflected in many other projects that we will be discussing during the course of our meeting. All of them underline, in my view, the message that I presented last year, namely how important it is to encourage all Members of the Committee and their staff to take an interest in, and participate as much as possible, in our technical activities. And indeed, one of the things I can also mention as a direct consequence of the presentation which was made yesterday on the functionality of the new website was the speed with which some of our Members, including, I believe, at least one of our Corresponding Members, was able to sign up for involvement in some of the important projects that we have underway. So this is a clear demonstration of how the website is making that process easier and more efficient.

    While the OIML also has key functions in providing the framework in its certificate systems, in liaising with other international organizations and providing support to members of the worldwide legal metrology community, all of these are founded on the quality of our technical work.

    Turning to our certificate systems, during the year we have also seen further work on the MAA, building on the seminar which was held in Ho Chi Minh City last year and in subsequent discussions at the CIML. Making a success of the MAA is the single most important element in achieving the second objective that we set out in the 2011 OIML Strategy, that is "To provide mutual recognition systems which reduce trade barriers and costs in a global market." The number of task groups that have been set up demonstrates that this is a challenge with many aspects and I am grateful for the readiness which many colleagues showed at the meeting in March to become involved in this work. I am particularly grateful to CIML First Vice-President Prof. Roman

    Schwartz for the lead he has given. He will be reporting on the progress on this work later in the meeting.

    Two other matters have engaged my personal attention during the year. The first is the proposal to establish an advisory group on matters relating to what we often call, loosely, "developing countries". As discussed last year, a better (though unfortunately longer) title is "countries and economies with emerging metrology systems", and it may be that we will just have to adopt an acronym if we are going to use that phrase in the future. Even then we probably have a problem about how we pronounce the acronym, but we can sort that out. I have been very pleased with the number of colleagues who have stepped forward to take part in the work of this group. Its first formal meeting took place yesterday evening, and a report on the work of that group will be presented during the course of this meeting. In particular, a survey has already been launched to identify what the priorities of the group should be, and again I have been encouraged by the level of response that we received to that survey.

    Alongside the initiatives coming from the Advisory Group, the Bureau has continued to look for opportunities to support capacity building in developing countries. One of the highlights of my year was to visit the AFRIMETS Legal Metrology School in Hammamet, in Tunisia, where I was able to see for myself the excellent program of speakers which the Bureau had assisted in putting together. Over 80 legal metrologists had been brought together from across the African continent, and it was most encouraging to see the enthusiasm and the liveliness which they brought to their studies.

    The second area which has been engaging my personal attention is the opportunity which we identified for the OIML to participate in an OECD study on the role of international organizations in regulatory cooperation. I believe we have a chance in this to draw attention to the many strengths we have in the ways of working we have adopted and to share these with colleagues in other organizations. There are some organizations that are only beginning the process of reform that we have seen over the past five years and there is much that they can learn, I believe, from our experience. That in turn will help maintain the profile of legal metrology in these important international forums.

    As regards our bilateral relationships with other international organizations, we continue to work well with the BIPM, an organization which is now heavily engaged in its own process of internal reform. Some of the concrete examples of that working together were demonstrated yesterday in terms of the way that the resources of our Bureau and the BIPM have been brought together on the work relating to the website.

    Another example was the level of cooperation at the Metrology School that I have already mentioned. But these are only one or two instances of an approach to collaboration which is now both deep and broad. It was also a great pleasure for me to attend the ILAC/IAF General Assembly this year, at which I signed a renewed Memorandum of Understanding with both organizations. These relationships continue to be very important if we are to achieve a genuinely global metrology system. I should say that there were a number of things which I personally took from the ILAC/IAF General Assembly, points of interest about matters that are very similar to the ones that engage our attention. The arrangements for their annual meeting was one of the things which they were spending a great deal of time reconsidering; I think we may need to give some further thought ourselves to how we organize our annual meetings in the years to come. Another important example that I took from that meeting was the work

    which ILAC in particular are doing to put more flesh onto the strategic vision which they have, and again, I think we will be having to go back to that issue during the course of our discussions.

    As many of you will be aware, in May 2014 I stepped down as Chief Executive of the UK's National Measurement Office, though I continue to serve as a senior official of the Office on a part-time basis and I remain, of course, the UK's CIML Member. The advantage of this is that I expect to be able to devote more time to my responsibilities as President. My priorities in this are as I expressed them last year - to support colleagues in the legal metrology community across the world and to promote more widely the importance of metrology in economic development. During the year I have attended meetings in Abu Dhabi, the People's Republic of China, the Republic of Korea, in Tunisia and in Canada as well as several visits to the Bureau's office in Paris and to OECD. After this meeting I will be attending the annual meeting of the APLMF, and it will be my intention to also attend at least one meeting of all of the other Regional Legal Metrology Organizations during the second half of my Presidency. Working with colleagues across the world, and most particularly those in the Regional Legal Metrology Organizations, is essential if we are to make the greatest impact across all the areas identified in the OIML Strategy we adopted in 2011.

    Looking forward, my personal priorities will be to encourage the streamlining of our technical work, through more intensive use of the procedures in B 6 and the new features on our interactive website, and to pay particular attention to those activities which are of the greatest importance to our Members whose metrology systems are still at an early stage of development. In all of this I know I can count on strong contributions from our two Vice-Presidents and my other colleagues on the Presidential Council, which was further strengthened earlier this year when we were joined by Dr. Villiere, the CIML Member for Australia. Both the Director and myself continue to benefit greatly from being able to turn to them to assist us on a wide variety of issues which arise during the year.

    I would also like to express my gratitude to the BIML Director, Stephen Patoray, and his dedicated team of staff for their significant accomplishments. I have been very impressed by the way in which all the staff in the Bureau, under the leadership of the Director, have risen to the challenges of the program of change which we have introduced, and I was particularly impressed that they continued to do so during the period of disruption which was created by the refurbishment of the building. So I think I can be confident in looking forward to another successful week here in Auckland. The great strength of our organization is that it is a membership organization. As a memberled organization, it is important that we make the most of our chances to meet together, not just in formal sessions but in the other events which are organized. But equally, being a membership organization means that we are very dependent on the willingness of our members to participate fully in all the activities of the Organization. We have made a lot of effort over the last few years to modernize and make more efficient our systems and procedures, but these are not ends in themselves. We will only see real benefits flow if we are now able to involve more of our members in tackling the challenges ahead. And perhaps that is a topic which we can discuss more in the margins of our formal sessions.

    So in conclusion can I thank you for your attention and confirm that I am happy to take any questions which Members have on my report and the topics that I have mentioned. Thank you very much."

- number: '3'
  title: BIML matters
  narrative: "\n"
- number: '3.1'
  title: Report on BIML activities
  narrative: |2+

    Mr. Patoray said "good morning" in Maori, English and French.

    He apologized in advance that his presentation might sometimes become a little long as he would be going through the activities of the BIML, but he would try to keep things moving along. Taking account of some of Members' comments in the past, he had either had not enough detail, too much detail, or just about the right amount. So in many cases he must be doing something at least reasonably good, since he had received comments on both sides of the equation!

    ## Bureau Staff

    Mr. Patoray was pleased to announce that, regarding the staff, the pictures were the same ones as Members had seen the previous year; there had been no changes in the staff and all had pulled together when they needed to.

    During the previous morning's seminar, the three members of the Bureau's staff who formed the web team had been present in France until about 2:30 a.m., continuing to finish up some things that they had noted during the presentation, and also observing many of the emails that Members had been sending because they were registering individuals from their country or economy. So it had been a very interesting time and Mr. Patoray wanted to commend all of his staff for their excellent work. They continued to do that really without any question as far as the time it took, or the effort, and, as had been indicated by Mr. Mason, amid a bit of disruption, although most of the building work had been done at the lower level, so it had not been quite as disruptive as might have been indicated.

    ## Organization of the CIML meeting

    Concerning the organization of the CIML meeting itself, Mr. Patoray particularly wanted to identify Mrs. Saint-Germain, who had spent countless hours making arrangements, contacting Members and organizing the event both over the many months and also on site in Auckland. Mr. Patoray had been receiving emails from her at about 3 am on Saturday/Sunday as she prepared things, and she had been up late again the night before the current meeting. Mr. Patoray's phone was not turned off and buzzed all night, and he appreciated people who worked like this. Thanks to Mrs. Saint-Germain's continued contact with Members, almost 20 additional delegations or proxies had been gained during the week prior to the meeting.

    ## International relations

    The Bureau staff had travelled extensively over the last year. Mr. Kool had met with many different organizations; Mr. Dunmill, as indicated by Mr. Mason, had participated heavily in the recent AFRIMETS school; Mr. Mussio was currently focused on some very special projects. There was basically one expert for everything the Organization did

    which meant that priorities had to be established. There were times when things might not be done as rapidly as possible, but everything possible was done to meet the challenge.

    ## World Metrology Day

    The 2014 World Metrology Day had been a great success, and a record number of hits had been recorded on the WMD website. The posters had also been downloaded a large number of times. Growth was continuing in this area, which was very pleasing, and offered a good opportunity to work with the BIPM directly. This particular very successful poster had been developed in the Republic of Korea by KRISS. For 2015 the theme would be tied into many other international organizations, because it would be the Year of Light. Measurements and light had been chosen as the theme and AFRIMETS would develop the poster. Their contribution was appreciated and a successful 2015 World Metrology Day was expected.

    ## Directives for technical work

    There had been orderly implementation of OIML B 6. This continued and the topic would arise again later in the meeting, but the OIML was learning from it by its use. As indicated by Mr. Mason, there had been an excellent experience with R117 in TC 8/SC 3 and the co-conveners and the BIML had worked together to push very hard to get R117 ready. Mr. Patoray appreciated their efforts and also the fact that they had learned a little bit more about using B 6, and particularly proxies. Again, this would arise later in the meeting. However, some aspects of B 6 were not as flexible as Mr. Mason had suggested.

    ## Building renovation

    Renovation of the building was now complete. The front door had been rebuilt and reinstalled the previous week. A lot of repairs, painting and other cosmetic work had been needed because there had been saturation level humidity in the walls of the building. Moisture in the basement level had been almost 100% because there was what amounted to a "lake" beneath the building because of all the broken pipes. In addition to other problems, it had not been a healthy working environment. All that had been seen to and they were now waiting for the walls to dry out sufficiently to be painted.

    ## Website

    Mr. Patoray very much appreciated the enthusiastic response to the previous day's seminar, and even more the fact that many Members had actually used it after the seminar itself. Several emails had already been received. He would go into more detail later.

    ## Special project for countries and economies with emerging legal metrology systems

    The OIML had a special project for countries and economies with emerging legal metrology systems, about which Mr. Kool would expand later. From an impromptu meeting with the advisory group the previous day, and also during the RLMO meeting, there seemed to be a convergence of the various projects. It was hoped that some of the synergy from the website could be taken and built on to produce a better product for everyone. To date almost nothing had been spent out of the sum allocated from

    Members' funds - a small amount had been spent on some flash drives for the AFRIMETS school, so that everyone there would have all the documents available. There would also be expenditure for an expert report that was currently under consideration and which would focus on emerging legal metrology systems.

    ## Member States

    The return of Cameroon as a Member State was good news; they had paid up all their arrears. Other Members would be mentioned later.

    ## Work program and OIML Strategy

    The work program, which had been published on the site, and which the Bureau attempted to keep up to date, was basically a history of what the Bureau did, rather than a chart for the future.

    Mr. Mason had also mentioned a challenge for the future: Mr. Patoray would like to put forward a strategic plan based on the Strategy. The Strategy was an excellent document, but did not really give a plan for three to five years of major objectives and future action. The Strategy gave a picture of the scope of what could be done but did not give the actual activity or who was responsible, how long it would take and when results might be measurable. Mr. Patoray would like to see these objectives developed out of the Strategy and turned into the Bureau's work program.

    ## Travel

    Members had received a document which listed all the meetings and travel for the past year. Mr. Patoray himself had travelled much more extensively in the current year than in the previous one. Mr. Mason had also travelled much more in the current year, as had Mr. Mussio. Travel had therefore amounted to more in terms of expense, but Mr. Patoray still expected to be within budget limits, and travelling and meeting people had been a productive experience. He had recently attended an excellent conference on quality infrastructure in China and how it fitted within metrology, because sometimes there was a disconnect with structure, standards and metrology. Messrs. Mason and Patoray had both attended a meeting in Abu Dhabi, also several other meetings, and he was planning to attend the APLMF after the current meeting.

    Mr. Patoray asked for questions on this section of his presentation, but there were none. He reminded Members that acceptance of this report would be one of the resolutions for acceptance in the final session of the meeting.

- number: '3.2'
  title: Progress with the new OIML website
  narrative: |2+

    On the subject of the website, Mr. Patoray did not wish to take up too much of Members' time at present as most delegates had attended the presentation at the seminar the previous day. Those who had not been there or needed help or further demonstration were invited to contact any of the Bureau staff who were present. He was in possession of a list of current user names and anyone who was not on that list should contact the staff to have one created so that they could have access to the relevant parts of the website.

    Mr. Patoray asked whether there were any questions or problems relating to the website, and was pleased to discover that there were none. It was enjoyable to watch activity on the website and see emails going back and forth.

- number: '4'
  title: Member States and Corresponding Members
  narrative: |2+

    Mr. Patoray said that Cameroon had re-joined as a Member State, as previously mentioned, and Azerbaijan had joined as a Corresponding Member. Several more countries were currently in the process of joining the Organization and it was encouraging to see this continuing interest from various regions of the globe: there was activity in Asia, Africa and also in the Americas. He did not want to make prophecies because the timing was always difficult to anticipate. Acceding to the Convention was a political process; it could sometimes take years for this to take place, but encouraging responses had been received from various countries, and Mr. Patoray hoped to see the number of Member States increasing soon.

    There was now a record number of Member States as well as Corresponding Members, covering a significant part of the globe. Everyone seemed to him to emphasize the African continent as the area with the least coverage, but in most of the Americas also there were either only Corresponding Members or no membership at all; this was another place where additional effort could be put in. There had been some excellent help from Brazil and Colombia, as well as Cuba, to which Mr. Patoray had been able to travel in the current year for a forum; the United States and Canada were also always very strong supporters of the Organization. So with five Member States in the Americas, Mr. Patoray said that he would like to see that number increase significantly. SIM had reported that they had 34 members in what was basically the same area of the Americas, so there was a lot of potential there. Also, from the work going on in the Asia Pacific area and the agreements being worked on there, there was a lot activity in that area, and Mr. Patoray notably appreciated the work Prof. Kochsiek was putting in, Thailand being only one of the places he had visited. Prof. Kochsiek had run various seminars trying to set up things related to the infrastructure, or what OIML D1 could do for the metrology system. Summarizing, Mr. Patoray said he was very encouraged by the record number of Members and the increase in numbers over the last four years. He invited questions - there were none.

- number: '5'
  title: Financial matters
  narrative: "\n"
- number: '5.1'
  title: Approval of the 2013 accounts
  narrative: |2+

    Mr. Patoray said that this year he had included less detail than in previous years. The current auditor was Mr. Frederick Fischer, who had reviewed all the information Members had in their reports and documents. His report was satisfactory and all the requirements relating to IPSAS were met. Mr. Fischer had been auditing OIML accounts since 2010, when the company he worked for had been contracted. He had worked on the audit for 2009, and on completion of that he had re-done the audit from 2008, which had lacked some characteristics necessary for a true audit. He had come in every quarter to review the status of the accounts, and gave a provisional report every trimester. He had given guidance on better presentation and had helped to set up the 2013-2016 budget, which had been approved in 2012. Mr. Patoray appreciated the

    efforts of Mr. Fischer, and the process indicated that the OIML continued to be in a solid financial situation.

    Jumping to the "bottom line", Mr. Patoray showed a slide indicating that for 2013 the budget had been intended to have a positive result of €12000 but in reality the budget surplus had been $ \epsilon 4 6 \, 0 0 0 $ , considerably higher than anticipated.

    Total charges, Mr. Patoray commented, had been slightly higher than anticipated. Some of this had related to the need for scaffolding at the front and back of the building for almost a year during work on the roof and façade; this expense, he explained, could not be included in capital costs because it was a one-off expense which would not be incurred in future years' charges. Similarly, the charge for the architect could not be capitalized or depreciated and thus featured among the year's costs.

    Income was almost on target, and would increase in the coming year due to the change in classification of a number of Members.

    Mr. Patoray showed Members their net assets in picture form. These had been climbing since 2011 and continued to do so, largely due to the investment in the building, which had recently been revalued at €3.2 million, having increased by about $ \epsilon 3 5 0 \ 0 0 0 $ due to the renovations and a slight increase in Paris property prices. Depreciation costs had gone in to the account and come out as cash, and the cash had dropped a little in 2013, which was when most of the expenditure on the building work had taken place.

    Mr. Patoray showed a chart indicating a drop in the base contributory share in 2013 followed by stability until the end of the budgetary period in 2016.

    Referring to travel and charges, Mr. Patoray said that this was taken seriously in all Organizations. Members had to justify their attendance at meetings such as the CIML, and the Bureau took their travel costs equally seriously. They had been under budget since 2011, but he expected that 2014 would be pretty close to budget, due to the increase in travel recounted earlier. However, it was closely watched and controlled.

    Mr. Richard asked about employee benefits, referring to note 10 in the 2013 accounts document (Addendum 5.1), in which there was a table of acquired pension rights from 2006 to 2013. This number was continuously increasing and so he wondered what the projection for the future was. Would the number ever be stable, or would the value of the building increase in proportion?

    Mr. Patoray replied that the numbers given related to the actuary account done in 2010-2011. He had not felt it necessary to do another, but with the current pension changes and Mr. Dunmill moving from the OIML pension system into a private pension, it might now be appropriate. The numbers were increasing due to the effect of inflation on the rights of those people currently receiving pensions. Regarding stabilization or decrease, the reality was that the recipients were all getting older and no more contributions were coming in. Eventually the numbers would decrease but nobody would predict, or wish for this event. The increased value of the building certainly covered this liability. The numbers would eventually stabilize or drop, and also the inflation rate had not been as high as had been projected. Actuarial reviews were expensive and had not seemed an immediate priority, but one would be undertaken. Another question was whether it was necessary to continue to put a provision for pensions in the budget.

    On the subject of chapter 3 "Execution of the budget", Mr. Van Mullem asked for an explanation of the administrative costs, which had almost doubled compared to the budget [Note 16 on page 46 of 53 in the document].

    Mr. Patoray replied that he could provide a complete breakdown of these costs. Most of the charges were one-time matters, for example the scaffolding, the architect's fee, payment to the ILO for the lawsuit which had been part of the system. He would supply detail later.

    Mr. Van Mullem also pointed out that the income from certificates had dropped compared with 2012 and 2013, and asked for an explanation of this.

    Mr. Patoray replied that this was because 100 certificates had not been forwarded to the BIML for a period of time. The Bureau had therefore temporarily not been able to issue invoices and receive the revenue for the certificates in question. In fact the amount had dropped in one year but had risen by a corresponding amount in the next. There had therefore been no change in the number of certificates overall.

    Mr. Van Mulem further asked about the $ \epsilon76000 $ entered in the accounts as "other income", which appeared in the results but not in the budget.

    Mr. Patoray explained that this related to the re-accounting from the past relating to the resolution about clarification of three years of arrears. Many past accounts had had eight or so years of arrears in the accounts. It had been necessary to account for the adjustment, which arose from the habit, in the past, of continuing to invoice Members after the three-year limit had passed. These had been entered in past accounts as bad debts and had had to be taken out, so it looked like income because the offset had to be shown. This was a one-time and very unusual effect and would not reappear.

    Mr. Patoray pointed out a translation error in one of the tables: The French word "Logiciel" had been wrongly translated as "Buildings" instead of "Software". This had been carefully checked with the auditor.

- number: '5.2'
  title: Management of the Translation Center
  narrative: |2+

    Mr. Patoray reminded Members that at the CIML meeting two years previously there had been discussion of the continuous growth in the funds in the Translation Center since about 2003, because there had been no translation activity to use them up. It had been noted that most of the work in the technical area was now done in English, so translation from French to English, which had been the fund's original purpose, was no longer necessary.

    Members had agreed to make it possible to take some of those funds to work on the backlog of English publications that had not been translated into French. This had included the minutes from the 2004 and 2008 Conferences. Several different sources of translation had been used. The biggest part of this for technical work had been through the French LNE. Up to five people had been working on translations, and they had organized themselves to be able to re-read and check the documents.

    An independent translator had translated the Conference minutes and a number of nontechnical documents. All this had brought the funds down quite substantially. The backlog had been more or less resolved in the last year, and several of the Recommendations were currently being completed and would shortly be published. A substantial number of documents had been translated, and the stage had now been reached where the translations were being paid for out of the current budget, although no allowance had been made in this budget for translation. As it had not formed part of past budgets, it had not been considered in the making of the current one. Mr. Patoray felt that that money used for translation should in fact figure in the next budget, because it was rather expensive - a basic Recommendation in three parts cost about $ 5000, and a longer version such as R 117 would probably be closer to $ 8000. Payment was on a per page basis, on a generally accepted standard. Several companies had been considered. This was the rate paid to LNE staff on a per page basis, because a page might be a graph or a picture, or might be packed full of more words than were usually expected on a page. A technical expert was needed to do this for Recommendations and Documents. The number of translations in the current year should be lower.

    Mr. Patoray also mentioned that requests for funds for the Translation Center had intentionally not been sent out for 2014. This had been part of the budget which had been included as an income of $ \epsilon15000. $ In the previous year, $ \epsilon1400 $ had been received as a contribution, but no other funds had been submitted. The fund as such was no longer necessary and therefore no longer existed. There would be a need to determine what to do with any remaining funds in the following year and this would come up for discussion at the 50th CIML Meeting. Mr. Patoray added that Mr. Pulham, the BIML Editor/Webmaster, had managed the translations. If he was working on backlog (only), his hours were tracked and the Bureau was refunded out of the Fund for his work.

    By the end of the current year, the fund balance should be down to less than €20 000.

- number: '5.3'
  title: Renovation of the BIML building
  narrative: |2+

    Mr. Patoray told Members that in the past year the Presidential Council meeting and several other meetings had been held in the new BIML conference facility. WELMEC had also used it for a strategy session. The BIML had charged for this session, not to make money but just to break even.

    The main renovation work had consisted of:

    - a new central heating boiler,

    - replacement of the original roof dating back to the late 1800s,

    - venting in the attic to stop condensation,

    - resurfacing of both the front and back façades,

    - emergency exits added at the lower level,

    - installation of a new kitchen,

    - repair and renovation of the drainage system (there had in fact been a "lake" under the building, and neighbors lower down in the street had been complaining about water entering their premises; the repair had been an amazing process: no digging had been done, instead, a flexible membrane had been put inside the existing pipes through access ports, and heated and hardened to create a sleeve inside the existing pipes, which cameras had shown to be broken in many places under the building),

    - installation of air conditioning in the conference center,

    - installation of a system for ventilating the lower level (very important because of the humidity levels there),

    - renovation of the WC areas,

    - removal of the damaged chimney which had been a potential hazard for the sidewalk,

    - renovation of the courtyard,

    - a rebuild of the original front door including an OIML logo, laser-cut out of brass, in each of its large circular glass panels, and

    - replacement of a number of doors and windows.

    There was still a need to wait for the walls to dry out completely so that they could be painted, but this was merely cosmetic. There was also a completely upgraded electrical installation, which included the ability to turn the electricity on and off remotely, thus

    controlling the electricity powering the web server in case of power failure, which was very important for the continuous functioning of the servers and associated equipment.

    Tasks still remaining were the installation of a security system, quotations for which were currently arriving. The current security system was inadequate, comprising only a motion sensor on each floor, and there were no cameras, no smoke or carbon monoxide detectors, and nothing on any of the windows or doors. Nothing had yet been done in the garden; the cleaning staff tidied it up once a month, but at present there was just a rough area of soil. Mr. Patoray did not consider the garden to be a mandatory expense; time and funds would be found for it in due course.

    On the second level, a ceiling consisting of metal strips was falling down, and there had also been numerous floods there; the carpets had never been replaced after the floods, and probably concealed some serious damage. The Director's office had never been renovated - Mr. Patoray had not considered that to be a required expense at a time when there had been so many others, but he would appreciate the ability to make improvements. It looked rather tired, and was, after all, the main receiving area for visitors.

    The server and associated equipment would be moved. Those who had attended the seminar would remember that it weighed 500 kilos and was sitting on the second level. The architect had evaluated that it was not in danger of falling through the floor, but it was not well situated, so it would be moved to the lower level once that had been straightened out and the humidity brought under control.

    The bottom line was that $ \epsilon 6 6 7 0 0 0 $ had been spent. The building had increased in value by over $ \epsilon 3 5 0 0 0 $ , as a result of the renovations. The replacement of pipes and the like did not increase the value of the building, but certainly increased its value to the people working in it. Expenses had been watched and well controlled, reviewed by an architect as well as by Bureau staff. Mr. Dunmill had spent much time monitoring the work and ensuring that expenses were correct and accurate, frequently deducting charges for work that had not been done. The biggest problem had been the unpredicted issues that had arisen because of the state of the building. The foundation had been in very bad condition, as had the pipes underneath, all of which had driven up the cost.

    The budget now contained a value for depreciation, and there was no longer any need to go above that value. The items listed as still outstanding would be done in the following year under the current budget value for yearly depreciation.

    Explaining the ownership situation, Mr. Patoray said that there were 140 contributory shares. Some smaller Member States had one share; those with large populations might have up to eight. The $ \epsilon 667000 $ came out as less than $ \epsilon 5000 $ per contributory share, which seemed to Mr. Patoray to be reasonable value, as they had a share in a building whose value would increase over time. No further major renovation would be needed for the next 20 to 30 years. Nevertheless, Mr. Patoray warned that it would be inadvisable to wait a further 150 years before replacing the roof. He thought it would be advisable to plan to do one of the four floors per year, with its own budget, to include not only cosmetic tasks but also the infrastructure of the floor itself, including the equipment on that floor. Computers, printers, copiers - everything on that floor would be reviewed, and in the fifth year the outside of the building could be looked at. Only in extraordinary circumstances would such major renovations ever be necessary again. The latest estimate of the building's value had been $ \epsilon 3.2 $ million, and it was known to have increased slightly since then. Mr. Patoray asked for questions or comments.

    Dr. Klenovský asked whether the figure of €667 000 also included the equipment for the new website and information system.

    Mr. Patoray replied that it did not. The computers, servers and other equipment came under a separate account. On the other hand, the upgrading of the electrical system had been included in the renovation work.

    Mr. Awosola asked whether there were any plans to let out some of the offices once the refurbishment was complete. This was a possible source of extra income.

    Mr. Patoray replied that the conference center could be rented out, but that all the offices were occupied by the Bureau staff. If more staff should be needed, a sub-division would have to be made, but at present no office space was available except a small office on the second floor, currently used to stock outdated computer equipment.

    Mr. Mason told Members that the conference center was potentially available for other users. He asked Mr. Patoray to explain the approach which it was intended to take to making it available.

    Mr. Patoray explained that, other than by word of mouth or informally, he did not want to advertise the center. Simple catering could be arranged via delivery services, and the cleaning staff could offer any necessary assistance until 12.30. Lunch could be delivered, as had been done for WELMEC, and set up in the lower reception room. It would not be advertised publicly, but members of the community and the Organization who showed an interest would be welcome to use it.

    Mr. Birch commented that he was surprised by the lack of fire protection in the catering room. Such a building would be illegal in Australia. He did not know what the effect would be on the building's insurance.

    Mr. Patoray answered that there were many old buildings in Paris without fire exits or disabled access and that this was not an issue. The lack of smoke and $ \mathrm{C O_{2}} $ detectors could be remedied by a trip to the hardware store, but there was no central system. With the security system, however, each of the four floors would have smoke, fire and, on the lower floors, also carbon monoxide detectors. However, in France, consultation with the architect had indicated that there was no requirement to have a sprinkler system or any fire retardant materials. Even fire escapes were not a requirement except for schools. A plan existed for getting out of the third floor, but an actual fire escape had not been installed because it was not required under French law. Discussion of an emergency ladder or other form of escape was ongoing.

    Returning to use of the conference center, Mr. Mason reiterated that use of this was available to those organizations which found out about it by word of mouth, which would include any organization within the OIML "family", such as WELMEC, which had already made use of it, and the BIPM, with which some discussion had taken place on the possibility of them using this central Paris space for some small meetings. The facility would also be extended to the OIML's liaison organizations. He did not think it would be a good use of time and money to go through a formal marketing exercise aimed at people not known to the OIML, but the definition of "friends of the OIML" would be cast quite widely. He invited everyone in the room to be aware that this facility was available.

    Mr. Dunmill confirmed, following discussions with the architect and the electrical supplier who was fitting the new security system, that there would be smoke detection

    and gas detection fitted in the system, but added that in France the law concerning smoke detection was not yet in force, though it would shortly come in. The Bureau would be in compliance with this law, even though it was not strictly obliged to conform to French law, or subject to inspection under it, because of its ex-territorial status.

- number: '5.4'
  title: Forecast budget realization 2014
  narrative: |2+

    Mr. Patoray informed Members that one advantage of having the meeting later in the year was that the financial analysis for the third trimester had been completed. He would be emphasizing the word "near". There had been some interesting characteristics in this particular year:

    - one was increased travel, at a cost closer to budget levels;

    - figures for the current meeting were still awaited, so expenses were still in a state of flux;

    - €15 000 income was budgeted for the Translation Center, which was not being collected, so that represented a negative under income;

    - rates for social security in France had increased; this affected all employees, as all were covered by the health aspects of French social security, so obviously that had resulted in an increase in costs;

    - Mr. Dunmill had previously been having money deducted from his salary and paid into the BIML Pension System and this had been matched by the BIML. In reality, however, this had only been an accounting process, no actual money had been transferred and no real fund existed. Because of the change, the Financial regulations stipulated that Mr. Dunmill should receive the equivalent amount to what the BIML would have to pay to the French retirement system, to which all the other staff except Messrs. Dunmill and Patoray subscribed. This had a double effect on the budget: contributions were not being paid to the BIML by Mr. Dunmill but an amount was being paid by the BIML to him. The combined effect of this was a charge to the Bureau of about 40 000. This appeared under the heading of "Staff Costs";

    - the biggest cost in these accounts when they were finalized, however, would be depreciation; this was because of the significant increase in the value of the building. There had been heavy spending on computer equipment, and this plus the increase in the value of the building both came under the heading of Depreciation, with the result that the figure estimated for this in the budget was, as Mr. Patoray put it, not quite on target.

    The overall effect of all this was that the BIML was near budget; when the accounting was finished, with some expected outgoings unspent, such as the $ \epsilon 35000 $ ,some spent, some not received, the target would not quite be reached. Only Cameroon had joined as a new Member State this year, plus Zambia, announced the previous year but effective in the current one, and both of these were in any case on the first level of contribution, so the overall contribution was only slightly higher. On the other hand, expenses such as depreciation would show up.

    The other part was that in the current year there had been a substantial budget surplus, in that this was the year when the reassessed classifications of countries, based on population and economics, had come into effect, with the result that several countries' base contributory shares had increased, bringing in a higher income.

    The result therefore for the current year did not risk being negative, but would not have as large a positive effect as had been predicted. More detail would be available at the next meeting, as the final accounts would by then be available.

- number: '5.5'
  title: Outstanding arrears of Member States and Corresponding Members
  narrative: |2+

    Mr. Patoray told Members that the list of these was fairly short. Only Sri Lanka was in close proximity to being struck from the list. An asterisk by Sri Lanka on the slide indicated that they had partially paid in 2012. The rule was that three consecutive years of non-payment triggered expulsion. They would not therefore be eligible to be struck off at the end of 2014, but the only at the end of 2015. There had been significant activity recently in Sri Lanka and it was hoped that good news might be received from them. All other countries on the list showed only the current year of non-payment and it was hoped that this money might be received by the end of the year. Cuba had made a substantial payment, not the full amount for 2014, but a combined amount from 2014 and 2013, which had partially but not fully paid off their arrears. Income was therefore looking reasonably good, and had changed dramatically in the last two weeks; the latest reminder had resulted in a substantial number of payments being received. Any country still in arrears would be contacted through their embassy to ensure that they were aware of the situation, but where there had been a partial payment this would not happen until the middle of 2015.

    Mr. Patoray said that the accounts were updated daily and asked for any indication that information on the slide being shown was not accurate. He went on to say that the list of Corresponding Members was quite a lot longer, but most of them were not in arrears for earlier years and were expected to pay up before the end of 2014. Some countries had a budget cycle relating to the end of the year and came in in the fourth quarter.

    Mr. Patoray went on to say that most Corresponding Members marked on the slide as not fully paid up had only 2014 contributions outstanding, but he expected to see activity before the end of the year in many of these; a small number of them also owed money for 2013. The Bureau would continue to send reminders, and it would soon be time for 2015 invoices to be sent.

    Without wishing to be negative, he pointed out that several Member States were being financed by others throughout the year. The Convention indicated that dues should be paid "at the beginning of the year", and many Members conformed to this. Mr. Patoray understood that some Member States might have issues due to budgeting dates. The new accountancy system would be better able to track when such payments arrived, a task which had in the past taken the form of a paper book in which payments were entered. He expressed appreciation to those who did pay early in the year, as indicated in the relevant resolution. There was not a cash flow problem, but some Members should not be obliged to support others.

    The relevant resolution was shown and no objections were received although it contained potentially sensitive elements.

    ## Additional agenda item: Potential re-appointment of the BIML Director

    Mr. Mason reminded the meeting that this was Members' opportunity to consider how best to approach the question of the potential renewal of the BIML Director's contract, which was for a five-year term and which would normally expire at the end of 2015. It

    had been recognized for many years that this appointment, like those of the Assistant Directors, was a decision to be made by the Committee, and that it did not make sense for it to be made when there was only a month or two left to run. They had therefore looked to have the opportunity to consider the way forward, in this case some fourteen months before the end of the contract. This matter was being approached according to the procedure laid down in OIML B 13 Procedure for the appointment of the BIML Director and Assistant Directors. As frequently happened when using documents which were not often consulted, not all eventualities were necessarily covered, and this seemed to be the experience again this time. B 13 had to be looked at, and consideration given to how best to use it in a certain set of circumstances.

    So Mr. Mason, after consultation with a number of colleagues, was putting forward an approach which would involve giving the Director the opportunity to make his own comments on his willingness to submit himself for a further term, to give an account of his stewardship over the last four years and to set out his views on how he would see himself tackling the role in the future. A written statement, primarily about the achievements of the previous four years, had already been distributed, and this should be taken into account when the decision was made, as well as what he would say on the present occasion about his thoughts on the future. There had also been a request for an opportunity to put questions to the Director, and this had been set up as an open session, as it seemed appropriate for Corresponding Members and liaison organizations also to be able to ask questions of the Director. At the end of that stage the meeting would move into a closed session, exclusively for CIML Members, accompanied by one translator where necessary.

    Mr. Mason asked Mr. Patoray to make his address along the above lines.

    ## Stephen Patoray:

    "Good afternoon again, ladies and gentlemen, President Mason, Vice-Presidents, CIML Members, delegates, colleagues.

    Most of the time, you note that I don't read my presentations. There may be slides, there may be other things. But this is a very important set of information that I am trying to present to you, and I am therefore going to read a statement, and I hope that will not be distracting, but also I feel, based on the time limits and the content, that I need to do this so that I express myself clearly and you will be able to follow along. The statement itself will obviously be available as part of the minutes of the meeting.

    Upon my arrival at the Bureau,

    - I was very fortunate to find excellent individual staff members; however, the staff members did not really work together as a team and also they did not recall the last time they had a meeting as a group.

    - I was also very fortunate that much of the ground work had already been put in place for the conversion to accrual accounting; unfortunately, however, the change to accrual accounting was not accepted by the Administrator at that time.

    - I was very fortunate that the ground work for the change in the policy regarding the pension had already been put in place; however, it had not yet been implemented.

    - I was also fortunate to find an IT system that was functioning and was maintained by a very competent person; however, it was very outdated, there were two separate websites, at least six databases, and none of them communicated with each other.

    - I was fortunate that we had a wonderful historic building, and on the surface it looked quite beautiful; however, serious problems were hiding behind and below all of that beauty.

    - I was fortunate that the Convention and policies described clearly how to deal with Members in arrears; however, those polices were not applied uniformly.

    - But most important, I was fortunate to have Members of this Organization who were very supportive, provided positive input, and anticipated change; however, this came with very high expectations.

    It is my belief that during the four years, a great amount has been accomplished. A new foundation has been set in place. You now have the opportunity to build on that foundation, to create an even better Organization that will be able to begin to focus on the next fifty years.

    The Convention states in Article XXII "The Director shall be responsible for the working of the Bureau under the control and the direction of the Committee". However, as President Mason indicated, a small number of Members wanted me to express my vision for the future, and I will therefore provide some thoughts and considerations for you.

    The first one is based on objective 1 of the OIML Strategy. As I indicated in the text that was sent out to you, there were several objectives based on the strategy. Objective 1 indicates that we develop, in cooperation with our stakeholders, standards related to documents for use in legal metrology. That is really the sole purpose of what we do. We create those Recommendations, those Documents, those publications.

    President Mason has expressed his concern this morning about the amount of observable progress we can show in some of our technical work.

    Currently there are 103 different unique Recommendations; many of those have several parts. At this time, somewhere between 13 and 19 of those 103 Recommendations are up to date. By up to date, I mean, they are less than last five years old, because our documents state that we should review or revise Recommendations every five years. I understand that some do not need revision. The problem is, however, we do not understand how many of those do not need revision, because we cannot determine that from the facts available to us. And if we cannot measure, how can we improve? Significant research was conducted by the BIML on this topic, and the information is just not available. We now have a combined role of the BIML and the TCs/SCs to make recommendations to the CIML which then makes a decision, based on the information presented, on whether these documents need revising or not. In addition, many projects have now been underway for more than five years, some without any drafts submitted at all. But it is not clear, in many cases, when the project began. Some projects have numerous drafts submitted, but it is not clear when they are going to be completed. To me these situations are really unacceptable. We must begin to develop the tools needed to conduct the surveys required by B 6 of the TCs and SCs to determine the reviews. We must also begin to develop the tools to conduct elections for secretaries and conveners as described in OIML B 6-1. The BIML will be prepared to move these

    items forward in a controlled manner early in 2015, under the control and the direction of the CIML.

    There is also the need to improve B 6. It has been stated several times that there are problems with B 6, even though we know it has functioned reasonably well. There are certain sections that do need updating, and our experience with TC 8/SC 3 has been quite extensive. Although President Mason indicated the flexibility of B 6, we also noted during this time the inflexibility of B 6 based on the ability to have a meeting if something has passed - it states we should not - and also setting up the time frame for the consideration of drafts, like a check list or the test report itself as the part 3. There is no flexibility in any of that in B 6. Therefore, I will propose a project at the 50th CIML next year to open a project on revision of B 6.

    There is the need for new and improved tools for the conveners, and we have discussed this a little bit at the seminar. There must be an easy way for the conveners and the members of the project to post their comments, the ability to get the project and the documents up, and we have been gathering information from several of our active conveners. We are now developing the correct tools, and these will be a top priority for the website development in the first months of 2015.

    There is a need for change in the practice of sequential development. Most conveners develop the three parts of a Recommendation sequentially. There are reasons for that; however, it will take three and a half years just to wait for the voting with three parts being developed sequentially. This does not include the work. That again is not acceptable. We also find that when the subsequent parts are worked on they find problems with the parts that have already been approved. That creates additional problems. So we must find the ability and the tools to be able to create the documents together, all three parts, to reduce the time and to reduce the problems with sequential development of different parts.

    The other item is that ISO revises hundreds of publications every year. They have tools available on their website. We have an MoU with ISO, and it would be my intention to find out how they use these tools, what tools are available to us and how we might be able to use them, but, again, under the direction and the control of the CIML.

    What I have described is going to take a lot of work, and it might actually take more resources, so that is something that might need to be considered in the future.

    The next item is Objective 2: To provide mutual recognition systems which reduce trade barriers and costs in a global market. This really is simply the certification system that we have. President Mason has stated that success of the MAA is the single most important element in achieving the second objective. Along with President Mason, I too appreciate the efforts of First Vice-President Schwartz and the work of the MAA Ad hoc working group. They have begun very important discussions, and I would like to remind the group of my background. I was the first Director of the National Type Evaluation program after the transition of the National Conference to administer their own program. I also led the effort in creating Conformity Assessment in the United States. With these experiences, I believe that I am very well equipped to make significant contributions to the discussion, and the BIML and myself will continue strong support of this work.

    However, the actual need to create the MAA Ad hoc group, combined with my experiences, indicate that there may be fundamental problems with the Certificate

    System itself. This was developed in the 1990's, and there has not been substantial change to it since that time. The MAA was developed in 2000. But over this time there have been significant advances in accreditation, peer assessment and certification. But I do not think that our System has kept pace. There are certainly other systems out there in the world that we can model and look at. IEC is present, and we have looked at their systems, so, beyond the immediate focus of the work of the MAA Ad hoc group, it may be time to consider a broader discussion on the entire OIML Certificate System. That would include conformity to type, which I know is a controversial topic with this group.

    I make a personal commitment to President Mason and First Vice-president Schwartz to lead the effort to make the OIML Certificate System successful.

    Objective 6: To identify areas for the OIML to improve the effectiveness and efficiency of its work talks about efficiency and effectiveness. You have seen the example of our website, and we continue to develop the OIML website and the database, but we still need to improve the tools you use. Many of you have seen at the seminar that we have made much progress; now we have the ability for the website to be a dynamic, integral part of the work of this Organization. However, the work is not yet finished. As described earlier, we have several additional phases to complete. One of the main phases is a workspace for the Project Groups, and in discussions we learned that the RLMOs too could use a workspace. They must have an easy way to contact Members and users and be able to develop their documents. So we will continue to seek feedback and suggestions for the site, and we will try to do our best to complete this workspace within the early months of 2015. There is also the need to develop an entire website for the advisory committee. It sounds as though it might be combined with RLMO work, as well as the special project that the BIML is working on. But to develop a new complete site may require, again, additional resources.

    Another area that has been high on my priority list, but, I must admit, very low on my success list, has been efforts to assist countries and economies with emerging metrology systems. I am very encouraged at the progress of the Advisory Group, and acknowledge the work that China has begun in this area. The BIML, and you will hear a report on this a little later, has begun to organize its own work with this, but I can say we really don't have progress. We have a beginning but no real success. We also are beginning a project for an expert report. That is headed up by Dr. Villiere from Australia, to attempt to identify quantities, or quantitative values, for the benefit of metrology and in particular legal metrology, which can be used by developing countries. So a lot of work is going on, but I cannot stand here and say we have made significant progress in this area.

    So I continue to have a great commitment to the work in this area and will again make a personal commitment to assist these projects in any way possible. I still believe that the countries and economies with emerging metrology systems are the real future of this Organization.

    Again on the subject of effectiveness and efficiency, the Convention states that CIML meetings, except for special reasons, are to be held in France. I did not write that. There are currently significant budgetary constraints in many of our Member States. We also find it increasingly difficult for the host country to pay for certain aspects of the meeting, some of these being the reception, food, beverage and other things. There also appears to be a growing difficulty in the ability to justify travel to distant locations. The number of CIML Members present here today is an example of that. In addition, I have seen a significant benefit in the ability of the entire BIML Staff to participate in the CIML

    meetings, in particular the Conference that was held in Bucharest. In order to continue to provide CIML and Conference meetings which are cost effective, accessible to most members and efficient for the Bureau, I believe a discussion needs to begin before the next budget cycle, on how to better arrange for and fund the meetings of the CIML and the Conference. It is clearly understood that this must be accomplished without any increase in the budget or subscription fee.

    In conclusion, you are about to make the most important decision any organization can make. It is a decision about an employee and affects not only the organization but also the employee and all of those around that employee, not only now but into the future. It is also a very important decision to me personally. I indicated that I would not lobby for reappointment, and I am not doing that now. The decision is up to you. You must decide what is best for the Organization.

    I wish to indicate again to all of you, so that there is no misunderstanding; if you decide to create a selection committee and put out a call for candidates, I would consider that as a vote of "no confidence", and I would not apply as a candidate and you would be free to find a more suitable Director. I only ask now that you make a clear decision on your expectations. I need to know your intent for my future so that I may be able to make the necessary preparations for continuing as the Director of the BIML, or I need to begin preparations to return to the United States Department of Agriculture by January 2016 according to my terms of separation.

    From the time I joined the BIML, I have done my best to fulfill my promises to you. Together we have completed many major projects. I believe that I have delivered all that I was asked to do. I am very proud of my accomplishments, but, more importantly, I am very proud of the accomplishments of the BIML's staff. I strongly believe the BIML as well as the OIML is in a far better place today than it was four years ago.

    I thank you for your time and attention, and I wish you and the OIML all the best. Thank you."

    ## Mr. Mason thanked Mr. Patoray and called for questions.

    Dr. Ehrlich referred to Mr. Patoray's statement that he would lead an effort to make the OIML Certificate System more successful. He asked him to elaborate on what he thought needed to be done, what he would personally do and how other parts of the Organization would be involved, where TC3/SC5 might fit in, how the ad hoc committee might fit in. It would be useful to understand more of what he had in mind.

    Mr. Patoray replied that a lot would depend on the work of the ad hoc committee and where they were going. It was very early, there had not been significant progress with the ad hoc committee. He admitted that he was a significant part of that lack of progress, due to other commitments. In the case of the Basic OIML Certificate System, to him this seemed to be a broken system, because it was based on no confidence. There was no certification or accreditation for the laboratories that were identified, so the best way to put it was that a Basic certificate was issued based on the signature of the CIML Member. In his opinion, there was no confidence in a Basic certificate, and that was one of the reasons they were not very well accepted. There were also significant parts of the market in the world that did not accept either Basic or MAA certificates. Why was this? he asked. The ad hoc committee was attempting to find that out, and he hoped that this

    could be done. But if this was not possible, he questioned whether there was something broken with the system itself. The piece of paper that recipients had was no better than the confidence they had in how it was generated. To him today, the Basic system was not working. The MAA was the future of where OIML was going. He appreciated the work of Prof. Schwartz in chairing that committee, and he expected they would make good progress, but it did not address the entire system. At present there were only three Recommendations in the MAA, so there was a need to look at the larger scope of what went on. One of the questions was a single system, but it did not address a single system for the entire Certificate System, only for those of the MAA, and even this was proving difficult.

    Coming from the United States, Mr. Patoray was aware that there was a totally different perspective there on what a certificate was. The National Conference actually issued the certificate. They owned the certificate, and they had a conformity assessment program to back up that certificate. It was very different from the OIML system, where certificates which had been issued by others were registered with an OIML logo. It had taken him a while to understand that difference. So from his point of view in looking for an answer, he had a different perspective on what a certificate system was, and he would like to be able to open the discussion to determine what exactly the expectations were for an OIML Certificate System, not just the MAA.

    Prof. Schwartz asked Mr. Patoray whether, on the subject of the MAA, he thought that more resources needed to be allocated, so that the MAA could be better supported by the BIML, as had been the case in the past, with Ms. Gaucher and Mr. Just. Prof. Schwartz believed that thought must be given to the question of whether there were enough staff at the BIML to support the MAA in the function of its secretariat and CPRs. He asked Mr. Patoray whether he believed more staff should be allocated at the BIML.

    Mr. Patoray responded that he could not answer that question at the moment, mainly because if there were additional staff at the BIML at present they could not be fully employed. The work of the ad hoc committee had been distributed to task groups; the BIML was a member of a task group but not leading it. If the direction of the CIML was for the BIML to lead the groups, then additional resources would indeed be needed, but for support, this was not necessary at the present time.

    There was not a tremendous amount of work now the system was in place, so he did not know exactly what additional staff would do. But if there was progress with the ad hoc committee, once they decided what was necessary for the Basic System, then that might alter. One of the questions to emerge from one of the task groups recently had been the structure itself. One of the proposals was a management board or management group participating in that, but the simple answer that he could commit to at the time of speaking was that he would personally head, if there needed to be the CPR and its chair, or whatever was decided.

    If any additional support was needed, one of the things that Mr. Patoray had committed to was that - if it was to be structured properly - the MAA, CPR, DoMC (or whatever terms were to be used for the system currently known as the MAA) could be led by the Director himself, with support, rather than hiring an additional person. Then it could be determined what support was necessary. He agreed that that had not been the case in the past, when he had been focused on different things and let the MAA be run in a different way. Moving forward, however, he was committed to support this in any way he could in order to make it successful, and one of those commitments would be for the

    Director to be directly responsible and not have to pass through anybody else. He would chair the meetings if appropriate, if this was decided by the ad hoc group, and ensure that all the documents and all the other things were available. He might need support in this, but it would be support for which he would be the person with responsibility.

    Dr. Klenovsky said that very hard words had been heard about the Basic Certificate System, and he wondered what the hard data were that supported this criticism. In his country they used the Basic Certificate System for some measurement systems that fell outside the normal regulations such as the MID in Europe, for example level gauges, and, to his knowledge, it worked quite well and their certificates were very well accepted. On the other hand, he could offer numerous examples of things that were accredited but did not work, so this was probably not the only problem.

    Mr. Patoray thanked Dr. Klenovsky for his comments. He was sure that this subject could be discussed in much more depth, but the main thing that he was trying to point out was that the certificate was issued by a laboratory about which he knew nothing, not whether it was certified, accredited or anything else. At the present time there was no requirement in the Basic System for any type of credential for a laboratory. All that was required was for the CIML Member to send in information that they wanted to become an issuing authority. He would have no problem with most of the laboratories doing that, and most of them were probably in fact accredited, otherwise they would not be laboratories, but the OIML had no record of that, they had no information to provide to anyone when a question on the subject came in. This seemed to him to be a significant deficiency in the organization's Basic Certificate System. The MAA took care of that because it required either a peer assessment or accreditation. If such peer assessment or accreditation was required for all the certificates issued, confidence in them would begin to be built.

    Returning to Prof. Schwartz's question and his own about clarification of the role Mr. Patoray would play, Dr. Ehrlich said that he had not heard him mention the OIML subcommittee that was responsible for B 3 and B 10. Was Mr. Patoray saying that he would be taking over Mr. Mussio's implementation role and lead the effort, or was he saying that the BIML would take on the subcommittees' leadership role?

    Mr. Patoray replied that he would take on responsibility for whatever the ad hoc group decided. In his opinion, what the task group had proposed was a very good proposal, and included a management board for the Certificate System, which included their development of the process, not development in a technical committee. This was not a technical document for that type of development. In Mr. Patoray's opinion the management board would take responsibility for development of the policies and procedures for the Certificate System. How that fitted within the structure of the Organization would be determined. He would support the effort of the task group and what they had presented.

    Mr. Mason told Mr. Patoray that he had described both his own experience and the way in which he envisaged contributing to policy making and discussion, in particular in the MAA field. He had also described his approach as one of following the direction set ultimately by the CIML, but often by sub-groups and the advisory group. He asked him to elaborate on how he saw these two roles operating side by side, particularly in the MAA, since that was under discussion, but also possibly in others of his responsibilities. In other words, he asked how Mr. Patoray saw the involvement of the Director in policy making and contributing the benefit of his experience in decisions that had to be made,

    including those to be made by the advisory group. How would the Director go about implementing decisions made by the advisory group which might not be in accord with the advice he had given?

    Mr. Patoray replied that there were certainly times when his advice was not taken. He did not believe himself to be the smartest or most intelligent individual in the room. Members knew, from his experiences, and the fact that he was 62, soon 63 years old, that he was not going to change much in his personality. Members had seen him at his best and at his worst. In the case of his providing advice, this was just advice. Most of the time, on launching a project, there were a lot of ideas and opinions. But on listening to others and attempting to express their own ideas, people often changed their actions and even their opinions. The conformity assessment program in the US ended up far from the process envisaged in the beginning. It had begun as testing units randomly picked off assembly lines and it turned into third party accreditation, about as dissimilar as could be imagined. But Mr. Patoray had had no problem in changing his mind, or in changing directions when they were good directions. He certainly had a strong sense of duty and responsibility to the Organization itself. His thoughts would be strong when the debate was going on, but once the debate was over, one moved on to the next problem without going over the same issues again. Mr. Patoray believed that some of the items he had mentioned were problems, others might not be. If they were not considered problems by the group, then that was the answer. It was not for Mr. Patoray to decide, but for Members. The job of the BIML was to implement these decisions. As had been heard many times, if you get in a taxi and don't tell the taxi driver where to go, don't blame the taxi driver if you don't get there! He was asking this group to tell him where to go, and he would take them there. A lot had been done in four years, starting pretty much at zero in a lot of those areas. He thought they were in a good place, but there was a lot more work to do. There was a need to hear from more of the Members, to have input from others who were able to express what they believed the Organization needed to do. Many times they heard from too few voices. All Members had the vote but some did not make themselves heard. He would like to see open discussion on many of these topics, and many times it just took initial ideas to make people begin to think. It was hard to write a document the first time, but easy to make changes to it and accept those changes, because mostly they would improve the document. This was the way he always worked, but again, as he had explained, his role was to solve problems. There had been many problems in the Bureau when he had arrived, of which some had been solved but others had not. The Organization needed to continue to grow, to build on the fifty years they had had, and if Members had the trust and confidence in him to help them do that, he would accept that. If they did not, they should make that decision now so that everyone could move on.

    Mr. Johnston told Mr. Patoray that his question was on his favorite subject of travel. He had appreciated hearing from Mr. Patoray that he was looking at the cost of holding meetings; he also noted that he had said he had reduced travel costs. Canada was having a systematic review of all travel costs. He was particularly concerned for the 2016 Conference, when a budget had to be proposed for the next four years, that scrutiny of those parts of the budget might detract from the important role of the Organization. He had been a little concerned to hear Mr. Patoray say during his presentation that he would be spending up to the budget. He was asking for his point of view on innovative ways of reducing travel costs, because he felt that he could very well be in a difficult position in two years when he went forward with a justification of the numbers related

    to the OIML. Previously he had been able to point out that it was much less than was paid to the BIPM but he was not sure how much longer he could go on doing that.

    Mr. Patoray answered that as an international organization, with many liaisons, MoUs, other relationships, travel was the cost of doing business. It was not a luxury. Contact with people was necessary; individuals could be contacted in the countries they went to for seminars and conferences. OIML Members had to be able to identify themselves to people in other places, and the tools used by these people had to be identified to OIML Members. Mr. Mason had indicated that at the ILAC meeting he had discussed detail of the strategic plan. He had been encouraged by that, and would not have had that opportunity if he had not attended the meeting. People simply had to be in the same room

    In the context of OIML meetings, however, Mr. Patoray said that there was some scope for improvement. They could review the list of meetings they attended. A lot of working groups and other things in some ways focused on Europe, but half of the Members were from Europe, and these areas had to be supported. A lot of travel had been local, in Europe. But international meetings moved round the world, just as did the CIML, and their location could not be controlled. Travel costs could only be cut by attending fewer meetings, after careful examination of the benefits to be gained from them. Mr. Patoray himself had rejected the opportunity to go to several meetings because he did not believe them to be beneficial. A budget target could be set in the 2016 budget if Members so wished. Travel costs had been substantially reduced since 2011, before which date the travel budget had been exceeded substantially each year. When looking at a budget, the actual expense is not being considered. A percentage decrease could be budgeted for, and kept to, if the BIML was so instructed.

    Turning to the website discussion, Dr. Ehrlich said that he had attended Mr. Patoray's presentation the day before, and also his presentation a few minutes earlier, during which he had heard Mr. Patoray say that he anticipated the project group conveners being able to use the new website workspaces to conduct their business by the first few months of 2015. His feeling was that this had been heard for some time, and he asked Mr. Patoray how much money he was willing to bet on that. Would Members really see this happening? He felt conveners would like to be able to use the website to conduct their work, but he did not have a good feeling of when this was going to happen. For instance, when did he anticipate being able to give training to the conveners on the website?

    Mr. Mason interjected that before Mr. Patoray answered this he wished to clarify what was meant by the expectation of something happening in the future. As he understood it, the website - as described in detail the previous day - already provided a number of functionalities for conveners doing the work required, namely posting revisions, collecting comments and, crucially, gathering votes, so that was already available. In particular for the benefit of members of the Committee who had not been present at the seminar, he wished to clarify that this was already now live. The second element was the possibility of using the workspace functionality, to replicate on the new website the opportunities which existed on the old "Workgroups", but which were not used by many conveners. There might be third and fourth elements of a convener doing his job, but Mr. Mason considered that before Mr. Patoray answered, it would be helpful for the questioner to clarify exactly what he meant by "the facilities that are required for the

    convener to do their jobs", because, as he understood it, a lot of those facilities were already there.

    Dr. Ehrlich thanked Mr. Mason and admitted that he had perhaps misunderstood what was available. He had not had a chance to look at the website and so had not seen all these new features. Perhaps he had misunderstood just what features were available and then which were not available. He said he would turn his question around and just ask what were the features which Mr. Patoray had been referring to, which he had said he hoped to have available in the first few months of 2015. This was really his question.

    Mr. Patoray replied that the website itself still maintained the previous "Workgroups" site, as it always had. Work could be done there at any time. But in fact the major part of it was not used. Most conveners were not using it. Fortunately, two conveners did use it, periodically. Two others used it quite extensively, and perhaps one or two others used it occasionally. Beyond that, of the hundred OIML projects in existence, nobody was using it. The tools available at the present time were that on the website there was a clear indication of the project, the project phase, the project P-members, O-members and liaisons, and the ability to get to emails. There was now no need for the conveners to keep any of this information on their own personal sites, because it was all there and active and dynamic. The previous day, there had been a number of changes in roles and positions in the TC/SCs after the seminar itself, and it had been encouraging to see notifications arriving concerning the changed roles and positions in certain TCs/SCs/PGs. Beyond that, there was now the ability to send completed committee drafts to the BIML for posting on the website for voting online, with the deadlines and the other parts.

    He remembered the strange expression on Dr. Ehrlich's face when Mr. Patoray had spoken of voting in the PGs. He was sorry that Dr. Ehrlich had not understood the function that was there. The conveners sent their information and they could see the results and the votes as they came in, so they could work on whatever they needed to. This was available and would be archived.

    What was still to come was the actual workspace itself, because beyond the voting that took place on a CD, there was often also the need to have more informal input, comments, and feedback from the group itself on the work. As the convener was developing the document there were always questions or issues which arose. Conveners who developed their documents in committee rather than doing it themselves needed to have the ability to communicate with those committees in different ways by different methods. The workspace would be developed so that the convener could have a more pleasant experience than they had on the current Workgroups site. Beyond this, there would not be many more tools than were on the current site, except that it would be much more user friendly. Teleconferencing and the like could not be developed on a website, because it did not work that way, but it could be used for exchanging information, exchanging documents, being able to collect comments that were not part of the CD though they were part of the work. There would be a workspace that could collect all the information, contact people and bring things together. This was the area currently being worked on. Mr. Patoray's way of working was to develop at the highest level. Facilities for voting had been needed. This had been developed at the CIML Member level. It had been implemented into the project group recently, but it was the same process. Workspaces would be developed because the project groups needed them, but they would also be developed for the advisory group, for the RLMOs, for the

    Presidential Council, potentially for any ad hoc groups, for the MAA, the CPR, and anything similar which had voting and meetings. Also described was meeting registration, so that when the convener called a meeting people could register online or identify a proxy if necessary. These tasks had been difficult in the case of the meeting for R117, and the new facilities should help. Similar online registration had been used for the current meeting and it was set up so that the right people, including the PGs, would have access to it.

    Dr. Ehrlich thanked Mr. Patoray for this clarification and again agreed that he had perhaps misunderstood that certain of these tools now already existed and had gone online and become available the previous day, that these were additional tools for the conveners, that conveners could continue to work using email as they did at present, in collecting comments or go into the workspace in the future, and that the workspace, as it developed, would make it easier to do that work. He asked whether that was a correct analysis.

    Mr. Patoray confirmed that this was correct, except that this could already be done on the current Workgroups website, and several conveners already did it that way. It was not heavily utilized, however. It would be an enhancement of what already existed and provided easy informal communication within groups. CD voting was a formal process, with deadlines, specific documents that had to be finished and put up and voting was on something complete; before reaching the CD stage, work on drafts etc. was on an informal basis. The informal workspace provided could be utilized to collect documents in a safe and secure environment, because the documents would eventually, after scrutiny, get into the server, and must not be allowed to bring viruses with them. So this workspace would be a virtual machine outside the secure zone. Mr. Patoray added that this part of the work had taken longer than expected because it had been necessary to start from zero, but now that all the basic tools were in place things could move faster.

    Mr. Mason suggested refining the original question so that there would be clarity about time scales. He reminded Mr. Patoray that he had spoken of the workspace development requiring three or four months. He repeated the phrase Dr. Ehrlich had used "how much will you bet?" Mr. Mason thought that within OIML circles the proper phrase was, "what is the level of confidence you have that the workspace will be available for, say, the Presidential Council meeting in March?"

    Mr. Patoray replied that basic areas could be set up, the structure determined and initial tools made available. He would not say that everything would be completed by then, however, because eventually this workspace would also include areas such as the ISO tool which provided the ability to correlate comments. This was an extremely powerful tool, but would take additional time. The basic workspace could be set up with a target date of the Presidential Council meeting if that was requested, and would be continually enhanced in the course of time.

    Dr. Ehrlich apologized for his informality. His question actually was, going back to the other question he had asked, at what point Mr. Patoray thought it would be possible to start training conveners on the use of the website.

    Mr. Patoray responded that on the website, at this point no training was involved; documents would be sent to the BIML and posted by them. If the workspace was set up properly, training would not be necessary for that either. Many of those present had logged in the previous day and changed some status of their projects. He confirmed with those present that they had not needed training in order to be able to accomplish this.

    The new tools would be equally straightforward and user friendly. Training was, however, necessary to ensure the parallel development of documents as the present practice of sequential development of documents over seven to ten years was totally unacceptable. Most people did not know how to use proxies; Mr. Richter had learned very quickly and had done an excellent job with them, but many did not know they existed because they had not closely read B 6. For these two types of training, the BIML had been waiting to have the website in place, but this was probably now sufficiently advanced for this training, which would be regionally located, to take place. All the American Members would be trained in the US, which was the only Member State that had a convener. Europe had numerous conveners, as had Russia and Asia. So four different centers of training could be set up, but this was training in the use of B 6, not of the website. He agreed with Dr. Ehrlich on this. He had previously thought that the new tools would be very sophisticated, like the old ones, on the Workgroups site, which had been complicated and not user friendly, but the new ones were quite different, as had been seen at the seminar the previous day. It was possible simply to push a button, see the information that was needed, and get on with the work. Collating the comments would take more work, being always the convener's hardest job. He hoped that ISO would allow their tools to be used by conveners, but discipline would be needed in the way the responses and the comments were submitted and entered if this tool was to be used.

    Dr. Ehrlich interjected that replying to the comments was equally if not more difficult.

    Mr. Mason commented that, in terms of functionality, his understanding was that the website already allowed for replies to be posted and thus made readily available to everybody with an interest in them. The functionality existed, but hard work would always be hard work.

    Mr. Mason thanked Mr. Patoray for the candor with which he had addressed the Committee and answered the questions put to him. He said that the CIML would move directly into the closed session. All non-CIML Members apart from necessary interpreters were asked to leave the room, and Mr. Mason asked that the session not be recorded.

    ## [Closed session not recorded]

    Mr. Mason told Members that as a transparent organization the results of the closed session should be reported back to Members. The resulting resolution read as follows:

    ## Resolution no.2014/4

    The Committee,

    Having regard to section 7.2.2 of OIML B 7:2013 BIML Staff regulations, section 2, first paragraph and section 4, first bullet point, of OIML B 13:2004 Procedure for the appointment of the BIML Director and Assistant Directors,

    Considering that the term of appointment of the BIML Director expires on 31st December, 2015,

    Considering the proposal of its President, under section 2 of OIML B 13:2004, to extend the Director's contract without a further preliminary procedure,

    Noting the comments made by its Members,

    Expresses its expectation that it will resolve to renew the appointment of the BIML Director for a fixed term of up to five years at its meeting in 2015, and

    Resolves not to appoint a Selection Committee under section 3 of OIML B 13:2004.

    Mr. Mason told those present that the above resolution had been passed with a vote of 41 in favor, 6 abstentions and 4 votes against. So this would be passed and added to the list of decisions which would be made on the following Thursday. They would not, however, be voting a second time on that resolution.

- number: '6'
  title: Report on developing countries matters
  narrative: "\n"
- number: '6.1'
  title: BIML activities in liaison with other international organizations
  narrative: |2+

    Mr. Dunmill told Members that he would speak mainly about the Bureau's contribution to activities in favor of developing countries.

    The main event of the year had been the OIML's involvement in the AFRIMETS Legal Metrology School. Members might remember that in 2013 Mr. Dunmill had mentioned the intention to operate this school as a follow up to one which had been organized by UNIDO in 2011 in Nairobi, Kenya. UNIDO had finally managed, very much at the last minute, to acquire the necessary funding to hold this school. At the 2011 school there had been staff employed specifically to help to organize and run the school, and a lot of local support. The recent school, however, had basically been put together very quickly by a steering committee between UNIDO, the OIML, the PTB and another organization called ACPEUTBT. This was an organization based in Brussels. ACP stood for Africa, Caribbean and Pacific. It was a group of countries which were seen to have common needs. The EU part meant that the funding came from an EU development project directed at those countries. The TBT part was because the whole purpose of their funding was to help in the reduction of technical barriers to trade. The school had been programmed to take place in October 2014, in Tunisia.

    Mr. Mason had already mentioned his participation in it, shortly before the current meeting. The OIML had been the main partner with UNIDO this time, since the event concerned specifically legal metrology. They had been involved to some extent in the 2011 school to talk about legal metrology, but the focus on that occasion had been distinctly on scientific and industrial metrology.

    Mr. Dunmill explained that almost all the participants had been funded by ACPEUTBT. The fund provided various kinds of quality infrastructure support to countries from Africa, the Caribbean and the Pacific. Legal metrology had been something quite new to them. Two ACPEUTBT representatives had attended the 2013 AFRIMETS General Assembly and found out a lot about metrology as a whole and they had been very keen to provide funding for participants, so virtually all the funding for participants' travel, accommodation, etc. had come from this organization. UNIDO had contributed funds for certain African countries not covered by the ACP program. This money had come from the Norwegian aid program, NORAD, and much of the participation of presenters in particular had been covered by the PTB.

    The steering group had consisted of UNIDO, the OIML, the PTB, ACPEUTBT, the AFRIMETS secretariat and ANM, the Tunisian metrology body. At the school itself, the OIML had been represented by Messrs. Mason and Dunmill. The 10-day course had covered quite a wide range of aspects, including

    - legislation infrastructure,

    - the role of conformity assessment in metrology,

    - an introduction to the concept of uncertainty,

    - the training of personnel, and

    - quality systems in general.

    Additionally there had been two main groups: one covered mass and had done some training on weights, non-automatic weighing instruments and a very limited session on automatic weighing instruments; this had been aimed at the verification of these instruments. Most of the countries involved did not have the facilities or even the need to do full type approval testing. Most of them had no manufacturers, so the main concept had been aimed at how to verify the instruments. The other group had been split into two parts, one dealing with mass and the other with verification of mainly volume on liquid fuel dispensers and water meters. Both groups had also done some work on prepackaged goods because this was of increasing importance to developing countries.

    Over 100 people had applied and 86 participants had attended the school, Mr. Dunmill continued. This generally represented two per country, which was the number the ACP program had agreed to pay for. Some countries had proposed more people and had been told that they could have two fully funded and others if they wished to pay for them, so a few countries had sent additional participants at their own cost. 37 African countries had been represented, 2/3 of all African countries, which was very good considering the economic situation in some of them. There had also been two participants from Haiti, thanks to ACP support also covering this area. Mr. Dunmill showed a map of the coverage, and some photos of participants.

    The course content had been a fairly complicated program of plenary lectures, at the beginning and the end of the course, where there had been translation into English and French because of the number of both Anglophone and Francophone countries in Africa. The more technical content, in the middle of the course, had included courses in mass, volume and prepackaging, for which there had been separate English and French speaking sessions. The content had been roughly the same, though not identical, between the groups.

    Mr. Dunmill showed a photograph of Mr. Mason at the beginning of the course delivering his lecture on legislative aspects of legal metrology, and some of the smaller groups, in one of which some members might recognize Mr. Brian Beard, who had been the CIML Member for South Africa for a number of years. He had dealt with one of the mass verification courses, and Mr. Jaco Marneweck, also from South Africa. An attempt had been made on this occasion to invite as many as possible of the lecturers from the African region. This was because one of the complaints about the 2011 course had been that a lot of very high level people had been brought in to do the scientific metrology lecturing, and although they were obviously very knowledgeable, people had said that it would have been nice to show that Africa had some expertise as well.

    As well as lectures, participants had also had some hands-on experience of how to do work on verification of weighing instruments and petrol pumps, and had made some industrial visits to available companies, in one case a manufacturer of gauges for testing petrol pumps, so they had learnt a lot about what to look at when constructing such instruments. They had also visited a manufacturer of electronic scales of all kinds, and weighbridges, so they had seen a little about how weighbridge testing was conducted, and what was important in that. Obviously, to conduct the full verification of a weighbridge would have taken too long, but at least participants had got an overview of the kind of things that had to be taken into account.

    The students themselves had been very good, almost all had participated well in the course, which was always something of an unknown. With 86 people, one never knew whether any of them were going to say anything or whether they would just sit and listen, but almost all of these participants had been keen to learn and participate in the course.

    Participants had also had to undertake project work in small groups, and to work in the evenings and at the weekend. The project had covered aspects of either verification or prepackages, and each of the small groups had had a slightly different topic, based on the visits they had done and the training they had received during the course, and they could be found working up to 11.30 pm. On the last day of the course all the participants had presented their work and been questioned and criticized, advised and congratulated by the other participants according to what they had said. They had all seemed very satisfied with the course in general, apart from the fact that it was a 10-day course and there had been so much information in a short time, a criticism shared by some of the presenters. For example, a mass verification course was normally conducted over a much longer time than had been allotted for this entire course. Surveys filled in by the participants had shown overall satisfaction. There were many detailed comments which Mr. Dunmill had not yet had time to examine, but they would be examined and used as the basis for improving any future courses of this type. There had also been video interviews about people's experiences, from which UNIDO would put together a short promotional video showing this kind of event and how it worked, as an idea to spread the use of this kind of course throughout different regions. After the 2011 metrology school a very nice booklet had been produced, giving its outcome, explaining who had been there, who the presenters had been, what kind of courses had been presented, the benefits of the course and so on, and this had acted as a good publication for raising awareness about metrology training, so the same kind of thing would be done this time.

    During the course there had been some countries present which, as Members might have noticed from the map earlier, were not OIML Members, and some of these had talked to Mr. Dunmill about how to become OIML Member States, or at least Corresponding Members, and he had also had a chance to talk to some countries which had previously been Members but had debts that needed to be paid. Having participated in the course, they might now be taking more interest in legal metrology and keen to rejoin. Of course the people who had been present were not necessarily those who were in a position to make such decisions, because it had been aimed more at younger technicians, but at least they could take the message back to their country and follow it up later.

    Mr. Dunmill said that this had been the main thrust of the year's work, and invited questions.

    Mr. O'Brien asked whether the training materials developed for the course were available online anywhere. The Asia Pacific metrology forum would be looking at doing some courses over the next couple of years so it would be beneficial to look at some of the resources that had been used and pick out the best bits for them.

    Mr. Dunmill replied that they were not yet online because the course was so recent, and they had not yet had any follow up discussions with UNIDO, but he would certainly look into whether they could be made available on either the OIML or the UNIDO website. UNIDO had an e-learning section where they might host such material, or otherwise, being very specific, it could be done through the OIML website.

- number: '6.2'
  title: Advisory group on countries and economies with emerging metrology systems
  narrative: |2+

    Mr. Mason explained to Members that this group had met the previous evening and would now present the results of that.

    Mr. Guo Su, the group's secretary and also the APLMF secretary, speaking on behalf of Mr. Pu Changcheng, the chair of the advisory group, said that he would be reporting on what had been done since the last CIML meeting and the outcome of the previous day's meeting, which he thought had been very productive.

    First he would give a short introduction, as some Members might not know them well; then he would recount their activities since the 48th CIML Meeting; thirdly they had produced some documents and made a work plan for the following year.

    Mr. Su showed the resolution from the 2013 CIML meeting, which showed that the advisory group was focusing on countries and economies with emerging metrology systems, CEEMs for short.

    The chair of the advisory group was Mr. Pu Changcheng, and the secretariat was jointly held by the BIML and China. At the moment it was proposed to hold a meeting at least once a year. The present composition of the group was the CIML President and VicePresident, the Director of the BIML, the chair of the advisory group and its secretariat. They would also like to have a representative from each of the RLMOs, because they needed close cooperation with them, and also some volunteers from OIML developing countries, and some other volunteers based on their personal capacity. There were not many members of the group at the moment so they would welcome people to join them.

    The objectives and tasks of the group were in its terms of reference which the BIML had circulated in August, about which Mr. Su gave some details:

    - the first was that they would carry out the work with OIML activities under the leadership of the CIML and they would consider the RLMOs' work plan;

    - the second was that they would coordinate with the RLMOs to decide the project program and report to the CIML President and the BIML Director to ensure that the project was in accordance with the CIML decision;

    - the third was for the advisory group to carry out its activities in the scope of the CEEMS, based on the needs they collected.

    Mr. Su then showed the activities that the group had carried out since the previous CIML meeting:

    - first, before March 2014 they had developed a work program of the advisory group for the Presidential Council to review and discuss;

    - in April they had discussed cooperation with the Chinese Government and had proposed a project fund from China. They expected to hear updates from them by the end of 2014;

    - in May they had cooperated with China's ministries to give lectures to their colleagues from Nigeria about metrology infrastructure, an example of international cooperation;

    - in July they had met with Mr. Mason to discuss the draft of the Terms of Reference, survey, webpage contents and some related issues. They had finalized these documents and submitted them to the BIML, which had circulated them and sent out a survey to CEEMs,

    - in September they had met Mr. Patoray to discuss cooperation with the BIML;

    - in October they had collated the survey results which the BIML had sent them and produced a summary report, the details of which he would give Members later;

    - before the current meeting they had developed their activities report and drafted their work plan for the CIML to review and discuss;

    - the previous day, they had discussed their work plan, which he would show to Members;

    - they had reported to the RMLO meeting and discussed ways to cooperate with them; and

