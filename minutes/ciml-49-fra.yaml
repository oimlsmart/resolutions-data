- number: '8.4'
  title: 'OIML Systems: the Basic Certificate System'
  narrative: |2+

    Mr. Mussio informed delegates that in the previous year a lot of basic certificates were still being issued on R 76 and R 60, and the BIML wondered why, because most of these certificates had been issued by MAA participants. After looking at the certificates and consulting the issuing authorities, the reason had turned out to be that many of these had been based on test reports issued before the MAA had been established. They could not be MAA certificates because the data was previous to the MAA. This was mainly the case for R 76. Also in some cases they were using data from MTLs but up to 2013 this had not been approved in the MAA, so the certificates had had to be basic certificates. This had to be taken into account when calculating how fast the basic certificates could be stopped, considering the number of certificates which could not yet be issued under the MAA.

    The other interesting point was that most of the MAA certificates emanated from Asian manufacturers, but the issuing authorities were European. Mr. Mussio said that he would explore this matter further. The major proportion of basic certificates was from European manufacturers; he would be seeking reasons for this also.

    The good news was that the percentage of MAA certificates, compared with basic, was still growing.

    The main activity in the previous year had been the intermediate review. Two kinds of decisions had to be taken. One was to re-approve participants, approve MTLs in existing participants, and approve new participants. The problem was that the rules for these decisions are different for the different cases. For re-approval the decision is taken based on the votes cast, whereas for new participants the number of votes needed is a percentage of the total number of potential votes, or the total number of participants. Mr. Mussio said that he had had a really hard time trying to obtain votes from many countries that were not active in the MAA.

    Most of the new participants had been approved. A new factor was that MTLs could now issue test results that could also be used by the issuing authority to issue MAA certificates. Mr. Mussio showed examples of these, from two issuing authorities, both for Mettler. For R 60 there was only one MTL.

    A problem was the case of Korea, which was not a new participant. It was a reinstated participant which had asked to be suspended because of laboratory problems. So the rule of votes cast had been applied. They could not be approved as a new issuing participant because although there was a negative vote, Mr. Mussio had not been able to obtain more than 53% of the total votes of participants of the MAA. This made him think that the process needed to be reviewed, i.e. whether a rule similar to that for project groups should be applied: participants who had not actively attended two meetings, or who had not voted twice, should not be included in the next activities because by becoming a simple utilizing participant and being inactive, the system was blocked.

    The problem of the other issuing participant who had not been approved was also a communication issue. Mr. Mussio had not at that time been in possession of the list of contacts that he now had, because it had not been updated by the participants. He had had to obtain information from the issuing authority; having requested it in March, the last part of it had arrived only in October, so the vote had not succeeded. He requested all Members to check who the official contacts were for their countries, and to also check whether these people were really active. If necessary, they should contact Mr. Mussio so that he could update the list.

    Finally, Mr. Mussio said, there were new experts, including those on the OIML/ILAC list, finalized at the meeting, who could now act as experts for accreditation.

    Mr. Mason thanked Mr. Mussio and asked for questions and comments.

    Mr. Van Mullem asked Mr. Mussio to provide some information about R 49 certificates because what he had shown in the comparison graph was only for R 60 and R 76.

    Mr. Mussio replied that he would prepare this information and put it online.

    Dr. Ehrlich asked Mr. Mussio for clarification about what he had said at the beginning about large numbers of basic certificates; he had not quite followed his explanations of this.

    Mr. Mussio replied that he had noted the large number of basic certificates still issued under R 60 and R 76. The explanation had turned out to be that these were revisions of

    old, pre-MAA certificates, using old data, and some were using MTLs, which at the time had not been acceptable in the MAA system.

    Mr. Van Mullem asked Mr. Mussio whether it was possible that there were authorities issuing basic certificates because they were not part of the MAA.

    Mr. Mussio replied that the majority of R 76 basic certificates was from the Netherlands and the UK, and confirmed that this was because they could not be MAA certificates because of when the tests had been done.

    Mr. Patoray added that he and Mr. Mussio had looked carefully at this matter, based on discussions at the ad hoc working group and other forums. Unfortunately this had affected the timing as the information could not be ready earlier, but in essence they had found, focusing mainly on R 76, that about half of the basic certificates that had been issued had been revisions of old certificates, and therefore based on older data. There was another group, this time of newly issued certificates, which were based on old data. There was a long list of information from test reports. In NMi's test reports they listed the test report date on the certificate, so it was easy to know. Some from the PTB which Mr. Patoray had reviewed with Prof. Schwartz, showed a similar phenomenon, except that several of these were related to MTL, which was outside the scope. A few were simply outside the scope of the MAA, and a very small number, less than 10 %, were from non MAA issuing participants.

    Mr. Awosola asked whether the data showing the huge number of basic certificates for R 76 and R 60 which had been presented was a one-off happening or on a yearly basis.

    Mr. Mussio replied that it had been happening for the last five years. The percentage was reducing, but not very fast.

- number: '8.5'
  title: 'OIML Systems: the MAA'
  narrative: |2

    This item, Mr. Mason reminded delegates, had been held over so that the results of the previous evening's meeting of the ad hoc working group could be taken into account.

    Prof. Schwartz, the chair of the ad hoc working group on the review of the MAA, said that he was going to report on what had been done by that group since the seminar in Ho Chi Minh City the previous year. As Members had already been told, the seminar report had been published as OIML S7:2013 Seminar on the OIML Mutual Acceptance Arrangement (OIML MAA), and was available on the OIML website.

    Three CIML resolutions addressing the issue of the review of the MAA been approved at the previous CIML meeting, Prof. Schwartz explained:

    - the first concerned raising awareness of the MAA;

    - the second concerned the review of the CPR structure, rules and procedures; and

    - the third concerned steps towards a single certification system for OIML type evaluations.

    An ad hoc group had been formed. This had been initiated by the BIML sending out a letter in November 2013. 15 P-members had shown interest, there were two O-members, four representatives from manufacturers' associations and the national conference and the NTEP program. The BIML was also included, as the secretariat, Prof. Schwartz himself was the chair, and they had 34 participants.
