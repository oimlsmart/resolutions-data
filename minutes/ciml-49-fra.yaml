- number: '7.3'
  title: Reports from / presentations by Liaison Organizations
  narrative: |2+

    Mr. Kool explained that four written reports had been received and made available to Members, and there would be three live presentations from the IEC, from CECIP and on behalf of ILAC and the IAF.

    Mr. Mason expressed his appreciation for the work that had gone into the detailed written reports that had been received from the liaison organizations.

    ## IEC

    For the IEC, Mr. Amos expressed his pleasure at being at this meeting to represent the International Electrotechnical Commission. This was something new to him; he would be updating delegates on the activities of the IEC, along with some of its thinking and some ways forward. He knew that they had heard a presentation by Mr. Chew the previous year, and would inform Members of developments in the year since then.

    The IEC, he explained, was a not for profit, non-government organization, set up in 1906 for two main purposes: to promote international cooperation on all questions of standardization and conformity assessment in the electro-technical area, and to provide

    international standards and conformity assessment systems for all electrical and electronic components, devices and systems. Since that time they had developed into other associate areas, and he would talk more later about the systems approach they were using to address the pervasiveness of electro-technology throughout economies both developed and developing.

    The IEC dealt with all electrical and electronic components, devices and systems: power generation, transporting electrical current, aspects of safety, electromagnetic interference, environment and waste management.

    The IEC comprised 82 member nations and 83 affiliates. In simple terms, 82 members provided the P-members of some 117 committees. 83 affiliates from developing economies provided O-members for a lot of the work done by the IEC. In recognition of the development of the organization, it had started as very euro-centric, but there were now more members outside Europe, and this was reflected in the locations of their offices. Two of the systems were operated from Australia, where Mr. Amos himself originated, but a lot of time was spent travelling also.

    The activities of the IEC included over 170 technical committees and subcommittees, supported by over 1200 working groups. This gave the opportunity for over 15000 experts in a wide variety of technologies to provide contributions to the development needs of over 7000 publications, which consisted mainly of standards but also guides and other documents used to support the assessments systems. Over a million certificates had so far been issued, together with test reports and other associate documents, supporting their members in the market place.

    In terms of standards, the IEC recognized the OIML as part of the family, as also the ISO and the ITU, the International Telecommunications Union. This was underpinned by regional organizations and the national committees which they relied on to provide the expertize and support for everything they did.

    Mr. Amos showed a slide containing two famous quotations from Lord Kelvin regarding the importance of measurement. He told Members that they would certainly recognize the quotations, but might not know that Lord Kelvin had been the first President of the IEC. So they had a close association not only with the man himself, the work that he did, but also to the importance of measurement in the work of the IEC. Every standard they produced presumed and required reliable measurement; hence, the activities of the OIML and the IEC were inter-dependent. In recognition of their mutual needs and relationship, the two organizations had published an MoU. This formalized their relationship, but also through the detail permitted and encouraged both cooperation and collaboration, through joint publications, such as ISO/IEC Guides 99 and 98-1, both currently under review.

    The IEC General secretary Mr. Frans Vreeswijk, was unfortunately unable to be present at the current meeting, Mr. Amos said, but he had sent the message that he was very comfortable with the way that the MoU had worked. He believed it was working well for the IEC and he hoped the OIML was equally pleased, and they welcomed further cooperation and a stronger relationship between the two organizations.

    In looking to do what they set out to do, the IEC worked through its national committees, which provided the expertize and the guidance for its work. This was done through consultation, consensus and cooperative arrangements at various levels,

    according to the pyramid diagram on the slide, and also directly with the experts, on a day to day basis.

    In providing standards, the IEC also produced conformity assessment systems, which enabled those standards to be put into practice. As they said, "a standard is just an interesting document until it is brought up in regulation or through custom and need, or some other demand for that as a requirement". Clarifying the link between standards and conformity assessment, Mr. Amos continued, the IEC believed that conformity assessment provided the confidence that the products, services, processes or people involved were what they appeared to be and functioned as they should in terms of performance, safety, reliability, etc., and, from the OIML's point of view, particularly accuracy. In other words, their ultimate aim and the principle they relied on was "one product, one test, one certificate, accepted everywhere". They were not quite there yet, but that was their objective.

    Speaking of the IEC's four conformity assessment systems, Mr. Amos said that the first was the IECE, or CB scheme, which those present might or might not be aware of. This had been the first of their systems and was focused on electrical equipment and components, the things people bought off the shelf, office equipment, switches, and the like. It was essentially a mutual arrangement for the acceptance of test results, in some ways similar to the OIML MAA. There were facilities within that scheme for doing more third party certification, but that tended not to be among the uses applied to it.

    A more recent system, Mr. Amos said, was the IECQ, which was primarily a tool for supply chains management and quality assurance within the manufacture of hi-tech electrical components, PCBs, etc. The IEC was finding that as this became more complex people mainly interested in technology needed help with managing the supply chain, managing assurance and highlighting the reliability aspect. There was interest in this area from the avionics industry (Boeing and Airbus), and also from military applications. This was all about materials, lead-free solders, and hazardous materials ensuring they were not only reliable but also that they did not harm people or the environment.

    The third system was the IECEx where Mr. Amos told Members he spent most of his time. This was a system dedicated to ensuring the safety of equipment used in explosive atmospheres. This did not mean explosive, but explosive atmospheres, as could be seen from the diagrams on the slide. He told Members that virtually every industry they could think of had some sort of risk in terms of explosion, and when it went wrong it went wrong quickly and badly, so the IEC made efforts to ensure that equipment in those requirements was certified as not being subject to damage and did not cause damage. This system was called a "Type 5 system" where third parties were verifying the test reports and results and the ongoing capability of the manufacturer to produce those items, so this was the other end of the spectrum of conformity assessment systems.

    The fourth system, which was new, was for the renewable energy applications, the IECRE. This was about not only the equipment used in renewable energy applications such as solar, wind, marine, geothermal, but also the people and the processes that they used in the installation and ongoing maintenance of these. Every IEC system was in response to a market need or demand, and this system had been requested by that industry sector, on the basis that there was a lot of promising with renewable energy. But those promises would only be delivered if the materials were reliable, did what they

    were intended to do, operated safely and did not damage the environment more than they assisted, so that was something that was currently under development in response to the market need.

    As delegates could probably imagine, Mr. Amos said, in looking at the products dealt with by the IEC, the key challenge in many of them was interoperability and interconnectivity. People had the expectation that they could connect most things to other things, and that they would work and continue to work. The parallel was drawn of buying an Apple computer which immediately worked. This did not happen by accident, it was because it was designed that way. In all the work that the IEC did, Mr. Amos said, there were experts in their own areas who might not think about, understand or consider other things that happened to their product or how it might be used, so the IEC had established a systems approach, which looked at use cases, or reference architecture, where a product might be used, what it should do, how it impacted with other things. This was an increasing focus of IEC work in this standards development area.

    However, because not all of what the IEC did was standards development, there could be standards for the systems approach, but how could they continue to provide the expectation people had? So a lot of work was being done on a systems approach, on how, when a sophisticated system was coupled together, it could be ensured that it actually fitted together and was safely operable. It was also necessary to know how it could be inspected, how it could be maintained and eventually disposed of, and how to ensure that the people working on it were competent. As a result, the IEC was moving away from conformity systems, maintaining the focus on equipment but including how it was used, maintained and installed, the people who were doing all those things, and whether there was an assurance that all these things would be as safe ten years later as they had been when the product had left the factory. There was a recognition that more needed to be done in that area.

    Like other organizations present, the IEC was also looking at what could be done to help people in other countries to move along. The IEC had an affiliate country program involving 83 participating countries; there were translations of a number of guides; through a declaration process there was a free issue of some basic IEC standards to governments who might otherwise be prevented from applying standards and regulation by being unable to afford them. These could be used as a basis for beginning to set up state of the art regulation in these countries.

    It was also important for these countries to set up conformity assessment systems to help them to deliver the expectations people had from the existence of the standards. The IEC had found in talking to developing countries that they understood and wanted standards, they understood regulation and believed it was a basis for improving the economy, but they had little understanding of conformity assessment systems. So in response to surveys and feedback from these areas the IEC had produced the ACAS program, with as much emphasis going into developing economies on developing standards as into conformity assessment systems. So they were spending a lot of time talking to people; a reasonable level was being achieved, but a lot more work needed to be done to help people understand how they could use conformity assessment systems to deliver what the regulations demanded.

    Feedback and talking to people had also raised for the IEC the question of where the next generation was going to come from. The average age of experts in the OIML, as in

    most organizations, was advanced. One of the answers was the Young Professionals program. The IEC General Assembly would take place the following week, and there would be a four-day program of delegates nominated by their countries who were invited to attend and become involved in workshops, training sessions and projects, and to receive mentoring. This process was successful and well received.

    Mr. Mason thanked Mr. Amos for his clear and informative presentation, and asked for questions.

    Mr. O'Brien told Mr. Amos that he had been very interested in his presentation and in the overview of the scope of the work undertaken by the IEC. With reference to the IECQ system, he asked for more detail on how it worked. As a regulator of consumer product safety trading standards himself, he found that safety issues came in various parts of the supply chain and he would like to know more about how the IEC dealt with the supply chain management.

    Mr. Amos explained that this was a third party scheme with independent verification by certification bodies. The manufacturer requested to be certified to the relevant standard or document. The product would be tested by a laboratory that had been accepted by the IEC for that work, then that laboratory would submit a test report to a certification body. There were many of these around the world, both government and commercially based, issuing certification to ISO/IEC 17025, Guide 65, etc. That certification body would look at the report and say it was happy, on the basis of this report, to investigate the manufacturer's capabilities through quality assurance using ISO 9000, stand with the manufacturer to accept the liability that the product did meet the standard, and undertake to audit and assess the manufacturer via ongoing surveillance to satisfy itself that the manufacturer would be able to continue to produce to the same standard, and would then issue the certificate. Certificates within that scheme could be about what were called HSBM, hazardous substances, which certified that the product satisfied the requirements, which might be lead-free solder, for example, or include the absence of mercury or cadmium. This could also be a system for supply change management-i.e. whether a company was certified as being capable of managing suppliers, vendors and system integrators to come up with a product that that company would put on the market. The company would be able to say that all the people who had helped with this had it under control.

    Mr. Amos added that another area was avionics, in which there was a lot of working not only with the reliability of equipment but also with what happened with the sourcing of a replacement component when an aircraft had to be repaired.

    Additionally, rather akin to automotive, there was the question of how the manufacturing process was managed. So there were four different aspects, depending on what was being managed: environmental health issues, management system processes, reliability of equipment, and the conformity of that equipment with recognized standards. These elements were mixed around and sorted according to what the regulation or a client required.

    Mr. Birch thanked Mr. Amos for his presentation and asked him if he had any comments on the current round of free trade agreements and particularly with reference to TBT, and the extent to which they would reference IEC conformity assessment or whether this could be bypassed by mutual acceptance arrangements.

    Mr. Amos replied that he did not understand enough about the current situation; he had not understood what he had read in that morning's paper on the subject. In most cases, IEC conformity assessment systems were voluntary. Rather than regulations saying "you shall have certification to the IEC or other bodies", there was rather an acceptance, a recognition of products certified to that system, rather than a mandate. So it was to be hoped that under that scenario FTAs, etc. would reflect that a product produced in country X, certified according to international standards there, would, through the recognition of IEC standards in the first place, but also under mutual recognition acceptance within the systems of test reports, be transportable as a passport for that product into other economies. This was how, for example, IECX worked, where a product manufactured in Germany was accepted into underground coal mines in Australia without need for further testing or assurances.

    Mr. Birch added that different conformity assessment systems were mutually recognized and led to an acceptance by each of the other's equipment. The computer industry in particular had been keen on this arrangement.

    Mr. Amos added that before entering the path of mutual acceptance of test results or certificates, rules had to be accepted. These were subjected to peer assessment and ongoing surveillance; there was no blind or casual acceptance into the system, but a rigorous process to be undergone before becoming part of it. The fact that all the people in the system had been subject to the same rules provided the necessary mutual confidence. This was not necessarily how all conformity assessment certificates round the world would operate, but that was how IEC systems operated.

    Mrs. Lagauterie said that Mr. Amos had described activities in the certification of products and in quality systems certification. These activities were like those in the European Directives for many products. Within the framework of the European Directives, there was another tool for ensuring that all instruments were conform, which was market surveillance. She asked whether the IEC intervened in certain market surveillance actions at the request of an authority when there was a problem of suspect conformity.

    Mr. Amos replied that regarding market surveillance, the members of the IEC secretariat did not do this, but they did receive feedback, complaints, and questions about certificates. They responded by telling the enquirer to talk to the certification body which had the test results; they visited the manufacturer, had a relation with the manufacturer, and took the responsibility. So yes, they received complaints from competitors and from consumers, but these were all referred to the certification body. In response to enquiries they also asked anyone contacting the certification body to send copies to the IEC, which kept them involved. The IEC monitored and reported the activity and issues or progress on the matter to the management committee, so every certification body knew what was happening. This was not direct market surveillance, but there was monitoring and everyone knew what was happening. It was not a case of "name and shame", but there was transparency. It was important to the IEC that the system maintained credibility, and that could only be done if there was a response to complaints and enquiries. He asked if this answered the question.

    Mrs. Lagauterie replied that that did indeed answer her question, but she wanted to know whether, in the case of a dispute, the IEC had ever had to have recourse to an organization other than the one which had done the certification.

    Mr. Amos confirmed that there had been disputes, and issues which could not be resolved, so they had an appeals process and tribunal. They offered manufacturers the ability to have confirmation testing, validation testing, and there had been instances where certificates had been suspended, or indeed cancelled. There had also been cases where certification bodies had been suspended (though not withdrawn). So the IEC tried to be very responsive to problems, because the credibility of the system was important, and they would not risk that because of one certification body or one complaint, so they were very serious about achieving a satisfactory outcome by any of the various methods available to them.

    Mr. Nater (CECIP) reminded Mr. Amos that he had said that on the one hand the IEC had issued one million certificates, and on the other, they had four systems. He asked about the relative size of these systems.

    Mr. Amos replied that in the one million documents he had included certificates, test reports, and quality assurance reports supporting those. A certificate was always supported by other documents. In terms of ranking, the highest number was probably the IECEE scheme, the CB scheme, simply because of the number of products and types and their variations. The next was the IECX; by the previous week 48 000 certificates had been issued in this system which with supporting documents came to about 130 000. After this came IECQ, because it was more about factories and processes rather than items of equipment, and renewable energy brought up the rear because this scheme had only recently started.

    Mr. Mason thanked Mr. Amos and added that the OIML looked forward to continued close collaboration with the IEC.

    ## CECIP

    For CECIP, Mrs. Martens told Members that as this was the last time she would be at the CIML, she wanted to give some thoughts about the OIML and about industry's expectations from their work.

    The overall task of OIML Members in their own countries, Mrs. Martens said, was to guarantee fair trade for consumers and business to business, and to protect human life and the environment. But to fulfil these tasks, several stakeholders needed to be involved, and to be successful they must take responsibility. Of course there were legal authorities on top, but these were not all that was necessary in order to make the system successful. Instrument manufacturers, users from large global industries such as pharmaceuticals, and from trade, or small industry, which used the instruments, and perhaps in some cases also individuals were also needed. Only if all these worked together in the same direction could the principal aim for all countries be achieved. She could therefore say that the OIML was of great importance for all stakeholders.

    In legal metrology, the OIML should achieve very importantly, harmonization of rules, requirements and procedures.

    Secondly, fair competition should be granted for instrument manufacturers, and there should be awareness that quality was a benefit for all participants in all countries. This could be achieved via the work of the OIML.

    Also very important for the future, in CECIP's opinion, was to set up a unique legal metrology system in the world, because, in the future, technology would not care about borders.

    Another requirement was to take care of the needs of all stakeholders, not only the legal authorities. The rapid development in technology and globalization should also be considered.

    Entering into further detail on the subject of harmonization, Mrs. Martens stated that in the details of national law, additional and different requirements were often to be found. These should be identified and possibly deleted. The OIML should be aware that in the detail there were more of these than those published via the MAA. There was of course a need for the MAA, as everyone knew, but the MAA was only for helping with certification for market entry. However, it might be possible to certify instruments via the MAA, but then it could happen that the instruments in use suddenly had to fulfil previously unknown additional requirements and details, and there could be conflicts, meaning that harmonization by the OIML was necessary in all cases to prevent conflict.

    Mrs. Martens said that another point from her list referred to technical documentation. Everyone knew that there was rapid change in technology. The OIML therefore had to think about what could be done for quicker updates of OIML publications. Mrs. Martens offered two examples: R 76 and R 51 were from 2006, and several others were even older. She asked Members whether they thought eight year old Recommendations represented the state of the art. This was only one example. Another problem was the duration of the processing, for example, work on updating R 60, dating from 2000, had begun in 2010 and currently, in 2014, was not yet complete. So it had in effect taken 14 years or more for an updated version to become available. Mrs. Martens wondered whether there was a way either to make updating quicker or to make intermediate changes.

    Another problem concerning technical documentation, Mrs. Martens continued, was that in all areas of laws and requirements all over the world, ordinances and technical documentation grew more and more, and they dealt with unnecessary detail. More and more governments were producing technical solutions for requirements; if technical solutions became a requirement, manufacturers and technical development ran into problems, because sometimes alternatives were no longer possible. Adhering to these made production impossible, whereas other technical solutions might be perfectly acceptable and achieve the same result. A second result of this was that when documents were updated they tended to become longer and longer. Mrs. Martens wondered if the OIML might pioneer a return to essential requirements, avoiding technical solutions.

    Finally, Mrs. Martens turned her attention to mutual acceptance arrangements, saying that everybody, but especially manufacturers, dreamed that one day there would be a worldwide legal metrology system. Globalization increasingly required such things. CECIP therefore thought that the MAA was essential and its future success was necessary. To achieve this, they suggested that all stakeholders should be involved and convinced, their needs should be taken into account and they should become partners. They should be qualified instead of merely being given requirements, and it was very important for the OIML to be aware of the international pressure in globalization and technical development. Mrs. Martens gave as an example mobile phones with apps, which everyone used, which could be used for data storage on measuring instruments,

    for payments. This was not a new idea, it was already done at a state of the art level in some cases. This meant that everybody could go everywhere.

    Similarly, Mrs. Martens added, using these tools - with cloud storage or similar - for everything concerning measuring instruments, would mean that the instrument could be in one country but regulated from another, which perhaps had the headquarters for that industry. So there could be data transfer with data exchanged internationally and stored in the cloud. Borders would become more and more inactive.

    CECIP believed, Mrs. Martens averred, that the OIML was the right podium to find solutions for this. Otherwise, as was known from other parts of life that technology would overrun humanity like a train. In order to prevent this, she asked the OIML to find solutions for all of this.

    Mr. Mason thanked Mrs. Martens for her thoughtful contribution. As she knew, he said, the OIML had long sought to have input in their work from manufacturers and their representatives. They had greatly valued the contribution made by CECIP and Mrs. Martens, which was not confined to the European association, as the OIML looked for contributions from manufacturers in other parts of the world, but he thought it could also be said that CECIP's contribution was a very good model for others to follow. He asked for questions.

    Mrs. Lagauterie said OIML Members had known Mrs. Martens for a long time and greatly appreciated discussions with CECIP in general and Mrs. Martens in particular. She thanked her for her recommendations to the OIML, concerning mainly the future work of the OIML, but Mrs. Lagauterie wished to ask her what her recommendations would be for the future of CECIP, and how it could represent small businesses, which were not manufacturing measures, but, in many countries, verification businesses, which also did a lot of work for legal metrology. These had not been mentioned in the list at the beginning of Mrs. Martens's presentation, but Mrs. Lagauterie thought they represented a considerable number of enterprises within legal metrology. What, she asked, would be Mrs. Martens's recommendation to CECIP in its efforts to represent these businesses?

    Mrs. Martens thanked Mrs. Lagauterie for reminding her of this. CECIP, she said, was an organization which represented not only large manufacturers of measuring instruments, but also, in Europe, more than 40 000 small installers. This was because CECIP represented, directly or indirectly, several federations. Members must be aware that if CECIP sold components or instruments via those small organizations, these were their customers, who required that CECIP should represent their needs as well. Otherwise they would be lost as members. Mrs. Martens hoped that CECIP was already doing this but thought it was possible they might be able to do it better.

    Dr. Ehrlich asked Mrs. Martens to explain what she had meant by "qualify stakeholders instead of giving requirements only".

    Mrs. Martens said that she had been referring to something she had said in previous years, i.e. that if the OIML made MTLs more active in all parts of the world, then they would be qualified in the sense that they would be able to measure their instruments and supervise them in a very qualified way. If then there was supervision over such laboratories from the manufacturers, it would be possible to find out with some

    certainty whether things were going wrong or not. This was because people who were not qualified risked not doing the right things.

    Mr. Nater added that CECIP had invested much money with the MTLs, and that he had been very happy to hear from Mr. Patoray the previous day that he was focusing on the MAA.

    Mr. Mason wished Mrs. Martens a very happy retirement and expressed the OIML's confidence that the close working relationship between the OIML and CECIP which she had established would continue after her departure. He thanked Mrs. Martens for her contribution.

    ## ILAC/IAF

    For ILAC and the IAF, Dr. Richards said he thought he was the only delegate present who was actually based in Auckland, and had not had to fly to get to the meeting; in fact his offices were only 5 kilometers away, so he welcomed colleagues.

    Dr. Richards told Members that he knew that in the discussions of the previous couple of days much had been said about liaisons with other organizations. He wanted to thank Messrs. Mason and Kool for attending the Vancouver ILAC/IAF General Assembly meeting two weeks previously. Dr. Richards said that he knew that during the earlier discussion about liaisons there had been comment about ISO/IEC 17025. That standard was up for review, with a first meeting of the working group in late January. However, for many, the important standard was ISO/IEC 17011, applying to accreditation bodies, and this also was currently up for review, with a first meeting in a week's time in Geneva. So within CASCO, or the wider ISO group, there were many liaisons within ILAC and IAF, because these international standards were critical to all the work that they did.

    Many Members, Dr. Richards said, would be familiar with the objectives of ILAC and the IAF. They had a Mutual Recognition Arrangement, both ILAC and IAF separately, but basically to make sure that test reports, inspection reports and certificates would and could be accepted around the world. It was critical that this should be able to happen, and he would suggest that this was the core function of both ILAC and the IAF at the present time. Obviously they had other issues - increasing cooperation with relevant stakeholders, acting as a central hub to try and harmonize best practice and conformity assessment, and another issue, of course, which affected everybody, was still to provide assistance to developing economies, to try and get them involved in the global sphere, which was becoming effectively a requirement for trade.

    ILAC and the IAF had their global vision, where they were trying to say that it was going to be "one test, one certificate accepted everywhere", but there was a long way to go. The reasons for this aim were fairly obvious - reducing the risks for business, reducing liability on regulators, and, obviously, protecting the consumer by making sure that it did not matter whether it was a product that had been tested or a service that had been certified, the end user could rely on the outcome.

    There were now more and more government and regulators relying on ILAC and the IAF, but within the trade agenda, Dr. Richards said, he knew that the earlier question about TPP, he was aware that accreditation was one of the factors in the negotiation within the TPP space, and it was not just TPP; they had free trade agreements, a number of bilateral agreements around the world, and Dr. Richards knew that accreditation was

    playing a growing role within these. He was very familiar with the agreements that New Zealand had signed, for example with China, with Chinese Taipei, with Singapore, and he knew that accreditation was part of the foundation of those agreements. So it was becoming more and more critical to support free trade, eliminate technical barriers and realize the goal "tested or inspected or accredited once, accepted everywhere". The point about this, when trade barriers and regulators were talked about, was that if a regulator introduced a regulation that was not based on an international standard and an international conformity assessment process, then that regulator was creating a trade barrier. So it was not possible to have one without the other. If trade facilitation was wanted, the international standards network and the global conformity assessment system had to be used. This point had been made earlier by Mrs. Martens: there were still barriers; what regulators did mattered a lot, and how they did it could become a barrier or it could become a catalyst towards free trade.

    Within ILAC this had certainly been recognized, and there was a project at the moment to try and look at all current regulatory practices in countries around the world and to identify which regulators actually had their regulations based on the use of accreditation, as part of their formal process, how accreditation was specified in regulations, and how accreditation was used in regulations. This project had just begun. Previously, ILAC had carried out quite a major review every two years of all countries, looking at whether accreditation was accepted by regulators, and he was happy to say that all ILAC arrangement signatory countries did accept accreditation in some form, either as part of their national process or, in some cases, as part of their global trade facilitation agenda, i.e. that there was some acceptance of accreditation by at least some regulators in all economies. They were now going to look at the depth of acceptance, how it was specified, and how it was used.

    Dr. Richards said that he knew that many colleagues from Europe would be very familiar with the European Directives, the legislation that covered all of the European Union, and they would know that the regulations actually specified the use of accreditation as one of the underpinning aspects of those Directives. So this was the type of specification that ILAC was looking for, and to see how that was used around the world. ILAC itself was very much a membership body, but also a regional membership body. The point of ILAC was to be a light but authoritative umbrella over the regions. ILAC set the policies and the rules but the actual work itself was very largely done by the regions. So by their Mutual Recognition Arrangement, all the actual arrangement activity was organized completely independently by the regions themselves. ILAC was not directly involved.

    A subtle point about ILAC, Dr. Richards told delegates, was that the membership structure was there, but the voting within ILAC was by member economies, and not by individual accreditation bodies. The IAF, on the other hand, had a very similar structure, but the voting was by member bodies within IAF, a quite different democratic model. The overall structure, though, and the discussions that occurred, were very similar within both organizations. Within the IAF and ILAC, prior to 1996 ILAC had not been a cooperation, but a technical conference to look at accreditation matters and technical matters; then it had formally become the International Laboratory Accreditation Cooperation in 1996, and the ILAC arrangement had actually been signed in 2000 for testing and calibration, and in 2012 for inspection body accreditation.

    The IAF, Dr. Richards continued, had been established in 1993, and their first MLA, or multilateral arrangement, had been for quality management systems in 1998. They had extended that to include environmental management systems and product certification in 2004. Delegates would notice in the middle of the slide the date 2001, since when ILAC and the IAF had been meeting together, and cooperating very actively.

    The whole point of the arrangements he had referred to earlier, Dr. Richards explained, was really to ensure that the accreditation bodies themselves were competent, and consequentially the organizations that they accredited were competent. They used, as their peer evaluation framework, ISO/IEC 17011, and in addition to that there were a number of guidance documents, interpretation documents and application documents, developed by ILAC and IAF to particularize ISO/IEC 17011. These were referred to as the A series documents, a common series of documents used by ILAC and the IAF. As previously noted, the core Standard, ISO/IEC 17011, was currently up for revision. The Arrangement, he said, provided a binding obligation on signatories to recognize certificates, reports and results from organizations accredited by the other signatories, but the obligation was on the accreditation body and not on regulators per se. Often around the world, Dr. Richards continued, regulators chose to base their regulations on the whole accreditation process, and in some instances actually called up the ILAC or IAF MRA specifically, but that was a decision the regulator made. The obligation through the arrangement with ILAC and the IAF was only binding on the signatories themselves. Of course, however, it provided advantages for business, and went a long way towards eliminating technical barriers to trade through the assessment process.

    Dr. Richards reiterated that the organizations were very much based on the regions; there were currently a number of regions within the ILAC and IAF community. EA and APLAC formed the basis of the ILAC arrangement of 2000, where the accreditation of testing laboratories and calibration laboratories had been recognized by both parties, and IAAC had come on board in 2006. Delegates would notice on the slide that they also had SADCA, the Southern African group, AFRAC, which covered the whole of Africa, and now ARAC, an Arab cooperation group which had been formed. These bodies were not yet recognized by ILAC or the IAF, but were working towards developing their own mutual recognition schemes, and hopefully one day would be in a position to be recognized by the global community directly.

    Offering a brief overview of the present status of ILAC, Dr. Richards told delegates that they now had 148 bodies from 112 different economies, effectively different countries, of which 86 were full members, or MRA signatories, and additionally there were 16 associates, 16 affiliates, 24 stakeholders and six regional cooperation bodies. The 86 full members, or MRA signatories, represented 71 economies around the world, plus five economies within the European Union which were members of the European arrangement but not signatories to the ILAC arrangement, so altogether there were 76 countries where the accreditation body was recognized by its regional body. At the moment the ILAC MRA covered testing, calibration and inspection; they were working also on accreditation recognition for proficiency testing providers and also for reference material producers. These would come on board in the next couple of years or so. At the moment the signatories to the ILAC arrangement represented approximately 95 % of global trade, and overall there were more than 44 000 accredited laboratories around the world, and about 7 500 accredited inspection bodies.

    On the ILAC map, Dr. Richards said that countries colored in navy blue represented the full signatories, and those in orange were working towards becoming full signatories. The Balkan States, Latvia, Lithuania and Estonia were grey, but within the EA system they were full signatories. The other two, he thought, were Malta and Cyprus.

    On the IAF side, Dr. Richards said, there were 53 full signatories, from EA, PAC, which was the Asia Pacific group and IAAC, the inter-Americas group, 53 for management system, 51 for product certification. Underneath that main scope of activity, there were sub scopes, global good agricultural practice for 26 accreditation bodies, and the detail of the quality management system, the environmental management system, and looking at new areas of activity, MDMS, FSMS, ISMS, people certification and greenhouse gases as well. So a lot of work was still planned.

    Dr. Richards then showed the IAF map, which was slightly different from the ILAC one. There was not quite so much navy blue yet, but he was sure that that would occur in the near future.

    In terms of process, obviously accreditation was being looked at, making sure that the laboratories, inspection bodies and certification bodies that were accredited were competent to do their activity so that when they tested or certified products or service providers around the world, everybody who used that product or service could have confidence, know that the service was reliable and have the assurance that things would be OK. So ILAC was very much looking at the outcome, what was the output of the laboratory, whether the result was correct, obviously within the uncertainty of the measurement being carried out.

    Looking at the benefits of ILAC processes, obviously they were looking at being a facilitator for trade, and, as mentioned previously, accreditation was now being written into the Free Trade Agreement. It was a very robust and rigorous tool for governments and regulators to use. For the business community, the benefits brought by quality management and other management system standards were well recognized. It avoided costs for businesses, which did not have to get things done twice, or many times as the case might be, and it meant that the whole procurement process was much better founded. Obviously the end user could have confidence in the goods and services they used. As had been seen on the TV clip, nobody thought about the accuracy of the weighing machine, or whether their liter of petrol or twenty liters of petrol was accurate or not. They took it for granted. It had been a delight for Dr. Richards in New Zealand to see that - when assessments had been done round the world and it had been seen how far out petrol measurement or weighing measurement could be in some other economies, it was quite alarming. So it was good that New Zealand people thought they had nothing to worry about, and it was easier for regulators if they did not have to think about product recalls on a regular basis.

    Summarizing briefly, Dr. Richards told delegates that the whole range of ILAC and IAF services was a commitment to developing a harmonized global approach for accreditation practice, making sure the arrangements worked so that they were regarded as reliable, and then promoting acceptance by regulators and businesses, to remove technical barriers to trade, avoid the need for duplicate certifications of testing or inspection. As he had pointed out earlier, acceptance by accreditation bodies did not necessarily equal acceptance by regulators. There was a lot more work to be done on this, and obviously they were doing a lot to help developing economies, particularly in Africa, the Middle East and Asia. ILAC was doing everything possible to encourage those

    who were not signatories yet to become signatories as rapidly as possible. As everyone knew, New Zealand was a dairy export nation - in fact this was its largest industry. At the moment, New Zealand dairy exporters exported New Zealand dairy products to 152 countries around the world. The only problem was that there were 152 different regulatory requirements that they had to meet. No two countries had exactly the same regulatory requirements for dairy products coming into their country. It could be imagined what a nightmare this caused for the people producing dairy products.

    Speaking of cooperation, Dr. Richards said that there was a very active joint program between ILAC and the OIML. There were plans for a joint OIML/ILAC assessment procedure in the field of legal metrology, providing guidelines related to the assessment of testing laboratories in the field of legal metrology, to support the laboratories' approval and participation in the OIML's declaration of mutual confidence in the framework of their MAA, to make sure that the accreditation assessments and the peer assessments were harmonized around the world. The guidance focused in particular on the competence of the assessment team and the reference documents which defined the requirements to be assessed. So for the OIML, the joint assessment procedure would be an MAA document, not a formal OIML publication. It would not necessarily be placed on the OIML website but it would be mandatory within the MAA. The final draft of the assessment procedure had been distributed to the full membership of ILAC in August 2014 for a review of the major issues only, and it had also been reviewed by the ILAC Executive Committee. Responses had been received from about 20 accreditation bodies and two of the executive members; those comments had all been reviewed by ILAC, and responses to them would be provided as soon as possible. Once this was done, the ILAC secretariat would be discussing plans for publication with the OIML, and it had previously been suggested that the BIML could organize a one-day seminar to obtain feedback from experts and at the same time to inform the experts about developments in the MAA and other relevant issues. The seminar would probably be held in Europe, which was where the majority of experts were located, and within ILAC the possibility of funding that seminar was being looked at as well, once the document was closer to publication and more details were known about timing. That was the first joint action Dr. Richards had wanted to explain in detail.

    The second joint ILAC/OIML action was the periodic review of ILAC-G24/OIML D 10 Guidelines for the determination of recalibration intervals of measuring equipment used in testing laboratories. After some discussion between the BIML and ILAC, it had been agreed to review this document, and ILAC had formed a small working group to assist the OIML in the task. In Seoul in 2013 Mr. Kool had reported that the OIML was ready to review, the group had been set up. André Barel from RvA in the Netherlands would coconvene the group with the OIML, and at the Vancouver meeting two weeks previously Mr. Kool had reported that the working group had been established. The committee working draft was expected before the end of 2014.

    There was also a planned joint group program to look at a survey among IAF members to gather information about current accredited certification activities with regard to regulated and non-regulated measuring instruments as a basis of further joint activities between IAF and the OIML.

    The comment had been made in the course of the meeting that the Memorandum of Understanding had been revised and re-signed during 2014, and it had been greatly appreciated that Mr. Mason had gone to Vancouver to sign this document.

    In conclusion, Dr. Richards said, the aims were to

    - ensure a level playing field for all parties (producers and conformity assessment bodies),

    - jointly promote free trade,

    - eliminate technical barriers to trade,

    - increase the use of conformity assessment,

    - ensure traceability of measurements, ultimately to the SI units, and

    - minimize costs and workloads for all,

    thereby achieving confidence in the market. The above were what all those in the OIML ILAC and the IAF were active in doing.

    The next series of ILAC meetings, Dr. Richards told delegates, would be the mid-term meeting in April, held as always in Frankfurt; and the next General Assembly meeting in October or November 2015, which would be in Milan.

    There was a new ILAC website, in action for the last month, which contained many brochures and publications which could be translated into a large number of languages.

    Dr. Richards also drew delegates' attention to World Accreditation Day, held in June of each year, when a lot of promotion and publicity would be seen.

    A slide with details of the IAF and ILAC secretariats was shown, and these secretariats would be more than happy to supply any information that delegates might require.

    Dr. Richards invited questions.

    Mr. Mason thanked Dr. Richards for his clear and comprehensive survey of ILAC's work and its interaction with the OIML. It was of course interesting that there was a lot of experience of accreditation in the room, in the form of both legal metrology regulators, who might resort to accreditation as part of their regulatory requirements, and also certification bodies that were very familiar with the accreditation process. Mr. Mason himself was all too familiar with it, but everyone knew how rigorous and how helpful that process could be.

    Mr. Awosola asked Dr. Richards for some examples of ILAC's activities to try and encourage more signatories from Africa; he had noticed from the graph that there were few members from that continent. He wondered if training, seminars or marketing were being offered.

    Dr. Richards replied that ILAC had a development assistance program, working with the accreditation bodies within Africa to bring them within the ILAC and IAF framework. There was a joint developing committee. He was not supposed to talk publicly about people in the pipeline, but he could assure delegates that there were accreditation bodies in Africa that were currently going through the peer evaluation process to join the ILAC MRA. So it was much more than just training and seminars, ILAC were actively involved in assisting, they did free peer evaluation to let them know where their gaps were, and an active evaluation program was currently under way to bring many African accreditation bodies into ILAC. Similarly, in the Arab regional accreditation cooperation, ILAC had recognized some time previously that there was a cultural grouping from the Arab nations, and facilitating the establishment of ARAC had been another way of getting extra economies to come on board and become signatories to the ILAC arrangement, so there was quite an active development program. Within the Asia Pacific

    area, Dr. Richards said he was aware of the arrangement between New Zealand and Australia, who had signed a trade agreement with ASEAN, a group of ten south-east Asian nations. Three of these nations were not involved with the global infrastructure Cambodia, Laos and Myanmar were not involved in the standardization process, any part of the metrology process or the accreditation process, so again there was direct support of their infrastructure development, to assist them to participate in global infrastructure activities.

    Mr. Birch thanked Dr. Richards for his presentation. He said he had attended a few ILAC General Assemblies over the years, and the problem of accrediting international regulations which were not internationally harmonized had often been discussed. In some respects there had been a move towards international harmonization, but in many respects things might be going backwards as governments started to deregulate. He wondered what comments Dr. Richards might have on that aspect.

    Dr. Richards told Mr. Birch that he found this really interesting. The deregulation process was actually putting more onus back on business to do more, and regulators still had to have some form of assurance that what business was doing was acceptable, so even though there was deregulation, there tended to be a move towards the use of international standards to a high degree, and often it might be suppliers' declaration of conformity, but it might be required that suppliers' declaration of conformity should be based on testing in an accredited laboratory. So ILAC were now finding many instances of manufacturers' laboratories that were being accredited, because they knew that if they were accredited, their test reports and therefore their products were actually more likely to be able to be accepted around the world. Even within the European Directives framework, Dr. Richards added, a technical content file was an essential requirement, and while there might be no specific requirement for this file to be based on testing in an accredited facility, more and more often that was occurring, and in fact many of the issues that ILAC were now coming across, whether counterfeit products, illegal products or fraudulent products, once again it was traceability, and the traceability chains were going to require some form of accreditation as an assurance of that process.

    Mr. Mason thanked Dr. Richards again.

- number: '7.4'
  title: Information regarding the RLMO Round Table
  narrative: |2+

    Dr. Miki told delegates that he had chaired this meeting on the afternoon of Monday 3 November, at which there had been 22 participants from 9 Member States (Australia, P.R. China, Germany, Japan, Netherlands, New Zealand, Russian Federation, South Africa and USA) and the BIML. There had also been representatives from APLMF, COOMET, SIM and WELMEC. Some Members had been absent, probably because of the New Zealand location.

    Dr. Miki thanked those who provided input and made comments. Summarizing the content, he said that Mr. Guo Su had presented a report on the APLMF. As many delegates knew, the current year's APLMF annual meeting would be held in Wellington the following week.

    Mr. Komissarov had then presented a report of COOMET. COOMET news was that there had been a seminar, with an English translation service, which had been open to participants outside the COOMET area.

    Mr. Richter had presented a report on SIM, following which, in the question and answer session, there had been talk about financial support to participants from developing economies for transport, a common problem for such activities.

    Ms. Anneke Van Spronssen had provided a report on WELMEC. WELMEC Dr. Miki explained, was somewhat different from the other bodies, in that it was more advanced; among other activities, it produced guides. Ms. Van Spronssen had talked about the way they ran their organization.

    There had been a new topic in the current year, Dr. Miki said, because they had had an advisory committee, established the previous year, and the BIML also had a special fund for special projects in developing economies, so there had been a chance to have talks from these two bodies about this. First, Ms. Zheng Huaxin had given a report, which delegates had also heard previous day. Mr. Kool had talked about the special project, which again had been repeated the previous day.

    Following this there had been discussion on the role of the RLMO Round Table and its terms of reference. It had been decided the previous year that this was the place where RLMO representatives and other interested people gathered and exchanged information about their activities and discussed how to cooperate or set up a new project, especially as many of these related to support for developing economies. These had been the main topics at the meeting. Originally they had wished to draw up terms of reference, but it had been decided that this was not needed at this stage, as their goal was not yet very clear.

    There had then, Dr. Miki said, been talk about cooperation and the relation between the OIML and the RLMOs in terms of support for developing countries. Several valuable comments had been made by Messrs. Birch, Kochsiek and Carstens, the last of whom had suggested that a direct link between the OIML and the RLMOs was needed, for example an RLMO MoU to encourage cooperation in support for developing countries. Mr. Birch and Prof. Kochsiek had told the meeting that many documents and materials already existed which could be shared, and Prof. Kochsiek had also said that the RLMOs should use OIML documents as far as possible to implement new legal metrology systems in the developing countries.

    Following this, there had been discussion of cooperation with the AGDC,concluding that they should of course work together. The new website and the workspace it offered had been commended as a tool for communication.

    The conclusions, Dr. Miki told delegates, were that:

    it was agreed that the RLMOs should continue to share information and discussion in the Round Table;

    - the new website, and especially its workspaces, was expected to be a good tool for information sharing and discussion; however, after the Round Table there had been a meeting of the Advisory Group; this group had wanted a new website of their own, so that website might perhaps contain all aspects related to developing economies;

    - continued cooperation with AGDC was agreed on; and

    - the next Round Table would be held in conjunction with, and preferably just before the 50th CIML Meeting in 2015. Dr. Miki said that he would like to invite

    more participants, especially from developing economies, which were those who had most to gain from its activities.

    Dr. Miki said he would be pleased to answer questions.

    Mr. Mason thanked Dr. Miki and added that it was noteworthy that the topics which the Round Table had discussed were also topics which the CIML had been looking at in its formal meetings. This was not surprising, and it was clear, both from discussions the previous year and the ones which had just been reported, that there was still a continuing desire to have the opportunity to discuss some of these issues in more detail and to explore the implications for the regional organizations. He was therefore extremely grateful that Dr. Miki had stepped forward to act as the convener to bring some structure to the dialogue in the Round Table. He asked if there were questions.

    Mr. O'Brien thanked Dr. Miki for his presentation. He asked whether when Dr. Miki referred to the new website he had meant the upgraded OIML website.

    Dr. Miki replied that this was the case. During the Round Table this was the only website known. However, at the meeting of the advisory group which had followed the Round Table, there had been discussion of a possible completely new website for that purpose alone. He now thought however that it would be better to have everything on the same website, so that information could be shared between different groups.

    Mr. O'Brien thanked Dr. Miki for this clarification and asked whether the reports from the RLMOs would be made available.

    Dr. Miki said that this would be the case, after the RLMOs had been asked for permission to share their reports.

    Mr. Mason added the comment that he thought that at the advisory group meeting, which he had attended, as well as at the Round Table, which he had not attended, but which had been reported, there seemed to be the common theme that the new website facilities would allow Members to adopt a way of working which was more efficient and more up to date and which allowed the sharing of information in a way which would become more routine for those Members who had an interest in these matters; they would know where to go for it and the material would be available in a familiar way. There was a clear view that the information should be made available within an OIML framework rather than going down a route of separate websites. All of these seemed to him to be very positive developments and they had been made possible by the work that had gone into making the OIML website what it was.

    Mr. Mason thanked Dr. Miki again.

- number: '8'
  title: Technical activities
  narrative: |2+

    The Organization's technical activities, Mr. Mason stated, were the core of the OIML's work.

- number: '8.1'
  title: 'Implementation of the revised B 6: Directives for OIML technical work'
  narrative: |2+

    Mr. Mason reminded the Committee that the decision had been taken the previous year not to work on a revision of B 6 for two or three years. That policy had been maintained for the last twelve months and would be continued for a further twelve, and a decision

    would be taken in 2015 as to whether the pause turned out to be two years or three. However, this meant that there was an opportunity to look at the way that B 6 had been operating in a fairly stable environment.

    Mr. Dunmill said that, as had been heard from previous speakers, the projects worked on in the preceding year had been following the procedures of B 6 quite well. He had reported the previous year on how the technical committees and the projects that were running had been translated into the new system. So what had been done during the current year had been to try to look at the full list of OIML projects to see what was still operational, what was not operational, what people were participating in, and so on.

    Members would recall that with the new Directives there was the possibility to participate in each project under a technical committee or subcommittee individually. This had consequently meant that there was much less participation in some projects than in others. Mr. Dunmill had circulated a document giving updated information on all the project groups. This was very similar information to that which had been discussed at the Presidential Council in March 2014, during which there had been a technical review of all the projects to discuss any problems with inactivity in projects, or lack of resources available for certain projects which were deemed to be very important.

    The current situation, Mr. Dunmill informed delegates, was that 72 projects were currently operating, but there were problems with some of these. B6 had a requirement that there should be six P-members, from at least two regions of the world, otherwise a project was not deemed to be of sufficient international interest to make it worth working on. Nine projects currently had fewer than the six P-members required, and eleven project groups had no convener. This usually happened where an old subcommittee had several projects under it, and a country was responsible for the secretariat of that subcommittee but perhaps not really interested in all of the projects. Following the split into individual project groups, they had wanted to relinquish responsibility for particular projects. Also, priorities had changed in many countries since the projects had been started. In some cases it was difficult to ascertain when the projects had started, because of the way in which decisions to start projects had been recorded in the CIML minutes and resolutions. Although a lot of research had been done in the current year, it often remained unclear when some projects had come into being.

    For six project groups, also, there were no progress reports. Each year Mr. Dunmill had distributed an enquiry to the conveners asking for updates on the progress made in the previous year based on what they had promised to accomplish, and also their projections for their workload for the coming year. Six of the project groups had not supplied this information, either because there was an e-mail problem or because they were not doing anything, he could not tell. This did not quite correspond with the information which delegates had received in the last minute document because a few updates had been made since those figures had been put together.

    This indicated a reasonably low interest internationally in the subject at the moment, regardless of the fact that it had presumably aroused some previous interest in order to set up the project.

    Mr. Dunmill showed the list of current project groups with fewer than six P-members. Some of these were revisions of existing Recommendations and Documents, and some were for the development of new ones. It could be seen that a couple of groups had only two P-members, and, bearing in mind that those two included the country holding the convenership, this did not indicate much interest.

    Mr. Dunmill then showed the project groups which had no convener. This meant that although there may be a reasonable number of P-members, no country was willing to offer the resources to act as convener. Again, if the required level of interest could not be produced, then it did not seem worthwhile to continue with the project. The groups in red at the bottom, he said, were in both categories, in that they had no convener and fewer than six P-members. So they were apparently doubly uninteresting to the membership of the OIML at the moment. Delegates would notice that all of these showed a country which had previously held the secretariat of the old subcommittee, and had therefore inherited the role of convener under the new project group arrangement, but these countries had indicated that they did not want to run these particular projects. An enquiry had been conducted amongst the P-members to see whether other people were interested, but this not been successful.

    There were therefore, Mr. Dunmill pointed out, a few points to consider in whether to disband these groups or not. In all of them, there had been little activity. And during the time it had taken to implement B 6, which had been over the last couple of years at least, nothing had happened in any of the groups. It was even more difficult to trace what activity there had been previously, especially in groups without a convener. It was not disastrous if one of these projects was stopped, in that a new project could easily be started at any time if the subject became of interest internationally, so stopping these subjects did not mean that the OIML would never work on them again, merely that at the moment there seemed to be such a low level of interest that it was not worth keeping the project on the OIML list. One of the problems was that there might be a large list of projects which looked good from the outside, but there was little point in having a large list if the work was not being done. The proposal was therefore to try to reduce the list of projects to those on which work was actually being done.

    Of course, Mr. Dunmill told delegates, it was necessary to decide what happened with any of the existing Recommendations. Some of the projects were for revisions of existing Recommendations, so the first question was whether they were really being used, and, if so, why people were not interested in revising them. Should they be reconfirmed in their existing state or should they be withdrawn, if there was little interest in revising them? They could become part of the normal review process which the BIML was now responsible for operating, so each could be looked at again by conducting an enquiry amongst all CIML Members to see whether they thought these Recommendations were needed or not.

    Mr. Dunmill showed the list of those project groups which had provided no progress report at the beginning of the current year. Since the information which Members had received, only a couple more reports had been received and he indicated the groups which had still not provided reports. Some of those were also on the low participation list.

    A few odd cases had come to light, Mr. Dunmill told delegates. The convener of a project group working on a new Recommendation for ophthalmic instruments under the convenership of Germany had contacted the BIML because they had received a very poor voting response on the last CD which they had distributed. They felt that they had gone as far as was possible with the technical development of this Recommendation and were therefore asking, in line with B6, to put it through the preliminary ballot procedure. The problem was that this was one of the groups which had too few P-members. The BIML had the draft, which appeared to be in a reasonable state, but the

    German convener was having difficulty in obtaining a response from their five P-members. However, since the work had been done, the proposal was that it should be put to a preliminary ballot in the normal way in accordance with B 6, which allowed the situation where the convener felt that no further progress could be made. The most reasonable line of conduct seemed to be to go through the final approval process and then revisit the question in five years' time when this Recommendation would next be due for revision.

    Two other projects had fallen through the gaps in the implementation process:

    - the first had been omitted from the original report because at the time when the implementation had been done, there was no secretariat of the parent subcommittee TC 18/SC 2. This project had therefore not shown up in the database listing of projects requiring attention. It currently had a committee draft produced by the previous secretariat but this could not be put on the list for approval of its withdrawal, because there had not been enough notice, as it had not appeared in any of the papers sent out three months previously. It was therefore proposed that the withdrawal of this project should be considered by an online ballot;

    - another project in the same subcommittee had involved exactly the same problem of falling through the gaps of the implementation process. Nothing had yet been developed, though the project had existed for a number of years. Mr. Dunmill proposed that withdrawal of this project should also be considered by an online ballot.

    Linked to the question of projects and the work done within them, the existing Recommendations and Documents had also been analyzed, and delegates had received a document giving the complete status of all current Recommendations, including the metrological procedures, test requirements and test report formats, which were now published as Part 1, Part 2 and Part 3 of the same Recommendation.

    There were at present 103 current Recommendations and 27 OIML Documents. The proportion of Documents and Recommendations was exactly the same:

    - about 44 % were under revision, under the responsibility of a project group, and were currently being revised;

    - 37%-38 % were out of date and not under revision; and

    - about 18 % had been published or reconfirmed as not being in need of revision within the last five years.

    Mr. Dunmill showed an illustrative graph. He told delegates that within the following year the BIML would try to start the review process for as many as possible of the Recommendations and Documents which were not already under revision. Obviously not all of them could be undertaken in a year, as resources had to be found and the five year cycle would be affected. Priority would be given to anything which was in the Certificate System or in the MAA. CECIP had earlier commented about R 60 being old; this was already an ongoing project but they would be looking at anything else which was in the Certificate System to ensure that these had priority in revision. Over the coming years they would work through improving this revision cycle of OIML Recommendations, something which in the past had not been very strictly adhered to. If the OIML was to be seen to be producing relevant publications, then the revision process needed to be done on as regular a basis as possible. Even five years was quite a

    long time in technology terms, so the speed of the revision needed to be improved as well.

    Summarizing, Mr. Dunmill said that the BIML was proposing that the list of projects for which there were currently not enough P-members or no convener should be withdrawn. Before considering this further, he asked whether there were any questions about the projects on the list, or the process.

    Mr. Mason thanked Mr. Dunmill for his presentation. He referred to Mr. Dunmill's statement that a project which was cancelled could be revived again if there appeared to be a need at a later date. He asked first whether it was possible to do this without obtaining formal CIML approval for the new project, as would be done in the case of a normal new project.

    Mr. Dunmill replied that he meant that CIML approval would still be needed, and the project would be set up by the normal procedure and would still require the justification and rationale, together with some proof that the Recommendation was needed. B 6 now required that the rationale clearly stated those countries which had legislation in a particular area or intended to put it in place, so there would not be any accelerated procedure in reviving a cancelled project, but it would be a much clearer indication of the need for that project to exist. There was no problem in putting a repeat project into place, but it would have to meet the current rules on how to establish a project.

    Mr. Mason thanked Mr. Dunmill for this clarification and said he had noticed that in two cases there was an absence of convenership because there was an absence of secretariat, both in TC 18/SC 2. He asked whether this secretariat was now in place and whether this was a case where there was a secretariat but which was not keen to take on convenerships of these projects, or whether there was still a vacancy for that secretariat.

    Mr. Dunmill replied that there was still a vacancy for the secretariat, and in fact the situation with too few P-members also applied to some other TCs or SCs. In the current year the BIML had concentrated only on looking at what work was being done in the projects, but there were several other committees where there were fewer than six P-members, though TC 18/SC 2 was the only secretariat which was currently vacant.

    Mr. Mason said that he had found this helpful, because one of the things that he thought the CIML needed to consider and recognize was that the vast majority of these projects were in fields outside what could be called traditional legal metrology relating to trade and in the field of health and safety or environmental considerations. Of course the OIML had always felt that there was a need to have capability in these areas, so they had a choice of having some sort of debate about the role of the OIML in these areas, which was one way of approaching it, or the alternative was to approach it on a project by project basis. As he understood it, decisions could be taken on a project by project basis in the current year, giving the opportunity to raise the broader, philosophical question about the range of OIML activities the following year, when a start would be made on looking in detail at whether the subcommittees themselves had enough support.

    Mr. Dunmill concurred that this was correct. The BIML had felt that they would be in a clearer situation to report on what work the OIML was actually doing if in the current year they could clear out the projects which were not being worked on and where there was little interest, and then the following year look more closely at the range of

    subcommittees, etc. He agreed that there was a need for ongoing discussion of the expanding scope of legal metrology, not just covering the traditional weights and measures areas. When the number of participants was looked at, it was very clear that there was much less interest in many of these non-traditional areas. There needed to be a philosophical discussion but the BIML had felt that it was clearer to concentrate on practical matters in the current year and the more philosophical matters in the future.

    Mr. Mason asked for the first round of comments to be of a general rather than a project-specific nature, on the general approach to be taken. The project list would then be gone through item by item as a second agenda item, in order to establish whether there was interest in the room which could be translated into additional P-members or a convenership, or which would allow that project to be taken off the list.

    Dr. Ehrlich asked whether the information on the new website concerning the status of the projects could be changed by Members directly and more frequently rather than sent to the BIML to be done in the Bureau.

    Mr. Dunmill replied that this was being done by the Bureau at the moment because the interface through which it was done was not yet ready to be released to everyone, but access to the website was all based on access rights management; there was nothing to prevent it being opened to conveners to update, and the intention was to make this available in the future. Updating could then also be done much more immediately and frequently than the present once a year, to announce or report on a meeting, for example, give comments on what happened in it, etc.

    Dr. Ehrlich thanked Mr. Dunmill for his clarification and said that this facility would be appreciated.

    Mr. Birch mentioned that the APLMF had a very active medical measurements working group which had been in operation for some fifteen years and was convened by an OIML Corresponding Member. This issue had been identified in a survey of priorities for the area done by Knut Birkeland in about 1998; the group had been quite active on the issue of clinical thermometers. He said that he would take this matter to the APLMF meeting the following week in Wellington and acquire some feedback on those issues.

    Mr. Mason said that this would be helpful, although there was a need to remember the rule that not only did a certain number of P-members need to be involved, but also those P-members needed to originate from more than one region, on the grounds that what the OIML did should be of international rather than merely regional significance. He was not sure how this offer could be reflected in the decisions the Committee was being invited to make at the present time.

    Mr. Dunmill commented that the two projects concerning thermometers were among those he was proposing for CIML ballot.

    On the subject of clinical thermometers, Dr. Klenovský said that mercury thermometers were banned from use in Europe by regulation but on the other hand many electronic instruments were being used that had problems. Logically, at this stage, the OIML should have a project to regulate electronic thermometers, otherwise the OIML would, as he put it, "miss the train".

    Mr. Van Mullem asked about the large table Mr. Dunmill had compiled. This was the first time delegates had seen information of this sort and he thought it was good to have it. Mr. Dunmill had also said that the following year he would try to investigate the projects

    which were out of date. He asked whether this took into account the progress on the several projects which were under revision. A project could be said to be under revision, yet little or no progress be made on it. This should also be taken into account.

    Mr. Mason replied that he thought the intention was that these were questions that would be pursued more vigorously and throughout the year rather than just taken to the CIML for a decision once a year. So, recalling discussions at the Presidential Council, they had been very much intending to identify important projects which certainly had enough support for the work to be undertaken, but which were not making very good progress. He saw it as the role of the Presidential Council to push for more progress rather than to take the option of deleting a project which might be very important but was proceeding too slowly.

    Mr. Dunmill agreed, adding that one of the objectives of cleaning up what appeared to be inactive in the current year was so that at the Presidential Council meeting, instead of considering a large list where a large number of projects were not making progress, there would be a clearer, shorter list of what the organization was actually doing, so that those which were not being worked on could be looked at. A second point was that in the full table there was a list of all the out of date Recommendations. This might, however, not be quite as simple as it looked, as in the past, the re-confirmation had not been well recorded in the minutes. Further than a few years back, it began to become extremely difficult to tell when things were actually re-confirmed. There might be Recommendations which said they were from 1980, but which had in fact been reconfirmed more recently. At the present moment it had not been possible to find the proof of that. Again, this was part of the review process; this first time would be more complicated because it would be necessary to chase up those who had been responsible in the past and find out what had really happened as far as re-confirmation was concerned. More recently, the meeting resolutions had been much more clearly recorded in the minutes, and clearly stated a list of those Recommendations which had been reconfirmed in the year in question.

    Mr. Mason asked for clarification on whether re-confirmation was a decision taken by the CIML under the new arrangements.

    Mr. Dunmill replied that this was the case, the CIML now decided on all aspects of the publications: project, publication and re-confirmation.

    Dr. Ehrlich commented that in the table which included the status of secretariats and conveners, a fairly large number said "none, previously US". He wished to point out that this did not necessarily mean that the US did not have interest, but rather that they had had to look at their resources and decide what they could and could not do. They had been hoping, and still hoped that this would encourage others to take over these projects. If certain project groups were disbanded, the CIML would have to go through all the work as a whole new process to re-institute them later. Some of the projects had 17 or even 24 P-members, so hopefully somebody could take over the work.

    Mr. Mason added that his thinking behind looking at these projects on a case by case basis was that it would give the opportunity for anyone in the room to say, "Oh, actually this is important, if nobody else will be the convener, then I want to be the convener". He hoped, from what Dr. Ehrlich had said, that the USA would like to step forward in one or two instances. The process, he mused, would be like a game of "chicken", where everybody hoped that somebody else would come forward first.

    Dr. Ehrlich said that the USA simply did not have the resources. In one or two cases the BIML had held the role. Dr. Ehrlich had simply not wished it to be thought that the USA considered these projects to be unimportant.

    Mr. Dunmill regretted not having mentioned earlier that the USA and Germany had been responsible for these projects while they were part of the work under a subcommittee; in both cases it was a lack of resources to operate these projects in a reasonable time scale, and not a lack of interest. Again, what was being said was that if the projects could not be undertaken at once, they could be put aside until an opportunity should arise. There was also the point alluded to by Dr. Ehrlich about the number of P-members. He had not shown this on the slide, but he had colored the groups where there was very low interest. Some of the others did indeed have 17 P-members; it was just that nobody appeared to be willing to run them.

    Dr. Ehrlich further clarified that if the projects were closed, the documents would presumably still be kept on the books. He asked whether the intention was to abolish subcommittees.

    Mr. Dunmill replied that at the moment all that was being done was to look at the project groups in order to clear up what work the Organization was or was not actually doing. There was no proposal to alter the TC/SC structure at the moment, though, as Mr. Mason had said, it was part of a larger philosophical discussion as to what the OIML should be involved in.

    Mr. Mason added that it was not clear to him whether this discussion should take place in 2015 or 2016, but he thought that at some stage the question had to be asked as to whether, if a subcommittee had no active work on any projects, and, in particular, if that subcommittee was itself failing to attract enough P-members, that subcommittee ought to be disbanded. He thought that the Presidential Council ought to consider at its March meeting whether 2015 was the right time to be discussing that or whether a little more time should be given to it.

    Mr. Dunmill added that as well as medical instruments, which was agreed to be quite an important area, involving many consumers, but which seemed to attract little interest, another area where there was a problem was radioactivity. In this latter case, the technical committee had no responsibilities at all - all the work was in subcommittees, which themselves were either not doing anything or not participating in things, and in fact there was a lot of international work going on in that area. The more philosophical question was whether the OIML also needed to be involved in this. Mr. Dunmill said that he had attended some IAEA and ISO meetings in that area, and both had produced a lot of documents; whether there was a need for the OIML to produce anything because of legislation was another matter entirely.

    Mr. Mason added that he envisaged that before taking any major step in these areas of metrology, the OIML should seek to engage at a senior level with the other standards making bodies that were operating in this area, so that it could be established what the correct level of engagement was, if any. This was another reason why he did not wish to rush into what could be very big questions. It was necessary to identify where the work was being carried out, when this was not in the OIML, and to have a high level discussion with those bodies in order to work out whether there was a useful role for the OIML, quite possibly in the way that they were doing the work, rather than attempting to do it within the OIML.

    Mr. Mason reminded Members that the meeting was now about to consider, on a case by case basis, the projects which either did not have a convener or had insufficient P-members. Unless Members were able to step forward and either take a convenership or volunteer to be P-members, all of which could now be done very quickly through the website, the projects would close. Clearly, becoming a convener implied more of a commitment than becoming a P-member.

    ## TC 3/SC 1/p 4 Revision of D 13: Guidelines for bi- or multilateral arrangements on the recognition of: test results, pattern approvals, verifications (previously USA)

    Mr. Dunmill said that this was a project for which there was no convener. There were however 18 P-members and 13 O-members on this project group.

    Dr. Ehrlich said that the reason why the US had wanted to give this up was that they had been waiting to see what would happen with the MAA document. So in a sense this project, at least for multilateral arrangements, was no longer necessary, though it might be necessary to have one for bilateral projects, because it had been supplanted by the MAA.

    Mr. Carstens said that this project could possibly be of interest to regional bodies such as SADC, in which, for example, there was only one type approval body which was South Africa, and there might be a need for this document. He needed to discuss with SADC whether they thought this could be a document which could be used, and also possibly approach the APLMF or perhaps others.

    Mr. Mason felt that it should be emphasized that the document stayed; the question was whether revising it was a priority for resources. The UK had recently been looking at renewing some of their bilateral arrangements, and he certainly had not looked at D13 while doing this. It might be that a document even of this age was sufficient for bilateral arrangements. He invited the US to comment on how out of date the document felt.

    Dr. Ehrlich admitted that he had not looked at it recently, but he guessed that it was sufficiently out of date to merit revision at the least.

    Mr. Mason asked Mr. Dunmill for the procedure for delaying a decision, dissolving the current project if word did not come from SADC or another group within a period of, he suggested, a month.

    Mr. Carstens said that there was a meeting in March and asked to be allowed until the end of March to give a response.

    Mr. Mason said that if this was a SADC matter then it was regional and not international, even though there were a large number of P-members spread across the world.

    Mr. Dunmill said that this was an old document. Even if the current project was stopped, the document would at some time come up in the BIML's process of examining the relevance of all existing publications. The Recommendations were obviously more of a priority than the Documents, but at some point it would be looked at again by the BIML, an enquiry would be sent to everyone asking whether they felt the publication should be revised, withdrawn or reconfirmed, and asking people to volunteer a convener of such a project, if it was proposed for revision.

    Mr. Mason suggested taking away this particular project and considering whether there was a suspension option as opposed to a deletion option, where it was known that there might be enough interest for a convener to step forward. He agreed that the first project

    the BIML was trying to delete had turned out to be problematic, but felt that he must press for a volunteer to come forward earlier than March, for this not to be deleted. So, he said, the BIML would reflect on the wording of the resolution, but even if it went into suspension mode rather than deletion mode it would be for a matter of weeks, until December, rather than months, until March.

    Mrs. Lagauterie felt that if this project were to continue it should be only on the verification aspect, because otherwise it was duplicating the MAA. It could if necessary continue on the level of verification and how countries could recognize each other's verifications, but for test results and type approval it paralleled the MAA and time should not be spent on it.

    Prof. Schwartz agreed with this and felt that this was an argument for deleting the project immediately. If there were any new project, the connections to the MAA document, B 10 and other documents could be considered and there would be the opportunity to define a new project which did not touch the existing B 10.

    Dr. Ehrlich said that it should be asked whether anyone was currently using this document.

    Mr. Mason said he could answer this in the negative. He could see an argument for the existence of bi-lateral guidelines because it was known that there were bi-lateral arrangements. The UK had recently renewed at least one of these and were in discussion on two others, and the Netherlands also had bi-lateral arrangements. However, he would be surprised if when it was renewed they had recourse to D 13 to find out how to do it.

    Mr. Carstens said that South Africa agreed to the project being deleted. Anyone wanting to make a bi-lateral arrangement could use the principles of the MAA. The only issue that might affect SADC was within SADC and concerned cross-border verification, where companies from one country were doing verifications within another country, but that could be handled on a regional level.

    Mr. Mason thanked Mr. Carstens for his intervention and said that it sounded as though the project was being deleted.

    ## TC 3/SC 5/p 10 New publication: Guide for the application of ISO/IEC 17021 to assessment of quality system certification bodies in the field of legal metrology (previously USA)

    ## TC 3/SC 5/p 11 New publication: Guide for the application of ISO 9001 to legal metrology controls (previously USA)

    Mr. Dunmill said that the next projects fell into the category mentioned earlier by Dr. Ehrlich, and had been of BIML interest at the time. They currently had no convener (the USA had previously been the convener). 24 P-members were involved.

    Dr. Ehrlich said that in fact the USA had never considered itself to be the convener for these two projects which had always been under a USA-BIML co-secretariat. He suggested that they be removed, unless anyone who had the expertise would like to undertake them, as the USA had never intended to pursue them.

    Mr. Dunmill also pointed out that these were two of four proposed projects of which Paul Dixon of the UK was running two other projects in the same kind of field, but the

    two being discussed had been left over and there did not seem to be any interest in them.

    Dr. Ehrlich said that he thought that D 29 and D 30 were the other projects in the set, but that those would be kept.

    Mr. Mason said that he was sure there was the expertise but the question was whether the projects were worth keeping. Nobody seemed to think there should be a guide, so the project would be deleted.

    Mr. Dunmill asked whether the comments applied to both the above projects.

    Mr. Mason confirmed that they did.

    Dr. Ehrlich also confirmed this, adding that the comments probably applied even more to the ISO 9001 project, but that ISO/IEC 17021 could perhaps be useful. All these projects had been in the context of the MAA. Along with the project on ISO/IEC 17025, this was basically an interpretation document of the ISO/IEC document for legal metrology purposes. The document for ISO/IEC 17025 already existed and was already used by the assessors, but he did not think the other documents would be used in the MAA process.

    Mr. Mason said that a guide to ISO 9001 would be used by a certification body that was looking at quality management systems, like NMI did, but he could not imagine that they felt they needed a guide in order to do something they were already doing.

    Mrs. Lagauterie asked whether this work was not linked to that being done on conformity to type.

    Mr. Mason replied that this was a good point, and that when the work on conformity to type had reached a stage where it might be felt that a guide on conformity to type was needed, this project might be expected to be revived at that point, as it would then be being developed in a quite different situation from its previous intended use. He stated that it was now agreed that this project should be deleted; it would always be possible to return to it later if it was felt that it would be useful.

    ## TC 7/SC 4/p 2 Revision of R 55: Speedometers, mechanical odometers and chronotachographs for motor vehicles (previously USA)

    Mr. Dunmill said that this was a project of measuring instruments for road traffic. The USA had taken on the secretariat for TC 7/SC 4 mainly because of the interest in the other project in that committee, which was a revision of R 91 on radar equipment. This was why they wanted to give up this project, which currently had 20 P-members.

    Dr. Ehrlich commented that the USA had hoped to work on this project but due to lack of resources this had proved impossible. When they had taken over that secretariat France and Switzerland had both expressed interest, so he wondered if he could encourage one of these to take it on.

    Mr. Dunmill added that the UK had held the secretariat for this project before the USA. One of the problems in making progress on it was that for instruments embedded in vehicles there were over-riding type approval considerations. These were of no concern to the OIML, being under UN or UNECE jurisdiction, so this had made it extremely difficult to do the work, and the UK had abandoned it in favor of other priorities.

    Dr. Ehrlich agreed that it was complicated.

    Mrs. Lagauterie said that France's interest, like the USA's, had been rather for the revision of R 91. Speedometers within vehicles were not part of the legal metrology field. Mechanical odometers were very out of date and regulation still existed in France. As for tachographs, there was a European regulation which in fact went beyond European boundaries. This was an important regulation, relating to working hours, and beyond the scope of the OIML.

    Switzerland also confirmed that they were not interested.

    Mr. Dunmill said that if this project was cancelled, this would leave in place an extremely old regulation, which would later be examined to see whether it was relevant, useful or interesting.

    Mr. Fischer asked what happened to a Recommendation if a project to revise it was cancelled. For instance, he asked whether R 55 would be withdrawn, since it was not possible to leave Recommendations on the website which were out of date.

    Mr. Mason replied that he understood that R 55 would not be withdrawn immediately, but the problem was that possibly nobody had looked at R 55 to consider whether it was still relevant. If it related to old technology which was still in use, particularly in some parts of the world, where it would also be relevant to the way they conducted their regulations for safety purposes, it might still be relevant there; but this had to be a separate discussion. The present discussion was limited to whether to stop the present intention of revising the Recommendation, on the basis that the decision to revise it would itself have been taken many years previously. The Recommendation might be in use in places that were not able to use radar equipment to enforce speed restrictions, so it was important to give the opportunity to volunteer to look at it. He also added that a convenership, once assumed, could be resigned quite quickly.

    Mr. Dunmill commented that he would not like it to be resigned too quickly.

    Mr. Mason thought that it was possible for a Member to say "I am prepared to go and look at this and I consider that it would be useful and within our competence", and that would keep it going.

    Mr. Dunmill replied that in other cases he had asked for an update but the project group had asked for time to reconsider whether a revision was necessary. In some cases these people were repeating enquiries done some years previously, to confirm the necessity of carrying on, even with projects which were not on the current list. So there was a possibility for someone to take this project on just to find out whether it was wanted, i.e. to take on the convenership, conduct an enquiry among the P-members as to the relevance and usefulness of R 55 and then make a recommendation that R 55 be withdrawn, if necessary.

    Mr. Mason confirmed that a person who volunteered to be convener for this project would be required to do no more than confirm that it was a Recommendation that was worth working on. This would not be a heavy responsibility for a Member who wanted an easy introduction into the world of convenerships.

    Mr. Awosola suggested that as there were no volunteers, the Bureau might take on the task.

    Mr. Dunmill replied that the proposal for its withdrawal had been open to ballot for three months, but that nevertheless it would have to be examined at some stage, though

    higher priority would go to projects connected with the certificate system and the MAA. At some point, however, he added, the Bureau would in any case do this survey.

    ## TC 10/SC 3/p1 Revision of R 97: Barometers (P.R. China)

    Mr. Dunmill said that this project had a convenership, which was with China, but there were only four participating members.

    Mr. Mason invited the Chinese delegation to comment on whether they wished to encourage additional P-members for this project.

    The Chines delegation replied that they thought there were not enough interested P-members to continue with this project.

    Mr. Mason applauded the quick decision.

    ## TC 16/SC 3/p 2 Revision of R 112: High performance liquid chromatographs for measurement of pesticides and other toxic substances (previously USA)

    Mr. Dunmill said that this project again did not have a convener and had three P-members, which suggested a lack of interest.

    Seeing no volunteers, Mr. Mason suggested that the project should be deleted.

    ## TC 16/SC 4/p 1 New publication: Guide to air sampling devices for toxic chemical pollutants at hazardous waste sites (previously USA)

    Mr. Dunmill said that this project had no convener and only two P-members: China and the USA. Dr. Ehrlich stated that this was not among their priorities at the moment, and commented that this could be one of the areas in which other organizations were developing standards that the OIML could consult. He said the project could be deleted at present, and revived later if there was interest.

    This project was deleted.

    ## TC 16/SC 4/p 3 Revision of D 22: Guide to portable instruments for assessing airborne pollutants arising from hazardous wastes (incorporating FTIR spectrometers) (previously USA)

    Mr. Dunmill said that this project was in exactly the same situation as the previous one, with no convener and two P-members.

    Dr. Ehrlich said that he had more interest in this project but no resources to deal with it at the moment.

    Mr. Mason said that D 22 would remain in force until it came up again for revision, but that the project was deleted.

    ## TC 18/SC 4/p 4 Revision of R 90: Electrocardiographs, electrocardioscopes and electrocardioanalysers

    Mr. Dunmill said that this project had four P-members and that the Russian Federation held the convenership. This was a combination of some previous projects.

    Mr. Mason asked the Russian Federation whether they were keen to have further P-members.

    Dr. Kononogov said that they agreed to delete this project.

    Seeing no volunteers, Mr. Mason said that this would happen.

    ## TC 18/SC 4/p 6 Revision of R 89: Electroencephalographs, and TC 18/SC 4/p 4 Revision of R 90: Electrocardiographs, electrocardioscopes and electrocardioanalysers

    Mr. Dunmill said that these projects were in the same situation, with the Russian Federation holding the convenership and four P-members, dealing with the revisions of existing Recommendations.

    These projects were also deleted.

    ## TC 18/SC 5/p1 Electronic blood cell counting chambers

    Mr. Mason said that this was a project for a new publication.

    Mr. Dunmill said that this had been one of the German projects, for which they had indicated that they did not want to keep the convenership. There were currently five P-members. There was in any case nothing available for this new project.

    Mr. Mason expressed the opinion that it would require a high level of enthusiasm to get this work started, and he did not see that, so this project was also deleted.

    ## TC 18/SC 9/p 4 Revision of R 26 Medical syringes

    Mr. Dunmill told delegates that the situation was the same with this last project on the list; although this was a revision of an existing Recommendation, it had been under the responsibility of Germany and there were four P-members in it at the moment.

    There being no volunteers, this project also was deleted.

    Mr. Dunmill reminded delegates that for the projects he had also mentioned, two of which had fallen through the gap and been left out of the list, and any others which currently had no convener, an electronic vote would be organized. One project remained, which, if there were no objections, the BIML would conclude through the CIML ballot and approval procedure, even though the project had only five P-members. It had reached such an advanced stage that it would seem foolish to throw the work away.

    Mr. Mason asked for a reminder of what level of acceptance online voting would entail.

    Mr. Dunmill replied that withdrawals of projects would be on the basis of a simple majority. This was simply a decision of the CIML, and not the approval of a publication.

    Dr. Ehrlich asked for clarification on this.

    Mr. Mason answered that this referred to the two other projects which had not been circulated, which Mr. Dunmill had mentioned during his presentation. Because the secretariat had been vacant at the time of the transfers to the project groups, these projects had been missed off the database, and their existence had been found by Mr.

    Dunmill when he had done further research. Formally, some action had to be taken concerning these.

    Mr. Mason said that he could not see any objection to disbanding the project. If there was not enough interest to obtain a majority of online votes to disband it, it could not be disbanded, in which case it would be brought up at the following CIML meeting. Since nothing was happening at the moment it was unlikely that anything would happen in the meantime.

    Mr. Mason said that there was obviously approval to put this to online voting. The final proposal was that a publication that was at an advanced stage of preparation should be submitted to preliminary ballot even though it did not have a convener.

    Mr. Dunmill explained that the person who had been responsible for it, from Germany, would be willing to help with any final work on it, but there were only five P-members on that group at the moment, and they had received a poor response to the last CD voting round. However, they had felt that, in accordance with B 6, they had gone as far as they could with it and they had therefore asked the Bureau to put it to CIML ballot.

    Mr. Mason commented that it seemed entirely appropriate, since the work had been done, that if it could not be taken any further and was publishable, that the CIML should vote on it.

    Mr. Dunmill said that as long as there were no objections in the online ballot the proposal would go through for CIML approval, either online, or, if the response was not sufficient, then at the next meeting.

    This was agreed, thereby completing this draft resolution.

    Dr. Ehrlich said that in one of the documents sent out, he had been pleased to see the column "last confirmed". He asked whether this information would also be put on the website.

    Mr. Dunmill confirmed that when the Bureau's work in researching publication and reconfirmation dates was finished this would be done; all documents would have the date of last publication and last re-confirming. He explained that there were numerous research problems in the older minutes. The last resort would be to ask the people who had been responsible for the documents in question.

    Referring to the suppression of two of the above documents Mrs. Lagauterie recalled what Ms. Martens had said earlier about what work the OIML should be doing, and about which of these subjects were, or should be, of interest to the OIML. These included the certification of measuring instrument manufacturers' quality systems on the basis of ISO 9001, the capacity of certain certification bodies to certify the quality systems of manufacturers of instruments for legal metrology. The OIML should continue to reflect on these topics in conformity to type and on the role which the OIML should be taking in general.

    Mr. Mason thanked Mrs. Lagauterie for her helpful comment, which confirmed what had been said previously, i.e. that this was an important area but one which it would be better to record in the minutes and look at again when more progress had been made on conformity to type.

    Ms. Van Spronssen referred to one of the topics in the additional information list for the topic 8.1. Earlier there had been a presentation from Dr. Richards on ILAC's work, in

    which he had spoken of a joint project between ILAC and the OIML on ISO/IEC 17025 on legal metrology. This overview mentioned the revision of D 30, the guide for the application of ISO/IEC 17025 for the assessment of testing laboratories involved in legal metrology. She asked for an explanation of the difference between those documents, or whether they were on the same subject.

    Mr. Mason replied that he understood that the project which was still live and being undertaken by the UK, the revision of D 30, involved the application of a standard which was highly relevant to the work currently being done, and would affect the way in which a certification laboratory carried out its work and was assessed by an accreditation body. When looking at ISO/IEC 17021 there were separate issues, and there had not been the same level of interest at this point to produce a parallel document.

    Ms. Van Spronssen said that her question had not been understood. There was a joint OIML/ILAC project on ISO/IEC 17025 for legal metrology. This seemed to her to be enough for accreditation bodies to assess testing houses which were going to operate this process. However, additionally, there was now a project which was doing, from what she could understand, exactly the same thing.

    Mr. Kool explained that there was no joint OIML/ILAC project on ISO/IEC 17025. What he had reported earlier was that a working group had been established within ISO/CASCO to revise ISO/IEC 17025, and that there were OIML representatives in that working group. There was a joint ILAC/OIML project, but this was on the revision of OIML D 10/ILAC G 24, as had been reported by Dr. Richards. The project in the 8.1 document was an OIML project for the revision of OIML D 30, which was the guidance for applying ISO/IEC 17025 in legal metrology laboratories.

    Mr. Mason added that this was a live project, the timing of which might be affected by a decision to revise ISO/IEC 17025, but if the latter was revised, it would be even more important to look at the drafting of D 30. It was clear that there was the necessary interest in this project, because there were enough P-members and a convener, and indeed this was one of the additional convenerships that the UK had decided to take on because of the importance attached to making sure that this documentation was right.

    Prof. Schwartz suggested that Ms. Van Spronssen might be referring to the presentation by Dr. Richards, in which he had mentioned two joint work projects. Like Ms. Van Spronssen, Prof. Schwartz had been a little confused over the first one; Dr. Richards had mentioned a joint ILAC/OIML project concerning the assessment procedure which would end up in an MAA document. He thought that this had been going on for two years, and had been one of the responsibilities of Mr. Mussio, who had been the BIML contact to the project. He believed that this project was looking at the procedures, not at an interpretation of ISO/IEC 17025, but at harmonizing the procedures of accreditation and peer assessment in the field of metrology.

    Mr. Onyancha expressed concern about those projects which had been disbanded because of having too few P-members. He was concerned that conveners might have put a lot of effort and resources into these projects. Some potential P-members might not have financial support or technical know-how to support the projects, but might perhaps be able to add their moral support to the numbers so that the project might not need to be discontinued.

    Mr. Mason said that this was a good point, and in the case of the document which was going forward to preliminary ballot, the reasons for that were that a lot of work had

    been done, and ought not to be wasted. For most of the other projects, however, very little work had been done, so not much would be lost by stopping them. In terms of the obligations of being a P-member, in particular with the present possibilities of online voting and clear distribution of documents, it should be much easier for a country that had an active interest in a document to take part without having to commit a large amount of resources. The fact that there were large numbers of P-members on so many OIML projects demonstrated that Member States found it relatively easy to take on that responsibility. The responsibility of being a convener was much heavier, which was why the recent debate had taken place.

    Mr. Dunmill confirmed that of all the problem groups only two had existing CDs, and these had been produced some time previously and the Bureau did not even have a copy of them, so there had not been active work going on in those projects for some time. Anything which did exist would of course be kept for any future use, but they were not at an advanced stage.

- number: '8.2'
  title: Items for information
  narrative: |2+

    ## Information about Project 1 in TC 3/SC 1

    Mr. Kool told delegates that they might have noticed that in the first version of the working document a proposal for a new project had been included. This had been submitted to the BIML by the USA, and was replacing a number of existing projects, simultaneously extending the scope of the work slightly. What had been overlooked by both the BIML and the secretariat was the fact that already in 2012 there had been a CIML resolution to combine a number of these projects, and ultimately the BIML and the secretariat had agreed that it was not necessary to set up a new project, and that the work could be done within the existing project, TC 3/SC 1/p 1. The project proposal had therefore been withdrawn, which was reflected in the second version of the working document. For information purposes, however, the original proposal had been kept in the addenda. He asked if the USA wished to add to this statement.

    Mr. Mason said that this would be helpful, because there was a concern for transparency in the project which was now being undertaken.

    Dr. Ehrlich added that the USA had known that there was project approval but had felt that the scope of that project needed further definition. The project proposal had been submitted in order to be sure that it was acceptable to the CIML. The original project had concerned the combined revision of D19 and D20, incorporating elements of R34, but it had been felt that that did not convey the full scope of what was now being called a handbook project entitled "Principles of metrological control for measuring instruments throughout the instruments' life cycle". The scope of this project was to develop a document which would combine the elements of many of the existing documents, but go beyond that, basically to look at how a measuring instrument went through its life cycle, birth to death, and the different things that needed to be considered, from the legal metrology point of view. It looked at the different ways in which this was accomplished in different countries at the same time. It could almost be described as a story book. Before going too far with this, the group had submitted it as a new project proposal, just to make sure that they had the CIML's agreement that they should be developing such a document.

    Mr. Mason thanked Dr. Ehrlich for his clear presentation, which had met with enthusiastic approval at the Presidential Council. It was very consistent with the desire to tidy up the landscape and the publications, and there were high hopes of this project. He looked forward to shortly seeing some drafts.

- number: '8.3'
