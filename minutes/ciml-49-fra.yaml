- number: '6.3'
  title: Special project aimed at developing countries
  narrative: |2+

    Mr. Kool explained that in the current 2013-2016 OIML budget there was a provision for expenses specifically aimed at countries with less developed legal metrology infrastructures, because it had been considered that such countries should receive more support from the OIML to do things like awareness raising, activities aimed at attaining funding from other international organizations, access to training tools, etc. In the past few years a number of organizations had approached the BIML saying that they were seeking cooperation with the OIML in exactly that kind of activities. The BIML proposed to these organizations that a project group should be formed, and they had agreed to this.

    So far, the participants in that group had, again amongst themselves, agreed on terms of reference. Those terms of reference had been made available to Members through the last minute documents page of the meeting website, so they should already have received all that information. However, Mr. Kool said, he would just give a brief overview.

    The group had chosen a rather broad title for the project: "Reliable measurement for fair trade and consumer protection". Mr. Kool showed the logos of the organizations participating in the project. The OIML was the lead agency, but it also included the PTB, the International Trade Center, METAS and the Netherlands NMi. The project was aimed at countries with less developed legal metrology infrastructures; its terms of reference had been made available to Members. Its purpose would be to support these countries in order to safeguard consumer protection and fair trade, and initially it had been decided that the project would focus on activities around the implementation of regulations for prepackages based on OIML R 87 and R 79. The primary objective of all these activities should be, Mr. Kool said, to increase the confidence in statements of quantity in the trading of consumer products, in particular prepackaged products, to enhance compliance with international standards.

    The formulation of the terms of reference, Mr. Kool explained, had been done mainly by experts from the PTB, who had a lot of experience in defining this type of texts. This should appeal to decision makers rather than to technicians. So some of the terminology was specific for the target groups that were envisaged, in this case decision makers.

    The project, Mr. Kool continued, aimed at targeting different levels and kinds of activities, and this was specified in more detail in the terms of reference. Basically, there were three levels:

    - the level of the policy makers;

    - the level of the institutions that formed the quality infrastructure in countries; and

    - the level of the beneficiaries of all these activities, who were mainly consumers, producers, traders, exporters, in short the stakeholders.

    There were three categories of activities. The main category was awareness raising, so the group was trying to produce information material, templates for presentations that could be made at seminars/workshops and advisory services, but here Mr. Kool warned that the terminology should be looked at with care. The group would not be offering technical assistance in individual countries, as that was not what the project was for; they were looking at activities at regional level, in conjunction with other events, which could be for example on legislation, organization and equipment that could be used for the control of the quantity of product in prepackages. The third category of activities would be directed at human capacity development - the production of guidance documents, training material, etc.

    Mr. Kool added that this was the stage the group was at currently: it was in the process of finding what kind of material could be developed, based on what already existed. A lot of training material on prepackages had been received from New Zealand; there were also documents which had been published in the past weeks by the IEC, but these needed to be updated in order to be used in the group's project.

    Dr. Ehrlich asked whether it was envisaged that TC 6 would be involved in this project. It had not been mentioned at the TC 6 meeting.

    Mr. Kool replied that the short answer was no, at least not directly. The content of R 87 and R 79 was not being discussed, and nor was TC 6's other current project, the development of criteria for certification systems. The standards and documents existed, and the project group was now going to produce training material which could be used by them or by others to inform people about how to implement these documents from TC 6.

    Dr. Ehrlich wished to confirm that the group's activity did not relate to the guide being produced in TC 6. The delivery had seemed a little vague but he thought he now had a better understanding of the matter.

    Mr. Mason added that this had obviously been a factual answer to the question about TC 6 being involved. He did however think it might be worth considering whether there was a role for the secretariat at least to be made aware of the work. One of the things that they had been aware of when they had decided to retain technical committees as well as project groups had been that there was a secretariat that had a continued interest in a particular subject area; he therefore invited the Bureau to comment on whether they would see any difficulties about at least setting up a line of communication to the TC 6 secretariat. He thought that South Africa should also be

    invited, as the holder of that secretariat, to comment on whether they would welcome or not such a line of communication. He thought that South Africa should comment before the Bureau did so.

    Mr. Carstens replied that he did not think TC 6 would have any objection to a line of communication. They had developed these documents and seeing the training material would possibly also assist. They might also be able to input training materials from South Africa, having been closely involved in the development. He did not see any problem.

    Mr. Kool said that he did not see any problem either. It was not a secret project.

    Mr. Mason expressed gratitude for these two responses. It seemed to him that it was consistent with the view that there were technical committees and a secretariat responsibility which went alongside individual project convenerships, that one of the things that a secretariat should expect to do was to be aware of things which were going on in the areas which they covered.

- number: '6.4'
  title: 'Modeling: Benefits of legal metrology'
  narrative: |2+

    Dr. Villiere said that OIML Members had been looking at the cost benefits of legal metrology, each in their own country. This was not always easy. A study had been commissioned by the CIML Members, and a report by John Birch in 2003 had given some insight. One of the standardization bodies in Australia had been looking at the economic benefits of standardization. However, there was nothing concrete, no modeling that would assist them in bringing them closer to the cost benefits. So Dr. Villiere had been looking at this issue for quite a few years, and looking at the cost of such a study, and she had not been particularly successful in Australia, so she had started looking elsewhere. She had discussed with the BIML whether there would be an opportunity to invest in such a study. They wanted to measure the impact of legal metrology standards, ultimately in order to inform their government, to have good arguments for developing new regulations and costing those regulations. Dr. Villiere had also engaged the chief economist of the Department of Industry in Australia. Of course he had become very interested - metrology was an interesting subject, so they had done a literature review on the economics of metrology in general. Dr. Villiere showed information which would be published on the Australian Department of Industry's website in two or three weeks' time.

    What had ultimately been found was that the economic benefits of measurement were

    - limiting market failure,

    - reduced transaction costs,

    - increased economic efficiency, and

    - supporting innovation.

    Looking at the literature, two key things had been found:

    - a 1% increase in the stock of standards on total factor productivity produced estimates that ranged from 0.1% to 0.17 %; and

    - a 1% increase in the stock of standards on labor productivity ranged from 0.05 % to 0.36 %, while the impact on GDP ranged from 0.17 % to 1 %.

    However, this was not something that could be used on a daily basis to try to convince anyone of the benefits of legal metrology. So the purpose of that study had been to undertake modelling, and Dr. Villiere had not found anyone interested in doing this until she had found some French students from the Ecole Nationale de la Statistique et de l'Administration Economique. These optimistic young people had been prepared to accept the challenge and look at any modeling. The cost of the study had been around €10 000. The students belonged to the commercial arm of the Ecole Nationale de la Statistique et de l'Administration Economique.

    The main content of the report was as below.

    Review of literature on standards, metrology, legal metrology, econometric models: it would not be a surprise to those present that there was not much to be found on legal metrology, so they had discussed several times what could be done when there is not enough information, and they had broadened the scope to standards and metrology in general. So the report consisted of 25-30 pages on the literature, and personally, Dr. Villiere found that the students had done a very good job in trying to capture the different concepts. She had also asked the students to look at macroeconomic and microeconomic benefits, again to be able to look at all aspects of the benefits.

    The challenging part then had been the modeling. To test the model, they had looked at some case studies based on Australia. They had looked at transaction costs, productivity increase, price increase and social welfare. They had taken some very complex formulae which could be used by sophisticated economists, and the report contained a formula which it might be possible to use. However, even with the formulae they had found, the students had not actually been able to find any model usable for legal metrology. This had been rather disappointing but not surprising. The only model they had been able to find was the model which Usuda and Henson, from the BIPM, had developed in 2012, so they had decided to run with this model.

    The case studies were for three products, wheat, coal and sugar, which were commodities also used in other countries, in two situations:

    - deviating from MPEs in a national situation; and

    - allowing larger MPEs in an export/import situation.

    On the whole, the data, which Dr. Villiere showed on the screen, demonstrated that a deviation of 0.1% or .05% in relation to coal could cost up to up to 1.2 million Australian dollars per year. Allowing larger MPEs in an export/import situation could cost up to 9 million Australian dollars for coal, so high values could result from apparently small errors.

    Dr. Villiere went on to say that obviously this was a report. Some work was still needed in order to test the validity of this report. The draft report would be made available to interested CIML Members and to the BIML. This would help them find out how they could push the model, and whether they could find experts from various countries to form some sort of working group in developing different models. This had been just a starting point, she told the meeting, in terms of looking at modeling of legal metrology benefits. These were the two points she would like to discuss with Members.

    Dr. Villiere thanked the BIML and the CIML President for allowing her to undertake this project; the two students, Caroline and Yasmine, who had not initially realized how little

    literature existed on legal metrology; and her own staff member, Darryl Hines, who had developed the data for the studies in the three industry sectors.

    Mr. Mason thanked Dr. Villiere. He pointed out that this was still work in progress, the ultimate objective of which was to provide material which would be persuasive, in particular in developing countries. There was still quite a lot of work to move from the current document into a form that would be usable, but it had been worth sharing it with the Committee.

    Dr. Miki thanked Dr. Villiere for using his colleagues' study. Dr. Villiere replied that she had not directed the students to that study but she had been delighted when they had found it. This had been one of the good tests to find that such a model had been developed.

    Dr. Miki thought that many types of models could be considered for development. He asked whether she was going to develop another model.

    Dr. Villiere replied that the challenge was that the students had done a big literature review and yet failed to find any model. She had tested this concept with a consulting firm in Australia when she was seeking a quote for NMI, and this firm had rejected the concept of a model, though they had been quite prepared to do a literature review or case studies. So they had not been very successful. This was why they were looking at getting experts from different countries, economists who would be happy to think outside the square and assist with future modeling despite knowing the limitations.

    Having thanked Dr. Villiere, Mr. Mason referred Members to item 9.2 on the agenda, about a proposal for clarifying the interpretation of procedures under the Convention, to be put to the next Conference. At the recent Presidential Council meeting, it had been concluded that there was a little more work to be done on this. That item was therefore to be withdrawn from the agenda.

- number: '7'
  title: Liaisons
