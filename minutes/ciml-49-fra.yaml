    Mr. Patoray said "good morning" in Maori, English and French.

    He apologized in advance that his presentation might sometimes become a little long as he would be going through the activities of the BIML, but he would try to keep things moving along. Taking account of some of Members' comments in the past, he had either had not enough detail, too much detail, or just about the right amount. So in many cases he must be doing something at least reasonably good, since he had received comments on both sides of the equation!

    ## Bureau Staff

    Mr. Patoray was pleased to announce that, regarding the staff, the pictures were the same ones as Members had seen the previous year; there had been no changes in the staff and all had pulled together when they needed to.

    During the previous morning's seminar, the three members of the Bureau's staff who formed the web team had been present in France until about 2:30 a.m., continuing to finish up some things that they had noted during the presentation, and also observing many of the emails that Members had been sending because they were registering individuals from their country or economy. So it had been a very interesting time and Mr. Patoray wanted to commend all of his staff for their excellent work. They continued to do that really without any question as far as the time it took, or the effort, and, as had been indicated by Mr. Mason, amid a bit of disruption, although most of the building work had been done at the lower level, so it had not been quite as disruptive as might have been indicated.

    ## Organization of the CIML meeting

    Concerning the organization of the CIML meeting itself, Mr. Patoray particularly wanted to identify Mrs. Saint-Germain, who had spent countless hours making arrangements, contacting Members and organizing the event both over the many months and also on site in Auckland. Mr. Patoray had been receiving emails from her at about 3 am on Saturday/Sunday as she prepared things, and she had been up late again the night before the current meeting. Mr. Patoray's phone was not turned off and buzzed all night, and he appreciated people who worked like this. Thanks to Mrs. Saint-Germain's continued contact with Members, almost 20 additional delegations or proxies had been gained during the week prior to the meeting.

    ## International relations

    The Bureau staff had travelled extensively over the last year. Mr. Kool had met with many different organizations; Mr. Dunmill, as indicated by Mr. Mason, had participated heavily in the recent AFRIMETS school; Mr. Mussio was currently focused on some very special projects. There was basically one expert for everything the Organization did

    which meant that priorities had to be established. There were times when things might not be done as rapidly as possible, but everything possible was done to meet the challenge.

    ## World Metrology Day

    The 2014 World Metrology Day had been a great success, and a record number of hits had been recorded on the WMD website. The posters had also been downloaded a large number of times. Growth was continuing in this area, which was very pleasing, and offered a good opportunity to work with the BIPM directly. This particular very successful poster had been developed in the Republic of Korea by KRISS. For 2015 the theme would be tied into many other international organizations, because it would be the Year of Light. Measurements and light had been chosen as the theme and AFRIMETS would develop the poster. Their contribution was appreciated and a successful 2015 World Metrology Day was expected.

    ## Directives for technical work

    There had been orderly implementation of OIML B 6. This continued and the topic would arise again later in the meeting, but the OIML was learning from it by its use. As indicated by Mr. Mason, there had been an excellent experience with R117 in TC 8/SC 3 and the co-conveners and the BIML had worked together to push very hard to get R117 ready. Mr. Patoray appreciated their efforts and also the fact that they had learned a little bit more about using B 6, and particularly proxies. Again, this would arise later in the meeting. However, some aspects of B 6 were not as flexible as Mr. Mason had suggested.

    ## Building renovation

    Renovation of the building was now complete. The front door had been rebuilt and reinstalled the previous week. A lot of repairs, painting and other cosmetic work had been needed because there had been saturation level humidity in the walls of the building. Moisture in the basement level had been almost 100% because there was what amounted to a "lake" beneath the building because of all the broken pipes. In addition to other problems, it had not been a healthy working environment. All that had been seen to and they were now waiting for the walls to dry out sufficiently to be painted.

    ## Website

    Mr. Patoray very much appreciated the enthusiastic response to the previous day's seminar, and even more the fact that many Members had actually used it after the seminar itself. Several emails had already been received. He would go into more detail later.

    ## Special project for countries and economies with emerging legal metrology systems

    The OIML had a special project for countries and economies with emerging legal metrology systems, about which Mr. Kool would expand later. From an impromptu meeting with the advisory group the previous day, and also during the RLMO meeting, there seemed to be a convergence of the various projects. It was hoped that some of the synergy from the website could be taken and built on to produce a better product for everyone. To date almost nothing had been spent out of the sum allocated from

    Members' funds - a small amount had been spent on some flash drives for the AFRIMETS school, so that everyone there would have all the documents available. There would also be expenditure for an expert report that was currently under consideration and which would focus on emerging legal metrology systems.

    ## Member States

    The return of Cameroon as a Member State was good news; they had paid up all their arrears. Other Members would be mentioned later.

    ## Work program and OIML Strategy

    The work program, which had been published on the site, and which the Bureau attempted to keep up to date, was basically a history of what the Bureau did, rather than a chart for the future.

    Mr. Mason had also mentioned a challenge for the future: Mr. Patoray would like to put forward a strategic plan based on the Strategy. The Strategy was an excellent document, but did not really give a plan for three to five years of major objectives and future action. The Strategy gave a picture of the scope of what could be done but did not give the actual activity or who was responsible, how long it would take and when results might be measurable. Mr. Patoray would like to see these objectives developed out of the Strategy and turned into the Bureau's work program.

    ## Travel

    Members had received a document which listed all the meetings and travel for the past year. Mr. Patoray himself had travelled much more extensively in the current year than in the previous one. Mr. Mason had also travelled much more in the current year, as had Mr. Mussio. Travel had therefore amounted to more in terms of expense, but Mr. Patoray still expected to be within budget limits, and travelling and meeting people had been a productive experience. He had recently attended an excellent conference on quality infrastructure in China and how it fitted within metrology, because sometimes there was a disconnect with structure, standards and metrology. Messrs. Mason and Patoray had both attended a meeting in Abu Dhabi, also several other meetings, and he was planning to attend the APLMF after the current meeting.

    Mr. Patoray asked for questions on this section of his presentation, but there were none. He reminded Members that acceptance of this report would be one of the resolutions for acceptance in the final session of the meeting.

- number: '5'
  title: 1 Approval of the 2013 accounts
  narrative: |2+

    Mr. Patoray said that this year he had included less detail than in previous years. The current auditor was Mr. Frederick Fischer, who had reviewed all the information Members had in their reports and documents. His report was satisfactory and all the requirements relating to IPSAS were met. Mr. Fischer had been auditing OIML accounts since 2010, when the company he worked for had been contracted. He had worked on the audit for 2009, and on completion of that he had re-done the audit from 2008, which had lacked some characteristics necessary for a true audit. He had come in every quarter to review the status of the accounts, and gave a provisional report every trimester. He had given guidance on better presentation and had helped to set up the 2013-2016 budget, which had been approved in 2012. Mr. Patoray appreciated the

    efforts of Mr. Fischer, and the process indicated that the OIML continued to be in a solid financial situation.

    Jumping to the "bottom line", Mr. Patoray showed a slide indicating that for 2013 the budget had been intended to have a positive result of €12000 but in reality the budget surplus had been $ \epsilon 4 6 \, 0 0 0 $ , considerably higher than anticipated.

    Total charges, Mr. Patoray commented, had been slightly higher than anticipated. Some of this had related to the need for scaffolding at the front and back of the building for almost a year during work on the roof and façade; this expense, he explained, could not be included in capital costs because it was a one-off expense which would not be incurred in future years' charges. Similarly, the charge for the architect could not be capitalized or depreciated and thus featured among the year's costs.

    Income was almost on target, and would increase in the coming year due to the change in classification of a number of Members.

    Mr. Patoray showed Members their net assets in picture form. These had been climbing since 2011 and continued to do so, largely due to the investment in the building, which had recently been revalued at €3.2 million, having increased by about $ \epsilon 3 5 0 \ 0 0 0 $ due to the renovations and a slight increase in Paris property prices. Depreciation costs had gone in to the account and come out as cash, and the cash had dropped a little in 2013, which was when most of the expenditure on the building work had taken place.

    Mr. Patoray showed a chart indicating a drop in the base contributory share in 2013 followed by stability until the end of the budgetary period in 2016.

    Referring to travel and charges, Mr. Patoray said that this was taken seriously in all Organizations. Members had to justify their attendance at meetings such as the CIML, and the Bureau took their travel costs equally seriously. They had been under budget since 2011, but he expected that 2014 would be pretty close to budget, due to the increase in travel recounted earlier. However, it was closely watched and controlled.

    Mr. Richard asked about employee benefits, referring to note 10 in the 2013 accounts document (Addendum 5.1), in which there was a table of acquired pension rights from 2006 to 2013. This number was continuously increasing and so he wondered what the projection for the future was. Would the number ever be stable, or would the value of the building increase in proportion?

    Mr. Patoray replied that the numbers given related to the actuary account done in 2010-2011. He had not felt it necessary to do another, but with the current pension changes and Mr. Dunmill moving from the OIML pension system into a private pension, it might now be appropriate. The numbers were increasing due to the effect of inflation on the rights of those people currently receiving pensions. Regarding stabilization or decrease, the reality was that the recipients were all getting older and no more contributions were coming in. Eventually the numbers would decrease but nobody would predict, or wish for this event. The increased value of the building certainly covered this liability. The numbers would eventually stabilize or drop, and also the inflation rate had not been as high as had been projected. Actuarial reviews were expensive and had not seemed an immediate priority, but one would be undertaken. Another question was whether it was necessary to continue to put a provision for pensions in the budget.

    On the subject of chapter 3 "Execution of the budget", Mr. Van Mullem asked for an explanation of the administrative costs, which had almost doubled compared to the budget [Note 16 on page 46 of 53 in the document].

    Mr. Patoray replied that he could provide a complete breakdown of these costs. Most of the charges were one-time matters, for example the scaffolding, the architect's fee, payment to the ILO for the lawsuit which had been part of the system. He would supply detail later.

    Mr. Van Mullem also pointed out that the income from certificates had dropped compared with 2012 and 2013, and asked for an explanation of this.

    Mr. Patoray replied that this was because 100 certificates had not been forwarded to the BIML for a period of time. The Bureau had therefore temporarily not been able to issue invoices and receive the revenue for the certificates in question. In fact the amount had dropped in one year but had risen by a corresponding amount in the next. There had therefore been no change in the number of certificates overall.

    Mr. Van Mulem further asked about the $ \epsilon76000 $ entered in the accounts as "other income", which appeared in the results but not in the budget.

    Mr. Patoray explained that this related to the re-accounting from the past relating to the resolution about clarification of three years of arrears. Many past accounts had had eight or so years of arrears in the accounts. It had been necessary to account for the adjustment, which arose from the habit, in the past, of continuing to invoice Members after the three-year limit had passed. These had been entered in past accounts as bad debts and had had to be taken out, so it looked like income because the offset had to be shown. This was a one-time and very unusual effect and would not reappear.

    Mr. Patoray pointed out a translation error in one of the tables: The French word "Logiciel" had been wrongly translated as "Buildings" instead of "Software". This had been carefully checked with the auditor.

- number: '6'
  title: 1 BIML activities in liaison with other international organizations
  narrative: |2+

    Mr. Dunmill told Members that he would speak mainly about the Bureau's contribution to activities in favor of developing countries.

    The main event of the year had been the OIML's involvement in the AFRIMETS Legal Metrology School. Members might remember that in 2013 Mr. Dunmill had mentioned the intention to operate this school as a follow up to one which had been organized by UNIDO in 2011 in Nairobi, Kenya. UNIDO had finally managed, very much at the last minute, to acquire the necessary funding to hold this school. At the 2011 school there had been staff employed specifically to help to organize and run the school, and a lot of local support. The recent school, however, had basically been put together very quickly by a steering committee between UNIDO, the OIML, the PTB and another organization called ACPEUTBT. This was an organization based in Brussels. ACP stood for Africa, Caribbean and Pacific. It was a group of countries which were seen to have common needs. The EU part meant that the funding came from an EU development project directed at those countries. The TBT part was because the whole purpose of their funding was to help in the reduction of technical barriers to trade. The school had been programmed to take place in October 2014, in Tunisia.

    Mr. Mason had already mentioned his participation in it, shortly before the current meeting. The OIML had been the main partner with UNIDO this time, since the event concerned specifically legal metrology. They had been involved to some extent in the 2011 school to talk about legal metrology, but the focus on that occasion had been distinctly on scientific and industrial metrology.

    Mr. Dunmill explained that almost all the participants had been funded by ACPEUTBT. The fund provided various kinds of quality infrastructure support to countries from Africa, the Caribbean and the Pacific. Legal metrology had been something quite new to them. Two ACPEUTBT representatives had attended the 2013 AFRIMETS General Assembly and found out a lot about metrology as a whole and they had been very keen to provide funding for participants, so virtually all the funding for participants' travel, accommodation, etc. had come from this organization. UNIDO had contributed funds for certain African countries not covered by the ACP program. This money had come from the Norwegian aid program, NORAD, and much of the participation of presenters in particular had been covered by the PTB.

    The steering group had consisted of UNIDO, the OIML, the PTB, ACPEUTBT, the AFRIMETS secretariat and ANM, the Tunisian metrology body. At the school itself, the OIML had been represented by Messrs. Mason and Dunmill. The 10-day course had covered quite a wide range of aspects, including

    - legislation infrastructure,

    - the role of conformity assessment in metrology,

    - an introduction to the concept of uncertainty,

    - the training of personnel, and

    - quality systems in general.

    Additionally there had been two main groups: one covered mass and had done some training on weights, non-automatic weighing instruments and a very limited session on automatic weighing instruments; this had been aimed at the verification of these instruments. Most of the countries involved did not have the facilities or even the need to do full type approval testing. Most of them had no manufacturers, so the main concept had been aimed at how to verify the instruments. The other group had been split into two parts, one dealing with mass and the other with verification of mainly volume on liquid fuel dispensers and water meters. Both groups had also done some work on prepackaged goods because this was of increasing importance to developing countries.

    Over 100 people had applied and 86 participants had attended the school, Mr. Dunmill continued. This generally represented two per country, which was the number the ACP program had agreed to pay for. Some countries had proposed more people and had been told that they could have two fully funded and others if they wished to pay for them, so a few countries had sent additional participants at their own cost. 37 African countries had been represented, 2/3 of all African countries, which was very good considering the economic situation in some of them. There had also been two participants from Haiti, thanks to ACP support also covering this area. Mr. Dunmill showed a map of the coverage, and some photos of participants.

    The course content had been a fairly complicated program of plenary lectures, at the beginning and the end of the course, where there had been translation into English and French because of the number of both Anglophone and Francophone countries in Africa. The more technical content, in the middle of the course, had included courses in mass, volume and prepackaging, for which there had been separate English and French speaking sessions. The content had been roughly the same, though not identical, between the groups.

    Mr. Dunmill showed a photograph of Mr. Mason at the beginning of the course delivering his lecture on legislative aspects of legal metrology, and some of the smaller groups, in one of which some members might recognize Mr. Brian Beard, who had been the CIML Member for South Africa for a number of years. He had dealt with one of the mass verification courses, and Mr. Jaco Marneweck, also from South Africa. An attempt had been made on this occasion to invite as many as possible of the lecturers from the African region. This was because one of the complaints about the 2011 course had been that a lot of very high level people had been brought in to do the scientific metrology lecturing, and although they were obviously very knowledgeable, people had said that it would have been nice to show that Africa had some expertise as well.

    As well as lectures, participants had also had some hands-on experience of how to do work on verification of weighing instruments and petrol pumps, and had made some industrial visits to available companies, in one case a manufacturer of gauges for testing petrol pumps, so they had learnt a lot about what to look at when constructing such instruments. They had also visited a manufacturer of electronic scales of all kinds, and weighbridges, so they had seen a little about how weighbridge testing was conducted, and what was important in that. Obviously, to conduct the full verification of a weighbridge would have taken too long, but at least participants had got an overview of the kind of things that had to be taken into account.

    The students themselves had been very good, almost all had participated well in the course, which was always something of an unknown. With 86 people, one never knew whether any of them were going to say anything or whether they would just sit and listen, but almost all of these participants had been keen to learn and participate in the course.

    Participants had also had to undertake project work in small groups, and to work in the evenings and at the weekend. The project had covered aspects of either verification or prepackages, and each of the small groups had had a slightly different topic, based on the visits they had done and the training they had received during the course, and they could be found working up to 11.30 pm. On the last day of the course all the participants had presented their work and been questioned and criticized, advised and congratulated by the other participants according to what they had said. They had all seemed very satisfied with the course in general, apart from the fact that it was a 10-day course and there had been so much information in a short time, a criticism shared by some of the presenters. For example, a mass verification course was normally conducted over a much longer time than had been allotted for this entire course. Surveys filled in by the participants had shown overall satisfaction. There were many detailed comments which Mr. Dunmill had not yet had time to examine, but they would be examined and used as the basis for improving any future courses of this type. There had also been video interviews about people's experiences, from which UNIDO would put together a short promotional video showing this kind of event and how it worked, as an idea to spread the use of this kind of course throughout different regions. After the 2011 metrology school a very nice booklet had been produced, giving its outcome, explaining who had been there, who the presenters had been, what kind of courses had been presented, the benefits of the course and so on, and this had acted as a good publication for raising awareness about metrology training, so the same kind of thing would be done this time.

    During the course there had been some countries present which, as Members might have noticed from the map earlier, were not OIML Members, and some of these had talked to Mr. Dunmill about how to become OIML Member States, or at least Corresponding Members, and he had also had a chance to talk to some countries which had previously been Members but had debts that needed to be paid. Having participated in the course, they might now be taking more interest in legal metrology and keen to rejoin. Of course the people who had been present were not necessarily those who were in a position to make such decisions, because it had been aimed more at younger technicians, but at least they could take the message back to their country and follow it up later.

    Mr. Dunmill said that this had been the main thrust of the year's work, and invited questions.

    Mr. O'Brien asked whether the training materials developed for the course were available online anywhere. The Asia Pacific metrology forum would be looking at doing some courses over the next couple of years so it would be beneficial to look at some of the resources that had been used and pick out the best bits for them.

    Mr. Dunmill replied that they were not yet online because the course was so recent, and they had not yet had any follow up discussions with UNIDO, but he would certainly look into whether they could be made available on either the OIML or the UNIDO website. UNIDO had an e-learning section where they might host such material, or otherwise, being very specific, it could be done through the OIML website.

- number: '7'
  title: 1 Report on the cooperation with the BIPM
  narrative: |2+

    Dr. Richard explained that Dr. Martin Milton (BIPM Director) had asked him to make this presentation because the General Conference on Weights and Measures (CGPM) would take place in less than two weeks and all the BIPM staff were busy preparing it. He intended to speak briefly about the current situation with the revision of the International System of units (SI), say some words about the main topics in the imminent General Conference, give Members an update on the present situation on Members and Associates of the Metre Convention, and finally summarize three other items.

    Starting with the revision of the SI, Dr. Richard showed a slide of the road map he had prepared about two years previously for the Consultative Committee for Mass and Related Quantities (CCM]. On it delegates could see on the left the year 2013 and on the right 2018, which was the possible date for the change from the present system. In the middle could be seen all the necessary steps which had been defined in order to reach the conditions fixed by the CCM in order to be sure that, mainly for the kilogram, there was no discontinuity between the present and future definitions.

    One of these important steps was traceability to the IPK, the international prototype of the kilogram. Dr. Richard showed Members a very recent result concerning the recent extraordinary calibration using the IPK and the six official copies at the BIPM. Members might know that the IPK had been used three times in history, the first in 1899, the second in 1946 and the third, for the third official periodic verification, in the 1990s. In the current year, it had been taken out of the safe again to provide traceability to the NMIs having experiments for the primary realization of the kilogram (like the Avogadro and the watt balance experiments), in order to be totally ready for the redefinition. Usually the graph presented only the evolution of mass of the six official copies with time, and during the second and the third periodic verifications all the copies had increased their mass related to the IPK. For the first time in history, the mass of the national copies had not changed any more with respect to the IPK. This was a very good situation. Starting from this, it would soon be possible to provide new traceability to the countries which were able to publish new values of the Planck constant.

    Dr. Richard showed the most recent published values for the Planck constant, which would be used as the constant to redefine the kilogram. The most recent values showed at present a very good agreement, but if the total set of data was considered, including past values, the agreement was not yet sufficient. If the kilogram definition was changed based on the most recent value of the Planck constant, there would also be some change for the electricity unit. In fact, if the Planck constant was fixed to the best known actual value, there would be an offset to the Von Klitzing constant at a level of about $ 1 \times1 0^{-7} $ The electricity specialists would have to explain this offset; if it was to be possible to maintain continuity in the mass unit, this would not be possible for the electrical units, and this would need a lot of explanation to the outside world.

    For the unit of temperature, there was a lot of ongoing work in this field to determine the Boltzmann constant. This was a very active area; recently there had been many new publications on the determination of this, and they were now very close to reaching the limits fixed by the Consultative Committee for Thermometry.

    Dr. Richard told Members that this was all he had to say at the moment on the revision of the SI, though the subject would of course be further discussed at the General Conference in about two weeks' time.

    Continuing about the CGPM he said that it was similar to the OIML International Conference on Legal Metrology; it usually took place every four years, and the next one was planned to be held from 18-20 November. It was of course, like the OIML Conference, a meeting of all the delegates from the Member states and observers from the Associate Members. Five main resolutions would be addressed:

    1 the future revision of the International System of Units;

    2 the totally new process for the election of the International Committee for Weights and Measures. This was almost like the CIML, but much smaller, with only 18 members, who from the current year would be elected by the CGPM;

    3 the pension and provident fund of the BIPM;

    4 the BIPM dotation for 2016-2019, similar to the setting of the budget at the OIML Conference;

    5 the importance of the CIPM Mutual Recognition Arrangement (CIPM MRA). This was the arrangement for international recognition of calibration and measurement capabilities and calibration certificates.

    The BIPM had therefore prepared a lot of very important documents in order to describe the content of the budget. This was mainly based on the BIPM work program, and many other documents. The financial statement for the previous year was one important subject, and they had also published a long term strategy, a detailed work program for the period 2016-2019, and they were also developing a new program called the BIPM Visitor program.

    Dr. Richard explained that the BIPM Visitor program was an additional program, proposed for the first time by the BIPM. The aim was to support an exchange of staff with the BIPM to provide opportunities for staff of the national metrology institutes in the member states, especially those with emerging metrology infrastructures, to visit the BIPM for 2,3 or more months, to attend specific seminars and also to attend training on specific subjects. This would be implemented in collaboration with the regional metrology organizations, and was in addition to the opportunities for visiting scientists which already existed at the BIPM and which were very well used. The starting of this program would of course depend on the proposed dotation, which would be decided at the CGPM.

    The Visitor Program would help the world-wide metrology infrastructure and countries would benefit from access to an enlarged pool of scientists and technical staff, to be trained and to know more about the metrology at the BIPM, and the work program would also provide money to support these staff, in order to share the costs with the NMIs. The main objective was to support those countries with developing metrology infrastructures in order to have trained people and benefit from the experience of the BIPM staff. The idea was to ask the regions to help to select the best candidates to attend the program. Members and Associate Members of the Metre Convention would profit from this program and it was hoped that Associate members would be encouraged to join as Member States.

    The other important issue at the CGPM was the process of election of the CIPM, or International Committee for Weights and Measures (CIPM). This would be totally new in the current year. There had been no real elections since the establishment of the Metre Convention, and now there would be a real and transparent election at the upcoming CGPM. 18 members of the CIPM would be elected; some of the past members would be available for re-election but there would also be new members. All documents, CVs, résumés, etc. had been presented to the CIPM and also to a special ad hoc working group which had been created for this re-election process.

    Of course, there would not only be these 18 candidates, there would also be additional candidates in order to provide the CGPM with a choice. The present members of the CIPM would hand over to the new, elected members for the next meeting, which would take place in March 2015.

    Coming briefly to present Members and Associates, Dr. Richard said that the BIPM had 56 Member States; there had been a new one in the current year, and also three new Associates, so both these numbers were still increasing.

    Dr. Richard showed a map of CIPM MRA participation, covering a very wide part of the world.

    Coming to his last three subjects, Dr. Richard showed the program for World Metrology Day 2014, which had already been mentioned, and reminded members that the subject for 2015 would be Measurements and Light, which would complement the United

    Nations Year of Light 2015. Dr. Richard drew attention to the establishment a few weeks previously of a new website on the subject for the BIPM. The home page described the Metre Convention and its general activities.

    Dr. Richard's second chosen page showed the BIPM MRA agreement, with the most important documents available. Delegates would also notice, in the presentation but also on the website, that since the creation of the website the BIPM also had a new logo, in French, Bureau International des Poids et Mesures.

    His third example gave information about the regions, for instance the Asia Pacific region, with the Members, their status and different information on the region.

    Finally, Dr. Richard gave information on the most important meetings for 2015: in March there would be the constitutive meeting of the new CIPM; some workshops were planned for 2015, one on the new Guide to the expression of uncertainty, which would be in June or July, and a second on carbon metrology (Global to Urban Scale Carbon Measurements). In October there would also be the NMI directors' meeting, and finally, many of the consultative committees would also be meeting in 2015.

    This, Dr. Richard said, completed the presentation prepared by the Director of the BIPM, Martin Milton. He might be able to answer some questions, but anything more detailed should be put directly to Mr. Milton.

    Dr. Klenovský said that he would not be present in the current year at the CGPM, but he had a question about the fact that there were eighteen places and a slate of eighteen candidates. This seemed quite strange to him.

    Dr. Richard explained that the total number of candidates fulfilling all the conditions according to the new election process was 23. The present CIPM and a special ad hoc group (which included at least two CIML Members currently present] had commented on the list proposed by the CIPM and made some changes, and this was now a joint ad hoc group/CIPM list. However, some of the additional members would still be available for re-election if the CGPM decided not to elect the list of 18, but to change some of the names.

    Mrs. Lagauterie said that any previous members whose names were not on the list did not wish to present themselves for re-election. Five candidates whose names were not on the slate would be available if the Member States wished to replace a name on the slate with one of the additional ones.

    Dr. Miki said that he was a member of the ad hoc committee, and that the 18 members were those recommended by the group, but this was just a recommendation. Members were free to vote for other candidates.

    Mr. Mason referred to the carbon metrology workshop in June or July, mentioned in the presentation, and asked Dr. Richard if he could say a little more about who was expected to participate in this, and in particular whether it was likely that issues concerning regulation would be touched on, as these would clearly be of interest to OIML Members.

    Dr. Richard regretted that he did not know much more about the workshop, but invitations to participate in BIPM workshops were usually sent to NMI Directors, and each country could send one or two representatives. He thought it would be more on the measurement side than on the regulatory side, from the Department of Chemistry at the BIPM.

    Mr. Mason added that talks were continuing with the BIPM about the right time to introduce OIML expertize into these discussions and that this would take place over the coming months. What Dr. Richard had said confirmed that there had not been a decision on this but that there was a dialogue.

    Mr. Birch said that there was concern that quite a few of the measurements being done for climate change were not fit for purpose, partly because the instruments themselves were not fit for purpose, not having been properly approved, and also because they were quite often not being used in a way which provided consistent measurements. Quite often there were problems with placement of the instruments and the people doing the measurements. These were all areas to which legal metrology would have something to contribute, if in fact this sort of area was going to be covered.

    Mr. Mason thanked Mr. Birch for his comments and confirmed that that was one of the main reasons why the OIML was maintaining an interest in this work and how it was being approached.

    Dr. Ehrlich informed the meeting that he and, he thought, Mr. Mussio were planning to attend the workshop on uncertainty in measurement. The intention, by WG1 of the JCGM, was to circulate a draft of the revised GUM by the end of the current year, so that it would be available for comment, and would be discussed at that workshop.

    Mr. Mason thanked Dr. Richard for his very clear presentation and said that it demonstrated once again how the practicalities of reporting on the activities of the OIML and the BIPM could be dealt with in an imaginative and efficient way.

- number: '8'
  title: '1 Implementation of the revised B 6: Directives for OIML technical work'
  narrative: |2+

    Mr. Mason reminded the Committee that the decision had been taken the previous year not to work on a revision of B 6 for two or three years. That policy had been maintained for the last twelve months and would be continued for a further twelve, and a decision

    would be taken in 2015 as to whether the pause turned out to be two years or three. However, this meant that there was an opportunity to look at the way that B 6 had been operating in a fairly stable environment.

    Mr. Dunmill said that, as had been heard from previous speakers, the projects worked on in the preceding year had been following the procedures of B 6 quite well. He had reported the previous year on how the technical committees and the projects that were running had been translated into the new system. So what had been done during the current year had been to try to look at the full list of OIML projects to see what was still operational, what was not operational, what people were participating in, and so on.

    Members would recall that with the new Directives there was the possibility to participate in each project under a technical committee or subcommittee individually. This had consequently meant that there was much less participation in some projects than in others. Mr. Dunmill had circulated a document giving updated information on all the project groups. This was very similar information to that which had been discussed at the Presidential Council in March 2014, during which there had been a technical review of all the projects to discuss any problems with inactivity in projects, or lack of resources available for certain projects which were deemed to be very important.

    The current situation, Mr. Dunmill informed delegates, was that 72 projects were currently operating, but there were problems with some of these. B6 had a requirement that there should be six P-members, from at least two regions of the world, otherwise a project was not deemed to be of sufficient international interest to make it worth working on. Nine projects currently had fewer than the six P-members required, and eleven project groups had no convener. This usually happened where an old subcommittee had several projects under it, and a country was responsible for the secretariat of that subcommittee but perhaps not really interested in all of the projects. Following the split into individual project groups, they had wanted to relinquish responsibility for particular projects. Also, priorities had changed in many countries since the projects had been started. In some cases it was difficult to ascertain when the projects had started, because of the way in which decisions to start projects had been recorded in the CIML minutes and resolutions. Although a lot of research had been done in the current year, it often remained unclear when some projects had come into being.

    For six project groups, also, there were no progress reports. Each year Mr. Dunmill had distributed an enquiry to the conveners asking for updates on the progress made in the previous year based on what they had promised to accomplish, and also their projections for their workload for the coming year. Six of the project groups had not supplied this information, either because there was an e-mail problem or because they were not doing anything, he could not tell. This did not quite correspond with the information which delegates had received in the last minute document because a few updates had been made since those figures had been put together.

    This indicated a reasonably low interest internationally in the subject at the moment, regardless of the fact that it had presumably aroused some previous interest in order to set up the project.

    Mr. Dunmill showed the list of current project groups with fewer than six P-members. Some of these were revisions of existing Recommendations and Documents, and some were for the development of new ones. It could be seen that a couple of groups had only two P-members, and, bearing in mind that those two included the country holding the convenership, this did not indicate much interest.

    Mr. Dunmill then showed the project groups which had no convener. This meant that although there may be a reasonable number of P-members, no country was willing to offer the resources to act as convener. Again, if the required level of interest could not be produced, then it did not seem worthwhile to continue with the project. The groups in red at the bottom, he said, were in both categories, in that they had no convener and fewer than six P-members. So they were apparently doubly uninteresting to the membership of the OIML at the moment. Delegates would notice that all of these showed a country which had previously held the secretariat of the old subcommittee, and had therefore inherited the role of convener under the new project group arrangement, but these countries had indicated that they did not want to run these particular projects. An enquiry had been conducted amongst the P-members to see whether other people were interested, but this not been successful.

    There were therefore, Mr. Dunmill pointed out, a few points to consider in whether to disband these groups or not. In all of them, there had been little activity. And during the time it had taken to implement B 6, which had been over the last couple of years at least, nothing had happened in any of the groups. It was even more difficult to trace what activity there had been previously, especially in groups without a convener. It was not disastrous if one of these projects was stopped, in that a new project could easily be started at any time if the subject became of interest internationally, so stopping these subjects did not mean that the OIML would never work on them again, merely that at the moment there seemed to be such a low level of interest that it was not worth keeping the project on the OIML list. One of the problems was that there might be a large list of projects which looked good from the outside, but there was little point in having a large list if the work was not being done. The proposal was therefore to try to reduce the list of projects to those on which work was actually being done.

    Of course, Mr. Dunmill told delegates, it was necessary to decide what happened with any of the existing Recommendations. Some of the projects were for revisions of existing Recommendations, so the first question was whether they were really being used, and, if so, why people were not interested in revising them. Should they be reconfirmed in their existing state or should they be withdrawn, if there was little interest in revising them? They could become part of the normal review process which the BIML was now responsible for operating, so each could be looked at again by conducting an enquiry amongst all CIML Members to see whether they thought these Recommendations were needed or not.

    Mr. Dunmill showed the list of those project groups which had provided no progress report at the beginning of the current year. Since the information which Members had received, only a couple more reports had been received and he indicated the groups which had still not provided reports. Some of those were also on the low participation list.

    A few odd cases had come to light, Mr. Dunmill told delegates. The convener of a project group working on a new Recommendation for ophthalmic instruments under the convenership of Germany had contacted the BIML because they had received a very poor voting response on the last CD which they had distributed. They felt that they had gone as far as was possible with the technical development of this Recommendation and were therefore asking, in line with B6, to put it through the preliminary ballot procedure. The problem was that this was one of the groups which had too few P-members. The BIML had the draft, which appeared to be in a reasonable state, but the

    German convener was having difficulty in obtaining a response from their five P-members. However, since the work had been done, the proposal was that it should be put to a preliminary ballot in the normal way in accordance with B 6, which allowed the situation where the convener felt that no further progress could be made. The most reasonable line of conduct seemed to be to go through the final approval process and then revisit the question in five years' time when this Recommendation would next be due for revision.

    Two other projects had fallen through the gaps in the implementation process:

    - the first had been omitted from the original report because at the time when the implementation had been done, there was no secretariat of the parent subcommittee TC 18/SC 2. This project had therefore not shown up in the database listing of projects requiring attention. It currently had a committee draft produced by the previous secretariat but this could not be put on the list for approval of its withdrawal, because there had not been enough notice, as it had not appeared in any of the papers sent out three months previously. It was therefore proposed that the withdrawal of this project should be considered by an online ballot;

    - another project in the same subcommittee had involved exactly the same problem of falling through the gaps of the implementation process. Nothing had yet been developed, though the project had existed for a number of years. Mr. Dunmill proposed that withdrawal of this project should also be considered by an online ballot.

    Linked to the question of projects and the work done within them, the existing Recommendations and Documents had also been analyzed, and delegates had received a document giving the complete status of all current Recommendations, including the metrological procedures, test requirements and test report formats, which were now published as Part 1, Part 2 and Part 3 of the same Recommendation.

    There were at present 103 current Recommendations and 27 OIML Documents. The proportion of Documents and Recommendations was exactly the same:

    - about 44 % were under revision, under the responsibility of a project group, and were currently being revised;

    - 37%-38 % were out of date and not under revision; and

    - about 18 % had been published or reconfirmed as not being in need of revision within the last five years.

    Mr. Dunmill showed an illustrative graph. He told delegates that within the following year the BIML would try to start the review process for as many as possible of the Recommendations and Documents which were not already under revision. Obviously not all of them could be undertaken in a year, as resources had to be found and the five year cycle would be affected. Priority would be given to anything which was in the Certificate System or in the MAA. CECIP had earlier commented about R 60 being old; this was already an ongoing project but they would be looking at anything else which was in the Certificate System to ensure that these had priority in revision. Over the coming years they would work through improving this revision cycle of OIML Recommendations, something which in the past had not been very strictly adhered to. If the OIML was to be seen to be producing relevant publications, then the revision process needed to be done on as regular a basis as possible. Even five years was quite a

    long time in technology terms, so the speed of the revision needed to be improved as well.

    Summarizing, Mr. Dunmill said that the BIML was proposing that the list of projects for which there were currently not enough P-members or no convener should be withdrawn. Before considering this further, he asked whether there were any questions about the projects on the list, or the process.

    Mr. Mason thanked Mr. Dunmill for his presentation. He referred to Mr. Dunmill's statement that a project which was cancelled could be revived again if there appeared to be a need at a later date. He asked first whether it was possible to do this without obtaining formal CIML approval for the new project, as would be done in the case of a normal new project.

    Mr. Dunmill replied that he meant that CIML approval would still be needed, and the project would be set up by the normal procedure and would still require the justification and rationale, together with some proof that the Recommendation was needed. B 6 now required that the rationale clearly stated those countries which had legislation in a particular area or intended to put it in place, so there would not be any accelerated procedure in reviving a cancelled project, but it would be a much clearer indication of the need for that project to exist. There was no problem in putting a repeat project into place, but it would have to meet the current rules on how to establish a project.

    Mr. Mason thanked Mr. Dunmill for this clarification and said he had noticed that in two cases there was an absence of convenership because there was an absence of secretariat, both in TC 18/SC 2. He asked whether this secretariat was now in place and whether this was a case where there was a secretariat but which was not keen to take on convenerships of these projects, or whether there was still a vacancy for that secretariat.

    Mr. Dunmill replied that there was still a vacancy for the secretariat, and in fact the situation with too few P-members also applied to some other TCs or SCs. In the current year the BIML had concentrated only on looking at what work was being done in the projects, but there were several other committees where there were fewer than six P-members, though TC 18/SC 2 was the only secretariat which was currently vacant.

    Mr. Mason said that he had found this helpful, because one of the things that he thought the CIML needed to consider and recognize was that the vast majority of these projects were in fields outside what could be called traditional legal metrology relating to trade and in the field of health and safety or environmental considerations. Of course the OIML had always felt that there was a need to have capability in these areas, so they had a choice of having some sort of debate about the role of the OIML in these areas, which was one way of approaching it, or the alternative was to approach it on a project by project basis. As he understood it, decisions could be taken on a project by project basis in the current year, giving the opportunity to raise the broader, philosophical question about the range of OIML activities the following year, when a start would be made on looking in detail at whether the subcommittees themselves had enough support.

    Mr. Dunmill concurred that this was correct. The BIML had felt that they would be in a clearer situation to report on what work the OIML was actually doing if in the current year they could clear out the projects which were not being worked on and where there was little interest, and then the following year look more closely at the range of

    subcommittees, etc. He agreed that there was a need for ongoing discussion of the expanding scope of legal metrology, not just covering the traditional weights and measures areas. When the number of participants was looked at, it was very clear that there was much less interest in many of these non-traditional areas. There needed to be a philosophical discussion but the BIML had felt that it was clearer to concentrate on practical matters in the current year and the more philosophical matters in the future.

    Mr. Mason asked for the first round of comments to be of a general rather than a project-specific nature, on the general approach to be taken. The project list would then be gone through item by item as a second agenda item, in order to establish whether there was interest in the room which could be translated into additional P-members or a convenership, or which would allow that project to be taken off the list.

    Dr. Ehrlich asked whether the information on the new website concerning the status of the projects could be changed by Members directly and more frequently rather than sent to the BIML to be done in the Bureau.

    Mr. Dunmill replied that this was being done by the Bureau at the moment because the interface through which it was done was not yet ready to be released to everyone, but access to the website was all based on access rights management; there was nothing to prevent it being opened to conveners to update, and the intention was to make this available in the future. Updating could then also be done much more immediately and frequently than the present once a year, to announce or report on a meeting, for example, give comments on what happened in it, etc.

    Dr. Ehrlich thanked Mr. Dunmill for his clarification and said that this facility would be appreciated.

    Mr. Birch mentioned that the APLMF had a very active medical measurements working group which had been in operation for some fifteen years and was convened by an OIML Corresponding Member. This issue had been identified in a survey of priorities for the area done by Knut Birkeland in about 1998; the group had been quite active on the issue of clinical thermometers. He said that he would take this matter to the APLMF meeting the following week in Wellington and acquire some feedback on those issues.

    Mr. Mason said that this would be helpful, although there was a need to remember the rule that not only did a certain number of P-members need to be involved, but also those P-members needed to originate from more than one region, on the grounds that what the OIML did should be of international rather than merely regional significance. He was not sure how this offer could be reflected in the decisions the Committee was being invited to make at the present time.

    Mr. Dunmill commented that the two projects concerning thermometers were among those he was proposing for CIML ballot.

    On the subject of clinical thermometers, Dr. Klenovský said that mercury thermometers were banned from use in Europe by regulation but on the other hand many electronic instruments were being used that had problems. Logically, at this stage, the OIML should have a project to regulate electronic thermometers, otherwise the OIML would, as he put it, "miss the train".

    Mr. Van Mullem asked about the large table Mr. Dunmill had compiled. This was the first time delegates had seen information of this sort and he thought it was good to have it. Mr. Dunmill had also said that the following year he would try to investigate the projects

    which were out of date. He asked whether this took into account the progress on the several projects which were under revision. A project could be said to be under revision, yet little or no progress be made on it. This should also be taken into account.

    Mr. Mason replied that he thought the intention was that these were questions that would be pursued more vigorously and throughout the year rather than just taken to the CIML for a decision once a year. So, recalling discussions at the Presidential Council, they had been very much intending to identify important projects which certainly had enough support for the work to be undertaken, but which were not making very good progress. He saw it as the role of the Presidential Council to push for more progress rather than to take the option of deleting a project which might be very important but was proceeding too slowly.

    Mr. Dunmill agreed, adding that one of the objectives of cleaning up what appeared to be inactive in the current year was so that at the Presidential Council meeting, instead of considering a large list where a large number of projects were not making progress, there would be a clearer, shorter list of what the organization was actually doing, so that those which were not being worked on could be looked at. A second point was that in the full table there was a list of all the out of date Recommendations. This might, however, not be quite as simple as it looked, as in the past, the re-confirmation had not been well recorded in the minutes. Further than a few years back, it began to become extremely difficult to tell when things were actually re-confirmed. There might be Recommendations which said they were from 1980, but which had in fact been reconfirmed more recently. At the present moment it had not been possible to find the proof of that. Again, this was part of the review process; this first time would be more complicated because it would be necessary to chase up those who had been responsible in the past and find out what had really happened as far as re-confirmation was concerned. More recently, the meeting resolutions had been much more clearly recorded in the minutes, and clearly stated a list of those Recommendations which had been reconfirmed in the year in question.

    Mr. Mason asked for clarification on whether re-confirmation was a decision taken by the CIML under the new arrangements.

    Mr. Dunmill replied that this was the case, the CIML now decided on all aspects of the publications: project, publication and re-confirmation.

    Dr. Ehrlich commented that in the table which included the status of secretariats and conveners, a fairly large number said "none, previously US". He wished to point out that this did not necessarily mean that the US did not have interest, but rather that they had had to look at their resources and decide what they could and could not do. They had been hoping, and still hoped that this would encourage others to take over these projects. If certain project groups were disbanded, the CIML would have to go through all the work as a whole new process to re-institute them later. Some of the projects had 17 or even 24 P-members, so hopefully somebody could take over the work.

    Mr. Mason added that his thinking behind looking at these projects on a case by case basis was that it would give the opportunity for anyone in the room to say, "Oh, actually this is important, if nobody else will be the convener, then I want to be the convener". He hoped, from what Dr. Ehrlich had said, that the USA would like to step forward in one or two instances. The process, he mused, would be like a game of "chicken", where everybody hoped that somebody else would come forward first.

    Dr. Ehrlich said that the USA simply did not have the resources. In one or two cases the BIML had held the role. Dr. Ehrlich had simply not wished it to be thought that the USA considered these projects to be unimportant.

    Mr. Dunmill regretted not having mentioned earlier that the USA and Germany had been responsible for these projects while they were part of the work under a subcommittee; in both cases it was a lack of resources to operate these projects in a reasonable time scale, and not a lack of interest. Again, what was being said was that if the projects could not be undertaken at once, they could be put aside until an opportunity should arise. There was also the point alluded to by Dr. Ehrlich about the number of P-members. He had not shown this on the slide, but he had colored the groups where there was very low interest. Some of the others did indeed have 17 P-members; it was just that nobody appeared to be willing to run them.

    Dr. Ehrlich further clarified that if the projects were closed, the documents would presumably still be kept on the books. He asked whether the intention was to abolish subcommittees.

    Mr. Dunmill replied that at the moment all that was being done was to look at the project groups in order to clear up what work the Organization was or was not actually doing. There was no proposal to alter the TC/SC structure at the moment, though, as Mr. Mason had said, it was part of a larger philosophical discussion as to what the OIML should be involved in.

    Mr. Mason added that it was not clear to him whether this discussion should take place in 2015 or 2016, but he thought that at some stage the question had to be asked as to whether, if a subcommittee had no active work on any projects, and, in particular, if that subcommittee was itself failing to attract enough P-members, that subcommittee ought to be disbanded. He thought that the Presidential Council ought to consider at its March meeting whether 2015 was the right time to be discussing that or whether a little more time should be given to it.

    Mr. Dunmill added that as well as medical instruments, which was agreed to be quite an important area, involving many consumers, but which seemed to attract little interest, another area where there was a problem was radioactivity. In this latter case, the technical committee had no responsibilities at all - all the work was in subcommittees, which themselves were either not doing anything or not participating in things, and in fact there was a lot of international work going on in that area. The more philosophical question was whether the OIML also needed to be involved in this. Mr. Dunmill said that he had attended some IAEA and ISO meetings in that area, and both had produced a lot of documents; whether there was a need for the OIML to produce anything because of legislation was another matter entirely.

    Mr. Mason added that he envisaged that before taking any major step in these areas of metrology, the OIML should seek to engage at a senior level with the other standards making bodies that were operating in this area, so that it could be established what the correct level of engagement was, if any. This was another reason why he did not wish to rush into what could be very big questions. It was necessary to identify where the work was being carried out, when this was not in the OIML, and to have a high level discussion with those bodies in order to work out whether there was a useful role for the OIML, quite possibly in the way that they were doing the work, rather than attempting to do it within the OIML.

    Mr. Mason reminded Members that the meeting was now about to consider, on a case by case basis, the projects which either did not have a convener or had insufficient P-members. Unless Members were able to step forward and either take a convenership or volunteer to be P-members, all of which could now be done very quickly through the website, the projects would close. Clearly, becoming a convener implied more of a commitment than becoming a P-member.

    ## TC 3/SC 1/p 4 Revision of D 13: Guidelines for bi- or multilateral arrangements on the recognition of: test results, pattern approvals, verifications (previously USA)

    Mr. Dunmill said that this was a project for which there was no convener. There were however 18 P-members and 13 O-members on this project group.

    Dr. Ehrlich said that the reason why the US had wanted to give this up was that they had been waiting to see what would happen with the MAA document. So in a sense this project, at least for multilateral arrangements, was no longer necessary, though it might be necessary to have one for bilateral projects, because it had been supplanted by the MAA.

    Mr. Carstens said that this project could possibly be of interest to regional bodies such as SADC, in which, for example, there was only one type approval body which was South Africa, and there might be a need for this document. He needed to discuss with SADC whether they thought this could be a document which could be used, and also possibly approach the APLMF or perhaps others.

    Mr. Mason felt that it should be emphasized that the document stayed; the question was whether revising it was a priority for resources. The UK had recently been looking at renewing some of their bilateral arrangements, and he certainly had not looked at D13 while doing this. It might be that a document even of this age was sufficient for bilateral arrangements. He invited the US to comment on how out of date the document felt.

    Dr. Ehrlich admitted that he had not looked at it recently, but he guessed that it was sufficiently out of date to merit revision at the least.

    Mr. Mason asked Mr. Dunmill for the procedure for delaying a decision, dissolving the current project if word did not come from SADC or another group within a period of, he suggested, a month.

    Mr. Carstens said that there was a meeting in March and asked to be allowed until the end of March to give a response.

    Mr. Mason said that if this was a SADC matter then it was regional and not international, even though there were a large number of P-members spread across the world.

    Mr. Dunmill said that this was an old document. Even if the current project was stopped, the document would at some time come up in the BIML's process of examining the relevance of all existing publications. The Recommendations were obviously more of a priority than the Documents, but at some point it would be looked at again by the BIML, an enquiry would be sent to everyone asking whether they felt the publication should be revised, withdrawn or reconfirmed, and asking people to volunteer a convener of such a project, if it was proposed for revision.

    Mr. Mason suggested taking away this particular project and considering whether there was a suspension option as opposed to a deletion option, where it was known that there might be enough interest for a convener to step forward. He agreed that the first project

    the BIML was trying to delete had turned out to be problematic, but felt that he must press for a volunteer to come forward earlier than March, for this not to be deleted. So, he said, the BIML would reflect on the wording of the resolution, but even if it went into suspension mode rather than deletion mode it would be for a matter of weeks, until December, rather than months, until March.

    Mrs. Lagauterie felt that if this project were to continue it should be only on the verification aspect, because otherwise it was duplicating the MAA. It could if necessary continue on the level of verification and how countries could recognize each other's verifications, but for test results and type approval it paralleled the MAA and time should not be spent on it.

    Prof. Schwartz agreed with this and felt that this was an argument for deleting the project immediately. If there were any new project, the connections to the MAA document, B 10 and other documents could be considered and there would be the opportunity to define a new project which did not touch the existing B 10.

    Dr. Ehrlich said that it should be asked whether anyone was currently using this document.

    Mr. Mason said he could answer this in the negative. He could see an argument for the existence of bi-lateral guidelines because it was known that there were bi-lateral arrangements. The UK had recently renewed at least one of these and were in discussion on two others, and the Netherlands also had bi-lateral arrangements. However, he would be surprised if when it was renewed they had recourse to D 13 to find out how to do it.

    Mr. Carstens said that South Africa agreed to the project being deleted. Anyone wanting to make a bi-lateral arrangement could use the principles of the MAA. The only issue that might affect SADC was within SADC and concerned cross-border verification, where companies from one country were doing verifications within another country, but that could be handled on a regional level.

    Mr. Mason thanked Mr. Carstens for his intervention and said that it sounded as though the project was being deleted.

    ## TC 3/SC 5/p 10 New publication: Guide for the application of ISO/IEC 17021 to assessment of quality system certification bodies in the field of legal metrology (previously USA)

    ## TC 3/SC 5/p 11 New publication: Guide for the application of ISO 9001 to legal metrology controls (previously USA)

    Mr. Dunmill said that the next projects fell into the category mentioned earlier by Dr. Ehrlich, and had been of BIML interest at the time. They currently had no convener (the USA had previously been the convener). 24 P-members were involved.

    Dr. Ehrlich said that in fact the USA had never considered itself to be the convener for these two projects which had always been under a USA-BIML co-secretariat. He suggested that they be removed, unless anyone who had the expertise would like to undertake them, as the USA had never intended to pursue them.

    Mr. Dunmill also pointed out that these were two of four proposed projects of which Paul Dixon of the UK was running two other projects in the same kind of field, but the

    two being discussed had been left over and there did not seem to be any interest in them.

    Dr. Ehrlich said that he thought that D 29 and D 30 were the other projects in the set, but that those would be kept.

    Mr. Mason said that he was sure there was the expertise but the question was whether the projects were worth keeping. Nobody seemed to think there should be a guide, so the project would be deleted.

    Mr. Dunmill asked whether the comments applied to both the above projects.

    Mr. Mason confirmed that they did.

    Dr. Ehrlich also confirmed this, adding that the comments probably applied even more to the ISO 9001 project, but that ISO/IEC 17021 could perhaps be useful. All these projects had been in the context of the MAA. Along with the project on ISO/IEC 17025, this was basically an interpretation document of the ISO/IEC document for legal metrology purposes. The document for ISO/IEC 17025 already existed and was already used by the assessors, but he did not think the other documents would be used in the MAA process.

    Mr. Mason said that a guide to ISO 9001 would be used by a certification body that was looking at quality management systems, like NMI did, but he could not imagine that they felt they needed a guide in order to do something they were already doing.

    Mrs. Lagauterie asked whether this work was not linked to that being done on conformity to type.

    Mr. Mason replied that this was a good point, and that when the work on conformity to type had reached a stage where it might be felt that a guide on conformity to type was needed, this project might be expected to be revived at that point, as it would then be being developed in a quite different situation from its previous intended use. He stated that it was now agreed that this project should be deleted; it would always be possible to return to it later if it was felt that it would be useful.

    ## TC 7/SC 4/p 2 Revision of R 55: Speedometers, mechanical odometers and chronotachographs for motor vehicles (previously USA)

    Mr. Dunmill said that this was a project of measuring instruments for road traffic. The USA had taken on the secretariat for TC 7/SC 4 mainly because of the interest in the other project in that committee, which was a revision of R 91 on radar equipment. This was why they wanted to give up this project, which currently had 20 P-members.

    Dr. Ehrlich commented that the USA had hoped to work on this project but due to lack of resources this had proved impossible. When they had taken over that secretariat France and Switzerland had both expressed interest, so he wondered if he could encourage one of these to take it on.

    Mr. Dunmill added that the UK had held the secretariat for this project before the USA. One of the problems in making progress on it was that for instruments embedded in vehicles there were over-riding type approval considerations. These were of no concern to the OIML, being under UN or UNECE jurisdiction, so this had made it extremely difficult to do the work, and the UK had abandoned it in favor of other priorities.

    Dr. Ehrlich agreed that it was complicated.

    Mrs. Lagauterie said that France's interest, like the USA's, had been rather for the revision of R 91. Speedometers within vehicles were not part of the legal metrology field. Mechanical odometers were very out of date and regulation still existed in France. As for tachographs, there was a European regulation which in fact went beyond European boundaries. This was an important regulation, relating to working hours, and beyond the scope of the OIML.

    Switzerland also confirmed that they were not interested.

    Mr. Dunmill said that if this project was cancelled, this would leave in place an extremely old regulation, which would later be examined to see whether it was relevant, useful or interesting.

    Mr. Fischer asked what happened to a Recommendation if a project to revise it was cancelled. For instance, he asked whether R 55 would be withdrawn, since it was not possible to leave Recommendations on the website which were out of date.

    Mr. Mason replied that he understood that R 55 would not be withdrawn immediately, but the problem was that possibly nobody had looked at R 55 to consider whether it was still relevant. If it related to old technology which was still in use, particularly in some parts of the world, where it would also be relevant to the way they conducted their regulations for safety purposes, it might still be relevant there; but this had to be a separate discussion. The present discussion was limited to whether to stop the present intention of revising the Recommendation, on the basis that the decision to revise it would itself have been taken many years previously. The Recommendation might be in use in places that were not able to use radar equipment to enforce speed restrictions, so it was important to give the opportunity to volunteer to look at it. He also added that a convenership, once assumed, could be resigned quite quickly.

    Mr. Dunmill commented that he would not like it to be resigned too quickly.

    Mr. Mason thought that it was possible for a Member to say "I am prepared to go and look at this and I consider that it would be useful and within our competence", and that would keep it going.

    Mr. Dunmill replied that in other cases he had asked for an update but the project group had asked for time to reconsider whether a revision was necessary. In some cases these people were repeating enquiries done some years previously, to confirm the necessity of carrying on, even with projects which were not on the current list. So there was a possibility for someone to take this project on just to find out whether it was wanted, i.e. to take on the convenership, conduct an enquiry among the P-members as to the relevance and usefulness of R 55 and then make a recommendation that R 55 be withdrawn, if necessary.

    Mr. Mason confirmed that a person who volunteered to be convener for this project would be required to do no more than confirm that it was a Recommendation that was worth working on. This would not be a heavy responsibility for a Member who wanted an easy introduction into the world of convenerships.

    Mr. Awosola suggested that as there were no volunteers, the Bureau might take on the task.

    Mr. Dunmill replied that the proposal for its withdrawal had been open to ballot for three months, but that nevertheless it would have to be examined at some stage, though

    higher priority would go to projects connected with the certificate system and the MAA. At some point, however, he added, the Bureau would in any case do this survey.

    ## TC 10/SC 3/p1 Revision of R 97: Barometers (P.R. China)

    Mr. Dunmill said that this project had a convenership, which was with China, but there were only four participating members.

    Mr. Mason invited the Chinese delegation to comment on whether they wished to encourage additional P-members for this project.

    The Chines delegation replied that they thought there were not enough interested P-members to continue with this project.

    Mr. Mason applauded the quick decision.

    ## TC 16/SC 3/p 2 Revision of R 112: High performance liquid chromatographs for measurement of pesticides and other toxic substances (previously USA)

    Mr. Dunmill said that this project again did not have a convener and had three P-members, which suggested a lack of interest.

    Seeing no volunteers, Mr. Mason suggested that the project should be deleted.

    ## TC 16/SC 4/p 1 New publication: Guide to air sampling devices for toxic chemical pollutants at hazardous waste sites (previously USA)

    Mr. Dunmill said that this project had no convener and only two P-members: China and the USA. Dr. Ehrlich stated that this was not among their priorities at the moment, and commented that this could be one of the areas in which other organizations were developing standards that the OIML could consult. He said the project could be deleted at present, and revived later if there was interest.

    This project was deleted.

    ## TC 16/SC 4/p 3 Revision of D 22: Guide to portable instruments for assessing airborne pollutants arising from hazardous wastes (incorporating FTIR spectrometers) (previously USA)

    Mr. Dunmill said that this project was in exactly the same situation as the previous one, with no convener and two P-members.

    Dr. Ehrlich said that he had more interest in this project but no resources to deal with it at the moment.

    Mr. Mason said that D 22 would remain in force until it came up again for revision, but that the project was deleted.

    ## TC 18/SC 4/p 4 Revision of R 90: Electrocardiographs, electrocardioscopes and electrocardioanalysers

    Mr. Dunmill said that this project had four P-members and that the Russian Federation held the convenership. This was a combination of some previous projects.

    Mr. Mason asked the Russian Federation whether they were keen to have further P-members.

    Dr. Kononogov said that they agreed to delete this project.

    Seeing no volunteers, Mr. Mason said that this would happen.

    ## TC 18/SC 4/p 6 Revision of R 89: Electroencephalographs, and TC 18/SC 4/p 4 Revision of R 90: Electrocardiographs, electrocardioscopes and electrocardioanalysers

    Mr. Dunmill said that these projects were in the same situation, with the Russian Federation holding the convenership and four P-members, dealing with the revisions of existing Recommendations.

    These projects were also deleted.

    ## TC 18/SC 5/p1 Electronic blood cell counting chambers

    Mr. Mason said that this was a project for a new publication.

    Mr. Dunmill said that this had been one of the German projects, for which they had indicated that they did not want to keep the convenership. There were currently five P-members. There was in any case nothing available for this new project.

    Mr. Mason expressed the opinion that it would require a high level of enthusiasm to get this work started, and he did not see that, so this project was also deleted.

    ## TC 18/SC 9/p 4 Revision of R 26 Medical syringes

    Mr. Dunmill told delegates that the situation was the same with this last project on the list; although this was a revision of an existing Recommendation, it had been under the responsibility of Germany and there were four P-members in it at the moment.

    There being no volunteers, this project also was deleted.

    Mr. Dunmill reminded delegates that for the projects he had also mentioned, two of which had fallen through the gap and been left out of the list, and any others which currently had no convener, an electronic vote would be organized. One project remained, which, if there were no objections, the BIML would conclude through the CIML ballot and approval procedure, even though the project had only five P-members. It had reached such an advanced stage that it would seem foolish to throw the work away.

    Mr. Mason asked for a reminder of what level of acceptance online voting would entail.

    Mr. Dunmill replied that withdrawals of projects would be on the basis of a simple majority. This was simply a decision of the CIML, and not the approval of a publication.

    Dr. Ehrlich asked for clarification on this.

    Mr. Mason answered that this referred to the two other projects which had not been circulated, which Mr. Dunmill had mentioned during his presentation. Because the secretariat had been vacant at the time of the transfers to the project groups, these projects had been missed off the database, and their existence had been found by Mr.

    Dunmill when he had done further research. Formally, some action had to be taken concerning these.

    Mr. Mason said that he could not see any objection to disbanding the project. If there was not enough interest to obtain a majority of online votes to disband it, it could not be disbanded, in which case it would be brought up at the following CIML meeting. Since nothing was happening at the moment it was unlikely that anything would happen in the meantime.

    Mr. Mason said that there was obviously approval to put this to online voting. The final proposal was that a publication that was at an advanced stage of preparation should be submitted to preliminary ballot even though it did not have a convener.

    Mr. Dunmill explained that the person who had been responsible for it, from Germany, would be willing to help with any final work on it, but there were only five P-members on that group at the moment, and they had received a poor response to the last CD voting round. However, they had felt that, in accordance with B 6, they had gone as far as they could with it and they had therefore asked the Bureau to put it to CIML ballot.

    Mr. Mason commented that it seemed entirely appropriate, since the work had been done, that if it could not be taken any further and was publishable, that the CIML should vote on it.

    Mr. Dunmill said that as long as there were no objections in the online ballot the proposal would go through for CIML approval, either online, or, if the response was not sufficient, then at the next meeting.

    This was agreed, thereby completing this draft resolution.

    Dr. Ehrlich said that in one of the documents sent out, he had been pleased to see the column "last confirmed". He asked whether this information would also be put on the website.

    Mr. Dunmill confirmed that when the Bureau's work in researching publication and reconfirmation dates was finished this would be done; all documents would have the date of last publication and last re-confirming. He explained that there were numerous research problems in the older minutes. The last resort would be to ask the people who had been responsible for the documents in question.

    Referring to the suppression of two of the above documents Mrs. Lagauterie recalled what Ms. Martens had said earlier about what work the OIML should be doing, and about which of these subjects were, or should be, of interest to the OIML. These included the certification of measuring instrument manufacturers' quality systems on the basis of ISO 9001, the capacity of certain certification bodies to certify the quality systems of manufacturers of instruments for legal metrology. The OIML should continue to reflect on these topics in conformity to type and on the role which the OIML should be taking in general.

    Mr. Mason thanked Mrs. Lagauterie for her helpful comment, which confirmed what had been said previously, i.e. that this was an important area but one which it would be better to record in the minutes and look at again when more progress had been made on conformity to type.

    Ms. Van Spronssen referred to one of the topics in the additional information list for the topic 8.1. Earlier there had been a presentation from Dr. Richards on ILAC's work, in

    which he had spoken of a joint project between ILAC and the OIML on ISO/IEC 17025 on legal metrology. This overview mentioned the revision of D 30, the guide for the application of ISO/IEC 17025 for the assessment of testing laboratories involved in legal metrology. She asked for an explanation of the difference between those documents, or whether they were on the same subject.

    Mr. Mason replied that he understood that the project which was still live and being undertaken by the UK, the revision of D 30, involved the application of a standard which was highly relevant to the work currently being done, and would affect the way in which a certification laboratory carried out its work and was assessed by an accreditation body. When looking at ISO/IEC 17021 there were separate issues, and there had not been the same level of interest at this point to produce a parallel document.

    Ms. Van Spronssen said that her question had not been understood. There was a joint OIML/ILAC project on ISO/IEC 17025 for legal metrology. This seemed to her to be enough for accreditation bodies to assess testing houses which were going to operate this process. However, additionally, there was now a project which was doing, from what she could understand, exactly the same thing.

    Mr. Kool explained that there was no joint OIML/ILAC project on ISO/IEC 17025. What he had reported earlier was that a working group had been established within ISO/CASCO to revise ISO/IEC 17025, and that there were OIML representatives in that working group. There was a joint ILAC/OIML project, but this was on the revision of OIML D 10/ILAC G 24, as had been reported by Dr. Richards. The project in the 8.1 document was an OIML project for the revision of OIML D 30, which was the guidance for applying ISO/IEC 17025 in legal metrology laboratories.

    Mr. Mason added that this was a live project, the timing of which might be affected by a decision to revise ISO/IEC 17025, but if the latter was revised, it would be even more important to look at the drafting of D 30. It was clear that there was the necessary interest in this project, because there were enough P-members and a convener, and indeed this was one of the additional convenerships that the UK had decided to take on because of the importance attached to making sure that this documentation was right.

    Prof. Schwartz suggested that Ms. Van Spronssen might be referring to the presentation by Dr. Richards, in which he had mentioned two joint work projects. Like Ms. Van Spronssen, Prof. Schwartz had been a little confused over the first one; Dr. Richards had mentioned a joint ILAC/OIML project concerning the assessment procedure which would end up in an MAA document. He thought that this had been going on for two years, and had been one of the responsibilities of Mr. Mussio, who had been the BIML contact to the project. He believed that this project was looking at the procedures, not at an interpretation of ISO/IEC 17025, but at harmonizing the procedures of accreditation and peer assessment in the field of metrology.

    Mr. Onyancha expressed concern about those projects which had been disbanded because of having too few P-members. He was concerned that conveners might have put a lot of effort and resources into these projects. Some potential P-members might not have financial support or technical know-how to support the projects, but might perhaps be able to add their moral support to the numbers so that the project might not need to be discontinued.

    Mr. Mason said that this was a good point, and in the case of the document which was going forward to preliminary ballot, the reasons for that were that a lot of work had

    been done, and ought not to be wasted. For most of the other projects, however, very little work had been done, so not much would be lost by stopping them. In terms of the obligations of being a P-member, in particular with the present possibilities of online voting and clear distribution of documents, it should be much easier for a country that had an active interest in a document to take part without having to commit a large amount of resources. The fact that there were large numbers of P-members on so many OIML projects demonstrated that Member States found it relatively easy to take on that responsibility. The responsibility of being a convener was much heavier, which was why the recent debate had taken place.

    Mr. Dunmill confirmed that of all the problem groups only two had existing CDs, and these had been produced some time previously and the Bureau did not even have a copy of them, so there had not been active work going on in those projects for some time. Anything which did exist would of course be kept for any future use, but they were not at an advanced stage.

