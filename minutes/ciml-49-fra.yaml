    Mr. Mason said that he knew that for R117 an enormous amount of work had gone into getting complex documents into a state to be approved, and although there had not been comments, it was appropriate to invite comments on R 35, where there had been negative votes on the draft.

    Mrs. Lagauterie said that the R 35 Amendment was only a short document and that further explanations concerning the "no" votes were not needed as they were already in the files accompanying the draft.

