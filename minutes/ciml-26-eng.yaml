    Replying to Mr PETERSEN, Mr ATHANE said that the redecoration of the building in the rue Turgot was complete except for the three offices on the ground floor, and they should be done at the beginning of 1992. The Bureau was now well equipped with microcomputers; future expenditure in that regard would no longer be considered as "exceptional expenses". The equipment for offset printing, photocopying and telefax had recently been brought up to date.

