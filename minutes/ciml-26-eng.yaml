- number: '2'
  title: 1 New members - Prospective new members
  narrative: |2+

    Mr ATHANE reminded Members that a delegation from the Republic of South Africa had visited the Bureau to enquire about joining OIML, but since then there had been no further news from them. Iran had asked the bureau on what conditions she might rejoin. The Mexican delegation at the General Conference on Weights and Measures had indicated that his country was considering the possibility of becoming a Member State of OIML (it is currently a Corresponding Member); the Argentinean delegation had indicated its country's interest in becoming a Corresponding Member.

    Mr ATHANE added that Haiti had been accepted as a Corresponding Member but had not paid its annual subscription, so that its membership was in suspense; whereas Yemen had paid a year's subscription but had not applied officially to join as a Corresponding Member.

- number: '3'
  title: 1 Approval of the auditor's report for 1990
  narrative: |2+

    The auditor's report was approved without comment.

- number: '4'
  title: 1 Replacement of a Director's Assistant retiring from the Bureau in September
    1992
  narrative: |2+

    Mr BIRKELAND reminded Members that Mr Thulin would retire in September 1992 and that the Committee would therefore have to appoint his successor. Three Member States had put forward four candidates for the post:

    - Belgium: Mr P. Degavre;

    - the People's Republic of China: Mr Dai Runsheng and Mr Wen Shanlin;

    - Rumania: Mrs I. Andreas.

    Mr Degavre obtained 22 of the 40 votes cast in the first round of a secret ballot, and was thus appointed Director's Assistant, to take up his duties on or about 1st October 1992. (The actual date would be a decision of the Belgian authorities, the interested party, and the Director of the Bureau.)

- number: '5'
  title: 1 Operation of the OIML Certificate System
  narrative: |2+

    Mr BIRKELAND stressed the importance of this subject for OIML and the interest that the OIML System had already aroused among manufacturers of measuring instruments, other international institutions, etc. At his request Mr ATHANE spoke about what the Bureau had done to promote the System and get it under way:

    - the final production and the very wide distribution of the basic text (available in French and English) on the System; in particular it had been sent to the many international and regional institutions concerned; the publication by ISO in one of its information bulletins on the subject had led to many requests for information;

    - the production and very wide distribution of a leaflet (available in French, English and German) summarizing the way in which the System operated and aimed principally at manufacturers and test houses;

    - the compilation of information provided by Member States about the appointment of issuing authorities and the preparation of a brochure on the subject;

    - the publishing of information about the System periodically in the Bulletin;

    - the compilation and distribution of information about actions at national level taken by some Members of the Committee to promote the System.

    Mr BIRKELAND remarked that the Bureau had done all it could to develop the System but thought that, even more than the Bureau, the Member States could contribute to its promotion, and he asked the Members of the Committee to reveal what they had been able to accomplish at their level. In particular he hoped that the issue of the first certificates was well under way and that those certificates would then be recognized by the other Member States.

    Mr PETERSEN indicated that there was slow but steady progress in Denmark in putting the System into operation; obviously OIML had to increase the number of Recommendations to which the System was applicable to encourage its development; in Denmark, as in many other countries, there was a single issuing authority, but in the future there would doubtless be a diversification of authorities, though always under the control of the CIML Member.

    Mr BIRCH found the progress made by the System impressive, but he recognized that in Australia there was perhaps a measure of confusion on the part of the manufacturers about the distinction between issuing authorities and test laboratories; could it be made clear when the issuing authority would also be the test laboratory, and when the tests would be performed by bodies other than the issuing authority?

    Mr ATHANE said that it was perhaps difficult to reply to that question because the issuing authorities were completely free in their choice of test laboratories, provided that the latter satisfied the conditions laid down in the basic text of the System; in a particular country the list of testing institutions could change with time; it did not seem necessary to maintain lists of those test laboratories in addition to the lists of issuing authorities. Commenting on Mr Petersen's remarks, he said that issuing authorities could change provided that the rule was observed that there could be only one issuing authority for a given category of instrument in one country.

    Mr CHAPPELL said that, about a year earlier, a "newsletter" had been sent out in the USA announcing the System; reports had also been given to the National Conference on Standards Laboratories; many questions had been asked about the OIML System and its links with ISO, IEC etc. The National Conference on Weights and Measures had also been kept informed. (The Conference had a national pattern-approval system very close to that of the OIML Certificate System.) That information had been followed by more detailed studies of the OIML System, comparing it to the national system, and it was to be hoped that there would soon be news about the USA's participation in the OIML System, in which the manufacturers of measuring instruments in the USA appeared to take a keen interest.

    Mr BIRKELAND remarked on the interest being shown in several countries in the System. He wondered whether there were yet any more concrete indications. Had there already been any applications for certificates? The metrological services of many countries often received pattern-approval applications; could those services not mention to the applicants that they could obtain an OIML certificate at the same time, provided of course that the instruments concerned were among the categories covered by the System and satisfied OIML requirements?

    Mr BENNETT said that he had received requests for information, particularly, as it happened, to indicate whether an OIML Certificate could be granted at the same time as pattern approval. NWML would soon be in a position to perform all the tests prescribed in R 76 and would thus be able to grant such requests if they became firm. Mr BENNETT also wished that the Committee think again about the need to have only one issuing authority for a given category of instruments in one country, as was now demanded. Some departments of the United Kingdom government did not agree with that provision, which bestowed a monopoly on that authority in contravention of the generally accepted principle of open competition.

    Mr KOCHSIEK said that there had been much publicity about the System in Germany, and that PTB had already received applications for certificates for nonautomatic weighing instruments. The decision had been made not to issue such certificates before the approval of the new version of R 76; the issue of the first certificates could thus be expected towards the end of 1991.

    Mr PETERSEN indicated that several applications had already been made, but he recalled that some time earlier a certificate had been issued for a load cell, though that preliminary certificate was not in the framework of the present System: it had been issued by a test laboratory with the authority of the National Agency; thus the list of issuing authorities should be drawn up to include that laboratory.

    Mr OHLON said that "prospective customers" had been told that OIML certificates could be issued; however, so far there did not seem to have been any reactions; perhaps there was some hesitation because of the development currently taking place in Europe of arrangements for the mutual recognition of tests and certificates. The countries of EFTA and the EC had concluded agreements on measuring instruments. What was more, the requirement that there should be a single issuing authority in a country for a category of instrument was not in accord with existing agreements at the European level, because it created a monopoly, as had already been pointed out. Moreover the arrangements agreed in Europe could make it difficult to accept OIML certificates issued by authorities that did not satisfy the rules agreed in those arrangements. The possibility should be considered of bringing the OIML System into the one that the EOTC was setting up in Europe; that would be a help in its development, provided that the requirement of a single issuing authority was abandoned.

    Mr BIRKELAND considered that it was difficult to talk about the System's current situation without bringing in its future, and so he invited his colleagues to combine items 5.1 and 5.3 of the agenda if they so wished. That said, he recognized that what Mr Ohlon had said was of interest to the System's future, and his suggestions should be pondered upon, but keeping always in mind the world-wide, international character of OIML's activities: it could not bend to the requirements of one region, but it could take inspiration from the experiences of the various regions to make OIML's system more genuinely useful without loss of its universal character.

    Mr STOICHITOIU thought that it was absolutely necessary to make use of the existing "cement", resulting from the work of ISO and IEC, particularly the ISO Standard 9000 on quality assurance that had been adopted as European Standard 45000; in that sense it was necessary to have a single issuing authority per category of instrument per country.

    Mr BAI JINGZHONG said that Chinese enterprises concerned had been informed and that several of them had shown interest in the help that it might give to exports. Laboratories accredited by the National Metrology Service had been selected to perform the tests needed for the issuing of a certificate.

- number: '6'
  title: 1 Procedures for the technical work of OIML
  narrative: |2+

    Mr BIRKELAND introduced the third draft of the Procedures for the technical work of OIML (part one of the Directives being developed) and made clear his intention to allow a wide discussion of the subject because of its extreme importance for OIML. The existing working methods were nearly twenty years old, and even though they had given a decisive thrust to the work, they had shown some deficiencies. Rather than revise them it had appeared to be preferable to develop new work procedures, taking into account the developments in common in ISO and IEC. Two successive drafts had been developed by the Bureau and discussed by the Presidential Council, which had finally asked the Bureau to prepare a third draft for discussion at Committee level. As indicated in the accompanying explanatory paper, the third draft could, depending on the Committee's reaction, either be adopted immediately subject to editorial revision, or be revised more fundamentally for resubmission to the Committee for adoption, or be rejected by the Committee, in which case it would be necessary to start again practically from scratch.

    Mr CHAPPELL said that he had a very large number of detailed comments about the draft but he would restrict himself to his most important criticisms. He agreed that it was necessary to revise OIML's working methods and make them more effective. The preliminary proposal submitted by the Bureau at Oporto was not broad enough or sufficiently general. Moreover he had been unable to take part in the Council's discussion in February 1991 and that explained why he now had many comments to make. The third draft was too complex, difficult to interpret and inadequate to surmount the difficulties that had been identified. It marked too great a break with the current methods, and it was in conflict with the Guide for CIML Members; it lacked a clear appeals procedure, which was not currently the case; the text was said to be based on the directives of ISO and IEC, although it departed from them significantly; and moreover, was it really necessary to adopt the IEC and ISO directives, which were appropriate to the scale of those institutions but perhaps not to that of OIML? In conclusion, Mr Chappell was not in favour of the draft.

    Mr OHLON asked for an explanation of the respective roles of the secretariat and of the chairman of a technical committee (CT) or of a sub-committee (SC), for the Bureau's view did not seem to accord with the practices of ISO and IEC, for whom the secretariat and the chairman had to come from the same country; in the same way the manner of the appointment of a working group and of its convenor should be more precisely described; and the text was very complex, as the USA's delegate had already remarked.

    Mr ATHANE offered some explanations and reminded Members that the directives of ISO and IEC envisaged, and even encouraged, the possibility of a secretariat and a chairman from different countries. In any case, even if they were from the same country, the chairman and the secretariat had different roles which complemented and balanced each other. As for the working groups, Mr ATHANE reminded the Committee that their object was mainly to ensure that the "first committee drafts" already had a certain international character and were of an acceptable editorial quality; naturally if the principle of working groups was accepted the details of how they were to work would have to be made clear.

    Mr OHLON said that in ISO and IEC the essential work was done at the level of the working group and that all interested committee members took part in it; that eliminated the risk of a preponderance of influence of the secretariat or chairman.

    Mr PETERSEN was worried about the complexity of the document and by a kind of "upward movement" of responsibility; in particular the CIML could find itself loaded with responsibilities that it could not discharge, meeting annually; it would either be necessary to establish an intermediate body or increase the number of meetings of CIML.

    Mr BIRKELAND recognized the soundness of that remark but said that the Presidential Council could assume some responsibilities in CIML's name and enlist the help of the advisory groups or ad hoc groups for which the procedures made provision.

    Mr KNAPP had difficulty with the notion of a member of a working group acting only as an expert and not as his country's representative.

    Mr BRINKMANN indicated his general support for the draft; ISO and IEC had great experience in the production of standards and OIML could benefit from that experience. However, the minimum number of P-members adopted by ISO and IEC was far too small if one considered the specific nature of OIML and, to diminish the risk of having a draft rejected by CIML, the minimum number of P-members participating in its development would have to be increased considerably. It would also be necessary to think again about the nature of the task given to working groups and not limit it to the preparation of first committee drafts, but associate them also with the work that followed. Moreover, extra delays should not be introduced at the time of approval by the fact that countries that were interested, but had not taken part in the development of the draft, presented numerous comments at the final stage. Finally a numbering system for working documents like that of ISO and IEC should be introduced.

    Mr KNAPP agreed with Mr Brinkmann's remarks, in particular to increase the minimum number of P-members; a project should be undertaken only if there was real international interest, and five P-members were far too few in that regard; there should be at least ten.

    Mr CHAPPELL remarked that, for most Member States, the CIML Members did not have experts in their national servives that were capable of taking part in all the work of OIML; the responsibility of Members of CIML was to identify national interests and

    to find national bodies capable of taking part in OIML's work; but in some cases (health and safety, for example) it could be very difficult to find experts willing to take part in OIML work, and that should be taken into account in deciding what should be the minimum size of the CTs and SCs.

    Mr BIRCH thought that a careful reading and rereading of the text showed that many of the objectives, in particular about the open character of the work and the prevention of a take-over by this or that interest, had been achieved. The rules established to that end were in the main good to the extent that they applied to the CTs and SCs. As far as the working groups were concerned there could be problems of duality arising from the participation of persons who would have to act as experts and not as national representatives. The working group would have to work with speed and efficiency without being subject to overstrict rules, and the role of the convenor was paramount. The fact that the working group was supposed to take part only at the initial stage, then pass responsibility for the remainder of the work to the CT or SC, would no doubt correct some of the deficiencies at the start; but the working group's experts could become discouraged if they considered their role to be of very limited duration: it was very desirable that the experts could participate in the remainder of the work, then being under the stricter rules applicable to CTs and SCs. It was also necessary to reduce the other risk, that of the CTs' and SCs' finding their roles reduced to that of accepting without discussion texts prepared by the working groups. With that in mind the process by which P-members nominated experts who would constitute the working groups should be re-examined: the current formulation seemed to contain internal inconsistencies. Finally Mr BIRCH expressed disquiet about the possibility that the working groups might not be genuinely international in character, but rather regional, because of the difficulties that geographically distant countries had in participating. The use of modern means of communication, allowing participation at long distance, should be recommended to reduce the risk of regionalization.

    Mr KNAPP asked whether it was possible for the secretariat and the chairman of a CT or SC, and the convenor of a working group, all to be from different countries. How then would the work, meetings etc. be coordinated?

    Mr ATHANE said that such a possibility could be envisaged, provided that the countries in question were all P-members of the CT or SC; it was for the CT or SC to decide, according to the circumstances. It was to be noted that the proposed procedures offered great flexibility to future technical committees, who could make good use of it to improve their efficiency.

    Mr CHAPPELL expressed his concern about the parts relating to the way in which the working groups would function: there was mention of the use of international standards, but not of national regulations or standards, which were supposed to be harmonized by OIML Recommendations. The rules for the appointment of chairmen also needed clarification, for the text was unclear on this point. Also, since the independence of the chairman with regard to the secretariat seemed to be important, mention should be made of the resources at the chairman's disposal, for only the resources at the disposal of the secretariat were mentioned.

    Mr ATHANE replied that quite obviously national regulations had to be taken into consideration by working groups, and for that matter the existence of working groups would ensure that the work started from a broader base and would be thus more international than was currently the case; whereas if there was already an international standard on the subject with which a CT or SC was dealing, OIML was practically bound to base its work on that standard (either by reference or by partial recopying); that was why that case had been mentioned. The ways in which chairmen were appointed could be revised. Finally, as regarded the resources available to a chairman, it was up to the country accepting responsibility for the chairmanship to provide whatever resources were necessary.

    Mr REFEROWSKI was, on the whole, satisfied with the Bureau's draft; some of its principles were to be retained: no change in the duties and responsibilities of the Conference and of the Committee; take account of the fact that P-members were in fact States; the work to start in a working group of an ad hoc nature and composed of experts rather than countries. But Mr REFEROWSKI did not see the need for both technical committees and sub-committees. Many of the comments made by members present were excellent (particularly about the size of CTs and SCs: how could a clear decision be reached by five members if two were for and three against a proposal?). He suggested that a group be established to discuss the draft and help the Bureau to put the finishing touches to it; he offered to serve on such a group.

    Mr VIRIEUX was of the opinion that the aim of giving the greatest possible flexibility to the various organs of OIML had been attained. The diagrams at the end of the text clarified it very well; it constituted an excellent working base.

    Mr OHLON accepted the principles of what had been said, but there was one point that troubled him: standards work was on national delegations that represented all interests. It should be the same in OIML; it was clearly the responsibility of the CIML Member to see that all national interests took part in the work of OIML.

    Mr BIRKELAND reminded Mr Ohlon that he (Mr Birkeland) had just drawn attention to that responsibility in his opening remarks, and Mr ATHANE said that it was clearly mentioned in the Guide for CIML Members; the next version of the Guide could emphasize the point still further. However, the Procedures were not a statement of working policy: they were a description of the procedures to be followed in the development of Recommendations, and that was not the place to mention the participation of all interested parties in the work of OIML under the coordination of CIML Members.

    Mr CHAPPELL remarked that the draft gave OIML Members responsibilities that were, in his view, in conflict with the Guide; so the revision of the Guide should proceed in parallel with the development of the Procedures.

    Mr BENNETT thought that the draft constituted a good base that could be improved. However, he did not see how a better coordination or management of the work, eliminating the former deficiencies, would be achieved, and he thought that CIML would be overwhelmed by new tasks.

    Mr PETERSEN was in complete agreement with what had just been said. He thought that CIML would be assuming an enormous task; how could it do it effectively?

    Mr VOORHOF was generally in favour of the Bureau's proposals. It was desirable that the mechanisms by which Recommendations were developed became similar to those used for the development of standards; it would facilitate the use of OIML Recommendations by standards organizations, in particular the European organization. He wondered, however, whether the production of Recommendations would be any quicker under the new procedures.

    Mr ATHANE began by replying to Mr Voorhof: the new procedures ought not to increase delays and could indeed shorten them. No doubt the working group would need longer to develop the first committee draft than was currently required by a reporting secretariat to produce a first preliminary draft, but after that the work should be able to proceed more rapidly since a certain measure of agreement would already have been achieved in the working group, and the delays of two-tier approval (reporting then pilot) that were currently experienced would no longer exist. Moreover the new procedures in the working group would ensure that texts would emerge that were well written in French and English, which would greatly reduce the later editorial work

    of the Bureau. Accelerated procedures would be worked out shortly. Turning to Mr Bennett, Mr ATHANE pointed out that under the new procedures the CIML would exercise a dual control over the work: in approving work projects and in allocating them to either existing technical committees or new ones specially formed, thus avoiding the risk of working bodies taking on work that was of no priority for most Member States. On the other hand the technical committees would have the responsibility of proposing the creation of subcommittees to develop projects that CIML had allocated to them. The coordination of a reduced number of subcommittees established at the request of the technical committee would be easier for the latter than that which the pilot secretariats were currently supposed to exercise with regard to reporting secretariats, many of which had long existed in their own right.

    Mr PETERSEN asked who would exercise practical control over the technical committees.

    Mr ATHANE replied that that was CIML's responsibility, as it was currently for the general control of the pilot secretariats and reporting secretariats; but the CIML should continue to enlist the help of the Presidential Council and, if necessary, "advisory groups" could be created, either by CIML or the Presidential Council, to consider in detail the course of the work and other matters to do with the CTs and SCs.

    Mr PETERSEN expressed the hope that that form of management would be more effective than that currently existing.

    Mr OHLON suggested that OIML take advantage of the experience of the standards organizations, whose technical committees meet regularly, normally once a year, to discuss the work that had been done and plan the work for the following year.

    Mr KNAPP said that, to improve efficiency and reduce delays in producing Recommendations, it would be better to improve the existing Working Method as necessary, rather than go back to the beginning.

    Mr ATHANE replied that that had been the Bureau's original intention when it had proposed the revision of the Working Method in 1988. However, at the Eighth Conference it had seemed preferable to start from scratch, because certain delegations had strongly urged the Bureau to look to the new directives of ISO and IEC, because it seemed that something completely new would make it easier to get rid of former bad practices, and finally because it seemed to be essential that the complete general programme of work of OIML be reviewed and that work that was of no general interest be abandoned. That would be easier if a fresh start was made. He pointed out that, if OIML was not a standards organization in the sense that ISO and IEC were, Recommendations could still be produced according to procedures that were close to those used for international standards. Mr ATHANE added that the differences applied only to the working procedures of the technical committees and subcommittees in relation to the current pilot secretariats and reporting secretariats; those of the Conference, the Committee and the Presidential Council were little affected.

    Mr EMERSON, having noted that a number of CIML Members seemed to be worried about the increase in CIML's responsibilities, remarked that, in relation to the existing situation, only two new tasks would be added: the appointment of chairmen of technical committees and the approval of new work projects. The CIML had always been responsible for the approval of the work programmes of the pilot secretariats and reporting secretariats; there would be no great change vis a vis the current position; the Bureau had made a point of giving to CIML only those tasks that were necessarily its responsibility, with the provision that CIML could appoint advisory groups to help it in its work.

    Mr VIRIEUX thought that the most important consideration was that the production of OIML Recommendations should be speeded up. It would be a disaster if a country, or still worse a group of countries, decided to enact necessary regulations without reference to OIML because OIML was incapable of producing the corresponding Recommendation in time; it would be very difficult for such a country or group of countries to adapt its national or regional regulations later to OIML's requirements. Mr VIRIEUX was convinced that the proposed new procedures would allow that quickening of the pace to occur, though obviously the procedures could be perfected later in the light of experience.

    Mr BIRKELAND remarked that Members of CIML on the whole favoured the draft, which would, however, have to be carefully revised and improved. For that purpose the comments made at the meeting would have to be compiled by the Bureau with, of course, all additional comments that CIML Members might send to the Bureau in the very near future. To take up Mr Referowski's proposal, that gentleman, Mr Brinkmann and Mr Chappell would form a drafting group with the task of helping the Bureau to prepare a new text to be discussed by the Presidential Council at the beginning of 1992, before instructing the Bureau to prepare a final draft that the Committee might approve either by correspondence or, at the latest, at its next meeting.

- number: '7'
  title: 1 State of progress of work
  narrative: |2+

    Mr BIRKELAND indicated that the paper entitled State of progress of the work of OIML Secretariats, dated 1991.08.31 and brought up to date to 1991.09.30, had been distributed for the information of those present.

    Mr ATHANE added that in February 1991 the Presidential Council had received a report on the activities of the secretariats up to the end of 1990, with in particular the statistics on the comparison between the actual progress of the work and the plans approved in 1988 for the period 1989 to 1992. It appeared that out of 135 secretariats, 73 were inactive, (43 because their work was finished, and 30 because the work that had been envisaged had been suspended for various reasons); of the 62 active secretariats, 21 were within six months or so of their targets, 2 were ahead, 23 were 12 to 18 months behind and 16 were more than 18 months behind. Mr ATHANE reminded Members that news about the secretariats was given every year in the March issue of the OIML Bulletin.

- number: '7.2'
  title: a Vacant secretariats
  narrative: |2+

    Mr BIRKELAND reminded the Committee that the Bureau had conducted an enquiry to find candidates to take responsibility for the secretariats that had become vacant following requests by the countries formely responsible to divest themselves of those responsibilities.

    Following the enquiry the following secretariats were allocated as indicated:

    - SP 2-Sr 5 "Control by sampling" to Rumania, after Germany had withdrawn its candidacy,

    - SP 10-Sr 1 "Measurement of the speed of vehicles" to the United Kingdom, after Rumania had withdrawn its candidacy,

    - SP 16-Sr 1 "Dosimeters" to either the United Kingdom or the USSR, to be decided by agreement between the two countries, after Germany had withdrawn,

    - SP4 "Measurement of length, area and angle" to the United Kingdom.

    The following Secretariats remained without countries responsible, owing to an absence of candidates: SP 19 "Measurement of characteristics of materials" and SP 19 SR 3 "Hardness (reference blocks and testing machines)".

- number: '14'
  title: 1 OIML Bulletin
  narrative: |2+

    Mr THULIN spoke about the Bulletin, for which he was responsible, and his difficulties in obtaining technical articles other than papers given at various technical seminars, which had been the Bulletin's mainstay. He also pointed out that a great effort had been made to increase the amount of information about Member States, meetings on metrology, books and journals on the subject, etc. He regretted that the contributions came always from the same small group of countries.

    Mr BIRCH expressed his satisfaction with the contents of the Bulletin, but he suggested that some of the information given to the Committee be published in it, in particular that on relations between OIML and other institutions, and on the ways in which metrology was likely to evolve in Europe.

    On the Committee's behalf Mr BIRKELAND expressed his high satisfaction with the technical and informative level of the Bulletin.

