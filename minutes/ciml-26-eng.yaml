- number: '7.1'
  title: State of progress of work
  narrative: |2+

    Mr BIRKELAND indicated that the paper entitled State of progress of the work of OIML Secretariats, dated 1991.08.31 and brought up to date to 1991.09.30, had been distributed for the information of those present.

    Mr ATHANE added that in February 1991 the Presidential Council had received a report on the activities of the secretariats up to the end of 1990, with in particular the statistics on the comparison between the actual progress of the work and the plans approved in 1988 for the period 1989 to 1992. It appeared that out of 135 secretariats, 73 were inactive, (43 because their work was finished, and 30 because the work that had been envisaged had been suspended for various reasons); of the 62 active secretariats, 21 were within six months or so of their targets, 2 were ahead, 23 were 12 to 18 months behind and 16 were more than 18 months behind. Mr ATHANE reminded Members that news about the secretariats was given every year in the March issue of the OIML Bulletin.

- number: '7.2'
  title: Particular secretariats
  narrative: |2+

    ## 7.2.a Vacant secretariats

    Mr BIRKELAND reminded the Committee that the Bureau had conducted an enquiry to find candidates to take responsibility for the secretariats that had become vacant following requests by the countries formely responsible to divest themselves of those responsibilities.

    Following the enquiry the following secretariats were allocated as indicated:

    - SP 2-Sr 5 "Control by sampling" to Rumania, after Germany had withdrawn its candidacy,

    - SP 10-Sr 1 "Measurement of the speed of vehicles" to the United Kingdom, after Rumania had withdrawn its candidacy,

    - SP 16-Sr 1 "Dosimeters" to either the United Kingdom or the USSR, to be decided by agreement between the two countries, after Germany had withdrawn,

    - SP4 "Measurement of length, area and angle" to the United Kingdom.

    The following Secretariats remained without countries responsible, owing to an absence of candidates: SP 19 "Measurement of characteristics of materials" and SP 19 SR 3 "Hardness (reference blocks and testing machines)".

    ## 7.2.b The situation of one secretariat

    Mr BIRKELAND reminded Members that the secretariat SP 30-Sr 1 should have revised Recommendation R 54 on the pH scales of aqueous solutions to align it with the IUPAC Recommendation. However, the Recommendation not having yet been so revised despite repeated reminders from the Bureau, the latter had been obliged to suspend the work of SP 30-Sr 1. It was noted that it had not yet been possible to hold the projected meeting between experts of IUPAC and of OIML, and that the experts were not unanimously in favour of IUPAC's decisions. The Committee decided to postpone discussion of this matter, in particular whether to confirm or cancel R 54, until its next meeting.

- number: '7.3'
  title: Adoption of International Recommendations
  narrative: |2+

    By the vote of which the results are given in Annex 1, the Committee approved the following International Recommendations for immediate publication and submission to the Ninth Conference for formal sanction:

    - Sound calibrators,

    - Measuring instrumentation for human response to vibration,

    - Pure-tone audiometers,

    - Nonautomatic weighing instruments (R 76 revised).

    The approval of R 76 included an amendment on electrostatic discharges notified by Mr KOCHSIEK and, as pointed out by Mr ATHANE, applied to both parts of the Recommendation since that proposal had been circulated by the Bureau by post and had not been opposed by any CIML Member. Mr BRINKMANN indicated that he would bring some editorial corrections to the attention of the Bureau before the Recommendations concerned were printed.

- number: '8'
  title: LIAISON WITH SOME INTERNATIONAL INSTITUTIONS
  narrative: |2+

    At Mr BIRKELAND's request, Mr ATHANE submitted brief reports on the relations between OIML and some international and regional institutions.

    The bodies of the Metre Convention: those relations were very good and raised no difficulties of overlap or of conflict in their work.

    ISO and IEC: relations were also very good even if, in some technical activities, there could be points of conflict due to the fact that standardization and legal metrology could view the same subject differently. At that very moment a World Summit on Standardization, and the General Assembly of ISO, were being held in Madrid, and OIML was represented at both of them. Mr EMERSON supplemented those remarks with a brief progress report on the work on the vocabulary and on uncertainties being done under the aegis of ISO/TAG4 (in which BIPM, IEC, OIML and other institutions

    took part). BIML took an active part in the work: it had taken responsibility for certain studies and had organized meetings; the CIML also participated in the person of Mr Chappell; work on the vocabulary (revision of the VIM) was nearing completion; that on uncertainties was happily nearing its conclusion, and the matter of coherence with ISO/TC69 was being addressed. Mr CHAPPELL insisted on the need to complete the work on vocabulary very quickly because of its importance to OIML. In reply to a question from Mr BIRCH it was indicated that the new edition of the VIM would probably be available towards the end of 1992. Mr BRINKMANN was told that the work of ISO/TAG 4 in no way conflicted with the earlier work of WECC.

    European metrological and standardization bodies: Mr ATHANE described briefly the aims of EUROMET, WECC, WELMEC and COOMET (recently set up by the countries of eastern and central Europe) and their cooperation with OIML. As regarded activities of a regulatory nature, Mr ATHANE described the development of cooperation that formerly had been centred exclusively on the Commission of the European Communities (responsible for proposing Directives which, in the field of metrology, were practically identical to the Recommendations of OIML) and which was currently moving in the direction of the two European standards organizations, CEN and CENELEC. Those last could either receive mandates from the Commission to produce standards to complement the metrological Directives (or the single general Directive currently being drafted); they could also decide on their own initiative to draft standards on measuring instruments. CEN and OIML had very quickly reached agreement on cooperation; an identical draft agreement had not initially found favour with CENELEC, but the latter had recently changed its mind (following a change of Secretary General) and an agreement could shortly be concluded. The main aim of those agreements was, for OIML, to ensure that European standards in the metrological field were compatible with the corresponding OIML Recommendations, whether those standards were produced with a mandate from the Commission or on the independent initiative of CEN or CENELEC. There was already an example of cooperation with regard to nonautomatic weighing instruments: the Bureau had accepted a heavy additional work load to draft a standard based on R 76, but now the work had been taken over by DIN (the German standards committee) and the cooperation had proved to be very fruitful. Mr ATHANE added that what he had just said about the Commission applied equally to EFTA, as CEN and CENELEC embraced the countries of the European Community and EFTA. Mr ATHANE concluded his remarks by stressing the nonexclusive character of the cooperation between OIML and the regional institutions: what was being done at that time with western European organizations could be done in the future in any other region of the world.

    Mr BENNETT confirmed and added to Mr Athan'e's remarks about WELMEC, which would shortly be meeting in Vienna. Harmonization and communication were currently the principal aims of WELMEC, for example the harmonization of pattern approval certificates and other matters linked to certification.

    Mr REFEROWSKI gave some information about the recent establishment of COOMET, the purpose of which was take up some aspects of the cooperation that had existed through CAEM, but with a less formal structure. Other countries could take part as associate members: such was the case with Germany, besides the full members who were currently Bulgaria, Poland, Rumania, Czechoslovakia and USSR; an association with EUROMET, WECC and WELMEC was one of COOMET's aims.

    Mr OHLON indicated that some projects of CEN and CENELEC could create difficulties of compatibility with the corresponding work of OIML, unless OIML showed itself capable of bringing that work to a rapid conclusion: there were also cases (heat meters, for example) where the OIML work was difficult to apply in some European countries.

- number: '9'
  title: DEVELOPING COUNTRIES
  narrative: |2+

    Mr THULIN indicated that in 1991 this activity had been limited to the organization, in close cooperation with Germany (PTB and DAM), of a training course on the verification of certain weighing instruments. (It had not proved possible to organize a similar course that had been envisaged for France). The course had been of particular interest to the developing countries, though trainees from other countries had also been invited under the aegis of cooperative agreements with Germany. The total number of course members was twenty. OIML, for its part, had covered the travel costs (from the Development Council's budget, as agreed in 1990) of four trainees from developing countries that were members of OIML. The success of the course had been such that the German authorities had decided to repeat it in June and July 1992, and CIML was asked whether it would allow the Bureau to participate in this second presentation and cover the travelling expenses of two trainees. Mr THULIN added that it would no doubt be necessary later, perhaps in 1993, to call a meeting of the OIML Development Council to reconsider OIML policy in that field. Mr THULIN also gave some information about the booklets produced by the Bureau, mainly for the developing countries.

    Mr REVUELTA FORMOSO reported on the training courses organized annually in Cuba and to which the developing countries of Central and South America were invited. Cuba would also be organizing a seminar and exhibition on metrology in 1993, and OIML was invited to consider the possibility of participating in them in one form or another. He added that Cuba had undertaken the translation of the OIML Recommendations into Spanish.

    The GERMAN DELEGATION informed the Committee about other courses that its country was organizing independently for developing countries, in particular in the field of medical measuring instruments.

    Mr NOUMSI, expressing his regret that OIML had not been able to act on his proposal of 1990 to organize courses in the developing countries, suggested that the real training needs of the developing countries needed better definition; he asked that an enquiry be launched to determine what kinds of training projects would be of particular interest to those countries.

    Mr STOICHITOIU and others expressed their appreciation of Germany's activities in the field of training courses, and their wish that information on the subject be widely distributed.

    Mr BIRCH, for his part, supported Cameroon's proposal.

    Mr BIRKELAND remarked that CIML had expressed no opposition to the Bureau's proposals and asked the Bureau to restart the enquiry into the needs of the developing countries that had been made some years earlier, and he expressed his thanks to the countries that were becoming active in support of the developing countries.

- number: '10'
  title: OIML SEMINARS
  narrative: |2+

    Mr THULIN reported on the preparations for the organization of a technical seminar on instruments for measurement of air pollution, proposed by Switzerland, which would take place in Interlaken in September 1992. Papers would focus on the verification of instruments (in particular those used for vehicle exhausts, already the subject of an OIML Recommendation), but other subjects could also be addressed and institutions such as ISO (TC 146) would be invited. Details would be given later, in or about November, but Mr THULIN wished to bring this seminar to the attention of those present straight away so that offers of papers could be sent to the Bureau without delay.

    11 REPORT ON THE ACTIVITIES OF THE BUREAU (October 1990 to September 1991)

    A written report was distributed to those present for information.

- number: '12'
  title: ELECTION OF A VICE-PRESIDENT OF THE COMMITTEE
  narrative: |2+

    On the President's nomination, the Committee elected Mr M. KOCHSIEK, CIML Member for Germany, as its Vice-President, by acclaimation.

    Mr KOCHSIEK expressed his thanks to his colleagues and assured them of his keen interest in OIML's affairs.

- number: '13'
  title: PREPARATIONS FOR THE NINTH CONFERENCE
  narrative: |2+

    Mr KAPONIKOLOS informed the Committee about the preparations for the Ninth Conference, which he proposed should be held in the first week of November 1992 to take advantage of the very attractive hotel prices obtaining at that time, and in conformity with the results of an enquiry conducted by the Bureau; the venue would be the Astir Palace Hotel in the tourist complex at Vouliagmeni, 25 km south of Athens. Mr Athané had already visited the site of the meeting and the details would be settled later in strict consultation with the Bureau. Mr KAPONIKOLOS expressed his pleasure in giving the delegates of OIML Member States the opportunity to discover Greek hospitality and to appreciate Greece as a whole.

    The Committee made no comment on the Bureau's proposals for the agenda for the Conference or on the budget that could be submitted for the Conference's consideration. As regarded the budget, draft estimates would be sent officially to the Member States towards the end of 1991, seeking their comments so that a final proposal could be included in the papers for the Conference, which should be sent out in the spring of 1992.

- number: '14'
  title: Other matters
  narrative: |2+

    14. 1 OIML Bulletin

    14. 2 Institution of a world metrology day

    14. 3 Relations between OIML and the industries manufacturing measuring instruments

- number: '14.1'
  title: OIML Bulletin
  narrative: |2+

    Mr THULIN spoke about the Bulletin, for which he was responsible, and his difficulties in obtaining technical articles other than papers given at various technical seminars, which had been the Bulletin's mainstay. He also pointed out that a great effort had been made to increase the amount of information about Member States, meetings on metrology, books and journals on the subject, etc. He regretted that the contributions came always from the same small group of countries.

    Mr BIRCH expressed his satisfaction with the contents of the Bulletin, but he suggested that some of the information given to the Committee be published in it, in particular that on relations between OIML and other institutions, and on the ways in which metrology was likely to evolve in Europe.

    On the Committee's behalf Mr BIRKELAND expressed his high satisfaction with the technical and informative level of the Bulletin.

- number: '14.2'
  title: Instituting a world metrology day
  narrative: |2+

    Mr STOICHITOIU explained his reasons for the proposal: activities such as standardization and "quality" all had their "world days", and metrology suffered from not having one as well; such a day would enhance relations between manufacturers, test laboratories, control authorities and the public, and make every one more aware of metrology in general and legal metrology in particular; it would also be an occasion to publish articles, organize seminars etc., whether at national level or internationally.

    Mr BIRKELAND remarked that for the moment the bodies of the Metre Convention did not wish to associate themselves with this initiative.

    Mr PETERSEN did not think that it was always necessary to try to link scientific metrology with legal metrology; there were occasions when legal metrology had its own identity, and there could be initiatives that were independent of other branches of metrology. In that sense Mr PETERSEN felt a certain sympathy for Mr Stoichitoiu's proposal.

    Mr KNAPP said that a legal-metrology day focused on weights and measures in retailing had been organized some time in Canada; it had required a large committee to plan it, had been expensive, and the results had been rather disappointing; it would be impossible for OIML to take responsibility for such a movement internationally.

    Mr BIRCH recognized the practical difficulties, but thought nevertheless that OIML ought, in the medium or long term, to involve itself in nontechnical subjects with links with legal metrology, for the example the impact of its activities on the consumer or on industry. In that sense, a movement such as that proposed by Mr Stoichitoiu could later become a normal consequence of such a development in OIML's activities.

    Mr BIRKELAND remarked that nearly all who had taken part in the debate thought that instituting a world metrology day immediately would be unrealistic; however, there was no need to renounce all thought of such a day, and OIML should think about it, even if now was not the time for it.

    Mr STOICHITOIU said that he had not suggested that OIML itself organize demonstrations, but only that it choose a day and encourage its Member States to promote the day by their activities.

    Mr BENNETT proposed that legal metrology bodies at national level use the world days for standardization and quality to publicise the roll of legal metrology in those domains and on its own account.

- number: '14.3'
  title: Relations between OIML and the industries manufacturing measuring instruments
  narrative: |2+

    The Committee noted the content of a letter from CECIP (Comité Européen des Constructeurs d'Instruments de Pesage - European committee of weighing-machine manufacturers), in which the European manufacturers indicated their intention to urge their national authorities to put OIML Recommendations into effect as soon as they were published, and asking OIML to urge its Member States to associate manufacturers with the work of OIML, whether in national working groups or in national delegations at meetings. OIML was also asked to insist that Recommendations be written in terms of the metrological performance to be achieved, and not to include design requirements, because the latter could be a brake on innovation and impede progress.

    Mr BIRKELAND emphasized that, although the request came from a regional association, it was no less of general import, especially the last two points, which had already been discussed on several occasions in the Committee and the Conference with the same conclusions as those voiced in CECIP's request.

    Mr PETERSEN said that, since those points had long been OIML working policy, it was a matter of putting it effectively into practice and finding practical means to that end.

    Mr BIRCH expressed his agreement in principle with the proposal, provided that it was clearly limited to OIML's technical work, and did not apply to other activities such as those pertaining to the Conference. Moreover the participation of industry in the technical work would have to be in accordance with rules that were known and clear to everybody, and which ought, for example, to feature in the procedures for the technical work or in some other appropriate text.

    Mr BIRKELAND drew attention to the advantages for OIML of industry's cooperation.

    Mr CHAPPELL indicated that it had long been the policy of the USA to associate manufacturers and users of instruments with the US national working groups of OIML; it was acceptable that a manufacturer represent a Member State at an OIML meeting provided that that manufacturer put aside his commercial interests and represented his country's overall interest.

    Mr REFEROWSKI drew attention to the obvious ties between manufacturers and the legal metrology services; such cooperation had always been sought in Poland, and a delegation from CECIP would shortly visit his country.

    At the conclusion of the debate the COMMITTEE expressed its satisfaction with the intentions of the manufacturers to apply pressure to the national authorities to put OIML Recommendations into effect quickly. It also reiterated the following elements of OIML working policy:

    - CIML Members were invited to associate manufacturers of measuring instruments, and all other interested parties, closely with the technical work of OIML, both in national working groups and in delegations to meetings,

    - OIML Recommendations should be worded in terms of metrological performances that instruments should be capable of achieving, and methods of test, not in terms of technical solutions or design requirements for instruments, for that could be a restraint on technical progress.

