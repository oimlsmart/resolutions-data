      CONSIDERING the advantages of an appropriate planning procedure for the work of the OIML Secretariats,

      EXPRESSING its satisfaction with the planning work for the 1985-1988 period,

      CONSIDERING however that this procedure could be improved,

      INSTRUCTS the Presidential Council to study the necessary improvements and to submit its proposals to the Committee, either by correspondence or during the 22nd CIML meeting but in any case in good time so that planning for the 1989-1992 period may be carried out according to this improved procedure.

      ## DECISION CIML 1986 POINT 7.2

      The Committee provisionally adopted two draft International Recommendations :

      Heat meters

      - Electronic weighing instruments

      and instructed the responsible Secretariats to introduce the necessary supplements and/or improvements before their submission for final sanction by the Eighth Conference.

      ## DECISION CIML 1986 POINT 7.3

      The Committee instructed the Presidential Council to study the problems of different categories of OIML publications, on the basis of the proposals presented by Mr EDGERLY, and also the problems concerning the OIML vocabularies on the basis of the proposals presented by Mr PODGORSKI.

      ## DECISION CIML 1986 POINT 8

      The Committee took note of the report on the publication of the brochure: 《 Guide for CIML Members 》。

      ## DECISION CIML 1986 POINT 9

      The Committee took note of the report presented by the Chairman of the Development Council and approved the draft work program for 1986-1988.

      ## DECISION CIML 1986 POINT 10

      The Committee took note of the reports on the relations between OIML and various International and Regional Institutions and requested the Bureau to continue its activities in this field.

      ## DECISION CIML POINT 11

      The Committee took note of and expressed its satisfaction with the report on the OIML Bulletin and encouraged the Bureau to continue its efforts.

      ## DECISION CIML 1986 POINT 12

      The Committee took note of and expressed its satisfaction with the information on the technical seminar held in April 1985 and the intentions of the Bureau to organize another seminar in 1987.

      ## RESOLUTIONS CIML 1986 POINT 13.1

      ## The International Committee of Legal Metrology,

      ## HAVING TAKEN NOTE of the report of SP 2-Sr 4,

      HAVING EXAMINED the usefulness and the possibility of :

      - a compilation, on a continuing basis, of information relating to bi- and multilateral systems of (mutual) recognition of test results, of pattern approvals and of verifications,

      - a classification of these agreements,

      - a distribution of this information,

      REQUESTS the CIML Members to supply to the BIML the required information if they consider this to be possible and useful,

      REQUESTS the BIML to classify this information and to distribute it to Member States in a suitable form and at suitable intervals of time.

      ## The International Committee of Legal Metrology,

      ## HAVING TAKEN NOTE of the report of SP 2-Sr 4,

      HAVING EXAMINED the interest which knowledge of the results of tests, that may have been carried out by other national metrology services, could have for certain national metrology services to which a submission for pattern approval of the same instrument was made,

      URGES the CIML Members to facilitate the exchange of such information, which in principle may only be provided with the agreement of the manufacturer of the instrument concerned.

      ## The International Committee of Legal Metrology,

      ## HAVING TAKEN NOTE of the report of SP 2-Sr 4,

      URGES the CIML Members and the national metrological services to issue, on request, declarations of conformity for a measuring instrument or a series of measuring instruments, suitably identified, which meet the requirements established by OIML for the instrument in question,

      POINTS OUT that these declarations of conformity serve for information only and impose no obligation on the national metrological service of the importing country,

      RECOMMENDS the declarations of conformity to be in a form as shown in the example given hereafter. (*)

      ## DECISION CIML 1986 POINT 13.2

      The Committee adopted the International Document "Guidelines for bi- and multilateral arrangements on the recognition of : test results - pattern approvals - verifications ".

      ## DECISION CIML 1986 POINT 13.3

      The Committee instructed the Pesidential Council to follow the developments in the field of certification, on the basis of studies carried out by SP 2-Sr 4, and to report on this matter during the next CIML meeting.

      ## DECISION CIML 1986 POINT 14

      The Committee took note of the report on the activities of the Bureau during the period October 1984 - March 1986.

      ## DECISION CIML 1986 POINT 15

      The Committee took note of the report presented by the Delegation of Australia and the Bureau on the preparations for the Eighth Conference, which will take place in Sydney from 24 to 28 October 1988.

      ## DECISION CIML 1986 POINT 16

      The Committee decided that the 22nd meeting will take place in Paris, September 1987.

