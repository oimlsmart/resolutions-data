      Mr. GOMEZ ROSELL, President of the OIML Development Council recalls that the Council has just held a meeting during the two days which preceded the meeting of the Committee. The report of the discussion is still in a draft stage and copies of this draft were distributed for information to the participants of

      the Committee meeting. Mr. GOMEZ ROSELL requests Mr. THULIN, who assisted in the preparation and the secretariat of the Development Council meeting, to give a summary of this report.

      Mr. THULIN stresses the following main points :

      - unfortunately, it would seem that the intentions of the developed countries to act in favour of the developing countries are diminishing. This may be due to the economic world situation,

      - very few of the developing countries, except those invited by OIML, were able to participate in the meeting of the Council,

      - the participants were invited to present the activity of their respective countries in the matter of assistance programme and it appears that certain industrialized countries already provide wide ranging programmes of assistance and training,

      - a enquiry set up by the President of the Development Council and distributed by the Bureau provided a better grasp of the needs of the developing countries in particular concerning training; the BIML was instructed to inform the industrialized countries of these training needs as well as of the material training requirements (in particular audiovisual) and of verification equipment,

      - studies should be carried out on the problems of instrumentation which affect the export of products from developing countries as well as the realization of primary and secondary measurement standards and their calibration,

      the question of the OIML subscriptions of developing countries should be examined,

      the Development Council has approved brochures on equipment and the setting up to laboratories elaborated by an ad hoc group and the Bureau,

      the Council has re-examined the activity of SP31 and was informed of the progress of co-operation between UNESCO and USSR in the field of scientific and metrological training,

      the participants became acquainted with an audiovisual presentation of the Metrological Research Institute of Cuba which commences in 1986 an annual training course for developing countries,

      the representatives of the countries present have given information on the training opportunities available in their countries,

      - information was also given on the seminars organized by IMEKO,

      - finally, a draft work programme for 1987-1988 was established to the submitted to the Committee for adoption.

      (BIML note : this programme can be found in the report on the meeting of the Development Council).

      Mr. ATHANE points out that, in conformity with the wishes of many of the participants of the 8th Conference it was possible to profit from the good financial situation of the Organization and to invite to the meetings of the Council and of the Committee five representatives of developing countries instead of four, as originally foreseen.

      On a question from Mr. IIZUKA, Mr. THULIN indicates that the next meeting of the Development Council could take place in Cuba, in April 1988, linked with a seminar. However, several countries stress the financial difficulties which would arise from the obligation to make two long voyages during the same financial year, one to Cuba, the other to Australia for the 8th Conference. No final decision was therefore taken and the problem will be examined later.

      At the conclusion of this presentation, Mr. BIRKELAND states that the draft work programme 1986-1988 for the Development Council can be considered approved. He congratulates Mr. GOMEZ-ROSELL who has been re-elected by the Council as its President for a further period of two years.

- number: '10'
