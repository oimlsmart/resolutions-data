      ## a) ISO TAG 4

      This working group, which was instructed to harmonize the metrological aspect of the ISO work and to serve as a unification forum between BIPM, IEC, ISO and OIML had met during the two days preceding the meeting of the Committee. Messrs. BIRKELAND and EDGERLY participated as representatives of the standardization Committees of their countries, Messrs BERTRAN, ATHANE and TURSKI as representatives of OIML. Mr. TURSKI gives a summary of the discussions and decisions:

      the VIM will be the subject of an immediate slight revision; a more serious revision is planned for 1987-1990,

      the ISO-OIML mixed working group on terminology of dimensional metrology was the subject of a discussion which confirmed that this work is of interest to both Organizations,

      - it was considered useful to co-ordinate the activities of IEC, ISO and OIML in the matter of metrological terminology,

      - the ISO group on the metrological aspects of standardization was re-established,

      - ISO and IEC are ready to provide assistance to OIML in the preparation of a catalogue of symbols and abbreviations for metrological characteristics and functions of measuring instruments,

      - a BIPM-IEC-ISO-OIML joint group was set up to study the practical application of the BIPM report on uncertainties.

      b) Bodies for metrology and standardization in Western Europe.

      Mr. ATHANE recalls that the Commission of the European Communities has decided to modify its working methods for developing the technical directives (including those for measuring instruments) ; the new directives will be limited to the essential requirements and will be completed by the European standards developed by the European Committee for Standardization (CEN) and the European Committee for Electrotechnical Standardization (CENELEC). This approach to regulation could equally be followed by the European Free Trade Association (EFTA).

      Mr. ATHANE points out that he has established the necessary contacts with CEN and CENELEC and that he has informed the OIML Member States of the EEC and EFTA. On a question from Mr. KOCH, Mr. ATHANE indicates that the problem of reciprocal recognition of metrological tests between the Member States of EEC and the Member States of EFTA is a question concerning these Institutions and not OIML.

      ## c) Council for Mutual Economic Assistance (CMEA)

      Mr. ATHANE recalls that with Mr. BIRKELAND he visited in June 1985 the Secretary General of CMEA in order to confirm the wish of OIML to continue and to strengthen its co-operation with CMEA so that, as far as possible, the metrological standards established by that Institution be based on the corresponding OIML Recommendations.

      In March 1986, Messrs. ATHANE and PETIK took part in a meeting of the Metrological Section of CMEA in order to apply, in practice the decisions taken previously on the co-operation between CMEA and OIML.

      Mr. PODGORSKI takes the floor and presents the results of the discussions between CMEA and OIML during this meeting:

      - detailed review of the problems of common interest between CMEA and OIML,

      - participation of CMEA in the OIML work,

      - analysis of the OIML International Recommendations and Documents in view of their adoption as CMEA standardization documents,

      transmission to BIML of CMEA standardization documents in view of their possible use as OIML preliminary drafts,

      — harmonization of metrological terminology used by CMEA with that of OIML,

      - harmonization of metrological terminology used by CMEA with that of OIML,

      - examination of the possibility of implementing within the framework of the CMEA multilateral agreement the OIML guidelines on bi- and multilateral recognition of test results, pattern approvals and verifications,

      - reciprocal exchange of articles to be published in the information bulletins of the two Institutions,

      - reciprocal information on the dates and agendas of meetings in view of reciprocal participation.

      M. PODGORSKI concludes confirming, in the name of all his CMEA colleagues present, the CMEA wish to develop its co-operation with OIML.

      ## d) Other questions

      Mr. ZDANSZKI provides information on certain activities of the International Atomic Energy Agency (IAEA) in the field of dosimetry and on the co-operation with the OIML Secretariats concerned, in particular SP 16-Sr 2.

      Mr. THULIN mentions the excellent co-operation between IEC and OIML which developed largely in the field of electronics. He requests the Members of the Committee to help BIML to reinforce further this co-operation.

