      Mr. PETIK recalls that the question of mutual recognition of metrological controls started to be studied about 10 years ago. An ad hoc group was instructed to study the methods of operation of an OIML certification system. At the end of the work of this ad hoc group the Committee noted that for economic and political reasons beyond its control such a system could not be set up at present. Waiting for this to become possible, SP2-Sr4 under the responsibility of the Bureau was instructed to study the possibility of punctual actions which could favor the eventual setting up of an OIML certification system.

      Four activities were defined and are proposed for study by the Committee :

      a) compilation, classification and dissemination of information concerning bi- and multilateral agreements on the recognition of test results, pattern approvals and verifications,

      b) possibility of a National Service of Metrology to take note of the reports on pattern testing by Services of other countries,

      c) reference to OIML requirements in the national decisions of pattern approval,

      d) declarations of conformity for export.

      Concerning the activities a), b) and d), the Committee adopts the following resolutions:

      a) The International Committee of Legal Metrology,

      HAVING TAKEN NOTE of the report of SP 2-Sr 4,

      HAVING EXAMINED the usefulness and the possibility of :

      - a compilation, on a continuing basis, of information relating to bi- and multilateral systems of (mutual) recognition of test results, of pattern approvals and of verifications,

      - a classification of these agreements,

      - a distribution of this information,

      REQUESTS the CIML Members to supply to the BIML the required information if they consider this to be possible and useful,

      REQUESTS the BIML to classify this information and to distribute it to Member States in a suitable form and at suitable intervals of time.

      With respect to the draft presented by SP2-Sr4, this resolution is editorialy amended as requested by Mr. CLAPHAM.

      b) The International Committee of Legal Metrology,

      HAVING TAKEN NOTE of the report of SP 2-Sr 4,

      HAVING EXAMINED the interest which knowledge of the results of tests, that may have been carried out by other national metrology services, could have for certain national metrology services to which a submission for pattern approval of the same instrument was made,

      URGES the CIML Members to facilitate the exchange of such information, which in principle may only be provided with the agreement of the manufacturer of the instrument concerned.

      With respect to the draft presented by SP2-Sr4, this resolution is editorialy amended as requested by Mr. BERTRAN.

      Furthermore, Mr. FANNING expressed his great satisfaction on the adoption of this resolution which should make it possible to avoid a lot of duplication of work between the Member States. However, in order that this resolution may be effectively implemented "points of contact" should be set up so that efficient liaisons between the Member States can be established. These points of contact could be in certain cases the Members of the Committee themselves, and in other cases, other points of contact between the Services of metrology should be established.

      Mr. KNAPP asks whether the exchange of information mentioned in the resolution should be limited to positive information (in the case of instruments which passed the tests successfully), or whether also negative information should be communicated.

      Mr. BIRKELAND confirms that the exchange of information may concern the two cases; however, in the case of negative information, the manufacturer may make objections.

      Finally, Mr. ATHANE recalls that it had been envisaged for the Bureau to hold notices of all the pattern approvals granted by the Member States. This activity was not retained since it would face enormous difficulties of realization and practical operation.

      d) The International Committee of Legal Metrology,

      HAVING TAKEN NOTE of the report of SP 2-Sr 4,

      URGES the CIML Members and the national metrological services to issue, on request, declarations of conformity for a measuring instrument or a series of measuring instruments, suitably identified, which meet the requirements established by OIML for the instrument in question,

      POINTS OUT that these declarations of conformity serve for information only and impose no obligation on the national metrological service of the importing country,

      RECOMMENDS the declarations of conformity to be in a form as shown in the example given hereafter. (*)

      With respect to the draft presented by SP 2-Sr 4, this resolution is editorialy amended as requested by Mr. NIEUWLAND.

      Mr. THULIN recalls that the declaration of conformity had already been proposed for study by the Presidential Council in order to help developing countries who are importers of measuring instruments.

      Mr. EDGERLY whilst recognizing that in principle he has no objection to this resolution declares that as far the USA is concerned this question is an exclusive matter for the internal legislation of the States and he cannot therefore engage himself on this point.

      Mr. HARVEY indicates that if Australia decides to provide such declarations it would most probably add a sentence disclaiming any responsibility of the national Authorities.

      Mr. ZSDANSZKY states that in Hungary, the decisions of pattern approval and verification of course belong to the national metrological Authorities, but the tests on which these decisions are based may very well be carried out wholly or partially by other bodies. This Resolution may therefore be useful.

      Concerning the action c), the following draft resolution was suggested to the Committee :

      The International Committee of Legal Metrology,

      HAVING TAKEN NOTE of the report of SP 2-Sr 4,

      URGES the CIML Members and the national metrological authorities to mention in national pattern approval decisions that the metrological requirements and/or test methods are based on the requirements established by OIML, whenever this applies.

      This proposal is the subject of many negative comments.

      Mr. BERTRAN states that it would be a case of interference with the formal presentation of pattern approval decisions which are administrative acts depending on the regulations in each Member State. In addition, he fears that such action will lead to contentious problems because one could interprete in different manner the correspondence between National and OIML requirements. Mr. BERTRAN concludes stating that even if the Committee resolutions are not committing the Member States they are nevertheless adopted in order to be implemented and that in this particular case he could not agree to a resolution which he would not be able to implement.

      Mr. CLAPHAM supports the statement of Mr. BERTRAN. A national pattern approval decision does not allow for any flexibility in its interpretation. Therefore he does not oppose the adoption of the resolution but considers that in the United Kingdom it will not be implemented frequently.

      Mr. DIFFO indicates that in his Country it would be difficult to make reference to non national requirements in statutory acts such as pattern approval decisions.

      Messrs. ISSAEV, KNAPP, KOCH, NIEUWLAND and PESTRAKIEVICZ suggest a certain number of modifications to the text of the resolution in order to make it more precisely defined.

      Before the discussion gets out of hand, Mr. BIRKELAND considers it necessary to proceed with a nominal vote at the end of which the draft resolution is rejected with the following results :

      YES: F.R. of Germany, German D.R., Australia, Brazil, Bulgaria, Canada, P.R. of China, D.P.R. of Korea, Cuba, Denmark, Egypt, Spain, United-States of America, Finland, Hungary, Ireland, Italy, Japan, Kenya, Norway, Poland United Kingdom, Sweden, Czechoslovakia, USSR, Yugoslavia.

      NO : Austria, Belgium, Cameroon, France, Indonesia, Morocco, Monaco, Pakistan, Netherlands, Switzerland, Tanzania.

      13. 2. Examination of the draft International Document « Guidelines for bi- or multilateral arrangements on the recognition of test results - pattern approvals - verifications 」

      Mr. PETIK presents this draft developed by SP2-Sr4. At the conclusion of a nominal vote, this draft is adopted with the following results :

      YES: F.R. of Germany, German D.R., Australia, Austria, Belgium, Brazil, Bulgaria Cameroon, Canada, P.R. of China, D.P.R. of Korea, Cuba, Denmark, Egypt Spain, Finland, France, Hungary, Indonesia, Finland, Italy, Japan, Kenya Morocco, Monaco, Norway, Pakistan, Netherlands, Poland, United-Kingdom Sweden, Switzerland, Tanzania, Czeschoslovakia, Tunisia, USSR, Yugoslavia.

      NO : United-States of America.

- number: '13.3'
  title:
