- number: '6.1'
  title:
  - spelling: eng
    value: EXAMINATION OF THE 1985-1988 DRAFT WORK PROGRAMMES
  narrative:
  - spelling: eng
    value: |2+

      Mr. BIRKELAND recalls the reasons for which the Conference decided to introduce a planning procedure in the working method of the OIML Secretariats. He summarizes the action undertaken for this purpose by the Committee, the Presidential Council and the various Pilot and Reporting Secretariats resulting in the presentation of the draft work programmes to the Committee which in certain cases are accompanied by comments of Member States or the Bureau. He then requests the Committee Members representing the countries responsible for Pilot Secretariats to present the work programmes they are concerned with. As pointed out by Mr. BIRKELAND, these brief presentations are not intended to start a discussion, except in special cases, or when there are basic objections against the draft, or in case of proposals to create or to suppress Secretariats. The detailed comments shall be examined by the experts of the Pilot and Reporting Secretariats concerned who are free to introduce any necessary improvements or modifications into the work programmes.

      (BIML note : these presentations which in most cases reproduce the contents of the work programmes are not presented in this report. Only the decisions and discussions relating to certain Secretariats are given below).

      Suppression of Secretariats : SP 7-Sr 1 « Terminology (mass) »

      SP 12-Sr 1 « Terminology (temperature) »

      SP 13-Sr 2 « Wattmeters »

      SP 13-Sr 7 « Terminology (electricity) »

      New allocations : SP 6-Sr 3 « Differential pressure gas meters », France

      Creations of Secretariats : SP 5D-Sr 8 « Electromagnetic meters », not yet allocated

      SP 5D-Sr 9 « Vortex meters », Japan

      SP 17-Sr 5 « Measurement of hazardous wastes pollution », USA

      SP 30-Sr 13 « Breath testers », France

      being understood that these creations become final only if the conditions laid down in the « Working method of the OIML Secretariats » are complied with. In addition, the Bureau is instructed to carry out inquiries concerning the creation of international working groups of these Secretariats.

      The Committee instructs the Presidential Council to examine the situation of the following Secretariats :

      - SP1 « Terminology » as well as the Reporting-Secretariats dealing with the terminology within other Pilot-Secretariats,

      - — SP 14 « Acoustics and vibration »,

      - SP16 « Ionizing radiation » and SP17-Sr3 « Measurement of radionuclide pollution 》，

      — SP 27-Sr 2 « Classification of reference materials »

      as well as the possible creation of new Secretariats which should deal with « uncertainties of measurement » and « recalibration intervals » (within SP21 and SP23 respectively).

      Finally, the Committee instructs the Bureau to carry out an inquiry concerning the possible creation of new Secretariats which should deal with mass meters (within SP 5D) and luxmeters (within a Pilot-Secretariat yet to be defined).

      The following Secretariats were the subject of discussions:

      - SP 21 « Terminology 1 : following the contradictory proposals from Mr. PODGORSKI, who suggests the systematic creation of Secretariats « Terminology within all fields of OIML work, and from Mr. EDGERLY, who suggests systematic suppression of all Secretariats « Terminology 1 except SP 1-Sr 1, Mr. BIRKELAND decides that the Presidential Council will examine this problem.

      - SP4 « Lengths 1 : it is recalled that ISO attaches some importance to the activities of the mixed ISO-OIML working group on the terminology of dimensional metrology.

      - SP 5D Volume of liquids : at the request of Mr. NIEUWLAND, the problem of the verification of mass meters, for example of the Coriolis type, should be re-examined since meters of this type are more and more frequently used and it would be appropriate for OIML to start work in co-operation with ISO.

      - SP 14 « Acoustics and vibration 1 : on a proposal from Mr. MUHE to consider suppression of this Pilot-Secretariat, Messrs KOCH and PETERSEN, responsible for SP 14-Sr 1 and 3 respectively express reservations inducing Mr. BIRKELAND to decide that the Presidential Council will examine this problem.

      - SP 16 《 Radiation 》: Mr. ZSDANSZKY underlines that the International Atomic Energy Agency hopes that the OIML International Document on 《 Secondary standards dosimetry laboratories 》will be published as soon as possible.

      - SP 16 « Radiation » and SP 17-Sr 3 « Radionuclide pollution 1 on a request from Mr. IIZUKA, Mr. BIRKELAND decides that the Presidential Council will examine the relation between these Secretariats. Mr. THULIN recalls that in spite of its title, SP 17-Sr 3 should deal with instruments and not with measurement methods.

      - SP17《 Pollution 》：Mr. EDGERLY requests his colleagues of the Committee to strengthen their participation in the work of SP17, by contacting the national bodies which deal with the problems of pollution and by convincing them to work for OIML ; its activity (concerned with instruments) differs clearly from the activities of ISO and IEC and does not duplicate their work.

      - SP21 « Metrological characteristics of measuring instruments 1 : the proposal of Mr. ISSAEV to create a new Secretariat on the uncertainties of measurement should be examined in close liaison with the activity of the BIPM-IEC-ISO-OIML working group dealing with the same subject. Mr. BIRKELAND decides that the Presidential Council will examine this problem.

      - SP 23 Verification devices 1 on a proposal from Mr. ISSAEV, Mr. BIRKELAND decides that the Presidential Council will examine the request from Czechoslovakia to create a new Secretariat dealing with recalibration intervals.

      - SP 27 « Reference materials 」: Mr. ISSAEV expresses reservation on a proposal by Mr. EDGERLY to suppress Sr2 dealing with classification of reference materials and Mr. BIRKELAND decides that the Presidential Council will examine this problem.

      - SP 30 « Physico-chemical measurements 」: Mr. ATHANE recalls the request from IUPAC to revise RI 54 « pH-scale 」in order to take into account the new pH scale.

      - " Photometry " Mr. THULIN recalls the results of the inquiry carried out by the Bureau on this subject. It appears that it is possible for OIML to proceed with work on certain types of instruments, without duplicating the work of CIE $ ^{*} $ but taking that work as a base. Mr. IIZUKA mentions the work of IEC/TC 172. Mr. CLAPHAM considers that OIML risks encountering difficulties if it tries to fix accuracy classes for luxmeters, given that the CIE experts were not able to reach a satisfactory conclusion on this subject. Mr. KOCH indicates his interest to participate in the OIML work on this subject, taking into account the Swiss experience in the field of lighting of streets and tunnels. Mr. THULIN states that, depending on the countries, different bodies are responsible for the legislation on the problems of lighting and that it is difficult for OIML to obtain the participation of all the experts, if the Metrology Services do not make an effort to establish liaisons with the national bodies which deal with these problems. Mr. BIRKELAND states that similar discussions have already taken place during earlier meetings of the Committee without reaching a tangible result. He decides that the Bureau will carry out a final inquiry on the creation of a new Secretariat dealing with luxmeters and that this Secretariat will automatically be activitated provided that a country accepts the responsibility for it and that there is a sufficient number of collaborating participants.

- number: '6.2'
  title:
  - spelling: eng
    value: Adoption of the final work programmes
  narrative:
  - spelling: eng
    value: |2+

      At the conclusion of this examination the Committee adopts the following resolution:

      The International Committee of Legal Metrology

      HAVING TAKEN NOTE of the draft work programs elaborated by the different Pilot Secretariats for the 1985-1988 planning period,

      HAVING TAKEN NOTE of the comments submitted on this subject by certain Member States,

      HAVING HEARD the oral presentations of Committee Members responsible for the Pilot Secretariats,

      NOTING that the planning work was carried out according to the directives established for this purpose by the Presidential Council of the CIML and adopted by the Committee and the Conference in 1984,

      CONGRATULATES the Pilot and Reporting Secretariats on the work already completed,

      INSTRUCTS the Secretariats to implement their respective work programs, taking into account, as far as possible, all the comments and advice received, including the remarks from the Presidential Council concerning those work programs which the Committee has referred to the Council for supplementary study, as appropriate,

      REQUESTS the Secretariats to use the annual reports in order to compare the actual progress of the work with the forecasts made,

      INSTRUCTS the Bureau to prepare a harmonized presentation of the work programs for 1985-1988, in particular, in order to provide information for those International Institutions which are active in the fields linked with those of the OIML.

- number: '6.3'
  title:
  - spelling: eng
    value: Directives for future planning
  narrative:
  - spelling: eng
    value: |2+

      In order to guide the Secretariats and the Bureau in their future planning activities the Committee adopts the following resolution:

      ## The International Committee of Legal Metrology

      CONSIDERING the advantages of an appropriate planning procedure for the work of the OIML Secretariats,

      EXPRESSING its satisfaction with the planning work for the 1985-1988 period,

      CONSIDERING however that this procedure could be improved,

      INSTRUCTS the Presidential Council to study the necessary improvements and to submit its proposals to the Committee, either by correspondence or during the 22nd CIML meeting but in any case in good time so that planning for the 1989-1992 period may be carried out according to this improved procedure.

