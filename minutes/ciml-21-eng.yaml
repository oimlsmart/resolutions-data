      Mr. ATHANE indicates that he made final contact with FIDJI and JAMAICA, Corresponding Members who have not paid their subscriptions. No reaction followed and, in conformity with the 7th Conference, these two Corresponding Members are considered to be in suspension ]. All correspondence and dispatch of documentation has stopped between the Bureau and the two countries who could be reinstated if they pay the amounts due.

