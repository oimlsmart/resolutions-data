      ## Élection du Président du CIML

      Les deux Candidats, Dr. Bennett du Royaume-Uni et M. Faber des Pays-Bas, se présentent et exposent leurs points de vue sur l'avenir de l'OIML. M. Faber indique qu'il sera disponible seulement pour trois ans.

      Suite à deux votes secrets consécutifs, le CIML élit (avec la majorité requise) M. Faber comme Président pour les trois prochaines années.

      ## Élection du Second Vice-Président du CIML

      Les trois Candidats, Dr. Imai du Japon, Dr. Issaev de la Fédération de Russie et M. Johnston du Canada, se présentent et exposent leurs points de vue sur l'avenir de l'OIML.

      Après trois votes secrets successifs le CIML élit (avec la majorité requise) Dr. Issaev comme Second Vice-Président pour les six prochaines années.

