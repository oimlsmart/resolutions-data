      ## Examen de la situation de certains TC/SC, si approprié

      M. Szilvassy indique qu'un rapport plus complet sera présenté à la Conférence et que le CIML doit seulement examiner la situation d'un petit nombre de Comités Techniques ou de Sous-Comités.

      En ce qui concerne le TC 5, les deux Sous-Comités sur les instruments de mesure électroniques et les logiciels travaillent indépendamment et il n'est par conséquent pas nécessaire que le secrétariat de ce TC soit attribué à un État Membre puisque le TC lui-même n'a pas d'activité à poursuivre. La situation est différente pour le TC 13 sur l'acoustique et les vibrations, qui est responsable de plusieurs thèmes de travail et d'une coopération étroite avec la CEI et l'ISO. La responsabilité du TC 8/SC 2 sur le mesurage statique massique des quantités de liquides a été récemment abandonnée par l'Australie, mais il reste encore du travail à effectuer sur un format de rapport d'essai pour la R 125. Enfin, les Pays-Bas ont indiqué qu'ils limiteraient leurs responsabilités au sein du TC 16/SC 1 (mesurage des polluants dans l'air) au développement d'un format de rapport d'essai pour la R 99; la Fédération de Russie a informé le BIML de son désir de prendre la responsabilité des trois autres thèmes de travail de ce SC.

      Concernant le Plan d'Action pour 1999-2002, M. Szilvássy annonce qu'une liste de thèmes de travail hautement prioritaires a été préparée par le BIML sur la base d'une enquête menée récemment et que cette liste sera soumise à la Conférence. De plus, une liste de thèmes prioritaires est en cours d'élaboration; les deux listes seront ensuite distribuées à tous les Membres de l'OIML après la Conférence.

      M. Szilvássy declare également qu'un document additionnel sur les travaux des TC/SC est en cours de préparation et sera distribué à la fin de l'année; ce document donne la liste des thèmes en cours et des détails du processus de réexamen des publications existantes avec les propositions de leur reconfirmation, révision ou retrait.

      M. Issaev confirme que la Fédération de Russie assumera la responsabilité des trois thèmes de travail non couverts par les Pays-Bas dans le cadre du TC 16/SC 1 et cela est accepté par le Comité. Il explique que son pays étudie également la possibilité de prendre la responsabilité du TC 8/SC 2, dans la mesure où le travail se limite au développement d'un format de rapport d'essai pour la R 125. Confirmation en sera donnée plus tard.

      M. Apel exprime sa préoccupation concernant les risques de répétition du travail entre le TC 5/SC 2 sur les logiciels et d'autres organes techniques de l'OIML; il lui est répondu que le TC 5/SC 2 Logiciels, ainsi que le TC 5/SC 1 Instruments électroniques, sont des organes techniques "horizontaux" qui doivent coopérer avec un certain nombre d'autres TC/SC, cette coopération permettant l'elimination de toute répétition.

