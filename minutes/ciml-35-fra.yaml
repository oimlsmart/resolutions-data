      Le Comité accepte le projet d'ordre du jour et le programme proposé pour la Onzième Conférence. Il approuve également les propositions faites par le Royaume-Uni et par le Président du CIML de nommer:

      - Dr. Foster, Directeur des Services d'Innovation au Département du Commerce et de l'Industrie du Royaume-Uni comme Président de la Conférence, et

      - Dr. Pákay, Membre du CIML pour la Hongrie et M. Beard, Membre du CIML pour l'Afrique du Sud comme Vice-Présidents de la Conférence.

