      Le Candidat choisi par le Comité de Sélection, M. Magana, France, se présente et expose son point de vue sur le rôle du BIML au sein de l'OIML.

      Suite à un vote secret, le Comité nomme (avec la majorité requise) M. Magana comme futur Directeur du BIML.

