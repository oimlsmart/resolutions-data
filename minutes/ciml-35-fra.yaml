      ## Examen des décisions prises par la Conférence

      M. Faber passe rapidement en revue les décisions prises par la Onzième Conférence et suggère que le Comité charge le Conseil de la Présidence de les mettre en pratique, bien que certaines actions aient peut-être à être entreprises par le Président du CIML ou le Présidium. Le Comité exprime son accord avec cette procédure.

