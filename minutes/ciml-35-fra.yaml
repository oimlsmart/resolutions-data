    value: Nomination d'un Membre d'Honneur du Comité
  narrative:
  - spelling: eng
    value: |2+

      Sur la base d'une proposition faite par M. Faber, Président du CIML, le Comité approuve à l'unanimité la nomination de Dr. Samuel Chappell, Premier Vice-Président sortant et Membre du CIML pour les États-Unis, comme Membre d'Honneur du Comité.

      M. Faber évoque la carrière de Dr. Chappell en tant que Membre du CIML pour les États-Unis et Vice-Président du CIML, et le rôle qu'il a joué dans le développement de la participation des États-Unis aux activités de l'OIML et en contribuant à l'amélioration de nombreux aspects du travail de l'OIML.

