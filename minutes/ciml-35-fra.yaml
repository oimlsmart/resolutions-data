      ## Adoption du rapport comptable pour 1999

      Le Comité adopte le rapport comptable pour 1999 et demande à son Président et au Directeur du BIML de le soumettre à la Onzième Conférence.

- number: '4'
  title:
  - spelling: eng
    value: Activités du Conseil de la Présidence
  narrative:
  - spelling: eng
    value: |2+

      M. Faber informe les participants que le Conseil de la Présidence s'est réuni deux fois en 2000, en février au BIML comme d'habitude, puis à Londres le dimanche 8 octobre pour une brève réunion informelle. M. Faber explique que l'existence du Conseil de la Présidence n'était pas prévue dans la Convention de l'OIML, mais que son utilité a fait ses preuves au cours des années. Ses deux principales responsabilités sont de conseiller le Président et de préparer et de mettre en œuvre les décisions du CIML, ou de la Conférence pour ce qui est des décisions budgétaires et afférentes à la politique à long terme. C'est pourquoi la réunion qui s'est tenue à Paris en février 2000 s'est concentrée principalement sur la situation financière de l'OIML et la préparation du budget 2001-2004, ainsi que sur un examen complet du Plan d'Action. Par ailleurs, le Conseil de la Présidence a examiné les préparatifs de la Table Ronde sur la Reconnaissance Mutuelle et la réunion BIPM/ILAC/OIML qui a suivi la réunion du Conseil.

