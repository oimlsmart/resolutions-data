      ## Situation de certains Membres

      Le Directeur du BIML distribue une liste indiquant, pour chaque État Membre de l'OIML, sa population (selon les informations données par les Membres du CIML ou provenant d'autres sources officielles) et la classe de contribution proposée; les États Membres bénéficiant d'une classe de contribution inférieure à celle assignée par leur population sont signalés dans la liste. Il est à noter que la classification des États Membres est la même que pour les années précédentes (bien que certaines populations aient pu changer et certains États Membres en développement aient pu demander à être maintenus dans la même classe de contribution). Le CIML accepte que cette liste puisse servir de base pour déterminer les contributions des États Membres pour les quatre prochaines années (Note: voir la Résolution adoptée par la Onzième Conférence sous Point 8.3 de son ordre du jour).

      Il est aussi signalé que certains autres aspects liés à la situation de certains Membres seront examinés directement par la Onzième Conférence.

