      M. Athané fait quelques commentaires concernant un rapport écrit sur les activités du BIML depuis la dernière Réunion du CIML; ce rapport a été distribué à tous les Participants. Il explique que ce rapport montre une augmentation significative de certaines activités du BIML liées, par exemple, à la participation aux travaux techniques de l'OIML, à la représentation de l'OIML dans les réunions d'autres organismes internationaux et régionaux, au rôle qu'il joue en tant que secrétariat du Conseil de Développement, à la publication de documents et au développement de moyens de communication, etc. En conclusion, M. Athané déclare qu'il est convaincu que le futur Directeur du BIML, avec l'aide du Personnel actuel du BIML, sera en mesure de poursuivre cette progression et ce développement en termes de qualité et de quantité de travail du BIML. Il est annoncé également que le rapport sur les activités du BIML sera publié dans un format approprié dans la prochaine parution du Bulletin de l'OIML.

