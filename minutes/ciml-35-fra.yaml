    value: 36ème Réunion du CIML (2001)
  narrative:
  - spelling: eng
    value: |2+

      M. Issaev confirme que le Comité est invité à tenir sa prochaine réunion à Moscou entre le 22 et le 27 septembre 2001. Cette invitation est acceptée et le Comité demande à son Président et au BIML de commencer les préparatifs en temps voulu en étroite coopération avec le pays hôte.

      M. Birch dit que l'Australie avait proposé d'accueillir une réunion du CIML en 2001 à l'occasion de la célébration du centenaire de la Fédération; cependant, puisque Moscou a été choisie pour la Réunion du CIML en 2001, il n'y a plus lieu pour l'Australie de maintenir son invitation.

- number: '11.2'
  title:
  - spelling: eng
    value: 37ème Réunion du CIML (2002)
  narrative:
  - spelling: eng
    value: |2+

      M. Zarin confirme qu'Israël désire accueillir la Réunion du CIML en 2002. Le Comité prend note de cette invitation pour laquelle il remercie M. Zarin et décide que la décision finale sera prise lors de sa prochaine réunion.

