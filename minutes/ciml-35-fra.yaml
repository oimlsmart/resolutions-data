      Il est procédé à la lecture du texte des décisions proposées; le Comité les adopte avec des corrections mineures et le texte final des décisions est reproduit sur les pages qui suivent.

      ## Clôture

      M. Faber exprime sa satisfaction pour le travail effectué lors de la 35ème Réunion du CIML et déclare que les remerciements qu'il a adressés lors de la clôture de la Onzième Conférence sont bien entendu également applicables à cette réunion. Il note également que le Présidium du CIML inclut maintenant trois personnes originaires d'Europe et qu'il tiendra dûment compte de ce fait lors de l'établissement du nouveau Conseil de la Présidence afin que les diverses régions du monde soient représentées équitablement. Enfin, M. Faber déclare close la 35ème Réunion du CIML.

      ## Décisions

      ## Allocution d'ouverture

      Le Comité a pris note d'une allocution d'ouverture de son Président.

      ## Appel des Délégués - Quorum

      L'appel des Délégués a été effectué. Il a été constaté que le quorum statutaire des trois quarts du nombre total de Membres du CIML était atteint. Le Comité a aussi noté la participation d'un certain nombre de Membres Correspondants et d'Organisations Régionales de Métrologie Légale, du Président sortant du CIML et de quatre membres du BIML.

      ## Adoption de l'ordre du jour

      Le Comité a approuvé le projet d'ordre du jour ODJ 2 sans modifications.

