    Also, at the first Round Table interim meeting, Mr Pavel Klenovský had offered to make a special presentation on smart electricity meters at the annual Round Table meeting. This proposal was gladly accepted by everyone. However, due to unexpected technical difficulties, he had been unable to make this presentation, although he has agreed to try again at the next interim Round Table meeting which will take place on 20 January 2022. Another important outcome of the first interim meeting was to develop a common PowerPoint presentation format for use when providing RLMO updates at the annual Round Table meetings in order to bring some uniformity to the information being provided, as

    well as to provide the information which is considered to be of most benefit to the attendees. Dr Ehrlich explained that the five main headings used by presenters had been:

    - overview of significant developments and activities during the past year in the RLMO;

    - overview of the most urgent technical and other legal metrology issues in the region during the past year in the RLMO;

    - anticipated calendar of events for the coming year in the RLMO;

    - comments on RLMO discussion topics for this year; and

    - summary/concluding remarks.

    He pointed out that all the presentations could be found on the new Round Table page on the OIML website.

    Another important outcome from the first interim Round Table meeting had been that there would be a single discussion topic at the annual Round Table meeting. It was decided that this topic should be "How is your RLMO approaching digitalisation pertaining to measuring instruments in your region?", which was chosen in recognition of the significant international attention this subject has gained over the last few years, as had already been heard this week. Delegates had also heard how the BIPM was intending to make its core documents, such as the SI Brochure, machine accessible and readable using the so-called FAIR principles. As delegates had also heard this week from Dr Schwartz, the OIML is also establishing a Task Group on digitalisation.

    During the individual RLMO presentations, it had become clear that the implementation of digitalisation varied between regions, and he would discuss this more later. In fact, the term "digitalisation" itself is sometimes interpreted in different ways, which will undoubtedly be an interesting and important topic for the Round Table to follow for quite a while.

    The annual Round Table meeting had also discussed possible topics for the next interim Round Table meeting:

    - continue the annual RLMO Round Table meeting as a virtual meeting, to provide an opportunity for people to attend who would not be coming to in-person CIML meetings;

    - make it a two-day event, with updates one day, and the annual discussion topics and specialty topics on the second day;

    - open participation in the annual RLMO Round Table meeting to anyone who wants to attend (to promote broader awareness of what is happening in the regions);

    - keep the interim RLMO Round Table meetings closed (using them primarily as planning and 'special-issue' meetings);

    - hold quarterly interim Round Table meetings; and

    - obtain more clarification from the CEEMS countries in the regions on what the new 'Part 5' of OIML Recommendations (verification requirements) should contain.

    Dr Ehrlich indicated that the first two suggestions concerned next year's annual Round Table meeting. The first of these would allow a greater number of people to attend, even if CIML meetings can be held in-person, and gives great flexibility about when the annual Round Table meeting could be held. In the last two years, it has been held a week or two before the CIML meeting, rather than during the same week. The idea of quarterly meetings was also being explored since the next interim Round Table meeting was already planned for January 2022.

    The final topic suggestion had stemmed from the recent Project Group meeting on the revision of R 76, and was to see whether CEEMS in the regions could help in defining what should be included in the proposed "Part 5" to Recommendations and which requirements of Recommendations should be used for verification rather than type evaluation.

    Dr Ehrlich concluded his presentation with some highlights from each of the individual RLMO presentations:

    - AFRIMETS: Mr Jaco Marneweck had explained that the new African Continental Free Trade Agreement had come into force in May 2019, which he said had created the largest free trade area in the world by number of participating countries (55). It would connect 1.3 billion people, and has the potential to lift millions out of extreme poverty. He had added that this would require significant policy reform and trade facilitation measures across Africa. Mr Marneweck had also pointed out that digitalisation was still at the emerging or developmental stage in many African countries.

    - APLMF: The new APLMF president, Dr Osman Zakaria from Malaysia, gave the report since his country has just taken over this RLMO's secretariat. He reported that there were currently 27 APLMF member economies, and that a new five-year strategic plan had been developed. Dr Zakaria had also informed the meeting that the APLMF had conducted a number of seminars and training sessions over the last year using Zoom. These had included e-Learning modules on NAWIs, on fuel dispensers, and soon on conformity to type. A workshop was also being planned to explore the scope of digitalisation efforts in the Asia-Pacific region.

    - COOMET: Dr Yuriy Kuzmenko reported on the history of COOMET, which was celebrating its 30th anniversary, for which Dr Ehrlich offered his congratulations. COOMET TC 2 on legal metrology had held a well-attended webinar on "The role of measurement uncertainty in conformity assessment decisions in legal metrology", which made use of OIML G 19 on this topic. Dr Ehrlich reported that a video of this event could be found on YouTube. COOMET had also held (the day before) a workshop on digital transformation in metrology for young metrologists, and has established a new Working Group on "digitalisation in metrology" led by a young researcher from the Russian Federation.

    - GULFMET: Eng. Omar Kanakrieh had reported that the CIPM had now admitted GULFMET as a full member of the Joint Committee on Regional Bodies (JCRB), including voting rights, and Dr Ehrlich congratulated GULFMET on this achievement. Also, the GCC Common Metrology Law is being updated, and a GCC certification scheme is being developed based on the OIML-CS, which was an exciting development. GULFMET will also decide on a proposal to establish a Working Group on digital transformation at the next GULFMET GA in November 2021.

    - SIM: Mr Pedro Pérez, chairman of the SIM Legal Metrology Working Group (LMWG), reported that a repository on metrological verification of prepackaged products in SIM countries is under development. He also noted that the SIM web page on legal metrology had been updated, and that meetings of the SIM LMWG are being held every three months to discuss topics of relevance to SIM members. Dr Ehrlich reported that he had enjoyed participating in these meetings. Mr Pérez had also pointed out that translations of documents and meetings is a key need in the SIM countries, since there are around 30 countries in the region, and not everyone can speak or understand each other's languages. There is also a lot of activity in SIM concerning digitalisation, with four countries having active programmes in this area: SIMEL (Colombia), RBMLQ-I (Brazil), SICOMET (Argentina) and, recently, INACAL (Peru).

    - WELMEC: The chairman, Mr Klenovsky, had reported that WELMEC was now fully established as a legal body and is moving towards closer cooperation with EURAMET to provide a single voice for metrology in Europe. He also noted that the regulation of smart meters, electric vehicle charging stations, and hydrogen refuelling stations are all active areas of interest within WELMEC. Software validation and digitalisation had been an important topic for many years, especially within WELMEC WG 7, and work was ongoing to establish more trust in the area of smart meters.

    Dr Ehrlich concluded by saying that this had been just a brief overview of the Round Table discussions and presentations, and he encouraged all delegates to go to the new Round Table web page on the OIML website for more details on the many individual presentations. He thanked delegates for their attention and asked if there were any questions.

    Dr Schwartz thanked Dr Ehrlich for his report. He felt that all delegates would agree that the Round Table had developed very well under his leadership despite the pandemic situation. He felt that perhaps he should rather say that Dr Ehrlich had made a "virtue out of a necessity" by taking advantage of video technology to hold online meetings between the usual annual meetings. On behalf of the Committee, he therefore thanked Dr Ehrlich for his commitment and efforts since taking over the chair. He was sure that Dr Ehrlich would welcome any feedback on the activities of the Round Table, so he again asked if there were any questions. There being none, he invited delegates to consider the relevant draft resolution, which was read by Mr Dunmill:

    Draft Resolution CIML/2021/33

    The Committee,

    Notes the report on the RLMO Round Table meetings given by its Chairperson.

