    During the past year, several BIML staff members had contributed a number of significant best-practice examples highlighting the work carried out by the OIML to the Compendium of International Organisations' Practices (IO Compendium). Mr Donnellan specified that the IO Compendium offered a single repository to demonstrate how various International Organisations were striving to improve both the quality and the impact of their rule-making, which of course included the OIML. He commented that it offered a good opportunity for International Organisations to reflect on the efficiency of their practices, which, as delegates knew, the OIML did on a regular basis. The IO Compendium built on the practical experiences of these International Organisations, including the OIML, and compiled these best practices into one document which was available on the OECD website and which had been

