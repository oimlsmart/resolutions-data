- number: '1'
  title: Opening remarks and meeting protocol
  narrative: |2+

    The President of the CIML, Dr Roman Schwartz, greeted delegates and opened the 56th CIML Meeting, which he stated was also the second CIML meeting held online. He continued that after the successful first online CIML meeting the previous year, he was sure most delegates had expected and hoped that they could return to an in-person CIML meeting and International Conference this year, but unfortunately the ongoing pandemic had again prevented an in-person meeting.

    On the other hand, he was pleased to announce that a record number of participants had registered for this year's online meetings, with more than 250 participants in both the 56th CIML Meeting and the 16th International Conference ("the Conference”), representing about 80 countries and economies from all continents. There were 59 Member States present or represented, and therefore the quorum was easily achieved.

    Dr Schwartz welcomed delegates, specifically mentioning CIML Members, Corresponding Member Representatives, the representatives of observer countries and economies, representatives of Organisations in Liaison, and last but not least the Honorary Members and other distinguished guests.

    Dr Schwartz thanked the BIML Director, Mr Anthony Donnellan and the BIML Staff for their outstanding commitment and the excellent preparation, not only of the second CIML meeting held online, but also of the first online OIML Conference, which would be held on 20 and 21 October.

    He also thanked all those CIML Members who had participated in the various enquiries and surveys that had been circulated following the previous CIML meeting. The results of these enquiries had revealed an overwhelming majority of Member States and Corresponding Members supported online meetings with online voting carried out during the meetings, so we would now take the next step and conduct online voting immediately after each session of this year's CIML meeting and Conference. The voting would again use the online voting tools that had been developed by the BIML the previous year, which were hosted on the restricted access area of the OIML website, and which had been successfully tested after last year's CIML meeting.

    Last but not least, Dr Schwartz extended a warm welcome to the interpreters, Mr Marc Potentier and Mr Gary Hutton, who many delegates knew from previous CIML meetings. He was pleased that the Organisation was again able to offer simultaneous interpretation from English to French, and vice versa, using the interpretation function of Zoom. He presumed delegates knew how to use this feature, since it had been explained during the test-runs that had been offered on 7 October.

    He hoped the meeting would be a success and now wanted to hand over to BIML Assistant Director, Mr Ian Dunmill who would explain the meeting schedule, the protocol for the meeting, and the process for approval of the resolutions.

    Mr Dunmill thanked Dr Schwartz and went on to explain basic Zoom functions and the meeting protocols.

    Dr Schwartz thanked Mr Dunmill. He thought the meeting protocol was clear and added that everyone was now becoming familiar with using Zoom and other video technology systems, so he was confident that it would work well. He asked delegates to consider the next item.

- number: '2'
