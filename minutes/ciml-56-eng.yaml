- number: '7.4'
  title: Member State and Corresponding Member classes and fees
  narrative: |2+

    Dr Schwartz said that Mr Donnellan would again present the next item, and drew attention to the supporting document which had been provided in Addendum 7.4.

    Mr Donnellan stated that two agenda items were referenced on the cover page of his first slide [CIML PowerPoint Presentation 7.4, slide 1], as this presentation would be repeated at the Conference. With regard to this CIML agenda item, his presentation would deal with Member State and Corresponding Member classes and fees for the next financial period. The presentation would summarise the Addendum that had been published online in July of the current year.

    Mr Donnellan started with some background information, stating that since the 14th Conference in 2012, OIML Members had benefitted from firstly a reduced base contributory share in absolute terms (from €14 500 to €14 000) and secondly a flat and non-indexed base contributory share of $ \epsilon $14 000 from 2013 to the present time. Mr Donnellan said that the consequence of this for Member States and Corresponding Members was a real-term reduction in contributions of 12.5 % for Member States during the period 2012 to December 2021.

    Mr Donnellan continued that following a peak in 2018, various operating costs of the Organisation had been reduced because of the implementation of new innovative cost-saving and austerity measures. These had included a review of capital expenditure requirements, new procurement procedures, the implementation of digital communication initiatives, and enhanced debt management practices. He reported that these initiatives had resulted in a reduction in operating costs, significantly improving the budget outcome which he had just detailed under agenda item 7.1 on the 2020 accounts. Combining these initiatives with the impact of the pandemic, as he had also referenced earlier, Mr Donnellan said that non-salary expenditure excluding depreciation and uncollected funds had been reduced by

    €222274 or 49.5 % in 2020 compared with 2019, and €497883 or 68.7 % compared with the 2018 expenditure. Total non-salary expenditure had been reduced by €277981 compared with 2019, which equated to 40.7 %, and by €633422 or 61 % compared with 2018. Mr Donnellan stated that details on the cost-saving and austerity measures implemented by the BIML had been presented in Addendum 7 to the Working Document for the 16th Conference. He considered that the Organisation was approaching a point of diminishing returns on any remaining cost savings, austerity and reform measures that could be taken. This was combined with the need to provide a continued high level of service to Members and other stakeholders, in conjunction with a growing list of additional activities.

    Mr Donnellan stated that the CIML President, in consultation with the Presidential Council, had endorsed sustainable budget principles. These had included responsibly indexing Member contributions to account for known cost increases. Mr Donnellan said that he wanted to highlight the word "responsibly" in this statement, as this was a key word. He added that that these sustainable principles would enable the OIML to gradually address and reduce the impact of the flat and non-indexed contributory share which had been in place since 2013. He stressed that in this way, the OIML would be able to maintain existing levels of service to Members, and also plan for new demands.

    Mr Donnellan stated that the sustainable budget principles would require annual deficit budgets for the entire 2022-2025 financial period, which would result in an overall deficit budget for the next financial period. He said that without Member contribution increases, the proposed budget for 2022-2025, and the subsequent impact on future budgets, would not conform with these sustainable budget principles, which had been endorsed by the CIML President, in consultation the Presidential Council.

    Moving on to the budget policy and strategy, Mr Donnellan reported that again, the CIML President, in consultation with the Presidential Council, had endorsed the 2022-2025 budget policy and strategy. This would include the application of an annual indexation factor of 1.5 % to the Member State base contributory share, which would result in increasing the base contributory share by €200 per annum. This was the equivalent to an indexation of only 1.4 % per year over the budget period, which was the lowest increase ever for OIML Member States, excluding the years in which no increase had been sought.

    With regard to the budget policy and strategy relating to Corresponding Members, Mr Donnellan remarked that for a long time there had been an increased level of Corresponding Member participation in OIML activities. He mentioned that Corresponding Members benefitted from, and contributed to, the majority of the OIML's work. He considered that Corresponding Members and Member States had become more equal since the category had originally been created in the OIML Convention. The Corresponding Member fee was currently $ \epsilon1\ 400 $ , which was the equivalent of 10% of the base contributory share for a Class 1 Member State, and this was regardless of the Corresponding Member's population and size of its economy. Mr Donnellan said that analysing this situation had required a review of the financial contributions of the different categories of Members and classes within these categories. He said the objective of this review had been to achieve greater levels of fairness and equity between the different categories of membership.

    Following the review, a proposal had been sent to all CIML Members suggesting that Corresponding Members should be allocated to a membership class in the same way as Member States, in accordance with Article XXVI of the OIML Convention. The proposal had also been made that the annual Corresponding Member fee should progressively increase until it became 50 % of the annual Member State contribution for their applicable class in 2028. The allocation to a membership class would occur in 2023 and the progression would commence in 2024.

    Mr Donnellan reported that there had been overwhelming CIML support to classify Corresponding Members in the same way as Member States. The CIML President, in consultation with the Presidential Council, had decided to endorse this overwhelming support in accordance with the OIML Convention. After reclassification, the annual Corresponding Member fee would progress to become 50 % of the annual contribution of a Member State of the same class over a five-year period. Mr Donnellan stated that this decision had been communicated to all the OIML Members in February 2020.

    Mr Donnellan continued that according to the OIML Convention, the number of base contributory shares paid by Member States according to their class was one for Class 1, two for Class 2, four for Class 3, and eight for Class 4. Mr Donnellan pointed out that article XXVI (1) of the Convention classified Member States according to the size of their population. He added that to determine their respective shares, Member States were divided into four categories, according to the total population of the home country and territories represented. He read out the categories as follows:

    Class 1: population $ \leq10 $ million;

    Class 2: population >10 million $ \leq 4 0 $ million;

    Class 3: population > 40 million $ \leq100 $ million;

    Class 4: population >100 million;

    He added that Member States may be placed in a lower class when the use of measuring instruments was clearly below the average.

    Mr Donnellan stated that a classification review had been conducted based on a review of the most recently published World Bank data in 2021, and the outcome was that the following Member States would be reclassified in 2023:

    Egypt, Arab Republic of, from Class 2 to Class 3;

    Iran, Islamic Republic of from Class 3 to Class 2;

    Viet Nam from Class 1 to Class 2.

    Mr Donnellan stated that the annual Member State base contributory share for a Class 1 Member State, as defined in Article XXVI, paragraph 1 of the OIML Convention was €14000 for 2021. The base contributory share would be increased by €200 per year, which was an average indexation of 1.4 % per year over the budget period in the following manner:

    2022:€14200;

    2023:€14400;

    2024:€14600;

    2025: €14 800.

    Mr Donnellan added that it had been proposed to maintain the entry fee referenced in Article XXVIII of the Convention for new Member States at €0 for the period 2022-2025.

    He continued that Corresponding Members would be allocated to their classes in 2023 using the same criteria as he had just specified for Member States. He added that the increase in the annual Corresponding Member fee would start in 2024, and would progressively continue, with the aim of becoming 50 % of the annual Member State contribution for their applicable class in 2028. He added that this would have to be confirmed at the 17th Conference, since 2028 fell in the next financial period after the one for which the proposed budget would be put forward for approval at the 16th Conference during the current week. The proposed progression of the base contributory fee for Corresponding Members was therefore:

    2022:€1420;

    2023:€1440;

    2024:€2010;

    2025: €2820.

    Mr Donnellan went on to discuss the impact of the COVID-19 pandemic on the 2022-2025 budget, which he observed had affected the class to which Members are allocated. Due to enhanced economic prosperity and population growth from the 2019 data, some Member States had been due to be moved to a higher class, but the pandemic had resulted in negative economic growth and activity in several cases. These outcomes had been recorded in the 2020 World Bank data, and in some cases showed

    historic economic contraction. The 2020 World Bank data would therefore have a negative impact on the construction of the 2022-2025 budget relative to the 2019 World Bank data.

    In summary, Mr Donnellan reiterated that the reduction in real-term membership contributions since 2012 had been 12.5 %. The last time that the Conference had approved an increase in the base contributory share had been in 2008. The proposed 1.4 % increase was therefore the smallest average increase in the history of the Organisation, excluding exceptions when fees were flat. The largest increase previously approved by the CIML and the Conference had been 13 %. The proposed increases would be significantly below the expected operating expenses, even with significant reductions, savings and austerity measures being applied to operating expenses. The budget modelling, and therefore the proposed adjustments to Members' contributions needed for the Organisation, would be done in such a way as to lessen the impact on all OIML Members. Over time, this proposed increase in income would reduce the long-lasting impact and effects on the OIML of the previous decisions to reduce and then retain a flat, non-indexed base contributory share since 2013. Mr Donnellan said this concluded his presentation.

    Dr Schwartz thanked Mr Donnellan for his comprehensive report and explanation of Addendum 7.4, which had included all the details of the proposed increase of the Member State and Corresponding Member fees. He reiterated that the proposals were based on a survey which had been carried out in February 2020. He asked if there were any questions or comments.

    Mr Robles (Spain) remarked that he was new to the CIML, and said that although he understood the proposed increase to the fees, Spain could not support it. He explained that Spain was now facing a different reality and did not know what might happen to their economy in the next few years, so he considered that an increase in fees at this moment was not very realistic. He added that there were no current data to support this, as they did not know whether costs or salaries would increase, nor how the economy would develop over the next few years. In Spain, although a lot of future projects were planned, nobody knew whether they would be implemented. He felt he therefore had a right not to support this increase. The rules for the fees had also been discussed in the past, and his opinion was that four membership classes were not enough, and that they should be divided up into more classes. The criteria were based mainly on population, which nowadays was not enough; they also needed to take into account other criteria because some countries were very rich and others were not. As had been said, there were some Corresponding Members for which fees would be increased based on their population, which he reiterated was not the best way. He suggested they needed to reconsider the system used to manage the fees and base it more on the economy than the population. He said that although he did not wish to "open the box", this was his reflection on the OIML fee system.

    Mr Donnellan replied that he wished to make two points in response. He reiterated that all the information had been included in the Addendum which had been distributed in July of that year as well as in his presentation. Two factors were applied in the membership classification criteria and had been used in the review that been conducted:

    - the first was that the four membership classes based on population were enshrined in the OIML Convention;

    - the second point was that, in addition to these population-based classes, the World Bank Gross National Income (GNI) per capita figures (Atlas method) had been used to determine the economic prosperity, based on World Bank population looking at low, lower middle, middle, and high income economies, so the dataset was independent of the OIML.

    A Member State may then be moved from their population-based class to a different class based on their economic prosperity, which was a factor of their GNI per capita. The final class allocation was therefore not only a factor of population, but of population combined with World Bank GNI per capita data. He pointed out that when a review took place, a Member State's class may move up or down according to changes in these factors.

    Dr Schwartz thanked Mr Donnellan for his explanation and asked if there were any more comments; there were none. He asked Mr Dunmill to read the respective Resolution:

    ## Draft Resolution CIML/2021/13

    The Committee,

    Notes the information provided by the BIML Director on Member State and Corresponding Member classes and fees,

    Noting the comments from its Members,

    Approves the principles and proposals concerning Member State and Corresponding Member classes and fees put forward in Addendum 7.4 to the Working Document for this meeting, with effect from 1 January 2022, and

    Requests the 16th Conference to take this Resolution into account when deciding about the Member State and Corresponding Member classes and fees.

- number: '7.5'
  title: Examination of the proposed budget for the 2022-2025 financial period
  narrative: |2+

    Dr Schwartz said that the next sub-item had already been partially explained under the previous sub-item. He asked Mr Donnellan to again take the floor.

    Mr Donnellan reiterated that although there was some overlap with the last agenda item, this specific item dealt with the budget itself. He also reminded delegates that some Members would be hearing the information again during the Conference. He stressed that the CIML President and the Presidential Council had endorsed the sustainable budget principles. These principles included indexing Member contributions in a responsible and future-orientated manner in order to account for known cost increases for the Organisation, and he added that the budget modelling and proposed adjustments to Member contributions had been designed to lessen the impact on OIML Members. He continued that the 2022- 2025 draft budget had been prepared using conservative principles to forecast both income and expenditure. Finally, Mr Donnellan stated that the budget did not speculate on the likelihood of positive financial gains potentially realised as a consequence of negative events, such as those witnessed during the COVID-19 pandemic.

    Mr Donnellan stated that the sustainable budget principles would enable the Organisation to gradually address and reduce the impacts and the effects of the flat and non-indexed base contributory share which, as he had already mentioned, had been in place for almost a decade since 2013. He explained that OIML services and new initiatives would be delivered and developed in a sustainable way, whilst maintaining high levels of service to Members and pursuing the new demands placed on the Organisation.

    Mr Donnellan judged that the reduced and then flat-rate membership contribution from which Members had benefited since 2013 should be viewed in the context of increasing, indexed and forecast cost increases throughout the next financial period, together with the need to provide a growing number of services to Members. He reported that in the past, annual increases of 4% or higher had been approved by the CIML and the Conference at five previous Conferences, and stressed this meant that there had previously been the equivalent of a period of 20 years where annual increases of 4% or more had been applied to Member contributions. He continued that annual increases as high as 13% had previously been approved by the CIML and by the Conference, and applied throughout their respective financial periods, and reminded delegates that the proposed increase for 2022-2025 averaged only 1.4% per annum.

    Mr Donnellan considered that to enable the provision of both new and existing services to Members and other stakeholders, it was essential for the Organisation to change the approach to the base contributory share, and hence Member contributions, which have been in place since 2013 and thus enable the move to a future-focused Organisation. He added that the Organisation continued to experience late and incomplete payments from Members which affect budget certainty. The 2022-2025

    budget aimed to manage these risks whilst allowing the Organisation to continue to deliver current and future services and respond to additional demands.

    Mr Donnellan provided a breakdown of the 2022-2025 budget on his next slide [CIML PowerPoint Presentation 7.5, slide 6]. He said it was based on "activity type", which he had notated in the left-hand column. This had been broken down by function and activity within the Organisation in terms of providing support for technical work, the OIML-CS, CEEMS, and the governance of the Organisation amongst others. It also specifically mentioned communications, training, and the operation of CIML meetings and Conferences such as the one in which they were currently participating.

    Mr Donnellan explained that the next slide [CIML PowerPoint Presentation 7.5, slide 7] showed the same amount broken down by "cost type" which had been detailed previously in his presentation under agenda item 7.1, and which was the basis on which the accounts were produced. This covered the main functional areas within the Organisation which included staff costs, pensions, depreciation, and the costs for running meetings and travel.

    Mr Donnellan confirmed that with the income of the Organisation adjusted to reflect what he had mentioned earlier in his presentation, as well as the decisions and endorsements that had been made by the CIML President and the Presidential Council to apply sustainable budget principles, delegates would see that the income would still remain significantly below operating expenses, which would deliver a negative, or deficit, budget for each year in the 2022-2025 financial period.

    As delegates would note, this negative figure could be absorbed by the Organisation at the current time, and would decrease in the later years of the budget. He added that many increases in income, particularly those concerning Corresponding Members, would not be realised until the later years of the financial period. Mr Donnellan highlighted that, as he had commented earlier, this had been designed to lessen the impact on all Members, both Members States and Corresponding Members. This concluded his presentation.

    Dr Schwartz thanked Mr Donnellan and asked if there were any questions or comments.

    Ms Carrie LaCrosse (USA) thanked the BIML for its work on the development of the OIML quadrennial budget for 2022-2025. She said they were pleased to see the continued support for critical aspects of the work programme such as the OIML-CS and others. Despite this, the USA remained concerned about the large overall increase in the proposed budget in comparison to the previous quadrennium. She explained that the USA adhered to a policy of zero nominal growth in the budgets of international organisations generally. They had noted that cost savings initiatives had been put in place during the last quadrennium and they encouraged the full application of those types of initiatives going forward to help keep the budget more in line with zero nominal growth. She also wanted it noted that efforts should be made to ensure that future budgets adhere to zero nominal growth policies.

    Mr Donnellan thanked Ms LaCrosse for the USA's support in relation to the significant savings introduced by the Organisation, particularly over the last few years. He had noted the USA's comments on the policy and commented that as most of the cost structures of the OIML were based in the French Republic, they were susceptible to real Consumer Price Index (CPI) increases operating within that economy. He added that at the current time, the CPI was close to 2.1 % per annum, although the proposed Member State increases averaged 1.4 %. He reiterated that he had noted the USA's comments and thanked Ms LaCrosse for them.

    Dr Schwartz stated there were no further questions or comments. He asked Mr Dunmill to read the respective Resolution:

    ## Draft Resolution CIML/2021/14

    The Committee,

    Notes the report on the budget for the 2022-2025 financial period given by the BIML Director, Having examined the proposed budget for the 2022-2025 financial period,

    Approves this budget, and

    Requests the 16th Conference to take this Resolution into account when deciding the overall amount of credits necessary to cover the OIML's operating expenses in the 2022-2025 financial period.

- number: '7.6'
  title: Policy on the OIML Operating Reserve Fund
  narrative: |2+

    Dr Schwartz asked Mr Donnellan to take the floor again for agenda item 7.6 which dealt with the OIML Operating Reserve Fund. He added that supporting documents had been provided in Addenda 7.6a and 7.6b.

    Mr Donnellan stated that Addendum 7.6a for the 56th CIML Meeting and 10.3a for the 16th Conference provided information on the OIML Operating Reserve Fund, adding that the proposed Policy itself was detailed in Addendum 7.6b for the 56th CIML Meeting and 10.3b for the 16th Conference. He remarked that this presentation would be based on those Addenda.

    Mr Donnellan observed that quite a number of new CIML Members had been appointed, both this year and since the previous Conference in 2016, so for their benefit, he would start with some background information. He reported that the 15th Conference had requested that the CIML consider the Operating Reserve Policy, as well as the purposes for which the reserve should be used. The 15th Conference had stated that recommendations should be reported to the 16th Conference, which would be taking place later that week. He stated that the policy should first be discussed at the current CIML meeting, and remarked that the Operating Reserve had also been discussed at the 55th CIML Meeting.

    Mr Donnellan commented that although the Operating Reserve was referenced in the Convention, there was no formal policy. He stated that the total cash balance fluctuated throughout each year based on when Members paid, because as he had mentioned, three-quarters of the income from Member States was not received on time, and this uncertainty could lead to a shortfall of available funds. He stressed that an Operating Reserve Fund Policy was therefore needed to ensure that there was an adequate level of funds for the Organisation to operate.

    Mr Donnellan highlighted that in order to prepare this policy, a thorough analysis had been conducted of the funds received by the Organisation, and this had shown that the average total cash balance of the Organisation over the period 2017-2020 had been 8.8 months of average annual operating expenditure, and the cash balance had ranged from a low of 7.4 months to a high of 10.5 months over the same period. Analysis of 2017-2020 payments had shown that the average Member State's payment delay ranged from 5.5 months in 2020 to 7.1 months in 2018. Whilst every effort was made to collect Member contributions on time, any increase in the delay would pose a risk to the OIML's operations, so based on this analysis, the target minimum Operating Reserve Fund was proposed to be six months of the average operating expenditure, which he added, took into consideration the average delay time in receiving Member payments.

    Mr Donnellan stated that the lack of an Operating Reserve Fund Policy could impact on the OIML's operational and strategic management and could also impact on the commitments the OIML could provide to its stakeholders. He added that it could also have a potential impact on the OIML's capacity to plan and invest in strategic and long-term initiatives for its Members. It was therefore recommended that the OIML Operating Reserve Fund Policy was approved by the CIML and endorsed by the Conference.

    Mr Donnellan stated that the authority to establish a reserve for the Organisation was contained in Article XXIV of the OIML Convention. He stated that the purpose of such a fund was to build and maintain an adequate level of net current assets to support the Organisation's operations in the event of unforeseen shortfalls, and that the fund may also be used for essential emergency expenses. He stressed that it was not intended to replace a permanent loss of funds, nor to eliminate an ongoing budget gap, and he added that the Operating Reserve Fund Policy would be implemented in conjunction with other financial policies.

    Moving on to the definitions and goals, Mr Donnellan said the Operating Reserve Fund would be defined as the designated fund set aside by the Conference, and the minimum operating reserve would be sufficient to maintain ongoing operations for a set number of months. He added that the Operating Reserve Fund would be reviewed and adjusted in response to internal and external changes. He stated that the target amount would be equal to six months of the average recurring operating costs of the Organisation.

    He continued that the Operating Reserve Fund would be recorded in the accounts as the "Designated Operating Reserve". He explained that it would be funded and available in cash or cash equivalents and the operating reserves would be managed within the general cash and investment accounts of the Organisation.

    Mr Donnellan indicated that the Operating Reserve Fund would be funded by the existing cash balance of the Organisation. He stated that if there was a budget surplus at the end of a financial period, the Conference may direct that the Operating Reserve Fund should be funded with some or all of the surplus. He added that the Conference may also direct that a specific source of income be set aside for the Operating Reserve Fund. He explained that if the Operating Reserve Fund should fall below three months of average operating costs, an alert would be issued by the CIML President.

    Mr Donnellan stated that authority to use the Operating Reserve Fund was detailed in Article XXV of the Convention, and was delegated to the BIML Director, in consultation with the CIML President. To exercise this authority, it was necessary to identify the need for accessing the Fund, to confirm that the proposed use was consistent with the purpose of the reserves as described in the proposed Policy, and to carry out a detailed analysis of the need for its use. Mr Donnellan stressed that use of the Fund would be reported to the CIML/Conference as part of the governance procedures. Mr Donnellan specified that the BIML Director and the CIML President would be responsible for ensuring that the Operating Reserve Fund was maintained and used only as described in the Policy. He explained that the BIML Director would maintain records of the use of funds, and provide updates to the CIML President. He stressed that the BIML Director and the CIML President would discuss annually any additional risk factors and their likely impact on operating reserve levels. The Policy would be reviewed by the BIML Director and the CIML President every year, or sooner if warranted by internal or external events, and any proposed changes to the Policy would be recommended to the CIML for approval. Mr Donnellan said this ended his presentation.

    Dr Schwartz thanked Mr Donnellan for his clear report on what had been proposed in response to the resolution that had been taken at the 2016 Conference. He asked if there were any questions or comments.

    Ms LaCrosse said the USA thanked the secretariat and the CIML for its work in establishing this important Operating Reserve Fund. She had a question regarding the provision that allowed the CIML President to decide on the expenditure of the Reserve Fund potentially without consultation with other Member States. She said the USA would suggest that the policy included a provision requiring that, in addition to consulting with the BIML Director, one or more CIML Members should also be consulted. She also wanted it noted that as mentioned, the USA supported the idea of an annual review so that the implementation of the policy could be assessed.

    Dr Schwartz responded that at the present time, the Convention only mentioned the BIML Director, and that the decision should be made by him in consultation with the President, but he would be content to include perhaps members of the Presidential Council in the decision-making process. The internal financial audit team (the two people from the Presidential Council that had been looking at the financial figures annually) could perhaps be added, and he hoped this would address Ms LaCrosse's concerns. He thanked her for her comment.

    Mrs Gierschke (Germany) also thanked the President and the BIML for preparing this policy. She confirmed that Germany supported the comment from the USA that the Presidential Council or the internal audit team should be consulted. She stated that Germany also had a general problem with the

    Reserve Fund, and especially with its funding. She said that Germany had made comments in the past indicating they did not support reserve funds as such. They did see the need to have operating reserves to work with, and had therefore in the past proposed a "working capital fund" that would be funded once by all Member States, and would then only be replenished after the Member State(s) which were late in payment and thus had caused the financial problems for the Organisation had paid their debt. She stated that Germany would not be able to support the financing as was currently being proposed.

    Mr Donnellan replied that Mrs Gierschke's comments would be noted. He reiterated that the current fund would not require any additional funding as it would be funded from the current net assets held by the Organisation.

    Mrs Gierschke explained that the reason Germany could not support the Reserve Fund Policy as it stood now was that it would in effect mean cross-subsidising late paying Members by contributions from those Member States which had paid on time, and this was why funding from the surplus or from existing funds was not acceptable to Germany.

    Dr Schwartz thanked Mrs Gierschke for her additional clarification. There were no more questions or comments. He suggested that delegates now took a break before continuing with the voting, but asked Mr Dunmill to read the draft resolution for the current agenda item:

    Draft Resolution CIML/2021/15

    The Committee,

    Recalling Resolution no. 2016/3 of the 15th International Conference on Legal Metrology,

    Notes the report on the OIML Operating Reserve Fund policy given by the BIML Director,

    Noting the comments from its Members,

    Approves this policy, and

    Requests the 16th Conference to endorse this policy.

- number: '8'
  title: Review and approval of Draft CIML Resolutions (Session 1)
  narrative: |2+

    Dr Schwartz welcomed delegates back from the break. He observed it was the first time in the history of the Organisation that online voting would take place during a CIML meeting, and commented that he was quite excited by the prospect of this new exercise and experience. He suggested delegates checked whether they had logged in to the "My access" part of the OIML website, where they would find the draft resolutions which had been uploaded by the BIML team so that they could be voted on.

    He highlighted that test voting had been carried out, which had seemingly worked very well. He asked Mr Dunmill to take the floor to explain the voting procedure, noting that a Zoom chat message from Spain said that they were experiencing problems in voting, so now Mr Dunmill would explain how the voting would take place.

- number: '8.1'
  title: Explanation and voting procedure
  narrative: |2+

    Mr Dunmill explained that delegates should use the "CIML Meeting Resolutions Voting" tool under the "My access" section of the OIML website. The voting would be open for 30 minutes at the end of each meeting session. He stated that it was only possible for Heads of Delegation to vote, and added that Assignees could not vote for their CIML Members on this occasion.

    Regarding the quorum, Mr Dunmill remarked that during an in-person meeting, a roll call would normally be taken before each voting session to ensure that enough Member States were present or represented according to the terms of the OIML Convention (OIML B 1:1968 OIML Convention Article XVII). This stated that

    "Decisions shall be valid only if the number of those present and represented be at least three-quarters of the number of persons designated as Members of the Committee and should they be supported by a minimum of four-fifths of the votes cast. The number of votes cast shall be at least four-fifths of the number of those present and represented at the session. Abstentions, blank and null votes shall not be considered as votes cast."

    Mr Dunmill then explained how this would be interpreted during the current online meeting. There were currently 62 Members, so three-quarters of that number was 46.5, which meant that 47 CIML Members were required to be present or represented. This would be taken as the total number of "Yes", "No" and "Abstain" votes during each online voting session. Mr Dunmill added that the other two requirements from the Convention were that

    - 80 % of CIML Members present or represented needed to cast a vote, and

    - resolutions needed to be supported by 80 % of the votes cast.

    He noted that for the last two conditions, abstentions and failures to vote shall not be considered as votes cast.

    With regard to the procedure for the approval of the CIML resolutions, Mr Dunmill explained that once Members were on the resolution voting page on the OIML website, the text of the resolutions would be visible to them, and they would have the option to vote "Yes", "No", or "Abstain" for each one. He added that no comments were necessary, or in fact possible. He also pointed out that there was the possibility of voting "Yes to all" the resolutions at once, and advised delegates that if they wished to vote "Yes" for almost all the resolutions, it would be quicker for them to vote "Yes to all", and then change the votes to "Abstain" or "No", as appropriate, for those individual resolutions where they wished to vote differently.

    Mr Dunmill then gave a detailed demonstration of the complete voting procedure, using annotated screenshots taken from the OIML website.

