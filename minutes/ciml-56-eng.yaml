    Dr Schwartz said that unfortunately, as in the previous year, it would not be possible to hand over the Awards personally. The awardees had been invited to join the Committee during this session so that they could at receive their Awards online, and he reassured everyone that the awardees would receive their "real" Awards as soon as possible. He specifically welcomed the awardees that had been able to join the Committee meeting for the current session.

- number: '16.1'
  title: OIML Medals
  narrative: |2+

    Dr Schwartz explained to delegates that OIML Medals were given to recognise the outstanding contribution of individuals to the development of legal metrology. He continued that this year one nomination had been received for a candidate who undoubtedly deserved such an award in recognition of his long career and achievements in the field of legal metrology, and this was Dr Stephan Mieke. Dr Schwartz checked that Dr Mieke was present. He explained that the plan had been that the Awardees would be shown next to their certificate.

    Dr Schwartz introduced Dr Mieke to delegates, saying he had been Senior Scientist in the Division for Medical Physics and Metrological Information Technology at the PTB in Berlin, Germany. He had also been a member of, and responsible for the secretariat of OIML TC 18 Medical measuring instruments and TC 18/SC 1 Blood pressure instruments for many years.

    Dr Schwartz gave the following laudation:

    Stephan Mieke, born in 1951, has served in the field of legal metrology for most of his professional life. He joined the PTB in 1976 as a young PhD student, and is retiring 45 years later, i.e. this year. His field of expertise is in medical metrology, specifically medical devices with a measuring function. In particular when it comes to his very own field, the metrology of blood pressure measurements (sphygmomanometry) he is undoubtedly now - and has been for many decades - one of the leading experts in the world.

    Stephan Mieke has always been devoted to the pursuit of correct measurements in the medical environment. For him, that meant not just his successful research work in the laboratory, where he developed new standards and verification procedures, it also meant going out and contributing to the improvement of medical devices in the real world.

    From early on he followed two parallel pathways towards that goal: legal metrology on the national and international level (most importantly within the OIML), and standardisation. This second pathway became especially important when many world markets became 'deregulated' in the 1990s and medical devices with a measuring function were no longer subjected to mandatory type approvals or verifications in many countries.

    Stephan Mieke's experience and continuous engagement on standardisation boards, e.g. as the long-term convener of ISO/TC 121/SC 3 and IEC/SC 62D/JWG 7, have been crucial to maintaining high metrological standards for medical devices, including in those areas of the world in which they were no longer legally enforced.

    Stephan Mieke has served, or is still serving, on five international metrology boards in the OIML, ISO and the IEC. In addition, he has served on ten national standardisation and accreditation boards in Germany.

    No less important than his numerous direct contributions to the international legal metrology system, is Stephan Mieke's tireless work as advisor, lecturer, and educator.

    He has organised, co-organised or lectured at almost 20 seminars or workshops, and so it is my great pleasure to award Stephan Mieke with an OIML Medal in recognition of all his achievements on behalf of the OIML.

    Dr Schwartz congratulated Dr Mieke on his outstanding career and extended the Committee's best wishes to him for a pleasant, healthy and enjoyable retirement. Dr Schwartz stated that unfortunately he was at the office in Braunschweig and Dr Mieke was at his home office in Berlin, so he could not hand over the OIML Medal in person, but he showed delegates and Dr Mieke his Medal, adding that it would be handed to Dr Mieke in person in the near future.

    Dr Mieke said he was very honoured, saying that as far as he was concerned he had just been doing his duty, so he was pleased to have received such an award. He thought that standardisation, testing, and so on, for medical devices was becoming more and more important because, in many countries the population was getting older, and people sometimes had problems with their health. Blood pressure was one of the basic measurements used by medical doctors, so he thought it was extremely important to continue this work, although in his view, this was work that was slightly different from other OIML technical work. He explained that in this field they did not have physical standards. In many cases they had to identify a good standard, and here, the physicians were more or less the standard, which made things more difficult and complex, so this had always been a challenge for him, and had made the work very interesting. He added that he hoped he had contributed a little bit to improving the situation and again thanked delegates very much for the Award.

    Dr Schwartz confirmed that this had been the case and re-iterated that he highly deserved the medal. He congratulated Dr Mieke again, thanked him for addressing the Committee, and wished him all the best. He also invited Dr Mieke to stay for the remainder of the awards session.

- number: '16.2'
  title: OIML Letters of Appreciation
  narrative: |2+

    Dr Schwartz stated that the next Awards were the Letters of Appreciation, which he said recognised excellent work on a specific project relating to legal metrology. He said it was his pleasure to announce five colleagues who would be receiving a Letter of Appreciation at the current meeting.

    ## Mrs Laetitia Delette (France) and Mrs Regina Kluß (Germany)

    Dr Schwartz said he wished to start with Mrs Laetitia Delette, senior engineer at the LNE in Paris, France, and Mrs Regina Kluß, senior engineer at the Chemical Physics Division at the PTB in Braunschweig, Germany. He said both had held the French-German co-secretariat of TC 17/SC 7 Breath testers for many years, and he added that he had indicated earlier in the meeting that he would come back to breath analysers later, so this was that point in time.

    Dr Schwartz said he would present the laudation for both these colleagues.

    Dr Schwartz gave the following laudation:

    OIML Recommendation R 126 Evidential breath analysers, is an important Recommendation. Indeed, these instruments are used for the purpose of establishing compliance with national alcohol policy or for the promotion of public safety. For some national authorities, these instruments are even the main means of obtaining a definitive measurement of the breath alcohol content of drivers.

    In 2012, the adopted Recommendation did not receive unanimous support due to differing interests between Members in terms of use, users, legal regulation for investigation, and punishment of drink-driving. The available instruments that are used around the world are also quite different.

    In parallel, the work undertaken by the German and French co-secretariat had to manage the revision, without wasting all the work carried out on the 2012 edition of the Recommendation.

    For these reasons, the new revision of OIML R 126, which started in 2013, was a real challenge.

    Since 2013, you have been engaged in this ambitious and delicate work. This revision required the organisation of many meetings, sub-groups and consultations on many drafts.

    The discussions were numerous, passionate and sometimes heated, but always very rich. You have been able to synthesise them and build successive projects. You have managed to obtain consensus between countries on a new revision that includes, in particular, technological innovations and the evolution of other OIML publications such as the new editions of B 6, D 11, and D 31.

    The latest ballot was widely welcomed by the participating members. And I am very pleased to say that the new version of OIML R 126, including Parts 1, 2 and 3, were almost unanimously approved by the Committee three days ago.

    By way of this letter, the OIML would like to express its appreciation of you, especially for your commitment and for your involvement during all these years and for the successful conclusion of this important issue.

    Dr Schwartz said that it was his great pleasure to congratulate both of these colleagues on this Award, and to thank them, on behalf of the OIML, for their outstanding commitment and involvement in the OIML's technical work!

    He added that as his PTB colleague, Mrs Kluß, was in the PTB meeting room with him, it was his great pleasure to hand over the Letter of Appreciation to her personally. He congratulated her again for all the work she had done for the OIML.

    Mrs Kluß said it was a real pleasure for her, and she was looking forward to see how the Recommendation would work in practice.

    Dr Schwartz hoped that Mrs Delette had been able to join the Committee meeting for this session, but said that if not, he wished to pass on his congratulations to her. He reiterated that the BIML would make sure Mrs Delette received her Letter of Appreciation as soon as possible.

    ## Mr Peter Eekhout (Netherlands)

    Dr Schwartz stated that the third Letter of Appreciation would go to Mr Peter Eekhout. Mr Dunmill informed Dr Schwartz that Mr Eekhout had been unable to join the session, but that Dr Matthijs van der Wiel (Netherlands) would be able to receive the award on Mr Eekhout's behalf.

    Dr Schwartz introduced Mr Eekhout to delegates, stating he was the Senior Advisor at the Agentschap Telecom in the Netherlands. He added he was not sure whether Mr Eekhout was aware he would be receiving this Award and, if not, it would hopefully be a pleasant surprise to him.

    Dr Schwartz gave the following laudation:

    This OIML Letter of Appreciation recognises the outstanding contribution of Mr Peter Eekhout as a member of OIML TC 5/SC 2/p 3 that led to the revision and publication of OIMLD 31:2019 General requirements for software-controlled measuring instruments, an OIML Document that serves as a widely recognised template for software requirements for all OIML Recommendations.

    This Letter also recognises his contributions as a member of OIML TC 5/SC 2/p 4, which is currently revising OIML D 31 again.

    In both these OIML Project Groups, Mr Eekhout has provided by far the most extensive and detailed lists of comments on all the Working Documents and Committee Drafts, contributing greatly to the improvement of the Document, and to its adaptation to technological changes.

    In addition, Mr Eekhout is well known in TC 5/SC 2 for his thorough and insightful discussion papers, which have often served as the basis for discussions at PG meetings, thus accelerating the revision of the Document significantly.

    Mr Eekhout has been active in a large number of different OIML PGs for many years and is widely accepted as a trusted source on software-related issues. In this role, he has frequently ensured the rapid integration of OIML D31 into different OIML Recommendations, for example R 117 and R 150.

    By way of this letter, the OIML would like to express its appreciation of you, especially for your commitment and for your involvement during all these years and for the successful conclusion of this important issue.

    Dr Schwartz said that it would have been his pleasure to congratulate Mr Eekhout online in person, as he greatly valued the good cooperation they had built up at WELMEC meetings many years before, so he wished to pass on his greetings and best wishes to Mr Eekhout via Dr Van der Wiel. Dr Schwartz asked Dr Van der Wiel if he wished to address the Committee.

    Dr Van der Wiel said he was not sure whether Mr Eekhout was aware that this letter had been awarded to him. He added that they had been trying to get hold of him for a couple of days, but that he was on vacation, so he was sadly not present at the current meeting. Dr Van der Wiel said they appreciated exactly the same qualities in their colleague, in that he was very thorough and provided detailed comments, whether he had been asked to or not! On behalf of Mr Eekhout, Dr Van der Wiel thanked the OIML and the CIML President for awarding this Letter of Appreciation to him.

    Dr Schwartz thanked Dr Van der Wiel, and again asked him to pass on his personal congratulations and best wishes to Mr Eekhout, adding that he was looking forward to seeing Mr Eekhout, at least online, in the near future.

    ## Mr Ken Butcher (USA)

    Dr Schwartz said the fourth Letter of Appreciation was awarded to Mr Ken Butcher. He introduced Mr Butcher as Program Leader, "Laws and Metric" at the National Institute for Standards and Technology (NIST) in Gaithersburg (USA). Dr Schwartz explained that Mr Butcher had been unable to join the Committee meeting for this session, so he wished to extend a warm welcome to Dr Katrice Lippa, who was going to accept the award in place of Mr Butcher. He introduced Dr Lippa as the new Chief of the Office of Weights and Measures at NIST, who had been working in the chemical metrology area at NIST for almost 20 years. Dr Schwartz extended a warm welcome to Dr Lippa.

    Dr Schwartz gave the following laudation for Mr Butcher:

    This OIML Letter of Appreciation recognises the outstanding contributions of Mr Ken Butcher to numerous projects of significance to the OIML. Mr Butcher served 47 years in legal metrology, the last 30 years at the US National Institute of Standards and Technology (NIST), from which he recently retired.

    Mr Butcher's expertise includes a wide variety of weighing and measuring devices, prepackaged commodities, and legal metrology laws and regulations. Mr Butcher's OIML activities began with his participation as a member of the US delegation (in his capacity as a US State Weights and Measures Director) in several OIML working group meetings, and he also participated in several larger OIML meetings.

    In 1991, Mr Butcher joined NIST's International Standards Program and, later, the NIST Office of Weights and Measures (OWM). Upon joining the OWM, he was appointed Program Leader for the Laws and Metric Program, in which capacity he served on numerous national and international technical committees, work groups, and other projects related to the development of model weights and measures laws, regulations, and test procedures.

    During his time in the OWM, Mr Butcher served as the US technical point of contact for numerous OIML working groups and projects devoted to the development and maintenance of OIML Recommendations, for example:

    - OIML R 51 Automatic catchweighing instruments;

    - OIML R 60 Metrological regulation for load cells;

    - OIML R 76 Non-automatic weighing instruments;

    - OIML R 111 Weights of classes $ E_{1}, E_{2}, F_{1}, F_{2}, M_{1}, M_{1-2}, M_{2}, M_{2-3} $ and $ M_{3}; $

    - OIML R 79 Labelling requirements for prepackages;

    - OIML R 87 Quantity of products in packages; and

    - OIML R150 Continuous totalizing automatic weighing instruments of the arched chute type.

    Mr Butcher also regularly provided guidance and mentoring to other OWM technical staff to educate them on how best to promote and encourage consideration of OIML standards in the role of technical advisor and to identify opportunities for the harmonisation of US standards with those recommended by the OIML.

    The OIML is grateful to Mr Butcher for all of his work to promote the advancement of the OIML technical work. So it is my great pleasure to congratulate you on this award!

    Dr Schwartz handed over the award to Dr Lippa online and asked whether she would like to address the Committee on behalf of Mr Butcher.

    Dr Lippa thanked Dr Schwartz and said she was very pleased to accept this OIML Letter of Appreciation on behalf of Mr Ken Butcher, who was formerly of NIST OWM. As the incoming chief of the OWM, she said Mr Butcher had provided her with an incredible amount of background information and history regarding the complex aspects of legal metrology laws and regulations. She stated that he had also provided her with invaluable assistance in navigating the more subtle nuances of technical areas, such as test procedures for weighing and measuring devices, for which he had also been considered an expert.

    She drew particular attention to Mr Butcher's breadth of knowledge and deep expertise, which had been best demonstrated by his leadership and impact, across the numerous working groups and projects that Dr Schwartz had noted in his Letter of Appreciation, and this specifically included how Mr Butcher had served to promote the work of the OIML over many years. As Dr Schwartz had already mentioned, Mr Butcher had retired in September of that year after three decades of federal government service, and she added that he was presently on vacation, enjoying some well-deserved time off. She said that if he had been available to accept this Award in person, he would have been both thrilled and tremendously proud to have received this recognition from his esteemed colleagues present at the CIML meeting. Dr Lippa thanked the Committee again for this tremendous honour on Mr Butcher's behalf.

    Dr Schwartz thanked Dr Lippa for her kind address, and asked her to pass on their best wishes and congratulations to Mr Butcher when he returned from his well-deserved holidays.

    ## Mr Chris Pulham (BIML)

    Dr Schwartz said he now had the pleasure to announce the fifth recipient of a Letter of Appreciation, who he hoped did not know about the Award as it had been intended to be a surprise, and he announced that the award was to Mr Chris Pulham of the BIML! He hoped Mr Pulham could be spotlighted on Zoom for delegates, and Dr Schwartz observed that Mr Pulham did indeed look surprised. He continued that most delegates knew Mr Pulham well, as amongst many other tasks, he was the Editor and Webmaster of the OIML. He remarked that it had not been easy to surprise Mr Pulham with the Award, but they had obviously succeeded, and he added that it had been a real team effort.

    ## Dr Schwartz gave the following laudation:

    Born in the United Kingdom, Chris Pulham was recruited by the BIML as Editor on 1 July 1996. He quickly expanded his skills by working closely with the five CIML Presidents (Gerard Faber, Manfred Kochsiek, Alan Johnston, Peter Mason and myself) and four BIML Directors (Bernard Athané, Jean-Francois Magaña, Stephen Patoray and Anthony Donnellan) he has served over the past 25 years.

    Always very responsive, his high level of competence is appreciated and demonstrated on a daily basis by the quality of his work and his performance, his involvement in all the work of the BIML individually or as a group, his teamwork, and his excellent relations with OIML Members and Institutions.

    As regards his main tasks, I would just like to mention that he is responsible for the final edition and publication of all OIML Recommendations and other documents, the OIML Bulletin and, of course, the minutes of the CIML meetings and Conferences. As the BIML Webmaster, he is

    responsible for the design of the OIML website and its contents, posting of online votes, and managing reports and statistics. He also participates actively in the World Metrology Day Team, and is responsible for the maintenance and update of that website in close cooperation with the BIPM.

    His ability to take on unexpected challenges and collaborate so well with the rest of the BIML staff and with everyone involved in the work of the OIML Technical Committees and Project Groups has always been outstanding. But beyond his proven professional skills, he has an excellent sense of humour, creativity and humanity.

    Over these years, Chris Pulham has shown true dedication to the OIML, being in this sense an example for many others.

    Dr Schwartz turned to Mr Pulham, saying that on the occasion of his 25th anniversary at BIML, and on behalf of the OIML and the Committee, it was his great pleasure to thank him for all the work he had done on behalf of the OIML so far, which he reiterated had been carried out with great dedication, creativity and humour. He added that Mr Pulham truly deserved the Award, congratulated him again and gave him his warmest wishes. He informed Mr Pulham that his letter would be taken back to Paris the following week. He asked Mr Pulham if he would like to address the Committee.

    Mr Pulham confirmed that the Award had been a total surprise, and thanked Dr Schwartz for his extremely kind words, as well as thanking his colleagues. He joked that he thought he had been in possession of a copy of all the meeting documents (having been very involved in their production), but obviously he had missed this "secret" one, so it had come as a total surprise! He said that Mr Dunmill had just emailed him a revised version of the resolutions, as otherwise he would have noticed that his name appeared in the resolutions. He commented that the 25 years had gone by extremely quickly, adding that everything at the BIML was in fact a team effort, and that other people were always involved in every single project that was undertaken at the BIML, which he very much appreciated. He had been working with some colleagues for 20 years, and some for less, but he emphasised that it had always been a question of team work, and always would be. He joked that he could not guarantee to do another 25 years, but certainly a few more years yet, if people still wanted him, which it sounded as though they did. He added that he was very touched by the Award, and thanked the Committee, and his colleagues in particular, who had kept the secret well.

    Dr Schwartz joked that he was delighted they had been able to surprise Mr Pulham, and he was looking forward to seeing him in Paris when he visited the BIML at the beginning of the following year.

    Dr Schwartz stated that this concluded the Letters of Appreciation. He commented that he had been very happy to see they so many Letters of Appreciation this year, which he considered was a good sign that they had excellent support from Members, and he was happy they had so many dedicated colleagues working in the institutes of Member States and at the BIML in conducting the Organisation's work.

    Dr Schwartz asked delegates to consider the draft resolutions on items 16.1 and 16.2. He stated that for the OIML Medal the resolution read:

