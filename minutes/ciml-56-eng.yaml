- number: '19.2'
  title: Online voting
  narrative: |2+

    Dr Schwartz suggested that, in the interests of time, the voting should be closed in 22 minutes. There were no objections.

    Ms Yumi Choe (Rep. Korea) asked whether there was a resolution regarding the 58th CIML Meeting in 2023.

    Dr Schwartz said he had proposed, and it had been agreed, that because the situation was uncertain making it difficult to plan further than 2022, a decision on the 58th CIML Meeting would only be taken at the 57th CIML Meeting in 2022. This would still leave sufficient time to organise it.

    Ms Yumi Choe enquired whether in fact a resolution was needed, similar to the one for the 57th CIML Meeting, stating when a decision on the 58th CIML Meeting would be made.

    Dr Schwartz stated that the resolution regarding the 57th CIML Meeting was under agenda item 17.1 (Resolution CIML/2021/40).

    Ms Yumi Choe questioned whether there should be another resolution, for example stating that a decision on the 58th CIML Meeting would be made at the 57th CIML Meeting. She added that if Dr Schwartz did not consider this to be necessary, then that was OK, but that was her question.

    Dr Schwartz responded that, as he had tried to explain, there were two reasons why he thought it was too early to decide on the 58th CIML Meeting to be held in 2023. These were firstly that it was not yet known how the situation with regard to the pandemic would have changed by the following year, and secondly that an invitation had previously been received from the Russian Federation, and he would have to check whether this invitation was still valid. He added that before the 57th CIML Meeting, it would be clarified whether the Russian Federation or Thailand would be proposed as the host for the 58th CIML Meeting in 2023. The CIML could then take the necessary decision at the 57th CIML Meeting.

    Ms Yumi Choe (Korea) thanked Dr Schwartz for this clarification.

    Prof. Lev Issaev (Member of Honour) said that he knew that the Russian authorities were in favour of hosting the 58th CIML Meeting in 2023, and he anticipated that an official letter would be sent to Dr Schwartz. He had hoped it would have arrived in time for this session, but it may now be later.

    Dr Schwartz explained that because of the change in CIML Member for the Russian Federation, there had been some uncertainty within the Presidency as to whether the invitation still stood, and although it would have been best to clarify this situation with the new CIML Member before the current meeting, there had not been time to do this. He indicated that this would be done immediately after the current meeting.

    Prof Issaev stated that in parallel with the 56th CIML Meeting, the BIPM was holding the second day of the 21st meeting of NMI Directors and Member States Representatives. He reported that he was moving between the two meetings and that it had been decided at the Directors' meeting to celebrate the digitalisation of transmission the following year. He felt this was a little premature, as the subject would officially be decided later by the OIML and the CIPM. He also reported that the 27th General Conference of Weights and Measures would be held in Versailles in 2022. He said it was anticipated to be a hybrid meeting, partly online and partly in-person, and suggested that the OIML's experience would be very interesting for them.

    Dr Schwartz confirmed that the quorum had therefore been reached, specifically for the last resolution, which had received the lowest number of votes until that time. He asked the BIML team to check whether the quorum had been met for all the resolutions for that session.

    Mr Dunmill said that he believed the quorum had been reached for all the resolutions, adding that there were still a couple of minutes before the close of voting.

    Dr Schwartz declared the voting closed. He thanked delegates for having submitted their votes, and remarked that he was very happy to see that the quorum had been achieved. All the CIML resolutions could now be put together, and would be uploaded as soon as possible, as had been done with the Conference resolutions the previous day. He thanked the BIML team for this, as well as for uploading the summary of the voting results to the CIML meeting website. He added that Mr Dunmill had been quick in putting together the figures for the voting, so Dr Schwartz invited him to make a summary report.

    Mr Dunmill confirmed that there had been at least 47 "yes" or "no" votes on all the resolutions, and 48 countries had voted, so the quorum and been achieved; all the resolution had therefore been approved.

    Dr Schwartz said it had been proposed that the voting results for the CIML meeting and the Conference would be left on the "My access" page of the OIML website until the next CIML meeting the following year, so that CIML Members could check on their voting, as well as that of other Member States. He asked if there were any objections to this, of which there were none, so he said that this concluded item 19.

- number: '20'
  title: Closing remarks
  narrative: |2

    Dr Schwartz stated that as there were no other items on the agenda, the 56th CIML Meeting was nearing its end, and it was time for some closing remarks after a busy week.

    He remarked that this had been the second CIML meeting held online, and he hoped delegates had been satisfied with how it had been prepared and conducted. He commented that it should not be taken for granted that an online meeting with so many participants should run so smoothly, and he added that he had been very pleased that, after some initial difficulties, the online voting had gone so well, meaning that it had been possible to approve all 41 CIML resolutions and 11 Conference resolutions during the meetings. He thought this was an excellent achievement, and thanked the BIML team.

    With the decision that in-person and online participation are considered to be equivalent in all OIML meetings from now on, he was convinced that the CIML had taken a very important step, which would allow the Organisation to stay relevant, to conduct its business online, and to make it "future-proof" in the sense of the ongoing digital transformation process. He continued that he was also very happy that a budget for the next financial period of 2022-2025 had been approved. With this budget approval, he considered that the OIML had a good basis to plan the work programme for the next four years.

    Dr Schwartz mentioned that he (or the Bureau) would be pleased to receive any comments, proposals or other feedback from delegates about the meetings.

    He said that he wanted to thank the BIML Director, Mr Donnellan, and the whole BIML team for their (again) excellent preparation of this second CIML meeting held online, and first OIML Conference held online. He confirmed that more than 50 Member States were represented online, and about 170

    participants had been present online throughout the two meetings. He also wished to thank the two Vice-Presidents, Dr Charles Ehrlich and Dr Bobjoseph Mathew, and again the BIML Director and BIML Assistant Directors, with whom he had held many video-conferences in advance of this year's meetings. He remarked that he had really appreciated the excellent cooperation. He also thanked all delegates, CIML Members, Corresponding Member Representatives, Members of Honour, representatives of organisations in liaison, and other guests, for having participated in and contributed to this second CIML meeting held online, and made it a success despite the still difficult conditions. Last but not least he wished to thank the interpreters, Mr Marc Potentier and Mr Gary Hutton, for having done a great job once again.

    Dr Schwartz said he sincerely hoped that the difficult situation would significantly improve over the coming months, so that the Committee could meet in person at the 57th CIML Meeting in P.R. China the following year.

    He repeated his thanks to all, and declared the 56th CIML Meeting closed, sending his best wishes to all delegates, hoping that they all stayed safe.

