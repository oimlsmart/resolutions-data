- number: '15'
  title: 1 Report by the RLMO Round Table Chairperson
  narrative: |2+

    Dr Ehrlich thanked Dr Schwartz, adding that he was pleased to report that the RLMO Round Table had been very active during the current year. This had included, for the first time, holding two online interim meetings in addition to the annual meeting. The first interim meeting had been held in April 2021 and the second in June 2021. Dr Ehrlich reported that at these interim meetings, there had been no formal presentations from the RLMOs providing updates about what had been happening in their regions, but rather these interim meetings had been used primarily to debate the numerous issues that had been discussed at the previous year's annual Round Table meeting, and to plan for the current year's annual meeting which had been held online on 30 September 2021.

    Dr Ehrlich displayed slides [CIML PowerPoint Presentation 15.1, slide 2] listing two of the key outcomes of this meeting, which were that the OIML website now had a dedicated Round Table section,

    as well as a new Round Table Workspace, which had been set up so that Round Table participants could share documents of mutual interest. Dr Ehrlich thanked the BIML team, especially Mr Chris Pulham and Mr Luis Mussio for setting these up.

    Dr Ehrlich displayed a screenshot of the new Round Table webpage, where delegates could see the logos of each of the six RLMOs. He said that if delegates clicked on any of these logos, they would be taken to the home page of that RLMO. He indicated that on the far-left side of his slide [CIML PowerPoint Presentation 15.1, slide 3], under the blue banner "RLMO Round Table" there were links to the last two Round Table annual meetings, where delegates would find those meetings' agendas, leading to further links to the individual presentations made at those meetings.

    Dr Ehrlich commented that his next slide [CIML PowerPoint Presentation 15.1, slide 4] displayed the agenda of the annual meeting held on 30 September 2021. The Round Table web page had links to all of the update presentations. He especially wanted to thank all the presenters from the six RLMOs displayed in agenda item 5, who had continued to provide excellent support and representation of their regions. He said he would briefly discuss each of their presentations towards the end of his current presentation. He encouraged delegates to visit the new Round Table page and take a look at the presentations themselves, so they could see the many interesting events happening in the regions. Besides the updates from individual RLMOs, Dr Ehrlich reported that there had also been presentations on the CEEMS Advisory Group and on the OIML Certification System (OIML-CS) activities of interest and importance to the regions. Dr Ehrlich highlighted that during the annual meeting, a special session had also been scheduled, as well as an open forum session, about which he would say more shortly.

    Dr Ehrlich went on to show delegates some other key outcomes of the interim Round Table meetings, in order to emphasise the benefits of holding such meetings, and to encourage all delegates to consider taking part in them, since they had served as a good forum for facilitating better communication between and among the regions. Dr Ehrlich reported that part of the discussion at both of the interim meetings had been about how input from the regions could be taken to the OIML Task Group that had been working on training on e-Learning, so as to enhance the benefits of those e-Learning platforms that already existed, as well as those which were under development in the OIML and the regions. Another discussion topic had been to solicit mentors for the OIML Bulletin. Dr Ehrlich considered that the interim meetings had also been helpful to further facilitate communication about the benefits the OIML-CS could provide to the regions, and at the same time to obtain information from the OIML-CS leadership about additional information, training and promotion which would help the regions. Dr Ehrlich said he was optimistic that this ongoing dialogue through the Round Table would prove useful to the expansion of the OIML-CS into the regions.

    At the first interim Round Table meeting, the CEEMS Advisory Group Chair, Mr Peter Mason, had provided an update on what the CEEMS Advisory Group had been doing, and in particular had solicited volunteers to work on chapters of a strategy document on online technology which had been under development in the CEEMS Advisory Group. Dr Ehrlich commented that delegates would have already heard about this earlier during the current CIML meeting. He reported that Mr Dunmill had since updated Round Table members that this document was progressing. Another key outcome of the interim Round Table meetings had been to decide not to take any steps towards formalising the relationship between the RLMOs and the OIML, but rather to leave things the way they had been, which Dr Ehrlich considered to be working fine. However, it had been agreed to submit a project proposal, which delegates would have seen earlier in the CIML meeting, to revise OIML B 12 Policy paper on liaisons between the OIML and other bodies to say that the arrangements between the OIML and the regions would remain as they were, but that this arrangement would be evaluated regularly.

    Also, at the first Round Table interim meeting, Mr Pavel Klenovský had offered to make a special presentation on smart electricity meters at the annual Round Table meeting. This proposal was gladly accepted by everyone. However, due to unexpected technical difficulties, he had been unable to make this presentation, although he has agreed to try again at the next interim Round Table meeting which will take place on 20 January 2022. Another important outcome of the first interim meeting was to develop a common PowerPoint presentation format for use when providing RLMO updates at the annual Round Table meetings in order to bring some uniformity to the information being provided, as

    well as to provide the information which is considered to be of most benefit to the attendees. Dr Ehrlich explained that the five main headings used by presenters had been:

    - overview of significant developments and activities during the past year in the RLMO;

    - overview of the most urgent technical and other legal metrology issues in the region during the past year in the RLMO;

    - anticipated calendar of events for the coming year in the RLMO;

    - comments on RLMO discussion topics for this year; and

    - summary/concluding remarks.

    He pointed out that all the presentations could be found on the new Round Table page on the OIML website.

    Another important outcome from the first interim Round Table meeting had been that there would be a single discussion topic at the annual Round Table meeting. It was decided that this topic should be "How is your RLMO approaching digitalisation pertaining to measuring instruments in your region?", which was chosen in recognition of the significant international attention this subject has gained over the last few years, as had already been heard this week. Delegates had also heard how the BIPM was intending to make its core documents, such as the SI Brochure, machine accessible and readable using the so-called FAIR principles. As delegates had also heard this week from Dr Schwartz, the OIML is also establishing a Task Group on digitalisation.

    During the individual RLMO presentations, it had become clear that the implementation of digitalisation varied between regions, and he would discuss this more later. In fact, the term "digitalisation" itself is sometimes interpreted in different ways, which will undoubtedly be an interesting and important topic for the Round Table to follow for quite a while.

    The annual Round Table meeting had also discussed possible topics for the next interim Round Table meeting:

    - continue the annual RLMO Round Table meeting as a virtual meeting, to provide an opportunity for people to attend who would not be coming to in-person CIML meetings;

    - make it a two-day event, with updates one day, and the annual discussion topics and specialty topics on the second day;

    - open participation in the annual RLMO Round Table meeting to anyone who wants to attend (to promote broader awareness of what is happening in the regions);

    - keep the interim RLMO Round Table meetings closed (using them primarily as planning and 'special-issue' meetings);

    - hold quarterly interim Round Table meetings; and

    - obtain more clarification from the CEEMS countries in the regions on what the new 'Part 5' of OIML Recommendations (verification requirements) should contain.

    Dr Ehrlich indicated that the first two suggestions concerned next year's annual Round Table meeting. The first of these would allow a greater number of people to attend, even if CIML meetings can be held in-person, and gives great flexibility about when the annual Round Table meeting could be held. In the last two years, it has been held a week or two before the CIML meeting, rather than during the same week. The idea of quarterly meetings was also being explored since the next interim Round Table meeting was already planned for January 2022.

    The final topic suggestion had stemmed from the recent Project Group meeting on the revision of R 76, and was to see whether CEEMS in the regions could help in defining what should be included in the proposed "Part 5" to Recommendations and which requirements of Recommendations should be used for verification rather than type evaluation.

    Dr Ehrlich concluded his presentation with some highlights from each of the individual RLMO presentations:

    - AFRIMETS: Mr Jaco Marneweck had explained that the new African Continental Free Trade Agreement had come into force in May 2019, which he said had created the largest free trade area in the world by number of participating countries (55). It would connect 1.3 billion people, and has the potential to lift millions out of extreme poverty. He had added that this would require significant policy reform and trade facilitation measures across Africa. Mr Marneweck had also pointed out that digitalisation was still at the emerging or developmental stage in many African countries.

    - APLMF: The new APLMF president, Dr Osman Zakaria from Malaysia, gave the report since his country has just taken over this RLMO's secretariat. He reported that there were currently 27 APLMF member economies, and that a new five-year strategic plan had been developed. Dr Zakaria had also informed the meeting that the APLMF had conducted a number of seminars and training sessions over the last year using Zoom. These had included e-Learning modules on NAWIs, on fuel dispensers, and soon on conformity to type. A workshop was also being planned to explore the scope of digitalisation efforts in the Asia-Pacific region.

    - COOMET: Dr Yuriy Kuzmenko reported on the history of COOMET, which was celebrating its 30th anniversary, for which Dr Ehrlich offered his congratulations. COOMET TC 2 on legal metrology had held a well-attended webinar on "The role of measurement uncertainty in conformity assessment decisions in legal metrology", which made use of OIML G 19 on this topic. Dr Ehrlich reported that a video of this event could be found on YouTube. COOMET had also held (the day before) a workshop on digital transformation in metrology for young metrologists, and has established a new Working Group on "digitalisation in metrology" led by a young researcher from the Russian Federation.

    - GULFMET: Eng. Omar Kanakrieh had reported that the CIPM had now admitted GULFMET as a full member of the Joint Committee on Regional Bodies (JCRB), including voting rights, and Dr Ehrlich congratulated GULFMET on this achievement. Also, the GCC Common Metrology Law is being updated, and a GCC certification scheme is being developed based on the OIML-CS, which was an exciting development. GULFMET will also decide on a proposal to establish a Working Group on digital transformation at the next GULFMET GA in November 2021.

    - SIM: Mr Pedro Pérez, chairman of the SIM Legal Metrology Working Group (LMWG), reported that a repository on metrological verification of prepackaged products in SIM countries is under development. He also noted that the SIM web page on legal metrology had been updated, and that meetings of the SIM LMWG are being held every three months to discuss topics of relevance to SIM members. Dr Ehrlich reported that he had enjoyed participating in these meetings. Mr Pérez had also pointed out that translations of documents and meetings is a key need in the SIM countries, since there are around 30 countries in the region, and not everyone can speak or understand each other's languages. There is also a lot of activity in SIM concerning digitalisation, with four countries having active programmes in this area: SIMEL (Colombia), RBMLQ-I (Brazil), SICOMET (Argentina) and, recently, INACAL (Peru).

    - WELMEC: The chairman, Mr Klenovsky, had reported that WELMEC was now fully established as a legal body and is moving towards closer cooperation with EURAMET to provide a single voice for metrology in Europe. He also noted that the regulation of smart meters, electric vehicle charging stations, and hydrogen refuelling stations are all active areas of interest within WELMEC. Software validation and digitalisation had been an important topic for many years, especially within WELMEC WG 7, and work was ongoing to establish more trust in the area of smart meters.

    Dr Ehrlich concluded by saying that this had been just a brief overview of the Round Table discussions and presentations, and he encouraged all delegates to go to the new Round Table web page on the OIML website for more details on the many individual presentations. He thanked delegates for their attention and asked if there were any questions.

    Dr Schwartz thanked Dr Ehrlich for his report. He felt that all delegates would agree that the Round Table had developed very well under his leadership despite the pandemic situation. He felt that perhaps he should rather say that Dr Ehrlich had made a "virtue out of a necessity" by taking advantage of video technology to hold online meetings between the usual annual meetings. On behalf of the Committee, he therefore thanked Dr Ehrlich for his commitment and efforts since taking over the chair. He was sure that Dr Ehrlich would welcome any feedback on the activities of the Round Table, so he again asked if there were any questions. There being none, he invited delegates to consider the relevant draft resolution, which was read by Mr Dunmill:

    Draft Resolution CIML/2021/33

    The Committee,

    Notes the report on the RLMO Round Table meetings given by its Chairperson.

- number: '16'
  title: 1 OIML Medals
  narrative: |2+

    Dr Schwartz explained to delegates that OIML Medals were given to recognise the outstanding contribution of individuals to the development of legal metrology. He continued that this year one nomination had been received for a candidate who undoubtedly deserved such an award in recognition of his long career and achievements in the field of legal metrology, and this was Dr Stephan Mieke. Dr Schwartz checked that Dr Mieke was present. He explained that the plan had been that the Awardees would be shown next to their certificate.

    Dr Schwartz introduced Dr Mieke to delegates, saying he had been Senior Scientist in the Division for Medical Physics and Metrological Information Technology at the PTB in Berlin, Germany. He had also been a member of, and responsible for the secretariat of OIML TC 18 Medical measuring instruments and TC 18/SC 1 Blood pressure instruments for many years.

    Dr Schwartz gave the following laudation:

    Stephan Mieke, born in 1951, has served in the field of legal metrology for most of his professional life. He joined the PTB in 1976 as a young PhD student, and is retiring 45 years later, i.e. this year. His field of expertise is in medical metrology, specifically medical devices with a measuring function. In particular when it comes to his very own field, the metrology of blood pressure measurements (sphygmomanometry) he is undoubtedly now - and has been for many decades - one of the leading experts in the world.

    Stephan Mieke has always been devoted to the pursuit of correct measurements in the medical environment. For him, that meant not just his successful research work in the laboratory, where he developed new standards and verification procedures, it also meant going out and contributing to the improvement of medical devices in the real world.

    From early on he followed two parallel pathways towards that goal: legal metrology on the national and international level (most importantly within the OIML), and standardisation. This second pathway became especially important when many world markets became 'deregulated' in the 1990s and medical devices with a measuring function were no longer subjected to mandatory type approvals or verifications in many countries.

    Stephan Mieke's experience and continuous engagement on standardisation boards, e.g. as the long-term convener of ISO/TC 121/SC 3 and IEC/SC 62D/JWG 7, have been crucial to maintaining high metrological standards for medical devices, including in those areas of the world in which they were no longer legally enforced.

    Stephan Mieke has served, or is still serving, on five international metrology boards in the OIML, ISO and the IEC. In addition, he has served on ten national standardisation and accreditation boards in Germany.

    No less important than his numerous direct contributions to the international legal metrology system, is Stephan Mieke's tireless work as advisor, lecturer, and educator.

    He has organised, co-organised or lectured at almost 20 seminars or workshops, and so it is my great pleasure to award Stephan Mieke with an OIML Medal in recognition of all his achievements on behalf of the OIML.

    Dr Schwartz congratulated Dr Mieke on his outstanding career and extended the Committee's best wishes to him for a pleasant, healthy and enjoyable retirement. Dr Schwartz stated that unfortunately he was at the office in Braunschweig and Dr Mieke was at his home office in Berlin, so he could not hand over the OIML Medal in person, but he showed delegates and Dr Mieke his Medal, adding that it would be handed to Dr Mieke in person in the near future.

    Dr Mieke said he was very honoured, saying that as far as he was concerned he had just been doing his duty, so he was pleased to have received such an award. He thought that standardisation, testing, and so on, for medical devices was becoming more and more important because, in many countries the population was getting older, and people sometimes had problems with their health. Blood pressure was one of the basic measurements used by medical doctors, so he thought it was extremely important to continue this work, although in his view, this was work that was slightly different from other OIML technical work. He explained that in this field they did not have physical standards. In many cases they had to identify a good standard, and here, the physicians were more or less the standard, which made things more difficult and complex, so this had always been a challenge for him, and had made the work very interesting. He added that he hoped he had contributed a little bit to improving the situation and again thanked delegates very much for the Award.

    Dr Schwartz confirmed that this had been the case and re-iterated that he highly deserved the medal. He congratulated Dr Mieke again, thanked him for addressing the Committee, and wished him all the best. He also invited Dr Mieke to stay for the remainder of the awards session.

- number: '17'
  title: 1 57th CIML Meeting (2022)
  narrative: |2+

    Dr Schwartz started by saying that delegates might recall that in 2019, the People's Republic of China had kindly invited the Committee to hold the 55th CIML Meeting in Suzhou in 2020. For the obvious reasons which everyone was aware of, this had had to be postponed, not by the anticipated one year, but by two years now. He added that the CIML was grateful to the CIML Member for P.R. China for having confirmed that the invitation was still valid, and that China was ready to host the 57th CIML Meeting in 2022. He asked Mr Qin to take the floor.

    Mr Qin confirmed they had been preparing and waiting to host the CIML meeting for two years, and they cordially invited all CIML delegates to participate in the 57th CIML Meeting to be held in Suzhou in 2022. He added that the global COVID-19 situation would be taken into consideration at that time, and China would continue to actively cooperate with the BIML to ensure that the 2022 CIML meeting would be a warm, pragmatic, in-person meeting. He joked that there was a Chinese proverb which said that "a late dinner is a good dinner".

    Dr Schwartz thanked Mr Qin again for his kind repetition of the invitation to come to China the following year. He added that he really appreciated his Chinese colleagues' patience and understanding of the situation, as well as their continued invitation. Dr Schwartz added that because of the wishes expressed by CIML Members, which had also been expressed in the enquiry undertaken following the previous Committee meeting, he suggested that a sentence be added to the respective draft resolution, so he asked Mr Dunmill to display the respective text with the proposed new sentence added at the

    beginning. Dr Schwartz stressed that the wording reflected what had already been mentioned by Mr Qin - that he wished to hold an in-person meeting the following year, which Dr Schwartz considered was also the wish of all delegates. So, adding this first sentence the complete draft resolution would read:

    Draft Resolution CIML/2021/40

    The Committee,

    Expressing its strong wish to hold the 57th CIML Meeting in person next year,

    Recalling its Resolution 2020/33,

    Thanks the People's Republic of China for confirming its invitation to host the 57th CIML Meeting in 2022, and

    Instructs the Bureau to make the necessary arrangements to organise the 57th CIML Meeting.

    Dr Schwartz reiterated that this would be the proposed final wording if delegates agreed, and if there were no final objections. He asked delegates if there were any comments; there were no objections, so Dr Schwartz confirmed that there was a clear wish and a plan to do whatever is necessary in order to hold an in-person meeting the following year in Suzhou, P.R. China. He asked Mr Qin if a specific date in October had already been reserved for the meeting.

    Mr Qin could not respond due to a technical difficulty with Zoom, so Dr Schwartz stated that this would be communicated to delegates later, and requested that the date be fixed and communicated as soon as possible.

