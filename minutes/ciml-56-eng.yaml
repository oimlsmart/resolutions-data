- number: '4.1'
  title: Report by the CIML President
  narrative: |2+

    Dr Schwartz requested that delegates now considered item 4, his report as CIML President for the past year. He indicated that a supporting document had been provided both in English and French in Addendum 4.1.

    Dear colleagues,

    Once more welcome to the 56th CIML Meeting, our second online Committee meeting. We have experienced another extraordinary year dominated by the COVID-19 pandemic, with a number of challenges, but also opportunities. On the whole, I am very pleased to report that

    despite the pandemic, for the OIML, the years 2020 and 2021 can be considered positive and successful years.

    Let me provide some examples:

    - we very successfully prepared and conducted the 55th CIML Meeting in 2020 as the first CIML meeting held online, with all the CIML resolutions being successfully adopted online just after the meeting;

    - we were able to successfully prepare the 56th CIML Meeting and the 16th International Conference, including the financial planning for the budget period 2022-2025;

    - the work on the OIML-CS continued successfully during this difficult period, where face-to-face Management Committee meetings were not possible, and where assessments of OIML Issuing Authorities and Test Laboratories were significantly impacted by travel restrictions. Despite all of this, as of 1 January 2021, 39 categories of measuring instruments are now in the OIML-CS, and the number of certificates issued per year is increasing;

    - good progress has also been made with the OIML's technical work, especially in the high priority Project Groups, leading to a couple of new or revised publications that were adopted in 2020 and published soon after the 55th Meeting; and

    - CEEMS and RLMO activities were also able to be carried out successfully, thanks to the professional support provided by the CEEMS AG and RLMO Round Table Chairpersons, and by the BIML team.

    This year, our Organisation had a clear focus on four topics:

    1) Firstly, the preparation of the 16th International Conference as the first purely online Conference, with decision-taking during the Conference, using appropriate online voting tools.

    2) Secondly, the preparation of a realistic, sustainable and future-oriented budget for the period 2022-2025, after we had to postpone the respective discussion and decision last year due to the pandemic.

    3) Thirdly, the enhanced cooperation with the BIPM, especially in the increasingly important area of Digital transformation in metrology, and the preparation of a respective draft joint Statement of Intent.

    4) Finally, the implementation of the recommendations of last year's internal financial audit, to further improve the quality assurance processes of the Organisation.

    All these topics will be addressed in my report.

    Concerning the preparation of this year's meetings, I want to mention that I am grateful that the responses to my enquiry from January 2021 provided a clear picture concerning both holding purely online meetings in 2021, and having online voting during these meetings. Although there is a clear desire to come back to in-person, or at least to hybrid meetings in the future, there was a clear majority in favour of holding purely online meetings this year, mainly because of the still significant travel and quarantine restrictions. I am grateful to the CIML Member from P.R. China who not only supported this decision, but also extended their kind invitation to host the 57th CIML Meeting as a physical or hybrid meeting in 2022, if possible.

    The survey also provided a clear picture concerning voting at the 2021 (and future) meetings. A substantial majority of 98 % of those who replied support the application of the "in-meeting" conditions defined in Article VIII of the OIML Convention to online or hybrid Conferences, by analogy with CIML Resolution 2020/1 taken last year. A respective Resolution will be explained under CIML agenda item 4.2 and put forward for confirmation at the Conference. I would appreciate if all Members could confirm their opinion expressed in the survey of January 2021, and support the Resolution proposed under CIML agenda item 4.2, which I am sure will be very important to conduct our business online and make our Organisation "future-proof"!

    Let me take this opportunity to say a big thank you to all of our Members, to the two Vice Presidents, to the Presidential Council, and to all the BIML Team. You have all actively contributed to successfully managing another challenging pandemic year, so that business continuity is guaranteed for our Organisation and significant progress could be made despite the adverse situation.

    With this, I am very pleased to welcome quite a number of new CIML Members:

    Bulgaria: Mrs Snezhana Spasova

    Finland: Ms. Sari Hemminki

    Israel: Eng. Tomy Glantz

    Italy: Mrs Loredana Gulino

    Kazakhstan: Mr Arman Abenov

    Kenya: Mr John Ngugi Mwaura

    Morocco: Mrs Fadwa Maliki

    Pakistan: Dr Abdul Aleem Memon

    Poland: Prof. Jacek Semaniak

    Romania: Mrs Roberta Todor

    Russian Federation: Mr Evgeny Lazarenko

    Spain: Mr Jose Angel Robles Carbonell

    Tanzania: Miss Stella Rwehabula Kahwa

    Thailand: Mr Wattanasak Sur-iam

    A warm welcome to you all.

    I am also very pleased to welcome Ukraine as a new Member State. Ukraine has been an OIML Corresponding Member for many years. I would have liked to extend a special welcome to the new CIML Member for Ukraine, however, he or she will be appointed in the near future and their name will be communicated to you as soon as possible.

    Fortunately, no OIML Member State has been delisted since the last CIML meeting. I would like to take this opportunity to encourage new and all CIML Members to use OIML Guide 17 Guide for CIML Members. It provides useful and necessary information on the role and obligations of CIML Members.

    Concerning OIML Corresponding Members, I am pleased to announce that a new Corresponding Member, Guyana, joined in January 2021, and also the re-integration of Gabon in February 2021.

    One OIML Corresponding Member had to be delisted in April 2021 due to non-payment of outstanding arrears to the OIML, despite extensive and sustained dialogue by the BIML to facilitate payment.

    At this point I would like to thank two long-standing, former CIML Members for their contributions to the OIML: Mr Tuomo Valkeapää, who has been the CIML Member for Finland since 1999, and who retired a few months ago, and also Dr Sergey Golubev, who has been the CIML Member for Russia since 2015 and also Member of the Presidential Council since 2016. Dr Golubev has recently taken on another function. I would like to express my sincere thanks to both former CIML Members for their good cooperation and active support of the OIML's work. On behalf of the Committee let me wish both colleagues all the best for the future.

    The Presidential Council met online on 9/10 March 2021. In addition, the Presidency, the BIML Director and the BIML Assistant Directors have held several online meetings to discuss the current situation and take the necessary decisions. As regards Presidential Council membership, Mrs Corinne Lagauterie and Dr Yukinobu Miki both retired from their positions in their respective governments, and therefore stepped down from the Presidential Council in the course

    of the year 2020. Dr Toshiyuki Takatsuji, the new CIML Member for Japan, accepted my invitation to become a Presidential Council member. I am also pleased to state that we have taken care of all the actions arising from the 55th CIML Meeting; that means they are either completed or on the agenda of this year's meeting.

    CIML Resolution 2020/5 requires the implementation of four recommendations following the internal financial audit conducted last year:

    - The first recommendation covers the establishment of an internal financial audit, which is intended to implement at least a four- if not a six-eye principle as part of the quality assurance processes of the Organisation to ensure, by annual spot-checks, that the Staff Regulations (as laid down in OIML B 7) and the Financial Regulations (as laid down in OIML B 8) are adhered to. I have appointed Dr Bobjoseph Mathew, CIML Second Vice-President, and Mrs Mairead Buckley, Member of the Presidential Council, as members of the Internal Financial Audit Team, and asked them to conduct a respective audit of expenses. The first audit has been performed and focused mainly on the review of various process documents. A couple of draft findings and conclusions still need to be discussed and clarified between the audit team and the BIML Director, before it will be submitted to the President and the Presidential Council.

    - The second recommendation deals with the development of a policy on the operating reserve of the OIML. A respective policy paper has been drafted and will be introduced and explained under CIML agenda item 7.6 later today.

    - The third recommendation is about a benchmark study of BIML salaries by an outside firm, similar to a study recently conducted by the BIPM. The BIML Director is in contact with the BIPM Director but before deciding on possible steps, it is suggested to wait for the result of the BIPM study to be fully analysed. Part of the third recommendation was an immediate update of the wording in Annex 2 in OIML B 7 to identify the source of the indexes used to calculate BIML salaries. This has been done and an amendment has been published.

    - The fourth and last recommendation relates to a review of the contractual arrangement with the current external auditor, which will expire next year. Here it is intended to put in place a procedure to identify a new external auditor at the beginning of the year 2022. Members of the Presidential Council would be involved in the evaluation of respective tenders.

    As this will be the first internal financial audit report of its kind, its finalisation will certainly require some time and so I ask you for your patience regarding this.

    As I stated at the beginning of my report, the financial situation and the preparation of the budget for the period 2022-2025, and also a supplementary budget for the period 2026-2029, were the major focus this year. At the request of the Presidency, last year the Bureau had already investigated four different scenarios for the budget. I am very pleased that the BIML Director will present and explain a realistic, sustainable and future-oriented draft budget for the period 2022-2025 under CIML agenda item 7.5. later today. Without going into the details, I only wish to mention here that the new budget is based on the following elements:

    - an extensive analysis of current cost structures;

    - significant savings and a reduction of operating costs for the Organisation as far as possible;

    - the introduction of classes for Corresponding Members, and a gradual increase in Corresponding Member fees up to 50 % of Member State fees; and

    - an annual increase in Member State fees of about 1.4 % to limit the share of staff expenses to about 70 % of operating costs in the long term.

    By the way, membership fees have not been increased in the last ten years. I am confident that a large majority of CIML Members will support not only these elements of the new budget, but

    also the proposed budget itself. I am sure that they provide the best way for our Organisation to guarantee the current level of services to our Members and, at the same time, give at least a little flexibility to take on new tasks that are considered important for our future, such as e-Learning and digital transformation in legal metrology and of course the continuation and increased request for services in field of the OIML-CS. I also see the new budget as an opportunity for our Organisation to remain attractive not only to existing Members, but also to potential new Members.

    I would like to address a few words on the subject of digital transformation in legal metrology which I consider to be key for our future.

    Digital transformation is a frequently used term, but what does it actually mean? What do we understand by this? Well, it can be defined as the process of using digital technologies to create new, or modify existing, processes and services to customers, to meet changing business and market requirements. Digital technologies use Embedded Systems, the Internet of Things, Cloud Computing, Blockchain, and Big-Data concepts to facilitate completely new technology fields and data-driven markets such as Industry 4.0, Machine Learning, and Artificial Intelligencebased Smart Services provided by digital platforms.

    I think we can all imagine that these technologies will certainly significantly affect traditional legal metrology concepts, but at the same time offer enormous opportunities. For instance, digital technologies can help to

    - better coordinate legal metrology processes and improve their efficiency,

    - reduce product development costs, and

    - minimise the time to market of innovative products and services.

    "Digital transformation is a journey, not a destination" - this statement can be found in the editorial of the July 2021 edition of the OIML Bulletin which is dedicated to this important topic. I am very pleased that the OIML is part of that journey, and that the BIML, in close cooperation with colleagues from the PTB, were able to organise a respective OIML Webinar on 5 May 2021, which brought together more than 200 participants and various stakeholders from all over the world. I would highly recommend reading the July edition of the Bulletin, if you have not already done so.

    The OIML also participated in the online CIPM Workshop entitled "The International System (SI) in FAIR digital data" in February 2021. The workshop was intended to bring together leading experts and groups in digitalisation related to metrology and data science in order to exchange ideas and agree on basic standards for a "Digital SI framework". At both the CIPM Workshop and the OIML Webinar, a first draft "Joint Statement of Intent" concerning the digital transformation in metrology was presented and discussed, which has been elaborated by the CIPM Digital Task Group and the new OIML-BIPM Joint Task Group. This will be explained in more detail under CIML agenda item 4.3.

    In order to take up the momentum from the OIML Webinar and the CIPM Workshop, and to be able to cooperate with the respective CIPM Digital Task Group, and maybe other stakeholders in the field of quality infrastructure, I suggest the establishment of an OIML Digitalisation Task Group, and this proposal will be explained in more detail under CIML agenda item 4.4.

    I am very pleased that despite the pandemic situation a number of new or revised publications and project proposals can be presented this year.

    In particular, I would like to highlight the work in TC 12/p 1 on electricity meters. This work has provided a proactive solution to the increased interest in, and demand for, electric vehicles and their charging stations, by proposing to publish an OIML Guide on these systems. This guide will enable the OIML to provide information on international best practice during the time it takes to develop a full Recommendation in this significant area.

    To take up the momentum from this year's World Metrology Day, and because "Measurement for Health" is considered a key topic for the OIML, an OIML ad-hoc Task Group on Medical Measuring Instruments was established by the BIML. This Group had its kick-off meeting in April 2021, and agreed to initiate three items of technical work in the field of medical devices, to cover infrared medical thermometers, pulse oximeters, and the verification of sphygmomanometers. I am very happy that respective project proposals have been submitted and will be considered under CIML agenda item 9.1 which we are going to consider tomorrow.

    The Group will also consider the OIML's longer term strategy in the field of Medical Measuring Instruments. I am very pleased that just last week the October 2021 OIML Bulletin has been published. It is a Special Edition dedicated to "Legal Metrology for Health". Let me take this opportunity to thank the mentors for this topic, the colleagues from P.R. China, and all the authors, and the BIML team, notably the Editor of the OIML Bulletin, Mr Chris Pulham.

    I will keep this part very short, as I had already mentioned that the work on the OIML-CS did successfully continue in this difficult time, with a lot of positive numbers and developments. Without going into the details here I would just like to take the opportunity to thank the Management Committee Chairperson, Mr Mannie Panesar, the Deputy Chairperson, Mr Bill Loizides, and the Executive Secretary and BIML Assistant Director, Mr Paul Dixon, for their outstanding commitment and continued efforts in support of the OIML-CS. Further information on the operation of the OIML-CS will be provided by Mr Panesar in his report under CIML agenda item 10.1.

    I also want to be brief about the CEEMS activities and not anticipate the report under CIML Agenda item 11.

    I would just like to mention the following: The revision of OIML D1 was approved by the CIML last year and published as a joint OIML-BIPM document shortly after its adoption. Based on a significant discussion at the online CEEMS Advisory Group (AG) meeting in October 2020, last year, and the respective CIML Resolution last year, the CEEMS AG Chairperson and Immediate Past President Mr Peter Mason has started the development of a new publication entitled Application of online technology to capacity building and other CEEMS activities. Work on this is progressing with the help of a small working group.

    There is also agreement that e-Learning should be integrated into this work. At the moment, the updating of the OIML e-Learning server and the software platform are advancing, although the pandemic has led to some delay in this work.

    I would like to mention here that the CEEMS AG is still looking for a new Vice-Chairperson as the successor of Dr Peter Ulbig. A call for candidates for the vacant CEEMS AG Vice-Chairperson position will therefore be announced under CIML Agenda item 11.

    Concerning the OIML's cooperation with other International Organisations I would also like to refer to the reports that will be provided under CIML agenda item 4.3 on the work of the new "OIML-BIPM Joint Task Group", and CIML agenda item 15 on "International cooperation".

    I would like to once more express my sincere thanks to the CIML First Vice-President Dr Charles Ehrlich for having taken over the chair of the RLMO Round Table (RT) last year and having organised two successful online interim RT meetings in April and June this year, in addition to the regular (online) RT meeting held on 30 September 2021. I look forward to the respective report under CIML agenda item 15.1.

    As I have already mentioned in previous reports, it is the intention to target the OIML Bulletin at relevant and interesting key topics, and thus make it an attractive journal for the legal metrology community worldwide, and also a good figurehead of our Organisation.

    I am pleased to report that the new concept of "Mentors" who take responsibility for a certain key topic has proven to be successful. I have already mentioned the July 2021 edition of the Bulletin, which is dedicated to the topic "Digital transformation in legal metrology". I also mentioned already the October 2021 edition of the Bulletin, taking up the key topic

    "Measurement for Health", which was also this year's World Metrology Day theme. Again, many thanks to all those who actively support and promote the OIML Bulletin and who help to make it an attractive journal for the legal metrology community worldwide. An updated list of future key topics can be found on the OIML website under Publications.

    And finally, my term as President will expire in mid-October 2023. This could be just before, during, or after the CIML meeting in 2023, depending on the date, which has not yet been determined. I therefore would like to suggest that soon after this year's meeting, a call should be sent out for candidates to run for President. Candidates will then be considered and voted on at the CIML meeting in 2022, with the successful candidate starting his or her term at the beginning of the CIML meeting in 2023.

    With this, let me conclude by thanking you all for your continued support in these challenging times. I wish us all very productive and fruitful meetings this week. Thank you very much.

    Dr Schwartz concluded by saying that if there were any questions or comments he would be happy to take them. Since there were none, he proposed the following draft resolution:

    Draft Resolution CIML/2021/03

    The Committee,

    Notes the report given by its President,

    Notes the information given on the election of a President to be held in 2022, and

    Reminds CIML Members that candidacies must be sent to the Bureau by the end of May 2022 at the latest.

- number: '4.2'
  title: Confirmation that in-person and online participation in OIML meetings is
    equivalent
  narrative: |2+

    Dr Schwartz informed delegates that he had prepared a short presentation, which was being displayed on the screen.

    By way of an introduction, he drew attention to his previous report. He had already mentioned that the previous year's meeting had been prepared and successfully conducted as the first online CIML meeting, with all the CIML resolutions being voted online just after the meeting, once a separate CIML decision had been taken online to allow this. He had also mentioned that after the previous year's CIML meeting, a survey of CIML Members and Corresponding Member Representatives had been conducted, which had provided a clear picture regarding online participation and voting for this year's and future OIML meetings. An overwhelming majority of 98 % supported online participation and the application of the "in-meeting" conditions defined in Article VIII of the OIML Convention to online or hybrid Conferences by analogy with CIML Resolution 2020/1 taken last year.

    Now that the second online CIML meeting and the first online Conference were being conducted, he thought it was the right time to confirm the principle that in-person and online participation in OIML meetings was considered equivalent, regardless of whether the meeting was conducted as an in-person, online, or hybrid (a combination of in-person and online) meeting.

    Dr Schwartz commented that even once the situation regarding the COVID-19 pandemic had improved, and traditional meetings with in-person participation resumed, it should be acknowledged that there was a clear appetite, and a continued need, to hold online meetings in the future. He commented that the right balance would have to be struck between in-person, online, and possibly hybrid meetings, but as a consequence the Organisation should be well prepared to ensure that these types of meetings, and the decisions taken at them, would be considered to be valid. He informed delegates that more background information could be found in Addendum 4.2.

    The proposed draft resolution was shown on the screen:

    Draft Resolution CIML/2021/04

    The Committee,

    Recalling its resolution 2020/1,

    Noting that all OIML meetings can be held with in-person participation, or with solely online participation, or with a combination of in-person and online participation,

    Decides that in-person and online participation in all OIML meetings is considered to be equivalent, and

    Requests the 16th Conference to endorse this policy.

    He added that he would appreciate it if the Members would confirm the positions they had already expressed in the survey, and support the Resolution, which he felt was important to enable the OIML to conduct its business online, and make the Organisation "future-proof". He asked if there were any questions or comments on the topic or draft resolution, but there were none.

- number: '4.3'
  title: OIML-BIPM Joint Task Group (JTG)
  narrative: |2+

    As delegates were aware, a new OIML-BIPM Joint Task Group had been established the previous year, on the basis of both CIPM Decision 109-15 and CIML Resolution 2020/6, with the aim of fostering enhanced cooperation of the two international metrology organisations.

    Concerning the JTG's membership, strategic and operational objectives, current tasks and actions, Dr-Schwartz directed delegates' attention to the written report that had been provided in Addendum 4.3 and added that the agreed Terms of Reference of the Joint Task Group could be found in Annex 1 to that Addendum.

    To summarise the activities of the JTG from the end of the previous year to the current time, Dr Schwartz announced that between December 2020 and September 2021 the JTG had met online five times, which he emphasised indicated it was very active. The focus of these meetings had been on

    - the establishment of an action plan (with the prioritisation of actions),

    - the joint preparation of World Metrology Day 2021 on the theme of "Measurement for Health",

    - the digital transformation of metrological processes and activities, and

    - the development of a respective draft Joint Statement of Intent on digital transformation in the international scientific and quality infrastructure.

    Dr Schwartz mentioned that delegates could find the current version of the draft Joint Statement of Intent as Annex 2 to Addendum 4.3. He highlighted the fact that the focus had been on the presentation of the JTG position at both the CIPM Workshop which had been held in February 2021 and at the OIML Webinar which had been held in May 2021.

    Dr Schwartz stated that the JTG would like to put forward three proposals for consideration at this Committee meeting:

    1) The CIML was asked to confirm its support for the CIML President to sign the final version of the Joint Statement of Intent with the following Resolution which he read:

    ## Draft Resolution CIML/2021/05

    The Committee,

    Recalling its Resolution 2020/6,

    Welcoming the activities of the OIML-BIPM Joint Task Group in the field of digital transformation of metrological processes and activities,

    Confirmss its support for the CIML President to sign the final version of a Joint Statement of Intent on digital transformation in international scientific and quality infrastructure (QI), which is intended to be also signed by other QI stakeholders, such as CODATA, IAF, IEC, ILAC, IMEKO, ISC and ISO.

    He emphasised that this included a number of important international organisations wanting to express their will to cooperate in this field of digital transformation processes.

    2) The second proposal of the JTG dealt with a possible BIPM-OIML Memorandum of Understanding (MoU). The background to this was that although there is an existing MoU between the OIML, the BIPM and UNIDO, there is not yet a bilateral MoU between the two metrology organisations and so the following Resolution was being proposed. Dr Schwartz read:

    ## Draft Resolution CIML/2021/06

    The Committee,

    Recalling its Resolution 2020/6,

    Noting the activities of the OIML-BIPM Joint Task Group (JTG) to explore opportunities for an enhanced cooperation of the two international metrology organisations,

    Confirms its support for the JTG to consider a possible bilateral OIML-BIPM MoU,

    Requests the CIML President to report back on any proposals in due time.

    Dr Schwartz added that if this resolution was approved then this could lead to initial ideas being presented in the future, as soon as next year.

    3) The third proposal of the JTG was that the CIML was being asked to confirm its support for the JTG to start preparing a joint OIML-BIPM event on the occasion of the 150th Anniversary of the Metre Convention and the 70th Anniversary of the OIML in the year 2025.

    Dr Schwartz stated that this would be considered separately at the Conference under agenda item 14, as well as during the CIML session held after the Conference, under agenda item 17.3.

    Dr Schwartz asked if there were any questions or comments.

    Mr Awosola (UK) asked if the JTG had considered the question of the OIML merging with the BIPM to create one international metrology organisation. He observed that this seemed to be one way of improving the efficiency and the promotion of metrology.

    Dr Schwartz replied that in the terms of reference in Annex 1 of Addendum 4.3, it was stated that the aim of the JTG was to foster and enhance cooperation between the BIPM and the OIML. They had agreed not to consider a merger but to restrict themselves to looking for opportunities for closer cooperation. This meant keeping within the frameworks of the existing Metre Convention and the OIML Convention, and also maintaining the two Organisations' existing locations, with the BIPM situated at Sèvres and the OIML in northern Paris. A merger would not be considered, but even closer cooperation was being considered within this framework. He stressed that there had been difficult

    discussions in the past to take this further, but what they wanted to do now was to concentrate in a constructive way, within the current frameworks, to achieve closer cooperation. He thought this was a good approach and would prevent further drawn out discussions as they had had in the past.

    There were no further questions, so Dr Schwartz proposed to move to the next sub item.

- number: '4.4'
  title: Establishment of a Digitalisation Task Group
  narrative: |2+

    Dr Schwartz informed delegates that this item would also be presented by him. The proposal had been summarised in Addendum 4.4.

    He was sure he did not need to repeat how obvious it was to delegates that the digital transformation of processes and organisations was advancing at a rapid pace on a worldwide scale. He was happy to repeat that the OIML was part of this transformation process. He stated that significant work and collaboration had already taken place through the OIML-BIPM Joint Task Group and with other quality infrastructure (QI) partners to make progress with the digital transformation of processes relating to metrology, standardisation, accreditation and conformity assessment.

    He considered that it was still the beginning of this worldwide digitalisation process, and once the Joint Statement of Intent was signed by the OIML, the BIPM, and other partners in the scientific and quality infrastructure, a group of experienced individuals would be needed who would be able to cooperate and collaborate with other partners to represent and promote the interests of the legal metrology community in this process. Dr Schwartz added that this was the reason why he wished to put forward a proposal to establish an OIML Digitalisation Task Group. The purpose and task of this group would be to examine all relevant matters, technological advancements and opportunities related to digital transformation that would benefit the OIML, in cooperation with the other QI partners. The Task Group would need to define the appropriate scope of its work, including appropriate terms of reference, membership and operating rules, deliverables and outcomes.

    Dr Schwartz continued that as part of its terms of reference, the Task Group would also need to execute and deliver, with assistance provided by the BIML, the guidance, objectives and policy decisions of the Conference, the CIML, the OIML-BIPM JTG, and decisions from other relevant bodies and fora, which would include the OIML-CS MC, the CEEMS AG and the RLMO RT. He added that if this received approval from the Committee he suggested that appropriately experienced individuals could express their interest in joining this Task Group through their CIML Member, Corresponding Member Representative or liaison organisation delegate. It was envisaged that the Task Group would comprise not more than ten members, from which a Chair and Deputy would be elected. He added that if more than ten members expressed an interest, they would find a way to deal with this. Nominations should be made to himself as CIML President in the form of a letter of motivation sent to the BIML by 30 November 2021. This concluded his presentation, so he read the draft resolution:

    ## Draft Resolution CIML/2021/07

    The Committee,

    Notes the report on the proposal for a Digitalisation Task Group given by its President,

    Welcomes the establishment of an OIML Digitalisation Task Group with the aim of examining and proposing options and solutions regarding opportunities for the OIML concerning the digital transformation of processes and services to its Members and stakeholders, in cooperation with other QI partners, and

    Requests CIML Members, Corresponding Member Representatives and Organisations in Liaison to make nominations for members of this Task Group by 30 November 2021.

    Dr Schwartz asked if there were any questions or comments.

    Mr Qin (P.R. China) said that he considered digitisation to be the kernel of the digital economy, adding that digitalisation was now something they needed to take into consideration. Digitalisation of metrology could help in digitalising the industries it served, and in this way, metrology could play a greater role in the economic and social development. Mr Qin stated that China supported this strategic decision to establish a Task Group on digitalisation and was willing to join and make a contribution to this Task Group.

    Dr Schwartz thanked Mr Qin for expressing China's interest in being part of the Task Group.

    Mr John Paul Musimami (Uganda) said that Uganda also supported the digitalisation of processes. Their experience in Uganda concerned staff going into the field to carry out the verification of weighing equipment. They had found that when they had gone digital, and all fees had been collected through an e-payment platform to avoid inspectors having to collect them in cash, this had been highly successful, and their revenues had increased. He said that Uganda's experience in this area meant that they were very interested in participating, and expressed an interest in being nominated for the Task Group that had been proposed in the resolution since they had already seen the advantages of digitalisation.

    Dr Schwartz thanked Mr Musimami for his comment which was also in support of the proposal.

    A delegate from Vietnam $ ^{1} $ stated that they also supported this initiative, but he was concerned that a Task Group of ten members offered few opportunities, so he asked if they could open up the Task Group to observers. This would be useful to small countries such as Vietnam and would mean they would have a chance to be a part of this initiative.

    Dr Schwartz thanked the Vietnamese delegate and repeated what he had already said, stressing that they would find a way of coping with more than ten interested Member States or Corresponding Members if necessary, so no Members should feel excluded.

    There were no more comments or questions.

    Dr Schwartz reiterated that item 5, the report from the BIML Director would be dealt with at the beginning of the second session the following day. He said that before taking a short break, he wanted to announce that the next item on the agenda would be dealt with in a closed session, which would be exclusively open to the heads of the delegations from the Member States, and to Members of Honour. During this item they would be considering the renewal of the contract of Mr Paul Dixon as BIML Assistant Director. This discussion would take place immediately after the break, so the closed session would be held in a Zoom "breakout room". He suggested that Mr Dunmill explained how this would work before the break. He requested that the other participants also reconvened, but that they had a chat in the main room before the breakout group returned.

    Mr Dunmill gave an explanation of how the Zoom breakout group session would work.

- number: '5'
  title: Report by the BIML Director on BIML matters and activities
  narrative: |2+

    Dr Schwartz welcomed delegates to the second session of the 56th CIML Meeting $ ^{2} $ . He asked Mr Donnellan to take the floor to give his report under this item.

    By way of an introduction, Mr Donnellan stated that since the 55th CIML Meeting, the BIML had been focusing on its response to the OIML's short-term needs and priorities, as well as planning for future growth and evolution. He highlighted that, despite the impact of the global pandemic on the legal metrology community, 2021 had provided an opportunity to reconsider the OIML's services and future focus, and he considered that the BIML had been very successful in adapting to the changing demands and evolving landscape.

    Mr Donnellan commented that, when considering planning for the future, the Organisation was orientating the functions and operations of the BIML to ensure it remained a modern and adaptive international organisation secretariat. He considered that the BIML had sufficiently flexible arrangements to be operationally effective, and to also engage in strategic focus and activities, adding that this had been tested throughout the period of the pandemic. He continued that strategic planning had also been engaged in for the future, which involved considering the digital evolution of the Organisation. He specified that for the BIML, this had meant involvement in the creation of the OIML-BIPM Joint Task Group, reaffirmation of the quadripartite partnership, and establishment of a Digital Task Group, amongst other activities.

    Mr Donnellan stated that during this period, the BIML had participated in, and supported, various workshops, seminars and conferences on digital metrology, and it had been actively developing the OIML's e-Learning strategy. He stressed that all of this strategic work had continued despite the restrictions and limitations imposed by the global pandemic. He added that the BIML had contributed many good-practice examples of procedures, processes and systems to the Organisation for Economic Co-operation and Development (OECD) study, and was also working with United Nations Industrial Development Organization (UNIDO) to examine the impact and utilisation of OIML publications and the OIML-CS.

    Mr Donnellan continued that despite the OIML's adaptability, the global pandemic had posed challenges and opportunities for most organisations, and the BIML had been no different. He considered that the BIML had responded to all these challenges positively, effectively and efficiently, including moving to online meetings and Conferences and online voting. He added that these flexible, adaptive work practices had minimised the impact of the pandemic on the BIML's activities, particularly in planning for the Conference, and would serve the Organisation well in the future.

    Mr Donnellan drew delegates' attention to the supportive infrastructure that the Organisation had put in place, which he said was facilitated by the BIML. He reported that the BIML continued to provide a high level of support to enable TCs, SCs and PGs to convene technical meetings electronically, adding that a growing number of PGs were using this new way of working to hold meetings, which he commented was very encouraging. He continued that by using videoconferencing, the BIML had also provided support for many governance and committee meetings of the Organisation. He highlighted that a major upgrade to the OIML website software platform had significantly enhanced the infrastructure, and had enabled continued, reliable, and secure provision of services.

    Moving on to the subject of membership, Mr Donnellan stated that during the period since the last online CIML meeting, no OIML Member States had been delisted. One OIML Corresponding Member had been delisted at the beginning of 2021 due to non-payment of arrears, despite sustained efforts to recover that debt. Mr Donnellan remarked that the OIML was very pleased to welcome Ukraine, which had acceded to become an OIML Member State after many years as a Corresponding Member, and was also delighted to welcome Guyana, which had joined the Organisation as a Corresponding Member, and Gabon which had been readmitted as a Corresponding Member. The BIML had been actively helping a number of Corresponding Members wishing to become Member States, as they had done with Ukraine. The BIML continued to promote the benefits of membership of the Organisation in addition to proactively seeking prospective new Members by liaising with ministries and diplomatic missions.

    Mr Donnellan went on to consider the Organisation's debt recovery and payments. He said that the BIML continued to devote an increasing amount of internal resources and new strategies to recover persistent outstanding debts of Member States and Corresponding Members, as well as unpaid OIML-CS certificate registration fees. He stated that in early 2021, the BIML had implemented a new procedure for the early identification and case-management of Members at risk of defaulting on their contributions. He was pleased that this procedure had already produced good results, and had actively prevented Members from being delisted.

    Mr Donnellan pointed out that during the current year, a significant amount of the BIML's time and resources had been dedicated to the preparation of the proposed budget. A new sustainable and futureorientated draft budget had been prepared for the period 2022-2025. This had involved an extensive

    analysis of cost structures, as well as an examination of ways to reduce operating costs whilst still enabling the BIML to deliver on the Organisation's expectations and strategic priorities.

    Mr Donnellan said that, as he had already mentioned, the focus on the three core pillars of activity of the Organisation was also reflected in the work of the BIML. With regard to the technical work, the BIML had assumed (co-)convenership of even more PGs during the current year. The impact of the global pandemic had been more pronounced in 2021, which had resulted in a slowing of the activities of some PGs. Only one new or revised publication had progressed to the Committee Draft stage, and only two publications were proposed for CIML approval, but Mr Donnellan stressed that a significant number of project proposals would be considered later in the current session. He added that the BIML also continued to ensure that all OIML publications were reviewed, with a focus on the high-priority publications which had been identified by the Organisation. Finally, all publications which had been approved in 2020 had been published on time.

    Moving onto the OIML-CS, Mr Donnellan stated that it continued to provide an international system to implement an effective, internationally harmonised type approval framework, adding that in 2021, OIML Issuing Authorities and their associated Test Laboratories, had continued to extend their scopes. He added that new editions of OIML Recommendations were continually being added to the OIML-CS, and the transition of instrument categories to Scheme A also continued. Mr Donnellan commented that they were very pleased that Iran had joined the OIML-CS in 2021 as a new Utilizer. He added that the number of OIML-CS certificates had been consistent since 1 January 2018, despite the effects of the pandemic. Mr Donnellan reported that at the Sixth OIML-CS Management Committee meeting in March 2021 there had been discussions about the structure and effectiveness of some of the System's subcommittees. He remarked that this demonstrated a focus on the future, and an internal reflection on the operation and function of the System. He stressed that it was important for all stakeholders of the international legal metrology community to demonstrate a genuine commitment to the OIML-CS, and to promote it nationally.

    Mr Donnellan highlighted another of the three pillars, Countries and Economies with Emerging Metrology Systems (CEEMS). He stated that CEEMS activities undertaken in 2021 had included the development of a publication entitled Application of online technology to capacity building and other CEEMS activities, as well as preliminary work to revise OIML D 14 Training and qualification of legal metrology personnel and OIML D 19 Pattern evaluation and pattern approval. Mr Donnellan remarked that delegates would hear more about these topics during the report to be given on CEEMS activities later in the CIML meeting.

    Mr Donnellan continued that one of the increasingly important core activities of the Organisation was e-Learning. He stated that in conjunction with their stakeholders, the BIML was preparing a strategic development agenda for the OIML e-Learning platform. In 2021, planning meetings had been held and work had progressed to advance the system which the OIML currently made available to its Members.

    Mr Donnellan said that the BIML had continued to exercise its external liaison functions throughout 2021 despite the challenges and difficulties experienced by many international and regional organisations in convening meetings. Since the 55th CIML Meeting, significant collaboration and coordination had occurred with many organisations in liaison, including the OIML's quadripartite partners (BIPM, ILAC, ISO), as well as other standardisation, accreditation and conformity assessment organisations. The BIML had also engaged with many other organisations, including the IEC, OECD, UNESCO, UNIDO, and the WHO. The BIML also participated in the Joint Committee for Guides in Metrology (JCGM) committees. He added that the BIML had also given many online presentations to RLMOs and RMOs as part of specific seminars, AGMs, and technical events. He also highlighted that in 2021 the BIML had represented the OIML's interests in many online workshops, forums, round tables and other events, many in conjunction with World Metrology Day, and he confirmed that high levels of positive feedback have been received on these presentations.

    Moving onto World Metrology Day, the BIML and the BIPM had again worked collaboratively during 2021 to prepare for World Metrology Day. The theme for 2021 had been "Measurement for Health". This theme had been selected to create awareness of the important role that measurement played in many aspects of our health and wellbeing. He drew attention to the fact that in 2021 there had been

    - 34 posters submitted by National Institutes and other Organisations,

    - 35 events published, most of which had been held online,

    - videos by the CIML and CIPM Presidents,

    - videos by the BIML and BIPM Directors, and

    - over 6000 distinct visitors to the WMD website on 20 May alone.

    Mr Donnellan specified that the 2021 poster had been designed by the Saudi Standards, Metrology and Quality Organization (SASO) under the auspices of GULFMET, and he added that it was available in English, French and many other languages. He thanked the colleagues in SASO and GULFMET for their cooperation on WMD, and also thanked the WMD Team for their efforts again this year to administer the event online.

    Looking at the following year, Mr Donnellan said that the BIML would continue to pursue strategic initiatives for the benefit of the Organisation and its Members, which he stressed was the BIML's core mandate. He remarked that many of these items would be discussed during the current meetings. He added that the period after the meetings would also provide an opportunity to build on these initiatives, and to develop a strategic, future-orientated agenda. This would include a focus on adaptative and innovative ways to deliver outcomes for stakeholders and to create meaningful impact internationally, regionally, and nationally. He said that the BIML would continue to adapt and respond to the demands and challenges it faced, and provide its usual high level of service to all Members and stakeholders, even in the most difficult of times. This concluded Mr Donnellan's presentation.

    Dr Schwartz thanked Mr Donnellan for his comprehensive and positive report and asked whether delegates had any questions or comments; there were none. He asked Mr Dunmill to read the draft resolution:

    Draft Resolution CIML/2021/08

    The Committee,

    Notes the report given by the BIML Director.

