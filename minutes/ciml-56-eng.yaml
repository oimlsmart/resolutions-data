- number: '10.2'
  title: Recommendations from the OIML-CS MC to the CIML
  narrative: |2+

    Mr Dixon stated that detailed information on this item had been provided in Addendum 10.2.

    Regarding the background to the proposal on the use of ISO/IEC 17020 and the recommendations, Mr Dixon stated that OIML B 18 Framework for the OIML Certification System (OIML-CS) currently specified that OIML Issuing Authorities demonstrated their competence through the application of ISO/IEC 17065. As Mr Panesar had mentioned, the OIML-CS had come into operation in 2018, and almost right from the beginning, the Management Committee had discussed the possibility of using alternative pathways to enable OIML Issuing Authorities to demonstrate their competence, with the aim of providing more flexible options, reducing barriers to participation, and encouraging more OIML Issuing Authorities into the OIML-CS.

    To support this work, a Working Group had been established by the Management Committee to explore possible alternatives to ISO/IEC 17065. Management Committee members had requested that the Working Group looked at ISO/IEC 17020, which was the standard for inspection bodies, so this had been selected for specific analysis. The Working Group had considered it timely and efficient to present the concepts and approach regarding use of ISO/IEC 17020. He added that there were potentially other alternatives, which the Working Group would continue to explore.

    Mr Dixon drew delegates' attention to the ISO/CASCO International Standards and Guides developed to support conformity assessment. Within these Standards there was a basic concept called the Functional Approach (ISO/IEC 17000:2020, Annex A). Mr Dixon said that this divided conformity assessment into three key functions: "selection", "determination", and "review, decision and attestation". He commented that delegates who were familiar with conformity assessment would be able to identify these three different activities.

    Mr Dixon stated that ISO/IEC 17020, which related to inspection, and ISO/IEC 17025 which related to testing and calibration, were classified as standards for the "determination" function only, whereas ISO/IEC 17065 covered all three functions. As a consequence, in considering the use of

    ISO/IEC 17020, the Working Group had proposed that supplementary documentation relevant to the other two functions ("selection" and "review, decision and attestation") would be required in order to provide equivalent outcomes to those specified in ISO/IEC 17065, which he added was currently used by the OIML Issuing Authorities.

    Mr Dixon reported that the Working Group had conducted a detailed comparison of the requirements specified in both ISO/IEC 17065 and ISO/IEC 17020 to identify any gaps and/or inconsistencies in the two standards, as well as how they could be applied by OIML Issuing Authorities. The Working Group had concluded that ISO/IEC 17020 provided similar levels of confidence in the competency and management of an OIML Issuing Authority. Mr Dixon added that to support the use of ISO/IEC 17020 as an alternative to ISO/IEC 17065, the Working Group had identified that additional requirements and guidance would be required to address any inconsistencies between the two standards. He stated these would be detailed in a new OIML Document.

    Mr Dixon stated that his current slide and the one after [CIML PowerPoint Presentation 10.2, slides 7 and 8] detailed the main items to be included in the OIML Document. He said he would not go through these slides in any great detail because the information had been provided in Addendum 10.2. He commented that the scope of ISO/IEC 17020 covered type examination, so the Working Group had considered that ISO/IEC 17020 could be applied. Mr Dixon stated that Annex A in the European Accreditation document EA-2/17 M:2020 specified that ISO/IEC 17065 was the preferred standard for the accreditation of notified bodies performing type examination in the European Union, but he stressed that Annex B of that document allowed the use of ISO/IEC 17020 (with additional requirements) as an alternative. He commented that there was therefore already an example in the conformity assessment field where ISO/IEC 17020 could be used as an alternative to ISO/IEC 17065, so he considered that what was being proposed was not entirely new. Mr Dixon stated that the additional requirements identified in EA-2/17 M:2020 related to clauses 6 and 7 of ISO/IEC 17025 for testing, and clauses 4.1.2, 4.1.3, 7.5 and 7.6 of ISO/IEC 17065, which the inspection body also had to fulfil. In the case of the OIML-CS, the requirements of ISO/IEC 17025 had already been addressed, as OIML Issuing Authorities made use of test reports from approved test laboratories.

    Mr Dixon reported that the Working Group had made a number of recommendations to the Management Committee, but he remarked that he would not go through all of these in great detail. The main recommendation had been that the OIML-CS recognised and utilised the international standard ISO/IEC 17020, and the supplementary requirements which had been developed, as an alternative means for OIML Issuing Authorities to demonstrate their competence. Mr Dixon stressed that the use of ISO/IEC 17020 was an alternative to ISO/IEC 17065, so they were not looking to replace ISO/IEC 17065 as a route to conformity. The Working Group had also recommended that if the first recommendation was accepted, the Management Committee should start to amend the relevant requirements of OIML B 18 as well as the relevant OIML-CS Operational and Procedural Documents, to allow for the use of ISO/IEC 17020.

    The Working Group had also recommended the establishment of a Project Group, under the responsibility of the MC, to develop a new OIML Document, as he had already mentioned. He added that this would provide guidance and interpretations on the application of ISO/IEC 17020 to the assessment of the competence of OIML Issuing Authorities. Mr Dixon added that this new Working Group would also review the Joint IAF-OIML and ILAC-OIML assessment procedures to ensure they aligned with this new OIML Document. Mr Dixon reported that he had recently taken part in several meetings with ILAC. He said that they were responsible for ISO/IEC 17020 when it came to accreditation, and he would be working with them on the development of this new Document, as well as a relevant joint assessment procedure to support the assessment of OIML Issuing Authorities. Mr Dixon stated that the Working Group had recommended that a new Annex be added to OIML B 18 to explain the OIML-CS and the "Functional Approach" to conformity assessment. Mr Dixon stated that the 6th MC Meeting, held in March 2021, had approved these four recommendations from the Working Group. Mr Dixon stressed that delegates should take note that, in approving the four recommendations, the Management Committee had specified that ISO/IEC 17065 was the preferred standard for OIML Issuing Authorities to use to demonstrate competence, and that this preference should be reflected in the amended OIML-CS publications, as well as in the new OIML Documents.

    Having approved the recommendations from the Working Group, Mr Dixon stated that the Management Committee now proposed the following recommendations for CIML consideration and approval. He stated the following:

    - The Management Committee recommended that the CIML approved the proposal to allow OIML Issuing Authorities to use ISO/IEC 17020 (with additional requirements) as an alternative to ISO/IEC 17065 for demonstrating competence. He added that if the proposal was approved by the CIML, the Management Committee would revise OIML B 18 and the relevant Operational and Procedural Documents in line with the Working Group's recommendations.

    - The Management Committee also recommended that the CIML approved the establishment of a new Project Group, under the responsibility of the Management Committee, to develop a new OIML Document to provide guidance and interpretations regarding the application of ISO/IEC 17020 to the assessment of OIML Issuing Authorities. Mr Dixon added that members of OIML TC 3/SC 5 Conformity assessment would be invited to take part in this Project Group so that countries which were not represented in the Management Committee could participate in the Project Group. He stated that further information on the new Document and project could be found in the project proposal in Addendum 10.2.

    - The Management Committee has also proposed that the use of ISO/IEC 17020 by OIML Issuing Authorities would be permitted from 1 January 2023. Mr Dixon commented that this was to allow for the relevant publications to be revised and developed. He remarked that a lot of work had already taken place in anticipation of the CIML's approval of the recommendations to revise B18, to revise the relevant Procedural and Operational Documents, and also to develop the new OIML Document.

    Mr Dixon continued that to allow time for all of this to be developed and implemented, the Management Committee had decided to extend the transition period for OIML Issuing Authorities to use self-declaration (with supporting evidence) to 31 December 2023. He remarked that this would now provide OIML Issuing Authorities with the time to undergo a suitable accreditation or peer assessment, either to ISO/IEC 17065, or to the alternative standard ISO/IEC 17020.

    Mr Dixon said this concluded his overview of the Addendum. He hoped that the recommendations which had been detailed in the Addendum were clear, and added that he would be happy to take any questions. He thanked delegates for their attention.

    Dr Schwartz thanked Mr Dixon for his comprehensive and clear presentation of the recommendations from the OIML-CS Management Committee to the CIML. He asked if there were questions or comments; there were none.

    Mr Dixon added that he knew that Mr Panesar had already thanked the Working Group, but he also wished to thank Mr Alex Winchester from Australia who had led the work in the Working Group.

    Mr Dunmill read the respective draft resolution:

    ## Draft Resolution CIML/2021/31

    The Committee,

    Noting the recommendations from the OIML Certification System (OIML-CS) Management Committee (MC) detailed in Addendum 10.2 to the Working Document for this meeting,

    Approves the use of ISO/IEC 17020 (with additional requirements) by OIML Issuing Authorities as an alternative to ISO/IEC 17065 to demonstrate competence,

    Requests the OIML-CS MC to revise the relevant OIML-CS publications, including OIML B18 Framework for the OIML Certification System (OIML-CS), to implement the necessary changes to allow the use of ISO/IEC 17020 (with additional requirements) by OIML Issuing Authorities, and

    Approves a new project under the responsibility of the OIML-CS MC to develop a new OIML Document to provide guidance and interpretations regarding the application of ISO/IEC 17020 to the assessment of OIML Issuing Authorities in the OIML-CS, as detailed in the project proposal in Annex A of Addendum 10.2 to the Working Document for this meeting.

    He asked if there were any questions or comments, but there were none.

    Dr Schwartz commented that the draft resolution seemed to be clear and thanked Mr Dixon again for his report, as well as all those who had worked on the Management Committee Working Group. He was appreciative of all the proposals, which he considered would lead to further improvements in the OIML-CS, making it even more attractive for Utilizers to enter the OIML-CS.

