  narrative: |2+

    Dr Schwartz proposed that agenda item 5, the report by the BIML Director, be moved to the second session the following day. This would allow for more time during the current session to be devoted to item 7, financial matters. Dr Schwartz stated the BIML Director had agreed to this proposal in advance. He checked whether there were any objections to this. There were none.

    He pointed out that the agenda took into account the fact that all items relevant to the Conference would be discussed in the two pre-Conference sessions during the current and following days, while the remaining items would be discussed in the post-Conference session on Friday. He asked if delegates agreed with the proposed agenda. There were no comments or objections.

    Draft Resolution CIML/2021/01

    The Committee,

    Approves the agenda for the 56th CIML Meeting.

    Dr Schwartz reminded delegates that the draft resolutions would be read out again at the end of the session before being voted on.

    He asked delegates to consider the next item, the minutes of the 55th CIML Meeting.

