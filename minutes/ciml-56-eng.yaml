- number: '16.4'
  title: Presentation by the 2020 CEEMS Award winner
  narrative: |2+

    Dr Schwartz remarked that it was an excellent tradition that the previous year's OIML CEEMS Award winner made a presentation at the following meeting, and stated that the 2020 OIML CEEMS Award had gone to Indonesia, represented by three distinguished officials:

    - Mr Agus Suparmanto

    Minister of Trade of the Republic of Indonesia

    - Mr Veri Anggriono Sutiarto, S.E., M.Si.

    - Director General of Consumer Protection and Trade Compliance, Ministry of Trade

    - Dr Rusmin Amin, S.Si, MT Director of Metrology under the Ministry of Trade

    Dr Schwartz said he had been informed that Indonesia's presentation would be made by Dr Rifan Ardianto, but before giving him the floor, by way of introduction he wanted to congratulate the three recipients of the 2020 OIML CEEMS Award once more on their impressive achievements in the field of legal metrology in Indonesia. He added that their nomination had been supported by the Asia-Pacific Legal Metrology Forum (APLMF).

    Dr Rifan Ardianto greeted delegates and thanked the CIML President and CIML Members. He stated that the presentation would report on the progress of legal metrology in Indonesia, with the title Legal metrology beyond technology- Indonesia's strategy to increase public awareness. It would cover how they had created their legal metrology system in Indonesia, and would focus on how they had increased public awareness of legal metrology.

    Dr Ardianto stated that the Directorate of Metrology was a government institution, which had responsibility for legal metrology activities in Indonesia. It was under the Directorate General of Consumer Protection and Trade Compliance, under the Ministry of Trade of the Republic of Indonesia.

    Due to a change in legislation (Act No. 23/2014 on Local Government), since 2014 legal metrology activities have not only been carried out by central government, but also by local government at a regency or city level. This change in the legal metrology structure has resulted in the need to establish local verification offices (LVO) at regency or city level, of which there are a total 508 in Indonesia. Currently, they had already established 425 LVOs, which had responsibility for performing verification activities, specifically of measuring instruments. He commented that their particular challenge was that Indonesia was an archipelago country, which had island cities in addition to the mainland. The new Local Government Act had helped to establish more effective and efficient verification activities covering all measuring instruments across Indonesia. He added that by 2022 they hoped to have about 500 local verification offices across Indonesia.

    With regard to the challenges, Dr Ardianto said they knew that 100 % of the population were consumers, and around 57 % of national income came from consumption by society. He commented that consumption in Indonesia was very varied, from modern market places to more traditional markets, and that they also had to account for the difference in consumers between the west and the east of Indonesia, which was not only a large land area, but which as he had already said, consisted of many islands. There were also more than 1340 different ethnicities. Dr Ardianto said this gave delegates an idea of the consumers they had to protect. He said that in the next five years they believed that consumers, and their behaviour, would be at high risk of being disrupted by the new era of the fourth industrial revolution (Industry 4.0). They also believed that consumers and their behaviour would be the main target of trade and commerce penetration. He added these were the main challenges.

    Dr Ardianto explained that the "Indonesian Consumer Index" was used to measure consumer empowerment in Indonesia. This showed that around 50 % of Indonesian consumers were considered "capable", that is to say they were able to use their rights and responsibilities to decide on their own needs. Around 45 % of consumers were considered to "understand", that is to say they only knew the rights and responsibilities they needed to protect themselves. Dr Ardianto emphasised that their challenge was therefore to reach the remaining Indonesian consumers, and to find out how to protect them from fraud of the measuring instrument itself.

    Dr Ardianto said they therefore had to change their view, or mindset. Before 2019, the traditional solution to legal metrology had focused on the ability to provide an efficient service to ensure fair trade measurement. The focus of their activities had only been on the verification and inspection of measuring instruments. This focus on the technological solutions was more difficult to achieve, because it took a long time to develop, and had relatively high costs. The new approach considered people to be at the centre of their decisions. They were trying to promote, and also to protect, consumers and they were trying to create "smart behaviour" in consumers and to empower them, and thus protect them from deceptive and fraudulent practices. This was how they had tried to change their mindset - not just with technology, not only with regard to infrastructure, and by focusing on the challenge of how they educated and how they would promote a "smart" consumer; this was why the initiative was called "legal metrology beyond technology". The focus was on creating a smart consumer with regard to legal metrology.

    Dr Ardianto moved on to what they had done to achieve this. He said they had tried to promote legal metrology in society, and had used social media to increase the public's awareness. They had created a metrology YouTube channel and posted activities on other social media services such as Instagram and Facebook, etc. They had created many videos on, for example, "how to repair non-automatic weighing instruments" and on "verification procedures". He remarked that they had specifically included this because they wanted to educate people that "doing legal metrology" was not difficult. In general, the videos aimed to show the population how legal metrology worked, so as to increase public awareness. He showed delegates slides [CIML PowerPoint Presentation 16.4, slide 7] which gave examples of the content they had created on social media, with screenshots from the video on how verification was done, and how they had created some comic strips to show legal metrology at work in an easily understood

    and friendly manner, and so that it could be understood as something other than just a requirement imposed by the law. They also wanted to ensure that metrology was accepted by young people.

    Dr Ardianto went on to describe the impact of these activities. He reported that after they had created the new content on legal metrology, their number of followers on social media had increased throughout 2021, which was indicated in a graph he presented, with specific data for Instagram, Facebook, Twitter and YouTube illustrated on a separate bar chart.

    In order to activate the community, Dr Ardianto reported that they had involved the women in their communities, as well as increasing the awareness of students using a programme in schools, and they had also carried out some "break-through events" which had included introducing metrology into certain daily activities, for example "metrology in a cup of coffee". In this way people could see that when they drank a cup of coffee, there was a lot of metrology involved, starting with size of bean, and going into the moisture content, temperature, and so on, indicating that good metrological practices resulted in a good-tasting cup of coffee. The objective of promoting metrology in this way was to achieve an impact on some participants directly, and on others by word of mouth, publicity around the events, and also in establishing social networks.

    Another way of increasing public awareness had been to create "certified measurers" at traditional markets. As he had already said, they had a lot of these across Indonesia, there being around 10000 in total. To cover all activities in the traditional markets, and to make sure that measuring instruments at these markets complied with the regulations, they had created "certified measurers" at the markets. This ensured community involvement, and was a collaborative activity between legal metrology institutions (especially the LVOs) and the community (e.g. traditional market management). This programme also helped the inspectors in checking the weighing scales used at the traditional markets, in educating traders, and in consumer protection. He added that they knew that it was not adequate to rely on government officers alone, because they always lacked the human resources and budget. For this reason, they had opened up legal metrology to society, and this would help government officers to check the condition of measuring instruments at traditional markets. In this way, they hoped that they would create better metrological practices and reach the proposed measuring instruments used in trade, thus giving consumers protection.

    Dr Ardianto showed delegates a video about the certified measurers. He added they now had almost 1000 certified measurers, but hoped that eventually, each traditional market would have one. This would, as he had said already, help government officers in checking measuring instruments at these traditional markets.

    They had also established consumer groups for legal metrology. They had done this with community involvement. For example, they had involved women in helping them with education, and in providing social campaigns in legal metrology. In some regions of Indonesia, they had already created a lot of consumer groups, not only involving women, but also related to the religion of the community, which would help them to educate the population regarding legal metrology. He reiterated that the characteristics of Indonesian people were very varied, so they had to educate each local society by using the local community and by creating consumer groups so they would be more efficient in increasing global public awareness.

    Dr Ardianto said they had already explained certain outcomes, and accessibility to legal metrology services had been improved, not only at the city level, but also reaching into village regions of Indonesia, and more than 500 regions could now already access legal metrology services.

    Looking at the entire programme, they considered that the strategy to increase public awareness had increased the performance of legal metrology services (verification and inspection). He showed delegates a graph indicating that between 2019 and 2021, there had been a significant increase in the performance of legal metrology services such as the verification of measuring instruments carried out by local verification officers. He added that they would continue to develop ways of encouraging people to be more aware of legal metrology.

    He added in conclusion that sometimes it was not possible to work alone as a government, just carrying out verifications, but they also had to make people more aware of legal metrology itself, and this in turn would help the government to develop better legal metrology systems.

    With this, Dr Ardianto finished his presentation. He invited delegates to visit and follow their social media and he said they would thus gain information on legal metrology in Indonesia, and they would be able to download their videos on verification, legal metrology, and other subjects, for education in their own countries. He thanked delegates for their attention.

    Dr Schwartz thanked Dr Ardianto for his very interesting and content-rich presentation, which had explained the economic situation in Indonesia, and how they had managed to address the consequences of this regarding legal metrology activities, but also how they had successfully raised public awareness of the importance of legal metrology activities for consumers and citizens. He particularly noted the excellent video clips. Dr Schwartz congratulated Indonesia once more on their impressive achievements, and wished them all the best in the future for the further development of the legal metrology system in Indonesia.

    Dr Schwartz stated that this concluded the Awards session. He asked delegates to consider the respective draft resolution. Mr Dunmill read:

    Draft Resolution CIML/2021/39

    The Committee,

    Thanks Dr Rifan Ardianto, representing Indonesia, winner of the 2020 OIML CEEMS Award, for his presentation.

    He asked if the representatives from Indonesia were satisfied that the resolution only mentioning Dr Ardianto, or whether they would like all their names mentioned.

    The response was that it was satisfactory that just Dr Ardianto was mentioned in the resolution.

