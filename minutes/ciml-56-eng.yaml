- number: '16.3'
  title: OIML CEEMS Award
  narrative: |2+

    Dr Schwartz stated that the OIML CEEMS Award was a special award given to an individual, a national service, or a Regional Legal Metrology Organisation that had contributed significantly to legal metrology objectives on national or regional levels. He informed delegates that four nominations had been received for the current year, and it was now his pleasure to announce that the winner of this year's OIML CEEMS Award was Mr Sophors Em (Cambodia). Dr Schwartz introduced Mr Em as Deputy Director of the Industrial Metrology Department at the National Metrology Center (NMC) of Cambodia. Dr Schwartz hoped that Mr Em was present at this session, as he had seen from the participation list that he had been present at previous sessions of the CIML meeting. Dr Schwartz asked the BIML to spotlight Mr Em so that delegates could identify him, and so that they could see him next to the photo of the OIML CEEMS Award.

    Dr Schwartz welcomed Mr Em, adding that it was good to see him and he hoped this Award would be a surprise to him, as the previous Award had been for Mr Pulham.

    Dr Schwartz gave the following laudation:

    Mr Sophors Em has been nominated by the Director of the Cambodian NMC, Mr Ngi, in acknowledgement of his significant contributions to many projects in the development of industrial and legal metrology in Cambodia.

    With his technical expertise, dedication and commitment he has delivered training courses in metrology to both the public and private sectors. He has also provided consultancies to numerous private companies and governmental agencies with regard to metrological questions and aspects. He is a key player in the NMC's international cooperation. With his expertise he also supports the NMC to develop regulations and procedures to operate on a daily basis.

    Mr Em is the author of several publications dealing with metrological aspects, which are useful for small and medium-sized enterprises, local metrology offices, but also for academia.

    His significant accomplishments and contributions, not only for the NMC, but also for the Kingdom of Cambodia, become evident by the impressive supporting document that was annexed to the nomination letter of Director Ngi.

    Let me therefore congratulate you, Mr Em, once more on your impressive achievements in the field of both industrial and legal metrology.

    You are a very worthy winner of this year's OIML CEEMS Award!

    Dr Schwartz explained that the CIML had a tradition that the current year's CEEMS Award recipient would give a short presentation about his work and achievements at the following year's CIML meeting, so he added that they were looking forward to the presentation that Mr Em would provide the following year, when he hoped he would be able to hand over the Award to Mr Em personally. Dr Schwartz congratulated Mr Em again, and asked him if he would like to address the Committee.

    Mr Em greeted delegates. He said it was an honour to have been nominated, and to be the winner of the 2021 OIML CEEMS Award. He commented that he was happy about this achievement because he had strong support from the top management of the National Metrology Center (NMC), including the Director General and his Director, as well as all the staff at the NMC, who had contributed to this work and had made it more and more productive.

    At this point in his address, Dr Schwartz informed Mr Em that his audio connection had failed. He said that this was unfortunate, because it had been nice to hear from him, and to listen to his address. He thanked and congratulated him again, and said they were looking forward to his presentation the following year.

    Dr Schwartz asked delegates to consider the draft resolution. Mr Dunmill read:

