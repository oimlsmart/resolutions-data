- number: 9.1.1
  title: 1 Update of R 60 Metrological regulation for load cells
  narrative: |2+

    Mr Dunmill explained that this had been a special case, as it was update rather than a revision or a new Recommendation. The update had been conducted in accordance of the rules in OIML B 6 Directives for OIML technical work and a CIML preliminary ballot had not been conducted, in accordance with those rules. The Final Draft had been uploaded in August of the current year, less than three months before the current CIML meeting and Mr Dunmill explained that before the CIML voted on the draft resolution to approve this update, there needed to be a separate resolution taken to allow the CIML to vote on it without the required three months' notice. He then showed delegates the first of the draft resolutions for this item:

    ## Draft Resolution CIML/2021/16

    The Committee,

    Considering the remarks made by its President,

    Decides to accept the proposal to vote on the Final Draft Update of R 60 Metrological regulation for load cells at this meeting.

    Mr Dunmill asked Dr Schwartz if he wished to say anything further before he moved onto the actual resolution, but Dr Schwartz said he thought the explanation had been clear.

    Mr Dunmill stated that the second resolution would be the normal resolution for approval:

    Draft Resolution CIML/2021/17

    The Committee,

    Approves the Final Draft Update of R 60 Metrological regulation for load cells, and

    Thanks the Project Group for its work in completing this project.

    He asked if there were any comments or questions on either of these resolutions or on the process.

    Mr Richter (USA) stated that he firstly wished to thank Mr Dixon for all his work on the R 60 update. This had been the first time that the CIML had gone through the update process, and because this had been an update, there had not been an official Project Group, or Project Group convener, so he suggested that the final sentence of the draft resolution should be changed so as to thank the people who had worked on the project.

