    Dr Schwartz asked delegates to consider the next item on the agenda on financial matters, stating that the first sub-item was 7.1 on the 2020 accounts. Dr Schwartz asked Mr Donnellan to make his presentation on this item.

    Mr Donnellan stated that agenda item 7 dealt with a number of financial matters for the Organisation, and item 7.1 specifically dealt with the accounts of the Organisation for 2020.

    Mr Donnellan reported that the detailed accounts for 2020 had been provided in an Addendum which had been made available on the CIML meeting website since July of this year. He drew attention to the current and following slides [CIML PowerPoint Presentation 7.1, slides 2 and 3], which showed that the accounts had been externally audited, and indicated that the external auditor's views were expressed in the displayed opening statement.

    Mr Donnellan continued that, as was standard practice at the CIML meeting each year, the accounts would be explained in detail. This year they would also detail the arrears of Member States, the budget forecast, and the proposals for the future budget. This particular presentation would deal with the 2020 accounts.

    As delegates could see [CIML PowerPoint Presentation 7.1, slide 4], income in 2020 had been higher than budgeted. There had been some lower figures for income from Member States, Corresponding Members, and certificate fees, as well as for some financial income, but this had been more than compensated for by additional income in other areas, including some tax refunds, to give a very healthy "bottom line" income surplus figure of €16 722.

    Mr Donnellan said the rest of his presentation would deal with the expenses of the Organisation for this budget period.

    The next slide [CIML PowerPoint Presentation 7.1, slide 6] dealt with staff costs. As delegates could see, staff costs had been lower in 2020 than in 2019. Although this was a variance against the 2020 voted budget figure, it had been managed within the existing savings for the Organisation for that period.

    In terms of the running costs, Mr Donnellan said that as delegates would note, the last three columns were respectively the voted amounts, the actual amounts, and the difference between the voted and actual amounts. He reported that running costs had also been significantly below budget expectation, and indeed had been lower than the 2019 running costs. The running costs for 2020 had in fact been the lowest of all of the years of the financial period, which had commenced in 2017.

    There was a similar situation with regard to the administrative costs, which had also been well within the budgeted parameters for 2020. The administrative costs for 2020 had likewise been lower than those for 2019, and had been the lowest of the budget period by far.

    Mr Donnellan continued with communication costs, which had also been below budget expectation, as delegates could see in the three columns on the far right of his current slide [CIML PowerPoint Presentation 7.1, slide 9]. He drew attention to the OIML Certification System costs, which he reported had been incorporated into the broader headline costs, and he emphasised again communication costs had been within the budgeted parameters.

    Moving on to meeting costs, Mr Donnellan said that, as would have been expected with a completely online meeting in 2020 and again in the current year (which would be discussed in a future presentation), the meeting costs had also been well within budget expectations for 2020. He drew attention to the surplus displayed in the far-right column, emphasising that it was also the lowest of the entire budget period so far.

    Moving on to the travel and accommodation costs, Mr Donnellan indicated that these costs had again been well within budget expectations, and he commented that similarly, and unsurprisingly, in 2020 they had been the lowest for the financial period to date.

    Mr Donnellan reported that, while the miscellaneous costs had been slightly higher than the voted budget amount, they had been in line with the average trend for the entire financial period. He added that this excess had been managed in accordance with the significant savings made elsewhere, and thus did not present a problem for the budget in 2020.

    Looking at CEEMS costs, Mr Donnellan commented that, as had already been highlighted by the President, and as would be detailed in later presentations throughout the course of the current meeting, there had been limited face-to-face CEEMS activity conducted, for example with training, in 2020. Mr Donnellan added that significant activity had been conducted, not only with the revision of D1, but also with new work on CEEMS activities. He considered that the costs incurred by the Organisation in this area during 2020 were therefore low, and the result had been a surplus for CEEMS activities.

    Mr Donnellan drew attention to the next item, training costs. While there had been no training budget voted for 2020, a small cost had been incurred, which had been within the overall training costs allocated by the Conference in 2016, and also within the parameters of the budget expectations for 2020.

    Regarding depreciation costs, Mr Donnellan said his current slide [CIML PowerPoint Presentation 7.1, slide 15] indicated that depreciation costs had gone beyond the budget voted in 2020. He explained that most of this represented legacy depreciation costs for the Organisation from a number of the preceding years, which he expected to continue to decrease, but there would be some years with higher capital expenditure. This was reflected in the proposed future budget. He considered that this variation in depreciation costs was extremely manageable within the significant savings realised by the Organisation in 2020, and in fact 2020's depreciation costs had been the lowest of the financial period which had commenced in 2017.

    Mr Donnellan then moved on to the provision for uncollected funds, which he stated was a provision for bad debts of Member States and Corresponding Members, as well as some other small debtors who owed money to the Organisation. Mr Donnellan drew attention to the current slide [CIML PowerPoint Presentation 7.1, slide 16], which showed that in 2020, a positive figure had been realised due to the repayment of some debts owed to the OIML, and also because no Members had been delisted. Mr Donnellan reported that the Bureau had worked very hard to keep all Member States within the Organisation - to stop them defaulting on their payments and therefore being delisted, which would have affected the provision for, and realisation of, uncollected funds.

    Mr Donnellan commented that the next slide [CIML PowerPoint Presentation 7.1, slide 17] showed the total sum of charges and expenditure in 2020. He indicated that the total charges, which was the sum of the expenditure slides which he had just detailed, had been very comfortably within expectations for the budget in 2020. He emphasised that there was a strong positive variance, despite the fact that there had been a negative variance in some areas, which he reiterated had been manageable within the voted budget.

    The total charges and expenditure for the Organisation in 2020 were graphically depicted in the next slide [CIML PowerPoint Presentation 7.1, slide 18]. Mr Donnellan added that the actual expenses were represented by the orange line, which had been plotted against the expectation, or voted budget, which was represented by the blue line. Mr Donnellan highlighted that this had not only been a reduction in actual expenditure, but also a reduction in the budget in absolute terms.

    Mr Donnellan said the next slide [CIML PowerPoint Presentation 7.1, slide 19] showed the result for 2020, and he stressed that this had been very much within budget expectations, which had helped to counterbalance some of the results from previous years within the financial period. He stressed that this would help the Organisation in preparation for the future. He highlighted that the slide also indicated that the good management, austerity measures, and reforms within the Organisation, coupled with some positive effects of the seemingly negative pandemic, had led to this result.

    Mr Donnellan reported that the next slide [CIML PowerPoint Presentation 7.1, slide 20] detailed some of the OIML-CS costs, which had remained below the budgeted expectations, although some of the expenditure had remained slightly higher. However, he said that income and expenditure within the OIML-CS was starting to be a lot more consistent and predictable.

    The next slide [CIML PowerPoint Presentation 7.1, slide 21] detailed the evolution of the net current assets and cash of the Organisation over the 12-year period from 2008-2020. Mr Donnellan said that this would be further discussed under the agenda item on the reserves, but he considered it was a healthy situation for the Organisation.

    In conclusion, Mr Donnellan reported that 2020 had been yet another good year for the Organisation, and the financial improvements had been consolidated. Expenditure had been lower than the voted budget. Although income from OIML certificates had been slightly lower, overall income had been higher, but again, late and untimely payments continued to present a risk for the Organisation, and this would be detailed in later presentations. Known future cost increases would require action by the CIML and the Conference, which would be discussed later, as part of the draft budget for the next financial period.

    This concluded Mr Donnellan's presentation on the 2020 accounts.

    Dr Schwartz thanked Mr Donnellan for his comprehensive and positive report and asked if there were any questions or comments on the report; there were none. He asked delegates to consider the respective draft resolution, which he asked Mr Dunmill to read:

    Draft Resolution CIML/2021/10

    The Committee,

    Noting the accounts for 2020 and the BIML Director's comments,

    Considering the external auditor's report on the 2020 accounts,

    Approves the 2020 accounts, and

    Instructs its President to present them to the 16th OIML Conference.

- number: '7.2'
  title: Arrears of Member States and Corresponding Members
