    Dr Schwartz asked delegates to consider item 7.2, and asked Mr Donnellan to make his presentation.

    Mr Donnellan reiterated that item 7.2 on the agenda dealt with the arrears of both Member States and Corresponding Members. He stated that, in accordance with standard practice at each CIML meeting, he would give a detailed overview of the situation. Mr Donnellan commented that the arrears situation with Member States tended to oscillate over the years, but in October 2021, on a year-on-year basis, the Organisation had seen a meaningful reduction in arrears, which he defined as the amount of money Member States owed to the OIML. There was a similar situation with regard to Corresponding Members, with a reduction to €32200 owed by Corresponding Members. Mr Donnellan reported that this brought the total arrears owed to the Organisation by its Members (Member States and Corresponding Members) in October 2021 to €659700. He added that the reduction year-on-year from October 2020 to October 2021 was approximately 19.7 %. Mr Donnellan indicated that the arrears of Member States and Corresponding Members were detailed in the bar chart he was currently displaying.

    Mr Donnellan displayed some pie charts [CIML PowerPoint Presentation 7.2, slide 4] to give a clear indication of Member States' payment behaviour. He explained that the green sector of the pie chart represented on-time payment, and the red sector represented late payment. He stressed that approximately 65.57 % of all Member States were paying late. The next slide [CIML PowerPoint Presentation 7.2, slide 5] indicated that this reflected differently in terms of the amount of contributions made by Members States. In 2021, 74.49 % of the monetary value of payments was received late. In

    other words, only 25 % of income was received on time. The payment behaviour of Corresponding Members presented a similar situation, with 71.88 % of Corresponding Members paying late. In other words, only 28.12 % of Corresponding Members paid on time.

    Mr Donnellan said his last slide [CIML PowerPoint Presentation 7.2, slide 7] served as a reminder to all Member States and Corresponding Members. He stressed that Article XXVI of the OIML Convention required Member State contributions and Corresponding Member subscription fees to be paid at the beginning of each calendar year, and he wanted to take this opportunity to thank all of the Members who paid on time or early. He said it was certainly appreciated, and assisted with the strategic planning and also with the cash flow of the Organisation.

    Dr Schwartz thanked Mr Donnellan for his report on the arrears of the Member States and Corresponding members. He asked if there were any questions or comments; there were none. He asked delegates to consider the draft resolution, which he asked Mr Dunmill to read:

    Draft Resolution CIML/2021/11

    The Committee,

    Notes the report given by the BIML Director,

    Encourages the BIML to continue its efforts to recover outstanding arrears of its Member States and Corresponding Members, and

    Requests those Members with arrears to bring their situation up to date as soon as possible.

