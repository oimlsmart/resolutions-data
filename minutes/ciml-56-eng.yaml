- number: '11'
  title: Report by the CEEMS Advisory Group Chairperson
  narrative: |2+

    Dr Schwartz said that this report would be given by Mr Dunmill on behalf of the CEEMS Advisory Group Chairperson and previous CIML President, Mr Peter Mason, who unfortunately had been unable to participate in the current meeting.

    Regarding CEEMS AG work since the 55th CIML Meeting, Mr Dunmill stated that the main achievement had been the completion of the Revision of D1 National metrology systems - Developing the institutional and legislative framework, which had been approved at the 55th CIML Meeting the previous year. Final editing had been carried out by the BIML in February 2021, and following the completion of the approval process by the BIPM, the revised D1 had been published in February as a Joint OIML-BIPM publication.

    Mr Dunmill reported that the current projects being undertaken by the CEEMS AG included two revisions of existing OIML Documents, although both of these had been delayed. The first was the revision of D14 Training and qualification of legal metrology personnel. He stated that a new convener had been appointed to this work but, due to the pandemic, the work had been delayed. He added that the CEEMS AG would be following this up during the forthcoming year. The second project was the revision of D19 Pattern evaluation and pattern approval, which had been delayed due to the prioritisation of the third CEEMS AG project, which was a new publication on The application of online technology to capacity building and other CEEMS activities.

    Mr Dunmill gave some more details of this last publication, which he commented had been the main focus of the CEEMS AG during the past year. A structure had been put together by the CEEMS AG chairperson, Mr Peter Mason, and comprised the eight different chapters displayed on the screen. A small task group had then allocated these individual chapters to different people, who had taken the responsibility of drafting an initial text for each of the chapters. The idea was that these would then be brought together and edited into a complete publication. Mr Dunmill stated that there had been very good progress on most of these chapters, and the point had almost been reached where they could be combined into a complete document.

    Moving onto e-Learning and other online training, Mr Dunmill reported that obviously there had been no in-person training courses over the past year due to the pandemic. He said that the upgrade process for the existing e-Learning platform on the OIML website had started. For the benefit of those Members who had not been present at the previous CIML meeting, he explained that the existing Moodle e-Learning platform had a problem in that they only had one server, which meant that any alterations, upgrades, or testing had to be carried out on the live system, which was undesirable. The BIML was therefore working on the installation of a parallel development server for the e-Learning platform, which had required more hardware, and he added that some of this had gone missing during one of the lockdown periods in France. They had now received the equipment, and had started the process of installing a new server and software. The work on this could only progress once other upgrades which were currently underway to the main OIML website had been completed.

    Mr Dunmill stated that the CEEMS AG also had a new Task Group on online training to consider the OIML's strategy in this area. This Task Group would not only look at the strategy, but also at the future

    content of the OIML e-Learning system. The work would also include updating the existing OIML e-Learning platform as well as developing a new OIML website page on online training which would draw together information and training which was available from other organisations, not just on the OIML's own platform. It was intended that eventually this would provide a single point of access to online training on other aspects of quality infrastructure training, not just on legal metrology.

    Mr Dunmill stated that another online training initiative which had begun during the past year was to hold some regular one-hour webinars on single metrology topics. The idea of these had been to have one speaker presenting for around 30-40 minutes, followed by a question and answer session, with the intention that the whole session should take about an hour. Recordings of these would be made, and a web page would be created to archive them so that people could go back and look at the webinars which had taken place in the past. The first such webinar had been held on 30 June 2021 and had covered medical devices, which Mr Dunmill commented was a very topical subject. This had been run by Dr Rafael Farias from Brazil, who had also been proposed as the convener for the thermometry projects which had been mentioned earlier. Mr Dunmill said that he would welcome any suggestions for topics to be used for future events in this series of webinars. These were intended to be regular events, but their organisation depended on how many topics they had, as well as on other organisational priorities such as the CIML meeting. It would be extremely useful to have a list of topics for the future, so they could search for possible presenters. He therefore encouraged delegates to make suggestions for legal metrology topics which they would like to see covered in future events.

    Lastly Mr Dunmill reported that Dr Peter Ulbig, who had been the CEEMS AG Vice-Chairperson, had left the PTB in 2021, and had therefore resigned from his CEEMS AG position. This left the position of CEEMS AG Vice-Chairperson vacant, and Mr Dunmill stated that it needed to be filled as soon as possible so that work could be undertaken more effectively. He encouraged CIML Members to nominate possible candidates for this post, stating that nominations should be sent to the Bureau by the end of November 2021.

    Mr Dunmill stated that this concluded the report on the CEEMS AG on behalf of Mr Mason. He thanked delegates for their attention.

    Dr Schwartz added his support to what Mr Dunmill had just said concerning the vacant position of the CEEMS AG Vice-Chairperson. He encouraged delegates to consider possible candidates from their institutes or organisations who would be capable and knowledgeable enough to support the many important CEEMS activities. He added that suitable and dedicated candidates were urgently needed who were ready to take responsibility for CEEMS, regardless of whether they were from Member States or Corresponding Members. He remarked that although it was not necessarily automatic, there may well be the opportunity for the Vice-Chairperson to take over the Chair of the CEEMS AG the following year, as Mr Mason's term in that position was due to expire, and he had indicated that he would most probably not be available for another term.

    Mr Musimami said that he had concerns about the publicity of these programmes because Uganda would have liked to attend events such as that held on 30th June. He wondered how this had been publicised.

    Mr Dunmill replied that the BIML had published information in the news section of the OIML website as well as on the e-Learning page, and had also sent an email to all CIML Members, Corresponding Member Representatives, and liaison organisations.

    Mr Qin stated that China was willing to continue to support the BIML's activities on the promotion and development of CEEMS activities by contributing to the tasks of the CEEMS AG Vice-Chair, as well as to the secretariat.

    Dr Schwartz thanked Mr Qin for China's support in the past and in the present, and said he appreciated their strong support for CEEMS activities. He added that there did not seem to be any more questions from delegates. He asked Mr Dunmill whether there were any specific plans yet for the next webinar.

    Mr Dunmill responded that one of the subjects on which he had already had some discussions was electric vehicle charging, since this was a new project, and was obviously of great importance worldwide. He added that they had been waiting for the outcome of the current CIML meeting and the approval of the new project on this subject before proceeding with the organisation of a webinar, as well as for the work on the proposed Guide to advance a little more.

    Dr Schwartz said he thought this was a good idea, which he would support, and suggested that this could also be related to one of the OIML Bulletin editions which was being planned for the following year. He explained that one edition was scheduled to deal with the key topic of measurements for traffic, and a webinar could be related to this edition. He stressed that it would be announced well in advance, once an appropriate presenter had been found.

    Mr Dunmill added that there were a couple of other ideas in the pipeline which were not yet ready enough yet to discuss at the current meeting.

    Dr Schwartz noted that there were no more questions, so he suggested they considered the respective draft resolution, which Mr Dunmill read:

    Draft Resolution CIML/2021/32

    The Committee,

    Notes the report on the activities of the CEEMS Advisory Group,

    Welcomes the expansion of online training opportunities offered by the OIML,

    Notes the information given on the vacant position of CEEMS AG Vice-Chairperson, and the need for this position to be filled as soon as possible, and

    Encourages CIML Members to send nominations for this position to the Bureau by the end of November 2021.

    There were no comments.

