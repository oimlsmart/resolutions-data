    Dr Schwartz started by saying that delegates might recall that in 2019, the People's Republic of China had kindly invited the Committee to hold the 55th CIML Meeting in Suzhou in 2020. For the obvious reasons which everyone was aware of, this had had to be postponed, not by the anticipated one year, but by two years now. He added that the CIML was grateful to the CIML Member for P.R. China for having confirmed that the invitation was still valid, and that China was ready to host the 57th CIML Meeting in 2022. He asked Mr Qin to take the floor.

    Mr Qin confirmed they had been preparing and waiting to host the CIML meeting for two years, and they cordially invited all CIML delegates to participate in the 57th CIML Meeting to be held in Suzhou in 2022. He added that the global COVID-19 situation would be taken into consideration at that time, and China would continue to actively cooperate with the BIML to ensure that the 2022 CIML meeting would be a warm, pragmatic, in-person meeting. He joked that there was a Chinese proverb which said that "a late dinner is a good dinner".

    Dr Schwartz thanked Mr Qin again for his kind repetition of the invitation to come to China the following year. He added that he really appreciated his Chinese colleagues' patience and understanding of the situation, as well as their continued invitation. Dr Schwartz added that because of the wishes expressed by CIML Members, which had also been expressed in the enquiry undertaken following the previous Committee meeting, he suggested that a sentence be added to the respective draft resolution, so he asked Mr Dunmill to display the respective text with the proposed new sentence added at the

    beginning. Dr Schwartz stressed that the wording reflected what had already been mentioned by Mr Qin - that he wished to hold an in-person meeting the following year, which Dr Schwartz considered was also the wish of all delegates. So, adding this first sentence the complete draft resolution would read:

    Draft Resolution CIML/2021/40

    The Committee,

    Expressing its strong wish to hold the 57th CIML Meeting in person next year,

    Recalling its Resolution 2020/33,

    Thanks the People's Republic of China for confirming its invitation to host the 57th CIML Meeting in 2022, and

    Instructs the Bureau to make the necessary arrangements to organise the 57th CIML Meeting.

    Dr Schwartz reiterated that this would be the proposed final wording if delegates agreed, and if there were no final objections. He asked delegates if there were any comments; there were no objections, so Dr Schwartz confirmed that there was a clear wish and a plan to do whatever is necessary in order to hold an in-person meeting the following year in Suzhou, P.R. China. He asked Mr Qin if a specific date in October had already been reserved for the meeting.

    Mr Qin could not respond due to a technical difficulty with Zoom, so Dr Schwartz stated that this would be communicated to delegates later, and requested that the date be fixed and communicated as soon as possible.

