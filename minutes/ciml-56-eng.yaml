- number: '10'
  title: Report on the OIML Certification System (OIML-CS)
  narrative: |2+

    Dr Schwartz asked delegates to consider the report on the OIML Certification System (OIML-CS). Before starting item 10.1, the report by the OIML-CS Management Committee Chairperson, he wished to introduce Mr Panesar to new Members and those who had missed his self-introduction speech at the previous CIML meeting.

    Dr Schwartz said that Mr Panesar had become the OIML-CS Management Committee Chairperson on 1 January that year, in accordance with the decision taken at the previous CIML meeting in October 2020. Dr Schwartz stated that since 2016 Mr Panesar had been Director of the Technical Services Department at the NMO in Teddington, which was part of the Office of Product Safety and Standards within the Department of Business, Energy and Industrial Strategy in the UK. Mr Panesar is the leader of the NMO technical services team, which was responsible for NMO activities in the field of product certification, quality management systems certification, pre-assessment, and standards calibration. He is also the Council Vice-chairperson at the British Measurement and Testing Association. With this short introduction, he handed over to Mr Panesar, adding that he was looking forward to Mr Panesar's first OIML-CS Management Committee report to the CIML.

- number: '10.1'
  title: Report by the OIML-CS Management Committee Chairperson
  narrative: |2+

    Mr Panesar thanked Dr Schwartz for his warm introduction. He greeted delegates and commented that he had attempted to tailor his presentation with special consideration to new OIML Members and their needs. He would be giving a presentation of the key highlights from the Management Committee, which would be taken from the Chairperson's report which could be found in Addendum 10.1.

    Mr Panesar encouraged those delegates who had not yet had a chance to read the OIML-CS Management Committee report to do so. He said it was detailed, and provided a thorough overview of the many activities undertaken by the Management Committee, which was working hard to ensure that the system operated correctly and was robust. He urged delegates to find time to review it if they could. He stated that the previous Management Committee meeting had been held online in March 2021. He remarked that online meetings such as this had their benefits, the main one, in his opinion being that there was increased participation. He drew attention to his current slide [CIML PowerPoint Presentation 10.1, slide 2] which indicated that 20 of the 22 Management Committee members from

    OIML Member States had been present or represented as well as representatives from liaison organisations including CECIP, CECOD, ILAC/IAF, and ISO CASCO. He observed it had been a very good turnout, which he believed was in part due to the ability to work from home and not have to travel, which would add extra time out of the office.

    Mr Panesar said that good progress had been made to improve the OIML-CS to make it more effective and efficient.

    There had been a review of the Legal Metrology Expert competence criteria. Previously this had focused on qualifications, but time-served expertise often resulted in competence so this had been included in the amendments of the Operational Document OD-01. They had also implemented the previous CIML Resolution no. 2020/25 which concerned the marking of instruments. This provided an option for manufacturers to better market their certified products, again boosting the reach of the OIML-CS. A decision had also been made enabling OIML Issuing Authorities to use OIML test reports from approved Test Laboratories of other OIML Issuing Authorities. Mr Panesar commented that again this gave more flexibility to the OIML-CS and he thought this would benefit all the parties involved.

    Mr Panesar reported there had been a great deal of discussion on a variety of topics but he highlighted one which had concerned improving the gathering of feedback from stakeholders including industry, Utilizers, Test Laboratories, OIML Issuing Authorities, Member States, and anyone who took part in the OIML-CS to better understand where further improvements could be made. He remarked that all delegates understood the benefits of the OIML-CS but there were areas where he believed it could be improved even further, so the focus would be on those areas over the next few years. He added that there had also been detailed and lengthy (but productive) discussions on the suitability of using a standard other than ISO/IEC 17065 for OIML Issuing Authorities to demonstrate competence and he said he would be coming back to this later in his presentation.

    Mr Panesar said that his next slide [CIML PowerPoint Presentation 10.1, slide 4] showed the number of Recommendations that were now in Scheme A, but he did not want to spend too much time on it. He added that the last Recommendation still in Scheme B was R 150 Continuous totalising automatic weighing instruments of the arched chute type. He believed that Scheme A provided a much more robust certification for Utilizers because of the additional assurance that the requirements for Scheme A provided, which again boosted the value of the OIML-CS. He pointed out that the table on the current slide [CIML PowerPoint Presentation 10.1, slide 4] was in the main report, which he again encouraged delegates to read. Mr Panesar appreciated that the high priority publications had already been discussed, so he skipped over his next slide [CIML PowerPoint Presentation 10.1, slide 5], but wished to make delegates aware that some of the publications were a priority for the Management Committee; he added that naturally the Management Committee would be doing everything it could to make sure it met the requirement of delivering high priority publications for the benefit of the OIML-CS.

    Mr Panesar stated that he would spend more time on his next slide [CIML PowerPoint Presentation 10.1, slide 6], which he added was not in the main report, and which showed the number of certificates issued over the last six years. He remarked that he was sure that everyone had been affected by the global pandemic, and acknowledged that it had been a challenging time for all, but he believed that despite this the OIML-CS continued to grow, and he was confident it would grow further once everyone had got used to operating in a COVID-19 world.

    Mr Panesar continued that it was important to remember that the OIML-CS had come into operation in 2018, so the slight spike in certificate numbers in 2017, which was slightly higher than what he would consider a normal trend, had possibly been due to the "rush" to issue certificates before the new system had come in place just in case there had been teething problems, although he stressed that there had not been many of these at all. Delegates could see that the trend from 2018-2021, even with the challenges of COVID-19, showed that the OIML-CS was strong and healthy, and the trend was going in the right direction despite the impact of the pandemic. He said he was certain that not only would the OIML-CS continue to grow, but as more Recommendations moved from Scheme B to Scheme A, again giving more assurance to Utilizers, certificates would have more value, and therefore more certificates in total would be issued.

    Other work Mr Panesar wished to highlight was that there had been an increase in the number of experts. He added, for the benefit of new CIML Members, that experts were used to provide assurance by participating in accreditation and peer assessments of test laboratories or OIML Issuing Authorities. The increased number of experts provided more availability, and the possibility for OIML Issuing Authorities and test laboratories to find experts closer to them. He stressed that the benefit of holding online meetings such as this was that some peer assessments had been carried out remotely because the pandemic meant it was not possible to travel. It was also important to highlight that the three-year cycle of re-authorising the experts had started in 2021, which had created a significant amount of work for the Review Committee, who he remarked he could not thank enough, and which had been very well led by Dr Harry Stolz from the PTB in Germany. Mr Panesar stressed that Dr Stolz and his team had done an excellent job, and had carried out many improvement actions and options, many of which had been adopted. He drew attention to the last bullet point on his slide [CIML PowerPoint Presentation 10.1, slide 7], which stated there were currently 33 Utilizers and Associates participating in the OIML-CS. He commented that he did not want to steal Dr Ehrlich's thunder, because he would be making a presentation on the Regional Legal Metrology Organisations Round Table, but he did want to add that Dr Ehrlich would be considering how they could identify potential Utilizers, which were already using OIML certificates, but who were not yet participating in the OIML-CS. He invited Dr Ehrlich to expand on this if he so wished.

    Mr Panesar reported that despite the challenges of the pandemic for travelling, they had managed to continue with awareness-raising activities, marketing activities, workshops, and seminars by participating in the meetings indicated on his current slide [CIML PowerPoint Presentation 10.1, slide 8]. He highlighted that one step forward, which he considered had been a positive move, and where thanks were due, was that Colombia had taken on the chair of the Promotion and Awareness Raising Working Group, and he congratulated them, and said he was looking forward to working with them more closely.

    Mr Panesar said he would also like to thank a number of other people. He said he could not remember everyone who had been on the Review Committee, and joked that it would take a long time if he were to thank everybody, but he stressed that, led by Dr Harry Stolz, the Review Committee had successfully reviewed over 80 submissions, which he observed had been a massive task, so he wished to thank them. He also wanted to thank the Management Committee members, who he remarked had operated in a productive manner, and whose discussions had resulted in a number of positive decisions, and he commented that they had been delighted to see the amount of engagement at their previous meeting. He also wished to specifically thank the Working Groups for their work, especially on the technical aspects, and in particular the work that Mr Alex Winchester (Australia) had carried out with Mr Bill Loizides (Deputy MC Chair, Australia). He added that they had presented a very detailed and clear proposal on the potential use of ISO/IEC 17020. Last but not least, and making reference to the presenter of the next agenda item, he wanted to thank Mr Paul Dixon for his support to the Management Committee, as well as all the other Committees and Working Groups he supported.

    Mr Panesar said this concluded his presentation but he was happy to take any questions.

    Dr Schwartz thanked Mr Panesar for his encouraging report on the OIML-CS. He wished to repeat what he had said in his general report at the previous session, that he thought delegates very much appreciated the work which had ensured the continued success of the OIML-CS despite the difficult period since the previous year, given that face to face Management Committee meetings had not been possible and assessments of OIML Issuing Authorities and test laboratories had been affected by severe travel restrictions. He stressed again that despite this, the OIML-CS had been performing well, with an increasing number of certificates being issued each year, and on behalf of the Committee he wished to express his sincere thanks to all those who had worked hard to ensure this success, including Mr Panesar, the Executive Secretary Paul Dixon, Dr Harry Stolz, and many more.

    Dr Ehrlich thanked Mr Panesar for mentioning the RLMO Round Table. He confirmed that during his Round Table report later in the meeting, he would certainly elaborate on the discussions that had been

    held about the OIML-CS. He said that the Round Table appreciated the input that Mr Panesar and Mr Dixon had provided. Dr Ehrlich again added his thanks, commenting that he thought they were doing an excellent job. He added that he had really enjoyed being on the Management Committee, and agreed that the Review Committee was also doing an excellent job.

    Mr Rifan Ardianto (Indonesia) thanked Mr Panesar for his presentation. He asked if there was a procedure for implementing the OIML-CS, because Indonesia wished to join but firstly wanted to understand the steps they needed to take to join.

    Mr Dixon responded that rather explaining the details at the current time, it would be best for Indonesia to contact him outside of the CIML meeting, and he would be able to provide them with all the relevant information needed to support their participation in the OIML-CS. He said he would look forward to discussing with them how they could participate, which would increase the membership of the OIML-CS.

    Dr Schwartz noted that there were no more questions or comments, and asked delegates to consider the respective draft resolution, which Mr Dunmill read:

