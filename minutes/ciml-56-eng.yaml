    Mr Faber said that as a past President of the CIML and as a Member of Honour, he wanted to express his sincere compliments to Dr Schwartz as President, and to the Director of the BIML and his staff, for the excellent way they had led the Organisation through these difficult times, and for the way in which they were preparing the OIML for the future. He was sure (well almost sure) that he was not only speaking for himself, but also on behalf of the other Members of Honour.

    Dr Schwartz thanked Mr Faber for these motivating and supportive comments.

    Mr Donnellan commented that he would like to echo Mr Faber's comments, particularly to Dr Schwartz, not only for his leadership during the past year, but also for having undertaken a very successful online CIML meeting, and first online Conference. He also wanted to express his thanks and appreciation to the CIML leadership - the Presidium of the Organisation and the Presidential Council, for their insight and guidance throughout this process. He added that the Bureau had supported the Presidium and the CIML as far as possible under challenging circumstances, which had been mentioned several times. He also wanted to express his gratitude and thanks to Dr Schwartz himself, and to the support staff at the PTB in Braunschweig Germany for the excellent professionalism, and support they had provided to

    himself and BIML Assistant Director Mr Dunmill while they had been there. He emphasised again that he very much appreciated the support of the PTB staff and wished this to be recorded in the minutes.

    Dr Schwartz said it was his pleasure to work with the whole BIML team and with the other Members of the Presidential Council. He could confirm that it was a pleasure to work with them all.

    Dr Schwartz said as there were no other hands raised, this concluded the "any other business" item.

- number: '19'
  title: Review and approval of Draft CIML Resolutions (Session 3)
  narrative: |2+

    Dr Schwartz asked delegates to consider the last but one agenda item, observing that they knew the voting process well by now, so he did not think it was necessary to explain it again. He asked Mr Dunmill to take the floor.

- number: '19.1'
  title: Review of Draft CIML Resolutions from this session
  narrative: |2+

    Mr Dunmill showed delegates tables of the resolutions from the previous two CIML sessions. He informed delegates that these were available, with the detailed voting figures, on the OIML website, both for the CIML meeting, and for the Conference. He continued saying that he would not read through the results, but explained that the tables presented on Zoom showed the number of votes that had been received "for", "against" and "abstain" on the various agenda items, together with the status of each resolution. He added that all the resolutions had been approved so far.

    Moving on to the current session, Mr Dunmill commented that the draft resolutions were all fairly simple. He said he that would now read them through, and informed delegates that the voting was already open. He stressed that anyone experiencing problems should let the BIML know through the chat or by email.

    Mr Dunmill proceeded to read the resolutions as follows:

