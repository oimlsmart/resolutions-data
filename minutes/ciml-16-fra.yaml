- number: '8'
  title: MARQUE OIML
  narrative: |2+

    M. REFEROWSKI rappelle que le Conseil de la Présidence a étudié en 1977 une proposition de la Rép. Féd. d'Allemagne portant sur l'identification, par une marque appropriée, des instruments conformes aux Recommanadtions de l'OIML.

    A la demande du Président du CIML, le Bureau a rédigé, en se basant sur la proposition initiale, un projet qui a été soumis aux Membres du CIML.

    Des réponses reçues, il ressort que la question de la Marque OIML suscite un vif intérêt ; cependant, à l'heure actuelle, une décision d'institution de la Marque serait prématurée, en raison du nombre de problèmes devant encore être résolus, parmi lesquels :

    — le système proposé, reposant sur un essai de modèle et une déclaration du fabricant, risque de ne pouvoir satisfaire ni le Service de métrologie, ni l'utilisateur de l'instrument ; en effet, seule la vérification individuelle pourrait donner la garantie que l'instrument répond aux exigences ;

    — les Recommandations de l'O1ML devraient être élaborées afin de permettre un renvoi précis et facile ;

    — les méthodes d'essais devraient être harmonisées à l'échelle internationale ;

    — il faudrait assurer un contrôle gouvernemental des laboratoires d'essais et une protection juridique de la Marque OIML ;

    - il faudrait résoudre les problèmes du partage des responsabilités entre fabricants, Membres du CIML, Commission de la Marque OIML.

    Le Bureau propose la création d'un groupe ad hoc chargé de l'étude du problème.

    M. RIVAS souligne les difficultés que pose la création d'une telle marque : L'OIML ne disposant pas de laboratoires en propre, ce sont les Etats qui délivraient la Marque : ce serait donc une marque nationale.

    Par contre, M. BENKIRANE évoque les avantages qui résultaient d'une Marque OIML pour les pays dont les services nationaux de métrologie sont insuffisamment structurés et équipés pour prononcer des approbations de modèles. Il souhaite cependant que l'attribution de cette marque ne se fasse pas sur des bases trop sévères et qu'en particulier il y ait des mesures d'assouplissement des Recommandations, pour que la marque puisse être attribuée à des instruments fabriqués dans les Pays en développement.

    M. ROTTER s'inquiète des complications administratives et bureaucratiques que pourrait introduire, à l'échelle internationale, une telle mesure ; aussi il propose que l'apposition de la marque soit seulement le fait du fabricant, qui déclare ainsi sous sa propre responsabilité que l'instrument est conforme à une Recommandation de l'OIML.

    Les cas d'appositions frauduleuses de la marque pourraient être détectés si l'instrument est soumis à des contrôles légaux, mais M. ROTTER estime que ces cas devraient être peu nombreux.

    Les Délégués de l'EGYPTE suggèrent que le problème des marques nationales de certification soit également étudié et qu'une Recommandation de l'OIML soit adoptée à leur sujet.

    M. van MALE, résumant les discussions, estime qu'il est nécessaire de poursuivre les études et propose la création d'un groupe ad hoc. Il apparaît nécessaire que ce groupe comprenne à la fois des pays qui soutiennent la création de la Marque et des pays qui actuellement s'y opposent, ainsi d'ailleurs que des représentants de pays aussi bien industrialisés qu'en voie de développement.

    Le groupe ad hoc est formé avec les pays suivants :

    R.F. d'Allemagne, Etats-Unis d'Amérique, Cameroun, Espagne, France, Tchécoslovaquie et U.R.S.S. ; le secrétariat en sera assuré par le BIML (*).

    Sur une question de M. SOUCH, il est indiqué que la poursuite du travail, au moins dans un premier temps, par un groupe ad hoc serait plus facile que si on en chargeait le Secrétariat-rapporteur SP.2-Sr.4 « Reconnaissance internationale de contrôles et marques de vérification nationaux ».

    Enfin, le Bureau précise que les contacts nécessaires ont été pris avec le CERTICO de l'ISO, qui poursuit un but un peu similaire.

- number: '9'
  title: RELATIONS AVEC LES INSTITUTIONS INTERNATIONALES
  narrative: |2+

    M. ATHANE rappelle les mesures prises pour renforcer, conformément à une Résolution de la Cinquième Conférence, la collaboration entre l'OIML et certaines Institutions Internationales.

    ## a) ISO：

    Les règles de collaboration entre l'ISO et l'OIML, fixées par les Accords passés entre les deux Institutions, sont scrupuleusement suivies ; de plus, le BIML et le Secrétariat Central ISO ont passé en revue l'activité des deux Institutions pour vérifier que tous les documents d'intérêt commun font l'objet d'une liaison appropriée. L'OIML a assisté à la Réunion ISO-Métrologie tenue en février 1978 (*) et participe à un groupe ad hoc chargé d'étudier à fond les problèmes de collaboration entre l'ISO, la CEI et l'OIML.

    ## b) CEI :

    Une réunion entre le BIML et un représentant de la CEI a eu lieu en avril 1978 (**). Il ressort de cet entretien que l'Accord CEI-OIML semble suffisamment complet pour permettre une bonne collaboration entre les deux Institutions. Il est cependant nécessaire de passer en revue périodiquement l'activité de la CEI et de l'OIML pour s'assurer que les liaisons nécessaires existent et fonctionnent correctement. Il faut également tenir compte des différences assez sensibles qui existent entre les modes de travail des deux institutions et remédier aux difficultés qui peuvent parfois en résulter.

    Au sujet de l'ISO et de la CEI, M. MUHE, constatant qu'il existe des différences sensibles dans les Accords conclus entre ces Institutions et l'OIML, demande s'il est dans l'intention de certains de les modifier, afin en particulier de les harmoniser. M. ATHANE répond qu'effectivement l'Accord passé avec la CEI est plus détaillé que celui passé avec l'ISO, et c'est pour cela qu'un accord complémentaire entre le BIML et le Secrétariat de l'ISO s'est avéré utile. De l'avis du Bureau, il n'est pas nécessaire d'envisager une modification de ces Accords. M. MUHE estime cependant que c'est là un sujet sur lequel il convient que le Bureau réfléchisse.

    M. OHLON et M. EDGERLY s'inquiètent de l'absence apparente de liaison entre certains Secrétariats de l'OIML (par exemple dans le domaine des instruments bio-electriques) et les Comités Techniques correspondants de la CEI. Il est demandé aux Etats responsables des Secrétariats-Pilotes concernés de prendre les mesures nécessaires afin d'éviter une trop grande duplication des travaux.

    M. MUHE évoque, à ce sujet, l'intérêt que pourrait présenter la création des groupes de travail mixtes, dans des domaines d'intérêt également très important pour l'OIML et plusieurs autres Institutions.

    M. ATHANE rappelle enfin le rôle du Bureau, qui s'efforce d'examiner rapidement tous les textes élaborés par l'ISO et la CEI, afin d'en informer si nécessaire les Secrétariats concernés de l'OIML.

    c) Commission Economique pour l'Europe (Nations Unies) :

    M. ANDRUS évoque les travaux de cette Institution et mentionne l'intérêt qu'aurait l'OIML à y mieux participer (mise sur pied d'un système de certification).

    M. ATHANE explique que ce faible niveau de collaboration est en partie dû aux difficultés matérielles rencontrées par le Bureau pour participer aux réunions de la C.E.E., mais aussi au fait que les informations envoyées par écrit à la C.E.E. ne sont parfois pas transmises aux intéressés.

    ## d) IMEKO :

    Le Comité ne formule pas de commentaires au sujet du compte rendu des discussions entre le BIML et le Secrétariat Général de l'IMEKO, et charge le Bureau de poursuivre ses efforts en vue d'une bonne collaboration entre les deux Institutions.

    M. ATHANE rappelle par ailleurs aux Membres du CIML représentant des pays également membres de l'IMEKO l'intérêt qu'il y aurait à ce qu'ils établissent des contacts étroits avec le représentant de leur pays auprès de cette Institution.

- number: '10'
  title: PAYS EN VOIE DE DEVELOPEMENT
  narrative: |2+

    X.a Conseil de Développement.

    M. AFEICHE rappelle que cette question a été étudiée pour la première fois en juin 1976, puis que la Cinquième Conférence avait adopté une Résolution autorisant le Comité à créer à titre expérimental ce Conseil, s'il le jugeait possible. Un nouveau projet sur les buts et les modalités de fonctionnement du Conseil a été présenté par correspondance aux Membres du Comité, et les résultats de cette consultation sont présentés en séance.

    M. EDGERLY propose que ce Conseil soit un organe consultatif auprès du Comité International seulement.

    M. LIERS, en exprimant son accord sur les buts et les principes de fonctionnement généraux du Conseil, émet des réserves sur le paragraphe 5.1. relatif à la prise en charge, par l'Organisation, de certains frais afin de favoriser la participation à ce Conseil des Pays en voie de développement.

    M. SOUCH et M. GOONETILLEKE estiment que le mandat détaillé du Conseil devrait être mieux précisé, si l'on veut ultérieurement l'instituer à titre définitif.

    M. BENKIRANE, quant à lui, estime que davantage de précision, dans l'état actuel des choses, est difficile à atteindre et que c'est le Conseil lui-même, au cours de ses premiers temps de vie à titre expérimental, qui pourrait parfaire la définition de ses buts.

    Certains participants, parmi lesquels MM. SZAMOTULSKI et NDOUGOU, signalent des points du document qui devraient être clarifiés. En particulier M. NDOUGOU propose que le Conseil soit chargé d'aider les Institutions Nationales de Métrologie des Etats-Membres à appliquer les Recommandations et autres décisions de l'OIML et, à cet effet, qu'il étudie, en concertation avec ces Institutions Nationales et sur leur demande, les mesures d'adaptation qu'appelle la situation particulière propre à chaque Etat.

    Cependant, rejoignant l'avis de M. BENKIRANE, M. CONDE estime nécessaire que l'on soutienne et encourage la création du Conseil, avec mission pour le Bureau de mieux définir son mode de fonctionnement et son mandat.

    MM. van MALE et PLUNIAN pensent par ailleurs que l'adoption de la Résolution ne devrait pas être retardée sous prétexte qu'il faudrait lui apporter des modifications puisque, de par le caractère expérimental de cette création, il sera toujours possible d'apporter ultérieurement au document les mises au point nécessaires.

    Sur 34 votants, 32 sont en faveur de la Résolution ci-après créant à titre expérimental le Conseil (certains sous réserve d'une révision du document à présenter à la prochaine session du Comité) et 2 s'abstiennent.

    Le Comité International de Métrologie Légale,

    VUE la Résolution de la Cinquième Conférence relative à la création d'un Conseil de développement,

    DECIDE ce qui suit :

- number: '11'
  title: AUTRES QUESTIONS
  narrative: |2+

    L'Assemblée prend connaissance du Rapport d'activité du BIML pour la période écoulée depuis la précédente réunion.

    Puis, sur proposition du Royaume-Uni, l'Assemblée exprime son accord sur la déclaration suivante :

    Le document « Politique de travail de l'OIML », dont les principes ont été adoptés par la 4e Conférence internationale de Métrologie légale, indique que la participation d'un pays aux travaux d'un Secrétariat de l'OIML se fait par des représentants qui « doivent être des experts du Service national de métrologie ».

    Le Comité déclare que cette phrase signifie que ces représentants agissent entant qu'experts du Service sans qu'il soit nécessaire qu'ils soient des employés de ce Service.

    Le Comité rappelle d'autre part que la désignation de ces représentants est laissée au libre choix des Membres du CIML et que ces représentants « doivent exprimer non seulement les opinions de ce Service mais aussi celles de tous les organismes qui, dans leur pays, s'occupent de ces questions » et que « lors des réunions ils peuvent être accompagnés, avec voix consultative, de toutes personnalités dont l'aide leur paraît opportune ». (*)

- number: '12'
  title: PROCHAINES REUNIONS
  narrative: |2+

    M. van MALE reçoit l'assentiment de l'Assemblée de ne réunir le Comité qu'en juin 1980, à l'occasion de la Sixième Conférence.

    Puis M. EDGERLY fait état des préparatifs de cette Conférence et donne des détails sur son organisation : lieu, hôtels, moyens de transport, etc... Il indique en particulier que la « National Conference on Weights and Measures », qui réunit les Services de Métrologie des cinquante Etats américains et se déroule avec la participation d'autres administrations, d'industriels, d'utilisateurs d'instruments, etc..., aura lieu juste après la conférence de l'OIML, ce qui permettra des contacts intéressants.

    A l'issue de cette session, M. van MALE remercie tous les participants pour ces délibérations fructueuses et leur donne rendez-vous en juin 1980, à Washington

