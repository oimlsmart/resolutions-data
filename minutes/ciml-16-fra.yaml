- number: '6'
  title: MODE DE TRAVAIL DES SECRETARIATS DE L'OIML
  narrative: |2+

    M. ATHANE rappelle que le document « Mode de travail des Secrétariats de l'OIML » (édition de 1977) a été diffusé au début de 1978.

    Le Bureau a l'intention de le compléter progressivement par des annexes plus détaillées portant, par exemple, sur la manière de tenir une réunion, sur la présentation des rapports annuels des secrétariats, etc...

    Sur une question de M. TURSKI, M. ATHANE indique que les « Directives » établies par l'ISO à l'intention de ses Comités Techniques ont été utilisées, dans la mesure du possible, par le BIML. Cependant, certaines différences entre l'ISO et l'OIML font que les règles de l'ISO ne peuvent s'appliquer exactement à l'OIML.

    M. EDGERLY estime nécessaire que les représentants de l'OIML aux réunions d'autres Institutions Internationales fassent rapport au BIML des principaux faits de la réunion afin que le BIML puisse transmettre les informations aux Secré-tariats de l'OIML concernés. Il indique que les U.S.A. ont l'intention de proposer, par écrit, un modèle de compte rendu.

    Sur une demande de MM. ISMAIL et EL-HAKIM, M. ATHANE indique que les Recommandations Internationales, avant leur impression, sont systématiquement soumises à un examen rédactionnel complet de la part du Bureau (compatibilité avec le Vocabulaire de Métrologie Légale, compréhension générale, etc). Il ajoute que le Bureau peut assumer cette tâche tant que le nombre de Recommandations soumises à la sanction de la Conférence ne dépasse pas la valeur actuelle, soit une vingtaine. Si ce nombre devait, comme on peut l'espérer, augmenter, il faudrait soit accroître le personnel du Bureau, soit charger les Secrétariats-Pilotes de ce travail.

