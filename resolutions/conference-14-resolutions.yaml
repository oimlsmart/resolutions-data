  - identifier: Conference/2012/8
    doi: "10.63493/resolutions/conf201208"
    urn: "urn:oiml:doc:conf:resolution:14.08"
    dates:
    - start: '2012-10-03'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: "Resolves: The classification of Member States according to Article XXVI (1) of the Convention"
      subject: OIML Conference
      considerations:
      - type: having_regard_to
        message: |
          Having regard to Article XXVI (1) of the Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: recalling
        message: |
          Recalling the decision of the 12th Conference in 2004, instructing the Committee to annually review the situation of those Member States that benefit from a lower contributory class,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considering the procedure for the classification of Member States as decided by the Committee at its 40th Meeting in 2005,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          The classification of Member States according to Article XXVI (1) of the Convention shall be reviewed in the final year of a financial period in order to determine the respective contributory shares of the Member States for the following financial period. The review shall be according to the method decided by the Committee at its 40th Meeting in 2005. However, any change in the classification of a Member State shall take effect from the second year of the following financial period.
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: Agenda item 8
      subject: "Conférence OIML"
      considerations:
      - type: having_regard_to
        message: |
          Vu l'Article XXVI (1) de la Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: recalling
        message: |
          Rappelant la décision de la $12^{\mathrm{eme}}$ Conférence en 2004, chargeant le Comité de revoir chaque année la situation des États Membres bénéficiant d'une classe de contribution inférieure,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considérant la procédure pour la classification des États Membres selon la décision du Comité lors de sa $ 4 0^{\mathrm{ème}} $ Réunion en 2005,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que :
          La classification des États Membres conformément à l'Article XXVI (1) de la Convention doit être revue au cours de la dernière année d'un exercice financier afin de déterminer les parts contributives respective des États Membres pour l'exercice financier suivant. La revue doit être faite conformément à la méthode décidée par le Comité lors de sa 40ème Réunion en 2005. Néanmoins, toute modification de classification d'un État Membre doit prendre effet à partir de la seconde année de l'exercice financier suivant.
        dates:
        - start: '2012-10-03'
          kind: effective
