      - type: considering
        message: |
          Considering that the total number of base contributory shares, taking into account the classification of Member States as reviewed in 2012, is 126 for the year 2013 and, after reclassification of some Member States, 138 for the remaining years of the 2013-2016 financial period,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          (a) The overall amount of credits, necessary to cover the Organization's operating expenses shall be €8278200 for the 2013-2016 financial period;
          (b) The annual base contributory share for the 2013-2016 financial period is $ \epsilon $14000. This results in an annual contribution for a Member State classified according to Article XXVI (1) of the Convention in Class 1, Class 2, Class 3 or Class 4 of $ \epsilon $14000, $ \epsilon $28000, $ \epsilon $56000 or $ \epsilon $112000, respectively,
          (c) In case of admission of a Member State during the financial period, the overall amount of credits mentioned in (a) is increased with the contributory share of that Member State, calculated from its classification and the base contributory share, proportionate to the period from its admission to the expiry of the financial period,
          (d) For the 2013-2016 financial period, newly admitted or readmitted Member States shall not pay an entry fee.
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: Agenda item 9
      subject: "Conférence OIML"
      considerations:
      - type: having_regard_to
        message: |
          Vu l'Article XXIV, premier paragraphe, l'Article XXVI (1), et l'Article XXVIII, second paragraphe, de la Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Prenant note des Résolutions n° 7 et n° 10 de la 47ème Réunion du CIML,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considérant que le nombre total de parts contributives de base, prenant en considération la classification des États Membres selon la révision de 2012, est de 126 pour l'année 2013, et, après reclassification de certains États Membres, 138 pour les années suivantes de l'exercice financier 2013-2016,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que :
          (a) Le montant global des crédits nécessaires pour couvrir les frais de fonctionnement de I'Organisation est de 8 278 200 euros pour l'exercice financier 2013-2016,
          (b) La part annuelle contributive de base pour l'exercice financier 2013-2016 est de 14000 euros. Cela entraine une contribution annuelle pour un État Membre classifié
          conformément à l'Article XXVI (1) de la Convention en Classe 1, Classe 2, Classe 3 ou Classe 4 de 14000 euros, 28000 euros, 56000 euros ou 112000 euros respectivement,
          (c) En cas d'admission d'un État Membre au cours de l'exercice financier, le montant global de crédits mentionné en (a) est augmenté par la part contributive dudit État Membre, calculée à partir de sa classification et de la part contributive de base, proportionnellement à la période allant de son admission jusqu'à la fin de l'exercice financier,
          (d) Pour l'exercice financier 2013-2016, les États Membres nouvellement admis ou réadmis ne paient pas de droit d'entrée.
        dates:
        - start: '2012-10-03'
          kind: effective
  - identifier: Conference/2012/10
    doi: "10.63493/resolutions/conf201210"
    urn: "urn:oiml:doc:conf:resolution:14.10"
    dates:
    - start: '2012-10-03'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: Resolves
      subject: OIML Conference
      considerations:
      - type: having_regard_to
        message: |
          Having regard to Article XXIX of the Convention,
          Desiring to clarify Article XXIX, first paragraph, of the Convention with respect to Member States which have not fully paid their annual contribution,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          (a) A Member State which has not paid its annual contribution for three consecutive years shall automatically be considered as having resigned, according to Article XXIX, first paragraph, of the Convention;
          (b) A Member State which has not fully paid its annual contribution shall be automatically considered as having resigned when its accumulated arrears amount to the total of the last three years of contributions due;
          (c) A Member State in arrears will receive a final written warning at least six months before the accumulation of the three-year amount mentioned in (a) or (b). The warning will include a request to pay the full amount;
          (d) The provisions of (a), (b) and (c) apply accordingly to Corresponding Members with respect to annual Corresponding Member fees.
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Décide que "
      subject: "Conférence OIML"
      considerations:
      - type: having_regard_to
        message: |
          Vu I'Article XXIX de la Convention,
          Souhaitant clarifier l'Article XXIX, premier paragraphe, de la Convention en ce qui concerne les États Membres n'ayant pas intégralement réglé leur contribution annuelle,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que :
          (a) Un État Membre qui n'a pas réglé sa contribution annuelle pendant trois années consécutives doit être automatiquement considéré comme ayant démissionné, conformément à l'Article XXIX, premier paragraphe, de la Convention ;
          (b) Un État Membre qui n'a pas intégralement réglé sa contribution annuelle doit être automatiquement considéré comme ayant démissionné lorsque ses arriérés accumulés sont équivalents au total des trois dernières années de contributions dues ;
          (c) Un État Membre en arriéré recevra un avertissement final écrit au moins six mois avant l'accumulation du montant de trois ans mentionnée en (a) ou (b). L'avertissement incluera une demande de règlement total du montant ;
          (d) Les dispositions en (a), (b) et (c) s'appliquent également aux Membres Correspondants en ce qui concerne l'abonnement forfaitaire des Membres Correspondants.
        dates:
        - start: '2012-10-03'
          kind: effective
  - identifier: Conference/2012/11
    doi: "10.63493/resolutions/conf201211"
    urn: "urn:oiml:doc:conf:resolution:14.11"
    dates:
    - start: '2012-10-03'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: Resolves
      subject: OIML Conference
      considerations:
      - type: having_regard_to
        message: |
          Having regard to Article XXX of the Convention,
          Desiring to clarify Article XXX, second paragraph, of the Convention with respect to the readmission of Member States which have officially been regarded as having resigned,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          (a) A Member State which has officially been regarded as having resigned may be readmitted only after it has settled its unpaid contributions, the amount of which is calculated as the total contribution that the Member State would have had to pay over the last three years immediately prior to the year of readmission according to the classification of that Member State at the time of readmission;
          (b) The provisions in (a) apply accordingly to Corresponding Members with respect to Corresponding Member fees.
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: Agenda item 10.2
      subject: "Conférence OIML"
      considerations:
      - type: having_regard_to
        message: |
          Vu l'Article XXX de la Convention,
          Souhaitant clarifier l'Article XXX, second paragraphe, de la Convention en ce qui concerne la réadmission des États Membres officiellement considérés comme ayant démissionné,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que :
          (a) Un État Membre qui est officiellement considéré comme ayant démissionné peut être réadmis uniquement après qu'il a réglé ses contributions impayées, dont le montant est calculé comme la contribution totale que l'État Membre aurait eu à payer au cours des trois dernières années immédiatement avant l'année de réadmission conformément à la classification dudit État Membre au moment de sa réadmission ;
          (b) Les dispositions en (a) s'appliquent également aux Membres Correspondants en ce qui concerne l'abonnement forfaitaire des Membres Correspondants.
        dates:
        - start: '2012-10-03'
          kind: effective
  - identifier: Conference/2012/12
    doi: "10.63493/resolutions/conf201212"
    urn: "urn:oiml:doc:conf:resolution:14.12"
    dates:
    - start: '2012-10-03'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: Resolves
      subject: OIML Conference
      considerations:
      - type: having_regard_to
        message: |
          Having regard to Articles XXIX and XXX of the Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: recalling
        message: |
          Recalling its Resolutions no. 10 and no. 11, and Resolution no. 19 of the 13th Conference,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Noting Resolution no.27 of the 46th CIML Meeting and Resolution no.9 of the 47th CIML Meeting,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considering that for some Member States, the OIML accounts show arrears in excess of three years of membership contribution, but that these should not have amounted to more than three years of membership contribution and that the accounts need to be adjusted to rectify this situation,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          (a) Current Member States and Member States regarded as having resigned for which the OIML accounts show arrears in excess of three years of membership contribution shall have their arrears reduced to three years of membership contribution;
          (b) The reductions shall be accounted for in the 2012 accounts; any deficits resulting from these reductions shall be compensated by drawing from the reserve funds;
          (c) The provisions of (a) and (b) apply accordingly to Corresponding Members.
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Décide que "
      subject: "Conférence OIML"
      considerations:
      - type: having_regard_to
        message: |
          Vu les Articles XXIX et XXX de la Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: recalling
        message: |
          Rappelant ses Résolutions n° 10 et n° 11, et la Résolution n° 19 de la 13<sup>ème</sup> Conférence,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Prenant note de la résolution n° 27 de la 46 $ ^{\mathrm{eme}} $ Réunion du CIML et de la Résolution n° 9 de la $ 47^{\mathrm{eme}} $ Réunion du CIML,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considérant que pour certains États Membres, les comptes de l'OIML font apparaître des arriérés supérieurs à trois ans de contributions, mais que ces arriérés n'auraient pas dû être totalisés au-delà de trois ans de contributions et que les comptes doivent être ajustés afin de réctifier cette situation,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que :
          (a) Les États Membres actuels et États Membres considérés comme ayant démissionné et pour lesquels les comptes de l'OIML indiquent des arriérés supérieurs à trois ans de contributions, doivent voir leurs arriérés réduits à trois ans de contributions ;
          (b) Ces réductions doivent être comptabilisées dans les comptes de 2012 ; tout déficit résultant desdites réductions doit être compensé en puisant dans les fonds de réserve ;
          (c) Les dispositions en (a) et (b) s'appliquent également aux Membres Correspondants.
        dates:
        - start: '2012-10-03'
          kind: effective
  - identifier: Conference/2012/13
    doi: "10.63493/resolutions/conf201213"
    urn: "urn:oiml:doc:conf:resolution:14.13"
    dates:
    - start: '2012-10-03'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: "Resolves: In the event of the absence, impediment, cessation of mandate, resignation or death"
      subject: OIML Conference
      considerations:
      - type: having_regard_to
        message: |
          Having regard to Article XV of the Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Noting the proposal from the CIML President following the discussions at the 45th CIML Meeting and Resolution no.11 of the 45th CIML Meeting,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          In the event of the absence, impediment, cessation of mandate, resignation or death of the first Vice-President, his duties shall be temporarily assumed by the second Vice-President.
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: Agenda item 11.1
      subject: "Conférence OIML"
      considerations:
      - type: having_regard_to
        message: |
          Vu l'Article XV de la Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Prenant note de la proposition du Président du CIML suite aux discussions lors de la $ 4 5^{\mathrm{eme}} $ Réunion du CIML et la Résolution n° 11 de la $ 4 5^{\mathrm{eme}} $ Réunion du CIML,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que :
          En cas d'absence, empêchement, arrêt du mandat, démission ou décès du premier Vice-Président, ses devoirs doivent être temporairement assurés par le second Vice-Président.
        dates:
        - start: '2012-10-03'
          kind: effective
  - identifier: Conference/2012/14
    doi: "10.63493/resolutions/conf201214"
    urn: "urn:oiml:doc:conf:resolution:14.14"
    dates:
    - start: '2012-10-03'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: "Resolves: A 'colleague' as mentioned in the first paragraph of Article XVII of the"
      subject: OIML Conference
      considerations:
      - type: having_regard_to
        message: |
          Having regard to Article XVII of the Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Noting Resolution no. 26 of the 46th CIML Meeting,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considering that the 1968 amendment of the Convention changed the membership of the Committee from twenty experts designated by the Conference to one representative per Member State,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          A 'colleague' as mentioned in the first paragraph of Article XVII of the Convention may be: either another CIML Member or someone designated by the absent CIML Member to represent him/her. In the latter case, the representative shall be from the same government or administration as the absent CIML Member and may not represent other CIML Members, i.e. may not receive proxies from other CIML Members.
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: Agenda item 11.2
      subject: "Conférence OIML"
      considerations:
      - type: having_regard_to
        message: |
          Vu I'Article XVII de la Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Prenant note de sa Résolution n° 26 de la 46 $ ^{\mathrm{e m e}} $ Réunion du CIML,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considérant que l'amendement de 1968 de la Convention a modifié la composition du Comité, passant de vingt experts désignés par la Conférence à un représentant par État Membre,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que :
          Un « collègue », tel que mentionné au premier paragraphe de l'Article XVII de la Convention peut être : soit un autre Membre du CIML soit toute personne désignée par le Membre du CIML absent pour le représenter. Dans ce dernier cas, le représentant doit appartenir au même gouvernement ou à la même administration que le Membre du CIML absent et ne peut représenter d'autres Membres du CIML, c'est-à-dire ne peut recevoir de procuration de la part d'autres Membres du CIML.
        dates:
        - start: '2012-10-03'
          kind: effective
  - identifier: Conference/2012/15
    doi: "10.63493/resolutions/conf201215"
    urn: "urn:oiml:doc:conf:resolution:14.15"
    dates:
    - start: '2012-10-03'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: "Resolves: The Committee is hereby charged to organize the 15th Conference in 2016, the"
      subject: OIML Conference
      considerations:
      - type: having_regard_to
        message: |
          Having regard to Article X of the Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considering the standing practice to organize a Conference once every four years,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          The Committee is hereby charged to organize the 15th Conference in 2016, the venue and dates to be decided by the Committee.
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Décide que : Le Comité est à présent chargé d'organiser la 15ème Conférence en"
      subject: "Conférence OIML"
      considerations:
      - type: having_regard_to
        message: |
          Vu I'Article X de la Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considérant la pratique actuelle de tenir une Conférence tous les quatre ans,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que :
          Le Comité est à présent chargé d'organiser la 15ème Conférence en 2016, le lieu et les dates étant à la décision du Comité.
        dates:
        - start: '2012-10-03'
          kind: effective
  - identifier: Conference/2012/16
    doi: "10.63493/resolutions/conf201216"
    urn: "urn:oiml:doc:conf:resolution:14.16"
    dates:
    - start: '2012-10-03'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: Resolves
      subject: OIML Conference
      considerations:
      - type: having_regard_to
        message: |
          Having regard to Article XXIX, second paragraph, of the Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: recalling
        message: |
          Recalling its Resolution no. 8,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Noting the request by Greece, dated 29 August 2012, to be reclassified on the basis of the present financial difficulties and the size of its population, which Greece indicates dropped below 10 million in 2011,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          (a) The basis for the classification of Member States is, and remains, the figures provided by the World Bank,
          (b) The request from Greece is not considered to be supported with sufficient data to be able to examine the situation,
          (c) The request for a remission is therefore not approved.
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Décide que "
      subject: "Conférence OIML"
      considerations:
      - type: having_regard_to
        message: |
          Vu l'Article XXIX, second paragraphe, de la Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: recalling
        message: |
          Rappelant sa Résolution n° 8,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Prenant note de la demande de la Grèce, en date du 29 août 2012, à être reclassifiée en raison des difficultés financières actuelles et du volume de sa population qui, selon les indications de la Grèce, est devenu inférieure à 10 millions en 2011,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que :
          (a) La reclassification des États Membres est basée et demeure basée sur les chiffres fournis par la Banque Mondiale,
          (b) La demande de la Grèce n'est pas considérée comme étant étayée par suffisamment de données pour permettre l'examen de la situation,
          (c) Le demande d'une remise est par conséquent rejetée.
        dates:
        - start: '2012-10-03'
          kind: effective