  - identifier: Conference/2012/1
    doi: "10.63493/resolutions/conf201201"
    urn: "urn:oiml:doc:conf:resolution:14.01"
    agenda_item: '2.2'
    dates:
    - start: '2012-10-03'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: Agenda item 2.2
      subject: OIML Conference
      considerations:
      - type: having_regard_to
        message: |
          Having regard to Article XI of the OIML Convention,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Noting Resolution no.1 of the 44th CIML Meeting and Resolution no.7 of the 46th CIML Meeting,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considering that French is the official language of the Organization and that, in practice English is the Organization's main working language,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          (a) Conference invitations, agendas, working documents, minutes and resolutions Committee resolutions, circulars to Committee Members, CIML President and BIML Director's reports to the Committee, OIML Recommendations, Documents and Basic Publications, and OIML budgets and financial reports shall be made available in French and in English;
          (b) The OIML web site shall be available in both English and French versions;
          (c) The OIML Bulletin shall be published in English with articles occasionally also published in French when appropriate;
          (d) Other publications and communications shall be in English;
          (e) The Bureau may make available translations of publications into other languages provided by the Member States, if it is clearly indicated that the OIML is not responsible for the translation;
          (f) Conferences and meetings of the Committee shall have simultaneous interpretation from French to English and from English to French;
          (g) On occasion, Conferences and meetings of the Committee may have interpretation to and from other languages, provided this is not funded from the Organization's regular budget;
          (h) All other meetings shall be conducted in English without interpretation provided by the Organization.
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: Agenda item 2.2
      subject: "Conférence OIML"
      considerations:
      - type: having_regard_to
        message: |
          Vu I'Article XI de la Convention de I'OIML,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: noting
        message: |
          Prenant note de la Résolution n° 1 de la $ 4 4^{\mathrm{e m e}} $ Réunion du CIML et de la Résolution n° 7 de la $ 4 4^{\mathrm{e m e}} $ Réunion du CIML,
        dates:
        - start: '2012-10-03'
          kind: effective
      - type: considering
        message: |
          Considérant que le français est la langue officielle de l'Organisation et que, en pratique, l'anglais est la langue de travail principale de l'Organisation,
        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que :
          (a) Les invitations, ordres du jour, documents de travail, comptes-rendus et résolutions des Conférences, les résolutions du Comité, les circulaires aux Membres du Comité, les rapports du Président du CIML et du Directeur du BIML au Comité, les Recommandations, Documents et Publications de Base de l'OIML, ainsi que les budgets et rapports financiers de l'OIML doivent être rendus disponibles en français et en anglais ;
          (b) Le site web de l'OIML doit être rendu disponible en version anglaise et en version française ;
          (c) Le Bulletin de l'OIML doit être publié en anglais avec la parution occasionnelle d'articles en français lorsque c'est adapté ;
          (d) Les autres publications et communications doivent être en anglais ;
          (e) Le Bureau peut rendre disponible des traductions de publications vers d'autres langues qui ont été soumises par les États Membres s'il est clairement indiqué que l'OIML n'est pas responsable de la traduction ;
          (f) Les Conférences et Réunions du Comité doivent recevoir une interprétation simultanée du français vers l'anglais et de l'anglais vers le français ;
          (g) À l'occasion, les Conférences et Réunions du Comité peuvent recevoir une interprétation de et vers d'autres langues, à condition que cela ne soit pas financé par le budget ordinaire de l'Organisation ;
          (h) Toutes les autres réunions doivent être menées en anglais sans que l'Organisation ne fournisse d'interprétation.
        dates:
        - start: '2012-10-03'
          kind: effective
