        dates:
        - start: '2012-10-03'
          kind: effective
      actions:
      - type: resolves
        message: |
          Resolves:
          (a) The following OIML Recommendations are hereby sanctioned. Member States are reminded of their obligation to implement these Recommendations as far as possible:
          - R 35-2:2011 Material measures of length for general use. Part 2: Test methods
          - R 35-3:2011 Material measures of length for general use. Part 3: Test report format
          - R 46-1 and R 46-2:2012 Active electrical energy meters
          - R 80-1:2009 Road and rail tankers with level gauging. Part 1: Metrological and technical requirements
          - R 106-1:2011 Automatic rail-weighbridges. Part 1: Metrological and technical requirements - Tests
          - R 106-2:2012 Automatic rail-weighbridges. Part 2: Test report format
          - R 120:2010 Standard capacity measures for testing measuring systems for liquids other than water
          - R 126:2012 Evidential breath analyzers
          - R 134-2:2009 Automatic instruments for weighing road vehicles in motion and measuring axle loads. Part 2: Test report format
          - R 137-1&2:2012 Gas meters. Part 1: Metrological and technical requirements and Part 2 Metrological controls and performance tests
          - Am R 138:2009 Amendment to R 138:2007 Vessels for commercial transactions
          - R 143:2009 Instruments for the continuous measurement of $ SO_{2} $ in stationary source emissions
          (b) The following OIML Documents are hereby sanctioned:
          - D 1:2012 Considerations for a law on metrology
          - D 16:2011 Principles of assurance of metrological control
          (c) The withdrawal of the following OIML publications is hereby sanctioned:
          - R 70 Determination of intrinsic and hysteresis errors of gas analyzers
          - R 73 Requirements concerning pure gases CO, $ CO_{2}, $ $ CH_{4}, $ $ H_{2}, $ $ O_{2}, $ $ N_{2} $ and Ar intended for the preparation of reference gas mixtures
          - D7 The evaluation of flow standards and facilities used for testing water meters
        dates:
        - start: '2012-10-03'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Décide que "
