    title: EXAMEN et MISE en APPLICATION des DÉCISIONS de la CONFÉRENCE. PROJET «
      UNITÉS de MESURE LÉGALES  ».
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Ce projet de Document International ne peut être soumis à l''adoption
        formelle du Comité, en raison de l''absence de quorum, Un vote indicatif (24
        oui, 1 non, 3 abstentions) est effectué afin de guider le Président du Comité
        dans une éventuelle décision qu''il pourrait prendre à ce sujet.

        '
      dates:
      - start: '1976-10-05'
        kind: effective
