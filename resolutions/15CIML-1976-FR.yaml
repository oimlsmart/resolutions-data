    title: 'Agenda Item 4: EXAMEN de CERTAINS TRAVAUX DE LA CONFÉRENCE.'
    subject: "(The CIML)"
    actions:
    - type: notes
      date_effective:
        date: '1976-10-05'
        type: effective
      message: Le Comité examine ensuite une proposition de plan de travail du Secrétariat-Pilote
        17 formulée par les U.S.A., responsables du secrétariat. En raison de la complexité
        des problèmes, il est décidé que ce plan devra être discuté en détail lors
        de la première réunion du Secrétariat.
    - type: notes
      date_effective:
        date: '1976-10-05'
        type: effective
      message: 'Le Comité accueille favorablement une proposition de la Pologne relative
        à la création de Secrétariats-rapporteurs traitant de terminologie dans le
        cadre des Secrétariats-Pilotes : 4 « Mesure des longueurs, surfaces, angles
        », 9 « Mesure des masses volumiques », 13 « Mesure des grandeurs électriques
        et magnétiques » et 19 « Mesure des caractéristiques des matériaux », pour
        lesquels certains États ont indiqué leur éventuelle candidature.'
