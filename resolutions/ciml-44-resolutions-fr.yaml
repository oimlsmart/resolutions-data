  subject: Conférence OIML
  title: Le Comité a demandé que des recherches supplémentaires soient effectuées
    afin d'établiir le meilleur
  dates:
  - start: '2009-10-27'
    kind: decision
  considerations: []
  actions:
  - type: requests
    message: |
      Le Comité a demandé que des recherches supplémentaires soient effectuées afin d'établiir le meilleur moyen de présenter le passif du Système de Retraite OIML, vu les obligations des Etats Membres, dans le but de proposer une nouvelle règle à inclure dans un projet de révision du Règlement Financier de l'OIML (B 8) à soumettre pour approbation par la Quatorzième Conférence en 2012.
      Attendant la décision sur cette nouvelle règle, le Comité n'a pas approuvé les "Comptes du BIML pour l'Année 2008".
      Le Comité a accepté dans un même temps que la règle d'enregistrement dans la comptabilité OIML des Provisions du Système de Retraite, telle qu'utilisée pour préparer les comptes 2008, soit également utilisée pour compiler le projet des comptes pour l'année 2009.
    dates:
    - start: '2009-10-27'
      kind: effective
