  doi: 10.63493/resolutions/ciml200903
  urn: urn:oiml:doc:ciml:resolution:2009-03
  subject: Conférence OIML
  title: Le Comité a exprimé son appréciation pour la bonne coopération entre le Conseil
    de
  dates:
  - start: '2009-10-27'
    kind: decision
  considerations: []
  actions:
  - type: thanks
    message: 'Le Comité a exprimé son appréciation pour la bonne coopération entre
      le Conseil de la Présidence et le Bureau du CIPM ainsi qu''entre le BIML et
      le BIPM.

      '
    dates:
    - start: '2009-10-27'
      kind: effective
  - type: requests
    message: |
      Le Comité a demandé au Directeur du Bureau de préparer un projet de rapport sur le rapprochement, de manière à informer les Etats Membres des deux Organisations sur ce sujet et afin d'encourager davantage de discussion durant la 45ème Réunion du CIML. Ce rapport doit être principalement de nature stratégique et doit prendre en compte le point de vue des parties prenantes des deux Organisations, tout comme tenir compte des commentaires reçus de la part des Membres du CIML.
      Ce rapport sera discuté avec le Directeur du BIPM.
      Le Comité recommande que ce rapport soit adressé par les deux Directeurs à tous les Etats Membres.
    dates:
    - start: '2009-10-27'
      kind: effective
