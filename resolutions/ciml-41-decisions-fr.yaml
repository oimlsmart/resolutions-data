  - identifier: CIML/2006/9.1
    subject: CIML
    title: "Approbation de la procédure pour l'élection du Président et des Vice-Présidents du CIML"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a approuvé la procédure pour l'élection du Président et des Vice-Présidents du CIML, et a décidé que cette procédure serait applicable pour l'élection du second Vice-Président, au Point 9.2 de l'Ordre du Jour (voir ci-dessous). Le Comité a requis du Bureau de la publier sur le site web de l'OIML.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/9.2
    subject: CIML
    title: "Election du Second Vice-Président du CIML"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a élu Mr. Harvey (Australie) Second Vice-Président du CIML. La prise de fonction de Mr. Harvey est immédiate.
      dates:
      - start: '2006-10-18'
        kind: effective
