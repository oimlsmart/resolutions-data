  - identifier: CIML/2006/8.4
    subject: CIML
    title: "Progression de la révision des Directives pour le Travail Technique"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note de la présentation faite par Mr. Dunmill sur les progrès de la révision des Directives pour le Travail Technique, et a requis du Bureau de s'efforcer à avoir cette Révision des Directives prête pour approbation, lors de la 43ème Réunion du CIML en 2008.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/8.5
    subject: CIML
    title: "Rapport sur le Groupe de Travail \"Conformité au Type\""
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note du rapport fait par Mr. Harvey, Délégué du Groupe de Travail, relatif à la réunion qui s'est tenue le 14 octobre 2006, et a requis du Groupe de Travail de continuer son travail ainsi que proposé durant la Réunion.
      dates:
      - start: '2006-10-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a requis du Bureau et du Secrétariat de TC 3 (Contrôle métrologique) de revoir l'organisation du travail du TC 3, y compris ses Sous-Comités et le Groupe de Travail portant sur la Conformité au Type.
      dates:
      - start: '2006-10-18'
