        Le Comité a pris note de la présentation faite par Mme Gaucher sur la mise en oeuvre du MAA, et a exprimé sa satisfaction pour le travail mené, de même que pour la signature des deux premières Déclarations de Confiance Mutuelle (DoMCs).
