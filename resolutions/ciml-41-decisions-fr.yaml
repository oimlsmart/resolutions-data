  - identifier: CIML/2006/3.1
    subject: CIML
    title: Adoption du Rapport d'Audit pour 2005
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a approuvé le Rapport d'Audit pour 2005 et requis de son Président, et du Directeur du BIML, de le soumettre à la 13ème Conférence, en 2008
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/3.2
    subject: CIML
    title: Actif et passif au 01/01/2005 et au 31/12/2005
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note de l'information donnée par le Directeur du BIML concernant l'estimation des actifs et des passifs, selon le nouveau système comptable imposé par le nouveau Règlement Financier.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/3.3
    subject: CIML
    title: Rapport financier pour 2005 et estimations pour 2006
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note de la présentation faite par le Directeur du BIML relative à l'exercice financier 2005 et les estimations pour 2006. Il a noté que les résultats de 2005 ont été meilleurs que ceux prévus. En 2006, des économies devraient partiellement compenser l'augmentation de la dotation au Fond de Retraite.
      dates:
      - start: '2006-10-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a chargé le Bureau de préparer les chiffres préliminaires pour le budget 2009-2012, en prenant en compte cette dotation. Ces chiffres seront discutés lors de la 42ème Réunion du CIML en 2007.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/3.4
    subject: CIML
    title: "Progrès concernant le Fond de Retraite"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note du rapport établi par le Directeur du BIML concernant la progression de l'étude du Fond de Retraite de l'OIML. Il a requis de son Président et du Directeur du BIML de continuer l'étude et de comparer le Plan OIML aux systèmes existants dans des Organisations similaires, afin de proposer de nouvelles solutions, si approprié, lors de la 42ème Réunion du CIML.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/4
    subject: CIML
    title: "Activités du Conseil de la Présidence"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions: []
  - identifier: CIML/2006/4.1
    subject: CIML
    title: "Rapport sur les activités du Conseil de la Présidence"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note du rapport de son Président concernant les activités du Conseil de la Présidence depuis la 40ème Réunion du CIML.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/4.2
    subject: CIML
    title: "Stratégie à long terme et Plan d'Action"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a approuvé le document traitant de la Stratégie et a requis de son Président qu'il le finalise en tenant compte des commentaires reçus. Le Bureau devra développer un Plan d'Action basé sur ce rapport, en ayant pour objectif de le voir approuvé lors de la 42ème Réunion du CIML.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/4
    subject: CIML
    title: "a (Point additionnel) Rapport sur le Séminaire sur les Préemballages"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note du rapport établi par Mr. Carstens sur le Séminaire sur les Préemballages qui s'est tenu le lundi 16 octobre 2006. Le Comité requiert du Bureau qu'il conduise une enquête sur les besoins des Etats Membres en matière de réglementation de la quantité de préemballages. Une enquête ultérieure concernera les besoins des emballeurs pour l'accès au marché.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/5
    subject: CIML
    title: "Activités des Pays en Développement"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions: []
  - identifier: CIML/2006/5.1
    subject: CIML
    title: "Rapport sur les activités du PWGDC"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note du rapport établi par MM. Seiler et Dunmill quant aux activités du Groupe Permanent de Travail sur les Pays en Développement (PWGDC), et a exprimé à Mr. Seiler sa gratitude pour l'efficacité de sa présidence.
      dates:
      - start: '2006-10-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a décidé qu'il devait être donné aux propositions de Mr. Seiler toute la considération qui leur est due, et a requis que les activités des Pays en Développement soient incluses dans le document portant sur la Stratégie de l'OIML, de même que dans le Plan d'Action.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/5.2
    subject: CIML
    title: "Rapport sur les activités du JCDCMAS"
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note du rapport présenté par Mr. Dunmill sur les activités du Comité commun pour la coordination de l'assistance aux pays en développement dans les domaines de la métrologie, de l'accréditation et de la normalisation (JCDCMAS) et dont le secrétariat était tenu par le Bureau en 2005.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/6
