  - identifier: CIML/2006/8.2
    subject: CIML
    title: Examen de la situation de certains TC/SC
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a noté que les Secrétariats du TC 8/SC 7 Mesurage du gaz et TC 8/SC 8 Compteurs de gaz, prépareraient conjointement avec le BIML et soumettraient, pour approbation par le CIML, lors de sa 42ème Réunion, la proposition formelle de fusionner ces deux Sous-Comités.
      dates:
      - start: '2006-10-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a requis des Membres du CIML de se porter volontaires pour assumer la responsabilité pour le Secrétariat vacant du TC 18/SC 1 Instruments pour la pression sanguine.
      dates:
      - start: '2006-10-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a requis des Membres du CIML de s'assurer que tous les Projets de Comité (CD) qui ont circulé via ces TC/SC, et pour lesquels leur Pays est un Membre-P, soient commentés et/ou votés, afin d'assurer le développement en temps et en heure des projets.
      dates:
      - start: '2006-10-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a décidé:
      dates:
      - start: '2006-10-18'
        kind: effective
