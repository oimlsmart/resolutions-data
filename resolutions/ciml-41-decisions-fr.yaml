      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a accepté l'invitation de l'Australie à accueillir la 13ème Conférence et le 43ème Réunion du CIML à Sydney, Australie, en 2008
      dates:
