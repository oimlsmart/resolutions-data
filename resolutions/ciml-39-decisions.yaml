  agenda_item: '6.4'
  dates:
  - date: '2004-10-26'
    type: decided
  localizations:
  - language_code: eng
    title: Other decisions related to the OIML Certificate System
    actions:
    - type: decides
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Committee decided that from 1 January 2005 OIML Issuing Authorities
        shall establish OIML Certificates in electronic format as defined by the BIML,
        so that these Certificates may be published on the OIML web site.
  - language_code: fra
    title: Autres décisions liées au Système de Certificats OIML
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: Le Comité a décidé qu'à partir du 1er janvier 2005, les Autorités de
        délivrance de l'OIML devaient établir les Certificats OIML dans un format
        électronique spécifié par le BIML, de façon que ces Certificats puissent être
        diffusés sur le site Internet de l'OIML.
