      title: Other decisions related to the OIML Certificate System
      subject: CIML
      actions:
      - type: decides
        message: |
          The Committee decided that from 1 January 2005 OIML Issuing Authorities shall establish OIML Certificates in electronic format as defined by the BIML, so that these Certificates may be published on the OIML web site.
        dates:
        - start: '2004-10-26'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Autres décisions liées au Système de Certificats OIML"
      subject: CIML
      actions:
      - type: notes
        message: |
          Le Comité a décidé qu'à partir du 1er janvier 2005, les Autorités de délivrance de l'OIML devaient établir les Certificats OIML dans un format électronique spécifié par le BIML, de façon que ces Certificats puissent être diffusés sur le site Internet de l'OIML.
        dates:
        - start: '2004-10-26'
          kind: effective
