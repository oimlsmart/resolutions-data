  urn: urn:oiml:doc:ciml:resolution:2004-12.1
  agenda_item: '12.1'
  dates:
  - date: '2004-10-26'
    type: decided
  localizations:
  - language_code: eng
    title: 40th CIML Meeting (2005)
    actions:
    - type: thanks
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Committee thanked the French Government for its invitation to hold
        its 40th Meeting in Lyon, France, from 17 to 20 June 2005, in conjunction
        with the International Metrology Congress. The Committee noted that a gala
        reception would be organized on 20 June 2005 to celebrate the 50th Anniversary
        of the OIML.
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Committee also noted that legal metrology sessions would be organized
        by the Bureau during the International Metrology Congress and that the Bureau
        would pay the registration fee for one participant from each OIML Member State
        and Corresponding Member to attend this Congress.
  - language_code: fra
    title: 40ème Réunion du CIML (2005)
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: Le Comité a remercié le Gouvernement français pour son invitation à
        tenir sa 40ème Réunion à Lyon, France, du 17 au 20 juin 2005, en conjonction
        avec le Congrès International de Métrologie. Le Comité a pris note du fait
        qu'une réception de gala serait organisée le 20 juin 2005 pour célébrer le
        50ème Anniversaire de l'OIML.
