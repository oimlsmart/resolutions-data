    script: Latn
    title: Relation entre les DoMC et l'ancien Système de Certificats OIML
    subject: CIML
    actions:
    - type: remarks
      message: '1. 1 Lorsqu''une Autorité de Délivrance signe une Déclaration de Confiance
        Mutuelle (DoMC) dans le cadre du MAA, tous les Certificats OIML et les rapports
        d''essai associés émis par cette Autorité de Délivrance pour la catégorie
        d''instruments considérée, seront dès lors délivrés dans les conditions particulières
        résultant de sa participation à la DoMC. Cette Autorité de Délivrance ne sera
        pas autorisée à continuer de délivrer des Certificats dans les seules conditions
        du Système de Certificats OIML.

        '
      date_effective:
        date: '2004-10-26'
        type: adoption
  type: resolution
