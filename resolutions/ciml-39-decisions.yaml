      title: Examination of the situation of certain TCs/SCs
      subject: CIML
      actions:
      - type: notes
        message: |
          The Committee took note of a report from the BIML describing the situation of certain Technical Committees and Subcommittees.
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: approves
        message: |
          The Committee approved the proposal to allocate the Secretariat of TC 6 to South Africa and TC 9/SC 3 to Germany.
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: notes
        message: |
          The Committee noted firstly that the Secretariats of TC 8/SC 2 and TC 10/SC 3 were still vacant, and secondly that Germany wished to relinquish the Secretariat of TC 12. It asked Members to consider taking on responsibility for the Secretariats of these technical bodies.
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: approves
        message: |
          The Committee approved two new working projects:
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: sets
        message: |
          The Committee set the deadline for issuing Certificates according to the 1996 edition of R 61 to 31 December 2005 and requested Issuing Authorities to notify the BIML about their readiness to issue Certificates according to the requirements of the revised R 61 (2004), since R 61-1 had already been published and the publication of R 61-2 (2004) was imminent.
        dates:
        - start: '2004-10-26'
          kind: effective
    - language_code: fra
      script: Latn
      title: Examen de la situation de certains TC/SC
      subject: CIML
      actions:
      - type: notes
        message: |
          Le Comité a pris note d'un rapport du BIML décrivant la situation de certains Comités Techniques et SousComités.
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: notes
        message: |
          Le Comité a approuvé la proposition d'attribuer le Secrétariat du TC 6 à l'Afrique du sud et celui du TC 9/SC 3 à l'Allemagne.
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: notes
        message: |
          Le Comité a constaté premièrement que les Secrétariats du TC 8/SC 2 et du TC 10/SC 3 étaient encore vacants, et deuxièmement que l'Allemagne souhaitait abandonner le Secrétariat du TC 12. Il a demandé aux Membres d'étudier la possibilité de prendre la responsabilité des Secrétariats de ces organes techniques.
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: notes
        message: |
          Le Comité a approuvé deux nouveaux projets de travail:
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: notes
        message: |
          Le Comité a fixé la date limite pour la délivrance des Certificats d'après l'édition 1996 de la R 61 au 31 décembre 2005 et a demandé aux Autorités de Délivrance d'avertir le BIML lorsqu'elles seraient prêtes à délivrer des Certificats d'après les exigences de la R 61 révisée (édition 2004), car la R 61-1 avait déjà été publiée et la publication de la R 61-2 (2004) était imminente.
        dates:
        - start: '2004-10-26'
          kind: effective
