    considerations: []
    actions:
    - type: notes
      message:
        - { content: "Ces décisions entreront en vigueur pour la mise en application du MAA et pour le fonctionnement du Système de Certificats OIML à partir du 1er janvier 2005.", lang: fr }
      dates:
      - start: '2004-10-26'
        kind: effective