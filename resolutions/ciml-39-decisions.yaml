    title: 'Agenda Item 1: Approval of the minutes of the 38th CIML Meeting'
    actions:
    - type: approves
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Committee approved the minutes of its 38th Meeting without modification.
  - language_code: fra
    title: 'Agenda Item 1: Approval of the minutes of the 38th CIML Meeting'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: 1. 1 Lorsqu'une Autorité de Délivrance signe une Déclaration de Confiance
        Mutuelle (DoMC) dans le cadre du MAA, tous les Certificats OIML et les rapports
        d'essai associés émis par cette Autorité de Délivrance pour la catégorie d'instruments
        considérée, seront dès lors délivrés dans les conditions particulières résultant
        de sa participation à la DoMC. Cette Autorité de Délivrance ne sera pas autorisée
        à continuer de délivrer des Certificats dans les seules conditions du Système
        de Certificats OIML.
