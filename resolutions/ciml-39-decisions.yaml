  - identifier: CIML/2004/1
    language: fr
    title:
      - { content: "Relation entre les DoMC et l'ancien Système de Certificats OIML", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml200401"
    urn: "urn:oiml:doc:ciml:resolution:2004-01"
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message:
        - { content: "1. 1 Lorsqu'une Autorité de Délivrance signe une Déclaration de Confiance Mutuelle (DoMC) dans le cadre du MAA, tous les Certificats OIML et les rapports d'essai associés émis par cette Autorité de Délivrance pour la catégorie d'instruments considérée, seront dès lors délivrés dans les conditions particulières résultant de sa participation à la DoMC. Cette Autorité de Délivrance ne sera pas autorisée à continuer de délivrer des Certificats dans les seules conditions du Système de Certificats OIML.", lang: fr }
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: CIML/2004/2
    language: fr
    title:
