    - type: remarks
      message: 'The Committee took note of the decisions made by the Twelfth Conference
        and requested its Acting President, the Presidium and the Presidential Council
        to monitor their implementation and to report back at the next CIML Meeting.

        '
      date_effective:
        date: '2004-10-26'
        type: adoption
  - language_code: fra
    script: Latn
    title: Douzième Conférence Internationale de Métrologie Légale
    subject: CIML
    actions:
    - type: remarks
      message: 'Le Comité a pris note des décisions rendues par la Douzième Conférence
        et a demandé à son Président Intérimaire, au Présidium et au Conseil de la
        Présidence de veiller à leur application et d''en rendre compte lors de la
        prochaine Réunion du CIML.

        '
      date_effective:
        date: '2004-10-26'
        type: adoption
  type: resolution
