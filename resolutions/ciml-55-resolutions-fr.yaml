    - type: requests
      message: |
        Demande au MC de OIML-CS de réviser les publications OIML-CS pertinentes et de développer une note d'orientation concernant la signification du numéro de certificat OIML lorsqu'il est marqué sur un instrument de mesure,
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: charges
      message: |
        Charge le BIML d'examiner toutes les autres publications de l'OIML afin d'identifier celles qui comportent une référence au marquage du numéro de certificat OIML sur les instruments de mesure, et
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: charges
      message: |
        Charge le BIML d'identifier la méthode la plus appropriée pour modifier/réviser les publications pertinentes et de communiquer ces informations aux secrétariats des comités et/ou sous-comités techniques appropriés.
      dates:
      - start: '2020-10-20'
        kind: effective
  - identifier: CIML/2020/26
    doi: "10.63493/resolutions/ciml202026"
    urn: "urn:oiml:doc:ciml:resolution:2020-26"
    subject: CIML
    title: "Prend note du rapport sur les activités du groupe consultatif du CEEMS, Se félicite"
    dates:
    - start: '2020-10-20'
      kind: decision
    agenda_item: '10'
    considerations: []
    actions:
    - type: notes
      message: |
        Prend note du rapport sur les activités du groupe consultatif du CEEMS,
        Se félicite des progrès réalisés par le groupe consultatif et, en particulier, des efforts importants déployés pour achever la révision du Document International D 1 de l'OIML, et
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: approves
      message: |
        Approuve la proposition du groupe consultatif d'élaborer une stratégie sur l'application de la technologie en ligne au renforcement des capacités et aux autres activités des CEEMS et demande que les résultats de ces travaux soient mis à la disposition des États Membres bien avant la 56ème Réunion du CIML.
      dates:
      - start: '2020-10-20'
        kind: effective
