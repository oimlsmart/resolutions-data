  agenda_item: '14'
  localizations:
  - language_code: eng
    title: 'Agenda Item 14: OIML Digitalisation Task Group (OIML DTG)'
    considerations: []
    actions:
    - type: notes
      message: 'Notes the report of the OIML Digitalisation Task Group (DTG) Chairperson,

        '
      date_effective:
        date: '2023-10-17'
        type: effective
    - type: welcomes
      message: 'Welcomes the enthusiastic participation by its Members and others
        in the OIML Seminar The future of the OIML in the digital era held on 16 October
        2023,

        '
      date_effective:
        date: '2023-10-17'
        type: effective
    - type: approves
      message: 'Approves the plan of the DTG to formulate a roadmap with concrete
        milestones and work items based on the outcomes of the OIML Seminar The future
        of the OIML in the digital era held on 16 October 2023,

        '
      date_effective:
        date: '2023-10-17'
        type: effective
    - type: approves
      message: 'Approves the DTG''s recommendation to establish a Steering Committee
        of the DTG to prepare this roadmap,

        '
      date_effective:
        date: '2023-10-17'
        type: effective
    - type: thanks
      message: |
        Thanks the Chairperson of the DTG, Dr Sascha Eichstadt, and members of the DTG for their work, and
        Encourages its Members to support the DTG by making experts and other resources available to implement future recommendations put forward by the DTG.
      date_effective:
        date: '2023-10-17'
        type: effective
  - language_code: fra
    title: 'Agenda Item 14: OIML Digitalisation Task Group (OIML DTG)'
    considerations: []
    actions:
    - type: notes
      message: |
        Prend note du rapport du Président du Groupe de Travail sur la Digitalisation de l'OIML (DTG),
        Se félicite de la participation enthousiaste de ses Membres et d'autres personnes au Séminaire de l'OIML L'avenir de l'OIML à l'ère numérique qui s'est tenu le 16 octobre 2023,
      date_effective:
        date: '2023-10-17'
        type: effective
    - type: approves
      message: 'Approuve le projet du DTG de formuler une feuille de route avec des
        jalons concrets et des éléments de travail basés sur les résultats du séminaire
        de l''OIML L''avenir de l''OIML à l''ère numérique qui s''est tenu le 16 octobre
        2023,

        '
      date_effective:
        date: '2023-10-17'
        type: effective
    - type: approves
      message: 'Approuve la recommandation du DTG d''établir un Comité Directeur du
        DTG pour préparer cette feuille de route,

        '
      date_effective:
        date: '2023-10-17'
        type: effective
    - type: thanks
      message: |
        Remercie le président du DTG, le Dr. Sascha Eichstadt, et les membres du DTG pour leur travail, et
        Encourage ses membres à soutenir le DTG en mettant à sa disposition des experts et d'autres ressources pour mettre en œuvre les futures recommandations formulées par le DTG.
      date_effective:
        date: '2023-10-17'
        type: effective
