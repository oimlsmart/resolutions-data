        kind: effective
    - type: requests
      message:
        - { content: "Demande au BIML de rédiger un concept d'apprentissage en ligne, à présenter au Conseil de la Présidence lors de sa réunion de mars 2024, en tenant compte de l'OIML G 23 Guide pour l'utilisation des technologies en ligne pour la conduite des activités des CEEMS dans un monde post-COVID, ainsi que des résultats des séminaires OIML organisés en conjunction avec la 54ème Réunion du CIML en 2019 et la 58ème Réunion du CIML en 2023, en consultation avec le Groupe de Travail sur la numérisation, le Groupe consultatif des CEEMS, le Comité de Management de l'OIML-CS, et la Table Ronde des RLMO, et\nEncourage les Membres à collaborer à cette activité en fournissant des informations sur le matériel disponible en ligne, en faisant des suggestions sur les thèmes de l'apprentissage et de la formation en ligne futurs, et en mettant à disposition leurs ressources respective dans la mesure du possible.", lang: fr }
