        - { content: "Prend note de la recommandation du CEEMS AG présentée dans l'Addendum 13.2b au Document de Travail de cette réunion concernant la « Déclaration de Chiang Mai sur le système de métrologie légale NEXT (LMS) » relative aux activités du CEEMS de l'OIML,\nSe félicite de cette proposition importante pour l'organisation des travaux des CEEMS de l'OIML,", lang: fr }
