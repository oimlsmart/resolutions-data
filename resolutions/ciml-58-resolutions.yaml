    title: 'Agenda Item 18: 59th CIML Meeting'
    considerations:
    - type: noting
      message: 'Noting the comments from its Members on environmental concerns,

        '
      date_effective:
        date: '2023-10-17'
        type: effective
    - type: noting
      message: 'Noting the possibility of holding its meetings in-person, online,
        or in a hybrid manner,

        '
      date_effective:
        date: '2023-10-17'
        type: effective
    actions:
    - type: confirms
      message: 'Confirmss its preference for in-person meetings,

        '
      date_effective:
        date: '2023-10-17'
        type: effective
    - type: thanks
      message: 'Thanks the People''s Republic of China and Japan for their interest
        in hosting the 59th CIML Meeting and

        '
      date_effective:
        date: '2023-10-17'
        type: effective
    - type: resolves
      message: 'Resolves that the formal proposals to host the 59th CIML Meeting will
        be assessed against the approved criteria contained in its Resolution CIML/2022/51,
        and submitted to the CIML for online approval.

        '
      date_effective:
        date: '2023-10-17'
        type: effective
