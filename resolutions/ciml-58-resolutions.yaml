      - { content: "Prend note du rapport du Président du Groupe de Travail sur la Digitalisation de", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml202334"
    urn: "urn:oiml:doc:ciml:resolution:2023-34"
    dates:
    - start: '2023-10-17'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message:
        - { content: "Prend note du rapport du Président du Groupe de Travail sur la Digitalisation de l'OIML (DTG),\nSe félicite de la participation enthousiaste de ses Membres et d'autres personnes au Séminaire de l'OIML L'avenir de l'OIML à l'ère numérique qui s'est tenu le 16 octobre 2023,", lang: fr }
      dates:
      - start: '2023-10-17'
        kind: effective
    - type: approves
      message:
        - { content: "Approuve le projet du DTG de formuler une feuille de route avec des jalons concrets et des éléments de travail basés sur les résultats du séminaire de l'OIML L'avenir de l'OIML à l'ère numérique qui s'est tenu le 16 octobre 2023,", lang: fr }
      dates:
      - start: '2023-10-17'
        kind: effective
    - type: approves
      message:
        - { content: "Approuve la recommandation du DTG d'établir un Comité Directeur du DTG pour préparer cette feuille de route,", lang: fr }
      dates:
      - start: '2023-10-17'
        kind: effective
    - type: thanks
      message:
        - { content: "Remercie le président du DTG, le Dr. Sascha Eichstadt, et les membres du DTG pour leur travail, et\nEncourage ses membres à soutenir le DTG en mettant à sa disposition des experts et d'autres ressources pour mettre en œuvre les futures recommandations formulées par le DTG.", lang: fr }
      dates:
      - start: '2023-10-17'
        kind: effective
