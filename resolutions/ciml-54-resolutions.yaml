      message: 'Soutient la proposition du Groupe de Travail 2023 et du Conseil de
        la Présidence d''identifier des « mentors » pour le Bulletin de l''OIML, qui
        auront la responsabilité d''augmenter de manière durable le nombre d''articles
        techniques dans le Bulletin de l''OIML au profit de la communauté de la métrologie
        légale, y compris des praticiens de la métrologie légale,

        '
      dates:
      - start: '2019-10-22'
        kind: effective
    - type: requests
      message: 'Demande aux Membres du CIML d''envisager de devenir un « mentor »
        pour le Bulletin de l''OIML, et

        '
