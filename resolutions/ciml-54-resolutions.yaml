        - { content: "Thanks Dr Bobjoseph Mathew, Dr Peter Ulbig, and the BIML for having organised the workshop on e-Learning which took place on Monday 21 October 2019,", lang: en }
      dates:
      - start: '2019-10-22'
        kind: effective
    - type: thanks
      message:
        - { content: "Thanks Ms Dorina Nati (UNIDO) and Mr Phil Sorrell (New Zealand) for their excellent presentations at this workshop,\nConsiders that the development of an e-Learning concept for the benefit of the legal metrology community and others should be a priority activity for the Organisation,", lang: en }
      dates:
      - start: '2019-10-22'
        kind: effective
    - type: requests
      message:
        - { content: "Requests the CEEMS Advisory Group to establish one or more ad hoc working groups to develop, with the assistance of the Bureau, an e-Learning concept taking into account the following elements:\n1) a summary, analysis and prioritisation of the outcomes of the e-Learning seminar,\n2) the optimum means of capturing expert input from Technical Committees and Subcommittees in developing and maintaining high quality content,\n3) collaboration with other appropriate organisations,\n4) consideration of the appropriate platform and technology for the e-Learning concept,\n5) consideration of appropriate funding mechanisms and sources,", lang: en }
      dates:
      - start: '2019-10-22'
        kind: effective
    - type: instructs
      message:
        - { content: Instructs the BIML Director to take into account this e-Learning concept when preparing the budget for the 2021-2024 financial period., lang: en }
