    number: 2019/18
  doi: 10.63493/resolutions/ciml201918
  urn: urn:oiml:doc:ciml:resolution:2019-18
  agenda_item: '18'
  dates:
  - date: '2019-10-22'
    type: decided
  title:
  - spelling: eng
    value: Thanks Dr Bobjoseph Mathew, Dr Peter Ulbig, and the BIML for having organised
      the
  - spelling: fra
    value: Remercie le Dr Bobjoseph Mathew, le Dr Peter Ulbig et le BIML d'avoir organisé
  actions:
  - type: thanks
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: eng
      value: Thanks Dr Bobjoseph Mathew, Dr Peter Ulbig, and the BIML for having organised
        the workshop on e-Learning which took place on Monday 21 October 2019,
    - spelling: eng
      value: |-
        Thanks Ms Dorina Nati (UNIDO) and Mr Phil Sorrell (New Zealand) for their excellent presentations at this workshop,
        Considers that the development of an e-Learning concept for the benefit of the legal metrology community and others should be a priority activity for the Organisation,
    - spelling: fra
      value: Remercie le Dr Bobjoseph Mathew, le Dr Peter Ulbig et le BIML d'avoir
        organisé l'atelier e-Learning qui a eu lieu le lundi 21 octobre 2019,
    - spelling: fra
      value: |-
        Remercie Mme Dorina Nati (de l'ONUDI) et M. Phil Sorrell (Nouvelle Zélande) pour leurs excellentes presentations durant cet atelier,
        Considère que le développement d'un concept d'apprentissage en ligne au profit de la communauté de la métrologie légale, entre autres, devrait être une activité prioritaire pour l'Organisation,
  - type: requests
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: eng
      value: |-
        Requests the CEEMS Advisory Group to establish one or more ad hoc working groups to develop, with the assistance of the Bureau, an e-Learning concept taking into account the following elements:
        1) a summary, analysis and prioritisation of the outcomes of the e-Learning seminar,
        2) the optimum means of capturing expert input from Technical Committees and Subcommittees in developing and maintaining high quality content,
        3) collaboration with other appropriate organisations,
        4) consideration of the appropriate platform and technology for the e-Learning concept,
        5) consideration of appropriate funding mechanisms and sources,
    - spelling: fra
      value: |-
        Demande au Groupe Consultatif pour les CEEMS de mettre en place un ou plusieurs Groupes de Travail ad hoc afin d'élaborer, avec l'assistance du Bureau, un concept d'apprentissage en ligne tenant compte des éléments suivants :
        1) un résumé, une analyse et une hiérarchisation des résultats du séminaire d'apprentissage en ligne,
        2) les moyens optimaux de recueillir les avis d'experts des comités et sous-comités techniques pour élaborer et maintenir un contenu de haute qualité,
        3) la collaboration avec d'autres organisations appropriées,
        4) l'étude de la plateforme et de la technologie appropriées pour ce concept d'apprentissage en ligne,
        5) l'examen des mécanismes et des sources de financement appropriés,
  - type: instructs
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: eng
      value: Instructs the BIML Director to take into account this e-Learning concept
        when preparing the budget for the 2021-2024 financial period.
  - type: charges
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: fra
      value: Charge le Directeur du BIML de prendre en compte ce concept d'apprentissage
        en ligne lors de la préparation du budget de l'exercice 2021-2024.
