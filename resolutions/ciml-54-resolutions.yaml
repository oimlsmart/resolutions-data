      value: |-
        Prend note du rapport présenté par le Directeur du BIML,
        Encourage le BIML à poursuivre ses efforts pour recouvrer les arriérés impayés et à envisager de nouveaux mécanismes pour encourager les Etats Membres et les Membres Correspondants à effectuer un règlement rapide,
  - type: requests
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: eng
      value: Requests those Member States and Corresponding Members with arrears to
        bring their situation up to date as soon as possible, and
    - spelling: eng
      value: Requests Member States and Corresponding Members to ensure prompt payment
        of membership fees.
    - spelling: fra
      value: Demande aux Etats Membres et aux Membres Correspondants présentant des
        arriérés de régulariser leur situation dès que possible, et
    - spelling: fra
      value: Demande aux Etats Membres et aux Membres Correspondants d'assurer le
        règlement rapide des cotisations.
