    message:
    - spelling: eng
      value: Thanks Dr Rado Lapuh (Slovenia) for representing the OIML in the Consultative
        Committee for Units (CCU) and for his written report,
    - spelling: fra
      value: Remercie le Dr Rado Lapuh (Slovénie) d'avoir représenté l'OIML au Comité
        Consultatif des Unités (CCU) et pour son rapport écrit,
  - type: notes
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: eng
      value: Notes the oral report given by Ms Nataša Vukovič (Slovenia) on developments
        in the CCU, and
    - spelling: fra
      value: Prend note du rapport verbal présenté par Mme Nataša Vukovič (Slovénie)
        sur l'évolution de la situation au sein du CCU, et
  - type: requests
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: eng
      value: Requests OIML TC 2 to closely observe the ongoing discussions in the
        CCU on the definition of the term "unit", on angles, on dimensionless quantities,
        and on the SI in the digital world, and to facilitate a common OIML position,
        if possible.
    - spelling: fra
      value: Demande au TC 2 de l'OIML d'observer de près les discussions en cours
        au sein du CCU sur la définition du terme « unité », sur les angles, sur les
        quantités sans dimension et sur le SI dans le monde numérique, et de faciliter,
        si possible, une position commune de l'OIML.
