  - identifier: CIML/2019/18
    language: fr
    title:
      - { content: "Remercie le Dr Bobjoseph Mathew, le Dr Peter Ulbig et le BIML d'avoir organisé", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml201918"
    urn: "urn:oiml:doc:ciml:resolution:2019-18"
    dates:
    - start: '2019-10-22'
      kind: decision
    considerations: []
    actions:
    - type: thanks
      message:
        - { content: "Remercie le Dr Bobjoseph Mathew, le Dr Peter Ulbig et le BIML d'avoir organisé l'atelier e-Learning qui a eu lieu le lundi 21 octobre 2019,", lang: fr }
      dates:
      - start: '2019-10-22'
        kind: effective
    - type: thanks
      message:
        - { content: "Remercie Mme Dorina Nati (de l'ONUDI) et M. Phil Sorrell (Nouvelle Zélande) pour leurs excellentes presentations durant cet atelier,\nConsidère que le développement d'un concept d'apprentissage en ligne au profit de la communauté de la métrologie légale, entre autres, devrait être une activité prioritaire pour l'Organisation,", lang: fr }
      dates:
      - start: '2019-10-22'
        kind: effective
    - type: requests
      message:
        - { content: "Demande au Groupe Consultatif pour les CEEMS de mettre en place un ou plusieurs Groupes de Travail ad hoc afin d'élaborer, avec l'assistance du Bureau, un concept d'apprentissage en ligne tenant compte des éléments suivants :\n1) un résumé, une analyse et une hiérarchisation des résultats du séminaire d'apprentissage en ligne,\n2) les moyens optimaux de recueillir les avis d'experts des comités et sous-comités techniques pour élaborer et maintainir un contenu de haute qualité,\n3) la collaboration avec d'autres organisations appropriées,\n4) l'étude de la plateforme et de la technologie appropriées pour ce concept d'apprentissage en ligne,\n5) l'examen des mécanismes et des sources de financement appropriés,", lang: fr }
      dates:
      - start: '2019-10-22'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Directeur du BIML de prendre en compte ce concept d'apprentissage en ligne lors de la préparation du budget de l'exercice 2021-2024.", lang: fr }
      dates:
      - start: '2019-10-22'
        kind: effective
