      identify "mentors"
    subject: CIML
    considerations: []
    actions:
    - type: supports
      message: 'Supports the proposal of Task Group 2023 and the Presidential Council
        to identify "mentors" for the OIML Bulletin, who will take responsibility
        for sustainably increasing the number of technical articles in the OIML Bulletin
        for the benefit of the legal metrology community, including legal metrology
        practitioners,

        '
      dates:
      - start: '2019-10-22'
        kind: effective
    - type: requests
      message: 'Requests CIML Members to consider becoming a "mentor" for the OIML
        Bulletin, and

        '
      dates:
      - start: '2019-10-22'
        kind: effective
