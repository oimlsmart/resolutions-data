      type: effective
    message:
    - spelling: eng
      value: Notes the report made by the BIPM,
    - spelling: fra
      value: Prend note du rapport présenté par le BIPM,
  - type: thanks
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: eng
      value: Thanks its Director, Dr Martin Milton, for providing this information
        to the Committee, and
    - spelling: fra
      value: Remercie son Directeur, le Dr Martin Milton, d'avoir fourni ces informations
        au Comité, et
  - type: supports
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: eng
      value: |-
        Supports a stronger cooperation between the OIML and the BIPM through a joint task group to explore opportunities for closer cooperation towards the development of a common vision and a common concept of metrology as a key element of quality infrastructure.
        (Agenda item 7.4)
  - type: endorses
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: fra
      value: Soutient un reinforcement de la coopération entre l'OIML et le BIPM par
        le biais d'un Groupe de Travail Conjoint chargé d'étudier des perspectives
        de coopération plus étroite en vue de l'élaboration d'une vision commune et
        d'un concept commun de la métrologie en tant qu'élément clé des infrastructures
        de qualité.
