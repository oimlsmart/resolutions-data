        CEEMS,
  - type: welcomes
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: eng
      value: |-
        Welcomes the proposal to develop a scholarship scheme for leaders of tomorrow,
        Encourages Member States to explore opportunities for taking part in pilot projects by acting as hosts and sponsors, and
        Emphasises the importance of OIML D1 Considerations for a Law on Metrology and requests the appropriate Project Group to do all in its power to produce a Final Draft Document which can be adopted at the 55th CIML Meeting in 2020.
  - type: approves
    date_effective:
      date: '2019-10-22'
      type: effective
    message:
    - spelling: fra
      value: |-
        Approuve la proposition d'élaborer un système de bourses d'études pour les dirigeants de demain,
        Encourage les Etats Membres à explorer les opportunités de prendre part à des projets pilotes en tant qu'organisateurs ou que sponsors, et
        Souligne l'importance de l'OIML D 1 Eléments pour une loi de métrologie et demande au Groupe de Projet concerné de tout mettre en œuvre pour produire un projet de document final susceptible d'être adopté lors de la 55ème Réunion du CIML en 2020.
