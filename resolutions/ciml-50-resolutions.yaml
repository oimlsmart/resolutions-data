    - type: decides
      message:
        - { content: "Décide de créer un Groupe Projet sur le système de certification (CSPG) pour préparer les documents pertinents relatifs au système de certification unique OIML (OIML-CS) :\n- une publication OIML de type B contenant le cadre du système de certification unique OIML (OIML-CS),\n- les procédures et les documents opérationnels pour le système de certification unique OIML (OIML-CS),\n- le processus de nomination des membres du Comité de Gestion (MC) de l'OIML-CS,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message:
        - { content: "Demande à son premier Vice-Président de diriger le CSPG,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message:
        - { content: "Demande aux Membres intéressés de participer au CSPG, ou de désigner un ou plusieurs représentants experts,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Bureau de fournir des services de secrétariat au CSPG,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le CSPG de prendre des mesures appropriées afin que le système de certification unique OIML proposé puisse devenir effectif à compter du 1er janvier 2017, sous réserve d'approbation par le CIML et de sanction par la Conférence de la publication OIML de type B Document-cadre OIML-CS,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le CSPG de travailler en conformité avec les procédures prévues dans les termes de référence proposés (AHWG-MAA-Doc-5, partie F de l'Addendum 9.1 au document de travail de cette réunion),", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message:
        - { content: "Demande au CSPG de soumettre le projet final du document-cadre pour approbation lors de la 51ème réunion du CIML en 2016, en vue de faire sanctionner, par la Conférence en 2016, la publication approuvée.", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
  - identifier: CIML/2015/19
    language: fr
    title:
      - { content: "Décide de demander à la $ 1 5^{\\mathrm{eme}} $ Conférence de l'OIML d'approuver la", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml201519"
    urn: "urn:oiml:doc:ciml:resolution:2015-19"
    dates:
    - start: '2015-10-20'
      kind: decision
    considerations:
    - type: considering
      message:
        - { content: "Considérant que\n- conformément à l'article XIII de la Convention, les personnes désignées par leur gouvernement en tant que Membre du Comité doivent être fonctionnaires en activité dans le service s'occupant des instruments de mesure ou avoir une fonction officielle active dans le domaine de la métrologie légale,\n- conformément à l'article XVII de la Convention, le quorum pour les décisions lors d'une réunion du Comité, ou pour les résolutions prises par le Comité par correspondance, est des trois-quarts du nombre de personnes désignées comme Membres du Comité,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: noting
      message:
        - { content: "Notant qu'\n- il est parfois difficile de savoir si une personne désignée comme Membre du Comité remplit toujours les conditions pour être Membre, et qu'\n- il devient de plus en plus difficile d'atteindre le quorum pour les décisions du Comité,\nEstime que, si une personne désignée comme Membre du Comité ne remplit plus les conditions pour être Membre du Comité, cette personne cesse d'être un Membre du Comité pour les besoins de calcul du quorum,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    actions:
    - type: decides
      message:
        - { content: "Décide de demander à la $ 1 5^{\\mathrm{eme}} $ Conférence de l'OIML d'approuver la procédure suivante, se rapportant au quatrième alinéa de l'article XIII de la Convention :\na) s'il s'avère que le représentant désigné d'un État Membre ne remplit plus les conditions pour être Membre du Comité et que l'État Membre n'a pas encore désigné un nouveau représentant, cette personne ne doit plus être prise en compte lors de l'établissement du quorum pour les décisions du Comité,\nb) si le représentant désigné d'un État Membre n'a répondu à aucune communication du Bureau pendant plus de six mois et que le Bureau a entrepris toutes les tentatives raisonnablement possibles pour contacter le représentant désigné, le Bureau doit demander confirmation à l'État Membre, du statut de son représentant au sein du Comité, selon une procédure décidée par le Comité,\nc) s'il n'est pas possible, dans un délai raisonnable déterminé par le Comité, d'obtenir la confirmation de l'État Membre du statut de son représentant au sein du Comité, cette personne ne doit plus être prise en compte lors de l'établissement du quorum pour les décisions du Comité.", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
