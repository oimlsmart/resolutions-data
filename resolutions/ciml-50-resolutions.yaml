        kind: effective
  - identifier: CIML/2015/19
    language: en
    title:
      - { content: "Resolves to request the 15th OIML Conference to approve the following procedure, relevant to", lang: en }
    subject:
      - { content: CIML, lang: en }
    doi: "10.63493/resolutions/ciml201519"
    urn: "urn:oiml:doc:ciml:resolution:2015-19"
    dates:
    - start: '2015-10-20'
      kind: decision
    considerations:
    - type: considering
      message:
        - { content: "Considering that\n- according to Article XIII of the Convention, persons designated by their government as Member of the Committee shall be serving officials in the department concerned with measuring instruments or have active official functions in the field of legal metrology,\n- according to Article XVII of the Convention, the quorum for decisions at a meeting of the Committee, or for resolutions taken by the Committee by correspondence, is three-quarters of the number of persons designated as Members of the Committee,\n- Noting that\n- it is sometimes not clear whether a person designated as Member of the Committee still satisfies the conditions for membership, and that\n- it is becoming increasingly difficult to achieve the quorum for decisions of the Committee,\nOf the opinion that, if a person designated as Member of the Committee no longer satisfies the conditions for membership of the Committee, this person has ceased to be a Member of the Committee for the purposes of calculating any quorum,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    actions:
    - type: resolves
      message:
        - { content: "Resolves to request the 15th OIML Conference to approve the following procedure, relevant to the fourth paragraph of Article XIII of the Convention:\na) if the designated representative of a Member State is known to no longer satisfy the conditions for membership of the Committee and the Member State has not yet designated a new representative, this person shall no longer be taken into account when establishing the quorum for decisions of the Committee,\nb) if the designated representative of a Member State has not responded to any communication from the Bureau for more than six months and the Bureau has made all reasonably possible attempts to contact the designated representative, the Bureau shall seek confirmation from the Member State as to the status of its representative in the Committee, according to a procedure decided by the Committee,\nc) if it is not possible, within a reasonable period of time to be decided by the Committee, to obtain confirmation from the Member State as to the status of its representative in the Committee, this person shall no longer be taken into account when establishing the quorum for decisions of the Committee.", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
