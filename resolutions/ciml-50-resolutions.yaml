- identifier:
  - prefix: CIML
    number: 2015/18
  doi: 10.63493/resolutions/ciml201518
  urn: urn:oiml:doc:ciml:resolution:2015-18
  agenda_item: '18'
  dates:
  - date: '2015-10-20'
    type: decided
  localizations:
  - language_code: eng
    title: Decides to establish a certification system project group (CSPG) to prepare
      the relevant documents
    considerations:
    - type: recalling
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Recalling its resolution no. 2015/17,
    - type: considering
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Considering the proposal of the ad-hoc working group on the review
        of the MAA,
    actions:
    - type: decides
      date_effective:
        date: '2015-10-20'
        type: effective
      message: |-
        Decides to establish a certification system project group (CSPG) to prepare the relevant documents for the single OIML certification system (OIML-CS):
        - a B-type OIML publication containing the framework for a single OIML certification system (OIML-CS),
        - the procedures and operational documents for the single OIML certification system (OIML-CS),
        - the nomination process for membership of the OIML-CS Management Committee (MC),
    - type: requests
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Requests its first Vice-President to chair the CSPG,
    - type: requests
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Requests interested Members to participate in the CSPG, or to designate
        expert representative(s),
    - type: instructs
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Instructs the Bureau to provide secretarial support to the CSPG,
    - type: instructs
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Instructs the CSPG to take appropriate actions so that the proposed
        single OIML certification system may become effective 1 January 2017, subject
        to CIML approval and Conference sanctioning of the B-type OIML publication
        OIML-CS Framework Document,
    - type: instructs
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Instructs the CSPG to work in accordance with the procedures laid down
        in the proposed terms of reference (AHWG-MAA-Doc-5, part F of Addendum 9.1
        to the working document for this meeting),
    - type: requests
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Requests the CSPG to submit the final draft of the framework document
        for approval at the 51st CIML meeting in 2016, with a view to having the approved
        publication sanctioned by the Conference in 2016.
  - language_code: fra
