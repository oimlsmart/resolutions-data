      date: '2015-10-20'
      type: effective
    message:
    - spelling: eng
      value: Having regard to section 7.2.2 of OIML B 7:2013 BIML Staff regulations,
        section 2, first paragraph and section 4, first bullet point, of OIML B 13:2004
        Procedure for the appointment of the BIML Director and Assistant Directors,
    - spelling: fra
      value: Vu les dispositions du chapitre 7.2.2 du document OIML B 7:2013 Statuts
        du Personnel du BIML, du chapitre 2, premier paragraphe, et du chapitre 4,
        premier alinéa, du document OIML B 13:2004 Procédure pour la désignation du
        Directeur et des Adjoints au Directeur du BIML,
  - type: considering
    date_effective:
      date: '2015-10-20'
      type: effective
    message:
    - spelling: eng
      value: Considering that the term of appointment of Mr. Willem Kool, BIML Assistant
        Director, expires on 31 December 2016,
    - spelling: eng
      value: Considering the proposal of its President, under section 2 of OIML B
        13:2004, to extend the Assistant Director's contract without a further preliminary
        procedure,
    - spelling: fra
      value: Considérant que le mandat de l'Adjoint au Directeur du BIML M. Willem
        Kool, arrive à échéance le 31 Décembre 2016,
    - spelling: fra
      value: Considérant la proposition de son Président, en application des dispositions
        du chapitre 2 du document OIML B 13:2004, de renouveler le contrat de l'Adjoint
        au Directeur sans autre procédure préalable,
  - type: noting
    date_effective:
      date: '2015-10-20'
      type: effective
    message:
    - spelling: eng
      value: |-
        Noting the comments made by its Members,
        Expresses its expectation that it will resolve to renew the appointment of Mr. Willem Kool as BIML Assistant Director for a fixed term of up to five years at its meeting in 2016, and
    - spelling: fra
      value: |-
        Prenant note des observations formulées par ses Membres,
        Indique qu'il envisage de renouveler le contrat de M. Willem Kool comme Adjoint au Directeur du BIML pour une durée déterminée de cinq ans au maximum lors de sa réunion en 2016, et
  actions:
  - type: resolves
    date_effective:
      date: '2015-10-20'
      type: effective
    message:
    - spelling: eng
      value: Resolves not to appoint a Selection Committee under section 3 of OIML
        B 13:2004.
  - type: decides
    date_effective:
      date: '2015-10-20'
      type: effective
    message:
    - spelling: fra
      value: Décide de ne pas désigner le Comité de sélection prévu au chapitre 3
        du document OIML B 13:2004.
