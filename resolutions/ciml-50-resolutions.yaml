  - identifier: CIML/2015/10
    language: fr
    title:
      - { content: "Charge le Bureau de poursuivre ses efforts en vue de participer à des activités", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml201510"
    urn: "urn:oiml:doc:ciml:resolution:2015-10"
    dates:
    - start: '2015-10-20'
      kind: decision
    considerations: []
    actions:
    - type: charges
      message:
        - { content: "Charge le Bureau de poursuivre ses efforts en vue de participer à des activités de renforcement des capacités à travers des formations et d'autres activités régionales organisées par d'autres organisations,\nExprime son soutien au travail du Réseau DCMAS,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Bureau de continuer à travailler avec les organes constitutifs du réseau DCMAS, en particulier le BIPM, dans l'identification de nouvelles initiatives auxquelles l'OIML peut apporter une contribution directe,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Bureau de développer davantage le site web de l'OIML de telle sorte qu'il puisse être utilisé comme une source d'informations à jour sur les initiatives de renforcement des capacités, y compris le matériel de formation et, si possible, une base de données d'experts disponibles pour contribuer à ces travaux,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: approves
      message:
        - { content: "Approuve la proposition du groupe consultatif, mis en place par la Résolution n° 2013/9, de créer un « centre pilote de formation » et encourage les autorités de la République Populaire de Chine à donner leur plein appui à cette initiative,\nEncourage vivement les autres États Membres à étudier les résultats de ce premier centre pilote et à examiner, à la lumière d'une évaluation de celui-ci, s'ils sont en mesure de lancer une initiative similaire,\nEncourage vivement les États Membres et les Membres Correspondants à étudier les possibilités de détacher du personnel auprès du Bureau afin de développer les compétences et l'expérience des personnes concernées,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message:
        - { content: "Demande aux Comités et Sous-comités techniques appropriés de prendre note de la demande des CEEMS pour s'assurer que les Recommandations tiennent davantage compte des besoins des CEEMS,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Groupe Projet sur le Système de Certificats (CSPG), créé par la Résolution 2015/18, de s'assurer que les besoins des CEEMS sont pris en compte dans le Système de Certificats OIML,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Bureau de tenir compte de la nécessité d'une plus grande implication des CEEMS dans les travaux techniques de l'OIML lors du développement des fonctionnalités du site web de l'OIML destinées au soutien des travaux techniques,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Groupe Projet sur la révision de l'OIML B 6:2013 Directives pour les travaux techniques de l'OIML (voir Résolution n° 2015/13) de tenir compte de la nécessité d'une plus grande implication des CEEMS dans les travaux techniques de l'OIML lors de la rédaction de la révision du document B 6,\nEncourage vivement les responsables des groupes de projet TC 3/SC 6/p 1 Activités de surveillance de pré-commercialisation et TC 6/p 5 Orientation pour définir les exigences du système concernant le système de certification pour les préemballages à conclure leurs travaux dans les meilleurs délais,\nEncourage vivement les États Membres à se tenir prêts à proposer des responsables de projets pour la rédaction d'autres documents proposés au cours des deux séminaires organisés en 2015,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Bureau d'accorder une attention particulière au rôle du Bulletin de l'OIML et du site web de l'OIML dans la facilitation de l'échange de nouvelles idées et en particulier les nouvelles approches de la métrologie légale,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: notes
      message:
        - { content: "Prend note de la contribution particulière que la recherche peut jouer dans la promotion et l'évaluation de nouvelles approches de la métrologie légale, et charge le Directeur de prendre cela en compte lors de l'examen des projets qui peuvent être financés par le fond spécial créé par la 14ème Conférence,", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message:
        - { content: "Demande à son Président, à ses Vice-Présidents et au Bureau de prendre particulièrement en compte les besoins des CEEMS lorsqu'ils sont impliqués dans des activités liées à l'Objectif 5 de la Stratégie OIML (OIML B 15:2011).", lang: fr }
      dates:
      - start: '2015-10-20'
        kind: effective
