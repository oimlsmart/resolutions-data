        date: '2015-10-20'
        type: effective
      message: |-
        Décide de créer un Groupe Projet sur le système de certification (CSPG) pour préparer les documents pertinents relatifs au système de certification unique OIML (OIML-CS) :
        - une publication OIML de type B contenant le cadre du système de certification unique OIML (OIML-CS),
        - les procédures et les documents opérationnels pour le système de certification unique OIML (OIML-CS),
        - le processus de nomination des membres du Comité de Gestion (MC) de l'OIML-CS,
    - type: requests
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Demande à son premier Vice-Président de diriger le CSPG,
    - type: requests
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Demande aux Membres intéressés de participer au CSPG, ou de désigner
        un ou plusieurs représentants experts,
    - type: charges
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Charge le Bureau de fournir des services de secrétariat au CSPG,
    - type: charges
      date_effective:
        date: '2015-10-20'
