        Décide de créer un Groupe Projet sur le système de certification (CSPG) pour préparer les documents pertinents relatifs au système de certification unique OIML (OIML-CS) :
        - une publication OIML de type B contenant le cadre du système de certification unique OIML (OIML-CS),
        - les procédures et les documents opérationnels pour le système de certification unique OIML (OIML-CS),
        - le processus de nomination des membres du Comité de Gestion (MC) de l'OIML-CS,
