  - identifier: CIML/2015/10
    language: en
    title:
      - { content: Instructs the Bureau to continue its efforts to participate in capacity building activities through, lang: en }
    subject:
      - { content: CIML, lang: en }
    doi: "10.63493/resolutions/ciml201510"
    urn: "urn:oiml:doc:ciml:resolution:2015-10"
    dates:
    - start: '2015-10-20'
      kind: decision
    considerations: []
    actions:
    - type: instructs
      message:
        - { content: "Instructs the Bureau to continue its efforts to participate in capacity building activities through training courses and other regional activities organized by other organizations,\nExpresses its support for the work of the DCMAS Network,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message:
        - { content: "Instructs the Bureau to continue to work with the constituent bodies of the DCMAS Network, in particular the BIPM, in identifying new initiatives where the OIML can make a direct contribution,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message:
        - { content: "Instructs the Bureau to further develop the OIML website such that it may be used as a source of up-to-date information on capacity-building initiatives, including training materials and, if feasible, a database of experts available to contribute to such work,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: endorses
      message:
        - { content: "Endorses the proposal of the advisory group, set up by Resolution no. 2013/9, to establish a \"pilot training center\" and encourages the authorities in P.R. China to give their full support to this initiative,\nUrges other Member States to study the results of this first pilot and to consider, in the light of an evaluation of the pilot, whether they are able to initiate something similar,\nUrges both Member States and Corresponding Members to consider opportunities to second staff to the Bureau in order to develop the skills and experience of appropriate individuals,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message:
        - { content: "Requests relevant Technical Committees and Subcommittees to take note of the demand from CEEMS to ensure Recommendations take more account of the needs of CEEMS,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message:
        - { content: "Instructs the Certificate System Project Group (CSPG), established by Resolution 2015/18, to ensure that the needs of CEEMS are addressed in the OIML Certificate System,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message:
        - { content: "Instructs the Bureau to take account of the need for greater involvement of CEEMS in OIML technical work when further developing the OIML website's functionality in supporting the technical work,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message:
        - { content: "Instructs the Project Group for the revision of OIML B 6:2013 Directives for OIML technical work (see Resolution no. 2015/13) to take account of the need for greater involvement of CEEMS in OIML technical work when drafting the revision of B 6,\nUrges the conveners of project groups TC 3/SC 6/p 1 Premarket surveillance activities and TC 6/p 5 Guidance for defining the system requirements for a certification system for prepackages to bring their work to a conclusion as soon as possible,\nUrges Member States to be ready to propose conveners for projects to produce other documents proposed during the two seminars organized in 2015,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message:
        - { content: "Instructs the Bureau to pay particular attention to the role of the OIML Bulletin and the OIML website in facilitating the exchange of new ideas, and in particular new approaches to legal metrology,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: notes
      message:
        - { content: "Notes the particular contribution that research can play in promoting and evaluating new approaches to legal metrology, and instructs the Director to take this into account when considering projects which can be supported by the special fund created by the 14th Conference,", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message:
        - { content: "Requests its President, Vice Presidents and the Bureau to take particular account of the needs of CEEMS when involved in activities related to Objective 5 in the OIML Strategy (OIML B 15:2011).", lang: en }
      dates:
      - start: '2015-10-20'
        kind: effective
