    number: 2015/4
  doi: 10.63493/resolutions/ciml201504
  urn: urn:oiml:doc:ciml:resolution:2015-04
  agenda_item: '4'
  dates:
  - date: '2015-10-20'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 4: Member States and Corresponding Members'
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Having regard to section 7.2.2 of OIML B 7:2013 BIML Staff regulations,
        section 2, first paragraph and section 4, first bullet point, of OIML B 13:2004
        Procedure for the appointment of the BIML Director and Assistant Directors,
    - type: considering
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Considering that the term of appointment of Mr. Willem Kool, BIML Assistant
        Director, expires on 31 December 2016,
    - type: considering
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Considering the proposal of its President, under section 2 of OIML
        B 13:2004, to extend the Assistant Director's contract without a further preliminary
        procedure,
    - type: noting
      date_effective:
        date: '2015-10-20'
        type: effective
      message: |-
        Noting the comments made by its Members,
        Expresses its expectation that it will resolve to renew the appointment of Mr. Willem Kool as BIML Assistant Director for a fixed term of up to five years at its meeting in 2016, and
    actions:
    - type: resolves
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Resolves not to appoint a Selection Committee under section 3 of OIML
        B 13:2004.
  - language_code: fra
    title: 'Agenda Item 4: Member States and Corresponding Members'
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Vu les dispositions du chapitre 7.2.2 du document OIML B 7:2013 Statuts
        du Personnel du BIML, du chapitre 2, premier paragraphe, et du chapitre 4,
        premier alinéa, du document OIML B 13:2004 Procédure pour la désignation du
        Directeur et des Adjoints au Directeur du BIML,
    - type: considering
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Considérant que le mandat de l'Adjoint au Directeur du BIML M. Willem
        Kool, arrive à échéance le 31 Décembre 2016,
    - type: considering
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Considérant la proposition de son Président, en application des dispositions
        du chapitre 2 du document OIML B 13:2004, de renouveler le contrat de l'Adjoint
        au Directeur sans autre procédure préalable,
    - type: noting
      date_effective:
        date: '2015-10-20'
        type: effective
      message: |-
        Prenant note des observations formulées par ses Membres,
        Indique qu'il envisage de renouveler le contrat de M. Willem Kool comme Adjoint au Directeur du BIML pour une durée déterminée de cinq ans au maximum lors de sa réunion en 2016, et
    actions:
    - type: decides
      date_effective:
        date: '2015-10-20'
        type: effective
      message: Décide de ne pas désigner le Comité de sélection prévu au chapitre
        3 du document OIML B 13:2004.
