        - { content: "Demande au MC de l'OIML-CS de réviser les publications pertinentes de l'OIML-CS, y compris l'OIML B 18 Cadre pour le Système de Certification OIML (OIML-CS), afin de mettre en œuvre les changements nécessaires pour permettre l'utilisation de la norme ISO/CEI 17020 (avec des exigences supplémentaires) par les Autorités de Délivrance de l'OIML, et", lang: fr }
      dates:
      - start: '2021-10-22'
        kind: effective
    - type: approves
      message:
        - { content: "Approuve un nouveau projet sous la responsabilité du MC de l'OIML-CS pour développer un nouveau Document OIML afin de fournir des conseils et des interprétations concernant l'application de la norme ISO/CEI 17020 à l'évaluation des Autorités de Délivrance OIML dans l'OIML-CS, comme détaillé dans la proposition de projet à l'annexe A de l'Addendum 10.2 au Document de Travail de cette Réunion.", lang: fr }
      dates:
      - start: '2021-10-22'
        kind: effective
