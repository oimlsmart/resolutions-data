      message: Notes the report on the proposal for a Digitalisation Task Group given
        by its President,
    - type: welcomes
      date_effective:
        date: '2021-10-19'
        type: effective
      message: Welcomes the establishment of an OIML Digitalisation Task Group with
        the aim of examining and proposing options and solutions regarding opportunities
        for the OIML concerning the digital transformation of processes and services
        to its Members and stakeholders, in cooperation with other QI partners, and
    - type: requests
      date_effective:
        date: '2021-10-19'
        type: effective
      message: Requests CIML Members, Corresponding Member Representatives and Organisations
        in Liaison to make nominations for members of this Task Group by 30 November
        2021.
