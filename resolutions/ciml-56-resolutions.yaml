    - type: notes
      date_effective:
        date: '2021-10-22'
        type: effective
      message: |-
        Prend note du rapport sur la proposition de création d'un Groupe de Travail sur la Numérisation, présenté par son Président,
        Se félicite de la mise en place d'un Groupe de Travail sur la Numérisation de l'OIML dans le but d'examiner et de proposer des options et des solutions concernant les opportunités pour l'OIML en matière de transformation numérique des processus et des services à ses Membres et aux parties prenantes, en coopération avec d'autres partenaires QI, et
    - type: requests
      date_effective:
        date: '2021-10-22'
        type: effective
      message: Demande aux Membres du CIML, aux Représentants des Membres Correspondants
        et aux Organisations en Liaison de faire des nominations pour les membres
        de ce Groupe de Travail avant le 30 novembre 2021.
