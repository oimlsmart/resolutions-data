        pour développer un nouveau Document OIML afin de fournir des conseils et des
        interprétations concernant l'application de la norme ISO/CEI 17020 à l'évaluation
        des Autorités de Délivrance OIML dans l'OIML-CS, comme détaillé dans la proposition
        de projet à l'annexe A de l'Addendum 10.2 au Document de Travail de cette
        Réunion.
