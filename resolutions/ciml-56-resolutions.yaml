    number: 2021/04
  doi: 10.63493/resolutions/ciml202104
  urn: urn:oiml:doc:ciml:resolution:2021-04
  agenda_item: '04'
  dates:
  - date: '2021-10-19'
    type: decided
  localizations:
  - language_code: eng
    title: Agenda item 4.2
    considerations:
    - type: recalling
      date_effective:
        date: '2021-10-19'
        type: effective
      message: Recalling its resolution 2020/1,
    - type: noting
      date_effective:
        date: '2021-10-19'
        type: effective
      message: Noting that all OIML meetings can be held with in-person participation,
        or with solely online participation, or with a combination of in-person and
        online participation,
    actions:
    - type: decides
      date_effective:
        date: '2021-10-19'
        type: effective
      message: Decides that in-person and online participation in all OIML meetings
        is considered to be equivalent, and
    - type: requests
      date_effective:
        date: '2021-10-19'
        type: effective
      message: Requests the 16th Conference to endorse this policy.
  - language_code: fra
    title: Décide que la participation en personne et en ligne à toutes les réunions
      de
    considerations:
    - type: recalling
      date_effective:
        date: '2021-10-22'
        type: effective
      message: Rappelant sa Résolution 2020/1,
    - type: noting
      date_effective:
        date: '2021-10-22'
        type: effective
      message: Notant que toutes les réunions de l'OIML peuvent se tenir avec une
        participation en personne, ou avec une participation uniquement en ligne,
        ou avec une combinaison de participation en personne et en ligne,
    actions:
    - type: decides
      date_effective:
        date: '2021-10-22'
        type: effective
      message: Décide que la participation en personne et en ligne à toutes les réunions
        de l'OIML est considérée comme équivalente, et
    - type: requests
      date_effective:
        date: '2021-10-22'
        type: effective
      message: Demande à la 16ème Conférence d'approuver cette politique.
