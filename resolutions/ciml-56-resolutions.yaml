  - language_code: eng
    title: Agenda item 6
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2021-10-19'
        type: effective
      message: Having regard to section 7.2.2 of OIML B 7:2013 BIML Staff regulations,
        and section 2, first paragraph and section 4, first bullet point, of OIML
        B 13:2004 Procedure for the appointment of the BIML Director and Assistant
        Directors,
    - type: considering
      date_effective:
        date: '2021-10-19'
        type: effective
      message: Considering that the term of appointment of Mr Paul Dixon, BIML Assistant
        Director, expires on 31 December 2022,
    - type: considering
      date_effective:
        date: '2021-10-19'
        type: effective
      message: Considering the proposal made by its President,
    - type: noting
      date_effective:
        date: '2021-10-19'
        type: effective
      message: |-
        Noting the comments made by its Members,
        Expresses its expectation that it will resolve to renew the appointment of Mr Paul Dixon as BIML Assistant Director for a fixed term of up to five years at its meeting in 2022, and
    actions:
    - type: resolves
      date_effective:
        date: '2021-10-19'
        type: effective
      message: Resolves not to appoint the Selection Committee specified in section
        3 of OIML B 13:2004.
  - language_code: fra
    title: Décide de ne pas nommer de comité de sélection spécifié dans la section
      3
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2021-10-22'
        type: effective
      message: Vu la section 7.2.2 de l'OIML B 7:2013 Statuts du Personnel du BIML,
        et la section 2, premier paragraphe et la section 4, premier point, de l'OIML
        B 13:2004 Procédure pour la désignation du Directeur et des Adjoints au Directeur
        du BIML,
    - type: considering
      date_effective:
        date: '2021-10-22'
        type: effective
      message: Considérant que le mandat de M. Paul Dixon, Adjoint au Directeur du
        BIML, expire le 31 décembre 2022,
    - type: considering
      date_effective:
        date: '2021-10-22'
        type: effective
      message: Considérant la proposition faite par son Président,
    - type: noting
      date_effective:
        date: '2021-10-22'
        type: effective
      message: |-
        Prenant note des commentaires de ses Membres,
        Exprime l'espoir qu'elle décidera de renouveler la nomination de M. Paul Dixon en tant qu'Adjoint au Directeur du BIML pour une durée déterminée de cinq ans maximum lors de sa réunion de 2022, et
    actions:
    - type: decides
      date_effective:
        date: '2021-10-22'
        type: effective
      message: Décide de ne pas nommer de comité de sélection spécifié dans la section
        3 de l'OIML B 13:2004.
