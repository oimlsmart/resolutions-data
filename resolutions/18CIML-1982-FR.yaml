      date: '1982-03-24'
      type: effective
    message:
    - spelling: fra
      value: Le Bureau évoque brièvement les liaisons existant entre l'OIML et diverses
        institutions internationales, dont le Système Interaméricain de Métrologie
        (avec lequel la collaboration peut se poursuivre de manière pratique, sans
        qu'un accord officiel soit actuellement nécessaire), l'IMEKO (en particulier
        son TC11 sur les pays en développement), ILAC, la Commission Economique pour
        l'Europe.
