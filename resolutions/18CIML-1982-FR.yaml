      value: L'Assemblée exprime son accord vis-à-vis du document élaboré par le Bureau
        et demande qu'il soit introduit comme annexe au « Mode de Travail » sous réserve
        de quelques améliorations ou corrections suggérées par MM. ISSAEV et EDGERLY
        (en particulier sur la marche à suivre en cas de révision de la Norme de départ).
        De plus, à la demande de M. PODGORSKI, la nécessité qu'il y a à recourir chaque
        fois que possible à des travaux internationaux déjà publiés doit figurer comme
        un principe important au point 5 de ce « Mode de Travail ».
