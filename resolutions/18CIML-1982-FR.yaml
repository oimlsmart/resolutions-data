      type: effective
    message:
    - spelling: fra
      value: Le Comité accepte l'invitation présentée par M. REPSTORFF HOLTVEG de
        tenir sa 19e réunion à Copenhague, les 3, 4 et 5 mai 1983, à l'occasion du
        tricentenaire de la loi danoise sur les poids et mesures.
    - spelling: fra
      value: Le Comité accepte l'invitation présentée par M. KIVALO de tenir la 7e
        Conférence Internationale de Métrologie Légale, et la 20e réunion du Comité,
        à Helsinki en octobre 1984.
