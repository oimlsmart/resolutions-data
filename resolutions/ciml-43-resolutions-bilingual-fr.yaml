  - identifier: CIML/2008/18
    doi: "10.63493/resolutions/ciml200818"
    urn: "urn:oiml:doc:ciml:resolution:2008-18"
    subject: "Conférence OIML"
    title: A Draft OIML Publication approved by the Committee shall be available on the OIML
    dates:
