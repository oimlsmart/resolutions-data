    urn: "urn:oiml:doc:ciml:resolution:2008-21"
    subject: "Conférence OIML"
    title: "Après qu'il ait été mis fin au Système de Certificats dit \"de base\" pour"
    dates:
    - start: '2008-10-28'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Après qu'il ait été mis fin au Système de Certificats dit "de base" pour une catégorie particulière d'instruments, lorsqu'un fabricant requiert une révision (voir la note ci-dessous) d'un Certificat dit "de base" basée sur une même version de la Recommandation de l'OIML qui a été ultérieurement couverte par le MAA, le Certificat dit "de base" révisé peut être délivré par l'Autorité de Délivrance originale, même si elle n'est pas un Participant Emetteur de la Déclaration de Confiance Mutuelle correspondante, ou par un Participant Emetteur de la Déclaration de Confiance Mutuelle.
      dates:
      - start: '2008-10-28'
        kind: effective
