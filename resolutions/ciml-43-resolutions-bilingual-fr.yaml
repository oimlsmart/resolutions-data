      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        A Draft OIML Publication approved by the Committee shall be available on the OIML web site immediately after approval, for reference purposes and in order for manufacturers and OIML Issuing Authorities to begin preparing for issuing Certificates in the future. However it is not permitted to issue an OIML Basic Certificate based on the Draft.
