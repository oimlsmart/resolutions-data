  - identifier: CIML/2008/20
    doi: "10.63493/resolutions/ciml200820"
    urn: "urn:oiml:doc:ciml:resolution:2008-20"
    subject: "Conférence OIML"
    title: "Le Comité soutient l'intention du TC 3/SC 5 de poursuivre les discussions sur l'acceptation"
    dates:
    - start: '2008-10-28'
      kind: decision
    considerations: []
    actions:
    - type: endorses
      message: |
        Le Comité soutient l'intention du TC 3/SC 5 de poursuivre les discussions sur l'acceptation des résultats d'essais des fabricants, avec pour objectif de les inclure dans le champ d'application du MAA si un consensus peut être obtenu sur les conditions applicables aux laboratoires d'essais ISO/CEI 17025 des fabricants.
      dates:
      - start: '2008-10-28'
        kind: effective
