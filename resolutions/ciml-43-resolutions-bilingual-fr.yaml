    - type: notes
      message: |
        The OIML Basic Certificate System and the OIML MAA are maintained in parallel for categories under the MAA until the Committee decides to stop the implementation of the OIML Basic Certificate System. The proposal to stop the OIML Basic Certificate System for a particular category shall be examined, as appropriate, by the Committee independently for each category covered by the MAA. A two-year period (after the Committee decision) shall be allowed before stopping the OIML Basic Certificate System for the relevant category.
      dates:
      - start: '2008-10-28'
        kind: effective
  - identifier: CIML/2008/21
    doi: "10.63493/resolutions/ciml200821"
    urn: "urn:oiml:doc:ciml:resolution:2008-21"
    subject: "Conférence OIML"
    title: After the OIML Basic Certificate System for a particular category of instrument has been
    dates:
    - start: '2008-10-28'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        After the OIML Basic Certificate System for a particular category of instrument has been stopped, when an applicant requests a revision (see the Note below) of an OIML Basic Certificate based on the same version of the OIML Recommendation, which has been subsequently covered by the MAA, the revised OIML Basic Certificate may be issued by the original OIML Issuing Authority even if it is not an Issuing Participant in the relevant DoMC, or by an Issuing Participant in the DoMC.
      dates:
      - start: '2008-10-28'
        kind: effective
