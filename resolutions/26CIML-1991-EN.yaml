    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 2: MEMBER STATES AND CORRESPONDING MEMBERS'
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: Mr ATHANE said that Cameroon was the only Member State that was in arrears
        in its subscriptions to OIML by more than the three years allowed by the Convention.
        However, as Mr NOUMSI had given his assurance that part of the arrears would
        be paid quickly, no measures against that country were called for. Mr ATHANE
        also indicated that he had contacted the Lebanese embassy in Paris to ask
        it to consider its country's position with regard to its membership of OIML.
