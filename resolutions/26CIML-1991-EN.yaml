    value: 'Agenda Item 2: MEMBER STATES AND CORRESPONDING MEMBERS'
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: Mr ATHANE reminded Members that a delegation from the Republic of South
        Africa had visited the Bureau to enquire about joining OIML, but since then
        there had been no further news from them. Iran had asked the bureau on what
        conditions she might rejoin. The Mexican delegation at the General Conference
        on Weights and Measures had indicated that his country was considering the
        possibility of becoming a Member State of OIML (it is currently a Corresponding
        Member); the Argentinean delegation had indicated its country's interest in
        becoming a Corresponding Member.
- identifier:
  - prefix: CIML
