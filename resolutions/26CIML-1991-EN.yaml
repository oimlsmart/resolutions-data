      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: 'Mr BIRKELAND reminded Members that Mr Thulin would retire in September
        1992 and that the Committee would therefore have to appoint his successor.
        Three Member States had put forward four candidates for the post:'
- identifier:
  - prefix: CIML
    number: 1991/4
  doi: 10.63493/resolutions/ciml199104
  urn: urn:oiml:doc:ciml:resolution:1991-04
