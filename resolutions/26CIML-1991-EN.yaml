      type: effective
    message:
    - spelling: eng
      value: Mr ATHANE said that the financial estimates sent out at the end of 1990
        remained current; in particular the rate of inflation in France was still
        slightly below the figure of 3.5 % assumed in the estimates. He added that
        the estimates for 1992 would be sent to CIML Members in about two months and
        that they would be more or less in line with the budget voted by the Conference
        in 1988.
- identifier:
  - prefix: CIML
    number: 1991/4
  doi: 10.63493/resolutions/ciml199104
  urn: urn:oiml:doc:ciml:resolution:1991-04
  agenda_item: '4'
