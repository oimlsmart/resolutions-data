  actions:
  - type: notes
    date_effective:
      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: Mr ATHANE informed the Committee of the general staffing position in
        the Bureau, and in particular of the pending retirement of Mr Emerson in April
        1992; his successor would be appointed later by Mr Birkeland by agreement
        with Mr Athané (since only the nominations of the Director and his Assistants
        were the prerogative of the Committee); the Director had already contacted
        certain English-speaking Member States with a view to seeking candidates.
- identifier:
  - prefix: CIML
    number: 1991/5
  doi: 10.63493/resolutions/ciml199105
  urn: urn:oiml:doc:ciml:resolution:1991-05
