      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: Mr BIRKELAND reminded the Committee that the Bureau had conducted an
        enquiry to find candidates to take responsibility for the secretariats that
        had become vacant following requests by the countries formely responsible
        to divest themselves of those responsibilities.
- identifier:
  - prefix: CIML
    number: 1991/7.2
  doi: 10.63493/resolutions/ciml19917.2
  urn: urn:oiml:doc:ciml:resolution:1991-7.2
  agenda_item: '7.2'
  dates:
  - date: '1991-10-07'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 7.2: Particular secretariats'
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: Mr BIRKELAND reminded Members that the secretariat SP 30-Sr 1 should
        have revised Recommendation R 54 on the pH scales of aqueous solutions to
        align it with the IUPAC Recommendation. However, the Recommendation not having
        yet been so revised despite repeated reminders from the Bureau, the latter
        had been obliged to suspend the work of SP 30-Sr 1. It was noted that it had
        not yet been possible to hold the projected meeting between experts of IUPAC
        and of OIML, and that the experts were not unanimously in favour of IUPAC's
        decisions. The Committee decided to postpone discussion of this matter, in
        particular whether to confirm or cancel R 54, until its next meeting.
- identifier:
  - prefix: CIML
    number: 1991/7
  doi: 10.63493/resolutions/ciml199107
  urn: urn:oiml:doc:ciml:resolution:1991-07
