  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: 'Mr BIRKELAND stressed the importance of this subject for OIML and the
        interest that the OIML System had already aroused among manufacturers of measuring
        instruments, other international institutions, etc. At his request Mr ATHANE
        spoke about what the Bureau had done to promote the System and get it under
        way:'
- identifier:
  - prefix: CIML
    number: 1991/5
  doi: 10.63493/resolutions/ciml199105
  urn: urn:oiml:doc:ciml:resolution:1991-05
  agenda_item: '5'
  dates:
  - date: '1991-10-07'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 5: Certification'
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: 'Mr BIRKELAND pointed out that this item covered in fact two items: Recommendations
        in course of development or of revision to make them suitable for use within
        the System, and the priorities that OIML would have to adopt so that the Recommendations
        to which the application of the system was urgently needed were developed
        or revised quickly.'
- identifier:
  - prefix: CIML
    number: 1991/5
  doi: 10.63493/resolutions/ciml199105
  urn: urn:oiml:doc:ciml:resolution:1991-05
  agenda_item: '5'
  dates:
  - date: '1991-10-07'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 5: Certification'
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: Mr BIRKELAND, continuing the drift of his previous remarks, said that
        many ideas about the future of the System had already been expressed and,
        as no one sought the floor, concluded the discussion with the proposal that
        the Committee acquire another year's experience before proceeding, if necessary,
        to a revision of the System's basic rules. Naturally all the ideas that had
        been expressed orally would be kept by the Bureau as working material for
        the Committee at its next meeting.
- identifier:
  - prefix: CIML
    number: 1991/6
  doi: 10.63493/resolutions/ciml199106
  urn: urn:oiml:doc:ciml:resolution:1991-06
  agenda_item: '6'
  dates:
  - date: '1991-10-07'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 6: PROCEDURES AND STRUCTURES FOR THE TECHNICAL WORK OF OIML'
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: Mr BIRKELAND introduced the third draft of the Procedures for the technical
        work of OIML (part one of the Directives being developed) and made clear his
        intention to allow a wide discussion of the subject because of its extreme
        importance for OIML. The existing working methods were nearly twenty years
        old, and even though they had given a decisive thrust to the work, they had
        shown some deficiencies. Rather than revise them it had appeared to be preferable
        to develop new work procedures, taking into account the developments in common
        in ISO and IEC. Two successive drafts had been developed by the Bureau and
        discussed by the Presidential Council, which had finally asked the Bureau
        to prepare a third draft for discussion at Committee level. As indicated in
        the accompanying explanatory paper, the third draft could, depending on the
        Committee's reaction, either be adopted immediately subject to editorial revision,
        or be revised more fundamentally for resubmission to the Committee for adoption,
        or be rejected by the Committee, in which case it would be necessary to start
        again practically from scratch.
- identifier:
  - prefix: CIML
    number: 1991/6
  doi: 10.63493/resolutions/ciml199106
  urn: urn:oiml:doc:ciml:resolution:1991-06
  agenda_item: '6'
  dates:
  - date: '1991-10-07'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 6: PROCEDURES AND STRUCTURES FOR THE TECHNICAL WORK OF OIML'
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: Mr BIRKELAND indicated that the matter was independent of the Procedures
        and that it had been the subject, at CIML's request, of preparatory work by
        the Bureau, discussions within the Presidential Council, followed by consultation
        of the Members of CIML, before arriving at the final draft submitted to CIML
        for its approval. If CIML's decision was favourable, the Guide could be brought
        into use straight away.
- identifier:
  - prefix: CIML
    number: 1991/6
  doi: 10.63493/resolutions/ciml199106
  urn: urn:oiml:doc:ciml:resolution:1991-06
  agenda_item: '6'
  dates:
  - date: '1991-10-07'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 6: PROCEDURES AND STRUCTURES FOR THE TECHNICAL WORK OF OIML'
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1991-10-07'
      type: effective
    message:
    - spelling: eng
      value: Mr BIRKELAND introduced the Bureau's preliminary proposal for the new
        structures to be established in application of the future procedures, since
        it appeared that CIML was in agreement in principle with the procedures discussed
        under item 6.1. The Bureau's proposal consisted of a list of projects that
        could lead to the drafting of new Recommendations or to the revision of existing
        Recommendations.
