        kind: effective
    - type: noting
      message: |
        Prenant note du rapport du Président du Comité de Gestion provisoire (prMC),
      dates:
      - start: '2017-10-10'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide qu'au 1er janvier 2018 les catégories des instruments de mesure couvertes par l'OIML R 60 et l'OIML R 76 s'inscriront dans le Schéma A de l'OIML-CS et les catégories des instruments de mesure couvertes par l'OIML R 21, l'OIML R 46, l'OIML R 49, l'OIML R 50, l'OIML R 51, l'OIML R 61, l'OIML R 75, l'OIML R 85, l'OIML R 99, l'OIML R 106, l'OIML R 107, l'OIML R 117, l'OIML R 129, l'OIML R 134, l'OIML R 137 et l'OIML 139 s'inscriront dans le Schéma B de l'OIML-CS,
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: decides
      message: |
        Décide que les catégories des instruments de mesure couvertes par l'OIML R 46, l'OIML R 49, l'OIML R 51, l'OIML R 117 et l'OIML R 137 passeront du Schéma B au Schéma A le 1er janvier 2019, et
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: decides
      message: |
        Décide que les catégories des instruments de mesure couvertes par l'OIML R 21, l'OIML R 50, l'OIML R 61, l'OIML R 75, l'OIML R 85, l'OIML R 99, l'OIML R 106, l'OIML R 107, l'OIML R 129, l'OIML R 134 et l'OIML 139 passeront du Schéma B au Schéma A le 1er janvier 2020.
      dates:
      - start: '2017-10-10'
        kind: effective
