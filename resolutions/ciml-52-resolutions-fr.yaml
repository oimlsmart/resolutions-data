  - identifier: CIML/2017/19
    subject: CIML
    title: "Charge le prMC de continuer à prendre les mesures appropriées pour que l'OIML-CS puisse"
    dates:
    - start: '2017-10-10'
      kind: decision
    considerations:
    - type: recalling
      message: |
        Rappelant sa Résolution no. 2016/17,
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: noting
      message: |
        Prenant note du rapport du Président du Comité de Gestion provisoire (prMC),
      dates:
      - start: '2017-10-10'
        kind: effective
    actions:
    - type: charges
      message: |
        Charge le prMC de continuer à prendre les mesures appropriées pour que l'OIML-CS puisse devenir opérationnel le 1er janvier 2018,
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: decides
      message: |
        Décide que le Système de Certificats de Base OIML et l'Accord d'Acceptation Mutuelle OIML cesseront de fonctionner le 31 décembre 2017 et que l'OIML-CS deviendra opérationnel le 1er janvier 2018,
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: decides
      message: |
        Décide de retirer l'OIML B 3:2011 Système de Certificats OIML dit "de Base" pour l'évaluation de type des Instruments de Mesure et l'OIML B 10:2011 (Amd. 2012) Cadre pour un Arrangement d'Acceptation Mutuelle sur les Évaluations de Type OIML au 31 décembre 2017,
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: charges
      message: |
        Charge le BIML de continuer à faire fonctionner les systèmes de Base et MAA jusqu'au 31 décembre 2017, et
        Encourage tous les participants des systèmes de Base et MAA existants à remplir leurs obligations jusqu'au 31 décembre 2017.
      dates:
      - start: '2017-10-10'
        kind: effective
  - identifier: CIML/2017/20
    subject: CIML
    title: "Décide qu'au 1er janvier 2018 les catégories des instruments de mesure couvertes par l'OIML"
    dates:
    - start: '2017-10-10'
      kind: decision
    considerations:
    - type: recalling
      message: |
        Rappelant sa Résolution no. 2017/19,
      dates:
