  - identifier: CIML/2017/17
    subject: CIML
    title: "Demande que toute future proposition d'élaboration, de révision ou de modification des Publications …"
    dates:
    - start: '2017-10-10'
      kind: decision
    considerations:
    - type: noting
      message: |
        Prenant note des discussions du Groupe de Projet sur la révision de l'OIML B 6: 2013. Directives pour les travaux techniques de l'OIML et les recommandations du responsable du Groupe de Projet,
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: noting
      message: |
        Prenant note des commentaires de ses Membres sur la note préparée par le responsable du Groupe de Projet,
        Confirmme que les règles énoncées dans l'OIML B 6 ne s'appliquent à l'élaboration, la révision ou la modification des Publications de Base de l'OIML que si le CIML en décide ainsi pour une Publication de Base spécifique,
      dates:
      - start: '2017-10-10'
        kind: effective
    actions:
    - type: requests
      message: |
        Demande que toute future proposition d'élaboration, de révision ou de modification des Publications de Base de l'OIML prenne la forme d'une proposition de projet soumise à l'approbation du Comité,
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: requests
      message: |
        Demande que de telles propositions établissent clairement
        - Le responsable proposé,
        - les modalités de nomination des membres du Groupe de Projet chargé de superviser l'élaboration,
        - le calendrier de déroulement du projet, qui devrait permettre une consultation en temps voulu par le responsable du projet de l'ensemble du groupe de projet sur toutes les questions de fond, et devrait inclure les différentes étapes de la prise de décision par le Groupe de Projet et par le CIML, et
        - les modalités de vote et d'administration, qui devraient suivre les dispositions du B 6-1 aussi fidèlement que possible.
      dates:
      - start: '2017-10-10'
        kind: effective
