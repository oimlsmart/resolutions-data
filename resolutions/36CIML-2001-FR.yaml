  doi: 10.63493/resolutions/ciml200115
  urn: urn:oiml:doc:ciml:resolution:2001-15
  subject: "(The CIML)"
  title: 1 37ème Réunion du CIML (2002)
  dates:
  - start: '2001-09-25'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. Faber rappelle aux participants qu''à l''occasion de la 35ème réunion,
      une invitation avait été reçue d''Israël. Cependant un certain nombre de pays
      ont indiqué qu''en raison de la situation présente ils ne seraient pas en mesure
      de participer à une réunion en Israël en 2002. M. Faber indique que les Autorités
      israéliennes ont accepté de repousser leur invitation à 2004. Étant donné qu''il
      n''y a pas d''invitation pour 2002 le Comité décide que sa 37ème Réunion se
      tiendra en France aux environs de fin septembre ou début octobre 2002, organisée
      par le BIML sous la supervision du Président du CIML et de son Conseil.

      '
    dates:
    - start: '2001-09-25'
      kind: effective
