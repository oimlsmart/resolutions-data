  doi: 10.63493/resolutions/ciml200108
  urn: urn:oiml:doc:ciml:resolution:2001-08
  subject: "(The CIML)"
  title: 4 Développements ultérieurs dans les méthodes de travail des TC/SC et utilisation
    de moyens de commu…
  dates:
  - start: '2001-09-25'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. Magaña indique que le Bureau est en train de développer un certain
      nombre d''outils et d''activités liés aux technologies de l''information et
      aux moyens électroniques et les mettre le plus possible en application dans
      les travaux de l''OIML. Cela accélèrera les travaux techniques de l''OIML, facilitera
      la participation de tous les Membres à ces travaux, facilitera la préparation
      des réunions (étant entendu que les moyens électroniques ne remplaceront pas
      les réunions) et conduira à des économies en réduisant les coûts liés à la consommation
      de papier, à l''utilisation du téléphone, etc.

      '
    dates:
    - start: '2001-09-25'
      kind: effective
- identifier: CIML/2001/9
  doi: 10.63493/resolutions/ciml200109
  urn: urn:oiml:doc:ciml:resolution:2001-09
  subject: "(The CIML)"
  title: 1 Informations générales
  dates:
  - start: '2001-09-25'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. Kochsiek commence par un rappel de l''établissement du Système onze
      ou douze années auparavant, à un moment où certains Membres du CIML n''étaient
      pas en faveur de sa création et mettaient en question son utilité. Après presque
      dix ans de fonctionnement beaucoup de progrès ont été réalisés et de nombreux
      fabricants dans divers domaines de mesure sont désireux d''utiliser le Système.

      '
    dates:
    - start: '2001-09-25'
      kind: effective
- identifier: CIML/2001/9
  doi: 10.63493/resolutions/ciml200109
  urn: urn:oiml:doc:ciml:resolution:2001-09
  subject: "(The CIML)"
  title: 2 Nouvelles Recommandations applicables au Système
  dates:
  - start: '2001-09-25'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Suite à une proposition de M. Kochsiek, le Comité décide que deux Recommandations
      nouvelle approuvées, à savoir R 16 sur les sphygmomanomètres et R 133 sur les
      thermomètres à liquide en verre deviendront applicables au Système aussitôt
      que publiées.

      '
    dates:
    - start: '2001-09-25'
      kind: effective
- identifier: CIML/2001/9
  doi: 10.63493/resolutions/ciml200109
  urn: urn:oiml:doc:ciml:resolution:2001-09
  subject: "(The CIML)"
  title: 3 Plans pour développement ultérieurs (voir aussi MAA ci-dessous)
  dates:
  - start: '2001-09-25'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. Kochsiek rappelle aux participants que la révision du document sur
      le Système de Certificats OIML pour les Instruments de Mesure a maintenant atteint
      un stade bien avancé et sera très probablement approuvée et publiée en 2002.
      Selon ce document la portée du Système va être étendue dans deux directions:
      (i) la certification de types de modules et (ii) la certification de types de
      familles (d''instruments ou de modules). Ces actions étaient prévues dans le
      Plan d''Action et, si approuvées, augmenteront la charge de travail d''un certain
      nombre de TC/SC avec l''élaboration de formats de rapport d''essai additionnels
      pour les types de modules et les types de familles. De plus la révision des
      règles de fonctionnement du Système va déplacer des responsabilités des Membres
      du CIML vers les Autorités de Délivrance; elle contiendra par ailleurs des dispositions
      nouvelles sur l''identification des types certifiés.

      '
    dates:
    - start: '2001-09-25'
      kind: effective
