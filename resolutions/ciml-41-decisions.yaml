  actions:
  - type: approves
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee approved the Strategy paper and instructed its President
        to finalize it, taking account of comments received. The Bureau would develop
        an Action Plan based on it with a view to having it approved at the 42nd CIML
        Meeting.
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: fra
      value: Le Comité a approuvé le document traitant de la Stratégie et a requis
        de son Président qu'il le finalise en tenant compte des commentaires reçus.
        Le Bureau devra développer un Plan d'Action basé sur ce rapport, en ayant
        pour objectif de le voir approuvé lors de la 42ème Réunion du CIML.
