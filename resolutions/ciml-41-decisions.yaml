    - language_code: eng
      script: Latn
      title: Report on PWGDC activities
      subject: CIML
      actions:
      - type: notes
        message: |
          The Committee took note of a report given by Messrs. Seiler and Dunmill on the activities of the Permanent Working Group on Developing Countries (PWGDC) and expressed its appreciation to Mr. Seiler for his efficient chairmanship.
        dates:
        - start: '2006-10-18'
          kind: effective
      - type: decides
        message: |
          The Committee decided that Mr. Seiler's proposals should be given due consideration and requested that developing country activities be included in the OIML Strategy Paper and also in the Action Plan.
        dates:
        - start: '2006-10-18'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Rapport sur les activités du PWGDC"
      subject: CIML
      actions:
      - type: notes
        message: |
          Le Comité a pris note du rapport établi par MM. Seiler et Dunmill quant aux activités du Groupe Permanent de Travail sur les Pays en Développement (PWGDC), et a exprimé à Mr. Seiler sa gratitude pour l'efficacité de sa présidence.
        dates:
        - start: '2006-10-18'
          kind: effective
      - type: notes
        message: |
          Le Comité a décidé qu'il devait être donné aux propositions de Mr. Seiler toute la considération qui leur est due, et a requis que les activités des Pays en Développement soient incluses dans le document portant sur la Stratégie de l'OIML, de même que dans le Plan d'Action.
        dates:
        - start: '2006-10-18'
          kind: effective
