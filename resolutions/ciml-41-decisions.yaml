    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 3.2: Assets and liabilities as at 01/01/2005 and at 01/01/2006'
  - spelling: fra
    value: 'Agenda Item 3.2: Assets and liabilities as at 01/01/2005 and at 01/01/2006'
  actions:
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of information given by the BIML Director concerning
        the estimation of the assets and liabilities according to the new accountancy
        system laid down by the new Financial Regulations.
    - spelling: fra
      value: Le Comité a pris note de l'information donnée par le Directeur du BIML
        concernant l'estimation des actifs et des passifs, selon le nouveau système
        comptable imposé par le nouveau Règlement Financier.
- identifier:
  - prefix: CIML
    number: 2006/3.3
  doi: 10.63493/resolutions/ciml20063.3
  urn: urn:oiml:doc:ciml:resolution:2006-3.3
  agenda_item: '3.3'
  dates:
  - date: '2006-10-18'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 3.3: Financial report for 2005 and estimates for 2006'
  - spelling: fra
    value: 'Agenda Item 3.3: Financial report for 2005 and estimates for 2006'
  actions:
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a presentation given by the BIML Director
        concerning the 2005 financial period and the estimates for 2006. It noted
        that the 2005 result was better than forecast. In 2006, savings should partially
        compensate the Pension Fund endowment increase.
    - spelling: fra
      value: Le Comité a pris note de la présentation faite par le Directeur du BIML
        relative à l'exercice financier 2005 et les estimations pour 2006. Il a noté
        que les résultats de 2005 ont été meilleurs que ceux prévus. En 2006, des
        économies devraient partiellement compenser l'augmentation de la dotation
        au Fond de Retraite.
    - spelling: fra
      value: Le Comité a chargé le Bureau de préparer les chiffres préliminaires pour
        le budget 2009-2012, en prenant en compte cette dotation. Ces chiffres seront
        discutés lors de la 42ème Réunion du CIML en 2007.
  - type: instructs
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee instructed the Bureau to prepare preliminary figures for
        the 2009-2012 budget taking account of this endowment. These figures would
        require discussion at the 42nd CIML Meeting in 2007.
- identifier:
  - prefix: CIML
    number: 2006/3.4
  doi: 10.63493/resolutions/ciml20063.4
  urn: urn:oiml:doc:ciml:resolution:2006-3.4
  agenda_item: '3.4'
  dates:
  - date: '2006-10-18'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 3.4: Progress on the Pension Scheme'
  - spelling: fra
    value: 'Agenda Item 3.4: Progress on the Pension Scheme'
  actions:
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a report given by the BIML Director concerning
        progress made in the study of the OIML Pension Scheme and instructed its President
        and the BIML Director to continue the study and to compare the OIML Scheme
        to existing systems in similar organizations, coming back with proposals,
        if appropriate, at the 42nd CIML Meeting.
    - spelling: fra
      value: Le Comité a pris note du rapport établi par le Directeur du BIML concernant
        la progression de l'étude du Fond de Retraite de l'OIML. Il a requis de son
        Président et du Directeur du BIML de continuer l'étude et de comparer le Plan
        OIML aux systèmes existants dans des Organisations similaires, afin de proposer
        de nouvelles solutions, si approprié, lors de la 42ème Réunion du CIML.
- identifier:
  - prefix: CIML
    number: 2006/4
  doi: 10.63493/resolutions/ciml200604
