    - spelling: eng
      value: The CIML noted the situation of the Democratic People's Republic of Korea
        and Zambia concerning the payment of their arrears. These two countries had
        changed their status to become Corresponding Members since the 40th CIML Meeting.
    - spelling: fra
      value: Le CIML a pris note de la situation de la République Démocratique Populaire
