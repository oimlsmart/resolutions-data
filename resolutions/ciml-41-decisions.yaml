  actions:
  - type: decides
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: 'The Committee decided that the following categories of measuring instruments
        will become applicable within the OIML Certificate System as soon as published:'
  - type: instructs
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee instructed the Secretariats of TC 8/SC 5 and TC 9/SC 2
        to draw up documents on Certificate transformation requirements for R 49 and
        R 51 (if necessary).
  - type: approves
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: 'The Committee approved the proposal made by the Bureau, that:'
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: fra
      value: 'Le Comité a décidé que les catégories d''instruments de mesure suivantes
        entreront dans le Système de Certificats OIML dès leur publication:'
    - spelling: fra
      value: Le Comité a requis des Secrétariats du TC 8/SC 5 et du TC 9/SC 2 qu'ils
        développent des documents portant sur les Exigences applicables à la transformation
        des Certificats pour la R 49 et la R 51 (si nécessaire).
    - spelling: fra
      value: 'Le Comité a approuvé la proposition faite par le Bureau que:'
