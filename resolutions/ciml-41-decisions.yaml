      title: "Communication, web site"
      subject: CIML
      actions:
      - type: notes
        message: |
          The Committee took note of a presentation given by Mr. Pulham concerning developments in this area and expressed its appreciation to the Bureau.
        dates:
        - start: '2006-10-18'
          kind: effective
      - type: thanks
        message: |
          The Committee expressed its appreciation that interactive Workgroups for technical work were being made available on the OIML web site and encouraged the Secretariats, P-Members, O-Members and Liaisons of all TCs/SCs to make use of them as soon as available.
        dates:
        - start: '2006-10-18'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Communication,site web"
      subject: CIML
      actions:
      - type: notes
        message: |
          Le Comité a pris note de la présentation faite par Mr. Pulham concernant les développements en ce domaine, et a exprimé sa gratitude au Bureau.
        dates:
        - start: '2006-10-18'
          kind: effective
      - type: notes
        message: |
          Le Comité a apprécié que des Groupes de Travail interactifs pour le travail technique aient été rendus disponibles sur le site web OIML, et a encouragé les Secrétariats, les Membres-P, les Membres-O et les Liaisons de tous les TC/SC à en faire usage dès que disponibles.
        dates:
        - start: '2006-10-18'
          kind: effective
      - type: notes
