    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a presentation given by Mrs. Gaucher on the
        implementation of the MAA, and expressed its appreciation for the work carried
        out and on the signature of the two first Declarations of Mutual Confidence
        (DoMCs).
    - spelling: fra
      value: Le Comité a pris note de la présentation faite par Mme Gaucher sur la
        mise en oeuvre du MAA, et a exprimé sa satisfaction pour le travail mené,
        de même que pour la signature des deux premières Déclarations de Confiance
        Mutuelle (DoMCs).
    - spelling: fra
      value: 'Le Comité a approuvé les Résolutions suivantes:'
  - type: approves
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: 'The Committee approved the following Resolutions:'
- identifier:
  - prefix: CIML
    number: 2006/8.4
  doi: 10.63493/resolutions/ciml20068.4
  urn: urn:oiml:doc:ciml:resolution:2006-8.4
  agenda_item: '8.4'
  dates:
  - date: '2006-10-18'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 8.4: Progress on the revision of the Directives'
  - spelling: fra
    value: 'Agenda Item 8.4: Progress on the revision of the Directives'
  actions:
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a presentation given by Mr. Dunmill on progress
        made in the revision of the Directives for Technical Work, and requested the
        Bureau to endeavor to have the Revision of the Directives ready for approval
        at the 43rd CIML Meeting in 2008.
    - spelling: fra
      value: Le Comité a pris note de la présentation faite par Mr. Dunmill sur les
        progrès de la révision des Directives pour le Travail Technique, et a requis
        du Bureau de s'efforcer à avoir cette Révision des Directives prête pour approbation,
        lors de la 43ème Réunion du CIML en 2008.
- identifier:
  - prefix: CIML
    number: 2006/8.5
  doi: 10.63493/resolutions/ciml20068.5
  urn: urn:oiml:doc:ciml:resolution:2006-8.5
  agenda_item: '8.5'
  dates:
  - date: '2006-10-18'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 8.5: Technical activities'
  - spelling: fra
    value: 'Agenda Item 8.5: Technical activities'
  actions:
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of the report given by Mr. Harvey, WG Convenor,
        on the meeting held on 14 October 2006 and instructed the WG to continue its
        work as proposed during the meeting.
    - spelling: fra
      value: Le Comité a pris note du rapport fait par Mr. Harvey, Délégué du Groupe
        de Travail, relatif à la réunion qui s'est tenue le 14 octobre 2006, et a
        requis du Groupe de Travail de continuer son travail ainsi que proposé durant
        la Réunion.
    - spelling: fra
      value: Le Comité a requis du Bureau et du Secrétariat de TC 3 (Contrôle métrologique)
        de revoir l'organisation du travail du TC 3, y compris ses Sous-Comités et
        le Groupe de Travail portant sur la Conformité au Type.
  - type: instructs
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee instructed the Bureau and the TC 3 Secretariat (Metrological
        control) to review the organization of TC 3's work, including that of its
        Subcommittees and the WG on Conformity to type.
