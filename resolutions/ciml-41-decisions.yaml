    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 4: Presidential Council activities'
  - spelling: fra
    value: 'Agenda Item 4: Presidential Council activities'
  actions:
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a report given by Mr. Carstens on the Packaging
        Seminar held on Monday 16 October 2006. It requested the Bureau to make an
        inquiry on Member States' regulatory needs for the quantity in prepackages.
        A subsequent inquiry would concern packers' needs for market access.
    - spelling: fra
      value: Le Comité a pris note du rapport établi par Mr. Carstens sur le Séminaire
        sur les Préemballages qui s'est tenu le lundi 16 octobre 2006. Le Comité requiert
        du Bureau qu'il conduise une enquête sur les besoins des Etats Membres en
        matière de réglementation de la quantité de préemballages. Une enquête ultérieure
        concernera les besoins des emballeurs pour l'accès au marché.
