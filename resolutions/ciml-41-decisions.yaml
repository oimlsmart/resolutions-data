      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a report given by Mr. Dunmill on the activities
        of the Joint Committee for the coordination of technical assistance to Developing
        Countries in Metrology, Accreditation and Standardization (JCDCMAS), the secretariat
        of which was held by the Bureau in 2005.
    - spelling: fra
      value: Le Comité a pris note du rapport présenté par Mr. Dunmill sur les activités
        du Comité commun pour la coordination de l'assistance aux pays en développement
        dans les domaines de la métrologie, de l'accréditation et de la normalisation
        (JCDCMAS) et dont le secrétariat était tenu par le Bureau en 2005.
