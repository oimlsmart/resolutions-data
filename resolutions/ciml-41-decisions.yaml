  doi: 10.63493/resolutions/ciml20069.1
  urn: urn:oiml:doc:ciml:resolution:2006-9.1
  agenda_item: '9.1'
  dates:
  - date: '2006-10-18'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 9.1: Approval of the Procedure for the election of the CIML
      President and Vice-Presidents'
  - spelling: fra
    value: 'Agenda Item 9.1: Approval of the Procedure for the election of the CIML
      President and Vice-Presidents'
  actions:
  - type: approves
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee approved the procedure for the election of the CIML President
        and Vice-Presidents and decided that this procedure shall be applicable for
        the election of the Second Vice-President under Item 9.2 of the Agenda (see
        below). It instructed the Bureau to publish it on the OIML web site.
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: fra
      value: Le Comité a approuvé la procédure pour l'élection du Président et des
        Vice-Présidents du CIML, et a décidé que cette procédure serait applicable
        pour l'élection du second Vice-Président, au Point 9.2 de l'Ordre du Jour
        (voir ci-dessous). Le Comité a requis du Bureau de la publier sur le site
        web de l'OIML.
- identifier:
  - prefix: CIML
    number: 2006/9.2
  doi: 10.63493/resolutions/ciml20069.2
  urn: urn:oiml:doc:ciml:resolution:2006-9.2
  agenda_item: '9.2'
  dates:
  - date: '2006-10-18'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 9.2: Election of the CIML Second Vice-President'
  - spelling: fra
    value: 'Agenda Item 9.2: Election of the CIML Second Vice-President'
  actions:
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee elected Mr. Harvey (Australia) as CIML Second Vice-President.
        He will take over his duties immediately.
    - spelling: fra
      value: Le Comité a élu Mr. Harvey (Australie) Second Vice-Président du CIML.
        La prise de fonction de Mr. Harvey est immédiate.
