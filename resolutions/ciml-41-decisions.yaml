      title: a (Additional item) Report on the Packaging Seminar
      subject: CIML
      actions:
      - type: notes
        message: |
          The Committee took note of a report given by Mr. Carstens on the Packaging Seminar held on Monday 16 October 2006. It requested the Bureau to make an inquiry on Member States' regulatory needs for the quantity in prepackages. A subsequent inquiry would concern packers' needs for market access.
        dates:
        - start: '2006-10-18'
          kind: effective
    - language_code: fra
      script: Latn
      title: "a (Point additionnel) Rapport sur le Séminaire sur les Préemballages"
      subject: CIML
      actions:
      - type: notes
        message: |
          Le Comité a pris note du rapport établi par Mr. Carstens sur le Séminaire sur les Préemballages qui s'est tenu le lundi 16 octobre 2006. Le Comité requiert du Bureau qu'il conduise une enquête sur les besoins des Etats Membres en matière de réglementation de la quantité de préemballages. Une enquête ultérieure concernera les besoins des emballeurs pour l'accès au marché.
        dates:
        - start: '2006-10-18'
          kind: effective
