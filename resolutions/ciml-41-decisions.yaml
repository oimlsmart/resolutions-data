  actions:
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a presentation given by the People's Republic
        of China about the organization of the 42nd CIML Meeting in Shanghai in October
        2007 and thanked the Chinese Government and the Chinese CIML Member for their
        invitation, which was confirmed as accepted by the Committee.
    - spelling: fra
      value: Le Comité a pris note de la présentation faite par la République Populaire
        de Chine en rapport avec l'organisation de la 42ème Réunion du CIML à Shanghai,
        en octobre 2007, et a remercié le Gouvernement chinois et le Membre chinois
        du CIML pour leur invitation, laquelle a été définitivement acceptée par le
        Comité.
