      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: Progress on the Pension Scheme
      subject: CIML
      actions:
      - type: notes
        message: |
          The Committee took note of a report given by the BIML Director concerning progress made in the study of the OIML Pension Scheme and instructed its President and the BIML Director to continue the study and to compare the OIML Scheme to existing systems in similar organizations, coming back with proposals, if appropriate, at the 42nd CIML Meeting.
        dates:
        - start: '2006-10-18'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Progrès concernant le Fond de Retraite"
      subject: CIML
      actions:
      - type: notes
        message: |
          Le Comité a pris note du rapport établi par le Directeur du BIML concernant la progression de l'étude du Fond de Retraite de l'OIML. Il a requis de son Président et du Directeur du BIML de continuer l'étude et de comparer le Plan OIML aux systèmes existants dans des Organisations similaires, afin de proposer de nouvelles solutions, si approprié, lors de la 42ème Réunion du CIML.
        dates:
        - start: '2006-10-18'
          kind: effective
  - identifier: CIML/2006/4
