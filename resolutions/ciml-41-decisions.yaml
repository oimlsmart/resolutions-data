    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 6.1: Presentation by the Bureau on liaison activities'
  - spelling: fra
    value: 'Agenda Item 6.1: Presentation by the Bureau on liaison activities'
  actions:
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a presentation given by the BIML Director
        concerning liaison activities.
    - spelling: fra
      value: Le Comité a pris note de la présentation des activités de liaison donnée
        par le Directeur du BIML.
    - spelling: fra
      value: Le Comité a exprimé son appréciation sur l'ébauche de Plan d'Action commune
        OIML/Convention du Mètre et a requis de son Président et du Directeur du BIML
        de continuer cette coopération, et d'en faire le rapport lors de la 42ème
        Réunion du CIML.
    - spelling: fra
      value: Le Comité a exprimé sa satisfaction quant au projet de Mémorandum d'Entente
        OIML/ILAC et a requis de son Président de la prise en compte des commentaires
        exprimés, en vue d'une signature le plus rapidement possible.
    - spelling: fra
      value: Le Comité a requis du Bureau qu'il résume les commentaires des Membres
        du CIML portant sur le Projet de Révision du Vocabulaire International de
        Métrologie (VIM) et sur les Suppléments au GUM, et de les présenter au Comité
        commun pour les guides en métrologie (JCGM). Le Comité a donné pouvoir au
        Directeur du BIML pour avaler la révision finale du VIM ainsi que les Suppléments
        au GUM lors de la Réunion du JCGM.
  - type: thanks
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee expressed its appreciation of the draft OIML/Metre Convention
        joint Action Plan and instructed its President and the BIML Director to continue
        this cooperation, and to report back at the 42nd CIML Meeting.
    - spelling: eng
      value: The Committee expressed its appreciation of the OIML/ILAC draft Memorandum
        of Understanding and instructed its President to take account of the comments
        expressed with a view to signing it as soon as possible.
  - type: instructs
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee instructed the Bureau to summarize CIML Members' comments
        on the Draft revision of the International Vocabulary of Metrology (VIM) and
        on the Supplements to the GUM, and to present them to the Joint Committee
        on Guides on Metrology (JCGM). The Committee empowered the BIML Director to
        endorse the final revision of the VIM and the Supplements to the GUM at the
        JCGM Meeting.
