    title: 'Agenda Item 3.2: Assets and liabilities as at 01/01/2005 and at 01/01/2006'
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of information given by the BIML Director
        concerning the estimation of the assets and liabilities according to the new
        accountancy system laid down by the new Financial Regulations.

        '
      date_effective:
        date: '2006-10-18'
        type: effective
  - language_code: fra
    title: 'Agenda Item 3.2: Assets and liabilities as at 01/01/2005 and at 01/01/2006'
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note de l''information donnée par le Directeur du
        BIML concernant l''estimation des actifs et des passifs, selon le nouveau
        système comptable imposé par le nouveau Règlement Financier.

        '
      date_effective:
        date: '2006-10-18'
        type: effective
  agenda_item: '3.2'
- identifier:
  - prefix: CIML
    number: 2006/3.3
  doi: 10.63493/resolutions/ciml20063.3
  urn: urn:oiml:doc:ciml:resolution:2006-3.3
  dates:
  - date: '2006-10-18'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 3.3: Financial report for 2005 and estimates for 2006'
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of a presentation given by the BIML Director
        concerning the 2005 financial period and the estimates for 2006. It noted
        that the 2005 result was better than forecast. In 2006, savings should partially
        compensate the Pension Fund endowment increase.

        '
      date_effective:
        date: '2006-10-18'
        type: effective
    - type: instructs
      message: 'The Committee instructed the Bureau to prepare preliminary figures
        for the 2009-2012 budget taking account of this endowment. These figures would
        require discussion at the 42nd CIML Meeting in 2007.

        '
      date_effective:
        date: '2006-10-18'
        type: effective
  - language_code: fra
    title: 'Agenda Item 3.3: Financial report for 2005 and estimates for 2006'
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note de la présentation faite par le Directeur du
        BIML relative à l''exercice financier 2005 et les estimations pour 2006. Il
        a noté que les résultats de 2005 ont été meilleurs que ceux prévus. En 2006,
        des économies devraient partiellement compenser l''augmentation de la dotation
        au Fond de Retraite.

        '
      date_effective:
        date: '2006-10-18'
        type: effective
    - type: notes
      message: 'Le Comité a chargé le Bureau de préparer les chiffres préliminaires
        pour le budget 2009-2012, en prenant en compte cette dotation. Ces chiffres
        seront discutés lors de la 42ème Réunion du CIML en 2007.

        '
      date_effective:
        date: '2006-10-18'
        type: effective
  agenda_item: '3.3'
- identifier:
  - prefix: CIML
