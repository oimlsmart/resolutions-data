    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 9.3: Appointment of a new Assistant Director'
  - spelling: fra
    value: 'Agenda Item 9.3: Appointment of a new Assistant Director'
  actions:
  - type: notes
    date_effective:
      date: '2006-10-18'
      type: effective
    message:
    - spelling: eng
      value: On the proposal of the CIML President, the Committee appointed Mr. Willem
        Kool as BIML Assistant Director. This position had become vacant due to the
        retirement of Mr. Szilvassy in 2007.
    - spelling: fra
      value: Sur la proposition du Président du CIML, le Comité a désigné Mr. Willem
        Kool en tant qu'Adjoint au Directeur du BIML. Le départ à la retraite en 2007
        de Mr. Szilvássy rendant cette position vacante.
