        Le Comité élit Mr. Peter Mason (Grande-Bretagne) Président du CIML pour un mandat de 6 ans.
        Conformément aux règles définies dans la publication OIML B 14, celui-ci prendra ses fonctions à l'ouverture de la 46ème Réunion du CIML en 2011.
      dates:
      - start: '2010-09-21'
        kind: effective
