  - identifier: CIML/2010/18
    subject: "Conférence OIML"
    title: "Demande au Secrétariat de l'OIML TC 3/SC 2 de préparer un nouveau Projet de"
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations:
    - type: noting
      message: |
        Prenant note que le Projet de Révision du OIML D 16 Principes d'assurance du contrôle métrologique a été soumis à un vote en ligne par le CIML, mais que celui-ci n'a pas recueilli suffisamment de suffrages pour être approuvé,
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: considering
      message: |
        Considérant les commentaires exprimés par les Pays-Bas et la Norvège,
      dates:
      - start: '2010-09-21'
        kind: effective
    actions:
    - type: requests
      message: |
        Demande au Secrétariat de l'OIML TC 3/SC 2 de préparer un nouveau Projet de Révision du D 16 avec l'aide des Pays-Bas et de la Norvège ; et
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: charges
      message: |
        Charge le Bureau de soumettre ce Projet de Révision modifié à l'approbation directe en ligne par le CIML.
      dates:
      - start: '2010-09-21'
        kind: effective
  - identifier: CIML/2010/19
    subject: CIML
    title: "Décide qu'une telle prise de décision concernant les propositions doit être reportée à la"
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations:
    - type: considering
      message: |
        Considérant les propositions émises par le Membre Australien en faveur de la création d'un nouveau projet et d'un nouveau (Sous-) Comité sur la Conformité au Type (CTT), et
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: considering
      message: |
        Considérant les commentaires formulés lors de la consultation des membres du Conseil de la Présidence, lors de la consultation ultérieure de l'ensemble des Membres du CIML ainsi que des Organisations en liaison concernées,
      dates:
      - start: '2010-09-21'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide qu'une telle prise de décision concernant les propositions doit être reportée à la publication des conclusions du séminaire sur la CTT, cité à la Résolution n° 15 ; et
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: charges
      message: |
        Charge le Bureau de faciliter la mise en place d'un groupe de travail électronique, présidé par le Membre Néo-zélandais, en lui fixant pour objectif l'élaboration du programme de ce séminaire, en tenant compte des questions soulevées et des commentaires exprimés.
      dates:
      - start: '2010-09-21'
        kind: effective
