  - identifier: CIML/2010/11
    subject: "Conférence OIML"
    title: "Décide qu'après l'élection du Vice-Président au cours de la présente réunion, le CIML décidera"
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations:
    - type: considering
      message: |
        Considérant que l'Article XV de la Convention prévoit l'élection d'un Président, d'un premier Vice-Président et d'un second Vice-Président et que, dans l'éventualité où le Président est absent ou se trouve dans l'incapacité d'exercer ses fonctions, le premier Vice-Président doit assurer temporairement la Présidence, et
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: considering
      message: |
        Considérant que l'Article XV ne prévoit pas que le premier Vice-Président démissionne ou que son mandat expire avant celui du deuxième Vice-Président,
      dates:
      - start: '2010-09-21'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide qu'après l'élection du Vice-Président au cours de la présente réunion, le CIML décidera lequel des deux Vice-Présidents sera le premier Vice-Président ; et
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: charges
      message: |
        Charge le Président du CIML de préparer une proposition à soumettre à la 14ème Conférence en 2012, sur l'interprétation de l'Article XV dans l'éventualité où la fonction de premier Vice-Président devient vacante et si le Président se trouve dans l'incapacité d'exercer ses fonctions.
      dates:
      - start: '2010-09-21'
        kind: effective
