        - { content: "Le Comité a exprimé son appréciation pour la bonne coopération entre le Conseil de la Présidence et le Bureau du CIPM ainsi qu'entre le BIML et le BIPM.", lang: fr }
      dates:
      - start: '2009-10-27'
        kind: effective
    - type: requests
      message:
        - { content: "Le Comité a demandé au Directeur du Bureau de préparer un projet de rapport sur le rapprochement, de manière à informer les Etats Membres des deux Organisations sur ce sujet et afin d'encourager davantage de discussion durant la 45ème Réunion du CIML. Ce rapport doit être principalement de nature stratégique et doit prendre en compte le point de vue des parties prenantes des deux Organisations, tout comme tenir compte des commentaires reçus de la part des Membres du CIML.\nCe rapport sera discuté avec le Directeur du BIPM.\nLe Comité recommande que ce rapport soit adressé par les deux Directeurs à tous les Etats Membres.", lang: fr }
