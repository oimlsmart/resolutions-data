  - identifier: CIML/2009/25
    language: fr
    title:
      - { content: "Le Comité a noté que: - l'importance croissante des aliments et boissons préemballés dans", lang: fr }
    subject:
      - { content: "Conférence OIML", lang: fr }
    doi: "10.63493/resolutions/ciml200925"
    urn: "urn:oiml:doc:ciml:resolution:2009-25"
    dates:
    - start: '2009-10-27'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message:
        - { content: "Le Comité a noté que:\n- l'importance croissante des aliments et boissons préemballés dans le commerce mondial constitue actuellement plus de 75 % des exportations agro-alimentaires;\n- les exportations des pays en développement sont particulièrement désavantagées d'avoir à être conformes à une multiplicité d'exigences internationales; et\n- la revue de l'ancienne OIML R 79 émanant de l'Accord du Groupe Mondial du Commerce du Vin et le Séminaire OIML 2006 sur les préemballés n'ont pas abouti à une dispense d'étiquetage pour le vin.\nLe Comité a recommandé que les Membres du CIML portent cette Résolution à l'attention de leur point d'information national OMC-OTC.", lang: fr }
      dates:
      - start: '2009-10-27'
        kind: effective