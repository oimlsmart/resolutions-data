    language: fr
    title:
      - { content: "Le Comité a noté que le résultat de la revue périodique du TC 8", lang: fr }
    subject:
      - { content: "Conférence OIML", lang: fr }
    doi: "10.63493/resolutions/ciml200920"
    urn: "urn:oiml:doc:ciml:resolution:2009-20"
    dates:
    - start: '2009-10-27'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message:
        - { content: "Le Comité a noté que le résultat de la revue périodique du TC 8 portant sur la confirmation, la révision ou le retrait des publications suivantes:\n- R 120 Mesures de capacité étalons pour l'essai des ensembles de mesurage de liquides autres que l'eau;\nD 25 Compteurs à vortex utilisés dans les ensembles de mesurage de fluides; et\nD 26 Mesures en verre à délivrer - Pipettes automatiques\nn'était pas concluant, mais que pour chacune d'entre elles, une majorité de Membres-P était favorable au maintien de ces publications.\nLe Comité a également noté que nombre de références dans ces publications ne sont plus à jour et que cela était la raison pour laquelle certains Membres-P avaient voté pour une révision de ces publications.\nAussi, le Comité:\n- a requis du Secrétariat du TC 8 de soumettre au Bureau les listes des références de ces publications mises à jour; et\n- a instruit le Bureau de publier ces listes de références mises à jour ainsi que les versions mises à jour de ces publications.", lang: fr }
      dates:
      - start: '2009-10-27'
        kind: effective
