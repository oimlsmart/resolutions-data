    value: 'Agenda Item 10: DATE ET LIEU DE LA PROCHAINE RÉUNION'
  actions:
  - type: notes
    date_effective:
      date: '1992-11-02'
      type: effective
    message:
    - spelling: fra
      value: Le Comité a approuvé le compte rendu de sa vingt-sixième réunion sans
        modifications.
    - spelling: fra
      value: Le Comité a approuvé le rapport comptable pour 1991 et a chargé le Président
        du CIML et le Directeur du BIML de soumettre ce rapport à la Neuvième Conférence.
    - spelling: fra
      value: Le Comité a également pris note d'informations du BIML sur la situation
        financière de l'Organisation.
    - spelling: fra
      value: Le Comité a été informé d'une demande de la Russie d'être placée dans
        une classe de contribution inférieure à celle que lui assigne sa population;
        le Comité a décidé que cette demande ne pouvait être examinée immédiatement
        et a demandé que, si approprié, la délégation de Russie présente officiellement
        cette demande en temps utile pour examen par le Comité à sa prochaine réunion.
    - spelling: fra
      value: Le Comité a donné son accord aux propositions du Président du CIML sur
        l'organisation, la présidence et l'ordre du jour de la Neuvième Conférence.
    - spelling: fra
      value: Le Comité a pris note des résultats de l'enquête par correspondance relative
        au projet susmentionné et de la décision du Président de considérer ce projet
        comme approuvé et de charger un groupe ad hoc et le BIML de l'examen final
        de ce texte avant sa publication.
