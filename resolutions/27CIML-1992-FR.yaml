      FINANCIÈRES'
  actions:
  - type: notes
    date_effective:
      date: '1992-11-02'
      type: effective
    message:
    - spelling: fra
      value: Le rapport comptable pour 1991 est adopté sans commentaires et le Comité
        charge son Président et le Directeur du Bureau de le présenter à la Neuvière
        Conférence. M. ATHANÉ ajoute que de nombreux États Membres qui, au début de
        l'année 1992, étaient en retard dans le paiement de leur contribution, se
        sont mis partiellement ou totalement à jour, ce qui a amélioré la situation
        financière de l'OIML qui était très mauvaise à la fin de 1991.
