        date: '1992-11-02'
        type: effective
    - type: notes
      message: 'Le Comité a été informé d''une demande de la Russie d''être placée
        dans une classe de contribution inférieure à celle que lui assigne sa population;
        le Comité a décidé que cette demande ne pouvait être examinée immédiatement
        et a demandé que, si approprié, la délégation de Russie présente officiellement
        cette demande en temps utile pour examen par le Comité à sa prochaine réunion.

        '
      date_effective:
        date: '1992-11-02'
        type: effective
    - type: notes
      message: 'Le Comité a donné son accord aux propositions du Président du CIML
        sur l''organisation, la présidence et l''ordre du jour de la Neuvième Conférence.

        '
      date_effective:
        date: '1992-11-02'
        type: effective
    - type: notes
      message: 'Le Comité a pris note des résultats de l''enquête par correspondance
        relative au projet susmentionné et de la décision du Président de considérer
        ce projet comme approuvé et de charger un groupe ad hoc et le BIML de l''examen
        final de ce texte avant sa publication.

        '
      date_effective:
        date: '1992-11-02'
        type: effective
