    message:
    - spelling: fra
      value: Le Comité a vérifié qu'au moins dix États Membres (y compris l'Etat Membre
        responsable du secrétariat) s'étaient enregistrés comme Membres-P.
    - spelling: fra
      value: 'Le Comité a repoussé à une date ultérieure l''attribution du secrétariat
        des comités techniques suivants:'
    - spelling: fra
      value: Le Comité a noté qu'aucune nouvelle Recommandation ne pouvait à présent
        devenir applicable au Système de Certification OIML; il a demandé aux groupes
        de travail OIML concernés d'accélérer leurs travaux, de telle manière que
        le plus grand nombre possible de Recommandations puissent devenir applicables
        dans les deux ou trois prochaines années.
    - spelling: fra
      value: 'Le Comité a adopté la Résolution suivante:'
    - spelling: fra
      value: Le Comité International de Métrologie Légale
    - spelling: fra
      value: Le Comité a passé en revue les divers décisions de la Neuvième Conférence
        et a demandé à son Président de superviser leur mise en application par l'intermédiaire
        du Conseil de la Présidence et du Bureau et de présenter un rapport à ce sujet
        à la prochaine réunion du CIML.
    - spelling: fra
      value: Le Comité a pris note du rapport d'activité du BIML d'octobre 1991 à
        octobre 1992.
    - spelling: fra
      value: Le Comité a décidé de reporter la discussion sur ce sujet et de charger
        le TC 1 de son examen.
    - spelling: fra
      value: Le Comité a décidé de tenir sa vingt-huitième réunion à Berlin, à la
        suite de l'invitation du Vice-Président du CIML, Professeur M. Kochsiek, Allemagne.
        La réunion se tiendra en octobre 1993 à une date qui sera fixée aussi rapidement
        que possible par le Membre du CIML Allemand et le BIML.
