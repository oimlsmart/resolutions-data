    title: 'Agenda Item 4: STRUCTURES ET PROCEDURES POUR LES TRAVAUX TECHNIQUES DE
      L''OIML'
    considerations: []
    actions:
    - type: notes
      message: 'M. BIRKELAND introduit ce point en indiquant qu''il doit être considéré
        comme l''aboutissement de plusieurs années d''efforts visant à moderniser
        les méthodes de travail de l''OIML et à éliminer certaines faiblesses qui
        sont apparues dans l''ancien mode de travail. C''est également une occasion
        de revoir les priorités de travail de l''Organisation, c''est-à-dire les finalités
        profondes de l''OIML.

        '
