  title:
  - spelling: fra
    value: 'Agenda Item 5: CERTIFICATION: RECOMMANDATIONS APPLICABLES AU SYSTEME DE
      CERTIFICATS'
  actions:
  - type: notes
    date_effective:
      date: '1992-11-02'
      type: effective
    message:
    - spelling: fra
      value: 'M. ATHANÉ rappelle que le Comité peut décider qu''une Recommandation
        s''applique au Système de Certificats OIML pour les Instruments de Mesure
        si elle contient les éléments suivants: 1) des exigences métrologiques, 2)
        des méthodes d''essai, et 3) un modèle de rapport d''essai. Il indique qu''actuellement
        aucune nouvelle Recommandation ne répond à ces trois critères; en conséquence,
        seuls les poids, les instruments de pesage à fonctionnement non automatique,
        les mesures de longueur à traits de haute précision et les baromètres peuvent
        faire l''objet de certificats OIML. Cependant, un certain nombre de secrétariats
        OIML travaillent actuellement à compléter les Recommandations déjà existantes
        ou à développer de nouvelles Recommandations en vue de leur application au
        Système.'
