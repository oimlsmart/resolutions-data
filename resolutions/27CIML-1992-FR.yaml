    - type: notes
      message: 'Le Comité a approuvé le rapport comptable pour 1991 et a chargé le
        Président du CIML et le Directeur du BIML de soumettre ce rapport à la Neuvième
        Conférence.

        '
      date_effective:
        date: '1992-11-02'
        type: effective
