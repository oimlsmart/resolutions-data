        Encourage le BIML à poursuivre ses efforts pour recouvrer les arriérés de ses États Membres et de ses Membres Correspondants, et
      date_effective:
        date: '2022-10-18'
        type: effective
    - type: requests
      message: 'Demande aux Membres ayant des arriérés de paiement de mettre à jour
        leur situation dans les meilleurs délais.

        '
      date_effective:
        date: '2022-10-18'
        type: effective
