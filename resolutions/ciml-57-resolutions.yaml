  urn: urn:oiml:doc:ciml:resolution:2022-05
  dates:
  - date: '2022-10-18'
    type: decided
  agenda_item: '5'
  localizations:
  - language_code: eng
    title: Agenda item 5
    subject: CIML
    considerations:
    - type: noting
      message: 'Noting the procedure for the election of CIML Vice-Presidents in OIML
        B 14:2013 Procedure for the election of the CIML President and Vice-Presidents,

        '
      date_effective:
        date: '2022-10-18'
        type: effective
    - type: considering
      message: 'Considering the appointment of the CIML Second Vice-President as CIML
        President with effect from the 58th CIML Meeting planned for 2023, and therefore
        the need to elect a new CIML Second Vice President,

        '
      date_effective:
        date: '2022-10-18'
        type: effective
    - type: considering
      message: 'Considering that the CIML First Vice-President''s term of office comes
        to an end at the 59th CIML Meeting in 2024,

        '
      date_effective:
        date: '2022-10-18'
        type: effective
    actions:
    - type: instructs
      message: 'Instructs the Bureau to circulate a call for candidates for the position
        of CIML Second Vice-President with a deadline of 31 May 2023, with a view
        to the CIML appointing a CIML Second Vice-President at the 58th CIML Meeting
        planned for 2023, with effect from that meeting,

        '
      date_effective:
        date: '2022-10-18'
        type: effective
    - type: instructs
      message: 'Instructs the Bureau to circulate a call for candidates for the position
        of CIML First Vice-President with a deadline of 31 May 2023, with a view to
        the CIML appointing a CIML First Vice-President at the 58th CIML Meeting planned
        in 2023, with effect from the 59th CIML Meeting planned for 2024.

        '
      date_effective:
        date: '2022-10-18'
        type: effective
  - language_code: fra
    title: Point 5 de l'ordre du jour
    subject: CIML
    considerations:
    - type: noting
      message: 'Prenant note de la procédure d''élection des Vice-Présidents du CIML
        dans l''OIML B 14:2013 Procédure pour l''élection du Président et des Vice-Présidents
        du CIML,

        '
      date_effective:
        date: '2022-10-18'
        type: effective
    - type: considering
      message: 'Considérant la nomination du Deuxième Vice-président du CIML en tant
        que Président du CIML à compter de la 58ème Réunion du CIML prévue en 2023,
        et donc la nécessité d''élire un nouveau Deuxième Vice-président du CIML,

        '
      date_effective:
        date: '2022-10-18'
        type: effective
    - type: considering
      message: 'Considérant que le mandat du Premier Vice-président du CIML prend
        fin lors de la 59ème Réunion du CIML en 2024,

        '
      date_effective:
        date: '2022-10-18'
        type: effective
    actions:
    - type: charges
      message: 'Charge le Bureau de diffuser un appel à candidatures pour le poste
        de Deuxième Vice-président du CIML avec une date limite fixée au 31 mai 2023,
        afin que le CIML désigne un Deuxième Vice-président du CIML lors de la 58ème
        Réunion du CIML prévue en 2023, avec effet à partir de cette réunion,

        '
      date_effective:
        date: '2022-10-18'
        type: effective
    - type: charges
      message: 'Charge le Bureau de diffuser un appel à candidatures pour le poste
        de Premier Vice-président du CIML avec une date limite fixée au 31 mai 2023,
        en vue de la nomination par le CIML d''un Premier Vice-président du CIML lors
        de la 58ème Réunion du CIML prévue en 2023, avec effet à partir de la 59ème
        Réunion du CIML prévue en 2024.

        '
      date_effective:
        date: '2022-10-18'
        type: effective
