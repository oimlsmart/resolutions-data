    - type: considering
      message: |
        Considérant la proposition faite par son Président,
        Exprime l'espoir qu'elle décidera de renouveler la nomination de M. Anthony Donnellan en tant que Directeur du BIML pour un mandat fixe de cinq ans maximum lors de sa réunion en 2023, et
