- identifier:
  - prefix: Conference
    number: 2025/07
  doi: 10.63493/resolutions/conf202507
  urn: urn:oiml:doc:conf:resolution:17.07
  agenda_item: '9.1'
  dates:
  - date: '2025-10-14'
    type: decided
  title:
  - spelling: eng
    value: Member State and Corresponding Member classes and fees
  subject:
  - spelling: eng
    value: OIML Conference
  considerations:
  - type: having_regard_to
    date_effective:
      date: '2025-10-14'
      type: effective
    message:
    - spelling: eng
      value: Having regard to Article XXIV, first paragraph, Article XXVI (1), and
        Article XXVIII, second paragraph, of OIML B 1:1968 OIML Convention,
  - type: noting
    date_effective:
      date: '2025-10-14'
      type: effective
    message:
    - spelling: eng
      value: Noting Resolution 2012/08 of the 14th OIML Conference, which states that
        changes in the classification of Member States take place from the second
        year of the following financial period,
    - spelling: eng
      value: Noting the information contained in Resolution Conference/2025/06 of
        the 17th Conference,
    - spelling: eng
      value: Noting Resolutions CIML/2025/10 and CIML/2025/11 of the 60th CIML Meeting,
  - type: considering
    date_effective:
      date: '2025-10-14'
      type: effective
    message:
    - spelling: eng
      value: Considering that the total number of base contributory shares, taking
        into account the classification of Member States as reviewed in 2025, is 150
        for the year 2026 and 161 for the years 2027, 2028 and 2029,
  actions:
  - type: resolves
    date_effective:
      date: '2025-10-14'
      type: effective
    message:
    - spelling: eng
      value: |-
        Resolves:
        a) The overall amount of credits necessary for the 2026-2029 financial period shall be €12209489;
        b) The base contributory share (annual contribution for a Member State in Class 1 as defined in Article XXVI (1) of B 1:1968 OIML Convention) shall be €14 800 in each year of the 2026- 2029 financial period.
        c) This results in the following annual contributions for the financial period 2026-2029, for Member States classified according to Article XXVI (1) of B 1:1968 OIML Convention:
        |===
        | Class | 2026 | 2027 | 2028 | 2029
        | 1 | €14800 | €14800 | €14800 | €14800
        | 2 | €29600 | €29600 | €29600 | €29600
        | 3 | €59200 | €59200 | €59200 | €59200
        | 4 | €118400 | €118400 | €118400 | €118400
        |===
        d) This results in the following annual contributions for the financial period 2026-2029, for Corresponding Members classified using the same criteria as for Member States:
        |===
        | Class | 2026 | 2027 | 2028 | 2029
        | 1 | €3890 | €5365 | €7400 | €7400
        | 2 | €7780 | €10730 | €14800 | €14800
        | 3 | €15560 | €21460 | €29600 | €29600
        | 4 | €31120 | €42920 | €59200 | €59200
        |===
        e) For the 2026-2029 financial period, newly admitted or readmitted Member States shall not pay an entry fee.
