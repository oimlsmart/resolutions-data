      | TC 3/p 5 | Révision de la R 42 Poinçons de métal pour agents de vérification | TC 3/SC 1/p 1
      | TC 3/SC 1/p 2 | Révision du D 20 Vérifications primitive et ultérieure des instruments et processus de mesure | TC 3/SC 1/p 1
      | TC 6/p 4 | Méthodes de détermination de la quantité de produit dans les préembalages | TC 6/p 3
      | TC 10/SC 2/p 3 | Révision de la R 109 Manomètres et vacuomètres à élément récepteur elastique (instrument étalons) | TC 10/SC 2/p 2
      | TC 16/SC 4/p 2 | Spectromètres infrarouge à transformée de Fourier FTIR pour le mesurage des polluants atmosphériques | TC 16/SC 4/p 3
      | TC 17/SC 7/p 2 | Procédures d&#x27;essai et format du rapport d&#x27;essai pour l&#x27;evaluation d&#x27;éthylomètres portables utilisés en plein air | TC 17/SC 7/p 1
      | TC 18/SC 4/p 2 | Électrocardioscopes – caractéristiques métrologiques - méthodes et moyens de vérification | TC 18/SC 4/p 4
      |===
      |===
      | TC 18/SC 4/p 3 | Électrocradioscopes et électrocardiographes numériques-caractéristiques métrologiques-méthodes et moyens de vérification | TC 18/SC 4/p 4
      | TC 18/SC 4/p 5 | Electrocardiographes à analyse. Exigences métrologiques.Méthodes et moyens de vérification | TC 18/SC 4/p 4
      |===
      (b) Projets à renommer :
