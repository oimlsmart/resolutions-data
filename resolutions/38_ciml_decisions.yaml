      value: The Committee took note that the draft revision of the BIML Staff Regulations
        would be implemented without resulting in an increase in salary costs. The
        Committee approved the revision of the BIML Staff Regulations, which will
        come into force on 2004.01.01.
    - spelling: fra
      value: Le Comité a pris note que la mise en application du projet de révision
        des Statuts du Personnel du BIML n'induirait pas d'augmentation des coûts
        salariaux. Le Comité a approuvé la révision des Statuts du Personnel du BIML,
        qui entreront en vigueur le 2004.01.01.
