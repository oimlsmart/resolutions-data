  title:
  - spelling: eng
    value: 'Agenda Item 12.1: Révision des Directives pour les Travaux Techniques'
  - spelling: fra
    value: 'Agenda Item 12.1: Révision des Directives pour les Travaux Techniques'
  actions:
  - type: notes
    date_effective:
      date: '2003-11-05'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of information given by the BIML on the draft
        Revision of the Directives and instructed the BIML to set up an ad-hoc Committee
        to continue the Revision of these Directives with a view to simplifying the
        procedures, accelerating the development and revision of Recommendations and
        Documents, and taking account of the requirements of the WTO-TBT Committee
        on international standard-setting activities. This Revision will be submitted
        to the CIML for approval as soon as possible.
    - spelling: fra
      value: Le Comité a pris note d'informations données par le BIML sur le Projet
        de Révision des Directives et a chargé celui de former un Comité ad hoc afin
        de poursuivre la Révision de ces Directives en vue de simplifier les procédures,
        d'accélérer l'élaboration et la révision des Recommandations et Documents,
        et de tenir compte des exigences du Comité de l'OMC sur les barrières techniques
        au commerce dans les activités d'élaboration de normes au niveau international.
        Cette Révision devra être soumise à l'approbation du CIML dès que possible.
