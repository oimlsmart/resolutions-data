      value: The Committee took note of the intention of Mr. Carstens (CIML Member
        for South Africa) to hold the $ 4 1 ^{ \mathrm{st}} $ CIML Meeting in South
        Africa. This invitation would be confirmed in due course.
    - spelling: fra
      value: Le Comité a pris note de l'intention de M. Carstens (Membre du CIML pour
        l'Afrique du Sud) de tenir la 41ème Réunion du CIML en Afrique du Sud. Cette
        invitation devra être confirmée en temps utile.
