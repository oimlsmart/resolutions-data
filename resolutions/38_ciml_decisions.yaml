  actions:
  - type: notes
    date_effective:
      date: '2003-11-05'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of information delivered by Vice-President Mr.
        Issaev and by the Bureau concerning OIML technical activities and, while expressing
        its satisfaction with the increased volume of work accomplished during the
        last 12 months (compared with the previous one-year period), requested OIML
        TCs and SCs to accelerate their work, especially in the fields listed as high
        priority and priority projects, taking into consideration proposals to accelerate
        OIML technical work as discussed under Item 9.3.
    - spelling: fra
      value: Le Comité a pris note d'informations fournies par le Vice Président M.
        Issaev et par le Bureau en ce qui concerne les activités techniques de l'OIML
        et, tout en exprimant sa satisfaction pour la quantité croissante de travail
        accompli durant les 12 derniers mois (par rapport à la période annuelle précédente),
        a demandé aux TC et SC de l'OIML d'accélérer leurs travaux, en particulier
        dans les domaines signalés comme projets prioritaires et ceux de haute priorité,
        en prenant en compte les propositions pour accélérer les travaux techniques
        de l'OIML comme traité au Point 9.3.
    - spelling: fra
      value: Le Comité a approuvé le projet tel que proposé par le TC 18 sur les Instruments
        pour l'ophtalmologie - Tonomètre à empreinte et à applanation.
  - type: approves
    date_effective:
      date: '2003-11-05'
      type: effective
    message:
    - spelling: eng
      value: The Committee approved the project as proposed by TC 18 on Ophthalmic
        instruments - Impression and applanation tonometer.
