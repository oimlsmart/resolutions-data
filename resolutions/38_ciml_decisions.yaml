      type: effective
    message:
    - spelling: eng
      value: The Committee also decided that the revised R 61-1 and R 61-2 will continue
        to be applicable within the System as soon as R 61-2 is published together
        with the revised R 61-1.
    - spelling: fra
      value: 'Le Comité a décidé que les Recommandations suivantes deviendraient applicables
        dans le cadre du Système dès leur publication:'
