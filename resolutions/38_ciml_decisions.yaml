      value: Le Comité a chargé le Secrétariat du TC 9/SC 2 de rédiger d'urgence un
        Supplément à R 61 sur les exigences pour la transformation des Certificats
        (de façon analogue au Supplément de R 60 édition 2000) (avec le concours du
        BIML) ainsi qu'une proposition pour fixer la date limite de délivrance de
        Certificats basés sur l'édition 1996 de R 61, et d'organiser son approbation
        simultanée par correspondance par le TC 9/SC 2 et le CIML.
