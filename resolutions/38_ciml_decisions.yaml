    number: 2003/17.1
  doi: 10.63493/resolutions/ciml200317.1
  urn: urn:oiml:doc:ciml:resolution:2003-17.1
  agenda_item: '17.1'
  dates:
  - date: '2003-11-05'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 17.1: 39ème Réunion du CIML et 12ème Conférence Internationale
      de Métrologie Légale (Berlin, 2004)'
  - spelling: fra
    value: 'Agenda Item 17.1: 39ème Réunion du CIML et 12ème Conférence Internationale
      de Métrologie Légale (Berlin, 2004)'
  actions:
  - type: notes
    date_effective:
      date: '2003-11-05'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a presentation given by Mr. Kochsiek, on the
        organization of the $ 39^{\mathrm{th}} $ Committee Meeting and $ 12^{\mathrm{th}}
        $ OIML Conference to be held in Berlin from 25-29 October 2004, as approved
        at the $ 37^{\mathrm{th}} $ Committee Meeting in 2002. The Committee expressed
        its warmest thanks to Germany for their invitation.
    - spelling: fra
      value: Le Comité a pris note d'une présentation donnée par M. Kochsiek, sur
        l'organisation de la 39ème Réunion du Comité et de la 12ème Conférence de
        l'OIML devant se tenir à Berlin du 25 au 29 octobre 2004, comme approuvé à
        la 37ème Réunion du Comité en 2002. Le Comité a exprimé ses remerciements
        les plus chaleureux à l'Allemagne pour son invitation.
- identifier:
  - prefix: CIML
    number: 2003/17.2
  doi: 10.63493/resolutions/ciml200317.2
  urn: urn:oiml:doc:ciml:resolution:2003-17.2
  agenda_item: '17.2'
  dates:
  - date: '2003-11-05'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 17.2: 40ème Réunion du CIML et 50ème Anniversaire de l''OIML
      (France, 2005)'
  - spelling: fra
    value: 'Agenda Item 17.2: 40ème Réunion du CIML et 50ème Anniversaire de l''OIML
      (France, 2005)'
  actions:
  - type: notes
    date_effective:
      date: '2003-11-05'
      type: effective
    message:
    - spelling: eng
      value: The Committee accepted the proposal from the BIML to organize the $ 40^{\mathrm{th}}
        $ Committee Meeting in Lyon, France, at the end of June 2005, in conjunction
        with the International Metrology Congress organized by the Collège Français
        de Métrologie, on the occasion of the $ 50^{\mathrm{th}} $ anniversary of
        the OIML.
    - spelling: eng
      value: The Committee asked the BIML and the various TCs/SCs to avoid these dates
        when planning their own meetings.
    - spelling: fra
      value: Le Comité a accepté la proposition du BIML d'organiser la 40ème Réunion
        du Comité à Lyon, France, fin juin 2005, conjointement avec le Congrès International
        de Métrologie organisé par le Collège Français de Métrologie, à l'occasion
        du 50ème anniversaire de l'OIML.
    - spelling: fra
      value: Le Comité a demandé au BIML et aux divers TC/SC d'éviter ces dates lors
        de la planification de leurs propres réunions.
