    - spelling: eng
      value: The Committee took note of a presentation given by Mr. John Birch on
        his report The Benefit of Legal Metrology for the Economy and Society. The
        Committee expressed its great appreciation of this Report and instructed the
        BIML to distribute it as an expert report. A summary report compiled by Mr.
        Birch would also be published in the OIML Bulletin.
    - spelling: fra
      value: Le Comité a pris note d'une présentation donnée par M. John Birch sur
        son rapport Le Bénéfice de la Métrologie Légale pour l'Economie et la Société.
        Le Comité a exprimé sa forte appréciation concernant ce Rapport et a chargé
        le BIML de le diffuser en tant que rapport d'expert. Un rapport résumé compilé
        par M. Birch sera également publié dans le Bulletin de l'OIML.
    - spelling: fra
      value: Le Comité a chargé le Président du CIML et le BIML de considérer toutes
        actions ou études complémentaires semblant appropriées pour accroître la sensibilisation
        à la métrologie et à la métrologie légale.
