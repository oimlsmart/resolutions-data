    - spelling: eng
      value: The Committee took note of information given by the BIML Director concerning
        the revision of the OIML Financial Regulations. The Committee instructed the
        Bureau to complete this Draft Revision and to submit it to Member States in
        time for its approval at the $ 39^{\mathrm{th}} $ CIML Meeting and $ 12^{\mathrm{th}}
        $ OIML Conference in 2004.
    - spelling: fra
      value: Le Comité a pris note d'informations données par le Directeur du BIML
        en ce qui concerne la révision du Règlement Financier de l'OIML. Le Comité
