  - identifier: CIML/2012/19
    subject: CIML
    title: "Resolves: The draft revision of OIML R 126 Evidential breath analyzers is approved."
    dates:
    - start: '2012-10-01'
      kind: decision
    considerations:
    - type: recalling
      message: |
        Recalling Resolution no.17 of its 46th meeting,
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: considering
      message: |
        Considering:
        (a) The draft revision of OIML R 126 Evidential breath analyzers received support from a majority of CIML Members in the preliminary ballot, but also received five negative votes, some of which contained objections requiring substantial changes to the draft,
        (b) After consultation with its members, the secretariat of TC 17/SC 7 did not see any possibility to prepare a further draft that would remove the objections expressed in the preliminary ballot,
        (c) The revised text is a substantial improvement on the current version of OIML R 126, even though it did not receive full consensus,
      dates:
      - start: '2012-10-01'
        kind: effective
    actions:
    - type: resolves
      message: |
        Resolves:
        The draft revision of OIML R 126 Evidential breath analyzers is approved.
      dates:
      - start: '2012-10-01'
        kind: effective
  - identifier: CIML/2012/20
    subject: CIML
    title: Approves the proposal of the BIML for combining or withdrawing the projects as follows
    dates:
    - start: '2012-10-01'
      kind: decision
    considerations: []
    actions:
    - type: approves
      message: |
        Approves the proposal of the BIML for combining or withdrawing the projects as follows: (a) Projects to be cancelled after combination with another project:
        |===
        | Project | Title | Becomes part of
        | TC3/p1 | Revision of R34Accuracy classes of measuring instruments | TC3/SC1/p1
        | TC3/p2 | Revision of D3Legal qualification of measuring instruments | TC3/SC1/p1
        | TC3/p5 | Revision of R42Metal stamps for verification officers | TC3/SC1/p1
        | TC3/SC1/p2 | Revision of D20Initial and subsequent verification of measuring instruments and processes | TC3/SC1/p1
        | TC6/p4 | Methods for determining the quantity of product in prepackages | TC6/p3
        | TC10/SC2/p3 | Revision of R109Pressure gauges and vacuum gauges with elastic sensing instruments(standard instruments) | TC10/SC2/p2
        | TC16/SC4/p2 | FTIR(Fourier transform infrared)spectrometers for measurement of air pollutants | TC16/SC4/p3
        | TC17/SC7/p2 | Test procedures and test report format for the evaluation of portable breath testers used in open air | TC17/SC7/p1
        | TC18/SC4/p2 | Electrocardioscopes-metrological characteristics-methods and means for verification | TC18/SC4/p4
        | TC18/SC4/p3 | Digital electrocardiographs and electrocardioscopes-metrological characteristics-methods and means for verification | TC18/SC4/p4
        | TC18/SC4/p5 | Analyzing electrocardiographs.Metrological requirements.Methods and means of verification | TC18/SC4/p4
        |===
        <div align="center">
        (b) Projects to be renamed:
        </div>
        |===
        | Project | Old title | New title
        | TC3/SC1/p1(US) | Revision of D19Pattern evaluation and pattern approval | Combined revision of D19 and D20 incorporating elements of R34
        | TC10/SC2/p2 | Revision of R101Indicating and recording pressure gauges, vacuum gauges and pressure-vacuum gauges with elastic sensing instruments(ordinary instruments) | Combined revision of R101 and R109
        | TC16/SC4/p3 | Revision of D22(incorporating p2)Guide to portable instruments for assessing airborne pollutants arising from hazardous wastes | To be decided
        | TC18/SC4/p4 | Revision of R90Electrocardiographs | Revision of R90-Electrocardiographs,electrocardioscopes and electrocardioanalysers.Metrological characteristics.Method and equipment for verification
        |===
        (c) Projects to be cancelled:
        TC 13/p 2: Revision of R 103 Measuring instrumentation for human response to vibration,
        TC 13/p 4: Revision of R 104 Pure-tone audiometers,
        TC 13/p 5: Combined revision of R 58 Sound level meters and R 88 Integrating averaging sound level meters,
        TC 18/SC 4/p 1: Electrodes for electrocardiographs and electroencephalographs methods and means for verification.
      dates:
      - start: '2012-10-01'
        kind: effective
