        de la 9me Conférence) sera apporté pour aider certains pays membres à participer
        au symposium et à la réunion du Conseil de Développement. Le Comité a également
        demandé au BIML de poursuivre sa recherche de financement du symposium auprès
        des autres organisations internationales, régionales et nationales concernées.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a noté les changements qui se sont produits dans le domaine
        de la métrologie légale tels qu''identifiés dans le projet de document sur
        la politique à long terme de l''OIML. La plupart de ces changements, en particulier
        ceux relatifs aux structures institutionnelles, au rôle des gouvernements,
        et au champ d''application de la métrologie légale sont de toute première
        importance pour les pays qui mettent en place leurs services de métrologie
        légale.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a noté que la présidence des groupes de travail du Conseil
        de Développement était assumée comme suit:

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a exprimé son appréciation pour le nouveau format du Bulletin
        OIML et a demandé à ses Membres de contribuer activement à sa réalisation
        par l''envoi au Bureau d''articles techniques et informatifs.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a aussi pris note d''informations concernant le développement
        d''une brochure d''information générale sur l''OIML. Le Comité a demandé à
        ses Membres de faire part au BIML de leurs avis sur le projet de texte pour
        la brochure avant le 4 novembre 1994 et a chargé le Conseil de la Présidence
        de superviser la mise au point et la publication de la brochure par le BIML.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''un rapport sur les activités du BIML pour
        la période susmentionnée et a demandé au BIML de publier l''information sous
        une forme appropriée dans le Bulletin.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''un rapport du BIML à ce sujet.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''un rapport concernant les préparatifs pour
        un séminaire technique sur les instruments de pesage, qui doit être organisé
        par le BIML en septembre 1995 conjointement à une réunion WELMEC.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''informations présentées par la Délégation
        chinoise et le BIML concernant les préparatifs pour la 30ème réunion du CIML,
        qui doit se tenir à Pékin les 25-27 octobre 1995 (consécutivement au symposium
        pour les pays en développement des 23-24 octobre).

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a élu M. G.J. Faber, Membre du CIML pour les Pays-Bas, en
        tant que Président du CIML pour un mandat de six ans.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a réélu Dr Chappell, Membre du CIML pour les USA, en tant
        que premier Vice-Président du CIML pour un mandat de six ans.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''informations données par M. Kusakin, Membre
        du CIML pour la République de Bélarus, sur les activités métrologiques de
        ce nouvel État Membre de l''OIML.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''une déclaration de son Président nouvellement
        elu, M. Faber, relative à ses vues sur l''avenir de l''OIML.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
