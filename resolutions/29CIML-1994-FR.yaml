    value: COMITÉS TECHNIQUES ET SOUS-COMITÉS
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1994-10-12'
      type: effective
    message:
    - spelling: fra
      value: Le Comité a chargé les secrétariats des TC et SC d'examiner attentivement
        les thèmes dont ils sont responsables et de faire rapport par l'intermédiaire
        du Bureau sur la nécessité de les maintenir ou de les supprimer.
    - spelling: fra
      value: Le Comité a également demandé à ses Membres d'examiner la participation
        de leur pays en tant que Membre-P ou O des TC et SC, en particulier pour ceux
        dont le nombre de Membres-P est actuellement insuffisant, et de tenter d'identifier
        les organismes nationaux susceptibles d'avoir un intérêt à participer aux
        activités techniques de l'OIMLau nom des services nationaux de métrologie
        légale.
    - spelling: fra
      value: Le Comité a chargé le Bureau de distribuer largement les documents concernant
        les TC et SC OI ML aux États Membres et à toutes les organisations internationales
        ou régionales susceptibles d'être intéressées à établir des liaisons avec
        les TC et SC OI ML.
