  - language_code: fra
    title: 1 Rapport sur l'établissement définitif des TC et SC
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a chargé les secrétariats des TC et SC d''examiner attentivement
        les thèmes dont ils sont responsables et de faire rapport par l''intermédiaire
        du Bureau sur la nécessité de les maintenir ou de les supprimer.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a également demandé à ses Membres d''examiner la participation
        de leur pays en tant que Membre-P ou O des TC et SC, en particulier pour ceux
        dont le nombre de Membres-P est actuellement insuffisant, et de tenter d''identifier
        les organismes nationaux susceptibles d''avoir un intérêt à participer aux
        activités techniques de l''OIMLau nom des services nationaux de métrologie
        légale.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a chargé le Bureau de distribuer largement les documents
        concernant les TC et SC OI ML aux États Membres et à toutes les organisations
        internationales ou régionales susceptibles d''être intéressées à établir des
        liaisons avec les TC et SC OI ML.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
