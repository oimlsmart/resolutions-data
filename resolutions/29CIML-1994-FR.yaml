    message:
    - spelling: fra
      value: 'M. Birkeland introduit les quatre candidats à la Présidence du CIML:
        MM. Bennett (Royaume-Uni), Faber (Pays-Bas), Issaev (Fédération de Russie)
        et Kochsiek (Allemagne). Il donne alors la parole aux candidats afin qu''ils
        puissent expliquer pourquoi ils sont intéressés à devenir Président du CIML.'
