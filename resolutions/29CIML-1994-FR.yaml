      type: effective
    message:
    - spelling: fra
      value: Le Comité a approuvé dans son principe le document en trois modules sur
        la politique à long terme développé par le Conseil de la Présidence, son groupe
        de rédaction, et le BIML.
    - spelling: fra
      value: Le Comité a demandé à ses Membres d'envoyer au BIML leurs commentaires
        définitifs concernant ces trois modules avant fin 1994.
    - spelling: fra
      value: Le Comité a chargé le groupe de rédaction du Conseil de la Présidence
        et le BIML de réviser et de mettre au point ces textes, en tenant compte des
        commentaires exprimés avant, pendant, et après sa 29ème réunion.
    - spelling: fra
      value: Le Comité a chargé le Conseil de la Présidence de superviser la publication
        par le BIML du document de politique de l'OIML ainsi que sa diffusion auprès
        des États Membres, des Membres Correspondants, et des institutions en liaison.
