    message:
    - spelling: fra
      value: Melle French donne une information concernant le développement de cette
        brochure, dont le texte définitif devrait être soumis au Conseil de Présidence
        en janvier-février 1995 pour approbation, en même temps que l'approbation
        du texte définitif de la politique à long terme de l'OIML. La brochure devrait
        être alors publiée avec l'aide d'un graphiste professionnel, avec des illustrations
        basées sur les propositions reçues d'un certain nombre de Membres du CIML.
        La publication définitive est prévue pour le printemps 1995, pour un coût
        approximatif de 100 000 FRF pour 5 000 exemplaires. Pour permettre à tous
        les Membres du CIML d'exprimer leurs points de vue, Melle French distribue
        un projet de texte aux Membres du CIML à qui il est demandé d'envoyer leurs
        commentaires au BIML avant le 4 novembre 1994.
