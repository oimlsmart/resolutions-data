    type: decided
  title:
  - spelling: fra
    value: SITUATION FINANCIERE
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1994-10-12'
      type: effective
    message:
    - spelling: fra
      value: M. Athané rappelle la décision du CIML en 1993 de diminuer annuellement
        le budget de l'OIML de 100 000 Francs-or (la moitié pour les dépenses de personnel
        et l'autre moitié pour les crédits à mettre en réserve) afin de compenser
        la diminution du nombre total de parts contributives. Il indique que les estimations
        de dépenses pour 1994, faites sur la base de ce budget diminué, devraient
        être suivies. Des dépenses exceptionnelles comme la réfection du siège de
        l'Organisation et l'achat d'équipements informatiques, qui avaient été différés
        en 1992 et 1993, ont été rendu possibles en 1994 grâce à la très satisfaisante
        situation financière actuelle de l'Organisation. M. Athané ajoute que les
        recettes pourraient être même supérieures à celles qui étaient attendues par
        suite de l'adhésion de deux États Membres et de deux Membres Correspondants
        et grâce à des recettes en augmentation résultant principalement des ventes
        de publications et des abonnements au Bulletin.
