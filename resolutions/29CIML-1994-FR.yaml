  - start: '1994-10-12'
    kind: decision
  localizations:
  - language_code: fra
    title: 2 Activités futures
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note d''un rapport présenté par Mr M. Benkirane,
        Président du Conseil de Développement de l''OIML, sur la réunion du Conseil
        qui s''est tenue les 10-11 octobre 1994 à Paris, et comprenant les sujets
        tels que les cours de formation et l''aide technique fournie par certains
        Membres de l''OIML, un questionnaire sur la situation de la métrologie légale
        dans les pays en développement, et la coopération régionale.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a accepté l''invitation de la République Populaire de Chine
        de tenir un symposium sur les activités métrologiques dans les pays en développement,
        conjointement à la prochaine réunion du Conseil de Développement et à la 30ème
        réunion du CIML prévues pour les 23-27 octobre 1995 à Pékin. Le Comité a approuvé
        le fait que le symposium porte sur des sujets à caractère politique, y compris
        l''importance économique de la métrologie légale. Le Comité a demandé au BIML
        de faire tous les efforts possibles pour impliquer les organismes économiques
        internationaux tels que la Banque Mondiale, l''Organisation Mondiale du Commerce,
        le PNUD, et l''ONUDI dans le symposium.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a noté qu''un soutien financier (dans les limites des décisions
        de la 9ème Conférence) sera apporté pour aider certains pays membres à participer
        au symposium et à la réunion du Conseil de Développement. Le Comité a également
        demandé au BIML de poursuivre sa recherche de financement du symposium auprès
        des autres organisations internationales, régionales et nationales concernées.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a noté les changements qui se sont produits dans le domaine
        de la métrologie légale tels qu''identifiés dans le projet de document sur
        la politique à long terme de l''OIML. La plupart de ces changements, en particulier
        ceux relatifs aux structures institutionnelles, au rôle des gouvernements,
        et au champ d''application de la métrologie légale sont de toute première
        importance pour les pays qui mettent en place leurs services de métrologie
        légale.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a noté que la présidence des groupes de travail du Conseil
        de Développement était assumée comme suit:

        '
      dates:
      - start: '1994-10-12'
        kind: effective
