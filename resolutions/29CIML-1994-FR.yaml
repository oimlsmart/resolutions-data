    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a approuvé dans son principe le document en trois modules
        sur la politique à long terme développé par le Conseil de la Présidence, son
        groupe de rédaction, et le BIML.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a demandé à ses Membres d''envoyer au BIML leurs commentaires
        définitifs concernant ces trois modules avant fin 1994.

        '
      dates:
      - start: '1994-10-12'
        kind: effective
    - type: notes
      message: 'Le Comité a chargé le groupe de rédaction du Conseil de la Présidence
        et le BIML de réviser et de mettre au point ces textes, en tenant compte des
