    number: 2014/4
  doi: 10.63493/resolutions/ciml201404
  urn: urn:oiml:doc:ciml:resolution:2014-04
  agenda_item: '4'
  dates:
  - date: '2014-11-04'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 4: Member States and Corresponding Members'
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2014-11-04'
        type: effective
      message: Having regard to section 7.2.2 of OIML B 7:2013 BIML Staff regulations,
        section 2, first paragraph and section 4, first bullet point, of OIML B 13:2004
        Procedure for the appointment of the BIML Director and Assistant Directors,
    - type: considering
      date_effective:
        date: '2014-11-04'
        type: effective
      message: Considering that the term of appointment of the BIML Director expires
        on 31st December, 2015,
    - type: considering
      date_effective:
        date: '2014-11-04'
        type: effective
      message: Considering the proposal of its President, under section 2 of OIML
        B 13:2004, to extend the Director's contract without a further preliminary
        procedure,
    - type: noting
      date_effective:
        date: '2014-11-04'
        type: effective
      message: |-
        Noting the comments made by its Members,
        Expresses its expectation that it will resolve to renew the appointment of the BIML Director for a fixed term of up to five years at its meeting in 2015, and
    actions:
    - type: resolves
      date_effective:
        date: '2014-11-04'
        type: effective
      message: Resolves not to appoint a Selection Committee under section 3 of OIML
        B 13:2004.
  - language_code: fra
    title: 'Agenda Item 4: Member States and Corresponding Members'
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2014-11-04'
        type: effective
      message: Vu la section 7.2.2 de l'OIML B 7:2013 Statuts du Personnel du BIML,
        la section 2, premier paragraphe, et la section 4, premier alinéa, de l'OIML
        B 13:2004 Procédure pour la désignation du Directeur et des Adjoints au Directeur
        du BIML,
    - type: considering
      date_effective:
        date: '2014-11-04'
        type: effective
      message: Considérant que le mandat du Directeur du BIML arrive à échéance le
        31 décembre 2015,
    - type: considering
      date_effective:
        date: '2014-11-04'
        type: effective
      message: Considérant la proposition de son Président, en application de la section
        2 de l'OIML B 13:2004, de renouveler le contrat du Directeur sans autre procédure
        préalable,
    - type: noting
      date_effective:
        date: '2014-11-04'
        type: effective
      message: |-
        Prenant note des observations formulées par ses Membres,
        Indique qu'il prévoit de décider le renouvellement de l'engagement du Directeur du BIML pour une durée déterminée de cinq ans au maximum lors de sa réunion en 2015, et
    actions:
    - type: decides
      date_effective:
        date: '2014-11-04'
        type: effective
      message: Décide de ne pas désigner de Comité de Sélection tel que le prévoit
        la section 3 de l'OIML B 13:2004.
