  - identifier: CIML/2014/14
    language: fr
    title:
      - { content: "Prend note du rapport présenté par le BIML concernant la mise en œuvre de", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml201414"
    urn: "urn:oiml:doc:ciml:resolution:2014-14"
    dates:
    - start: '2014-11-04'
      kind: decision
    considerations:
    - type: considering
      message:
        - { content: "Considérant que, pour un certain nombre de Groupes de Projet actuels, il n'y a pas suffisamment de Membres-P, que, pour certains Groupes de Projet, aucun État Membre n'est désireux ou en mesure de se porter volontaire pour en assurer la responsabilité et que, conformément au 5.16 de l'OIML B 6-1:2013, ces Groupes de Projet doivent être dissous,", lang: fr }
      dates:
      - start: '2014-11-04'
        kind: effective
    actions:
    - type: notes
      message:
        - { content: "Prend note du rapport présenté par le BIML concernant la mise en œuvre de l'OIML B 6-1:2013 Directives pour les travaux techniques de l'OIML,", lang: fr }
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: decides
      message:
        - { content: "Décide de dissoudre les Groupes de Projet suivants :\n- TC 3/SC 1/p 4 : Révision du D 13:1986 Conseils pour les arrangements bi- ou multilatéraux de reconnaissance des : résultats d'essais – approbations de modèles - vérifications,\n- TC 3/SC 5/p 10 : Nouvelle publication : Guide for the application of ISO/IEC 17021 to assessment of quality system certification bodies in the field of legal metrology [Guide pour l'application de la norme ISO/CEI 17021 à l'évaluation des organismes de certification des systèmes de qualité dans le domaine de la métrologie légale],\n- TC 3/SC 5/p 11 : Nouvelle publication : Guide for the application of ISO 9001 to legal metrology controls [Guide pour l'application de la norme ISO 9001 aux contrôles de métrologie légale],\n- TC 7/SC 4/p 2 : Révision de la R 55:1981 Compteurs de vitesse, compteurs mécaniques de distance et chronotachygraphes des véhicules automobiles,\n- TC 10/SC 3/p 1 : Révision de la R 97:1990 Baromètres,\n- TC 16/SC 3/p 2 : Révision de la R 112:1994 Chromatographes en phase liquide de haute performance pour la mesure des pesticides et autres substances toxiques,\n- TC 16/SC 4/p 1 : Nouvelle publication : Guide to air sampling devices for toxic chemical pollutants at hazardous waste sites [Guide sur les dispositifs d'échantillonnage de l'air pour les polluants chimiques toxiques sur les sites de décharge de déchets dangereux,\n- TC 16/SC 4/p 3 : Révision du D 22:1991 Guide sur les instruments portatifs pour l'évaluation des polluants contenus dans l'air en provenance des sites de décharge de déchets dangereux (incorporant les spectrophotomètres infrarouge à transformée de Fourier - FTIR),\n- TC 18/SC 4/p 4 : Révision de la R 90:1990 Électrocardiographes, électrocardioscopes et électrocardioanalyseurs,\n- TC 18/SC 4/p 6 : Révision de la R 89:1990 Électroencéphalographes,\n- TC 18/SC 5/p 1 : Nouvelle publication : Electronic blood cell counting chambers [Chambres de comptage électronique de cellules sanguines],\n- TC 18/SC 5/p 4 : Révision de la R 26 : Seringues médicales.", lang: fr }
      dates:
      - start: '2014-11-04'
        kind: effective
