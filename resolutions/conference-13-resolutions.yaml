    title: Afin de mieux aider les pays en développement, la Conférence a considéré
      souhaitable que
    subject: Conférence OIML
    actions:
    - type: remarks
      message: 'Afin de mieux aider les pays en développement, la Conférence a considéré
        souhaitable que la publication D1 Eléments pour une Loi de Métrologie soit
        révisée afin de prendre en compte les derniers développements dans le commerce
        international, tels que l''évaluation de conformité, la certification et la
        globalisation. La Conférence donne instruction au Comité d''entreprendre la
        révision de la Publication D1.

        '
      date_effective:
        date: '2008-10-29'
        type: adoption
  type: resolution
