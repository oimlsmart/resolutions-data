    title: Dans l'éventualité où les conditions économiques engendreraient une situation
      financière critique po…
    subject: Conférence OIML
    actions:
    - type: remarks
      message: 'Dans l''éventualité où les conditions économiques engendreraient une
        situation financière critique pour l''OIML, le Président du Comité devra rendre
        compte des mesures prises et pourra proposer que le Comité demande aux Etats
        Membres une contribution volontaire additionnelle exceptionnelle, après avoir
        pris au préalable toutes les mesures nécessaires pour réduire les coûts.

        '
      date_effective:
        date: '2008-10-29'
        type: adoption
  type: resolution
