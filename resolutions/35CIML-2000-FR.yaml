  actions:
  - type: notes
    date_effective:
      date: '2000-10-09'
      type: effective
    message:
    - spelling: fra
      value: M. Issaev confirme que le Comité est invité à tenir sa prochaine réunion
        à Moscou entre le 22 et le 27 septembre 2001. Cette invitation est acceptée
        et le Comité demande à son Président et au BIML de commencer les préparatifs
        en temps voulu en étroite coopération avec le pays hôte.
