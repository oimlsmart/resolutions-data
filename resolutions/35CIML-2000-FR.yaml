  actions:
  - type: notes
    date_effective:
      date: '2000-10-09'
      type: effective
    message:
    - spelling: fra
      value: Le Comité a pris note d'une allocution d'ouverture de son Président.
    - spelling: fra
      value: Le Comité a approuvé le projet d'ordre du jour ODJ 2 sans modifications.
    - spelling: fra
      value: Le Comité a nommé à l'unanimité Dr. Sam Chappell, ancien Premier Vice-Président
        et Membre du CIML pour les USA, Membre d'Honneur.
    - spelling: fra
      value: Le Comité a approuvé le compte rendu de sa 34ème réunion sans modifications.
    - spelling: fra
      value: Le Comité a pris note d'une liste donnant la population et la classe
        de contribution de chaque État Membre, avec l'indication de ceux d'entre eux
        qui bénéficient d'une classe de contribution plus basse que celle assignée
        par leur population. Le Comité a pris note du fait qu'il n'y avait pas de
        changements par rapport à la situation antérieure et n'a pas exprimé de commentaires
        au sujet de cette liste.
    - spelling: fra
      value: Le Comité a approuvé le rapport comptable pour 1999 et a demandé à son
        Président et au Directeur du BIML de le soumettre à la Onzième Conférence.
    - spelling: fra
      value: Le Comité a pris note d'un rapport de son Président relatif aux activités
        du Conseil de la Présidence depuis la dernière réunion du CIML.
    - spelling: fra
      value: Le Comité a pris note d'un rapport décrivant les activités du BIML depuis
        la dernière réunion du CIML.
    - spelling: fra
      value: Le Comité a pris note d'un rapport du BIML décrivant la situation de
        certains Comités Techniques et Sous-Comités. Le Comité a noté qu'il n'y avait
        pas de nécessité que le secrétariat du TC 5 soit attribué à un État Membre
        mais qu'au contraire le TC 13 ne devrait pas rester sans secrétariat. Le Comité
        a aussi accepté que sous TC 16/SC 1 les activités sur les Instruments de mesure
        des gaz d'échappement des véhicules soient poursuivies par les Pays-Bas alors
        que les trois autres thèmes de travail seront de la responsabilité de la Fédération
        de Russie. Enfin, le Comité a noté que la Fédération de Russie pourrait être
        intéressée par le TC 8/SC 2 à condition que le travail se limite à l'élaboration
        du format de rapport d'essai pour la R 125.
    - spelling: fra
      value: Le Comité a élu Mr. Faber (Pays-Bas) pour continuer comme Président pour
        les trois prochaines années.
    - spelling: fra
      value: Le Comité a élu Dr. Issaev (Fédération de Russie) comme Second Vice-Président
        pour les six prochaines années.
    - spelling: fra
      value: Le Comité a nommé M. Magana (France) comme futur Directeur du BIML.
    - spelling: fra
      value: Le Comité a pris note des décisions de la Conférence et a demandé à son
        Président, au Présidium et au Conseil de la Présidence d'en surveiller la
        mise en application et de faire rapport à ce sujet à la prochaine réunion
        du CIML.
