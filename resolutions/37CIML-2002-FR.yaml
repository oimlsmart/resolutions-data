        par Mme Liu, Secrétaire du Comité TBT de l''OMC. Le Comité a chargé le Bureau
        de poursuivre une coopération étroite avec l''OMC, en particulier, dans le
        but d''organiser des séminaires au niveau régional.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
