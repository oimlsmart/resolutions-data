    title: 2 Activités du Conseil de Développement, plan d'action et évolutions possibles
      de ses structures
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Faber a rapporté que suite à la dernière Réunion du Conseil de
        Développement à Moscou, il avait décidé de créer un petit "Groupe de Travail"
        pour les questions liées aux pays en développement, avec une mission double:
        accélérer le travail et le rendre plus transparent, et deuxième examiner la
        structure du Conseil de Développement et faire des propositions pour le restructurer
        lors de la Conférence en 2004. Il a ensuite demandé à Mme. Annabi de présenter
        un rapport sur la Réunion du Conseil de Développement qui avait eu lieu le
        1er Octobre 2002.

        '
