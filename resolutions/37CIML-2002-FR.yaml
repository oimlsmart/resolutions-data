    title: 1 $ 38^{\mathrm{ème}} $ Réunion du CIML (2003)
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a assisté à une présentation donnée par la délégation japonise,
        visant à appuyer une invitation à tenir la 38ème Réunion du CIML à Kyoto en
        novembre 2003. Le Comité a unanimement accepté cette invitation et remercié
        les délégués japonais.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
