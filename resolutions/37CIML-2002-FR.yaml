    title: 2 Documents Horizontaux
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Magaña a rappelé qu''à la dernière Réunion du CIML, il avait été
        décidé d''élaborer un document de politique générale sur les documents horizontaux.
        Un premier projet avait été établi et discuté au Conseil de la Présidence.
        Ce document considérait et essayait de distinguer plusieurs sortes de documents.
        Certaines publications OIML, telles que le D 11, n''étaient pas simplement
        à caractère informatif mais servaient aussi de base pour la plupart des Recommandations
        Internationales OIML. Cela serait aussi le cas des documents sur les logiciels.
        Un certain nombre de commentaires qui ont été exprimés par les Membres du
        Conseil de la Présidence sur ce premier document, seraient reconsidérés par
        le Bureau en vue de leur présentation au Conseil de la Présidence à sa réunion
        en février 2003, sous forme d''un projet amélioré qui pourrait ensuite être
        soumis aux Membres du CIML en vue de son approbation à la prochaine Réunion
        du CIML. Ce document redéfinirait les différents types de publications OIML
        afin de clarifier leur emploi et leur mode d''approbation.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
