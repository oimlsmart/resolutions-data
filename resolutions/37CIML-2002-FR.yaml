  localizations:
  - language_code: fra
    title: 2 Nouvelles Recommandations applicables dans le Système
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a décidé également que deux Recommandations, nommément la
        R 134 Instruments automatiques de pesage des véhicules routiers en mouvement.
        Partie A: Pesage total des véhicules et la R 49 Compteurs d''eau pour l''eau
        potable froide deviendraient applicables dans le Système dès que leurs Formats
        de Rapport d''Essai seraient approuvés par le vote par correspondance du CIML
        et seraient publiés.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
