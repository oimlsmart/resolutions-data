    title: 3 Accélération du travail technique
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Dans son introduction, M. Faber a dit qu''il était préoccupé (ainsi
        que les autres Membres du Conseil de la Présidence) par la lenteur avec laquelle
        les travaux techniques de l''OIML avançaient, dans la mesure où c''était,
        après tout, l''activité centrale de l''Organisation. Il n''était pas seulement
        soucieux de la lenteur de l''élaboration des nouveaux documents de l''OIML
        mais aussi du retard pris entre les réexamens réguliers et les révisions des
        Recommandations et des Documents existants. Si l''OIML échouait dans cette
        tâche, d''autres organisations l''accompliraient à sa place car elles ne pouvaient
        attendre (et n''attendraient pas) indéfiniment que l''OIML s''acquitte de
        ce travail. La Présidence avait examiné la distribution des TC/SC et les tâches
        attribuées et avait trouvé que les États-Unis et la Fédération de Russie dirigeaient
        la moitié des Secrétariats; quatre États Membres assumaient environ 75 % des
        projets en cours. Dans le but d''arriver à une distribution plus équilibrée
        des tâches parmi les États Membres et pour trouver plus de personnes qui puissent
        contribuer aux activités techniques de l''OIML, il préférait employer une
        approche positive dans la mesure où il n''y avait aucune raison de blâmer
        tel pays ou telle personne. Ceci voulait dire que plusieurs moyens d''aider
        les organismes techniques seraient proposés: contacts et visites informels
        seraient proposés afin de i) identifier les problèmes des TC et SC qui avaient
        besoin d''être résolus, ii) aider à identifier des sources potentielles d''aide
        par divers autres États Membres et iii) tenter de persuader ceux-ci de prendre
        certaines responsabilités. Il expliquait que dans les années à venir le Président
        du CIML, les Vice-Présidents et le Directeur du BIML seraient en contact avec
        ces pays pour discuter des possibilités d''une façon positive mais informelle,
        établir un programme de visites puis en faire le rapport au CIML et discuter
        de ce qui pouvait être fait pour améliorer la situation. En guise de conclusion,
        M. Faber a affirmé qu''il était très conscient des difficultés que rencontraient
        nombre de services de métrologie: diminution du temps, des ressources et du
        personnel, et convenait que chaque situation devait être étudiée au cas par
        cas en étroite coopération avec les organismes concernés.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
