    title: 3 Informations sur les activités de métrologie légale dans les Régions
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note des présentations fournies par les représentants
        de WELMEC, APLMF, SADCMEL et EMLMF sur les développements actuels au sein
        de leurs régions.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note des informations fournies par son Président
        en ce qui concerne l''élection d''un nouveau Président qui aura lieu lors
        de la 38ème Réunion du CIML en 2003. Le Comité a décidé que les candidatures
        pour cette élection ne seraient plus acceptées au-delà du 31 janvier 2003
        de façon à ce que les Membres du CIML aient assez de temps pour préparer leur
        décision.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
