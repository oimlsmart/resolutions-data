  - language_code: eng
    title: Agenda item 2.2
    subject: CIML
    considerations:
    - type: noting
      message: 'Noting the provisions for its decisions set out in Article XVII of
        OIML B 1 Convention establishing an International Organisation of Legal Metrology,

        '
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: considering
      message: 'Considering the need to facilitate the work of the Committee when
        online CIML meetings are held,

        '
      dates:
      - start: '2020-10-20'
        kind: effective
    actions:
    - type: decides
      message: 'Decides that the "in-meeting" conditions for Committee decisions,
        given in paragraphs two and three of Article XVII of OIML B 1, shall be used
        in the case of online voting on subjects which have been discussed at an online
        CIML meeting.

        '
      dates:
      - start: '2020-10-20'
        kind: effective
  - language_code: fra
    title: Agenda item 2.2
    subject: CIML
    considerations:
    - type: noting
      message: 'Prenant note des dispositions relatives à ses décisions énoncées à
        l''article XVII de l''OIML B 1 Convention instituant une organisation internationale
        de métrologie légale,

        '
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: considering
      message: 'Considérant la nécessité de faciliter le travail du Comité lors des
        réunions du CIML en ligne,

        '
      dates:
      - start: '2020-10-20'
        kind: effective
    actions:
    - type: decides
      message: 'Décide que les conditions "en réunion" pour les décisions du Comité,
        énoncées aux paragraphes deux et trois de l''article XVII de l''OIML B 1,
        seront utilisées dans le cas d''un vote en ligne sur des sujets qui ont été
        discutés lors d''une réunion en ligne du CIML.

        '
      dates:
      - start: '2020-10-20'
        kind: effective
