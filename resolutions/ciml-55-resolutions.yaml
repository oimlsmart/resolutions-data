    title:
      - { content: "Décide que la référence au marquage du numéro de certificat OIML sur les instruments", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml202025"
    urn: "urn:oiml:doc:ciml:resolution:2020-25"
    dates:
    - start: '2020-10-20'
      kind: decision
    considerations:
    - type: noting
      message:
        - { content: "Prenant note de la recommandation du Comité de Management (MC) du Système de Certification OIML (OIML-CS) fournie dans l'Addendum 9.1 au document de travail pour cette réunion,", lang: fr }
      dates:
      - start: '2020-10-20'
        kind: effective
    actions:
    - type: decides
      message:
        - { content: "Décide que la référence au marquage du numéro de certificat OIML sur les instruments de mesure doit être supprimée de toutes les publications de l'OIML,", lang: fr }
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: requests
      message:
        - { content: "Demande au MC de OIML-CS de réviser les publications OIML-CS pertinentes et de développer une note d'orientation concernant la signification du numéro de certificat OIML lorsqu'il est marqué sur un instrument de mesure,", lang: fr }
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le BIML d'examiner toutes les autres publications de l'OIML afin d'identifier celles qui comportent une référence au marquage du numéro de certificat OIML sur les instruments de mesure, et", lang: fr }
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le BIML d'identifier la méthode la plus appropriée pour modifier/réviser les publications pertinentes et de communiquer ces informations aux secrétariats des comités et/ou sous-comités techniques appropriés.", lang: fr }
      dates:
      - start: '2020-10-20'
        kind: effective
