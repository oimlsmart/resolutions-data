        kind: effective
  - language_code: fra
    title: Décide que la référence au marquage du numéro de certificat OIML sur les
      instruments
    subject: CIML
    considerations:
    - type: noting
      message: 'Prenant note de la recommandation du Comité de Management (MC) du
        Système de Certification OIML (OIML-CS) fournie dans l''Addendum 9.1 au document
        de travail pour cette réunion,

        '
      dates:
      - start: '2020-10-20'
        kind: effective
    actions:
    - type: decides
      message: 'Décide que la référence au marquage du numéro de certificat OIML sur
        les instruments de mesure doit être supprimée de toutes les publications de
        l''OIML,

        '
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: requests
      message: 'Demande au MC de OIML-CS de réviser les publications OIML-CS pertinentes
        et de développer une note d''orientation concernant la signification du numéro
        de certificat OIML lorsqu''il est marqué sur un instrument de mesure,

        '
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: charges
      message: 'Charge le BIML d''examiner toutes les autres publications de l''OIML
        afin d''identifier celles qui comportent une référence au marquage du numéro
        de certificat OIML sur les instruments de mesure, et

        '
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: charges
      message: 'Charge le BIML d''identifier la méthode la plus appropriée pour modifier/réviser
        les publications pertinentes et de communiquer ces informations aux secrétariats
        des comités et/ou sous-comités techniques appropriés.

        '
      dates:
      - start: '2020-10-20'
        kind: effective
