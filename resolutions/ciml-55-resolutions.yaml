    - spelling: eng
      value: Approves the Terms of Reference of an OIML/BIPM Joint Task Group (JTG)
        as proposed in the Annex to Addendum 5c to the Working Document for this meeting,
    - spelling: fra
      value: |-
        Approuve le mandat d'un Groupe de travail commun OIML/BIPM (JTG) tel que proposé dans l'annexe à l'Addendum 5c au document de travail de cette réunion,
        Nomme Roman Schwartz, Charles Ehrlich et Anthony Donnellan comme représentants de l'OIML au sein de ce GTM, et
  - type: appoints
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Appoints Dr Roman Schwartz, Dr Charles Ehrlich and Mr Anthony Donnellan
        as the OIML representatives on that JTG, and
  - type: requests
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Requests the JTG to draw up proposals, based on the Terms of Reference,
        and an action plan with a time frame, to be presented at the 56th CIML Meeting
        and the 16th OIML Conference.
    - spelling: fra
      value: Demande au JTG d'élaborer des propositions, basées sur les termes de
        référence, et un plan d'action avec un calendrier, qui seront présentés à
        la 56ème Réunion du CIML et à la 16ème Conférence de l'OIML.
