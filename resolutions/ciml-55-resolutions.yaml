  doi: 10.63493/resolutions/ciml202001
  urn: urn:oiml:doc:ciml:resolution:2020-01
  agenda_item: '2.2'
  dates:
  - date: '2020-10-20'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 2.2: Application of conditions for CIML voting'
  - spelling: fra
    value: 'Agenda Item 2.2: Application of conditions for CIML voting'
  actions:
  - type: decides
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Decides that the "in-meeting" conditions for Committee decisions, given
        in paragraphs two and three of Article XVII of OIML B 1, shall be used in
        the case of online voting on subjects which have been discussed at an online
        CIML meeting.
    - spelling: fra
      value: Décide que les conditions "en réunion" pour les décisions du Comité,
        énoncées aux paragraphes deux et trois de l'article XVII de l'OIML B 1, seront
        utilisées dans le cas d'un vote en ligne sur des sujets qui ont été discutés
        lors d'une réunion en ligne du CIML.
  considerations:
  - type: noting
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Noting the provisions for its decisions set out in Article XVII of OIML
        B 1 Convention establishing an International Organisation of Legal Metrology,
    - spelling: fra
      value: Prenant note des dispositions relatives à ses décisions énoncées à l'article
        XVII de l'OIML B 1 Convention instituant une organisation internationale de
        métrologie légale,
  - type: considering
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Considering the need to facilitate the work of the Committee when online
        CIML meetings are held,
    - spelling: fra
      value: Considérant la nécessité de faciliter le travail du Comité lors des réunions
        du CIML en ligne,
