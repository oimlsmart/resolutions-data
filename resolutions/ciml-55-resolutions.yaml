  urn: urn:oiml:doc:ciml:resolution:2020-21
  agenda_item: '21'
  dates:
  - date: '2020-10-20'
    type: decided
  title:
  - spelling: eng
    value: Notes the report by the BIML on the steps taken to implement CIML resolution
  - spelling: fra
    value: Point 8.3 de l'ordre du jour
  actions:
  - type: notes
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Notes the report by the BIML on the steps taken to implement CIML resolution
        2019/30,
    - spelling: fra
      value: |-
        Prend note du rapport du BIML sur les mesures prises pour mettre en œuvre la résolution 2019/30 du CIML,
        Se félicite des propositions du Président du CIML et du BIML visant à promouvoir davantage le Bulletin de l'OIML, y compris une nouvelle page web à l'adresse https://www.oiml.org/en/publications/bulletin/future-editions, et
        Encourage vivement tous les Membres du CIML et les Représentants des Membres Correspondants à soutenir le Bulletin de l'OIML, à partager leurs expériences en métrologie légale, et à prendre la responsabilité soit comme "Mentor" pour l'une des prochaines éditions du Bulletin, soit en le promouvant lors des réunions du TC/SC/PG, des réunions des RLMO, des réunions du CEEMS AG, et autres opportunités.
  - type: welcomes
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: |-
        Welcomes the proposals by the CIML President and the BIML to further promote the OIML Bulletin including a new web page at https://www.oiml.org/en/publications/bulletin/future-editions, and
        Strongly encourages all CIML Members and Corresponding Member Representatives to support the OIML Bulletin, to share their legal metrology experiences, and to take responsibility either as a "Mentor" for one of the next editions of the Bulletin, or by promoting it at TC/SC/PG meetings, RLMO meetings, CEEMS AG meetings, and other opportunities.
