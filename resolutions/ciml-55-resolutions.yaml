      value: Notes the report on the internal review of BIML salary costs,
    - spelling: fra
      value: Prend note du rapport sur l'examen interne des coûts salariaux du BIML,
  - type: thanks
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Thanks Mr Alan Johnston and Dr Bobjoseph Mathew for their work in conducting
        this review and producing the report,
    - spelling: fra
      value: |-
        Remercie M. Alan Johnston et le Dr Bobjoseph Mathew pour leur travail dans la réalisation de cette étude et la production du rapport,
        Prend acte des résultats et des conclusions de l'examen,
  - type: acknowledges
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Acknowledges the findings and conclusions of the review,
  - type: supports
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Supports the recommendations contained in the report,
    - spelling: eng
      value: Supports the immediate amendment of OIML B 7 BIML Staff regulations,
        Annex 2 as proposed in recommendation 3 of the report, this work to be conducted
        by the BIML.
  - type: requests
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Requests that its President and the BIML Director ensure the implementation
        of these recommendations, and
    - spelling: fra
      value: Demande à son Président et au Directeur du BIML de veiller à la mise
        en œuvre de ces recommandations, et
  - type: endorses
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: fra
      value: Soutient les recommandations contenues dans le rapport,
    - spelling: fra
      value: Soutient la modification immédiate des Statuts du personnel du BIML,
        OIML B 7, Annexe 2, comme proposé dans la recommandation 3 du rapport, ce
        travail devant être effectué par le BIML.
