  actions:
  - type: decides
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Decides that reference to the marking of the OIML certificate number
        on measuring instruments should be removed from all OIML publications,
    - spelling: fra
      value: Décide que la référence au marquage du numéro de certificat OIML sur
        les instruments de mesure doit être supprimée de toutes les publications de
        l'OIML,
  - type: requests
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Requests the OIML-CS MC to revise the relevant OIML-CS publications and
        to develop a Guidance Note regarding the meaning of the OIML certificate number
        when it is marked on a measuring instrument,
    - spelling: fra
      value: Demande au MC de OIML-CS de réviser les publications OIML-CS pertinentes
        et de développer une note d'orientation concernant la signification du numéro
        de certificat OIML lorsqu'il est marqué sur un instrument de mesure,
  - type: instructs
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Instructs the BIML to review all other OIML publications to identify
        those that include a reference to the marking of the OIML certificate number
        on measuring instruments, and
    - spelling: eng
      value: Instructs the BIML to identify the most appropriate method to amend/revise
        the relevant publications and to communicate this information to the Secretariats
        of the appropriate technical committees and/or subcommittees.
  - type: charges
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: fra
      value: Charge le BIML d'examiner toutes les autres publications de l'OIML afin
        d'identifier celles qui comportent une référence au marquage du numéro de
        certificat OIML sur les instruments de mesure, et
    - spelling: fra
      value: Charge le BIML d'identifier la méthode la plus appropriée pour modifier/réviser
        les publications pertinentes et de communiquer ces informations aux secrétariats
        des comités et/ou sous-comités techniques appropriés.
  considerations:
  - type: noting
    date_effective:
      date: '2020-10-20'
      type: effective
    message:
    - spelling: eng
      value: Noting the recommendation from the OIML Certification System (OIML-CS)
        Management Committee (MC) provided in Addendum 9.1 to the Working Document
        for this meeting,
    - spelling: fra
      value: Prenant note de la recommandation du Comité de Management (MC) du Système
