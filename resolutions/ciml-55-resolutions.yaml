        kind: effective
    - type: requests
      message: 'Requests the OIML-CS MC to revise the relevant OIML-CS publications
        and to develop a Guidance Note regarding the meaning of the OIML certificate
        number when it is marked on a measuring instrument,

        '
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: instructs
      message: 'Instructs the BIML to review all other OIML publications to identify
        those that include a reference to the marking of the OIML certificate number
        on measuring instruments, and

        '
      dates:
      - start: '2020-10-20'
        kind: effective
    - type: instructs
      message: 'Instructs the BIML to identify the most appropriate method to amend/revise
        the relevant publications and to communicate this information to the Secretariats
        of the appropriate technical committees and/or subcommittees.

        '
      dates:
