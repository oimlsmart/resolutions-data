      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: "Decides that Issuing Participants may request the registration of Manufacturers' Testing Laboratorie…"
      subject: CIML
      considerations:
      - type: noting
        message: |
          Noting the report of TC 3/SC 5 on the issue of the acceptance of manufacturers' test results within a DoMC under the MAA,
        dates:
        - start: '2011-10-11'
          kind: effective
      - type: recalling
        message: |
          Recalling its Resolution no. 20 at the 43rd CIML Meeting,
        dates:
        - start: '2011-10-11'
          kind: effective
      actions:
      - type: decides
        message: |
          Decides that Issuing Participants may request the registration of Manufacturers' Testing Laboratories (MTLs) under a DoMC, provided that the conditions agreed by TC 3/SC 5 and laid down in a respective amendment to, or revision of, OIML B 10 are met, and that after this amendment to, or revision of, OIML B 10, MAA Type Evaluation Reports that contain test results from MTLs may be accepted by Participants on a voluntary basis.
        dates:
        - start: '2011-10-11'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Décide que les Participants Emetteurs peuvent demander l'enregistrement des laboratoires d'essai des…"
      subject: CIML
      considerations:
      - type: noting
        message: |
          Prenant note du rapport du TC 3/SC 5 sur la question de l'acceptation des résultats d'essais des fabricants dans le cadre d'une Déclaration de confiance mutuelle (DoMC) au titre de l'Arrangement d'acceptation mutuelle (MAA),
        dates:
        - start: '2011-10-11'
          kind: effective
      - type: recalling
        message: |
          Rappelant sa Résolution n° 20 de la 43ème Réunion du CIML,
        dates:
        - start: '2011-10-11'
          kind: effective
      actions:
      - type: decides
        message: |
          Décide que les Participants Emetteurs peuvent demander l'enregistrement des laboratoires d'essai des fabricants (MTL) dans le cadre d'une DoMC, dès lors que sont remplies les conditions acceptées par le TC 3/SC 5 et fixées dans un amendement respectif à, ou une révision correspondante de, l'OIML B 10, et que, après ledit amendement à, ou ladite révision de, l'OIML B 10, les rapports d'évaluation de type selon le MAA qui contiennent les résultats d'essais des MTL peuvent être acceptés par les Participants sur la base du volontariat.
        dates:
        - start: '2011-10-11'
          kind: effective
