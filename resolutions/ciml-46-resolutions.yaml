          Noting the written report of the seminar on "Conformity to Type" held in Utrecht, the Netherlands, on 29 and 30 June 2011,
        dates:
        - start: '2011-10-11'
          kind: effective
      - type: noting
        message: |
          Noting the oral report and presentation by the CIML Member for New Zealand, Mr. Stephen O'Brien, on the outcome of the follow-up CTT Seminar held in Prague on 10 October 2011,
        dates:
        - start: '2011-10-11'
          kind: effective
      actions:
      - type: approves
        message: |
          Approves the establishment of a new Subcommittee of TC 3, to be titled "Conformity to type", which shall undertake as a work item the development of a guidance document on the "scope for pre-market surveillance activities focused on the conformity assessment of measuring instruments to give assurance that manufactured (or production) instruments meet their approved type",
          Assigns the responsibility for the Secretariat of the new Subcommittee jointly to New Zealand and the Bureau,
          Invites the new Subcommittee to take into account:
          - the information provided at the seminars held in June and October 2011; and
          - the current programs in the USA and the EU and any best practices identified elsewhere,
        dates:
        - start: '2011-10-11'
          kind: effective
      - type: thanks
        message: |
          Thanks the electronic working group, chaired by the CIML Member for New Zealand, for preparing the program for the Seminars.
        dates:
        - start: '2011-10-11'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Prend note du rapport écrit du Séminaire sur la « Conformité au Type »"
      subject: CIML
      considerations:
      - type: recalling
        message: |
          Rappelant les Résolutions n° 15 et n° 19 de sa 45ème Réunion,
        dates:
        - start: '2011-10-11'
          kind: effective
      actions:
      - type: notes
        message: |
          Prend note du rapport écrit du Séminaire sur la « Conformité au Type » (CTT) qui s'est tenu à Utrecht, Pays-Bas, les 29 et 30 juin 2011,
        dates:
        - start: '2011-10-11'
          kind: effective
      - type: notes
        message: |
          Prend note du rapport verbal et de l'exposé, par le Membre du CIML de la Nouvelle-Zélande, M. Stephen O'BRIEN, sur le résultat du Séminaire CTT de suivi qui s'est tenu à Prague, le 10 octobre 2011,
        dates:
        - start: '2011-10-11'
          kind: effective
      - type: approves
        message: |
          Approuve l'établissement d'un Sous-comité du TC 3, qui s'appellera « Conformité au Type », lequel doit entreprendre comme tâche le développement d'un document d'orientation sur les « perspectives d'activités de surveillance avant mise sur le marché, activités axées sur l'évaluation de la conformité des instruments de mesure en vue d'apporter l'assurance que les instruments fabriqués (ou de production) correspondent au type homologué »,
          Attribue la responsabilité du Secrétariat du nouveau Sous-comité conjointement à la Nouvelle-Zélande et au Bureau,
          Invite le nouveau Sous-comité à prendre en compte :
          - L'information fournie lors des Seminaires de juin et d'octobre 2011 ; et
          - Les programmes actuels aux États-Unis et dans l'Union Européenne, ainsi que toutes « meilleures pratiques » identifiées ailleurs,
        dates:
