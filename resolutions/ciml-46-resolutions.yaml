        - { content: "Approves, subject to re-titling the proposed \"working groups\" as \"Project Groups\" and other necessary editorial changes, the revision of:\n- OIML B 6-1 Directives for OIML technical work. Part 1: Structures and procedures for the development of OIML publications; and\n- OIML B 6-2 Directives for OIML technical work. Part 2: Guide to the drafting and presentation of OIML publications,", lang: en }
      dates:
