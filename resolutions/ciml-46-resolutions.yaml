  - identifier: CIML/2011/26
    language: fr
    title:
      - { content: "Considérant ", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml201126"
    urn: "urn:oiml:doc:ciml:resolution:2011-26"
    dates:
    - start: '2011-10-11'
      kind: decision
    considerations:
    - type: considering
      message:
        - { content: "Considérant :\na) que, lorsque l'OIML fut créée en 1955, sa constitution a été calquée sur celle du BIPM, constitué par la Convention du Mètre de 1875,\nb) qu'au vu de l'historique du texte de la Convention de l'OIML, il est probable que le terme de « colleague » (collègue) utilisé dans l'article XVII de la Convention de l'OIML fasse référence à un autre Membre du CIML,\nc) le rôle de l'OIML comme organisation normative internationale et l'évolution du fonctionnement du CIML au regard de ce rôle, à savoir que les décisions du CIML sont de plus en plus considérées comme des décisions des Membres de l'OIML,", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: noting
      message:
        - { content: "Notant que l'article XIII de la Convention de l'OIML a été amendé en 1968, modifiant la composition du CIML, passant d'un maximum de 20 Membres, élus par la Conférence, à un représentant par Membre de l'OIML, désigné par son Gouvernement,\nEst d'avis qu'il peut quelquefois être plus approprié, pour un Membre du CIML qui est dans l'impossibilité d'assister à la Réunion du CIML, de déléguer sa voix à une personne de son propre Gouvernement ou de sa propre Administration, plutôt qu'à un autre Membre du CIML, Décide de soumettre à l'approbation de la $14^{\\text{ème}}$ Conférence de l'OIML l'interprétation suivante s'appliquant au premier paragraphe de l'article XVII de la Convention de l'OIML :\n« Un \"collègue\" peut être : soit un autre Membre du CIML soit toute personne désignée par le Membre du CIML absent pour le représenter. Dans ce dernier cas, le représentant doit appartenir au même gouvernement ou à la même administration que le Membre du CIML absent et ne peut représenter d'autres Membres du CIML, c'est-à-dire ne peut recevoir de procuration de la part d'autres Membres du CIML. »", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: notes
      message:
        - { content: "Considérant :", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
