  - identifier: CIML/2011/26
    language: en
    title:
      - { content: "Resolves to request the 14th OIML Conference to approve the following interpretation, applicable to", lang: en }
    subject:
      - { content: CIML, lang: en }
    doi: "10.63493/resolutions/ciml201126"
    urn: "urn:oiml:doc:ciml:resolution:2011-26"
    dates:
    - start: '2011-10-11'
      kind: decision
    considerations:
    - type: considering
      message:
        - { content: "Considering\na) that, when the OIML was established in 1955, its Organization was modeled after the BIPM, established by the Metre Convention in 1875,\nb) that, in view of the history of the text of the OIML Convention, it is likely that the term 'colleague' used in Article XVII of the OIML Convention refers to another CIML Member,\nc) the role of the OIML as an international standard-setting organization, and the evolution of the functioning of the CIML in the light of that role, namely that CIML decisions are increasingly viewed as decisions of the OIML Members,", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: noting
      message:
        - { content: "Noting that Article XIII of the OIML Convention was amended in 1968, changing the composition of the CIML from a maximum of 20 members elected by the Conference to one representative per OIML Member, designated by his/her government,\nIs of the opinion that it may sometimes be more appropriate for a CIML Member who is unable to attend a CIML Meeting, to delegate his/her vote to someone from his/her own government or administration, instead of to another CIML Member,", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: resolves
      message:
        - { content: "Resolves to request the 14th OIML Conference to approve the following interpretation, applicable to the first paragraph of Article XVII of the OIML Convention:\n\"A colleague' may be: either another CIML Member or someone designated by the absent CIML Member to represent him/her. In the latter case, the representative shall be from the same government or administration as the absent CIML Member and may not represent other CIML Members, i.e. may not receive proxies from other CIML Members\".", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
  - identifier: CIML/2011/27
