  - identifier: CIML/2011/28
    language: fr
    title:
      - { content: "Demande à la 14ème Conférence de prendre cet avis en compte dans le budget", lang: fr }
    subject:
      - { content: "Conférence OIML", lang: fr }
    doi: "10.63493/resolutions/ciml201128"
    urn: "urn:oiml:doc:ciml:resolution:2011-28"
    dates:
    - start: '2011-10-11'
      kind: decision
    considerations:
    - type: considering
      message:
        - { content: "Considérant :\n- que les recettes provenant des abonnements payants au Bulletin de l'OIML sont relativement faibles ;\n- que le Bulletin de l'OIML demeure un canal de communication indispensable à ses Membres ainsi qu'à d'autres parties intéressées ; et\n- que le Bulletin de l'OIML doit être diffusé auprès d'un public aussi large que possible,\nEstimant que :\n- le Bulletin de l'OIML doit devenir gratuit ;\n- que les versions numériques du Bulletin de l'OIML doivent être disponibles en téléchargement à partir du site Internet, et ce sans aucune restriction ;\n- que les exemplaires imprimés du Bulletin de l'OIML ne doivent être fournis qu'aux États Membres de l'OIML et aux Membres Correspondants,", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: requests
      message:
        - { content: "Demande à la 14ème Conférence de prendre cet avis en compte dans le budget de la période budgétaire 2013-2016.", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
