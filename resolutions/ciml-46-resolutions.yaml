  - identifier: CIML/2011/7
    language: en
    title:
      - { content: Resolves, lang: en }
    subject:
      - { content: CIML, lang: en }
    doi: "10.63493/resolutions/ciml201107"
    urn: "urn:oiml:doc:ciml:resolution:2011-07"
    dates:
    - start: '2011-10-11'
      kind: decision
    considerations:
    - type: recalling
      message:
        - { content: "Recalling its Resolution \"CIML 1975-IXc\" establishing the BIML Translation Center,", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: considering
      message:
        - { content: "Considering\na) the original purpose of the BIML Translation Center, i.e. to make information contained in certain working documents and publications, available to non-French speaking Members,\nb) that the BIML Translation Center is funded by voluntary subsidies made by certain Member States and that the use of these funds is restricted to the translation of documents from French to English,\nc) the increased use of English as the working language of the Organization and consequently, the decrease in demand for translations into English, resulting in ever growing funds in the special account of the BIML Translation Center,\nd) that it is considered necessary to make certain OIML Publications available in both English and French,\ne) that, to increase the efficiency and effectiveness of the BIML, in particular regarding the dissemination of information to Members, it is desirable to make (historical) documents (Conference and Committee minutes and resolutions, OIML Bulletins, etc.) available in electronic format,", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: resolves
      message:
        - { content: "Resolves\na) that the funds in the special account of the BIML Translation Center may be used, as necessary, for translation and interpretation activities that are not currently part of the normal operation of the Bureau, in particular:\n- the translation of documents (with particular priority to translating from English to French to reduce the backlog of Publications into French);\n- interpretation on an experimental basis at Conferences and Committee Meetings;\n- converting existing documents of interest to the work of the Organization (minutes and resolutions of past Conferences and Committee Meetings and other relevant documents) into a suitable electronic format;\nb) to decrease the base contribution for the BIML Translation Center to EUR 200,", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: instructs
      message:
        - { content: "Instructs the Bureau to\na) continue to manage the BIML Translation Center, taking this Resolution into account,\nb) make translated and converted documents available to the Members in a suitable electronic format,\nc) report annually to the Committee on the functioning of the BIML Translation Center.", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
