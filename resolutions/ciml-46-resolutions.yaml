  - identifier: CIML/2011/7
    language: fr
    title:
      - { content: "Décide ", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml201107"
    urn: "urn:oiml:doc:ciml:resolution:2011-07"
    dates:
    - start: '2011-10-11'
      kind: decision
    considerations:
    - type: recalling
      message:
        - { content: "Rappelant sa résolution « CIML 1975-IXc » établissant le Centre de traduction du BIML,", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: considering
      message:
        - { content: "Considérant :\na) L'objectif initial du Centre de traduction du BIML, à savoir rendre l'information contenue dans certains documents de travail et publications accessible aux Membres non francophones,\nb) Que le Centre de traduction du BIML est financé par les subventions volontaires faites par certains États Membres et que l'utilisation de ces fonds est limitée à la traduction de documents du français vers l'anglais,\nc) L'usage croissant de l'anglais comme langue de travail de l'Organisation et, par conséquent, la baisse du besoin de traductions vers l'anglais, ce qui a pour conséquence une accumulation continue des fonds dans le compte spécial du Centre de traduction du BIML,\nd) Qu'il apparaît nécessaire de rendre disponibles certaines publications de l'OIML dans les deux langues : français et anglais,\ne) Que, pour améliorer le fonctionnement et accroître l'efficacité du BIML, en particulier en ce qui concerne la diffusion de l'information à ses Membres, il est souhaitable de rendre les documents (historiques) (compte rendus et résolutions des Conférences et Comités, Bulletins de l'OIML, etc.) disponibles en format électronique,", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: decides
      message:
        - { content: "Décide :\na) Que les fonds du compte spécial du Centre de traduction du BIML peuvent être utilisés, si nécessaire, pour des activités de traduction et d'interprétation qui n'entrent pas à ce jour dans les attributions du Bureau, notamment :\n- la traduction de documents (avec une priorité particulière pour les traductions de l'anglais vers le français afin de réduire le retard des publications en français) ;\n- l'interprétation sur une base expérimentale aux Conférences et Réunions du Comité ;\n- la conversion de documents existants qui présentent un intérêt pour les travaux de l'Organisation (comptes rendus et résolutions des Conférences et Réunions de Comité passées, ainsi que tous autres documents importants) en un format électronique adéquat ;\nb) de réduire la contribution de base au Centre de traduction du BIML à 200 euros, Donne instruction au Bureau de :\na) continuer à gérer le Centre de traduction du BIML en prenant la présente Résolution en compte,\nb) rendre les documents traduits et convertis accessibles aux Membres dans un format électronique adéquat,\nc) rendre compte au Comité, tous les ans, du fonctionnement du Centre de traduction du BIML.", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
