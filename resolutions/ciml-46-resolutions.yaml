      kind: decision
    considerations:
    - type: noting
      message:
        - { content: "Prenant note de l'élaboration de la 3ème édition du Vocabulaire international de métrologie – Concepts fondamentaux et généraux et termes associés (VIM) par le Comité conjoint pour les guides de métrologie (JCGM), dont l'OIML est Membre adhérent,", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: noting
      message:
        - { content: "Prenant note de la publication de la 3ème édition du VIM en tant que lexique de I'OIML (OIML V 2-200:2010),", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: recalling
      message:
        - { content: "Rappelant les exigences en matière d'élaboration et de présentation des termes et définitions dans les Recommandations et les Documents de I'OIML, telles que fixées dans I'annexe B de I'OIML B 6-2:1993, et en particulier dans le paragraphe B.1.2 « Avoidance of duplications and contradictions » (ca. Comment éviter les répétitions inutiles et les contradictions),", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: considering
      message:
        - { content: "Considérant l'achèvement imminent de la révision du Vocabulaire international des termes de métrologie légale par le TC 1 de l'OIML,", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: decides
      message:
        - { content: "Décide que :\na) les Recommandations et Documents actuels de l'OIML, qu'ils soient nouveaux ou fassent l'objet d'une révision, doivent appliquer la terminologie et les définitions du VIM et du VIML sans amendement,\nb) des termes et définitions issus de lexiques internationaux relatifs à d'autres domaines (par exemple les statistiques) peuvent être adaptés lorsque la notion à laquelle ils se rapportent dans la métrologie légale est différente, les différences conceptuelles devant alors être développées dans une note explicative,\nc) lorsque, dans les publications de l'OIML autres que les Recommandations et Documents, des termes et définitions utilisés différent de ceux du VIM et du VIML, les différences doivent, si nécessaire, être indiquées dans des notes explicatives,\nDonne instruction au BIML de vérifier la bonne mise en application de cette Résolution à tous les stades de l'élaboration des publications de l'OIML.", lang: fr }
      dates:
      - start: '2011-10-11'
        kind: effective
