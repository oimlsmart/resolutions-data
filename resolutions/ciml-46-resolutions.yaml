      title: "Approves the establishment of a new Subcommittee of TC 3, to be titled \"Conformity"
      subject: CIML
      considerations:
      - type: recalling
        message: |
          Recalling its Resolutions no.15 and no.19 of its 45th Meeting,
        dates:
        - start: '2011-10-11'
          kind: effective
      - type: noting
