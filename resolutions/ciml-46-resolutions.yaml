    number: 2011/24
  doi: 10.63493/resolutions/ciml201124
  urn: urn:oiml:doc:ciml:resolution:2011-24
  agenda_item: '24'
  dates:
  - date: '2011-10-11'
    type: decided
  title:
  - spelling: eng
    value: Resolves
  - spelling: fra
    value: 'Décide que '
  considerations:
  - type: noting
    date_effective:
      date: '2011-10-11'
      type: effective
    message:
    - spelling: eng
      value: Noting the development of the 3rd edition of the International Vocabulary
        of Metrology Basic and General Concepts and Associated Terms (VIM) by the
        Joint Committee for Guides in Metrology (JCGM) of which the OIML is a Member
        Organization,
    - spelling: eng
      value: Noting the publication of the 3rd edition of the VIM as an OIML Vocabulary
        (OIMLV2-200:2010),
    - spelling: fra
      value: Prenant note de l'élaboration de la 3ème édition du Vocabulaire international
        de métrologie – Concepts fondamentaux et généraux et termes associés (VIM)
        par le Comité conjoint pour les guides de métrologie (JCGM), dont l'OIML est
        Membre adhérent,
    - spelling: fra
      value: Prenant note de la publication de la 3ème édition du VIM en tant que
        lexique de l'OIML (OIML V 2-200:2010),
  - type: recalling
    date_effective:
      date: '2011-10-11'
      type: effective
    message:
    - spelling: eng
      value: Recalling the requirements for the drafting and presentation of terms
        and definitions in OIML Recommendations and Documents as laid down in Annex
        B of OIML B 6-2:1993, and in particular paragraph B.1.2 "Avoidance of duplications
        and contradictions",
    - spelling: fra
      value: Rappelant les exigences en matière d'élaboration et de présentation des
        termes et définitions dans les Recommandations et les Documents de I'OIML,
        telles que fixées dans I'annexe B de I'OIML B 6-2:1993, et en particulier
        dans le paragraphe B.1.2 « Avoidance of duplications and contradictions »
        (ca. Comment éviter les répétitions inutiles et les contradictions),
  - type: considering
    date_effective:
      date: '2011-10-11'
      type: effective
    message:
    - spelling: eng
      value: Considering the imminent completion of the revision of the International
        Vocabulary of Legal Metrology (VIML) by OIML TC 1,
    - spelling: fra
      value: Considérant l'achèvement imminent de la révision du Vocabulaire international
        des termes de métrologie légale par le TC 1 de l'OIML,
  actions:
  - type: resolves
    date_effective:
      date: '2011-10-11'
      type: effective
    message:
    - spelling: eng
      value: |-
        Resolves
        a) that new, and revisions of existing OIML Recommendations and Documents should apply the terminology and definitions of the VIM and the VIML without amendment,
        b) that terms and definitions from international vocabularies from other fields (for instance statistics) may be adapted when the concept that they pertain to in legal metrology is different and that such conceptual differences should be explained in a note,
        c) that when, in OIML Publications other than Recommendations and Documents, terms and definitions are used that differ from those in the VIM and the VIML, these differences should be indicated in notes, as appropriate,
  - type: instructs
    date_effective:
      date: '2011-10-11'
      type: effective
    message:
    - spelling: eng
      value: Instructs the BIML to monitor the correct implementation of this Resolution
        at all stages of the preparation of OIML Publications.
  - type: decides
    date_effective:
      date: '2011-10-11'
      type: effective
    message:
    - spelling: fra
      value: |-
        Décide que :
        a) les Recommandations et Documents actuels de l'OIML, qu'ils soient nouveaux ou fassent l'objet d'une révision, doivent appliquer la terminologie et les définitions du VIM et du VIML sans amendement,
        b) des termes et définitions issus de lexiques internationaux relatifs à d'autres domaines (par exemple les statistiques) peuvent être adaptés lorsque la notion à laquelle ils se rapportent dans la métrologie légale est différente, les différences conceptuelles devant alors être développées dans une note explicative,
        c) lorsque, dans les publications de l'OIML autres que les Recommandations et Documents, des termes et définitions utilisés différent de ceux du VIM et du VIML, les différences doivent, si nécessaire, être indiquées dans des notes explicatives,
        Donne instruction au BIML de vérifier la bonne mise en application de cette Résolution à tous les stades de l'élaboration des publications de l'OIML.
