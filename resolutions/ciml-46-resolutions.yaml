        kind: effective
    - type: instructs
      message:
        - { content: "Instructs the Bureau to produce a guidance document no later than 1 December 2011 setting out the arrangements for implementation and to introduce the new arrangements from 1 January 2012 in an orderly way,", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: establishes
      message:
        - { content: "Establishes an ad-hoc working group, chaired by the Second Vice-President, to consider improvements to OIML B 6-1 and OIML B 6-2, suggested by CIML Members in the light of the experience of operating the new procedures, and", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: instructs
      message:
        - { content: Instructs the ad-hoc working group to present proposals for the amendment of OIML B 6-1 and OIML B 6-2 for consideration at its 47th Meeting., lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
  - identifier: CIML/2011/24
    language: en
    title:
      - { content: Resolves, lang: en }
    subject:
      - { content: CIML, lang: en }
    doi: "10.63493/resolutions/ciml201124"
    urn: "urn:oiml:doc:ciml:resolution:2011-24"
    dates:
    - start: '2011-10-11'
      kind: decision
    considerations:
    - type: noting
      message:
        - { content: "Noting the development of the 3rd edition of the International Vocabulary of Metrology Basic and General Concepts and Associated Terms (VIM) by the Joint Committee for Guides in Metrology (JCGM) of which the OIML is a Member Organization,", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: noting
      message:
        - { content: "Noting the publication of the 3rd edition of the VIM as an OIML Vocabulary (OIMLV2-200:2010),", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: recalling
      message:
        - { content: "Recalling the requirements for the drafting and presentation of terms and definitions in OIML Recommendations and Documents as laid down in Annex B of OIML B 6-2:1993, and in particular paragraph B.1.2 \"Avoidance of duplications and contradictions\",", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: considering
      message:
        - { content: "Considering the imminent completion of the revision of the International Vocabulary of Legal Metrology (VIML) by OIML TC 1,", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: resolves
      message:
        - { content: "Resolves\na) that new, and revisions of existing OIML Recommendations and Documents should apply the terminology and definitions of the VIM and the VIML without amendment,\nb) that terms and definitions from international vocabularies from other fields (for instance statistics) may be adapted when the concept that they pertain to in legal metrology is different and that such conceptual differences should be explained in a note,\nc) that when, in OIML Publications other than Recommendations and Documents, terms and definitions are used that differ from those in the VIM and the VIML, these differences should be indicated in notes, as appropriate,", lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: instructs
      message:
        - { content: Instructs the BIML to monitor the correct implementation of this Resolution at all stages of the preparation of OIML Publications., lang: en }
      dates:
      - start: '2011-10-11'
        kind: effective
