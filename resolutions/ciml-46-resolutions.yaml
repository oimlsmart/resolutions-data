    - language_code: eng
      script: Latn
      title: Requests the 14th Conference to take account of this opinion in the budget for
      subject: OIML Conference
      considerations:
      - type: considering
        message: |
          Considering
          - that the net revenue from the paid subscriptions for the OIML Bulletin is relatively small;
          - that the OIML Bulletin is still an indispensible means of communication to the Members and other interested parties; and
          - that the OIML Bulletin should be circulated to as wide an audience as possible,
          Of the opinion that
          - the OIML Bulletin should be rendered free of charge;
          - electronic versions of all issues of the OIML Bulletin should be available for download on the OIML web site without restriction;
          - printed copies of the OIML Bulletin should be provided only to OIML Member States and Corresponding Members,
        dates:
        - start: '2011-10-11'
          kind: effective
      actions:
      - type: requests
        message: |
          Requests the 14th Conference to take account of this opinion in the budget for the 2013-2016 budget period.
        dates:
        - start: '2011-10-11'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Demande à la 14ème Conférence de prendre cet avis en compte dans le budget"
      subject: "Conférence OIML"
      considerations:
      - type: considering
        message: |
          Considérant :
          - que les recettes provenant des abonnements payants au Bulletin de l'OIML sont relativement faibles ;
          - que le Bulletin de l'OIML demeure un canal de communication indispensable à ses Membres ainsi qu'à d'autres parties intéressées ; et
          - que le Bulletin de l'OIML doit être diffusé auprès d'un public aussi large que possible,
          Estimant que :
          - le Bulletin de l'OIML doit devenir gratuit ;
          - que les versions numériques du Bulletin de l'OIML doivent être disponibles en téléchargement à partir du site Internet, et ce sans aucune restriction ;
          - que les exemplaires imprimés du Bulletin de l'OIML ne doivent être fournis qu'aux États Membres de l'OIML et aux Membres Correspondants,
        dates:
        - start: '2011-10-11'
          kind: effective
      actions:
      - type: requests
        message: |
          Demande à la 14ème Conférence de prendre cet avis en compte dans le budget de la période budgétaire 2013-2016.
        dates:
        - start: '2011-10-11'
          kind: effective
