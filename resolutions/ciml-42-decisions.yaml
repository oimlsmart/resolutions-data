  localizations:
  - language_code: eng
    title: 'Agenda Item 5.1: Report on PWGDC and JCDCMAS activities                               Written
      report'
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of presentations given by Mr. Dunmill and
        Dr. Seiler and instructed the Bureau to prepare, with Dr. Seiler, a procedure
        to identify and reward exemplary actions carried out by Developing Countries
        for the progress of legal metrology. This procedure will be submitted to the
        CIML for approval.

        '
      date_effective:
        date: '2007-10-24'
        type: effective
  - language_code: fra
    title: 'Agenda Item 5.1: Report on PWGDC and JCDCMAS activities                               Written
      report'
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note des exposés de M. Dunmill et du Docteur Seiler
        et a chargé le Bureau de préparer, avec le Docteur Seiler, une procédure visant
        à identifier et récompenser les actions exemplaires accomplies par les Pays
        en Développement pour l''avancée de la métrologie légale. Cette procédure
        sera soumise à l''approbation du CIML.

        '
      date_effective:
        date: '2007-10-24'
        type: effective
  agenda_item: '5.1'
