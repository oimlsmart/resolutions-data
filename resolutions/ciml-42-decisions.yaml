      message: 'Le Comité a pris note d''un exposé du Directeur du BIML et a chargé
        le Bureau de continuer sa coopération avec WELMEC concernant ce point. Le
        Comité a également demandé aux participants européens des TC/SC concernés
        de rédiger les premiers projets de tableaux de correspondance avec les exigences
        de la MID dès qu''une Recommandation reçoit le statut de DR (Draft Recommendation).

