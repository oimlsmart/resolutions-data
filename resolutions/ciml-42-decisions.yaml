  - language_code: eng
    title: 'Agenda Item 6.1: Presentation by the Bureau on liaison activities and
      joint actions   Written report'
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of a report given by the BIML Director on
        Liaison activities with other Organizations and instructed the CIML President
        to sign the extension of the existing ILAC-OIML MoU to also include the IAF.

        '
      date_effective:
        date: '2007-10-24'
        type: effective
    - type: notes
      message: 'The Committee asked the CIML President to monitor and update, if necessary,
        the joint working programs with the BIPM, ILAC and IAF.

        '
      date_effective:
        date: '2007-10-24'
        type: effective
