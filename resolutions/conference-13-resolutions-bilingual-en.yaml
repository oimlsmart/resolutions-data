    dates:
    - start: '2008-10-29'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Conference made the recommendation to CIML Members to keep other National Departments informed of OIML work, and to invite them to contribute to this work.
      dates:
      - start: '2008-10-29'
        kind: effective
  - identifier: Conference/2008/4a
    doi: "10.63493/resolutions/conf20084a"
    urn: "urn:oiml:doc:conf:resolution:13.4a"
    subject: OIML Conference
    title: The Conference took note of the comments made concerning the possibility of a rapprochement
    dates:
    - start: '2008-10-29'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Conference took note of the comments made concerning the possibility of a rapprochement with the BIPM. It instructed the Committee and the BIML to further study this issue and to continue strengthening the cooperation with the BIPM.
      dates:
      - start: '2008-10-29'
        kind: effective
  - identifier: Conference/2008/4b
    doi: "10.63493/resolutions/conf20084b"
    urn: "urn:oiml:doc:conf:resolution:13.4b"
    subject: OIML Conference
    title: "In order to better assist developing countries, the Conference considered it desirable that Publicat…"
    dates:
    - start: '2008-10-29'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        In order to better assist developing countries, the Conference considered it desirable that Publication D 1 Elements for a law on metrology be revised to take account of the latest developments in world trade, such as conformity assessment, certification and globalization. The Conference instructed the Committee to start a revision of Publication D 1.
      dates:
      - start: '2008-10-29'
        kind: effective