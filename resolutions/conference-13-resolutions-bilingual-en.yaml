    title: The Conference made the recommendation that CIML Members complete the inquiry on the implementation
    dates:
    - start: '2008-10-29'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Conference made the recommendation that CIML Members complete the inquiry on the implementation of OIML Recommendations as accurately as possible and as soon as possible, and further made the recommendation that Member States update it each time a new or revised National Regulation is adopted.
      dates:
      - start: '2008-10-29'
        kind: effective
