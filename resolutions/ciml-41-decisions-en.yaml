    subject: CIML
    title: Assets and liabilities as at 01/01/2005 and 31/12/2005
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee took note of information given by the BIML Director concerning the estimation of the assets and liabilities according to the new accountancy system laid down by the new Financial Regulations.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/3.3
    doi: "10.63493/resolutions/ciml20063.3"
    urn: "urn:oiml:doc:ciml:resolution:2006-3.3"
    subject: CIML
    title: Financial report for 2005 and estimates for 2006
    dates:
    - start: '2006-10-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee took note of a presentation given by the BIML Director concerning the 2005 financial period and the estimates for 2006. It noted that the 2005 result was better than forecast. In 2006, savings should partially compensate the Pension Fund endowment increase.
      dates:
      - start: '2006-10-18'
        kind: effective
    - type: instructs
      message: |
        The Committee instructed the Bureau to prepare preliminary figures for the 2009-2012 budget taking account of this endowment. These figures would require discussion at the 42nd CIML Meeting in 2007.
      dates:
      - start: '2006-10-18'
        kind: effective
  - identifier: CIML/2006/3.4
    doi: "10.63493/resolutions/ciml20063.4"
