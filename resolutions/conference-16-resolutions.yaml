        kind: effective
    - type: considering
      message:
        - { content: "Considérant que le nombre total de parts contributives de base, compte tenu du classement des États Membres tel que révisé en 2021, est de 147 pour l'année 2022 et de 148 pour les années 2023-2025,\nRésolu :\na) Le montant global des crédits nécessaires pour la période financière 2022-2025 est de 10 358 944 € ;\nb) La progression de la part contributive de base (contribution annuelle pour un État Membre de la classe 1 telle que définie à l'article XXVI (1) de la Convention OIML B 1:1968) au cours de l'exercice 2022-2025 est la suivante :\n2022: €14200\n2023: €14400\n2024: €14600\n2025: €14800\nc) Il en résultat les contributions totales suivantes, pour la période financière 2022-2025, pour les États Membres classés selon l'article XXVI (1) de la Convention OIML B 1:1968 :\n|===\n| Année | Classe 1 | Classe 2 | Classe 3 | Classe 4\n| 2022 | €14 200 | €28 400 | €56 800 | €113 600\n| 2023 | €14 400 | €28 800 | €57 600 | €115 200\n| 2024 | €14 600 | €29 200 | €58 400 | €116 800\n| 2025 | €14 800 | €29 600 | €59 200 | €118 400\n| Total | €58 000 | €116 000 | €232 000 | €464 000\n|===\n<div align=\"center\">\nd) Il en résultat les contributions totales suivantes, sur la période financière 2022-2025, pour les Membres Correspondants, classés selon les mêmes critères que pour les États Membres :\n</div>\n|===\n| Année | Classe 1 | Classe 2 | Classe 3 | Classe 4\n| 2022 | €1 420 | €1 420 | €1 420 | €1 420\n| 2023 | €1 440 | €2 880* | €5 760 | €11 520\n| 2024 | €2 010 | €4 020 | €8 040 | €16 080\n| 2025 | €2 820 | €5 640 | €11 280 | €22 560\n| Total | €7 690 | €13 960 | €26 500 | €51 580\n|===\n$ ^{*} $ Note du BIML au 2022-05-25 :\nErreur typographique corrigée de €2 800 à €2 880 pour s'aligner sur l'Addendum 10.1 de la Conférence.\ne) Pour la période financière 2022-2025, les États Membres nouvellement admis ou réadmis ne paient pas de droit d'entrée.", lang: fr }
      dates:
      - start: '2021-10-20'
        kind: effective
