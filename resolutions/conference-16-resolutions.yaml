- identifier:
  - prefix: Conference
    number: 2021/11
  doi: 10.63493/resolutions/conf202111
  urn: urn:oiml:doc:conf:resolution:16.11
  agenda_item: '11'
  dates:
  - date: '2021-10-20'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 11: Review and approval of Draft Conference Resolutions (Session
      1)'
    subject: OIML Conference
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Having regard to Article X of OIML B 1:1968 OIML Convention,
    - type: considering
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Considering the standing practice to organise a Conference once every
        four years,
    actions:
    - type: resolves
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Resolves to charge the Committee with organising the 17th OIML Conference
        in 2025, the venue and dates to be decided by the Committee, and
    - type: supports
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Supports the organisation of a joint OIML-BIPM event on the occasion
        of the 150th Anniversary of the Metre Convention and the 70th Anniversary
        of the OIML in 2025.
  - language_code: fra
    title: 'Agenda Item 11: Review and approval of Draft Conference Resolutions (Session
      1)'
    subject: Conférence OIML
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Vu l'article X de la convention OIML B 1:1968,
    - type: considering
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Considérant la pratique courante d'organiser une Conférence tous les
        quatre ans,
    actions:
    - type: decides
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Décide de charger le Comité d'organiser la 17ème Conférence OIML en
        2025, le lieu et les dates devant être décidés par le Comité, et
    - type: endorses
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Soutient l'organisation d'un événement commun OIML-BIPM à l'occasion
        du 150ème Anniversaire de la Convention du Mètre et du 70ème Anniversaire
        de l'OIML en 2025.
