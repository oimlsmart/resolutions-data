    title: Agenda item 9
    subject: OIML Conference
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Having regard to Article XXV, penultimate paragraph, of OIML B 1:1968
        OIML Convention,
    - type: noting
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Noting Resolutions 2017/06 of the 52nd CIML Meeting, 2018/05 of the
        53rd CIML Meeting, 2019/06 of the 54th CIML Meeting, 2020/08 of the 55th CIML
        Meeting, and CIML/2021/10 of the 56th CIML Meeting,
    - type: noting
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Noting that the budget was managed in conformity with the expenses
        necessary for carrying out the work of the Bureau and that the accuracy of
        the report has been certified by annual audits,
    - type: noting
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Noting that the respective functions assigned by the Convention to
        the President of the International Committee of Legal Metrology and to the
        Director of the International Bureau of Legal Metrology have been fulfilled,
    actions:
    - type: gives_discharge
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Gives its definitive discharge to the President of the Committee and
        to the Director of the Bureau for their management of the budget during the
        years mentioned above.
  - language_code: fra
    title: Ordre du jour point 9
    subject: Conférence OIML
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2021-10-20'
        type: effective
      message: |-
        Vu l'article XXV, avant-dernier paragraphe, de la Convention OIML B 1:1968,
        Prenant acte des Résolutions 2017/06 de la 52ème Réunion du CIML, 2018/05 de la 53ème Réunion du CIML, 2019/06 de la 54ème Réunion du CIML, 2020/08 de la 55ème Réunion du CIML, et CIML/2021/10 de la 56ème Réunion du CIML,
    - type: noting
      date_effective:
        date: '2021-10-20'
        type: effective
      message: |-
        Notant que le budget a été géré en conformité avec les dépenses nécessaires à la réalisation des travaux du Bureau et que l'exactitude du rapport a été certifiée par des audits annuels,
        Constatant que les fonctions respective attribuées par la Convention au Président du Comité International de Métrologie Légale et au Directeur du Bureau International de Métrologie Légale ont été remplies,
        Donne sa décharge définitive au Président du Comité et au Directeur du Bureau pour leur gestion du budget pendant les années susmentionnées.
