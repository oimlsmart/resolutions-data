        OIML B 1:1968,
    - type: noting
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Prenant note du rapport sur les publications approuvées par le Comité
        depuis la 15ème Conférence en 2016 dans l'Addendum 12 au Document de Travail
        de la Conférence,
    actions:
    - type: decides
      date_effective:
