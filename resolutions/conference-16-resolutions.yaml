  - language_code: eng
    title: 'Agenda Item 10: Budget for the 2022–2025 financial period'
    subject: OIML Conference
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Having regard to Article VIII, first and fifth paragraphs, of OIML
        B 1:1968 OIML Convention,
    - type: noting
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Noting the report on publications approved by the Committee since the
