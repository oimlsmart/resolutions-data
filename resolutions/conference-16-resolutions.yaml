- identifier:
  - prefix: Conference
    number: 2021/07
  doi: 10.63493/resolutions/conf202107
  urn: urn:oiml:doc:conf:resolution:16.07
  agenda_item: '07'
  dates:
  - date: '2021-10-20'
    type: decided
  localizations:
  - language_code: eng
    title: Agenda item 10.1
    subject: OIML Conference
    considerations:
    - type: recalling
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Recalling Resolution Conference/2021/06, which endorses Resolution
        CIML/2021/13 allocating Corresponding Members to classes in 2023 using the
        same criteria as for Member States, specified in Article XXVI (1) of OIML
        B 1:1968 OIML Convention,
    actions:
    - type: endorses
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Endorses the principle described in Resolution CIML/2021/13 whereby
        increases in the annual Corresponding Member contributory fees will start
        in 2024 and progressively continue, with the aim of becoming 50 % of the annual
        Member State contribution for their applicable class in 2028, and
    - type: rescinds
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Rescinds Resolution 2008/15 of the 13th OIML Conference which set the
        annual Corresponding Member fee.
  - language_code: fra
    title: Approuve le principe décrit dans la Résolution CIML/2021/13 selon lequel
      les augmentations des cotis…
    subject: Conférence OIML
    considerations:
    - type: recalling
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Rappelant la Résolution Conférence/2021/06, qui approuve la résolution
        CIML/2021/13 attribuant les Membres Correspondants aux classes en 2023 en
        utilisant les mêmes critères que pour les États Membres, spécifiés dans l'article
        XXVI (1) de la Convention OIML B 1:1968,
    actions:
    - type: approves
      date_effective:
        date: '2021-10-20'
        type: effective
      message: |-
        Approuve le principe décrit dans la Résolution CIML/2021/13 selon lequel les augmentations des cotisations annuelles des Membres Correspondants commenceront en 2024 et se poursuivront progressivement, dans le but d'atteindre 50 % de la cotisation annuelle d'un État Membre pour leur classe applicable en 2028, et
        Annule la Résolution 2008/15 de la 13ème Conférence de l'OIML qui fixait la cotisation annuelle des Membres Correspondants.
- identifier:
  - prefix: Conference
    number: 2021/08
  doi: 10.63493/resolutions/conf202108
  urn: urn:oiml:doc:conf:resolution:16.08
  agenda_item: '08'
  dates:
  - date: '2021-10-20'
    type: decided
  localizations:
  - language_code: eng
    title: Agenda item 10.2
    subject: OIML Conference
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Having regard to Article XXIV, first paragraph, Article XXVI (1), and
        Article XXVIII, second paragraph, of OIML B 1:1968 OIML Convention,
    - type: noting
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Noting Resolution 2012/8 of the 14th OIML Conference, which states
        that changes in the classification of Member States takes place from the second
        year of the following financial period,
    - type: noting
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Noting the information contained in Resolution Conference/2021/06 of
        the 16th OIML Conference, Noting Resolution CIML/2021/13 and CIML/2021/14
        of the 56th CIML Meeting,
    - type: considering
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Considering that the total number of base contributory shares, taking
        into account the classification of Member States as reviewed in 2021, is 147
        for the year 2022 and 148 for the years 2023-2025,
    actions:
    - type: resolves
      date_effective:
        date: '2021-10-20'
        type: effective
      message: |-
        Resolves:
        a) The overall amount of credits necessary for the 2022-2025 financial period shall be €10358944;
        b) The progression of the base contributory share (annual contribution for a Member State in Class 1 as defined in Article XXVI (1) of OIML B 1:1968 OIML Convention) over the 2022-2025 financial period shall be as follows:
        2022: €14200
        2023: 14400
        2024: €14600
        2025: €14800
        c) This results in the following total contributions, over the 2022-2025 financial period, for Member States classified according to Article XXVI (1) of OIML B 1:1968 OIML Convention:
        |===
        | Year | Class1 | Class2 | Class3 | Class4
        | 2022 | €14200 | €28400 | €56800 | €113600
        | 2023 | €14400 | €28800 | €57600 | €115200
        | 2024 | €14600 | €29200 | €58400 | €116800
        | 2025 | €14800 | €29600 | €59200 | €118400
        | Total | €58000 | €116000 | €232000 | €464000
        |===
        d) This results in the following total contributions, over the 2022-2025 financial period, for Corresponding Members, classified using the same criteria as for Member States:
        |===
        | Year | Class1 | Class2 | Class3 | Class4
        | 2022 | €1420 | €1420 | €1420 | €1420
        | 2023 | €1440 | €2880* | €5760 | €11520
        | 2024 | €2010 | €4020 | €8040 | €16080
        | 2025 | €2820 | €5640 | €11280 | €22560
        | Total | €7690 | €13960 | €26500 | €51580
        |===
        $ ^{*} $ BIML note 2022-05-25: Typographical error corrected from €2 800 to €2 880 to align with Conference Addendum 10.1.
        e) For the 2022-2025 financial period, newly admitted or readmitted Member States shall not pay an entry fee.
  - language_code: fra
    title: Ordre du jour point 10.2
    subject: Conférence OIML
    considerations:
    - type: having_regard_to
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Vu l'article XXIV, premier alinéa, l'article XXVI, paragraphe 1, et
        l'article XXVIII, deuxième alinéa, de la Convention OIML B 1:1968,
    - type: noting
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Prenant note de la Résolution 2012/8 de la 14ème Conférence de l'OIML,
        qui stipule que les changements dans la classification des États Membres ont
        lieu à partir de la deuxième année de l'exercice financier suivant,
    - type: noting
      date_effective:
        date: '2021-10-20'
        type: effective
      message: |-
        Prenant note des informations contenues dans la Résolution Conférence/2021/06 de la 16ème Conférence de l'OIML,
        Prenant acte des Résolutions CIML/2021/13 et CIML/2021/14 de la 56ème Réunion du CIML,
    - type: considering
      date_effective:
        date: '2021-10-20'
        type: effective
      message: |-
        Considérant que le nombre total de parts contributives de base, compte tenu du classement des États Membres tel que révisé en 2021, est de 147 pour l'année 2022 et de 148 pour les années 2023-2025,
        Résolu :
        a) Le montant global des crédits nécessaires pour la période financière 2022-2025 est de 10 358 944 € ;
        b) La progression de la part contributive de base (contribution annuelle pour un État Membre de la classe 1 telle que définie à l'article XXVI (1) de la Convention OIML B 1:1968) au cours de l'exercice 2022-2025 est la suivante :
        2022: €14200
        2023: €14400
        2024: €14600
        2025: €14800
        c) Il en résultat les contributions totales suivantes, pour la période financière 2022-2025, pour les États Membres classés selon l'article XXVI (1) de la Convention OIML B 1:1968 :
        |===
        | Année | Classe 1 | Classe 2 | Classe 3 | Classe 4
        | 2022 | €14 200 | €28 400 | €56 800 | €113 600
        | 2023 | €14 400 | €28 800 | €57 600 | €115 200
        | 2024 | €14 600 | €29 200 | €58 400 | €116 800
        | 2025 | €14 800 | €29 600 | €59 200 | €118 400
        | Total | €58 000 | €116 000 | €232 000 | €464 000
        |===
        <div align="center">
        d) Il en résultat les contributions totales suivantes, sur la période financière 2022-2025, pour les Membres Correspondants, classés selon les mêmes critères que pour les États Membres :
        </div>
        |===
        | Année | Classe 1 | Classe 2 | Classe 3 | Classe 4
        | 2022 | €1 420 | €1 420 | €1 420 | €1 420
        | 2023 | €1 440 | €2 880* | €5 760 | €11 520
        | 2024 | €2 010 | €4 020 | €8 040 | €16 080
        | 2025 | €2 820 | €5 640 | €11 280 | €22 560
        | Total | €7 690 | €13 960 | €26 500 | €51 580
        |===
        $ ^{*} $ Note du BIML au 2022-05-25 :
        Erreur typographique corrigée de €2 800 à €2 880 pour s'aligner sur l'Addendum 10.1 de la Conférence.
        e) Pour la période financière 2022-2025, les États Membres nouvellement admis ou réadmis ne paient pas de droit d'entrée.
    actions:
    - type: notes
      date_effective:
        date: '2021-10-20'
        type: effective
      message: Ordre du jour point 10.2
