  dates:
  - start: '2004-10-26'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'La Conférence a noté que la Zambie avait été radiée de la liste des
      États Membres faute de s''être conformée aux obligations établies par la Onzième
      Conférence.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
