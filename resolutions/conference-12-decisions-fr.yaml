- identifier: Conference/2004/2.1
  doi: 10.63493/resolutions/conf20042.1
  urn: urn:oiml:doc:conf:resolution:12.2.1
  subject: CIML
  title: Nouveaux Membres - Perspectives d'adhésions
  dates:
  - start: '2004-10-26'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'La Conférence a constaté que le nombre de Membres de l''OIML avait significativement
      augmenté depuis la Onzième Conférence, malgré le fait que plusieurs Membres
      Correspondants avaient été radiés pour non paiement de leur contribution pendant
      plus de trois ans. La Conférence a pris note du fait que certains Membres Correspondants
      envisageaient d''adhérer en tant qu''États Membres et que plusieurs pays/économies
      comptaient adhérer en tant que Membres Correspondants.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
- identifier: Conference/2004/2.2
  doi: 10.63493/resolutions/conf20042.2
