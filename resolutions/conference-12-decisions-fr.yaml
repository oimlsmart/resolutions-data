  subject: CIML
  title: Travaux entrepris - État d'avancement
  dates:
  - start: '2004-10-26'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'La Conférence a pris note d''un rapport concernant les activités des
      Comités Techniques et Sous-comités de l''OIML et a demandé au CIML de continuer
      à surveiller la situation et de trouver des solutions afin d''assurer une meilleure
      répartition des responsabilités techniques parmi les États Membres de l''OIML.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
- identifier: Conference/2004/5.2
  doi: 10.63493/resolutions/conf20045.2
  urn: urn:oiml:doc:conf:resolution:12.5.2
  subject: CIML
  title: Mise en application des Recommandations par les Membres de l'OIML
  dates:
  - start: '2004-10-26'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'La Conférence a pris note d''informations fournies par le Bureau concernant
      la mise en application des Recommandations OIML dans les réglementations nationales
      ou les normes d''application volontaire. Il a été constaté qu''en raison du
      faible taux de réponses, aucun rapport complet ne pouvait être donné.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
- identifier: Conference/2004/5.3
  doi: 10.63493/resolutions/conf20045.3
  urn: urn:oiml:doc:conf:resolution:12.5.3
  subject: CIML
  title: Sanction officielle des Recommandations déjà approuvées par le Comité en
    2001, 2002, 2003 et 2004
  dates:
  - start: '2004-10-26'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'La Conférence a décidé que les Formats de Rapport d''Essai OIML, qui
      sont de nature informative pour ce qui concerne leur application dans le cadre
      des réglementations nationales, doivent être approuvés par le CIML selon les
      règles applicables aux Documents Internationaux, sans devoir être sanctionnés
      par la Conférence.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
