    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'La Conférence a décidé d''attendre jusqu''à deux ans, c''est-à-dire
      jusqu''en 2006, une proposition d''un État Membre d''accueillir la Treizième
      Conférence en 2008. Si aucun État Membre n''y était disposé, alors le BIML organiserait
      la Conférence en France.

      '
