  subject: CIML
  title: DATE AND PLACE FOR THE NEXT MEETING
  dates:
  - start: '1988-10-24'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee accepted the proposals concerning the organization of
      the Eighth Conference: presidency, agenda, time table, etc.

      '
    dates:
    - start: '1988-10-24'
      kind: effective
  - type: notes
    message: 'The Committee adopted the work programmes for 1989-1992 submitted by
      the Pilot and Reporting Secretariats and by the Bureau. It instructed the Secretariats
      to follow these programmes as closely as possible and charged the Presidential
      Council with examining periodically the progress of the work and reporting to
      the Committee at each of its sessions.

      '
    dates:
    - start: '1988-10-24'
      kind: effective
  - type: notes
    message: 'The Committee considered that the priority criteria submitted by the
      Bureau were appropriate as a basis for the setting up of the work programmes
      for 1989-1992.

      '
    dates:
    - start: '1988-10-24'
      kind: effective
  - type: notes
    message: 'The Committee took note of the report on the activities of the BIML
      during the period September 1987 - October 1988.

      '
    dates:
    - start: '1988-10-24'
      kind: effective
  - type: notes
    message: 'The Committee elected :

      '
    dates:
    - start: '1988-10-24'
      kind: effective
  - type: notes
    message: 'The Committee examined the decisions of the Eighth Conference in view
      of their implementation.

      '
    dates:
    - start: '1988-10-24'
      kind: effective
  - type: decides
    message: 'The Committee decided to hold its 24th meeting in Paris during the last
      week of September 1989 in connection with a commemoration of the Bicentenary
      of the creation of the Metric System organized by the French government and
      a meeting of the International Committee of Weights and Measures.

      '
    dates:
    - start: '1988-10-24'
      kind: effective
