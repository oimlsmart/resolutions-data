    value: 'Agenda Item 3: EIGHTH CONFERENCE: ORGANIZATION OF THE SESSIONS, PRESIDENCY,
      AGENDA'
  actions:
  - type: notes
    date_effective:
      date: '1988-10-24'
      type: effective
    message:
    - spelling: eng
      value: The Committee accepted proposals from its President relating to the organization
        of the Eighth Conference. It also agreed to nominate respectively Mr RICHARDS,
        Chairman of the National Standards Commission (Australia), and Mr LEWISH (Austria)
        and Mr PUTERA (Indonesia), for the Presidency and the vice-Presidencies of
        the Conference. These nominations were proposed by Mr BIRCH and Mr BIRKELAND
        respectively.
