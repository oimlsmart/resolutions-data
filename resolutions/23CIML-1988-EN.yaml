  actions:
  - type: notes
    date_effective:
      date: '1988-10-24'
      type: effective
    message:
    - spelling: eng
      value: Mr ATHANE presented a number of proposals from Member States to disband
        existing Reporting Secretariats (because they had completed their work, or
        because their field of work had been subsumed into the work programme of another
        Secretariat, or because the subjects concerned were of low interest or were
        already completely dealt with by other international institutions), and to
        create new Secretariats.
