    - type: decides
      message: 'The Committee decided to hold its 24th meeting in Paris during the
        last week of September 1989 in connection with a commemoration of the Bicentenary
        of the creation of the Metric System organized by the French government and
        a meeting of the International Committee of Weights and Measures.

        '
