      date_effective:
        date: '1988-10-24'
        type: effective
    - type: notes
      message: 'The Committee adopted the work programmes for 1989-1992 submitted
        by the Pilot and Reporting Secretariats and by the Bureau. It instructed the
        Secretariats to follow these programmes as closely as possible and charged
        the Presidential Council with examining periodically the progress of the work
        and reporting to the Committee at each of its sessions.

        '
      date_effective:
        date: '1988-10-24'
        type: effective
    - type: notes
      message: 'The Committee considered that the priority criteria submitted by the
        Bureau were appropriate as a basis for the setting up of the work programmes
        for 1989-1992.

        '
