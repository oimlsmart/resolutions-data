    doi: "10.63493/resolutions/ciml201019"
    urn: "urn:oiml:doc:ciml:resolution:2010-19"
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations:
    - type: considering
      message:
        - { content: "Considérant les propositions émises par le Membre Australien en faveur de la création d'un nouveau projet et d'un nouveau (Sous-) Comité sur la Conformité au Type (CTT), et", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: considering
      message:
        - { content: "Considérant les commentaires formulés lors de la consultation des membres du Conseil de la Présidence, lors de la consultation ultérieure de l'ensemble des Membres du CIML ainsi que des Organisations en liaison concernées,", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    actions:
    - type: decides
      message:
        - { content: "Décide qu'une telle prise de décision concernant les propositions doit être reportée à la publication des conclusions du séminaire sur la CTT, cité à la Résolution n° 15 ; et", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Bureau de faciliter la mise en place d'un groupe de travail électronique, présidé par le Membre Néo-zélandais, en lui fixant pour objectif l'élaboration du programme de ce séminaire, en tenant compte des questions soulevées et des commentaires exprimés.", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
