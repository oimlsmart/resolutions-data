          The Committee took note of the oral report on the rapprochement with the BIPM; it requested its President to implement Resolution No. 3 of the 44th CIML Meeting and to prepare an interim report, with the assistance of certain CIML Members, to be presented to the 46th CIML meeting with a view to taking final decisions at the 14th Conference in 2012.
