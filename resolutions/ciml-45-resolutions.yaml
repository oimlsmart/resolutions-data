  - identifier: CIML/2010/26
    language: fr
    title:
      - { content: "Le Comité prend note : - des informations fournies par le Directeur du BIML", lang: fr }
    subject:
      - { content: "Conférence OIML", lang: fr }
    doi: "10.63493/resolutions/ciml201026"
    urn: "urn:oiml:doc:ciml:resolution:2010-26"
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message:
        - { content: "Le Comité prend note :\n- des informations fournies par le Directeur du BIML concernant le rapport de l'audit financier et de gestion réalisé en février 2010 ;\ndes mesures prises par le Bureau ; et\ndu Plan d'action proposé par le Bureau.", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: charges
      message:
        - { content: "Le Comité charge son Président :\n- d'envoyer le rapport d'audit, ainsi que les commentaires du Directeur du BIML sur ce rapport, aux Membres du CIML,\n- d'assurer le suivi de cette question, et\n- d'en rendre compte lors de la 46ème Réunion du CIML.", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: charges
      message:
        - { content: "Le Comité charge le Bureau de maintenir ses efforts d'amélioration vers une plus grande efficacité en termes de finances et de gestion.", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
  - identifier: CIML/2010/27
    language: fr
    title:
      - { content: "Le Comité prend note du rapport concernant le système de retraite et des observations", lang: fr }
    subject:
      - { content: "Conférence OIML", lang: fr }
    doi: "10.63493/resolutions/ciml201027"
    urn: "urn:oiml:doc:ciml:resolution:2010-27"
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message:
        - { content: "Le Comité prend note du rapport concernant le système de retraite et des observations formulées par Mr. Peter Mason et par le Dr. Philippe Richard.", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: notes
      message:
        - { content: "Le Comité prend note que la réévaluation des actifs permet de couvrir bien plus que la valeur des droits acquis et qu'il n'y aura pas besoin de procéder à un nouvel appel à contribution aux Etats Membres pour faire face à cet engagement.", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: charges
      message:
        - { content: "Le Comité charge le Bureau :\nde mettre en œuvre les normes IPSAS pour l'exercice 2010, en enregistrant l'intégralité des droits acquis dans le passif de I'OIML et la valeur réévaluée des locaux du BIML dans l'actif de I'OIML;\nde préparer une présentation des Exercices 2008 et 2009 conformes à ce principe, en vue de les présenter à la 14ème Conférence OIML ; et\n- d'inclure, dans la révision du Règlement Financier de l'OIML, cette mise en œuvre des normes IPSAS, et de spécifier les règles et la périodecité de réévaluation des bâtiments de l'OIML dans l'actif de l'Organisation.", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
