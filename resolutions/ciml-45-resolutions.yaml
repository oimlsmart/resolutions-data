  - identifier: CIML/2010/24
    language: fr
    title:
      - { content: "Charge le Bureau de procéder à la consultation de l'ensemble des Membres du CIML", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml201024"
    urn: "urn:oiml:doc:ciml:resolution:2010-24"
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations:
    - type: noting
      message:
        - { content: "Prenant note du rapport du Bureau concernant la révision des Directives sur les travaux techniques (OIML B 6-1),", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: considering
      message:
        - { content: "Considérant que le groupe de travail ad hoc de cette révision, après s'être réuni à plusieurs reprises, n'a pas été en mesure de parvenir à un accord sur de nombreuses questions, et", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: considering
      message:
        - { content: "Considérant les commentaires formulés par certains de ses Membres au sujet de projets ultérieurs de révision de OIML B 6-1,", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    actions:
    - type: charges
      message:
        - { content: "Charge le Bureau de procéder à la consultation de l'ensemble des Membres du CIML par une enquête leur demandant de se déterminer sur des questions spécifiques telles que : la structure du travail technique, le Comité de Gestion Technique proposé, ainsi que les procédures de vote pour l'adoption des publications de l'OIML, en vue de préparer un nouveau Projet de Révision, à soumettre pour adoption lors de la 46ème Réunion du CIML.", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
