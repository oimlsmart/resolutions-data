  - identifier: CIML/2010/11
    language: en
    title:
      - { content: "Decides that after the election of the Vice-President during the current meeting, the CIML", lang: en }
    subject:
      - { content: OIML Conference, lang: en }
    doi: "10.63493/resolutions/ciml201011"
    urn: "urn:oiml:doc:ciml:resolution:2010-11"
    dates:
