  - identifier: CIML/2010/11
    language: fr
    title:
      - { content: "Décide qu'après l'élection du Vice-Président au cours de la présente réunion, le CIML décidera", lang: fr }
    subject:
      - { content: "Conférence OIML", lang: fr }
    doi: "10.63493/resolutions/ciml201011"
    urn: "urn:oiml:doc:ciml:resolution:2010-11"
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations:
    - type: considering
      message:
        - { content: "Considérant que l'Article XV de la Convention prévoit l'élection d'un Président, d'un premier Vice-Président et d'un second Vice-Président et que, dans l'éventualité où le Président est absent ou se trouve dans l'incapacité d'exercer ses fonctions, le premier Vice-Président doit assurer temporairement la Présidence, et", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: considering
      message:
        - { content: "Considérant que l'Article XV ne prévoit pas que le premier Vice-Président démissionne ou que son mandat expire avant celui du deuxième Vice-Président,", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    actions:
    - type: decides
      message:
        - { content: "Décide qu'après l'élection du Vice-Président au cours de la présente réunion, le CIML décidera lequel des deux Vice-Présidents sera le premier Vice-Président ; et", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Président du CIML de préparer une proposition à soumettre à la 14ème Conférence en 2012, sur l'interprétation de l'Article XV dans l'éventualité où la fonction de premier Vice-Président devient vacante et si le Président se trouve dans l'incapacité d'exercer ses fonctions.", lang: fr }
      dates:
      - start: '2010-09-21'
        kind: effective
