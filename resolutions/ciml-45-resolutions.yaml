        message: |
          Le Comité prend note du rapport oral concernant le rapprochement avec le BIPM ; il demande au Président d'appliquer la Résolution n° 3 de la 44ème Réunion du CIML, de préparer un rapport intermédiaire avec l'aide de quelques Membres du CIML, afin de le présenter à la 46ème Réunion du CIML et en vue de prendre des décisions définitives en 2012, lors de la 14ème Conférence.
