        type: effective
      message: This Reporting Secretariat, created on the proposal of France, and
        for which France is responsible, comes under Pilot Secretariat 30. France
        was requested to carry out work in this field, which could be undertaken by
        the ISO, IEC or other institutions. A certain number of CIML members expressed
        their interest in princi in collaboration with this Reporting Secretariat,
        subject to confirmation by their respective national administrations.
