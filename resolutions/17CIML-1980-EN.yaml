      date_effective:
        date: '1980-06-16'
        type: effective
      message: The Committee expressed its agreement in principle concerning the creation
        of the five proposed Reporting Secretariats. It agreed that responsibility
        for Sr 1 and Sr 3 should be taken over by the Federal Republic of Germany
        and United Kingdom (subject to confirmation), respectively. It charged the
        U.S.A. with organizing the first meeting of this Pilot Secretariat in 1981,
        to settle all problems of detail and ensure rapid commencement of the work.
