  agenda_item: '6.4'
  dates:
  - date: '1983-05-03'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 6.4: Problèmes linguistiques relatifs aux Recommendations
      Internationales et Documents Internationaux'
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1983-05-03'
      type: effective
    message:
    - spelling: fra
      value: Le Bureau est chargé, en liaison avec les Etats francophones et anglophones,
        d'étudier la possibilité de mieux normaliser le langage utilisé dans les R.I.
        et D.I., en particulier en ce qui concerne le caractère obligatoire, recommandé,
        ou facultatif des prescriptions métrologiques.
