      type: effective
    message:
    - spelling: fra
      value: Le Comité renouvelle pour une période de 5 années à compter de l'expiration
        de son présent contrat, le contrat de M. THULIN, Adjoint au Directeur.
    - spelling: fra
      value: Le Comité prend connaissance de l'expertise en question qui montre qu'effectivement,
        le coût du système de retraite ne devrait pas entraîner une augmentation du
        Budget de l'OIML supérieure en valeur relative à 10 % (chiffre déjà présenté
        à la 6ème Conférence), cette augmentation de 10 % devant être répartie sur
        les années 1993-2009 selon un barème à définir.
    - spelling: fra
      value: 'Le Comité adopte en conséquence la Résolution suivante :'
