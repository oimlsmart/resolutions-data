    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité renouvelle pour une période de 5 années à compter de l''expiration
        de son présent contrat, le contrat de M. THULIN, Adjoint au Directeur.

        '
      date_effective:
        date: '1983-05-03'
        type: effective
    - type: notes
      message: 'Le Comité prend connaissance de l''expertise en question qui montre
        qu''effectivement, le coût du système de retraite ne devrait pas entraîner
        une augmentation du Budget de l''OIML supérieure en valeur relative à 10 %
        (chiffre déjà présenté à la 6ème Conférence), cette augmentation de 10 % devant
        être répartie sur les années 1993-2009 selon un barème à définir.

        '
      date_effective:
        date: '1983-05-03'
        type: effective
    - type: notes
      message: 'Le Comité adopte en conséquence la Résolution suivante :

        '
      date_effective:
        date: '1983-05-03'
        type: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale,

        '
      date_effective:
        date: '1983-05-03'
        type: effective
