  - spelling: fra
    value: 'Agenda Item 7.3: Mise en activité de nouveaux Secrétariats'
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1983-05-03'
      type: effective
    message:
    - spelling: fra
      value: a) Il est rappelé au Comité qu'un Secrétariat sur le mesurage de la surface
        des peaux (SP 4-Sr 6) a été mis en activité sous la responsabilité de la Hongrie;
        par ailleurs la Belgique assume maintenant seule la responsabilité du SP 4-Sr
        2 (mesures matérialisées de longueur).
