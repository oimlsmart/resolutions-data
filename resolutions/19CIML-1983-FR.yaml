    type: decided
  localizations:
  - language_code: fra
    title: SEMINAIRES OIML
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. THULIN indique que, après le succès du séminaire sur l''électronique,
        un séminaire sur le contrôle des produits préemballés aura lieu à Berne, en
        juin 1983, sur invitation de M. PERLSTAIN. Ce séminaire sera suivi d''une
        réunion du SP 20. Pour le futur, il faut connaître l''opinion du Comité sur
        l''utilité de tels séminaires, et choisir un sujet intéressant pour la majorité
        des Etats Membres; il y a en particulier le mesurage, par masse ou par volume,
        des grosses quantités de produits.

        '
      date_effective:
        date: '1983-05-03'
        type: effective
