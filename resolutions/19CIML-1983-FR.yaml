    title: QUESTIONS DIVERSES
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. THULIN indique qu''il finit de réaliser deux documents qui seront
        prochainement diffusés : une brochure descriptive des structures de la métrologie
        dans les Etats Membres et Correspondants de l''OIML (ou tout au moins ceux
        qui ont répondu au questionnaire) et un Index des articles publiés dans les
        100 premiers numéros du Bulletin. En ce qui concerne ce dernier, il rappelle
        que c''est le rôle des Membres du Comité de fournir le Bureau en articles,
        et qu''en particulier les articles en langue française font défaut.

        '
      date_effective:
        date: '1983-05-03'
        type: effective
