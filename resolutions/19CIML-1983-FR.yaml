      date: '1983-05-03'
      type: effective
    message:
    - spelling: fra
      value: Il est tout d'abord rappelé qu'un rapport complet sera présenté à la
        7e Conférence en octobre 1984, et que seuls quelques points particuliers relatifs
        à ce sujet sont soumis aux présentes discussions.
- identifier:
  - prefix: CIML
    number: 1983/10
  doi: 10.63493/resolutions/ciml198310
  urn: urn:oiml:doc:ciml:resolution:1983-10
  agenda_item: '10'
  dates:
  - date: '1983-05-03'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 10: PAYS EN DEVELOPEMENT'
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1983-05-03'
      type: effective
    message:
    - spelling: fra
      value: M. THULIN indique que l'activité de l'OIML dans ce domaine est limitée
        par le manque de moyens financiers; en effet, les Agences spécialisées des
        Nations Unies n'ont que de très faibles possibilités; la coopération bilatérale
        est plus importante mais elle se fait, bien sûr, pratiquement sans participation
        de l'OIML, le Bureau se contentant de disséminer les informations dont il
        dispose.
- identifier:
  - prefix: CIML
    number: 1983/11
  doi: 10.63493/resolutions/ciml198311
  urn: urn:oiml:doc:ciml:resolution:1983-11
  agenda_item: '11'
  dates:
  - date: '1983-05-03'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 11: SEMINAIRES OIML'
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1983-05-03'
      type: effective
    message:
    - spelling: fra
      value: M. THULIN indique que, après le succès du séminaire sur l'électronique,
        un séminaire sur le contrôle des produits préemballés aura lieu à Berne, en
        juin 1983, sur invitation de M. PERLSTAIN. Ce séminaire sera suivi d'une réunion
        du SP 20. Pour le futur, il faut connaître l'opinion du Comité sur l'utilité
        de tels séminaires, et choisir un sujet intéressant pour la majorité des Etats
        Membres; il y a en particulier le mesurage, par masse ou par volume, des grosses
        quantités de produits.
