    title: Problèmes linguistiques relatifs aux Recommendations Internationales et
      Documents Internationaux
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Bureau est chargé, en liaison avec les Etats francophones et anglophones,
        d''étudier la possibilité de mieux normaliser le langage utilisé dans les
        R.I. et D.I., en particulier en ce qui concerne le caractère obligatoire,
        recommandé, ou facultatif des prescriptions métrologiques.

        '
      date_effective:
        date: '1983-05-03'
        type: effective
