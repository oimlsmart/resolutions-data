- identifier: CIML/1983/7.2
  doi: 10.63493/resolutions/ciml19837.2
  urn: urn:oiml:doc:ciml:resolution:1983-7.2
  subject: "(The CIML)"
  title: Suppression de certains Secrétariats
  dates:
  - start: '1983-05-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'En janvier 1983, le Bureau a écrit à un certain nombre d''Etats responsables
      de Secrétariats Rapporteurs dont l''activité était, semble-t-il, assez réduite;
      le but de cette enquête était de savoir si des difficultés particulières empêchaient
      le déroulement des travaux, ou encore si une suppression des Secrétariats n''était
      pas envisageable, en raison par exemple du manque d''intérêt que présentent
      les sujets en question.

      '
    dates:
    - start: '1983-05-03'
      kind: effective
- identifier: CIML/1983/7.3
  doi: 10.63493/resolutions/ciml19837.3
  urn: urn:oiml:doc:ciml:resolution:1983-7.3
  subject: "(The CIML)"
  title: Mise en activité de nouveaux Secrétariats
  dates:
  - start: '1983-05-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'a) Il est rappelé au Comité qu''un Secrétariat sur le mesurage de la
      surface des peaux (SP 4-Sr 6) a été mis en activité sous la responsabilité de
      la Hongrie; par ailleurs la Belgique assume maintenant seule la responsabilité
      du SP 4-Sr 2 (mesures matérialisées de longueur).

      '
    dates:
    - start: '1983-05-03'
      kind: effective
