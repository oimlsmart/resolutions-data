      date: '1983-05-03'
      type: effective
    message:
    - spelling: fra
      value: Une édition, à jour au 1er avril 1983, du document « Etat d'avancement
        des travaux des Secrétariats de l'OIML » est distribuée aux participants ;
        elle contient de plus une liste des projets de Recommandations et Documents
        Internationaux susceptibles d'être adoptés et publiés d'ici fin 1984.
- identifier:
  - prefix: CIML
    number: 1983/6.2
  doi: 10.63493/resolutions/ciml19836.2
  urn: urn:oiml:doc:ciml:resolution:1983-6.2
  agenda_item: '6.2'
  dates:
  - date: '1983-05-03'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 6.2: Adoption, à titre provisoire, de projets de Recommandations
      Internationales'
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1983-05-03'
      type: effective
    message:
    - spelling: fra
      value: Deux projets, relatifs aux « Sonomètres » et aux « Humidimètres pour
        grains de céréales et graines oléagineuses » sont présentés pour adoption
        à titre provisoire par le Comité, et publication, avant leur sanction définitive
        par la 7ème Conférence.
- identifier:
  - prefix: CIML
    number: 1983/6.3
  doi: 10.63493/resolutions/ciml19836.3
  urn: urn:oiml:doc:ciml:resolution:1983-6.3
  agenda_item: '6.3'
  dates:
  - date: '1983-05-03'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 6.3: Mode de travail des Secrétariats de l''OIML'
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1983-05-03'
      type: effective
    message:
    - spelling: fra
      value: Une version « provisoire » de ce document a été distribuée en octobre
        1982, les paragraphes relatifs à la planification des travaux étant laissés
        en blanc. Etant donné que les problèmes de planification ne pourront être
        résolus avant quelques années, le Bureau est chargé de rééditer le document
        « Mode de Travail », en tenant compte des derniers commentaires, et en reportant
        à plus tard la rédaction des points de planification. (Cette nouvelle version
        ne portera pas la mention « provisoire »).
- identifier:
  - prefix: CIML
    number: 1983/6.4
  doi: 10.63493/resolutions/ciml19836.4
