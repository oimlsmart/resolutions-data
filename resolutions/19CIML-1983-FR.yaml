  dates:
  - start: '1983-05-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Une édition, à jour au 1er avril 1983, du document « Etat d''avancement
      des travaux des Secrétariats de l''OIML » est distribuée aux participants ;
      elle contient de plus une liste des projets de Recommandations et Documents
      Internationaux susceptibles d''être adoptés et publiés d''ici fin 1984.

      '
    dates:
    - start: '1983-05-03'
      kind: effective
- identifier: CIML/1983/6.2
  doi: 10.63493/resolutions/ciml19836.2
  urn: urn:oiml:doc:ciml:resolution:1983-6.2
  subject: "(The CIML)"
  title: Adoption, à titre provisoire, de projets de Recommandations Internationales
  dates:
  - start: '1983-05-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Deux projets, relatifs aux « Sonomètres » et aux « Humidimètres pour
      grains de céréales et graines oléagineuses » sont présentés pour adoption à
      titre provisoire par le Comité, et publication, avant leur sanction définitive
      par la 7ème Conférence.

      '
    dates:
    - start: '1983-05-03'
      kind: effective
- identifier: CIML/1983/6.3
  doi: 10.63493/resolutions/ciml19836.3
  urn: urn:oiml:doc:ciml:resolution:1983-6.3
  subject: "(The CIML)"
  title: Mode de travail des Secrétariats de l'OIML
  dates:
  - start: '1983-05-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Une version « provisoire » de ce document a été distribuée en octobre
      1982, les paragraphes relatifs à la planification des travaux étant laissés
      en blanc. Etant donné que les problèmes de planification ne pourront être résolus
      avant quelques années, le Bureau est chargé de rééditer le document « Mode de
      Travail », en tenant compte des derniers commentaires, et en reportant à plus
      tard la rédaction des points de planification. (Cette nouvelle version ne portera
      pas la mention « provisoire »).

      '
    dates:
    - start: '1983-05-03'
      kind: effective
- identifier: CIML/1983/6.4
  doi: 10.63493/resolutions/ciml19836.4
  urn: urn:oiml:doc:ciml:resolution:1983-6.4
  subject: "(The CIML)"
  title: Problèmes linguistiques relatifs aux Recommendations Internationales et Documents
    Internationaux
  dates:
  - start: '1983-05-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Bureau est chargé, en liaison avec les Etats francophones et anglophones,
      d''étudier la possibilité de mieux normaliser le langage utilisé dans les R.I.
      et D.I., en particulier en ce qui concerne le caractère obligatoire, recommandé,
      ou facultatif des prescriptions métrologiques.

      '
    dates:
    - start: '1983-05-03'
      kind: effective
