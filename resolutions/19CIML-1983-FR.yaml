  - date: '1983-05-03'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 7.2: Suppression de certains Secrétariats'
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1983-05-03'
      type: effective
    message:
    - spelling: fra
      value: En janvier 1983, le Bureau a écrit à un certain nombre d'Etats responsables
        de Secrétariats Rapporteurs dont l'activité était, semble-t-il, assez réduite;
        le but de cette enquête était de savoir si des difficultés particulières empêchaient
        le déroulement des travaux, ou encore si une suppression des Secrétariats
        n'était pas envisageable, en raison par exemple du manque d'intérêt que présentent
        les sujets en question.
- identifier:
  - prefix: CIML
    number: 1983/7.3
  doi: 10.63493/resolutions/ciml19837.3
