  subject: "(The CIML)"
  title: Examen des estimations financières pour 1983
  dates:
  - start: '1983-05-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. ATHANE rappelle que ces estimations ont été présentées aux Membres
      du Comité vers la fin de 1982, et complétées par des explications faisant suite
      à des questions de M. PETRY. Ces estimations étaient accompagnées d''un rappel
      des prévisions de recettes et autorisations de dépenses faites par la Conférence
      de 1980. Il apparaît que les estimations pour 1983 sont raisonnablement compatibles
      avec les décisions de la Conférence, l''augmentation des dépenses étant compensée
      par une augmentation des recettes.

      '
    dates:
    - start: '1983-05-03'
      kind: effective
