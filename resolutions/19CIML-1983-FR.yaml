- identifier: CIML/1983/13
  doi: 10.63493/resolutions/ciml198313
  urn: urn:oiml:doc:ciml:resolution:1983-13
  subject: "(The CIML)"
  title: PREPARATION DE LA 7ème CONFERENCE INTERNATIONALE DE METROLOGIE LEGALE
  dates:
  - start: '1983-05-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mme LAHTEENMAKI donne les informations détaillées sur la préparation
      de la 7ème Conférence conjointement à laquelle aura lieu la 20ème réunion du
      Comité. Le programme général a été établi et est distribué aux participants,
      avec des fiches de participation en vue des réservations d''hôtel.

      '
    dates:
    - start: '1983-05-03'
      kind: effective
- identifier: CIML/1983/14
  doi: 10.63493/resolutions/ciml198314
  urn: urn:oiml:doc:ciml:resolution:1983-14
  subject: "(The CIML)"
  title: QUESTIONS DIVERSES
  dates:
  - start: '1983-05-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. THULIN indique qu''il finit de réaliser deux documents qui seront
      prochainement diffusés : une brochure descriptive des structures de la métrologie
      dans les Etats Membres et Correspondants de l''OIML (ou tout au moins ceux qui
      ont répondu au questionnaire) et un Index des articles publiés dans les 100
      premiers numéros du Bulletin. En ce qui concerne ce dernier, il rappelle que
      c''est le rôle des Membres du Comité de fournir le Bureau en articles, et qu''en
      particulier les articles en langue française font défaut.

      '
    dates:
    - start: '1983-05-03'
      kind: effective
- identifier: CIML/1983/15
  doi: 10.63493/resolutions/ciml198315
  urn: urn:oiml:doc:ciml:resolution:1983-15
  subject: "(The CIML)"
  title: ELECTION DU DEUXIEME VICE-PRESIDENT DU COMITE
  dates:
  - start: '1983-05-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Sur proposition de M. BIRKELAND, et à la suite de suggestions présentées
      par de nombreux Membres du CIML, le Comité International de Métrologie Légale
      désigne comme Deuxième Vice-Président, à l''unanimité, le Professeur Dr. Ing.
      W. MÜHE, représentant de la République Fédérale d''Allemagne.

      '
    dates:
    - start: '1983-05-03'
      kind: effective
