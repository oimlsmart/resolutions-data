  actions:
  - type: notes
    date_effective:
      date: '1983-05-03'
      type: effective
    message:
    - spelling: fra
      value: Mme LAHTEENMAKI donne les informations détaillées sur la préparation
        de la 7ème Conférence conjointement à laquelle aura lieu la 20ème réunion
        du Comité. Le programme général a été établi et est distribué aux participants,
        avec des fiches de participation en vue des réservations d'hôtel.
