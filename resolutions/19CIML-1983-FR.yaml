  localizations:
  - language_code: fra
    title: PAYS EN DEVELOPEMENT
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. THULIN indique que l''activité de l''OIML dans ce domaine est limitée
        par le manque de moyens financiers; en effet, les Agences spécialisées des
        Nations Unies n''ont que de très faibles possibilités; la coopération bilatérale
        est plus importante mais elle se fait, bien sûr, pratiquement sans participation
        de l''OIML, le Bureau se contentant de disséminer les informations dont il
        dispose.

        '
      date_effective:
        date: '1983-05-03'
        type: effective
- identifier:
  - prefix: CIML
    number: 1983/11
  doi: 10.63493/resolutions/ciml198311
