    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 3: Proposals relating to the OIML Development Council'
    considerations: []
    actions:
    - type: resolution
      message: 'The Development Council, considering that the organization of the
        OIML’s work on developing countries is being more effectively handled by the
        PWGDC, proposed to the Committee that: - The tasks allocated to the Development
        Council by decision of the 6th International Conference of Legal Metrology
        in 1980 should be transferred to the PWGDC; and - The existing Development
        Council should cease to exist.'
      date_effective:
        date: '2004-10-25'
        type: decided
    approvals: []
  - language_code: fra
    title: 'Agenda Item 3: Proposals relating to the OIML Development Council'
    considerations: []
    actions:
    - type: resolution
      message: 'Le Conseil de Développement, considérant que l’organisation du travail
        de l’OIML relatif aux pays en développement est gérée plus efficacement par
        le PWGDC, a proposé au Comité que: - Les tâches attribuées au Conseil de Développement
        sur décision de la 6ème Conférence Internationale de Métrologie Légale en
        1980 soient transférées au PWGDC; et - Le Conseil de Développement actuel
        cesse d’exister.'
      date_effective:
        date: '2004-10-25'
        type: decided
    approvals: []
  agenda_item: '3'
