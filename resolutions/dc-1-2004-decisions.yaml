    message:
    - spelling: eng
      value: The Development Council noted Mr Seiler’s report on the meeting of the
        Permanent Working Group on Developing Countries (PWGDC), which was held on
        24 October 2004, and endorsed the PWGDC’s proposals.
    - spelling: fra
      value: Le Conseil de Développement a pris note du rapport de M. Seiler en ce
        qui concerne la réunion du Groupe de Travail Permanent sur les Pays en Développement
        (PWGDC) qui s’était tenue le 24 octobre 2004, et a approuvé les propositions
        du PWGDC.
