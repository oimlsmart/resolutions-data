  title:
  - spelling: eng
    value: Proposals relating to the OIML Development Council
  - spelling: fra
    value: Proposals relating to the OIML Development Council
  actions:
  - type: resolution
    date_effective:
      date: '2004-10-25'
      type: decided
    message:
    - spelling: eng
      value: 'The Development Council, considering that the organization of the OIML’s
        work on developing countries is being more effectively handled by the PWGDC,
        proposed to the Committee that: - The tasks allocated to the Development Council
        by decision of the 6th International Conference of Legal Metrology in 1980
        should be transferred to the PWGDC; and - The existing Development Council
        should cease to exist.'
    - spelling: fra
      value: 'Le Conseil de Développement, considérant que l’organisation du travail
        de l’OIML relatif aux pays en développement est gérée plus efficacement par
        le PWGDC, a proposé au Comité que: - Les tâches attribuées au Conseil de Développement
        sur décision de la 6ème Conférence Internationale de Métrologie Légale en
        1980 soient transférées au PWGDC; et - Le Conseil de Développement actuel
        cesse d’exister.'
