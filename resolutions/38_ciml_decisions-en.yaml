  title: Study on The Benefit of Legal Metrology for the Economy and Society
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a presentation given by Mr. John Birch on
      his report The Benefit of Legal Metrology for the Economy and Society. The Committee
      expressed its great appreciation of this Report and instructed the BIML to distribute
      it as an expert report. A summary report compiled by Mr. Birch would also be
      published in the OIML Bulletin.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: instructs
    message: 'The Committee instructed the CIML President and the BIML to consider
      any complementary actions or studies which would appear appropriate with a view
      to raising the awareness of metrology and legal metrology.

      '
