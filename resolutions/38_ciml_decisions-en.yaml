      kind: effective
  - type: notes
    message: 'The Committee also decided that the revised R 61-1 and R 61-2 will continue
      to be applicable within the System as soon as R 61-2 is published together with
      the revised R 61-1.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
