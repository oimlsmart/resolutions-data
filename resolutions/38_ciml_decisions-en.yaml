  actions: []
- identifier: CIML/2003/17.1
  doi: 10.63493/resolutions/ciml200317.1
  urn: urn:oiml:doc:ciml:resolution:2003-17.1
  subject: CIML
  title: "$ 3 9^{th} $ CIML Meeting and $ 1 2^{th} $ International Conference on Legal
    Metrology (Berlin, 2004…"
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a presentation given by Mr. Kochsiek, on
      the organization of the $ 39^{\mathrm{th}} $ Committee Meeting and $ 12^{\mathrm{th}}
      $ OIML Conference to be held in Berlin from 25-29 October 2004, as approved
      at the $ 37^{\mathrm{th}} $ Committee Meeting in 2002. The Committee expressed
      its warmest thanks to Germany for their invitation.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/17.2
  doi: 10.63493/resolutions/ciml200317.2
  urn: urn:oiml:doc:ciml:resolution:2003-17.2
  subject: CIML
  title: "$ 4 0^{th} $ CIML Meeting and $ 5 0^{th} $ Anniversary of the OIML (France,
    2005)"
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee accepted the proposal from the BIML to organize the $
      40^{\mathrm{th}} $ Committee Meeting in Lyon, France, at the end of June 2005,
      in conjunction with the International Metrology Congress organized by the Collège
      Français de Métrologie, on the occasion of the $ 50^{\mathrm{th}} $ anniversary
      of the OIML.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'The Committee asked the BIML and the various TCs/SCs to avoid these
      dates when planning their own meetings.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/17.3
  doi: 10.63493/resolutions/ciml200317.3
  urn: urn:oiml:doc:ciml:resolution:2003-17.3
  subject: CIML
  title: Further meetings
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of the intention of Mr. Carstens (CIML Member
      for South Africa) to hold the $ 4 1 ^{ \mathrm{st}} $ CIML Meeting in South
      Africa. This invitation would be confirmed in due course.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
