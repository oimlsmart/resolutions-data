  urn: urn:oiml:doc:ciml:resolution:2003-12.1
  subject: CIML
  title: Revision of the Directives for Technical Work
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of information given by the BIML on the draft
      Revision of the Directives and instructed the BIML to set up an ad-hoc Committee
      to continue the Revision of these Directives with a view to simplifying the
      procedures, accelerating the development and revision of Recommendations and
      Documents, and taking account of the requirements of the WTO-TBT Committee on
      international standard-setting activities. This Revision will be submitted to
      the CIML for approval as soon as possible.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
