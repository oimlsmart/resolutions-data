  urn: urn:oiml:doc:ciml:resolution:2003-9.1
  subject: CIML
  title: Work program of TCs/SCs
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of information delivered by Vice-President Mr.
      Issaev and by the Bureau concerning OIML technical activities and, while expressing
      its satisfaction with the increased volume of work accomplished during the last
      12 months (compared with the previous one-year period), requested OIML TCs and
      SCs to accelerate their work, especially in the fields listed as high priority
      and priority projects, taking into consideration proposals to accelerate OIML
      technical work as discussed under Item 9.3.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: approves
    message: 'The Committee approved the project as proposed by TC 18 on Ophthalmic
      instruments - Impression and applanation tonometer.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
