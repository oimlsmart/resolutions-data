  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of information given by the BIML concerning
      the setting up, with other international Organizations, of a Joint Committee
      on coordination of assistance to Developing Countries in Metrology, Accreditation
      and Standardization (JCDCMAS), and approved the Terms of Reference of this Joint
      Committee.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'The Committee also took note of a report by the BIML on Regional Awareness
      Seminars which were organized jointly with the IEC under the aegis of the WTO.
      The Committee encouraged the BIML to organize other Seminars of the same kind
      in other Regions.

      '
