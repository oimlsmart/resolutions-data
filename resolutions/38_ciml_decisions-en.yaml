    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'The Committee took note of information given by the BIML on the generally
      unsatisfactory situation of CIML postal voting in 2003, and requested its Members
      (especially those who are late in voting) to comply more regularly with fulfilling
      their duties, thus contributing to the timely approval of drafts submitted.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
