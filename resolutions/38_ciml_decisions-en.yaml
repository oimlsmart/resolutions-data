- identifier: CIML/2003/15.1
  doi: 10.63493/resolutions/ciml200315.1
  urn: urn:oiml:doc:ciml:resolution:2003-15.1
  subject: CIML
  title: Metre Convention, ILAC, ISO, WTO, etc.
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a report, presented by the CIML President,
      on cooperation with the Metre Convention (BIPM/CIPM) and with ILAC.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'The Committee took note of a report given by ILAC and expressed its
      appreciation of the good cooperation between the OIML and this Organization.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/15.2
  doi: 10.63493/resolutions/ciml200315.2
  urn: urn:oiml:doc:ciml:resolution:2003-15.2
  subject: CIML
  title: Draft policy paper on the liaisons with other organizations
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a report given by the BIML Director about
      the result of the postal approval ballot for the Draft policy paper on OIML
      liaisons with other organizations. The Committee approved this policy paper.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/15.3
  doi: 10.63493/resolutions/ciml200315.3
  urn: urn:oiml:doc:ciml:resolution:2003-15.3
  subject: CIML
  title: Reports from Regional Legal Metrology Organizations (RLMOs)
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of information given by representatives of the
      following Regional Legal Metrology Organizations (RLMOs) concerning their activities:
      APLMF, COOMET, EMLMF, SADCMEL and WELMEC. In addition, the representative from
      Burkina Faso gave information on a possible future RLMO in that region of Africa.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/15.4
  doi: 10.63493/resolutions/ciml200315.4
  urn: urn:oiml:doc:ciml:resolution:2003-15.4
  subject: CIML
  title: Draft policy paper on coordination with Regional Legal Metrology Organizations
    (RLMOs)
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a progress report given by the BIML Director
      on a paper formalizing the relations and cooperation with Regional Legal Metrology
      Organizations; this paper is being submitted for comments by RLMOs. The Committee
      instructed the BIML to continue progress with this paper so as to establish
      a formal framework for OIML cooperation with the RLMOs.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/16
  doi: 10.63493/resolutions/ciml200316
  urn: urn:oiml:doc:ciml:resolution:2003-16
  subject: CIML
  title: Election of the CIML President
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'In the absence of a conclusive election result and in application of
      Article XV of the Convention, CIML First Vice President Mr. Kochsiek was charged
      with assuming the duties of President. The CIML expressed its deep gratitude
      to Mr. Faber for his achievements and leadership during his term of office.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
