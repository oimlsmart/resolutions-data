  urn: urn:oiml:doc:ciml:resolution:2003-9.3
  subject: CIML
  title: Acceleration of technical activities
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The need to speed up projects, Mr. Szilvassy told Members, went back
      several years. The previous year there had been a Presidential initiative to
      try to find methods of accelerating OIML technical activities. There were problems
      with approved and ongoing projects; problems with new reviews of OIML Recommendations
      and Documents; and problems with new revisions of OIML Recommendations and Documents.
      In the BIML there had been two short meetings the previous year and a draft
      document had been prepared. A short document had been handed out the previous
      year during the $ 37^{\mathrm{th}} $ CIML Meeting and now they were trying to
      update this document. There had been some positive signs of increased activity
      in the current year. More Documents and Recommendations had been presented for
      approval.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
