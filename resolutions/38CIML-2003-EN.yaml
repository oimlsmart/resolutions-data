  subject: CIML
  title: Other developing country activities
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a presentation given by the Development Council
      Chairperson and by the BIML on the activities of the Development Council, and
      expressed its appreciation of the work that had been carried out since the last
      meeting.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/14.3
  doi: 10.63493/resolutions/ciml200314.3
  urn: urn:oiml:doc:ciml:resolution:2003-14.3
  subject: CIML
  title: JCDCMAS
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of information given by the BIML concerning
      the setting up, with other international Organizations, of a Joint Committee
      on coordination of assistance to Developing Countries in Metrology, Accreditation
      and Standardization (JCDCMAS), and approved the Terms of Reference of this Joint
      Committee.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'The Committee also took note of a report by the BIML on Regional Awareness
      Seminars which were organized jointly with the IEC under the aegis of the WTO.
      The Committee encouraged the BIML to organize other Seminars of the same kind
      in other Regions.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
