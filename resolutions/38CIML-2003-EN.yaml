- identifier: CIML/2003/12.2
  doi: 10.63493/resolutions/ciml200312.2
  urn: urn:oiml:doc:ciml:resolution:2003-12.2
  subject: CIML
  title: Translation and distribution of OIML Publications
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mr. Magaña said that a paper had been sent out which aimed to answer
      a number of questions received from Members on different occasions. The publications
      of the OIML were in French and English and the Bureau provided these two versions,
      but a number of countries had asked whether they were authorized to make translations
      into their own national language and to distribute and sell these. A draft paper
      had been prepared on this subject, entitled The Translation and Distribution
      of OIML Publications. The Presidential Council had looked at it and it had been
      sent out to Members with a view to its approval. He asked for comments on this
      paper.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/12.3
  doi: 10.63493/resolutions/ciml200312.3
  urn: urn:oiml:doc:ciml:resolution:2003-12.3
  subject: CIML
  title: Draft Guide on the status of OIML Documents and Publications
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mr. Magaña said that this was an information item - there was not yet
      a document to submit to the meeting. Delegates would remember that the Bureau
      had been asked to work on what had been labeled "horizontal documents". Looking
      at this issue, it had appeared to Mr. Magaña, and this had been discussed in
      the Presidential Council, that the words "horizontal documents" were not very
      clear, and that what was needed was to have a clear description of what kinds
      of documents and publications the OIML had, and might issue, and the process
      for adopting them. At the moment there were only Recommendations and Documents,
      but a distinction could perhaps be made between them and how they were to be
      adopted, and what kind of commitment these publications placed upon Member States.
      Some publications constituted a commitment for Member States, others were more
      advisory, others informative; it was necessary to specify what

      '
    dates:
    - start: '2003-11-05'
      kind: effective
