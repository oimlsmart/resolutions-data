      the deadline for issuing Certificates based on the 1996 edition of R 61, and
      arrange for its simultaneous postal approval by TC 9/SC 2 and the CIML.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/11.3
  doi: 10.63493/resolutions/ciml200311.3
  urn: urn:oiml:doc:ciml:resolution:2003-11.3
  subject: CIML
  title: Follow-up to the revision of P1 OIML Certificate System for Measuring Instruments
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of the proposed necessary actions in implementing
      the revised P1 and instructed:

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: instructs
    message: 'The Committee instructed the BIML to carry out inquiries among OIML
      Members and among manufacturers and applicants who already possessed OIML Certificates
      as to their experience in the voluntary acceptance and use of OIML Certificates
      for national or regional type approvals, as well as to their views on the functioning
      of the System with a special view to the new provisions of P1.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
