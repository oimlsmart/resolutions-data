  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a presentation given by the CIML President
      on activities of the Task Group on Developing Countries which had been set up
      at the last Committee Meeting. The Committee approved the following two proposals
      made by the CIML President:

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: instructs
    message: 'The Committee instructed the CIML President and the BIML to draw up
      a proposal in time for the $ 12^{\mathrm{th}} $ Conference in 2004, complying
      with the conclusions of the Development Council Meeting.

      '
