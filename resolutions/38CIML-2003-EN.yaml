- identifier: CIML/2003/16
  doi: 10.63493/resolutions/ciml200316
  urn: urn:oiml:doc:ciml:resolution:2003-16
  subject: CIML
  title: Election of the CIML President
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mr. Magaña explained, and showed in a presentation, some relevant extracts
      from the OIML Convention. Article XV says the Committee should select from among
      its Members a President and a First and Second Vice-President, to be elected
      for a period of six years, and eligible for reelection thereafter. Any mandate
      which expired between sessions should be extended until the next session. A
      President now had to be elected. Article XVII stipulated that at least three
      quarters of the Committee must vote and four fifths of the votes cast had to
      be in favor, abstentions, blanks and null votes not being counted as votes cast.
      50 Member States were present or represented, which was more than the 45 required
      for a quorum. On this attendance, at least 40 votes therefore had to be cast,
      of which 32 must be votes in favor. Article XV also laid down that if there
      were no mandate for President, these duties must be temporarily assumed by the
      First Vice-President.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
