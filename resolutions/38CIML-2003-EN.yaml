- identifier: CIML/2003/3.2
  doi: 10.63493/resolutions/ciml20033.2
  urn: urn:oiml:doc:ciml:resolution:2003-3.2
  subject: CIML
  title: Situation of certain Members
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mr. Magaña reminded the meeting that Members had been asked the previous
      year to vote by correspondence on the contributory class of Vietnam, in the
      event of that country becoming a Member State. Vietnam had asked to be placed
      in the lowest class according to the possibility laid out in the Convention,
      but this was a decision for the Committee and so a postal ballot had been held.
      There had been only positive answers but, unfortunately, there had not been
      enough answers to reach a conclusion. He therefore proposed that a vote should
      be taken in the meeting, either immediately or in the resolutions at the end.
      He informed Members that the Bureau was proposing that Vietnam be placed in
      the lowest contribution class and called for comments from the floor. Since
      there were no objections, the matter would be added to the list of Decisions
      of the meeting, to be voted on the final day.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/4
  doi: 10.63493/resolutions/ciml200304
  urn: urn:oiml:doc:ciml:resolution:2003-04
  subject: CIML
  title: Report on Presidential Council activities
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mr. Faber explained that as usual there was not very much to say because,
      as a rule, all the items discussed in the Presidential Council would be dealt
      with on the agenda of the CIML. For new Members, he briefly explained the nature
      of the Presidential Council, because this organism was not mentioned in the
      Convention but created by the Conference a long time ago. It was a group of
      nine persons, plus the Bureau. The composition was well known to delegates and
      in any case it was published on the OIML web site. This was an advisory committee
      to the President which normally met twice a year. One meeting was held in February
      or March for the task of going through all current activities and preparing
      the items and decisions to be included on the Committee Meeting agenda. For
      the President of the Organization, this Council was very important as it was
      the forum to better prepare the meetings of the Committee. The members were
      appointed by the President, in principle for a term of three years, but in practice,
      when there was a change in the Presidency the new President had the power to
      appoint other members. It should also be said that in this Council it was not
      Member States which were represented, but persons, chosen for their personal
      qualities.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/5
