- identifier: CIML/2003/20
  doi: 10.63493/resolutions/ciml200320
  urn: urn:oiml:doc:ciml:resolution:2003-20
  subject: CIML
  title: Closure
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Pr. Kochsiek had not prepared a special speech for the closure, since
      until the preceding afternoon he had not expected to be in a position where
      this was required of him. Nevertheless, he commented that a lot of work had
      been done during the week, and many decisions had been made. The approval of
      all the draft publications was particularly important. Much remained to be done,
      in preparation for the $ 12^{\mathrm{th}} $ Conference and $ 39^{\mathrm{th}}
      $ CIML Meeting in Berlin.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
