      dates:
      - start: '2016-10-17'
        kind: effective
    - type: decides
      message: |
        Décide de créer un Comité de Management provisoire (prMC) avec effet immédiat,
      dates:
      - start: '2016-10-17'
        kind: effective
    - type: requests
      message: |
        Demande à son 1er Vice-Président de présider le prMC,
      dates:
      - start: '2016-10-17'
        kind: effective
    - type: requests
      message: |
        Demande aux Membres du CIML, aux représentants des Membres Correspondants de l'OIML et aux représentants des Organisations en Liaison intéressés de participer au prMC, ou de désigner un(e) représentant(e) expert(e),
      dates:
      - start: '2016-10-17'
        kind: effective
    - type: charges
      message: |
        Charge le BIML de fournir un soutien de secrétariat au prMC,
        Confirmme que le prMC a l'autorité d'agir en tant que Comité de gestion aux fins d'approuver les Documents Opérationnels, les Documents de Procédures, les Documents d'Orientation, les Modèles et les Formulaires de l'OIML-CS,
      dates:
      - start: '2016-10-17'
        kind: effective
    - type: requests
      message: |
        Demande au prMC d'identifier des améliorations et amendements potentiels à l'OIML B xx Cadre pour le Système de Certification OIML (OIML-CS) pour examen lors de la 52ème Réunion du CIML en 2017,
      dates:
      - start: '2016-10-17'
        kind: effective
    - type: charges
      message: |
        Charge le prMC de prendre les mesures appropriées pour que l'OIML-CS puisse entrer en vigueur le 1er Janvier 2018,
      dates:
      - start: '2016-10-17'
        kind: effective
    - type: requests
      message: |
        Demande au prMC de présenter un rapport sur ses activités lors de la 52ème Réunion du CIML en 2017, en vue de l'entrée en vigueur de l'OIML-CS le 1er Janvier 2018.
      dates:
      - start: '2016-10-17'
        kind: effective
