  - identifier: CIML/2016/13
    subject: CIML
    title: "Prend note du rapport de la réunion du Groupe Consultatif tenu le 17 octobre"
    dates:
    - start: '2016-10-17'
      kind: decision
    considerations:
    - type: recalling
      message: |
        Rappelant sa Résolution no. 2013/9, relative à la mise en place d'un Groupe Consultatif pour mener de larges consultations, recueillir des suggestions et développer des liens avec d'autres organismes intéressés par la promotion du développement économique de pays et d'économies dont le système de métrologie est émergent,
      dates:
      - start: '2016-10-17'
        kind: effective
    actions:
    - type: notes
      message: |
        Prend note du rapport de la réunion du Groupe Consultatif tenu le 17 octobre 2016,
        Confirmme son souhait que le Groupe Consultatif continue d'être au centre des activités relatives aux problèmes intéressant les pays et les économies dont le système de métrologie est émergent,
        Renouvelle la nomination de Mr. Pu Changcheng à la Présidence du Groupe Consultatif.
      dates:
      - start: '2016-10-17'
        kind: effective
  - identifier: CIML/2016/14
    subject: CIML
    title: "Demande à son Président et au Président du Groupe Consultatif de préparer un projet"
    dates:
    - start: '2016-10-17'
      kind: decision
    considerations: []
    actions:
    - type: requests
      message: |
        Demande à son Président et au Président du Groupe Consultatif de préparer un projet de publication "B", développé à partir du mandat actuel, pour examen, et si possible pour une adoption, à sa 52ème Réunion,
        Insiste sur la nécessité pour chaque Organisation Régionale de Métrologie Légale de nommer un représentant pour faire partie du Groupe Consultatif,
        Invite les autres Membres du Comité ayant un intérêt pour les questions relatives aux pays et aux économies dont le système de métrologie est émergent à se porter volontaire pour faire partie du Groupe Consultatif.
      dates:
      - start: '2016-10-17'
        kind: effective
