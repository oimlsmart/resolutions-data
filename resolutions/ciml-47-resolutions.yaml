ts arising from hazardous wastes | To be decided\n| TC18/SC4/p4 | Revision of R90Electrocardiographs | Revision of R90-Electrocardiographs,electrocardioscopes and electrocardioanalysers.Metrological characteristics.Method and equipment for verification\n|===\n(c) Projects to be cancelled:\nTC 13/p 2: Revision of R 103 Measuring instrumentation for human response to vibration,\nTC 13/p 4: Revision of R 104 Pure-tone audiometers,\nTC 13/p 5: Combined revision of R 58 Sound level meters and R 88 Integrating averaging sound level meters,\nTC 18/SC 4/p 1: Electrodes for electrocardiographs and electroencephalographs methods and means for verification.", lang: en }
