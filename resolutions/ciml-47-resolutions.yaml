uels) | Révision combinée des R 101 et R 109\n| TC 16/SC 4/p 3 | Révision du D 22(incorporant p 2)Guide sur les instruments portatifs pour l&#x27;evaluation des polluants contenus dans l&#x27;air en provenance des déchets dangereux | À décider\n| TC 18/SC 4/p 4 | Révision de la R 90Électrocardiographes | Révision de la R 90-Électrocardiographes, électrocardioscopes et électrocardioanalyseurs.Caractéristiques métrologiquesMéthodes et moyens de vérification\n|===\n(c) Projets à annuler :\nTC 13/p 2: Révision de la R 103 Appareillage de mesure pour la réponse des individus aux vibrations,\nTC 13/p 4 : Révision de la R 104 Audiomètres à son pur,\nTC 13/p 5: Révision combinée de la R 58 Sonomètres et de la R 88 Sonomètres intégrateurs-moyenneurs,\nTC 18/SC 4/p 1 : Électrodes pour électrocardiographes et électroencéphalographes – méthodes et moyens de vérification.", lang: fr }
