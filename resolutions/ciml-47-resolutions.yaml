  - identifier: CIML/2012/23
    language: fr
    title:
      - { content: Agenda item 9.5, lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml201223"
    urn: "urn:oiml:doc:ciml:resolution:2012-23"
    dates:
    - start: '2012-10-01'
      kind: decision
    agenda_item: '9.5'
    considerations:
    - type: recalling
      message:
        - { content: "Rappelant la Résolution n° 25 de sa $ 4 6^{\\mathrm{e m e}} $ Réunion,", lang: fr }
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: noting
      message:
        - { content: "Prenant note du rapport oral par le président du groupe de travail ad hoc Nouveau SI de I'OIML,", lang: fr }
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: considering
      message:
        - { content: "Considérant les remarques formulées par ses Membres et par les Comités Techniques TC 2, TC 9, TC 9/SC 3 et TC 11 au sujet des propositions de modifications du Système International des Unités (SI), actuellement en discussion,", lang: fr }
      dates:
      - start: '2012-10-01'
        kind: effective
    actions:
    - type: approves
      message:
        - { content: "Approuve le texte suivant comme déclaration de l'OIML concernant le nouveau SI à soumettre au BIPM en réponse à la Résolution 1 (2011) de la CGPM :\n« L'OIML soutient l'intention de la CGPM de réviser le SI afin que celui-ci continue de satisfaire aux besoins de la science, la technologie et du commerce au XXIème siècle.\nEn se basant sur les interrogations des Comités Techniques de l'OIML TC 2, TC 9, TC 9/SC 3 et TC 11 et des Membres du CIML, il a été conclu que les définitions du nouveau SI sont considérées comme ayant un impact faible à nul sur les mesures régulières de temps, longueur, intensité lumineuse, courant électrique, température, quantité de substance et les quantités dérivées du SI y afférentes. Un impact potentiel pourrait avoir lieu sur les mesurages exacts de masse en utilisant des poids de classe E conformément à l'OIML R 111. Afin d'éviter tout impact négatif potentiel sur les mesurages de masse de routine, l'OIML estime que, pour la redéfinition du kilogramme, il est fondamental de suivre attentivement les recommandations du CCM de 2010.\nL'OIML soutient l'intention de la CGPM d'améliorer davantage les formulations des définitions des unités de base du SI afin que le nouveau SI demeure compréhensible à tous ceux qui en ont besoin. »", lang: fr }
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: thanks
      message:
        - { content: "Remercie le Groupe de Travail ad hoc pour sa préparation de la déclaration de l'OIML.", lang: fr }
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Directeur du BIML de communiquer la déclaration de l'OIML au BIPM.", lang: fr }
      dates:
      - start: '2012-10-01'
        kind: effective
