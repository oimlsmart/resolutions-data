        - { content: "Noting the oral report by the chair of the OIML ad hoc Working Group New SI,", lang: en }
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: considering
      message:
        - { content: "Considering the comments received from its Members and Technical Committees TC 2, TC 9, TC 9/SC 3 and TC 11 on the proposed changes to the International System of Units (SI), currently being discussed,", lang: en }
      dates:
      - start: '2012-10-01'
        kind: effective
    actions:
    - type: approves
      message:
        - { content: "Approves the following text as the OIML statement on the new SI to be submitted to the BIPM in response to Resolution 1 (2011) of the CGPM:\n\"The OIML supports the CGPM's intention to revise the SI in order that it will continue to meet the needs of science, technology, and commerce in the 21st century.\nFrom the inquiry amongst the OIML Technical Committees TC2, TC9, TC9/SC3 and TC11, and the CIML Members, it is concluded that the new SI definitions are considered to have little to no impact on routine measurements of time, length, luminous intensity, electric current, temperature, amount of substance, and related derived SI quantities. A potential impact may be on accurate mass measurements using class E weights according to OIML R 111. The OIML considers the careful adherence to the 2010 recommendations of the CCM as fundamental for the redefinition of the kilogram in order to avoid potential negative impact on routine mass measurements.\nThe OIML supports the intention of the CGPM to further improve formulations for the definitions of the SI base units so that the new SI remains understandable to all those who need it.\"", lang: en }
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: thanks
      message:
        - { content: Thanks the ad hoc Working Group for preparing the OIML statement., lang: en }
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: instructs
      message:
        - { content: Instructs the BIML Director to communicate the OIML statement to the BIPM., lang: en }
      dates:
      - start: '2012-10-01'
        kind: effective
