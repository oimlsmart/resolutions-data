    title:
      - { content: Agenda item 6.6, lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml201207"
    urn: "urn:oiml:doc:ciml:resolution:2012-07"
    dates:
    - start: '2012-10-01'
      kind: decision
    agenda_item: '6.6'
    considerations:
    - type: considering
      message:
        - { content: "Considérant :\n(a) Que les résultats des efforts déployés par le passé pour soutenir les pays en développement ont eu un effet moindre que prévu,\n(b) Que les pays en développement ont accès à toutes les Recommandations et autres publications de l'OIML,\n(c) Que les pays en développement devraient recevoir davantage de soutien de la part de I'OIML par le biais d'activités de prise de conscience, d'activités destinées à l'obtention de financements par d'autres organisations internationales, à l'accès à des outils de formation actuellement en développement, à promouvoir la collaboration entre les Organisations Régionales de Métrologie Légale, et autres activités similaires,\n(d) L'OIML ne fournit pas d'aide directe aux pays en développement et ne finance aucun projet d'assistance technique dans quelque pays que ce soit ;", lang: fr }
      dates:
      - start: '2012-10-01'
        kind: effective
    actions:
    - type: approves
      message:
        - { content: "Approuve la proposition du Directeur du BIML d'attribuer un financement pour soutenir les activités de l'OIML spécifiquement destinées aux pays en développement,", lang: fr }
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: requests
      message:
        - { content: "Demande que la $ 1 4^{\\mathrm{eme}} $ Conférence prenne cette Résolution en considération lors de sa décision du montant global des crédits nécessaires pour couvrir les frais de fonctionnement de I'OIML au cours de l'exercice financier 2013-2016.", lang: fr }
      dates:
      - start: '2012-10-01'
        kind: effective
