    title: Approves the BIML Director's proposal to allocate funding to support the
      OIML activities aimed
    subject: CIML
    considerations: []
    actions:
    - type: approves
      message: 'Approves the BIML Director''s proposal to allocate funding to support
        the OIML activities aimed specifically at developing countries,

        '
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: requests
      message: 'Requests the 14th Conference to take this Resolution into account
        when deciding the overall amount of credits necessary to cover the OIML''s
        operating expenses in the 2013-2016 financial period.

        '
      dates:
      - start: '2012-10-01'
        kind: effective
  - language_code: fra
    title: Point 6.6 de l'ordre du jour
    subject: CIML
    considerations:
    - type: considering
      message: |
        Considérant :
        (a) Que les résultats des efforts déployés par le passé pour soutenir les pays en développement ont eu un effet moindre que prévu,
        (b) Que les pays en développement ont accès à toutes les Recommandations et autres publications de l'OIML,
        (c) Que les pays en développement devraient recevoir davantage de soutien de la part de I'OIML par le biais d'activités de prise de conscience, d'activités destinées à l'obtention de financements par d'autres organisations internationales, à l'accès à des outils de formation actuellement en développement, à promouvoir la collaboration entre les Organisations Régionales de Métrologie Légale, et autres activités similaires,
        (d) L'OIML ne fournit pas d'aide directe aux pays en développement et ne finance aucun projet d'assistance technique dans quelque pays que ce soit ;
      dates:
      - start: '2012-10-01'
        kind: effective
    actions:
    - type: approves
      message: 'Approuve la proposition du Directeur du BIML d''attribuer un financement
        pour soutenir les activités de l''OIML spécifiquement destinées aux pays en
        développement,

        '
      dates:
      - start: '2012-10-01'
        kind: effective
    - type: requests
      message: 'Demande que la $ 1 4^{\mathrm{eme}} $ Conférence prenne cette Résolution
        en considération lors de sa décision du montant global des crédits nécessaires
        pour couvrir les frais de fonctionnement de I''OIML au cours de l''exercice
        financier 2013-2016.

        '
      dates:
      - start: '2012-10-01'
        kind: effective
