- identifier: Conference/2021/07
  doi: 10.63493/resolutions/conf202107
  urn: urn:oiml:doc:conf:resolution:16.07
  subject: OIML Conference
  title: Agenda item 10.1
  dates:
  - start: '2021-10-20'
    kind: decision
  agenda_item: '10.1'
  considerations:
  - type: recalling
    message: 'Recalling Resolution Conference/2021/06, which endorses Resolution CIML/2021/13
      allocating Corresponding Members to classes in 2023 using the same criteria
      as for Member States, specified in Article XXVI (1) of OIML B 1:1968 OIML Convention,

      '
    dates:
    - start: '2021-10-20'
      kind: effective
  actions:
  - type: endorses
    message: 'Endorses the principle described in Resolution CIML/2021/13 whereby
      increases in the annual Corresponding Member contributory fees will start in
      2024 and progressively continue, with the aim of becoming 50 % of the annual
      Member State contribution for their applicable class in 2028, and

      '
    dates:
    - start: '2021-10-20'
      kind: effective
  - type: rescinds
    message: 'Rescinds Resolution 2008/15 of the 13th OIML Conference which set the
      annual Corresponding Member fee.

      '
    dates:
    - start: '2021-10-20'
      kind: effective
- identifier: Conference/2021/08
  doi: 10.63493/resolutions/conf202108
  urn: urn:oiml:doc:conf:resolution:16.08
  subject: OIML Conference
  title: Agenda item 10.2
  dates:
  - start: '2021-10-20'
    kind: decision
  agenda_item: '10.2'
  considerations:
  - type: having_regard_to
    message: 'Having regard to Article XXIV, first paragraph, Article XXVI (1), and
      Article XXVIII, second paragraph, of OIML B 1:1968 OIML Convention,

      '
    dates:
    - start: '2021-10-20'
      kind: effective
  - type: noting
    message: 'Noting Resolution 2012/8 of the 14th OIML Conference, which states that
      changes in the classification of Member States takes place from the second year
      of the following financial period,

      '
    dates:
    - start: '2021-10-20'
      kind: effective
  - type: noting
    message: 'Noting the information contained in Resolution Conference/2021/06 of
      the 16th OIML Conference, Noting Resolution CIML/2021/13 and CIML/2021/14 of
      the 56th CIML Meeting,

      '
    dates:
    - start: '2021-10-20'
      kind: effective
  - type: considering
    message: 'Considering that the total number of base contributory shares, taking
      into account the classification of Member States as reviewed in 2021, is 147
      for the year 2022 and 148 for the years 2023-2025,

      '
    dates:
    - start: '2021-10-20'
      kind: effective
  actions:
  - type: resolves
    message: |
      Resolves:
      a) The overall amount of credits necessary for the 2022-2025 financial period shall be €10358944;
      b) The progression of the base contributory share (annual contribution for a Member State in Class 1 as defined in Article XXVI (1) of OIML B 1:1968 OIML Convention) over the 2022-2025 financial period shall be as follows:
      2022: €14200
      2023: 14400
      2024: €14600
      2025: €14800
      c) This results in the following total contributions, over the 2022-2025 financial period, for Member States classified according to Article XXVI (1) of OIML B 1:1968 OIML Convention:
      |===
      | Year | Class1 | Class2 | Class3 | Class4
      | 2022 | €14200 | €28400 | €56800 | €113600
      | 2023 | €14400 | €28800 | €57600 | €115200
      | 2024 | €14600 | €29200 | €58400 | €116800
      | 2025 | €14800 | €29600 | €59200 | €118400
      | Total | €58000 | €116000 | €232000 | €464000
      |===
      d) This results in the following total contributions, over the 2022-2025 financial period, for Corresponding Members, classified using the same criteria as for Member States:
      |===
      | Year | Class1 | Class2 | Class3 | Class4
      | 2022 | €1420 | €1420 | €1420 | €1420
      | 2023 | €1440 | €2880* | €5760 | €11520
      | 2024 | €2010 | €4020 | €8040 | €16080
      | 2025 | €2820 | €5640 | €11280 | €22560
      | Total | €7690 | €13960 | €26500 | €51580
      |===
      $ ^{*} $ BIML note 2022-05-25: Typographical error corrected from €2 800 to €2 880 to align with Conference Addendum 10.1.
      e) For the 2022-2025 financial period, newly admitted or readmitted Member States shall not pay an entry fee.
    dates:
    - start: '2021-10-20'
      kind: effective
