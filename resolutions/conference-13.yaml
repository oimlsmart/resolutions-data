    message:
    - spelling: eng
      value: |-
        The Conference instructed the Committee to elaborate a procedure to implement Article XXIX, second paragraph, of the Convention, related to resignation and readmission of Members to be submitted to the next Conference.
        The Conference granted Cameroon a delay of six months to make the payment of a significant part of its arrears.
    - spelling: fra
      value: |-
        La Conférence a donné instruction au Comité d'élaborer une procédure de mise en oeuvre du second paragraphe de l'Article XXIX de la Convention, relatif à la radiation et à la réadmission des Membres, afin de la soumettre à la prochaine Conférence.
        La Conférence a accordé au Cameroun un délai de six mois pour procéder au paiement d'une partie significative de ses arriérés.
