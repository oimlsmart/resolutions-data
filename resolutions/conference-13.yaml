    message:
    - spelling: eng
      value: The Conference took note of the comments made concerning the possibility
        of a rapprochement with the BIPM. It instructed the Committee and the BIML
        to further study this issue and to continue strengthening the cooperation
        with the BIPM.
    - spelling: fra
      value: |-
        La Conférence a pris note des commentaires exprimés concernant la possibilité d'un rapprochement avec le BIPM. Elle donne instruction au Comité et au BIML de poursuivre l'étude de ce sujet et de continuer à renforcer la coopération avec le BIPM.
        Les Etats Membres sont priés d'adresser leurs commentaires et propositions au BIML d'ici fin 2008 de sorte qu'un résumé de ces contributions puisse être discuté au Conseil de la Présidence en Mars 2009.
