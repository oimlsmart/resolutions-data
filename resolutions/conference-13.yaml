  considerations:
  - type: considering
    date_effective:
      date: '2008-10-29'
      type: effective
    message:
    - spelling: eng
      value: |-
        Considering that the provisions of IPSAS (International Public Sector Accounting Standards) concerning pensions are not yet defined, the Conference instructed the CIML President:
        to appoint an expert specialized in international public sector accountancy as the OIML external auditor;
        - to elaborate with this expert the appropriate amendments to be made to the OIML Financial Regulations, in particular regarding pensions; and
        - with the support of this expert, to take the appropriate provisional decisions concerning the OIML accountancy and the OIML Pension System.
    - spelling: fra
      value: |-
        Considérant que les dispositions des normes IPSAS (normes comptables internationales pour le secteur public) concernant les retraites, ne sont pas encore définies, la Conférence donne instruction au Président du CIML:
        - de nommer un expert spécialisé dans la comptabilité du secteur public international en tant qu'auditeur externe de l'OIML,
        - d'élaborer avec cet expert les amendements nécessaires à apporter au Règlement Financier de l'OIML, plus particulièrement pour les retraites, et
        - avec le soutien de cet expert, de prendre les décisions provisoires appropriées concernant la comptabilité et le système de retraite de l'OIML.
