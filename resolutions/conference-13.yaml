  actions:
  - type: notes
    date_effective:
      date: '2008-10-29'
      type: effective
    message:
    - spelling: eng
      value: In order to better assist developing countries, the Conference considered
        it desirable that Publication D 1 Elements for a law on metrology be revised
        to take account of the latest developments in world trade, such as conformity
        assessment, certification and globalization. The Conference instructed the
        Committee to start a revision of Publication D 1.
    - spelling: fra
      value: Afin de mieux aider les pays en développement, la Conférence a considéré
        souhaitable que la publication D 1 Eléments pour une Loi de Métrologie soit
        révisée afin de prendre en compte les derniers développements dans le commerce
        international, tels que l'évaluation de conformité, la certification et la
        globalisation. La Conférence donne instruction au Comité d'entreprendre la
        révision de la Publication D 1.
