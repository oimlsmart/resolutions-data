      type: effective
    message:
    - spelling: eng
      value: The Conference made the recommendation that CIML Members complete the
        inquiry on the implementation of OIML Recommendations as accurately as possible
        and as soon as possible, and further made the recommendation that Member States
        update it each time a new or revised National Regulation is adopted.
    - spelling: fra
      value: La Conférence recommande aux Membres du CIML de remplir l'enquête sur
        la mise en application des Recommandations de l'OIML de façon aussi précise
        que possible et dans les meilleurs délais, et de plus recommande aux Etats
        Membres de mettre celle-ci à jour chaque fois qu'une Recommandation de l'OIML
        nouvelle ou révisée est adoptée.
