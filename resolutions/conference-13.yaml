      value: The Conference made the recommendation that CIML Members make their regulatory
        requirements available to the public on the internet and that they update
        their Member's data on the OIML web site with links to these national web
        sites.
    - spelling: fra
      value: La Conférence recommande aux Membres du CIML de mettre à disposition
