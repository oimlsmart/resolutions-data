  title:
  - spelling: eng
    value: Should the economic conditions result in a critical financial situation
      for the OIML and
  - spelling: fra
    value: Dans l'éventualité où les conditions économiques engendreraient une situation
      financière critique po…
  subject:
  - spelling: eng
    value: OIML Conference
  - spelling: fra
    value: Conférence OIML
  actions:
  - type: notes
    date_effective:
      date: '2008-10-29'
      type: effective
    message:
    - spelling: eng
      value: Should the economic conditions result in a critical financial situation
        for the OIML and after having taken all necessary measures to reduce costs,
        the President of the Committee shall report on the measures taken and may
        propose that the Committee asks Member States for an exceptional voluntary
        additional contribution.
    - spelling: fra
      value: Dans l'éventualité où les conditions économiques engendreraient une situation
        financière critique pour l'OIML, le Président du Comité devra rendre compte
        des mesures prises et pourra proposer que le Comité demande aux Etats Membres
        une contribution volontaire additionnelle exceptionnelle, après avoir pris
        au préalable toutes les mesures nécessaires pour réduire les coûts.
