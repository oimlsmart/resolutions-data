    value: 'Agenda Item 10: Activités liées à la reconnaissance mutuelle des résultats
      d''essais, à l''accréditation, etc.'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a report delivered by Vice-President Chappell
        concerning the OIML activities connected with conformity assessment and multi-lateral
        recognition of OIML pattern approvals, which will now be developed within
        a new subcommittee TC 3/SC 5 under the joint responsibility of the USA and
        the BIML. Dr. Chappell's report also covered activities connected with prepackaged
        products (revision of R 87) and the possible establishment of an OIML mark
        for packagers.
