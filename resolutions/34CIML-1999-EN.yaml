    message:
    - spelling: eng
      value: The Committee took note of information given by Representatives of the
        various Regional Legal Metrology Organizations present at the meeting. The
        Committee also took note of information from Mr. Magana concerning an emerging
        cooperation in legal metrology in the Euro-Mediterranean region, and of the
        request from this cooperation to have OIML D1 Law on Metrology and papers
        on equipment revised and reissued as quickly as possible.
- identifier:
  - prefix: CIML
    number: 1999/9.5
  doi: 10.63493/resolutions/ciml19999.5
  urn: urn:oiml:doc:ciml:resolution:1999-9.5
  agenda_item: '9.5'
  dates:
  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 9.5: Organisations régionales ayant des activités liées à
      la métrologie légale (en particulier: Commission Européenne et CEN/CENELEC)'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of information given by the Bureau and by Dr.
        Bennett, on behalf of both the United Kingdom and WELMEC, concerning the development
        of a European Directive on measuring instruments (MID) and the associated
        development of OIML Normative Documents which would give a presumption of
        conformity with the MID metrological requirements. The Committee also took
        note of remarks from Vice-President Chappell concerning the necessity to clearly
        inform all OIML Members about these developments and to act in such a way
        that the creation of regional technical barriers to trade will be avoided.
    - spelling: eng
      value: The Committee was informed that a meeting between the BIML Director and
        the Secretary General of CEN and that of CENELEC was expected to be held soon.
