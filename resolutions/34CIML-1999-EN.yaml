    value: 'Agenda Item 2.2: Situation de certains Membres'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: Mr. Athané said that two or three OIML Member States were late in the
        payment of their contributions to the OIML and could be automatically delisted
        according to the OIML Convention. However, contacts with the legal metrology
        bodies of these countries had shown that there was a possibility for them
        to pay at least a part of their dues. Therefore, no action should be initiated
        at this time but decisions should be made at the next Conference.
