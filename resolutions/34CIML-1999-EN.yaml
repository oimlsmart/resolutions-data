  dates:
  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 10: Activités liées à la reconnaissance mutuelle des résultats
      d''essais, à l''accréditation, etc.'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: Mr. Chappell reminded the participants of the report he had given one
        year ago in Seoul concerning activities connected with a mutual acceptance
        agreement on OIML pattern evaluations. The efforts started in April 1998 through
        a small ad-hoc working group and, when the work was considered mature enough,
        it was transferred to TC 3 which met in June 1999 in Paris. As a result of
        discussions within TC 3, it was considered advisable to create a new subcommittee
        TC 3/SC 5 (see item 11.1) which would be responsible for a number of activities
        connected with mutual recognition of OIML pattern evaluation, including the
        work up to now under the responsibility of $ \mathrm{T A G}_{c e r t} $ and
        that on measurement uncertainty in legal metrology.
