- identifier:
  - prefix: CIML
    number: 1999/9.5
  doi: 10.63493/resolutions/ciml19999.5
  urn: urn:oiml:doc:ciml:resolution:1999-9.5
  agenda_item: '9.5'
  dates:
  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 9.5: Organisations régionales ayant des activités liées à
      la métrologie légale (en particulier: Commission Européenne et CEN/CENELEC)'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: 'Mr. Athané summarized the relationship between the European Commission
        and the OIML in relation to the development of a European Directive on Measuring
        Instruments (at present at the stage of a draft). Through his participation
        in a number of meetings in Brussels and with the active support of Representatives
        of Legal Metrology Services of the European countries concerned and of WELMEC,
        it has been possible to make sure that there were no significant divergences
        between the requirements in the MID and those in the relevant OIML Recommendations.
        This was necessary in order to make sure that instruments meeting OIML requirements
        would not be rejected systematically for metrological reasons when submitted
        to European type approval (this applying of course only to recently published
        OIML Recommendations). Following these discussions concerning the compatibility
        between the MID and OIML Recommendations, the European Commission had accepted
        to introduce in the MID two ways to obtain a presumption of conformity with
        the requirements in the MID: (i) European Standards to be developed by the
        European standardization bodies, CEN and CENELEC, upon mandates given by the
        Commission and (ii) Normative Documents developed by the OIML. For each instrument
        covered by the MID, the Normative Document would include the text of the relevant
        OIML Recommendation plus the requirements of the MID with, in parallel, the
        number(s) of the clauses of the Recommendation which satisfy the MID requirements.
        Manufacturers would then have several possibilities to satisfy the MID metrological
        requirements: (i) to prove direct compliance with these requirements, or (ii)
        to prove compliance with the provisions of the relevant European Standard,
        or (iii) to prove compliance with the provisions of the relevant OIML Recommendation
        as reproduced in the relevant Normative Document.'
- identifier:
  - prefix: CIML
    number: 1999/9.6
  doi: 10.63493/resolutions/ciml19999.6
  urn: urn:oiml:doc:ciml:resolution:1999-9.6
  agenda_item: '9.6'
  dates:
  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 9.6: Autres (BIPM, OMS,...)'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: Concerning the World Health Organization, Mr. Athané reminded the participants
        that there had been a cooperation between the WHO and the OIML some 15 or
        20 years ago, but that this cooperation had step by step disappeared. However,
        the WHO was one of the Organizations with which a "targeted approach" (if
        possible a joint BIPM/OIML approach) had been suggested in the Birkeland Report
        in order to make sure that good metrological practices would be implemented
        in medical activities both at international and at national levels. It was
        therefore the intent of the BIML to reestablish contact with the WHO.
- identifier:
  - prefix: CIML
    number: 1999/10
  doi: 10.63493/resolutions/ciml199910
  urn: urn:oiml:doc:ciml:resolution:1999-10
