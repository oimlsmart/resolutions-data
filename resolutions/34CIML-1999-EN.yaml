  dates:
  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 6: Politique à long terme de l''OIML: mise en application
      des décisions prises par le Comité à sa 33ème réunion en ce qui concerne les
      retombées du Séminaire International de Braunschweig et du rapport Birkeland'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: Mr. Faber introduced this item which he considered as one of the key
        points of this Meeting. He reminded the participants of the long strategic
        discussions resulting from the Birkeland Report and the International Seminar
        held in Braunschweig in June 1998. As a result of these discussions, a list
        of actions had been drawn up by the Bureau and discussed by the Presidential
        Council before being submitted to the Committee for examination and approval.
- identifier:
  - prefix: CIML
    number: 1999/7
  doi: 10.63493/resolutions/ciml199907
  urn: urn:oiml:doc:ciml:resolution:1999-07
  agenda_item: '7'
  dates:
  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 7: Rapport sur les activités du Conseil de la Présidence'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: Mr. Faber reminded the participants that the Birkeland Report contained
        proposals for the establishment of councils for various matters (coordination
        with RLMO's, strategic group for the Development Council, etc.). These proposals
        were carefully examined by the OIML Presidency and Presidential Council and
        the general feeling was that it would not be appropriate to multiply the number
        of such councils, but to concentrate responsibilities within the Presidential
        Council. However, it should be clearly recognized that the Presidential Council
        should remain as a purely advisory body, decision-making remaining - as provided
        for by the OIML Convention - the prerogative of the CIML and, under specific
        circumstances, of the CIML President.
