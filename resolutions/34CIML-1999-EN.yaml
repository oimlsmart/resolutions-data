  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 9.1: Organisation Mondiale du Commerce (OMC)'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: Mr. Faber introduced Mrs. Liu, Economic Officer at the World Trade Organization
        responsible for the secretariat of the Technical Barriers to Trade (TBT) Committee
        of the WTO. He remarked that this was not the first time that Mrs. Liu had
        been in contact with metrology and the OIML since she had already participated
        in the International Seminar on the social and economic role of metrology
        held in Braunschweig in June 1998. He also mentioned that in the plan of actions
        adopted the previous day by the Committee, cooperation with the WTO had been
        explicitly indicated as being of major importance for the OIML and since most
        trade transactions are measurement-related, there was a need for the OIML
        to identify those fields in which its activity might assist the WTO in reaching
        its goals.
- identifier:
  - prefix: CIML
    number: 1999/9.2
  doi: 10.63493/resolutions/ciml19999.2
  urn: urn:oiml:doc:ciml:resolution:1999-9.2
  agenda_item: '9.2'
  dates:
  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 9.2: Organisations de normalisation (en particulier: ISO,
      CEI, CEE/NU)'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: Concerning ISO, Mr. Athané said that cooperation was globally good; however,
        certain specific aspects had to be carefully examined in order to avoid any
        risk of conflict. The relations between the ISO General Secretariat and the
        BIML were excellent. The development of a joint ISO/OIML publication on Vehicle
        exhaust emission measuring instruments based on OIML R 99 was progressing
        satisfactorily. In the same way, an agreement had been reached concerning
        the development by the OIML of papers of implementation of ISO 17025 and ISO/IEC
        Guide 65 to legal metrology. There was however a risk of conflict since ISO/TC
        28 had expressed its concern over the lack of participation and information
        from the OIML TC's concerned. Mr. Athané said that he would try to clarify
        the situation as soon as possible.
