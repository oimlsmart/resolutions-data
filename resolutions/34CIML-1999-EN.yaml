        before that, he requested Mr. Szilvassy to give more information concerning
        the various topics under this item.
- identifier:
  - prefix: CIML
    number: 1999/12.2
  doi: 10.63493/resolutions/ciml199912.2
  urn: urn:oiml:doc:ciml:resolution:1999-12.2
  agenda_item: '12.2'
  dates:
  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 12.2: Nouvelles Recommandations applicables au Système'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: The Committee agreed that the new versions of R 60 (Metrological regulation
        of load cells) and of R 65 (Force measuring system of uniaxial material testing
        machines) would become applicable within the System as soon as published.
        It also agreed that the Bureau should distribute the draft Annex (test report
        format) for R 129 (Multi-dimensional measuring instruments) to CIML Members
        for postal approval as quickly as possible so that the complete Recommendation
        would be published and would become applicable within the System after approval
        of the Annex.
