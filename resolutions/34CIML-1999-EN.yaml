    - spelling: eng
      value: Mr. Athané said that no new full membership could be announced, although
        the accession of Croatia as a Member State was progressing, according to information
        received by the Bureau. Concerning Corresponding Members, Mr. Athané reminded
        the participants that several countries had been admitted or readmitted (following
        their delisting for not having paid their subscriptions for over three years)
        since the last CIML Meeting.
- identifier:
