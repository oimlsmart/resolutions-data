    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: The Committee considered it appropriate to organize a half-day Round
        Table during the Eleventh Conference on a subject to be chosen by the Presidential
        Council in line with propositions that the CIML will send to the Bureau before
        the end of 1999; the Presidential Council and Dr. Bennett will examine the
        possibility of its being an open Round Table.
- identifier:
  - prefix: CIML
