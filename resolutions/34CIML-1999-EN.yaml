    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 13.3: Examen d''une proposition préliminaire pour le budget
      2001-2004 en tenant compte des besoins en personnel du BIML pour cette période'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a preliminary written proposal on this subject
        and requested its Members to make known their comments and those of their
        countries' financial departments before the end of 1999 so that a draft budget
        could be drawn up by the Presidential Council and sent to all OIML Members
        by the end of February 2000.
