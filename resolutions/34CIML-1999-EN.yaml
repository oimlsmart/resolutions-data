      type: effective
    message:
    - spelling: eng
      value: Mr. Bennett confirmed the invitation of the United Kingdom to hold the
        Eleventh Conference (and CIML and other meetings) in London during the week
        9-13 October 2000. The chosen venue was the
- identifier:
  - prefix: CIML
    number: 1999/13.2
  doi: 10.63493/resolutions/ciml199913.2
  urn: urn:oiml:doc:ciml:resolution:1999-13.2
  agenda_item: '13.2'
  dates:
  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 13.2: Ordre du jour proposé'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: Mr. Athané reminded the participants that some proposals had been prepared
        by the Bureau, including the "classical" items that each Conference must examine.
        In addition, the Bureau had suggested that a round-table should be organized
        during one half-day to discuss a specific subject of significant interest
        for the OIML. He suggested that the Committee should take a preliminary decision
        charging the Presidential Council with the choice of the topic amongst proposals
        which would have been submitted by CIML Members before the end of 1999.
- identifier:
  - prefix: CIML
    number: 1999/13.3
  doi: 10.63493/resolutions/ciml199913.3
  urn: urn:oiml:doc:ciml:resolution:1999-13.3
  agenda_item: '13.3'
  dates:
  - date: '1999-10-06'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 13.3: Examen d''une proposition préliminaire pour le budget
      2001-2004 en tenant compte des besoins en personnel du BIML pour cette période'
  actions:
  - type: notes
    date_effective:
      date: '1999-10-06'
      type: effective
    message:
    - spelling: eng
      value: Mr. Faber reminded the participants that a written report had been prepared
        by the Bureau and sent to CIML Members some months prior to this meeting,
        proposing to maintain the BIML staff at its present level and to try to reach
        a zero increase in Member State contributions starting from their 2000 level
        and up to the end of the 2001-2004 financial period. He requested CIML Members
        to make their views known by the end of 1999 in order to make it possible
        for him (assisted by the Presidential Council and by the Bureau) to prepare
        a final draft budget which should be sent to OIML Member States not later
        than March 2000.
