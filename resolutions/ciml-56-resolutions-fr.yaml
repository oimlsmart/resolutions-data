    kind: decision
  considerations:
  - type: recalling
    message: |
      Rappelant sa résolution 2020/6,
      Se félicitant des activités du Groupe de Travail Conjoint OIML-BIPM dans le domaine de la transformation numérique des processus et activités métrologiques,
      Confirmme son soutien au Président du CIML pour qu'il signe la version finale d'une déclaration d'intention commune sur la transformation numérique de l'infrastructure scientifique et de qualité (IQ) internationale, qui devrait également être signée par d'autres parties prenantes de l'IQ, telles que CODATA, IAF, CEI, ILAC, IMEKO, ISC et ISO.
