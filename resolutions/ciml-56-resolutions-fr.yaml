    kind: decision
  considerations: []
  actions:
  - type: notes
    message: |
      Prend note du rapport sur les activités du Groupe Consultatif du CEEMS,
      Se félicite de l'expansion des possibilités de formation en ligne offertes par l'OIML,
    dates:
    - start: '2021-10-22'
      kind: effective
  - type: notes
    message: |
      Prend note des informations données sur le poste vacant de Vice-Président de l'AG du CEEMS, et de la nécessité de pourvoir ce poste dès que possible, et
      Encourage les Membres du CIML à envoyer des candidatures pour ce poste au Bureau avant la fin du mois de novembre 2021.
    dates:
    - start: '2021-10-22'
      kind: effective
