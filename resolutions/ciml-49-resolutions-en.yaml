  - identifier: CIML/2014/18
    doi: "10.63493/resolutions/ciml201418"
    urn: "urn:oiml:doc:ciml:resolution:2014-18"
    subject: CIML
    title: Agenda item 8.5
    dates:
    - start: '2014-11-04'
      kind: decision
    agenda_item: '8.5'
    considerations: []
    actions:
    - type: notes
      message: |
        Notes the report given by the ad-hoc working group (AHWG) chair and CIML First Vice President, Dr. Roman Schwartz,
        Considers the review of the MAA as a high priority project, and therefore
        Encourages the AHWG, including its task groups, to undertake every effort to present concrete proposals to the next CIML meeting,
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: instructs
      message: |
        Instructs the BIML to provide the necessary support for the AHWG, including its task groups, in order to implement CIML Resolutions nos. 2013/15, 2013/16 and 2013/17,
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: requests
      message: |
        Requests CIML Members to inform the BIML about their experience and knowledge as to whether or not OIML certificates (Basic or MAA) and OIML Test Reports are accepted in their countries as the basis for national or regional type approval, and the reasons in cases where they are either not accepted, or not completely accepted.
      dates:
      - start: '2014-11-04'
        kind: effective
