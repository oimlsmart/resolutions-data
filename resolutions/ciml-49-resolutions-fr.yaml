  - identifier: CIML/2014/4
    doi: "10.63493/resolutions/ciml201404"
    urn: "urn:oiml:doc:ciml:resolution:2014-04"
    subject: CIML
    title: "Décide de ne pas désigner de Comité de Sélection tel que le prévoit la"
    dates:
    - start: '2014-11-04'
      kind: decision
    considerations:
    - type: having_regard_to
      message: |
        Vu la section 7.2.2 de l'OIML B 7:2013 Statuts du Personnel du BIML, la section 2, premier paragraphe, et la section 4, premier alinéa, de l'OIML B 13:2004 Procédure pour la désignation du Directeur et des Adjoints au Directeur du BIML,
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: considering
      message: |
        Considérant que le mandat du Directeur du BIML arrive à échéance le 31 décembre 2015,
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: considering
      message: |
        Considérant la proposition de son Président, en application de la section 2 de l'OIML B 13:2004, de renouveler le contrat du Directeur sans autre procédure préalable,
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: noting
      message: |
        Prenant note des observations formulées par ses Membres,
        Indique qu'il prévoit de décider le renouvellement de l'engagement du Directeur du BIML pour une durée déterminée de cinq ans au maximum lors de sa réunion en 2015, et
      dates:
      - start: '2014-11-04'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide de ne pas désigner de Comité de Sélection tel que le prévoit la section 3 de l'OIML B 13:2004.
      dates:
      - start: '2014-11-04'
        kind: effective
