  - identifier: CIML/2014/18
    doi: "10.63493/resolutions/ciml201418"
    urn: "urn:oiml:doc:ciml:resolution:2014-18"
    subject: CIML
    title: "Prend note du rapport présenté par le président du groupe de travail ad hoc"
    dates:
    - start: '2014-11-04'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Prend note du rapport présenté par le président du groupe de travail ad hoc (AHWG) et le Premier Vice-Président du CIML, le Dr. Roman Schwartz,
        Estime que l'examen du MAA est un projet hautement prioritaire et, en conséquence,
        Encourage le groupe de travail ad hoc, y compris ses sous-groupes, à mettre tout en œuvre pour présenter des propositions concrètes à la prochaine réunion du CIML,
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: charges
      message: |
        Charge le BIML de fournir au groupe de travail ad hoc, y compris à ses sous-groupes, le soutien nécessaire pour mettre en œuvre les Résolutions n° 2013/15, 2013/16 et 2013/17 du CIML,
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: requests
      message: |
        Demande aux Membres du CIML de faire part au BIML de l'expérience et de la connaissance qu'ils ont de l'acceptation, ou de la non-acceptation, des certificats (dits « de Base » ou MAA) de l'OIML et des Rapports d'essai de l'OIML dans leur pays comme base d'une approbation de type à l'échelon national ou régional, et des raisons pour lesquelles, soit ils ne sont pas acceptés, soit ils ne sont pas complètement acceptés.
      dates:
      - start: '2014-11-04'
        kind: effective
