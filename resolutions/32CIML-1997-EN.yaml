  actions:
  - type: notes
    message: 'The Committee took note of a report by the Bureau concerning BIML activities
      since its last meeting and expressed its satisfaction for the work accomplished,
      in particular for initiatives taken in certain new fields (Internet, communication,
      etc.). It requested its President to set up a working group in order to assist
      the Bureau in these new tasks.

      '
