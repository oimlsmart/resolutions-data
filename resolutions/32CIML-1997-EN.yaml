- identifier: CIML/1997/13.1
  doi: 10.63493/resolutions/ciml199713.1
  urn: urn:oiml:doc:ciml:resolution:1997-13.1
  subject: CIML
  title: OIML Bulletin
  dates:
  - start: '1997-10-29'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a report by the Bureau concerning the OIML
      Bulletin and reaffirmed the essential role of the Bulletin as a liaison and
      communication tool among OIML Members and indeed all those worldwide who have
      an interest in legal metrology activities. Therefore, the Committee urged its
      Members to actively participate in the Bulletin by providing the Bureau with
      technical papers, information on national and regional developments, announcements
      of metrological events, new books on metrology, etc., for publication in the
      Bulletin. The Committee also requested its President to examine the opportunity
      of establishing a working group to assist the Bureau in this respect.

      '
    dates:
    - start: '1997-10-29'
      kind: effective
- identifier: CIML/1997/13.2
  doi: 10.63493/resolutions/ciml199713.2
  urn: urn:oiml:doc:ciml:resolution:1997-13.2
  subject: CIML
  title: OIML on Internet (general information, meetings and proceedings, OIML certificates,
    OIML publication…
  dates:
  - start: '1997-10-29'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a report by the Bureau concerning the possibility
      of making information on OIML available through Internet and encouraged the
      Bureau to work in this direction. Concerning the availability on Internet of
      OIML International Recommendations and Documents and related juridical and economic
      aspects, the Committee requested its President to set up a working group in
      order to assist the Bureau in this respect.

      '
    dates:
    - start: '1997-10-29'
      kind: effective
