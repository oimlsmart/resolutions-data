- identifier: CIML/1997/2.2
  doi: 10.63493/resolutions/ciml19972.2
  urn: urn:oiml:doc:ciml:resolution:1997-2.2
  subject: CIML
  title: Situation of certain Members
  dates:
  - start: '1997-10-29'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of information from the Bureau concerning the
      situation of certain Member States which were late in the payment of their contributions
      to the OIML; the Committee expressed its satisfaction for the fact that, at
      this time, the unpaid contributions of these Member States remained within acceptable
      limits. However, it urged them to do their utmost to pay their arrears as soon
      as possible. The Committee also took note of the fact that Burkina Faso had
      been delisted as a Corresponding Member for not having paid their annual subscriptions
      for more than four years.

      '
    dates:
    - start: '1997-10-29'
      kind: effective
