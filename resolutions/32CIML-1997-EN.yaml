- identifier:
  - prefix: CIML
    number: 1997/14.1
  doi: 10.63493/resolutions/ciml199714.1
  urn: urn:oiml:doc:ciml:resolution:1997-14.1
  dates:
  - date: '1997-10-29'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 14.1: $ 3 3^{\mathrm{r d}} $ and $ 3 4^{\mathrm{t h}} $ meetings
      of the CIML'
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of information given by the Delegation of
        the Republic of Korea concerning the preparations for the $ 33^{rd} $ CIML
        meeting and expressed its satisfaction. The Committee noted that this meeting
        will be held during the week following the ILAC meeting in Sydney, and that
        an APLMF meeting and possibly other OIML meetings or workshops will be organized
        in conjunction it.

        '
      date_effective:
        date: '1997-10-29'
        type: effective
  agenda_item: '14.1'
- identifier:
  - prefix: CIML
    number: 1997/14.2
  doi: 10.63493/resolutions/ciml199714.2
  urn: urn:oiml:doc:ciml:resolution:1997-14.2
  dates:
  - date: '1997-10-29'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 14.2: Eleventh Conference'
    considerations: []
    actions:
    - type: notes
      message: 'The Committee noted that the Eleventh Conference might be held in
        the year 2000 in Paris, a final decision having to be made within one or two
        years.

        '
      date_effective:
        date: '1997-10-29'
        type: effective
  agenda_item: '14.2'
