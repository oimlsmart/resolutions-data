    - language_code: eng
      script: Latn
      title: Situation of certain Members
      subject: CIML
      actions:
      - type: notes
        message: |
          The Committee noted that Zambia had been struck off the list of Member States, following the decisions made at the 38th CIML Meeting.
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: notes
        message: |
          The Committee noted that a number of countries were in the process of, or were envisaging joining the Organization as Member States or as Corresponding Members.
        dates:
        - start: '2004-10-26'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Nouveaux Membres - Perspectives d'adhésions"
      subject: CIML
      actions:
      - type: notes
        message: |
          La Conférence a constaté que le nombre de Membres de l'OIML avait significativement augmenté depuis la Onzième Conférence, malgré le fait que plusieurs Membres Correspondants avaient été radiés pour non paiement de leur contribution pendant plus de trois ans. La Conférence a pris note du fait que certains Membres Correspondants envisageaient d'adhérer en tant qu'États Membres et que plusieurs pays/économies comptaient adhérer en tant que Membres Correspondants.
        dates:
        - start: '2004-10-26'
          kind: effective
  - identifier: Conference/2004/2.2
    doi: "10.63493/resolutions/conf20042.2"
