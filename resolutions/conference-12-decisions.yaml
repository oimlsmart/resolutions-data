  - identifier: Conference/2004/7.2
    doi: "10.63493/resolutions/conf20047.2"
    urn: "urn:oiml:doc:conf:resolution:12.7.2"
    dates:
    - start: '2004-10-26'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: Guidelines for future activity
      subject: CIML
      actions:
      - type: notes
        message: |
          The Conference noted the Committee's report that, notwithstanding Resolution 7.2 of the 6th International Conference of Legal Metrology which established the OIML Development Council, the OIML's work on Developing Country matters could be more efficiently managed by the establishment of a Permanent Working Group on Developing Countries (PWGDC), which would replace the Development Council.
        dates:
        - start: '2004-10-26'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Directives pour l'activité à venir"
      subject: CIML
      actions:
      - type: notes
        message: |
          La Conférence a pris note du rapport du Comité selon lequel, en dépit de la Résolution 7.2 de la 6ème Conférence Internationale de Métrologie Légale qui instituait le Conseil de Développement de l'OIML, le travail de l'OIML sur les questions relatives aux Pays en Développement pourrait être géré plus efficacement par un Groupe de Travail Permanent pour les Pays en Développement (PWGDC), créé pour remplacer le Conseil de Développement.
        dates:
        - start: '2004-10-26'
          kind: effective
