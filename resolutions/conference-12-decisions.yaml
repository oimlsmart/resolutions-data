    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 2.2: The situation of certain Members (see also Item 8.2)'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference noted that Zambia had been struck off the list of Member
        States for not having complied with the requirements laid down by the Eleventh
        Conference.
  - language_code: fra
    title: 'Agenda Item 2.2: The situation of certain Members (see also Item 8.2)'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a noté que la Zambie avait été radiée de la liste des
        États Membres faute de s'être conformée aux obligations établies par la Onzième
        Conférence.
