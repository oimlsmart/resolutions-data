        - { content: "The Committee thanked the French Government for its invitation to hold its 40th Meeting in Lyon, France, from 17 to 20 June 2005, in conjunction with the International Metrology Congress. The Committee noted that a gala reception would be organized on 20 June 2005 to celebrate the 50th Anniversary of the OIML.", lang: en }
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message:
        - { content: The Committee also noted that legal metrology sessions would be organized by the Bureau during the International Metrology Congress and that the Bureau would pay the registration fee for one participant from each OIML Member State and Corresponding Member to attend this Congress., lang: en }
      dates:
      - start: '2004-10-26'
        kind: effective
