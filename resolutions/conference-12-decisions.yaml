    number: 2004/10.1
  doi: 10.63493/resolutions/conf200410.1
  urn: urn:oiml:doc:conf:resolution:12.10.1
  agenda_item: '10.1'
  dates:
  - date: '2004-10-26'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 10.1: Adoption of Decisions and Resolutions of the Conference'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: A second roll call of delegates was called and it was found that 53
        Member States were present; the statutory quorum of two-thirds as fixed by
        the Convention was therefore reached.
  - language_code: fra
    title: 'Agenda Item 10.1: Adoption of Decisions and Resolutions of the Conference'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: Après avoir procédé à un second appel des Délégués, il a été constaté
        que 53 États Membres étaient présents; le quorum statutaire des deux tiers
        fixé par la Convention était donc atteint.
- identifier:
  - prefix: Conference
    number: 2004/10.2
  doi: 10.63493/resolutions/conf200410.2
  urn: urn:oiml:doc:conf:resolution:12.10.2
  agenda_item: '10.2'
  dates:
  - date: '2004-10-26'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 10.2: Date and place of the next Conference'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference decided that it would wait for a period of up to two
        years, i.e. until 2006, to establish whether any Member State was willing
        to host the Thirteenth Conference in 2008. If no Member State was forthcoming,
        then the BIML would organize the Conference in France.
  - language_code: fra
    title: 'Agenda Item 10.2: Date and place of the next Conference'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a décidé d'attendre jusqu'à deux ans, c'est-à-dire jusqu'en
        2006, une proposition d'un État Membre d'accueillir la Treizième Conférence
        en 2008. Si aucun État Membre n'y était disposé, alors le BIML organiserait
        la Conférence en France.
