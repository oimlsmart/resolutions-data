    title: 'Agenda Item 8.3: Revision of the OIML Financial Regulations'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a approuvé le Règlement Financier de l'OIML révisé tel
        qu'établi par le Comité.
