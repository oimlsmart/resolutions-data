      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference took note of a report describing progress made with
        this activity since the establishment of the System in general and since the
        11th Conference in particular, including the results of recent inquiries carried
        out among OIML Members and manufacturers.
  - language_code: fra
    title: 'Agenda Item 6.1: OIML Certificate System for Measuring Instruments'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a pris note d'un rapport décrivant les progrès réalisés
        dans le cadre de cette activité depuis la création du Système en général et
        depuis la Onzième Conférence en particulier, incluant les résultats des récentes
        enquêtes effectuées parmi les Membres de l'OIML et les fabricants d'instruments
        de mesure.
- identifier:
  - prefix: Conference
    number: 2004/6.2
  doi: 10.63493/resolutions/conf20046.2
  urn: urn:oiml:doc:conf:resolution:12.6.2
  agenda_item: '6.2'
