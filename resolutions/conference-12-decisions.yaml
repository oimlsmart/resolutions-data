      script: Latn
      title: "Formal sanction of Recommendations already approved by the Committee in 2001, 2002, 2003 and 2004"
      subject: CIML
      actions:
      - type: notes
        message: |
          The Conference decided that OIML Test Report Formats, which are of an informative nature concerning their implementation in national regulations, shall be approved by the CIML according to the rules applicable to International Documents, without having to be sanctioned by the Conference.
        dates:
        - start: '2004-10-26'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Sanction officielle des Recommandations déjà approuvées par le Comité en 2001, 2002, 2003 et 2004"
      subject: CIML
      actions:
      - type: notes
        message: |
          La Conférence a décidé que les Formats de Rapport d'Essai OIML, qui sont de nature informative pour ce qui concerne leur application dans le cadre des réglementations nationales, doivent être approuvés par le CIML selon les règles applicables aux Documents Internationaux, sans devoir être sanctionnés par la Conférence.
        dates:
        - start: '2004-10-26'
          kind: effective
