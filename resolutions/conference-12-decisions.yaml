  doi: 10.63493/resolutions/conf20043.2
  urn: urn:oiml:doc:conf:resolution:12.3.2
  agenda_item: '3.2'
  dates:
  - date: '2004-10-26'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 3.2: Guidelines for the period 2005–2008'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference noted that most of the information concerning the actions
        carried out since the Eleventh Conference, including the development of an
        Action Plan for 1999-2002 with extension to 2004, had been given in the report
        on activities delivered by the CIML Acting President. The Conference also
        noted that the Long-Term Policy and the Action Plan shall be revised under
        the supervision of the newly elected CIML President, and requested the CIML
        to monitor its implementation.
  - language_code: fra
    title: 'Agenda Item 3.2: Guidelines for the period 2005–2008'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a constaté que la plupart des informations relatives
        aux actions réalisées depuis la Onzième Conférence, y compris l'élaboration
        d'un Plan d'Action pour 1999-2002 avec prolongement jusqu'en 2004, avaient
        été fournies dans le rapport sur les activités présenté par le Président Intérimaire
        du CIML. La Conférence a aussi constaté que la Politique à long terme et le
        Plan d'Action devaient être révisés sous le contrôle du Président du CIML
        nouvellement élu, et a demandé au CIML de veiller à sa mise en application.
