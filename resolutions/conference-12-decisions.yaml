    title: Pays en Développement
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note d''un rapport présenté par le Dr Seiler à propos
        du Forum Métrologie - Facilitateur de Commerce tenu lundi 25 octobre et a
        chargé le Bureau d''organiser les suites de ce Forum.

        '
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''un rapport présenté par M. Magaña sur les
        activités du Conseil de Développement de l''OIML et a exprimé sa plus grande
        satisfaction pour les contributions de sa Présidente, Mme Annabi.

        '
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: 'Le Comité a considéré que le travail de l''OIML sur les questions
        relatives aux Pays en Développement pouvait être géré plus efficacement par
        le Groupe de Travail Permanent sur les Pays en Développement (PWGDC) créé
        par la 38ème Réunion du CIML; le PWGDC devrait remplacer le Conseil de Développement.

        '
      dates:
      - start: '2004-10-26'
        kind: effective
