    title: Lignes directrices pour la période 2005-2008
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'La Conférence a constaté que la plupart des informations relatives
        aux actions réalisées depuis la Onzième Conférence, y compris l''élaboration
        d''un Plan d''Action pour 1999-2002 avec prolongement jusqu''en 2004, avaient
        été fournies dans le rapport sur les activités présenté par le Président Intérimaire
        du CIML. La Conférence a aussi constaté que la Politique à long terme et le
        Plan d''Action devaient être révisés sous le contrôle du Président du CIML
        nouvellement élu, et a demandé au CIML de veiller à sa mise en application.

        '
      dates:
      - start: '2004-10-26'
        kind: effective
