    title: 'Agenda Item 6.2: Mutual Acceptance Arrangement (MAA)'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference expressed its appreciation to the CIML for the setting
        up of the Mutual Acceptance Arrangement, and took note that this System will
        be implemented in 2005.
  - language_code: fra
    title: 'Agenda Item 6.2: Mutual Acceptance Arrangement (MAA)'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a exprimé sa satisfaction pour la mise en place par le
        CIML de l'Arrangement d'Acceptation Mutuelle, et a pris note que ce Système
        entrerait en application en 2005.
