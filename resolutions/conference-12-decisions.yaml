      message: 'La Conférence a exprimé sa satisfaction pour la mise en place par
        le CIML de l''Arrangement d''Acceptation Mutuelle, et a pris note que ce Système
        entrerait en application en 2005.

        '
      date_effective:
        date: '2004-10-26'
        type: effective
