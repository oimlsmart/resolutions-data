  urn: urn:oiml:doc:conf:resolution:12.5.1
  agenda_item: '5.1'
  dates:
  - date: '2004-10-26'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 5.1: Work undertaken - State of progress'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference took note of a report concerning the activities of OIML
        Technical Committees and Subcommittees and requested the CIML to continue
        to monitor the situation and to find solutions in order to ensure a better
        distribution of technical responsibilities amongst OIML Member States.
  - language_code: fra
    title: 'Agenda Item 5.1: Work undertaken - State of progress'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a pris note d'un rapport concernant les activités des
        Comités Techniques et Sous-comités de l'OIML et a demandé au CIML de continuer
        à surveiller la situation et de trouver des solutions afin d'assurer une meilleure
        répartition des responsabilités techniques parmi les États Membres de l'OIML.
- identifier:
  - prefix: Conference
    number: 2004/5.2
  doi: 10.63493/resolutions/conf20045.2
  urn: urn:oiml:doc:conf:resolution:12.5.2
  agenda_item: '5.2'
  dates:
  - date: '2004-10-26'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 5.2: Implementation of Recommendations by OIML Members'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference took note of information given by the Bureau concerning
        the implementation of OIML Recommendations in national regulations or voluntary
        standards. It noted that due to the low level of responses, no comprehensive
        report could be given.
  - language_code: fra
    title: 'Agenda Item 5.2: Implementation of Recommendations by OIML Members'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a pris note d'informations fournies par le Bureau concernant
        la mise en application des Recommandations OIML dans les réglementations nationales
        ou les normes d'application volontaire. Il a été constaté qu'en raison du
        faible taux de réponses, aucun rapport complet ne pouvait être donné.
- identifier:
  - prefix: Conference
    number: 2004/5.3
  doi: 10.63493/resolutions/conf20045.3
  urn: urn:oiml:doc:conf:resolution:12.5.3
  agenda_item: '5.3'
  dates:
  - date: '2004-10-26'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 5.3: Formal sanction of Recommendations already approved by
      the Committee in 2001, 2002 and 2003'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference decided that OIML Test Report Formats, which are of
        an informative nature concerning their implementation in national regulations,
        shall be approved by the CIML according to the rules applicable to International
        Documents, without having to be sanctioned by the Conference.
  - language_code: fra
    title: 'Agenda Item 5.3: Formal sanction of Recommendations already approved by
      the Committee in 2001, 2002 and 2003'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a décidé que les Formats de Rapport d'Essai OIML, qui
        sont de nature informative pour ce qui concerne leur application dans le cadre
        des réglementations nationales, doivent être approuvés par le CIML selon les
        règles applicables aux Documents Internationaux, sans devoir être sanctionnés
        par la Conférence.
- identifier:
  - prefix: Conference
    number: 2004/5.4
  doi: 10.63493/resolutions/conf20045.4
  urn: urn:oiml:doc:conf:resolution:12.5.4
