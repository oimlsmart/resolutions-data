    - spelling: eng
      value: The Conference took note of a report concerning the activities of OIML
        Technical Committees and Subcommittees and requested the CIML to continue
        to monitor the situation and to find solutions in order to ensure a better
        distribution of technical responsibilities amongst OIML Member States.
    - spelling: fra
      value: La Conférence a pris note d'un rapport concernant les activités des Comités
        Techniques et Sous-comités de l'OIML et a demandé au CIML de continuer à surveiller
        la situation et de trouver des solutions afin d'assurer une meilleure répartition
        des responsabilités techniques parmi les États Membres de l'OIML.
