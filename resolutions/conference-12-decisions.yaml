    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference took note of a report concerning the Development Council
        meeting held on 25 October and expressed its appreciation to the Chairperson
        for the work accomplished.
  - language_code: fra
    title: 'Agenda Item 7.1: Report on activities for the period 2001–2004'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a pris note d'un rapport concernant la réunion du Conseil
        de Développement tenue le 25 octobre et a exprimé sa satisfaction à la Présidente
        pour le travail accompli.
- identifier:
  - prefix: Conference
    number: 2004/7.2
  doi: 10.63493/resolutions/conf20047.2
  urn: urn:oiml:doc:conf:resolution:12.7.2
  agenda_item: '7.2'
  dates:
  - date: '2004-10-26'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 7.2: Guidelines for future activities'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference noted the Committee's report that, notwithstanding Resolution
        7.2 of the 6th International Conference of Legal Metrology which established
        the OIML Development Council, the OIML's work on Developing Country matters
        could be more efficiently managed by the establishment of a Permanent Working
        Group on Developing Countries (PWGDC), which would replace the Development
        Council.
  - language_code: fra
    title: 'Agenda Item 7.2: Guidelines for future activities'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a pris note du rapport du Comité selon lequel, en dépit
        de la Résolution 7.2 de la 6ème Conférence Internationale de Métrologie Légale
        qui instituait le Conseil de Développement de l'OIML, le travail de l'OIML
        sur les questions relatives aux Pays en Développement pourrait être géré plus
        efficacement par un Groupe de Travail Permanent pour les Pays en Développement
        (PWGDC), créé pour remplacer le Conseil de Développement.
