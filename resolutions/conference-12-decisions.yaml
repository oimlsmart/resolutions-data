    title: 'Agenda Item 5.4: Draft Recommendations directly presented for sanctioning
      by the Conference'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference sanctioned one new Recommendation Instruments for measuring
        the area of leathers (R 136). The Conference also decided to withdraw OIML
        Recommendations R 33 and R 62.
  - language_code: fra
    title: 'Agenda Item 5.4: Draft Recommendations directly presented for sanctioning
      by the Conference'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a sanctionné une nouvelle Recommandation Instruments
        de mesure de la surface des cuirs (R 136).
