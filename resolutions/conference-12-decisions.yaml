    title: Examen de la situation de certains TC/SC
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note d''un rapport du BIML décrivant la situation
        de certains Comités Techniques et SousComités.

        '
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: 'Le Comité a approuvé la proposition d''attribuer le Secrétariat du
        TC 6 à l''Afrique du sud et celui du TC 9/SC 3 à l''Allemagne.

        '
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: 'Le Comité a constaté premièrement que les Secrétariats du TC 8/SC
        2 et du TC 10/SC 3 étaient encore vacants, et deuxièmement que l''Allemagne
        souhaitait abandonner le Secrétariat du TC 12. Il a demandé aux Membres d''étudier
        la possibilité de prendre la responsabilité des Secrétariats de ces organes
        techniques.

        '
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: 'Le Comité a approuvé deux nouveaux projets de travail:

        '
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: 'Le Comité a fixé la date limite pour la délivrance des Certificats
        d''après l''édition 1996 de la R 61 au 31 décembre 2005 et a demandé aux Autorités
        de Délivrance d''avertir le BIML lorsqu''elles seraient prêtes à délivrer
        des Certificats d''après les exigences de la R 61 révisée (édition 2004),
        car la R 61-1 avait déjà été publiée et la publication de la R 61-2 (2004)
        était imminente.

        '
      dates:
      - start: '2004-10-26'
        kind: effective
