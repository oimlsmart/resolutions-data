    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference accepted (with one abstention) to consider the budgetary
        proposals as a whole and not in separate components.
  - language_code: fra
    title: 'Agenda Item 8.5: Budget for the financial period 2005–2008'
    actions:
