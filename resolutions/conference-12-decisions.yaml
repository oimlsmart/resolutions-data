    localizations:
    - language_code: eng
      script: Latn
      title: Developing Countries
      subject: CIML
      actions:
      - type: notes
        message: |
          The Committee took note of a report given by Dr Seiler concerning the Forum Metrology-Trade Facilitator held on Monday 25 October and instructed the Bureau to organize the following-up of this Forum.
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: notes
        message: |
          The Committee took note of a report given by Mr. Magaña on the activities and future of the OIML Development Council and expressed its utmost appreciation for the contributions of its Chairperson, Mrs. Annabi.
        dates:
        - start: '2004-10-26'
          kind: effective
      - type: notes
        message: |
          The Committee noted that OIML work on Developing Country matters could be more efficiently managed by the Permanent Working Group on Developing Countries as established by the 38th CIML Meeting; the PWGDC should replace the Development Council.
        dates:
        - start: '2004-10-26'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Pays en Développement"
      subject: CIML
