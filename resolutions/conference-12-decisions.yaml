    value: Status of OIML Publications
  - spelling: fra
    value: Status of OIML Publications
  actions:
  - type: notes
    date_effective:
      date: '2004-10-26'
      type: effective
    message:
    - spelling: eng
      value: The Conference approved the proposal to make all OIML Publications, except
        those which are published jointly with other Organizations, available free
        of charge in electronic format on the OIML web site and to cease publishing
        them on paper.
    - spelling: fra
      value: La Conférence a approuvé la proposition de rendre toutes les Publications
        OIML, exceptées celles publiées en commun avec d'autres organisations, disponibles
        gratuitement sous forme électronique sur le site Internet de l'OIML et de
        cesser leur publication sur papier.
