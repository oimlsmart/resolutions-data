      message: 'Le Comité a décidé qu''à partir du 1<sup>er</sup> janvier 2005, les
        Autorités de délivrance de l''OIML devaient établir les Certificats OIML dans
        un format électronique spécifié par le BIML, de façon que ces Certificats
        puissent être diffusés sur le site Internet de l''OIML.

        '
      dates:
      - start: '2004-10-26'
        kind: effective
