        type: effective
      message: La Conférence a accepté (avec une abstention) de considérer les propositions
        budgétaires dans leur ensemble et non comme composants séparés.
- identifier:
  - prefix: Conference
    number: 2004/8.6
  doi: 10.63493/resolutions/conf20048.6
  urn: urn:oiml:doc:conf:resolution:12.8.6
  agenda_item: '8.6'
  dates:
  - date: '2004-10-26'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 8.6: Status of OIML Publications'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: The Conference approved the proposal to make all OIML Publications,
        except those which are published jointly with other Organizations, available
        free of charge in electronic format on the OIML web site and to cease publishing
        them on paper.
  - language_code: fra
    title: 'Agenda Item 8.6: Status of OIML Publications'
    actions:
    - type: notes
      date_effective:
        date: '2004-10-26'
        type: effective
      message: La Conférence a approuvé la proposition de rendre toutes les Publications
        OIML, exceptées celles publiées en commun avec d'autres organisations, disponibles
        gratuitement sous forme électronique sur le site Internet de l'OIML et de
        cesser leur publication sur papier.
