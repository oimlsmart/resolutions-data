  - type: considering
    date_effective:
      date: '2016-10-19'
      type: effective
    message:
    - spelling: eng
      value: Considering that the total number of base contributory shares, taking
        into account the classification of Member States as reviewed in 2016, is 144
        for the year 2017 and, after reclassification of some Member States, 146 for
        the remaining years of the 2017-2020 financial period,
    - spelling: fra
      value: Considérant que le nombre total de parts contributives de base, en prenant
        en considération la classification des États Membres tel que révisée en 2016,
        est de 144 pour l'année 2017 et, après reclassification de certains États
        Membres, de 146 pour les années suivantes de l'exercice financier 2017-2020,
  actions:
  - type: resolves
    date_effective:
      date: '2016-10-19'
      type: effective
    message:
    - spelling: eng
      value: |-
        Resolves:
        a) The overall amount of credits, necessary to cover the Organization's operating expenses shall be €8 827 000 for the 2017-2020 financial period;
        b) The annual base contributory share for the 2017-2020 financial period is €14 000. This results in a total contribution for a Member State classified according to Article XXVI (1) of the Convention in Class 1, Class 2, Class 3 or Class 4 of €56 000, €112 000, €224 000 or $ \epsilon $448 000, respectively;
        c) In the case of the admission of a Member State during the financial period, the overall amount of credits mentioned in a) above is increased by the contributory share of that Member State, calculated from its classification and the base contributory share, proportionate to the period from its admission to the expiry of the financial period;
        d) For the 2017-2020 financial period, newly admitted or readmitted Member States shall not pay an entry fee.
  - type: decides
    date_effective:
      date: '2016-10-19'
      type: effective
    message:
    - spelling: fra
      value: |-
        Décide que :
        a) Le montant global des crédits nécessaires pour couvrir les frais de fonctionnement de l'Organisation est de 8 827 000 euros pour l'exercice financier 2017-2020 ;
        b) La part annuelle contributive de base pour l'exercice financier 2017-2020 est de 14 000 euros. Cela entraîne une contribution annuelle totale pour un État Membre classifié conformément à l'Article XXVI (1) de la Convention en Classe 1, Classe 2, Classe 3 ou Classe 4 de 56 000 euros, 112 000 euros, 224 000 euros or 448 000 euros, respectivement ;
        c) En cas d'admission d'un État Membre au cours de l'exercice financier, le montant global de crédits mentionné en a) ci-dessus, est augmenté par la part contributive dudit État Membre, calculée à partir de sa classification et de la part contributive de base, proportionnellement à la période allant de son admission jusqu'à la fin de l'exercice financier ;
        d) Pour l'exercice financier 2017-2020, les États Membres nouvellement admis ou réadmis ne paient pas de droit d'entrée.
