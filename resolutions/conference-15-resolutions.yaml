  actions:
  - type: resolves
    date_effective:
      date: '2016-10-19'
      type: effective
    message:
    - spelling: eng
      value: |-
        Resolves:
        a) The budget surpluses (net results) from the 2013-2016 financial period shall be added to the reserve funds;
        b) During the financial period 2017-2020,the increase in the reserve funds mentioned in a) above should be made available to provide time-limited support to secretariats and conveners in developing their capability,in particular through training,to deliver the technical work of the OIML.
  - type: instructs
    date_effective:
      date: '2016-10-19'
      type: effective
    message:
    - spelling: eng
      value: Instructs the Director to prepare budgets to be presented to the CIML
        for the years 2017,2018,2019 and 2020 which reflect this expenditure.
  - type: decides
    date_effective:
      date: '2016-10-19'
      type: effective
    message:
    - spelling: fra
      value: |-
        Décide que :
        a) Les excédents budgétaires (résultats nets) de l'exercice financier 2013-2016 doivent être ajoutés aux fonds de réserve ;
        b) Durant l'exercice financier 2017-2020, l'augmentation des fonds de réserve mentionnés en a) ci-dessus devrait être utilisée pour apporter aux secrétariats et aux responsables des groupes un soutien limité dans le temps visant à développer leurs capacités à réaliser le travail technique de l'OIML, notamment par des actions de formation.
  - type: charges
    date_effective:
      date: '2016-10-19'
      type: effective
    message:
    - spelling: fra
      value: Charge le Directeur de préparer des budgets à présenter au CIML pour
        les années 2017, 2018, 2019 et 2020 faisant apparaître ces dépenses.
