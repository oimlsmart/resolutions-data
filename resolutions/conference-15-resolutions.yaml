        kind: effective
    - type: approves
      message:
        - { content: "Approved at the 48th CIML Meeting (Resolutions 2013/11 and 2013/19)\n- R 46-3 Active electrical energy meters - Part 3: Test report format\n- R 49-1 Water meters for cold potable water and hot water- Part 1: Metrological\nand technical requirements\n- R 49-2 Water meters for cold potable water and hot water- Part 2: Test methods\n- R 49-3 Water meters for cold potable water and hot water - Part 3: Test report format\n- R 144 Instruments for continuous measuring CO and NOx in stationary source emissions\n- R 100 Atomic absorption spectrometer systems for measuring metal pollutants\n- D 11 General requirements for measuring instruments - Environmental conditions\n- V1 International vocabulary of terms in legal metrology (VIML)", lang: en }
      dates:
      - start: '2016-10-19'
        kind: effective
    - type: approves
      message:
        - { content: "Approved at the 49th CIML Meeting (Resolution 2014/15)\n- Amd R 35-1 Material measures for length for general use-Part 1: Metrological\nand technical requirements\n- R 50-1 Continuous totalizing automatic weighing instruments (belt weighers)\n- Part 1: Metrological and technical requirements\n- R 50-2 Continuous totalizing automatic weighing instruments (belt weighers)\n- Part 2: Test procedures\n- R 50-3 Continuous totalizing automatic weighing instruments (belt weighers)\n- R 117-2 Dynamic measuring systems for liquids other than water\n- Part 2: Metrological controls and performance tests\n- R 117-3 Dynamic measuring systems for liquids other than water\n- Part 3: Test report format\n- R 139-1 Compressed gaseous fuels measuring systems for vehicles\n- Part 1: Metrological and technical requirements\n- R 139-2 Compressed gaseous fuels measuring systems for vehicles\n- Part 2: Metrological controls and performance tests\nDirect CIML online approval in 2014\n- R 137-3 Gas meters - Part 3: Test report format\n- Amd R 137-1 Gas meters - Part 1: Metrological and technical requirements\n- Amd R 137-2 Gas meters - Part 2: Metrological controls and performance tests\n2015", lang: en }
      dates:
      - start: '2016-10-19'
        kind: effective
    - type: approves
      message:
        - { content: "Approved at the 50th CIML Meeting (Resolution 2015/14)\n- R 79 Labeling requirements for prepackages\n- R 139-3 Compressed gaseous fuels measuring systems for vehicles\n- Part 3: Test report format\n- R 145 Ophthalmic instruments - Impression and applanation tonometers\n2016\nSubmitted for approval at the 51st CIML Meeting (See CIML Item 9.1)\n- R 59 Moisture meters for cereal grains and oilseeds\n- R 87 Quantity of product in prepackages\n- New R Protein measuring instruments for cereal grains and oilseeds\n- New R Standard blackbody radiator for the temperature range from $ - 5 0 \\, ^ {\\circ} C $ to $ 2 5 0 0 \\, ^ {\\circ} C $", lang: en }
