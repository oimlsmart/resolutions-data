        - { content: "Décide que :\nLe Comité est à présent chargé d'organiser la 16eme Conférence en 2020, et d'en fixer le lieu et les dates.\n***\n<div align=\"center\">\n15 $ ^{\\mathrm{e}me}} $ Conférence Internationale de Métrologie Légale Point 6\n</div>\nSanction des publications OIML\nUne liste est donnée ci-dessous de tous les Documents, Recommandations et Vocabulaires qui ont été soit :\n- approuvés par le CIML lors de sa 48ème Réunion (2013), 49ème Réunion (2014) et 50ème Réunion (2015), soit\n- soumis à la 51ème Réunion du CIML (2016) pour approbation.\n2013\nApprouvés lors de la 48 $ ^{\\mathrm{ème}} $ Réunion du CIML (Résolutions 2013/11 et 2013/19)\n- R 46-3 Compteurs actifs d'énergie électrique - Partie 3: Format du rapport d'essai\n- R 49-1 Compteurs d'eau potable froide et d'eau chaude - Partie 1: Exigences métrologiques et techniques\n- R 49-2 Compteurs d'eau potable froide et d'eau chaude - Partie 2: Méthodes d'essai\n- R 49-3 Compteurs d'eau potable froide et d'eau chaude - Partie 3: Format du rapport d'essai\n- R 144 Instruments pour le mesurage continu de CO et NOx dans les émissions de sources fixes\n- R 100 Systèmes de spectromètres d'absorption atomique pour la mesure des polluants métalliques\n- D 11 Exigences générales pour les instruments de mesure - Conditions environnementales\n- V1 Vocabulaire international des termes de métrologie légale (VIML)\n2014\nApprouvés lors de la 49<sup>eme</sup> Réunion du CIML (Résolution 2014/15)\n- Amd R 35-1 Mesures matérilisées de longueur pour usages généraux - Partie 1: Exigences métrologiques et techniques\n- R 50-1 Instruments de pesage totalisateurs continus à fonctionnement automatique\n- (peseuses sur bande) - Partie 1: Exigences métrologiques et techniques\n- R 50-2 Instruments de pesage totalisateurs continus à fonctionnement automatique (peseuses sur bande) – Partie 2: Procédures d'essai\n- R 50-3 Instruments de pesage totalisateurs continus à fonctionnement automatique\n(peseuses sur bande) – Partie 3: Format du rapport d'essai\n- R 117-2 Ensembles de mesurage dynamique de liquides autres que l'eau\n- Partie 2: Contrôles métrologiques et essais de performance\n- R 117-3 Ensembles de mesurage dynamique de liquides autres que l'eau\n- Partie 3: Format du rapport d'essai\n- R 139-1 Ensembles de mesurage de gaz compressé pour véhicules\n- Partie 1: Exigences métrologiques et techniques\n- R 139-2 Ensembles de mesurage de gaz compressé pour véhicules\n- Partie 2: Contrôles métrologiques et essais de performance\nApprobation directe en ligne par le CIML en 2014\n- R 137-3 Compteurs de gaz - Partie 3: Format du rapport d'essai\n- Amd R 137-1 Compteurs de gaz - Partie 1: Exigences métrologiques et techniques\n- Amd R 137-2 Compteurs de gaz - Partie 2: Contrôles métrologiques et essais de performance\n2015\nApprouvés lors de la $ 50^{\\mathrm{ème}} $ Réunion du CIML (Résolution 2015/14)\n- R 79 Exigences pour l'étiquetage des produits préemballés\n- R 139-3 Ensembles de mesurage de gaz compressé pour véhicules\n- Partie 3: Format du rapport d'essai\n- R 145 Instruments ophtalmiques - tonomètres d'empreinte et d'aplanation\n2016\nSoumis pour approbation à la 51<sup>ème</sup> Réunion du CIML (Voir le point 9.1 du CIML)\n- R 59 Humidimètres pour grains de céréales et graines oléagineuses\n- R 87 Quantité de produit dans les préemballages\n- Nouvelle R Instruments de mesure utilisés pour la détermination des protéines dans les grains\n- et les oléagineux\n- Nouvelle R Radiateur étalon à corps noir pour l'étendue de température de $ - 5 0 \\mathrm {^o C} $ à $ 2 5 0 0 \\mathrm {^o C} $", lang: fr }
