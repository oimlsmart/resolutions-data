  actions:
  - type: resolves
    date_effective:
      date: '2016-10-19'
      type: effective
    message:
    - spelling: eng
      value: |-
        Resolves:
        a) If the Bureau has been notified that the designated representative of a Member State no longer satisfies the conditions for membership of the Committee and the Member State has not yet designated a new representative, this person shall no longer be taken into account when establishing the quorum for decisions of the Committee;
        b) If the designated representative of a Member State has not responded to any communication from the Bureau for more than six months and the Bureau has made all reasonably possible attempts to contact the designated representative, the Bureau shall seek confirmation from the Member State as to the status of its representative in the Committee, according to a procedure decided by the Committee;
        c) If it is not possible, within a reasonable period of time to be decided by the Committee, to obtain confirmation from the Member State as to the status of its representative in the Committee, this person shall no longer be taken into account when establishing the quorum for decisions of the Committee.
  - type: decides
    date_effective:
      date: '2016-10-19'
      type: effective
    message:
    - spelling: fra
      value: |-
        Décide que:
        a) Si le Bureau a été informé que le représentant désigné d'un État Membre ne remplit plus les conditions d'appartenance au Comité et que l'État Membre n'a pas encore désigné un nouveau représentant, cette personne ne sera plus prise en considération lors de l'établissement du quorum pour les décisions du Comité ;
        b) Si le représentant désigné d'un État Membre n'a répondu à aucune communication du Bureau depuis plus de six mois et si le Bureau a fait toutes les tentatives raisonnablement possibles pour contacter le représentant désigné, le Bureau devra chercher la confirmation de l'État Membre quant au statut de son représentant au sein du Comité, selon une procédure décidée par le Comité ;
        c) S'il n'est pas possible, dans un délai raisonnable à fixer par le Comité, d'obtenir la confirmation de l'État Membre quant au statut de son représentant au sein du Comité, cette personne ne sera plus prise en considération lors de l'établissement du quorum pour les décisions du Comité.
