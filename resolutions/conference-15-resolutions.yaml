      message:
        - { content: "Considering that the total number of base contributory shares, taking into account the classification of Member States as reviewed in 2016, is 144 for the year 2017 and, after reclassification of some Member States, 146 for the remaining years of the 2017-2020 financial period,", lang: en }
      dates:
      - start: '2016-10-19'
        kind: effective
    actions:
    - type: resolves
      message:
        - { content: "Resolves:\na) The overall amount of credits, necessary to cover the Organization's operating expenses shall be €8 827 000 for the 2017-2020 financial period;\nb) The annual base contributory share for the 2017-2020 financial period is €14 000. This results in a total contribution for a Member State classified according to Article XXVI (1) of the Convention in Class 1, Class 2, Class 3 or Class 4 of €56 000, €112 000, €224 000 or $ \\epsilon $448 000, respectively;\nc) In the case of the admission of a Member State during the financial period, the overall amount of credits mentioned in a) above is increased by the contributory share of that Member State, calculated from its classification and the base contributory share, proportionate to the period from its admission to the expiry of the financial period;\nd) For the 2017-2020 financial period, newly admitted or readmitted Member States shall not pay an entry fee.", lang: en }
      dates:
      - start: '2016-10-19'
        kind: effective
