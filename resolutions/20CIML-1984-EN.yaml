      date_effective:
        date: '1984-10-01'
        type: effective
      message: The Committee accepted the proposals of its President and the Finnish
        Delegation for the chairmanship of the Conference; the Committee also examined
        and accepted the draft agenda and the arrangements for the organization of
        the Conference.
    - type: notes
      date_effective:
        date: '1984-10-01'
        type: effective
      message: The Committee examined the decisions of the Conference and took the
        necessary measures to implement them.
    - type: notes
      date_effective:
        date: '1984-10-01'
        type: effective
      message: 'The Committee divided the Pilot Secretariat SP5 as follows:'
    - type: notes
      date_effective:
        date: '1984-10-01'
        type: effective
      message: The Committee took note of the BIML report on the measurement of electrical
        and magnetic quantities and requested the States concerned to consider the
        present situation of SP13 and to present appropriate proposals within the
        framework of the long-term planning.
    - type: requests
      date_effective:
        date: '1984-10-01'
        type: effective
      message: The Committee requested the BIML to continue its investigation on the
        opportunity for OIML to work in the field of photometry and radiometry.
    - type: notes
      date_effective:
        date: '1984-10-01'
        type: effective
      message: The Committee took note of the fact that SP17-Sr3 would remain inactive
        until a country volunteers to assume responsibility.
    - type: notes
      date_effective:
        date: '1984-10-01'
        type: effective
      message: 'The Committee suppressed the following Reporting Secretariats :'
    - type: notes
      date_effective:
        date: '1984-10-01'
        type: effective
      message: The Committee took note of the BIML report and requested Czechoslovakia,
        responsible for SP 23, to study the advisability of creating a new Reporting
        Secretariat on recalibration intervals of standards, and to submit a proposal
        to the Committee at its next meeting.
