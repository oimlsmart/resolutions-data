    title: EXAMINATION OF THE DETAILED DRAFT REGULATIONS FOR THE OIML RETIREMENT PLAN
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Mr BIRKELAND recalls that the principle of the creation of an OIML
        retirement plan was the subject of a decision taken by the 6th Conference.
        Subsequently, during its 19th meeting, the Committee has accepted the expert''s
        report on the cost of this retirement plan, which confirmed the estimates
        presented to the 6th Conference. Complying with a request of the Committee,
        the Bureau has then prepared a draft of the detailed rules of the retirement
        plan, which was submitted to the meeting for study.

        '
