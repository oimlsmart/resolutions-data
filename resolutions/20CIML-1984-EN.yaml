  localizations:
  - language_code: eng
    title: SP13 (electricity)
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Mr THULIN presents a study prepared by the Bureau about the possible
        activity of this Pilot Secretariat in liaison with IEC work. For the majority
        of the subjects it would be ideal for OIML not to undertake any specific work
        but to influence the corresponding IEC work so that the IEC publications (which,
        in general, cover the specifications as well as the test methods) are suitable
        for legal metrology; the OIML Recommendations could then be limited to a selection
        of necessary specifications and tests within the framework of legal metrology,
        as it was done with sound level meters.

        '
      date_effective:
        date: '1984-10-01'
        type: effective
