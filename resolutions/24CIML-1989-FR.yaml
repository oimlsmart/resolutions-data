    title: Adoption de Recommandations Internationales
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. BIRKELAND rappelle que, pour la première fois, le Comité va adopter,
        au nom de la Conférence, des Recommandations qui seront définitivement publiées,
        la Conférence se contentant de confirmer cette adoption par une sanction a
        posteriori. Cela va permettre de publier et de mettre en application des Recommandations
        dans les plus brefs délais après leur mise au point par les Secrétariats responsables;
        cette accélération est nécessaire aussi bien dans l''optique du système de
        certificats OIML que compte tenu de l''accélération des progrès de la technique.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
