        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a renouvelé pour une période de cinq ans, à compter du 1er
        janvier 1991, le contrat du Directeur du Bureau.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a pris note du rapport sur les changements qui se produiront
        dans la composition du personnel du Bureau au cours des trois prochaines années.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale,

        '
