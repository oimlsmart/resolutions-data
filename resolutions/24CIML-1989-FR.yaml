    - type: notes
      message: 'Le Comité a donné son accord pour que le budget prévu par la Conférence
        pour la réunion du Conseil de Développement de 1991 soit utilisé pour faciliter
        la participation d''Agents de Services de métrologie légale de pays en développement
        à un cours de formation, d''une durée d''environ deux semaines, qui pourrait
