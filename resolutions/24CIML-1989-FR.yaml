    title: Examen de la situation financière pour 1989 et 1990
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. ATHANÉ rappelle qu''il a proposé au Comité, fin 1988, de ne pas
        suivre exactement les décisions de la Conférence en ce qui concerne les crédits
        exceptionnels nécessaires à la rénovation du siège de l''Organisation, mais
        de faire le maximum de ces travaux en 1989, le paiement se faisant en partie
        par prélèvement sur le fond de réserve. Aucune objection n''ayant été émise,
        les travaux de transformation du deuxième étage (création de 2 bureaux indépendants
        et d''une salle de conférence bien aménagée, ainsi que d''un accès permanent
        au grenier) ont été engagés et sont en voie d''achèvement.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
