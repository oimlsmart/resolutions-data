  localizations:
  - language_code: fra
    title: Examen de la situation de certains Etats Membres
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. ATHANÉ rappelle que la Guinée a été déclarée démissionnaire d''office,
        n''ayant pas réglé ses contributions pendant plus de trois années consécutives.
        Le Kenya et la Roumanie commencent à présenter un retard inquiétant dans leurs
        paiements et un nouveau, et peut-être ultime, contact sera pris avec les Autorités
        de ces deux pays qui pourraient être considérés comme démissionnaires d''office
        si au moins une partie de leurs arriérés n''était pas payée rapidement. Le
        Président du Comité sera informé en temps utile du résultat de ces contacts.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
