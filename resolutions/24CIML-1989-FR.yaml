        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a adopté le compte rendu de sa vingt-troisième réunion sans
        modification.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a pris connaissance du rapport sur l''adhésion, comme Membres
        Correspondants, des Seychelles, de la Malaisie, du Mexique et du Sénégal;
        il a également pris connaissance du rapport sur l''exclusion de la Guinée
        ainsi que sur la situation de certains Etats Membres très en retard dans le
        paiement de leurs contributions.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
