        type: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale,

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a insisté sur la nécessité de revoir le "Mode de travail
        des Secrétariats de l''OIML" afin en particulier qu''un modèle normalisé de
        Recommandation soit donné comme guide aux Secrétariats.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a également conseillé à ses Membres de s''efforcer de prendre
        en considération, pour les approbations de modèle nationales, les essais effectués
        dans d''autres pays dans la mesure où ceux-ci sont conformes aux exigences
        de l''OIML.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a pris note de l''état d''avancement des travaux des Secrétariats
        de l''OIML.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a chargé le Bureau d''établir les listes définitives des
        membres-P et membres-O de ces Secrétariats et d''informer les institutions
        internationales éventuellement intéressées en vue de leur participation aux
        travaux.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a chargé le Bureau d''entreprendre, sous la direction du
        Conseil de la Présidence, une révision radicale du "Mode de travail des Secrétariats
        de l''OIML", en tenant compte des propositions présentées en séance et en
        l''alignant, lorsque cela est pratique et conforme aux buts de l''Organisation,
        sur les Directives communes de l''ISO et de la CEI, édition 1989.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a demandé au Bureau que le projet de révision soit distribué
        aux Membres du CIML en vue de sa discussion à la prochaine réunion.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité constatant que, pour certains Secrétariats, le déroulement
        du travail est géné par le fait que certains membres-P ne participent pas
        activement aux travaux, a recommandé à tous les Etats Membres de revoir soigneusement
        leur statut de participation aux différents groupes de travail et à ne pas
        hésiter à abandonner leur statut de membre-P chaque fois qu''ils ne sont pas
        certains de pouvoir remplir leurs devoirs.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a approuvé les trois Recommandations Internationales suivantes:

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a rappelé au Bureau que ces Recommandations devaient néanmoins
        être présentées à la Neuvième Conférence pour sanction.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a chargé le Bureau d''étudier soigneusement les diverses
        propositions et déclarations présentées en séance (en particulier sur les
        intercomparaisons et essais probatoires, sur les accords bi- ou multilatéraux
        de reconnaissance de résultats d''essais et sur les conditions de création
        d''un climat de confiance propre à faciliter ces reconnaissances mutuelles)
        et de transmettre ces informations au Conseil de la Présidence pour examen.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a également encouragé ses Membres, en particulier ceux responsables
        de Secrétariats Rapporteurs traitant d''instruments qui pourraient entrer
        dans le champ d''application du Système de Certificats OIML, à s''assurer,
        au moyen d''intercomparaisons et d''essais probatoires, que les essais décrits
        dans les Recommandations internationales concernées sont valables et peuvent
        être appliqués uniformément.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
    - type: notes
      message: 'Le Comité a pris note du rapport sur la réunion du Conseil de Développement
