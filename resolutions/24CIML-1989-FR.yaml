  - language_code: fra
    title: Nouvelles adhésions Perspectives d'adhésions
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. ATHANÉ rappelle que quatre Etats ont adhéré comme Membres Correspondants
        depuis la dernière réunion du Comité: la Malaisie, le Mexique, le Sénégal
        et les Seychelles. Il est probable que d''autres adhésions de Correspondants
        auront lieu dans le proche futur. En ce qui concerne les prévisions d''adhésions
        comme Etats Membres, rien de définitif ne peut être mentionné mais des pays
        comme l''Arabie Saoudite et le Mexique sont intéressés par une adhésion à
        l''OIML.

        '
      date_effective:
        date: '1989-09-27'
        type: effective
