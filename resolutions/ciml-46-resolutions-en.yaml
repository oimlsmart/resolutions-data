    subject: OIML Conference
    title: The Committee approves the Terms of Reference for the Presidential Council and their publication
    dates:
    - start: '2011-10-11'
      kind: decision
    considerations: []
    actions:
    - type: approves
      message: |
        The Committee approves the Terms of Reference for the Presidential Council and their publication as OIML Basic Publication B 16, with the following amendments:
        - in the second bullet under "Composition of the Council", replace "represent" with "reflect"; and
        - after "appointed" insert "in a personal capacity".
