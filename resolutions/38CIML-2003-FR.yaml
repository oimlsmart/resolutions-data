  subject: "(The CIML)"
  title: 3 Accélération des activités techniques
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'La nécessité d''accélérer les projets, a précisé M. Szilvássy aux Membres,
      remontait à plusieurs années déjà. L''année dernière, une initiative du Président
      pour tenter de trouver des méthodes visant à accélérer les activités techniques
      de l''OIML avait été lancée. Des problèmes existaient concernant les projets
      approuvés et ceux en cours, ainsi qu''avec les derniers examens et les nouvelles
      révisions des Recommandations et Documents OIML. Il y avait eu deux brèves réunions
      au BIML l''année dernière et un projet de document avait été préparé. Un document
      succinct avait été distribué l''année dernière pendant la 37ème réunion du CIML
      et le Bureau tentait maintenant de mettre à jour ce document. Certains signes
      d''activité en hausse avaient été observés dans l''année en cours. Un plus grand
      nombre de Documents et de Recommandations avaient été présentés pour approbation.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
