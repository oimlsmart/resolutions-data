    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''informations données par le Directeur du BIML
      en ce qui concerne un projet de Guide sur le statut des Documents et Publications
      OIML, et a chargé le Bureau de préparer un projet définitif pour l''envoyer
      aux Membres du CIML en vue de son adoption à la 39ème Réunion du CIML en 2004.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a pris note d''une présentation donnée par M. John Birch sur
      son rapport Le Bénéfice de la Métrologie Légale pour l''Economie et la Société.
      Le Comité a exprimé sa forte appréciation concernant ce Rapport et a chargé
      le BIML de le diffuser en tant que rapport d''expert. Un rapport résumé compilé
      par M. Birch sera également publié dans le Bulletin de l''OIML.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a chargé le Président du CIML et le BIML de considérer toutes
      actions ou études complémentaires semblant appropriées pour accroître la sensibilisation
      à la métrologie et à la métrologie légale.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/14
  doi: 10.63493/resolutions/ciml200314
  urn: urn:oiml:doc:ciml:resolution:2003-14
  subject: "(The CIML)"
  title: 1 Groupe de travail sur les Pays en Développement
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''une présentation donnée par le Président du
      CIML sur les activités du Groupe de Travail sur les Pays en Développement formé
      lors de la dernière Réunion du Comité. Le Comité a approuvé les deux propositions
      suivantes faites par le Président du CIML:

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a chargé le Président du CIML et le BIML de rédiger une proposition
      à temps pour la 12ème Conférence en 2004, se conformant aux conclusions de la
      Réunion du Conseil de Développement.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/14
  doi: 10.63493/resolutions/ciml200314
  urn: urn:oiml:doc:ciml:resolution:2003-14
  subject: "(The CIML)"
  title: 2 Autres activités relatives aux pays en développement
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''une présentation donnée par la Présidente du
      Conseil de Développement et par le BIML sur les activités du Conseil de Développement,
      et a exprimé son appréciation pour le travail réalisé depuis la dernière réunion.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/14
  doi: 10.63493/resolutions/ciml200314
  urn: urn:oiml:doc:ciml:resolution:2003-14
  subject: "(The CIML)"
  title: 3 JCDCMAS
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''informations données par le BIML en ce qui
      concerne la formation, avec d''autres organisations internationales, d''un Comité
      Mixte sur la coordination de l''aide aux Pays en Développement dans le domaine
      de la Métrologie, de l''Accréditation et de la Normalisation (JCDCMAS), et a
      approuvé les Termes de Référence de ce Comité Mixte.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a aussi pris note d''un rapport du BIML sur des Séminaires
      Régionaux de Sensibilisation organisés conjointement avec la CEI sous l''égide
      de l''OMC. Le Comité a encouragé le BIML à organiser d''autres Séminaires du
      même type dans d''autres régions.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/15
  doi: 10.63493/resolutions/ciml200315
  urn: urn:oiml:doc:ciml:resolution:2003-15
  subject: "(The CIML)"
  title: 1 Convention du Mètre, ILAC, ISO, OMC, etc.
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''un rapport, présenté par le Président du CIML,
      sur la coopération avec la Convention du Mètre (BIPM/CIPM) et avec ILAC.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a pris note d''un rapport donné par ILAC et a exprimé son
      appréciation pour la coopération fructueuse entre l''OIML et cette Organisation.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/15
  doi: 10.63493/resolutions/ciml200315
  urn: urn:oiml:doc:ciml:resolution:2003-15
  subject: "(The CIML)"
  title: 2 Projet de Document de politique générale sur les liaisons avec les autres
    organisations
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''un rapport donné par le Directeur du BIML au
      sujet du résultat du vote d''approbation par correspondance pour le projet du
      Document de politique générale sur les liaisons de l''OIML avec les autres organisations.
      Le Comité a approuvé ce document.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/15
  doi: 10.63493/resolutions/ciml200315
  urn: urn:oiml:doc:ciml:resolution:2003-15
  subject: "(The CIML)"
  title: 3 Rapports des Organisations Régionales de Métrologie Légale (ORML)
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''informations données par les représentants
      des Organisations Régionales de Métrologie Légale (ORML) suivantes concernant
      leurs activités: APLMF, COOMET, EMLMF, SADCMEL et WELMEC. D''autre part, le
      représentant du Burkina Faso a donné des informations sur une éventuelle création
      d''ORML dans cette région d''Afrique.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/15
  doi: 10.63493/resolutions/ciml200315
  urn: urn:oiml:doc:ciml:resolution:2003-15
  subject: "(The CIML)"
  title: 4 Projet de document de politique générale sur la coordination
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''un rapport d''avancement donné par le Directeur
      du BIML sur un document formalisant les relations et la coopération avec les
      Organisations Régionales de Métrologie Légale (ORML); ce document est en cours
      d''examen pour commentaires par les ORML. Le Comité a chargé le BIML de poursuivre
      l''élaboration de ce document de façon à étabir un cadre officiel pour la coopération
      de l''OIML avec les ORML.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/17
  doi: 10.63493/resolutions/ciml200317
  urn: urn:oiml:doc:ciml:resolution:2003-17
  subject: "(The CIML)"
  title: 1 39ème Réunion du CIML et 12ème Conférence Internationale de Métrologie
    Légale (Berlin, 2004)
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''une présentation donnée par M. Kochsiek, sur
      l''organisation de la 39ème Réunion du Comité et de la 12ème Conférence de l''OIML
      devant se tenir à Berlin du 25 au 29 octobre 2004, comme approuvé à la 37ème
      Réunion du Comité en 2002. Le Comité a exprimé ses remerciements les plus chaleureux
      à l''Allemagne pour son invitation.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/17
  doi: 10.63493/resolutions/ciml200317
  urn: urn:oiml:doc:ciml:resolution:2003-17
  subject: "(The CIML)"
  title: 2 40ème Réunion du CIML et 50ème Anniversaire de l'OIML (France, 2005)
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a accepté la proposition du BIML d''organiser la 40ème Réunion
      du Comité à Lyon, France, fin juin 2005, conjointement avec le Congrès International
      de Métrologie organisé par le Collège Français de Métrologie, à l''occasion
      du 50ème anniversaire de l''OIML.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a demandé au BIML et aux divers TC/SC d''éviter ces dates
      lors de la planification de leurs propres réunions.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/17
  doi: 10.63493/resolutions/ciml200317
  urn: urn:oiml:doc:ciml:resolution:2003-17
  subject: "(The CIML)"
  title: 3 Autres réunions
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note de l''intention de M. Carstens (Membre du CIML
      pour l''Afrique du Sud) de tenir la 41ème Réunion du CIML en Afrique du Sud.
      Cette invitation devra être confirmée en temps utile.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a également décidé de décerner des distinctions honorifiques
      aux personnes suivantes eu égard à leur contribution exceptionnelle au travail
      de l''Organisation:

      '
    dates:
    - start: '2003-11-05'
      kind: effective
