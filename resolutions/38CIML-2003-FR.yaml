- identifier: CIML/2003/3
  doi: 10.63493/resolutions/ciml200303
  urn: urn:oiml:doc:ciml:resolution:2003-03
  subject: "(The CIML)"
  title: 2 Situation de certains Membres
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. Magaña a rappelé à l''assemblée qu''il avait été demandé aux Membres
      l''année précédente de voter par correspondance concernant la classe de contribution
      du Vietnam, pour le cas où ce pays deviendrait Etat Membre. Le Vietnam avait
      demandé d''être placé dans la classe de plus faible contribution comme cela
      est rendu possible selon les termes de la Convention, mais cette décision appartenant
      au Comité, un vote par correspondance avait été organisé. Il n''y avait eu que
      des réponses favorables mais malheureusement pas en nombre suffisant pour valider
      une décision. M. Magaña a donc proposé qu''un vote soit tenu pendant la réunion,
      soit immédiatement, soit au moment des résolutions en fin de réunion. Il a informé
      les Membres que le Bureau proposait que le Vietnam soit placé dans la classe
      de plus faible contribution et a sollicité des commentaires de l''auditoire.
      En l''absence d''objections, la question serait ajoutée à la liste des Décisions
      de la réunion, pour vote le dernier jour.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
