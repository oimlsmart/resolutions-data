  subject: "(The CIML)"
  title: 1 Création et évolution du Système (bref historique)
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. Szilvássy a d''abord fait un bref historique du développement du
      Système. Avec la publication de la version révisée du P 1 Système de Certificats
      OIML pour les Instruments de Mesure, une étape avait été franchise vers la seconde
      phase du Système. Cette publication avait conduit à la certification des familles
      d''instruments, des modules, et des familles de modules d''instruments de mesure.
      Cela avait pris beaucoup de temps et donné beaucoup de travail aux TC et SC
      à l''occasion de l''élaboration et de la révision des Recommandations.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
