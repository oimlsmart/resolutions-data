- identifier: CIML/2003/12
  doi: 10.63493/resolutions/ciml200312
  urn: urn:oiml:doc:ciml:resolution:2003-12
  subject: "(The CIML)"
  title: 2 Traduction et diffusion des Publications OIML
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. Magaña a indiqué qu''un document avait été envoyé en vue de répondre
      à un certain nombre de questions émises par les Membres à différentes occasions.
      Les publications de l''OIML étaient éditées en versions française et anglaise
      et le Bureau prenait en charge l''impression de ces deux versions, mais un certain
      nombre de pays avaient demandé s''ils étaient autorisés à réaliser des traductions
      vers leur propre langue nationale et à procéder à leur diffusion et vente. Un
      projet de document avait été préparé à ce sujet, intitulé Traduction et Diffusion
      des Publications OIML. Il avait été examiné par le Conseil de la Présidence
      et envoyé aux Membres en vue de son approbation. M. Magaña a demandé quels commentaires
      suscitait ce document.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/12
  doi: 10.63493/resolutions/ciml200312
  urn: urn:oiml:doc:ciml:resolution:2003-12
  subject: "(The CIML)"
  title: 3 Projet de Guide sur le statut des Documents et Publications OIML
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. Magaña a indiqué qu''il ne s''agissait là que d''une simple information
      – il n''existait pas encore de document à présenter lors de cette réunion. Les
      Délégués se rappelaient qu''il avait été demandé au Bureau de travailler sur
      ce qui avait été appelé les "documents horizontaux". En étudiant cette question,
      il était apparu à M. Magaña, et cela avait été discuté lors du Conseil de la
      Présidence, que l''expression "documents horizontaux" n''était pas très claire,
      et qu''il était justement nécessaire d''avoir une description claire des types
      de documents et publications que l''OIML possédait et pouvait publier, ainsi
      que du processus de leur adoption. Actuellement, seulement deux types de documents
      étaient définis: les Recommandations et les Documents, mais une distinction
      pouvait peut-être être faite entre ces deux types quant à la façon dont ils
      devaient être adoptés et au type d''engagement que ces publications impliquaient
      pour les Etats Membres. Certaines publications constituaient un engagement pour
      les Etats Membres, d''autres étaient plutôt destinées à servir d''aide et de
      conseil ou avaient un caractère informatif; il était nécessaire de préciser

      '
    dates:
    - start: '2003-11-05'
      kind: effective
