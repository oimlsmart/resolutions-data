  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'M. Faber a de nouveau souhaité la bienvenue (voir allocution d''ouverture)
      à la Nouvelle-Zélande et au Vietnam dont les délégués ont tenu à s''exprimer
      devant l''assemblée.

