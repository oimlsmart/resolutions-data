- identifier: CIML/2013/15
  doi: 10.63493/resolutions/ciml201315
  urn: urn:oiml:doc:ciml:resolution:2013-15
  dates:
  - start: '2013-10-08'
    kind: decision
  agenda_item: '9.5'
  localizations:
  - language_code: eng
    title: Agenda item 9.5
    subject: CIML
    considerations:
    - type: noting
      message: 'Noting the oral report by its first Vice-President on the outcome
        of the seminar to review the operation of the OIML Mutual Acceptance Arrangement
        (MAA);

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: 'Considering that there appears to be a high level of confidence in
        those areas where Declarations of Mutual Confidence (DoMCs) are in place;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considering the conclusion of the seminar held on 7 October 2013 to review the operation of the MAA that there is a need to raise awareness of the MAA system among those not currently using it, in particular among potential Utilizing Participants;
        Urges its Members, the participants in the MAA and the BIML to actively promote the MAA among legal metrology authorities and measuring instrument manufacturers worldwide;
        Encourages its Members to draw to the attention of trade negotiators within their administrations the opportunities which OIML Recommendations and the MAA structures offer as means of reducing barriers to trade and the possibility they provide to enhance both bilateral and multilateral trade negotiations;
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: instructs
      message: 'Instructs the BIML in its capacity as secretariat of the MAA Committees
        on Participation Review (CPR) to set up an ad-hoc working group consisting
        of interested CIML and/or CPR members and representatives of manufacturers''
        associations to consider how this awareness can be raised, and to provide
        secretarial support to this working group;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: 'Requests its first Vice-President to chair this ad-hoc working group
        and to report on its activities to the 49th CIML Meeting.

        '
      dates:
      - start: '2013-10-08'
        kind: effective
  - language_code: fra
    title: Point 9.5 de l'ordre du jour
    subject: CIML
    considerations:
    - type: noting
      message: 'Prenant note du rapport oral de son premier Vice-Président concernant
        les conclusions du séminaire consacré à l''examen du fonctionnement de l''Arrangement
        d''Acceptation Mutuelle (MAA) de l''OIML ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: 'Considérant le niveau élevé de confiance qui semble exister dans les
        domaines où des Déclarations de Confiance mutuelle (DoMC) sont en place ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considérant la conclusion du séminaire consacré à l'examen du fonctionnement du MAA qui s'est tenu le 7 octobre 2013 dans laquelle est énoncée la nécessité d'une sensibilisation accrue sur le système MAA auprès de ceux qui, actuellement, ne l'utilisent pas, en particulier les Participants Utilisateurs potentiels ;
        Encourage vivement ses Membres, les participants au MAA et le BIML à promouvoir activement le MAA auprès des autorités de métrologie légale et des fabricants d'instruments de mesurage dans le monde entier ;
        Encourage ses Membres à attirer l'attention des négociateurs commerciaux au sein de leurs administrations sur les perspectives qu'offrent les Recommandations OIML et les structures MAA de réduire les obstacles au commerce et la possibilité qu'elles procurent de favoriser les négociations commerciales aussi bilatérales que multilatérales ;
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: charges
      message: 'Charge le BIML en sa qualité de secrétariat des Comités sur la revue
        de participation (CPR) du MAA de mettre en place un groupe de travail ad hoc
        composé de membres du CIML et/ou de CPR intéressés et de représentants d''associations
        de fabricants et ayant pour tâche de réfléchir sur la manière d''accroître
        cette sensibilisation et de fournir un service de secrétariat à ce groupe
        de travail ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: 'Demande à son premier Vice-Président d''assurer la présidence de ce
        groupe de travail ad hoc et de rendre compte de ses activités lors de la 49ème
        Réunion du CIML.

        '
      dates:
      - start: '2013-10-08'
        kind: effective
- identifier: CIML/2013/16
  doi: 10.63493/resolutions/ciml201316
  urn: urn:oiml:doc:ciml:resolution:2013-16
  dates:
  - start: '2013-10-08'
    kind: decision
  localizations:
  - language_code: eng
    title: "[Agenda item 9.5]"
    subject: CIML
    considerations:
    - type: recalling
      message: 'Recalling its Resolution no. 2013/15;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: 'Considering that the MAA''s Committees on Participation Review (CPR)
        decide on their own rules and procedures within the framework set by OIML
        Publication B 10 Framework for a Mutual Acceptance Arrangement on OIML type
        evaluations and that TC 3/SC 5 is responsible for that Basic Publication;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considering the conclusion of the MAA seminar that there is a need to review the structure and the operation of the CPRs;
        Urges the ad hoc group created by its Resolution no. 2013/15 to review with the CPRs their structure, rules and procedures governing the operation of the MAA, and the role of Utilizing Participants, with a view to increasing the efficiency of the operation of the MAA, and, if necessary, to amending their internal (MAA) documents accordingly and to suggesting to TC 3/SC 5 appropriate amendments to OIML Publication B 10.
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: notes
      message: "[Agenda item 9.5]\n"
      dates:
      - start: '2013-10-08'
        kind: effective
  - language_code: fra
    title: Point 9.5 de l'ordre du jour
    subject: CIML
    considerations:
    - type: recalling
      message: 'Rappelant sa Résolution n° 2013/15 ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: 'Considérant que les Comités sur la revue de participation (CPR) du
        MAA fixent eux-mêmes leurs règles et procédures dans le cadre défini dans
        la Publication OIML B 10 Cadre pour un Arrangement d''Acceptation Mutuelle
        sur les Évaluations de Type de l''OIML et que le TC 3/SC 5 est responsable
        de cette Publication de Base ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considérant la conclusion du séminaire sur le MAA dans laquelle est énoncée la nécessité d'un examen de la structure et du fonctionnement des CPR ;
        Invite instamment le groupe ad hoc créé en application de sa Résolution n° 2013/15 à examiner la structure des CPR, les règles et les procédures qui régissent le fonctionnement du MAA et le rôle des Participants Utilisateurs, dans le but d'améliorer l'efficacité de fonctionnement du MAA et, si nécessaire, de modifier en conséquence leurs documents internes (MAA) documents et de soumettre des suggestions au TC 3/SC 5 en vue d'apporter des modifications pertinentes à la Publication OIML B 10.
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: notes
      message: 'Rappelant sa Résolution n° 2013/15 ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
- identifier: CIML/2013/17
  doi: 10.63493/resolutions/ciml201317
  urn: urn:oiml:doc:ciml:resolution:2013-17
  dates:
  - start: '2013-10-08'
    kind: decision
  localizations:
  - language_code: eng
    title: Resolves that steps should be taken to ensure that, in future, there will
      be
    subject: CIML
    considerations:
    - type: recalling
      message: 'Recalling its decision on the implementation of the MAA at its 39th
        meeting (2004) under agenda item 6.3;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Recalling Resolution no. MAA 2006-2 of its 41st meeting (2006) concerning
        a transition period ending 31 December 2008 in which both MAA certificates
        and Basic certificates may be issued;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Recalling Resolution no. 20 of its 43rd meeting (2008), extending
        the transition period until such time that the Committee takes an express
        decision (separate for each category of instruments) to end it, effectively
        maintaining the Basic Certificate System in parallel to the MAA;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Recalling its Resolution no. 2013/15;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: 'Considering that for almost nine years now there exist de facto two
        OIML conformity assessment systems for OIML type evaluations: the OIML Basic
        Certificate System and the MAA, whereas the MAA was conceived to replace the
        Basic Certificate System;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: resolves
      message: |
        Resolves that steps should be taken to ensure that, in future, there will be only one single certification system for OIML type evaluations, based on the principles of the MAA, and that, as a first step, the options for how such a single system may be organized, how the transition could take place and by what time schedule, should be investigated, taking into account the experiences of similar, well established certification systems;
        Urges the ad hoc group created in its Resolution no. 2013/15 to investigate such options and to make appropriate recommendations.
      dates:
      - start: '2013-10-08'
        kind: effective
  - language_code: fra
    title: Point 9.5 de l'ordre du jour
    subject: CIML
    considerations:
    - type: recalling
      message: 'Rappelant la décision qu''il a prise concernant l''application du
        MAA lors de sa 39ème Réunion (2004) au point 6.3 de l''ordre du jour ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Rappelant la Résolution MAA 2006-2 adoptée lors de sa $41^{\mathrm{eme}}$
        Réunion (2006) concernant la fin, fixée au 31 décembre 2008, de la période
        de transition durant laquelle la délivrance de certificats MAA et de certificats
        dits « de Base » est encore autorisée ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Rappelant la Résolution n° 20 de sa $ 43^{\mathrm{eme}} $ Réunion
        (2008), prolongeant la période de transition jusqu''à ce que le Comité décide
        expressément (indépendamment pour chaque catégorie d''instruments) d''y mettre
        fin, le Système de Certificats dits « de Base » et le MAA étant de fait conservés
        en parallèle ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Rappelant sa Résolution n° 2013/15 ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: 'Considérant que, depuis maintenant près de neuf ans, existent de facto
        deux systèmes OIML d''évaluation de la conformité pour des évaluations de
        type OIML, en l''occurrence le Système de Certificats dits « de Base » et
        le MAA, alors que le MAA était destiné à remplacer le Système de Certificats
        dits « de Base »;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide que des dispositions doivent être prises pour que n'existe plus à l'avenir qu'un seul et unique système de certification pour les évaluations de type de l'OIML reposant sur les principes du MAA et pour que soient, dans un premier temps, explorées les différentes options pouvant exister concernant la manière d'organiser ce système unique, la façon dont la transition se déroulerait et le calendrier correspondant, en tenant compte de l'expérience de systèmes de certification similaires et bien établis ;
        Invite instamment le groupe ad hoc créé en application de sa Résolution n° 2013/15 à explorer ces options et à formuler des recommandations pertinentes.
      dates:
      - start: '2013-10-08'
        kind: effective
