    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'In order to better assist developing countries, the Conference considered
      it desirable that Publication D 1 Elements for a law on metrology be revised
      to take account of the latest developments in world trade, such as conformity
      assessment, certification and globalization. The Conference instructed the Committee
      to start a revision of Publication D 1.

      '
