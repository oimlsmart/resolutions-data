- identifier: Conference/2008/17
  doi: 10.63493/resolutions/conf200817
  urn: urn:oiml:doc:conf:resolution:13.17
  subject: OIML Conference
  title: Should the economic conditions result in a critical financial situation for
    the OIML and
  dates:
  - start: '2008-10-29'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Should the economic conditions result in a critical financial situation
      for the OIML and after having taken all necessary measures to reduce costs,
      the President of the Committee shall report on the measures taken and may propose
      that the Committee asks Member States for an exceptional voluntary additional
      contribution.

      '
    dates:
    - start: '2008-10-29'
      kind: effective
- identifier: Conference/2008/18
  doi: 10.63493/resolutions/conf200818
  urn: urn:oiml:doc:conf:resolution:13.18
  subject: OIML Conference
  title: Considering that the provisions of IPSAS (International Public Sector Accounting
    Standards) concerni…
  dates:
  - start: '2008-10-29'
    kind: decision
  considerations:
  - type: considering
    message: |
      Considering that the provisions of IPSAS (International Public Sector Accounting Standards) concerning pensions are not yet defined, the Conference instructed the CIML President:
      to appoint an expert specialized in international public sector accountancy as the OIML external auditor;
      - to elaborate with this expert the appropriate amendments to be made to the OIML Financial Regulations, in particular regarding pensions; and
      - with the support of this expert, to take the appropriate provisional decisions concerning the OIML accountancy and the OIML Pension System.
    dates:
    - start: '2008-10-29'
      kind: effective
  actions:
  - type: notes
    message: 'Considering that the provisions of IPSAS (International Public Sector
      Accounting Standards) concerning pensions are not yet defined, the Conference
      instructed the CIML President:

      '
    dates:
    - start: '2008-10-29'
      kind: effective
- identifier: Conference/2008/19
