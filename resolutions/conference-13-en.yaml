  subject: OIML Conference
  title: The Conference instructed the Committee to elaborate a procedure to implement
    Article XXIX, second
  dates:
  - start: '2008-10-29'
    kind: decision
  considerations: []
  actions:
  - type: instructs
    message: |
      The Conference instructed the Committee to elaborate a procedure to implement Article XXIX, second paragraph, of the Convention, related to resignation and readmission of Members to be submitted to the next Conference.
      The Conference granted Cameroon a delay of six months to make the payment of a significant part of its arrears.
    dates:
    - start: '2008-10-29'
      kind: effective
