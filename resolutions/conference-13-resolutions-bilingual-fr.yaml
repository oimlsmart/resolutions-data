    doi: "10.63493/resolutions/conf200810"
    urn: "urn:oiml:doc:conf:resolution:13.10"
    subject: "Conférence OIML"
    title: "La Conférence approuve le Plan Stratégique et donne instruction au Comité de le mettre"
    dates:
    - start: '2008-10-29'
      kind: decision
    considerations: []
    actions:
    - type: approves
      message: |
        La Conférence approuve le Plan Stratégique et donne instruction au Comité de le mettre en oeuvre et de rendre compte sur le progrès de sa mise en œuvre lors de la 14ème Conférence. Elle demande au Comité qu'il prenne en compte les remarques faites par la Conférence pour la mise à jour de ce plan.
      dates:
      - start: '2008-10-29'
        kind: effective
