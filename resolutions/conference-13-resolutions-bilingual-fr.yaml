      message: |
        NOTANT que les fonctions respectives assignées par la Convention au Président du Comité International de Métrologie Légale et au Directeur du Bureau International de Métrologie Légale ont été remplies;
        DONNE SA DÉCHARGE DÉFINITIVE au Président du Comité et au Directeur du Bureau pour leur gestion du budget durant les exercices comptables mentionnés ci-dessus.
      dates:
      - start: '2008-10-29'
        kind: effective
