  - identifier: Conference/2008/6a
    doi: "10.63493/resolutions/conf20086a"
    urn: "urn:oiml:doc:conf:resolution:13.6a"
    subject: "Conférence OIML"
    title: "La Conférence prend note des commentaires émis par certains Etats Membres concernant la nécessité"
    dates:
    - start: '2008-10-29'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        La Conférence prend note des commentaires émis par certains Etats Membres concernant la nécessité de réviser aussi tôt que possible les Publications suivantes:
        R 71:2008 Reservoirs de stockage fixes. Prescriptions générales
        R 85:2008 Jaugeurs automatiques pour le mesurage des niveaux de liquide dans les réservoirs de stockage fixes
        R 139:2007 Ensembles de mesurage de gaz compresse pour vehicules
        La Conférence donne instruction au Comité de commencer la révision de ces Publications.
      dates:
      - start: '2008-10-29'
        kind: effective
