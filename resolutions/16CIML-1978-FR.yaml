  - spelling: fra
    value: 'Agenda Item 2: SITUATION GENERALE DE L''ORGANISATION'
  actions:
  - type: notes
    date_effective:
      date: '1978-06-19'
      type: effective
    message:
    - spelling: fra
      value: 2. 1. Le Conseil a le statut d'un Organe consultatif auprès des instances
        dirigeantes de l'Organisation.
- identifier:
  - prefix: CIML
    number: 1978/3
  doi: 10.63493/resolutions/ciml197803
  urn: urn:oiml:doc:ciml:resolution:1978-03
  agenda_item: '3'
  dates:
  - date: '1978-06-19'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 3: SITUATION FINANCIERE'
  actions:
  - type: notes
    date_effective:
      date: '1978-06-19'
      type: effective
    message:
    - spelling: fra
      value: 3. 1. Le Conseil se compose de représentants de Pays en voie de développement
        et de Pays industrialisés.
- identifier:
  - prefix: CIML
    number: 1978/4
  doi: 10.63493/resolutions/ciml197804
