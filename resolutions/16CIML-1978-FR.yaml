- identifier:
  - prefix: CIML
    number: 1978/5
  doi: 10.63493/resolutions/ciml197805
  urn: urn:oiml:doc:ciml:resolution:1978-05
  agenda_item: '5'
  dates:
  - date: '1978-06-19'
    type: decided
  localizations:
  - language_code: fra
    title: 'Agenda Item 5: SECRETARIATS PILOTES ET RAPPORTEURS'
    actions:
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: 5. 1. Dans l'optique de favoriser la participation effective aux travaux
        de ce Conseil du plus possible de ses membres en provenance des Pays en voie
        de développement, l'Organisation prend en charge les frais de voyage et de
        séjour de trois de ceux-ci à l'occasion de chaque réunion.
- identifier:
  - prefix: CIML
    number: 1978/6
  doi: 10.63493/resolutions/ciml197806
  urn: urn:oiml:doc:ciml:resolution:1978-06
  agenda_item: '6'
  dates:
  - date: '1978-06-19'
    type: decided
  localizations:
  - language_code: fra
    title: 'Agenda Item 6: MODE DE TRAVAIL DES SECRETARIATS DE L''OIML'
    actions:
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité déclare que cette phrase signifie que ces représentants agissent
        entant qu'experts du Service sans qu'il soit nécessaire qu'ils soient des
        employés de ce Service.
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité rappelle d'autre part que la désignation de ces représentants
        est laissée au libre choix des Membres du CIML et que ces représentants «
        doivent exprimer non seulement les opinions de ce Service mais aussi celles
        de tous les organismes qui, dans leur pays, s'occupent de ces questions »
        et que « lors des réunions ils peuvent être accompagnés, avec voix consultative,
        de toutes personnalités dont l'aide leur paraît opportune ». (*)
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité International de Métrologie Légale
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité constate qu'en raison des niveaux très divers de développement
        de leurs Services nationaux de métrologie, les EtatsMembres de l'OIML n'ont
        pas tous les mêmes possibilités d'étudier et de juger les projets de Recommandations
        techniques qui leur sont proposés.
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité demande de plus que les Secrétariats de l'OIML, à l'occasion
        de la révision systématique des Recommandations dont ils sont responsables,
        tiennent le plus grand compte des observations qui seront formulées par des
        pays qui, ayant initialement fait confiance aux auteurs des projets, seraient
        ultérieurement en mesure d'étudier et de critiquer les dites Recommandations.
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité International de Métrologie Légale,
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité International de Métrologie Légale,
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité a pris des décisions concernant la création, la suppression
        et l'attribution de Secrétariats Pilotes et/ou Rapporteurs. Ces décisions
        apparaîtront dans la prochaine édition de la « Liste des Secrétariats de l'OIML
        » (*).
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité s'est félicité de constater que la Résolution de la Conférence
        a été suivie.
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: 'Le Comité a adopté les Documents Internationaux :'
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité décide la création d'un groupe ad hoc chargé d'étudier le
        problème de l'établissement de la marque de conformité.
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: Le Comité International de Métrologie Légale,
