  urn: urn:oiml:doc:ciml:resolution:1978-01
  subject: CIML
  title: OBJET
  dates:
  - start: '1978-06-19'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Il est créé à titre expérimental, au sein de l''OIML, un Conseil de
      développement (dénommé ci-après le Conseil).

      '
    dates:
    - start: '1978-06-19'
      kind: effective
- identifier: CIML/1978/2
  doi: 10.63493/resolutions/ciml197802
  urn: urn:oiml:doc:ciml:resolution:1978-02
  subject: CIML
  title: STATUT et MANDAT
  dates:
  - start: '1978-06-19'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: '2. 1. Le Conseil a le statut d''un Organe consultatif auprès des instances
      dirigeantes de l''Organisation.

      '
    dates:
    - start: '1978-06-19'
      kind: effective
- identifier: CIML/1978/3
  doi: 10.63493/resolutions/ciml197803
  urn: urn:oiml:doc:ciml:resolution:1978-03
  subject: CIML
  title: COMPOSITION
  dates:
  - start: '1978-06-19'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: '3. 1. Le Conseil se compose de représentants de Pays en voie de développement
      et de Pays industrialisés.

      '
    dates:
    - start: '1978-06-19'
      kind: effective
- identifier: CIML/1978/4
  doi: 10.63493/resolutions/ciml197804
  urn: urn:oiml:doc:ciml:resolution:1978-04
  subject: CIML
  title: FONCTIONNEMENT
  dates:
  - start: '1978-06-19'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: '4. 1. Le Conseil délibère, soit par correspondance, soit au cours de
      réunions tenues en principe annuellement.

      '
    dates:
    - start: '1978-06-19'
      kind: effective
- identifier: CIML/1978/5
  doi: 10.63493/resolutions/ciml197805
  urn: urn:oiml:doc:ciml:resolution:1978-05
  subject: CIML
  title: DISPOSITIONS FINANCIERES
  dates:
  - start: '1978-06-19'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: '5. 1. Dans l''optique de favoriser la participation effective aux travaux
      de ce Conseil du plus possible de ses membres en provenance des Pays en voie
      de développement, l''Organisation prend en charge les frais de voyage et de
      séjour de trois de ceux-ci à l''occasion de chaque réunion.

      '
    dates:
    - start: '1978-06-19'
      kind: effective
- identifier: CIML/1978/6
  doi: 10.63493/resolutions/ciml197806
  urn: urn:oiml:doc:ciml:resolution:1978-06
  subject: CIML
  title: DISPOSITION TRANSITOIRE
  dates:
  - start: '1978-06-19'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité déclare que cette phrase signifie que ces représentants agissent
      entant qu''experts du Service sans qu''il soit nécessaire qu''ils soient des
      employés de ce Service.

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité rappelle d''autre part que la désignation de ces représentants
      est laissée au libre choix des Membres du CIML et que ces représentants « doivent
      exprimer non seulement les opinions de ce Service mais aussi celles de tous
      les organismes qui, dans leur pays, s''occupent de ces questions » et que «
      lors des réunions ils peuvent être accompagnés, avec voix consultative, de toutes
      personnalités dont l''aide leur paraît opportune ». (*)

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité International de Métrologie Légale

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité constate qu''en raison des niveaux très divers de développement
      de leurs Services nationaux de métrologie, les EtatsMembres de l''OIML n''ont
      pas tous les mêmes possibilités d''étudier et de juger les projets de Recommandations
      techniques qui leur sont proposés.

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité demande de plus que les Secrétariats de l''OIML, à l''occasion
      de la révision systématique des Recommandations dont ils sont responsables,
      tiennent le plus grand compte des observations qui seront formulées par des
      pays qui, ayant initialement fait confiance aux auteurs des projets, seraient
      ultérieurement en mesure d''étudier et de critiquer les dites Recommandations.

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité International de Métrologie Légale,

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité International de Métrologie Légale,

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité a pris des décisions concernant la création, la suppression
      et l''attribution de Secrétariats Pilotes et/ou Rapporteurs. Ces décisions apparaîtront
      dans la prochaine édition de la « Liste des Secrétariats de l''OIML » (*).

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité s''est félicité de constater que la Résolution de la Conférence
      a été suivie.

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité a adopté les Documents Internationaux :

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité décide la création d''un groupe ad hoc chargé d''étudier le
      problème de l''établissement de la marque de conformité.

      '
    dates:
    - start: '1978-06-19'
      kind: effective
  - type: notes
    message: 'Le Comité International de Métrologie Légale,

      '
    dates:
    - start: '1978-06-19'
      kind: effective
