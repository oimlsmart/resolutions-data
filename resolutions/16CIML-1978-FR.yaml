      date: '1978-06-19'
      type: effective
    message:
    - spelling: fra
      value: Il est créé à titre expérimental, au sein de l'OIML, un Conseil de développement
        (dénommé ci-après le Conseil).
- identifier:
  - prefix: CIML
    number: 1978/2
  doi: 10.63493/resolutions/ciml197802
