    actions:
    - type: notes
      date_effective:
        date: '1978-06-19'
        type: effective
      message: 2. 1. Le Conseil a le statut d'un Organe consultatif auprès des instances
        dirigeantes de l'Organisation.
- identifier:
  - prefix: CIML
    number: 1978/3
  doi: 10.63493/resolutions/ciml197803
  urn: urn:oiml:doc:ciml:resolution:1978-03
