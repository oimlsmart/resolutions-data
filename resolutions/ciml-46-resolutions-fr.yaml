        kind: effective
    - type: thanks
      message: |
        Remercie le Groupe de travail électronique, présidé par le Membre néozélandais du CIML, d'avoir préparé le programme des Séminaires.
      dates:
      - start: '2011-10-11'
        kind: effective
  - identifier: CIML/2011/23
    doi: "10.63493/resolutions/ciml201123"
    urn: "urn:oiml:doc:ciml:resolution:2011-23"
    subject: CIML
    title: "Approuve, à condition de renommer les « Groupes de travail » proposés « Groupes"
    dates:
    - start: '2011-10-11'
      kind: decision
    considerations: []
    actions:
    - type: approves
      message: |
        Approuve, à condition de renommer les « Groupes de travail » proposés « Groupes de programme » et d'apporter d'autres modifications rédactionnelles nécessaires, la révision de :
        - OIML B 6-1 Directives pour les travaux techniques de l'OIML - $1^{\mathrm{ere}}$ partie : Structures et procédures pour le développement des publications de l'OIML ; et
        - OIML B 6-2 Directives pour les travaux techniques de I'OIML - 2ème partie : Guide de préparation et de présentation des publications de I'OIML,
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: requests
      message: |
        Demande au Bureau de publier, au plus tard le $ 1^{\mathrm{er}} $ décembre 2011, un document d'orientation exposant les modalités de mise en œuvre et de présenter les nouvelles dispositions à partir du $ 1^{\mathrm{er}} $ janvier 2012 de manière méthodique,
        Met en place un Groupe de travail ad hoc, présidé par le Second Vice-président, chargé d'examiner les améliorations à apporter à OIML B 6-1 et B 6-2 à la suite des suggestions faites par les Membres du CIML compte tenu de la mise en application des nouvelles procédures, et
        Donne instruction au groupe de travail ad hoc de présenter des propositions d'amendement d'OIML B 6-1 et d'OIML B 6-2 destinées à être étudiées lors de la $ 4 7^{e} $ Réunion.
      dates:
      - start: '2011-10-11'
        kind: effective
  - identifier: CIML/2011/24
    doi: "10.63493/resolutions/ciml201124"
    urn: "urn:oiml:doc:ciml:resolution:2011-24"
    subject: CIML
    title: "Décide que "
    dates:
    - start: '2011-10-11'
      kind: decision
    considerations:
    - type: noting
      message: |
        Prenant note de l'élaboration de la 3ème édition du Vocabulaire international de métrologie – Concepts fondamentaux et généraux et termes associés (VIM) par le Comité conjoint pour les guides de métrologie (JCGM), dont l'OIML est Membre adhérent,
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: noting
      message: |
        Prenant note de la publication de la 3ème édition du VIM en tant que lexique de I'OIML (OIML V 2-200:2010),
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: recalling
      message: |
        Rappelant les exigences en matière d'élaboration et de présentation des termes et définitions dans les Recommandations et les Documents de I'OIML, telles que fixées dans I'annexe B de I'OIML B 6-2:1993, et en particulier dans le paragraphe B.1.2 « Avoidance of duplications and contradictions » (ca. Comment éviter les répétitions inutiles et les contradictions),
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: considering
      message: |
        Considérant l'achèvement imminent de la révision du Vocabulaire international des termes de métrologie légale par le TC 1 de l'OIML,
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide que :
        a) les Recommandations et Documents actuels de l'OIML, qu'ils soient nouveaux ou fassent l'objet d'une révision, doivent appliquer la terminologie et les définitions du VIM et du VIML sans amendement,
        b) des termes et définitions issus de lexiques internationaux relatifs à d'autres domaines (par exemple les statistiques) peuvent être adaptés lorsque la notion à laquelle ils se rapportent dans la métrologie légale est différente, les différences conceptuelles devant alors être développées dans une note explicative,
        c) lorsque, dans les publications de l'OIML autres que les Recommandations et Documents, des termes et définitions utilisés différent de ceux du VIM et du VIML, les différences doivent, si nécessaire, être indiquées dans des notes explicatives,
        Donne instruction au BIML de vérifier la bonne mise en application de cette Résolution à tous les stades de l'élaboration des publications de l'OIML.
      dates:
      - start: '2011-10-11'
        kind: effective
  - identifier: CIML/2011/25
