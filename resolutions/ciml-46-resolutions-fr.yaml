    - type: approves
      message: |
        Approuve l'établissement d'un Sous-comité du TC 3, qui s'appellera « Conformité au Type », lequel doit entreprendre comme tâche le développement d'un document d'orientation sur les « perspectives d'activités de surveillance avant mise sur le marché, activités axées sur l'évaluation de la conformité des instruments de mesure en vue d'apporter l'assurance que les instruments fabriqués (ou de production) correspondent au type homologué »,
