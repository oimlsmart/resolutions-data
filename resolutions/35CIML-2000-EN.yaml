  title:
  - spelling: eng
    value: 'Agenda Item 6: Activités techniques'
  actions:
  - type: notes
    date_effective:
      date: '2000-10-09'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a report from the BIML describing the situation
        of certain Technical Committees and Subcommittees. Whilst the Committee noted
        that there was no need for the TC 5 secretariat to be allocated to a Member
        State, it did note that TC 13 should not remain without a secretariat. The
        Committee also accepted that under TC 16/SC 1 the activity on Measuring instruments
        for vehicle exhaust emissions be pursued by The Netherlands whereas the other
        three work projects will be the responsibility of the Russian Federation.
        Finally, the Committee noted that the Russian Federation might be interested
        in taking over responsibility for TC 8/SC 2, provided that work was limited
        to the development of a test report format for R 125.
