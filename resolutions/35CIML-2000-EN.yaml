    - spelling: eng
      value: The Committee took note of a list giving the population and the contributory
        class for each Member State, with an indication of those Member States benefiting
        from a lower contributory class than that assigned by the population. The
        Committee took note of the fact that there were no changes in relation to
        the previous situation and expressed no comment concerning this list.
