    message:
    - spelling: eng
      value: The Committee elected Mr. Faber (The Netherlands) to continue as its
        President for the next three years.
    - spelling: eng
      value: The Committee elected Dr. Issaev (Russian Federation) as its Second Vice
        President for the next six years.
