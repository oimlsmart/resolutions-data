    value: 'Agenda Item 7: Onzième Conférence Internationale de Métrologie Légale
      Ordre du jour et programme'
  actions:
  - type: endorses
    date_effective:
      date: '2000-10-09'
      type: effective
    message:
    - spelling: eng
      value: The Committee endorsed the draft agenda and program for the Conference.
        It noted that Dr. Foster, Director for Innovation Services at the Department
        of Trade and Industry of the United Kingdom, would act as Conference Chairman
        and approved the proposal from the CIML President to nominate Mr. Beard (South
        Africa) and Dr. Pákay (Hungary) as Conference Vice Presidents.
