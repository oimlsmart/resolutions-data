- identifier: CIML/2008/21
  doi: 10.63493/resolutions/ciml200821
  urn: urn:oiml:doc:ciml:resolution:2008-21
  subject: OIML Conference
  title: After the OIML Basic Certificate System for a particular category of instrument
    has been
  dates:
  - start: '2008-10-28'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'After the OIML Basic Certificate System for a particular category of
      instrument has been stopped, when an applicant requests a revision (see the
      Note below) of an OIML Basic Certificate based on the same version of the OIML
      Recommendation, which has been subsequently covered by the MAA, the revised
      OIML Basic Certificate may be issued by the original OIML Issuing Authority
      even if it is not an Issuing Participant in the relevant DoMC, or by an Issuing
      Participant in the DoMC.

      '
    dates:
    - start: '2008-10-28'
      kind: effective
