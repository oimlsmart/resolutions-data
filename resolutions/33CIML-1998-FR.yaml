  title:
  - spelling: fra
    value: 'Agenda Item 8.3: Disponibilité des Publications OIML sur papier, sur support
      électronique et via Internet'
  actions:
  - type: notes
    date_effective:
      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: M. Athané explique que l'OIML publie actuellement les Publications OIML
        sur papier (avec un tirage de 500-700), sur disquette et, pour les Publications
        récentes, sur Internet. Certains documents doivent être réimprimés après deux
        ou trois ans pour reconstituer les stocks, mais les frais marginaux de réimpression
        sont élevés et les frais totaux d'impression pour 1998 s'élèvent à environ
        400000 FRF. Certains pays demandent jusqu'à 40 copies de chaque document,
        que le BIML envoie à titre gratuit. Les recettes provenant des ventes aux
        destinataires payants (c'est-à-dire les organismes privés) se montent approximativement
        à 200000 FRF pour la même période, ce qui donne un déficit global d'environ
        200000 FRF. Mais en fait, cette situation n'est pas aussi alarmante qu'il
        paraît puisque l'allocation pour ces frais est faite dans les contributions
        annuelles des Membres.
