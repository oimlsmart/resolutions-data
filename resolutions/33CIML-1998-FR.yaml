  title:
  - spelling: fra
    value: 'Agenda Item 7: ACTIVITÉS LIÉES À LA RECONNAISSANCE MUTUELLE DES RÉSULTATS
      D''ESSAI, À L''ACCRÉDITATION, etc.'
  actions:
  - type: notes
    date_effective:
      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: M. Chappell donne une présentation détaillée et commence en notant que
        lors des discussions sur le Rapport Birkeland, nombre de références ont été
        faites à l'accréditation, sur la façon dont elle est liée au travail de l'OIML
        et de quelle manière la confiance mutuelle peut mieux être établie. L'un des
        objectifs est d'étabrir la confiance envers le Système de Certificats OIML
        pour les Instruments de Mesure, de mettre en place une sorte de mécanisme
        pour la reconnaissance mutuelle ou multilatérale et l'utilisation des certificats
        OIML, et d'étabrir la confiance dans le fait que les instruments individuels
        sont conformes aux modèles.
