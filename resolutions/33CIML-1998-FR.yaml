      type: effective
    message:
    - spelling: fra
      value: Le Comité a pris note d'informations données par le Bureau au sujet de
        la situation d'États Membres en retard dans le paiement de leurs cotisations
        à l'OIML. Le Comité a noté que trois de ces États Membres pourraient être
        radiés en 1999 si aucun paiement n'était rapidement reçu. Le Comité a demandé
        au Bureau de contacter d'urgence ces États Membres pour les inviter à faire
        de leur mieux pour payer leurs arriérés le plus vite possible. Le Comité a
        aussi pris note du fait que trois Membres Correspondants avaient été radiés
        pour n'avoir pas payé leurs abonnements annuels pendant plus de quatre années.
