      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: Le Comité a pris note d'un rapport présenté par le BIML au sujet de la
        possibilité pour les Membres Correspondants de participer davantage à certaines
        activités de l'OIML (c'est-à-dire assister aux réunions du CIML comme observateurs
        et s'enregistrer comme membres-O de certains comités techniques et sous-comités).
        Le Comité a décidé que cette possibilité devait être mise en application et
        a chargé le Bureau, sous le contrôle du Président du CIML et en tenant compte
        des commentaires présentés par certains Membres du CIML pendant la réunion,
        de préparer les modalités de cette participation accrue.
