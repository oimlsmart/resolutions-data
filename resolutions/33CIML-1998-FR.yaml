      type: effective
    message:
    - spelling: fra
      value: Dr. Imai donne une information concernant le prochain Congrès Mondial
        IMEKO prévu à Osaka en juin 1999 et invite les Membres du CIML à assister
        au Congrès et aux nombreuses réunions de TC et discussions de table ronde.
        Une session spéciale sur les systèmes de qualité et mesurages était aussi
        planifiée et des conférences plenières couvrront les aspects les plus avancés
        de la métrologie.
