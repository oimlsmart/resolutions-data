    date_effective:
      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: 'Le Comité a pris note d''un rapport de son Vice-Président S. Chappell
        sur la situation de certains TC/SC et la situation générale des activités
        techniques de l''OIML. Le Comité a noté qu''un certain nombre d''actions devraient
        être entreprises prochainement par le Bureau en vue de clarifier la situation
        de certains TC/SC. En ce qui concerne les propositions de nouveaux thèmes
        de travail, le Comité a noté qu''ou bien la décision avait déjà été prise
        au sein du TC/SC concerné ou bien le Bureau devrait effectuer les enquêtes
        appropriées. Le Comité a aussi noté que certains problèmes plus généraux et
        stratégiques devraient être examinés par le Conseil de Présidence avant que
        des propositions ne soient soumises à une future réunion du Comité. Finalement,
        le Comité a décidé:'
