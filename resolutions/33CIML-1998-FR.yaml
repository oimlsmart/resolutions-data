    value: 'Agenda Item 2.3: Propositions visant à accroître la participation des
      Membres Correspondants à certaines activités de l''OIML'
  actions:
  - type: notes
    date_effective:
      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: M. Faber rappelle aux participants qu'à plusieurs occasions des discussions
        ont eu lieu au sein du Comité et du Conseil de Présidence concernant l'opportunité
        d'augmenter la participation des Membres Correspondants aux activités de l'OIML,
        en plus des possibilités actuelles d'assister aux Conférences OIML comme observateurs
        et de participer aux réunions du Conseil de Développement de l'OIML et aux
        séminaires techniques.
