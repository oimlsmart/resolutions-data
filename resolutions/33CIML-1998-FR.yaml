    message:
    - spelling: fra
      value: M. Athané indique que le budget 1999 sera tel que voté par la Dixième
        Conférence, avec le total des contributions des États Membres en augmentation
        de 2,8 % comparé à 1998. Cependant, puisqu'il y a un État Membre de plus,
        les cotisations individuelles de chaque État Membre ne devraient augmenter
        que de 0,7 %. M. Athané souligne que pendant les trois dernières années, les
        contributions des États Membres ont augmenté en moyenne de seulement 0,3 %
        par an.
