  localizations:
  - language_code: fra
    title: Nouveaux membres - Adhésions attendues
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'M. Athané rappelle aux Délégués que comme annoncé par le Président
        Faber dans son allocution d''ouverture, la République d''Afrique du Sud a
        récemment rejoint l''OIML en tant qu''État Membre de plein droit. Il fait
        part également de l''adhésion en tant que Membres Correspondants du Guatemala
        et de Madagascar. Concernant les adhésions attendues, M. Athané indique que
        la Croatie a engagé les démarches en vue de devenir un État Membre; cette
        adhésion devrait devenir effective en 1999.

        '
      dates:
      - start: '1998-10-28'
        kind: effective
- identifier: CIML/1998/2.2
  doi: 10.63493/resolutions/ciml19982.2
