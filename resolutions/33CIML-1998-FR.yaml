    date_effective:
      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: 'M. Athané rappelle aux participants que le JCGM a été créé il y a environ
        trois ans pour succéder à ISO/TAG 4. Le rôle de ce comité commun est strictement
        limité à l''élaboration de guides sur la métrologie présentant un intérêt
        pour les organisations membres - au nombre de huit maintenant (BIPM, CEI,
        IFCC, ISO, IUPAC, IUPAP, OIML et très récemment ILAC). Le Président du JCGM
        est Dr. Quinn, Directeur du BIPM, et le secrétariat est sous la responsabilité
        conjointe du BIPM et du BIML. La dernière réunion a eu lieu en novembre 1997
        au BIML. Les activités principales actuelles sont:'
- identifier:
  - prefix: CIML
