    kind: decision
  localizations:
  - language_code: fra
    title: Situation de certains Membres
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'M. Athané rappelle aux participants que trois Membres Correspondants
        (le Bénin, le Burkina Faso et le Ghana) ont été radiés pour n''avoir pas payé
        leur contribution annuelle durant plus de trois ans en dépit des lettres de
        rappel envoyées par le Bureau. Concernant les États Membres, M. Athané indique
        que trois pays sont très en retard dans le paiement de leur contribution.
        Le Bureau leur enverra bientôt un avis pour leur signaler qu''à défaut d''un
        paiement rapide (c''est-à-dire, au début de 1999), ils seront, en application
        de la Convention, considérés comme démissionnaires.

        '
      dates:
      - start: '1998-10-28'
        kind: effective
