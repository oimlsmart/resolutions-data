  agenda_item: '12.1'
  dates:
  - date: '1998-10-28'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 12.1: 34ème Réunion du CIML (1999)'
  actions:
  - type: notes
    date_effective:
      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: Une proposition est reçue de la Tunisie pour accueillir la réunion de
        1999; Mme Annabi fait une présentation de son pays et invite chaleureusement
        le CIML à se réunir à Tunis. Elle indique que ce sera la première fois que
        le CIML se réunira dans un pays méditerranéen, et les autres pays en développement
        verront sans doute cela comme une opportunité de travailler ensemble pour
        servir les objectifs de la métrologie légale. Le Département de la Métrologie
        Légale et le Gouvernement Tunisien prendront toutes les mesures nécessaires
        pour assurer le succès de la réunion qui sera la dernière avant le changement
        de siècle.
- identifier:
  - prefix: CIML
    number: 1998/12.2
  doi: 10.63493/resolutions/ciml199812.2
  urn: urn:oiml:doc:ciml:resolution:1998-12.2
  agenda_item: '12.2'
  dates:
  - date: '1998-10-28'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 12.2: 35ème Réunion du CIML et Onzième Conférence de l''OIML
      (2000)'
  actions:
  - type: notes
    date_effective:
      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: M. Bennett rappelle aux participants qu'il avait été provisoirement décidé
        à la Dixième Conférence que la Onzième Conférence se tiendrait à Paris, à
        moins qu'un État Membre se propose de l'accueillir. Il indique que le Royaume-Uni
        espère être en mesure d'accueillir cet évènement à Londres sans pouvoir toutefois
        lancer une invitation définitive; la confirmation ne sera possible que d'ici
        six mois si le Comité accepte sa proposition.
- identifier:
  - prefix: CIML
    number: 1998/12.3
  doi: 10.63493/resolutions/ciml199812.3
  urn: urn:oiml:doc:ciml:resolution:1998-12.3
  agenda_item: '12.3'
  dates:
  - date: '1998-10-28'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 12.3: 36ème Réunion du CIML (2001)'
  actions:
  - type: notes
    date_effective:
      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: M. Issaev invite le CIML à Moscou pour sa réunion en 2001, sous réserve
        de l'approbation officielle des autorités russes. M. Birch tente également
        d'obtenir l'autorisation des autorités australiennes pour tenir la réunion
        de 2001, bien qu'il croie que M. Issaev qui a déjà fait part de ses intentions
        quelques mois auparavant, sera en mesure d'organiser cet événement à temps
        car les discussions en Russie sont déjà bien avancées. M. Birch indique que
        cela ne lui posera pas de problème si le choix du Comité se porte sur la Russie
        pour sa réunion en 2001.
