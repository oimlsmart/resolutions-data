    date_effective:
      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: Le Comité a pris note d'un rapport très complet de son Vice-Président
        S. Chappell qui dirige le groupe de travail ad-hoc sur l'accréditation. Le
        Comité a également pris note de points de vue et de propositions présentés
        par un certain nombre de Membres du CIML. Le Comité a souligné l'extrême importance
        de ces sujets et leurs connections très fortes avec les discussions sur la
        politique à long terme. Le Comité a en conséquence demandé au Bureau de préparer
        d'urgence un résumé détaillé (ou si approprié une retranscription intégrale)
        des discussions et de le faire parvenir au Vice-Président Chappell. Le Comité
        a également demandé que le statut du groupe de travail sur l'accréditation
        soit réexaminé et, si approprié, changé pour celui d'un Groupe Technique Consultatif
        ou d'un comité technique. Par ailleurs le Comité a demandé au Bureau d'établier
        un Registre des laboratoires d'essais en métrologie légale, avec des informations
        concernant leur domaine de travail, leur accréditation, etc.
