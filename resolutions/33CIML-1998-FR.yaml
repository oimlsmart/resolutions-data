  localizations:
  - language_code: fra
    title: 34ème Réunion du CIML (1999)
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Une proposition est reçue de la Tunisie pour accueillir la réunion
        de 1999; Mme Annabi fait une présentation de son pays et invite chaleureusement
        le CIML à se réunir à Tunis. Elle indique que ce sera la première fois que
        le CIML se réunira dans un pays méditerranéen, et les autres pays en développement
        verront sans doute cela comme une opportunité de travailler ensemble pour
        servir les objectifs de la métrologie légale. Le Département de la Métrologie
        Légale et le Gouvernement Tunisien prendront toutes les mesures nécessaires
        pour assurer le succès de la réunion qui sera la dernière avant le changement
        de siècle.

        '
      dates:
      - start: '1998-10-28'
        kind: effective
- identifier: CIML/1998/12.2
  doi: 10.63493/resolutions/ciml199812.2
  urn: urn:oiml:doc:ciml:resolution:1998-12.2
