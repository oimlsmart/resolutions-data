  localizations:
  - language_code: fra
    title: Approbation de Recommandations Internationales
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'M. Faber mentionne les six projets soumis pour approbation du CIML
        et indique qu''il y a sans doute un problème pour l''un d''eux: le PR 4, la
        révision de la R 65 Exigences pour les machines d''essai des matériaux en
        traction et en compression pour lequel un travail parallèle est fait au sein
        de l''ISO avec des risques de conflit. Cela est confirmé par M. Kochsiek qui
        indique que son pays voterait contre ce projet. M. Athané indique qu''il s''agit
        d''une question de principe: l''OIML devrait s''en tenir aux règles de coopération
        acceptées par l''ISO, la CEI et l''OIML; en particulier, tout devrait être
        fait pour éliminer tout risque de divergence entre les Recommandations OIML
        et les Normes ISO et CEI. M. Chappell indique qu''il n''a pas reçu de réponse
        spécifique de l''ISO concernant d''éventuelles différences entre les projets
        de l''OIML et de l''ISO et que le projet a été fortement soutenu par presque
        tous les Membres-P. Après discussion et examen de deux possibilités (soit
        reporter l''approbation, soit approuver le texte mais en différant sa publication
        jusqu''à obtention d''un accord avec l''ISO), le Comité retient la première
        possibilité mais se range à l''avis de M. Chappell selon lequel l''ISO à la
        demande de l''OIML doit fournir rapidement les commentaires relatifs à d''éventuelles
        divergences entre les documents ISO et OIML et, à défaut de réponse de l''ISO
        avant une date limite, alors l''OIML pourrait en toute conscience approuver
        et publier le projet en son état actuel. M. Chappell et le Bureau sont chargés
        de contacter l''ISO à ce sujet.

        '
      dates:
      - start: '1998-10-28'
        kind: effective
- identifier: CIML/1998/8.3
  doi: 10.63493/resolutions/ciml19988.3
  urn: urn:oiml:doc:ciml:resolution:1998-8.3
