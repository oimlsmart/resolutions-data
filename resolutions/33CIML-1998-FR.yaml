    title: 35ème Réunion du CIML et Onzième Conférence de l'OIML (2000)
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'M. Bennett rappelle aux participants qu''il avait été provisoirement
        décidé à la Dixième Conférence que la Onzième Conférence se tiendrait à Paris,
        à moins qu''un État Membre se propose de l''accueillir. Il indique que le
        Royaume-Uni espère être en mesure d''accueillir cet évènement à Londres sans
        pouvoir toutefois lancer une invitation définitive; la confirmation ne sera
        possible que d''ici six mois si le Comité accepte sa proposition.

        '
      dates:
      - start: '1998-10-28'
        kind: effective
