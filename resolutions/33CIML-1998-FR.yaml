    value: 'Agenda Item 4.1: Informations sur le Séminaire International le Rôle de
      la Métrologie dans le Développement Économique et Social (Braunschweig, juin
      1998) et son éventuel impact sur la politique à long terme de l''OIML'
  actions:
  - type: notes
    date_effective:
      date: '1998-10-28'
      type: effective
    message:
    - spelling: fra
      value: M. Kochsiek rapporte que plus de deux cent experts de quelques quatre-vingts
        pays et dix-sept organisations internationales et régionales se sont réunis
        à Braunschweig en juin 1998 pour discuter du Rôle de la Métrologie dans le
        Développement Économique et Social. Le Séminaire était organisé par la PTB
        en coopération avec le BIPM, l'OIML et IMEKO. Le centre principal d'intérêt
        consistait à évaluer les enjeux particuliers issus de la globalisation grandissante
        des activités économiques. Ce n'est pas quelque chose de nouveau pour la communauté
        de métrologie qui a déjà créé les bases métrologiques du
