  localizations:
  - language_code: fra
    title: BIPM et ILAC
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'M. Faber indique que les relations avec le BIPM sont bonnes, bien
        que les discussions concernant un éventuel rapprochement soient maintenant
        définitivement abandonnées. Cependant, la coopération se développe avec, par
        exemple, la participation conjointe dans la planification du Séminaire de
        Braunschweig. Il est à noter également que les réunions annuelles entre le
        BIPM et l''OIML impliquent maintenant ILAC. En février 1998, l''OIML a suggéré
        au BIPM et à ILAC d''adopter une "approche ciblée" comme définie dans le rapport
        Birkeland: les trois Organisations se rencontreraient pour discuter d''une
        question d''intérêt commun avec la participation d''experts de l''industrie
        et d''utilisateurs, afin d''identifier ce qu''ils pourraient attendre des
        trois Organisations; cependant, le BIPM ne manifeste pas d''intérêt particulier
        pour ce type d''action commune.

        '
      dates:
      - start: '1998-10-28'
        kind: effective
- identifier: CIML/1998/6.2
  doi: 10.63493/resolutions/ciml19986.2
