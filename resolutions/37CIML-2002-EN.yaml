    title: 'Agenda Item 9.1: Informations générales'
    actions:
    - type: notes
      date_effective:
        date: '2002-10-01'
        type: effective
      message: In his introductory remarks Mr. Kochsiek said that the OIML Certificate
        System for Measuring Instruments ("the System") had made good progress over
        the last decade and the revised document OIML Certificate System for Measuring
        Instruments provided for its further development. He mentioned that the number
        of registered OIML certificates would very likely exceed 1000 by the end of
        2002, and three more Member States (Japan, Finland and the Republic of Korea)
        had recently established their respective Issuing Authorities. There were
        now 26 Issuing Authorities established in 23 Member States. The number of
        applicants and manufacturers of measuring instruments in 34 countries (25
        OIML Member States and 9 Corresponding Members) that had been granted OIML
        certificates was over 260.
