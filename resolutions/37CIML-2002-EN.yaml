    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Mr. Singyangwe presented activities in Botswana. There had been a
        workshop under the auspices of the German Technical Cooperation, attended
        by representatives from SADC SQAM structures. This workshop reviewed PTB support
        to SADC SQAM structures. The representatives of SADCSTAN, SADCMET, SADCA and
        SADCMEL requested new additional resource funding for the next four years,
        and the SADC Secretariat would meet with the German Ministry of Technical
        Cooperation to consider this request.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
