    title: 'Agenda Item 13: Election du Président du CIML, 2003'
    actions:
    - type: notes
      date_effective:
        date: '2002-10-01'
        type: effective
      message: Mr. Faber gave information concerning the election of the CIML President
        which would take place in Kyoto in November 2003. He was eager to provide
        information as early as possible as this was a key event in the life of the
        Organization, together with the fact that a number of new CIML Members were
        present and the procedure should be clear and transparent for everybody.
