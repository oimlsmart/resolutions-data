- identifier: CIML/2002/9.1
  doi: 10.63493/resolutions/ciml20029.1
  urn: urn:oiml:doc:ciml:resolution:2002-9.1
  dates:
  - start: '2002-10-01'
    kind: decision
  localizations:
  - language_code: eng
    title: General information
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'In his introductory remarks Mr. Kochsiek said that the OIML Certificate
        System for Measuring Instruments ("the System") had made good progress over
        the last decade and the revised document OIML Certificate System for Measuring
        Instruments provided for its further development. He mentioned that the number
        of registered OIML certificates would very likely exceed 1000 by the end of
        2002, and three more Member States (Japan, Finland and the Republic of Korea)
        had recently established their respective Issuing Authorities. There were
        now 26 Issuing Authorities established in 23 Member States. The number of
        applicants and manufacturers of measuring instruments in 34 countries (25
        OIML Member States and 9 Corresponding Members) that had been granted OIML
        certificates was over 260.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
- identifier: CIML/2002/9.2
  doi: 10.63493/resolutions/ciml20029.2
  urn: urn:oiml:doc:ciml:resolution:2002-9.2
  dates:
  - start: '2002-10-01'
    kind: decision
  localizations:
  - language_code: eng
    title: New Recommendations applicable within the System
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee also decided that two Recommendations, namely R 134
        Automatic instruments for weighing road vehicles in motion. Part A: Total
        vehicle weighing and R 49 Water meters for cold potable water would become
        applicable within the System as soon as their Test Report Formats were approved
        by CIML postal vote and published.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
