    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 12.1: Organisations Régionales de Métrologie Légale (LRMO)'
    actions:
    - type: notes
      date_effective:
        date: '2002-10-01'
        type: effective
      message: Mr. Magaña presented the status of work on relations with the RLMOs.
        At the last Committee Meeting, the Bureau had been asked to come up with a
        policy paper on this subject and had drawn up a first draft which was examined
        by the Presidential Council. A number of comments and amendments had to be
        taken into account and a second draft would be presented to the Presidential
        Council at its meeting in February 2003, with a view to distributing it to
        CIML Members for adoption at the 38th CIML Meeting in 2003. The RLMOs would
        also be formally consulted on this policy paper.
- identifier:
  - prefix: CIML
    number: 2002/12.2
  doi: 10.63493/resolutions/ciml200212.2
  urn: urn:oiml:doc:ciml:resolution:2002-12.2
