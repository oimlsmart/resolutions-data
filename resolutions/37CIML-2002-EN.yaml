    title: Examination of the financial situation for 2002 and 2003
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Financial estimates had been distributed in January 2002. Mr. Magaña
        gave information that the Organization was globally on schedule with the budget
        and that objectives were being met - and would be met at the end of the period.
        The forecasts for 2003 were also scheduled to be in line with the budget,
        despite the obligation of changing the BIML photocopying equipment. He noted
        that the rate of inflation in France was also reasonably low, and steady.

        '
