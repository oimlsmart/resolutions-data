- identifier: CIML/2002/8.3
  doi: 10.63493/resolutions/ciml20028.3
  urn: urn:oiml:doc:ciml:resolution:2002-8.3
  dates:
  - start: '2002-10-01'
    kind: decision
  localizations:
  - language_code: eng
    title: Acceleration of technical work
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'In his introduction, Mr. Faber said that he (together with Members
        of the Presidential Council) were worried about the speed at which OIML technical
        work was advancing since this was, after all, the core activity of the Organization.
        It was not only about the slowness of developing new OIML documents but also
        about lagging behind in regular reviews and revisions of existing Recommendations
        and Documents. If the OIML failed to do its job, other organizations would
        do it since they cannot (and will not) wait until the OIML does so. The Presidency
        had looked into the distribution of TCs/SCs and the tasks allocated and had
        found that the US and the Russian Federation held half of the Secretariats;
        four Member States were developing about 75 % of ongoing projects. In order
        to arrive at a more balanced distribution of tasks among Member States and
        to find more individuals who could contribute to OIML technical activities
        he preferred to employ a positive approach since there was no reason to blame
        any specific country or person. That meant that several means of assistance
        to technical bodies would be put forward: informal contacts and visits would
        be proposed in order to i) identify those problems within TCs and SCs that
        needed to be attended to, ii) help identify potential sources of assistance
        by various other Member States and iii) attempt to persuade them to take on
        certain responsibilities. He said that in the coming years the CIML President,
        the Vice-Presidents and the BIML Director would be in contact with those countries
        to discuss possibilities in a positive but informal way, draw up a program
        of visits and then report back to the CIML and discuss what can be done to
        improve the situation. To conclude, Mr. Faber affirmed that he was well aware
        of the difficulties facing most metrology services: shortage of time, resources
        and staff, and agreed that each situation had to be studied case by case in
        close cooperation with the bodies concerned.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
