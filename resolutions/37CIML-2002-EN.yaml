  agenda_item: '12.3'
  dates:
  - date: '2002-10-01'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 12.3: Information sur les développements en métrologie légale
      dans les Régions'
    actions:
    - type: notes
      date_effective:
        date: '2002-10-01'
        type: effective
      message: Mr. Singyangwe presented activities in Botswana. There had been a workshop
        under the auspices of the German Technical Cooperation, attended by representatives
        from SADC SQAM structures. This workshop reviewed PTB support to SADC SQAM
        structures. The representatives of SADCSTAN, SADCMET, SADCA and SADCMEL requested
        new additional resource funding for the next four years, and the SADC Secretariat
        would meet with the German Ministry of Technical Cooperation to consider this
        request.
- identifier:
