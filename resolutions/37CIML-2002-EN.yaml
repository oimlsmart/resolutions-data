    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of information delivered by its President
        concerning the election of a new President which will take place at the 38th
        CIML Meeting in 2003. The Committee decided that candidacies for this election
        will not be accepted after 31 January 2003 so that CIML Members have sufficient
        time to prepare their decision.

