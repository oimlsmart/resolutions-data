    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 12.2: Autres institutions (Convention du Mètre, ILAC, ISO,
      OMC, etc.)'
    actions:
    - type: notes
      date_effective:
        date: '2002-10-01'
        type: effective
      message: Mr. Faber informed the CIML of ongoing cooperation with the Metre Convention
        and ILAC. The annual meeting with these two organizations had been held on
        27 February 2002 at the BIPM and the OIML delegation was composed of Mr. Faber,
        Mr. Kochsiek, Mr. Issaev, Mr. Ehrlich and Mr. Magaña. Representing ILAC were
        Mr. Peet and Mr. Squirrel, and from the Metre Convention Mr. Kovalevsky, Mr.
        Moscati, Mr. Van Koughnett, Mr. Kaarls, Mr. Quinn and Mr. Wallard.
- identifier:
  - prefix: CIML
    number: 2002/12.3
