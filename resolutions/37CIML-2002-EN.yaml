      Légale dans l''Economie et la Société'
    actions:
    - type: notes
      date_effective:
        date: '2002-10-01'
        type: effective
      message: Mr. Birch gave a detailed report on his Study The Benefits of Legal
        Metrology for the Economy and Society which had been requested by the Presidential
        Council. His work had consisted in looking at previous studies carried out
        over the last years, and in reviewing them with the aim of extracting the
        lessons learned from work already accomplished, and on this basis to come
        up with a number of social and economic criteria which could be used in determining
        resource allocation, to provide a rudimentary cost-benefits analysis for metrology.
