        type: effective
      message: The Committee took note of information delivered by the Secretariat
        of TC 3/SC 5 concerning the results of the ballot at SC level. This Draft
        can now become a First Draft Document and be submitted to the CIML for consultation
        and comments. The Committee instructed the Bureau together with the USA CIML
        Member to organize a workshop to examine the comments received from CIML Members
        and to use, when appropriate, other ad-hoc means in order to obtain maximum
        support.
