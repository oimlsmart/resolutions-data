    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Mr. Faber informed the CIML of ongoing cooperation with the Metre
        Convention and ILAC. The annual meeting with these two organizations had been
        held on 27 February 2002 at the BIPM and the OIML delegation was composed
        of Mr. Faber, Mr. Kochsiek, Mr. Issaev, Mr. Ehrlich and Mr. Magaña. Representing
        ILAC were Mr. Peet and Mr. Squirrel, and from the Metre Convention Mr. Kovalevsky,
        Mr. Moscati, Mr. Van Koughnett, Mr. Kaarls, Mr. Quinn and Mr. Wallard.

        '
      dates:
      - start: '2002-10-01'
        kind: effective
