  - language_code: eng
    title: 'Agenda Item 10.2: Documents Horizontaux'
    actions:
    - type: notes
      date_effective:
        date: '2002-10-01'
        type: effective
      message: Mr. Magaña recalled that at the last CIML Meeting it had been decided
        to develop a policy paper on horizontal documents. A first draft had been
        drawn up and discussed at the Presidential Council. This paper considered
        and tried to distinguish several kinds of documents. Some OIML publications,
        such as D11, were not merely informative but also served as a basis for most
        of the OIML International Recommendations. This would also be the case of
        the documents on software. A number of comments were expressed by Presidential
        Council Members on this first paper, which would be reconsidered by the Bureau
        with a view to its being presented to the Presidential Council at its meeting
        in February 2003, in the form of a better draft which could then be submitted
        to CIML Members with a view to its adoption at the next CIML Meeting. This
        paper would redefine the different kinds of OIML publications in order to
        clarify their use and their mode of adoption.
