      message: The CIML President presented the highlights of the Seminar held on
        26-27 September 2002. The Committee instructed the Bureau to issue a communiqué
        identifying the key points raised during the event and to distribute it to
        interested parties. The CIML agreed that other similar events could be held
        in the future. In addition, the Bureau was requested to distribute an "Evaluation
        Form" to participants in the event.
