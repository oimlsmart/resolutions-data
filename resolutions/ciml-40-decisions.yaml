    title: 'Agenda Item 8.3: Technical activities'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a pris note d'un rapport présenté par Mme Gaucher, Chef de
        Projet de MAA au BIML, indiquant les progrès de la mise en œuvre du MAA, ainsi
        que les résultats de la première Réunion du CPR.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: 'Le Comité a demandé au Bureau de présenter les propositions du CPR
        - modifiées conformément aux remarques formulées lors de la présente Réunion
        du CIML, et accompagnées d''une note explicative détaillée - au CIML pour
        un vote par correspondance avant la fin de l''année 2005. Les propositions
        soumises au vote concernent les points suivants :'
- identifier:
  - prefix: CIML
    number: 2005/8.4
  doi: 10.63493/resolutions/ciml20058.4
  urn: urn:oiml:doc:ciml:resolution:2005-8.4
  agenda_item: '8.4'
  dates:
  - date: '2005-06-18'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 8.4: Technical activities'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee took note that the Bureau will start the revision of
        the Directives for Technical Work before the end of 2005 and indicated that
        this work must be considered a high priority. This revision should simplify
        the procedures and make use of information technologies in order to substantially
        accelerate the work.
  - language_code: fra
    title: 'Agenda Item 8.4: Technical activities'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a pris note que le Bureau entamera la révision des Directives
        relatives au Travail Technique avant la fin de l'année 2005 et a indiqué que
        ce travail doit être considéré comme étant de haute priorité. Cette révision
        devrait simplifier les procédures et permettre l'utilisation de technologies
        de l'information afin d'accélérer le travail de manière significative.
