    title: 'Agenda Item 7.2: BIML activities'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee took note of a presentation given by Mr. Pulham concerning
        the production of OIML Publications, activities aimed at improving communication,
        and the OIML web site.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee expressed its high appreciation of the achievements presented
        and encouraged the Bureau to continue this development. In particular, a new
        OIML Leaflet was presented describing the Organization, its role and its structures.
        The BIML proposed to make the Leaflet available free of charge to all Members
        to promote legal metrology in their countries.
  - language_code: fra
    title: 'Agenda Item 7.2: BIML activities'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a pris note d'un exposé de M. Pulham concernant la production
        des Publications de I'OIML, les activités visant à améliorer la communication
        et le site Internet de I'OIML.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: 'Le Comité a exprimé ses remerciements pour les résultats présentés
        et a encouragé le Bureau à poursuivre en ce sens. En particulier, un nouveau
        Dépliant OIML a été présenté : celui-ci décrit l''Organisation, son rôle et
        ses structures. Le BIML propose de rendre le Dépliant gratuit pour tous les
        Membres afin de promouvoir la métrologie légale dans leur pays.'
