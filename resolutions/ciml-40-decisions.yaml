  urn: urn:oiml:doc:ciml:resolution:2005-8.2
  agenda_item: '8.2'
  dates:
  - date: '2005-06-18'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 8.2: Technical activities'
    actions:
    - type: decides
      date_effective:
        date: '2005-06-18'
        type: effective
      message: 'The Committee decided:'
    - type: approves
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee approved the proposal from TC 3/SC 5 to use the Guides
        for the application of ISO 17025 and Guide 65 drawn up by the CPR on R 60
        and R 76 as a first Working Draft and to proceed following the Directives
        for Technical Work.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee authorized the Bureau, together with the TC 4 Secretariat
        (Slovakia), to decide together with ILAC on the best way of publishing the
        joint publication of the revised D 10.
    - type: instructs
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee instructed the Bureau to organize a meeting with the
        Secretariats of TC 8/SC 7 and TC 8/SC 8 and to redefine the scope of these
        Subcommittees' projects so as to avoid unnecessary overlapping, eliminate
        redundancies, discrepancies and duplication of work.
  - language_code: fra
    title: 'Agenda Item 8.2: Technical activities'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: 'Le Comité a décidé :'
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a approuvé la proposition du TC 3/SC 5 visant, d'une part,
        à utiliser les Guides en application de la norme ISO 17025 et du Guide 65
        rédigé par le CPR, relatif aux R 60 et R 76 en tant que premier Projet de
        Travail et, d'autre part, à poursuivre en suivant les Directives relatives
        au Travail Technique.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a autorisé le Bureau, en partenariat avec le Secrétariat
        du TC 4 (Slovaquie), à décider avec l'ILAC de la meilleure façon de publier
        la publication commune de la révision du D 10.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a chargé le Bureau d'organiser une réunion avec les Secrétariats
        des TC 8/SC 7 et TC 8/SC 8 afin de redéfinir la portée des projets de ces
        Sous-Comités de manière à éviter tout chevauchement inutile, éliminer toute
        redondance, divergence et duplication des tâches.
- identifier:
  - prefix: CIML
