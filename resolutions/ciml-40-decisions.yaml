    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee discussed the Strategy and the Action Plan, and expressed
        comments on them. CIML Members are requested to send additional comments to
        the President and to the Bureau by the end of July 2005.
    - type: instructs
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee instructed its President and the Bureau to circulate
        these drafts, amended in line with the comments expressed, for postal approval
        before the end of 2005.
