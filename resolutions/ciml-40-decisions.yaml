    - spelling: eng
      value: The Committee approved the Auditor's report for 2004 and requested its
        President and the BIML Director to submit it to the Thirteenth Conference.
  - type: notes
    date_effective:
      date: '2005-06-18'
      type: effective
    message:
    - spelling: fra
      value: Le Comité a approuvé le Rapport d'audit de 2004 et a demandé à son Président
        et au Directeur du BIML de le présenter lors de la Treizième Conférence.
- identifier:
  - prefix: CIML
    number: 2005/3.2
  doi: 10.63493/resolutions/ciml20053.2
