  agenda_item: '3.2'
  dates:
  - date: '2005-06-18'
    type: decided
  title:
  - spelling: eng
    value: Financial matters
  - spelling: fra
    value: Financial matters
  actions:
  - type: notes
    date_effective:
      date: '2005-06-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a report given by the BIML Director concerning
        the OIML Pension System and instructed its President and the Director of the
        Bureau to continue to study the possible evolutions of the System, compared
        to other systems existing in similar organizations, and to report back at
        the 41st CIML Meeting in 2006.
    - spelling: eng
      value: The Committee took note of a presentation given by the BIML Director
        concerning the estimation of the assets and liabilities according to the new
        accountancy rules laid down by the new Financial Regulations.
    - spelling: eng
      value: The Committee noted that taking account of the evaluation of the Pension
        Fund, the Reserve Fund would be significantly reduced.
    - spelling: fra
      value: Le Comité a pris note d'un rapport fourni par le Directeur du BIML relatif
        au Système de Retraite de l'OIML et a chargé son Président et le Directeur
        du Bureau de continuer à étudier les évolutions potentielles du Système, par
        comparaison avec d'autres systèmes existants dans des organisations similaires
        et de présenter ses conclusions à ce sujet lors de la 41ème Réunion du CIML
        en 2006.
    - spelling: fra
      value: Le Comité a pris note d'un exposé du Directeur du BIML concernant l'estimation
        de l'actif et du passif conformément aux nouvelles règles de comptabilité
        prescrites par le nouveau Règlement Financier.
    - spelling: fra
      value: Le Comité a pris note qu'en tenant compte de l'évaluation du Fonds de
        Retraite, le Fonds de Réserve serait fortement réduit.
    - spelling: fra
      value: Le Comité a chargé son Président d'examiner les conditions et procédures
        relatives aux prêts personnels aux Membres du Personnel du BIML et de présenter
        ses conclusions lors de la $ 4 1 ^{ème} $ Réunion du CIML en 2006.
  - type: instructs
    date_effective:
      date: '2005-06-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee instructed its President to examine the conditions and
        procedures related to personal loans to BIML Staff Members and to report back
        at the 41st CIML Meeting in 2006.
