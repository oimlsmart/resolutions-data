      date: '2005-06-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee noted that the People's Republic of China was considering
        inviting the CIML to hold its 42nd Meeting in China in October 2007. A decision
        will be taken at the $ 41^{\mathrm{st}} $ CIML Meeting.
    - spelling: fra
      value: Le Comité a pris note que la République populaire de Chine songeait à
        inviter le CIML à tenir sa 42ème Réunion en Chine au mois d'octobre 2007.
        Une décision sera prise lors de la 41ème Réunion du CIML.
