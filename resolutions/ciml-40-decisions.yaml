        Président et au Directeur du BIML de le présenter lors de la Treizième Conférence.
- identifier:
  - prefix: CIML
    number: 2005/3.2
  doi: 10.63493/resolutions/ciml20053.2
  urn: urn:oiml:doc:ciml:resolution:2005-3.2
  agenda_item: '3.2'
  dates:
  - date: '2005-06-18'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 3.2: Financial matters'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee took note of a report given by the BIML Director concerning
        the OIML Pension System and instructed its President and the Director of the
        Bureau to continue to study the possible evolutions of the System, compared
        to other systems existing in similar organizations, and to report back at
        the 41st CIML Meeting in 2006.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee took note of a presentation given by the BIML Director
        concerning the estimation of the assets and liabilities according to the new
        accountancy rules laid down by the new Financial Regulations.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee noted that taking account of the evaluation of the Pension
        Fund, the Reserve Fund would be significantly reduced.
    - type: instructs
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee instructed its President to examine the conditions and
        procedures related to personal loans to BIML Staff Members and to report back
        at the 41st CIML Meeting in 2006.
  - language_code: fra
    title: 'Agenda Item 3.2: Financial matters'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a pris note d'un rapport fourni par le Directeur du BIML
        relatif au Système de Retraite de l'OIML et a chargé son Président et le Directeur
        du Bureau de continuer à étudier les évolutions potentielles du Système, par
        comparaison avec d'autres systèmes existants dans des organisations similaires
        et de présenter ses conclusions à ce sujet lors de la 41ème Réunion du CIML
        en 2006.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a pris note d'un exposé du Directeur du BIML concernant l'estimation
        de l'actif et du passif conformément aux nouvelles règles de comptabilité
        prescrites par le nouveau Règlement Financier.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a pris note qu'en tenant compte de l'évaluation du Fonds
        de Retraite, le Fonds de Réserve serait fortement réduit.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a chargé son Président d'examiner les conditions et procédures
        relatives aux prêts personnels aux Membres du Personnel du BIML et de présenter
        ses conclusions lors de la $ 4 1 ^{ème} $ Réunion du CIML en 2006.
- identifier:
  - prefix: CIML
    number: 2005/3.3
  doi: 10.63493/resolutions/ciml20053.3
  urn: urn:oiml:doc:ciml:resolution:2005-3.3
  agenda_item: '3.3'
  dates:
  - date: '2005-06-18'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 3.3: Financial matters'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee took note of a presentation given by the BIML Director
        concerning the implementation of the new Financial Regulations. It was noted
        that the details of the transition from the previous to the new accountancy
        systems shall be assessed by the external accountant and presented at the
        41st CIML Meeting in 2006.
  - language_code: fra
    title: 'Agenda Item 3.3: Financial matters'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a pris note d'un exposé du Directeur du BIML concernant la
        mise en œuvre du nouveau Règlement Financier. Il a été noté que les détails
        de la transition entre le précédent système de comptabilité et le nouveau
        doivent être évalués par l'expert-comptable extérieur et présentés lors de
        la 41eme Réunion du CIML en 2006.
