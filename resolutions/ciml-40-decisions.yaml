      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a discuté de la Stratégie et du Plan d'Action et a exprimé
        des remarques à ce sujet. Il est demandé aux Membres du CIML d'envoyer au
        Président et au Bureau leurs remarques supplémentaires avant la fin du mois
        de juillet 2005.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: Le Comité a chargé son Président et le Bureau de faire circuler ces
        projets, modifiés selon les remarques exprimées, pour qu'ils soient approuvés
        par correspondance avant la fin de l'année 2005.
