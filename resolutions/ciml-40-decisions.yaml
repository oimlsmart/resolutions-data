        type: effective
      message: The Committee took note of a report presented by Mrs. Gaucher, MAA
        Project Leader at the BIML, showing the progress in the implementation of
        the MAA and the outcome of the first CPR Meeting.
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
      message: 'The Committee asked the Bureau to submit the CPR proposals, amended
        according to the comments made at this CIML Meeting and accompanied by a detailed
        explanatory note, to the CIML for postal approval before the end of 2005.
        The proposals to be voted on are related to the following issues:'
