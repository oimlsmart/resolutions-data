    actions:
    - type: approves
      date_effective:
        date: '2005-06-18'
        type: effective
      message: The Committee approved the Auditor's report for 2004 and requested
        its President and the BIML Director to submit it to the Thirteenth Conference.
  - language_code: fra
    title: 'Agenda Item 3.1: Financial matters'
    actions:
    - type: notes
      date_effective:
        date: '2005-06-18'
        type: effective
