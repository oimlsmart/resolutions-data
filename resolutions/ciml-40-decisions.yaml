      message: 'The Committee took note of a presentation given by the BIML Director
        concerning the implementation of the new Financial Regulations. It was noted
        that the details of the transition from the previous to the new accountancy
        systems shall be assessed by the external accountant and presented at the
        41st CIML Meeting in 2006.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
  - language_code: fra
    title: Informations concernant la mise en œuvre du nouveau Règlement Financier
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note d''un exposé du Directeur du BIML concernant
        la mise en œuvre du nouveau Règlement Financier. Il a été noté que les détails
        de la transition entre le précédent système de comptabilité et le nouveau
        doivent être évalués par l''expert-comptable extérieur et présentés lors de
        la 41eme Réunion du CIML en 2006.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
