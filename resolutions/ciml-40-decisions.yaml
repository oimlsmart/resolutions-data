      date: '2005-06-18'
      type: effective
    message:
    - spelling: eng
      value: The Committee took note of a presentation given by South Africa about
        the organization of the 41st CIML Meeting in Capetown in October 2006 and
        thanked the South African Government and the South African CIML Member for
        their invitation, which was confirmed as accepted by the Committee.
    - spelling: fra
      value: Le Comité a pris note d'un exposé effectué par l'Afrique du Sud concernant
        l'organisation de la 41ème Réunion du CIML au Cap en octobre 2006 et a remercié
        le gouvernement sud-africain et le Membre sud-africain du CIML pour leur invitation,
        dont l'acceptation a été confirmée par le Comité.
