  urn: urn:oiml:doc:ciml:resolution:2003-17.1
  subject: CIML
  title: 39ème Réunion du CIML et 12ème Conférence Internationale de Métrologie Légale
    (Berlin, 2004)
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''une présentation donnée par M. Kochsiek, sur
      l''organisation de la 39ème Réunion du Comité et de la 12ème Conférence de l''OIML
      devant se tenir à Berlin du 25 au 29 octobre 2004, comme approuvé à la 37ème
      Réunion du Comité en 2002. Le Comité a exprimé ses remerciements les plus chaleureux
      à l''Allemagne pour son invitation.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/17.2
  doi: 10.63493/resolutions/ciml200317.2
