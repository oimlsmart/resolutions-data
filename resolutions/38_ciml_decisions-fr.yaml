- identifier: CIML/2003/13
  doi: 10.63493/resolutions/ciml200313
  urn: urn:oiml:doc:ciml:resolution:2003-13
  subject: CIML
  title: Étude sur Le Bénéfice de la Métrologie Légale pour l'Économie et la Société
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''une présentation donnée par M. John Birch sur
      son rapport Le Bénéfice de la Métrologie Légale pour l''Economie et la Société.
      Le Comité a exprimé sa forte appréciation concernant ce Rapport et a chargé
      le BIML de le diffuser en tant que rapport d''expert. Un rapport résumé compilé
      par M. Birch sera également publié dans le Bulletin de l''OIML.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a chargé le Président du CIML et le BIML de considérer toutes
      actions ou études complémentaires semblant appropriées pour accroître la sensibilisation
      à la métrologie et à la métrologie légale.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
