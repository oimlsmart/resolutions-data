  subject: CIML
  title: Élection du Président du CIML
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'A défaut d''un résultat de scrutin concluant et en application de l''Article
      XV de la Convention, le premier VicePrésident du CIML, M. Kochsiek a été chargé
      d''assumer les responsabilités de Président. Le CIML a exprimé sa profonde gratitude
      à M. Faber pour ses réalisations et son leadership durant tout son exercice.

      '
