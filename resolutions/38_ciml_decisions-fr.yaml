  subject: CIML
  title: Projet de document de politique générale sur la coordination avec les Organisations
    Régionales de Mé…
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''un rapport d''avancement donné par le Directeur
      du BIML sur un document formalisant les relations et la coopération avec les
      Organisations Régionales de Métrologie Légale (ORML); ce document est en cours
      d''examen pour commentaires par les ORML. Le Comité a chargé le BIML de poursuivre
      l''élaboration de ce document de façon à établir un cadre officiel pour la coopération
      de l''OIML avec les ORML.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/16
