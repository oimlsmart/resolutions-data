  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''informations données par les représentants
      des Organisations Régionales de Métrologie Légale (ORML) suivantes concernant
      leurs activités: APLMF, COOMET, EMLMF, SADCMEL et WELMEC. D''autre part, le
      représentant du Burkina Faso a donné des informations sur une éventuelle création
      d''ORML dans cette région d''Afrique.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/15.4
  doi: 10.63493/resolutions/ciml200315.4
