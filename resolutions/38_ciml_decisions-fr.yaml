- identifier: CIML/2003/11.2
  doi: 10.63493/resolutions/ciml200311.2
  urn: urn:oiml:doc:ciml:resolution:2003-11.2
  subject: CIML
  title: Nouvelles Recommandations applicables dans le cadre du Système
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a décidé que les Recommandations suivantes deviendraient applicables
      dans le cadre du Système dès leur publication:

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a également décidé que les R 61-1 et R 61-2 révisées continueraient
      d''être applicables dans le cadre du Système dès que la R 61-2 sera publiée
      avec la R 61-1 révisée.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a chargé le Secrétariat du TC 9/SC 2 de rédiger d''urgence
      un Supplément à R 61 sur les exigences pour la transformation des Certificats
      (de façon analogue au Supplément de R 60 édition 2000) (avec le concours du
      BIML) ainsi qu''une proposition pour fixer la date limite de délivrance de Certificats
      basés sur l''édition 1996 de R 61, et d''organiser son approbation simultanée
      par correspondance par le TC 9/SC 2 et le CIML.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
