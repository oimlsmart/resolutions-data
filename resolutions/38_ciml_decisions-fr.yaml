- identifier: CIML/2003/9.1
  doi: 10.63493/resolutions/ciml20039.1
  urn: urn:oiml:doc:ciml:resolution:2003-9.1
  subject: CIML
  title: Programme de travail des TC/SC
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''informations fournies par le Vice Président
      M. Issaev et par le Bureau en ce qui concerne les activités techniques de l''OIML
      et, tout en exprimant sa satisfaction pour la quantité croissante de travail
      accompli durant les 12 derniers mois (par rapport à la période annuelle précédente),
      a demandé aux TC et SC de l''OIML d''accélérer leurs travaux, en particulier
      dans les domaines signalés comme projets prioritaires et ceux de haute priorité,
      en prenant en compte les propositions pour accélérer les travaux techniques
      de l''OIML comme traité au Point 9.3.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a approuvé le projet tel que proposé par le TC 18 sur les
      Instruments pour l''ophtalmologie - Tonomètre à empreinte et à applanation.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/9.2
  doi: 10.63493/resolutions/ciml20039.2
  urn: urn:oiml:doc:ciml:resolution:2003-9.2
  subject: CIML
  title: Examen de la situation de certains TC/SC
  dates:
  - start: '2003-11-05'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Le Comité a pris note d''une proposition soumise par la France pour
      un nouveau travail, en accord avec le Secrétariat du TC 3 et le BIML, et a chargé
      le TC 3/SC 5 de former un Groupe de Travail présidé conjointement par la France

      '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message: 'Le Comité a pris note des informations données par le BIML sur la situation
      généralement non satisfaisante du vote par correspondance des Membres du CIML
      en 2003, et a demandé à ses Membres (en particulier ceux qui sont en retard
      dans les votes) d''être plus réguliers dans l''exercice de leurs obligations,
      contribuant ainsi à ce que l''approbation des projets présentés soit réalisée
      en temps voulu.

      '
    dates:
    - start: '2003-11-05'
      kind: effective
- identifier: CIML/2003/9.3
  doi: 10.63493/resolutions/ciml20039.3
