      - start: '2017-10-10'
        kind: effective
    - type: decides
      message:
        - { content: "Décide que le Système de Certificats de Base OIML et l'Accord d'Acceptation Mutuelle OIML cesseront de fonctionner le 31 décembre 2017 et que l'OIML-CS deviendra opérationnel le 1er janvier 2018,", lang: fr }
      dates:
      - start: '2017-10-10'
        kind: effective
