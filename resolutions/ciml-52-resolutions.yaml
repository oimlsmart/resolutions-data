        kind: effective
    - type: decides
      message:
        - { content: "Décide que les catégories des instruments de mesure couvertes par l'OIML R 46, l'OIML R 49, l'OIML R 51, l'OIML R 117 et l'OIML R 137 passeront du Schéma B au Schéma A le 1er janvier 2019, et", lang: fr }
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: decides
      message:
        - { content: "Décide que les catégories des instruments de mesure couvertes par l'OIML R 21, l'OIML R 50, l'OIML R 61, l'OIML R 75, l'OIML R 85, l'OIML R 99, l'OIML R 106, l'OIML R 107, l'OIML R 129, l'OIML R 134 et l'OIML 139 passeront du Schéma B au Schéma A le 1er janvier 2020.", lang: fr }
      dates:
      - start: '2017-10-10'
        kind: effective
