  urn: urn:oiml:doc:ciml:resolution:2017-17
  dates:
  - date: '2017-10-10'
    type: adoption
  localizations:
  - language_code: eng
    script: Latn
    title: Confirms that the rules set out in OIML B6 shall only apply to the
    subject: CIML
    considerations:
    - type: noting
      message: 'Noting the discussions of the Project Group on the revision of OIML
        B 6:2013 Directives for OIML technical work and the recommendations of the
        convener of the Project Group,

        '
      date_effective:
        date: '2017-10-10'
        type: adoption
    - type: noting
      message: 'Noting the comments made by its Members on the note prepared by the
        convener of the Project Group,

        '
      date_effective:
        date: '2017-10-10'
        type: adoption
    actions:
    - type: confirms
      message: 'Confirms that the rules set out in OIML B6 shall only apply to the
        development, revision or amendment of OIML Basic Publications if the CIML
        so decides for a particular Basic Publication,

        '
      date_effective:
        date: '2017-10-10'
        type: adoption
    - type: requests
      message: 'Requests that any future proposals for the development, revision or
        amendment of OIML Basic Publications should take the form of a project proposal
        submitted to the Committee for approval,

        '
      date_effective:
        date: '2017-10-10'
        type: adoption
    - type: requests
      message: |
        Requests that such proposals set out clearly
        - the proposed convenership,
        - the arrangements for appointing members of a Project Group to supervise the development,
        - the timetable to be followed by the project, which should allow for timely consultation by the project convener with the entire project group on all substantive matters, and should include the various stages of decision-making by the Project Group and by the CIML, and
        - the voting and administrative arrangements, which should follow the provisions of B 6-1 as closely as possible.
      date_effective:
        date: '2017-10-10'
        type: adoption
  - language_code: fra
    script: Latn
    title: Demande que toute future proposition d'élaboration, de révision ou de modification
      des Publications …
    subject: CIML
    considerations:
    - type: noting
      message: 'Prenant note des discussions du Groupe de Projet sur la révision de
        l''OIML B 6: 2013. Directives pour les travaux techniques de l''OIML et les
        recommandations du responsable du Groupe de Projet,

        '
      date_effective:
        date: '2017-10-10'
        type: adoption
    - type: noting
      message: |
        Prenant note des commentaires de ses Membres sur la note préparée par le responsable du Groupe de Projet,
        Confirmme que les règles énoncées dans l'OIML B 6 ne s'appliquent à l'élaboration, la révision ou la modification des Publications de Base de l'OIML que si le CIML en décide ainsi pour une Publication de Base spécifique,
      date_effective:
        date: '2017-10-10'
        type: adoption
    actions:
    - type: requests
      message: 'Demande que toute future proposition d''élaboration, de révision ou
        de modification des Publications de Base de l''OIML prenne la forme d''une
        proposition de projet soumise à l''approbation du Comité,

        '
      date_effective:
        date: '2017-10-10'
        type: adoption
    - type: requests
      message: |
        Demande que de telles propositions établissent clairement
        - Le responsable proposé,
        - les modalités de nomination des membres du Groupe de Projet chargé de superviser l'élaboration,
        - le calendrier de déroulement du projet, qui devrait permettre une consultation en temps voulu par le responsable du projet de l'ensemble du groupe de projet sur toutes les questions de fond, et devrait inclure les différentes étapes de la prise de décision par le Groupe de Projet et par le CIML, et
        - les modalités de vote et d'administration, qui devraient suivre les dispositions du B 6-1 aussi fidèlement que possible.
      date_effective:
        date: '2017-10-10'
        type: adoption
  type: resolution
