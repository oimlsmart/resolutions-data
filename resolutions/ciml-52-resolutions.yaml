      message:
        - { content: "Décide de retirer l'OIML B 3:2011 Système de Certificats OIML dit \"de Base\" pour l'évaluation de type des Instruments de Mesure et l'OIML B 10:2011 (Amd. 2012) Cadre pour un Arrangement d'Acceptation Mutuelle sur les Évaluations de Type OIML au 31 décembre 2017,", lang: fr }
