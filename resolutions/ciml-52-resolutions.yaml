    script: Latn
    title: Notes the report given by the BIML Director, Encourages the BIML to continue
      its
    subject: CIML
    actions:
    - type: remarks
      message: |
        Notes the report given by the BIML Director,
        Encourages the BIML to continue its efforts to recover outstanding arrears of its Member States and Corresponding Members,
      date_effective:
        date: '2017-10-10'
        type: adoption
    - type: requests
      message: |
        Requests those Members with arrears to bring their situation up to date as soon as possible, and
        Reminds Member States of their obligation under Article XXVI of the Convention which states inter alia "Contributions shall be paid at the beginning of the year to the Director of the Bureau."
      date_effective:
        date: '2017-10-10'
        type: adoption
  - language_code: fra
    script: Latn
    title: Prend note du rapport du Directeur du BIML, Encourage le BIML à poursuivre
      ses
    subject: CIML
    actions:
    - type: remarks
      message: |
        Prend note du rapport du Directeur du BIML,
        Encourage le BIML à poursuivre ses efforts pour recouvrer les arriérés de ses États Membres et de ses Membres Correspondants,
      date_effective:
        date: '2017-10-10'
        type: adoption
    - type: requests
      message: |
        Demande aux Membres ayant des arriérés de mettre leur situation à jour dès que possible, et
        Rappelle aux États Membres l'obligation qui leur incombe au titre de l'Article XXVI de la Convention, qui stipule notamment que "les Contributions doivent être versées en début d'année au Directeur du Bureau".
      date_effective:
        date: '2017-10-10'
        type: adoption
  type: resolution
