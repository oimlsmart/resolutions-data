- identifier:
  - prefix: CIML
    number: 1990/2.2
  doi: 10.63493/resolutions/ciml19902.2
  urn: urn:oiml:doc:ciml:resolution:1990-2.2
  dates:
  - date: '1990-10-03'
    type: decided
  localizations:
  - language_code: eng
    title: The situation of some Member States
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Mr KOCHSIEK informed the Committee that on that very day, the 3rd
        October 1990, Germany was being reunified. Every branch of the law, including
        that of metrology, of the Federal Republic of Germany would therefore apply
        thenceforth in the former German Democratic Republic. The PTB was responsible
        for the scientific aspects of metrology and, as concerned legal metrology,
        for pattern approvals, whereas the authorities of the eleven Lander that had
        hitherto constituted the FRG were responsible for verifications. The scientific
        activities of the former ASMW would be taken over by the PTB, while the ASMW''s
        former responsibility for verification would be assumed by the institutions
        of the five new Lander that would be constituted in the territory of the former
        GDR. From that day forward the regulations of the FRG were applicable in the
        former GDR. The PTB would continue to be sited at Brunswick and Berlin; however,
        the ASMW''s centre in Berlin would become PTB''s third site. The consequences
        for OIML would be the following:

        '
      date_effective:
        date: '1990-10-03'
        type: effective
