  urn: urn:oiml:doc:ciml:resolution:1990-4.1
  subject: "(The CIML)"
  title: Replacement of an Assistant Director retiring from the Bureau in May 1991
  dates:
  - start: '1990-10-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mr BIRKELAND reminded the Committee that Mr Petik would retire from
      the Bureau on 31st May 1991 and that ten candidates (*) for the post that he
      would vacate had been nominated by, between them, seven Member States; those
      candidacies had been studied by an ad hoc group formed by the Committee, which
      had met on Wednesday 3rd October after the plenary session; the group had accepted
      the criteria specified by the Bureau in its enquiry: a thorough prior knowledge
      of OIML''s activities and a perfect mastery of the Russian language. While recognising
      the merits of all the candidates, the ad hoc group had decided to draw up a
      short list of three names: Mr Szilvassy, Mr Synac and Mr Vishenkov (in alphabetical
      order of the French names of their countries of origin). By means of a secret
      ballot in which 37 Members of the Committee or their representatives took part
      the Committee elected Mr VISHENKOV as the new Director''s Assistant, by 26 votes
      in the first round. The formal date for the Director''s new assistant to take
      up his post was 1st June 1991, but it could be advanced or delayed by agreement
      between the person concerned and the Director of the Bureau, to suit the convenience
      of either party.

      '
    dates:
    - start: '1990-10-03'
      kind: effective
- identifier: CIML/1990/4.2
