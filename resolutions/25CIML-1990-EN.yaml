- identifier: CIML/1990/6.1
  doi: 10.63493/resolutions/ciml19906.1
  urn: urn:oiml:doc:ciml:resolution:1990-6.1
  subject: "(The CIML)"
  title: Revision of the procedure for the drafting of International Recommendations
    and Documents
  dates:
  - start: '1990-10-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mr BIRKELAND reminded the Committee of the importance of this subject
      in the framework of the OIML Certificate System. However, a revision of the
      working method was necessary in itself, to improve the efficiency of OIML, not
      only for its own benefit but also for that of the numerous international and
      regional organizations that used its work. On the basis of earlier decisions
      of the Conference and of the Committee the Bureau had studied the situation
      in detail, had reported on it to the Presidential Council, had made an analysis
      of the differences that appeared to exist between the new directives for the
      work of ISO and IEC and the existing working method of OIML, and had made proposals
      for new working methods for OIML, including two draft resolutions (see Annex
      2) for the consideration of the Committee.

      '
    dates:
    - start: '1990-10-03'
      kind: effective
- identifier: CIML/1990/6.2
  doi: 10.63493/resolutions/ciml19906.2
  urn: urn:oiml:doc:ciml:resolution:1990-6.2
  subject: "(The CIML)"
  title: Standard contents of Recommendations
  dates:
  - start: '1990-10-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mr BIRKELAND reminded the Committee that the Bureau had distributed
      a draft on this subject to all Members in August 1990 with a request that comments
      be sent to the Bureau before 1990.12.31. He did not propose therefore that the
      draft be discussed at the meeting. The comments would be compiled by the Bureau
      and submitted to the Presidential Council at its next meeting. A final draft
      could then be sent to all the Members of the Committee for approval by correspondence
      or at the next meeting.

      '
    dates:
    - start: '1990-10-03'
      kind: effective
