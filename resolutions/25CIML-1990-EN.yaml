  - date: '1990-10-03'
    type: decided
  localizations:
  - language_code: eng
    title: Revision of the procedure for the drafting of International Recommendations
      and Documents
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Mr BIRKELAND reminded the Committee of the importance of this subject
        in the framework of the OIML Certificate System. However, a revision of the
        working method was necessary in itself, to improve the efficiency of OIML,
        not only for its own benefit but also for that of the numerous international
        and regional organizations that used its work. On the basis of earlier decisions
        of the Conference and of the Committee the Bureau had studied the situation
        in detail, had reported on it to the Presidential Council, had made an analysis
        of the differences that appeared to exist between the new directives for the
        work of ISO and IEC and the existing working method of OIML, and had made
        proposals for new working methods for OIML, including two draft resolutions
        (see Annex 2) for the consideration of the Committee.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
