  doi: 10.63493/resolutions/ciml199008
  urn: urn:oiml:doc:ciml:resolution:1990-08
  subject: "(The CIML)"
  title: LONG-TERM POLICY OF THE ORGANIZATION
  dates:
  - start: '1990-10-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mr BIRKELAND remarked that there was no paper for that item of the agenda,
      and that the Committee was invited to discuss it orally. Obviously the two subjects,
      certification and the revision of the working method, were part of the Organization''s
      longterm policy and were even its main elements. However, there were other aspects
      of long-term policy that the Committee could discuss, and all present were invited
      to make known their thoughts on the subject.

      '
    dates:
    - start: '1990-10-03'
      kind: effective
- identifier: CIML/1990/9
  doi: 10.63493/resolutions/ciml199009
  urn: urn:oiml:doc:ciml:resolution:1990-09
  subject: "(The CIML)"
  title: DEVELOPING COUNTRIES
  dates:
  - start: '1990-10-03'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The BUREAU read a report on the organization of training courses for
      developing countries. That action had arisen from a proposal from the OIML Development
      Council in 1989 that had been accepted by the Committee and according to which
      the OIML budgetary item for the Development Council in 1990 and 1991 could be
      used to contribute to the expenses of some (probably four or five) trainees
      attending courses to be organized by countries volunteering to do so.

      '
    dates:
    - start: '1990-10-03'
      kind: effective
- identifier: CIML/1990/10
  doi: 10.63493/resolutions/ciml199010
