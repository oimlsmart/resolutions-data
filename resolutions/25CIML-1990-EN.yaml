    title: DATE AND PLACE OF THE NEXT MEETING
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: approves
      message: 'The Committee approved the minutes of the Twenty-fourth CIML meeting
        without modification.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of an address by Dr KHALED Y. AL KHALAF, CIML
        Member for Saudi Arabia, a new OIML Member State. The Committee also took
        note of the fact that there were no new accessions expected at present.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of a report by Prof KOCHSIEK, CIML Member
        for the Federal Republic of Germany, on the reunification of Germany, following
        which there is only one German Member State of OIML.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee also took note of information given orally about the
        situation of some Member States that are late in the payment of their contributions
        to OIML; the Committee considered that there was no need to take measures
        against them at present.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: approves
      message: 'The Committee approved the Auditor''s report for 1989 and instructed
        its President and the Director of the Bureau to submit it to the Ninth Conference.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee examined the financial situation of the Organisation
        for 1990 and took note of information given orally on the forseeable evolution
        of expenses in 1991 and on the sharing of the budget amongst Member States
        following the accession of Saudi Arabia and the reunification of Germany.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee elected as Assistant Director, in place of Mr PETIK:
        Mr VISHENKOV, USSR, from 1st June 1991.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of information given orally on the situation
        of staff members whose contracts end before end 1992.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: approves
      message: 'The Committee approved the document "OIML Certificate System for Measuring
        Instruments" and instructed the Presidential Council and the Bureau to monitor
        the System''s implementation, especially with a view to modifying or improving
        it according to need; the Committee requested its Members to continue to send
        to the Bureau their proposals for such improvements; any such amendements
        shall be submitted to the Committee at future meetings. The Committee also
        took note of a proposal aimed at facilitating the System''s operation through
        intercomparisons, and instructed the Presidential Council to study that proposal
        in more detail.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: instructs
      message: 'The Committee instructed the Bureau to produce a brochure on the System,
        to prepare a final draft of the model certificate and to make proposals to
        the next Conference concerning the certificate registration fee. Initially
        the fee shall be 200 FRF.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of a report on International Recommendations
        which may be used within the OIML Certificate System and considered it possible
        for the Issuing Authorities of the Member States to issue voluntarily and
        from now on certificates with reference to the following International Recommendations:

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: requests
      message: 'The Committee requested the Bureau and the Secretariats to proceed
        with the revision of the existing Recommendations to make them applicable
        to the System and to make sure that all new Recommendations now being drafted
        will be immediately applicable to the System. The Committee also instructed
        the Bureau to advise Secretariats on the format of test reports and on how
        the Committee might approve Recommendations thus revised.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of information on actions performed by certain
        CIML Members to make the OIML Certificate System better known and to promote
        it at national level; the Committee requested them to provide the Bureau with
        all this information for distribution to all CIML Members so that similar
        actions may be performed in all Member States.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee also took note of information on the possibility of
        developing a computerized data base on OIML certificates; it judged that it
        would be premature to take any decision about this and requested its Members
        and the Bureau to reflect on the usefulness of such a database.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee examined the following documents:

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee judged unacceptable the point of the draft resolution
        6.1.a by which Pilot Secretariats would be abolished and the CIML would be
        given the role of a technical committee; the Committee also criticised certain
        provisions of the draft.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee highly appreciated the USA proposal on the general principles
        to be observed when revising the working method.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of the enquiry now being conducted on the
        draft of a Guide entitled "Drafting and presentation of OIML International
        Recommendations".

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of the document "State of progress of the
        work of OIML Secretariats".

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee considered the situations of some Secretariats and took
        the following decisions:

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: approves
      message: 'The Committee approved for immediate publication, and then presentation
        to the Ninth Conference for formal sanction, the following International Recommendations:

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee accepted an accelerated process for approving revised
        Recommendations R 74 and R 76, which are expected to be submitted to the Twenty-sixth
        meeting in 1991.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of proposals made orally in relation to the
        long-term policy of the Organisation and instructed the Presidential Council
        to reflect on these matters and to report to the Committee in due time.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee invited its Members to contribute to the discussions
        about the longterm policy of OIML and to send their observations to the Bureau
        before the end of 1990 for transmission to the Presidential Council.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of a report on the organisation of training
        courses for agents of metrology services from developing countries in 1991.
        The Committee also took note of information given by the Federal Republic
        of Germany, Cuba and Czechoslovakia on training courses or seminars these
        countries organize for developing countries, at home or even sometimes in
        other countries. The Committee then took note of a request by the Delegate
        from Cameroon for training courses to be organized in the developing countries
        themselves, so that more persons may be trained simultaneously, at lower cost
        and in the actual conditions of their future work.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of a report on OIML technical seminars and
        requested its Members to make proposals to BIML for the organisation of a
        new seminar in 1992.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: notes
      message: 'The Committee took note of the report of the activities of BIML for
        the period October 1989 - September 1990.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
    - type: decides
      message: 'The Committee decided that its Twenty-sixth meeting will take place
        in Paris from 7th to 9th October 1991.

        '
      date_effective:
        date: '1990-10-03'
        type: effective
