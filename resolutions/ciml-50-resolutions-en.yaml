  - identifier: CIML/2015/18
    doi: "10.63493/resolutions/ciml201518"
    urn: "urn:oiml:doc:ciml:resolution:2015-18"
    subject: CIML
    title: Decides to establish a certification system project group (CSPG) to prepare the relevant documents
    dates:
    - start: '2015-10-20'
      kind: decision
    considerations:
    - type: recalling
      message: |
        Recalling its resolution no. 2015/17,
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: considering
      message: |
        Considering the proposal of the ad-hoc working group on the review of the MAA,
      dates:
