    title: 3 Budget pour l'année 2000
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Faber rappelle a ses collègues que cette question a été soigneusement
        examinée par le Conseil de la Présidence et qu''un document a été préparé
        par le Bureau selon les conclusions de l''examen par le Conseil. Ces conclusions
        sont qu''il convient de ne pas modifier le budget 2000 tel que décidé par
        la Conférence, c''est-à-dire, qu''il convient de maintenir l''augmentation
        de presque 3 % du budget et (puisqu''il n''y a pas de nouvel État Membre)
        des contributions.

        '
      date_effective:
        date: '1999-10-06'
        type: effective
