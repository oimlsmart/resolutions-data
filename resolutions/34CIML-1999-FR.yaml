  localizations:
  - language_code: fra
    title: '2 Organisations de normalisation (en particulier: ISO, CEI, CEE/NU)'
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Concernant l''ISO, M. Athané indique que cette coopération est globalement
        positive; cependant, certains aspects spécifiques doivent être examinés attentivement
        afin d''éviter tout risque de conflit. Les relations entre le Secrétariat
        Général de l''ISO et le BIML sont excellentes. Le développement d''une publication
        ISO/OIML commune sur les Instruments de mesure des gaz d''échappement des
        véhicules basée sur OIML R 99 progresse de façon acceptable. De même, un accord
        a été conclu concernant l''élaboration par l''OIML de documents de mise en
        application de ISO 17025 et du Guide ISO/CEI 65 à la métrologie légale. Il
        y a cependant un risque de conflit car le TC 28 de l''ISO a exprimé son inquiétude
        au sujet du manque de participation et d''information des TC de l''OIML concernés.
        . Athané indique qu''il essaiera de clarifier la situation dès que possible.

        '
      date_effective:
        date: '1999-10-06'
        type: effective
