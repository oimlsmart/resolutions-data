  localizations:
  - language_code: fra
    title: 1 Organisation Mondiale du Commerce (OMC)
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Faber présente Mme Liu, Economic Officer à l''Organisation Mondiale
        du Commerce et responsable du secrétariat du Comité sur les barrières techniques
        au commerce (TBT) de l''OMC. Il remarque que ce n''est pas la première fois
        que Mme Liu est en rapport avec la métrologie et l''OIML car elle a déjà participé
        au Séminaire International sur le rôle social et économique de la métrologie,
        tenu à Braunschweig en juin 1998. Il mentionne aussi que dans le plan d''actions
        adopté le jour précédent par le Comité, la coopération avec l''OMC a été explicitement
        mentionnée comme étant de première importance pour l''OIML et comme la plupart
        des transactions commerciales sont liées aux mesurages, il est nécessaire
        pour l''OIML d''identifier ces domaines dans lesquels son activité peut aider
        l''OMC à atteindre ses objectifs.

        '
      date_effective:
        date: '1999-10-06'
        type: effective
