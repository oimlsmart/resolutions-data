    title: 3 Examen d'une proposition préliminaire pour le budget 2001-2004 en tenant
      compte des besoins en per…
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Faber rappelle aux participants qu''un rapport écrit a été préparé
        par le Bureau et envoyé aux Membres du CIML quelques mois avant cette réunion,
        proposant de maintenir le personnel du BIML à son niveau actuel et d''essayer
        de parvenir à une croissance zéro des contributions des États Membres depuis
        leur niveau 2000 jusqu''à la fin de la période financière 2001-2004. Il demande
        aux Membres du CIML de faire connaître leurs vues d''ici la fin 1999 afin
        de lui permettre (aidé par le Conseil de la Présidence et par le Bureau) de
        préparer un projet final de budget qui sera envoyé aux États Membres de l''OIML
        au plus tard en mars 2000.

        '
      date_effective:
        date: '1999-10-06'
        type: effective
