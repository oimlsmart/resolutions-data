    title: 2 Situation de certains Membres
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Athané indique que deux ou trois État Membres de l''OIML étaient
        en retard dans le paiement de leur contribution à l''OIML et étaient susceptibles
        d''être radiés automatiquement en application de la Convention de l''OIML.
        Cependant, des contacts pris avec les organismes de métrologie légale de ces
        pays ont laissé entrevoir la possibilité pour eux de régler au moins une partie
        de leurs arriérés. Par conséquent, aucune action ne sera engagée pour le moment
        mais des décisions devront être prises à l''occasion de la prochaine Conférence.

        '
      date_effective:
        date: '1999-10-06'
        type: effective
