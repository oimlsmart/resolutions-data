    title: 2 Examen de la situation financière pour 1999
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Athané rappelle aux participants que, comme d''habitude, un document
        présentant les dépenses et recettes prévues pour 1999 ainsi que les décisions
        correspondantes prises par la Conférence en 1996 a été envoyé à tous les Membres
