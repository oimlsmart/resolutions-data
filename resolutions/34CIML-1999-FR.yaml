    title: 2 Ordre du jour proposé
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Athané rappelle aux participants que certaines propositions ont
        été préparées par le Bureau, y compris les "classiques" points soumis à l''examen
        de chaque Conférence. En outre, le Bureau a suggéré qu''une table ronde soit
        organisée sur une demi-journée pour discuter d''un sujet spécifique présentant
        un intérêt significatif pour l''OIML. Il suggère que le Comité prenne une
        décision préliminaire chargeant le Conseil de la Présidence de choisir le
        thème parmi les propositions qui auront été présentées par les Membres du
        CIML avant la fin de 1999.

        '
      date_effective:
        date: '1999-10-06'
        type: effective
