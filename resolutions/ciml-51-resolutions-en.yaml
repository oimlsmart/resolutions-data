  - start: '2016-10-17'
    kind: decision
  considerations: []
  actions:
  - type: instructs
    message: 'Instructs the secretariats of Technical Committees and Subcommittees
      and conveners of Project Groups, when OIML Recommendations for relevant categories
      of measuring instruments are being developed or revised, to ensure that a requirement
      should be included, if necessary, stating that the instruments shall not exploit
      the maximum permissible errors or systematically favor any party, and

      '
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: instructs
    message: 'Instructs the Bureau to monitor the implementation of this resolution.

      '
    dates:
    - start: '2016-10-17'
      kind: effective
