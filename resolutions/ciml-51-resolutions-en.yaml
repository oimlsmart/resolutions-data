  dates:
  - start: '2016-10-17'
    kind: decision
  considerations:
  - type: recalling
    message: 'Recalling its Resolution no. 2016/16,

      '
    dates:
    - start: '2016-10-17'
      kind: effective
  actions:
  - type: thanks
    message: |
      Thanks the chair and members of the CSPG for their work,
      Disbands the CSPG,
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: decides
    message: 'Decides to establish a provisional Management Committee (prMC) with
      immediate effect,

      '
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: requests
    message: 'Requests its first Vice-President to chair the prMC,

      '
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: requests
    message: 'Requests interested CIML Members, representatives from OIML Corresponding
      Members and representatives from Liaison Organizations to participate in the
      prMC, or to designate expert representative(s),

      '
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: instructs
    message: 'Instructs the BIML to provide secretarial support to the prMC,

      '
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: confirms
    message: 'Confirmss that the prMC has the authority to act as the Management Committee
      for the purposes of approving OIML-CS Operational Documents, Procedural Documents,
      Guidance Documents, Template and Forms,

      '
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: requests
    message: 'Requests the prMC to identify potential improvements and amendment to
      OIML B xx Framework for the OIML Certification System (OIML-CS) for consideration
      at the 52nd CIML Meeting in 2017,

      '
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: instructs
    message: 'Instructs the prMC to take appropriate actions so that the OIML-CS may
      become effective 1 January 2018,

      '
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: requests
    message: 'Requests the prMC to provide a report on its activities at the 52nd
      CIML Meeting in 2017, with a view to the OIML-CS becoming effective 1 January
      2018.

      '
    dates:
    - start: '2016-10-17'
      kind: effective
