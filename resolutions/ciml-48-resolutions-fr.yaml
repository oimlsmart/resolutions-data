  - identifier: CIML/2013/15
    doi: "10.63493/resolutions/ciml201315"
    urn: "urn:oiml:doc:ciml:resolution:2013-15"
    subject: CIML
    title: Agenda item 9.5
    dates:
    - start: '2013-10-08'
      kind: decision
    agenda_item: '9.5'
    considerations:
    - type: noting
      message: |
        Prenant note du rapport oral de son premier Vice-Président concernant les conclusions du séminaire consacré à l'examen du fonctionnement de l'Arrangement d'Acceptation Mutuelle (MAA) de l'OIML ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considérant le niveau élevé de confiance qui semble exister dans les domaines où des Déclarations de Confiance mutuelle (DoMC) sont en place ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considérant la conclusion du séminaire consacré à l'examen du fonctionnement du MAA qui s'est tenu le 7 octobre 2013 dans laquelle est énoncée la nécessité d'une sensibilisation accrue sur le système MAA auprès de ceux qui, actuellement, ne l'utilisent pas, en particulier les Participants Utilisateurs potentiels ;
        Encourage vivement ses Membres, les participants au MAA et le BIML à promouvoir activement le MAA auprès des autorités de métrologie légale et des fabricants d'instruments de mesurage dans le monde entier ;
        Encourage ses Membres à attirer l'attention des négociateurs commerciaux au sein de leurs administrations sur les perspectives qu'offrent les Recommandations OIML et les structures MAA de réduire les obstacles au commerce et la possibilité qu'elles procurent de favoriser les négociations commerciales aussi bilatérales que multilatérales ;
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: charges
      message: |
        Charge le BIML en sa qualité de secrétariat des Comités sur la revue de participation (CPR) du MAA de mettre en place un groupe de travail ad hoc composé de membres du CIML et/ou de CPR intéressés et de représentants d'associations de fabricants et ayant pour tâche de réfléchir sur la manière d'accroître cette sensibilisation et de fournir un service de secrétariat à ce groupe de travail ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: |
        Demande à son premier Vice-Président d'assurer la présidence de ce groupe de travail ad hoc et de rendre compte de ses activités lors de la 49ème Réunion du CIML.
      dates:
      - start: '2013-10-08'
        kind: effective
  - identifier: CIML/2013/16
    doi: "10.63493/resolutions/ciml201316"
    urn: "urn:oiml:doc:ciml:resolution:2013-16"
    subject: CIML
    title: Agenda item 9.5
    dates:
    - start: '2013-10-08'
      kind: decision
    agenda_item: '9.5'
    considerations:
    - type: recalling
      message: |
        Rappelant sa Résolution n° 2013/15 ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considérant que les Comités sur la revue de participation (CPR) du MAA fixent eux-mêmes leurs règles et procédures dans le cadre défini dans la Publication OIML B 10 Cadre pour un Arrangement d'Acceptation Mutuelle sur les Évaluations de Type de l'OIML et que le TC 3/SC 5 est responsable de cette Publication de Base ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considérant la conclusion du séminaire sur le MAA dans laquelle est énoncée la nécessité d'un examen de la structure et du fonctionnement des CPR ;
        Invite instamment le groupe ad hoc créé en application de sa Résolution n° 2013/15 à examiner la structure des CPR, les règles et les procédures qui régissent le fonctionnement du MAA et le rôle des Participants Utilisateurs, dans le but d'améliorer l'efficacité de fonctionnement du MAA et, si nécessaire, de modifier en conséquence leurs documents internes (MAA) documents et de soumettre des suggestions au TC 3/SC 5 en vue d'apporter des modifications pertinentes à la Publication OIML B 10.
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: notes
      message: |
        [Point 9.5 de l'ordre du jour]
      dates:
      - start: '2013-10-08'
        kind: effective
  - identifier: CIML/2013/17
    doi: "10.63493/resolutions/ciml201317"
    urn: "urn:oiml:doc:ciml:resolution:2013-17"
    subject: CIML
    title: Agenda item 9.5
    dates:
    - start: '2013-10-08'
      kind: decision
    agenda_item: '9.5'
    considerations:
    - type: recalling
      message: |
        Rappelant la décision qu'il a prise concernant l'application du MAA lors de sa 39ème Réunion (2004) au point 6.3 de l'ordre du jour ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: |
        Rappelant la Résolution MAA 2006-2 adoptée lors de sa $41^{\mathrm{eme}}$ Réunion (2006) concernant la fin, fixée au 31 décembre 2008, de la période de transition durant laquelle la délivrance de certificats MAA et de certificats dits « de Base » est encore autorisée ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: |
        Rappelant la Résolution n° 20 de sa $ 43^{\mathrm{eme}} $ Réunion (2008), prolongeant la période de transition jusqu'à ce que le Comité décide expressément (indépendamment pour chaque catégorie d'instruments) d'y mettre fin, le Système de Certificats dits « de Base » et le MAA étant de fait conservés en parallèle ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: |
        Rappelant sa Résolution n° 2013/15 ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considérant que, depuis maintenant près de neuf ans, existent de facto deux systèmes OIML d'évaluation de la conformité pour des évaluations de type OIML, en l'occurrence le Système de Certificats dits « de Base » et le MAA, alors que le MAA était destiné à remplacer le Système de Certificats dits « de Base »;
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide que des dispositions doivent être prises pour que n'existe plus à l'avenir qu'un seul et unique système de certification pour les évaluations de type de l'OIML reposant sur les principes du MAA et pour que soient, dans un premier temps, explorées les différentes options pouvant exister concernant la manière d'organiser ce système unique, la façon dont la transition se déroulerait et le calendrier correspondant, en tenant compte de l'expérience de systèmes de certification similaires et bien établis ;
        Invite instamment le groupe ad hoc créé en application de sa Résolution n° 2013/15 à explorer ces options et à formuler des recommandations pertinentes.
      dates:
      - start: '2013-10-08'
        kind: effective
