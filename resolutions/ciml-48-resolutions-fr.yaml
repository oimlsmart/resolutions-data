  - identifier: CIML/2013/9
    doi: "10.63493/resolutions/ciml201309"
    urn: "urn:oiml:doc:ciml:resolution:2013-09"
    subject: CIML
    title: "Accueille favorablement la proposition du Membre du CIML pour la Chine de rétabir un"
    dates:
    - start: '2013-10-08'
      kind: decision
    considerations:
    - type: noting
      message: |
        Prenant note du rapport du BIML sur ses activités concernant des questions liées aux pays en développement ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: |
        Rappelant la Résolution n° 7 de sa 47ème réunion (2012) ;
        Reconnaissant l'importance de coordonnner les divers projets et initiatives appuyés par l'OIML, les États Membres et les Membres Correspondants à titre individuel et d'autres organismes intéressés par la promotion du développement économique de pays et d'économies possédant des systèmes de métrologie récemment créés ;
        Soulignant la nécessité de répondre aux besoins de pays et d'économies possédant des systèmes de métrologie récemment créés en matière de conception des projets et initiatives appuyés par l'OIML ;
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: welcomes
      message: |
        Accueille favorablement la proposition du Membre du CIML pour la Chine de rétabir un mécanisme de pilotage destiné à donner à l'OIML des orientations sur ses activités dans ce domaine ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: decides
      message: |
        Décide de mettre en place, pour le moment, un groupe consultatif ayant pour tâche de mener une vaste consultation, de recueillir des suggestions supplémentaires et de développer des liens avec d'autres organismes ayant une contribution à apporter ;
        Invite les Membres qui souhaitent participer au groupe consultatif proposé de prendre contact avec le BIML pour lui faire part de leur intérêt à y être associé ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: |
        Demande que, à l'occasion de la Table ronde qu'elles tiendront le 11 octobre 2013, les Organisations Régionales de Métrologie Légale (RLMO) réfléchissent sur la manière de coordonner les initiatives existantes avec les travaux de ce groupe consultatif ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: charges
      message: |
        Charge le BIML de fournir, avec le concours du personnel affecté par d'autres Membres, le service de secrétariat nécessaire au groupe consultatif proposé ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: |
        Demande au Membre du CIML pour la Chine de rendre compte des activités du groupe consultatif lors de la 49ème Réunion du CIML et, le cas échéant, de proposer un mécanisme permanent de coordination des activités dans ce domaine, à la lumière de l'expérience antérieure acquise dans la mise en œuvre de cette coordination.
      dates:
      - start: '2013-10-08'
        kind: effective
