    urn: "urn:oiml:doc:conf:resolution:12.2.1"
    subject: CIML
    title: Situation of certain Members
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee noted that Zambia had been struck off the list of Member States, following the decisions made at the 38th CIML Meeting.
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: |
        The Committee noted that a number of countries were in the process of, or were envisaging joining the Organization as Member States or as Corresponding Members.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/3
