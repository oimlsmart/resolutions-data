      message: |
        The Committee wished it to be noted that substantial interpretations of Recommendations and Documents are the responsibility of OIML Technical Committees and Subcommittees.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/7
    doi: "10.63493/resolutions/conf200407"
    urn: "urn:oiml:doc:conf:resolution:12.07"
    subject: CIML
    title: Developing Countries
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee took note of a report given by Dr Seiler concerning the Forum Metrology-Trade Facilitator held on Monday 25 October and instructed the Bureau to organize the following-up of this Forum.
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: |
        The Committee took note of a report given by Mr. Magaña on the activities and future of the OIML Development Council and expressed its utmost appreciation for the contributions of its Chairperson, Mrs. Annabi.
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: |
        The Committee noted that OIML work on Developing Country matters could be more efficiently managed by the Permanent Working Group on Developing Countries as established by the 38th CIML Meeting; the PWGDC should replace the Development Council.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/8
    doi: "10.63493/resolutions/conf200408"
    urn: "urn:oiml:doc:conf:resolution:12.08"
    subject: CIML
    title: Coordination with the RLMOs
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: instructs
      message: |
        The Committee instructed its President and the Director of the Bureau to continue to liaise closely with RLMOs.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/9
    doi: "10.63493/resolutions/conf200409"
    urn: "urn:oiml:doc:conf:resolution:12.09"
    subject: CIML
    title: Twelfth International Conference of Legal Metrology
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: endorses
      message: |
        The Committee endorsed the draft agenda and program for the Conference. It noted that Dr. Rohling would act as Conference Chairman and approved the proposal from the CIML Acting President to nominate Mrs. Annabi and Dr. Zhagora as Conference Vice-Presidents.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/6.3
    doi: "10.63493/resolutions/conf20046.3"
    urn: "urn:oiml:doc:conf:resolution:12.6.3"
    subject: CIML
    title: Application du MAA
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note d'un rapport sur l'Atelier tenu le dimanche 24 octobre, et a approuvé les décisions proposées annexées aux présentes décisions.
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: |
        Le Comité a chargé le TC 3/SC 5 et le Bureau de commencer une révision du B 3 et du B 10 après avoir acquis une certaine expérience sur le MAA.
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: |
        Le Comité a pris note d'un projet de programme pour l'application du MAA.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/6.4
    doi: "10.63493/resolutions/conf20046.4"
    urn: "urn:oiml:doc:conf:resolution:12.6.4"
    subject: CIML
    title: "Autres décisions liées au Système de Certificats OIML"
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a décidé qu'à partir du 1<sup>er</sup> janvier 2005, les Autorités de délivrance de l'OIML devaient établir les Certificats OIML dans un format électronique spécifié par le BIML, de façon que ces Certificats puissent être diffusés sur le site Internet de l'OIML.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/6.5
    doi: "10.63493/resolutions/conf20046.5"
    urn: "urn:oiml:doc:conf:resolution:12.6.5"
    subject: CIML
    title: Divers
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a souhaité qu'il soit précisé que les interprétations substantielles des Recommandations et Documents relevaient de la responsabilité des Comités Techniques et Sous-comités de l'OIML.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/7
    doi: "10.63493/resolutions/conf200407"
    urn: "urn:oiml:doc:conf:resolution:12.07"
    subject: CIML
    title: "Pays en Développement"
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note d'un rapport présenté par le Dr Seiler à propos du Forum Métrologie - Facilitateur de Commerce tenu lundi 25 octobre et a chargé le Bureau d'organiser les suites de ce Forum.
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: |
        Le Comité a pris note d'un rapport présenté par M. Magaña sur les activités du Conseil de Développement de l'OIML et a exprimé sa plus grande satisfaction pour les contributions de sa Présidente, Mme Annabi.
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: |
        Le Comité a considéré que le travail de l'OIML sur les questions relatives aux Pays en Développement pouvait être géré plus efficacement par le Groupe de Travail Permanent sur les Pays en Développement (PWGDC) créé par la 38ème Réunion du CIML; le PWGDC devrait remplacer le Conseil de Développement.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/8
    doi: "10.63493/resolutions/conf200408"
    urn: "urn:oiml:doc:conf:resolution:12.08"
    subject: CIML
    title: "Coordination avec les Organisations Régionales de Métrologie Légale"
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a chargé son Président et le Directeur du Bureau de continuer à travailler en liaison étroite avec les Organisations Régionales de Métrologie Légale.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/9
    doi: "10.63493/resolutions/conf200409"
    urn: "urn:oiml:doc:conf:resolution:12.09"
    subject: CIML
    title: "Douzième Conférence Internationale de Métrologie Légale"
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a approuvé les projets d'ordre du jour et de programme de la Conférence. Il a pris note que le Dr Röhling serait proposé comme Président de la Conférence et a approuvé la proposition du Président Intérimaire du CIML de désigner Mme Annabi et Dr Zhagora comme Vice-Présidents pour la séance de la Conférence.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/10
    doi: "10.63493/resolutions/conf200410"
    urn: "urn:oiml:doc:conf:resolution:12.10"
    subject: CIML
    title: CIML Presidency
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee elected Mr. Alan E. Johnston (CIML Member for Canada) as its President for the next six years.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/11
    doi: "10.63493/resolutions/conf200411"
    urn: "urn:oiml:doc:conf:resolution:12.11"
    subject: CIML
    title: Twelfth International Conference of Legal Metrology
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee took note of the decisions made by the Twelfth Conference and requested its Acting President, the Presidium and the Presidential Council to monitor their implementation and to report back at the next CIML Meeting.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/12
    doi: "10.63493/resolutions/conf200412"
    urn: "urn:oiml:doc:conf:resolution:12.12"
    subject: CIML
    title: Future meetings
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions: []
  - identifier: Conference/2004/12.1
    doi: "10.63493/resolutions/conf200412.1"
    urn: "urn:oiml:doc:conf:resolution:12.12.1"
    subject: CIML
    title: "40th CIML Meeting (2005)"
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: thanks
      message: |
        The Committee thanked the French Government for its invitation to hold its 40th Meeting in Lyon, France, from 17 to 20 June 2005, in conjunction with the International Metrology Congress. The Committee noted that a gala reception would be organized on 20 June 2005 to celebrate the 50th Anniversary of the OIML.
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: |
        The Committee also noted that legal metrology sessions would be organized by the Bureau during the International Metrology Congress and that the Bureau would pay the registration fee for one participant from each OIML Member State and Corresponding Member to attend this Congress.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/12.2
    doi: "10.63493/resolutions/conf200412.2"
    urn: "urn:oiml:doc:conf:resolution:12.12.2"
    subject: CIML
    title: "41st CIML Meeting (2006)"
    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee accepted the invitation of South Africa for the 41st CIML Meeting and expressed its thanks to Mr. Carstens for this invitation.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/13
