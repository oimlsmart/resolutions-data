    dates:
    - start: '2004-10-26'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        La Conférence a constaté que le nombre de Membres de l'OIML avait significativement augmenté depuis la Onzième Conférence, malgré le fait que plusieurs Membres Correspondants avaient été radiés pour non paiement de leur contribution pendant plus de trois ans. La Conférence a pris note du fait que certains Membres Correspondants envisageaient d'adhérer en tant qu'États Membres et que plusieurs pays/economies comptaient adhérer en tant que Membres Correspondants.
      dates:
      - start: '2004-10-26'
        kind: effective
