      message: |
        The Committee endorsed the draft agenda and program for the Conference. It noted that Dr. Rohling would act as Conference Chairman and approved the proposal from the CIML Acting President to nominate Mrs. Annabi and Dr. Zhagora as Conference Vice-Presidents.
      dates:
