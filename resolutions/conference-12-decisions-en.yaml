      - start: '2004-10-26'
        kind: effective
    - type: instructs
      message: |
        The Committee instructed TC 3/SC 5 and the Bureau to start a revision of B 3 and B 10 after some experience of the MAA had been gained.
      dates:
      - start: '2004-10-26'
        kind: effective
    - type: notes
      message: |
        The Committee took note of the draft schedule for the implementation of the MAA.
      dates:
      - start: '2004-10-26'
        kind: effective
  - identifier: Conference/2004/6.4
    doi: "10.63493/resolutions/conf20046.4"
    urn: "urn:oiml:doc:conf:resolution:12.6.4"
