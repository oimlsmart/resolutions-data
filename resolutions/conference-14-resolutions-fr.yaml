  doi: 10.63493/resolutions/conf201201
  urn: urn:oiml:doc:conf:resolution:14.01
  subject: Conférence OIML
  title: Agenda item 2.2
  dates:
  - start: '2012-10-03'
    kind: decision
  agenda_item: '2.2'
  considerations:
  - type: having_regard_to
    message: 'Vu I''Article XI de la Convention de I''OIML,

      '
    dates:
    - start: '2012-10-03'
      kind: effective
  - type: noting
    message: 'Prenant note de la Résolution n° 1 de la $ 4 4^{\mathrm{e m e}} $ Réunion
      du CIML et de la Résolution n° 7 de la $ 4 4^{\mathrm{e m e}} $ Réunion du CIML,

      '
    dates:
    - start: '2012-10-03'
      kind: effective
  - type: considering
    message: 'Considérant que le français est la langue officielle de l''Organisation
      et que, en pratique, l''anglais est la langue de travail principale de l''Organisation,

      '
    dates:
    - start: '2012-10-03'
      kind: effective
  actions:
  - type: decides
    message: |
      Décide que :
      (a) Les invitations, ordres du jour, documents de travail, comptes-rendus et résolutions des Conférences, les résolutions du Comité, les circulaires aux Membres du Comité, les rapports du Président du CIML et du Directeur du BIML au Comité, les Recommandations, Documents et Publications de Base de l'OIML, ainsi que les budgets et rapports financiers de l'OIML doivent être rendus disponibles en français et en anglais ;
      (b) Le site web de l'OIML doit être rendu disponible en version anglaise et en version française ;
      (c) Le Bulletin de l'OIML doit être publié en anglais avec la parution occasionnelle d'articles en français lorsque c'est adapté ;
      (d) Les autres publications et communications doivent être en anglais ;
      (e) Le Bureau peut rendre disponible des traductions de publications vers d'autres langues qui ont été soumises par les États Membres s'il est clairement indiqué que l'OIML n'est pas responsable de la traduction ;
      (f) Les Conférences et Réunions du Comité doivent recevoir une interprétation simultanée du français vers l'anglais et de l'anglais vers le français ;
      (g) À l'occasion, les Conférences et Réunions du Comité peuvent recevoir une interprétation de et vers d'autres langues, à condition que cela ne soit pas financé par le budget ordinaire de l'Organisation ;
      (h) Toutes les autres réunions doivent être menées en anglais sans que l'Organisation ne fournisse d'interprétation.
    dates:
    - start: '2012-10-03'
      kind: effective
