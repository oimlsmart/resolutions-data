- identifier: Conference/2012/6
  doi: 10.63493/resolutions/conf201206
  urn: urn:oiml:doc:conf:resolution:14.06
  subject: Conférence OIML
  title: 'Décide que '
  dates:
  - start: '2012-10-03'
    kind: decision
  considerations:
  - type: having_regard_to
    message: 'Vu l''Article VIII, premier et cinquième paragraphes, de la Convention,

      '
    dates:
    - start: '2012-10-03'
      kind: effective
  - type: noting
    message: 'Prenant note des décisions prises par le Comité depuis la $ 1 3 ^{e
      m e} $ Conférence concernant I''approbation et le retrait de Recommandations
      et Documents de I''OIML,

      '
    dates:
    - start: '2012-10-03'
      kind: effective
  actions:
  - type: decides
    message: |
      Décide que :
      (a) Les Recommandations OIML suivantes sont à présent sanctionnées. Il est rappelé aux États Membres leur obligation d'appliquer ces Recommandations autant que possible :
      - R 35-2:2011 Mesures matérialisées de longueur pour usages généraux. Partie 2 : Méthodes d'essai
      - R 35-3:2011 Mesures matérialisées de longueur pour usages généraux. Partie 3 : Format du rapport d'essais
      - R 46-1 et R 46-2:2012 Compteurs d'énergie électrique active
      - R 80-1:2009 Camions et wagons citernes avec mesurage de niveau. Partie 1 : Exigences métrologiques et techniques
      - R 106-1:2011 Ponts bascules ferroviaires à fonctionnement automatique.
      Partie 1 : Exigences métrologiques et techniques - Essais
      - R 106-2:2012 Ponts bascules ferroviaires à fonctionnement automatique.
      Partie 2 : Format du rapport d'essai
      - R 120:2010 Mesures de capacité étalons pour l'essai des ensembles de mesurage de liquides autres que l'eau
      - R 126:2012 Éthylomètres
      - R 134-2:2009 Instruments à fonctionnement automatique pour le pesage des véhicules routiers en mouvement et le mesurage des charges à l'essieu. Partie 2 : Format du rapport d'essai
      - R 137-1&2:2012 Compteurs de gaz. Partie 1 : Exigences métrologiques et techniques et Partie 2 Contrôles métrologiques et essais de performance
      - Am R 138:2009 Amendement à la R 138:2007 Récipients pour transactions commerciales
      - R 143:2009 Instruments pour le mesurage continu de $ \mathrm{S O_{2}} $ dans les émissions de sources fixes
      (b) Les Documents suivants sont à présent sanctionnés :
      - D 1:2012 Considérations pour une loi sur la métrologie
      - D 16:2011 Principes d'assurance du contrôle métrologique
      (c) Le retrait des publications OIML suivantes est à présent sanctionné :
      - R 70 Détermination des erreurs de base et d'hystérésis des analyseurs de gaz
      - R 73 Prescriptions pour les gaz purs CO, $ \mathrm{C O_{2}} $ , $ \mathrm{C H_{4}} $ , $ \mathrm{H_{2}} $ , $ \mathrm{O_{2}} $ , $ \mathrm{N_{2}} $ et Ar destinés à la préparation des mélanges de gaz de référence
      - D 7 Évaluation des étalons de débit et des dispositifs utilisés pour l'essai des compteurs d'eau
    dates:
    - start: '2012-10-03'
      kind: effective
