  - type: noting
    message: 'Prenant note de la demande de la Grèce, en date du 29 août 2012, à être
      reclassifiée en raison des difficultés financières actuelles et du volume de
      sa population qui, selon les indications de la Grèce, est devenu inférieure
      à 10 millions en 2011,

      '
    dates:
    - start: '2012-10-03'
      kind: effective
  actions:
  - type: decides
    message: |
      Décide que :
      (a) La reclassification des États Membres est basée et demeure basée sur les chiffres fournis par la Banque Mondiale,
      (b) La demande de la Grèce n'est pas considérée comme étant étayée par suffisamment de données pour permettre l'examen de la situation,
      (c) Le demande d'une remise est par conséquent rejetée.
