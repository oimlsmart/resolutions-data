  - identifier: CIML/2018/15
    language: fr
    title:
      - { content: "Charge le Bureau de poursuivre ses efforts pour promouvoir et participer aux activités de", lang: fr }
    subject:
      - { content: CIML, lang: fr }
    doi: "10.63493/resolutions/ciml201815"
    urn: "urn:oiml:doc:ciml:resolution:2018-15"
    dates:
    - start: '2018-10-09'
      kind: decision
    considerations:
    - type: recalling
      message:
        - { content: "Rappelant sa résolution 2015/10 détaillant l'engagement de l'OIML en faveur d'activités ciblant les Pays et les Economies dotés de Systèmes de Métrologie Emergeants (CEEMS),\nReconnaissant les progrès notables accomplis dans les efforts visant à renforcer les capacités des institutions de métrologie légale et de leur personnel au sein de la communauté CEEMS.", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: noting
      message:
        - { content: "Prenant note des rapports et des avis du Groupe Consultatif sur les questions concernant les Pays et les Economies dotés de Systèmes de Métrologie Emergeants,", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: noting
      message:
        - { content: "Prenant note de la contribution particulière que la recherche peut jouer dans la promotion et l'évaluation de nouvelles approches de la métrologie légale, charge le Directeur d'en tenir compte lors de l'examen de projets pouvant être soutenus par le fonds spécial créé par la 14ème Conférence,", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
    actions:
    - type: charges
      message:
        - { content: "Charge le Bureau de poursuivre ses efforts pour promouvoir et participer aux activités de renforcement des capacités, à la fois par le biais du programme des Centres de Formation OIML et par le biais de cours de formation et d'activités régionales organisées par d'autres organisations,", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Bureau de continuer à travailler avec les organes constitutifs de Réseau International sur les Infrastructures de Qualité (INetQI - anciennement Réseau DCMAS), en particulier le BIPM, afin d'identifier de nouvelles initiatives où l'OIML peut apporter une contribution directe.", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Bureau de continuer à développer le site web de l'OIML afin de fournir des informations à jour sur les initiatives de renforcement des capacités, y compris des supports de formation, et de maintenir la base de données des experts disponibles pour contribuer à ces travaux,", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Bureau de veiller à ce que le développement futur de ses systèmes prenant en charge les travaux techniques de l'OIML tienne compte de la nécessité d'impliquer le CEEMS dans ces travaux,", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: charges
      message:
        - { content: "Charge le Bureau de contribuer à utiliser le Bulletin et le site web de l'OIML pour faciliter de nouvelles idées, en particulier de nouvelles approches en matière de métrologie légale,", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: requests
      message:
        - { content: "Demande à son Président, à ses Vice-Présidents, au Président et aux Vice-Présidents du Groupe Consultatif du CEEMS, au Président du Comité de Management de l'OIML-CS et au Bureau de prendre particulièrement en compte les besoins des CEEMS lors de leur participation à des activités liées à l'Objectif 5 dans la Stratégie de l'OIML (OIML B 15:2011),", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: requests
      message:
        - { content: "Demande aux Comités Techniques, aux Sous-comités et aux Groupes de Projets de prendre note de la demande formulée par les CEEMS de veiller à ce que les Recommandations et autres publications tiennent davantage compte des besoins des CEEMS,", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: requests
      message:
        - { content: "Demande au Comité de Management de l'OIML-CS de veiller à ce que les besoins des CEEMS continuent d'être pris en compte dans le développement à venir du Système de Certification de l'OIML,\nIncite les États Membres à examiner quel soutien ils pourraient apporter aux futurs Centres de Formation OIML ou à d'autres initiatives d'assistance aux CEEMS,\nIncite les États Membres à être prêts à proposer aux responsables de projets la production de documents présentant un intérêt pour les CEEMS et à tirer parti de la formation offerte aux responsables potentiels, et\nIncite les États Membres et les Membres Correspondants à étudier les possibilités de détacher du personnel auprès du Bureau afin de développer les compétences et l'expérience des personnes concernées.", lang: fr }
      dates:
      - start: '2018-10-09'
        kind: effective
