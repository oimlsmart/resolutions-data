    doi: "10.63493/resolutions/ciml201815"
    urn: "urn:oiml:doc:ciml:resolution:2018-15"
    dates:
    - start: '2018-10-09'
      kind: decision
    localizations:
    - language_code: eng
      script: Latn
      title: Instructs the Bureau to continue its efforts to promote and participate in capacity building
      subject: CIML
      considerations:
      - type: recalling
        message: |
          Recalling its resolution 2015/10 detailing the OIML's commitment to activities directed at countries and economies with emerging metrology systems (CEEMS),
          Recognizing the significant progress which has been made in efforts to assist in building the capacity of legal metrology institutions and their staff in the CEEMS community,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: noting
        message: |
          Noting the reports and advice from the Advisory Group on matters concerning Countries and Economies with Emerging Metrology Systems,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: noting
        message: |
          Noting the particular contribution that research can play in promoting and evaluating new approaches to legal metrology, instructs the Director to take this into account when considering projects which can be supported by the special fund created by the 14th Conference,
        dates:
        - start: '2018-10-09'
          kind: effective
      actions:
      - type: instructs
        message: |
          Instructs the Bureau to continue its efforts to promote and participate in capacity building activities, both through the program of OIML Training Centers, and through training courses and regional activities organized by other organizations,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: instructs
        message: |
          Instructs the Bureau to continue to work with the constituent bodies of the International Network on Quality Infrastructure (INetQI - previously DCMAS Network), in particular the BIPM, to identify new initiatives where the OIML can make a direct contribution,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: instructs
        message: |
          Instructs the Bureau to continue developing the OIML website so that it provides up-to-date information on capacity-building initiatives, including training materials, and to maintain the database of experts available to contribute to such work,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: instructs
        message: |
          Instructs the Bureau to ensure that the further development of its systems supporting OIML technical work takes account of the need to involve CEEMS in such work,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: instructs
        message: |
          Instructs the Bureau to continue using the OIML Bulletin and the OIML website to facilitate the exchange of new ideas, and in particular new approaches to legal metrology,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: requests
        message: |
          Requests its President, Vice-Presidents, the Chair and Vice-Chair of the CEEMS Advisory Group, the Chair of the OIML-CS Management Committee, and the Bureau to take particular account of the needs of CEEMS during involvement in activities related to Objective 5 in the OIML Strategy (OIML B 15:2011),
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: requests
        message: |
          Requests Technical Committees, Subcommittees and Project Groups to take note of the demand from CEEMS to ensure Recommendations and other publications take more account of the needs of CEEMS,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: requests
        message: |
          Requests the OIML-CS Management Committee to ensure that the needs of CEEMS continue to be addressed in the further development of the OIML Certification System,
          Urges Member States to consider what support they can give to future OIML Training Centers or other initiatives aimed at assisting CEEMS,
          Urges Member States to be ready to propose conveners for projects to produce other documents of interest to CEEMS and to take advantage of the training which is available for potential conveners, and
          Urges both Member States and Corresponding Members to consider opportunities to second staff to the Bureau in order to develop the skills and experience of appropriate individuals.
        dates:
        - start: '2018-10-09'
          kind: effective
    - language_code: fra
      script: Latn
      title: "Charge le Bureau de poursuivre ses efforts pour promouvoir et participer aux activités de"
      subject: CIML
      considerations:
      - type: recalling
        message: |
          Rappelant sa résolution 2015/10 détaillant l'engagement de l'OIML en faveur d'activités ciblant les Pays et les Economies dotés de Systèmes de Métrologie Emergeants (CEEMS),
          Reconnaissant les progrès notables accomplis dans les efforts visant à renforcer les capacités des institutions de métrologie légale et de leur personnel au sein de la communauté CEEMS.
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: noting
        message: |
          Prenant note des rapports et des avis du Groupe Consultatif sur les questions concernant les Pays et les Economies dotés de Systèmes de Métrologie Emergeants,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: noting
        message: |
          Prenant note de la contribution particulière que la recherche peut jouer dans la promotion et l'évaluation de nouvelles approches de la métrologie légale, charge le Directeur d'en tenir compte lors de l'examen de projets pouvant être soutenus par le fonds spécial créé par la 14ème Conférence,
        dates:
        - start: '2018-10-09'
          kind: effective
      actions:
      - type: charges
        message: |
          Charge le Bureau de poursuivre ses efforts pour promouvoir et participer aux activités de renforcement des capacités, à la fois par le biais du programme des Centres de Formation OIML et par le biais de cours de formation et d'activités régionales organisées par d'autres organisations,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: charges
        message: |
          Charge le Bureau de continuer à travailler avec les organes constitutifs de Réseau International sur les Infrastructures de Qualité (INetQI - anciennement Réseau DCMAS), en particulier le BIPM, afin d'identifier de nouvelles initiatives où l'OIML peut apporter une contribution directe.
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: charges
        message: |
          Charge le Bureau de continuer à développer le site web de l'OIML afin de fournir des informations à jour sur les initiatives de renforcement des capacités, y compris des supports de formation, et de maintenir la base de données des experts disponibles pour contribuer à ces travaux,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: charges
        message: |
          Charge le Bureau de veiller à ce que le développement futur de ses systèmes prenant en charge les travaux techniques de l'OIML tienne compte de la nécessité d'impliquer le CEEMS dans ces travaux,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: charges
        message: |
          Charge le Bureau de contribuer à utiliser le Bulletin et le site web de l'OIML pour faciliter de nouvelles idées, en particulier de nouvelles approches en matière de métrologie légale,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: requests
        message: |
          Demande à son Président, à ses Vice-Présidents, au Président et aux Vice-Présidents du Groupe Consultatif du CEEMS, au Président du Comité de Management de l'OIML-CS et au Bureau de prendre particulièrement en compte les besoins des CEEMS lors de leur participation à des activités liées à l'Objectif 5 dans la Stratégie de l'OIML (OIML B 15:2011),
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: requests
        message: |
          Demande aux Comités Techniques, aux Sous-comités et aux Groupes de Projets de prendre note de la demande formulée par les CEEMS de veiller à ce que les Recommandations et autres publications tiennent davantage compte des besoins des CEEMS,
        dates:
        - start: '2018-10-09'
          kind: effective
      - type: requests
        message: |
          Demande au Comité de Management de l'OIML-CS de veiller à ce que les besoins des CEEMS continuent d'être pris en compte dans le développement à venir du Système de Certification de l'OIML,
          Incite les États Membres à examiner quel soutien ils pourraient apporter aux futurs Centres de Formation OIML ou à d'autres initiatives d'assistance aux CEEMS,
          Incite les États Membres à être prêts à proposer aux responsables de projets la production de documents présentant un intérêt pour les CEEMS et à tirer parti de la formation offerte aux responsables potentiels, et
          Incite les États Membres et les Membres Correspondants à étudier les possibilités de détacher du personnel auprès du Bureau afin de développer les compétences et l'expérience des personnes concernées.
        dates:
        - start: '2018-10-09'
          kind: effective
