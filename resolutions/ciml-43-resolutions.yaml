      message:
        - { content: "The Committee decided to strike Cameroon and Ethiopia off the list of Member States in application of Article XXIX of the Convention.\nThe Committee further resolved that in application of Article XXIV of the Convention, the Conference would be requested to consider whether these countries should be granted the opportunity to reduce their debt over a period of time to be determined, in which case the Committee's decision would be suspended. Failing acceptance by the Conference, they would be struck off the list of Member States as decided by the Committee.", lang: en }
