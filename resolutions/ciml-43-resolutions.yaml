      title: "Tout Projet de Publication OIML approuvé par le Comité devra être mis en ligne"
      subject: "Conférence OIML"
      actions:
      - type: notes
        message: |
          Tout Projet de Publication OIML approuvé par le Comité devra être mis en ligne sur le site internet de l'OIML immédiatement après son approbation, à titre de référence et afin de permettre aux fabricants et aux Autorités de Délivrance de commencer à se préparer à l'émission des futurs Certificats. Il n'est toutefois pas permis d'émettre un Certificat dit "de base" fondé sur le projet.
        dates:
        - start: '2008-10-28'
          kind: effective
