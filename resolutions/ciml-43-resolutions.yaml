    doi: "10.63493/resolutions/ciml200820"
    urn: "urn:oiml:doc:ciml:resolution:2008-20"
    dates:
    - start: '2008-10-28'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message:
        - { content: "The OIML Basic Certificate System and the OIML MAA are maintained in parallel for categories under the MAA until the Committee decides to stop the implementation of the OIML Basic Certificate System. The proposal to stop the OIML Basic Certificate System for a particular category shall be examined, as appropriate, by the Committee independently for each category covered by the MAA. A two-year period (after the Committee decision) shall be allowed before stopping the OIML Basic Certificate System for the relevant category.", lang: en }
      dates:
      - start: '2008-10-28'
        kind: effective
