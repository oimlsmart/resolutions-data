    urn: "urn:oiml:doc:ciml:resolution:2005-7.1"
    subject: CIML
    title: Organization of the Bureau
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee took note of a presentation given by the BIML Director concerning the organization and activities of the Bureau. It was noted that one BIML Staff Member had decided to leave the BIML at the end of 2004; a suitable candidate would be recruited shortly.
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/7.2
    doi: "10.63493/resolutions/ciml20057.2"
    urn: "urn:oiml:doc:ciml:resolution:2005-7.2"
    subject: CIML
    title: "Communication, web site"
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee took note of a presentation given by Mr. Pulham concerning the production of OIML Publications, activities aimed at improving communication, and the OIML web site.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        The Committee expressed its high appreciation of the achievements presented and encouraged the Bureau to continue this development. In particular, a new OIML Leaflet was presented describing the Organization, its role and its structures. The BIML proposed to make the Leaflet available free of charge to all Members to promote legal metrology in their countries.
      dates:
      - start: '2005-06-18'
        kind: effective
