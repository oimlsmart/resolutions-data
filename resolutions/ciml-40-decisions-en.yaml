      kind: decision
    considerations: []
    actions:
    - type: decides
      message: |
        The Committee decided:
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: approves
      message: |
        The Committee approved the proposal from TC 3/SC 5 to use the Guides for the application of ISO 17025 and Guide 65 drawn up by the CPR on R 60 and R 76 as a first Working Draft and to proceed following the Directives for Technical Work.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        The Committee authorized the Bureau, together with the TC 4 Secretariat (Slovakia), to decide together with ILAC on the best way of publishing the joint publication of the revised D 10.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: instructs
      message: |
        The Committee instructed the Bureau to organize a meeting with the Secretariats of TC 8/SC 7 and TC 8/SC 8 and to redefine the scope of these Subcommittees' projects so as to avoid unnecessary overlapping, eliminate redundancies, discrepancies and duplication of work.
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/8.3
