        kind: effective
  - identifier: CIML/2005/8.4
    doi: "10.63493/resolutions/ciml20058.4"
    urn: "urn:oiml:doc:ciml:resolution:2005-8.4"
    subject: CIML
    title: Progress in the revision of the Directives
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee took note that the Bureau will start the revision of the Directives for Technical Work before the end of 2005 and indicated that this work must be considered a high priority. This revision should simplify the procedures and make use of information technologies in order to substantially accelerate the work.
      dates:
      - start: '2005-06-18'
        kind: effective
