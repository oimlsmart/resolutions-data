    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: approves
      message: |
        The Committee approved the Auditor's report for 2004 and requested its President and the BIML Director to submit it to the Thirteenth Conference.
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/3.2
    doi: "10.63493/resolutions/ciml20053.2"
    urn: "urn:oiml:doc:ciml:resolution:2005-3.2"
    subject: CIML
    title: Assets and liabilities as at 2005.01.01
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee took note of a report given by the BIML Director concerning the OIML Pension System and instructed its President and the Director of the Bureau to continue to study the possible evolutions of the System, compared to other systems existing in similar organizations, and to report back at the 41st CIML Meeting in 2006.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        The Committee took note of a presentation given by the BIML Director concerning the estimation of the assets and liabilities according to the new accountancy rules laid down by the new Financial Regulations.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        The Committee noted that taking account of the evaluation of the Pension Fund, the Reserve Fund would be significantly reduced.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: instructs
      message: |
        The Committee instructed its President to examine the conditions and procedures related to personal loans to BIML Staff Members and to report back at the 41st CIML Meeting in 2006.
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/3.3
    doi: "10.63493/resolutions/ciml20053.3"
    urn: "urn:oiml:doc:ciml:resolution:2005-3.3"
    subject: CIML
    title: Information on the implementation of the new Financial Regulations
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee took note of a presentation given by the BIML Director concerning the implementation of the new Financial Regulations. It was noted that the details of the transition from the previous to the new accountancy systems shall be assessed by the external accountant and presented at the 41st CIML Meeting in 2006.
      dates:
      - start: '2005-06-18'
        kind: effective
