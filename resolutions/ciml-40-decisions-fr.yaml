    title: "Stratégie à Long Terme et Plan d'Action"
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a discuté de la Stratégie et du Plan d'Action et a exprimé des remarques à ce sujet. Il est demandé aux Membres du CIML d'envoyer au Président et au Bureau leurs remarques supplémentaires avant la fin du mois de juillet 2005.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a chargé son Président et le Bureau de faire circuler ces projets, modifiés selon les remarques exprimées, pour qu'ils soient approuvés par correspondance avant la fin de l'année 2005.
      dates:
      - start: '2005-06-18'
        kind: effective
