  - identifier: CIML/2005/3.1
    subject: CIML
    title: Adoption du Rapport d'audit de 2004
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a approuvé le Rapport d'audit de 2004 et a demandé à son Président et au Directeur du BIML de le présenter lors de la Treizième Conférence.
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/3.2
    subject: CIML
    title: Actif et passif au 01.01.2005
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note d'un rapport fourni par le Directeur du BIML relatif au Système de Retraite de l'OIML et a chargé son Président et le Directeur du Bureau de continuer à étudier les évolutions potentielles du Système, par comparaison avec d'autres systèmes existants dans des organisations similaires et de présenter ses conclusions à ce sujet lors de la 41ème Réunion du CIML en 2006.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a pris note d'un exposé du Directeur du BIML concernant l'estimation de l'actif et du passif conformément aux nouvelles règles de comptabilité prescrites par le nouveau Règlement Financier.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a pris note qu'en tenant compte de l'évaluation du Fonds de Retraite, le Fonds de Réserve serait fortement réduit.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a chargé son Président d'examiner les conditions et procédures relatives aux prêts personnels aux Membres du Personnel du BIML et de présenter ses conclusions lors de la $ 4 1 ^{ème} $ Réunion du CIML en 2006.
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/3.3
    subject: CIML
    title: "Informations concernant la mise en œuvre du nouveau Règlement Financier"
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note d'un exposé du Directeur du BIML concernant la mise en œuvre du nouveau Règlement Financier. Il a été noté que les détails de la transition entre le précédent système de comptabilité et le nouveau doivent être évalués par l'expert-comptable extérieur et présentés lors de la 41eme Réunion du CIML en 2006.
      dates:
      - start: '2005-06-18'
        kind: effective
