      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note que la République populaire de Chine songeait à inviter le CIML à tenir sa 42ème Réunion en Chine au mois d'octobre 2007. Une décision sera prise lors de la 41ème Réunion du CIML.
