  - identifier: CIML/2005/7.1
    subject: CIML
    title: Organisation du Bureau
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note d'un exposé du Directeur du BIML concernant l'organisation et les activités du Bureau. Il a été noté qu'un Membre du Personnel du BIML a pris la décision de quitter le BIML d'ici la fin de l'année 2004 ; un candidat approprié sera promptement recruté.
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/7.2
    subject: CIML
    title: "Communication, site Internet"
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note d'un exposé de M. Pulham concernant la production des Publications de I'OIML, les activités visant à améliorer la communication et le site Internet de I'OIML.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a exprimé ses remerciements pour les résultats présentés et a encouragé le Bureau à poursuivre en ce sens. En particulier, un nouveau Dépliant OIML a été présenté : celui-ci décrit l'Organisation, son rôle et ses structures. Le BIML propose de rendre le Dépliant gratuit pour tous les Membres afin de promouvoir la métrologie légale dans leur pays.
      dates:
      - start: '2005-06-18'
        kind: effective
