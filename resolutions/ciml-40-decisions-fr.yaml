  - identifier: CIML/2005/8
    subject: CIML
    title: "Activités techniques"
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note d'un exposé de M. Szilvássy concernant la situation générale des activités techniques de I'OIML, en particulier les projets de Recommandations à approuver et la situation de certains TC/SC.
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/8.1
    subject: CIML
    title: Approbation de Documents et Recommandations Internationaux
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a décidé que la même procédure de vote par correspondance du CIML s'appliquera à la DR de la révision de la R 39, publiée sur le site Internet juste avant la Réunion du CIML pour un vote en ligne.
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/8.2
    subject: CIML
    title: Examen de la situation de certains TC/SC
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a décidé :
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a approuvé la proposition du TC 3/SC 5 visant, d'une part, à utiliser les Guides en application de la norme ISO 17025 et du Guide 65 rédigé par le CPR, relatif aux R 60 et R 76 en tant que premier Projet de Travail et, d'autre part, à poursuivre en suivant les Directives relatives au Travail Technique.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a autorisé le Bureau, en partenariat avec le Secrétariat du TC 4 (Slovaquie), à décider avec l'ILAC de la meilleure façon de publier la publication commune de la révision du D 10.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a chargé le Bureau d'organiser une réunion avec les Secrétariats des TC 8/SC 7 et TC 8/SC 8 afin de redéfinir la portée des projets de ces Sous-Comités de manière à éviter tout chevauchement inutile, éliminer toute redondance, divergence et duplication des tâches.
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/8.3
    subject: CIML
    title: MAA
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note d'un rapport présenté par Mme Gaucher, Chef de Projet de MAA au BIML, indiquant les progrès de la mise en œuvre du MAA, ainsi que les résultats de la première Réunion du CPR.
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: |
        Le Comité a demandé au Bureau de présenter les propositions du CPR - modifiées conformément aux remarques formulées lors de la présente Réunion du CIML, et accompagnées d'une note explicative détaillée - au CIML pour un vote par correspondance avant la fin de l'année 2005. Les propositions soumises au vote concernent les points suivants :
      dates:
      - start: '2005-06-18'
        kind: effective
  - identifier: CIML/2005/8.4
    subject: CIML
    title: "Progrès concernant la révision des Directives"
    dates:
    - start: '2005-06-18'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a pris note que le Bureau entamera la révision des Directives relatives au Travail Technique avant la fin de l'année 2005 et a indiqué que ce travail doit être considéré comme étant de haute priorité. Cette révision devrait simplifier les procédures et permettre l'utilisation de technologies de l'information afin d'accélérer le travail de manière significative.
      dates:
      - start: '2005-06-18'
        kind: effective
