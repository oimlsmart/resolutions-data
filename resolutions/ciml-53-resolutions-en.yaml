  - identifier: CIML/2018/15
    doi: "10.63493/resolutions/ciml201815"
    urn: "urn:oiml:doc:ciml:resolution:2018-15"
    subject: CIML
    title: Instructs the Bureau to continue its efforts to promote and participate in capacity building
    dates:
    - start: '2018-10-09'
      kind: decision
    considerations:
    - type: recalling
      message: |
        Recalling its resolution 2015/10 detailing the OIML's commitment to activities directed at countries and economies with emerging metrology systems (CEEMS),
        Recognizing the significant progress which has been made in efforts to assist in building the capacity of legal metrology institutions and their staff in the CEEMS community,
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: noting
      message: |
        Noting the reports and advice from the Advisory Group on matters concerning Countries and Economies with Emerging Metrology Systems,
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: noting
      message: |
        Noting the particular contribution that research can play in promoting and evaluating new approaches to legal metrology, instructs the Director to take this into account when considering projects which can be supported by the special fund created by the 14th Conference,
      dates:
      - start: '2018-10-09'
        kind: effective
    actions:
    - type: instructs
      message: |
        Instructs the Bureau to continue its efforts to promote and participate in capacity building activities, both through the program of OIML Training Centers, and through training courses and regional activities organized by other organizations,
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: instructs
      message: |
        Instructs the Bureau to continue to work with the constituent bodies of the International Network on Quality Infrastructure (INetQI - previously DCMAS Network), in particular the BIPM, to identify new initiatives where the OIML can make a direct contribution,
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: instructs
      message: |
        Instructs the Bureau to continue developing the OIML website so that it provides up-to-date information on capacity-building initiatives, including training materials, and to maintain the database of experts available to contribute to such work,
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: instructs
      message: |
        Instructs the Bureau to ensure that the further development of its systems supporting OIML technical work takes account of the need to involve CEEMS in such work,
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: instructs
      message: |
        Instructs the Bureau to continue using the OIML Bulletin and the OIML website to facilitate the exchange of new ideas, and in particular new approaches to legal metrology,
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: requests
      message: |
        Requests its President, Vice-Presidents, the Chair and Vice-Chair of the CEEMS Advisory Group, the Chair of the OIML-CS Management Committee, and the Bureau to take particular account of the needs of CEEMS during involvement in activities related to Objective 5 in the OIML Strategy (OIML B 15:2011),
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: requests
      message: |
        Requests Technical Committees, Subcommittees and Project Groups to take note of the demand from CEEMS to ensure Recommendations and other publications take more account of the needs of CEEMS,
      dates:
      - start: '2018-10-09'
        kind: effective
    - type: requests
      message: |
        Requests the OIML-CS Management Committee to ensure that the needs of CEEMS continue to be addressed in the further development of the OIML Certification System,
        Urges Member States to consider what support they can give to future OIML Training Centers or other initiatives aimed at assisting CEEMS,
        Urges Member States to be ready to propose conveners for projects to produce other documents of interest to CEEMS and to take advantage of the training which is available for potential conveners, and
        Urges both Member States and Corresponding Members to consider opportunities to second staff to the Bureau in order to develop the skills and experience of appropriate individuals.
      dates:
      - start: '2018-10-09'
        kind: effective
