    means
  dates:
  - start: '2001-09-25'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of information delivered by the BIML concerning
      the use of e-mail and the Internet in the development of OIML technical work
      and of remarks put forward by certain Members (communication using either paper
      or e-mail; use of CD roms, harmonization of technical facilities for video conferences,
      etc.). It requested the Bureau to give urgent priority to carrying out the revision
      of the Directives for the technical work and urged its Members to develop modern
