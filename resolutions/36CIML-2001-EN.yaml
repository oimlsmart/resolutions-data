    title: Situation of certain Members
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee noted with satisfaction that this Member State had not
        only paid its 2000 and 2001 contributions, but had also started paying its
        1996-1999 arrears.

        '
      date_effective:
        date: '2001-09-25'
        type: effective
    - type: notes
      message: 'The Committee noted that only a part of the 2000 contribution of this
        Member State had been paid. The Committee fixed at 2002.06.30 the final deadline
        for this country to pay its 2000 and 2001 contributions in full and requested
        the BIML to report about the situation at the 37th CIML Meeting.

        '
      date_effective:
        date: '2001-09-25'
        type: effective
    - type: notes
      message: 'The Committee noted the situation of the Islamic Republic of Iran,
        Italy and Kazakhstan with respect to the payment of their contributions to
        the OIML. The Committee also noted information given by the Bureau concerning
        an announcement by the Italian Authorities of the imminent full payment of
        their arrears, and concerning the willingness of the Kazakh Authorities to
        pay their arrears as soon as possible. The Committee fixed at 2002.06.30 the
        final deadline for these three countries to pay their arrears and requested
        the BIML to report back on the situation at the 37th CIML Meeting.

        '
      date_effective:
        date: '2001-09-25'
        type: effective
