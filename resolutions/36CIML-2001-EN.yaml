    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of information delivered by the BIML concerning
        the financial situation of the Organization in 2001 and found that this situation
        was in line with the decisions of the Eleventh Conference. The Committee also
        noted information delivered by the Bureau concerning 2002 including the changeover
        to the Euro, a new presentation of BIML accounts in order to better estimate
        the operational costs of the various bodies constituting the OIML and the
        production costs of the products and services provided by the BIML, and the
        new publications pricing and sales policy of the Bureau.

        '
