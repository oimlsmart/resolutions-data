- identifier:
  - prefix: CIML
    number: 2001/4
  doi: 10.63493/resolutions/ciml200104
  urn: urn:oiml:doc:ciml:resolution:2001-04
  dates:
  - date: '2001-09-25'
    type: decided
  localizations:
  - language_code: eng
    title: Relations between RLMOs
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Mr. Birch pointed out that, probably because of a lack of resources,
        there was a need for RLMOs to be in communication with each other about their
        programs. In addition it would perhaps be appropriate to define the role of
        RLMOs as distinct from the OIML and Development Council roles. It would also
        be necessary to make sure that duplication is avoided e.g. in the development
        of training courses. In order to implement these views the APLMF had tried
        to share information with other RLMOs by inviting them to attend Asia-Pacific
        meetings and reacting positively to invitations of this kind from other RLMOs
        and providing them with reports concerning APLMF activities. Similar cooperation
        amongst RLMOs should exist in the field of intercomparisons owing to the cost
        of such actions and to the fact that intercomparisons should probably be carried
        out at regional level. The utilization of common test facilities, and therefore
        their accessibility, should also be of interest for RLMOs. Mr. Birch concluded
        by pointing out the role of RLMOs in the implementation of OIML Recommendations
        and in the establishment of a global measurement system. RLMOs therefore need
        to interact.

        '
      date_effective:
        date: '2001-09-25'
        type: effective
- identifier:
  - prefix: CIML
    number: 2001/5
  doi: 10.63493/resolutions/ciml200105
  urn: urn:oiml:doc:ciml:resolution:2001-05
  dates:
  - date: '2001-09-25'
    type: decided
  localizations:
  - language_code: eng
    title: Relations between RLMOs and the Development Council
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Mr. Birch said that it would be necessary to define the appropriate
        areas to be taken on by the Development Council on the one hand and by RLMOs
        on the other hand, especially in connection with training. Regular meetings
        of the Development Council and RLMOs would probably be appropriate in order
        to identify and eliminate overlapping activities.

        '
      date_effective:
        date: '2001-09-25'
        type: effective
