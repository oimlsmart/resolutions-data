  localizations:
  - language_code: eng
    title: Future developments in TC/SC working methods and use of modern communication
      means
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of information delivered by the BIML concerning
        the use of e-mail and the Internet in the development of OIML technical work
        and of remarks put forward by certain Members (communication using either
        paper or e-mail; use of CD roms, harmonization of technical facilities for
        video conferences, etc.). It requested the Bureau to give urgent priority
        to carrying out the revision of the Directives for the technical work and
        urged its Members to develop modern communication means at the national level,
        in order to accelerate and facilitate the technical work of the OIML and at
        the same time decreasing operational costs.

        '
      date_effective:
        date: '2001-09-25'
        type: effective
