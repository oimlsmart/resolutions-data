- identifier: CIML/2001/4
  doi: 10.63493/resolutions/ciml200104
  urn: urn:oiml:doc:ciml:resolution:2001-04
  subject: CIML
  title: Relations between RLMOs
  dates:
  - start: '2001-09-25'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'Mr. Birch pointed out that, probably because of a lack of resources,
      there was a need for RLMOs to be in communication with each other about their
      programs. In addition it would perhaps be appropriate to define the role of
      RLMOs as distinct from the OIML and Development Council roles. It would also
      be necessary to make sure that duplication is avoided e.g. in the development
      of training courses. In order to implement these views the APLMF had tried to
      share information with other RLMOs by inviting them to attend Asia-Pacific meetings
      and reacting positively to invitations of this kind from other RLMOs and providing
      them with reports concerning APLMF activities. Similar cooperation amongst RLMOs
      should exist in the field of intercomparisons owing to the cost of such actions
      and to the fact that intercomparisons should probably be carried out at regional
      level. The utilization of common test facilities, and therefore their accessibility,
      should also be of interest for RLMOs. Mr. Birch concluded by pointing out the
      role of RLMOs in the implementation of OIML Recommendations and in the establishment
      of a global measurement system. RLMOs therefore need to interact.

      '
    dates:
    - start: '2001-09-25'
      kind: effective
