- identifier: CIML/2001/9.3
  doi: 10.63493/resolutions/ciml20019.3
  urn: urn:oiml:doc:ciml:resolution:2001-9.3
  subject: CIML
  title: Plans for future developments (see also MAA below)
  dates:
  - start: '2001-09-25'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of information concerning the current revision
      of the paper describing the operational rules of the System and urged TC 3/SC
      5, under the joint responsibility of the USA and of the Bureau, to complete
      this revision urgently. The Committee noted that certain very important matters,
      especially the certification of individual instruments, were not covered in
      this revision; the Committee therefore requested TC 3/SC 5 to start working
      on such matters as soon as possible and at the latest when the current revision
      is completed. Finally the Committee noted that a number of operational aspects
      of the System (e.g. the role of CIML Members) were closely connected with operational
      aspects of the future MAA (see item 10 below) and requested TC 3/SC 5 to eliminate
      any possible discrepancy between the two papers.

      '
    dates:
    - start: '2001-09-25'
      kind: effective
