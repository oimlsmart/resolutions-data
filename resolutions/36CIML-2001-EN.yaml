    title: Exchange of information concerning RLMOs
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Each RLMO was invited to make a brief presentation of its membership,
        current activities and trends for the future. These presentations are not
        reproduced in full in these minutes since updated information is permanently
        available from literature issued by these RLMOs and, for some of them, from
        their web sites. Only the main aspects are summarized below.

        '
      date_effective:
        date: '2001-09-25'
        type: effective
