        kind: effective
    - type: noting
      message: |
        Prenant note de la Résolution n $ ^{\circ} $ 2016/10 de la 51 $ ^{\mathrm{e m e}} $ Réunion du CIML,
      dates:
      - start: '2016-10-19'
        kind: effective
    - type: considering
      message: |
        Considérant que le nombre total de parts contributives de base, en prenant en considération la classification des États Membres tel que révisée en 2016, est de 144 pour l'année 2017 et, après reclassification de certains États Membres, de 146 pour les années suivantes de l'exercice financier 2017-2020,
      dates:
      - start: '2016-10-19'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide que :
        a) Le montant global des crédits nécessaires pour couvrir les frais de fonctionnement de l'Organisation est de 8 827 000 euros pour l'exercice financier 2017-2020 ;
        b) La part annuelle contributive de base pour l'exercice financier 2017-2020 est de 14 000 euros. Cela entraîne une contribution annuelle totale pour un État Membre classifié conformément à l'Article XXVI (1) de la Convention en Classe 1, Classe 2, Classe 3 ou Classe 4 de 56 000 euros, 112 000 euros, 224 000 euros or 448 000 euros, respectivement ;
        c) En cas d'admission d'un État Membre au cours de l'exercice financier, le montant global de crédits mentionné en a) ci-dessus, est augmenté par la part contributive dudit État Membre, calculée à partir de sa classification et de la part contributive de base, proportionnellement à la période allant de son admission jusqu'à la fin de l'exercice financier ;
        d) Pour l'exercice financier 2017-2020, les États Membres nouvellement admis ou réadmis ne paient pas de droit d'entrée.
      dates:
      - start: '2016-10-19'
        kind: effective
