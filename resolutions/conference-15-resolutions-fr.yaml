    - type: decides
      message: |
        Décide que:
        a) Si le Bureau a été informé que le représentant désigné d'un État Membre ne remplit plus les conditions d'appartenance au Comité et que l'État Membre n'a pas encore désigné un nouveau représentant, cette personne ne sera plus prise en considération lors de l'établissement du quorum pour les décisions du Comité ;
        b) Si le représentant désigné d'un État Membre n'a répondu à aucune communication du Bureau depuis plus de six mois et si le Bureau a fait toutes les tentatives raisonnablement possibles pour contacter le représentant désigné, le Bureau devra chercher la confirmation de l'État Membre quant au statut de son représentant au sein du Comité, selon une procédure décidée par le Comité ;
        c) S'il n'est pas possible, dans un délai raisonnable à fixer par le Comité, d'obtenir la confirmation de l'État Membre quant au statut de son représentant au sein du Comité, cette personne ne sera plus prise en considération lors de l'établissement du quorum pour les décisions du Comité.
      dates:
      - start: '2016-10-19'
        kind: effective
