  localizations:
  - language_code: fra
    title: 'Agenda Item 5: PERSONNEL DU BIML'
    subject: "(The CIML)"
    actions:
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: M. Athané rappelle aux participants que, en 1995, le Comité avait accepté
        que l'indice français de l'INSEE représentatif du coût de la vie en France
        soit utilisé pour l'indexation des salaires sur le taux d'inflation étant
        donné que l'OCDE ne fournissait plus gratuitement son propre indice aux institutions
        internationales ayant leur siège en France. M. Athané ajoute que cette décision
        est temporaire puisque le Comité lui a demandé d'examiner d'autres possibilités
        à la lumière de ce qui avait été décidé au sein d'autres institutions internationales.
