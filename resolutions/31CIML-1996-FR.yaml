    actions:
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité prend note d'un rapport sur l'activité du BIML de novembre
        1995 à octobre 1996 et demande au Bureau d'en publier un résumé dans le Bulletin
        OIML.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité accepte un nouveau thème de travail pour le TC 9/SC 4 sur
        un schéma de hiérarchie pour les instruments de mesure de la masse volumique.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité accepte que, exceptionnellement, la responsabilité du TC
        8/SC 7 "Mesurage des gaz" soit attribuée à la Belgique et à la France.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a approuvé le compte rendu de sa 30ème réunion sans modification.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a approuvé le rapport comptable pour 1995 et a chargé son
        Président et le Directeur du Bureau de soumettre ce rapport à la Dixième Conférence.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a accepté les propositions de son Président relatives à l'organisation,
        à la présidence et à l'ordre du jour de la Dixième Conférence.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: 'Le Comité a décidé de l''application des Recommandations suivantes
        au Système de Certificats:'
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a pris note d'informations données par les Directeur du Bureau
        sur la situation générale du personnel du BIML et l'indexation des salaires
        sur le taux d'inflation.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a élu comme Adjoint au Directeur M. Attila Szilvassy, Hongrie.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a pris note des décisions de la Dixième Conférence sur des
        sujets tels que les pays en développement, les liaisons avec d'autres institutions,
        la politique à long terme ou la certification, et a chargé son Président et
        le Directeur du Bureau de mener les actions nécessaires à leur mise en application.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a pris note du rapport d'activité du BIML pour la période
        novembre 1995-octobre 1996 et a chargé le Bureau de publier ce rapport dans
        le Bulletin sous une forme appropriée.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a pris note d'informations données par la délégation du Brésil
        et par le Directeur du BIML concernant les préparatifs de sa $32^{\mathrm{ème}}$
        réunion qui se tiendra à Rio dans la semaine du 1997.10.27-31, en liaison
        avec une réunion du SIM (Sistema Interamericano de Metrologia), du Conseil
        de Développement OIML et d'un séminaire technique.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a pris note d'informations données par la délégation Coréenne
        concernant les préparatifs de sa 33ème réunion qui se tiendra à Séoul durant
        la deuxième quinzaine d'octobre 1998 ou au début de novembre 1998, en liaison
        avec une réunion de l'APLMF et autres réunions. Il a été souligné que les
        dates devraient être choisies en tenant compte de celle de la prochaine réunion
        de ILAC à Sydney.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a accepté un nouveau thème de travail pour le TC 9/SC 4 sur
        un schéma de hiérarchie pour les instruments de mesure de la masse volumique.
    - type: notes
      date_effective:
        date: '1996-11-04'
        type: effective
      message: Le Comité a accepté que la responsabilité du secrétariat du TC 8/SC
        7 soit attribuée conjointement à la Belgique et à la France.
