      dates:
      - start: '2022-10-18'
        kind: effective
    - type: considering
      message: |
        Considérant la nomination du Deuxième Vice-président du CIML en tant que Président du CIML à compter de la 58ème Réunion du CIML prévue en 2023, et donc la nécessité d'élire un nouveau Deuxième Vice-président du CIML,
