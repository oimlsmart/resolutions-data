      dates:
      - start: '2022-10-18'
        kind: effective
    actions:
    - type: charges
      message: |
        Charge le Bureau de diffuser un appel à candidatures pour le poste de Deuxième Vice-président du CIML avec une date limite fixée au 31 mai 2023, afin que le CIML désigne un Deuxième Vice-président du CIML lors de la 58ème Réunion du CIML prévue en 2023, avec effet à partir de cette réunion,
      dates:
      - start: '2022-10-18'
        kind: effective
    - type: charges
      message: |
        Charge le Bureau de diffuser un appel à candidatures pour le poste de Premier Vice-président du CIML avec une date limite fixée au 31 mai 2023, en vue de la nomination par le CIML d'un Premier Vice-président du CIML lors de la 58ème Réunion du CIML prévue en 2023, avec effet à partir de la 59ème Réunion du CIML prévue en 2024.
      dates:
      - start: '2022-10-18'
        kind: effective
