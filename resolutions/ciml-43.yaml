    title: The Committee decided to strike Cameroon and Ethiopia off the list of Member
      States
    subject: OIML Conference
    considerations: []
    actions:
    - type: decides
      message: |
        The Committee decided to strike Cameroon and Ethiopia off the list of Member States in application of Article XXIX of the Convention.
        The Committee further resolved that in application of Article XXIV of the Convention, the Conference would be requested to consider whether these countries should be granted the opportunity to reduce their debt over a period of time to be determined, in which case the Committee's decision would be suspended. Failing acceptance by the Conference, they would be struck off the list of Member States as decided by the Committee.
      dates:
      - start: '2008-10-28'
        kind: effective
  - language_code: fra
    title: Le Comité a décidé de radier de la liste des Etats Membres le Cameroun
    subject: Conférence OIML
    considerations: []
    actions:
    - type: decides
      message: |
        Le Comité a décidé de radier de la liste des Etats Membres le Cameroun et l'Ethiopie en application de l'Article XXIX de la Convention.
        Toutefois, le Comité a décidé, en application de l'Article XXIV de la Convention, qu'il serait demandé à la Conférence de considérer si ces pays devaient se voir offrir la possibilité de réduire leur dette dans des délais à déterminer, auquel cas la décision du Comité serait suspendue. En cas de refus de la Conférence, ils seraient radiés de la liste des Etats Membres tel que décidé par le Comité.
      dates:
      - start: '2008-10-28'
        kind: effective
