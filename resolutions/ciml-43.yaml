    title: Dès qu'une Recommandation OIML, incluant le format de rapport d'essais,
      est publiée, cette Recommand…
    subject: Conférence OIML
    considerations: []
    actions:
    - type: notes
      message: 'Dès qu''une Recommandation OIML, incluant le format de rapport d''essais,
        est publiée, cette Recommandation est automatiquement incluse dans le Système
        de Certificats dit "de base". Le Bureau publiera l''information appropriée
