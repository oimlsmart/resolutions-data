    title: A Draft OIML Publication approved by the Committee shall be available on
      the OIML
    subject: OIML Conference
    considerations: []
    actions:
    - type: notes
      message: 'A Draft OIML Publication approved by the Committee shall be available
        on the OIML web site immediately after approval, for reference purposes and
        in order for manufacturers and OIML Issuing Authorities to begin preparing
        for issuing Certificates in the future. However it is not permitted to issue
        an OIML Basic Certificate based on the Draft.

        '
      dates:
      - start: '2008-10-28'
        kind: effective
  - language_code: fra
    title: Tout Projet de Publication OIML approuvé par le Comité devra être mis en
      ligne
    subject: Conférence OIML
    considerations: []
    actions:
    - type: notes
      message: 'Tout Projet de Publication OIML approuvé par le Comité devra être
        mis en ligne sur le site internet de l''OIML immédiatement après son approbation,
        à titre de référence et afin de permettre aux fabricants et aux Autorités
        de Délivrance de commencer à se préparer à l''émission des futurs Certificats.
        Il n''est toutefois pas permis d''émettre un Certificat dit "de base" fondé
        sur le projet.

        '
      dates:
      - start: '2008-10-28'
        kind: effective
