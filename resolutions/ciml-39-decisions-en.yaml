- identifier: CIML/2004/6.2
  doi: 10.63493/resolutions/ciml20046.2
  urn: urn:oiml:doc:ciml:resolution:2004-6.2
  subject: CIML
  title: Examination of the situation of certain TCs/SCs
  dates:
  - start: '2004-10-26'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a report from the BIML describing the situation
      of certain Technical Committees and Subcommittees.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
  - type: approves
    message: 'The Committee approved the proposal to allocate the Secretariat of TC
      6 to South Africa and TC 9/SC 3 to Germany.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
  - type: notes
    message: 'The Committee noted firstly that the Secretariats of TC 8/SC 2 and TC
      10/SC 3 were still vacant, and secondly that Germany wished to relinquish the
      Secretariat of TC 12. It asked Members to consider taking on responsibility
      for the Secretariats of these technical bodies.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
  - type: approves
    message: 'The Committee approved two new working projects:

      '
    dates:
    - start: '2004-10-26'
      kind: effective
  - type: sets
    message: 'The Committee set the deadline for issuing Certificates according to
      the 1996 edition of R 61 to 31 December 2005 and requested Issuing Authorities
      to notify the BIML about their readiness to issue Certificates according to
      the requirements of the revised R 61 (2004), since R 61-1 had already been published
      and the publication of R 61-2 (2004) was imminent.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
- identifier: CIML/2004/6.3
  doi: 10.63493/resolutions/ciml20046.3
  urn: urn:oiml:doc:ciml:resolution:2004-6.3
