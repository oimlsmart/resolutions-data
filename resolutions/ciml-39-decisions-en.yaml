  title: CIML Presidency
  dates:
  - start: '2004-10-26'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee elected Mr. Alan E. Johnston (CIML Member for Canada)
      as its President for the next six years.

      '
    dates:
