- identifier: CIML/2004/9
  doi: 10.63493/resolutions/ciml200409
  urn: urn:oiml:doc:ciml:resolution:2004-09
  subject: CIML
  title: Twelfth International Conference of Legal Metrology
  dates:
  - start: '2004-10-26'
    kind: decision
  considerations: []
  actions:
  - type: endorses
    message: 'The Committee endorsed the draft agenda and program for the Conference.
      It noted that Dr. Rohling would act as Conference Chairman and approved the
      proposal from the CIML Acting President to nominate Mrs. Annabi and Dr. Zhagora
      as Conference Vice-Presidents.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
- identifier: CIML/2004/10
  doi: 10.63493/resolutions/ciml200410
