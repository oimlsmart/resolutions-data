  title: Implementation of the MAA
  dates:
  - start: '2004-10-26'
    kind: decision
  considerations: []
  actions:
  - type: notes
    message: 'The Committee took note of a report on the Workshop held on Sunday 24
      October, and approved the proposed decisions annexed to these decisions.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
  - type: instructs
    message: 'The Committee instructed TC 3/SC 5 and the Bureau to start a revision
