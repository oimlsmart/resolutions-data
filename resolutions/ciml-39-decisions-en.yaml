      of the MAA.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
- identifier: CIML/2004/6.4
  doi: 10.63493/resolutions/ciml20046.4
  urn: urn:oiml:doc:ciml:resolution:2004-6.4
  subject: CIML
  title: Other decisions related to the OIML Certificate System
  dates:
  - start: '2004-10-26'
    kind: decision
  considerations: []
  actions:
  - type: decides
    message: 'The Committee decided that from 1 January 2005 OIML Issuing Authorities
      shall establish OIML Certificates in electronic format as defined by the BIML,
      so that these Certificates may be published on the OIML web site.

      '
    dates:
    - start: '2004-10-26'
      kind: effective
- identifier: CIML/2004/6.5
  doi: 10.63493/resolutions/ciml20046.5
