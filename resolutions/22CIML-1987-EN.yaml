        weighing instruments in 1989; it also took note of a suggestion that regional
        seminars on laboratories for calibration and testing, and on problems of calibration
        and verification, of special interest to developing countries, be organised.
    - spelling: eng
      value: The Committee took note of the report on the activities of the BIML during
        the period April 1986 - August 1987 and expressed its appreciation.
    - spelling: eng
      value: The Committee noted reports on liaison between OIML and certain International
        Institutions and encouraged the Bureau and the working groups of OIML to continue
        their cooperative efforts.
    - spelling: eng
      value: The Committee noted a report on the terminological work of OIML, expressed
        its agreement with the proposals submitted and instructed SP1 and the Bureau
        to report back on this subject at an appropriate time.
    - spelling: eng
      value: The Committee took note of the fact that Mr David E. EDGERLY was obliged
        by the application of Article XIII of the Convention to relinquish his responsibilities
        as Member for the United States of America and Vice-President of the International
        Committee of Legal Metrology.
