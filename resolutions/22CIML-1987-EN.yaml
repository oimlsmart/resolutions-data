- identifier:
  - prefix: CIML
    number: 1987/10
  doi: 10.63493/resolutions/ciml198710
  urn: urn:oiml:doc:ciml:resolution:1987-10
  agenda_item: '10'
  dates:
  - date: '1987-09-02'
    type: decided
  title:
  - spelling: eng
    value: CATEGORIES OF OIML PUBLICATIONS
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1987-09-02'
      type: effective
    message:
    - spelling: eng
      value: 'Mr EDGERLY reminded the Committee that the Presidential Council had
        given him the task of producing a proposal whose object would be to make official
        the publication by the Bureau of brochures which fall neither into the category
        of International Recommendations nor into that of International Documents.
        These brochures could come originally from the Bureau itself or from a Pilot
        Secretariat or Reporting Secretariat (and in the last case would have been
        approved by the International Working Group of the Secretariat), or from other
        sources. They would be examined by the Bureau, and the decision whether or
        not to publish them would be the Director''s. These brochures could cover
        very different fields : information manuals for developing countries, compilations
        of existing Recommendations, reports, etc.'
- identifier:
  - prefix: CIML
    number: 1987/11
  doi: 10.63493/resolutions/ciml198711
