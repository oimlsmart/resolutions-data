  title:
  - spelling: eng
    value: OIML SEMINARS
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1987-09-02'
      type: effective
    message:
    - spelling: eng
      value: Mr THULIN spoke of the seminar on the measurement of large quantities
        of liquids, which the Bureau had organised at Arles, in the south of France,
        in April 1987, with the support of the French metrological authorities and,
        as regarded the visits and technical demonstrations, the help of French industrial
        enterprises. The seminar had been a great success; 63 people had taken part,
        coming from numerous Member States, from one Corresponding Member (Albania),
        and from one country which was not a member (Saudi Arabia). A detailed account
        of the proceedings had been published in the OIML Bulletin of September 1987.
