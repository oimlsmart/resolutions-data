- identifier:
  - prefix: CIML
    number: 1987/7
  doi: 10.63493/resolutions/ciml198707
  urn: urn:oiml:doc:ciml:resolution:1987-07
  agenda_item: '7'
  dates:
  - date: '1987-09-02'
    type: decided
  title:
  - spelling: eng
    value: Certification
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1987-09-02'
      type: effective
    message:
    - spelling: eng
      value: Mr BIRKELAND introduced this item by stressing the importance for OIML
        of the question of mutual recognition of metrological controls and, more generally,
        of what was meant by international certification. The internationalization
        of the exchange of merchandise, goods and services had increased significantly
        in all fields, including that of metrology. At the same time, national metrological
        services had often seen their resources diminishing or stagnating at their
        present level, or at any rate not increasing as rapidly as the volume of work.
        A way of resolving some of the problems encountered at local level lay, no
        doubt, in the solution of the problems of international certification, thanks
        to better rationalization of activity.
