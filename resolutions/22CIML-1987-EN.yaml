  - spelling: eng
    value: Planning exercise for the period 1985 to 1988
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1987-09-02'
      type: effective
    message:
    - spelling: eng
      value: M. PETIK drew the attention of the Committee to the final drafts of the
        programmes of work that the Bureau had presented, in a uniform format, based
        on the draft work programmes drawn up by the Secretariats in 1985 and approved
        by the Committee in 1986. Although it was not then possible to draw any final
        conclusions it could be said that, of 150 Reporting Secretariats, 40 were
        inactive (their work being either finished or not yet started). Of the 110
        active Secretariats, three quarters were proceeding according to plan and
        a quarter had slipped behind. There would be a more detailed analysis at the
        beginning of 1988, using the annual reports that the Bureau would receive
        before the end of 1987.
- identifier:
  - prefix: CIML
    number: 1987/5.2
  doi: 10.63493/resolutions/ciml19875.2
  urn: urn:oiml:doc:ciml:resolution:1987-5.2
  agenda_item: '5.2'
  dates:
  - date: '1987-09-02'
    type: decided
  title:
  - spelling: eng
    value: Preparation of the plan for the period 1989 to 1992
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1987-09-02'
      type: effective
    message:
    - spelling: eng
      value: Mr BIRKELAND reminded the Committee of the reasons which had led it to
        decide to introduce a planning system for the work of OIML, and to instruct
        the Presidential Council to prepare the system and to put it into effect.
        The second planning period, for the years 1989 to 1992, should by then be
        entering its planning phase, even if the results of the first period were
        far from being known in their entirety. Experience had shown that the problem
        of setting priority criteria, that is the importance to be attached to each
        work topic, had not been completely resolved, and that this question needed
        to be studied in depth before constructing the plan for the second period.
        For that purpose the Bureau had submitted proposals which stemmed from ideas
        and comments put forward by some Committee Members.
