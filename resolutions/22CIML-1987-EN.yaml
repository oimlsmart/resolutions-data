  title:
  - spelling: eng
    value: The financial position in 1987 and 1988
  subject:
  - spelling: eng
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1987-09-02'
      type: effective
    message:
    - spelling: eng
      value: Mr ATHANE reported that at the end of 1986 and the beginning of 1987
        OIML had been in a difficult financial position because seventeen Member States
        had not paid their subscriptions for 1986, so that it had had to make extensive
        use of its reserve fund to meet its expenses and had had to restrict the latter
        as much as possible to the bare essentials. In the course of 1987 the position
        had improved, a large part of the arrears having been paid and also many States
        having paid their subscriptions for 1987 promptly.
