    date_effective:
      date: '1987-09-02'
      type: effective
    message:
    - spelling: eng
      value: The Committee instructed the Bureau to develop, using a model already
        presented and taking into account comments made during the meeting, a draft
        declaration of conformity of a pattern ; to take advice from states having
        already considered issuing certificates of this kind ; and to place this draft
        before the Presidential Council, accompanied by whatever comment is necessary,
        for transmission to the Committee at its next meeting.
