  - identifier: CIML/2017/17
    doi: "10.63493/resolutions/ciml201717"
    urn: "urn:oiml:doc:ciml:resolution:2017-17"
    subject: CIML
    title: "Requests that any future proposals for the development, revision or amendment of OIML Basic"
    dates:
    - start: '2017-10-10'
      kind: decision
    considerations:
    - type: noting
      message: |
        Noting the discussions of the Project Group on the revision of OIML B 6:2013 Directives for OIML technical work and the recommendations of the convener of the Project Group,
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: noting
      message: |
        Noting the comments made by its Members on the note prepared by the convener of the Project Group,
        Confirms that the rules set out in OIML B6 shall only apply to the development, revision or amendment of OIML Basic Publications if the CIML so decides for a particular Basic Publication,
      dates:
      - start: '2017-10-10'
        kind: effective
    actions:
    - type: requests
      message: |
        Requests that any future proposals for the development, revision or amendment of OIML Basic Publications should take the form of a project proposal submitted to the Committee for approval,
      dates:
      - start: '2017-10-10'
        kind: effective
    - type: requests
      message: |
        Requests that such proposals set out clearly
        - the proposed convenership,
        - the arrangements for appointing members of a Project Group to supervise the development,
        - the timetable to be followed by the project, which should allow for timely consultation by the project convener with the entire project group on all substantive matters, and should include the various stages of decision-making by the Project Group and by the CIML, and
        - the voting and administrative arrangements, which should follow the provisions of B 6-1 as closely as possible.
      dates:
      - start: '2017-10-10'
        kind: effective
