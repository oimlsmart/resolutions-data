  - identifier: CIML/2010/11
    subject: OIML Conference
    title: "Decides that after the election of the Vice-President during the current meeting, the CIML"
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations:
    - type: considering
      message: |
        Considering that Article XV of the Convention calls for the election of a President and a first and second Vice President and that, in case the President is absent or incapable, the first Vice-President shall temporarily assume the duties of the President, and
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: considering
      message: |
        Considering that Article XV does not deal with the case that the first Vice-President resigns or his mandate otherwise ceases before that of the second Vice-President,
      dates:
      - start: '2010-09-21'
        kind: effective
    actions:
    - type: decides
      message: |
        Decides that after the election of the Vice-President during the current meeting, the CIML will decide which of the two Vice-Presidents will be first Vice-President; and
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: instructs
      message: |
        Instructs the CIML President to prepare a proposal to be submitted to the 14th Conference in 2012 on the interpretation of Article XV in the event that the position of first Vice-President becomes vacant and the President is incapable of performing his duties.
      dates:
      - start: '2010-09-21'
        kind: effective
