  - identifier: CIML/2010/18
    subject: CIML
    title: Requests the secretariat of OIML TC 3/SC 2 to prepare a revised Draft Revision
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations:
    - type: noting
      message: |
        Noting that the Draft Revision of OIML D 16 Principles of assurance of metrological control had been submitted to the CIML for online ballot, but that it did not receive sufficient support to be approved,
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: considering
      message: |
        Considering the comments made by the Netherlands and Norway,
      dates:
      - start: '2010-09-21'
        kind: effective
    actions:
    - type: requests
      message: |
        Requests the secretariat of OIML TC 3/SC 2 to prepare a revised Draft Revision of OIML D 16 with the assistance of the Netherlands and Norway; and
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: instructs
      message: |
        Instructs the Bureau to submit this revised Draft Revision to direct CIML online approval.
      dates:
      - start: '2010-09-21'
        kind: effective
  - identifier: CIML/2010/19
    subject: CIML
    title: Resolves that a decision on the proposals shall be postponed until after the conclusions
    dates:
    - start: '2010-09-21'
      kind: decision
    considerations:
    - type: considering
      message: |
        Considering the proposals by its Member for Australia for a new project and a new (Sub)Committee on Conformity to Type (CTT), and
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: considering
      message: |
        Considering the comments received during the consultation of the members of the Presidential Council and the subsequent consultation of all CIML Members and relevant liaison organizations,
      dates:
      - start: '2010-09-21'
        kind: effective
    actions:
    - type: resolves
      message: |
        Resolves that a decision on the proposals shall be postponed until after the conclusions of a seminar on CTT, mentioned in Resolution No.15, have become available; and
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: instructs
      message: |
        Instructs the Bureau to facilitate an electronic working group, chaired by the Member for New Zealand, with the objective to prepare the program for that seminar, taking into account the issues raised in the comments received.
      dates:
      - start: '2010-09-21'
        kind: effective
