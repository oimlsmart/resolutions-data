  doi: 10.63493/resolutions/ciml200804
  urn: urn:oiml:doc:ciml:resolution:2008-04
  subject: OIML Conference
  title: The Committee decided to strike Cameroon and Ethiopia off the list of Member
    States
  dates:
  - start: '2008-10-28'
    kind: decision
  considerations: []
  actions:
  - type: decides
    message: |
      The Committee decided to strike Cameroon and Ethiopia off the list of Member States in application of Article XXIX of the Convention.
      The Committee further resolved that in application of Article XXIV of the Convention, the Conference would be requested to consider whether these countries should be granted the opportunity to reduce their debt over a period of time to be determined, in which case the Committee's decision would be suspended. Failing acceptance by the Conference, they would be struck off the list of Member States as decided by the Committee.
    dates:
    - start: '2008-10-28'
      kind: effective
