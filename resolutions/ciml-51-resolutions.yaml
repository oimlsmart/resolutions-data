    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 4: BIML matters'
    considerations:
    - type: considering
      message: 'Considering and bemoaning the unexpected passing away of former BIML
        Assistant Director Mr. Willem Kool,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    actions:
    - type: decides
      message: |
        Decides that the vacant position of a BIML Assistant Director be advertised after the 51st CIML Meeting, following the respective regulations set out in OIML B 7:2013 BIML Staff regulations, and OIML B 13:2004 Procedure for the appointment of the BIML Director and Assistant Directors,
        With a view that a new BIML Assistant Director be appointed at the 52nd CIML Meeting.
      date_effective:
        date: '2016-10-17'
        type: effective
  - language_code: fra
    title: 'Agenda Item 4: BIML matters'
    considerations:
    - type: considering
      message: |
        Considérant et déplorant le décès inattendu de l'Adjoint au Directeur du BIML
        Mr. Willem Kool,
      date_effective:
        date: '2016-10-17'
        type: effective
    actions:
    - type: decides
      message: |
        Décide qu'un poste vacant d'Adjoint au Directeur du BIML sera publié après la 51ème Réunion du CIML, conformément à la réglementation en vigueur énoncée dans le document OIML B 7:2013
        Statuts du Personnel du BIML, et dans le document OIML B 13:2004 Procédure pour la désignation du Directeur et des Adjoints au Directeur du BIML,
        En vue de la nomination d'un nouvel Adjoint au Directeur du BIML lors de la 52ème Réunion du CIML.
      date_effective:
        date: '2016-10-17'
        type: effective
  agenda_item: '4'
