      date_effective:
        date: '2016-10-17'
        type: effective
  agenda_item: '16'
- identifier:
  - prefix: CIML
    number: 2016/17
  doi: 10.63493/resolutions/ciml201617
  urn: urn:oiml:doc:ciml:resolution:2016-17
  dates:
  - date: '2016-10-17'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 17: Future meetings'
    considerations:
    - type: recalling
      message: 'Recalling its Resolution no. 2016/16,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    actions:
    - type: thanks
      message: |
        Thanks the chair and members of the CSPG for their work,
        Disbands the CSPG,
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: decides
      message: 'Decides to establish a provisional Management Committee (prMC) with
        immediate effect,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: requests
      message: 'Requests its first Vice-President to chair the prMC,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: requests
      message: 'Requests interested CIML Members, representatives from OIML Corresponding
        Members and representatives from Liaison Organizations to participate in the
        prMC, or to designate expert representative(s),

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: instructs
      message: 'Instructs the BIML to provide secretarial support to the prMC,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: confirms
      message: 'Confirmss that the prMC has the authority to act as the Management
        Committee for the purposes of approving OIML-CS Operational Documents, Procedural
        Documents, Guidance Documents, Template and Forms,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: requests
      message: 'Requests the prMC to identify potential improvements and amendment
        to OIML B xx Framework for the OIML Certification System (OIML-CS) for consideration
        at the 52nd CIML Meeting in 2017,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: instructs
      message: 'Instructs the prMC to take appropriate actions so that the OIML-CS
        may become effective 1 January 2018,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: requests
      message: 'Requests the prMC to provide a report on its activities at the 52nd
        CIML Meeting in 2017, with a view to the OIML-CS becoming effective 1 January
        2018.

        '
      date_effective:
        date: '2016-10-17'
        type: effective
  - language_code: fra
    title: 'Agenda Item 17: Future meetings'
    considerations:
    - type: recalling
      message: 'Rappelant sa Résolution no. 2016/16,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    actions:
    - type: thanks
      message: |
        Remercie le président et les membres du CSPG pour leur travail,
        Dissout le CSPG,
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: decides
      message: 'Décide de créer un Comité de Management provisoire (prMC) avec effet
        immédiat,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: requests
      message: 'Demande à son 1er Vice-Président de présider le prMC,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: requests
      message: 'Demande aux Membres du CIML, aux représentants des Membres Correspondants
        de l''OIML et aux représentants des Organisations en Liaison intéressés de
        participer au prMC, ou de désigner un(e) représentant(e) expert(e),

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: charges
      message: |
        Charge le BIML de fournir un soutien de secrétariat au prMC,
        Confirmme que le prMC a l'autorité d'agir en tant que Comité de gestion aux fins d'approuver les Documents Opérationnels, les Documents de Procédures, les Documents d'Orientation, les Modèles et les Formulaires de l'OIML-CS,
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: requests
      message: 'Demande au prMC d''identifier des améliorations et amendements potentiels
        à l''OIML B xx Cadre pour le Système de Certification OIML (OIML-CS) pour
        examen lors de la 52ème Réunion du CIML en 2017,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: charges
      message: 'Charge le prMC de prendre les mesures appropriées pour que l''OIML-CS
        puisse entrer en vigueur le 1er Janvier 2018,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: requests
      message: 'Demande au prMC de présenter un rapport sur ses activités lors de
        la 52ème Réunion du CIML en 2017, en vue de l''entrée en vigueur de l''OIML-CS
        le 1er Janvier 2018.

        '
      date_effective:
        date: '2016-10-17'
        type: effective
  agenda_item: '17'
