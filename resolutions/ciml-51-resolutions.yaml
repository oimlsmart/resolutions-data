    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 13: Review of the Resolutions of the 15th Conference'
    considerations:
    - type: recalling
      message: 'Recalling its Resolution no. 2013/9, setting up an Advisory Group
        to carry out wide consultation, to seek suggestions and to build up links
        with other bodies with an interest in promoting the economic development of
        countries and economies with emerging metrology systems,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    actions:
    - type: notes
      message: 'Notes the report of the meeting of the Advisory Group held on 17 October
        2016,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: confirms
      message: 'Confirms that it wishes the Advisory Group to continue as the main
        focus of activities relating to matters of interest to countries and economies
        with emerging metrology systems,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    - type: renews
      message: 'Renews the appointment of Mr. Pu Changcheng to act as Chair of the
        Advisory Group.

        '
      date_effective:
        date: '2016-10-17'
        type: effective
  - language_code: fra
    title: 'Agenda Item 13: Review of the Resolutions of the 15th Conference'
    considerations:
    - type: recalling
      message: 'Rappelant sa Résolution no. 2013/9, relative à la mise en place d''un
        Groupe Consultatif pour mener de larges consultations, recueillir des suggestions
        et développer des liens avec d''autres organismes intéressés par la promotion
        du développement économique de pays et d''économies dont le système de métrologie
        est émergent,

        '
      date_effective:
        date: '2016-10-17'
        type: effective
    actions:
    - type: notes
      message: |
        Prend note du rapport de la réunion du Groupe Consultatif tenu le 17 octobre 2016,
        Confirmme son souhait que le Groupe Consultatif continue d'être au centre des activités relatives aux problèmes intéressant les pays et les économies dont le système de métrologie est émergent,
        Renouvelle la nomination de Mr. Pu Changcheng à la Présidence du Groupe Consultatif.
      date_effective:
        date: '2016-10-17'
        type: effective
  agenda_item: '13'
- identifier:
  - prefix: CIML
    number: 2016/14
  doi: 10.63493/resolutions/ciml201614
  urn: urn:oiml:doc:ciml:resolution:2016-14
  dates:
  - date: '2016-10-17'
    type: decided
  localizations:
  - language_code: eng
    title: 'Agenda Item 14: Liaisons'
    considerations: []
    actions:
    - type: requests
      message: |
        Requests its President and the Chair of the Advisory Group to prepare a draft "B" publication, developed from the current terms of reference, for consideration, and if possible adoption, at its 52nd Meeting,
        Urges each of the Regional Legal Metrology Organizations to nominate a representative to serve on the Advisory Group,
        Invites other Members of the Committee with an interest in matters relating to countries and economies with emerging metrology systems to volunteer to serve on the Advisory Group.
      date_effective:
        date: '2016-10-17'
        type: effective
  - language_code: fra
    title: 'Agenda Item 14: Liaisons'
    considerations: []
    actions:
    - type: requests
      message: |
        Demande à son Président et au Président du Groupe Consultatif de préparer un projet de publication "B", développé à partir du mandat actuel, pour examen, et si possible pour une adoption, à sa 52ème Réunion,
        Insiste sur la nécessité pour chaque Organisation Régionale de Métrologie Légale de nommer un représentant pour faire partie du Groupe Consultatif,
        Invite les autres Membres du Comité ayant un intérêt pour les questions relatives aux pays et aux économies dont le système de métrologie est émergent à se porter volontaire pour faire partie du Groupe Consultatif.
      date_effective:
        date: '2016-10-17'
        type: effective
