    title: 'Agenda Item 10: PAYS EN DÉVELOPEMENT'
    subject: "(The CIML)"
    actions:
    - type: notes
      date_effective:
        date: '1995-10-25'
        type: effective
      message: 'M. Kochsiek, responsable du suivi des activités de développement au
        nom du Conseil de Présidence, donne un rapport sur le premier Symposium OIML
        sur les activités métrologiques dans les pays en développement, organisé par
        le SBTS et le BIML, auquel ont participé plus de 100 personnes en provenance
        de 34 pays. Vingt-trois conférences ont été dispensées sur quatre thèmes:
        (i) sujets de politique générale; (ii) services métrologiques nationaux; (iii)
        coopération en métrologie aux niveaux national, régional, et international;
        et (iv) sujets de métrologie légale (formation, traçabilité, etc.).'
