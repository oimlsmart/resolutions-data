    message:
    - spelling: fra
      value: M. Athané rappelle que les estimations financières pour 1995 ont été
        envoyées aux Membres du CIML à la fin de 1994 et indique que, pour l'instant,
        il n'y a rien à ajouter à ces estimations, mis à part le fait que certaines
        dépenses (par exemple, la publication du document de politique à long terme
        et de la brochure générale d'information), qui n'avaient pas été estimées
        précisément à la fin de 1995, ont été effectuées en cours d'année; le Président
        du CIML et son Conseil ont été cependant tenus informés de ces dépenses avant
        leur engagement; il est aussi fait remarquer que ces dépenses sont compensées
        par des recettes supplémentaires (par exemple, les contributions des nouveaux
        États Membres).
