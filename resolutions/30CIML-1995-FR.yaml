    title: 'Agenda Item 5: COMITÉS TECHNIQUES ET SOUS-COMITÉS'
    subject: "(The CIML)"
    actions:
    - type: notes
      date_effective:
        date: '1995-10-25'
        type: effective
      message: M. Chappell, responsable du suivi des activités techniques pour le
        compte du Conseil de Présidence, présente un rapport d'activité des comités
        techniques et souscomités. Il fait remarquer que le passage de l'ancienne
        structure (Secrétariats Pilotes et Rapporteurs) à celle actuelle s'est opéré
        avec succès et n'a pas ralenti significativement le déroulement du travail,
        et ajoute que les nouvelles procédures ont apporté une amélioration appréciable
        en permettant de se préoccuper des priorités et d'eliminer des thèmes de travail
        qui n'étaient pas, ou plus, d'intérêt pour la majorité des États Membres.
        Le BIML a été en mesure de participer à presque toutes les réunions inaugurales
        des nouveaux TC/SC et cela a permis une application correcte immédiate des
        Directives pour les travaux techniques. Concernant ces Directives, M. Chappell
        indique qu'elles ont généralement amélioré les conditions d'exercice des responsabilités
        des secrétariats des TC/SC. Il convient également de noter que les travaux
        qui n'ont pas été achevés avant la mise en place de la nouvelle structure,
        ont été poursuivis de manière adéquate. Le volume global de travail est satisfaisant,
        comme le montre le nombre de projets approuvés par le CIML en 1994. Cela s'est
        d'ailleurs traduit par une sérieuse surcharge de travail pour le BIML qui
        poursuit encore le travail de publication de tous ces nouveaux textes.
