    - spelling: fra
      value: Le Comité International de Métrologie Légale
    - spelling: fra
      value: Le Comité a approuvé le compte rendu de sa vingt-neuvième réunion sans
        modification.
    - spelling: fra
      value: Le Comité a pris note de l'adhésion, en 1995, du Kazakhstan comme nouvel
        Etat Membre de l'OIML, et du Mozambique, de la Thaïlande et de l'Uruguay comme
        nouveaux Membres Correspondants, et a accueilli la délégation de Macédoine
        pour sa première participation à une réunion du CIML.
    - spelling: fra
      value: Le Comité a également pris note d'informations concernant les adhésions
        attendues et la possibilité pour certains Membres Correspondants qui sont
        maintenant très en retard dans le paiement de leur abonnement à l'OIML, d'être
        supprimés de la liste des Correspondants.
    - spelling: fra
      value: Le Comité a approuvé le rapport comptable pour 1994 et chargé le Président
        du CIML et le Directeur du BIML de le soumettre à la Dixième Conférence.
    - spelling: fra
      value: Le Comité a pris note d'informations sur la situation financière de l'Organisation
        en 1995; il a demandé aux Etats Membres en retard dans le paiement de leur
        contribution à l'OIML de payer leur dû aussi rapidement que possible.
    - spelling: fra
      value: Le Comité a renouvelé le contrat du Directeur du BIML pour une période
        de 5 ans à compter du 1er janvier 1996.
    - spelling: fra
      value: Le Comité a prolongé le contrat de M. Vichenkov, Adjoint au Directeur,
        pour une période de dix- huit mois, c'est-à-dire jusqu'au 30 novembre 1997.
    - spelling: fra
      value: Le Comité a pris note du fait qu'un nouvel Adjoint au Directeur sera
        élu lors de la 31e réunion du CIML.
    - spelling: fra
      value: Le Comité a accepté, comme mesure temporaire, la proposition du Directeur
        du BIML d'indexer les salaires des agents du BIML sur l'indice officiel des
        prix calculé par l'Institut de la Statistique et des Études Économiques (INSEE)
        en remplacement de l'ancien indice OCDE, les règles pratiques d'indexation
        restant les mêmes. Le Comité a demandé au Directeur du BIML de rechercher
        l'existence d'autres indices, d'examiner les solutions adoptées par d'autres
        institutions internationales, et de faire rapport à ce sujet lors d'une prochaine
        réunion.
