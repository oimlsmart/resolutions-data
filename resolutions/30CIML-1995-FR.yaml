    subject: "(The CIML)"
    actions:
    - type: notes
      date_effective:
        date: '1995-10-25'
        type: effective
      message: 'M. Athané rappelle au Comité l''adhésion comme État Membre du Kazakhstan;
        d''autre part, trois pays ont adhéré comme Membres correspondants: le Mozambique,
        la Thaïlande et l''Uruguay. Il ajoute que divers contacts ont été établis:
        avec le South Africa Bureau of Standards, signe d''une possible prochaine
        adhésion à l''OIML de l''Afrique du Sud; avec le Mexique (pour un éventuel
        changement de son statut de Membre Correspondant à État Membre) et avec quelques
        autres pays qui pourraient devenir États Membres ou Membres Correspondants.'
