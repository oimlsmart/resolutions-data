      date: '1995-10-25'
      type: effective
    message:
    - spelling: fra
      value: M. Benkirane, Président du Conseil de Développement de l'OIML, fait le
        rapport de cette réunion tenue la demie-journée suivant le Symposium. En conclusion
        de cette réunion, un bilan détaillé a été soumis au Comité, qui l'a approuvé.
- identifier:
  - prefix: CIML
    number: 1995/10
  doi: 10.63493/resolutions/ciml199510
  urn: urn:oiml:doc:ciml:resolution:1995-10
  agenda_item: '10'
  dates:
  - date: '1995-10-25'
    type: decided
  title:
  - spelling: fra
    value: 'Agenda Item 10: PAYS EN DÉVELOPEMENT'
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    date_effective:
      date: '1995-10-25'
      type: effective
    message:
    - spelling: fra
      value: Le Comité prend note de rapports présentés par MM. Kochsiek et Benkirane
        sur le SYMPOSIUM OIML SUR LES ACTIVITÉS MÉTROLOGIQUES DANS LES PAYS EN DÉVELOPEMENT
        et sur la réunion du CONSEIL DE DÉVELOPEMENT tenus du 23 au 25 octobre 1995
        à Pékin.
    - spelling: fra
      value: Le Comité exprime son appréciation pour les activités effectuées par
        le BIML et par le Bureau d'État de Supervision Technique de Chine pour l'organisation
        du Symposium qui s'est focalisé sur les questions politiques et stratégiques
        liées à la métrologie légale, ses aspects économiques, la coopération internationale
        et l'aide aux pays dans l'établissement et le développement de services nationaux
        de métrologie.
    - spelling: fra
      value: Le Comité exprime ses remerciements à tous les Membres de l'OIML et institutions
        en liaison qui ont apporté leur contribution au Symposium.
    - spelling: fra
      value: Le Comité prend également note des actions diverses menées en 1995 en
        faveur des pays en développement, y compris un atelier de formation DÉTERMINATION
        DU VOLUME DES RÉSERVOIRS DE STOCKAGE FIXES organisé par l'Allemagne avec la
        participation du BIML, le séminaire de formation LA MÉTROLOGIE AU SERVICE
        DU DÉVELOPPEMENT ÉCONOMIQUE co-organisé par la France, la CEE/ONU, la Commission
        de l'Union Européenne et l'OIML, un cours de formation en métrologie légale
        tenu à Cuba, et autres actions de soutien au programme du Conseil de Développement
        de l'OIML.
    - spelling: fra
      value: Le Comité demande au BIML et au Conseil de Développement de poursuivre
        leurs activités en matière de métrologie légale, en particulier en encourageant
        l'organisation de cours et de séminaires de formation, en organisant la disponibilité
        de manuels, brochures et autres moyens de formation, en distribuant des informations
        sur les soutiens techniques et financiers auxquels peuvent recourir les pays
        en développement, et en maintenant des contacts avec les institutions internationales
        et régionales concernées. L'utilisation de nouveaux moyens d'information et
        de formation, par exemple, les bases de données à accès direct ou les CD-ROM
        et CD-ROM interactifs, devraient être pris en considération et le BIML est
        invité à étudier, en liaison avec les TC/SC appropriés et le Conseil de Développement,
        la possibilité d'utiliser ces moyens afin d'accroître la disponibilité de
        matériaux d'information et de formation pour tous les pays.
    - spelling: fra
      value: Le Comité exprime son appréciation pour les activités effectuées sous
        le leadership de M. Benkirane, Maroc, Président du Conseil de Développement
        de 1988 à 1995.
    - spelling: fra
      value: Le Comité prend note de l'élection de M. Putera, Membre du CIML pour
        l'Indonésie, en tant que Président du Conseil de Développement pour la période
        1995-1997.
    - spelling: fra
      value: Le Comité prend note d'un rapport sur les activités du BIML, dont un
        résumé sera publié dans le numéro d'avril 1996 du Bulletin OIML.
    - spelling: fra
      value: Le Comité ne voit pas d'objection à ce que le logo déjà utilisé pour
        le Bulletin, la brochure d'information générale et le document de politique
        à long terme, le soit aussi à l'avenir dans toutes les publications OIML.
