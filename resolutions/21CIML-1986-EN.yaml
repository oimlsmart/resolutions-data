  title:
  - spelling: eng
    value: 'Agenda Item 13: OIML CERTIFICATION'
- identifier:
  - prefix: CIML
    number: 1986/13.1
  doi: 10.63493/resolutions/ciml198613.1
  urn: urn:oiml:doc:ciml:resolution:1986-13.1
  agenda_item: '13.1'
  dates:
  - date: '1986-04-16'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 13.1: Various activities'
  actions:
  - type: notes
    date_effective:
      date: '1986-04-16'
      type: effective
    message:
    - spelling: eng
      value: Mr. PETIK recalls that the question of mutual recognition of metrological
        controls started to be studied about 10 years ago. An ad hoc group was instructed
        to study the methods of operation of an OIML certification system. At the
        end of the work of this ad hoc group the Committee noted that for economic
        and political reasons beyond its control such a system could not be set up
        at present. Waiting for this to become possible, SP2-Sr4 under the responsibility
        of the Bureau was instructed to study the possibility of punctual actions
        which could favor the eventual setting up of an OIML certification system.
- identifier:
  - prefix: CIML
    number: 1986/13.3
  doi: 10.63493/resolutions/ciml198613.3
  urn: urn:oiml:doc:ciml:resolution:1986-13.3
  agenda_item: '13.3'
  dates:
  - date: '1986-04-16'
    type: decided
  title:
  - spelling: eng
    value: 'Agenda Item 13.3: Directives for future activities'
  actions:
  - type: notes
    date_effective:
      date: '1986-04-16'
      type: effective
    message:
    - spelling: eng
      value: Mr. ATHANE recalls that one of the actions proposed by SP 2-Sr4 (reference
        to OIML in the national pattern approval decisions) was not accepted by the
        Committee and it may therefore be appropriate to reflect on this subject.
        Furthermore, it may be appropriate to examine the possibility of a common
        action with IEC and ISO whenever there exist simultaneous OIML RI's/DI's and
        ISO/IEC Standards for the same category of instruments. BIPM could also be
        associated whenever certification is based on measurement standards traceable
        to those of BIPM.
