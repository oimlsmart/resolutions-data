    value: 'Agenda Item 3.3: Examination of the financial estimates for 1986'
  actions:
  - type: notes
    date_effective:
      date: '1986-04-16'
      type: effective
    message:
    - spelling: eng
      value: Mr. ATHANE presents these estimates which were already submitted to the
        Committee Members by correspondence. It appears that the actual expenses for
        most of the budgetary lines, will be equal to or even less than the amounts
        authorized by the 7th Conference if recalculated to take into account the
        reduced inflation in France. For certain budgetary lines corresponding to
        the expenses which are not evenly distributed over the four years of the financial
        period, the comparison is not so easy and certain of those which exceed the
        authorization are explained. It is evident however than the receipts are noticeably
        greater than estimated by the Conference.
