      date: '1986-04-16'
      type: effective
    message:
    - spelling: eng
      value: The Committee is in agreement with the proposal of Mr. BIRKELAND to hold
        the next Committee meeting in Paris, September 1987.
    - spelling: eng
      value: The Committee indicates its agreement by acclamation and Messrs BIRKELAND
        and ISSAEV return to their places at the Presidential table.
    - spelling: eng
      value: The Committee took note of the report on the anticipated accessions of
        new Member States and Corresponding Members, as well as on the situation of
        two Corresponding Members (Fiji and Jamaica) considered as no longer being
        part of the Organization because of non-payment of their subscriptions.
    - spelling: eng
      value: The Committee took note of the accountant report for 1985 and instructed
        its President and the Director of the Bureau to submit it for approval during
        the 22nd CIML meeting.
    - spelling: eng
      value: The Committee took note of the financial estimates for 1986.
    - spelling: eng
      value: The Committee extended the contract of Mr PETIK, Assistant Director,
        for 2 years. In addition, it took note of the information concerning the replacement
        for Mr TURSKI, Consultant Engineer, who will take his retirement in March
        1987.
    - spelling: eng
      value: The Committee took note of the report on the implementation of the decisions
        of the Seventh Conference.
    - spelling: eng
      value: 'The Committee provisionally adopted two draft International Recommendations
        :'
    - spelling: eng
      value: 'The Committee took note of the report on the publication of the brochure:
        《 Guide for CIML Members 》。'
    - spelling: eng
      value: The Committee took note of the report presented by the Chairman of the
        Development Council and approved the draft work program for 1986-1988.
    - spelling: eng
      value: The Committee took note of the reports on the relations between OIML
        and various International and Regional Institutions and requested the Bureau
        to continue its activities in this field.
    - spelling: eng
      value: The Committee took note of and expressed its satisfaction with the report
        on the OIML Bulletin and encouraged the Bureau to continue its efforts.
    - spelling: eng
      value: The Committee took note of and expressed its satisfaction with the information
        on the technical seminar held in April 1985 and the intentions of the Bureau
        to organize another seminar in 1987.
    - spelling: eng
      value: 'The Committee adopted the International Document "Guidelines for bi-
        and multilateral arrangements on the recognition of : test results - pattern
        approvals - verifications ".'
    - spelling: eng
      value: The Committee took note of the report on the activities of the Bureau
        during the period October 1984 - March 1986.
    - spelling: eng
      value: The Committee took note of the report presented by the Delegation of
        Australia and the Bureau on the preparations for the Eighth Conference, which
        will take place in Sydney from 24 to 28 October 1988.
