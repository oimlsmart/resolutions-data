  title:
  - spelling: eng
    value: 'Agenda Item 15: PREPARATION OF THE 8TH CONFERENCE'
  actions:
  - type: notes
    date_effective:
      date: '1986-04-16'
      type: effective
    message:
    - spelling: eng
      value: Mr. HARVEY confirms the invitation of the Australian Government for October
        1988. The year 1988 is a very significant year since it commemorates the bicentary
        of European settlement in Australia. As indicated in 1984 by Mr. PETRY, the
        former Committee Member for Australia, arrangements have already been made
        for the period from 24 to 28 October 1988 (hotel reservations and conference
        room, receptions, lunches for the delegates, etc.). At the same time, the
        problems of translation, of secretariats and of technical visits is being
        studied and information on touristic programmes will also be given to the
        delegates and accompanying persons.
