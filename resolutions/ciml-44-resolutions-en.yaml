  - identifier: CIML/2009/25
    doi: "10.63493/resolutions/ciml200925"
    urn: "urn:oiml:doc:ciml:resolution:2009-25"
    subject: OIML Conference
    title: "The Committee noted that: - the increasing importance of prepackaged foods and beverages in"
    dates:
    - start: '2009-10-27'
      kind: decision
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee noted that:
        - the increasing importance of prepackaged foods and beverages in global trade now accounts for over 75 % of agri-foods exports;
        - developing country exports are particularly disadvantaged by having to conform to a multiplicity of international requirements; and
        - the review of the longstanding OIML R 79 arising from the World Wine Trade Group Labeling Agreement and the 2006 OIML seminar on prepackaging have not resulted in an exemption for wine labeling.
        The Committee recommended that CIML Members bring this resolution to the attention of their national WTO-TBT enquiry point.
      dates:
      - start: '2009-10-27'
        kind: effective