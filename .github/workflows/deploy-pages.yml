name: Deploy Pages

# Deploys the Vue/Vite browser build to GitHub Pages. The deploy job
# depends on validate (Ruby) and build (Node); both must pass before
# the artifact is uploaded and handed to actions/deploy-pages.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install poppler (pdftotext)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Validate resolution YAMLs (structural)
        run: ruby scripts/validate_yaml.rb

      - name: Validate meeting YAMLs (edoxen v2 schema)
        run: |
          bundle install
          bundle exec edoxen validate-meetings 'meetings/*.yaml'

      - name: Validate resolution YAMLs (edoxen v2 schema)
        run: bundle exec edoxen validate 'resolutions/*.yaml'

      - name: Cross-check schema enum parity
        run: bundle exec ruby scripts/check_schema_sync.rb

      - name: Cross-check resolution ↔ meeting join
        run: ruby scripts/check_meeting_join.rb

      - name: Run Ruby specs
        run: bundle exec rspec spec/

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './browser/package-lock.json'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        working-directory: ./browser
        run: npm ci

      - name: Build
        working-directory: ./browser
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './browser/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        # Pages deploy can take >10 min when githubstatus.com reports
        # degraded performance on Pages. The default timeout is 10 min
        # (600000 ms), which surfaces as a false "failure" even when
        # the backend deployment actually succeeds. Lift it to 30 min
        # so transient Pages slowness doesn't break CI.
        with:
          timeout: 1800000
