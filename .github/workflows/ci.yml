name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate-yaml:
    name: YAML schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: scripts/specs
      - name: Validate every resolution YAML against the edoxen schema
        working-directory: scripts/specs
        run: bundle exec rspec yaml_validation_spec.rb --format documentation

  unit-tests:
    name: Transform + domain unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: browser/package-lock.json
      - name: Install browser deps
        working-directory: browser
        run: npm ci
      - name: Run unit tests
        working-directory: browser
        run: npm test

  build:
    name: SSG build smoke test
    runs-on: ubuntu-latest
    needs: [validate-yaml, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: browser/package-lock.json
      - name: Install browser deps
        working-directory: browser
        run: npm ci
      - name: Build the SSG site
        working-directory: browser
        run: npm run build
      - name: Verify sitemap exists
        run: test -f browser/dist/sitemap.xml && echo "sitemap OK"
      - name: Verify legacy redirects emitted
        run: |
          count=$(find browser/dist/meetings -name "index.html" -path "*-en/index.html" | wc -l)
          echo "legacy redirects: $count"
          test "$count" -gt 0
