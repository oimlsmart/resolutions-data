# See TODO.work/01-discovery.md for the full discovery table.
#
# Field reference:
#   kind         : ciml | conference
#   meeting      : CIML meeting number (kind=ciml)
#   session      : Conference session number (kind=conference)
#   year         : year of the meeting
#   date_start   : ISO 8601 meeting start date (from OCR cover page)
#   date_end     : ISO 8601 meeting end date (from OCR cover page)
#   city         : host city
#   country_code : ISO 3166-1 alpha-2 country code
#   doc_kind     : decisions | resolutions | decisions-joint-ciml-dc
#   lang         : en | fr | bilingual
#   title        : human-readable title (English gloss)
#   url          : canonical OIML URL
#   slug         : normalized local filename (without .pdf extension)

