# OIML official EN→FR agenda title mapping.
#
# These translations cover the recurring agenda section titles used across
# CIML Meeting and OIML Conference agendas. Sourced from the parallel
# French resolutions PDFs (reference-docs/ocr/md/*-fr.md) and from the
# French-side OIML Bulletin sections. Titles not in this map are left
# untouched — the script is conservative and only fills `spelling: fra`
# slots when a confident match exists.
#
# Format:
#   "English title": "Titre français"
#
# Match is exact (case-sensitive) after both sides are .strip'd. The
# script writes a `spelling: fra` entry only when one is missing OR
# when the existing value is identical to the English (a known OCR
# pipeline artefact).

