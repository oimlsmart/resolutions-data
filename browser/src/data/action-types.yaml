# Action / consideration type color map + localized labels.
#
# Semantic types from the parser (approves, resolves, notes, ...) map
# to (bg, text) color pairs used by the resolution detail page, plus
# localized labels so the chip text can render in the current UI
# language. Labels are keyed by ISO 639-3 code (eng, fra) for forward
# compatibility — adding a third language is one new key per type.
#
# Default fallback is the special key `_default`.
actionTypeColors:
  _default:
    bg: '#64748b'
    text: '#ffffff'
    labels:
      eng: Other
      fra: Autre
