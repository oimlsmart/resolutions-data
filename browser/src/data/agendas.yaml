# Per-meeting agenda items.
#
# This file is the single source of truth for what the OIML mini-sites
# list under each agenda heading. The format mirrors the printed table:
# each top-level item has a number (1, 2, ..., 21), a description,
# and an optional sub_items list carrying the dotted children
# (11.1, 11.2, ...).
#
# Resolution resolutions[*].agenda_item matches against AgendaItem.number.

agendas:
  - source_file: ciml-58-resolutions
    source_url: https://58ciml.oiml.org/ciml.html
    items:
      - number: "1"
        description: Opening remarks and roll call
        sub_items: []
      - number: "2"
        description: Adoption of the agenda
        sub_items: []
      - number: "3"
        description: "Approval of the minutes of the 57th CIML Meeting"
        sub_items: []
      - number: "4"
        description: "Report by the CIML President"
        sub_items: []
      - number: "5"
        description: "CIML First Vice-President (2024–2030)"
        sub_items: []
      - number: "6"
        description: "Presentation by the candidate for CIML Second Vice-President (2023–2029)"
        sub_items: []
      - number: "7"
        description: "Report by the BIML Director on BIML matters and activities"
        sub_items: []
      - number: "8"
        description: "Renewal of the contract of Mr Anthony Donnellan, BIML Director"
        sub_items: []
      - number: "9"
