# IATA city codes -> localized city names (EN/FR).
#
# Use the 3-letter IATA city code as the canonical id when one exists
# (BER for Berlin, CPT for Cape Town, etc.). For cities without an IATA
# code, fall back to a stable synthetic code (the first 3 letters of
# the English name, uppercased).
#
# Adding a city: just add a new entry — venues.ts reads by code at
# runtime, and manifests store `city:` as the IATA code so the lookup
# is direct.
cities:
  BER:
    en: Berlin
    fr: Berlin
  LYO:
    en: Lyon
    fr: Lyon
  CPT:
    en: Cape Town
    fr: Le Cap
  SHA:
    en: Shanghai
    fr: Shanghai
