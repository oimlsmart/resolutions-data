# City localisation data.
#
# `citiesFr`: English city name → French translation, only for cities
# whose French name differs. Most city names are identical in EN/FR.
#
# `unlocodeToCity`: UN/LOCODE (5-char code, e.g. "FRPAR") → English city
# name. Meeting YAMLs from `scripts/generate_meetings.rb` emit UN/LOCODE
# in the `city` field; the UI resolves it via this table so users see
# "Paris" instead of "FRPAR".
