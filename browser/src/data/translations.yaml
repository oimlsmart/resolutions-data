  about.actionTypesDesc:
    en: Every resolution is composed of typed actions that categorize what the committee decided to do (e.g., requesting an action, approving a document, or thanking a host). This semantic typing allows for advanced filtering and analysis of the committee's historical activities.
    fr: Chaque résolution est composée d'actions typées qui catégorisent la décision du comité (par exemple, demander une action, approuver un document ou remercier un hôte). Ce typage sémantique permet un filtrage et une analyse avancés des activités historiques du comité.
