    script: Latn
    title: b The situation of one secretariat
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Mr BIRKELAND reminded Members that the secretariat SP 30-Sr 1 should
        have revised Recommendation R 54 on the pH scales of aqueous solutions to
        align it with the IUPAC Recommendation. However, the Recommendation not having
        yet been so revised despite repeated reminders from the Bureau, the latter
        had been obliged to suspend the work of SP 30-Sr 1. It was noted that it had
        not yet been possible to hold the projected meeting between experts of IUPAC
        and of OIML, and that the experts were not unanimously in favour of IUPAC''s
        decisions. The Committee decided to postpone discussion of this matter, in
        particular whether to confirm or cancel R 54, until its next meeting.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    approvals: []
