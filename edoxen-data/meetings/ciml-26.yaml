  - language_code: eng
    script: Latn
    title: 1 Procedures for the technical work of OIML
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Mr BIRKELAND introduced the third draft of the Procedures for the
        technical work of OIML (part one of the Directives being developed) and made
        clear his intention to allow a wide discussion of the subject because of its
        extreme importance for OIML. The existing working methods were nearly twenty
        years old, and even though they had given a decisive thrust to the work, they
        had shown some deficiencies. Rather than revise them it had appeared to be
        preferable to develop new work procedures, taking into account the developments
        in common in ISO and IEC. Two successive drafts had been developed by the
        Bureau and discussed by the Presidential Council, which had finally asked
        the Bureau to prepare a third draft for discussion at Committee level. As
        indicated in the accompanying explanatory paper, the third draft could, depending
        on the Committee''s reaction, either be adopted immediately subject to editorial
        revision, or be revised more fundamentally for resubmission to the Committee
        for adoption, or be rejected by the Committee, in which case it would be necessary
        to start again practically from scratch.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    approvals: []
