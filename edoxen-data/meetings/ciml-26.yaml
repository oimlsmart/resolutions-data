    title: 1 OIML Bulletin
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Mr THULIN spoke about the Bulletin, for which he was responsible,
        and his difficulties in obtaining technical articles other than papers given
        at various technical seminars, which had been the Bulletin''s mainstay. He
        also pointed out that a great effort had been made to increase the amount
        of information about Member States, meetings on metrology, books and journals
        on the subject, etc. He regretted that the contributions came always from
        the same small group of countries.

        '
      dates:
