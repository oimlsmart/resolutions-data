    title: 2 Drafting and presentation of OIML International Recommendations
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Mr BIRKELAND indicated that the matter was independent of the Procedures
        and that it had been the subject, at CIML''s request, of preparatory work
        by the Bureau, discussions within the Presidential Council, followed by consultation
        of the Members of CIML, before arriving at the final draft submitted to CIML
        for its approval. If CIML''s decision was favourable, the Guide could be brought
        into use straight away.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    approvals: []
