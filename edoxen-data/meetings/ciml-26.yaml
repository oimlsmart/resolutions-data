    script: Latn
    title: 3 Relations between OIML and the industries manufacturing measuring instruments
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'The Committee noted the content of a letter from CECIP (Comité Européen
        des Constructeurs d''Instruments de Pesage - European committee of weighing-machine
        manufacturers), in which the European manufacturers indicated their intention
        to urge their national authorities to put OIML Recommendations into effect
        as soon as they were published, and asking OIML to urge its Member States
        to associate manufacturers with the work of OIML, whether in national working
        groups or in national delegations at meetings. OIML was also asked to insist
        that Recommendations be written in terms of the metrological performance to
        be achieved, and not to include design requirements, because the latter could
        be a brake on innovation and impede progress.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee accepted Germany''s invitation to hold its twenty-eighth
        meeting in Berlin in 1993.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: approves
      message: 'The Committee approved the minutes of the Twenty-fifth CIML meeting
        without modification.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of the interest shown by certain countries
        in joining OIML as Member States or Corresponding Members (South Africa, Argentina,
        Mexico) or to rejoin OIML (Iran).

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of information given orally about the situation
        of a Member State that was in arrears in its contributions to OIML. Because
        assurance had been given during the meeting that a part of the arrears would
        be paid quickly, the Committee did not think that measures against it should
        be taken for the time being.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: approves
      message: 'The Committee approved the Auditor''s report for 1990 and instructed
        its President and the Director of the Bureau to submit it to the Ninth Conference.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee considered the financial situation of the Organisation
        in 1991 and took note of a forecast of the likely expenditure in 1992, given
        orally.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee elected as Assistant Director, in place of Mr Thulin:
        Mr P. DEGAVRE, Belgium, from 1st October 1992.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of some general information about the current
        and future employment of staff at the Bureau.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee received the information provided by the BIML on the
        production and distribution of literature and information on the OIML Certificate
        System, including the use of the Bulletin to provide such information periodically.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee also received information provided by certain Members
        of the Committee on the application of the System at the national level (informing
        manufacturers concerned, appointment of issuing authorities, etc.).

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee was then informed of the forthcoming issue of the first
        OIML Certificates (with regard to the revised R 76).

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee received reports from some of its Members on the revision
        of existing Recommendations relative to their applicability to the System.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee also took note of opinions expressed by some of its
        Members on the priorities to be observed in the development of Recommendations
        to which the System should be applicable.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of opinions expressed by some of its Members
        on the possible ways in which the System might develop.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee expressed its agreement that the System should continue
        to operate in its present form until the next meeting of the Committee, at
        which an ad hoc group could be established for the purpose of revising the
        texts on which the System is based.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of the generally favourable opinion expressed
        by its Members on the third draft "Procedures for the technical work of OIML".
        It noted, however, that the numerous comments expressed at the meeting showed
        the need to review the text before it would be approved.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee also took note of the need to revise the "Guide for
        members of CIML", and instructed the Bureau to proceed to this revision under
        the guidance of the Presidential Council.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: decides
      message: 'The Committee decided that the draft "Guide to the drafting and presentation
        of OIML International Recommendations" could be considered as approved and
        could be published after final editing to take account of comments made orally
        at the meeting and additional comments that some Members of CIML would like
        to contribute in writing in the near future.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: instructs
      message: 'The Committee instructed the Bureau to invite comments and to proceed
        to final drafting and publication.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of the generally favourable opinions expressed
        by its Members on a preliminary proposal for the new work structures to be
        established for the application of the new procedures.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee asked its Members to send their comments on this proposal
        to the Bureau before 1991.12.31 so that a report might be submitted to the
        Presidential Council.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee was aware that the new structures would have to be in
        place for 1993.1.1 and that consequently the question of the division of the
        Technical Committees into Subcommittees (not yet dealt with in the Bureau''s
        original proposal) would have to be resolved in sufficient time.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of the document "State of progress of the
        work of OIML Secretariats" and of information on the comparison between the
        actual state of progress and the forecasts in the work programme for 1989-1992.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee allocated the responsibility of vacant Secretariats
        as follows:

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of information on the work of the Secretariat
        SP 30-Sr 1 "pH-metry et ionometry" and on the discrepancies between Recommendation
        R 54 and IUPAC recommendations. Since a meeting between OIML and IUPAC experts
        was planned the Committee decided to postpone the study of that matter to
        its next meeting.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: approves
      message: 'The Committee approved for immediate publication, and then presentation
        to the Ninth Conference for formal sanction, the following International Recommendations:

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of oral reports on the relations between OIML
        and various institutions: bodies of the Metre Convention, ISO and IEC (in
        particular, work of ISO/TAG 4 on vocabulary and uncertainties) and metrological
        European bodies.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of a report on the organization by Germany
        and BIML of a training course on verification of weighing instruments for
        which the travel expenses of four trainees were paid from the OIML Development
        Council budget.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee agreed that BIML participate again in a second similar
        course that Germany will organize in 1992 and that the travel expenses of
        two trainees be paid by OIML.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee also took note of information on courses organized by
        Germany and Cuba.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took not of information on the preparations for a technical
        seminar on instruments for the measurement of air pollution, which will take
        place in Switzerland in 1992.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of the report of the activities of BIML for
        the period from October 1990 to September 1991.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee elected as Vice-President: Prof. M. KOCHSIEK, Germany.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of information on the preparations for the
        Ninth Conference in Greece and agreed in the proposed dates (first week of
        November 1992).

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of information on the OIML Bulletin.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of a proposal from Rumania to organize a "World
        Metrology Day". The Committee considered that any decision on this matter
        was premature and invited its Members to consider ways in which metrology
        could be promoted at the national level.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee took note of a letter from CECIP (European Committee
        of Manufacturers of Weighing Instruments).

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: thanks
      message: 'The Committee expressed its appreciation of the intention of manufacturers
        who are members of CECIP to urge their national authorities to implement OIML
        Recommendations in national regulations quickly.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee recalled that on several occasions it had requested
        its Members to associate manufacturers closely in the technical work of OIML,
        as clearly specified in the "Guide for CIML Members", and requested that the
        need for such participation be expressed in the future directives for the
        technical work of OIML.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee then recalled that the OIML working policy clearly aims
        at issuing Recommendations worded in terms of metrological performances to
        be reached and test methods, but not in terms of design requirements which
        could impede innovation in the field.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: decides
      message: 'The Committee decided that its Twenty-seventh meeting will take place
        in Greece, at the beginning of November 1992, on the occasion of the Ninth
        Conference.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    - type: notes
      message: 'The Committee also accepted the invitation from Germany to hold the
        Twenty-eighth meeting in Berlin in 1993.

        '
      dates:
      - start: '1991-10-07'
        kind: effective
    approvals: []
