    type: decision
  categories: []
  localizations:
  - language_code: fra
    script: Latn
    title: 1 Nouveaux Membres - Adhésions attendues
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Athané indique qu''il n''y a pas de nouvelles adhésions en tant
        qu''État Membre à annoncer à part celle de la Croatie qui suit son cours d''après
        les informations reçues par le Bureau. En ce qui concerne les Membres Correspondants,
        M. Athané rappelle aux participants que plusieurs pays ont été admis ou réadmis
        (suite à leur radiation pour non-paiement de leur contribution pendant plus
        de trois ans) depuis la dernière réunion du CIML.

        '
      dates:
      - start: '1999-10-06'
        kind: effective
    approvals: []
- identifier:
  - prefix: CIML
    number: 1999/2
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml199902
  urn: urn:oiml:doc:ciml:resolution:1999-02
  agenda_item:
  dates:
  - date: '1999-10-06'
    type: decision
  categories: []
  localizations:
  - language_code: fra
    script: Latn
    title: 2 Situation de certains Membres
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Athané indique que deux ou trois État Membres de l''OIML étaient
        en retard dans le paiement de leur contribution à l''OIML et étaient susceptibles
        d''être radiés automatiquement en application de la Convention de l''OIML.
        Cependant, des contacts pris avec les organismes de métrologie légale de ces
        pays ont laissé entrevoir la possibilité pour eux de régler au moins une partie
        de leurs arriérés. Par conséquent, aucune action ne sera engagée pour le moment
        mais des décisions devront être prises à l''occasion de la prochaine Conférence.

        '
      dates:
      - start: '1999-10-06'
        kind: effective
    approvals: []
