    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Athané rappelle aux participants que, comme d''habitude, un document
        présentant les dépenses et recettes prévues pour 1999 ainsi que les décisions
        correspondantes prises par la Conférence en 1996 a été envoyé à tous les Membres
        du CIML en décembre 1998. Ce document montre que la situation financière de
        l''Organisation est saine et tout à fait en ligne avec les décisions de la
        Conférence, sous réserve que les contributions pour 1999 soient réglées à
