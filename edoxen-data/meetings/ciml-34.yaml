    script: Latn
    title: 'Regional organizations having activities connected with legal metrology
      (in particular: European Com…'
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of information given by the Bureau and by
        Dr. Bennett, on behalf of both the United Kingdom and WELMEC, concerning the
        development of a European Directive on measuring instruments (MID) and the
        associated development of OIML Normative Documents which would give a presumption
        of conformity with the MID metrological requirements. The Committee also took
        note of remarks from Vice-President Chappell concerning the necessity to clearly
        inform all OIML Members about these developments and to act in such a way
        that the creation of regional technical barriers to trade will be avoided.

        '
      dates:
      - start: '1999-10-06'
        kind: effective
    - type: notes
      message: 'The Committee was informed that a meeting between the BIML Director
        and the Secretary General of CEN and that of CENELEC was expected to be held
        soon.

        '
