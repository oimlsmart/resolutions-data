    title: '5 Organisations régionales ayant des activités liées à la métrologie légale
      (en particulier: Commiss…'
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note d''informations données par le Bureau et par
        Dr. Bennett, au nom à la fois du Royaume-Uni et de WELMEC, en ce qui concerne
        l''élaboration d''une Directive Européenne sur les instruments de mesure (MID)
        et le développement associé de Documents Normatifs OIML qui donneraient une
        présomption de conformité aux exigences métrologiques de la Directive. Le
        Comité a aussi pris note de remarques du Vice-Président Chappell au sujet
        de la nécessité d''informer clairement tous les Membres de l''OIML sur ces
        développements et d''agir de telle manière que la création de barrières techniques
        régionales au commerce soit évitée.

        '
