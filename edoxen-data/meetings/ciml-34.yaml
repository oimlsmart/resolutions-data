    type: decision
  categories: []
  localizations:
  - language_code: fra
    script: Latn
    title: '5 Organisations régionales ayant des activités liées à la métrologie légale
      (en particulier: Commiss…'
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Athané résume les relations entre la Commission Européenne et l''OIML
        concernant l''élaboration d''une Directive Européenne sur les Instruments
        de Mesure, MID (actuellement au stade de projet). Par sa participation à nombre
        de réunions à Bruxelles et avec le soutien actif de Représentants des Services
        de Métrologie Légale des pays Européens concernés et de WELMEC, il a été possible
        de s''assurer qu''il n''y a pas de divergences significatives entre les exigences
        de la MID et celles des Recommandations OIML correspondantes. Cela est nécessaire
        pour s''assurer que les instruments conformes aux exigences de l''OIML ne
        seront pas rejetés systématiquement pour des raisons métrologiques lorsque
        soumis à l''approbation de modèle Européenne (cela s''appliquant bien sûr
        seulement aux Recommandations OIML récemment publiées). Suite à ces discussions
        concernant la compatibilité entre la MID et les Recommandations OIML, la Commission
        Européenne a accepté d''introduire dans la MID deux manières d''obtenir une
        présomption de conformité aux exigences de la MID: (i) Normes Européennes
        à élaborer par les organismes Européens de normalisation, CEN et CENELEC,
        sur mandats donnés par la Commission et (ii) Documents Normatifs élaborés
        par l''OIML. Pour chaque instrument couvert par la MID, le Document Normatif
        inclurait le texte de la Recommandation OIML correspondante plus les exigences
        de la MID avec, en parallèle, le(s) numéro(s) des articles de la Recommandation
        satisfaisant aux exigences de la MID. Les fabricants auraient alors plusieurs
        possibilités de satisfaire aux exigences métrologiques de la MID: (i) prouver
        la conformité directe à ces exigences, ou (ii) prouver la conformité aux dispositions
        de la Norme Européenne correspondante, ou (iii) prouver la conformité aux
        dispositions de la Recommandation OIML correspondante telle que reproduite
        dans le Document Normatif approprié.

        '
      dates:
      - start: '1999-10-06'
        kind: effective
    approvals: []
