  - language_code: eng
    script: Latn
    title: 'Standardization organizations (in particular: ISO, IEC, UN/ECE)'
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Concerning ISO, Mr. Athané said that cooperation was globally good;
        however, certain specific aspects had to be carefully examined in order to
        avoid any risk of conflict. The relations between the ISO General Secretariat
        and the BIML were excellent. The development of a joint ISO/OIML publication
        on Vehicle exhaust emission measuring instruments based on OIML R 99 was progressing
        satisfactorily. In the same way, an agreement had been reached concerning
        the development by the OIML of papers of implementation of ISO 17025 and ISO/IEC
        Guide 65 to legal metrology. There was however a risk of conflict since ISO/TC
        28 had expressed its concern over the lack of participation and information
        from the OIML TC''s concerned. Mr. Athané said that he would try to clarify
        the situation as soon as possible.

        '
      dates:
      - start: '1999-10-06'
        kind: effective
    approvals: []
