    title: World Trade Organization (WTO)
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Mr. Faber introduced Mrs. Liu, Economic Officer at the World Trade
        Organization responsible for the secretariat of the Technical Barriers to
        Trade (TBT) Committee of the WTO. He remarked that this was not the first
        time that Mrs. Liu had been in contact with metrology and the OIML since she
        had already participated in the International Seminar on the social and economic
        role of metrology held in Braunschweig in June 1998. He also mentioned that
        in the plan of actions adopted the previous day by the Committee, cooperation
        with the WTO had been explicitly indicated as being of major importance for
        the OIML and since most trade transactions are measurement-related, there
        was a need for the OIML to identify those fields in which its activity might
        assist the WTO in reaching its goals.

