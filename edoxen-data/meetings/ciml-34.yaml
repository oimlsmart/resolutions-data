    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Concernant L''Organisation Mondiale de la Santé, M. Athané rappelle
        aux participants qu''il y a eu une coopération entre l''OMS et l''OIML remontant
        à 15 ou 20 ans auparavant, mais que cette coopération a pas à pas disparu.
        Cependant, l''OMS est l''une des Organisations pour lesquelles une "approche
        ciblée" (si possible une approche commune BIPM/OIML) a été suggérée dans le
        Rapport Birkeland afin de s''assurer que des pratiques métrologiques correctes
        seront appliquées dans le cadre des activités médicales à la fois au niveau
        international et au niveau national. Il est donc de l''intention du BIML de
        rétablir le contact avec l''OMS.

        '
