  - language_code: eng
    script: Latn
    title: Others (BIPM, WHO, ...)
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Concerning the World Health Organization, Mr. Athané reminded the
        participants that there had been a cooperation between the WHO and the OIML
        some 15 or 20 years ago, but that this cooperation had step by step disappeared.
        However, the WHO was one of the Organizations with which a "targeted approach"
        (if possible a joint BIPM/OIML approach) had been suggested in the Birkeland
        Report in order to make sure that good metrological practices would be implemented
        in medical activities both at international and at national levels. It was
        therefore the intent of the BIML to reestablish contact with the WHO.

        '
      dates:
      - start: '1999-10-06'
        kind: effective
    approvals: []
