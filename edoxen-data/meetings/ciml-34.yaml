    title: Examination of a preliminary proposal for the 2001-2004 budget taking into
      consideration BIML staff …
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Mr. Faber reminded the participants that a written report had been
        prepared by the Bureau and sent to CIML Members some months prior to this
        meeting, proposing to maintain the BIML staff at its present level and to
        try to reach a zero increase in Member State contributions starting from their
        2000 level and up to the end of the 2001-2004 financial period. He requested
        CIML Members to make their views known by the end of 1999 in order to make
        it possible for him (assisted by the Presidential Council and by the Bureau)
        to prepare a final draft budget which should be sent to OIML Member States
        not later than March 2000.

        '
