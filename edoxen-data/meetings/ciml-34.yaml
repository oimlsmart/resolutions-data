    script: Latn
    title: 3 Budget pour l'année 2000
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a accepté la proposition du Conseil de la Présidence relative
        au budget 2000, c''est-à-dire que le budget tel qu''il avait été voté par
        la Dixième Conférence pour l''an 2000 est maintenu.

        '
      dates:
      - start: '1999-10-06'
        kind: effective
    - type: notes
      message: 'Le Comité a exprimé l''opinion qu''il n''y aurait pas de problème
        pour que M. Faber soit réélu à la prochaine réunion du Comité mais a considéré
        qu''il était approprié de laisser un certain temps pour que des éventuels
        candidats se fassent connaître en écrivant au Vice-Président Chappell avant
        juin 2000.

        '
      dates:
      - start: '1999-10-06'
        kind: effective
    - type: notes
      message: 'Le Comité a examiné un plan d''actions destiné à mettre en application
        les décisions de sa 33ème réunion et l''a adopté avec un certain nombre de
        modifications dont le BIML a pris note.

        '
      dates:
      - start: '1999-10-06'
        kind: effective
    - type: notes
      message: 'Le Comité a apporté son soutien aux conclusions d''un rapport de son
        Président en ce qui concerne les objectifs et la composition du Conseil de
        la Présidence et la manière dont les délibérations du Conseil seront rapportées
        au Comité.

        '
      dates:
      - start: '1999-10-06'
        kind: effective
    approvals: []
