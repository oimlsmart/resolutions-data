  actions:
  - type: instructs
    message:
    - spelling: eng
      value: 'Instructs the secretariats of Technical Committees and Subcommittees
        and conveners of Project Groups, when OIML Recommendations for relevant categories
        of measuring instruments are being developed or revised, to ensure that a
        requirement should be included, if necessary, stating that the instruments
        shall not exploit the maximum permissible errors or systematically favor any
        party, and

        '
    - spelling: fra
      value: 'Charge les secrétariats des Comités et Sous-comités Techniques et les
        responsables des Groupes de Projet, lorsque des Recommandations de l''OIML
        concernant des catégories d''instruments de mesure pertinentes sont élaborées
        ou révisées d''inclure une exigence, si nécessaire, indiquant que les instruments
        ne doivent pas exploiter les erreurs maximales tolérées ni favoriser systématiquement
        toute partie, et

        '
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: instructs
    message:
    - spelling: eng
      value: 'Instructs the Bureau to monitor the implementation of this resolution.

        '
    - spelling: fra
      value: 'Charge le Bureau de suivre l''application de cette résolution.

        '
    dates:
    - start: '2016-10-17'
      kind: effective
