  title:
  - spelling: eng
    value: Notes the report of the meeting of the Advisory Group held on 17 October
  - spelling: fra
    value: Prend note du rapport de la réunion du Groupe Consultatif tenu le 17 octobre
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'Notes the report of the meeting of the Advisory Group held on 17 October
        2016,

        '
    - spelling: fra
      value: |
        Prend note du rapport de la réunion du Groupe Consultatif tenu le 17 octobre 2016,
        Confirmme son souhait que le Groupe Consultatif continue d'être au centre des activités relatives aux problèmes intéressant les pays et les économies dont le système de métrologie est émergent,
        Renouvelle la nomination de Mr. Pu Changcheng à la Présidence du Groupe Consultatif.
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: confirms
    message:
    - spelling: eng
      value: 'Confirms that it wishes the Advisory Group to continue as the main focus
        of activities relating to matters of interest to countries and economies with
        emerging metrology systems,

        '
    dates:
    - start: '2016-10-17'
      kind: effective
  - type: renews
    message:
    - spelling: eng
      value: 'Renews the appointment of Mr. Pu Changcheng to act as Chair of the Advisory
        Group.

        '
    dates:
    - start: '2016-10-17'
      kind: effective
  approvals: []
  considerations:
  - type: recalling
    message:
    - spelling: eng
      value: 'Recalling its Resolution no. 2013/9, setting up an Advisory Group to
        carry out wide consultation, to seek suggestions and to build up links with
        other bodies with an interest in promoting the economic development of countries
        and economies with emerging metrology systems,

        '
    - spelling: fra
      value: 'Rappelant sa Résolution no. 2013/9, relative à la mise en place d''un
        Groupe Consultatif pour mener de larges consultations, recueillir des suggestions
        et développer des liens avec d''autres organismes intéressés par la promotion
        du développement économique de pays et d''économies dont le système de métrologie
        est émergent,

        '
    dates:
    - start: '2016-10-17'
      kind: effective
- identifier:
  - prefix: CIML
    number: 2016/14
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml201614
  urn: urn:oiml:doc:ciml:resolution:2016-14
  agenda_item:
  dates:
