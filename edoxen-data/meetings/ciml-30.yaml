  categories: []
  localizations:
  - language_code: fra
    script: Latn
    title: 2 Budget 1997-2000
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité adopte des résolutions et prend des décisions sur les différents
        points de l''ordre du jour. Ces décisions et résolutions sont reproduites
        à la fin de ce compte rendu.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a approuvé le compte rendu de sa vingt-neuvième réunion
        sans modification.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note de l''adhésion, en 1995, du Kazakhstan comme
        nouvel Etat Membre de l''OIML, et du Mozambique, de la Thaïlande et de l''Uruguay
        comme nouveaux Membres Correspondants, et a accueilli la délégation de Macédoine
        pour sa première participation à une réunion du CIML.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a également pris note d''informations concernant les adhésions
        attendues et la possibilité pour certains Membres Correspondants qui sont
        maintenant très en retard dans le paiement de leur abonnement à l''OIML, d''être
        supprimés de la liste des Correspondants.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a approuvé le rapport comptable pour 1994 et chargé le Président
        du CIML et le Directeur du BIML de le soumettre à la Dixième Conférence.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''informations sur la situation financière
        de l''Organisation en 1995; il a demandé aux Etats Membres en retard dans
        le paiement de leur contribution à l''OIML de payer leur dû aussi rapidement
        que possible.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a renouvelé le contrat du Directeur du BIML pour une période
        de 5 ans à compter du 1er janvier 1996.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a prolongé le contrat de M. Vichenkov, Adjoint au Directeur,
        pour une période de dix- huit mois, c''est-à-dire jusqu''au 30 novembre 1997.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note du fait qu''un nouvel Adjoint au Directeur sera
        élu lors de la 31e réunion du CIML.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a accepté, comme mesure temporaire, la proposition du Directeur
        du BIML d''indexer les salaires des agents du BIML sur l''indice officiel
        des prix calculé par l''Institut de la Statistique et des Études Économiques
        (INSEE) en remplacement de l''ancien indice OCDE, les règles pratiques d''indexation
        restant les mêmes. Le Comité a demandé au Directeur du BIML de rechercher
        l''existence d''autres indices, d''examiner les solutions adoptées par d''autres
        institutions internationales, et de faire rapport à ce sujet lors d''une prochaine
        réunion.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''un rapport présenté par le Vice-Président
        Chappell sur les travaux des comités techniques et sous-comités OIML et a
        remarqué avec satisfaction que, pour la plupart d''entre eux, les TC et SC
        fonctionnent correctement et en conformité avec les Directives pour les travaux
        techniques.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a aussi demandé aux secrétariats des TC/SC de faire de leur
        mieux pour développer les liaisons externes afin de pouvoir prendre en considération,
        chaque fois que cela est approprié, les travaux d''institutions internationales
        dans l''élaboration des Recommandations et Documents internationaux de l''OIML.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a approuvé les projets suivants:

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'le Comité a décidé que, en dépit du soutien que ces projets avaient
        reçu d''une large majorité de Membres de l''OIML lors de la consultation par
        correspondance, leur approbation devait être retardée d''un an afin de permettre
        à OIML TC 13 de résoudre des questions importantes soulevées en particulier
        par les délégations du Royaume-Uni et des Etats-Unis d''Amérique.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note du rapport présenté par le Vice-Président Kochsiek
        sur les progrès des activités OIML de certification.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a adopté les résolutions suivantes:

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''informations sur l''élaboration, l''impression
        et la distribution du document de politique à long terme et de la brochure
        d''information générale, au sujet desquels le CIML a exprimé son appréciation.
        Le Comité a aussi pris note du fait que le Bureau a l''intention de produire
        un prospectus informatif sur l''OIML.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''informations sur la prochaine réunion ISO/TAG
        4. Le Comité a aussi pris note du fait que les relations avec ILAC seront
        réexaminées par le Conseil de Présidence, qui étudiera également la politique
        générale régissant les liaisons entre l''OIML et les organisations régionales
        de métrologie légale, ainsi que la question des officiers régionaux de l''OIML.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note de rapports présentés par MM. Kochsiek et Benkirane
        sur le Symposium OIML sur les activités métrologiques dans les pays en développement
        et sur la réunion du Conseil de Développement tenus du 23 au 25 octobre 1995
        à Pékin.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a exprimé son appréciation pour les activités effectuées
        par le BIML et par le Bureau d''État de Supervision Technique de Chine pour
        l''organisation du Symposium qui s''est focalisé sur les questions politiques
        et stratégiques liées à la métrologie légale, ses aspects économiques, la
        coopération internationale et l''aide aux pays dans l''établissement et le
        développement de services nationaux de métrologie.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a exprimé ses remerciements à tous les Membres de l''OIML
        et institutions en liaison qui ont apporté leur contribution au Symposium.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a également pris note des actions diverses menées en 1995
        en faveur des pays en développement, y compris un atelier de formation DETERMINATION
        DES VOLUMES DES RESERVOIRS DE STOCKAGE FIXES organisé par l''Allemagne avec
        la participation du BIML, le séminaire de formation LA METROLOGIE AU SERVICE
        DU DEVELOPPEMENT ECONOMIQUE co-organisé par la France, la CEE/ONU, la Commission
        de l''Union Européenne et l''OIML, un cours de formation en métrologie légale
        tenu à Cuba, et autres actions de soutien au programme du Conseil de Développement
        de l''OIML.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a demandé au BIML et au Conseil de Développement de poursuivre
        leurs activités en matière de métrologie légale, en particulier en encourageant
        l''organisation de cours et de séminaires de formation, en organisant la disponibilité
        de manuels, brochures et autres moyens de formation, en distribuant des informations
        sur les soutiens techniques et financiers auxquels peuvent recourir les pays
        en développement, et en maintenant des contacts avec les institutions internationales
        et régionales concernées. L''utilisation de nouveaux moyens d''information
        et de formation, par exemple, les bases de données à accès direct ou les CD-ROM
        et CD-ROM interactifs, devraient être pris en considération et le BIML est
        invité à étudier, en liaison avec les TC/SC appropriés et le Conseil de Développement,
        la possibilité d''utiliser ces moyens afin d''accroître la disponibilité de
        matériaux d''information et de formation pour tous les pays.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a exprimé son appréciation pour les activités effectuées
        sous le leadership de M. Benkirane, Maroc, Président du Conseil de Développement
        de 1988 à 1995.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note de l''élection de M. Putera, Membre du CIML
        pour l''Indonésie, en tant que Président du Conseil de Développement pour
        la période 1995-1997.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note du rapport sur les activités du BIML pour la
        période octobre 1994 - septembre 1995 et a demandé au BIML de publier un résumé
        de ce rapport dans le Bulletin OIML sous une forme appropriée.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note du rapport sur le séminaire OIML sur le pesage
        et a exprimé son appréciation pour les rôles joués par Dr Bennett, Président
        du séminaire, les membres du comité de sélection, et le BIML, pour le succès
        de ce séminaire.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a exprimé son accord pour que le BIML continue d''inviter,
        aux futurs séminaires, des constructeurs et des représentants d''organismes
        intéressés autres que les services de métrologie légale et institutions en
        liaison, pourvu qu''un équilibre financier raisonnable soit atteint.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a exprimé son accord pour que le BIML utilise, aussitôt
        que possible, le nouveau logo sur les publications OIML, en-tête de papier
        à lettre, etc.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''un rapport de M. Johnston, Membre du CIML
        pour le Canada, sur la préparation de la Dixième Conférence et de la 31e réunion
        du CIML.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a donné son soutien à la proposition du Directeur du BIML
        de limiter à 4 % l''augmentation annuelle du budget pour la période 1997-2000,
        soit 2 % pour l''inflation et 2 % pour les augmentations obligatoires résultant
        de l''ancienneté du personnel, du renouvellement de l''équipement, etc. et
        de l''alimentation du fond de retraite.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a accepté les invitations des délégations du Brésil et de
        la Rép. de Corée à tenir:

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a aussi pris note du fait qu''il serait nécessaire de tenir
        une réunion du CIML ou de la Conférence en 1999 à Paris, en liaison avec la
        CGPM, en vue d''un examen éventuel du progrès des discussions sur le rapprochement
        ou la fusion BIPM/OIML.

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a adopté la résolution suivante:

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité a exprimé son appréciation au Dr Bennett, Membre du CIML
        pour le Royaume-Uni, qui a présidé à la table ronde sur la CONFIANCE DANS
        LES APPROBATIONS DE MODÈLE et a adopté la résolution suivante:

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    approvals: []
