    title: 3 Situation de l'Iran
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Athané rappelle que l''Iran a décidé de quitter l''OIML en 1979
        sans s''être acquitté de ses contributions de 1978 et de 1979. Maintenant,
        l''Iran envisage de rétablir sa participation mais en souhaitant être exempté
        du règlement de ces arriérés et de tous droits supplémentaires, en dehors
        de sa contribution normale à partir du moment où il serait admis à nouveau
        comme État Membre de l''OIML. M. Athané ajoute qu''il a mené une enquête parmi
        les Membres du CIML et que les réponses montrent que tout en étant favorables
        à la réadmission de l''Iran comme État Membre, un certain nombre de Membres
        sont d''avis que la Convention doit être strictement appliquée, c''est-à-dire,
        que l''Iran devrait payer ses arriérés pour 1978-1979, plus un droit d''entrée.
        Concernant la classe de contribution de l''Iran, l''avis général est que ce
        pays pourrait être placé pro-

        '
      dates:
      - start: '1995-10-25'
        kind: effective
    approvals: []
