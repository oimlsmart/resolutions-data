  localizations:
  - language_code: fra
    script: Latn
    title: 4 Développements ultérieurs dans les méthodes de travail des TC/SC et utilisation
      de moyens de commu…
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note d''informations fournies par le BIML concernant
        l''utilisation du courrier électronique et d''Internet dans le développement
        du travail technique de l''OIML et des remarques faites par certains Membres
        (communication utilisant soit le papier soit le courrier électronique; utilisation
        de CD-roms, harmonisation des équipements techniques permettant d''organiser
        des vidéo-conférences, etc.). Le Comité a demandé au Bureau de donner une
        première priorité à la révision des Directives pour les travaux techniques
        et a vivement conseillé à ses Membres de développer au niveau national des
        moyens de communication modernes, afin d''accélérer et de faciliter le travail
        technique de l''OIML tout en diminuant les coûts de fonctionnement.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    approvals: []
