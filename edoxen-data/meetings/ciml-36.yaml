  localizations:
  - language_code: fra
    script: Latn
    title: 3 Plans pour développement ultérieurs (voir aussi MAA ci-dessous)
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Kochsiek rappelle aux participants que la révision du document
        sur le Système de Certificats OIML pour les Instruments de Mesure a maintenant
        atteint un stade bien avancé et sera très probablement approuvée et publiée
        en 2002. Selon ce document la portée du Système va être étendue dans deux
        directions: (i) la certification de types de modules et (ii) la certification
        de types de familles (d''instruments ou de modules). Ces actions étaient prévues
        dans le Plan d''Action et, si approuvées, augmenteront la charge de travail
        d''un certain nombre de TC/SC avec l''élaboration de formats de rapport d''essai
        additionnels pour les types de modules et les types de familles. De plus la
        révision des règles de fonctionnement du Système va déplacer des responsabilités
        des Membres du CIML vers les Autorités de Délivrance; elle contiendra par
        ailleurs des dispositions nouvelles sur l''identification des types certifiés.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    approvals: []
