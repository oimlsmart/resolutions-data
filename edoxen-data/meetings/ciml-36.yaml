    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Kochsiek commence par un rappel de l''établissement du Système
        onze ou douze années auparavant, à un moment où certains Membres du CIML n''étaient
        pas en faveur de sa création et mettaient en question son utilité. Après presque
        dix ans de fonctionnement beaucoup de progrès ont été réalisés et de nombreux
        fabricants dans divers domaines de mesure sont désireux d''utiliser le Système.

        '
