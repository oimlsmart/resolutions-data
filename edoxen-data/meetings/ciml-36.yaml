    type: decision
  categories: []
  localizations:
  - language_code: fra
    script: Latn
    title: 2 Situation de certains Membres
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a noté avec satisfaction que cet État Membre a payé non
        seulement ses cotisations pour 2000 et pour 2001, mais a également commencé
        à payer ses arriérés pour 1996-1999.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    - type: notes
      message: 'Le Comité a noté qu''une partie seulement de la cotisation pour 2000
        de cet État Membre a été payée. Le Comité a fixé à ce pays la date limite
        ultime de 2002.06.30 pour le paiement complet de ses cotisations pour 2000
        et 2001, et a demandé au BIML de faire rapport sur ce point lors de la 37ème
        réunion du CIML.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note de la situation de la République Islamique d''Iran,
        de l''Italie et du Kazakhstan en ce qui concerne le paiement de leurs cotisations
        OIML. Le Comité a également noté les informations données par le Bureau concernant
        l''annonce faite par les Autorités italiennes du paiement imminent de la totalité
        de leurs arriérés, ainsi que l''intention des Autorités du Kazakhstan de payer
        leurs arriérés le plus vite possible. Le Comité a fixé la date limite ultime
        de 2002.06.30 à ces trois pays pour payer leurs arriérés et a demandé au BIML
        de faire rapport sur ce point lors de la 37ème réunion du CIML.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    approvals: []
