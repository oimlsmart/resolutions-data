    title: 4 Développements ultérieurs dans les méthodes de travail des TC/SC et utilisation
      de moyens de commu…
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. Magaña indique que le Bureau est en train de développer un certain
        nombre d''outils et d''activités liés aux technologies de l''information et
        aux moyens électroniques et les mettre le plus possible en application dans
        les travaux de l''OIML. Cela accélèrera les travaux techniques de l''OIML,
        facilitera la participation de tous les Membres à ces travaux, facilitera
        la préparation des réunions (étant entendu que les moyens électroniques ne
        remplaceront pas les réunions) et conduira à des économies en réduisant les
        coûts liés à la consommation de papier, à l''utilisation du téléphone, etc.

