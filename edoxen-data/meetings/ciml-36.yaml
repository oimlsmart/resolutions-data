- identifier:
  - prefix: CIML
    number: 2001/9
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml200109
  urn: urn:oiml:doc:ciml:resolution:2001-09
  agenda_item:
  dates:
  - date: '2001-09-25'
    type: decision
  categories: []
  localizations:
  - language_code: fra
    script: Latn
    title: 3 Projets pour développement ultérieurs (voir aussi MAA ci-dessous)
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note d''informations concernant la révision actuelle
        du document décrivant les règles de fonctionnement du Système et a conseillé
        vivement au TC 3/SC 5, sous la responsabilité commune des USA et du Bureau,
        de terminer cette révision d''urgence. Le Comité a noté que certaines questions
        très importantes, en particulier la certification des instruments individuels,
        n''étaient pas inclus dans cette révision; le Comité a donc demandé au TC
        3/SC 5 de commencer à travailler sur ces questions dès que possible et au
        plus tard lorsque l''actuelle révision sera terminée. Enfin le Comité a noté
        qu''un certain nombre d''aspects de fonctionnement du Système (par exemple
        le rôle des Membres du CIML) étaient étroitement liés aux modes de fonctionnement
        du futur MAA (voir point 10 ci-après) et a demandé au TC 3/SC 5 d''eliminer
        les éventuelles divergences entre les deux documents.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''informations fournies par M. Ehrlich, États
        Unis, et des remarques formulées par un certain nombre de Membres. Le Comité
        a exprimé son appréciation pour les améliorations considérables introduites
        dans le 8ème projet de comité. Il a aussi souligné l''urgence d''établir le
        cadre dans lequel vont être mis en place les arrangements d''acceptation mutuelle
        et a demandé au Secrétariat du TC 3/SC 5 de faire son maximum pour terminer
        le travail en tenant compte à la fois des commentaires formulés durant la
        réunion du CIML et de ceux envoyés par les membres du TC 3/SC 5 dans le cadre
        de la consultation postale actuelle qui prend fin le 15 novembre 2001.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''informations fournies par M. Ehrlich, États
        Unis, concernant le développement d''un document sur l''établissement d''une
        marque IQ OIML, qui est maintenant distincte de la révision de la R 87. Le
        Comité a également pris note des remarques formulées par certains Membres
        et a encouragé le TC 6 à poursuivre activement son travail.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''un rapport présenté par Mme Annabi, Présidente
        du Conseil de Développement, concernant la réunion du 24 septembre 2001.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    approvals: []
