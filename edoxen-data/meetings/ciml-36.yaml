    title: Mutual Acceptance Arrangement (MAA)
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of information delivered by Mr. Ehrlich, USA,
        and of remarks made by a number of Members. The Committee expressed its appreciation
        for the considerable improvements introduced in the 8th committee draft. It
        also pointed out the urgency of establishing the proposed framework for mutual
        acceptance arrangements and requested the TC 3/SC 5 Secretariat to do its
        utmost in order to complete the work taking into account both the comments
        expressed during the CIML Meeting and those received from TC 3/SC 5 members
        in the framework of the current postal consultation which ends on 15 November
        2001.

        '
