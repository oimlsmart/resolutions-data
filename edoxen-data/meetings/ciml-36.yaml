    title: 2 Examen de la situation financière pour 2001 et 2002
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note d''informations fournies par le BIML concernant
        la situation financière de l''Organisation en 2001 et a considéré que cette
        situation était conforme aux décisions de la Onzième Conférence. Le Comité
        a également noté les informations fournies par le Bureau au sujet de l''année
        2002, notamment le passage à l''Euro, une nouvelle présentation des comptes
        du BIML qui permettrait de mieux estimer les coûts de fonctionnement des différents
        organes constituent l''OIML et les prix de revient des produits et des services
        fournis par le BIML, et la nouvelle politique du Bureau en matière de fixation
        des prix et de vente des publications.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''un rapport présenté par son Président concernant
        les activités du Conseil de la Présidence depuis octobre 2000.

        '
      dates:
      - start: '2001-09-25'
        kind: effective
    approvals: []
