        une invitation avait été reçue d''Israël. Cependant un certain nombre de pays
        ont indiqué qu''en raison de la situation présente ils ne seraient pas en
        mesure de participer à une réunion en Israël en 2002. M. Faber indique que
        les Autorités israéliennes ont accepté de repousser leur invitation à 2004.
