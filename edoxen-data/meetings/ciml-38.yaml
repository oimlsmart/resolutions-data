  title:
  - spelling: eng
    value: "$ 4 0^{th} $ CIML Meeting and $ 5 0^{th} $ Anniversary of the OIML (France,
      2005)"
  - spelling: fra
    value: 40ème Réunion du CIML et 50ème Anniversaire de l'OIML (France, 2005)
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee accepted the proposal from the BIML to organize the $
        40^{\mathrm{th}} $ Committee Meeting in Lyon, France, at the end of June 2005,
        in conjunction with the International Metrology Congress organized by the
        Collège Français de Métrologie, on the occasion of the $ 50^{\mathrm{th}}
        $ anniversary of the OIML.

        '
    - spelling: fra
      value: 'Le Comité a accepté la proposition du BIML d''organiser la 40ème Réunion
        du Comité à Lyon, France, fin juin 2005, conjointement avec le Congrès International
        de Métrologie organisé par le Collège Français de Métrologie, à l''occasion
        du 50ème anniversaire de l''OIML.

        '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee asked the BIML and the various TCs/SCs to avoid these
        dates when planning their own meetings.

        '
    - spelling: fra
      value: 'Le Comité a demandé au BIML et aux divers TC/SC d''éviter ces dates
        lors de la planification de leurs propres réunions.

        '
    dates:
    - start: '2003-11-05'
      kind: effective
