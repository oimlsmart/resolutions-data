  title:
  - spelling: eng
    value: Examination of the situation of certain TCs/SCs
  - spelling: fra
    value: Examen de la situation de certains TC/SC
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a proposal submitted by France for new work,
        in agreement with the TC 3 Secretariat and the BIML, and instructed TC 3/SC
        5 to set up a Working Group chaired jointly by France and the BIML to

        '
    - spelling: fra
      value: 'Le Comité a pris note d''une proposition soumise par la France pour
        un nouveau travail, en accord avec le Secrétariat du TC 3 et le BIML, et a
        chargé le TC 3/SC 5 de former un Groupe de Travail présidé conjointement par
        la France

        '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of information given by the BIML on the generally
        unsatisfactory situation of CIML postal voting in 2003, and requested its
        Members (especially those who are late in voting) to comply more regularly
        with fulfilling their duties, thus contributing to the timely approval of
        drafts submitted.

        '
    - spelling: fra
      value: 'Le Comité a pris note des informations données par le BIML sur la situation
        généralement non satisfaisante du vote par correspondance des Membres du CIML
        en 2003, et a demandé à ses Membres (en particulier ceux qui sont en retard
        dans les votes) d''être plus réguliers dans l''exercice de leurs obligations,
        contribuant ainsi à ce que l''approbation des projets présentés soit réalisée
        en temps voulu.

        '
    dates:
    - start: '2003-11-05'
      kind: effective
  approvals: []
  considerations: []
