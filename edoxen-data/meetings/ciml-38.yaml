  - spelling: fra
    value: JCDCMAS
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of information given by the BIML concerning
        the setting up, with other international Organizations, of a Joint Committee
        on coordination of assistance to Developing Countries in Metrology, Accreditation
        and Standardization (JCDCMAS), and approved the Terms of Reference of this
        Joint Committee.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''informations données par le BIML en ce qui
        concerne la formation, avec d''autres organisations internationales, d''un
        Comité Conjoint sur la coordination de l''aide aux Pays en Développement dans
        le domaine de la Métrologie, de l''Accréditation et de la Normalisation (JCDCMAS),
        et a approuvé les Termes de Référence de ce Comité Conjoint.

        '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee also took note of a report by the BIML on Regional Awareness
        Seminars which were organized jointly with the IEC under the aegis of the
        WTO. The Committee encouraged the BIML to organize other Seminars of the same
        kind in other Regions.

        '
    - spelling: fra
      value: 'Le Comité a aussi pris note d''un rapport du BIML sur des Séminaires
        Régionaux de Sensibilisation organisés conjointement avec la CEI sous l''égide
        de l''OMC. Le Comité a encouragé le BIML à organiser d''autres Séminaires
        du même type dans d''autres régions.

        '
