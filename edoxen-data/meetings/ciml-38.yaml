  title:
  - spelling: eng
    value: Follow-up to the revision of P1 OIML Certificate System for Measuring Instruments
  - spelling: fra
    value: Suivi de la révision du P1 Système de Certificats OIML pour les Instruments
      de Mesure
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of the proposed necessary actions in implementing
        the revised P1 and instructed:

        '
    - spelling: fra
      value: 'Le Comité a pris note des actions proposées nécessaires à l''application
        du P1 révisé et a chargé:

        '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: instructs
    message:
    - spelling: eng
      value: 'The Committee instructed the BIML to carry out inquiries among OIML
        Members and among manufacturers and applicants who already possessed OIML
        Certificates as to their experience in the voluntary acceptance and use of
        OIML Certificates for national or regional type approvals, as well as to their
        views on the functioning of the System with a special view to the new provisions
        of P1.

        '
    - spelling: fra
      value: 'Le Comité a chargé le BIML d''effectuer des enquêtes auprès des Membres
        OIML et des fabricants et demandeurs qui détiennent déjà des Certificats OIML,
        sur leur expérience au niveau de l''acceptation volontaire et l''utilisation
        des Certificats OIML pour les approbations de type nationales ou régionales,
        ainsi que leurs opinions sur le fonctionnement du Système en considérant de
        près les nouvelles dispositions du P 1.

        '
