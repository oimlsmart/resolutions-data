  title:
  - spelling: eng
    value: "$ 3 9^{th} $ CIML Meeting and $ 1 2^{th} $ International Conference on
      Legal Metrology (Berlin, 2004…"
  - spelling: fra
    value: 39ème Réunion du CIML et 12ème Conférence Internationale de Métrologie
      Légale (Berlin, 2004)
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a presentation given by Mr. Kochsiek, on
        the organization of the $ 39^{\mathrm{th}} $ Committee Meeting and $ 12^{\mathrm{th}}
        $ OIML Conference to be held in Berlin from 25-29 October 2004, as approved
        at the $ 37^{\mathrm{th}} $ Committee Meeting in 2002. The Committee expressed
        its warmest thanks to Germany for their invitation.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''une présentation donnée par M. Kochsiek, sur
        l''organisation de la 39ème Réunion du Comité et de la 12ème Conférence de
        l''OIML devant se tenir à Berlin du 25 au 29 octobre 2004, comme approuvé
        à la 37ème Réunion du Comité en 2002. Le Comité a exprimé ses remerciements
        les plus chaleureux à l''Allemagne pour son invitation.

        '
    dates:
    - start: '2003-11-05'
      kind: effective
  approvals: []
  considerations: []
