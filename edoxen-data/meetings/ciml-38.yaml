  title:
  - spelling: eng
    value: Election of the CIML President
  - spelling: fra
    value: Élection du Président du CIML
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'In the absence of a conclusive election result and in application of
        Article XV of the Convention, CIML First Vice President Mr. Kochsiek was charged
        with assuming the duties of President. The CIML expressed its deep gratitude
        to Mr. Faber for his achievements and leadership during his term of office.

        '
    - spelling: fra
      value: 'A défaut d''un résultat de scrutin concluant et en application de l''Article
        XV de la Convention, le premier VicePrésident du CIML, M. Kochsiek a été chargé
        d''assumer les responsabilités de Président. Le CIML a exprimé sa profonde
        gratitude à M. Faber pour ses réalisations et son leadership durant tout son
        exercice.

        '
    dates:
    - start: '2003-11-05'
      kind: effective
