  title:
  - spelling: eng
    value: New Recommendations applicable within the System
  - spelling: fra
    value: Nouvelles Recommandations applicables dans le cadre du Système
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: decides
    message:
    - spelling: eng
      value: 'The Committee decided that the following Recommendations would be applicable
        within the System when published:

        '
    - spelling: fra
      value: 'Le Comité a décidé que les Recommandations suivantes deviendraient applicables
        dans le cadre du Système dès leur publication:

        '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee also decided that the revised R 61-1 and R 61-2 will continue
        to be applicable within the System as soon as R 61-2 is published together
        with the revised R 61-1.

        '
    - spelling: fra
      value: 'Le Comité a également décidé que les R 61-1 et R 61-2 révisées continueraient
        d''être applicables dans le cadre du Système dès que la R 61-2 sera publiée
        avec la R 61-1 révisée.

        '
    dates:
    - start: '2003-11-05'
      kind: effective
  - type: instructs
    message:
    - spelling: eng
      value: 'The Committee instructed the Secretariat of TC 9/SC 2 to urgently draw
        up a Supplement to R 61 on Certificate transformation requirements (in analogy
        with R 60 (2000) Supp.) (with the assistance of the BIML) and a proposal for
        the deadline for issuing Certificates based on the 1996 edition of R 61, and
        arrange for its simultaneous postal approval by TC 9/SC 2 and the CIML.

        '
    - spelling: fra
      value: 'Le Comité a chargé le Secrétariat du TC 9/SC 2 de rédiger d''urgence
        un Supplément à R 61 sur les exigences pour la transformation des Certificats
        (de façon analogue au Supplément de R 60 édition 2000) (avec le concours du
        BIML) ainsi qu''une proposition pour fixer la date limite de délivrance de
        Certificats basés sur l''édition 1996 de R 61, et d''organiser son approbation
        simultanée par correspondance par le TC 9/SC 2 et le CIML.

        '
