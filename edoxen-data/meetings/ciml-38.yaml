  doi: 10.63493/resolutions/ciml200315.3
  urn: urn:oiml:doc:ciml:resolution:2003-15.3
  agenda_item:
  dates:
  - date: '2003-11-05'
    type: decision
  categories: []
  title:
  - spelling: eng
    value: Reports from Regional Legal Metrology Organizations (RLMOs)
  - spelling: fra
    value: Rapports des Organisations Régionales de Métrologie Légale (ORML)
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of information given by representatives of the
        following Regional Legal Metrology Organizations (RLMOs) concerning their
        activities: APLMF, COOMET, EMLMF, SADCMEL and WELMEC. In addition, the representative
        from Burkina Faso gave information on a possible future RLMO in that region
        of Africa.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''informations données par les représentants
        des Organisations Régionales de Métrologie Légale (ORML) suivantes concernant
        leurs activités: APLMF, COOMET, EMLMF, SADCMEL et WELMEC. D''autre part, le
        représentant du Burkina Faso a donné des informations sur une éventuelle création
        d''ORML dans cette région d''Afrique.

        '
    dates:
    - start: '2003-11-05'
      kind: effective
  approvals: []
  considerations: []
- identifier:
  - prefix: CIML
    number: 2003/15.4
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml200315.4
  urn: urn:oiml:doc:ciml:resolution:2003-15.4
  agenda_item:
  dates:
  - date: '2003-11-05'
    type: decision
  categories: []
  title:
  - spelling: eng
    value: Draft policy paper on coordination with Regional Legal Metrology Organizations
      (RLMOs)
  - spelling: fra
    value: Projet de document de politique générale sur la coordination avec les Organisations
      Régionales de Mé…
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a progress report given by the BIML Director
        on a paper formalizing the relations and cooperation with Regional Legal Metrology
        Organizations; this paper is being submitted for comments by RLMOs. The Committee
        instructed the BIML to continue progress with this paper so as to establish
        a formal framework for OIML cooperation with the RLMOs.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un rapport d''avancement donné par le Directeur
        du BIML sur un document formalisant les relations et la coopération avec les
        Organisations Régionales de Métrologie Légale (ORML); ce document est en cours
        d''examen pour commentaires par les ORML. Le Comité a chargé le BIML de poursuivre
        l''élaboration de ce document de façon à établir un cadre officiel pour la
        coopération de l''OIML avec les ORML.

        '
    dates:
    - start: '2003-11-05'
      kind: effective
  approvals: []
  considerations: []
