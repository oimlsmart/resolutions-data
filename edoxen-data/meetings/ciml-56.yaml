  - spelling: eng
    value: Agenda item 6
  - spelling: fra
    value: Décide de ne pas nommer de comité de sélection spécifié dans la section
      3
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: resolves
    message:
    - spelling: eng
      value: 'Resolves not to appoint the Selection Committee specified in section
        3 of OIML B 13:2004.

        '
    - spelling: fra
      value: 'Décide de ne pas nommer de comité de sélection spécifié dans la section
        3 de l''OIML B 13:2004.

        '
    dates:
    - start: '2021-10-19'
      kind: effective
  approvals: []
  considerations:
  - type: having_regard_to
    message:
    - spelling: eng
      value: 'Having regard to section 7.2.2 of OIML B 7:2013 BIML Staff regulations,
        and section 2, first paragraph and section 4, first bullet point, of OIML
        B 13:2004 Procedure for the appointment of the BIML Director and Assistant
        Directors,

        '
    - spelling: fra
      value: 'Vu la section 7.2.2 de l''OIML B 7:2013 Statuts du Personnel du BIML,
        et la section 2, premier paragraphe et la section 4, premier point, de l''OIML
        B 13:2004 Procédure pour la désignation du Directeur et des Adjoints au Directeur
        du BIML,

        '
    dates:
    - start: '2021-10-19'
      kind: effective
  - type: considering
    message:
    - spelling: eng
      value: 'Considering that the term of appointment of Mr Paul Dixon, BIML Assistant
        Director, expires on 31 December 2022,

        '
    - spelling: fra
      value: 'Considérant que le mandat de M. Paul Dixon, Adjoint au Directeur du
        BIML, expire le 31 décembre 2022,

        '
    dates:
    - start: '2021-10-19'
      kind: effective
  - type: considering
    message:
    - spelling: eng
      value: 'Considering the proposal made by its President,

        '
    - spelling: fra
      value: 'Considérant la proposition faite par son Président,

        '
    dates:
    - start: '2021-10-19'
      kind: effective
  - type: noting
    message:
    - spelling: eng
      value: |
        Noting the comments made by its Members,
        Expresses its expectation that it will resolve to renew the appointment of Mr Paul Dixon as BIML Assistant Director for a fixed term of up to five years at its meeting in 2022, and
    - spelling: fra
      value: |
        Prenant note des commentaires de ses Membres,
        Exprime l'espoir qu'elle décidera de renouveler la nomination de M. Paul Dixon en tant qu'Adjoint au Directeur du BIML pour une durée déterminée de cinq ans maximum lors de sa réunion de 2022, et
    dates:
    - start: '2021-10-19'
      kind: effective
