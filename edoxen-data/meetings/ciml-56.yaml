  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'Notes the report on the proposal for a Digitalisation Task Group given
        by its President,

        '
    - spelling: fra
      value: |
        Prend note du rapport sur la proposition de création d'un Groupe de Travail sur la Numérisation, présenté par son Président,
        Se félicite de la mise en place d'un Groupe de Travail sur la Numérisation de l'OIML dans le but d'examiner et de proposer des options et des solutions concernant les opportunités pour l'OIML en matière de transformation numérique des processus et des services à ses Membres et aux parties prenantes, en coopération avec d'autres partenaires QI, et
    dates:
    - start: '2021-10-19'
      kind: effective
  - type: welcomes
    message:
    - spelling: eng
      value: 'Welcomes the establishment of an OIML Digitalisation Task Group with
        the aim of examining and proposing options and solutions regarding opportunities
        for the OIML concerning the digital transformation of processes and services
        to its Members and stakeholders, in cooperation with other QI partners, and

        '
    - spelling: fra
      value: 'Demande aux Membres du CIML, aux Représentants des Membres Correspondants
        et aux Organisations en Liaison de faire des nominations pour les membres
        de ce Groupe de Travail avant le 30 novembre 2021.

        '
