- identifier:
  - prefix: CIML
    number: 2021/04
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml202104
  urn: urn:oiml:doc:ciml:resolution:2021-04
  agenda_item: '4.2'
  dates:
  - date: '2021-10-19'
    type: decision
  categories: []
  title:
  - spelling: eng
    value: Agenda item 4.2
  - spelling: fra
    value: Décide que la participation en personne et en ligne à toutes les réunions
      de
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: decides
    message:
    - spelling: eng
      value: 'Decides that in-person and online participation in all OIML meetings
        is considered to be equivalent, and

        '
    - spelling: fra
      value: 'Décide que la participation en personne et en ligne à toutes les réunions
        de l''OIML est considérée comme équivalente, et

        '
    dates:
    - start: '2021-10-19'
      kind: effective
  - type: requests
    message:
    - spelling: eng
      value: 'Requests the 16th Conference to endorse this policy.

        '
    - spelling: fra
      value: 'Demande à la 16ème Conférence d''approuver cette politique.

        '
    dates:
    - start: '2021-10-19'
      kind: effective
  approvals: []
  considerations:
  - type: recalling
    message:
    - spelling: eng
      value: 'Recalling its resolution 2020/1,

        '
    - spelling: fra
      value: 'Rappelant sa Résolution 2020/1,

        '
    dates:
    - start: '2021-10-19'
      kind: effective
  - type: noting
    message:
    - spelling: eng
      value: 'Noting that all OIML meetings can be held with in-person participation,
        or with solely online participation, or with a combination of in-person and
        online participation,

        '
    - spelling: fra
      value: 'Notant que toutes les réunions de l''OIML peuvent se tenir avec une
        participation en personne, ou avec une participation uniquement en ligne,
        ou avec une combinaison de participation en personne et en ligne,

        '
    dates:
    - start: '2021-10-19'
      kind: effective
