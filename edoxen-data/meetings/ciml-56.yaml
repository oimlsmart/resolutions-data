  actions:
  - type: confirms
    message:
    - spelling: eng
      value: 'Confirmss its support for the CIML President to sign the final version
        of a Joint Statement of Intent on digital transformation in international
        scientific and quality infrastructure (QI), which is intended to be also signed
        by other QI stakeholders, such as CODATA, IAF, IEC, ILAC, IMEKO, ISC, and
        ISO.

        '
    - spelling: fra
      value: 'Ordre du jour point 4.3

        '
    dates:
    - start: '2021-10-19'
      kind: effective
  approvals: []
  considerations:
  - type: recalling
    message:
    - spelling: eng
      value: |
        Recalling its Resolution 2020/6,
        Welcoming the activities of the OIML-BIPM Joint Task Group in the field of digital transformation of metrological processes and activities,
    - spelling: fra
      value: |
        Rappelant sa résolution 2020/6,
        Se félicitant des activités du Groupe de Travail Conjoint OIML-BIPM dans le domaine de la transformation numérique des processus et activités métrologiques,
        Confirmme son soutien au Président du CIML pour qu'il signe la version finale d'une déclaration d'intention commune sur la transformation numérique de l'infrastructure scientifique et de qualité (IQ) internationale, qui devrait également être signée par d'autres parties prenantes de l'IQ, telles que CODATA, IAF, CEI, ILAC, IMEKO, ISC et ISO.
    dates:
    - start: '2021-10-19'
      kind: effective
