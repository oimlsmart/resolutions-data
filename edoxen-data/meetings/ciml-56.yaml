  - spelling: fra
    value: Approuve l'utilisation de la norme ISO/CEI 17020 (avec des exigences supplémentaires)
      par les Autori…
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: approves
    message:
    - spelling: eng
      value: 'Approves the use of ISO/IEC 17020 (with additional requirements) by
        OIML Issuing Authorities as an alternative to ISO/IEC 17065 to demonstrate
        competence,

        '
    - spelling: fra
      value: 'Approuve l''utilisation de la norme ISO/CEI 17020 (avec des exigences
        supplémentaires) par les Autorités de Délivrance OIML comme alternative à
        la norme ISO/CEI 17065 pour démontrer la compétence,

        '
    dates:
    - start: '2021-10-19'
      kind: effective
  - type: requests
    message:
    - spelling: eng
      value: 'Requests the OIML-CS MC to revise the relevant OIML-CS publications,
        including OIML B 18 Framework for the OIML Certification System (OIML-CS),
        to implement the necessary changes to allow the use of ISO/IEC 17020 (with
        additional requirements) by OIML Issuing Authorities, and

        '
    - spelling: fra
      value: 'Demande au MC de l''OIML-CS de réviser les publications pertinentes
        de l''OIML-CS, y compris l''OIML B 18 Cadre pour le Système de Certification
        OIML (OIML-CS), afin de mettre en œuvre les changements nécessaires pour permettre
        l''utilisation de la norme ISO/CEI 17020 (avec des exigences supplémentaires)
        par les Autorités de Délivrance de l''OIML, et

        '
    dates:
    - start: '2021-10-19'
      kind: effective
  - type: approves
    message:
    - spelling: eng
      value: 'Approves a new project under the responsibility of the OIML-CS MC to
        develop a new OIML Document to provide guidance and interpretations regarding
        the application of ISO/IEC 17020 to the assessment of OIML Issuing Authorities
        in the OIML-CS, as detailed in the project proposal in Annex A of Addendum
        10.2 to the Working Document for this meeting.

        '
    - spelling: fra
      value: 'Approuve un nouveau projet sous la responsabilité du MC de l''OIML-CS
        pour développer un nouveau Document OIML afin de fournir des conseils et des
        interprétations concernant l''application de la norme ISO/CEI 17020 à l''évaluation
        des Autorités de Délivrance OIML dans l''OIML-CS, comme détaillé dans la proposition
        de projet à l''annexe A de l''Addendum 10.2 au Document de Travail de cette
        Réunion.

        '
    dates:
