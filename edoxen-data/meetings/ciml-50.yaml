- identifier:
  - prefix: CIML
    number: 2015/19
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml201519
  urn: urn:oiml:doc:ciml:resolution:2015-19
  agenda_item:
  dates:
  - date: '2015-10-20'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Resolves to request the 15th OIML Conference to approve the following procedure,
      relevant to
    subject: CIML
    considerations:
    - type: considering
      message: |
        Considering that
        - according to Article XIII of the Convention, persons designated by their government as Member of the Committee shall be serving officials in the department concerned with measuring instruments or have active official functions in the field of legal metrology,
        - according to Article XVII of the Convention, the quorum for decisions at a meeting of the Committee, or for resolutions taken by the Committee by correspondence, is three-quarters of the number of persons designated as Members of the Committee,
        - Noting that
        - it is sometimes not clear whether a person designated as Member of the Committee still satisfies the conditions for membership, and that
        - it is becoming increasingly difficult to achieve the quorum for decisions of the Committee,
        Of the opinion that, if a person designated as Member of the Committee no longer satisfies the conditions for membership of the Committee, this person has ceased to be a Member of the Committee for the purposes of calculating any quorum,
      dates:
      - start: '2015-10-20'
        kind: effective
    actions:
    - type: resolves
      message: |
        Resolves to request the 15th OIML Conference to approve the following procedure, relevant to the fourth paragraph of Article XIII of the Convention:
        a) if the designated representative of a Member State is known to no longer satisfy the conditions for membership of the Committee and the Member State has not yet designated a new representative, this person shall no longer be taken into account when establishing the quorum for decisions of the Committee,
        b) if the designated representative of a Member State has not responded to any communication from the Bureau for more than six months and the Bureau has made all reasonably possible attempts to contact the designated representative, the Bureau shall seek confirmation from the Member State as to the status of its representative in the Committee, according to a procedure decided by the Committee,
        c) if it is not possible, within a reasonable period of time to be decided by the Committee, to obtain confirmation from the Member State as to the status of its representative in the Committee, this person shall no longer be taken into account when establishing the quorum for decisions of the Committee.
      dates:
      - start: '2015-10-20'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: Décide de demander à la $ 1 5^{\mathrm{eme}} $ Conférence de l'OIML d'approuver
      la
    subject: CIML
    considerations:
    - type: considering
      message: |
        Considérant que
        - conformément à l'article XIII de la Convention, les personnes désignées par leur gouvernement en tant que Membre du Comité doivent être fonctionnaires en activité dans le service s'occupant des instruments de mesure ou avoir une fonction officielle active dans le domaine de la métrologie légale,
        - conformément à l'article XVII de la Convention, le quorum pour les décisions lors d'une réunion du Comité, ou pour les résolutions prises par le Comité par correspondance, est des trois-quarts du nombre de personnes désignées comme Membres du Comité,
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: noting
      message: |
        Notant qu'
        - il est parfois difficile de savoir si une personne désignée comme Membre du Comité remplit toujours les conditions pour être Membre, et qu'
        - il devient de plus en plus difficile d'atteindre le quorum pour les décisions du Comité,
        Estime que, si une personne désignée comme Membre du Comité ne remplit plus les conditions pour être Membre du Comité, cette personne cesse d'être un Membre du Comité pour les besoins de calcul du quorum,
      dates:
      - start: '2015-10-20'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide de demander à la $ 1 5^{\mathrm{eme}} $ Conférence de l'OIML d'approuver la procédure suivante, se rapportant au quatrième alinéa de l'article XIII de la Convention :
        a) s'il s'avère que le représentant désigné d'un État Membre ne remplit plus les conditions pour être Membre du Comité et que l'État Membre n'a pas encore désigné un nouveau représentant, cette personne ne doit plus être prise en compte lors de l'établissement du quorum pour les décisions du Comité,
        b) si le représentant désigné d'un État Membre n'a répondu à aucune communication du Bureau pendant plus de six mois et que le Bureau a entrepris toutes les tentatives raisonnablement possibles pour contacter le représentant désigné, le Bureau doit demander confirmation à l'État Membre, du statut de son représentant au sein du Comité, selon une procédure décidée par le Comité,
        c) s'il n'est pas possible, dans un délai raisonnable déterminé par le Comité, d'obtenir la confirmation de l'État Membre du statut de son représentant au sein du Comité, cette personne ne doit plus être prise en compte lors de l'établissement du quorum pour les décisions du Comité.
      dates:
      - start: '2015-10-20'
        kind: effective
    approvals: []
