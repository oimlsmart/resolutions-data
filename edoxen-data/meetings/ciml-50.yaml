  status: decided
  doi: 10.63493/resolutions/ciml201510
  urn: urn:oiml:doc:ciml:resolution:2015-10
  agenda_item:
  dates:
  - date: '2015-10-20'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Instructs the Bureau to continue its efforts to participate in capacity
      building activities through
    subject: CIML
    considerations: []
    actions:
    - type: instructs
      message: |
        Instructs the Bureau to continue its efforts to participate in capacity building activities through training courses and other regional activities organized by other organizations,
        Expresses its support for the work of the DCMAS Network,
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message: 'Instructs the Bureau to continue to work with the constituent bodies
        of the DCMAS Network, in particular the BIPM, in identifying new initiatives
        where the OIML can make a direct contribution,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message: 'Instructs the Bureau to further develop the OIML website such that
        it may be used as a source of up-to-date information on capacity-building
        initiatives, including training materials and, if feasible, a database of
        experts available to contribute to such work,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: endorses
      message: |
        Endorses the proposal of the advisory group, set up by Resolution no. 2013/9, to establish a "pilot training center" and encourages the authorities in P.R. China to give their full support to this initiative,
        Urges other Member States to study the results of this first pilot and to consider, in the light of an evaluation of the pilot, whether they are able to initiate something similar,
        Urges both Member States and Corresponding Members to consider opportunities to second staff to the Bureau in order to develop the skills and experience of appropriate individuals,
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message: 'Requests relevant Technical Committees and Subcommittees to take note
        of the demand from CEEMS to ensure Recommendations take more account of the
        needs of CEEMS,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message: 'Instructs the Certificate System Project Group (CSPG), established
        by Resolution 2015/18, to ensure that the needs of CEEMS are addressed in
        the OIML Certificate System,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message: 'Instructs the Bureau to take account of the need for greater involvement
        of CEEMS in OIML technical work when further developing the OIML website''s
        functionality in supporting the technical work,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message: |
        Instructs the Project Group for the revision of OIML B 6:2013 Directives for OIML technical work (see Resolution no. 2015/13) to take account of the need for greater involvement of CEEMS in OIML technical work when drafting the revision of B 6,
        Urges the conveners of project groups TC 3/SC 6/p 1 Premarket surveillance activities and TC 6/p 5 Guidance for defining the system requirements for a certification system for prepackages to bring their work to a conclusion as soon as possible,
        Urges Member States to be ready to propose conveners for projects to produce other documents proposed during the two seminars organized in 2015,
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: instructs
      message: 'Instructs the Bureau to pay particular attention to the role of the
        OIML Bulletin and the OIML website in facilitating the exchange of new ideas,
        and in particular new approaches to legal metrology,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: notes
      message: 'Notes the particular contribution that research can play in promoting
        and evaluating new approaches to legal metrology, and instructs the Director
        to take this into account when considering projects which can be supported
        by the special fund created by the 14th Conference,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message: 'Requests its President, Vice Presidents and the Bureau to take particular
        account of the needs of CEEMS when involved in activities related to Objective
        5 in the OIML Strategy (OIML B 15:2011).

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: Charge le Bureau de poursuivre ses efforts en vue de participer à des activités
    subject: CIML
    considerations: []
    actions:
    - type: charges
      message: |
        Charge le Bureau de poursuivre ses efforts en vue de participer à des activités de renforcement des capacités à travers des formations et d'autres activités régionales organisées par d'autres organisations,
        Exprime son soutien au travail du Réseau DCMAS,
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message: 'Charge le Bureau de continuer à travailler avec les organes constitutifs
        du réseau DCMAS, en particulier le BIPM, dans l''identification de nouvelles
        initiatives auxquelles l''OIML peut apporter une contribution directe,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message: 'Charge le Bureau de développer davantage le site web de l''OIML de
        telle sorte qu''il puisse être utilisé comme une source d''informations à
        jour sur les initiatives de renforcement des capacités, y compris le matériel
        de formation et, si possible, une base de données d''experts disponibles pour
        contribuer à ces travaux,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: approves
      message: |
        Approuve la proposition du groupe consultatif, mis en place par la Résolution n° 2013/9, de créer un « centre pilote de formation » et encourage les autorités de la République Populaire de Chine à donner leur plein appui à cette initiative,
        Encourage vivement les autres États Membres à étudier les résultats de ce premier centre pilote et à examiner, à la lumière d'une évaluation de celui-ci, s'ils sont en mesure de lancer une initiative similaire,
        Encourage vivement les États Membres et les Membres Correspondants à étudier les possibilités de détacher du personnel auprès du Bureau afin de développer les compétences et l'expérience des personnes concernées,
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message: 'Demande aux Comités et Sous-comités techniques appropriés de prendre
        note de la demande des CEEMS pour s''assurer que les Recommandations tiennent
        davantage compte des besoins des CEEMS,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message: 'Charge le Groupe Projet sur le Système de Certificats (CSPG), créé
        par la Résolution 2015/18, de s''assurer que les besoins des CEEMS sont pris
        en compte dans le Système de Certificats OIML,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message: 'Charge le Bureau de tenir compte de la nécessité d''une plus grande
        implication des CEEMS dans les travaux techniques de l''OIML lors du développement
        des fonctionnalités du site web de l''OIML destinées au soutien des travaux
        techniques,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message: |
        Charge le Groupe Projet sur la révision de l'OIML B 6:2013 Directives pour les travaux techniques de l'OIML (voir Résolution n° 2015/13) de tenir compte de la nécessité d'une plus grande implication des CEEMS dans les travaux techniques de l'OIML lors de la rédaction de la révision du document B 6,
        Encourage vivement les responsables des groupes de projet TC 3/SC 6/p 1 Activités de surveillance de pré-commercialisation et TC 6/p 5 Orientation pour définir les exigences du système concernant le système de certification pour les préemballages à conclure leurs travaux dans les meilleurs délais,
        Encourage vivement les États Membres à se tenir prêts à proposer des responsables de projets pour la rédaction d'autres documents proposés au cours des deux séminaires organisés en 2015,
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: charges
      message: 'Charge le Bureau d''accorder une attention particulière au rôle du
        Bulletin de l''OIML et du site web de l''OIML dans la facilitation de l''échange
        de nouvelles idées et en particulier les nouvelles approches de la métrologie
        légale,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: notes
      message: 'Prend note de la contribution particulière que la recherche peut jouer
        dans la promotion et l''évaluation de nouvelles approches de la métrologie
        légale, et charge le Directeur de prendre cela en compte lors de l''examen
        des projets qui peuvent être financés par le fond spécial créé par la 14ème
        Conférence,

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    - type: requests
      message: 'Demande à son Président, à ses Vice-Présidents et au Bureau de prendre
        particulièrement en compte les besoins des CEEMS lorsqu''ils sont impliqués
        dans des activités liées à l''Objectif 5 de la Stratégie OIML (OIML B 15:2011).

        '
      dates:
      - start: '2015-10-20'
        kind: effective
    approvals: []
