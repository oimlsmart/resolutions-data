  - spelling: fra
    value: Douzième Conférence Internationale de Métrologie Légale
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of the decisions made by the Twelfth Conference
        and requested its Acting President, the Presidium and the Presidential Council
        to monitor their implementation and to report back at the next CIML Meeting.

        '
    - spelling: fra
      value: 'Le Comité a pris note des décisions rendues par la Douzième Conférence
        et a demandé à son Président Intérimaire, au Présidium et au Conseil de la
        Présidence de veiller à leur application et d''en rendre compte lors de la
        prochaine Réunion du CIML.

        '
