    type: decision
  categories: []
  title:
  - spelling: eng
    value: Developing Countries
  - spelling: fra
    value: Pays en Développement
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a report given by Dr Seiler concerning the
        Forum Metrology-Trade Facilitator held on Monday 25 October and instructed
        the Bureau to organize the following-up of this Forum.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un rapport présenté par le Dr Seiler à propos
        du Forum Métrologie - Facilitateur de Commerce tenu lundi 25 octobre et a
        chargé le Bureau d''organiser les suites de ce Forum.

        '
    dates:
    - start: '2004-10-26'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a report given by Mr. Magaña on the activities
        and future of the OIML Development Council and expressed its utmost appreciation
        for the contributions of its Chairperson, Mrs. Annabi.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un rapport présenté par M. Magaña sur les activités
        du Conseil de Développement de l''OIML et a exprimé sa plus grande satisfaction
        pour les contributions de sa Présidente, Mme Annabi.

        '
    dates:
    - start: '2004-10-26'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee noted that OIML work on Developing Country matters could
        be more efficiently managed by the Permanent Working Group on Developing Countries
        as established by the 38th CIML Meeting; the PWGDC should replace the Development
        Council.

        '
    - spelling: fra
      value: 'Le Comité a considéré que le travail de l''OIML sur les questions relatives
        aux Pays en Développement pouvait être géré plus efficacement par le Groupe
        de Travail Permanent sur les Pays en Développement (PWGDC) créé par la 38ème
        Réunion du CIML; le PWGDC devrait remplacer le Conseil de Développement.

        '
    dates:
    - start: '2004-10-26'
      kind: effective
  approvals: []
  considerations: []
