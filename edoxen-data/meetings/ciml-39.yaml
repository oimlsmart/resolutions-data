  title:
  - spelling: eng
    value: Approval of the minutes of the 38th CIML Meeting
  - spelling: fra
    value: Relation entre les DoMC et l'ancien Système de Certificats OIML
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: approves
    message:
    - spelling: eng
      value: 'The Committee approved the minutes of its 38th Meeting without modification.

        '
    - spelling: fra
      value: '1. 1 Lorsqu''une Autorité de Délivrance signe une Déclaration de Confiance
        Mutuelle (DoMC) dans le cadre du MAA, tous les Certificats OIML et les rapports
        d''essai associés émis par cette Autorité de Délivrance pour la catégorie
        d''instruments considérée, seront dès lors délivrés dans les conditions particulières
        résultant de sa participation à la DoMC. Cette Autorité de Délivrance ne sera
        pas autorisée à continuer de délivrer des Certificats dans les seules conditions
        du Système de Certificats OIML.

        '
    dates:
    - start: '2004-10-26'
      kind: effective
