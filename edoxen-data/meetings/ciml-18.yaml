      Conférence sur l''institution …'
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité demande au Bureau de refaire le point sur ce sujet lors de
        sa prochaine réunion en mai 1983, au cours de laquelle sera examinée la situation
        des correspondants ne pouvant pas s''acquitter de leur abonnement.

