  - language_code: fra
    script: Latn
    title: PROCHAINES REUNIONS
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité accepte l''invitation présentée par M. REPSTORFF HOLTVEG
        de tenir sa 19e réunion à Copenhague, les 3, 4 et 5 mai 1983, à l''occasion
        du tricentenaire de la loi danoise sur les poids et mesures.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité accepte l''invitation présentée par M. KIVALO de tenir la
        7e Conférence Internationale de Métrologie Légale, et la 20e réunion du Comité,
        à Helsinki en octobre 1984.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    approvals: []
