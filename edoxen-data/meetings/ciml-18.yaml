      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a également recommandé que ce Secrétariat commence ses travaux
        le plus vite possible, et ne retarde pas les travaux en cours dans le cadre
        du SP 7- Sr 2 (Electronique dans les instruments de pesage).

        '
    dates:
    - start: '1982-03-24'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité donne son accord pour la mise sur pied de ce nouveau Secrétariat
        Rapporteur mais, à la demande de certains participants, les points importants
        suivants devront être clairement élucidés : définition d''un système de mesurage
        (M. PERLSTAIN); liaison avec le nouveau Secrétariat sur l''électronique, car
        de

        '
