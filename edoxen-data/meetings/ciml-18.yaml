- identifier:
  - prefix: CIML
    number: 1982/17
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml198217
  urn: urn:oiml:doc:ciml:resolution:1982-17
  agenda_item:
  dates:
  - date: '1982-03-24'
    type: decision
  categories: []
  localizations:
  - language_code: fra
    script: Latn
    title: CLOTURE
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a adopté le compte rendu de sa 17e réunion.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a accepté les demandes de déclassement de la République
        Populaire Démocratique de Corée et de la Pologne.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a demandé au Bureau de refaire le point sur la situation
        des Membres Correspondants (paiement de l''abonnement forfaitaire) pour la
        prochaine réunion en mai 1983.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a adopté le rapport comptable pour 1980 et a chargé le Bureau
        de le présenter à la prochaine Conférence.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a pris connaissance d''une déclaration du Gouvernement Italien
        et a demandé au Bureau d''introduire certaines modifications dans la présentation
        des documents financiers.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a exprimé son accord de principe vis-à-vis du projet de
        révision du « Mode de travail des Secrétariats de l''OIML », présenté par
        le Bureau, sous réserve d''un certain nombre de modifications indiquées en
        séance.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale :

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a décidé de ne pas instituer de Secrétariat Rapoprteur spécial
        pour le mesurage de la pollution sonore.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a institué deux Secrétariats Rapporteurs : l''un sur les
        dispositifs électroniques associés aux instruments de mesurage (responsable
        Pays-Bas), l''autre sur la métrologie des systèmes de mesurage (responsable
        U.R.S.S.).

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a décidé de reporter à sa prochaine session l''examen de
        la proposition visant à instituer un Secrétariat Rapporteur sur le contrôle
        de la compétence des laboratoires médicaux.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a décidé la suppression des Secrétariats suivants :

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a classé comme thèmes ultérieurs de travail les études des
        Secrétaiats Rapporteurs suivants :

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a transféré du SP 30 au SP 6 le Secrétariat Rapporteur sur
        la calorimétrie des gaz.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a attribué aux Etats-Unis d''Amérique le Secrétariat Rapporteur
        SP 20- Sr 1 : contenu informatif de l''étiquetage.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a chargé le Bureau d''introduire certaines améliorations
        dans la

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité a exprimé son accord vis-à-vis du document élaboré par le
        Bureau, relatif à l''utilisation par les Secrétariats de l''OIML des résultats
        des travaux d''autres institutions internationales, et a chargé le Bureau
        de l''introduire sous forme d''annexe au « Mode de travail ».

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité réaffirme sa déclaration de 1978 relative à la participation
        de représentants de l''industrie aux réunions des Secrétariats de l''OIML.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité estime que les travaux sur l''institution d''un système
        de certification OIML doivent se poursuivre au niveau du groupe ad hoc qui
        reçoit des directives pour la suite de son travail.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité charge le Bureau de poursuivre son étude sur la spécification
        des mots « masse » et « poids ».

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité prend acte d''une déclaration de Mr RAMÓN DARIAS RODÉS,
        Ministre Président du Comité de normalisation de Cuba, présentant les décisions
        prises lors de la Conférence du Mouvement des Pays non-alignés et autres Pays
        en développement, en ce qui concerne la Métrologie et la Normalisation.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité prend acte du rapport sur la réunion du Conseil de Développement
        et charge le Bureau de poursuivre ses activités conformément aux décisions
        prises.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité exprime son accord pour que le Bureau organise en 1983 un
        séminaire sur les contrôles statistiques des produits préemballés.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité décide que sa 19e réunion se tiendra à Copenhague du 3 au
        5 mai 1983.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité décide que sa 20e réunion et la 7e Conférence Internationale
        de Metrologie Légale auront lieu à Helsinki en octobre 1984.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    - type: notes
      message: 'Le Comité charge son Président d''adresser au Dr A.O. McCOUBREY, ancien
        Vice-président, l''expression de sa gratitude.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    approvals: []
