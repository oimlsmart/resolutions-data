  title:
  - spelling: fra
    value: Création de nouveaux Secrétariats
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité jusqu''à présent n''avait pas jugé opportun de créer un Secrétariat
        s''occupant d''un point de vue général des dispositifs électroniques, préférant
        laisser les divers Secrétariats Rapporteurs s''occuper le cas échéant des
        dispositifs électroniques pouvant entrer dans les instruments placés sous
        leur responsabilité.

        '
    dates:
