  - language_code: fra
    script: Latn
    title: Nouvelles adhésions. Perspectives de nouvelles adhésions
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. BIRKELAND réitère ses souhaits de bienvenue à M. KNAPP, représentant
        du Canada, qui prend la parole pour transmettre les salutations du Ministre
        de la Consommation et des Corporations du Canada, ainsi que des fonctionnaires
        canadiens de la branche « métrologie légale ». Il explique les raisons qui
        ont conduit le Gouvernement du Canada à adhérer à l''OIML et décrit l''organisation
        de la métrologie légale au Canada. Celle-ci est en pleine expansion et une
        réorganisation est en cours, en application d''une nouvelle législation. M.
        KNAPP conclut en assurant ses collègues que, progressivement, le Canada prendra
        une part active aux travaux de l''OIML et que cette participation concernera
        non seulement la branche « métrologie légale » qu''il dirige, mais également
        certains autres ministères intéressés par les travaux de Secrétariats de l''OIML.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    approvals: []
- identifier:
