    type: decision
  categories: []
  title:
  - spelling: fra
    value: Examen de la situation de certains Etats Membres
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Sur leur demande, le Comité accepte que la République Populaire Démocratique
        de Corée et la Pologne paient, à partir de 1983, une contribution correspondant
        à la Classe 1, et ce, jusqu''à ce que leur situation économique ou monétaire
        leur permette de repasser dans la Classe 2 qui correspond à leur population.

        '
    dates:
    - start: '1982-03-24'
      kind: effective
  approvals: []
  considerations: []
