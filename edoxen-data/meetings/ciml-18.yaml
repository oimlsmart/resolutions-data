  - language_code: fra
    script: Latn
    title: Examen de la situation financière pour 1981 et estimation pour 1982
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité examine, à titre d''information provisoire, le Rapport Comptable
        pour 1981 qui sera soumis à son adoption à sa prochaine réunion. Il ressort
        de ce Rapport que les dépenses effectuées en 1981 sont relativement proches
        (à 1 % pres) des dépenses autorisées par la dernière Conférence, bien que
        les chiffres d''inflation en France aient été sensiblement supérieurs aux
        prévisions (14 % au lieu de 12 %). M. ATHANE explique que cela a été dû en
        partie à la mise en œuvre d''un programme d''économies très sévère, conformément
        à la demande de la dernière Conférence.

        '
      dates:
      - start: '1982-03-24'
        kind: effective
    approvals: []
