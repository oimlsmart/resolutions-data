      value: 'Le Comité charge le Bureau de poursuivre son étude sur la spécification
        des mots « masse » et « poids ».

        '
    dates:
    - start: '1982-03-24'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité prend acte d''une déclaration de Mr RAMÓN DARIAS RODÉS, Ministre
        Président du Comité de normalisation de Cuba, présentant les décisions prises
        lors de la Conférence du Mouvement des Pays non-alignés et autres Pays en
        développement, en ce qui concerne la Métrologie et la Normalisation.

        '
    dates:
    - start: '1982-03-24'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité prend acte du rapport sur la réunion du Conseil de Développement
        et charge le Bureau de poursuivre ses activités conformément aux décisions
        prises.

        '
    dates:
    - start: '1982-03-24'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité exprime son accord pour que le Bureau organise en 1983 un
        séminaire sur les contrôles statistiques des produits préemballés.

        '
    dates:
    - start: '1982-03-24'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité décide que sa 19e réunion se tiendra à Copenhague du 3 au
        5 mai 1983.

        '
    dates:
    - start: '1982-03-24'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité décide que sa 20e réunion et la 7e Conférence Internationale
        de Metrologie Légale auront lieu à Helsinki en octobre 1984.

        '
    dates:
    - start: '1982-03-24'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité charge son Président d''adresser au Dr A.O. McCOUBREY, ancien
        Vice-président, l''expression de sa gratitude.

        '
    dates:
    - start: '1982-03-24'
      kind: effective
