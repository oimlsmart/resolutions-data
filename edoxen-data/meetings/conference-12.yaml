    - spelling: eng
      value: |
        The Conference took note of a report concerning the results of various inquiries carried out by the BIML in
              order to ascertain the views of manufacturers and CIML Members concerning advisable developments of the
              System.
              The Conference confirmed the urgency of addressing the problem of conformity to type of measuring
              instruments.
    - spelling: fra
      value: 'La Conférence a pris note d''un rapport concernant les résultats de
        diverses enquêtes effectuées par le BIML afin d''e prendre connaissance des
        avis des fabricants et des Membres du CIML en ce qui concerne les développements
        recommandés du Système.

        '
