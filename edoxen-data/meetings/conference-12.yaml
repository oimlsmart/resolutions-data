  - spelling: eng
    value: Report on activities for the period 2001–2004
  - spelling: fra
    value: Rapport sur les activités de la période 2001-2004
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: |
        The Conference took note of a report concerning the Development Council meeting held on 25 October and
              expressed its appreciation to the Chairperson for the work accomplished.
              The Conference noted in particular the report concerning the Forum: Metrology – Trade Facilitator held on 25
              October 2004 and expressed its appreciation to the German Authorities for having organized this event.
    - spelling: fra
      value: 'La Conférence a pris note d''un rapport concernant la réunion du Conseil
        de Développement tenue le 25 octobre et a exprimé sa satisfaction à la Présidente
        pour le travail accompli.

        '
    dates:
    - start: '2004-10-26'
      kind: effective
  approvals: []
