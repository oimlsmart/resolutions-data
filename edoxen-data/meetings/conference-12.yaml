      value: |
        The Conference accepted (with one abstention) to consider the budgetary proposals as a whole and not in
              separate components.
              The Conference adopted the following Resolution:
              The International Conference of Legal Metrology,
              ACCEPTING the budgetary proposals of the Director of the International Bureau of Legal Metrology for the
              financial period beginning January 1, 2005 and ending December 31, 2008;
              APPROVES the fee structure and the budget for the Organization’s expenses annexed to these Decisions and
              Resolutions;
    - spelling: fra
