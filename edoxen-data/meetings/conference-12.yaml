  - language_code: eng
    script: Latn
    title: New Members - Expected accessions
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: |
        The Conference noted that the number of OIML Members had significantly increased since the Eleventh
              Conference, although a number of Corresponding Members had been delisted for not having paid their
              subscriptions for over three years. The Conference noted that certain Corresponding Members were
              envisaging joining as Member States and that a number of countries/economies were expected to join as
              Corresponding Members.
      dates:
      - start: '2004-10-26'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: Nouveaux Membres - Perspectives d'adhésions
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'La Conférence a constaté que le nombre de Membres de l''OIML avait
        significativement augmenté depuis la Onzième Conférence, malgré le fait que
        plusieurs Membres Correspondants avaient été radiés pour non paiement de leur
        contribution pendant plus de trois ans. La Conférence a pris note du fait
        que certains Membres Correspondants envisageaient d''adhérer en tant qu''États
        Membres et que plusieurs pays/économies comptaient adhérer en tant que Membres
        Correspondants.

        '
      dates:
      - start: '2004-10-26'
        kind: effective
    approvals: []
