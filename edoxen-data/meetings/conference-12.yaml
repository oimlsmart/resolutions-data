  actions:
  - type: notes
    message:
    - spelling: eng
      value: |
        The Conference took note of a report describing progress made with this activity since the establishment of
              the System in general and since the 11th Conference in particular, including the results of recent inquiries
              carried out among OIML Members and manufacturers.
    - spelling: fra
      value: 'La Conférence a pris note d''un rapport décrivant les progrès réalisés
        dans le cadre de cette activité depuis la création du Système en général et
        depuis la Onzième Conférence en particulier, incluant les résultats des récentes
        enquêtes effectuées parmi les Membres de l''OIML et les fabricants d''instruments
        de mesure.

        '
