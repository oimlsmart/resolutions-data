  actions:
  - type: notes
    message:
    - spelling: eng
      value: |
        The Conference took note of information given by the Bureau concerning the implementation of OIML
              Recommendations in national regulations or voluntary standards. It noted that due to the low level of
              responses, no comprehensive report could be given.
              Member States that had not yet replied to the BIML inquiry were requested to do so urgently. The Conference
              encouraged the Bureau to convert this information and inquiries into a permanent interactive facility on the
              OIML web site.
    - spelling: fra
      value: 'La Conférence a pris note d''informations fournies par le Bureau concernant
        la mise en application des Recommandations OIML dans les réglementations nationales
        ou les normes d''application volontaire. Il a été constaté qu''en raison du
        faible taux de réponses, aucun rapport complet ne pouvait être donné.

        '
    dates:
    - start: '2004-10-26'
      kind: effective
  approvals: []
  considerations: []
