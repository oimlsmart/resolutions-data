  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: |
        The Conference took note of a report given by the BIML Director on this issue.
              The Conference noted that the OIML Retirement scheme will be balanced for the period 2005–2008 without
              an additional endowment from the Organization being necessary.
              The Conference noted that additional studies are necessary for assessing the rights of the Staff and the
              commitments of the Organization concerning the Retirement scheme and for examining how these
              commitments must be recorded in the Organization’s accounts.
              The Conference instructed the CIML to undertake these studies and to report and make proposals to the
              Thirteenth Conference.
    - spelling: fra
      value: 'La Conférence a pris note d''un rapport fourni par le Directeur du BIML
        sur cette question.

        '
