    value: Mutual Acceptance Arrangement (MAA)
  - spelling: fra
    value: Arrangement d'Acceptation Mutuelle (MAA)
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: |
        The Conference expressed its appreciation to the CIML for the setting up of the Mutual Acceptance
              Arrangement, and took note that this System will be implemented in 2005.
              The Conference took note of proposals concerning the operation of the MAA and of the Certificate System.
              The Conference instructed the Committee to take appropriate decisions on these proposals and to begin a
              revision of this document once experience has been gained following its implementation.
    - spelling: fra
      value: 'La Conférence a exprimé sa satisfaction pour la mise en place par le
        CIML de l''Arrangement d''Acceptation Mutuelle, et a pris note que ce Système
        entrerait en application en 2005.

        '
    dates:
    - start: '2004-10-26'
      kind: effective
