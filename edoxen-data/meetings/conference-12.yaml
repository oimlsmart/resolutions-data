  title:
  - spelling: eng
    value: Examination of the management of the budget from 2000 to 2003 and the estimates
      for 2004
  - spelling: fra
    value: Examen de la gestion du budget de 2000 à 2003 et estimations pour 2004
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: |
        The International Conference of Legal Metrology,
              HAVING EXAMINED the report on the management of the budget for the years 2000, 2001, 2002 and 2003;
              NOTING that the budget was managed in conformity with the expenses necessary for carrying out the work
              of the Bureau and that the accuracy of the report has been certified by annual audits;
              NOTING that the respective functions assigned by the Convention to the President of the International
              Committee of Legal Metrology and to the Director of the International Bureau of Legal Metrology have been
              fulfilled;
              GIVES ITS DEFINITIVE DISCHARGE to the President of the Committee and to the Director of the Bureau
              for their management of the budget during the years mentioned above.
    - spelling: fra
      value: 'La Conférence Internationale de Métrologie Légale,

        '
    dates:
    - start: '2004-10-26'
      kind: effective
