    message:
    - spelling: eng
      value: |
        The Conference noted that Zambia had been struck off the list of Member States for not having complied with
              the requirements laid down by the Eleventh Conference.
              It was also noted that the situation of two Member States would first be examined by the Finance
              Commission, which would then report to the Conference under Item 8.2.
    - spelling: fra
      value: 'La Conférence a noté que la Zambie avait été radiée de la liste des
        États Membres faute de s''être conformée aux obligations établies par la Onzième
        Conférence.

        '
    dates:
    - start: '2004-10-26'
      kind: effective
  approvals: []
  considerations: []
