- identifier:
  - prefix: Conference
    number: 2004/7.2
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/conf20047.2
  urn: urn:oiml:doc:conf:resolution:12.7.2
  agenda_item:
  dates:
  - date: '2004-10-26'
    type: decision
  categories: []
  title:
  - spelling: eng
    value: Guidelines for future activity
  - spelling: fra
    value: Directives pour l'activité à venir
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: |
        The Conference noted the Committee’s report that, notwithstanding Resolution 7.2 of the 6th International
              Conference of Legal Metrology which established the OIML Development Council, the OIML’s work on
              Developing Country matters could be more efficiently managed by the establishment of a Permanent Working
              Group on Developing Countries (PWGDC), which would replace the Development Council.
              The Conference therefore approved the decision of the 38th CIML Meeting to create a PWGDC, the terms of
              reference of which shall be established by the Committee. This Permanent Working Group shall act as an
              advisory body to the President of the Committee on aspects of the OIML’s work relating to Developing
              Countries.
              The Conference also decided to cease the activities of the current Development Council.
    - spelling: fra
      value: 'La Conférence a pris note du rapport du Comité selon lequel, en dépit
        de la Résolution 7.2 de la 6ème Conférence Internationale de Métrologie Légale
        qui instituait le Conseil de Développement de l''OIML, le travail de l''OIML
        sur les questions relatives aux Pays en Développement pourrait être géré plus
        efficacement par un Groupe de Travail Permanent pour les Pays en Développement
        (PWGDC), créé pour remplacer le Conseil de Développement.

        '
    dates:
    - start: '2004-10-26'
      kind: effective
  approvals: []
  considerations: []
