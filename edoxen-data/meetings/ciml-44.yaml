  categories: []
  title:
  - spelling: eng
    value: The Committee noted that the outcome of the periodic review by TC 8 on
  - spelling: fra
    value: Le Comité a noté que le résultat de la revue périodique du TC 8
  subject:
  - spelling: eng
    value: OIML Conference
  - spelling: fra
    value: Conférence OIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: |
        The Committee noted that the outcome of the periodic review by TC 8 on the confirmation, revision or withdrawal of the following publications:
        - R120 Standard capacity measures for testing measuring systems for liquids other than water;
        D25 Vortex meters used in measuring systems for fluids; and
        D26 Glass delivery measures - Automatic pipettes
        was indecisive, but that for each there was a majority of P-members in favor of retaining the publications.
        The Committee further noted that a number of references in these publications are no longer up-to-date and that this was the reason for some P-members to vote for a revision.
        The Committee, therefore:
        - requests the secretariat of TC 8 to submit to the Bureau listings of updated references for these publications; and
        - instructs the Bureau to publish the lists of updated references and updated versions of these publications.
    - spelling: fra
      value: |
        Le Comité a noté que le résultat de la revue périodique du TC 8 portant sur la confirmation, la révision ou le retrait des publications suivantes:
        - R 120 Mesures de capacité étalons pour l'essai des ensembles de mesurage de liquides autres que l'eau;
        D 25 Compteurs à vortex utilisés dans les ensembles de mesurage de fluides; et
        D 26 Mesures en verre à délivrer - Pipettes automatiques
        n'était pas concluant, mais que pour chacune d'entre elles, une majorité de Membres-P était favorable au maintien de ces publications.
        Le Comité a également noté que nombre de références dans ces publications ne sont plus à jour et que cela était la raison pour laquelle certains Membres-P avaient voté pour une révision de ces publications.
        Aussi, le Comité:
        - a requis du Secrétariat du TC 8 de soumettre au Bureau les listes des références de ces publications mises à jour; et
        - a instruit le Bureau de publier ces listes de références mises à jour ainsi que les versions mises à jour de ces publications.
    dates:
    - start: '2009-10-27'
      kind: effective
  approvals: []
  considerations: []
