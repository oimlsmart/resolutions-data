  - spelling: eng
    value: Communication, web site
  - spelling: fra
    value: Communication, site Internet
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a presentation given by Mr. Pulham, notably
        concerning the advancement of joint BIPM-OIML projects, developments in the
        interactive parts of the web site, and future developments envisaged in this
        domain.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un exposé effectué par M. Pulham, concernant
        notamment l''avancée des projets communs entre le BIPM et l''OIML, les développements
        des parties interactives du site Internet et les futurs développements envisagés
        dans ce domaine.

        '
    dates:
    - start: '2007-10-24'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee reiterated its request to CIML Members to make extensive
        and timely use of the online facilities for voting and commenting on drafts,
        and updating information.

        '
    - spelling: fra
      value: 'Le Comité a réitéré sa demande aux Membres du CIML d''utiliser largement
        et régulièrement le site Internet pour voter sur les projets, y apporter des
        remarques et mettre à jour leurs informations.

        '
    dates:
    - start: '2007-10-24'
      kind: effective
