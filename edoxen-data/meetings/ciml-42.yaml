  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a report given by the BIML Director on Liaison
        activities with other Organizations and instructed the CIML President to sign
        the extension of the existing ILAC-OIML MoU to also include the IAF.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un rapport donné par le Directeur du BIML sur
        les Activités en liaison avec d''autres Organisations et a chargé le Président
        du CIML de signer la reconduction du MoU existant entre l''ILAC et l''OIML
        afin d''inclure également l''IAF.

        '
    dates:
    - start: '2007-10-24'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee asked the CIML President to monitor and update, if necessary,
        the joint working programs with the BIPM, ILAC and IAF.

        '
    - spelling: fra
      value: 'Le Comité a demandé au Président du CIML de surveiller et mettre à jour
        si nécessaire les programmes de travail communs avec le BIPM, l''ILAC et l''IAF.

        '
