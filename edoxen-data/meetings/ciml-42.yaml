  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of presentations given by Mr. Dunmill and Dr.
        Seiler and instructed the Bureau to prepare, with Dr. Seiler, a procedure
        to identify and reward exemplary actions carried out by Developing Countries
        for the progress of legal metrology. This procedure will be submitted to the
        CIML for approval.

        '
    - spelling: fra
      value: 'Le Comité a pris note des exposés de M. Dunmill et du Docteur Seiler
        et a chargé le Bureau de préparer, avec le Docteur Seiler, une procédure visant
        à identifier et récompenser les actions exemplaires accomplies par les Pays
        en Développement pour l''avancée de la métrologie légale. Cette procédure
        sera soumise à l''approbation du CIML.

        '
