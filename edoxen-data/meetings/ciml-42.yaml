  title:
  - spelling: eng
    value: Report on the RLMO Round Table and Conformity to Type Working Group
  - spelling: fra
    value: Rapport concernant la Table Ronde des RLMO et le Groupe de Travail sur
      la Conformité au Type
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a report given by the BIML Director on the
        RLMO Round Table, noted that presentations given by RLMOs were posted on the
        OIML web site and agreed to set up a working group on funding resources, chaired
        by Mr. Carstens.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un rapport présenté par le Directeur du BIML
        concernant la Table Ronde des organisations régionales de métrologie légale
        (RLMO), a noté que les exposés effectués par les RLMO ont été mis en ligne
        sur le site web de l''OIML et a accepté de mettre en place un groupe de travail
        sur les ressources de financement, présidé par M. Carstens.

        '
    dates:
    - start: '2007-10-24'
      kind: effective
  - type: instructs
    message:
    - spelling: eng
      value: 'The Committee instructed the Bureau to:

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un rapport présenté par le Directeur du BIML
        concernant le Groupe de Travail sur la Conformité au Type et a chargé le BIML
        de rédiger un projet de termes de référence pour une étude sur la conformité
        au type.

        '
    dates:
    - start: '2007-10-24'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a report given by the BIML Director on the
        CTT WG and instructed the BIML to draw up draft terms of reference for a study
        on conformity to type.

        '
    dates:
    - start: '2007-10-24'
      kind: effective
  approvals: []
  considerations: []
