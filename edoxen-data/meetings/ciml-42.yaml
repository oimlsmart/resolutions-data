  title:
  - spelling: eng
    value: MID Tables
  - spelling: fra
    value: Tableaux de la MID (directive européenne sur les instruments de mesure)
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a presentation given by the BIML Director
        and instructed the Bureau to continue its cooperation with WELMEC on this
        issue, and requested the European participants of the appropriate TCs/SCs,
        to draw up the first draft tables of correspondence with the MID requirements
        as soon as a Recommendation reaches DR status.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un exposé du Directeur du BIML et a chargé
        le Bureau de continuer sa coopération avec WELMEC concernant ce point. Le
        Comité a également demandé aux participants européens des TC/SC concernés
        de rédiger les premiers projets de tableaux de correspondance avec les exigences
        de la MID dès qu''une Recommandation reçoit le statut de DR (Draft Recommendation).

        '
    dates:
    - start: '2007-10-24'
      kind: effective
  approvals: []
  considerations: []
