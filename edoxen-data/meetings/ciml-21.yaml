    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Mr. THULIN recalls that after the success of the first two OIML seminars
        (electronics in Boras, and control of prepackages in Bern), a third seminar
        was organized in Paris on bulk weighing. For the first time, two languages
        were used, French and English, with simultaneous translation. This seminar
        organized with the assistance of the French Administration and the Federation
        of Weighing Instruments Manufactures, has brought together more than 100 participants
        and was a great success.

        '
