- identifier:
  - prefix: CIML
    number: 1986/15
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml198615
  urn: urn:oiml:doc:ciml:resolution:1986-15
  agenda_item:
  dates:
  - date: '1986-04-16'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: PREPARATION OF THE 8TH CONFERENCE
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Mr. HARVEY confirms the invitation of the Australian Government for
        October 1988. The year 1988 is a very significant year since it commemorates
        the bicentary of European settlement in Australia. As indicated in 1984 by
        Mr. PETRY, the former Committee Member for Australia, arrangements have already
        been made for the period from 24 to 28 October 1988 (hotel reservations and
        conference room, receptions, lunches for the delegates, etc.). At the same
        time, the problems of translation, of secretariats and of technical visits
        is being studied and information on touristic programmes will also be given
        to the delegates and accompanying persons.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    approvals: []
- identifier:
  - prefix: CIML
    number: 1986/16
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml198616
  urn: urn:oiml:doc:ciml:resolution:1986-16
  agenda_item:
  dates:
  - date: '1986-04-16'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: PREPARATION OF THE 22nd COMMITTEE MEETING
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee is in agreement with the proposal of Mr. BIRKELAND to
        hold the next Committee meeting in Paris, September 1987.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee indicates its agreement by acclamation and Messrs BIRKELAND
        and ISSAEV return to their places at the Presidential table.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: approves
      message: 'The Committee approved the report of the 20th CIML meeting without
        modification.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of the report on the anticipated accessions
        of new Member States and Corresponding Members, as well as on the situation
        of two Corresponding Members (Fiji and Jamaica) considered as no longer being
        part of the Organization because of non-payment of their subscriptions.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: approves
      message: 'The Committee approved the accountant report for 1984 and instructed
        its President and the Director of the Bureau to submit it to the Eighth Conference.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of the accountant report for 1985 and instructed
        its President and the Director of the Bureau to submit it for approval during
        the 22nd CIML meeting.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of the financial estimates for 1986.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee extended the contract of Mr PETIK, Assistant Director,
        for 2 years. In addition, it took note of the information concerning the replacement
        for Mr TURSKI, Consultant Engineer, who will take his retirement in March
        1987.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: decides
      message: 'The Committee decided :

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: decides
      message: 'The Committee decided to modify the detailed rules of the retirement
        plan as follows:

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of the report on the implementation of the
        decisions of the Seventh Conference.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee provisionally adopted two draft International Recommendations
        :

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: instructs
      message: 'The Committee instructed the Presidential Council to study the problems
        of different categories of OIML publications, on the basis of the proposals
        presented by Mr EDGERLY, and also the problems concerning the OIML vocabularies
        on the basis of the proposals presented by Mr PODGORSKI.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of the report on the publication of the brochure:
        《 Guide for CIML Members 》。

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of the report presented by the Chairman of
        the Development Council and approved the draft work program for 1986-1988.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of the reports on the relations between OIML
        and various International and Regional Institutions and requested the Bureau
        to continue its activities in this field.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of and expressed its satisfaction with the
        report on the OIML Bulletin and encouraged the Bureau to continue its efforts.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of and expressed its satisfaction with the
        information on the technical seminar held in April 1985 and the intentions
        of the Bureau to organize another seminar in 1987.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee adopted the International Document "Guidelines for bi-
        and multilateral arrangements on the recognition of : test results - pattern
        approvals - verifications ".

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: instructs
      message: 'The Committee instructed the Pesidential Council to follow the developments
        in the field of certification, on the basis of studies carried out by SP 2-Sr
        4, and to report on this matter during the next CIML meeting.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of the report on the activities of the Bureau
        during the period October 1984 - March 1986.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee took note of the report presented by the Delegation
        of Australia and the Bureau on the preparations for the Eighth Conference,
        which will take place in Sydney from 24 to 28 October 1988.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: decides
      message: 'The Committee decided that the 22nd meeting will take place in Paris,
        September 1987.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee re-elected for a 6-year period :

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee elected for a 6-year period :

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    - type: notes
      message: 'The Committee nominated as Honorary Members : Mr. W. MUHE, Fed. Rep.
        of Germany Mr. H.W. LIERS, German Dem. Rep.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    approvals: []
