  status: decided
  doi: 10.63493/resolutions/ciml198613.1
  urn: urn:oiml:doc:ciml:resolution:1986-13.1
  agenda_item:
  dates:
  - date: '1986-04-16'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Various activities
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Mr. PETIK recalls that the question of mutual recognition of metrological
        controls started to be studied about 10 years ago. An ad hoc group was instructed
        to study the methods of operation of an OIML certification system. At the
        end of the work of this ad hoc group the Committee noted that for economic
        and political reasons beyond its control such a system could not be set up
        at present. Waiting for this to become possible, SP2-Sr4 under the responsibility
        of the Bureau was instructed to study the possibility of punctual actions
        which could favor the eventual setting up of an OIML certification system.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    approvals: []
- identifier:
  - prefix: CIML
    number: 1986/13.3
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml198613.3
  urn: urn:oiml:doc:ciml:resolution:1986-13.3
  agenda_item:
  dates:
  - date: '1986-04-16'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Directives for future activities
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Mr. ATHANE recalls that one of the actions proposed by SP 2-Sr4 (reference
        to OIML in the national pattern approval decisions) was not accepted by the
        Committee and it may therefore be appropriate to reflect on this subject.
        Furthermore, it may be appropriate to examine the possibility of a common
        action with IEC and ISO whenever there exist simultaneous OIML RI''s/DI''s
        and ISO/IEC Standards for the same category of instruments. BIPM could also
        be associated whenever certification is based on measurement standards traceable
        to those of BIPM.

        '
      dates:
      - start: '1986-04-16'
        kind: effective
    approvals: []
