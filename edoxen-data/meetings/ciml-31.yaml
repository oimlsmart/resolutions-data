    - spelling: fra
      value: 'M. Athané indique qu''il avait eu l''intention de parler de ce sujet
        dans le cadre d''une fusion prévisible avec le BIPM. Cependant, étant donné
        que cette fusion n''est plus possible (au moins pour les cinq ou dix prochaines
        années) il n''y a pas besoin de fournir beaucoup d''informations à ce sujet.

        '
