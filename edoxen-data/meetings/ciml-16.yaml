    script: Latn
    title: DISPOSITIONS FINANCIERES
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: '5. 1. Dans l''optique de favoriser la participation effective aux
        travaux de ce Conseil du plus possible de ses membres en provenance des Pays
        en voie de développement, l''Organisation prend en charge les frais de voyage
        et de séjour de trois de ceux-ci à l''occasion de chaque réunion.

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    approvals: []
- identifier:
  - prefix: CIML
    number: 1978/6
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml197806
  urn: urn:oiml:doc:ciml:resolution:1978-06
  agenda_item:
  dates:
  - date: '1978-06-19'
    type: decision
  categories: []
  localizations:
  - language_code: fra
    script: Latn
    title: DISPOSITION TRANSITOIRE
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité déclare que cette phrase signifie que ces représentants
        agissent entant qu''experts du Service sans qu''il soit nécessaire qu''ils
        soient des employés de ce Service.

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité rappelle d''autre part que la désignation de ces représentants
        est laissée au libre choix des Membres du CIML et que ces représentants «
        doivent exprimer non seulement les opinions de ce Service mais aussi celles
        de tous les organismes qui, dans leur pays, s''occupent de ces questions »
        et que « lors des réunions ils peuvent être accompagnés, avec voix consultative,
        de toutes personnalités dont l''aide leur paraît opportune ». (*)

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité constate qu''en raison des niveaux très divers de développement
        de leurs Services nationaux de métrologie, les EtatsMembres de l''OIML n''ont
        pas tous les mêmes possibilités d''étudier et de juger les projets de Recommandations
        techniques qui leur sont proposés.

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité demande de plus que les Secrétariats de l''OIML, à l''occasion
        de la révision systématique des Recommandations dont ils sont responsables,
        tiennent le plus grand compte des observations qui seront formulées par des
        pays qui, ayant initialement fait confiance aux auteurs des projets, seraient
        ultérieurement en mesure d''étudier et de critiquer les dites Recommandations.

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale,

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale,

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité a pris des décisions concernant la création, la suppression
        et l''attribution de Secrétariats Pilotes et/ou Rapporteurs. Ces décisions
        apparaîtront dans la prochaine édition de la « Liste des Secrétariats de l''OIML
        » (*).

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité s''est félicité de constater que la Résolution de la Conférence
        a été suivie.

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité a adopté les Documents Internationaux :

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité décide la création d''un groupe ad hoc chargé d''étudier
        le problème de l''établissement de la marque de conformité.

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    - type: notes
      message: 'Le Comité International de Métrologie Légale,

        '
      dates:
      - start: '1978-06-19'
        kind: effective
    approvals: []
