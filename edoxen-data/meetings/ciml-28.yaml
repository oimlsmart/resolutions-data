        kind: effective
    - type: notes
      message: 'Le Comité a soutenu la proposition de Programme de Travail du Conseil
        de Développement pour la période 1993-1995, qui comprend:

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a chargé le BIML d''étudier les possibilités d''organiser
        une conférence internationale sur les activités métrologiques des pays en
        développement. Cette conférence

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a chargé le Conseil de la Présidence de l''OIML de prendre
        en considération les besoins et problèmes spécifiques des pays en développement
        dans le domaine de la métrologie légale lors de la préparation d''un ou plusieurs
        documents sur la politique à long terme de l''OIML.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a aussi indiqué que la prochaine réunion du Conseil de Développement
        se tiendra en 1994 conjointement à la 29ème réunion du CIML. Le Comité a soutenu
        la recommandation du Conseil de Développement demandant que le support financier
        alloué au Conseil de Développement soit consacré à aider les pays membres
        à participer à cette réunion du Conseil de Développement.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a enfin noté la réélection de M. Benkirane, Membre du CIML
        pour le Maroc, en tant que Président du Conseil de Développement pour la période
        1993-1995 et a exprimé sa vive appréciation pour les actions de M. Benkirane.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''informations concernant le nouveau Bulletin
        OIML, données par ses éditeurs, et a exprimé sa vive appréciation pour les
        efforts faits pour rendre la publication plus attractive et accroître l''audience
        de l''OIML.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a souligné l''importance d''une contribution active de la
        part des Membres du CIML pour les développements futurs du Bulletin OIML.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note des prévisions pour mener à terme le travail
        d''élaboration d''une nouvelle brochure d''information générale sur l''OIML.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note que le BIML allait chercher les informations
        relatives aux implications financières de la réalisation de la brochure auprès
        de services professionnels.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a chargé les Membres du Comité d''envoyer au BIML toutes
        propositions et/ou documents pouvant être inclus dans la brochure avant janvier
        1994 et a pris note du fait que les propositions finales pour la brochure
        devront être présentées lors de la prochaine réunion du Conseil de la Présidence.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note du rapport sur les activités du BIML de novembre
        1992 à septembre 1993 et a exprimé sa vive appréciation pour la façon dont
        était présenté ce rapport destiné aux Membres du CIML; le Comité a chargé
        le BIML de publier dans le Bulletin OIML l''information sur les activités
        du BIML de façon appropriée.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''une proposition du BIML d''organiser un séminaire
        technique sur les instruments de pesage ou les instruments médicaux fin 1994
        ou début 1995. Le Comité a demandé à ses Membres d''envoyer leurs suggestions
        au BIML dès que possible.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a décidé de tenir sa 29ème réunion à Paris en octobre 1994,
        organisée par le BIML.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a accepté l''invitation de la R.P. de Chine de tenir la
        30ème réunion du CIML à Pékin en 1995.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note de la confirmation de Cuba pour son invitation
        à tenir la 10ème Conférence de l''OIML à La Havane en 1996.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    approvals: []
