    title: 1 Rapport sur la mise en application des nouvelles Directives pour les
      travaux techniques
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. ATHANÉ indique que les Directives pour les travaux techniques de
        l''OIML, partie 1 relative aux structures et procédures, et partie 2 relative
        à la rédaction et présentation des Recommandations et Documents OIML, approuvées
        par le Comité en 1992 et 1991 respectivement, ont été très largement diffusées
        auprès de tous les États Membres. Une édition imprimée définitive est prévue
        pour 1994. Le Bureau s''est efforcé d''assister aux réunions de comités techniques
        et sous-comités pour expliquer ces nouvelles Directives aux experts qui participent
        aux travaux techniques OIML.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    approvals: []
