    actions:
    - type: notes
      message: 'M. ATHANÉ indique que, contrairement à ce qui avait été annoncé, un
        état d''avancement des travaux des anciens secrétariats pilotes et rapporteurs
        n''a pas été préparé par le Bureau; il a en effet été jugé préférable de ne
        pas perdre de temps à réaliser un document rendu inutile par le remplacement
        des secrétariats par les nouveaux comités techniques et sous-comités. Au contraire,
        un nouveau document présentant l''état d''avancement des travaux de ces comités
        techniques et sous-comités (développement des thèmes) sera préparé dès que
        les structures de tous les comités techniques auront été établies.

        '
