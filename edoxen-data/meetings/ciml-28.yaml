    title: 2 Situation de certains Membres
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. ATHANÉ indique tout d''abord que Liban, dont la participation à
        l''OIML avait été suspendue en 1992 en raison du non-paiement de ses contributions,
        semblait avoir décidé de réintégrer sa position d''État Membre et avait indiqué
        qu''il allait payer une partie de sa contribution pour 1993; la situation
        de ce pays devrait être clarifiée avec les autorités concernées de son ambassade
        à Paris dans un proche avenir.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    approvals: []
