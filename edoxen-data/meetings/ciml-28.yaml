    title: 1 Nouveaux Membres - Perspectives de nouvelles adhésions
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'M. ATHANÉ rappelle l''adhésion comme État Membre de la République
        de Slovénie, au début de 1993. Certains pays, en particulier des républiques
        de l''ex-URSS, comme l''Ukraine ou la Biélorussie, envisagent d''adhérer à
        l''OIML; deux Membres Correspondants, le Luxembourg et l''Islande, pourraient
        dans l''avir décider de devenir États Membres; enfin, d''autres pays d''Amérique
        Latine et d''Asie, se sont renseignés auprès du BIML sur les modalités d''adhésion
        comme États Membres ou Membres Correspondants. M. ATHANÉ ajoute que le BIML
        reste prudent dans ces contacts avec ces pays non membres et ne les encourage
        à adhérer comme États Membres que s''ils en ont réellement la possibilité
        tant financière que technique.

        '
      dates:
      - start: '1993-10-04'
        kind: effective
    approvals: []
