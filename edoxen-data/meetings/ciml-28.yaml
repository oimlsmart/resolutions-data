    title: 2 Recommandations pouvant être appliquées au Système
    subject: "(The CIML)"
    considerations: []
    actions:
    - type: notes
      message: 'Le Bureau donne des informations sur les Recommandations qui pourraient
        rentrer dans le Système. En ce qui concerne les nouveaux textes que le Comité
        vient d''approuver, un problème se pose pour la Recommandation sur les poids;
        en effet, les anciennes Recommandations 1, 2 et 20 avaient été considérées
        comme applicables au Système bien que les méthodes d''essai et le format du
        rapport d''essai manquent. Certains Membres du Comité demandent que la nouvelle
        Recommandation ne soit pas applicable au Système avant que ces annexes ne
        soient établies par le TC 9 sur la base des travaux du "groupe des pays nordiques"
        qui a déjà établi des annexes similaires pour d''autres catégories d''instruments.
        Le Comité adopte la résolution suivante:

