  title:
  - spelling: eng
    value: Agenda item 11.5
  - spelling: fra
    value: Remercie les personnes qui ont été des mentors pour les dernières éditions,
      celles qui
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'Notes the continued success of the concept of "Mentor" for key topics
        of the OIML Bulletin,

        '
    - spelling: fra
      value: |
        Remercie les personnes qui ont été des mentors pour les dernières éditions, celles qui ont déjà proposé d'être des mentors pour les prochaines éditions, ainsi que tous les auteurs qui ont contribué au Bulletin,
        Encourage les Membres à se proposer comme mentors pour les thèmes clés des prochaines éditions,
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: thanks
    message:
    - spelling: eng
      value: |
        Thanks those individuals who have been Mentors for recent editions, those who have already offered to be Mentors for future editions, and all the contributing authors,
        Encourages Members to nominate themselves as Mentors for key topics of future editions,
    - spelling: fra
      value: 'Remercie le Rédacteur du BIML pour son soutien dans la promotion du
        Bulletin de l''OIML,

        '
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: thanks
    message:
    - spelling: eng
      value: |
        Thanks the BIML Editor for his support in the promotion of the OIML Bulletin,
        Tasks the BIML Editor with introducing a new trial "Letters to the Editor" section,
        Tasks the BIML Editor with exploring possibilities to publish peer-reviewed, scientifically-oriented articles with relevance to legal metrology,
    - spelling: fra
      value: 'Charge le Rédacteur du BIML d''introduire une nouvelle section « Lettres
        à l''éditeur »,

        '
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: requests
    message:
    - spelling: eng
      value: |
        Requests appropriately qualified individuals to nominate themselves to form a peer-review editorial panel,
        Encourages Members to submit scientific-oriented articles for peer review, and
    - spelling: fra
      value: 'Charge le Rédacteur du BIML d''explorer les possibilités de publier
        des articles scientifiques évalués par les pairs et pertinents pour la métrologie
        légale,

        '
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: confirms
    message:
    - spelling: eng
      value: 'Confirms its continued support for the OIML Bulletin.

        '
    - spelling: fra
      value: |
        Demande à des personnes dûment qualifiées de se proposer pour former un comité éditorial,
        Encourage les Membres à soumettre des articles à caractère scientifique pour examen par les pairs, et Confirme son soutien continu au Bulletin de l'OIML.
    dates:
    - start: '2023-10-17'
      kind: effective
  approvals: []
  considerations: []
