  categories: []
  title:
  - spelling: eng
    value: Agenda item 11.4
  - spelling: fra
    value: Point 11.4 de l'ordre du jour
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'Notes the report on the current status of OIML activities on e-Learning
        and other online training,

        '
    - spelling: fra
      value: 'Prend note du rapport sur l''état actuel des activités de l''OIML en
        matière d''apprentissage en ligne et d''autres formations en ligne,

        '
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: requests
    message:
    - spelling: eng
      value: |
        Requests the BIML to draft an e-Learning concept, for presentation to the Presidential Council at its meeting in March 2024, taking into account OIML G23 Guide to the use of online technology for conducting CEEMS activities in a post-COVID world, as well as the outcomes of the OIML seminars held in conjunction with the 54th CIML Meeting in 2019 and the 58th CIML Meeting in 2023, in consultation with the Digitalisation Task Group, the CEEMS Advisory Group, the OIML-CS Management Committee, and the RLMO Round Table, and
        Encourages Members to collaborate on this activity by providing information on material that is available online, by making suggestions for topics of future e-Learning and training, and by making respective resources available as far as possible.
    - spelling: fra
      value: |
        Demande au BIML de rédiger un concept d'apprentissage en ligne, à présenter au Conseil de la Présidence lors de sa réunion de mars 2024, en tenant compte de l'OIML G 23 Guide pour l'utilisation des technologies en ligne pour la conduite des activités des CEEMS dans un monde post-COVID, ainsi que des résultats des séminaires OIML organisés en conjunction avec la 54ème Réunion du CIML en 2019 et la 58ème Réunion du CIML en 2023, en consultation avec le Groupe de Travail sur la numérisation, le Groupe consultatif des CEEMS, le Comité de Management de l'OIML-CS, et la Table Ronde des RLMO, et
        Encourage les Membres à collaborer à cette activité en fournissant des informations sur le matériel disponible en ligne, en faisant des suggestions sur les thèmes de l'apprentissage et de la formation en ligne futurs, et en mettant à disposition leurs ressources respective dans la mesure du possible.
    dates:
    - start: '2023-10-17'
      kind: effective
  approvals: []
  considerations: []
