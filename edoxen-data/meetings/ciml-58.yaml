    type: decision
  categories: []
  title:
  - spelling: eng
    value: Agenda item 14
  - spelling: fra
    value: Prend note du rapport du Président du Groupe de Travail sur la Digitalisation
      de
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'Notes the report of the OIML Digitalisation Task Group (DTG) Chairperson,

        '
    - spelling: fra
      value: |
        Prend note du rapport du Président du Groupe de Travail sur la Digitalisation de l'OIML (DTG),
        Se félicite de la participation enthousiaste de ses Membres et d'autres personnes au Séminaire de l'OIML L'avenir de l'OIML à l'ère numérique qui s'est tenu le 16 octobre 2023,
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: welcomes
    message:
    - spelling: eng
      value: 'Welcomes the enthusiastic participation by its Members and others in
        the OIML Seminar The future of the OIML in the digital era held on 16 October
        2023,

        '
    - spelling: fra
      value: 'Approuve le projet du DTG de formuler une feuille de route avec des
        jalons concrets et des éléments de travail basés sur les résultats du séminaire
        de l''OIML L''avenir de l''OIML à l''ère numérique qui s''est tenu le 16 octobre
        2023,

        '
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: approves
    message:
    - spelling: eng
      value: 'Approves the plan of the DTG to formulate a roadmap with concrete milestones
        and work items based on the outcomes of the OIML Seminar The future of the
        OIML in the digital era held on 16 October 2023,

        '
    - spelling: fra
      value: 'Approuve la recommandation du DTG d''établir un Comité Directeur du
        DTG pour préparer cette feuille de route,

        '
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: approves
    message:
    - spelling: eng
      value: 'Approves the DTG''s recommendation to establish a Steering Committee
        of the DTG to prepare this roadmap,

        '
    - spelling: fra
      value: |
        Remercie le président du DTG, le Dr. Sascha Eichstadt, et les membres du DTG pour leur travail, et
        Encourage ses membres à soutenir le DTG en mettant à sa disposition des experts et d'autres ressources pour mettre en œuvre les futures recommandations formulées par le DTG.
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: thanks
    message:
    - spelling: eng
      value: |
        Thanks the Chairperson of the DTG, Dr Sascha Eichstadt, and members of the DTG for their work, and
        Encourages its Members to support the DTG by making experts and other resources available to implement future recommendations put forward by the DTG.
    dates:
    - start: '2023-10-17'
      kind: effective
  approvals: []
  considerations: []
