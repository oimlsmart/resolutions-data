  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'Notes the recommendation from the CEEMS AG presented in Addendum 13.2b
        to the Working Document for this meeting concerning the "Chiang Mai Declaration
        on NEXT legal metrology system (LMS)" relating to the OIML''s CEEMS activities,

        '
    - spelling: fra
      value: |
        Prend note de la recommandation du CEEMS AG présentée dans l'Addendum 13.2b au Document de Travail de cette réunion concernant la « Déclaration de Chiang Mai sur le système de métrologie légale NEXT (LMS) » relative aux activités du CEEMS de l'OIML,
        Se félicite de cette proposition importante pour l'organisation des travaux des CEEMS de l'OIML,
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: welcomes
    message:
    - spelling: eng
      value: 'Welcomes this significant proposal for the organisation of the OIML''s
        CEEMS work,

        '
    - spelling: fra
      value: |
        Approuve la proposition du CEEMS AG de former un groupe de travail chargé d'examiner la mise en œuvre de la « Déclaration de Chiang Mai sur le système de métrologie légale NEXT (LMS) », avec le soutien administratif nécessaire du BIML, et
        Encourage les Membres à prendre part à ces travaux et à réfléchir à la manière dont ils pourraient participer aux activités qui en résulteront.
    dates:
    - start: '2023-10-17'
      kind: effective
  - type: approves
    message:
    - spelling: eng
      value: |
        Approves the CEEMS AG's proposal to form a working group to look into the implementation of the "Chiang Mai Declaration on NEXT legal metrology system (LMS)”，with the necessary administrative support from the BIML, and
        Encourages Members to take part in this work and to consider how they might participate in the resulting activities.
    dates:
    - start: '2023-10-17'
      kind: effective
  approvals: []
  considerations: []
