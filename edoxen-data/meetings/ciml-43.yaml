    - spelling: eng
      value: 'The Committee noted the importance given to OIML publications and conformity
        assessment and certification systems in the implementation of the WTO/TBT
        Agreement. It instructed its President and the Director of the Bureau to continue
        to cooperate with the WTO and to promote the OIML as an organization facilitating
        compliance with the WTO/TBT Agreement.

        '
    - spelling: fra
      value: 'Le Comité a pris note de l''importance donnée aux publications ainsi
        qu''aux systèmes de certification et d''évaluation de la conformité dans la
        mise en oeuvre de l''Accord OMC/OTC. Il a donné instruction à son Président
        et au Directeur du Bureau de continuer à coopérer avec l''OMC et de promouvoir
        l''OIML comme organisation facilitant le respect de l''Accord OMC/OTC.

        '
