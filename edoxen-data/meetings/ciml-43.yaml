  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee emphasized the importance of the OIML maintaining close
        relations with Organizations representing legal metrology stakeholders and
        encouraged the latter to participate in OIML work. It instructed its President
        and the Director of the Bureau to continue to identify such stakeholder organizations
        and to raise their awareness of OIML work.

        '
    - spelling: fra
      value: 'Le Comité a souligné l''importance que l''OIML maintienne des relations
        étroites avec les organisations représentant les parties intéressées par la
        métrologie légale, et a encouragé celles-ci à participer aux travaux de l''OIML.
        Il a donné instruction à son Président et au Directeur du Bureau de continuer
        à identifier de telles organisations et à les sensibiliser aux travaux de
        l''OIML.

        '
