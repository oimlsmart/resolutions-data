  title:
  - spelling: fra
    value: 3 Information sur les développements en métrologie légale dans les Régions
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'M. Singyangwe a présenté les activités au Botswana. Il y avait eu un
        atelier sous les auspices de la Coopération Technique Allemande, auquel avaient
        assisté des représentants des structures de SADC SQAM. Cet atelier révisait
        le soutien du PTB aux structures SADC SQAM. Les représentants de SADCSTAN,
        SADCMET, SADCA et SADCMEL ont demandé de nouvelles ressources supplémentaires
        de financement pour les quatre prochaines années, et le Secrétariat du SADC
        aura une entrevue avec le Ministère Allemand de la Coopération Technique pour
        l''examen de cette requête.

        '
