    - start: '2002-10-01'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee established a new Subcommittee TC 17/SC 8 Instruments
        for quality analysis of agricultural products, allocated the Secretariat to
        Australia, and approved its first work project on Measuring instruments used
        for protein determination in grain.

        '
    dates:
    - start: '2002-10-01'
      kind: effective
  - type: instructs
    message:
    - spelling: eng
      value: 'The Committee instructed the Bureau and TC 3 to accelerate the work
        on the revision of OIMLD 1 Law on metrology.

        '
