      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a demandé au TC 4 et au TC 3/SC 1 de procéder à une enquête
        commune visant à définir lequel d''entre eux serait chargé du nouveau projet
        de travail sur les Intervalles de vérification et d''inspection des instruments
        de mesure soumis au contrôle légal proposé par le TC 4.

        '
    dates:
    - start: '2002-10-01'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a attribué le Secrétariat du TC 5 (encore vacant) à la Slovénie,
        qui s''est déclarée volontaire pour assumer la responsabilité de ce Comité
        Technique.

        '
    dates:
    - start: '2002-10-01'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a créé un nouveau Sous-comité Technique TC 17/SC 8 Instruments
        pour l''analyse qualitative des produits agricoles, en a attribué le Secrétariat
        à l''Australie, et a approuvé son premier projet de travail sur les Instruments
        de mesure utilisés pour la détermination des protéines dans les grains.

        '
    dates:
    - start: '2002-10-01'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a chargé le Bureau et le TC 3 d''accélérer le travail sur
        la révision de OIML D 1 Loi de métrologie.

        '
