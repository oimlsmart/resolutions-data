    - start: '2002-10-01'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee allocated the Secretariat of TC 5 (until now vacant) to
        Slovenia, which had volunteered to assume responsibility for this Technical
        Committee.

        '
