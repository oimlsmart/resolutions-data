    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a pris note d''informations fournies par son Vice-Président
        M. Issaev et par le Bureau au sujet des activités techniques de l''OIML et,
        tout en exprimant sa satisfaction pour le travail accompli, a demandé aux
        TC et SC de l''OIML d''accélérer leur travail en particulier dans les domaines
        indiqués comme projets de haute priorité et prioritaires.

        '
    dates:
    - start: '2002-10-01'
      kind: effective
  - type: notes
    message:
