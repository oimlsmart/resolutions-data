  title:
  - spelling: fra
    value: 2 Examen de la situation de certains TC/SC
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'M. Issaev a commencé par donner des statistiques concernant les TC et
        SC de l''OIML et a attiré l''attention de l''assemblée sur le fait que la
        responsabilité des 67 organismes techniques était répartie entre seulement
        15 États Membres; il a mentionné que ce problème particulier serait traité
        plus tard.

        '
