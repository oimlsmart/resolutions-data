        TC 3/SC 5 concernant les résultats du vote au niveau du Sous-comité. Ce projet
        peut maintenant devenir un premier projet de Document et être soumis au CIML
        pour consultation et commentaires. Le Comité a chargé le Bureau et le Membre
        du CIML pour les États-Unis d''Amérique d''organiser un atelier pour examiner
        les commentaires reçus des Membres du CIML et d''utiliser, si approprié, d''autres
        moyens ad-hoc pour un soutien maximal.

