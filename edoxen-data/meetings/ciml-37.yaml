    message:
    - spelling: fra
      value: 'M. Birch a donné un rapport détaillé sur son Etude Les Bénéfices apportés
        par la Métrologie Légale dans l''Economie et la Société qui avait été demandée
        par le Conseil de la Présidence. Son travail avait consisté à répertorier
        les études précédentes effectuées les années passées, et à les examiner avec
        l''objectif de tirer les leçons des travaux déjà accomplis, et sur cette base
        de trouver de nombreux critères économiques et sociaux qui pourraient être
        utilisés dans la détermination de l''affectation des ressources, pour fournir
        une analyse rudimentaire des coûts et bénéfices pour la métrologie.

        '
    dates:
    - start: '2002-10-01'
      kind: effective
  approvals: []
