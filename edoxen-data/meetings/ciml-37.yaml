  title:
  - spelling: fra
    value: 2 Autres institutions (Convention du Mètre, ILAC, ISO, OMC, etc.)
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'M. Faber informé le CIML de la coopération en cours avec la Convention
        du Mètre et ILAC. La réunion annuelle avec ces deux organisations avait été
        tenue le 27 février 2002 au BIPM et la délegation de l''OIML était composée
        de M. Faber, M. Kochsiek, M. Issaev, M. Ehrlich et M. Magaña. Les Représentants
        d''ILAC étaient M. Peet et M. Squirrel, et ceux de la Convention du Mètre,
        M. Kovalevsky, M. Moscati, M. Van Koughnett, M. Kaarls, M. Quinn et M. Wallard.

        '
