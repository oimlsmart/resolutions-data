      kind: effective
  - type: requests
    message:
    - spelling: eng
      value: 'The Committee requested TC4 and TC 3/SC1 to provide for a common inquiry
        to define which of them will undertake the new work project on Verification
        and inspection intervals of legally controlled measuring instruments proposed
        by TC4.

        '
