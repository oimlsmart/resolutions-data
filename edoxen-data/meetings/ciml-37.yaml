  title:
  - spelling: fra
    value: 1 Informations générales
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Pour introduire le sujet M. Kochsiek a fait remarquer que le Système
        de Certificats OIML pour les Instruments de Mesure ("le Système") avait bien
        progressé ces dix derniere années et que le document révisé Système de Certificats
        OIML pour les Instruments de Mesure permettait au Système de se développer
        encore plus. Il a annoncé que le nombre de certificats OIML enregistrés dépasserait
        très probablement les 1000 à la fin de 2002, et que trois États Membres de
        plus (le Japon, la Finlande et la République de Corée) avaient récemment établi
        leurs propres Autorités de Délivrance. Il y avait maintenant 26 Autorités
        de Délivrances établies dans 23 États Membres. Le nombre de demandeurs et
        de fabricants d''instruments de mesure dans 34 pays (25 États Membres OIML
        et 9 Membres Correspondants) qui avaient reçu des certificats OIML dépassait
        le chiffre de 260.

        '
    dates:
    - start: '2002-10-01'
      kind: effective
  approvals: []
  considerations: []
