  title:
  - spelling: fra
    value: 1 Présentation des programmes de la Banque Mondiale
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'M. Magaña a rapporté que malencontreusement M. Wilson de la Banque Mondiale,
        qui avait l''intention de venir à cette réunion, avait dû annuler à la dernière
        minute. Il a dit que le BIML poursuivrait ses contacts avec la Banque Mondiale
        et s''assurerait que toute information pouvant être d''intérêt pour les Membres
        du CIML concernant les activités de la Banque Mondiale seraient diffusées,
        peut-être par le Bulletin OIML et/ou le site Internet.

        '
