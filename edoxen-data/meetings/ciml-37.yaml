  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'Mr. Magaña reported that unfortunately Mr. Wilson of the World Bank,
        who had intended to come to this meeting, had been unable to attend at the
        last minute. He said that the BIML would continue its contacts with the World
        Bank and would ensure that all information which may be of interest to CIML
        Members concerning World Bank activities would be circulated, perhaps via
