  title:
  - spelling: fra
    value: 1 Organisations Régionales de Métrologie Légale (LRMO)
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'M. Magaña a présenté l''état du travail sur les relations avec les RLMO.
        A la dernière Réunion du Comité, il avait été demandé au Bureau de mettre
        au point un document de politique générale sur ce sujet et il en était résulté
        un premier projet qui avait été examiné par le Conseil de la Présidence. Plusieurs
        commentaires et amendements avaient été pris en compte et un second projet
        serait présenté au Conseil de la Présidence à sa réunion en février 2003,
        en vue de le distribuer aux Membres du CIML pour approbation à la 38ème Réunion
        du CIML en 2003. Les RLMO seraient aussi formellement consultées sur ce document
        de politique générale.

        '
