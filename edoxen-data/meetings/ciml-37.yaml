  title:
  - spelling: fra
    value: 3 Analyse des coûts de fonctionnement du BIML
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'M. Magaña a commencé sa présentation en informant les Délégués qu''un
        nouveau modèle de comptabilité était actuellement en cours de définition et
        d''évaluation en vue de son application pour les comptes du BIML à l''avenir.
        Il a expliqué que le système de comptabilité actuellement employé était essentiellement
        basé sur un principe "recettes - dépenses", mais n''était pas basé sur une
        méthode standardisée. Cependant, la Conférence devrait décider sur ce point
        et il ferait une proposition détaillée qui serait examinée en 2004. Avant
        d''être soumise à la Conférence, le nouveau plan devrait recevoir l''approbation
        dun cabinet indépendant de comptables et également du Conseil de la Présidence.

        '
    dates:
