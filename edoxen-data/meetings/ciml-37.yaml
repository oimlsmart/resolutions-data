  title:
  - spelling: eng
    value: Activities of the Development Council, action plan and possible evolutions
      of its structures
  subject:
  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'Mr. Faber reported that following the last Development Council meeting
        in Moscow, he had decided to establish a small "Task Group" for developing
        country matters, with a double mission: to speed up the work and to make it
        more transparent, and secondly to examine the structure of the Development
        Council and to make proposals for restructuring it to the Conference in 2004.
        He then asked Mrs. Annabi to give a report on the Development Council meeting
        which had taken place on 1 October 2002.

        '
