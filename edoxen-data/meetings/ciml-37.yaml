  - spelling: fra
    value: 2 Examen de la situation financiere pour 2002 et 2003
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Des estimations financières ont été distribuées en janvier 2002. M.
        Magaña a indiqué que l''Organisation progressait globalement comme prévu par
        le budget et que la réalisation des objectifs était en cours pour être achevée
        à la fin de la période indiquée. Les prévisions pour 2003 ont aussi été programmées
        par rapport au budget, en dépit de la nécessité de changer le matériel de
        reprographie du BIML. Il a fait remarquer que le taux d''inflation en France
        était aussi raisonnablement bas, et stable.

        '
