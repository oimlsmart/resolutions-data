    type: decision
  categories: []
  title:
  - spelling: eng
    value: Analysis of the operating costs of the BIML
  subject:
  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'Mr. Magaña began his presentation by informing Delegates that a new
        model of accountancy system was currently being defined and evaluated with
        a view to its application for the BIML accounts in the future. He explained
        that the accounting system currently employed was essentially based on a "receipts
        - expenditures" principle, but was not based on any standardized method. However,
        it was for the Conference to decide on such a decision and he would make a
        detailed proposal for consideration in 2004. Prior to its being submitted
        to the Conference, the new plan would receive approval from an independent
        firm of accountants, and also the Presidential Council.

        '
