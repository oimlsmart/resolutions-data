  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of information delivered by Vice-President Mr.
        Issaev and by the Bureau concerning OIML technical activities and, while expressing
        its satisfaction for the work accomplished, requested the OIML TCs and SCs
        to accelerate their work especially in the fields listed as high priority
        and priority projects.

        '
