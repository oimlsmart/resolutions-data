  doi: 10.63493/resolutions/ciml199713.1
  urn: urn:oiml:doc:ciml:resolution:1997-13.1
  agenda_item:
  dates:
  - date: '1997-10-29'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: OIML Bulletin
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of a report by the Bureau concerning the OIML
        Bulletin and reaffirmed the essential role of the Bulletin as a liaison and
        communication tool among OIML Members and indeed all those worldwide who have
        an interest in legal metrology activities. Therefore, the Committee urged
        its Members to actively participate in the Bulletin by providing the Bureau
        with technical papers, information on national and regional developments,
        announcements of metrological events, new books on metrology, etc., for publication
        in the Bulletin. The Committee also requested its President to examine the
        opportunity of establishing a working group to assist the Bureau in this respect.

        '
      dates:
      - start: '1997-10-29'
        kind: effective
    approvals: []
