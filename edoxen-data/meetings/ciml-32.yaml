  - spelling: eng
    value: "$ 3 3^{r d} $ and $ 3 4^{t h} $ meetings of the CIML"
  subject:
  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of information given by the Delegation of the
        Republic of Korea concerning the preparations for the $ 33^{rd} $ CIML meeting
        and expressed its satisfaction. The Committee noted that this meeting will
        be held during the week following the ILAC meeting in Sydney, and that an
        APLMF meeting and possibly other OIML meetings or workshops will be organized
        in conjunction it.

        '
