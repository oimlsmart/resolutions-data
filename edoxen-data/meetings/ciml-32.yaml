    value: Examination of the financial situation for 1997 and estimates for 1998
  subject:
  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a report by the Bureau concerning the present
        financial situation of the Organization which was quite satisfactory although
        it could be expected that, for specific reasons, 1997 expenses would exceed
        the budget voted by the Tenth Conference. The Committee also expressed its
        satisfaction for the fact that Member States'' 1998 contributions will practically
        not increase compared to 1996 and 1997.

