  localizations:
  - language_code: eng
    script: Latn
    title: OIML on Internet (general information, meetings and proceedings, OIML certificates,
      OIML publication…
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of a report by the Bureau concerning the possibility
        of making information on OIML available through Internet and encouraged the
        Bureau to work in this direction. Concerning the availability on Internet
        of OIML International Recommendations and Documents and related juridical
        and economic aspects, the Committee requested its President to set up a working
        group in order to assist the Bureau in this respect.

        '
      dates:
      - start: '1997-10-29'
        kind: effective
    approvals: []
