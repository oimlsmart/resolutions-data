  title:
  - spelling: eng
    value: Situation of certain Members
  subject:
  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of information from the Bureau concerning the
        situation of certain Member States which were late in the payment of their
        contributions to the OIML; the Committee expressed its satisfaction for the
        fact that, at this time, the unpaid contributions of these Member States remained
        within acceptable limits. However, it urged them to do their utmost to pay
        their arrears as soon as possible. The Committee also took note of the fact
        that Burkina Faso had been delisted as a Corresponding Member for not having
        paid their annual subscriptions for more than four years.

        '
    dates:
    - start: '1997-10-29'
      kind: effective
