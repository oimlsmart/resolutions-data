  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a report concerning the present situation
        of the System. It was suggested that CIML Members and the BIML should do their
        utmost to inform manufacturers and other interested parties about the existence
        of the System and the "added value" which may result from OIML certificates,
        in particular in fields where measuring instruments are usually not subject
        to regulations.

