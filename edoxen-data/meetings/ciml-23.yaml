      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee elected :

        '
    dates:
    - start: '1988-10-24'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee examined the decisions of the Eighth Conference in view
        of their implementation.

        '
    dates:
    - start: '1988-10-24'
      kind: effective
  - type: decides
    message:
    - spelling: eng
      value: 'The Committee decided to hold its 24th meeting in Paris during the last
        week of September 1989 in connection with a commemoration of the Bicentenary
        of the creation of the Metric System organized by the French government and
        a meeting of the International Committee of Weights and Measures.

        '
