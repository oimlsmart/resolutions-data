  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee accepted proposals from its President relating to the
        organization of the Eighth Conference. It also agreed to nominate respectively
        Mr RICHARDS, Chairman of the National Standards Commission (Australia), and
        Mr LEWISH (Austria) and Mr PUTERA (Indonesia), for the Presidency and the
        vice-Presidencies of the Conference. These nominations were proposed by Mr
        BIRCH and Mr BIRKELAND respectively.

