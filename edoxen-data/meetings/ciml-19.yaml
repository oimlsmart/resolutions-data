  title:
  - spelling: fra
    value: ELECTION DU DEUXIEME VICE-PRESIDENT DU COMITE
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Sur proposition de M. BIRKELAND, et à la suite de suggestions présentées
        par de nombreux Membres du CIML, le Comité International de Métrologie Légale
        désigne comme Deuxième Vice-Président, à l''unanimité, le Professeur Dr. Ing.
        W. MÜHE, représentant de la République Fédérale d''Allemagne.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  approvals: []
  considerations: []
