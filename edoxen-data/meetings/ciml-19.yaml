  categories: []
  title:
  - spelling: fra
    value: CLOTURE
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a adopté le compte rendu de la 18ème réunion du CIML avec
        les modifications rédactionnelles mentionnées ci-avant.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité International de Métrologie Légale,

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a adopté les rapports comptables pour 1981 et 1982 et a chargé
        son Président et le Directeur du Bureau de les présenter à la Septième Conférence.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a pris note des informations du Bureau sur les estimations
        financières, le problème du franc-or, etc. et a donné des instructions au
        Directeur du Bureau en ce qui concerne la présentation des projets de budget
        à la Septième Conférence.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a pris note d''informations, documents et propositions concernant
        divers aspects des travaux des Secrétariats de l''OIML ; les instructions
        appropriées ont été données au Bureau.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a adopté, à titre provisoire, les deux projets de Recommandations
        Internationales suivants :

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a attribué aux USA la responsabilité des Secrétariats Rapporteurs
        :

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a chargé le Bureau d''examiner quelle pourrait être l''activité
        de l''OIML en ce qui concerne les grandeurs électriques d''une part, les grandeurs
        photométriques et radiométriques d''autre part.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité a élu comme second Vice-Président, le Prof. Dr. Ing. W. MUHE,
        Membre du CIML, République Fédérale d''Allemagne.

        '
