  title:
  - spelling: fra
    value: PREPARATION DE LA 7ème CONFERENCE INTERNATIONALE DE METROLOGIE LEGALE
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Mme LAHTEENMAKI donne les informations détaillées sur la préparation
        de la 7ème Conférence conjointement à laquelle aura lieu la 20ème réunion
        du Comité. Le programme général a été établi et est distribué aux participants,
        avec des fiches de participation en vue des réservations d''hôtel.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  approvals: []
  considerations: []
- identifier:
  - prefix: CIML
    number: 1983/14
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml198314
  urn: urn:oiml:doc:ciml:resolution:1983-14
  agenda_item:
  dates:
  - date: '1983-05-03'
    type: decision
  categories: []
  title:
  - spelling: fra
    value: QUESTIONS DIVERSES
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'M. THULIN indique qu''il finit de réaliser deux documents qui seront
        prochainement diffusés : une brochure descriptive des structures de la métrologie
        dans les Etats Membres et Correspondants de l''OIML (ou tout au moins ceux
        qui ont répondu au questionnaire) et un Index des articles publiés dans les
        100 premiers numéros du Bulletin. En ce qui concerne ce dernier, il rappelle
        que c''est le rôle des Membres du Comité de fournir le Bureau en articles,
        et qu''en particulier les articles en langue française font défaut.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  approvals: []
  considerations: []
