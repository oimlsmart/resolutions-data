  title:
  - spelling: fra
    value: Examen des postes devenant vacants dans un proche avenir
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité renouvelle pour une période de 5 années à compter de l''expiration
        de son présent contrat, le contrat de M. THULIN, Adjoint au Directeur.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité prend connaissance de l''expertise en question qui montre
        qu''effectivement, le coût du système de retraite ne devrait pas entraîner
        une augmentation du Budget de l''OIML supérieure en valeur relative à 10 %
        (chiffre déjà présenté à la 6ème Conférence), cette augmentation de 10 % devant
        être répartie sur les années 1993-2009 selon un barème à définir.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité adopte en conséquence la Résolution suivante :

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  - type: notes
    message:
    - spelling: fra
      value: 'Le Comité International de Métrologie Légale,

        '
    dates:
