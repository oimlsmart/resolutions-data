  title:
  - spelling: fra
    value: Examen de l'état d'avancement des travaux
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Une édition, à jour au 1er avril 1983, du document « Etat d''avancement
        des travaux des Secrétariats de l''OIML » est distribuée aux participants
        ; elle contient de plus une liste des projets de Recommandations et Documents
        Internationaux susceptibles d''être adoptés et publiés d''ici fin 1984.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  approvals: []
  considerations: []
- identifier:
  - prefix: CIML
    number: 1983/6.2
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml19836.2
  urn: urn:oiml:doc:ciml:resolution:1983-6.2
  agenda_item:
  dates:
  - date: '1983-05-03'
    type: decision
  categories: []
  title:
  - spelling: fra
    value: Adoption, à titre provisoire, de projets de Recommandations Internationales
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Deux projets, relatifs aux « Sonomètres » et aux « Humidimètres pour
        grains de céréales et graines oléagineuses » sont présentés pour adoption
        à titre provisoire par le Comité, et publication, avant leur sanction définitive
        par la 7ème Conférence.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  approvals: []
  considerations: []
- identifier:
  - prefix: CIML
    number: 1983/6.3
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml19836.3
  urn: urn:oiml:doc:ciml:resolution:1983-6.3
  agenda_item:
  dates:
  - date: '1983-05-03'
    type: decision
  categories: []
  title:
  - spelling: fra
    value: Mode de travail des Secrétariats de l'OIML
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Une version « provisoire » de ce document a été distribuée en octobre
        1982, les paragraphes relatifs à la planification des travaux étant laissés
        en blanc. Etant donné que les problèmes de planification ne pourront être
        résolus avant quelques années, le Bureau est chargé de rééditer le document
        « Mode de Travail », en tenant compte des derniers commentaires, et en reportant
        à plus tard la rédaction des points de planification. (Cette nouvelle version
        ne portera pas la mention « provisoire »).

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  approvals: []
  considerations: []
- identifier:
  - prefix: CIML
    number: 1983/6.4
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml19836.4
  urn: urn:oiml:doc:ciml:resolution:1983-6.4
  agenda_item:
  dates:
  - date: '1983-05-03'
    type: decision
  categories: []
  title:
  - spelling: fra
    value: Problèmes linguistiques relatifs aux Recommendations Internationales et
      Documents Internationaux
  subject:
  - spelling: fra
    value: "(The CIML)"
  actions:
  - type: notes
    message:
    - spelling: fra
      value: 'Le Bureau est chargé, en liaison avec les Etats francophones et anglophones,
        d''étudier la possibilité de mieux normaliser le langage utilisé dans les
        R.I. et D.I., en particulier en ce qui concerne le caractère obligatoire,
        recommandé, ou facultatif des prescriptions métrologiques.

        '
    dates:
    - start: '1983-05-03'
      kind: effective
  approvals: []
  considerations: []
