  - date: '2025-10-14'
    type: decision
  categories: []
  title:
  - spelling: eng
    value: Agenda item 9.1
  subject:
  - spelling: eng
    value: OIML Conference
  actions:
  - type: resolves
    message:
    - spelling: eng
      value: |
        Resolves:
        a) The overall amount of credits necessary for the 2026-2029 financial period shall be €12209489;
        b) The base contributory share (annual contribution for a Member State in Class 1 as defined in Article XXVI (1) of B 1:1968 OIML Convention) shall be €14 800 in each year of the 2026- 2029 financial period.
        c) This results in the following annual contributions for the financial period 2026-2029, for Member States classified according to Article XXVI (1) of B 1:1968 OIML Convention:
        |===
        | Class | 2026 | 2027 | 2028 | 2029
        | 1 | €14800 | €14800 | €14800 | €14800
        | 2 | €29600 | €29600 | €29600 | €29600
        | 3 | €59200 | €59200 | €59200 | €59200
        | 4 | €118400 | €118400 | €118400 | €118400
        |===
        d) This results in the following annual contributions for the financial period 2026-2029, for Corresponding Members classified using the same criteria as for Member States:
        |===
        | Class | 2026 | 2027 | 2028 | 2029
        | 1 | €3890 | €5365 | €7400 | €7400
        | 2 | €7780 | €10730 | €14800 | €14800
        | 3 | €15560 | €21460 | €29600 | €29600
        | 4 | €31120 | €42920 | €59200 | €59200
        |===
        e) For the 2026-2029 financial period, newly admitted or readmitted Member States shall not pay an entry fee.
    dates:
    - start: '2025-10-14'
      kind: effective
  approvals: []
  considerations:
  - type: having_regard_to
    message:
    - spelling: eng
      value: 'Having regard to Article XXIV, first paragraph, Article XXVI (1), and
        Article XXVIII, second paragraph, of OIML B 1:1968 OIML Convention,

        '
    dates:
    - start: '2025-10-14'
      kind: effective
  - type: noting
    message:
    - spelling: eng
      value: 'Noting Resolution 2012/08 of the 14th OIML Conference, which states
