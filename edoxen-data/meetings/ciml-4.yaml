    value: Adoption du Rapport d'audit de 2004
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: approves
    message:
    - spelling: eng
      value: 'The Committee approved the Auditor''s report for 2004 and requested
        its President and the BIML Director to submit it to the Thirteenth Conference.

        '
    - spelling: fra
      value: 'Le Comité a approuvé le Rapport d''audit de 2004 et a demandé à son
        Président et au Directeur du BIML de le présenter lors de la Treizième Conférence.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
  approvals: []
  considerations: []
- identifier:
  - prefix: CIML
    number: 2005/3.2
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml20053.2
  urn: urn:oiml:doc:ciml:resolution:2005-3.2
  agenda_item:
  dates:
  - date: '2005-06-18'
    type: decision
  categories: []
  title:
  - spelling: eng
    value: Assets and liabilities as at 2005.01.01
  - spelling: fra
    value: Actif et passif au 01.01.2005
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a report given by the BIML Director concerning
        the OIML Pension System and instructed its President and the Director of the
        Bureau to continue to study the possible evolutions of the System, compared
        to other systems existing in similar organizations, and to report back at
        the 41st CIML Meeting in 2006.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un rapport fourni par le Directeur du BIML
        relatif au Système de Retraite de l''OIML et a chargé son Président et le
        Directeur du Bureau de continuer à étudier les évolutions potentielles du
        Système, par comparaison avec d''autres systèmes existants dans des organisations
        similaires et de présenter ses conclusions à ce sujet lors de la 41ème Réunion
        du CIML en 2006.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a presentation given by the BIML Director
        concerning the estimation of the assets and liabilities according to the new
        accountancy rules laid down by the new Financial Regulations.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un exposé du Directeur du BIML concernant l''estimation
        de l''actif et du passif conformément aux nouvelles règles de comptabilité
        prescrites par le nouveau Règlement Financier.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee noted that taking account of the evaluation of the Pension
        Fund, the Reserve Fund would be significantly reduced.

        '
    - spelling: fra
      value: 'Le Comité a pris note qu''en tenant compte de l''évaluation du Fonds
        de Retraite, le Fonds de Réserve serait fortement réduit.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
  - type: instructs
    message:
    - spelling: eng
      value: 'The Committee instructed its President to examine the conditions and
        procedures related to personal loans to BIML Staff Members and to report back
        at the 41st CIML Meeting in 2006.

        '
    - spelling: fra
      value: 'Le Comité a chargé son Président d''examiner les conditions et procédures
        relatives aux prêts personnels aux Membres du Personnel du BIML et de présenter
        ses conclusions lors de la $ 4 1 ^{ème} $ Réunion du CIML en 2006.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
  approvals: []
  considerations: []
- identifier:
  - prefix: CIML
    number: 2005/3.3
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml20053.3
  urn: urn:oiml:doc:ciml:resolution:2005-3.3
  agenda_item:
  dates:
  - date: '2005-06-18'
    type: decision
  categories: []
  title:
  - spelling: eng
    value: Information on the implementation of the new Financial Regulations
  - spelling: fra
    value: Informations concernant la mise en œuvre du nouveau Règlement Financier
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a presentation given by the BIML Director
        concerning the implementation of the new Financial Regulations. It was noted
        that the details of the transition from the previous to the new accountancy
        systems shall be assessed by the external accountant and presented at the
        41st CIML Meeting in 2006.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un exposé du Directeur du BIML concernant la
        mise en œuvre du nouveau Règlement Financier. Il a été noté que les détails
        de la transition entre le précédent système de comptabilité et le nouveau
        doivent être évalués par l''expert-comptable extérieur et présentés lors de
        la 41eme Réunion du CIML en 2006.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
  approvals: []
  considerations: []
