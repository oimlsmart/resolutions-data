    value: Election of the CIML First Vice-President
  - spelling: fra
    value: Élection du Premier Vice-Président du CIML
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee elected Mr. Stuart Carstens, South Africa, as First Vice-President.
        He will take over his duties immediately. The Committee also decided that
        Pr. Kochsiek will remain Vice-President until the 41st CIML Meeting in 2006.

        '
    - spelling: fra
      value: 'Le Comité a élu Premier Vice-Président M. Stuart Carstens, d''Afrique
        du Sud. Il entrera en fonction immédiatement. Le Comité a également décidé
        que le Professeur Kochsiek demeurera Vice-Président jusqu''à la 41ème Réunion
        du CIML en 2006.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
  - type: instructs
    message:
    - spelling: eng
      value: 'The Committee instructed the CIML President to draw up a draft procedure
        for the election of the CIML President and Vice President. This procedure
        shall be submitted for CIML postal approval in order to be applicable at the
        41st CIML Meeting.

        '
    - spelling: fra
      value: 'Le Comité a chargé le Président du CIML de rédiger un projet de procédure
        pour l''élection des Président et Vice-Président du CIML. Cette procédure
        doit être soumise à un vote par correspondance du CIML afin d''être applicable
        lors de la 41ème Réunion du CIML.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
