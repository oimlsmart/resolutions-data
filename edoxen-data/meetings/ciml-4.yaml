    script: Latn
    title: The Committee expressed its appreciation for the continued cooperation
      with ILAC and the IAF.
    subject: OIML Conference
    considerations: []
    actions:
    - type: notes
      message: 'The Committee expressed its appreciation for the continued cooperation
        with ILAC and the IAF. In order to develop this cooperation at national level,
        CIML Members are invited, within the applicable national legal framework and
        regarding the responsibilities of the relevant national bodies, to contact
        their National Accreditation Bodies and promote the use of appropriate technical
        and metrological experts and lead assessors and the associated requirements
        in the OIML Systems in accreditation or peer assessment wherever appropriate.

        '
      dates:
      - start: '2009-10-27'
        kind: effective
    approvals: []
