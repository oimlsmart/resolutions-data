    message:
    - spelling: eng
      value: 'Instructs the BIML to keep on file the remaining suggestions to further
        amend B 6.

        '
    - spelling: fra
      value: 'Charge le BIML de garder trace des suggestions restantes visant à apporter
        d''autres modifications au B 6.

        '
    dates:
