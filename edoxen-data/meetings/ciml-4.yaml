    message:
    - spelling: eng
      value: 'As soon as an OIML Recommendation, including the Test Report Format
        is published, the relevant OIML Recommendation is automatically included in
        the OIML Basic Certificate System. The Bureau will publish the appropriate
        information on the web site.

        '
    - spelling: fra
      value: 'Dès qu''une Recommandation OIML, incluant le format de rapport d''essais,
        est publiée, cette Recommandation est automatiquement incluse dans le Système
        de Certificats dit "de base". Le Bureau publiera l''information appropriée
