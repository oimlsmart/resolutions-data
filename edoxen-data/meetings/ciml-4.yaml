    type: decision
  categories: []
  title:
  - spelling: eng
    value: Progress on the Pension Scheme
  - spelling: fra
    value: Progrès concernant le Fond de Retraite
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a report given by the BIML Director concerning
        progress made in the study of the OIML Pension Scheme and instructed its President
        and the BIML Director to continue the study and to compare the OIML Scheme
        to existing systems in similar organizations, coming back with proposals,
        if appropriate, at the 42nd CIML Meeting.

        '
    - spelling: fra
      value: 'Le Comité a pris note du rapport établi par le Directeur du BIML concernant
        la progression de l''étude du Fond de Retraite de l''OIML. Il a requis de
        son Président et du Directeur du BIML de continuer l''étude et de comparer
        le Plan OIML aux systèmes existants dans des Organisations similaires, afin
        de proposer de nouvelles solutions, si approprié, lors de la 42ème Réunion
        du CIML.

        '
