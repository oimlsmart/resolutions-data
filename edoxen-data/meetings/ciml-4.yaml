      value: 'The Committee asked the Bureau to submit the CPR proposals, amended
        according to the comments made at this CIML Meeting and accompanied by a detailed
        explanatory note, to the CIML for postal approval before the end of 2005.
        The proposals to be voted on are related to the following issues:

        '
    - spelling: fra
      value: 'Le Comité a demandé au Bureau de présenter les propositions du CPR -
        modifiées conformément aux remarques formulées lors de la présente Réunion
        du CIML, et accompagnées d''une note explicative détaillée - au CIML pour
        un vote par correspondance avant la fin de l''année 2005. Les propositions
        soumises au vote concernent les points suivants :

        '
