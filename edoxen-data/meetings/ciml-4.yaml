    script: Latn
    title: The Committee noted that the re-evaluated assets cover much more than the
      value of
    subject: OIML Conference
    considerations: []
    actions:
    - type: notes
      message: 'The Committee noted that the re-evaluated assets cover much more than
        the value of the rights acquired and that there will be no need to call for
        any additional Member State contributions to face this liability.

        '
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: instructs
      message: |
        The Committee instructed the Bureau to:
        - implement the IPSAS standards for the 2010 accounts, by registering the full rights acquired in the OIML liabilities and the reevaluated value of the BIML buildings in the OIML assets;
        - prepare a presentation of the 2008 and 2009 accounts along these lines with a view to presenting them at the 14th OIML Conference; and
        include in the revision of the OIML Financial Regulations this implementation of the IPSAS standards, and specify the rules and periodicity for the re-evaluation of the OIML building in the OIML assets.
      dates:
      - start: '2010-09-21'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: Le Comité prend note du rapport concernant le système de retraite et des
      observations
    subject: Conférence OIML
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité prend note du rapport concernant le système de retraite
        et des observations formulées par Mr. Peter Mason et par le Dr. Philippe Richard.

        '
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: notes
      message: 'Le Comité prend note que la réévaluation des actifs permet de couvrir
        bien plus que la valeur des droits acquis et qu''il n''y aura pas besoin de
        procéder à un nouvel appel à contribution aux Etats Membres pour faire face
        à cet engagement.

        '
      dates:
      - start: '2010-09-21'
        kind: effective
    - type: charges
      message: |
        Le Comité charge le Bureau :
        de mettre en œuvre les normes IPSAS pour l'exercice 2010, en enregistrant l'intégralité des droits acquis dans le passif de I'OIML et la valeur réévaluée des locaux du BIML dans l'actif de I'OIML;
        de préparer une présentation des Exercices 2008 et 2009 conformes à ce principe, en vue de les présenter à la 14ème Conférence OIML ; et
        - d'inclure, dans la révision du Règlement Financier de l'OIML, cette mise en œuvre des normes IPSAS, et de spécifier les règles et la périodecité de réévaluation des bâtiments de l'OIML dans l'actif de l'Organisation.
      dates:
      - start: '2010-09-21'
        kind: effective
    approvals: []
