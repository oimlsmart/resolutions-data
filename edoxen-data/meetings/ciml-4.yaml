    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of a presentation given by Mr. Pulham concerning
        the production of OIML Publications, activities aimed at improving communication,
        and the OIML web site.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: 'The Committee expressed its high appreciation of the achievements
        presented and encouraged the Bureau to continue this development. In particular,
        a new OIML Leaflet was presented describing the Organization, its role and
        its structures. The BIML proposed to make the Leaflet available free of charge
        to all Members to promote legal metrology in their countries.

        '
      dates:
