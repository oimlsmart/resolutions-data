- identifier:
  - prefix: CIML
    number: 2014/18
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml201418
  urn: urn:oiml:doc:ciml:resolution:2014-18
  agenda_item: '8.5'
  dates:
  - date: '2014-11-04'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Agenda item 8.5
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: |
        Notes the report given by the ad-hoc working group (AHWG) chair and CIML First Vice President, Dr. Roman Schwartz,
        Considers the review of the MAA as a high priority project, and therefore
        Encourages the AHWG, including its task groups, to undertake every effort to present concrete proposals to the next CIML meeting,
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: instructs
      message: 'Instructs the BIML to provide the necessary support for the AHWG,
        including its task groups, in order to implement CIML Resolutions nos. 2013/15,
        2013/16 and 2013/17,

        '
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: requests
      message: 'Requests CIML Members to inform the BIML about their experience and
        knowledge as to whether or not OIML certificates (Basic or MAA) and OIML Test
        Reports are accepted in their countries as the basis for national or regional
        type approval, and the reasons in cases where they are either not accepted,
        or not completely accepted.

        '
      dates:
      - start: '2014-11-04'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: Prend note du rapport présenté par le président du groupe de travail ad
      hoc
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: |
        Prend note du rapport présenté par le président du groupe de travail ad hoc (AHWG) et le Premier Vice-Président du CIML, le Dr. Roman Schwartz,
        Estime que l'examen du MAA est un projet hautement prioritaire et, en conséquence,
        Encourage le groupe de travail ad hoc, y compris ses sous-groupes, à mettre tout en œuvre pour présenter des propositions concrètes à la prochaine réunion du CIML,
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: charges
      message: 'Charge le BIML de fournir au groupe de travail ad hoc, y compris à
        ses sous-groupes, le soutien nécessaire pour mettre en œuvre les Résolutions
        n° 2013/15, 2013/16 et 2013/17 du CIML,

        '
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: requests
      message: 'Demande aux Membres du CIML de faire part au BIML de l''expérience
        et de la connaissance qu''ils ont de l''acceptation, ou de la non-acceptation,
        des certificats (dits « de Base » ou MAA) de l''OIML et des Rapports d''essai
        de l''OIML dans leur pays comme base d''une approbation de type à l''échelon
        national ou régional, et des raisons pour lesquelles, soit ils ne sont pas
        acceptés, soit ils ne sont pas complètement acceptés.

        '
      dates:
      - start: '2014-11-04'
        kind: effective
    approvals: []
