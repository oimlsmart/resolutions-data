  - language_code: eng
    script: Latn
    title: 'The Committee noted that: - the increasing importance of prepackaged foods
      and beverages in'
    subject: OIML Conference
    considerations: []
    actions:
    - type: notes
      message: |
        The Committee noted that:
        - the increasing importance of prepackaged foods and beverages in global trade now accounts for over 75 % of agri-foods exports;
        - developing country exports are particularly disadvantaged by having to conform to a multiplicity of international requirements; and
        - the review of the longstanding OIML R 79 arising from the World Wine Trade Group Labeling Agreement and the 2006 OIML seminar on prepackaging have not resulted in an exemption for wine labeling.
        The Committee recommended that CIML Members bring this resolution to the attention of their national WTO-TBT enquiry point.
      dates:
      - start: '2009-10-27'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: 'Le Comité a noté que: - l''importance croissante des aliments et boissons
      préemballés dans'
    subject: Conférence OIML
    considerations: []
    actions:
    - type: notes
      message: |
        Le Comité a noté que:
        - l'importance croissante des aliments et boissons préemballés dans le commerce mondial constitue actuellement plus de 75 % des exportations agro-alimentaires;
        - les exportations des pays en développement sont particulièrement désavantagées d'avoir à être conformes à une multiplicité d'exigences internationales; et
        - la revue de l'ancienne OIML R 79 émanant de l'Accord du Groupe Mondial du Commerce du Vin et le Séminaire OIML 2006 sur les préemballés n'ont pas abouti à une dispense d'étiquetage pour le vin.
        Le Comité a recommandé que les Membres du CIML portent cette Résolution à l'attention de leur point d'information national OMC-OTC.
      dates:
      - start: '2009-10-27'
        kind: effective
    approvals: []
