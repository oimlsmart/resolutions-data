  title:
  - spelling: eng
    value: Decides that after the election of the Vice-President during the current
      meeting, the CIML
  - spelling: fra
    value: Décide qu'après l'élection du Vice-Président au cours de la présente réunion,
      le CIML décidera
  subject:
  - spelling: eng
    value: OIML Conference
  - spelling: fra
    value: Conférence OIML
  actions:
  - type: decides
    message:
    - spelling: eng
      value: 'Decides that after the election of the Vice-President during the current
        meeting, the CIML will decide which of the two Vice-Presidents will be first
        Vice-President; and

        '
    - spelling: fra
      value: 'Décide qu''après l''élection du Vice-Président au cours de la présente
        réunion, le CIML décidera lequel des deux Vice-Présidents sera le premier
        Vice-Président ; et

        '
    dates:
    - start: '2010-09-21'
      kind: effective
  - type: instructs
    message:
    - spelling: eng
      value: 'Instructs the CIML President to prepare a proposal to be submitted to
        the 14th Conference in 2012 on the interpretation of Article XV in the event
        that the position of first Vice-President becomes vacant and the President
        is incapable of performing his duties.

        '
    - spelling: fra
      value: 'Charge le Président du CIML de préparer une proposition à soumettre
        à la 14ème Conférence en 2012, sur l''interprétation de l''Article XV dans
        l''éventualité où la fonction de premier Vice-Président devient vacante et
        si le Président se trouve dans l''incapacité d''exercer ses fonctions.

        '
    dates:
    - start: '2010-09-21'
      kind: effective
  approvals: []
  considerations:
  - type: considering
    message:
    - spelling: eng
      value: 'Considering that Article XV of the Convention calls for the election
        of a President and a first and second Vice President and that, in case the
        President is absent or incapable, the first Vice-President shall temporarily
        assume the duties of the President, and

        '
    - spelling: fra
      value: 'Considérant que l''Article XV de la Convention prévoit l''élection d''un
        Président, d''un premier Vice-Président et d''un second Vice-Président et
        que, dans l''éventualité où le Président est absent ou se trouve dans l''incapacité
        d''exercer ses fonctions, le premier Vice-Président doit assurer temporairement
        la Présidence, et

        '
    dates:
    - start: '2010-09-21'
      kind: effective
  - type: considering
    message:
    - spelling: eng
      value: 'Considering that Article XV does not deal with the case that the first
        Vice-President resigns or his mandate otherwise ceases before that of the
        second Vice-President,

        '
    - spelling: fra
      value: 'Considérant que l''Article XV ne prévoit pas que le premier Vice-Président
        démissionne ou que son mandat expire avant celui du deuxième Vice-Président,

        '
    dates:
    - start: '2010-09-21'
      kind: effective
