  title:
  - spelling: eng
    value: Communication, web site
  - spelling: fra
    value: Communication, site Internet
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a presentation given by Mr. Pulham concerning
        the production of OIML Publications, activities aimed at improving communication,
        and the OIML web site.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un exposé de M. Pulham concernant la production
        des Publications de I''OIML, les activités visant à améliorer la communication
        et le site Internet de I''OIML.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee expressed its high appreciation of the achievements presented
        and encouraged the Bureau to continue this development. In particular, a new
        OIML Leaflet was presented describing the Organization, its role and its structures.
        The BIML proposed to make the Leaflet available free of charge to all Members
        to promote legal metrology in their countries.

        '
    - spelling: fra
      value: 'Le Comité a exprimé ses remerciements pour les résultats présentés et
        a encouragé le Bureau à poursuivre en ce sens. En particulier, un nouveau
        Dépliant OIML a été présenté : celui-ci décrit l''Organisation, son rôle et
        ses structures. Le BIML propose de rendre le Dépliant gratuit pour tous les
        Membres afin de promouvoir la métrologie légale dans leur pays.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
  approvals: []
  considerations: []
