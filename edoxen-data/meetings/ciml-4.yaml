    title: Rapport financier pour 2005 et estimations pour 2006
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note de la présentation faite par le Directeur du
        BIML relative à l''exercice financier 2005 et les estimations pour 2006. Il
        a noté que les résultats de 2005 ont été meilleurs que ceux prévus. En 2006,
        des économies devraient partiellement compenser l''augmentation de la dotation
        au Fond de Retraite.

        '
      dates:
      - start: '2006-10-18'
        kind: effective
    - type: notes
      message: 'Le Comité a chargé le Bureau de préparer les chiffres préliminaires
        pour le budget 2009-2012, en prenant en compte cette dotation. Ces chiffres
        seront discutés lors de la 42ème Réunion du CIML en 2007.

        '
      dates:
      - start: '2006-10-18'
        kind: effective
    approvals: []
