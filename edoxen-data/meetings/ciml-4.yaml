      message: 'The Committee took note of a presentation given by the BIML Director
        concerning liaison activities.

        '
      dates:
      - start: '2006-10-18'
        kind: effective
    - type: thanks
      message: 'The Committee expressed its appreciation of the draft OIML/Metre Convention
        joint Action Plan and instructed its President and the BIML Director to continue
        this cooperation, and to report back at the 42nd CIML Meeting.

        '
      dates:
      - start: '2006-10-18'
        kind: effective
