      value: 'The Committee instructed its President and the Bureau to circulate these
        drafts, amended in line with the comments expressed, for postal approval before
        the end of 2005.

        '
    - spelling: fra
      value: 'Le Comité a chargé son Président et le Bureau de faire circuler ces
        projets, modifiés selon les remarques exprimées, pour qu''ils soient approuvés
        par correspondance avant la fin de l''année 2005.

        '
