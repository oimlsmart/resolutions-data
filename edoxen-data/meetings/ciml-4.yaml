        Approuve, à condition de renommer les « Groupes de travail » proposés « Groupes de programme » et d'apporter d'autres modifications rédactionnelles nécessaires, la révision de :
        - OIML B 6-1 Directives pour les travaux techniques de l'OIML - $1^{\mathrm{ere}}$ partie : Structures et procédures pour le développement des publications de l'OIML ; et
        - OIML B 6-2 Directives pour les travaux techniques de I'OIML - 2ème partie : Guide de préparation et de présentation des publications de I'OIML,
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: requests
      message: |
        Demande au Bureau de publier, au plus tard le $ 1^{\mathrm{er}} $ décembre 2011, un document d'orientation exposant les modalités de mise en œuvre et de présenter les nouvelles dispositions à partir du $ 1^{\mathrm{er}} $ janvier 2012 de manière méthodique,
        Met en place un Groupe de travail ad hoc, présidé par le Second Vice-président, chargé d'examiner les améliorations à apporter à OIML B 6-1 et B 6-2 à la suite des suggestions faites par les Membres du CIML compte tenu de la mise en application des nouvelles procédures, et
        Donne instruction au groupe de travail ad hoc de présenter des propositions d'amendement d'OIML B 6-1 et d'OIML B 6-2 destinées à être étudiées lors de la $ 4 7^{e} $ Réunion.
      dates:
      - start: '2011-10-11'
        kind: effective
    approvals: []
