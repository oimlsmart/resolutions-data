        subject to the additional amendments as mentioned in the report of the ad-hoc
        group under "Category A (editorial)";

        '
    - spelling: fra
      value: 'Approuve la révision de l''OIML B 6-1 Directives pour les travaux techniques
        de l''OIML, sous réserve des modifications supplémentaires mentionnées dans
        le rapport du groupe ad hoc à la rubrique « Catégorie A (d''ordre rédactionnel)
