      kind: effective
  approvals: []
  considerations:
  - type: noting
    message:
    - spelling: eng
      value: 'Noting the BIML report on the implementation of OIML B 6-1:2012 Directives
        for OIML technical work;

        '
    - spelling: fra
      value: |
        Prenant note du rapport du BIML concernant la mise en œuvre de I'OIML B 6-1:2012
        Directives pour les travaux techniques de I'OIML ;
    dates:
    - start: '2013-10-08'
      kind: effective
  - type: noting
    message:
    - spelling: eng
      value: 'Noting the proposals from the ad hoc working group to further revise
        OIML B 6;

        '
    - spelling: fra
      value: 'Prenant note des propositions du groupe de travail ad hoc de poursuivre
        la révision de l''OIML B 6 ;

        '
    dates:
    - start: '2013-10-08'
      kind: effective
