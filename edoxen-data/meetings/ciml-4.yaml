    number: 2011/7
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml201107
  urn: urn:oiml:doc:ciml:resolution:2011-07
  agenda_item:
  dates:
  - date: '2011-10-11'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Resolves
    subject: CIML
    considerations:
    - type: recalling
      message: 'Recalling its Resolution "CIML 1975-IXc" establishing the BIML Translation
        Center,

        '
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: considering
      message: |
        Considering
        a) the original purpose of the BIML Translation Center, i.e. to make information contained in certain working documents and publications, available to non-French speaking Members,
        b) that the BIML Translation Center is funded by voluntary subsidies made by certain Member States and that the use of these funds is restricted to the translation of documents from French to English,
        c) the increased use of English as the working language of the Organization and consequently, the decrease in demand for translations into English, resulting in ever growing funds in the special account of the BIML Translation Center,
        d) that it is considered necessary to make certain OIML Publications available in both English and French,
        e) that, to increase the efficiency and effectiveness of the BIML, in particular regarding the dissemination of information to Members, it is desirable to make (historical) documents (Conference and Committee minutes and resolutions, OIML Bulletins, etc.) available in electronic format,
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: resolves
      message: |
        Resolves
        a) that the funds in the special account of the BIML Translation Center may be used, as necessary, for translation and interpretation activities that are not currently part of the normal operation of the Bureau, in particular:
        - the translation of documents (with particular priority to translating from English to French to reduce the backlog of Publications into French);
        - interpretation on an experimental basis at Conferences and Committee Meetings;
        - converting existing documents of interest to the work of the Organization (minutes and resolutions of past Conferences and Committee Meetings and other relevant documents) into a suitable electronic format;
        b) to decrease the base contribution for the BIML Translation Center to EUR 200,
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: instructs
      message: |
        Instructs the Bureau to
        a) continue to manage the BIML Translation Center, taking this Resolution into account,
        b) make translated and converted documents available to the Members in a suitable electronic format,
        c) report annually to the Committee on the functioning of the BIML Translation Center.
      dates:
      - start: '2011-10-11'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: 'Décide '
    subject: CIML
    considerations:
    - type: recalling
      message: 'Rappelant sa résolution « CIML 1975-IXc » établissant le Centre de
        traduction du BIML,

        '
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: considering
      message: |
        Considérant :
        a) L'objectif initial du Centre de traduction du BIML, à savoir rendre l'information contenue dans certains documents de travail et publications accessible aux Membres non francophones,
        b) Que le Centre de traduction du BIML est financé par les subventions volontaires faites par certains États Membres et que l'utilisation de ces fonds est limitée à la traduction de documents du français vers l'anglais,
        c) L'usage croissant de l'anglais comme langue de travail de l'Organisation et, par conséquent, la baisse du besoin de traductions vers l'anglais, ce qui a pour conséquence une accumulation continue des fonds dans le compte spécial du Centre de traduction du BIML,
        d) Qu'il apparaît nécessaire de rendre disponibles certaines publications de l'OIML dans les deux langues : français et anglais,
        e) Que, pour améliorer le fonctionnement et accroître l'efficacité du BIML, en particulier en ce qui concerne la diffusion de l'information à ses Membres, il est souhaitable de rendre les documents (historiques) (compte rendus et résolutions des Conférences et Comités, Bulletins de l'OIML, etc.) disponibles en format électronique,
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide :
        a) Que les fonds du compte spécial du Centre de traduction du BIML peuvent être utilisés, si nécessaire, pour des activités de traduction et d'interprétation qui n'entrent pas à ce jour dans les attributions du Bureau, notamment :
        - la traduction de documents (avec une priorité particulière pour les traductions de l'anglais vers le français afin de réduire le retard des publications en français) ;
        - l'interprétation sur une base expérimentale aux Conférences et Réunions du Comité ;
        - la conversion de documents existants qui présentent un intérêt pour les travaux de l'Organisation (comptes rendus et résolutions des Conférences et Réunions de Comité passées, ainsi que tous autres documents importants) en un format électronique adéquat ;
        b) de réduire la contribution de base au Centre de traduction du BIML à 200 euros, Donne instruction au Bureau de :
        a) continuer à gérer le Centre de traduction du BIML en prenant la présente Résolution en compte,
        b) rendre les documents traduits et convertis accessibles aux Membres dans un format électronique adéquat,
        c) rendre compte au Comité, tous les ans, du fonctionnement du Centre de traduction du BIML.
      dates:
      - start: '2011-10-11'
        kind: effective
    approvals: []
