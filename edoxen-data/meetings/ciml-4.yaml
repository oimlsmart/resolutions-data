  title:
  - spelling: eng
    value: The Committee expressed its appreciation for the continued cooperation
      with ILAC and the IAF.
  - spelling: fra
    value: Le Comité a exprimé son appréciation pour la coopération continue avec
      ILAC et IAF.
  subject:
  - spelling: eng
    value: OIML Conference
  - spelling: fra
    value: Conférence OIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee expressed its appreciation for the continued cooperation
        with ILAC and the IAF. In order to develop this cooperation at national level,
        CIML Members are invited, within the applicable national legal framework and
        regarding the responsibilities of the relevant national bodies, to contact
        their National Accreditation Bodies and promote the use of appropriate technical
        and metrological experts and lead assessors and the associated requirements
        in the OIML Systems in accreditation or peer assessment wherever appropriate.

        '
    - spelling: fra
      value: 'Le Comité a exprimé son appréciation pour la coopération continue avec
        ILAC et IAF. Afin de développer cette coopération au niveau national, les
        Membres du CIML sont invités, dans le cadre légal applicable et au regard
        des différents organismes nationaux pertinents, de contacter leur Organisme
        National d''Accréditation et de promouvoir l''emploi des experts métrologiques
        et techniques appropriés, ainsi que les responsables d''audit et les exigences
        associées, lors d''accréditation ou d''évaluation par pairs dans les Systèmes
        OIML, lorsque cela est approprié.

        '
    dates:
    - start: '2009-10-27'
      kind: effective
