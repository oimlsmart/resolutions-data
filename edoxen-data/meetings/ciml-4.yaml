  - prefix: CIML
    number: 2013/17
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml201317
  urn: urn:oiml:doc:ciml:resolution:2013-17
  agenda_item:
  dates:
  - date: '2013-10-08'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Resolves that steps should be taken to ensure that, in future, there will
      be
    subject: CIML
    considerations:
    - type: recalling
      message: 'Recalling its decision on the implementation of the MAA at its 39th
        meeting (2004) under agenda item 6.3;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Recalling Resolution no. MAA 2006-2 of its 41st meeting (2006) concerning
        a transition period ending 31 December 2008 in which both MAA certificates
        and Basic certificates may be issued;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Recalling Resolution no. 20 of its 43rd meeting (2008), extending
        the transition period until such time that the Committee takes an express
        decision (separate for each category of instruments) to end it, effectively
        maintaining the Basic Certificate System in parallel to the MAA;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Recalling its Resolution no. 2013/15;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: 'Considering that for almost nine years now there exist de facto two
        OIML conformity assessment systems for OIML type evaluations: the OIML Basic
        Certificate System and the MAA, whereas the MAA was conceived to replace the
        Basic Certificate System;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: resolves
      message: |
        Resolves that steps should be taken to ensure that, in future, there will be only one single certification system for OIML type evaluations, based on the principles of the MAA, and that, as a first step, the options for how such a single system may be organized, how the transition could take place and by what time schedule, should be investigated, taking into account the experiences of similar, well established certification systems;
        Urges the ad hoc group created in its Resolution no. 2013/15 to investigate such options and to make appropriate recommendations.
      dates:
      - start: '2013-10-08'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: Point 9.5 de l'ordre du jour
    subject: CIML
    considerations:
    - type: recalling
      message: 'Rappelant la décision qu''il a prise concernant l''application du
        MAA lors de sa 39ème Réunion (2004) au point 6.3 de l''ordre du jour ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Rappelant la Résolution MAA 2006-2 adoptée lors de sa $41^{\mathrm{eme}}$
        Réunion (2006) concernant la fin, fixée au 31 décembre 2008, de la période
        de transition durant laquelle la délivrance de certificats MAA et de certificats
        dits « de Base » est encore autorisée ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Rappelant la Résolution n° 20 de sa $ 43^{\mathrm{eme}} $ Réunion
        (2008), prolongeant la période de transition jusqu''à ce que le Comité décide
        expressément (indépendamment pour chaque catégorie d''instruments) d''y mettre
        fin, le Système de Certificats dits « de Base » et le MAA étant de fait conservés
        en parallèle ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: 'Rappelant sa Résolution n° 2013/15 ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: 'Considérant que, depuis maintenant près de neuf ans, existent de facto
        deux systèmes OIML d''évaluation de la conformité pour des évaluations de
        type OIML, en l''occurrence le Système de Certificats dits « de Base » et
        le MAA, alors que le MAA était destiné à remplacer le Système de Certificats
        dits « de Base »;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: decides
      message: |
        Décide que des dispositions doivent être prises pour que n'existe plus à l'avenir qu'un seul et unique système de certification pour les évaluations de type de l'OIML reposant sur les principes du MAA et pour que soient, dans un premier temps, explorées les différentes options pouvant exister concernant la manière d'organiser ce système unique, la façon dont la transition se déroulerait et le calendrier correspondant, en tenant compte de l'expérience de systèmes de certification similaires et bien établis ;
        Invite instamment le groupe ad hoc créé en application de sa Résolution n° 2013/15 à explorer ces options et à formuler des recommandations pertinentes.
      dates:
      - start: '2013-10-08'
        kind: effective
    approvals: []
