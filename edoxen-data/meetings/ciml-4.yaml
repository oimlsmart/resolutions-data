    value: a (Additional item) Report on the Packaging Seminar
  - spelling: fra
    value: a (Point additionnel) Rapport sur le Séminaire sur les Préemballages
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a report given by Mr. Carstens on the Packaging
        Seminar held on Monday 16 October 2006. It requested the Bureau to make an
        inquiry on Member States'' regulatory needs for the quantity in prepackages.
        A subsequent inquiry would concern packers'' needs for market access.

        '
    - spelling: fra
      value: 'Le Comité a pris note du rapport établi par Mr. Carstens sur le Séminaire
        sur les Préemballages qui s''est tenu le lundi 16 octobre 2006. Le Comité
        requiert du Bureau qu''il conduise une enquête sur les besoins des Etats Membres
        en matière de réglementation de la quantité de préemballages. Une enquête
        ultérieure concernera les besoins des emballeurs pour l''accès au marché.

        '
