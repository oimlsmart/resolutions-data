      le BIPM '
  subject:
  - spelling: eng
    value: OIML Conference
  - spelling: fra
    value: Conférence OIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of the oral report on the rapprochement with
        the BIPM; it requested its President to implement Resolution No. 3 of the
        44th CIML Meeting and to prepare an interim report, with the assistance of
        certain CIML Members, to be presented to the 46th CIML meeting with a view
        to taking final decisions at the 14th Conference in 2012.

        '
    - spelling: fra
      value: 'Le Comité prend note du rapport oral concernant le rapprochement avec
        le BIPM ; il demande au Président d''appliquer la Résolution n° 3 de la 44ème
        Réunion du CIML, de préparer un rapport intermédiaire avec l''aide de quelques
        Membres du CIML, afin de le présenter à la 46ème Réunion du CIML et en vue
        de prendre des décisions définitives en 2012, lors de la 14ème Conférence.

        '
