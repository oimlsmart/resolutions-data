      message: 'Le Comité a requis du Bureau qu''il résume les commentaires des Membres
        du CIML portant sur le Projet de Révision du Vocabulaire International de
        Métrologie (VIM) et sur les Suppléments au GUM, et de les présenter au Comité
        commun pour les guides en métrologie (JCGM). Le Comité a donné pouvoir au
        Directeur du BIML pour avaler la révision finale du VIM ainsi que les Suppléments
        au GUM lors de la Réunion du JCGM.

        '
      dates:
      - start: '2006-10-18'
        kind: effective
    approvals: []
