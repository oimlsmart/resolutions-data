- identifier:
  - prefix: CIML
    number: 2011/26
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml201126
  urn: urn:oiml:doc:ciml:resolution:2011-26
  agenda_item:
  dates:
  - date: '2011-10-11'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Resolves to request the 14th OIML Conference to approve the following interpretation,
      applicable to
    subject: CIML
    considerations:
    - type: considering
      message: |
        Considering
        a) that, when the OIML was established in 1955, its Organization was modeled after the BIPM, established by the Metre Convention in 1875,
        b) that, in view of the history of the text of the OIML Convention, it is likely that the term 'colleague' used in Article XVII of the OIML Convention refers to another CIML Member,
        c) the role of the OIML as an international standard-setting organization, and the evolution of the functioning of the CIML in the light of that role, namely that CIML decisions are increasingly viewed as decisions of the OIML Members,
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: noting
      message: |
        Noting that Article XIII of the OIML Convention was amended in 1968, changing the composition of the CIML from a maximum of 20 members elected by the Conference to one representative per OIML Member, designated by his/her government,
        Is of the opinion that it may sometimes be more appropriate for a CIML Member who is unable to attend a CIML Meeting, to delegate his/her vote to someone from his/her own government or administration, instead of to another CIML Member,
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: resolves
      message: |
        Resolves to request the 14th OIML Conference to approve the following interpretation, applicable to the first paragraph of Article XVII of the OIML Convention:
        "A colleague' may be: either another CIML Member or someone designated by the absent CIML Member to represent him/her. In the latter case, the representative shall be from the same government or administration as the absent CIML Member and may not represent other CIML Members, i.e. may not receive proxies from other CIML Members".
      dates:
      - start: '2011-10-11'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: 'Considérant '
    subject: CIML
    considerations:
    - type: considering
      message: |
        Considérant :
        a) que, lorsque l'OIML fut créée en 1955, sa constitution a été calquée sur celle du BIPM, constitué par la Convention du Mètre de 1875,
        b) qu'au vu de l'historique du texte de la Convention de l'OIML, il est probable que le terme de « colleague » (collègue) utilisé dans l'article XVII de la Convention de l'OIML fasse référence à un autre Membre du CIML,
        c) le rôle de l'OIML comme organisation normative internationale et l'évolution du fonctionnement du CIML au regard de ce rôle, à savoir que les décisions du CIML sont de plus en plus considérées comme des décisions des Membres de l'OIML,
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: noting
      message: |
        Notant que l'article XIII de la Convention de l'OIML a été amendé en 1968, modifiant la composition du CIML, passant d'un maximum de 20 Membres, élus par la Conférence, à un représentant par Membre de l'OIML, désigné par son Gouvernement,
        Est d'avis qu'il peut quelquefois être plus approprié, pour un Membre du CIML qui est dans l'impossibilité d'assister à la Réunion du CIML, de déléguer sa voix à une personne de son propre Gouvernement ou de sa propre Administration, plutôt qu'à un autre Membre du CIML, Décide de soumettre à l'approbation de la $14^{\text{ème}}$ Conférence de l'OIML l'interprétation suivante s'appliquant au premier paragraphe de l'article XVII de la Convention de l'OIML :
        « Un "collègue" peut être : soit un autre Membre du CIML soit toute personne désignée par le Membre du CIML absent pour le représenter. Dans ce dernier cas, le représentant doit appartenir au même gouvernement ou à la même administration que le Membre du CIML absent et ne peut représenter d'autres Membres du CIML, c'est-à-dire ne peut recevoir de procuration de la part d'autres Membres du CIML. »
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: notes
      message: 'Considérant :

        '
      dates:
      - start: '2011-10-11'
        kind: effective
    approvals: []
