- identifier:
  - prefix: CIML
    number: 2013/15
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml201315
  urn: urn:oiml:doc:ciml:resolution:2013-15
  agenda_item: '9.5'
  dates:
  - date: '2013-10-08'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Agenda item 9.5
    subject: CIML
    considerations:
    - type: noting
      message: 'Noting the oral report by its first Vice-President on the outcome
        of the seminar to review the operation of the OIML Mutual Acceptance Arrangement
        (MAA);

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: 'Considering that there appears to be a high level of confidence in
        those areas where Declarations of Mutual Confidence (DoMCs) are in place;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considering the conclusion of the seminar held on 7 October 2013 to review the operation of the MAA that there is a need to raise awareness of the MAA system among those not currently using it, in particular among potential Utilizing Participants;
        Urges its Members, the participants in the MAA and the BIML to actively promote the MAA among legal metrology authorities and measuring instrument manufacturers worldwide;
        Encourages its Members to draw to the attention of trade negotiators within their administrations the opportunities which OIML Recommendations and the MAA structures offer as means of reducing barriers to trade and the possibility they provide to enhance both bilateral and multilateral trade negotiations;
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: instructs
      message: 'Instructs the BIML in its capacity as secretariat of the MAA Committees
        on Participation Review (CPR) to set up an ad-hoc working group consisting
        of interested CIML and/or CPR members and representatives of manufacturers''
        associations to consider how this awareness can be raised, and to provide
        secretarial support to this working group;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: 'Requests its first Vice-President to chair this ad-hoc working group
        and to report on its activities to the 49th CIML Meeting.

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: Point 9.5 de l'ordre du jour
    subject: CIML
    considerations:
    - type: noting
      message: 'Prenant note du rapport oral de son premier Vice-Président concernant
        les conclusions du séminaire consacré à l''examen du fonctionnement de l''Arrangement
        d''Acceptation Mutuelle (MAA) de l''OIML ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: 'Considérant le niveau élevé de confiance qui semble exister dans les
        domaines où des Déclarations de Confiance mutuelle (DoMC) sont en place ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: considering
      message: |
        Considérant la conclusion du séminaire consacré à l'examen du fonctionnement du MAA qui s'est tenu le 7 octobre 2013 dans laquelle est énoncée la nécessité d'une sensibilisation accrue sur le système MAA auprès de ceux qui, actuellement, ne l'utilisent pas, en particulier les Participants Utilisateurs potentiels ;
        Encourage vivement ses Membres, les participants au MAA et le BIML à promouvoir activement le MAA auprès des autorités de métrologie légale et des fabricants d'instruments de mesurage dans le monde entier ;
        Encourage ses Membres à attirer l'attention des négociateurs commerciaux au sein de leurs administrations sur les perspectives qu'offrent les Recommandations OIML et les structures MAA de réduire les obstacles au commerce et la possibilité qu'elles procurent de favoriser les négociations commerciales aussi bilatérales que multilatérales ;
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: charges
      message: 'Charge le BIML en sa qualité de secrétariat des Comités sur la revue
        de participation (CPR) du MAA de mettre en place un groupe de travail ad hoc
        composé de membres du CIML et/ou de CPR intéressés et de représentants d''associations
        de fabricants et ayant pour tâche de réfléchir sur la manière d''accroître
        cette sensibilisation et de fournir un service de secrétariat à ce groupe
        de travail ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: 'Demande à son premier Vice-Président d''assurer la présidence de ce
        groupe de travail ad hoc et de rendre compte de ses activités lors de la 49ème
        Réunion du CIML.

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    approvals: []
- identifier:
