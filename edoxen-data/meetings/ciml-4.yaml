  doi: 10.63493/resolutions/ciml201309
  urn: urn:oiml:doc:ciml:resolution:2013-09
  agenda_item:
  dates:
  - date: '2013-10-08'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Welcomes the proposal from its Member from China to reinstate a leadership
      mechanism to
    subject: CIML
    considerations:
    - type: noting
      message: 'Noting the report given by the BIML on its activities pertaining to
        developing country matters;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: |
        Recalling its Resolution no. 7 of its 47th meeting (2012);
        Recognizing the importance of coordinating the various projects and initiatives promoted by the OIML, individual Member States and Corresponding Members, and other bodies with an interest in promoting the economic development of countries and economies with emerging metrology systems;
        Emphasizing the necessity to respond to the needs of countries and economies with emerging metrology systems in the design of the projects and initiatives promoted by the OIML;
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: welcomes
      message: 'Welcomes the proposal from its Member from China to reinstate a leadership
        mechanism to provide guidance to the OIML on its activities in this area;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: decides
      message: |
        Decides to set up an advisory group for the time being, to carry out wide consultation, to seek additional suggestions and to build up links with other bodies which have a contribution to make;
        Invites Members who wish to participate in the proposed advisory group to contact the BIML in order to express their interest in being involved;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: 'Requests that the Regional Legal Metrology Organizations (RLMOs) at
        their Round Table Meeting on 11 October 2013 consider how existing initiatives
        can be coordinated with the work of such an advisory group;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: instructs
      message: 'Instructs the BIML to provide secretarial support, in conjunction
        with the staff which other Members allocate, for the proposed advisory group;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: 'Requests its Member from China to report to the 49th CIML Meeting
        on the activities of the advisory group and, if appropriate, to propose a
        permanent mechanism for coordinating activities in this area, taking account
        of previous experiences of attempting such coordination.

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: Accueille favorablement la proposition du Membre du CIML pour la Chine
      de rétabir un
    subject: CIML
    considerations:
    - type: noting
      message: 'Prenant note du rapport du BIML sur ses activités concernant des questions
        liées aux pays en développement ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: recalling
      message: |
        Rappelant la Résolution n° 7 de sa 47ème réunion (2012) ;
        Reconnaissant l'importance de coordonnner les divers projets et initiatives appuyés par l'OIML, les États Membres et les Membres Correspondants à titre individuel et d'autres organismes intéressés par la promotion du développement économique de pays et d'économies possédant des systèmes de métrologie récemment créés ;
        Soulignant la nécessité de répondre aux besoins de pays et d'économies possédant des systèmes de métrologie récemment créés en matière de conception des projets et initiatives appuyés par l'OIML ;
      dates:
      - start: '2013-10-08'
        kind: effective
    actions:
    - type: welcomes
      message: 'Accueille favorablement la proposition du Membre du CIML pour la Chine
        de rétabir un mécanisme de pilotage destiné à donner à l''OIML des orientations
        sur ses activités dans ce domaine ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: decides
      message: |
        Décide de mettre en place, pour le moment, un groupe consultatif ayant pour tâche de mener une vaste consultation, de recueillir des suggestions supplémentaires et de développer des liens avec d'autres organismes ayant une contribution à apporter ;
        Invite les Membres qui souhaitent participer au groupe consultatif proposé de prendre contact avec le BIML pour lui faire part de leur intérêt à y être associé ;
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: 'Demande que, à l''occasion de la Table ronde qu''elles tiendront le
        11 octobre 2013, les Organisations Régionales de Métrologie Légale (RLMO)
        réfléchissent sur la manière de coordonner les initiatives existantes avec
        les travaux de ce groupe consultatif ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: charges
      message: 'Charge le BIML de fournir, avec le concours du personnel affecté par
        d''autres Membres, le service de secrétariat nécessaire au groupe consultatif
        proposé ;

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    - type: requests
      message: 'Demande au Membre du CIML pour la Chine de rendre compte des activités
        du groupe consultatif lors de la 49ème Réunion du CIML et, le cas échéant,
        de proposer un mécanisme permanent de coordination des activités dans ce domaine,
        à la lumière de l''expérience antérieure acquise dans la mise en œuvre de
        cette coordination.

        '
      dates:
      - start: '2013-10-08'
        kind: effective
    approvals: []
