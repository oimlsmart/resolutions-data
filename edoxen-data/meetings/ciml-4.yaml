    script: Latn
    title: Approves the establishment of a new Subcommittee of TC 3, to be titled
      "Conformity
    subject: CIML
    considerations:
    - type: recalling
      message: 'Recalling its Resolutions no.15 and no.19 of its 45th Meeting,

        '
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: noting
      message: 'Noting the written report of the seminar on "Conformity to Type" held
        in Utrecht, the Netherlands, on 29 and 30 June 2011,

        '
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: noting
      message: 'Noting the oral report and presentation by the CIML Member for New
        Zealand, Mr. Stephen O''Brien, on the outcome of the follow-up CTT Seminar
        held in Prague on 10 October 2011,

        '
      dates:
      - start: '2011-10-11'
        kind: effective
    actions:
    - type: approves
      message: |
        Approves the establishment of a new Subcommittee of TC 3, to be titled "Conformity to type", which shall undertake as a work item the development of a guidance document on the "scope for pre-market surveillance activities focused on the conformity assessment of measuring instruments to give assurance that manufactured (or production) instruments meet their approved type",
        Assigns the responsibility for the Secretariat of the new Subcommittee jointly to New Zealand and the Bureau,
        Invites the new Subcommittee to take into account:
        - the information provided at the seminars held in June and October 2011; and
        - the current programs in the USA and the EU and any best practices identified elsewhere,
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: thanks
      message: 'Thanks the electronic working group, chaired by the CIML Member for
        New Zealand, for preparing the program for the Seminars.

        '
      dates:
      - start: '2011-10-11'
        kind: effective
    approvals: []
