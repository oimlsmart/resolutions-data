  title:
  - spelling: eng
    value: Progress in the revision of the Directives
  - spelling: fra
    value: Progrès concernant la révision des Directives
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note that the Bureau will start the revision of the
        Directives for Technical Work before the end of 2005 and indicated that this
        work must be considered a high priority. This revision should simplify the
        procedures and make use of information technologies in order to substantially
        accelerate the work.

        '
    - spelling: fra
      value: 'Le Comité a pris note que le Bureau entamera la révision des Directives
        relatives au Travail Technique avant la fin de l''année 2005 et a indiqué
        que ce travail doit être considéré comme étant de haute priorité. Cette révision
        devrait simplifier les procédures et permettre l''utilisation de technologies
        de l''information afin d''accélérer le travail de manière significative.

        '
