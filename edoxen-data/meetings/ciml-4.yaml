  - spelling: fra
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee took note of a presentation given by the BIML Director
        concerning the organization and activities of the Bureau. It was noted that
        one BIML Staff Member had decided to leave the BIML at the end of 2004; a
        suitable candidate would be recruited shortly.

        '
    - spelling: fra
      value: 'Le Comité a pris note d''un exposé du Directeur du BIML concernant l''organisation
        et les activités du Bureau. Il a été noté qu''un Membre du Personnel du BIML
        a pris la décision de quitter le BIML d''ici la fin de l''année 2004 ; un
        candidat approprié sera promptement recruté.

        '
    dates:
    - start: '2005-06-18'
      kind: effective
  approvals: []
  considerations: []
