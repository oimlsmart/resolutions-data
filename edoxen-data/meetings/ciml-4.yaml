  title:
  - spelling: eng
    value: After the OIML Basic Certificate System for a particular category of instrument
      has been
  - spelling: fra
    value: Après qu'il ait été mis fin au Système de Certificats dit "de base" pour
  subject:
  - spelling: eng
    value: OIML Conference
  - spelling: fra
    value: Conférence OIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'After the OIML Basic Certificate System for a particular category of
        instrument has been stopped, when an applicant requests a revision (see the
        Note below) of an OIML Basic Certificate based on the same version of the
        OIML Recommendation, which has been subsequently covered by the MAA, the revised
        OIML Basic Certificate may be issued by the original OIML Issuing Authority
        even if it is not an Issuing Participant in the relevant DoMC, or by an Issuing
        Participant in the DoMC.

        '
    - spelling: fra
      value: 'Après qu''il ait été mis fin au Système de Certificats dit "de base"
        pour une catégorie particulière d''instruments, lorsqu''un fabricant requiert
        une révision (voir la note ci-dessous) d''un Certificat dit "de base" basée
        sur une même version de la Recommandation de l''OIML qui a été ultérieurement
        couverte par le MAA, le Certificat dit "de base" révisé peut être délivré
        par l''Autorité de Délivrance originale, même si elle n''est pas un Participant
        Emetteur de la Déclaration de Confiance Mutuelle correspondante, ou par un
        Participant Emetteur de la Déclaration de Confiance Mutuelle.

        '
