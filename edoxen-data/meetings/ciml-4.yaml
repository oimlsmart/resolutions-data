    value: CIML
  actions:
  - type: resolves
    message:
    - spelling: eng
      value: |
        Resolves
        a) that new, and revisions of existing OIML Recommendations and Documents should apply the terminology and definitions of the VIM and the VIML without amendment,
        b) that terms and definitions from international vocabularies from other fields (for instance statistics) may be adapted when the concept that they pertain to in legal metrology is different and that such conceptual differences should be explained in a note,
        c) that when, in OIML Publications other than Recommendations and Documents, terms and definitions are used that differ from those in the VIM and the VIML, these differences should be indicated in notes, as appropriate,
    - spelling: fra
      value: |
        Décide que :
        a) les Recommandations et Documents actuels de l'OIML, qu'ils soient nouveaux ou fassent l'objet d'une révision, doivent appliquer la terminologie et les définitions du VIM et du VIML sans amendement,
        b) des termes et définitions issus de lexiques internationaux relatifs à d'autres domaines (par exemple les statistiques) peuvent être adaptés lorsque la notion à laquelle ils se rapportent dans la métrologie légale est différente, les différences conceptuelles devant alors être développées dans une note explicative,
        c) lorsque, dans les publications de l'OIML autres que les Recommandations et Documents, des termes et définitions utilisés différent de ceux du VIM et du VIML, les différences doivent, si nécessaire, être indiquées dans des notes explicatives,
        Donne instruction au BIML de vérifier la bonne mise en application de cette Résolution à tous les stades de l'élaboration des publications de l'OIML.
    dates:
    - start: '2011-10-11'
      kind: effective
  - type: instructs
    message:
    - spelling: eng
      value: 'Instructs the BIML to monitor the correct implementation of this Resolution
        at all stages of the preparation of OIML Publications.

        '
