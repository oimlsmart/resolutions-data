  title:
  - spelling: eng
    value: Instructs the Bureau to consult all CIML Members by way of an inquiry on
  - spelling: fra
    value: Charge le Bureau de procéder à la consultation de l'ensemble des Membres
      du CIML
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: instructs
    message:
    - spelling: eng
      value: 'Instructs the Bureau to consult all CIML Members by way of an inquiry
        on their position with regard to specific issues, such as the structure of
        the technical work, the proposed Technical Management Committee and the voting
        procedures for the adoption of OIML Publications, with a view to preparing
        a new Draft Revision, to be considered for adoption by the CIML at its 46th
        Meeting.

        '
    - spelling: fra
      value: 'Charge le Bureau de procéder à la consultation de l''ensemble des Membres
        du CIML par une enquête leur demandant de se déterminer sur des questions
        spécifiques telles que : la structure du travail technique, le Comité de Gestion
        Technique proposé, ainsi que les procédures de vote pour l''adoption des publications
        de l''OIML, en vue de préparer un nouveau Projet de Révision, à soumettre
        pour adoption lors de la 46ème Réunion du CIML.

        '
    dates:
    - start: '2010-09-21'
      kind: effective
  approvals: []
  considerations:
  - type: noting
    message:
    - spelling: eng
      value: 'Noting the report by the Bureau on the revision of the Directives for
        the technical work (OIML B 6-1),

        '
    - spelling: fra
      value: 'Prenant note du rapport du Bureau concernant la révision des Directives
        sur les travaux techniques (OIML B 6-1),

        '
    dates:
    - start: '2010-09-21'
      kind: effective
  - type: considering
    message:
    - spelling: eng
      value: 'Considering that the ad-hoc working group for this revision, after several
        meetings, has not been able to reach consensus on a number of issues, and

        '
    - spelling: fra
      value: 'Considérant que le groupe de travail ad hoc de cette révision, après
        s''être réuni à plusieurs reprises, n''a pas été en mesure de parvenir à un
        accord sur de nombreuses questions, et

        '
    dates:
    - start: '2010-09-21'
      kind: effective
  - type: considering
    message:
    - spelling: eng
      value: 'Considering the comments made by some of its Members on subsequent drafts
        for the revision of OIML B 6-1,

        '
    - spelling: fra
      value: 'Considérant les commentaires formulés par certains de ses Membres au
        sujet de projets ultérieurs de révision de OIML B 6-1,

        '
    dates:
    - start: '2010-09-21'
      kind: effective
