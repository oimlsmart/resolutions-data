        kind: effective
    actions:
    - type: decides
      message: 'Décide de ne pas désigner de Comité de Sélection tel que le prévoit
        la section 3 de l''OIML B 13:2004.

        '
      dates:
      - start: '2014-11-04'
        kind: effective
