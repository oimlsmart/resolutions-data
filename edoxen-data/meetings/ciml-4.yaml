    message:
    - spelling: eng
      value: 'The Committee decided that the same CIML postal approval procedure will
        apply for the DR of the revision of R 39, posted on the web site immediately
        prior to the CIML Meeting for on-line postal ballot.

        '
    - spelling: fra
      value: 'Le Comité a décidé que la même procédure de vote par correspondance
        du CIML s''appliquera à la DR de la révision de la R 39, publiée sur le site
        Internet juste avant la Réunion du CIML pour un vote en ligne.

