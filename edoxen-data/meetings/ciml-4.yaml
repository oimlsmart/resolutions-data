  title:
  - spelling: eng
    value: The Committee supports the intention of TC 3/SC 5 to further discuss the
      acceptance
  - spelling: fra
    value: Le Comité soutient l'intention du TC 3/SC 5 de poursuivre les discussions
      sur l'acceptation
  subject:
  - spelling: eng
    value: OIML Conference
  - spelling: fra
    value: Conférence OIML
  actions:
  - type: supports
    message:
    - spelling: eng
      value: 'The Committee supports the intention of TC 3/SC 5 to further discuss
        the acceptance of manufacturers'' test results, with the aim of ultimately
        including them in the scope of the MAA if consensus can be reached on the
        conditions to be applicable to manufacturers ISO/IEC 17025 test laboratories.

        '
    - spelling: fra
      value: 'Le Comité soutient l''intention du TC 3/SC 5 de poursuivre les discussions
        sur l''acceptation des résultats d''essais des fabricants, avec pour objectif
        de les inclure dans le champ d''application du MAA si un consensus peut être
        obtenu sur les conditions applicables aux laboratoires d''essais ISO/CEI 17025
        des fabricants.

        '
