      ILAC et IAF.
    subject: Conférence OIML
    considerations: []
    actions:
    - type: thanks
      message: 'Le Comité a exprimé son appréciation pour la coopération continue
        avec ILAC et IAF. Afin de développer cette coopération au niveau national,
        les Membres du CIML sont invités, dans le cadre légal applicable et au regard
        des différents organismes nationaux pertinents, de contacter leur Organisme
        National d''Accréditation et de promouvoir l''emploi des experts métrologiques
        et techniques appropriés, ainsi que les responsables d''audit et les exigences
        associées, lors d''accréditation ou d''évaluation par pairs dans les Systèmes
        OIML, lorsque cela est approprié.

        '
      dates:
      - start: '2009-10-27'
        kind: effective
    approvals: []
