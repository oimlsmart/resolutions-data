        - Au 3.1.2.5 (page 33), première ligne : effacer « was » (ca. était) ;
        - Sous le titre de 8.1 (page 72) : insérer un sous-titre « 8.1.1 - 8.1.3 Confirmation of publications » (ca. 8.1.1 - 8.1.3 Confirmation de publications) et à la première ligne, remplacer « 8.1.1 à 8.1.4 » par « 8.1.1 à 8.1.3 » ;
        - 8.1.3 (page 73) à renuméroter « 8.1.4 » .
