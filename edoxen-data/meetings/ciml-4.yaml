  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml201414
  urn: urn:oiml:doc:ciml:resolution:2014-14
  agenda_item: '8.1'
  dates:
  - date: '2014-11-04'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: Agenda item 8.1
    subject: CIML
    considerations:
    - type: considering
      message: 'Considering that a number of current Project Groups have too few P-members
        and that for some Project Groups no Member State is willing or able to volunteer
        to take up the convenership, and that, in accordance with 5.16 of OIML B 6-1:2013,
        these Project Groups should be disbanded,

        '
      dates:
      - start: '2014-11-04'
        kind: effective
    actions:
    - type: notes
      message: 'Notes the report given by the BIML on the implementation of OIML B
        6-1:2013 Directives for OIML technical work,

        '
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: resolves
      message: |
        Resolves to disband the following Project Groups:
        - TC 3/SC 1/p 4: Revision of D 13:1986 Guidelines for bi- or multilateral arrangements on the recognition of: test results, pattern approvals, verifications,
        - TC 3/SC 5/p 10: New publication: Guide for the application of ISO/IEC 17021 to assessment of quality system certification bodies in the field of legal metrology,
        - TC 3/SC 5/p 11: New publication: Guide for the application of ISO 9001 to legal metrology controls,
        - TC 7/SC 4/p 2: Revision of R 55:1981 Speedometers, mechanical odometers and chronotachographs for motor vehicles,
        - TC 10/SC 3/p 1: Revision of R 97:1990 Barometers,
        - TC 16/SC 3/p 2: Revision of R 112:1994 High performance liquid chromatographs for measurement of pesticides and other toxic substances,
        - TC 16/SC 4/p 1: New publication: Guide to air sampling devices for toxic chemical pollutants at hazardous waste sites,
        - TC 16/SC 4/p 3: Revision of D 22:1991 Guide to portable instruments for assessing airborne pollutants arising from hazardous wastes (incorporating FTIR spectrometers),
        - TC 18/SC 4/p 4: Revision of R 90:1990 Electrocardiographs, electrocardioscopes and electrocardioanalysers,
        - TC 18/SC 4/p 6: Revision of R 89:1990 Electroencephalographs,
        - TC 18/SC 5/p 1: New publication: Electronic blood cell counting chambers,
        - TC 18/SC 5/p 4: Revision R 26: Medical syringes.
      dates:
      - start: '2014-11-04'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: Prend note du rapport présenté par le BIML concernant la mise en œuvre
      de
    subject: CIML
    considerations:
    - type: considering
      message: 'Considérant que, pour un certain nombre de Groupes de Projet actuels,
        il n''y a pas suffisamment de Membres-P, que, pour certains Groupes de Projet,
        aucun État Membre n''est désireux ou en mesure de se porter volontaire pour
        en assurer la responsabilité et que, conformément au 5.16 de l''OIML B 6-1:2013,
        ces Groupes de Projet doivent être dissous,

        '
      dates:
      - start: '2014-11-04'
        kind: effective
    actions:
    - type: notes
      message: 'Prend note du rapport présenté par le BIML concernant la mise en œuvre
        de l''OIML B 6-1:2013 Directives pour les travaux techniques de l''OIML,

        '
      dates:
      - start: '2014-11-04'
        kind: effective
    - type: decides
      message: |
        Décide de dissoudre les Groupes de Projet suivants :
        - TC 3/SC 1/p 4 : Révision du D 13:1986 Conseils pour les arrangements bi- ou multilatéraux de reconnaissance des : résultats d'essais – approbations de modèles - vérifications,
        - TC 3/SC 5/p 10 : Nouvelle publication : Guide for the application of ISO/IEC 17021 to assessment of quality system certification bodies in the field of legal metrology [Guide pour l'application de la norme ISO/CEI 17021 à l'évaluation des organismes de certification des systèmes de qualité dans le domaine de la métrologie légale],
        - TC 3/SC 5/p 11 : Nouvelle publication : Guide for the application of ISO 9001 to legal metrology controls [Guide pour l'application de la norme ISO 9001 aux contrôles de métrologie légale],
        - TC 7/SC 4/p 2 : Révision de la R 55:1981 Compteurs de vitesse, compteurs mécaniques de distance et chronotachygraphes des véhicules automobiles,
        - TC 10/SC 3/p 1 : Révision de la R 97:1990 Baromètres,
        - TC 16/SC 3/p 2 : Révision de la R 112:1994 Chromatographes en phase liquide de haute performance pour la mesure des pesticides et autres substances toxiques,
        - TC 16/SC 4/p 1 : Nouvelle publication : Guide to air sampling devices for toxic chemical pollutants at hazardous waste sites [Guide sur les dispositifs d'échantillonnage de l'air pour les polluants chimiques toxiques sur les sites de décharge de déchets dangereux,
        - TC 16/SC 4/p 3 : Révision du D 22:1991 Guide sur les instruments portatifs pour l'évaluation des polluants contenus dans l'air en provenance des sites de décharge de déchets dangereux (incorporant les spectrophotomètres infrarouge à transformée de Fourier - FTIR),
        - TC 18/SC 4/p 4 : Révision de la R 90:1990 Électrocardiographes, électrocardioscopes et électrocardioanalyseurs,
        - TC 18/SC 4/p 6 : Révision de la R 89:1990 Électroencéphalographes,
        - TC 18/SC 5/p 1 : Nouvelle publication : Electronic blood cell counting chambers [Chambres de comptage électronique de cellules sanguines],
        - TC 18/SC 5/p 4 : Révision de la R 26 : Seringues médicales.
      dates:
      - start: '2014-11-04'
        kind: effective
    approvals: []
