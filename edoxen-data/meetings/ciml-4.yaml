  title:
  - spelling: eng
    value: 'Resolves: The draft revision of OIML R 126 Evidential breath analyzers
      is approved.'
  - spelling: fra
    value: Point 9.3.1 de l'ordre du jour
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: resolves
    message:
    - spelling: eng
      value: |
        Resolves:
        The draft revision of OIML R 126 Evidential breath analyzers is approved.
    - spelling: fra
      value: |
        Décide que :
        Le projet de révision de I'OIML R 126 Ethylomètres est approuvé.
    dates:
    - start: '2012-10-01'
      kind: effective
  approvals: []
  considerations:
  - type: recalling
    message:
    - spelling: eng
      value: 'Recalling Resolution no.17 of its 46th meeting,

        '
    - spelling: fra
      value: 'Rappelant la Résolution n° 17 de sa $ 4 6^{\mathrm{e m e}} $ Réunion,

        '
    dates:
    - start: '2012-10-01'
      kind: effective
  - type: considering
    message:
    - spelling: eng
      value: |
        Considering:
        (a) The draft revision of OIML R 126 Evidential breath analyzers received support from a majority of CIML Members in the preliminary ballot, but also received five negative votes, some of which contained objections requiring substantial changes to the draft,
        (b) After consultation with its members, the secretariat of TC 17/SC 7 did not see any possibility to prepare a further draft that would remove the objections expressed in the preliminary ballot,
        (c) The revised text is a substantial improvement on the current version of OIML R 126, even though it did not receive full consensus,
    - spelling: fra
      value: |
        Considérant :
        (a) La projet de révision de I'OIML R 126 Éthylomètres a reçu le soutien d'une majorité des Membres du CIML lors du vote préliminaire mais a également reçu cinq votes négatifs dont certains portaient des objections demandant d'importantes modifications au projet,
        (b) Après consultation auprès de ses membres, le secrétariat du TC 17/SC 7 n'a pas pu envisager de possibilité pour préparer un projet supplémentaire qui éliminerait les objections exprimées lors du vote préliminaire,
        (c) Le texte révisé représente une nette amélioration par rapport à la version actuelle de I'OIML R 126, bien qu'il n'ait pas reçu une approbation unanime,
    dates:
    - start: '2012-10-01'
      kind: effective
