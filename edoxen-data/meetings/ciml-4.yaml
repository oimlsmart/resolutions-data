      message: 'Prend note du rapport écrit du Séminaire sur la « Conformité au Type
        » (CTT) qui s''est tenu à Utrecht, Pays-Bas, les 29 et 30 juin 2011,

        '
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: notes
      message: 'Prend note du rapport verbal et de l''exposé, par le Membre du CIML
        de la Nouvelle-Zélande, M. Stephen O''BRIEN, sur le résultat du Séminaire
        CTT de suivi qui s''est tenu à Prague, le 10 octobre 2011,

        '
      dates:
      - start: '2011-10-11'
        kind: effective
    - type: approves
      message: |
        Approuve l'établissement d'un Sous-comité du TC 3, qui s'appellera « Conformité au Type », lequel doit entreprendre comme tâche le développement d'un document d'orientation sur les « perspectives d'activités de surveillance avant mise sur le marché, activités axées sur l'évaluation de la conformité des instruments de mesure en vue d'apporter l'assurance que les instruments fabriqués (ou de production) correspondent au type homologué »,
        Attribue la responsabilité du Secrétariat du nouveau Sous-comité conjointement à la Nouvelle-Zélande et au Bureau,
        Invite le nouveau Sous-comité à prendre en compte :
        - L'information fournie lors des Seminaires de juin et d'octobre 2011 ; et
        - Les programmes actuels aux États-Unis et dans l'Union Européenne, ainsi que toutes « meilleures pratiques » identifiées ailleurs,
      dates:
