  - language_code: eng
    script: Latn
    title: Assets and liabilities as at 2005.01.01
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee took note of a report given by the BIML Director concerning
        the OIML Pension System and instructed its President and the Director of the
        Bureau to continue to study the possible evolutions of the System, compared
        to other systems existing in similar organizations, and to report back at
        the 41st CIML Meeting in 2006.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: 'The Committee took note of a presentation given by the BIML Director
        concerning the estimation of the assets and liabilities according to the new
        accountancy rules laid down by the new Financial Regulations.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: 'The Committee noted that taking account of the evaluation of the Pension
        Fund, the Reserve Fund would be significantly reduced.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: instructs
      message: 'The Committee instructed its President to examine the conditions and
        procedures related to personal loans to BIML Staff Members and to report back
        at the 41st CIML Meeting in 2006.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
    approvals: []
  - language_code: fra
    script: Latn
    title: Actif et passif au 01.01.2005
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Le Comité a pris note d''un rapport fourni par le Directeur du BIML
        relatif au Système de Retraite de l''OIML et a chargé son Président et le
        Directeur du Bureau de continuer à étudier les évolutions potentielles du
        Système, par comparaison avec d''autres systèmes existants dans des organisations
        similaires et de présenter ses conclusions à ce sujet lors de la 41ème Réunion
        du CIML en 2006.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note d''un exposé du Directeur du BIML concernant
        l''estimation de l''actif et du passif conformément aux nouvelles règles de
        comptabilité prescrites par le nouveau Règlement Financier.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: 'Le Comité a pris note qu''en tenant compte de l''évaluation du Fonds
        de Retraite, le Fonds de Réserve serait fortement réduit.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
    - type: notes
      message: 'Le Comité a chargé son Président d''examiner les conditions et procédures
        relatives aux prêts personnels aux Membres du Personnel du BIML et de présenter
        ses conclusions lors de la $ 4 1 ^{ème} $ Réunion du CIML en 2006.

        '
      dates:
      - start: '2005-06-18'
        kind: effective
    approvals: []
