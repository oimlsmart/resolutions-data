  actions:
  - type: decides
    message:
    - spelling: eng
      value: 'Decides that Issuing Participants may request the registration of Manufacturers''
        Testing Laboratories (MTLs) under a DoMC, provided that the conditions agreed
        by TC 3/SC 5 and laid down in a respective amendment to, or revision of, OIML
        B 10 are met, and that after this amendment to, or revision of, OIML B 10,
        MAA Type Evaluation Reports that contain test results from MTLs may be accepted
        by Participants on a voluntary basis.

        '
    - spelling: fra
      value: 'Décide que les Participants Emetteurs peuvent demander l''enregistrement
        des laboratoires d''essai des fabricants (MTL) dans le cadre d''une DoMC,
        dès lors que sont remplies les conditions acceptées par le TC 3/SC 5 et fixées
        dans un amendement respectif à, ou une révision correspondante de, l''OIML
        B 10, et que, après ledit amendement à, ou ladite révision de, l''OIML B 10,
        les rapports d''évaluation de type selon le MAA qui contiennent les résultats
        d''essais des MTL peuvent être acceptés par les Participants sur la base du
        volontariat.

        '
