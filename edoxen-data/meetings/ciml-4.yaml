  title:
  - spelling: eng
    value: Approves the following text as the OIML statement on the new SI to be
  - spelling: fra
    value: Point 9.5 de l'ordre du jour
  subject:
  - spelling: eng
    value: CIML
  - spelling: fra
    value: CIML
  actions:
  - type: approves
    message:
    - spelling: eng
      value: |
        Approves the following text as the OIML statement on the new SI to be submitted to the BIPM in response to Resolution 1 (2011) of the CGPM:
        "The OIML supports the CGPM's intention to revise the SI in order that it will continue to meet the needs of science, technology, and commerce in the 21st century.
        From the inquiry amongst the OIML Technical Committees TC2, TC9, TC9/SC3 and TC11, and the CIML Members, it is concluded that the new SI definitions are considered to have little to no impact on routine measurements of time, length, luminous intensity, electric current, temperature, amount of substance, and related derived SI quantities. A potential impact may be on accurate mass measurements using class E weights according to OIML R 111. The OIML considers the careful adherence to the 2010 recommendations of the CCM as fundamental for the redefinition of the kilogram in order to avoid potential negative impact on routine mass measurements.
        The OIML supports the intention of the CGPM to further improve formulations for the definitions of the SI base units so that the new SI remains understandable to all those who need it."
    - spelling: fra
      value: |
        Approuve le texte suivant comme déclaration de l'OIML concernant le nouveau SI à soumettre au BIPM en réponse à la Résolution 1 (2011) de la CGPM :
        « L'OIML soutient l'intention de la CGPM de réviser le SI afin que celui-ci continue de satisfaire aux besoins de la science, la technologie et du commerce au XXIème siècle.
        En se basant sur les interrogations des Comités Techniques de l'OIML TC 2, TC 9, TC 9/SC 3 et TC 11 et des Membres du CIML, il a été conclu que les définitions du nouveau SI sont considérées comme ayant un impact faible à nul sur les mesures régulières de temps, longueur, intensité lumineuse, courant électrique, température, quantité de substance et les quantités dérivées du SI y afférentes. Un impact potentiel pourrait avoir lieu sur les mesurages exacts de masse en utilisant des poids de classe E conformément à l'OIML R 111. Afin d'éviter tout impact négatif potentiel sur les mesurages de masse de routine, l'OIML estime que, pour la redéfinition du kilogramme, il est fondamental de suivre attentivement les recommandations du CCM de 2010.
        L'OIML soutient l'intention de la CGPM d'améliorer davantage les formulations des définitions des unités de base du SI afin que le nouveau SI demeure compréhensible à tous ceux qui en ont besoin. »
    dates:
    - start: '2012-10-01'
      kind: effective
  - type: thanks
    message:
    - spelling: eng
      value: 'Thanks the ad hoc Working Group for preparing the OIML statement.

        '
    - spelling: fra
      value: 'Remercie le Groupe de Travail ad hoc pour sa préparation de la déclaration
        de l''OIML.

        '
