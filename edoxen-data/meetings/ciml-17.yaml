- identifier:
  - prefix: CIML
    number: 1980/16
  kind: resolution
  status: decided
  doi: 10.63493/resolutions/ciml198016
  urn: urn:oiml:doc:ciml:resolution:1980-16
  agenda_item:
  dates:
  - date: '1980-06-16'
    type: decision
  categories: []
  localizations:
  - language_code: eng
    script: Latn
    title: PRESIDENCY OF THE INTERNATIONAL COMMITTEE OF LEGAL METROLOGY
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'The Committee has adopted the report of its sixteenth meeting.

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    - type: notes
      message: 'The Committee has adopted the accountants reports for 1978 and 1979
        as well as the draft "Financial Code".

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    - type: notes
      message: 'The Committee has adopted a new scale of salaries of the BIML staff.

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    - type: notes
      message: 'The Committee has accepted the draft general working plan presented
        by the U.S.A. and reproduced hereafter, asking the Pilot Secretariat for meeting
        as quickly as possible in order to fix the detailed working programme.

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    - type: notes
      message: 'The Committee has accepted the draft general working plan presented
        by the U.S.A. and reproduced hereafter.

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    - type: notes
      message: 'The Committee has accepted the creation of Secretariat SP 30-Sr 12
        "Explosimeters" on the responsibility of France.

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    - type: notes
      message: 'The Committee has accepted a proposal from the Bureau relating to
        a simplification of the mode of acceptance of International Documents and
        has requested the Bureau to study the possibility of modifying the denomination
        of these Documents.

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    - type: notes
      message: 'The Committee has adopted the draft International Document "Installation
        and storage conditions for cold water meters".

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    - type: notes
      message: 'The Committee has adopted for your guidance the Code hereafter relating
        to allocation of OIML financial aid for the participation in the meetings
        of the Development Council.

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    - type: notes
      message: 'The Committee agreed that the Bureau continues its efforts in view
        of organizing, if possible in 1981, a first technical seminary, on one of
        the subjects to which all Member States have given priority.

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    - type: notes
      message: 'The Committee has elected, for a six years period, as President and
        first and second Vice-presidents :

        '
      dates:
      - start: '1980-06-16'
        kind: effective
    approvals: []
