    title: DATE AND PLACE OF THE NEXT MEETING
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'Certain Members of the Committee had advised the BIML of their intention
        to invite the Committee to meet in their countries at a later date, and it
        was decided to await firm proposals, before establishing the calendar for
        the next meetings $ ^{*} $

        '
