    value: SIGNIFICANCE OF NATIONAL MARKS OF METROLOGICAL CONTROL
  subject:
  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The investigation conducted by the BIML is being pursued, and it is
        anticipated that the results of same will be published early in 1981, possibly
        in temporary form prior to publication in more detail.

        '
    dates:
    - start: '1980-06-16'
      kind: effective
  approvals: []
  considerations: []
