  subject:
  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'Mr THULIN presented an analysis covering the activities of certain Secretariat
        the work of which should be accelerated as far as possible, due to the particular
        importance of same. Generally, this concerns relatively new metrological subjects
        for which national regulations have not yet been established in many cases,
        altho many metrology services are beginning to work on these questions.

        '
