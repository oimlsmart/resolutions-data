  title:
  - spelling: eng
    value: Creation of a new Secretariat for explosimeters.
  subject:
  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'This Reporting Secretariat, created on the proposal of France, and for
        which France is responsible, comes under Pilot Secretariat 30. France was
        requested to carry out work in this field, which could be undertaken by the
        ISO, IEC or other institutions. A certain number of CIML members expressed
        their interest in princi in collaboration with this Reporting Secretariat,
        subject to confirmation by their respective national administrations.

        '
    dates:
    - start: '1980-06-16'
      kind: effective
  approvals: []
  considerations: []
