  - spelling: eng
    value: SP 20 - Prepackaged products
  subject:
  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Committee expressed its agreement in principle with this proposal,
        and thanked Mr PERLSTAIN for taking over responsibility for Reporting Secretariat
        N which in fact would be identical to Secretariat SP 2-Sr 5 "Sample testing",
        for which Switzerland is already responsible.

        '
    dates:
    - start: '1980-06-16'
      kind: effective
