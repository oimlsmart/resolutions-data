  dates:
  - date: '1980-06-16'
    type: decision
  categories: []
  title:
  - spelling: eng
    value: ANY OTHER BUSINESS
  subject:
  - spelling: eng
    value: CIML
  actions:
  - type: notes
    message:
    - spelling: eng
      value: 'The Bureau presented a short report on the utilization of the English
        language, and the Committee expressed no objections to the plan, to be operated
        on an experimental basis for a period of two years, whereby the relatively
        modest overheads, resulting from the preparation of documents by the BIML
        systematically in French and English, are to be covered by the ordinary budget
        of the OIML, provided that special translation work, executed at the request
        of certain Member States concerned, will continue to be covered by the special
        budget of the Translation Centre.

        '
    dates:
    - start: '1980-06-16'
      kind: effective
  approvals: []
  considerations: []
