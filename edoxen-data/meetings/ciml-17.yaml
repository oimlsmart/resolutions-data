    title: REPORT ON BIML ACTIVITIES
    subject: CIML
    considerations: []
    actions:
    - type: notes
      message: 'A report summarizing the main points of BIML activity since the last
        meeting of the Committee in June 1978, was distributed to the participants.

        '
      dates:
      - start: '1980-06-16'
        kind: effective
