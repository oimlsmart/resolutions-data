# BodyRegister — authoritative register of bodies that own
# OIML meetings and decisions.
#
# Inert until ref-resolution lands in the published toolchain;
# meetings keep their inline `committee:` Body meanwhile. The gem's
# BodyRegister keys members by `code` (or `ref`).
